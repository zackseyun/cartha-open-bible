    changes_summary: Adjusted v.1 to reflect the sense of continual association with falsehood more directly. In v.6, replaced the interpretive 'changed my mind' and 'fully only' with the more accurate 'learned at last after I repented.' In v.11, corrected 'ten months' to 'ten years' for χρόνους δέκα.
translation:
  language: es
  text: '1[a]. Así pues, el odio es malo, porque se asocia continuamente con la falsedad, hablando contra la verdad; hace grandes las cosas pequeñas, presenta la luz como tinieblas y llama amargo a lo dulce. Enseña la calumnia, agita la ira y la guerra, y llena el corazón de insolencia y de toda codicia, de males y de un veneno diabólico.


    2. Por tanto, les digo estas cosas por experiencia, hijos míos, para que expulsen el odio diabólico y se aferren al amor de Dios. 3. La justicia echa fuera el odio, y la humildad quita la celosía[b]. Porque el hombre justo, siendo humilde, se avergüenza de hacer lo injusto, no porque otro lo condene, sino por su propio corazón, porque el Señor vela por su alma. 4. No habla contra un hombre santo, porque el temor de Dios habita en él. 5. Pues, temiendo ofender al Señor, no quiere en absoluto, ni siquiera en pensamiento, hacerle mal a un hombre.


    6. Estas cosas las aprendí al fin, después de arrepentirme respecto a José. 7. Porque el verdadero arrepentimiento según Dios [quita la ignorancia y] ahuyenta las tinieblas, ilumina los ojos, da conocimiento al alma y guía el propósito hacia la salvación. 8. Y esto no lo aprendió de los hombres, sino que por medio del arrepentimiento sabe recibir a los que se vuelven.


    9. Porque Dios me trajo una enfermedad del hígado, y si las oraciones de mi padre no me hubieran ayudado, mi espíritu casi habría desfallecido. 10. Pues por las mismas cosas por las que un hombre transgrede, por esas mismas es castigado. 11. Ya que, pues, mi hígado yacía sin piedad contra José, yo también, sufriendo en mi hígado, fui juzgado sin piedad por diez años[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase «quita la ignorancia y» es textual y lingüísticamente incierta en el testimonio griego; se traduce aquí entre corchetes para conservar la transparencia crítica.
    reason: textual_variant
  - marker: b
    text: También puede entenderse «envidia» o «celos» para ζῆλος; se eligió «celosía» para reflejar la rivalidad hostil del contexto, aunque el español común suele preferir «celos» o «envidia».
    reason: lexical_alternative
  - marker: c
    text: La expresión χρόνους δέκα sigue aquí la revisión inglesa más reciente y se vierte como «diez años»; otra tradición la habría entendido de otro modo temporal.
    reason: textual_variant
lexical_decisions:
- source_word: μῖσος
  english_pob_choice: hatred
  chosen_spanish: odio
  alternatives_spanish:
  - odio
  - aborrecimiento
  lexicon: LSJ
  rationale: En español, 'odio' comunica de forma natural el sustantivo de vicio moral del pasaje; 'aborrecimiento' suena más literario y menos directo.
- source_word: ἐνδελεχεῖ συνεχῶς
  english_pob_choice: continually associates with
  chosen_spanish: se asocia continuamente con
  alternatives_spanish:
  - permanece continuamente unido a
  - se mantiene constantemente unido a
  lexicon: LSJ
  rationale: La imagen de asociación persistente refleja el vínculo estrecho entre odio y falsedad sin volverlo una mera repetición adverbial.
- source_word: τῷ ψεύδει
  english_pob_choice: falsehood
  chosen_spanish: la falsedad
  alternatives_spanish:
  - la mentira
  - el engaño
  lexicon: LSJ
  rationale: '''Falsedad'' preserva el valor abstracto y ético del término, más amplio que una mentira puntual.'
- source_word: τὰ μικρὰ μεγάλα ποιεῖ
  english_pob_choice: makes small things great
  chosen_spanish: hace grandes las cosas pequeñas
  alternatives_spanish:
  - magnifica las cosas pequeñas
  - hace grandes las pequeñeces
  lexicon: LSJ
  rationale: Mantiene el contraste retórico de la frase griega con una estructura natural en español.
- source_word: τὸ φῶς σκότος παρέχει
  english_pob_choice: presents light as darkness
  chosen_spanish: presenta la luz como tinieblas
  alternatives_spanish:
  - presenta la luz como oscuridad
  - hace pasar la luz por tinieblas
  lexicon: LSJ
  rationale: '''Tinieblas'' conserva el tono moral y bíblico del contraste sin depender de un calco rígido.'
- source_word: συκοφαντίαν
  english_pob_choice: slander
  chosen_spanish: calumnia
  alternatives_spanish:
  - difamación
  - falsa acusación
  lexicon: LSJ
  rationale: '''Calumnia'' es el equivalente más natural y fuerte en español para el habla dañina de este catálogo de vicios.'
- source_word: ὀργὴν ἐκταράσσει
  english_pob_choice: stirs up wrath
  chosen_spanish: agita la ira
  alternatives_spanish:
  - despierta la ira
  - provoca la ira
  lexicon: LSJ
  rationale: '''Agita'' conserva el matiz de turbación y excitación interior.'
- source_word: πόλεμον διεγείρει
  english_pob_choice: stirs up war
  chosen_spanish: y la guerra
  alternatives_spanish:
  - y suscita la guerra
  - y provoca la guerra
  lexicon: LSJ
  rationale: En español, el verbo anterior y la coordinación bastan para mantener la progresión sin sobrecargar la frase.
- source_word: ὕβριν
  english_pob_choice: insolence
  chosen_spanish: insolencia
  alternatives_spanish:
  - arrogancia
  - violencia insolente
  lexicon: LSJ
  rationale: '''Insolencia'' conserva el matiz de desprecio arrogante y conducta ofensiva.'
- source_word: πλεονεξίαν
  english_pob_choice: greed
  chosen_spanish: codicia
  alternatives_spanish:
  - avaricia
  - ambición desordenada
  lexicon: LSJ
  rationale: '''Codicia'' funciona bien en la lista de vicios y mantiene el deseo desmedido de poseer.'
- source_word: ἰοῦ διαβολικοῦ
  english_pob_choice: a devilish poison
  chosen_spanish: un veneno diabólico
  alternatives_spanish:
  - un veneno del diablo
  - una ponzoña diabólica
  lexicon: LSJ
  rationale: '''Veneno diabólico'' reproduce la imagen corrosiva y el adjetivo moral del griego.'
- source_word: ἐξώσητε
  english_pob_choice: drive out
  chosen_spanish: expulsen
  alternatives_spanish:
  - arrojen fuera
  - saquen
  lexicon: LSJ
  rationale: '''Expulsar'' comunica con claridad la acción fuerte de apartar el odio.'
- source_word: κολληθῆτε
  english_pob_choice: cling to
  chosen_spanish: se aferren a
  alternatives_spanish:
  - se adhieran a
  - se unan a
  lexicon: LSJ
  rationale: '''Aferra[rse]'' expresa con fuerza la unión perseverante a algo valioso.'
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: LSJ
  rationale: Aquí la fuerza ética personal puede expresarse naturalmente como 'justicia' en español sin perder el contraste moral.
- source_word: ζῆλος
  english_pob_choice: jealousy
  chosen_spanish: la celosía
  alternatives_spanish:
  - los celos
  - la envidia
  lexicon: LSJ
  rationale: Se eligió 'celosía' para mantener una distinción de matiz, pero se reconoce que puede sentirse menos natural; el término apunta a la celosa rivalidad del contexto.
- source_word: αἰδεῖται
  english_pob_choice: is ashamed
  chosen_spanish: se avergüenza
  alternatives_spanish:
  - siente reverencia y recato
  - se retrae
  lexicon: LSJ
  rationale: '''Se avergüenza'' comunica la contención moral que impide la injusticia.'
- source_word: ἐπισκοπεῖ τὴν ψυχὴν αὐτοῦ
  english_pob_choice: watches over his soul
  chosen_spanish: vela por su alma
  alternatives_spanish:
  - cuida su alma
  - vigila su alma
  lexicon: LSJ
  rationale: '''Velar por'' mantiene el sentido de atención protectora y de examen divino.'
- source_word: καταλαλεῖ
  english_pob_choice: speak against
  chosen_spanish: habla contra
  alternatives_spanish:
  - murmura contra
  - calumnia a
  lexicon: LSJ
  rationale: La expresión amplia evita estrechar el término solo a calumnia formal.
- source_word: ἀνδρὸς ὁσίου
  english_pob_choice: a holy man
  chosen_spanish: un hombre santo
  alternatives_spanish:
  - un hombre piadoso
  - un hombre devoto
  lexicon: LSJ
  rationale: '''Santo'' refleja el peso moral-religioso de ὅσιος.'
- source_word: προσκρούσαι
  english_pob_choice: offend
  chosen_spanish: ofender
  alternatives_spanish:
  - tropezar contra
  - dar tropiezo a
  lexicon: LSJ
  rationale: '''Ofender al Señor'' es la formulación natural del sentido de incurrir en falta contra Dios.'
- source_word: ἕως ἐννοίας
  english_pob_choice: not even in thought
  chosen_spanish: ni siquiera en pensamiento
  alternatives_spanish:
  - ni en idea
  - ni aun en intención
  lexicon: LSJ
  rationale: Expresa el alcance interior del mandato con fluidez en español.
- source_word: μετανοῆσαί
  english_pob_choice: repented
  chosen_spanish: arrepentirme
  alternatives_spanish:
  - cambiar de mente
  - volverme en arrepentimiento
  lexicon: LSJ
  rationale: En el contexto confesional de esta sección, el verbo requiere la carga moral de 'arrepentirse' más que una mera reversión cognitiva.
- source_word: μετάνοια
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - cambio de mente
  - conversión
  lexicon: LSJ
  rationale: El sustantivo aquí funciona como principio moral-teológico, por lo que 'arrepentimiento' es la traducción más adecuada.
- source_word: φυγαδεύει τὸ σκότος
  english_pob_choice: puts darkness to flight
  chosen_spanish: ahuyenta las tinieblas
  alternatives_spanish:
  - pone en fuga las tinieblas
  - expulsa las tinieblas
  lexicon: LSJ
  rationale: '''Ahuyenta'' mantiene la imagen activa de expulsión y resulta idiomático en español.'
- source_word: τὸ διαβούλιον
  english_pob_choice: the purpose
  chosen_spanish: el propósito
  alternatives_spanish:
  - el consejo
  - la resolución
  lexicon: LSJ
  rationale: '''Propósito'' traduce bien la orientación interior de la mente y el querer.'
- source_word: πρὸς σωτηρίαν
  english_pob_choice: toward salvation
  chosen_spanish: hacia la salvación
  alternatives_spanish:
  - para salvación
  - hacia el rescate
  lexicon: LSJ
  rationale: Conserva la dirección teleológica del pasaje sin perder la resonancia teológica de σωτηρία.
- source_word: τοὺς ἐπιστρέφοντας δέχεσθαι
  english_pob_choice: to receive those who turn back
  chosen_spanish: recibir a los que se vuelven
  alternatives_spanish:
  - acoger a los que regresan
  - recibir a los que se arrepienten
  lexicon: LSJ
  rationale: '''Los que se vuelven'' preserva el movimiento de retorno del verbo sin cerrar el sentido solo a la emoción interior.'
- source_word: νόσον ἥπατος
  english_pob_choice: a disease of the liver
  chosen_spanish: una enfermedad del hígado
  alternatives_spanish:
  - una dolencia del hígado
  - una afección del hígado
  lexicon: LSJ
  rationale: Se mantiene literal porque el pasaje enlaza explícitamente la afección corporal con la hostilidad moral.
- source_word: αἱ εὐχαὶ τοῦ πατρός μου
  english_pob_choice: the prayers of my father
  chosen_spanish: las oraciones de mi padre
  alternatives_spanish:
  - las plegarias de mi padre
  - las súplicas de mi padre
  lexicon: LSJ
  rationale: '''Oraciones'' es el equivalente claro y estándar para la intercesión del padre.'
- source_word: ἐξέλειπε τὸ πνεῦμα μου
  english_pob_choice: my spirit would almost have failed
  chosen_spanish: mi espíritu casi habría desfallecido
  alternatives_spanish:
  - mi espíritu casi se habría apagado
  - casi me habría faltado el espíritu
  lexicon: LSJ
  rationale: Preserva la antropología del 'espíritu' y el matiz de desfallecimiento sin reducirlo a simple muerte.
- source_word: παρανομεῖ
  english_pob_choice: transgresses
  chosen_spanish: transgrede
  alternatives_spanish:
  - obra contra la ley
  - pasa por alto la ley
  lexicon: LSJ
  rationale: '''Transgrede'' mantiene la referencia a quebrantar una norma o ley moral.'
- source_word: ἔκειτο ... κατὰ τοῦ Ἰωσήφ
  english_pob_choice: lay ... set against Joseph
  chosen_spanish: yacía sin piedad contra José
  alternatives_spanish:
  - yacía hostil contra José
  - estaba puesto contra José
  lexicon: LSJ
  rationale: La imagen corporal del órgano se conserva con el adverbio de hostilidad que corresponde al contexto.
- source_word: ἀνιλεως
  english_pob_choice: pitilessly
  chosen_spanish: sin piedad
  alternatives_spanish:
  - pietosamente no
  - implacablemente
  lexicon: LSJ
  rationale: '''Sin piedad'' es la forma más natural y directa en español, aunque pierde algo del eco adverbial repetido.'
- source_word: ἐκρινόμην
  english_pob_choice: I was judged
  chosen_spanish: fui juzgado
  alternatives_spanish:
  - fui condenado
  - fui castigado
  lexicon: LSJ
  rationale: Conserva el matiz judicial y deja que el contexto implique el castigo sufrido.
- source_word: χρόνους δέκα
  english_pob_choice: for ten years
  chosen_spanish: por diez años
  alternatives_spanish:
  - durante diez años
  - por diez tiempos
  lexicon: LSJ
  rationale: La revisión inglesa más reciente corrige la temporalidad a 'ten years'; el español sigue esa lectura revisada.
theological_decisions:
- issue: Traducción de μετανοέω / μετάνοια en vv. 6-8
  english_pob_reading: v. 6 'I repented'; v. 7 'true repentance according to God'
  chosen_spanish_reading: v. 6 'después de arrepentirme'; v. 7 'el verdadero arrepentimiento según Dios'
  alternative_spanish_readings:
  - '''después de cambiar de mente'' / ''cambio de mente'''
  - '''conversión'''
  rationale: La revisión inglesa final favorece la lectura confesional en v. 6; en v. 7 la formulación se vuelve doctrina moral general, por lo que 'arrepentimiento' conserva mejor la densidad religiosa del pasaje.
  doctrine_reference: 'DOCTRINE.md: μετανοέω en contexto de pecado → arrepentirse; μετάνοια en afirmación moral-teológica → arrepentimiento'
- issue: Texto entre corchetes en v. 7
  english_pob_reading: '[removes ignorance and]'
  chosen_spanish_reading: '[quita la ignorancia y]'
  alternative_spanish_readings:
  - omitir la frase
  - integrarla sin corchetes
  rationale: Se mantiene la transparencia textual de la tradición griega y del audit trail inglés, sin ocultar la incertidumbre de la lectura.
  doctrine_reference: Principio POB de marcar incertidumbre textual de forma visible
- issue: Referencia al sujeto implícito en v. 8
  english_pob_reading: '''through repentance he knows how to receive those who turn back'''
  chosen_spanish_reading: '''por medio del arrepentimiento sabe recibir a los que se vuelven'''
  alternative_spanish_readings:
  - '''aprende a recibir a los que se vuelven'''
  - '''sepa cómo recibir a los que vuelven'''
  rationale: La frase inglesa ya presupone un sujeto teológico implícito; el español conserva la misma ambigüedad controlada sin forzar una explicitación innecesaria.
  doctrine_reference: 'POB principle: preserve syntactic ambiguity unless the source compels resolution'
- issue: Temporal phrase χρόνους δέκα in v. 11
  english_pob_reading: for ten years
  chosen_spanish_reading: por diez años
  alternative_spanish_readings:
  - por diez períodos
  - por diez tiempos
  rationale: Sigo la revisión inglesa más reciente, que reevalúa el valor temporal de χρόνους δέκα como años y no meses.
  doctrine_reference: Revision awareness and source-critical audit trail
- issue: Relación moral entre odio y enfermedad del hígado
  english_pob_reading: the liver lays pitilessly set against Joseph; I too, suffering in my liver
  chosen_spanish_reading: mi hígado yacía sin piedad contra José; yo también, sufriendo en mi hígado
  alternative_spanish_readings:
  - mi hígado estaba puesto contra José
  - padecí en mi hígado
  rationale: La traducción conserva la conexión corporal-moral del testimonio de Gad sin convertirla en mera metáfora libre.
  doctrine_reference: 'POB ethical anthropology: bodily affliction used as moral sign without allegorizing beyond the text'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que ajusta v. 1 a la asociación continua con la falsedad, v. 6 al arrepentimiento de Gad respecto de José y v. 11 a «diez años» para χρόνους δέκα. También conserva el corchete crítico de v. 7 y mantiene la estructura de catálogo de vicios y exhortación moral.
  spanish_consistency_notes:
  - Se preserva «Yahvé» solo cuando aparece el nombre divino hebreo; aquí el texto usa Θεός/Κύριος, por lo que se traduce «Dios» y «Señor».
  - Se mantuvo una distinción entre «arrepentirse/arrepentimiento» en el marco confesional y un posible valor cognitivo del verbo en otros contextos, pero aquí domina la dimensión moral.
  - Se optó por un español natural y solemne, evitando calcos excesivos pero conservando la imaginería corporal del hígado, el corazón y el espíritu.
  - La nota de ζῆλος se marcó porque la elección «celosía» no es la más idiomática del español general; queda registrada la alternativa más común.
  - La revisión cronológica de v. 11 se alineó con el audit trail inglés más reciente, no con la lectura previa de «meses».
