base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/002/005.yaml
  text: But the God of my fathers rescued him from my hands, so that I might not commit a lawless deed in Israel.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:47Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Pero el Dios de mis padres lo libró de mis manos, para que yo no cometiera una iniquidad en Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐρρύσατο
  english_pob_choice: rescued
  chosen_spanish: libró
  alternatives_spanish:
  - rescató
  - liberó
  lexicon: BDAG
  rationale: Coherente con la traducción en 2:4; 'libró' conserva el sentido concreto de liberación de un peligro inminente.
- source_word: ἀνόμημα
  english_pob_choice: a lawless deed
  chosen_spanish: una iniquidad
  alternatives_spanish:
  - un acto sin ley
  - una transgresión
  lexicon: BDAG
  rationale: Mantiene la coherencia con ἀνομίαν μεγάλην en 2:4 ('una gran iniquidad') y conserva el registro legal-moral.
- source_word: Θεὸς τῶν πατέρων μου
  english_pob_choice: the God of my fathers
  chosen_spanish: el Dios de mis padres
  alternatives_spanish:
  - el Dios de mis antepasados
  lexicon: BDAG
  rationale: Locución bíblica patriarcal estándar; 'padres' conserva el eco patriarcal del relato testamentario.
translation_notes:
  revision_awareness: El verso fue dejado sin cambios en el revisión inglesa; el español refleja la versión estable del singular ('mis manos', 'yo no cometiera') frente al plural de 2:4.
  spanish_consistency_notes:
  - '''iniquidad'' para ἀνόμημα, paralelo a ἀνομία en 2:4'
  - '''Dios de mis padres'' como rendición patriarcal estable'
