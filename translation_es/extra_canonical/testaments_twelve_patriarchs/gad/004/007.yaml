  text: 7. Τὸ γὰρ πνεῦμα τοῦ μίσους *διὰ τῆς²⁹ ὀλιγοψυχίας συνεργεῖ τῷ Σατανᾷ ἐν πᾶσιν εἰς θάνατον τῶν ἀνθρώπων, τὸ δὲ πνεῦμα τῆς ἀγάπης *ἐν μακροθυμίᾳ³⁰ συνεργεῖ *τῷ νόμῳ³¹ τοῦ Θεοῦ εἰς σωτηρίαν τῶν³² ἀνθρώπων.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/004/007.yaml
  text: For the spirit of hatred, through faintheartedness, works together with Satan in everything for the death of men; but the spirit of love, through longsuffering, works together with the law of God for the salvation of men.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Removed stray footnote markers from the draft; otherwise retained the translation.
translation:
  language: es
  text: Porque el espíritu del odio, mediante la pusilanimidad[a], coopera con Satanás en todo para la muerte de los hombres; pero el espíritu del amor, mediante la longanimidad[b], coopera con la ley de Dios para la salvación de los hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Pusilanimidad'' traduce un término que también puede sugerir pequeñez de alma, desánimo o cobardía.'
    reason: lexical_alternative
  - marker: b
    text: '''Longanimidad'' también puede traducirse como ''paciencia'' o ''tolerancia''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  lexicon: LSJ
  rationale: Se mantiene 'espíritu' (minúscula) por ser fuerza moral personificada, no el Espíritu Santo.
- source_word: ὀλιγοψυχία
  english_pob_choice: faintheartedness
  chosen_spanish: pusilanimidad
  alternatives_spanish:
  - pequeñez de ánimo
  - desánimo
  - cobardía
  lexicon: LSJ
  rationale: Término técnico que refleja literalmente 'alma pequeña'; conserva el registro elevado del original.
- source_word: συνεργεῖ
  english_pob_choice: works together with
  chosen_spanish: coopera con
  alternatives_spanish:
  - colabora con
  - obra junto con
  lexicon: LSJ
  rationale: Verbo cognado que conserva la metáfora de alianza activa entre el vicio y Satanás, o entre la virtud y la ley de Dios.
- source_word: μακροθυμία
  english_pob_choice: longsuffering
  chosen_spanish: longanimidad
  alternatives_spanish:
  - paciencia
  - tolerancia
  - magnanimidad
  lexicon: LSJ
  rationale: Término ético elevado tradicional en literatura paranética; preserva el peso de la virtud frente a 'paciencia'.
- source_word: νόμῳ τοῦ Θεοῦ
  english_pob_choice: law of God
  chosen_spanish: ley de Dios
  alternatives_spanish:
  - ley divina
  lexicon: LSJ
  rationale: Frase formal estándar; mantiene el dativo griego como complemento claro.
- source_word: σωτηρίαν
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  lexicon: LSJ
  rationale: Conserva el término soteriológico fuerte en contraste con 'muerte de los hombres'.
translation_notes:
  revision_awareness: El POB inglés pasó por una revisión que retiró marcadores de notas erróneos ([c][b]) en 'longsuffering'. Mi traducción preserva el texto revisado limpio y añade solo las dos notas léxicas pertinentes en español.
  spanish_consistency_notes:
  - '''espíritu'' minúscula para fuerza moral personificada, no el Espíritu Santo'
  - '''longanimidad'' para μακροθυμία en contextos éticos elevados; ''paciencia'' como alternativa común'
