id: T12P.GAD.6.6
reference: Testament of Gad 6:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 6. Ἐὰν *δὲ ἀρνήσηται⁴⁵ καὶ *αἰδεσθῇ ἐλεγχόμενος⁴⁶, ἡσύχασον⁴⁷ μὴ †ἐλέγξῃς⁴⁸ αὐτόν· ὁ γὰρ ἀρνούμενος⁴⁹ μετανοεῖ *τοῦ πλημμελῆσαι⁵⁰ *εἰς σέ⁵¹. *καὶ [φοβηθεὶς] εἰρηνεύει⁵².
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/006/006.yaml
  text: But if he denies it and is ashamed when reproved, be still; do not reprove him. For the one who denies it repents of having sinned against you, so that he may not do wrong to you again, and being afraid he makes peace.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:58Z'
    unchanged: false
    changes_summary: Replaced 'do not keep reproving him' with the more direct 'do not reprove him' to match the Greek without added aspect; changed 'done wrong' to 'sinned' for πλημμελῆσαι; adjusted punctuation for smoother formal English while preserving the final clause about making peace.
translation:
  language: es
  text: Pero si lo niega y se avergüenza al ser reprendido[a], guarda silencio; no lo reprendas. Pues el que niega se arrepiente[b] de haber pecado contra ti, para no volver a hacerte daño, y, temeroso, hace las paces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testigos en el versículo 6 difieren en la formulación del arrepentimiento del que niega y de su temor, pero el sentido general es que la vergüenza puede llevarlo a cesar en la ofensa y hacer las paces.
    reason: textual_variant
  - marker: b
    text: μετανοέω en este contexto interpersonal significa 'arrepentirse' (cambio de actitud moral), no meramente 'cambiar de mente'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρνήσηται
  english_pob_choice: denies it
  chosen_spanish: lo niega
  alternatives_spanish:
  - lo desmiente
  - lo rechaza
  lexicon: BDAG
  rationale: Mantiene consistencia con 6:4 ('lo niega').
- source_word: αἰδεσθῇ ἐλεγχόμενος
  english_pob_choice: is ashamed when reproved
  chosen_spanish: se avergüenza al ser reprendido
  alternatives_spanish:
  - siente vergüenza cuando se le exhorta
  - queda confundido al ser reconvenido
  lexicon: LSJ
  rationale: Capta la vergüenza moral implícita en el pasivo/medio αἰδέομαι junto con ἐλέγχω en sentido de reprensión.
- source_word: ἡσύχασον
  english_pob_choice: be still
  chosen_spanish: guarda silencio
  alternatives_spanish:
  - calla
  - permanece quieto
  lexicon: LSJ
  rationale: Imperativo digno; 'guarda silencio' conserva el matiz de cesar la presión sin parecer brusco.
- source_word: μὴ ἐλέγξῃς αὐτόν
  english_pob_choice: do not reprove him
  chosen_spanish: no lo reprendas
  alternatives_spanish:
  - no lo reproches
  - no lo amonestes más
  lexicon: BDAG
  rationale: Sigue el revision_pass POB que cambió 'do not keep reproving' por la forma directa 'do not reprove him'.
- source_word: πλημμελῆσαι εἰς σέ
  english_pob_choice: having sinned against you
  chosen_spanish: haber pecado contra ti
  alternatives_spanish:
  - haberte ofendido
  - haber transgredido contra ti
  lexicon: LSJ
  rationale: El revision_pass POB cambió 'done wrong' por 'sinned' para πλημμελῆσαι; el español sigue esa decisión.
- source_word: φοβηθεὶς εἰρηνεύει
  english_pob_choice: being afraid he makes peace
  chosen_spanish: temeroso, hace las paces
  alternatives_spanish:
  - por miedo, vive en paz
  - atemorizado, busca la paz
  lexicon: BDAG
  rationale: '''Hacer las paces'' refleja el sentido activo de εἰρηνεύω en contexto de relaciones restauradas.'
translation_notes:
  revision_awareness: 'Tres ajustes del revision_pass POB se reflejan: (1) ''do not reprove him'' en lugar de ''do not keep reproving him''; (2) ''sinned'' en lugar de ''done wrong'' para πλημμελῆσαι; (3) puntuación más fluida en la cláusula final.'
  spanish_consistency_notes:
  - μετανοέω → 'arrepentirse' en contexto de pecado interpersonal.
  - πλημμελέω → 'pecar' o 'cometer falta', siguiendo la elección POB de 'sin'.
