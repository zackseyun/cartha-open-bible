id: T12P.GAD.6.7
reference: Testament of Gad 6:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 7. Ἐὰν δέ *ἔστω ἀναιδὴς⁵³ καὶ ἐνίσταται⁵⁴ τῇ κακίᾳ, *καὶ οὕτως⁵⁵ ἄφες αὐτῷ ἀπὸ καρδίας, καὶ δὸς⁵⁶ τῷ Θεῷ τὴν ἐκδίκησιν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/006/007.yaml
  text: But even if he is shameless and persists in evil, even so forgive him from the heart, and give vengeance to God.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:57Z'
    unchanged: false
    changes_summary: Changed 'persists in his wrongdoing' to 'persists in evil' for closer alignment with τῇ κακίᾳ, and changed 'leave vengeance to God' to 'give vengeance to God' to reflect δὸς more directly.
translation:
  language: es
  text: Pero aunque sea desvergonzado y persista en la maldad[a], aun así perdónalo de corazón, y entrega la venganza a Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: τῇ κακίᾳ ('en la maldad') es más amplio que 'en su mala acción'; abarca la disposición moral persistente, no solo el acto puntual.
    reason: lexical_alternative
  - marker: b
    text: 'El imperativo griego δός es activo: ''da/entrega''. La tradición castellana ''deja la venganza a Dios'' (cf. Rom 12:19) suaviza ese matiz; aquí se preserva la fuerza del verbo.'
    reason: theological_note
lexical_decisions:
- source_word: ἀναιδής
  english_pob_choice: shameless
  chosen_spanish: desvergonzado
  alternatives_spanish:
  - insolente
  - descarado
  lexicon: BDAG
  rationale: '''Desvergonzado'' conserva la fuerza moral fuerte que conviene al tono de advertencia de Gad.'
- source_word: ἐνίσταται τῇ κακίᾳ
  english_pob_choice: persists in evil
  chosen_spanish: persiste en la maldad
  alternatives_spanish:
  - se obstina en el mal
  - permanece en su maldad
  lexicon: LSJ
  rationale: Sigue el revision_pass POB que cambió 'persists in his wrongdoing' por 'persists in evil' para alinear más con τῇ κακίᾳ.
- source_word: ἄφες αὐτῷ ἀπὸ καρδίας
  english_pob_choice: forgive him from the heart
  chosen_spanish: perdónalo de corazón
  alternatives_spanish:
  - perdónalo desde el corazón
  - perdónalo cordialmente
  lexicon: BDAG
  rationale: Conserva la dimensión interior y sincera que enmarca todo el capítulo.
- source_word: δὸς τῷ Θεῷ τὴν ἐκδίκησιν
  english_pob_choice: give vengeance to God
  chosen_spanish: entrega la venganza a Dios
  alternatives_spanish:
  - da la venganza a Dios
  - deja la venganza a Dios
  lexicon: BDAG
  rationale: Sigue el revision_pass POB que cambió 'leave vengeance' por 'give vengeance' para reflejar δός más directamente; 'entregar' refleja ese imperativo activo en español.
theological_decisions:
- issue: Cláusula final sobre la retaliación
  chosen_reading: entrega la venganza a Dios
  alternative_readings:
  - deja la venganza a Dios
  - da la retribución a Dios
  rationale: El sentido ético es la no-retaliación y entregar el juicio a Dios; 'venganza' es la rendición idiomática más clara que conserva el peso teológico. La POB en su revision_pass enfatizó el verbo activo 'give'.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Dos cambios del revision_pass POB se reflejan: (1) ''persists in evil'' en lugar de ''persists in his wrongdoing''; (2) ''give vengeance'' en lugar de ''leave vengeance'' para δός más directamente.'
  spanish_consistency_notes:
  - κακία → 'maldad' (disposición moral) frente a 'mal' (sustantivo abstracto neutro).
  - ἀπὸ καρδίας → 'de corazón' como fórmula ética estable en este capítulo.
