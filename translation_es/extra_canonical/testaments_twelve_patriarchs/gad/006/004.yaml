id: T12P.GAD.6.4
reference: Testament of Gad 6:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 4. Ἐὰν δὲ ἀρνεῖται²⁸, μὴ φιλονείκει αὐτῷ, μήποτε²⁹ ὁμόσαντος αὐτοῦ δισσῶς ἁμαρτάνεις³⁰.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/006/004.yaml
  text: But if he denies it, do not contend with him, lest, when he swears, you sin doubly.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:56Z'
    unchanged: false
    changes_summary: Removed 'an oath' since the Greek has simply 'when he swears,' and added commas for clearer English flow.
translation:
  language: es
  text: Pero si lo niega, no contiendas con él, no sea que, cuando jure[a], peques doblemente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice simplemente 'cuando jure'; tradicionalmente se ha traducido 'cuando jure (en falso)' o 'cuando preste juramento', pero el revision_pass de la POB optó por la lectura más literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρνεῖται
  english_pob_choice: denies it
  chosen_spanish: lo niega
  alternatives_spanish:
  - lo desmiente
  - lo rechaza
  lexicon: BDAG
  rationale: '''Negar'' es el equivalente directo y mantiene el contraste con ''confesar'' del versículo previo.'
- source_word: μὴ φιλονείκει αὐτῷ
  english_pob_choice: do not contend with him
  chosen_spanish: no contiendas con él
  alternatives_spanish:
  - no disputes con él
  - no riñas con él
  lexicon: LSJ
  rationale: '''Contender'' conserva el matiz de disputa contenciosa sin caer en lo coloquial.'
- source_word: μήποτε
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - a fin de que no
  - para que no
  lexicon: BDAG
  rationale: Locución estándar en español formal para μήποτε con sentido de prevención.
- source_word: ὁμόσαντος αὐτοῦ
  english_pob_choice: when he swears
  chosen_spanish: cuando jure
  alternatives_spanish:
  - al jurar él
  - si llega a jurar
  lexicon: LSJ
  rationale: El revision_pass POB quitó 'an oath' porque el griego solo dice 'cuando jure'; el español refleja esa decisión.
- source_word: δισσῶς ἁμαρτάνεις
  english_pob_choice: you sin doubly
  chosen_spanish: peques doblemente
  alternatives_spanish:
  - cometas doble pecado
  - peques dos veces
  lexicon: LSJ
  rationale: Compacto y proverbial; conserva el adverbio griego con su fuerza retórica.
translation_notes:
  revision_awareness: El revision_pass POB eliminó 'an oath' porque el griego ὁμόσαντος αὐτοῦ no lo añade explícitamente. El español sigue esa lectura más literal.
  spanish_consistency_notes:
  - μήποτε → 'no sea que' como locución estándar en advertencias.
  - ἁμαρτάνω → 'pecar' (no 'errar') en contexto moral.
