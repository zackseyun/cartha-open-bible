id: T12P.GAD.6.5
reference: Testament of Gad 6:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 5. [Μὴ³¹ ἀκούσῃ³² ἐν μάχῃ ἀλλότριος³³ τὸ³⁴ μυστήριόν σου³⁵, *ἵνα μὴ³⁶ μισήσας³⁷ *ἐχθράνῃ σε³⁸, καὶ μεγάλην ἁμαρτίαν ἐργάσηται³⁹ [ἐν σοί]⁴⁰. ὅτι πολλάκις *δολοφωνεῖ σε⁴¹ ἢ περιεργάζεται σε⁴² ἐν κακοῖς⁴³] *λαβὼν ἀπό σου⁴⁴ τὸν ἰόν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/006/005.yaml
  text: Do not let another hear your secret in a quarrel, lest, having come to hate you, he become your enemy and commit a great sin against you; for many times he either murders you by treachery or entangles you in evils, having received the poison from you.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:57Z'
    unchanged: false
    changes_summary: Adjusted the middle clause to reflect the participle more clearly ('having come to hate you'). Replaced 'kills by treachery' with 'murders you by treachery' for better lexical force of δολοφονεῖ. Changed 'having taken in from you the poison' to the more natural and accurate 'having received the poison from you.'
translation:
  language: es
  text: No dejes que otro escuche tu secreto[a] en una disputa, no sea que, llegando a odiarte, se vuelva tu enemigo y cometa un gran pecado contra ti; porque muchas veces o te asesina con traición[b] o te enreda en males, habiendo recibido de ti el veneno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El versículo es textualmente difícil. La advertencia trata de exponer un asunto privado durante una disputa, lo cual puede llevar al otro a una acción hostil y traicionera; la imagen final usa 'veneno' metafóricamente para el odio absorbido.
    reason: textual_variant
  - marker: b
    text: El verbo griego δολοφονέω es un compuesto raro de 'dolo' + 'matar'; literalmente, 'matar mediante engaño'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλότριος
  english_pob_choice: another / a stranger
  chosen_spanish: otro
  alternatives_spanish:
  - un extraño
  - un ajeno
  lexicon: BDAG
  rationale: ἀλλότριος puede significar 'extraño/ajeno'; en este contexto interpersonal 'otro' funciona naturalmente, igual que la POB en sus dos versiones consideró 'another' y 'a stranger' como equivalentes.
- source_word: μυστήριόν σου
  english_pob_choice: your secret
  chosen_spanish: tu secreto
  alternatives_spanish:
  - tu confidencia
  - tu asunto privado
  lexicon: BDAG
  rationale: En este contexto interpersonal el sentido no es místico sino confidencial; 'secreto' es la rendición clara y natural.
- source_word: μισήσας ἐχθράνῃ σε
  english_pob_choice: having come to hate you, he become your enemy
  chosen_spanish: llegando a odiarte, se vuelva tu enemigo
  alternatives_spanish:
  - habiéndote tomado odio, se haga enemigo tuyo
  - tras odiarte, llegue a ser tu enemigo
  lexicon: LSJ
  rationale: Refleja el participio aoristo griego (ingresivo) tal como lo aclara el revision_pass POB ('having come to hate you').
- source_word: δολοφονεῖ σε
  english_pob_choice: murders you by treachery
  chosen_spanish: te asesina con traición
  alternatives_spanish:
  - te mata a traición
  - te asesina alevosamente
  lexicon: LSJ
  rationale: El compuesto griego une dolo + matar; 'asesinar con traición' explicita ambos componentes en un español digno.
- source_word: περιεργάζεται σε ἐν κακοῖς
  english_pob_choice: entangles you in evils
  chosen_spanish: te enreda en males
  alternatives_spanish:
  - te involucra en maldades
  - trama contra ti en cosas malas
  lexicon: LSJ
  rationale: El verbo griego es difícil; 'enredar en males' preserva la idea de maquinación hostil sin sobreinterpretar.
- source_word: λαβὼν ἀπό σου τὸν ἰόν
  english_pob_choice: having received the poison from you
  chosen_spanish: habiendo recibido de ti el veneno
  alternatives_spanish:
  - tras absorber de ti el veneno
  - habiendo tomado de ti el veneno
  lexicon: LSJ
  rationale: Sigue la decisión del revision_pass POB ('received') frente al previo 'taken in'; la imagen del veneno como odio absorbido se conserva.
- source_word: τὸν ἰόν
  english_pob_choice: the poison
  chosen_spanish: el veneno
  alternatives_spanish:
  - la ponzoña
  - el tósigo
  lexicon: LSJ
  rationale: '''Veneno'' encaja con la metáfora del odio absorbido; ''ponzoña'' suena arcaico.'
translation_notes:
  revision_awareness: 'El revision_pass POB ajustó tres puntos: el participio ''having come to hate you'' (ingresivo), ''murders you by treachery'' (fuerza léxica plena de δολοφονέω) y ''received the poison from you'' (más natural y exacto que ''taken in''). El español refleja las tres correcciones.'
  spanish_consistency_notes:
  - μῖσος / μισέω → 'odio' / 'odiar' (no 'aborrecer') en este corpus.
  - ἰός como veneno metafórico → 'veneno' por consistencia con la imagen del odio absorbido.
