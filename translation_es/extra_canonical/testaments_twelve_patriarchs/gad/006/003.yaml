reference: Testament of Gad 6:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 3. Ἀγαπήσατε¹⁷ ἀλλήλους ἀπὸ καρδίας, καὶ ἐάν τις¹⁸ *ἁμαρτήσει εἰς σέ¹⁹, [α-text] εἰπὲ αὐτῷ εἰρήνην²⁰, καὶ ἐν τῇ ψυχῇ σου μὴ κρατήσῃς δόλον· καὶ ἐὰν μετανοήσας ὁμολογήσῃ²¹, ἄφες αὐτῷ²². [β, Α, S¹] εἰπὲ αὐτῷ *ἐν εἰρήνῃ²³, ἐξορίσας τὸν ἰὸν τοῦ μίσους, καὶ²⁴ ἐν τῇ²⁵ ψυχῇ σου μὴ κρατήσῃς δόλον· καὶ ἐὰν *ὁμολογήσας μετανοήσῃ²⁶ *ἄφες αὐτῷ²⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/006/003.yaml
  text: Love one another from the heart; and if anyone sins against you, speak peace to him, and in your soul hold no deceit; and if he confesses and repents, forgive him.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:56Z'
    unchanged: false
    changes_summary: Replaced 'changes his mind' with 'repents' for more accurate rendering of μετανοήσας while keeping the rest of the verse substantially unchanged.
translation:
  language: es
  text: Ámense unos a otros de corazón; y si alguien peca contra ti, háblale paz[a], y en tu alma no guardes engaño; y si él confiesa y se arrepiente[b], perdónalo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Variación textual: en algunos testigos (β, A, S¹) se lee ''háblale en paz, expulsando el veneno del odio''. La idea de un trato pacífico sin doblez interior es segura.'
    reason: textual_variant
  - marker: b
    text: El verbo griego μετανοέω puede entenderse también como 'cambia de mente' o 'se vuelve atrás'; aquí, en contexto de pecado interpersonal, 'se arrepiente' refleja mejor la fuerza moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαπήσατε ἀλλήλους ἀπὸ καρδίας
  english_pob_choice: Love one another from the heart
  chosen_spanish: Ámense unos a otros de corazón
  alternatives_spanish:
  - Amaos los unos a los otros de corazón
  - Ámense de corazón unos a otros
  lexicon: BDAG
  rationale: Imperativo plural neutro latinoamericano (ustedes) con la fórmula ética 'de corazón' que conserva la dimensión interior.
- source_word: ἁμαρτήσει εἰς σέ
  english_pob_choice: sins against you
  chosen_spanish: peca contra ti
  alternatives_spanish:
  - te ofende
  - te agravia
  lexicon: BDAG
  rationale: Mantiene el campo semántico moral-religioso de ἁμαρτάνω como 'pecar', no mera ofensa social.
- source_word: εἰπὲ αὐτῷ εἰρήνην
  english_pob_choice: speak peace to him
  chosen_spanish: háblale paz
  alternatives_spanish:
  - dile palabras de paz
  - salúdalo con paz
  lexicon: LSJ
  rationale: Conserva la fórmula semitizante 'hablar paz' que la POB inglesa preservó como giro ético-formulario.
- source_word: δόλον
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - dolo
  - doblez
  lexicon: BDAG
  rationale: '''Engaño'' es el equivalente claro y moderno para δόλος en registro digno; ''dolo'' es jurídico, ''doblez'' demasiado interpretativo.'
- source_word: μετανοήσας ὁμολογήσῃ / ὁμολογήσας μετανοήσῃ
  english_pob_choice: confesses and repents
  chosen_spanish: confiesa y se arrepiente
  alternatives_spanish:
  - reconoce y se arrepiente
  - confiesa y cambia de mente
  lexicon: BDAG
  rationale: Sigue la guía POB de 'arrepentirse' para μετανοέω en contexto de pecado; el revision_pass POB cambió 'changes his mind' por 'repents'.
- source_word: ἄφες αὐτῷ
  english_pob_choice: forgive him
  chosen_spanish: perdónalo
  alternatives_spanish:
  - concédele perdón
  - remítele
  lexicon: BDAG
  rationale: Imperativo singular directo y natural en español moderno.
translation_notes:
  revision_awareness: El revision_pass POB reemplazó 'changes his mind' por 'repents' para una traducción más exacta de μετανοήσας. La versión española sigue esa decisión final.
  spanish_consistency_notes:
  - μετανοέω → 'arrepentirse' en contexto de pecado interpersonal (DOCTRINE.md).
  - δόλος → 'engaño' como rendición estándar.
