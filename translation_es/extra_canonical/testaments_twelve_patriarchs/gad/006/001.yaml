source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: VI. *Καὶ νῦν¹, τέκνα μου, Γπαραινῶ ὑμῖν⌉². ἀγαπᾶτε³ ἕκαστος *τὸν πλησίον⁴ αὑτοῦ⁵, καὶ ἐξάρατε τὸ μῖσος ἀπὸ τῶν καρδιῶν ὑμῶν· ἀγαπήσατε⁶ ἀλλήλους⁷ ἐν ἔργῳ καὶ λόγῳ καὶ διανοίᾳ ψυχῆς.
