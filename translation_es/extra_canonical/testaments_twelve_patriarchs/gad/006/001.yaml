base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/006/001.yaml
  text: 'And now, my children, I urge you: let each one love his neighbor, and remove hatred from your hearts. Love one another in deed and word and in thought of soul.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:56Z'
    unchanged: false
    changes_summary: Revised the final phrase from 'with the intention of the soul' to 'in thought of soul' to more closely reflect διανοίᾳ ψυχῆς without interpretive expansion. Kept the rest substantially unchanged for accuracy and natural formal register.
translation:
  language: es
  text: 'Y ahora, hijos míos, los exhorto: que cada uno ame a su prójimo y quite el odio de sus corazones. Ámense unos a otros en obra, en palabra y en pensamiento del alma.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y bien ahora
  - Ahora, pues
  lexicon: και νῦν
  rationale: Conserva el giro de transición temporal y exhortativa de la apertura sin sobreactuar la conexión lógica; en español, «Y ahora» resulta natural y fiel.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijos míos, queridos
  lexicon: τέκνα
  rationale: «Hijos míos» mantiene el tono afectivo y paterno del vocativo; evita una literalidad rígida pero conserva la relación de enseñanza.
- source_word: παραινῶ ὑμῖν
  english_pob_choice: I urge you
  chosen_spanish: los exhorto
  alternatives_spanish:
  - les urge
  - los insto
  lexicon: παραινέω
  rationale: «Exhorto» reproduce el matiz de recomendación solemne y pastoral; «urgir» en español puede sonar menos natural en este registro.
- source_word: τὸν πλησίον αὑτοῦ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - el prójimo de cada uno
  lexicon: πλησίον
  rationale: «Prójimo» conserva la carga ética amplia del término y evita reducirlo a cercanía espacial o vecinal.
- source_word: ἐξάρατε τὸ μῖσος ἀπὸ τῶν καρδιῶν ὑμῶν
  english_pob_choice: remove hatred from your hearts
  chosen_spanish: quite el odio de sus corazones
  alternatives_spanish:
  - arranquen el odio de sus corazones
  - eliminen el odio de sus corazones
  lexicon: μῖσος / καρδία
  rationale: «Quiten» conserva la imagen de apartar o remover; «odio» y «corazones» siguen de cerca el campo semántico sin forzar una metáfora distinta.
- source_word: ἀγαπήσατε ἀλλήλους
  english_pob_choice: Love one another
  chosen_spanish: Ámense unos a otros
  alternatives_spanish:
  - ámense mutuamente
  - amense el uno al otro
  lexicon: ἀγαπάω / ἀλλήλους
  rationale: El imperativo recíproco en español se expresa con claridad mediante «Ámense unos a otros», que suena natural y mantiene la reciprocidad.
- source_word: ἐν ἔργῳ καὶ λόγῳ καὶ διανοίᾳ ψυχῆς
  english_pob_choice: in deed and word and in thought of soul
  chosen_spanish: en obra, en palabra y en pensamiento del alma
  alternatives_spanish:
  - en hecho, en palabra y en pensamiento del alma
  - en obra, palabra y pensamiento del alma
  lexicon: ἔργον / λόγος / διανοία / ψυχή
  rationale: «Obra» y «palabra» son equivalentes breves y solemnes para ἔργῳ y λόγῳ; «pensamiento del alma» sigue de cerca la revisión inglesa «in thought of soul» sin añadir interpretaciones como intención o propósito.
theological_decisions:
- issue: El alcance de «prójimo» como mandato ético general
  english_pob_reading: let each one love his neighbor
  chosen_spanish_reading: que cada uno ame a su prójimo
  alternative_spanish_readings:
  - que cada uno ame a su vecino
  - que cada uno ame al cercano
  rationale: Se conserva el sentido ético amplio del mandato, no limitado a proximidad física o social. «Prójimo» es la forma española más estable para esta exigencia moral.
  doctrine_reference: Amor al prójimo como obligación comunitaria y moral (cf. Lev 19:18; tradición ética bíblica).
- issue: La expresión final «thought of soul» y su posible ambigüedad antropológica
  english_pob_reading: in thought of soul
  chosen_spanish_reading: en pensamiento del alma
  alternative_spanish_readings:
  - con la intención del alma
  - en la mente del alma
  rationale: Se preserva la tensión de la frase griega sin convertirla en una paráfrasis psicológica. «Pensamiento del alma» es semánticamente cercano y mantiene la rareza del giro, que el texto inglés también decidió conservar.
  doctrine_reference: Antropología bíblica y lenguaje del alma/mente en exhortaciones morales.
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió la frase final de «with the intention of the soul» a «in thought of soul» para reflejar mejor διανοίᾳ ψυχῆς sin expansión interpretativa. La traducción española sigue esa revisión y evita añadir «intención» o una explicación doctrinal no explícita en el griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «prójimo» para preservar el registro bíblico-ético amplio y evitar un falso sentido de vecindad literal.
  - Se mantiene un estilo exhortativo, sobrio y publicable, sin introducir explicaciones ausentes en el texto fuente.
