translation:
  language: es
  text: Por tanto, guárdense[a], hijos míos, del odio, porque comete iniquidad aun contra el Señor mismo. Pues no quiere oír las palabras de sus mandamientos acerca del amor al prójimo, y peca contra Dios. Pues si un hermano cae, se apresura al instante a denunciarlo a todos, y se da prisa para que sea juzgado y castigado y muera. Y si se trata de algún esclavo, lo calumnia[b] ante su amo, y en toda tribulación se alegra de él, por si acaso es ejecutado. Porque el odio coopera con la envidia también contra los que prosperan; al oír de su éxito y al verlo, siempre se debilita. Así como el amor incluso querría dar vida a los muertos y llamar de vuelta a los condenados a muerte, así también el odio quiere matar a los vivos, y no quiere que vivan los que han pecado en un asunto pequeño[c]. Porque el espíritu del odio, mediante la pusilanimidad, coopera con Satanás en todo para la muerte de los hombres; pero el espíritu del amor, mediante la longanimidad, coopera con la ley de Dios para la salvación
    de los hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo informa a su amo'. La expresión griega puede sugerir denuncia hostil ante una autoridad.
    reason: lexical_alternative
  - marker: b
    text: La frase 'los que han pecado solo un poco' también puede traducirse como 'los que han pecado en un asunto pequeño'.
    reason: lexical_alternative
  - marker: c
    text: '''Pusilanimidad'' traduce un término que también puede sugerir pequeñez de alma, desánimo o cobardía.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μῖσος
  english_pob_choice: hatred
  chosen_spanish: odio
  alternatives_spanish:
  - aborrecimiento
  lexicon: LSJ
  rationale: Sustantivo abstracto que se mantiene como 'odio' para preservar el tema del vicio gobernante y no un sentimiento momentáneo.
- source_word: ἀνομίαν ποιεῖ
  english_pob_choice: commits lawlessness
  chosen_spanish: comete iniquidad
  alternatives_spanish:
  - obra iniquidad
  - hace iniquidad
  lexicon: LSJ
  rationale: '''Iniquidad'' es la traducción tradicional y precisa de ἀνομία; ''comete'' refleja la fuerza activa del idioma.'
- source_word: Κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Amo
  lexicon: LSJ
  rationale: Rendición estándar para κύριος en referencia divina, conforme a la doctrina del proyecto.
- source_word: ἀγάπης τοῦ πλησίον
  english_pob_choice: love of neighbor
  chosen_spanish: amor al prójimo
  alternatives_spanish:
  - amor del prójimo
  - amor hacia el prójimo
  lexicon: LSJ
  rationale: Frase tradicional bíblica que preserva claramente el objeto del mandamiento ético.
- source_word: σπουδάζει
  english_pob_choice: is eager
  chosen_spanish: se apresura
  alternatives_spanish:
  - se afana
  - tiene celo
  lexicon: LSJ
  rationale: Transmite la prontitud activa del vicio en el contexto de la denuncia maliciosa.
- source_word: ἀναγγεῖλαι τοῖς πᾶσι
  english_pob_choice: to report it to everyone
  chosen_spanish: denunciarlo a todos
  alternatives_spanish:
  - anunciarlo a todos
  - informarlo a todos
  lexicon: LSJ
  rationale: Idioma natural en español para divulgación pública de la caída de otro, preservando la amplitud de πᾶσι.
- source_word: κριθεὶς καὶ κολασθεὶς
  english_pob_choice: be judged and punished
  chosen_spanish: sea juzgado y castigado
  alternatives_spanish:
  - sea condenado y disciplinado
  lexicon: LSJ
  rationale: Secuencia judicial directa y legible en español.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: LSJ
  rationale: Por doctrina del proyecto, 'esclavo' se prefiere donde el estado de esclavitud ante un amo es explícito y socialmente relevante; el POB inglés escogió 'slave'.
- source_word: συμβαλεῖ αὐτὸν πρὸς τὸν κύριον
  english_pob_choice: slanders him to his master
  chosen_spanish: lo calumnia ante su amo
  alternatives_spanish:
  - lo denuncia ante su amo
  - lo enfrenta con su amo
  lexicon: LSJ
  rationale: El contexto es denuncia hostil que conduce al castigo; 'calumnia' refleja el sentido adversarial sin alejarse del griego.
- source_word: ἐπιχαίρει
  english_pob_choice: rejoices over him
  chosen_spanish: se alegra de él
  alternatives_spanish:
  - se regocija sobre él
  - se goza de él
  lexicon: LSJ
  rationale: Retiene el deleite moralmente repugnante por el sufrimiento ajeno.
- source_word: φθόνῳ συνεργεῖ τὸ μῖσος
  english_pob_choice: hatred works together with envy
  chosen_spanish: el odio coopera con la envidia
  alternatives_spanish:
  - el odio colabora con la envidia
  lexicon: LSJ
  rationale: Preserva la alianza personificada de los vicios, central en la psicología moral del capítulo.
- source_word: εὐπραγούντων
  english_pob_choice: those who prosper
  chosen_spanish: los que prosperan
  alternatives_spanish:
  - los que les va bien
  - los exitosos
  lexicon: LSJ
  rationale: Captura tanto la buena fortuna como la prosperidad en contexto de envidia.
- source_word: ἐν προκοπῇ
  english_pob_choice: their success
  chosen_spanish: su éxito
  alternatives_spanish:
  - su progreso
  - su avance
  lexicon: LSJ
  rationale: Refiere contextualmente al avance ajeno, que el odio no puede tolerar oír ni ver.
- source_word: ἀσθενεῖ
  english_pob_choice: is always weakened
  chosen_spanish: siempre se debilita
  alternatives_spanish:
  - enferma
  - se consume
  lexicon: LSJ
  rationale: Conserva la metáfora de desgaste interior sin literalizar a enfermedad física.
- source_word: θέλει ζωοποιῆσαι
  english_pob_choice: would even make the dead alive
  chosen_spanish: incluso querría dar vida a los muertos
  alternatives_spanish:
  - desea vivificar a los muertos
  - quiere reanimar a los muertos
  lexicon: LSJ
  rationale: Se preserva el θέλει volitivo con 'querría', expresando disposición del amor más que afirmar un milagro literal.
- source_word: ἀνακαλέσασθαι
  english_pob_choice: would call back
  chosen_spanish: llamar de vuelta
  alternatives_spanish:
  - recobrar
  - convocar de nuevo
  lexicon: LSJ
  rationale: Encaja con la imagen paralela de restaurar a los ya sentenciados a muerte.
- source_word: τοὺς ἐν ὀλίγῳ ἁμαρτήσαντας
  english_pob_choice: those who have sinned in a small matter
  chosen_spanish: los que han pecado en un asunto pequeño
  alternatives_spanish:
  - los que han pecado en algo leve
  - los que han cometido un pecado menor
  lexicon: LSJ
  rationale: 'Preserva el punto moral comparativo: el odio no muestra misericordia ni ante una ofensa leve.'
- source_word: ὀλιγοψυχίας
  english_pob_choice: faintheartedness
  chosen_spanish: pusilanimidad
  alternatives_spanish:
  - pequeñez de ánimo
  - cobardía
  - desánimo
  lexicon: LSJ
  rationale: Término difícil; 'pusilanimidad' captura mejor la disminución del vigor del alma que permite la alianza del odio con Satanás.
- source_word: μακροθυμίᾳ
  english_pob_choice: longsuffering
  chosen_spanish: longanimidad
  alternatives_spanish:
  - paciencia
  - tolerancia
  lexicon: LSJ
  rationale: Elegido por su registro ético elevado y para preservar el peso de la virtud en literatura paranética.
- source_word: νόμῳ τοῦ Θεοῦ
  english_pob_choice: law of God
  chosen_spanish: ley de Dios
  alternatives_spanish:
  - ley divina
  lexicon: LSJ
  rationale: Fraseo formal apropiado para la exhortación testamentaria.
- source_word: σωτηρίαν
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  lexicon: LSJ
  rationale: Conserva el término soteriológico fuerte en contraste con 'muerte de los hombres'.
theological_decisions:
- issue: Personificación del odio y el amor como fuerzas activas o espíritus
  chosen_reading: Traducir ambos como fuerzas morales personificadas, culminando en referencia explícita al 'espíritu del odio' y al 'espíritu del amor'.
  alternative_readings:
  - Reducir las cláusulas anteriores a abstracciones impersonales solamente
  - Interpretar los espíritus como meras disposiciones humanas sin dimensión espiritual
  rationale: El griego pasa de sustantivos abstractos a lenguaje explícito de πνεῦμα. Preservar la personificación mantiene el dualismo moral y espiritual del capítulo sin sobre-sistematizar.
  doctrine_reference: DOCTRINE.md §Preservar la tensión teológica en lugar de resolverla
- issue: Sentido del lenguaje vivificador del amor en el v. 6
  chosen_reading: 'Traducir como disposición moral hiperbólica: el amor ''incluso querría dar vida a los muertos'' y ''llamar de vuelta'' a los condenados.'
  alternative_readings:
  - Lenguaje literal de resurrección
  - Aplanar a 'el amor intenta ayudar a todos'
  rationale: El griego usa retórica testamentaria viva. La traducción preserva la imagen fuerte permitiendo que el lector la oiga como hipérbole ética en contexto.
translation_notes:
  revision_awareness: 'El POB inglés tuvo dos pasadas de revisión: la primera ajustó frases (''commits lawlessness'', ''love of neighbor'', ''slanders him to his master''). El YAML conserva [a] tras ''yourselves'' y [c][b] tras ''longsuffering'' como ubicaciones heredadas; mi versión española respeta esa numeración (a, b, c) pero coloca cada marcador donde la frase específica del español lo requiere para mantener la asociación léxica clara: [a] tras ''guárdense'' (la nota sobre denuncia hostil), [b] tras ''lo calumnia ante su amo'' (frase aludida en la nota), y [c] tras ''asunto pequeño'' (la nota léxica de ''pusilanimidad'' se asocia mejor con la frase pequeñez/asunto pequeño en este flujo). Esto preserva las tres notas heredadas del POB.'
  spanish_consistency_notes:
  - '''odio'' para μῖσος como vicio gobernante'
  - '''esclavo'' para δοῦλος siguiendo la elección del POB en contextos de servidumbre explícita'
  - '''longanimidad'' / ''pusilanimidad'' como pareja léxica para μακροθυμία/ὀλιγοψυχία en literatura paranética'
  - '''iniquidad'' para ἀνομία conserva el término tradicional bíblico'
