base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/004.yaml
  text: Therefore guard yourselves[a], my children, from hatred, because it commits lawlessness even against the Lord himself. For it does not want to hear the words of his commandments concerning love of neighbor, and it sins against God. For if a brother falls, it is eager at once to report it to everyone, and it hastens that he may be judged and punished and die. And if it is some slave, it slanders him to his master, and in every distress it rejoices over him, if perhaps he may be put to death. For hatred works together with envy also against those who prosper; hearing of their success and seeing it, it is always weakened. Just as love would even make the dead alive and would call back those under sentence of death, so also hatred wants to kill the living, and it does not want those who have sinned in a small matter to live. For the spirit of hatred, through faintheartedness, works together with Satan in everything for the death of men; but the spirit of love, through longsuffering[c][b],
    works together with the law of God for the salvation of men.
  footnotes:
  - marker: a
    text: Or 'it informs on him to his master.' The Greek expression can suggest hostile denunciation before an authority.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'those who have sinned only a little' may also be rendered 'those who have sinned in a small matter.'
    reason: lexical_alternative
  - marker: c
    text: '''Faintheartedness'' translates a term that can also suggest smallness of soul, discouragement, or cowardice.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
