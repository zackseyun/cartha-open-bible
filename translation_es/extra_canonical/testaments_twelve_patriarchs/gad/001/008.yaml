  text: 8. *Καὶ ὑπὲρ τοῦτο ἐνεκότουν τῷ Ἰωσὴφ⁵⁷ Γἕως ἡμέρας διαπράσεως αὐτοῦ⁵⁸.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/001/008.yaml
  text: And beyond this I was angry with Joseph until the day of his being sold.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:45Z'
    unchanged: false
    changes_summary: 'Replaced the inaccurate draft with a complete rendering of the Greek: ἐνεκότουν means ''I was angry/resentful,'' τῷ Ἰωσὴφ is ''with Joseph,'' and ἕως ἡμέρας διαπράσεως αὐτοῦ is ''until the day of his being sold.'''
translation:
  language: es
  text: Y más allá de esto me enojé con José hasta el día en que fue vendido.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑπὲρ τοῦτο
  english_pob_choice: And beyond this
  chosen_spanish: Y más allá de esto
  alternatives_spanish:
  - Y aún más
  - Por encima de esto
  lexicon: LSJ
  rationale: ὑπέρ con acusativo aquí indica grado/intensificación; 'más allá de esto' lo conserva en español.
- source_word: ἐνεκότουν τῷ Ἰωσὴφ
  english_pob_choice: I was angry with Joseph
  chosen_spanish: me enojé con José
  alternatives_spanish:
  - guardé rencor a José
  - me resentí con José
  lexicon: LSJ
  rationale: El verbo conlleva resentimiento sostenido; 'me enojé' es legible y el contexto repetido preserva la intensidad.
- source_word: ἕως ἡμέρας διαπράσεως αὐτοῦ
  english_pob_choice: until the day of his being sold
  chosen_spanish: hasta el día en que fue vendido
  alternatives_spanish:
  - hasta el día de su venta
  lexicon: LSJ
  rationale: διαπράσεως subraya la transacción de venta; 'el día en que fue vendido' lo rinde con voz pasiva natural en español.
translation_notes:
  revision_awareness: El revision_pass POB reemplazó por completo el draft con esta traducción literal; el draft español sigue la versión revisada.
  spanish_consistency_notes:
  - 'Nota: este versículo y el v.7 son textualmente cercanos, ambos terminan con la misma referencia temporal pero con verbos griegos distintos (πρᾶσις vs διάπρασις).'
  - Nombre 'José' por consistencia.
