translation:
  language: es
  text: 'Confieso ahora mi pecado, hijos míos: muchas veces quise matarlo, porque lo odiaba de corazón.


    10. Y lo odié aún más por sus sueños; y quería borrarlo de la tierra[a], como un buey devora la hierba del campo.


    11. Por eso Judá y yo lo vendimos a los ismaelitas por treinta piezas de oro[b].


    12. Pero el Señor de nuestros padres no nos permitió actuar inicuamente con él, de modo que lo matáramos.


    13. Y ahora, hijos míos, les digo: ame cada uno a su hermano, y aparten el odio de sus corazones. Ámense unos a otros en hechos, en palabras y en la disposición del alma.


    14. Pues delante de mi padre yo hablaba pacíficamente con José, pero cuando había salido, el espíritu del odio oscurecía mi mente y agitaba mi alma para matarlo.


    15. Ámense unos a otros de corazón; y si alguno peca contra ti, háblale pacíficamente, y en tu alma no albergues engaño; y si confiesa y se arrepiente, perdónalo.


    16. Pero si lo niega, no te enardezcas con él, no sea que, recibiendo de él el veneno, jures y así peques doblemente.


    17. Que nadie escuche tus secretos cuando él esté en disputa contigo, no sea que te odie y se vuelva tu enemigo y cometa contra ti algún gran pecado; pues a menudo te habla con astucia, o se asocia contigo con un fin malvado.


    18. Y si lo niega y se avergüenza al ser reprendido, calla. Pues al negarlo se arrepiente, y ya no te hará mal; al contrario, te honrará y te respetará y estará en paz contigo.


    19. Pero si es desvergonzado y persiste en su mal hacer, aun así perdónalo de corazón, y deja la venganza a Dios.


    20. Si alguno se enriquece por medios injustos, no lo envidies; sino espera el fin señalado por el Señor.


    21. Pues si quita y devuelve el doble, no te perturbes; sé paciente hasta que el Señor ejecute juicio.


    22. Pues el pobre, si está libre de envidia, agrada al Señor en todas las cosas, y es bendito sobre todos los hombres, porque no tiene la fatiga de los hombres vanos.


    23. Por tanto, aparten la envidia de sus almas, y ámense unos a otros con rectitud de corazón.


    24. Cuenten estas cosas también a sus hijos, para que honren a Leví y a Judá; pues de ellos el Señor levantará salvación para Israel.


    25. Pues sé que al final se apartarán de él y caminarán inicuamente y harán violencia a Leví y pelearán contra Judá.


    26. Pero no prevalecerán contra ellos, porque un ángel del Señor los guía a ambos; pues por ellos Israel se mantendrá en pie.


    27. Y cuando se aparten del Señor, caminarán en toda obra mala y cometerán las abominaciones de las naciones, desviándose tras mujeres que practican la iniquidad, mientras que espíritus de maldad obran en ustedes con toda malicia.


    28. Pues he leído en el libro de Enoc el justo[c] que su príncipe es Satanás, y que todos los espíritus de la inmoralidad sexual y de la arrogancia atenderán a los hijos de Leví, para hacerlos pecar delante del Señor.


    29. Y mis hijos se acercarán a Leví y pecarán con ellos en todas las cosas; y los hijos de Judá serán codiciosos, saqueando los bienes de otros como leones.


    30. Por eso serán llevados con ellos al cautiverio, y allí recibirán todas las plagas de Egipto y todos los males de las naciones.


    31. Por tanto, cuando se vuelvan al Señor, actúen con rectitud y toda justicia, y obren misericordia y verdad cada uno con su prójimo.


    32. Y si se vuelven al Señor con rectitud de corazón, y apartan el odio y la iniquidad, y se aman unos a otros de corazón, entonces habrá paz para ustedes.


    33. Y ningún hijo de hombre podrá prevalecer contra ustedes, porque el Dios del cielo estará entre ustedes, haciendo paz para ustedes y para todo Israel.


    34. Y ningún enemigo se alegrará sobre ustedes; y toda fiera salvaje los temerá, y el Señor los bendecirá en toda obra y en toda palabra.


    35. Y ahora, hijos míos, teman al Señor Dios del cielo, y guárdense de Satanás y de sus espíritus.


    36. Acérquense a Dios y al ángel que intercede por ustedes, porque él es mediador entre Dios y los hombres por la paz de Israel.


    37. Él se levantará contra el reino del enemigo; por eso el enemigo se afana en destruir a todos los que invocan al Señor.


    38. Pues sabe que en el día en que Israel se arrepienta, el reino del enemigo será llevado a su fin.


    39. Pues el mismísimo ángel de paz fortalecerá a Israel, para que no caiga en el extremo del mal.


    40. Y en el tiempo de la iniquidad de Israel, el Señor no se apartará de ellos, sino que los transformará en una nación que hace su voluntad; pues ningún ángel es igual a él.


    41. Y su nombre estará en todo lugar de Israel y entre las naciones.


    42. Guárdense, pues, hijos míos, de toda obra inicua, y aparten de ustedes todo odio y mentira, y amen la verdad y la longanimidad.


    43. Y todo lo que hayan oído de su padre, transmítanlo a sus hijos, para que el Salvador de las naciones[d] los reciba; pues él es verdadero y longánime, manso y humilde, y enseña por sus obras la ley de Dios.


    44. Por tanto, apártense de toda injusticia y aférrense a la justicia de Dios, y su linaje será salvo para siempre.


    45. Y cuando les hubo ordenado estas cosas, les dijo que lo enterraran en Hebrón.


    46. Y se durmió un buen sueño, anciano y lleno de días.


    47. Y sus hijos hicieron como les había ordenado, y lo llevaron a Hebrón y lo enterraron con sus padres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas líneas de la sección narrativa de apertura presentan dificultades textuales en los testimonios griegos sobrevivientes; el sentido aborda la fuerza de Gad guardando el rebaño y el inicio de su resentimiento hacia José.
    reason: textual_variant
  - marker: b
    text: '''Treinta piezas de oro'' es la lectura de este testimonio; otras recensiones del relato de José hablan más comúnmente de veinte piezas.'
    reason: textual_variant
  - marker: c
    text: '''He leído en el libro de Enoc'' refleja la apelación del texto a la tradición enóquica como advertencia autoritativa.'
    reason: cross_reference
  - marker: d
    text: Las referencias finales al 'ángel que intercede,' al 'ángel de paz' y al 'Salvador de las naciones' pueden reflejar transmisión por capas. La traducción preserva el testimonio griego sin intentar armonizarlo.
    reason: alternative_reading
lexical_decisions:
- source_word: πνεῦμα τοῦ μίσους
  english_pob_choice: spirit of hatred
  chosen_spanish: espíritu del odio
  alternatives_spanish:
  - espíritu de odio
  lexicon: LSJ
  rationale: Vicio central del capítulo, rendido consistentemente como fuerza moral-espiritual.
- source_word: μετανοῇ
  english_pob_choice: repents
  chosen_spanish: se arrepiente
  alternatives_spanish:
  - cambia de mente
  - se vuelve
  lexicon: LSJ
  rationale: En contexto de pecado-perdón, la guía del proyecto prefiere 'arrepentirse' sobre el más cognitivo 'cambio de mente'.
- source_word: μακροθυμία
  english_pob_choice: longsuffering
  chosen_spanish: longanimidad
  alternatives_spanish:
  - paciencia
  - tolerancia
  lexicon: LSJ
  rationale: Conserva el registro ético elevado del testamento; 'longanimidad' empareja bien con misericordia y verdad.
- source_word: ἄγγελος τῆς εἰρήνης
  english_pob_choice: angel of peace
  chosen_spanish: ángel de paz
  alternatives_spanish:
  - mensajero de paz
  lexicon: LSJ
  rationale: El texto presenta un agente personal celestial; 'ángel' no debe desmitologizarse.
- source_word: μεσίτης
  english_pob_choice: mediator
  chosen_spanish: mediador
  alternatives_spanish:
  - intermediario
  - intercesor
  lexicon: LSJ
  rationale: Preserva el rol teológico formal descrito en el griego; 'intercede' se usa cerca para claridad explicativa.
- source_word: σωτήρ
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - libertador
  lexicon: LSJ
  rationale: El título carga peso teológico en la exhortación final; capitalizado como referencia titular.
- source_word: γένος
  english_pob_choice: race
  chosen_spanish: linaje
  alternatives_spanish:
  - raza
  - descendencia
  lexicon: LSJ
  rationale: '''Linaje'' preserva el lenguaje genealógico mejor que ''raza'' (que en español moderno tiene connotaciones problemáticas).'
- source_word: ἀνομία
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - transgresión
  - ilegalidad
  lexicon: LSJ
  rationale: '''Iniquidad'' es el término moral-apocalíptico estándar en español bíblico.'
- source_word: πορνεία
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - impureza sexual
  lexicon: LSJ
  rationale: '''Inmoralidad sexual'' es el rendido moderno claro; ''fornicación'' es más arcaico.'
- source_word: ὑπερηφανία
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - soberbia
  - altivez
  lexicon: LSJ
  rationale: '''Arrogancia'' es directo en español moderno; preserva el sentido del griego.'
- source_word: Σατανᾶς
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - Satán
  lexicon: LSJ
  rationale: '''Satanás'' es la forma estándar en español bíblico.'
- source_word: Ἑνώχ
  english_pob_choice: Enoch
  chosen_spanish: Enoc
  lexicon: LSJ
  rationale: Forma estándar del nombre en español bíblico.
theological_decisions:
- issue: Referencia a salvación futura que surge de Leví y Judá
  chosen_reading: Traducido como 'de ellos el Señor levantará salvación para Israel' sin especificar una identidad doctrinal posterior en el texto principal.
  alternative_readings:
  - Una referencia mesiánica enfocada solo en Judá
  - Una expectativa dual sacerdotal-real desde Leví y Judá
  - Una alusión cristianizada posterior a Cristo
  rationale: El griego nombra a Leví y a Judá. La traducción preserva la tensión textual y deja interpretación más completa a las notas en lugar de estrechar el sentido.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Angelología en la sección de cierre
  chosen_reading: 'Lenguaje de agente personal celestial retenido: ''ángel que intercede,'' ''mediador,'' y ''ángel de paz.'''
  alternative_readings:
  - Personificación simbólica de la providencia divina
  - Interpolación posterior a suavizar en la traducción
  rationale: El testimonio griego presenta estos como agentes personales activos. La transparencia requiere traducir el testimonio honestamente en lugar de reducirlo a metáfora.
- issue: Satanás como príncipe en la cita de Enoc
  chosen_reading: 'Traducido explícitamente: ''su príncipe es Satanás.'''
  alternative_readings:
  - su gobernante es el adversario
  - un poder demoníaco los gobierna
  rationale: El capítulo invoca explícitamente la tradición enóquica y nombra a Satanás. La traducción preserva la cosmovisión apocalíptica del texto.
- issue: Título de cierre potencialmente cristiano 'Salvador de las naciones'
  chosen_reading: Mantenida la frase tal como está escrita en el testimonio griego sin armonizar ni suprimir.
  alternative_readings:
  - libertador de las naciones
  - posible expansión cristiana secundaria
  rationale: La frase puede reflejar expansión posterior, pero la tarea del traductor es rendir el griego existente honestamente y señalar la cuestión en una nota en lugar de enmendar silenciosamente.
translation_notes:
  revision_awareness: Esta entrada se restauró tras un truncado por revision_pass; representa el contenido completo del capítulo embebido en este verso (probablemente por error del split tool). El draft español refleja la lectura completa restaurada.
  spanish_consistency_notes:
  - μῖσος como 'odio' a lo largo de todo el capítulo.
  - δικαιοσύνη como 'justicia'.
  - Κύριος como 'Señor', θεός como 'Dios'.
  - ἄγγελος como 'ángel' sin desmitologizar.
  - μετανοέω como 'arrepentirse' en contexto de pecado.
  - μακροθυμία como 'longanimidad' (cierre testamentario).
  - Σατανᾶς como 'Satanás', Ἑνώχ como 'Enoc'.
  - γένος como 'linaje' en lugar de 'raza' por consideraciones modernas.
  - Hebrón con tilde.
