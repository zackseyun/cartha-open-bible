translation:
  language: es
  text: Yo, pues, guardaba el rebaño de noche; y cuando venía un león, o el lobo, o cualquier fiera contra el rebaño, lo perseguía, y cuando lo alcanzaba, le sujetaba el pie con mi mano, y lo lanzaba a la distancia de un tiro de piedra, y así lo mataba.
  philosophy: optimal-equivalence
