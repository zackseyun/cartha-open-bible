  english_pob_choice: And when I caught up with it
  chosen_spanish: Y cuando lo alcanzaba
  alternatives_spanish:
  - Y al alcanzarlo
  lexicon: LSJ
  rationale: Sigue el revision_pass POB que prefirió la cláusula temporal 'when I caught up' sobre el participio. 'Alcanzar' es el rendido natural de φθάνω en este contexto.
- source_word: ἐκράτουν τὸν πόδα αὐτοῦ
  english_pob_choice: I would seize its foot
  chosen_spanish: le sujetaba el pie
  alternatives_spanish:
  - le aferraba el pie
  - le agarraba el pie
  lexicon: LSJ
  rationale: Sigue el revision_pass POB que prefirió 'seize' sobre 'grab' por mayor formalidad y literalidad; 'sujetar' rinde la fuerza de κρατέω en español neutro.
