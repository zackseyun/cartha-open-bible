base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/001/001.yaml
  text: 'The copy of the words of Gad, what things he spoke to his sons in the hundred and twenty-fifth year of his life, saying to them:

    2. Listen to the words of truth, my children, and practice righteousness and all the law of the Most High. Do not go astray after the spirit of hatred, for it is evil in all the deeds of men.

    3. Whatever a man hates, that he does not want to see or hear. If anyone speaks of the Lord, he hates him as one who reproves him. If anyone prospers, he envies him. If anyone is rich, he is not pleased with it. If anyone is brave, he praises him not. He slanders a truthful man, he begrudges a successful man, and he loves the arrogant and the lawless. For hatred blinds his soul, as I also saw concerning Joseph.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:40Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Copia de las palabras de Gad, las cosas que habló a sus hijos en el año ciento veinticinco de su vida, diciéndoles:


    2. Escuchen las palabras de la verdad, hijos míos, y practiquen la justicia y toda la ley del Altísimo. No se desvíen tras el espíritu del odio, porque es maligno en todas las obras de los hombres.


    3. Lo que un hombre odia, eso no quiere verlo ni oírlo. Si alguno habla del Señor, lo odia como a quien lo reprende. Si alguno prospera, lo envidia. Si alguno es rico, no se complace en ello. Si alguno es valiente, no lo alaba. Calumnia al hombre veraz, le rehúsa lo bueno al hombre exitoso, y ama al arrogante y al inicuo[a]. Pues el odio ciega su alma, como yo también vi respecto de José.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas líneas en la sección narrativa de apertura presentan dificultades textuales en los testimonios griegos sobrevivientes; el sentido se refiere a la fuerza de Gad guardando el rebaño y al inicio de su resentimiento hacia José.
    reason: textual_variant
lexical_decisions:
- source_word: Ἀντίγραφον διαθήκης
  english_pob_choice: The copy of the words
  chosen_spanish: Copia de las palabras
  alternatives_spanish:
  - Copia del testamento
  - Transcripción de las palabras
  lexicon: LSJ
  rationale: Sigue el rendido POB que opta por 'words' donde διαθήκη técnicamente sería 'testamento/pacto'; conserva la formulación de apertura.
- source_word: πνεῦμα τοῦ μίσους
  english_pob_choice: spirit of hatred
  chosen_spanish: espíritu del odio
  alternatives_spanish:
  - espíritu de odio
  lexicon: LSJ
  rationale: Término clave del capítulo; rendido consistentemente para preservar la advertencia temática de Gad contra una fuerza moral-espiritual dominante.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - integridad
  lexicon: LSJ
  rationale: Rendido por defecto del proyecto; en contextos exhortativos lleva fuerza moral-covenantal más amplia que la mera justicia forense.
- source_word: νόμος
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  lexicon: LSJ
  rationale: La parénesis testamentaria evoca lenguaje de obediencia covenantal judía; 'ley' preserva ese registro.
- source_word: Ὑψίστου
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  lexicon: LSJ
  rationale: Título divino estándar en español bíblico.
- source_word: ἐλέγχοντα
  english_pob_choice: as one who reproves him
  chosen_spanish: como a quien lo reprende
  alternatives_spanish:
  - como a un acusador
  - como a quien lo expone
  lexicon: LSJ
  rationale: '''Reprender'' captura el sentido moral-confrontativo del verbo griego.'
translation_notes:
  revision_awareness: Versículo no requirió cambios en el revision_pass POB; el draft español sigue la versión revisada como ancla.
