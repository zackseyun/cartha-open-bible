- source_word: παρὰ γνώμην
  english_pob_choice: apart from
  chosen_spanish: aparte de
  alternatives_spanish:
  - sin contar con
  - en contra del parecer de
  lexicon: LSJ
  rationale: παρὰ γνώμην puede significar 'contra el parecer/opinión de' o 'aparte de'; 'aparte de' sigue el rendido POB.
