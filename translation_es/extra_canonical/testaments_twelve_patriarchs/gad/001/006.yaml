lexical_decisions:
- source_word: εἶπεν Ἰωσὴφ τῷ πατρὶ ἡμῶν
  english_pob_choice: Joseph told our father
  chosen_spanish: José le dijo a nuestro padre
  alternatives_spanish:
  - José contó a nuestro padre
  lexicon: LSJ
  rationale: '''Decir'' es el verbo natural y directo; el dativo griego se vierte como ''a nuestro padre'' en español.'
- source_word: θύουσι τὰ θρέμματα τὰ καλὰ
