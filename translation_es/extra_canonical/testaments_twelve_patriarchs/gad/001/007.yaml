  text: 7. *Ἦν γὰρ ἰδὼν⁴⁶ ὅτι ἀρνα⁴⁷ ἐξειλάμην⁴⁸ *ἐκ τοῦ⁴⁹ στόματος τῆς⁵⁰ ἄρκου, κἀκείνην⁵¹ ἐθανάτωσα, *τὸν δὲ⁵² ἀρνὸν ἔθυσα· *περὶ οὗ ἐλυπούμην⁵³, ὅτι οὐκ *ἠδύνατο ζῆν⁵⁴, καὶ⁵⁵ ἐφάγομεν αὐτόν⁵⁶.
