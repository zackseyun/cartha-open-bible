base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/001/007.yaml
  text: And because of this I was angry with Joseph until the day of his sale.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Adjusted the final clause to more closely reflect ἡμέρας πράσεως αὐτοῦ as ‘the day of his sale’ and removed the unnecessary comma after ‘this’ for a tighter rendering.
translation:
  language: es
  text: Y por causa de esto me enojé con José hasta el día de su venta.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑπὲρ τοῦτο ἐνεκότουν
  english_pob_choice: because of this I was angry
  chosen_spanish: por causa de esto me enojé
  alternatives_spanish:
  - a causa de esto guardé rencor
  - por esto me resentí
  lexicon: LSJ
  rationale: ἐνκοτέω implica resentimiento sostenido; 'me enojé' es legible mientras el contexto de odio repetido preserva la intensidad.
- source_word: Ἰωσὴφ
  english_pob_choice: Joseph
  chosen_spanish: José
  lexicon: LSJ
  rationale: Forma estándar del nombre en español bíblico.
- source_word: ἕως ἡμέρας πράσεως αὐτοῦ
  english_pob_choice: until the day of his sale
  chosen_spanish: hasta el día de su venta
  alternatives_spanish:
  - hasta el día en que fue vendido
  - hasta el día de su trato comercial
  lexicon: LSJ
  rationale: Sigue el revision_pass POB que ajustó 'until the day he was sold' a 'until the day of his sale' por mayor literalidad al sustantivo πρᾶσις.
translation_notes:
  revision_awareness: El revision_pass POB ajustó la cláusula final para reflejar más cercanamente el sustantivo griego πρᾶσις 'venta'; el draft español sigue la versión revisada.
  spanish_consistency_notes:
  - Nombre 'José' por consistencia.
