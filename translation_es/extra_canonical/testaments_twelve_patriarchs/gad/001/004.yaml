translation:
  language: es
  text: Así que José mi hermano pastoreaba con nosotros todo el ganado por treinta días, y siendo joven, fue debilitado por el calor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐποίμαινε μεθ’ ἡμῶν
  english_pob_choice: was shepherding all the livestock with us
  chosen_spanish: pastoreaba con nosotros todo el ganado
  alternatives_spanish:
  - apacentaba con nosotros el ganado
  - pastoreaba con nosotros los rebaños
  lexicon: LSJ
  rationale: '''Pastorear'' es el verbo natural en español neutro latinoamericano; ''apacentar'' es más arcaico/Reina-Valera.'
- source_word: ἕως ἡμέρας τριάκοντα
  english_pob_choice: for thirty days
  chosen_spanish: por treinta días
  alternatives_spanish:
  - durante treinta días
  lexicon: LSJ
  rationale: '''Por treinta días'' es el modismo natural en español neutro para duración.'
- source_word: ὑπάρχων νέος
  english_pob_choice: being young
  chosen_spanish: siendo joven
  alternatives_spanish:
  - por ser joven
  lexicon: LSJ
  rationale: Participio causal-circunstancial; 'siendo' lo conserva en español natural.
- source_word: ἐμαλακίσθη ὑπὸ τοῦ καύσωνος
  english_pob_choice: was weakened by the heat
  chosen_spanish: fue debilitado por el calor
  alternatives_spanish:
  - se debilitó por el calor
  - desfalleció por el calor
  lexicon: LSJ
  rationale: Voz pasiva conservada; 'debilitado por el calor' refleja la juventud de José ante el sol.
