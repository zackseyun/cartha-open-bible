lexical_decisions:
- source_word: ἐκτείνας τοὺς πόδας αὐτοῦ
  english_pob_choice: stretched out his feet
  chosen_spanish: extendió sus pies
  alternatives_spanish:
  - estiró sus pies
  - tendió sus pies
  lexicon: LSJ
  rationale: Traducción directa del modismo bíblico que describe la postura final antes de morir, manteniendo la imagen concreta del original.
- source_word: ἐκοιμήθη ὕπνῳ καλῷ
  english_pob_choice: fell asleep in a good sleep
  chosen_spanish: se durmió en un buen sueño
  alternatives_spanish:
  - se quedó dormido en un sueño bueno
  - durmió un sueño apacible
  lexicon: BDAG
  rationale: ἐκοιμήθη es eufemismo de morir; 'durmió' preserva el doble sentido del griego, evitando explicitar 'murió' como hace el original.
translation_notes:
