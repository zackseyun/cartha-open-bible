translation:
  language: es
  text: Y ellos regresaron de la tierra de Canaán[c], y vivieron en Egipto hasta el día de su salida de la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: c
    text: La frase 'junto a los pies de sus padres' (en 12:3) es griego literal y puede referirse a la ubicación del entierro cerca de las tumbas ancestrales más que directamente a los pies de los padres.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέστρεψαν
  english_pob_choice: returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - retornaron
  lexicon: BDAG
  rationale: ἐπιστρέφω en sentido geográfico es 'regresar/volver'; 'regresaron' fluye natural en español moderno.
- source_word: ᾤκησαν
  english_pob_choice: lived
  chosen_spanish: vivieron
  alternatives_spanish:
  - habitaron
  - moraron
  lexicon: BDAG
  rationale: οἰκέω implica residir/habitar; 'vivieron' es la forma castellana más natural sin perder el sentido de morada estable.
- source_word: ἕως ἡμέρας ἐξόδου αὐτῶν
  english_pob_choice: until the day of their departure
  chosen_spanish: hasta el día de su salida
  alternatives_spanish:
  - hasta el día de su éxodo
  - hasta el día en que salieron
  lexicon: BDAG
  rationale: Mantiene 'salida' coherente con el verso anterior (12:3) donde se tradujo ἔξοδος como 'salida'; preserva la consistencia léxica intrachapter.
translation_notes:
  revision_awareness: El POB inglés no requirió cambios en revisión para este verso; el español sigue la rendición revisada del capítulo.
  spanish_consistency_notes:
  - ἔξοδος → salida (consistente con 12:3)
  - ἐπιστρέφω → regresar (sentido geográfico)
