base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/012/002.yaml
  text: 'And his sons did as he had commanded them, and they carried his body and buried him in Hebron with his fathers.


    And when he had finished his words, he said, “I command you, my children, carry my bones up out of Egypt, and bury me in Hebron near my fathers.”

    And Benjamin died at one hundred and twenty-five years, in a good old age; and they placed him in a coffin.'
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: Removed the unsupported line about the number of his life and kept the burial and death statements only. Preserved the command to carry his bones up out of Egypt and bury him in Hebron near his fathers.
translation:
  language: es
  text: "Y sus hijos hicieron como él les había mandado, y tomaron su cuerpo y lo sepultaron en Hebrón con sus padres.\n\n\n    Y cuando hubo terminado sus palabras, dijo: \"Les ordeno, hijos míos, que lleven mis huesos de Egipto y me sepulten en Hebrón cerca de mis padres.\"\n\n\n    Y murió Benjamín a los ciento veinticinco años, en buena vejez; y lo pusieron en un féretro."
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄραντες τὸ σῶμα αὐτοῦ
  english_pob_choice: carried his body
  chosen_spanish: tomaron su cuerpo
  alternatives_spanish:
  - levantaron su cuerpo
  - alzaron su cuerpo
  lexicon: LSJ
  rationale: αἴρω abarca tomar/levantar/llevar; 'tomaron' fluye más naturalmente en castellano para esta acción funeraria.
- source_word: ἔθαψαν
  english_pob_choice: buried
  chosen_spanish: sepultaron
  alternatives_spanish:
  - enterraron
  lexicon: BDAG
  rationale: '''Sepultar'' tiene resonancia bíblica más solemne que ''enterrar'' en español, apropiada para narrativa patriarcal.'
- source_word: ἀνενέγκατε τὰ ὀστᾶ μου
  english_pob_choice: carry my bones up
  chosen_spanish: llevéis mis huesos
  alternatives_spanish:
  - subáis mis huesos
  - trasladéis mis huesos
  lexicon: BDAG
  rationale: ἀναφέρω implica llevar hacia arriba; 'llevéis' es lo natural en castellano sin perder la imagen del traslado patriarcal.
- source_word: ἐν γήρει καλῷ
  english_pob_choice: in a good old age
  chosen_spanish: en buena vejez
  alternatives_spanish:
  - en hermosa vejez
  - en próspera vejez
  lexicon: LSJ
  rationale: Modismo bíblico estándar; 'en buena vejez' es la fórmula tradicional castellana para esta expresión.
- source_word: ἐν παραθήκῃ
  english_pob_choice: in a coffin
  chosen_spanish: en un féretro
  alternatives_spanish:
  - en un ataúd
  - en un cofre funerario
  lexicon: LSJ
  rationale: παραθήκη designa un depósito o receptáculo; 'féretro' captura el sentido funerario formal apropiado al contexto patriarcal.
translation_notes:
  revision_awareness: El POB inglés removió en revisión la línea sobre 'el número de su vida fue ciento veinticinco años' por no estar atestiguada en el griego principal; el español sigue la versión revisada.
  spanish_consistency_notes:
  - θάπτω → sepultar (resonancia bíblica solemne)
  - ὀστᾶ → huesos (traslado patriarcal)
  - γῆρας καλόν → buena vejez (fórmula bíblica establecida)
