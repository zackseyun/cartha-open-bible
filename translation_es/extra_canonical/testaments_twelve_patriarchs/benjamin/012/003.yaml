source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: Καὶ¹⁸ ἐνενηκοστῷ¹⁹ πρώτῳ²⁰ ἔτει ⌜τῆς²¹ †ἐξόδου²² τῶν υἱῶν Ἰσραὴλ †ἐξ Αἰγύπτου²³⌝, *αὐτοὶ καὶ οἱ ἀδελφοὶ αὐτῶν²⁴ ἀνήγαγον τὰ ὀστᾶ τῶν πατέρων²⁵ αὐτῶν ἐν κρυφῇ *ἐν τῷ πολέμῳ Χαναάν²⁶, καὶ ἔθαψαν αὐτοὺς²⁷ ἐν Χεβρών²⁸ *παρὰ τοὺς πόδας²⁹ τῶν πατέρων αὐτῶν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/012/003.yaml
  text: And in the ninety-first year after the departure of the sons of Israel from Egypt, they and their brothers brought up the bones of their fathers secretly in the war in Canaan, and buried them in Hebron beside the feet of their fathers.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: Removed the extra paraphrastic 'during' to better reflect the source phrase 'in the war in Canaan' while keeping the rest of the draft unchanged.
translation:
  language: es
  text: Y en el año noventa y uno después de la salida de los hijos de Israel de Egipto, ellos y sus hermanos subieron en secreto los huesos de sus padres en la guerra en Canaán, y los sepultaron en Hebrón junto a los pies de sus padres.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐνενηκοστῷ πρώτῳ ἔτει
  english_pob_choice: in the ninety-first year
  chosen_spanish: en el año noventa y uno
  alternatives_spanish:
  - en el nonagésimo primer año
  lexicon: LSJ
  rationale: '''Año noventa y uno'' es la formulación más natural en español moderno; el ordinal ''nonagésimo primer'' resulta arcaizante.'
- source_word: ἐξόδου
  english_pob_choice: departure
  chosen_spanish: salida
  alternatives_spanish:
  - éxodo
  - partida
  lexicon: BDAG
  rationale: ἔξοδος designa el acto de salir; 'salida' es término natural y evita la sobreidentificación con el libro canónico cuando el contexto es narrativo.
- source_word: ἀνήγαγον τὰ ὀστᾶ
  english_pob_choice: brought up the bones
  chosen_spanish: subieron... los huesos
  alternatives_spanish:
  - llevaron... los huesos
  - trasladaron... los huesos
  lexicon: BDAG
  rationale: ἀνάγω contiene la idea de subir/llevar hacia arriba (de Egipto a Canaán); 'subieron' preserva la dirección geográfica del traslado.
- source_word: ἐν κρυφῇ
  english_pob_choice: secretly
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - ocultamente
  lexicon: LSJ
  rationale: Modismo natural en castellano; preserva el carácter clandestino de la operación durante la guerra.
- source_word: ἐν τῷ πολέμῳ Χαναάν
  english_pob_choice: in the war in Canaan
  chosen_spanish: en la guerra en Canaán
  alternatives_spanish:
  - durante la guerra en Canaán
  lexicon: LSJ
  rationale: Sigue la revisión del POB que removió 'durante' parafrástico para reflejar mejor 'en la guerra' del griego.
- source_word: παρὰ τοὺς πόδας τῶν πατέρων αὐτῶν
  english_pob_choice: beside the feet of their fathers
  chosen_spanish: junto a los pies de sus padres
  alternatives_spanish:
  - a los pies de sus padres
  - al lado de los pies de sus padres
  lexicon: LSJ
  rationale: Preserva la imagen concreta del entierro patriarcal junto a los antepasados; 'junto a' refleja παρὰ con dativo en su sentido espacial.
translation_notes:
  revision_awareness: El POB inglés en revisión removió el 'durante' parafrástico para acercarse más al griego 'en la guerra'. La traducción española sigue la versión revisada.
  spanish_consistency_notes:
  - ἔξοδος → salida (no 'éxodo' por contexto narrativo)
  - ἀνάγω → subir (preserva la dirección geográfica del retorno desde Egipto)
