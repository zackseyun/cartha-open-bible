base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/011.yaml
  text: '1 No longer shall I be called a ravening wolf because of your ravaging[a], but a worker of the Lord, distributing food to those who do what is good.

    2 And in the last times there shall arise from my seed one beloved of the Lord, hearing his voice and doing the good pleasure of his will, enlightening all the nations with new knowledge, coming upon Israel in salvation, and snatching away from them like a wolf, and giving to the assembly of the nations.

    3 Until the consummation of the age he shall be in the assemblies of the nations and among their rulers, like a musical strain in the mouth of all.

    4 And in holy books he shall be recorded, both his work and his word; and he shall be God''s chosen one forever.

    5 And through them he shall visit as Jacob my father, saying[e][d][c][b], “He will fill up what is lacking in your tribe.”'
  footnotes:
  - marker: a
    text: The Greek of this chapter is textually difficult, especially in verse 2, where the witness appears expanded and partially duplicated. The translation follows the extant Greek while preserving its ambiguities.
    reason: textual_variant
  - marker: b
    text: Or 'intervening in Israel with salvation' for 'entering upon Israel in salvation.'
    reason: lexical_alternative
  - marker: c
    text: Or 'assembly of the nations' for 'gathering of the nations.'
    reason: lexical_alternative
  - marker: d
    text: '''Until the consummation of the age'' may also be rendered ''until the end of the age.'''
    reason: lexical_alternative
  - marker: e
    text: The final line is obscure. 'Through him he shall pass through again as Jacob my father' may reflect a promise of renewed visitation or representation through the future figure.
    reason: textual_variant
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: testaments_draft_v1
