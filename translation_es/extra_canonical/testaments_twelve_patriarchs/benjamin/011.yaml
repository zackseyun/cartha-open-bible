    changes_summary: 'Adjusted several phrases for closer lexical accuracy: ''those who labor in what is good'' to ''those who do what is good'' (ἐργαζομένοις τὸ ἀγαθόν), ''entering upon'' to ''coming upon'' (ἐπεμβαίνων), ''gathering'' to ''assembly'' (συναγωγή), and ''through him ... pass through again'' to ''through them ... visit'' (δι᾽ αὐτῶν φοιτήσει). Kept the overall structure and formal register.'
translation:
  language: es
  text: "1 Ya no seré llamado lobo rapaz por causa de los saqueos de ustedes[a], sino obrero del Señor, que reparte alimento a los que hacen el bien.\n\n\n    2 Y en los últimos tiempos se levantará de mi simiente uno amado del Señor, que escucha su voz y hace su buena voluntad, iluminando a todas las naciones con un conocimiento nuevo, viniendo sobre Israel para salvación[b], y arrebatando de en medio de ellos como un lobo, y dándolo a la asamblea de las naciones[c].\n\n\n    3 Hasta la consumación del siglo[d] estará en las asambleas de las naciones y entre sus gobernantes, como una melodía musical en la boca de todos.\n\n\n    4 Y será inscrito en libros sagrados, tanto su obra como su palabra; y será el escogido de Dios para siempre.\n\n\n    5 Y por medio de ellos él visitará, como Jacob mi padre[e], diciendo: \"Él suplirá lo que falta a tu tribu.\""
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de este capítulo es textualmente difícil, especialmente en el v. 2, donde el testimonio aparece expandido y parcialmente duplicado. La traducción sigue el griego existente preservando sus ambigüedades.
    reason: textual_variant
  - marker: b
    text: O 'interviniendo en Israel con salvación' en lugar de 'viniendo sobre Israel para salvación.'
    reason: lexical_alternative
  - marker: c
    text: O 'reunión de las naciones' en lugar de 'asamblea de las naciones.'
    reason: lexical_alternative
  - marker: d
    text: '''La consumación del siglo'' también puede traducirse como ''el fin de la era.'''
    reason: lexical_alternative
  - marker: e
    text: La línea final es oscura. 'Por medio de él pasará de nuevo como Jacob mi padre' puede reflejar una promesa de visitación o representación renovada por medio de la figura futura.
    reason: textual_variant
lexical_decisions:
- source_word: λύκος ἅρπαξ
  english_pob_choice: ravening wolf
  chosen_spanish: lobo rapaz
  alternatives_spanish:
  - lobo voraz
  - lobo que arrebata
  lexicon: LSJ
  rationale: Conserva la imagen testamentaria viva y la fuerza depredadora de ἅρπαξ; 'rapaz' es término natural en español para describir al lobo predador.
- source_word: ἁρπαγάς
  english_pob_choice: ravaging
  chosen_spanish: saqueos
  alternatives_spanish:
  - rapiñas
  - actos de rapiña
  lexicon: LSJ
  rationale: Mantiene el juego con λύκος ἅρπαξ y comunica la toma destructiva.
- source_word: ἐργάτης Κυρίου
  english_pob_choice: worker of the Lord
  chosen_spanish: obrero del Señor
  alternatives_spanish:
  - trabajador del Señor
  - siervo laborioso del Señor
  lexicon: BDAG
  rationale: ἐργάτης designa específicamente a quien labora; 'obrero' preserva el contraste concreto con la imagen anterior del lobo.
- source_word: διαδιδούς τροφήν
  english_pob_choice: distributing food
  chosen_spanish: que reparte alimento
  alternatives_spanish:
  - distribuyendo comida
  - repartiendo sustento
  lexicon: LSJ
  rationale: Traducción directa que preserva la inversión benéfica activa de la imagen depredadora previa.
- source_word: ἀγαπητὸς Κυρίου
  english_pob_choice: beloved of the Lord
  chosen_spanish: amado del Señor
  alternatives_spanish:
  - el amado del Señor
  lexicon: BDAG
  rationale: Rendición estable y elevada apropiada a la dicción profético-testamentaria.
- source_word: ἐν ὑστέροις καιροῖς
  english_pob_choice: in the last times
  chosen_spanish: en los últimos tiempos
  alternatives_spanish:
  - en tiempos postreros
  - en los días postreros
  lexicon: LSJ
  rationale: Conserva la coloración escatológica sin importar formulaciones canónicas demasiado fijas.
- source_word: γνῶσιν καινήν φωτίζων πάντα τὰ ἔθνη
  english_pob_choice: enlightening all the nations with new knowledge
  chosen_spanish: iluminando a todas las naciones con un conocimiento nuevo
  alternatives_spanish:
  - dando luz de conocimiento nuevo a todas las naciones
  lexicon: BDAG
  rationale: Mantiene tanto la metáfora de iluminación como el objeto 'conocimiento nuevo'; 'naciones' encaja con ἔθνη en este contexto testamentario judío.
- source_word: ἐπεμβαίνων τὸν Ἰσραὴλ ἐν σωτηρίᾳ
  english_pob_choice: coming upon Israel in salvation
  chosen_spanish: viniendo sobre Israel para salvación
  alternatives_spanish:
  - interviniendo en Israel con salvación
  - acercándose a Israel para la salvación
  lexicon: LSJ
  rationale: El griego es difícil; esta traducción se mantiene cerca de la imagen verbal de aproximación/intervención preservando el motivo de salvación.
- source_word: ἁρπάζων ὡς λύκος ἀπ᾽ αὐτῶν
  english_pob_choice: snatching away from them like a wolf
  chosen_spanish: arrebatando de en medio de ellos como un lobo
  alternatives_spanish:
  - llevándose de ellos como un lobo
  lexicon: BDAG
  rationale: Preserva el símil renovado del lobo y la fuerza de ἁρπάζω; el objeto queda implícito como en el griego.
- source_word: συναγωγῇ τῶν ἐθνῶν
  english_pob_choice: the assembly of the nations
  chosen_spanish: la asamblea de las naciones
  alternatives_spanish:
  - la congregación de las naciones
  - la reunión de los gentiles
  lexicon: LSJ
  rationale: Evita resonancia eclesial excesiva preservando el sentido colectivo de συναγωγή.
- source_word: συντελείας τοῦ αἰῶνος
  english_pob_choice: the consummation of the age
  chosen_spanish: la consumación del siglo
  alternatives_spanish:
  - el fin del siglo
  - el final de la era
  lexicon: BDAG
  rationale: Rendición elevada natural que preserva la fuerza escatológica.
- source_word: μουσικὸν μέλος
  english_pob_choice: a musical strain
  chosen_spanish: una melodía musical
  alternatives_spanish:
  - un canto
  - una tonada
  lexicon: LSJ
  rationale: Captura la comparación poética y el sentido de algo placentero en boca de todos.
- source_word: ἐκλεκτὸς Θεοῦ
  english_pob_choice: God's chosen one
  chosen_spanish: el escogido de Dios
  alternatives_spanish:
  - el elegido de Dios
  lexicon: BDAG
  rationale: Castellano legible moderno que retiene el peso teológico.
- source_word: φοιτήσει
  english_pob_choice: he shall visit
  chosen_spanish: él visitará
  alternatives_spanish:
  - pasará de nuevo
  - aparecerá
  lexicon: LSJ
  rationale: El verbo puede denotar venir/visitar; siguiendo la revisión del POB hacia 'visit'.
- source_word: ἀναπληρώσει τὰ ὑστερήματα
  english_pob_choice: he will fill up what is lacking
  chosen_spanish: Él suplirá lo que falta
  alternatives_spanish:
  - completará las deficiencias
  - llenará las carencias
  lexicon: BDAG
  rationale: Preserva el modismo de suplir deficiencia sin sobreinterpretar la falta exacta en vista.
theological_decisions:
- issue: Figura mesiánico/profética en vv. 2-5 en medio de redacción textualmente expandida
  chosen_reading: Traducir el testimonio griego refiriéndose a una figura futura que surge de la simiente de Benjamín, preservando los rasgos exaltados y posiblemente interpolados en notas en lugar de suprimirlos.
  alternative_readings:
  - Un líder puramente tribal de Benjamín
  - Un retrato mesiánico cristianizado posterior
  rationale: El texto griego es textualmente complejo y probablemente expandido, pero la traducción debe representar honestamente el testimonio existente. El lenguaje de iluminar las naciones y fama duradera se conserva sin armonizar con fórmulas canónicas posteriores.
  doctrine_reference: DOCTRINE.md §Preservar la tensión teológica en lugar de resolverla
- issue: ἔθνη en este capítulo
  chosen_reading: Traducir como 'naciones' en el texto principal.
  alternative_readings:
  - gentiles
  rationale: En este contexto testamentario judío, 'naciones' preserva el sentido colectivo más amplio y evita estrechar prematuramente el término al contraste cristiano posterior.
translation_notes:
  revision_awareness: 'El POB inglés pasó por una revisión que ajustó varias frases a una mayor precisión léxica: ''aquellos que laboran en lo bueno'' a ''los que hacen el bien'', ''entering upon'' a ''coming upon'', ''gathering'' a ''assembly'', y ''a través de él... pasar de nuevo'' a ''a través de ellos... visitar''. La versión española refleja la rendición revisada.'
  spanish_consistency_notes:
  - ἔθνη → naciones (mantiene el sentido colectivo amplio testamentario)
  - συναγωγή → asamblea/asambleas (evita resonancia sinagogal en contexto no judío)
  - ἁρπάζω/ἅρπαξ → arrebatar/rapaz (mantiene cohesión con la imagen del lobo)
