  text: IX. Λέγω δὲ ὑμῖν καὶ πράξεις ἀπὸ λογίων Ἐνὼχ τοῦ δικαίου, *ὅτι πορνεύ(σ)ετε¹ πορνείαν Σοδόμων καὶ ἀπολε(ῖ)σθε ἕως βραχύ. Καὶ πάλιν ἀνανεωθήσεσθε καὶ ἡ βασιλεία Κυρίου οὐκ ἔσται ἐν ὑμῖν. 2. Πλὴν ἐν μερίδι ὑμῶν γενήσεται *ναὸς Θεοῦ¹⁴, καὶ *ἔσται ὁ ἔσχατος ἔνδοξος¹⁵ *ὑπὲρ τὸν πρῶτον¹⁶, καὶ *συναχθήσονται ἐκεῖ¹⁷ αἱ¹⁸ δώδεκα φυλαί, καὶ πάντα τὰ ἔθνη ἕως οὗ ὁ ὕψιστος ἀποστείλῃ¹⁹ τὸ σωτήριον αὐτοῦ²⁰ ἐν ἐπισκοπῇ μονογενοῦς προφήτου²¹. [3. Καὶ εἰσελεύσεται εἰς τὸν πρῶτον ναόν, καὶ ἐκεῖ Κύριος ὑβρισθήσεται²² *καὶ ἐπὶ ξύλου ὑψωθήσεται²³. 4. Καὶ ἔσται τὸ ἅπλωμα τοῦ ναοῦ σχιζόμενον²⁴ καὶ μεταβήσεται²⁵ τὸ πνεῦμα τοῦ Θεοῦ ἐπὶ τὰ ἔθνη, ὥσπερ²⁶ πῦρ ἐκχυνόμενον. 5. Καὶ ἀνελθὼν ἐκ τοῦ ᾅδου²⁷ ἔσται²⁸ μεταβαίνων²⁹ ἀπὸ³⁰ τῆς³¹ γῆς πρὸς³² οὐρανόν³³. Ἔγνων³⁴ δὲ οἷος ἔσται³⁵ ταπεινὸς ἐπὶ³⁵ γῆς, καὶ οἷος ἔνδοξος *ἐν οὐρανῷ³⁶].
