base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/009.yaml
  text: '1[a]. And I tell you also, from the words of Enoch the righteous, that you will commit the fornication of Sodom, and you will perish for a little while. Then you will be renewed again[b], and the kingdom of the Lord will not be among you. 2. Nevertheless, in your allotted portion there will be the temple of God, and the last will be more glorious than the first; and there the twelve tribes will be gathered, and all the nations, until the Most High sends his salvation in the visitation of an only-begotten prophet.


    3. And he will enter into the first temple, and there the Lord will be treated with outrage, and he will be lifted up on wood. 4. And the veil of the temple will be torn, and the Spirit of God will pass over to the nations, like fire being poured out. 5. And after going up from Hades, he will pass from earth to heaven. And I know how lowly he will be on earth[e][d][c], and how glorious in heaven.'
  footnotes:
  - marker: a
    text: Verses 3–5 are textually uncertain in the witness tradition and are often regarded as a later expansion; they are translated here because they stand in the supplied Greek text.
    reason: textual_variant
  - marker: b
    text: Or 'of a unique prophet' for 'of an only-begotten prophet.'
    reason: lexical_alternative
  - marker: c
    text: '''Lifted up on wood'' is a literal rendering of the Greek phrase; compare the idiom of being raised on a tree/wooden stake.'
    reason: lexical_alternative
  - marker: d
    text: '''Curtain-spread'' renders an unusual Greek term for a temple hanging; many readers may understand it as the temple veil.'
    reason: lexical_alternative
  - marker: e
    text: Hades is the realm of the dead, not necessarily the final place of punishment.
    reason: cultural_note
