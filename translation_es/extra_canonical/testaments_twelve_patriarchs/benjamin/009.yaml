translation:
  language: es
  text: '1[a]. Y os digo también, según las palabras de Enoc el justo, que cometeréis la fornicación de Sodoma y pereceréis por un poco de tiempo. Luego seréis renovados de nuevo[b], y el reino del Señor no estará entre vosotros. 2. Sin embargo, en vuestra porción asignada estará el templo de Dios, y el último será más glorioso que el primero; y allí serán reunidas las doce tribus, y todas las naciones, hasta que el Altísimo envíe su salvación en la visitación de un profeta unigénito.



    3. Y entrará en el primer templo, y allí el Señor será insultado, y será levantado sobre un madero[c]. 4. Y el velo[d] del templo será rasgado, y el Espíritu de Dios pasará a las naciones, como fuego derramado. 5. Y habiendo subido del Hades[e], pasará de la tierra al cielo. Y supe cuán humilde sería en la tierra, y cuán glorioso en el cielo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los versículos 3-5 son textualmente inciertos en la tradición de testigos y a menudo se consideran una expansión posterior; aquí se traducen porque figuran en el texto griego suministrado.
    reason: textual_variant
  - marker: b
    text: O 'de un profeta único' por μονογενοῦς προφήτου.
    reason: lexical_alternative
  - marker: c
    text: '''Levantado sobre un madero'' es traducción literal de la frase griega; comp. el modismo de ser alzado sobre un árbol o palo.'
    reason: lexical_alternative
  - marker: d
    text: ἅπλωμα es un término poco común para el lienzo del santuario; se traduce como 'velo' por convención bíblica española.
    reason: lexical_alternative
  - marker: e
    text: Hades es la región de los muertos, no necesariamente el lugar final de castigo.
    reason: cultural_note
lexical_decisions:
- source_word: πορνεύσετε / πορνείαν
  english_pob_choice: you will commit the fornication
  chosen_spanish: cometeréis la fornicación
  alternatives_spanish:
  - practicaréis la inmoralidad sexual
  lexicon: BDAG
  rationale: Construcción doble enfática preservada en español.
- source_word: Σοδόμων
  english_pob_choice: of Sodom
  chosen_spanish: de Sodoma
  alternatives_spanish:
  - como Sodoma
  lexicon: LSJ
  rationale: Genitivo conservado con su fuerza alusiva.
- source_word: ἀπολεῖσθε ἕως βραχύ
  english_pob_choice: you will perish for a little while
  chosen_spanish: pereceréis por un poco de tiempo
  alternatives_spanish:
  - seréis destruidos por breve tiempo
  lexicon: BDAG
  rationale: Período limitado de destrucción antes de la renovación.
- source_word: ἀνανεωθήσεσθε
  english_pob_choice: you will be renewed again
  chosen_spanish: seréis renovados de nuevo
  alternatives_spanish:
  - seréis restaurados
  lexicon: BDAG
  rationale: Futuro pasivo de renovación.
- source_word: βασιλεία Κυρίου
  english_pob_choice: kingdom of the Lord
  chosen_spanish: reino del Señor
  alternatives_spanish:
  - reinado del Señor
  lexicon: BDAG
  rationale: Equivalente bíblico estándar.
- source_word: ἐν μερίδι ὑμῶν
  english_pob_choice: in your allotted portion
  chosen_spanish: en vuestra porción asignada
  alternatives_spanish:
  - en vuestro territorio
  lexicon: LSJ
  rationale: Lote tribal de Benjamín.
- source_word: ναὸς Θεοῦ
  english_pob_choice: temple of God
  chosen_spanish: templo de Dios
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: ναός como templo en esta secuencia profética.
- source_word: συναχθήσονται
  english_pob_choice: will be gathered
  chosen_spanish: serán reunidas
  alternatives_spanish:
  - serán congregadas
  lexicon: BDAG
  rationale: Término profético estándar de reunión.
- source_word: τὸ σωτήριον αὐτοῦ
  english_pob_choice: his salvation
  chosen_spanish: su salvación
  alternatives_spanish:
  - su liberación
  lexicon: BDAG
  rationale: Concisión profética del genitivo.
- source_word: ἐν ἐπισκοπῇ
  english_pob_choice: in the visitation
  chosen_spanish: en la visitación
  alternatives_spanish:
  - en la visita
  lexicon: BDAG
  rationale: Idiom profético formal.
- source_word: μονογενοῦς προφήτου
  english_pob_choice: of an only-begotten prophet
  chosen_spanish: de un profeta unigénito
  alternatives_spanish:
  - de un profeta único
  lexicon: BDAG
  rationale: Conserva la fuerza léxica de μονογενής.
- source_word: ὑβρισθήσεται
  english_pob_choice: will be insulted
  chosen_spanish: será insultado
  alternatives_spanish:
  - será ultrajado
  lexicon: BDAG
  rationale: Tras revisión, lectura léxica directa.
- source_word: ἐπὶ ξύλου ὑψωθήσεται
  english_pob_choice: will be lifted up on wood
  chosen_spanish: será levantado sobre un madero
  alternatives_spanish:
  - será alzado sobre un árbol
  lexicon: BDAG
  rationale: Conserva la fuerza literal del griego.
- source_word: τὸ ἅπλωμα τοῦ ναοῦ
  english_pob_choice: veil of the temple
  chosen_spanish: velo del templo
  alternatives_spanish:
  - cortina
  lexicon: LSJ
  rationale: Tras revisión, 'velo' como término sagrado consolidado.
- source_word: μεταβήσεται τὸ πνεῦμα τοῦ Θεοῦ ἐπὶ τὰ ἔθνη
  english_pob_choice: the Spirit of God will pass over to the nations
  chosen_spanish: el Espíritu de Dios pasará a las naciones
  alternatives_spanish:
  - vendrá sobre las naciones
  lexicon: BDAG
  rationale: μεταβαίνω indica transición; 'pasará a' conserva el matiz.
- source_word: ὥσπερ πῦρ ἐκχυνόμενον
  english_pob_choice: like fire being poured out
  chosen_spanish: como fuego derramado
  alternatives_spanish:
  - como fuego que se derrama
  lexicon: LSJ
  rationale: Imagen vívida del derramamiento.
- source_word: ἀνελθὼν ἐκ τοῦ ᾅδου
  english_pob_choice: having gone up from Hades
  chosen_spanish: habiendo subido del Hades
  alternatives_spanish:
  - después de subir del Hades
  lexicon: BDAG
  rationale: Aspecto previo del participio aoristo.
- source_word: ταπεινός
  english_pob_choice: lowly
  chosen_spanish: humilde
  alternatives_spanish:
  - abatido
  lexicon: BDAG
  rationale: Conserva humildad y condición humilde.
- source_word: ἔνδοξος
  english_pob_choice: glorious
  chosen_spanish: glorioso
  alternatives_spanish:
  - honrado
  lexicon: BDAG
  rationale: Antítesis con humilde.
theological_decisions:
- issue: Inclusión del material de los versículos 3-5
  chosen_reading: Se incluye en el texto principal con transparencia sobre su complejidad textual y posible carácter secundario.
  alternative_readings:
  - omitir 3-5 como interpolación tardía
  - publicar solo 1-2
  rationale: El testimonio griego suministrado los incluye y la tarea es traducirlos honestamente con notas, no excluirlos en silencio.
- issue: Cómo traducir μονογενοῦς προφήτου
  chosen_reading: '''de un profeta unigénito'''
  alternative_readings:
  - '''de un profeta único'''
  - '''de un único hijo, profeta'''
  rationale: Se conserva la fuerza léxica de μονογενής.
- issue: Referente de 'el Señor' en el versículo 3
  chosen_reading: '''el Señor será insultado'' sin sustitución interpretativa.'
  alternative_readings:
  - '''el ungido del Señor'''
  - '''el profeta'''
  rationale: Se conserva la palabra Κύριος para no armonizar el texto a expectativas teológicas posteriores.
translation_notes:
  revision_awareness: 'Pase de revisión gpt-5.4 (2026-04-23): se cambió ''curtain-spread'' por ''veil'' y ''when he has gone up'' por ''after going up''; en español adoptamos ''velo'' y ''habiendo subido''.'
  spanish_consistency_notes:
  - Κύριος → Señor; θεός → Dios; πνεῦμα Θεοῦ → Espíritu de Dios.
  - ξύλον → 'madero'; ᾅδης → 'Hades'.
  - Beliar (no Belial) en otros capítulos del testamento.
