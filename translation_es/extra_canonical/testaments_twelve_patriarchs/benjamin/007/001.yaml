base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/007/001.yaml
  text: '7[a]. And he purifies his mind so as not to be condemned by men, likewise also by God. In the same way, the works of Beliar are also twofold, and they have no simplicity in them.


    Therefore, my children[b], I tell you: flee the evil of Beliar, because he gives a sword to those who obey him.'
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: Adjusted the first clause for smoother English while preserving the source meaning; kept the rest intact.
translation:
  language: es
  text: '7[a]. Y purifica su mente para no ser condenado por los hombres, e igualmente por Dios. Del mismo modo, las obras de Beliar también son dobles, y no hay simplicidad en ellas.



    Por tanto, hijos míos[b], os digo: huid del mal de Beliar, porque da una espada a los que le obedecen.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Continuación del versículo 6 con la unidad que cierra el contraste entre simplicidad y duplicidad.
    reason: textual_variant
  - marker: b
    text: '''Beliar'' refleja la forma del testimonio griego; muchos lectores conocerán el nombre como ''Belial''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταγνωσθῆναι
  english_pob_choice: to be condemned
  chosen_spanish: ser condenado
  alternatives_spanish:
  - ser juzgado adversamente
  - ser hallado culpable
  lexicon: LSJ
  rationale: El infinitivo pasivo conlleva el sentido de juicio adverso; 'ser condenado' conserva el peso moral y forense.
- source_word: διπλᾶ
  english_pob_choice: twofold
  chosen_spanish: dobles
  alternatives_spanish:
  - duplicadas
  - duplices
  lexicon: LSJ
  rationale: El contraste inmediato es con ἀπλότης/simplicidad; 'dobles' mantiene el contraste formal.
- source_word: ἀπλότης
  english_pob_choice: simplicity
  chosen_spanish: simplicidad
  alternatives_spanish:
  - sencillez
  - integridad
  lexicon: LSJ
  rationale: 'Virtud clave en Benjamín: ''simplicidad'' conserva el término ético tradicional.'
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: tradición griega
  rationale: Se conserva la forma del testimonio griego.
- source_word: μάχαιρα
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - cuchillo
  - hoja
  lexicon: LSJ
  rationale: La imagen es de un arma que genera una cadena de males; 'espada' es la traducción estándar.
- source_word: πειθομένοις
  english_pob_choice: those who obey him
  chosen_spanish: los que le obedecen
  alternatives_spanish:
  - los persuadidos por él
  - los que le ceden
  lexicon: LSJ
  rationale: En este contexto moral, 'obedecer' resalta la sumisión activa a la influencia de Beliar.
translation_notes:
  revision_awareness: Se incorpora la revisión gpt-5.4-mini (2026-05-03) que ajustó el inicio para una lectura más fluida.
  spanish_consistency_notes:
  - Mantenemos 'Beliar' (no 'Belial') siguiendo el testimonio griego.
  - θεός → Dios; διάνοια → mente.
