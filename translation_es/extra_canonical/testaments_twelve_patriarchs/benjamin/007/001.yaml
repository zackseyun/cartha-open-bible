  text: VII. ΓΔιὰ τοῦτο¹, τέκνα μου, Γλέγω ὑμῖν¹¹, φεύγετε τὴν κακίαν² †Γτοῦ Βελίαρ³ ὅτι μάχαιραν³ δίδωσιν⁴ τοῖς πειθομένοις αὐτόν⁵.
