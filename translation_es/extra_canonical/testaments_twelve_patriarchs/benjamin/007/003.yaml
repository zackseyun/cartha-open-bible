- source_word: πληγή
  english_pob_choice: plague
  chosen_spanish: plaga
  alternatives_spanish:
  - golpe
  - azote
  lexicon: LSJ
  rationale: En contextos punitivos, denota un golpe divinamente infligido; 'plaga' comunica la fuerza punitiva en español accesible.
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  lexicon: LSJ
  rationale: Equivalente estándar en POB; conserva la voz divina del juicio.
