lexical_decisions:
- source_word: ἐκδικίαις
  english_pob_choice: acts of vengeance
  chosen_spanish: actos de venganza
  alternatives_spanish:
  - venganzas
  - castigos
  lexicon: LSJ
  rationale: El plural denota juicios vengativos repetidos; 'actos de venganza' es más idiomático y preserva el sentido judicial.
- source_word: παρεδόθη
  english_pob_choice: was handed over
  chosen_spanish: fue entregado
  alternatives_spanish:
  - fue consignado
  - fue dado
  lexicon: LSJ
