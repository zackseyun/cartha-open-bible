translation:
  language: es
  text: Por esto también Caín fue entregado por Dios a siete actos de venganza. Pues a lo largo de cien años el Señor traía sobre él una plaga tras otra[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'una plaga'; el sentido en contexto es la sucesión de plagas anuales/centenales sobre Caín.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκδικίαις
  english_pob_choice: acts of vengeance
  chosen_spanish: actos de venganza
  alternatives_spanish:
  - venganzas
  - castigos
  lexicon: LSJ
  rationale: El plural denota juicios vengativos repetidos; 'actos de venganza' es más idiomático y preserva el sentido judicial.
- source_word: παρεδόθη
  english_pob_choice: was handed over
  chosen_spanish: fue entregado
  alternatives_spanish:
  - fue consignado
  - fue dado
  lexicon: LSJ
  rationale: El pasivo sugiere ser consignado al juicio; 'fue entregado' conserva la fuerza sin sobrecargar la frase.
- source_word: πληγή
  english_pob_choice: plague
  chosen_spanish: plaga
  alternatives_spanish:
  - golpe
  - azote
  lexicon: LSJ
  rationale: En contextos punitivos, denota un golpe divinamente infligido; 'plaga' comunica la fuerza punitiva en español accesible.
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  lexicon: LSJ
  rationale: Equivalente estándar en POB; conserva la voz divina del juicio.
