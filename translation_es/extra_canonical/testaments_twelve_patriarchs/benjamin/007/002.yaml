translation:
  language: es
  text: 'Y la espada es madre de siete males. Primero la mente concibe por medio de Beliar, y estos son sus partos: primero la envidia, segundo la destrucción, tercero la aflicción, cuarto la cautividad, quinto la indigencia, sexto la turbación, séptimo la desolación.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μάχαιρα
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - cuchillo
  lexicon: LSJ
  rationale: Continuidad con el versículo anterior; arma generadora de una cadena de males.
- source_word: συλλαμβάνει
  english_pob_choice: conceives
  chosen_spanish: concibe
  alternatives_spanish:
  - recibe
  - se apodera de
  lexicon: LSJ
  rationale: La metáfora maternal ('madre de siete males') exige 'concibe', que conserva la imagen de generación interior.
- source_word: φθόνος
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  lexicon: LSJ
  rationale: Término clásico en estos testamentos; 'envidia' es la categoría moral más precisa aquí.
- source_word: ἀπώλεια
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: LSJ
  rationale: Designa el resultado ruinoso en el catálogo de vicios; 'destrucción' es fuerte y legible.
- source_word: θλῖψις
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - angustia
  - tribulación
  lexicon: LSJ
  rationale: Designa sufrimiento opresivo derivado del mal; 'aflicción' es elevado y claro.
- source_word: θεηλασία/αἰχμαλωσία
  english_pob_choice: captivity
  chosen_spanish: cautividad
  alternatives_spanish:
  - cautiverio
  - destierro
  lexicon: LSJ
  rationale: Las formas paralelas en el aparato apuntan a αἰχμαλωσία; 'cautividad' encaja en la secuencia de calamidades.
- source_word: ἔνδεια
  english_pob_choice: want
  chosen_spanish: indigencia
  alternatives_spanish:
  - pobreza
  - necesidad
  lexicon: LSJ
  rationale: Designa la carencia o privación; 'indigencia' conserva el ritmo del catálogo y mantiene un registro elevado.
- source_word: ταραχή
  english_pob_choice: turmoil
  chosen_spanish: turbación
  alternatives_spanish:
  - confusión
  - agitación
  lexicon: LSJ
  rationale: Designa desorden interior y social; 'turbación' es vívido en una secuencia de vicios.
- source_word: ἐρήμωσις
  english_pob_choice: desolation
  chosen_spanish: desolación
  alternatives_spanish:
  - devastación
  - desierto
  lexicon: LSJ
  rationale: Estado culminante de ruina; 'desolación' conserva el registro bíblico.
