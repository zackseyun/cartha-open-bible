    changes_summary: Adjusted verse 6 to reflect ἐπὶ σκήπτρον ἡμῶν more naturally as “with our scepter” and to match the finite verb sequence with “and we will worship.” In verse 11, revised “according to the commandments” to the more literal “in the commandments,” and “with confidence in me” to “in hope with me” to better reflect ἐπʼ ἐλπίδι ἐν ἐμοί.
translation:
  language: es
  text: '1[a]. Cuando José estaba en Egipto, yo anhelaba ver su apariencia y la forma de su rostro; y por las oraciones de Jacob mi padre lo vi, estando despierto durante el día, exactamente tal como era toda su apariencia.


    2. Y después de decir estas cosas, les dijo: "Sepan, pues, hijos míos, que voy a morir. 3[b]. Por tanto, que cada uno practique la verdad para con su prójimo, y guarden la ley del Señor y sus mandamientos. 4. Pues estas cosas les dejo a ustedes en lugar de toda herencia. Y ustedes, por tanto, dénselas a sus hijos como posesión perpetua; porque así lo hicieron Abraham, Isaac y Jacob. 5. Porque todas estas cosas nos las dieron como herencia, diciendo: ''Guarden los mandamientos de Dios hasta el momento en que vean a Enoc, a Set, a Abraham, a Isaac y a Jacob, levantados a su derecha en regocijo.''


    6[d]. Entonces nosotros también resucitaremos, cada uno con su cetro, y adoraremos al Rey de los cielos. 7. [el que apareció en la tierra en forma de hombre en humildad; y todos los que crean en él en la tierra se regocijarán con él.]


    8. Y todos resucitarán, unos para gloria y otros para deshonra; y el Señor juzgará a Israel primero por su injusticia [porque, cuando Dios vino a ellos en carne, no le creyeron]. 9. Y entonces juzgará a todas las naciones [que no le creyeron cuando apareció en la tierra]. 10. Y por medio de los escogidos de entre las naciones declarará culpable a Israel, así como declaró culpable a Esaú por medio de los madianitas, los cuales engañaron a sus hermanos para que llegaran a serlo, mediante la inmoralidad sexual y la idolatría, y así fueron alienados de Dios, y de este modo se hicieron hijos en la porción de los que temen al Señor.


    11. Por tanto, ustedes, hijos míos, si caminan en santidad en los mandamientos del Señor, volverán a habitar en esperanza[c] conmigo, y todo Israel será reunido al Señor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Las cláusulas en vv. 7-9 entre corchetes son ampliamente consideradas como expansión cristiana posterior por su lenguaje explícito sobre Dios apareciendo en carne y la fe en él en la tierra.
    reason: textual_variant
  - marker: b
    text: O 'hagan la verdad' (v. 3). El idioma griego es concreto y ético.
    reason: lexical_alternative
  - marker: c
    text: '''En esperanza'' (v. 11) renderiza una frase difícil; alternativa: ''con confianza''.'
    reason: lexical_alternative
  - marker: d
    text: La frase 'cada uno con su cetro' (v. 6) es textualmente difícil; puede evocar dignidad restaurada o gobierno tribal en la resurrección.
    reason: cultural_note
lexical_decisions:
- source_word: εἰδέα / μόρφωσις / ὄψις
  english_pob_choice: appearance / form / face
  chosen_spanish: apariencia / forma / rostro
  alternatives_spanish:
  - aspecto / figura / cara
  - semblante / contorno / faz
  lexicon: LSJ
  rationale: Conservo la acumulación retórica griega con tres términos distintos pero relacionados, paralelos al inglés POB.
- source_word: ἐν ἡμέρᾳ γρηγορῶν
  english_pob_choice: while awake by day
  chosen_spanish: estando despierto durante el día
  alternatives_spanish:
  - en pleno día estando despierto
  - despierto en el día
  lexicon: LSJ
  rationale: Contrasta la visión vigil con sueño; el gerundio español preserva la fuerza experiencial sin sobreinterpretar como visión técnica.
- source_word: ποιήσατε ... ἀλήθειαν
  english_pob_choice: do truth
  chosen_spanish: practique la verdad
  alternatives_spanish:
  - haga la verdad
  - obre con verdad
  lexicon: LSJ
  rationale: Sigue la revisión POB que prefiere 'practice truth' por más natural y preciso; en español 'practicar la verdad' conserva la concreción ética.
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - semejante
  - vecino
  lexicon: LSJ
  rationale: '''Prójimo'' preserva el registro bíblico-pactual estándar.'
- source_word: νόμος ... ἐντολαί
  english_pob_choice: law ... commandments
  chosen_spanish: ley ... mandamientos
  alternatives_spanish:
  - instrucción ... mandatos
  lexicon: LSJ
  rationale: Términos pactuales reconocibles y estables en español bíblico.
- source_word: ἀντὶ πάσης κληρονομίας
  english_pob_choice: instead of every inheritance
  chosen_spanish: en lugar de toda herencia
  alternatives_spanish:
  - en vez de toda herencia
  lexicon: LSJ
  rationale: Conserva el contraste enfático de ἀντί entre la enseñanza ética y la herencia material.
- source_word: κατάσχεσιν αἰώνιον
  english_pob_choice: everlasting possession
  chosen_spanish: posesión perpetua
  alternatives_spanish:
  - heredad eterna
  - posesión eterna
  lexicon: LSJ
  rationale: Frase pactual transmisible entre generaciones; 'perpetua' es idiomática para herencia.
- source_word: ἀνασταμένους ἐκ δεξιῶν αὐτοῦ
  english_pob_choice: raised up at his right hand
  chosen_spanish: levantados a su derecha
  alternatives_spanish:
  - resucitados a su diestra
  - alzados a su derecha
  lexicon: LSJ
  rationale: Conserva la posición honorífica sin agregar más de lo que dice el griego; 'a la derecha' es el estándar moderno.
- source_word: ἐν ἀγαλλιάσει
  english_pob_choice: in rejoicing
  chosen_spanish: en regocijo
  alternatives_spanish:
  - con exultación
  - con gozo
  lexicon: LSJ
  rationale: Mantiene el tono celebratorio elevado y vincula la resurrección con la alegría escatológica.
- source_word: ἐπὶ σκήπτρον ἡμῶν
  english_pob_choice: with our scepter
  chosen_spanish: con su cetro
  alternatives_spanish:
  - sobre su cetro
  - según su cetro
  lexicon: LSJ
  rationale: Frase textualmente difícil. Sigo la revisión POB que adoptó 'with our scepter'; 'con su cetro' (cada uno) preserva la imagen sin resolver falsamente.
- source_word: βασιλέα τῶν οὐρανῶν
  english_pob_choice: King of the heavens
  chosen_spanish: Rey de los cielos
  alternatives_spanish:
  - Rey celestial
  - Rey del cielo
  lexicon: LSJ
  rationale: Plural 'cielos' refleja el griego τῶν οὐρανῶν y conserva el registro apocalíptico elevado.
- source_word: ἀτιμία
  english_pob_choice: dishonor
  chosen_spanish: deshonra
  alternatives_spanish:
  - vergüenza
  - ignominia
  lexicon: LSJ
  rationale: Empareja con 'gloria' en la antítesis formal del juicio escatológico.
- source_word: ἀδικία
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - iniquidad
  - maldad
  lexicon: LSJ
  rationale: Cubre el peso moral-pactual del término griego.
- source_word: ἐλέγξει
  english_pob_choice: will convict
  chosen_spanish: declarará culpable
  alternatives_spanish:
  - convencerá
  - reprenderá
  lexicon: LSJ
  rationale: Encaja con el contexto judicial divino; expone culpa y no solo critica.
- source_word: πορνεία
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  lexicon: LSJ
  rationale: Default accesible del proyecto, evita arcaísmo conservando seriedad moral.
- source_word: ἀπηλλοτριώθησαν Θεοῦ
  english_pob_choice: estranged from God
  chosen_spanish: alienados de Dios
  alternatives_spanish:
  - enajenados de Dios
  - extrañados de Dios
  lexicon: LSJ
  rationale: El pasivo transmite separación de la relación pactual; 'alienados' es claro y serio.
- source_word: ἐν ἁγιασμῷ
  english_pob_choice: in holiness
  chosen_spanish: en santidad
  alternatives_spanish:
  - en santificación
  - en consagración
  lexicon: LSJ
  rationale: Exhortación ético-pactual; 'santidad' es natural en español.
- source_word: ἐπʼ ἐλπίδι
  english_pob_choice: in hope
  chosen_spanish: en esperanza
  alternatives_spanish:
  - con confianza
  - esperanzados
  lexicon: LSJ
  rationale: Sigue la revisión POB que adoptó 'in hope' por más literal; conserva la nota al pie con la lectura interpretativa alternativa.
- source_word: συναχθήσεται πρὸς Κύριον
  english_pob_choice: will be gathered to the Lord
  chosen_spanish: será reunido al Señor
  alternatives_spanish:
  - será congregado al Señor
  - será juntado al Señor
  lexicon: LSJ
  rationale: Preserva el motivo escatológico del recogimiento pactual hacia el Señor.
theological_decisions:
- issue: Material cristológico entre corchetes en vv. 7-9
  chosen_reading: Traducir las cláusulas entre corchetes en el flujo principal del capítulo, pero marcadas con corchetes y documentadas como expansiones probablemente secundarias.
  alternative_readings:
  - Omitir las cláusulas como interpolación cristiana posterior
  - Traducirlas sin marcar, tratándolas como integrales
  rationale: El testigo griego incluye estas cláusulas y el proyecto exige traducción honesta del texto. Por ser textual e históricamente sospechoso, especialmente el lenguaje explícito de encarnación y fe, lo conservo transparentemente con corchetes en lugar de omitir o normalizar.
  doctrine_reference: 'PHILOSOPHY.md: preservar la complejidad textual con transparencia; DOCTRINE.md: preservar la tensión teológica antes que resolverla'
- issue: Identidad de 'su derecha' en v. 5
  chosen_reading: Mantengo el pronombre como 'su' sin especificar Dios o el Rey celestial.
  alternative_readings:
  - a la derecha de Dios
  - a la diestra del Señor
  rationale: El antecedente no se reformula explícitamente en griego. Suplir 'Dios' aclararía pero también interpretaría. La traducción mantiene visible la ambigüedad.
- issue: Resurrección y juicio en vv. 5-10
  chosen_reading: Rendido el capítulo como enseñanza de resurrección universal con resultados diferenciados y juicio que comienza con Israel.
  alternative_readings:
  - Tratar el lenguaje de resurrección como restauración puramente metafórica
  - Restringir el alcance solo a Israel
  rationale: El lenguaje repetido ἀναστήσονται/ἀναστησόμεθα, seguido de gloria/deshonra y el juicio de Israel y las naciones, es lo más natural escatológicamente y de alcance universal.
- issue: Significado de ἐπὶ σκήπτρον ἡμῶν en v. 6
  chosen_reading: Conservado la frase difícil con cierta literalidad como 'cada uno con su cetro.'
  alternative_readings:
  - cada uno según su tribu
  - cada uno sobre su trono
  rationale: El texto es incierto y simbólico. Una rendición más interpretativa exageraría la confianza donde el griego es oscuro.
translation_notes:
  revision_awareness: El revisor inglés ajustó v. 6 a 'with our scepter' y 'and we will worship'; en v. 11 ajustó a 'in the commandments' y 'in hope with me'. El español refleja todos estos cambios revisionales.
  spanish_consistency_notes:
  - Capítulo completo coherente con verses individuales 002-011.
  - Corchetes preservados en vv. 7-9 para señalar material textualmente sospechoso de expansión cristiana.
  - Notas al pie [a]-[d] con marcadores y posiciones que coinciden con el inglés POB.
