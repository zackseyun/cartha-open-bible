  text: X. Ὅτε¹ δὲ *ἦν Ἰωσὴφ ἐν Αἰγύπτῳ², ἐπεθύμουν ἰδεῖν τὴν εἰδέαν³ αὐτοῦ Γκαὶ τὴν μόρφωσιν⁴ τῆς ὄψεως αὐτοῦ⁵. καὶ δι᾽ εὐχῶν Ἰακὼβ τοῦ πατρός μου⁶ εἶδον Γαὐτόν, ἐν ἡμέρᾳ γρηγορῶν, *καθ᾽ ὃ ἦν⁶ πᾶσα⁷ ἡ εἰδέα⁷ αὐτοῦ. 2. ΓΚαὶ ταῦτα εἰπὼν λέγει αὐτοῖς⁸⁹. *Γινώσκετε οὖν⁹, τέκνα μου, ὅτι¹⁰ ἀποθνῄσκω. 3. *Ποιήσατε οὖν¹¹ ἀλήθειαν *ἕκαστος πρὸς τὸν πλησίον αὐτοῦ¹², Γκαὶ τὸν νόμον Κυρίου, καὶ τὰς ἐντολὰς αὐτοῦ¹³ φυλάξατε˥. 4. *Ταῦτα γὰρ ὑμῖν ἀντὶ πάσης κληρονομίας καταλειμπάνω¹⁴. καὶ ὑμεῖς Γοὖν δότε αὐτὰ¹⁵ τοῖς τέκνοις ὑμῶν *εἰς κατάσχεσιν¹⁶ αἰώνιον· οὕτω¹⁷ Γγὰρ˥ ἐποίησεν¹⁸ Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακώβ. 5. *Ταῦτα γὰρ πάντα δέδωκαν ἡμῖν εἰς κληρονομίαν¹⁹ *εἰπόντες· Φυλάξατε τὰς ἐντολὰς τοῦ Θεοῦ²⁰ ἕως ὅτου²¹ ἀποκαλύψει [Κύριος τὸ σωτήριον αὐτοῦ πᾶσι τοῖς ἔθνεσι]. 6. Καὶ τότε²⁶ ὄψεσθε²⁷ Ἐνὼχ *καὶ Σήθ²⁸, καὶ²⁹ ᾿Αβραάμ, καὶ²⁹ Ἰσαὰκ καὶ Ἰακὼβ ἀνασταμένους³⁰ ἐκ δεξιῶν Γαὐτοῦ˥³¹ *ἐν ἀγαλλιάσει³². 7. Τότε καὶ ἡμεῖς ἀναστησόμεθα³³ ἕκαστος *ἐπὶ σκήπτρον ἡμῶν³⁴ προσκυνοῦντες τὸν βασιλέα *τῶν οὐρανῶν³⁵ [τὸν ἐπὶ
    γῆς φανέντα³⁶ ἐν³⁷ μορφῇ ἀνθρώπου *ἐν ταπεινώσει³⁸, καὶ ὅσοι πιστεύσωσιν³⁹ αὐτῷ⁴⁰ ἐπὶ τῆς⁴¹ γῆς *χαρίσονται σὺν αὐτῷ⁴²]. 8. *Καὶ οἱ⁴³ πάντες ἀναστήσονται, οἱ μὲν εἰς δόξαν, οἱ δὲ εἰς ἀτιμίαν, καὶ κρινεῖ Κύριος⁴⁴ ἐν πρώτοις τὸν Ἰσραὴλ⁴⁵ περὶ τῆς *ἀδικίας αὐτῶν⁴⁶ [ὅτι παραγενόμενον⁴⁷ Θεὸν⁴⁴ ἐν σαρκί⁴⁸, οὐκ ἐπίστευσαν αὐτῷ⁴⁹]. 9. Καὶ τότε κρινεῖ πάντα τὰ ἔθνη [ὅσα οὐκ ἐπίστευσαν αὐτῷ ἐπὶ τῆς⁵⁰ γῆς φανέντι⁵⁷]. 10. Καὶ ἐλέγξει ἐν τοῖς ἐκλεκτοῖς *τῶν ἐθνῶν⁵⁸ τὸν Ἰσραήλ, ὥσπερ ἤλεγξεν τὸν Ἡσαῦ ἐν τοῖς Μαδιωαίοις τοῖς †ἀπατήσασιν⁵⁹ *ἀδελφοὺς αὐτῶν⁶⁰ [γενέσθαι διὰ τῆς πορνείας καὶ τῆς εἰδωλολατρείας, καὶ⁶¹ ἀπηλλοτριώθησαν Θεοῦ]⁶², γενόμενοι⁶³ οὖν⁶⁴ τέκνα ἐν μερίδι φοβουμένων⁶⁵ Κύριον. 11. ⌜Ὑμεῖς οὖν, τέκνα μου⁶⁷, ἐὰν⁶⁸ πορευθῆτε⁶⁹ ἐν ἁγιασμῷ ⌜*ἐν ταῖς ἐντολαῖς⁷⁰ Κυρίου⌝, πάλιν κατοικήσετε⁷¹ ⌜ἐπʼ ἐλπίδι⌝ *ἐν ἐμοί⁷², καὶ συναχθήσεται⁷³ *πρὸς Κύριον⁷⁴ πᾶς Ἰσραήλ.
