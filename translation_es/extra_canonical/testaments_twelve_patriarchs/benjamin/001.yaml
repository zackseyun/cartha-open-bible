base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/001.yaml
  text: 'The Copy of the Words of Benjamin[a], the twelfth son of Jacob, which he set in order for his sons, having lived one hundred and twenty-five years.


    And after kissing them, he said:


    Just as Isaac was born to Abraham in his old age, so I also was born to Jacob. And since Rachel my mother died while giving birth to me, I had no milk; so I was nursed by Bilhah, her maidservant. For Rachel was barren for twelve years after she had borne Joseph; and she prayed to the Lord with fasting, and after conceiving she bore me. For my father loved Rachel exceedingly, and he prayed to see two sons from her. Because of this I was called Benjamin[b], which means son of days.'
  footnotes:
  - marker: a
    text: Genesis more commonly explains the name Benjamin differently; here the Greek testament gives the etymology 'son of days.'
    reason: cross_reference
  - marker: b
    text: 'The Greek line about Rachel''s death at Benjamin''s birth is textually awkward in this OCR layer, but the sense is clear in context: she died in giving birth to him.'
    reason: textual_variant
