translation:
  language: es
  text: 'Copia de las palabras de Benjamín[a], el duodécimo hijo de Jacob y de Raquel, que él dispuso para sus hijos, habiendo vivido ciento veinticinco años.



    2. Y tras besarles, dijo: «Al igual que Isaac nació a Abraham en su vejez, así también yo nací de Jacob. 3. Y puesto que Raquel, mi madre, murió al darme a luz[b], no tuve leche; así que fui amamantado por Bilhá, su sierva[c]. 4. Pues Raquel estuvo estéril doce años después de haber dado a luz a José; y oró al Señor[d] con ayuno, y tras concebir, me dio a luz. 5. Porque mi padre amaba a Raquel sobremanera, y pedía en oración ver dos hijos de ella. 6. Por eso fui llamado Benjamín, que significa hijo de días[e].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El Génesis explica el nombre de Benjamín de manera diferente a como lo hace esta tradición; aquí el testamento griego ofrece la etimología «hijo de días». La superscripción griega añade «e hijo de Raquel», detalle que el inglés del POB omitió y que se incorpora en esta versión española.
    reason: cross_reference
  - marker: b
    text: 'La línea griega sobre la muerte de Raquel presenta cierta dificultad en la capa OCR del texto de Charles (1908); sin embargo, el sentido es inequívoco en contexto: Raquel murió en el parto de Benjamín (cf. Gn 35,16-20).'
    reason: textual_variant
  - marker: c
    text: El griego παιδίσκη designa a una mujer joven en condición servil, la asistente personal de Raquel. Se prefiere «sierva» sobre «esclava» porque παιδίσκη tiene un campo semántico más específico que δοῦλος; con todo, el término implica un estatus de subordinación, no de libre servicio.
    reason: lexical_alternative
  - marker: d
    text: El griego tiene πρὸς Κύριον («al Señor»). En el contexto de este testamento judío, κύριος funciona como sustituto del nombre divino יהוה (Yahvé), siguiendo la convención griega de los LXX. La política del POB en español prefiere «Yahvé» para el tetragramatón hebreo; dado que el testigo directo es el griego κύριος, se mantiene «al Señor» con esta nota explicativa.
    reason: theological_note
  - marker: e
    text: '«Hijo de días» traduce literalmente la glosa interna del texto griego: ὅ ἐστιν υἱὸς ἡμερῶν. La tradición hebrea explica el nombre Benjamín como «hijo de la mano derecha» (בֶּן-יָמִין); la versión griega de los Testamentos de los Doce Patriarcas ofrece una interpretación propia. El POB refleja el testigo griego sin armonizarlo.'
    reason: theological_note
lexical_decisions:
- source_word: Ἀντίγραφον λόγων
  english_pob_choice: The Copy of the Words
  chosen_spanish: Copia de las palabras
  alternatives_spanish:
  - Traslado de las palabras
  - Reproducción de los dichos
  lexicon: LSJ
  rationale: 'Ἀντίγραφον denota una copia escrita de un documento original. ''Copia de las palabras'' es la expresión más natural en español moderno y preserva la función de género literario: este es un documento que se presenta como reproducción fiel del testamento oral de Benjamín.'
- source_word: διέθετο
  english_pob_choice: set in order
  chosen_spanish: dispuso
  alternatives_spanish:
  - ordenó
  - estableció
  - legó
  lexicon: LSJ
  rationale: El verbo διατίθεμαι en contexto testamentario denota la disposición deliberada y formal de palabras o bienes. 'Dispuso' conserva tanto el sentido de ordenamiento intencional como la resonancia testamentaria, sin la pesadez jurídica de 'legó'. 'Ordenó' es aceptable pero puede evocar un mandato imperativo más que una disposición solemne.
- source_word: ζήσας
  english_pob_choice: having lived
  chosen_spanish: habiendo vivido
  alternatives_spanish:
  - después de haber vivido
  - tras vivir
  lexicon: LSJ
  rationale: El participio aoristo ζήσας indica acción previa al verbo principal implícito. 'Habiendo vivido' es el equivalente participial natural en español culto y refleja la misma solución que adoptó la revisión del POB en inglés (cambio de 'when he had lived' a 'having lived').
- source_word: Καταφιλήσας
  english_pob_choice: after kissing
  chosen_spanish: tras besarles
  alternatives_spanish:
  - habiéndoles besado afectuosamente
  - luego de abrazarles con besos
  lexicon: LSJ
  rationale: El compuesto κατα- intensifica el verbo φιλέω e implica una serie de besos afectuosos. No obstante, añadir un adverbio como 'afectuosamente' en español resultaría redundante dada la carga emocional que el contexto ya establece. 'Tras besarles' es natural, mantiene el registro paternal tierno y sigue la misma economía de palabras que el inglés del POB.
- source_word: ἐν γήρει αὐτοῦ
  english_pob_choice: in his old age
  chosen_spanish: en su vejez
  alternatives_spanish:
  - siendo ya anciano
  - en su ancianidad
  lexicon: LSJ
  rationale: '''En su vejez'' es la expresión idiomática estándar en español para este tipo de frase bíblica y mantiene el registro elevado del paralelo Abraham-Isaac / Jacob-Benjamín.'
- source_word: τέθνηκε γεννῶσά με
  english_pob_choice: died while giving birth to me
  chosen_spanish: murió al darme a luz
  alternatives_spanish:
  - murió mientras me daba a luz
  - murió en mi nacimiento
  lexicon: LSJ
  rationale: 'El participio presente γεννῶσά indica acción simultánea: morir en el acto de dar a luz. ''Murió al darme a luz'' es la construcción española más natural para esta simultaneidad y no requiere la preposición temporal explícita ''mientras'', que también sería válida.'
- source_word: γάλα οὐκ ἔσχον
  english_pob_choice: I had no milk
  chosen_spanish: no tuve leche
  alternatives_spanish:
  - no conté con leche materna
  - careció para mí de leche
  lexicon: LSJ
  rationale: La frase es deliberadamente escueta en el original. 'No tuve leche' preserva la crudeza autobiográfica que alude implícitamente a la ausencia de la madre. Las alternativas más explicativas añaden sentido no presente en el griego.
- source_word: παιδίσκην
  english_pob_choice: maidservant
  chosen_spanish: sierva
  alternatives_spanish:
  - esclava
  - criada
  - sirvienta
  lexicon: LSJ
  rationale: El término griego παιδίσκη designa a una mujer joven en condición servil o de esclavitud —el equivalente femenino de παῖς—. El proyecto POB rinde δοῦλος normalmente como 'esclavo'; sin embargo, παιδίσκη tiene un campo semántico ligeramente diferente (sirvienta personal, asistente doméstica de baja condición), y la tradición narrativa bíblica describe a Bilhá como la sirvienta personal de Raquel. Se elige 'sierva' porque es más preciso que 'esclava' para este término femenino específico y se ajusta al contexto de la relación Raquel-Bilhá. Véase nota [c].
- source_word: ἐθήλασα
  english_pob_choice: I was nursed
  chosen_spanish: fui amamantado
  alternatives_spanish:
  - mamé
  - me amamantó
  lexicon: LSJ
  rationale: La voz activa en primera persona resultaría extraña en español moderno ('mamé de Bilhá'). La construcción pasiva 'fui amamantado por Bilhá' es más natural y hace explícita la agencia de Bilhá, igual que optó el inglés del POB.
- source_word: ἐστείρευσεν
  english_pob_choice: was barren
  chosen_spanish: estuvo estéril
  alternatives_spanish:
  - permaneció estéril
  - fue estéril
  lexicon: LSJ
  rationale: '''Estuvo estéril'' expresa el estado temporal durante un período delimitado de doce años, en contraste con ''fue estéril'' (que podría implicar una condición permanente). ''Permaneció estéril'' también es válido y preserva el patetismo de la espera prolongada.'
- source_word: πρὸς Κύριον
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - a Yahvé
  lexicon: LSJ
  rationale: El griego tiene κύριος, no el tetragramatón hebreo. La política del POB en español prefiere 'Yahvé' para יהוה pero exige explicar la decisión cuando la fuente directa es el griego κύριος. En este testamento judío pseudoepigráfico, κύριος funciona como sustituto convencional del nombre divino (convenio LXX). Se mantiene 'al Señor' siguiendo el testigo griego directo; véase nota [d].
- source_word: μετὰ νηστείας
  english_pob_choice: with fasting
  chosen_spanish: con ayuno
  alternatives_spanish:
  - ayunando
  - en ayuno
  lexicon: LSJ
  rationale: '''Con ayuno'' reproduce la concisión ascética del original sin paráfrasis. ''Ayunando'' (participio) también es fiel, pero la construcción nominal preserva mejor la sobriedad de la frase.'
- source_word: συλλαβοῦσα
  english_pob_choice: after conceiving
  chosen_spanish: tras concebir
  alternatives_spanish:
  - habiendo concebido
  - después de quedar encinta
  lexicon: LSJ
  rationale: El participio aoristo marca acción previa al nacimiento. 'Tras concebir' es la opción más concisa y temporal en español moderno, paralela a 'tras besarles' más arriba, lo que da coherencia estilística al texto.
- source_word: Σφόδρα ἠγάπα
  english_pob_choice: loved exceedingly
  chosen_spanish: amaba sobremanera
  alternatives_spanish:
  - amaba profundamente
  - amaba con todo su corazón
  - amaba en extremo
  lexicon: LSJ
  rationale: El adverbio σφόδρα indica intensidad superlativa. 'Sobremanera' es una expresión española de registro elevado que capta exactamente esta intensidad, es culturalmente legible en contextos bíblicos y mantiene la dignidad testamentaria del texto.
- source_word: υἱὸς ἡμερῶν
  english_pob_choice: son of days
  chosen_spanish: hijo de días
  alternatives_spanish:
  - hijo de la mano derecha
  - hijo de la vejez
  lexicon: LSJ
  rationale: El texto griego ofrece explícitamente la glosa interna ὅ ἐστιν υἱὸς ἡμερῶν. 'Hijo de días' es el calco literal directo y debe preservarse para reflejar el testigo griego tal como es, sin armonizarlo con la tradición hebrea. Véase nota [e] y la decisión teológica correspondiente.
theological_decisions:
- issue: Significado del nombre Benjamín en el testigo griego
  english_pob_reading: son of days
  chosen_spanish_reading: hijo de días
  alternative_spanish_readings:
  - hijo de la mano derecha
  - hijo de mi mano derecha
  - hijo de la vejez
  rationale: 'El capítulo ofrece su propia glosa interna: ὅ ἐστιν υἱὸς ἡμερῶν. La transparencia del POB exige traducir el testigo que tenemos antes de armonizarlo con Génesis o con la tradición hebrea בֶּן-יָמִין (''hijo de la mano derecha''). La nota [e] preserva la tensión textual para el lector.'
  doctrine_reference: Primacía de la lengua original sobre la tradición de traducción; preservar la tensión textual en lugar de resolverla (cf. decisión teológica del POB en inglés)
- issue: Tratamiento de κύριος en un texto judío pseudoepigráfico
  english_pob_reading: to the Lord
  chosen_spanish_reading: al Señor
  alternative_spanish_readings:
  - a Yahvé
  rationale: La política del POB en español ordena 'Yahvé' para יהוה hebreo, pero cuando la fuente directa es el griego κύριος —como aquí— exige explicar la decisión. En este testamento judío, κύριος es el sustituto convencional del nombre divino (uso LXX), por lo que semánticamente equivale a Yahvé. No obstante, dado que el testigo directo es griego y no el tetragramatón, se mantiene 'al Señor' con nota explicativa, siguiendo el mismo principio de fidelidad al nivel lingüístico del testigo.
  doctrine_reference: 'Política de nombre divino del POB: ''Yahvé'' para YHWH hebreo; explicación obligatoria cuando la fuente es κύριος griego'
translation_notes:
  revision_awareness: El inglés del POB sufrió un único pase de revisión (2026-04-23, modelo gpt-5.4) que cambió «when he had lived» por «having lived» para renderizar con mayor naturalidad el participio griego ζήσας. La versión española rinde ζήσας directamente como «habiendo vivido», que es el equivalente participial culto en español y ya incorpora implícitamente la misma corrección, sin necesidad de una operación de revisión adicional.
  spanish_consistency_notes:
  - La superscripción griega menciona explícitamente a Raquel (τοῦ ιβ´ υἱοῦ Ἰακὼβ καὶ Ῥαχήλ); la versión inglesa del POB omitió «y de Raquel». La española la recupera siguiendo el principio de fidelidad a la fuente.
  - 'Nombres propios en forma española estándar de la tradición bíblica: Benjamín, Jacob, Raquel, Isaac, Abraham, José, Bilhá.'
  - «Yahvé» es el término por defecto del proyecto para יהוה hebreo; cuando la fuente directa es el griego κύριος, se usa «el Señor» / «al Señor» con nota teológica obligatoria.
  - «Sierva» se emplea para παιδίσκη (femenino específico) en lugar de la forma masculina «esclavo» que el proyecto reserva para δοῦλος; la distinción se documenta en la decisión léxica y en la nota [c].
  - El registro del texto es formal y digno, coherente con el género literario testamentario pseudoepigráfico; se evitan arcaísmos tipo Reina-Valera salvo donde sean la opción más fiel e inteligible.
