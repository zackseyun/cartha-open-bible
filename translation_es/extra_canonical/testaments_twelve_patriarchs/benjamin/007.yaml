  english_pob_choice: twofold
  chosen_spanish: dobles
  alternatives_spanish:
  - duplicadas
  lexicon: LSJ
  rationale: Contraste con ἀπλότης/simplicidad.
- source_word: ἀπλότης
  english_pob_choice: simplicity
  chosen_spanish: simplicidad
  alternatives_spanish:
  - sencillez
  lexicon: LSJ
