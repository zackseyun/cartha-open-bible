  text: '7[a]. And he purifies his mind so as not to be condemned by men, and likewise by God. In the same way, the works of Beliar also are twofold, and they have no simplicity in them.


    Therefore, my children[b], I tell you: flee the evil of Beliar, because he gives a sword to those who obey him. And the sword is the mother of seven evils. First the mind conceives through Beliar, and these are its births: first envy, second destruction, third affliction, fourth captivity, fifth want, sixth turmoil, seventh desolation.


    Because of this, Cain was handed over to seven acts of vengeance. For in one hundred years the Lord brought one plague upon him after another[c], and in the nine-hundredth year he was made desolate.'
  footnotes:
  - marker: a
    text: The fourth evil is textually uncertain in the Greek OCR layer. Some witnesses read 'captivity' (αἰχμαλωσία), while the printed line here appears corrupted. 'Captivity' is adopted because it fits the parallel witness forms and the sequence of calamities.
    reason: textual_variant
  - marker: b
    text: Beliar is the form found in this Greek witness; many readers will know the name as Belial.
    reason: lexical_alternative
  - marker: c
    text: 'The statement that the sword is ''the mother of seven evils'' is immediately explained by a conception/birth metaphor: the mind conceives through Beliar, and seven evils are born from it.'
    reason: cultural_note
