  english_pob_choice: those who obey him
  chosen_spanish: los que le obedecen
  alternatives_spanish:
  - los persuadidos por él
  lexicon: LSJ
  rationale: En este contexto moral, denota cumplimiento activo.
- source_word: συλλαμβάνει
  english_pob_choice: conceives
  chosen_spanish: concibe
  alternatives_spanish:
  - recibe
  lexicon: LSJ
  rationale: Encaja con la metáfora maternal del 'parto' de los siete males.
- source_word: φθόνος
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  lexicon: LSJ
  rationale: Categoría moral precisa en testamentos.
- source_word: ἀπώλεια
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: LSJ
  rationale: Resultado ruinoso en el catálogo de vicios.
- source_word: θλῖψις
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - tribulación
  lexicon: LSJ
  rationale: Sufrimiento opresivo derivado del mal.
- source_word: αἰχμαλωσία/θεηλασία
  english_pob_choice: captivity
  chosen_spanish: cautividad
  alternatives_spanish:
  - cautiverio
  lexicon: LSJ
  rationale: Variante textual; las formas paralelas apuntan a αἰχμαλωσία.
- source_word: ἔνδεια
  english_pob_choice: want
  chosen_spanish: indigencia
  alternatives_spanish:
  - pobreza
  lexicon: LSJ
  rationale: Carencia o privación; conserva el ritmo del catálogo.
- source_word: ταραχή
  english_pob_choice: turmoil
  chosen_spanish: turbación
  alternatives_spanish:
  - confusión
  lexicon: LSJ
  rationale: Desorden interno y social.
- source_word: ἐρήμωσις
  english_pob_choice: desolation
  chosen_spanish: desolación
  alternatives_spanish:
  - devastación
  lexicon: LSJ
  rationale: Estado culminante de ruina; mantiene registro bíblico.
- source_word: ἐκδικίαις
  english_pob_choice: acts of vengeance
  chosen_spanish: actos de venganza
  alternatives_spanish:
  - castigos
  lexicon: LSJ
  rationale: Plural de juicios vengativos repetidos.
- source_word: παρεδόθη
  english_pob_choice: was handed over
  chosen_spanish: fue entregado
  alternatives_spanish:
  - fue consignado
  lexicon: LSJ
  rationale: Pasivo de consignación al juicio.
- source_word: πληγή
  english_pob_choice: plague
  chosen_spanish: plaga
  alternatives_spanish:
  - golpe
  lexicon: LSJ
  rationale: Golpe divinamente infligido en contexto punitivo.
- source_word: ἐρημοῦται
  english_pob_choice: was made desolate
  chosen_spanish: quedó desolado
  alternatives_spanish:
  - fue devastado
  lexicon: LSJ
  rationale: Resultativo que culmina el castigo de Caín.
theological_decisions:
- issue: Contraste moral entre la simplicidad y la duplicidad de Beliar
  chosen_reading: Se traduce διπλᾶ ... ἀπλότητα como 'dobles ... no hay simplicidad' para preservar el tema ético central.
  alternative_readings:
  - '''duplicadas... sin sinceridad'''
  rationale: La parénesis del capítulo depende de mantener el contraste conceptual.
- issue: Cronología y fórmula de castigo de Caín
  chosen_reading: Se conserva la secuencia de siete actos de venganza que culminan en desolación a los novecientos años.
  alternative_readings:
  - Suavizar la cifra para armonizar con Génesis
  rationale: El testimonio griego, aunque rugoso, debe conservarse antes que normalizarse.
