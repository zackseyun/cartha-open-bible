translation:
  language: es
  text: "7[a]. Y purifica su mente para no ser condenado por los hombres, e igualmente por Dios. Del mismo modo, las obras de Beliar también son dobles, y no hay simplicidad en ellas.\n\n\n    Por tanto, hijos míos[b], os digo: huid del mal de Beliar, porque da una espada a los que le obedecen. Y la espada es madre de siete males. Primero la mente concibe por medio de Beliar, y estos son sus partos: primero la envidia, segundo la destrucción, tercero la aflicción, cuarto la cautividad, quinto la indigencia, sexto la turbación, séptimo la desolación.\n\n\n    Por esto también Caín fue entregado por Dios a siete actos de venganza. Pues en cada centésimo año el Señor traía sobre él una plaga[c], y en el año novecientos quedó desolado."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El cuarto mal es textualmente incierto en la capa OCR del griego. Algunos testigos leen 'cautividad' (αἰχμαλωσία); aquí se adopta esa forma por encajar con la secuencia de calamidades.
    reason: textual_variant
  - marker: b
    text: '''Beliar'' es la forma del testimonio griego; muchos lectores conocerán el nombre como ''Belial''.'
    reason: lexical_alternative
  - marker: c
    text: 'La afirmación de que la espada es ''madre de siete males'' se explica con la metáfora de concepción/parto: la mente concibe por medio de Beliar y de ella nacen los siete males.'
    reason: cultural_note
