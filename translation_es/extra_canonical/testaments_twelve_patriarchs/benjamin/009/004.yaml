translation:
  language: es
  text: Y el velo del templo será rasgado, y el Espíritu de Dios pasará a las naciones, como fuego derramado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸ ἅπλωμα τοῦ ναοῦ
  english_pob_choice: veil of the temple
  chosen_spanish: velo del templo
  alternatives_spanish:
  - cortina del templo
  - manto del templo
  lexicon: LSJ
  rationale: Tras el pase de revisión, se adopta 'velo' como término sagrado consolidado en español, sin perder la imagen de tela del santuario.
- source_word: σχιζόμενον
  english_pob_choice: torn
  chosen_spanish: rasgado
  alternatives_spanish:
  - dividido
  - partido
  lexicon: LSJ
  rationale: '''Rasgado'' es la traducción bíblica estándar para σχίζω en este contexto.'
- source_word: μεταβήσεται τὸ πνεῦμα τοῦ Θεοῦ ἐπὶ τὰ ἔθνη
  english_pob_choice: the Spirit of God will pass over to the nations
  chosen_spanish: el Espíritu de Dios pasará a las naciones
  alternatives_spanish:
  - se transferirá a las naciones
  - vendrá sobre las naciones
  lexicon: BDAG
  rationale: μεταβαίνω indica movimiento/transición; 'pasará a' conserva ese sentido sin afirmaciones doctrinales más fuertes.
- source_word: ὥσπερ πῦρ ἐκχυνόμενον
  english_pob_choice: like fire being poured out
  chosen_spanish: como fuego derramado
  alternatives_spanish:
  - como fuego que se derrama
  lexicon: LSJ
  rationale: Imagen vívida; 'como fuego derramado' es idiomático y conserva el motivo del derramamiento.
