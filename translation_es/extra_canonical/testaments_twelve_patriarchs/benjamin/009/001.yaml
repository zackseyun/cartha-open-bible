  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: IX. Λέγω δὲ ὑμῖν καὶ πράξεις ἀπὸ λογίων Ἐνὼχ τοῦ δικαίου, *ὅτι πορνεύ(σ)ετε¹ πορνείαν Σοδόμων καὶ ἀπολε(ῖ)σθε ἕως βραχύ. Καὶ πάλιν ἀνανεωθήσεσθε καὶ ἡ βασιλεία Κυρίου οὐκ ἔσται ἐν ὑμῖν.
