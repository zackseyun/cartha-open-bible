base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/009/001.yaml
  text: And I tell you also, from the words of Enoch the righteous, that you will commit the fornication of Sodom, and you will perish for a little while. Then you will be renewed again, and the kingdom of the Lord will not be among you.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:47Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y os digo también, según las palabras de Enoc el justo, que cometeréis la fornicación de Sodoma y pereceréis por un poco de tiempo. Luego seréis renovados de nuevo, y el reino del Señor no estará entre vosotros.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πορνεύσετε / πορνείαν
  english_pob_choice: you will commit the fornication
  chosen_spanish: cometeréis la fornicación
  alternatives_spanish:
  - practicaréis la inmoralidad sexual
  - fornicaréis
  lexicon: BDAG
  rationale: La construcción doble verbo+sustantivo es enfática; 'cometeréis la fornicación' conserva el tono solemne y acusatorio característico del testamento.
- source_word: Σοδόμων
  english_pob_choice: of Sodom
  chosen_spanish: de Sodoma
  alternatives_spanish:
  - como Sodoma
  - de los sodomitas
  lexicon: LSJ
  rationale: Genitivo conservado con su fuerza alusiva al pecado proverbial de la ciudad.
- source_word: ἀπολεῖσθε ἕως βραχύ
  english_pob_choice: you will perish for a little while
  chosen_spanish: pereceréis por un poco de tiempo
  alternatives_spanish:
  - seréis destruidos por breve tiempo
  lexicon: BDAG
  rationale: La frase indica un período limitado de destrucción antes de la renovación; el español preserva esa limitación temporal.
- source_word: ἀνανεωθήσεσθε
  english_pob_choice: you will be renewed again
  chosen_spanish: seréis renovados de nuevo
  alternatives_spanish:
  - seréis restaurados
  - seréis hechos nuevos
  lexicon: BDAG
  rationale: Futuro pasivo de renovación tras el juicio; conserva el vínculo verbal con la novedad.
- source_word: βασιλεία Κυρίου
  english_pob_choice: kingdom of the Lord
  chosen_spanish: reino del Señor
  alternatives_spanish:
  - reinado del Señor
  lexicon: BDAG
  rationale: Equivalente bíblico estándar.
