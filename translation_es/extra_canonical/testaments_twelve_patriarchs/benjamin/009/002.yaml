id: T12P.BEN.9.2
reference: Testament of Benjamin 9:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: Πλὴν ἐν μερίδι ὑμῶν γενήσεται *ναὸς Θεοῦ¹⁴, καὶ *ἔσται ὁ ἔσχατος ἔνδοξος¹⁵ *ὑπὲρ τὸν πρῶτον¹⁶, καὶ *συναχθήσονται ἐκεῖ¹⁷ αἱ¹⁸ δώδεκα φυλαί, καὶ πάντα τὰ ἔθνη ἕως οὗ ὁ ὕψιστος ἀποστείλῃ¹⁹ τὸ σωτήριον αὐτοῦ²⁰ ἐν ἐπισκοπῇ μονογενοῦς προφήτου²¹. [3. Καὶ εἰσελεύσεται εἰς τὸν πρῶτον ναόν, καὶ ἐκεῖ Κύριος ὑβρισθήσεται²² *καὶ ἐπὶ ξύλου ὑψωθήσεται²³.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/009/002.yaml
  text: Nevertheless, in your allotted portion there will be the temple of God, and the latter will be more glorious than the former; and there the twelve tribes and all the nations will be gathered, until the Most High sends his salvation in the visitation of an only-begotten prophet.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:18Z'
    unchanged: false
    changes_summary: Revised 'the last ... the first' to 'the latter ... the former' for more natural English in this contrast, and adjusted the gathering clause so both 'the twelve tribes' and 'all the nations' are clearly subjects of 'will be gathered,' matching the Greek more closely.
translation:
  language: es
  text: Sin embargo, en vuestra porción asignada estará el templo de Dios, y el último[a] será más glorioso que el primero; y allí serán reunidas las doce tribus y todas las naciones, hasta que el Altísimo envíe su salvación en la visitación de un profeta unigénito[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'el último ... el primero'; muchos traductores prefieren 'el postrero' (cf. Ageo 2:9). Aquí se opta por una lectura clara y directa.
    reason: lexical_alternative
  - marker: b
    text: O 'de un profeta único' por μονογενοῦς; se conserva 'unigénito' por la fuerza léxica del término griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν μερίδι ὑμῶν
  english_pob_choice: in your allotted portion
  chosen_spanish: en vuestra porción asignada
  alternatives_spanish:
  - en vuestra parte
  - en vuestro territorio
  lexicon: LSJ
  rationale: Probable referencia al lote tribal de Benjamín; 'porción asignada' preserva el sentido de herencia.
- source_word: ναὸς Θεοῦ
  english_pob_choice: temple of God
  chosen_spanish: templo de Dios
  alternatives_spanish:
  - santuario de Dios
  lexicon: BDAG
  rationale: ναός se refiere al templo en esta secuencia profética.
- source_word: ὁ ἔσχατος ἔνδοξος ὑπὲρ τὸν πρῶτον
  english_pob_choice: the latter will be more glorious than the former
  chosen_spanish: el último será más glorioso que el primero
  alternatives_spanish:
  - el postrero será más glorioso que el primero
  lexicon: LSJ
  rationale: Conserva el contraste comparativo entre el primer y el último templo en español claro.
- source_word: συναχθήσονται
  english_pob_choice: will be gathered
  chosen_spanish: serán reunidas
  alternatives_spanish:
  - serán congregadas
  lexicon: BDAG
  rationale: Término profético estándar de reunión.
- source_word: τὸ σωτήριον αὐτοῦ
  english_pob_choice: his salvation
  chosen_spanish: su salvación
  alternatives_spanish:
  - su liberación
  lexicon: BDAG
  rationale: Conserva la concisión profética del genitivo.
- source_word: ἐν ἐπισκοπῇ
  english_pob_choice: in the visitation
  chosen_spanish: en la visitación
  alternatives_spanish:
  - en la visita
  lexicon: BDAG
  rationale: Idiom profético formal para una visitación divina decisiva.
- source_word: μονογενοῦς προφήτου
  english_pob_choice: of an only-begotten prophet
  chosen_spanish: de un profeta unigénito
  alternatives_spanish:
  - de un profeta único
  lexicon: BDAG
  rationale: μονογενής está cargado teológicamente; 'unigénito' conserva la fuerza léxica del testimonio griego.
theological_decisions:
- issue: Cómo traducir μονογενοῦς προφήτου
  chosen_reading: '''de un profeta unigénito'''
  alternative_readings:
  - '''de un profeta único'''
  - '''de un único hijo, profeta'''
  rationale: Se conserva la fuerza léxica de μονογενής en lugar de atenuarla.
translation_notes:
  revision_awareness: 'Pase de revisión gpt-5.4 (2026-04-23): cambió ''last/first'' a ''latter/former'' y aclaró que ''tribus'' y ''naciones'' comparten el sujeto del verbo; aplicado en el español usando ''el último''/''el primero'' con sujeto compuesto antes del verbo.'
  spanish_consistency_notes:
  - Κύριος → Señor; θεός → Dios; ναός → templo.
