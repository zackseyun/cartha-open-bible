base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/009/005.yaml
  text: And having gone up from Hades, he will pass from earth to heaven. And I knew how lowly he would be on earth, and how glorious in heaven.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:19Z'
    unchanged: false
    changes_summary: Adjusted the participle to 'having gone up' for closer alignment with the Greek, and changed 'I know' to 'I knew' to reflect the past tense ἔγνων.
translation:
  language: es
  text: Y habiendo subido del Hades[a], pasará de la tierra al cielo. Y supe cuán humilde sería en la tierra, y cuán glorioso en el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hades es la región de los muertos, no necesariamente el lugar final de castigo.
    reason: cultural_note
lexical_decisions:
- source_word: ἀνελθὼν ἐκ τοῦ ᾅδου
  english_pob_choice: having gone up from Hades
  chosen_spanish: habiendo subido del Hades
  alternatives_spanish:
  - después de subir del Hades
  - tras ascender del Hades
  lexicon: BDAG
  rationale: El participio aoristo se rinde con 'habiendo subido' para preservar el aspecto de acción previa.
- source_word: ᾅδης
  english_pob_choice: Hades
  chosen_spanish: Hades
  alternatives_spanish:
  - la región de los muertos
  - el seol
  lexicon: BDAG
  rationale: Se conserva 'Hades' en esta literatura para evitar las asociaciones de castigo eterno propias de 'infierno'.
- source_word: ταπεινός
  english_pob_choice: lowly
  chosen_spanish: humilde
  alternatives_spanish:
  - abatido
  - sometido
  lexicon: BDAG
  rationale: '''Humilde'' conserva tanto la humildad como la condición humilde, en contraste con la gloria celestial.'
- source_word: ἔνδοξος
  english_pob_choice: glorious
  chosen_spanish: glorioso
  alternatives_spanish:
  - lleno de gloria
  - honrado
  lexicon: BDAG
  rationale: Rendición directa que conserva la antítesis con 'humilde'.
- source_word: Ἔγνων
  english_pob_choice: I knew
  chosen_spanish: supe
  alternatives_spanish:
  - conocí
  lexicon: BDAG
  rationale: Aoristo de γινώσκω; 'supe' refleja el tiempo pasado del original.
translation_notes:
  revision_awareness: 'Pase de revisión gpt-5.4 (2026-04-23): ajustó ''when he has gone up'' a ''having gone up'' y ''I know'' a ''I knew'' para reflejar el aoristo griego; aplicado en español como ''habiendo subido'' y ''supe''.'
  spanish_consistency_notes:
  - ᾅδης → Hades, consistente con 8:7.
  - ταπεινός → humilde; ἔνδοξος → glorioso.
