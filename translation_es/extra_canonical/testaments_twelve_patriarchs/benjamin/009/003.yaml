  text: '[3. Καὶ εἰσελεύσεται εἰς τὸν πρῶτον ναόν, καὶ ἐκεῖ Κύριος ὑβρισθήσεται²² *καὶ ἐπὶ ξύλου ὑψωθήσεται²³.]'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/009/003.yaml
  text: And he will enter into the first temple, and there the Lord will be insulted and will be lifted up on wood.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:18Z'
    unchanged: false
    changes_summary: Replaced 'be treated with outrage' with the more natural and lexically direct 'be insulted'; streamlined the second clause by omitting the repeated subject in English while preserving the meaning.
translation:
  language: es
  text: Y entrará en el primer templo, y allí el Señor será insultado y será levantado sobre un madero[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Levantado sobre un madero'' es traducción literal del griego ἐπὶ ξύλου; comp. el modismo de ser alzado sobre un árbol o palo de ejecución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑβρισθήσεται
  english_pob_choice: be insulted
  chosen_spanish: será insultado
  alternatives_spanish:
  - será ultrajado
  - será afrentado
  lexicon: BDAG
  rationale: Tras el pase de revisión, se prefiere 'insultado' como rendición léxica directa de ὑβρίζω.
- source_word: ἐπὶ ξύλου ὑψωθήσεται
  english_pob_choice: will be lifted up on wood
  chosen_spanish: será levantado sobre un madero
  alternatives_spanish:
  - será alzado sobre un árbol
  - será elevado sobre un palo
  lexicon: BDAG
  rationale: ξύλον significa literalmente 'madera/árbol'; 'madero' conserva la fuerza literal y la resonancia escritural sin precipitar la lectura cristológica.
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  lexicon: BDAG
  rationale: Equivalente estándar; se conserva el referente sin sustitución interpretativa.
theological_decisions:
- issue: Referente de 'el Señor' en este versículo
  chosen_reading: Se conserva 'el Señor será insultado' sin sustitución interpretativa.
  alternative_readings:
  - '''el ungido del Señor será insultado'''
  - '''el profeta será insultado'''
  rationale: El texto griego dice Κύριος; preservamos la tensión teológica en lugar de armonizar.
translation_notes:
  revision_awareness: 'Pase de revisión gpt-5.4 (2026-04-23): se prefirió ''insultado'' sobre ''tratado con ultraje'' por ser más natural y léxicamente directo.'
  spanish_consistency_notes:
  - ξύλον → 'madero', consistente con 8:5.
  - Κύριος → Señor.
