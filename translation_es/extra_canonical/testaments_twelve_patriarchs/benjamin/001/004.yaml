  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: Ἡ γὰρ²⁰ Ῥαχὴλ μετὰ τὸ τεκεῖν²¹ τὸν Ἰωσὴφ δώδεκα ἔτη ἐστείρευσεν· καὶ προσηύξατο *πρὸς Κύριον²² μετὰ νηστείας²³, καὶ συλλαβοῦσα τέτοκέ²⁴ με.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/001/004.yaml
  text: For Rachel was barren for twelve years after she had borne Joseph; and she prayed to the Lord with fasting, and having conceived in fasting, she bore me.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: Adjusted the final clause to reflect that she conceived while fasting, preserving the source’s sequence and adding the missing fasting reference.
translation:
  language: es
  text: Porque Raquel estuvo estéril durante doce años después de haber dado a luz a José; y oró al Señor[a] con ayuno, y habiendo concebido, me dio a luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego πρὸς Κύριον, «al Señor». En el contexto pseudoepigráfico de los Testamentos, κύριος puede representar el nombre divino יהוה del Vorlage semítico original. Se sigue el griego conservado; véase decisión teológica.
    reason: theological_note
lexical_decisions:
- source_word: ἐστείρευσεν
  english_pob_choice: was barren
  chosen_spanish: estuvo estéril
  alternatives_spanish:
  - fue estéril
  - permaneció estéril
  lexicon: 'LSJ: στειρεύω — to be barren, to be without offspring'
  rationale: El aoristo ἐστείρευσεν describe un estado concluido de doce años. 'Estuvo estéril' (pretérito imperfecto aspectual de 'estar') captura en español el carácter durativo-terminado mejor que 'fue estéril', que suena más definitivo. 'Permaneció estéril' es posible pero añade un matiz de persistencia no exigido por el aoristo griego.
- source_word: μετὰ τὸ τεκεῖν / τέτοκέ με
  english_pob_choice: after she had borne Joseph / she bore me
  chosen_spanish: después de haber dado a luz a José / me dio a luz
  alternatives_spanish:
  - después de parir a José / me parió
  - tras haber engendrado a José / me engendró
  lexicon: 'LSJ: τίκτω — to bring forth, to bear (of a mother); τέτοκε is perfect of τίκτω'
  rationale: '''Dar a luz'' es la expresión española natural y digna para τίκτω en contexto de parto materno. La primera ocurrencia (infinitivo articular μετὰ τὸ τεκεῖν) se traduce ''después de haber dado a luz'', y la segunda (perfecto τέτοκέ με) como ''me dio a luz''. El perfecto griego τέτοκε indica acción completada con resultado presente al narrador; en español se neutraliza en el pretérito indefinido sin pérdida significativa de sentido.'
- source_word: προσηύξατο
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - rezó
  - suplicó
  lexicon: 'LSJ: προσεύχομαι — to pray, to offer prayer to'
  rationale: '''Oró'' traduce fielmente el aoristo προσηύξατο. ''Rezó'' es también válido pero en español latinoamericano neutro ''orar'' tiene connotaciones más bíblico-protestantes afines al registro del POB. ''Suplicó'' añadiría énfasis de ruego no exigido por el término.'
- source_word: νηστείας
  english_pob_choice: fasting
  chosen_spanish: ayuno
  alternatives_spanish:
  - con ayuno
  - en ayunas
  lexicon: 'LSJ: νηστεία — fasting, abstinence from food'
  rationale: '''Con ayuno'' traduce μετὰ νηστείας (genitivo tras μετά = ''acompañado de ayuno''). ''En ayunas'' describe más bien el estado puntual; ''ayuno'' como sustantivo con ''con'' mantiene el sentido instrumental del griego.'
- source_word: συλλαβοῦσα
  english_pob_choice: having conceived
  chosen_spanish: habiendo concebido
  alternatives_spanish:
  - al concebir
  - tras quedar encinta
  lexicon: 'LSJ: συλλαμβάνω (en contexto reproductivo) — to conceive'
  rationale: 'El participio aoristo συλλαβοῦσα es circunstancial-temporal: ''habiendo concebido'' reproduce fielmente la construcción participial previa al verbo principal. ''Al concebir'' es igualmente natural pero se acerca más a una traducción dinámica. Se mantiene ''habiendo concebido'' para respetar la secuencia narrativa del participio griego.'
theological_decisions:
- issue: πρὸς Κύριον — ¿«al Señor» o «a Yahvé»?
  english_pob_reading: to the Lord
  chosen_spanish_reading: al Señor
  alternative_spanish_readings:
  - a Yahvé
  - a Dios
  rationale: La norma del proyecto POB es usar «Yahvé» cuando la fuente es el Tetragrámaton hebreo. Aquí, sin embargo, la fuente inmediata es el griego Κύριον. Los Testamentos de los Doce Patriarcas se conservan en griego, y aunque probablemente tengan un Vorlage semítico, la tradición textual que se traduce es la griega de Charles 1908. En ese texto κύριος puede representar יהוה o bien אֲדֹנָי (Adonai); la incertidumbre textual y la naturaleza del documento (pseudoepígrafo de transmisión cristiana) no permiten afirmar con seguridad que κύριον aquí recubra el Tetragrámaton. Se emplea «Señor» siguiendo el griego Κύριον y en coherencia con la traducción inglesa del POB, y se documenta la alternativa «Yahvé» como opción si análisis filológico posterior del Vorlage semítico lo justificara.
  doctrine_reference: 'Proyecto POB — Terminología española por defecto: «Si la fuente inmediata es el griego κύριος citando o aludiendo al nombre divino, explicar la decisión.»'
translation_notes:
  revision_awareness: La revisión inglesa (2026-05-03, gpt-5.4-mini) modificó la cláusula final de «after conceiving she bore me» a «having conceived in fasting, she bore me», añadiendo «in fasting» a la cláusula de concepción. Sin embargo, el griego fuente solo dice «καὶ συλλαβοῦσα τέτοκέ με» —sin segunda mención explícita de νηστείας en esa posición. La frase μετὰ νηστείας del griego está sintácticamente vinculada a la oración de oración (προσηύξατο), no al participio de concepción. La traducción española sigue el griego estrictamente y no repite «ayuno» en la cláusula final, divergiendo conscientemente de la revisión inglesa en este punto para evitar adición interpretativa no respaldada por el texto fuente.
  spanish_consistency_notes:
  - «Raquel» se usa como forma española estándar del nombre (no «Rajel»), coherente con el registro del POB para nombres bíblicos de uso consolidado en español.
  - «José» en lugar de transliteración «Yosef»; nombre bíblico con forma española establecida.
  - «Dio a luz» se prefiere a «parió» para mantener dignidad de registro sin ser arcaico.
  - La partícula «Porque» al inicio refleja el γάρ griego con función causal-explicativa, en coherencia con el uso del POB inglés de «For».
