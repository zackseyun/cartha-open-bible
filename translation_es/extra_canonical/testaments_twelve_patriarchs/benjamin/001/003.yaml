id: T12P.BEN.1.3
reference: Testament of Benjamin 1:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: '*Καὶ ἐπειδὴ¹⁶ Ῥαχὴλ *ἡ μήτηρ μου¹⁷ τέθνηκε¹⁸ γεννῶσά με, *γάλα οὐκ ἔσχον· Βαλλὰν οὖν τὴν παιδίσκην αὐτῆς ἐθήλασα¹⁹.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/001/003.yaml
  text: And since Rachel, my mother, died while giving birth to me, I had no milk; so I was nursed by Bilhah, her slave-girl.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: Adjusted punctuation for the parenthetical ‘my mother’; rendered παιδίσκην more literally as ‘slave-girl’ instead of ‘maidservant’; retained the rest of the draft.
translation:
  language: es
  text: Y ya que Raquel, mi madre, murió al darme a luz, no tuve leche; así que me amamantó Bilha, su esclava[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: παιδίσκη es un diminutivo de παῖς que designa propiamente a una «muchacha esclava» o «joven sirvienta». La revisión inglesa del POB prefirió «slave-girl» sobre «maidservant» para preservar la fuerza del estatus de esclavitud. El español «esclava» recoge ese matiz; la connotación de juventud implícita en el diminutivo griego no se reproduce plenamente, si bien «joven esclava» sería una alternativa más explícita aunque más voluminosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπειδὴ
  english_pob_choice: since
  chosen_spanish: ya que
  alternatives_spanish:
  - puesto que
  - dado que
  - pues
  lexicon: 'BDAG ἐπειδή: conjunción causal-temporal ''puesto que, ya que, cuando'''
  rationale: «Ya que» es la conjunción causal más natural en español latinoamericano moderno. Mantiene el doble matiz causal y temporal del griego ἐπειδὴ sin resultar arcaica.
- source_word: Ῥαχήλ
  english_pob_choice: Rachel
  chosen_spanish: Raquel
  lexicon: Nombre propio hebreo רָחֵל; transliteración española estándar bíblica
  rationale: «Raquel» es la forma canónica en español para la matriarca (cf. Gén 29:6 en RVR, BLP, NVI). No hay variantes viables.
- source_word: τέθνηκε
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - ha muerto
  lexicon: 'BDAG θνήσκω: morir; perfecto indicativo activo τέθνηκε'
  rationale: El perfecto griego τέθνηκε expresa el estado resultante de la muerte acaecida al nacer Benjamín. En el relato narrativo español, el pretérito indefinido «murió» es la forma idiomática en el español neutro latinoamericano para referirse a un evento puntual del pasado. «Ha muerto» (perfecto peninsular) sería menos neutral para el público objetivo.
- source_word: γεννῶσά με
  english_pob_choice: while giving birth to me
  chosen_spanish: al darme a luz
  alternatives_spanish:
  - cuando me daba a luz
  - dándome a luz
  - en el parto
  lexicon: 'BDAG γεννάω: engendrar, dar a luz; participio presente activo femenino nominativo γεννῶσα'
  rationale: «Al darme a luz» es la perífrasis más natural en español latinoamericano para un participio de acción simultánea. Mantiene la concisión del original y expresa claramente que la muerte ocurrió en el acto mismo del parto.
- source_word: γάλα οὐκ ἔσχον
  english_pob_choice: I had no milk
  chosen_spanish: no tuve leche
  alternatives_spanish:
  - no tuve leche materna
  lexicon: 'BDAG γάλα: leche; ἔχω aoristo ἔσχον: tener'
  rationale: Traducción directa del griego. El orden «no tuve leche» sigue el énfasis negativo del griego (γάλα οὐκ ἔσχον) y resulta natural en español. No se añade «materna» ya que el original no lo especifica.
- source_word: Βαλλάν
  english_pob_choice: Bilhah
  chosen_spanish: Bilha
  alternatives_spanish:
  - Bala
  lexicon: Nombre propio hebreo בִּלְהָה; transliteración española convencional
  rationale: «Bilha» es la forma estándar en las principales traducciones bíblicas al español (cf. Gén 29:29 en RVR1960, NVI, BLP). «Bala» aparece en traducciones más antiguas pero es menos reconocible en el contexto latinoamericano actual.
- source_word: παιδίσκην
  english_pob_choice: slave-girl
  chosen_spanish: esclava
  alternatives_spanish:
  - joven esclava
  - sierva
  - criada
  lexicon: 'BDAG παιδίσκη: muchacha, joven esclava, sirvienta (diminutivo de παῖς)'
  rationale: La revisión inglesa del POB (2026-05-03) reemplazó «maidservant» por «slave-girl» para reflejar con mayor precisión el estatus de esclavitud del término. El español «esclava» preserva esa fuerza semántica. La connotación diminutiva de juventud implícita en παιδίσκη se consigna en la nota [a]. «Sierva» o «criada» atenúan el estatus de esclavitud y se descartan conforme a los criterios del proyecto (δοῦλος/παιδίσκη → «esclavo/esclava» salvo razón documentada).
- source_word: ἐθήλασα
  english_pob_choice: I was nursed by
  chosen_spanish: me amamantó
  alternatives_spanish:
  - fui amamantado por
  - mamé de
  lexicon: 'BDAG θηλάζω: mamar, dar de mamar; aoristo activo 1.ª persona singular ἐθήλασα'
  rationale: El griego emplea el activo de primera persona («yo mamé/amamanté de Bilha»); el inglés POB lo traduce en voz pasiva por idiomatismo. El español «me amamantó Bilha» hace a Bilha sujeto explícito de la acción de amamantar, que es semánticamente preciso y más natural que la pasiva «fui amamantado por». No se aleja del sentido del original.
theological_decisions:
- issue: Ausencia de nombre divino o contenido teológico directo
  english_pob_reading: Biographical narrative; no theological tension noted
  chosen_spanish_reading: Ninguna decisión teológica especial requerida
  rationale: Este versículo es narración autobiográfica de Benjamín sobre su nacimiento y lactancia. No contiene el nombre divino, terminología cristológica, ni tensión doctrinal. No aplica la convención Yahvé/SEÑOR.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La revisión inglesa del POB (2026-05-03, modelo gpt-5.4-mini) introdujo dos cambios: (1) añadió coma para marcar «my mother» como aposición parentética, y (2) reemplazó «maidservant» por «slave-girl» para παιδίσκη. El borrador español incorpora ambas decisiones: la coma tras «Raquel» marca igualmente la aposición «mi madre», y «esclava» sigue la opción léxica más literal aprobada en la revisión.'
  spanish_consistency_notes:
  - El nombre divino Yahvé no aparece en este versículo; la convención YHWH → «Yahvé» no aplica.
  - «Raquel» (Ῥαχήλ) sigue la transliteración española estándar bíblica.
  - «Bilha» (Βαλλάν) sigue la transliteración española estándar bíblica (cf. Gén 29:29 en RVR, NVI, BLP).
  - «Esclava» para παιδίσκη es coherente con la política del proyecto de preservar la fuerza léxica de los términos de esclavitud, en paralelo con δοῦλος → «esclavo».
  - No aparece terminología de Mesías, Espíritu, justicia ni gracia; no hay conflictos con los valores terminológicos del proyecto.
