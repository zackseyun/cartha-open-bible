base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/001/001.yaml
  text: The Copy of the Words of Benjamin[a], the twelfth son of Jacob, and Benjamin's Copy of the Words, which he set in order for his sons, after he lived one hundred and twenty-five years.
  revision_pass:
