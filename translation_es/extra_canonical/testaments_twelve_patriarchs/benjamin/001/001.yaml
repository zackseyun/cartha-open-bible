translation:
  language: es
  text: Testamento de Benjamín, el duodécimo hijo de Jacob y Raquel. I. Copia de las palabras[a] de Benjamín, que él dispuso[b] para sus hijos, después de haber vivido[c] ciento veinticinco años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Gr. λόγων (genitivo plural de λόγος): el término abarca «palabras», «dichos» y «enseñanzas». Se elige «palabras» por ser la opción más amplia e inmediata como título de un documento testamentario.'
    reason: lexical_alternative
  - marker: b
    text: 'Gr. διέθετο (aoristo medio de διατίθημι): con sentido de ordenar o disponer formalmente, en contexto testamentario puede traducirse también como «ordenó» o «legó».'
    reason: lexical_alternative
  - marker: c
    text: 'Gr. ζήσας (participio aoristo de ζάω): participio de tiempo anterior; «después de haber vivido» explicita la secuencia temporal. Una traducción alternativa igualmente válida es «habiendo vivido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διαθήκη
  english_pob_choice: (title rendered implicitly in revised English as title clause)
  chosen_spanish: Testamento
  alternatives_spanish:
  - Pacto
  - Alianza
  - Última voluntad
  lexicon: BDAG διαθήκη 1–2
  rationale: Διαθήκη can mean 'covenant/alliance' (theological) or 'testament/will' (legal-literary). In this genre—the Testaments of the Twelve Patriarchs—the word functions as the formal title of a testamentary farewell document, not as a theological covenant formula. 'Testamento' is the most transparent and accurate rendering in Spanish; 'Pacto' or 'Alianza' would import theological weight the title does not carry here.
- source_word: Ἀντίγραφον
  english_pob_choice: Copy
  chosen_spanish: Copia
  alternatives_spanish:
  - Transcripción
  - Ejemplar
  - Traslado
  lexicon: LSJ ἀντίγραφον
  rationale: Ἀντίγραφον denotes a written copy or transcript of a document. 'Copia' is the most natural and direct Spanish equivalent, preserving the documentary sense that the text being introduced is a transmitted record of Benjamin's final words.
- source_word: λόγων
  english_pob_choice: Words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - enseñanzas
  - discurso
  - palabras finales
  lexicon: BDAG λόγος 1a
  rationale: Λόγων is the genitive plural of λόγος. In this title formula it refers to the spoken and then recorded final words or teachings of the patriarch. 'Palabras' is the broadest and most natural Spanish equivalent; 'dichos' (sayings) or 'enseñanzas' (teachings) could capture more didactic nuance but would narrow the semantic range unnecessarily for a title.
- source_word: διέθετο
  english_pob_choice: set in order
  chosen_spanish: dispuso
  alternatives_spanish:
  - ordenó
  - legó
  - encomendó
  - dejó
  lexicon: LSJ διατίθημι A.II; BDAG διατίθεμαι 2
  rationale: Διέθετο is the aorist middle of διατίθημι, meaning 'to arrange, order, dispose, or set out in order.' In a testamentary context it carries the nuance of formally laying out or bequeathing instructions. 'Dispuso' preserves both the sense of deliberate arrangement and the testamentary formality. The English POB's 'set in order' is accurate; 'dispuso' is its closest natural Spanish counterpart.
- source_word: ζήσας
  english_pob_choice: after he lived
  chosen_spanish: después de haber vivido
  alternatives_spanish:
  - habiendo vivido
  - tras vivir
  lexicon: BDAG ζάω 1a
  rationale: Ζήσας is an aorist active participle of ζάω ('to live'), expressing temporal antecedence. The English POB revised from 'having lived' to 'after he lived' to foreground the temporal sequence. 'Después de haber vivido' reproduces this temporal force naturally in Spanish, making the chronological frame explicit. The alternative 'habiendo vivido' would be equally grammatical but slightly more formal and less immediately clear about the sequence.
theological_decisions:
- issue: Διαθήκη as genre title vs. theological covenant
  english_pob_reading: 'Title clause added in revision: ''The Testament of Benjamin, twelfth son of Jacob and Rachel'''
  chosen_spanish_reading: Testamento de Benjamín, el duodécimo hijo de Jacob y Raquel
  alternative_spanish_readings:
  - Pacto de Benjamín
  - Alianza de Benjamín
  rationale: In the Testaments of the Twelve Patriarchs, Διαθήκη is not functioning as a theological term for the Mosaic or Abrahamic covenant but as the literary-genre label for a patriarch's farewell testament. Rendering it 'Testamento' avoids importing a covenantal theology that is not operative in the title. Theological covenant language ('Pacto,' 'Alianza') belongs to the biblical corpus and would mislead readers about the genre of this extracanonical document.
  doctrine_reference: 'Extracanonical genre: Testaments of the Twelve Patriarchs; cf. Charles 1908 introduction'
translation_notes:
  revision_awareness: 'The English POB underwent a significant revision (2026-05-03, azure-gpt-5.4-mini) that added the missing opening title clause derived from «Διαθήκη Βενιαμὴν τοῦ ιβ´ υἱοῦ Ἰακὼβ καὶ Ῥαχήλ» and adjusted the rendering of ζήσας from ''having lived'' to ''after he lived.'' The Spanish draft incorporates both Greek structural elements independently from the source rather than following the English POB mechanically: (1) the title header rendered as «Testamento de Benjamín, el duodécimo hijo de Jacob y Raquel» and (2) the Chapter I opening rendered as «Copia de las palabras de Benjamín, que él dispuso para sus hijos, después de haber vivido ciento veinticinco años.» The cross-check status (needs_review, agreement 0.74) flagged the earlier missing title clause; the Spanish draft addresses this structurally by grounding directly in the Greek. The English POB''s revised text still reads awkwardly with a doubled phrase («The Copy of the Words of Benjamin... and Benjamin''s Copy
    of the Words»); the Spanish resolves this by presenting the two Greek parts as a clean title-plus-chapter-opening sequence without repetition.'
  spanish_consistency_notes:
  - «Benjamín» lleva tilde conforme a las normas de acentuación del español (esdrújula implícita no aplica; es aguda terminada en n, por lo que sí lleva tilde).
  - «Raquel» es la forma estándar española del nombre hebreo/griego Ῥαχήλ; se prefiere a transliteraciones como «Rahel».
  - «Jacob» se mantiene igual en español; no se cambia a «Jacobo» para respetar la forma bíblica más reconocida en el canon castellano.
  - «Testamento» (con mayúscula inicial como parte del título del documento) sigue la convención española de capitalizar títulos de obras o documentos.
  - El numeral «I.» se conserva en el texto para reflejar la estructura de capítulo presente en la fuente griega (I. Ἀντίγραφον...).
  - No aparece el nombre divino (Yahvé/YHWH) ni terminología cristológica en este versículo; las convenciones de proyecto para esos términos no se aplican aquí.
