translation:
  language: es
  text: Por esto fui llamado Benjamín[a], que significa hijo de los días. Ella me dio a luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre hebreo בִּנְיָמִין (Binyamín) significa habitualmente «hijo de la mano derecha». El texto griego de este pasaje ofrece la etimología alternativa υἱὸς ἡμερῶν («hijo de los días»), posiblemente aludiendo a la avanzada edad de Jacob cuando nació Benjamín (cf. Gn 44,20). No se armoniza con la etimología hebrea estándar.
    reason: textual_variant
lexical_decisions:
- source_word: Διὰ τοῦτο
  english_pob_choice: Because of this
  chosen_spanish: Por esto
  alternatives_spanish:
  - Por esta razón
  - A causa de esto
  - Por ello
  lexicon: BDAG διά III.B.2 (causal/inferential); τοῦτο as anaphoric demonstrative
  rationale: '''Por esto'' is the most natural and concise causal connector in modern neutral Spanish, rendering the inferential force of διὰ τοῦτο without padding. ''Por esta razón'' is equally valid but slightly more expansive than the Greek warrants here.'
- source_word: ἐκλήθην
  english_pob_choice: I was called
  chosen_spanish: fui llamado
  alternatives_spanish:
  - me fue dado el nombre
  - recibí el nombre de
  lexicon: BDAG καλέω 1.b (to give a name, name); aorist passive indicative 1sg
  rationale: '''Fui llamado'' preserves both the passive voice and the aorist (punctiliar past) of ἐκλήθην, keeping the grammatical form that situates the naming as a completed act. Periphrastic alternatives such as ''me fue dado el nombre'' are acceptable but add unnecessary weight.'
- source_word: ὅ ἐστιν
  english_pob_choice: which means
  chosen_spanish: que significa
  alternatives_spanish:
  - lo que es
  - es decir
  lexicon: ὅ (neuter relative pronoun) + ἐστιν (copula); standard Greek formula for introducing a translational gloss or etymological explanation
  rationale: '''Que significa'' is the standard Spanish formula for introducing a name''s meaning (cf. Mark 5:41; John 1:38 in modern Spanish versions). It renders the explanatory force of ὅ ἐστιν more naturally than the more literal ''lo que es''.'
- source_word: υἱὸς ἡμερῶν
  english_pob_choice: son of days
  chosen_spanish: hijo de los días
  alternatives_spanish:
  - hijo de días
  - hijo de los tiempos
  lexicon: υἱός = son (BDAG 1.a); ἡμέρα = day (BDAG 1, 2); genitive plural ἡμερῶν = of days
  rationale: Rendered literally as 'hijo de los días' to preserve the text's stated etymology without harmonizing it to the standard Hebrew derivation ('hijo de la mano derecha', from בֶּן-יָמִין). The definite article ('de los días') is natural Spanish idiom for this kind of nominal genitive construction. A footnote records the etymological tension. 'Hijo de días' (without article) is a possible alternative but is less idiomatic in Spanish.
- source_word: ἔτεκέν με (implied closing clause, added per revision)
  english_pob_choice: She bore me.
  chosen_spanish: Ella me dio a luz.
  alternatives_spanish:
  - Ella me parió.
  - Me trajo al mundo.
  lexicon: τίκτω = to give birth, bear (BDAG 1); aorist active 3sg ἔτεκεν
  rationale: '''Dio a luz'' is the standard dignified Spanish rendering of giving birth, widely understood across Latin America. ''Me parió'' is more literal and colloquially available but carries a blunter register less fitting for a narrative of this kind. ''Me trajo al mundo'' is paraphrastic beyond the source evidence. The subject ''Ella'' (she) makes the implicit referent—Rachel—explicit in Spanish, matching how the English POB rendered it, and is appropriate since the referent was established contextually in preceding verses.'
theological_decisions:
- issue: Etymology of 'Benjamin' as 'son of days' versus standard 'son of the right hand'
  english_pob_reading: which means son of days
  chosen_spanish_reading: que significa hijo de los días
  alternative_spanish_readings:
  - que significa hijo de la mano derecha (harmonized to Hebrew standard)
  rationale: The standard Hebrew etymology of בִּנְיָמִין (Binyamín) is 'son of the right hand' (בֶּן + יָמִין). The Greek text of the Testament of Benjamin, however, gives υἱὸς ἡμερῶν ('son of days'), which is a secondary tradition likely reflecting the tradition that Jacob was 'advanced in days' (an old man) when Benjamin was born, and/or a folk-etymological play on the name. The Spanish translation reproduces the text's own stated etymology without harmonizing it to the Hebrew, preserving the textual witness of this pseudepigraphal work. A footnote flags the discrepancy for the reader.
  doctrine_reference: T12P.BEN.1.6 (source text); cf. Gen 35:18; Gen 44:20 (Jacob's old age); Charles 1908 apparatus fn. 30
translation_notes:
  revision_awareness: 'La revisión del 2026-05-03 (adjudicador: azure-gpt-5.4-mini-revision-pass) añadió al texto inglés la cláusula final «She bore me.» para reflejar las palabras de cierre del texto fuente que estaban ausentes en el borrador anterior. La traducción española incorpora esta cláusula como «Ella me dio a luz.», coherente con el texto griego subyacente (cf. τίκτω). El texto fuente griego tal como se muestra en el paquete canónico no presenta explícitamente esta cláusula final; la revisión la recuperó de la tradición manuscrita. El estado de cross-check indica acuerdo moderado (0.78) con veredicto de needs-revision; la presente traducción española refleja el estado post-revisión del texto inglés.'
  spanish_consistency_notes:
  - No aparece el nombre divino (יהוה / κύριος) en este versículo; la convención de 'Yahvé' no se aplica aquí.
  - Benjamin se translitера como 'Benjamín' (con tilde en la sílaba final), forma estándar en español para este nombre propio.
  - La cláusula 'Ella me dio a luz' utiliza sujeto explícito 'Ella' para claridad referencial, ya que el referente (Raquel) se establece contextualmente en versículos anteriores pero no está presente en este versículo aislado.
  - No se emplean términos de la terminología-default del proyecto (Yahvé, Mesías, esclavo, etc.) porque este versículo no los contiene.
