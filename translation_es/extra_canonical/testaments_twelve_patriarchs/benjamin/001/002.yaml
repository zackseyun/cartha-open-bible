source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: '*Καταφιλήσας δὲ αὐτοὺς¹⁰ εἶπεν¹¹. Ὥσπερ¹² Ἰσαὰκ *ἐτέχθη τῷ Ἀβραὰμ ἐν γήρει αὐτοῦ¹³, οὕτως κἀγὼ τῷ¹⁴ Ἰακώβ¹⁵.'
