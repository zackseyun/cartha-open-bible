base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/001/002.yaml
  text: 'And after kissing them, he said: “Just as Isaac was born to Abraham in his old age, so I also was born to Jacob.”'
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: Added quotation marks to reflect the direct speech in the source and preserved the full comparison with Isaac and Abraham.
translation:
  language: es
  text: 'Y después de besarlos[a], dijo: «Así como Isaac nació a Abraham en su vejez, así también yo nací a Jacob».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El verbo griego καταφιλέω lleva el preverbio κατα-, que añade intensidad afectiva: ''besar con ternura / efusivamente''. La traducción ''besarlos'' refleja la acción sin añadir un calificativo que el texto griego expresa morfológicamente, no léxicamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καταφιλήσας
  english_pob_choice: after kissing them
  chosen_spanish: después de besarlos
  alternatives_spanish:
  - habiéndolos besado efusivamente
  - tras abrazarlos y besarlos
  lexicon: 'BDAG καταφιλέω: ''to kiss with evident affection; kiss warmly/tenderly'''
  rationale: El verbo καταφιλέω lleva el preverbio κατα-, que añade intensidad afectiva al beso ('besar con ternura, efusivamente'). El inglés POB eligió la forma simple 'after kissing them' sin marcar esa intensidad. En español 'después de besarlos' es la construcción más natural para el participio aoristo de acción previa; la nota al pie preserva la fuerza del compuesto griego para el lector informado.
- source_word: ἐτέχθη τῷ Ἀβραὰμ
  english_pob_choice: was born to Abraham
  chosen_spanish: nació a Abraham
  alternatives_spanish:
  - le nació a Abraham
  - nació de Abraham
  lexicon: 'LSJ τίκτω (pasivo): ''nacer, ser dado a luz'''
  rationale: El aoristo pasivo ἐτέχθη de τίκτω equivale con precisión al español 'nació'. El dativo τῷ Ἀβραὰμ expresa el beneficiario/poseedor ('nació para Abraham / le nació a Abraham'). Se elige 'nació a Abraham' por registro más formal y fidelidad directa al texto; 'le nació a Abraham' es igualmente válida y algo más idiomática, registrada como alternativa.
- source_word: ἐν γήρει αὐτοῦ
  english_pob_choice: in his old age
  chosen_spanish: en su vejez
  alternatives_spanish:
  - en su ancianidad
  lexicon: 'LSJ γῆρας: ''vejez, ancianidad'''
  rationale: '''En su vejez'' es la traducción estándar y natural de ἐν γήρει αὐτοῦ en español moderno. ''En su ancianidad'' es igualmente precisa y algo más solemne; se reserva como alternativa aceptable.'
- source_word: κἀγὼ (καὶ ἐγώ)
  english_pob_choice: so I also
  chosen_spanish: así también yo
  alternatives_spanish:
  - y también yo
  - igualmente yo
  lexicon: 'κἀγώ es crasis de καί + ἐγώ: ''y yo, también yo'''
  rationale: La crasis κἀγώ une el valor aditivo de καί ('también') con el pronombre enfático ἐγώ. En la correlación Ὥσπερ…οὕτως κἀγώ, el 'así' de la apódosis ya está contenido en οὕτως; se conserva en 'así también yo' para reflejar ambos elementos sin redundancia excesiva.
- source_word: Ὥσπερ…οὕτως
  english_pob_choice: Just as…so
  chosen_spanish: Así como…así también
  alternatives_spanish:
  - Del mismo modo que…así
  lexicon: 'Ὥσπερ: ''así como, del mismo modo que''; οὕτως: ''así, de este modo'''
  rationale: La correlación comparativa Ὥσπερ…οὕτως es un giro clásico. En español 'Así como…así también' es la correlación más directa y de buen registro para un texto de carácter testamentario-solemne.
theological_decisions:
- issue: Paralelismo tipológico Isaac–Benjamín
  english_pob_reading: Just as Isaac was born to Abraham in his old age, so I also was born to Jacob.
  chosen_spanish_reading: Así como Isaac nació a Abraham en su vejez, así también yo nací a Jacob.
  alternative_spanish_readings:
  - Del mismo modo que Isaac le nació a Abraham en su ancianidad, así también yo le nací a Jacob.
  rationale: 'Benjamín se presenta implícitamente como análogo a Isaac: hijo de la vejez del patriarca, nacido en circunstancias especiales (cf. Gn 35,18, la muerte de Raquel). El texto no explica el paralelo; la traducción española lo preserva sin añadir ni quitar. No hay terminología divina ni cristológica que requiera decisión especial en este versículo.'
  doctrine_reference: T12P.BEN.1.2 — paralelo narrativo con Gn 21,2 (nacimiento de Isaac en vejez de Abraham) y Gn 35,16-18 (nacimiento de Benjamín)
translation_notes:
  revision_awareness: La revisión registrada (2026-05-03) añadió comillas al discurso directo en el inglés POB para reflejar el habla directa del griego fuente. La traducción española incorpora esta corrección usando guillemets angulares («…»), convención tipográfica estándar del español.
  spanish_consistency_notes:
  - No aparece el nombre divino (יהוה/YHWH) ni κύριος en este versículo; no aplica la norma 'Yahvé'.
  - No aparece Χριστός/Mesías ni Ἰησοῦς; no aplica ninguna norma de terminología cristológica.
  - 'Los nombres propios Ἰσαάκ, Ἀβραάμ, Ἰακώβ se transliteran según la forma española establecida: Isaac, Abraham, Jacob.'
  - El texto pertenece a los Testamentos de los Doce Patriarcas (pseudoepigráfico); se mantiene el registro solemne apropiado para la literatura testamentaria.
