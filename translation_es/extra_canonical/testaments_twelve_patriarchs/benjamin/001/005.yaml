translation:
  language: es
  text: Pues mi padre amaba a Raquel sobremanera,[a] y oraba[b] por ver dos hijos de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Gr. σφόδρα, adverbio de grado máximo: ''en gran manera,'' ''con ardor,'' ''con fervor'' son alternativas igualmente válidas.'
    reason: lexical_alternative
  - marker: b
    text: 'Gr. ηὔχετο (εὔχομαι), imperfecto: puede significar ''oraba'' (petición dirigida a Dios) o ''anhelaba/deseaba'' (deseo intenso). En el contexto de los Testamentos, la acepción de oración es preferida; ''anhelaba ver dos hijos de ella'' conserva la dimensión del deseo sin aludir explícitamente a Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σφόδρα
  english_pob_choice: exceedingly
  chosen_spanish: sobremanera
  alternatives_spanish:
  - en gran manera
  - con ardor
  - intensamente
  - con fervor
  lexicon: 'BDAG: σφόδρα — ''greatly, exceedingly, very much'' (adverb of extreme degree); LSJ confirms intensity usage throughout Hellenistic Greek.'
  rationale: Σφόδρα is a strong intensity adverb. 'Sobremanera' is dignified, modern, broadly intelligible Spanish that preserves the extreme degree without being archaic. 'En gran manera' (more analytical) and 'con ardor' (more affective) are acceptable alternatives; 'sobremanera' best matches the adverbial force of the source while fitting the elevated register of the Testaments.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Ya que
  lexicon: 'BDAG: γάρ — explanatory/causal postpositive particle. Must be fronted in Spanish syntax.'
  rationale: Greek γάρ is postpositive but introduces an explanation or reason. Spanish requires fronting; 'Pues' functions as the standard explanatory-connective opener ('for,' 'you see'), matching the mild explanatory rather than strictly causal force. 'Porque' would imply a stronger causal clause, which the particle does not require here.
- source_word: ἠγάπα (ἀγαπάω)
  english_pob_choice: loved
  chosen_spanish: amaba
  alternatives_spanish:
  - quería
  lexicon: 'BDAG: ἀγαπάω — ''to love,'' frequently of deep personal affection in Jewish and early Christian texts; imperfect tense here signals ongoing, habitual action.'
  rationale: The Greek imperfect ἠγάπα conveys continuous or habitual past love. Spanish imperfect 'amaba' naturally mirrors this aspect. 'Quería' is a common Spanish equivalent of 'love/care for' but lacks the same depth of register; 'amaba' is more precise and dignified for this literary context.
- source_word: ηὔχετο (εὔχομαι)
  english_pob_choice: prayed
  chosen_spanish: oraba
  alternatives_spanish:
  - anhelaba
  - rogaba
  - suplicaba
  - deseaba
  lexicon: 'BDAG: εὔχομαι — (1) ''to pray,'' petition addressed to God; (2) ''to wish, desire.'' The imperfect ηὔχετο indicates ongoing petition or yearning. In Jewish-Hellenistic literature, sense (1) predominates when the subject is a patriarch seeking divine favor.'
  rationale: In the narrative world of the Testaments of the Twelve Patriarchs, Jacob's longing for children from Rachel is framed as a persistent prayer to God (cf. Gen 30). The imperfect ηὔχετο supports ongoing petition. 'Oraba' (prayed) captures this theological nuance and matches the English POB choice. 'Anhelaba' (yearned/longed) preserves the desire sense but loses the prayer/petition direction toward God; it is noted in the footnote as an alternative. 'Rogaba' can suggest petition but is slightly more generic in Spanish; 'oraba' is clearer as directed prayer.
- source_word: δύο υἱοὺς ἰδεῖν ἐξ αὐτῆς
  english_pob_choice: to see two sons from her
  chosen_spanish: ver dos hijos de ella
  alternatives_spanish:
  - tener dos hijos de ella
  - contemplar dos hijos nacidos de ella
  lexicon: 'ἰδεῖν: aorist infinitive of ὁράω — ''to see''; δύο υἱούς: accusative object; ἐξ αὐτῆς: ''from her,'' source/origin preposition.'
  rationale: The infinitive ἰδεῖν ('to see') is preserved literally as 'ver' — Jacob prays to live to see two sons, not merely to 'have' them ('tener'), which would insert an idea not in the source. 'De ella' is natural Spanish for ἐξ αὐτῆς ('from her'). The phrase is rendered literally and idiomatically without paraphrase.
theological_decisions:
- issue: 'Semantic range of ηὔχετο (εὔχομαι): prayer vs. wish/desire'
  english_pob_reading: prayed
  chosen_spanish_reading: oraba
  alternative_spanish_readings:
  - anhelaba
  - deseaba ver
  rationale: εὔχομαῖ in Hellenistic Jewish literature regularly denotes actual prayer addressed to God, especially in patriarchal narratives where a figure petitions God for offspring. The Testament of Benjamin belongs to a genre that consistently portrays the patriarchs as men of prayer. The imperfect ηὔχετο (ongoing petition) reinforces this. 'Oraba' (prayed) is therefore the most theologically coherent Spanish rendering and aligns with the English POB's choice. The semantic alternative 'anhelaba' (yearned/longed for) is flagged in the footnote for readers who prefer a translation that holds both senses open.
  doctrine_reference: Testaments of the Twelve Patriarchs, genre of patriarchal prayer/petition; cf. Genesis 30 (Rachel and Jacob's prayer for children); Charles 1908 critical apparatus.
translation_notes:
  revision_awareness: El paso de revisión más reciente (2026-05-03, gpt-5.4-mini) marcó la versión inglesa como sin cambios necesarios. La verificación cruzada señaló acuerdo alto (0,95) con un dictamen de 'minor-issues' en un solo paso, sin problemas graves identificados. No existen revisiones previas aplicadas ni decisiones léxicas o teológicas en inglés que contradigan esta traducción. El borrador español parte directamente del texto griego de Charles 1908, usando la traducción inglesa del POB como contexto auditado, no como base mecánica.
  spanish_consistency_notes:
  - No aparece el nombre divino יהוה / YHWH ni κύριος en este versículo; la política de 'Yahvé' no se aplica aquí.
  - No hay términos cristológicos (Χριστός, Ἰησοῦς) en este pasaje.
  - El nombre propio Ῥαχήλ se transliteral como 'Raquel', forma estándar en español.
  - El nombre implícito del patriarca ('mi padre') refiere a Jacob; no se explicita en el texto para preservar la voz narrativa de Benjamín tal como aparece en la fuente.
  - Ningún término de la lista de defaults del proyecto (δοῦλος, σάρξ, δικαιοσύνη, χάρις, πνεῦμα, etc.) aparece en este versículo.
