id: T12P.BEN.11.1
reference: Testament of Benjamin 11:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: XI. Καὶ οὐκέτι κληθήσομαι λύκος ἅρπαξ διὰ τὰς ἁρπαγὰς ὑμῶν ἀλλὰ [ἐργάτης Κυρίου διαδιδὼν τροφὴν τοῖς ἐργαζομένοις τὸ ἀγαθόν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/011/001.yaml
  text: No longer shall I be called a ravening wolf because of your acts of plunder, but a worker of the Lord, distributing food to those who do what is good.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:24Z'
    unchanged: false
    changes_summary: Revised 'your ravaging' to 'your acts of plunder' for a more accurate rendering of ἁρπαγάς, and changed 'those who labor in what is good' to 'those who do what is good' for a more natural and direct rendering of τοῖς ἐργαζομένοις τὸ ἀγαθόν.
translation:
  language: es
  text: Ya no se me llamará lobo rapaz a causa de sus actos de saqueo, sino obrero del Señor, que distribuye alimento a los que hacen el bien.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λύκος ἅρπαξ
  english_pob_choice: ravening wolf
  chosen_spanish: lobo rapaz
  alternatives_spanish:
  - lobo voraz
  - lobo depredador
  lexicon: LSJ
  rationale: '''Lobo rapaz'' es la rendición tradicional bíblica para λύκος ἅρπαξ (cf. Mt 7:15) y conserva la imagen depredadora de la profecía de Jacob sobre Benjamín.'
- source_word: τὰς ἁρπαγὰς ὑμῶν
  english_pob_choice: your acts of plunder
  chosen_spanish: sus actos de saqueo
  alternatives_spanish:
  - sus rapiñas
  - sus pillajes
  lexicon: LSJ
  rationale: El revisor cambió 'ravaging' a 'acts of plunder' por más preciso para ἁρπαγάς; 'actos de saqueo' refleja la pluralidad concreta del sustantivo.
- source_word: ἐργάτης Κυρίου
  english_pob_choice: worker of the Lord
  chosen_spanish: obrero del Señor
  alternatives_spanish:
  - trabajador del Señor
  - operario del Señor
  lexicon: LSJ
  rationale: '''Obrero'' preserva la imagen del jornalero que entrega frutos del trabajo, en contraste con el lobo depredador.'
- source_word: διαδιδοὺς τροφὴν
  english_pob_choice: distributing food
  chosen_spanish: que distribuye alimento
  alternatives_spanish:
  - repartiendo alimento
  - distribuyendo comida
  lexicon: LSJ
  rationale: Participio griego se rinde como cláusula relativa en español; 'alimento' es término más formal que 'comida' en este registro.
- source_word: τοῖς ἐργαζομένοις τὸ ἀγαθόν
  english_pob_choice: those who do what is good
  chosen_spanish: los que hacen el bien
  alternatives_spanish:
  - los que obran lo bueno
  - los que practican el bien
  lexicon: LSJ
  rationale: El revisor cambió 'who labor in what is good' a 'who do what is good' por más natural; 'los que hacen el bien' es la rendición idiomática estándar en español bíblico.
translation_notes:
  revision_awareness: El revisor cambió 'ravaging' a 'acts of plunder' y 'labor in' a 'do' por mayor precisión y naturalidad. El español refleja ambos.
  spanish_consistency_notes:
  - '''Lobo rapaz'' como rendición estable, paralelo a Mt 7:15 en tradición bíblica española.'
  - '''Hacer el bien'' como expresión idiomática estándar para ἐργάζομαι τὸ ἀγαθόν.'
