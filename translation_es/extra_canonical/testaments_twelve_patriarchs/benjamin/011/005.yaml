base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/011/005.yaml
  text: And through them he will visit as Jacob my father, saying, “He will fill up what is lacking in your tribe.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:25Z'
    unchanged: false
    changes_summary: Changed 'through him' to 'through them' for δι᾽ αὐτῶν, replaced 'shall pass through again' with 'will visit' for φοιτήσει, and smoothed word order for natural formal English.
translation:
  language: es
  text: 'Y por medio de ellos visitará como Jacob mi padre, diciendo: "Él completará lo que falta en tu tribu."'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δι᾽ αὐτῶν
  english_pob_choice: through them
  chosen_spanish: por medio de ellos
  alternatives_spanish:
  - a través de ellos
  - mediante ellos
  lexicon: LSJ
  rationale: El revisor cambió 'through him' a 'through them' por la lectura plural αὐτῶν; 'por medio de ellos' es la rendición clara en español.
- source_word: φοιτήσει
  english_pob_choice: will visit
  chosen_spanish: visitará
  alternatives_spanish:
  - frecuentará
  - vendrá
  - irá repetidamente
  lexicon: LSJ
  rationale: El revisor adoptó 'will visit' por más natural; el verbo φοιτάω implica visita repetida o frecuente, pero 'visitar' captura el sentido sin sobrecargar.
- source_word: ἀναπληρώσει τὰ ὑστερήματα
  english_pob_choice: will fill up what is lacking
  chosen_spanish: completará lo que falta
  alternatives_spanish:
  - llenará lo que falta
  - suplirá lo que falta
  lexicon: LSJ
  rationale: ἀναπληρόω + ὑστερήματα es frase paulina (cf. Col 1:24); 'completar lo que falta' es la rendición natural y bíblica.
- source_word: φυλῆς σου
  english_pob_choice: your tribe
  chosen_spanish: tu tribu
  alternatives_spanish:
  - tu linaje
  - tu familia
  lexicon: LSJ
  rationale: φυλή como tribu en sentido patriarcal; 'tribu' conserva el contexto pactual de las doce tribus de Israel.
translation_notes:
  revision_awareness: El revisor cambió 'through him' a 'through them' (αὐτῶν plural), 'shall pass through again' a 'will visit', y suavizó el orden. El español refleja todos los cambios.
  spanish_consistency_notes:
  - '''Por medio de ellos'' coherente con uso de διά + genitivo en otros pasajes.'
  - '''Completar lo que falta'' como rendición estable para ἀναπληρόω τὰ ὑστερήματα.'
