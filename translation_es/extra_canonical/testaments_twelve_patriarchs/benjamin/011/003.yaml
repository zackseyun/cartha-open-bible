translation:
  language: es
  text: Hasta la consumación del siglo estará en las asambleas de las naciones y entre sus gobernantes, como una melodía musical en la boca de todos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συντελείας τοῦ αἰῶνος
  english_pob_choice: the consummation of the age
  chosen_spanish: la consumación del siglo
  alternatives_spanish:
  - el fin del mundo
  - la consumación de la era
  - el fin de los tiempos
  lexicon: LSJ
  rationale: Frase apocalíptica técnica (cf. Mt 24:3); 'consumación del siglo' es la rendición tradicional bíblica española.
- source_word: συναγωγαῖς ἐθνῶν
  english_pob_choice: assemblies of the nations
  chosen_spanish: asambleas de las naciones
  alternatives_spanish:
  - congregaciones de los gentiles
  - reuniones de las naciones
  lexicon: LSJ
  rationale: Coherente con v. 2 ('asamblea'); plural por συναγωγαῖς.
- source_word: ἄρχουσιν αὐτῶν
  english_pob_choice: their rulers
  chosen_spanish: sus gobernantes
  alternatives_spanish:
  - sus jefes
  - sus príncipes
  lexicon: LSJ
  rationale: ἄρχοντες como autoridades civiles; 'gobernantes' es el término moderno y neutral en español.
- source_word: μουσικὸν μέλος
  english_pob_choice: a musical strain
  chosen_spanish: una melodía musical
  alternatives_spanish:
  - una canción musical
  - un canto musical
  - un aire musical
  lexicon: LSJ
  rationale: μέλος como composición melódica; 'melodía' es el término moderno preciso, mejor que 'cantar' que es genérico.
translation_notes:
  revision_awareness: El revisor confirmó que el verso no necesitaba cambios; el español sigue la traducción inglesa fielmente.
  spanish_consistency_notes:
  - '''Consumación del siglo'' como rendición tradicional para συντέλεια τοῦ αἰῶνος.'
  - '''Asambleas de las naciones'' coherente con v. 2.'
