base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/011/003.yaml
  text: Until the consummation of the age he shall be in the assemblies of the nations and among their rulers, like a musical strain in the mouth of all.
  revision_pass:
    model: gpt-5.4
