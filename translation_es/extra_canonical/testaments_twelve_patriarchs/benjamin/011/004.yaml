translation:
  language: es
  text: Y será registrado en libros sagrados, tanto su obra como su palabra; y será escogido de Dios para siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: βίβλοις ἁγίαις
  english_pob_choice: holy books
  chosen_spanish: libros sagrados
  alternatives_spanish:
  - libros santos
  - escrituras sagradas
  lexicon: LSJ
  rationale: '''Sagrados'' transmite el sentido cultual-canónico de ἁγίαις aplicado a textos; ''santos'' funciona pero es menos común para libros.'
- source_word: ἀναγραφόμενος
  english_pob_choice: recorded
  chosen_spanish: registrado
  alternatives_spanish:
  - inscrito
  - anotado
  - consignado
  lexicon: LSJ
  rationale: '''Registrado'' transmite el matiz de inscripción permanente del verbo ἀναγράφω en archivos oficiales.'
- source_word: ἔργον ... λόγος
  english_pob_choice: work ... word
  chosen_spanish: obra ... palabra
  alternatives_spanish:
  - acción ... palabra
  - hecho ... discurso
  lexicon: LSJ
  rationale: Par estándar bíblico ἔργον/λόγος; 'obra' y 'palabra' son las rendiciones tradicionales.
- source_word: ἐκλεκτὸς Θεοῦ
  english_pob_choice: God's chosen one
  chosen_spanish: escogido de Dios
  alternatives_spanish:
  - el elegido de Dios
  - el selecto de Dios
  lexicon: LSJ
  rationale: '''Escogido'' es el término bíblico tradicional para ἐκλεκτός; mantiene el matiz mesiánico-elegido.'
- source_word: ἕως τοῦ αἰῶνος
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - eternamente
  lexicon: LSJ
  rationale: Frase idiomática hebrea (לְעוֹלָם) en griego; 'para siempre' es la rendición natural en español.
translation_notes:
  revision_awareness: El revisor confirmó que el verso no necesitaba cambios; el español sigue la traducción inglesa fielmente.
  spanish_consistency_notes:
  - '''Libros sagrados'' como rendición estable para βίβλοι ἅγιαι en contexto canónico.'
  - '''Para siempre'' coherente con uso bíblico para ἕως τοῦ αἰῶνος.'
