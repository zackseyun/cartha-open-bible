id: T12P.BEN.11.2
reference: Testament of Benjamin 11:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: Καὶ ἀναστήσεται ἐν ὑστέροις] ἀγαπητὸς Κυρίου [ἐκ σπέρματος Ἰούδα καὶ Λευί]⁶ ποιῶν εὐδοκίαν *ἐν στόματι αὐτοῦ⁷, [γνῶσιν καινὴν φωτίζων πάντα τὰ ἔθνη]⁸ *φῶς γνώσεως¹⁴, ἐπεμβαίνων¹⁵ *τὸν Ἰσραὴλ¹⁶ ἐν σωτηρίᾳ, καὶ ἁρπάζων ὡς λύκος ἀπ᾽ αὐτῶν¹⁷, καὶ *διδοὺς τῇ συναγωγῇ τῶν ἐθνῶν¹⁸.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/011/002.yaml
  text: And in the last times there shall arise from my seed one beloved of the Lord, hearing his voice and doing the good pleasure of his will, enlightening all the nations with new knowledge, bringing salvation to Israel, and snatching from them like a wolf, and giving to the assembly of the nations.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:25Z'
    unchanged: false
    changes_summary: 'Revised awkward or inaccurate phrases for more natural and faithful English: changed ''entering upon Israel in salvation'' to ''bringing salvation to Israel''; changed ''snatching away from them as a wolf'' to ''snatching from them like a wolf''; and changed ''gathering of the nations'' to ''assembly of the nations.'''
translation:
  language: es
  text: Y en los últimos tiempos surgirá de mi descendencia uno amado del Señor, que oirá su voz y hará la buena voluntad de su designio, iluminando a todas las naciones con un nuevo conocimiento, trayendo salvación a Israel, arrebatando de ellos como lobo, y dando a la asamblea de las naciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν ὑστέροις
  english_pob_choice: in the last times
  chosen_spanish: en los últimos tiempos
  alternatives_spanish:
  - en los últimos días
  - al final
  lexicon: LSJ
  rationale: Frase apocalíptica estándar; 'últimos tiempos' es la rendición bíblica natural en español.
- source_word: ἀγαπητὸς Κυρίου
  english_pob_choice: beloved of the Lord
  chosen_spanish: amado del Señor
  alternatives_spanish:
  - el amado del Señor
  - querido del Señor
  lexicon: LSJ
  rationale: '''Amado'' es término bíblico tradicional para ἀγαπητός; conserva el matiz del Mesías-amado.'
- source_word: ἐκ σπέρματος
  english_pob_choice: from my seed
  chosen_spanish: de mi descendencia
  alternatives_spanish:
  - de mi simiente
  - de mi linaje
  lexicon: LSJ
  rationale: '''Descendencia'' es la rendición moderna y clara para σπέρμα en este sentido; ''simiente'' es alternativa más arcaica.'
- source_word: ποιῶν εὐδοκίαν ἐν στόματι αὐτοῦ
  english_pob_choice: doing the good pleasure of his will, hearing his voice
  chosen_spanish: que oirá su voz y hará la buena voluntad de su designio
  alternatives_spanish:
  - haciendo su buen agrado por su boca
  - obrando su beneplácito
  lexicon: LSJ
  rationale: 'Frase difícil; el inglés POB la interpreta combinando ambos elementos. Sigo esa lectura: la ''boca'' implica voz/decreto y εὐδοκία es designio favorable.'
- source_word: γνῶσιν καινὴν φωτίζων πάντα τὰ ἔθνη
  english_pob_choice: enlightening all the nations with new knowledge
  chosen_spanish: iluminando a todas las naciones con un nuevo conocimiento
  alternatives_spanish:
  - alumbrando a todos los gentiles con nueva ciencia
  lexicon: LSJ
  rationale: '''Iluminar'' rinde φωτίζω en sentido cognitivo-revelatorio; ''naciones'' para ἔθνη según política del proyecto.'
- source_word: ἐπεμβαίνων τὸν Ἰσραὴλ ἐν σωτηρίᾳ
  english_pob_choice: bringing salvation to Israel
  chosen_spanish: trayendo salvación a Israel
  alternatives_spanish:
  - entrando sobre Israel en salvación
  - alcanzando a Israel con salvación
  lexicon: LSJ
  rationale: El revisor adoptó la lectura interpretativa 'bringing salvation to Israel'; el español sigue esa decisión clarificadora del verbo difícil ἐπεμβαίνω.
- source_word: ἁρπάζων ὡς λύκος ἀπ᾽ αὐτῶν
  english_pob_choice: snatching from them like a wolf
  chosen_spanish: arrebatando de ellos como lobo
  alternatives_spanish:
  - robando de ellos como un lobo
  - arrebatando de entre ellos como lobo
  lexicon: LSJ
  rationale: Sigue al revisor con 'like a wolf' (no 'as'); 'arrebatar' rinde ἁρπάζω en su matiz violento-rápido.
- source_word: τῇ συναγωγῇ τῶν ἐθνῶν
  english_pob_choice: the assembly of the nations
  chosen_spanish: la asamblea de las naciones
  alternatives_spanish:
  - la congregación de las naciones
  - la reunión de los gentiles
  lexicon: LSJ
  rationale: El revisor cambió 'gathering' a 'assembly' por más natural; 'asamblea' es el equivalente español preciso.
theological_decisions:
- issue: Lectura mesiánica del 'amado del Señor'
  chosen_reading: Traducir como referencia ambigua mesiánica sin especificar identidad cristológica.
  alternative_readings:
  - Identificar explícitamente con Cristo/Pablo en notas
  - Omitir como interpolación cristiana
  rationale: La frase 'de la simiente de Judá y Leví' (entre corchetes en griego) sugiere expansión cristiana posterior, pero el material principal del v. 2 es preservado del original. El español sigue al POB en mantener la lectura sin reducirla a identificación cristiana explícita.
translation_notes:
  revision_awareness: El revisor cambió 'entering upon Israel in salvation' a 'bringing salvation to Israel'; 'snatching away from them as a wolf' a 'snatching from them like a wolf'; y 'gathering' a 'assembly'. El español refleja todos.
  spanish_consistency_notes:
  - '''Naciones'' uniforme para ἔθνη a través del capítulo.'
  - '''Asamblea'' coherente para συναγωγή en contexto eclesiológico-pactual.'
  - Participios griegos se rinden como gerundios en cadena para preservar la fluidez.
