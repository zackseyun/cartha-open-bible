translation:
  language: es
  text: Y uno de ellos, mientras me azotaba con una vara[a], le salió al encuentro un león y lo mató.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego fuente (edición Charles 1908, «source-fix v2») dice ῥάβδῳ μαστίζων με, lit. «azotándome con una vara», refiriéndose a uno de los agresores de Benjamín. La traducción inglesa del POB presenta en cambio la frase «going away to hide my garment» (yéndose a esconder mi ropa), que no se corresponde con este texto griego. La discrepancia sugiere que la versión inglesa pudo haberse basado en una tradición manuscrita diferente —probablemente la versión armenia o un manuscrito griego alternativo— no coincidente con el texto griego actualmente asignado a este versículo. Se recomienda revisión editorial para reconciliar el paquete fuente antes de la publicación.
    reason: textual_variant
lexical_decisions:
- source_word: μαστίζων
  english_pob_choice: '[no renderizado — el inglés POB diverge de esta cláusula griega]'
  chosen_spanish: azotaba
  alternatives_spanish:
  - golpeaba
  - flagelaba
  - fustigaba
  lexicon: 'BDAG μαστίζω: to flog, to beat severely with a whip or rod'
  rationale: μαστίζω denota una paliza vigorosa o flagelación. 'Azotar' capta mejor esta acción corporal violenta en español estándar. 'Golpear' es demasiado genérico; 'flagelar' resulta latinizante y menos natural en prosa narrativa. El dativo ῥάβδῳ especifica el instrumento (vara/bastón de castigo), renderizado como 'con una vara'. El participio presente expresa acción simultánea y continua, de ahí el imperfecto 'azotaba'.
- source_word: ῥάβδος
  english_pob_choice: '[no renderizado — el inglés POB diverge de esta cláusula griega]'
  chosen_spanish: vara
  alternatives_spanish:
  - palo
  - bastón
  - vara de azotes
  lexicon: 'BDAG ῥάβδος: rod, staff, wand; used for striking or as a walking staff'
  rationale: '''Vara'' es el equivalente español natural para una vara empleada en el castigo físico, coherente con el uso bíblico (cf. Éx 21:20; Prov 22:15 en Biblias en español). ''Palo'' es coloquial; ''bastón'' evoca apoyo para caminar más que instrumento de castigo.'
- source_word: ὑπήντησεν
  english_pob_choice: met
  chosen_spanish: le salió al encuentro
  alternatives_spanish:
  - lo encontró
  - se encontró con él
  lexicon: 'BDAG ὑπαντάω: to meet, to come to meet, often with a confrontational directional force'
  rationale: La expresión idiomática 'salirle al encuentro' capta tanto el sentido de encontrarse como el matiz de confrontación activa implícito en ὑπαντάω (compuesto directional). 'Encontrar' es más neutro y pierde la fuerza direccional del griego, relevante aquí dado el peligro mortal que representa el león.
- source_word: ἀνεῖλεν
  english_pob_choice: killed
  chosen_spanish: mató
  alternatives_spanish:
  - lo eliminó
  - lo quitó de en medio
  - lo dio muerte
  lexicon: 'BDAG ἀναιρέω: to take away, to kill, to do away with'
  rationale: '''Mató'' es la traducción directa y clara del sentido de ἀναιρέω en contexto narrativo. Las alternativas son circunlocutorias e innecesariamente pesadas para prosa simple.'
theological_decisions:
- issue: Divergencia sustancial entre el texto griego fuente y la traducción inglesa del POB
  english_pob_reading: And as he was going away to hide my garment, a lion met him and killed him.
  chosen_spanish_reading: Y uno de ellos, mientras me azotaba con una vara, le salió al encuentro un león y lo mató.
  alternative_spanish_readings:
  - Y mientras se alejaba para esconder mi ropa, le salió al encuentro un león y lo mató. (siguiendo el inglés POB en lugar del griego fuente)
  rationale: 'El paquete griego fuente lee ῥάβδῳ μαστίζων με (''azotándome con una vara''), cláusula que describe un acto de violencia física contra el narrador (Benjamín). La traducción inglesa del POB dice en cambio ''going away to hide my garment,'' frase que no corresponde en modo alguno a esta cláusula griega. La discrepancia es sustancial, no un mero matiz. Las posibles explicaciones son: (1) la traducción inglesa se elaboró sobre una tradición manuscrita diferente —posiblemente la versión armenia de los Testamentos de los Doce Patriarcas o un manuscrito griego distinto— que no coincide con el texto griego marcado ''source-fix v2'' ahora asignado a este versículo; (2) un error en el ensamblaje del paquete de fuente. El español sigue el texto griego tal como ha sido proporcionado, conforme al principio de traducción basada en fuentes. La discrepancia se señala explícitamente para revisión editorial.'
  doctrine_reference: Integridad del texto fuente; tradición manuscrita de los Testamentos de los Doce Patriarcas (edición Charles 1908, variantes griegas vs. armenias)
translation_notes:
  revision_awareness: La revisión aplicada (2026-04-23, gpt-5.4) cambió «while» por «as» en la construcción temporal inglesa —un ajuste estilístico menor sin consecuencias léxicas ni teológicas. Sin embargo, ni la versión original («while he was going away to hide my garment») ni la revisada («as he was going away to hide my garment») corresponden al texto griego fuente proporcionado (ῥάβδῳ μαστίζων με). La traducción española se basa directamente en el griego y no en la cadena de revisión inglesa; por tanto, dicho cambio temporal no afecta ninguna decisión de la presente traducción.
  spanish_consistency_notes:
  - No aparece el nombre divino (YHWH/Yahvé) ni terminología cristológica en este versículo; las convenciones de nombre divino del proyecto no son aplicables aquí.
  - Se emplea el pretérito imperfecto ('azotaba') para el participio presente μαστίζων, que expresa acción simultánea y durativa, y el pretérito indefinido ('salió', 'mató') para las acciones puntuales aoristas, distinción que el español obliga a marcar morfológicamente.
  - El sustantivo 'vara' se utiliza coherentemente con el uso estándar en traducciones bíblicas en español para ῥάβδος en contextos de castigo físico.
  - La partícula δέ se ha traducido como 'Y' (valor continuativo-narrativo), opción neutra adecuada al ritmo narrativo del texto; una traducción más adversativa ('Pero') también sería defendible pero añadiría contraste no marcado con fuerza en el griego.
