  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: Καὶ λέγει μοι· Ναί, ἀδελφέ¹⁶. καὶ ὅτε¹⁷ ἐξέδυσάν με τὸν χιτῶνά μου δέδωκάν με τοῖς Ἰσμαηλίταις· καὶ δέδωκάν μοι περίζωμα, καὶ φραγγελλώσαντες εἰπόν μοι τρέχειν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/002/002.yaml
  text: And he said to me, “Yes, brother. For when the Ishmaelites took me, one of them stripped me of my tunic and gave me a loincloth, and after flogging me, he told me to run.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:31Z'
    unchanged: false
    changes_summary: Removed the semicolon and adjusted punctuation for smoother, more natural English; wording otherwise remains accurate and complete.
translation:
  language: es
  text: 'Y me dijo: «Sí, hermano. Y cuando me despojaron[a] de mi túnica, me entregaron a los ismaelitas; y me dieron un taparrabos,[b] y habiéndome azotado, me dijeron que corriera.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa un sujeto implícito en tercera persona del plural a lo largo de toda la cláusula (ἐξέδυσάν, «despojaron»; δέδωκάν, «entregaron»). Por el contexto de Gén 37, los que despojaron a José de su túnica y lo vendieron fueron sus hermanos, no los ismaelitas. La traducción inglesa del POB reestructura la cláusula haciendo a los ismaelitas el sujeto activo («when the Ishmaelites took me, one of them stripped me»); la presente traducción sigue el orden sintáctico del griego.
    reason: textual_variant
  - marker: b
    text: 'περίζωμα: prenda mínima ceñida a la cadera; la misma palabra que usa la LXX en Gén 3:7 para el ceñidor de hojas de higuera. Alternativas en español: «faldilla», «paño de cintura».'
    reason: lexical_alternative
lexical_decisions:
- source_word: χιτών
  english_pob_choice: tunic
  chosen_spanish: túnica
  alternatives_spanish:
  - camisa
  - manto interior
  lexicon: 'BDAG χιτών: the inner garment worn next to the body, distinguished from the outer himation'
  rationale: Túnica is the standard Spanish biblical term for the χιτών and matches the Genesis 37 register. Camisa is too modern and casual; manto interior is too periphrastic.
- source_word: ἐξέδυσάν
  english_pob_choice: stripped
  chosen_spanish: despojaron
  alternatives_spanish:
  - me quitaron
  - me desnudaron
  lexicon: 'BDAG ἐκδύω: to take off clothing, strip someone; often with connotation of humiliation or forcible removal'
  rationale: Despojaron captures both the physical act and the element of forcible deprivation. Me quitaron is too neutral; me desnudaron implies total nudity beyond what the source requires.
- source_word: δέδωκάν με τοῖς Ἰσμαηλίταις
  english_pob_choice: took me (Ishmaelites as reconstructed subject)
  chosen_spanish: me entregaron a los ismaelitas
  alternatives_spanish:
  - me vendieron a los ismaelitas
  - me dieron a los ismaelitas
  lexicon: 'BDAG δίδωμι: to hand over, give into the power of another; frequently used for transferring custody'
  rationale: 'The Greek δέδωκάν (3pl aorist of δίδωμι) keeps the same unnamed third-person plural subject as the prior verb ἐξέδυσάν. Entregar (to hand over, deliver) conveys the transfer of custody more precisely than dar alone. The English POB restructures this clause to make the Ishmaelites the acting subject (''when the Ishmaelites took me''), which inverts the Greek word order and shifts the agency; the Spanish rendering follows the Greek sequence: despojaron → entregaron a los ismaelitas.'
- source_word: περίζωμα
  english_pob_choice: loincloth
  chosen_spanish: taparrabos
  alternatives_spanish:
  - faldilla
  - paño de cintura
  - perizona
  lexicon: 'BDAG περίζωμα: a garment worn around the waist, loincloth or girdle; cf. LXX Gen 3:7 for the same word describing the fig-leaf garment'
  rationale: Taparrabos is the most widely understood modern Spanish equivalent for a minimal waist garment. Faldilla and paño de cintura are acceptable alternatives; perizona is too technical. The LXX Gen 3:7 link gives the word a subtle echo of primordial vulnerability.
- source_word: φραγγελλώσαντες
  english_pob_choice: flogging
  chosen_spanish: azotado (habiéndome azotado)
  alternatives_spanish:
  - flagelado
  - habiéndome flagelado
  lexicon: 'BDAG φραγγελλόω: to flog, scourge; Greek loanword directly from Latin flagello'
  rationale: Azotar is the standard and most natural Spanish biblical verb for this action. Flagelar shares the Latin root and is fully transparent, but azotar reads more idiomatically in neutral Latin American Spanish biblical prose. The aorist participle φραγγελλώσαντες is rendered as a gerund-absolute construction (habiéndome azotado) preserving the sequential action.
- source_word: εἰπόν μοι τρέχειν
  english_pob_choice: told me to run
  chosen_spanish: me dijeron que corriera
  alternatives_spanish:
  - me mandaron correr
  - me ordenaron que corriera
  lexicon: 'εἰπόν + infinitive: indirect command construction; τρέχειν from τρέχω (to run)'
  rationale: The Spanish indirect command que + imperfect subjunctive (corriera) is the natural grammatical equivalent. Me mandaron correr and me ordenaron que corriera are viable alternatives; me dijeron que corriera is preferred for register neutrality, staying close to the Greek dicendi verb without amplifying the command force beyond the source.
translation_notes:
  revision_awareness: La revisión del POB en inglés (2026-04-23, gpt-5.4) eliminó el punto y coma entre «loincloth» y «and after flogging» para mejorar la fluidez. En el texto español se mantiene el punto y coma tras «ismaelitas» para marcar el cambio de escena que en el griego indica la marca de puntuación alta (·), sin reproducir el punto y coma eliminado en inglés, que correspondía a una articulación interna distinta.
  spanish_consistency_notes:
  - 'Ismaelitas: minúscula como sustantivo étnico, conforme a la norma ortográfica del español moderno.'
  - Diálogo con comillas angulares («...») según convención tipográfica española.
  - El presente histórico griego (λέγει) se vierte al pretérito indefinido («dijo») para mantener la coherencia narrativa del español.
  - No aparece el teónimo יהוה ni κύριος en este versículo; no se aplica la norma Yahvé/SEÑOR.
  - El participio aorist φραγγελλώσαντες se rinde con gerundio compuesto (habiéndome azotado) para preservar la secuencia aspectual del griego sin forzar una construcción de relativo.
