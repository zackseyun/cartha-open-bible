translation:
  language: es
  text: 'Y cuando entré en Egipto, mi hermano me reconoció y me dijo: «Mancharon tu túnica con sangre», dijeron. «Mira si esta es la túnica».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἦλθον εἰς Αἴγυπτον
  english_pob_choice: I went into Egypt
  chosen_spanish: entré en Egipto
  alternatives_spanish:
  - fui a Egipto
  - vine a Egipto
  lexicon: LSJ
  rationale: Verbo en singular conforme a la revisión POB; 'entré en Egipto' es natural en español y conserva la primera persona del relato.
- source_word: ἐγνώρισέν με
  english_pob_choice: recognized me
  chosen_spanish: me reconoció
  alternatives_spanish:
  - me identificó
  - me distinguió
  lexicon: BDAG
  rationale: γνωρίζω en aoristo con sentido de reconocimiento personal; 'me reconoció' es la traducción estándar.
- source_word: ἔφυραν ... αἵματι
  english_pob_choice: smeared with blood
  chosen_spanish: mancharon con sangre
  alternatives_spanish:
  - embadurnaron con sangre
  - untaron con sangre
  lexicon: LSJ
  rationale: φύρω significa mezclar/empapar; 'mancharon' es natural y conserva la imagen de la túnica ensangrentada.
- source_word: χιτῶνά
  english_pob_choice: tunic
  chosen_spanish: túnica
  alternatives_spanish:
  - manto
  lexicon: LSJ
  rationale: Cognado natural en español; conserva el referente de Génesis 37.
- source_word: Ἐπίγνωθι
  english_pob_choice: See whether
  chosen_spanish: Mira si
  alternatives_spanish:
  - Reconoce si
  - Examina si
  lexicon: LSJ
  rationale: ἐπιγινώσκω en imperativo aoristo; 'mira si' refleja el matiz interrogativo natural en español, paralelo al 'see whether' del POB.
translation_notes:
  revision_awareness: El POB inglés fue revisado de 'we went down into Egypt' (plural) a 'I went into Egypt' (singular) para reflejar el verbo griego singular. La versión española sigue 'entré en Egipto'.
  spanish_consistency_notes:
  - χιτών → 'túnica'
  - Ἰωσήφ → 'José'
  - Αἴγυπτος → 'Egipto'
  - γνωρίζω → 'reconocer' (aquí), distinto de γινώσκω 'conocer'
