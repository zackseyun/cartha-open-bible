  text: Καὶ οὐκ ἐψεύσαντο αὐτοὶ ταῦτα λέγοντες· ἤθελεν γὰρ κρύπτειν ἀπʼ ἐμοῦ *τὰ ἔργα τῶν ἀδελφῶν ἡμῶν³¹
