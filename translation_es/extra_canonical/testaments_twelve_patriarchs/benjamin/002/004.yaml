id: T12P.BEN.2.4
reference: Testament of Benjamin 2:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: Καὶ οὕτως οἱ μέτοχοι αὐτοῦ φοβηθέντες ἐν †ἀνέσει με κατέσχεν†.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/002/004.yaml
  text: So his companions, being afraid, sold me to the Ishmaelites.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:03Z'
    unchanged: false
    changes_summary: Replaced the less certain and awkward 'to others of their company' with 'to the Ishmaelites,' following the clearer attested reading in the source tradition and improving naturalness while preserving the verse's meaning.
translation:
  language: es
  text: Así que sus compañeros, atemorizados, me vendieron[a] a los ismaelitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto griego subyacente presenta una crux textual: †ἀνέσει με κατέσχεν† (marcado con óbelos en Charles 1908), lo que indica un pasaje corrompido o irresoluble en el estado actual de los manuscritos. La traducción ''me vendieron a los ismaelitas'' sigue la lectura de la tradición textual más amplia (paralelo con Gn 37:27-28), adoptada por el POB inglés en su pase de revisión del 23 de abril de 2026, que sustituyó la lectura anterior ''a otros de su compañía'' por considerarla incierta y forzada.'
    reason: textual_variant
lexical_decisions:
- source_word: μέτοχοι (μέτοχος)
  english_pob_choice: companions
  chosen_spanish: compañeros
  alternatives_spanish:
  - socios
  - asociados
  - cómplices
  - partícipes
  lexicon: 'BDAG μέτοχος: one who shares in something, partner, companion, associate'
  rationale: El griego μέτοχος designa a quienes comparten algo (una empresa, una situación, una relación). En el contexto narrativo del Testamento de Benjamín —que relata la venta de José—, se refiere a los que estaban con él en ese momento. 'Compañeros' es la opción más natural y neutra en español; 'socios' suena demasiado mercantil; 'cómplices' introduce una connotación de culpa que el término griego no exige; 'partícipes' es más formal pero también válido. Se mantiene 'compañeros' en línea con el POB inglés.
- source_word: φοβηθέντες (φοβέω, aoristo pasivo participio)
  english_pob_choice: being afraid
  chosen_spanish: atemorizados
  alternatives_spanish:
  - temerosos
  - llenos de temor
  - con miedo
  - asustados
  lexicon: 'BDAG φοβέω: to be in a state of fright, to be afraid; aor. pass. ptc. = having become afraid'
  rationale: El participio aoristo pasivo φοβηθέντες expresa el resultado de haber entrado en el estado de temor (sentido inceptivo-resultativo del aoristo). 'Atemorizados' captura bien este matiz pasivo-resultativo en español, mientras que 'temerosos' es más adjetival y estativo. Se prefiere 'atemorizados' sobre 'asustados' por registrar mejor la dignidad narrativa del texto.
- source_word: †ἀνέσει με κατέσχεν† (crux textual)
  english_pob_choice: sold me to the Ishmaelites
  chosen_spanish: me vendieron a los ismaelitas
  alternatives_spanish:
  - me entregaron a otros de su compañía
  - me retuvieron en libertad
  lexicon: 'LSJ ἄνεσις: release, relaxation; κατέχω: to hold, restrain, keep, possess — pero el texto está marcado con óbelos como crux'
  rationale: El texto griego presenta aquí una crux textual marcada con daggers (†ἀνέσει με κατέσχεν†) en la edición Charles 1908, lo que indica que el texto está corrompido o es oscuro para los editores. La traducción literal de la frase corrupta no es viable ('en libertad me retuvo/tuvo' carece de coherencia). La revisión del POB inglés (2026-04-23) adoptó la lectura 'to the Ishmaelites' siguiendo la tradición textual más amplia (paralelo con Gn 37:27-28), sustituyendo la versión anterior 'to others of their company'. El español 'me vendieron a los ismaelitas' sigue esa misma decisión editorial; la incertidumbre textual queda documentada en la nota a pie de texto [a].
- source_word: Καὶ οὕτως
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Y así
  - De este modo
  - Por eso
  lexicon: 'LSJ οὕτως: thus, in this way; καί: and, so'
  rationale: '''Así que'' es el conector más natural en español para expresar la combinación de consecutividad y resultado que transmite Καὶ οὕτως. ''Y así'' es igualmente válido pero levemente más arcaizante. ''De este modo'' es más formal y menos fluido en este registro narrativo.'
theological_decisions:
- issue: 'Atribución narrativa: ¿quiénes venden a José?'
  english_pob_reading: his companions, being afraid, sold me to the Ishmaelites
  chosen_spanish_reading: sus compañeros, atemorizados, me vendieron a los ismaelitas
  alternative_spanish_readings:
  - sus hermanos, atemorizados, me vendieron a los ismaelitas
  rationale: 'El texto usa μέτοχοι (''compañeros/socios''), no ἀδελφοί (''hermanos''). Esta distinción es teológicamente relevante porque el Testamento de Benjamín matiza la culpa de los hermanos de José: en algunos pasajes del T12P la responsabilidad se atribuye a ciertos hermanos específicos o a sus acompañantes. Se mantiene ''compañeros'' fiel al griego sin identificar a los vendedores como ''hermanos'', lo cual sería una adición no soportada por el término elegido por el autor.'
  doctrine_reference: Testamento de Benjamín, contexto narrativo de la venta de José (cf. Gn 37:27-28; T12P, Testamento de Zabulón 3:2-3)
translation_notes:
  revision_awareness: 'El pase de revisión del POB inglés (2026-04-23, modelo gpt-5.4) modificó la traducción de ''to others of their company'' a ''to the Ishmaelites'', argumentando que esta última sigue una lectura atestiguada más clara en la tradición textual. Esta decisión es relevante para el español porque afecta directamente el complemento de ''me vendieron'': la traducción española adopta ''a los ismaelitas'' en consonancia con esa revisión, y la incertidumbre del texto griego subyacente (crux marcada con daggers) queda documentada en la nota [a] para mantener la transparencia auditiva del POB.'
  spanish_consistency_notes:
  - No aparece el nombre divino (YHWH/κύριος) en este versículo; la norma del proyecto de usar 'Yahvé' no aplica aquí.
  - No aparece terminología cristológica (Mesías/Cristo) en este versículo.
  - El texto pertenece a los Testamentos de los Doce Patriarcas (pseudoepígrafa), no al canon hebreo ni al Nuevo Testamento; las normas terminológicas del proyecto se aplican en la medida en que los términos griego coincidan.
  - '''Ismaelitas'' (ismaelitas) sigue la ortografía estándar del español moderno para los descendientes de Ismael mencionados en el Génesis.'
