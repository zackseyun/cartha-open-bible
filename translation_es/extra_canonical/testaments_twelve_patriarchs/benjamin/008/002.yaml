  - siervo del Señor
  lexicon: BDAG
  rationale: '''Obrero'' refleja servicio comisionado activo sin importar el matiz de esclavo de δοῦλος.'
- source_word: ἀγαθοποιοῦντες
  english_pob_choice: those who do what is good
  chosen_spanish: los que hacen el bien
  alternatives_spanish:
  - los que practican el bien
  - los hacedores del bien
  lexicon: BDAG
  rationale: Conserva el énfasis ético verbal y se lee con naturalidad.
- source_word: διαδίδωσι τροφήν
  english_pob_choice: distributing food
  chosen_spanish: que distribuye alimento
  alternatives_spanish:
  - repartiendo comida
  lexicon: LSJ
  rationale: '''Distribuir alimento'' conserva el sentido de reparto ordenado y ministerial.'
