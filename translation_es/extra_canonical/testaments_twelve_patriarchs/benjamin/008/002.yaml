translation:
  language: es
  text: Y ya no seré llamado lobo rapaz por causa de vuestro saqueo, sino obrero del Señor, que distribuye alimento a los que hacen el bien.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λύκος ἅρπαξ
  english_pob_choice: ravening wolf
  chosen_spanish: lobo rapaz
  alternatives_spanish:
  - lobo voraz
  - lobo que arrebata
  lexicon: LSJ
  rationale: Conserva la imagen tribal de Génesis 49 con la fuerza predatoria del griego; 'rapaz' es el adjetivo idiomático en español bíblico.
- source_word: ἐργάτης κυρίου
  english_pob_choice: worker of the Lord
  chosen_spanish: obrero del Señor
  alternatives_spanish:
  - trabajador del Señor
  - siervo del Señor
  lexicon: BDAG
  rationale: '''Obrero'' refleja servicio comisionado activo sin importar el matiz de esclavo de δοῦλος.'
- source_word: ἀγαθοποιοῦντες
  english_pob_choice: those who do what is good
  chosen_spanish: los que hacen el bien
  alternatives_spanish:
  - los que practican el bien
  - los hacedores del bien
  lexicon: BDAG
  rationale: Conserva el énfasis ético verbal y se lee con naturalidad.
- source_word: διαδίδωσι τροφήν
  english_pob_choice: distributing food
  chosen_spanish: que distribuye alimento
  alternatives_spanish:
  - repartiendo comida
  lexicon: LSJ
  rationale: '''Distribuir alimento'' conserva el sentido de reparto ordenado y ministerial.'
