  text: Porque la mente pura no tiene contaminación con el estiércol ni el barro, sino que más bien rechaza ambos y ahuyenta el hedor; así también la mente pura, cuando se halla en medio de las inmundicias de la tierra, más bien †edifica†, y ella misma no se contamina.
