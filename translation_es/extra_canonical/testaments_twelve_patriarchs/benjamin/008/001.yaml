lexical_decisions:
- source_word: ἁγιωσύνη / ἁγίως
  english_pob_choice: holiness
  chosen_spanish: santidad
  alternatives_spanish:
  - pureza
  - conducta santa
  lexicon: LSJ
  rationale: El tono parenético del capítulo exige un término ético-pactual más fuerte que mera limpieza moral; 'santidad' conserva el registro elevado del testamento.
- source_word: ἐντολαὶ Κυρίου
  english_pob_choice: Lord's commands
  chosen_spanish: mandamientos del Señor
  alternatives_spanish:
  - preceptos del Señor
  - órdenes del Señor
  lexicon: BDAG
  rationale: '''Mandamientos'' es el equivalente bíblico estándar y conserva el registro pactual.'
- source_word: συναχθήσεται
  english_pob_choice: will be gathered
  chosen_spanish: será reunido
  alternatives_spanish:
  - será congregado
  - se reunirá
  lexicon: BDAG
  rationale: Término profético estándar de reunión; 'será reunido' conserva la resonancia bíblica.
