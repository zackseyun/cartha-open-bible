    changes_summary: Removed the article in verse 3 for more natural English ('there is fear of good works'). In verse 4, revised the first clause from 'does violence to a holy man as to the light' to 'insults a holy man' to reflect ὑβρίσει more accurately and avoid importing 'light' from a textual corruption into the main text. Other wording retained.
translation:
  language: es
  text: '1[a]. Si, pues, ustedes también tienen una mente buena, hasta los hombres malos estarán en paz con ustedes, y los disolutos[b], avergonzados por ustedes, se volverán hacia el bien; y los codiciosos no solo se apartarán de su pasión, sino que también darán a los afligidos las cosas de la codicia que tenían.


    2. Si están haciendo el bien, hasta los espíritus inmundos huirán de ustedes, y las fieras les temerán.


    3. Pues donde hay temor de buenas obras[c] y luz en la mente, las tinieblas huyen de él.


    4. Porque si alguien insulta a un hombre santo, se arrepiente[d]; pues el santo tiene misericordia de quienes le injurian y guarda silencio.


    5. Y si alguien traiciona a un alma justa e injuria a un alma justa, el justo ora; y aunque por un poco de tiempo sea humillado, no mucho después aparece mucho más radiante[e], como llegó a ser José mi hermano.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos comienzan el capítulo con una conjunción inicial diferente. La traducción sigue la lectura adoptada por la POB.
    reason: textual_variant
  - marker: b
    text: O 'los disipados' o 'los libertinos' (ἄσωτοι).
    reason: lexical_alternative
  - marker: c
    text: La expresión 'temor de buenas obras' es difícil. Puede significar la reverencia asociada con las buenas obras o el temor producido por una vida de bondad.
    reason: alternative_reading
  - marker: d
    text: '''Se arrepiente'' rinde μετανοεῖ; alternativamente, ''cambia de pensamiento''.'
    reason: lexical_alternative
  - marker: e
    text: 'La historia de José es el modelo: aunque humillado por un tiempo, después fue manifestado como glorioso y vindicado. Cf. Génesis 37; 39–45.'
    reason: cross_reference
lexical_decisions:
- source_word: διάνοιαν
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - disposición
  lexicon: LSJ
  rationale: Preserva el sentido cognitivo-ético sin sobrepsicologizar.
- source_word: εἰρηνεύσουσιν
  english_pob_choice: will be at peace
  chosen_spanish: estarán en paz
  alternatives_spanish:
  - harán las paces
  lexicon: LSJ
  rationale: Conserva la fuerza relacional.
- source_word: ἄσωτοι
  english_pob_choice: the lawless (chapter draft retains 'lawless'; verse-level revised to 'profligate')
  chosen_spanish: los disolutos
  alternatives_spanish:
  - los disipados
  - los libertinos
  - los pródigos
  - los inicuos
  lexicon: LSJ
  rationale: El cuerpo del capítulo en POB todavía dice 'lawless', pero la revisión verso-a-verso movió hacia 'profligate'. 'Disolutos' captura el desorden moral del término griego y se alinea con la dirección de la revisión.
- source_word: αἰδεσθέντες
  english_pob_choice: being put to shame
  chosen_spanish: avergonzados
  alternatives_spanish:
  - sintiendo vergüenza
  - respetando
  lexicon: LSJ
  rationale: Captura tanto la vergüenza interna como la dimensión social.
- source_word: ἐπιστρέψουσιν εἰς τὸ ἀγαθόν
  english_pob_choice: will turn back to what is good
  chosen_spanish: se volverán hacia el bien
  alternatives_spanish:
  - regresarán al bien
  lexicon: LSJ
  rationale: Conserva el matiz de retorno y la concreción del objeto ético.
- source_word: πλεονεκτοῦντες
  english_pob_choice: those who are greedy
  chosen_spanish: los codiciosos
  alternatives_spanish:
  - los avaros
  lexicon: LSJ
  rationale: Legible y se ajusta al vocabulario de vicios.
- source_word: τοῦ πάθους
  english_pob_choice: their passion
  chosen_spanish: su pasión
  alternatives_spanish:
  - su deseo
  lexicon: LSJ
  rationale: Preserva el sentido moral-psicológico.
- source_word: τὰ τῆς πλεονεξίας
  english_pob_choice: the things of greed
  chosen_spanish: las cosas de la codicia
  alternatives_spanish:
  - las ganancias de la codicia
  lexicon: LSJ
  rationale: Rendido relativamente literal; mantiene la frase auditable.
- source_word: θλιβομένοις
  english_pob_choice: those in distress
  chosen_spanish: los afligidos
  alternatives_spanish:
  - los oprimidos
  lexicon: LSJ
  rationale: Suficientemente amplio para preservar el griego.
- source_word: ἀκάθαρτα πνεύματα
  english_pob_choice: unclean spirits
  chosen_spanish: espíritus inmundos
  alternatives_spanish:
  - espíritus impuros
  lexicon: BDAG
  rationale: Estándar.
- source_word: φόβος ἀγαθῶν ἔργων
  english_pob_choice: fear of good works
  chosen_spanish: temor de buenas obras
  alternatives_spanish:
  - reverencia surgida de buenas obras
  lexicon: LSJ
  rationale: Frase difícil; representada transparentemente con nota.
- source_word: ὑβρίσει
  english_pob_choice: insults
  chosen_spanish: insulta
  alternatives_spanish:
  - ultraja
  lexicon: LSJ
  rationale: Sigue la revisión POB de 'does violence' a 'insults'.
- source_word: μετανοεῖ
  english_pob_choice: repents (verse-level revised; chapter draft retained 'changes his mind')
  chosen_spanish: se arrepiente
  alternatives_spanish:
  - cambia de pensamiento
  lexicon: BDAG
  rationale: Sigue la revisión verso-a-verso; el contexto es retorno moral tras encontrarse con el silencio misericordioso.
- source_word: λοιδορούντων
  english_pob_choice: those who revile him
  chosen_spanish: quienes le injurian
  alternatives_spanish:
  - los que le insultan
  lexicon: LSJ
  rationale: Mantiene el registro elevado.
- source_word: ταπεινωθῇ
  english_pob_choice: is brought low
  chosen_spanish: sea humillado
  alternatives_spanish:
  - sea abatido
  lexicon: LSJ
  rationale: Preserva ambigüedad externa/interna.
- source_word: φαιδρότερος
  english_pob_choice: more radiant
  chosen_spanish: más radiante
  alternatives_spanish:
  - más resplandeciente
  lexicon: LSJ
  rationale: Vindicación conspicua tras humillación, encaja con José.
theological_decisions:
- issue: Rendición de μετανοεῖ en v. 4
  chosen_reading: se arrepiente
  alternative_readings:
  - cambia de pensamiento
  rationale: Sigue la revisión verso-a-verso y el contexto inmediato de reversión moral del ofensor.
  doctrine_reference: 'DOCTRINE.md: μετανοέω → arrepentirse / cambio de mente por contexto'
- issue: Cómo traducir literalmente φόβος ἀγαθῶν ἔργων en v. 3
  chosen_reading: el temor de buenas obras
  alternative_readings:
  - reverencia por las buenas obras
  - temor producido por las buenas obras
  rationale: Construcción ambigua; preservada cercana al griego con nota.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en lugar de resolverla'
translation_notes:
  revision_awareness: 'POB hizo dos correcciones de capítulo: eliminó artículo en v.3 (''there is fear of good works'') y revisó v.4 de ''does violence to a holy man as to the light'' a ''insults a holy man'' para evitar importar ''light'' de una corrupción textual. El español sigue ambas.'
  spanish_consistency_notes:
  - '''mente'' para διάνοια consistente en todo el capítulo'
  - '''arrepentirse'' para μετανοέω en este contexto moral, no ''cambiar de mente'''
  - '''tinieblas'' plural por uso bíblico estándar'
  - '''disolutos'' para ἄσωτοι, alineado con la dirección de la revisión POB'
