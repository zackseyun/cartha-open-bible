base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/005.yaml
  text: '1[a]. If, then, you also have a good mind, even wicked people will be at peace with you, and the lawless[b], being put to shame before you, will turn back to what is good; and those who are greedy will not only withdraw from their passion, but will also give to those in distress the things of greed that they had possessed.


    2. If you are doing good, even the unclean spirits will flee from you, and the wild beasts will fear you.


    3. For where there is fear of good works and light in the mind, darkness flees away from it.


    4. For if anyone insults a holy man, he repents; for the holy one has mercy on those who revile him and keeps silent.


    5. And if anyone betrays a righteous soul and insults a righteous soul, the righteous man prays; and even if for a little while he is brought low, before long he appears far more radiant[e][d][c], as Joseph my brother also became.'
  footnotes:
  - marker: a
    text: Or 'the dissolute' or 'the reckless' for 'the lawless' (ἄσωτοι).
    reason: lexical_alternative
  - marker: b
    text: Literally 'the things of greed'; possibly 'the gains of greed' or 'what they had acquired by greed.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'the fear of good works' is difficult. It may mean reverence associated with good deeds or fear produced by a life of goodness.
    reason: alternative_reading
  - marker: d
    text: '''Changes his mind'' renders μετανοεῖ; alternatively, ''repents.'''
    reason: lexical_alternative
  - marker: e
    text: 'Joseph''s story is the model: though humbled for a time, he was later shown to be glorious and vindicated. See Genesis 37; 39–45.'
    reason: cross_reference
