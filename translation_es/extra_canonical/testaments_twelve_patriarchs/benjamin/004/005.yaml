translation:
  language: es
  text: Y ama, como a su propia alma, al que tiene la gracia de un buen espíritu[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testigos abrevian aquí, mientras que otros amplían la lista de virtudes. La traducción sigue la secuencia ética más completa representada en la capa griega aportada.
