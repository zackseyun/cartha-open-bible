    changes_summary: No changes needed.
translation:
  language: es
  text: Defiende al que tiene el temor del Señor; ayuda al que ama a Dios; amonestando, hace volver al que rechaza al Altísimo; y ama, como a su propia alma, al que tiene la gracia de un buen espíritu[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testigos abrevian aquí, mientras que otros amplían la lista de virtudes. La traducción sigue la secuencia ética más completa representada en la capa griega aportada.
    reason: textual_variant
lexical_decisions:
- source_word: ὑπερασπίζει
  english_pob_choice: defends
  chosen_spanish: defiende
  alternatives_spanish:
  - protege
  - ampara
  lexicon: LSJ
  rationale: '''Defender'' captura el sentido activo de salir en defensa de alguien que el verbo griego implica.'
- source_word: συντρέχει
  english_pob_choice: helps
  chosen_spanish: ayuda
  alternatives_spanish:
  - acude en auxilio
  - corre en su ayuda
  lexicon: LSJ
  rationale: La imagen literal es 'correr juntos', pero 'ayuda' es la lectura ética idiomática que la POB también adopta.
- source_word: νουθετῶν ἐπιστρέφει
  english_pob_choice: by admonishing, he turns back
  chosen_spanish: amonestando, hace volver
  alternatives_spanish:
  - corrigiendo, lo hace regresar
  - advirtiendo, lo convierte
  lexicon: LSJ
  rationale: Conserva tanto el medio (amonestación) como el resultado (volver), preservando la visión moral restaurativa.
- source_word: χάριν ἀγαθοῦ πνεύματος
  english_pob_choice: the grace of a good spirit
  chosen_spanish: la gracia de un buen espíritu
  alternatives_spanish:
  - el favor de un buen espíritu
  - una disposición graciosa de buen espíritu
  lexicon: LSJ
  rationale: Frase comprimida; mantenerla cercana al griego deja la expresión transparente para revisión posterior. πνεῦμα aquí es 'espíritu' minúsculo (disposición/buen espíritu), no el Espíritu Santo.
theological_decisions:
- issue: Mayúscula o minúscula en πνεύματος
  chosen_reading: minúscula 'espíritu'
  alternative_readings:
  - mayúscula 'Espíritu'
  rationale: El contexto se refiere a una disposición o talante interior bueno, no al Espíritu Santo de modo explícito; la POB no capitaliza.
translation_notes:
  revision_awareness: El revision_pass marcó este versículo como 'unchanged'; el español preserva la estructura de la POB.
  spanish_consistency_notes:
  - '''el temor del Señor'' como fórmula bíblica estándar'
  - '''amonestar'' para νουθετῶν, manteniendo la nota correctiva fraternal'
