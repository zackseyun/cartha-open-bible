base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/004/005.yaml
  text: He defends the one who has the fear of the Lord; he helps the one who loves God; by admonishing, he turns back the one who rejects the Most High; and he loves, as his own soul, the one who has the grace of a good spirit.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:09Z'
