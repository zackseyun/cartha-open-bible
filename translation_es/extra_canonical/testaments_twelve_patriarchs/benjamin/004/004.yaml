id: T12P.BEN.4.4
reference: Testament of Benjamin 4:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: Ἐάν¹⁹ τις δοξάζηται²⁰, οὐ²¹ φθονεῖ αὐτόν²²· ἐάν τις πλουτεῖ²³, οὐ ζηλοῖ²⁴· *ἐάν τις ἀνδρεῖος²⁵, ἐπαινεῖ²⁶ αὐτόν²⁷· τὸν σώφρονα ἀγαπῶν²⁸· ⸀τὸν πένητα ἐλεεῖ²⁹· *τῷ ἀσθενοῦντι³⁰ συμπάσχει³¹· τὸν Θεὸν φοβεῖται³².
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/004/004.yaml
  text: If anyone is glorified, he does not envy him; if anyone becomes rich, he is not jealous; if anyone is brave, he praises him; he loves the self-controlled man; he has mercy on the poor; he suffers together with the weak; he fears God.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:10Z'
    unchanged: false
    changes_summary: Replaced 'he sings praise to God' with 'he fears God' to reflect Θεὸν φοβεῖται. The prior draft omitted the verb 'fears' and appears to have followed a variant reading ('sings praise').
translation:
  language: es
  text: Si alguno es glorificado, no lo envidia; si alguno se enriquece, no siente celos; si alguno es valiente, lo elogia; ama al hombre dueño de sí[a]; tiene compasión del pobre; sufre junto con el débil; teme a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'al hombre prudente' o 'al hombre templado'. σώφρων denota el dominio propio moral más que la mera prudencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοξάζηται
  english_pob_choice: is glorified
  chosen_spanish: es glorificado
  alternatives_spanish:
  - es honrado
  - recibe gloria
  lexicon: LSJ
  rationale: Conserva el registro elevado del testamento; el sentido aquí es de honor social, pero el español 'glorificado' permite la misma ambigüedad que el griego.
- source_word: φθονεῖ / ζηλοῖ
  english_pob_choice: envy / be jealous
  chosen_spanish: envidiar / sentir celos
  alternatives_spanish:
  - envidiar / codiciar
  - envidiar / tener envidia
  lexicon: LSJ
  rationale: Mantiene la distinción retórica entre los dos verbos del catálogo de vicios sin colapsarlos.
- source_word: σώφρων
  english_pob_choice: self-controlled man
  chosen_spanish: hombre dueño de sí
  alternatives_spanish:
  - hombre prudente
  - hombre templado
  lexicon: LSJ
  rationale: '''Dueño de sí'' transmite el dominio propio moral sin sonar arcaizante; ''autocontrolado'' suena calcado.'
- source_word: συμπάσχει
  english_pob_choice: suffers together with
  chosen_spanish: sufre junto con
  alternatives_spanish:
  - se compadece de
  - padece con
  lexicon: LSJ
  rationale: Preserva la solidaridad fuerte del compuesto griego sin reducirla a mera compasión.
- source_word: Θεὸν φοβεῖται
  english_pob_choice: he fears God
  chosen_spanish: teme a Dios
  alternatives_spanish:
  - reverencia a Dios
  - tiene temor de Dios
  lexicon: LSJ
  rationale: Sigue la corrección de la POB (de 'sings praise' a 'fears'); 'teme a Dios' es la fórmula bíblica estándar en español.
translation_notes:
  revision_awareness: POB corrigió 'sings praise to God' a 'fears God' para reflejar Θεὸν φοβεῖται; el español sigue esa corrección con 'teme a Dios'.
  spanish_consistency_notes:
  - '''sentir celos'' para ζηλοῖ en contraste con ''envidiar'' para φθονεῖ'
  - '''sufrir junto con'' literal para συμπάσχει, no diluido a ''compadecerse'''
