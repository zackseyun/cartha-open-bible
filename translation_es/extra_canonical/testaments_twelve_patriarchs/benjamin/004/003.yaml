id: T12P.BEN.4.3
reference: Testament of Benjamin 4:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: ⸢Κἂν *μὴ βούλωνται περὶ αὐτοῦ εἰς καλά¹⁴, *οὗτος τὸ ἀγαθὸν ποιῶν¹⁵ νικᾷ τὸ κακόν, σκεπόμενος¹⁶ ὑπὸ τοῦ Θεοῦ¹⁷⸣. τοὺς †ἀδικοῦντας¹⁸ ἀγαπᾷ ὡς τὴν ψυχὴν αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/004/003.yaml
  text: And even if they do not intend good toward him, by doing good he overcomes evil, being sheltered by God. He loves those who wrong him as his own soul.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:09Z'
    unchanged: false
    changes_summary: Removed 'things' after 'good' for a more natural and formally accurate rendering of εἰς καλά, while preserving the sense and structure of the draft.
translation:
  language: es
  text: Y aunque ellos no se propongan el bien hacia él, este, haciendo el bien, vence el mal[a], al ser amparado por Dios. A los que le agravian los ama como a su propia alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Cf. Rom 12:21: «no seas vencido por el mal, sino vence con el bien el mal».'
    reason: cross_reference
lexical_decisions:
- source_word: νικᾷ τὸ κακόν
  english_pob_choice: overcomes evil
  chosen_spanish: vence el mal
  alternatives_spanish:
  - supera el mal
  - derrota el mal
  lexicon: LSJ
  rationale: '''Vencer'' conserva la fuerza moral del verbo νικάω sin dramatizarlo y se alinea con la POB.'
- source_word: σκεπόμενος ὑπὸ τοῦ Θεοῦ
  english_pob_choice: being sheltered by God
  chosen_spanish: al ser amparado por Dios
  alternatives_spanish:
  - protegido por Dios
  - cubierto por Dios
  lexicon: LSJ
  rationale: '''Amparado'' preserva la imagen de cobijo divino y suena natural en español neutro.'
- source_word: ἀδικοῦντας
  english_pob_choice: those who wrong him
  chosen_spanish: los que le agravian
  alternatives_spanish:
  - los que actúan injustamente con él
  - sus agresores
  lexicon: LSJ
  rationale: '''Agraviar'' transmite la injusticia personal sin reducirla a violencia física.'
translation_notes:
  revision_awareness: POB simplificó 'good things' a 'good' tras la revisión gpt-5.4 para acercarse a εἰς καλά; el español 'el bien' refleja esa decisión sin pluralizar.
  spanish_consistency_notes:
  - '''amparado'' usado para σκεπόμενος en lugar de ''cubierto'' para evitar lectura textil/cosmética'
  - '''agraviar'' preferido a ''maltratar'' para conservar el matiz de injusticia'
