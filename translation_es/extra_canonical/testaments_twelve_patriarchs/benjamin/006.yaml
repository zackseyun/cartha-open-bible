  text: VI. Τὸ διαβούλιον τοῦ ἀγαθοῦ ἀνδρὸς οὐκ ἔστιν ἐν χειρὶ πλάνης¹ πνεύματος² Βελίαρ· ὁ γὰρ ἄγγελος τῆς εἰρήνης ὁδηγεῖ τὴν ψυχὴν αὐτοῦ. 2. [Καὶ]³ οὐχ ὁρᾷ⁴ ἐμπαθῶς]⁵ *τὰ φθαρτά⁶, οὐδὲ⁷ συνάγει⁸ πλοῦτον ⌈εἰς φιληδονίαν⌉⁹. 3. Οὐ¹⁰ τέρπεται ἐν¹¹ ἡδονῇ, [⌈οὐ λυπεῖ τὸν πλησίον⌉, οὐκ ἐμπίπλαται τρυφῇ¹², οὐ πλανᾶται μετεωρισμοῖς ὀφθαλμῶν]¹³. Κύριος γάρ ἐστι ἡ¹⁴ μερὶς¹⁵ αὐτοῦ. 4. Τὸ¹⁶ ἀγαθὸν διαβούλιον *οὐ δέχεται δόξης ⌈οὐκ ἀτιμίας⌉¹⁷ ἀνθρώπων, *καὶ πάντα δόλον¹⁸ ἢ¹⁹ ψεῦδος ἢ²⁰ μάχην *ἢ λοιδωρίαν²¹ *οὐκ οἶδε²². *Κύριος γὰρ²³ ἐν αὐτῷ κατοικεῖ²⁴, καὶ φωτίζει τὴν²⁵ ψυχὴν αὐτοῦ, καὶ χαίρει²⁶ πρὸς πάντας²⁷ ἐν παντὶ καιρῷ. 5. Ἡ ἀγαθὴ διάνοια²⁸ οὐκ ἔχει δύο γλώσσας²⁹ εὐλογίας καὶ κατάρας³⁰, ὕβρεως καὶ ⌈τιμῆς⌉³¹, ἡσυχίας καὶ ταραχῆς, ὑποκρίσεως καὶ ἀληθείας, [πενίας καὶ πλούτου]³², ἀλλὰ *μίαν ἔχει περὶ πάντας³³ εἰλικρινῆ³⁴ καὶ³⁵ καθαρὰν ⌈διάθεσιν⌉. 6. Οὐκ ἔχει *ὅρασιν οὔτε ἀκοὴν³⁶ διπλῆν· *πᾶν γὰρ ὃ³⁷ ποιεῖ, Γἢ³⁸ λαλεῖ, *ἢ ὁρᾷ³⁸, οἶδεν ὅτι³⁹ Κύριος ἐπισκέπτει⁴⁰ τὴν⁴¹ ψυχὴν αὐτοῦ. 7. Καὶ καθαίρει τὴν
    διάνοιαν αὐτοῦ πρὸς⁴² τὸ μὴ καταγνωσθῆναι ὑπὸ *τῶν ἀνθρώπων, ὁμοίως καὶ ὑπὸ Θεοῦ. Ὁμοίως δὲ καὶ τοῦ Βελίαρ τὰ ἔργα διπλᾶ ἐστιν, καὶ ἀπλότητα ἐν αὐτοῖς οὐκ ἔχουσιν⁴³.
