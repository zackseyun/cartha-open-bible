translation:
  language: es
  text: El propósito[a] del hombre bueno no está en la mano del espíritu del engaño de Beliar[b], porque el ángel de la paz guía su alma. No mira con pasión las cosas perecederas, ni acumula riquezas para el placer. No se deleita en el placer ni aflige a su prójimo; no se sacia de lujo, ni se descarría con los desvaríos de los ojos. Porque el Señor es su porción. El buen propósito no acepta gloria ni deshonra de los hombres, y no conoce engaño, ni mentira, ni contienda, ni vituperio. Porque el Señor habita en él y da luz a su alma, y se regocija con todos en todo tiempo. La mente buena no tiene dos lenguas, una de bendición y otra de maldición, una de injuria y otra de honra, una de quietud y otra de turbación, una de hipocresía y otra de verdad, una de pobreza y otra de riqueza; sino que tiene una sola disposición sincera y pura hacia todos. No tiene vista ni oído doble[c]; pues en todo lo que hace, o habla, o ve, sabe que el Señor mira sobre su alma. Y purifica su mente, para no ser condenada
    ni por los hombres ni por Dios. Pero la disposición de Beliar es doble, y no tiene singularidad. Huid, por tanto, de la mala intención, hijos míos, y amad la mente buena, la que conoce la ley de Dios, para que descanséis en la esperanza, porque el hombre de mente buena no tiene un ojo oscurecido[d]. Muestra misericordia a todos, aun cuando sean pecadores; aunque tramen el mal contra él, haciendo el bien vence el mal, escudado por lo que es bueno. Y ama al justo como a su propia alma. Si alguno es glorificado, no lo envidia; si alguno se enriquece, no tiene celos; si alguno es valiente, lo alaba; al hombre virtuoso lo elogia; del pobre tiene misericordia; con el débil se compadece; a Dios canta alabanzas. Al que tiene la gracia de un buen espíritu, lo ama como a su propia alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'consejo', 'designio' o 'intención' por διαβούλιον.
    reason: lexical_alternative
  - marker: b
    text: '''Beliar'' refleja la forma griega de este testimonio; muchos lectores conocerán el nombre como ''Belial''.'
    reason: lexical_alternative
  - marker: c
    text: '''Vista ni oído doble'' preserva la imagen del capítulo de duplicidad frente a singularidad, en lugar de parafrasearla como mera hipocresía.'
    reason: lexical_alternative
  - marker: d
    text: '''Ojo oscurecido'' puede sugerir también el modismo ''mal de ojo'', es decir, envidia u hostilidad rencorosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διαβούλιον
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - consejo
  - intención
  - designio
  lexicon: LSJ
  rationale: En este contexto parenético el término denota la intención moral interior del hombre bueno; 'propósito' conserva el sentido ético-volitivo y se lee con naturalidad.
- source_word: πλάνης
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - error
  - extravío
  lexicon: LSJ
  rationale: Con 'espíritu de Beliar' el sentido es el de extravío moral activo, no un simple desvío. 'Engaño' destaca la agencia corruptora.
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: tradición griega del testimonio
  rationale: La forma griega aquí es Beliar; se transcribe para preservar el testimonio en lugar de normalizarlo a 'Belial'.
- source_word: ἐμπαθῶς
  english_pob_choice: with passion
  chosen_spanish: con pasión
  alternatives_spanish:
  - lujuriosamente
  - con avidez
  lexicon: LSJ
  rationale: El adverbio designa el deseo desordenado en sentido amplio, no solo lujuria sexual; 'con pasión' conserva el sentido moral más amplio.
- source_word: τὰ φθαρτά
  english_pob_choice: perishable things
  chosen_spanish: cosas perecederas
  alternatives_spanish:
  - cosas corruptibles
  lexicon: LSJ
  rationale: Contraste idiomático con el Señor como porción del hombre; 'perecederas' preserva la dimensión temporal-moral.
- source_word: μερὶς
  english_pob_choice: portion
  chosen_spanish: porción
  alternatives_spanish:
  - heredad
  - parte
  lexicon: LSJ
  rationale: Expresión tradicional de pacto para la herencia o suerte propia; 'porción' conserva la resonancia bíblica.
- source_word: διάνοια
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - pensamiento
  lexicon: LSJ
  rationale: En este capítulo designa la facultad moral interior; 'mente' es claro y consistente.
- source_word: δύο γλώσσας
  english_pob_choice: two tongues
  chosen_spanish: dos lenguas
  alternatives_spanish:
  - lengua doble
  - lengua bífida
  lexicon: LSJ
  rationale: La imagen literal es retóricamente fuerte y debe conservarse; introduce con eficacia los pares contrastantes.
- source_word: διάθεσιν
  english_pob_choice: disposition
  chosen_spanish: disposición
  alternatives_spanish:
  - actitud
  - inclinación
  lexicon: LSJ
  rationale: Designa la orientación interior fija hacia los demás; 'disposición' es elevado y claro.
- source_word: ὅρασιν ... ἀκοὴν διπλῆν
  english_pob_choice: double sight or hearing
  chosen_spanish: vista ni oído doble
  alternatives_spanish:
  - duplicidad en ver u oír
  - percepción doble
  lexicon: LSJ
  rationale: El fraseo literal extiende el tema de unidad frente a duplicidad; conservar la imagen es preferible a parafrasearla.
- source_word: σκοτεινὸν ὀφθαλμόν
  english_pob_choice: darkened eye
  chosen_spanish: ojo oscurecido
  alternatives_spanish:
  - ojo malo
  - mirada turbia
  lexicon: LSJ
  rationale: Puede sugerir envidia u oscuridad moral; 'ojo oscurecido' conserva la imagen amplia mientras las líneas siguientes precisan su sentido.
- source_word: ἐλεεῖ
  english_pob_choice: shows mercy
  chosen_spanish: muestra misericordia
  alternatives_spanish:
  - se compadece
  - tiene piedad
  lexicon: LSJ
  rationale: Es benevolencia activa, no mero sentimiento; 'muestra misericordia' comunica compasión efectiva.
translation_notes:
  revision_awareness: 'Se incorpora el pase de revisión gpt-5.4 (2026-04-23): ''placer'' en singular para ἡδονῇ, ''desvaríos'' en plural para μετεωρισμοῖς, y ''gloria ni deshonra'' sin artículo definido, alineando la traducción al griego.'
  spanish_consistency_notes:
  - Mantenemos 'Beliar' (no 'Belial') siguiendo el testimonio griego.
  - θεός → Dios; Κύριος → Señor; πνεῦμα → espíritu/Espíritu por contexto.
