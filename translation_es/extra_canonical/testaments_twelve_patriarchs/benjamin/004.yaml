base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/004.yaml
  text: '1[a]. See then, my children, the outcome of the good man. Imitate the good, because of his compassion, so that you also may wear crowns of glory.


    2. For the good man does not have a dark eye, for he shows mercy to all, even if they are sinners.


    3[b]. And even if they do not intend good toward him, by doing good he overcomes evil, being sheltered by God. He loves those who wrong him as his own soul.


    4. If anyone is glorified, he does not envy him; if anyone becomes rich, he is not jealous; if anyone is brave, he praises him; he loves the self-controlled man; he has mercy on the poor; he suffers together with the weak; he fears God.


    5. He defends the one who has the fear of the Lord; he helps the one who loves God; by admonishing, he turns back the one who rejects the Most High; and he loves, as his own soul[c], the one who has the grace of a good spirit.'
  footnotes:
  - marker: a
    text: The OCR layer contains preceding lines about 'the lamb of God' and the blameless one dying for the ungodly. These lines are textually difficult and appear displaced relative to the coherent opening of this chapter. They are not included in the main chapter translation here.
    reason: textual_variant
  - marker: b
    text: '''A darkened eye'' may also be understood as ''an evil eye,'' that is, an envious or grudging disposition.'
    reason: lexical_alternative
  - marker: c
    text: Some witnesses at this point read more briefly, while others expand the list of virtues. The translation follows the fuller ethical sequence represented in the supplied Greek layer.
    reason: textual_variant
