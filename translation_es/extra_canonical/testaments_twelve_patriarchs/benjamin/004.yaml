translation:
  language: es
  text: '1[a]. Vean, pues, hijos míos, el desenlace del hombre bueno. Imiten al bueno, por causa de su compasión, para que también ustedes lleven coronas de gloria.


    2. Porque el hombre bueno no tiene un ojo oscuro[b], pues tiene misericordia de todos, aun cuando sean pecadores.


    3. Y aunque ellos no se propongan el bien hacia él, este, haciendo el bien, vence el mal, al ser amparado por Dios. A los que le agravian los ama como a su propia alma.


    4. Si alguno es glorificado, no lo envidia; si alguno se enriquece, no siente celos; si alguno es valiente, lo elogia; ama al hombre dueño de sí; tiene compasión del pobre; sufre junto con el débil; teme a Dios.


    5. Defiende al que tiene el temor del Señor; ayuda al que ama a Dios; amonestando, hace volver al que rechaza al Altísimo; y ama, como a su propia alma[c], al que tiene la gracia de un buen espíritu.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La capa OCR contiene líneas precedentes sobre 'el cordero de Dios' y el inocente muriendo por los impíos. Esas líneas son textualmente difíciles y aparecen desplazadas respecto al inicio coherente de este capítulo. No se incluyen aquí en la traducción principal del capítulo.
    reason: textual_variant
  - marker: b
    text: '''Un ojo oscuro'' también puede entenderse como ''un mal de ojo'', es decir, una disposición envidiosa o resentida.'
    reason: lexical_alternative
  - marker: c
    text: Algunos testigos abrevian en este punto, mientras que otros amplían la lista de virtudes. La traducción sigue la secuencia ética más completa representada en la capa griega aportada.
    reason: textual_variant
lexical_decisions:
- source_word: τέλος
  english_pob_choice: outcome
  chosen_spanish: desenlace
  alternatives_spanish:
  - fin
  - meta
  - resultado
  lexicon: LSJ
  rationale: '''Desenlace'' conserva la fuerza paranética del estado-final observable mejor que ''fin'' (ambiguo) o ''meta'' (orientación).'
- source_word: μιμήσασθε
  english_pob_choice: imitate
  chosen_spanish: imiten
  alternatives_spanish:
  - sigan
  - copien
  lexicon: LSJ
  rationale: Imperativo fuerte; 'imitar' mantiene la imitación moral concreta del género testamentario.
- source_word: εὐσπλαγχνία
  english_pob_choice: compassion
  chosen_spanish: compasión
  alternatives_spanish:
  - misericordia
  - ternura entrañable
  lexicon: LSJ
  rationale: Mantiene la profundidad afectiva que fundamenta la imitación ética.
- source_word: σκοτεινὸν ὀφθαλμόν
  english_pob_choice: a dark eye
  chosen_spanish: un ojo oscuro
  alternatives_spanish:
  - un ojo malo
  - un ojo sombrío
  lexicon: LSJ
  rationale: La frase probablemente alude a la envidia, pero conservar la imagen del 'ojo oscuro' permite que el contexto la interprete (cf. POB que retuvo 'dark eye' en la revisión).
- source_word: ἐλεεῖ
  english_pob_choice: shows mercy
  chosen_spanish: tiene misericordia
  alternatives_spanish:
  - se compadece
  - tiene piedad
  lexicon: LSJ
  rationale: Conserva el sentido ético activo de la acción misericordiosa hacia otros.
- source_word: ἀδικοῦντας
  english_pob_choice: those who wrong him
  chosen_spanish: los que le agravian
  alternatives_spanish:
  - los que actúan injustamente con él
  lexicon: LSJ
  rationale: '''Agraviar'' transmite la injusticia personal.'
- source_word: σώφρων
  english_pob_choice: self-controlled man
  chosen_spanish: hombre dueño de sí
  alternatives_spanish:
  - hombre prudente
  - hombre templado
  lexicon: LSJ
  rationale: Mantiene el énfasis del dominio propio moral en el catálogo de virtudes.
- source_word: συμπάσχει
  english_pob_choice: suffers together with
  chosen_spanish: sufre junto con
  alternatives_spanish:
  - se compadece de
  - padece con
  lexicon: LSJ
  rationale: Preserva la solidaridad implicada en el compuesto griego.
- source_word: Θεὸν φοβεῖται
  english_pob_choice: he fears God
  chosen_spanish: teme a Dios
  alternatives_spanish:
  - reverencia a Dios
  lexicon: LSJ
  rationale: Sigue la corrección de la POB; fórmula bíblica estándar.
- source_word: φόβον Κυρίου
  english_pob_choice: the fear of the Lord
  chosen_spanish: el temor del Señor
  alternatives_spanish:
  - la reverencia al Señor
  lexicon: LSJ
  rationale: Expresión bíblica estándar; preservar.
- source_word: ὑπερασπίζει
  english_pob_choice: defends
  chosen_spanish: defiende
  alternatives_spanish:
  - protege
  lexicon: LSJ
  rationale: Captura la fuerza activa de salir en defensa.
- source_word: συντρέχει
  english_pob_choice: helps
  chosen_spanish: ayuda
  alternatives_spanish:
  - acude en auxilio
  lexicon: LSJ
  rationale: Lectura ética idiomática estándar.
- source_word: νουθετῶν ἐπιστρέφει
  english_pob_choice: by admonishing, he turns back
  chosen_spanish: amonestando, hace volver
  alternatives_spanish:
  - corrigiendo, lo hace regresar
  lexicon: LSJ
  rationale: Preserva medio y resultado de la visión restaurativa.
- source_word: χάριν ἀγαθοῦ πνεύματος
  english_pob_choice: the grace of a good spirit
  chosen_spanish: la gracia de un buen espíritu
  alternatives_spanish:
  - el favor de un buen espíritu
  lexicon: LSJ
  rationale: Cercano al griego; espíritu en minúscula (disposición interior) según POB.
theological_decisions:
- issue: Material cristológico inicial en la capa OCR antes de v.1
  chosen_reading: Excluido de la traducción del capítulo y tratado como texto extraño o desplazado respecto a la unidad parainética coherente del cap. 4 que comienza 'Vean, pues, hijos míos.'
  alternative_readings:
  - Incluir las líneas precedentes sobre el 'cordero de Dios' y la muerte expiatoria como parte del cap. 4
  - Tratar el material como interpolación textual
  rationale: El testigo griego suministrado presenta un capítulo ético coherente que comienza en 'Ἴδετε οὖν, τέκνα μου'. Las líneas precedentes están textualmente desplazadas y probablemente pertenecen a otro contexto.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla; usar notas en vez de armonizar silenciosamente.
- issue: Significado de 'ojo oscuro'
  chosen_reading: Conservado como imagen en lugar de interpretado directamente como 'mal de ojo'.
  alternative_readings:
  - mal de ojo
  - ojo envidioso
  rationale: La imagen griega es vívida y probablemente connota envidia, pero las líneas circundantes ya explican el sentido. Mantener la imagen preserva la textura.
translation_notes:
  revision_awareness: 'POB hizo tres cambios en la revisión: ''darkened eye'' a ''dark eye'', ''good things'' a ''good'', y ''sings praise'' a ''fears''; el español sigue las tres correcciones.'
  spanish_consistency_notes:
  - '''temer a Dios'' / ''temor del Señor'' como fórmulas bíblicas estándar'
  - '''desenlace'' para τέλος en sentido paranético (resultado observable de una vida)'
  - '''ojo oscuro'' literal para preservar la imagen, con nota sobre ''mal de ojo'''
  - '''amparado'' para σκεπόμενος; ''sufrir junto con'' literal para συμπάσχει'
