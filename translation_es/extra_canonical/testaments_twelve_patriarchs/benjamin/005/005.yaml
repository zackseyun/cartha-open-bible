translation:
  language: es
  text: Y si alguien traiciona a un alma justa[a], el justo ora; y aunque por un poco de tiempo sea humillado, no mucho después aparece mucho más radiante, como llegó a ser José mi hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La historia de José es el modelo: aunque humillado por un tiempo, después fue manifestado como glorioso y vindicado. Cf. Génesis 37; 39–45.'
    reason: cross_reference
lexical_decisions:
- source_word: δίκαιον προδώσει
  english_pob_choice: betrays a righteous soul
  chosen_spanish: traiciona a un alma justa
  alternatives_spanish:
  - entrega a un justo
  - vende a un justo
  lexicon: LSJ
  rationale: '''Traicionar'' es la lectura idiomática para προδίδωμι en contexto interpersonal; ''alma justa'' refleja la insistencia poética del paralelo griego.'
- source_word: ὁ δίκαιος προσεύχεται
  english_pob_choice: the righteous man prays
  chosen_spanish: el justo ora
  alternatives_spanish:
  - el justo reza
  lexicon: LSJ
  rationale: '''Orar'' es el verbo bíblico estándar; ''rezar'' tiene connotaciones más litúrgicas/católicas regionales que conviene evitar.'
- source_word: ταπεινωθῇ
  english_pob_choice: is brought low
  chosen_spanish: sea humillado
  alternatives_spanish:
  - sea abatido
  - sea rebajado
  lexicon: LSJ
  rationale: El pasivo indica humillación temporal; 'humillado' preserva tanto la humillación externa como la condición rebajada.
- source_word: φαιδρότερος
  english_pob_choice: more radiant
  chosen_spanish: mucho más radiante
  alternatives_spanish:
  - más resplandeciente
  - más alegre
  lexicon: LSJ
  rationale: En la comparación con José el sentido no es alegría emocional sino vindicación conspicua y brillantez tras la humillación; 'radiante' encaja con la imagen.
translation_notes:
  revision_awareness: POB eliminó el adverbio 'also' por no estar respaldado por la fuente; el español prescinde igualmente del 'también'.
  spanish_consistency_notes:
  - '''orar'' para προσεύχεται, registro bíblico neutro'
  - '''humillado'' para ταπεινωθῇ, conserva ambigüedad externa/interna'
  - '''radiante'' para φαιδρότερος en sentido de vindicación visible'
