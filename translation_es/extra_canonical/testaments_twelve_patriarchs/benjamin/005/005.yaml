  text: Κἄν³¹ τις *δίκαιον προδώσει³², *ὁ δίκαιος προσεύχεται· εἰ καὶ πρὸς³³ ὀλίγον ταπεινωθῇ, *μετʼ οὐ³⁴ πολὺ φαιδρότερος³⁵ ἀναφαίνεται, οἷος γέγονεν³⁶ Ἰωσὴφ ὁ ἀδελφός μου.
