source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: Ὅπου γὰρ ἔνι²² *φόβος ἀγαθῶν ἔργων καὶ φῶς²³ εἰς διάνοιαν καὶ²⁴ τὸ σκότος ἀποδιδράσκει ἀπʼ²⁵ αὐτοῦ.˥
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/005/003.yaml
  text: For where there is fear of good works and light in the mind, darkness flees from it.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:12Z'
    unchanged: false
    changes_summary: Removed the unnecessary article before 'fear' for more natural English, and simplified 'flees away from it' to 'flees from it' while preserving the Greek sense.
translation:
  language: es
  text: Pues donde hay temor de buenas obras[a] y luz en la mente, las tinieblas huyen de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión 'temor de buenas obras' es difícil. Puede significar la reverencia asociada con las buenas obras o el temor producido por una vida de bondad.
    reason: alternative_reading
lexical_decisions:
- source_word: φόβος ἀγαθῶν ἔργων
  english_pob_choice: fear of good works
  chosen_spanish: temor de buenas obras
  alternatives_spanish:
  - reverencia surgida de buenas obras
  - temor producido por las buenas obras
  lexicon: LSJ
  rationale: La frase es difícil; el español la representa transparentemente sin parafrasearla, con el genitivo abierto y nota interpretativa.
- source_word: διάνοιαν
  english_pob_choice: the mind
  chosen_spanish: la mente
  alternatives_spanish:
  - el entendimiento
  lexicon: LSJ
  rationale: Consistencia con 'mente' usada en BEN 5:1.
- source_word: ἀποδιδράσκει
  english_pob_choice: flees
  chosen_spanish: huyen
  alternatives_spanish:
  - escapan
  - se apartan
  lexicon: LSJ
  rationale: POB simplificó 'flees away' a 'flees'; el español 'huyen' es directo y natural.
- source_word: τὸ σκότος
  english_pob_choice: darkness
  chosen_spanish: las tinieblas
  alternatives_spanish:
  - la oscuridad
  lexicon: LSJ
  rationale: '''Tinieblas'' (plural en español, singular en griego) es la fórmula bíblica estándar para el contraste con la luz.'
theological_decisions:
- issue: Cómo traducir literalmente φόβος ἀγαθῶν ἔργων
  chosen_reading: el temor de buenas obras
  alternative_readings:
  - reverencia por las buenas obras
  - temor producido por las buenas obras
  rationale: La construcción griega es ambigua. Se preserva la redacción cercana al griego y se anota la dificultad en lugar de resolverla en el cuerpo principal.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en lugar de resolverla'
translation_notes:
  revision_awareness: POB simplificó 'flees away from it' a 'flees from it'; el español traduce con simplicidad equivalente.
  spanish_consistency_notes:
  - '''tinieblas'' plural según uso bíblico estándar para σκότος'
  - '''mente'' para διάνοια consistente con el resto del capítulo'
