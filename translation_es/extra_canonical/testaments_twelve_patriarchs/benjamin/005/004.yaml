base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/005/004.yaml
  text: For if anyone insults a holy man, he repents; for the holy one has mercy on those who revile him and keeps silent.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:13Z'
    unchanged: false
    changes_summary: Replaced 'does violence to ... as to the light' with 'insults' to reflect ὑβρίσει more accurately and removed unsupported wording not clearly represented in the source. Replaced 'changes his mind' with 'repents' for μετανοεῖ, while retaining the rest with minor smoothing.
translation:
  language: es
  text: Porque si alguien insulta a un hombre santo, se arrepiente[a]; pues el santo tiene misericordia de quienes le injurian y guarda silencio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Se arrepiente'' rinde μετανοεῖ; alternativamente, ''cambia de pensamiento''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑβρίσει
  english_pob_choice: insults
  chosen_spanish: insulta
  alternatives_spanish:
  - ultraja
  - agravia
  lexicon: LSJ
  rationale: POB cambió 'does violence' a 'insults' en la revisión para reflejar ὑβρίσει con más precisión y evitar importar 'light' de una corrupción textual; el español sigue esa lectura.
- source_word: ἄνδρα ὅσιον
  english_pob_choice: a holy man
  chosen_spanish: un hombre santo
  alternatives_spanish:
  - un varón piadoso
  - un hombre devoto
  lexicon: LSJ
  rationale: ὅσιος denota la santidad en relación a Dios; 'santo' es la fórmula bíblica neutra estándar.
- source_word: μετανοεῖ
  english_pob_choice: repents
  chosen_spanish: se arrepiente
  alternatives_spanish:
  - cambia de pensamiento
  - se vuelve atrás
  lexicon: BDAG
  rationale: 'POB revisó ''changes his mind'' a ''repents''; el español sigue la corrección con ''se arrepiente'' (sentido moral de retorno tras el encuentro con la respuesta misericordiosa del santo). Glosario POB: μετάνοια→arrepentimiento en contextos de retorno moral.'
- source_word: λοιδορούντων
  english_pob_choice: those who revile him
  chosen_spanish: quienes le injurian
  alternatives_spanish:
  - los que le insultan
  - sus injuriadores
  lexicon: LSJ
  rationale: '''Injuriar'' mantiene el registro elevado y la agudeza moral del género testamentario.'
- source_word: ἐλεεῖ
  english_pob_choice: has mercy on
  chosen_spanish: tiene misericordia de
  alternatives_spanish:
  - se compadece de
  - se apiada de
  lexicon: LSJ
  rationale: Mantiene el sentido ético activo de la acción misericordiosa.
- source_word: σιωπᾷ
  english_pob_choice: keeps silent
  chosen_spanish: guarda silencio
  alternatives_spanish:
  - calla
  - permanece callado
  lexicon: LSJ
  rationale: '''Guardar silencio'' es idiomático y preserva la deliberación moral del silencio.'
theological_decisions:
- issue: Rendición de μετανοεῖ
  chosen_reading: se arrepiente
  alternative_readings:
  - cambia de pensamiento
  rationale: POB revisó a 'repents' aquí; el sentido inmediato es una reversión de actitud cuando el ofensor se encuentra con el silencio misericordioso del hombre santo, lo que se ajusta a 'arrepentirse' en el glosario.
  doctrine_reference: 'Glosario POB: μετανοέω → arrepentirse / cambio de mente por contexto'
translation_notes:
  revision_awareness: 'POB hizo dos correcciones clave: ''does violence'' a ''insults'' y ''changes his mind'' a ''repents''; el español sigue ambas.'
  spanish_consistency_notes:
  - '''arrepentirse'' para μετανοέω en contexto de retorno moral, alineado con la revisión POB'
  - '''injuriar'' para λοιδορέω, registro elevado del testamento'
  - '''guardar silencio'' para σιωπάω, idiomático'
