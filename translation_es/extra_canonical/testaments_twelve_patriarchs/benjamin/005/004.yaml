  text: '*Ἐὰν γὰρ˥²⁶ ὑβρίσει²⁷ *ἄνδρα ὅσιον²⁸ μετανοεῖ²⁹, ἐλεεῖ γὰρ ⌈ὁ ὅσιος⌉ τῶν λοιδορούν³⁰ καὶ σιωπᾷ.'
