id: T12P.BEN.5.1
reference: Testament of Benjamin 5:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: V. Ἐὰν ⸀οὖν καὶ ὑμεῖς¹· ἔχετε² ἀγαθὴν³ ⸀διάνοιαν⁴, καὶ⸃ οἱ πονηροὶ ἄνθρωποι⁵ *εἰρηνεύσουσιν μεθʼ ὑμῶν⁶, καὶ οἱ ἄσωτοι αἰδεσθέντες⁷ ὑμᾶς⁸ ⸀ἐπιστρέψουσιν⁹ εἰς *τὸ ἀγαθόν¹⁰, καὶ οἱ πλεονεκτοῦντες¹¹ οὐ μόνον ἀποστήσονται *τοῦ πάθους¹² ἀλλὰ καὶ *τὰ τῆς¹³ πλεονεξίας *ἃ εἶχον¹⁴ δώσουσιν¹⁵ τοῖς θλιβομένοις.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/005/001.yaml
  text: If, then, you also have a good mind, even wicked people will be at peace with you, and the profligate, being put to shame by you, will turn to what is good; and those who are greedy will not only turn away from their passion, but will also give to those in distress the things of greed that they had.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:12Z'
    unchanged: false
    changes_summary: Changed 'lawless' to 'profligate' for ἄσωτοι, 'before you' to 'by you' for more natural rendering of αἰδεσθέντες ὑμᾶς, 'turn back' to 'turn' for ἐπιστρέψουσιν, 'withdraw from' to 'turn away from' for ἀποστήσονται, and removed 'possessed' to avoid overtranslation of ἃ εἶχον.
translation:
  language: es
  text: Si, pues, ustedes también tienen una mente buena, hasta los hombres malos estarán en paz con ustedes, y los disolutos[a], avergonzados por ustedes, se volverán hacia el bien; y los codiciosos no solo se apartarán de su pasión, sino que también darán a los afligidos las cosas de la codicia[b] que tenían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los disipados' o 'los libertinos' (ἄσωτοι).
    reason: lexical_alternative
  - marker: b
    text: Literalmente 'las cosas de la codicia'; posiblemente 'las ganancias de la codicia' o 'lo que habían adquirido por codicia'.
    reason: lexical_alternative
lexical_decisions:
- source_word: διάνοιαν
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - disposición
  lexicon: LSJ
  rationale: '''Mente'' preserva el sentido cognitivo-ético sin sobrepsicologizar y resuena con la preocupación del capítulo por la intención interna.'
- source_word: εἰρηνεύσουσιν
  english_pob_choice: will be at peace
  chosen_spanish: estarán en paz
  alternatives_spanish:
  - harán las paces
  - vivirán en paz
  lexicon: LSJ
  rationale: Conserva la fuerza relacional de μετά.
- source_word: ἄσωτοι
  english_pob_choice: the profligate
  chosen_spanish: los disolutos
  alternatives_spanish:
  - los disipados
  - los libertinos
  - los pródigos
  lexicon: LSJ
  rationale: POB cambió 'lawless' a 'profligate' en la revisión; 'disolutos' captura el desorden moral más que la prodigalidad financiera y se ajusta al contraste con volverse al bien.
- source_word: αἰδεσθέντες ὑμᾶς
  english_pob_choice: being put to shame by you
  chosen_spanish: avergonzados por ustedes
  alternatives_spanish:
  - sintiendo vergüenza ante ustedes
  - respetándoles
  lexicon: LSJ
  rationale: 'Refleja la corrección revisada (''by you'', no ''before you''): la disposición buena de ustedes es la causa moral de la vergüenza.'
- source_word: ἐπιστρέψουσιν εἰς τὸ ἀγαθόν
  english_pob_choice: will turn to what is good
  chosen_spanish: se volverán hacia el bien
  alternatives_spanish:
  - regresarán al bien
  - se convertirán al bien
  lexicon: LSJ
  rationale: POB simplificó 'turn back' a 'turn'; el español 'volverse hacia el bien' conserva ese matiz directo.
- source_word: πλεονεκτοῦντες
  english_pob_choice: those who are greedy
  chosen_spanish: los codiciosos
  alternatives_spanish:
  - los avaros
  - los explotadores
  lexicon: LSJ
  rationale: '''Codiciosos'' es legible y se ajusta al vocabulario de vicios.'
- source_word: τοῦ πάθους
  english_pob_choice: their passion
  chosen_spanish: su pasión
  alternatives_spanish:
  - su deseo
  - su vicio
  lexicon: LSJ
  rationale: Preserva el sentido moral-psicológico del impulso interno.
- source_word: θλιβομένοις
  english_pob_choice: those in distress
  chosen_spanish: los afligidos
  alternatives_spanish:
  - los oprimidos
  - los angustiados
  lexicon: LSJ
  rationale: Suficientemente amplio para preservar el griego sin restringirlo a persecución.
translation_notes:
  revision_awareness: 'POB hizo cinco cambios en la revisión: ''lawless''→''profligate'', ''before you''→''by you'', ''turn back''→''turn'', ''withdraw from''→''turn away from'', y eliminó ''possessed''. El español sigue todas las correcciones.'
  spanish_consistency_notes:
  - '''mente'' para διάνοια como sede del juicio moral'
  - '''disolutos'' para ἄσωτοι, alineado con la revisión de POB'
  - '''cosas de la codicia'' literal con nota explicativa'
