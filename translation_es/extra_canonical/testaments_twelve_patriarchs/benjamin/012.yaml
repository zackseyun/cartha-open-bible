base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/012.yaml
  text: '1[a]. And after saying these things, he stretched out his feet and fell asleep in a good sleep.

    2. And his sons did as he had commanded them, and they carried his body and buried him in Hebron with his fathers.


    2. The number of his life was one hundred and twenty-five years[b]. And when he had finished his words, he said, “I command you, my children, carry my bones up out of Egypt, and bury me in Hebron near my fathers.”

    2. And Benjamin died at one hundred and twenty-five years, in a good old age; and they placed him in a coffin.

    3. And in the ninety-first year after the departure of the sons of Israel from Egypt, they and their brothers brought up the bones of their fathers secretly during the war in Canaan, and buried them in Hebron beside the feet of their fathers.

    4. And they returned from the land of Canaan[c], and lived in Egypt until the day of their departure from the land of Egypt.'
  footnotes:
  - marker: a
    text: Some Greek witnesses add 'and good' after 'a good sleep.'
    reason: textual_variant
  - marker: b
    text: The chapter preserves overlapping closing notices about Benjamin's death, burial, and the later transfer of the patriarchs' bones. The repetition likely reflects a complex transmission history, but it is translated here as it stands in the Greek witness.
    reason: textual_variant
  - marker: c
    text: The phrase 'beside the feet of their fathers' is literal Greek and may refer to burial placement near the ancestral tombs rather than directly at the fathers' feet.
    reason: lexical_alternative
