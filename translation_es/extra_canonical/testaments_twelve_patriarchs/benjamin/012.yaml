translation:
  language: es
  text: "1[a]. Y después de decir estas cosas, extendió sus pies y se durmió en un buen sueño.\n\n\n    2. Y sus hijos hicieron como él les había mandado, y tomaron su cuerpo y lo sepultaron en Hebrón con sus padres.\n\n\n\n    2. El número de los años de su vida fue de ciento veinticinco años[b]. Y cuando hubo terminado sus palabras, dijo: \"Les ordeno, hijos míos, que lleven mis huesos de Egipto y me sepulten en Hebrón cerca de mis padres.\"\n\n\n    2. Y murió Benjamín a los ciento veinticinco años, en buena vejez; y lo pusieron en un féretro.\n\n\n    3. Y en el año noventa y uno después de la salida de los hijos de Israel de Egipto, ellos y sus hermanos subieron en secreto los huesos de sus padres en la guerra en Canaán, y los sepultaron en Hebrón junto a los pies de sus padres.\n\n\n    4. Y ellos regresaron de la tierra de Canaán[c], y vivieron en Egipto hasta el día de su salida de la tierra de Egipto."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testimonios griegos añaden 'y bueno' después de 'un buen sueño.'
    reason: textual_variant
  - marker: b
    text: El capítulo conserva avisos finales superpuestos sobre la muerte de Benjamín, su entierro y el traslado posterior de los huesos de los patriarcas. La repetición probablemente refleja una compleja historia de transmisión, pero se traduce aquí tal como está en el testimonio griego.
    reason: textual_variant
  - marker: c
    text: La frase 'junto a los pies de sus padres' es griego literal y puede referirse a la ubicación del entierro cerca de las tumbas ancestrales más que directamente a los pies de los padres.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκοιμήθη ὕπνῳ καλῷ
  english_pob_choice: fell asleep in a good sleep
  chosen_spanish: se durmió en un buen sueño
  alternatives_spanish:
  - durmió un sueño bueno
  - murió pacíficamente
  lexicon: LSJ
  rationale: Conserva el eufemismo testamentario de muerte como sueño preservando la repetición griega del lenguaje del dormir; evita reducirlo a una paráfrasis interpretativa como 'murió en paz'.
- source_word: ἄραντες
  english_pob_choice: carried
  chosen_spanish: tomaron
  alternatives_spanish:
  - levantaron
  - alzaron
  lexicon: LSJ
  rationale: El verbo significa 'levantar/llevar'; 'tomaron' fluye natural en castellano para esta acción funeraria, siguiendo la revisión del POB que ajustó 'carried up' a 'carried'.
- source_word: ἐντέλλομαι
  english_pob_choice: I command
  chosen_spanish: Os ordeno
  alternatives_spanish:
  - Os mando
  - Os encargo
  lexicon: BDAG
  rationale: El lenguaje fuerte e imperativo del testamento debe mantenerse fuerte; 'os ordeno' refleja mejor el encargo final autoritativo del padre.
- source_word: ἀνενέγκατε
  english_pob_choice: carry up
  chosen_spanish: llevéis
  alternatives_spanish:
  - subáis
  - trasladéis
  lexicon: LSJ
  rationale: Rendición estándar para el traslado de restos desde Egipto; 'llevéis' es la forma natural en castellano sin perder la idea del traslado patriarcal.
- source_word: ὀστᾶ
  english_pob_choice: bones
  chosen_spanish: huesos
  alternatives_spanish:
  - restos
  - osamenta
  lexicon: LSJ
  rationale: El griego es concreto, no genérico; 'huesos' preserva el motivo del entierro patriarcal familiar de las tradiciones de Génesis y Éxodo.
- source_word: ἐγγὺς τῶν πατέρων μου
  english_pob_choice: near my fathers
  chosen_spanish: cerca de mis padres
  alternatives_spanish:
  - junto a mis padres
  - al lado de mis padres
  lexicon: LSJ
  rationale: Conserva el lenguaje de parentesco y el sentido espacial sin sobreinterpretar la disposición exacta del entierro.
- source_word: ἐν γήρει καλῷ
  english_pob_choice: in a good old age
  chosen_spanish: en buena vejez
  alternatives_spanish:
  - en hermosa vejez
  - en vejez próspera
  lexicon: LSJ
  rationale: Modismo bíblico tradicional que coincide bien con el griego y preserva el registro elevado.
- source_word: ἐν παραθήκῃ
  english_pob_choice: in a coffin
  chosen_spanish: en un féretro
  alternatives_spanish:
  - en un ataúd
  - en custodia
  lexicon: LSJ
  rationale: En este contexto funerario el sentido es que su cuerpo fue puesto en custodia, convencionalmente un féretro/sarcófago; 'féretro' da el referente probable en castellano legible.
- source_word: ἐν κρυφῇ
  english_pob_choice: secretly
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - ocultamente
  lexicon: LSJ
  rationale: Modismo natural en castellano; preserva la acción furtiva descrita en la narrativa.
- source_word: παρὰ τοὺς πόδας τῶν πατέρων αὐτῶν
  english_pob_choice: beside the feet of their fathers
  chosen_spanish: junto a los pies de sus padres
  alternatives_spanish:
  - a los pies de sus padres
  - cerca de los pies de sus padres
  lexicon: LSJ
  rationale: El griego es inusualmente específico; la traducción conserva la imagen corporal en lugar de suavizarla a un genérico 'con sus padres'.
theological_decisions:
- issue: Tradición de doble final y notificaciones repetitivas en el capítulo
  chosen_reading: Traducir el testimonio griego completo tal como está preservado, incluyendo las notificaciones repetidas de muerte y entierro.
  alternative_readings:
  - Fundir las notificaciones en un final más fluido
  - Tratar algunas líneas como secundarias y omitirlas del texto principal
  rationale: El capítulo tal como se transmite contiene fórmulas de conclusión superpuestas. La transparencia exige traducir el griego existente en lugar de armonizarlo silenciosamente.
  doctrine_reference: 'PHILOSOPHY.md: traducir directamente del texto fuente y documentar la complejidad en lugar de ocultarla.'
- issue: Notificación cronológica sobre el año noventa y uno después del éxodo
  chosen_reading: Renderizar la declaración cronológica directamente en el texto principal, a pesar de la tensión histórica.
  alternative_readings:
  - Enmendar la cronología
  - Interpretarla de forma laxa o parafrástica
  rationale: El testimonio griego presenta una afirmación cronológica específica. La traducción preserva esa tensión en lugar de resolverla por conjetura.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: El POB inglés ajustó en revisión 'carried up his body' a 'carried his body' y reposicionó 'up' en la frase de los huesos para reflejar mejor el griego ἄραντες/ἀνενέγκατε. La traducción española sigue la rendición revisada y mantiene la repetición transmitida del griego sin armonizar.
  spanish_consistency_notes:
  - ἔξοδος → salida (no 'éxodo' en contexto narrativo)
  - ὀστᾶ → huesos (motivo patriarcal)
  - ἐν παραθήκῃ → en un féretro (custodia funeraria)
  - doble notificación de muerte preservada (transparencia textual)
