  text: Οὐ¹⁰ τέρπεται ἐν¹¹ ἡδονῇ, [⌈οὐ λυπεῖ τὸν πλησίον⌉, οὐκ ἐμπίπλαται τρυφῇ¹², οὐ πλανᾶται μετεωρισμοῖς ὀφθαλμῶν]¹³. Κύριος γάρ ἐστι ἡ¹⁴ μερὶς¹⁵ αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/006/003.yaml
  text: He does not delight in pleasure, [does not grieve his neighbor, does not fill himself with luxury, does not go astray by the wanderings of the eyes]. For the Lord is his portion.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: Restored the bracketed sequence as direct clauses parallel to the Greek and adjusted wording slightly for closer lexical completeness and syntax.
translation:
  language: es
  text: No se deleita en el placer, [no agravia a su prójimo, no se llena de lujo, no se extravía con el divagar de los ojos[a]]. Pues el Señor es su porción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La imagen de los 'ojos que divagan' alude a la mirada inquieta y codiciosa, una expresión común en la literatura sapiencial para la concupiscencia.
    reason: cultural_note
lexical_decisions:
- source_word: οὐ τέρπεται ἐν ἡδονῇ
  english_pob_choice: does not delight in pleasure
  chosen_spanish: no se deleita en el placer
  alternatives_spanish:
  - no se goza en el placer
  lexicon: LSJ
  rationale: '''Deleitarse'' es el verbo natural en español para τέρπομαι; conserva el contraste ético entre delicia mundana y porción divina.'
- source_word: οὐ λυπεῖ τὸν πλησίον
  english_pob_choice: does not grieve his neighbor
  chosen_spanish: no agravia a su prójimo
  alternatives_spanish:
  - no entristece al prójimo
  - no causa pena al prójimo
  lexicon: LSJ
  rationale: λυπέω cubre causar dolor o ofensa; 'agraviar' captura el daño activo, mientras que 'entristecer' es opción literal alternativa.
- source_word: οὐκ ἐμπίπλαται τρυφῇ
  english_pob_choice: does not fill himself with luxury
  chosen_spanish: no se llena de lujo
  alternatives_spanish:
  - no se sacia de lujo
  - no se harta de lujo
  lexicon: LSJ
  rationale: Mantiene la imagen de saciedad ya completa que el verbo griego implica.
- source_word: οὐ πλανᾶται μετεωρισμοῖς ὀφθαλμῶν
  english_pob_choice: does not go astray by the wanderings of the eyes
  chosen_spanish: no se extravía con el divagar de los ojos
  alternatives_spanish:
  - no se descarría con el vagar de los ojos
  - no es engañado por las distracciones de los ojos
  lexicon: LSJ
  rationale: πλανάομαι denota extravío moral; μετεωρισμός es vagar/elevarse, aplicado a ojos sugiere distracción/divagación. 'Divagar de los ojos' conserva la imagen vívida.
- source_word: Κύριος ἐστι ἡ μερὶς αὐτοῦ
  english_pob_choice: the Lord is his portion
  chosen_spanish: el Señor es su porción
  alternatives_spanish:
  - el Señor es su parte
  - el Señor es su heredad
  lexicon: LSJ
  rationale: Fórmula bíblica clásica (cf. Sal 16:5; 73:26 LXX); 'porción' es estándar.
translation_notes:
  revision_awareness: POB restauró la secuencia entre corchetes como cláusulas directas paralelas al griego en la revisión; el español preserva esa estructura.
  spanish_consistency_notes:
  - '''porción'' para μερίς, fórmula salmódica clásica'
  - '''extraviarse'' para πλανάομαι, registro de extravío moral'
  - corchetes [] preservados según POB para la secuencia textualmente delimitada
