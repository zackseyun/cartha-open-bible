id: T12P.BEN.6.1
reference: Testament of Benjamin 6:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: VI. Τὸ διαβούλιον τοῦ ἀγαθοῦ ἀνδρὸς οὐκ ἔστιν ἐν χειρὶ πλάνης¹ πνεύματος² Βελίαρ· ὁ γὰρ ἄγγελος τῆς εἰρήνης ὁδηγεῖ τὴν ψυχὴν αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/006/001.yaml
  text: The purpose of a good man is not in the hand of the spirit of Beliar's error, for the angel of peace guides his soul.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: Revised 'deceit' to 'error' to better reflect πλάνης and removed the footnote marker from the main text.
translation:
  language: es
  text: El designio del hombre bueno no está en mano del espíritu del error[a] de Beliar, pues el ángel de la paz guía su alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: πλάνη puede traducirse también como 'extravío' o 'engaño'; el sentido aquí es el de un espíritu que conduce al hombre por caminos errados.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαβούλιον
  english_pob_choice: purpose
  chosen_spanish: designio
  alternatives_spanish:
  - propósito
  - intención
  - deliberación
  lexicon: LSJ
  rationale: διαβούλιον denota la deliberación interna que conduce al propósito moral; 'designio' captura el plan deliberado del hombre bueno mejor que el genérico 'propósito'.
- source_word: πλάνης πνεύματος
  english_pob_choice: spirit of error
  chosen_spanish: espíritu del error
  alternatives_spanish:
  - espíritu de extravío
  - espíritu de engaño
  lexicon: LSJ
  rationale: POB revisó 'deceit' a 'error' para reflejar πλάνη más fielmente; 'error' en el sentido de extravío moral es el rendido más cercano. πνεῦμα minúsculo aquí (espíritu maligno, no Espíritu Santo).
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: BDAG
  rationale: Forma helenística estándar del nombre del adversario; conservada por consistencia con el corpus de los Testamentos.
- source_word: ὁ ἄγγελος τῆς εἰρήνης
  english_pob_choice: the angel of peace
  chosen_spanish: el ángel de la paz
  alternatives_spanish:
  - el ángel de paz
  lexicon: LSJ
  rationale: Fórmula estándar; conserva el artículo definido del griego.
- source_word: ὁδηγεῖ
  english_pob_choice: guides
  chosen_spanish: guía
  alternatives_spanish:
  - conduce
  - encamina
  lexicon: LSJ
  rationale: Verbo natural y directo en español.
theological_decisions:
- issue: Mayúscula en πνεῦμα (espíritu de Beliar)
  chosen_reading: minúscula 'espíritu'
  alternative_readings:
  - mayúscula 'Espíritu'
  rationale: Se refiere a un espíritu maligno asociado con Beliar, no al Espíritu Santo. La POB no capitaliza.
translation_notes:
  revision_awareness: POB cambió 'deceit' a 'error' para reflejar πλάνης con más precisión y eliminó el marcador de nota del cuerpo principal en la revisión gpt-5.4-mini.
  spanish_consistency_notes:
  - '''designio'' para διαβούλιον frente al genérico ''propósito'''
  - '''Beliar'' como forma estándar del adversario en los Testamentos'
  - πνεῦμα en minúscula cuando se refiere a espíritus malignos
