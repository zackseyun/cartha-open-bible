source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: Ἡ ἀγαθὴ διάνοια²⁸ οὐκ ἔχει δύο γλώσσας²⁹ εὐλογίας καὶ κατάρας³⁰, ὕβρεως καὶ ⌈τιμῆς⌉³¹, ἡσυχίας καὶ ταραχῆς, ὑποκρίσεως καὶ ἀληθείας, [πενίας καὶ πλούτου]³², ἀλλὰ *μίαν ἔχει περὶ πάντας³³ εἰλικρινῆ³⁴ καὶ³⁵ καθαρὰν ⌈διάθεσιν⌉.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/006/005.yaml
  text: The good mind does not have two tongues, of blessing and cursing, of insult and honor, of quietness and disturbance, of hypocrisy and truth, [of poverty and wealth], but rather has one sincere and pure disposition toward all.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: Restored the bracketed pair [of poverty and wealth] to reflect the source and made the final clause slightly more direct by removing the unnecessary article before 'one sincere and pure disposition.'
translation:
  language: es
  text: La buena mente no tiene dos lenguas, de bendición y de maldición, de ultraje y de honra, de quietud y de turbación, de hipocresía y de verdad, [de pobreza y de riqueza][a], sino que tiene una sola disposición sincera y pura hacia todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testigos omiten el par 'de pobreza y de riqueza'; los corchetes señalan la presencia variable en la transmisión textual.
    reason: textual_variant
lexical_decisions:
- source_word: ἡ ἀγαθὴ διάνοια
  english_pob_choice: the good mind
  chosen_spanish: la buena mente
  alternatives_spanish:
  - la mente buena
  - el buen entendimiento
  lexicon: LSJ
  rationale: Consistencia con 'mente' usado a lo largo del capítulo para διάνοια.
- source_word: δύο γλώσσας
  english_pob_choice: two tongues
  chosen_spanish: dos lenguas
  alternatives_spanish:
  - doble lengua
  lexicon: LSJ
  rationale: Imagen literal del griego que connota duplicidad; 'dos lenguas' preserva la imagen vívida del catálogo siguiente.
- source_word: εὐλογίας καὶ κατάρας
  english_pob_choice: of blessing and cursing
  chosen_spanish: de bendición y de maldición
  alternatives_spanish:
  - de alabanza y maldición
  lexicon: LSJ
  rationale: Par bíblico estándar.
- source_word: ὕβρεως καὶ τιμῆς
  english_pob_choice: of insult and honor
  chosen_spanish: de ultraje y de honra
  alternatives_spanish:
  - de insulto y honor
  lexicon: LSJ
  rationale: '''Ultraje'' captura ὕβρις mejor que ''insulto''; ''honra'' es el complemento bíblico estándar.'
- source_word: ἡσυχίας καὶ ταραχῆς
  english_pob_choice: of quietness and disturbance
  chosen_spanish: de quietud y de turbación
  alternatives_spanish:
  - de paz y de agitación
  lexicon: LSJ
  rationale: '''Quietud'' / ''turbación'' conservan el contraste interior/exterior.'
- source_word: ὑποκρίσεως καὶ ἀληθείας
  english_pob_choice: of hypocrisy and truth
  chosen_spanish: de hipocresía y de verdad
  alternatives_spanish:
  - de fingimiento y de verdad
  lexicon: LSJ
  rationale: Par estándar.
- source_word: πενίας καὶ πλούτου
  english_pob_choice: of poverty and wealth
  chosen_spanish: de pobreza y de riqueza
  alternatives_spanish:
  - de carencia y de abundancia
  lexicon: LSJ
  rationale: Par socioeconómico clásico; los corchetes preservan la marca textual del original (POB lo restauró en la revisión).
- source_word: εἰλικρινῆ καὶ καθαρὰν διάθεσιν
  english_pob_choice: sincere and pure disposition
  chosen_spanish: disposición sincera y pura
  alternatives_spanish:
  - disposición auténtica y limpia
  - actitud sincera y pura
  lexicon: LSJ
  rationale: εἰλικρινής = 'sin mezcla, puro a la luz del sol'; 'sincera' captura su uso ético habitual. καθαρός = 'pura'. διάθεσις = 'disposición' (estado interior).
translation_notes:
  revision_awareness: POB restauró el par '[of poverty and wealth]' en corchetes en la revisión y simplificó la cláusula final; el español preserva ambas decisiones.
  spanish_consistency_notes:
  - '''mente'' para διάνοια (consistente con todo el capítulo)'
  - '''ultraje'' para ὕβρις, conservando el registro elevado'
  - corchetes preservados para [de pobreza y de riqueza] según POB
