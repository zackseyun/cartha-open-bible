id: T12P.BEN.6.2
reference: Testament of Benjamin 6:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: '[Καὶ]³ οὐχ ὁρᾷ⁴ ἐμπαθῶς]⁵ *τὰ φθαρτά⁶, οὐδὲ⁷ συνάγει⁸ πλοῦτον ⌈εἰς φιληδονίαν⌉⁹.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/006/002.yaml
  text: He does not look upon perishable things with passion, nor does he gather wealth for pleasure.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: 'Adjusted word order to more closely match the source and retain both clauses: ''look upon perishable things with passion'' and ''gather wealth for pleasure.'''
translation:
  language: es
  text: No mira con pasión[a] las cosas perecederas, ni acumula riqueza para el placer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El adverbio ἐμπαθῶς denota una mirada apasionada/codiciosa que se aferra a lo material.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμπαθῶς
  english_pob_choice: with passion
  chosen_spanish: con pasión
  alternatives_spanish:
  - con apetito
  - con codicia
  lexicon: LSJ
  rationale: El adverbio describe la mirada apasionada/codiciosa hacia lo material; 'con pasión' conserva la connotación moral negativa del término sin parafrasear.
- source_word: τὰ φθαρτά
  english_pob_choice: perishable things
  chosen_spanish: las cosas perecederas
  alternatives_spanish:
  - lo corruptible
  - los bienes pasajeros
  lexicon: LSJ
  rationale: Mantiene el sentido bíblico estándar del adjetivo y el contraste con lo permanente.
- source_word: συνάγει πλοῦτον
  english_pob_choice: gather wealth
  chosen_spanish: acumula riqueza
  alternatives_spanish:
  - junta riqueza
  - amasa riqueza
  lexicon: LSJ
  rationale: '''Acumular'' es la lectura idiomática para συνάγω en contexto económico.'
- source_word: εἰς φιληδονίαν
  english_pob_choice: for pleasure
  chosen_spanish: para el placer
  alternatives_spanish:
  - para gozos
  - para satisfacer el deleite
  lexicon: LSJ
  rationale: φιληδονία es literalmente 'amor al placer'; 'para el placer' lo simplifica conservando el sentido.
translation_notes:
  revision_awareness: POB ajustó el orden de palabras en la revisión para acercarse al griego ('look upon perishable things with passion'); el español adopta el mismo orden.
  spanish_consistency_notes:
  - '''cosas perecederas'' para τὰ φθαρτά, fórmula bíblica neutra'
  - '''acumular'' para συνάγω en sentido económico'
