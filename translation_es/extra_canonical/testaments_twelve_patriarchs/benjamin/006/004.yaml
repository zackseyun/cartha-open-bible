id: T12P.BEN.6.4
reference: Testament of Benjamin 6:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: Τὸ¹⁶ ἀγαθὸν διαβούλιον *οὐ δέχεται δόξης ⌈οὐκ ἀτιμίας⌉¹⁷ ἀνθρώπων, *καὶ πάντα δόλον¹⁸ ἢ¹⁹ ψεῦδος ἢ²⁰ μάχην *ἢ λοιδωρίαν²¹ *οὐκ οἶδε²². *Κύριος γὰρ²³ ἐν αὐτῷ κατοικεῖ²⁴, καὶ φωτίζει τὴν²⁵ ψυχὴν αὐτοῦ, καὶ χαίρει²⁶ πρὸς πάντας²⁷ ἐν παντὶ καιρῷ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/006/004.yaml
  text: A good purpose does not accept glory or dishonor from people, and it knows no deceit or falsehood or strife or reviling. For the Lord dwells in him, and he lights up his soul, and he rejoices toward all at every time.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: Adjusted 'from men' to the more inclusive 'from people' for ἀνθρώπων; rendered φωτίζει more directly as 'lights up' rather than 'gives light to'; kept the rest unchanged while preserving the source’s structure and content.
translation:
  language: es
  text: El buen designio no acepta gloria ni deshonra de las personas, y no conoce engaño alguno, ni mentira, ni contienda, ni injuria. Pues el Señor habita en él, e ilumina su alma, y se regocija con todos en todo tiempo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διαβούλιον
  english_pob_choice: purpose
  chosen_spanish: designio
  alternatives_spanish:
  - propósito
  - deliberación
  lexicon: LSJ
  rationale: Consistencia con BEN 6:1; 'designio' captura la deliberación moral.
- source_word: ἀνθρώπων
  english_pob_choice: from people
  chosen_spanish: de las personas
  alternatives_spanish:
  - de los hombres
  - de la gente
  lexicon: LSJ
  rationale: POB cambió 'from men' a 'from people' por inclusividad; 'las personas' es el rendido neutro estándar.
- source_word: δόλον
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - dolo
  - fraude
  lexicon: LSJ
  rationale: '''Engaño'' es la traducción estándar de δόλος en el NT y literatura afín.'
- source_word: ψεῦδος
  english_pob_choice: falsehood
  chosen_spanish: mentira
  alternatives_spanish:
  - falsedad
  - embuste
  lexicon: LSJ
  rationale: '''Mentira'' es directo y se ajusta al catálogo de vicios.'
- source_word: μάχην
  english_pob_choice: strife
  chosen_spanish: contienda
  alternatives_spanish:
  - pelea
  - pleito
  lexicon: LSJ
  rationale: '''Contienda'' conserva el registro elevado y captura tanto la pelea verbal como física.'
- source_word: λοιδωρίαν
  english_pob_choice: reviling
  chosen_spanish: injuria
  alternatives_spanish:
  - insulto
  - ultraje
  lexicon: LSJ
  rationale: '''Injuria'' mantiene el registro elevado, en consistencia con λοιδορούντων traducido como ''injuriar'' en BEN 5:4.'
- source_word: Κύριος γὰρ ἐν αὐτῷ κατοικεῖ
  english_pob_choice: the Lord dwells in him
  chosen_spanish: el Señor habita en él
  alternatives_spanish:
  - el Señor mora en él
  lexicon: LSJ
  rationale: '''Habitar'' es estándar para κατοικέω en sentido de presencia divina.'
- source_word: φωτίζει
  english_pob_choice: lights up
  chosen_spanish: ilumina
  alternatives_spanish:
  - alumbra
  - da luz a
  lexicon: LSJ
  rationale: POB cambió 'gives light to' a 'lights up' (más directo); 'iluminar' en español captura tanto la acción directa como la metáfora espiritual.
- source_word: χαίρει πρὸς πάντας ἐν παντὶ καιρῷ
  english_pob_choice: rejoices toward all at every time
  chosen_spanish: se regocija con todos en todo tiempo
  alternatives_spanish:
  - se alegra hacia todos en todo momento
  lexicon: LSJ
  rationale: '''Regocijarse'' es la traducción bíblica estándar para χαίρω; ''con todos'' captura la dimensión relacional de πρός sin sonar forzado.'
translation_notes:
  revision_awareness: 'POB ajustó tres elementos: ''from men'' a ''from people'', ''gives light to'' a ''lights up'', y ''all people at all times'' a ''all at every time''. El español sigue las tres revisiones.'
  spanish_consistency_notes:
  - '''designio'' para διαβούλιον, consistente con BEN 6:1'
  - '''injuria'' para λοιδωρία, consistente con ''injuriar'' en BEN 5:4'
  - '''las personas'' (no ''los hombres'') para ἄνθρωποι en lectura inclusiva, alineado con POB'
