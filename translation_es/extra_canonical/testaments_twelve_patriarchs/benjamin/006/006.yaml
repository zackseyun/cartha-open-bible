base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/006/006.yaml
  text: It does not have double sight or hearing; for in everything that it does, or speaks, or sees, it knows that the Lord is looking on his soul. And it cleanses the mind, so as not to be condemned by men and by God. But the disposition of Beliar is twofold, and it has no singleness. Flee, therefore, evil-mindedness, my children, and love the good mind, which the law of God knows, so that you may rest in hope, because the good-minded man does not have a darkened eye. He shows mercy to all, even if they are sinners; even if they devise evil against him, by doing good he overcomes evil, being shielded by what is good. And he loves the righteous as his own soul. If anyone is glorified, he does not envy him; if anyone is enriched, he is not jealous; if anyone is valiant, he praises him; the virtuous man he commends; on the poor man he has mercy; with the weak he has compassion; to God he sings praise[d][c][b]. The one who has the grace of a good spirit he loves as his own soul.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: No tiene visión ni oído doble; pues en todo lo que hace, o habla, o ve, sabe que el Señor vela por su alma. Y purifica su mente para no ser condenado por los hombres, y de igual manera por Dios. De la misma manera, las obras de Beliar son dobles, y no hay simplicidad[a] en ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ἀπλότης = 'simplicidad', 'sencillez', 'integridad'; aquí denota la rectitud sin doblez moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅρασιν οὔτε ἀκοὴν διπλῆν
  english_pob_choice: double sight or hearing
  chosen_spanish: visión ni oído doble
  alternatives_spanish:
  - doble vista o doble oído
  lexicon: LSJ
  rationale: Mantiene la imagen del 'doble' (διπλοῦς) como duplicidad moral.
- source_word: ἐπισκέπτει
  english_pob_choice: is looking on
  chosen_spanish: vela por
  alternatives_spanish:
  - mira sobre
  - visita
  lexicon: LSJ
  rationale: ἐπισκέπτομαι en sentido divino tiene matiz de cuidado vigilante; 'velar por' captura mejor que el literal 'mirar sobre'.
- source_word: καθαίρει τὴν διάνοιαν
  english_pob_choice: cleanses the mind
  chosen_spanish: purifica su mente
  alternatives_spanish:
  - limpia su mente
  lexicon: LSJ
  rationale: '''Purificar'' es el verbo bíblico estándar para καθαίρω en contextos morales.'
- source_word: ἀπλότητα
  english_pob_choice: singleness
  chosen_spanish: simplicidad
  alternatives_spanish:
  - sencillez
  - rectitud
  lexicon: LSJ
  rationale: ἀπλότης como integridad/sencillez moral; 'simplicidad' es el rendido bíblico estándar (cf. 2 Cor 1:12).
- source_word: διανοίας πονηρᾶς (mente perversa)
  english_pob_choice: evil-mindedness
  chosen_spanish: mente perversa
  alternatives_spanish:
  - mala mente
  - pensamiento maligno
  lexicon: LSJ
  rationale: Se preserva 'mente' por consistencia con el capítulo, con el adjetivo 'perversa' para πονηρός.
- source_word: σκοτεινὸν ὀφθαλμόν
  english_pob_choice: darkened eye
  chosen_spanish: ojo oscuro
  alternatives_spanish:
  - ojo malo
  lexicon: LSJ
  rationale: Consistencia con BEN 4:2 ('ojo oscuro').
- source_word: νικᾷ τὸ κακόν
  english_pob_choice: overcomes evil
  chosen_spanish: vence el mal
  alternatives_spanish:
  - supera el mal
  lexicon: LSJ
  rationale: Consistencia con BEN 4:3.
- source_word: σκεπόμενος
  english_pob_choice: being shielded
  chosen_spanish: al ser amparado
  alternatives_spanish:
  - protegido
  lexicon: LSJ
  rationale: Consistencia con BEN 4:3.
- source_word: ὑμνεῖ Θεόν
  english_pob_choice: sings praise to God
  chosen_spanish: a Dios canta alabanzas
  alternatives_spanish:
  - entona himnos a Dios
  - alaba a Dios con himnos
  lexicon: LSJ
  rationale: ὑμνέω es más específico que la alabanza genérica; 'cantar alabanzas' refleja el matiz himnódico permaneciendo legible.
- source_word: χάριν ἀγαθοῦ πνεύματος
  english_pob_choice: the grace of a good spirit
  chosen_spanish: la gracia de un buen espíritu
  alternatives_spanish:
  - el favor de un buen espíritu
  lexicon: LSJ
  rationale: Consistencia con BEN 4:5.
theological_decisions:
- issue: El versículo POB incluye material que repite el contenido del cap. 4 (catálogo de virtudes), aparentemente por duplicación textual en la transmisión
  chosen_reading: Se traduce el texto tal como aparece en la POB, incluyendo el material reiterado, sin reordenar ni recortar.
  alternative_readings:
  - Acortar a la primera porción coherente sobre la 'doble visión/oído' y las obras de Beliar
  rationale: La política del proyecto es seguir el texto traducido por la POB; las decisiones textuales sobre duplicaciones se documentan, no se silencian. Los marcadores de nota [b][c][d] aparecen al final del catálogo según POB.
translation_notes:
  revision_awareness: El revision_pass marcó este versículo como 'unchanged'; el español preserva la estructura íntegra incluyendo el material reiterado y los tres marcadores [b][c][d] en el orden de la POB.
  spanish_consistency_notes:
  - '''mente'' consistente para διάνοια en todo BEN 4–6'
  - '''ojo oscuro'' consistente con BEN 4:2'
  - '''vencer el mal'' / ''amparado'' consistente con BEN 4:3'
  - '''simplicidad'' para ἀπλότης como término ético del catálogo de virtudes'
