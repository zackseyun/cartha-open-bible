revisions:
- from: No tiene visión ni oído doble; pues en todo lo que hace, o habla, o ve, sabe que el Señor vela por su alma. Y purifica su mente, para no ser condenado por los hombres ni por Dios. Pero, de igual manera, las obras de Beliar son dobles, y no hay simplicidad[a] en ellas. Huyan, pues, de la mente perversa, hijos míos, y amen la buena mente, la cual la ley de Dios conoce, para que descansen en esperanza, porque el hombre de buena mente no tiene un ojo oscuro. Tiene misericordia de todos, aun cuando sean pecadores; aun cuando tramen el mal contra él, haciendo el bien vence el mal, al ser amparado por lo bueno. Y ama al justo como a su propia alma. Si alguno es glorificado, no lo envidia; si alguno se enriquece, no siente celos; si alguno es valiente, lo elogia; al hombre virtuoso lo elogia; del pobre tiene misericordia; con el débil se compadece; a Dios canta alabanzas[d][c][b]. Al que tiene la gracia de un buen espíritu lo ama como a su propia alma.
