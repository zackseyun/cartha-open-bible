  text: Οὐκ ἔχει *ὅρασιν οὔτε ἀκοὴν³⁶ διπλῆν· *πᾶν γὰρ ὃ³⁷ ποιεῖ, Γἢ³⁸ λαλεῖ, *ἢ ὁρᾷ³⁸, οἶδεν ὅτι³⁹ Κύριος ἐπισκέπτει⁴⁰ τὴν⁴¹ ψυχὴν αὐτοῦ. Καὶ καθαίρει τὴν διάνοιαν αὐτοῦ πρὸς⁴² τὸ μὴ καταγνωσθῆναι ὑπὸ *τῶν ἀνθρώπων, ὁμοίως καὶ ὑπὸ Θεοῦ. Ὁμοίως δὲ καὶ τοῦ Βελίαρ τὰ ἔργα διπλᾶ ἐστιν, καὶ ἀπλότητα ἐν αὐτοῖς οὐκ ἔχουσιν⁴³.
