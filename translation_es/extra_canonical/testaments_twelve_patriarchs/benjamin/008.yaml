translation:
  language: es
  text: '1[a]. Por tanto, si vosotros también andáis en santidad conforme a los mandamientos del Señor, habitaréis conmigo en seguridad, y todo Israel será reunido al Señor.



    2. Y ya no seré llamado lobo rapaz por causa de vuestro saqueo, sino obrero del Señor, que distribuye alimento a los que hacen el bien.



    3. Y se levantará en los últimos tiempos uno amado del Señor, de la tribu de Judá y de Leví, que hará el beneplácito de Dios con un nuevo entendimiento para todas las naciones.



    4. Su presencia está en la boca de todos, y será escogido para siempre por el Señor, y por medio de él se dará en la tierra el conocimiento del Señor en porciones de gozo; y por medio de él Israel será iluminado.



    5. Entonces entrará en el primer templo, y allí el Señor será ultrajado, y será levantado sobre un madero.



    6[b]. Y el velo del templo se rasgará, y el Espíritu de Dios pasará a las naciones como fuego derramado.



    7. Y subirá del Hades y pasará de la tierra al cielo.



    8. Y yo sé cuán humilde será en la tierra y cuán glorioso en el cielo.



    9. Cuando José estaba en Egipto, deseé ver su figura y su apariencia; y por las oraciones de Jacob, mi padre, lo vi, estando despierto, que una virgen sin mancha y santa daba a luz un cordero,



    10. y a su lado izquierdo había como un león; y todas las bestias se lanzaron contra él, y el cordero las venció y las destruyó, y las pisoteó.



    11. Y por causa de él los ángeles y los hombres se regocijaron, y toda la tierra.



    12. Estas cosas sucederán en sus tiempos propios. Por tanto, hijos míos, cuando veáis que todas estas cosas han sucedido en Israel, sabed que el reino del Señor está cerca.



    13. Entonces huid de toda obra inicua y de las obras de Beliar[c], y aferraos a lo que es bueno y a la ley del Señor.



    14. Y sepultadme cerca de mis padres.



    15. Y terminó sus mandamientos, y dijo: ''Voy a dormir con mis padres''.



    16. Y extendió sus pies y murió en hermosa y buena vejez.



    17. Y cada uno de sus hijos hizo como les había mandado, y lo pusieron en un ataúd y lo guardaron en Egipto hasta el día del éxodo.



    18. Y cuando los hijos de Israel subieron de Egipto, llevaron también los huesos de Benjamín, y los sepultaron en Hebrón al lado derecho de Abraham, Isaac y Jacob.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sobre una cruz'; el griego dice 'sobre un madero', conservando la resonancia con el lenguaje sagrado anterior.
    reason: lexical_alternative
  - marker: b
    text: La profecía de los versículos 3-8 suele considerarse por los estudiosos como una expansión posterior o interpolación cristiana, pero se traduce aquí tal como aparece en el testimonio griego.
    reason: textual_variant
  - marker: c
    text: '''Beliar'' refleja la forma griega presente en esta tradición testamentaria; muchos lectores conocerán el nombre como ''Belial''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁγιωσύνη
  english_pob_choice: holiness
  chosen_spanish: santidad
  alternatives_spanish:
  - pureza
  lexicon: LSJ
  rationale: Término ético-pactual elevado adecuado al registro testamentario.
- source_word: λύκος ἅρπαξ
  english_pob_choice: ravening wolf
  chosen_spanish: lobo rapaz
  alternatives_spanish:
  - lobo voraz
  lexicon: LSJ
  rationale: Conserva la imagen tradicional de Génesis 49.
- source_word: ἐργάτης κυρίου
  english_pob_choice: worker of the Lord
  chosen_spanish: obrero del Señor
  alternatives_spanish:
  - trabajador del Señor
  lexicon: BDAG
  rationale: '''Obrero'' refleja servicio comisionado sin matiz de esclavo.'
- source_word: ἀγαθοποιοῦντες
  english_pob_choice: those who do what is good
  chosen_spanish: los que hacen el bien
  alternatives_spanish:
  - los que practican el bien
  lexicon: BDAG
  rationale: Mantiene el énfasis ético verbal.
- source_word: ἐπʼ ἐσχάτων τῶν καιρῶν
  english_pob_choice: in the latter times
  chosen_spanish: en los últimos tiempos
  alternatives_spanish:
  - en los últimos días
  - al final de los tiempos
  lexicon: LSJ
  rationale: Conserva la fuerza escatológica sin importar asociaciones doctrinales posteriores ajenas al griego.
- source_word: ἠγαπημένος κυρίου
  english_pob_choice: beloved of the Lord
  chosen_spanish: amado del Señor
  alternatives_spanish:
  - el predilecto del Señor
  lexicon: BDAG
  rationale: Traducción elevada estándar.
- source_word: ἀπὸ φυλῆς Ἰούδα καὶ Λευί
  english_pob_choice: from the tribe of Judah and Levi
  chosen_spanish: de la tribu de Judá y de Leví
  alternatives_spanish:
  - de Judá y Leví
  lexicon: LSJ
  rationale: Conserva la tensión textual de un personaje asociado a ambas tribus.
- source_word: εὐδοκία
  english_pob_choice: good pleasure
  chosen_spanish: beneplácito
  alternatives_spanish:
  - buen propósito
  - voluntad
  lexicon: BDAG
  rationale: '''Beneplácito'' conserva el matiz teológico de favor y propósito divinos.'
- source_word: γνῶσις κυρίου
  english_pob_choice: knowledge of the Lord
  chosen_spanish: conocimiento del Señor
  alternatives_spanish:
  - conocimiento de Dios
  lexicon: BDAG
  rationale: Genitivo objetivo natural en español.
- source_word: ἐπὶ ξύλου
  english_pob_choice: upon a tree
  chosen_spanish: sobre un madero
  alternatives_spanish:
  - sobre un árbol
  - sobre un palo
  lexicon: BDAG
  rationale: El griego dice 'madera/árbol'. 'Madero' conserva la fuerza y la resonancia escritural sin precipitar la lectura cristológica.
- source_word: καταπέτασμα
  english_pob_choice: veil
  chosen_spanish: velo
  alternatives_spanish:
  - cortina
  lexicon: BDAG
  rationale: '''Velo'' es el término sagrado consolidado en español.'
- source_word: πνεῦμα θεοῦ
  english_pob_choice: Spirit of God
  chosen_spanish: Espíritu de Dios
  alternatives_spanish:
  - espíritu de Dios
  lexicon: BDAG
  rationale: Mayúscula refleja referente personal/divino en este contexto profético.
- source_word: ὡς πῦρ ἐκχεόμενον
  english_pob_choice: like fire poured out
  chosen_spanish: como fuego derramado
  alternatives_spanish:
  - como fuego que se derrama
  lexicon: LSJ
  rationale: Mantiene viva la imagen y resulta idiomática.
- source_word: ᾅδης
  english_pob_choice: Hades
  chosen_spanish: Hades
  alternatives_spanish:
  - la región de los muertos
  - el infierno
  lexicon: BDAG
  rationale: '''Hades'' evita asociaciones de castigo eterno propias de ''infierno''.'
- source_word: παρθένος
  english_pob_choice: virgin
  chosen_spanish: virgen
  alternatives_spanish:
  - doncella
  lexicon: BDAG
  rationale: En esta visión, 'virgen' refleja la afirmación marcada de pureza.
- source_word: ἀμνός
  english_pob_choice: lamb
  chosen_spanish: cordero
  lexicon: BDAG
  rationale: Traducción directa y natural; la fuerza simbólica es central.
- source_word: Βελιάρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: LSJ
  rationale: Forma del testimonio griego.
theological_decisions:
- issue: Figura profética de 'Judá y Leví'
  chosen_reading: Se conserva la doble adscripción tribal sin armonizarla a un solo oficio mesiánico.
  alternative_readings:
  - solo mesías davídico
  - solo figura sacerdotal levítica
  rationale: El testimonio griego presenta una expectativa deliberadamente compuesta; la traducción preserva la tensión.
- issue: 'Imagen de la pasión: ''levantado sobre un madero'''
  chosen_reading: Se traduce ξύλον literalmente como 'madero' y se deja implícita la identificación cristológica.
  alternative_readings:
  - '''cruz'' como interpretación explícita'
  rationale: El término griego es audiblemente escritural; no procede sustituirlo.
- issue: Probable interpolación o ampliación cristiana
  chosen_reading: Se traduce honestamente toda la profecía griega y se señala su posible carácter secundario en notas.
  alternative_readings:
  - omitir o atenuar las líneas cristológicas
  - reescribirlas como liberador genérico
  rationale: La filosofía del proyecto exige traducción honesta del testimonio con transparencia textual.
translation_notes:
  revision_awareness: 'Pase de revisión gpt-5.4 (2026-04-23): sin cambios.'
  spanish_consistency_notes:
  - Beliar (no Belial) por testimonio griego.
  - Κύριος → Señor; θεός → Dios; πνεῦμα → Espíritu/espíritu por contexto.
  - ξύλον → 'madero' para conservar la resonancia escritural.
