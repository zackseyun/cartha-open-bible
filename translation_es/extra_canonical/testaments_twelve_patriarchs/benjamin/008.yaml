  text: '1[a]. Therefore, if you also walk in holiness according to the Lord’s commands, you will dwell with me in safety, and all Israel will be gathered to the Lord.


    2. And I will no longer be called a ravening wolf because of your ravaging, but a worker of the Lord, distributing food to those who do what is good.


    3. And there will arise in the latter times one beloved of the Lord, from the tribe of Judah and Levi, who will accomplish the good pleasure of God with a new understanding for all the nations.


    4. His presence is in the mouth of all, and he will be chosen forever by the Lord, and through him the knowledge of the Lord will be given on the earth in portions of joy; and through him Israel will be enlightened.


    5. Then he will enter into the first temple, and there the Lord will be abused, and he will be lifted up upon a tree.


    6[b]. And the veil of the temple will be torn, and the Spirit of God will pass on to the nations like fire poured out.


    7. And he will ascend from Hades and will pass from earth into heaven.


    8. And I know how lowly he will be on earth, and how glorious in heaven.


    9. Now when Joseph was in Egypt, I longed to see his figure and appearance; and through the prayers of Jacob my father I saw him, while awake, that a spotless and holy virgin was giving birth to a lamb,


    10. and on its left side there was as it were a lion; and all the beasts rushed against him, and the lamb overcame them and destroyed them, and trampled them underfoot.


    11. And because of him the angels and men rejoiced, and all the land.


    12. These things will happen in their proper times. Therefore, my children, when you see that all these things have happened in Israel, know that the kingdom of the Lord is near.


    13. Then flee from every lawless deed and from the works of Beliar, and cling to what is good and to the law of the Lord.


    14. And bury me near my fathers.


    15. And he finished his commands, and said, “I am going to sleep with my fathers.”


    16. And he stretched out his feet and died in a beautiful and good old age.


    17. And each of his sons did as he had commanded them, and they put him in a coffin and kept him in Egypt until the day of the exodus.


    18. And when the sons of Israel went up from Egypt, they carried up the bones of Benjamin also[c], and buried them in Hebron at the right side of Abraham and Isaac and Jacob.'
  footnotes:
  - marker: a
    text: Or 'on a cross'; the Greek says 'upon a tree,' preserving scriptural resonance with earlier sacred language.
    reason: lexical_alternative
  - marker: b
    text: The prophecy in verses 3–8 is often regarded by scholars as containing later expansion or Christian interpolation, but it is translated here as it stands in the Greek witness.
    reason: textual_variant
  - marker: c
    text: '''Beliar'' reflects the Greek form found in this testamentary tradition; many readers will know the name as ''Belial.'''
    reason: lexical_alternative
