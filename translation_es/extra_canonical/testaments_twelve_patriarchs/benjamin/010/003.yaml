base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/010/003.yaml
  text: Therefore, each one should practice truth toward his neighbor, and keep the law of the Lord and his commandments.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:21Z'
    unchanged: false
    changes_summary: Revised 'do truth' to the more natural and accurate 'practice truth,' added commas for readability, and retained all source elements including both 'the law of the Lord' and 'his commandments.'
translation:
  language: es
  text: Por tanto, que cada uno practique[a] la verdad para con su prójimo, y guarden la ley del Señor y sus mandamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hagan la verdad', traducción más literal del idioma ποιεῖν ἀλήθειαν.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ποιήσατε ... ἀλήθειαν
  english_pob_choice: practice truth
  chosen_spanish: practique la verdad
  alternatives_spanish:
  - hagan la verdad
  - obren con verdad
  lexicon: LSJ
  rationale: POB revisó 'do truth' a 'practice truth'; 'practicar la verdad' conserva el matiz ético y concreto del idioma griego ποιεῖν ἀλήθειαν sin caer en el calco rígido 'hacer la verdad'.
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - vecino
  - semejante
  lexicon: LSJ
  rationale: '''Prójimo'' preserva el registro bíblico-ético tradicional en español, paralelo al uso pactual de πλησίον.'
- source_word: νόμος ... ἐντολαί
  english_pob_choice: law ... commandments
  chosen_spanish: ley ... mandamientos
  alternatives_spanish:
  - instrucción ... mandatos
  lexicon: LSJ
  rationale: Términos pactuales estables; conservan reconocimiento bíblico para el lector hispano.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  lexicon: LSJ
  rationale: En T12P griego Κύριος se rinde 'Señor' (no se reconstruye el tetragrámaton, ya que el contexto es griego pseudo-epigráfico).
translation_notes:
  revision_awareness: El revisor inglés cambió 'do truth' a 'practice truth' por mayor naturalidad, conservando todos los elementos. La nota al pie preserva la alternativa más literal.
  spanish_consistency_notes:
  - '''Prójimo'' coherente con tradición bíblica española.'
  - Uso del subjuntivo exhortativo 'que cada uno practique' para imperativo de tercera persona.
