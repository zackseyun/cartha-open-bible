id: T12P.BEN.10.8
reference: Testament of Benjamin 10:8
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: '*Καὶ οἱ⁴³ πάντες ἀναστήσονται, οἱ μὲν εἰς δόξαν, οἱ δὲ εἰς ἀτιμίαν, καὶ κρινεῖ Κύριος⁴⁴ ἐν πρώτοις τὸν Ἰσραὴλ⁴⁵ περὶ τῆς *ἀδικίας αὐτῶν⁴⁶ [ὅτι παραγενόμενον⁴⁷ Θεὸν⁴⁴ ἐν σαρκί⁴⁸, οὐκ ἐπίστευσαν αὐτῷ⁴⁹].'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/010/008.yaml
  text: And he will convict Israel among the chosen of the nations, just as he convicted Esau among the Midianites, who deceived their brothers into becoming such through sexual immorality and idolatry, and so were alienated from God, thus becoming children in the portion of those who fear the Lord.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:24Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that reflects the Greek text: restored ''he will convict Israel among the chosen of the nations,'' the comparison with Esau among the Midianites, the clause about deceiving their brothers through sexual immorality and idolatry, their alienation from God, and the concluding result clause.'
translation:
  language: es
  text: Y declarará culpable a Israel entre los escogidos de las naciones, así como declaró culpable a Esaú entre los madianitas, los cuales engañaron a sus hermanos para que llegaran a serlo por medio de la inmoralidad sexual y la idolatría, y así fueron alienados de Dios, llegando a ser hijos en la porción de los que temen al Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐλέγξει
  english_pob_choice: will convict
  chosen_spanish: declarará culpable
  alternatives_spanish:
  - convencerá
  - reprenderá
  - condenará
  lexicon: LSJ
  rationale: ἐλέγχω en contexto judicial implica exponer la culpa, no solo criticar. 'Declarar culpable' transmite el matiz forense de 'will convict' del POB.
- source_word: ἐν τοῖς ἐκλεκτοῖς τῶν ἐθνῶν
  english_pob_choice: among the chosen of the nations
  chosen_spanish: entre los escogidos de las naciones
  alternatives_spanish:
  - entre los elegidos de los gentiles
  - entre los selectos de las naciones
  lexicon: LSJ
  rationale: '''Escogidos'' es término bíblico estable para ἐκλεκτοί; ''naciones'' para ἔθνη según norma del proyecto.'
- source_word: πορνείας
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - lujuria
  lexicon: LSJ
  rationale: POB usa 'sexual immorality' como traducción accesible para πορνεία; 'inmoralidad sexual' es el equivalente español natural y moralmente serio.
- source_word: εἰδωλολατρείας
  english_pob_choice: idolatry
  chosen_spanish: idolatría
  alternatives_spanish:
  - culto a los ídolos
  lexicon: LSJ
  rationale: Término técnico bíblico estable; calco directo y reconocible.
- source_word: ἀπηλλοτριώθησαν Θεοῦ
  english_pob_choice: alienated from God
  chosen_spanish: alienados de Dios
  alternatives_spanish:
  - enajenados de Dios
  - extrañados de Dios
  lexicon: LSJ
  rationale: '''Alienados'' refleja la pasividad y ruptura del vínculo pactual; ''enajenados'' es alternativa más arcaica.'
- source_word: φοβουμένων Κύριον
  english_pob_choice: those who fear the Lord
  chosen_spanish: los que temen al Señor
  alternatives_spanish:
  - los temerosos del Señor
  lexicon: LSJ
  rationale: Frase pactual estándar; el participio griego se rinde como cláusula relativa en español.
translation_notes:
  revision_awareness: 'El revisor reemplazó draft no relacionado con traducción que refleja el griego: convicción de Israel, comparación con Esaú/madianitas, engaño y alienación. El español sigue la versión revisada.'
  spanish_consistency_notes:
  - '''Declarar culpable'' como traducción consistente para ἐλέγχω en contexto forense.'
  - '''Inmoralidad sexual'' como rendición estable para πορνεία en línea con el POB.'
  - Construcción 'llegar a ser/llegando a ser' para los participios resultativos griegos γενέσθαι y γενόμενοι.
