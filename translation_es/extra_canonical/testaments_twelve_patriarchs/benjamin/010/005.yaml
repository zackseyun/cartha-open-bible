id: T12P.BEN.10.5
reference: Testament of Benjamin 10:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: '*Ταῦτα γὰρ πάντα δέδωκαν ἡμῖν εἰς κληρονομίαν¹⁹ *εἰπόντες· Φυλάξατε τὰς ἐντολὰς τοῦ Θεοῦ²⁰ ἕως ὅτου²¹ ἀποκαλύψει [Κύριος τὸ σωτήριον αὐτοῦ πᾶσι τοῖς ἔθνεσι].'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/010/005.yaml
  text: For they gave all these things to us as an inheritance, saying, ‘Keep the commandments of God until the time when you see Enoch and Seth and Abraham and Isaac and Jacob raised up at his right hand in rejoicing.’
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:23Z'
    unchanged: false
    changes_summary: Adjusted future phrasing from 'you will see' to 'you see' for a more natural rendering of ἕως ὅτου with the future sense, and changed 'risen up' to 'raised up' to better reflect ἀνασταμένους in formal English.
translation:
  language: es
  text: 'Porque todas estas cosas nos las dieron como herencia, diciendo: ''Guarden los mandamientos de Dios hasta el momento en que vean a Enoc, a Set, a Abraham, a Isaac y a Jacob, levantados a su derecha en regocijo.'''
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δέδωκαν ... εἰς κληρονομίαν
  english_pob_choice: gave ... as an inheritance
  chosen_spanish: dieron ... como herencia
  alternatives_spanish:
  - entregaron como heredad
  - dieron por herencia
  lexicon: LSJ
  rationale: '''Como herencia'' mantiene el matiz pactual transmitido a la siguiente generación.'
- source_word: τὰς ἐντολὰς τοῦ Θεοῦ
  english_pob_choice: the commandments of God
  chosen_spanish: los mandamientos de Dios
  alternatives_spanish:
  - los mandatos de Dios
  lexicon: LSJ
  rationale: θεός → 'Dios' por defecto del POB. 'Mandamientos' es término bíblico estable.
- source_word: ἕως ὅτου ... ὄψεσθε
  english_pob_choice: until the time when you see
  chosen_spanish: hasta el momento en que vean
  alternatives_spanish:
  - hasta cuando vean
  - hasta que vean
  lexicon: LSJ
  rationale: El revisor cambió 'will see' a 'see' por más natural; el español usa subjuntivo 'vean' tras 'hasta que' para acción futura indefinida.
- source_word: ἀνασταμένους
  english_pob_choice: raised up
  chosen_spanish: levantados
  alternatives_spanish:
  - resucitados
  - alzados
  lexicon: LSJ
  rationale: El revisor prefirió 'raised up' por más formal; 'levantados' en español preserva la pasividad y el sentido de resurrección sin agregar interpretación cristológica.
- source_word: ἐν ἀγαλλιάσει
  english_pob_choice: in rejoicing
  chosen_spanish: en regocijo
  alternatives_spanish:
  - con exultación
  - con gozo
  lexicon: LSJ
  rationale: '''Regocijo'' mantiene el tono celebratorio elevado típico del lenguaje apocalíptico.'
translation_notes:
  revision_awareness: El revisor inglés ajustó tiempo verbal de 'will see' a 'see' y 'risen up' a 'raised up'. El español refleja ambos cambios usando subjuntivo y participio pasivo.
  spanish_consistency_notes:
  - Comillas simples para discurso indirecto citado dentro de discurso directo (norma RAE para Latinoamérica).
  - Lista de patriarcas con 'a' personal repetida para énfasis bíblico.
