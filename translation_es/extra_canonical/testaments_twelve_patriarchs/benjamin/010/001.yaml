source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: X. Ὅτε¹ δὲ *ἦν Ἰωσὴφ ἐν Αἰγύπτῳ², ἐπεθύμουν ἰδεῖν τὴν εἰδέαν³ αὐτοῦ Γκαὶ τὴν μόρφωσιν⁴ τῆς ὄψεως αὐτοῦ⁵. καὶ δι᾽ εὐχῶν Ἰακὼβ τοῦ πατρός μου⁶ εἶδον Γαὐτόν, ἐν ἡμέρᾳ γρηγορῶν, *καθ᾽ ὃ ἦν⁶ πᾶσα⁷ ἡ εἰδέα⁷ αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/010/001.yaml
  text: Now when Joseph was in Egypt, I longed to see his appearance and the form of his face; and through the prayers of Jacob my father I saw him, while awake by day, just as his whole appearance was.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:21Z'
    unchanged: false
    changes_summary: Replaced 'exactly as' with 'just as' for a more natural and formally neutral rendering of καθ᾽ ὃ ἦν, while preserving the sense. No other changes needed.
translation:
  language: es
  text: Cuando José estaba en Egipto, deseaba ver su semblante[a] y la forma de su rostro; y por las oraciones de Jacob, mi padre, lo vi, estando despierto de día, tal como era toda su apariencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su apariencia' o 'su figura' por εἰδέα; se elige 'semblante' para distinguirlo del término μόρφωσις que sigue.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδέα
  english_pob_choice: appearance
  chosen_spanish: semblante
  alternatives_spanish:
  - apariencia
  - figura
  lexicon: LSJ
  rationale: '''Semblante'' captura la idea de aspecto reconocible y rostro; permite distinguirlo de la ''forma'' (μόρφωσις).'
- source_word: μόρφωσιν τῆς ὄψεως
  english_pob_choice: form of his face
  chosen_spanish: la forma de su rostro
  alternatives_spanish:
  - la configuración de su rostro
  - el contorno de su rostro
  lexicon: LSJ
  rationale: '''Forma del rostro'' es claro y conserva el detalle visual sin tecnicismo.'
- source_word: ἐπεθύμουν
  english_pob_choice: longed
  chosen_spanish: deseaba
  alternatives_spanish:
  - anhelaba
  - ansiaba
  lexicon: LSJ
  rationale: Imperfecto de deseo; 'deseaba' es directo y conserva el aspecto durativo.
- source_word: δι᾽ εὐχῶν
  english_pob_choice: through the prayers
  chosen_spanish: por las oraciones
  alternatives_spanish:
  - mediante las oraciones
  - a través de las plegarias
  lexicon: LSJ
  rationale: Construcción instrumental natural en español.
- source_word: ἐν ἡμέρᾳ γρηγορῶν
  english_pob_choice: while awake by day
  chosen_spanish: estando despierto de día
  alternatives_spanish:
  - en pleno día y despierto
  - durante el día, en vela
  lexicon: LSJ
  rationale: Conserva el matiz de no ser una visión nocturna ni en sueños.
- source_word: καθ᾽ ὃ ἦν πᾶσα ἡ εἰδέα αὐτοῦ
  english_pob_choice: just as his whole appearance was
  chosen_spanish: tal como era toda su apariencia
  alternatives_spanish:
  - exactamente tal como era su aspecto
  - según era su entera figura
  lexicon: LSJ
  rationale: Tras revisión EN ('just as'), se rinde como 'tal como', que es natural y formalmente neutro.
translation_notes:
  revision_awareness: 'Pase de revisión gpt-5.4 (2026-04-23): cambió ''exactly as'' por ''just as'' para una rendición más natural; aplicado en español como ''tal como''.'
  spanish_consistency_notes:
  - Conservamos los nombres 'José', 'Jacob' y 'Egipto'.
