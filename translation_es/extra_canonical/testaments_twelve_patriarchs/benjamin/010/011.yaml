source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: ⌜Ὑμεῖς οὖν, τέκνα μου⁶⁷, ἐὰν⁶⁸ πορευθῆτε⁶⁹ ἐν ἁγιασμῷ ⌜*ἐν ταῖς ἐντολαῖς⁷⁰ Κυρίου⌝, πάλιν κατοικήσετε⁷¹ ⌜ἐπʼ ἐλπίδι⌝ *ἐν ἐμοί⁷², καὶ συναχθήσεται⁷³ *πρὸς Κύριον⁷⁴ πᾶς Ἰσραήλ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/010/011.yaml
  text: You therefore, my children, if you walk in holiness in the commandments of the Lord, you will again dwell in hope with me, and all Israel will be gathered to the Lord.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:24Z'
    unchanged: false
    changes_summary: Revised 'according to the commandments' to the more literal 'in the commandments' to reflect the Greek construction; changed 'with confidence' to 'in hope' for ἐπʼ ἐλπίδι; adjusted word order to 'will again dwell' for a more natural rendering while preserving πάλιν.
translation:
  language: es
  text: Por tanto, ustedes, hijos míos, si caminan en santidad en los mandamientos del Señor, volverán a habitar en esperanza[a] conmigo, y todo Israel será reunido al Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con confianza'; la frase griega ἐπʼ ἐλπίδι es difícil en este contexto y admite ambas lecturas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἁγιασμῷ
  english_pob_choice: in holiness
  chosen_spanish: en santidad
  alternatives_spanish:
  - en santificación
  - en consagración
  lexicon: LSJ
  rationale: ἁγιασμός en contexto exhortativo ético-pactual se rinde naturalmente 'santidad' en español bíblico.
- source_word: ἐν ταῖς ἐντολαῖς Κυρίου
  english_pob_choice: in the commandments of the Lord
  chosen_spanish: en los mandamientos del Señor
  alternatives_spanish:
  - según los mandamientos del Señor
  - conforme a los mandamientos del Señor
  lexicon: LSJ
  rationale: El revisor cambió 'according to' a 'in' para reflejar la construcción griega más literalmente; el español usa 'en' para mantener esa preposicionalidad.
- source_word: πάλιν κατοικήσετε
  english_pob_choice: will again dwell
  chosen_spanish: volverán a habitar
  alternatives_spanish:
  - habitarán de nuevo
  - morarán otra vez
  lexicon: LSJ
  rationale: El revisor ajustó orden a 'will again dwell'; el español usa la perífrasis 'volver a + infinitivo' que es la forma natural para πάλιν + verbo.
- source_word: ἐπʼ ἐλπίδι
  english_pob_choice: in hope
  chosen_spanish: en esperanza
  alternatives_spanish:
  - con esperanza
  - con confianza
  - esperanzados
  lexicon: LSJ
  rationale: El revisor cambió 'with confidence' a 'in hope' por más literal a la construcción griega; 'en esperanza' refleja directamente ἐπʼ ἐλπίδι.
- source_word: συναχθήσεται πρὸς Κύριον
  english_pob_choice: will be gathered to the Lord
  chosen_spanish: será reunido al Señor
  alternatives_spanish:
  - será congregado al Señor
  - será juntado al Señor
  lexicon: LSJ
  rationale: Pasivo escatológico de συνάγω; 'reunido' preserva el motivo del recogimiento pactual hacia el Señor.
translation_notes:
  revision_awareness: 'El revisor inglés realizó tres cambios: ''in the commandments'' (más literal), ''will again dwell'' (orden natural), y ''in hope with me'' (más literal). El español refleja todos.'
  spanish_consistency_notes:
  - '''Santidad'' como rendición estable para ἁγιασμός.'
  - '''Volverán a habitar'' usa perífrasis estándar para πάλιν + futuro.'
  - '''Reunido al Señor'' coherente con motivo escatológico de συνάγω en contexto pactual.'
