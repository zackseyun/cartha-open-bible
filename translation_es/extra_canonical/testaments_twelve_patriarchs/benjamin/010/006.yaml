translation:
  language: es
  text: Y entonces verán a Enoc, a Set, a Abraham, a Isaac y a Jacob, levantados a su derecha en regocijo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναστήσονται
  english_pob_choice: will rise
  chosen_spanish: resucitarán
  alternatives_spanish:
  - se levantarán
  - se alzarán
  lexicon: LSJ
  rationale: En contexto de juicio escatológico universal, 'resucitar' es el término natural en español; refleja la fuerza de ἀνίστημι aplicado a muertos.
- source_word: οἱ μὲν εἰς δόξαν, οἱ δὲ εἰς ἀτιμίαν
  english_pob_choice: some to glory and some to dishonor
  chosen_spanish: unos para gloria y otros para deshonra
  alternatives_spanish:
  - algunos para gloria, otros para vergüenza
  - unos a la gloria y otros a la deshonra
  lexicon: LSJ
  rationale: Conserva la antítesis formal griega μέν...δέ. 'Deshonra' empareja con 'gloria' en registro elevado bíblico.
- source_word: κρινεῖ
  english_pob_choice: will judge
  chosen_spanish: juzgará
  alternatives_spanish:
  - sentenciará
  - dictaminará
  lexicon: LSJ
  rationale: Término judicial estándar bíblico.
- source_word: ἀδικίας
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - iniquidad
  - maldad
  lexicon: LSJ
  rationale: ἀδικία cubre el espectro moral-pactual; 'injusticia' refleja tanto la dimensión jurídica como ética.
- source_word: ἐν σαρκί
  english_pob_choice: in the flesh
  chosen_spanish: en carne
  alternatives_spanish:
  - en la carne
  - encarnado
  lexicon: LSJ
  rationale: σάρξ → 'carne' por defecto del POB. 'En carne' (sin artículo) refleja la frase griega y el lenguaje cristológico de la cláusula entre corchetes.
theological_decisions:
- issue: Material cristológico entre corchetes
  chosen_reading: Traducir el material entre corchetes como en el inglés POB.
  alternative_readings:
  - Omitir el material como interpolación cristiana posterior
  rationale: El POB conserva la cláusula con corchetes para indicar transparencia textual. El español sigue la misma política.
translation_notes:
  revision_awareness: El revisor inglés reemplazó un draft no relacionado con la traducción correcta del griego; el español refleja la versión revisada con resurrección, gloria/deshonra y juicio de Israel.
  spanish_consistency_notes:
  - Corchetes preservados para señalar material textualmente sospechoso de expansión cristiana posterior.
  - '''Resucitar'' usado para ἀνίστημι en contexto escatológico, distinto de ''levantarse'' usado en otros contextos.'
