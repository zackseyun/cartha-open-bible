base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/010/007.yaml
  text: And then he will judge all the nations, as many as did not believe in him when he appeared on earth.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:22Z'
    unchanged: false
    changes_summary: 'Replaced the draft, which reflected different source material, with a rendering that matches the Greek here: included ''then,'' ''he will judge,'' ''all the nations,'' ''as many as did not believe in him,'' and ''when he appeared on earth.'''
translation:
  language: es
  text: Y entonces juzgará a todas las naciones, a cuantos no creyeron en él cuando apareció en la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los gentiles
  - todos los pueblos
  lexicon: LSJ
  rationale: ἔθνη como 'naciones' es el término estándar en contexto de juicio universal; abarca tanto pueblos como gentiles sin reducir el alcance.
- source_word: ὅσοι οὐκ ἐπίστευσαν αὐτῷ
  english_pob_choice: as many as did not believe in him
  chosen_spanish: a cuantos no creyeron en él
  alternatives_spanish:
  - a todos los que no creyeron en él
  - a quienes no le creyeron
  lexicon: LSJ
  rationale: '''Cuantos'' refleja ὅσοι como pronombre relativo cuantitativo; ''creer en él'' preserva la estructura de fe explícita.'
- source_word: φανέντι
  english_pob_choice: appeared
  chosen_spanish: apareció
  alternatives_spanish:
  - se manifestó
  - se mostró
  lexicon: LSJ
  rationale: El aoristo pasivo de φαίνομαι en contexto cristológico se rinde como 'aparecer' o 'manifestarse'; 'apareció' es el término más directo y neutral.
translation_notes:
  revision_awareness: El revisor inglés reemplazó completamente el draft original con una traducción que refleja el griego correctamente; el español sigue la versión revisada.
  spanish_consistency_notes:
  - '''Cuantos'' en lugar de ''tantos como'' para naturalidad en español moderno.'
  - Pretérito 'creyeron' / 'apareció' coherente con el aoristo griego en contexto narrativo escatológico.
