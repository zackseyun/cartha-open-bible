  text: Τότε καὶ ἡμεῖς ἀναστησόμεθα³³ ἕκαστος *ἐπὶ σκήπτρον ἡμῶν³⁴ προσκυνοῦντες τὸν βασιλέα *τῶν οὐρανῶν³⁵ [τὸν ἐπὶ γῆς φανέντα³⁶ ἐν³⁷ μορφῇ ἀνθρώπου *ἐν ταπεινώσει³⁸, καὶ ὅσοι πιστεύσωσιν³⁹ αὐτῷ⁴⁰ ἐπὶ τῆς⁴¹ γῆς *χαρίσονται σὺν αὐτῷ⁴²].
