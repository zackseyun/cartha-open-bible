translation:
  language: es
  text: Y entonces juzgará a todas las naciones [que no le creyeron cuando apareció en la tierra].
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνασταμένους (participio aoristo)
  english_pob_choice: having risen
  chosen_spanish: habiendo resucitado
  alternatives_spanish:
  - resucitados
  - ya resucitados
  lexicon: LSJ
  rationale: El revisor inglés ajustó 'rising up' a 'having risen' para reflejar mejor el aoristo; 'habiendo resucitado' (gerundio compuesto) capta la acción ya cumplida en español.
- source_word: ἐν ἀγαλλιάσει
  english_pob_choice: in joy
  chosen_spanish: en gozo
  alternatives_spanish:
  - en regocijo
  - con exultación
  lexicon: LSJ
  rationale: '''Gozo'' coincide con el revisor que prefirió ''joy''. Mantiene tono celebratorio con economía expresiva.'
- source_word: ἐκ δεξιῶν
  english_pob_choice: at the right hand
  chosen_spanish: a la derecha
  alternatives_spanish:
  - a la diestra
  - junto a la derecha
  lexicon: LSJ
  rationale: El revisor cambió 'on the right hand' a 'at the right hand' por más natural; 'a la derecha' es el español moderno estándar.
translation_notes:
  revision_awareness: El revisor inglés ajustó participio a 'having risen' y preposición a 'at the right hand' para naturalidad y precisión. El español refleja ambos cambios.
  spanish_consistency_notes:
  - '''A la derecha'' (no ''diestra'' arcaico) para registro moderno.'
  - '''Sem'' (no ''Set'' o ''Seth'') refleja la lectura del verso 9 en este testigo griego, que difiere del verso 6 que tiene ''Set''.'
