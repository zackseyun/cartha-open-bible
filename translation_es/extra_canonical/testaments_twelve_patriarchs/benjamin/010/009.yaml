source:
  edition: Charles 1908 Greek Versions (pages 288-308, Benjamin source-fix v2)
  text: Καὶ τότε κρινεῖ πάντα τὰ ἔθνη [ὅσα οὐκ ἐπίστευσαν αὐτῷ ἐπὶ τῆς⁵⁰ γῆς φανέντι⁵⁷].
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/010/009.yaml
  text: And then you will see Enoch and Shem and Abraham and Isaac and Jacob, having risen in joy at the right hand.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: Adjusted 'rising up' to 'having risen' to better reflect the aorist participle; changed 'on the right hand' to 'at the right hand' for more natural English and closer correspondence to the source.
translation:
  language: es
  text: Y entonces verán a Enoc, a Sem, a Abraham, a Isaac y a Jacob, habiendo resucitado en gozo a la derecha.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνασταμένους (participio aoristo)
  english_pob_choice: having risen
  chosen_spanish: habiendo resucitado
  alternatives_spanish:
  - resucitados
  - ya resucitados
  lexicon: LSJ
  rationale: El revisor inglés ajustó 'rising up' a 'having risen' para reflejar mejor el aoristo; 'habiendo resucitado' (gerundio compuesto) capta la acción ya cumplida en español.
- source_word: ἐν ἀγαλλιάσει
  english_pob_choice: in joy
  chosen_spanish: en gozo
  alternatives_spanish:
  - en regocijo
  - con exultación
  lexicon: LSJ
  rationale: '''Gozo'' coincide con el revisor que prefirió ''joy''. Mantiene tono celebratorio con economía expresiva.'
- source_word: ἐκ δεξιῶν
  english_pob_choice: at the right hand
  chosen_spanish: a la derecha
  alternatives_spanish:
  - a la diestra
  - junto a la derecha
  lexicon: LSJ
  rationale: El revisor cambió 'on the right hand' a 'at the right hand' por más natural; 'a la derecha' es el español moderno estándar.
translation_notes:
  revision_awareness: El revisor inglés ajustó participio a 'having risen' y preposición a 'at the right hand' para naturalidad y precisión. El español refleja ambos cambios.
  spanish_consistency_notes:
  - '''A la derecha'' (no ''diestra'' arcaico) para registro moderno.'
  - '''Sem'' (no ''Set'' o ''Seth'') refleja la lectura del verso 9 en este testigo griego, que difiere del verso 6 que tiene ''Set''.'
