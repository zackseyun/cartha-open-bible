base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/010/004.yaml
  text: For these things I leave to you instead of every inheritance. And you, therefore, give them to your children as an everlasting possession; for thus Abraham and Isaac and Jacob did.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:22Z'
    unchanged: false
    changes_summary: Adjusted word order to more closely reflect the Greek ('leave to you'), added 'therefore' for οὖν, and retained formal, natural English.
translation:
  language: es
  text: Pues estas cosas les dejo a ustedes en lugar de toda herencia. Y ustedes, por tanto, dénselas a sus hijos como posesión perpetua; porque así lo hicieron Abraham, Isaac y Jacob.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀντὶ πάσης κληρονομίας
  english_pob_choice: instead of every inheritance
  chosen_spanish: en lugar de toda herencia
  alternatives_spanish:
  - en vez de toda herencia
  - como toda herencia
  lexicon: LSJ
  rationale: 'Conserva el sentido contrastivo de ἀντί: la enseñanza ética sustituye al patrimonio material.'
- source_word: καταλειμπάνω
  english_pob_choice: I leave to you
  chosen_spanish: les dejo a ustedes
  alternatives_spanish:
  - dejo a ustedes
  - les voy dejando
  lexicon: LSJ
  rationale: El presente griego con valor testamentario se rinde con presente español; se preserva la dirección hacia los oyentes.
- source_word: εἰς κατάσχεσιν αἰώνιον
  english_pob_choice: as an everlasting possession
  chosen_spanish: como posesión perpetua
  alternatives_spanish:
  - como heredad perpetua
  - como posesión eterna
  lexicon: LSJ
  rationale: Frase pactual reconocible; 'perpetua' es término idiomático en español para herencia transmitida entre generaciones.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - entonces
  - así pues
  lexicon: LSJ
  rationale: Conector inferencial estándar en registro formal del español testamentario.
translation_notes:
  revision_awareness: El revisor inglés ajustó orden de palabras a 'leave to you' y agregó 'therefore' por οὖν; el español refleja ambos cambios.
  spanish_consistency_notes:
  - '''Ustedes'' (Latinoamérica) en lugar de ''vosotros''.'
  - '''Posesión perpetua'' como traducción consistente para κατάσχεσις αἰώνιος.'
