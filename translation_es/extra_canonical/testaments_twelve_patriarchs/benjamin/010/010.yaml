base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/010/010.yaml
  text: And we will rise, each to his own tribe, worshiping the King of heaven.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: Added a comma after 'rise' for clearer clause structure; otherwise retained the draft, which accurately renders the source.
translation:
  language: es
  text: Y nosotros también resucitaremos, cada uno a su propia tribu, adorando al Rey del cielo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναστησόμεθα
  english_pob_choice: will rise
  chosen_spanish: resucitaremos
  alternatives_spanish:
  - nos levantaremos
  - nos alzaremos
  lexicon: LSJ
  rationale: Futuro medio de ἀνίστημι en contexto de resurrección escatológica universal; 'resucitaremos' es la rendición natural en español bíblico.
- source_word: ἕκαστος ἐπὶ σκήπτρον ἡμῶν
  english_pob_choice: each to his own tribe
  chosen_spanish: cada uno a su propia tribu
  alternatives_spanish:
  - cada uno con su cetro
  - cada uno sobre su cetro
  lexicon: LSJ
  rationale: 'Frase textualmente difícil; el revisor optó por la rendición interpretativa ''each to his own tribe''. El español sigue esa decisión: ''cada uno a su propia tribu''.'
- source_word: βασιλέα τῶν οὐρανῶν
  english_pob_choice: King of heaven
  chosen_spanish: Rey del cielo
  alternatives_spanish:
  - Rey de los cielos
  - Rey celestial
  lexicon: LSJ
  rationale: El revisor unificó a singular 'King of heaven'; el español sigue con 'Rey del cielo' (singular natural en español moderno, aunque el griego usa plural).
- source_word: προσκυνοῦντες
  english_pob_choice: worshiping
  chosen_spanish: adorando
  alternatives_spanish:
  - postrándonos
  - venerando
  lexicon: LSJ
  rationale: προσκυνέω en contexto de divinidad se rinde tradicionalmente 'adorar' en español bíblico.
translation_notes:
  revision_awareness: El revisor agregó coma después de 'rise' para claridad estructural; el español refleja la pausa con coma similar y mantiene la rendición interpretativa 'tribu'.
  spanish_consistency_notes:
  - '''Resucitaremos'' coherente con 10:6 (''resucitarán'').'
  - '''Su propia tribu'' refleja la decisión interpretativa del revisor sobre la frase difícil ἐπὶ σκήπτρον ἡμῶν.'
