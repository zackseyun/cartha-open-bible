  text: Καὶ ἐλέγξει ἐν τοῖς ἐκλεκτοῖς *τῶν ἐθνῶν⁵⁸ τὸν Ἰσραήλ, ὥσπερ ἤλεγξεν τὸν Ἡσαῦ ἐν τοῖς Μαδιωαίοις τοῖς †ἀπατήσασιν⁵⁹ *ἀδελφοὺς αὐτῶν⁶⁰ [γενέσθαι διὰ τῆς πορνείας καὶ τῆς εἰδωλολατρείας, καὶ⁶¹ ἀπηλλοτριώθησαν Θεοῦ]⁶², γενόμενοι⁶³ οὖν⁶⁴ τέκνα ἐν μερίδι φοβουμένων⁶⁵ Κύριον.
