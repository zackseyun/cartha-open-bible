  text: 10. *Ὅτι ἐὰν εἴπῃς τῷ ὀφθαλμῷ, Ἄκουε, οὐ δυνήσεται⁸²· οὕτως οὐδὲ *ἐν σκότει⁸³ *ὄντες δύνασθε ποιεῖν⁸⁴ ἔργα⁸⁵ φωτός.
