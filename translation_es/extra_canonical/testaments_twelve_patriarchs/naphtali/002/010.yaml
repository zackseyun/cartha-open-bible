base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/002/010.yaml
  text: For if you say to the eye, “Hear,” it cannot; so neither, being in darkness, can you do the works of light.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:15Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Porque si dices al ojo: «Escucha», no podrá[o]; así tampoco, estando en tinieblas, pueden hacer las obras de la luz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: o
    text: Lit. «escucha»; el imperativo conserva la personificación del ojo que oye, una imposibilidad deliberada en la imagen.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ ὀφθαλμῷ
  english_pob_choice: the eye
  chosen_spanish: al ojo
  alternatives_spanish:
  - al ojo humano
  - al ojo físico
  lexicon: ὀφθαλμός
  rationale: Se conserva el referente literal singular de "the eye" sin añadir explicación innecesaria; en español "al ojo" comunica bien el dativo dirigido a la facultad/órgano y mantiene la personificación retórica del texto.
- source_word: Ἄκουε
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escucha, oye
  lexicon: ἀκούω
  rationale: La interpelación imperativa pide una forma natural en español. "Escucha" mantiene el mandato directo y el paralelismo retórico con el inglés POB sin sonar excesivamente arcaico.
- source_word: οὐ δυνήσεται
  english_pob_choice: it cannot
  chosen_spanish: no podrá
  alternatives_spanish:
  - no puede
  - no será capaz
  lexicon: δύναμαι
  rationale: El futuro de capacidad en español refleja bien la incapacidad que expresa el griego y sigue de cerca el valor verbal del inglés POB "cannot" en esta construcción.
- source_word: ἐν σκότει
  english_pob_choice: being in darkness
  chosen_spanish: estando en tinieblas
  alternatives_spanish:
  - estando en la oscuridad
  - siendo de tinieblas
  lexicon: σκότος
  rationale: '"Tinieblas" conserva el matiz bíblico y simbólico del griego y del inglés POB, más fuerte que una simple referencia física a la oscuridad.'
- source_word: ποιεῖν ἔργα φωτός
  english_pob_choice: do the works of light
  chosen_spanish: hacer las obras de la luz
  alternatives_spanish:
  - hacer obras de luz
  - realizar las obras de la luz
  lexicon: ἔργον
  rationale: Se mantiene la construcción nominal de "works of light" con artículo definido, como en el inglés POB, y "luz" queda como genitivo de pertenencia/origen simbólico sin explicitar más de lo que el texto da.
theological_decisions:
- issue: Imagen de incapacidad espiritual frente a la tiniebla
  english_pob_reading: being in darkness, can you do the works of light
  chosen_spanish_reading: estando en tinieblas, pueden hacer las obras de la luz
  alternative_spanish_readings:
  - en la oscuridad, pueden hacer las obras de la luz
  - si están en tinieblas, pueden hacer las obras de la luz
  rationale: 'El texto presenta una imposibilidad retórica y moral: la tiniebla impide las obras propias de la luz. La versión española conserva esa fuerza sin suavizarla ni moralizarla más allá del original.'
  doctrine_reference: Antropología moral y simbología luz/tinieblas en literatura judía del Segundo Templo
translation_notes:
  revision_awareness: El pasaje coincide con la última pasada de revisión indicada como sin cambios necesarios; la redacción española se alinea con el texto griego y con la solución óptima ya establecida en el inglés POB, sin introducir ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo directo del griego: mandato imposible al ojo seguido de una comparación con quienes están en tinieblas.'
  - Se mantiene "tinieblas" y "obras de la luz" para sostener el simbolismo bíblico sin reemplazarlo por formulaciones explicativas.
  - El singular "al ojo" respeta la imagen original y la personificación retórica del pasaje.
