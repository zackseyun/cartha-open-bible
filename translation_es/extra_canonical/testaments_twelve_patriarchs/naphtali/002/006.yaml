id: T12P.NAP.2.6
reference: Testament of Naphtali 2:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 6. *Ὡς γὰρ ἡ ἰσχὺς αὐτοῦ, οὕτως⁴⁸ καὶ ὁ λόγος αὐτοῦ⁵⁰, ἢ ἐν νόμῳ Κυρίου, ἢ ἐν νόμῳ⁵¹ τοῦ⁵² Βελίαρ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/002/006.yaml
  text: As a person's strength is, so also is his word, whether in the law of the Lord or in the works of Beliar.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:15Z'
    unchanged: false
    changes_summary: Changed 'work' to 'word' for λόγος, and rendered the final phrase as 'in the works of Beliar' to account for ἔργοις rather than repeating 'law.'
translation:
  language: es
  text: Porque como es su fuerza, así también es su palabra, ya sea en la ley de Yahvé, ya sea en las obras de Beliar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ λόγος αὐτοῦ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su dicho
  - su hablar
  lexicon: λόγος
  rationale: El griego λόγος aquí fue revisado en la POB inglesa de 'work' a 'word'; por eso 'palabra' preserva el contraste interno con 'fuerza' y evita desviar el sentido hacia acción/obra.
- source_word: ἰσχὺς
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - vigor
  lexicon: ἰσχύς
  rationale: '''Fuerza'' comunica bien la capacidad o poder efectivo de una persona en español moderno y mantiene la relación proporcional del dicho.'
- source_word: νόμῳ Κυρίου
  english_pob_choice: the law of the Lord
  chosen_spanish: la ley de Yahvé
  alternatives_spanish:
  - la ley del Señor
  lexicon: νόμος / יהוה
  rationale: Se conserva 'Yahvé' conforme al estándar del proyecto para el nombre divino, en lugar de la máscara 'Señor'. 'Ley' traduce νόμος de forma directa y clara.
- source_word: νόμῳ τοῦ Βελίαρ
  english_pob_choice: the works of Beliar
  chosen_spanish: las obras de Beliar
  alternatives_spanish:
  - la ley de Beliar
  - las acciones de Beliar
  lexicon: νόμος / ἔργοις
  rationale: La revisión inglesa indica que el final debe entenderse como 'works' por ἔργοις, no como repetición de 'law'. 'Obras' conserva esa corrección y el contraste ético con la ley de Yahvé.
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: Βελίαρ
  rationale: Se mantiene la forma auditada 'Beliar' del texto fuente y de la POB inglesa; 'Belial' es una forma española posible, pero aquí alteraría la trazabilidad terminológica.
theological_decisions:
- issue: Contraste entre la ley de Yahvé y las obras de Beliar
  english_pob_reading: whether in the law of the Lord or in the works of Beliar
  chosen_spanish_reading: ya sea en la ley de Yahvé, ya sea en las obras de Beliar
  alternative_spanish_readings:
  - en la ley del Señor
  - en la ley de Beliar
  rationale: 'El griego y la revisión inglesa sostienen un contraste moral/alianza: la palabra de una persona se manifiesta en la esfera de Yahvé o en la de Beliar. ''Obras'' evita colapsar el final con una segunda ''ley''.'
  doctrine_reference: Antítesis ética y de lealtad en literatura testamentaria; fidelidad a Yahvé frente a Belial/Beliar.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente: se corrigió λόγος como ''word/palabra'' y se evitó repetir ''ley'' al final, donde el estado revisado exige ''works/obras'' para ἔργοις.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' según la terminología por defecto del proyecto para el nombre divino.
  - Se evitó 'Señor' como sustituto de יהוה para mantener transparencia textual.
  - '''Beliar'' se conservó como forma propia del expediente, no como equivalente tradicional español.'
  - El registro es sobrio y bíblico, con sintaxis natural en español latinoamericano.
