id: T12P.NAP.2.7
reference: Testament of Naphtali 2:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 7. Καὶ ὡς⁵³ κεχώρισται ἀνάμεσον *τοῦ φωτὸς καὶ ἀνάμεσον τοῦ σκότους⁵⁴ *δράσεώς τε καὶ ἀκοῆς⁵⁵, οὕτως⁵⁶ κεχώρισται ἀνάμεσον ἀνδρὸς καὶ *ἀνδρός, καὶ ἀνάμεσον γυναικὸς καὶ⁵⁷ γυναικός⁵⁸, καὶ οὐκ ἔστιν εἰπεῖν ὅτι †*ἐν τῷ ἑνὶ τοῖς προσώποις ἡττόμενον ἦν †⁵⁹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/002/007.yaml
  text: And just as there is a division between light and darkness, and between sight and hearing, so there is also a division between man and man, and between woman and woman; and it is not possible to say that in appearance one is inferior to another.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:16Z'
    unchanged: false
    changes_summary: Revised 'seeing' to 'sight' for a more natural rendering of ἀκοῆς/its paired noun, removed 'in all things' and 'the same as another' because they are not supported by the Greek, and rendered the difficult final clause more literally as a statement about appearance and inferiority.
translation:
  language: es
  text: Y así como hay una división entre la luz y las tinieblas, y entre la vista y el oído, así también hay una división entre hombre y hombre, y entre mujer y mujer; y no es posible decir que en apariencia uno sea inferior a otro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνάμεσον τοῦ φωτὸς καὶ ἀνάμεσον τοῦ σκότους
  english_pob_choice: between light and darkness
  chosen_spanish: entre la luz y las tinieblas
  alternatives_spanish:
  - entre la luz y la oscuridad
  - entre la luz y las sombras
  lexicon: ἀνάμεσον; φῶς; σκότος
  rationale: Mantiene la construcción relacional 'entre... y...' y conserva el contraste clásico entre 'luz' y 'tinieblas', que en español preserva mejor el tono bíblico y la oposición total del griego que una abstracción como 'oscuridad'.
- source_word: δράσεώς τε καὶ ἀκοῆς
  english_pob_choice: between sight and hearing
  chosen_spanish: entre la vista y el oído
  alternatives_spanish:
  - entre ver y oír
  - entre la visión y la audición
  lexicon: δράσις; ἀκοή
  rationale: El inglés POB corrigió 'seeing' a 'sight' para reflejar el sustantivo; en español, 'vista' y 'oído' conservan el paralelismo nominal y suenan naturales sin perder la distinción sensorial.
- source_word: ἀνδρὸς καὶ ἀνδρός
  english_pob_choice: between man and man
  chosen_spanish: entre hombre y hombre
  alternatives_spanish:
  - entre varón y varón
  - entre persona y persona
  lexicon: ἀνήρ
  rationale: '''Hombre'' reproduce la repetición distributiva del griego y el patrón del inglés auditado; ''varón'' sería posible pero puede sonar más técnico o marcado en español sin ventaja clara aquí.'
- source_word: γυναικὸς καὶ γυναικός
  english_pob_choice: between woman and woman
  chosen_spanish: entre mujer y mujer
  alternatives_spanish:
  - entre hembra y hembra
  - entre persona y persona
  lexicon: γυνή
  rationale: Conserva el paralelismo exacto con la línea anterior y evita suavizar la formulación hacia un término genérico que diluiría la simetría del pasaje.
- source_word: ἔστιν εἰπεῖν ὅτι ... ἡττόμενον ἦν
  english_pob_choice: it is not possible to say that in appearance one is inferior to another
  chosen_spanish: no es posible decir que en apariencia uno sea inferior a otro
  alternatives_spanish:
  - no se puede decir que uno sea menos que otro en apariencia
  - no puede afirmarse que uno sea inferior al otro por su aspecto
  lexicon: ἐν τῷ ... προσώποις; ἡττόμενον
  rationale: Sigue de cerca la lectura auditada 'in appearance' para ἐν τῷ ἑνὶ τοῖς προσώποις y conserva 'inferior' para ἡττόμενον, que expresa comparación de inferioridad mejor que una paráfrasis general.
theological_decisions:
- issue: Alcance antropológico de las divisiones enumeradas
  english_pob_reading: There is a division between light and darkness, between sight and hearing, and between man and man, and between woman and woman.
  chosen_spanish_reading: Hay una división real y estable entre pares contrastados de orden creado y social, sin borrar la fuerza de la separación.
  alternative_spanish_readings:
  - hay diferencias entre
  - hay distinciones entre
  rationale: El pasaje presenta contrastes estructurales, no solo diferencias vagas. 'División' mantiene la fuerza del original y evita desactivar la serie de oposiciones.
  doctrine_reference: Principio de lectura contextual y literalidad controlada en literatura testamental
- issue: Cláusula final de apariencia e inferioridad
  english_pob_reading: it is not possible to say that in appearance one is inferior to another.
  chosen_spanish_reading: no es posible decir que en apariencia uno sea inferior a otro
  alternative_spanish_readings:
  - no puede decirse que por su apariencia uno sea menos que otro
  - no es posible afirmar que en aspecto uno sea inferior a otro
  rationale: La versión inglesa auditada ya optó por una lectura más literal de la cláusula difícil, manteniendo 'appearance' y 'inferior'. En español, 'en apariencia' y 'sea inferior' conservan esa cautela sin resolver artificialmente la ambigüedad del griego.
  doctrine_reference: Respeto al texto fuente y preservación de tensiones léxicas no resueltas
translation_notes:
  revision_awareness: Se siguió la revisión auditada que desplazó 'seeing' a 'sight' y eliminó añadidos no sustentados como 'in all things' y 'the same as another'. La redacción española evita esos añadidos y refleja la cláusula final con la misma cautela literal que el texto inglés revisado.
  spanish_consistency_notes:
  - Se mantuvo 'tinieblas' en lugar de 'oscuridad' para sostener un registro bíblico consistente con el contraste luz/tinieblas.
  - Se prefirió 'vista' y 'oído' como sustantivos paralelos, siguiendo la decisión inglesa auditada de no usar un gerundio o verbo implícito.
  - No se introdujo 'persona' en los contrastes hombre/mujer para no debilitar el paralelismo distributivo del original.
