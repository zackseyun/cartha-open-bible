translation:
  language: es
  text: Y no hay deficiencia en él, ni siquiera en un tercio de cabello; porque por peso, medida y regla fue hecha toda creación.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐκ ἔστιν ἐνλεῖπον
  english_pob_choice: there is no deficiency
  chosen_spanish: no hay deficiencia
  alternatives_spanish:
  - no falta nada
  - no hay carencia
  - no está incompleto
  lexicon: ἐνλεῖπον
  rationale: La idea central es ausencia de defecto o carencia; «deficiencia» conserva el matiz de falta objetiva sin forzar una paráfrasis. «No hay» reproduce bien la construcción impersonal del inglés POB y del griego.
- source_word: ἐκ τοῦ ἑνὸς τρίτου τριχός
  english_pob_choice: not even by a third of a hair
  chosen_spanish: ni siquiera en un tercio de cabello
  alternatives_spanish:
  - ni siquiera por un tercio de un cabello
  - ni aun en un tercio de cabello
  lexicon: τρίχός
  rationale: Se conserva la imagen hiperbólica del cabello y la cuantificación fraccionaria. «En un tercio de cabello» es más natural en español que un calco con «por» y mantiene la fuerza de insignificancia mínima.
- source_word: σταθμῷ ... καὶ μέτρῳ καὶ κανόνι
  english_pob_choice: by weight and measure and rule
  chosen_spanish: por peso, medida y regla
  alternatives_spanish:
  - con peso, medida y regla
  - según peso, medida y regla
  - por balanza, medida y regla
  lexicon: σταθμός / μέτρον / κανών
  rationale: «Peso, medida y regla» reproduce el trío instrumental con lenguaje claro y digno. «Regla» conserva el valor de norma o canon de κανών sin introducir terminología eclesiástica ajena.
- source_word: πᾶσα ... κτίσις
  english_pob_choice: every creation
  chosen_spanish: toda creación
  alternatives_spanish:
  - toda la creación
  - cada creación
  - toda criatura
  lexicon: κτίσις
  rationale: El griego admite el sentido colectivo de la totalidad creada. «Toda creación» mantiene ese alcance general sin desplazarse a «criatura», que sería más estrecho y menos fiel al paralelo del texto.
- source_word: ἐγένετο
  english_pob_choice: was made
  chosen_spanish: fue hecha
  alternatives_spanish:
  - fue creada
  - llegó a ser
  - se hizo
  lexicon: γίνομαι
  rationale: «Fue hecha» corresponde al pasivo de origen y preserva el enfoque en la obra realizada según medida, sin cargar innecesariamente la expresión con un énfasis teológico distinto al del texto.
theological_decisions:
- issue: Relación entre orden, medida y la creación entera
  english_pob_reading: by weight and measure and rule every creation was made
  chosen_spanish_reading: por peso, medida y regla fue hecha toda creación
  alternative_spanish_readings:
  - según peso, medida y regla fue hecha toda creación
  - por peso, medida y norma fue hecha toda creación
  rationale: Se conserva la afirmación sapiencial de un orden divinamente determinado en la creación. «Regla» deja abierto el valor de norma sin importar una terminología dogmática posterior.
  doctrine_reference: Creación ordenada por Dios; sabiduría y providencia en la creación.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; por eso se mantuvo la estructura semántica del POB inglés, ajustada solo a un español natural y fiel al griego.
  spanish_consistency_notes:
  - Se mantuvo el registro sobrio y bíblico sin recurrir a fórmulas litúrgicas ajenas al pasaje.
  - Se evitó «SEÑOR» y otras sustituciones porque el versículo no contiene el nombre divino ni una cita del mismo.
  - Se conservó el paralelismo enumerativo «peso, medida y regla» para reflejar la tríada del griego.
