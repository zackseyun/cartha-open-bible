base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/002/008.yaml
  text: 'For God made all things good in their order: the five senses in the head, and he joined the neck to the head; and he added hair for beauty, and the heart for understanding, the belly for excrement, the stomach for grinding, the windpipe for taking in air, the liver for anger, the gall for bitterness, the spleen for laughter, the kidneys for craftiness, the loins for strength, and the lungs for drawing in; and so the rest.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:16Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Porque Dios hizo todas las cosas buenas en su orden: los cinco sentidos en la cabeza, y unió el cuello a la cabeza; y añadió cabello para hermosura y gloria, el corazón para entendimiento, el vientre para excremento, el estómago para moler, la tráquea para tomar aire, el hígado para ira, la hiel para amargura, el bazo para risa, los riñones para astucia, los lomos para fuerza, y los pulmones para recibir aire; y así lo demás.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πάντα ... καλά
  english_pob_choice: all things good
  chosen_spanish: todas las cosas buenas
  alternatives_spanish:
  - todo bueno
  - todas las cosas en buen orden
  lexicon: πάντα / καλός
  rationale: Conserva la afirmación general de bondad y evita suavizarla a una mera conveniencia. "En su orden" queda por separado para representar ἐν τάξει.
- source_word: ἐν τάξει
  english_pob_choice: in their order
  chosen_spanish: en su orden
  alternatives_spanish:
  - en orden
  - según su orden
  lexicon: τάξις
  rationale: Mantiene la idea de disposición ordenada sin añadir un matiz jerárquico no explícito en español.
- source_word: πέντε αἰσθήσεις
  english_pob_choice: the five senses
  chosen_spanish: los cinco sentidos
  alternatives_spanish:
  - las cinco sensaciones
  - los cinco sentidos corporales
  lexicon: αἴσθησις
  rationale: '"Sentidos" es el equivalente natural y preciso en español para esta enumeración corporal.'
- source_word: τράχηλον
  english_pob_choice: neck
  chosen_spanish: cuello
  alternatives_spanish:
  - garganta
  - nuca
  lexicon: τράχηλος
  rationale: '"Cuello" es el término más amplio y claro en español para la unión con la cabeza.'
- source_word: τρίχας εἰς εὐπρέπειαν καὶ δόξαν
  english_pob_choice: hair for beauty and glory
  chosen_spanish: cabello para hermosura y gloria
  alternatives_spanish:
  - cabello para belleza y gloria
  - pelo para adorno y gloria
  lexicon: θρίξ / εὐπρέπεια / δόξα
  rationale: '"Cabello" suena más natural y digno en registro bíblico; "hermosura" mantiene la cualidad de belleza, y "gloria" conserva el valor de honor/ornamento.'
- source_word: καρδίαν εἰς φρόνησιν
  english_pob_choice: the heart for understanding
  chosen_spanish: el corazón para entendimiento
  alternatives_spanish:
  - el corazón para prudencia
  - el corazón para sabiduría
  lexicon: καρδία / φρόνησις
  rationale: '"Entendimiento" refleja la facultad interior sin desplazarla a una virtud más amplia como sabiduría.'
- source_word: κοιλίαν εἰς διάκρισιν
  english_pob_choice: the belly for excrement
  chosen_spanish: el vientre para excremento
  alternatives_spanish:
  - el vientre para evacuación
  - las entrañas para excremento
  lexicon: κοιλία / διάκρισις
  rationale: Sigo la lectura del POB inglés, aunque el griego presenta una tensión textual/semántica. "Vientre" y "excremento" preservan el sentido corporal crudo sin eufemismo.
- source_word: στόμαχον εἰς ἀλεσμόν
  english_pob_choice: the stomach for grinding
  chosen_spanish: el estómago para moler
  alternatives_spanish:
  - el estómago para triturar
  - el vientre para moler
  lexicon: στόμαχος / ἀλεσμός
  rationale: '"Moler" conserva la imagen de trituración digestiva. "Estómago" corresponde al órgano en el español corriente.'
- source_word: κάλαμον πρὸς ὑγείαν
  english_pob_choice: the windpipe for taking in air
  chosen_spanish: la tráquea para tomar aire
  alternatives_spanish:
  - el conducto para respirar
  - la tráquea para recibir aire
  lexicon: κάλαμος / ὑγεία
  rationale: La tradición del POB interpreta aquí un conducto respiratorio; "tráquea" expresa mejor ese valor anatómico en español. La frase sigue la lectura funcional del texto auditado.
- source_word: ἧπαρ πρὸς θυμόν
  english_pob_choice: the liver for anger
  chosen_spanish: el hígado para ira
  alternatives_spanish:
  - el hígado para enojo
  - el hígado para furor
  lexicon: ἧπαρ / θυμός
  rationale: '"Ira" conserva el término clásico y bíblico; evita reducirlo a un simple malhumor.'
- source_word: χολὴν πρὸς πικρίαν
  english_pob_choice: the gall for bitterness
  chosen_spanish: la hiel para amargura
  alternatives_spanish:
  - la bilis para amargura
  - la hiel para amargor
  lexicon: χολή / πικρία
  rationale: '"Hiel" refleja la tradición léxica hispana y mantiene el paralelismo con la imagen de amargura.'
- source_word: σπλῆνα πρὸς γέλωτα
  english_pob_choice: the spleen for laughter
  chosen_spanish: el bazo para risa
  alternatives_spanish:
  - el bazo para la risa
  lexicon: σπλήν / γέλως
  rationale: Conserva la asociación corporal del texto sin añadir explicación interpretativa.
- source_word: νεφρούς ... ψύας εἰς δύναμιν
  english_pob_choice: the kidneys for craftiness ... the loins for strength
  chosen_spanish: los riñones para astucia ... los lomos para fuerza
  alternatives_spanish:
  - los riñones para picardía ... los lomos para vigor
  - los riñones para sagacidad ... la región lumbar para fuerza
  lexicon: νεφρός / ψύα / δύναμις
  rationale: '"Riñones" y "lomos" mantienen la corporalidad. "Astucia" sigue el tono del POB inglés para νεφρούς; "fuerza" es el equivalente directo de δύναμις.'
- source_word: πλευρὰν εἰς τὸ καθεύδειν
  english_pob_choice: the lungs for drawing in
  chosen_spanish: los pulmones para recibir aire
  alternatives_spanish:
  - los pulmones para respirar
  - el costado para dormir
  lexicon: πλευρά / καθεύδειν
  rationale: Sigo la lectura del POB inglés, que entiende un órgano respiratorio en esta línea textual difícil. "Recibir aire" evita forzar un verbo técnico demasiado moderno.
theological_decisions:
- issue: Afirmación de la bondad de la creación y su orden
  english_pob_reading: For God made all things good in their order
  chosen_spanish_reading: Porque Dios hizo todas las cosas buenas en su orden
  alternative_spanish_readings:
  - Porque Dios hizo bien todas las cosas en su orden
  - Porque Dios hizo buenas todas las cosas, en su orden
  rationale: Mantiene la lectura positiva de la creación sin convertirla en una paráfrasis filosófica. El orden se conserva como rasgo estructural del acto creador.
  doctrine_reference: Génesis 1:31; Sabiduría 11:21
- issue: Enumeración de órganos con funciones morales o afectivas
  english_pob_reading: the liver for anger, the gall for bitterness, the spleen for laughter, the kidneys for craftiness
  chosen_spanish_reading: el hígado para ira, la hiel para amargura, el bazo para risa, los riñones para astucia
  alternative_spanish_readings:
  - el hígado para enojo, la bilis para amargura, el bazo para alegría, los riñones para sagacidad
  rationale: La lista conserva la antropología simbólica del texto, sin reinterpretarla como fisiología moderna. Se mantiene la fuerza expresiva de las correspondencias corporales y afectivas.
  doctrine_reference: Antropología bíblica y literatura testamentaria judía tardía
- issue: Tratamiento de una línea textual difícil en la secuencia corporal
  english_pob_reading: the windpipe for taking in air
  chosen_spanish_reading: la tráquea para tomar aire
  alternative_spanish_readings:
  - el conducto para respirar
  - la tráquea para respirar
  rationale: La secuencia inglesa auditada identifica un órgano respiratorio donde el griego transmitido es problemático. En español se preserva esa interpretación heredada del POB, indicando su valor funcional sin sobreexplicar.
  doctrine_reference: Crítica textual y traducción de lecturas auditadas
translation_notes:
  revision_awareness: La versión anterior fue rechazada porque incluía un marcador de nota sin anclaje en el texto. En esta entrega no se incluyen notas al pie, para asegurar que el envío cumpla la validación y permanezca estrictamente alineado con la lectura auditada del POB inglés y el griego transmitido.
  spanish_consistency_notes:
  - Se usa "Dios" para Θεός y no se introduce "SEÑOR" porque aquí no aparece el tetragrámaton ni una cita directa de κύριος.
  - Se conserva "ira", "amargura" y "astucia" para mantener el paralelismo antropológico del pasaje.
  - '"Cabello" se prefiere a "pelo" por registro y dignidad literaria.'
  - No se añaden corchetes ni notas al pie en el texto español, evitando anclajes huérfanos.
