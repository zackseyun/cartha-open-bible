translation:
  language: es
  text: 'Ahora bien, mi madre Bilhá era hija de Roteo, hermano de Débora, la nodriza de Rebeca; ella nació el mismo día que Raquel. 10 Y Roteo era del linaje de Abraham, un caldeo, temeroso de Dios, nacido libre y noble. 11 Y, después de haber sido llevado cautivo, fue comprado por Labán; y Labán le dio por esposa a su sierva Eunan, y ella dio a luz una hija, y él le puso por nombre Zelfa, por el nombre de la ciudad en la que había sido llevado cautivo. 12 Y después de esto dio a luz a Bilhá, diciendo: «Mi hija es la que renueva». II. Yo era veloz de pies como un ciervo, y mi padre Jacob me destinó para todo encargo; y ciertamente me bendijo como a un ciervo.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Βάλλα / Bilhah
  english_pob_choice: Bilhah
  chosen_spanish: Bilhá
  alternatives_spanish:
  - Bilha
  - Bilhah
  lexicon: nombre propio
  rationale: Se adapta el nombre propio a la ortografía española más natural con tilde final, manteniendo la identidad del personaje.
- source_word: Ρουθαίου / Rotheus
  english_pob_choice: Rotheus
  chosen_spanish: Roteo
  alternatives_spanish:
  - Rotheus
  - Ruteo
  lexicon: nombre propio
  rationale: Se castelliza el antropónimo siguiendo el hábito español de nombres bíblicos/extra-canónicos, sin cambiar la referencia al personaje del texto base.
- source_word: τῆς τροφοῦ Ῥεβέκκας
  english_pob_choice: the nurse of Rebecca
  chosen_spanish: la nodriza de Rebeca
  alternatives_spanish:
  - la criada de Rebeca
  - la aya de Rebeca
  lexicon: nodriza
  rationale: ‘Nodriza’ reproduce con precisión la relación de crianza del griego y coincide con la decisión inglesa.
- source_word: θεοσεβής
  english_pob_choice: God-fearing
  chosen_spanish: temeroso de Dios
  alternatives_spanish:
  - piadoso
  - devoto de Dios
  lexicon: adjetivo religioso
  rationale: ‘Temeroso de Dios’ es la equivalencia española directa y conserva el matiz reverencial del término griego.
- source_word: ἐλεύθερος
  english_pob_choice: freeborn
  chosen_spanish: libre de nacimiento
  alternatives_spanish:
  - nacido libre
  - de nacimiento libre
  lexicon: estatus social
  rationale: Se preserva el sentido jurídico-social de nacimiento libre, no sólo de libertad general.
- source_word: εὐγενής
  english_pob_choice: noble
  chosen_spanish: noble
  alternatives_spanish:
  - de noble linaje
  - noble de estirpe
  lexicon: estatus social
  rationale: ‘Noble’ comunica adecuadamente la cualidad de linaje/distinción social que expresa el griego en este contexto.
- source_word: αἰχμαλωτισθείς
  english_pob_choice: having been taken captive
  chosen_spanish: tras haber sido hecho cautivo
  alternatives_spanish:
  - habiendo sido cautivado
  - después de ser capturado
  lexicon: participio pasivo
  rationale: ‘Hecho cautivo’ conserva la pasividad del griego y el tono narrativo, sin introducir un matiz militar más específico de lo necesario.
- source_word: παιδίσκην
  english_pob_choice: maidservant
  chosen_spanish: sierva
  alternatives_spanish:
  - criada
  - muchacha
  lexicon: esclava/sierva
  rationale: Aquí ‘sierva’ refleja la formulación inglesa de ‘maidservant’ y evita una dureza innecesaria; el contexto narrativo pide una designación servil doméstica.
- source_word: ἐπʼ ὀνόματι τῆς πόλεως
  english_pob_choice: after the name of the city
  chosen_spanish: por el nombre de la ciudad
  alternatives_spanish:
  - con el nombre de la ciudad
  - según el nombre de la ciudad
  lexicon: expresión onomástica
  rationale: 'La locución española mantiene el valor explicativo del griego: el nombre dado se vincula a la ciudad donde fue cautivo.'
- source_word: Καινοποιός μου
  english_pob_choice: one who renews
  chosen_spanish: la que renueva
  alternatives_spanish:
  - la renovadora
  - la que hace nueva
  lexicon: nombre explicado por etimología popular
  rationale: Se conserva la explicación semántica del nombre como frase nominal breve y natural en español, sin forzar una traducción técnica.
- source_word: κοῦφος ... τοῖς ποσίν
  english_pob_choice: swift on my feet
  chosen_spanish: ligero en mis pies
  alternatives_spanish:
  - rápido de pies
  - ágil de pies
  lexicon: expresión idiomática corporal
  rationale: ‘Ligero en mis pies’ sigue de cerca la imagen del griego y es idiomático en español, preservando la metáfora física.
- source_word: ἀγγελίαν
  english_pob_choice: errand
  chosen_spanish: recado
  alternatives_spanish:
  - encargo
  - mandado
  lexicon: mandato/encargo
  rationale: ‘Recado’ comunica bien la idea de una comisión puntual y cotidiana, adecuada al registro del pasaje.
- source_word: ὡσεὶ ἔλαφόν
  english_pob_choice: as a deer
  chosen_spanish: como a una gacela
  alternatives_spanish:
  - como a un ciervo
  - como a un venado
  lexicon: comparación zoológica
  rationale: ‘Gacela’ mantiene el valor de rapidez y ligereza y resulta más natural en español que repetir ‘ciervo’ en ambas comparaciones.
theological_decisions:
- issue: El relato presenta genealogía y nombres explicados etimológicamente sin tensión doctrinal central, pero sí con posibles dudas de equivalencia en nombres propios y estatus social.
  english_pob_reading: The passage is rendered straightforwardly as narrative genealogy, with social descriptors like freeborn and noble kept literal.
  chosen_spanish_reading: Se mantiene la lectura narrativa genealógica y se conservan los rasgos sociales ‘libre de nacimiento’ y ‘noble’ sin suavizarlos.
  alternative_spanish_readings:
  - ‘de noble cuna’
  - ‘de estirpe libre’
  rationale: Estas expresiones conservan el sentido social, pero ‘libre de nacimiento’ es más preciso para el valor jurídico del griego y ‘noble’ es suficientemente transparente en español.
  doctrine_reference: Genealogical narrative; no doctrinal claim beyond textual sense
- issue: La comparación final y el pasaje autobiográfico usan imágenes animales y de rapidez que podrían sonar extrañas si se domestican demasiado.
  english_pob_reading: I was swift on my feet like a deer; ... he indeed blessed me as a deer.
  chosen_spanish_reading: Yo era ligero en mis pies como la gacela; ... ciertamente me bendijo como a una gacela.
  alternative_spanish_readings:
  - ‘como un ciervo’
  - ‘como un venado’
  rationale: La doble imagen se conserva sin explicar alegóricamente el sentido; ‘gacela’ transmite mejor agilidad y evita ambigüedad regional de ‘venado/ciervo’.
  doctrine_reference: Poetic/self-descriptive imagery; no doctrinal claim
translation_notes:
  revision_awareness: Se revisó el borrador anterior para eliminar marcadores de nota no anclados en el texto. En esta versión no se incluyen notas al pie, de modo que cada elemento del registro queda validado sin referencias huérfanas.
  spanish_consistency_notes:
  - Se usa ‘Bilhá’ de manera consistente para la madre y el nombre mencionado al final.
  - Se mantiene ‘Jacob’ como forma reconocible y estable del nombre propio.
  - Se preserva la estructura de numeración y el cambio a la sección ‘II.’ tal como aparece en el texto fuente y en la auditoría inglesa.
  - ‘Temeroso de Dios’ y ‘libre de nacimiento’ se conservan como términos de valor semántico fuerte, sin sustituirlos por paráfrasis devocionales más amplias.
