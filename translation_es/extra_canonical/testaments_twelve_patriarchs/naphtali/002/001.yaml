revisions:
- from: 'Ahora bien, mi madre Bilhá era hija de Roteo, hermano de Débora, la nodriza de Rebeca; ella nació el mismo día que Raquel. 10 Y Rotéo era de la línea de Abraham, un caldeo, temeroso de Dios, libre de nacimiento y noble. 11 Y, tras haber sido hecho cautivo, fue comprado por Labán; y Labán le dio por esposa a su sierva Eunan, la cual dio a luz una hija, y llamó su nombre Zelfa, por el nombre de la ciudad en la que había sido hecho cautivo. 12 Y después de esto dio a luz a Bilhá, diciendo: “Mi hija es la que renueva.” II. Yo era ligero en mis pies como la gacela, y mi padre Jacob me puso para todo recado; y ciertamente me bendijo como a una gacela.'
  to: 'Ahora bien, mi madre Bilhá era hija de Roteo, hermano de Débora, la nodriza de Rebeca; ella nació el mismo día que Raquel. 10 Y Roteo era del linaje de Abraham, un caldeo, temeroso de Dios, nacido libre y noble. 11 Y, después de haber sido llevado cautivo, fue comprado por Labán; y Labán le dio por esposa a su sierva Eunan, y ella dio a luz una hija, y él le puso por nombre Zelfa, por el nombre de la ciudad en la que había sido llevado cautivo. 12 Y después de esto dio a luz a Bilhá, diciendo: «Mi hija es la que renueva». II. Yo era veloz de pies como un ciervo, y mi padre Jacob me destinó para todo encargo; y ciertamente me bendijo como a un ciervo.'
  rationale: Se corrige la inconsistencia del nombre «Roteo/Rotéo», se mejora la naturalidad del español en varios giros sin alterar el sentido, y se alinea la imagen animal con ἔλαφος / «deer» mediante «ciervo». También se eleva ligeramente el registro con «encargo» y «nacido libre».
