id: T12P.NAP.2.2
reference: Testament of Naphtali 2:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 2. Καθὼς⁹ γὰρ *οἶδεν ὁ κεραμεὺς¹⁰ τὸ σκεῦος πόσον χωρεῖ, καὶ πρὸς αὐτὸ¹¹ φέρει τὸν¹² πηλόν, οὕτω¹³ καὶ ὁ Κύριος πρὸς ὁμοίωσιν τοῦ πνεύματος¹⁴ ποιεῖ¹⁵ τὸ σῶμα, καὶ πρὸς τὴν δύναμιν τοῦ σώματος¹⁶ *τὸ πνεῦμα ἐπιτίθησιν¹⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/002/002.yaml
  text: For just as the potter knows how much the vessel can hold, and according to that brings the clay for it, so also the Lord, according to the likeness of the spirit, makes the body, and according to the body's capacity places the spirit in it.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:15Z'
    unchanged: false
    changes_summary: Replaced 'for the work' with 'for it' to reflect the Greek more directly and avoid adding an idea not in the source; simplified 'within it' to 'in it' for a slightly more formal, literal rendering.
translation:
  language: es
  text: Porque así como el alfarero sabe cuánto puede contener el vaso, y según eso le lleva la arcilla, así también el Señor, conforme a la semejanza del espíritu, hace el cuerpo, y conforme a la capacidad del cuerpo pone en él el espíritu.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κεραμεύς / potter
  english_pob_choice: potter
  chosen_spanish: alfarero
  alternatives_spanish:
  - ollero
  - ceramista
  lexicon: κεραμεύς
  rationale: «Alfarero» es el término español natural y tradicional para el oficio de modelar vasijas con barro; conserva la imagen artesanal del pasaje sin introducir un tecnicismo moderno innecesario.
- source_word: σκεῦος / vessel
  english_pob_choice: vessel
  chosen_spanish: vaso
  alternatives_spanish:
  - vasija
  - recipiente
  lexicon: σκεῦος
  rationale: En este símil, «vaso» funciona en español como recipiente o vasija; mantiene la amplitud del término sin restringirlo a un tipo moderno de contenedor.
- source_word: πηλός / clay
  english_pob_choice: clay
  chosen_spanish: arcilla
  alternatives_spanish:
  - barro
  - lodo
  lexicon: πηλός
  rationale: «Arcilla» reproduce bien el material de alfarería y suena natural en español bíblico contemporáneo; «barro» también sería posible, pero puede sonar más genérico o más terrenal que el contexto artesanal requiere.
- source_word: Κύριος / Lord
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: Κύριος
  rationale: Aquí el griego usa κύριος; en esta obra, el equivalente español más directo y reverente es «Señor». No se expande a «Yahvé» porque el testimonio griego no explicita el nombre divino en esta frase.
- source_word: ὁμοίωσις τοῦ πνεύματος
  english_pob_choice: according to the likeness of the spirit
  chosen_spanish: conforme a la semejanza del espíritu
  alternatives_spanish:
  - según la semejanza del espíritu
  - de acuerdo con la semejanza del espíritu
  lexicon: ὁμοίωσις
  rationale: «Conforme a» conserva el valor normativo/ajustado de la relación y evita volverla una simple comparación ornamental. «Semejanza del espíritu» mantiene la tensión entre forma/analogía y el término espiritual sin explicarlo en exceso.
- source_word: ποιεῖ τὸ σῶμα
  english_pob_choice: makes the body
  chosen_spanish: hace el cuerpo
  alternatives_spanish:
  - forma el cuerpo
  - crea el cuerpo
  lexicon: ποιέω
  rationale: «Hace» corresponde bien al griego ποιεῖ y preserva la sencillez del original. «Forma» sería interpretativamente aceptable, pero «hace» mantiene mejor la estructura verbal directa del texto.
- source_word: δύναμιν τοῦ σώματος
  english_pob_choice: the body's capacity
  chosen_spanish: la capacidad del cuerpo
  alternatives_spanish:
  - la fuerza del cuerpo
  - la potencia del cuerpo
  lexicon: δύναμις
  rationale: La POB inglesa entendió δύναμις aquí como capacidad/aptitud de contención, no como mera fuerza física. «Capacidad del cuerpo» comunica esa idea y se ajusta al paralelismo con el vaso que puede contener algo.
- source_word: ἐπιτίθησιν τὸ πνεῦμα
  english_pob_choice: places the spirit in it
  chosen_spanish: pone en él el espíritu
  alternatives_spanish:
  - coloca el espíritu en él
  - le pone el espíritu
  lexicon: ἐπιτίθημι
  rationale: «Pone en él» es directo, claro y cercano al griego y a la revisión inglesa más reciente («in it»). Evita agregar matices de interioridad que el texto no especifica.
theological_decisions:
- issue: Relación entre espíritu y cuerpo en la creación humana
  english_pob_reading: according to the likeness of the spirit ... according to the body's capacity places the spirit in it
  chosen_spanish_reading: conforme a la semejanza del espíritu ... conforme a la capacidad del cuerpo pone en él el espíritu
  alternative_spanish_readings:
  - según la semejanza del espíritu ... según la capacidad del cuerpo coloca el espíritu en él
  - de acuerdo con la semejanza del espíritu ... y según la capacidad del cuerpo pone el espíritu en él
  rationale: 'Se mantiene el paralelismo antropológico del texto: el cuerpo es hecho en correspondencia con una realidad espiritual, y el espíritu es asignado al cuerpo según su capacidad. No se suaviza la tensión entre ambas expresiones ni se transforma en una afirmación meramente moral o alegórica.'
  doctrine_reference: Antropología bíblica / relación cuerpo-espíritu
- issue: Uso del título divino κύριος en un contexto no explícitamente tetragramático
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - Dios
  rationale: La fuente griega da κύριος sin marca explícita del nombre propio divino. En español, «Señor» conserva la referencia reverente y sigue de cerca el texto base sin imponer una identificación más específica que no esté apoyada directamente por este pasaje.
  doctrine_reference: Nombre divino y reverencia textual
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que corrigió una adición interpretativa indebida («for the work») y prefirió «in it» frente a «within it». Por eso el español evita cualquier expansión causal o funcional ajena al griego y usa una formulación simple («le lleva la arcilla», «pone en él el espíritu») que sigue de cerca el sentido auditable del texto.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος, coherente con el valor reverente del pasaje y con la práctica española habitual cuando no hay una instrucción explícita de restaurar el nombre divino en este contexto.
  - Se eligió «espíritu» en minúscula porque aquí se refiere al espíritu humano en el paralelismo antropológico, no al Espíritu Santo.
  - «Capacidad» traduce δύναμις en su sentido de aptitud de contener, evitando una lectura exclusivamente energética o muscular.
  - El orden «pone en él el espíritu» conserva la relación inmediata entre el cuerpo y aquello que recibe, sin añadir interioridad interpretativa.
