source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 9. Οὕτως⁷⁶ ⌜οὖν⌝ *ἔστωσαν, τέκνα μου, πάντα τὰ ἔργα ὑμῶν ἐν τάξει εἰς ἀγαθόν⁷⁷ ἐν φόβῳ Θεοῦ, καὶ μηδὲν ἄτακτον ποιήσητε⁷⁸ ἐν καταφρονήσει, μηδὲ⁷⁹ ἔξω⁸⁰ *καιροῦ αὐτοῦ⁸¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/002/009.yaml
  text: So then, my children, let all your works be in order for good in the fear of God, and do nothing disorderly in contempt, nor outside its proper time.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:15Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Así pues, hijos míos, que todas vuestras obras estén en orden para el bien, en el temor de Dios, y no hagan nada desordenado con desprecio, ni fuera de su debido tiempo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔστωσαν
  english_pob_choice: let ... be
  chosen_spanish: que ... estén
  alternatives_spanish:
  - que ... sean
  - permanezcan
  lexicon: ἔστωσαν
  rationale: El imperativo de deseo/orden se expresa naturalmente en español con «que ... estén», conservando el matiz de exhortación sin forzar una construcción más literal y menos idiomática.
- source_word: πάντα τὰ ἔργα ὑμῶν
  english_pob_choice: all your works
  chosen_spanish: todas vuestras obras
  alternatives_spanish:
  - todas sus obras
  - todos sus hechos
  lexicon: ἔργα
  rationale: «Obras» mantiene el valor amplio de acciones o conductas. Se usa la segunda persona plural reverente para un registro bíblico y comunitario coherente con el texto.
- source_word: ἐν τάξει
  english_pob_choice: in order
  chosen_spanish: en orden
  alternatives_spanish:
  - ordenadamente
  - con orden
  lexicon: τάξις
  rationale: «En orden» reproduce bien la idea de disposición adecuada, sin introducir una lectura demasiado técnica o administrativa.
- source_word: εἰς ἀγαθόν
  english_pob_choice: for good
  chosen_spanish: para el bien
  alternatives_spanish:
  - para bien
  - hacia el bien
  lexicon: ἀγαθός
  rationale: La expresión apunta a finalidad benéfica; «para el bien» comunica la orientación moral del consejo con claridad en español.
- source_word: ἐν φόβῳ Θεοῦ
  english_pob_choice: in the fear of God
  chosen_spanish: en el temor de Dios
  alternatives_spanish:
  - con temor de Dios
  - en reverencia a Dios
  lexicon: φόβος / Θεός
  rationale: Se conserva la fórmula bíblica tradicional «temor de Dios», que puede abarcar reverencia y seriedad religiosa sin perder el peso del término.
- source_word: ἄτακτον
  english_pob_choice: disorderly
  chosen_spanish: desordenado
  alternatives_spanish:
  - fuera de orden
  - indisciplinado
  lexicon: ἄτακτος
  rationale: «Desordenado» es la correspondencia más directa y clara en español para el comportamiento que no sigue el orden debido.
- source_word: καταφρονήσει
  english_pob_choice: in contempt
  chosen_spanish: con desprecio
  alternatives_spanish:
  - en desprecio
  - despreciando
  lexicon: καταφρονέω / καταφρόνησις
  rationale: La noción de actuar «con desprecio» conserva el matiz de menosprecio del griego y enlaza naturalmente con la conducta desordenada.
- source_word: ἔξω ... καιροῦ αὐτοῦ
  english_pob_choice: outside its proper time
  chosen_spanish: fuera de su debido tiempo
  alternatives_spanish:
  - fuera de su tiempo oportuno
  - antes de tiempo
  lexicon: καιρός
  rationale: «Debido tiempo» conserva la idea de tiempo apropiado o oportuno, evitando una reducción a mera cronología y manteniendo la fuerza normativa del pasaje.
theological_decisions:
- issue: La relación entre orden moral y temor de Dios
  english_pob_reading: all your works be in order for good in the fear of God
  chosen_spanish_reading: que todas vuestras obras estén en orden para el bien, en el temor de Dios
  alternative_spanish_readings:
  - que todas vuestras obras estén ordenadas para el bien, con temor de Dios
  - que todas vuestras obras se hagan en orden para el bien, en reverencia a Dios
  rationale: El texto une orden ético con piedad; en español se preserva esa unión sin suavizar el peso exhortativo del «temor de Dios».
  doctrine_reference: Sabiduría ética y piedad reverente en la conducta
- issue: La prohibición de actuar fuera del momento adecuado
  english_pob_reading: nor outside its proper time
  chosen_spanish_reading: ni fuera de su debido tiempo
  alternative_spanish_readings:
  - ni fuera de tiempo
  - ni antes de tiempo
  rationale: 'La versión conserva la tensión entre orden y oportunidad: no solo importa qué se hace, sino también cuándo se hace.'
  doctrine_reference: Disciplina moral y discernimiento del kairos
translation_notes:
  revision_awareness: La revisión más reciente indicó que el texto inglés quedó sin cambios; no hubo variaciones textuales o de sentido que obligaran a ajustar la lectura base. Por eso la versión española sigue de cerca el testimonio griego de Charles 1908 y el sentido ya estabilizado en el POB inglés.
  spanish_consistency_notes:
  - Se mantiene «Dios» para Θεός según el estándar del proyecto.
  - Se conserva «obras» para ἔργα por su amplitud semántica en este contexto.
  - No se introduce ninguna nota al pie porque el griego y el inglés POB no presentan aquí una variante textual o teológica que requiera aclaración adicional.
