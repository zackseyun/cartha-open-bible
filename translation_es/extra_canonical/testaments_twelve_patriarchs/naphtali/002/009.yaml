- from: Así pues, hijos míos, que todas vuestras obras estén en orden para el bien, en el temor de Dios, y no hagan nada desordenado con desprecio, ni fuera de su debido tiempo.
  to: Así pues, hijos míos, que todas vuestras obras estén en orden para el bien, en el temor de Dios, y no hagáis nada desordenado con desprecio, ni fuera de su debido tiempo.
  rationale: Se corrige la persona verbal para que concuerde con «vuestras» y con el imperativo/exhortación del griego, preservando por lo demás la formulación fiel ya presente en el borrador.
