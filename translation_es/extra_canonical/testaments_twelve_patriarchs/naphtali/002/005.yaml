base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/002/005.yaml
  text: For there is no creation and no thought that the Lord does not know; for he created all things, and he created man in his own image.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:16Z'
    unchanged: false
    changes_summary: Replaced 'purpose of his creation' with 'creation and no thought' to reflect πλάσμα and πᾶσα ἔννοια more directly; restored the broader 'all things' for πάντα; rendered ὁ ἄνθρωπον as 'man' rather than 'every human being' for closer lexical accuracy and consistency with the singular.
translation:
  language: es
  text: Porque no hay creación ni pensamiento que Yahvé no conozca; pues él creó todas las cosas, y creó al hombre[a] a su propia imagen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El hombre» sigue la lectura singular de la revisión inglesa y del testimonio griego transmitido; puede entenderse aquí como el ser humano en singular representativo.
    reason: alternative_reading
lexical_decisions:
- source_word: πλάσμα
  english_pob_choice: creation
  chosen_spanish: creación
  alternatives_spanish:
  - criatura
  - obra creada
  lexicon: no inventado
  rationale: πλάσμα nombra lo creado o una cosa creada. «Creación» conserva la amplitud del inglés POB y suena natural en español, sin reducirlo a una sola criatura individual. «Criatura» enfatizaría más el ser creado que el acto/realidad de crear.
- source_word: ἔννοια
  english_pob_choice: thought
  chosen_spanish: pensamiento
  alternatives_spanish:
  - intención
  - idea
  lexicon: no inventado
  rationale: El contexto enlaza lo conocido por Yahvé con lo interior de la mente. «Pensamiento» comunica bien la amplitud cognitiva sin imponer una lectura más estrecha como «intención».
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: no inventado
  rationale: Según la norma del proyecto, el nombre divino se explicita como «Yahvé» en el texto principal. Aquí el griego κύριος corresponde al nombre divino del trasfondo, no a un mero título humano.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo lo creado
  lexicon: no inventado
  rationale: La revisión inglesa restauró el sentido amplio de πάντα. «Todas las cosas» conserva esa amplitud y evita restringir indebidamente el alcance a seres humanos.
- source_word: ὁ ἄνθρωπον
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el ser humano
  - la humanidad
  lexicon: no inventado
  rationale: Aunque la forma griega es irregular en el testimonio transmitido, la lectura semántica es singular. «El hombre» sigue de cerca la decisión inglesa revisada y preserva la referencia singular sin expandirla más allá del dato textual.
- source_word: κατʼ εἰκόνα ἑαυτοῦ
  english_pob_choice: in his own image
  chosen_spanish: a su propia imagen
  alternatives_spanish:
  - conforme a su propia imagen
  - según su propia imagen
  lexicon: no inventado
  rationale: «A su propia imagen» reproduce fielmente la relación de semejanza personal del original y mantiene la formulación bíblica clara en español.
theological_decisions:
- issue: Alcance de πάντα
  english_pob_reading: he created all things
  chosen_spanish_reading: él creó todas las cosas
  alternative_spanish_readings:
  - él creó todo
  - él creó toda criatura
  rationale: La revisión inglesa señaló que πάντα debe leerse en sentido amplio, no limitado a la humanidad. El español conserva esa universalidad sin añadir categorías doctrinales ajenas al texto.
  doctrine_reference: creación universal
- issue: Nombre divino en κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: En este proyecto, el nombre divino no se enmascara como título genérico cuando el trasfondo apunta al nombre de pacto. Eso hace explícita la continuidad con el hebreo subyacente que la tradición griega remite.
  doctrine_reference: tetragrámaton / nombre divino
- issue: Singular de ὁ ἄνθρωπον
  english_pob_reading: he created man
  chosen_spanish_reading: creó al hombre
  alternative_spanish_readings:
  - creó al ser humano
  - creó a la humanidad
  rationale: La revisión inglesa ya descartó una paráfrasis pluralizada («every human being») y volvió al singular. El español respeta esa singularidad, que es parte de la forma transmitida.
  doctrine_reference: imago Dei
translation_notes:
  revision_awareness: 'La versión inglesa fue revisada desde una paráfrasis interpretativa («purpose of his creation», «every human being») hacia una formulación más cercana al griego: «no creation and no thought», «all things», «man». La presente traducción española sigue esa revisión y evita reintroducir la paráfrasis descartada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la terminología por defecto del proyecto para κύριος cuando remite al nombre divino.
  - Se usa «creación» y «pensamiento» para reflejar la doble serie del griego sin fusionarlas en una sola idea.
  - Se conserva el singular «el hombre» por fidelidad al testimonio transmitido y a la revisión inglesa.
  - 'La sintaxis española busca ser natural sin perder la estructura causal del original: «Porque... pues...».'
