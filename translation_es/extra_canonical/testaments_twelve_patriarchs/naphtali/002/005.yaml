  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 5. Ὅτι οὐκ ἔστι πλάσμα³³ καὶ πᾶσα ἔννοια ἣν Γοὐκ¹ ἔγνω Κύριος· *πάντα γὰρ³⁴ *ὁ ἄνθρωπον³⁵ ἔκτισεν κατʼ εἰκόνα ἑαυτοῦ³⁶.
