id: T12P.NAP.2.4
reference: Testament of Naphtali 2:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 4. Καὶ καθὼς²⁵ οἶδεν²⁶ ὁ κεραμεὺς ἑνὸς ἑκάστου τὴν χρῆσιν †ὡς²⁷ ἱκανή²⁸, οὕτω²⁹ καὶ ὁ Κύριος οἶδε τὸ σῶμα, ἕως τίνος διαρκέσει ἐν *τῷ ἀγαθῷ³⁰, καὶ πότε ἔρχεται³¹ *ἐν κακῷ³².
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/002/004.yaml
  text: And just as the potter knows the use of each one, as it is fit, so also the Lord knows the body, how long it will endure in good, and when it comes into evil.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:16Z'
    unchanged: false
    changes_summary: Replaced 'each vessel' with 'each one' to reflect the Greek more closely without adding a noun not in the text; simplified 'how much it is fit for' to 'as it is fit' to better match the source; adjusted punctuation for smoother formal English.
translation:
  language: es
  text: Y así como el alfarero sabe el uso de cada uno, según le es conveniente, así también el Señor sabe del cuerpo cuánto ha de durar en lo bueno, y cuándo llega a lo malo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ κεραμεύς
  english_pob_choice: the potter
  chosen_spanish: el alfarero
  alternatives_spanish:
  - el ceramista
  - el potero
  lexicon: κεραμεύς
  rationale: En español, 'alfarero' es el término natural y tradicional para quien modela vasijas de barro; mantiene con claridad la imagen artesanal del griego y no introduce tecnicismos innecesarios.
- source_word: τὴν χρῆσιν
  english_pob_choice: the use
  chosen_spanish: el uso
  alternatives_spanish:
  - la función
  - el empleo
  lexicon: χρῆσις
  rationale: '''Uso'' reproduce bien la idea de finalidad o aprovechamiento de cada uno sin desplazar el sentido hacia una interpretación demasiado abstracta.'
- source_word: ἑνὸς ἑκάστου
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada vasija
  - cada cosa
  lexicon: ἕκαστος
  rationale: Sigo la revisión inglesa que quitó 'vessel' para no añadir un sustantivo no presente en el griego. 'Cada uno' conserva la referencia distributiva general del original.
- source_word: ὡς ἱκανή
  english_pob_choice: as it is fit
  chosen_spanish: según le es conveniente
  alternatives_spanish:
  - como conviene
  - en la medida conveniente
  lexicon: ἱκανός
  rationale: El griego comunica adecuación o suficiencia. 'Según le es conveniente' expresa esa medida apta o adecuada sin forzar una glosa excesiva.
- source_word: ὁ Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Soberano
  lexicon: κύριος
  rationale: Aunque el proyecto normalmente usa 'Yahvé' para el nombre divino, aquí el griego dice κύριος en una formulación sapiencial/genérica y la referencia al Señor como título es la opción más directa y natural en español.
- source_word: τὸ σῶμα
  english_pob_choice: the body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - el cuerpo humano
  - la carne
  lexicon: σῶμα
  rationale: '''Cuerpo'' es la correspondencia normal y preserva la concreción antropológica del texto sin introducir una paráfrasis teológica.'
- source_word: ἐν τῷ ἀγαθῷ
  english_pob_choice: in good
  chosen_spanish: en lo bueno
  alternatives_spanish:
  - en el bien
  - en el estado bueno
  lexicon: ἀγαθός
  rationale: La construcción griega es sustantivada; 'en lo bueno' conserva ese valor abstracto y suena natural en español.
- source_word: ἐν κακῷ
  english_pob_choice: into evil
  chosen_spanish: a lo malo
  alternatives_spanish:
  - en el mal
  - hacia el mal
  lexicon: κακός
  rationale: El giro griego indica transición o llegada a una condición negativa. 'A lo malo' preserva esa idea de entrada o dirección sin absolutizar 'mal' como sustantivo técnico.
theological_decisions:
- issue: Título divino κύριος en una sentencia sobre providencia y conocimiento de Dios
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - Dios
  rationale: No hay una señal textual explícita que obligue a sustituir el título por el nombre propio. Mantener 'el Señor' sigue el audit trail inglés y respeta el título reverencial del griego en este contexto.
  doctrine_reference: Providencia divina y conocimiento soberano de Dios sobre la criatura
- issue: 'Destino moral del cuerpo: permanencia en lo bueno y llegada a lo malo'
  english_pob_reading: how long it will endure in good, and when it comes into evil
  chosen_spanish_reading: cuánto ha de durar en lo bueno, y cuándo llega a lo malo
  alternative_spanish_readings:
  - cuánto permanecerá en lo bueno, y cuándo caerá en el mal
  - cuánto durará en el bien, y cuándo entrará en el mal
  rationale: La formulación conserva la tensión del original entre duración, cambio de estado y eventual entrada en una condición adversa. Evito suavizar 'evil' a una abstracción moral menos concreta.
  doctrine_reference: Fragilidad humana y providencia frente al bien y al mal
- issue: Relación entre 'uso' y 'cada uno' sin añadir 'vasija'
  english_pob_reading: the use of each one
  chosen_spanish_reading: el uso de cada uno
  alternative_spanish_readings:
  - el uso de cada vasija
  - la función de cada uno
  rationale: La revisión inglesa eliminó 'vessel' por fidelidad al griego. La traducción española sigue ese ajuste para no reintroducir una imagen no sustentada por el texto base.
  doctrine_reference: Fidelidad textual y evitación de ampliaciones no atestiguadas
translation_notes:
  revision_awareness: 'La versión inglesa revisada corrigió ''each vessel'' a ''each one'' para reflejar mejor ἑνὸς ἑκάστου, y simplificó la cláusula de capacidad a ''as it is fit''. La propuesta española sigue esa revisión: evita introducir ''vasija'', conserva una noción de adecuación con ''según le es conveniente'', y mantiene la estructura paralela del original griego.'
  spanish_consistency_notes:
  - Se usa 'Señor' como título reverencial, en consonancia con el audit trail inglés y el griego κύριος.
  - Se evita 'vasija' porque el ajuste inglés señala que el griego no la expresa en este punto.
  - '''En lo bueno'' y ''a lo malo'' conservan la abstracción moral del griego sin volverla una paráfrasis.'
  - El tono busca ser formal y publicable, sin depender de fórmulas tradicionales que oculten el sentido del original.
