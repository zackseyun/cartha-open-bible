translation:
  language: es
  text: 'Copia del testamento[a] de Neftalí, el octavo hijo de Jacob y de Bala, que ordenó al tiempo de su partida, en el año ciento treinta de su vida.


    2 Cuando sus hijos se habían reunido en el séptimo mes, el primer día del mes, hizo para ellos un banquete. 3 Y por la mañana, después de haber despertado, les dijo: «Estoy muriendo»; pero no le creyeron. 4 Y, mientras bendecía y glorificaba al Señor, se fortaleció y dijo: «Después del banquete de ayer, mi carne[b] murió».


    5 Entonces comenzó a hablar: «Oíd, hijos míos, hijos de Neftalí; oíd las palabras de vuestro padre. 6 Yo nací de Bala, porque Raquel actuó con astucia y dio a Bala a Jacob en su lugar; y Bala concibió y me dio a luz sobre las rodillas de Raquel, y por esta razón llamó mi nombre Neftalí. 7 Porque Raquel me amó mucho, ya que nací sobre sus rodillas; y, mientras yo aún era un niño tierno, me besaba, diciendo: “Concédeme un hermano de mi propio vientre, como tú”. 8 Por eso también José fue semejante a mí en todo, conforme a las oraciones[c] de Raquel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'testamento', un título literario de despedida patriarcal y no 'alianza' en sentido bíblico amplio.
    reason: source_note
  - marker: b
    text: '''Carne'' refleja σάρξ de manera literal; en este contexto se refiere al colapso corporal ante la muerte, no a una metáfora moral.'
    reason: theological_note
  - marker: c
    text: También puede entenderse como 'según los deseos' o 'según los votos' de Raquel; el griego εὐχαῖς admite varios matices relacionados.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαθήκη
  english_pob_choice: testament
  chosen_spanish: testamento
  alternatives_spanish:
  - pacto
  - alianza
  - última disposición
  lexicon: LSJ
  rationale: En esta obra literaria, el término funciona como el título de una despedida patriarcal y no como 'alianza' en sentido bíblico más amplio. 'Testamento' conserva el género y la solemnidad del encabezado.
- source_word: ἐν καιρῷ τῆς ἐξόδου αὐτοῦ
  english_pob_choice: at the time of his departure
  chosen_spanish: al tiempo de su partida
  alternatives_spanish:
  - al tiempo de su muerte
  - al final de su vida
  lexicon: LSJ
  rationale: '''Partida'' mantiene el eufemismo solemne de ἔξοδος y deja que el contexto de muerte emerja en los versículos siguientes.'
- source_word: δεῖπνον
  english_pob_choice: feast
  chosen_spanish: banquete
  alternatives_spanish:
  - comida
  - cena
  - festín
  lexicon: LSJ
  rationale: El contexto es una reunión formal y final con sus hijos; 'banquete' comunica mejor ese carácter que una comida ordinaria.
- source_word: ἐξυπνισθῆναι
  english_pob_choice: after he awoke
  chosen_spanish: después de haber despertado
  alternatives_spanish:
  - después de ser despertado
  - al despertar
  lexicon: LSJ
  rationale: La forma verbal pide una expresión natural en español que preserve la secuencia narrativa sin añadir información.
- source_word: ἐκραταιώθη
  english_pob_choice: he grew strong
  chosen_spanish: se fortaleció
  alternatives_spanish:
  - cobró fuerzas
  - fue fortalecido
  lexicon: LSJ
  rationale: El verbo indica un repunte de fuerzas antes de hablar; 'se fortaleció' conserva esa recuperación física de manera fluida.
- source_word: ἀπέθανεν ἡ σάρξ μου
  english_pob_choice: my flesh died
  chosen_spanish: mi carne murió
  alternatives_spanish:
  - mi cuerpo murió
  - mi carne expiró
  lexicon: LSJ
  rationale: Se conserva 'carne' para reflejar σάρξ de forma literal, sin convertirlo en una metáfora ajena al contexto corporal de la muerte inminente.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - mis niños
  lexicon: LSJ
  rationale: El vocativo es afectivo y paternal; 'hijos míos' suena natural en español y mantiene la cercanía del llamamiento.
- source_word: πανουργίᾳ
  english_pob_choice: with cunning
  chosen_spanish: con astucia
  alternatives_spanish:
  - con engaño
  - con maña
  lexicon: LSJ
  rationale: El término tiene un matiz moralmente cargado; 'astucia' conserva la tensión sin intensificarlo hasta una acusación más explícita de fraude.
- source_word: ἀντʼ αὐτῆς
  english_pob_choice: in her place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de ella
  - como sustituta de ella
  lexicon: LSJ
  rationale: Es la relación simple y directa del intercambio de Bilha por Raquel; 'en su lugar' es claro y fiel.
- source_word: ἐπὶ τῶν γονάτων
  english_pob_choice: upon Rachel’s knees
  chosen_spanish: sobre las rodillas
  alternatives_spanish:
  - en las rodillas
  - a las rodillas
  lexicon: LSJ
  rationale: La frase conserva la imagen concreta del nacimiento/adopción simbólica y se deja explicar con una nota cultural.
- source_word: ἁπαλὸν ὄντα
  english_pob_choice: still a tender child
  chosen_spanish: aún era un niño tierno
  alternatives_spanish:
  - era todavía pequeño
  - seguía siendo un niño delicado
  lexicon: LSJ
  rationale: La expresión apunta a la primera infancia y al afecto de la escena; 'niño tierno' transmite ambos aspectos sin sonar arcaico.
- source_word: Δοίη μοι ἀδελφόν
  english_pob_choice: May I be given a brother
  chosen_spanish: Concédeme un hermano
  alternatives_spanish:
  - Que me sea dado un hermano
  - Dame un hermano
  lexicon: LSJ
  rationale: La expresión es una petición desiderativa; en español, 'concédeme' reproduce bien el tono de ruego.
- source_word: κατὰ τὰς εὐχάς
  english_pob_choice: according to the prayers
  chosen_spanish: conforme a las oraciones
  alternatives_spanish:
  - según las plegarias
  - de acuerdo con los votos
  lexicon: LSJ
  rationale: La opción 'oraciones' mantiene el sentido devocional preferido por el POB en este contexto; 'conforme a' refleja la dependencia de esas súplicas.
theological_decisions:
- issue: Valor moral de la acción de Raquel al entregar a Bala/Bilhah
  english_pob_reading: Translate πανουργίᾳ with a negative edge ('with cunning') without expanding into a full moral condemnation.
  chosen_spanish_reading: Traducir con un matiz negativo moderado ('con astucia') sin añadir una condena más fuerte que el griego no explicita.
  alternative_spanish_readings:
  - con engaño
  - con prudencia
  rationale: El texto mantiene una tensión moral real; 'astucia' preserva esa ambigüedad cargada sin resolverla ni suavizarla demasiado.
  doctrine_reference: Preservar la tensión textual en vez de homogeneizarla.
- issue: Sentido de σάρξ en la declaración de muerte
  english_pob_reading: Render literally as 'flesh' in a bodily sense, with slight idiomatic support.
  chosen_spanish_reading: Traducir literalmente 'carne' como referencia corporal a la muerte próxima.
  alternative_spanish_readings:
  - cuerpo
  - mortal cuerpo
  rationale: Aquí σάρξ no funciona como categoría moral paulina, sino como referencia concreta al cuerpo mortal; 'carne' mantiene ese valor literal.
  doctrine_reference: 'DOCTRINE.md: σάρξ = carne en sentido literal / naturaleza pecaminosa solo en contextos metafóricos.'
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente en el punto de la frase sobre la muerte de la carne, usando una formulación más cercana al griego ('mi carne murió') y conservando el cambio de 'while I was still a tender child' a una construcción natural en español ('mientras yo aún era un niño tierno').
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' en los criterios del proyecto, pero aquí el manuscrito/POB inglés usa 'Lord' sin nombre divino explícito; por fidelidad al audit trail se traduce como 'Señor'.
  - Se eligió 'testamento' para conservar el género literario del texto, siguiendo la decisión inglesa auditada.
  - Se mantuvo el par 'Raquel/Bala' en español estándar; 'Bala' representa Bilhah según uso castellano habitual para la figura.
  - Se preservó 'carne' para σάρξ por la decisión teológica auditada y para evitar una paráfrasis doctrinal.
  - Se empleó 'oraciones' en vez de 'votos' porque el contexto maternal-devocional y la traducción inglesa revisada favorecen ese matiz.
