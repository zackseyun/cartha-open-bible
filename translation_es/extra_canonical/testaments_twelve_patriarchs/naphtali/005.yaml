  to: "1[5:5]. Porque en el cuadragésimo año de mi vida vi una visión en el monte de los Olivos, al oriente de Jerusalén, de que el sol y la luna estaban quietos.\n\n\n    2. Y he aquí que Isaac, el padre de mi padre, nos dijo: «Corran y tome cada uno según su fuerza; y de aquel que los tome serán el sol y la luna».\n\n\n    3. Y corrimos todos juntos, y Leví tomó el sol, y Judá, llegando primero, tomó la luna; y ambos fueron levantados con ellos.\n\n\n    4. Y mientras Leví era como el sol, he aquí, cierto joven le iba dando doce ramas de palma[5:8]; y Judá se volvió brillante como la luna, y debajo de sus pies había doce rayos.\n\n\n    5. Y los dos, Leví y Judá, corrieron y los sostuvieron firmemente.\n\n\n    6. Y he aquí, había un toro sobre la tierra, con dos grandes cuernos y las alas de un águila sobre su lomo; y aunque quisimos tomarlo, no pudimos.\n\n\n    7. Pero José vino y lo asió, y subió con él a la altura.\n\n\n    8. Y vi que yo estaba allí, y he aquí, se nos apareció una\
