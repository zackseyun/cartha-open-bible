base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/005.yaml
  text: '1[5:5]. For in the fortieth year of my life I saw a vision on the Mount of Olives, east of Jerusalem, that the sun and the moon were standing still.


    2. And behold, Isaac, the father of my father, said to us, “Run up and let each of you seize them according to his strength; and the one who takes hold of them, his shall be the sun and the moon.”


    3. And we all ran together, and Levi seized the sun, and Judah, arriving first, took hold of the moon; and both of them were lifted up with them.


    4. And while Levi was like the sun, behold, a certain young man was giving him twelve palm branches[5:8]; and Judah became bright like the moon, and beneath their feet were twelve rays.


    5. And the two, Levi and Judah, ran up and held them fast.


    6. And behold, there was a bull on the earth, having two great horns and eagle’s wings on its back; and though we wanted to seize it, we were not able.


    7. But Joseph came and seized it, and went up with it to the height.


    8. And I saw that I was there, and behold, a holy writing appeared to us, saying: “Assyrians, Medes, Persians,”'
  footnotes:
  - marker: '5:5'
    text: This sentence is textually awkward in the transmitted Greek and may be a resumptive or secondary line repeating the prominence of Levi and Judah.
    reason: textual_variant
  - marker: '5:8'
    text: The chapter breaks off after the words 'Assyrians, Medes, Persians,' in the supplied Greek witness; the translation reflects the extant text provided here.
    reason: textual_variant
