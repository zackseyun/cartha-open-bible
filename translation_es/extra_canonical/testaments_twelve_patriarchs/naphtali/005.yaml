translation:
  language: es
  text: "1[5:5]. Porque en el cuadragésimo año de mi vida vi una visión en el monte de los Olivos, al oriente de Jerusalén, de que el sol y la luna estaban quietos.\n\n\n    2. Y he aquí que Isaac, el padre de mi padre, nos dijo: «Corran y tome cada uno según su fuerza; y de aquel que los tome serán el sol y la luna».\n\n\n    3. Y corrimos todos juntos, y Leví tomó el sol, y Judá, llegando primero, tomó la luna; y ambos fueron levantados con ellos.\n\n\n    4. Y mientras Leví era como el sol, he aquí, cierto joven le iba dando doce ramas de palma[5:8]; y Judá se volvió brillante como la luna, y debajo de sus pies había doce rayos.\n\n\n    5. Y los dos, Leví y Judá, corrieron y los sostuvieron firmemente.\n\n\n    6. Y he aquí, había un toro sobre la tierra, con dos grandes cuernos y las alas de un águila sobre su lomo; y aunque quisimos tomarlo, no pudimos.\n\n\n    7. Pero José vino y lo asió, y subió con él a la altura.\n\n\n    8. Y vi que yo estaba allí, y he aquí, se nos apareció\
    \ una escritura santa, que decía: «Asirios, medos, persas,»"
  philosophy: optimal-equivalence
  footnotes:
  - marker: '5:5'
    text: La frase transmitida en griego es textualmente áspera y puede ser una línea de reanudación o secundaria que repite la prominencia de Leví y Judá; se traduce de manera directa sin armonizarla.
    reason: textual_variant
  - marker: '5:8'
    text: El pasaje se interrumpe después de «Asirios, medos, persas,» en el testimonio griego suministrado; la traducción refleja solo el texto extante aquí.
    reason: textual_variant
lexical_decisions:
- source_word: ὄραμα
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - aparición
  - sueño
  lexicon: LSJ
  rationale: ‘Visión’ es el equivalente natural y reverencial para un cuadro revelatorio en contexto testamentario-apocalíptico; ‘aparición’ o ‘sueño’ desviarían el matiz revelador.
- source_word: ἕστηκαν
  english_pob_choice: were standing still
  chosen_spanish: estaban quietos
  alternatives_spanish:
  - estaban parados
  - permanecían inmóviles
  lexicon: LSJ
  rationale: En español, ‘estaban quietos’ conserva la idea de inmovilidad en la visión sin sonar forzado; evita un calco pesado de ‘standing still’.
- source_word: Προσδραμόντες
  english_pob_choice: Run up
  chosen_spanish: Corran
  alternatives_spanish:
  - Corran hacia arriba
  - Vayan corriendo
  lexicon: LSJ
  rationale: El imperativo plural pide acción urgente; en español el complemento ‘hacia arriba’ ya está implícito por el contexto de la escena, y ‘Corran’ mantiene el impulso narrativo.
- source_word: κρατήσατε
  english_pob_choice: seize
  chosen_spanish: tome
  alternatives_spanish:
  - agarren
  - sujete
  lexicon: LSJ
  rationale: Aquí el español ‘tome’ suaviza sin borrar la fuerza competitiva del gesto; en esta construcción distributiva fluye mejor que un ‘seize’ traducido de forma demasiado violenta. El resto del pasaje conserva ‘tomó’/‘tomarlo’ para mantener consistencia narrativa.
- source_word: κατὰ δύναμιν
  english_pob_choice: according to his strength
  chosen_spanish: según su fuerza
  alternatives_spanish:
  - de acuerdo con su fuerza
  - conforme a su capacidad
  lexicon: LSJ
  rationale: ‘Según su fuerza’ expresa la distribución individual exigida por el texto y resulta claro en español actual.
- source_word: τοῦ πιάσαντος
  english_pob_choice: the one who takes hold of
  chosen_spanish: de aquel que los tome
  alternatives_spanish:
  - del que los agarre
  - del que los tome en sus manos
  lexicon: LSJ
  rationale: Se conserva la construcción relativa y la idea de posesión resultante. ‘Tome’ armoniza con el verbo del mandato y mantiene el tono narrativo.
- source_word: ἐδράμομεν πάντες ὁμοῦ
  english_pob_choice: we all ran together
  chosen_spanish: corrimos todos juntos
  alternatives_spanish:
  - corrimos todos a la vez
  - corrimos juntos
  lexicon: LSJ
  rationale: La formulación es natural, clara y conserva la simultaneidad colectiva.
- source_word: φθάσας
  english_pob_choice: arriving first
  chosen_spanish: llegando primero
  alternatives_spanish:
  - arribando primero
  - al llegar primero
  lexicon: LSJ
  rationale: ‘Llegando primero’ refleja la precedencia de Judá sin añadir explicación interpretativa.
- source_word: ὑψώθησαν
  english_pob_choice: were lifted up
  chosen_spanish: fueron levantados
  alternatives_spanish:
  - fueron alzados
  - fueron elevados
  lexicon: LSJ
  rationale: ‘Fueron levantados’ conserva la imagen espacial del texto visionario y permite el eco simbólico sin explicitarlo.
- source_word: βαΐα φοινίκων
  english_pob_choice: palm branches
  chosen_spanish: ramas de palma
  alternatives_spanish:
  - palmas
  - frondas de palma
  lexicon: LSJ
  rationale: ‘Ramas de palma’ es concreto y bíblicamente inteligible; conserva la materialidad de βαΐα φοινίκων.
- source_word: λαμπρός
  english_pob_choice: bright
  chosen_spanish: brillante
  alternatives_spanish:
  - radiante
  - resplandeciente
  lexicon: LSJ
  rationale: ‘Brillante’ reproduce el efecto visual sin exageración interpretativa.
- source_word: ἀκτῖνες
  english_pob_choice: rays
  chosen_spanish: rayos
  alternatives_spanish:
  - resplandores
  - haces
  lexicon: LSJ
  rationale: ‘Rayos’ es el término más natural para el paralelo solar-lunar de la visión.
- source_word: ταῦρος
  english_pob_choice: bull
  chosen_spanish: toro
  alternatives_spanish:
  - buey
  lexicon: LSJ
  rationale: ‘Toro’ preserva la fuerza simbólica del animal en español y coincide con el valor imaginativo del griego.
- source_word: κατέλαβεν
  english_pob_choice: took hold of
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo agarró
  - se apoderó de él
  lexicon: LSJ
  rationale: ‘Lo tomó’ mantiene la acción sin intensificarla innecesariamente; en contexto visionario es suficientemente fuerte y fluido.
- source_word: συνανῆλθεν αὐτῷ εἰς τὸ ὕψος
  english_pob_choice: went up with it into the height
  chosen_spanish: subió con él a la altura
  alternatives_spanish:
  - subió con él a lo alto
  - ascendió con él a la altura
  lexicon: LSJ
  rationale: ‘A la altura’ conserva el movimiento ascendente y la sobriedad del pasaje, sin sobrecargar con un léxico más solemne de lo que exige el griego.
- source_word: γραφὴ ἁγία
  english_pob_choice: a holy writing
  chosen_spanish: un escrito santo
  alternatives_spanish:
  - una escritura santa
  - un texto santo
  lexicon: LSJ
  rationale: ‘Escrito santo’ preserva la indefinición del griego y evita importar de inmediato una noción canónica más técnica como ‘Escritura’.
theological_decisions:
- issue: Valor de la visión y de sus imágenes astrales
  english_pob_reading: Translate the imagery straightforwardly without explaining its symbolism in the main text.
  chosen_spanish_reading: Traducir de manera directa la imagen del sol, la luna y el alzamiento, sin explicar su simbolismo en el cuerpo principal.
  alternative_spanish_readings:
  - Interpretar a Leví y Judá como símbolos explícitos de funciones sacerdotales y reales
  - Parafrasear la visión para hacerla mesiánica de inmediato
  rationale: El texto griego presenta la escena como visión simbólica, pero no la interpreta en este punto. La traducción debe dejar abierta esa tensión para no adelantar una lectura teológica no explicitada aquí.
  doctrine_reference: Hermenéutica literaria y respeto del género apocalíptico-testamentario
- issue: γραφὴ ἁγία
  english_pob_reading: Render as 'a holy writing' rather than 'Scripture.'
  chosen_spanish_reading: un escrito santo
  alternative_spanish_readings:
  - una Escritura santa
  - un libro sagrado
  rationale: La forma indefinida del griego y el contexto visionario favorecen una traducción igualmente indefinida. ‘Escritura’ sonaría más técnico y canónico que el dato textual disponible.
  doctrine_reference: Canon y lenguaje inspiracional; evitar sobredeterminar el estatuto del texto
- issue: V. 5 textual awkwardness / resumptive line
  english_pob_reading: This sentence is textually awkward in the transmitted Greek and may be a resumptive or secondary line repeating the prominence of Levi and Judah.
  chosen_spanish_reading: Conservar la línea de forma natural en español sin armonizarla ni eliminarla.
  alternative_spanish_readings:
  - Suprimir el versículo como duplicado
  - Reescribirlo como una frase explicativa
  rationale: Aunque el testimonio griego sea algo áspero, la traducción debe reflejar el texto transmitido y no resolver artificialmente la dificultad. ‘Y los dos... corrieron y los sostuvieron firmemente’ mantiene la repetición sin ocultarla.
  doctrine_reference: Crítica textual y transparencia editorial
translation_notes:
  revision_awareness: 'Se tomó en cuenta la última revisión inglesa, especialmente el ajuste de φθάσας a ‘arriving first’, ἐπιδίδωσιν como acción progresiva (‘was giving’), y la consistencia verbal en el cierre de la escena. En español se preservó el valor aspectual y narrativo con soluciones naturales: ‘llegando primero’, ‘le iba dando’, y una progresión verbal sobria en todo el pasaje. También se respetó la lectura final inglesa que mantiene la cláusula de la línea repetida en v. 5 y el final truncado de v. 8.'
  spanish_consistency_notes:
  - Se mantiene ‘Leví’ y ‘Judá’ como formas establecidas y transparentes en español.
  - Se usa ‘Yahvé’ como norma del proyecto solo cuando el texto la requiera explícitamente; aquí el griego dice Κύριος y la escena visionaria no exige una sustitución nominal adicional en español dentro de este pasaje.
  - Se conserva un registro narrativo sobrio y bíblico, evitando arcaísmos innecesarios.
  - ‘Tomó’/‘tomarlo’/‘lo tomó’ se usan de forma coherente para κρατέω/καταλαμβάνω sin sobretraducir la violencia del gesto.
  - ‘Escrito santo’ preserva la indefinición del original y evita cargar el texto con una categoría canónica posterior.
