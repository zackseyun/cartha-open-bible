translation:
  language: es
  text: 'Y otra vez[a], después de siete días, vi que mi padre Jacob estaba junto al mar de Amnia, y nosotros estábamos con él. Y he aquí, una nave venía navegando cerca de nosotros, con marineros y pilotos. Y escrito en la nave estaba esto: «La nave de Jacob».


    Y nuestro padre nos dijo: «Subamos a nuestra nave». Y cuando habíamos entrado, se levantó una violenta tormenta, y un torbellino de viento; y nuestro padre fue separado de nosotros, sosteniendo los timones[b]. Y nosotros, siendo sacudidos por la tempestad sobre el mar, éramos arrastrados sobre las aguas, mientras la nave era llenada y azotada por las olas, de modo que estaba por romperse.


    Pero José se fue en una barca pequeña, y nosotros fuimos separados sobre nueve tablas; y Leví y Judá estaban juntos. Y fuimos dispersados todos, hasta los confines de la tierra[c]. Pero Leví, vestido de cilicio, oraba al Señor. Y cuando cesó la tempestad, la nave llegó a tierra como en paz. Y he aquí, vino nuestro padre, y todos nos regocijamos unánimes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre del lugar «Amnia» es incierto; se conserva la forma griega/transliterada en vez de conjeturar una localización.
    reason: cultural_note
  - marker: b
    text: El griego de «κρατῶν τοὺς αὐχένας» es difícil; literalmente, αὐχένας significa «cuellos», pero el contexto náutico apunta a un mecanismo de gobierno de la nave.
    reason: textual_variant
  - marker: c
    text: La dispersión «hasta los confines de la tierra» probablemente tiene fuerza simbólica, aunque el texto la presenta como parte del sueño de Naphtalí.
    reason: cross_reference
lexical_decisions:
- source_word: Καὶ πάλιν / μετά ἡμέρας ἑπτὰ
  english_pob_choice: And again, after seven days
  chosen_spanish: Y otra vez, después de siete días
  alternatives_spanish:
  - Y de nuevo, después de siete días
  - Y otra vez, al cabo de siete días
  lexicon: LSJ
  rationale: «Otra vez» mantiene la repetición narrativa de πάλιν sin cargarla de interpretación. «Después de siete días» conserva el marco temporal literal y natural en español.
- source_word: θάλασσα Ἀμνείας
  english_pob_choice: sea of Amnia
  chosen_spanish: mar de Amnia
  alternatives_spanish:
  - mar de Amneas
  - mar amnio
  lexicon: LSJ
  rationale: Se conserva el nombre propio transliterado porque la identificación del lugar es incierta y el texto no ofrece glosa. «Mar» es la forma natural en español para θάλασσα en este contexto.
- source_word: ἁρμενίζον
  english_pob_choice: came sailing
  chosen_spanish: venía navegando
  alternatives_spanish:
  - venía navegando a vela
  - venía bajo vela
  lexicon: LSJ
  rationale: «Venía navegando» preserva el movimiento marítimo sin forzar un tecnicismo innecesario en español. La idea de desplazamiento por mar queda clara y fluida.
- source_word: κυβερνητῶν
  english_pob_choice: pilots
  chosen_spanish: pilotos
  alternatives_spanish:
  - timoneles
  - gobernantes de la nave
  lexicon: LSJ
  rationale: «Pilotos» es idiomático en español para quienes dirigen una nave y mantiene el paralelo con marineros. Evita un término demasiado técnico o arcaizante.
- source_word: ἐπεγέγραπτο
  english_pob_choice: written on
  chosen_spanish: escrito en
  alternatives_spanish:
  - inscrito en
  - llevaba escrito
  lexicon: LSJ
  rationale: La expresión reproduce la fuerza de una inscripción visible sin sobrerrepresentarla. Es natural y fiel al aviso narrativo del texto.
- source_word: χειμὼν σφοδρός
  english_pob_choice: a violent storm
  chosen_spanish: una violenta tormenta
  alternatives_spanish:
  - una tormenta feroz
  - una tempestad violenta
  lexicon: LSJ
  rationale: «Tormenta» refleja el sentido marítimo de χειμών en este pasaje, y «violenta» transmite σφοδρός con la intensidad requerida.
- source_word: λαῖλαψ ἀνέμου
  english_pob_choice: a whirlwind of wind
  chosen_spanish: un torbellino de viento
  alternatives_spanish:
  - un huracán de viento
  - una ráfaga huracanada
  lexicon: LSJ
  rationale: Se conserva la expresión enfática del griego sin reducirla a un mero «viento fuerte». «Torbellino de viento» comunica la imagen de movimiento violento y envolvente.
- source_word: ἀφίσταται
  english_pob_choice: was separated from us
  chosen_spanish: fue separado de nosotros
  alternatives_spanish:
  - se apartó de nosotros
  - se retiró de nosotros
  lexicon: BDAG
  rationale: La pasiva expresa la separación en la visión, no una simple decisión voluntaria. «Fue separado de nosotros» mantiene esa fuerza y la conexión con el motivo de dispersión.
- source_word: τοὺς αὐχένας
  english_pob_choice: the rudders
  chosen_spanish: los timones
  alternatives_spanish:
  - los remos de gobierno
  - las cañas del timón
  lexicon: LSJ
  rationale: Aunque el griego es difícil y literalmente significa «cuellos», el contexto náutico exige un elemento de gobierno de la nave. «Timones» es la opción más clara en español y conserva la incertidumbre implícita.
- source_word: χειμαζόμενοι
  english_pob_choice: being storm-tossed
  chosen_spanish: siendo sacudidos por la tempestad
  alternatives_spanish:
  - siendo zarandeados por la tempestad
  - sufriendo el embate de la tempestad
  lexicon: BDAG
  rationale: La construcción pasiva comunica sufrimiento bajo la fuerza del mar. «Sacudidos por la tempestad» es fluido y mantiene la imagen marítima.
- source_word: ἐφερόμεθα
  english_pob_choice: were driven along
  chosen_spanish: éramos arrastrados
  alternatives_spanish:
  - íbamos a la deriva
  - éramos llevados
  lexicon: LSJ
  rationale: «Éramos arrastrados» refleja la falta de control y la violencia del movimiento sobre el mar. Se conserva el aspecto continuo del verbo en la escena.
- source_word: ἐν τρικυμίαις περιρησσόμενον
  english_pob_choice: battered by the waves
  chosen_spanish: azotada por las olas
  alternatives_spanish:
  - golpeada por las olas
  - battered by las olas
  lexicon: LSJ
  rationale: La imagen compuesta de oleaje violento se expresa en español con un giro natural. «Azotada por las olas» transmite el castigo repetido del mar.
- source_word: ὥστε καὶ συντρίβεσθαι αὐτό
  english_pob_choice: so that it was about to be broken up
  chosen_spanish: de modo que estaba por romperse
  alternatives_spanish:
  - de modo que estaba a punto de quebrarse
  - hasta el punto de romperse
  lexicon: LSJ
  rationale: Se conserva el resultado amenazante sin añadir más que lo que el griego permite. «Estaba por romperse» es simple, claro y fiel.
- source_word: ἀκάτιον
  english_pob_choice: small boat
  chosen_spanish: barca pequeña
  alternatives_spanish:
  - bote pequeño
  - esquife
  lexicon: LSJ
  rationale: «Barca pequeña» es comprensible y conserva el contraste con la nave principal. Evita un tecnicismo innecesario para lectores generales.
- source_word: σανίδων
  english_pob_choice: planks
  chosen_spanish: tablas
  alternatives_spanish:
  - planchas
  - tableros
  lexicon: LSJ
  rationale: «Tablas» expresa bien los restos flotantes sobre los que quedan separados los hermanos. Es la opción más natural en español sin perder la imagen de fragmentos de madera.
- source_word: τὰ πέρατα τῆς γῆς
  english_pob_choice: the ends of the earth
  chosen_spanish: los confines de la tierra
  alternatives_spanish:
  - los extremos de la tierra
  - las partes más remotas de la tierra
  lexicon: BDAG
  rationale: «Confines de la tierra» mantiene el registro bíblico elevado de la expresión y sugiere amplitud simbólica sin explicitar más de lo que dice el texto.
- source_word: σάκκον
  english_pob_choice: sackcloth
  chosen_spanish: cilicio
  alternatives_spanish:
  - saco de penitencia
  - tela de luto
  lexicon: LSJ
  rationale: En español eclesial «cilicio» comunica el vestido de humillación y penitencia asociado al término. Se preserva así la carga religiosa tradicional del pasaje.
- source_word: ἐδέετο τοῦ Κυρίου
  english_pob_choice: prayed to the Lord
  chosen_spanish: oraba al Señor
  alternatives_spanish:
  - suplicaba al Señor
  - rogaba al Señor
  lexicon: BDAG
  rationale: «Oraba» refleja la plegaria de intercesión en un registro bíblico claro. «Señor» sigue la convención del griego Κύριος en este contexto, sin sustituirla por otra fórmula.
- source_word: ὁμοθυμαδόν
  english_pob_choice: with one accord
  chosen_spanish: unánimes
  alternatives_spanish:
  - de común acuerdo
  - con un mismo ánimo
  lexicon: BDAG
  rationale: «Unánimes» condensa la idea de unidad de ánimo y acción en un español sobrio. Mantiene el cierre coral del relato.
theological_decisions:
- issue: Nombre divino en Κυρίου
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Dios
  - el Dueño
  rationale: El texto griego usa Κυρίου, no el tetragrama. En español, «el Señor» reproduce el tratamiento reverente del POB en este contexto sin introducir una identificación más específica que la evidencia no exige.
  doctrine_reference: 'DOCTRINE.md contested terms: κύριος → Lord'
- issue: Dimensión simbólica de la dispersión
  english_pob_reading: Translate the maritime disaster and scattering straightforwardly as dream narrative without importing later interpretive explanation into the main text.
  chosen_spanish_reading: Traducir el naufragio y la dispersión como relato de sueño sin añadir una interpretación explícita en el texto principal.
  alternative_spanish_readings:
  - Explicar la escena como exilio de las tribus
  - Suavizarla como un sueño familiar genérico
  rationale: La visión tiene fuerza simbólica, pero el griego la presenta narrativamente. La traducción debe dejar esa tensión abierta y no resolverla por anticipado.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de revisión más reciente (gpt-5.4, 2026-04-23) indicado como inalterado, sin cambios pendientes en el texto base o en las decisiones auditadas.
  spanish_consistency_notes:
  - Se mantiene «Amnia» como transliteración del topónimo incierto, en línea con la cautela del expediente.
  - Se usa «Señor» para Κύριος, respetando la política del proyecto para κύριος en este tipo de contexto.
  - Se conserva el carácter visionario/narrativo del pasaje sin añadir explicación doctrinal en el cuerpo del texto.
  - Se prefieren términos marítimos claros y sobrios («nave», «pilotos», «timones», «barca pequeña») para mantener inteligibilidad sin borrar la dificultad textual.
