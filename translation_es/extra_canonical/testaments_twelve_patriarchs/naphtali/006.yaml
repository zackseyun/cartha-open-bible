base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/006.yaml
  text: 'And again[a], after seven days, I saw that my father Jacob was standing by the sea of Amnia, and we were with him. And behold, a ship came sailing by us, with sailors and pilots. And written on the ship was this: “The Ship of Jacob.”


    And our father said to us, “Come, let us go up into our ship.” And when we had entered, a violent storm arose[b], and a whirlwind of wind; and our father was separated from us, holding the rudders. And we, being storm-tossed upon the sea, were driven along over the waters, while the ship was filled and battered by the waves, so that it was about to be broken up.


    But Joseph went away on a small boat, and we were separated on nine planks; and Levi and Judah were together. And we were scattered, all of us, to the ends of the earth. But Levi, clothed in sackcloth, prayed to the Lord. And when the storm ceased, the ship reached the land as though in peace. And behold, our father came[c], and we all rejoiced with one accord.'
  footnotes:
  - marker: a
    text: The place-name 'Amnia' is uncertain in identification; the translation preserves the Greek form rather than conjecturing a location.
    reason: cultural_note
  - marker: b
    text: The Greek phrase rendered 'holding the rudders' is textually difficult; the underlying word literally means 'necks' in ordinary usage, but the context appears nautical.
    reason: textual_variant
  - marker: c
    text: The scattering 'to the ends of the earth' likely carries symbolic force for dispersion, though the text presents it as part of Naphtali's dream.
    reason: cross_reference
