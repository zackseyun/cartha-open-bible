translation:
  language: es
  text: 'Y después de haberles mandado muchas cosas tales, les rogó que trasladaran sus huesos a Hebrón y lo sepultaran con sus padres.



    2. Y, habiendo comido y bebido con alegría de alma, cubrió su rostro y murió.



    3. Y sus hijos hicieron en todo[a] lo que Naphtali su padre les había mandado.



    [Aquí comienza el Testamento de Gad, el noveno hijo de Jacob y Zilpa.]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega κατὰ πάντα indica cumplimiento completo; «en todo» resume esa totalidad de manera natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντειλάμενος
  english_pob_choice: after commanding
  chosen_spanish: después de haberles mandado
  alternatives_spanish:
  - después de haberles ordenado
  - después de haberles instruido
  lexicon: BDAG
  rationale: En un contexto testamentario, ἐντειλάμενος expresa una instrucción vinculante. «Mandado» conserva la fuerza directiva sin sonar tan militar como «ordenado», y es más natural en español que una traducción demasiado literal.
- source_word: παρεκάλεσεν
  english_pob_choice: he urged
  chosen_spanish: les rogó
  alternatives_spanish:
  - les exhortó
  - les suplicó
  lexicon: BDAG
  rationale: El verbo añade tono de súplica ferviente junto con insistencia. «Rogó» comunica mejor la carga afectiva del discurso final de un padre que «exhortó», sin debilitar la seriedad de la petición.
- source_word: μετακομίσωσι
  english_pob_choice: carry ... to Hebron
  chosen_spanish: trasladaran ... a Hebrón
  alternatives_spanish:
  - llevaran ... a Hebrón
  - transportaran ... a Hebrón
  lexicon: LSJ
  rationale: El verbo indica mover restos de un lugar a otro. «Trasladaran» preserva ese sentido concreto y evita una paráfrasis excesiva.
- source_word: τὰ ὀστᾶ αὐτοῦ
  english_pob_choice: his bones
  chosen_spanish: sus huesos
  alternatives_spanish:
  - sus restos
  lexicon: BDAG
  rationale: El griego dice literalmente «huesos». Mantener el término conserva el lenguaje funerario concreto y la tensión ritual del pasaje.
- source_word: ἐν Χεβρών
  english_pob_choice: to Hebron
  chosen_spanish: a Hebrón
  alternatives_spanish:
  - en Hebrón
  lexicon: BDAG
  rationale: Aunque la preposición básica es «en», el verbo de movimiento exige destino en español. «A Hebrón» expresa mejor la dirección implícita.
- source_word: μετὰ τῶν πατέρων αὐτοῦ
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - junto a sus padres
  lexicon: BDAG
  rationale: Se conserva el modismo sepulcral patriarcal. «Padres» refleja la forma tradicional del giro bíblico y evita suavizarlo a una generalización como «antepasados».
- source_word: ἐν ἱλαρότητι ψυχῆς
  english_pob_choice: with gladness of soul
  chosen_spanish: con alegría de alma
  alternatives_spanish:
  - con gozo de alma
  - con ánimo gozoso
  lexicon: BDAG
  rationale: La expresión es elevada e interior. «Alegría de alma» mantiene el matiz solemne y devocional sin reducirlo a un simple estado emocional.
- source_word: συνεκάλυψε τὸ πρόσωπον αὐτοῦ
  english_pob_choice: he covered his face
  chosen_spanish: cubrió su rostro
  alternatives_spanish:
  - veló su rostro
  - cubrió su cara
  lexicon: LSJ
  rationale: La acción se expresa de modo simple y directo. «Rostro» es más digno y bíblico en español que «cara», y refleja bien el gesto final de muerte.
- source_word: κατὰ πάντα
  english_pob_choice: in every respect
  chosen_spanish: en todo[a]
  alternatives_spanish:
  - completamente
  - en todo sentido
  lexicon: BDAG
  rationale: La frase enfatiza obediencia total. «En todo» es una solución concisa y natural en español para la idea de cumplimiento integral.
- source_word: ὅσα ἐνετείλατο
  english_pob_choice: all that ... had commanded
  chosen_spanish: lo que ... les había mandado
  alternatives_spanish:
  - todo lo que ... les había ordenado
  - todo cuanto ... les había mandado
  lexicon: BDAG
  rationale: La construcción transmite la totalidad de las instrucciones dadas. «Había mandado» mantiene la relación de autoridad y la referencia concreta al encargo paterno.
theological_decisions:
- issue: Transición al siguiente testamento dentro del mismo witness textual
  english_pob_reading: 'Included in brackets as a paratextual transition: [Here begins the Testament of Gad, the ninth son of Jacob and Zilpah.]'
  chosen_spanish_reading: '[Aquí comienza el Testamento de Gad, el noveno hijo de Jacob y Zilpa.]'
  alternative_spanish_readings:
  - Omitirlo como encabezado editorial
  - Integrarlo sin corchetes al flujo del texto
  rationale: El testimonio griego transmitido incluye el incipit del siguiente escrito. Para mantener la transparencia editorial, se conserva en corchetes como transición paratextual y no como parte de las palabras finales de Naphtali.
  doctrine_reference: PHILOSOPHY.md transparency principle; traducir lo atestiguado y señalar lo paratextual sin omitirlo silenciosamente.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que ajustó la base inglesa de ἐντειλάμενος a «commanding» y simplificó la frase de traslado de los huesos. La versión española refleja esa alineación más cercana al griego, sin depender mecánicamente del inglés previo.
  spanish_consistency_notes:
  - Se mantiene «Hebrón» y «Jacob» con grafía habitual en español.
  - Se conserva «Naphtali» como nombre propio según el testimonio fuente y el contexto editorial del proyecto.
  - Se usa «padres» para el modismo sepulcral, evitando una paráfrasis doctrinalmente más amplia.
  - El incipit final permanece entre corchetes como nota de transición, coherente con la práctica de transparencia del proyecto.
