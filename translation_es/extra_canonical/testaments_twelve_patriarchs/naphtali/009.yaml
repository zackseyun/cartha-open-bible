  text: 'And after commanding them many such things[[Here begins ...]], he urged them to carry his bones to Hebron and bury him with his fathers.


    2. And after eating and drinking with gladness of soul, he covered his face and died.


    3. And his sons did in every respect all that Naphtali their father had commanded them.


    [Here begins the Testament of Gad, the ninth son of Jacob and Zilpah.]'
  footnotes:
