id: T12P.NAP.3.5
reference: Testament of Naphtali 3:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 5. Ὁμοίως³⁷ δὲ³⁸ καὶ³⁹ οἱ Ἐγρήγοροι⁴⁰ ἐνήλλαξαν τάξιν φύσεως αὐτῶν, οὓς⁴¹ κατηράσατο⁴² Κύριος ἐπὶ τοῦ κατακλυσμοῦ⁴³, διʼ οὓς⁴⁴ *ἀπὸ κατοικησίας καὶ ἄκαρπον τάξας τὴν γῆν [ἀοίκητον]⁴⁵.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/003/005.yaml
  text: In the same way also the Watchers changed the order of their nature, whom the Lord cursed at the time of the flood, because of whom he made the earth uninhabited and fruitless.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:17Z'
    unchanged: false
    changes_summary: Replaced 'and the Lord cursed them' with 'whom the Lord cursed' to reflect the relative clause more closely; changed 'desolate and without fruit' to 'uninhabited and fruitless' to better match ἀπὸ κατοικησίας and ἄκαρπον while keeping formal, natural English.
translation:
  language: es
  text: De la misma manera también los Vigilantes cambiaron el orden de su naturaleza, a quienes Yahvé maldijo en el tiempo del diluvio, a causa de quienes hizo la tierra inhabitada y sin fruto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὁμοίως δὲ καὶ
  english_pob_choice: In the same way also
  chosen_spanish: De la misma manera también
  alternatives_spanish:
  - Asimismo también
  - De igual modo también
  lexicon: ὁμοίως
  rationale: Conserva la relación comparativa y el énfasis aditivo sin calcar una construcción pesada en español.
- source_word: οἱ Ἐγρήγοροι
  english_pob_choice: the Watchers
  chosen_spanish: los Vigilantes
  alternatives_spanish:
  - los Vigilantes celestiales
  - los que velan
  lexicon: Ἐγρήγοροι
  rationale: Se mantiene el término tradicional de este libro y la opción auditada del inglés POB, con una forma natural en español.
- source_word: ἐνήλλαξαν τάξιν φύσεως αὐτῶν
  english_pob_choice: changed the order of their nature
  chosen_spanish: cambiaron el orden de su naturaleza
  alternatives_spanish:
  - alteraron el orden de su naturaleza
  - cambiaron la disposición de su naturaleza
  lexicon: ἐναλλάσσω; τάξις; φύσις
  rationale: Respeta la idea de cambio de orden/disposición inherente, sin suavizar la fuerza de la expresión ni introducir interpretación adicional.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Dueño
  lexicon: κύριος
  rationale: Dado que el contexto alude al nombre divino y la política terminológica pide Yahvé para el Tetragrámaton, se usa esa forma en lugar de una sustitución eclesiástica genérica.
- source_word: ἐπὶ τοῦ κατακλυσμοῦ
  english_pob_choice: at the time of the flood
  chosen_spanish: en el tiempo del diluvio
  alternatives_spanish:
  - durante el diluvio
  - en ocasión del diluvio
  lexicon: κατακλυσμός
  rationale: Conserva el referente narrativo claro y la relación temporal sin sobrerrepresentar el matiz preposicional.
- source_word: ἀπὸ κατοικησίας καὶ ἄκαρπον
  english_pob_choice: uninhabited and fruitless
  chosen_spanish: inhabitada y sin fruto
  alternatives_spanish:
  - inhabitable y sin fruto
  - deshabitada y estéril
  lexicon: κατοικησία; ἄκαρπος
  rationale: 'Se privilegia una formulación natural y fiel al resultado causado: tierra sin habitantes y sin producción. La elección ''sin fruto'' conserva la imagen bíblica de esterilidad/productividad perdida.'
theological_decisions:
- issue: Forma de referirse al nombre divino en una cita/atribución del juicio
  english_pob_reading: whom the Lord cursed
  chosen_spanish_reading: a quienes Yahvé maldijo
  alternative_spanish_readings:
  - a quienes el Señor maldijo
  - a quienes Dios maldijo
  rationale: El texto griego dice Κύριος; en esta serie se evita enmascarar el nombre divino con 'Señor' cuando el contexto de auditable equivalencia favorece Yahvé.
  doctrine_reference: Tetragrámaton / nomen sacrum policy
- issue: Descripción del efecto cósmico del juicio
  english_pob_reading: he made the earth uninhabited and fruitless
  chosen_spanish_reading: hizo la tierra inhabitada y sin fruto
  alternative_spanish_readings:
  - hizo la tierra desolada y sin fruto
  - hizo la tierra deshabitada y estéril
  rationale: Se preserva la doble consecuencia material del juicio sin convertirla en mera imagen poética. 'Inhabitada' y 'sin fruto' reflejan la yuxtaposición de κατοικησία y ἄκαρπος.
  doctrine_reference: Judgment motif in apocalyptic/patriarchal literature
translation_notes:
  revision_awareness: La revisión inglesa reciente reemplazó una cláusula coordinada por una relativa ('whom the Lord cursed') y ajustó la descripción final a 'uninhabited and fruitless'. La versión española sigue esa relación relativa con 'a quienes Yahvé maldijo' y mantiene el par resultativo 'inhabitada y sin fruto' para reflejar mejor κατοικησία y ἄκαρπος.
  spanish_consistency_notes:
  - Se mantiene 'Vigilantes' como término técnico estable para Ἐγρήγοροι.
  - Se usa 'Yahvé' de forma consistente con la política del proyecto para Κύριος cuando el contexto alude al nombre divino.
  - '''Sin fruto'' conserva el valor de esterilidad/productividad perdida y no requiere nota al pie porque no introduce ambigüedad nueva en el español.'
