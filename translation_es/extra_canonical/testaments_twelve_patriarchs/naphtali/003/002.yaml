base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/003/002.yaml
  text: The sun and the moon and the stars do not alter their order; so you also must not alter the law of God through the disorder of your deeds.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:16Z'
    unchanged: false
    changes_summary: Changed 'their appointed order' to 'their order' for closer lexical accuracy, since τάξιν does not explicitly include 'appointed.'
translation:
  language: es
  text: El sol, la luna y las estrellas no alteran su orden; así también ustedes no deben alterar la ley de Dios por el desorden de sus obras.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἥλιος καὶ ἡ σελήνη καὶ οἱ ἀστέρες
  english_pob_choice: The sun and the moon and the stars
  chosen_spanish: El sol, la luna y las estrellas
  alternatives_spanish:
  - El sol, la luna y los astros
  - El sol, la luna y las estrellas celestes
  lexicon: ἥλιος, σελήνη, ἀστήρ
  rationale: Se mantiene la enumeración simple y directa del original. "Estrellas" es el equivalente natural y claro en español para ἀστέρες en este contexto.
- source_word: οὐ καλύψουσι τὴν τάξιν αὐτῶν
  english_pob_choice: do not alter their order
  chosen_spanish: no alteran su orden
  alternatives_spanish:
  - no cambian su orden
  - no trastornan su orden
  lexicon: καλύπτω + τάξις
  rationale: El texto griego presenta la idea de no cubrir/ocultar la τάξις, pero la revisión inglesa auditada confirmó que la traducción debía quedarse en el sentido léxico de τάξιν como "order" sin añadir "appointed". En español, "no alteran su orden" reproduce con fidelidad ese valor y conserva la imagen de estabilidad.
- source_word: μὴ ἀλλοιώσητε νόμον Θεοῦ
  english_pob_choice: must not alter the law of God
  chosen_spanish: no deben alterar la ley de Dios
  alternatives_spanish:
  - no deben cambiar la ley de Dios
  - no deben modificar la ley de Dios
  lexicon: ἀλλοιόω, νόμος, Θεός
  rationale: '"Alterar" conserva la fuerza de cambio indebido del verbo y coincide con la solución inglesa fijada por el audit trail. "Ley de Dios" traduce νόμον Θεοῦ de forma directa y transparente.'
- source_word: ἐν ἀταξίᾳ τῶν πράξεων ὑμῶν
  english_pob_choice: through the disorder of your deeds
  chosen_spanish: por el desorden de sus obras
  alternatives_spanish:
  - a causa del desorden de sus acciones
  - mediante el desorden de sus hechos
  lexicon: ἀταξία, πρᾶξις
  rationale: '"Desorden" transmite bien ἀταξία. "Obras" es una forma natural y bíblica en español para πρᾶξεις, sin perder el matiz de conducta práctica.'
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: σύ / ὑμεῖς
  rationale: Se usa el español neutro latinoamericano y eclesial "ustedes" para la segunda persona plural.
theological_decisions:
- issue: Relación entre el orden cósmico y la obediencia ética
  english_pob_reading: The sun and the moon and the stars do not alter their order; so you also must not alter the law of God through the disorder of your deeds.
  chosen_spanish_reading: 'El orden firme de los cuerpos celestes sirve como comparación moral: así como no se desordena su curso, tampoco debe desordenarse la obediencia humana a la ley de Dios.'
  alternative_spanish_readings:
  - Los astros conservan su orden por designio de Dios; por eso ustedes no deben alterar su ley.
  - El sol, la luna y las estrellas no cambian su orden; así también ustedes no deben cambiar la ley de Dios.
  rationale: El versículo establece una analogía ética basada en la estabilidad del cosmos. La redacción española conserva esa comparación sin introducir una afirmación adicional sobre designio divino que el griego no explicita aquí.
  doctrine_reference: Sabiduría ética y obediencia a la ley divina; no añade una doctrina nueva, sino una exhortación moral por analogía creacional.
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió 'their appointed order' a 'their order' porque τάξιν no expresa explícitamente 'appointed'. La versión española sigue esa corrección y evita añadir una idea de 'orden establecido' o 'orden señalado' que no está en el sustantivo griego.
  spanish_consistency_notes:
  - Se mantiene 'ley de Dios' para νόμος Θεοῦ, en coherencia con el texto fuente y con una terminología bíblica clara.
  - Se evita 'SEÑOR' u otras sustituciones reverenciales porque el verso dice Θεοῦ, no κύριος.
  - '''Obras'' conserva el plural de conducta práctica y funciona bien junto con ''desorden''.'
