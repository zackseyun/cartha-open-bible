  text: 2. Ὁ¹² ἥλιος καὶ ἡ¹² σελήνη καὶ οἱ¹² ἀστέρες οὐ †καλύψουσι¹³ τὴν¹⁴ τάξιν αὐτῶν· οὕτως¹⁵ καὶ ὑμεῖς μὴ ἀλλοιώσητε¹⁶ νόμον Θεοῦ¹⁷ ἐν ἀταξίᾳ τῶν¹⁸ πράξεων ὑμῶν¹⁹.
