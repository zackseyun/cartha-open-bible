translation:
  language: es
  text: Pero ustedes, mis hijos, no deben ser así, conociendo en el firmamento, en la tierra, en el mar y en todas las cosas creadas, al Señor que hizo todas las cosas, para que no lleguen a ser como Sodoma, que cambió el orden de su naturaleza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὑμεῖς δὲ μὴ οὕτως, τέκνα μου
  english_pob_choice: But you, my children, must not be so
  chosen_spanish: Pero ustedes, mis hijos, no deben ser así
  alternatives_spanish:
  - Mas ustedes, mis hijos, no deben ser así
  - Y ustedes, mis hijos, no deben ser así
  lexicon: ὑμεῖς / οὕτως
  rationale: Se conserva el contraste adversativo y el vocativo paterno. 'No deben ser así' comunica la prohibición exhortativa sin endurecerla con un calco innecesario.
- source_word: γινώσκοντες ἐν τῷ στερεώματι, ἐν γῇ καὶ ἐν θαλάττῃ, καὶ ἐν πᾶσι τοῖς δημιουργήμασι
  english_pob_choice: knowing in the firmament, on the earth, and in the sea, and in all created things
  chosen_spanish: conociendo en el firmamento, en la tierra, en el mar y en todas las cosas creadas
  alternatives_spanish:
  - sabiendo en el firmamento, en la tierra, en el mar y en todas las criaturas
  - reconociendo en el firmamento, en la tierra, en el mar y en todo lo creado
  lexicon: γινώσκοντες / στερέωμα / δημιουργήματα
  rationale: Se mantiene el participio en forma adverbial ('conociendo') porque el texto griego no añade una idea independiente, sino el modo en que deben vivir. 'Firmamento' conserva el término cósmico del griego; 'cosas creadas' evita restringir indebidamente δημιουργήματα solo a seres personales.
- source_word: Κύριον τὸν ποιήσαντα πάντα
  english_pob_choice: the Lord who made all things
  chosen_spanish: al Señor que hizo todas las cosas
  alternatives_spanish:
  - al Señor que creó todas las cosas
  - al Señor, el que hizo todas las cosas
  lexicon: Κύριον / ποιήσαντα πάντα
  rationale: '''Señor'' sigue la convención del pasaje para Κύριον en este contexto de título divino, y ''hizo'' respeta el verbo amplio ποιέω sin imponer ''crear'' si el griego no lo especifica aquí.'
- source_word: ἵνα μὴ γένησθε ὡς Σόδομα
  english_pob_choice: so that you may not become like Sodom
  chosen_spanish: para que no lleguen a ser como Sodoma
  alternatives_spanish:
  - para que no se vuelvan como Sodoma
  - a fin de que no lleguen a ser como Sodoma
  lexicon: γένησθε / ὡς Σόδομα
  rationale: '''Lleguen a ser'' reproduce el valor de devenir del verbo sin reducirlo a una mera opinión o comparación superficial.'
- source_word: ἥτις ἐνήλλαξε τάξιν φύσεως αὐτῆς
  english_pob_choice: which changed the order of its nature
  chosen_spanish: que cambió el orden de su naturaleza
  alternatives_spanish:
  - que alteró el orden de su naturaleza
  - que cambió el orden natural que le correspondía
  lexicon: ἐνήλλαξε / τάξιν / φύσεως
  rationale: 'Se mantiene la tensión lexical del original: τάξις como ''orden'' y φύσις como ''naturaleza''. No se suaviza a una mera descripción moral, porque el pasaje formula una alteración del orden natural.'
theological_decisions:
- issue: Valor de Κύριον como referencia divina
  english_pob_reading: the Lord who made all things
  chosen_spanish_reading: al Señor que hizo todas las cosas
  alternative_spanish_readings:
  - al Yahvé que hizo todas las cosas
  - al Señor Yahvé que hizo todas las cosas
  rationale: Aunque el default del proyecto prefiere 'Yahvé' para יהוה, aquí el texto griego usa Κύριον dentro de una afirmación cosmológica tradicional. En ausencia de una cadena explícita de cita del Tetragrámaton, se conserva 'Señor' como la lectura auditada del POB inglés y del griego transmitido.
  doctrine_reference: Nombre divino / cristología del título
- issue: Fuerza de la exhortación y del participio
  english_pob_reading: must not be so, knowing...
  chosen_spanish_reading: no deben ser así, conociendo...
  alternative_spanish_readings:
  - no deben ser así; más bien, conozcan...
  - no deben ser así, y conozcan...
  rationale: El revisado inglés eliminó 'Rather' y convirtió 'know' en 'knowing' para reflejar el participio griego. En español se refleja esa misma dependencia sintáctica con un gerundio que mantiene la relación de modo sin introducir una ruptura interpretativa.
  doctrine_reference: Exhortación sapiencial / sintaxis participial
- issue: Sodoma como ejemplo de desorden de la naturaleza
  english_pob_reading: which changed the order of its nature
  chosen_spanish_reading: que cambió el orden de su naturaleza
  alternative_spanish_readings:
  - que trastornó el orden de su naturaleza
  - que alteró la disposición natural de sí misma
  rationale: Se conserva el lenguaje fuerte del texto sobre 'orden' y 'naturaleza' para no diluir la acusación. 'Naturaleza' mantiene la carga del griego φύσις y la vinculación con la conducta de Sodoma en el argumento del pasaje.
  doctrine_reference: Antropología moral / orden creado
translation_notes:
  revision_awareness: La versión inglesa más reciente retiró 'Rather' y ajustó 'know' a 'knowing' para seguir más de cerca la construcción participial. La redacción española imita esa decisión con 'conociendo' y evita cualquier partícula explicativa añadida que no esté en el griego. También conserva la estructura enumerativa de 'firmamento, tierra, mar y todas las cosas creadas' sin expandirla.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para Κύριον en coherencia con el inglés auditado y con la falta de una cita explícita del Tetragrámaton en este versículo.
  - '''Firmamento'' conserva el registro cósmico bíblico y evita sustituirlo por un término más moderno que perdería la correspondencia con στερέωμα.'
  - '''Cosas creadas'' se eligió para δημιουργήματα para no restringir el alcance a seres personales o a ''criaturas'' exclusivamente biológicas.'
  - Se conserva 'naturaleza' para φύσις y 'orden' para τάξις, manteniendo la tensión semántica del griego.
