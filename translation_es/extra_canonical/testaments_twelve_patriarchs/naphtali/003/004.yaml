base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/003/004.yaml
  text: But you, my children, must not be so, knowing in the firmament, on the earth, and in the sea, and in all created things, the Lord who made all things, so that you may not become like Sodom, which changed the order of its nature.
  revision_pass:
