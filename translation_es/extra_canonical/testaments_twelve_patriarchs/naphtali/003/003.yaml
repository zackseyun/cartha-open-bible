translation:
  language: es
  text: Las naciones, habiéndose extraviado y habiendo abandonado a Yahvé, alteraron su orden y prestaron oído a madera y piedra, a espíritus de engaño.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἔθνη
  english_pob_choice: The nations
  chosen_spanish: Las naciones
  alternatives_spanish:
  - Los pueblos
  - Las gentes
  lexicon: ἔθνη
  rationale: Mantiene el sentido colectivo de pueblos/gentilidades y conserva el tono general del griego sin introducir una interpretación étnica más estrecha que la del original.
- source_word: πλανηθέντα
  english_pob_choice: having gone astray
  chosen_spanish: habiendo errado
  alternatives_spanish:
  - habiéndose extraviado
  - habiendo sido extraviadas
  lexicon: πλανάω
  rationale: ‘Errar’ comunica bien la desviación moral/religiosa del contexto y evita una paráfrasis demasiado interpretativa; ‘extraviarse’ es posible, pero ‘errar’ suena más natural en español bíblico contemporáneo.
- source_word: ἀφέντα Κύριον
  english_pob_choice: having forsaken the Lord
  chosen_spanish: habiendo abandonado a Yahvé
  alternatives_spanish:
  - habiendo dejado al Señor
  - habiendo desamparado a Yahvé
  lexicon: ἀφίημι + Κύριος
  rationale: Se conserva la idea de abandono/forsaking y se traduce Κύριος como ‘Yahvé’ según el criterio POB para el nombre divino. ‘Abandonado’ es más claro que ‘dejado’ para el registro religioso de la frase.
- source_word: ἠλλοίωσαν τὴν τάξιν αὐτῶν
  english_pob_choice: altered their order
  chosen_spanish: cambiaron su orden
  alternatives_spanish:
  - alteraron su orden
  - cambiaron su disposición
  lexicon: ἀλλοιόω + τάξις
  rationale: ‘Cambiaron su orden’ reproduce de forma sencilla la alteración del orden/ordenamiento propio de las naciones. ‘Orden’ mantiene la ambigüedad útil entre arreglo, condición y disposición, sin ampliar indebidamente el sentido.
- source_word: ὑπήκουσαν
  english_pob_choice: gave heed to
  chosen_spanish: prestaron oído a
  alternatives_spanish:
  - obedecieron a
  - siguieron a
  lexicon: ὑπακούω
  rationale: La POB inglesa opta por ‘gave heed to’, es decir, atender/escuchar con asentimiento más que obediencia plena. ‘Prestaron oído a’ conserva esa atención inclinada sin forzar el verbo hacia ‘obedecieron’.
- source_word: ξύλοις καὶ λίθοις
  english_pob_choice: wood and stone
  chosen_spanish: la madera y la piedra
  alternatives_spanish:
  - maderos y piedras
  - objetos de madera y de piedra
  lexicon: ξύλον + λίθος
  rationale: Se mantiene el contraste material literal del texto. En español, el artículo definido singular colectivo (‘la madera y la piedra’) suena más natural y sigue señalando el material de los ídolos.
- source_word: πνεύμασι πλάνης
  english_pob_choice: spirits of deceit
  chosen_spanish: espíritus de engaño
  alternatives_spanish:
  - espíritus de error
  - espíritus engañadores
  lexicon: πνεῦμα + πλάνη
  rationale: ‘Engaño’ preserva el carácter activo y desorientador de πλάνη y corresponde al inglés POB ‘deceit’. ‘Error’ es posible, pero en español puede sonar más abstracto y menos personal.
theological_decisions:
- issue: Tratamiento del nombre divino Κύριος en un contexto no cristológico
  english_pob_reading: having forsaken the Lord
  chosen_spanish_reading: habiendo abandonado a Yahvé
  alternative_spanish_readings:
  - habiendo abandonado al Señor
  - habiendo dejado a Yahvé
  rationale: El flujo de este pasaje remite al nombre divino más que a un título genérico. Siguiendo el estándar POB, se evita el enmascaramiento con ‘SEÑOR’ y se usa ‘Yahvé’ para preservar la referencialidad del original.
  doctrine_reference: Divine name rendering policy (YHWH -> Yahvé)
- issue: ‘Espíritus de engaño’ como entidades personales o como modo de engaño
  english_pob_reading: spirits of deceit
  chosen_spanish_reading: espíritus de engaño
  alternative_spanish_readings:
  - espíritus de error
  - falsos espíritus
  rationale: 'Se conserva la personificación del griego y de la POB inglesa: no se reduce a una simple cualidad abstracta (‘engaño’), sino que se mantiene el plural de entidades espirituales en el discurso del pasaje.'
  doctrine_reference: Pneumatology / spiritual beings language
- issue: ‘Prestaron oído a la madera y a la piedra’ como idolatría concreta
  english_pob_reading: gave heed to wood and stone
  chosen_spanish_reading: prestaron oído a la madera y a la piedra
  alternative_spanish_readings:
  - adoraron la madera y la piedra
  - se inclinaron ante la madera y la piedra
  rationale: 'El texto griego habla de atender/prestar oído, no de adorar explícitamente. La formulación española conserva la tensión: sugiere idolatría sin reemplazar el verbo por uno más explícito que el original.'
  doctrine_reference: Idolatry imagery / textual fidelity
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; esta versión española sigue de cerca el texto griego y la solución inglesa auditada, sin introducir expansiones doctrinales ni suavizar la imaginería idolátrica.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ conforme al estándar POB para Κύριος cuando refiere al nombre divino.
  - Se conserva la personificación plural de ‘espíritus’ para πνεύμασι πλάνης.
  - ‘Prestaron oído a’ reproduce el matiz de atención/adhesión de la inglesa ‘gave heed to’.
  - El registro es bíblico contemporáneo, sobrio y legible, sin depender de fórmulas tradicionales de máscara para el nombre divino.
