review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y la POB inglesa en la estructura general: las naciones se extravían, abandonan al Señor/Yahvé, alteran su orden y atienden a madera, piedra y espíritus de engaño. Sin embargo, dos elecciones se apartan del matiz óptimo del original: πλανηθέντα se expresa mejor como ''extraviadas'' que como ''habiendo errado'', y ξύλοις καὶ λίθοις se preserva con más fidelidad como ''madera y piedra'' sin artículos, evitando un giro demasiado material/colectivo en español.'
  spanish_quality_summary: El español es claro y legible, pero 'habiendo errado' suena algo rígido y menos natural que 'habiéndose extraviado' o 'extraviadas'. Además, 'prestaron oído a la madera y a la piedra' funciona, pero la ausencia de artículos en 'madera y piedra' refleja mejor la formulación idiomática de idolatría material en este contexto.
  glossary_alignment: 'Buen alineamiento general con las políticas del proyecto: ''Yahvé'' para Κύριος en referencia divina, ''espíritus'' para πνεύμασι, y mantenimiento de ''engaño''. No hay conflicto doctrinal serio. La principal mejora es léxica y estilística, no terminológica.'
  issues:
  - severity: medium
    issue: πλανηθέντα como 'habiendo errado'
    rationale: El participio pasivo/aoristo sugiere mejor 'habiéndose extraviado' o 'extraviadas' que un simple 'errar'. 'Errado' puede sonar más a equivocación puntual que a desviación religiosa/moral.
  - severity: medium
    issue: ξύλοις καὶ λίθοις como 'la madera y la piedra'
    rationale: Aunque comprensible, los artículos y el singular colectivo introducen un matiz más interpretativo/material. 'Madera y piedra' reproduce mejor la fórmula de idolatría del original y de la POB inglesa ('wood and stone').
  - severity: low
    issue: Acumulación de dos gerundios/perífrasis con 'habiendo'
    rationale: '''Habiéndose extraviado y habiendo abandonado a Yahvé'' suena más natural que repetir dos veces ''habiendo'', mejorando el flujo sin perder el paralelismo.'
  revised_spanish_text: Las naciones, habiéndose extraviado y habiendo abandonado a Yahvé, alteraron su orden y prestaron oído a madera y piedra, a espíritus de engaño.
  revision_rationale: Se ajusta el participio πλανηθέντα a una formulación española más natural y más fiel al matiz de desviación religiosa ('habiéndose extraviado'); se cambia 'cambiaron' por 'alteraron' para corresponder mejor a ἠλλοίωσαν y a la POB inglesa; y se simplifica 'la madera y la piedra' a 'madera y piedra' para reflejar mejor la expresión griega de idolatría material. No se requieren notas.
