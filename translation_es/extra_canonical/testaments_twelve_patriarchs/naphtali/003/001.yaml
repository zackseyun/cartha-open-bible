id: T12P.NAP.3.1
reference: Testament of Naphtali 3:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: III. Μὴ οὖν σπουδάζετε¹ *ἐν πλεονεξίᾳ² *διαφθεῖραι τὰς πράξεις ὑμῶν³, ἢ ἐν *λόγοις κενοῖς ἀπατᾶν⁴ τὰς ψυχὰς ὑμῶν, ὅτι⁵ σιωπῶντες⁶ ἐν *καθαρότητι καρδίας⁷ συνήσετε⁸ τὸ θέλημα τοῦ Θεοῦ⁹ κρατεῖν¹⁰, καὶ ἀπορρίπτειν τὸ θέλημα τοῦ Βελίαρ¹¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/003/001.yaml
  text: Therefore, do not be eager in greed to corrupt your deeds, or by empty words to deceive your souls, because by keeping silent in purity of heart you will understand to hold fast the will of God and to cast away the will of Beliar.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:17Z'
    unchanged: false
    changes_summary: Replaced 'So then' with 'Therefore' for a more formal connective; removed the conditional 'if,' since it is not in the Greek; adjusted 'For if, in purity of heart, you keep silence' to 'because by keeping silent in purity of heart' to reflect the participial construction more accurately and naturally.
translation:
  language: es
  text: Por tanto, no se apresuren en la codicia para corromper sus obras, ni con palabras vacías para engañar a sus almas, porque, al guardar silencio con pureza de corazón, entenderán que deben aferrarse a la voluntad de Dios y desechar la voluntad de Beliar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σπουδάζετε
  english_pob_choice: do not be eager
  chosen_spanish: no se apresuren
  alternatives_spanish:
  - no sean diligentes
  - no se empeñen con afán
  lexicon: σπουδάζω
  rationale: Aquí el verbo no expresa diligencia positiva sino un impulso vehemente aplicado al mal; en español, «apresurarse» transmite mejor la prisa/ansia indebida que «ser diligente».
- source_word: ἐν πλεονεξίᾳ
  english_pob_choice: in greed
  chosen_spanish: en la codicia
  alternatives_spanish:
  - por avidez
  - con avaricia
  lexicon: πλεονεξία
  rationale: «Codicia» conserva el valor moral y la fuerza de deseo desordenado por más de lo debido; «avaricia» puede sonar más restringido al dinero.
- source_word: διαφθεῖραι τὰς πράξεις ὑμῶν
  english_pob_choice: to corrupt your deeds
  chosen_spanish: para corromper sus obras
  alternatives_spanish:
  - para pervertir sus acciones
  - para arruinar sus hechos
  lexicon: διαφθείρω + πράξεις
  rationale: «Corromper» mantiene la imagen de deterioro moral del verbo griego y encaja bien con «obras»/«acciones» en español bíblico.
- source_word: λόγοις κενοῖς
  english_pob_choice: empty words
  chosen_spanish: palabras vacías
  alternatives_spanish:
  - discursos vacíos
  - palabrería vacía
  lexicon: κενός + λόγοι
  rationale: «Palabras vacías» reproduce de forma natural la inutilidad e insustancialidad del modismo sin añadir más carga interpretativa.
- source_word: ἀπατᾶν τὰς ψυχὰς ὑμῶν
  english_pob_choice: to deceive your souls
  chosen_spanish: engañar a sus almas
  alternatives_spanish:
  - engañar sus vidas
  - seducir sus almas
  lexicon: ἀπατάω + ψυχή
  rationale: «Almas» conserva el paralelismo antropológico del texto. «Engañar» sigue directamente el verbo griego sin intensificarlo innecesariamente.
- source_word: σιωπῶντες
  english_pob_choice: by keeping silent
  chosen_spanish: al guardar silencio
  alternatives_spanish:
  - callando
  - manteniéndose en silencio
  lexicon: σιωπάω
  rationale: 'La forma participial se vierte naturalmente con una construcción adverbial: «al guardar silencio» expresa el medio o circunstancia de manera idiomática.'
- source_word: ἐν καθαρότητι καρδίας
  english_pob_choice: in purity of heart
  chosen_spanish: con pureza de corazón
  alternatives_spanish:
  - en pureza de corazón
  - desde la pureza del corazón
  lexicon: καθαρότης καρδίας
  rationale: «Con pureza de corazón» suena más natural en español y mantiene el sentido de estado interior sin forzar un calco preposicional.
- source_word: συνήσετε τὸ θέλημα τοῦ Θεοῦ κρατεῖν
  english_pob_choice: you will understand to hold fast the will of God
  chosen_spanish: entenderán que deben aferrarse a la voluntad de Dios
  alternatives_spanish:
  - comprenderán que han de retener la voluntad de Dios
  - entenderán cómo aferrarse a la voluntad de Dios
  lexicon: συνίημι + κρατέω + θέλημα τοῦ Θεοῦ
  rationale: El griego combina comprensión con la idea de asirse firmemente; en español, «entenderán que deben aferrarse» comunica con claridad la obligación/resultado implícito sin perder el matiz de firmeza.
- source_word: ἀπορρίπτειν τὸ θέλημα τοῦ Βελίαρ
  english_pob_choice: to cast away the will of Beliar
  chosen_spanish: desechar la voluntad de Beliar
  alternatives_spanish:
  - arrojar la voluntad de Beliar
  - rechazar la voluntad de Beliar
  lexicon: ἀπορρίπτω + θέλημα τοῦ Βελίαρ
  rationale: «Desechar» conserva el matiz de apartar o arrojar fuera, y en español resulta más idiomático que un calco literal. Mantiene la oposición ética con la voluntad de Dios.
theological_decisions:
- issue: Beliar as opposed to God’s will
  english_pob_reading: the will of Beliar
  chosen_spanish_reading: la voluntad de Beliar
  alternative_spanish_readings:
  - el querer de Beliar
  - la voluntad del Maligno
  rationale: Se conserva «Beliar» como nombre propio del adversario, porque el texto lo contrasta directamente con Dios; no se sustituye por un equivalente interpretativo que borre la referencia tradicional del documento.
  doctrine_reference: Dualismo ético del Testamento de los Doce Patriarcas; contraste entre obediencia a Dios y adhesión al adversario.
- issue: The participial silence construction as means of understanding
  english_pob_reading: because by keeping silent in purity of heart you will understand
  chosen_spanish_reading: porque, al guardar silencio con pureza de corazón, entenderán
  alternative_spanish_readings:
  - porque, guardando silencio con pureza de corazón, comprenderán
  - pues, si guardan silencio con pureza de corazón, entenderán
  rationale: Se evita introducir una condicional inexistente y se mantiene el valor instrumental/circunstancial del participio griego, conforme a la revisión del inglés POB.
  doctrine_reference: Sabiduría práctica y discernimiento moral en la tradición paraenética judía.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó la condicional 'if' y prefirió 'because by keeping silent in purity of heart', reflejando un participio circunstancial. La redacción española sigue esa decisión con una construcción adverbial («al guardar silencio con pureza de corazón») y conserva el tono exhortativo formal de 'Therefore' con «Por tanto».
  spanish_consistency_notes:
  - Se mantiene «Dios» para Θεοῦ y «Beliar» como nombre propio, sin sustituirlo por glosas interpretativas.
  - Se eligió un registro bíblico moderno, evitando calcos excesivos como «en vaciedad de palabras» o «retener la voluntad».
  - «Almas» se conserva en plural para reflejar τὰς ψυχὰς ὑμῶν y el paralelismo antropológico del texto.
