translation:
  language: es
  text: Y otra vez[a], después de siete días, vi que mi padre Jacob estaba de pie junto al mar de Amnía, y estábamos con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Otra vez» conserva el matiz de reiteración del griego; también podría decirse «de nuevo».
