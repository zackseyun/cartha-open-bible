lexical_decisions:
- source_word: Καὶ πάλιν
  english_pob_choice: And again
  chosen_spanish: Y otra vez
  alternatives_spanish:
  - Y de nuevo
  - Y nuevamente
  lexicon: καί + πάλιν
  rationale: La secuencia griega expresa adición y reiteración. «Y otra vez» conserva la repetición narrativa sin sonar excesivamente literario ni introducir una paráfrasis más libre.
- source_word: μετὰ ἡμέρας ἑπτὰ
  english_pob_choice: after seven days
  chosen_spanish: después de siete días
  alternatives_spanish:
  - tras siete días
  - al cabo de siete días
  lexicon: μετά + acusativo de tiempo
  rationale: La construcción temporal se vierte de modo directo y natural en español. «Después de siete días» mantiene el valor temporal exacto del griego.
- source_word: εἶδον ὅτι
  english_pob_choice: I saw that
  chosen_spanish: vi que
  alternatives_spanish:
  - vi cómo
  - observé que
  lexicon: ὁράω + ὅτι
  rationale: «Vi que» refleja la percepción seguida de contenido visto, sin forzar una formulación más interpretativa.
- source_word: ὁ πατὴρ μου Ἰακώβ
  english_pob_choice: my father Jacob
  chosen_spanish: mi padre Jacob
  alternatives_spanish:
  - mi padre, Jacob
  lexicon: πατήρ + nombre propio
  rationale: Se mantiene la relación familiar explícita y el nombre propio sin añadir puntuación explicativa innecesaria.
- source_word: ἴστατο ἐν τῇ θαλάσσῃ Ἀμνείας
  english_pob_choice: was standing by the sea of Amnia
  chosen_spanish: estaba junto al mar de Amnía
  alternatives_spanish:
  - estaba de pie junto al mar de Amnía
  - se hallaba junto al mar de Amnía
  lexicon: ἵστημι + ἐν + dative
  rationale: El griego usa el verbo de estar/estar de pie con una localización. En español, «estaba junto al mar» comunica la escena de manera idiomática sin perder la ubicación ni imponer innecesariamente la idea de postura corporal como foco principal.
- source_word: ἡμεῖς σὺν αὐτῷ
  english_pob_choice: we were with him
  chosen_spanish: nosotros estábamos con él
  alternatives_spanish:
  - estábamos con él
  - éramos con él
  lexicon: ἡμεῖς + σύν + pronombre
  rationale: Se conserva el sujeto explícito «nosotros» como en el griego y se vierte σύν con el valor relacional de compañía mediante «con él».
theological_decisions:
- issue: Forma de la revelación narrativa sin carga doctrinal adicional
  english_pob_reading: And again, after seven days, I saw that...
  chosen_spanish_reading: Y otra vez, después de siete días, vi que...
  alternative_spanish_readings:
  - Y nuevamente, tras siete días, vi que...
  rationale: No hay aquí una afirmación doctrinal especial que requiera matización teológica. La traducción preserva el carácter de visión/narración sin añadir interpretaciones sobre el contenido de la experiencia.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa más reciente permanece sin cambios, así que el borrador español sigue de cerca el texto fuente y el audit trail inglés sin introducir ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Jacob» como nombre propio estándar en español.
  - Se usa «mar» para θαλάσσα conforme al sentido literal del pasaje.
  - No se introduce terminología eclesiástica ajena al texto, ya que el verso es narrativo y descriptivo.
