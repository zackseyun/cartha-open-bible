  text: 2. Καὶ ἰδοὺ πλοῖον ἤρχετο⁷ ἁρμενίζον⁸ *ἐκτὸς ναυτῶν⁹ καὶ κυβερνητῶν¹⁰· ἐπεγέγραπτο *δὲ τῷ πλοίῳ¹¹ *ὅτι πλοῖον¹² Ἰακώβ.
