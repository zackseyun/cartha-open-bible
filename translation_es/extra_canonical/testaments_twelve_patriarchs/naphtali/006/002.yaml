base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/006/002.yaml
  text: 'And behold, a ship was coming, sailing beside us, with sailors and pilots. And on the ship was written this: “Jacob’s ship.”'
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:00Z'
    unchanged: false
    changes_summary: Adjusted wording to better reflect the Greek participle and prepositional phrase, and rendered the inscription more literally without adding “The”.
translation:
  language: es
  text: 'Y he aquí, una nave venía navegando junto a nosotros, con marineros y pilotos. Y en la nave estaba escrito esto: «Nave de Jacob»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión del letrero puede traducirse también «La nave de Jacob»; se omite el artículo para seguir más de cerca la forma breve de la inscripción griega y la revisión inglesa.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλοῖον
  english_pob_choice: ship
  chosen_spanish: nave
  alternatives_spanish:
  - barco
  - embarcación
  - buque
  lexicon: πλοῖον
  rationale: '"Nave" es un término amplio y digno en español que conserva el sentido general de una embarcación grande sin forzar una equivalencia técnica moderna. En este contexto narrativo funciona bien junto a "marineros y pilotos".'
- source_word: ἤρχετο ἁρμενίζον
  english_pob_choice: was coming, sailing beside us
  chosen_spanish: venía navegando junto a nosotros
  alternatives_spanish:
  - venía pasando junto a nosotros
  - se acercaba navegando junto a nosotros
  - venía navegando al lado de nosotros
  lexicon: ἤρχετο + ἁρμενίζον
  rationale: La combinación expresa movimiento en curso y navegación simultánea. "Venía navegando" refleja el aspecto progresivo del griego y "junto a nosotros" traduce la relación espacial de manera natural en español.
- source_word: ἐκτὸς ναυτῶν καὶ κυβερνητῶν
  english_pob_choice: with sailors and pilots
  chosen_spanish: con marineros y pilotos
  alternatives_spanish:
  - con marineros y timoneles
  - con tripulantes y pilotos
  - con marineros y gobernantes de la nave
  lexicon: ναυτῶν / κυβερνητῶν
  rationale: '"Marineros" es el equivalente natural de ναυτῶν. Para κυβερνητῶν, "pilotos" sigue de cerca la elección inglesa POB y puede abarcar el sentido de quienes gobiernan o dirigen la nave; "timoneles" sería más técnico y menos transparente para lectores generales.'
- source_word: ἐπεγέγραπτο δὲ τῷ πλοίῳ ὅτι πλοῖον Ἰακώβ
  english_pob_choice: 'And on the ship was written this: “Jacob’s ship.”'
  chosen_spanish: 'Y en la nave estaba escrito esto: «Nave de Jacob»'
  alternatives_spanish:
  - 'Y sobre la nave estaba escrito esto: «La nave de Jacob»'
  - 'Y en la nave estaba escrito: «La nave de Jacob»'
  - 'Y en la nave se había escrito esto: «Nave de Jacob»'
  lexicon: ἐπεγέγραπτο
  rationale: La pasiva perifrástica española "estaba escrito" reproduce bien el estado resultante del letrero. Se evita añadir el artículo "la" dentro de la inscripción para mantener la literalidad de la revisión inglesa, que optó por "Jacob’s ship" en lugar de "The Ship of Jacob".
theological_decisions:
- issue: Inscripción posesiva en la nave
  english_pob_reading: '"Jacob’s ship" rather than "The Ship of Jacob"'
  chosen_spanish_reading: «Nave de Jacob»
  alternative_spanish_readings:
  - «La nave de Jacob»
  - «Barco de Jacob»
  rationale: La revisión inglesa explícitamente evitó introducir "The" en la leyenda. En español, "Nave de Jacob" conserva la brevedad de la inscripción y deja el posesivo genitivo sin recargarlo con un artículo que el texto no exige.
  doctrine_reference: Source-critical rendering; no doctrinal issue.
translation_notes:
  revision_awareness: 'La versión inglesa revisada ajustó el participio y la frase preposicional para reflejar mejor el griego, y simplificó la leyenda a "Jacob’s ship". La propuesta española sigue ese mismo enfoque: mantiene el movimiento en curso con "venía navegando junto a nosotros" y reproduce la inscripción sin añadir un artículo interpretativo.'
  spanish_consistency_notes:
  - Se mantiene "Y he aquí" para corresponder a la fórmula narrativa enfática del griego y del inglés POB.
  - Se usa "nave" de manera consistente tanto en la narración como en la inscripción, para evitar alternancias innecesarias.
  - '"Pilotos" conserva la decisión POB de no especificar excesivamente el cargo náutico.'
  - La puntuación de la cita respeta el estilo editorial bíblico en español, con comillas angulares.
