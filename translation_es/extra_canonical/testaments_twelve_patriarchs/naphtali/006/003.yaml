  text: 'Y nuestro padre nos dijo: «Venid, subamos a nuestra barca».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ λέγει ἡμῖν ὁ πατὴρ ἡμῶν
  english_pob_choice: And our father said to us
  chosen_spanish: Y nuestro padre nos dijo
  alternatives_spanish:
  - Y nuestro padre nos decía
  - Y dijo nuestro padre
  lexicon: λέγει -> decir en relato narrativo; πατήρ -> padre; ἡμῶν -> nuestro/a
  rationale: El presente histórico griego puede sonar natural en español con pasado simple en narración; «nos dijo» refleja el valor narrativo esperado por el contexto y conserva el destinatario indirecto explícito («a nosotros») sin cargarlo de matiz durativo.
- source_word: Δεῦτε ἀνέλθωμεν
  english_pob_choice: Come, let us go up
  chosen_spanish: Venid, subamos
  alternatives_spanish:
  - Ven, subamos
  - Vamos, subamos
  lexicon: Δεῦτε -> venid / ven; ἀνέλθωμεν -> subamos
  rationale: «Venid» mantiene el plural exhortativo del griego; «subamos» conserva el subjuntivo exhortativo inclusivo. La versión en singular («ven») sería posible solo si se optara por un registro menos literal respecto del plural.
- source_word: εἰς τὸ πλοῖον ἡμῶν
  english_pob_choice: into our ship
  chosen_spanish: a nuestra barca
  alternatives_spanish:
  - a nuestro barco
  - dentro de nuestra barca
  lexicon: πλοῖον -> barca / barco
  rationale: En este contexto marítimo breve, «barca» comunica bien el referente y suena natural en español bíblico sin imponer un matiz técnico mayor que el griego. Se evita «barco» por ser más general y menos evocador de una nave pequeña en narración.
translation_notes:
  revision_awareness: El pasaje coincide con la revisión más reciente indicada como sin cambios; por eso la redacción española sigue de cerca el sentido del texto griego y del inglés auditado, sin introducir notas textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y sobrio.
  - Se conserva el plural exhortativo del discurso directo.
  - No se añade puntuación interpretativa más allá de la necesaria para el diálogo.
