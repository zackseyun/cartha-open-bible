lexical_decisions:
- source_word: Λευὶ / Levi
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: nombre propio
  rationale: Se conserva el nombre bíblico en forma española habitual con tilde para respetar la acentuación del español y mantener identificación clara del personaje.
- source_word: περιβαλλόμενος σάκκον
  english_pob_choice: clothed in sackcloth
  chosen_spanish: vestido de cilicio
  alternatives_spanish:
  - cubierto de cilicio
  - vestido de saco
  lexicon: σάκκος
  rationale: σάκκον designa el vestido de duelo/humillación, por lo que 'cilicio' transmite el sentido tradicional en español bíblico sin perder el matiz penitencial; 'vestido de' reproduce el participio pasivo de manera natural.
- source_word: ἐδέετο
  english_pob_choice: prayed
  chosen_spanish: oraba
  alternatives_spanish:
  - rogaba
  - oró
  - suplicaba
  lexicon: δέομαι
  rationale: El imperfecto sugiere una acción continua o reiterada; 'oraba' conserva bien esa duratividad en español y es idiomático.
- source_word: τοῦ Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - a Yahvé
  - al Señor Dios
  lexicon: κύριος
  rationale: Aunque la política general del proyecto favorece 'Yahvé' para el nombre divino, aquí el texto griego usa κύριος sin una forma explícita del Tetragrámaton. En este contexto narrativo, 'Señor' refleja con fidelidad la forma del texto fuente y la fórmula de oración directa.
theological_decisions:
- issue: Tratamiento de τοῦ Κυρίου en una oración dirigida a Dios
  english_pob_reading: prayed to the Lord
  chosen_spanish_reading: oraba al Señor
  alternative_spanish_readings:
  - oraba a Yahvé
  - oraba al Señor Dios
  rationale: La lectura inglesa no introduce un glosado del nombre divino sino la designación relacional 'the Lord'. En español, 'al Señor' preserva esa relación de súplica sin afirmar más de lo que el griego explicita.
  doctrine_reference: Uso reverente del título divino en narrativa de oración; no implica una negación del nombre divino en otros contextos.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; este borrador sigue la lectura estable del inglés POB y el griego sin introducir alteraciones textuales.
  spanish_consistency_notes:
  - Se mantiene una cadencia breve y narrativa acorde con el versículo fuente.
  - '''cilicio'' se usa en sentido bíblico de prenda de luto/penitencia, no como mero ascetismo posterior.'
  - No se añade puntuación exegética ni expansión explicativa que no esté respaldada por el original.
