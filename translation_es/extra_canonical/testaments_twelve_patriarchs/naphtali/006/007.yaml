translation:
  language: es
  text: Y fuimos dispersados todos hasta los confines de la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ διεσπάρημεν πάντες
  english_pob_choice: And we were scattered, all of us
  chosen_spanish: Y fuimos dispersados todos
  alternatives_spanish:
  - Y todos fuimos dispersados
  - Y fuimos esparcidos todos
  lexicon: διασπείρω
  rationale: El verbo griego expresa ser dispersados/esparcidos; «dispersados» conserva mejor la idea de desintegración del grupo que una paráfrasis más libre. «Todos» reproduce πάντες con fuerza inclusiva, sin añadir matices ajenos.
- source_word: εἰς τὰ πέρατα τῆς γῆς
  english_pob_choice: to the ends of the earth
  chosen_spanish: hasta los confines de la tierra
  alternatives_spanish:
  - hasta los extremos de la tierra
  - hasta los límites de la tierra
  lexicon: πέρατα τῆς γῆς
  rationale: «Confines» es una forma natural y solemne en español para πέρατα, manteniendo la imagen espacial de extensión total. «De la tierra» preserva el genitivo literal sin convertirlo en una expresión meramente idiomática.
theological_decisions:
- issue: Imagen de dispersión total del pueblo
  english_pob_reading: And we were scattered, all of us, to the ends of the earth.
  chosen_spanish_reading: Y fuimos dispersados todos hasta los confines de la tierra.
  alternative_spanish_readings:
  - Y todos fuimos dispersados hasta los extremos de la tierra.
  rationale: No se introduce interpretación adicional; se mantiene la imagen de exilio o dispersión total tal como la expresa el griego y como la vierte la POB en inglés. No hay motivo para atenuar el alcance universal de «todos» ni para espiritualizar el destino.
  doctrine_reference: Exilio/dispersión como lenguaje histórico y colectivo, no alegorización
translation_notes:
  revision_awareness: El texto griego presenta una línea breve y estable; la versión inglesa POB no añadió notas ni decisiones léxicas especiales, y el pasaje no muestra variantes teológicas que requieran comentario adicional. Se conserva la estructura simple del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el tetragrámaton; aquí no está presente.
  - Se usa «dispersados» en concordancia con el sentido pasivo del aoristo griego.
  - «Confines de la tierra» es una formulación bíblica clara y natural en español, coherente con el tono de la serie.
