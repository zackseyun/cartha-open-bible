translation:
  language: es
  text: Pero José se fue en una pequeña barca, y nosotros fuimos separados en nueve tablas; y Leví y Judá estaban juntos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ δὲ Ἰωσὴφ ... ἐπὶ ἀκατίῳ ἐπορεύθη
  english_pob_choice: Joseph went away on a small boat
  chosen_spanish: José se fue en una pequeña barca
  alternatives_spanish:
  - José se fue en un pequeño bote
  - José partió en una pequeña embarcación
  lexicon: ἀκάτιον
  rationale: ἀκάτιον designa una embarcación pequeña; «barca» comunica bien en español neutral una nave pequeña sin sobreactuar el matiz técnico. Mantengo el movimiento simple de ἐπορεύθη como «se fue», acorde con el POB inglés y con el tono narrativo breve del griego.
- source_word: διεχωρίσθημεν ἐπὶ σανίδων ἐννέα
  english_pob_choice: we were separated on nine planks
  chosen_spanish: fuimos separados en nueve tablas
  alternatives_spanish:
  - fuimos divididos sobre nueve tablas
  - nos separamos en nueve tablas
  lexicon: σανίς
  rationale: σανίδες son «tablas» o «tablones»; «tablas» es natural y transparente en español. Conservo «separados/fuimos separados» para reflejar διεχωρίσθημεν y la imagen de estar dispersos sobre las tablas.
- source_word: Λευὶ δὲ καὶ Ἰούδας ἦσαν ἐπὶ τὸ αὐτό
  english_pob_choice: Levi and Judah were together
  chosen_spanish: Leví y Judá estaban juntos
  alternatives_spanish:
  - Leví y Judá estaban en el mismo lugar
  - Leví y Judá estaban unidos
  lexicon: ἐπὶ τὸ αὐτό
  rationale: La expresión griega indica estar juntos o en el mismo sitio. «Estaban juntos» reproduce bien la idea sin añadir una inferencia más fuerte que la evidencia textual.
translation_notes:
  revision_awareness: The latest revision pass marked the English POB rendering as unchanged, so the Spanish draft follows the established optimal-equivalence sense closely without introducing new interpretive moves.
  spanish_consistency_notes:
  - Mantengo «José» para Ἰωσὴφ, y «Leví»/«Judá» con la ortografía española usual.
  - Uso «barca» y «tablas» como equivalentes naturales de las imágenes náuticas del griego, sin convertirlas en términos más técnicos que el texto no exige.
  - No se añaden notas porque el verso es breve y la puntuación del sentido queda suficientemente clara en la línea principal.
