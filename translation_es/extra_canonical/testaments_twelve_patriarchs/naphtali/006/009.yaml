source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 9. Ὡς δὲ ἐπαύσατο ὁ χειμών, *ἔφθασε τὸ σκάφος ἐπὶ τῆς γῆς⁴⁶, Γὥσπερ⁴⁷ ἐν εἰρήνῃ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/006/009.yaml
  text: And when the winter ceased, the ship came to the land, as it were in peace.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:00Z'
    unchanged: false
    changes_summary: Changed 'storm' to 'winter' to match χειμών, and 'reached' to 'came to' for closer correspondence with ἔφθασε.
translation:
  language: es
  text: Y cuando cesó el invierno, la nave llegó a la tierra, como en paz.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ χειμών
  english_pob_choice: the winter
  chosen_spanish: el invierno
  alternatives_spanish:
  - la tempestad
  - la tormenta
  lexicon: χειμών
  rationale: El griego χειμών designa aquí el invierno; la revisión inglesa corrigió 'storm' a 'winter'. En español, 'invierno' preserva el valor temporal y atmosférico sin introducir una imagen ajena al texto.
- source_word: ἔφθασε
  english_pob_choice: the ship came to the land
  chosen_spanish: la nave llegó a la tierra
  alternatives_spanish:
  - la nave vino a la tierra
  - la nave alcanzó la tierra
  lexicon: φθάνω
  rationale: El verbo expresa llegada/alcance. 'Llegó' mantiene la correspondencia directa con la revisión inglesa 'came to' y evita la sobreinterpretación de 'alcanzó'.
- source_word: τὸ σκάφος
  english_pob_choice: the ship
  chosen_spanish: la nave
  alternatives_spanish:
  - el barco
  - la embarcación
  lexicon: σκάφος
  rationale: σκάφος es una embarcación; 'nave' es natural en español bíblico y suficientemente general para conservar el tono del relato sin cargarlo con modernidad excesiva.
- source_word: ἐν εἰρήνῃ
  english_pob_choice: as it were in peace
  chosen_spanish: como en paz
  alternatives_spanish:
  - como si estuviera en paz
  - en paz, por así decirlo
  lexicon: εἰρήνη
  rationale: La construcción griega indica una comparación o modo aproximado. 'Como en paz' conserva el matiz de 'as it were' sin añadir palabras innecesarias, aunque deja abierta la lectura adverbial de tranquilidad.
theological_decisions:
- issue: Matiz comparativo de ἐν εἰρήνῃ
  english_pob_reading: as it were in peace
  chosen_spanish_reading: como en paz
  alternative_spanish_readings:
  - como si estuviera en paz
  - en paz, por así decirlo
  rationale: No se fuerza una afirmación dogmática; se conserva el tono comparativo del griego y del inglés revisado. La frase comunica quietud o conclusión apacible sin precisar más de lo que el texto da.
  doctrine_reference: No doctrinal issue; stylistic/thematic nuance only.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió 'storm' a 'winter' para ajustarse a χειμών y cambió 'reached' por 'came to' para acercarse a ἔφθασε. La versión española sigue esas decisiones y mantiene el matiz comparativo de ἐν εἰρήνῃ sin ampliarlo.
  spanish_consistency_notes:
  - Se usa 'nave' para σκάφος en un registro bíblico sobrio.
  - Se evita 'tormenta' porque el griego y la revisión inglesa apuntan a 'invierno'.
  - Se mantiene 'tierra' como destino literal del barco; no se glosa como 'orilla' porque el griego dice γῆς.
