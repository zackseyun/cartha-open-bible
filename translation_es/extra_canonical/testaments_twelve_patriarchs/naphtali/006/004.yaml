  text: 4. *Ὡς δὲ ἡμεῖς εἰσήλθομεν¹⁶ γίνεται¹⁷ χειμὼν σφοδρός¹⁸, καὶ λαῖλαψ ἀνέμου¹⁹ μέγας²⁰, καὶ ἀφίσταται²¹ ὁ πατὴρ ἡμῶν²² ἀφʼ ἡμῶν, ὁ²³ κρατῶν *τοὺς αὐχένας²⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/006/004.yaml
  text: And when we had entered, a violent storm arose, and a whirlwind of wind; and our father withdrew from us, holding the rudders.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:00Z'
    unchanged: false
    changes_summary: Removed the bracketed note, kept the storm imagery, and changed 'was separated from us' to 'withdrew from us' to better reflect ἀφίσταται. Preserved the clause about holding the rudders.
translation:
  language: es
  text: Y cuando habíamos entrado, se levantó una tormenta violenta, y un torbellino de viento; y nuestro padre se apartó de nosotros, sosteniendo los timones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὡς δὲ ἡμεῖς εἰσήλθομεν
  english_pob_choice: And when we had entered
  chosen_spanish: Y cuando habíamos entrado
  alternatives_spanish:
  - Y cuando entramos
  - Y al haber entrado
  lexicon: εἰσέρχομαι
  rationale: Mantiene la relación temporal pasada completa del griego sin volverlo demasiado literario. «Habíamos entrado» refleja bien el valor anterior al evento principal.
- source_word: γίνεται χειμὼν σφοδρός
  english_pob_choice: a violent storm arose
  chosen_spanish: se levantó una tormenta violenta
  alternatives_spanish:
  - surgió una tormenta violenta
  - se desató una tormenta violenta
  lexicon: χειμών
  rationale: «Se levantó» comunica el inicio repentino del temporal de forma natural en español y corresponde al valor narrativo del griego.
- source_word: λαῖλαψ ἀνέμου μέγας
  english_pob_choice: a whirlwind of wind
  chosen_spanish: un torbellino de viento
  alternatives_spanish:
  - una gran ráfaga de viento
  - un vendaval grande
  lexicon: λαῖλαψ
  rationale: La imagen griega es redundante e intensificada; «torbellino de viento» conserva la fuerza imagética sin sonar mecánico.
- source_word: ἀφίσταται ὁ πατὴρ ἡμῶν ἀφʼ ἡμῶν
  english_pob_choice: our father withdrew from us
  chosen_spanish: nuestro padre se apartó de nosotros
  alternatives_spanish:
  - nuestro padre se retiró de nosotros
  - nuestro padre se alejó de nosotros
  lexicon: ἀφίσταμαι
  rationale: La revisión inglesa prefirió «withdrew from us» para reflejar ἀφίσταται; en español, «se apartó de nosotros» conserva esa idea de retirarse/alejarse sin sugerir necesariamente separación pasiva.
- source_word: ὁ κρατῶν τοὺς αὐχένας
  english_pob_choice: holding the rudders
  chosen_spanish: sosteniendo los timones
  alternatives_spanish:
  - aferrando los timones
  - teniendo los timones
  lexicon: αὐχήν
  rationale: El griego literalmente dice «los cuellos/mangones» de la nave, pero el POB inglés tomó la lectura navegacional «rudders». En español, «timones» mantiene esa decisión interpretativa de forma clara y auditable.
theological_decisions:
- issue: Imagen náutica aplicada al padre
  english_pob_reading: our father withdrew from us, holding the rudders
  chosen_spanish_reading: nuestro padre se apartó de nosotros, sosteniendo los timones
  alternative_spanish_readings:
  - nuestro padre se retiró de nosotros, sosteniendo los timones
  - nuestro padre nos dejó, sosteniendo los timones
  rationale: No hay cambio doctrinal; se conserva la escena y la acción concreta del padre como timonel. «Se apartó» evita sobreactuar la carga afectiva o narrativa más allá del texto fuente.
  doctrine_reference: Narrativa descriptiva; sin implicación doctrinal específica
translation_notes:
  revision_awareness: La revisión reciente del inglés eliminó una nota anterior y sustituyó «was separated from us» por «withdrew from us» para reflejar mejor ἀφίσταται. La traducción española sigue esa lectura revisada y mantiene la imagen marítima de los timones.
  spanish_consistency_notes:
  - Se mantiene «tormenta violenta» para χειμών σφοδρός en lugar de explicitar fenómenos meteorológicos distintos.
  - Se evita «SEÑOR» u otras convenciones litúrgicas porque el pasaje no contiene vocabulario divino.
  - «Timones» refleja la decisión ya fijada en el audit trail inglés para αὐχένας, aunque el término griego sea literalmente más corporal o técnico.
