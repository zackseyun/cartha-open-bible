revisions:
- from: Y cuando habíamos entrado, se levantó una tormenta violenta, y un torbellino de viento; y nuestro padre se apartó de nosotros, sosteniendo los timones.
  to: Y cuando entramos, se desató una tormenta violenta, y un gran torbellino de viento; y nuestro padre se apartó de nosotros, sosteniendo los timones.
  rationale: La revisión mejora la naturalidad del español narrativo sin apartarse del griego ni del rastro auditado en inglés. «Cuando entramos» expresa adecuadamente la acción previa en contexto secuencial; «se desató» y «un gran torbellino de viento» conservan e intensifican la escena de temporal; el resto se mantiene por fidelidad al sentido fuente.
