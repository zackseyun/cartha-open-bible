  text: 5. Καὶ²⁵ ἡμεῖς²⁶ χειμαζόμενοι ἐπὶ τὸ πέλαγος *ἐφερόμεθα, καὶ²⁷ ἐπληρώθη τὸ πλοῖον ὑδάτων²⁸, *ἐν τρικυμίαις²⁹ περιρησσόμενον³⁰, ὥστε³¹ *καὶ συντρίβεσθαι³² αὐτό³³.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/006/005.yaml
  text: And we, being storm-tossed on the sea, were being driven over the waters, and the ship was filled and battered in the storms, so that it was in danger of breaking apart.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:00Z'
    unchanged: false
    changes_summary: 'Adjusted wording for closer lexical match to the Greek: rendered ἐπὶ τὸ πέλαγος as ''on the sea,'' ἐφερόμεθα as ''were being driven,'' retained the ship being ''filled,'' and rendered ἐν τρικυμίαις more directly as ''in the storms'' while preserving the clause about impending breakup.'
translation:
  language: es
  text: Y nosotros, siendo sacudidos por la tempestad en el mar, éramos arrastrados sobre las aguas, y la nave se llenó y era golpeada por las tormentas, de modo que corría peligro de quebrarse.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χειμαζόμενοι
  english_pob_choice: being storm-tossed
  chosen_spanish: siendo sacudidos por la tempestad
  alternatives_spanish:
  - sacudidos por la tempestad
  - azotados por la tempestad
  lexicon: χειμάζω
  rationale: Mantiene la imagen de sufrir el embate violento del mar; «sacudidos por la tempestad» comunica con naturalidad el participio pasivo y el tono marítimo sin añadir una explicación ajena al griego.
- source_word: ἐπὶ τὸ πέλαγος
  english_pob_choice: on the sea
  chosen_spanish: en el mar
  alternatives_spanish:
  - sobre el mar
  - sobre las aguas
  lexicon: πέλαγος
  rationale: El griego habla del mar abierto; «en el mar» es la forma más natural y fiel en español. Se evita «sobre» porque en español puede sonar artificial fuera de una imagen poética muy marcada.
- source_word: ἐφερόμεθα
  english_pob_choice: were being driven
  chosen_spanish: éramos arrastrados
  alternatives_spanish:
  - éramos llevados
  - nos dejábamos llevar
  lexicon: φέρω (pasivo/imperfecto)
  rationale: Conserva la pasividad y el movimiento forzado indicado por el imperfecto pasivo. «Arrastrados» expresa mejor la falta de control que «llevados».
- source_word: ἐπληρώθη τὸ πλοῖον ὑδάτων
  english_pob_choice: the ship was filled
  chosen_spanish: la nave se llenó
  alternatives_spanish:
  - el barco se llenó
  - la nave quedó llena de agua
  lexicon: πλοῖον / πληρόω
  rationale: «Nave» conserva un registro digno y bíblico, y «se llenó» refleja el pasivo sin forzar una explicitación que el griego no da en esa forma exacta. En español, el contexto marítimo deja implícito que se llenó de agua.
- source_word: ἐν τρικυμίαις
  english_pob_choice: in the storms
  chosen_spanish: era golpeada por las tormentas
  alternatives_spanish:
  - entre las tormentas
  - en medio de las tormentas
  lexicon: τρικυμία
  rationale: El sustantivo plural señala violentas borrascas o tempestades del mar. Aunque el inglés POB opta por «in the storms», en español conviene integrar la idea de ser golpeada para reflejar περιρησσόμενον y no suavizar la intensidad.
- source_word: περιρησσόμενον
  english_pob_choice: battered
  chosen_spanish: era golpeada
  alternatives_spanish:
  - era sacudida
  - era azotada
  lexicon: περιρήγνυμι / περιρρήγνυμι
  rationale: La idea central es recibir golpes repetidos y violentos. «Era golpeada» mantiene la acción continua del participio y es inteligible; «azotada» también sería posible, pero puede sonar más literaria.
- source_word: συντρίβεσθαι
  english_pob_choice: breaking apart
  chosen_spanish: quebrarse
  alternatives_spanish:
  - deshacerse
  - romperse en pedazos
  lexicon: συντρίβω
  rationale: «Quebrarse» conserva la imagen de fractura inminente sin exagerar hacia una fragmentación explícita que el verbo griego no exige. La frase anterior («corría peligro de») expresa adecuadamente la tensión del infinitivo de resultado.
theological_decisions:
- issue: Representación del peligro extremo sin añadir desenlace
  english_pob_reading: it was in danger of breaking apart
  chosen_spanish_reading: corría peligro de quebrarse
  alternative_spanish_readings:
  - estaba a punto de romperse
  - estaba en peligro de partirse
  rationale: El griego indica posibilidad inminente o resultado amenazado, no el hecho consumado. «Corría peligro de» preserva esa tensión sin convertirla en certeza.
  doctrine_reference: Fidelidad al aspecto y al valor resultativo del infinitivo griego.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del texto inglés, que afinó ἐπὶ τὸ πέλαγος como «on the sea», ἐφερόμεθα como «were being driven», y ἐν τρικυμίαις como «in the storms». La versión española sigue esa mayor cercanía léxica, pero adapta la sintaxis para sonar natural y mantener el paralelismo del período griego.
  spanish_consistency_notes:
  - Se mantuvo «nave» como equivalente digno y consistente para πλοῖον en este contexto.
  - Se evitó introducir «mar embravecido» porque el griego ya distribuye la intensidad entre χειμαζόμενοι, ἐφερόμεθα y περιρησσόμενον.
  - No se usó «SEÑOR» ni terminología teológica ajena al pasaje, ya que no aparecen términos divinos en este versículo.
