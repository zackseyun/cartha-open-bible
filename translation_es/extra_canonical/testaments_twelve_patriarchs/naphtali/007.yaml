base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/007.yaml
  text: '1[a]. I told these two dreams to my father, and he said to me, “These things must be fulfilled in their appointed times, after Israel has endured much.”


    2. Then my father said to me[b], “I believe God that Joseph is alive; for I always see that the Lord counts him as being with us.”


    3. And weeping he said, “Alas, my child Joseph, you are alive, and I do not see you; and you do not see Jacob, the one who fathered you.”


    4. So by these words he made me weep also. But I was burning in my inward parts to tell him that Joseph had been sold[c], yet I was afraid of my brothers.'
  footnotes:
  - marker: a
    text: Or, 'in their seasons.' The Greek καιροί can denote fitting or appointed times.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'counts him as being with us' may also be rendered 'numbers him among us' or 'considers him with us.'
    reason: lexical_alternative
  - marker: c
    text: The expression 'I was burning in my inward parts' reflects a visceral Greek idiom for intense inner distress.
    reason: cultural_note
