translation:
  language: es
  text: "1[a]. Les conté estos dos sueños a mi padre, y él me dijo: «Estas cosas deben cumplirse en sus tiempos señalados, después de que Israel haya soportado mucho».\n\n\n    2. Entonces mi padre me dijo[b]: «Creo a Dios que José está vivo; porque siempre veo que el Señor lo cuenta entre nosotros».\n\n\n    3. Y llorando dijo: «¡Ay, hijo mío José, vives, y no te veo; y tú no ves a Jacob, el que te engendró!»\n\n\n    4. Así, con estas palabras, me hizo llorar también. Pero ardía en mis entrañas por decirle que José había sido vendido[c]; pero temía a mis hermanos."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «en sus estaciones». El griego καιροί puede referirse a momentos oportunos o señalados, no solo a cronología.
    reason: lexical_alternative
  - marker: b
    text: La expresión «lo cuenta entre nosotros» puede también verterse como «lo considera con nosotros» o «lo incluye en nuestro número».
    reason: lexical_alternative
  - marker: c
    text: La expresión «ardía en mis entrañas» refleja un modismo griego visceral para un malestar interior intenso.
    reason: cultural_note
lexical_decisions:
- source_word: ἐνύπνια
  english_pob_choice: dreams
  chosen_spanish: sueños
  alternatives_spanish:
  - visiones
  lexicon: LSJ
  rationale: «Sueños» es el equivalente ordinario y más natural en español para ἐνύπνια; «visiones» elevaría el registro sin apoyo inmediato del contexto.
- source_word: δεῖ ... πληρωθῆναι
  english_pob_choice: must be fulfilled
  chosen_spanish: deben cumplirse
  alternatives_spanish:
  - deben realizarse
  - deben llegar a cumplirse
  lexicon: BDAG
  rationale: «Deben cumplirse» conserva la necesidad del verbo δεῖ y la idea de realización/consumación de πληρωθῆναι sin forzar un tecnicismo profético ajeno al español claro.
- source_word: κατὰ τοὺς καιροὺς
  english_pob_choice: in their appointed times
  chosen_spanish: en sus tiempos señalados
  alternatives_spanish:
  - en sus estaciones
  - en sus tiempos oportunos
  lexicon: BDAG
  rationale: «Tiempos señalados» comunica la noción de momentos fijados u ordenados, que el inglés POB expresa como appointed times, mejor que un simple «tiempos».
- source_word: ὑπομείναντος
  english_pob_choice: has endured
  chosen_spanish: haya soportado
  alternatives_spanish:
  - haya perseverado
  - haya sufrido
  lexicon: BDAG
  rationale: En este contexto, el matiz es resistencia bajo carga o aflicción; «soportado» mantiene la dureza del proceso sin añadir paciencia explícita.
- source_word: πιστεύω τῷ θεῷ
  english_pob_choice: I believe God
  chosen_spanish: Le creo a Dios
  alternatives_spanish:
  - Creo a Dios
  - Confío en Dios
  lexicon: BDAG
  rationale: La dativa con πιστεύω se rinde de forma más precisa como «creerle a»; así se preserva la confianza en lo que Dios dice, no solo una afirmación general sobre su existencia.
- source_word: ζῇ
  english_pob_choice: is alive
  chosen_spanish: vive
  alternatives_spanish:
  - está vivo
  lexicon: BDAG
  rationale: «Vive» es natural y directo en la exclamación de Jacob; mantiene el contraste entre vida y muerte sin sobrecargar el español.
- source_word: ὁρῶ γὰρ ⌜πάντοτε⌝ ὅτι Κύριος ἀριθμεῖ αὐτὸν μεθʼ ἡμῶν
  english_pob_choice: for I always see that the Lord counts him as being with us
  chosen_spanish: porque siempre veo que el Señor lo cuenta como estando con nosotros
  alternatives_spanish:
  - porque siempre veo que el Señor lo numera entre nosotros
  - porque siempre veo que el Señor lo considera con nosotros
  lexicon: LSJ
  rationale: «Lo cuenta como estando con nosotros» conserva la imagen idiomática de ἀριθμεῖ sin resolverla demasiado; el verbo «contar» permite la ambigüedad entre número, reconocimiento y pertenencia.
- source_word: Οἴμοι
  english_pob_choice: Alas
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de mí!
  - ¡Ay, hijo mío!
  lexicon: LSJ
  rationale: La interjección luctuosa se expresa de manera más natural en español con «¡Ay!», manteniendo el tono de lamento.
- source_word: τὸν γεννήσαντά σε
  english_pob_choice: the one who fathered you
  chosen_spanish: el que te engendró
  alternatives_spanish:
  - el que te engendró como padre
  - quien te dio vida
  lexicon: BDAG
  rationale: «Engendró» conserva el vínculo paternal de γεννάω y suena más fiel que una expansión interpretativa; el español permite el verbo sin perder claridad.
- source_word: ἐκαιόμην τοῖς σπλάγχνοις
  english_pob_choice: I was burning in my inward parts
  chosen_spanish: ardía en mis entrañas
  alternatives_spanish:
  - me consumía por dentro
  - ardía en mi interior
  lexicon: BDAG
  rationale: «Entrañas» transmite bien el idioma visceral de σπλάγχνα y evita aplanarlo a una emoción genérica; además suena bíblico sin ser arcaizante en exceso.
- source_word: πέπραται
  english_pob_choice: had been sold
  chosen_spanish: había sido vendido
  alternatives_spanish:
  - fue vendido
  - ha sido vendido
  lexicon: BDAG
  rationale: El pluscuamperfecto mantiene el valor retrospectivo del relato; «vendido» preserva el hecho concreto de la venta de José.
theological_decisions:
- issue: Necesidad y cumplimiento de las cosas soñadas
  english_pob_reading: These things must be fulfilled in their appointed times
  chosen_spanish_reading: Estas cosas deben cumplirse en sus tiempos señalados
  alternative_spanish_readings:
  - Estas cosas deben suceder en sus estaciones
  - Estas cosas deben llegar a cumplirse en su momento
  rationale: La formulación conserva tanto la necesidad divina como el sentido de cumplimiento providencial sin introducir una explicación doctrinal ajena al texto.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
- issue: Valor de πιστεύω τῷ θεῷ
  english_pob_reading: I believe God
  chosen_spanish_reading: Le creo a Dios
  alternative_spanish_readings:
  - Creo a Dios
  - Confío en Dios
  rationale: 'La versión española mantiene la fuerza relacional del dativo: Jacob no expresa solo una creencia abstracta, sino que acepta como verdadero lo que Dios revela o dispone.'
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
- issue: Sentido de ἀριθμεῖ αὐτὸν μεθʼ ἡμῶν
  english_pob_reading: the Lord counts him as being with us
  chosen_spanish_reading: el Señor lo cuenta como estando con nosotros
  alternative_spanish_readings:
  - el Señor lo cuenta entre nosotros
  - el Señor lo considera con nosotros
  rationale: Se preserva la ambigüedad entre contar, numerar y considerar, porque el griego es idiomático y el POB inglés decidió no cerrarla del todo.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
translation_notes:
  revision_awareness: 'Se siguió la última pasada revisada sin cambios: no hubo revisiones aplicadas, y la redacción española se ajusta directamente al texto griego con el apoyo del análisis lexical y teológico del POB inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero aquí el texto griego emplea Κύριος y el contexto inmediato del testamento cita el habla de Jacob sin una necesidad textual de explicitar el nombre; por eso se mantiene «el Señor» conforme al audit trail inglés.
  - Se mantiene «José» para Ἰωσήφ como nombre propio estándar en español.
  - Se conserva el registro narrativo y emocional sin suavizar el lamento.
  - Se evita «Cristo», «SEÑOR» en mayúsculas y otros sustitutos no requeridos por el texto fuente.
