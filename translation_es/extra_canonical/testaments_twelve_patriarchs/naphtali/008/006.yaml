id: T12P.NAP.8.6
reference: Testament of Naphtali 8:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 6. Τὸν δὲ μὴ *ποιοῦντα τὸ³⁸ καλόν, καταράσονται αὐτὸν³⁹ καὶ⁴⁰ *οἱ ἄγγελοι καὶ οἱ ἄνθρωποι⁴¹, *καὶ ὁ Θεὸς ἀδοξήσει ἐν τοῖς ἔθνεσιν διʼ αὐτοῦ⁴², *καὶ ὁ⁴³ διάβολος οἰκειοῦται *αὐτὸν ὡς ἴδιον σκεῦος⁴⁴, καὶ πᾶν θηρίον κατακυριεύσει αὐτῷ⁴⁵, καὶ⁴⁶ ὁ Κύριος μισήσει αὐτόν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/008/006.yaml
  text: But the one who does not do good, angels and men will curse him, and God will be dishonored among the nations through him, and the devil claims him as his own vessel, and every wild beast will lord it over him, and the Lord will hate him.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:20Z'
    unchanged: false
    changes_summary: Simplified 'does not do what is good' to 'does not do good' for closer alignment with the Greek while preserving natural formal English. No other changes needed.
translation:
  language: es
  text: Pero el que no hace el bien[a], a ese lo maldecirán ángeles y hombres, y Dios será deshonrado entre las naciones por medio de él, y el diablo lo reclama como su propio vaso, y toda bestia salvaje se enseñoreará de él, y el Señor lo aborrecerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “el bien”. La fórmula conserva la abstracción del griego τὸ καλόν y la simplificación del texto inglés revisado (“does not do good”).
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ποιοῦντα τὸ καλόν
  english_pob_choice: does not do good
  chosen_spanish: no hace el bien
  alternatives_spanish:
  - no practica el bien
  - no hace lo bueno
  lexicon: ποιέω; τὸ καλόν
  rationale: Mantiene la brevedad y la fuerza moral del griego, alineada con la revisión inglesa que simplificó a 'does not do good'. 'El bien' conserva el sustantivo abstracto sin añadir interpretaciones.
- source_word: καταράσονται
  english_pob_choice: will curse him
  chosen_spanish: lo maldecirán
  alternatives_spanish:
  - lo condenarán
  - lo jurarán mal
  lexicon: καταράομαι
  rationale: '''Maldecir'' es el equivalente directo y transparente en español para la acción de pronunciar maldición.'
- source_word: οἱ ἄγγελοι καὶ οἱ ἄνθρωποι
  english_pob_choice: angels and men
  chosen_spanish: ángeles y hombres
  alternatives_spanish:
  - ángeles y seres humanos
  - ángeles y personas
  lexicon: ἄγγελος; ἄνθρωπος
  rationale: Conserva la oposición amplia del texto y su paralelismo simple.
- source_word: ἀδοξήσει
  english_pob_choice: will be dishonored
  chosen_spanish: será deshonrado
  alternatives_spanish:
  - será avergonzado
  - perderá honor
  lexicon: ἀδοξέω
  rationale: '''Deshonrado'' expresa la pérdida de honra/gloria sin cambiar el sentido de la pasiva.'
- source_word: ἐν τοῖς ἔθνεσιν διʼ αὐτοῦ
  english_pob_choice: among the nations through him
  chosen_spanish: entre las naciones por medio de él
  alternatives_spanish:
  - entre las naciones a causa de él
  - entre las naciones por su causa
  lexicon: ἔθνη; διά + genitivo
  rationale: '''Por medio de él'' reproduce la mediación causal/instrumental que el griego sugiere y que el inglés POB también preserva con ''through him''.'
- source_word: ὁ διάβολος οἰκειοῦται αὐτὸν ὡς ἴδιον σκεῦος
  english_pob_choice: the devil claims him as his own vessel
  chosen_spanish: el diablo lo reclama como su propio vaso
  alternatives_spanish:
  - el diablo lo toma como su propia vasija
  - el diablo lo reclama como su propio instrumento
  lexicon: διάβολος; οἰκειόω; σκεῦος
  rationale: '''Reclama'' conserva la apropiación personal; ''vaso'' mantiene la metáfora literal de σκεῦος sin suavizarla a ''instrumento'', que diluiría la imagen. Se conserva el reto semántico del original.'
- source_word: πᾶν θηρίον κατακυριεύσει αὐτῷ
  english_pob_choice: every wild beast will lord it over him
  chosen_spanish: toda bestia salvaje se enseñoreará de él
  alternatives_spanish:
  - toda bestia salvaje dominará sobre él
  - toda fiera se enseñoreará de él
  lexicon: θηρίον; κατακυριεύω
  rationale: '''Se enseñoreará de'' es una forma española natural y fuerte para κατακυριεύω, conservando la idea de dominio abusivo.'
- source_word: ὁ Κύριος μισήσει αὐτόν
  english_pob_choice: the Lord will hate him
  chosen_spanish: el Señor lo aborrecerá
  alternatives_spanish:
  - el Señor lo odiará
  - el Señor le tendrá aversión
  lexicon: Κύριος; μισέω
  rationale: '''Aborrecer'' transmite con fuerza el rechazo expresado por μισέω sin recurrir a un calco menos idiomático.'
theological_decisions:
- issue: Divine name/title in Greek Κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: En este versículo el griego dice Κύριος, y la auditoría inglesa mantiene 'the Lord'. Dado que el contexto inmediato no marca aquí una cita explícita del Tetragrámaton, se conserva 'el Señor' como título reverencial en la parte final, evitando forzar una identificación que el audit trail no documenta.
  doctrine_reference: Uso titular de Κύριος; sensibilidad al Tetragrámaton en traducción
- issue: Metaphor of σκεῦος
  english_pob_reading: his own vessel
  chosen_spanish_reading: su propio vaso
  alternative_spanish_readings:
  - su propio instrumento
  - su propio recipiente
  rationale: Se preserva la metáfora corpórea/jurídica del texto, que el inglés POB también retiene. 'Vaso' es el término más cercano y tradicional en español bíblico para σκεῦος, sin borrar la imagen.
  doctrine_reference: Retención de metáfora léxica; no domesticación excesiva
translation_notes:
  revision_awareness: La revisión inglesa más reciente simplificó 'does not do what is good' a 'does not do good' para ajustarse más de cerca al griego. La versión española sigue esa simplificación con 'no hace el bien', manteniendo el tono formal y la estructura enumerativa del versículo sin introducir expansiones.
  spanish_consistency_notes:
  - Se mantuvo la secuencia coordinada del original con 'y' repetido para reflejar la acumulación retórica.
  - '''El Señor'' se usa aquí como título reverencial en coherencia con el inglés auditado, mientras ''Dios'' se mantiene para θεός.'
  - La metáfora de 'vaso' se conserva de manera explícita y sin eufemismo, conforme al audit trail del inglés POB.
