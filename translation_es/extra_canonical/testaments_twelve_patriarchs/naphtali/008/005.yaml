translation:
  language: es
  text: Como cuando alguien ha criado bien a un niño, tiene un buen recuerdo de él; así también, para una buena obra hay un buen recuerdo delante de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὡς ἄν τις τέκνου ἐκθρέψῃ καλῶς
  english_pob_choice: As when someone has reared a child well
  chosen_spanish: Como cuando alguien ha criado bien a un niño
  alternatives_spanish:
  - Como cuando alguno cría bien a un hijo
  - Así como alguien ha criado bien a un niño
  lexicon: Ὡς ἄν + subj.; τις; τέκνον; ἐκθρέψῃ; καλῶς
  rationale: Mantengo la comparación condicional con «Como cuando» y traduzco ἐκθρέψῃ por «ha criado» para conservar la idea de crianza/sustento, con «bien» para καλῶς. «Niño» es natural en español y preserva el sentido básico de τέκνον sin forzar una especificación filial que el griego no exige.
- source_word: μνείαν ἔχει καλήν
  english_pob_choice: he has a good remembrance of him
  chosen_spanish: tiene un buen recuerdo de él
  alternatives_spanish:
  - tiene buena memoria de él
  - guarda de él un buen recuerdo
  lexicon: μνείαν ἔχει καλήν
  rationale: «Recuerdo» comunica de manera clara y digna la noción de μνεία en español. Mantengo «de él» para reflejar el objeto implícito del recuerdo y evitar una paráfrasis más libre que el griego.
- source_word: ἐπὶ τοῦ καλοῦ ἔργου
  english_pob_choice: for a good work
  chosen_spanish: para una buena obra
  alternatives_spanish:
  - a causa de una buena obra
  - por una buena obra
  lexicon: ἐπὶ + gen.; καλός; ἔργον
  rationale: «Para» sigue la relación final/relacional del POB inglés y funciona naturalmente en español. «Buena obra» conserva el valor moral positivo de καλός sin introducir una terminología más técnica que el texto no demanda.
- source_word: μνήμη παρὰ Θεοῦ ἀγαθή
  english_pob_choice: there is a good remembrance before God
  chosen_spanish: hay un buen recuerdo delante de Dios
  alternatives_spanish:
  - hay una buena memoria ante Dios
  - hay un buen recuerdo ante Dios
  lexicon: μνήμη; παρὰ Θεοῦ; ἀγαθή
  rationale: «Delante de Dios» conserva el matiz espacial/relacional de παρὰ Θεοῦ en el POB inglés «before God». «Recuerdo» mantiene la correspondencia con μνήμη y «bueno» traduce ἀγαθή de forma directa y sobria.
theological_decisions:
- issue: El valor de la «memoria/recuerdo» ante Dios como reconocimiento positivo
  english_pob_reading: there is a good remembrance before God
  chosen_spanish_reading: hay un buen recuerdo delante de Dios
  alternative_spanish_readings:
  - hay una buena memoria ante Dios
  - hay un buen memorial ante Dios
  rationale: No convierto μνήμη en «memorial» porque el pasaje habla de rememoración o reputación positiva, no de un rito memorial explícito. «Delante de Dios» mantiene la orientación teológica relacional sin añadir una idea litúrgica que el texto no requiere.
  doctrine_reference: Providencia y juicio/divino recuerdo de las obras
translation_notes:
  revision_awareness: El pasaje coincide con la revisión más reciente indicada como sin cambios necesarios; por eso la redacción española sigue de cerca el sentido del texto griego y la solución inglesa auditada, sin introducir variantes textuales nuevas.
  spanish_consistency_notes:
  - He mantenido un registro sobrio y readable para lectura eclesial.
  - He evitado vocabulario fuertemente confesional donde el original solo dice «Dios» y no exige una formulación litúrgica adicional.
  - La puntuación reproduce la paralelismo del original con punto y coma para claridad en español.
