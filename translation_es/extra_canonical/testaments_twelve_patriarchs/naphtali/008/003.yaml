id: T12P.NAP.8.3
reference: Testament of Naphtali 8:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 3. Διὰ¹⁵ †τοῦ σκήπτρου αὐτοῦ¹⁶ ὀφθήσεται ὁ¹⁷ Θεὸς [κατοικῶν ἐν ἀνθρώποις¹⁸] ἐπὶ τῆς γῆς, τοῦ¹⁹ σῶσαι *τὸ γένος τοῦ²⁰ Ἰσραήλ, *καὶ ἐπισυνάξει²¹ δικαίους ἐκ τῶν²² ἐθνῶν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/008/003.yaml
  text: Through his scepter God will appear on the earth, dwelling among men, to save the people of Israel, and he will gather the righteous from among the nations.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:19Z'
    unchanged: false
    changes_summary: Changed 'race of Israel' to 'people of Israel' for more natural and accurate formal English; retained the rest as faithful and complete.
translation:
  language: es
  text: Por medio de su cetro, Dios aparecerá sobre la tierra, habitando entre los hombres, para salvar al pueblo de Israel, y reunirá a los justos de entre las naciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Διὰ ... σκήπτρου αὐτοῦ
  english_pob_choice: Through his scepter
  chosen_spanish: Por medio de su cetro
  alternatives_spanish:
  - A través de su cetro
  - Mediante su cetro
  lexicon: διά + genitivo; σκήπτρον
  rationale: Conservo la idea instrumental de διά con genitivo como medio por el cual ocurre la acción. 'Por medio de' suena natural en español y mantiene el valor causal/instrumental sin añadir matices no presentes.
- source_word: Θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Señor
  lexicon: θεός
  rationale: La referencia es directa a Dios; 'Dios' es la forma natural y fiel en español. No se introduce 'Señor' porque el griego aquí dice Θεός, no κύριος.
- source_word: κατοικῶν ἐν ἀνθρώποις
  english_pob_choice: dwelling among men
  chosen_spanish: habitando entre los hombres
  alternatives_spanish:
  - viviendo entre los hombres
  - morando entre los hombres
  lexicon: κατοικέω + ἐν
  rationale: '''Habitando entre los hombres'' conserva el sentido de residencia/presencia continua y mantiene la formulación tradicionalmente inteligible en español sin volverla arcaica.'
- source_word: τὸ γένος τοῦ Ἰσραήλ
  english_pob_choice: the people of Israel
  chosen_spanish: el pueblo de Israel
  alternatives_spanish:
  - la raza de Israel
  - la descendencia de Israel
  lexicon: γένος
  rationale: Sigo la revisión inglesa que corrigió 'race' a 'people'. 'Pueblo' en español evita la dureza o ambigüedad biológica de 'raza' y refleja adecuadamente el colectivo de Israel que el contexto pretende salvar.
- source_word: ἐπισυνάξει
  english_pob_choice: he will gather
  chosen_spanish: reunirá
  alternatives_spanish:
  - congregará
  - juntará
  lexicon: ἐπισυνάγω
  rationale: '''Reunirá'' comunica bien la acción de congregar sin sonar demasiado técnico. Mantiene la fuerza de un reunir escatológico o corporativo sin sobreinterpretar.'
- source_word: δικαίους
  english_pob_choice: the righteous
  chosen_spanish: a los justos
  alternatives_spanish:
  - a los rectos
  - a los que son justos
  lexicon: δίκαιος
  rationale: '''Los justos'' es la equivalencia natural y estable para δικαίοι en este tipo de contexto. Preserva el sentido moral/covenantal sin ampliar a una explicación doctrinal no explícita en el verso.'
- source_word: ἐκ τῶν ἐθνῶν
  english_pob_choice: from among the nations
  chosen_spanish: de entre las naciones
  alternatives_spanish:
  - de las naciones
  - entre las naciones
  lexicon: ἔθνη
  rationale: '''De entre las naciones'' conserva el matiz de extracción desde dentro de los pueblos/gentiles, más preciso que un simple ''de las naciones'' y coherente con el inglés auditado.'
theological_decisions:
- issue: Presencia divina mediada por el cetro/mesianismo real
  english_pob_reading: Through his scepter God will appear on the earth
  chosen_spanish_reading: Por medio de su cetro, Dios aparecerá sobre la tierra
  alternative_spanish_readings:
  - A través de su cetro, Dios se manifestará en la tierra
  - Mediante su cetro, Dios aparecerá en la tierra
  rationale: Mantengo el paralelo entre el cetro y la aparición de Dios sin convertirlo en una paráfrasis cristológica explícita más allá del texto. 'Aparecerá' conserva la visibilidad/manifestación que el inglés POB ya captó.
  doctrine_reference: Mesianismo real; teofanía/manifestación divina
- issue: Alcance del grupo salvado
  english_pob_reading: to save the people of Israel
  chosen_spanish_reading: para salvar al pueblo de Israel
  alternative_spanish_readings:
  - para salvar la raza de Israel
  - para salvar a Israel
  rationale: '''Pueblo de Israel'' sigue la revisión auditada del inglés y evita una carga racial ajena al contexto. Además, conserva el sujeto colectivo sin individualizarlo indebidamente.'
  doctrine_reference: Pueblo de Dios; elección de Israel
- issue: Alcance universal de la reunión final
  english_pob_reading: he will gather the righteous from among the nations
  chosen_spanish_reading: y reunirá a los justos de entre las naciones
  alternative_spanish_readings:
  - y congregará a los justos de entre las naciones
  - y reunirá a los justos entre las naciones
  rationale: Conservo la apertura a las naciones sin suprimir la distinción entre Israel y los justos procedentes de los gentiles. 'De entre las naciones' preserva esa tensión textual y teológica.
  doctrine_reference: Inclusión de los justos de las naciones; escatología de reunión
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'race of Israel' por 'people of Israel' para mayor naturalidad y precisión. La presente versión española incorpora esa decisión con 'pueblo de Israel' y conserva el resto del sentido auditado, sin añadir glosas ni atenuar la imagen del cetro y la reunión de los justos.
  spanish_consistency_notes:
  - Usé 'Dios' para θεός, no 'Señor', porque el griego del pasaje no usa κύριος.
  - Mantuve 'justos' para δικαίους y 'naciones' para ἔθνη, con 'de entre' para reflejar el matiz de extracción.
  - Elegí un español moderno y digno, evitando arcaísmos innecesarios como 'morando' o 'congregará' en el texto base, aunque sean posibles variantes.
