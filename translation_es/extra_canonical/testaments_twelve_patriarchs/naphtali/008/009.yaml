source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 9. Καὶ *αἱ δύο τοῦ Θεοῦ εἰσι⁵⁵, καὶ εἰ μὴ ἐγένοντο⁵⁶ ἐν τῇ⁵⁷ τάξει αὐτῶν ἁμαρτίαν *μεγίστην παρεῖχον τοῖς ἀνθρώποις· τὸ αὐτὸ⁵⁸ καὶ *ἐπὶ τῶν λοιπῶν ἐντολῶν⁵⁹ ἐστι⁶⁰.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/008/009.yaml
  text: And both are from God, and if they do not occur in their proper order, they bring very great sin upon men. The same is true also of the rest of the commandments.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:50Z'
    unchanged: false
    changes_summary: Changed 'take place' to 'occur' for a slightly more formal and natural rendering of ἐγένοντο, while preserving the sense. No other changes needed.
translation:
  language: es
  text: Y ambas son de Dios, y si no ocurren en su debido orden, causan un pecado muy grande entre los hombres. Lo mismo vale también para los demás mandamientos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αἱ δύο
  english_pob_choice: both
  chosen_spanish: ambas
  alternatives_spanish:
  - las dos
  - ambas dos
  lexicon: —
  rationale: En español, «ambas» reproduce con naturalidad el valor inclusivo de «both» sin añadir énfasis innecesario. «Las dos» también sería posible, pero «ambas» suena más fluido y solemne.
- source_word: τοῦ Θεοῦ εἰσι
  english_pob_choice: are from God
  chosen_spanish: son de Dios
  alternatives_spanish:
  - proceden de Dios
  - pertenecen a Dios
  lexicon: —
  rationale: «De Dios» conserva la relación de procedencia u origen sin forzar una explicación más interpretativa. Mantiene la sencillez del griego y del audit trail inglés.
- source_word: ἐγένοντο
  english_pob_choice: occur
  chosen_spanish: ocurren
  alternatives_spanish:
  - suceden
  - tienen lugar
  lexicon: —
  rationale: Se eligió «ocurren» porque sigue de cerca la revisión inglesa más reciente («occur») y funciona bien en español para un evento que sucede fuera de su orden debido.
- source_word: ἐν τῇ τάξει αὐτῶν
  english_pob_choice: in their proper order
  chosen_spanish: en su debido orden
  alternatives_spanish:
  - en su orden correcto
  - en el orden que les corresponde
  lexicon: —
  rationale: «Debido orden» conserva la idea de orden prescrito o correspondiente. Es una formulación idiomática y fiel, sin perder la fuerza normativa de τάξις.
- source_word: ἁμαρτίαν μεγίστην
  english_pob_choice: very great sin
  chosen_spanish: un pecado muy grande
  alternatives_spanish:
  - un gravísimo pecado
  - un pecado muy grave
  lexicon: —
  rationale: «Pecado muy grande» refleja literalmente la intensificación. «Muy grave» o «gravísimo» serían naturales, pero «muy grande» mantiene mejor la cercanía al griego y al inglés POB.
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: upon men
  chosen_spanish: entre los hombres
  alternatives_spanish:
  - sobre los hombres
  - para los hombres
  lexicon: —
  rationale: La preposición inglesa «upon» admite un alcance de efecto o repercusión. En español, «entre los hombres» comunica que el pecado recae en el ámbito humano sin sonar torpe.
- source_word: τὸ αὐτὸ
  english_pob_choice: The same
  chosen_spanish: Lo mismo
  alternatives_spanish:
  - Esto mismo
  - La misma cosa
  lexicon: —
  rationale: «Lo mismo» es la forma más natural para retomar la afirmación anterior y enlazarla con la siguiente cláusula.
- source_word: ἐπὶ τῶν λοιπῶν ἐντολῶν
  english_pob_choice: also of the rest of the commandments
  chosen_spanish: también para los demás mandamientos
  alternatives_spanish:
  - también respecto de los demás mandamientos
  - también en cuanto a los demás mandamientos
  lexicon: —
  rationale: Se mantiene el sentido distributivo de la frase sin añadir un giro técnico innecesario. «Para» en español puede expresar aplicación o alcance normativo, acorde con el contexto.
theological_decisions:
- issue: Origen divino de las dos realidades mencionadas
  english_pob_reading: And both are from God
  chosen_spanish_reading: Y ambas son de Dios
  alternative_spanish_readings:
  - Y ambas proceden de Dios
  - Y las dos vienen de Dios
  rationale: La formulación conserva la afirmación teológica sin explicar en exceso cuáles son «ambas». El texto griego presupone que el lector identifica las dos realidades del contexto inmediato; el español mantiene esa misma referencia implícita.
  doctrine_reference: Providencia y orden moral de Dios
- issue: Consecuencia moral de alterar el orden
  english_pob_reading: if they do not occur in their proper order, they bring very great sin upon men
  chosen_spanish_reading: si no ocurren en su debido orden, causan un pecado muy grande entre los hombres
  alternative_spanish_readings:
  - si no ocurren en su orden debido, traen un gravísimo pecado sobre los hombres
  - si no se dan en su debido orden, ocasionan un pecado muy grande entre los hombres
  rationale: Se conserva la advertencia moral fuerte sin suavizarla. «Causan» refleja la idea de producir o acarrear pecado, y evita interpretar más de lo que el griego dice.
  doctrine_reference: Ética del orden mandado y responsabilidad humana
- issue: Generalización final sobre los mandamientos restantes
  english_pob_reading: The same is true also of the rest of the commandments
  chosen_spanish_reading: Lo mismo vale también para los demás mandamientos
  alternative_spanish_readings:
  - Lo mismo se aplica también al resto de los mandamientos
  - Así también ocurre con los demás mandamientos
  rationale: La frase final se mantiene general y normativa, como en el inglés POB. «Vale también» conserva el carácter de principio aplicable sin introducir una paráfrasis más amplia.
  doctrine_reference: Unidad del principio de orden en la ley
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que cambió «take place» por «occur» para ἐγένοντο. En español, se reflejó con «ocurren» para mantener la misma leve elevación formal y naturalidad. No se añadieron notas textuales porque el pasaje no presenta variantes relevantes en el paquete auditado.
  spanish_consistency_notes:
  - Se usó «Dios» en lugar de una mayúscula funcionalizada del tipo «Señor», conforme al texto fuente.
  - Se mantuvo «mandamientos» para ἐντολαί, en línea con el uso eclesial estándar y con el valor normativo del pasaje.
  - No se introdujo terminología de «Mesías», «Cristo» o «Yahvé» porque el verso no contiene esos lexemas.
