source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 8. Καιρὸς γὰρ συνουσίας⁵¹ γυναικός⁵², καὶ καιρὸς ἐγκρατείας⁵³ εἰς προσευχὴν αὐτοῦ⁵⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/008/008.yaml
  text: For there is a time for a man to come together with a woman, and a time for self-control for his prayer.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:20Z'
    unchanged: false
    changes_summary: Replaced the awkward nominal phrase 'a man's coming together' with the more natural verbal expression 'a man to come together.' Changed 'restraint' to 'self-control' to better reflect ἐγκρατείας.
translation:
  language: es
  text: Porque hay un tiempo para que un hombre se una con una mujer, y un tiempo de dominio propio para su oración.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καιρὸς
  english_pob_choice: there is a time
  chosen_spanish: hay un tiempo
  alternatives_spanish:
  - existe un tiempo
  - hay una ocasión
  lexicon: καιρός
  rationale: Tiempo puntual u oportuno, no tiempo cronológico general; 'hay un tiempo' conserva la sentencia proverbial sin sobrecargarla.
- source_word: συνουσίας γυναικός
  english_pob_choice: for a man to come together with a woman
  chosen_spanish: para que un hombre se una con una mujer
  alternatives_spanish:
  - para la unión de un hombre con una mujer
  - para que un hombre tenga relaciones con una mujer
  lexicon: συνουσία
  rationale: La frase griega alude a la unión sexual con una mujer; en español 'se una con' mantiene la referencia sin vulgaridad y sin perder fuerza semántica.
- source_word: ἐγκρατείας
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - autodominio
  - autocontrol
  - templanza
  lexicon: ἐγκράτεια
  rationale: '''Dominio propio'' es una forma bíblica natural en español y preserva la idea de autocontrol moral y sexual que requiere el contexto.'
- source_word: εἰς προσευχὴν αὐτοῦ
  english_pob_choice: for his prayer
  chosen_spanish: para su oración
  alternatives_spanish:
  - para la oración de él
  - en favor de su oración
  lexicon: προσευχή
  rationale: Se conserva la referencia posesiva simple del griego sin añadir matices no presentes; 'su oración' es idiomático y claro en español.
theological_decisions:
- issue: Relación entre unión con mujer y disciplina para la oración
  english_pob_reading: There is a time for a man to come together with a woman, and a time for self-control for his prayer.
  chosen_spanish_reading: Porque hay un tiempo para que un hombre se una con una mujer, y un tiempo de dominio propio para su oración.
  alternative_spanish_readings:
  - Porque hay un tiempo para la unión de un hombre con una mujer, y un tiempo de dominio propio para su oración.
  - Porque hay un tiempo para que un hombre tenga relaciones con una mujer, y un tiempo de dominio propio para su oración.
  rationale: El griego contrapone un tiempo de unión con un tiempo de continencia/autorregulación orientado a la oración. La redacción elegida mantiene esa tensión sin explicitar más de lo que el texto dice ni suavizarla.
  doctrine_reference: 1 Corintios 7:5; 1 Tesalonicenses 4:3-5
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que sustituyó la construcción nominal torpe por una forma verbal más natural ('to come together') y aclaró ἐγκρατείας como 'self-control'. La versión española adopta ese mismo ajuste con 'se una' y 'dominio propio'.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque este versículo no contiene el nombre divino ni κύριος.
  - Se mantiene un registro sobrio y bíblico, evitando el calco pesado sin añadir explicación doctrinal.
  - '''Hombre'' se usa en sentido genérico como en el griego y en la traducción inglesa auditada.'
