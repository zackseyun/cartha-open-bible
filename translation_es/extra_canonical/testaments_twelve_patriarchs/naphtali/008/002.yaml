translation:
  language: es
  text: 'Y ahora, mirad: mandad a vuestros hijos que se unan a Leví y a Judá. Porque por medio de Judá surgirá la salvación para Israel, y en él será bendecido Jacob.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ὑμεῖς Γοὖν
  english_pob_choice: And now, behold
  chosen_spanish: Y ahora, mirad
  alternatives_spanish:
  - Y ahora, pues
  - Así que, ahora
  lexicon: Καὶ ... οὖν
  rationale: El griego introduce una transición exhortativa. «Y ahora, mirad» conserva el tono de llamado solemne del POB inglés sin forzar una fórmula más pesada. «Mirad» refleja bien el énfasis discursivo de la partícula.
- source_word: ἐντείλασθε
  english_pob_choice: command
  chosen_spanish: mandad
  alternatives_spanish:
  - ordenad
  - encargad
  lexicon: ἐντέλλομαι
  rationale: El verbo expresa una instrucción con autoridad. «Mandad» es natural en español y mantiene la fuerza imperativa sin añadir matices burocráticos de «ordenad».
- source_word: ἵνα ἑνοῦνται
  english_pob_choice: that they be united
  chosen_spanish: que se unan
  alternatives_spanish:
  - que estén unidos
  - que sean unidos
  lexicon: ἑνόω
  rationale: El verbo griego indica unión/reunión. «Que se unan» conserva la voz media/reflexiva de manera idiomática en español y evita una pasiva que sonaría menos directa.
- source_word: τῷ Λευὶ καὶ τῷ Ἰούδα
  english_pob_choice: with Levi and with Judah
  chosen_spanish: a Leví y a Judá
  alternatives_spanish:
  - con Leví y con Judá
  - junto con Leví y con Judá
  lexicon: dative of association
  rationale: El dativo de asociación puede expresarse en español con «a» después de «unirse a». Como el verbo ya contiene la relación de unión, esta opción resulta natural y no pierde el sentido de alianza/asociación.
- source_word: ἀνατελεῖ
  english_pob_choice: will arise
  chosen_spanish: surgirá
  alternatives_spanish:
  - brotará
  - saldrá
  lexicon: ἀνατέλλω
  rationale: El verbo tiene imagen de levantarse/aparecer. «Surgirá» conserva la idea de irrupción o aparición futura y suena más idiomático que una calca como «se levantará».
- source_word: ἡ σωτηρία
  english_pob_choice: salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - el rescate
  - la liberación
  lexicon: σωτηρία
  rationale: «Salvación» es la correspondencia directa y mantiene el registro bíblico del texto. Las alternativas introducen matices posibles, pero el sustantivo básico es el más fiel aquí.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - por él
  - a través de él
  lexicon: ἐν + pronoun
  rationale: 'El griego usa una preposición locativa/instrumental que, en este contexto, el POB inglés traduce literalmente. «En él» preserva la ambigüedad benigna: puede referir a la esfera/medio de la bendición sin explicitar de más.'
theological_decisions:
- issue: El papel de Judá como canal de salvación para Israel
  english_pob_reading: For through Judah salvation will arise for Israel
  chosen_spanish_reading: Porque por medio de Judá surgirá la salvación para Israel
  alternative_spanish_readings:
  - Porque de Judá surgirá la salvación para Israel
  - Porque por Judá vendrá la salvación para Israel
  rationale: El griego y el POB presentan a Judá como medio o canal de la salvación. «Por medio de» mantiene esa mediación sin convertirla en origen absoluto; evita exagerar el alcance teológico más allá de lo que el texto dice.
  doctrine_reference: Tipología mesiánica / bendición tribal en la literatura testamentaria
- issue: La bendición de Jacob en relación con Judá
  english_pob_reading: and in him Jacob will be blessed
  chosen_spanish_reading: y en él será bendecido Jacob
  alternative_spanish_readings:
  - y por él será bendecido Jacob
  - y en él Jacob recibirá bendición
  rationale: «En él» sigue de cerca el griego y el inglés POB, preservando la formulación ambigua entre esfera y medio. «Será bendecido» conserva la pasiva futura del original y el paralelismo con la primera cláusula.
  doctrine_reference: Bendición patriarcal / promesa de Jacob
- issue: Unión de los hijos con Leví y Judá
  english_pob_reading: that they be united with Levi and with Judah
  chosen_spanish_reading: que se unan a Leví y a Judá
  alternative_spanish_readings:
  - que permanezcan unidos con Leví y con Judá
  - que sean unidos a Leví y a Judá
  rationale: La exhortación apunta a una alianza/adhesión tribal, no solo a cercanía social. «Se unan a» conserva el sentido relacional sin introducir una terminología eclesiástica ajena al contexto.
  doctrine_reference: Lealtad tribal y unidad del pueblo de Israel
translation_notes:
  revision_awareness: El POB inglés fue revisado y quedó sin cambios; esta propuesta sigue de cerca esa lectura óptima-equivalente y no introduce notas textuales porque el paquete fuente no aporta un aparato crítico adicional que requiera marcarlas en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se conserva «Leví» y «Judá» como nombres propios bíblicos en forma española estándar.
  - No se introduce «Mesías» porque el verso no usa χριστός ni un título equivalente explícito; la referencia es tribal y tipológica.
  - La sintaxis procura ser publicable y bíblica en español moderno sin recurrir a calcos innecesarios.
