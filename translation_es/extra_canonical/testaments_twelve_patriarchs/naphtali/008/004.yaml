  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 4. *Ἐὰν Γοὖν καὶ ὑμεῖς˥²³ ἐργάσησθε τὸ καλόν²⁴, εὐλογήσουσιν ὑμᾶς *οἱ ἄνθρωποι καὶ οἱ ἄγγελοι²⁵, καὶ ὁ²⁶ Θεὸς δοξασθήσεται ἐν τοῖς ἔθνεσιν *διʼ ὑμῶν²⁷, καὶ ὁ διάβολος φεύξεται ἀφʼ ὑμῶν, Γκαὶ τὰ θηρία φοβηθήσονται ὑμᾶς˥²⁸, *καὶ ὁ Κύριος ἀγαπήσει ὑμᾶς²⁹, [καὶ οἱ ἄγγελοι ἀνθέξονται ὑμῶν]³⁰.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/008/004.yaml
  text: Therefore, if you also do what is good, people and angels will bless you, and God will be glorified among the nations through you, and the devil will flee from you, and the wild beasts will fear you, and the Lord will love you, and the angels will stand by you.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:19Z'
    unchanged: false
    changes_summary: Changed 'men' to 'people' for more natural and inclusive rendering of οἱ ἄνθρωποι; otherwise retained the draft as accurate and complete.
translation:
  language: es
  text: Por tanto, si ustedes también hacen lo bueno, las personas y los ángeles los bendecirán, y Dios será glorificado entre las naciones por medio de ustedes, y el diablo huirá de ustedes, y las fieras los temerán, y el Señor los amará, y los ángeles los sostendrán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ ἄνθρωποι
  english_pob_choice: people
  chosen_spanish: las personas
  alternatives_spanish:
  - la gente
  - los hombres
  lexicon: ἄνθρωποι
  rationale: El contexto no exige varones; el POB inglés revisado cambió de 'men' a 'people' para reflejar mejor el valor general de οἱ ἄνθρωποι. 'Las personas' conserva el sentido colectivo y evita una lectura sexista o restrictiva.
- source_word: τὸ καλόν
  english_pob_choice: do what is good
  chosen_spanish: hacen lo bueno
  alternatives_spanish:
  - practican el bien
  - obran el bien
  lexicon: καλόν
  rationale: La frase apunta a una práctica moral concreta más que a un concepto abstracto. 'Hacen lo bueno' sigue de cerca el valor verbal del inglés POB y mantiene una forma clara y natural en español.
- source_word: εὐλογήσουσιν ὑμᾶς
  english_pob_choice: will bless you
  chosen_spanish: los bendecirán
  alternatives_spanish:
  - los bendecirán con bendición
  - dirán bendición sobre ustedes
  lexicon: εὐλογέω
  rationale: '''Bendecirán'' es el equivalente español directo y transparente de εὐλογήσουσιν, manteniendo el sujeto plural (''las personas y los ángeles'') y el objeto plural (''ustedes'').'
- source_word: ὁ Θεὸς δοξασθήσεται
  english_pob_choice: God will be glorified
  chosen_spanish: Dios será glorificado
  alternatives_spanish:
  - Dios será honrado
  - Dios recibirá gloria
  lexicon: δοξάζω
  rationale: La pasiva divina se conserva con una construcción natural en español. 'Glorificado' expresa la misma idea de reconocimiento público de la gloria de Dios.
- source_word: ἐν τοῖς ἔθνεσιν διʼ ὑμῶν
  english_pob_choice: among the nations through you
  chosen_spanish: entre las naciones por medio de ustedes
  alternatives_spanish:
  - entre las naciones por ustedes
  - en medio de las naciones por medio de ustedes
  lexicon: ἔθνη
  rationale: '''Entre las naciones'' reproduce la localización relacional del texto y ''por medio de ustedes'' expresa la mediación instrumental de διʼ ὑμῶν sin recargar el español.'
- source_word: ὁ διάβολος φεύξεται ἀφʼ ὑμῶν
  english_pob_choice: the devil will flee from you
  chosen_spanish: el diablo huirá de ustedes
  alternatives_spanish:
  - el diablo escapará de ustedes
  - el diablo saldrá huyendo de ustedes
  lexicon: διάβολος
  rationale: '''Diablo'' es el equivalente usual y exacto; ''huirá de ustedes'' sigue el futuro del griego y el giro del inglés POB.'
- source_word: τὰ θηρία φοβηθήσονται ὑμᾶς
  english_pob_choice: the wild beasts will fear you
  chosen_spanish: las fieras los temerán
  alternatives_spanish:
  - las bestias salvajes los temerán
  - los animales salvajes les tendrán miedo
  lexicon: θηρία
  rationale: '''Fieras'' es un equivalente español digno y natural para θηρία en un contexto de animales salvajes y amenazantes. ''Temerán'' conserva el verbo activo del griego y del inglés POB.'
- source_word: ὁ Κύριος ἀγαπήσει ὑμᾶς
  english_pob_choice: the Lord will love you
  chosen_spanish: el Señor los amará
  alternatives_spanish:
  - el Señor los querrá
  - el Señor les tendrá amor
  lexicon: Κύριος
  rationale: Se conserva 'el Señor' porque el POB inglés ya lo ha fijado como forma de κύριος en este contexto, y en español resulta la forma más idiomática y reverente en una invocación relacional.
- source_word: οἱ ἄγγελοι ἀνθέξονται ὑμῶν
  english_pob_choice: the angels will stand by you
  chosen_spanish: los ángeles los sostendrán
  alternatives_spanish:
  - los ángeles se mantendrán a su lado
  - los ángeles los apoyarán
  lexicon: ἀντέχω
  rationale: El griego puede implicar 'apoyarse en', 'sostenerse junto a', o 'aferrarse a'. El POB inglés eligió 'stand by you' para expresar asistencia leal. 'Los sostendrán' comunica apoyo firme en español sin sobreinterpretar una imagen espacial demasiado literal.
theological_decisions:
- issue: Universalización de οἱ ἄνθρωποι
  english_pob_reading: people rather than men
  chosen_spanish_reading: las personas
  alternative_spanish_readings:
  - los hombres
  rationale: El texto griego no restringe el grupo a varones. La decisión sigue la revisión inglesa que corrigió 'men' a 'people' para reflejar mejor el alcance general de οἱ ἄνθρωποι.
  doctrine_reference: Antropología bíblica y lenguaje inclusivo cuando el referente es genérico, no masculino específico.
- issue: Pasiva divina en 'God will be glorified'
  english_pob_reading: God will be glorified among the nations through you
  chosen_spanish_reading: Dios será glorificado entre las naciones por medio de ustedes
  alternative_spanish_readings:
  - las naciones glorificarán a Dios por medio de ustedes
  - Dios recibirá gloria entre las naciones por medio de ustedes
  rationale: La pasiva conserva el énfasis del original en Dios como receptor de la gloria, no en la acción humana como sujeto principal. 'Por medio de ustedes' mantiene la agencia mediadora de la comunidad.
  doctrine_reference: Teología de la gloria de Dios y de la testificación del pueblo de Dios entre las naciones.
- issue: Referencia a 'el Señor'
  english_pob_reading: the Lord will love you
  chosen_spanish_reading: el Señor los amará
  alternative_spanish_readings:
  - Yahvé los amará
  - el Señor los amará
  rationale: Aunque el proyecto español prefiere 'Yahvé' para יהוה, aquí la fuente inmediata es κύριος en una forma ya recibida por el POB inglés como 'the Lord'. En ausencia de un anclaje explícito al Tetragrámaton en este versículo, se mantiene 'el Señor' para respetar la tradición del texto fuente mediado y su fluidez devocional, sin afirmar más de lo que el griego presente garantiza.
  doctrine_reference: Cristología y uso de κύριος en tradición textual griega; distinción entre nombre divino explícito y título recibido.
translation_notes:
  revision_awareness: El borrador inglés revisado cambió 'men' por 'people' para οἱ ἄνθρωποι; la versión española refleja esa actualización con 'las personas' y mantiene intactas las demás decisiones del POB inglés, incluyendo la secuencia completa de bendición, gloria, huida, temor, amor y apoyo.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de sujetos plurales: ''las personas y los ángeles'' / ''el diablo'' / ''las fieras'' / ''el Señor'' / ''los ángeles''.'
  - Se conservó el tratamiento reverente del singular plural de segunda persona con 'ustedes', coherente con el resto del segmento.
  - '''Las fieras'' se prefirió a ''bestias salvajes'' por claridad y fluidez en español, sin perder el matiz de animales temibles.'
  - No se introdujeron notas al pie porque el pasaje no exige variantes textuales decisivas ni ambigüedades que el español obligue a resolver aparte.
