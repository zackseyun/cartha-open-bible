id: T12P.NAP.8.1
reference: Testament of Naphtali 8:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: VIII. Καὶ¹ ἰδού², τέκνα μου³, ὑπέδειξα ὑμῖν καιροὺς ἐσχάτους †ὅτι⁴ πάντα γενήσεται ἐν Ἰσραήλ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/008/001.yaml
  text: And behold, my children, I have shown you the times, that all will happen in Israel.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:18Z'
    unchanged: false
    changes_summary: Removed 'these things' because πάντα is simply 'all' here, and kept the rest essentially unchanged for accuracy and natural formal English.
translation:
  language: es
  text: Y he aquí, hijos míos, os he mostrado los tiempos postreros, para que todo acontecerá en Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἰδού
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mirad
  - Y ved
  lexicon: ἰδού
  rationale: «He aquí» reproduce la función de deíctico/llamado de atención del griego con registro bíblico natural en español. Se mantiene «Y» para conservar la coordinación del miembro inicial.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijos amados
  lexicon: τέκνα
  rationale: «Hijos míos» preserva la relación paternal directa y es idiomático en español bíblico sin introducir afecto no explicitado por el griego.
- source_word: ὑπέδειξα ὑμῖν
  english_pob_choice: I have shown you
  chosen_spanish: os he mostrado
  alternatives_spanish:
  - les he mostrado
  - os he enseñado
  lexicon: ὑποδείκνυμι
  rationale: El verbo transmite «mostrar/señalar/exponer»; «he mostrado» es la opción más directa y natural. Se usa «os» para mantener la segunda persona plural directa del original.
- source_word: καιροὺς ἐσχάτους
  english_pob_choice: the times
  chosen_spanish: los tiempos postreros
  alternatives_spanish:
  - los tiempos finales
  - los tiempos últimos
  lexicon: καιρός + ἔσχατος
  rationale: El griego no dice solo «tiempos» en abstracto, sino «tiempos últimos/postreros». En español, «postreros» conserva mejor la carga escatológica que un simple «finales».
- source_word: πάντα γενήσεται
  english_pob_choice: all will happen
  chosen_spanish: todo acontecerá
  alternatives_spanish:
  - todo sucederá
  - todo ocurrirá
  lexicon: πάντα + γίνομαι
  rationale: Tras la revisión inglesa que eliminó «these things», se entiende πάντα como «todo» en sentido absoluto. «Acontecerá» mantiene un tono bíblico sobrio sin añadir sujetos implícitos.
- source_word: ἐν Ἰσραήλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - dentro de Israel
  - entre Israel
  lexicon: ἐν + Ἰσραήλ
  rationale: La preposición y el nombre propio se reflejan de forma directa y transparente; no hay motivo para ampliar o reinterpretar el alcance geográfico o nacional.
theological_decisions:
- issue: Alcance de «los tiempos postreros»
  english_pob_reading: the times
  chosen_spanish_reading: los tiempos postreros
  alternative_spanish_readings:
  - los tiempos finales
  - el fin de los tiempos
  rationale: La frase griega apunta a un marco escatológico general. «Postreros» mantiene esa tensión sin convertirla en una fórmula más cerrada de lo que el texto exige.
  doctrine_reference: Escatología bíblica / lenguaje apocalíptico
- issue: Universalidad de «todo»
  english_pob_reading: all will happen in Israel
  chosen_spanish_reading: todo acontecerá en Israel
  alternative_spanish_readings:
  - todas las cosas acontecerán en Israel
  - todo esto acontecerá en Israel
  rationale: La revisión inglesa corrigió la adición interpretativa «these things». El español conserva la amplitud de πάντα con «todo», sin especificar objetos no presentes en el griego.
  doctrine_reference: Fidelidad semántica al texto fuente
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó la expansión interpretativa «these things» porque πάντα solo significa «all». La redacción española sigue esa decisión y evita añadir un referente explícito que no está en el griego. También se conserva el sentido escatológico de καιροὺς ἐσχάτους con una expresión española que no lo diluye.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y legible, evitando tanto arcaísmos excesivos como modernizaciones interpretativas.
  - No se introduce «SEÑOR» ni terminología doctrinal ajena al pasaje; el texto no contiene el nombre divino ni vocabulario cristológico explícito.
  - La segunda persona plural se conserva con «os», coherente con el destinatario plural del griego.
