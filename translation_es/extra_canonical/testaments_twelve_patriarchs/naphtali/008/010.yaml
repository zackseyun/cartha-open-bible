id: T12P.NAP.8.10
reference: Testament of Naphtali 8:10
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 10. Γίνεσθε οὖν *σοφοὶ ἐν θεῷ, τέκνα μου⁶¹, καὶ φρόνιμοι, ἰδόντες⁶² τάξιν ἐντολῶν⁶³ αὐτοῦ⁶⁴ καὶ θεσμοὺς παντὸς πράγματος⁶⁵, ὅπως *ἀγαπήσει ὑμᾶς ὁ Κύριος⁶⁶.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/008/010.yaml
  text: Therefore become wise in God, my children, and prudent, perceiving the order of his commandments and the ordinances of every matter, so that the Lord may love you.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:50Z'
    unchanged: false
    changes_summary: Changed 'for every matter' to 'of every matter' to more closely reflect παντὸς πράγματος and preserve a more formal, source-near construction. Kept the rest unchanged as accurate and natural.
translation:
  language: es
  text: Por tanto, háganse sabios en Dios, mis hijos, y prudentes, percibiendo el orden de sus mandamientos y los estatutos de cada asunto, para que el Señor los ame.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Γίνεσθε / σοφοὶ ἐν θεῷ
  english_pob_choice: become wise in God
  chosen_spanish: háganse sabios en Dios
  alternatives_spanish:
  - sean sabios en Dios
  - vuélvanse sabios en Dios
  lexicon: γίνομαι; σοφός; θεός
  rationale: «Háganse» conserva el valor exhortativo y procesual de γίνεσθε mejor que un simple copulativo. «Sabios en Dios» sigue de cerca el original y la decisión inglesa de no expandirlo a una paráfrasis más libre.
- source_word: φρόνιμοι
  english_pob_choice: prudent
  chosen_spanish: prudentes
  alternatives_spanish:
  - sensatos
  - discretos
  lexicon: φρόνιμος
  rationale: «Prudentes» es el equivalente natural y de registro sobrio para φρόνιμοι en una exhortación sapiencial.
- source_word: ἰδόντες τάξιν ἐντολῶν αὐτοῦ
  english_pob_choice: perceiving the order of his commandments
  chosen_spanish: percibiendo el orden de sus mandamientos
  alternatives_spanish:
  - viendo el orden de sus mandamientos
  - reconociendo el orden de sus mandamientos
  lexicon: ὁράω; τάξις; ἐντολή
  rationale: «Percibiendo» mantiene el matiz de captación inteligente del participio. «Orden» traduce τάξις de forma directa y coherente con la versión inglesa auditada.
- source_word: θεσμοὺς παντὸς πράγματος
  english_pob_choice: the ordinances of every matter
  chosen_spanish: los estatutos de cada asunto
  alternatives_spanish:
  - las disposiciones de cada asunto
  - los ordenamientos de toda cosa
  lexicon: θεσμός; πᾶς; πράγμα
  rationale: «Estatutos» conserva el valor normativo de θεσμούς con lenguaje bíblico claro en español. «Cada asunto» refleja con naturalidad παντὸς πράγματος, siguiendo la revisión inglesa que prefirió «of every matter» frente a una construcción finalista.
- source_word: ὅπως ἀγαπήσει ὑμᾶς ὁ Κύριος
  english_pob_choice: so that the Lord may love you
  chosen_spanish: para que el Señor los ame
  alternatives_spanish:
  - a fin de que el Señor los ame
  - para que el Señor los quiera
  lexicon: Κύριος; ἀγαπάω
  rationale: «El Señor» reproduce la elección inglesa para Κύριος sin masking explícito, dado que el versículo no cita directamente el nombre divino en griego. «Los ame» mantiene el valor de ἀγαπήσει sin debilitarlo a «quiera».
theological_decisions:
- issue: Relación entre Κύριος y el nombre divino
  english_pob_reading: the Lord may love you
  chosen_spanish_reading: para que el Señor los ame
  alternative_spanish_readings:
  - para que Yahvé los ame
  - para que el Señor Yahvé los ame
  rationale: Aquí el griego dice ὁ Κύριος y no explicita el Tetragrámaton. Por eso se conserva «el Señor» en español, en línea con la lectura auditada en inglés, sin introducir «Yahvé» donde el texto fuente no lo señala de manera directa.
  doctrine_reference: Uso contextual de Κύριος en textos griegos; principio de no sobreespecificar el referente divino sin apoyo textual explícito.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «for every matter» por «of every matter» para acercarse más a παντὸς πράγματος. La línea española sigue esa decisión con «de cada asunto», evitando un giro finalista como «para cada asunto» y manteniendo una relación genitiva más formal y fuente-cercana.
  spanish_consistency_notes:
  - Se mantuvo el singular genérico de «mandamientos» y «estatutos» para reflejar el plural griego sin inflar el texto.
  - «Señor» se conserva como correspondencia de Κύριος en este contexto, mientras que «Yahvé» queda reservado para casos donde el nombre divino aparezca o se deduzca con mayor certeza textual.
  - El orden sintáctico español sigue la exhortación sapiencial del original sin introducir elementos no presentes en la fuente.
