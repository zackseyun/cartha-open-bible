translation:
  language: es
  text: Porque los mandamientos de la ley son dobles, y se cumplen con destreza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐντολαὶ
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandatos
  - preceptos
  lexicon: ἐντολή
  rationale: «Mandamientos» conserva el carácter normativo y la resonancia bíblica de la serie legal sin volverlo excesivamente técnico. En este contexto funciona naturalmente junto con «de la ley».
- source_word: νόμου
  english_pob_choice: the law
  chosen_spanish: ley
  alternatives_spanish:
  - Torá
  - ley mosaica
  lexicon: νόμος
  rationale: El griego habla de la ley en sentido general; «ley» es la forma más directa y transparente en español. «Torá» o «ley mosaica» añadirían especificación no presente en el versículo.
- source_word: διπλαῖ
  english_pob_choice: twofold
  chosen_spanish: dobles
  alternatives_spanish:
  - de dos partes
  - doblemente
  lexicon: διπλοῦς
  rationale: «Dobles» refleja la idea de duplicidad o doble aspecto de manera breve y natural en español. Mantiene la fuerza adjetival del original mejor que una paráfrasis explicativa.
- source_word: μετὰ τέχνης
  english_pob_choice: with skill
  chosen_spanish: con destreza
  alternatives_spanish:
  - con habilidad
  - con arte
  lexicon: τέχνη
  rationale: «Con destreza» comunica la ejecución hábil o competente que sugiere τέχνη sin imponer una lectura demasiado artesanal o estética. Es más idiomático que un calco como «con arte» en este contexto.
theological_decisions:
- issue: Naturaleza de la duplicidad en «los mandamientos de la ley son dobles»
  english_pob_reading: For the commandments of the law are twofold
  chosen_spanish_reading: Porque los mandamientos de la ley son dobles
  alternative_spanish_readings:
  - Porque los mandamientos de la ley tienen dos aspectos
  - Porque los mandamientos de la ley son de dos clases
  rationale: La formulación española conserva la tensión del griego sin resolverla en exceso. «Dobles» mantiene la ambigüedad útil entre duplicidad formal y doble aspecto práctico, acorde con el inglés POB.
  doctrine_reference: Sabiduría práctica / instrucción ética en textos parabíblicos
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; este borrador mantiene el sentido del inglés POB y del griego sin añadir interpretación nueva.
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y bíblico sin recurrir a fórmulas eclesiásticas ajenas al texto.
  - «Mandamientos» y «ley» preservan el marco legal del original griego.
  - «Con destreza» evita sobredeterminar «τέχνη» como arte técnico o manual; conserva la noción general de habilidad.
