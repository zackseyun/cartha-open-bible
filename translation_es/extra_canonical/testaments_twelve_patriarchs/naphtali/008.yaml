  revised_spanish_text: '1. Y he aquí, hijos míos, les he mostrado los tiempos, que todas estas cosas sucederán en Israel.


    2. Y ahora, he aquí, manden a sus hijos que se unan a Leví y a Judá. Porque por Judá brotará la salvación para Israel, y en él será bendecido Jacob.


