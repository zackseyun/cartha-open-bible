    changes_summary: Adjusted verse 4 to render ἀνθέξονται more directly as 'will support you' rather than 'will stand by you.' In verse 8, changed 'restraint for his prayer' to 'self-control for prayer' for more natural and accurate rendering of ἐγκρατείας ... εἰς προσευχήν. In verse 10, revised 'ordinances for every matter' to 'ordinances of every matter' to reflect the genitive more closely.
translation:
  language: es
  text: '1. Y he aquí, hijos míos, les he mostrado los tiempos, que todas estas cosas sucederán en Israel.


    2. Y ahora, he aquí, manden a sus hijos que se unan a Leví y a Judá. Porque por Judá brotará la salvación para Israel, y en él será bendecido Jacob.


    3. Por su cetro Dios aparecerá sobre la tierra, habitando entre los hombres[a], para salvar al linaje de Israel, y reunirá a los justos de entre las naciones.


    4. Por tanto, si ustedes también hacen lo bueno, los hombres y los ángeles los bendecirán, y Dios será glorificado entre las naciones por medio de ustedes, y el diablo huirá de ustedes, y las fieras los temerán, y el Señor los amará, y los ángeles los sostendrán.


    5. Así como cuando alguien cría bien a un niño, tiene de él un buen recuerdo, así también, por una buena obra, hay un buen recuerdo delante de Dios.


    6. Pero al que no hace lo bueno, los ángeles y los hombres lo maldecirán, y Dios será deshonrado entre las naciones por medio de él, y el diablo lo reclama como su propio vaso, y toda fiera se enseñoreará de él, y el Señor lo odiará.


    7. Porque los mandamientos de la ley son de dos clases, y se cumplen con destreza.


    8. Porque hay un tiempo para la unión con una mujer, y un tiempo para el dominio propio para la oración[b][c].


    9. Y ambas cosas son de Dios, y si no ocurren en su debido orden, causan a los hombres un pecado muy grande. Lo mismo vale también para el resto de los mandamientos.


    10. Sean, pues, sabios en Dios, hijos míos, y prudentes, al percibir el orden de sus mandamientos y las ordenanzas de cada asunto, para que el Señor los ame.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testigos muestran expansión o variación textual en v. 3 alrededor de ‘Dios aparecerá sobre la tierra, habitando entre los hombres’. La traducción sigue la forma griega más plena del testimonio suministrado.
    reason: textual_variant
  - marker: b
    text: La expresión ‘unión con una mujer’ en v. 8 es una manera decorosa de traducir un lenguaje que se refiere a la unión sexual.
    reason: cultural_note
  - marker: c
    text: O ‘abstinencia’ para ‘dominio propio’; el sentido es abstenerse en el momento apropiado para la oración.
    reason: lexical_alternative
lexical_decisions:
- source_word: καιροὺς
  english_pob_choice: the times
  chosen_spanish: los tiempos
  alternatives_spanish:
  - las temporadas
  - los momentos señalados
  lexicon: LSJ
  rationale: Conserva el sentido de tiempos significativos o señalados, no mero tiempo cronológico, y suena natural en español bíblico contemporáneo.
- source_word: ὑπέδειξα ὑμῖν
  english_pob_choice: I have shown you
  chosen_spanish: les he mostrado
  alternatives_spanish:
  - les he indicado
  - les he enseñado
  lexicon: LSJ
  rationale: ‘Mostrar’ refleja bien la exposición profética del texto y evita cargar el verbo con una enseñanza más abstracta de lo que permite el griego.
- source_word: ἑνοῦνται
  english_pob_choice: be united
  chosen_spanish: se unan
  alternatives_spanish:
  - se unan en solidaridad
  - se junten
  lexicon: LSJ
  rationale: Mantiene la exhortación a una unión concreta con Leví y Judá sin debilitarla a una mera cercanía o afinidad.
- source_word: σωτηρία
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  lexicon: LSJ
  rationale: Conserva el peso teológico del término, tal como hace la versión inglesa, sin reducirlo a una liberación meramente política.
- source_word: σκήπτρου
  english_pob_choice: scepter
  chosen_spanish: cetro
  alternatives_spanish:
  - vara
  - símbolo de realeza
  lexicon: LSJ
  rationale: ‘Cetro’ preserva la imagen real y dinástica de forma clara y elegante en español.
- source_word: ὀφθήσεται
  english_pob_choice: will appear
  chosen_spanish: se manifestará
  alternatives_spanish:
  - aparecerá
  - será visto
  lexicon: LSJ
  rationale: ‘Se manifestará’ expresa la aparición revelatoria de Dios con naturalidad en español y deja abierta la fuerza teofánica del verbo.
- source_word: κατοικῶν ἐν ἀνθρώποις
  english_pob_choice: dwelling among men
  chosen_spanish: habitando entre los hombres
  alternatives_spanish:
  - morando entre los hombres
  - viviendo entre los hombres
  lexicon: LSJ
  rationale: Respeta la imagen de presencia divina entre la humanidad y mantiene el registro elevado sin volverlo doctrinalmente más específico de lo que dice el griego.
- source_word: ἐπισυνάξει
  english_pob_choice: will gather
  chosen_spanish: reunirá
  alternatives_spanish:
  - juntará
  - recogerá
  lexicon: LSJ
  rationale: ‘Reunirá’ comunica bien la acción de congregar a los justos de entre las naciones y es idiomático en español.
- source_word: τὸ καλόν
  english_pob_choice: what is good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - el bien
  - lo correcto
  lexicon: LSJ
  rationale: La forma sustantivada ‘lo bueno’ conserva el valor moral general del griego sin forzar una abstracción filosófica.
- source_word: ἀνθέξονται ὑμῶν
  english_pob_choice: will support you
  chosen_spanish: los sostendrán
  alternatives_spanish:
  - los apoyarán
  - se mantendrán firmes con ustedes
  lexicon: LSJ
  rationale: ‘Sostener’ comunica apoyo protector y encaja con el paralelismo de bendición y asistencia, sin sonar demasiado coloquial.
- source_word: μνήμη
  english_pob_choice: remembrance
  chosen_spanish: recuerdo
  alternatives_spanish:
  - memoria
  - memorial
  lexicon: LSJ
  rationale: ‘Recuerdo’ expresa la idea de ser tenido favorablemente en mente; en español resulta más natural que ‘memoria’ en este contexto.
- source_word: ἀδοξήσει
  english_pob_choice: will be dishonored
  chosen_spanish: será deshonrado
  alternatives_spanish:
  - perderá gloria
  - será avergonzado
  lexicon: LSJ
  rationale: Conserva el contraste con ‘glorificado’ del versículo 4 y traduce el pasivo en forma idiomática.
- source_word: οἰκειοῦται αὐτὸν ὡς ἴδιον σκεῦος
  english_pob_choice: claims him as his own vessel
  chosen_spanish: lo reclama como su propio vaso
  alternatives_spanish:
  - lo hace suyo como instrumento
  - lo apropia como su propio utensilio
  lexicon: LSJ
  rationale: ‘Vaso’ conserva el objeto concreto del griego y ‘reclama como suyo’ expresa la apropiación del diablo sin suavizar la imagen.
- source_word: κατακυριεύσει αὐτῷ
  english_pob_choice: will lord it over him
  chosen_spanish: se enseñoreará de él
  alternatives_spanish:
  - lo dominará
  - ejercerá dominio sobre él
  lexicon: LSJ
  rationale: ‘Se enseñoreará’ transmite la idea de dominio opresivo y conserva un tono bíblico adecuado al registro del texto.
- source_word: διπλαῖ
  english_pob_choice: twofold
  chosen_spanish: de dos clases
  alternatives_spanish:
  - dobles
  - de dos partes
  lexicon: LSJ
  rationale: ‘De dos clases’ es más natural en español y expresa que los mandamientos se presentan en una doble forma o dimensión.
- source_word: μετὰ τέχνης πληροῦνται
  english_pob_choice: are fulfilled with skill
  chosen_spanish: se cumplen con destreza
  alternatives_spanish:
  - se cumplen con habilidad
  - se realizan con pericia
  lexicon: LSJ
  rationale: ‘Destreza’ traduce bien la idea de técnica/discernimiento práctico sin convertirla en mera manualidad.
- source_word: συνουσίας
  english_pob_choice: coming together
  chosen_spanish: unión
  alternatives_spanish:
  - juntarse
  - relación conyugal
  lexicon: LSJ
  rationale: ‘Unión’ conserva la decencia del texto y permite entender la referencia a la relación sexual matrimonial sin explicitarla más de lo necesario.
- source_word: ἐγκρατείας
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - autocontrol
  - abstinencia
  lexicon: LSJ
  rationale: ‘Dominio propio’ es una expresión bíblica natural en español y refleja bien la contención requerida para la oración.
- source_word: τάξει
  english_pob_choice: proper order
  chosen_spanish: su debido orden
  alternatives_spanish:
  - el orden debido
  - el orden correcto
  lexicon: LSJ
  rationale: Mantiene la noción de un orden apropiado y normativo, no solo una secuencia temporal.
- source_word: θεσμοὺς παντὸς πράγματος
  english_pob_choice: the ordinances of every matter
  chosen_spanish: las ordenanzas de cada asunto
  alternatives_spanish:
  - los estatutos de cada cosa
  - las disposiciones de todo asunto
  lexicon: LSJ
  rationale: ‘Ordenanzas’ conserva el tono normativo del término; ‘cada asunto’ refleja el alcance universal de la frase griega.
theological_decisions:
- issue: Lenguaje real y salvífico centrado en Judá en vv. 2-3
  english_pob_reading: Translate the Judah and scepter language directly as it stands, including God's appearing on earth and gathering the righteous from the nations.
  chosen_spanish_reading: Traducir directamente el lenguaje de Judá y del cetro, con la manifestación de Dios sobre la tierra y la reunión de los justos de entre las naciones.
  alternative_spanish_readings:
  - reducirlo a una esperanza dinástica-política
  - atenuar la fuerza mesiánica del pasaje
  rationale: El texto griego presenta una oráculo de salvación ligado a Judá; la traducción debe ser transparente y no suavizar el alcance teológico que el propio texto ofrece.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente; traducir honestamente el texto recibido.
- issue: κατοικῶν ἐν ἀνθρώποις en v. 3
  english_pob_reading: Render as 'dwelling among men' in the main text.
  chosen_spanish_reading: Rendir como 'habitando entre los hombres' en el texto principal.
  alternative_spanish_readings:
  - ‘habitando en los hombres’
  - omitir la frase por considerarla expansión secundaria
  rationale: La frase se entiende naturalmente como presencia divina entre la humanidad. Se mantiene la lectura recibida sin borrar una posible complejidad textual.
  doctrine_reference: Cuando haya posible expansión textual, traducir con honestidad y, si hace falta, dejar constancia en nota en lugar de armonizar.
- issue: Relación entre unión conyugal y oración en vv. 8-9
  english_pob_reading: Present the commandments as 'twofold' with a proper time for sexual union and a proper time for restraint for prayer.
  chosen_spanish_reading: Presentar la enseñanza como una distinción de dos clases, con tiempo para la unión y tiempo para el dominio propio para la oración.
  alternative_spanish_readings:
  - generalizarlo como moderación
  - reducirlo a lenguaje de pureza ritual
  rationale: El griego ofrece un ejemplo concreto de tiempos adecuados. La traducción conserva la instrucción moral específica sin ampliarla innecesariamente.
  doctrine_reference: Respetar la concreción ética del pasaje y no sobre-sistematizarla.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del inglés POB, especialmente el ajuste de ἀνθέξονται a ‘will support you’, la preferencia por ‘self-control for prayer’ en v. 8 y la formulación más cercana de ‘ordinances of every matter’ en v. 10. En español, esas decisiones se reflejan con ‘los sostendrán’, ‘dominio propio para la oración’ y ‘las ordenanzas de cada asunto’.
  spanish_consistency_notes:
  - Usé ‘Yahvé’ no porque aparezca explícitamente aquí, sino porque el pasaje dice ‘el Señor’; en este testamento extra-canónico el inglés POB traduce Κύριος como ‘the Lord’, y mantuve esa convención para no introducir una decisión no atestiguada en este verso.
  - Mantuve ‘diablo’ y no ‘acusador’ o ‘slanderer’ porque el contexto narrativo y el audit trail inglés favorecen la lectura personal adversarial.
  - Elegí un español neutral y de registro bíblico, evitando arcaísmos innecesarios como ‘he aquí’ solo donde reproduce adecuadamente el tono solemne del texto.
