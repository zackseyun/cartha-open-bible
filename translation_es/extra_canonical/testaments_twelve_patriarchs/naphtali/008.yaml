    5. Así como cuando alguien cría bien a un niño, tiene de él un buen recuerdo, así también, por una buena obra, hay un buen recuerdo delante de Dios.


    6. Pero al que no hace lo bueno, los ángeles y los hombres lo maldecirán, y Dios será deshonrado entre las naciones por medio de él, y el diablo lo reclama como su propio vaso, y toda fiera se enseñoreará de él, y el Señor lo odiará.


    7. Porque los mandamientos de la ley son de dos clases, y se cumplen con destreza.


    8. Porque hay un tiempo para la unión con una mujer, y un tiempo para el dominio propio para la oración[b][c].


