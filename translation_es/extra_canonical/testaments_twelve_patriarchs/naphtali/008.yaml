base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/008.yaml
  text: '1[a]. And behold, my children, I have shown you the times, that all these things will happen in Israel.

    2. And now, behold, command your children that they be united with Levi and with Judah. For through Judah salvation will arise for Israel, and in him Jacob will be blessed.

    3. Through his scepter God will appear on the earth, dwelling among men[b], to save the race of Israel, and he will gather the righteous from among the nations.

    4. Therefore, if you also do what is good, men and angels will bless you, and God will be glorified among the nations through you, and the devil will flee from you, and the wild beasts will fear you, and the Lord will love you, and the angels will support you.

    5. As when someone has reared a child well, he has a good remembrance of him, so also for a good work there is a good remembrance before God.

    6. But the one who does not do what is good, angels and men will curse him, and God will be dishonored among the nations through him, and the devil claims him as his own vessel, and every wild beast will lord it over him, and the Lord will hate him.

    7. For the commandments of the law are twofold, and they are fulfilled with skill.

    8. For there is a time for a man''s coming together with a woman, and a time for self-control for prayer.

    9. And both are from God, and if they do not take place in their proper order, they bring very great sin upon men. The same is true also of the rest of the commandments.

    10. Therefore become wise in God, my children, and prudent, perceiving the order of his commandments and the ordinances of every matter[d][c], so that the Lord may love you.'
  footnotes:
  - marker: a
    text: Some witnesses show textual expansion or variation in v. 3 around 'God will appear on the earth, dwelling among men.' The translation follows the fuller Greek wording in the supplied witness.
    reason: textual_variant
  - marker: b
    text: '''Through Judah'' and ''through his scepter'' in vv. 2-3 carry royal and salvation imagery; the passage may be read messianically, but the translation does not force a narrower doctrinal interpretation than the Greek itself states.'
    reason: cross_reference
  - marker: c
    text: The phrase 'coming together with a woman' in v. 8 is a decorous rendering of language referring to sexual union.
    reason: cultural_note
  - marker: d
    text: Or 'abstinence' for 'restraint' in v. 8; the sense is refraining at the proper time for prayer.
    reason: lexical_alternative
