base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/003.yaml
  text: '1[3:4]. So then, do not be eager in greed to corrupt your deeds, or by empty words to deceive your souls. For by keeping silent in purity of heart, you will understand how to hold fast the will of God and to cast away the will of Beliar.


    2. The sun and the moon and the stars do not alter their appointed order[3:4]; so you also must not alter the law of God through the disorder of your deeds.


    3. The nations, having gone astray and having forsaken the Lord, altered their order, and gave heed to wood and stone, to spirits of deceit.


    4. But you, my children, must not be so. Rather, know in the firmament, on the earth, and in the sea, and in all created things, the Lord who made all things, so that you may not become like Sodom, which changed the order of its nature.


    5. In the same way also the Watchers changed the order of their nature, and the Lord cursed them at the time of the flood[3:5][3:5]; because of them he made the earth uninhabited and barren.'
  footnotes:
  - marker: '3:4'
    text: '"Firmament" renders the Greek term for the sky or expanse of heaven, echoing creation language.'
    reason: cultural_note
  - marker: '3:4'
    text: The warning about Sodom says it "changed the order of its nature," preserving the chapter's repeated theme of divinely established order.
    reason: cross_reference
  - marker: '3:5'
    text: '"Watchers" refers to angelic beings known from Jewish apocalyptic tradition, especially in connection with the flood narrative.'
    reason: cultural_note
  - marker: '3:5'
    text: Some textual uncertainty surrounds the final clause, but the sense is that because of them the earth was made desolate and unfruitful.
    reason: textual_variant
