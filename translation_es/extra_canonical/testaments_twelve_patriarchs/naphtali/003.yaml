  to: '1. Así que no se entreguen con afán a la avaricia para corromper sus obras, ni a engañar sus almas con palabras vacías; porque, callando en pureza de corazón, entenderán cómo aferrarse a la voluntad de Dios y desechar la voluntad de Beliar.


    2. El sol, la luna y las estrellas no alteran su orden señalado; así también ustedes no deben alterar la ley de Dios por el desorden de sus obras.


    3. Las naciones, habiéndose extraviado y habiendo abandonado al Señor, alteraron su orden, y prestaron atención a madera y piedra, a espíritus de engaño.


    4. Pero ustedes, hijos míos, no sean así. Más bien, reconozcan en el firmamento[a], en la tierra, en el mar y en todas las cosas creadas, al Señor que hizo todas las cosas, para que no lleguen a ser como Sodoma, que cambió el orden de su naturaleza[b].


    5. De la misma manera, también los Vigilantes[c] cambiaron el orden de su naturaleza, y el Señor los maldijo en el tiempo del diluvio; por causa de ellos hizo la tierra sin habitantes y estéril[d].'
