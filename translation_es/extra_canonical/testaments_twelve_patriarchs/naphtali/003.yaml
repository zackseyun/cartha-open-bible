translation:
  language: es
  text: '1. Así que no se entreguen con afán a la avaricia para corromper sus obras, ni a engañar sus almas con palabras vacías; porque, callando en pureza de corazón, entenderán cómo aferrarse a la voluntad de Dios y desechar la voluntad de Beliar.


    2. El sol, la luna y las estrellas no alteran su orden señalado; así también ustedes no deben alterar la ley de Dios por el desorden de sus obras.


    3. Las naciones, habiéndose extraviado y habiendo abandonado al Señor, alteraron su orden, y prestaron atención a madera y piedra, a espíritus de engaño.


    4. Pero ustedes, hijos míos, no sean así. Más bien, reconozcan en el firmamento[a], en la tierra, en el mar y en todas las cosas creadas, al Señor que hizo todas las cosas, para que no lleguen a ser como Sodoma, que cambió el orden de su naturaleza[b].


    5. De la misma manera, también los Vigilantes[c] cambiaron el orden de su naturaleza, y el Señor los maldijo en el tiempo del diluvio; por causa de ellos hizo la tierra sin habitantes y estéril[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Firmamento’ traduce el término griego para el cielo o la expansión del cielo, en eco del lenguaje de la creación.
    reason: cultural_note
  - marker: b
    text: La advertencia sobre Sodoma conserva la expresión ‘cambió el orden de su naturaleza’, manteniendo el motivo repetido del orden establecido por Dios.
    reason: cross_reference
  - marker: c
    text: ‘Vigilantes’ designa a seres angelicales conocidos en la tradición apocalíptica judía, especialmente en relación con el relato del diluvio.
    reason: cultural_note
  - marker: d
    text: Hay cierta incertidumbre textual en la cláusula final, pero el sentido es que por causa de ellos la tierra quedó sin habitantes y estéril.
    reason: textual_variant
lexical_decisions:
- source_word: πλεονεξίᾳ
  english_pob_choice: greed
  chosen_spanish: avaricia
  alternatives_spanish:
  - codicia
  - ambición desordenada
  lexicon: BDAG
  rationale: ‘Avaricia’ comunica la fuerza moral del vicio en español y encaja con el contexto de corrupción ética de las obras. ‘Codicia’ era posible, pero ‘avaricia’ mantiene mejor el matiz de deseo desordenado de poseer.
- source_word: διαφθεῖραι
  english_pob_choice: to corrupt
  chosen_spanish: corromper
  alternatives_spanish:
  - arruinar
  - destruir
  lexicon: BDAG
  rationale: ‘Corromper’ reproduce bien la idea de deterioro moral de las obras, no de destrucción física.
- source_word: λόγοις κενοῖς
  english_pob_choice: empty words
  chosen_spanish: palabras vacías
  alternatives_spanish:
  - palabras vanas
  - palabras inútiles
  lexicon: BDAG
  rationale: ‘Palabras vacías’ suena natural en español y conserva el contraste con la pureza interior.
- source_word: καθαρότητι καρδίας
  english_pob_choice: purity of heart
  chosen_spanish: pureza de corazón
  alternatives_spanish:
  - limpieza de corazón
  - corazón puro
  lexicon: BDAG
  rationale: Es la formulación más clara y fiel al énfasis interior del griego.
- source_word: συνήσετε
  english_pob_choice: you will understand
  chosen_spanish: entenderán
  alternatives_spanish:
  - comprenderán
  - llegarán a entender
  lexicon: BDAG
  rationale: ‘Entenderán’ comunica bien el discernimiento práctico que resulta del callar en pureza de corazón.
- source_word: κρατεῖν
  english_pob_choice: to hold fast
  chosen_spanish: aferrarse a
  alternatives_spanish:
  - mantenerse en
  - sostener
  lexicon: BDAG
  rationale: ‘Aferrarse a’ transmite la adhesión firme a la voluntad de Dios mejor que un simple ‘guardar’.
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: Greek witness tradition
  rationale: Se conserva la forma griega atestiguada en este texto, como nombre propio personificado del mal.
- source_word: τάξιν
  english_pob_choice: order
  chosen_spanish: orden
  alternatives_spanish:
  - disposición
  - arreglo
  lexicon: BDAG
  rationale: ‘Orden’ preserva el motivo repetido de una estructura fijada por Dios en la creación y la conducta.
- source_word: ἀλλοιώσητε
  english_pob_choice: alter
  chosen_spanish: alterar
  alternatives_spanish:
  - cambiar
  - pervertir
  lexicon: BDAG
  rationale: ‘Alterar’ mantiene la conexión con el lenguaje repetido de modificar el orden establecido sin introducir una carga interpretativa adicional.
- source_word: ὑπήκουσαν ξύλοις καὶ λίθοις
  english_pob_choice: gave heed to wood and stone
  chosen_spanish: prestaron atención a la madera y a la piedra
  alternatives_spanish:
  - obedecieron a la madera y a la piedra
  - escucharon a la madera y a la piedra
  lexicon: BDAG
  rationale: ‘Prestar atención’ evita una construcción extraña en español y conserva el sentido de volverse hacia ídolos inertes.
- source_word: πνεύμασι πλάνης
  english_pob_choice: spirits of deceit
  chosen_spanish: espíritus de engaño
  alternatives_spanish:
  - espíritus de error
  - espíritus engañadores
  lexicon: BDAG
  rationale: ‘Engaño’ expresa bien la cualidad del espíritu y es más natural en español contemporáneo que ‘error’ en este contexto.
- source_word: στερεώματι
  english_pob_choice: firmament
  chosen_spanish: firmamento
  alternatives_spanish:
  - expansión
  - cielo
  lexicon: LEH
  rationale: Se conserva el término bíblico clásico porque el texto evoca el lenguaje de la creación; ‘firmamento’ es claro y digno en español.
- source_word: δημιουργήμασι
  english_pob_choice: created things
  chosen_spanish: cosas creadas
  alternatives_spanish:
  - criaturas
  - obras creadas
  lexicon: BDAG
  rationale: ‘Cosas creadas’ abarca el conjunto de la creación sin restringirlo a seres vivientes.
- source_word: ἐνήλλαξε τάξιν φύσεως αὐτῆς
  english_pob_choice: changed the order of its nature
  chosen_spanish: cambió el orden de su naturaleza
  alternatives_spanish:
  - alteró el orden de su naturaleza
  - invirtió el orden de su naturaleza
  lexicon: BDAG
  rationale: Se mantiene la repetición de ‘orden’ y la referencia a ‘naturaleza’ sin suavizar la afirmación del texto.
- source_word: Ἐγρήγοροι
  english_pob_choice: Watchers
  chosen_spanish: Vigilantes
  alternatives_spanish:
  - los Vigilantes
  - los que velan
  lexicon: Jewish apocalyptic usage
  rationale: ‘Vigilantes’ comunica el nombre del grupo en español y mantiene el carácter técnico de la tradición apocalíptica; se añade una nota para identificarlo.
- source_word: ἀοίκητον
  english_pob_choice: uninhabited
  chosen_spanish: sin habitantes
  alternatives_spanish:
  - inhabitable
  - deshabitada
  lexicon: BDAG
  rationale: ‘Sin habitantes’ refleja con precisión la desolación poblacional indicada por el texto, sin añadir una interpretación más fuerte de la necesaria.
- source_word: ἄκαρπον
  english_pob_choice: barren
  chosen_spanish: estéril
  alternatives_spanish:
  - infructuosa
  - sin fruto
  lexicon: BDAG
  rationale: ‘Estéril’ transmite bien la pérdida de fertilidad de la tierra y suena natural en este registro.
theological_decisions:
- issue: La referencia a Sodoma y el ‘orden de su naturaleza’
  english_pob_reading: Translate straightforwardly as a moral warning about violating created order, without expanding the specific sin beyond the Greek wording.
  chosen_spanish_reading: Traducir de forma directa como una advertencia moral sobre violar el orden creado, sin especificar más el pecado de Sodoma que lo que dice el griego.
  alternative_spanish_readings:
  - Interpretarlo de modo más específico como transgresión sexual
  - Generalizarlo solo como maldad social
  rationale: El griego vincula explícitamente a Sodoma con el cambio del orden natural. La traducción conserva esa afirmación sin introducir una elaboración doctrinal posterior en el texto principal.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
- issue: La identidad de Beliar
  english_pob_reading: Retain the proper name Beliar rather than paraphrasing as 'the devil' or 'wickedness.'
  chosen_spanish_reading: Conservar el nombre propio Beliar, no reemplazarlo por ‘el diablo’ o una abstracción.
  alternative_spanish_readings:
  - Belial
  - el maligno
  rationale: El texto conserva una personificación particular del mal; mantener el nombre respeta la textura literaria y la tradición del documento.
  doctrine_reference: Traducir títulos; transliterar nombres.
- issue: Los Vigilantes y el diluvio
  english_pob_reading: Translate the Greek witness as linking the Watchers' transgression with divine curse and the earth's desolation.
  chosen_spanish_reading: Traducir el testimonio griego como un vínculo entre la transgresión de los Vigilantes y la maldición divina, con la consecuencia de que la tierra quedó sin habitantes y estéril.
  alternative_spanish_readings:
  - Suavizar el elemento tradicional apocalíptico
  - Armonizarlo con Génesis 6 eliminando la referencia
  rationale: El texto refleja tradición judía del Segundo Templo. Conviene rendirla honestamente, con nota explicativa, en vez de armonizarla o atenuarla.
  doctrine_reference: Primacía del texto original sobre la tradición de traducción.
translation_notes:
  revision_awareness: Se incorporó la revisión del contexto inglés que eliminó el matiz condicional no sustentado en el v. 1 y que ajustó el cierre del v. 5 para reflejar mejor ‘ἀπὸ κατοικησίας’ y ‘ἄκαρπον’ con la idea de una tierra ‘sin habitantes y estéril’. También se mantuvo la coherencia con la tradición de traducción del texto griego atestiguado.
  spanish_consistency_notes:
  - Se mantiene ‘orden’ como término eje para τάξις en todo el pasaje.
  - Se conserva ‘Beliar’ como nombre propio estable, sin sustituirlo por una glosa interpretativa.
  - ‘Firmamento’ se usa con sentido bíblico clásico y recibe nota explicativa.
  - La pareja ‘sin habitantes y estéril’ intenta respetar el cierre revisado del v. 5 sin sobretraducirlo.
  - El registro busca ser litúrgico pero claro, evitando arcaísmos innecesarios.
