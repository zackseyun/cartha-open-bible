  text: 9. Ἡ δὲ⁵⁰ μήτηρ μου *Βάλλα ὑπῆρχε⁵¹ θυγάτηρ Ῥουθαίου⁵², ἀδελφοῦ Δεβόρρας⁵³, τῆς τροφοῦ Ῥεβέκκας⁵⁴, ἥτις⁵⁵ ἐν μιᾷ ἡμέρᾳ ἐτέχθη⁵⁶ ἐν ᾗ καὶ Ῥαχιήλ⁵⁷. 10. Ὁ δὲ Ῥουθαῖος⁵⁸ ἐκ τοῦ γένους ἦν⁵⁹ Ἀβραάμ, Χαλδαῖος, θεοσεβής, ἐλεύθερος καὶ εὐγενής. 11. *Καὶ αἰχμαλωτισθεὶς⁶⁰ ἠγοράσθη ὑπὸ Λαβάν· καὶ ἔδωκεν αὐτῷ Εὐνὰν⁶¹ τὴν παιδίσκην αὐτοῦ⁶² εἰς⁶³ γυναῖκα, ἥτις⁶⁴ ἔτεκε θυγατέρα, καὶ ἐκάλεσεν *τὸ ὄνομα αὐτῆς⁶⁵ Ζέλφαν⁶⁶, *ἐπʼ ὀνόματι⁶⁷ τῆς πόλεως⁶⁸ ἐν ᾗ αἰχμαλωτίσθη⁶⁹. 12. *Καὶ μετὰ τοῦτο ἔτεκεν τὴν Βάλλαν⁷⁰, λέγων· †Καινοποιός μου ἡ θυγάτηρ. II. *Ἐγὼ ἤμην κοῦφος¹ Γτοῖς ποσίν¹² *ὡς ἡ³ ἔλαφος Γκαὶ¹⁴ ἔταξέ με ὁ πατήρ μου ΓἸακὼβ¹⁵ εἰς πᾶσαν ἀγγελίαν⁶, *καίγε ὡσεὶ⁷ ἔλαφόν με ηὐλόγησεν⁸. 2. Καθὼς⁹ γὰρ *οἶδεν ὁ κεραμεὺς¹⁰ τὸ σκεῦος πόσον χωρεῖ, καὶ πρὸς αὐτὸ¹¹ φέρει τὸν¹² πηλόν, οὕτω¹³ καὶ ὁ Κύριος πρὸς ὁμοίωσιν τοῦ πνεύματος¹⁴ ποιεῖ¹⁵ τὸ σῶμα, καὶ πρὸς τὴν δύναμιν τοῦ σώματος¹⁶ *τὸ πνεῦμα ἐπιτίθησιν¹⁷. 3. Καὶ¹⁸ οὐκ *ἔστιν ἐνλεῖπον¹⁹ *ἐκ τοῦ ἑνὸς²⁰ *τρίτου τριχός²¹· *σταθμῷ γὰρ καὶ μέτρῳ²² καὶ κανόνι πᾶσα
    Γἡ¹²³ *κτίσις ἐγένετο²⁴. 4. Καὶ καθὼς²⁵ οἶδεν²⁶ ὁ κεραμεὺς ἑνὸς ἑκάστου τὴν χρῆσιν †ὡς²⁷ ἱκανή²⁸, οὕτω²⁹ καὶ ὁ Κύριος οἶδε τὸ σῶμα, ἕως τίνος διαρκέσει ἐν *τῷ ἀγαθῷ³⁰, καὶ πότε ἔρχεται³¹ *ἐν κακῷ³². 5. Ὅτι οὐκ ἔστι πλάσμα³³ καὶ πᾶσα ἔννοια ἣν Γοὐκ¹ ἔγνω Κύριος· *πάντα γὰρ³⁴ *ὁ ἄνθρωπον³⁵ ἔκτισεν κατʼ εἰκόνα ἑαυτοῦ³⁶. 6. *Ὡς γὰρ ἡ ἰσχὺς αὐτοῦ, οὕτως⁴⁸ καὶ ὁ λόγος αὐτοῦ⁵⁰, ἢ ἐν νόμῳ Κυρίου, ἢ ἐν νόμῳ⁵¹ τοῦ⁵² Βελίαρ. 7. Καὶ ὡς⁵³ κεχώρισται ἀνάμεσον *τοῦ φωτὸς καὶ ἀνάμεσον τοῦ σκότους⁵⁴ *δράσεώς τε καὶ ἀκοῆς⁵⁵, οὕτως⁵⁶ κεχώρισται ἀνάμεσον ἀνδρὸς καὶ *ἀνδρός, καὶ ἀνάμεσον γυναικὸς καὶ⁵⁷ γυναικός⁵⁸, καὶ οὐκ ἔστιν εἰπεῖν ὅτι †*ἐν τῷ ἑνὶ τοῖς προσώποις ἡττόμενον ἦν †⁵⁹. 8. *Πάντα ⌜γὰρ⌝⁶⁰ ἐν τάξει ἐποίησεν ὁ Θεὸς καλά· τὰς πέντε αἰσθήσεις ἐν τῇ κεφαλῇ *καὶ τὸν τράχηλον συνάψας τῇ κεφαλῇ⁶¹, *προσθεὶς αὐτῇ καὶ τρίχας εἰς εὐπρέπειαν καὶ δόξαν⁶², εἶτα⁶³ καρδίαν *εἰς φρόνησιν⁶⁴, κοιλίαν εἰς †διάκρισιν⁶⁵, *στόμαχον εἰς †ἀλεσμόν⁶⁶, †κάλαμον⁶⁷ πρὸς †ὑγείαν⁶⁸, ἧπαρ⁶⁹ πρὸς θυμόν, χολὴν πρὸς πικρίαν, ⌜καὶ⌝⁷⁰
    *σπλῆνα πρὸς γέλωτα⁷¹, νεφροὺς ⌜εἰς πανουργίαν⁷², ψύας⁷³⌝ εἰς δύναμιν, *†πλευρὰν εἰς τὸ καθεύδειν†⁷⁴, ὀσφὺν⁷⁵ εἰς ἰσχύν, καὶ τὰ ἑξῆς. 9. Οὕτως⁷⁶ ⌜οὖν⌝ *ἔστωσαν, τέκνα μου, πάντα τὰ ἔργα ὑμῶν ἐν τάξει εἰς ἀγαθόν⁷⁷ ἐν φόβῳ Θεοῦ, καὶ μηδὲν ἄτακτον ποιήσητε⁷⁸ ἐν καταφρονήσει, μηδὲ⁷⁹ ἔξω⁸⁰ *καιροῦ αὐτοῦ⁸¹. 10. *Ὅτι ἐὰν εἴπῃς τῷ ὀφθαλμῷ, Ἄκουε, οὐ δυνήσεται⁸²· οὕτως οὐδὲ *ἐν σκότει⁸³ *ὄντες δύνασθε ποιεῖν⁸⁴ ἔργα⁸⁵ φωτός.
