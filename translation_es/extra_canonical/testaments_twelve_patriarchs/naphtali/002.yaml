revisions:
- from: '1[a]. Yo era ágil de pies, como una cierva, y mi padre Jacob me destinó para todo recado; y me bendijo como si fuera una cierva.


    2. Porque, así como el alfarero sabe cuánto puede contener la vasija y, según eso, trae el barro para la obra, así también el Señor, conforme a la semejanza del espíritu, forma el cuerpo, y conforme a la capacidad del cuerpo coloca en él el espíritu.


    3. Y no hay en él deficiencia, ni siquiera en una tercera parte de un cabello; porque con peso, medida y regla fue hecha toda creación.


    4. Y así como el alfarero conoce el uso de cada vasija, y cuánto le es suficiente, así también el Señor conoce el cuerpo: cuánto tiempo durará en el bien y cuándo llega al mal.


    5. Porque no hay propósito de su creación que el Señor no conozca; pues creó a todo ser humano a su propia imagen.


    6[b]. Como es la fuerza de una persona, así también es su obra, ya sea en la ley del Señor o en la ley de Beliar.


    7. Y así como hay división entre la luz y las tinieblas, entre ver y oír, así también hay división entre hombre y hombre, y entre mujer y mujer; y no es posible decir que en todo una faz es la misma que otra.


    8. Porque Dios hizo todas las cosas buenas en su orden: los cinco sentidos en la cabeza, y unió el cuello a la cabeza; y añadió cabellos para belleza y gloria, después el corazón para entendimiento, el vientre para evacuación, el estómago para triturar, la tráquea para tomar aire, el hígado para ira, la bilis para amargura, el bazo para risa, los riñones para astucia, los lomos para fuerza, y los pulmones para inhalar; y así lo demás.


    9. Así pues, hijos míos, que todas sus obras estén en orden para bien, en el temor de Dios, y no hagan nada desordenado en desprecio, ni fuera de su tiempo oportuno.


    10. Porque si dices al ojo: «Escucha», no podrá; ni al oído: «Mira», no podrá.


    11. Del mismo modo, tampoco pueden hacer las obras del cielo en la tierra, ni las obras de la tierra en el cielo.


    12. Porque Dios hizo todas las cosas hermosas en su tiempo. Dio el sol para gobernar el día, y la luna y las estrellas para gobernar la noche.


    13. Por eso, hijos míos, reconozcan en su corazón que, así como el sol no es la luna, así tampoco los justos son los pecadores, ni los pecadores los justos.


    14. Pero hay una diferencia en la conducta, y en el entendimiento, y en el propósito.


    15. Porque el hombre justo tiene entendimiento en todo, pero el pecador camina en tinieblas y no sabe lo que hace.


    16. Por tanto, sean sabios en Dios, hijos míos, y entiendan el orden de todas las cosas, cada una en su tiempo, para que no transgredan la ley del Señor ni la ley de Beliar por confusión.


    17. Antes bien, elijan la ley del Señor y caminen en sencillez y en el temor de Dios, haciendo lo bueno delante de él.


    18. Si hacen estas cosas, hijos míos, prosperarán en toda obra y en todo consejo[d][c], y el Señor los bendecirá para siempre.'
