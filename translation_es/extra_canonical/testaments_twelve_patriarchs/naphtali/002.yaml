  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/002.yaml
  text: '1[a]. I was swift on my feet like a deer, and my father Jacob appointed me for every errand; and he blessed me as though I were a deer.


    2. For just as the potter knows how much the vessel can hold, and according to that brings the clay for the work, so also the Lord, according to the likeness of the spirit, makes the body, and according to the body''s capacity places the spirit within it.


    3. And there is no deficiency in it, not even by a third of a hair; for by weight and measure and rule every creation was made.


    4. And just as the potter knows the use of each vessel, how much it is fit for, so also the Lord knows the body: how long it will endure in good, and when it comes into evil.


    5. For there is no purpose of his creation that the Lord does not know; for he created every human being in his own image.


    6[b]. As a person''s strength is, so also is his work, whether in the law of the Lord or in the law of Beliar.


    7. And just as there is a division between light and darkness, between seeing and hearing, so there is also a division between man and man, and between woman and woman; and it is not possible to say that in all things one face is the same as another.


    8. For God made all things good in their order: the five senses in the head, and he joined the neck to the head; and he added hair for beauty, and the heart for understanding, the belly for excrement, the stomach for grinding, the windpipe for taking in air, the liver for anger, the gall for bitterness, the spleen for laughter, the kidneys for craftiness, the loins for strength, and the lungs for drawing in; and so the rest.


    9. So then, my children, let all your works be in order for good in the fear of God, and do nothing disorderly in contempt, nor outside its proper time.


    10. For if you say to the eye, “Hear,” it cannot; or to the ear, “See,” it cannot.


    11. In the same way, neither can you do the works of heaven on earth, nor the works of earth in heaven.


    12. For God made all things beautiful in their time. He gave the sun to rule the day, and the moon and stars to rule the night.


    13. Therefore, my children, recognize in your heart that as the sun is not the moon, so also the righteous are not the sinners, nor the sinners the righteous.


    14. But there is a difference in conduct and in understanding and in purpose.


    15. For the righteous man has understanding in all things, but the sinner walks in darkness and does not know what he does.


    16. Therefore be wise in God, my children, and understand the order of all things, each in its season, so that you may not transgress the law of the Lord or the law of Beliar by confusion.


    17. But rather choose the law of the Lord, and walk in simplicity and in the fear of God, doing what is good before him.


    18. If you do these things, my children, you will prosper in every work and in every counsel[d][c], and the Lord will bless you forever.'
  footnotes:
  - marker: a
    text: The Greek text at the start of the chapter is textually tangled in the OCR witness. The sense is that Naphtali describes himself as swift like a deer and therefore useful for carrying messages.
    reason: textual_variant
  - marker: b
    text: Verse 7 likely contrasts distinct faculties or functions; the transmitted Greek is unstable here. 'Seeing and hearing' fits the immediate argument from bodily members and senses.
    reason: textual_variant
  - marker: c
    text: 'Verse 8 contains a bodily-member catalogue preserved with textual disturbance. The translation follows the main sense of the list while keeping its paraenetic function: God ordered each part for its own role.'
    reason: textual_variant
  - marker: d
    text: Beliar is a traditional name in Jewish testamentary literature for the power opposed to God and his law.
    reason: cultural_note
