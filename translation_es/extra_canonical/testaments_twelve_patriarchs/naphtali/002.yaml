translation:
  language: es
  text: "1[a]. Yo era ágil de pies, como una cierva, y mi padre Jacob me destinó para todo recado; y me bendijo como si fuera una cierva.\n\n\n    2. Porque, así como el alfarero sabe cuánto puede contener la vasija y, según eso, trae el barro para la obra, así también el Señor, conforme a la semejanza del espíritu, forma el cuerpo, y conforme a la capacidad del cuerpo coloca en él el espíritu.\n\n\n    3. Y no hay en él deficiencia, ni siquiera en una tercera parte de un cabello; porque con peso, medida y regla fue hecha toda creación.\n\n\n    4. Y así como el alfarero conoce el uso de cada vasija, y cuánto le es suficiente, así también el Señor conoce el cuerpo: cuánto tiempo durará en el bien y cuándo llega al mal.\n\n\n    5. Porque no hay propósito de su creación que el Señor no conozca; pues creó a todo ser humano a su propia imagen.\n\n\n    6[b]. Como es la fuerza de una persona, así también es su obra, ya sea en la ley del Señor o en la ley de Beliar.\n\n\n    7. Y así como hay\
    \ división entre la luz y las tinieblas, entre ver y oír, así también hay división entre hombre y hombre, y entre mujer y mujer; y no es posible decir que en todo una faz es la misma que otra.\n\n\n    8. Porque Dios hizo todas las cosas buenas en su orden: los cinco sentidos en la cabeza, y unió el cuello a la cabeza; y añadió cabellos para belleza y gloria, después el corazón para entendimiento, el vientre para evacuación, el estómago para triturar, la tráquea para tomar aire, el hígado para ira, la bilis para amargura, el bazo para risa, los riñones para astucia, los lomos para fuerza, y los pulmones para inhalar; y así lo demás.\n\n\n    9. Así pues, hijos míos, que todas sus obras estén en orden para bien, en el temor de Dios, y no hagan nada desordenado en desprecio, ni fuera de su tiempo oportuno.\n\n\n    10. Porque si dices al ojo: «Escucha», no podrá; ni al oído: «Mira», no podrá.\n\n\n    11. Del mismo modo, tampoco pueden hacer las obras del cielo en la tierra, ni las obras\
    \ de la tierra en el cielo.\n\n\n    12. Porque Dios hizo todas las cosas hermosas en su tiempo. Dio el sol para gobernar el día, y la luna y las estrellas para gobernar la noche.\n\n\n    13. Por eso, hijos míos, reconozcan en su corazón que, así como el sol no es la luna, así tampoco los justos son los pecadores, ni los pecadores los justos.\n\n\n    14. Pero hay una diferencia en la conducta, y en el entendimiento, y en el propósito.\n\n\n    15. Porque el hombre justo tiene entendimiento en todo, pero el pecador camina en tinieblas y no sabe lo que hace.\n\n\n    16. Por tanto, sean sabios en Dios, hijos míos, y entiendan el orden de todas las cosas, cada una en su tiempo, para que no transgredan la ley del Señor ni la ley de Beliar por confusión.\n\n\n    17. Antes bien, elijan la ley del Señor y caminen en sencillez y en el temor de Dios, haciendo lo bueno delante de él.\n\n\n    18. Si hacen estas cosas, hijos míos, prosperarán en toda obra y en todo consejo[c][d], y el Señor\
    \ los bendecirá para siempre."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El comienzo del capítulo en griego presenta una transmisión textualmente enredada en el testimonio OCR. El sentido es que Neftalí se describe como ligero de pies, como una cierva, y por eso apto para llevar recados.
    reason: textual_variant
  - marker: b
    text: El griego del versículo 7 probablemente contrapone facultades o funciones distintas; el texto transmitido es inestable aquí. «Ver y oír» sigue el argumento inmediato sobre miembros y sentidos.
    reason: textual_variant
  - marker: c
    text: 'El versículo 8 contiene un catálogo de miembros corporales conservado con perturbación textual. La traducción sigue el sentido principal de la lista manteniendo su función paraenética: Dios ordenó cada parte para su propio papel.'
    reason: textual_variant
  - marker: d
    text: Beliar es un nombre tradicional en la literatura testamentaria judía para el poder opuesto a Dios y su ley.
    reason: cultural_note
lexical_decisions:
- source_word: κοῦφος ... τοῖς ποσίν ... ὡς ἡ ἔλαφος
  english_pob_choice: swift on my feet like a deer
  chosen_spanish: ágil de pies, como una cierva
  alternatives_spanish:
  - ligero de pies, como una cierva
  - veloz de pies, como un ciervo
  lexicon: LSJ
  rationale: κοῦφος expresa ligereza o agilidad; con la comparación animal, el valor natural en español es la agilidad de pies. Elegí «cierva» porque el símil con ἔλαφος puede oírse como cervatillo/cierva y funciona bien en español sin volverlo tosco.
- source_word: ἀγγελία
  english_pob_choice: errand
  chosen_spanish: recado
  alternatives_spanish:
  - mensaje
  - comisión
  lexicon: LSJ
  rationale: En el contexto doméstico y narrativo, «recado» comunica bien la tarea concreta de ir y venir. Mantiene el sentido práctico mejor que «mensaje», que suena más abstracto.
- source_word: πρὸς ὁμοίωσιν τοῦ πνεύματος
  english_pob_choice: according to the likeness of the spirit
  chosen_spanish: conforme a la semejanza del espíritu
  alternatives_spanish:
  - según la semejanza del espíritu
  - de acuerdo con la figura del espíritu
  lexicon: LSJ
  rationale: «Conforme a la semejanza» conserva la relación de correspondencia sin forzar una antropología técnica. «Semejanza» mantiene la resonancia bíblica y el paralelismo con el texto griego.
- source_word: τῇ δυνάμει τοῦ σώματος τὸ πνεῦμα ἐπιτίθησιν
  english_pob_choice: according to the body's capacity places the spirit within it
  chosen_spanish: conforme a la capacidad del cuerpo coloca en él el espíritu
  alternatives_spanish:
  - según la fuerza del cuerpo pone en él el espíritu
  - de acuerdo con la capacidad del cuerpo deposita en él el espíritu
  lexicon: LSJ
  rationale: «Capacidad» rinde δύναμις en este contexto de contención y proporción mejor que «fuerza». «Coloca en él» conserva el acto de situar/poner sin añadir una psicología ajena al pasaje.
- source_word: σταθμῷ ... μέτρῳ ... κανόνι
  english_pob_choice: by weight and measure and rule
  chosen_spanish: con peso, medida y regla
  alternatives_spanish:
  - por peso, medida y norma
  - con balanza, medida y regla
  lexicon: LSJ
  rationale: La tríada de términos expresa orden y proporción. «Regla» mantiene la fuerza de κανών como norma/estándar, y «peso y medida» suena natural en español.
- source_word: κτίσις
  english_pob_choice: creation
  chosen_spanish: creación
  alternatives_spanish:
  - criatura
  - lo creado
  lexicon: LSJ
  rationale: Aquí κτίσις es colectiva y cosmológica, no una sola criatura. «Creación» preserva el alcance general del argumento.
- source_word: διαρκέσει ἐν τῷ ἀγαθῷ
  english_pob_choice: will endure in good
  chosen_spanish: durará en el bien
  alternatives_spanish:
  - permanecerá en el bien
  - durará en lo bueno
  lexicon: LSJ
  rationale: «En el bien» deja abierta la amplitud ética y existencial del giro griego. Evita reducirlo a prosperidad material y sigue de cerca la formulación del original.
- source_word: ἔννοια
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - pensamiento
  - intención
  lexicon: LSJ
  rationale: El contexto trata del diseño divino de lo creado; «propósito» expresa bien la idea de finalidad o intención de la creación.
- source_word: κατ’ εἰκόνα ἑαυτοῦ
  english_pob_choice: in his own image
  chosen_spanish: a su propia imagen
  alternatives_spanish:
  - según su propia imagen
  - a imagen de sí mismo
  lexicon: LSJ
  rationale: «A su propia imagen» conserva la alusión reconocible a Génesis y su cadencia natural en español.
- source_word: νόμῳ Κυρίου ... νόμῳ Βελίαρ
  english_pob_choice: law of the Lord ... law of Beliar
  chosen_spanish: ley del Señor ... ley de Beliar
  alternatives_spanish:
  - instrucción del Señor ... norma de Beliar
  - ley del Señor ... ley del Maligno
  lexicon: LSJ
  rationale: Se conserva «ley» para mantener el dualismo moral del pasaje. «Beliar» se translitera como nombre propio, siguiendo el testimonio literario del texto y evitando diluir la oposición.
- source_word: κεχώρισται
  english_pob_choice: there is a division
  chosen_spanish: hay división
  alternatives_spanish:
  - está separado
  - está dividido
  lexicon: LSJ
  rationale: El perfecto comunica una distinción ya establecida. «Hay división» suena natural en español y preserva el contraste ontológico.
- source_word: δράσεώς τε καὶ ἀκοῆς
  english_pob_choice: between seeing and hearing
  chosen_spanish: entre ver y oír
  alternatives_spanish:
  - entre la acción y el oír
  - entre visión y audición
  lexicon: LSJ
  rationale: La tradición textual es inestable, pero el contexto del pasaje trata de facultades corporales. «Ver y oír» refleja la oposición sensorial que exige el argumento.
- source_word: ἐν τάξει
  english_pob_choice: in order
  chosen_spanish: en orden
  alternatives_spanish:
  - ordenadamente
  - con el debido orden
  lexicon: LSJ
  rationale: Es un término ético clave del capítulo. «En orden» mantiene la relación con la creación ordenada y con el llamado práctico.
- source_word: ἄτακτον
  english_pob_choice: disorderly
  chosen_spanish: desordenado
  alternatives_spanish:
  - sin orden
  - indisciplinado
  lexicon: LSJ
  rationale: Es el contraste directo de τάξις. «Desordenado» conserva el paralelismo visible con el griego y es claro en español.
- source_word: ἔξω καιροῦ αὐτοῦ
  english_pob_choice: outside its proper time
  chosen_spanish: fuera de su tiempo oportuno
  alternatives_spanish:
  - fuera de su tiempo
  - fuera de su momento debido
  lexicon: LSJ
  rationale: καιρός aquí indica el momento apropiado o debido. «Tiempo oportuno» expresa esa idea sin perder la dimensión moral de actuar a destiempo.
theological_decisions:
- issue: Anthropology of body and spirit in vv. 2-4
  english_pob_reading: The text teaches divine correspondence and ordering between body and spirit without requiring a later systematic body-soul dualism.
  chosen_spanish_reading: El texto enseña correspondencia y orden divinos entre cuerpo y espíritu, sin imponer una dualidad cuerpo-alma posterior y sistemática.
  alternative_spanish_readings:
  - El texto enseña un dualismo fuerte entre cuerpo y alma.
  - El texto hace solo una observación fisiológica.
  rationale: La analogía del alfarero subraya proporción, capacidad y diseño divino. La traducción conserva esa tensión sin meter categorías doctrinales posteriores que el griego no obliga a leer aquí.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Moral dualism in 'law of the Lord' versus 'law of Beliar'
  english_pob_reading: Translate the dualism directly as two opposed moral spheres of allegiance.
  chosen_spanish_reading: Traducir el dualismo directamente como dos esferas morales opuestas de lealtad.
  alternative_spanish_readings:
  - «costumbre del Señor» versus «costumbre de inutilidad»
  - demitologizar a Beliar en un mal abstracto
  rationale: El testimonio griego personifica a Beliar como poder opuesto en esta literatura testamentaria. El español mantiene el nombre propio y el contraste ético tajante.
  doctrine_reference: Primacía del idioma original sobre la tradición de traducción; preservar la tensión teológica.
translation_notes:
  revision_awareness: Esta versión sigue el sentido principal del testimonio griego de Charles 1908 y su auditoría inglesa, sin depender mecánicamente de la redacción inglesa. No se registraron revisiones aplicadas en el historial más reciente; por eso la redacción se mantiene estable y solo adapta con naturalidad las decisiones léxicas al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada para el nombre divino en el proyecto, pero en este pasaje el testimonio griego usa Κύριος y la auditoría inglesa traduce «Lord»; por consistencia con el contexto literario y la traducción auditada, aquí se usa «Señor».
  - «Beliar» se conserva como nombre propio del polo opuesto moral, en vez de sustituirlo por «el Maligno», porque el testimonio y la auditoría inglesa preservan la referencia testamentaria tradicional.
  - Se usa «cierva» en el símil inicial para una imagen natural en español; aunque el inglés dice «deer», el griego ἔλαφος permite una imagen cervina amplia y el contexto favorece la agilidad.
  - «Espíritu» aparece con minúscula en el razonamiento antropológico porque no hay referencia explícita al Espíritu Santo en esta sección.
