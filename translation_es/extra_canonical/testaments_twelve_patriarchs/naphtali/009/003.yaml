translation:
  language: es
  text: Y sus hijos hicieron conforme a todo lo que les había mandado Naphtali, su padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἐποίησαν
  english_pob_choice: And ... did
  chosen_spanish: Y ... hicieron
  alternatives_spanish:
  - Y ... cumplieron
  - Y ... obedecieron
  lexicon: ποιέω
  rationale: El griego usa un verbo general de hacer; en este contexto narrativo, «hicieron» reproduce de modo natural la acción cumplida sin añadir matiz interpretativo excesivo. «Cumplieron» o «obedecieron» son posibles, pero estrechan el sentido más allá del verbo base.
- source_word: οἱ υἱοὶ αὐτοῦ
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - los hijos de él
  lexicon: υἱός
  rationale: «Hijos» comunica bien el grupo filial en español y evita una redundancia dura. Aunque υἱοί puede subrayar varones, aquí el contexto familiar permite una traducción natural sin perder el referente.
- source_word: κατὰ πάντα ὅσα
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  lexicon: κατά + πᾶς + ὅς
  rationale: «Conforme a todo lo que» conserva la idea de conformidad total del griego y suena idiomático en español bíblico contemporáneo.
- source_word: ἐνετείλατο αὐτοῖς
  english_pob_choice: had commanded them
  chosen_spanish: les había mandado
  alternatives_spanish:
  - les había ordenado
  - les había dado instrucciones
  lexicon: ἐντέλλομαι
  rationale: El verbo griego expresa mandato/encargo con fuerza autoritativa. «Mandado» mantiene esa fuerza de manera clara y directa en español. «Ordenado» también es válido, pero «mandado» encaja mejor con el tono narrativo familiar del pasaje.
- source_word: Νεφθαλείμ ὁ πατὴρ αὐτῶν
  english_pob_choice: Naphtali their father
  chosen_spanish: Naphtali, su padre
  alternatives_spanish:
  - Neftalí, su padre
  - su padre, Naphtali
  lexicon: Νεφθαλείμ
  rationale: Se conserva el nombre propio de la tradición del texto base, siguiendo el audit trail inglés. «Naphtali» mantiene la forma documental del POB; en español puede leerse como nombre transliterado del testimonio griego.
theological_decisions:
- issue: Énfasis en obediencia filial a las instrucciones del padre
  english_pob_reading: And his sons did according to all that Naphtali their father had commanded them.
  chosen_spanish_reading: Y sus hijos hicieron conforme a todo lo que les había mandado Naphtali, su padre.
  alternative_spanish_readings:
  - Y sus hijos obedecieron todo lo que Naphtali, su padre, les había mandado
  - Y sus hijos cumplieron todo lo que su padre Naphtali les había mandado
  rationale: El versículo presenta obediencia completa a la palabra paterna; la traducción mantiene ese valor sin convertirlo en una exhortación moral explícita. Se preserva la relación de autoridad doméstica que el texto resalta.
  doctrine_reference: Obediencia familiar / autoridad paterna en el relato testamentario
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; por ello, la presente propuesta sigue de cerca el texto griego y el intento inglés ya estabilizado, sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se mantiene la estrategia de traducir el griego de manera directa y auditable, con español natural.
  - No se introducen términos técnicos o eclesiásticos que no estén apoyados por el texto fuente.
  - La puntuación conserva la unidad sintáctica del mandato y la respuesta filial.
