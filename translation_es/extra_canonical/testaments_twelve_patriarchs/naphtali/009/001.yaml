  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: una cláusula participial inicial seguida por la petición de llevar sus huesos a Hebrón y sepultarlo con sus padres. Sin embargo, ἐντειλάμενος se inclina más a ''dar instrucciones/encargar'' que a ''enseñar'', y la nota sobre ''trasladaran sus huesos'' no preserva una alternativa significativa sino que explica un matiz ya suficientemente claro en el texto.'
