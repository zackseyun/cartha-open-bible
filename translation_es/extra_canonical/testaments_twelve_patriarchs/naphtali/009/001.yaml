  - severity: low
    issue: Nota al pie innecesaria sobre 'trasladaran sus huesos'
    rationale: La nota no registra una alternativa textual ni una ambigüedad nueva en español; solo parafrasea el verbo griego.
  revised_spanish_text: Y después de haberles dado instrucciones sobre muchas cosas semejantes, les rogó que trasladaran sus huesos a Hebrón y lo enterraran con sus padres.
