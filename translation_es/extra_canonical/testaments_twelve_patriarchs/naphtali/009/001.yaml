base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/009/001.yaml
  text: And after instructing them in many such things, he urged them to carry his bones to Hebron and bury him with his fathers.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:51Z'
    unchanged: false
    changes_summary: Removed 'over' from 'carry his bones over to Hebron' for a more natural and formally neutral rendering; otherwise retained the draft, which accurately reflects the Greek.
translation:
  language: es
  text: Y después de haberles dado instrucciones sobre muchas cosas semejantes, les rogó que trasladaran sus huesos a Hebrón y lo enterraran con sus padres.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: πολλὰ τοιαῦτα
  english_pob_choice: many such things
  chosen_spanish: muchas cosas semejantes
  alternatives_spanish:
  - muchas cosas así
  - muchas cosas de este tipo
  lexicon: πολύς; τοιοῦτος
  rationale: La construcción griega no enumera el contenido, sino que lo resume como enseñanza reiterada o de carácter similar. 'Muchas cosas semejantes' conserva ese valor resumidor sin añadir precisión que el texto no da.
- source_word: ἐντειλάμενος
  english_pob_choice: after instructing them
  chosen_spanish: después de haberles enseñado
  alternatives_spanish:
  - después de haberles mandado
  - tras haberles dado instrucciones
  lexicon: ἐντέλλομαι
  rationale: El verbo puede implicar ordenar o encargar. En español, 'enseñar' aquí recoge la idea de amonestar/instruir ampliamente, en línea con la secuencia discursiva del pasaje, sin forzar un tono militar o legal que el contexto no exige.
- source_word: παρεκάλεσεν
  english_pob_choice: he urged them
  chosen_spanish: les rogó
  alternatives_spanish:
  - les exhortó
  - les insistió
  lexicon: παρακαλέω
  rationale: '''παρακαλέω'' admite exhortar, animar o rogar. Dado que el objeto es una petición final sobre sus huesos, ''les rogó'' expresa la súplica insistente con dignidad y naturalidad en español.'
- source_word: μετακομίσωσι τὰ ὀστᾶ αὐτοῦ
  english_pob_choice: carry his bones to Hebron
  chosen_spanish: trasladaran sus huesos a Hebrón
  alternatives_spanish:
  - llevaran sus huesos a Hebrón
  - transportaran sus huesos a Hebrón
  lexicon: μετακομίζω; ὀστέα
  rationale: '''Trasladaran'' conserva el sentido de mover de un lugar a otro de manera formal y respetuosa, muy adecuado para restos humanos. ''Huesos'' sigue de cerca el griego y el uso bíblico para restos mortales.'
- source_word: μετὰ τῶν πατέρων αὐτοῦ
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - junto a sus padres
  - con sus antepasados
  lexicon: μετά; πατέρες
  rationale: La frase bíblica tradicional alude a ser sepultado en la tumba familiar/ancestral. 'Con sus padres' mantiene la expresión directa del original; 'antepasados' explicaría el sentido, pero debilita la forma heredada del texto.
theological_decisions:
- issue: Sepultura con los padres / fórmula ancestral
  english_pob_reading: bury him with his fathers
  chosen_spanish_reading: lo enterraran con sus padres
  alternative_spanish_readings:
  - lo sepultaran con sus antepasados
  - lo enterraran en la tumba de sus padres
  rationale: No hay dificultad doctrinal nueva, pero sí una fórmula bíblica estable. Se conserva 'con sus padres' para respetar el lenguaje ancestral del griego y su resonancia narrativa, sin convertirlo en una explicación interpretativa.
  doctrine_reference: Genesis 49:29-33; 50:13
- issue: Verbo de petición final
  english_pob_reading: he urged them
  chosen_spanish_reading: les rogó
  alternative_spanish_readings:
  - les exhortó
  - les encargó
  rationale: '''Rogó'' comunica bien la carga afectiva y la insistencia de una despedida; evita dar a la petición un matiz más autoritativo del que el contexto inmediato requiere.'
  doctrine_reference: Philippians 1:27; 1 Thessalonians 2:11-12
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa que eliminó 'over' en favor de 'to Hebron'; en español se refleja de forma natural con 'a Hebrón', sin añadir una partícula espacial innecesaria. La redacción sigue de cerca el griego y la última forma auditada del inglés.
  spanish_consistency_notes:
  - Se mantiene 'Hebrón' como topónimo estándar en español.
  - Se usa un registro sobrio y bíblico sin recurrir a 'SEÑOR' ni a otros sustitutos no pertinentes.
  - '''Huesos'' se conserva por fidelidad al original y por su valor idiomático en fórmulas de sepultura bíblica.'
