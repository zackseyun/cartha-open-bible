id: T12P.NAP.9.2
reference: Testament of Naphtali 9:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 2. Καὶ⁷ φαγὼν *καὶ πιὼν⁸ ἐν ἱλαρότητι ψυχῆς⁹ συνεκάλυψε¹⁰ τὸ πρόσωπον αὐτοῦ καὶ ἀπέθανε.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/009/002.yaml
  text: And having eaten and drunk with gladness of soul, he covered his face and died.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:21Z'
    unchanged: false
    changes_summary: Revised 'after eating and drinking' to 'having eaten and drunk' for closer alignment with the Greek participles and a more formal register.
translation:
  language: es
  text: Y, habiendo comido y bebido con alegría de alma, cubrió su rostro y murió.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ φαγὼν καὶ πιὼν
  english_pob_choice: having eaten and drunk
  chosen_spanish: habiendo comido y bebido
  alternatives_spanish:
  - después de comer y beber
  - habiendo comido y bebido
  lexicon: φαγὼν / πιὼν
  rationale: Los participios aoristos se vierten de forma participial en español para mantener la relación temporal y el registro formal del POB en inglés revisado. 'Habiendo' conserva mejor la construcción original que una paráfrasis con 'después de'.
- source_word: ἐν ἱλαρότητι ψυχῆς
  english_pob_choice: with gladness of soul
  chosen_spanish: con alegría de alma
  alternatives_spanish:
  - con gozo de alma
  - con alegría interior
  lexicon: ἱλαρότης ψυχῆς
  rationale: '''Alegría de alma'' refleja de manera directa la expresión griega y mantiene la metáfora anímica. ''Gozo'' sería viable, pero ''alegría'' sigue más de cerca el valor léxico de ἱλαρότης en este contexto.'
- source_word: συνεκάλυψε τὸ πρόσωπον αὐτοῦ
  english_pob_choice: he covered his face
  chosen_spanish: cubrió su rostro
  alternatives_spanish:
  - cubrió su cara
  - veló su rostro
  lexicon: συνεκάλυψε τὸ πρόσωπον
  rationale: '''Rostro'' conserva el tono bíblico y más elevado de πρόσωπον, sin añadir un sentido ritual que el griego no explicita. ''Cara'' es posible, pero menos acorde al registro del texto.'
- source_word: ἀπέθανε
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - murió
  lexicon: ἀπέθανε
  rationale: '''Murió'' es la correspondencia natural y directa para el hecho simple del verbo aoristo. ''Falleció'' introduce un matiz eufemístico no requerido por la fuente.'
theological_decisions:
- issue: Expresión de la alegría del alma antes de la muerte
  english_pob_reading: with gladness of soul
  chosen_spanish_reading: con alegría de alma
  alternative_spanish_readings:
  - con gozo de alma
  - con alegría interior
  rationale: Se mantiene la afirmación literal de una disposición interior positiva sin suavizarla ni espiritualizarla. La frase no se convierte en una interpretación devocional más amplia, porque el griego concreta la alegría como estado del alma.
  doctrine_reference: antropología bíblica; lenguaje del alma
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente, que cambió 'after eating and drinking' por 'having eaten and drunk' para reflejar con mayor exactitud los participios griegos. Por eso se prefirió 'habiendo comido y bebido' y no una subordinada temporal más libre.
  spanish_consistency_notes:
  - Se mantiene el tratamiento formal y sobrio del episodio narrativo.
  - No se introducen mayúsculas innecesarias para 'alma' o 'rostro', porque el contexto no exige personificación doctrinal.
  - La puntuación conserva una sola cláusula principal con participios iniciales, en paralelo al griego y al inglés revisado.
