translation:
  language: es
  text: 'Se los conté a mi padre, y él me dijo: «Estas cosas deben cumplirse en los tiempos que les corresponden, después de que Israel haya soportado mucho».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ταῦτα τὰ δύο ἐνύπνια
  english_pob_choice: these two dreams
  chosen_spanish: estos dos sueños
  alternatives_spanish:
  - estos dos sueños en visión nocturna
  - estas dos visiones soñadas
  lexicon: ταῦτα; δύο; ἐνύπνια
  rationale: «Sueños» reproduce directamente ἐνύπνια y mantiene la concreción del texto; se evita ampliar a «visiones» porque el griego no lo exige. «Estos» y «dos» siguen de cerca el demostrativo y el numeral.
- source_word: εἶπον τῷ πατρί μου
  english_pob_choice: I told ... to my father
  chosen_spanish: Les conté ... a mi padre
  alternatives_spanish:
  - Se los conté a mi padre
  - Dije ... a mi padre
  lexicon: εἶπον; πατήρ
  rationale: «Conté» expresa bien el acto de relatar sueños en español natural y conserva el valor de decir/relatar. Se mantiene «mi padre» para τῷ πατρί μου.
- source_word: Δεῖ ταῦτα πληρωθῆναι
  english_pob_choice: These things must be fulfilled
  chosen_spanish: Estas cosas deben cumplirse
  alternatives_spanish:
  - Estas cosas tienen que cumplirse
  - Estas cosas deben ser cumplidas
  lexicon: δεῖ; πληρόω
  rationale: «Deben cumplirse» conserva la necesidad impersonal de δεῖ y el sentido de realización/completamiento de πληρωθῆναι sin forzar una pasiva demasiado pesada en español.
- source_word: κατὰ τοὺς καιροὺς αὐτῶν
  english_pob_choice: in their appointed times
  chosen_spanish: en sus tiempos señalados
  alternatives_spanish:
  - en sus tiempos designados
  - según sus tiempos
  lexicon: καιρός
  rationale: «Tiempos señalados» comunica el carácter fijado o determinado de καιροί y evita una traducción más abstracta que pierda el matiz temporal concreto.
- source_word: πολλὰ τοῦ Ἰσραὴλ ὑπομείναντος
  english_pob_choice: after Israel has endured much
  chosen_spanish: después de que Israel haya soportado mucho
  alternatives_spanish:
  - tras haber sufrido mucho Israel
  - después de que Israel haya perseverado mucho
  lexicon: ὑπομένω; Ἰσραήλ
  rationale: «Soportado mucho» preserva el sentido de resistencia bajo aflicción de ὑπομείναντος sin decidir de antemano entre sufrimiento y perseverancia; el español mantiene la tensión semántica presente en el griego.
theological_decisions:
- issue: Cumplimiento de los sueños/visión profética en el tiempo de Dios
  english_pob_reading: These things must be fulfilled in their appointed times
  chosen_spanish_reading: Estas cosas deben cumplirse en sus tiempos señalados
  alternative_spanish_readings:
  - Estas cosas se cumplirán en el tiempo que les corresponde
  - Estas cosas han de cumplirse a su debido tiempo
  rationale: La formulación conserva la necesidad divina y la idea de un cumplimiento ordenado por tiempos determinados, sin introducir especificaciones escatológicas ajenas al texto.
  doctrine_reference: Providencia divina; cumplimiento profético
- issue: La experiencia de Israel como período de aflicción o resistencia
  english_pob_reading: after Israel has endured much
  chosen_spanish_reading: después de que Israel haya soportado mucho
  alternative_spanish_readings:
  - después de que Israel haya sufrido mucho
  - tras la mucha resistencia de Israel
  rationale: 'Se mantiene la ambigüedad fértil de ὑπομείναντος: puede abarcar sufrimiento y perseverancia bajo prueba. «Soportado» deja abierta esa tensión sin resolverla artificialmente.'
  doctrine_reference: Perseverancia bajo prueba; aflicción de Israel
translation_notes:
  revision_awareness: El texto griego presenta la secuencia narración de sueños → respuesta del padre → necesidad de cumplimiento → marco temporal → condición de Israel. La versión inglesa POB fue revisada y dejó sin cambios el sentido básico; la propuesta española sigue de cerca esa lectura sin depender mecánicamente del inglés, y conserva la tensión de ὑπομείναντος con una solución que no reduce el verbo a un solo matiz.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se mantiene «Israel» como nombre del pueblo, sin singularizar ni reinterpretar.
  - Se prefiere «cumplirse» para πληρωθῆναι por coherencia con otros pasajes POB de cumplimiento.
  - No se añaden notas al pie porque el verso no presenta variantes textuales o alternativas que deban anclarse en el texto español.
