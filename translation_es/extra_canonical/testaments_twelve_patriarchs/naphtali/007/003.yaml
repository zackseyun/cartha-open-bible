base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/007/003.yaml
  text: And weeping, he said, “Alas, my child Joseph, you are alive, and I do not see you; and you do not see Jacob, who fathered you.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:49Z'
    unchanged: false
    changes_summary: Added a comma after the participial opener for natural English flow, and replaced 'the one who fathered you' with the more natural formal relative clause 'who fathered you' without changing meaning.
translation:
  language: es
  text: 'Y llorando, dijo: «¡Ay de mí, hijo mío José! Estás vivo, y no te veo; y tú no ves a Jacob, que te engendró».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ κλαίων ἔλεγε
  english_pob_choice: And weeping, he said
  chosen_spanish: Y llorando, dijo
  alternatives_spanish:
  - Y mientras lloraba, dijo
  - Y llorando, él decía
  lexicon: καί; κλαίων (participio de κλαίω); λέγω
  rationale: El participio adverbial se vierte de forma natural al español con una apertura circunstancial breve. «Dijo» conserva el acto puntual del discurso en estilo directo, mientras que «decía» podría sugerir iteración innecesaria.
- source_word: Οἴμοι
  english_pob_choice: Alas
  chosen_spanish: ¡Ay de mí!
  alternatives_spanish:
  - ¡Ay!
  - ¡Pobre de mí!
  lexicon: οἴμοι
  rationale: Expresa lamento personal con mayor naturalidad y fuerza en español, sin suavizar el dolor del grito original.
- source_word: τέκνον μου Ἰωσήφ
  english_pob_choice: my child Joseph
  chosen_spanish: hijo mío José
  alternatives_spanish:
  - mi hijo José
  - hijo mío, José
  lexicon: τέκνον; Ἰωσήφ
  rationale: «Hijo mío» refleja el posesivo afectivo del griego; «José» conserva el nombre propio. El orden español más natural es vocativo con nombre al final o en aposición estrecha.
- source_word: ζῇς
  english_pob_choice: you are alive
  chosen_spanish: Estás vivo
  alternatives_spanish:
  - Vives
  - sigues vivo
  lexicon: ζάω
  rationale: En español, «estar vivo» comunica de forma directa el estado resultante que el contexto enfatiza.
- source_word: οὐ βλέπω σε
  english_pob_choice: I do not see you
  chosen_spanish: no te veo
  alternatives_spanish:
  - no te miro
  - no puedo verte
  lexicon: βλέπω
  rationale: «Ver» mantiene el valor perceptivo básico y es la opción más natural en español. No se añade modalidad no atestiguada como «puedo».
- source_word: καὶ σὺ οὐχ ὁρᾷς Ἰακὼβ
  english_pob_choice: and you do not see Jacob
  chosen_spanish: y tú no ves a Jacob
  alternatives_spanish:
  - y tú no contemplas a Jacob
  - y tú no puedes ver a Jacob
  lexicon: ὁράω
  rationale: Se conserva la repetición del verbo de visión y el énfasis del pronombre explícito «tú», que corresponde al contraste del griego.
- source_word: τὸν γεννήσαντά σε
  english_pob_choice: who fathered you
  chosen_spanish: que te engendró
  alternatives_spanish:
  - que te dio a luz
  - que te hizo nacer
  lexicon: γεννάω
  rationale: «Engendró» preserva el matiz de paternidad biológica activa del participio, más cercano al griego que una formulación genérica de origen.
theological_decisions:
- issue: Lamento familiar y vocativo afectivo
  english_pob_reading: Alas, my child Joseph
  chosen_spanish_reading: ¡Ay de mí, hijo mío José!
  alternative_spanish_readings:
  - ¡Ay, hijo mío José!
  - ¡Pobre de mí, mi hijo José!
  rationale: No hay carga doctrinal especial, pero sí una expresión de dolor intenso y relación paterno-filial. Se opta por una forma que preserve el lamento y el vínculo afectivo sin introducir solemnidad eclesiástica ajena al texto.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa, que hizo más natural la abertura participial y simplificó la cláusula relativa final sin alterar el sentido. En español se mantuvo ese mismo equilibrio: sintaxis natural, sin perder la fuerza del lamento ni la repetición de la visión/no visión.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» y otras sustituciones no pertinentes porque el versículo no contiene el nombre divino.
  - Se mantiene el nombre propio «José» y la relación filial explícita para conservar la tensión afectiva del pasaje.
  - Se usa un castellano neutral y publicable, sin arcaísmos innecesarios ni calcos duros.
