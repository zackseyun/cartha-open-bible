source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 3. Καὶ κλαίων ἔλεγε¹⁵· *Οἴμοι, τέκνον μου Ἰωσήφ, ζῇς¹⁶, καὶ *οὐ βλέπω σε¹⁷, *καὶ σὺ οὐχ¹⁸ ὁρᾷς Ἰακὼβ τὸν γεννήσαντά σε.
