translation:
  language: es
  text: Así que, con estas palabras, me hizo llorar también. Pero yo ardía en mis entrañas por decirle que José había sido vendido, y sin embargo tenía miedo de mis hermanos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐποίησε ... δακρῦσαι ... ἐν τοῖς λόγοις τούτοις
  english_pob_choice: he made me weep also / by these words
  chosen_spanish: me hizo llorar también / con estas palabras
  alternatives_spanish:
  - me hizo derramar lágrimas también
  - con estas palabras me hizo llorar también
  lexicon: ποιέω; δακρύω; λόγος
  rationale: La construcción griega expresa causalidad mediante ‘con estas palabras’; en español ‘me hizo llorar también’ conserva la fuerza causativa sin añadir interpretación. ‘Con estas palabras’ mantiene el vínculo instrumental/medio de λόγοις τούτοις.
- source_word: ἐκαιόμην τοῖς σπλάγχνοις μου
  english_pob_choice: I was burning in my inward parts
  chosen_spanish: yo ardía en mis entrañas
  alternatives_spanish:
  - ardía en mi interior
  - se me encendían las entrañas
  lexicon: καίω; σπλάγχνα
  rationale: ‘Ardía en mis entrañas’ reproduce la imagen visceral de σπλάγχνα y el imperfecto continuo de ἐκαιόμην. ‘Entrañas’ preserva el registro semítico/afectivo mejor que una explicación abstracta como ‘interior’.
- source_word: ἀναγγεῖλαι ὅτι πέπραται Ἰωσήφ
  english_pob_choice: to tell him that Joseph had been sold
  chosen_spanish: por decirle que José había sido vendido
  alternatives_spanish:
  - para decirle que José había sido vendido
  - anunciarle que José había sido vendido
  lexicon: ἀναγγέλλω; πωλέω (perfect passive)
  rationale: ‘Por decirle’ refleja el impulso interior hacia el acto de informar; ‘había sido vendido’ conserva el valor resultativo del perfecto pasivo πέπραται sin convertirlo en presente simple. Se usa ‘José’ como forma española estable del nombre.
- source_word: ἀλλʼ ἐφοβούμην τοὺς ἀδελφούς μου
  english_pob_choice: yet I was afraid of my brothers
  chosen_spanish: y sin embargo tenía miedo de mis hermanos
  alternatives_spanish:
  - pero temía a mis hermanos
  - sin embargo, temía a mis hermanos
  lexicon: φοβέομαι; ἀδελφοί
  rationale: ‘Tenía miedo de’ es natural en español para el estado durativo del imperfecto ἐφοβούμην. ‘Mis hermanos’ conserva la relación fraterna directa del texto.
theological_decisions:
- issue: Descripción afectiva e interior (‘entrañas’) sin suavizarla
  english_pob_reading: I was burning in my inward parts
  chosen_spanish_reading: yo ardía en mis entrañas
  alternative_spanish_readings:
  - ardía en mi interior
  - ardía por dentro
  rationale: No se sustituye la imagen corporal por una abstracción psicológica, porque el griego usa σπλάγχνα para un centro afectivo real y vívido. ‘Entrañas’ mantiene la intensidad antropológica del original y de la POB inglesa.
  doctrine_reference: Antropología bíblica; lenguaje afectivo semítico
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; por ello se mantiene el sentido de la POB inglesa, ajustado solo a una formulación española natural y fiel al griego.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico sin arcaísmos innecesarios.
  - ‘José’ se usa de forma uniforme para Ἰωσήφ.
  - No se introduce mayúscula teológica innecesaria en ‘entrañas’ ni en ‘miedo’, porque no hay referencia directa al Espíritu o a un título divino en este versículo.
