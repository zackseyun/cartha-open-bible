translation:
  language: es
  text: 'Entonces mi padre me dijo: «Creo a Dios que José está vivo; porque siempre veo que el Señor lo cuenta entre nosotros».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πιστεύω τῷ θεῷ
  english_pob_choice: I believe God
  chosen_spanish: Creo a Dios
  alternatives_spanish:
  - Creo en Dios
  - Le creo a Dios
  - Creo a Dios que...
  lexicon: πιστεύω + dative; θεός
  rationale: El griego con dativo permite el sentido de confiar/creer a alguien. La redacción española conserva la fuerza relacional y testimonial del original sin convertirla innecesariamente en una fórmula devocional fija. Se mantiene la apertura sintáctica que introduce la proposición siguiente.
- source_word: ζῇ Ἰωσήφ
  english_pob_choice: Joseph is alive
  chosen_spanish: José está vivo
  alternatives_spanish:
  - José vive
  - José sigue vivo
  lexicon: ζάω
  rationale: “Está vivo” expresa el estado resultante de ζῇ de manera natural en español. “Vive” sería posible, pero aquí el contexto narrativo enfatiza la noticia de supervivencia.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: κύριος
  rationale: Aunque el proyecto normalmente usa “Yahvé” para el nombre divino, aquí el griego dice κύριος en una formulación narrativa que el English POB conservó como “the Lord”. Mantener “el Señor” respeta el audit trail y evita forzar una identificación explícita que el texto griego no marca aquí con el nombre hebreo.
- source_word: ἀριθμεῖ αὐτὸν μεθʼ ἡμῶν
  english_pob_choice: counts him as being with us
  chosen_spanish: lo cuenta como estando con nosotros
  alternatives_spanish:
  - lo cuenta entre nosotros
  - lo considera con nosotros
  - lo enumera junto con nosotros
  lexicon: ἀριθμέω + μετὰ ἡμῶν
  rationale: ἀριθμεῖ puede significar contar/enumerar o considerar dentro de un grupo. La elección “lo cuenta como estando con nosotros” reproduce la ambigüedad productiva del inglés POB y conserva la idea de inclusión en la compañía familiar/comunitaria.
theological_decisions:
- issue: Relación entre κύριος y el nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Dios
  rationale: No se expande κύριος a “Yahvé” porque el pasaje griego citado no porta explícitamente el Tetragrámaton; la equivalencia auditada del POB en inglés ya eligió “the Lord”. En español, “el Señor” preserva el registro reverente y la cautela textual.
  doctrine_reference: Divine name usage in translated quotations; textual transparency
- issue: Confesión de fe sobre la vida de José
  english_pob_reading: I believe God that Joseph is alive
  chosen_spanish_reading: Creo a Dios que José está vivo
  alternative_spanish_readings:
  - Creo en Dios que José está vivo
  - Creo que Dios ha hecho vivir a José
  rationale: La frase expresa confianza en el testimonio divino sobre la vida de José, no una formulación doctrinal abstracta. La traducción conserva la tensión sintáctica del dativo y la afirmación factual del relato.
  doctrine_reference: Narrative testimony and trust in divine revelation
translation_notes:
  revision_awareness: El texto inglés POB más reciente figura como sin cambios tras revisión; por tanto, no se introdujeron variaciones interpretativas adicionales. La versión española sigue de cerca el audit trail inglés y el griego subyacente sin amplificar términos no presentes en el pasaje.
  spanish_consistency_notes:
  - Se mantuvo “el Señor” para κύριος en consonancia con el inglés auditado y con la forma narrativa del pasaje.
  - Se usó “José” en lugar de “Joseph” para la forma castellana estándar del nombre propio.
  - No se añadieron notas al pie porque el verso no presenta una variante textual o ambigüedad que el español requiera marcar explícitamente más allá de las decisiones lexicográficas ya documentadas.
