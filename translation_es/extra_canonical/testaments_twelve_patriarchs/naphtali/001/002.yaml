translation:
  language: es
  text: Cuando sus hijos se habían reunido en el séptimo mes, el primer día del mes, les hizo un banquete.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Συνελθόντων τῶν υἱῶν αὐτοῦ
  english_pob_choice: When his sons had gathered together
  chosen_spanish: Cuando sus hijos se habían reunido
  alternatives_spanish:
  - Cuando se habían reunido sus hijos
  - Al reunirse sus hijos
  lexicon: συνέρχομαι
  rationale: El participio aoristo genitivo absoluto expresa una acción previa al verbo principal; en español, el pluscuamperfecto comunica bien esa anterioridad sin forzar una paráfrasis. 'Sus hijos' conserva la relación posesiva natural del griego.
- source_word: ἐν τῷ ἑβδόμῳ μηνί
  english_pob_choice: in the seventh month
  chosen_spanish: en el séptimo mes
  alternatives_spanish:
  - durante el séptimo mes
  lexicon: μήν
  rationale: '''En el séptimo mes'' reproduce de forma directa la referencia temporal del original y coincide con la lectura auditada en inglés.'
- source_word: μιᾷ τοῦ μηνός
  english_pob_choice: on the first day of the month
  chosen_spanish: el primer día del mes
  alternatives_spanish:
  - el día primero del mes
  - al primer día del mes
  lexicon: εἷς / μήν
  rationale: La expresión griega fija el día dentro del mes; 'el primer día del mes' es la formulación natural y precisa en español.
- source_word: ἐποίησε δεῖπνον αὐτοῖς
  english_pob_choice: he made a feast for them
  chosen_spanish: les hizo un banquete
  alternatives_spanish:
  - les preparó un banquete
  - les hizo una fiesta
  lexicon: ποιέω + δεῖπνον
  rationale: δεῖπνον puede ser una comida formal o festiva; 'banquete' preserva el carácter de celebración mejor que un simple 'comida'. 'Les hizo' sigue de cerca el verbo griego 'ἐποίησε' y el dativo beneficiario 'αὐτοῖς'.
theological_decisions:
- issue: Valor temporal y ceremonial de la comida
  english_pob_reading: he made a feast for them
  chosen_spanish_reading: les hizo un banquete
  alternative_spanish_readings:
  - les hizo una comida festiva
  - les preparó un banquete
  rationale: No hay carga doctrinal explícita en el verso; la decisión es mantener el tono ceremonial del acto sin introducir términos eclesiásticos ni devocionales que el texto no requiere.
  doctrine_reference: none
translation_notes:
  revision_awareness: The latest audit pass reported no changes needed and high agreement (0.97) with the source; this Spanish draft follows that stable reading without introducing new textual claims.
  spanish_consistency_notes:
  - 'Se conserva el orden temporal del griego: reunión de los hijos, luego ubicación en el séptimo mes, después el primer día del mes y finalmente el banquete.'
  - Se evita 'fiesta' para no perder el matiz de comida formal/solemne que sugiere δεῖπνον en este contexto.
