translation:
  language: es
  text: 'Entonces comenzó a hablar: «Oíd, hijos míos, hijos de Neftalí; oíd las palabras de vuestro padre».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἥρξατο δὲ λέγειν
  english_pob_choice: Then he began to speak
  chosen_spanish: Entonces comenzó a hablar
  alternatives_spanish:
  - Y comenzó a hablar
  - Luego empezó a hablar
  lexicon: ἄρχομαι + λέγειν
  rationale: La secuencia griega introduce el discurso con valor narrativo simple; «entonces comenzó a hablar» conserva el inicio del discurso sin añadir matices. «Comenzó» mantiene el aspecto inceptivo mejor que una simple coordinación.
- source_word: Ἀκούσατε
  english_pob_choice: Hear
  chosen_spanish: Oíd
  alternatives_spanish:
  - Escuchad
  - Oigan
  lexicon: ἀκούω
  rationale: El imperativo plural exhortativo en contexto solemne se rinde con «oíd», que es natural en registro bíblico y conserva el llamado directo. «Escuchad» sería igualmente posible, pero «oíd» sigue más de cerca el valor tradicional de imperativo auditivo.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - mis hijos, mis niños
  lexicon: τέκνα
  rationale: «Hijos míos» refleja bien el vocativo afectivo y paternal. «Niños» sería demasiado específico; «hijos» preserva el tono familiar sin infantilizar a los destinatarios.
- source_word: υἱοὶ Νεφθαλείμ
  english_pob_choice: sons of Naphtali
  chosen_spanish: hijos de Neftalí
  alternatives_spanish:
  - hijos de Naphtalí
  - descendientes de Neftalí
  lexicon: υἱός
  rationale: En español bíblico, «hijos de» puede mantener tanto el sentido literal como el de pertenencia tribal. Se usa «Neftalí» como forma castellana habitual del nombre propio.
- source_word: λόγους πατρὸς ὑμῶν
  english_pob_choice: the words of your father
  chosen_spanish: las palabras de vuestro padre
  alternatives_spanish:
  - las palabras de su padre
  - las palabras de vuestro padre
  lexicon: λόγοι
  rationale: Se conserva el plural «palabras» y el posesivo de segunda persona plural «vuestro» para reproducir la apelación directa del griego. «Padre» queda singular como en el original.
theological_decisions:
- issue: Relación entre «hijos míos» y «hijos de Neftalí»
  english_pob_reading: Hear, my children, sons of Naphtali
  chosen_spanish_reading: Oíd, hijos míos, hijos de Neftalí
  alternative_spanish_readings:
  - Oíd, mis hijos, hijos de Neftalí
  - Escuchad, hijos míos, descendientes de Neftalí
  rationale: 'El griego yuxtapone un vocativo afectivo («τέκνα μου») con una identificación tribal («υἱοὶ Νεφθαλείμ»). En español se preserva la doble referencia sin fusionarla: el hablante se dirige a sus hijos y los ubica dentro de la línea de Neftalí.'
  doctrine_reference: No aplica; decisión de estructura y apelación vocativa.
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa presentan alta concordancia; no hay revisiones aplicadas ni diferencias textuales relevantes para este versículo. Se mantiene la lectura narrativa simple y la doble forma de vocativo/identificación tribal sin añadir glosa interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Neftalí» como forma estable del nombre en español.
  - Se usa un registro bíblico claro y sobrio, compatible con el resto del proyecto.
  - No se introducen notas al pie porque el griego y el audit trail inglés no registran variantes ni tensiones léxicas que exijan nota en este versículo.
