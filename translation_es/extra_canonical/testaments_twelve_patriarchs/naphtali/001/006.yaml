  text: 6. Ἐγὼ ἐγεννήθην ἀπὸ Βάλλας²⁸, Γκαὶ¹²⁹ ὅτι³⁰ ἐν πανουργίᾳ ἐποίησε³¹ Ῥαχιήλ³², καὶ ἔδωκεν *ἀντʼ αὐτῆς³³ Βάλλαν³⁴ *τῷ Ἰακώβ³⁵, καὶ *συλλαβοῦσα ἔτεκέ με ἐπὶ τῶν γονάτων τῆς Ῥαχιήλ³⁶, Γκαὶ³⁷ διὰ τοῦτο *ἐκάλεσε τὸ ὄνομά μου³⁸ Νεφθαλείμ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/001/006.yaml
  text: I was born from Bilhah, because Rachel acted with cunning and gave Bilhah to Jacob in her place; and Bilhah conceived and bore me on Rachel’s knees, and for this reason she called my name Naphtali.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:14Z'
    unchanged: false
    changes_summary: Changed 'upon Rachel’s knees' to 'on Rachel’s knees' for more natural formal English. The rest of the draft accurately reflects the Greek and is complete.
translation:
  language: es
  text: Yo nací de Bilha, porque Raquel actuó con astucia y dio a Bilha a Jacob en su lugar; y Bilha concibió y me dio a luz sobre las rodillas de Raquel, y por eso llamó mi nombre Neftalí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγεννήθην ἀπὸ Βάλλας
  english_pob_choice: I was born from Bilhah
  chosen_spanish: Yo nací de Bilha
  alternatives_spanish:
  - Yo fui nacido de Bilha
  - Nací de Bilha
  lexicon: γεννάω / ἀπό
  rationale: El griego expresa origen natal con ἐγεννήθην ἀπό; en español natural y fiel, «nací de» conserva el origen materno sin sonar forzado.
- source_word: ἐν πανουργίᾳ
  english_pob_choice: with cunning
  chosen_spanish: con astucia
  alternatives_spanish:
  - con engaño
  - con sagacidad
  lexicon: πανουργία
  rationale: «Astucia» refleja bien la destreza estratégica con posible tono moral negativo, sin intensificar más allá del griego.
- source_word: ἀντʼ αὐτῆς
  english_pob_choice: in her place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de ella
  - sustituyéndola
  lexicon: ἀντί
  rationale: La frase marca sustitución vicaria; «en su lugar» es la forma más natural y exacta en español.
- source_word: συλλαβοῦσα ἔτεκέ με
  english_pob_choice: conceived and bore me
  chosen_spanish: concibió y me dio a luz
  alternatives_spanish:
  - concibió y me alumbró
  - quedó encinta y me dio a luz
  lexicon: συλλαμβάνω / τίκτω
  rationale: Mantiene la secuencia de concepción y parto con el registro sobrio adecuado.
- source_word: ἐπὶ τῶν γονάτων τῆς Ῥαχιήλ
  english_pob_choice: on Rachel’s knees
  chosen_spanish: sobre las rodillas de Raquel
  alternatives_spanish:
  - en las rodillas de Raquel
  - sobre el regazo de Raquel
  lexicon: γόνυ
  rationale: «Sobre las rodillas» sigue de cerca la imagen griega y la tradición narrativa; no se suaviza la tensión corporal del texto.
- source_word: ἐκάλεσε τὸ ὄνομά μου Νεφθαλείμ
  english_pob_choice: she called my name Naphtali
  chosen_spanish: llamó mi nombre Neftalí
  alternatives_spanish:
  - me llamó Neftalí
  - puso mi nombre Neftalí
  lexicon: καλέω / ὄνομα
  rationale: Se conserva la construcción semítica «llamó mi nombre», que el texto presenta de forma directa y que ayuda a percibir la fórmula de nombramiento.
theological_decisions:
- issue: Retener la atribución de astucia a Raquel sin atenuarla
  english_pob_reading: Rachel acted with cunning
  chosen_spanish_reading: Raquel actuó con astucia
  alternative_spanish_readings:
  - Raquel obró con engaño
  - Raquel actuó con picardía
  rationale: El griego πανουργίᾳ no es neutral; la traducción preserva la evaluación del relato y no la suaviza en una formulación moralmente más amable.
  doctrine_reference: Génesis 30:3-8; testimonio narrativo sobre el linaje de Neftalí
- issue: Conservar la escena de nacimiento 'sobre las rodillas de Raquel'
  english_pob_reading: on Rachel’s knees
  chosen_spanish_reading: sobre las rodillas de Raquel
  alternative_spanish_readings:
  - en las rodillas de Raquel
  - sobre el regazo de Raquel
  rationale: La imagen corporal puede parecer extraña, pero es parte del testimonio tradicional del texto y no debe domesticarse sin base textual.
  doctrine_reference: Antiguo Testamento, Génesis 30:3-8; tradición patriarcal
translation_notes:
  revision_awareness: La revisión inglesa reciente solo ajustó la naturalidad de una preposición ('upon' -> 'on') sin alterar el sentido. La versión española refleja directamente el griego y mantiene la imagen de ubicación corporal con una preposición natural ('sobre').
  spanish_consistency_notes:
  - Se usa «Neftalí» como forma española habitual del nombre propio.
  - Se evita «SEÑOR» o lenguaje de sustitución doctrinal porque este pasaje no contiene el nombre divino.
  - La construcción de nacimiento y nombramiento sigue de cerca el patrón narrativo del griego y del testimonio bíblico paralelo en Génesis 30.
