id: T12P.NAP.1.8
reference: Testament of Naphtali 1:8
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 8. Ὅθεν καὶ ὅμοιός μου⁴⁶ ἦν Γκατὰ πάντα¹⁴⁷ Ἰωσὴφ⁴⁸ κατὰ τὰς †εὐλογίας⁴⁹ Ῥαχιήλ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/001/008.yaml
  text: Therefore Joseph also was like me in every way, according to the prayers of Rachel.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:15Z'
    unchanged: false
    changes_summary: Changed 'blessings' to 'prayers' to reflect the manuscript reading εὐχάς noted in the apparatus and to fit Rachel as the subject more naturally. Retained the rest of the wording as accurate and formal.
translation:
  language: es
  text: Por tanto, José también fue semejante a mí en todo, conforme a las oraciones de Raquel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὅθεν καὶ
  english_pob_choice: Therefore ... also
  chosen_spanish: Por tanto ... también
  alternatives_spanish:
  - Así que ... también
  - Por eso ... también
  lexicon: ὅθεν / καὶ
  rationale: «Por tanto» conserva la inferencia lógica de la frase inicial; «también» refleja καὶ sin forzar un matiz adicional.
- source_word: ὅμοιός μου ἦν
  english_pob_choice: was like me
  chosen_spanish: fue semejante a mí
  alternatives_spanish:
  - era como yo
  - fue igual a mí
  lexicon: ὅμοιος
  rationale: «Semejante a mí» preserva la comparación sin igualarla de manera absoluta; «igual a mí» sería demasiado fuerte para ὅμοιος.
- source_word: Γκατὰ πάντα
  english_pob_choice: in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - en todas las cosas
  - en todo aspecto
  lexicon: κατὰ πάντα
  rationale: «En todo» es natural en español y conserva la amplitud total del alcance.
- source_word: τὰς ... Ῥαχιήλ
  english_pob_choice: the prayers of Rachel
  chosen_spanish: las oraciones de Raquel
  alternatives_spanish:
  - las plegarias de Raquel
  - las súplicas de Raquel
  lexicon: εὐλογίαι / εὐχάς (según la tradición manuscrita y la revisión auditada)
  rationale: La revisión auditada corrigió el sentido hacia «prayers»; «oraciones» refleja bien εὐχάς en español y mantiene a Raquel como sujeto de la acción.
theological_decisions:
- issue: El sentido de εὐλογίας en el texto transmitido frente a la lectura revisada εὐχάς
  english_pob_reading: according to the prayers of Rachel
  chosen_spanish_reading: conforme a las oraciones de Raquel
  alternative_spanish_readings:
  - según las bendiciones de Raquel
  - conforme a las bendiciones de Raquel
  rationale: El expediente de revisión indica que la lectura preferida es εὐχάς, por lo que «oraciones» evita atribuir a Raquel el acto de bendecir y se ajusta mejor al testimonio textual auditado.
  doctrine_reference: Crítica textual y lectura del manuscrito; no es una cuestión doctrinal
- issue: Relación comparativa entre José y el hablante
  english_pob_reading: Joseph also was like me in every way
  chosen_spanish_reading: José también fue semejante a mí en todo
  alternative_spanish_readings:
  - José también era como yo en todo
  - José también fue igual a mí en todo
  rationale: La formulación mantiene la comparación del texto fuente sin intensificarla a identidad plena, preservando la tensión semántica de ὅμοιος.
  doctrine_reference: Semántica léxica de ὅμοιος
translation_notes:
  revision_awareness: La versión en inglés fue revisada desde «according to the blessings of Rachel» a «according to the prayers of Rachel» para reflejar la lectura manuscrita εὐχάς; la traducción española sigue esa decisión auditada y evita el término «bendiciones».
  spanish_consistency_notes:
  - He mantenido un registro formal y claro, sin arcaísmos innecesarios.
  - He usado «oraciones» en lugar de «bendiciones» para alinearme con la revisión textual auditada.
  - No se añadieron notas al pie porque la frase española no requiere una alternativa textual adicional para su comprensión.
