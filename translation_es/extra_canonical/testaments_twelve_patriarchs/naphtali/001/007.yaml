id: T12P.NAP.1.7
reference: Testament of Naphtali 1:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 7. *Ἠγάπησε γάρ³⁹ με Ῥαχιὴλ⁴⁰ πάνυ⁴¹, ὅτι ἐπὶ *τῶν γονάτων⁴² αὐτῆς ἐγεννήθην, καὶ ἔτι⁴³ ἁπαλὸν ὄντα *με κατεφίλει⁴⁴ λέγουσα· *Δοίη μοι ἀδελφόν⁴⁵ σου ἐκ τῆς κοιλίας μου κατά σε.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/001/007.yaml
  text: For Rachel loved me greatly, because I was born upon her knees; and while I was still tender she kept kissing me, saying, ‘May I be given from my own womb a brother like you.’
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:15Z'
    unchanged: false
    changes_summary: Restored the omitted clause ‘and Rachel bore me,’ kept the repeated subject for completeness, and adjusted ‘when I was still a tender child’ to the more literal ‘While I was still tender’ to better reflect the Greek without expansion.
translation:
  language: es
  text: 'Porque Raquel me amó mucho, pues nací sobre sus rodillas; y todavía tierno, me besaba, diciendo: «¡Que me sea dado de mi propio vientre un hermano como tú!»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἠγάπησε ... πάνυ
  english_pob_choice: loved me greatly
  chosen_spanish: me amó mucho
  alternatives_spanish:
  - me amó grandemente
  - me amó muchísimo
  lexicon: ἀγαπάω
  rationale: Conservo el verbo de amor en sentido afectivo y familiar; «mucho» expresa con naturalidad la intensidad de πάνυ sin sonar forzado en español bíblico.
- source_word: ἐπὶ τῶν γονάτων αὐτῆς ἐγεννήθην
  english_pob_choice: I was born upon her knees
  chosen_spanish: nací sobre sus rodillas
  alternatives_spanish:
  - fui nacido sobre sus rodillas
  - nací en sus rodillas
  lexicon: γόνυ / γεννάω
  rationale: Mantengo la imagen corporal concreta del texto griego y del POB inglés, con una construcción española fluida y fiel.
- source_word: ἔτι ἁπαλὸν ὄντα
  english_pob_choice: while I was still tender
  chosen_spanish: todavía tierno
  alternatives_spanish:
  - siendo aún tierno
  - cuando aún era tierno
  - siendo todavía pequeño
  lexicon: ἁπαλός
  rationale: «Tierno» conserva la cualidad física/inmadura del adjetivo sin añadir «niño»; el adverbio «todavía» reproduce ἔτι.
- source_word: με κατεφίλει
  english_pob_choice: she kept kissing me
  chosen_spanish: me besaba
  alternatives_spanish:
  - me seguía besando
  - me besaba continuamente
  lexicon: καταφιλέω
  rationale: El imperfecto ya sugiere acción repetida o continuada; «me besaba» es suficiente y no sobre-explicita la frecuencia.
- source_word: Δοίη μοι ἀδελφόν σου ἐκ τῆς κοιλίας μου κατά σε
  english_pob_choice: May I be given ... a brother from my womb, like you
  chosen_spanish: ¡Que me sea dado de mi propio vientre un hermano como tú!
  alternatives_spanish:
  - ¡Que se me dé de mi vientre un hermano como tú!
  - ¡Que me sea dado un hermano de mi vientre, como tú!
  lexicon: δίδωμι / ἀδελφός / κοιλία
  rationale: Conservo la petición desiderativa y la imagen de procedencia «de mi propio vientre», que refleja ἐκ τῆς κοιλίας μου. «Hermano» se mantiene literal, con el comparativo «como tú» para κατά σε.
theological_decisions:
- issue: Petición maternal de Raquel y el lenguaje del vientre
  english_pob_reading: May I be given from my own womb a brother like you.
  chosen_spanish_reading: Que me sea dado de mi propio vientre un hermano como tú.
  alternative_spanish_readings:
  - Que me sea dado un hermano de mi vientre, como tú.
  - Que de mi vientre me sea dado un hermano como tú.
  rationale: No suavizo el lenguaje corporal ni transformo la imagen en una abstracción. La formulación conserva el sentido de deseo implícito y el origen materno literal del griego.
  doctrine_reference: Lectura literal de la imaginería familiar; sin implicación doctrinal especial.
translation_notes:
  revision_awareness: El inglés POB revisado restauró la cláusula equivalente a «and Rachel bore me» y ajustó «while I was still tender» para reflejar mejor el griego. En español, la primera idea queda integrada de forma natural en «nací sobre sus rodillas», sin necesidad de una cláusula adicional; se conservó además la secuencia «todavía tierno» para reflejar ἔτι ἁπαλὸν ὄντα sin expansión.
  spanish_consistency_notes:
  - Se usó «Raquel» como forma castellana estándar del nombre propio.
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece el nombre divino en el texto fuente.
  - Se prefirió la literalidad de la imagen corporal («rodillas», «vientre») por ser parte del audit trail y no requerir domesticación semántica.
