translation:
  language: es
  text: 'Y por la mañana, después de que despertó, les dijo: «Me estoy muriendo»; pero no le creyeron.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ τὸ πρωὶ
  english_pob_choice: And in the morning
  chosen_spanish: Y por la mañana
  alternatives_spanish:
  - Y en la mañana
  - Y a la mañana
  lexicon: καί; πρωί
  rationale: «Por la mañana» transmite de modo natural el marco temporal del griego sin volverlo más específico de lo que el texto indica. Mantiene la sencillez del inglés POB y es idiomático en español bíblico contemporáneo.
- source_word: μετὰ τὸ ἐξυπνισθῆναι αὐτόν
  english_pob_choice: after he awoke
  chosen_spanish: después de que despertó
  alternatives_spanish:
  - después de despertar
  - tras haber despertado
  lexicon: μετά + infinitivo aoristo pasivo de ἐξυπνίζω
  rationale: Se conserva la secuencia temporal explícita del griego. «Despertó» es más natural en español que una construcción demasiado literal con pasiva, y no añade matices ajenos al original.
- source_word: Ἀποθνήσκω
  english_pob_choice: I am dying
  chosen_spanish: Me estoy muriendo
  alternatives_spanish:
  - Estoy muriendo
  - Voy a morir
  lexicon: ἀποθνῄσκω
  rationale: El presente del griego expresa el estado/proceso de morir. «Me estoy muriendo» comunica esa progresividad en español con mayor claridad que un simple futuro o una fórmula más rígida.
- source_word: οὐκ ἐπίστευσαν αὐτῷ
  english_pob_choice: they did not believe him
  chosen_spanish: no le creyeron
  alternatives_spanish:
  - no creyeron en él
  - no le prestaron fe
  lexicon: πιστεύω + dativo
  rationale: '«Creerle» reproduce bien el dativo personal: no aceptaron su afirmación. Es la forma más natural y fiel en español para esta construcción.'
theological_decisions:
- issue: Valor de la afirmación de muerte inminente
  english_pob_reading: I am dying
  chosen_spanish_reading: Me estoy muriendo
  alternative_spanish_readings:
  - Estoy muriendo
  - Estoy a punto de morir
  rationale: No se suaviza la afirmación ni se convierte en mera posibilidad. El español elegido conserva la fuerza directa del anuncio y su carácter presente/progresivo.
  doctrine_reference: No aplica; es una afirmación narrativa de estado, no una enseñanza doctrinal.
- issue: Respuesta de incredulidad de los oyentes
  english_pob_reading: they did not believe him
  chosen_spanish_reading: no le creyeron
  alternative_spanish_readings:
  - no creyeron en él
  - no aceptaron lo que dijo
  rationale: Se mantiene la tensión narrativa entre la advertencia del hablante y la incredulidad de los oyentes, sin intensificarla ni atenuarla.
  doctrine_reference: No aplica; corresponde al relato.
translation_notes:
  revision_awareness: El texto griego y el inglés POB coinciden estrechamente; no se observan revisiones aplicadas ni variantes que requieran nota textual. La versión española sigue esa lectura directa sin introducir notas innecesarias.
  spanish_consistency_notes:
  - Se mantiene un estilo bíblico moderno y digno.
  - Se evita «señor» o terminología litúrgica no presente en el texto.
  - La primera persona y el dativo en español se han resuelto con construcciones naturales para preservar la relación hablante-oyentes.
