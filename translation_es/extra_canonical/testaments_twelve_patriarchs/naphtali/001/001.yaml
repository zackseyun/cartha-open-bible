translation:
  language: es
  text: Una copia del testamento de Neftalí, el octavo hijo de Jacob, que él ordenó al tiempo de su partida, en el año ciento treinta de su vida.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Διαθήκη
  english_pob_choice: testament
  chosen_spanish: testamento
  alternatives_spanish:
  - alianza
  - pacto
  lexicon: διαθήκη
  rationale: En este título, el contexto es el de las últimas disposiciones de Neftalí; por eso «testamento» conserva mejor el valor documental y literario que «alianza», que sería más natural en contextos bíblico-teológicos de pacto.
- source_word: Ἀντίγραφον
  english_pob_choice: A copy
  chosen_spanish: Una copia
  alternatives_spanish:
  - Un trasunto
  - Una reproducción
  lexicon: ἀντίγραφον
  rationale: «Copia» reproduce con claridad el sentido de un duplicado o ejemplar transmitido del texto, sin añadir matices técnicos innecesarios.
- source_word: διέθετο
  english_pob_choice: ordained
  chosen_spanish: ordenó
  alternatives_spanish:
  - dispuso
  - dejó dispuesto
  lexicon: διατίθημι
  rationale: El audit trail inglés corrigió «set in order» a «ordained» para reflejar el acto formal de disponer un testamento. En español, «ordenó» conserva esa formalidad jurídica mejor que una paráfrasis más libre.
- source_word: ἐν καιρῷ τῆς ἐξόδου αὐτοῦ
  english_pob_choice: at the time of his departure
  chosen_spanish: al tiempo de su partida
  alternatives_spanish:
  - en el momento de su partida
  - cuando iba a partir
  lexicon: ἔξοδος
  rationale: «Partida» mantiene el sentido de salida/muerte sin imponer una lectura más específica de «muerte», dejando abierto el matiz del griego y del contexto funerario-testamentario.
- source_word: ἑκατοστῷ καὶ τριακοστῷ
  english_pob_choice: the hundred and thirtieth year
  chosen_spanish: el año ciento treinta
  alternatives_spanish:
  - en su año ciento treinta
  - a los ciento treinta años
  lexicon: ἑκατοστός / τριακοστός
  rationale: La forma española más natural en un encabezado narrativo es «el año ciento treinta»; el sentido es cronológico y no requiere una perífrasis más pesada.
theological_decisions:
- issue: Nature of the document designated by διαθήκη
  english_pob_reading: testament
  chosen_spanish_reading: testamento
  alternative_spanish_readings:
  - alianza
  - pacto
  rationale: El pasaje presenta una composición final de despedida, no un uso doctrinal de ‘pacto’. Traducirlo como «testamento» respeta el género literario del texto fuente y el juicio del POB inglés.
  doctrine_reference: Género literario testamentario; no se trata de una afirmación doctrinal sobre la alianza mosaica o nueva.
- issue: Sense of ἐξόδου in a patriarchal death notice
  english_pob_reading: departure
  chosen_spanish_reading: partida
  alternative_spanish_readings:
  - salida
  - muerte
  rationale: «Partida» conserva la ambigüedad reverente del original y del inglés, evitando cerrar el sentido exclusivamente a la muerte explícita cuando el contexto ya la sugiere.
  doctrine_reference: Uso narrativo reverente de eufemismo para muerte/salida.
translation_notes:
  revision_awareness: La versión inglesa fue revisada de «set in order» a «ordained» para reflejar mejor διέθετο en un contexto testamentario. La traducción española sigue esa revisión con «ordenó», evitando una calca de la lectura previa. No se introdujeron notas porque el texto español no necesitó conservar variantes alternativas explícitas del original ni ambigüedades textuales adicionales.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - Se usa «testamento» de manera consistente con el género del texto y con el POB inglés.
  - «Partida» mantiene una register reverente y sobrio, apto para encabezados de textos extra-canónicos.
