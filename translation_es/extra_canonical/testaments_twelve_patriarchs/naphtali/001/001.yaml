  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/001/001.yaml
  text: A copy of the testament of Naphtali, the eighth son of Jacob, which he ordained at the time of his departure, in the hundred and thirtieth year of his life.
  revision_pass:
    model: gpt-5.4
