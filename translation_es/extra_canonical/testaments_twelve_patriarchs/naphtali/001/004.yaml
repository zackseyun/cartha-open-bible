base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/001/004.yaml
  text: And while blessing and glorifying the Lord, he grew strong and said, “After yesterday’s meal, my flesh died.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:14Z'
    unchanged: false
    changes_summary: Replaced “the feast yesterday” with “yesterday’s meal” to reflect δεῖπνον more accurately, and simplified “failed and died” to “died” since ἀπέθανεν alone expresses death.
translation:
  language: es
  text: 'Y mientras bendecía y glorificaba al Señor, cobró fuerzas y dijo: «Después de la comida de ayer, mi carne murió».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοξάζων τὸν Κύριον
  english_pob_choice: while blessing and glorifying the Lord
  chosen_spanish: mientras bendecía y glorificaba al Señor
  alternatives_spanish:
  - mientras alababa y glorificaba al Señor
  - mientras bendecía y daba gloria al Señor
  lexicon: δοξάζω
  rationale: 'Conservo la doble acción del participio: una expresión de alabanza/bendición y otra de dar gloria. «Bendecía» sigue el valor devocional de la fórmula griega en contexto, y «glorificaba» mantiene el segundo verbo sin diluirlo.'
- source_word: ἐκραταιώθη
  english_pob_choice: he grew strong
  chosen_spanish: cobró fuerzas
  alternatives_spanish:
  - se fortaleció
  - fue fortalecido
  lexicon: κραταιόω
  rationale: El pasivo aoristo indica que pasó a un estado de fortaleza. «Cobró fuerzas» suena natural en español y conserva el cambio de estado sin introducir una causa explícita que el griego no expresa.
- source_word: Μετὰ τὸ δεῖπνον τὸ χθὲς
  english_pob_choice: After yesterday’s meal
  chosen_spanish: Después de la comida de ayer
  alternatives_spanish:
  - Después de la cena de ayer
  - Después del banquete de ayer
  lexicon: δεῖπνον
  rationale: «δεῖπνον» puede referir a una comida principal o cena; la revisión inglesa ya descartó «feast» por ser demasiado fuerte. «Comida de ayer» mantiene la referencia temporal y evita imponer un matiz ceremonial que el contexto no exige.
- source_word: ἡ σάρξ μου ἀπέθανεν
  english_pob_choice: my flesh died
  chosen_spanish: mi carne murió
  alternatives_spanish:
  - mi carne falleció
  - mi cuerpo murió
  lexicon: σάρξ
  rationale: Conservo «carne» por fidelidad al campo semántico de σάρξ y porque la frase es deliberadamente extraña en el original. «Cuerpo» suavizaría una tensión textual que no debe borrarse.
theological_decisions:
- issue: La frase «mi carne murió» y su posible lectura antropológica
  english_pob_reading: my flesh died
  chosen_spanish_reading: mi carne murió
  alternative_spanish_readings:
  - mi cuerpo murió
  - mi naturaleza humana murió
  rationale: El texto griego presenta una afirmación fuerte y casi literal sobre σάρξ. Mantengo la dureza de la imagen en español para no resolverla interpretativamente ni convertirla en una paráfrasis más teológica de lo que el texto ofrece.
  doctrine_reference: Antropología bíblica / lenguaje figurado sobre σάρξ
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «the feast yesterday» por «yesterday’s meal» y redujo «failed and died» a «died». La traducción española sigue esa corrección con «la comida de ayer» y «murió», sin añadir un verbo equivalente a «failed».
  spanish_consistency_notes:
  - Se preserva «Señor» para Κύριος porque aquí el griego no está citando explícitamente el tetragrámaton, sino una referencia reverencial directa.
  - Se mantiene la parataxis del original con una sola oración y discurso directo breve.
  - No se añade nota textual porque el pasaje no presenta variantes relevantes en el paquete provisto.
