  text: 4. Καὶ²⁰ *δοξάζων τὸν²¹ Κύριον²² *ἐκραταιώθη καὶ εἶπεν²³, ὅτι Μετὰ τὸ δεῖπνον τὸ χθὲς *ἀπέθανεν ἡ σάρξ μου²⁴.
