base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/005/004.yaml
  text: And while Levi was like the sun, behold, a certain young man gives him twelve palm branches; and Judah became bright like the moon, and beneath their feet were twelve rays.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:17Z'
    unchanged: false
    changes_summary: Changed 'gave' to 'gives' to better reflect the present-tense vivid narration of ἐπιδίδωσιν; otherwise retained the draft as accurate and natural.
translation:
  language: es
  text: Y mientras Leví estaba como el sol, he aquí, un joven le entrega doce ramas de palma; y Judá se volvió resplandeciente como la luna, y bajo sus pies había doce rayos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὄντος ... ὡς ὁ ἥλιος
  english_pob_choice: was like the sun
  chosen_spanish: estaba como el sol
  alternatives_spanish:
  - era como el sol
  - estaba semejante al sol
  lexicon: ὡς; ἥλιος
  rationale: Mantiene la comparación explícita y el aspecto narrativo en español con una construcción natural; 'estaba' refleja la escena descrita sin endurecerla a una equivalencia estática innecesaria.
- source_word: Γἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - fíjense
  lexicon: ἰδού
  rationale: '''He aquí'' conserva el valor de introducción enfática del griego y sigue siendo inteligible en español bíblico contemporáneo.'
- source_word: νέος τις
  english_pob_choice: a certain young man
  chosen_spanish: un joven
  alternatives_spanish:
  - un joven cierto
  - un muchacho
  lexicon: νέος; τις
  rationale: La combinación sugiere indefinición, pero en español 'un joven' transmite naturalmente la referencia indefinida sin forzar una calca como 'cierto joven'.
- source_word: ἐπιδίδωσιν
  english_pob_choice: gives
  chosen_spanish: le entrega
  alternatives_spanish:
  - le da
  - le ofrece
  lexicon: ἐπιδίδωμι
  rationale: El presente narrativo se conserva con 'entrega'; 'le entrega' además expresa con mayor precisión la dirección del acto que un simple 'da'.
- source_word: βαΐα φοινίκων
  english_pob_choice: palm branches
  chosen_spanish: ramas de palma
  alternatives_spanish:
  - ramas de palmera
  - hojas de palma
  lexicon: βαΐα; φοῖνιξ
  rationale: '''Ramas de palma'' es una forma clara y natural en español para el objeto vegetal descrito, sin perder el referente simbólico de la palma.'
- source_word: Ἰούδας ... ἐγένετο λαμπρὸς
  english_pob_choice: Judah became bright
  chosen_spanish: Judá se volvió resplandeciente
  alternatives_spanish:
  - Judá se hizo brillante
  - Judá se tornó luminoso
  lexicon: γίνομαι; λαμπρός
  rationale: '''Resplandeciente'' comunica el brillo de manera más idiomática y evocadora que ''brillante'', que puede sonar más neutro o técnico en español.'
- source_word: ὡς ἡ σελήνη
  english_pob_choice: like the moon
  chosen_spanish: como la luna
  alternatives_spanish:
  - como la luna llena
  - semejante a la luna
  lexicon: σελήνη
  rationale: Se mantiene la comparación directa con el cuerpo celeste nombrado en el texto griego.
- source_word: ὑπὸ τοὺς πόδας αὐτῶν
  english_pob_choice: beneath their feet
  chosen_spanish: bajo sus pies
  alternatives_spanish:
  - debajo de sus pies
  - bajo los pies de ellos
  lexicon: ὑπό; πούς
  rationale: Es la equivalencia natural y fiel en español; conserva la imagen espacial sin sobreexplicar la referencia plural del pronombre.
- source_word: δώδεκα ἀκτῖνες
  english_pob_choice: twelve rays
  chosen_spanish: doce rayos
  alternatives_spanish:
  - doce resplandores
  - doce haces de luz
  lexicon: δώδεκα; ἀκτίς
  rationale: '''Rayos'' es la traducción directa y más transparente; mantiene la imagen luminosa sin introducir matices interpretativos adicionales.'
theological_decisions:
- issue: Valor simbólico de Levi y Judá en una visión poética
  english_pob_reading: The English keeps the imagery straightforward without adding interpretive glosses.
  chosen_spanish_reading: La versión española conserva la imaginería tal como está, sin convertirla en explicación alegórica.
  alternative_spanish_readings:
  - Introducir una glosa sobre las tribus
  - Parafrasear como símbolo de gloria
  rationale: El pasaje presenta imágenes visionarias; traducir con sobriedad evita imponer una interpretación doctrinal o alegórica no explicitada por el texto base.
  doctrine_reference: Principio de literalidad controlada en poesía/apocalíptica; evitar añadir interpretación no presente en la fuente.
translation_notes:
  revision_awareness: La edición inglesa revisada cambió 'gave' por 'gives' para reflejar el presente narrativo de ἐπιδίδωσιν; por eso el español usa presente ('entrega') en lugar de pasado. No se detectan otras revisiones que requieran ajuste adicional.
  spanish_consistency_notes:
  - Se usa 'Leví' y 'Judá' con acentuación española estándar de nombres bíblicos.
  - Se evita 'SEÑOR' u otras sustituciones teológicas no pertinentes, porque el versículo no contiene el tetragrámaton ni κύριος.
  - El texto conserva el paralelismo entre sol/luna y los doce rayos sin expansión interpretativa.
