  text: 4. Καὶ ὄντος²⁰ τοῦ Λευὶ *ὡς ὁ ἥλιος²¹, Γἰδοὺ²² νέος²³ *τις ἐπιδίδωσιν²⁴ αὐτῷ βαΐα φοινίκων δώδεκα, καὶ Ἰούδας *ἐγένετο λαμπρὸς²⁵ ὡς *ἡ σελήνη²⁶, καὶ *ἦσαν ὑπὸ τοὺς πόδας αὐτῶν²⁷ δώδεκα ἀκτῖνες²⁸.
