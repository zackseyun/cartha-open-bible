base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/005/006.yaml
  text: And behold, a bull was on the earth, having two great horns and the wings of an eagle on its back; and though we wanted to seize it, we were not able.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:17Z'
    unchanged: false
    changes_summary: 'Adjusted wording for more natural formal English: changed ''there was a bull'' to ''a bull was,'' and rendered πτέρυγας ἀετοῦ more literally as ''the wings of an eagle.'''
translation:
  language: es
  text: Y he aquí, un toro estaba sobre la tierra, con dos grandes cuernos y las alas de un águila sobre su lomo; y aunque quisimos prenderlo, no pudimos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ταῦρος
  english_pob_choice: bull
  chosen_spanish: toro
  alternatives_spanish:
  - buey
  - toro salvaje
  lexicon: ταῦρος
  rationale: «Toro» comunica bien el animal grande y fuerte del griego y mantiene la imagen concreta del texto. «Buey» sugeriría un animal domesticado y perdería fuerza; «toro salvaje» añade un rasgo que el griego no explicita.
- source_word: κέρατα μεγάλα
  english_pob_choice: two great horns
  chosen_spanish: dos grandes cuernos
  alternatives_spanish:
  - dos cuernos grandes
  - dos cuernos magníficos
  lexicon: κέρας
  rationale: Se conserva el orden natural del español con adjetivo antepuesto o pospuesto, sin exagerar el matiz. «Grandes» reproduce adecuadamente μεγάλα sin cargar el sentido con una connotación más ornamental que la del original.
- source_word: πτέρυγας ἀετοῦ
  english_pob_choice: the wings of an eagle
  chosen_spanish: las alas de un águila
  alternatives_spanish:
  - alas de águila
  - las alas del águila
  lexicon: πτέρυξ
  rationale: La revisión inglesa prefirió una forma más literal, «the wings of an eagle». En español, «las alas de un águila» conserva esa literalidad y la relación genitiva sin forzar un giro menos natural. «Alas de águila» es posible, pero menos explícito; «del águila» haría más definida la imagen de lo que el griego requiere.
- source_word: ἐπὶ νώτου αὐτοῦ
  english_pob_choice: on its back
  chosen_spanish: sobre su lomo
  alternatives_spanish:
  - sobre su espalda
  - en su lomo
  lexicon: νῶτον
  rationale: «Lomo» es la palabra más natural para un animal en español y mantiene la imagen física. «Espalda» puede sonar más general o antropomórfico; «en su lomo» es posible, pero «sobre su lomo» reproduce mejor la relación espacial.
- source_word: πιάσαι
  english_pob_choice: to seize
  chosen_spanish: prenderlo
  alternatives_spanish:
  - asirlo
  - capturarlo
  lexicon: πιάνω
  rationale: La POB inglesa eligió «seize», que aquí tiene fuerza de captura o sujeción. «Prenderlo» transmite esa acción de intentar capturar/asegurar al animal con naturalidad en español. «Asirlo» suena más manual; «capturarlo» es correcto pero un poco más interpretativo.
- source_word: οὐκ ἠδυνήθημεν
  english_pob_choice: we were not able
  chosen_spanish: no pudimos
  alternatives_spanish:
  - no fuimos capaces
  - no logramos
  lexicon: δύναμαι
  rationale: «No pudimos» es la forma más natural y directa en español para expresar incapacidad pasada. Mantiene la fuerza simple del griego sin añadir matices de esfuerzo o logro que el texto no explicita.
theological_decisions:
- issue: Naturaleza visionaria/simbólica de la escena
  english_pob_reading: And behold, a bull was on the earth...
  chosen_spanish_reading: Y he aquí, un toro estaba sobre la tierra...
  alternative_spanish_readings:
  - Y he aquí, había un toro sobre la tierra...
  - Y he aquí, un toro se hallaba sobre la tierra...
  rationale: Se conserva la presentación visual y directa del original y del POB inglés. «Estaba sobre la tierra» sigue de cerca la estructura narrativa sin convertir la escena en una paráfrasis explicativa.
  doctrine_reference: No aplica; imagen apocalíptico-visionaria sin afirmación doctrinal directa.
translation_notes:
  revision_awareness: La revisión inglesa de 2026-04-23 afinó la literalidad de πτέρυγας ἀετοῦ como «the wings of an eagle». La versión española sigue esa orientación con «las alas de un águila», evitando una formulación idiomática que diluya la relación genitiva. También se conserva la simplicidad sintáctica del ajuste inglés («a bull was»), reflejada en «un toro estaba».
  spanish_consistency_notes:
  - Se mantiene «Y he aquí» como fórmula narrativa solemne y clara.
  - Se evita «SEÑOR» u այլ terminología no pertinente; el versículo no contiene vocabulario divino.
  - Se conserva un registro neutro y público, apto para lectura eclesial, sin arcaísmos innecesarios.
