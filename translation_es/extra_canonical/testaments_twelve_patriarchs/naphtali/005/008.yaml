translation:
  language: es
  text: 'Y vi que yo estaba allí, y he aquí, se nos apareció una escritura santa, diciendo: «Asirios, medos, persas, caldeos y sirios heredarán en cautividad los doce cetros de Israel».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρεκεῖ
  english_pob_choice: I was there
  chosen_spanish: yo estaba allí
  alternatives_spanish:
  - estaba allí
  - yo me hallaba allí
  lexicon: παρεκεῖ
  rationale: El griego indica presencia localizada; «yo estaba allí» reproduce de forma natural la escena sin añadir matiz interpretativo. Mantengo el sujeto explícito para conservar el énfasis narrativo del texto.
- source_word: γραφὴ ἁγία
  english_pob_choice: a holy writing
  chosen_spanish: una escritura santa
  alternatives_spanish:
  - un escrito santo
  - una escritura sagrada
  lexicon: γραφὴ / ἁγία
  rationale: «Escritura santa» conserva la formulación nominal del original y el valor reverencial de ἁγία. «Escrito santo» sería posible, pero suena menos alineado con la construcción del griego y con el audit trail inglés.
- source_word: ὤφθη ἡμῖν
  english_pob_choice: appeared to us
  chosen_spanish: se nos apareció
  alternatives_spanish:
  - nos apareció
  - fue vista por nosotros
  lexicon: ὤφθη
  rationale: La forma pasiva divina/de aparición se expresa bien en español con «se nos apareció», que suena natural y conserva la experiencia receptiva del grupo sin volverla meramente visual.
- source_word: κληρονομήσουσιν αἰχμαλωσίαν
  english_pob_choice: shall inherit in captivity
  chosen_spanish: heredarán en cautividad
  alternatives_spanish:
  - heredarán cautiverio
  - recibirán como herencia la cautividad
  lexicon: κληρονομέω / αἰχμαλωσία
  rationale: 'Conservo la tensión literal del griego y del inglés: «heredarán» mantiene el verbo patrimonial, mientras «en cautividad» refleja la locución espacial/condicional del texto. «Cautividad» es más bíblico y formal que «cautiverio» en este contexto.'
- source_word: τὰ δώδεκα σκῆπτρα
  english_pob_choice: the twelve sceptres
  chosen_spanish: los doce cetros
  alternatives_spanish:
  - las doce varas
  - los doce cetros reales
  lexicon: σκῆπτρον
  rationale: «Cetros» es el equivalente directo y mantiene la imagen de autoridad tribal o real. No expando a «reales» porque el griego no lo dice explícitamente.
theological_decisions:
- issue: Enumeración de pueblos y alcance profético de la frase
  english_pob_reading: Assyrians, Medes, Persians, Chaldeans, Syrians shall inherit in captivity the twelve sceptres of Israel.
  chosen_spanish_reading: Asirios, medos, persas, caldeos y sirios heredarán en cautividad los doce cetros de Israel.
  alternative_spanish_readings:
  - '...tomarán en cautividad...'
  - '...poseerán como botín...'
  rationale: Conservo la enumeración etnopolítica tal como está y traduzco de forma literal la relación de dominio/exilio. No suavizo la dureza del anuncio profético ni sustituyo la imagen de herencia por un verbo interpretativo distinto.
  doctrine_reference: Profecía histórica; lenguaje de juicio y exilio en la tradición bíblica.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés no muestran revisiones aplicadas ni variantes textuales en este pasaje; por ello, la versión española sigue de cerca el griego y la decisión inglesa sin añadir notas críticas.
  spanish_consistency_notes:
  - Uso «Yahvé» solo cuando aparezca el tetragrámaton o equivalentes directos; aquí no ocurre.
  - Mantengo «cetros» en lugar de términos eclesiásticos o dinásticos más interpretativos.
  - Conservo el orden y la puntuación narrativa de la cláusula principal para reflejar el paralelismo del original.
