    unchanged: false
    changes_summary: Removed the unsupported object pronoun “them” twice, since the Greek does not state an explicit object here. Smoothed the final clause from “his shall be” to the more natural formal English “shall have,” while preserving the sense.
translation:
  language: es
  text: 'V. Porque en el cuadragésimo año de mi vida, vi una visión en el Monte de los Olivos, al oriente de Jerusalén, en la que el sol y la luna estaban inmóviles. 2 Y he aquí, Isaac, el padre de mi padre, nos dijo: «Corran, y que cada uno tome según su fuerza; y el que logre asir tendrá el sol y la luna».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὄραμα / vision
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - sueño
  - revelación
  lexicon: ὅραμα
  rationale: ‘Visión’ reproduce de modo natural el valor perceptivo/revelatorio del griego y coincide con la elección auditada en inglés; ‘sueño’ sería demasiado específico y no está exigido por el texto.
- source_word: ὄρει τοῦ Ἐλαιῶνος
  english_pob_choice: Mount of Olives
  chosen_spanish: monte de los Olivos
  alternatives_spanish:
  - Monte de los Olivos
  - monte del Olivar
  lexicon: ὄρος / Ἐλαιών
  rationale: ‘Monte de los Olivos’ es la forma bíblica más clara y fiel en español; conserva el nombre propio del lugar sin introducir una paráfrasis.
- source_word: ἕστηκαν
  english_pob_choice: were standing still
  chosen_spanish: estaban fijos
  alternatives_spanish:
  - estaban parados
  - estaban detenidos
  lexicon: ἵστημι
  rationale: En este contexto astronómico, ‘estaban fijos’ comunica el sentido de inmovilidad. ‘Parados’ suena demasiado coloquial y ‘detenidos’ puede sugerir intervención externa más de lo que el griego expresa aquí.
- source_word: Προσδραμόντες
  english_pob_choice: Run up
  chosen_spanish: Corred hacia arriba
  alternatives_spanish:
  - Acudid corriendo
  - Corred
  lexicon: προσδραμεῖν
  rationale: ‘Corred hacia arriba’ conserva el impulso direccional de acercarse corriendo hacia un punto elevado, reflejando mejor el griego que un simple ‘corred’.
- source_word: κρατήσατε
  english_pob_choice: seize
  chosen_spanish: agarre
  alternatives_spanish:
  - tome
  - asga
  lexicon: κρατέω
  rationale: ‘Agarre’ mantiene la idea concreta de tomar con fuerza sin sonar tan arcaico como ‘asga’; aquí se ajusta a un imperativo general y directo.
- source_word: κατὰ δύναμιν
  english_pob_choice: according to his strength
  chosen_spanish: según su fuerza
  alternatives_spanish:
  - conforme a su fuerza
  - de acuerdo con su capacidad
  lexicon: κατὰ δύναμιν
  rationale: ‘Según su fuerza’ es una equivalencia transparente y fiel; preserva la medida individual que el texto exige.
- source_word: τοῦ πιάσαντος
  english_pob_choice: the one who takes hold
  chosen_spanish: el que tome posesión
  alternatives_spanish:
  - el que agarre
  - el que se apodere
  lexicon: πιάζω
  rationale: ‘Tome posesión’ evita la ambigüedad de un mero ‘agarrar’ y recoge la idea de sujetar/retener con éxito en la cláusula resultativa final. En esta frase, el español necesita un giro más idiomático para expresar el resultado prometido.
theological_decisions:
- issue: Immovility of the sun and moon
  english_pob_reading: that the sun and the moon were standing still
  chosen_spanish_reading: de que el sol y la luna estaban fijos
  alternative_spanish_readings:
  - que el sol y la luna se detuvieron
  - que el sol y la luna permanecían inmóviles
  rationale: El pasaje presenta una visión de inmovilidad celestial. ‘Estaban fijos’ conserva la imagen sin añadir explícitamente el matiz narrativo de una detención causada, que el texto griego aquí no desarrolla.
  doctrine_reference: Narrative description; no doctrinal claim beyond the visionary scene.
- issue: Undefined object in the command to seize
  english_pob_reading: let each of you seize according to his strength; and the one who takes hold shall have the sun and the moon
  chosen_spanish_reading: que cada uno agarre según su fuerza; y el que tome posesión tendrá el sol y la luna
  alternative_spanish_readings:
  - que cada uno agarre lo que pueda según su fuerza
  - que cada uno se aferre según su fuerza
  rationale: 'Siguiendo la revisión inglesa, el griego no aporta un objeto explícito para ‘seize’. Por eso el español evita inventarlo. La cláusula final conserva el resultado en forma formal y clara: quien logre tomar posesión ‘tendrá’ el sol y la luna.'
  doctrine_reference: Textual/narrative fidelity; no doctrinal formulation.
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó el objeto implícito añadido en la primera redacción (‘them’) porque no está en el griego. La versión española refleja esa cautela: ‘agarre según su fuerza’ no introduce un objeto inexistente y la cláusula final evita posesivos añadidos. También se preservó el orden y el contenido básico de la escena sin expandirla.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma de proyecto, pero este versículo no contiene el nombre divino.
  - Se usa ‘visión’ para ὄραμα y no se traduce como ‘sueño’, porque el contexto no lo exige.
  - Se conserva la estructura narrativa con ‘Y he aquí’ para reproducir el giro de introducción del griego y del inglés auditado.
  - No se introducen notas al pie porque el español no requiere aquí alternativas textuales obligatorias y el pasaje es breve y estable.
