  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/005/002.yaml
  text: V. For in the fortieth year of my life, I saw a vision on the Mount of Olives, east of Jerusalem, that the sun and the moon were standing still. 2 And behold, Isaac, the father of my father, said to us, “Run up, and let each of you seize according to his strength; and the one who takes hold shall have the sun and the moon.”
  revision_pass:
