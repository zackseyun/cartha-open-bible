source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: '[5. Καὶ προσδραμόντες *οἱ δύο ὅτε²⁹ Λευὶ³⁰ καὶ Ἰούδας³¹ ἐκράτησαν αὐτούς³²].'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/005/005.yaml
  text: And the two, Levi and Judah, ran up and seized them.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:17Z'
    unchanged: false
    changes_summary: Replaced 'held them fast' with 'seized them' for a more direct rendering of ἐκράτησαν; retained the appositional identification of 'the two' as Levi and Judah and the sense of προσδραμόντες as 'ran up.'
translation:
  language: es
  text: Y los dos, Leví y Judá, corrieron hacia ellos y los apresaron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ προσδραμόντες
  english_pob_choice: ran up
  chosen_spanish: corrieron hacia ellos
  alternatives_spanish:
  - se acercaron corriendo
  - corrieron al encuentro de ellos
  lexicon: προσδραμόντες
  rationale: La idea central es un acercamiento rápido con carrera; en español, «corrieron hacia ellos» conserva el movimiento directo sin añadir matices no presentes en el griego.
- source_word: οἱ δύο
  english_pob_choice: the two
  chosen_spanish: los dos
  alternatives_spanish:
  - ambos
  - esos dos
  lexicon: οἱ δύο
  rationale: Se mantiene la identificación en aposición con los nombres siguientes, como en el texto fuente y la versión inglesa auditada.
- source_word: Λευὶ καὶ Ἰούδας
  english_pob_choice: Levi and Judah
  chosen_spanish: Leví y Judá
  alternatives_spanish:
  - Levi y Judá
  lexicon: Λευὶ / Ἰούδας
  rationale: Se conserva la forma española habitual de los nombres propios bíblicos, con Leví acentuado según la ortografía del español.
- source_word: ἐκράτησαν
  english_pob_choice: seized them
  chosen_spanish: los apresaron
  alternatives_spanish:
  - los sujetaron
  - los capturaron
  - los agarraron
  lexicon: κρατέω
  rationale: «Apresaron» expresa bien la acción de tomar o capturar con fuerza, y en español suena más natural y preciso aquí que un calco como «los tomaron».
theological_decisions:
- issue: Relación entre la acción física y el papel narrativo de los personajes
  english_pob_reading: And the two, Levi and Judah, ran up and seized them.
  chosen_spanish_reading: Y los dos, Leví y Judá, corrieron hacia ellos y los apresaron.
  alternative_spanish_readings:
  - Y los dos, Leví y Judá, se acercaron corriendo y los capturaron.
  rationale: No hay tensión doctrinal especial en este verso; la decisión principal es narrativo-lexical. Se conserva la fuerza de la acción sin intensificarla más allá del griego.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'held them fast' por 'seized them' para reflejar más directamente ἐκράτησαν. La frase española usa 'los apresaron' para seguir esa actualización y mantener la identificación apposicional 'los dos, Leví y Judá'.
  spanish_consistency_notes:
  - Se mantiene el orden natural del español con la aposición inicial 'los dos, Leví y Judá'.
  - No se introducen notas al pie porque el verso no presenta variantes textuales o ambigüedades que requieran marcadores en la traducción española.
  - Se evita 'señor' o terminología teológica ajena; el verso es puramente narrativo.
