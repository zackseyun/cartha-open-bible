review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: οἱ δύο en aposición con Λευὶ καὶ Ἰούδας, el movimiento rápido de προσδραμόντες y la acción de ἐκράτησαν αὐτούς. Sin embargo, «corrieron hacia ellos» puede sonar ligeramente direccional sin el matiz de acercarse/abalanzarse, y «apresaron» en español suele sugerir arresto o captura formal más que simplemente prender o sujetar con fuerza. «Corrieron hacia ellos y los sujetaron» preserva mejor el sentido narrativo inmediato y se alinea bien con ''ran up and seized them''.'
  spanish_quality_summary: El español es claro y natural, pero «apresaron» introduce un matiz de captura institucional o detención que no es necesario aquí. Una leve revisión mejora la precisión semántica sin perder fluidez. La sintaxis con aposición funciona bien y mantiene legibilidad eclesial amplia.
  glossary_alignment: No hay términos de glosario mayor implicados. Los nombres «Leví» y «Judá» están bien. La revisión propuesta mantiene fidelidad al valor de κρατέω en este contexto narrativo físico mediante «sujetaron», más cercano al rango semántico documentado por la auditoría inglesa que «apresaron».
  issues:
  - severity: medium
    issue: «Apresaron» sobreinterpreta ἐκράτησαν
    rationale: κρατέω aquí describe tomar/sujetar con fuerza. «Apresar» en español a menudo implica capturar o arrestar, un matiz más específico que el griego y que la revisión inglesa 'seized'.
  - severity: low
    issue: «Corrieron hacia ellos» es aceptable pero algo menos idiomático que una formulación de acercamiento inmediato
    rationale: προσδραμόντες expresa correr hacia/al encuentro de alguien. La redacción actual no es incorrecta, pero «corrieron hacia ellos» puede sentirse un poco plana frente a la inmediatez del griego.
  revised_spanish_text: Y los dos, Leví y Judá, corrieron hacia ellos y los sujetaron.
  revision_rationale: Se ajusta «apresaron» a «sujetaron» para evitar un matiz de arresto o captura formal y reflejar mejor ἐκράτησαν en este contexto narrativo. No se requieren notas.
