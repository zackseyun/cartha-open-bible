source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: 3. Καὶ¹³ *ἐδράμομεν πάντες ὁμοῦ¹⁴ Γκαὶ¹⁵ ὁ¹⁶ Λευὶ¹⁷ ἐκράτησε τὸν ἥλιον *καὶ ὁ Ἰούδας φθάσας ἔπιασε τὴν σελήνην¹⁸, καὶ ὑψώθησαν ἀμφότεροι σὺν αὐτοῖς¹⁹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/005/003.yaml
  text: And we all ran together, and Levi seized the sun, and Judah, arriving first, took hold of the moon; and both of them were lifted up with them.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:17Z'
    unchanged: false
    changes_summary: Changed 'coming first' to 'arriving first' for a more natural rendering of φθάσας while preserving the sense. The rest of the draft is accurate and complete.
translation:
  language: es
  text: Y corrimos todos juntos, y Leví se apoderó del sol, y Judá, llegando primero, tomó la luna; y ambos fueron levantados con ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἐδράμομεν πάντες ὁμοῦ
  english_pob_choice: And we all ran together
  chosen_spanish: Y corrimos todos juntos
  alternatives_spanish:
  - Y todos corrimos juntos
  - Y corrimos todos al mismo tiempo
  lexicon: τρέχω / δέομαι de movimiento narrativo; πάντες; ὁμοῦ
  rationale: Conserva la acción colectiva y el sentido de simultaneidad sin sobrecargar la frase. 'Corrimos todos juntos' refleja bien la coordinación narrativa del griego y suena natural en español.
- source_word: ἐκράτησε τὸν ἥλιον
  english_pob_choice: Levi seized the sun
  chosen_spanish: Leví se apoderó del sol
  alternatives_spanish:
  - Leví tomó el sol
  - Leví agarró el sol
  lexicon: κρατέω
  rationale: '''Se apoderó de'' expresa con más fuerza que ''tomó'' el acto de agarrar o dominar, y preserva el valor verbal intenso de κρατέω sin introducir una explicación ajena al texto.'
- source_word: φθάσας
  english_pob_choice: arriving first
  chosen_spanish: llegando primero
  alternatives_spanish:
  - habiendo llegado primero
  - al llegar primero
  lexicon: φθάνω
  rationale: '''Llegando primero'' mantiene la prioridad temporal indicada por φθάσας y sigue el ajuste ya confirmado en la revisión inglesa hacia una solución más natural que ''coming first''.'
- source_word: ἔπιασε τὴν σελήνην
  english_pob_choice: took hold of the moon
  chosen_spanish: tomó la luna
  alternatives_spanish:
  - se aferró a la luna
  - tomó hold de la luna
  lexicon: πιάνω
  rationale: En español, 'tomó la luna' comunica de forma clara y sobria la captura o asimiento del objeto celeste. 'Tomó hold de' sería un calco innecesario; 'se aferró a' sugeriría una imagen menos directa.
- source_word: ὑψώθησαν ἀμφότεροι σὺν αὐτοῖς
  english_pob_choice: both of them were lifted up with them
  chosen_spanish: ambos fueron levantados con ellos
  alternatives_spanish:
  - ambos fueron exaltados con ellos
  - los dos fueron alzados con ellos
  lexicon: ὑψόω; ἀμφότεροι; σὺν αὐτοῖς
  rationale: '''Fueron levantados'' preserva la pasiva y el sentido espacial de ὑψόω. ''Con ellos'' mantiene la referencia relacional del grupo sin explicitar más de lo que dice el griego.'
theological_decisions:
- issue: Imagen narrativa de objetos celestes aprehendidos por patriarcas
  english_pob_reading: Levi seized the sun, and Judah, arriving first, took hold of the moon; and both of them were lifted up with them.
  chosen_spanish_reading: Leví se apoderó del sol, y Judá, llegando primero, tomó la luna; y ambos fueron levantados con ellos.
  alternative_spanish_readings:
  - Leví tomó el sol...
  - Leví agarró el sol...
  rationale: No se suaviza la imaginería extraordinaria del pasaje. La traducción conserva la literalidad básica y la extrañeza deliberada del texto, evitando una paráfrasis interpretativa que diluya la visión simbólica.
  doctrine_reference: Respeto al género visionario/apocalíptico y a la imaginería simbólica del texto
- issue: Relación entre 'levantados' y 'con ellos'
  english_pob_reading: both of them were lifted up with them
  chosen_spanish_reading: ambos fueron levantados con ellos
  alternative_spanish_readings:
  - ambos fueron exaltados con ellos
  - ambos fueron elevados con ellos
  rationale: '''Levantados'' conserva el sentido físico o visionario de elevación sin forzar una lectura moral o honorífica. Dado que el griego no especifica más, se mantiene la ambigüedad productiva del original.'
  doctrine_reference: Ambigüedad semántica de ὑψόω en contexto narrativo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que cambió 'coming first' por 'arriving first' para reflejar mejor φθάσας. La versión española adopta esa misma mejora con 'llegando primero'. No se observan otras revisiones sustantivas ni variantes textuales que exijan nota crítica adicional en esta línea.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca; en este versículo no hay referencia explícita a יהוה.
  - '''Mesías'' no aplica aquí porque el pasaje no contiene Χριστός ni lenguaje mesiánico.'
  - Se mantiene un registro sobrio y narrativo, adecuado para una escena visionaria sin explicaciones añadidas.
