base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/005/001.yaml
  text: And being brought low, you will turn back and acknowledge the Lord your God, and he will bring you back into your land according to his great mercy. 4 And it shall come to pass, when they go out into the land of their fathers, again they will forget the Lord and act impiously. 5 And the Lord will scatter them upon the face of all the earth, until the compassion of the Lord shall come, a man working righteousness and showing mercy to all who are far off and to those who are near.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:16Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y, siendo humillados, volverán y reconocerán al Señor su Dios, y él los hará volver a su tierra conforme a su gran misericordia. 4 Y sucederá que, cuando salgan a la tierra de sus padres, otra vez olvidarán al Señor y actuarán impíamente. 5 Y el Señor los dispersará sobre la faz de toda la tierra, hasta que venga la compasión del Señor, un hombre que obra justicia y muestra misericordia a todos los que están lejos y a los que están cerca.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σμικρυνθέντες
  english_pob_choice: being brought low
  chosen_spanish: siendo humillados
  alternatives_spanish:
  - siendo abatidos
  - habiendo sido humillados
  lexicon: σμικρύνω
  rationale: La idea es de ser rebajados o humillados; 'siendo humillados' conserva el sentido pasivo y el tono moral del contexto mejor que una traducción mecánica.
- source_word: ἐπιστρέψετε / ἐπιστρέψει
  english_pob_choice: turn back / bring back
  chosen_spanish: volverán / los hará volver
  alternatives_spanish:
  - se volverán / los devolverá
  - regresarán / los traerá de vuelta
  lexicon: ἐπιστρέφω
  rationale: En este contexto el verbo combina retorno físico y retorno de fidelidad; 'volver' mantiene ambos matices sin forzar una glosa demasiado interpretativa.
- source_word: ἐπιγνώσεσθε
  english_pob_choice: acknowledge
  chosen_spanish: reconocerán
  alternatives_spanish:
  - conocerán plenamente
  - llegarán a conocer
  lexicon: ἐπιγινώσκω
  rationale: '''Reconocer'' transmite bien la respuesta relacional y confesional hacia Dios, más precisa aquí que un simple ''conocer''.'
- source_word: Κύριον τὸν Θεὸν ὑμῶν
  english_pob_choice: the Lord your God
  chosen_spanish: el Señor su Dios
  alternatives_spanish:
  - Yahvé su Dios
  - el Señor, su Dios
  lexicon: κύριος / θεός
  rationale: Se conserva 'el Señor' porque el pasaje griego usa Κύριον y el audit trail inglés también lo hace; en esta sección no hay una cita explícita del Tetragrámaton en el texto griego transmitido.
- source_word: τὸ πολὺ αὐτοῦ ἔλεος
  english_pob_choice: his great mercy
  chosen_spanish: su gran misericordia
  alternatives_spanish:
  - su inmensa misericordia
  - su abundante misericordia
  lexicon: ἔλεος
  rationale: '''Misericordia'' es la correspondencia natural y bíblica para ἔλεος; ''gran'' preserva el cuantificador del original.'
- source_word: ἐπὶ πρόσωπον πάσης τῆς γῆς
  english_pob_choice: upon the face of all the earth
  chosen_spanish: sobre la faz de toda la tierra
  alternatives_spanish:
  - sobre la superficie de toda la tierra
  - por toda la faz de la tierra
  lexicon: πρόσωπον
  rationale: La fórmula 'sobre la faz' reproduce el hebraísmo del original y la formulación inglesa sin volverla áspera en español.
- source_word: ἀσεβήσουσιν
  english_pob_choice: act impiously
  chosen_spanish: actuarán impíamente
  alternatives_spanish:
  - obrarán con impiedad
  - serán impíos
  lexicon: ἀσεβέω
  rationale: '''Actuarán impíamente'' mantiene el adverbio moral y evita trivializar el contraste con el reconocimiento del Señor.'
- source_word: ἄχρις οὗ ἔλθῃ
  english_pob_choice: until ... shall come
  chosen_spanish: hasta que venga
  alternatives_spanish:
  - hasta que llegue
  - hasta que sobrevenga
  lexicon: ἄχρις οὗ + ἔρχομαι
  rationale: La construcción temporal se expresa de forma natural en español con 'hasta que venga'.
- source_word: τὸ σπλάγχνον Κυρίου
  english_pob_choice: the compassion of the Lord
  chosen_spanish: la compasión del Señor
  alternatives_spanish:
  - la entraña del Señor
  - la misericordia entrañable del Señor
  lexicon: σπλάγχνον
  rationale: '''Compasión'' comunica el valor afectivo-entrañable de σπλάγχνον sin introducir una metáfora corporal poco transparente para el lector general.'
- source_word: ποιῶν δικαιοσύνην καὶ ποιῶν ἔλεος
  english_pob_choice: a man working righteousness and showing mercy
  chosen_spanish: un hombre que obra justicia y muestra misericordia
  alternatives_spanish:
  - un hombre que hace justicia y hace misericordia
  - un hombre que practica justicia y misericordia
  lexicon: ποιέω + δικαιοσύνη / ἔλεος
  rationale: '''Obra justicia'' conserva la acción continua y el lenguaje bíblico; ''muestra misericordia'' refleja el paralelismo con ἔλεος.'
- source_word: τοὺς μακρὰν καὶ τοὺς ἐγγύς
  english_pob_choice: to all who are far off and to those who are near
  chosen_spanish: a todos los que están lejos y a los que están cerca
  alternatives_spanish:
  - a los que están lejos y a los que están cerca
  - a los alejados y a los cercanos
  lexicon: μακράν / ἐγγύς
  rationale: La formulación relacional 'están lejos/cerca' es natural y preserva el contraste espacial y comunitario del texto.
theological_decisions:
- issue: Referencia al nombre divino en Κύριον τὸν Θεὸν ὑμῶν
  english_pob_reading: the Lord your God
  chosen_spanish_reading: el Señor su Dios
  alternative_spanish_readings:
  - Yahvé su Dios
  rationale: Aunque el proyecto normalmente usa 'Yahvé' para el nombre divino, aquí el texto griego transmitido dice Κύριον y la versión inglesa auditada mantiene 'the Lord'; por fidelidad al tramo concreto y a la cadena de recepción, se preserva 'el Señor'.
  doctrine_reference: Nombre divino / equivalencia de citas y alusiones
- issue: El sujeto escatológico 'un hombre que obra justicia y muestra misericordia'
  english_pob_reading: a man working righteousness and showing mercy
  chosen_spanish_reading: un hombre que obra justicia y muestra misericordia
  alternative_spanish_readings:
  - un hombre que practica justicia y misericordia
  - un hombre justo y misericordioso
  rationale: Se mantiene la formulación personal y funcional del original, sin convertirla en un título más fuerte ni identificarla explícitamente con una figura posterior; así se conserva la ambigüedad mesiánica/escatológica del texto.
  doctrine_reference: Cristología / figura escatológica
- issue: Dispersión y retorno del pueblo
  english_pob_reading: the Lord will scatter them... until...
  chosen_spanish_reading: el Señor los dispersará... hasta que venga...
  alternative_spanish_readings:
  - Yahvé los dispersará... hasta que llegue...
  rationale: Se conserva el hilo narrativo del juicio seguido por misericordia y reunión; 'dispersará' y 'hará volver' reflejan la secuencia causal sin suavizarla.
  doctrine_reference: Juicio y restauración
- issue: Sentido de σπλάγχνον Κυρίου
  english_pob_reading: the compassion of the Lord
  chosen_spanish_reading: la compasión del Señor
  alternative_spanish_readings:
  - las entrañas del Señor
  - la misericordia entrañable del Señor
  rationale: '''Compasión'' traduce la carga afectiva de σπλάγχνον sin trasladar innecesariamente una metáfora corporal, pero deja abierta la profundidad visceral del término.'
  doctrine_reference: Atributos divinos / lenguaje antropopático
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; por tanto, este borrador sigue la lectura estable del pasaje sin introducir variantes textuales nuevas.
  spanish_consistency_notes:
  - Se mantiene 'el Señor' en toda la sección para Κύριος, por consistencia con el audit trail inglés y la forma griega transmitida.
  - Se usa 'misericordia' para ἔλεος y 'compasión' para σπλάγχνον, distinguiendo ambos términos sin colapsarlos.
  - Se conserva el paralelismo verbal 'obra justicia y muestra misericordia' para reflejar la estructura del griego.
  - No se introduce 'Cristo' ni 'Mesías', porque el texto griego aquí no usa Χριστός ni Μεσσίας y la identidad de la figura queda deliberadamente abierta.
