base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/005/007.yaml
  text: But Joseph came and seized him, and went up with him to the height.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:48Z'
    unchanged: false
    changes_summary: Changed 'it' to 'him' twice to match αὐτόν/αὐτῷ, rendered κατέλαβεν as 'seized' for better lexical accuracy, and simplified 'into the height' to 'to the height' to reflect εἰς τὸ ὕψος more naturally.
translation:
  language: es
  text: Pero José vino y lo asió, y subió con él a la altura.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐλθὼν δὲ
  english_pob_choice: But ... came
  chosen_spanish: Pero ... vino
  alternatives_spanish:
  - Pero ... llegó
  - Y ... vino
  lexicon: ἐλθών
  rationale: «Vino» conserva el movimiento narrativo simple del griego y encaja de modo natural en español; «pero» refleja δέ como transición adversativa suave, coherente con la secuencia del relato.
- source_word: κατέλαβεν
  english_pob_choice: seized
  chosen_spanish: lo agarró
  alternatives_spanish:
  - lo sujetó
  - lo aprehendió
  - lo asió
  lexicon: καταλαμβάνω
  rationale: El griego admite la idea de tomar/alcanzar/apresar. En español, «agarró» comunica con naturalidad el acto físico de sujetar con fuerza; se evita un tecnicismo excesivo y se mantiene la fuerza narrativa que la revisión inglesa buscó con «seized».
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: αὐτόν
  rationale: El objeto directo masculino singular se expresa de forma natural como pronombre clítico en español. La forma átona «lo» conserva la referencia personal sin sobrecargar la frase.
- source_word: συνανῆλθεν αὐτῷ
  english_pob_choice: went up with him
  chosen_spanish: subió con él
  alternatives_spanish:
  - ascendió con él
  - subió juntamente con él
  lexicon: συνανέρχομαι
  rationale: «Subió con él» reproduce el movimiento conjunto del verbo compuesto griego sin forzar una construcción más pesada. «Con él» preserva el dativo de compañía (αὐτῷ).
- source_word: εἰς τὸ ὕψος
  english_pob_choice: to the height
  chosen_spanish: a la altura
  alternatives_spanish:
  - a lo alto
  - hasta la altura
  lexicon: ὕψος
  rationale: «A la altura» mantiene el referente espacial del sustantivo griego y suena idiomático en español. «Lo alto» sería posible, pero puede resultar menos directo en este contexto narrativo.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente en dos puntos clave: entiende αὐτόν/αὐτῷ como referencia personal («lo / con él») y toma κατέλαβεν con una fuerza verbal de aprehensión («lo agarró»), además de conservar el destino espacial de εἰς τὸ ὕψος con una formulación natural en español.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y moderno, sin introducir lenguaje devocional no presente en el griego.
  - Se evita traducir mecánicamente el compuesto verbal griego con un calco; la compañía y el ascenso quedan claros en español.
  - No se añaden notas textuales porque el pasaje es breve y el contexto auditado no documenta variantes relevantes para una lectura española.
