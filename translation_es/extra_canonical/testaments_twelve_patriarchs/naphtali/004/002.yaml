translation:
  language: es
  text: Y Yahvé traerá cautiverio sobre ustedes, y allí servirán a sus enemigos, y con todo mal y tribulación sufrirán[a], hasta que Yahvé los haya consumido a todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «serán tratados con toda clase de mal y tribulación»; el griego συναναστραφήσεσθε es difícil y admite esta variante de sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Soberano
  lexicon: N/A
  rationale: La fuente griega usa Κύριος en un contexto que en la tradición bíblica remite al nombre divino; por la norma del proyecto se restaura con «Yahvé» en el texto principal. «El Señor» quedaría como convención de ocultamiento, no como traducción directa aquí.
- source_word: αἰχμαλωσίαν
  english_pob_choice: captivity
  chosen_spanish: cautiverio
  alternatives_spanish:
  - cautividad
  - esclavitud
  lexicon: N/A
  rationale: «Cautiverio» conserva la idea de ser llevado y retenido por poder ajeno, y es más natural en español que un calco rígido. «Cautividad» también es posible, pero «cautiverio» fluye mejor en esta construcción.
- source_word: δουλεύσετε
  english_pob_choice: you will serve
  chosen_spanish: servirán
  alternatives_spanish:
  - serán esclavos de
  - servirán como esclavos a
  lexicon: N/A
  rationale: Aunque el verbo tiene fuerza de servidumbre forzada, el complemento explícito «a sus enemigos» hace que «servirán» comunique la relación de subordinación sin forzar una formulación extraña. Se evita «siervos» porque debilitaría la dureza del contexto.
- source_word: τοῖς ἐχθροῖς ὑμῶν
  english_pob_choice: your enemies
  chosen_spanish: a sus enemigos
  alternatives_spanish:
  - a los enemigos de ustedes
  - a vuestros enemigos
  lexicon: N/A
  rationale: Se mantiene el posesivo plural de segunda persona en registro neutral latinoamericano con «sus». La relación de dominio queda clara con la preposición «a».
- source_word: πάσῃ κακώσει καὶ θλίψει
  english_pob_choice: with every kind of evil and tribulation
  chosen_spanish: con todo mal y tribulación
  alternatives_spanish:
  - con toda clase de mal y tribulación
  - con todo daño y tribulación
  lexicon: N/A
  rationale: «Κακώσει» aquí expresa aflicción/daño adverso; la POB inglesa lo amplía como «every kind of evil». En español, «todo mal» mantiene la amplitud semántica sin sobreexplicar. «Tribulación» conserva la carga de aflicción opresiva.
- source_word: συναναστραφήσεσθε
  english_pob_choice: you will be afflicted
  chosen_spanish: sufrirán
  alternatives_spanish:
  - serán tratados
  - convivirán
  lexicon: N/A
  rationale: El verbo griego es difícil y el contexto exige una idea de verse envueltos en aflicción. «Sufrirán» recoge el efecto resultante de manera idiomática. Se evita un literalismo opaco que no añadiría claridad en español.
- source_word: ἀναλώσει
  english_pob_choice: has consumed
  chosen_spanish: haya consumido
  alternatives_spanish:
  - haya destruido
  - los haya consumido
  lexicon: N/A
  rationale: «Consumido» reproduce la imagen de agotamiento o aniquilación total presente en la fuente y coincide con la POB inglesa. El complemento «los» se sobreentiende por el objeto directo previo.
theological_decisions:
- issue: Uso del nombre divino en Κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: La consigna del proyecto pide usar «Yahvé» para יהוה y para κύριος cuando el contexto refleja el nombre divino. En este pasaje, la secuencia de juicio dirigida al pueblo y el paralelismo con el acto soberano de consumirlos sostienen esa lectura.
  doctrine_reference: Convención POB sobre el Tetragrámaton / nombre divino
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios en la versión inglesa de referencia; por eso la propuesta española sigue de cerca el texto auditado y solo aclara en nota la dificultad léxica de συναναστραφήσεσθε.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la terminología del proyecto para Κύριος en contexto divino.
  - Se conserva el tono de juicio y coerción del original sin suavizarlo con términos eclesiásticos.
  - No se introduce «Cristo» ni vocabulario doctrinal ajeno al versículo.
