base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/004/002.yaml
  text: And the Lord will bring captivity upon you, and there you will serve your enemies, and you will be afflicted with every kind of evil and tribulation, until the Lord has consumed you all.
