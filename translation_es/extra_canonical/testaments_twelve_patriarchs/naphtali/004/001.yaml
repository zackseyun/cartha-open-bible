id: T12P.NAP.4.1
reference: Testament of Naphtali 4:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 214-231, Naphtali pilot)
  text: IV. Ταῦτα¹ λέγω ὑμῖν², τέκνα μου, ὅτι ἔγνων³ ἐν τῇ⁴ γραφῇ⁵ Ἐνώχ, ὅτι καίγε⁶ ὑμεῖς ἀποστήσεσθε ἀπὸ Κυρίου⁷, πορευόμενοι κατὰ πᾶσαν ἀνομίαν⁸ ἐθνῶν⁹, καὶ ποιήσετε¹⁰ πᾶσαν πονηρίαν¹¹ Σοδόμων¹².
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/naphtali/004/001.yaml
  text: These things I say to you, my children, because I have learned in the writing of Enoch that you too will depart from the Lord, walking in all the lawlessness of the nations and doing all the wickedness of Sodom.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:00Z'
    unchanged: false
    changes_summary: Removed the footnote marker, changed "learned from" to "have learned in" to match ἐν τῇ γραφῇ, and rendered ἀποστήσεσθε as "will depart" without the added intensifier "surely."
translation:
  language: es
  text: Estas cosas os digo, hijos míos, porque he aprendido en la escritura de Enoc que también vosotros os apartaréis de Yahvé, andando en toda la iniquidad de las naciones y haciendo toda la maldad de Sodoma.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ταῦτα λέγω ὑμῖν
  english_pob_choice: These things I say to you
  chosen_spanish: Estas cosas os digo
  alternatives_spanish:
  - Estas cosas les digo
  - Esto os digo
  lexicon: ταῦτα; λέγω; ὑμῖν
  rationale: Conserva la referencia plural a «estas cosas» y el giro directo a los destinatarios. «Os» mantiene la cercanía del discurso y evita volver impersonal la apelación.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - amados míos
  lexicon: τέκνα; μου
  rationale: «Hijos míos» es natural en español y preserva la relación paternal/afectiva del vocativo sin añadir afecto no explícito.
- source_word: ἐν τῇ γραφῇ Ἐνώχ
  english_pob_choice: in the writing of Enoch
  chosen_spanish: en la escritura de Enoc
  alternatives_spanish:
  - en el escrito de Enoc
  - en el libro de Enoc
  lexicon: ἐν; γραφή; Ἐνώχ
  rationale: «Escritura» conserva el valor de escrito/autorizado del término griego y sigue la lectura del POB inglés, que evitó «from». «Escritura de Enoc» mantiene la relación local indicada por ἐν τῇ.
- source_word: ἀποστήσεσθε ἀπὸ Κυρίου
  english_pob_choice: you too will depart from the Lord
  chosen_spanish: también vosotros os apartaréis de Yahvé
  alternatives_spanish:
  - también vosotros os apartaréis del Señor
  - también vosotros abandonaréis a Yahvé
  lexicon: ἀποστήσεσθε; ἀπό; Κυρίου
  rationale: «Apartaréis» traduce el alejamiento/abandono implícito en ἀποστήσεσθε sin intensificar a «ciertamente». Se mantiene Yahvé según la norma del proyecto para Κυρίου cuando remite al nombre divino.
- source_word: πορευόμενοι κατὰ πᾶσαν ἀνομίαν ἐθνῶν
  english_pob_choice: walking in all the lawlessness of the nations
  chosen_spanish: andando en toda la iniquidad de las naciones
  alternatives_spanish:
  - andando en toda la anarquía de las naciones
  - viviendo en toda la maldad de las naciones
  lexicon: πορευόμενοι; κατὰ; πᾶσαν; ἀνομίαν; ἐθνῶν
  rationale: «Andando» reproduce el participio de modo de vida. «Iniquidad» conserva la carga ética y bíblica de ἀνομία sin reducirla a mera ilegalidad moderna; «de las naciones» refleja el genitivo plural.
- source_word: ποιήσετε πᾶσαν πονηρίαν Σοδόμων
  english_pob_choice: doing all the wickedness of Sodom
  chosen_spanish: y haciendo toda la maldad de Sodoma
  alternatives_spanish:
  - y practicando toda la perversidad de Sodoma
  - y cometiendo toda la maldad de Sodoma
  lexicon: ποιήσετε; πᾶσαν; πονηρίαν; Σοδόμων
  rationale: «Haciendo» sigue el paralelismo del participio/acción. «Maldad» es un equivalente natural para πονηρίαν y mantiene la fuerza moral del texto; «Sodoma» conserva el referente ejemplar de corrupción.
theological_decisions:
- issue: Divine name in Κυρίου
  english_pob_reading: from the Lord
  chosen_spanish_reading: de Yahvé
  alternative_spanish_readings:
  - del Señor
  rationale: El texto griego tiene Κυρίου; conforme al criterio del proyecto, cuando el contexto remite al nombre divino se usa «Yahvé» en el texto principal en vez de la máscara «SEÑOR/Señor».
  doctrine_reference: Tetragrámaton / nombre divino
- issue: Strength of future departure
  english_pob_reading: you too will depart
  chosen_spanish_reading: también vosotros os apartaréis
  alternative_spanish_readings:
  - también vosotros os desviaréis
  - también vosotros abandonaréis
  rationale: Se evita añadir una certeza enfática no presente en el griego ni en la revisión inglesa; el futuro simple mantiene la predicción sin intensificación adverbial.
  doctrine_reference: Fidelidad al matiz verbal del futuro griego
- issue: ἔγνων / have learned
  english_pob_reading: I have learned
  chosen_spanish_reading: he aprendido
  alternative_spanish_readings:
  - he llegado a saber
  - he sabido
  rationale: «He aprendido» conserva el valor perfectivo de resultado y la relación con la instrucción obtenida a partir de la escritura de Enoc, sin sugerir un mero «conocer» estático.
  doctrine_reference: Aspecto perfecto / testimonio recibido
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente: se reflejó ἐν τῇ γραφῇ como «en la escritura» (no «de»), y ἀποστήσεσθε como futuro simple sin intensificador («os apartaréis»). También se evitó cualquier nota superflua porque la versión inglesa revisada eliminó el marcador de nota.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico y sobrio, sin cargar el texto con equivalentes eclesiásticos tradicionales no exigidos por la evidencia.
  - 'Se preservó la secuencia retórica del original: declaración, causa, predicción y descripción ética en dos miembros paralelos.'
  - No se añadieron notas al pie porque no había variantes documentadas que requirieran anclaje en el texto español.
