translation:
  language: es
  text: Estas cosas les digo a ustedes[a], hijos míos, porque he aprendido en la escritura de Enoc que ustedes también se apartarán de Yahvé, andando en toda la iniquidad de las naciones y haciendo toda la maldad de Sodoma. Y el Señor traerá cautiverio sobre ustedes, y allí servirán a sus enemigos; la tierra quedará devastada y sus lugares santos serán desolados. Y serán dispersados a los cuatro extremos de la tierra, y serán como algo despreciado entre las naciones, una maldición y una dispersión, hasta que el Altísimo visite la tierra. Él mismo vendrá, salvando a Israel y a todas las naciones, Dios hablando en la persona de un hombre[b]. Y después de que él haya entrado, la injusticia volverá a aumentar sobre la tierra, y todas las naciones se reunirán contra él. Pero cualquiera que crea en él no será condenado en su nombre. Y ustedes, hijos míos, se levantarán de sus tribus con Leví y Judá; y habrá guerra entre ustedes. Y el Señor será visto entre los hombres, y salvará a Israel y a todas
    las naciones. Por tanto, no se dividan en dos cabezas, porque toda división entre hermanos es mala a los ojos del Señor. Porque el Señor ama la sencillez de propósito. Y si ustedes también andan en sencillez de propósito conforme a su ley[c], hijos míos, ningún espíritu malo tendrá poder sobre ustedes. Porque él sabe que el Dios del cielo es uno, y no aceptará una mente dividida. Amen al Señor durante toda su vida[d], y unos a otros con un corazón verdadero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «La escritura de Enoc» traduce una expresión que puede referirse a un libro enóquico o a una tradición escrita; la redacción no resuelve por sí sola cuestiones de canon.
    reason: cultural_note
  - marker: b
    text: La frase «Dios hablando en la persona de un hombre» refleja un giro griego difícil y teológicamente cargado. Algunos lectores la toman como una afirmación mesiánica o de encarnación; otros la ven como una expansión tardía en la tradición textual.
    reason: textual_variant
  - marker: c
    text: O «de propósito indiviso» / «no se vuelvan de doble ánimo». La imagen griega es vívida y puede apuntar tanto a una división interior como a un cisma tribal.
    reason: lexical_alternative
  - marker: d
    text: O «no se vuelvan de doble ánimo» / «no se dividan en dos bandos». La expresión griega es vivaz y puede apuntar tanto a una división interior como a un cisma tribal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνων
  english_pob_choice: I learned
  chosen_spanish: he aprendido
  alternatives_spanish:
  - supe
  - llegué a saber
  lexicon: LSJ
  rationale: En el contexto de la escritura de Enoc, el sentido es conocimiento adquirido por lectura/tradición, por lo que «he aprendido» comunica bien la adquisición del dato sin convertirlo en mera posesión estática de conocimiento.
- source_word: γραφή
  english_pob_choice: writing
  chosen_spanish: escritura
  alternatives_spanish:
  - libro
  - Escritura
  lexicon: LSJ
  rationale: «Escritura» conserva la referencia a un escrito asociado con Enoc sin afirmar canonicidad plena, en línea con el audit trail en inglés.
- source_word: ἀποστήσεσθε
  english_pob_choice: will surely depart
  chosen_spanish: se apartarán
  alternatives_spanish:
  - se alejarán
  - apostatarán
  lexicon: BDAG
  rationale: «Se apartarán» transmite la idea de deserción respecto de Yahvé sin introducir un tecnicismo eclesiástico no necesario en el texto.
- source_word: ἀνομία
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - desobediencia
  - ilegalidad
  lexicon: BDAG
  rationale: «Iniquidad» preserva el peso moral y bíblico del término, evitando sonar demasiado jurídico en español donde «lawlessness» no siempre tiene equivalente natural.
- source_word: πονηρία
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - perversidad
  - maldad grave
  lexicon: BDAG
  rationale: «Maldad» es una equivalencia natural y solemne para el paralelo con Sodoma, sin debilitar el tono del pasaje.
- source_word: αἰχμαλωσία
  english_pob_choice: captivity
  chosen_spanish: cautiverio
  alternatives_spanish:
  - exilio
  - esclavitud
  lexicon: LSJ
  rationale: «Cautiverio» conserva el sentido tradicional de juicio nacional y deportación, cercano al valor profético del término.
- source_word: διασπορά
  english_pob_choice: dispersion
  chosen_spanish: dispersión
  alternatives_spanish:
  - esparcimiento
  - diáspora
  lexicon: BDAG
  rationale: «Dispersión» reproduce con claridad el estado de ser esparcidos entre las naciones y mantiene el eco exílico.
- source_word: ἐπισκέψηται
  english_pob_choice: visits
  chosen_spanish: visite
  alternatives_spanish:
  - se acerque a
  - intervenga para
  lexicon: BDAG
  rationale: «Visite» conserva la ambigüedad teológica de visita divina para juicio o salvación, sin estrechar el sentido.
- source_word: ὁ ὕψιστος
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  lexicon: BDAG
  rationale: Es la forma bíblica y litúrgicamente inteligible en español para el título divino.
- source_word: σῴζων
  english_pob_choice: saving
  chosen_spanish: salvando
  alternatives_spanish:
  - para salvar
  - librando
  lexicon: BDAG
  rationale: El participio se conserva como expresión verbal en curso, mostrando al venidero en acto de salvar a Israel y a las naciones.
- source_word: θεὸς ἐν ἀνθρώπου σχηματι λαλήσας / equivalent phrase
  english_pob_choice: God speaking in the person of man
  chosen_spanish: Dios hablando en la persona de un hombre
  alternatives_spanish:
  - Dios apareciendo como un hombre
  - Dios hablando por medio de un hombre
  lexicon: LSJ
  rationale: La frase es difícil y teológicamente cargada; esta versión mantiene la fuerza del testimonio griego sin suavizarlo ni definir más de la cuenta su alcance metafísico.
- source_word: πιστεύσῃ
  english_pob_choice: believes in him
  chosen_spanish: crea en él
  alternatives_spanish:
  - confíe en él
  - tenga fe en él
  lexicon: BDAG
  rationale: «Crea en él» es natural en español bíblico y preserva el sentido de confianza personal del verbo en contexto profético.
- source_word: κατακριθήσεται
  english_pob_choice: shall not be condemned
  chosen_spanish: no será condenado
  alternatives_spanish:
  - no será declarado culpable
  - no recibirá condena
  lexicon: BDAG
  rationale: «Condenado» conserva la fuerza judicial del término y su claridad teológica en español.
- source_word: διγνωμία / divided expression
  english_pob_choice: divided into two heads
  chosen_spanish: se dividan en dos cabezas
  alternatives_spanish:
  - se dividan en dos bandos
  - se vuelvan de doble ánimo
  lexicon: LSJ
  rationale: «Dos cabezas» conserva la metáfora viva del griego y deja visible la imagen de división; el contexto inmediato aclara que se trata de una fractura entre hermanos.
- source_word: ἁπλότης
  english_pob_choice: singleness of purpose
  chosen_spanish: singeleza de propósito
  alternatives_spanish:
  - sencillez de propósito
  - un solo corazón
  lexicon: BDAG
  rationale: «Singeleza de propósito» comunica con precisión la idea de intención indivisa y evita el posible matiz moderno de «simplicidad».
- source_word: πνεῦμα πονηρόν
  english_pob_choice: evil spirit
  chosen_spanish: espíritu malo
  alternatives_spanish:
  - espíritu maligno
  - espíritu perverso
  lexicon: BDAG
  rationale: «Espíritu malo» es directo y fiel al contraste moral del pasaje, manteniendo el carácter personal del agente espiritual.
- source_word: καρδία ἀληθινή
  english_pob_choice: true heart
  chosen_spanish: corazón verdadero
  alternatives_spanish:
  - corazón sincero
  - corazón fiel
  lexicon: LSJ
  rationale: «Corazón verdadero» conserva el idioma bíblico de καρδία y expresa autenticidad relacional sin añadir matices ajenos.
theological_decisions:
- issue: Uso de Enoc como autoridad profética
  english_pob_reading: Translated 'the writing of Enoch' without calling it Scripture.
  chosen_spanish_reading: Traducir «la escritura de Enoc» sin llamarla Escritura canónica.
  alternative_spanish_readings:
  - el libro de Enoc
  - la Escritura de Enoc
  rationale: El griego permite referirse a un escrito asociado con Enoc sin resolver su estatus canónico; la traducción conserva esa tensión de forma auditable.
  doctrine_reference: Primacía de la fuente original; preservar la tensión teológica sin armonizarla silenciosamente.
- issue: Wording on divine visitation and the coming one
  english_pob_reading: Retained the strong wording 'He himself will come ... God speaking in the person of man.'
  chosen_spanish_reading: Mantener el lenguaje fuerte sobre la venida y la frase «Dios hablando en la persona de un hombre».
  alternative_spanish_readings:
  - Dios vendrá como hombre
  - Dios hablará por medio de un hombre
  - suavizar por posible interpolación
  rationale: La evidencia griega debe traducirse con honestidad aun cuando la tradición textual sea difícil; las notas pueden señalar la complejidad sin borrar el testimonio.
  doctrine_reference: Traducir lo que está en el testimonio griego y explicar la dificultad en notas, no por armonización implícita.
- issue: Universal scope of salvation language
  english_pob_reading: Rendered 'saving Israel and all the nations.'
  chosen_spanish_reading: «salvando a Israel y a todas las naciones».
  alternative_spanish_readings:
  - salvando a Israel de entre las naciones
  - salvando a Israel y a los gentiles
  rationale: La construcción natural es de doble objeto; se preserva así el alcance amplio del pasaje sin estrecharlo a una sola lectura política o etnorreligiosa.
  doctrine_reference: Mantener el alcance textual amplio sin resolverlo de antemano.
- issue: Exhortation to unity
  english_pob_reading: Rendered the key virtue as 'singleness of purpose.'
  chosen_spanish_reading: «singeleza de propósito».
  alternative_spanish_readings:
  - sencillez de propósito
  - un solo corazón
  rationale: La sección enfatiza integridad no dividida; esta expresión comunica mejor la fuerza ética y comunitaria del pasaje en español actual.
  doctrine_reference: Unidad moral y comunitaria; no dividirse en facciones.
translation_notes:
  revision_awareness: Se corrigió el residuo de inglés no traducido en la frase final, reemplazando la secuencia parcialmente anglófona por una formulación plenamente española y revisando todo el bloque para asegurar que no quedaran restos en inglés en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino principal conforme al criterio del proyecto.
  - Se evitó «Cristo» porque el pasaje no requiere ese título fijo en la línea principal.
  - Se preservó la distinción entre «injusticia», «iniquidad», «maldad» y «espíritu malo» para no aplanar términos distintos del original.
  - Las notas al pie están todas ancladas en el texto principal con marcas [a], [b], [c] y [d].
