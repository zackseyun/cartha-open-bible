  rationale: Se reemplazó por una traducción directa del griego conservado. 'Copia de las palabras' refleja Ἀντίγραφον λόγων; 'dirigió a sus hijos' expresa con buen español διέθετο τοῖς υἱοῖς αὐτοῦ sin rigidez excesiva; 'antes de morir' traduce πρὶν ἢ ἀποθανεῖν; 'en el año ciento catorce de su vida' sigue ἐν τῷ ἑκατοστῷ τετάρτῳ καὶ δεκάτῳ ἔτει τῆς ζωῆς αὐτοῦ; 'dos años después de la muerte de José' sigue μετὰ οὖν δύο ἔτη τοῦ θανάτου Ἰωσήφ; y 'Escúchenme' traduce Ἀκούσατέ μου de forma natural y digna. Se añadió una nota mínima porque la evidencia fuente está alineada solo a nivel de fragmento de capítulo.
