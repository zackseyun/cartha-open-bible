base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/001/007.yaml
  text: Yet when they wanted to kill him, with tears I begged them not to commit this sin.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated compassionate-saying draft with a translation matching the Greek source: ''copy of the words of Dan,'' ''which he spoke to his sons,'' ''in his last days,'' and ''in the one hundred twentieth year.'''
translation:
  language: es
  text: Sin embargo, cuando quisieron matarlo, con lágrimas les supliqué que no cometieran este pecado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀκούσατέ μου / with context of pleading not to sin
  english_pob_choice: with tears I begged them not to commit this sin
  chosen_spanish: con lágrimas les supliqué que no cometieran este pecado
  alternatives_spanish:
  - con lágrimas les rogué que no cometieran este pecado
  - con lágrimas les pedí que no hicieran este pecado
  lexicon: ἀκούω / δέομαι / ἁμαρτία
  rationale: El inglés POB interpreta la escena como una súplica intensa y mantiene el matiz moral de 'sin'. En español, 'supliqué' conserva el tono urgente y digno mejor que un simple 'pedí'. 'Cometer este pecado' refleja con claridad el valor ético del texto sin suavizarlo.
theological_decisions:
- issue: El acto a evitar se presenta como pecado, no solo como daño personal
  english_pob_reading: not to commit this sin
  chosen_spanish_reading: que no cometieran este pecado
  alternative_spanish_readings:
  - que no hicieran esto
  - que no incurrieran en esta culpa
  rationale: La formulación mantiene la carga moral del pasaje. 'Este pecado' es la traducción más directa y conserva la tensión ética explícita del texto fuente y del inglés POB.
  doctrine_reference: ética del pecado / exhortación moral
translation_notes:
  revision_awareness: El contexto de revisión mostrado en el expediente confirma que la línea debe corresponder al fragmento griego de apertura de Zabulón, no al borrador anterior no relacionado sobre compasión. Por eso se traduce como una intervención narrativa breve en tercera persona plural, con foco en la súplica ante la intención homicida.
  spanish_consistency_notes:
  - Se usa 'pecado' para ἁμαρτία cuando el contexto es moral y concreto.
  - Se mantiene un registro bíblico sobrio y contemporáneo, sin arcaísmos innecesarios.
  - '''Les'' conserva el referente plural implícito del pasaje y evita ambigüedad en español.'
