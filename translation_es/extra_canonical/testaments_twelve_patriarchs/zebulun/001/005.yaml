translation:
  language: es
  text: 'Testamento de Zabulón, el sexto hijo de Jacob y de Lea.


    I. Copia de las palabras de Zabulón, que dejó a sus hijos, antes de morir, en el año ciento veinte de su vida, dos años después de la muerte de José.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Διαθήκη
  english_pob_choice: Testament
  chosen_spanish: Testamento
  alternatives_spanish:
  - Pacto
  - Testamento [a]
  lexicon: Διαθήκη
  rationale: En este corpus, el inglés POB conserva el título genérico 'Testament' para el encabezado del escrito. En español, 'Testamento' reproduce ese valor de obra literaria/colección y es la forma natural del título tradicional sin imponer el sentido jurídico de 'pacto' que aquí no domina el encabezado.
- source_word: ἕκτου υἱοῦ Ἰακὼβ καὶ Λείας
  english_pob_choice: the sixth son of Jacob and Leah
  chosen_spanish: el sexto hijo de Jacob y de Lea
  alternatives_spanish:
  - el sexto hijo de Jacob y Lea
  - el sexto hijo de Jacob y de Lía
  lexicon: ἕκτου ... υἱοῦ
  rationale: '''Hijo'' conserva la filiación directa del griego y ''de Jacob y de Lea'' mantiene la coordinación genealógica sin amplificarla. ''Lea'' sigue la forma usual española del nombre bíblico.'
- source_word: Ἀντίγραφον λόγων
  english_pob_choice: A copy of the words
  chosen_spanish: Copia de las palabras
  alternatives_spanish:
  - Copia de las palabras [b]
  - Transcripción de las palabras
  lexicon: Ἀντίγραφον λόγων
  rationale: '''Copia'' refleja con sencillez Ἀντίγραφον, y ''palabras'' conserva λόγων en un registro natural para un encabezado de obra. ''Transcripción'' sería posible, pero sugiere una técnica editorial más específica que el griego no exige.'
- source_word: διέθετο τοῖς υἱοῖς αὐτοῦ
  english_pob_choice: he spoke to his sons / he committed ... to his sons
  chosen_spanish: que dejó a sus hijos
  alternatives_spanish:
  - que entregó a sus hijos
  - que dispuso para sus hijos
  lexicon: διέθετο
  rationale: El verbo admite el matiz de 'disponer, dejar, encargar'. En español, 'dejó' conserva la idea de legado/entrega del dicho a los hijos sin sobrecargar el texto con tecnicismos.
- source_word: πρὶν ἢ ἀποθανεῖν αὐτὸν
  english_pob_choice: before he died
  chosen_spanish: antes de morir
  alternatives_spanish:
  - antes de fallecer
  - antes de que muriera
  lexicon: πρὶν ἢ ἀποθανεῖν
  rationale: '''Antes de morir'' reproduce el valor temporal directo del infinitivo y es natural en español bíblico contemporáneo.'
- source_word: ἐν τῷ ἑκατοστῷ τετάρτῳ καὶ δεκάτῳ ἔτει
  english_pob_choice: in the one hundred and twentieth year
  chosen_spanish: en el año ciento veinte
  alternatives_spanish:
  - en el año ciento y veinte
  - en su año ciento veinte
  lexicon: ἑκατοστῷ ... καὶ δεκάτῳ
  rationale: La construcción griega expresa 120; 'año ciento veinte' es la formulación clara y digna en español, evitando una literalidad torpe.
- source_word: μετὰ οὖν δύο ἔτη τοῦ θανάτου Ἰωσήφ
  english_pob_choice: two years after the death of Joseph
  chosen_spanish: dos años después de la muerte de José
  alternatives_spanish:
  - dos años tras la muerte de José
  - dos años después de que José murió
  lexicon: μετὰ ... δύο ἔτη ... τοῦ θανάτου
  rationale: La relación temporal queda suficientemente expresada por 'dos años después de la muerte de José', que sigue el orden y sentido del griego sin introducir inferencias.
theological_decisions:
- issue: 'Naturaleza del encabezado: título literario vs. fórmula doctrinal'
  english_pob_reading: A copy of the words of Dan, which he spoke to his sons in the last days of his life, in the one hundred and twentieth year.
  chosen_spanish_reading: Testamento de Zabulón, el sexto hijo de Jacob y de Lea. I. Copia de las palabras de Zabulón...
  alternative_spanish_readings:
  - Pacto de Zabulón...
  - Últimas palabras de Zabulón...
  rationale: El pasaje funciona como encabezado de una obra pseudepigráfica, no como una afirmación doctrinal. 'Testamento' mantiene el género literario tradicional sin convertir el título en una tesis teológica.
  doctrine_reference: Género literario pseudepigráfico; no implica doctrina normativa.
- issue: Referencia a José y el juramento implícito en el contexto inmediato
  english_pob_reading: I do not remember that I committed any lawlessness, except for the unwitting wrong I did concerning Joseph, in that I gave my brothers my pledge not to tell my father what had happened.
  chosen_spanish_reading: dos años después de la muerte de José.
  alternative_spanish_readings:
  - tras la muerte de José
  - después de la muerte de José
  rationale: La evidencia griega disponible para este ítem es el encabezado cronológico, no el desarrollo confesional del verso alineado en inglés. Por eso el español se ciñe al texto fuente presente y no traslada contenido del audit trail que no está en el griego de este registro.
  doctrine_reference: Prioridad de la fuente griega disponible; no se importa contenido ajeno al segmento.
translation_notes:
  revision_awareness: La revisión más reciente sustituyó un borrador no relacionado por la traducción del encabezado y sus marcadores cronológicos. Este español sigue esa línea y se limita al material del paquete griego disponible, sin mezclarlo con la frase confesional del audit trail en inglés, que pertenece a una alineación distinta.
  spanish_consistency_notes:
  - Se mantiene 'Zabulón' como forma estándar del nombre y se conserva 'José' sin glosa.
  - Se usa 'Testamento' como título de obra, coherente con el género de la colección en español.
  - No se añadieron notas al pie porque el texto fuente aquí es breve y no presenta variantes que requieran marcación en este registro.
