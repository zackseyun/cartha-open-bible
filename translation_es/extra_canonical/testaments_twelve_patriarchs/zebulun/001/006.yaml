base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/001/006.yaml
  text: But I wept in secret for many days because of Joseph; for I was afraid of my brothers, because they had all agreed that whoever disclosed the secret should be put to death.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
    unchanged: true
