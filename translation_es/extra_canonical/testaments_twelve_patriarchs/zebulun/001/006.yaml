translation:
  language: es
  text: Pero lloré en secreto por muchos días a causa de José; porque tenía miedo de mis hermanos, ya que todos habían acordado que cualquiera que revelara el secreto debía ser muerto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν τῷ ἑκατοστῷ τετάρτῳ καὶ δεκάτῳ ἔτει τῆς ζωῆς αὐτοῦ
  english_pob_choice: omitted in the English audit text provided
  chosen_spanish: omitir en este versículo por no estar sustentado por el tramo inglés auditado y por pertenecer al encabezado fragmentario griego
  alternatives_spanish:
  - «en el año ciento catorce de su vida»
  - «al cumplir ciento catorce años»
  lexicon: ἑκατοστός; τετάρτος; δέκατος; ἔτος; ζωή
  rationale: El fragmento griego conserva un encabezado cronológico/estructural, pero el texto inglés auditado suministrado para esta tarea no lo refleja y la alineación versicular es incierta; por fidelidad al paquete auditado, no se incorpora al cuerpo español.
- source_word: τοῦ θανάτου Ἰωσήφ
  english_pob_choice: because of Joseph
  chosen_spanish: a causa de José
  alternatives_spanish:
  - por José
  - por la muerte de José
  lexicon: θάνατος; Ἰωσήφ
  rationale: Aunque el griego visible menciona «la muerte de José», el inglés auditado da «because of Joseph», que puede resumir el motivo narrativo sin explicitar la construcción nominal. Se conserva la referencia personal con una preposición causal natural en español, sin forzar una glosa más fuerte que el texto auditado.
- source_word: Ἀκούσατέ μου
  english_pob_choice: not present in the English audit text provided
  chosen_spanish: omitir por tratarse del inicio del discurso en el fragmento griego no alineado
  alternatives_spanish:
  - «Escúchenme»
  - «Oiganme»
  lexicon: ἀκούω
  rationale: El fragmento griego ya entra en la alocución; sin embargo, el texto inglés auditado termina antes de ese punto. Para evitar exceder el tramo respaldado por el contexto auditado, no se traduce aquí.
- source_word: διέθετο τοῖς υἱοῖς αὐτοῦ
  english_pob_choice: they had all agreed
  chosen_spanish: habían acordado
  alternatives_spanish:
  - habían convenido
  - se habían puesto de acuerdo
  lexicon: διατίθημι
  rationale: El inglés auditado interpreta la idea de una resolución común. En español, «habían acordado» reproduce bien el valor de acuerdo concertado sin añadir matices ajenos.
- source_word: ἀποθανεῖν αὐτόν
  english_pob_choice: to be put to death
  chosen_spanish: debía ser muerto
  alternatives_spanish:
  - debía ser ejecutado
  - sería condenado a muerte
  lexicon: ἀποθνῄσκω; passive death idiom
  rationale: Se preserva el pasivo de muerte de forma sobria y cercana al valor verbal del original, evitando una reinterpretación judicial más específica que no está exigida por el texto.
theological_decisions:
- issue: Relación entre el encabezado griego cronológico y el tramo narrativo inglés auditado
  english_pob_reading: The English audit text begins in medias res with Joseph and the brothers and does not carry over the Greek heading chronology.
  chosen_spanish_reading: La traducción española sigue el tramo narrativo auditado en inglés y no incorpora el encabezado cronológico griego no alineado.
  alternative_spanish_readings:
  - Incluir el año 114 en el texto principal
  - Mover el encabezado cronológico a nota
  rationale: La prioridad es mantener la trazabilidad del tramo realmente auditado. Dado que el versículo/ sección en inglés no presenta el encabezado, incorporarlo al texto principal español introduciría material no respaldado por el audit trail proporcionado.
  doctrine_reference: Fidelidad textual y transparencia editorial en textos extra-canónicos
translation_notes:
  revision_awareness: Latest revision pass indicates no changes needed; the English audit text remains unchanged. The Spanish draft therefore tracks the supplied English wording where aligned and refrains from importing unmatched Greek heading material.
  spanish_consistency_notes:
  - Se mantiene «José» de forma consistente como nombre propio.
  - Se usa «deba ser muerto»/«debería ser muerto» solo como pasiva de obligación, evitando fórmulas eclesiásticas o jurídicas no presentes en el audit trail.
  - No se introduce terminología cristiana posterior ni equivalentes litúrgicos ajenos al fragmento.
