base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/001/001.yaml
  text: A copy of the words of Zebulun, which he charged his sons before he died, in the one hundred and fourteenth year of his life, two years after the death of Joseph.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
