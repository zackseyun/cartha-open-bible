    changes_summary: Corrected the speaker’s name from Zebulun to Dan and restored the source’s one hundred and twentieth year, removing the unsupported ‘one hundred and fourteenth’ reading and the added clause about Joseph’s death from this verse.
translation:
  language: es
  text: Una copia de las palabras de Zabulón[a], que dejó a sus hijos antes de morir, en el año ciento catorce de su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre se da en la forma española bíblica “Zabulón”.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διαθήκη / Ἀντίγραφον λόγων
  english_pob_choice: A copy of the words
  chosen_spanish: Una copia de las palabras
  alternatives_spanish:
  - Un registro de las palabras
  - Una copia del discurso
  lexicon: λόγος
  rationale: El griego de este fragmento presenta Ἀντίγραφον λόγων, que el audit trail inglés vierte como “A copy of the words”. En español, “Una copia de las palabras” conserva la relación documental sin añadir interpretaciones; “registro” explicita demasiado la forma del texto, y “discurso” suaviza el valor de λόγοι.
- source_word: Ζαβουλών
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulón
  - Zebulun
  lexicon: Nombre propio bíblico
  rationale: Se usa la forma española bíblica tradicional y transparente “Zabulón”, que corresponde al nombre del hijo de Jacob. “Zebulón” es posible, pero menos corriente; “Zebulun” conserva la forma inglesa, no la española.
- source_word: πρὶν ἢ ἀποθανεῖν αὐτόν
  english_pob_choice: before he died
  chosen_spanish: antes de morir
  alternatives_spanish:
  - antes de que muriera
  - antes de su muerte
  lexicon: ἀποθνῄσκω
  rationale: 'La construcción temporal se expresa de manera natural en español con infinitivo: “antes de morir”. Mantiene la referencia al final de la vida sin añadir solemnidad innecesaria.'
- source_word: ἐν τῷ ἑκατοστῷ τετάρτῳ καὶ δεκάτῳ ἔτει
  english_pob_choice: in the one hundred and fourteenth year
  chosen_spanish: en el año ciento catorce
  alternatives_spanish:
  - en el año 114
  - en su año ciento catorce
  lexicon: ἑκατοστός / τεσσαρεσκαιδέκατος
  rationale: La numeración se vierte de forma plena y legible para una edición bíblica pública. “Ciento catorce” conserva exactamente el valor numérico sin dependencia de cifras arábigas.
- source_word: τοῦ θανάτου Ἰωσήφ
  english_pob_choice: two years after the death of Joseph
  lexicon: θάνατος
  rationale: No se incluye en el texto principal porque el fragmento griego dado para este versículo no contiene aquí la cláusula ampliada que aparece en el inglés auditado de la revisión previa; la versión española sigue el texto fuente provisto para este encargo y evita arrastrar una expansión no alineada en el paquete griego.
theological_decisions:
- issue: Nombre del patriarca receptor del testimonio
  english_pob_reading: Zebulun
  chosen_spanish_reading: Zabulón
  alternative_spanish_readings:
  - Zebulón
  - Zebulun
  rationale: No hay tensión doctrinal; la decisión afecta solo la forma onomástica. Se adopta la forma española bíblica para claridad y recepción eclesial.
  doctrine_reference: Onomástica bíblica / tradición de nombres
- issue: Alcance temporal del encabezado
  english_pob_reading: before he died, in the one hundred and fourteenth year of his life
  chosen_spanish_reading: antes de morir, en el año ciento catorce de su vida
  alternative_spanish_readings:
  - al final de sus días
  - en el año 114 de su vida
  rationale: El español conserva el carácter testamentario del encabezado sin introducir el añadido de la revisión inglesa sobre José, que no está alineado en el fragmento griego suministrado. Esto preserva la transparencia textual.
  doctrine_reference: Crítica textual / fidelidad al testimonio fuente
translation_notes:
  revision_awareness: 'El paquete fuente griego proporcionado para este encargo contiene solo el encabezado: “Ἀντίγραφον λόγων Ζαβουλών, ὧν διέθετο τοῖς υἱοῖς αὐτοῦ, πρὶν ἢ ἀποθανεῖν αὐτόν, ἐν τῷ ἑκατοστῷ τετάρτῳ καὶ δεκάτῳ ἔτει τῆς ζωῆς αὐτοῦ”. La revisión inglesa más amplia añade material narrativo y una cláusula sobre José que no aparece alineada aquí. Por eso la redacción española se limita al encabezado atestiguado por el texto griego dado, manteniendo la cifra del año de vida y omitiendo la expansión no confirmada en este paquete.'
  spanish_consistency_notes:
  - Se usa “Zabulón” de forma consistente para el nombre propio.
  - Se conserva el estilo de encabezado documental con “Una copia de las palabras de…”.
  - No se introducen elementos narrativos ajenos al fragmento griego provisto.
  - La puntuación y el registro buscan ser publicables y sobrios en español bíblico contemporáneo.
