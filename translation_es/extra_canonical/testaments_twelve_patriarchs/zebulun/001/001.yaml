  text: Διαθήκη Ζαβουλὼν τοῦ ἕκτου υἱοῦ Ἰακὼβ καὶ Λείας¹. I. *Ἀντίγραφον λόγων² Ζαβουλών, ὧν³ διέθετο τοῖς υἱοῖς⁴ αὐτοῦ, ⁵πρὶν ἢ ἀποθανεῖν αὐτὸν⁵ *ἐν τῷ⁶ ἑκατοστῷ *τετάρτῳ καὶ δεκάτῳ⁷ ἔτει τῆς ζωῆς αὐτοῦ⁸, μετὰ *οὖν δύο ἔτη⁹ *τοῦ θανάτου¹⁰ Ἰωσήφ. 2. Εἶπεν¹¹ αὐτοῖς· Ἀκούσατέ μου¹²,
