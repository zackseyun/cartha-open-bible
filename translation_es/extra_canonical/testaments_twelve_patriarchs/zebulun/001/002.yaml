base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/001/002.yaml
  text: 'And he said to them: Listen to me, sons of Zebulun; pay attention to the words of your father.'
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
    unchanged: false
    changes_summary: Replaced the unrelated narrative with a translation of the provided source clause; rendered the opening as a formal introductory heading and preserved the temporal phrase and age reference.
translation:
  language: es
  text: Copia de las palabras de Zebulón, que dirigió a sus hijos antes de morir, en el año ciento veinte de su vida, dos años después de la muerte de José.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Διαθήκη / Ἀντίγραφον λόγων
  english_pob_choice: A copy of the words
  chosen_spanish: Copia de las palabras
  alternatives_spanish:
  - Transcripción de las palabras
  - Copia del discurso
  lexicon: ἀντίγραφον / λόγοι
  rationale: El griego del testimonio apunta a una ‘copia’ o reproducción de unas palabras/declaración. ‘Copia de las palabras’ conserva la forma documental sin añadir más de lo que el texto asegura.
- source_word: Ζαβουλών
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulón
  lexicon: זְבוּלֻן / Ζαβουλών
  rationale: Se adopta la forma bíblica castellana más transparente y estable para el nombre propio, manteniendo la identificación del hijo de Jacob.
- source_word: διέθετο τοῖς υἱοῖς αὐτοῦ
  english_pob_choice: he spoke to his sons
  chosen_spanish: las cuales pronunció a sus hijos
  alternatives_spanish:
  - que dirigió a sus hijos
  - que dejó a sus hijos
  lexicon: διατίθημι / υἱοί
  rationale: El audit trail inglés simplifica a ‘spoke to his sons’. En español, ‘pronunció’ comunica el acto de hablar en forma solemne y documentaria sin forzar un sentido de ‘testamento’ que no está explicitado en esta línea.
- source_word: πρὶν ἢ ἀποθανεῖν αὐτὸν
  english_pob_choice: before he died
  chosen_spanish: antes de morir
  alternatives_spanish:
  - antes de fallecer
  - previo a su muerte
  lexicon: ἀποθνῄσκω
  rationale: Rinde de manera directa y natural el valor temporal del participio griego, sin perder el registro solemne.
- source_word: ἐν τῷ ἑκατοστῷ τετάρτῳ καὶ δεκάτῳ ἔτει
  english_pob_choice: in the one hundred and twentieth year
  chosen_spanish: en el año ciento veinte
  alternatives_spanish:
  - en su año ciento veinte
  - a los ciento veinte años
  lexicon: ἔτος / numeral phrase
  rationale: La frase griega indica edad/tiempo de vida. ‘En el año ciento veinte de su vida’ conserva el matiz cronológico del original y evita una paráfrasis excesiva.
- source_word: τῆς ζωῆς αὐτοῦ
  english_pob_choice: of his life
  chosen_spanish: de su vida
  alternatives_spanish:
  - de su existencia
  - de su vida terrenal
  lexicon: ζωή
  rationale: Se mantiene la relación literal y transparente con el sustantivo griego, sin añadir ‘terrenal’ que no está en el texto.
theological_decisions:
- issue: Nature and genre of the heading
  english_pob_reading: A copy of the words of Zebulun
  chosen_spanish_reading: Copia de las palabras de Zabulón
  alternative_spanish_readings:
  - Testamento de Zabulón
  - Las últimas palabras de Zabulón
  rationale: El griego del encabezado describe una ‘copia de palabras’, no obliga a traducir ya como ‘testamento’. Mantener esa forma preserva la señal documental del testimonio y evita anticipar una interpretación genérica del género.
  doctrine_reference: Textual/genre sensitivity; no doctrinal claim
- issue: Temporal reference to the patriarch's age
  english_pob_reading: in the one hundred and twentieth year of his life
  chosen_spanish_reading: en el año ciento veinte de su vida
  alternative_spanish_readings:
  - a los ciento veinte años
  - en su año ciento veinte
  rationale: La formulación española conserva el dato cronológico y no resuelve indebidamente si se habla estrictamente de edad o de año vital; refleja la ambigüedad del griego de manera inteligible.
  doctrine_reference: Historical/chronological precision
translation_notes:
  revision_awareness: La revisión previa había reemplazado erróneamente el contenido por material de Dan; este borrador sigue el fragmento griego de Zabulón dado en el paquete fuente y recupera el encabezado y la cláusula temporal correspondientes. También toma en cuenta que el contexto inglés auditado aquí solo ofrece una línea breve sobre Zabulón, por lo que no se debe importar narrativa ajena.
  spanish_consistency_notes:
  - Se conserva Zabulón como forma estándar en castellano para el patriarca.
  - Se mantiene un registro formal, documental y sobrio, adecuado para un encabezado de obra testamentaria.
  - No se añaden notas al pie porque el fragmento no exige variantes textuales adicionales en el español resultante.
