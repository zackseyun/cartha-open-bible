- from: Copia de las palabras de Zabulón, las cuales pronunció a sus hijos antes de morir, en el año ciento veinte de su vida.
  to: Copia de las palabras de Zebulón, que dirigió a sus hijos antes de morir, en el año ciento veinte de su vida, dos años después de la muerte de José.
  rationale: Se corrige el nombre propio a 'Zebulón' para mejor alineación bíblica y con el audit trail inglés, se completa la cláusula cronológica omitida sobre la muerte de José, y se pule la sintaxis con 'que dirigió a sus hijos' para una lectura más natural en español sin apartarse del griego.
