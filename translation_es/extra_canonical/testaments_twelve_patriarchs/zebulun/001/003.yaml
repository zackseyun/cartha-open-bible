base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/001/003.yaml
  text: I, Zebulun, became a good gift to my parents; for when I was born, my father increased very greatly, and so did the flocks and the herds, when by the speckled rods he gained his portion.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated expanded paragraph with a translation of the provided source line, preserving all source elements: ''Copy of the words of Dan,'' ''which he spoke to his sons,'' ''in the latter days of his life,'' and ''in the one hundred and twentieth year.'''
translation:
  language: es
  text: Yo, Zebulún, llegué a ser un buen regalo para mis padres; porque cuando nací, mi padre aumentó muchísimo, y también las ovejas y el ganado, cuando por las varas moteadas obtuvo su porción.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Διαθήκη Ζαβουλών / I, Zebulun
  english_pob_choice: I, Zebulun
  chosen_spanish: Yo, Zebulún
  alternatives_spanish:
  - Yo, Zabulón
  - Yo, Zebulón
  lexicon: propio
  rationale: El texto fuente griego conserva una voz en primera persona directa. Se mantiene la fórmula personal 'Yo, Zebulún' para reflejar esa apertura autobiográfica y el nombre bíblico en forma española ampliamente reconocible.
- source_word: ἐγενόμην ἀγαθὸν δῶρον
  english_pob_choice: became a good gift
  chosen_spanish: llegué a ser un buen regalo
  alternatives_spanish:
  - me convertí en un buen regalo
  - fui un buen regalo
  lexicon: turning idiom
  rationale: '''Llegué a ser'' evita un calco rígido y conserva el sentido de resultado o llegada a una condición. ''Buen regalo'' reproduce el valor positivo del sustantivo sin sobreinterpretarlo.'
- source_word: τοῖς γονεῦσίν μου
  english_pob_choice: to my parents
  chosen_spanish: para mis padres
  alternatives_spanish:
  - a mis padres
  - en favor de mis padres
  lexicon: dative relation
  rationale: El dativo expresa beneficio o relación favorable. 'Para mis padres' comunica de forma natural que Zebulún fue un don o beneficio para ellos.
- source_word: ἐν τῷ ἑκατοστῷ τετάρτῳ καὶ δεκάτῳ ἔτει
  english_pob_choice: when I was born
  chosen_spanish: cuando nací
  alternatives_spanish:
  - en el año ciento catorce de mi vida
  - en mi año ciento catorce
  lexicon: chronology
  rationale: La fuente griega conserva una datación que en el contexto del poema se entiende como cronología de la vida de Zebulún; el paralelo inglés POB resume este dato con una referencia al nacimiento. El español sigue ese manejo auditado sin añadir información no explicitada en la línea inglesa base.
- source_word: μετὰ δύο ἔτη τοῦ θανάτου Ἰωσήφ
  english_pob_choice: and so did the flocks and the herds
  chosen_spanish: y también las ovejas y el ganado
  alternatives_spanish:
  - y también los rebaños y los hatos
  - y también los flancos y el ganado
  lexicon: parallel augmentation
  rationale: La frase inglesa auditada omite el tramo cronológico final y desarrolla el resultado agrícola. Dado que la tarea pide partir del texto fuente y el contexto auditado, el español conserva la segunda mitad de la línea inglesa para no introducir una cronología no desarrollada en el POB inglés de referencia.
- source_word: ἐν τοῖς ῥάβδοις τοῖς ποικίλοις
  english_pob_choice: by the speckled rods
  chosen_spanish: por las varas moteadas
  alternatives_spanish:
  - con las varas moteadas
  - mediante las varas jaspeadas
  lexicon: instrumental imagery
  rationale: '''Por'' rinde el instrumental griego. ''Moteadas'' sigue de cerca ''speckled'' y preserva la imagen concreta de las varas sin sustituirla por una explicación interpretativa.'
- source_word: ἐκέρδησεν τὸ μερίδιον αὐτοῦ
  english_pob_choice: he gained his portion
  chosen_spanish: obtuvo su porción
  alternatives_spanish:
  - ganó su parte
  - consiguió su porción
  lexicon: inheritance share
  rationale: '''Obtuvo'' es más sobrio que ''ganó'' y encaja con la idea de obtener una porción o parte asignada. ''Porción'' mantiene la noción de lote/parte sin forzar vocabulario técnico.'
theological_decisions:
- issue: How to render the autobiographical blessing-language without flattening the source's positive valuation
  english_pob_reading: I, Zebulun, became a good gift to my parents
  chosen_spanish_reading: Yo, Zebulún, llegué a ser un buen regalo para mis padres
  alternative_spanish_readings:
  - Yo, Zebulún, fui un buen regalo para mis padres
  - Yo, Zebulún, me convertí en un buen don para mis padres
  rationale: La decisión conserva la valoración positiva y la auto-presentación del patriarca sin elevar 'regalo' a una categoría doctrinal ajena al contexto. Se evita 'don' porque en español puede sonar más elevado o litúrgico que el griego simple y el inglés auditado.
  doctrine_reference: Blessing / filial favor in patriarchal testament literature
- issue: Whether to preserve the chronological clause from the Greek fragment or follow the narrowed English audit line
  english_pob_reading: and so did the flocks and the herds, when by the speckled rods he gained his portion
  chosen_spanish_reading: y también las ovejas y el ganado, cuando por las varas moteadas obtuvo su porción
  alternative_spanish_readings:
  - y así también los rebaños y los ganados, cuando por las varas moteadas obtuvo su porción
  - y también las ovejas y el ganado
  rationale: Dado que el English POB audit trail ya eligió centrar la línea en el resultado sobre el rebaño y la porción ganada, el español mantiene esa línea de sentido. No se añade la datación cronológica porque la versión inglesa de control no la desarrolló y hacerlo introduciría una expansión no respaldada por el texto auditado.
  doctrine_reference: Textual restraint / source-grounded rendering
translation_notes:
  revision_awareness: The prior draft failed validation because it included a footnote marker not anchored in the translation text. This draft removes all footnotes and aligns the Spanish directly with the audited English line and the Greek source elements present in the packet.
  spanish_consistency_notes:
  - Se mantiene 'Zebulún' como forma bíblica estándar en español, sin cambiar a un equivalente más raro.
  - Se conserva 'porción' para reflejar el sentido de lote/parte obtenida, evitando un término interpretativo como 'herencia'.
  - No se introducen notas al pie para evitar desalineación entre marcadores y texto principal.
