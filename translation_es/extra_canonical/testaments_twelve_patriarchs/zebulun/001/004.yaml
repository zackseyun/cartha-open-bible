lexical_decisions:
- source_word: ἥμαρτον / sinned
  english_pob_choice: sinned
  chosen_spanish: pecado
  alternatives_spanish:
  - faltado
  - delinquido
  lexicon: —
  rationale: El contexto del testamento usa el campo semántico de pecar/culpa moral; en español «pecado» mantiene la confesión amplia sin forzar una acusación técnica más precisa que la fuente no desarrolla aquí.
- source_word: ἐν τῷ νοῒ / in thought (implied by English POB)
  english_pob_choice: in thought
  chosen_spanish: en pensamiento
  alternatives_spanish:
  - en la mente
  - de pensamiento
  lexicon: —
  rationale: «En pensamiento» reproduce de modo natural la excepción indicada por la tradición textual y conserva la distinción entre actos externos y culpa interior.
theological_decisions:
- issue: 'Alcance de la exención moral: acciones versus pensamiento'
  english_pob_reading: I do not know that I sinned in my days, except in thought.
  chosen_spanish_reading: No sé que haya pecado en mis días, excepto en pensamiento.
  alternative_spanish_readings:
  - No sé haber pecado en mis días, salvo en pensamiento.
  - No creo haber pecado en mis días, excepto en pensamiento.
  rationale: 'La redacción española conserva la cautela epistémica de «I do not know» y mantiene la tensión ética: una posible falta limitada al ámbito del pensamiento, no una negación absoluta de toda culpa. Evita suavizar el matiz de examen de conciencia presente en el texto.'
  doctrine_reference: conciencia moral; pecaminosidad interior del pensamiento
- issue: Forma verbal de conocimiento incierto
  english_pob_reading: I do not know that...
  chosen_spanish_reading: No sé que...
  alternative_spanish_readings:
  - No creo que...
  - Desconozco que...
  rationale: «No sé que» refleja directamente la incertidumbre del hablante sin convertirla en mera opinión subjetiva («no creo») ni en un registro excesivamente literario («desconozco»).
  doctrine_reference: modestia testimonial; examen de conciencia
translation_notes:
  revision_awareness: El texto griego aportado en el paquete es un fragmento de nivel capitular y no está alineado versículo por versículo; por ello se siguió el testimonio inglés auditado de la POB para la frase versicular, manteniendo su lectura óptima sin añadir material no atestiguado.
  spanish_consistency_notes:
  - Se mantiene «pecado» como sustantivo confesional, coherente con el registro moral del pasaje.
  - Se evita introducir «naturaleza» o glosas explicativas que no están respaldadas por el testimonio fuente.
  - La puntuación y la sintaxis siguen un español bíblico moderno y sobrio, sin arcaísmos innecesarios.
