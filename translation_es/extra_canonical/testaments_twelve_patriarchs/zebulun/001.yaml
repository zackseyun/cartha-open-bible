base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/001.yaml
  text: '1 A copy of the words of Zebulun, which he charged his sons before he died, in the one hundred and fourteenth year of his life, two years after the death of Joseph.


    2 And he said to them: Listen to me, sons of Zebulun; pay attention to the words of your father.


    3 I, Zebulun, became a good gift to my parents; for when I was born, my father increased very greatly, and so did the flocks and the herds, when by the speckled rods he gained his portion.


    4 I do not know that I sinned in my days, except in thought.


    5 I do not remember that I committed any lawlessness, except for the unwitting wrong I did concerning Joseph, in that I gave my brothers my pledge not to tell my father what had happened.


    6 But I wept in secret for many days because of Joseph; for I was afraid of my brothers, because they had all agreed that whoever disclosed the secret should be put to death.


    7 Yet when they wanted to kill him, with tears I begged them not to commit this sin.'
  footnotes:
  - marker: a
    text: Some witnesses differ in the patriarch name in the superscription; the chapter itself clearly presents Zebulun speaking.
    reason: textual_variant
  - marker: b
    text: The exact age number in the superscription varies in transmission; the present rendering follows the Greek witness used here.
    reason: textual_variant
  - marker: c
    text: The phrase 'bowels are without mercy' reflects an ancient idiom in which the inward parts are the seat of compassion.
    reason: cultural_note
