translation:
  language: es
  text: '1 Copia de las palabras de Zabulón, el sexto hijo de Jacob y de Lea, las cuales les dejó a sus hijos antes de morir, en el año ciento catorce de su vida, dos años después de la muerte de José.[a]


    2 Y les dijo: Escúchenme, hijos de Zabulón; atiendan a las palabras de su padre.


    3 Yo, Zabulón, fui para mis padres un buen don; porque cuando nací, mi padre aumentó muchísimo, y también los rebaños y los ganados, cuando por medio de las varas moteadas obtuvo su parte.


    4 No sé que haya pecado en mis días, excepto en pensamiento.


    5 No recuerdo haber cometido ninguna iniquidad, excepto el error involuntario que hice respecto de José, al dar a mis hermanos mi compromiso de no contar a mi padre lo que había sucedido.


    6 Pero lloré en secreto durante muchos días a causa de José; porque tenía miedo de mis hermanos, ya que todos habían acordado que cualquiera que revelara el secreto debía ser muerto.


    7 Sin embargo, cuando quisieron matarlo, con lágrimas les supliqué que no cometieran este pecado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testimonios difieren en el nombre del patriarca en el encabezado; aquí se sigue el testigo griego proporcionado, que presenta a Zabulón hablando.
    reason: textual_variant
lexical_decisions:
- source_word: Ἀντίγραφον λόγων
  english_pob_choice: A copy of the words
  chosen_spanish: Copia de las palabras
  alternatives_spanish:
  - Transcripción de las palabras
  - Copia del discurso
  lexicon: LSJ
  rationale: Reproduce el valor documental del encabezado sin volverlo una paráfrasis; 'copia' preserva el carácter testamentario y escrito del griego.
- source_word: Ζαβουλών / Ζεβουλὼν
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulón
  - Sebulón
  lexicon: transliteration from Greek/Spanish biblical usage
  rationale: En español, 'Zabulón' es la forma bíblica estable y natural para el nombre del patriarca, manteniendo reconocimiento e inteligibilidad.
- source_word: ὧν διέθετο τοῖς υἱοῖς αὐτοῦ
  english_pob_choice: which he charged his sons
  chosen_spanish: las cuales les dejó a sus hijos
  alternatives_spanish:
  - que les encomendó a sus hijos
  - que dispuso para sus hijos
  lexicon: LSJ
  rationale: '''Les dejó'' comunica la acción testamentaria de transmitir instrucciones o palabras finales; evita un calco demasiado rígido de ''charged''.'
- source_word: πρὶν ἢ ἀποθανεῖν αὐτόν
  english_pob_choice: before he died
  chosen_spanish: antes de morir
  alternatives_spanish:
  - antes de fallecer
  - antes de su muerte
  lexicon: LSJ
  rationale: Mantiene la fórmula temporal directa y digna, sin añadir matices no presentes en el griego.
- source_word: ἐν τῷ ἑκατοστῷ τετάρτῳ καὶ δεκάτῳ ἔτει
  english_pob_choice: in the one hundred and fourteenth year
  chosen_spanish: en el año ciento catorce
  alternatives_spanish:
  - en el año 114
  - en su año ciento catorce
  lexicon: LSJ
  rationale: Conserva el número de forma plena, en estilo bíblico y solemne.
- source_word: μετὰ δύο ἔτη τοῦ θανάτου Ἰωσήφ
  english_pob_choice: two years after the death of Joseph
  chosen_spanish: dos años después de la muerte de José
  alternatives_spanish:
  - a los dos años de la muerte de José
  - dos años tras la muerte de José
  lexicon: LSJ
  rationale: Es una correspondencia directa y natural del valor temporal del griego.
- source_word: Εἶπεν αὐτοῖς· Ἀκούσατέ μου
  english_pob_choice: 'And he said to them: Listen to me'
  chosen_spanish: 'Y les dijo: Escúchenme'
  alternatives_spanish:
  - 'Y les dijo: Oiganme'
  - 'Y les dijo: Escuchen mi voz'
  lexicon: LSJ
  rationale: '''Escúchenme'' preserva el imperativo personal y el tono exhortativo del discurso.'
- source_word: ἀγαθὸν δόμα
  english_pob_choice: a good gift
  chosen_spanish: un buen don
  alternatives_spanish:
  - un buen regalo
  - una buena dádiva
  lexicon: LSJ
  rationale: '''Don'' conserva mejor el registro elevado y la explicación del nacimiento que ''regalo'', que suena más coloquial.'
- source_word: ἠλέησα / ἔλεος / οἰκτιρμός
  english_pob_choice: had compassion / compassion / mercy
  chosen_spanish: misericordia / compasión
  alternatives_spanish:
  - piedad
  - clemencia
  lexicon: LSJ
  rationale: Aunque el audito inglés favorece 'compassion', aquí la combinación 'compasión' y 'misericordia' cubre el campo semántico del griego sin perder el matiz ético y relacional.
- source_word: ἁμαρτία διανοίας
  english_pob_choice: sin of thought
  chosen_spanish: pecado en pensamiento
  alternatives_spanish:
  - pecado de pensamiento
  - pecado interior
  lexicon: LSJ
  rationale: '''En pensamiento'' mantiene el foco interior y evita una abstracción excesiva; reproduce la idea de pecado mental o de intención.'
- source_word: ἀγνοία
  english_pob_choice: ignorance / unwitting wrong
  chosen_spanish: error involuntario
  alternatives_spanish:
  - ignorancia
  - falta de conocimiento
  lexicon: LSJ
  rationale: En esta cláusula narrativa, 'error involuntario' explica con precisión la culpa no intencional, sin borrar el matiz de ignorancia atenuante.
- source_word: νομίμως / ἀνομία
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - ilegalidad
  - desobediencia
  lexicon: LSJ
  rationale: '''Iniquidad'' conserva el tono moral y bíblico del término sin hacer sonar el español demasiado jurídico o moderno.'
- source_word: γινώσκω
  english_pob_choice: I do not remember / I do not know
  chosen_spanish: No sé / No recuerdo
  alternatives_spanish:
  - Desconozco
  - No tengo memoria de
  lexicon: LSJ
  rationale: La combinación refleja bien la alternancia del original entre conocimiento y recuerdo, y suena natural en español.
theological_decisions:
- issue: Identidad del hablante en el encabezado
  english_pob_reading: The English audit trail notes a textual/name correction issue, but the supplied Greek here clearly names Zebulun as speaker.
  chosen_spanish_reading: Traduzco literalmente a Zabulón como hablante del encabezado, sin trasladar una corrección ajena al texto dado.
  alternative_spanish_readings:
  - Simeón
  - Dan
  rationale: El control doctrinal/textual exige seguir el griego provisto; no debo importar una corrección de otra tradición textual cuando este paquete fuente identifica a Zabulón.
  doctrine_reference: Preservar la lectura del testigo fuente; no armonizar indebidamente.
- issue: Pecado de pensamiento y culpa involuntaria
  english_pob_reading: The chapter distinguishes inward sin from an unwitting wrong concerning Joseph.
  chosen_spanish_reading: Conservo la distinción entre 'pecado en pensamiento' y 'error involuntario' al hablar de José.
  alternative_spanish_readings:
  - pecado mental
  - falta por ignorancia
  rationale: 'La tensión moral del pasaje es doble: una falta interior real y una culpa no intencional. La traducción no debe fundirlas en un solo concepto.'
  doctrine_reference: Preservar la tensión moral del original.
translation_notes:
  revision_awareness: El expediente inglés muestra una revisión previa que fue revertida por una detección de truncamiento y una corrección del nombre del hablante; esta versión española sigue el griego suministrado para este pasaje breve, conservando el encabezado completo y el contenido extante de los versículos 1–7 sin ampliar más allá del texto dado.
  spanish_consistency_notes:
  - Se mantiene 'Zabulón' para el nombre propio en todo el encabezado y el discurso.
  - Se conserva la distinción entre 'compasión' y 'misericordia' donde el español exige matiz, pero en el texto visible de estos versículos predomina el léxico de pecado, ignorancia y dolor, no el de exhortación a la misericordia.
  - No se introduce terminología eclesiástica ajena al griego; el registro es bíblico, sobrio y directo.
