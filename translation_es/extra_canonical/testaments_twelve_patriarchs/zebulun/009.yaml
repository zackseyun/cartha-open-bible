base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/009.yaml
  text: 1 Therefore pay attention to the waters[a], and understand that when they flow together to the same place, they carry down stones, wood, earth, and various other things. 2 But if they are divided into many streams, the ground swallows them up, and they become easy to despise. 3 So also you, if you are divided, will become like this. 4 Therefore do not be divided under two heads, for everything that the Lord made has one head, and two shoulders, two hands, two feet, and all the other members. 5 For I have learned from the writings of my fathers that you will be divided in Israel, and you will follow two kingdoms, and you will do every abomination. 6 And your enemies will take you captive, and you will be afflicted among the nations with many weaknesses and distresses. 7 And after these things, when you remember the Lord, you will return, and he will have mercy on you, because he is merciful and compassionate, and he does not reckon wickedness against the sons of men, because they
    are flesh and go astray in their evil deeds. 8 And after these things the Lord himself will rise for you[c][b], the light of righteousness.
  footnotes:
  - marker: a
    text: Some witnesses read, 'you will remember the Lord and repent, and he will turn you back,' instead of 'when you remember the Lord, you will return.'
    reason: textual_variant
  - marker: b
    text: 'Some witnesses expand the reason clause: ''because they are flesh and the spirits of error lead them astray in all their deeds.'''
    reason: textual_variant
  - marker: c
    text: Or 'will dawn for you'; the image is of the Lord appearing like rising light.
    reason: lexical_alternative
