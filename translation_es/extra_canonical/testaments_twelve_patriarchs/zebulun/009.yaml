translation:
  language: es
  text: '1 Por tanto, presten atención a las aguas, y entiendan que, cuando fluyen juntas hacia un mismo lugar, arrastran piedras, madera, tierra y otras cosas diversas. 2 Pero si se dividen en muchos cauces, la tierra las traga, y llegan a ser fáciles de despreciar. 3 Así también ustedes: si se dividen, llegarán a ser así. 4 Por tanto, no se dividan bajo dos cabezas, porque todo lo que hizo el Señor tiene una sola cabeza, y dos hombros, dos manos, dos pies y todos los demás miembros. 5 Pues yo he aprendido en los escritos de mis padres que ustedes serán divididos en Israel, y seguirán dos reinos, y cometerán toda abominación. 6 Y sus enemigos los llevarán cautivos, y serán afligidos entre las naciones con muchas debilidades y angustias. 7 Y después de estas cosas, cuando recuerden al Señor[a], ustedes volverán, y él tendrá misericordia de ustedes, porque él es misericordioso y compasivo, y no toma en cuenta la maldad de los hijos de los hombres, porque son carne y se desvían en sus malas
    obras[b]. 8 Y después de estas cosas el Señor mismo se levantará para ustedes[c], luz de justicia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos testigos leen: «recordarán al Señor y se arrepentirán, y él los hará volver», en lugar de «cuando recuerden al Señor, ustedes volverán».'
    reason: textual_variant
  - marker: b
    text: 'Algunos testigos amplían la cláusula causal: «porque son carne y los espíritus del error los desvían en todas sus obras».'
    reason: textual_variant
  - marker: c
    text: 'O: «amanecerá para ustedes»; la imagen es la del Señor apareciendo como luz que se levanta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσέχετε
  english_pob_choice: pay attention
  chosen_spanish: presten atención
  alternatives_spanish:
  - tengan cuidado
  - atiendan
  lexicon: BDAG
  rationale: Expresa la exhortación directa con naturalidad en español moderno y conserva el tono de advertencia.
- source_word: ἐπὶ τὰ ὕδατα
  english_pob_choice: to the waters
  chosen_spanish: a las aguas
  alternatives_spanish:
  - sobre las aguas
  - hacia las aguas
  lexicon: LSJ
  rationale: Mantiene la imagen concreta de observar el comportamiento de las aguas sin forzar una preposición extraña en español.
- source_word: πορεύονται ἐπὶ τὸ αὐτό
  english_pob_choice: flow together to the same place
  chosen_spanish: fluyen juntas hacia un mismo lugar
  alternatives_spanish:
  - van juntas a un mismo lugar
  - confluyen en un mismo punto
  lexicon: BDAG
  rationale: Recoge la idea de convergencia en un punto común, que es la base de la comparación sobre la unidad.
- source_word: κατασύρουσιν
  english_pob_choice: carry down
  chosen_spanish: arrastran
  alternatives_spanish:
  - se llevan
  - arrastran hacia abajo
  lexicon: LSJ
  rationale: Preserva la fuerza del movimiento descendente del agua sin exagerar más allá del griego.
- source_word: διαιρεθῶσιν
  english_pob_choice: are divided
  chosen_spanish: se dividen
  alternatives_spanish:
  - se separan
  - se parten
  lexicon: BDAG
  rationale: Mantiene el vocabulario temático central de división que estructura todo el pasaje.
- source_word: ἀφανίζει
  english_pob_choice: swallows them up
  chosen_spanish: las traga
  alternatives_spanish:
  - las destruye
  - las hace desaparecer
  lexicon: LSJ
  rationale: Conserva la imagen concreta de la tierra absorbiendo el agua dividida.
- source_word: εὐκαταφρόνητα
  english_pob_choice: easy to despise
  chosen_spanish: fáciles de despreciar
  alternatives_spanish:
  - despreciables
  - fáciles de desdeñar
  lexicon: LSJ
  rationale: Transmite la pérdida de peso e importancia que resulta de la división.
- source_word: χωρισθῆτε ἐν δυσὶ κεφαλαῖς
  english_pob_choice: be split under two heads
  chosen_spanish: se dividan bajo dos cabezas
  alternatives_spanish:
  - se separen bajo dos cabezas
  - se dividan bajo dos líderes
  lexicon: LSJ
  rationale: Conserva la metáfora corporal y política de 'cabezas' en lugar de normalizarla de inmediato como 'líderes'.
- source_word: κεφαλή
  english_pob_choice: head
  chosen_spanish: cabeza
  alternatives_spanish:
  - líder
  lexicon: BDAG
  rationale: La imagen del cuerpo en el contexto exige el sentido literal-metafórico de 'cabeza'.
- source_word: γραφῇ τῶν πατέρων μου
  english_pob_choice: the writings of my fathers
  chosen_spanish: los escritos de mis padres
  alternatives_spanish:
  - las escrituras de mis padres
  - el registro de mis padres
  lexicon: BDAG
  rationale: Sigue la formulación transparente del testimonio ancestral sin sobreafirmar el estatus canónico.
- source_word: ἐξακολουθήσετε
  english_pob_choice: you will follow
  chosen_spanish: seguirán
  alternatives_spanish:
  - irán tras
  - se alinearán con
  lexicon: BDAG
  rationale: Comunica la idea de adherirse o continuar tras dos reinos de manera clara y natural.
- source_word: βδέλυγμα
  english_pob_choice: abomination
  chosen_spanish: abominación
  alternatives_spanish:
  - cosa detestable
  lexicon: BDAG
  rationale: Conserva la fuerza moral y cultual del término, que es intencionalmente fuerte.
- source_word: κακωθήσεσθε
  english_pob_choice: you will be afflicted
  chosen_spanish: serán afligidos
  alternatives_spanish:
  - sufrirán maltrato
  - serán oprimidos
  lexicon: BDAG
  rationale: Mantiene el alcance amplio del sufrimiento bajo las naciones.
- source_word: ἀσθενείαις
  english_pob_choice: weaknesses
  chosen_spanish: debilidades
  alternatives_spanish:
  - enfermedades
  - infirmidades
  lexicon: BDAG
  rationale: Preserva la amplitud del término, que puede abarcar fragilidad corporal y comunitaria.
- source_word: θλίψεσιν
  english_pob_choice: distresses
  chosen_spanish: angustias
  alternatives_spanish:
  - tribulaciones
  - aflicciones
  lexicon: BDAG
  rationale: Evita un tecnicismo excesivamente eclesiástico y mantiene el peso del sufrimiento.
- source_word: μνησθέντες Κύριον
  english_pob_choice: when you remember the Lord
  chosen_spanish: cuando recuerden al Señor
  alternatives_spanish:
  - después de recordar al Señor
  - habiendo recordado al Señor
  lexicon: BDAG
  rationale: Refleja con naturalidad el valor participial y el giro relacional hacia Dios.
- source_word: ἐπιστρέψετε
  english_pob_choice: you will return
  chosen_spanish: volverán
  alternatives_spanish:
  - se volverán
  - se arrepentirán
  lexicon: BDAG
  rationale: En este contexto el verbo expresa regreso/restauración; 'volverán' conserva esa lectura sin imponer una glosa más estrecha.
- source_word: ἐλεήσει
  english_pob_choice: he will have mercy on
  chosen_spanish: tendrá misericordia de
  alternatives_spanish:
  - mostrará misericordia a
  - se compadecerá de
  lexicon: BDAG
  rationale: Es la fórmula natural en español para el lenguaje de la misericordia divina.
- source_word: εὔσπλαγχνος
  english_pob_choice: compassionate
  chosen_spanish: compasivo
  alternatives_spanish:
  - tierno de corazón
  - lleno de compasión
  lexicon: BDAG
  rationale: Conserva el paralelismo con 'misericordioso' y expresa la cualidad afectiva del término.
- source_word: οὐ λογίζεται κακίαν
  english_pob_choice: he does not reckon wickedness
  chosen_spanish: no toma en cuenta la maldad
  alternatives_spanish:
  - no cuenta la maldad
  - no imputa maldad
  lexicon: BDAG
  rationale: Mantiene la metáfora contable de λογίζομαι en un español claro y sobrio.
- source_word: υἱοῖς τῶν ἀνθρώπων
  english_pob_choice: the sons of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los seres humanos
  - los hijos de la humanidad
  lexicon: BDAG
  rationale: Preserva el registro elevado y tradicional del giro antropológico sin modernizarlo en exceso.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - fragilidad humana
  - condición humana
  lexicon: BDAG
  rationale: Mantiene la densidad teológica del término y la razón de la misericordia divina tal como la presenta el texto.
- source_word: πλανῶνται
  english_pob_choice: go astray
  chosen_spanish: se desvían
  alternatives_spanish:
  - andan extraviados
  - se extravían
  lexicon: BDAG
  rationale: Expresa bien la idea moral de desviación, con buen flujo en español dentro de la cláusula final.
- source_word: ἀνατελεῖ
  english_pob_choice: will rise
  chosen_spanish: saldrá
  alternatives_spanish:
  - amanecerá
  - brotará
  lexicon: LSJ
  rationale: '''Saldrá'' comunica en español la imagen de aparición luminosa sin forzar una metáfora astronómica literal en exceso.'
- source_word: φῶς δικαιοσύνης
  english_pob_choice: the light of righteousness
  chosen_spanish: luz de justicia
  alternatives_spanish:
  - luz de rectitud
  - luz de justicia y rectitud
  lexicon: BDAG
  rationale: '''Justicia'' es el equivalente preferido para δικαιοσύνη en el proyecto; la construcción nominal conserva la imagen profética.'
theological_decisions:
- issue: 'Verso 7: secuencia de recordar, volver y misericordia'
  english_pob_reading: When you remember the Lord, you will return, and he will have mercy on you.
  chosen_spanish_reading: Cuando recuerden al Señor, volverán, y él tendrá misericordia de ustedes.
  alternative_spanish_readings:
  - Cuando recuerden al Señor y se arrepientan, él los hará volver y tendrá misericordia de ustedes.
  rationale: La traducción principal sigue el testimonio base suministrado, preservando el vínculo entre recuerdo del Señor y restauración. La alternativa se documenta porque algunos testigos despliegan la secuencia con 'arrepentirse' y el acto divino de hacer volver.
  doctrine_reference: Preservar la tensión textual sin armonizar en silencio.
- issue: 'Verso 7: causa de la extravío humano'
  english_pob_reading: because they are flesh and go astray in their evil deeds.
  chosen_spanish_reading: porque son carne y se desvían en sus malas obras.
  alternative_spanish_readings:
  - porque son carne y los espíritus del error los desvían en todas sus obras.
  rationale: El texto griego base es más simple y no menciona 'espíritus del error' en la línea principal. La traducción principal respeta esa lectura, mientras la alternativa registra la expansión textual atestiguada.
  doctrine_reference: Traducir honestamente el testimonio base y anotar expansiones secundarias.
- issue: 'Verso 8: el Señor como luz de justicia'
  english_pob_reading: the Lord himself will rise for you, the light of righteousness.
  chosen_spanish_reading: el Señor mismo saldrá para ustedes, luz de justicia.
  alternative_spanish_readings:
  - el Señor mismo amanecerá para ustedes, luz de justicia.
  rationale: Se conserva la imagen de aparición salvadora sin decidirla en la traducción principal como título mesiánico o mera metáfora de restauración. 'Saldrá' deja abierta la resonancia de resplandecer/aparecer.
  doctrine_reference: Preservar la ambigüedad teológica donde el griego la permite.
translation_notes:
  revision_awareness: Seguí la revisión más reciente del audit trail inglés al ajustar el movimiento de las aguas como flujo conjunto hacia un mismo lugar y al mantener en el v. 4 la formulación uniforme de 'dividan' / 'se dividan'. También respeté la decisión revisada de no ampliar el v. 7 con la variante de 'espíritus del error' en el texto principal, reservándola para nota textual.
  spanish_consistency_notes:
  - Usé 'Yahvé' solo cuando el texto fuente lo exige explícitamente; aquí el griego dice 'el Señor', por lo que conservé 'el Señor' en la traducción.
  - Mantuve 'carne' para σάρξ y 'justicia' para δικαιοσύνη conforme a los defaults del proyecto.
  - No sustituí 'cabezas' por 'líderes' para conservar la metáfora corporal-política del pasaje.
  - La puntuación y el tratamiento de mayúsculas siguen el español moderno y el registro de lectura pública.
