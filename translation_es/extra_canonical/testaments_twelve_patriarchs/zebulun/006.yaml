    reason: lexical_alternative
lexical_decisions:
- source_word: Πρῶτος οὖν
  english_pob_choice: First, then
  chosen_spanish: Primero, entonces
  alternatives_spanish:
  - Primero
  - Así que primero
  lexicon: LSJ
  rationale: Conserva el orden lógico y el valor inferencial de οὖν sin volverlo demasiado explicativo.
- source_word: σκάφος
  english_pob_choice: boat
  chosen_spanish: barca
  alternatives_spanish:
  - barco
  - embarcación
  lexicon: LSJ
  rationale: ‘Barca’ es natural en español para una nave pequeña o mediana y evita sobredeterminar el tamaño con ‘barco’.
- source_word: ἐπιπλέειν
  english_pob_choice: to sail
  chosen_spanish: navegar
  alternatives_spanish:
  - ir por el mar
  - flotar
  lexicon: LSJ
  rationale: ‘Navegar’ transmite el movimiento intencional sobre el agua sin forzar una precisión técnica que el griego no exige.
- source_word: σύνεσιν
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - comprensión
  - perspicacia
  lexicon: BDAG
  rationale: Preserva el componente cognitivo y encaja bien con la pareja semántica con σοφία.
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - habilidad
  - sabiduría práctica
  lexicon: BDAG
  rationale: Mantiene el peso amplio del término y deja abierta la posible dimensión artesanal señalada por el audit trail inglés.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: BDAG
  rationale: Se conserva el equivalente reverente usual en español para la referencia divina, mientras el registro del proyecto permite explicar la identificación con el nombre divino en nota contextual si fuera necesario.
- source_word: ἐν αὐτῷ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en él
  - en esto
  lexicon: LSJ
  rationale: Se refiere a la barca; en español concuerda naturalmente con ‘barca’ y evita expandir el sentido a ‘en este asunto’.
- source_word: καθῆκα
  english_pob_choice: I fastened
  chosen_spanish: sujeté
  alternatives_spanish:
  - fijé
  - aseguré
  - atranqué
  lexicon: LSJ
  rationale: ‘Sujeté’ comunica una acción de fijación constructiva sin imponer un mecanismo más específico del que ofrece el fragmento.
- source_word: ξύλον
  english_pob_choice: a piece of wood
  chosen_spanish: un trozo de madera
  alternatives_spanish:
  - una pieza de madera
  - un madero
  - una viga
  lexicon: LSJ
  rationale: Es cercano al griego y suficientemente neutro para una parte náutica no identificada con certeza.
theological_decisions:
- issue: Capacidad técnica como don divino
  english_pob_reading: The Lord explicitly gave understanding and wisdom for the task, preserving both practical and theological force.
  chosen_spanish_reading: El Señor me dio entendimiento y sabiduría para la tarea, sin reducir la sabiduría solo a habilidad manual.
  alternative_spanish_readings:
  - habilidad
  - sabiduría práctica
  rationale: La pareja griega σύνεσις/σοφία permite una lectura de destreza artesanal, pero el texto también presenta esa capacidad como don del Señor; la redacción española mantiene ambas dimensiones.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve theological tension rather than resolve it'
- issue: Referencia divina de Κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Como el fragmento griego usa κύριος, la forma española tradicional y transparente ‘el Señor’ es la más directa; el proyecto distingue esta forma del nombre divino hebreo cuando el contexto lo exija explícitamente.
  doctrine_reference: Project terminology defaults for κύριος / YHWH
translation_notes:
  revision_awareness: El audit trail inglés revisó ‘in this matter’ a ‘in it’ para ajustarse más de cerca a ἐν αὐτῷ; por eso la traducción española también usa ‘en ella’, manteniendo la referencia interna a la barca y evitando una expansión interpretativa. Se preserva además el carácter fragmentario del texto, que se interrumpe en medio de la frase.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre ‘entendimiento’ y ‘sabiduría’ para reflejar σύνεσις y σοφία sin fusionarlas.
  - ‘Barca’ y ‘barca’/‘ella’ mantienen la referencia anafórica clara en español.
  - No se sustituyó ‘el Señor’ por ‘Yahvé’ porque el griego aquí dice κύριος; la decisión sigue la pista auditada en inglés.
  - La frase final queda abierta con ‘y’ para reproducir la interrupción del manuscrito griego.
