translation:
  language: es
  text: Primero[a], hice una barca para navegar en el mar, porque el Señor me dio entendimiento y sabiduría para ello[b]. Y sujeté un trozo de madera detrás de ella, y
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego conservado aquí es fragmentario y se corta a mitad de oración después de «y sujeté un trozo de madera detrás de ella, y».
    reason: textual_variant
  - marker: b
