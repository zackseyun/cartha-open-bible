  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el fragmento griego y el audit trail inglés en la mayor parte: σκάφος→«barca», ἐπιπλέειν→«navegar», σύνεσιν/σοφίαν→«entendimiento y sabiduría», καθῆκα ξύλον→«sujeté un trozo de madera». También preserva correctamente el carácter fragmentario con una nota. Sin embargo, falta la nota léxica equivalente a la inglesa sobre σοφία, y «en ella» para ἐν αὐτῷ suena forzado y potencialmente ambiguo en español; conviene una solución más natural que siga siendo cercana al original.'
  spanish_quality_summary: El español es claro, pero «Primero, entonces» resulta algo calcado; «Entonces, primero» tampoco mejora, así que es preferible simplificar a «Primero» o «Así, primero». Además, «en ella» después de «me dio entendimiento y sabiduría» suena poco idiomático en español y puede sugerir que la sabiduría está físicamente en la barca. «Para ello» comunica mejor la relación instrumental sin expandir demasiado. Añadir la nota léxica ayuda a conservar la justificación documentada.
  glossary_alignment: La elección «el Señor» para κύριος es aceptable aquí, ya que la fuente inmediata es griega y no hay cita explícita del nombre divino hebreo que exija «Yahvé». No hay conflictos con otras preferencias terminológicas del proyecto.
  issues:
  - severity: medium
    issue: Falta la nota léxica sobre σοφία
    rationale: 'El audit trail inglés conserva una nota significativa: «wisdom» puede implicar también habilidad práctica para la construcción. Esa tensión léxica y teológica debe preservarse también en español.'
  - severity: medium
    issue: «en ella» para ἐν αὐτῷ es poco natural y ambiguo
    rationale: Aunque formalmente puede concordar con «barca», en español la frase «me dio entendimiento y sabiduría en ella» suena extraña y puede malinterpretarse. «Para ello» mantiene la referencia al proyecto de construcción/navegación con mejor legibilidad.
  - severity: low
    issue: «Primero, entonces» suena calcado
    rationale: Reproduce mecánicamente Πρῶτος οὖν, pero en español resulta tieso. «Primero» por sí solo conserva bien el arranque secuencial sin pérdida sustancial en un fragmento ya abrupto.
