base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/010.yaml
  text: 'And you will return to your land[a], and you will see him in Jerusalem because of his holy name; and healing and compassion will be in his wings. He himself will redeem every captivity of the sons of men from Beliar, and every spirit of deceit will be trampled down. And he will turn all the nations to zeal for him, and you will see God in the form of a man, whom the Lord will choose—Jerusalem is his name.


    9. And again, by the craftiness of your deeds you will provoke him to anger, and you will be cast away from him until the time of completion.


    10. And now, my children, do not be grieved because I am dying, nor fall down because I am coming to my end. For I will rise again in your midst, as a leader in the midst of the sons of righteousness; and I will rejoice in the midst of my tribe, all who keep the law of the Lord. But upon the ungodly the Lord will bring eternal fire, and he will destroy them for generations of generations. But as for me, I now hasten to my rest, as also my fathers did. But you, fear the Lord all the days of your life with all your strength.


    And when he had said these things, he fell asleep, and his sons placed him in a wooden coffin[f][e][d][c][b]. Later they carried him up and buried him in Hebron with his fathers.'
  footnotes:
  - marker: a
    text: The phrase 'healing and compassion will be in his wings' likely echoes biblical healing-under-wings imagery; the translation preserves the metaphor rather than explaining it away.
    reason: cross_reference
  - marker: b
    text: '''Beliar'' follows the Greek form Βελίαρ in this witness; some readers may know the name as ''Belial.'''
    reason: lexical_alternative
  - marker: c
    text: '''He will turn all the nations to zeal for him'' reflects a difficult phrase with παραζήλωσις, which can also suggest jealousy or emulation.'
    reason: lexical_alternative
  - marker: d
    text: The wording 'you will see God in the form of a man' is translated as it stands in the Greek witness. Because this work has a complex transmission history, some interpreters regard such lines as secondary expansion, but the translation does not suppress them.
    reason: textual_variant
  - marker: e
    text: A textual expansion in some witnesses adds 'and the commandments of Zebulun their father' after 'the law of the Lord.' The main text follows the shorter reading.
    reason: textual_variant
  - marker: f
    text: The bracketed expansion in verse 5 about fearing 'the Lord our God ... all the days of your life' is textually uneven; the main translation keeps the secure imperative and incorporates the time phrase where it is well supported.
    reason: textual_variant
