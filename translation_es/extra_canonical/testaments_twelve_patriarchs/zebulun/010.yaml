revisions:
- from: 'Y volverán a su tierra, y lo verán en Jerusalén por causa de su santo nombre; y habrá sanidad[a] y compasión en sus alas. Él mismo redimirá toda cautividad de los hijos de los hombres de Beliar, y todo espíritu de engaño será pisoteado. Y volverá a todos los pueblos hacia su celo, y verán a Dios en forma de hombre[b], a quien el Señor escogerá; Jerusalén es su nombre.


    9. Y de nuevo, por la astucia de sus obras lo provocaréis a ira, y seréis arrojados lejos de él hasta el tiempo del cumplimiento.


    10. Y ahora, hijos míos, no os entristezcáis porque estoy muriendo, ni os derrumbéis porque llego a mi fin. Porque volveré a levantarme[c] en medio de vosotros, como un líder en medio de los hijos de justicia; y me alegraré en medio de mi tribu, todos los que guardan la ley del Señor. Pero sobre los impíos el Señor traerá fuego eterno, y los destruirá por generaciones de generaciones. Pero yo ahora me apresuro hacia mi descanso, como también hicieron mis padres. Y ustedes, teman al Señor todos los días de su vida con toda su fuerza.


