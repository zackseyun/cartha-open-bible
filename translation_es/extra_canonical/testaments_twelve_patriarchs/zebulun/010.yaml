  text: 'καὶ ἐπιστρέψετε⁵² *εἰς τὴν γῆν⁵³ ὑμῶν⁵⁴, καὶ ὄψεσθε αὐτὸν⁵⁵ ἐν Ἱερουσαλὴμ ⌈διὰ τὸ ὄνομα αὐτοῦ *τὸ ἅγιον⁵⁶⌉. (bdg-text expansion: καὶ ἴασις *καὶ εὐσπλαγχνία⁵⁷ ἐν⁵⁸ ταῖς πτέρυξιν αὐτοῦ. Αὐτὸς λυτρώσεται πᾶσαν αἰχμαλωσίαν υἱῶν ἀνθρώπων ἐκ τοῦ Βελίαρ καὶ πᾶν πνεῦμα πλάνης πατηθήσεται⁵⁹.) (bdg-text expansion: καὶ ἐπιστρέψει *πάντα τὰ⁶⁰ ἔθνη εἰς παραζήλωσιν αὐτοῦ⁶¹, καὶ ὄψεσθε *θεὸν ἐν σχήματι ἀνθρώπου⁶² *ὃν ἂν ἐκλέξηται Κύριος Ἱερουσαλὴμ ὄνομα αὐτῷ⁶³.) 9. Καὶ⁶⁴ πάλιν ⌈ἐν *τῇ πανουργίᾳ⁶⁵ *τῶν ἔργων⁶⁶ ὑμῶν⁶⁷⌉ παροργίσετε⁶⁸ αὐτόν, καὶ ἀπορριφήσεσθε⁶⁹ ⌈ἀπ᾽ αὐτοῦ⌉⁷⁰ ἕως καιροῦ συντελείας. X. Καὶ νῦν τέκνα μου, μὴ λυπεῖσθε *ὅτι ἀποθνῄσκω¹, μηδὲ συμπέσητε² ὅτι ἀπολήγω³. 2. Ἀναστήσομαι γὰρ⁴ πάλιν *ἐν μέσῳ⁵ ὑμῶν, ⌈ὡς ἡγούμενος *ἐν μέσῳ⁶ υἱῶν δικαιοσύνης⌉, καὶ⁷ εὐφρανθήσομαι⁸ *ἐν μέσῳ⁹ τῆς φυλῆς μου, *οἵτινες φυλάξουσιν¹⁰ νόμον Κυρίου [καὶ ἐντολὰς¹¹ Ζαβουλὼν πατρὸς αὐτῶν]. 3. Ἐπὶ δὲ τοὺς ἀσεβεῖς ἐπάξει¹² Κύριος πῦρ αἰώνιον, καὶ ἀπολεῖ¹³ αὐτοὺς *ἕως γενεὰς γενεῶν¹⁴. 4. *Ἐγὼ δὲ νῦν¹⁵ εἰς τὴν ἀνάπαυσίν
    μου¹⁶ ἀποτρέχω¹⁷, *ὡς καὶ¹⁸ οἱ πατέρες μου. 5. Ὑμεῖς δὲ φοβεῖσθε Κύριον¹⁹ [τὸν θεὸν ἡμῶν²⁰ ἐν πάσῃ ἰσχύι ὑμῶν²¹ πάσας τὰς²² ἡμέρας τῆς ζωῆς ὑμῶν]²³. 6. Καὶ ταῦτα εἰπὼν ἐκοιμήθη [†ὕπνῳ²⁴ καλῷ], καὶ ἔθηκαν αὐτὸν *οἱ υἱοὶ αὐτοῦ²⁵ *εἰς θήκην ξυλίνην²⁶. 7. Ὕστερον δὲ *ἀναγαγόντες ἔθαψαν αὐτὸν ἐν Χεβρών²⁷ μετὰ τῶν πατέρων αὐτοῦ²⁸.'
