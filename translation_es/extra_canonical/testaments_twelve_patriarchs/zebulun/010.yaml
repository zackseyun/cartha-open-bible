translation:
  language: es
  text: 'Y volverán ustedes a su tierra[a], y lo verán en Jerusalén por causa de su santo nombre; y habrá sanidad en sus alas. Él mismo redimirá toda cautividad de los hijos de los hombres de Beliar[b], y todo espíritu de engaño será pisoteado. Y hará volver a todas las naciones al celo por él[c], y verán a Dios en forma de hombre[d], a quien el Señor escogerá; Jerusalén es su nombre.


    9. Y de nuevo, por la astucia de sus obras lo provocarán a ira, y serán arrojados lejos de él hasta el tiempo del cumplimiento.


    10. Y ahora, hijos míos, no se entristezcan porque estoy muriendo, ni se derrumben porque llego a mi fin. Porque me levantaré de nuevo[c] en medio de ustedes, como un líder en medio de los hijos de justicia; y me alegraré en medio de mi tribu, todos los que guardan la ley del Señor[e]. Pero sobre los impíos el Señor traerá fuego eterno, y los destruirá por generaciones de generaciones. Pero yo ahora me apresuro hacia mi descanso, como también hicieron mis padres. Y ustedes, teman al Señor todos los días de su vida con toda su fuerza[f].


    Y cuando dijo estas cosas, se durmió, y sus hijos lo pusieron en un ataúd de madera. Más tarde lo llevaron y lo enterraron en Hebrón con sus padres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase sobre la sanidad en sus alas probablemente evoca la imaginería bíblica de curación bajo las alas; se conserva la metáfora en lugar de explicarla.
    reason: cross_reference
  - marker: b
    text: '''Beliar'' sigue la forma griega Βελίαρ en este testimonio; algunos lectores conocerán el nombre como ''Belial''.'
    reason: lexical_alternative
  - marker: c
    text: La expresión 'hará volver a todas las naciones al celo por él' refleja una frase difícil con παραζήλωσις, que también puede sugerir celos o emulación. Asimismo, 'me levantaré de nuevo' conserva la fuerza futura de ἀναστήσομαι en un marco funerario y testamentario.
    reason: lexical_alternative
  - marker: d
    text: La expresión 'a Dios en forma de hombre' traduce de manera directa la lectura griega. Debido a la compleja historia de transmisión de esta obra, algunos intérpretes consideran tales líneas como expansión secundaria, pero la traducción no las suprime.
    reason: textual_variant
  - marker: e
    text: Una expansión textual en algunos testigos añade 'y los mandamientos de Zebulón su padre' después de 'la ley del Señor'. El texto principal sigue la lectura más breve.
    reason: textual_variant
  - marker: f
    text: La expansión entre corchetes en el versículo 5 sobre temer 'al Señor nuestro Dios ... todos los días de su vida' es textualmente desigual; el texto principal conserva el imperativo seguro e incorpora la frase temporal donde está mejor atestiguada.
    reason: textual_variant
lexical_decisions:
- source_word: ἐπιστρέψετε εἰς τὴν γῆν ὑμῶν
  english_pob_choice: you will return to your land
  chosen_spanish: volverán a su tierra
  alternatives_spanish:
  - regresarán a su tierra
  - volverán a la tierra de ustedes
  lexicon: BDAG / LSJ
  rationale: El futuro con complemento de destino expresa retorno físico al país/tierra; 'volverán a su tierra' es natural en español y conserva el sentido espacial del griego.
- source_word: ἴασις
  english_pob_choice: healing
  chosen_spanish: sanidad
  alternatives_spanish:
  - curación
  - sanación
  lexicon: LSJ
  rationale: '''Sanidad'' comunica mejor el matiz bíblico y mantiene la imagen de restauración corporal/benefactora sin reducirlo a un término clínico.'
- source_word: εὐσπλαγχνία
  english_pob_choice: compassion
  chosen_spanish: compasión
  alternatives_spanish:
  - misericordia
  - ternura
  lexicon: BDAG
  rationale: '''Compasión'' reproduce de manera clara el afecto benévolo del término y es idiomático en registro bíblico actual.'
- source_word: πτέρυξιν
  english_pob_choice: wings
  chosen_spanish: alas
  alternatives_spanish:
  - plumas
  - pínulas
  lexicon: LSJ
  rationale: Se mantiene la metáfora corporal/scriptural de 'alas' sin explicar la imagen, como en el audit trail inglés.
- source_word: λυτρώσεται
  english_pob_choice: will redeem
  chosen_spanish: redimirá
  alternatives_spanish:
  - libertará
  - rescatará
  lexicon: BDAG
  rationale: '''Redimirá'' conserva el peso teológico y liberador de λύτρον/λυτρόω, más fuerte que un mero ''liberar''.'
- source_word: αἰχμαλωσίαν
  english_pob_choice: captivity
  chosen_spanish: cautividad
  alternatives_spanish:
  - esclavitud
  - cautiverio
  lexicon: LSJ
  rationale: '''Cautividad'' preserva el sentido de estar cautivo y funciona bien junto a ''redimirá''.'
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: LSJ
  rationale: Se conserva la forma griega transliterada del testimonio, como en el inglés POB, en vez de armonizarla con la variante más conocida.
- source_word: πνεῦμα πλάνης
  english_pob_choice: spirit of deceit
  chosen_spanish: espíritu de engaño
  alternatives_spanish:
  - espíritu de error
  - espíritu de extravío
  lexicon: BDAG
  rationale: '''Engaño'' en español expresa bien el carácter desviado y engañoso del sintagma, y es más natural que ''error'' en este contexto de advertencia moral.'
- source_word: πατηθήσεται
  english_pob_choice: will be trampled down
  chosen_spanish: será pisoteado
  alternatives_spanish:
  - será aplastado
  - será hollarado
  lexicon: LSJ
  rationale: '''Pisoteado'' conserva la imaginería fuerte y pasiva del verbo, con español claro y bíblico.'
- source_word: παραζήλωσιν
  english_pob_choice: zeal for him
  chosen_spanish: su celo
  alternatives_spanish:
  - celos por él
  - emulación hacia él
  lexicon: BDAG
  rationale: La expresión griega es difícil; 'su celo' mantiene la ambigüedad entre celo/ardor y evita una paráfrasis excesiva, en línea con la cautela del inglés.
- source_word: θεὸν ἐν σχήματι ἀνθρώπου
  english_pob_choice: God in the form of a man
  chosen_spanish: a Dios en forma de hombre
  alternatives_spanish:
  - a Dios en forma humana
  - a un ser divino en forma de hombre
  lexicon: LSJ
  rationale: Se traduce de modo transparente la expresión fuerte del testimonio griego sin suavizarla doctrinalmente; 'forma de hombre' conserva σχήμα.
- source_word: πανουργίᾳ
  english_pob_choice: craftiness
  chosen_spanish: astucia
  alternatives_spanish:
  - cunning
  - malicia
  lexicon: BDAG
  rationale: '''Astucia'' mantiene el tono negativo sin sonar excesivamente coloquial; es la opción más natural en español.'
- source_word: παροργίσετε
  english_pob_choice: you will provoke him to anger
  chosen_spanish: lo provocaréis a ira
  alternatives_spanish:
  - lo irritaréis
  - lo enojaréis
  lexicon: BDAG
  rationale: La construcción bíblica 'provocar a ira' reproduce bien el verbo compuesto y el registro solemne del texto.
- source_word: ἀπορριφήσεσθε
  english_pob_choice: you will be cast away
  chosen_spanish: seréis arrojados lejos
  alternatives_spanish:
  - seréis echados
  - seréis apartados
  lexicon: LSJ
  rationale: '''Arrojados lejos'' refleja la pasiva de rechazo/exclusión con más fuerza que un simple ''echados'', y preserva la idea relacional de alejamiento de Dios.'
- source_word: καιροῦ συντελείας
  english_pob_choice: time of completion
  chosen_spanish: tiempo del cumplimiento
  alternatives_spanish:
  - tiempo de la consumación
  - tiempo del fin
  lexicon: BDAG
  rationale: '''Cumplimiento'' comunica la culminación prevista sin cargar el texto con terminología técnica que el griego no obliga a usar.'
- source_word: συμπέσητε
  english_pob_choice: fall down
  chosen_spanish: os derrumbéis
  alternatives_spanish:
  - caigáis
  - os abatáis
  lexicon: LSJ
  rationale: En contexto de duelo, 'derrumbéis' expresa bien la caída emocional sin añadir explícitamente 'en tristeza', siguiendo la revisión inglesa que evitó expandir el verbo.
- source_word: ἀπολήγω
  english_pob_choice: I am coming to my end
  chosen_spanish: llego a mi fin
  alternatives_spanish:
  - estoy llegando a mi término
  - estoy por acabar
  lexicon: LSJ
  rationale: '''Llego a mi fin'' reproduce la solemnidad y la inmediatez del giro idiomático en español claro.'
- source_word: ἀναστήσομαι
  english_pob_choice: I will rise again
  chosen_spanish: volveré a levantarme
  alternatives_spanish:
  - resucitaré
  - me levantaré de nuevo
  lexicon: BDAG
  rationale: Se conserva el valor de resurrección/exaltación futura en un lenguaje accesible, manteniendo el eco del futuro verbal sin imponer una formulación más doctrinal que el giro inmediato.
- source_word: ἡγούμενος
  english_pob_choice: a leader
  chosen_spanish: un líder
  alternatives_spanish:
  - un jefe
  - un gobernante
  lexicon: BDAG
  rationale: '''Líder'' sigue la revisión inglesa y evita sobredeterminar el rango político del término, que aquí es de conducción dentro del grupo justo.'
- source_word: υἱῶν δικαιοσύνης
  english_pob_choice: sons of righteousness
  chosen_spanish: los hijos de justicia
  alternatives_spanish:
  - los hijos de rectitud
  - los hijos de la justicia
  lexicon: BDAG
  rationale: Se mantiene la estructura filial del hebraísmo; 'justicia' preserva el sustantivo abstracto y funciona bien en español. Podría decirse 'rectitud', pero 'justicia' es más transparente y alineada con el lenguaje bíblico.
- source_word: ἀσεβεῖς
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los irreverentes
  - los malvados
  lexicon: BDAG
  rationale: '''Impíos'' es el equivalente bíblico natural en español y conserva la oposición a la piedad/reverencia hacia Dios.'
- source_word: πῦρ αἰώνιον
  english_pob_choice: eternal fire
  chosen_spanish: fuego eterno
  alternatives_spanish:
  - fuego perpetuo
  - fuego perdurable
  lexicon: BDAG
  rationale: La fórmula 'fuego eterno' es directa, solemne y plenamente comprensible en español litúrgico y bíblico.
- source_word: ἕως γενεὰς γενεῶν
  english_pob_choice: for generations of generations
  chosen_spanish: por generaciones de generaciones
  alternatives_spanish:
  - por todas las generaciones
  - de generación en generación
  lexicon: LSJ
  rationale: Se preserva la repetición semítica intensiva del griego, como en el inglés auditado, en vez de reducirla a un idioma más común.
- source_word: ἀνάπαυσίν μου
  english_pob_choice: my rest
  chosen_spanish: mi descanso
  alternatives_spanish:
  - mi reposo
  - mi quietud
  lexicon: BDAG
  rationale: '''Descanso'' es más natural en español que ''reposo'' y mantiene el tono funerario/sereno del pasaje.'
- source_word: ἀποτρέχω
  english_pob_choice: I hasten
  chosen_spanish: me apresuro
  alternatives_spanish:
  - me doy prisa
  - corro
  lexicon: LSJ
  rationale: '''Me apresuro'' conserva el movimiento intencional sin sonar literal o brusco.'
- source_word: φοβεῖσθε
  english_pob_choice: fear
  chosen_spanish: teman
  alternatives_spanish:
  - reverencien
  - veneren
  lexicon: BDAG
  rationale: El imperativo tradicional 'teman al Señor' es fiel y adecuado al registro exhortativo del texto.
- source_word: θήκην ξυλίνην
  english_pob_choice: a wooden coffin
  chosen_spanish: un ataúd de madera
  alternatives_spanish:
  - una caja de madera
  - un féretro de madera
  lexicon: LSJ
  rationale: '''Ataúd de madera'' es claro y natural en español; mantiene el sentido funerario de la expresión sin sobreinterpretarla.'
theological_decisions:
- issue: 'Visión cristológica/escatológica: ''Dios en forma de hombre'''
  english_pob_reading: Translate the exalted language directly, including 'God in the form of a man,' without doctrinal harmonization.
  chosen_spanish_reading: Traducir de forma transparente 'a Dios en forma de hombre', sin suavizar la fuerza de la frase.
  alternative_spanish_readings:
  - '''a un ser divino en forma de hombre'''
  - '''a un hombre divino'''
  rationale: El testimonio griego presenta una formulación fuerte y potencialmente tensionante. La POB debe preservarla y dejar la evaluación doctrinal al lector, no atenuarla en la traducción.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Lenguaje de resurrección en ἀναστήσομαι
  english_pob_reading: Render ἀναστήσομαι as 'I will rise again.'
  chosen_spanish_reading: Verterlo como 'volveré a levantarme'.
  alternative_spanish_readings:
  - '''resucitaré'''
  - '''me levantaré de nuevo'''
  rationale: En este contexto testamentario y funerario, el futuro apunta más allá de una simple incorporación corporal. 'Volveré a levantarme' conserva la expectativa de levantamiento futuro sin forzar una terminología más técnica de la necesaria.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Expresión genealógica/ética 'hijos de justicia'
  english_pob_reading: Keep the idiom as 'sons of righteousness.'
  chosen_spanish_reading: Conservar la estructura como 'hijos de justicia'.
  alternative_spanish_readings:
  - '''hijos de rectitud'''
  - '''los justos'''
  rationale: La forma filial y grupal es parte del estilo testamentario. Mantenerla ayuda a preservar el registro y la textura semítica del texto.
  doctrine_reference: PHILOSOPHY.md style/register guidance
translation_notes:
  revision_awareness: 'La redacción española sigue la lectura revisada más reciente del inglés POB: se evitó expandir συμπέσητε con una glosa emocional adicional, y ἡγούμενος se entendió como ''leader''/''líder'' en lugar de un rango más fuerte. También se mantiene la decisión de conservar las imágenes fuertes del texto, como ''wings'', ''Beliar'' y la frase cristológica/visionaria sobre ver a Dios en forma de hombre.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' en la terminología proyectual solo donde el texto fuente lo exigiera explícitamente; en este pasaje el griego usa Κύριος y la tradición auditada del inglés traduce 'the Lord', por lo que aquí se dejó 'el Señor' para no introducir una identificación no documentada en esta unidad.
  - Se eligió un español bíblico contemporáneo y solemne, evitando arcaísmos innecesarios y preservando, cuando hace falta, formulaciones tradicionales como 'fuego eterno' y 'teman al Señor'.
  - Las imágenes corporales y escatológicas se conservaron sin explicación añadida para respetar la transparencia auditada del POB.
  - '''Hijos de justicia'' se mantiene como idiomatismo familiar-tribal, y ''Beliar'' conserva la forma griega del testimonio en lugar de armonizarla con ''Belial''.'
