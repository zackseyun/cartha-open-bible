  text: '1[3:7]. And when they had done this, they all sat down to eat and drink. But I, seeing that Joseph was grieving, did not eat with them, but I kept watch over the pit, praying for help for him.


    2. And in the meantime Reuben arose and said, “Come, my brothers, let us not kill him, but let us throw him into one of these dry pits which our fathers dug and found no water.”


    3. For this reason the Lord prevented water from springing up in them, so that Joseph might be preserved[3:8].


    4. And they did so until they sold him to the Ishmaelites.


    5. As for his price, my children, I had no share in it. But Simeon and Dan and Gad, and their sons, took his price and bought sandals for themselves and for their wives and their children,


    6. saying, “We will not eat from it, because it is the price of our brother’s blood; rather, we will trample it underfoot, because he said that he would reign over us, and then we shall see what his dreams are.”


    7. Therefore it is written in the record of the law of Moses: “The man who does not wish to raise up seed for his brother—his sandal shall be removed, and they shall spit in his face.”


    8. And the brothers of Joseph were not willing to raise up the life of their brother, and the Lord removed from them the sandal which they wore against Joseph their brother.


    9. For when they came into Egypt, they had their sandals removed by the attendants of Joseph outside the gate, and so they bowed down to Joseph in the manner of those before King Pharaoh.


    10. And not only did they bow down to him, but immediately, as they fell before him, they were also spat upon[3:10], and they were put to shame by the Egyptians.'
  footnotes:
  - marker: '3:7'
    text: Allusion to Deuteronomy 25:5–10, where refusal to perform a brother-in-law duty brings public shame through sandal-removal and spitting.
    reason: cross_reference
  - marker: '3:8'
    text: 'The Greek wording is unusual: literally, ''the brothers of Joseph were not willing to raise up the life of their brother.'' This appears to adapt the levirate-law language from the previous verse for moral analogy rather than strict legal citation.'
    reason: lexical_alternative
  - marker: '3:10'
    text: Some readers may take the spitting as a symbolic extension of the law-citation rather than a strictly historical detail; the Greek narrative, however, states it directly.
    reason: alternative_reading
