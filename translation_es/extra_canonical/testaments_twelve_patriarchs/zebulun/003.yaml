review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido griego y el rastro de auditoría inglés en la mayor parte del capítulo: preserva la providencia divina en la fosa seca, la venta a los ismaelitas, la alusión a Deuteronomio 25 y la aplicación retórica extraña de ''levantar la vida de su hermano''. Sin embargo, hay desajustes importantes: el marcador de nota [3:7] está anclado al inicio aunque la nota correspondiente en español es en realidad la de 3:8; falta una nota para la rareza léxica de v. 8; y en v. 10 ''ante los egipcios'' suaviza indebidamente παρὰ τῶν Αἰγυπτίων, que aquí se entiende mejor como vergüenza infligida por los egipcios.'
  spanish_quality_summary: 'El español es en general claro y digno, pero presenta varios detalles mejorables: ''cisterna/cisternas'' es defendible, aunque ''fosa/fosas'' sigue mejor la amplitud de λάκκος en este contexto; ''más bien'' en v. 1 suena algo discursivo; ''a este'' en v. 2 añade un matiz no necesario; y ''al modo de los que están delante del rey Faraón'' puede hacerse más natural. También conviene ajustar la puntuación y mantener la nota anclada donde corresponde.'
  glossary_alignment: 'No aparecen términos del glosario maestro en conflicto mayor. Se mantiene ''Señor'' para Κύριος, lo cual es apropiado aquí porque la fuente griega dice Κύριος y no hay obligación de introducir ''Yahvé''. ''José'', ''ismaelitas'', ''sandalias'' y ''vida'' están bien alineados con las decisiones del POB. La principal desviación no es terminológica sino de aparato crítico: la nota léxica de la frase inusual del v. 8 se perdió y fue reemplazada por una nota cruzada mal numerada.'
  issues:
  - severity: high
    issue: Marcación y contenido de notas al pie incorrectos
    rationale: El texto español ancla [3:7] al inicio del capítulo, pero las notas incluidas solo son 3:8 y 3:10. Además, la nota española 3:8 contiene el contenido de la nota inglesa 3:7 (alusión a Deuteronomio), mientras falta la nota inglesa 3:8 sobre la frase griega inusual 'levantar la vida de su hermano'.
  - severity: medium
    issue: v. 10 'quedaron avergonzados ante los egipcios' debilita el agente implícito
    rationale: παρὰ τῶν Αἰγυπτίων en este contexto se entiende mejor como 'por los egipcios', no meramente 'delante de'. La humillación les es infligida por los egipcios, en continuidad con el escupir.
  - severity: low
    issue: '''cisterna/cisternas'' es más específico que el inglés auditado y el griego'
    rationale: λάκκος puede abarcar hoyo/fosa/pozo. Dado que el POB eligió 'pits' precisamente para no sobreespecificar, 'fosa(s)' refleja mejor la amplitud léxica, aunque 'cisterna' no falsea gravemente el sentido.
  - severity: low
    issue: Algunas formulaciones son menos naturales de lo necesario
    rationale: '''más bien, vigilé la cisterna'', ''no matemos a este'', y ''al modo de los que están delante del rey Faraón'' suenan algo rígidas. Se pueden suavizar sin perder precisión.'
  revised_spanish_text: '1. Y cuando hicieron esto, todos se sentaron a comer y beber. Pero yo, al ver que José estaba afligido, no comí con ellos, sino que me quedé vigilando la fosa, orando para que él recibiera ayuda.


    2. Y mientras tanto, Rubén se levantó y dijo: «Vengan, hermanos míos, no lo matemos, sino arrojémoslo en una de estas fosas secas que cavaron nuestros padres y en las que no hallaron agua».


    3. Por esta razón el Señor impidió que brotara agua en ellas, para que José fuera preservado.


    4. Y así hicieron hasta que lo vendieron a los ismaelitas.


    5. En cuanto a su precio, hijos míos, yo no tuve parte en él. Pero Simeón, Dan y Gad, y sus hijos, tomaron su precio y compraron sandalias para sí mismos, para sus mujeres y para sus hijos,


    6. diciendo: «No comeremos de ello, porque es el precio de la sangre de nuestro hermano; más bien, lo hollaremos bajo nuestros pies, porque dijo que reinaría sobre nosotros, y entonces veremos qué son sus sueños».


    7. Por eso está escrito en el registro de la ley de Moisés:[a] «Al hombre que no quiera levantar descendencia para su hermano, le será quitada su sandalia, y le escupirán en la cara».


    8. Y los hermanos de José no quisieron levantar la vida de su hermano,[b] y el Señor les quitó la sandalia que llevaban contra José, su hermano.


    9. Porque cuando entraron en Egipto, los asistentes de José les quitaron las sandalias fuera de la puerta, y así se inclinaron ante José según la manera acostumbrada ante el rey Faraón.


    10. Y no solo se inclinaron ante él, sino que, al instante, cuando cayeron delante de él, también les escupieron encima,[c] y quedaron avergonzados por los egipcios.'
  revised_footnotes:
  - marker: a
    text: Alusión a Deuteronomio 25:5–10, donde la negativa a cumplir el deber levirático trae vergüenza pública mediante la remoción de la sandalia y el escupir.
    reason: cross_reference
  - marker: b
    text: 'El griego aquí es inusual: literalmente, «levantar la vida de su hermano». Parece adaptar el lenguaje de la ley del levirato del versículo anterior como analogía moral, no como cita legal estricta.'
    reason: lexical_alternative
  - marker: c
    text: Algunos lectores pueden entender el escupir como una extensión simbólica de la cita legal y no como un detalle estrictamente histórico; sin embargo, el griego lo afirma directamente.
    reason: alternative_reading
