  text: 6. *Ἰδὼν δὲ Ἰωσὴφ συνκλαίοντά³¹ μοι αὐτῷ³⁰ καὶ τοὺς ἀδελφοὺς ἐπερχομένους³² ἀνελεῖν αὐτὸν³³, κατέφυγον ὄπισθεν³⁴ μου, δεόμενος *τῆς πρὸς αὐτὸν βοηθείας³⁵. 7. *Ἐν δὲ τῷ μεταξὺ ἀναστὰς³⁶ Ῥουβὴμ³⁷ εἶπεν³⁸. *Δεῦτε ἀδελφοί μου³⁹, μὴ ἀποκτείνωμεν αὐτὸν ἀλλὰ ῥίψωμεν⁴⁰ αὐτὸν εἰς ἕνα τῶν *ξηρῶν λάκκων⁴¹ τούτων⁴², ὧν ὤρυξαν οἱ πατέρες ἡμῶν, καὶ οὐχ εὗρον ὕδωρ⁴³. 8. Διὰ γὰρ τοῦτο ἐκώλυσε ὁ⁴⁴ Κύριος *τοῦ μὴ ἀναβλῦσαι ὕδωρ⁴⁵ ἐν αὐτοῖς ἵνα *γένηται περιποίησις τῷ⁴⁶ Ἰωσήφ. 9. *Καὶ ἐποίησαν⁴⁷ *οὕτως ἕως ὅτου⁴⁸ ἐπώλησαν⁴⁹ αὐτὸν⁵⁰ τοῖς Ἰσμαηλίταις⁵¹. III. *Εἰς γὰρ τὸ τίμημα αὐτοῦ ἐγὼ οὐκ ἐκοινώνησα, τέκνα μου¹. 2. *Ἀλλὰ Συμεὼν² καὶ *ὁ Δὰν καὶ ὁ Γὰδ καὶ τὰ τέκνα αὐτῶν³, καὶ⁴ λαβόντες *τὴν τιμὴν αὐτοῦ⁵ ἐπρίαντο⁶ ὑποδήματα ἑαυτοῖς⁷ *καὶ ταῖς γυναιξὶν αὐτῶν⁸ Γκαὶ τοῖς τέκνοις αὐτῶν˥⁹, εἰπόντες· 3. *Οὐ φαγόμεθα αὐτήν¹⁰, ὅτι τιμὴ ἐστιν *αἵματος τοῦ ἀδελφοῦ ἡμῶν¹¹, ἀλλὰ καταπατήσει¹² καταπατήσωμεν¹³ αὐτήν, ἀνθ' ὧν εἶπεν βασιλεῦσαι¹⁴ ἐφ' ἡμᾶς¹⁵, καὶ ἴδωμεν¹⁶ τί ἐστι¹⁷ *τὰ ἐνύπνια¹⁸ αὐτοῦ. 4. Διὰ τοῦτο οὖν¹⁹
    ἐν γραφῇ *νόμου Μωσέως γέγραπται²⁰· Τὸν μὴ θέλοντα *ἀναστῆσαι σπέρμα²¹ τῷ ἀδελφῷ αὐτοῦ ὑπολύεσθαι²² τὸ ὑπόδημα αὐτοῦ²³ καὶ ἐμπτύεσθαι εἰς τὸ πρόσωπον. 5. *Καὶ οἱ ἀδελφοὶ τοῦ Ἰωσὴφ²⁴ οὐκ ἠθέλησαν²⁵ †ζωὴν²⁶ ἀδελφοῦ αὐτῶν²⁷, καὶ ὁ²⁸ Κύριος ὑπέλυσεν²⁹ αὐτοὺς³⁰ τὸ ὑπόδημα³¹ *ὃ ἐφόρεσαν κατὰ Ἰωσὴφ τοῦ ἀδελφοῦ αὐτῶν³². 6. Καὶ *γὰρ ἐλθόντες ἐν Αἰγύπτῳ³³ ὑπελύθησαν³⁴ *ὑπὸ τῶν παίδων³⁵ Ἰωσὴφ ἔξωθεν³⁶ τοῦ πυλῶνος, καὶ οὕτως³⁷ προσεκύνησαν³⁸ *τῷ Ἰωσὴφ³⁹ κατὰ τὸν τύπον βασιλέως⁴⁰ Φαραώ⁴¹. 7. Οὐ μόνον δὲ προσεκύνησαν αὐτῷ⁴² ἀλλὰ καὶ ἐνεπτύσθησαν⁴³ παραχρῆμα⁴⁴ πεσόντες ἔμπροσθεν αὐτοῦ, καὶ⁴⁵ ἠσχύνθησαν⁴⁶ παρὰ⁴⁷ τῶν⁴⁸ Αἰγυπτίων⁴⁹.
