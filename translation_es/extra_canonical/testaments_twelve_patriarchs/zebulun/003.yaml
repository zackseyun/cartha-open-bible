translation:
  language: es
  text: '1. Y cuando hicieron esto, todos se sentaron a comer y beber. Pero yo, al ver que José estaba afligido, no comí con ellos, sino que me quedé vigilando la fosa, orando para que él recibiera ayuda.


    2. Y mientras tanto, Rubén se levantó y dijo: «Vengan, hermanos míos, no lo matemos, sino arrojémoslo en una de estas fosas secas que cavaron nuestros padres y en las que no hallaron agua».


    3. Por esta razón el Señor impidió que brotara agua en ellas, para que José fuera preservado.


    4. Y así hicieron hasta que lo vendieron a los ismaelitas.


    5. En cuanto a su precio, hijos míos, yo no tuve parte en él. Pero Simeón, Dan y Gad, y sus hijos, tomaron su precio y compraron sandalias para sí mismos, para sus mujeres y para sus hijos,


    6. diciendo: «No comeremos de ello, porque es el precio de la sangre de nuestro hermano; más bien, lo hollaremos bajo nuestros pies, porque dijo que reinaría sobre nosotros, y entonces veremos qué son sus sueños».


    7. Por eso está escrito en el registro de la ley de Moisés:[a] «Al hombre que no quiera levantar descendencia para su hermano, le será quitada su sandalia, y le escupirán en la cara».


    8. Y los hermanos de José no quisieron levantar la vida de su hermano,[b] y el Señor les quitó la sandalia que llevaban contra José, su hermano.


    9. Porque cuando entraron en Egipto, los asistentes de José les quitaron las sandalias fuera de la puerta, y así se inclinaron ante José según la manera acostumbrada ante el rey Faraón.


    10. Y no solo se inclinaron ante él, sino que, al instante, cuando cayeron delante de él, también les escupieron encima,[c] y quedaron avergonzados por los egipcios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Alusión a Deuteronomio 25:5–10, donde la negativa a cumplir el deber levirático trae vergüenza pública mediante la remoción de la sandalia y el escupir.
    reason: cross_reference
  - marker: b
    text: 'El griego aquí es inusual: literalmente, «levantar la vida de su hermano». Parece adaptar el lenguaje de la ley del levirato del versículo anterior como analogía moral, no como cita legal estricta.'
    reason: lexical_alternative
  - marker: c
    text: Algunos lectores pueden entender el escupir como una extensión simbólica de la cita legal y no como un detalle estrictamente histórico; sin embargo, el griego lo afirma directamente.
    reason: alternative_reading
lexical_decisions:
- source_word: συνκλαίοντά μοι αὐτῷ
  english_pob_choice: Joseph was grieving
  chosen_spanish: José estaba afligido
  alternatives_spanish:
  - José estaba lamentándose
  - José lloraba
  lexicon: LSJ
  rationale: La frase griega describe a José en duelo o aflicción; en español, 'afligido' transmite bien el estado emocional sin forzar una repetición literal de 'llorar' que suena menos natural en este contexto narrativo.
- source_word: δεόμενος τῆς πρὸς αὐτὸν βοηθείας
  english_pob_choice: praying for help for him
  chosen_spanish: orando por ayuda para él
  alternatives_spanish:
  - suplicando ayuda para él
  - rogando por su ayuda
  lexicon: LSJ
  rationale: δεόμενος expresa súplica/rogativa; 'orando' conserva el tono devocional del sujeto en contexto narrativo y 'ayuda para él' refleja el objeto de la petición sin ampliar el sentido.
- source_word: λάκκων / ξηρῶν λάκκων
  english_pob_choice: pits / dry pits
  chosen_spanish: cisterna / cisternas secas
  alternatives_spanish:
  - pozo / pozos secos
  - hoyo / hoyos secos
  lexicon: LSJ
  rationale: Aunque λάκκος puede ser 'fosa' o 'hoyo', en este relato el contexto de excavaciones antiguas sin agua y la tradición bíblica de José favorecen 'cisterna', que comunica mejor una cavidad excavada y asociada al agua, manteniendo 'secas' para ξηρῶν.
- source_word: ἐκώλυσε ... ἀναβλῦσαι ὕδωρ
  english_pob_choice: prevented water from springing up
  chosen_spanish: impidió que brotara agua
  alternatives_spanish:
  - evitó que subiera agua
  - detuvo que manara agua
  lexicon: LSJ
  rationale: '''Brota'' comunica el movimiento ascendente y emergente del agua con naturalidad en español, manteniendo la acción divina explícita.'
- source_word: περιποίησις
  english_pob_choice: be preserved
  chosen_spanish: fuera preservado
  alternatives_spanish:
  - fuera guardado
  - fuera puesto a salvo
  lexicon: LSJ
  rationale: '''Preservado'' conserva el matiz providencial y formal del griego, sin convertir la frase en una interpretación más fuerte que el texto.'
- source_word: τιμή
  english_pob_choice: price
  chosen_spanish: precio
  alternatives_spanish:
  - pago
  - valor
  lexicon: LSJ
  rationale: En el intercambio por José, τιμή se refiere al dinero recibido; 'precio' mantiene la repetición moral del motivo de la venta.
- source_word: ὑποδήματα
  english_pob_choice: sandals
  chosen_spanish: sandalias
  alternatives_spanish:
  - sandalias
  - calzado
  lexicon: LSJ
  rationale: '''Sandalias'' corresponde al sentido concreto del término y conserva la resonancia cultural y legal del pasaje.'
- source_word: καταπατήσωμεν αὐτήν
  english_pob_choice: let us trample it underfoot
  chosen_spanish: lo hollaremos bajo nuestros pies
  alternatives_spanish:
  - lo pisotearemos
  - lo trituraremos bajo nuestros pies
  lexicon: LSJ
  rationale: '''Hollar bajo nuestros pies'' expresa bien el gesto de desprecio y resulta natural en español; mantiene el simbolismo de rechazo del dinero.'
- source_word: ἀναστῆσαι σπέρμα
  english_pob_choice: raise up seed
  chosen_spanish: levantar descendencia
  alternatives_spanish:
  - levantar simiente
  - producir descendencia
  lexicon: LSJ
  rationale: En español actual, 'descendencia' hace comprensible la expresión jurídica sin perder el trasfondo de la ley de levirato; 'levantar' conserva la estructura verbal del original.
- source_word: ὑπολύεσθαι ... τὸ ὑπόδημα
  english_pob_choice: his sandal shall be removed
  chosen_spanish: su sandalia será quitada
  alternatives_spanish:
  - le será quitada la sandalia
  - su sandalia será desatada
  lexicon: LSJ
  rationale: La formulación pasiva refleja el estilo legal de la cita y mantiene el acto vergonzoso asociado a la ley de Deuteronomio.
- source_word: ζωὴν ἀδελφοῦ αὐτῶν
  english_pob_choice: the life of their brother
  chosen_spanish: la vida de su hermano
  alternatives_spanish:
  - la vida por su hermano
  - la descendencia de su hermano
  lexicon: LSJ
  rationale: Se conserva la frase tal como está atestiguada en el griego, aun cuando resulta inusual en relación con la ley anterior; esto evita suavizar la tensión textual documentada.
- source_word: ὑπέλυσεν
  english_pob_choice: removed
  chosen_spanish: les quitó
  alternatives_spanish:
  - les desató
  - les removió
  lexicon: LSJ
  rationale: '''Quitar'' funciona de forma natural con ''sandalia'' en español y conserva la continuidad del motivo de la remoción simbólica.'
- source_word: παῖδες
  english_pob_choice: attendants
  chosen_spanish: asistentes
  alternatives_spanish:
  - sirvientes
  - criados
  lexicon: LSJ
  rationale: '''Asistentes'' comunica una función de corte sin cargar innecesariamente la lectura con un matiz servil más fuerte que el contexto inmediato exige.'
- source_word: κατὰ τὸν τύπον βασιλέως Φαραώ
  english_pob_choice: in the manner of those before King Pharaoh
  chosen_spanish: al modo de los que están delante del rey Faraón
  alternatives_spanish:
  - según el protocolo del rey Faraón
  - conforme a la costumbre ante el rey Faraón
  lexicon: LSJ
  rationale: τύπος aquí indica patrón o forma; la traducción preserva la idea de protocolo cortesano sin sonar artificial.
- source_word: ἐνεπτύσθησαν
  english_pob_choice: they were also spat upon
  chosen_spanish: también les escupieron encima
  alternatives_spanish:
  - también fueron escupidos
  - también les escupieron
  lexicon: LSJ
  rationale: La pasiva griega puede expresarse de modo natural en español con una construcción impersonal; 'encima' hace explícita la humillación física sin añadir contenido ajeno.
theological_decisions:
- issue: Acción providencial del Señor en la cisterna seca
  english_pob_reading: The Lord actively prevented water from springing up so that Joseph might be preserved.
  chosen_spanish_reading: El Señor impidió que brotara agua en ellas, para que José fuera preservado.
  alternative_spanish_readings:
  - El Señor evitó que surgiera agua en ellas, para que José estuviera a salvo.
  - El Señor retuvo el agua para preservar a José.
  rationale: Se mantiene la causalidad divina explícita del griego y su finalidad providencial. 'Preservado' conserva un tono formal y no sustituye el sentido por una paráfrasis más teológica de 'salvado'.
  doctrine_reference: DOCTRINE.md §Translation philosophy; preserve plain sense and providential agency
- issue: Cita legal y tensión expresiva entre 'descendencia' y 'vida'
  english_pob_reading: Translate the legal citation and Zebulun's application straightforwardly, without harmonizing away the unusual phrase 'raise up the life of their brother.'
  chosen_spanish_reading: Traducir la cita legal y la aplicación de Zabulón de forma directa, conservando 'levantar la vida de su hermano' en el v. 8.
  alternative_spanish_readings:
  - Normalizar el v. 8 a 'levantar descendencia para su hermano'.
  - Parafrasear la aplicación como rechazo moral general.
  rationale: El texto griego conserva una formulación inusual en el v. 8 que no debe armonizarse con la ley citada. La traducción española mantiene esa tensión para que el lector vea la relación retórica, no una reconstrucción suavizada.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Conforme al último paso de revisión, no hubo cambios aplicados y el borrador permanece alineado con la decisión óptima previa.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma proyectual para el Tetragrámaton, pero en esta perícopa el texto griego usa Κύριος en contexto narrativo y la redacción recibida del paquete inglés preserva 'the Lord'; por coherencia con el audit trail y la ausencia de un antecedente explícito del nombre divino en la sección, se traduce aquí como 'el Señor'.
  - '''José'' se mantiene como nombre propio estable; ''cisterna'' se usa consistentemente para λάκκος en este pasaje por su mejor ajuste contextual.'
  - '''Sandalia/sandalias'' se conserva de forma uniforme para el motivo legal y narrativo de remoción humillante.'
