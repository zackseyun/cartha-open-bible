  revision_rationale: 'Se corrige una omisión grave del sentido en la cláusula sobre la compasión del Señor, se reubica la nota textual al lugar correcto, y se ajustan dos expresiones para reflejar mejor el griego y sonar más naturales en español: «Fijándose en él» para προσέχοντες y «no abrigue maldad contra su hermano» para μὴ λογίζεσθε κακίαν πρὸς τὸν ἀδελφὸν αὐτοῦ. También se pule «toda parentela» a «todo parentesco» para mayor claridad general.'
