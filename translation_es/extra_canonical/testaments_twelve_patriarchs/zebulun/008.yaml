    changes_summary: Adjusted 'merciful compassion' to the more literal 'compassion of mercy' for σπλάγχνα ἐλέους, and revised 'Giving heed to him' to 'Paying attention to him' for a more natural rendering of προσέχοντες while preserving the sense.
translation:
  language: es
  text: 'Y así, hijos míos, tengan compasión hacia toda persona con misericordia, para que también el Señor, habiendo tenido compasión de ustedes, les muestre misericordia. Porque ciertamente en los últimos días Dios enviará su compasión sobre la tierra, y dondequiera que encuentre compasión de misericordia, allí habita.


    Porque así como un hombre tiene compasión de su prójimo, así también el Señor de él. Y cuando bajamos a Egipto[a], José no nos guardó rencor[b]. Prestándole atención, pues, ustedes también, hijos míos, ámense unos a otros, y que cada uno no tenga por malo a su hermano. Porque esto divide la unidad, dispersa toda parentela, perturba el alma y desfigura el rostro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testigos leen aquí 'y destruye la sustancia/las posesiones de uno' en lugar de 'y desfigura el rostro'.
    reason: textual_variant
  - marker: b
    text: 'Literalmente: ''no recordó males contra nosotros'' o ''no albergó resentimiento contra nosotros''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐσπλαγχνίαν
  english_pob_choice: compassion
  chosen_spanish: compasión
  alternatives_spanish:
  - ternura misericordiosa
  - piedad
  lexicon: LSJ
  rationale: '''Compasión'' es el equivalente natural en español y conserva el valor afectivo de la palabra griega sin volver el texto pesado o arcaizante.'
- source_word: κατὰ παντὸς ἀνθρώπου
  english_pob_choice: toward every person
  chosen_spanish: hacia toda persona
  alternatives_spanish:
  - hacia todas las personas
  - para toda persona
  lexicon: LSJ
  rationale: La construcción es distributiva y universal; 'toda persona' mantiene el singular genérico del griego y suena idiomático en español.
- source_word: σπλαγχνισθεὶς
  english_pob_choice: having had compassion
  chosen_spanish: habiendo tenido compasión
  alternatives_spanish:
  - movido a compasión
  - habiendo sido misericordioso
  lexicon: BDAG
  rationale: La forma participial conserva la relación verbal con la raíz de compasión del contexto y evita perder la conexión léxica del pasaje.
- source_word: τὰ σπλάγχνα αὐτοῦ
  english_pob_choice: his compassion
  chosen_spanish: su compasión
  alternatives_spanish:
  - sus entrañas
  - sus tiernas misericordias
  lexicon: LSJ
  rationale: Aunque literalmente significa 'sus entrañas', en este idioma figurado expresa compasión profunda; 'su compasión' comunica el sentido sin oscurecerlo.
- source_word: σπλάγχνα ἐλέους
  english_pob_choice: compassion of mercy
  chosen_spanish: compasión de misericordia
  alternatives_spanish:
  - entrañas de misericordia
  - ternura misericordiosa
  lexicon: BDAG
  rationale: La duplicación retórica queda visible en español mediante dos sustantivos emparentados; 'compasión de misericordia' preserva la tensión semántica sin simplificarla demasiado.
- source_word: τὸν πλησίον αὐτοῦ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - el que está cerca de él
  lexicon: LSJ
  rationale: '''Prójimo'' es el término ético-bíblico más fiel y reconocible para el alcance moral del griego.'
- source_word: οὐκ ἐμνησικάκησεν ἡμῖν
  english_pob_choice: did not hold a grudge against us
  chosen_spanish: no nos guardó rencor
  alternatives_spanish:
  - no recordó nuestros males contra nosotros
  - no albergó resentimiento contra nosotros
  lexicon: LSJ
  rationale: '''Guardar rencor'' expresa de manera clara y actual el valor de resentimiento/recordar agravios sin perder el matiz de hostilidad retenida.'
- source_word: προσέχοντες
  english_pob_choice: paying attention to him
  chosen_spanish: Prestándole atención
  alternatives_spanish:
  - fijándose en él
  - prestando atención a él
  lexicon: BDAG
  rationale: La frase sigue la revisión inglesa más natural y mantiene el matiz exhortativo de mirar a José como ejemplo a imitar.
- source_word: μὴ λογίζεσθε κακίαν
  english_pob_choice: let each one not reckon evil
  chosen_spanish: que cada uno no tenga por malo
  alternatives_spanish:
  - que cada uno no calcule el mal
  - que cada uno no considere maldad
  lexicon: BDAG
  rationale: En español, 'tener por malo' comunica el sentido de contar/atribuir maldad de manera más natural que un calco de 'reconocer o calcular el mal'.
- source_word: χωρίζει ἑνότητα
  english_pob_choice: divides unity
  chosen_spanish: divide la unidad
  alternatives_spanish:
  - separa la unidad
  - rompe la unidad
  lexicon: LSJ
  rationale: '''Divide la unidad'' conserva la forma breve y contundente del griego y su fuerza exhortativa.'
- source_word: πᾶσαν συγγένειαν
  english_pob_choice: every kinship
  chosen_spanish: toda parentela
  alternatives_spanish:
  - todo parentesco
  - toda relación de familia
  lexicon: LSJ
  rationale: '''Parentela'' expresa el conjunto de vínculos de sangre o parentesco de modo más natural en español que una construcción demasiado abstracta.'
- source_word: τὴν ψυχὴν ταράσσει
  english_pob_choice: troubles the soul
  chosen_spanish: perturba el alma
  alternatives_spanish:
  - agita el alma
  - turba el alma
  lexicon: BDAG
  rationale: '''Perturba el alma'' conserva el registro elevado del texto y el efecto interior y moral de la acción.'
- source_word: τὸ πρόσωπον ἀφανίζει
  english_pob_choice: disfigures the face
  chosen_spanish: desfigura el rostro
  alternatives_spanish:
  - afea el rostro
  - hace desaparecer el rostro
  lexicon: LSJ
  rationale: '''Desfigura el rostro'' reproduce con claridad la imagen concreta del texto y su contraste con los efectos internos precedentes.'
theological_decisions:
- issue: Visita escatológica de la compasión de Dios en la tierra
  english_pob_reading: Translate the phrase straightforwardly as a divine visitation of compassion, without specifying a messianic or incarnational referent in the main text.
  chosen_spanish_reading: Traducir de forma directa la acción divina de enviar su compasión sobre la tierra, sin identificar en el texto principal un referente mesiánico o encarnacional.
  alternative_spanish_readings:
  - Una referencia velada a un agente salvador personal
  - Una alusión cristianizada posterior a la encarnación
  rationale: El griego permite leer una compasión personificada o una acción misericordiosa de Dios. La traducción española conserva esa ambigüedad sin resolverla por adelantado.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en vez de resolverla.'
- issue: Variación textual al final del v. 6
  english_pob_reading: Use the main-text reading 'disfigures the face' and note the alternative 'destroys one's substance/possessions.'
  chosen_spanish_reading: Usar 'desfigura el rostro' en el texto principal y documentar la variante que lee 'destruye la sustancia/posesiones de uno'.
  alternative_spanish_readings:
  - destruye la sustancia de uno
  - destruye las posesiones de uno
  rationale: La lectura base del testimonio dado habla del rostro, en coherencia con la secuencia de efectos internos y externos. La variante es significativa y debe quedar documentada.
  doctrine_reference: 'PHILOSOPHY.md: documentar decisiones textuales con transparencia.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail inglés: ''compassion of mercy'' se refleja como ''compasión de misericordia'', y ''Paying attention to him'' se traduce de manera natural como ''Prestándole atención''. También se mantuvo la lectura textual principal de ''face'' frente a la variante transmitida en algunos testigos.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como término normal para el nombre divino; aquí no aparece en el pasaje, por lo que no fue necesario aplicarlo.
  - Se eligió 'Señor' para Κύριος conforme al contexto de cita/devoción del texto y al uso heredado en español bíblico, sin neutralizar el referente divino.
  - Se empleó 'compasión' / 'misericordia' de manera diferenciada para conservar la repetición retórica del pasaje.
  - Se prefirió 'prójimo' y 'hermano' como términos relacionales ético-comunitarios estables en español bíblico.
  - Se evitó suavizar 'guardar rencor' para no perder la fuerza moral del verbo griego.
