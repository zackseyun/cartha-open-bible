  text: VIII. Καὶ ὑμεῖς οὖν, τέκνα μου, ἔχετε εὐσπλαγχνίαν *κατὰ παντὸς ἀνθρώπου¹ ἐν ἐλέει, ἵνα καὶ ὁ Κύριος *εἰς ὑμᾶς σπλαγχνισθεὶς² ἐλεήσῃ ὑμᾶς. 2. Ὅτι καίγε³ ἐπʼ ἐσχάτων τῶν⁴ ἡμερῶν ὁ Θεὸς ἀποστελεῖ⁵ *τὰ σπλάγχνα⁶ αὐτοῦ ἐπὶ τῆς⁷ γῆς, καὶ ὅπου εὕρῃ σπλάγχνα ἐλέους, ἐν αὐτῷ κατοικεῖ. 3. Ὅσον γὰρ⁸ ἄνθρωπος σπλαγχνίζεται εἰς *τὸν πλησίον αὐτοῦ⁹, τοσοῦτον *καὶ ὁ⁴ Κύριος εἰς αὐτόν. 4. Ὅτε δὲ¹⁰ κατήλθομεν¹¹ *εἰς Αἴγυπτον¹², Ἰωσὴφ *οὐκ ἐμνησικάκησεν ἡμῖν¹³. 5. Εἰς¹⁴ ὃν *προσέχοντες καὶ ὑμεῖς, τέκνα μου ἀγαπᾶτε ἀλλήλους¹⁵, καὶ μὴ λογίζεσθε¹⁶ ἕκαστος *κακίαν πρὸς τὸν ἀδελφὸν¹⁷ αὐτοῦ. 6. Ὅτι τοῦτο⁷ χωρίζει ἑνότητα¹⁸, καὶ Γπᾶσαν συγγένειαν˥¹⁹ διασκορπίζει²⁰, Γκαὶ τὴν ψυχὴν ταράσσει˥²¹ καὶ τὸ πρόσωπον ἀφανίζει²².
