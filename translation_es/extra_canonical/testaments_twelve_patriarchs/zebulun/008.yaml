base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/008.yaml
  text: 'And so[8:2], my children, have compassion toward every person with mercy, so that the Lord also, having had compassion on you, may show you mercy. For indeed in the last days God will send his compassion upon the earth, and wherever he finds compassion of mercy, there he dwells. For as much as a man has compassion on his neighbor, so much also the Lord has compassion on him.


    And when we went down into Egypt[8:6], Joseph did not hold a grudge against us. Paying attention to him, then, you also, my children, love one another, and let each one not reckon evil against his brother. For this divides unity, and scatters every kinship, and troubles the soul, and disfigures the face.'
  footnotes:
  - marker: '8:2'
    text: Or 'his tender mercies upon the earth.' The Greek literally uses 'his inward parts,' an idiom for deep compassion.
    reason: lexical_alternative
  - marker: '8:6'
    text: Some witnesses read 'and destroys one's substance/possessions' instead of 'and disfigures the face.'
    reason: textual_variant
