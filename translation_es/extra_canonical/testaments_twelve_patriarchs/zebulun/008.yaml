  to: 'Y así, hijos míos, tengan compasión hacia toda persona con misericordia, para que también el Señor, habiendo tenido compasión de ustedes, les muestre misericordia. Porque ciertamente en los últimos días Dios enviará su compasión sobre la tierra, y dondequiera que encuentre compasión de misericordia, allí habita.


    Porque así como un hombre tiene compasión de su prójimo, así también el Señor tiene compasión de él. Y cuando bajamos a Egipto, José no nos guardó rencor[a]. Fijándose en él, pues, ustedes también, hijos míos, ámense unos a otros, y que cada uno no abrigue maldad contra su hermano. Porque esto divide la unidad, dispersa todo parentesco, perturba el alma y desfigura el rostro[b].'
  rationale: 'Se corrige una omisión grave del sentido en la cláusula sobre la compasión del Señor, se reubica la nota textual al lugar correcto, y se ajustan dos expresiones para reflejar mejor el griego y sonar más naturales en español: «Fijándose en él» para προσέχοντες y «no abrigue maldad contra su hermano» para μὴ λογίζεσθε κακίαν πρὸς τὸν ἀδελφὸν αὐτοῦ. También se pule «toda parentela» a «todo parentesco» para mayor claridad general.'
