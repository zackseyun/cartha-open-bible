- from: 'Y así, hijos míos, tengan compasión hacia toda persona con misericordia, para que también el Señor, habiendo tenido compasión de ustedes, les muestre misericordia. Porque ciertamente en los últimos días Dios enviará su compasión sobre la tierra, y dondequiera que encuentre compasión de misericordia, allí habita.


