translation:
  language: es
  text: Y tus enemigos os llevarán cautivos, y seréis afligidos entre las naciones, con muchas debilidades y angustias.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αἰχμαλωτεύσουσιν ὑμᾶς
  english_pob_choice: will take you captive
  chosen_spanish: os llevarán cautivos
  alternatives_spanish:
  - os harán cautivos
  - os tomarán cautivos
  lexicon: αἰχμαλωτεύω
  rationale: La forma griega expresa cautiverio efectivo, no solo derrota. «Llevarán cautivos» conserva el movimiento al exilio/cautiverio y suena natural en español bíblico contemporáneo.
- source_word: ἐχθροὶ ὑμῶν
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - vuestros enemigos
  - sus enemigos
  lexicon: ἐχθρός
  rationale: Se mantiene el sentido directo del posesivo de segunda persona plural. En un registro bíblico en español, «tus» funciona como plural inclusivo implícito con el verbo y el contexto; si se prefiriera marcar plural de forma explícita, «vuestros» sería posible.
- source_word: κακωθήσεσθε
  english_pob_choice: you will be afflicted
  chosen_spanish: seréis afligidos
  alternatives_spanish:
  - seréis maltratados
  - padeceréis aflicción
  lexicon: κακόω
  rationale: El verbo griego indica sufrir daño o aflicción. «Seréis afligidos» preserva la pasiva y la amplitud del padecimiento sin concretarlo en exceso.
- source_word: ἐν ἔθνεσιν
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - en las naciones
  - entre los pueblos
  lexicon: ἔθνος
  rationale: «Entre las naciones» reproduce la preposición y mantiene el plural étnico-político del griego. «Pueblos» suavizaría la referencia, pero la forma literal es más fiel aquí.
- source_word: ἐν πολλαῖς ἀσθενείαις
  english_pob_choice: with many weaknesses
  chosen_spanish: con muchas debilidades
  alternatives_spanish:
  - con muchas enfermedades
  - en muchas flaquezas
  lexicon: ἀσθένεια
  rationale: ἀσθένεια puede abarcar debilidad, enfermedad o fragilidad. Dado el contexto amplio de aflicción, «debilidades» conserva la amplitud semántica mejor que restringirlo a enfermedades.
- source_word: θλίψεσιν
  english_pob_choice: distresses
  chosen_spanish: angustias
  alternatives_spanish:
  - tribulaciones
  - aflicciones
  lexicon: θλῖψις
  rationale: θλῖψις designa presión, aflicción, angustia o tribulación. «Angustias» comunica bien la presión sufrida en español actual y evita duplicar demasiado «afligidos».
theological_decisions:
- issue: Cautiverio y aflicción como juicio histórico sobre el pueblo
  english_pob_reading: your enemies will take you captive, and you will be afflicted among the nations
  chosen_spanish_reading: tus enemigos os llevarán cautivos, y seréis afligidos entre las naciones
  alternative_spanish_readings:
  - tus enemigos os harán cautivos, y padeceréis aflicción entre las naciones
  rationale: El griego presenta una predicción de despojo y sufrimiento entre las naciones. La versión española conserva ese juicio histórico sin intensificarlo ni suavizarlo.
  doctrine_reference: Tema de exilio/jucio pactual en los Testamentos de los Doce Patriarcas
translation_notes:
  revision_awareness: El pasaje griego y la traducción inglesa auditada coinciden de forma estable; no hubo cambios aplicados en la última pasada. La versión española sigue de cerca esa lectura sin introducir variantes textuales nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se conserva «naciones» para ἔθνη por coherencia con el uso bíblico del término en contextos de dispersión y exilio.
  - No se emplea «Cristo/Mesías» ni terminología doctrinal adicional porque el versículo no la requiere.
