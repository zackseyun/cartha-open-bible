id: T12P.ZEB.9.1
reference: Testament of Zebulun 9:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: IX. Προσέχετε Γοὖν˥¹ ἐπὶ² τὰ ὕδατα, *καί, γνῶτε, ὅταν³ *πορεύονται ἐπὶ τὸ αὐτό⁴, λίθους, ξύλα, γῆν⁵ *καὶ ἕτερά τινα⁶ κατασύρουσιν⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/009/001.yaml
  text: Therefore pay attention to the waters, and understand that when they flow together to the same place, they carry down stones, wood, earth, and various other things.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:58:00Z'
    unchanged: false
    changes_summary: Refined 'move to one place' to 'flow together to the same place' to better reflect πορεύονται ἐπὶ τὸ αὐτό in the context of waters and to preserve the sense of convergence. Kept the rest substantially the same.
translation:
  language: es
  text: Por tanto, presten atención a las aguas, y comprendan que, cuando fluyen juntas hacia un mismo lugar, arrastran piedras, madera, tierra y otras cosas semejantes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Προσέχετε
  english_pob_choice: pay attention to
  chosen_spanish: presten atención a
  alternatives_spanish:
  - fíjense en
  - presten cuidado a
  lexicon: προσέχω
  rationale: La idea es de atención cuidadosa y deliberada. «Presten atención a» conserva el tono exhortativo sin añadir matices devocionales ajenos al griego.
- source_word: ἐπὶ τὰ ὕδατα
  english_pob_choice: the waters
  chosen_spanish: a las aguas
  alternatives_spanish:
  - sobre las aguas
  - en las aguas
  lexicon: ὕδωρ
  rationale: El objeto directo de la atención son «las aguas». En español, «a las aguas» encaja naturalmente con la exhortación y evita una preposición demasiado literal que sonaría forzada.
- source_word: πορεύονται ἐπὶ τὸ αὐτό
  english_pob_choice: when they flow together to the same place
  chosen_spanish: cuando fluyen juntas hacia un mismo lugar
  alternatives_spanish:
  - cuando van juntas al mismo lugar
  - cuando se dirigen a un mismo lugar
  lexicon: πορεύομαι
  rationale: El contexto de aguas pide un verbo de movimiento acuoso; «fluyen juntas» preserva la convergencia señalada por ἐπὶ τὸ αὐτό y mantiene la corrección en español.
- source_word: λίθους, ξύλα, γῆν
  english_pob_choice: stones, wood, earth
  chosen_spanish: piedras, madera, tierra
  alternatives_spanish:
  - piedras, leña, suelo
  - piedras, troncos, tierra
  lexicon: λίθος / ξύλον / γῆ
  rationale: «Madera» es un equivalente amplio y natural para ξύλα en este contexto; «leña» o «troncos» restringirían indebidamente el campo semántico.
- source_word: ἕτερά τινα
  english_pob_choice: various other things
  chosen_spanish: otras cosas semejantes
  alternatives_spanish:
  - otras cosas
  - diversas otras cosas
  lexicon: ἕτερά τινα
  rationale: La expresión griega indica elementos adicionales de tipo similar, no necesariamente una lista cerrada. «Otras cosas semejantes» comunica esa apertura sin sobrerrepresentar la especificidad.
theological_decisions:
- issue: Convergencia de las aguas y descripción física del movimiento
  english_pob_reading: flow together to the same place
  chosen_spanish_reading: fluyen juntas hacia un mismo lugar
  alternative_spanish_readings:
  - van juntas al mismo lugar
  - se juntan en un mismo lugar
  rationale: 'No hay un problema doctrinal, pero sí una elección de imagen: la revisión inglesa subrayó la convergencia. El español mantiene ese énfasis para no perder el detalle físico del texto.'
  doctrine_reference: No aplica; observación de imagen natural en el texto.
translation_notes:
  revision_awareness: La versión inglesa fue revisada de «move to one place» a «flow together to the same place» para reflejar mejor πορεύονται ἐπὶ τὸ αὐτό en contexto de aguas. El español adopta explícitamente esa convergencia con «fluyen juntas hacia un mismo lugar».
  spanish_consistency_notes:
  - Se mantiene «Por tanto» para conservar la inferencia del griego Γοὖν.
  - Se usa lenguaje neutral y readable para audiencia eclesial amplia.
  - No se introduce terminología eclesiástica no presente en el texto.
  - «Aguas» se conserva en plural como en el original y en la traducción inglesa auditada.
