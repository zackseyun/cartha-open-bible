source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 8. Καὶ μετὰ ταῦτα⁴⁵ ἀνατελεῖ⁴⁶ ⌜ὑμῖν⌝ *αὐτὸς ὁ⁴⁷ Κύριος, *φῶς δικαιοσύνης⁴⁸,
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/009/008.yaml
  text: And after these things the Lord himself will rise for you, the light of righteousness.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:58:05Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y después de estas cosas, el Señor mismo se levantará para ustedes, la luz de la justicia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Yahvé
  lexicon: κύριος
  rationale: En este pasaje griego aparece Κύριος sin el Tetragrámaton escrito. El inglés POB sigue «the Lord»; en español, «el Señor» comunica naturalmente el título reverencial y conserva la ambigüedad auditada del griego, sin forzar aquí la forma explícita «Yahvé».
- source_word: ἀνατελεῖ
  english_pob_choice: will rise
  chosen_spanish: se levantará
  alternatives_spanish:
  - surgirá
  - aparecerá
  lexicon: ἀνατέλλω
  rationale: El verbo puede implicar «salir/levantarse/aparecer». El POB eligió «will rise», y «se levantará» reproduce bien el movimiento de irrupción o surgimiento en español sin añadir contenido.
- source_word: φῶς
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - luminosidad
  - resplandor
  lexicon: φῶς
  rationale: «Luz» es la correspondencia directa y mantiene la imagen bíblica conservada por el inglés POB.
- source_word: δικαιοσύνης
  english_pob_choice: of righteousness
  chosen_spanish: de la justicia
  alternatives_spanish:
  - de rectitud
  - de justicia y rectitud
  lexicon: δικαιοσύνη
  rationale: En español, «justicia» es la forma más natural y amplia para δικαιοσύνη en este contexto poético. «Rectitud» podría ser posible, pero «luz de la justicia» preserva mejor el paralelismo y la fuerza moral/judicial del término.
theological_decisions:
- issue: Identidad del sujeto divino
  english_pob_reading: the Lord himself
  chosen_spanish_reading: el Señor mismo
  alternative_spanish_readings:
  - Yahvé mismo
  - el mismo Señor
  rationale: El texto griego enfatiza que es el mismo Señor quien actuará. «El Señor mismo» conserva ese énfasis sin introducir una identificación más específica de la que el griego aquí explicita.
  doctrine_reference: Cristología y teología del nombre divino en textos de expectativa
- issue: Relación entre 'luz' y 'justicia'
  english_pob_reading: the light of righteousness
  chosen_spanish_reading: la luz de la justicia
  alternative_spanish_readings:
  - la luz de rectitud
  - la luz justa
  rationale: La construcción mantiene la metáfora original como una cualidad o manifestación asociada con justicia. No se interpreta de manera moralizante adicional; se conserva el genitivo de cualidad del griego/inglés.
  doctrine_reference: Justicia/rectitud en lenguaje bíblico sapiencial y profético
translation_notes:
  revision_awareness: 'Se verificó el contexto auditado: el texto inglés POB no presenta notas ni decisiones léxicas adicionales, y la revisión más reciente indica que no hubo cambios necesarios. Por ello, la traducción española sigue de cerca el griego y el inglés auditado sin introducir notas textuales innecesarias.'
  spanish_consistency_notes:
  - Se conserva el tratamiento reverencial de Κύριος como «el Señor» por coherencia con el POB inglés y porque en este versículo no se exige explícitamente «Yahvé».
  - No se añadieron notas al pie, ya que no hay variantes textuales ni alternativas exegéticas documentadas en el paquete auditado que requirieran marcación en el texto español.
  - Se mantiene un registro sobrio y publicable, con puntuación española estándar y sintaxis directa.
