id: T12P.ZEB.9.4
reference: Testament of Zebulun 9:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 4. ΓΜὴ οὖν˥¹⁵ *χωρισθῆτε ἐν δυσὶ κεφαλαῖς¹⁶. ὅτι πᾶν ὃ ἐποίησεν ὁ¹⁷ Κύριος κεφαλὴν μίαν κέκτηται¹⁸, *καὶ ὤμους δύο, χεῖρας δύο, πόδας δύο καὶ τὰ λοιπὰ μέλη ἅπαντα¹⁹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/009/004.yaml
  text: Therefore do not be divided into two heads, for everything that the Lord made has one head, and two shoulders, two hands, two feet, and all the other members.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:58:04Z'
    unchanged: false
    changes_summary: Changed 'be split under two heads' to 'be divided into two heads' for closer alignment with χωρισθῆτε ἐν δυσὶ κεφαλαῖς and more natural formal English; retained the rest with minor consistency in phrasing.
translation:
  language: es
  text: Por tanto, no se dividan en dos cabezas, porque todo lo que hizo el Señor tiene una sola cabeza, y dos hombros, dos manos, dos pies, y todos los demás miembros.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χωρισθῆτε ἐν δυσὶ κεφαλαῖς
  english_pob_choice: do not be divided into two heads
  chosen_spanish: no se dividan en dos cabezas
  alternatives_spanish:
  - no se separen en dos cabezas
  - no estén divididos en dos cabezas
  - no se partan en dos cabezas
  lexicon: χωρίζω / κεφαλή
  rationale: El griego exige la idea de separación o división, y κεφαλαῖς se mantiene como "cabezas" porque el texto usa la imagen corporal de manera directa. "Divididos" conserva mejor la fuerza del pasivo que una paráfrasis como "separados".
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Yahvé
  lexicon: κύριος
  rationale: Aquí el contexto inmediato del texto griego usa el título κύριος sin cita explícita del nombre divino; se conserva la forma auditada del POB en inglés como "el Señor" por coherencia con esta sección, sin forzar una sustitución por el nombre propio.
- source_word: κεφαλὴν μίαν κέκτηται
  english_pob_choice: has one head
  chosen_spanish: tiene una sola cabeza
  alternatives_spanish:
  - posee una cabeza
  - ha adquirido una sola cabeza
  lexicon: κεφαλή / κέκτημαι
  rationale: '"Tiene" comunica de forma natural el estado poseído indicado por κέκτηται. "Una sola cabeza" conserva la unicidad enfática de μίαν sin volverlo innecesariamente literal.'
- source_word: ὤμους δύο, χεῖρας δύο, πόδας δύο
  english_pob_choice: two shoulders, two hands, two feet
  chosen_spanish: dos hombros, dos manos, dos pies
  alternatives_spanish:
  - dos hombros, dos brazos, dos pies
  - dos hombros, dos manos, dos piernas
  lexicon: ὦμος / χείρ / πούς
  rationale: Se mantiene la enumeración corporal del griego y del POB. "Manos" y "pies" son equivalencias directas y comprensibles; no se introduce reinterpretación anatómica.
- source_word: τὰ λοιπὰ μέλη ἅπαντα
  english_pob_choice: all the other members
  chosen_spanish: todos los demás miembros
  alternatives_spanish:
  - todos los otros miembros
  - todos los demás integrantes del cuerpo
  lexicon: μέλος
  rationale: '"Miembros" es el equivalente natural de μέλη y mantiene la metáfora corporal íntegra. "Todos los demás" refleja ἅπαντα sin añadir contenido.'
theological_decisions:
- issue: Imagen del cuerpo unificado frente a división comunitaria
  english_pob_reading: Therefore do not be divided into two heads
  chosen_spanish_reading: Por tanto, no se dividan en dos cabezas
  alternative_spanish_readings:
  - No se fragmenten en dos cabezas
  - No se separen en dos cabezas
  rationale: 'La lectura conserva la metáfora del cuerpo y la advertencia moral implícita: no vivir como si hubiera dos centros o autoridades en lugar de uno. No se explicita más allá de lo que el griego y el POB inglés sostienen.'
  doctrine_reference: Unidad comunitaria / metáfora corporal
- issue: Término para el referente divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Yahvé
  rationale: Aunque el proyecto suele usar 'Yahvé' para יהוה, en este pasaje la forma transmitida es κύριος en un dicho sapiencial/exhortativo sin marcación directa del nombre hebreo. Se mantiene 'el Señor' para no introducir una decisión no garantizada por el estrato textual disponible.
  doctrine_reference: Uso de título divino en traducción basada en fuente griega
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió 'split under two heads' a 'divided into two heads' para ajustarse mejor a χωρισθῆτε ἐν δυσὶ κεφαλαῖς. La redacción española sigue esa corrección con 'no se dividan en dos cabezas', evitando una imagen menos natural como 'partidos bajo dos cabezas' y manteniendo la enumeración corporal final sin cambios sustanciales.
  spanish_consistency_notes:
  - Se preserva 'el Señor' en lugar de 'Yahvé' por el valor inmediato de κύριος en el texto griego de esta unidad.
  - Se mantiene el vocabulario corporal literal ('cabezas', 'hombros', 'manos', 'pies', 'miembros') para conservar la imagen argumentativa.
  - La frase inicial 'Por tanto' refleja la inferencia conclusiva de οὖν y concuerda con el POB inglés.
