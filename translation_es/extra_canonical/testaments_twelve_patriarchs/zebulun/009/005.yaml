source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 5. Ἔγνων *γὰρ ἐγὼ²⁰ ἐν γραφῇ τῶν²¹ πατέρων μου, ὅτι²² Διαιρεθήσεσθε ἐν Ἰσραήλ²³, καὶ δύο²⁴ βασιλείαις²⁵ ἐξακολουθήσετε²⁶, καὶ πᾶν βδέλυγμα ποιήσετε.
