base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/009/005.yaml
  text: For I have learned from the writings of my fathers that you will be divided in Israel, and you will follow after two kingdoms, and you will commit every abomination.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:58:05Z'
    unchanged: false
    changes_summary: Changed 'follow two kingdoms' to 'follow after two kingdoms' for a more natural rendering of ἐξακολουθήσετε, and 'do every abomination' to 'commit every abomination' for more formal, idiomatic English.
translation:
  language: es
  text: Porque he aprendido de los escritos de mis padres que ustedes serán divididos en Israel, y seguirán[a] a dos reinos, y cometerán toda abominación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «seguirán a» refleja una relación de adhesión o seguimiento tras dos reinos; también puede entenderse como «irán tras dos reinos».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἔγνων γὰρ ἐγώ
  english_pob_choice: For I have learned
  chosen_spanish: Porque he aprendido
  alternatives_spanish:
  - Porque he llegado a saber
  - Porque he conocido
  lexicon: γινώσκω
  rationale: El griego expresa conocimiento adquirido con resultado presente; «he aprendido» conserva ese matiz de adquisición de conocimiento mejor que un simple presente o un calco literal.
- source_word: ἐν γραφῇ τῶν πατέρων μου
  english_pob_choice: from the writings of my fathers
  chosen_spanish: de los escritos de mis padres
  alternatives_spanish:
  - de la escritura de mis padres
  - en la escritura de mis padres
  lexicon: γραφή
  rationale: «Escritos» mantiene el plural implícito del contexto y la referencia a testimonios escritos ancestrales; «mis padres» preserva la relación filial del griego sin imponer una terminología técnica excesiva.
- source_word: Διαιρεθήσεσθε ἐν Ἰσραήλ
  english_pob_choice: you will be divided in Israel
  chosen_spanish: ustedes serán divididos en Israel
  alternatives_spanish:
  - serán divididos en Israel
  - serán separados en Israel
  lexicon: διαιρέω
  rationale: «Serán divididos» sigue de cerca la fuerza pasiva futura del verbo y conserva la imagen de desunión dentro de Israel.
- source_word: καὶ δύο βασιλείαις ἐξακολουθήσετε
  english_pob_choice: and you will follow after two kingdoms
  chosen_spanish: y seguirán a dos reinos
  alternatives_spanish:
  - y seguirán después de dos reinos
  - y irán tras dos reinos
  lexicon: ἐξακολουθέω
  rationale: El inglés auditado añadió «after» para reflejar el valor de seguir tras algo. En español, «seguirán a» comunica esa dependencia/lealtad sin forzar una perífrasis pesada.
- source_word: πᾶν βδέλυγμα ποιήσετε
  english_pob_choice: you will commit every abomination
  chosen_spanish: y cometerán toda abominación
  alternatives_spanish:
  - y harán toda abominación
  - y practicarán toda abominación
  lexicon: βδέλυγμα / ποιέω
  rationale: «Cometerán» conserva el registro moral fuerte que el inglés POB fijó con «commit»; «toda abominación» refleja el singular colectivo del griego y su sentido intensivo.
theological_decisions:
- issue: La división futura de Israel como consecuencia profética
  english_pob_reading: you will be divided in Israel
  chosen_spanish_reading: ustedes serán divididos en Israel
  alternative_spanish_readings:
  - serán divididos en Israel
  - se dividirán en Israel
  rationale: La pasiva mantiene el tono oracular de una acción que les sobreviene, sin convertirla en mera auto-división voluntaria.
  doctrine_reference: Profecía y juicio dentro de la historia de Israel
- issue: Lealtad a dos reinos como señal de infidelidad
  english_pob_reading: you will follow after two kingdoms
  chosen_spanish_reading: seguirán a dos reinos
  alternative_spanish_readings:
  - seguirán después de dos reinos
  - se adherirán a dos reinos
  rationale: La frase conserva la idea de adhesión o seguimiento político-religioso, sin suavizar la tensión entre fidelidad debida a Dios e inclinación hacia poderes humanos.
  doctrine_reference: Lealtad del pueblo de Dios vs. alianzas políticas
- issue: El alcance intensivo de «every abomination»
  english_pob_reading: you will commit every abomination
  chosen_spanish_reading: cometerán toda abominación
  alternative_spanish_readings:
  - harán toda abominación
  - practicarán toda abominación
  rationale: Se conserva el lenguaje moral severo del original y del inglés auditado, evitando eufemismos que debiliten la acusación profética.
  doctrine_reference: Pureza ritual y moral en lenguaje profético
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó ἐξακολουθήσετε a «follow after» y cambió «do every abomination» por «commit every abomination». La redacción española incorpora ambos ajustes con un verbo de seguimiento natural («seguirán a») y un verbo moralmente más preciso («cometerán»).
  spanish_consistency_notes:
  - Se mantiene «Israel» sin artículo para seguir el griego y el inglés auditado.
  - Se usa «abominación» en singular colectivo porque πᾶν βδέλυγμα apunta a la totalidad o clase de acciones abominables.
  - La segunda persona plural española se expresa con «ustedes» por claridad neutral latinoamericana, conservando el futuro profético del original.
