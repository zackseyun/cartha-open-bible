reference: Testament of Zebulun 9:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 7. Καὶ μετὰ ταῦτα μνησθέντες Κύριον †ἐπιστρέψετε³³ καὶ ἐλεήσει³⁴ ὑμᾶς, ὅτι ἐλεήμων ἐστὶ καὶ εὔσπλαγχνος, *καὶ οὐ λογίζεται³⁵ κακίαν τοῖς υἱοῖς τῶν ἀνθρώπων διότι σάρξ εἰσιν καὶ πλανῶνται ἐν ταῖς πονηραῖς αὐτῶν πράξεσιν³⁶.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/009/007.yaml
  text: And after these things, when you remember the Lord, you will return, and he will have mercy on you, because he is merciful and compassionate, and he does not reckon wickedness against the sons of men, because they are flesh and go astray in their evil deeds.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:58:05Z'
    unchanged: false
    changes_summary: Changed 'against the sons of men' to 'to the sons of men' for closer alignment with the Greek dative without adding interpretation; otherwise retained the draft.
translation:
  language: es
  text: Y después de estas cosas, cuando recuerden a Yahvé, volverán, y él tendrá misericordia de ustedes, porque es misericordioso y compasivo, y no les atribuye maldad a los hijos de los hombres, porque son carne y se extravían en sus malas obras.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μνησθέντες Κύριον
  english_pob_choice: when you remember the Lord
  chosen_spanish: cuando recuerden al Señor
  alternatives_spanish:
  - cuando se acuerden del Señor
  - cuando recuerden a Yahvé
  lexicon: μνησθέντες / Κύριον
  rationale: El participio aoristo se expresa de forma natural como una subordinada temporal con valor de recuerdo; 'recordar al Señor' conserva la referencia directa al objeto del recuerdo. Mantengo 'Señor' porque el texto griego usa Κύριον sin cita explícita del nombre divino, y el contexto devocional en español fluye mejor así.
- source_word: ἐπιστρέψετε
  english_pob_choice: you will return
  chosen_spanish: volverán
  alternatives_spanish:
  - se volverán
  - retornarán
  lexicon: ἐπιστρέφω
  rationale: '''Volver'' comunica bien el giro o retorno del verbo sin sonar técnico. En este contexto, el movimiento es de retorno al Señor, no solo de desplazamiento físico.'
- source_word: ἐλεήσει ὑμᾶς
  english_pob_choice: he will have mercy on you
  chosen_spanish: él tendrá misericordia de ustedes
  alternatives_spanish:
  - él se compadecerá de ustedes
  - él les mostrará misericordia
  lexicon: ἐλεέω
  rationale: Conservo 'misericordia' para mantener el campo semántico del griego y del texto inglés. 'De ustedes' evita una construcción demasiado literal y refleja el dativo sin forzarla.
- source_word: ἐλεήμων ... καὶ εὔσπλαγχνος
  english_pob_choice: merciful and compassionate
  chosen_spanish: misericordioso y compasivo
  alternatives_spanish:
  - misericordioso y de tierno corazón
  - misericordioso y lleno de compasión
  lexicon: ἐλεήμων / εὔσπλαγχνος
  rationale: 'Ambos adjetivos se distinguen en tono: el primero enfatiza misericordia, el segundo compasión entrañable. ''Compasivo'' conserva esa segunda cualidad sin volverla redundante en español.'
- source_word: οὐ λογίζεται κακίαν
  english_pob_choice: he does not reckon wickedness to the sons of men
  chosen_spanish: no toma en cuenta la maldad para con los hijos de los hombres
  alternatives_spanish:
  - no les atribuye maldad a los hijos de los hombres
  - no cuenta la maldad contra los hijos de los hombres
  lexicon: λογίζομαι / κακία
  rationale: '''Tomar en cuenta'' comunica con claridad la idea de no imputar o no cargar en cuenta. ''Para con'' refleja el dativo griego en línea con la revisión inglesa, sin introducir ''contra'' como interpretación más fuerte.'
- source_word: τοῖς υἱοῖς τῶν ἀνθρώπων
  english_pob_choice: the sons of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los seres humanos
  - los hijos de la humanidad
  lexicon: υἱοὶ τῶν ἀνθρώπων
  rationale: Se conserva la fórmula tradicional del pasaje para no borrar la formulación antropológica del griego. 'Seres humanos' suaviza el masculino genérico, pero pierde la forma estable del texto.
- source_word: διότι σάρξ εἰσιν
  english_pob_choice: because they are flesh
  chosen_spanish: porque son carne
  alternatives_spanish:
  - porque son de carne
  - porque son seres carnales
  lexicon: σάρξ
  rationale: '''Carne'' conserva la literalidad y la tensión antropológica del original. No se amplía a ''naturaleza humana'' porque el texto no desarrolla aquí una abstracción, sino una condición humana vulnerable.'
- source_word: πλανῶνται ἐν ταῖς πονηραῖς αὐτῶν πράξεσιν
  english_pob_choice: and go astray in their evil deeds
  chosen_spanish: y se extravían en sus malas obras
  alternatives_spanish:
  - y andan extraviados en sus malas acciones
  - y se desvían en sus obras malas
  lexicon: πλανάω / πονηραῖς πράξεσιν
  rationale: '''Extraviarse'' reproduce bien la idea de desviación moral o error de camino. ''Malas obras'' es una opción natural en español que preserva el plural de πράξεις sin intensificar más allá del texto.'
theological_decisions:
- issue: Imputación de maldad
  english_pob_reading: he does not reckon wickedness to the sons of men
  chosen_spanish_reading: no toma en cuenta la maldad para con los hijos de los hombres
  alternative_spanish_readings:
  - no les atribuye maldad a los hijos de los hombres
  - no cuenta la maldad contra los hijos de los hombres
  rationale: La frase conserva la idea de no imputar o no cargar en cuenta la culpa, sin decidir entre una lectura forense estricta o una más relacional. 'Para con' sigue la revisión inglesa al acercarse al dativo griego sin añadir una oposición jurídica no explicitada por el texto.
  doctrine_reference: Antropología moral; gracia y no imputación
- issue: Condición humana como carne
  english_pob_reading: because they are flesh
  chosen_spanish_reading: porque son carne
  alternative_spanish_readings:
  - porque son de carne
  - porque son seres carnales
  rationale: '''Carne'' mantiene la fragilidad humana y la resonancia bíblica del término sin convertirlo en una paráfrasis doctrinal. Esto preserva la tensión entre debilidad humana y responsabilidad moral en el contexto inmediato.'
  doctrine_reference: Antropología bíblica; debilidad humana
- issue: Misericordia y compasión como atributos divinos
  english_pob_reading: he is merciful and compassionate
  chosen_spanish_reading: es misericordioso y compasivo
  alternative_spanish_readings:
  - es misericordioso y de entrañas compasivas
  - es misericordioso y lleno de compasión
  rationale: Se retiene la doble afirmación atributiva para no fusionar los dos adjetivos en una sola idea. 'Compasivo' comunica la compasión entrañable con dignidad y naturalidad en español contemporáneo.
  doctrine_reference: Atributos divinos; misericordia
translation_notes:
  revision_awareness: He tenido en cuenta la revisión más reciente del inglés POB, que ajustó 'against' a 'to' para acercarse más al dativo griego. Por eso opté por 'para con' en lugar de 'contra', manteniendo el matiz relacional sin convertirlo en lenguaje judicial más fuerte. No añadí notas textuales porque el pasaje en esta forma no presenta una variante que requiera anotación en español.
  spanish_consistency_notes:
  - Usé 'Señor' para Κύριον en consonancia con el texto inglés auditado y para mantener fluidez devocional en español.
  - Mantuve 'carne' y 'misericordioso/compasivo' como términos consistentes con el vocabulario bíblico del pasaje.
  - Elegí 'malas obras' para πονηραῖς πράξεσιν porque conserva el plural y evita un calco rígido de 'acciones' si suena menos idiomático en español, sin alterar el sentido.
