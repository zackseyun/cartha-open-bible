  to: Y después de estas cosas, cuando recuerden a Yahvé, volverán, y él tendrá misericordia de ustedes, porque es misericordioso y compasivo, y no les atribuye maldad a los hijos de los hombres, porque son carne y se extravían en sus malas obras.
  rationale: Se corrige 'Señor' a 'Yahvé' para cumplir la terminología base del proyecto y se reemplaza la construcción poco idiomática 'no toma en cuenta la maldad para con' por 'no les atribuye maldad a', que expresa de modo más natural en español la idea de no imputar maldad a los seres humanos, sin intensificar el sentido.
