  revision_rationale: Se corrige 'Señor' a 'Yahvé' para cumplir la terminología base del proyecto y se reemplaza la construcción poco idiomática 'no toma en cuenta la maldad para con' por 'no les atribuye maldad a', que expresa de modo más natural en español la idea de no imputar maldad a los seres humanos, sin intensificar el sentido.
