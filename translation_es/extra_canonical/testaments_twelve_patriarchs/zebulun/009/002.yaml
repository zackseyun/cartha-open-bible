  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 2. Ἐὰν⁸ δὲ εἰς πολλὰ διαιρεθῶσιν⁹, ἡ γῆ ἀφανίζει¹⁰ αὐτά, *καὶ γίνονται¹¹ εὐκαταφρόνητα¹².
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/009/002.yaml
  text: But if they are divided into many parts, the earth destroys them, and they become easy to despise.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:58:01Z'
    unchanged: false
    changes_summary: Replaced interpretive 'streams' with more literal 'parts' for πολλὰ; changed 'ground swallows them up' to 'earth destroys them' to reflect ἀφανίζει more directly; retained the final clause with natural formal English.
translation:
  language: es
  text: Pero si se dividen en muchas partes, la tierra las destruye, y llegan a ser fáciles de despreciar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰς πολλὰ διαιρεθῶσιν
  english_pob_choice: they are divided into many parts
  chosen_spanish: se dividen en muchas partes
  alternatives_spanish:
  - se dividen en muchos riachuelos
  - se dispersan en muchas corrientes
  - se fragmentan en muchas porciones
  lexicon: διαιρεθῶσιν
  rationale: El griego habla de ser divididos en muchas partes, sin requerir una imagen de corrientes o riachuelos. «Se dividen en muchas partes» sigue de cerca la formulación revisada del POB en inglés y evita añadir una metáfora hidráulica no garantizada por el texto.
- source_word: ἡ γῆ ἀφανίζει αὐτά
  english_pob_choice: the earth destroys them
  chosen_spanish: la tierra las destruye
  alternatives_spanish:
  - la tierra las aniquila
  - la tierra las borra
  - la tierra las hace desaparecer
  lexicon: ἀφανίζει
  rationale: ἀφανίζει expresa hacer desaparecer, destruir o anular. «Las destruye» conserva la fuerza más directa del verbo y refleja el ajuste del POB inglés desde una imagen interpretativa hacia una lectura más literal. Se usa «la tierra» para γῆ, no una paráfrasis como «el suelo».
- source_word: καὶ γίνονται εὐκαταφρόνητα
  english_pob_choice: and they become easy to despise
  chosen_spanish: y llegan a ser fáciles de despreciar
  alternatives_spanish:
  - y se vuelven despreciables
  - y se hacen fáciles de menospreciar
  - y llegan a ser objeto de desprecio
  lexicon: εὐκαταφρόνητα
  rationale: εὐκαταφρόνητα describe algo fácil de menospreciar o despreciar. «Fáciles de despreciar» conserva el matiz de accesibilidad al desprecio sin volverlo una etiqueta fija o más fuerte que el griego. «Llegan a ser» traduce el valor de γίνονται de manera natural en español.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que reemplazó «many streams» por «many parts» y «the ground swallows them up» por «the earth destroys them» para ser más literal respecto al griego. La redacción española adopta esa misma línea, evitando introducir imágenes adicionales.
  spanish_consistency_notes:
  - Se mantuvo «tierra» para γῆ, en coherencia con el registro bíblico y con el ajuste revisado del inglés.
  - Se preservó la estructura condicional con «Pero si...», equivalente al δὲ inicial y natural en español.
  - No se añadieron notas porque el griego y el inglés auditado no presentan variantes textuales ni tensiones teológicas documentadas en este versículo.
