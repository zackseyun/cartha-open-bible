translation:
  language: es
  text: Y ustedes también, si se dividen, serán así.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ὑμεῖς
  english_pob_choice: And you also
  chosen_spanish: Y ustedes también
  alternatives_spanish:
  - Y vosotros también
  - Y ustedes asimismo
  lexicon: καί + ὑμεῖς
  rationale: Se mantiene la coordinación simple de Καὶ y el énfasis de ὑμεῖς con una forma natural en español moderno. Se evita una calca más rígida y se conserva el paralelismo con el discurso previo.
- source_word: διαιρεθῆτε
  english_pob_choice: if you are divided
  chosen_spanish: si se dividen
  alternatives_spanish:
  - si están divididos
  - si llegaran a dividirse
  lexicon: διαιρέω
  rationale: El verbo en pasivo comunica la idea de una división interna o fractura del grupo. 'Se dividen' conserva el matiz sin añadir interpretación excesiva ni desplazar el foco a una condición meramente estática.
- source_word: ἔσεσθε
  english_pob_choice: will be
  chosen_spanish: serán
  alternatives_spanish:
  - estarán
  - llegarán a ser
  lexicon: εἰμί
  rationale: Se traduce con el futuro simple de 'ser' para reproducir con claridad el valor resultativo o consecuente del verbo griego. 'Serán así' refleja mejor la equivalencia del estado descrito que 'llegarán a ser'.
- source_word: οὕτως
  english_pob_choice: like this
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - de este modo
  lexicon: οὕτως
  rationale: '''Así'' es la opción más natural y directa en español para conservar la brevedad del deíctico griego y el cierre sentencioso del enunciado.'
theological_decisions:
- issue: Forma del pronombre plural y alcance comunitario
  english_pob_reading: And you also, if you are divided, will be like this.
  chosen_spanish_reading: Y ustedes también, si se dividen, serán así.
  alternative_spanish_readings:
  - Y vosotros también, si os dividís, seréis así.
  - Y ustedes también, si quedan divididos, serán así.
  rationale: El pasaje se dirige al grupo en conjunto; 'ustedes' comunica el plural sin marcar una variante regional específica. No se añade 'quedan' para no suavizar indebidamente el pasivo del griego, que destaca la acción de dividirse.
  doctrine_reference: Exhortación comunitaria y advertencia moral; no introduce afirmaciones doctrinales adicionales.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que ajustó 'So also you' a 'And you also' y 'will become like this' a 'will be like this'. La española refleja ambos cambios con una coordinación directa ('Y ustedes también') y un futuro simple copulativo ('serán así').
  spanish_consistency_notes:
  - Se conserva un español moderno y eclesialmente legible sin acudir a fórmulas arcaizantes.
  - No se introduce 'Mesías', 'Yahvé' ni otra terminología técnica porque el versículo no los contiene.
  - La pasiva griega se expresa de forma natural en español sin convertirla en una construcción explicativa excesiva.
