translation:
  language: es
  text: Pero cuando ellos querían matarlo, yo les rogaba con lágrimas que no cometieran este pecado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πλὴν ὅτε
  english_pob_choice: Yet when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Sin embargo, cuando
  - No obstante, cuando
  lexicon: πλὴν = pero / sin embargo; ὅτε = cuando
  rationale: «Pero cuando» reproduce la transición adversativa natural del griego sin endurecer el ritmo del relato. Mantiene el contraste con la escena anterior sin sobretraducción.
- source_word: ἐβούλοντο ἀνελεῖν αὐτόν
  english_pob_choice: they wanted to kill him
  chosen_spanish: ellos querían matarlo
  alternatives_spanish:
  - querían quitarle la vida
  - querían asesinarlo
  lexicon: βούλομαι = querer; ἀναιρέω = matar / dar muerte
  rationale: «Matarlo» comunica de forma directa el valor de ἀνελεῖν y conserva la fuerza verbal del original. «Asesinarlo» sería más interpretativo y legal, mientras que «quitarle la vida» suaviza demasiado el enunciado.
- source_word: ἐγὼ μετὰ δακρύων προσεκάλουν αὐτούς
  english_pob_choice: I pleaded with them with tears
  chosen_spanish: yo les rogaba con lágrimas
  alternatives_spanish:
  - yo les suplicaba entre lágrimas
  - yo los imploraba llorando
  lexicon: προσκαλέω en imperfecto narrativo = rogar / suplicar; μετὰ δακρύων = con lágrimas
  rationale: «Rogaba» refleja bien el valor insistente y continuo del imperfecto; «con lágrimas» mantiene el matiz emocional sin añadir elementos no presentes. «Suplicaba» también es posible, pero «rogar» encaja mejor con la cadencia del testimonio.
- source_word: μὴ ποιῆσαι τὴν ἁμαρτίαν ταύτην
  english_pob_choice: not to commit this sin
  chosen_spanish: que no cometieran este pecado
  alternatives_spanish:
  - que no hicieran este pecado
  - que no perpetraran este pecado
  lexicon: ποιέω + ἁμαρτία = cometer pecado; ταύτην = este
  rationale: «Cometer este pecado» es la equivalencia más natural y fiel en español para la construcción griega. «Hicieran este pecado» suena menos idiomático; «perpetraran» carga el texto con un tono excesivo.
theological_decisions:
- issue: La acción moral prohibida frente al homicidio del hermano
  english_pob_reading: not to commit this sin
  chosen_spanish_reading: que no cometieran este pecado
  alternative_spanish_readings:
  - que no hicieran este pecado
  - que no perpetraran este pecado
  rationale: La frase mantiene el juicio moral explícito del texto sin convertirlo en una glosa doctrinal. «Este pecado» conserva la deíxis del original y deja abierta la identificación contextual con el intento de matar.
  doctrine_reference: Ética bíblica del homicidio fratricida; no se introduce una formulación doctrinal externa.
translation_notes:
  revision_awareness: El texto griego presentado y la POB inglesa coinciden en sentido básico; no se aplicaron revisiones posteriores ni se detectaron variantes textuales que exigieran nota.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» fuera del verso porque no aparece ninguna referencia divina en este segmento.
  - Se usó un registro narrativo sobrio y bíblico, evitando arcaísmos innecesarios como «suplicaba» si no aportaban más precisión.
  - 'La sintaxis española conserva la secuencia temporal y causal del griego: contraste, deseo homicida, intercesión llorosa y prohibición moral.'
