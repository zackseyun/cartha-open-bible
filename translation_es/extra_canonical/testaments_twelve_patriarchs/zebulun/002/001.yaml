translation:
  language: es
  text: Hijos de Zebulón, presten atención a las palabras de su padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: υἱοὶ Ζαβουλών
  english_pob_choice: Sons of Zebulun
  chosen_spanish: Hijos de Zebulón
  alternatives_spanish:
  - Hijos de Zabulón
  - Sons of Zebulón
  lexicon: υἱοὶ = hijos; Ζαβουλών = Zebulón
  rationale: Conservo el vocativo familiar y el nombre propio con la forma bíblica más reconocible en español. 'Hijos' reproduce el plural filial sin añadir un género masculino genérico ajeno al contexto, y Zebulón es la forma usual del nombre en tradición bíblica española.
- source_word: προσέχετε
  english_pob_choice: pay attention to
  chosen_spanish: presten atención a
  alternatives_spanish:
  - atiendan a
  - escuchen atentamente a
  lexicon: προσέχετε = prestar atención, atender con cuidado
  rationale: '''Presten atención a'' expresa bien la llamada imperativa y el matiz de atención cuidadosa, sin sobretraducir hacia obediencia explícita que el verbo griego no exige por sí solo.'
- source_word: ῥήμασιν
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los dichos
  - las palabras pronunciadas
  lexicon: ῥῆμα/ῥήμασιν = palabra, dicho, cosa dicha
  rationale: '''Palabras'' es el equivalente natural y fiel en español. Mantiene el sentido de lo dicho por el padre sin introducir una especificación innecesaria.'
- source_word: τοῦ πατρὸς ὑμῶν
  english_pob_choice: of your father
  chosen_spanish: de su padre
  alternatives_spanish:
  - de vuestro padre
  - de su padre
  lexicon: πατήρ = padre; ὑμῶν = de ustedes / de vosotros
  rationale: Uso 'su padre' para un español bíblico amplio y público. Evita la marcada diferencia entre 'vuestro' y 'su', y conserva el tono de exhortación familiar del original.
theological_decisions:
- issue: Imperative force of προσέχετε
  english_pob_reading: pay attention to
  chosen_spanish_reading: presten atención a
  alternative_spanish_readings:
  - obedezcan a
  - escuchen
  rationale: La forma elegida preserva el énfasis exhortativo sin convertir el mandato en una afirmación doctrinal más fuerte de lo que el verso dice. El texto llama a escuchar con atención las palabras del padre.
  doctrine_reference: Exhortación sapiencial/familiar; no formula doctrina explícita.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; por tanto, esta propuesta sigue de cerca la lectura establecida en el paquete fuente y la traducción inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene un registro directo, solemne y apto para lectura eclesial.
  - No se introducen notas porque el texto griego y la versión inglesa auditada no exigen variantes textuales ni ambigüedades significativas en este verso.
