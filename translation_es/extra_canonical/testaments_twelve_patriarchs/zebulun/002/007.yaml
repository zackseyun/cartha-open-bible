base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/002/007.yaml
  text: For Simeon and Dan and Gad came against Joseph to kill him, and he spoke to them with tears.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:55Z'
    unchanged: false
    changes_summary: Replaced 'he said' with 'he spoke' to better reflect the imperfect verb and improve natural formal English; retained the rest as accurate and complete.
translation:
  language: es
  text: Porque Simeón, Dan y Gad vinieron contra José para matarlo, y les habló con lágrimas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἦλθον ... ἐπὶ τὸν Ἰωσὴφ τοῦ ἀνελεῖν αὐτόν
  english_pob_choice: came against Joseph to kill him
  chosen_spanish: vinieron contra José para matarlo
  alternatives_spanish:
  - fueron contra José para matarlo
  - se acercaron a José para matarlo
  lexicon: ἔρχομαι; ἐπί + acusativo; ἀναιρέω
  rationale: «Vinieron contra» conserva tanto el movimiento hacia José como la hostilidad implícita en ἐπὶ τὸν Ἰωσὴφ. «Para matarlo» expresa con claridad el infinitivo de propósito τοῦ ἀνελεῖν αὐτόν sin añadir matices ajenos.
- source_word: ἔλεγεν αὐτοῖς
  english_pob_choice: he spoke to them
  chosen_spanish: les habló
  alternatives_spanish:
  - les decía
  - les hablaba
  lexicon: λέγω (imperfecto)
  rationale: El imperfecto permite una acción discursiva en curso. «Les habló» es natural en español y conserva el hecho de dirigirse a ellos; evita la rigidez de un calco y mantiene la adecuación literaria del pasaje. «Les decía» y «les hablaba» son posibles, pero «les habló» funciona mejor como verbo principal en una narración breve y solemne.
- source_word: μετὰ δακρύων
  english_pob_choice: with tears
  chosen_spanish: con lágrimas
  alternatives_spanish:
  - entre lágrimas
  - llorando
  lexicon: μετά + genitivo; δάκρυα
  rationale: «Con lágrimas» reproduce de manera directa la expresión adverbial griega. «Entre lágrimas» interpretaría más libremente el modo, y «llorando» cambia la imagen nominal del original.
theological_decisions:
- issue: La acción hostil contra José y el tono penitencial/afectivo de la escena
  english_pob_reading: came against Joseph to kill him ... with tears
  chosen_spanish_reading: vinieron contra José para matarlo ... con lágrimas
  alternative_spanish_readings:
  - vinieron contra José para asesinarlo ... con lágrimas
  - se pusieron contra José para matarlo ... llorando
  rationale: El texto no introduce comentario teológico explícito, pero sí una escena de violencia y afecto. «Matarlo» mantiene la sobriedad del original; no se intensifica a «asesinarlo» sin necesidad. «Con lágrimas» conserva la tensión entre agresión y emoción que el griego presenta de modo conciso.
  doctrine_reference: Ninguna doctrina explícita; fidelidad narrativa y antropología afectiva del relato
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que sustituyó «he said» por «he spoke» para reflejar mejor el imperfecto de λέγω. Por eso se eligió en español una forma verbal que expresa discurso dirigido sin forzar un pretérito puntual más duro; el resto de la frase sigue de cerca el sentido confirmado por la versión inglesa auditada y el griego.
  spanish_consistency_notes:
  - Se mantiene «José» para Ἰωσήφ, conforme a la convención española bíblica estándar.
  - No se introduce «Mesías», «SEÑOR» ni otro término teológico no presente en el versículo.
  - Se conserva un registro sobrio y narrativo acorde con un texto antiguo de traducción directa.
