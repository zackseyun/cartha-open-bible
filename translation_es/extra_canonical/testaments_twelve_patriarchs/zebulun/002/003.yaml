base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/002/003.yaml
  text: And I did not know that I had sinned in my days, except in intention.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:58:26Z'
    unchanged: false
    changes_summary: Updated tense from present to past to match the Greek narrative context, and rendered the verb as past perfect ('had sinned') for smoother, more natural English while preserving the meaning.
translation:
  language: es
  text: Y no supe que había pecado en mis días, sino en intención.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Οὐκ ἔγνων
  english_pob_choice: And I did not know
  chosen_spanish: Y no supe
  alternatives_spanish:
  - Y no conocí
  - Y no comprendí
  lexicon: γινώσκω
  rationale: El verbo aquí expresa no llegar a reconocer o advertir el hecho de haber pecado. En español, «no supe» comunica con naturalidad esa falta de conocimiento o percepción, sin añadir una idea más fuerte de ignorancia moral que el griego no exige.
- source_word: ἥμαρτον
  english_pob_choice: I had sinned
  chosen_spanish: había pecado
  alternatives_spanish:
  - pequé
  - había errado
  lexicon: ἁμαρτάνω
  rationale: El aoristo en contexto narrativo se vierte mejor con pluscuamperfecto en español para reflejar la secuencia temporal establecida por la revisión inglesa. «Había pecado» conserva el valor moral y verbal del original sin volverlo demasiado solemne o arcaico.
- source_word: ἐν ταῖς ἡμέραις μου
  english_pob_choice: in my days
  chosen_spanish: en mis días
  alternatives_spanish:
  - durante mis días
  - en toda mi vida
  lexicon: ἡμέρα
  rationale: La expresión literal «en mis días» es suficientemente clara en español y preserva la forma semítica/idiomática del griego. «Durante mis días» o «en toda mi vida» interpretan más de lo que el texto dice.
- source_word: παρεκτὸς ἐννοίας
  english_pob_choice: except in intention
  chosen_spanish: sino en intención
  alternatives_spanish:
  - salvo en intención
  - excepto en intención
  - fuera de intención
  lexicon: ἐννοία
  rationale: La frase apunta a una falta no plena en acto, sino limitada al plano de la intención o propósito. «Sino en intención» mantiene la oposición y deja visible la tensión entre culpabilidad real y restricción interior que el griego sugiere.
theological_decisions:
- issue: 'Grado de culpa: pecado real pero restringido a la intención'
  english_pob_reading: except in intention
  chosen_spanish_reading: sino en intención
  alternative_spanish_readings:
  - salvo en intención
  - excepto en intención
  rationale: La traducción debe conservar que el hablante admite pecado, pero lo delimita al ámbito de la intención. «Sino en intención» reproduce esa restricción sin suavizarla hacia una mera buena intención subjetiva ni convertirla en una negación total de culpa.
  doctrine_reference: Antropología moral; intención y acto en conciencia
- issue: Tiempos verbales y contexto narrativo
  english_pob_reading: I had sinned
  chosen_spanish_reading: había pecado
  alternative_spanish_readings:
  - pequé
  rationale: La revisión inglesa corrigió el tiempo a pasado perfecto para ajustarse al contexto narrativo. El español sigue esa decisión para respetar la relación temporal del original y evitar una lectura desfasada respecto del marco narrativo.
  doctrine_reference: Coherencia temporal del relato
translation_notes:
  revision_awareness: 'La versión inglesa revisada pasó de presente a pasado: de ''And I do not know that I sinned in my days, except in intention.'' a ''And I did not know that I had sinned in my days, except in intention.'' La propuesta española sigue esa corrección temporal y conserva la restricción final en el plano de la intención.'
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para reproducir el arranque conjuntivo del griego y de la tradición textual.
  - No se introduce terminología eclesiástica añadida; se conserva un registro sobrio y directo.
  - «En mis días» se deja literal por fidelidad al giro idiomático del original, aunque en español suene semítico.
