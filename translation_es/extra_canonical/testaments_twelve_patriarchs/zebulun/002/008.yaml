language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 2. Ἐλεήσατέ με ἀδελφοί μου⁷. οἰκτειρήσατε⁸ σπλάγχνα⁹ Ἰακὼβ τοῦ πατρὸς ἡμῶν¹⁰. Μὴ¹¹ ἐπαγάγετε¹² τὰς χεῖρας ὑμῶν Γτοῦ˥¹³ ἐκχέαι αἷμα ἀθῷον, ὅτι οὐχ ἥμαρτον¹⁴ καὶ πεσὼν εἰς ὑμᾶς.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/002/008.yaml
  text: “Have mercy on me, my brothers; have compassion, by the compassion of Jacob our father. Do not bring your hands upon me to shed innocent blood, for I have not sinned against you.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:57Z'
    unchanged: false
    changes_summary: Revised the second clause to reflect the imperative οἰκτειρήσατε more naturally and to account for σπλάγχνα as 'compassion' rather than 'inward compassion.' Added 'upon me' to make explicit the object implied with 'bring your hands,' and smoothed the English while preserving the formal tone.
translation:
  language: es
  text: «Ten compasión de mí, hermanos míos; tengan compasión, por la compasión de Jacob, nuestro padre. No echen sus manos sobre mí para derramar sangre inocente, porque no he pecado contra ustedes».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐλεήσατέ με
  english_pob_choice: Have mercy on me
  chosen_spanish: Ten compasión de mí
  alternatives_spanish:
  - Ten misericordia de mí
  - Apiádense de mí
  lexicon: ἐλεέω
  rationale: «Ten compasión de mí» conserva el sentido de solicitud de misericordia y suena natural en español bíblico contemporáneo. «Misericordia» sería posible, pero «compasión» mantiene mejor la coherencia con la línea siguiente y con el término griego repetido.
- source_word: οἰκτειρήσατε
  english_pob_choice: have compassion
  chosen_spanish: tengan compasión
  alternatives_spanish:
  - apiádense
  - tengan piedad
  lexicon: οἰκτείρω
  rationale: El griego pide una exhortación a la compasión, no solo a un sentimiento interno. «Tengan compasión» refleja bien ese valor verbal y mantiene paralelismo con la primera cláusula.
- source_word: σπλάγχνα Ἰακὼβ
  english_pob_choice: the compassion of Jacob
  chosen_spanish: la compasión de Jacob
  alternatives_spanish:
  - las entrañas de Jacob
  - el afecto entrañable de Jacob
  lexicon: σπλάγχνα
  rationale: Aunque σπλάγχνα puede referirse literalmente a «entrañas», en este contexto el inglés POB ya optó por «compassion», y en español «compasión» comunica mejor el valor afectivo sin calco corporal innecesario.
- source_word: Μὴ ἐπαγάγετε τὰς χεῖρας ὑμῶν
  english_pob_choice: Do not bring your hands upon me
  chosen_spanish: No echen sus manos sobre mí
  alternatives_spanish:
  - No pongan sus manos sobre mí
  - No extiendan sus manos contra mí
  lexicon: ἐπάγω + χείρ
  rationale: «Echen sus manos sobre mí» reproduce la imagen de agresión física y conserva la fuerza idiomática del imperativo griego. «Sobre mí» explicita el objeto implícito, como hizo la revisión inglesa.
- source_word: αἷμα ἀθῷον
  english_pob_choice: innocent blood
  chosen_spanish: sangre inocente
  alternatives_spanish:
  - sangre de inocente
  - sangre sin culpa
  lexicon: αἷμα ἀθῷον
  rationale: La expresión fija «sangre inocente» es idiomática en español bíblico y preserva el sentido jurídico-moral del original.
- source_word: οὐχ ἥμαρτον
  english_pob_choice: I have not sinned
  chosen_spanish: no he pecado
  alternatives_spanish:
  - no he cometido pecado
  - no he faltado
  lexicon: ἁμαρτάνω
  rationale: «No he pecado» es la forma más directa y fiel para el perfecto griego, manteniendo la negativa de culpa personal que motiva la súplica.
theological_decisions:
- issue: Repetición de compasión / misericordia en la súplica
  english_pob_reading: Have mercy on me... have compassion...
  chosen_spanish_reading: Ten compasión de mí... tengan compasión...
  alternative_spanish_readings:
  - Ten misericordia de mí... tengan misericordia...
  - Apiádense de mí... apiádense...
  rationale: Se preserva la duplicación del ruego sin suavizarla. «Compasión» se repite para reflejar el énfasis del griego y la revisión inglesa, evitando introducir un cambio semántico no justificado.
  doctrine_reference: Énfasis retórico en la súplica y en la inocencia reclamada; no introduce una formulación doctrinal distinta.
- issue: Relación entre «la compasión de Jacob» y la apelación a los hermanos
  english_pob_reading: by the compassion of Jacob our father
  chosen_spanish_reading: por la compasión de Jacob, nuestro padre
  alternative_spanish_readings:
  - por las entrañas de Jacob, nuestro padre
  - por el afecto compasivo de Jacob, nuestro padre
  rationale: «Por la compasión de Jacob» conserva la referencia a un afecto/fundamento compasivo atribuido a Jacob sin forzar una imagen corporal extraña al español. Mantiene la ambigüedad controlada del sustantivo griego.
  doctrine_reference: Lenguaje afectivo y patriarcal, sin implicaciones dogmáticas especiales.
- issue: Violencia y culpa de sangre inocente
  english_pob_reading: shed innocent blood
  chosen_spanish_reading: derramar sangre inocente
  alternative_spanish_readings:
  - derramar sangre de inocente
  - matar a un inocente
  rationale: Se conserva la fórmula tradicional bíblica de culpa de sangre, que es precisa y reverbera con el peso moral del griego.
  doctrine_reference: Condena de homicidio injusto; resonancias ético-legales del lenguaje bíblico sobre sangre inocente.
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó la segunda cláusula para reflejar más naturalmente οἰκτειρήσατε y trató σπλάγχνα como «compassion» en lugar de un calco interno. También explicitó «upon me» en la cláusula de las manos. La redacción española sigue esa revisión, manteniendo la duplicación de compasión y haciendo explícito «sobre mí» en la imagen de violencia.
  spanish_consistency_notes:
  - Se usó «compasión» de forma consistente en ambas cláusulas para reflejar tanto οἰκτεῖραι como σπλάγχνα según el contexto del verso.
  - Se evitó «SEÑOR» u otra convención de máscara porque no aparece YHWH ni κύριος en este pasaje.
  - Se mantuvo un registro bíblico claro pero no arcaizante; «ustedes» corresponde al plural de segunda persona del español latinoamericano neutral.
