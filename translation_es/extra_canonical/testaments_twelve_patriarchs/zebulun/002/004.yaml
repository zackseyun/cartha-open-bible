source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 5. Οὐ²⁷ μνήσκομαι²⁸ ὅτι παρανομίαν ἐποίησα, πλὴν τὴν ἄγνοιαν ἣν ἐποίησα²⁹ ἐπὶ τοῦ³⁰ Ἰωσήφ, ὅτι ἐβεβαίωσα³¹ τοῖς ἀδελφοῖς μου³² *μὴ εἰπεῖν³³ *τῷ πατρί μου³⁴ τὸ γενόμενον.
