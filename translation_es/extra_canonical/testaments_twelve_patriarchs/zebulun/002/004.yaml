base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/002/004.yaml
  text: I do not remember that I committed lawlessness, except for the ignorance that I committed concerning Joseph, in that I assured my brothers not to tell my father what had happened.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:58:28Z'
    unchanged: false
    changes_summary: Revised 'showed' to 'committed' to reflect the repeated verb more closely; changed 'gave my brothers my word' to 'assured my brothers' to better match the Greek verb while keeping formal natural English.
translation:
  language: es
  text: No recuerdo haber cometido iniquidad, salvo la ignorancia que cometí respecto de José, al asegurar a mis hermanos que no dijeran a mi padre lo sucedido.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Οὐ μνήσκομαι
  english_pob_choice: I do not remember
  chosen_spanish: No recuerdo
  alternatives_spanish:
  - No me acuerdo
  - No tengo presente
  lexicon: μνήσκομαι
  rationale: El verbo griego expresa recordar o tener presente; «No recuerdo» es natural en español y mantiene el sentido de memoria sin añadir matiz emocional.
- source_word: παρανομίαν
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - ilegalidad
  - transgresión
  - maldad
  lexicon: παρανομία
  rationale: «Iniquidad» conserva el peso moral y legal de παρανομία sin sonar mecánico en español. «Ilegalidad» sería demasiado jurídico; «transgresión» suaviza el impacto.
- source_word: ἄγνοιαν
  english_pob_choice: ignorance
  chosen_spanish: ignorancia
  alternatives_spanish:
  - desconocimiento
  - falta de conocimiento
  lexicon: ἄγνοια
  rationale: La versión inglesa ya fija «ignorance»; «ignorancia» es la correspondencia directa y suena natural en el registro del pasaje.
- source_word: ἐπὶ τοῦ Ἰωσήφ
  english_pob_choice: concerning Joseph
  chosen_spanish: respecto de José
  alternatives_spanish:
  - acerca de José
  - en cuanto a José
  lexicon: ἐπί
  rationale: La preposición con genitivo aquí marca referencia temática. «Respecto de» conserva el valor relacional sin sobreinterpretar.
- source_word: ἐβεβαίωσα τοῖς ἀδελφοῖς μου
  english_pob_choice: I assured my brothers
  chosen_spanish: al asegurar a mis hermanos
  alternatives_spanish:
  - al confirmar a mis hermanos
  - al prometer a mis hermanos
  lexicon: βεβαιόω
  rationale: El ajuste inglés abandonó la frase idiomática «gave my word» para reflejar mejor el verbo. En español, «asegurar» reproduce esa garantía verbal de forma natural y fiel.
- source_word: μὴ εἰπεῖν
  english_pob_choice: not to tell
  chosen_spanish: que no dijeran
  alternatives_spanish:
  - no contar
  - no decir
  lexicon: λέγω
  rationale: El infinitivo de finalidad/complemento se expresa con una subordinada en español. «Que no dijeran» conserva el mandato negativo implícito y es idiomático.
- source_word: τῷ πατρί μου
  english_pob_choice: my father
  chosen_spanish: a mi padre
  alternatives_spanish:
  - a mi padre mío
  lexicon: πατήρ
  rationale: Dativo de destinatario; la preposición «a» es la solución normal en español para el complemento indirecto.
- source_word: τὸ γενόμενον
  english_pob_choice: what had happened
  chosen_spanish: lo sucedido
  alternatives_spanish:
  - lo ocurrido
  - lo que había acontecido
  lexicon: γίνομαι
  rationale: «Lo sucedido» captura el resultado/evento de manera sobria y fluida. Mantiene el pasado sin forzar una perífrasis más pesada.
theological_decisions:
- issue: Autodefinición moral de la acción respecto a José
  english_pob_reading: I do not remember that I committed lawlessness, except for the ignorance that I committed concerning Joseph
  chosen_spanish_reading: No recuerdo haber cometido iniquidad, salvo la ignorancia que cometí respecto de José
  alternative_spanish_readings:
  - No recuerdo haber cometido pecado, salvo la ignorancia que cometí respecto de José
  - No recuerdo haber cometido transgresión, salvo la ignorancia que cometí respecto de José
  rationale: El texto distingue entre «lawlessness» y una falta específica llamada «ignorance». «Iniquidad» conserva el contraste fuerte sin convertirlo en una categoría doctrinal posterior que el griego no exige. «Ignorancia» mantiene la autocrítica del pasaje tal como está.
  doctrine_reference: Ética narrativa / confesión de culpa
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente, que sustituyó una formulación más interpretativa por una más cercana al verbo repetido en el griego: «committed lawlessness» y «assured my brothers». Por eso el español evita suavizar ambos elementos y conserva la repetición conceptual de cometer/asegurar.'
  spanish_consistency_notes:
  - Se usa «José» para Ἰωσήφ, coherente con el uso bíblico habitual en español.
  - Se mantiene un registro sobrio y confesional, sin agregar explicaciones ausentes del griego.
  - No se introducen notas de pie porque el pasaje no presenta una alternativa textual o lexemática que requiera marcación en el texto principal.
