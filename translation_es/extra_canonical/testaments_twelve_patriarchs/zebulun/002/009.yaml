source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 3. Εἰ δὲ καὶ¹⁵ ἥμαρτον, ἐν παιδείᾳ παιδεύσατέ με, Γἀδελφοί μου˥¹⁶, *τὴν δὲ χεῖρα ὑμῶν μὴ¹⁷ *ἐνέγκατε ἐν φόνῳ ἀδελφοῦ ὑμῶν¹⁸ διὰ Ἰακὼβ τὸν πατέρα ὑμῶν¹⁹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/002/009.yaml
  text: But even if I have sinned, discipline me with discipline, my brothers; but do not raise your hand in the murder of your brother, for the sake of Jacob your father.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:56Z'
    unchanged: false
    changes_summary: Revised 'with correction' to the more literal 'with discipline' for παιδείᾳ παιδεύσατέ; changed 'bring your hand to' to the more natural and faithful 'raise your hand in'; retained formal register and completeness.
translation:
  language: es
  text: Pero aun si he pecado, disciplínenme con disciplina, hermanos míos; pero no alcen su mano para el asesinato de su hermano, por causa de Jacob, su padre.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παιδείᾳ παιδεύσατέ με
  english_pob_choice: discipline me with discipline
  chosen_spanish: disciplínenme con disciplina
  alternatives_spanish:
  - corríjanme con corrección
  - repréndanme con disciplina
  lexicon: παιδεύω / παιδεία
  rationale: La repetición intensifica la idea de corrección formativa y disciplinaria; en español, «disciplínenme con disciplina» conserva esa repetición y el peso literal mejor que una paráfrasis más suave. El plural imperativo refleja el plural griego y la forma de trato fraternal.
- source_word: ἀδελφοί μου
  english_pob_choice: my brothers
  chosen_spanish: hermanos míos
  alternatives_spanish:
  - mis hermanos
  - hermanos
  lexicon: ἀδελφός
  rationale: «Hermanos míos» es natural, solemne y mantiene la relación fraterna directa del vocativo griego.
- source_word: τὴν δὲ χεῖρα ὑμῶν μὴ ἐνέγκατε
  english_pob_choice: do not raise your hand
  chosen_spanish: pero no alcen su mano
  alternatives_spanish:
  - pero no levanten su mano
  - pero no extiendan su mano
  lexicon: χείρ / φέρω
  rationale: La revisión inglesa eligió una expresión más natural y fiel a la idiomática griega. En español, «alcen su mano» transmite la acción de levantar la mano para un acto violento sin suavizarla excesivamente.
- source_word: ἐν φόνῳ ἀδεφοῦ ὑμῶν
  english_pob_choice: in the murder of your brother
  chosen_spanish: para el asesinato de su hermano
  alternatives_spanish:
  - en el asesinato de su hermano
  - en el homicidio de su hermano
  lexicon: φόνος
  rationale: «Asesinato» preserva la fuerza moral y deliberada de φόνος; «homicidio» sería más técnico y menos directo para este contexto exhortativo.
- source_word: διὰ Ἰακὼβ τὸν πατέρα ὑμῶν
  english_pob_choice: for the sake of Jacob your father
  chosen_spanish: por causa de Jacob, su padre
  alternatives_spanish:
  - por amor de Jacob, su padre
  - a causa de Jacob, su padre
  lexicon: διά + acusativo
  rationale: «Por causa de» conserva el valor causal o motivacional del griego y sigue de cerca la lectura inglesa. Mantiene el tono exhortativo y la referencia filial a Jacob.
theological_decisions:
- issue: Disciplina correctiva frente a castigo punitivo
  english_pob_reading: discipline me with discipline
  chosen_spanish_reading: disciplínenme con disciplina
  alternative_spanish_readings:
  - corríjanme con corrección
  - castíguenme
  rationale: El texto pide corrección formativa aun en presencia de pecado, no venganza privada. «Disciplina» comunica mejor el sentido pedagógico de παιδεία / παιδεύω que un simple castigo.
  doctrine_reference: disciplina correctiva; corrección fraterna
- issue: Prohibición de violencia fratricida
  english_pob_reading: do not raise your hand in the murder of your brother
  chosen_spanish_reading: pero no alcen su mano para el asesinato de su hermano
  alternative_spanish_readings:
  - pero no levanten la mano contra su hermano
  - pero no se manchen con el asesinato de su hermano
  rationale: 'La advertencia enfatiza la acción violenta concreta y su gravedad moral: no deben participar en el asesinato de un hermano. La formulación elegida preserva el mandato directo sin diluirlo en una expresión demasiado idiomática.'
  doctrine_reference: santidad de la vida; prohibición del fratricidio
- issue: Apelación al honor paterno como motivo moral
  english_pob_reading: for the sake of Jacob your father
  chosen_spanish_reading: por causa de Jacob, su padre
  alternative_spanish_readings:
  - por amor de Jacob, su padre
  - en atención a Jacob, su padre
  rationale: La motivación no es meramente sentimental; funciona como apelación a la lealtad familiar y a la memoria del padre. «Por causa de» mantiene esa base motivacional sin añadir énfasis no atestiguado.
  doctrine_reference: honra familiar; responsabilidad comunitaria
translation_notes:
  revision_awareness: 'La versión inglesa revisó dos puntos para mayor literalidad: cambió «with correction» a «with discipline» para reflejar con más exactitud παιδείᾳ παιδεύσατέ, y cambió «bring your hand to» a «raise your hand in» para capturar mejor la imagen griega de participación activa en violencia. La traducción española sigue esas decisiones y mantiene la repetición intensiva, el tono exhortativo y la referencia a la acción homicida sin atenuarla.'
  spanish_consistency_notes:
  - Se mantiene «disciplina» como equivalente principal de παιδεία / παιδεύω en este contexto.
  - Se usa «hermanos» para el vocativo fraternal directo, coherente con el registro bíblico pero en español moderno.
  - Se evita «SEÑOR» o terminología eclesial ajena porque no aparecen en el pasaje.
  - «Asesinato» se conserva para reflejar la gravedad de φόνος y la violencia deliberada implícita.
  - La puntuación y el orden siguen el flujo de la exhortación griega y la lectura inglesa auditada.
