source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 3. Εἰ δὲ καὶ¹⁵ ἥμαρτον, ἐν παιδείᾳ παιδεύσατέ με, Γἀδελφοί μου˥¹⁶, *τὴν δὲ χεῖρα ὑμῶν μὴ¹⁷ *ἐνέγκατε ἐν φόνῳ ἀδελφοῦ ὑμῶν¹⁸ διὰ Ἰακὼβ τὸν πατέρα ὑμῶν¹⁹.
