review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y la revisión inglesa: confesión condicional de pecado, petición de corrección disciplinaria y prohibición del fratricidio apelando a Jacob. Sin embargo, hay dos desajustes de fidelidad/idiomaticidad: ἐν φόνῳ se refleja mejor como «en el asesinato» que como «para el asesinato», y la secuencia «alcen su mano» suena menos natural en español bíblico actual que «levanten la mano».'
  spanish_quality_summary: 'El registro es digno y claro, pero «disciplínenme con disciplina» resulta algo duro aunque aceptable por literalidad. La mejora principal es idiomática: «no levanten la mano en el asesinato de su hermano» preserva mejor la imagen y la construcción del original que «no alcen su mano para el asesinato». También conviene mantener consistencia pronominal formal con «su hermano / su padre».'
  glossary_alignment: No hay términos de glosario mayor en disputa. «Disciplina» para παιδεία/παιδεύω está alineado con la decisión auditada. «Hermanos míos» es una buena representación de ἀδελφοί μου. «Jacob» está correcto. La cuestión principal no es terminológica sino sintáctico-lexical en la representación de χεῖρα... μὴ ἐνέγκατε ἐν φόνῳ.
  issues:
  - severity: medium
    issue: «para el asesinato» debilita la preposición griega ἐν
    rationale: El griego dice ἐν φόνῳ, y la inglesa auditada lo mantiene como «in the murder». En español, «en el asesinato» conserva mejor la implicación de participación en el acto, mientras «para el asesinato» suena más final y menos cercano al original.
  - severity: low
    issue: «alcen su mano» es menos natural que «levanten la mano»
    rationale: Aunque comprensible, «levantar la mano» es la locución española más idiomática para amenaza o violencia. Ayuda a la legibilidad sin alejarse del sentido de «raise your hand».
  - severity: low
    issue: Artículo posesivo en «su mano» puede simplificarse
    rationale: En español, «no levanten la mano» suena más natural que «no alcen su mano» y mantiene el referente sin pérdida de sentido.
  revised_spanish_text: Pero aun si he pecado, disciplínenme con disciplina, hermanos míos; pero no levanten la mano en el asesinato de su hermano, por causa de Jacob, su padre.”
  revision_rationale: 'Se ajustó la frase de violencia para reflejar mejor el griego ἐν φόνῳ y la revisión inglesa auditada: «levanten la mano en el asesinato» es más fiel e idiomático que «alcen su mano para el asesinato». No se añadieron notas porque no hay ambigüedad nueva en español que exija aclaración.'
