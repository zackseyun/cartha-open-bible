revisions:
- from: Pero aun si he pecado, disciplínenme con disciplina, hermanos míos; pero no alcen su mano para el asesinato de su hermano, por causa de Jacob, su padre.”
  to: Pero aun si he pecado, disciplínenme con disciplina, hermanos míos; pero no levanten la mano en el asesinato de su hermano, por causa de Jacob, su padre.”
