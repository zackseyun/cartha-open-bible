translation:
  language: es
  text: Y mientras decía estas palabras con dolor, al no poder soportar yo sus lamentos, empecé a llorar, y mi hígado fue derramado, y toda la sustancia de mis entrañas se debilitó.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὡς δὲ ἔλεγεν ... τὰ ῥήματα ταῦτα
  english_pob_choice: And as he spoke these words
  chosen_spanish: Y mientras decía estas palabras
  alternatives_spanish:
  - Y cuando decía estas palabras
  - Y al decir estas palabras
  lexicon: ὡς; λέγω; ῥῆμα
  rationale: Conservo la relación temporal/progresiva de ὡς δέ con una construcción natural en español. 'Estas palabras' refleja τὰ ῥήματα ταῦτα sin añadir contenido.
- source_word: Γὀδυρόμενος / οἰμωγῶν
  english_pob_choice: in grief ... his cries
  chosen_spanish: con dolor ... sus lamentos
  alternatives_spanish:
  - lamentándose ... sus gritos
  - afligido ... sus gemidos
  lexicon: ὀδύρομαι; οἰμωγή
  rationale: '''Con dolor'' expresa el estado de aflicción del hablante; ''lamentos'' conserva el valor acústico y lamentoso de οἰμωγαί mejor que un simple ''gritos''.'
- source_word: μὴ φέρων ἐγὼ
  english_pob_choice: while I could not bear
  chosen_spanish: al no poder soportar yo
  alternatives_spanish:
  - porque yo no podía soportar
  - pues no pudiendo yo soportar
  lexicon: φέρω
  rationale: '''Al no poder soportar yo'' mantiene la dependencia circunstancial y el énfasis en la primera persona, sin volver la frase más idiomática de lo que permite el griego.'
- source_word: τῶν οἰμωγῶν
  english_pob_choice: his cries
  chosen_spanish: sus lamentos
  alternatives_spanish:
  - sus gemidos
  - sus clamores
  lexicon: οἰμωγή
  rationale: La referencia es a las lamentaciones audibles que no podía soportar; 'lamentos' es más exacto y menos ruidista que 'gritos'.
- source_word: Γἠρξάμην κλαίειν
  english_pob_choice: I began to weep
  chosen_spanish: empecé a llorar
  alternatives_spanish:
  - comencé a llorar
  - me puse a llorar
  lexicon: ἄρχομαι; κλαίω
  rationale: Equivale de forma directa y natural al aoristo ingresivo.
- source_word: τὰ ἤπατά μου
  english_pob_choice: my liver
  chosen_spanish: mi hígado
  alternatives_spanish:
  - mis entrañas
  - mi interior
  lexicon: ἧπαρ
  rationale: Se conserva la concreción corporal del griego. Aunque en español suena extraña la imagen, el texto pide mantener la metáfora fisiológica sin suavizarla.
- source_word: ἐξεχύθησαν
  english_pob_choice: was poured out
  chosen_spanish: fue derramado
  alternatives_spanish:
  - se derramó
  - se vertió
  lexicon: ἐκχέω
  rationale: El pasivo 'fue derramado' sigue la imagen de derramamiento del original y reproduce la fuerza intensa del verbo.
- source_word: πᾶσα ἡ ὑπόστασις τῶν σπλάγχνων μου
  english_pob_choice: all the substance of my inward parts
  chosen_spanish: toda la sustancia de mis entrañas
  alternatives_spanish:
  - todo el soporte de mis entrañas
  - toda la consistencia de mis entrañas
  lexicon: ὑπόστασις; σπλάγχνα
  rationale: '''Sustancia'' corresponde a ὑπόστασις en su sentido de consistencia/sustrato, y ''entrañas'' conserva σπλάγχνα con el registro corporal y afectivo del original.'
- source_word: ἐχαυνοῦτο
  english_pob_choice: grew faint
  chosen_spanish: se debilitó
  alternatives_spanish:
  - se agotó
  - se desmayó
  lexicon: χαυνόω
  rationale: '''Se debilitó'' expresa el aflojamiento/pérdida de vigor sin forzar una equivalencia médica más precisa de la que el contexto exige.'
theological_decisions:
- issue: Imágenes corporales intensas para el dolor
  english_pob_reading: my liver was poured out, and all the substance of my inward parts grew faint
  chosen_spanish_reading: mi hígado fue derramado, y toda la sustancia de mis entrañas se debilitó
  alternative_spanish_readings:
  - mis entrañas se derramaron
  - mi interior se deshizo
  rationale: No se espiritualiza ni se atenúa la anatomía emocional del texto. Mantener la imagen corporal conserva la fuerza poética y testimonial del pasaje.
  doctrine_reference: Antropología bíblica y lenguaje figurado del sufrimiento
- issue: Sujetos y pronombres explícitos
  english_pob_reading: while I could not bear his cries, I began to weep
  chosen_spanish_reading: al no poder soportar yo sus lamentos, empecé a llorar
  alternative_spanish_readings:
  - cuando no pude soportar sus lamentos, empecé a llorar
  rationale: Se conserva el énfasis en la primera persona que aparece en el griego, sin ocultarlo detrás de una formulación más fluida pero menos audit-able.
  doctrine_reference: Fidelidad sintáctica al testimonio del narrador
translation_notes:
  revision_awareness: He mantenido la lectura ya validada del inglés POB como contexto auditado, sin cambios respecto de la última pasada, y he corregido la entrega para no incluir notas al pie sin ancla textual. No se introdujeron variantes textuales nuevas ni se alteró la segmentación del versículo.
  spanish_consistency_notes:
  - '''Dolor'' y ''lamentos'' se usan para sostener la gama de aflicción del original sin confundirla con ira o miedo.'
  - '''Hígado'' se conserva de manera literal para respetar la antropología figurada del griego.'
  - '''Entrañas'' mantiene la imagen interna y afectiva de σπλάγχνα.'
  - No se usan convenciones eclesiásticas de sustitución para nombres divinos porque este versículo no contiene un teónimo.
