translation:
  language: es
  text: Y lloré junto con José, y mi corazón retumbaba, y las coyunturas de mi cuerpo temblaban, y no tenía fuerzas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἔκλαιον
  english_pob_choice: I wept
  chosen_spanish: lloré
  alternatives_spanish:
  - me lamenté
  - sollozaba
  lexicon: κλαίω
  rationale: El aoristo narrativo expresa un hecho puntual de llanto; en español, «lloré» reproduce de forma natural la acción sin añadir matices de lamento no explícitos en el griego.
- source_word: σὺν τῷ Ἰωσὴφ
  english_pob_choice: together with Joseph
  chosen_spanish: junto con José
  alternatives_spanish:
  - con José
  - a la par de José
  lexicon: σύν + dativo
  rationale: «Junto con» conserva la idea de compañía compartida del original y suena natural en español; «con José» sería correcto pero menos explícito.
- source_word: ἐβόμβει ἡ καρδία μου
  english_pob_choice: my heart thundered
  chosen_spanish: mi corazón retumbaba
  alternatives_spanish:
  - mi corazón tronaba
  - mi corazón resonaba
  lexicon: βομβέω
  rationale: El verbo griego sugiere un zumbido/retumbo fuerte y vibrante. «Retumbaba» mantiene la imagen acústica sin forzar una metáfora más idiosincrática que el español común podría sonar menos idiomática.
- source_word: οἱ ἁρμοὶ τοῦ σώματός μου
  english_pob_choice: the joints of my body
  chosen_spanish: las coyunturas de mi cuerpo
  alternatives_spanish:
  - las articulaciones de mi cuerpo
  - los miembros de mi cuerpo
  lexicon: ἁρμός
  rationale: «Coyunturas» preserva el valor corporal-articular del término y es una opción española válida y reverente; «articulaciones» es más moderno, pero menos literario.
- source_word: ἔτρεμον
  english_pob_choice: trembled
  chosen_spanish: temblaban
  alternatives_spanish:
  - estremecían
  - tiritaron
  lexicon: τρέμω
  rationale: 'El imperfecto pide un proceso continuo: «temblaban» refleja bien la duración y concordancia con el plural del sujeto («las coyunturas»).'
- source_word: οὐκ ἠδυνάμην στῆναι
  english_pob_choice: I had no strength
  chosen_spanish: no tenía fuerzas
  alternatives_spanish:
  - no podía ponerme en pie
  - no era capaz de estarme en pie
  lexicon: δύναμαι + ἵστημι
  rationale: La construcción griega literalmente indica incapacidad para mantenerse de pie, pero el inglés POB opta por el sentido resultante. En español, «no tenía fuerzas» comunica fielmente la debilidad resultante sin sobreespecificar el gesto físico.
theological_decisions:
- issue: Intensidad emocional y corporal del testimonio
  english_pob_reading: And I wept... my heart thundered... the joints of my body trembled... I had no strength.
  chosen_spanish_reading: Y lloré... mi corazón retumbaba... las coyunturas de mi cuerpo temblaban... y no tenía fuerzas.
  alternative_spanish_readings:
  - Y me lamenté...
  - y me faltaban las fuerzas...
  rationale: El pasaje acumula imágenes físicas de dolor y conmoción interior. La traducción conserva esa progresión sin espiritualizarla ni suavizarla, manteniendo la fuerza testimonial del texto fuente.
  doctrine_reference: Expresión narrativa de aflicción; no contiene afirmación doctrinal directa.
translation_notes:
  revision_awareness: 'Se mantiene sin cambios respecto del audit trail inglés más reciente: la versión inglesa aprobada no introdujo notas ni revisiones aplicadas, por lo que el español se redacta directamente desde el griego con el mismo contenido semántico básico.'
  spanish_consistency_notes:
  - Se mantiene «José» para Ἰωσήφ conforme al nombre bíblico estándar en español.
  - Se evita introducir «SEÑOR» u այլ terminología no presente en el versículo.
  - La puntuación reproduce la acumulación paratáctica del original y del inglés POB.
