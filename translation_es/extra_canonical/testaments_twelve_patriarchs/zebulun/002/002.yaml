base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/002/002.yaml
  text: I, Zebulun, became a good gift to my parents; for when I was born, my father increased greatly, and so did the sheep and the cattle, when he had his portion among the variegated rods.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:57Z'
    unchanged: false
    changes_summary: Revised 'prospered greatly' to 'increased greatly' for closer lexical alignment with ηὐξήνθη; added 'so did' for smoother English and clearer coordination; changed 'with the variegated rods he had his share' to 'when he had his portion among the variegated rods' for more natural rendering of ἐν... εἶχον τὸν κλῆρον.
translation:
  language: es
  text: Yo, Zabulón, llegué a ser un buen don para mis padres; porque cuando nací, mi padre se acrecentó mucho, y también las ovejas y el ganado vacuno, cuando tuvo su porción entre las varas jaspeadas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐγὼ Ζαβουλὼν
  english_pob_choice: I, Zebulun
  chosen_spanish: Yo, Zabulón
  alternatives_spanish:
  - Yo, Zebulón
  - Yo, Zabulón mismo
  lexicon: n/a
  rationale: Se conserva la primera persona enfática del original. Se usa «Zabulón» como forma hispana habitual del nombre, manteniendo la identificación directa del hablante.
- source_word: δόσις ἀγαθὴ
  english_pob_choice: a good gift
  chosen_spanish: un buen don
  alternatives_spanish:
  - un buen regalo
  - un don bueno
  lexicon: n/a
  rationale: «δόσις» expresa algo dado, y «don» mantiene mejor el valor de regalo concedido; «buen» preserva el juicio de calidad sin sonar demasiado interpretativo.
- source_word: γέγονα
  english_pob_choice: became
  chosen_spanish: llegué a ser
  alternatives_spanish:
  - me volví
  - fui hecho
  lexicon: n/a
  rationale: «Llegué a ser» comunica el resultado de un cambio/constatación sin añadir una causalidad distinta a la del griego.
- source_word: ηὐξήνθη
  english_pob_choice: increased greatly
  chosen_spanish: aumentó mucho
  alternatives_spanish:
  - creció mucho
  - prosperó mucho
  lexicon: n/a
  rationale: Se sigue la revisión inglesa que prefirió el sentido de crecimiento/aumento. «Aumentó mucho» es cercano a «ηὐξήνθη» y funciona naturalmente en español.
- source_word: τὰ πρόβατα καὶ τὰ βουκόλια
  english_pob_choice: the sheep and the cattle
  chosen_spanish: las ovejas y el ganado vacuno
  alternatives_spanish:
  - las ovejas y el ganado
  - las ovejas y las reses
  lexicon: n/a
  rationale: «πρόβατα» son ovejas; «βουκόλια» apunta al ganado vacuno. Se explicita «vacuno» para evitar ambigüedad en español.
- source_word: ἐν ταῖς ποικίλαις ῥάβδοις
  english_pob_choice: among the variegated rods
  chosen_spanish: entre las varas jaspeadas
  alternatives_spanish:
  - entre las varas variadas
  - entre las varas de varios colores
  lexicon: n/a
  rationale: «ποικίλαις» comunica variedad visual; «jaspeadas» es una opción española natural que conserva la idea de multicolor/variegado sin mecanicismo.
- source_word: τὸν κλῆρον
  english_pob_choice: his portion
  chosen_spanish: su porción
  alternatives_spanish:
  - su suerte
  - su parte
  lexicon: n/a
  rationale: La revisión inglesa optó por «portion». «Porción» mantiene la distribución de herencia/suerte sin imponer un sentido técnico que el contexto no exige.
theological_decisions:
- issue: Autodescripción de bendición familiar y prosperidad del padre/ganado
  english_pob_reading: I, Zebulun, became a good gift to my parents; for when I was born, my father increased greatly, and so did the sheep and the cattle, when he had his portion among the variegated rods.
  chosen_spanish_reading: Yo, Zabulón, llegué a ser un buen don para mis padres; porque cuando nací, mi padre aumentó mucho, y también las ovejas y el ganado vacuno, cuando tuvo su porción entre las varas jaspeadas.
  alternative_spanish_readings:
  - Yo, Zabulón, fui un buen regalo para mis padres...
  - '...mi padre prosperó mucho...'
  rationale: 'Se mantiene el carácter testimonial del pasaje: el nacimiento de Zabulón se presenta como beneficio para sus padres, y el efecto sobre el padre y el ganado se expresa en términos de aumento material. No se introduce una lectura moralizante ni alegórica ajena al texto.'
  doctrine_reference: Testamento de los Doce Patriarcas, testimonio narrativo sin formulación doctrinal normativa
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó 'prospered greatly' a 'increased greatly' y clarificó 'his portion among the variegated rods'. La versión española sigue esos ajustes al preferir 'aumentó mucho' y 'su porción entre las varas jaspeadas'.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «ganado vacuno» para hacer explícito el referente de βουκόλια, sin desplazar el paralelismo con ovejas.
  - No se añaden notas textuales porque el pasaje no presenta variante auditada relevante en el paquete proporcionado.
