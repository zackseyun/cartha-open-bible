source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 3. Ἐγὼ¹⁶ Ζαβουλὼν δόσις ἀγαθὴ¹⁷ γέγονα¹⁸ τοῖς γονεῦσί μου· ἐν γὰρ τῷ τεχθῆναι¹⁹ με, ηὐξήνθη²⁰ ὁ πατήρ μου²¹ σφόδρα καὶ τὰ πρόβατα²² καὶ τὰ βουκόλια, ὅτε²³ *ἐν ταῖς ποικίλαις ῥάβδοις²⁴ εἶχον²⁵ τὸν κλῆρον.
