base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/002/005.yaml
  text: But I wept in secret for many days because of Joseph. For I was afraid of my brothers, because they had all agreed that whoever disclosed the secret should be killed.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:55Z'
    unchanged: false
    changes_summary: Changed 'should be put to death' to 'should be killed' for a more direct rendering of ἀναιρεθῆναι while preserving formal register. No other changes needed.
translation:
  language: es
  text: Pero lloré en secreto durante muchos días por José. Porque tenía miedo de mis hermanos, ya que todos se habían puesto de acuerdo en que quien revelara el secreto debía ser muerto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔκλαιον
  english_pob_choice: I wept
  chosen_spanish: lloré
  alternatives_spanish:
  - me lamenté
  - lloraba
  lexicon: Louw-Nida 25.哭/llorar; BDAG κλαίω
  rationale: El verbo expresa llanto real y continuo; en español, el pretérito perfecto simple ‘lloré’ comunica la acción pasada narrada sin forzar un aspecto progresivo innecesario. ‘Lloraba’ sería posible, pero aquí el flujo narrativo favorece un hecho reportado.
- source_word: ἐν κρυφῇ
  english_pob_choice: in secret
  chosen_spanish: en secreto
  alternatives_spanish:
  - a escondidas
  - ocultamente
  lexicon: BDAG κρυφῇ
  rationale: ‘En secreto’ es la forma natural y transparente en español para mantener la clandestinidad del acto sin añadir matices no presentes en el griego.
- source_word: ἡμέρας πολλὰς
  english_pob_choice: for many days
  chosen_spanish: durante muchos días
  alternatives_spanish:
  - por muchos días
  - muchos días
  lexicon: BDAG ἡμέρα; πολλός
  rationale: ‘Durante muchos días’ conserva la duración extendida del período y suena más idiomático que una mera yuxtaposición en español.
- source_word: διὰ τὸν Ἰωσήφ
  english_pob_choice: because of Joseph
  chosen_spanish: por José
  alternatives_spanish:
  - a causa de José
  - por causa de José
  lexicon: BDAG διά
  rationale: El contexto indica motivo emocional, y ‘por José’ reproduce de manera natural la causa del llanto. ‘A causa de José’ es más explícito pero menos fluido.
- source_word: ἐφοβούμην
  english_pob_choice: I was afraid
  chosen_spanish: tenía miedo
  alternatives_spanish:
  - temía
  - estaba asustado
  lexicon: BDAG φοβέομαι
  rationale: ‘Tenía miedo’ comunica bien el estado de temor continuo en un registro claro y sobrio. ‘Temía’ sería más literal y elevado, pero en español puede sonar más abstracto.
- source_word: συνέθεντο πάντες
  english_pob_choice: they had all agreed
  chosen_spanish: todos se habían puesto de acuerdo
  alternatives_spanish:
  - todos se concertaron
  - todos habían convenido
  lexicon: BDAG συντίθημι
  rationale: La frase griega indica acuerdo conjunto. ‘Se habían puesto de acuerdo’ es la opción más natural y precisa en español para expresar ese consenso deliberado.
- source_word: ὅστις ἐξείπῃ τὸ μυστήριον
  english_pob_choice: whoever disclosed the secret
  chosen_spanish: quien revelara el secreto
  alternatives_spanish:
  - quien contara el secreto
  - quien sacara a luz el secreto
  lexicon: BDAG ἐξείπω; BDAG μυστήριον
  rationale: ‘Revelara’ mantiene el sentido de sacar a la luz algo oculto. ‘Secreto’ es preferible a ‘misterio’ aquí, porque el contenido es una información encubierta entre hermanos, no un ‘misterio’ teológico técnico.
- source_word: ἀναιρεθῆναι
  english_pob_choice: should be killed
  chosen_spanish: debía ser muerto
  alternatives_spanish:
  - debía ser asesinado
  - debía ser matado
  lexicon: BDAG ἀναιρέω
  rationale: La forma pasiva aorista expresa la eliminación/asesinato del transgresor. ‘Debía ser muerto’ preserva la tersura formal y el tono de amenaza colectiva, a la vez que refleja la decisión del grupo sin sobreespecificar el modo.
theological_decisions:
- issue: Nature of the punishment for disclosure
  english_pob_reading: whoever disclosed the secret should be killed
  chosen_spanish_reading: quien revelara el secreto debía ser muerto
  alternative_spanish_readings:
  - quien revelara el secreto debía ser asesinado
  - quien revelara el secreto debía ser matado
  rationale: No se trata de una formulación doctrinal sino de una amenaza narrativa. Mantener ‘ser muerto’ conserva la ambigüedad formal del pasivo griego y evita importar un matiz legal moderno que no está explicitado en el texto.
  doctrine_reference: No doctrinal locus; narrative violence in Testaments of the Twelve Patriarchs
translation_notes:
  revision_awareness: 'The English audit trail records one revision: ''should be put to death'' was changed to ''should be killed'' for a more direct rendering of ἀναιρεθῆναι while preserving formal register. The Spanish draft follows that later, more direct sense with ‘debía ser muerto’, keeping the same restrained register and avoiding an interpretive expansion.'
  spanish_consistency_notes:
  - Se mantiene ‘José’ como forma española estándar para Ἰωσήφ.
  - Se evita ‘misterio’ en favor de ‘secreto’ para no introducir un tecnicismo teológico ajeno al contexto narrativo.
  - El registro es sobrio y formal, coherente con un texto apócrifo/extra canónico de tono patriarcal.
  - La pasiva ‘debía ser muerto’ conserva el tono colectivo y la amenaza general del griego sin añadir un agente explícito.
