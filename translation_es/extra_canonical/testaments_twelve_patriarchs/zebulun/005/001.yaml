lexical_decisions:
- source_word: Ἐπίγνωθι
  english_pob_choice: Recognize
  chosen_spanish: Reconoce
  alternatives_spanish:
  - Identifica
  - Reconoce bien
  lexicon: ἐπιγινώσκω
  rationale: La forma imperativa pide que Jacob identifique el objeto; «reconoce» conserva la idea de discernir o identificar sin volverlo excesivamente explicativo.
- source_word: χιτὼν
  english_pob_choice: tunic
  chosen_spanish: túnica
  alternatives_spanish:
  - túnica
  - vestidura
  lexicon: χιτών
  rationale: «Túnica» es el equivalente directo y natural en español para una prenda interior/exterior larga; mantiene la referencia concreta del relato.
- source_word: αὐτὸν τῷ Ἰακὼβ λέγοντες
  english_pob_choice: And they said to Jacob
  chosen_spanish: Y dijeron a Jacob
  alternatives_spanish:
  - Y le dijeron a Jacob
  - Y hablaron a Jacob
  lexicon: λέγω + dativo
  rationale: El dativo con λέγοντες se vierte de manera natural como «dijeron a Jacob»; el pronombre objeto directo de «αὐτόν» no requiere explicitación en español y queda integrado en el contexto narrativo.
- source_word: καὶ ἐποίησαν οὕτως
  english_pob_choice: And they did so
  chosen_spanish: Y así lo hicieron
  alternatives_spanish:
  - Y lo hicieron así
  - Y procedieron de ese modo
  lexicon: ποιέω
  rationale: La frase idiomática se traduce con una fórmula natural en español que conserva la respuesta obediente sin añadir matiz ajeno.
