base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/005/018.yaml
  text: And when I was in the land of Canaan, by the seashore, I used to catch prey for Jacob my father, and when many were being choked in the sea, I came through unharmed.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: false
    changes_summary: Changed 'fish' to 'prey' to match θήραν/θήρευον, and removed the stray footnote markers from the draft.
translation:
  language: es
  text: Y cuando estaba en la tierra de Canaán, junto a la costa del mar, solía cazar presa para Jacob, mi padre; y cuando muchos eran ahogados en el mar, yo permanecía ileso.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν γῇ Χαναὰν
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en la tierra de Canaan
  - en el país de Canaán
  lexicon: γῆ
  rationale: '"Tierra" reproduce bien el ámbito territorial de γῆ y mantiene la formulación bíblica natural en español. Se conserva "Canaán" como topónimo tradicional y claro.'
- source_word: εἰς τὴν παραλίαν
  english_pob_choice: by the seashore
  chosen_spanish: junto a la costa del mar
  alternatives_spanish:
  - junto a la orilla del mar
  - en la ribera del mar
  lexicon: παραλία
  rationale: El griego apunta a una franja costera. "Junto a la costa del mar" suena natural y comunica la localización sin estrechar indebidamente el sentido a una sola orilla o playa.
- source_word: ἐθήρευον θήραν
  english_pob_choice: I used to catch prey
  chosen_spanish: solía cazar presa
  alternatives_spanish:
  - solía atrapar presa
  - solía cazar
  lexicon: θηρεύω / θήρα
  rationale: Se mantiene la fuerza de la raíz de caza del griego, siguiendo la revisión inglesa que corrigió "fish" a "prey". "Cazar presa" conserva la repetición conceptual del original sin convertirlo en una paráfrasis amplia.
- source_word: τῷ πατρί μου
  english_pob_choice: for Jacob my father
  chosen_spanish: para Jacob, mi padre
  alternatives_spanish:
  - para mi padre Jacob
  - para Jacob, mi padre
  lexicon: dative of advantage / possession
  rationale: '"Para" refleja bien el dativo de beneficio. Se conserva el orden natural español con aposición explicativa, sin forzar un calco.'
- source_word: ἀβλαβὴς διέμενον
  english_pob_choice: I came through unharmed
  chosen_spanish: yo permanecía ileso
  alternatives_spanish:
  - yo quedaba ileso
  - salí ileso
  lexicon: ἀβλαβής / διαμένω
  rationale: El griego comunica permanencia intacta o no dañada. "Permanecía ileso" conserva el aspecto durativo y la idea de quedar sin daño, en armonía con el imperfecto del original.
theological_decisions:
- issue: Descripción de la preservación en medio del peligro marítimo
  english_pob_reading: when many were being choked in the sea, I came through unharmed
  chosen_spanish_reading: cuando muchos eran ahogados en el mar, yo permanecía ileso
  alternative_spanish_readings:
  - cuando muchos se ahogaban en el mar, yo salía ileso
  - cuando muchos eran asfixiados en el mar, yo permanecía ileso
  rationale: El pasaje contrasta la destrucción de muchos con la preservación del hablante. "Ahogados" es la forma más natural en español para el contexto del mar; no se introduce una interpretación doctrinal adicional. Se conserva el contraste retórico del texto.
  doctrine_reference: Providencia y preservación en narración testamentaria; no implica una formulación doctrinal sistemática.
translation_notes:
  revision_awareness: La versión inglesa auditada corrigió un error previo de "fish" a "prey" para ajustarse a θήραν/θήρευον y eliminó marcas espurias. La redacción española sigue esa corrección léxica y no reintroduce la lectura rechazada.
  spanish_consistency_notes:
  - Se conserva "Yahvé" como norma del proyecto cuando aparezca el nombre divino; aquí no hay ocurrencia.
  - Se evita "Cristo" porque el versículo no contiene lenguaje cristológico.
  - '"Presa" se mantiene por la evidencia del griego θήρα, en continuidad con la revisión inglesa.'
  - No se añade puntuación exegética ni glosas interpretativas que no estén sugeridas por el texto fuente.
