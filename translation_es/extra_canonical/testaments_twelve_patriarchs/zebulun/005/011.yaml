base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/005/011.yaml
  text: And Simeon took the tunic and did not want to give it up. For he wanted to cut him down with the sword, being angry because he had not killed him.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
