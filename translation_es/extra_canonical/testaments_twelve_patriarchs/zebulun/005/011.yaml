translation:
  language: es
  text: Y Simeón tomó la túnica y no quiso entregarla. Pues quería destrozarlo con la espada, enfurecido porque no lo había matado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἔλαβε ... τὸν χιτῶνα
  english_pob_choice: took the tunic
  chosen_spanish: tomó la túnica
  alternatives_spanish:
  - tomó la vestidura
  - tomó la prenda
  lexicon: χιτών
  rationale: χιτών nombra una prenda interior o túnica; «túnica» conserva el término tradicional y la especificidad de una prenda concreta sin volverla más general de lo que exige el griego.
- source_word: οὐκ ἤθελε δοῦναι αὐτόν
  english_pob_choice: did not want to give it up
  chosen_spanish: no quiso entregarla
  alternatives_spanish:
  - no quiso darla
  - no quiso cederla
  lexicon: δίδωμι
  rationale: El giro inglés «give it up» expresa renuncia a devolver o ceder el objeto. En español, «entregarla» comunica mejor esa negativa a soltarla que un simple «darla», que sería demasiado neutro.
- source_word: τῇ ῥομφαίᾳ
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - con la cimitarra
  - con la gran espada
  lexicon: ῥομφαία
  rationale: ῥομφαία puede referir una espada grande o espada de hoja ancha; «espada» es suficientemente fiel y legible. Evita sobre-especificar sin apoyo contextual adicional.
- source_word: κατακόψαι αὐτόν
  english_pob_choice: to cut him down
  chosen_spanish: hacerle pedazos
  alternatives_spanish:
  - cortarlo en pedazos
  - derribarlo con la espada
  lexicon: κατακόπτω
  rationale: El verbo intensifica la violencia de cortar repetidamente o destrozar. «Hacerle pedazos» transmite esa fuerza en español sin obligar a leer necesariamente un sentido técnico distinto.
- source_word: ὀργιζόμενος
  english_pob_choice: being angry
  chosen_spanish: enfurecido
  alternatives_spanish:
  - airado
  - irritado
  lexicon: ὀργίζομαι
  rationale: El contexto muestra ira intensa por no haberlo matado; «enfurecido» refleja mejor la carga del participio que «airado» o «enojado».
- source_word: οὐκ ἀνεῖλεν αὐτόν
  english_pob_choice: because he had not killed him
  chosen_spanish: porque no lo había matado
  alternatives_spanish:
  - porque no lo había quitado de en medio
  - porque no lo había hecho morir
  lexicon: ἀναιρέω
  rationale: ἀναιρέω aquí significa matar/quitar la vida. La formulación española sigue de cerca el sentido directo y el motivo explícito de la ira.
theological_decisions:
- issue: Violencia atribuida a Simeón y su presentación narrativa
  english_pob_reading: he wanted to cut him down with the sword, being angry because he had not killed him
  chosen_spanish_reading: quería hacerle pedazos con la espada, enfurecido porque no lo había matado
  alternative_spanish_readings:
  - quería matarlo con la espada
  - quería despedazarlo con la espada
  rationale: No hay mitigación del impulso violento en el griego; la traducción conserva la crudeza del acto y el motivo de la ira, sin añadir interpretación moral que el texto no formula en esta cláusula.
  doctrine_reference: narrative ethics / descriptive violence
translation_notes:
  revision_awareness: Ajusté el final a una negativa de entrega más natural en español («no quiso entregarla») para reflejar mejor la revisión inglesa que precisó «give it up». También conservé la progresión violenta del griego con un verbo intensificado («hacerle pedazos») para no diluir κατακόψαι.
  spanish_consistency_notes:
  - Mantuve «túnica» para χιτών, coherente con un registro bíblico claro y estable.
  - Usé «espada» para ῥομφαία sin forzar una equivalencia más técnica que el contexto no exige.
  - Conservé la referencia pronominal femenina «la» por concordar con «túnica».
