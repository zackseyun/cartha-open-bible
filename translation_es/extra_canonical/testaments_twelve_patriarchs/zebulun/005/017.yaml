base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/005/017.yaml
  text: For the sons of my brothers were sick and were dying because of Joseph, because they had not shown mercy in their inward parts; but my sons were kept free from sickness, as you know.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: false
    changes_summary: Revised “in their hearts” to the more literal “in their inward parts” to reflect ἐν σπλάγχνοις αὐτῶν more closely; otherwise preserved the draft.
translation:
  language: es
  text: Porque los hijos de mis hermanos estaban enfermos y morían a causa de José, porque no habían mostrado misericordia en sus entrañas; pero mis hijos fueron preservados libres de enfermedad, como ustedes saben.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠσθένουν καὶ ἀπέθνησκον
  english_pob_choice: were sick and were dying
  chosen_spanish: estaban enfermos y morían
  alternatives_spanish:
  - estaban debilitados y morían
  - estaban enfermos y estaban muriendo
  lexicon: ἀσθενέω; ἀποθνῄσκω
  rationale: La pareja verbal expresa con claridad un estado de enfermedad seguido de un proceso de muerte. «Estaban enfermos y morían» mantiene la progresión natural en español sin introducir una intensificación no sustentada por el griego.
- source_word: διὰ Ἰωσήφ
  english_pob_choice: because of Joseph
  chosen_spanish: a causa de José
  alternatives_spanish:
  - por José
  - debido a José
  lexicon: διά + genitivo
  rationale: Con genitivo, διά indica causa o motivo. «A causa de José» conserva esa relación causal con un español claro y sobrio.
- source_word: οὐκ ἐποίησαν ἔλεος
  english_pob_choice: they had not shown mercy
  chosen_spanish: no habían mostrado misericordia
  alternatives_spanish:
  - no hicieron misericordia
  - no tuvieron misericordia
  lexicon: ποιέω + ἔλεος
  rationale: El griego habla de realizar/manifestar misericordia. «Habían mostrado misericordia» comunica bien el acto concreto sin perder el matiz verbal de una acción no realizada.
- source_word: ἐν σπλάγχνοις αὐτῶν
  english_pob_choice: in their inward parts
  chosen_spanish: en sus entrañas
  alternatives_spanish:
  - en su interior
  - en sus partes internas
  lexicon: σπλάγχνα
  rationale: Sigo la decisión auditada del inglés de no suavizar a «hearts». «En sus entrañas» refleja el valor corporal y afectivo de σπλάγχνα y mantiene la tensión léxica del texto fuente; en español bíblico es comprensible y más literal que «en su interior».
- source_word: ἄνοσοι διεφυλάχθησαν
  english_pob_choice: were kept free from sickness
  chosen_spanish: fueron preservados libres de enfermedad
  alternatives_spanish:
  - fueron mantenidos sin enfermedad
  - quedaron libres de enfermedad
  lexicon: ἄνοσος; διαφυλάσσω
  rationale: La combinación expresa ausencia de enfermedad y preservación/guarda. «Fueron preservados libres de enfermedad» conserva ambos elementos y evita un giro demasiado idiomático que diluya la forma pasiva del griego.
- source_word: καθὼς οἴδατε
  english_pob_choice: as you know
  chosen_spanish: como ustedes saben
  alternatives_spanish:
  - como saben
  - según ustedes saben
  lexicon: καθώς; οἶδα
  rationale: «Como ustedes saben» reproduce la apelación directa al conocimiento de los oyentes con español natural y reverente.
theological_decisions:
- issue: Relación causal entre la falta de misericordia y la enfermedad
  english_pob_reading: because of Joseph, because they had not shown mercy in their inward parts
  chosen_spanish_reading: a causa de José, porque no habían mostrado misericordia en sus entrañas
  alternative_spanish_readings:
  - por José, porque no habían mostrado misericordia en su interior
  - a causa de José, porque no habían tenido compasión
  rationale: 'Mantengo la doble causalidad del texto: el sufrimiento se vincula a José y a la ausencia de misericordia interior. No se atenúa a una simple falta de sentimientos, porque el griego y el contexto moral del pasaje presentan una responsabilidad real de compasión no ejercida.'
  doctrine_reference: Ética retributiva / misericordia fraterna en literatura testamentaria
- issue: Contraste entre los hermanos y los hijos de Zebulón
  english_pob_reading: but my sons were kept free from sickness
  chosen_spanish_reading: pero mis hijos fueron preservados libres de enfermedad
  alternative_spanish_readings:
  - pero mis hijos quedaron libres de enfermedad
  - pero mis hijos fueron guardados sin enfermedad
  rationale: «Preservados» conserva mejor el matiz pasivo de protección providencial que una simple descripción de estado. El contraste con los hijos de los hermanos sigue siendo claro sin añadir interpretación.
  doctrine_reference: Providencia y preservación divina
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «hearts» a «inward parts» para reflejar con mayor literalidad ἐν σπλάγχνοις αὐτῶν. La versión española adopta esa misma literalidad con «entrañas», evitando retroceder a una lectura suavizada. También se preservó la estructura causal del original y el pasivo de preservación en la cláusula final.
  spanish_consistency_notes:
  - Se usa «José» para Ἰωσήφ, siguiendo el nombre propio bíblico estándar en español.
  - Se mantiene un registro sobrio y bíblico, evitando paráfrasis explicativas.
  - «En sus entrañas» se emplea de manera consistente con otras decisiones POB para σπλάγχνα cuando el contexto requiere fuerza corporal/emocional.
  - No se introducen notas al pie porque no fue necesario señalar variantes textuales o alternativas decisivas en este versículo.
