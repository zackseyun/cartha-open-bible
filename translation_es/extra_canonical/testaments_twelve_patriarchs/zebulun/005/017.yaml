source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 4. *Καὶ γὰρ²⁵ υἱοὶ²⁶ τῶν ἀδελφῶν μου ἠσθένουν καὶ²⁷ ἀπέθνησκον διὰ Ἰωσήφ²⁸, ⌈ὅτι οὐκ ἐποίησαν ἔλεος *ἐν σπλάγχνοις αὐτῶν²⁹⌉. οἱ δὲ *ἐμοὶ υἱοὶ³⁰ ἄνοσοι διεφυλάχθησαν³¹ καθὼς³² οἴδατε³³.
