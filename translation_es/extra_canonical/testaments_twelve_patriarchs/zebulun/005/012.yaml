translation:
  language: es
  text: 'Pero todos nos levantamos y le dijimos: «Si no das la túnica, le diremos a nuestro padre que tú solo hiciste esta mala acción en Israel».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀναστάντες δὲ
  english_pob_choice: But we all rose up
  chosen_spanish: Pero todos nos levantamos
  alternatives_spanish:
  - Pero nos levantamos todos
  - Entonces todos nos levantamos
  lexicon: ἀνίστημι
  rationale: La forma aorística participial expresa el levantarse como acción conjunta y previa al decir; «nos levantamos» es natural en español y conserva el movimiento narrativo. Añadí «todos» porque el griego está reforzado por Γπάντες˥ y el inglés POB también lo expresa explícitamente.
- source_word: Γπάντες˥
  english_pob_choice: we all
  chosen_spanish: todos
  alternatives_spanish:
  - todos nosotros
  - todos juntos
  lexicon: πᾶς
  rationale: El cuantificador refuerza que no habla uno solo sino el grupo entero. «Todos» es la forma más clara y sobria en español.
- source_word: τὸν χιτῶνα
  english_pob_choice: the tunic
  chosen_spanish: la túnica
  alternatives_spanish:
  - la camisa
  - la vestidura interior
  lexicon: χιτών
  rationale: «Túnica» corresponde bien a χιτών y mantiene el valor de prenda concreta sin sobreexplicar.
- source_word: σὺ μόνος
  english_pob_choice: you alone
  chosen_spanish: tú solo
  alternatives_spanish:
  - solo tú
  - tú únicamente
  lexicon: μόνος
  rationale: «Tú solo» conserva el énfasis exclusivo y suena natural en español en una acusación directa.
- source_word: τὸ πονηρὸν τοῦτο
  english_pob_choice: this evil thing
  chosen_spanish: esta mala acción
  alternatives_spanish:
  - esta mala cosa
  - este mal hecho
  lexicon: πονηρός
  rationale: El griego usa un neutro sustantivado con carga moral. «Mala acción» comunica el sentido ético sin sonar forzado; evita rebajar la gravedad de «evil thing» y es idiomático en español.
- source_word: ἐν Ἰσραήλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - dentro de Israel
  - entre Israel
  lexicon: Ἰσραήλ
  rationale: La preposición se conserva de modo directo; el ámbito es el pueblo/territorio de Israel sin necesidad de expansión interpretativa.
theological_decisions:
- issue: La acusación de culpa exclusiva dentro de Israel
  english_pob_reading: you alone did this evil thing in Israel
  chosen_spanish_reading: tú solo hiciste esta mala acción en Israel
  alternative_spanish_readings:
  - solo tú hiciste esta mala acción en Israel
  - tú fuiste el único que hizo esta mala acción en Israel
  rationale: No se introduce una categoría doctrinal nueva; se preserva la imputación exclusiva tal como aparece en el griego y en el inglés POB. «Hiciste» mantiene la segunda persona directa y el tono judicial de la acusación.
  doctrine_reference: Responsabilidad moral individual; acusación comunitaria sin desarrollo doctrinal adicional.
translation_notes:
  revision_awareness: 'Coincide con la última revisión registrada: el inglés POB no introdujo cambios y no había notas previas que obligaran a una alternativa textual o teológica en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; en este versículo no aplica.
  - Se usa «túnica» para χιτών de forma consistente con una prenda concreta y con registro bíblico comprensible.
  - Se conserva un español sobrio y directo, evitando calcos como «cosa mala» o «malvado asunto» que sonarían menos naturales.
