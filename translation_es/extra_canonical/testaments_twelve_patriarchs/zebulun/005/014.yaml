id: T12P.ZEB.5.14
reference: Testament of Zebulun 5:14
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: V. Καὶ νῦν¹, τέκνα μου, παραγγέλλω² ὑμῖν *τοῦ φυλάσσειν τὰς ἐντολὰς Κυρίου³, καὶ ποιεῖν⁴ ἔλεος ⌜πρὸς⌝⁵ τὸν⁶ πλησίον⁷, καὶ εὐσπλαγχνίαν *ἔχειν πρὸς πάντας⁸ οὐ μόνον *ἐν ἀνθρώποις⁹, ἀλλὰ *καὶ ἐν ἀλόγοις ζώοις¹⁰.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/005/014.yaml
  text: And now, my children, I command you to keep the commandments of the Lord, and to show mercy to your neighbor, and to have compassion toward all, not only toward people but also toward unreasoning animals.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: false
    changes_summary: Changed 'guard your neighbor' to 'keep your neighbor' to better reflect the source phrase 'to guard/keep near' while preserving the direct object; made the punctuation match the source clauses.
translation:
  language: es
  text: Y ahora, hijos míos, les mando que guarden los mandamientos de Yahvé, y que muestren misericordia a su prójimo, y que tengan compasión de todos, no solo entre los seres humanos, sino también entre los animales irracionales.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παραγγέλλω
  english_pob_choice: I command you
  chosen_spanish: les mando
  alternatives_spanish:
  - les ordeno
  - les encargo
  lexicon: παραγγέλλω
  rationale: El verbo expresa una instrucción autoritativa y directa. «Les mando» conserva el valor imperativo sin sonar excesivamente militar o jurídico en español moderno.
- source_word: τοῦ φυλάσσειν τὰς ἐντολὰς Κυρίου
  english_pob_choice: to keep the commandments of the Lord
  chosen_spanish: que guarden los mandamientos de Yahvé
  alternatives_spanish:
  - que observen los mandamientos de Yahvé
  - que cumplan los mandamientos de Yahvé
  lexicon: φυλάσσειν / ἐντολάς / Κυρίου
  rationale: «Guardar los mandamientos» es la correspondencia más natural y fiel para φυλάσσειν en este contexto de obediencia. Se vierte Κυρίου como «Yahvé» por la norma del proyecto cuando el texto griego remite al nombre divino.
- source_word: ἔλεος πρὸς τὸν πλησίον
  english_pob_choice: to show mercy to your neighbor
  chosen_spanish: muestren misericordia a su prójimo
  alternatives_spanish:
  - tengan misericordia de su prójimo
  - hagan misericordia a su prójimo
  lexicon: ἔλεος / πλησίον
  rationale: «Misericordia» preserva el campo semántico de ἔλεος, y «a su prójimo» transmite bien la relación dirigida del objeto indirecto. Se evita «vecino» por ser más estrecho y menos bíblico en este contexto.
- source_word: εὐσπλαγχνίαν ἔχειν πρὸς πάντας
  english_pob_choice: to have compassion toward all
  chosen_spanish: que tengan compasión de todos
  alternatives_spanish:
  - que sientan compasión por todos
  - que muestren compasión hacia todos
  lexicon: εὐσπλαγχνίαν ἔχειν
  rationale: La construcción idiomática se vierte de forma natural como «tener compasión». «De todos» refleja πάντας de modo inclusivo y directo.
- source_word: ἐν ἀλόγοις ζώοις
  english_pob_choice: toward unreasoning animals
  chosen_spanish: entre los animales irracionales
  alternatives_spanish:
  - entre los animales sin razón
  - con los animales irracionales
  lexicon: ἀλόγοις ζώοις
  rationale: Se mantiene la tensión lexical de ἀλόγοις con «irracionales», que es más exacto que una paráfrasis zoológica. «Entre» ayuda a conservar el contraste inclusivo del griego con ἐν/among.
theological_decisions:
- issue: Nombre divino en Κυρίου
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Aunque el inglés auditado usa «the Lord», el griego Κυρίου en este corpus suele corresponder al nombre divino, y el proyecto exige explicitarlo como «Yahvé» en el texto principal para mantener la transparencia textual.
  doctrine_reference: Convención editorial del People's Open Bible para el Tetragrámaton en fuentes griegas/hebreas
- issue: Alcance ético de la compasión hacia animales
  english_pob_reading: not only toward people but also toward unreasoning animals
  chosen_spanish_reading: no solo entre los seres humanos, sino también entre los animales irracionales
  alternative_spanish_readings:
  - no solo con las personas, sino también con los animales irracionales
  - no solo hacia los seres humanos, sino también hacia los animales irracionales
  rationale: Se preserva explícitamente la inclusión de los animales en la exhortación ética. «Seres humanos» aclara el contraste con animales sin perder el sentido inclusivo del original.
  doctrine_reference: Ética de la creación y compasión hacia criaturas no humanas en el marco del texto
- issue: Mandato en serie con paralelismo
  english_pob_reading: to keep the commandments... and to show mercy... and to have compassion
  chosen_spanish_reading: que guarden... y que muestren... y que tengan...
  alternative_spanish_readings:
  - guardar... mostrar... tener...
  - que guarden... y muestren... y tengan...
  rationale: Se conserva el paralelismo de infinitivos subordinados bajo un mandato inicial, una solución que refleja bien la sintaxis del griego y resulta clara en español.
  doctrine_reference: Estructura exhortativa del texto
- issue: “Prójimo” frente a “vecino”
  english_pob_reading: neighbor
  chosen_spanish_reading: prójimo
  alternative_spanish_readings:
  - vecino
  - semejante
  rationale: «Prójimo» es el equivalente bíblico más estable para πλησίον y evita restringir la referencia a proximidad geográfica.
  doctrine_reference: Uso bíblico tradicional de πλησίον
translation_notes:
  revision_awareness: La redacción española sigue el ajuste revisado del inglés POB que preserva el objeto directo en la idea de guardar/observar a los mandamientos, no una paráfrasis relacional con el prójimo. También conserva la cláusula final inclusiva respecto de los animales irracionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» para Κυρίου según la convención del proyecto.
  - Se mantiene «mandamientos» en plural para ἐντολάς.
  - «Prójimo» se usa como término bíblico estable para πλησίον.
  - «Animales irracionales» conserva el contraste lexical de ἀλόγοις sin suavizarlo.
