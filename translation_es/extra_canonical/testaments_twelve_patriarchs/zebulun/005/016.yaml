translation:
  language: es
  text: Tengan, pues, misericordia en sus corazones, porque lo que cualquiera haga a su prójimo, así el Señor hará con él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἔχετε ... ἔλεος
  english_pob_choice: Have mercy
  chosen_spanish: Tengan ... misericordia
  alternatives_spanish:
  - Tengan compasión
  - Sean misericordiosos
  lexicon: ἔλεος
  rationale: El griego pide una exhortación imperativa a la actitud de misericordia. «Tengan misericordia» conserva bien el mandato, y «misericordia» mantiene el sustantivo correspondiente al campo semántico de ἔλεος sin suavizarlo en exceso.
- source_word: ἐν σπλάγχνοις ὑμῶν
  english_pob_choice: in your hearts
  chosen_spanish: en sus corazones
  alternatives_spanish:
  - en sus entrañas
  - en lo íntimo de ustedes
  lexicon: σπλάγχνα
  rationale: La POB inglesa interpreta la expresión semítica/antropológica como la interioridad afectiva. En español, «corazones» comunica de forma natural esa sede interior sin perder el valor afectivo de σπλάγχνα. «En lo íntimo» sería posible, pero menos directo y menos alineado con el paralelismo afectivo del contexto.
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - vecino
  - semejante
  lexicon: πλησίον
  rationale: «Prójimo» es el equivalente más estable y reverente en español para el sentido ético de πλῆσίον/πλησίον en este dicho, y evita la restricción geográfica de «vecino».
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: κύριος
  rationale: Aunque el proyecto prefiere «Yahvé» para יהוה, aquí el texto griego usa Κύριος como designación señorial general en una formulación proverbial. Conservé «el Señor» para seguir la lectura del texto fuente y la POB inglesa, sin imponer automáticamente el nombre divino donde el griego no lo explicita de manera directa.
theological_decisions:
- issue: Retribución proporcional aplicada por el Señor
  english_pob_reading: whatever anyone does to his neighbor, so the Lord will do to him
  chosen_spanish_reading: lo que cualquiera haga a su prójimo, así el Señor lo hará con él
  alternative_spanish_readings:
  - lo que uno haga a su prójimo, así el Señor se lo hará
  - lo que cualquiera haga a su prójimo, así el Señor también lo hará con él
  rationale: 'El griego expresa una correspondencia moral: lo que una persona hace al prójimo, eso mismo el Señor hará con ella. La formulación española mantiene esa reciprocidad sin añadir un matiz intensivo que el texto no exige. ''Con él'' refleja la construcción metónica del griego μετʼ αὐτοῦ en un español idiomático.'
  doctrine_reference: Principio de retribución moral; cf. Gálatas 6:7 y la justicia retributiva en la literatura sapiencial.
translation_notes:
  revision_awareness: La revisión inglesa eliminó una nota entre corchetes y ajustó 'a person' a 'anyone' para mayor naturalidad. La versión española sigue ese ajuste con 'cualquiera' y no introduce una nota textual adicional, porque no hay variante relevante en este verso que deba marcarse en español.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para Κύριος en línea con la lectura auditada del inglés POB y con el carácter proverbial de la frase.
  - Se usa 'misericordia' como sustantivo núcleo; no se sustituye por una glosa más interpretativa.
  - '''Prójimo'' conserva el tono ético-bíblico sin arcaizar la redacción.'
  - No se añadió un marcador de nota al texto porque no hay lectura alternativa textual documentada en el paquete fuente.
