    changes_summary: Adjusted the direct object from 'it' to 'him' to reflect the masculine pronoun αὐτόν in the source; kept the rest of the wording unchanged.
translation:
  language: es
  text: Y así se lo dio a ellos. Y ellos hicieron como dijo Dan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ οὕτως δέδωκεν αὐτὸν αὐτοῖς
  english_pob_choice: And so he gave him to them.
  chosen_spanish: Y así se lo dio a ellos.
  alternatives_spanish:
  - Y así les dio a él.
  - Y así se lo dio.
  lexicon: δίδωμι; αὐτόν; αὐτοῖς
  rationale: El griego usa αὐτόν, acusativo masculino singular, por lo que la revisión inglesa corrigió correctamente a ‘him’. En español, ‘se lo dio a ellos’ conserva el objeto directo masculino singular y el destinatario plural, sin perder naturalidad. ‘Les dio a él’ resulta menos idiomático y ‘se lo dio’ podría omitir el dativo plural explícito.
- source_word: ἐποίησαν καθὼς εἶπεν ὁ Δάν
  english_pob_choice: And they did as Dan had said.
  chosen_spanish: Y ellos hicieron como dijo Dan.
  alternatives_spanish:
  - Y hicieron como Dan había dicho.
  - Y actuaron como dijo Dan.
  lexicon: ποιέω; λέγω; ὁ Δάν
  rationale: El aoristo narrativo permite ‘hicieron’ en pasado simple. ‘Como dijo Dan’ reproduce la subordinación directa del griego sin añadir matices de anterioridad que el contexto no exige. ‘Había dicho’ es posible, pero menos directo para este encadenamiento breve.
theological_decisions:
- issue: Referente masculino de αὐτόν
  english_pob_reading: he gave him to them
  chosen_spanish_reading: se lo dio a ellos
  alternative_spanish_readings:
  - se lo dio
  - le dio a él
  rationale: La revisión textual del inglés indica que el objeto es masculino singular, no neutro. En español se mantiene esa fuerza con ‘lo’. No hay una carga doctrinal adicional, pero sí una precisión referencial importante.
  doctrine_reference: Precisión pronominal y concordancia con el griego
translation_notes:
  revision_awareness: 'Se incorporó la corrección reciente del audit trail: el objeto directo debe reflejar αὐτόν (‘him’) y no un neutro (‘it’). No se añadieron notas porque el texto breve no presenta variantes textuales o semánticas que requieran anclaje adicional en español.'
  spanish_consistency_notes:
  - Se preserva ‘Dan’ como nombre propio, conforme al texto fuente.
  - Se evita ‘se lo dio’ sin complemento explícito de destinatario, porque el griego conserva claramente αὐτοῖς (‘a ellos’).
  - El registro es sobrio y bíblico, sin arcaísmos innecesarios.
