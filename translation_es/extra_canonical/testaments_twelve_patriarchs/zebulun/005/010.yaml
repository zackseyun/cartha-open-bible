translation:
  language: es
  text: Porque le despojaron a José de la túnica cuando lo vendían, y lo vistieron con un vestido de esclavo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χιτῶνα
  english_pob_choice: tunic
  chosen_spanish: túnica
  alternatives_spanish:
  - túnica
  - vestidura
  - ropa interior
  lexicon: χιτών
  rationale: «Túnica» conserva el valor de una prenda específica y corresponde bien al inglés POB «tunic» sin introducir una generalización innecesaria. «Vestidura» sería más amplia y menos precisa; «ropa interior» sugeriría una prenda que el contexto no exige.
- source_word: ἐξέδυσαν
  english_pob_choice: stripped
  chosen_spanish: despojaron
  alternatives_spanish:
  - despojaron
  - quitaron
  - desnudaron
  lexicon: ἐκδύω
  rationale: «Despojaron» reproduce el acto de quitar una prenda de modo directo y digno. «Desnudaron» sería más fuerte de lo que el contexto requiere; «quitaron» sería más débil que el verbo griego y el inglés POB.
- source_word: ἐν τῷ πιπράσκειν αὐτόν
  english_pob_choice: when they sold him
  chosen_spanish: cuando lo vendían
  alternatives_spanish:
  - cuando lo vendían
  - cuando lo vendieron
  - al venderlo
  lexicon: πίπρασκω
  rationale: La construcción griega participial admite un valor temporal/progresivo; por eso «cuando lo vendían» conserva la simultaneidad con el acto de vender. El inglés POB revisado optó por «when they sold him» para acercarse más al participio; en español, «lo vendían» mantiene naturalidad y ese trasfondo aspectual. «Cuando lo vendieron» sería posible, pero tiende a fijar el evento como puntal.
- source_word: ἱμάτιον δουλικόν
  english_pob_choice: a slave’s garment
  chosen_spanish: un vestido de esclavo
  alternatives_spanish:
  - un vestido de esclavo
  - una prenda de esclavo
  - un manto de esclavo
  lexicon: ἱμάτιον + δοῦλος
  rationale: Se conserva «esclavo» para δουλικόν, siguiendo el valor léxico fuerte que el proyecto privilegia para δοῦλος y su familia. «Vestido» funciona aquí como prenda/vestidura, en paralelo con el inglés POB «garment»; «prenda» es más neutral pero menos directo, y «manto» introduciría una especificación no garantizada por el griego.
theological_decisions:
- issue: Mantener la fuerza social de δουλικόν sin suavizarla a «siervo»
  english_pob_reading: slave’s garment
  chosen_spanish_reading: vestido de esclavo
  alternative_spanish_readings:
  - vestido de siervo
  - ropa de esclavo
  - vestidura servil
  rationale: El término griego describe pertenencia al ámbito de la esclavitud y el inglés POB preserva esa fuerza. En español, «esclavo» comunica mejor la humillación de José en el relato que una forma más suave como «siervo».
  doctrine_reference: Lexical force of δοῦλος/δουλικόν in narrative humiliation contexts
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «were selling» por «sold» para reflejar más directamente el participio griego. En español se decidió mantener una solución natural que preserve la simultaneidad temporal («cuando lo vendían») sin perder la relación verbal del original; no se añadieron notas porque la diferencia aspectual no exige una glosa en este verso.
  spanish_consistency_notes:
  - Se mantiene el nombre «José» para Ἰωσήφ.
  - Se usa «túnica» para χιτών en coherencia con una prenda concreta y con el inglés auditado.
  - Se conserva «esclavo» por la preferencia terminológica del proyecto para δουλ- cuando el contexto habla de esclavitud literal.
  - La puntuación y el orden de las cláusulas siguen de cerca el griego y el inglés auditado, pero con sintaxis natural en español.
