id: T12P.ZEB.5.15
reference: Testament of Zebulun 5:15
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 2. Διὰ γὰρ ταῦτα εὐλόγησέ με ὁ¹¹ Κύριος, *καὶ πάντων¹² τῶν ἀδελφῶν μου ἀσθενούντων ἐγὼ ἄνοσος παρῆλθον¹³. οἶδε¹⁴ γὰρ¹⁵ Κύριος ἑκάστου τὴν προαίρεσιν¹⁶.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/005/015.yaml
  text: For because of these things the Lord blessed me, and when all my brothers were ill, I passed through unharmed. For the Lord knows each person’s intention.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: false
    changes_summary: Changed 'sick' to 'ill' to better match ἀσθενούντων, 'without illness' to 'unharmed' for natural English and closer sense, and 'purpose' to 'intention' for προαίρεσιν.
translation:
  language: es
  text: Porque por estas cosas Yahvé me bendijo, y cuando todos mis hermanos estaban enfermos, yo pasé sin daño. Porque Yahvé conoce la intención de cada uno.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: YHWH / κύριος
  rationale: El texto griego usa Κύριος en un contexto que alude al nombre divino; la política del proyecto pide usar «Yahvé» en el texto principal cuando el referente es el nombre de Dios, para no ocultarlo con una convención de mayúsculas en español.
- source_word: ἀσθενούντων
  english_pob_choice: ill
  chosen_spanish: estaban enfermos
  alternatives_spanish:
  - estaban illes
  - estaban débiles
  - estaban debilitados
  lexicon: ἀσθενέω
  rationale: «Enfermos» comunica de forma natural el estado general de ἀσθενούντων sin introducir una especificación médica más fuerte de la que el griego exige.
- source_word: ἄνοσος παρῆλθον
  english_pob_choice: passed through unharmed
  chosen_spanish: pasé sin daño
  alternatives_spanish:
  - pasé ileso
  - pasé indemne
  - pasé sin enfermedad
  lexicon: ἄνοσος + παρέρχομαι
  rationale: La expresión griega enfatiza quedar libre de daño o perjuicio al pasar; «sin daño» conserva esa amplitud y evita reducirla únicamente a ausencia de enfermedad, que sería más estrecho que el griego.
- source_word: προαίρεσιν
  english_pob_choice: intention
  chosen_spanish: intención
  alternatives_spanish:
  - propósito
  - voluntad
  - decisión
  lexicon: προαίρεσις
  rationale: La revisión inglesa cambió de «purpose» a «intention», y «intención» reproduce bien en español el matiz de disposición o propósito interior sin forzar una lectura técnica filosófica.
theological_decisions:
- issue: Uso del nombre divino en lugar de una sustitución reverencial
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Dado que el testimonio griego usa Κύριος en un contexto que remite al nombre divino, se preserva la referencia explícita a Yahvé según la terminología base del proyecto; esto evita perder la transparencia del texto fuente.
  doctrine_reference: Éxodo 3:15; práctica editorial del POB sobre יהוה/YHWH
- issue: Relación entre enfermedad de los hermanos y la protección recibida por el hablante
  english_pob_reading: when all my brothers were ill, I passed through unharmed
  chosen_spanish_reading: cuando todos mis hermanos estaban enfermos, yo pasé sin daño
  alternative_spanish_readings:
  - cuando todos mis hermanos estaban enfermos, yo pasé ileso
  - cuando todos mis hermanos estaban enfermos, yo pasé indemne
  rationale: «Sin daño» conserva el paralelo entre el estado de los hermanos y la preservación del hablante sin añadir una inferencia específica (por ejemplo, curación o inmunidad milagrosa) que el texto no formula explícitamente.
  doctrine_reference: Proverbios 18:13; 1 Pedro 1:6-7 (preservación y prueba, sin expansión doctrinal añadida)
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que afinó ἀσθενούντων como «ill», ἄνοσος παρῆλθον como «passed through unharmed» y προαίρεσιν como «intention». La versión española refleja esas mismas decisiones semánticas con equivalentes naturales y transparentes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para Κύριος cuando el contexto remite al nombre divino.
  - «Enfermos» conserva el sentido general de ἀσθενούντων sin sobrerinterpretar la causa o la gravedad.
  - «Pasé sin daño» evita una traducción demasiado literal de «unharmed» pero conserva la idea de preservación.
  - «Intención» reproduce el matiz voluntivo/cognitivo de προαίρεσις y armoniza con la revisión inglesa reciente.
