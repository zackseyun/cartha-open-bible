base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/006/001.yaml
  text: First, then, I made a boat to sail on the sea, because the Lord gave me understanding and wisdom in it.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: false
    changes_summary: Removed the bracketed footnote marker from 'First[a]' for a clean verse text; otherwise retained the draft as accurate and natural.
translation:
  language: es
  text: Primero, pues, hice una barca para navegar sobre el mar, porque el Señor me dio entendimiento y sabiduría en ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πρῶτος οὖν
  english_pob_choice: First, then
  chosen_spanish: Primero, pues
  alternatives_spanish:
  - Primero, entonces
  - En primer lugar, pues
  lexicon: πρῶτος
  rationale: Conserva el orden enfático inicial y el matiz discursivo de οὖν con un conector natural en español. 'Pues' funciona mejor que 'entonces' aquí para el flujo expositivo sin sonar mecánico.
- source_word: σκάφος
  english_pob_choice: boat
  chosen_spanish: barca
  alternatives_spanish:
  - barco
  - embarcación
  lexicon: σκάφος
  rationale: '''Barca'' mantiene un referente náutico simple y suficientemente amplio en español. ''Barco'' puede sonar más grande o moderno; ''embarcación'' es más técnico.'
- source_word: ἐπιπλέειν
  english_pob_choice: to sail
  chosen_spanish: para navegar
  alternatives_spanish:
  - para ir por el mar
  - para surcar el mar
  lexicon: ἐπιπλέω
  rationale: El infinitivo de propósito expresa bien la finalidad del barco. 'Navegar' conserva el sentido de desplazarse sobre el agua sin introducir una imagen demasiado literaria.
- source_word: ἐν τῇ θαλάσσῃ
  english_pob_choice: on the sea
  chosen_spanish: sobre el mar
  alternatives_spanish:
  - en el mar
  - por el mar
  lexicon: θάλασσα
  rationale: '''Sobre el mar'' reproduce la relación espacial del texto inglés y del griego con fluidez en español. ''En el mar'' también sería posible, pero ''sobre'' refuerza el movimiento/uso del barco.'
- source_word: σύνεσιν
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - inteligencia
  lexicon: σύνεσις
  rationale: '''Entendimiento'' es la opción más natural y reverente en español bíblico para la capacidad de comprender y juzgar bien.'
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - sensatez
  lexicon: σοφία
  rationale: '''Sabiduría'' es la correspondencia directa y estable para σοφία en registros bíblicos. ''Prudencia'' estrecharía demasiado el campo semántico.'
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Amo
  lexicon: κύριος
  rationale: Aunque el proyecto prefiere 'Yahvé' para el nombre divino, aquí el contexto griego usa κύριος sin una cita explícita del tetragrámaton. 'El Señor' preserva la forma auditada del POB inglés y evita forzar una identificación que el texto no documenta directamente.
theological_decisions:
- issue: Tratamiento de Κύριος en una afirmación de provisión divina
  english_pob_reading: the Lord gave me understanding and wisdom
  chosen_spanish_reading: el Señor me dio entendimiento y sabiduría
  alternative_spanish_readings:
  - Yahvé me dio entendimiento y sabiduría
  rationale: El pasaje atribuye la capacidad dada al sujeto divino sin requerir una restitución explícita del nombre de Yahvé en esta línea. Mantener 'el Señor' respeta la lectura auditada y evita un cambio teológico no exigido por el griego conservado.
  doctrine_reference: Divine name rendering; κύριος in non-explicit quotation contexts
translation_notes:
  revision_awareness: La revisión auditada eliminó un marcador de nota en el inglés ('First[a]' -> 'First') para dejar el texto limpio. Esta versión española sigue ese texto revisado sin introducir notas donde el original auditado no las conserva.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico natural y sobrio, sin arcaísmos innecesarios.
  - '''Señor'' se usa aquí de forma consistente con el griego κύριος del contexto, no como sustituto automático de Yahvé.'
  - '''Barca'' y ''navegar'' conservan la sencillez del enunciado sin endurecer la sintaxis.'
