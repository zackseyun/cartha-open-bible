translation:
  language: es
  text: Y sujeté un trozo de madera detrás de él, y
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καθῆκα
  english_pob_choice: fastened
  chosen_spanish: sujeté
  alternatives_spanish:
  - aseguré
  - fijé
  - até
  lexicon: καθῆκα
  rationale: El verbo griego expresa la acción de fijar o sujetar algo en su lugar; en español, «sujeté» comunica de manera natural y precisa esa acción sin añadir detalles no presentes en el texto.
- source_word: ξύλον
  english_pob_choice: a piece of wood
  chosen_spanish: un trozo de madera
  alternatives_spanish:
  - un pedazo de madera
  - una pieza de madera
  - un madero
  lexicon: ξύλον
  rationale: ξύλον puede referirse a madera como material o a un objeto de madera. «Trozo de madera» conserva la sencillez del original y evita precisar una forma o función no indicada.
- source_word: ὄπισθεν αὐτοῦ
  english_pob_choice: behind him
  chosen_spanish: detrás de él
  alternatives_spanish:
  - tras él
  - a su espalda
  lexicon: ὄπισθεν
  rationale: La revisión inglesa corrigió «it» a «him» para reflejar αὐτοῦ. En español, «detrás de él» preserva esa referencia personal de forma clara y natural.
theological_decisions:
- issue: Referencia pronominal a la persona
  english_pob_reading: behind him
  chosen_spanish_reading: detrás de él
  alternative_spanish_readings:
  - detrás suyo
  - a su espalda
  rationale: No hay razón textual para impersonalizar el referente. Mantener el pronombre personal respeta la lectura revisada del griego y evita borrar la tensión narrativa del pasaje.
  doctrine_reference: Fidelidad referencial al texto base; no aplica una decisión doctrinal específica.
translation_notes:
  revision_awareness: La versión inglesa fue revisada de «it» a «him» para concordar con αὐτοῦ. La redacción española sigue esa revisión y no introduce una lectura impersonal.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y directo, acorde con un texto breve de estilo narrativo.
  - No se añade puntuación explicativa ni material ausente del griego; se conserva la coordinación final con «y».
  - «Madera» traduce literalmente el material/objeto sin convertirlo en un término más técnico como «madero», que sugeriría una forma específica no indicada.
