base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/007/005.yaml
  text: If anyone was a foreigner, or sick, or aged, after boiling the fish and preparing them well, I would offer them to each according to need, suffering with them and feeling their pain.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation matching the source: conditional list of cases, boiling the fish, preparing them well according to each person''s need, offering them to all, and sympathizing and sharing suffering.'
translation:
  language: es
  text: Si alguien era extranjero, o enfermo, o anciano, después de hervir los peces y prepararlos bien según la necesidad de cada uno, los ofrecía a todos, compadeciéndome con ellos y compartiendo su dolor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ξένος
  english_pob_choice: foreigner
  chosen_spanish: extranjero
  alternatives_spanish:
  - forastero
  - foráneo
  lexicon: xénos
  rationale: '"Extranjero" conserva el sentido de alguien de fuera, sin introducir la connotación moderna de inmigración; es la opción más natural y fiel para un auditorio amplio.'
- source_word: νοσῶν
  english_pob_choice: sick
  chosen_spanish: enfermo
  alternatives_spanish:
  - enfermo de salud
  - adoleciendo
  lexicon: noséō
  rationale: Mantiene el sentido básico de estar enfermo, en español claro y directo.
- source_word: γηράσας
  english_pob_choice: aged
  chosen_spanish: anciano
  alternatives_spanish:
  - viejo
  - de edad avanzada
  lexicon: gērásas
  rationale: '"Anciano" comunica edad avanzada con dignidad y evita la aspereza que puede tener "viejo" en español contemporáneo.'
- source_word: ἐψήσας
  english_pob_choice: after boiling
  chosen_spanish: después de hervir
  alternatives_spanish:
  - tras cocer
  - luego de cocer
  lexicon: psáō
  rationale: El verbo griego admite la idea de cocer por calor; "hervir" es la traducción más natural en esta secuencia culinaria y preserva la acción concreta.
- source_word: ποιήσας αὐτὰ ἀγαθῶς
  english_pob_choice: preparing them well
  chosen_spanish: prepararlos bien
  alternatives_spanish:
  - hacerlos bien
  - disponerlos bien
  lexicon: poiéō + agathōs
  rationale: La construcción expresa preparación cuidadosa de los peces; "prepararlos bien" conserva la simplicidad del griego sin sobreinterpretar el matiz.
- source_word: κατὰ τὴν ἑκάστου χρείαν
  english_pob_choice: according to need
  chosen_spanish: según la necesidad de cada uno
  alternatives_spanish:
  - conforme a la necesidad de cada uno
  - según lo que cada uno necesitaba
  lexicon: chreia
  rationale: La frase distribuye la provisión individualmente; esta redacción hace explícito el alcance distributivo de "de cada uno".
- source_word: προσέφερον πᾶσι
  english_pob_choice: I would offer them to each
  chosen_spanish: los ofrecía a todos
  alternatives_spanish:
  - los presentaba a todos
  - los llevaba a todos
  lexicon: prosépherō
  rationale: '"Ofrecer" mantiene el verbo de entrega o presentación; "a todos" preserva el alcance colectivo del griego.'
- source_word: συναλγῶν
  english_pob_choice: suffering with them
  chosen_spanish: compadeciéndome con ellos
  alternatives_spanish:
  - padeciendo con ellos
  - sufriendo con ellos
  lexicon: synalgéō
  rationale: El verbo expresa compartir el dolor ajeno; "compadeciéndome con ellos" transmite la participación afectiva sin perder la idea de padecer junto a otros.
- source_word: συμπάσχων
  english_pob_choice: feeling their pain
  chosen_spanish: compartiendo su dolor
  alternatives_spanish:
  - padeciendo con ellos
  - sintiendo su dolor
  lexicon: sympáschō
  rationale: La pareja con el verbo anterior refuerza la comunión en el sufrimiento; "compartiendo su dolor" evita una repetición exacta y conserva el paralelismo semántico.
theological_decisions:
- issue: La expresión de empatía en dos verbos coordinados
  english_pob_reading: suffering with them and feeling their pain
  chosen_spanish_reading: compadeciéndome con ellos y compartiendo su dolor
  alternative_spanish_readings:
  - sufriendo con ellos y sintiendo su dolor
  - padeciendo con ellos y padeciendo su dolor
  rationale: El griego usa dos verbos cercanos pero no idénticos para subrayar participación real en la aflicción ajena. La versión española mantiene la doble idea sin fusionarla por completo.
  doctrine_reference: Ética de compasión y solidaridad; lenguaje de empatía pastoral sin doctrinalizar en exceso.
translation_notes:
  revision_awareness: 'La revisión anterior corregió un borrador ajeno al pasaje y fijó el contenido correcto: lista condicional (extranjero, enfermo, anciano), hervir los peces, prepararlos bien según la necesidad de cada uno, ofrecerlos a todos y compartir el sufrimiento. Esta versión sigue ese encuadre y evita añadir elementos no presentes en el griego.'
  spanish_consistency_notes:
  - Se conserva "extranjero" para ξένος y no se sustituye por un término eclesiástico.
  - Se mantiene "anciano" para γηράσας por dignidad y claridad.
  - Se traduce el paralelismo final con dos expresiones distintas para reflejar los dos verbos griegos.
  - No se introducen notas textuales porque el pasaje no presenta una variante relevante en el audit trail proporcionado.
