  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/007/008.yaml
  text: Half of it I would set aside in winter with my brothers. But if you do not have anything to give to the one in need, suffer with him in inward parts of mercy. I know that my own hand did not find anything to give to the one in need, and walking together with him for seven stadia I would weep; and my inward parts turned toward him in sympathy.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:03Z'
    unchanged: false
    changes_summary: 'Revised verse 12 for closer lexical accuracy and completeness: rendered συμπάσχετε/ἐν σπλάγχνοις ἐλέους more directly as ''I had compassion for him'' and ''weeping with him in mercy,'' while keeping the rest of the draft unchanged.'
translation:
  language: es
  text: La mitad la preparaba en invierno con mis hermanos. Pero si no tienen nada para dar al que está en necesidad, sufran con él en las entrañas de misericordia. Sé que mi propia mano no encontró nada para dar al que estaba en necesidad, y caminando junto a él durante siete estadios lloraba; y mis entrañas se volvían hacia él en compasión.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοῦναι
  english_pob_choice: to give
  chosen_spanish: dar
  alternatives_spanish:
  - entregar
  - conceder
  lexicon: δίδωμι
  rationale: El infinitivo del griego exige un verbo simple de dar; en español, «dar» conserva la amplitud y naturalidad del original sin añadir matices de acto solemne o legal.
- source_word: τῷ χρήζοντι
  english_pob_choice: the one in need
  chosen_spanish: al que está en necesidad
  alternatives_spanish:
  - al necesitado
  - al que necesita
  lexicon: χρήζω / χρήζοντι
  rationale: La frase griega describe a una persona que necesita ayuda. «Al que está en necesidad» mantiene la estructura personal y evita reducir el matiz a una etiqueta abstracta.
- source_word: συμπάσχετε
  english_pob_choice: suffer with him
  chosen_spanish: sufran con él
  alternatives_spanish:
  - padezcan con él
  - compartan su sufrimiento
  lexicon: συμπάσχω
  rationale: Se conserva el valor de compartir padecimiento. «Sufran con él» es directo y reproduce la fuerza del compuesto sin suavizarlo demasiado.
- source_word: ἐν σπλάγχνοις ἐλέους
  english_pob_choice: in inward parts of mercy
  chosen_spanish: en las entrañas de misericordia
  alternatives_spanish:
  - con entrañas de misericordia
  - en afecto misericordioso
  lexicon: σπλάγχνα + ἔλεος
  rationale: El inglés POB preserva la imagen corporal. En español, «entrañas de misericordia» mantiene el choque semítico y la carga afectiva del original, sin sustituirlo por una paráfrasis más abstracta.
theological_decisions:
- issue: Lenguaje compasivo corporalizado
  english_pob_reading: inward parts of mercy
  chosen_spanish_reading: entrañas de misericordia
  alternative_spanish_readings:
  - compasión interior
  - afecto misericordioso
  rationale: El texto no dice simplemente «sentir compasión», sino usar un lenguaje visceral para la misericordia. Se conserva esa tensión para no desmaterializar la exhortación ética.
  doctrine_reference: Antropología bíblica y lenguaje hebreo/semítico de las emociones
translation_notes:
  revision_awareness: This draft follows the latest revision pass in the English audit trail, which tightened the clause on pity/compassion and kept the rest of the verse unchanged. Since the current source packet for T12P.ZEB.7.8 contains only verse 8, the Spanish draft is limited to that verse and reflects the revised English sense without importing later surrounding material.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y eclesial, sin forzar terminología tradicional ajena al griego.
  - «Necesidad» traduce el referente humano de χρήζοντι sin introducir una categoría doctrinal.
  - «Entrañas de misericordia» preserva la imaginería corporal del original y la decisión del POB inglés.
  - Se usa el imperativo plural «sufran» para corresponder al plural griego; el español admite la exhortación general sin sujeto explícito.
