base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/007/001.yaml
  text: I stretched a sheet on another upright beam in the middle.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation matching the Greek: ''I stretched a sheet'' for ὀθόνην ἐξέτεινα, ''on another upright beam'' for ἐν ἑτέρῳ ξύλῳ ὀρθῷ, and ''in the middle'' for ἐν μέσῳ.'
translation:
  language: es
  text: Tendí una tela sobre otro madero recto, en medio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὀθόνην
  english_pob_choice: a sheet
  chosen_spanish: una tela
  alternatives_spanish:
  - una sábana
  - una lona
  - un lienzo
  lexicon: ὀθόνη
  rationale: El griego designa una pieza de tela extendida; en español, 'tela' comunica el objeto sin forzar un material o uso demasiado específico. 'Sábana' suena más doméstico y 'lona' o 'lienzo' añaden matices no explícitos en el texto.
- source_word: ἐξέτεινα
  english_pob_choice: I stretched
  chosen_spanish: Tendí
  alternatives_spanish:
  - extendí
  - estiré
  lexicon: ἐκτείνω
  rationale: '''Tendí'' reproduce de forma natural la acción de desplegar o extender una tela en español, manteniendo la idea verbal del griego sin mecanicismo. ''Extendí'' es posible, pero menos idiomático aquí; ''estiré'' sugiere más tensión física que el acto de colocar una tela.'
- source_word: ἑτέρῳ ξύλῳ ὀρθῷ
  english_pob_choice: another upright beam
  chosen_spanish: otro madero recto
  alternatives_spanish:
  - otro poste recto
  - otro palo recto
  - otro beam vertical
  lexicon: ἕτερος + ξύλον + ὀρθός
  rationale: '''Madero'' expresa bien ξύλον como pieza de madera, y ''recto'' conserva ὀρθῷ sin introducir una interpretación técnica excesiva. ''Poste'' o ''palo'' podrían ser válidos, pero ''madero'' es más digno y amplio.'
- source_word: ἐν μέσῳ
  english_pob_choice: in the middle
  chosen_spanish: en medio
  alternatives_spanish:
  - en el centro
  - en el medio
  lexicon: ἐν μέσῳ
  rationale: '''En medio'' es la forma natural y fiel en español para indicar posición central sin añadir precisión espacial no presente en el texto. ''En el centro'' puede sonar más geométrico; ''en el medio'' es menos elegante.'
theological_decisions:
- issue: No hay contenido doctrinal explícito en la línea; la decisión principal es mantener la concreción material del gesto.
  english_pob_reading: I stretched a sheet on another upright beam in the middle.
  chosen_spanish_reading: Tendí una tela sobre otro madero recto, en medio.
  alternative_spanish_readings:
  - Extendí una sábana sobre otro poste recto, en el centro.
  rationale: El pasaje describe una acción física concreta y no introduce terminología teológica. Por ello, la prioridad es preservar la escena con vocabulario claro y sobrio, sin espiritualizar ni interpretar el gesto.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'This Spanish draft follows the latest revision pass, which replaced an unrelated draft with a translation matching the Greek: ὀθόνην ἐξέτεινα = ''I stretched a sheet,'' ἐν ἑτέρῳ ξύλῳ ὀρθῷ = ''on another upright beam,'' and ἐν μέσῳ = ''in the middle.'' The Spanish rendering aligns directly with that adjudicated reading.'
  spanish_consistency_notes:
  - Mantengo el registro sobrio y descriptivo, acorde con una sección narrativa breve.
  - Evito 'SEÑOR' o vocabulario doctrinal innecesario porque el versículo no contiene lenguaje divino.
  - '''Tendí'' y ''en medio'' preservan la simplicidad del griego sin sobreinterpretación.'
