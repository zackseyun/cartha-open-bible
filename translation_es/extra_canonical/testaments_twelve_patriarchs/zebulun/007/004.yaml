  - severity: low
    issue: Pérdida leve del matiz habitual del imperfecto μετεδίδουν
    rationale: «compartí» es aceptable, pero el imperfecto sugiere acción repetida o acostumbrada. Aun así, no es necesario forzar una perífrasis si se mantiene la sobriedad del texto.
