translation:
  language: es
  text: Y de mi presa, mostrando compasión, compartí con cada forastero.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θήρας
  english_pob_choice: my catch
  chosen_spanish: mi presa
  alternatives_spanish:
  - mi captura
  - lo que cacé
  lexicon: θήρα
  rationale: En este contexto, la imagen es la de lo obtenido por caza o captura. «Presa» conserva la idea de lo cazado/capturado con un registro natural en español. Se evita un giro más explicativo que debilite la concisión del griego.
- source_word: σπλαγχνιζόμενος
  english_pob_choice: showing compassion
  chosen_spanish: mostrando compasión
  alternatives_spanish:
  - compadeciéndome
  - teniendo compasión
  lexicon: σπλαγχνίζομαι
  rationale: La forma participial expresa la acción concomitante de compasión. «Mostrando compasión» mantiene la relación sintáctica con la acción principal y conserva el matiz activo del participio.
- source_word: μετεδίδουν
  english_pob_choice: I shared
  chosen_spanish: compartí
  alternatives_spanish:
  - repartí
  - di parte
  lexicon: μεταδίδωμι
  rationale: El imperfecto griego puede presentar una acción habitual o repetida en el pasado. En español, «compartí» comunica de manera clara y sobria el acto de dar parte de lo obtenido, sin cargarlo con un matiz técnico innecesario.
- source_word: παντὶ ἀνθρώπῳ ξένῳ
  english_pob_choice: with every stranger
  chosen_spanish: con todo extranjero
  alternatives_spanish:
  - a todo extranjero
  - con cada forastero
  lexicon: ξένος
  rationale: «Extranjero» es la opción más transparente en español para ξένος en este contexto. Se conserva la amplitud de «every» con «todo» y se evita una paráfrasis interpretativa.
theological_decisions:
- issue: Alcance de la benevolencia hacia el forastero
  english_pob_reading: showing compassion, I shared with every stranger
  chosen_spanish_reading: mostrando compasión, compartí con todo extranjero
  alternative_spanish_readings:
  - compadeciéndome, compartí con todo extranjero
  - mostrando misericordia, compartí con todo extranjero
  rationale: El verso presenta una ética de generosidad hacia el extranjero. «Compasión» refleja bien el movimiento interior del participio griego sin introducir una categoría doctrinal más pesada como «misericordia», que el griego no exige aquí.
  doctrine_reference: Hospitalidad y misericordia hacia el forastero en la ética bíblica
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente, que corrigió una traducción previa no relacionada y fijó el sentido de la línea griega: «from my catch», «showing compassion», «shared with every stranger». La presente versión española toma directamente ese sentido auditado y lo expresa sin depender de la redacción inglesa como base ciega.'
  spanish_consistency_notes:
  - 'Se mantuvo una sintaxis breve y paralela al griego: complemento de origen, participio circunstancial y verbo principal.'
  - Se prefirió «extranjero» por su claridad general; «forastero» se reserva como alternativa estilística, no como texto principal.
  - No se añadió puntuación interpretativa ni se introdujo lenguaje litúrgico ajeno al registro del pasaje.
