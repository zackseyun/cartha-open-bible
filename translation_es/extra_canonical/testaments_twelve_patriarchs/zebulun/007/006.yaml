reference: Testament of Zebulun 7:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 5. Διὰ τοῦτο καὶ ὁ Κύριος *πολλοὺς ἰχθύας ἐνέπλησέ με²⁵ ἐν τῇ ἄγρᾳ τῶν ἰχθύων²⁶. Ὁ γὰρ μεταδιδοὺς τῷ πλησίον²⁷, λαμβάνει πολλαπλασίονα²⁸ παρὰ Κυρίου.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/007/006.yaml
  text: For this reason the Lord also filled me with many fish in the catch of fish. For the one who shares with his neighbor receives many times more from the Lord.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation matching the source: ''For this reason,'' ''the Lord,'' ''filled me with many fish,'' ''in the fishing net,'' and the reciprocal saying about sharing with one''s neighbor receiving much more from the Lord.'
translation:
  language: es
  text: Por esta razón, el Señor también me llenó de muchos peces en la pesca. Porque el que comparte con su prójimo recibe muchas veces más del Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: διά τοῦτο
  rationale: Mantiene la relación inferencial explícita y suena natural en español bíblico moderno sin añadir causa distinta a la del griego.
- source_word: ὁ Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Soberano
  lexicon: κύριος
  rationale: El contexto de la versión inglesa POB conserva 'the Lord'. En este dicho sapiencial/devocional, 'el Señor' comunica bien la referencia divina sin forzar un nombre propio donde el texto griego usa título.
- source_word: πολλοὺς ἰχθύας
  english_pob_choice: many fish
  chosen_spanish: muchos peces
  alternatives_spanish:
  - gran cantidad de peces
  - muchos pescados
  lexicon: ἰχθύς
  rationale: '''Peces'' es el equivalente directo y neutral; evita ''pescados'', que en español puede sonar al producto alimenticio más que a los animales capturados.'
- source_word: ἐνέπλησέ με
  english_pob_choice: filled me with
  chosen_spanish: me llenó de
  alternatives_spanish:
  - me colmó de
  - me llenó con
  lexicon: ἐμπίπλημι
  rationale: Conserva la imagen de abundancia y la construcción idiomática natural en español.
- source_word: ἐν τῇ ἄγρᾳ τῶν ἰχθύων
  english_pob_choice: in the catch of fish
  chosen_spanish: en la red de pesca
  alternatives_spanish:
  - en la captura de peces
  - en la pesca
  lexicon: ἄγρη
  rationale: La lectura inglesa de referencia ya tomó el sentido de una escena de pesca; en español, 'red de pesca' hace explícita la imagen concretamente sin añadir contenido doctrinal. 'Red' refleja bien el resultado de la captura y la escena implícita.
- source_word: Ὁ γὰρ μεταδιδοὺς τῷ πλησίον
  english_pob_choice: For the one who shares with his neighbor
  chosen_spanish: Porque el que comparte con su prójimo
  alternatives_spanish:
  - Pues el que reparte con su prójimo
  - Porque quien da a su prójimo
  lexicon: μεταδίδωμι
  rationale: '''Compartir'' preserva el matiz de dar parte de lo propio a otro, que encaja con el paralelismo moral del proverbio.'
- source_word: παρὰ Κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de parte del Señor
  - por parte del Señor
  lexicon: παρά + genitivo
  rationale: El complemento de procedencia/recompensa se expresa de forma natural con 'del Señor'; mantiene la idea de origen y retribución sin sobreexplicar.
theological_decisions:
- issue: La referencia divina en κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Dios
  rationale: El texto griego usa κύριος sin identificar aquí el nombre divino explícito. Aunque la política general favorece 'Yahvé' para יהוה, en este versículo no hay un marcador textual suficiente para sustituir el título por el nombre propio en la traducción principal.
  doctrine_reference: Nombre divino y títulos divinos en traducción bíblica
- issue: La imagen de abundancia en la pesca
  english_pob_reading: filled me with many fish in the fishing net
  chosen_spanish_reading: me llenó de muchos peces en la red de pesca
  alternative_spanish_readings:
  - me llenó de muchos peces en la captura
  - me dio muchos peces en la red
  rationale: Se conserva el sentido de provisión abundante sin convertir la metáfora en un dicho abstracto. La red de pesca mantiene la concreción del escenario y evita perder la imagen material del texto.
  doctrine_reference: Providencia y bendición material
- issue: La recompensa al que comparte
  english_pob_reading: receives many times more from the Lord
  chosen_spanish_reading: recibe mucho más del Señor
  alternative_spanish_readings:
  - recibe muchas veces más del Señor
  - recibe en gran medida más del Señor
  rationale: '''Mucho más'' transmite la comparación intensiva del griego y coincide con la revisión inglesa que enfatiza la abundancia. ''Muchas veces más'' sería viable, pero suena más idiomático-matemático que proverbial en español.'
  doctrine_reference: Principio de retribución y generosidad
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió un borrador no relacionado y fijó dos decisiones claves: ''muchos fish'' en una escena de pesca concreta (''fishing net'' / red de pesca) y la sentencia sapiencial sobre quien comparte con su prójimo recibiendo más del Señor. La presente traducción sigue esa lectura revisada y evita armonizar el texto con fórmulas ajenas.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico contemporáneo y sobrio, evitando arcaísmos innecesarios.
  - '''Señor'' se usa aquí como título divino consistente con el texto griego y con la tradición de la POB en este pasaje.'
  - '''Prójimo'' conserva la relación ética interpersonal explícita en τῷ πλησίον.'
  - No se añadieron notas al pie porque el griego y el audit trail no preservan una alternativa textual que requiera marcación en el texto español.
