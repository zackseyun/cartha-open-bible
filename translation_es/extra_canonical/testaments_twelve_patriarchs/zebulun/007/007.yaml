  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/007/007.yaml
  text: For five years, then, I fished, sharing with everyone I had seen, and providing for all my father’s house.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation matching the Greek: ''For five years then I fished'' plus the two participial clauses, rendered as sharing with everyone seen and providing for all my father’s house.'
translation:
  language: es
  text: Por cinco años, entonces, pesqué, compartiendo con todo aquel a quien había visto, y proveyendo a toda la casa de mi padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔτη
  english_pob_choice: five years
  chosen_spanish: cinco años
  alternatives_spanish:
  - cinco años
  lexicon: ἔτος
  rationale: Conserva el valor temporal simple del griego sin añadir matices. "Cinco años" es la correspondencia natural y exacta en español.
- source_word: ἡλίευσα
  english_pob_choice: I fished
  chosen_spanish: pesqué
  alternatives_spanish:
  - pescaba
  - me dediqué a pescar
  lexicon: ἁλιεύω
  rationale: El verbo griego expresa la acción de pescar de forma directa. "Pesqué" mantiene la acción concreta y el tono narrativo breve del pasaje.
- source_word: μεταδιδούς
  english_pob_choice: sharing
  chosen_spanish: compartiendo
  alternatives_spanish:
  - repartiendo
  - dando parte de
  lexicon: μεταδίδωμι
  rationale: 'El participio sugiere participación distributiva: dar parte a otros de lo obtenido. "Compartiendo" comunica bien la idea en español sin sobrecargar el texto.'
- source_word: παντὶ ἀνθρώπῳ ὃν ἑωράκειν
  english_pob_choice: with everyone I had seen
  chosen_spanish: con todo aquel a quien había visto
  alternatives_spanish:
  - con toda persona que había visto
  - con todos los que había visto
  lexicon: πᾶς + ἄνθρωπος / ὁράω
  rationale: La construcción griega apunta a personas concretas encontradas y vistas por el hablante. "Todo aquel a quien había visto" conserva el relativo y evita perder la referencia personal del participio perfecto.
- source_word: ἐξαρκῶν
  english_pob_choice: providing for
  chosen_spanish: proveyendo para
  alternatives_spanish:
  - sosteniendo a
  - abasteciendo a
  lexicon: ἐξαρκέω
  rationale: El verbo transmite suficiencia y provisión. "Proveyendo para" mantiene esa idea de abastecer o suplir necesidades de manera general, con un registro claro y sobrio.
- source_word: παντὶ τῷ οἴκῳ τοῦ πατρός μου
  english_pob_choice: all my father’s house
  chosen_spanish: toda la casa de mi padre
  alternatives_spanish:
  - toda la familia de mi padre
  - todo el hogar de mi padre
  lexicon: οἶκος
  rationale: '"Casa" reproduce el campo semántico bíblico de οἶκος como casa/hogar/familia bajo una misma unidad. Es la forma más fiel al griego y más estable en registro bíblico.'
theological_decisions:
- issue: La frase "proveyendo para toda la casa de mi padre" puede leerse como sostén material concreto más que como simple ayuda ocasional.
  english_pob_reading: providing for all my father’s house
  chosen_spanish_reading: proveyendo para toda la casa de mi padre
  alternative_spanish_readings:
  - sosteniendo a toda la casa de mi padre
  - abasteciendo a toda la casa de mi padre
  rationale: El texto griego expresa provisión suficiente para el conjunto del hogar familiar; no necesita intensificar ni espiritualizar la acción. "Proveyendo" conserva la amplitud del verbo y el carácter de sustento.
  doctrine_reference: cf. Génesis 45:11; 47:12 (provisión para la casa/familia)
translation_notes:
  revision_awareness: 'La versión inglesa auditada reemplazó un borrador irrelevante por una traducción ajustada al griego: "For five years, then, I fished, sharing with everyone I had seen, and providing for all my father’s house." Esta propuesta sigue ese mismo corte textual y reproduce las dos cláusulas participiales con el mismo orden de ideas.'
  spanish_consistency_notes:
  - Se mantiene "casa de mi padre" en lugar de "familia" para preservar el equivalente estable de οἶκος en registro bíblico.
  - Se evita "SEÑOR" u otra adaptación teológica no pertinente, ya que el verso no contiene el tetragrámaton ni un uso de κύριος.
  - 'La puntuación refleja la secuencia breve del original: marco temporal, acción principal y dos participios de resultado o concomitancia.'
