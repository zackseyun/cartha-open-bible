review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el rastro auditado en inglés: Πέντε οὖν ἔτη = «Por cinco años, entonces»; ἡλίευσα = «pesqué»; μεταδιδούς = «compartiendo»; παντὶ ἀνθρώπῳ ὃν ἑωράκειν = «con todo aquel a quien había visto»; ἐξαρκῶν = idea de proveer/sostener; παντὶ τῷ οἴκῳ τοῦ πατρός μου = «toda la casa de mi padre». No hay problema teológico especial. La única reparación necesaria es de naturalidad española en la última cláusula.'
  spanish_quality_summary: «Proveyendo para toda la casa de mi padre» suena calcado e innecesariamente anglicado en español bíblico natural. «proveyendo a toda la casa de mi padre» o «sosteniendo a toda la casa de mi padre» sería más idiomático. El resto del texto es claro, digno y fiel.
  glossary_alignment: No hay términos del glosario mayor en juego. «Casa de mi padre» preserva bien οἶκος en registro bíblico. «Compartiendo» comunica adecuadamente μεταδιδούς. Se ajusta al estilo meta en español, salvo la preposición de «proveer».
  issues:
  - severity: medium
    issue: 'Construcción no idiomática: «proveyendo para toda la casa de mi padre».'
    rationale: Aunque comprensible, en español natural la construcción habitual es «proveer a» cuando se trata de personas o casa/familia. La forma actual refleja demasiado de cerca el inglés «providing for».
  revised_spanish_text: Por cinco años, entonces, pesqué, compartiendo con todo aquel a quien había visto, y proveyendo a toda la casa de mi padre.
  revision_rationale: 'Se hizo una reparación menor de idiomaticidad española: «proveyendo para» → «proveyendo a». Esto conserva plenamente el sentido de ἐξαρκῶν y mejora la naturalidad sin añadir ni quitar contenido.'
