translation:
  language: es
  text: Y yo andaba por la orilla, pescando peces para la casa de mi padre, hasta que llegamos a Egipto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤμην ... διαπορευόμενος
  english_pob_choice: And I was walking along the shore
  chosen_spanish: Y yo andaba por la orilla
  alternatives_spanish:
  - Y yo caminaba por la orilla
  - Y yo iba recorriendo la orilla
  lexicon: ἤμην + διαπορευόμενος
  rationale: El participio progresivo expresa una acción continua en pasado; «andaba» conserva ese aspecto en español sin sonar demasiado literario o forzado. «Por la orilla» refleja toὺς αἰγιαλούς como litoral/orilla costera.
- source_word: τοὺς αἰγιαλούς
  english_pob_choice: the shore
  chosen_spanish: la orilla
  alternatives_spanish:
  - la costa
  - la ribera
  lexicon: αἰγιαλός
  rationale: En este contexto marítimo, «orilla» comunica de forma natural el borde del agua. «Costa» sería posible, pero «orilla» sigue de cerca la imagen concreta del lugar de tránsito.
- source_word: ἁλιεύων ἰχθύας
  english_pob_choice: fishing for fish
  chosen_spanish: pescando peces
  alternatives_spanish:
  - capturando peces
  - faenando peces
  lexicon: ἁλιεύω + ἰχθύς
  rationale: El griego dice literalmente «pescando peces», y el inglés POB preserva esa repetición. En español también se puede mantener para reflejar el énfasis del texto sin suavizarlo a un mero «pescando».
- source_word: τῷ οἴκῳ τοῦ πατρός μου
  english_pob_choice: for my father's house
  chosen_spanish: para la casa de mi padre
  alternatives_spanish:
  - para la casa de mi padre
  - para el hogar de mi padre
  lexicon: οἶκος
  rationale: «Casa» reproduce bien οἶκος y conserva el matiz de la unidad familiar/household. «Hogar» sería más interpretativo y menos concreto.
- source_word: ἕως ὅτου ἤλθομεν εἰς Αἴγυπτον
  english_pob_choice: until we came to Egypt
  chosen_spanish: hasta que llegamos a Egipto
  alternatives_spanish:
  - hasta que fuimos a Egipto
  - hasta que arribamos a Egipto
  lexicon: ἕως ὅτου + ἔρχομαι εἰς
  rationale: «Hasta que llegamos» mantiene el movimiento y el punto de llegada del griego. El plural «llegamos» sigue el inglés POB y sugiere el sujeto colectivo implícito del relato.
theological_decisions:
- issue: Referencia al «casa de mi padre» como unidad doméstica y no solo edificio
  english_pob_reading: for my father's house
  chosen_spanish_reading: para la casa de mi padre
  alternative_spanish_readings:
  - para el hogar de mi padre
  - para la familia de mi padre
  rationale: El texto describe un marco de pertenencia y servicio doméstico/familiar. «Casa» conserva la amplitud semítica de οἶκος sin introducir explicaciones ajenas al pasaje.
  doctrine_reference: Terminología de οἶκος / household en literatura judeocristiana.
- issue: Mantenimiento del paralelismo verbal del relato
  english_pob_reading: And I was walking ... fishing ... until we came ...
  chosen_spanish_reading: Y yo andaba ... pescando ... hasta que llegamos ...
  alternative_spanish_readings:
  - Y caminaba ... pescando ... hasta que fuimos ...
  - Mientras andaba ... pescando ... hasta llegar ...
  rationale: Se preserva la secuencia narrativa y el aspecto continuo del original, evitando reordenar la frase de modo que se pierda la fluidez del relato.
  doctrine_reference: Aspecto verbal narrativo en traducción bíblica.
translation_notes:
  revision_awareness: 'La versión inglesa auditada reemplazó un borrador no relacionado por una traducción alineada con el griego: caminar por la orilla, pescando peces, para la casa de mi padre, hasta que llegamos a Egipto. La propuesta española sigue directamente ese contenido revisado y no depende del borrador anterior descartado.'
  spanish_consistency_notes:
  - Se mantiene «Egipto» con capitalización estándar.
  - Se conserva la repetición «pescando peces» porque está respaldada por el griego y por la versión inglesa auditada.
  - No se introduce «Mesías», «Yahvé» ni otros términos teológicos ajenos al versículo.
