base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/002.yaml
  text: '1 Sons of Zebulun[2:2], pay attention to the words of your father.

    2 I, Zebulun, became a good gift to my parents; for when I was born, my father prospered greatly, and the sheep and the cattle also, when with the variegated rods he had his share.

    3 And I do not know that I sinned in my days, except in intention.

    4 I do not remember that I committed lawlessness, except for the ignorance that I showed concerning Joseph, in that I gave my brothers my word not to tell my father what had happened.

    5 But I wept in secret for many days because of Joseph. For I was afraid of my brothers, because they had all agreed that whoever disclosed the secret should be put to death.

    6 Yet when they wanted to kill him, I pleaded with them with tears not to commit this sin[2:3].

    7 For Simeon and Dan and Gad came against Joseph to kill him, and he said to them with tears,

    8 “Have mercy on me, my brothers; pity the inward compassion of Jacob our father. Do not lay your hands on me to shed innocent blood, for I have not sinned against you.

    9 But even if I have sinned, discipline me with correction, my brothers; yet do not bring your hand to the murder of your brother, for the sake of Jacob your father.”

    10 And as he spoke these words in grief, while I could not bear his cries, I began to weep, and my liver was poured out, and all the substance of my inward parts grew faint.

    11 And I wept together with Joseph, and my heart thundered, and the joints of my body trembled[2:10][2:8], and I had no strength.'
  footnotes:
  - marker: '2:2'
    text: The mention of the variegated rods alludes to Jacob's breeding of the flocks in Genesis 30.
    reason: cross_reference
  - marker: '2:3'
    text: The Greek phrase rendered 'except in intention' is difficult and may point to inward thought rather than outward deed.
    reason: lexical_alternative
  - marker: '2:8'
    text: Literally, 'pity the inward parts of Jacob our father'—an ancient bodily expression for deep compassion.
    reason: cultural_note
  - marker: '2:10'
    text: Literally, 'my liver was poured out,' a vivid ancient expression of intense grief.
    reason: cultural_note
