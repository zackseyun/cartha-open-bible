translation:
  language: es
  text: '1 Hijos de Zabulón[a], presten atención a las palabras de su padre.


    2 Yo, Zabulón, llegué a ser un buen don para mis padres; porque cuando nací, mi padre prosperó mucho, y también las ovejas y el ganado, cuando con las varas variadas tuvo su parte.


    3 Y no sé haber pecado en mis días, excepto en intención[b].


    4 No recuerdo haber cometido iniquidad, salvo por la ignorancia que mostré respecto de José, en que di mi palabra a mis hermanos de no decir a mi padre lo que había sucedido.


    5 Pero lloré en secreto por muchos días a causa de José. Porque temía a mis hermanos, ya que todos habían acordado que quien revelara el secreto debía morir.


    6 Sin embargo, cuando querían matarlo, les rogué con lágrimas que no cometieran este pecado[c].


    7 Pues Simeón, Dan y Gad vinieron contra José para matarlo, y él les dijo entre lágrimas:


    8 «Tengan misericordia de mí, hermanos míos; compadezcan las entrañas compasivas de nuestro padre Jacob[d]. No pongan sus manos sobre mí para derramar sangre inocente, porque no he pecado contra ustedes.


    9 Pero aun si he pecado, disciplínenme con corrección, hermanos míos; pero no lleven su mano al asesinato de su hermano, por amor de Jacob su padre».


    10 Y mientras decía estas palabras en aflicción, como yo no podía soportar sus clamores, empecé a llorar; y mi hígado se derramó, y toda la sustancia de mis entrañas desfalleció[e].


    11 Y lloré junto con José, y mi corazón retumbaba, y las articulaciones de mi cuerpo temblaban[f], y no tenía fuerzas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La mención de las varas variadas alude al episodio de Génesis 30, donde Jacob hace prosperar los rebaños mediante varas colocadas ante los animales.
    reason: cross_reference
  - marker: b
    text: La frase griega es difícil y puede apuntar a una falta interior, en el pensamiento o la intención, más que a una obra externa.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «este pecado»; la fuerza moral del texto recae en la petición de no participar en el asesinato de José.
    reason: theological_note
  - marker: d
    text: 'Literalmente, «las entrañas de Jacob nuestro padre»: una expresión corporal antigua para una profunda compasión.'
    reason: cultural_note
  - marker: e
    text: Literalmente, «mi hígado se derramó», una expresión antigua y vívida de dolor intenso.
    reason: cultural_note
  - marker: f
    text: Literalmente, «las articulaciones de mi cuerpo temblaban»; el griego conserva una imagen corporal fuerte del impacto emocional.
    reason: cultural_note
lexical_decisions:
- source_word: προσέχετε
  english_pob_choice: pay attention
  chosen_spanish: presten atención
  alternatives_spanish:
  - escuchen
  - pongan atención
  lexicon: BDAG
  rationale: Imperativo exhortativo en un discurso testamentario; «presten atención» es natural en español y conserva la fuerza de llamado solemne sin sonar arcaico.
- source_word: δόσις ἀγαθή
  english_pob_choice: a good gift
  chosen_spanish: un buen don
  alternatives_spanish:
  - un buen regalo
  - una bendición
  lexicon: LSJ
  rationale: «Don» preserva el valor concreto del sustantivo y la autodescripción de Zabulón en relación con sus padres; evita reducirlo a una bendición genérica.
- source_word: ηὐξήνθη
  english_pob_choice: prospered greatly
  chosen_spanish: prosperó mucho
  alternatives_spanish:
  - creció mucho
  - aumentó mucho
  lexicon: BDAG
  rationale: En el contexto de la casa, los rebaños y el ganado, «prosperó mucho» comunica mejor el aumento de bienestar y bienes que un simple «creció».
- source_word: ποικίλαις ῥάβδοις
  english_pob_choice: variegated rods
  chosen_spanish: las varas variadas
  alternatives_spanish:
  - las varas listadas
  - las varas moteadas
  lexicon: LSJ
  rationale: «Variadas» mantiene el sentido de variedad/moteado y conserva la alusión a Génesis 30 sin forzar una especificación no segura.
- source_word: παρεκτὸς ἐννοίας
  english_pob_choice: except in intention
  chosen_spanish: excepto en intención
  alternatives_spanish:
  - salvo en pensamiento
  - excepto en mi mente
  lexicon: LSJ
  rationale: La frase es difícil; «en intención» conserva la tensión moral de un pecado más interior que externo, como en el texto griego y la lectura auditada en inglés.
- source_word: παρανομίαν
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - transgresión
  - ilegalidad
  lexicon: BDAG
  rationale: «Iniquidad» conserva el peso moral-legal de la palabra sin sonar torpe en español y evita banalizarla como mero error.
- source_word: ἄγνοιαν
  english_pob_choice: ignorance
  chosen_spanish: ignorancia
  alternatives_spanish:
  - desconocimiento
  - falta de entendimiento
  lexicon: BDAG
  rationale: El texto se presenta como una falta no deliberada; «ignorancia» conserva ese matiz reconocido por el audit trail inglés.
- source_word: ἐβεβαίωσα
  english_pob_choice: gave my brothers my word
  chosen_spanish: di mi palabra a mis hermanos
  alternatives_spanish:
  - confirmé a mis hermanos
  - me comprometí con mis hermanos
  lexicon: BDAG
  rationale: La idea no es sólo confirmar, sino asumir una obligación verbal; «di mi palabra» lo expresa de modo idiomático y fiel.
- source_word: τὸ μυστήριον
  english_pob_choice: the secret
  chosen_spanish: el secreto
  alternatives_spanish:
  - el misterio
  - el asunto oculto
  lexicon: BDAG
  rationale: Aquí no se trata del sentido técnico de «misterio» sino del complot oculto contra José; «secreto» sigue la decisión inglesa y evita confusión teológica.
- source_word: ἀναιρεθῆναι
  english_pob_choice: should be put to death
  chosen_spanish: debía morir
  alternatives_spanish:
  - debía ser puesto a muerte
  - debía ser matado
  lexicon: BDAG
  rationale: La pasiva griega expresa una amenaza de muerte; en español, «debía morir» transmite la gravedad de forma natural y directa.
- source_word: προσεκάλουν
  english_pob_choice: pleaded with them
  chosen_spanish: les rogué
  alternatives_spanish:
  - les imploré
  - les supliqué
  lexicon: BDAG
  rationale: Con lágrimas y en contexto de urgencia, «les rogué» comunica una apelación intensa sin añadir ornamentación.
- source_word: ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - ofensa
  - mal
  lexicon: BDAG
  rationale: La dimensión moral-religiosa es central en el pasaje; «pecado» conserva esa fuerza.
- source_word: ἐλεήσατέ με
  english_pob_choice: Have mercy on me
  chosen_spanish: Tengan misericordia de mí
  alternatives_spanish:
  - Ten piedad de mí
  - Apiádense de mí
  lexicon: BDAG
  rationale: «Tengan misericordia de mí» es sobrio y claro en español, y mantiene el vocabulario de misericordia del texto.
- source_word: οἰκτειρήσατε σπλάγχνα
  english_pob_choice: pity the inward compassion
  chosen_spanish: compadezcan las entrañas compasivas
  alternatives_spanish:
  - tengan compasión de las entrañas
  - compadezcan las entrañas
  lexicon: LSJ
  rationale: Se preserva la imagen corporal del griego sin convertirla en una abstracción. «Entrañas compasivas» intenta reflejar el vínculo entre σπλάγχνα y la compasión familiar.
- source_word: ἐπαγάγετε τὰς χεῖρας ὑμῶν
  english_pob_choice: lay your hands on me
  chosen_spanish: pongan sus manos sobre mí
  alternatives_spanish:
  - levanten sus manos contra mí
  - echen sus manos sobre mí
  lexicon: LSJ
  rationale: La imagen corporal se conserva con una formulación natural en español; el contexto deja claro que es una acción hostil.
- source_word: φόνῳ
  english_pob_choice: the murder
  chosen_spanish: el asesinato
  alternatives_spanish:
  - el homicidio
  - la muerte
  lexicon: BDAG
  rationale: En un contexto fratricida, «asesinato» comunica el carácter moral del acto con mayor precisión que un genérico «muerte».
- source_word: ὀδυρόμενος
  english_pob_choice: in grief
  chosen_spanish: en aflicción
  alternatives_spanish:
  - en dolor
  - lamentándose
  lexicon: LSJ
  rationale: «En aflicción» suena natural y mantiene el tono lamentoso sin duplicar excesivamente los verbos de llanto ya presentes.
- source_word: ἤπατά μου ἐξεχύθησαν
  english_pob_choice: my liver was poured out
  chosen_spanish: mi hígado se derramó
  alternatives_spanish:
  - mi hígado fue derramado
  - mis entrañas se derramaron
  lexicon: LSJ
  rationale: Se conserva la imagen corporal concreta del griego, siguiendo la decisión inglesa de no suavizarla a un mero giro emocional.
- source_word: ὑπόστασις τῶν σπλάγχνων
  english_pob_choice: the substance of my inward parts
  chosen_spanish: toda la sustancia de mis entrañas
  alternatives_spanish:
  - toda la esencia de mis entrañas
  - todo el sostén de mis entrañas
  lexicon: LSJ
  rationale: La expresión es oscura; «sustancia» conserva el peso material del término y «entrañas» mantiene la imaginería corporal del pasaje.
- source_word: ἐχαυνοῦτο
  english_pob_choice: grew faint
  chosen_spanish: desfalleció
  alternatives_spanish:
  - se debilitó
  - se desvaneció
  lexicon: LSJ
  rationale: «Desfalleció» expresa el colapso de fuerzas internas con buen español y sin perder la intensidad del original.
- source_word: ἐβόμβει
  english_pob_choice: thundered
  chosen_spanish: retumbaba
  alternatives_spanish:
  - tronaba
  - rugía
  lexicon: LSJ
  rationale: «Retumbaba» conserva la resonancia fuerte y corporal del verbo sin sonar excesivamente literario en español.
- source_word: οἱ ἁρμοὶ τοῦ σώματός μου
  english_pob_choice: the joints of my body
  chosen_spanish: las articulaciones de mi cuerpo
  alternatives_spanish:
  - las coyunturas de mi cuerpo
  - mis miembros
  lexicon: LSJ
  rationale: La traducción literal mantiene el cuadro físico del temblor corporal y evita una abstracción innecesaria.
theological_decisions:
- issue: La tensión entre inocencia y culpa en los vv. 3-4
  english_pob_reading: He says he did not know that he sinned, except in intention, and then names ignorance concerning Joseph.
  chosen_spanish_reading: 'Se conserva la tensión: «no sé haber pecado… excepto en intención» y «salvo por la ignorancia que mostré respecto de José».'
  alternative_spanish_readings:
  - Suavizar el pasaje a una simple negación de pecado
  - Eliminar el matiz de «intención» por considerarlo problemático
  rationale: El griego no resuelve la tensión moral; la versión española la deja visible para respetar la forma del testimonio y permitir futura revisión auditada.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve it
- issue: Lenguaje corporal para compasión y duelo
  english_pob_reading: Retain bodily terms such as 'inward compassion,' 'my liver was poured out,' and 'inward parts.'
  chosen_spanish_reading: Se conservan «entrañas compasivas», «mi hígado se derramó» y «mis entrañas».
  alternative_spanish_readings:
  - Reemplazar por lenguaje emocional abstracto
  - Suavizar a expresiones como «me dolió mucho»
  rationale: La retórica del pasaje es intensamente encarnada; mantenerla honra la evidencia griega y evita borrar el carácter antiguo y testimonial del texto.
  doctrine_reference: PHILOSOPHY.md § original-language primacy; transparency in lexical decisions
translation_notes:
  revision_awareness: Basado en el texto griego fijado en Charles 1908 Greek Versions (Zebulun source-fix v2) y en la traducción auditada en inglés; no se registran revisiones posteriores aplicadas en esta pasada. Se conservaron las tensiones léxicas señaladas por el audit trail, especialmente en vv. 3-4 y en el lenguaje corporal de duelo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparezca en el pasaje; aquí no aparece.
  - «Mesías/Cristo» no aparece en esta sección.
  - «Esclavo» no aplica en esta unidad; se evitó introducir terminología no presente.
  - Se mantuvo un registro neutral y eclesialmente legible, evitando arcaismos innecesarios mientras se preserva la imaginería semítica del texto.
  - Los marcadores de nota [a]-[f] aparecen en el texto exactamente donde corresponden.
