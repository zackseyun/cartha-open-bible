translation:
  language: es
  text: Porque esto divide la unidad, y dispersa todo parentesco, y perturba el alma, y desfigura el rostro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χωρίζει ἑνότητα
  english_pob_choice: divides unity
  chosen_spanish: divide la unidad
  alternatives_spanish:
  - separa la unidad
  - rompe la unidad
  lexicon: χωρίζω
  rationale: «Divide» reproduce la acción de separar algo que debe permanecer unido, sin intensificar innecesariamente el sentido. «La unidad» conserva el objeto abstracto del griego y mantiene la fluidez natural en español.
- source_word: πᾶσαν συγγένειαν
  english_pob_choice: every kinship
  chosen_spanish: todo parentesco
  alternatives_spanish:
  - toda la parentela
  - toda relación de sangre
  lexicon: συγγένεια
  rationale: «Parentesco» recoge el campo semántico de συγγένεια como vínculo de familia o consanguinidad. «Todo» conserva el alcance total de πᾶσαν; en español, el singular colectivo suena más natural que «cada parentesco».
- source_word: ταράσσει
  english_pob_choice: troubles
  chosen_spanish: perturba
  alternatives_spanish:
  - inquieta
  - turba
  lexicon: ταράσσω
  rationale: «Perturba» expresa bien la alteración interior causada al alma y mantiene dignidad de registro. Evita un calco demasiado coloquial como «molesta» y conserva la fuerza de trastorno del verbo griego.
- source_word: ἀφανίζει τὸ πρόσωπον
  english_pob_choice: disfigures the face
  chosen_spanish: desfigura el rostro
  alternatives_spanish:
  - borra el rostro
  - deforma el rostro
  lexicon: ἀφανίζω
  rationale: El griego habla de hacer desaparecer o arruinar la apariencia; «desfigura» comunica adecuadamente el efecto visible sobre el rostro sin exagerar hacia una destrucción literal. «Rostro» es la equivalencia más directa para πρόσωπον en este contexto.
theological_decisions:
- issue: La secuencia presenta efectos morales y comunitarios de la discordia, no una doctrina técnica
  english_pob_reading: For this divides unity, and scatters every kinship, and troubles the soul, and disfigures the face.
  chosen_spanish_reading: Porque esto divide la unidad, y dispersa todo parentesco, y perturba el alma, y desfigura el rostro.
  alternative_spanish_readings:
  - Porque esto rompe la unidad...
  - Porque esto separa la unidad...
  rationale: Se mantiene el tono sapiencial y exhortativo del texto, evitando añadir categorías doctrinales que no están en el griego. La traducción conserva la progresión de consecuencias sociales, interiores y visibles, tal como el texto las presenta.
  doctrine_reference: ética comunitaria / sabiduría moral
- issue: Posible tensión entre «alma» y «rostro» como pares antropológicos
  english_pob_reading: troubles the soul, and disfigures the face
  chosen_spanish_reading: perturba el alma, y desfigura el rostro
  alternative_spanish_readings:
  - inquieta el alma, y desfigura el semblante
  - turba el alma, y altera el rostro
  rationale: Se preserva la concreción de ambos términos antropológicos sin reinterpretarlos. «Alma» mantiene ψυχή y «rostro» mantiene πρόσωπον; no se nivela el contraste entre interioridad y apariencia externa.
  doctrine_reference: antropología bíblica
translation_notes:
  revision_awareness: La versión inglesa más reciente se mantuvo sin cambios; este borrador español sigue de cerca sus decisiones léxicas auditablemente y vuelve al griego para confirmar el alcance de χωρίζει, συγγένεια, ταράσσει y ἀφανίζει.
  spanish_consistency_notes:
  - Se mantiene «unidad» para ἑνότητα y «parentesco» para συγγένεια en un registro bíblico claro.
  - No se introduce «Mesías», «Cristo» ni terminología técnica ajena al pasaje.
  - Se conserva el paralelismo coordinado con comas y la conjunción final para reflejar la cadencia del original griego.
