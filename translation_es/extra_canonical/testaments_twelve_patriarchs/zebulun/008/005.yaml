base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/008/005.yaml
  text: Paying attention to him, you also, my children, love one another, and let each one not reckon evil against his brother.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: false
    changes_summary: Removed the unnecessary 'then' to better match the source and improve naturalness; otherwise retained the draft.
translation:
  language: es
  text: Al prestar atención a él, ustedes también, hijos míos, ámense unos a otros, y que cada uno no [a]calcule mal[b] contra su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''calcule'' intenta conservar el matiz de λογίζομαι como contar, considerar o imputar; también puede entenderse ''lleve en cuenta''.'
    reason: lexical_alternative
  - marker: b
    text: '''mal'' expresa κακίαν de manera amplia; puede abarcar malicia, maldad o daño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέχοντες
  english_pob_choice: Paying attention to him
  chosen_spanish: Al prestar atención a él
  alternatives_spanish:
  - Prestando atención a él
  - Al atenderlo
  - Al fijar la atención en él
  lexicon: προσέχω
  rationale: El participio presente pide una acción concomitante; en español, una construcción temporal/adverbial transmite bien la relación sin añadir inferencias. 'Prestar atención a él' conserva la idea básica de atender/fijar la mirada mental en la persona mencionada.
- source_word: ἀγαπᾶτε ἀλλήλους
  english_pob_choice: love one another
  chosen_spanish: ámense unos a otros
  alternatives_spanish:
  - amense mutuamente
  - ámense los unos a los otros
  - ámense entre sí
  lexicon: ἀγαπάω
  rationale: '''Ámense unos a otros'' es natural, claro y conserva el imperativo recíproco sin sonar artificioso. Mantiene el valor relacional fuerte de ἀγαπάω.'
- source_word: μὴ λογίζεσθε
  english_pob_choice: let each one not reckon
  chosen_spanish: que cada uno no [a]calcule mal[b]
  alternatives_spanish:
  - que cada uno no considere
  - que nadie piense
  - que cada uno no lleve en cuenta
  lexicon: λογίζομαι
  rationale: λογίζομαι puede ser 'considerar', 'contar', 'llevar en cuenta' o 'calcular'. Aquí, con 'κακίαν' como objeto, la idea es no imputar ni contabilizar el mal contra el hermano. Para evitar una traducción demasiado interpretativa, se conserva 'calcule' con el adverbio 'mal' para reflejar la noción de cálculo/recuento negativo, y la nota aclara la alternativa semántica.
- source_word: κακίαν
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - malicia
  - perversidad
  lexicon: κακία
  rationale: '''Mal'' es la forma más amplia y directa para un texto exhortativo breve; permite abarcar daño, malicia y mala intención sin estrechar indebidamente el término.'
- source_word: ἀδελφὸν αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su hermano
  - el hermano de él
  lexicon: ἀδελφός
  rationale: '''Su hermano'' reproduce el parentesco fraterno del texto y mantiene la cercanía exhortativa. No se requiere marcación adicional porque el contexto ya es claro.'
theological_decisions:
- issue: La exhortación recíproca a no contabilizar el mal contra el hermano
  english_pob_reading: and let each one not reckon evil against his brother
  chosen_spanish_reading: y que cada uno no calcule mal contra su hermano
  alternative_spanish_readings:
  - y que cada uno no considere mal contra su hermano
  - y que ninguno lleve cuenta del mal contra su hermano
  rationale: El texto no solo prohíbe una actitud interior general, sino un acto de evaluar/imputar el mal hacia otro miembro de la comunidad. La redacción española conserva esa tensión entre juicio interno y registro/contabilidad moral. La opción 'llevar cuenta del mal' es válida, pero 'calcule mal' mantiene mejor el eco del verbo griego elegido en la base auditada.
  doctrine_reference: Ética comunitaria fraterna; prohibición de la imputación hostil del mal
translation_notes:
  revision_awareness: La revisión en inglés eliminó 'then' por innecesario; la versión española evita cualquier equivalente de 'entonces' o 'luego' y sigue la relación participial del griego con una apertura adverbial más natural. No se añadieron elementos ausentes en el texto base, y se preservó el tono exhortativo breve del original.
  spanish_consistency_notes:
  - Se mantiene 'hijos míos' como vocativo afectivo coherente con la fuente.
  - Se evita 'SEÑOR' u otros sustitutos porque no aparece el nombre divino en este versículo.
  - La construcción 'Al prestar atención a él' refleja la simultaneidad del participio griego sin sobreparafrasear.
  - No se introdujo 'Cristo' ni terminología doctrinal ajena al pasaje.
