    reason: lexical_alternative
  - marker: b
    text: '''El mal'' expresa κακίαν de manera amplia; puede abarcar malicia, maldad o daño.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'calcule mal' por 'tome en cuenta el mal', que suena natural en español y conserva mejor la idea de λογίζομαι como contabilizar, considerar o imputar. Se mantienen el orden exhortativo y el alcance amplio de κακίαν, con notas simplificadas y mejor ancladas.
