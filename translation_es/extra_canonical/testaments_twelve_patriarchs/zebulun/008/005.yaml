  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura griega: προσέχοντες = ''Al prestar atención'', ἀγαπᾶτε ἀλλήλους = ''ámense unos a otros'', y la prohibición final conserva la idea de no imputar/contabilizar mal contra el hermano. Sin embargo, ''calcule mal contra su hermano'' no suena idiomático en español y puede sugerir ''calcular incorrectamente'' más que ''tomar en cuenta/imputar mal''.'
  spanish_quality_summary: La frase inicial y la exhortación al amor mutuo son claras y naturales. El problema principal es la colocación '[a]calcule mal[b] contra su hermano', que resulta forzada y poco legible para español eclesial general. Conviene una formulación más natural que mantenga el matiz de λογίζομαι sin perder claridad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La revisión propuesta mantiene fidelidad léxica mediante 'tome en cuenta el mal', con nota que preserva el matiz de contar/considerar/imputar de λογίζομαι. 'Mal' para κακίαν sigue siendo adecuado y suficientemente amplio.
  issues:
  - severity: medium
    issue: 'Expresión no idiomática: ''calcule mal contra su hermano'''
    rationale: En español, 'calcular mal' normalmente significa calcular de forma errónea, no imputar o llevar cuenta del mal de otro. Esto debilita la fidelidad semántica y la legibilidad.
  - severity: low
    issue: Anclaje de notas divide artificialmente la expresión
    rationale: Separar notas entre 'calcule' y 'mal' fragmenta una unidad semántica que en español conviene tratar de forma más natural en una sola expresión.
  revised_spanish_text: Al prestar atención a él, ustedes también, hijos míos, ámense unos a otros, y que cada uno no tome en cuenta[a] el mal[b] contra su hermano.
