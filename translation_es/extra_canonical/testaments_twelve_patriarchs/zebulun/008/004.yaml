source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 4. Ὅτε δὲ¹⁰ κατήλθομεν¹¹ *εἰς Αἴγυπτον¹², Ἰωσὴφ *οὐκ ἐμνησικάκησεν ἡμῖν¹³.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/008/004.yaml
  text: And when we went down to Egypt, Joseph did not hold a grudge against us.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: false
    changes_summary: Changed ‘into Egypt[8:6]’ to ‘to Egypt’ to match the source more closely and removed the bracketed reference from the translation text.
translation:
  language: es
  text: Y cuando descendimos a Egipto, José no nos guardó rencor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατήλθομεν / εἰς Αἴγυπτον
  english_pob_choice: we went down to Egypt
  chosen_spanish: descendimos a Egipto
  alternatives_spanish:
  - fuimos a Egipto
  - bajamos a Egipto
  lexicon: καταβαίνω / εἰς + acusativo
  rationale: Conservo la imagen espacial de ‘bajar/descender’ que el griego expresa con κατήλθομεν y que el inglés POB reflejó con ‘went down’. ‘Descendimos’ suena natural en español bíblico y mantiene la direccionalidad sin añadir ‘hacia adentro’ o una formulación más interpretativa.
- source_word: Ἰωσὴφ
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joseph
  lexicon: Ἰωσήφ
  rationale: Nombre propio bíblico estándar en español; ‘José’ es la forma recibida y clara para lectores de habla española.
- source_word: οὐκ ἐμνησικάκησεν ἡμῖν
  english_pob_choice: did not hold a grudge against us
  chosen_spanish: no nos guardó rencor
  alternatives_spanish:
  - no nos tuvo rencor
  - no se acordó mal de nosotros
  - no nos recordó el mal
  lexicon: μνησικακέω
  rationale: El verbo griego expresa retener resentimiento o recordar mal; ‘guardar rencor’ comunica bien esa fuerza en español actual sin suavizarla a un simple ‘perdonó’ ni volverla demasiado literal e idiomáticamente extraña.
theological_decisions:
- issue: Cómo expresar la falta de resentimiento de José sin sobreinterpretar el acto como una fórmula técnica de perdón
  english_pob_reading: Joseph did not hold a grudge against us.
  chosen_spanish_reading: José no nos guardó rencor.
  alternative_spanish_readings:
  - José nos perdonó
  - José no se enojó con nosotros
  rationale: 'El texto griego describe ausencia de rencor, no introduce explícitamente el término ‘perdonar’. La formulación elegida preserva esa tensión: incluye la dimensión relacional y afectiva, pero no expande el sentido más allá de lo que el verbo garantiza.'
  doctrine_reference: Ética del perdón y ausencia de resentimiento; no hay afirmación doctrinal explícita adicional en este verso.
translation_notes:
  revision_awareness: La revisión en inglés corrigió ‘into Egypt’ a ‘to Egypt’ para ajustarse mejor al griego. En español, ‘a Egipto’ sigue esa misma cercanía al source y evita añadir una noción de interioridad no exigida por el texto.
  spanish_consistency_notes:
  - Mantuve un registro bíblico sobrio y contemporáneo.
  - Usé ‘descendimos’ para conservar la imagen del griego sin caer en un calco torpe.
  - No añadí notas ni glosas porque el verso es breve y la correspondencia léxica es directa.
