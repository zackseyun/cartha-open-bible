translation:
  language: es
  text: Porque en la medida en que un hombre tiene compasión con su prójimo, en esa misma medida también el Señor tiene compasión con él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σπλαγχνίζεται
  english_pob_choice: has compassion
  chosen_spanish: tiene compasión
  alternatives_spanish:
  - se compadece
  - muestra compasión
  lexicon: σπλαγχνίζομαι
  rationale: El verbo griego expresa compasión entrañable o misericordia activa. En español, «tener compasión» conserva bien esa fuerza sin sonar rígido. «Se compadece» también es válido, pero «tiene compasión» sigue de cerca el valor relacional del original y el giro de la traducción inglesa.
- source_word: πλησίον αὐτοῦ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - la persona cercana a él
  lexicon: πλησίον
  rationale: «Prójimo» es el equivalente natural y bíblico para πλησίον en un contexto moral/general, y comunica mejor la amplitud del término que «vecino», que en español puede sonar más geográfico que relacional.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dueño
  lexicon: κύριος
  rationale: Aunque la política general del proyecto prefiere «Yahvé» para el nombre divino, aquí el texto griego cita o alude con κύριος y el inglés auditado retiene «the Lord» como forma estable. En español, «el Señor» preserva esa correspondencia y la cadencia proverbial del pasaje.
theological_decisions:
- issue: Relación entre la compasión humana y la compasión divina
  english_pob_reading: For as much as a man has compassion on his neighbor, so much also the Lord has compassion on him.
  chosen_spanish_reading: Porque así como el hombre tiene compasión de su prójimo, así también el Señor tiene compasión de él.
  alternative_spanish_readings:
  - Porque en la medida en que el hombre se compadece de su prójimo, en esa misma medida también el Señor se compadece de él.
  - Cuanto compasión muestra el hombre a su prójimo, tanto compasión muestra también el Señor a él.
  rationale: El griego formula una correspondencia proporcional entre la compasión humana y la respuesta del Señor. La redacción española conserva esa reciprocidad y evita añadir matices causales o meramente exhortativos que no están explícitos en el texto.
  doctrine_reference: Sabiduría proverbial / reciprocidad ética en la literatura testamentaria
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios respecto del texto base inglés; por ello, la versión española sigue de cerca la equivalencia óptima ya establecida y solo ajusta la fraseología para una lectura natural en español.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en concordancia con el audit trail inglés y con la forma proverbial del versículo.
  - «Prójimo» se usa en sentido ético amplio, no solo como vecino literal.
  - La construcción proporcional «así como... así también...» refleja el paralelismo del original sin sobreinterpretarlo.
