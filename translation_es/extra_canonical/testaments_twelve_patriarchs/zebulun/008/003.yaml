review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la proporcionalidad del griego: cuanto más compasivo es el ser humano con su prójimo, tanto más lo es el Señor con él. Sin embargo, εἰς τὸν πλησίον / εἰς αὐτόν se refleja mejor en español con «con» o con una formulación verbal directa que con «de», y «ὅσον... τοσοῦτον» queda más natural y preciso como «en la medida en que... en esa misma medida».'
  spanish_quality_summary: El español es claro y digno, pero «tener compasión de» suena menos natural en este paralelismo que «tener compasión con» o «compadecerse de». Además, una estructura más proporcional mejora la legibilidad proverbial del versículo.
  glossary_alignment: «su prójimo» para πλησίον está bien. «el Señor» para κύριος es aceptable aquí, dado que la fuente griega tiene κύριος y no el Tetragrámaton explícito. No hay conflictos relevantes con la terminología del proyecto.
  issues:
  - severity: medium
    issue: Preposición poco natural en «tener compasión de»
    rationale: Aunque se entiende, en este contexto paralelo suena más idiomático en español «tener compasión con» o bien usar el verbo «compadecerse de». La elección actual debilita la naturalidad sin necesidad.
  - severity: low
    issue: La correlación proporcional puede expresarse con mayor fidelidad estilística
    rationale: El griego ὅσον... τοσοῦτον enfatiza una medida correspondiente. «Así como... así también» es aceptable, pero «en la medida en que... en esa misma medida» refleja mejor el matiz proverbial.
  revised_spanish_text: Porque en la medida en que un hombre tiene compasión con su prójimo, en esa misma medida también el Señor tiene compasión con él.
  revision_rationale: Se ajusta la sintaxis para que el español suene más natural y para reflejar con más precisión la correlación proporcional del griego, sin cambiar el sentido.
