id: T12P.ZEB.8.1
reference: Testament of Zebulun 8:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: VIII. Καὶ ὑμεῖς οὖν, τέκνα μου, ἔχετε εὐσπλαγχνίαν *κατὰ παντὸς ἀνθρώπου¹ ἐν ἐλέει, ἵνα καὶ ὁ Κύριος *εἰς ὑμᾶς σπλαγχνισθεὶς² ἐλεήσῃ ὑμᾶς.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/008/001.yaml
  text: And so[8:2], my children, have compassion toward every person in mercy, so that the Lord also, having compassion on you, may show you mercy.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: false
    changes_summary: Changed 'with mercy' to 'in mercy' to better match ἐν ἐλέει and preserve the source phrasing; otherwise retained the draft.
translation:
  language: es
  text: Y así, hijos míos, tengan compasión de toda persona en misericordia, para que también el Señor, compadeciéndose de ustedes, les muestre misericordia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijos queridos
  lexicon: τέκνα
  rationale: Hijos míos conserva la relación afectiva y exhortativa del vocativo sin añadir intensidad no presente en el griego.
- source_word: ἔχετε εὐσπλαγχνίαν
  english_pob_choice: have compassion
  chosen_spanish: tengan compasión
  alternatives_spanish:
  - muestren compasión
  - sean compasivos
  lexicon: εὐσπλαγχνία
  rationale: La frase pide una actitud activa de compasión; en español, 'tener compasión' comunica bien el mandato y mantiene el valor léxico de εὐσπλαγχνία.
- source_word: κατὰ παντὸς ἀνθρώπου
  english_pob_choice: toward every person
  chosen_spanish: de toda persona
  alternatives_spanish:
  - hacia toda persona
  - para con toda persona
  lexicon: πᾶς ἄνθρωπος
  rationale: '''De toda persona'' expresa el alcance universal del mandato con una construcción natural en español, sin restringir ni intensificar el sentido.'
- source_word: ἐν ἐλέει
  english_pob_choice: in mercy
  chosen_spanish: en misericordia
  alternatives_spanish:
  - con misericordia
  - por misericordia
  lexicon: ἔλεος
  rationale: Se preserva la preposición 'en' del texto fuente, como en la revisión inglesa, y 'misericordia' mantiene el campo semántico de ἔλεος en español eclesial contemporáneo.
- source_word: ὁ Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: κύριος
  rationale: Aquí el griego designa a Dios como Señor sin una cita explícita del nombre divino; se conserva 'el Señor' conforme al valor contextual y al texto auditado en inglés.
- source_word: σπλαγχνισθεὶς
  english_pob_choice: having compassion on you
  chosen_spanish: compadeciéndose de ustedes
  alternatives_spanish:
  - teniendo compasión de ustedes
  - conmovido por ustedes
  lexicon: σπλαγχνίζομαι
  rationale: El participio expresa una acción concomitante; en español 'compadeciéndose de ustedes' es natural, mantiene el matiz emotivo y evita una formulación demasiado literal o pesada.
- source_word: ἐλεήσῃ
  english_pob_choice: may show you mercy
  chosen_spanish: les muestre misericordia
  alternatives_spanish:
  - tenga misericordia de ustedes
  - los compadezca
  lexicon: ἐλεέω
  rationale: '''Mostrar misericordia'' sigue de cerca la decisión inglesa y distingue el acto divino de compasión del mandato humano anterior, preservando la repetición deliberada de ἔλεος/ἐλεέω.'
theological_decisions:
- issue: Universal scope of compassion
  english_pob_reading: have compassion toward every person
  chosen_spanish_reading: tengan compasión de toda persona
  alternative_spanish_readings:
  - tengan compasión de cada ser humano
  - tengan compasión hacia todos
  rationale: La forma elegida preserva la amplitud ética del mandato sin masculinizar innecesariamente el alcance ni suavizar el universal del original.
  doctrine_reference: Ethics of neighbor-love / universal charity
- issue: Divine mercy in response to human mercy
  english_pob_reading: so that the Lord also, having compassion on you, may show you mercy
  chosen_spanish_reading: para que también el Señor, compadeciéndose de ustedes, les muestre misericordia
  alternative_spanish_readings:
  - para que también el Señor, teniendo compasión de ustedes, les haga misericordia
  - para que también el Señor se apiade de ustedes
  rationale: 'Se conserva la relación causal y la reciprocidad moral del pasaje: la misericordia ofrecida a otros se corresponde con la misericordia esperada de Dios, sin convertirla en mecanismo meritorio automático.'
  doctrine_reference: Divine mercy; reciprocal ethical exhortation
translation_notes:
  revision_awareness: This draft follows the latest revision pass, which adjusted the English from 'with mercy' to 'in mercy' to better match ἐν ἐλέει. The Spanish renders this with 'en misericordia' to preserve the prepositional force and the source phrasing. No additional textual variants are signaled in the source packet.
  spanish_consistency_notes:
  - Use 'misericordia' consistently for ἔλεος/ἐλεέω in this verse to preserve the repetition of mercy-language.
  - Retain 'el Señor' for κύριος in this context, since the source packet does not mark a direct divine-name quotation requiring 'Yahvé'.
  - Keep the imperative plural 'tengan' to reflect the plural address to the addressees.
