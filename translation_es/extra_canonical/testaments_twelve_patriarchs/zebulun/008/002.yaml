translation:
  language: es
  text: Porque ciertamente en los últimos días Dios enviará su compasión sobre la tierra, y dondequiera que halle compasión de misericordia, allí habita.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὰ σπλάγχνα αὐτοῦ
  english_pob_choice: his compassion
  chosen_spanish: su compasión
  alternatives_spanish:
  - sus entrañas
  - su misericordia
  - su ternura
  lexicon: σπλάγχνα
  rationale: El inglés POB interpreta σπλάγχνα de manera afectiva y relacional como «compassión», no como un término anatómico literal. En español, «su compasión» conserva esa fuerza sin introducir una imagen corporal innecesariamente dura para la lectura pública.
- source_word: σπλάγχνα ἐλέους
  english_pob_choice: compassion of mercy
  chosen_spanish: compasión de misericordia
  alternatives_spanish:
  - entrañas de misericordia
  - misericordia compasiva
  - ternura misericordiosa
  lexicon: σπλάγχνα; ἔλεος
  rationale: 'Mantengo la estructura del griego y del POB inglés para reflejar el doble matiz: una compasión caracterizada por misericordia. «Compasión de misericordia» suena algo enfática, pero preserva la repetición conceptual sin borrar la tensión léxica.'
- source_word: κατοικεῖ
  english_pob_choice: he dwells
  chosen_spanish: habita
  alternatives_spanish:
  - mora
  - vive
  lexicon: κατοικέω
  rationale: «Habita» reproduce bien la idea de residencia estable y suena natural en español bíblico actual. «Mora» sería posible, pero menos transparente para lectura moderna.
theological_decisions:
- issue: La imagen de Dios «enviando» su compasión sobre la tierra
  english_pob_reading: God will send his compassion upon the earth
  chosen_spanish_reading: Dios enviará su compasión sobre la tierra
  alternative_spanish_readings:
  - Dios enviará sus entrañas sobre la tierra
  - Dios derramará su compasión sobre la tierra
  rationale: Sigo la lectura del POB y del griego, donde el objeto enviado es una expresión afectiva divina. «Derramará» interpretaría más libremente la imagen; «su compasión» mantiene el vínculo directo con τὰ σπλάγχνα αὐτοῦ.
  doctrine_reference: La benevolencia divina y su presencia activa entre los misericordiosos.
- issue: La frase «dondequiera que halle compasión de misericordia, allí habita»
  english_pob_reading: wherever he finds compassion of mercy, there he dwells
  chosen_spanish_reading: dondequiera que halle compasión de misericordia, allí habita
  alternative_spanish_readings:
  - dondequiera que encuentre misericordia, allí habita
  - donde halle compasión, allí mora
  rationale: 'Conservo la simetría del POB y la condición ética: la presencia divina se asocia con el lugar/persona donde encuentra misericordia. No simplifico a «misericordia» sola para no perder el eco redundante del original.'
  doctrine_reference: La presencia de Dios entre los misericordiosos.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando todo marcador de nota no anclado; esta versión no usa notas al pie. La redacción sigue de cerca el texto griego y la solución inglesa aprobada, sin cambios de sentido.
  spanish_consistency_notes:
  - He mantenido «Dios» para θεός y «habita» para κατοικεῖ en todo el versículo.
  - He evitado «SEÑOR» porque el texto griego aquí dice ὁ Θεός, no κύριος.
  - He conservado una sintaxis de lectura pública natural en español, sin suavizar la repetición semántica entre compasión y misericordia.
