translation:
  language: es
  text: 'Y dijeron a Jacob[a]: «Reconoce, pues, si esta es la túnica de tu hijo». Y así lo hicieron. Porque a José le quitaron la túnica cuando lo vendían, y lo vistieron con ropa de esclavo. Simeón tomó la túnica y no quiso entregarla. Porque quería cortarlo con la espada, airado porque no lo había matado. Pero todos nos levantamos y le dijimos: «Si no das la túnica, diremos a nuestro padre que solo tú hiciste esta maldad en Israel». Y así se la entregó.


    Y ahora, hijos míos, les mando que guarden a su prójimo y tengan compasión de todos, no solo entre los hombres, sino también hacia los animales irracionales. Porque por estas cosas me bendijo Yahvé, y cuando todos mis hermanos estaban enfermos, yo pasé sin enfermedad. Porque Yahvé conoce la intención de cada uno. Tengan, pues, misericordia en sus corazones[b], porque lo que uno haga a su prójimo, así también Yahvé hará con él. Porque los hijos de mis hermanos estaban enfermos y morían a causa de José, por no haber mostrado misericordia en sus corazones; pero mis hijos fueron preservados libres de enfermedad, como ustedes saben.


    Y cuando yo estaba en la tierra de Canaán, junto a la orilla del mar, solía pescar[c] para Jacob, mi padre, y cuando muchos se ahogaban en el mar[d], yo salía ileso.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Túnica» traduce χιτών con mayor especificidad; también podría verterse «manto» o «vestido», pero «túnica» preserva mejor la prenda básica del relato.
    reason: lexical_alternative
  - marker: b
    text: «Corazones» refleja el sentido idiomático de σπλάγχνα en este contexto; el griego alude a las entrañas como sede de la compasión.
    reason: cultural_note
  - marker: c
    text: La frase griega literalmente dice «cazaba presa», pero el contexto junto al mar favorece entenderlo como pesca, no como caza terrestre.
    reason: lexical_alternative
  - marker: d
    text: La última oración parece continuar más allá del fragmento conservado; la traducción se detiene en el tramo griego disponible.
    reason: textual_variant
lexical_decisions:
- source_word: χιτών
  english_pob_choice: tunic
  chosen_spanish: túnica
  alternatives_spanish:
  - vestido
  - ropa
  - manto
  lexicon: LSJ
  rationale: χιτών designa la prenda básica llevada junto al cuerpo. «Túnica» conserva la especificidad que motivó la elección inglesa y evita el sentido demasiado amplio de «ropa» o el desplazamiento de «manto».
- source_word: πιπράσκειν
  english_pob_choice: selling
  chosen_spanish: vendían
  alternatives_spanish:
  - lo estaban vendiendo
  - al venderlo
  - al negociarlo
  lexicon: LSJ
  rationale: El participio indica la acción concreta de vender a José. «Vendían» mantiene el valor comercial directo sin añadir matices innecesarios.
- source_word: ἱμάτιον δουλικόν
  english_pob_choice: slave’s garment
  chosen_spanish: vestido de esclavo
  alternatives_spanish:
  - ropa de esclavo
  - vestidura de esclavo
  - vestido servil
  lexicon: LSJ
  rationale: δουλικός remite a la condición de esclavo; en español, «vestido de esclavo» conserva la fuerza lexical sin suavizarla a «siervo».
- source_word: κατακόψαι
  english_pob_choice: cut him down
  chosen_spanish: cortarlo
  alternatives_spanish:
  - derribarlo
  - henderlo
  - hacerlo pedazos
  lexicon: LSJ
  rationale: La frase debe conservar la violencia de la intención de Simeón, pero sin exagerar más allá del griego. «Cortarlo con la espada» retiene el instrumento y el impulso agresivo.
- source_word: φυλάσσειν τὸν πλησίον
  english_pob_choice: guard your neighbor
  chosen_spanish: guarden al prójimo
  alternatives_spanish:
  - cuiden al prójimo
  - vigilen al prójimo
  - protejan al prójimo
  lexicon: LSJ
  rationale: φυλάσσειν puede significar guardar, custodiar o proteger. Aquí «guarden al prójimo» conserva el imperativo ético breve y la cercanía al original.
- source_word: εὐσπλαγχνίαν
  english_pob_choice: compassion
  chosen_spanish: compasión
  alternatives_spanish:
  - misericordia entrañable
  - tierno afecto
  - entrañable compasión
  lexicon: LSJ
  rationale: El término expresa compasión profunda y entrañable; «compasión» es la opción más natural en español y mantiene el peso moral.
- source_word: ἀλόγοις ζώοις
  english_pob_choice: unreasoning animals
  chosen_spanish: animales irracionales
  alternatives_spanish:
  - animales sin razón
  - bestias sin razón
  - animales no racionales
  lexicon: LSJ
  rationale: La expresión contrasta a los seres humanos con los demás animales. «Animales irracionales» conserva el contraste y la literalidad conceptual del griego.
- source_word: προαίρεσιν
  english_pob_choice: purpose
  chosen_spanish: intención
  alternatives_spanish:
  - propósito
  - determinación
  - elección moral
  lexicon: LSJ
  rationale: En este contexto, el término apunta a la disposición o intención interior de cada persona. «Intención» comunica esa orientación sin perder la dimensión volitiva.
- source_word: ἔλεος ἐν σπλάγχνοις
  english_pob_choice: mercy in your hearts
  chosen_spanish: misericordia en sus corazones
  alternatives_spanish:
  - misericordia en sus entrañas
  - compasión en su interior
  - misericordia en lo profundo de ustedes
  lexicon: LSJ
  rationale: El inglés revisado pasó de «inward parts» a «hearts» para mayor naturalidad. En español, «corazones» comunica el sentido idiomático de σπλάγχνα sin ocultar la imagen afectiva profunda.
- source_word: ἄνοσος
  english_pob_choice: without illness
  chosen_spanish: sin enfermedad
  alternatives_spanish:
  - libre de enfermedad
  - sin padecer enfermedad
  - sin estar enfermo
  lexicon: LSJ
  rationale: El adjetivo indica ausencia de enfermedad. «Sin enfermedad» es directo y claro en español, manteniendo el contraste con los hermanos enfermos.
- source_word: διεφυλάχθησαν
  english_pob_choice: were kept free from sickness
  chosen_spanish: fueron guardados libres de enfermedad
  alternatives_spanish:
  - fueron preservados sin enfermedad
  - fueron protegidos de la enfermedad
  - permanecieron sanos
  lexicon: LSJ
  rationale: El pasivo comunica preservación. La formulación española intenta conservar esa idea y la vincula al campo semántico de la enfermedad del contexto.
- source_word: ἐθήρευον θήραν
  english_pob_choice: I used to catch fish
  chosen_spanish: solía pescar
  alternatives_spanish:
  - solía cazar presa
  - solía capturar peces
  - solía pescar peces
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «cazar presa», el contexto costero y la mención del mar justifican la lectura de pesca, tal como en la auditoría inglesa.
- source_word: ἀγχομένων ἐν τῇ θαλάσσῃ
  english_pob_choice: being choked in the sea
  chosen_spanish: se ahogaban en el mar
  alternatives_spanish:
  - se asfixiaban en el mar
  - eran ahogados en el mar
  - se sofocaban en el mar
  lexicon: LSJ
  rationale: El participio puede sugerir asfixia o ahogo. «Se ahogaban» ofrece una equivalencia natural en español y conserva la imagen de peligro acuático.
theological_decisions:
- issue: Principio retributivo recíproco en Zebulún 5:3
  english_pob_reading: whatever a person does to his neighbor, so the Lord also will do with him
  chosen_spanish_reading: lo que uno haga a su prójimo, así también Yahvé hará con él
  alternative_spanish_readings:
  - Yahvé hará con él de la misma manera
  - así el Señor también tratará con él
  - Yahvé le hará lo mismo
  rationale: El griego presenta una reciprocidad moral fuerte. La traducción mantiene la simetría sin atenuarla ni resolverla en una formulación más débil.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
- issue: Alcance ético que incluye a los animales
  english_pob_reading: not only among people, but also toward unreasoning animals
  chosen_spanish_reading: no solo entre los hombres, sino también de los animales irracionales
  alternative_spanish_readings:
  - no solo entre las personas, sino también hacia los animales
  - sino también hacia los animales sin razón
  - también respecto de las bestias
  rationale: El texto amplía explícitamente la compasión más allá de los seres humanos. La traducción conserva esa ampliación inusual y visible.
  doctrine_reference: PHILOSOPHY.md §Original-language primacy over translation tradition
- issue: Uso del nombre divino en lugar de un título de sustitución
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Soberano
  rationale: Aunque la fuente griega usa Κύριος, el contexto del proyecto exige recuperar el nombre divino cuando el griego refleja la tradición de sustitución del nombre. Aquí se mantiene Yahvé en el texto principal.
  doctrine_reference: Project terminology defaults for יהוה / YHWH
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente que cambió «inward parts» por «hearts» para mayor naturalidad. En español mantuve «corazones» en el versículo correspondiente, porque reproduce bien la idiomática de σπλάγχνα sin perder el tono afectivo y moral del texto. También seguí la auditoría inglesa al preferir «pescar» por el contexto marítimo y al conservar el contraste ético hacia los animales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal para Κύριος conforme a la política del proyecto.
  - Se evitó «siervo» para δουλικός, porque el contraste de esclavitud es lexicalmente relevante aquí.
  - «Prójimo» conserva la formulación ética directa de πλησίον sin modernizarla a un término menos preciso.
  - La secuencia final conserva la ambigüedad del griego sobre la gente que se ahogaba en el mar, sin especificarla más de lo que permite el texto.
