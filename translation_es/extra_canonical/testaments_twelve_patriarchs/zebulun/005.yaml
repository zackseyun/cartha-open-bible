base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/005.yaml
  text: 'And they said to Jacob[a], “Recognize, then, whether this is your son’s tunic.” And they did so. For they stripped Joseph of the tunic when they were selling him, and clothed him in a slave’s garment. And Simeon took the tunic and did not want to give it. For he wanted to cut him down with the sword, being angry because he had not killed him. But we all rose up and said to him, “If you do not give the tunic, we will tell our father that you alone did this evil thing in Israel.” And so he gave it to them.


    And now, my children, I command you to guard your neighbor and to have compassion toward all, not only among people, but also toward unreasoning animals. For because of these things the Lord blessed me, and when all my brothers were sick, I passed through without illness. For the Lord knows each person’s purpose. Have mercy, therefore, in your hearts[b], because whatever a person does to his neighbor, so the Lord also will do with him. For the sons of my brothers were sick and were dying because of Joseph, because they had not shown mercy in their hearts; but my sons were kept free from sickness, as you know.


    And when I was in the land of Canaan, by the seashore, I used to catch fish for Jacob my father, and when many were being choked in the sea[d][c], I came through unharmed.'
  footnotes:
  - marker: a
    text: Or 'coat' or 'robe' for χιτών; 'tunic' is chosen for greater specificity.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'mercy in your inward parts' reflects the Greek idiom with σπλάγχνα, the inner organs as the seat of compassion.
    reason: cultural_note
  - marker: c
    text: The Greek literally says 'I hunted prey,' but the seashore setting suggests fishing or catching sea-creatures for his father.
    reason: lexical_alternative
  - marker: d
    text: The final sentence appears to continue beyond the surviving excerpt provided here; the translation ends with the extant Greek in the source segment.
    reason: textual_variant
