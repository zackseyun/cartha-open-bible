base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/003/008.yaml
  text: And the brothers of Joseph were not willing to preserve the life of their brother, and the Lord took from them the sandal that they wore against Joseph their brother.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:58:27Z'
    unchanged: false
    changes_summary: Changed 'raise up the life' to 'preserve the life' for more natural and accurate English; changed 'removed from them' to 'took from them' and 'which' to 'that' for smoother formal style.
translation:
  language: es
  text: Y los hermanos de José no quisieron preservar la vida de su hermano, y Yahvé les quitó el sandalia[a] que llevaban contra José, su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «la sandalia» traduce el singular griego ὑπόδημα; en español puede sonar colectivo, pero se conserva la imagen concreta del objeto.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἀδελφοὶ τοῦ Ἰωσὴφ
  english_pob_choice: the brothers of Joseph
  chosen_spanish: los hermanos de José
  alternatives_spanish:
  - los hermanos de José
  lexicon: ἀδελφοί
  rationale: Mantiene el referente familiar directo y el nombre propio habitual en español. No se requiere una variación especial.
- source_word: οὐκ ἠθέλησαν ζωὴν ἀδελφοῦ αὐτῶν
  english_pob_choice: were not willing to preserve the life of their brother
  chosen_spanish: no quisieron preservar la vida de su hermano
  alternatives_spanish:
  - no estuvieron dispuestos a preservar la vida de su hermano
  - no quisieron guardar la vida de su hermano
  lexicon: θέλω; ζωή
  rationale: «Preservar la vida» sigue la revisión inglesa final y comunica bien el valor de proteger la vida. «Guardar» sería posible, pero en español suena algo menos natural aquí.
- source_word: ὁ Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: κύριος
  rationale: La política del proyecto pide «Yahvé» para el nombre divino, incluso cuando el griego dice κύριος en un contexto que remite al nombre divino. Aquí la acción soberana corresponde a Dios, no a un simple título humano.
- source_word: ὑπέλυσεν αὐτοὺς τὸ ὑπόδημα
  english_pob_choice: took from them the sandal
  chosen_spanish: les quitó la sandalia
  alternatives_spanish:
  - les quitó el calzado
  - les tomó la sandalia
  lexicon: ὑπολύω; ὑπόδημα
  rationale: «Quitar la sandalia» expresa con claridad la imagen idiomática del griego. El artículo singular en español fluye mejor con el objeto simbólico, aunque el griego usa singular neutro con fuerza genérica.
- source_word: ὃ ἐφόρεσαν κατὰ Ἰωσὴφ
  english_pob_choice: that they wore against Joseph
  chosen_spanish: que llevaban contra José
  alternatives_spanish:
  - que llevaban en contra de José
  - que usaban contra José
  lexicon: φορέω; κατά
  rationale: «Llevaban contra José» conserva el valor hostil de κατά con un español natural. No se expande a una paráfrasis interpretativa.
theological_decisions:
- issue: Uso del nombre divino en κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: La convención del proyecto exige no ocultar el nombre divino tras una mayúscula reverencial. Aunque el texto griego usa κύριος, el contexto narrativo y la política de la serie favorecen «Yahvé».
  doctrine_reference: Tetragrammaton / nombre divino
- issue: Sentido de la acción sobre la sandalia
  english_pob_reading: took from them the sandal that they wore against Joseph their brother
  chosen_spanish_reading: les quitó la sandalia que llevaban contra José, su hermano
  alternative_spanish_readings:
  - les quitó el calzado que llevaban contra José, su hermano
  - les quitó la sandalia que usaban contra José, su hermano
  rationale: Se conserva la imagen concreta del objeto simbólico sin convertirla en explicación alegórica. La formulación mantiene la tensión entre literalidad e idiomatismo.
  doctrine_reference: Simbología narrativa / juicio divino
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió «preserve the life» y «took from them the sandal» por mayor naturalidad y precisión. La versión española adopta esos mismos ajustes de sentido, evitando calcos como «elevar la vida» o «remover de ellos».
  spanish_consistency_notes:
  - Se mantiene «José» para el nombre propio según uso estándar en español.
  - Se usa «Yahvé» de acuerdo con la terminología del proyecto para el nombre divino.
  - «Preservar la vida» refleja el matiz de protección/guardia de ζωή en este contexto narrativo.
