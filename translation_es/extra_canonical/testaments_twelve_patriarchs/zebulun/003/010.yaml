id: T12P.ZEB.3.10
reference: Testament of Zebulun 3:10
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 7. Οὐ μόνον δὲ προσεκύνησαν αὐτῷ⁴² ἀλλὰ καὶ ἐνεπτύσθησαν⁴³ παραχρῆμα⁴⁴ πεσόντες ἔμπροσθεν αὐτοῦ, καὶ⁴⁵ ἠσχύνθησαν⁴⁶ παρὰ⁴⁷ τῶν⁴⁸ Αἰγυπτίων⁴⁹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/003/010.yaml
  text: And not only did they bow down to him, but they also immediately fell before him and spat, and they were put to shame by the Egyptians.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:58Z'
    unchanged: false
    changes_summary: 'Revised to reflect the Greek more accurately: ἐνεπτύσθησαν here means ''they spat'' rather than ''they were spat upon.'' Also reordered the clause to match the sequence of actions more naturally while retaining all elements of the source.'
translation:
  language: es
  text: Y no solo se postraron ante él, sino que también inmediatamente cayeron delante de él y escupieron, y quedaron avergonzados por los egipcios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Οὐ μόνον δὲ προσεκύνησαν αὐτῷ
  english_pob_choice: And not only did they bow down to him
  chosen_spanish: Y no solo se postraron ante él
  alternatives_spanish:
  - Y no solo lo adoraron
  - Y no solo se inclinaron ante él
  lexicon: προσκυνέω
  rationale: El verbo expresa postración/inclinación reverente; en este contexto narrativo, «postrarse ante él» conserva el gesto físico sin introducir una carga cultual que el pasaje no exige. «Adoraron» sería demasiado fuerte y teológicamente desplazado.
- source_word: ἐνεπτύσθησαν
  english_pob_choice: they also immediately fell before him and spat
  chosen_spanish: cayeron delante de él y escupieron
  alternatives_spanish:
  - escupieron
  - fueron escupidos
  lexicon: ἐμπτύω
  rationale: La revisión inglesa ya corrigió el valor verbal a «they spat»; por eso el español mantiene el sujeto activo «escupieron», no una pasiva. Se conserva además la secuencia narrativa con «cayeron delante de él» antes del acto de escupir.
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - al instante
  - de inmediato
  lexicon: παραχρῆμα
  rationale: Adverbio temporal directo; «inmediatamente» es claro, moderno y fiel al matiz de inmediatez enfática.
- source_word: ἠσχύνθησαν
  english_pob_choice: they were put to shame
  chosen_spanish: quedaron avergonzados
  alternatives_spanish:
  - fueron avergonzados
  - se avergonzaron
  lexicon: αἰσχύνω
  rationale: El pasivo griego puede expresar quedar en vergüenza/ser humillados. «Quedaron avergonzados» mantiene el efecto resultante sin forzar una pasiva dura en español; también evita confundirlo con una simple vergüenza subjetiva.
- source_word: παρὰ τῶν Αἰγυπτίων
  english_pob_choice: by the Egyptians
  chosen_spanish: por los egipcios
  alternatives_spanish:
  - de parte de los egipcios
  - a causa de los egipcios
  lexicon: παρά + genitivo
  rationale: La preposición con genitivo marca agente o procedencia; «por los egipcios» es la forma natural en español para indicar quién produjo la vergüenza.
theological_decisions:
- issue: Valor de προσεκύνησαν en un contexto no cristológico
  english_pob_reading: bow down to him
  chosen_spanish_reading: se postraron ante él
  alternative_spanish_readings:
  - lo adoraron
  - lo reverenciaron
  rationale: Evita proyectar «adoración» donde el texto solo describe reverencia física/homenaje. La lectura mantiene la tensión entre gesto corporal y posible deferencia honorífica sin resolverla artificialmente.
  doctrine_reference: Distinción entre postración/homenaje y adoración cultual
- issue: Construcción de la secuencia verbal con ἐνεπτύσθησαν
  english_pob_reading: they also immediately fell before him and spat
  chosen_spanish_reading: también inmediatamente cayeron delante de él y escupieron
  alternative_spanish_readings:
  - también escupieron al caer delante de él
  - también, al caer delante de él, escupieron
  rationale: 'La revisión inglesa señala que el verbo es activo; el español refleja esa corrección y conserva el orden narrativo: primero la caída, luego el escupir, con la inmediatez subrayada por «inmediatamente».'
  doctrine_reference: Fidelidad a la sintaxis y aspecto narrativo del original
translation_notes:
  revision_awareness: 'La versión sigue la revisión más reciente del audit trail: ἐνεπτύσθησαν debe entenderse como un verbo activo («escupieron»), no como pasiva («fueron escupidos»). Además, se respeta la reordenación que hace más natural la secuencia de acciones en español sin perder los elementos del griego.'
  spanish_consistency_notes:
  - Se mantiene «postrarse» para προσκυνέω cuando el contexto describe homenaje/reverencia corporal, reservando «adorar» para contextos cultuales más explícitos.
  - Se usa «escupieron» en correspondencia con la corrección del pasivo mal entendido en el borrador anterior.
  - «Quedaron avergonzados» expresa el resultado pasivo de ἠσχύνθησαν con naturalidad en español.
  - No se introduce vocabulario tradicional eclesiástico que el griego no requiera.
