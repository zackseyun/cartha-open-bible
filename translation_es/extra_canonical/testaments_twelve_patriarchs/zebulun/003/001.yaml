base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/003/001.yaml
  text: And when Joseph saw me weeping with him, and the brothers coming on to kill him, he took refuge behind me, begging me for help on his behalf.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:55Z'
    unchanged: true
