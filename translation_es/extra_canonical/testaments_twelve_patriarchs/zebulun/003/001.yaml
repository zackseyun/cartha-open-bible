translation:
  language: es
  text: Y cuando José me vio llorando con él, y a los hermanos acercándose para matarlo, se refugió detrás de mí, pidiéndome ayuda a favor de él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἰδὼν δὲ Ἰωσὴφ
  english_pob_choice: And when Joseph saw me
  chosen_spanish: Y cuando José me vio
  alternatives_spanish:
  - Y al ver José
  - Y cuando José vio
  lexicon: Ἰωσὴφ -> José
  rationale: Conserva el sujeto explícito y la relación temporal de Ἰδών δέ con una construcción natural en español. 'Me vio' refleja el objeto implícito del participio en el contexto de la escena.
- source_word: συνκλαίοντά μοι αὐτῷ
  english_pob_choice: weeping with him
  chosen_spanish: llorando con él
  alternatives_spanish:
  - llorando junto con él
  - llorando con él mismo
  lexicon: συνκλαίοντά -> llorando con
  rationale: El compuesto expresa lamento compartido; 'llorando con él' comunica la simultaneidad y la compañía del llanto sin endurecer el español.
- source_word: τοὺς ἀδελφοὺς ἐπερχομένους ἀνελεῖν αὐτὸν
  english_pob_choice: the brothers coming on to kill him
  chosen_spanish: a los hermanos acercándose para matarlo
  alternatives_spanish:
  - a los hermanos que venían para matarlo
  - a sus hermanos que se le acercaban para matarlo
  lexicon: ἐπερχομένους ... ἀνελεῖν -> acercándose ... para matarlo
  rationale: Mantiene el movimiento agresivo de ἐπερχομένους y el infinitivo final ἀνελεῖν con una expresión directa y fiel. 'Matarlo' preserva el referente masculino singular de αὐτόν.
- source_word: κατέφυγον ὄπισθεν μου
  english_pob_choice: he took refuge behind me
  chosen_spanish: se refugió detrás de mí
  alternatives_spanish:
  - se escondió detrás de mí
  - buscó refugio detrás de mí
  lexicon: κατέφυγον ... ὄπισθεν -> se refugió detrás de mí
  rationale: '''Se refugió'' conserva la idea de buscar amparo; ''detrás de mí'' traduce ὄπισθεν con una preposición idiomática en español.'
- source_word: δεόμενος τῆς πρὸς αὐτὸν βοηθείας
  english_pob_choice: begging me for help on his behalf
  chosen_spanish: pidiéndome ayuda a favor de él
  alternatives_spanish:
  - suplicándome ayuda por él
  - rogándome que lo ayudara
  lexicon: δεόμενος ... βοηθείας -> pidiéndome ayuda
  rationale: '''Pidiéndome'' transmite la súplica implícita de δεόμενος sin sobreactuar. ''A favor de él'' refleja τῆς πρὸς αὐτὸν βοηθείας de modo transparente, manteniendo la orientación de la ayuda hacia José.'
theological_decisions:
- issue: La ayuda solicitada se presenta como dirigida a José, no como una formulación doctrinal especial.
  english_pob_reading: begging me for help on his behalf
  chosen_spanish_reading: pidiéndome ayuda a favor de él
  alternative_spanish_readings:
  - suplicándome ayuda por él
  - pidiéndome que lo ayudara
  rationale: El griego especifica que la ayuda está orientada hacia él (πρὸς αὐτόν); la traducción evita añadir una mediación teológica que el texto no exige, y conserva la escena narrativa directa.
  doctrine_reference: Narrative agency / intercession wording
translation_notes:
  revision_awareness: The latest revision pass marked the source-fix passage as unchanged; this Spanish draft follows the established English POB sense closely while re-expressing the Greek syntax in natural Spanish.
  spanish_consistency_notes:
  - Se mantiene 'José' como forma estable del nombre propio.
  - Se conserva el paralelismo narrativo de la escena sin introducir artículos o explicaciones ajenas al griego.
  - No se usa 'SEÑOR' ni terminología doctrinal ajena, porque el versículo no contiene lenguaje divino explícito.
