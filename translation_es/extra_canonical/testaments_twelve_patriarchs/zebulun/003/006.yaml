source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 2. *Ἀλλὰ Συμεὼν² καὶ *ὁ Δὰν καὶ ὁ Γὰδ καὶ τὰ τέκνα αὐτῶν³, καὶ⁴ λαβόντες *τὴν τιμὴν αὐτοῦ⁵ ἐπρίαντο⁶ ὑποδήματα ἑαυτοῖς⁷ *καὶ ταῖς γυναιξὶν αὐτῶν⁸ Γκαὶ τοῖς τέκνοις αὐτῶν˥⁹, εἰπόντες· 3. *Οὐ φαγόμεθα αὐτήν¹⁰, ὅτι τιμὴ ἐστιν *αἵματος τοῦ ἀδελφοῦ ἡμῶν¹¹, ἀλλὰ καταπατήσει¹² καταπατήσωμεν¹³ αὐτήν, ἀνθ' ὧν εἶπεν βασιλεῦσαι¹⁴ ἐφ' ἡμᾶς¹⁵, καὶ ἴδωμεν¹⁶ τί ἐστι¹⁷ *τὰ ἐνύπνια¹⁸ αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/003/006.yaml
  text: saying, “We will not eat it, because it is the price of our brother’s blood; rather, let us trample it underfoot, because he said that he would reign over us, and then we shall see what his dreams are.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:57Z'
    unchanged: false
    changes_summary: Changed 'eat from it' to 'eat it' for closer lexical accuracy, and 'we will trample it underfoot' to 'let us trample it underfoot' to reflect the hortatory subjunctive.
translation:
  language: es
  text: 'diciendo: «No la comeremos, porque es el precio de la sangre de nuestro hermano; antes bien, [a]pisémosla[b] bajo nuestros pies, porque él dijo que reinaría sobre nosotros, y entonces veremos cuáles son sus sueños».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La inclusión de la exhortación «pisémosla» refleja el subjuntivo hortatorio del griego; no es una afirmación de futuro, sino una invitación agresiva al acto.
    reason: spanish_style_note
  - marker: b
    text: «Bajo nuestros pies» explicita en español la imagen de καταπατέω («pisotear, hollar») sin apartarse del sentido de desprecio y profanación del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ φαγόμεθα αὐτήν
  english_pob_choice: We will not eat it
  chosen_spanish: No la comeremos
  alternatives_spanish:
  - No comeremos de ella
  - No la comeremos de eso
  lexicon: φαγόμεθα
  rationale: El griego usa un objeto directo femenino singular; en español, «la» mantiene la referencia al objeto mencionado y sigue de cerca la economía del original sin volverla extraña.
- source_word: ὑποδήματα
  english_pob_choice: shoes
  chosen_spanish: bajo nuestros pies
  alternatives_spanish:
  - con sandalias
  - en el suelo
  lexicon: ὑποδήματα
  rationale: El contexto de «pisarla» exige en español una expresión natural que conserve la imagen de desprecio y pisoteo; la frase refleja el acto, no el objeto, porque el texto pivota en el gesto de profanación más que en el nombre del calzado.
- source_word: καταπατήσει καταπατήσωμεν αὐτήν
  english_pob_choice: let us trample it underfoot
  chosen_spanish: pisémosla[b] bajo nuestros pies
  alternatives_spanish:
  - la pisoteemos
  - la aplastemos
  lexicon: καταπατέω
  rationale: El aoristo hortatorio griego se vierte mejor con un imperativo exhortativo inclusivo en español, «pisémosla», que conserva el tono de propuesta colectiva; «bajo nuestros pies» explicita la imagen idiomática de pisotear.
- source_word: τὰ ἐνύπνια
  english_pob_choice: his dreams
  chosen_spanish: sus sueños
  alternatives_spanish:
  - sus sueños nocturnos
  - sus visiones
  lexicon: ἐνύπνια
  rationale: «Sueños» es el equivalente directo y más natural; no se añadió «nocturnos» porque el contexto narrativo ya delimita el sentido onírico.
theological_decisions:
- issue: La frase sobre «el precio de la sangre de nuestro hermano» mantiene una carga moral/jurídica fuerte.
  english_pob_reading: because it is the price of our brother’s blood
  chosen_spanish_reading: porque es el precio de la sangre de nuestro hermano
  alternative_spanish_readings:
  - porque es el pago por la sangre de nuestro hermano
  - porque vale la sangre de nuestro hermano
  rationale: Se conserva «precio» porque expresa el valor culpable asociado a la sangre del hermano y mantiene la tensión ética del pasaje sin suavizarla.
  doctrine_reference: Génesis 37:26-27; lenguaje de sangre culpable
- issue: La cláusula final conserva el motivo de soberanía rechazada.
  english_pob_reading: because he said that he would reign over us
  chosen_spanish_reading: porque él dijo que reinaría sobre nosotros
  alternative_spanish_readings:
  - porque dijo que iba a reinar sobre nosotros
  - porque afirmó que gobernaría sobre nosotros
  rationale: «Reinaría» preserva la realeza como idea central del sueño de José; no se reemplaza por «gobernar» para no debilitar la pretensión real implícita.
  doctrine_reference: Génesis 37:5-8; tema de dominio/soberanía
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió dos puntos: cambió «eat from it» por «eat it» y ajustó «we will trample it underfoot» a «let us trample it underfoot» para reflejar el hortatory subjunctive. La versión española sigue ese ajuste con «No la comeremos» y «pisémosla», evitando una lectura futura o meramente descriptiva.'
  spanish_consistency_notes:
  - Se conserva el registro narrativo-citado con comillas angulares en español.
  - Se mantiene «reinaría sobre nosotros» para reflejar la pretensión real mencionada en el texto fuente.
  - No se introdujo terminología eclesiástica ajena al pasaje.
  - Las imágenes de comer y pisotear se conservan en paralelo con el griego y con la auditoría inglesa revisada.
