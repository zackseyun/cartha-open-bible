source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 4. Διὰ τοῦτο οὖν¹⁹ ἐν γραφῇ *νόμου Μωσέως γέγραπται²⁰· Τὸν μὴ θέλοντα *ἀναστῆσαι σπέρμα²¹ τῷ ἀδελφῷ αὐτοῦ ὑπολύεσθαι²² τὸ ὑπόδημα αὐτοῦ²³ καὶ ἐμπτύεσθαι εἰς τὸ πρόσωπον.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/003/007.yaml
  text: 'Therefore it is written in the book of the law of Moses: “The one who does not want to raise up seed for his brother—his sandal shall be removed, and they shall spit in his face.”'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:58Z'
    unchanged: false
    changes_summary: Changed 'record' to 'book' for γραφή, and 'The man who does not wish' to 'The one who does not want' for a more direct rendering of the Greek while preserving formal register. Kept 'raise up seed,' 'his sandal shall be removed,' and 'they shall spit in his face' as accurate and complete.
translation:
  language: es
  text: 'Por eso está escrito en el libro de la ley de Moisés: «El que no quiera levantar descendencia para su hermano, se le quitará la sandalia y le escupirán en el rostro».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν γραφῇ νόμου Μωσέως
  english_pob_choice: in the book of the law of Moses
  chosen_spanish: en el libro de la ley de Moisés
  alternatives_spanish:
  - en el libro de la ley de Moisés
  - en la escritura de la ley de Moisés
  lexicon: γραφή
  rationale: Sigo la revisión inglesa que precisó γραφή como 'book' en este contexto, no como 'record'. En español, 'libro de la ley de Moisés' comunica con naturalidad la referencia textual a la Torá y conserva el registro formal.
- source_word: Τὸν μὴ θέλοντα
  english_pob_choice: The one who does not want
  chosen_spanish: El que no quiera
  alternatives_spanish:
  - El que no quiere
  - La persona que no quiere
  lexicon: θέλω
  rationale: La construcción relativa indefinida en español fluye mejor como 'El que no quiera'. Mantiene el valor general y la voluntad negativa del griego sin endurecerlo innecesariamente.
- source_word: ἀναστῆσαι σπέρμα
  english_pob_choice: raise up seed
  chosen_spanish: levantar descendencia
  alternatives_spanish:
  - levantar descendencia
  - hacer surgir descendencia
  - producir descendencia
  lexicon: ἀναστῆσαι / σπέρμα
  rationale: '''Levantar descendencia'' conserva el lenguaje idiomático heredado del pasaje legal aludido, mientras que ''descendencia'' expresa σπέρμα de modo más claro en español que ''simiente'', sin perder el sentido genealógico.'
- source_word: ὑπολύεσθαι τὸ ὑπόδημα αὐτοῦ
  english_pob_choice: his sandal shall be removed
  chosen_spanish: se le quitará la sandalia
  alternatives_spanish:
  - se le quitará la sandalia
  - le desatarán la sandalia
  lexicon: ὑπόδημα
  rationale: '''Sandalia'' es el equivalente natural de ὑπόδημα. ''Se le quitará'' refleja la pasiva del original y mantiene la impersonalidad del rito.'
- source_word: ἐμπτύεσθαι εἰς τὸ πρόσωπον
  english_pob_choice: they shall spit in his face
  chosen_spanish: le escupirán en el rostro
  alternatives_spanish:
  - le escupirán en el rostro
  - escupirán en su cara
  lexicon: ἐμπτύεσθαι / πρόσωπον
  rationale: '''Rostro'' conserva un registro más digno y bíblico que ''cara'', sin añadir solemnidad ajena al pasaje. El plural impersonal ''le escupirán'' reproduce la fuerza del rito colectivo.'
theological_decisions:
- issue: Ritual de deshonra por negarse a dar descendencia al hermano
  english_pob_reading: The one who does not want to raise up seed for his brother—his sandal shall be removed, and they shall spit in his face.
  chosen_spanish_reading: El que no quiera levantar descendencia para su hermano, se le quitará la sandalia y le escupirán en el rostro.
  alternative_spanish_readings:
  - El que no quiera suscitar descendencia para su hermano...
  - Al que no quiera levantar descendencia para su hermano...
  rationale: Mantengo la referencia legal/ritual tal como la POB inglesa la presenta, sin suavizar la vergüenza pública ni reinterpretarla como una simple falta privada. El español conserva el valor forense y social del acto.
  doctrine_reference: Ley de levirato / costumbre legal israelita (cf. Dt 25:5-10)
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'record' por 'book' para γραφή y ajustó 'The man who does not wish' a 'The one who does not want'. La versión española sigue esa actualización con 'libro' y 'El que no quiera', y conserva la literalidad controlada de 'raise up seed', 'his sandal shall be removed' y 'they shall spit in his face'.
  spanish_consistency_notes:
  - Uso 'sandalia' para ὑπόδημα de forma consistente con un contexto ritual de deshonra.
  - Evito 'simiente' para no introducir un arcaísmo innecesario; 'descendencia' transmite bien el sentido genealógico.
  - Conservo 'Moisés' y no 'Moshe' por claridad lectora en español bíblico estándar.
