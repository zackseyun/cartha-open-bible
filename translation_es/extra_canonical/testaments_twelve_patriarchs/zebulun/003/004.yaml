translation:
  language: es
  text: Y ellos hicieron así hasta que lo vendieron a los ismaelitas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἐποίησαν οὕτως
  english_pob_choice: And they did so
  chosen_spanish: Y ellos hicieron así
  alternatives_spanish:
  - Y así hicieron
  - Y procedieron de ese modo
  lexicon: καὶ / ποιέω / οὕτως
  rationale: Conserva la coordinación narrativa y el sentido de acción conforme a lo ya dicho. «Hicieron así» transmite el valor idiomático de ἐποίησαν οὕτως sin endurecerlo en una calca innecesaria.
- source_word: ἕως ὅτου
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta que llegó el tiempo en que
  lexicon: ἕως ὅτου
  rationale: «Hasta que» es la equivalencia natural en español para marcar el límite temporal de la acción.
- source_word: ἐπώλησαν αὐτόν
  english_pob_choice: they sold him
  chosen_spanish: lo vendieron
  alternatives_spanish:
  - lo habían vendido
  - lo comercializaron
  lexicon: πωλέω / αὐτόν
  rationale: «Lo vendieron» reproduce la fuerza verbal directa del griego y mantiene el objeto pronominal masculino singular sin agregar matices ajenos al texto.
- source_word: τοῖς Ἰσμαηλίταις
  english_pob_choice: to the Ishmaelites
  chosen_spanish: a los ismaelitas
  alternatives_spanish:
  - a los hijos de Ismael
  - a los ismaelitas
  lexicon: Ἰσμαηλίται
  rationale: Se conserva el etnónimo reconocido en español bíblico como «ismaelitas», que es claro y fiel al referente étnico del original.
theological_decisions:
- issue: Referencia étnica sin carga doctrinal explícita
  english_pob_reading: to the Ishmaelites
  chosen_spanish_reading: a los ismaelitas
  alternative_spanish_readings:
  - a los descendientes de Ismael
  - a los hijos de Ismael
  rationale: El versículo presenta un traslado/venta, no una afirmación doctrinal. Se mantiene el etnónimo simple del griego y de la versión inglesa, sin expandirlo innecesariamente.
  doctrine_reference: Ninguna; lectura narrativa literal.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta propuesta mantiene el sentido y la estructura del texto griego y coincide con la lectura inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene un español sobrio y narrativo.
  - No se introduce terminología teológica ajena al pasaje.
  - El sujeto plural 'ellos' permanece explícito para claridad, como en la traducción inglesa auditada.
