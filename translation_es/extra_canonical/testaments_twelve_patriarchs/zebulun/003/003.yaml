- from: Porque por esta razón Yahvé impidió que brotara agua entre ellos, para que se hiciera provisión para José, su hermano.
  to: Porque por esta razón Yahvé impidió que brotara agua en ellos, para que se hiciera provisión para José, su hermano.
  rationale: Se hace una corrección menor de «entre ellos» a «en ellos» para reflejar mejor ἐν αὐτοῖς y evitar una imagen espacial menos fiel en español. No se requieren otros cambios.
