  text: 8. Διὰ γὰρ τοῦτο ἐκώλυσε ὁ⁴⁴ Κύριος *τοῦ μὴ ἀναβλῦσαι ὕδωρ⁴⁵ ἐν αὐτοῖς ἵνα *γένηται περιποίησις τῷ⁴⁶ Ἰωσήφ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/003/003.yaml
  text: For this reason the Lord prevented water from springing up in them, so that provision might be made for Joseph, his brother.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:57Z'
    unchanged: false
    changes_summary: Revised the final clause to reflect γένηται περιποίησις more accurately as 'provision might be made' rather than 'might be preserved,' and accounted for τῷ ἀδελφοί Ἰωσήφ by explicitly including 'Joseph, his brother.'
translation:
  language: es
  text: Porque por esta razón Yahvé impidió que brotara agua en ellos, para que se hiciera provisión para José, su hermano.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Señor
  lexicon: κύριος
  rationale: El proyecto pide reproducir el nombre divino como «Yahvé» cuando el contexto griego alude al nombre divino; aquí el sujeto es el agente soberano de la acción y no un simple título de cortesía. Se evita la máscara litúrgica «Señor» para mantener transparencia textual.
- source_word: ἐκώλυσε ... τοῦ μὴ ἀναβλῦσαι ὕδωρ
  english_pob_choice: prevented water from springing up
  chosen_spanish: impidió que brotara agua
  alternatives_spanish:
  - detuvo el brotar del agua
  - impidió que el agua brotara
  lexicon: κωλύω / ἀναβλύζω ὕδωρ
  rationale: «Impidió que brotara agua» conserva la fuerza causal de κωλύω y la imagen de ἀναβλύζω como agua que brota o mana. Se mantiene un español natural sin perder la metáfora hidráulica del original.
- source_word: γένηται περιποίησις
  english_pob_choice: so that provision might be made
  chosen_spanish: para que se hiciera provisión
  alternatives_spanish:
  - para que hubiera provisión
  - para que se preparara provisión
  lexicon: περιποίησις
  rationale: La revisión inglesa corrigió una lectura de preservación a la idea de «provision might be made». En español, «se hiciera provisión» reproduce el resultado intencional sin forzar una formulación comercial o demasiado moderna.
- source_word: τῷ Ἰωσήφ
  english_pob_choice: for Joseph, his brother
  chosen_spanish: para José, su hermano
  alternatives_spanish:
  - para José, el hermano de ellos
  - para José, su hermano
  lexicon: Ἰωσήφ
  rationale: Se mantiene el nombre propio «José» y se incluye la relación fraterna explícita que la revisión inglesa añadió. «Su hermano» integra la precisión relacional sin sobreexplicar el referente.
theological_decisions:
- issue: Identificación del sujeto divino
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Dado que el texto griego atribuye la acción al κύριος en un marco de intervención divina, el estándar del proyecto exige usar «Yahvé» para evitar la sustitución devocional genérica y preservar la referencia al nombre divino.
  doctrine_reference: Divine Name / Tetragrammaton rendering policy
- issue: Finalidad del acto divino
  english_pob_reading: so that provision might be made for Joseph, his brother
  chosen_spanish_reading: para que se hiciera provisión para José, su hermano
  alternative_spanish_readings:
  - para que José fuera preservado
  rationale: La revisión auditada corrigió la lectura hacia provisión, no preservación. La frase española conserva la finalidad instrumental del acto y evita introducir una idea no sustentada por περιποίησις en este contexto.
  doctrine_reference: Textual-semantic fidelity to Greek περιποίησις
translation_notes:
  revision_awareness: La versión inglesa de auditoría fue revisada desde «so that Joseph might be preserved» a «so that provision might be made for Joseph, his brother». La traducción española sigue esa corrección y refleja tanto la finalidad de provisión como la referencia explícita a José como hermano.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para κύριος cuando el contexto remite al agente divino.
  - Se evita «Cristo» y otras terminologías no presentes en el pasaje.
  - «Provisión» se mantiene en sentido de suministro o arreglo necesario, no de preservación personal.
  - La sintaxis conserva el orden causal-final del griego sin calco rígido.
