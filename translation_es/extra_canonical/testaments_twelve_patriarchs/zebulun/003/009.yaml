source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 6. Καὶ *γὰρ ἐλθόντες ἐν Αἰγύπτῳ³³ ὑπελύθησαν³⁴ *ὑπὸ τῶν παίδων³⁵ Ἰωσὴφ ἔξωθεν³⁶ τοῦ πυλῶνος, καὶ οὕτως³⁷ προσεκύνησαν³⁸ *τῷ Ἰωσὴφ³⁹ κατὰ τὸν τύπον βασιλέως⁴⁰ Φαραώ⁴¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/003/009.yaml
  text: For when they came into Egypt, they had their sandals removed by the attendants of Joseph outside the gate, and so they bowed down to Joseph in the manner before King Pharaoh.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:57Z'
    unchanged: false
    changes_summary: 'Adjusted the final clause for closer alignment with the Greek: removed the added words ''of those'' and rendered κατὰ τὸν τύπον more directly as ''in the manner before King Pharaoh.'''
translation:
  language: es
  text: Porque, cuando llegaron a Egipto, los sirvientes de José les quitaron las sandalias fuera de la puerta, y así se inclinaron ante José, conforme al modelo ante el rey Faraón.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐλθόντες ἐν Αἰγύπτῳ
  english_pob_choice: when they came into Egypt
  chosen_spanish: cuando llegaron a Egipto
  alternatives_spanish:
  - cuando entraron en Egipto
  - al llegar a Egipto
  lexicon: ἔρχομαι
  rationale: Llega mejor el matiz de entrada a un lugar con un verbo natural en español. «Llegaron» conserva el sentido de arribo sin forzar un calco.
- source_word: ὑπελύθησαν
  english_pob_choice: they had their sandals removed
  chosen_spanish: les quitaron las sandalias
  alternatives_spanish:
  - les desataron las sandalias
  - les fueron quitadas las sandalias
  lexicon: ὑπολύω
  rationale: El verbo griego indica quitar o desatar el calzado. En español, «les quitaron las sandalias» es claro y conserva la acción pasiva sin recargar la frase.
- source_word: ὑπὸ τῶν παίδων Ἰωσήφ
  english_pob_choice: by the attendants of Joseph
  chosen_spanish: por los sirvientes de José
  alternatives_spanish:
  - por los muchachos de José
  - por los criados de José
  lexicon: παῖς
  rationale: παῖδες puede significar muchachos, sirvientes o asistentes según el contexto. Aquí la función cortesana-administrativa favorece «sirvientes»; «criados» también sería posible, pero suena más marcado regionalmente.
- source_word: ἔξωθεν τοῦ πυλῶνος
  english_pob_choice: outside the gate
  chosen_spanish: fuera de la puerta
  alternatives_spanish:
  - afuera de la puerta
  - fuera del portón
  lexicon: πυλών
  rationale: «Puerta» comunica bien el acceso principal; «portón» sería más específico, pero menos general. Mantiene el sentido locativo sin sobredetallar la arquitectura.
- source_word: προσεκύνησαν
  english_pob_choice: they bowed down
  chosen_spanish: se inclinaron
  alternatives_spanish:
  - se postraron
  - se inclinaron y adoraron
  lexicon: προσκυνέω
  rationale: El gesto físico ante una autoridad humana es más preciso que «adoraron». «Se inclinaron» conserva la deferencia sin añadir connotación cultual no exigida por el contexto.
- source_word: τῷ Ἰωσήφ
  english_pob_choice: to Joseph
  chosen_spanish: ante José
  alternatives_spanish:
  - a José
  - delante de José
  lexicon: dativo de dirección/presencia
  rationale: Después de «se inclinaron», el dativo se entiende naturalmente como presencia delante de alguien. «Ante José» expresa mejor la escena ceremonial.
- source_word: κατὰ τὸν τύπον
  english_pob_choice: in the manner before King Pharaoh
  chosen_spanish: conforme al modelo
  alternatives_spanish:
  - según el modelo
  - de acuerdo con el modelo
  lexicon: τύπος
  rationale: τύπος aquí denota patrón, modelo o norma de acción. «Conforme al modelo» mantiene la idea de conformidad sin ampliar innecesariamente el referente.
- source_word: βασιλέως Φαραώ
  english_pob_choice: before King Pharaoh
  chosen_spanish: ante el rey Faraón
  alternatives_spanish:
  - del rey Faraón
  - frente al rey Faraón
  lexicon: βασιλεύς
  rationale: El inglés revisado eliminó una expansión interpretativa y mantuvo la relación espacial/ceremonial. «Ante el rey Faraón» refleja esa proximidad ritual con un orden natural en español.
theological_decisions:
- issue: Naturaleza del gesto de proskynesis frente a autoridad humana
  english_pob_reading: they bowed down to Joseph
  chosen_spanish_reading: se inclinaron ante José
  alternative_spanish_readings:
  - se postraron ante José
  - le rindieron homenaje a José
  rationale: El pasaje describe deferencia ceremonial ante José, no necesariamente adoración divina. «Se inclinaron» preserva la ambigüedad útil del griego y evita sobreinterpretar el acto.
  doctrine_reference: Uso contextual de προσκυνέω frente a autoridades humanas; distinción entre reverencia civil y adoración a Dios.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del audit trail, especialmente al mantener la cláusula final breve y directa: «conforme al modelo ante el rey Faraón», sin añadir elementos equivalentes a «of those» que fueron eliminados en la revisión inglesa. También toma en cuenta la preferencia revisada por una correspondencia más cercana con κατὰ τὸν τύπον.'
  spanish_consistency_notes:
  - Se mantiene «José» para Ἰωσήφ y «Faraón» para Φαραώ siguiendo la norma del proyecto.
  - Se usa «sandalias» por ser el equivalente natural del calzado removido en el contexto ceremonial.
  - Se evita «adoraron» para no trasladar indebidamente un sentido cultual al gesto de inclinación ante un humano.
