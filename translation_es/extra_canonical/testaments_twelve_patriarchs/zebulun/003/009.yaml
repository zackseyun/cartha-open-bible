review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia básica del griego: llegada a Egipto, remoción del calzado por los asistentes de José fuera del acceso, y reverencia ante José. Sin embargo, dos elecciones debilitan la alineación fina con el original y con la auditoría inglesa: «fuera de la puerta» subtraduce πυλών, que es mejor como portón/puerta de acceso principal, y sobre todo «conforme al modelo ante el rey Faraón» suena poco natural y no transmite bien κατὰ τὸν τύπον ... βασιλέως Φαραώ, que en la auditoría quedó como una fórmula de modo ceremonial: «de la manera acostumbrada ante el rey Faraón» o equivalente.'
  spanish_quality_summary: El español es mayormente claro, pero la frase final resulta rígida y algo opaca para un lector eclesial general. «Conforme al modelo ante el rey Faraón» parece calco semántico y no suena idiomático. También «sirvientes» es aceptable, aunque «asistentes» encaja mejor con el contexto cortesano y evita un matiz doméstico demasiado fuerte. El resto del verso fluye bien.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. La decisión de traducir προσκυνέω como «se inclinaron» es adecuada en contexto humano. La mejora propuesta se centra en precisión semántica y naturalidad: παῖδες como «asistentes», πυλών como «portón», y τύπος como «manera acostumbrada» en lugar de «modelo».'
  issues:
  - severity: medium
    issue: «conforme al modelo ante el rey Faraón» es poco natural y no refleja bien la fuerza ceremonial de κατὰ τὸν τύπον
    rationale: τύπος aquí no funciona bien como «modelo» en español corriente; la auditoría inglesa lo llevó a «in the manner before King Pharaoh», es decir, una forma acostumbrada o ceremonial de presentarse ante Faraón.
  - severity: low
    issue: «puerta» queda demasiado genérico para πυλών
    rationale: πυλών suele referirse al portón o entrada principal, no a una puerta cualquiera. «Portón» o «puerta de entrada» comunica mejor la escena.
  - severity: low
    issue: «sirvientes de José» puede sonar más doméstico que cortesano
    rationale: παῖδες en este contexto administrativo/cortesano se expresa con más naturalidad como «asistentes» o «servidores»; «asistentes» se alinea bien con el inglés auditado.
  revised_spanish_text: Porque, cuando llegaron a Egipto, los asistentes de José les quitaron las sandalias fuera del portón, y así se inclinaron ante José, de la manera acostumbrada ante el rey Faraón.
  revision_rationale: Se ajusta la cláusula final para evitar un calco poco idiomático y reflejar mejor el sentido ceremonial de κατὰ τὸν τύπον. También se mejora πυλών con «portón» y παῖδες con «asistentes» para mayor precisión contextual y mejor español.
