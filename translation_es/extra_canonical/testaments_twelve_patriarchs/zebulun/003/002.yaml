base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/003/002.yaml
  text: And in the meantime Reuben arose and said, “Come, my brothers, let us not kill him, but let us throw him into one of these dry pits, which our fathers dug and found no water.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:57Z'
    unchanged: false
    changes_summary: Added a comma before the relative clause for clearer English punctuation; otherwise retained the draft as accurate and complete.
translation:
  language: es
  text: 'Y en el entretanto, Rubén se levantó y dijo: «Venid, mis hermanos, no lo matemos, sino arrojémoslo a uno de estos pozos secos, que cavaron nuestros padres y no hallaron agua».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐν δὲ τῷ μεταξὺ
  english_pob_choice: And in the meantime
  chosen_spanish: Y en el entretanto
  alternatives_spanish:
  - Mientras tanto
  - Entretanto
  lexicon: μεταξύ
  rationale: La expresión griega marca simultaneidad o intervalo narrativo; «en el entretanto» conserva ese valor temporal con un registro natural en español, sin añadir énfasis no presente en el texto.
- source_word: ἀναστὰς
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  lexicon: ἀνίστημι
  rationale: En narración, el participio aoristo indica que Rubén se incorporó para hablar; «se levantó» comunica con naturalidad el gesto físico sin cargarlo de solemnidad excesiva.
- source_word: Δεῦτε ἀδελφοί μου
  english_pob_choice: Come, my brothers
  chosen_spanish: Venid, mis hermanos
  alternatives_spanish:
  - Vengan, mis hermanos
  - Vamos, hermanos míos
  lexicon: δεῦτε
  rationale: El imperativo exhortativo es plural e incluye al hablante en el llamado implícito al diálogo; «Venid» preserva la forma plural y el tono directo del griego.
- source_word: μὴ ἀποκτείνωμεν αὐτόν
  english_pob_choice: let us not kill him
  chosen_spanish: no lo matemos
  alternatives_spanish:
  - no lo asesinemos
  - no le demos muerte
  lexicon: ἀποκτείνω
  rationale: «Matar» es el equivalente más directo y transparente para el acto verbal; evita intensificar el término más allá del griego, que aquí expresa la propuesta de no darle muerte.
- source_word: ἀλλὰ ῥίψωμεν αὐτὸν εἰς ἕνα τῶν ξηρῶν λάκκων τούτων
  english_pob_choice: but let us throw him into one of these dry pits
  chosen_spanish: sino arrojémoslo a uno de estos pozos secos
  alternatives_spanish:
  - sino echémoslo a uno de estos pozos secos
  - sino tirémoslo a uno de estos pozos secos
  lexicon: ῥίπτω
  rationale: «Arrojémoslo» mantiene la fuerza violenta del verbo griego y de la traducción inglesa. «Pozos secos» sigue de cerca ξηρῶν λάκκων sin sustituirlo por un término más interpretativo.
- source_word: ὧν ὤρυξαν οἱ πατέρες ἡμῶν
  english_pob_choice: which our fathers dug
  chosen_spanish: que cavaron nuestros padres
  alternatives_spanish:
  - que abrieron nuestros padres
  - que excavaron nuestros padres
  lexicon: ὀρύσσω
  rationale: «Cavaron» es el verbo más natural y fiel para la acción de excavar un pozo; conserva la referencia a los antepasados sin introducir matices técnicos innecesarios.
- source_word: καὶ οὐχ εὗρον ὕδωρ
  english_pob_choice: and found no water
  chosen_spanish: y no hallaron agua
  alternatives_spanish:
  - y no encontraron agua
  - y no hubo agua
  lexicon: εὑρίσκω
  rationale: «No hallaron agua» reproduce bien la ausencia resultante expresada por el griego y mantiene un tono bíblico claro en español.
theological_decisions:
- issue: La propuesta de Rubén evita el homicidio directo, pero mantiene una acción violenta de encierro o abandono en un pozo seco.
  english_pob_reading: let us not kill him, but let us throw him into one of these dry pits
  chosen_spanish_reading: no lo matemos, sino arrojémoslo a uno de estos pozos secos
  alternative_spanish_readings:
  - no lo matemos, sino echémoslo a uno de estos pozos secos
  - no lo matemos, sino tirémoslo a uno de estos pozos secos
  rationale: 'La traducción conserva la tensión moral del relato: Rubén propone evitar el asesinato, pero no una solución plenamente benigna. Mantener «arrojémoslo» y «pozos secos» deja visible esa ambigüedad narrativa sin suavizarla.'
  doctrine_reference: Ética narrativa y responsabilidad humana en el relato bíblico
translation_notes:
  revision_awareness: 'La versión inglesa auditada recibió solo una corrección de puntuación: se añadió una coma antes de la oración relativa. No hubo cambios de contenido. La traducción española sigue el contenido completo del texto inglés y del griego, sin necesidad de reflejar una variante textual adicional.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «pozos secos» para reflejar ξηρῶν λάκκων con naturalidad y sin sustituirlo por una paráfrasis interpretativa.
  - Se conserva el plural exhortativo «Venid» para reflejar el llamado directo a varios interlocutores.
