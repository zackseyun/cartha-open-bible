  text: III. *Εἰς γὰρ τὸ τίμημα αὐτοῦ ἐγὼ οὐκ ἐκοινώνησα, τέκνα μου¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/003/005.yaml
  text: For I had no share in his price, my children. But Simeon and Dan and Gad, and their sons, took his price and bought sandals for themselves and for their wives and their children,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:59Z'
    unchanged: false
    changes_summary: Reordered the opening clause to more naturally reflect the Greek while preserving all elements; retained the rest unchanged.
translation:
  language: es
  text: Porque en su precio yo no tuve parte, hijos míos. Pero Simeón, Dan y Gad, y sus hijos, tomaron su precio y compraron sandalias para sí, para sus esposas y para sus hijos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Εἰς γὰρ τὸ τίμημα αὐτοῦ ἐγὼ οὐκ ἐκοινώνησα
  english_pob_choice: For I had no share in his price
  chosen_spanish: Porque en su precio yo no tuve parte
  alternatives_spanish:
  - Porque no tuve parte en su precio
  - Pues en su precio yo no participé
  lexicon: τίμημα; κοινωνέω
  rationale: El griego expresa una negación de participación/comunión en el precio. "No tuve parte" conserva bien la idea relacional y jurídica de la cláusula sin forzar un giro demasiado interpretativo.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijos míos
  lexicon: τέκνα
  rationale: '"Hijos míos" mantiene el apelativo afectivo y directo del discurso exhortativo en español natural y solemne.'
- source_word: τίμημα
  english_pob_choice: price
  chosen_spanish: precio
  alternatives_spanish:
  - valor
  - pago
  lexicon: τίμημα
  rationale: '"Precio" es el equivalente más directo y transparente para el costo pagado, y preserva la referencia económica del contexto.'
- source_word: ἔλαβον τὸ τίμημα αὐτοῦ
  english_pob_choice: took his price
  chosen_spanish: tomaron su precio
  alternatives_spanish:
  - recibieron su precio
  - se quedaron con su precio
  lexicon: λαμβάνω; τίμημα
  rationale: La frase española conserva la recepción/apropiación del dinero del precio, sin añadir matices no presentes en el griego.
- source_word: ὑποδήματα
  english_pob_choice: sandals
  chosen_spanish: sandalias
  alternatives_spanish:
  - calzado
  - sandalias
  lexicon: ὑπόδημα
  rationale: '"Sandalias" reproduce con precisión el objeto nombrado y mantiene la concreción material del texto.'
theological_decisions:
- issue: Participación moral en el precio de José
  english_pob_reading: For I had no share in his price
  chosen_spanish_reading: Porque en su precio yo no tuve parte
  alternative_spanish_readings:
  - Porque no tuve parte en su precio
  - Pues en su precio yo no participé
  rationale: La formulación evita suavizar la afirmación. Mantiene la distancia del hablante respecto del precio de José, tal como lo hace el griego y la revisión inglesa.
  doctrine_reference: testimonio moral y culpabilidad/complicidad
- issue: Enumeración de compradores y destinatarios
  english_pob_reading: Simeon and Dan and Gad, and their sons, took his price and bought sandals for themselves and for their wives and their children
  chosen_spanish_reading: Pero Simeón, Dan y Gad, y sus hijos, tomaron su precio y compraron sandalias para sí, para sus esposas y para sus hijos
  alternative_spanish_readings:
  - Pero Simeón, Dan y Gad, y sus hijos, tomaron su precio y compraron sandalias para ellos, para sus mujeres y para sus hijos
  rationale: Se conserva la enumeración y el contraste adversativo del inglés auditado. "Esposas" comunica bien el sentido de sus mujeres en un registro claro y eclesial, sin alterar el referente.
  doctrine_reference: responsabilidad de los hermanos y reparto del beneficio ilícito
translation_notes:
  revision_awareness: 'La versión inglesa revisada reordenó la cláusula inicial para reflejar con más naturalidad el griego, pasando de una estructura topicalizada a una causal inicial. El español sigue esa misma orientación: inicia con "Porque" y mantiene luego la negación de participación, preservando todos los elementos semánticos del original griego y de la lectura inglesa revisada.'
  spanish_consistency_notes:
  - Se mantiene "precio" de forma consistente para τίμημα, sin sustituirlo por "valor" o "pago" en el texto principal.
  - Se conserva el tono directo de apelación a los destinatarios con "hijos míos".
  - No se introduce lenguaje técnico ajeno al pasaje; el foco queda en la participación en el precio y en la compra de sandalias.
  - '"Sandalias" se usa como término concreto y comprensible para ὑποδήματα.'
