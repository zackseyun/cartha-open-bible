id: T12P.ZEB.10.2
reference: Testament of Zebulun 10:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: '(bdg-text expansion: καὶ ἴασις *καὶ εὐσπλαγχνία⁵⁷ ἐν⁵⁸ ταῖς πτέρυξιν αὐτοῦ. Αὐτὸς λυτρώσεται πᾶσαν αἰχμαλωσίαν υἱῶν ἀνθρώπων ἐκ τοῦ Βελίαρ καὶ πᾶν πνεῦμα πλάνης πατηθήσεται⁵⁹.)'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/010/002.yaml
  text: And healing and compassion will be in his wings. He himself will redeem every captivity of the sons of men from Beliar, and every spirit of deception will be trampled down.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: false
    changes_summary: Changed 'deceit' to 'deception' to better reflect πλάνης; otherwise retained the draft structure and content.
translation:
  language: es
  text: Y habrá sanidad y compasión en sus alas. Él mismo redimirá toda cautividad de los hijos de los hombres de Beliar, y todo espíritu de engaño será pisoteado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἴασις
  english_pob_choice: healing
  chosen_spanish: sanidad
  alternatives_spanish:
  - sanación
  - curación
  lexicon: ἴασις
  rationale: El sustantivo apunta a la idea de remedio o sanidad. «Sanidad» suena natural en español bíblico y conserva el valor resultativo sin reducirlo solo a un acto médico puntual.
- source_word: εὐσπλαγχνία
  english_pob_choice: compassion
  chosen_spanish: compasión
  alternatives_spanish:
  - misericordia
  - entrañas de misericordia
  lexicon: εὐσπλαγχνία
  rationale: La POB inglesa eligió «compassion»; en español «compasión» es la correspondencia más directa y transparente, sin sobrecargar el verso con una paráfrasis idiomática.
- source_word: πτέρυξιν
  english_pob_choice: wings
  chosen_spanish: alas
  alternatives_spanish:
  - plumas
  - extremos
  lexicon: πτέρυξ
  rationale: «Alas» mantiene la imagen corporal/metafórica del texto y es la forma normal y clara en español.
- source_word: λυτρώσεται
  english_pob_choice: will redeem
  chosen_spanish: redimirá
  alternatives_spanish:
  - rescatará
  - libertará
  lexicon: λυτρόω
  rationale: «Redimirá» preserva el valor de liberación mediante rescate que la POB inglesa deja en «redeem», y evita diluir la carga de liberación pactal.
- source_word: αἰχμαλωσίαν
  english_pob_choice: captivity
  chosen_spanish: cautividad
  alternatives_spanish:
  - captividad
  - esclavitud
  lexicon: αἰχμαλωσία
  rationale: «Cautividad» reproduce bien el estado de estar preso o cautivo y encaja con el paralelismo del verso.
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Belial
  alternatives_spanish:
  - Beliar
  lexicon: Βελίαρ
  rationale: Se mantiene el nombre tradicional «Belial» en español por ser la forma más reconocible; la identidad referencial con la figura maligna del texto queda clara en el contexto inmediato.
- source_word: πλάνης
  english_pob_choice: deception
  chosen_spanish: engaño
  alternatives_spanish:
  - error
  - desvío
  lexicon: πλάνη
  rationale: «Engaño» refleja bien el sentido de desviación seductora o engañosa que la revisión inglesa consolidó como «deception», y suena natural en español contemporáneo.
- source_word: πατηθήσεται
  english_pob_choice: will be trampled down
  chosen_spanish: será pisoteado
  alternatives_spanish:
  - será aplastado
  - será derribado
  lexicon: πατέω
  rationale: «Pisoteado» conserva la metáfora de ser hollado bajo los pies, con una imagen fuerte y transparente en español.
theological_decisions:
- issue: 'Nombre del ser malvado: Βελίαρ/Beliar'
  english_pob_reading: Beliar
  chosen_spanish_reading: Belial
  alternative_spanish_readings:
  - Beliar
  rationale: Aunque la POB inglesa conserva «Beliar», en español «Belial» es la forma tradicional y más inteligible para el lector eclesial, sin alterar la referencia al poder adversario del pasaje.
  doctrine_reference: Demonology / Second Temple Jewish terminology
- issue: Naturaleza de πλάνης
  english_pob_reading: every spirit of deception
  chosen_spanish_reading: todo espíritu de engaño
  alternative_spanish_readings:
  - todo espíritu de error
  - todo espíritu de decepción
  rationale: «Engaño» conserva el carácter activo y personal del espíritu mencionado, a la vez que responde a la revisión inglesa que precisó «deception» frente a «deceit».
  doctrine_reference: Pneumatology / discernment
- issue: Verbo de liberación
  english_pob_reading: will redeem every captivity
  chosen_spanish_reading: redimirá toda cautividad
  alternative_spanish_readings:
  - rescatará toda cautividad
  - libertará a todos los cautivos
  rationale: «Redimirá» sostiene la fuerza de rescate con sentido redentor, más cercana al verbo elegido por la POB inglesa que una simple liberación descriptiva.
  doctrine_reference: Soteriology / liberation imagery
translation_notes:
  revision_awareness: 'La versión inglesa revisada cambió «deceit» por «deception» para reflejar mejor πλάνης. La presente propuesta sigue esa lectura y preserva la estructura retórica del original griego: dos hemistiquios con sanidad/compasión y un cierre escatológico sobre redención y derrota del espíritu de engaño.'
  spanish_consistency_notes:
  - He mantenido «Belial» como forma española estable, aun cuando el inglés POB usa «Beliar», para maximizar inteligibilidad sin perder la referencia textual.
  - He usado «sanidad» y «compasión» como sustantivos paralelos, evitando verbos que desdibujen el paralelismo del griego.
  - «Espíritu de engaño» refleja mejor πνεῦμα πλάνης que opciones más abstractas como «error» si se quiere conservar la personificación del original.
