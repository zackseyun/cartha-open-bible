  rationale: Se corrige únicamente el nombre propio «Belial» a «Beliar» para ajustarlo a Βελίαρ en la fuente griega y a la POB inglesa auditada. No se requieren más cambios, porque el resto del borrador preserva bien el sentido, la terminología y la fluidez del original.
