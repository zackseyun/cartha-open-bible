base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/010/007.yaml
  text: But upon the ungodly the Lord will bring eternal fire, and he will destroy them for generations of generations.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: true
