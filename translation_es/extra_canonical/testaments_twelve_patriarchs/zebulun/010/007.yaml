translation:
  language: es
  text: Pero sobre los impíos traerá Yahvé fuego eterno, y los destruirá por generaciones de generaciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Soberano
  lexicon: YHWH / κύριος
  rationale: El griego usa Κύριος con artículo ausente, en un contexto de juicio divino que corresponde al nombre divino; siguiendo el criterio del proyecto, se explicita como «Yahvé» en español, en lugar de la máscara litúrgica «el Señor».
- source_word: πῦρ αἰώνιον
  english_pob_choice: eternal fire
  chosen_spanish: fuego eterno
  alternatives_spanish:
  - fuego perpetuo
  - fuego para siempre
  lexicon: πῦρ / αἰώνιος
  rationale: «Fuego eterno» reproduce de forma directa el sustantivo y el adjetivo, conservando la fuerza escatológica sin añadir matices no presentes en el griego.
- source_word: ἀπολεῖ
  english_pob_choice: will destroy
  chosen_spanish: los destruirá
  alternatives_spanish:
  - los hará perecer
  - los arruinará
  lexicon: ἀπόλλυμι
  rationale: Se mantiene el valor fuerte de destrucción/ruina que la POB inglesa expresa con «destroy», evitando suavizar el verbo.
- source_word: ἕως γενεὰς γενεῶν
  english_pob_choice: for generations of generations
  chosen_spanish: por generaciones de generaciones
  alternatives_spanish:
  - por siglos de siglos
  - a través de generaciones sin fin
  lexicon: ἕως + γενεά
  rationale: La repetición genitiva se conserva literalmente para reflejar la fórmula intensiva del griego, ya usada por la POB en inglés como «generations of generations».
theological_decisions:
- issue: Traducción del título divino Κύριος en contexto de juicio
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: En este pasaje, Κύριος no funciona como mero título genérico sino como referencia al nombre divino. La decisión evita ocultar el nombre propio y sigue la política del proyecto para YHWH.
  doctrine_reference: Éxodo 3:15; uso de YHWH en el texto bíblico
- issue: Alcance del juicio sobre «los impíos»
  english_pob_reading: upon the ungodly
  chosen_spanish_reading: sobre los impíos
  alternative_spanish_readings:
  - contra los impíos
  - a los impíos
  rationale: «Sobre» conserva la idea de un juicio que cae encima de ellos, alineado con la preposición griega ἐπὶ y con el tono del original.
  doctrine_reference: Salmo 1:5; Proverbios 11:31
translation_notes:
  revision_awareness: La edición inglesa más reciente indica que no se requirieron cambios; por ello, el español sigue de cerca el sentido auditado del texto griego y la solución inglesa establecida, sin añadir notas textuales ni variantes innecesarias.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para Κύριος en coherencia con el estándar del proyecto.
  - Se conserva la fórmula intensiva «generaciones de generaciones» para no diluir la clausula temporal del griego.
  - El registro es solemne y bíblico, pero en español contemporáneo claro.
