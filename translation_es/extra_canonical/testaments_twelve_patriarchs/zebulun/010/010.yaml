  text: 6. Καὶ ταῦτα εἰπὼν ἐκοιμήθη [†ὕπνῳ²⁴ καλῷ], καὶ ἔθηκαν αὐτὸν *οἱ υἱοὶ αὐτοῦ²⁵ *εἰς θήκην ξυλίνην²⁶. 7. Ὕστερον δὲ *ἀναγαγόντες ἔθαψαν αὐτὸν ἐν Χεβρών²⁷ μετὰ τῶν πατέρων αὐτοῦ²⁸.
