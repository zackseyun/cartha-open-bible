base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/010/010.yaml
  text: And when he had said these things, he fell asleep, and his sons placed him in a wooden coffin. Later they carried him up and buried him in Hebron with his fathers.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: false
    changes_summary: Removed the bracketed footnote markers; the English otherwise accurately reflects the source.
translation:
  language: es
  text: Y cuando hubo dicho estas cosas, se durmió, y sus hijos lo pusieron en un ataúd de madera. Después lo llevaron y lo sepultaron en Hebrón con sus padres.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκοιμήθη / "fell asleep"
  english_pob_choice: fell asleep
  chosen_spanish: se durmió
  alternatives_spanish:
  - murió
  - se fue a dormir
  lexicon: κοιμάω
  rationale: El griego usa el eufemismo estándar para la muerte; el español natural y fiel es "se durmió". "Murió" elimina el matiz figurado, y "se fue a dormir" suena menos sobrio.
- source_word: οἱ υἱοὶ αὐτοῦ / "his sons"
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - los hijos de él
  lexicon: υἱοί
  rationale: Aunque el griego dice literalmente "hijos", el contexto ya identifica a los descendientes como sus hijos; "sus hijos" conserva la naturalidad del español sin añadir una restricción innecesaria.
- source_word: εἰς θήκην ξυλίνην / "into a wooden coffin"
  english_pob_choice: in a wooden coffin
  chosen_spanish: en un ataúd de madera
  alternatives_spanish:
  - en un féretro de madera
  - en una caja de madera
  lexicon: θήκη + ξύλινος
  rationale: El sustantivo θήκη indica un receptáculo o caja; en español, "ataúd" comunica bien la función funeraria y "de madera" preserva ξυλίνην. "Cofre" o "caja" serían demasiado genéricos.
- source_word: ἀναγαγόντες / "carried him up"
  english_pob_choice: carried him up
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo subieron
  - lo transportaron
  lexicon: ἀνάγω
  rationale: El verbo puede insinuar traslado hacia arriba, pero en español una reproducción literal como "lo subieron" sería extraña sin un complemento explícito. "Lo llevaron" transmite el traslado funerario con naturalidad; la información direccional queda implícita por Hebrón, que está en región montañosa.
- source_word: ἔθαψαν αὐτὸν ἐν Χεβρών / "buried him in Hebron"
  english_pob_choice: buried him in Hebron
  chosen_spanish: lo sepultaron en Hebrón
  alternatives_spanish:
  - lo enterraron en Hebrón
  lexicon: θάπτω
  rationale: '"Sepultar" mantiene un registro digno y bíblico, mientras que "enterrar" también sería correcto. Se eligió "sepultaron" por su tono más formal, acorde con el pasaje.'
- source_word: μετὰ τῶν πατέρων αὐτοῦ / "with his fathers"
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - junto a sus padres
  lexicon: πατέρες
  rationale: La expresión idiomática alude a los antepasados de la línea familiar. "Con sus padres" es la forma más directa y fiel al calco bíblico, preservando la referencia ancestral sin interpretar más allá del texto.
theological_decisions:
- issue: Eufemismo de muerte en "fell asleep"
  english_pob_reading: fell asleep
  chosen_spanish_reading: se durmió
  alternative_spanish_readings:
  - murió
  rationale: Se conserva el eufemismo del original, que permite leer la muerte de manera reverente sin explicitarla de forma cruda.
  doctrine_reference: Uso bíblico del sueño como eufemismo de la muerte
- issue: Sepultura con los padres/antepasados
  english_pob_reading: with his fathers
  chosen_spanish_reading: con sus padres
  alternative_spanish_readings:
  - con sus antepasados
  rationale: La frase mantiene la continuidad genealógica y de alianza del relato, sin convertirla en una formulación doctrinal interpretativa.
  doctrine_reference: Lenguaje bíblico de reunión con los padres
translation_notes:
  revision_awareness: La revisión reciente del texto inglés eliminó marcas de nota entre corchetes y dejó claro que la traducción base refleja adecuadamente el griego; por eso el español sigue de cerca el contenido sin añadir notas ni marcas textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente de la muerte con "se durmió" y "sepultaron".
  - '"Hebrón" se conserva como topónimo transliterado estándar.'
  - No se añadió nota textual porque el paquete fuente y la revisión inglesa no requieren resolver una variante en el texto publicado.
