translation:
  language: es
  text: Y ahora, mis hijos, no os entristezcáis de que yo esté muriendo, ni os derrumbéis de que estoy llegando a mi fin.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μὴ λυπεῖσθε
  english_pob_choice: do not be grieved
  chosen_spanish: no os entristezcáis
  alternatives_spanish:
  - no os aflijáis
  - no os doláis
  lexicon: λυπέω
  rationale: El griego expresa la idea de sentir pena o tristeza; en español, «entristecerse» comunica bien ese estado emocional sin endurecerlo de forma excesiva. Mantiene la pasiva/reflexiva exhortativa del original.
- source_word: ἀποθνῄσκω
  english_pob_choice: I am dying
  chosen_spanish: estoy muriendo
  alternatives_spanish:
  - voy a morir
  - muero
  lexicon: ἀποθνῄσκω
  rationale: La forma progresiva reproduce el sentido de proceso presente que el inglés POB también conserva con «I am dying».
- source_word: συμπέσητε
  english_pob_choice: fall down
  chosen_spanish: desfallezcáis
  alternatives_spanish:
  - caigáis
  - os desploméis
  lexicon: συμπίπτω
  rationale: Aquí el verbo comunica abatimiento o decaimiento, no una caída física literal; «desfallecer» preserva la fuerza emocional y la paralela exhortación del contexto.
- source_word: ἀπολήγω
  english_pob_choice: am coming to my end
  chosen_spanish: llego a mi fin
  alternatives_spanish:
  - estoy llegando a mi fin
  - estoy terminando
  lexicon: ἀπολήγω
  rationale: La expresión española es natural y fiel a la idea de culminación o terminación de la vida, sin añadir interpretaciones externas.
theological_decisions:
- issue: Relación entre la muerte del hablante y la reacción de los hijos
  english_pob_reading: do not be grieved that I am dying, nor fall down that I am coming to my end
  chosen_spanish_reading: no os entristezcáis por estar yo muriendo, ni desfallezcáis porque llego a mi fin
  alternative_spanish_readings:
  - no os entristezcáis porque estoy muriendo, ni caigáis porque llego a mi fin
  - no os aflijáis por mi muerte, ni os abatáis al llegar yo a mi fin
  rationale: 'Se mantiene la doble exhortación paralela del texto griego y la revisión inglesa: primero ante el proceso de morir, luego ante el hecho de llegar al final. No se atenúa la tensión afectiva ni se convierte en mera paráfrasis.'
  doctrine_reference: No doctrinal claim; reflects a filial farewell exhortation in the source text.
translation_notes:
  revision_awareness: The English audit trail adjusted the second clause from a causal 'because' to 'that' to reflect the parallel structure more closely. The Spanish preserves that parallelism by using two coordinated exhortations ('por estar yo muriendo' / 'porque llego a mi fin') without adding explanatory causality beyond the source.
  spanish_consistency_notes:
  - Se conserva el tono de despedida íntima con «mis hijos», coherente con el vocativo del griego τέκνα μου.
  - Se evita «Señor» o lenguaje eclesiástico no presente; el pasaje es una exhortación familiar.
  - «Desfallezcáis» representa mejor συμπέσητε que una caída física literal en este contexto.
  - «Llego a mi fin» mantiene la equivalencia dinámica con «am coming to my end» sin perder la idea de término vital.
