source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 5. Ὑμεῖς δὲ φοβεῖσθε Κύριον¹⁹ [τὸν θεὸν ἡμῶν²⁰ ἐν πάσῃ ἰσχύι ὑμῶν²¹ πάσας τὰς²² ἡμέρας τῆς ζωῆς ὑμῶν]²³.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/010/009.yaml
  text: But you, fear the Lord our God with all your strength all the days of your life.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: false
    changes_summary: Restored the omitted phrase "our God" and kept the full temporal clause "all the days of your life" while preserving the source order more closely.
translation:
  language: es
  text: Pero ustedes, teman a Yahvé nuestro Dios con toda su fuerza, todos los días de su vida.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κύριον
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Señor Dios
  lexicon: YHWH / κύριος
  rationale: El contexto griego conserva el título divino; en este proyecto, YHWH se vierte normalmente como «Yahvé» en el texto principal. «el Señor» podría sonar más tradicional, pero aquí ocultaría la decisión auditada de nombrar el nombre divino.
- source_word: τὸν θεὸν ἡμῶν
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  - Dios nuestro
  lexicon: θεός
  rationale: Mantiene de forma directa el posesivo inclusivo del griego y coincide con la revisión inglesa que restauró «our God». "Nuestro Dios" es natural y fiel en español contemporáneo.
- source_word: ἐν πάσῃ ἰσχύι ὑμῶν
  english_pob_choice: with all your strength
  chosen_spanish: con toda su fuerza
  alternatives_spanish:
  - con toda vuestra fuerza
  - con toda tu fuerza
  - con toda vuestra fortaleza
  lexicon: ἰσχύς
  rationale: «ἰσχύς» expresa fuerza/capacidad; «con toda su fuerza» suena idiomático en español y refleja el sentido de totalidad. Se evita «fortaleza» porque puede desplazar el énfasis físico o de capacidad que el griego permite.
- source_word: πάσας τὰς ἡμέρας τῆς ζωῆς ὑμῶν
  english_pob_choice: all the days of your life
  chosen_spanish: todos los días de su vida
  alternatives_spanish:
  - todos los días de vuestra vida
  - todos los días de tu vida
  - a lo largo de toda su vida
  lexicon: ἡμέρα / ζωή
  rationale: La cláusula temporal se traduce de manera directa y completa. «Todos los días de su vida» preserva el alcance total sin añadir matices interpretativos.
- source_word: Ὑμεῖς δὲ
  english_pob_choice: But you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Y ustedes
  - Mas ustedes
  - Pero vosotros
  lexicon: σύ
  rationale: «Ὑμεῖς δὲ» introduce contraste enfático. «Pero ustedes» es natural en español neutro y conserva la oposición con el contexto previo.
theological_decisions:
- issue: Traducción del nombre divino implícito en Κύριον en un testamento pseudepigráfico griego
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Señor Dios
  rationale: Aunque el texto griego usa κύριος, el marco editorial del proyecto pide representar el nombre divino como «Yahvé» cuando el contexto alude al Tetragrámaton. Esto evita la máscara litúrgica y hace visible la decisión textual-teológica.
  doctrine_reference: Divine Name / Tetragrammaton rendering policy
- issue: Restitución de la frase inclusiva «our God» en el imperativo de exhortación
  english_pob_reading: fear the Lord our God
  chosen_spanish_reading: teman a Yahvé nuestro Dios
  alternative_spanish_readings:
  - teman al Señor nuestro Dios
  - teman a Dios
  rationale: Se conserva la relación de pertenencia y alianza expresada por «nuestro Dios», que la revisión inglesa había restaurado por estar en el griego. El orden español mantiene la carga exhortativa sin perder la referencia relacional.
  doctrine_reference: Covenant address / divine ownership
translation_notes:
  revision_awareness: La versión inglesa fue revisada para restaurar «our God» y para mantener completa la cláusula temporal «all the days of your life». La redacción española sigue esa forma revisada y preserva el orden de los complementos de manera cercana al griego, sin omitir ni suavizar el alcance total de la exhortación.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en la línea principal, conforme a la política del proyecto.
  - Se mantiene «nuestro Dios» para reflejar la restauración auditada en la versión inglesa.
  - No se añaden notas textuales porque el pasaje no presenta variantes relevantes en el paquete aportado.
