revisions:
- from: Y otra vez, en la astucia de sus obras, lo provocarán, y serán rechazados de él hasta el tiempo de la consumación.
  to: Y otra vez, en la astucia de las obras de ustedes, lo provocarán, y serán apartados de él hasta el tiempo de la consumación.
  rationale: Se corrigió la persona de ὑμῶν para expresar claramente la segunda persona plural en español sin ambigüedad referencial, y se sustituyó 'rechazados' por 'apartados' para reflejar mejor la separación relacional de ἀπ᾽ αὐτοῦ en una forma más natural en español. Se mantuvieron 'en la astucia' y 'tiempo de la consumación' por su buena correspondencia con el source y el rastro de auditoría inglés.
  reviewer_model: gpt-5.4
