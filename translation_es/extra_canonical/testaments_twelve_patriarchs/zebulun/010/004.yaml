id: T12P.ZEB.10.4
reference: Testament of Zebulun 10:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 9. Καὶ⁶⁴ πάλιν ⌈ἐν *τῇ πανουργίᾳ⁶⁵ *τῶν ἔργων⁶⁶ ὑμῶν⁶⁷⌉ παροργίσετε⁶⁸ αὐτόν, καὶ ἀπορριφήσεσθε⁶⁹ ⌈ἀπ᾽ αὐτοῦ⌉⁷⁰ ἕως καιροῦ συντελείας.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/010/004.yaml
  text: And again, in the craftiness of your works you will provoke him, and you will be cast away from him until the time of completion.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: false
    changes_summary: Adjusted 'by the craftiness' to 'in the craftiness' to better match the source phrase and changed 'deeds' to 'works' for closer lexical consistency with ἔργων.
translation:
  language: es
  text: Y otra vez, en la astucia de sus obras, lo provocarán, y serán rechazados de él hasta el tiempo de la consumación.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν τῇ πανουργίᾳ
  english_pob_choice: in the craftiness
  chosen_spanish: en la astucia
  alternatives_spanish:
  - en la malicia
  - en la artimaña
  lexicon: πανουργία
  rationale: Astucia conserva el matiz de habilidad engañosa sin endurecer innecesariamente el sentido. Mantiene la preposición locativa 'en', en línea con la revisión inglesa que corrigió 'by' a 'in' para reflejar mejor la construcción griega.
- source_word: τῶν ἔργων
  english_pob_choice: of your works
  chosen_spanish: de sus obras
  alternatives_spanish:
  - de sus hechos
  - de sus acciones
  lexicon: ἔργον
  rationale: '''Obras'' sigue de cerca ἔργων y reproduce la corrección inglesa de ''deeds'' a ''works''. ''Sus'' refleja el posesivo plural de ὑμῶν en un español natural y claro.'
- source_word: παροργίσετε
  english_pob_choice: you will provoke him
  chosen_spanish: lo provocarán
  alternatives_spanish:
  - lo irritarán
  - lo harán enojar
  lexicon: παροργίζω
  rationale: Provocar comunica el acto de suscitar ira sin añadir explícitamente 'a ira', que no aparece en el texto base. En español, el complemento directo 'lo' mantiene la referencia al destinatario de la provocación.
- source_word: ἀπορριφήσεσθε
  english_pob_choice: you will be cast away
  chosen_spanish: serán rechazados
  alternatives_spanish:
  - serán arrojados
  - serán echados fuera
  lexicon: ἀπορρίπτω
  rationale: '''Rechazados'' expresa la exclusión resultante de manera comprensible en español y conserva la pasiva futura. ''Arrojados'' sería más literal, pero menos idiomático aquí.'
- source_word: ἀπ᾽ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - lejos de él
  - apartados de él
  lexicon: ἀπό
  rationale: '''De él'' es la correspondencia directa y sobria de la separación relacional indicada por ἀπ᾽ αὐτοῦ.'
- source_word: ἕως καιροῦ συντελείας
  english_pob_choice: until the time of completion
  chosen_spanish: hasta el tiempo de la consumación
  alternatives_spanish:
  - hasta el tiempo del fin
  - hasta el tiempo de cumplimiento
  lexicon: συντέλεια
  rationale: '''Consumación'' preserva el peso escatológico de συντελείας y evita reducirlo solo a ''fin''. ''Tiempo de la consumación'' es una fórmula clara y reverente en español.'
theological_decisions:
- issue: Escatological endpoint of συντελείας
  english_pob_reading: until the time of completion
  chosen_spanish_reading: hasta el tiempo de la consumación
  alternative_spanish_readings:
  - hasta el tiempo del fin
  - hasta que todo se complete
  rationale: '''Consumación'' mantiene abierta la referencia al cierre pleno del proceso escatológico, sin imponer una interpretación más restrictiva que el griego. La traducción evita suavizar la advertencia o convertirla en mera duración temporal.'
  doctrine_reference: Eschatology; final judgment and restoration timing
- issue: Nature of the punitive result
  english_pob_reading: you will be cast away from him
  chosen_spanish_reading: serán rechazados de él
  alternative_spanish_readings:
  - serán arrojados de él
  - serán apartados de él
  rationale: '''Rechazados'' conserva la fuerza de exclusión y abandono relacional del pasivo griego, sin introducir una imagen más física que el contexto no exige. También permite leer la frase como una pérdida de favor y de cercanía con él.'
  doctrine_reference: Divine judgment; covenant exclusion
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente al reflejar 'in the craftiness' con una construcción locativa ('en la astucia') y al conservar 'works' como 'obras'. También mantiene el tono escatológico de 'until the time of completion' mediante 'hasta el tiempo de la consumación'.
  spanish_consistency_notes:
  - Se mantiene 'consumación' para συντελείας en coherencia con un registro bíblico-escatológico elevado.
  - Se usa 'obras' para ἔργων, no 'hechos', por consistencia con la revisión inglesa y la cercanía léxica.
  - No se introduce 'Yahvé' ni otros términos teológicos ajenos, porque el verso no contiene el nombre divino explícito.
