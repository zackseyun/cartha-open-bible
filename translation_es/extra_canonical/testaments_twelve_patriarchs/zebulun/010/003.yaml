  source_alignment_summary: 'La mayor parte del sentido fuente está presente: el giro a todas las naciones, la visión de Dios en forma humana y la cláusula final «Jerusalén es su nombre». Sin embargo, «volverá a todas las naciones para su celos[a]» no preserva bien la sintaxis ni la legibilidad del griego/inglés; en español queda agramatical («su celos») y «volver a ... para» no comunica naturalmente la idea de hacer que las naciones se vuelvan hacia/entren en esa reacción de celos.'
  spanish_quality_summary: El borrador tiene buen tono bíblico y «Dios en forma humana» funciona bien. Pero presenta un error gramatical serio en «su celos», y la construcción verbal inicial suena calcada y poco natural. Además, el anclaje de nota está mal colocado dentro de la palabra. Conviene una reparación menor para lograr español claro y fiel.
  glossary_alignment: '«Dios» y «forma humana» están bien alineados. «el Señor» es defendible aquí porque la fuente inmediata es κύριος y no hay base suficiente para imponer «Yahvé». El problema principal no es terminológico sino sintáctico-lexical: para παραζήλωσιν, «celos» puede mantenerse, pero debe expresarse idiomáticamente como resultado provocado en las naciones.'
  issues:
