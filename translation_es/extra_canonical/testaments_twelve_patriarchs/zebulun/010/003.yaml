  rationale: 'Se corrige la agramaticalidad de «su celos» a «sus celos» y se rehace la primera cláusula para expresar de forma natural y fiel el sentido causativo/resultativo del griego: no simplemente «volverá a» las naciones, sino que hará que ellas se vuelvan hacia esa reacción de celos. Se conservan «Dios en forma humana», «el Señor» y «Jerusalén es su nombre», que son defendibles y legibles en español.'
