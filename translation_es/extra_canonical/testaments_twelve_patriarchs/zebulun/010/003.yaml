reference: Testament of Zebulun 10:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: '(bdg-text expansion: καὶ ἐπιστρέψει *πάντα τὰ⁶⁰ ἔθνη εἰς παραζήλωσιν αὐτοῦ⁶¹, καὶ ὄψεσθε *θεὸν ἐν σχήματι ἀνθρώπου⁶² *ὃν ἂν ἐκλέξηται Κύριος Ἱερουσαλὴμ ὄνομα αὐτῷ⁶³.)'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/010/003.yaml
  text: And he will turn all the nations to his jealousy, and you will see God in human form, whom the Lord will choose for him—Jerusalem is his name.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:02Z'
    unchanged: false
    changes_summary: Adjusted ‘zeal for him’ to ‘his jealousy’ to better reflect παραζήλωσιν; changed ‘form of a man’ to ‘human form’ for natural English; preserved the clause about the Lord choosing him and kept the Jerusalem name clause while smoothing punctuation.
translation:
  language: es
  text: 'Y él hará que todas las naciones se vuelvan a sus celos[a], y veréis a Dios en forma humana[b], a quien el Señor escogerá para él: Jerusalén es su nombre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa posible: «celo». Se eligió «celos» para reflejar mejor la fuerza de παραζήλωσις y mantener la tensión relacional del texto.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «en figura humana» o «con apariencia humana»; «forma humana» sigue el matiz del griego y la revisión inglesa.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραζήλωσιν
  english_pob_choice: his jealousy
  chosen_spanish: su celos
  alternatives_spanish:
  - su celo
  - su celosidad
  - los celos de él
  lexicon: παραζήλωσις
  rationale: El audit trail inglés decidió ‘his jealousy’ para reflejar mejor el sustantivo griego. En español, ‘celos’ conserva esa fuerza relacional y afectiva; ‘celo’ tendería a suavizarlo hacia ‘ardor’ o ‘entusiasmo’, perdiendo la tensión del término.
- source_word: θεὸν ἐν σχήματι ἀνθρώπου
  english_pob_choice: God in human form
  chosen_spanish: Dios en forma humana
  alternatives_spanish:
  - Dios en forma de hombre
  - Dios en figura humana
  - Dios con apariencia humana
  lexicon: θεός / σχήμα / ἄνθρωπος
  rationale: ‘Forma humana’ sigue de cerca la revisión inglesa ‘human form’ y evita restringir ἄνθρωπος a ‘hombre’ en sentido masculino. ‘Figura humana’ sería posible, pero ‘forma humana’ resulta más natural y fiel al registro del texto.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: κύριος
  rationale: Aquí el contexto griego presenta Κύριος sin un marcador explícito del nombre divino. Aunque la norma del proyecto favorece ‘Yahvé’ para יהוה, en esta frase la tradición textual griega conserva ‘el Señor’ y la cláusula funciona como título relacional dentro de la oración; por eso se mantiene ‘el Señor’ en español.
- source_word: ἐκλέξηται
  english_pob_choice: will choose
  chosen_spanish: escogerá
  alternatives_spanish:
  - elegirá
  - seleccionará
  lexicon: ἐκλέγομαι
  rationale: ‘Escogerá’ reproduce bien el valor de elección soberana y es idiomático en español bíblico sin sonar rígido.
- source_word: Ἱερουσαλήμ ὄνομα αὐτῷ
  english_pob_choice: Jerusalem is his name
  chosen_spanish: Jerusalén es su nombre
  alternatives_spanish:
  - Jerusalén es el nombre de él
  - su nombre es Jerusalén
  lexicon: Ἱερουσαλήμ / ὄνομα
  rationale: La construcción nominal se conserva casi literalmente porque la frase es densa y programática. ‘Jerusalén es su nombre’ mantiene la ambigüedad intencional del original sin aclararla prematuramente.
theological_decisions:
- issue: El referente de ‘su celos’ / ‘his jealousy’
  english_pob_reading: his jealousy
  chosen_spanish_reading: su celos
  alternative_spanish_readings:
  - su celo
  - los celos de él
  rationale: La frase preserva la relación posesiva con la figura mencionada en el contexto y deja intacta la tensión del griego παραζήλωσις, que puede implicar provocación a celos y una respuesta de celo/jealousy. Se evita resolverla hacia una lectura meramente positiva de ‘celo’.
  doctrine_reference: Deuteronomio 32:21; Romanos 10:19
- issue: ‘Dios en forma humana’ como afirmación visionaria
  english_pob_reading: you will see God in human form
  chosen_spanish_reading: veréis a Dios en forma humana
  alternative_spanish_readings:
  - veréis a Dios en figura humana
  - veréis a Dios con apariencia humana
  rationale: Se mantiene la afirmación tal como la transmite el texto griego y la versión inglesa revisada, sin añadir explicación cristológica que el verso no explicita. El español conserva la fuerza visionaria y la ambigüedad interpretativa.
  doctrine_reference: Génesis 32:30; Juan 1:18
- issue: ‘Jerusalén es su nombre’ como clausula titular
  english_pob_reading: Jerusalem is his name
  chosen_spanish_reading: Jerusalén es su nombre
  alternative_spanish_readings:
  - su nombre es Jerusalén
  - Jerusalén será su nombre
  rationale: Se conserva la formulación nominativa del original, que puede funcionar como identificación, título o declaración simbólica. No se especifica más para no borrar la tensión del enunciado.
  doctrine_reference: Apocalipsis 21:2; 21:10
- issue: Uso de ‘el Señor’ en vez de ‘Yahvé’
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Aunque el proyecto suele preferir ‘Yahvé’ para el nombre divino, aquí el testigo base es griego y presenta Κύριος. Se mantiene ‘el Señor’ para respetar el nivel textual disponible y evitar una retroversión que el pasaje no garantiza explícitamente.
  doctrine_reference: Septuaginta / uso de Κύριος
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión reciente que corrigió la versión inglesa de ‘zeal for him’ a ‘his jealousy’ y de ‘form of a man’ a ‘human form’. La draft española sigue esas decisiones: evita ‘celo’ como suavización, usa ‘forma humana’ por naturalidad y mantiene la cláusula final sobre Jerusalén sin diluirla. No se añadieron notas críticas sobre variantes textuales porque el paquete fuente ya incorpora la expansión bdg-text y el objetivo es una redacción publicada con trazabilidad léxica.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de θεός como ‘Dios’ y de Κύριος como ‘el Señor’ en consonancia con el nivel textual griego dado.
  - No se usa ‘Cristo’ ni lenguaje litúrgico añadido, porque el verso no lo aporta.
  - La puntuación con dos puntos antes de ‘Jerusalén es su nombre’ busca reproducir la clausula final enfática sin forzar una explicación interpretativa.
