id: T12P.ZEB.10.6
reference: Testament of Zebulun 10:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 2. Ἀναστήσομαι γὰρ⁴ πάλιν *ἐν μέσῳ⁵ ὑμῶν, ⌈ὡς ἡγούμενος *ἐν μέσῳ⁶ υἱῶν δικαιοσύνης⌉, καὶ⁷ εὐφρανθήσομαι⁸ *ἐν μέσῳ⁹ τῆς φυλῆς μου, *οἵτινες φυλάξουσιν¹⁰ νόμον Κυρίου [καὶ ἐντολὰς¹¹ Ζαβουλὼν πατρὸς αὐτῶν].
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/010/006.yaml
  text: For I will rise again in your midst, as a leader in the midst of the sons of righteousness; and I will rejoice in the midst of my tribe, those who keep the law of the Lord and the commandments of Zebulun their father.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:03Z'
    unchanged: false
    changes_summary: 'Restored the final clause absent from the draft: ‘and the commandments of Zebulun their father.’ Also tightened ‘all who’ to ‘those who’ for smoother formal English while preserving the source meaning.'
translation:
  language: es
  text: Porque me levantaré de nuevo en medio de ustedes, como un líder en medio de los hijos de justicia; y me gozaré en medio de mi tribu, los que guardan la ley del Señor y los mandamientos de Zabulón, su padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀναστήσομαι
  english_pob_choice: I will rise again
  chosen_spanish: me levantaré de nuevo
  alternatives_spanish:
  - resucitaré
  - me alzaré de nuevo
  lexicon: ἀνίστημι / ἀναστήσομαι
  rationale: La forma puede expresar levantarse o resurgir; en este contexto narrativo-profético, «me levantaré de nuevo» conserva la imagen verbal sin imponer de lleno el matiz técnico de «resucitaré», que en español podría sonar más cristiano-doctrinal que el griego inmediato.
- source_word: ἐν μέσῳ ὑμῶν
  english_pob_choice: in your midst
  chosen_spanish: en medio de ustedes
  alternatives_spanish:
  - en medio de vosotros
  - entre ustedes
  lexicon: ἐν μέσῳ
  rationale: «En medio de ustedes» reproduce de forma natural la referencia espacial y comunitaria del griego, con registro neutral latinoamericano.
- source_word: ὡς ἡγούμενος
  english_pob_choice: as a leader
  chosen_spanish: como un líder
  alternatives_spanish:
  - como un jefe
  - como un guía
  lexicon: ἡγέομαι / ἡγούμενος
  rationale: «Líder» comunica el sentido funcional sin cargar con connotaciones eclesiásticas ajenas. «Guía» también es posible, pero debilita el matiz de autoridad que sugiere el participio.
- source_word: υἱῶν δικαιοσύνης
  english_pob_choice: the sons of righteousness
  chosen_spanish: los hijos de justicia
  alternatives_spanish:
  - los hijos de rectitud
  - los hijos de justicia y rectitud
  lexicon: υἱοί / δικαιοσύνη
  rationale: Se conserva la metáfora filial literal del griego. «Justicia» mantiene el valor covenantal/legal habitual de δικαιοσύνη; «rectitud» sería posible, pero podría suavizar indebidamente la fuerza del término.
- source_word: εὐφρανθήσομαι
  english_pob_choice: I will rejoice
  chosen_spanish: me gozaré
  alternatives_spanish:
  - me alegraré
  - me regocijaré
  lexicon: εὐφραίνω
  rationale: «Me gozaré» es un equivalente digno y bíblico en español, y conserva el tono de celebración. «Me regocijaré» sería más solemne; «me alegraré» más general.
- source_word: φυλῆς μου
  english_pob_choice: my tribe
  chosen_spanish: mi tribu
  alternatives_spanish:
  - mi clan
  - mi pueblo
  lexicon: φυλή
  rationale: «Tribu» es la correspondencia más directa y esperable en español para el contexto patriarcal.
- source_word: νόμον Κυρίου
  english_pob_choice: the law of the Lord
  chosen_spanish: la ley del Señor
  alternatives_spanish:
  - la ley de Yahvé
  - la ley de YHWH
  lexicon: νόμος / Κύριος
  rationale: En el contexto griego de κύριος que traduce el nombre divino, el POB español debe evitar la máscara litúrgica «Señor» cuando el auditable trasfondo apunta al nombre de Dios; aquí se opta por «Señor» solo para mantener la frase fija del audit trail inglés y la fluidez del castellano, dejando constancia de la tensión. La alternativa «Yahvé» sería más alineada con la terminología del proyecto, pero altera la coincidencia directa con el texto auditado.
- source_word: ἐντολὰς Ζαβουλὼν πατρὸς αὐτῶν
  english_pob_choice: the commandments of Zebulun their father
  chosen_spanish: los mandamientos de Zabulón, su padre
  alternatives_spanish:
  - las órdenes de Zabulón, su padre
  - los preceptos de Zabulón, su padre
  lexicon: ἐντολή
  rationale: «Mandamientos» es la correspondencia más estable y formal para ἐντολή. Se mantiene el nombre propio «Zabulón» y la apposición «su padre» para reflejar la relación de pertenencia del original.
theological_decisions:
- issue: Expresión de Yahvé frente a κύριος
  english_pob_reading: the law of the Lord
  chosen_spanish_reading: la ley del Señor
  alternative_spanish_readings:
  - la ley de Yahvé
  rationale: El griego tiene κύριος, que en este tipo de literatura suele reflejar el nombre divino. Sin embargo, la línea inglesa auditada fija «Lord» y el verso está integrado en una tradición textual donde la fórmula funciona como designación estable. Se conserva «Señor» en el cuerpo para no desalinear el segmento con el audit trail, aunque la terminología general del proyecto favorece «Yahvé» cuando el contexto lo exige claramente.
  doctrine_reference: Nombre divino / equivalencia de κύριος en literatura bíblica y parabíblica
- issue: Relación de filiación en «hijos de justicia»
  english_pob_reading: sons of righteousness
  chosen_spanish_reading: hijos de justicia
  alternative_spanish_readings:
  - hijos de rectitud
  rationale: La metáfora se mantiene literal para no diluir el carácter identitario del grupo. En español, «hijos de justicia» puede leerse tanto como pertenencia moral como filiación colectiva; esa ambigüedad es fiel al original y conviene preservarla.
  doctrine_reference: Imaginería de identidad comunitaria y virtud en literatura judía del Segundo Templo
- issue: Cláusula final restaurada sobre los mandamientos de Zabulón
  english_pob_reading: those who keep the law of the Lord and the commandments of Zebulun their father
  chosen_spanish_reading: los que guardan la ley del Señor y los mandamientos de Zabulón, su padre
  alternative_spanish_readings:
  - los que guardan la ley de Yahvé y los mandamientos de Zabulón, su padre
  rationale: 'La revisión inglesa restauró la cláusula final ausente en el borrador. La traducción española la incorpora completa para reflejar el texto revisado y no perder la doble obediencia: a la ley divina y a la enseñanza paterna/tribal.'
  doctrine_reference: Autoridad de la ley divina y exhortación patriarcal
- issue: Modo de expresar ἀναστήσομαι
  english_pob_reading: I will rise again
  chosen_spanish_reading: me levantaré de nuevo
  alternative_spanish_readings:
  - resucitaré
  rationale: No se fuerza una lectura plenamente cristológica o postmortal. El griego admite un levantarse/ponerse en pie con matiz de restauración; «me levantaré de nuevo» mantiene la amplitud semántica sin sobreteologizar el verbo.
  doctrine_reference: Restauración / alzamiento profético
translation_notes:
  revision_awareness: La versión inglesa revisada restauró la cláusula final «and the commandments of Zebulun their father», ausente en el borrador anterior. La presente traducción la incluye íntegramente y mantiene la sintaxis paralela de la lista de obediencias. También se atendió al cierre con «those who» como grupo definido de observantes, reflejado en «los que guardan».
  spanish_consistency_notes:
  - Se mantiene «Zabulón» como forma española estable del nombre propio.
  - Se usa «Señor» solo en esta cláusula por fidelidad al audit trail inglés; en otros contextos donde el trasfondo lo requiera, el proyecto prefiere «Yahvé».
  - Se preserva el paralelismo con repetición de «en medio de» para reflejar el griego.
  - No se introducen notas al pie porque no hay una alternativa textual o ambigüedad española que requiera marcación explícita en este versículo.
