translation:
  language: es
  text: Y volverán a su tierra, y lo verán en Jerusalén debido a su santo nombre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπιστρέψετε
  english_pob_choice: you will return
  chosen_spanish: volverán
  alternatives_spanish:
  - regresarán
  - retornarán
  lexicon: ἐπιστρέφω
  rationale: El griego expresa un volver de vuelta; «volverán» es natural en español y conserva la idea de retorno sin introducir matices no presentes.
- source_word: εἰς τὴν γῆν ὑμῶν
  english_pob_choice: to your land
  chosen_spanish: a su tierra
  alternatives_spanish:
  - a la tierra de ustedes
  - a su país
  lexicon: γῆ
  rationale: «Tierra» reproduce el sentido geográfico y posesivo del texto; «su» mantiene la referencia colectiva del plural sin forzar un término moderno como «país».
- source_word: ὄψεσθε αὐτόν
  english_pob_choice: you will see him
  chosen_spanish: lo verán
  alternatives_spanish:
  - le verán
  - verán a él
  lexicon: ὁράω
  rationale: En español, el objeto directo masculino singular se expresa mejor con «lo»; mantiene la referencia personal implícita del pronombre griego.
- source_word: ἐν Ἱερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la Jerusalén
  lexicon: Ἱερουσαλήμ
  rationale: Se conserva el topónimo estándar en español bíblico y contemporáneo.
- source_word: διὰ τὸ ὄνομα αὐτοῦ τὸ ἅγιον
  english_pob_choice: because of his holy name
  chosen_spanish: debido a su santo nombre
  alternatives_spanish:
  - a causa de su santo nombre
  - por causa de su santo nombre
  lexicon: διά + acusativo; ὄνομα; ἅγιος
  rationale: «Debido a» refleja la relación causal del griego con claridad y dignidad. «Santo» conserva el valor de ἅγιος sin añadir una glosa explicativa que el texto no desarrolla.
theological_decisions:
- issue: Identidad del referente masculino singular «αὐτόν»
  english_pob_reading: you will see him
  chosen_spanish_reading: lo verán
  alternative_spanish_readings:
  - le verán
  - lo verán a él
  rationale: El texto no explicita la identidad del «him»; la traducción mantiene esa indeterminación, como en el inglés POB, sin convertirlo en una identificación doctrinal más precisa de la que el pasaje ofrece.
  doctrine_reference: Cristología implícita / referencia mesiánica no explicitada
- issue: Sentido de la causalidad en «διὰ τὸ ὄνομα αὐτοῦ τὸ ἅγιον»
  english_pob_reading: because of his holy name
  chosen_spanish_reading: debido a su santo nombre
  alternative_spanish_readings:
  - por causa de su santo nombre
  - a causa de su santo nombre
  rationale: Se conserva la relación causal amplia del griego y del inglés POB. No se introduce una interpretación devocional adicional; simplemente se refleja que la visión o reconocimiento ocurre por razón de su nombre santo.
  doctrine_reference: Nombre santo / causalidad reverencial
translation_notes:
  revision_awareness: La versión inglesa auditada no presenta notas ni revisiones aplicadas para este versículo; el texto griego fuente y la traducción inglesa coinciden de forma estable, por lo que no se requieren notas de variante ni decisiones de revisión adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto solo cuando aparece el Tetragrámaton; aquí no aparece.
  - Se mantiene un español bíblico moderno y claro, sin arcaísmos innecesarios.
  - No se añaden notas al pie porque el texto fuente y la auditoría inglesa no documentan variantes o ambigüedades que exijan marcación explícita en este versículo.
