translation:
  language: es
  text: Pero yo ahora me apresuro hacia mi descanso, como también mis padres.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνάπαυσίν μου
  english_pob_choice: my rest
  chosen_spanish: mi descanso
  alternatives_spanish:
  - mi reposo
  - mi descanso final
  lexicon: ἀνάπαυσις
  rationale: En este contexto funerario, «descanso» comunica de forma natural el sentido de reposo final sin perder la referencia al estado al que el hablante se dirige. «Reposo» también es posible, pero «descanso» suena más directo en español actual.
- source_word: ἀποτρέχω
  english_pob_choice: I hasten
  chosen_spanish: me apresuro
  alternatives_spanish:
  - corro
  - me doy prisa
  lexicon: ἀποτρέχω
  rationale: El verbo griego expresa movimiento rápido hacia un destino; en español, «me apresuro» conserva la idea de avanzar con prisa sin introducir una imagen demasiado literal de carrera física.
- source_word: οἱ πατέρες μου
  english_pob_choice: my fathers
  chosen_spanish: mis padres
  alternatives_spanish:
  - mis antepasados
  - mis padres [literal]
  lexicon: πατήρ
  rationale: Aunque el griego dice literalmente «mis padres», en este tipo de formulación la referencia abarca claramente a los antepasados inmediatos del hablante. «Mis padres» mantiene la forma del POB inglés y resulta natural en español, sin necesidad de explicitar más de lo que el texto permite.
theological_decisions:
- issue: Referencia al destino postrero como «descanso»
  english_pob_reading: my rest
  chosen_spanish_reading: mi descanso
  alternative_spanish_readings:
  - mi reposo
  - mi descanso eterno
  rationale: El texto no desarrolla doctrinalmente el estado final; simplemente lo nombra como «descanso». Por eso se conserva un término sobrio que no exagera ni especifica más allá del griego.
  doctrine_reference: Tipología funeraria / descanso de los muertos
- issue: Relación con los antepasados
  english_pob_reading: as also my fathers did
  chosen_spanish_reading: como también lo hicieron mis padres
  alternative_spanish_readings:
  - como también hicieron mis antepasados
  - igual que mis padres
  rationale: La comparación final se conserva sin añadir matices doctrinales sobre el más allá. El énfasis del verso es la continuidad del destino del hablante con el de sus padres, no una enseñanza sistemática adicional.
  doctrine_reference: Memoria patriarcal / muerte de los justos
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó el artículo extra antes de «rest» para sonar más natural. En español se evita igualmente cualquier artículo innecesario y se mantiene una formulación fluida y austera acorde con el griego.
  spanish_consistency_notes:
  - Se mantiene «descanso» como equivalente principal de ἀνάπαυσις en este contexto.
  - Se conserva un registro sobrio y bíblico sin introducir vocabulario eclesiástico posterior.
  - No se usan notas al pie porque el texto griego y el inglés auditado no presentan variantes relevantes ni tensiones léxicas adicionales en este verso.
