base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/004/007.yaml
  text: Reuben was grieved, and he did not eat bread on that day. Then Dan came near and said to him,
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
    unchanged: false
    changes_summary: Adjusted word order for natural English and added the omitted direct object/prepositional phrase 'to him' to complete the final clause.
translation:
  language: es
  text: 'Rubén estaba afligido, y no comió pan[a] aquel día. Entonces Dan se acercó y le dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Pan» conserva el objeto directo concreto del griego ἄρτον; en español podría entenderse por extensión como 'comida', pero aquí se prefiere la concreción literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦν δὲ ὁ Ῥουβὶμ λυπούμενος
  english_pob_choice: Reuben was grieved
  chosen_spanish: Rubén estaba afligido
  alternatives_spanish:
  - Rubén estaba triste
  - Rubén estaba apenado
  lexicon: λυπούμενος
  rationale: Afligido comunica el estado emocional intenso del participio griego sin volverlo excesivamente interpretativo. Mantiene un tono digno y bíblico en español, y evita reducirlo a una tristeza leve.
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: ἄρτος
  rationale: Pan es el equivalente español directo y conserva la concreción del sustantivo. 'Alimento' o 'comida' ampliarían innecesariamente el referente.
- source_word: οὐκ ἔφαγεν ἄρτον ἐν ἐκείνῃ τῇ ἡμέρᾳ
  english_pob_choice: he did not eat bread on that day
  chosen_spanish: no comió pan aquel día
  alternatives_spanish:
  - no comió pan en aquel día
  - aquel día no comió pan
  lexicon: ἐσθίω / ἔφαγεν + temporal phrase
  rationale: La formulación española mantiene el orden natural sin perder la relación temporal explícita. Se conserva el objeto directo 'pan' y el marco temporal 'aquel día'.
- source_word: προσελθὼν ... εἶπεν αὐτῷ
  english_pob_choice: Then Dan came near and said to him
  chosen_spanish: Entonces Dan se acercó y le dijo
  alternatives_spanish:
  - Entonces Dan se acercó y le habló
  - Entonces Dan vino cerca y le dijo
  lexicon: προσέρχομαι + λέγω αὐτῷ
  rationale: '''Se acercó'' expresa bien el movimiento de aproximación de προσέρχομαι; ''le dijo'' reproduce el dativo αὐτῷ de modo natural en español. Se evita ''vino cerca'', que suena poco idiomático.'
theological_decisions:
- issue: La aflicción de Rubén y la abstención de comida como señal narrativa
  english_pob_reading: Reuben was grieved, and he did not eat bread on that day.
  chosen_spanish_reading: Rubén estaba afligido, y no comió pan aquel día.
  alternative_spanish_readings:
  - Rubén estaba triste, y no comió pan aquel día.
  - Rubén estaba apenado, y no comió pan aquel día.
  rationale: No hay una afirmación doctrinal explícita; la decisión principal es preservar el valor narrativo del dolor de Rubén sin suavizarlo. 'Afligido' mantiene mejor la carga del participio que opciones más débiles.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente, que ordena la primera cláusula de manera más natural y completa la última con el destinatario implícito: ''Then Dan came near and said to him''. Por eso el español usa una secuencia fluida y explícita: ''Entonces Dan se acercó y le dijo''.'
  spanish_consistency_notes:
  - Se usa 'Rubén' y 'Dan' de forma consistente con los nombres del paquete fuente y la tradición española habitual.
  - Se mantiene el pretérito imperfecto 'estaba afligido' para el estado continuo y el pretérito perfecto simple 'no comió' para la acción puntual, reflejando la relación aspectual del griego.
