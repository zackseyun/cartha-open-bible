translation:
  language: es
  text: «No llores ni te entristezcas; porque hemos encontrado qué decir a nuestro padre.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μὴ κλαῖε
  english_pob_choice: Do not weep
  chosen_spanish: No llores
  alternatives_spanish:
  - No te lamentes
  - No derrames lágrimas
  lexicon: κλαίω
  rationale: κλαῖε es un imperativo negativo de llorar; «No llores» reproduce con naturalidad y fidelidad el sentido directo en español, sin intensificar ni suavizar el verbo.
- source_word: μηδὲ λυποῦ
  english_pob_choice: or be distressed
  chosen_spanish: ni te entristezcas
  alternatives_spanish:
  - ni te aflijes
  - ni te angusties
  lexicon: λυπέω
  rationale: λυποῦ expresa estar afligido, entristecido o apenado. «Ni te entristezcas» mantiene el paralelismo con «No llores» y comunica bien el estado interior sin cargarlo demasiado.
- source_word: εὕρομεν
  english_pob_choice: we have found
  chosen_spanish: hemos encontrado
  alternatives_spanish:
  - hemos hallado
  - encontramos
  lexicon: εὑρίσκω
  rationale: 'El aoristo con valor resultativo se vierte de manera natural como presente perfecto en español: «hemos encontrado». «Hemos hallado» sería también válido, pero «encontrado» es más común y claro.'
- source_word: τί εἴπωμεν
  english_pob_choice: what we shall say
  chosen_spanish: qué decir
  alternatives_spanish:
  - qué diremos
  - lo que diremos
  lexicon: λέγω / εἴπωμεν
  rationale: 'La cláusula de propósito o contenido «τί εἴπωμεν» puede expresarse en español de forma más natural con infinitivo: «qué decir». Conserva la idea de haber preparado una respuesta para el padre.'
- source_word: τῷ πατρὶ ἡμῶν
  english_pob_choice: to our father
  chosen_spanish: a nuestro padre
  alternatives_spanish:
  - a nuestro padre
  - a nuestro padre nuestro
  lexicon: πατήρ
  rationale: La frase se traduce de forma directa y transparente. «Nuestro padre» es el equivalente natural y suficientemente preciso para el dativo de destinatario.
theological_decisions:
- issue: No hay una carga teológica especial en el verso, pero sí una decisión de tono entre consuelo y simple contención emocional.
  english_pob_reading: Do not weep or be distressed
  chosen_spanish_reading: No llores ni te entristezcas
  alternative_spanish_readings:
  - No llores ni te aflijas
  - No llores ni te angusties
  rationale: La versión inglesa combina llanto y aflicción sin convertir el mandato en una exhortación moral más fuerte de lo que el griego exige. «Ni te entristezcas» preserva el paralelo y mantiene el tono pastoral del pasaje.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requieren cambios. Esta versión española sigue la lectura griega dada y mantiene la equivalencia óptima del inglés POB sin añadir notas textuales porque no hay variantes o tensiones documentadas en el aparato provisto.
  spanish_consistency_notes:
  - Se mantiene «llores» para κλαῖε y «entristezcas» para λυποῦ, evitando sinónimos innecesarios que borren el paralelismo griego.
  - Se conserva el perfecto compuesto «hemos encontrado» para reflejar el estado resultante de εὕρομεν.
  - No se introduce puntuación interpretativa adicional; la semicolon griega se representa con punto y coma, coherente con el tono de discurso directo.
