revisions:
- from: Y tomando la plata, corrió tras los mercaderes, pero no encontró a ninguno; porque habían dejado el camino principal y habían seguido una ruta más corta por entre los trogloditas.
  to: Y tomando la plata, corrió tras los mercaderes; pero, como no los halló, volvió lamentándose, porque los mercaderes habían dejado el camino principal y habían pasado por una ruta más corta por entre los trogloditas.
  rationale: Se restaura el contenido explícito del griego ‘volvió lamentándose’ sin perder la inferencia contextual de que no logró alcanzarlos. La nueva redacción mantiene la fluidez del español y conserva la cláusula causal sobre haber dejado el camino principal para tomar una ruta más corta por entre los trogloditas.
