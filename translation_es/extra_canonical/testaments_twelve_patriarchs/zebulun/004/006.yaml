translation:
  language: es
  text: Y tomando la plata, corrió tras los mercaderes; pero, como no los halló, volvió lamentándose, porque los mercaderes habían dejado el camino principal y habían pasado por una ruta más corta por entre los trogloditas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸ ἀργύριον
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  - la moneda
  lexicon: ἀργύριον
  rationale: La fuente griega habla de plata como objeto monetario; ‘la plata’ conserva la concreción material sin sobre-explicar. ‘El dinero’ suaviza demasiado el término y ‘la moneda’ vuelve más específico de lo que exige el griego.
- source_word: κατέδραμεν ὀπίσω
  english_pob_choice: he ran after
  chosen_spanish: corrió tras
  alternatives_spanish:
  - salió corriendo detrás de
  - corrió detrás de
  lexicon: κατατρέχω / τρέχω + ὀπίσω
  rationale: ‘Corrió tras’ transmite de forma natural la persecución inmediata del griego sin añadir matices innecesarios. ‘Corrió detrás de’ es posible, pero menos idiomático en este contexto narrativo.
- source_word: τοῖς ἐμπόροις
  english_pob_choice: the merchants
  chosen_spanish: los mercaderes
  alternatives_spanish:
  - los comerciantes
  - los vendedores
  lexicon: ἔμπορος
  rationale: ‘Mercaderes’ es fiel al rango semántico de ἔμπορος y mantiene el registro narrativo antiguo. ‘Comerciantes’ es correcto pero algo más moderno; ‘vendedores’ es demasiado estrecho.
- source_word: ὑπέστρεψεν ὀδυρόμενος
  english_pob_choice: but found no one
  chosen_spanish: pero no encontró a ninguno
  alternatives_spanish:
  - pero regresó lamentándose
  - y volvió lamentándose
  lexicon: ὑποστρέφω + ὀδύρομαι
  rationale: 'El griego dice que volvió lamentándose, y además no halló a nadie. Para no perder ninguno de los dos elementos, se conserva la acción de volver implícita en el flujo narrativo y se expresa el resultado: no encontró a ninguno. ‘Lamentándose’ refleja ὀδυρόμενος; ‘lamentando’ sería menos natural en español.'
- source_word: καταλιπόντες ... διώδευσαν ... διὰ Τρωγλοδιτῶν ἐν συντόμῳ
  english_pob_choice: they had left the main road and gone by a shorter route through the Troglodytes
  chosen_spanish: habían dejado el camino principal y habían seguido una ruta más corta por entre los trogloditas
  alternatives_spanish:
  - habían abandonado la vía principal y habían pasado por una ruta más breve entre los trogloditas
  - dejaron el camino principal y atravesaron a los trogloditas por un atajo
  lexicon: καταλείπω / διόδευσαν / ἐν συντόμῳ / Τρωγλοδῖται
  rationale: ‘Camino principal’ traduce πλατεῖαν ὁδόν de modo natural y auditable; ‘ruta más corta’ comunica ἐν συντόμῳ sin forzar tecnicismos. Se mantiene ‘trogloditas’ como transliteración tradicional del etnónimo propio, pues el texto lo presenta como nombre de un grupo o región y no como ‘cavernícolas’ en sentido moderno.
theological_decisions:
- issue: Sin añadir o suavizar el contenido narrativo de pérdida y búsqueda
  english_pob_reading: And taking the silver, he ran after the merchants, but found no one;
  chosen_spanish_reading: Y tomando la plata, corrió tras los mercaderes, pero no encontró a ninguno;
  alternative_spanish_readings:
  - Y tomando la plata, corrió tras los mercaderes, pero volvió lamentándose;
  - Y tomando la plata, corrió tras los mercaderes, pero no los halló;
  rationale: El pasaje es narrativo y no doctrinal; la prioridad es conservar la secuencia de acciones sin añadir interpretaciones. ‘No encontró a ninguno’ mantiene la pérdida de contacto de forma clara y no introduce sujetos inexistentes.
  doctrine_reference: Narrative fidelity; no doctrinal claim
- issue: Tratamiento de 'Troglodytes' como etnónimo o topónimo
  english_pob_reading: through the Troglodytes
  chosen_spanish_reading: por entre los trogloditas
  alternative_spanish_readings:
  - entre los trogloditas
  - a través de la tierra de los trogloditas
  rationale: La lectura inglesa conserva el nombre propio; en español conviene mantenerlo sin reinterpretarlo. Evita reemplazarlo por una explicación cultural no atestiguada por la fuente.
  doctrine_reference: Historical/geographical naming fidelity
translation_notes:
  revision_awareness: Se cotejó el pasaje griego con la versión inglesa POB; no se requieren notas textuales adicionales porque la traducción española puede reflejar fielmente el sentido del texto sin introducir variantes ni ambigüedades nuevas. La mención de ‘trogloditas’ se mantiene como nombre propio transliterado, coherente con la preservación del referente en la fuente.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y narrativo acorde con literatura testamentaria antigua.
  - ‘Plata’ conserva la concreción del objeto recibido sin desplazarlo a un valor abstracto.
  - Se evita el calco excesivo de la sintaxis inglesa, pero se preserva la secuencia causal y temporal del griego.
  - No se usan términos eclesiásticos ajenos al contexto porque el versículo no contiene vocabulario cultual o cristológico.
