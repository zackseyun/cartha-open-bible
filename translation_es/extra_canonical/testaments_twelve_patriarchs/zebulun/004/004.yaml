translation:
  language: es
  text: Y pasó tres días y tres noches en el foso, y así fue vendido en ayunas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐποίησε δὲ
  english_pob_choice: He spent
  chosen_spanish: Y pasó
  alternatives_spanish:
  - Y estuvo
  - Y permaneció
  lexicon: ποιέω
  rationale: El griego aquí expresa duración de una situación (“pasó [tiempo]”), no simplemente ‘hizo’. En español, ‘pasó’ comunica con naturalidad el transcurso de esos tres días y tres noches, manteniendo la equivalencia dinámica del inglés POB sin añadir contenido.
- source_word: ἐν τῷ λάκκῳ
  english_pob_choice: in the pit
  chosen_spanish: en el foso
  alternatives_spanish:
  - en el hoyo
  - en la cisterna
  lexicon: λάκκος
  rationale: ‘Foso’ reproduce bien el lugar de encierro con un registro claro y bíblicamente natural. ‘Cisterna’ sería posible en ciertos contextos narrativos, pero aquí la tradición textual solo dice ‘en el foso’, por lo que se evita precisar más de lo que la fuente permite.
- source_word: τρεῖς ἡμέρας καὶ τρεῖς νύκτας
  english_pob_choice: three days and three nights
  chosen_spanish: tres días y tres noches
  alternatives_spanish:
  - tres días con sus noches
  - durante tres días y tres noches
  lexicon: ἡμέρα / νύξ
  rationale: Se conserva de forma directa la fórmula temporal completa. No se suaviza porque el valor idiomático y enfático de la expresión ya es transparente en español.
- source_word: ἐπράθη
  english_pob_choice: he was sold
  chosen_spanish: fue vendido
  alternatives_spanish:
  - lo vendieron
  - fue puesto en venta
  lexicon: πίπρασκω / πράσσω
  rationale: La voz pasiva se mantiene porque el griego presenta al sujeto como receptor de la acción. ‘Fue vendido’ es la forma más directa y fiel en español.
- source_word: ἄσιτος
  english_pob_choice: while fasting
  chosen_spanish: en ayunas
  alternatives_spanish:
  - sin haber comido
  - sin comer
  lexicon: ἄσιτος
  rationale: El adjetivo significa literalmente ‘sin alimento’, ‘ayunando’. ‘En ayunas’ conserva el estado de no haber comido, con naturalidad idiomática en español y sin convertirlo en una explicación más larga que la fuente.
theological_decisions:
- issue: Relación entre la lectura griega y la omisión de la otra tradición textual
  english_pob_reading: The English POB translates the β-text reading and does not add a note.
  chosen_spanish_reading: Seguir la lectura griega β-texto implícita en el auditable English POB, sin añadir comentario textual en el verso principal.
  alternative_spanish_readings:
  - Incluir una nota sobre la omisión del α-texto
  - Marcar el verso como variante textual en el cuerpo
  rationale: El paquete fuente especifica que el α-texto omite este versículo y que el β-texto lo contiene. Dado que el English POB ya traduce el β-texto sin nota, la mejor práctica aquí es mantener el mismo enfoque en el texto principal y reservar la crítica textual para metadatos o notas solo si el proyecto la requiere en otro nivel.
  doctrine_reference: Textual criticism / transmission history
translation_notes:
  revision_awareness: The latest revision pass reported no changes needed; this Spanish draft preserves the English POB sense while grounding vocabulary directly in the Greek β-text reading provided in the source packet.
  spanish_consistency_notes:
  - Se usa ‘foso’ para λάκκος, coherente con un registro bíblico claro y sin forzar ‘cisterna’.
  - Se mantiene ‘fue vendido’ para la pasiva griega, alineado con el English POB ‘he was sold’.
  - ‘En ayunas’ conserva el valor de ἄσιτος sin añadir explicaciones interpretativas.
  - No se introducen notas de pie porque el English POB no las trae y la variante textual ya está descrita en los metadatos del encargo.
