revisions:
- from: Pero yo, compadeciéndome de José, no comí; pues vigilaba junto al foso, porque Judá temía que Simeón, Dan y Gad saltaran sobre él y lo mataran.
  to: Pero yo, compadeciéndome de José, no comí; pues vigilaba junto al pozo, porque Judá temía que Simeón, Dan y Gad dieran un salto y lo mataran.
  rationale: Se ajusta «foso» a «pozo» por precisión contextual de λάκκος en la escena de José, y se reemplaza «saltaran sobre él» por «dieran un salto y lo mataran» para evitar añadir un matiz espacial no expreso en ἀποπηδήσαντες, conservando mejor la secuencia verbal del griego.
