translation:
  language: es
  text: Pero yo, compadeciéndome de José, no comí; pues vigilaba junto al foso, porque Judá temía que Simeón, Dan y Gad saltaran sobre él y lo mataran.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σπλαγχνιζόμενος
  english_pob_choice: having compassion
  chosen_spanish: compadeciéndome
  alternatives_spanish:
  - teniendo compasión de
  - sintiéndome movido a compasión por
  lexicon: σπλαγχνίζομαι
  rationale: El participio expresa una compasión visceral y activa; en español, «compadeciéndome» conserva el matiz afectivo sin volverlo demasiado técnico o arcaizante.
- source_word: οὐκ ἔφαγον
  english_pob_choice: did not eat
  chosen_spanish: no comí
  alternatives_spanish:
  - no comí nada
  - no tomé alimento
  lexicon: ἐσθίω
  rationale: 'La negación simple reproduce con naturalidad la acción concreta: abstenerse de comer.'
- source_word: προσέχων δὲ τῷ λάκκῳ
  english_pob_choice: I kept watch by the pit
  chosen_spanish: vigilaba junto al foso
  alternatives_spanish:
  - estaba atento al foso
  - guardaba vigilancia junto al pozo
  lexicon: προσέχω + λάκκος
  rationale: La construcción indica atención vigilante orientada al lugar del pozo/foso; «junto al foso» mantiene el referente espacial del texto griego y «vigilaba» expresa la actitud continua.
- source_word: ἐπειδὴ ἐφοβεῖτο Ἰούδας
  english_pob_choice: because Judah feared
  chosen_spanish: porque Judá temía
  alternatives_spanish:
  - porque Judá tenía miedo
  - ya que Judá temía
  lexicon: φοβέομαι
  rationale: «Temía» reproduce bien el verbo de miedo en estilo narrativo y se ajusta al valor causal introducido por ἐπειδή.
- source_word: ἀποπηδήσαντες
  english_pob_choice: might leap up
  chosen_spanish: saltaran sobre él
  alternatives_spanish:
  - salieran de un salto
  - se abalanzaran
  lexicon: ἀποπηδάω
  rationale: El verbo sugiere un salto súbito hacia arriba o hacia fuera con intención agresiva; en español «saltaran sobre él» comunica el movimiento y la amenaza implícita.
- source_word: ἀνέλωσιν
  english_pob_choice: kill him
  chosen_spanish: lo mataran
  alternatives_spanish:
  - lo dieran muerte
  - lo asesinaran
  lexicon: ἀναιρέω
  rationale: «Matar» es el equivalente directo y más claro en español contemporáneo para la intención homicida del contexto.
theological_decisions:
- issue: Compasión de José frente a una simple emoción interior
  english_pob_reading: having compassion for Joseph
  chosen_spanish_reading: compadeciéndome de José
  alternative_spanish_readings:
  - teniendo compasión de José
  - movido a compasión por José
  rationale: El griego presenta una compasión activa que afecta la conducta (no comer). La formulación española conserva ese vínculo entre sentimiento y acción sin convertirlo en comentario interpretativo adicional.
  doctrine_reference: Anthropology / moral agency in narrative description
- issue: Relación causal entre la vigilancia y el temor de Judá
  english_pob_reading: for I kept watch by the pit, because Judah feared
  chosen_spanish_reading: pues vigilaba junto al foso, porque Judá temía
  alternative_spanish_readings:
  - ya que vigilaba junto al foso, porque Judá temía
  - estaba vigilando junto al foso, pues Judá temía
  rationale: 'Se mantiene la cadena causal del texto: la vigilancia explica la acción del hablante, y el temor de Judá explica el peligro concreto. No se suaviza la tensión narrativa ni se reordena la causalidad.'
  doctrine_reference: Narrative causality / textual fidelity
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y que el texto inglés quedó sin modificaciones; por tanto, el borrador español sigue directamente el griego con coherencia respecto del audit trail inglés, sin incorporar ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se conserva «foso» para λάκκος, aunque en otros contextos podría ser «pozo»; aquí la imagen de un hoyo peligroso encaja mejor con la escena narrativa.
  - Se usa «Judá» como sujeto del temor, manteniendo el referente explícito del griego.
  - Se mantiene un registro sobrio y narrativo, adecuado para una traducción bíblica pública y legible.
