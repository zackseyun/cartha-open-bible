  source_alignment_summary: 'El borrador sigue de cerca el griego y el inglés POB en la secuencia principal: compasión por José, abstención de comer, vigilancia junto al hoyo/foso, y temor de Judá ante un posible ataque de Simeón, Dan y Gad. Sin embargo, «saltaran sobre él» introduce un objeto («sobre él») que no está explícito en ἀποπηδήσαντες y desplaza el matiz de irrupción súbita. Además, «foso» es posible, pero «pozo» refleja mejor λάκκος en el contexto de José.'
