    rationale: El griego expresa un salto/irrupción súbita previo a «matarlo», pero no dice literalmente «sobre él». «Dieran un salto y lo mataran» o «se abalanzaran y lo mataran» preserva mejor la forma del original.
  revised_spanish_text: Pero yo, compadeciéndome de José, no comí; pues vigilaba junto al pozo, porque Judá temía que Simeón, Dan y Gad dieran un salto y lo mataran.
