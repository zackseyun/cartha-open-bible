id: T12P.ZEB.4.9
reference: Testament of Zebulun 4:9
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: 9. Θύσωμεν ⌈μαχαίρᾳ⌉⁵² *χίμαρρον αἰγῶν⁵³ καὶ μολύνωμεν⁵⁴ τὸν χιτῶνα Ἰωσήφ, καὶ *ἀποστείλωμεν αὐτὸν τῷ Ἰακὼβ λέγοντες⁵⁵. Ἐπίγνωθι, ὁ⁵⁶ *χιτὼν τοῦ υἱοῦ σου ἐστίν⁵⁷; *καὶ ἐποίησαν οὕτως⁵⁸.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/zebulun/004/009.yaml
  text: “Let us slaughter a male goat with a knife, stain Joseph’s tunic, and send it to Jacob, saying, ‘Recognize—is this the tunic of your son?’” And they did so.
  revision_pass:
    model: gpt-5
    timestamp: '2026-05-03T07:45:20Z'
    unchanged: false
    changes_summary: 'Aligned strictly to the Greek clause: rendered μαχαίρᾳ as “with a knife” (not “with the sword”); included all three hortatory verbs (“slaughter … stain … send”). Removed additions not present in the source (details about Jacob, the message, and subsequent narrative).'
translation:
  language: es
  text: '«Matemos con un cuchillo un macho cabrío, manchemos la túnica de José y enviémosla a Jacob, diciendo: “Reconoce: ¿es ésta la túnica de tu hijo?”» Y así lo hicieron.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Θύσωμεν
  english_pob_choice: Let us slaughter
  chosen_spanish: Matemos
  alternatives_spanish:
  - Sacrifiquemos
  - Degollemos
  lexicon: θύω
  rationale: El contexto narra una acción violenta y concreta contra el animal; «matemos» reproduce el valor exhortativo sin introducir el matiz cultual de «sacrifiquemos», que no está asegurado por el pasaje.
- source_word: μαχαίρᾳ
  english_pob_choice: with a knife
  chosen_spanish: con un cuchillo
  alternatives_spanish:
  - con una espada
  - con un puñal
  lexicon: μαχαίρα
  rationale: La revisión inglesa corrigió «sword» a «knife»; en español «cuchillo» expresa mejor el instrumento común y directo, evitando un arma no sustentada por el texto.
- source_word: χίμαρρον αἰγῶν
  english_pob_choice: a male goat
  chosen_spanish: un macho cabrío
  alternatives_spanish:
  - un cabrito macho
  - un chivo
  lexicon: χίμαρος
  rationale: «Macho cabrío» conserva la especificidad sexual y la especie caprina de manera natural en español bíblico contemporáneo.
- source_word: μολύνωμεν τὸν χιτῶνα Ἰωσήφ
  english_pob_choice: stain Joseph’s tunic
  chosen_spanish: manchemos la túnica de José
  alternatives_spanish:
  - ensuciemos la túnica de José
  - sintamos la túnica de José
  lexicon: μολύνω
  rationale: «Manchemos» corresponde al acto de contaminar visualmente la prenda; «túnica» traduce χιτών con un término comprensible y más preciso que «vestidura» en este contexto narrativo.
- source_word: ἀποστείλωμεν αὐτὸν τῷ Ἰακὼβ
  english_pob_choice: and send it to Jacob
  chosen_spanish: y enviémosla a Jacob
  alternatives_spanish:
  - y mandémosla a Jacob
  - y remitémosla a Jacob
  lexicon: ἀποστέλλω
  rationale: El antecedente femenino de «la» es la túnica, no José; el español necesita explicitar el referente para evitar ambigüedad y mantenerse fiel a la secuencia griega.
- source_word: Ἐπίγνωθι
  english_pob_choice: Recognize
  chosen_spanish: Reconoce
  alternatives_spanish:
  - Conoce
  - Identifica
  lexicon: ἐπιγινώσκω
  rationale: Imperativo breve y directo, adecuado para la orden de identificar la prenda; «reconoce» conserva la fuerza de reconocimiento del original.
- source_word: ὁ χιτὼν τοῦ υἱοῦ σου ἐστίν
  english_pob_choice: is this the tunic of your son?
  chosen_spanish: ¿es ésta la túnica de tu hijo?
  alternatives_spanish:
  - ¿es la túnica de tu hijo?
  - ¿es esta la túnica de tu hijo?
  lexicon: χιτών
  rationale: Se mantiene el interrogativo de identificación y el posesivo familiar del griego; «tu hijo» reproduce la línea engañosa que apunta a Jacob.
theological_decisions:
- issue: Tensión entre “matar” y “sacrificar” para θύω
  english_pob_reading: Let us slaughter
  chosen_spanish_reading: Matemos
  alternative_spanish_readings:
  - Sacrifiquemos
  - Degollemos
  rationale: No se impone un valor ritual donde el contexto inmediato solo exige una acción violenta para el engaño. «Matemos» preserva la ambigüedad del verbo griego y coincide con la revisión inglesa.
  doctrine_reference: No aplica; decisión lexical-contextual, no doctrinal.
- issue: Omisión de añadidos narrativos posteriores
  english_pob_reading: And they did so.
  chosen_spanish_reading: Y así lo hicieron.
  alternative_spanish_readings:
  - Y lo hicieron.
  - Y lo hicieron así.
  rationale: La revisión inglesa eliminó material no presente en la cláusula griega. La traducción española debe cerrar igualmente en el acto realizado, sin introducir el episodio ampliado del relato.
  doctrine_reference: Principio de fidelidad textual y delimitación del perícopa.
translation_notes:
  revision_awareness: 'Se siguió la corrección de revisión que restringe el texto al contenido estrictamente presente en el griego: el cuchillo, el macho cabrío, la túnica, el envío y la respuesta final. Se omitieron añadidos narrativos que aparecían en versiones anteriores pero no en el testimonio base.'
  spanish_consistency_notes:
  - Se mantiene un español sobrio y narrativo, apto para lectura bíblica pública.
  - Se usa «túnica» de manera consistente para χιτών en este pasaje.
  - No se introducen términos eclesiásticos innecesarios ni formulaciones explicativas ajenas al texto.
  - El pronombre enclítico en «enviémosla» evita ambigüedad y respeta la referencia femenina a la túnica.
