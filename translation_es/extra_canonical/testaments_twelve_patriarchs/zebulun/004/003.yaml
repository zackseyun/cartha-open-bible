revisions:
- from: Y viéndome a mí también sin comer, me puso a guardarlo hasta que fue entregado a los ismaelitas.
  to: Y cuando vieron que yo tampoco comía, me pusieron a guardarlo hasta que fue entregado a los ismaelitas.
  rationale: Se ajusta el sujeto a plural para concordar con el sentido contextual y con la línea auditada en inglés ('they set me'), y se sustituye el giro inicial por una formulación más natural en español sin perder el valor del griego. Se conserva 'fue entregado a los ismaelitas' porque refleja mejor ἀπεδόθη τοῖς Ἰσμαηλίταις que una reducción automática a 'fue vendido'.
