translation:
  language: es
  text: Y viéndome a mí también sin comer, me puso a guardarlo hasta que fue entregado a los ismaelitas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὁρῶντές με δὲ μὴ ἐσθίοντα
  english_pob_choice: And when they saw that I also was not eating
  chosen_spanish: Y viéndome a mí también sin comer
  alternatives_spanish:
  - Y cuando vieron que yo tampoco comía
  - Y al verme también sin comer
  lexicon: ὁράω; ἐσθίω
  rationale: El griego expresa percepción visual seguida de la constatación de que el hablante no estaba comiendo. «Viéndome a mí también sin comer» conserva el orden narrativo y la inclusión de «también» para reflejar δέ + μὴ ἐσθίοντα sin sobreexplicar.
- source_word: ἔθετό με τηρεῖν αὐτόν
  english_pob_choice: they set me to guard him
  chosen_spanish: me puso a guardarlo
  alternatives_spanish:
  - me encargó guardarlo
  - me puso a cuidarlo
  lexicon: τίθημι; τηρέω
  rationale: La construcción causativa con τίθημι + infinitivo admite en español una formulación directa como «me puso a guardarlo». «Guardar» conserva mejor la fuerza de vigilancia/custodia de τηρεῖν que «cuidar».
- source_word: ἕως οὗ ἀπεδόθη τοῖς Ἰσμαηλίταις
  english_pob_choice: until he was sold
  chosen_spanish: hasta que fue entregado a los ismaelitas
  alternatives_spanish:
  - hasta que fue vendido
  - hasta que fue cedido a los ismaelitas
  lexicon: ἀποδίδωμι; Ἰσμαηλίται
  rationale: El griego dice literalmente que fue «entregado» o «entregado/cedido» a los ismaelitas; la POB inglesa simplifica a «sold» por sentido contextual. En español se preserva la tensión entre la entrega y la venta mediante «fue entregado a los ismaelitas», evitando reducir el verbo griego a una sola formulación comercial sin necesidad.
theological_decisions:
- issue: Relación entre «entregado» y «vendido» en el cierre
  english_pob_reading: until he was sold
  chosen_spanish_reading: hasta que fue entregado a los ismaelitas
  alternative_spanish_readings:
  - hasta que fue vendido
  - hasta que fue entregado y vendido a los ismaelitas
  rationale: El testimonio griego disponible usa ἀπεδόθη, que en contexto narrativo puede implicar transferencia/entrega en la cadena de venta. Dado que el texto fuente no explicita aquí «vendido», la redacción española mantiene el verbo de la fuente y deja que el contexto narrativo sugiera la transacción.
  doctrine_reference: No aplica; decisión de crítica y semántica textual.
translation_notes:
  revision_awareness: El inglés POB actual traduce el cierre por sentido como «until he was sold» y no añade notas. La presente versión española ajusta la formulación al griego explícito («ἀπεδόθη τοῖς Ἰσμαηλίταις») sin introducir una glosa interpretativa excesiva. No se reportan revisiones aplicadas en el pasaje base.
  spanish_consistency_notes:
  - Se mantiene el trato narrativo en primera persona singular acorde con la sección.
  - «Ismaelitas» conserva el etnónimo bíblico estándar en español.
  - No se introduce puntuación o división en cláusulas que altere la fluidez del relato.
