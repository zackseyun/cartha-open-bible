translation:
  language: es
  text: 'Cuando Rubén llegó y oyó que había sido vendido mientras él estaba ausente, rasgó su túnica y, llorando, decía: «¿Cómo veré el rostro de mi padre Jacob?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐλθὼν δὲ Ῥουβὶμ
  english_pob_choice: When Reuben came
  chosen_spanish: Entonces, cuando Rubén llegó
  alternatives_spanish:
  - Cuando Rubén vino
  - Al llegar Rubén
  lexicon: N/A (nombre propio; partícula narrativa)
  rationale: Ἐλθὼν δὲ introduce una acción narrativa circunstancial; «Entonces, cuando» conserva el avance del relato sin forzar una subordinación pesada. «Rubén» mantiene el nombre propio en forma española común.
- source_word: ἀκούσας ὅτι ἐπράθη
  english_pob_choice: heard that he had been sold
  chosen_spanish: oyó que había sido vendido
  alternatives_spanish:
  - escuchó que había sido vendido
  - oyó que lo habían vendido
  lexicon: N/A
  rationale: ἀκούσας pide un verbo de recepción auditiva; «oyó» es natural y fiel. El pasivo «había sido vendido» conserva la voz del griego y evita añadir un sujeto agente no expresado.
- source_word: ἀπόντος αὐτοῦ
  english_pob_choice: while he was away
  chosen_spanish: mientras él estaba ausente
  alternatives_spanish:
  - cuando él no estaba presente
  - en su ausencia
  lexicon: N/A
  rationale: La frase genitiva absoluta indica ausencia concomitante; «mientras él estaba ausente» comunica bien el valor temporal y mantiene la referencia a la ausencia personal.
- source_word: περιεσχίσατο τὸν χιτῶνα αὐτοῦ
  english_pob_choice: he tore his garments
  chosen_spanish: rasgó su túnica
  alternatives_spanish:
  - rasgó sus vestidos
  - desgarró su túnica
  lexicon: χιτών -> túnica
  rationale: El griego menciona específicamente χιτών, no un término general para «vestidos». «Túnica» preserva la referencia concreta y evita ampliar indebidamente el alcance. «Rasgó» expresa bien la acción ritual/de duelo.
- source_word: θρηνῶν ἔλεγεν
  english_pob_choice: mourned, saying
  chosen_spanish: se lamentaba, diciendo
  alternatives_spanish:
  - se afligía, diciendo
  - plañía, diciendo
  lexicon: θρηνέω -> lamentarse
  rationale: θρηνῶν expresa duelo en curso; «se lamentaba» es un equivalente digno y claro en español. «Diciendo» conserva la transición al discurso directo.
- source_word: Πῶς ὄψωμαι τὸ πρόσωπον τοῦ πατρός μου Ἰακώβ;
  english_pob_choice: How shall I look upon the face of my father Jacob?
  chosen_spanish: ¿Cómo miraré el rostro de mi padre Jacob?
  alternatives_spanish:
  - ¿Cómo podré ver el rostro de mi padre Jacob?
  - ¿Cómo me presentaré ante mi padre Jacob?
  lexicon: ὄψομαι / πρόσωπον -> mirar/ver el rostro
  rationale: La expresión idiomática del griego se conserva con una formulación española natural. «Rostro» mantiene el hebraísmo subyacente sin volverlo rígido; el futuro «miraré» reproduce la fuerza prospectiva de ὄψωμαι.
theological_decisions:
- issue: Duelo fraternal y culpa relacional sin explicitación doctrinal
  english_pob_reading: he tore his garments and mourned
  chosen_spanish_reading: rasgó su túnica y se lamentaba
  alternative_spanish_readings:
  - rasgó sus vestidos y lloró
  - rasgó su túnica y guardó luto
  rationale: El verso describe una reacción de duelo ante la venta de José; no introduce una enseñanza doctrinal explícita. «Se lamentaba» conserva el peso emocional sin añadir matices interpretativos ajenos al texto.
  doctrine_reference: Narrative lament / family guilt in Testament literature
- issue: Ausencia de notas textuales adicionales
  english_pob_reading: 'English POB footnotes: none'
  chosen_spanish_reading: Sin notas textuales añadidas
  alternative_spanish_readings:
  - Con nota sobre el matiz de χιτών
  - Con nota sobre el genitivo absoluto
  rationale: La versión inglesa no llevaba notas y el español puede expresar adecuadamente los matices en el cuerpo del texto sin sobrecargarlo. Se mantiene la transparencia sin introducir una lectura alternativa no necesaria.
  doctrine_reference: Textual transparency / translation audit practice
translation_notes:
  revision_awareness: The latest revision pass marked the English source rendering unchanged and needing no changes; this Spanish draft follows that stable English audit context while returning to the Greek source for lexical precision.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se mantiene «Rubén» como forma española estándar del nombre propio.
  - «Túnica» traduce χιτών de manera específica, coherente con una lectura de prenda singular.
  - «Rostro» conserva el giro semítico del pasaje y evita una paráfrasis más libre.
