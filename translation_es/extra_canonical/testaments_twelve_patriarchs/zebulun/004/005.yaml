review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: llegada de Rubén, noticia de la venta durante su ausencia, gesto de duelo, lamento y pregunta sobre presentarse ante Jacob. Sin embargo, «Entonces, cuando» añade un matiz discursivo no exigido por Ἐλθὼν δέ, y «se lamentaba» atenúa ligeramente θρηνῶν, que aquí encaja mejor como participio de duelo coordinado con el decir. La pregunta final suena más natural y fiel con «veré» o «podré ver» que con «miraré».'
  spanish_quality_summary: El español es claro y digno, pero puede mejorar en naturalidad narrativa. «Cuando Rubén llegó» fluye mejor que «Entonces, cuando Rubén llegó». «Rasgó su túnica» es correcto y conserva χιτών. «Llorando» o «de duelo» sería más inmediato que «se lamentaba» junto a «diciendo». La pregunta retórica final necesita una formulación más idiomática en español bíblico moderno.
  glossary_alignment: No hay términos del glosario principal especialmente controvertidos en este verso. «Rubén», «Jacob» y «túnica» están bien. No hay conflicto con Yahvé/Mesías/Cristo ni otros términos doctrinales del proyecto.
  issues:
  - severity: medium
    issue: Inicio narrativo algo recargado
    rationale: «Entonces, cuando Rubén llegó» añade «Entonces» sin apoyo claro en el griego; «Cuando Rubén llegó» o «Al llegar Rubén» refleja mejor Ἐλθὼν δὲ Ῥουβὶμ.
  - severity: low
    issue: Matiz de duelo subóptimo en «se lamentaba»
    rationale: θρηνῶν expresa lamento/duelo en curso; «llorando» o «haciendo duelo» enlaza más naturalmente con «decía» en español.
  - severity: medium
    issue: Pregunta final poco idiomática
    rationale: «¿Cómo miraré el rostro de mi padre Jacob?» es comprensible, pero en español suena más natural «¿Cómo veré el rostro...?» o «¿Cómo podré ver el rostro...?» para ὄψωμαι τὸ πρόσωπον.
  revised_spanish_text: 'Cuando Rubén llegó y oyó que había sido vendido mientras él estaba ausente, rasgó su túnica y, llorando, decía: «¿Cómo veré el rostro de mi padre Jacob?»'
  revision_rationale: La revisión elimina una partícula añadida no necesaria («Entonces»), mantiene la precisión de χιτών con «túnica», mejora el valor de θρηνῶν con «llorando» en construcción más natural con «decía», y ajusta ὄψωμαι a una expresión española más idiomática y fiel («veré el rostro»). No hacen falta notas.
