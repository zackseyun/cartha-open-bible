translation:
  language: es
  text: Porque habían oído cuántos males se habían hecho contra él. Y después de haber sido arrojado al pozo, mis hermanos se sentaron a comer y a beber.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἤκουσαν γὰρ ὅσα ἐνεδείξαντο αὐτῷ κακά
  english_pob_choice: For they had heard how much evil had been done against him.
  chosen_spanish: Porque habían oído cuántos males se habían hecho contra él.
  alternatives_spanish:
  - Porque habían oído cuán gran mal se había hecho contra él.
  - Porque habían oído todo el mal que se había hecho contra él.
  lexicon: ἀκούω; κακός
  rationale: El griego expresa que ellos habían oído acerca de muchos/serios males hechos contra él. En español, «cuántos males» conserva bien la idea de cantidad/intensidad sin sobrecargar con una traducción literal rígida. «Se habían hecho contra él» mantiene la pasiva impersonal y el sentido de agresión hacia la víctima.
- source_word: πραθῆναι αὐτόν
  english_pob_choice: after he had been thrown into the pit
  chosen_spanish: después de haber sido arrojado al pozo
  alternatives_spanish:
  - después de haber sido echado al pozo
  - después de haber sido vendido al pozo
  lexicon: πραθῆναι
  rationale: Aunque el término griego estándar podría sugerir venta en otros contextos, el testimonio inglés auditado ya fija el sentido narrativo como «thrown into the pit». En español, «arrojado al pozo» sigue esa lectura y conserva la imagen narrativa del encierro/abandono. «Pozo» es la opción natural para el lugar indicado por el contexto.
- source_word: οἱ ἀδελφοί μου ἐσθίειν καὶ πίνειν
  english_pob_choice: my brothers sat down to eat and drink.
  chosen_spanish: mis hermanos se sentaron a comer y a beber.
  alternatives_spanish:
  - mis hermanos se sentaron para comer y beber.
  - mis hermanos se sentaron a comer y beber.
  lexicon: ἀδελφοί; ἐσθίειν; πίνειν
  rationale: Se mantiene el posesivo «mis hermanos» y la acción conjunta de comer y beber. «Se sentaron a» es una construcción natural en español que reproduce la actitud deliberada del verbo griego, sin añadir matices no presentes en el texto.
theological_decisions:
- issue: Tratamiento del sujeto divino/humano implícito en la pasiva impersonal
  english_pob_reading: how much evil had been done against him
  chosen_spanish_reading: cuántos males se habían hecho contra él
  alternative_spanish_readings:
  - cuántos males le habían hecho
  - cuán gran mal se había hecho contra él
  rationale: La pasiva impersonal conserva la atención sobre el daño sufrido por la víctima, sin introducir un agente específico que el texto no nombra aquí. Esto respeta la tensión narrativa del relato y evita suavizar la violencia.
  doctrine_reference: none
translation_notes:
  revision_awareness: La revisión más reciente eliminó una marca de nota al pie del texto inglés; por tanto, el texto español se ofrece sin nota en el cuerpo principal y sin notas añadidas, manteniendo la lectura auditada y completa.
  spanish_consistency_notes:
  - Se usa un español moderno y digno, apto para lectura eclesial.
  - 'Se conserva la secuencia causal-temporal del original: «Porque… Y después…».'
  - No se introduce vocabulario tradicionalizante no respaldado por el texto base.
