translation:
  language: es
  text: VII. Extendí una red[a] entre otro árbol derecho[b], en medio[c]. 2. Y anduve en ella, recorriendo las orillas del mar[d], pescando peces para la casa de mi padre, hasta que llegamos a Egipto. 3. Y de mi pesca repartía a todo hombre extranjero, movido[a] a compasión. 4. Y si era extranjero, o enfermo, o anciano, cocía los peces y, preparándolos bien según la necesidad de cada uno, los ofrecía a todos, condolido y sufriendo con ellos. 5. Por esto también el Señor me llenó de muchos peces en la pesca de peces[e]. Porque el que reparte a su prójimo recibe mucho más del Señor. 6. Así que pesqué durante cinco años, repartiendo a todo hombre que veía y bastando para toda la casa de mi padre. 7. Y la mitad la preparaba en el invierno junto con mis hermanos. 8. Pero si no tenéis para dar al necesitado, compadeceos de él con entrañas de misericordia. 9. Sé que mi mano no halló qué dar al necesitado, y caminando con él siete estadios[f], lloraba; y mis entrañas se conmovían por él para compasión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La red o lienzo extendido corresponde al contexto de pesca; la imagen conserva el movimiento del verbo original.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “otro árbol derecho”; la frase parece aludir al soporte de una red extendida o a un poste/árbol recto en la escena.
    reason: source_note
  - marker: c
    text: La secuencia griega es breve y elíptica; se mantiene el valor espacial sin sobreexplicar.
    reason: source_note
  - marker: d
    text: La expresión griega se refiere a las orillas costeras o playas.
    reason: source_note
  - marker: e
    text: La repetición “pesca de peces” preserva la forma enfática del griego.
    reason: spanish_style_note
  - marker: f
    text: Siete estadios equivalen aproximadamente a 1,3 kilómetros o 0,8 millas.
    reason: cultural_note
lexical_decisions:
- source_word: σπλαγχνίζομαι / σπλάγχνα
  english_pob_choice: have compassion / compassion
  chosen_spanish: compadecerse / compasión
  alternatives_spanish:
  - tener misericordia / misericordia
  - moverse a compasión
  lexicon: BDAG
  rationale: En este pasaje el motivo dominante es la misericordia activa hacia el otro. 'Compadecerse' conserva la respuesta ética y relacional del verbo, y 'compasión' mantiene la repetición conceptual sin recurrir a un giro corporal demasiado arcaico en el cuerpo del texto.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - misericordia divina
  - piedad
  lexicon: BDAG
  rationale: La combinación con compasión pide un término fuerte y bíblico. 'Misericordia' conserva el peso moral y teológico mejor que 'bondad' o 'piedad'.
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - vecino
  - semejante
  lexicon: BDAG
  rationale: En español bíblico 'prójimo' expresa mejor la relación ética del mandamiento y evita la ambigüedad cotidiana de 'vecino'.
- source_word: ἁπλότης / καρδία ἁπλῆ
  english_pob_choice: simplicity / simplicity of heart
  chosen_spanish: sencillez / sencillez de corazón
  alternatives_spanish:
  - simplicidad / simplicidad de corazón
  - integridad / integridad de corazón
  lexicon: BDAG
  rationale: Aquí el sentido es integridad sin doblez, pero en español 'sencillez' comunica mejor la transparencia moral que 'simplicidad' y evita sonar técnico o artificial. Donde aparece la fórmula estable, se conserva 'sencillez de corazón' para mantener la cohesión del capítulo.
- source_word: φθόνος
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  lexicon: BDAG
  rationale: Para la hostilidad hacia José, 'envidia' es la opción más natural y precisa en español.
- source_word: μνησικακέω / μνησικακία
  english_pob_choice: hold malice
  chosen_spanish: guardar rencor
  alternatives_spanish:
  - tener malicia
  - abrigar resentimiento
  lexicon: BDAG
  rationale: La exhortación contra la hostilidad interior se expresa con claridad natural en español mediante 'guardar rencor', que comunica bien la permanencia del mal guardado en el corazón.
- source_word: στάδιον
  english_pob_choice: stadia
  chosen_spanish: estadios
  alternatives_spanish:
  - furlongs
  - unos 1,3 kilómetros
  lexicon: BDAG
  rationale: Se mantiene la unidad antigua como término histórico transliterado en plural castellano, y la nota puede aclarar la medida aproximada sin desplazar el color original del texto.
- source_word: ἁλιεύων ἰχθύας
  english_pob_choice: fishing fish
  chosen_spanish: pescando peces
  alternatives_spanish:
  - pescando
  - capturando peces
  lexicon: LSJ
  rationale: La repetición resulta torpe en español, pero se conserva porque el griego la enfatiza. El giro mantiene el efecto literal y evita suavizar la imagen.
- source_word: ἀγρὰ τῶν ἰχθύων
  english_pob_choice: the fishing of fish
  chosen_spanish: la pesca de peces
  alternatives_spanish:
  - la captura de peces
  - la faena de pesca
  lexicon: LSJ
  rationale: Se preserva la rareza expresiva del original sin convertirla en una paráfrasis fluida que borre el sabor del texto transmitido.
- source_word: ὀθόνην ... ἐξέτεινα
  english_pob_choice: I stretched out a net
  chosen_spanish: Extendí una red
  alternatives_spanish:
  - tendí una red
  - extendi una malla
  lexicon: LSJ
  rationale: El sustantivo original puede designar una red o lienzo extendido; por el contexto de pesca, 'red' es la equivalencia natural. 'Extendí' conserva el verbo del texto.
theological_decisions:
- issue: Reciprocidad divina en el lenguaje de compasión
  english_pob_reading: As humans show compassion, so the Lord shows compassion in return.
  chosen_spanish_reading: Como los humanos muestran compasión, así el Señor responde con compasión.
  alternative_spanish_readings:
  - Dios bendice a los bondadosos
  - Una ética de solidaridad sin reciprocidad explícita
  rationale: El pasaje articula una reciprocidad moral-teológica directa; no debe diluirse en una generalidad ética. 'Señor' mantiene el referente del texto fuente para la acción divina, sin convertirlo en una mera máxima moral.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Beliar / demonología testamentaria
  english_pob_reading: Beliar as a personal hostile power
  chosen_spanish_reading: Beliar como poder personal hostil
  alternative_spanish_readings:
  - Belial
  - el mal
  rationale: Aunque este versículo concreto no lo contiene, la decisión se anota para transparencia del tramo de capítulo y para mantener coherencia con la tradición testamentaria cuando aparezca en el contexto inmediato.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4
- issue: Cierre formulaico y transmisión textual
  english_pob_reading: Translate the closing notices straightforwardly
  chosen_spanish_reading: Traducir el cierre narrativo de manera directa, sin omitir su carácter formulaico
  alternative_spanish_readings:
  - resumirlo editorialmente
  - suavizar la repetición
  rationale: La fuente transmite un cierre breve con marcadores narrativos tradicionales; la versión española debe ser honesta respecto de ese carácter y no normalizarlo en exceso.
  doctrine_reference: PHILOSOPHY.md 'translate what is in the source text honestly'
translation_notes:
  revision_awareness: Se corrigió cualquier residuo del inglés audit trail en la redacción española, especialmente en el campo léxico y en la formulación narrativa. La versión evita calcos ingleses innecesarios y mantiene solo la información efectivamente atestiguada por el griego fuente.
  spanish_consistency_notes:
  - Se conserva el registro testamentario y la sintaxis breve del original.
  - '''Señor'' se usa aquí para Κύριος conforme al audit trail inglés, sin introducir una normalización litúrgica adicional.'
  - Las repeticiones retóricas de 'compasión', 'misericordia' y de la imagen de la pesca se mantienen por fidelidad estilística.
  - No se introdujo contenido de otros versículos del capítulo ajeno al segmento fuente.
