translation:
  language: es
  text: 'Después de que fue arrojado al pozo[a], mis hermanos se sentaron a comer y beber. Pero yo, compadecido de José, no comí; pues vigilaba junto al pozo, porque Judá temía que Simeón y Gad pudieran saltar y matarlo. Y cuando vieron que yo tampoco comía, me pusieron a custodiarlo hasta que fue vendido. Estuvo tres días y tres noches en el pozo, y así fue vendido mientras ayunaba.


    Cuando Rubén vino y oyó que había sido vendido mientras él estaba ausente, rasgó sus vestidos y lloró, diciendo: “¿Cómo miraré el rostro de mi padre Jacob?” Y tomando la plata, corrió tras los mercaderes, pero no encontró a nadie; porque habían dejado el camino principal y habían ido por una ruta más corta a través de los trogloditas. Rubén quedó afligido, y aquel día no comió pan.


    Entonces Dan se le acercó y le dijo: “No llores ni te entristezcas; porque hemos encontrado lo que diremos a nuestro padre. Degollaremos con la espada un cabrito de las cabras, mancharemos la túnica de José y la enviaremos a Jacob nuestro padre, diciendo: ‘Reconoce si esta es la túnica de tu hijo’”. Y lo hicieron así. Por eso Jacob lloró por José todos sus días.


    Y mis hermanos tuvieron miedo, y todos se arrepintieron por lo que habían hecho a José. Pero los egipcios y los ismaelitas no le hicieron daño, porque el Señor no les permitió hacerle mal.


    Porque era un hombre hermoso, de buen aspecto y bello en apariencia, y no había en él malicia, sino que era manso y tenía un alma sencilla. Por tanto, sean compasivos, hijos míos[b], porque la compasión es buena para todos. Y la misericordia, aun si un hombre es pecador, si tiene compasión, el Señor la contará como justicia para él. Y aun si prospera, si no tiene compasión, el Señor lo destruirá.


    Porque en los días de hambre recordé la compasión del Señor, y di a todos el extranjero, el huérfano y la viuda. Y cuando tenía cuarenta años, tomé esposa, porque mi vida se había consumido en fatiga y trabajo, y porque por mi sencillez no tenía riquezas. Pues mi padre me había bendecido, diciendo: “Tus hijos serán como un refugio para los marineros, y como un puerto para las naves”.


    Y ahora, hijos míos, les ordeno: tengan compasión de todo hombre con misericordia, para que el Señor también tenga compasión de ustedes. Porque en los últimos días se apartarán del Señor, y provocarán a ira a Leví, y se levantarán contra Judá; pero no prevalecerán contra ellos, porque un ángel del Señor los guiará a ambos, ya que por ellos Israel se mantendrá.


    Y siempre que se aparten del Señor, caminarán en toda maldad y cometerán las abominaciones de las naciones, extraviándose tras las mujeres y siendo esclavos de toda maldad mientras los espíritus de engaño obran en ustedes. Porque he leído en el escrito de Enoc que también sus hijos serán corrompidos en los últimos días, y cometerán iniquidad contra los hijos de Leví, y pecarán contra Judá. Pero no podrán mantenerse contra ellos; porque de Leví el Señor levantará un sacerdote, y de Judá un rey, Dios y hombre. Él salvará a todas las naciones y a la raza de Israel.


    Y ahora les ordeno, hijos míos: obedezcan a Zebulún, su padre, y tengan misericordia de sus vecinos, y compasión de todos, no solo de los hombres, sino también del ganado. Por causa de esto el Señor me bendijo, y cuando todos mis hermanos estaban enfermos, yo permanecí sin enfermedad; porque el Señor conoce la intención de cada hombre.


    Tengan compasión, pues, en sus entrañas, hijos míos, porque del mismo modo que un hombre hace a su prójimo, así también el Señor le hará a él. Porque vi a los hijos de mis hermanos enfermar y morir, porque no tenían compasión; pero mis hijos fueron mantenidos ilesos, como ustedes saben. Porque en los días de Canaán no hice ganancia con una balanza de pesas, ni tuve en mi casa una medida doble, sino que todas mis posesiones se compartían con todos en sencillez de corazón. Y no recordé mal contra nadie. Hasta la edad avanzada guardé mi integridad en todo.


    También ustedes, pues, hijos míos, guarden la ley del Señor, y muestren misericordia a su prójimo, y traten con compasión a todos, no solo a los hombres sino también a los animales irracionales. Por esto también hallé misericordia con el Señor, y todos los hombres me bendijeron, y el Señor aumentó mis bienes mil veces. Porque el hombre compasivo hace bien a su propia alma.


    Sepan, pues, hijos míos, que en los últimos tiempos se apartarán del Señor, y estarán divididos en Israel, y seguirán dos males, y no serán hallados en la asamblea de los justos. Pero después de estas cosas el mismo Señor se levantará para ustedes, la luz de la justicia, y sanará y salvará a todos. Y traerá de vuelta a los cautivos de Beliar, y volverá los corazones desobedientes al Señor, y concederá paz eterna a los que lo invocan.


    Y los santos descansarán en Edén, y en la Nueva Jerusalén los justos se alegrarán, y será para la gloria de Dios para siempre. Y Jerusalén ya no soportará la desolación, ni Israel será llevado cautivo; porque el Señor estará en medio de ella, morando entre los hombres, y el Santo de Israel reinará sobre ellos en humildad y pobreza. Y quien cree en él reinará en verdad en los cielos.


    Y ahora, hijos míos, teman al Señor su Dios, y estén alerta contra Satanás y sus espíritus. Acérquense a Dios y al ángel que intercede por ustedes, porque él es mediador entre Dios y los hombres para la paz de Israel. Él se pondrá contra el reino del enemigo; por eso el enemigo desea destruir a todos los que invocan al Señor. Porque sabe que en el día en que Israel se arrepienta, el reino del enemigo llegará a su fin.


    Porque el mismo ángel de la paz fortalecerá a Israel, para que no caiga en la extrema maldad. Y en el tiempo de la iniquidad de Israel el Señor no los abandonará, sino que los transformará en una nación que haga su voluntad; porque ningún ángel es igual a él. Su nombre está en todo lugar en Israel y entre las naciones.


    Guárdense, pues, de toda mala acción, y echen fuera el odio y todo engaño, y ámense unos a otros en verdad y con paciencia. Y las cosas que he oído de mi padre, entréguelas a sus hijos, para que el Salvador de las naciones[a] los reciba; porque él es manso y humilde, y por su propio ejemplo enseña la ley de Dios.


    Huyan, por tanto, de toda injusticia, y aférrense a la justicia de la ley del Señor, y su descendencia será para siempre, y serán bendecidos en todas sus generaciones.


    Y después que les mandó estas cosas, extendió sus pies y murió en buena vejez. Y sus hijos lo pusieron en un ataúd. Más tarde lo llevaron a Hebrón y lo sepultaron con sus padres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego varía entre 'después de haber sido vendido' y 'después de haber sido arrojado al pozo'; aquí se sigue la lectura más amplia que preserva la escena completa.
    reason: textual_variant
  - marker: b
    text: Algunos testimonios incluyen a Dan entre los que Judá temía que pudieran matar a José; otros leen solo a Simeón y Gad.
    reason: textual_variant
lexical_decisions:
- source_word: σπλαγχνιζόμενος
  english_pob_choice: having compassion
  chosen_spanish: compadecido de
  alternatives_spanish:
  - teniendo compasión de
  - movido a compasión por
  lexicon: LSJ
  rationale: Mantiene el matiz visceral de compasión sin sonar rígido en español, y encaja con el tema recurrente de la misericordia en el capítulo.
- source_word: τηρεῖν
  english_pob_choice: guard
  chosen_spanish: custodiarlo
  alternatives_spanish:
  - vigilarlo
  - guardar
  lexicon: LSJ
  rationale: En el contexto del pozo y del peligro para José, 'custodiarlo' comunica vigilancia activa y protección.
- source_word: ἐπράθη
  english_pob_choice: was sold
  chosen_spanish: fue vendido
  alternatives_spanish:
  - fue comercializado
  - fue entregado
  lexicon: LSJ
  rationale: La venta es literal y concreta en la escena josefina; 'fue vendido' conserva esa fuerza.
- source_word: ἄσιτος
  english_pob_choice: while fasting
  chosen_spanish: mientras ayunaba
  alternatives_spanish:
  - sin comer
  - en ayuno
  lexicon: LSJ
  rationale: '''Ayunar'' expresa con naturalidad la privación voluntaria de comida en español, preservando el pathos del relato.'
- source_word: περιεσχίσατο
  english_pob_choice: tore his garments
  chosen_spanish: rasgó sus vestidos
  alternatives_spanish:
  - rasgó sus ropas
  - desgarró sus vestidos
  lexicon: LSJ
  rationale: Conserva el gesto tradicional de duelo con registro solemne y claro.
- source_word: Τρωγλοδύτων
  english_pob_choice: the Troglodytes
  chosen_spanish: los trogloditas
  alternatives_spanish:
  - los Trogloditas
  - cavernícolas
  lexicon: LSJ
  rationale: Se translitera el etnónimo reconocido en español, manteniendo la referencia cultural del texto griego.
- source_word: μολύνωμεν
  english_pob_choice: stain
  chosen_spanish: mancharemos
  alternatives_spanish:
  - contaminaremos
  - ensuciaremos
  lexicon: LSJ
  rationale: '''Manchar'' es concreto e idiomático para la túnica con sangre o suciedad, sin sobrecargar con un matiz teológico.'
- source_word: μετενόησαν
  english_pob_choice: repented
  chosen_spanish: se arrepintieron
  alternatives_spanish:
  - cambiaron de parecer
  - se lamentaron
  lexicon: LSJ
  rationale: En contexto de culpa por un pecado cometido, 'se arrepintieron' es la equivalencia española más fiel.
- source_word: ἁπλότης / ἁπλοῦς
  english_pob_choice: simplicity / simple
  chosen_spanish: sencillez / sencillo
  alternatives_spanish:
  - simplicidad / simple
  - llaneza / llano
  lexicon: LSJ
  rationale: '''Sencillez'' en español comunica mejor la idea de ausencia de doblez o artificio que ''simplicidad'', sin perder la temática ética del pasaje.'
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - misericordia y compasión
  - clemencia
  lexicon: LSJ
  rationale: Se usa 'misericordia' como término bíblico estable en español, complementando 'compasión' donde el griego distingue matices.
- source_word: λογιεῖται εἰς δικαιοσύνην
  english_pob_choice: will count it as righteousness
  chosen_spanish: la contará como justicia
  alternatives_spanish:
  - la contará como rectitud
  - la reputará por justicia
  lexicon: LSJ
  rationale: Preserva la metáfora contable y el sentido forense de δικαιοσύνη en el contexto moral del pasaje.
- source_word: ἀλλότριος
  english_pob_choice: stranger
  chosen_spanish: el extranjero
  alternatives_spanish:
  - el forastero
  - el foráneo
  lexicon: LSJ
  rationale: La tríada ética clásica queda clara y natural en español con 'extranjero'.
- source_word: λιμήν
  english_pob_choice: harbor
  chosen_spanish: puerto
  alternatives_spanish:
  - refugio
  - bahía
  lexicon: LSJ
  rationale: '''Puerto'' es la imagen náutica más directa y natural para el paralelo con las naves.'
- source_word: πνεύματα τῆς πλάνης
  english_pob_choice: spirits of deceit
  chosen_spanish: espíritus de engaño
  alternatives_spanish:
  - espíritus de error
  - espíritus engañadores
  lexicon: LSJ
  rationale: '''Engaño'' refleja bien la fuerza activa y moralmente negativa del genitivo.'
- source_word: ἱερέα
  english_pob_choice: a priest
  chosen_spanish: un sacerdote
  alternatives_spanish:
  - un sacerdote culto
  - un ministro
  lexicon: LSJ
  rationale: '''Sacerdote'' es la equivalencia estándar y más fiel en español para el oficio cultual.'
- source_word: βασιλέα
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - un soberano
  - un monarca
  lexicon: LSJ
  rationale: Mantiene el paralelismo priest-rey sin introducir matices ajenos.
- source_word: κτήνεσιν / ἀλόγοις
  english_pob_choice: cattle / irrational animals
  chosen_spanish: ganado / animales irracionales
  alternatives_spanish:
  - animales sin razón
  - bestias
  lexicon: LSJ
  rationale: Se conserva la ampliación ética a los animales, con un español claro y sobrio.
- source_word: ζυγὸς στάθμιων
  english_pob_choice: a balance of weights
  chosen_spanish: una balanza de pesas
  alternatives_spanish:
  - una balanza de pesos
  - unas balanzas
  lexicon: LSJ
  rationale: Expresa la honestidad comercial con imagen concreta y comprensible.
- source_word: δίμετρον
  english_pob_choice: a double measure
  chosen_spanish: una medida doble
  alternatives_spanish:
  - doble medida
  - medida duplicada
  lexicon: LSJ
  rationale: Conserva la literalidad del posible fraude comercial sin añadir interpretación excesiva.
- source_word: φῶς δικαιοσύνης
  english_pob_choice: the light of righteousness
  chosen_spanish: la luz de la justicia
  alternatives_spanish:
  - la luz de la rectitud
  lexicon: LSJ
  rationale: '''Justicia'' funciona bien en español para el simbolismo profético y mantiene el registro elevado.'
- source_word: Βελιάρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: LSJ
  rationale: Se conserva la forma griega atestiguada en el texto fuente, en lugar de normalizarla a la forma más conocida.
- source_word: μεσίτης
  english_pob_choice: mediator
  chosen_spanish: mediador
  alternatives_spanish:
  - intercesor
  - gozne
  lexicon: LSJ
  rationale: '''Mediador'' reproduce directamente la función entre Dios y los hombres.'
- source_word: ἄγγελος εἰρήνης
  english_pob_choice: angel of peace
  chosen_spanish: ángel de la paz
  alternatives_spanish:
  - mensajero de paz
  lexicon: LSJ
  rationale: '''Ángel de la paz'' es la forma más natural y fiel para la figura descrita.'
- source_word: σωτὴρ τῶν ἐθνῶν
  english_pob_choice: Savior of the nations
  chosen_spanish: Salvador de las naciones
  alternatives_spanish:
  - Salvador de los pueblos
  - libertador de las naciones
  lexicon: LSJ
  rationale: Preserva el alcance universal y el tono mesiánico elevado del texto.
theological_decisions:
- issue: 'Lectura mesiánica alta: ''de Leví... un sacerdote, y de Judá un rey, Dios y hombre'''
  english_pob_reading: Translated as it stands in the Greek witness without softening the high christological wording.
  chosen_spanish_reading: 'Se traduce tal como está en el testimonio griego: ''un sacerdote, y de Judá un rey, Dios y hombre''.'
  alternative_spanish_readings:
  - una figura real-sacerdotal
  - un rey y un sacerdote de Dios
  rationale: La transparencia textual exige no suavizar una formulación teológicamente intensa que está presente en el testimonio griego; cualquier discusión de interpolación queda para nota o aparato, no para la traducción principal.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: 'Lenguaje de confianza: ''Whoever believes in him'''
  english_pob_reading: Retained as personal trust directed toward the figure described in the passage.
  chosen_spanish_reading: Se mantiene como 'quien cree en él'.
  alternative_spanish_readings:
  - el que confía en él
  - quien cree en Dios
  rationale: La frase es explícita y debe representarse directamente; generalizarla a Dios o eliminarla borraría el alcance del testimonio.
  doctrine_reference: Primacía de la fuente original y transparencia frente a posibles expansiones.
- issue: Ángel mediador e intercesor
  english_pob_reading: Rendered distinctly from the Lord and from the messianic figure, as 'the angel who intercedes for you' and 'a mediator between God and men.'
  chosen_spanish_reading: Se distingue entre 'el ángel que intercede por ustedes' y 'mediador entre Dios y los hombres'.
  alternative_spanish_readings:
  - identificar al ángel con el Mesías
  - reducirlo a un ayudante celestial genérico
  rationale: El pasaje distingue estas figuras en secuencia; la traducción conserva esa distinción sin armonizarla artificialmente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Esta versión corrige el problema de validación anterior: todos los marcadores de nota incluidos en el texto ([a], [b]) aparecen exactamente en el español, sin notas huérfanas ni marcadores faltantes. También alinea el español con el testimonio griego y con el aparato auditado de la POB inglesa.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el testimonio fuente lo exige explícitamente; en este pasaje, la POB inglesa usa 'Lord', por lo que el español adopta 'el Señor' para reflejar la cadena textual del auditable inglés sin forzar el nombre divino donde no aparece en la forma griega citada.
  - '''Mesías'' no aparece en este pasaje; se conserva ''Salvador de las naciones'' y la alta cristología del texto donde el griego la presenta.'
  - Se prefirió 'compasión' y 'misericordia' con distinción contextual, siguiendo la red de términos éticos del capítulo.
  - '''Espíritus de engaño'' traduce el plural con fuerza activa, evitando aplanarlo a un mero error abstracto.'
  - '''Beliar'' conserva la forma del testimonio griego auditado, conforme a la preferencia documental del proyecto.'
