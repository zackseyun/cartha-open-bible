source:
  edition: Charles 1908 Greek Versions (pages 187-201, Zebulun source-fix v2)
  text: '8. *Ἤκουσαν γὰρ ὅσα ἐνεδείξαντο αὐτῷ κακά⁵⁰. IV. Μετὰ δὲ τὸ †πραθῆναι¹ αὐτὸν ἐκάθησαν οἱ ἀδελφοί μου² ἐσθίειν καὶ πίνειν. 2. Ἐγὼ δὲ σπλαγχνιζόμενος τὸν Ἰωσὴφ *οὐκ ἔφαγον³, προσέχων⁴ δὲ τῷ λάκκῳ, ἐπειδὴ⁵ ἐφοβεῖτο⁶ Ἰούδας μήπως ἀποπηδήσαντες⁷ Συμεὼν καὶ ὁ Δὰν καὶ ὁ Γὰδ ἀνέλωσιν αὐτόν. 3. Ὁρῶντές με δὲ μὴ⁸ ἐσθίοντα ἔθετό με⁹ τηρεῖν αὐτὸν ἕως οὗ ἀπεδόθη *τοῖς Ἰσμαηλίταις¹⁰. 4. (α-text omits this verse; β-text reads: ἐποίησε δὲ ἐν τῷ λάκκῳ τρεῖς ἡμέρας καὶ τρεῖς νύκτας καὶ οὕτως ἐπράθη ἄσιτος.) 5. Ἐλθὼν δὲ Ῥουβὶμ καὶ ἀκούσας ὅτι ἐπράθη⁹ ἀπόντος *αὐτοῦ περιεσχίσατο¹¹ τὸν χιτῶνα αὐτοῦ θρηνῶν ἔλεγεν¹². Πῶς ὄψωμαι²⁴ τὸ πρόσωπον τοῦ πατρός μου Ἰακώβ; 6. Καὶ λαβὼν τὸ ἀργύριον κατέδραμεν ὀπίσω τοῖς ἐμπόροις· μὴ εὑρὼν δὲ αὐτοὺς ὑπέστρεψεν ὀδυρόμενος²⁵. καταλιπόντες²⁶ δὲ οἱ ἔμποροι τὴν πλατεῖαν ὁδὸν διόδευσαν²⁷ διὰ *Τρωγλοδιτῶν ἐν συντόμῳ²⁸. 7. ⌈Ἦν δὲ ὁ Ῥουβὶμ λυπούμενος⌉⁴⁴, καὶ οὐκ ἔφαγεν⁴⁵ ⌈ἄρτον⌉ *ἐν ἐκείνῃ τῇ ἡμέρᾳ⁴⁶. *προσελθὼν οὖν ὁ Δὰν εἶπεν αὐτῷ⁴⁷. 8. Μὴ κλαῖε μηδὲ λυποῦ⁴⁸· εὕρομεν⁴⁹
    γὰρ τί εἴπωμεν⁵⁰ τῷ πατρὶ ἡμῶν⁵¹. 9. Θύσωμεν ⌈μαχαίρᾳ⌉⁵² *χίμαρρον αἰγῶν⁵³ καὶ μολύνωμεν⁵⁴ τὸν χιτῶνα Ἰωσήφ, καὶ *ἀποστείλωμεν αὐτὸν τῷ Ἰακὼβ λέγοντες⁵⁵. Ἐπίγνωθι, ὁ⁵⁶ *χιτὼν τοῦ υἱοῦ σου ἐστίν⁵⁷; *καὶ ἐποίησαν οὕτως⁵⁸.'
