  text: Διαθήκη Ἀσὴρ τοῦ δεκάτου υἱοῦ Ἰακὼβ καὶ Ζέλφας¹. I. Ἀντίγραφον διαθήκης Ἀσήρ², ἃ³ ἐλάλησε τοῖς υἱοῖς αὐτοῦ *ἐν ἑκατοστῷ εἰκοστῷ πέμπτῳ ἔτει τῆς⁴ *ζωῆς αὐτοῦ⁵. 2. *Ὑγιαίνων ⌜γὰρ⌝⁶ *εἶπε πρὸς αὐτούς⁷. Ἀκούσατε, τέκνα⁸ Ἀσήρ, τοῦ πατρὸς ὑμῶν, καὶ⁹ πᾶν τὸ εὐθὲς¹⁰ ἐνώπιον *τοῦ Θεοῦ¹¹ ὑποδείξω¹² ὑμῖν¹³. 3. Δύο ὁδοὺς *ἔδωκεν ὁ Θεὸς τοῖς υἱοῖς τῶν ἀνθρώπων¹⁴, καὶ δύο διαβούλια, ⌜καὶ δύο πράξεις, *καὶ δύο τρόπους¹⁵⌝, *καὶ ⌜δύο⌝ τέλεα¹⁶. 4. Διὰ τοῦτο πάντα¹⁷ δύο¹⁸ εἰσίν¹⁹, ἐν κατέναντι τοῦ ἑνός. 5. Ὁδοὶ *⌜γὰρ⌝ εἰσὶ²⁰ δύο, καλοῦ καὶ κακοῦ· ἐν οἷς²¹ εἰσι τὰ δύο²² διαβούλια ἐν στέρνοις²³ ἡμῶν²⁴ *διακρίνοντα αὐτά²⁵. 6. Ἐὰν οὖν²⁶ ἡ ψυχὴ θέλει²⁷ *†καλῶς πορευθῆναι†, πάσας τὰς πράξεις αὐτῆς ποιεῖ²⁸ ἐν δικαιοσύνῃ, *κἂν ἁμάρτῃ²⁹ εὐθὺς³⁰ μετανοεῖ. 7. Δίκαια *γὰρ λογιζομένη³¹ καὶ ἀπορρίπτουσα³² τὴν πονηρίαν ἀνατρέπει εὐθὺς τὸ κακόν³³, καὶ³⁴ ἐκριζοῖ³⁵ τὴν ἁμαρτίαν. 8. Ἐὰν δὲ *ἐν †πονηρᾷ³⁶ κλίνῃ³⁷ †τὸ διαβούλιον†³⁸, *πᾶσα πρᾶξις αὐτῆς ἐστιν³⁹ ἐν πονηρίᾳ, καὶ⁴⁰ ἀπωθουμένη⁴¹ τὸ ἀγαθόν, *καὶ προσκολλώμενος⁴²
    τὸ κακόν, καὶ κυριευθεὶς⁴³ ὑπὸ⁴⁴ τοῦ Βελίαρ· κἂν⁴⁵ ἀγαθὸν⁴⁶ πράξει⁴⁷, Γἐν πονηρίᾳ⁴⁸ αὐτὸ⁴⁹ μεταστρέφει⁵⁰˥. 9. *Ὅτε γὰρ⁵¹ ἄρξεται⁵² *τὸ ἀγαθὸν ποιεῖν⁵³, τὸ τέλος τῆς πράξεως *εἰς πονηρὸν αὐτῷ ἐλαύνει⁵⁴. ἐπειδὴ ὁ⁵⁵ θησαυρὸς⁵⁶ τοῦ διαβουλίου⁵⁷ πονηροῦ⁵⁸ πνεύματος πεπλήρωται⁵⁹.
