base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/001.yaml
  text: '1[1]. The copy of the testament of Asher.


    2. In the one hundred and twenty-fifth year of his life, while still healthy, he said to them, “Hear, children of Asher, your father, and I will show you everything upright before God.


    3. God has given two ways to the sons of men, and two purposes, and two actions, and two modes, and two ends.


    4. Therefore all things are twofold[2], one over against the other.


    5. For there are two ways, of good and of evil; and in them are the two purposes in our breasts, distinguishing them.


    6. If, then, the soul desires to walk well, it does all its deeds in righteousness; and even if it sins, it immediately repents.


    7. For by thinking righteous thoughts and casting away wickedness, it at once overturns evil and uproots sin.


    8. But if its purpose inclines to evil, all its deeds are in wickedness, driving away the good and clinging to the evil, and being ruled by Beliar; and even if it does something good, it turns it into evil.


    9. For whenever it begins to do good in an evil way, the end of the action drives him into evil, because the treasure of its purpose is filled with an evil spirit.


    10. My children, obey your father, and bury me near my fathers.”


    11. And after he had drawn up his feet, he fell asleep in peace.


    12. And after five years they carried him up to Hebron[3], and placed him with his fathers.'
  footnotes:
  - marker: '1'
    text: Verse 1 in the source begins with a superscription, 'The copy of the testament of Asher.'
    reason: textual_variant
  - marker: '2'
    text: The chapter order in the source places Asher's ethical discourse before the brief burial notice; the final burial commands and death report are translated here as part of the same chapter unit.
    reason: textual_variant
  - marker: '3'
    text: '''Breasts'' renders the concrete Greek term for the chest as the seat of inward deliberation; ''hearts'' would be a smoother but less literal alternative.'
    reason: lexical_alternative
