translation:
  language: es
  text: '1[a]. Copia del testamento de Aser.


    2. En el año ciento veinticinco de su vida, estando aún sano, les dijo: «Escuchen, hijos de Aser, su padre, y les mostraré todo lo que es recto delante de Dios.


    3. Dios dio dos caminos a los hijos de los hombres, y dos propósitos, y dos acciones, y dos modos, y dos fines.


    4. Por eso todas las cosas son dobles[b], la una frente a la otra.


    5. Pues hay dos caminos, el del bien y el del mal; y en ellos están los dos propósitos en nuestros pechos[c], que los distinguen.


    6. Si, pues, el alma quiere caminar bien, realiza todas sus acciones en justicia; y aun si peca, inmediatamente se arrepiente.


    7. Pues al considerar lo justo y desechar la maldad, al instante derrumba el mal y desarraiga el pecado.


    8. Pero si la intención se inclina al mal, todas sus acciones están en maldad, rechazando lo bueno y aferrándose a lo malo, y dominada por Beliar; y aunque haga algo bueno, lo convierte en maldad.


    9. Pues siempre que comienza a hacer el bien, el fin de la acción lo empuja hacia el mal, porque el tesoro de su propósito está lleno de un espíritu maligno.


    10. Hijos míos, obedezcan a su padre, y entiérrenme cerca de mis padres».


    11. Y después de haber recogido sus pies, se durmió en paz.


    12. Y después de cinco años lo subieron a Hebrón, y lo colocaron con sus padres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El versículo 1 en la fuente comienza con un encabezado: ''Copia del testamento de Aser.'''
    reason: textual_variant
  - marker: b
    text: Lit. 'son dos', en sentido distributivo de pares opuestos.
    reason: lexical_alternative
  - marker: c
    text: '''Pechos'' traduce el término griego concreto στέρνοις, sede de la deliberación interior; ''corazones'' sería una alternativa más fluida pero menos literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑγιαίνων
  english_pob_choice: while still healthy
  chosen_spanish: estando aún sano
  alternatives_spanish:
  - gozando de salud
  - sano todavía
  lexicon: LSJ
  rationale: Participio circunstancial; 'estando aún sano' es natural y conserva el matiz narrativo de que aún no flaqueaba físicamente.
- source_word: εὐθές
  english_pob_choice: upright
  chosen_spanish: recto
  alternatives_spanish:
  - derecho
  - justo
  lexicon: LSJ
  rationale: En exhortación ética, 'recto' transmite la rectitud moral delante de Dios sin sonar forzado.
- source_word: διαβούλια
  english_pob_choice: purposes
  chosen_spanish: propósitos
  alternatives_spanish:
  - designios
  - intenciones
  - consejos
  lexicon: LSJ
  rationale: El capítulo contrasta orientaciones morales internas; 'propósitos' capta mejor la intencionalidad deliberativa que 'planes'.
- source_word: τρόπους
  english_pob_choice: modes
  chosen_spanish: modos
  alternatives_spanish:
  - maneras
  - formas
  lexicon: LSJ
  rationale: Como ὁδοί ya se traduce 'caminos', 'modos' evita aplanar la lista y conserva la acumulación retórica de pares.
- source_word: τέλεα
  english_pob_choice: ends
  chosen_spanish: finales
  alternatives_spanish:
  - fines
  - consumaciones
  - desenlaces
  lexicon: LSJ
  rationale: El sentido es el resultado o consumación final de un curso; 'finales' encaja con el contraste ético y se distingue de 'fines' como meta.
- source_word: στέρνοις
  english_pob_choice: breasts
  chosen_spanish: pechos
  alternatives_spanish:
  - corazones
  - el pecho
  lexicon: LSJ
  rationale: El griego es corporal y concreto; 'pechos' conserva la textura antropológica mejor que 'corazones'.
- source_word: διακρίνοντα
  english_pob_choice: distinguishing
  chosen_spanish: que los distinguen
  alternatives_spanish:
  - discerniendo
  - que separan
  lexicon: LSJ
  rationale: El participio describe la función interna de los dos propósitos respecto a los dos caminos; 'distinguir' es la traducción más clara.
- source_word: πορευθῆναι (καλῶς)
  english_pob_choice: to walk well
  chosen_spanish: andar bien
  alternatives_spanish:
  - caminar rectamente
  - conducirse bien
  lexicon: LSJ
  rationale: '''Andar'' conserva el idiom ético bíblico mejor que una abstracción aplanada.'
- source_word: ἐν δικαιοσύνῃ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - justamente
  - en rectitud
  lexicon: BDAG
  rationale: Coherente con la regla del proyecto para δικαιοσύνη y adecuado al lenguaje de conducta moral.
- source_word: μετανοεῖ
  english_pob_choice: repents
  chosen_spanish: se arrepiente
  alternatives_spanish:
  - cambia de mente
  - se vuelve atrás
  lexicon: BDAG
  rationale: Aquí el contexto es pecado específico y reversión moral inmediata; encaja con la regla del proyecto de traducir μετανοέω como 'arrepentirse' en contextos de pecado puntual.
- source_word: ἀνατρέπει
  english_pob_choice: overturns
  chosen_spanish: derriba
  alternatives_spanish:
  - destruye
  - echa abajo
  lexicon: LSJ
  rationale: Verbo fuerte que conserva la imaginería moral enérgica del capítulo.
- source_word: ἐκριζοῖ
  english_pob_choice: uproots
  chosen_spanish: desarraiga
  alternatives_spanish:
  - arranca de raíz
  - erradica
  lexicon: LSJ
  rationale: Conserva la metáfora agraria y forma pareja con 'derribar'.
- source_word: κυριευθεὶς ὑπὸ τοῦ Βελίαρ
  english_pob_choice: ruled by Beliar
  chosen_spanish: siendo dominada por Beliar
  alternatives_spanish:
  - sometida a Beliar
  - bajo el señorío de Beliar
  lexicon: LSJ
  rationale: κυριεύω denota dominación; 'dominada por' es claro y de peso. El nombre propio se transcribe.
- source_word: 'Χριστός/μετάνοια note: μετανοεῖ'
  english_pob_choice: repents
  chosen_spanish: se arrepiente
  lexicon: BDAG
  rationale: Conserva consistencia con glosario POB-ES.
- source_word: ἐκοιμήθη ἐν εἰρήνῃ
  english_pob_choice: fell asleep in peace
  chosen_spanish: se durmió en paz
  alternatives_spanish:
  - murió en paz
  - descansó en paz
  lexicon: LSJ
  rationale: Fórmula testamentaria de muerte; 'se durmió' conserva el eufemismo digno.
theological_decisions:
- issue: Dualismo moral en la exhortación de apertura
  chosen_reading: Traducir el lenguaje repetido de 'dos' de forma directa como contraste ético de dos caminos y dos propósitos internos, sin suavizarlo a mera complejidad psicológica.
  alternative_readings:
  - Interpretar como dualismo metafísico absoluto
  - Reducir a un contraste genérico entre buenas y malas decisiones
  rationale: El griego subraya pares opuestos en la vida moral humana y la deliberación interior. La traducción conserva la antítesis sin importar un dualismo cosmológico pleno.
  doctrine_reference: Conservar la tensión teológica antes que resolverla.
- issue: Βελίαρ
  chosen_reading: Beliar como nombre personal propio
  alternative_readings:
  - Belial
  - iniquidad personificada
  rationale: El testimonio griego presenta Βελίαρ funcionando aquí como el poder maligno dominante. La transliteración conserva la forma textual y evita reducción interpretativa.
  doctrine_reference: Traducir honestamente lo que está en el testimonio griego.
translation_notes:
  revision_awareness: 'El POB inglés pasó por una revisión que ajustó ''kinds of action'' a ''actions'', ''outcomes'' a ''ends'' y ''is ruled'' a ''being ruled''. La versión española sigue el texto revisado: ''acciones'', ''finales'', ''siendo dominada''.'
  spanish_consistency_notes:
  - μετανοεῖ → 'se arrepiente' (regla glosario)
  - Βελίαρ → 'Beliar' (transliteración)
  - δικαιοσύνη → 'justicia'
  - ὁδοί → 'caminos' (no 'sendas')
  - διαβούλια → 'propósitos' uniforme en todo el capítulo
