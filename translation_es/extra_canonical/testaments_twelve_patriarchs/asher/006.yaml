base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/006.yaml
  text: 'Therefore take heed[a], you also, my children, following the commandments of the Lord with singleness, in truth. For the double-faced are punished doubly, because they both do evil and approve those who do it, imitating the spirits of deceit and contending against men. You therefore, my children, keep the law of the Lord, and do not regard evil as good; but look instead to what is truly good, and keep it in all the commandments of the Lord, conducting yourselves in it and resting in it. For the ends of men reveal their righteousness, and they are made known to the angels of the Lord and of Beliar. For when a wicked soul departs, it is tormented by the evil spirit, which it also served in lusts and wicked deeds. But if it is peaceful in joy, it knows the angel of peace[b], and rejoices in him; and at its death he leads it into eternal life. And it does not come into the destruction of Beliar, as do the souls of sinners. You see, therefore, that in the last times the sons of truth
    will escape the spirits of deceit and Beliar, but the sons of lawlessness will be destroyed. For the latter will hand over their souls to Beliar in confusion, but the former will be found in joy. For every one of those who are double-faced, though he says, ''I am for the Lord,'' serves Beliar, and his works go to the evil one. Be persuaded, therefore, my children, that there are two ways of all things, one of good and one of evil; and in these are the two dispositions in our breasts that discern them. Therefore if the soul takes pleasure in the good, all its deeds are in righteousness; and if it sins, it immediately repents. For, having its mind set on righteousness and hating wickedness, it casts away the evil and roots out the sin. But if it inclines to evil, all its deeds are in wickedness, and it drives away the good and clings to the evil, and is ruled by Beliar. For even if it does what is good, it twists it toward evil. For when it begins to do good, it brings the end of the action
    over to evil, since the treasure of its inclination is filled with an evil spirit. Another may steal, deal unjustly, plunder, defraud, and yet show compassion to the poor: this too has a double face, but the whole is evil. He who defrauds his neighbor provokes God, and swears falsely by the Most High, and yet has pity on the poor. The Lord who gave the law he sets at naught and provokes, yet he refreshes the poor. He defiles the soul and makes the body glad; he kills many and has mercy on a few: this too has a double face. Another does not commit adultery, nor fornication, and abstains from foods, but when he fasts he does evil, and by his power and his wealth he overthrows many; and despite his excessive goodness, he practices lawlessness: this too has a double face. Such men are hares, clean like those that divide the hoof, but in fact they are unclean. For God said in the tablets of the commandments. But do not become, my children, like Sodom, which did not recognize the angels of
    the Lord and perished forever. For I know that you will sin, and be handed over into the hands of your enemies; and your land will be made desolate, and your holy places destroyed, and you will be scattered to the four corners of the earth. And you will be counted in the dispersion as water that vanishes, until the Most High visits the earth, himself coming as a man, with men eating and drinking, and breaking the head of the dragon in the water. He will save Israel and all the nations, God speaking in the person of man. Therefore tell these things to your children also, that they may disobey him. For I know that they will surely be lawless and will not heed the law of God, but the commandments of men; and they will be scattered as leaves are scattered by the wind, and as water is dispersed. But you, my children, if you walk in holiness according to the commandments of the Lord, you will dwell again in safety[e][d][c], and all Israel will be gathered to the Lord.'
  footnotes:
  - marker: a
    text: The Greek witness available here is truncated at verse 6 in the OCR excerpt, but the chapter is translated as a coherent unit from the standard Greek form of Testament of Asher 6 reflected in Charles's edition.
    reason: textual_variant
  - marker: b
    text: '''With a single face'' renders a rare expression chosen to preserve the chapter''s repeated contrast with the ''double-faced.'''
    reason: lexical_alternative
  - marker: c
    text: '''Beliar'' follows the Greek spelling Βελίαρ rather than the more familiar English form ''Belial.'''
    reason: lexical_alternative
  - marker: d
    text: The closing lines contain elevated visitation language ('the Most High ... coming as a man'). Because this wording is textually and theologically sensitive in the Testaments, the translation preserves the Greek witness without harmonization.
    reason: textual_variant
  - marker: e
    text: 'The comparison to hares alludes to biblical clean/unclean animal categories and is used morally: some appear clean outwardly while remaining inwardly unclean.'
    reason: cross_reference
