translation:
  language: es
  text: 'Por tanto, presten atención[a] también ustedes, hijos míos, siguiendo los mandamientos de Yahvé con un solo propósito, en la verdad. Pues los de doble rostro son castigados doblemente, porque a la vez practican el mal y aprueban a los que lo practican, imitando los espíritus del engaño y luchando contra los hombres. Ustedes, pues, hijos míos, guarden la ley de Yahvé, y no presten atención al mal como si fuera bien; sino pongan la vista en lo que es verdaderamente bueno, y manténganlo en todos los mandamientos de Yahvé, volviéndose hacia ello y reposando en ello. Pues los fines de los hombres revelan su rectitud, y son dados a conocer a los ángeles de Yahvé y de Beliar. Pues cuando el alma malvada se aparta, es atormentada por el espíritu maligno, el cual también la esclavizó en deseos y en obras perversas. Pero si está tranquila en gozo, reconoce al ángel de la paz[b], y se regocija en él; y a su muerte él la conduce a la vida eterna. Y no entra en la destrucción de
    Beliar[c], como sí lo hacen las almas de los pecadores. Ven, pues, que en los últimos tiempos los hijos de la verdad escaparán de los espíritus del engaño y de Beliar, pero los hijos de la iniquidad serán destruidos. Pues estos entregarán sus almas a Beliar en confusión, mas aquellos serán hallados en gozo. Pues cada uno de los que son de doble rostro, aunque diga: «Yo soy del Señor», sirve a Beliar, y sus obras van al maligno. Estén persuadidos, pues, hijos míos, de que hay dos caminos en todas las cosas, uno del bien y otro del mal; y en ellos están las dos disposiciones en nuestros pechos, que las disciernen. Por tanto, si el alma se complace en el bien, todas sus obras están en rectitud; y si peca, al instante se arrepiente. Pues, teniendo su mente puesta en la rectitud y odiando la maldad, desecha el mal y desarraiga el pecado. Pero si se inclina al mal, todas sus obras están en maldad, y aparta lo bueno y se aferra a lo malo, y es dominada por Beliar. Pues aunque haga lo bueno,
    lo tuerce hacia el mal. Pues cuando comienza a hacer el bien, lleva el fin de la acción al mal, porque el tesoro de su inclinación está lleno de un espíritu malo. Otro puede robar, obrar con injusticia, despojar, defraudar, y sin embargo mostrar compasión a los pobres: esto también tiene doble rostro, pero el conjunto es maldad. El que defrauda a su prójimo provoca a Dios, y jura en falso por el Altísimo, y sin embargo se compadece del pobre. Al Señor que dio la ley lo desestima y lo provoca, y sin embargo da reposo al pobre. Mancha el alma y alegra el cuerpo; mata a muchos y se apiada de unos pocos: esto también tiene doble rostro. Otro no comete adulterio, ni fornicación, y se abstiene de alimentos, pero cuando ayuna obra el mal, y por su poder y su riqueza derriba a muchos; y a pesar de su excesiva bondad, practica la iniquidad: esto también tiene doble rostro. Tales hombres son liebres[e], limpios como los que tienen pezuña hendida, pero en realidad son inmundos. Pues Dios habló
    en las tablas de los mandamientos. Pero no se hagan, hijos míos, como Sodoma, que no reconoció a los ángeles de Yahvé y pereció para siempre. Pues sé que pecarán, y serán entregados en manos de sus enemigos; y su tierra será asolada, y sus lugares santos destruidos, y serán dispersados a los cuatro confines de la tierra. Y serán contados en la dispersión como agua que se desvanece, hasta que el Altísimo visite la tierra, viniendo él mismo como hombre[d], comiendo y bebiendo con los hombres, y aplastando la cabeza del dragón en el agua. Él salvará a Israel y a todas las naciones, hablando Dios en la persona del hombre. Por tanto, digan también estas cosas a sus hijos, para que no lo desobedezcan. Pues sé que ciertamente serán inicuos y no atenderán a la ley de Dios, sino a los mandamientos de los hombres; y serán dispersados como hojas dispersadas por el viento, y como agua derramada. Pero ustedes, hijos míos, si andan en santidad según los mandamientos de Yahvé, habitarán de nuevo en
    seguridad, y todo Israel será reunido al Señor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego disponible aquí está truncado en el versículo 6 del extracto OCR, pero el capítulo se traduce como unidad coherente desde la forma griega estándar del Testamento de Aser 6 reflejada en la edición de Charles.
    reason: textual_variant
  - marker: b
    text: 'El «ángel de la paz» es figura reconocida en los Testamentos: el ser angélico que recibe al alma justa y la introduce en la vida eterna, contrastando con Beliar.'
    reason: cultural_note
  - marker: c
    text: «Beliar» sigue la grafía griega Βελίαρ en lugar de la forma más familiar «Belial».
    reason: lexical_alternative
  - marker: d
    text: Las líneas finales contienen lenguaje elevado de visitación («el Altísimo... viniendo como hombre»). Por ser textual y teológicamente delicado en los Testamentos, la traducción conserva el testimonio griego sin armonización.
    reason: textual_variant
  - marker: e
    text: 'La comparación con las liebres alude a las categorías bíblicas de animales puros/impuros y se usa moralmente: algunos parecen limpios por fuera mientras permanecen interiormente inmundos.'
    reason: cross_reference
lexical_decisions:
- source_word: μονοπροσώπως
  english_pob_choice: with singleness
  chosen_spanish: con singularidad
  alternatives_spanish:
  - con un solo rostro
  - sin doblez
  lexicon: LSJ
  rationale: Conserva el contraste con διπρόσωποι ('de doble cara'). 'Singularidad' aquí evoca unidad/integridad de propósito; sigue la revisión POB de 'with singleness'.
- source_word: διπρόσωποι
  english_pob_choice: double-faced
  chosen_spanish: de doble cara
  alternatives_spanish:
  - de dos caras
  - duplicitarios
  lexicon: LSJ
  rationale: Conserva la imagen concreta que estructura el capítulo y la consistencia con μονοπροσώπως.
- source_word: συνευδοκοῦσι
  english_pob_choice: approve
  chosen_spanish: aprueban
  alternatives_spanish:
  - consienten
  - se complacen
  lexicon: BDAG
  rationale: Transmite con claridad la complicidad moral con el mal ajeno y encaja en el tono parenético.
- source_word: πνεύματα τῆς πλάνης
  english_pob_choice: spirits of deceit
  chosen_spanish: espíritus del engaño
  alternatives_spanish:
  - espíritus del error
  - espíritus engañadores
  lexicon: LSJ
  rationale: πλάνη es engaño moral/religioso, no mero error; encaja con la advertencia ética.
- source_word: ἀποβλέπετε
  english_pob_choice: look instead to
  chosen_spanish: mirad más bien
  alternatives_spanish:
  - fijad la mirada en
  - mirad hacia
  lexicon: LSJ
  rationale: Conserva el enfoque direccional moral del verbo y suena natural.
- source_word: τὸ ὄντως καλόν
  english_pob_choice: what is truly good
  chosen_spanish: lo que es verdaderamente bueno
  alternatives_spanish:
  - el bien genuino
  - el bien en verdad
  lexicon: LSJ
  rationale: Expresa el contraste con un bien aparente que en realidad es mal.
- source_word: τὰ τέλη τῶν ἀνθρώπων
  english_pob_choice: the ends of men
  chosen_spanish: los desenlaces de los hombres
  alternatives_spanish:
  - los fines de los hombres
  - el final de los hombres
  lexicon: LSJ
  rationale: 'Permite ambos sentidos presentes en literatura testamentaria: desenlace vital y muerte/final. El contexto sobre las almas que parten apoya este sentido escatológico amplio.'
- source_word: γνωρίζονται
  english_pob_choice: are made known
  chosen_spanish: se hacen conocidos
  alternatives_spanish:
  - son conocidos
  - son reconocidos
  lexicon: BDAG
  rationale: Sentido pasivo que encaja con la revelación del estado verdadero de la persona ante los poderes angélicos.
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: tradición textual griega
  rationale: El texto griego dice Βελίαρ; la transliteración debe seguir el testimonio en lugar de normalizar al hebreo 'Belial'.
- source_word: ἐπιθυμίαις
  english_pob_choice: lusts
  chosen_spanish: pasiones
  alternatives_spanish:
  - concupiscencias
  - deseos
  - lujurias
  lexicon: BDAG
  rationale: El contexto es esclavitud moral a obras malas. 'Pasiones' en español preserva la fuerza de catálogo de vicios mejor que 'deseos' (más amplio); 'concupiscencias' es preciso pero suena anticuado.
- source_word: ἥσυχος
  english_pob_choice: peaceful
  chosen_spanish: apacible
  alternatives_spanish:
  - en sosiego
  - tranquila
  lexicon: LSJ
  rationale: En contexto de muerte y paz angélica, 'apacible' transmite tranquilidad interior con dignidad.
- source_word: ἄγγελον εἰρήνης
  english_pob_choice: the angel of peace
  chosen_spanish: el ángel de la paz
  alternatives_spanish:
  - un ángel de paz
  lexicon: LSJ
  rationale: La especificidad del contexto sugiere figura reconocida; 'el ángel de la paz' lo conserva.
- source_word: διαθέσεις
  english_pob_choice: dispositions
  chosen_spanish: disposiciones
  alternatives_spanish:
  - inclinaciones
  - talantes
  lexicon: LSJ
  rationale: Comunica una orientación moral duradera, no una emoción pasajera.
- source_word: θησαυρός
  english_pob_choice: treasure
  chosen_spanish: tesoro
  alternatives_spanish:
  - depósito
  - almacén
  lexicon: LSJ
  rationale: Conserva la metáfora de un acopio interior moral del cual proceden las acciones.
- source_word: λαγώοι/δασύποδες
  english_pob_choice: hares
  chosen_spanish: liebres
  alternatives_spanish:
  - conejos
  lexicon: LSJ
  rationale: Encaja con la alusión probable a las leyes alimentarias levíticas y la identificación convencional.
- source_word: διασπορά
  english_pob_choice: the dispersion
  chosen_spanish: la dispersión
  alternatives_spanish:
  - el exilio
  - la diáspora
  lexicon: LSJ
  rationale: Conserva el sentido técnico exílico y permanece comprensible; 'dispersión' también recuerda al sustantivo griego.
- source_word: ἐπισκέψηται
  english_pob_choice: visits
  chosen_spanish: visite
  alternatives_spanish:
  - intervenga
  - venga en ayuda
  lexicon: BDAG
  rationale: Conserva el sentido bíblico de visitación divina sin sobreinterpretar el modo de ayuda.
- source_word: ὡς ὕδωρ ἀφανιζόμενον
  english_pob_choice: as water that vanishes
  chosen_spanish: como agua que se desvanece
  alternatives_spanish:
  - como agua que desaparece
  - como agua derramada
  lexicon: LSJ
  rationale: Conserva la imagen de evanescencia y pérdida en el exilio.
theological_decisions:
- issue: Lenguaje mesiánico/de visitación divina en la profecía de cierre
  chosen_reading: 'Traducir el griego directamente: ''hasta que el Altísimo visite la tierra, viniendo él mismo como hombre ... Él salvará a Israel y a todas las naciones, hablando Dios en la persona del hombre.'''
  alternative_readings:
  - Una armonización cristiana más explícita del lenguaje de encarnación
  - Una reducción a un mero agente humano enviado por Dios
  rationale: El testimonio griego contiene lenguaje elevado de visitación que puede reflejar expansión o interpretación posterior. Conforme a la filosofía del proyecto, el texto se traduce honestamente sin armonizar ni suprimir su tensión.
  doctrine_reference: Conservar la tensión teológica antes que resolverla.
- issue: Beliar como poder maligno personal
  chosen_reading: Conservar 'Beliar' como poder personal opositor que domina, destruye y recibe almas.
  alternative_readings:
  - Una traducción generalizada como 'maldad' o 'el maligno' en todo el texto
  rationale: El capítulo personifica a Beliar de forma distinta a los espíritus malignos genéricos; aplanar el nombre a una abstracción borraría el marco demonológico del texto fuente.
translation_notes:
  revision_awareness: 'El POB inglés fue revisado para mayor precisión léxica: ''with a single face'' → ''with singleness''; ''attend to evil as though it were good'' → ''regard evil as good''; ''preserve it'' → ''keep it''. La versión española sigue el texto revisado: ''con singularidad'', ''consideréis el mal como bien'', ''guardadlo''.'
  spanish_consistency_notes:
  - Βελίαρ → 'Beliar' uniforme
  - διπρόσωπος → 'de doble cara'
  - ψυχή → 'alma'
  - ζωή αἰώνιος → 'vida eterna'
  - ἐντολαί → 'mandamientos'
  - νόμος → 'ley'
  - δικαιοσύνη → 'justicia'
  - ἐπιθυμίαι → 'pasiones' aquí (registro testamentario)
