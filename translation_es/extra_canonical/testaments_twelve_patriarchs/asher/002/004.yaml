base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/002/004.yaml
  text: Even if they are in love, they are in wickedness, hiding evil under a good name; but the end of the deed comes to evil.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:51Z'
    unchanged: false
    changes_summary: Adjusted the middle clause to more directly reflect the Greek participial construction ('hiding evil under a good name') and improved flow with punctuation. Retained the overall sense and formal register.
translation:
  language: es
  text: Aun siendo amor,[a] está en maldad el que oculta el mal bajo nombre bueno;[b] pero el fin de la acción llega al mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La primera cláusula del verso griego está marcada con óbelos (†...†) en la edición de Charles (1908), señal de dificultad textual. La frase ἀγάπη οὖσα («siendo amor») se interpreta aquí concessivamente: «aun cuando se presenta como amor» o «incluso siendo amor en apariencia.» El sujeto gramatical explícito del verbo principal es ὁ συγκρύπτων («el que oculta»), no un sujeto plural como sugiere la formulación inglesa del POB («they are in love / they are in wickedness»).'
    reason: textual_variant
  - marker: b
    text: 'La preposición griega ὑπέρ tiene normalmente el sentido de «sobre», «encima de» o «en nombre de»; su uso aquí es inusual. La traducción sigue la lectura interpretativa de «bajo la cobertura de un buen nombre» (inglés POB: «under a good name»), posiblemente reflejando un sustrato semítico en el texto. Alternativa: «detrás de un buen nombre».'
    reason: textual_variant
lexical_decisions:
- source_word: ἀγάπη οὖσα
  english_pob_choice: in love (they are in love)
  chosen_spanish: siendo amor
  alternatives_spanish:
  - estando en amor
  - amándose
  - aun habiendo amor
  lexicon: BDAG
  rationale: ἀγάπη οὖσα is a nominative participial phrase meaning 'being love' or 'while being love.' The English POB supplies a plural subject ('they are in love') that is not explicit in the Greek. Spanish 'aun siendo amor' preserves the participial concessive structure without requiring a supplied plural, allowing ὁ συγκρύπτων to function naturally as the main grammatical subject of the clause — more faithful to the Greek syntax as clarified in the English revision pass.
- source_word: πονηρίᾳ
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - perversidad
  - iniquidad
  - maldición
  lexicon: BDAG
  rationale: πονηρία denotes active, morally malicious wickedness. 'Maldad' captures this active ethical force and is widely understood across Latin American Spanish. 'Perversidad' leans toward perversion/depravity; 'iniquidad' is more archaic and legal in register. Keeping 'maldad' here also maintains the distinction from κακόν/mal that appears later in the verse.
- source_word: συγκρύπτων
  english_pob_choice: hiding
  chosen_spanish: oculta (el que oculta)
  alternatives_spanish:
  - el que esconde
  - encubriendo
  - el que encubre
  lexicon: LSJ
  rationale: 'συγκρύπτω (σύν + κρύπτω) means ''to conceal/hide completely.'' The articular present participle ὁ συγκρύπτων is the grammatical subject of ἐστίν (''the one hiding''). Spanish renders articular participles most naturally as relative clauses: ''el que oculta.'' ''Ocultar'' (''to hide/conceal'') is precise and neutral. ''Encubrir'' carries stronger connotations of deliberate cover-up, which arguably fits the moral tenor but would over-interpret the compound force without clear warrant.'
- source_word: τὸ κακόν
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - lo malo
  - el mal
  lexicon: BDAG
  rationale: κακόν is 'evil' in a general moral sense. Rendered 'mal' (without article, for natural Spanish flow) to maintain the lexical distinction from πονηρία/maldad earlier in the verse. Both Greek terms for evil are preserved in Spanish.
- source_word: ὑπὲρ τὸ ὄνομα τὸ καλόν
  english_pob_choice: under a good name
  chosen_spanish: bajo nombre bueno
  alternatives_spanish:
  - bajo el nombre bueno
  - detrás de un buen nombre
  - a nombre del bien
  lexicon: BDAG
  rationale: ὑπέρ normally means 'over/above/on behalf of,' making this clause textually difficult (hence the obeli). The English POB and this Spanish translation both follow the interpretive tradition of reading ὑπέρ as 'under the cover of.' Spanish 'bajo nombre bueno' conveys concealment beneath a respectable guise naturally. The article before 'nombre' is omitted as a natural Spanish stylistic choice; 'bajo el nombre bueno' is an alternative preserving the Greek article.
- source_word: τέλος τῆς πράξεως
  english_pob_choice: end of the deed
  chosen_spanish: fin de la acción
  alternatives_spanish:
  - el resultado de la obra
  - el final del hecho
  - el desenlace del acto
  lexicon: BDAG
  rationale: τέλος = 'end/outcome'; πρᾶξις = 'deed/action/practice.' 'Fin de la acción' is natural modern Spanish. 'Acción' captures πρᾶξις (an act performed) better than 'obra' (which emphasizes a completed product) or 'hecho' (a fait accompli). The phrase reads smoothly without archaic register.
- source_word: ἔρχεται εἰς κακόν
  english_pob_choice: comes to evil
  chosen_spanish: llega al mal
  alternatives_spanish:
  - viene a parar en mal
  - acaba en mal
  - desemboca en el mal
  lexicon: BDAG
  rationale: '''Llega al mal'' preserves the directional force of ἔρχεται εἰς (''comes/arrives into'') while reading naturally. ''Viene a parar en mal'' is a common Spanish idiom for ''ends up in evil'' and is an acceptable alternative, but ''llega al mal'' is more literal and avoids the colloquial register of ''parar.'''
theological_decisions:
- issue: 'Hypocrisy motif: concealing evil under love or a good name as itself wickedness'
  english_pob_reading: Even if they are in love, they are in wickedness, hiding evil under a good name
  chosen_spanish_reading: Aun siendo amor, está en maldad el que oculta el mal bajo nombre bueno
  alternative_spanish_readings:
  - Aunque hay amor, están en maldad los que ocultan el mal bajo buen nombre
  - Aun cuando sea amor, está en maldad quien encubre el mal bajo un nombre bueno
  rationale: 'The verse belongs to the Testament of Asher''s ''two-ways/two-faces'' ethical framework: an action may present itself as love (ἀγάπη) and bear a good name (ὄνομα καλόν), yet remain essentially wicked (πονηρία) and terminate in evil (κακόν). The Spanish preserves both the concessive structure (''aun siendo amor'') and the outcome clause (''el fin de la acción llega al mal''), maintaining the document''s moral teaching that external appearances — even honorable or affectionate ones — do not determine moral reality. No Christological or divine-name issues arise in this verse.'
  doctrine_reference: Testament of Asher 1:3–6 (διπρόσωπος / double-faced soul framework); cf. Matt 7:15–20 for a parallel masking motif in Second Temple tradition
translation_notes:
  revision_awareness: 'The English POB underwent a revision (2026-04-23, gpt-5.4) adjusting "when they hide evil under a good name" to "hiding evil under a good name" in order to better reflect the Greek participial construction (ὁ συγκρύπτων). The Spanish translation advances this syntactic fidelity further: "el que oculta" renders ὁ συγκρύπτων as the explicit grammatical subject of the main clause (ἐν πονηρίᾳ ἐστίν) rather than as a secondary adverbial participle modifying a supplied plural subject, thus representing the Greek structure more directly. The cross-check summary (needs_review, agreement 0.7) flags this verse for ongoing scrutiny; the textual difficulty (obeli) and the unusual use of ὑπέρ are documented in footnotes for transparency.'
  spanish_consistency_notes:
  - πονηρία/maldad and κακόν/mal both appear in the Greek and are kept lexically distinct in Spanish, preserving the verse's dual vocabulary for evil.
  - No divine names (יהוה, κύριος, θεός) appear in this verse; project-level terminology defaults for Yahvé, Dios, etc. are not triggered.
  - ἀγάπη rendered 'amor' (not 'caridad' or 'amor cristiano') since the Testament of Asher uses the word in a general ethical sense without Johannine or Pauline theological freight.
  - The articular participle ὁ συγκρύπτων is rendered 'el que oculta' — a relative clause, which is the standard and most natural Spanish equivalent for Greek articular participles.
  - The concessive adverbial phrase 'Aun siendo amor' places the participial clause sentence-initially, matching the Greek word order (Καίγε ἀγάπη οὖσα) and the emphasis of the concession.
