source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: †Καίγε ἀγάπη οὖσα, ἐν πονηρίᾳ ἐστὶν ὁ συγκρύπτων²⁰ τὸ κακὸν ὑπὲρ τὸ ὄνομα τὸ καλόν·† τὸ δὲ τέλος τῆς πράξεως ἔρχεται εἰς κακόν.
