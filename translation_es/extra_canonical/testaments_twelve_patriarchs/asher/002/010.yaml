translation:
  language: es
  text: Pues también Dios, en las tablas[a] de los mandamientos,[b] así lo dijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'πλαξί (pl. de πλάξ): «tablas [de piedra]». Referencia probable a las tablas del Decálogo (cf. Éx 31:18; 32:15; Dt 9:10–11). El aparato crítico de Charles (nota ⁶⁵) registra variante manuscrita en este término.'
    reason: textual_variant
  - marker: b
    text: 'τῶν ἐντολῶν: «de los mandamientos/preceptos». El aparato de Charles (nota ⁶⁶) señala una variante textual. El plural ἐντολαί en contexto de «tablas» evoca el Decálogo como código normativo, recurso habitual en la ética del Segundo Templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ γὰρ
  english_pob_choice: For … also
  chosen_spanish: Pues también
  alternatives_spanish:
  - Porque también
  - Pues en verdad
  - Y es que también
  lexicon: 'BDAG γάρ §1 (causal/explanatory particle); καί §1b (adverbial: also, even)'
  rationale: γὰρ introduces the clause as an explanatory or confirmatory ground ('for/pues'); καί is adverbial, modifying the subject ὁ Θεός ('God also/even God'). The English POB places 'also' after 'God', reading καί as attaching to the subject — this is grammatically sound. 'Pues también' preserves both the causal-explanatory force of γὰρ and the additive/emphatic force of καί without artificially separating them. 'Porque también' is an equally valid alternative; 'Pues' is preferred as slightly more formal and suited to a closing citation formula.
- source_word: ὁ Θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG θεός §1; project default
  rationale: ὁ Θεός with the article is the standard reference to the God of Israel. Spanish 'Dios' without the article follows normal Spanish theological idiom ('Dios dijo' rather than 'el Dios dijo'), which is the broadly accepted convention in Spanish Bible translation. No divine name (YHWH/κύριος) is present in this clause; the project's YHWH→Yahvé default does not apply here.
- source_word: ταῖς πλαξί
  english_pob_choice: tablets
  chosen_spanish: las tablas
  alternatives_spanish:
  - las losas
  - las piedras
  lexicon: 'LSJ πλάξ: flat stone, tablet, slab; dative plural πλαξί. Charles apparatus note ⁶⁵ indicates a textual variant in manuscript tradition.'
  rationale: '''Tablas'' is the established Spanish term for the stone tablets of the Law (cf. Éx 31:18; 32:15–16; Dt 9:10) and is unambiguous to Spanish readers. ''Losas'' (slabs) would be technically accurate but unfamiliar in this biblical context. The reference is almost certainly to the Mosaic Decalogue tablets, contextually confirmed by the following genitive ''of the commandments''.'
- source_word: τῶν ἐντολῶν
  english_pob_choice: commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - los mandatos
  lexicon: 'BDAG ἐντολή §1: commandment, order, precept. Charles apparatus note ⁶⁶ signals a textual or interpretive note.'
  rationale: '''Mandamientos'' is the standard Spanish rendering of ἐντολή in the context of the Mosaic law and is the most immediately recognizable term for a broad church readership. ''Preceptos'' is a close synonym but carries a slightly more legal/formal register; ''mandatos'' is more general. Given the evident allusion to the Decalogue inscribed on stone tablets, ''mandamientos'' is optimal.'
- source_word: οὕτως εἶπεν
  english_pob_choice: has declared it so
  chosen_spanish: así lo dijo
  alternatives_spanish:
  - así lo ha declarado
  - de esta manera habló
  - así lo estableció
  lexicon: 'BDAG λέγω aorist εἶπεν: said, spoke, declared. οὕτως: thus, in this manner, so.'
  rationale: 'εἶπεν is the Greek aorist of λέγω, a simple past: ''said/spoke.'' The English POB renders it as ''has declared it so'' (present perfect), which imports a present-relevance nuance not strictly present in the aorist. Spanish ''así lo dijo'' (simple past) is more source-faithful to the aorist form. ''Así lo ha declarado'' would mirror the English POB''s perfect aspect and is defensible as a translation-of-effect, but privileging the Greek source over the English audit trail (per POB methodology) favors the simple past. The word ''dijo'' also preserves the direct-speech/citation formula register without the interpretive weight of ''declaró'' or ''estableció''.'
theological_decisions:
- issue: Nature of the citation formula and referent of 'the tablets of the commandments'
  english_pob_reading: For God also, in the tablets of the commandments, has declared it so.
  chosen_spanish_reading: Pues también Dios, en las tablas de los mandamientos, así lo dijo.
  alternative_spanish_readings:
  - Porque también Dios lo declaró así en las tablas de los mandamientos.
  - Pues también Dios así habló en las tablas de los preceptos.
  rationale: This verse functions as a closing divine-authority citation for the moral teaching of T.Ash. 2. The phrase 'tablas de los mandamientos' almost certainly alludes to the Sinai Decalogue tablets (Éx 31:18; Dt 4:13; 5:22; 9:10), a common appeal-to-Torah formula in Second Temple Jewish ethical literature. No explicit New Testament or christological referent appears in the Greek. The cross-check flagged 'major-issues' (agreement 0.45), which may reflect uncertainty about whether the referent is specifically the Decalogue or a broader law corpus; however, the standard Second Temple parallel (tablets = stone tablets of the law) is the most textually grounded reading and is retained in the Spanish without importing a more specific identification.
  doctrine_reference: Sinai covenant; Torah as divine authority in Second Temple ethical paraenesis (cf. 1 Macc 1:56; Jub. 1:1; Philo, Decal. 1)
- issue: Cross-check 'major-issues' verdict and tense rendering of εἶπεν
  english_pob_reading: has declared it so (present perfect)
  chosen_spanish_reading: así lo dijo (simple past, matching Greek aorist)
  alternative_spanish_readings:
  - así lo ha declarado (present perfect, following English POB)
  rationale: The cross-check returned a 'major-issues' verdict with 0.45 agreement against the English POB. One identifiable source of disagreement is the English POB's use of the present perfect ('has declared') for the Greek aorist εἶπεν. The Spanish draft corrects this by using the simple past 'dijo', which more precisely represents the Greek aorist. This is a source-grounded departure from the English POB and is appropriate per POB methodology (work from the original source first). The other aspects of the verse are relatively unambiguous, so the low agreement score may also reflect reviewers disagreeing on the scope of Καὶ γὰρ or on whether the citation refers to the Decalogue specifically.
  doctrine_reference: 'POB methodology: source-first translation; Greek aorist as punctiliar past act of divine speech'
translation_notes:
  revision_awareness: 'La revisión más reciente del inglés POB (modelo gpt-5.4, 2026-04-23) concluyó sin cambios (''unchanged: true''). Sin embargo, el control cruzado posterior marcó ''major-issues'' con acuerdo 0.45, lo que indica tensiones no resueltas en la versión inglesa. La traducción española se aparta del inglés POB en un punto explícito: el griego aorist εἶπεν se traduce como ''dijo'' (pasado simple) en lugar de calcar el ''has declared'' (perfecto) del inglés, en fidelidad directa al texto fuente griego. Los superíndices ⁶⁴, ⁶⁵, ⁶⁶ del aparato de Charles (1908) no han podido verificarse directamente; sus implicaciones textuales se consignan en las notas al pie para revisión editorial.'
  spanish_consistency_notes:
  - 'Dios: rendering estándar de ὁ Θεός; no aplica el default YHWH→Yahvé porque el texto griego no usa κύριος ni hace referencia al nombre divino.'
  - 'Mandamientos: rendering preferido de ἐντολή en contexto legal-mosaico; alternativa ''preceptos'' queda registrada en la decisión léxica.'
  - 'Tablas: equivalente establecido de πλάξ en contexto bíblico; coherente con la tradición española de Éx 31:18 y Dt 4:13.'
  - No aparece δοῦλος, σάρξ, δικαιοσύνη, χάρις, πνεῦμα ni lenguaje mesiánico; los defaults del proyecto no requieren aplicación aquí.
  - El versículo carece de nombre divino (YHWH/κύριος); la cláusula de sustitución de Yahvé no se activa.
