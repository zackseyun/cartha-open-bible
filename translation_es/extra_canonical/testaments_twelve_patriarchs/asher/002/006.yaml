id: T12P.ASH.2.6
reference: Testament of Asher 2:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: '*Ὁ πλεονεκτῶν³³ τὸν³⁴ πλησίον²⁸ πτωχούς, παροργίζει τὸν Θεόν, καὶ³⁵ τὸν ὕψιστον³⁶ ἐπιορκεῖ καὶ τὸν πτωχὸν³⁷ ἐλεεῖ³⁸. τὸν ἐντολέα³⁹ *τοῦ νόμου⁴⁰ Κύριον⁴¹ ἀθετεῖ⁴² καὶ παροξύνει, καὶ τὸν πένητα ἀναπαύει.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/002/006.yaml
  text: The one who defrauds his neighbor provokes God, swears falsely by the Most High, sets aside and provokes the Lord, the giver of the law, and gives rest to the poor.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:53Z'
    unchanged: false
    changes_summary: Removed 'has no regard for' in favor of the more precise 'sets aside' for ἀθετεῖ, and included both verbs 'sets aside and provokes' to account for καὶ παροξύνει. Kept the final clause as 'gives rest to the poor' for natural English.
translation:
  language: es
  text: El que defrauda a su prójimo[a] provoca a Dios, perjura por el Altísimo y se compadece del pobre[b]. Rechaza y exaspera al Señor[c], el dador de la ley, y da descanso al necesitado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto griego (Charles 1908) añade πτωχούς (acus. pl., ''pobres'') tras πλησίον, formando una frase sintácticamente difícil, marcada como variante textual (superíndices 33–34 en la edición crítica). Sentido probable: ''defraudando a su prójimo, empobreciéndolos.'' La traducción inglesa de referencia no rinde πτωχούς explícitamente.'
    reason: textual_variant
  - marker: b
    text: 'Gr. ἐλεεῖ τὸν πτωχόν (''muestra misericordia / se compadece del pobre''): esta cláusula está presente en el texto griego fuente pero fue omitida en la traducción inglesa de referencia tanto antes como después del paso de revisión (2026-04-23). Se restituye aquí con base en la fuente primaria griega. Su presencia es teológicamente esencial: describe la conducta dual del personaje de ''dos caras'' (hace mal y bien a la vez).'
    reason: source_note
  - marker: c
    text: Gr. Κύριον. En este pseudepígrafo judío helenístico, κύριος funciona como sustituto convencional del nombre divino (YHWH) según la práctica del Segundo Templo. Se traduce 'el Señor' y no 'Yahvé' porque el texto transmitido es griego sin Vorlage hebreo verificable con יהוה en este punto.
    reason: theological_note
lexical_decisions:
- source_word: πλεονεκτῶν
  english_pob_choice: defrauds
  chosen_spanish: defrauda
  alternatives_spanish:
  - explota
  - estafa
  - toma ventaja de
  - engaña
  lexicon: 'BDAG πλεονεκτέω: tomar ventaja injusta, defraudar, sacar más de lo que corresponde (cf. 2 Co 7:2; 12:17–18)'
  rationale: '''Defrauda'' capta tanto la dimensión de apropiación injusta como la de daño al prójimo; más preciso que ''explota'' (que evoca relación estructural) o ''estafa'' (más criminal-jurídico en el español moderno). Sigue la opción inglesa ''defrauds''.'
- source_word: παροργίζει
  english_pob_choice: provokes
  chosen_spanish: provoca
  alternatives_spanish:
  - irrita
  - enoja
  - hace enojar
  lexicon: 'BDAG παροργίζω: provocar a ira, irritar profundamente'
  rationale: '''Provoca a Dios'' es natural en español formal y corresponde al inglés ''provokes God''; ''enoja'' sería más coloquial.'
- source_word: ἐπιορκεῖ
  english_pob_choice: swears falsely
  chosen_spanish: perjura
  alternatives_spanish:
  - jura en falso
  - hace falso juramento
  - perjura ante
  lexicon: 'BDAG ἐπιορκέω: perjurar, jurar falsamente (de ἐπί + ὅρκος)'
  rationale: '''Perjura'' es el equivalente técnico preciso y de registro elevado en español; ''jura en falso'' es más explicativo pero menos económico. La preposición ''por'' recoge el dativo implícito de referencia (''por el Altísimo'').'
- source_word: ἐλεεῖ (τὸν πτωχόν)
  english_pob_choice: '[omitido en el POB inglés]'
  chosen_spanish: se compadece del pobre
  alternatives_spanish:
  - tiene misericordia del pobre
  - muestra compasión al pobre
  lexicon: 'BDAG ἐλεέω: tener misericordia, compadecerse, mostrar piedad'
  rationale: 'Este verbo-cláusula (ἐλεεῖ τὸν πτωχόν) aparece con claridad en el texto griego fuente pero fue omitido en la traducción inglesa del POB (tanto en la versión anterior a la revisión como en la posterior). La revisión inglesa abordó ἀθετεῖ/παροξύνει, pero no restituye ἐλεεῖ. Se incluye aquí con base en la fuente griega primaria. La doble acción —provoca a Dios Y se compadece del pobre— es esencial para el argumento del bicéfalo (δίψυχος) de T12P.ASH.2: el personaje de dos caras mezcla maldad y bien aparente.'
- source_word: ἀθετεῖ
  english_pob_choice: sets aside
  chosen_spanish: rechaza
  alternatives_spanish:
  - desestima
  - descarta
  - anula
  - desecha
  lexicon: 'BDAG ἀθετέω: dejar sin efecto, rechazar, desestimar, tratar como nulo'
  rationale: La revisión inglesa (2026-04-23) sustituyó 'has no regard for' por 'sets aside' por mayor precisión. 'Rechaza' en español aproxima ese sentido de invalidación activa; 'desestima' o 'anula' son alternativas más técnicas pero menos naturales en la prosa religiosa corriente.
- source_word: παροξύνει
  english_pob_choice: provokes
  chosen_spanish: exaspera
  alternatives_spanish:
  - irrita
  - provoca
  - enardece
  lexicon: 'BDAG παροξύνω: irritar, exasperar, incitar (más intenso que παροργίζω)'
  rationale: Se usó 'provoca' ya para παροργίζει en la primera cláusula. Para evitar la repetición y reflejar la sinonimia intensificada del doblado griego (ἀθετεῖ καὶ παροξύνει), 'exaspera' distingue este segundo verbo. La revisión inglesa incluyó ambos verbos deliberadamente.
- source_word: ἐντολέα τοῦ νόμου
  english_pob_choice: giver of the law
  chosen_spanish: dador de la ley
  alternatives_spanish:
  - promulgador de la ley
  - legislador
  - el que da los mandamientos de la ley
  lexicon: 'ἐντολεύς (hapax en pseudepígrafos): agente de ἐντολή (mandamiento); el dador/legislador de los mandamientos. LSJ ἐντολεύς: one who gives a command.'
  rationale: '''Dador de la ley'' sigue la opción del POB inglés (''giver of the law'') y es la traducción más directa del sustantivo agente; ''legislador'' es común en español pero pierde el matiz de ''dador de mandamientos'' (ἐντολή).'
- source_word: ἀναπαύει (τὸν πένητα)
  english_pob_choice: gives rest to the poor
  chosen_spanish: da descanso al necesitado
  alternatives_spanish:
  - hace descansar al pobre
  - alivia al necesitado
  lexicon: 'BDAG ἀναπαύω: dar descanso, aliviar, refrescar'
  rationale: '''Da descanso'' sigue fielmente el griego y el inglés POB. Se usa ''necesitado'' para πένητα (trabajador pobre, necesitado) frente a ''pobre'' para πτωχόν (mendigo, en pobreza absoluta) a fin de preservar la distinción léxica del griego dentro del mismo versículo.'
- source_word: πτωχόν / πένητα
  english_pob_choice: the poor / the poor
  chosen_spanish: pobre / necesitado
  alternatives_spanish:
  - el pobre / el pobre
  - el mendicante / el necesitado
  lexicon: 'BDAG πτωχός: indigente absoluto, mendigo; πένης: trabajador pobre, carente de recursos (distinción clásica mantenida en el NT y los pseudepígrafos)'
  rationale: 'El inglés POB usa ''the poor'' para ambos sin distinción. El español permite mantener el matiz: πτωχόν → ''pobre'' (indigencia), πένητα → ''necesitado'' (carencia sin indigencia absoluta). Esto se alinea con el proyecto de transparencia léxica.'
theological_decisions:
- issue: Κύριον como título divino en texto griego pseudepigráfico
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: La política del proyecto indica 'Yahvé' para יהוה/YHWH, pero requiere explicación cuando la fuente inmediata es κύριος griego. En el Testament of Asher (pseudepígrafo judío helenístico, colección T12P), Κύριος funciona como sustituto convencional del nombre divino en textos griegos del Segundo Templo, no como cita directa del Tetragrámaton en un texto hebreo/arameo subyacente identificable. Dado que el texto de Charles 1908 transmite Κύριον en griego sin que haya un Vorlage hebreo seguro con יהוה en este punto, 'el Señor' es la opción apropiada, anotada para transparencia. Si se identificara un Vorlage hebreo con יהוה, el término debería revisarse a 'Yahvé'.
  doctrine_reference: 'Política terminológica POB: uso de κύριος como sustituto del nombre divino en el judaísmo del Segundo Templo (cf. Hatch–Redpath, LXX; Fitzmyer, ''The Semitic Background of the New Testament Kyrios-Title'')'
- issue: Estructura dual del 'bicéfalo' (δίψυχος) y la cláusula ἐλεεῖ omitida en el POB inglés
  english_pob_reading: The one who defrauds his neighbor provokes God, swears falsely by the Most High, sets aside and provokes the Lord, the giver of the law, and gives rest to the poor. [ἐλεεῖ τὸν πτωχόν no aparece]
  chosen_spanish_reading: '...y se compadece del pobre. Rechaza y exaspera al Señor... y da descanso al necesitado.'
  alternative_spanish_readings:
  - Seguir el POB inglés omitiendo la cláusula de misericordia
  rationale: 'La teología de T12P.ASH.2 es la de la persona de ''dos caras'': realiza acciones malas (defrauda, perjura, rechaza a Dios) y acciones aparentemente buenas (misericordia, descanso para el pobre) entremezcladas. La cláusula ἐλεεῖ τὸν πτωχόν es estructuralmente esencial: aparece al final de la primera oración griega como contrapeso positivo de los actos negativos. Su omisión en el POB inglés rompe la simetría bívalente del argumento. Puesto que la traducción española trabaja directamente de la fuente griega, la cláusula se restituye. El estado ''major-issues / agreement 0.55'' del cross-check probablemente refleja esta omisión.'
  doctrine_reference: 'Testament of Asher 1–2: doctrina de los dos caminos y la persona de doble inclinación; cf. Didache 1–6; 1QS (Regla de la Comunidad) III–IV'
translation_notes:
  revision_awareness: La revisión inglesa del 2026-04-23 (azure-gpt-5.4) sustituyó 'has no regard for' por 'sets aside' para ἀθετεῖ (mayor precisión léxica) e incorporó καὶ παροξύνει como 'and provokes'. El español 'rechaza y exaspera' sigue estas correcciones. Sin embargo, ninguna de las dos versiones inglesas (pre- ni post-revisión) incluyó ἐλεεῖ τὸν πτωχόν; esta omisión probablemente explica la calificación 'major-issues / agreement 0.55' del cross-check. La traducción española restituye la cláusula directamente del griego, divergiendo intencionalmente del POB inglés en este punto y documentando la divergencia en los materiales de auditoría.
  spanish_consistency_notes:
  - '''Altísimo'' (ὕψιστος) es el equivalente establecido en la tradición bíblica hispanohablante; coherente con el uso en las traducciones litúrgicas y el AT griego (LXX).'
  - '''Prójimo'' (πλησίον) se prefiere sobre ''vecino'' en contextos éticos y religiosos del NT y pseudepígrafos, siendo el término estándar en estas colecciones del proyecto.'
  - Se mantiene la estructura de dos oraciones del griego (punto medio después de ἐλεεῖ), que el POB inglés colapsó en una sola; la versión española resulta así más fiel a la sintaxis original y facilita la comprensión de la estructura dual.
  - Para πτωχόν y πένητα se usan 'pobre' y 'necesitado' respectivamente para preservar la distinción léxica griega; si el equipo del proyecto prefiere uniformar ambos como 'pobre', debe documentarse como decisión editorial.
  - Los verbos de la segunda oración ('Rechaza y exaspera...') llevan sujeto implícito, retomado de 'El que defrauda' de la primera; construcción natural en español y fiel al griego.
