base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/002/008.yaml
  text: Another commits adultery and practices sexual immorality, and abstains from foods. And while fasting he does evil, and by the power of wealth he drags many down, and out of excessive wickedness keeps the commandments. This is double-faced, but it is altogether evil.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:53Z'
    unchanged: false
    changes_summary: Changed 'force of his wealth' to 'power of wealth' for a more natural rendering of δυναστείᾳ τοῦ πλούτου; changed 'performs the commandments' to 'keeps the commandments' for more idiomatic rendering of ποιεῖ τὰς ἐντολάς; changed 'the whole of it' to 'it is altogether' for a more natural rendering of τὸ δὲ ὅλον.
translation:
  language: es
  text: Otro comete adulterio y practica inmoralidad sexual[a], y se abstiene de alimentos. Y mientras ayuna hace el mal, y por el poder de la riqueza arrastra a muchos, y de la excesiva maldad cumple los mandamientos. Esto es de doble rostro[b], pero es del todo malo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Gr. πορνεύει: el verbo abarca toda inmoralidad sexual, no solo la fornicación en sentido estricto. La combinación con μοιχεύει (adulterio) sugiere que el autor enumera categorías distintas: el adulterio como violación del pacto conyugal y la πορνεία como categoría más amplia de conducta sexual ilícita.'
    reason: lexical_alternative
  - marker: b
    text: 'Gr. διπρόσωπος: literalmente ''de dos rostros/caras''. Término técnico del Testamento de Asher para designar a quienes combinan acciones exteriormente piadosas con una orientación interior hacia el mal. El texto concluye que, aunque la apariencia sea mixta, el conjunto (τὸ ὅλον) es clasificado como malo por su fuente interior.'
    reason: theological_note
lexical_decisions:
- source_word: μοιχεύει
  english_pob_choice: commits adultery
  chosen_spanish: comete adulterio
  alternatives_spanish:
  - adultera
  lexicon: 'LSJ μοιχεύω: to commit adultery'
  rationale: Equivalent estándar en español moderno. 'Adultera' es posible como forma verbal simple pero 'comete adulterio' es más natural y explícito en el registro del texto.
- source_word: πορνεύει
  english_pob_choice: practices sexual immorality
  chosen_spanish: practica inmoralidad sexual
  alternatives_spanish:
  - fornica
  - se entrega a la fornicación
  lexicon: 'LSJ πορνεύω: to engage in prostitution / broader sexual immorality; BDAG: to engage in sexual immorality'
  rationale: El campo semántico de πορνεύω abarca más que la fornicación estricta entre solteros; incluye toda conducta sexual ilícita. 'Fornica' en español moderno suele entenderse en sentido estrecho (solteros). El POB inglés optó acertadamente por 'practices sexual immorality' para preservar la amplitud; 'practica inmoralidad sexual' traslada ese mismo alcance al español. La alternativa 'se entrega a la fornicación' es más literaria pero estrecha el sentido.
- source_word: ἀπέχεται ἐδεσμάτων
  english_pob_choice: abstains from foods
  chosen_spanish: se abstiene de alimentos
  alternatives_spanish:
  - ayuna de comidas
  - se priva de ciertos alimentos
  lexicon: 'LSJ ἀπέχομαι: to hold oneself away from, abstain from; ἔδεσμα: food, viands'
  rationale: '''Se abstiene de alimentos'' traduce con precisión el genitivo de separación. ''Comidas'' sería también válido pero ''alimentos'' cubre mejor el plural genérico ἐδεσμάτων (tipos de alimento, no comidas como actos).'
- source_word: δυναστείᾳ τοῦ πλούτου
  english_pob_choice: power of wealth
  chosen_spanish: el poder de la riqueza
  alternatives_spanish:
  - la fuerza de la riqueza
  - el dominio de la riqueza
  - la autoridad de la riqueza
  lexicon: 'LSJ δυναστεία: power, dominion, authority'
  rationale: La revisión del POB inglés cambió correctamente 'force' por 'power' para reflejar mejor δυναστεία, que connota poder institucional/dominante más que mera fuerza física. El español 'poder' capta esa misma dimensión. No se traduce con posesivo ('su riqueza') porque el griego τοῦ πλούτου lleva artículo definido pero no pronombre posesivo; la revisión inglesa también eliminó 'his'.
- source_word: κατασύρει
  english_pob_choice: drags many down
  chosen_spanish: arrastra a muchos
  alternatives_spanish:
  - hace caer a muchos
  - arrastra hacia abajo a muchos
  lexicon: 'LSJ κατασύρω: to drag down, drag along, sweep down'
  rationale: '''Arrastra'' en español preserva la imagen cinética y violenta del verbo griego: llevar a otros como víctimas del propio influjo. El matiz descendente (κατα-) está implícito en el contexto moral de corrupción. ''Hace caer a muchos'' es más interpretativo y pierde la imagen de arrastre.'
- source_word: ὑπερόγκου κακίας
  english_pob_choice: excessive wickedness
  chosen_spanish: la excesiva maldad
  alternatives_spanish:
  - su desmedida maldad
  - la desbordante maldad
  - su enorme perversidad
  lexicon: 'LSJ ὑπερόγκος: overgrown, swollen beyond measure, excessive; κακία: badness, wickedness, vice'
  rationale: ὑπερόγκος evoca algo que ha crecido más allá de todo límite. 'Excesiva' es la opción más directa y se alinea con el POB inglés revisado. No se añade posesivo ('su') porque el griego carece de pronombre; la revisión inglesa elimina 'his' deliberadamente para respetar la sintaxis del original.
- source_word: ποιεῖ τὰς ἐντολάς
  english_pob_choice: keeps the commandments
  chosen_spanish: cumple los mandamientos
  alternatives_spanish:
  - observa los mandamientos
  - hace los mandamientos
  lexicon: 'LSJ ποιέω: to do, make, perform; ἐντολή: commandment, precept'
  rationale: El griego dice literalmente 'hace los mandamientos', pero 'cumple' es el equivalente idiomático en español para la observancia religiosa de preceptos. La revisión inglesa cambió 'performs' por 'keeps' por la misma razón idiomática; 'cumple' corresponde a esa misma corrección. 'Observa' sería igualmente válido pero 'cumple' captura mejor el sentido de llevar a término un deber.
- source_word: διπρόσωπόν
  english_pob_choice: double-faced
  chosen_spanish: de doble rostro
  alternatives_spanish:
  - de doble cara
  - bifronte
  - hipócrita
  lexicon: 'LSJ διπρόσωπος: two-faced, having two faces (δι- + πρόσωπον)'
  rationale: Término técnico central en el Testamento de Asher, donde διπρόσωποι designa a quienes combinan bien y mal de modo estructuralmente ambiguo. 'De doble rostro' preserva la imagen literal del compuesto griego (dos + cara/rostro). 'Hipócrita' es paráfrasis interpretativa que aplanaría la tensión del término propio del documento. 'Bifronte' (del latín bifrons) sería literariamente elegante pero menos transparente. 'De doble cara' es posible pero coloquial.
- source_word: τὸ δὲ ὅλον κακόν ἐστιν
  english_pob_choice: it is altogether evil
  chosen_spanish: es del todo malo
  alternatives_spanish:
  - es totalmente malo
  - todo ello es malo
  - es en su totalidad malo
  lexicon: 'LSJ ὅλος: whole, entire; adverbial use τὸ ὅλον: altogether, on the whole'
  rationale: τὸ ὅλον usado adverbialmente = 'en conjunto, completamente'. La revisión del POB inglés cambió 'the whole of it' por 'it is altogether' para el uso adverbial. 'Del todo' es la expresión adverbial española equivalente ('completamente, en absoluto'). 'Totalmente malo' también funciona pero 'del todo' tiene la misma fuerza concentradora.
theological_decisions:
- issue: Paradoja de guardar los mandamientos 'de la excesiva maldad'
  english_pob_reading: out of excessive wickedness keeps the commandments
  chosen_spanish_reading: de la excesiva maldad cumple los mandamientos
  alternative_spanish_readings:
  - a pesar de su excesiva maldad cumple los mandamientos
  - usando su excesiva maldad para cumplir los mandamientos
  rationale: 'La preposición ἐκ (de/desde/a partir de) indica la fuente u origen del acto de cumplir los mandamientos. El texto afirma que este individuo cumple las prescripciones religiosas como instrumento o extensión de su maldad —quizás para mantener apariencias, acumular influencia religiosa, o dar cobertura moral a su corrupción económica y sexual. Traducir ''a pesar de'' suavizaría esta tensión al convertirla en contraste simple, borrando la implicación más oscura: que la observancia misma proviene de la maldad. ''De la excesiva maldad cumple los mandamientos'' preserva la ambigüedad causal que el autor deliberadamente construye.'
  doctrine_reference: 'Doctrina de la hipocresía estructural en T12P: el ''doble rostro'' no es simplemente hacer el bien y el mal al mismo tiempo, sino que el bien exterior puede nacer del mal interior (T. Ash. 2–3 passim).'
- issue: Naturaleza del 'doble rostro' (διπρόσωπία) en el Testamento de Asher
  english_pob_reading: This is double-faced, but it is altogether evil
  chosen_spanish_reading: Esto es de doble rostro, pero es del todo malo
  alternative_spanish_readings:
  - Este es hipócrita, pero es completamente malo
  - Esto tiene dos caras, pero es completamente malo
  rationale: 'El Testamento de Asher elabora una clasificación de tipos humanos según si su naturaleza es ''de una sola cara'' (μονοπρόσωπος) o ''de doble rostro'' (διπρόσωπος). El doble rostro no es neutral: aunque incluye la mezcla de actos buenos y malos, el juicio final es que el todo (τὸ ὅλον) es malo cuando el impulso central es la maldad. Preservar ''de doble rostro'' como término técnico es esencial para que el pasaje funcione dentro del sistema ético del documento. Usar ''hipócrita'' reduciría el concepto a una categoría neotestamentaria posterior (ὑποκριτής), perdiendo la originalidad del esquema de Asher.'
  doctrine_reference: T. Ash. 1:3–6 establece el marco de las dos inclinaciones (ἐπιθυμία/τρόπος) y los dos tipos de personas; 2:1–10 aplica el esquema a casos concretos de doble rostro.
translation_notes:
  revision_awareness: 'La revisión de azure-gpt-5.4 (2026-04-23) realizó tres correcciones sobre el borrador anterior, todas adoptadas en la versión española: (1) ''force of his wealth'' → ''power of wealth'': el español sigue con ''el poder de la riqueza'', reflejando δυναστείᾳ como poder/dominio y eliminando el posesivo ausente en el griego; (2) ''performs the commandments'' → ''keeps the commandments'': el español traduce ποιεῖ τὰς ἐντολάς como ''cumple los mandamientos'', que es el equivalente idiomático natural y corresponde a la misma corrección idiomática de la revisión; (3) ''the whole of it'' → ''it is altogether'': el español adopta ''del todo malo'' para reflejar el uso adverbial de τὸ ὅλον, en línea con la revisión que prefirió el adverbio sobre la frase nominal.'
  spanish_consistency_notes:
  - No aparece el nombre divino יהוה ni κύριος en este pasaje; la norma de proyecto 'Yahvé' no aplica aquí.
  - No hay terminología mesiánica ni pneumatológica en el versículo; las normas de proyecto correspondientes (Mesías/Cristo, espíritu/Espíritu) no se activan.
  - El término 'mandamientos' (ἐντολάς → 'los mandamientos') se usa en sentido general de preceptos religiosos, no específicamente Torah mosaica; en contexto pseudoepigráfico del s. II a.C./d.C. esta amplitud es apropiada.
  - La voz activa se preserva en todas las cláusulas conforme al original griego; no se introduce pasiva refleja innecesaria.
  - 'Puntuación española: se usa coma después de la cláusula participial temporal (''mientras ayuna hace el mal'') sin necesidad de punto y coma, siguiendo el ritmo paratáctico del griego original con καί.'
