source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: Ἄλλος⁴⁸ μοιχεύει *καὶ πορνεύει⁴⁹ καὶ ἀπέχεται ἐδεσμάτων⁵⁰. καὶ⁵¹ νηστεύων κακοποιεῖ, καὶ τῇ³⁵ δυναστείᾳ *τοῦ πλούτου⁵² πολλοὺς κατασύρει⁵³, καὶ ἐκ⁵⁴ τῆς ὑπερόγκου⁵⁵ κακίας ποιεῖ⁵⁶ ⌈τὰς⌉⁵⁷ ἐντολάς⁵⁸. τοῦτο διπρόσωπόν ἐστιν⁵⁹, *τὸ δὲ ὅλον⁶⁰ κακόν ἐστιν.
