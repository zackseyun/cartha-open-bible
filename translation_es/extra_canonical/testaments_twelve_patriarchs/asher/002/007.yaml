id: T12P.ASH.2.7
reference: Testament of Asher 2:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: ⌈Τὴν⁴³ ψυχὴν σπιλοῖ, καὶ⌉ τὸ σῶμα λαμπρύνει⁴⁴, πολλοὺς ἀναιρεῖ καὶ ὀλίγους ἐλεεῖ, καὶ τοῦτο⁴⁵ διπρόσωπόν⁴⁶ ἐστι, *τὸ δὲ ὅλον πονηρόν ἐστιν⁴⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/002/007.yaml
  text: It stains the soul and makes the body bright; it kills many and shows mercy to a few. This too is double-faced, but the whole of it is evil.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:53Z'
    unchanged: false
    changes_summary: Changed 'He' to 'It' for consistency with the neuter subject and retained the rest, which accurately reflects the Greek and reads naturally.
translation:
  language: es
  text: Mancha el alma[a] y hace brillar[b] el cuerpo; mata a muchos y muestra misericordia a pocos. También esto es de doble faz[c], pero en su totalidad es malo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gr. ψυχή puede significar «alma», «vida» o «persona»; en contraste con σῶμα («cuerpo»), el sentido es el alma como sede interior del ser moral.
    reason: lexical_alternative
  - marker: b
    text: 'Gr. λαμπρύνει: «hacer brillar» o «dar esplendor»; la imagen es de lustre exterior, en contraste irónico con «mancha el alma». Alternativa: «embellece el cuerpo».'
    reason: lexical_alternative
  - marker: c
    text: 'Gr. διπρόσωπον, literalmente «de dos rostros» (δι- + πρόσωπον); concepto central en T.Ash. 2 para describir al que mezcla apariencia de bien con fondo de mal. Alternativa: «bifronte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ψυχήν
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser interior
  - persona
  lexicon: 'LSJ: ψυχή — aliento, vida, alma, ser; en contextos morales y antropológicos, la sede interior del ser'
  rationale: En contraste explícito con σῶμα («cuerpo»), «alma» es la opción más natural y teológicamente precisa. El par ψυχή/σῶμα recorre toda la literatura parenética del período y exige un equivalente estable.
- source_word: σπιλοῖ
  english_pob_choice: stains
  chosen_spanish: mancha
  alternatives_spanish:
  - contamina
  - ensucia
  - mancilla
  lexicon: 'LSJ: σπιλόω — manchar, ensuciar, corromper'
  rationale: «Mancha» reproduce la imagen concreta de la tinción/impureza y sostiene el contraste irónico con λαμπρύνει («hace brillar»). «Mancilla» es igualmente precisa pero más arcaica; «contamina» desplaza la imagen hacia lo físico-higiénico.
- source_word: λαμπρύνει
  english_pob_choice: makes the body bright
  chosen_spanish: hace brillar
  alternatives_spanish:
  - embellece
  - ilumina
  - engalana
  lexicon: 'LSJ: λαμπρύνω — hacer brillante, dar esplendor, adornar'
  rationale: «Hace brillar» preserva la imagen visual del resplandor exterior que contrasta irónicamente con «mancha el alma». «Embellece» suaviza el contraste; «ilumina» introduce un matiz espiritual ajeno al contexto.
- source_word: ἀναιρεῖ
  english_pob_choice: kills
  chosen_spanish: mata
  alternatives_spanish:
  - destruye
  - quita la vida a
  - elimina
  lexicon: 'LSJ: ἀναιρέω — tomar, quitar; en sentido hostil: matar, destruir'
  rationale: «Mata» es el equivalente más directo y de mayor peso retórico, acorde con el uso hostil de ἀναιρέω. «Destruye» amplía el sentido más allá de la muerte física; «elimina» resulta eufemístico.
- source_word: ἐλεεῖ
  english_pob_choice: shows mercy
  chosen_spanish: muestra misericordia
  alternatives_spanish:
  - tiene piedad de
  - compadece
  lexicon: 'LSJ: ἐλεέω — tener misericordia, apiadarse'
  rationale: «Muestra misericordia» capta el peso del término en la literatura judía paraenética. «Tiene piedad» es igualmente válido pero «misericordia» conserva la resonancia del vocablo en el contexto moral-retórico de los Testamentos.
- source_word: διπρόσωπον
  english_pob_choice: double-faced
  chosen_spanish: de doble faz
  alternatives_spanish:
  - bifronte
  - de dos caras
  - hipócrita
  lexicon: 'LSJ: διπρόσωπος — de dos rostros (δι- + πρόσωπον, rostro/persona)'
  rationale: «De doble faz» preserva la literalidad del compuesto griego y el registro elevado del texto. «De dos caras» es idiomático pero coloquial; «bifronte» es exacto pero resulta oscuro para el lector general; «hipócrita» sería sobreinterpretación que colapsa la imagen visual en un juicio moral.
- source_word: πονηρόν
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - perverso
  - malvado
  - maligno
  lexicon: 'LSJ: πονηρός — fatigoso, malo, inicuo, moralmente corrompido'
  rationale: «Malo» utilizado en forma absoluta y con el artículo implícito de la construcción («en su totalidad es malo») tiene suficiente peso en el contexto. «Perverso» o «malvado» intensificarían el registro más allá de lo que el griego requiere; «maligno» insinuaría una personificación sobrenatural ajena al pasaje.
theological_decisions:
- issue: 'Sujeto neutro implícito: «it» vs. «he» en inglés / omisión del pronombre en español'
  english_pob_reading: It stains the soul and makes the body bright; it kills many and shows mercy to a few.
  chosen_spanish_reading: Mancha el alma y hace brillar el cuerpo; mata a muchos y muestra misericordia a pocos.
  alternative_spanish_readings:
  - Él mancha el alma...
  - Ello mancha el alma...
  rationale: 'El griego emplea verbos en tercera persona del singular sin pronombre expreso. El referente es el comportamiento de doble faz descrito en T.Ash. 2 (sujeto neutro τοῦτο, que aparece explícito en la segunda cláusula). La revisión inglesa del 2026-04-23 corrigió expresamente «He» → «It» para reflejar este neutro. El español omite el pronombre sujeto en los verbos iniciales, que es la construcción gramaticalmente natural y refleja con exactitud el griego: sin pronombre y sin marca de género explícita.'
  doctrine_reference: 'Revisión POB inglés 2026-04-23: «Changed He to It for consistency with the neuter subject.» T.Ash. 2: descripción del individuo de doble faz (διπρόσωπος).'
- issue: τὸ δὲ ὅλον πονηρόν ἐστιν — evaluación totalizadora del comportamiento
  english_pob_reading: but the whole of it is evil
  chosen_spanish_reading: pero en su totalidad es malo
  alternative_spanish_readings:
  - pero todo ello es malo
  - pero la totalidad es mala
  - pero el conjunto es perverso
  rationale: τὸ ὅλον es el uso sustantivado neutro singular de ὅλος, «la totalidad de la cosa». «En su totalidad es malo» restituye el sentido de que el juicio abarca el comportamiento en conjunto, no sólo cada acto aislado. «Todo ello es malo» es aceptable pero más coloquial; «la totalidad» con artículo puede confundirse con un sustantivo independiente.
  doctrine_reference: 'T.Ash. 2: la tesis del capítulo es que la mezcla de bien aparente y mal real constituye, en su conjunto, una conducta malvada (πονηρά).'
translation_notes:
  revision_awareness: La revisión inglesa del 2026-04-23 (modelo gpt-5.4) corrigió «He stains» → «It stains» para reflejar el sujeto neutro implícito del griego, cuyo referente es el comportamiento de doble faz (τοῦτο, neutro) descrito en T.Ash. 2. El español adopta la misma lectura omitiendo el pronombre sujeto en los verbos iniciales —construcción plenamente natural en español— y empleando «esto» como sujeto predicativo explícito solo en la cláusula «También esto es de doble faz», en correspondencia con τοῦτο διπρόσωπόν ἐστι.
  spanish_consistency_notes:
  - No aparecen nombres divinos (YHWH/κύριος/θεός) ni títulos mesiánicos en este versículo; las convenciones terminológicas del proyecto (Yahvé, Mesías, Jesús) no son aplicables aquí.
  - El texto pertenece a la literatura pseudoepigráfica judía (Testamentos de los Doce Patriarcas, edición Charles 1908), no a escritura canónica; el registro se mantiene literario y moralmente elevado sin introducir terminología exclusivamente cristiana.
  - «De doble faz» se prefiere consistentemente a «hipócrita» para preservar la imagen visual del griego (πρόσωπον, rostro) y evitar sobreinterpretación moral que aplastaría la tensión léxica documentada.
  - El término «misericordia» se retiene (frente a «piedad» o «compasión») para mantener coherencia con la terminología del proyecto en pasajes que traducen ἔλεος/ἐλεέω.
