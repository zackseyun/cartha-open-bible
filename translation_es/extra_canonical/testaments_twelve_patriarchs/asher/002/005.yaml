  text: Ἄλλος²⁷ κλέπτει, ἀδικεῖ²⁸, ἁρπάζει, πλεονεκτεῖ²⁸, καὶ ἐλεεῖ²⁹ πτωχούς· διπρόσωπον μὲν ⌈καὶ⌉³⁰ τοῦτο, *τὸ δὲ ὅλον³¹ πονηρόν³² ἐστιν.
