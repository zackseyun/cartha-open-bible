base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/002/005.yaml
  text: Another steals, acts unjustly, plunders, is greedy, and shows mercy to the poor. This too is double-faced, but the whole of it is evil.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:52Z'
    unchanged: false
    changes_summary: Removed 'yet' to avoid adding adversative emphasis not explicit in the Greek; otherwise retained the draft's accurate and natural rendering.
translation:
  language: es
  text: Otro roba, obra injustamente, arrebata, codicia y muestra misericordia a los pobres. También este es de doble cara[a], pero la totalidad de ello es malo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gr. διπρόσωπον, literalmente «de doble cara» o «bifronte». Término técnico del esquema ético del Testamento de Aser (véase 1:3–5) para describir a quien mezcla actos malvados y misericordiosos sin que el conjunto resulte bueno. No equivale exactamente a «hipócrita», pues no implica necesariamente fingimiento sino dualidad estructural de la conducta.
    reason: cultural_note
lexical_decisions:
- source_word: ἄλλος
  english_pob_choice: Another
  chosen_spanish: Otro
  alternatives_spanish:
  - Un segundo
  lexicon: LSJ s.v. ἄλλος
  rationale: Pronombre indefinido que introduce el segundo tipo de persona en el esquema ético de los Dos Caminos del Testamento de Aser. 'Otro' es la correspondencia directa y natural en español.
- source_word: ἀδικεῖ
  english_pob_choice: acts unjustly
  chosen_spanish: obra injustamente
  alternatives_spanish:
  - actúa injustamente
  - comete injusticia
  lexicon: BDAG s.v. ἀδικέω (1)
  rationale: ἀδικεῖ (actuar injustamente, agraviar) se traduce con 'obra injustamente', que mantiene el registro literario-religioso del español y la cadencia del verbo activo en la serie paralela.
- source_word: ἁρπάζει
  english_pob_choice: plunders
  chosen_spanish: arrebata
  alternatives_spanish:
  - saquea
  - despoja
  lexicon: BDAG s.v. ἁρπάζω (1)
  rationale: ἁρπάζω denota aprehensión violenta y repentina, distinguiéndose de κλέπτει (robar en secreto). 'Arrebata' preserva esa fuerza de apoderamiento súbito y violento; 'saquea' sugeriría el pillaje de un lugar, lo que estrecha innecesariamente el sentido del griego.
- source_word: πλεονεκτεῖ
  english_pob_choice: is greedy
  chosen_spanish: codicia
  alternatives_spanish:
  - es codicioso
  - actúa con codicia
  lexicon: BDAG s.v. πλεονεκτέω
  rationale: πλεονεκτεῖ (querer más de lo que a uno le corresponde, ser ávaro) se vierte como verbo activo 'codicia' para mantener la serie paralela de formas verbales en presente. 'Es codicioso' sería una descripción estática; 'codicia' capta mejor la acción habitual del griego.
- source_word: ἐλεεῖ
  english_pob_choice: shows mercy
  chosen_spanish: muestra misericordia
  alternatives_spanish:
  - tiene misericordia
  - se compadece
  lexicon: BDAG s.v. ἐλεέω
  rationale: ἐλεεῖ (mostrar misericordia, apiadarse) se traduce con locución verbal 'muestra misericordia', que preserva el carácter activo del verbo griego y es natural en el registro eclesial del español. El griego usa καὶ como simple conectivo, no adversativo; en español se mantiene 'y' (no 'sin embargo'), siguiendo la lógica de la revisión inglesa que eliminó 'yet'.
- source_word: πτωχούς
  english_pob_choice: the poor
  chosen_spanish: a los pobres
  alternatives_spanish:
  - con los pobres
  lexicon: BDAG s.v. πτωχός (1)
  rationale: πτωχός designa a los destitutos, los pobres mendicantes. 'A los pobres' funciona como objeto directo de 'muestra misericordia' con la preposición de objeto personal requerida por el español.
- source_word: διπρόσωπον
  english_pob_choice: double-faced
  chosen_spanish: de doble cara
  alternatives_spanish:
  - bifronte
  - de dos rostros
  - hipócrita
  lexicon: LSJ s.v. δίπρόσωπος; Charles 1908 apparatus
  rationale: διπρόσωπον (δι- = doble + πρόσωπον = cara/rostro) es término técnico en el esquema ético del Testamento de Aser para describir al que mezcla actos buenos y malos sin que el conjunto sea bueno. Se preserva el calco semántico 'de doble cara' en lugar de 'hipócrita', que perdería la metáfora visual propia de este texto y su marco de los Dos Caminos. Véase nota [a].
- source_word: πονηρόν
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - malvado
  - perverso
  lexicon: BDAG s.v. πονηρός (1b)
  rationale: πονηρόν (malo, perverso, moralmente corrompido) se traduce como 'malo' para mantener la precisión léxica sin amplificar; 'malvado' o 'perverso' añadirían connotaciones de grado superior no necesariamente exigidas por el griego en este contexto predicativo.
theological_decisions:
- issue: El concepto de doble cara (διπρόσωπον) como categoría ética
  english_pob_reading: double-faced
  chosen_spanish_reading: de doble cara
  alternative_spanish_readings:
  - de dos rostros
  - hipócrita
  - ambivalente
  rationale: El Testamento de Aser articula un esquema ético en el que las personas 'de doble cara' mezclan actos buenos y malos, pero sin que la buena acción redima el conjunto (τὸ δὲ ὅλον πονηρόν). La traducción 'de doble cara' preserva el vocabulario técnico de la tradición de los Dos Caminos presente en esta obra. Sustituirlo por 'hipócrita' alteraría el marco teológico del texto, ya que la hipocresía implica fingimiento consciente, mientras que διπρόσωπον apunta a la dualidad estructural de la conducta. El texto afirma que incluso la misericordia genuina hacia los pobres no corrige el carácter malvado del conjunto cuando va acompañada de robo, injusticia y codicia.
  doctrine_reference: Testamento de Aser 1:3–5 (marco de las dos inclinaciones/dos caminos); cf. Santiago 1:8 (ἀνὴρ δίψυχος) para concepto paralelo en el NT
- issue: El καὶ como conector simple ante ἐλεεῖ (no adversativo)
  english_pob_reading: and shows mercy (not 'and yet shows mercy')
  chosen_spanish_reading: y muestra misericordia
  alternative_spanish_readings:
  - y sin embargo muestra misericordia
  - pero muestra misericordia
  rationale: La revisión inglesa eliminó 'yet' para no añadir énfasis adversativo ausente en el griego. Teológicamente, la ausencia de contraste subraya que los actos misericordiosos de este personaje no son presentados como una ruptura, sino como parte integrada de su conducta contradictoria. El texto señala que la mezcla misma es el problema, no que la misericordia sea una excepción virtuosa. En español se usa 'y' (no 'sin embargo' ni 'pero') para respetar este matiz.
  doctrine_reference: 'T12P.ASH.2.5; applied_revisions: eliminación de ''yet'' por azure-gpt-5.4-revision-pass (2026-04-23)'
translation_notes:
  revision_awareness: 'La revisión inglesa (azure-gpt-5.4, 2026-04-23) eliminó ''yet'' de «and yet shows mercy» para evitar añadir énfasis adversativo no presente en el καὶ griego. El borrador español sigue la misma lógica: usa ''y'' como simple conectivo ante ''muestra misericordia'', sin introducir ''sin embargo'', ''pero'' u otro marcador adversativo. Esto preserva la intención del texto de presentar la misericordia como parte del patrón conductual desdoblado, no como ruptura virtuosa con él.'
  spanish_consistency_notes:
  - No aparece el nombre divino (YHWH/Yahvé) en este versículo; la norma del proyecto no se activa.
  - No hay terminología cristológica ni pneumatológica en este pasaje.
  - Se mantiene 'de doble cara' (calco semántico de διπρόσωπον) como término técnico del vocabulario de los Dos Caminos, coherente con la necesidad de que otros versículos del Testamento de Aser usen el mismo término cuando aparezca la misma palabra griega.
  - La serie de verbos en presente (roba, obra, arrebata, codicia, muestra) reproduce el aspecto habitual/continuo del griego con formas del presente de indicativo en español, sin añadir perifrásticos de aspecto que no exige el original.
  - El texto pertenece a literatura pseudoepigráfica (Testamentos de los Doce Patriarcas, piloto del proyecto POB); no se aplican convenciones canónicas de mayúsculas para pronombres divinos ni divisiones de versículos heredadas de tradiciones eclesiales.
