id: T12P.ASH.2.3
reference: Testament of Asher 2:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: Ἔστιν ἄνθρωπος ἀγαπῶν πονηρευόμενον †ὃ ἐστι πονηρία†¹³, ὅτι καὶ ἀποθανεῖν αἱρεῖται ἐν κακῷ· καὶ περὶ τούτου φανερόν ἐστι †τὸ ὅλον†¹⁴ διπρόσωπόν ἐστι τὸ δὲ πᾶν κακὴ πρᾶξις.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/002/003.yaml
  text: And there is a man who loves one who acts wickedly, because he himself also chooses to die in evil on that man's account; and concerning this it is plain that he is double-faced, but the whole of it is an evil deed.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:50Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Hay un hombre que ama al que obra mal[a], pues también él mismo elige morir en el mal; y acerca de esto es manifiesto[b] que es de doble cara[c], pero todo ello es una obra malvada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego incluye la frase marcada con óbelos †ὃ ἐστι πονηρία†¹³ («lo cual es maldad») inmediatamente después de «al que obra mal», indicando que Charles la considera corrupta o una glosa. El POB inglés no la reproduce por separado. Esta traducción sigue ese juicio editorial.
    reason: textual_variant
  - marker: b
    text: Una segunda frase marcada †τὸ ὅλον†¹⁴ («el todo / la totalidad») precede a «de doble cara» en el griego, haciendo incierta la sintaxis de esta cláusula. Charles marca ambos pasajes como problemáticos. «Es manifiesto» traduce el φανερόν ἐστι no disputado; la función sintáctica de la frase marcada no puede establecerse con certeza a partir del texto extante.
    reason: textual_variant
  - marker: c
    text: Griego διπρόσωπος, literalmente «de dos caras / de doble cara». Es el término ético central de la enseñanza de Aser sobre los dos caminos morales (cf. T. Asher 2:1–2; 4:1). Se prefiere a «hipócrita» para preservar la imagen estructural del texto y la coherencia terminológica con el resto del Testamento de Aser.
    reason: theological_note
lexical_decisions:
- source_word: πονηρευόμενον
  english_pob_choice: one who acts wickedly
  chosen_spanish: al que obra mal
  alternatives_spanish:
  - al que actúa malvadamente
  - al que hace el mal
  - el malhechor
  lexicon: BDAG πονηρεύομαι
  rationale: Participio presente que señala actividad malvada continua. 'Al que obra mal' es idiomático y natural en español, preservando la fuerza participial sin resultar torpe. 'Al que actúa malvadamente' es más literal pero estilísticmente pesado.
- source_word: αἱρεῖται
  english_pob_choice: chooses
  chosen_spanish: elige
  alternatives_spanish:
  - escoge
  - opta por
  lexicon: BDAG αἱρέομαι (voz media)
  rationale: La voz media de αἱρέομαι expresa una elección deliberada y personal. 'Elige' capta bien esta fuerza volitiva en español. 'Escoge' es igualmente válido pero 'elige' tiene registro algo más formal, adecuado para el género testamentario.
- source_word: ἀποθανεῖν ἐν κακῷ
  english_pob_choice: to die in evil
  chosen_spanish: morir en el mal
  alternatives_spanish:
  - morir en la maldad
  - morir haciendo el mal
  lexicon: BDAG ἀποθνῄσκω + κακός
  rationale: '''En el mal'' preserva tanto el estado como la esfera de sentido que transmite ἐν κακῷ. ''En la maldad'' también es posible, pero ''el mal'' mantiene la correspondencia con el uso de κακός / κακὴ en el mismo versículo.'
- source_word: φανερόν ἐστι
  english_pob_choice: it is plain
  chosen_spanish: es manifiesto
  alternatives_spanish:
  - es evidente
  - está claro
  - es obvio
  lexicon: BDAG φανερός
  rationale: '''Manifiesto'' mantiene el registro declarativo y formal de φανερός, apropiado para el género testamentario y para la sentencia moral que introduce.'
- source_word: διπρόσωπος
  english_pob_choice: double-faced
  chosen_spanish: de doble cara
  alternatives_spanish:
  - hipócrita
  - de dos caras
  - bifronte
  - de doble rostro
  lexicon: LSJ διπρόσωπος; compuesto de δι- + πρόσωπον
  rationale: Este es el término ético central de la taxonomía moral de Aser, estructurada en torno a personas de 'una cara' (buenas) frente a personas 'de doble cara' (moralmente duplices). 'De doble cara' preserva la imagen literal del compuesto griego y mantiene el vínculo estructural con la enseñanza de los dos caminos a lo largo del Testamento de Aser. 'Hipócrita' traduciría interpretativamente, borrando la imagen visual y la coherencia terminológica del texto.
- source_word: κακὴ πρᾶξις
  english_pob_choice: evil deed
  chosen_spanish: obra malvada
  alternatives_spanish:
  - acción malvada
  - acto malo
  - mala acción
  lexicon: BDAG πρᾶξις + κακός
  rationale: πρᾶξις designa una acción, acto o práctica concreta. 'Obra malvada' es natural en español y corresponde al par κακή (malvada) + πρᾶξις (obra/acto). Se prefiere 'obra' a 'acción' por su mayor resonancia en el vocabulario ético de la literatura bíblica y pseudoepigráfica en español.
theological_decisions:
- issue: Rendering del término estructural διπρόσωπος en el marco ético de Aser
  english_pob_reading: double-faced
  chosen_spanish_reading: de doble cara
  alternative_spanish_readings:
  - hipócrita
  - de dos caras
  - de doble rostro
  rationale: 'El Testamento de Aser organiza su enseñanza moral en torno a los ''dos rostros'' (δύο πρόσωπα): la persona genuinamente buena es de ''una sola cara''; la persona moralmente duplice es ''de doble cara''. Traducir como ''hipócrita'' domesticaría el concepto en vocabulario cristiano familiar pero destruiría la coherencia terminológica del texto y la imagen arquitectónica de la obra. ''De doble cara'' preserva la literalidad del compuesto y debe aplicarse consistentemente en todo el Testamento de Aser.'
  doctrine_reference: T12P.ASH marco de los dos caminos / dos rostros (cf. T. Asher 2:1–2; 3:1; 4:1–5)
- issue: La adición interpretativa 'on that man's account' del POB inglés no tiene correspondencia en el griego
  english_pob_reading: he himself also chooses to die in evil on that man's account
  chosen_spanish_reading: también él mismo elige morir en el mal
  alternative_spanish_readings:
  - también él mismo elige morir en el mal por amor a ese hombre
  rationale: El griego ὅτι καὶ ἀποθανεῖν αἱρεῖται ἐν κακῷ no contiene frase prepositional equivalente a 'on that man's account' (que requeriría algo como δι᾽ αὐτόν o ἕνεκα τούτου). El POB inglés añade una interpretación contextualmente plausible —el hombre ama al malvado y, a causa de ese amor, elige también morir en el mal— pero excede lo que el texto griego extante sostiene. La traducción española se mantiene más cercana al griego para preservar la transparencia fuente exigida por el proyecto POB.
  doctrine_reference: 'Principio de equivalencia óptima: no parafrasear más allá de lo que la evidencia fuente avala'
translation_notes:
  revision_awareness: 'El último ciclo de revisión del POB inglés (gpt-5.4, 2026-04-23) no encontró cambios necesarios en el texto inglés (unchanged: true). La verificación cruzada arrojó acuerdo moderado (0,78) con problemas menores (minor-issues). Este borrador español aborda los principales puntos de incertidumbre del texto fuente mediante: (1) notas a pie sobre las dos frases con óbelos de Charles, cuya ausencia del POB inglés no quedaba explicitada; (2) no reproducción de la adición interpretativa «on that man''s account» del POB inglés, que carece de base en el griego extante; (3) conservación de «de doble cara» como término técnico de la taxonomía moral de Aser en lugar de normalizarlo a vocabulario eclesiástico convencional.'
  spanish_consistency_notes:
  - No aparece el nombre divino (YHWH/κύριος) en este versículo; no se requiere decisión de representación.
  - No hay terminología cristológica (texto pseudoepigráfico extracanónico anterior al uso cristiano); los valores predeterminados Yahvé/Mesías/Jesús no se aplican.
  - «Obra malvada» para κακὴ πρᾶξις es la propuesta establecida para el vocabulario moral de este testamento; debe mantenerse consistente en T12P.ASH.
  - «De doble cara» para διπρόσωπος debe aplicarse de manera uniforme en todo el Testamento de Aser, dado que es el término estructurante de la enseñanza ética de la obra.
  - '«El mal» (κακόν / κακός) y «maldad» (πονηρία) se distinguen en este versículo: «obra mal» corresponde a πονηρευόμενον y «el mal» corresponde a κακῷ. Esta distinción debe mantenerse en versículos adyacentes.'
