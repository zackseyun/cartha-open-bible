id: T12P.ASH.2.2
reference: Testament of Asher 2:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: Ἔστιν⁸ ἄνθρωπος ὃς⁹ οὐκ οἰκτείρει¹⁰ *λειτουργοὺς αὐτοῦ¹¹. καίγε τοῦτο διπρόσωπον¹², ἀλλὰ τὸ ὅλον πονηρόν ἐστιν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/002/002.yaml
  text: There is a man who does not pity his servants; and though this is double-faced, the whole of it is evil.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:50Z'
    unchanged: false
    changes_summary: Removed 'own' because αὐτοῦ with λειτουργούς is adequately conveyed by 'his servants' and 'own' adds unnecessary emphasis not required by the Greek.
translation:
  language: es
  text: Hay un hombre que no se apiada de sus servidores[a]; y aunque esto es de doble cara[b], todo ello es malo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Gr. λειτουργούς (leitourgous): término que abarca servidores domésticos, asistentes o ministros; no es el vocablo griego habitual para esclavo (δοῦλος). El matiz funcional —quien presta un servicio— justifica ''servidores'' frente a ''siervos''.'
    reason: lexical_alternative
  - marker: b
    text: Gr. διπρόσωπον (diprósopon), lit. 'de dos caras/rostros'. Es un término técnico en los Testamentos de los Doce Patriarcas para describir actos o caracteres moralmente ambiguos dentro del esquema de las Dos Vías. El texto insiste en que, aunque algo parezca mixto, su totalidad sigue siendo mala. Cf. Testamento de Aser 1:3–5.
    reason: theological_note
lexical_decisions:
- source_word: οἰκτείρει
  english_pob_choice: pity
  chosen_spanish: se apiada
  alternatives_spanish:
  - tiene compasión de
  - se compadece de
  - muestra misericordia
  lexicon: 'LSJ: οἰκτείρω — to pity, feel compassion for, show mercy toward'
  rationale: οἰκτείρω denotes an emotional response of pity or compassion toward a vulnerable party. 'Se apiada' (from 'apiadarse') captures both the emotional and volitional dimensions naturally in modern Spanish. 'Tiene compasión' is also accurate but more verbose; 'se compadece' is equally valid. 'Se apiada' was chosen for concision and mild literary register, matching the tone of the source.
- source_word: λειτουργούς
  english_pob_choice: servants
  chosen_spanish: servidores
  alternatives_spanish:
  - siervos
  - ministros
  - criados
  lexicon: 'LSJ: λειτουργός — one who performs public service; servant, minister; in LXX/NT also liturgical minister'
  rationale: λειτουργός in this T12P ethical context most likely denotes household attendants or subordinates who serve the man. 'Servidores' is chosen over 'siervos' because λειτουργός is not δοῦλος (the term that maps to 'esclavo/siervo' in POB defaults); it carries a functional service role rather than strictly marking slave status. 'Ministros' would over-ecclesiasticize the term in this non-liturgical passage. The English POB correctly retained the general 'servants'; 'servidores' is the natural Spanish equivalent.
- source_word: διπρόσωπον
  english_pob_choice: double-faced
  chosen_spanish: de doble cara
  alternatives_spanish:
  - bifronte
  - de dos caras
  - hipócrita
  lexicon: 'LSJ: δίπροσωπος — two-faced, having two faces; T12P ethical usage: an action or person that appears ambiguous/mixed but conceals a dominant moral quality'
  rationale: '''De doble cara'' is the clearest and most natural rendering of διπρόσωπον in modern Spanish. ''Bifronte'' is a more literary/archaic cognate but less immediately understood. ''Hipócrita'' (hypocrite) would be an interpretive overtranslation, collapsing the T12P ''two-ways'' ethical nuance into personal deception. The English POB preserved ''double-faced'' to keep the T12P technical flavor; ''de doble cara'' does the same in Spanish.'
- source_word: πονηρόν
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - malvado
  - perverso
  - inicuo
  lexicon: 'LSJ: πονηρός — bad, evil, wicked; morally depraved'
  rationale: '''Malo'' is the direct, unadorned rendering of πονηρόν and best mirrors the blunt ethical verdict the author delivers. ''Malvado'' or ''perverso'' would intensify the force beyond what the source warrants. The predicate construction ''todo ello es malo'' parallels the Greek ''τὸ ὅλον πονηρόν ἐστιν'' naturally.'
- source_word: καίγε
  english_pob_choice: and though
  chosen_spanish: y aunque
  alternatives_spanish:
  - y aun cuando
  - y sin embargo
  - y aun así
  lexicon: 'BDAG / LSJ: καίγε — emphatic particle, ''and indeed,'' ''and yet,'' ''even though'''
  rationale: The English POB rendered the concessive force with 'and though.' 'Y aunque' is the standard Spanish concessive conjunction and renders this naturally. The indicative 'es' (not subjunctive 'sea') is used because the clause asserts a known fact about this man's behavior—its double-facedness is presented as an observable reality, not a hypothetical.
theological_decisions:
- issue: διπρόσωπον as a T12P ethical-theological category
  english_pob_reading: double-faced
  chosen_spanish_reading: de doble cara
  alternative_spanish_readings:
  - bifronte
  - de dos caras
  - de doble faz
  rationale: In the Testaments of the Twelve Patriarchs, διπρόσωπον is a technical concept tied to the 'Two Ways' (Two Inclinations) moral framework. An action may outwardly appear ambiguous—partly good, partly bad—but the text here insists the whole (τὸ ὅλον) is evil. Preserving 'de doble cara' rather than a moralizing gloss (e.g., 'hipócrita') keeps the reader anchored to this two-ways schema. A translator's note is warranted for readers unfamiliar with T12P ethics.
  doctrine_reference: T12P Two Ways (Two Inclinations) ethical framework; cf. Testament of Asher 1:3–5 on the dual nature of actions
translation_notes:
  revision_awareness: 'The English POB underwent one revision (2026-04-23, gpt-5.4): ''his own servants'' was corrected to ''his servants'' because αὐτοῦ with λειτουργούς does not warrant the emphatic ''own''. The Spanish ''sus servidores'' (without any reinforcing ''propios'') follows this adjudicated reading exactly — ''sus'' alone is the standard Spanish possessive and carries no extra emphatic force.'
  spanish_consistency_notes:
  - No divine name (YHWH/κύριος) appears in this verse; the project's Yahvé default is not triggered.
  - No δοῦλος appears; 'esclavo' default is not triggered. λειτουργούς → 'servidores' per lexical reasoning above.
  - No σάρξ, πνεῦμα, δικαιοσύνη, χάρις, or Christological terms appear; relevant project defaults do not apply here.
  - 'Punctuation follows Spanish conventions: semicolon retained to separate the two clauses as in the English POB, matching the source''s period followed by a connective particle (καίγε).'
