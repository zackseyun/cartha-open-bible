translation:
  language: es
  text: Los tales son como liebres[a], pues son a medias puros[b], pero en verdad son impuros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gr. δασύποδες, lit. «de patas peludas», el término griego estándar para la liebre. La liebre aparece en Lev 11:6 y Deut 14:7 como animal que rumia pero carece de pezuña hendida, quedando «a medias» en los criterios levíticos de pureza. El griego dice literalmente «son liebres» (εἰσι δασύποδες) sin partícula comparativa; se añade «como» para hacer explícita la figura.
    reason: cultural_note
  - marker: b
    text: Gr. ἐξ ἡμισείας, «desde la mitad / a medias». Alude a cumplir solo uno de los dos requisitos de la Torá para que un animal sea ritualmente puro (rumiar el bolo o tener pezuña hendida). La imagen tipifica a quienes tienen apariencia parcial de bondad pero son fundamentalmente impuros.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ τοιοῦτοί
  english_pob_choice: Such people
  chosen_spanish: Los tales
  alternatives_spanish:
  - Tales personas
  - Quienes son así
  - Semejantes
  lexicon: 'BDAG τοιοῦτος: ''of such a kind, such as this''; demonstrative pronoun used for persons already characterized in context.'
  rationale: El demostrativo griego retoma a los personajes descritos en el contexto inmediato (los de doble naturaleza moral). 'Los tales' es la expresión española que mejor conserva el valor deíctico con registro formal sin añadir 'personas', que el griego no explicita. El POB inglés añade 'people' para claridad; en español 'los tales' lo implica igualmente sin paráfrasis.
- source_word: δασύποδες
  english_pob_choice: hares
  chosen_spanish: liebres
  alternatives_spanish:
  - conejos
  lexicon: 'LSJ δασύπους: ''hare'' (lit. ''thick/hairy-footed''); animal mencionado en LXX Lev 11:6 y Deut 14:7 como impuro.'
  rationale: '''Liebres'' es la traducción directa y establecida de δασύποδες en español, correspondiendo a Lev 11:6 / Deut 14:7. No debe confundirse con ''conejos'' (κύνικλος). La frase griega εἰσι δασύποδες es predicación metafórica directa (''son liebres''); el POB inglés añade ''like'' para hacer explícita la figura; se adopta igualmente ''como liebres'' en español por claridad sin alterar el sentido.'
- source_word: ἐξ ἡμισείας
  english_pob_choice: half (clean)
  chosen_spanish: a medias puros
  alternatives_spanish:
  - en parte puros
  - medio puros
  - parcialmente puros
  lexicon: 'LSJ ἡμίσεια: ''half''; ἐξ ἡμισείας = ''from half / halfway / in part''.'
  rationale: '''A medias puros'' es locución española natural para expresar incompletitud (''half clean''). Capta el matiz de cumplir solo parcialmente un estándar —en contexto, una sola de las dos condiciones levíticas (rumiar el bolo o tener pezuña hendida)— sin resultar artificioso. ''En parte puros'' sería igualmente válido pero menos idiomático.'
- source_word: τὸ δ᾽ ἀληθὲς
  english_pob_choice: but in truth
  chosen_spanish: pero en verdad
  alternatives_spanish:
  - mas la verdad es que
  - pero verdaderamente
  lexicon: 'BDAG ἀληθής: ''true, genuine, real''; τὸ ἀληθές = ''the truth / in truth / in reality''. δέ marks adversative.'
  rationale: '''Pero en verdad'' conserva la oposición adversativa (δέ) y la apelación a la realidad profunda (ἀληθές) frente a la apariencia de pureza parcial. Es la expresión más natural y directa en español moderno.'
- source_word: καθαροί / ἀκάθαρτοι
  english_pob_choice: clean / unclean
  chosen_spanish: puros / impuros
  alternatives_spanish:
  - limpios / inmundos
  - puros / inmundos
  lexicon: 'BDAG καθαρός: ''clean, pure'' (ritual/moral); ἀκάθαρτος: ''unclean, impure''. LXX usa ambos términos en Lev 11 para las categorías alimentarias.'
  rationale: '''Puros/impuros'' es la pareja más clara y simétrica en español moderno para el ámbito de la pureza ritual y moral. La tradición Reina-Valera prefiere ''limpios/inmundos'' para Lev 11, pero ''puros/impuros'' es igualmente atestado, más transparente en un texto moral-tipológico y evita la ambigüedad higiénica de ''limpio''.'
theological_decisions:
- issue: Comparación con la liebre como símbolo de impureza parcial
  english_pob_reading: Such people are like hares, because they are half clean, but in truth they are unclean.
  chosen_spanish_reading: Los tales son como liebres, pues son a medias puros, pero en verdad son impuros.
  alternative_spanish_readings:
  - Tales son liebres, porque son parcialmente puros, pero en verdad son inmundos.
  rationale: 'El Testamento de Aser desarrolla una tipología moral en la que animales del código levítico (Lev 11:6; Deut 14:7) sirven de figura para categorías de personas. La liebre (δασύπους) rumia el bolo pero no tiene pezuña hendida: cumple solo uno de los dos criterios de pureza. Esto la convierte en el símbolo perfecto del ''doble de naturaleza'' (cf. T12P.ASH.2 passim): aparentemente parcialmente bueno pero fundamentalmente impuro. La traducción española preserva esta tensión ritual-moral sin resolverla en paráfrasis.'
  doctrine_reference: Lev 11:6; Deut 14:7; Testamento de Aser 2 (tipología moral de doble naturaleza, literatura del Segundo Templo)
translation_notes:
  revision_awareness: El registro del POB inglés indica un único pase de revisión (gpt-5.4, 2026-04-23) sin cambios aplicados y con estado 'high_agreement' (0.93) en la verificación cruzada. No hay decisiones léxicas o teológicas previas en inglés que restrinjan el borrador español; todas las decisiones se toman directamente desde el griego fuente.
  spanish_consistency_notes:
  - Se usan 'puros/impuros' de forma consistente para el par καθαρός/ἀκάθαρτος en este texto moral-tipológico; si otros versículos del Testamento de Aser usan 'limpios/inmundos', deberá armonizarse en revisión de pasaje.
  - No aparece terminología YHWH, Mesías, ni δοῦλος en este versículo; los defaults del proyecto no se activan.
  - '''Los tales'' como traducción de Οἱ τοιοῦτοί debe verificarse contra versículos anteriores del mismo capítulo para mantener coherencia referencial.'
