id: T12P.ASH.2.1
reference: Testament of Asher 2:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: II. *Ἔστιν οὖν¹ ἡ² ψυχὴ *ἐν λόγοις †ἀφιστῶσα³ τὸ καλὸν ὑπὲρ *τοῦ κακοῦ⁴, καὶ *τὸ τέλος⁵ *τοῦ πράγματος⁶ εἰς κακίαν †ἄγων⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/002/001.yaml
  text: There is, then, a soul that in words turns away from the good for the sake of evil, and leads the outcome of the matter into wickedness.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:50Z'
    unchanged: false
    changes_summary: Changed 'in its words' to 'in words' for closer alignment with the Greek, and 'turns away the good' to 'turns away from the good' to reflect ἀφιστῶσα more naturally and accurately.
translation:
  language: es
  text: Existe, pues, el alma[a] que en palabras[b] se aparta de lo bueno a favor del mal[c], y conduce el desenlace del asunto hacia la maldad[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Gr. ἡ ψυχή con artículo definido, indicando una categoría o tipo de alma, no un individuo indeterminado. En el contexto de la tipología moral de T12P.ASH.2, funciona como genérico: «el alma [de tal tipo]».'
    reason: theological_note
  - marker: b
    text: Gr. ἐν λόγοις, «en palabras», sin pronombre posesivo en el original; la alternativa «de palabra» sería más idiomática en español pero añadiría un matiz de contraste (dicho vs. hecho) no explícito en el griego.
    reason: lexical_alternative
  - marker: c
    text: 'Gr. †ἀφιστῶσα τὸ καλὸν ὑπὲρ τοῦ κακοῦ. El dagger (†) señala dificultad textual en la edición Charles. El participio ἀφιστῶσα puede leerse transitivamente: «aparta lo bueno a favor del mal» (el alma desplaza activamente lo bueno), o intransitivamente: «se aparta de lo bueno a favor del mal» (el alma se aleja). El POB inglés adoptó la lectura intransitiva; la transitiva permanece como alternativa válida.'
    reason: textual_variant
  - marker: d
    text: Gr. †ἄγων, participio masculino de ἄγω; dagger indica anomalía textual, pues el sujeto ψυχή es femenino (esperaríamos ἄγουσα). «Desenlace» traduce τέλος (también «fin», «resultado»); se optó por «desenlace» para evitar la connotación escatológica de «fin».
    reason: textual_variant
lexical_decisions:
- source_word: ψυχή
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - ser
  - persona
  - individuo
  lexicon: BDAG ψυχή §3
  rationale: ψυχή en los Testamentos de los Doce Patriarcas denota el agente moral interior. «Alma» es la equivalencia natural en español y mantiene la fuerza teológica del original; «ser» o «persona» aplanarían el matiz espiritual del texto.
- source_word: ἐν λόγοις
  english_pob_choice: in words
  chosen_spanish: en palabras
  alternatives_spanish:
  - de palabra
  - con sus palabras
  - verbalmente
  lexicon: LSJ λόγος §4
  rationale: El griego no lleva pronombre posesivo (ausencia confirmada por la revisión del POB que eliminó «in its words»). «En palabras» conserva la literalidad y el ámbito retórico-verbal sin añadir un posesivo inexistente en el texto. «De palabra» sería más idiomático en español pero implicaría contraste con los hechos, matiz no explícito en el griego.
- source_word: ἀφιστῶσα (†)
  english_pob_choice: turns away from the good
  chosen_spanish: se aparta de lo bueno
  alternatives_spanish:
  - aparta lo bueno
  - aleja lo bueno
  - abandona lo bueno
  lexicon: BDAG ἀφίστημι §2
  rationale: El participio ἀφιστῶσα (marcado con dagger †, indicando dificultad textual) admite lectura transitiva («aparta lo bueno») e intransitiva («se aparta de lo bueno»). La revisión del POB inglés adoptó la lectura intransitiva para reflejar ἀφίστημι con más naturalidad; el español «se aparta de lo bueno» sigue ese razonamiento y produce sintaxis fluida. Se preserva la alternativa transitiva en nota al pie.
- source_word: τὸ καλόν
  english_pob_choice: the good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - el bien
  - lo recto
  lexicon: LSJ καλός §II.2
  rationale: Adjetivo sustantivado neutro; «lo bueno» es el equivalente español directo y conserva la amplitud semántica del original (lo moralmente bueno/honorable). «El bien» acentuaría una abstracción filosófica más estrecha.
- source_word: ὑπὲρ τοῦ κακοῦ
  english_pob_choice: for the sake of evil
  chosen_spanish: a favor del mal
  alternatives_spanish:
  - por causa del mal
  - en lugar del bien
  - por encima del mal
  lexicon: BDAG ὑπέρ §A.1
  rationale: ὑπέρ + genitivo puede indicar propósito/beneficio («a favor de») o sustitución («en lugar de»). En este contexto moral, «a favor del mal» captura la inclinación deliberada del alma hacia el κακόν. «Por encima del mal» (sentido espacial) sería gramaticalmente posible pero contextualmente inadecuado.
- source_word: τὸ τέλος
  english_pob_choice: outcome
  chosen_spanish: el desenlace
  alternatives_spanish:
  - el fin
  - el resultado
  - el término
  lexicon: BDAG τέλος §1b
  rationale: 'τέλος puede significar «fin», «resultado» o «desenlace». El POB inglés eligió «outcome» para evitar la connotación escatológica de «end». «Desenlace» en español reproduce ese mismo esfuerzo: indica el resultado final de un proceso sin necesariamente implicar un fin último o teológico. «Resultado» sería igualmente válido.'
- source_word: τοῦ πράγματος
  english_pob_choice: of the matter
  chosen_spanish: del asunto
  alternatives_spanish:
  - de la acción
  - del hecho
  - de la cosa
  lexicon: LSJ πρᾶγμα §1
  rationale: πρᾶγμα designa «asunto, hecho, acción, cosa». «Del asunto» es neutro y abierto, como el griego, sin especificar si se trata de una acción concreta o una situación. «De la acción» limitaría el sentido innecesariamente.
- source_word: κακίαν
  english_pob_choice: wickedness
  chosen_spanish: la maldad
  alternatives_spanish:
  - la malicia
  - el vicio
  - la perversidad
  lexicon: BDAG κακία §1
  rationale: κακία es el sustantivo abstracto de κακός; en el contexto moral de los Testamentos refiere a la disposición viciosa o activa malevolencia. «Maldad» es la equivalencia más amplia y digna en español; «malicia» introduciría un matiz de astucia calculada no necesariamente presente.
- source_word: ἄγων (†)
  english_pob_choice: leads
  chosen_spanish: conduce
  alternatives_spanish:
  - lleva
  - arrastra
  - guía
  lexicon: LSJ ἄγω §I.1
  rationale: ἄγω = «llevar, conducir, guiar». «Conduce» preserva la agencia deliberada del verbo. Se nota en pie de página que ἄγων (†) es participio masculino que no concuerda con ψυχή (femenino), anomalía textual señalada con dagger en la edición Charles.
theological_decisions:
- issue: Naturaleza de ψυχή en el contexto de los Testamentos
  english_pob_reading: a soul
  chosen_spanish_reading: el alma
  alternative_spanish_readings:
  - una persona
  - un ser
  rationale: En los Testamentos de los Doce Patriarcas, ψυχή funciona como agente moral interior, no meramente como «vida» o «persona». Este versículo introduce una tipología de almas (cf. contexto de T12P.ASH.2), por lo que «el alma» con artículo definido señala un tipo o categoría moral específica, no un individuo indeterminado. El artículo ἡ en el griego apoya el uso definido/genérico.
  doctrine_reference: Testamentos de los Doce Patriarcas, marco ético-dualista
- issue: 'Dualismo moral implícito: τὸ καλόν / τὸ κακόν'
  english_pob_reading: the good … evil
  chosen_spanish_reading: lo bueno … el mal
  alternative_spanish_readings:
  - el bien … el mal
  rationale: 'El texto contrapone τὸ καλόν (lo moralmente bueno/honorable) y τὸ κακόν (el mal moral). El español «lo bueno» y «el mal» mantiene la asimetría del original: el primero es adjetivo sustantivado (aspecto cualitativo), el segundo ya funciona como sustantivo establecido. Usar «el bien» para ambos normalizaría filosóficamente un texto que opera con categorías éticas más fluidas.'
  doctrine_reference: Marco de los dos caminos / dos espíritus, común en literatura judía del Segundo Templo
- issue: 'Ambigüedad de ἀφιστῶσα: ¿el alma aparta lo bueno o se aparta del bien?'
  english_pob_reading: turns away from the good for the sake of evil
  chosen_spanish_reading: se aparta de lo bueno a favor del mal
  alternative_spanish_readings:
  - aparta lo bueno a favor del mal
  - aleja lo bueno en favor del mal
  rationale: La lectura transitiva («aparta lo bueno») sugiere que el alma desplaza o elimina activamente lo bueno; la intransitiva («se aparta de lo bueno») enfatiza el movimiento de alejamiento del alma misma. La dagger (†) en Charles indica incertidumbre textual. El POB inglés adoptó la lectura intransitiva en su revisión final; el español la sigue. La lectura transitiva se preserva como alternativa en nota al pie por su validez gramatical y su peso teológico diferenciado.
  doctrine_reference: Ética de la intención vs. ética del acto en la literatura sapiencial judía
translation_notes:
  revision_awareness: 'El POB inglés sufrió una revisión (2026-04-23, azure-gpt-5.4) que modificó dos elementos: (1) eliminó el posesivo «in its words» → «in words», alineándose con el griego ἐν λόγοις que carece de pronombre; (2) cambió «turns away the good» (transitivo) por «turns away from the good» (intransitivo) para reflejar ἀφιστῶσα con mayor naturalidad. El texto español sigue ambas decisiones de la versión revisada: «en palabras» (sin posesivo) y «se aparta de lo bueno» (intransitivo). La tensión transitiva/intransitiva se preserva en nota al pie [c], ya que el texto griego con dagger (†) no permite certeza absoluta.'
  spanish_consistency_notes:
  - No hay nombres divinos (YHWH, κύριος, θεός) en este versículo; las terminología-por-defecto del proyecto no se activan aquí.
  - '«Maldad» para κακία y «mal» para κακόν se emplean de forma diferenciada: κακία (sustantivo abstracto) → «maldad»; τὸ κακόν (adjetivo sustantivado) → «el mal». Esta distinción debe mantenerse en los versículos adyacentes de T12P.ASH.2.'
  - El artículo definido en «el alma» refleja el uso genérico-tipológico del griego ἡ ψυχή en el marco de clasificación moral del capítulo; versículos posteriores que introduzcan tipos distintos deben mantener el mismo patrón sintáctico para coherencia narrativa.
  - «Conduce» para ἄγω es coherente con traducciones de este verbo en otros pasajes de la serie T12P; verificar uniformidad al revisar el conjunto del capítulo.
