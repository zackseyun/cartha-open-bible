    issue: 'V.2: ''dos obras, una buena y una mala'' reflects the pre-revision EN splitting each act into discrete good and evil events. The EN revision changed to ''do two things, good and evil'' (i.e., ''of good and of evil'') to reflect the genitival structure showing both qualities inhere in the same acts. Spanish should have ''dos obras de bien y de mal'' (matching the per-verse file 004/002).'
    rationale: The Greek genitives καλοῦ τε καὶ κακοῦ are genitives of quality qualifying ἔργα—the acts partake of both good and evil, not one act is good and another evil. 'Una buena y una mala' misrepresents the Greek structure.
  - severity: low
    issue: 'V.3: ''junto a lo que es verdaderamente bueno''—''junto a'' is slightly weaker for the Greek μετά (accompaniment/combination) than ''junto con'' used in the per-verse file 004/003.'
    rationale: μετά + genitive = together with/along with. 'junto con' is more precise.
  revised_spanish_text: 'IV. 1 Pues las personas buenas, siendo de una sola cara[a], aunque los de doble cara[b] las consideren pecadoras, son justas ante Dios. 2 Y muchos, al eliminar a los malvados, realizan dos obras de bien y de mal; sin embargo, el conjunto es bueno, porque ha arrancado de raíz y destruido el mal. 3 Hay quien odia al misericordioso e injusto, y al adúltero y al que ayuna; esto también es de doble cara, pero toda la obra es buena, porque imita al Señor[c], sin aguardar lo que solo parece bueno junto con lo que es verdaderamente bueno[d]. 4 Otro no desea ver días buenos con los disolutos[e], para no mancillar su cuerpo ni contaminar su alma. Aunque esto también es de doble cara, es del todo bueno. 5 Pues tales hombres son semejantes a las gacelas y a los ciervos: por su porte como de animales salvajes parecen ser impuros, pero en todo son puros[f], porque caminan con celo por el Señor, apartándose de lo que Dios también aborrece y prohíbe mediante sus mandamientos, apartando
    así el mal del bien[g].'
  revised_footnotes:
  - marker: a
    text: 'Griego μονοπρόσωποι, lit. «de una sola cara». Alternativas posibles: «íntegros» o «sinceros», pero estas suavizan la metáfora del rostro que estructura todo el capítulo en contraste con los «de doble cara» (διπρόσωποι).'
    reason: lexical_alternative
  - marker: b
    text: 'Griego διπρόσωποι, lit. «de doble cara». Alternativa más idiomática en español: «de dos caras». Se mantiene «de doble cara» para preservar el par formal con «de una sola cara» a lo largo del capítulo.'
    reason: lexical_alternative
  - marker: c
    text: Griego Κύριον (κύριος). En este testamento judío de tradición griega, κύριος funciona como título divino y no como sustituto documentado del tetragrammaton יהוה; por ello se traduce «el Señor» y no «Yahvé», conforme a la política del proyecto.
    reason: theological_note
  - marker: d
    text: La expresión griega τὸ δοκοῦν καλόν («lo que solo parece bueno») contrasta deliberadamente con τοῦ ἀληθινοῦ καλοῦ («lo que es verdaderamente bueno»). El argumento es que quien imita al Señor no toma el bien meramente aparente como equivalente al bien genuino.
    reason: lexical_alternative
  - marker: e
    text: 'Griego ἀσώτων: personas de vida moralmente disoluta y sin freno. Alternativas: «los derrochadores» (más financiero) o «los pródigos» (que podría evocar la parábola lucana). Se prefiere «disolutos» por su mayor fuerza moral en español.'
    reason: lexical_alternative
  - marker: f
    text: La comparación animal alude a criaturas que, por su porte exterior semejante al de fieras salvajes, pueden parecer impuras; sin embargo, son en realidad puras. El punto es la apariencia moral frente a la pureza efectiva, paralelo al argumento central del capítulo sobre las acciones «de doble cara» que son en su totalidad buenas.
    reason: cultural_note
  - marker: g
    text: 'La cláusula final (griego ἀπείργων τὸ κακὸν τοῦ ἀγαθοῦ) es comprimida y el sujeto gramatical es ambiguo. Traducción alternativa: «manteniendo el mal alejado del bien». La frase puede referirse a los hombres fieles o, secundariamente, a Dios actuando mediante sus mandamientos.'
    reason: alternative_reading
  revision_rationale: 'Two corrections: (1) V.2: ''dos obras, una buena y una mala'' → ''dos obras de bien y de mal'' to reflect the genitival structure (καλοῦ τε καὶ κακοῦ qualifying ἔργα as genitives of quality, not enumerating two separate acts). (2) V.3: ''junto a'' → ''junto con'' for μετά to express accompaniment/combination more precisely, matching per-verse file 004/003.'
