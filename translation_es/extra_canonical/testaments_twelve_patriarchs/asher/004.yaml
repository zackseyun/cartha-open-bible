  to: 'IV. 1 Pues las personas buenas, siendo de una sola cara[a], aunque los de doble cara[b] las consideren pecadoras, son justas ante Dios. 2 Y muchos, al eliminar a los malvados, realizan dos obras de bien y de mal; sin embargo, el conjunto es bueno, porque ha arrancado de raíz y destruido el mal. 3 Hay quien odia al misericordioso e injusto, y al adúltero y al que ayuna; esto también es de doble cara, pero toda la obra es buena, porque imita al Señor[c], sin aguardar lo que solo parece bueno junto con lo que es verdaderamente bueno[d]. 4 Otro no desea ver días buenos con los disolutos[e], para no mancillar su cuerpo ni contaminar su alma. Aunque esto también es de doble cara, es del todo bueno. 5 Pues tales hombres son semejantes a las gacelas y a los ciervos: por su porte como de animales salvajes parecen ser impuros, pero en todo son puros[f], porque caminan con celo por el Señor, apartándose de lo que Dios también aborrece y prohíbe mediante sus mandamientos, apartando así el mal
    del bien[g].'
  rationale: 'Two corrections: (1) V.2: ''dos obras, una buena y una mala'' → ''dos obras de bien y de mal'' to reflect the genitival structure (καλοῦ τε καὶ κακοῦ qualifying ἔργα as genitives of quality, not enumerating two separate acts). (2) V.3: ''junto a'' → ''junto con'' for μετά to express accompaniment/combination more precisely, matching per-verse file 004/003.'
