  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/004.yaml
  text: '1 For good men[a], being single-faced, even if they are thought by the double-faced to be sinning, are righteous before God. 2 And many, in doing away with the wicked, perform two works, one good and one evil; yet the whole is good, because he has uprooted and destroyed the evil. 3 There is one who hates the merciful man and the unjust man, and the adulterer and the one who fasts; this too is double-faced, but the whole work is good, because he imitates the Lord, not expecting what only seems good together with what is truly good[b]. 4 Another does not wish to see good days with the wasteful, lest he defile his body and pollute his soul. Even though this is double-faced, yet it is wholly good. 5 For such men are like gazelles and deer: in the bearing of wild animals they seem to be unclean, but in every respect they are clean, because they walk in zeal for the Lord, keeping away from those things which God also hates and forbids through the commandments[d][c], thus holding back
    evil from good.'
  footnotes:
  - marker: a
    text: Or 'two-faced' for 'double-faced' throughout the chapter.
    reason: lexical_alternative
  - marker: b
    text: The Greek expression 'what seems good' contrasts apparent good with 'what is truly good.'
    reason: lexical_alternative
  - marker: c
    text: The animal comparison likely refers to creatures that may appear wild or suspect in outward manner, yet are in fact clean; the point is moral appearance versus true purity.
    reason: cultural_note
  - marker: d
    text: The final clause is compressed in Greek and may also be rendered 'keeping evil away from good.'
    reason: alternative_reading
