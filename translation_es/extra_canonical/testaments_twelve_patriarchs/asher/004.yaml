  source_alignment_summary: 'Chapter-level file. V.1: ''de una sola cara'' / ''de doble cara''—internally consistent. V.2: ''dos obras, una buena y una mala''—this is the pre-revision EN rendering; the EN revision changed ''perform two works, one good and one evil'' to ''do two things, good and evil'' to reflect the genitival structure (δύο ἔργα καλοῦ τε καὶ κακοῦ). The chapter-level ES uses the pre-revision formulation. V.3: ''sin aguardar lo que solo parece bueno junto a lo que es verdaderamente bueno''—fine, but ''junto a'' for μετά is slightly weaker than ''junto con'' (EN ''along with''). V.5: Κυρίου→''el Señor'' (consistent with decision in ch.4 per-verse files). Overall mostly good.'
  spanish_quality_summary: Natural Spanish throughout. Footnotes [a][b][c][d][e][f][g] match markers. V.2 rendering 'una buena y una mala' splits the act as two discrete events, which the EN revision explicitly corrected (the genitives καλοῦ τε καὶ κακοῦ mean both qualities inhere in the same act, not two separate acts). Per-verse file 004/002 correctly has 'dos obras de bien y de mal'.
  glossary_alignment: Κύριον/Κυρίου→el Señor (consistent with per-verse file policy for T12P.ASH). θεός→Dios. No YHWH/δοῦλος/πνεῦμα.
