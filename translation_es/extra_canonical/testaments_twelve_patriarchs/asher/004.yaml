translation:
  language: es
  text: 'IV. 1 Pues las personas buenas, siendo de una sola cara[a], aunque los de doble cara[b] las consideren pecadoras, son justas ante Dios. 2 Y muchos, al eliminar a los malvados, realizan dos obras de bien y de mal; sin embargo, el conjunto es bueno, porque ha arrancado de raíz y destruido el mal. 3 Hay quien odia al misericordioso e injusto, y al adúltero y al que ayuna; esto también es de doble cara, pero toda la obra es buena, porque imita al Señor[c], sin aguardar lo que solo parece bueno junto con lo que es verdaderamente bueno[d]. 4 Otro no desea ver días buenos con los disolutos[e], para no mancillar su cuerpo ni contaminar su alma. Aunque esto también es de doble cara, es del todo bueno. 5 Pues tales hombres son semejantes a las gacelas y a los ciervos: por su porte como de animales salvajes parecen ser impuros, pero en todo son puros[f], porque caminan con celo por el Señor, apartándose de lo que Dios también aborrece y prohíbe mediante sus mandamientos, apartando así el mal
    del bien[g].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego μονοπρόσωποι, lit. «de una sola cara». Alternativas posibles: «íntegros» o «sinceros», pero estas suavizan la metáfora del rostro que estructura todo el capítulo en contraste con los «de doble cara» (διπρόσωποι).'
    reason: lexical_alternative
  - marker: b
    text: 'Griego διπρόσωποι, lit. «de doble cara». Alternativa más idiomática en español: «de dos caras». Se mantiene «de doble cara» para preservar el par formal con «de una sola cara» a lo largo del capítulo.'
    reason: lexical_alternative
  - marker: c
    text: Griego Κύριον (κύριος). En este testamento judío de tradición griega, κύριος funciona como título divino y no como sustituto documentado del tetragrammaton יהוה; por ello se traduce «el Señor» y no «Yahvé», conforme a la política del proyecto.
    reason: theological_note
  - marker: d
    text: La expresión griega τὸ δοκοῦν καλόν («lo que solo parece bueno») contrasta deliberadamente con τοῦ ἀληθινοῦ καλοῦ («lo que es verdaderamente bueno»). El argumento es que quien imita al Señor no toma el bien meramente aparente como equivalente al bien genuino.
    reason: lexical_alternative
  - marker: e
    text: 'Griego ἀσώτων: personas de vida moralmente disoluta y sin freno. Alternativas: «los derrochadores» (más financiero) o «los pródigos» (que podría evocar la parábola lucana). Se prefiere «disolutos» por su mayor fuerza moral en español.'
    reason: lexical_alternative
  - marker: f
    text: La comparación animal alude a criaturas que, por su porte exterior semejante al de fieras salvajes, pueden parecer impuras; sin embargo, son en realidad puras. El punto es la apariencia moral frente a la pureza efectiva, paralelo al argumento central del capítulo sobre las acciones «de doble cara» que son en su totalidad buenas.
    reason: cultural_note
  - marker: g
    text: 'La cláusula final (griego ἀπείργων τὸ κακὸν τοῦ ἀγαθοῦ) es comprimida y el sujeto gramatical es ambiguo. Traducción alternativa: «manteniendo el mal alejado del bien». La frase puede referirse a los hombres fieles o, secundariamente, a Dios actuando mediante sus mandamientos.'
    reason: alternative_reading
lexical_decisions:
- source_word: μονοπρόσωποι
  english_pob_choice: single-faced
  chosen_spanish: de una sola cara
  alternatives_spanish:
  - íntegros
  - sinceros
  - de rostro único
  lexicon: LSJ
  rationale: El capítulo entero se articula sobre el contraste estructural entre μονοπρόσωποι y διπρόσωποι. «De una sola cara» preserva la metáfora visual de la misma manera que «single-faced» en inglés; alisar a «íntegros» o «sinceros» desvanecería la vivid oposición que Asher construye deliberadamente. El giro resulta levemente inusual en español moderno, pero esto es fiel a la intención retórica del texto.
- source_word: διπρόσωποι / διπρόσωπον
  english_pob_choice: double-faced
  chosen_spanish: de doble cara
  alternatives_spanish:
  - de dos caras
  - hipócrita
  - de mente doble
  lexicon: LSJ
  rationale: Conserva la metáfora del rostro que estructura el capítulo. «De dos caras» es la expresión más idiomática en español (como «two-faced» en inglés), pero «de doble cara» como calco formal mantiene mejor el par léxico sostenido con «de una sola cara» y la seriedad del argumento ético. Se usa de forma consistente en todas las apariciones del término.
- source_word: ἀναιροῦντες
  english_pob_choice: doing away with
  chosen_spanish: al eliminar
  alternatives_spanish:
  - al matar
  - al suprimir
  - al destruir
  lexicon: BDAG
  rationale: ἀναιρέω abarca matar, suprimir y eliminar. «Al eliminar» preserva la amplitud semántica sin forzar la lectura hacia el homicidio literal ni hacia la mera remoción abstracta, en consonancia con la decisión inglesa «doing away with».
- source_word: τὸ δὲ ὅλον καλόν / ὅλον δὲ καλόν / τὸ πᾶν ἔργον ἀγαθόν
  english_pob_choice: yet the whole is good / it is wholly good / the whole work is good
  chosen_spanish: el conjunto es bueno / es del todo bueno / toda la obra es buena
  alternatives_spanish:
  - pero todo es bueno
  - en su totalidad es bueno
  - la totalidad de la obra es buena
  lexicon: LSJ
  rationale: 'El griego emplea tres variantes levemente distintas de la fórmula evaluativa central del capítulo. La traducción española las diferencia con matices análogos: «el conjunto es bueno» (v. 2, τὸ δὲ ὅλον καλόν), «toda la obra es buena» (v. 3, τὸ πᾶν ἔργον ἀγαθόν) y «es del todo bueno» (v. 4, ὅλον δὲ καλόν ἐστιν), reflejando las variaciones del original sin aplanarlas.'
- source_word: μιμεῖται Κύριον
  english_pob_choice: he imitates the Lord
  chosen_spanish: imita al Señor
  alternatives_spanish:
  - sigue al Señor
  - copia al Señor
  lexicon: BDAG
  rationale: 'μιμέομαι significa ''imitar, emular''. «Imita al Señor» es la traslación más directa y preserva la dimensión ética del argumento: la conducta del agente es buena porque reproduce el patrón de acción divino.'
- source_word: τὸ δοκοῦν καλόν / τοῦ ἀληθινοῦ καλοῦ
  english_pob_choice: what only seems good / what is truly good
  chosen_spanish: lo que solo parece bueno / lo que es verdaderamente bueno
  alternatives_spanish:
  - el bien aparente / el bien verdadero
  - lo que parece bien / el bien real
  lexicon: LSJ
  rationale: δοκέω señala apariencia o parecer; ἀληθινός apunta a autenticidad genuina. El contraste entre bien meramente aparente y bien auténtico es central al argumento moral de Asher. La forma «lo que solo parece bueno» añade el adverbio «solo» para enfatizar, como hace la POB inglesa con «only seems good», evitando que se confunda apariencia con realidad.
- source_word: ἀσώτων
  english_pob_choice: the wasteful
  chosen_spanish: los disolutos
  alternatives_spanish:
  - los derrochadores
  - los pródigos
  - los libertinos
  lexicon: BDAG
  rationale: ἄσωτος denota a quien vive sin freno moral ni autocontrol, con connotación de disipación. En español, «los disolutos» captura mejor la dimensión de desorden moral que «los derrochadores» (más financiero) o «los pródigos» (que evoca la parábola evangélica). Aunque el POB inglés prefirió «the wasteful» para mantener el sentido raíz, «disolutos» es más idiomático en este contexto en español y más fiel al matiz moral del griego.
- source_word: αἰσχράνει / μολυνεῖ
  english_pob_choice: defile / pollute
  chosen_spanish: mancillar / contaminar
  alternatives_spanish:
  - deshonrar / manchar
  - ensuciar / profanar
  - corromper / contaminar
  lexicon: LSJ
  rationale: αἰσχραίνω evoca deshonra y profanación corporal; μολύνω apunta a contaminación moral o espiritual. El par «mancillar / contaminar» distingue las dos acciones con precisión análoga al par inglés «defile / pollute», preservando el paralelismo cuerpo–alma del texto.
- source_word: δορκάσι καὶ ἐλάφοις
  english_pob_choice: gazelles and deer
  chosen_spanish: gacelas y ciervos
  alternatives_spanish:
  - antílopes y venados
  lexicon: LSJ
  rationale: δορκάς = gacela; ἔλαφος = ciervo/a. «Gacelas y ciervos» es la traducción zoológica estándar en español y conserva la distinción entre los dos animales.
- source_word: ἐν ἤθει ἀγρίων
  english_pob_choice: in the bearing of wild animals
  chosen_spanish: por su porte como de animales salvajes
  alternatives_spanish:
  - en el modo de los animales silvestres
  - con el comportamiento de fieras
  lexicon: LSJ
  rationale: ἦθος aquí designa el modo exterior, el porte o carácter observable. «Por su porte como de animales salvajes» transmite la impresión que causan desde afuera, motivando el juicio erróneo sobre su pureza, sin reducirlo a «comportamiento» (más conductual) ni a «costumbre» (más habitual).
- source_word: ἐν ζήλῳ Κυρίου
  english_pob_choice: in zeal for the Lord
  chosen_spanish: con celo por el Señor
  alternatives_spanish:
  - en el celo del Señor
  - con fervor por el Señor
  lexicon: BDAG
  rationale: ζῆλος como celo humano dirigido hacia el Señor (genitivo objetivo), no como celo propio del Señor. «Con celo por el Señor» preserva la dirección del genitivo con la preposición «por», en consonancia con la decisión inglesa.
- source_word: ἀπείργων τὸ κακὸν τοῦ ἀγαθοῦ
  english_pob_choice: holding back evil from good
  chosen_spanish: apartando así el mal del bien
  alternatives_spanish:
  - manteniendo el mal alejado del bien
  - separando el mal del bien
  lexicon: LSJ
  rationale: ἀπείργω = impedir, mantener alejado. La cláusula es comprimida en griego; «apartando así el mal del bien» transmite la imagen de prevenir que el mal se adhiera o mezcle con el bien. El «así» refleja la conexión causal con lo que precede sin sobreinterpretar.
theological_decisions:
- issue: 'Κύριον / Κυρίου en este testamento judío: ¿«Señor» o «Yahvé»?'
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto griego tiene Κύριον / Κυρίου (vv. 3 y 5), no el tetragrammaton יהוה. En el Testamento de Aser, redactado o transmitido en griego, κύριος funciona como título divino en una tradición judía helenística, sin ser sustitución transparente del nombre divino hebreo. La política del proyecto reserva «Yahvé» para יהוה/YHWH. Dado que la fuente directa es el griego κύριος —sin que haya un Vorlage hebreo verificable que justifique «Yahvé»—, se adopta «el Señor», conforme a la decisión del POB inglés y al estilo testamentario del texto.
  doctrine_reference: 'Política del proyecto: κύριος → «el Señor» cuando es título griego sin función de sustitución documentada del nombre divino; יהוה/YHWH → «Yahvé».'
- issue: Evaluación moral de acciones aparentemente mixtas o «de doble cara»
  english_pob_reading: Asher distinguishes outwardly mixed or severe actions from inward duplicity; some acts may appear double yet be wholly good when they remove evil in zeal for God.
  chosen_spanish_reading: Asher distingue las acciones exteriormente mixtas o severas de la duplicidad interna; algunos actos pueden parecer de doble cara y, sin embargo, ser del todo buenos cuando eliminan el mal con celo por Dios.
  alternative_spanish_readings:
  - El texto condena toda dualidad sin excepción
  - El texto aprueba medios moralmente ambiguos de forma irrestricta
  rationale: La fórmula repetida «esto también es de doble cara, pero toda la obra es buena / es del todo bueno» indica que Asher no elogia la hipocresía, sino que argumenta que ciertas acciones parecen mixtas desde afuera mientras son moralmente sanas en su propósito total. La traducción española preserva esta tensión teológica sin resolverla ni armonizarla.
  doctrine_reference: Preservar la tensión teológica sin resolverla; traducir el argumento griego honestamente sin armonización.
translation_notes:
  revision_awareness: 'La revisión más reciente del POB inglés (modelo gpt-5.4, marca temporal 2026-04-23T14:53:58Z) no introdujo cambios en el texto de referencia (unchanged: true). El borrador español parte del griego Charles 1908 y del rastro de auditoría del POB inglés sin enmiendas pendientes ni revisiones aplicadas previas al registro (applied_revisions: []).'
  spanish_consistency_notes:
  - «De una sola cara» y «de doble cara» se mantienen como par léxico consistente a lo largo de todo el capítulo (vv. 1, 3, 4), preservando el contraste estructural entre μονοπρόσωποι y διπρόσωποι que articula el argumento de Asher.
  - «El Señor» se usa sistemáticamente para Κύριον / Κυρίου (κύριος griego) en vv. 3 y 5; «Yahvé» se reserva para יהוה/YHWH según la política del proyecto, y no se aplica aquí al no haber Vorlage hebreo verificable.
  - «Dios» se usa para Θεῷ (v. 1), Θεὸς (v. 5) en todos los casos, conforme al valor por defecto del proyecto para θεός.
  - 'Las tres variantes griegas de la fórmula evaluativa central se diferencian en español: τὸ δὲ ὅλον καλόν (v. 2) → «el conjunto es bueno»; τὸ πᾶν ἔργον ἀγαθόν (v. 3) → «toda la obra es buena»; ὅλον δὲ καλόν ἐστιν (v. 4) → «es del todo bueno», reflejando las variaciones del griego sin aplanarlas.'
  - El par αἰσχράνει / μολυνεῖ (v. 4) se traduce con dos verbos distintos («mancillar» / «contaminar») para preservar el paralelismo cuerpo–alma sin colapsar los términos, en consonancia con la decisión del POB inglés.
