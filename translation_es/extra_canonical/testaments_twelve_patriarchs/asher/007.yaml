base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/007.yaml
  text: '...crushing the head of the dragon upon the water[a]. He will save Israel and all the nations [God appearing as a man].


    4 Therefore, my children, you also tell these things to your children, so that they may not disobey him. 5 For I know that, by disobeying, you will disobey, and by acting ungodly, you will act ungodly, paying no attention to the law of God, but being corrupted by wickedness through the commandments of men. 6 And because of this you will be scattered, like Gad and Dan my brothers, and you will not know their land, tribe, and language. 7 But the Lord will gather you in faith through his compassion[c][b], and through Abraham and Isaac and Jacob.'
  footnotes:
  - marker: a
    text: The bracketed words 'God appearing as a man' likely reflect a textually uncertain or expanded reading in the Greek tradition; they are translated here because they appear in the witness provided.
    reason: textual_variant
  - marker: b
    text: '''In faith'' could also be understood as ''in faithfulness.'''
    reason: lexical_alternative
  - marker: c
    text: The scattering and later gathering echo covenant judgment-and-restoration themes found throughout Israel's Scriptures.
    reason: cross_reference
