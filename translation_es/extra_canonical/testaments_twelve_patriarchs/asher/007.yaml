translation:
  language: es
  text: '...quebrantando la cabeza del dragón sobre el agua[a]. Él salvará a Israel y a todas las naciones [Dios apareciendo como hombre].



    4 Por tanto, hijos míos, también ustedes digan estas cosas a sus hijos, para que no le desobedezcan. 5 Pues yo sé que, desobedeciendo, desobedecerán, y obrando con impiedad, obrarán con impiedad, sin prestar atención a la ley de Dios, sino dejándose corromper por la maldad mediante mandamientos de hombres. 6 Y por esto serán dispersados, como Gad y Dan mis hermanos, y no conocerán su tierra, tribu y lengua. 7 Pero el Señor los congregará en fe[b][c] por medio de su compasión, y por medio de Abraham, Isaac y Jacob.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Las palabras entre corchetes 'Dios apareciendo como hombre' probablemente reflejan una lectura textualmente incierta o expandida en la tradición griega; aquí se traducen porque aparecen en el testimonio provisto.
    reason: textual_variant
  - marker: b
    text: '''En fe'' también puede entenderse como ''en fidelidad''.'
    reason: lexical_alternative
  - marker: c
    text: La dispersión y posterior reunión hacen eco de los temas de juicio-y-restauración del pacto presentes en las Escrituras de Israel.
    reason: cross_reference
lexical_decisions:
- source_word: συντρίβων
  english_pob_choice: crushing
  chosen_spanish: quebrantando
  alternatives_spanish:
  - aplastando
  - rompiendo
  lexicon: LSJ
  rationale: Participio presente conservado como acción vívida y continua en la línea profética; 'quebrantando' encaja con el idioma bíblico de derrotar la cabeza del dragón/serpiente.
- source_word: κάραν
  english_pob_choice: head
  chosen_spanish: cabeza
  alternatives_spanish:
  - testa
  - cráneo
  lexicon: LSJ
  rationale: Término idiomático en imagen de derrota del dragón; 'cabeza' es natural y preserva la fuerza alusiva.
- source_word: δράκοντος
  english_pob_choice: dragon
  chosen_spanish: dragón
  alternatives_spanish:
  - serpiente
  lexicon: LSJ
  rationale: El griego nombra específicamente un dragón; 'serpiente' suavizaría la imaginería y reduciría la textura apocalíptica.
- source_word: ὑποκρινόμενος
  english_pob_choice: appearing
  chosen_spanish: apareciendo
  alternatives_spanish:
  - fingiendo
  - tomando el papel de
  lexicon: LSJ
  rationale: En esta frase entre corchetes, una traducción literal 'fingiendo' implicaría engaño con demasiada fuerza. 'Apareciendo como hombre' capta el sentido superficial dejando visible la teología difícil.
- source_word: ἀπειθήσωσιν / ἀπειθήσετε
  english_pob_choice: disobey / will disobey
  chosen_spanish: desobedezcan / desobedeceréis
  alternatives_spanish:
  - sean desobedientes
  - rehúsen escuchar
  lexicon: BDAG
  rationale: Contexto imperativo fuerte favorece el término moral directo 'desobedecer'.
- source_word: ἀσεβοῦντες / ἀσεβήσετε
  english_pob_choice: acting ungodly / will act ungodly
  chosen_spanish: obrando con impiedad / obraréis con impiedad
  alternatives_spanish:
  - siendo impíos / seréis impíos
  - obrando irreverentemente
  lexicon: BDAG
  rationale: Conserva la fuerza del cognado repetido siendo legible en español.
- source_word: νόμῳ
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  lexicon: BDAG
  rationale: En este marco testamentario judío, 'ley de Dios' es la traducción más transparente y esperable.
- source_word: ἐντολαῖς ἀνθρώπων
  english_pob_choice: commandments of men
  chosen_spanish: mandamientos de hombres
  alternatives_spanish:
  - preceptos humanos
  - ordenanzas de hombres
  lexicon: BDAG
  rationale: Conserva el contraste con la ley de Dios y el registro elevado de exhortación.
- source_word: κακίᾳ διαφθειρόμενοι
  english_pob_choice: being corrupted by wickedness
  chosen_spanish: dejándoos corromper por la maldad
  alternatives_spanish:
  - siendo arruinados por la malicia
  - siendo pervertidos por el mal
  lexicon: BDAG
  rationale: '''Corromper'' encaja con el lenguaje de decaimiento moral; ''maldad'' es más amplio y menos psicologizado que ''malicia''.'
- source_word: διασκορπισθήσεσθε
  english_pob_choice: you will be scattered
  chosen_spanish: seréis dispersados
  alternatives_spanish:
  - seréis esparcidos
  lexicon: BDAG
  rationale: Lenguaje estándar de juicio del pacto; 'dispersados' conserva la resonancia bíblica.
- source_word: ἀγνοήσετε
  english_pob_choice: you will not know
  chosen_spanish: no conoceréis
  alternatives_spanish:
  - seréis ignorantes de
  - perderéis el conocimiento de
  lexicon: BDAG
  rationale: Futuro simple con fuerza directa; en contexto implica el extrañamiento de la identidad ancestral.
- source_word: ἐπισυνάξει
  english_pob_choice: will gather
  chosen_spanish: reunirá
  alternatives_spanish:
  - recogerá
  - reunirá juntos
  lexicon: BDAG
  rationale: Lenguaje conciso de restauración del pacto; 'reunirá' es suficiente en español.
- source_word: ἐν πίστει
  english_pob_choice: in faith
  chosen_spanish: en fe
  alternatives_spanish:
  - con fe
  - en fidelidad
  lexicon: BDAG
  rationale: El texto principal mantiene la traducción directa 'fe'; el matiz exacto está algo abierto, por lo que se anotan alternativas.
- source_word: εὐσπλαγχνίας
  english_pob_choice: compassion
  chosen_spanish: compasión
  alternatives_spanish:
  - misericordia
  - entrañable misericordia
  lexicon: BDAG
  rationale: Transmite piedad profunda en español accesible sin perder calidez teológica.
theological_decisions:
- issue: Frase entre corchetes θεὸς εἰς ἄνδρα ὑποκρινόμενος
  chosen_reading: Traducida entre corchetes como 'Dios apareciendo como hombre'
  alternative_readings:
  - omitir como expansión secundaria
  - '''Dios disfrazándose de hombre'''
  - '''uno actuando como Dios en forma humana'''
  rationale: El testimonio griego incluye la frase entre corchetes, señalando preocupación textual o de interpolación. La traducción la preserva con transparencia sin normalizarla a lenguaje doctrinal posterior.
  doctrine_reference: Conservar la tensión teológica antes que resolverla; traducir honestamente lo que está en el testimonio griego, y usar notas para la complejidad.
- issue: Referente de 'él salvará a Israel y a todas las naciones'
  chosen_reading: Dejado intencionalmente sin especificar como 'Él'
  alternative_readings:
  - la figura del salvador venidero
  - el Señor explícitamente
  rationale: El extracto griego inmediato no reafirma aquí el antecedente. Suplir un referente más explícito interpretaría más allá de lo que sobrevive en la redacción.
  doctrine_reference: Primacía del idioma original; no parafrasear más allá de lo que el griego garantiza.
- issue: Significado de ἐν πίστει
  chosen_reading: Traducido 'en fe'
  alternative_readings:
  - '''en fidelidad'''
  - '''por la fe'''
  rationale: La frase es concisa y algo abierta. 'En fe' conserva la ambigüedad mejor que una expansión más interpretativa.
  doctrine_reference: Conservar la tensión teológica antes que resolverla.
translation_notes:
  revision_awareness: El POB inglés no requirió cambios en la revisión (unchanged=true). La versión española mantiene la traducción directa.
  spanish_consistency_notes:
  - Βελίαρ → 'Beliar' (no aparece aquí, pero consistente con el resto)
  - δράκων → 'dragón' (no 'serpiente')
  - νόμος (Dios) → 'ley'
  - ἐντολαί (hombres) → 'mandamientos'
  - πίστις → 'fe'
  - εὐσπλαγχνία → 'compasión'
  - ἐπισυνάγω → 'reunir'
