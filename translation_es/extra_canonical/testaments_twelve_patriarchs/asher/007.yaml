  text: VII. Μὴ γίνεσθε¹ ὡς Σόδομα², ἥτις ἠγνόησε³ *τοὺς ἀγγέλους⁴ Κυρίου, καὶ ἀπώλετο ἕως αἰῶνος. 2. *Ἐγὼ γὰρ οἶδα⁵ ὅτι ἁμαρτήσετε⁶ καὶ παραδοθήσεσθε εἰς χεῖρας ἐχθρῶν ὑμῶν, ⌜καὶ¹⁸ ἡ γῆ ὑμῶν⁹ ἐρημωθήσεται¹⁰, καὶ τὰ ἅγια ὑμῶν καταφθαρήσονται¹¹, καὶ ὑμεῖς¹² διασκορπισθήσεσθε¹³ εἰς τὰς τέσσαρας¹⁴ γωνίας *τῆς γῆς¹⁵, καὶ ἔσεσθε *εἰς διασπορὰν¹⁶ ἐξουδενωμένοι ὡς¹⁷ ὕδωρ¹⁸ ἄχρηστον¹⁹.⌝ 3. Ἕως οὗ²⁰ ὁ ὕψιστος ἐπισκέψηται τὴν γῆν, καὶ αὐτὸς ἐλθὼν ⌜ὡς ἄνθρωπος²¹ μετὰ ἀνθρώπων *ἐσθίων καὶ πίνων²²⌝ καὶ²³ συντρίβων²⁴ τὴν κάραν²⁵ τοῦ δράκοντος *ἐπὶ τοῦ²⁶ ὕδατος, *οὗτος σώσει²⁷ τὸν Ἰσραὴλ καὶ πάντα τὰ ἔθνη [θεὸς²⁸ εἰς ἄνδρα ὑποκρινόμενος²⁹]. 4. Εἴπατε οὖν, ⸀τέκνα μου καὶ ὑμεῖς⸀³⁰ ταῦτα τοῖς τέκνοις ὑμῶν³¹, μὴ ἀπειθήσωσιν³² αὐτῷ. 5. *Ἐγὼ γὰρ ἔγνων³³ ὅτι ⸀ἀπειθοῦντες⸀³⁴ *ἀπειθήσετε, καὶ ἀσεβοῦντες ἀσεβήσετε³⁵, μὴ προσέχοντες³⁶ *τῷ νόμῳ³⁷ θεοῦ, ἀλλ᾽ ἐντολαῖς ἀνθρώπων *κακίᾳ διαφθειρόμενοι³⁸. 6. *Καὶ διὰ τοῦτο³⁹ διασκορπισθήσεσθε⁴⁰ ὡς Γὰδ καὶ⁴¹ Δάν, οἱ ἀδελφοί μου⁴², *καὶ ἀγνοήσετε χώρας αὐτῶν⁴³ καὶ φυλὴν καὶ
