translation:
  language: es
  text: "1 Hay[a], pues, un alma que con sus palabras aparta lo bueno por causa del mal, y lleva el desenlace del asunto a la maldad.\n\n\n\n    2 Hay un hombre que no se compadece de sus propios siervos; y aunque esto sea de doble cara, el conjunto es maldad.\n\n\n\n    3 Y hay un hombre que ama al que obra con maldad, porque él mismo también escoge morir en el mal por causa de aquel; y respecto a esto es manifiesto que es de doble cara, pero el conjunto es obra mala.\n\n\n\n    4 Aun estando en el amor, están en maldad cuando ocultan el mal bajo un nombre bueno; pero el fin de la obra viene a parar en mal.\n\n\n\n    5 Otro roba[b], comete injusticia, despoja, es codicioso, y sin embargo muestra misericordia a los pobres. Esto también es de doble cara, pero el conjunto es maldad.\n\n\n\n    6 El que defrauda[c] a su prójimo provoca a Dios, jura en falso por el Altísimo, y desestima al Señor, dador de la ley, y sin embargo da reposo al pobre.\n\n\n\n    7 Mancha el alma y hace brillar el\
    \ cuerpo; mata a muchos y muestra misericordia a unos pocos. Esto también es de doble cara, pero el conjunto es maldad.\n\n\n\n    8 Otro comete adulterio y practica inmoralidad sexual, y se abstiene de ciertos alimentos. Y mientras ayuna obra el mal, y por el poder de la riqueza arrastra a muchos, y desde su excesiva maldad cumple los mandamientos. Esto es de doble cara, pero el conjunto es maldad.\n\n\n\n    9 Tales personas son como las liebres, porque son medio limpias, pero en realidad son inmundas.\n\n\n\n    10 Pues también Dios, en las tablas de los mandamientos, así lo dijo."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El comienzo del versículo 1 en la fuente griega introduce una nueva categoría de alma duplicada que continúa la enseñanza del capítulo 1.
    reason: source_note
  - marker: b
    text: El verbo πλεονεκτέω puede significar 'codiciar' o 'aprovecharse' del prójimo. En v.5 se traduce 'es codicioso'; en v.6, con objeto, 'defrauda'.
    reason: lexical_alternative
  - marker: c
    text: O 'se aprovecha de su prójimo'. El término griego puede denotar codicia general o explotación interesada.
    reason: lexical_alternative
lexical_decisions:
- source_word: διπρόσωπον
  english_pob_choice: double-faced
  chosen_spanish: de doble cara
  alternatives_spanish:
  - de dos caras
  - doblez
  - fingido
  lexicon: LSJ
  rationale: El vicio central del capítulo es la duplicidad moral expresada en conducta exteriormente mixta. 'De doble cara' conserva la imagen de tener dos caras mejor que 'de dos caras' (que en español puede sonar a traidor) o que el más interno 'doblez'.
- source_word: τὸ δὲ ὅλον πονηρόν / κακόν
  english_pob_choice: the whole of it is evil
  chosen_spanish: el conjunto es maldad
  alternatives_spanish:
  - en su totalidad es mal
  - todo ello es maldad
  lexicon: LSJ
  rationale: Este estribillo pide una traducción estable. 'El conjunto es maldad' conserva la fuerza sumativa de ὅλον con tono digno y legible.
- source_word: οἰκτείρει
  english_pob_choice: pity
  chosen_spanish: se compadece de
  alternatives_spanish:
  - tiene piedad de
  - se apiada de
  lexicon: LSJ
  rationale: En v.2 se trata del fallo del sentimiento humano hacia los propios siervos. 'Se compadece' es directo y se reserva 'misericordia' para ἐλεεῖ.
- source_word: λειτουργοὺς αὐτοῦ
  english_pob_choice: his own servants
  chosen_spanish: sus propios siervos
  alternatives_spanish:
  - sus servidores
  - sus criados
  lexicon: LSJ
  rationale: En este testamento ético el referente son subordinados domésticos, no ministros cultuales. 'Siervos' encaja con el contexto social.
- source_word: πλεονεκτεῖ
  english_pob_choice: is greedy / defrauds
  chosen_spanish: es codicioso / defrauda
  alternatives_spanish:
  - codicia
  - se aprovecha
  lexicon: LSJ
  rationale: El término puede denotar codicia o sobrepasar al otro. En v.5 la lista de vicios prefiere 'es codicioso'; en v.6 con objeto ('su prójimo') se traduce 'defrauda'.
- source_word: ἀθετεῖ (τὸν ἐντολέα τοῦ νόμου Κύριον)
  english_pob_choice: sets aside the Lord, the giver of the law
  chosen_spanish: desestima al Señor, dador de la ley
  alternatives_spanish:
  - desecha al Señor
  - rechaza al Señor que dio la ley
  lexicon: LSJ
  rationale: ἀθετεῖ implica anular o dejar de lado. 'Desestima' transmite la repudiación práctica con dignidad. Sigue la revisión POB de 'sets aside'.
- source_word: ἐπιορκεῖ
  english_pob_choice: swears falsely
  chosen_spanish: jura en falso
  alternatives_spanish:
  - perjura
  - rompe el juramento
  lexicon: LSJ
  rationale: '''Jurar en falso'' es accesible y conserva la dimensión de juramento.'
- source_word: σπιλοῖ ... λαμπρύνει
  english_pob_choice: stains ... makes ... bright
  chosen_spanish: mancha ... hace brillar
  alternatives_spanish:
  - ensucia ... adorna
  - contamina ... embellece
  lexicon: LSJ
  rationale: El contraste es vívido entre mancha interior y brillo exterior. 'Mancha/hace brillar' lo conserva.
- source_word: μοιχεύει καὶ πορνεύει
  english_pob_choice: commits adultery and practices sexual immorality
  chosen_spanish: comete adulterio y practica inmoralidad sexual
  alternatives_spanish:
  - adultera y fornica
  - comete adulterio y fornicación
  lexicon: LSJ
  rationale: Los pecados sexuales pareados deben permanecer distintos. 'Practica inmoralidad sexual' es claro para el lector moderno.
- source_word: ἀπέχεται ἐδεσμάτων
  english_pob_choice: abstains from foods
  chosen_spanish: se abstiene de ciertos alimentos
  alternatives_spanish:
  - se abstiene de comidas
  - rehusa ciertos alimentos
  lexicon: LSJ
  rationale: Probablemente abstinencia ascética o ritual. 'De ciertos alimentos' aclara el ámbito sin sobreespecificar.
- source_word: τῇ δυναστείᾳ τοῦ πλούτου πολλοὺς κατασύρει
  english_pob_choice: by the force of his wealth he drags many down
  chosen_spanish: por la fuerza de su riqueza arrastra a muchos abajo
  alternatives_spanish:
  - mediante el poder de la riqueza atrapa a muchos
  - con su influjo rico hunde a muchos
  lexicon: LSJ
  rationale: Conserva tanto el medio como el efecto del poder social opresivo.
- source_word: δασύποδες
  english_pob_choice: hares
  chosen_spanish: liebres
  alternatives_spanish:
  - liebre
  lexicon: LSJ
  rationale: Término estándar en griego para liebre. La comparación depende del estatus de la liebre en el discurso de pureza judío.
- source_word: ἐξ ἡμισείας εἰσὶ καθαροί
  english_pob_choice: they are half clean
  chosen_spanish: son medio limpias
  alternatives_spanish:
  - limpias en parte
  - parcialmente limpias
  lexicon: LSJ
  rationale: La frase debe sonar proverbial y aguda. 'Medio limpias' es conciso e irónico.
- source_word: πλάξιν τῶν ἐντολῶν
  english_pob_choice: the tablets of the commandments
  chosen_spanish: las tablas de los mandamientos
  alternatives_spanish:
  - las tablas de la ley
  lexicon: LSJ
  rationale: Aunque sólo el comienzo de v.10 está completo aquí, la frase probable evoca las tablas del Sinaí.
theological_decisions:
- issue: Comparación de pureza en v.9
  chosen_reading: Tales personas son como las liebres, porque son medio limpias, pero en realidad son inmundas.
  alternative_readings:
  - Tales personas son como la liebre, que parece limpia en parte aunque es inmunda.
  - Tales personas son animales de pezuña hendida, mixtos en estatus.
  rationale: La comparación alude probablemente a las categorías de leyes alimentarias judías en las que la liebre muestra un signo asociado con la limpieza pero permanece inmunda. La traducción mantiene el símil directo y deja la lógica cultural a una nota.
  doctrine_reference: Conservar la tensión teológica; usar notas para aclaración cultural.
- issue: Cierre fragmentario de v.10 en el griego provisto
  chosen_reading: Pues también Dios, en las tablas de los mandamientos, así lo ha declarado.
  alternative_readings:
  - Pues también Dios lo ha hecho claro en las tablas de los mandamientos.
  - Pues incluso Dios, en las tablas de los mandamientos, habla de este modo.
  rationale: El extracto de fuente se interrumpe tras ἐν ταῖς..., pero la lógica del capítulo y la continuación textual estándar respaldan una referencia a las tablas. La traducción se mantiene contenida y se señala como textualmente incompleta en una nota.
  doctrine_reference: Traducir el testimonio griego con honestidad y ser transparente donde el texto es incompleto.
translation_notes:
  revision_awareness: El POB inglés pasó por revisión que ajustó 'has no regard for' a 'sets aside the Lord'. La versión española sigue 'desestima al Señor', conservando el sentido formal de rechazo/anulación.
  spanish_consistency_notes:
  - διπρόσωπον → 'de doble cara' uniforme
  - ἐλεεῖ → 'muestra misericordia' (distinto de οἰκτείρει 'compadecerse')
  - 'πλεονεκτέω → variante contextual: ''es codicioso'' (intransitivo) / ''defrauda'' (con objeto)'
  - Κύριον → 'Señor' (mayúscula divina)
  - ἁμαρτία/πονηρία → 'maldad' aquí mantiene el contraste con 'mal' (κακόν)
