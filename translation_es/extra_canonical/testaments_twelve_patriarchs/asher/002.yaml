    rationale: Greek aorist εἶπεν is punctiliar past. 'Así lo dijo' is source-faithful. 'Ha declarado' imports the EN POB's less accurate present perfect.
  revised_spanish_text: "1 Hay[a], pues, un alma que con sus palabras aparta lo bueno por causa del mal, y lleva el desenlace del asunto a la maldad.\n\n\n\n    2 Hay un hombre que no se compadece de sus propios siervos; y aunque esto sea de doble cara, el conjunto es maldad.\n\n\n\n    3 Y hay un hombre que ama al que obra con maldad, porque él mismo también escoge morir en el mal por causa de aquel; y respecto a esto es manifiesto que es de doble cara, pero el conjunto es obra mala.\n\n\n\n    4 Aun estando en el amor, están en maldad cuando ocultan el mal bajo un nombre bueno; pero el fin de la obra viene a parar en mal.\n\n\n\n    5 Otro roba[b], comete injusticia, despoja, es codicioso, y sin embargo muestra misericordia a los pobres. Esto también es de doble cara, pero el conjunto es maldad.\n\n\n\n    6 El que defrauda[c] a su prójimo provoca a Dios, jura en falso por el Altísimo, y desestima al Señor, dador de la ley, y sin embargo da reposo al pobre.\n\n\n\n    7 Mancha el alma\
    \ y hace brillar el cuerpo; mata a muchos y muestra misericordia a unos pocos. Esto también es de doble cara, pero el conjunto es maldad.\n\n\n\n    8 Otro comete adulterio y practica inmoralidad sexual, y se abstiene de ciertos alimentos. Y mientras ayuna obra el mal, y por el poder de la riqueza arrastra a muchos, y desde su excesiva maldad cumple los mandamientos. Esto es de doble cara, pero el conjunto es maldad.\n\n\n\n    9 Tales personas son como las liebres, porque son medio limpias, pero en realidad son inmundas.\n\n\n\n    10 Pues también Dios, en las tablas de los mandamientos, así lo dijo."
