translation:
  language: es
  text: 'Y después de haberles dicho estas cosas, les ordenó diciendo: «Sepúltenme en Hebrón.» Y murió[a], habiéndose dormido en un buen sueño. 2. Y sus hijos hicieron todo lo que él les había ordenado, y lo llevaron a Hebrón y lo sepultaron con sus padres[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego combina la declaración directa de muerte con la imagen del sueño: ἀπέθανεν ὕπνῳ καλῷ κοιμηθείς, literalmente «murió, habiéndose dormido en un buen sueño». Los dos elementos —el verbo de muerte y el participio de κοιμάομαι con ὕπνος— se preservan en el español para mantener la textura literaria y no colapsar la expresión en un solo idioma moderno.'
    reason: lexical_alternative
  - marker: b
    text: «Con sus padres» (μετὰ τῶν πατέρων αὐτοῦ) es la fórmula tradicional de enterramiento patriarcal. Una alternativa posible en español es «con sus antepasados», pero esta forma más amplia diluye la especificidad de parentesco del término πατήρ y la resonancia establecida de la fórmula sepulcral.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐνετείλατο
  english_pob_choice: commanded them
  chosen_spanish: les ordenó
  alternatives_spanish:
  - les encargó
  - les dio esta orden
  - les mandó
  lexicon: LSJ
  rationale: El verbo ἐνετείλατο lleva autoridad imperativa en contexto testamentario. 'Les ordenó' reproduce fielmente esa fuerza directa y corresponde a la revisión final del POB inglés (que pasó de 'gave them this charge' a 'commanded them' para acercarse al griego). 'Les encargó' habría preservado mejor el matiz de encargo solemne, pero pierde el tono de autoridad indiscutible que el POB revisado priorizó.
- source_word: Θάψατέ
  english_pob_choice: Bury me
  chosen_spanish: Sepúltenme
  alternatives_spanish:
  - Entierrenme
  - Denme sepultura
  lexicon: LSJ
  rationale: Imperativo directo y llano, fiel al griego. Se elige 'sepultar' sobre 'enterrar' por su registro más solemne y digno, apropiado para la petición final de un patriarca. En español latinoamericano neutro el imperativo plural de 'ustedes' es 'sepulten', de ahí 'Sepúltenme' (no la forma peninsular 'Sepultadme').
- source_word: Χεβρών
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  lexicon: BDAG
  rationale: Topónimo transliterado según la convención estándar del español bíblico. 'Hebrón' es la forma canónica establecida en las tradiciones hispanas.
- source_word: ἀπέθανεν
  english_pob_choice: he died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - llegó a su fin
  lexicon: BDAG
  rationale: 'El verbo explícito de muerte se traduce directamente: ''murió''. La coloración eufemística proviene del participio que le sigue, no de este verbo, por lo que no se suaviza aquí.'
- source_word: ὕπνῳ καλῷ κοιμηθείς
  english_pob_choice: having fallen asleep in a good sleep
  chosen_spanish: habiéndose dormido en un buen sueño
  alternatives_spanish:
  - habiendo conciliado un dulce sueño
  - habiéndose dormido plácidamente
  - habiéndose quedado dormido en paz
  lexicon: LSJ
  rationale: 'El griego combina dos raíces léxicas del sueño: el sustantivo ὕπνος (''sueño'') y el participio de κοιμάομαι (''dormirse''). El español ''habiéndose dormido en un buen sueño'' preserva ese doblamiento etimológico —''dormido'' y ''sueño''— sin colapsarlo en el adverbio interpretativo ''plácidamente''. La alternativa ''en paz'' sería una glosa teológica no respaldada por el texto.'
- source_word: ἀπήγαγον
  english_pob_choice: they carried him away
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo trasladaron
  lexicon: LSJ
  rationale: ἀπάγω implica conducir o transportar desde un lugar hacia otro. 'Lo llevaron' es la expresión más natural en español latinoamericano neutro para el traslado fúnebre. 'Lo condujeron' es más formal y también aceptable; 'lo trasladaron' es igualmente válido pero más administrativo.
- source_word: μετὰ τῶν πατέρων αὐτοῦ
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - junto a sus padres
  lexicon: BDAG
  rationale: '''Con sus padres'' preserva la fórmula sepulcral patriarcal tradicional y la especificidad de parentesco de πατήρ. ''Con sus antepasados'' amplía el término más allá de lo que el griego dice y pierde la resonancia de la fórmula bíblica de enterramiento.'
theological_decisions:
- issue: Muerte descrita con imagen de sueño
  english_pob_reading: Retain both 'he died' and 'having fallen asleep in a good sleep'
  chosen_spanish_reading: Conservar tanto 'murió' como 'habiéndose dormido en un buen sueño'
  alternative_spanish_readings:
  - Rendir solo 'murió en paz'
  - Rendir solo 'se durmió en un buen sueño'
  - Colapsar en 'descansó plácidamente'
  rationale: El griego contiene la declaración directa de muerte (ἀπέθανεν) y la expresión participial eufemística del sueño (ὕπνῳ καλῷ κοιμηθείς) como elementos texturalmente distintos. Preservar ambos en español —'murió, habiéndose dormido en un buen sueño'— mantiene la tensión literaria entre la realidad de la muerte y la imagen consolatoria del sueño bueno, sin resolver la expresión en un idioma moderno único. Esto sigue la decisión teológica documentada del POB inglés (DOCTRINE.md §Filosofía de traducción 3).
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: El POB inglés registra una revisión del 2026-04-23 (modelo gpt-5.4) que reemplazó «gave them this charge» por «commanded them» para lograr mayor alineación léxica con ἐνετείλατο. El español «les ordenó» refleja esta lectura revisada y final, adoptando directamente la fuerza de autoridad del verbo griego sin mediación de la formulación previa del inglés.
  spanish_consistency_notes:
  - Este pasaje no contiene el nombre divino YHWH ni lenguaje cristológico; las convenciones terminológicas del proyecto (Yahvé, Mesías, Jesús, etc.) no se activan aquí.
  - '''Hebrón'' sigue la transliteración estándar del español bíblico, consistente con el uso del POB inglés.'
  - El imperativo plural 'Sepúltenme' adopta la forma de 'ustedes' propia del español latinoamericano neutro, en lugar de la forma peninsular 'Sepultadme', conforme al estilo objetivo del proyecto.
  - Se emplea 'sepultar' de manera consistente tanto en la petición directa ('Sepúltenme') como en la narración ('lo sepultaron'), lo que establece cohesión léxica interna en el versículo.
