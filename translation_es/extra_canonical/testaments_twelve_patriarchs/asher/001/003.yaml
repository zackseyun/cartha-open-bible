translation:
  language: es
  text: Dos caminos dio Dios a los hijos de los hombres, y dos propósitos,[a] y dos acciones, y dos modos,[b] y dos fines.[c]
  philosophy: formal
  footnotes:
  - marker: a
    text: 'Gr. διαβούλια: puede traducirse también «deliberaciones» o «designios», con énfasis en el proceso de deliberación interna. En el contexto del Testamento de Aser, estos dos propósitos corresponden funcionalmente a los dos impulsos que orientan la conducta hacia uno u otro camino —concepto afín a los dos yétser del pensamiento judío del Segundo Templo—, aunque el texto no emplea esa terminología técnica.'
    reason: lexical_alternative
  - marker: b
    text: La frase «y dos acciones, y dos modos» (καὶ δύο πράξεις, καὶ δύο τρόπους) aparece entre corchetes angulares ⌜⌝ en el aparato crítico de Charles 1908, lo que indica una adición secundaria posible o una variante significativa entre manuscritos. Algunas tradiciones textuales ofrecen una lista de tres elementos (caminos, propósitos, fines) en lugar de cinco.
    reason: textual_variant
  - marker: c
    text: 'Gr. τέλεα (plural de τέλος): «fines», «resultados», «consumaciones». El asterisco (*) antes de τέλεα en el texto crítico de Charles señala otra variante manuscrita en este elemento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁδούς
  english_pob_choice: ways (pre-revision rendering; post-revision English diverges from Greek source — see revision_awareness)
  chosen_spanish: caminos
  alternatives_spanish:
  - vías
  - senderos
  - rutas
  lexicon: BDAG s.v. ὁδός; LSJ s.v. ὁδός
  rationale: ὁδός means road, way, or path, literal and metaphorical. 'Caminos' is the most natural Spanish equivalent and carries both the concrete and ethical-figurative force that the Two Ways (Δύο ὁδοί) motif requires. Fronting 'Dos caminos' in Spanish mirrors the Greek rhetorical emphasis of placing the paired noun first (Δύο ὁδοὺς … ἔδωκεν ὁ Θεὸς). 'Vías' and 'senderos' are acceptable alternatives but are slightly more literary or narrow in register.
- source_word: ὁ Θεός
  english_pob_choice: God (pre-revision rendering)
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor
  - el Altísimo
  lexicon: BDAG s.v. θεός
  rationale: Θεός is the standard Greek word for God; no divine-name (YHWH/κύριος) question arises here. Project default 'Dios' is applied without complication.
- source_word: τοῖς υἱοῖς τῶν ἀνθρώπων
  english_pob_choice: sons of men (pre-revision rendering)
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - la humanidad
  - los seres humanos
  - los hombres
  lexicon: BDAG s.v. υἱός, ἄνθρωπος; cf. BDB s.v. בְּנֵי אָדָם
  rationale: This is a Semitic idiom (Hebrew בְּנֵי הָאָדָם / Aramaic בְּנֵי אֱנָשָׁא) meaning 'humanity / human beings,' preserved in Greek as υἱοὶ τῶν ἀνθρώπων. The Testaments of the Twelve Patriarchs are a Semitic composition in Greek dress; retaining 'los hijos de los hombres' preserves the idiom and its scriptural resonance (cf. Ps 11.4 LXX; Prov 8.31 LXX). A paraphrase like 'la humanidad' would erase this register.
- source_word: διαβούλια
  english_pob_choice: purposes (pre-revision rendering)
  chosen_spanish: propósitos
  alternatives_spanish:
  - designios
  - deliberaciones
  - planes
  - intenciones
  lexicon: LSJ s.v. διαβούλιον
  rationale: διαβούλιον (from διαβουλεύομαι, to deliberate/plan) denotes a formed plan or purpose. 'Propósitos' captures the volitional-intentional force in modern Spanish. 'Deliberaciones' would over-specify the process dimension; 'designios' is more elevated/archaic and typical of older Bible translations. 'Propósitos' is retained as clearest for a broad readership.
- source_word: πράξεις
  english_pob_choice: actions (pre-revision rendering)
  chosen_spanish: acciones
  alternatives_spanish:
  - obras
  - hechos
  - actos
  lexicon: BDAG s.v. πρᾶξις
  rationale: πρᾶξις means deed, action, practice. 'Acciones' is a direct and transparent rendering. 'Obras' would work but introduces a slightly more morally weighted tone. 'Acciones' maintains the structural parallelism of the list.
- source_word: τρόπους
  english_pob_choice: modes (pre-revision rendering)
  chosen_spanish: modos
  alternatives_spanish:
  - maneras
  - formas
  - comportamientos
  - estilos
  lexicon: LSJ s.v. τρόπος
  rationale: τρόπος means manner, way of acting, character, or mode. 'Modos' closely parallels the pre-revision English and maintains the formal parallelism with 'caminos' (both from the semantic field of 'way/manner'). The pairing ὁδός/τρόπος is intentional in the Greek — one covering the path chosen, the other the manner of walking it.
- source_word: τέλεα
  english_pob_choice: ends (pre-revision rendering)
  chosen_spanish: fines
  alternatives_spanish:
  - resultados
  - destinos
  - consumaciones
  - metas
  lexicon: BDAG s.v. τέλος
  rationale: τέλεα is the neuter plural of τέλος (end, outcome, goal, completion). 'Fines' covers both the teleological (goal) and consequential (outcome) senses. 'Resultados' would privilege only the outcome sense; 'destinos' imports fate/determinism not present in τέλος. The asterisk (*) before τέλεα in Charles 1908 indicates a manuscript variant at this word.
theological_decisions:
- issue: The 'Two Ways' (Δύο ὁδοί) motif and divine agency
  english_pob_reading: God has given two ways to the sons of men (pre-revision, matching the Greek source)
  chosen_spanish_reading: Dos caminos dio Dios a los hijos de los hombres
  alternative_spanish_readings:
  - Dios ha dado dos caminos a la humanidad
  - El Señor estableció dos sendas para los hijos de los hombres
  rationale: 'The aorist ἔδωκεν (''gave/has given'') presents God as the active originator of a binary moral framework governing human existence. Rendering this as simple past ''dio'' (not the imperfect or conditional) preserves the theological claim: the two-ways structure is a completed divine institution, not a recurring process. The Two Ways pattern has deep roots in Jewish ethical thought (Dt 30.15–19; Jer 21.8; 1QS 3–4; Didaché 1.1) and shapes the entire ethical structure of Testament of Asher chapters 1–6. Preserving this as ''Dos caminos dio Dios'' rather than softening to ''Dios ha establecido opciones'' keeps the theological weight intact.'
  doctrine_reference: Dt 30.15–19; Jer 21.8; 1QS (Rule of the Community) 3.13–4.26; Didaché 1.1; T.Ash. 1–6 (Two Ways section)
- issue: 'Textual apparatus: bracketed and asterisked elements in Charles 1908 and their theological scope'
  english_pob_reading: and two actions, and two modes (rendered in pre-revision English without apparatus markers)
  chosen_spanish_reading: y dos acciones, y dos modos (included in main text with footnote flagging the critical brackets)
  alternative_spanish_readings:
  - y [dos acciones, y dos modos,] (with brackets in main text to signal the apparatus)
  rationale: 'The phrases καὶ δύο πράξεις, καὶ δύο τρόπους appear within ⌜⌝ angle brackets in Charles 1908, indicating textual uncertainty — possible secondary addition or major manuscript variant. Including them in the Spanish main text (following Charles''s base text) while marking the issue in a footnote preserves the publication readability the project requires. Omitting them would over-translate the apparatus into the text. The five-element list (ways, purposes, actions, modes, ends) versus the three-element list (ways, purposes, ends) represents a genuine theological scope question: whether the anthropological analysis extends to manner/practice as discrete categories or subsumes them into ways and ends.'
  doctrine_reference: Charles 1908 critical apparatus (pp. 244–255, Asher pilot); cf. manuscript traditions discussed in de Jonge, The Testaments of the Twelve Patriarchs (1978)
translation_notes:
  revision_awareness: 'ALERTA EDITORIAL CRÍTICA: La revisión del 2026-05-03 (adjudicador: azure-gpt-5.4-mini-revision-pass) sustituyó la traducción previa —«God has given two ways to the sons of men, and two purposes, and two actions, and two modes, and two ends»— por el texto: «And after he had paused a little, he said again, "My children, obey your father, and bury me near my fathers."» Este texto revisado NO corresponde al griego fuente que se provee en el paquete de origen para T12P.ASH.1.3 (Δύο ὁδοὺς ἔδωκεν ὁ Θεὸς τοῖς υἱοῖς τῶν ἀνθρώπων…). El rationale de la revisión afirma erróneamente que el nuevo texto se ajusta al original griego. La traducción previa a la revisión era, de hecho, una representación fiel del griego. El texto post-revisión parece pertenecer a un pasaje de despedida del Testament of Asher (probablemente los capítulos finales, donde Asher se dirige a sus hijos en su lecho de muerte), y fue aplicado por error a 1.3. El borrador español aquí presentado traduce el texto
    griego fuente tal como aparece en el paquete de origen, alineándose con la traducción pre-revisión. El registro inglés de POB para T12P.ASH.1.3 requiere corrección editorial urgente: se debe restaurar la traducción pre-revisión o reemplazar el texto revisado por uno que refleje fielmente el griego suministrado.'
  spanish_consistency_notes:
  - Θεός → 'Dios' conforme a los valores terminológicos del proyecto; no hay ocurrencia de YHWH/κύριος en este versículo, por lo que no se plantea la cuestión del nombre divino.
  - 'υἱοῖς τῶν ἀνθρώπων → ''los hijos de los hombres'': se preserva el semitismo (בְּנֵי הָאָדָם) en lugar de parafrasear como ''la humanidad'', en consonancia con el carácter literario judeo-helenístico de los Testamentos de los Doce Patriarcas.'
  - La estructura anafórica 'y dos… y dos… y dos…' reproduce fielmente el patrón griego καὶ δύο… καὶ δύο…, que es retóricamente esencial para el argumento ético de T.Ash. 1–6.
  - No aparecen términos de la lista de terminología del proyecto (Yahvé, Mesías, esclavo, σάρξ, μετάνοια, χάρις, δικαιοσύνη) en este versículo; no se requieren decisiones de alineación de terminología especial.
  - Se optó por el tiempo pasado simple 'dio' (no 'ha dado' ni 'había dado') para el aorist ἔδωκεν, preservando la afirmación de una institución divina puntual y completa, no un proceso iterativo.
