id: T12P.ASH.1.6
reference: Testament of Asher 1:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: Ἐὰν οὖν²⁶ ἡ ψυχὴ θέλει²⁷ *†καλῶς πορευθῆναι†, πάσας τὰς πράξεις αὐτῆς ποιεῖ²⁸ ἐν δικαιοσύνῃ, *κἂν ἁμάρτῃ²⁹ εὐθὺς³⁰ μετανοεῖ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/001/006.yaml
  text: If, then, the soul wants to walk well, it does all its actions in righteousness; and even if it sins, it immediately repents.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:53Z'
    unchanged: false
    changes_summary: Adjusted 'desires' to 'wants' for a more direct rendering of θέλει, and 'deeds' to 'actions' for πράξεις; retained the rest of the draft as accurate and natural.
translation:
  language: es
  text: Si, pues, el alma quiere caminar bien,[a] realiza todas sus acciones en justicia; y aun si peca, inmediatamente se arrepiente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase «caminar bien» (καλῶς πορευθῆναι) está marcada con óbelos (†…†) en la edición de Charles (1908), lo cual indica incertidumbre sobre el estado del texto griego en este punto. El sentido general queda no obstante claro por el contexto.
    reason: textual_variant
lexical_decisions:
- source_word: θέλει
  english_pob_choice: wants
  chosen_spanish: quiere
  alternatives_spanish:
  - desea
  - anhela
  - tiene voluntad de
  lexicon: 'BDAG θέλω: to have a desire for something, to want, wish, will'
  rationale: The English POB revision explicitly moved from 'desires' (βούλομαι-register) to 'wants' as a more direct rendering of θέλει. Spanish 'quiere' (querer) matches this volitional directness — it is the natural, unmarked verb of wanting in modern Spanish. 'Desea' would over-intensify toward longing; 'anhela' would add lyrical force not present in the Greek.
- source_word: †καλῶς πορευθῆναι†
  english_pob_choice: to walk well
  chosen_spanish: caminar bien
  alternatives_spanish:
  - andar bien
  - vivir rectamente
  - conducirse bien
  lexicon: 'BDAG πορεύομαι: to conduct one''s life, to live, to walk (as ethical metaphor); καλῶς: well, rightly, in a good manner'
  rationale: The Hellenistic ethical idiom of 'walking' as a metaphor for moral conduct is well established (cf. Pauline περιπατέω usage). 'Caminar bien' preserves the literal metaphor that the source sustains and is fully natural in Spanish ethical discourse. Charles's daggers (†…†) flag a textual issue in the Greek witnesses; a footnote records this. The English POB retained 'walk well' without paraphrase, and the Spanish follows suit.
- source_word: πράξεις
  english_pob_choice: actions
  chosen_spanish: acciones
  alternatives_spanish:
  - obras
  - hechos
  - actos
  lexicon: 'BDAG πρᾶξις: deed, action, activity, conduct'
  rationale: The English POB revision explicitly chose 'actions' over 'deeds' for πράξεις, noting a preference for the more direct, behavioral register. Spanish 'acciones' mirrors this choice and avoids the more liturgically weighted 'obras' (which often carries Reformation-era resonance of 'works of the law'). 'Acciones' remains neutral and modern.
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  lexicon: 'BDAG δικαιοσύνη: the quality of being upright, righteousness; conformity to divine or moral norms'
  rationale: Per project terminology defaults, δικαιοσύνη → 'justicia' / 'rectitud' by context. Here the force is ethical conduct (doing all one's actions in accordance with moral rightness), not covenant-legal justification. 'Justicia' is the broader, more natural Spanish term and is used widely in Jewish moral literature of the Second Temple period. No covenant-forensic nuance requires 'rectitud' instead.
- source_word: εὐθύς
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - de inmediato
  - al instante
  - enseguida
  lexicon: 'BDAG εὐθύς: at once, immediately, right away'
  rationale: εὐθύς is an unambiguous adverb of immediate temporal sequence. 'Inmediatamente' is the closest Spanish adverb and most literal; 'de inmediato' and 'enseguida' are natural synonyms but less formal. 'Inmediatamente' preserves the deliberate rhetorical stress on the swiftness of the soul's repentance.
- source_word: μετανοεῖ
  english_pob_choice: repents
  chosen_spanish: se arrepiente
  alternatives_spanish:
  - cambia de mente
  - cambia de parecer
  lexicon: 'BDAG μετανοέω: to change one''s mind, feel remorse, repent; in Jewish-Christian ethical context often specifically turning away from sin'
  rationale: Per project defaults, μετάνοια/μετανοέω → 'arrepentimiento/arrepentirse' in sin-turning contexts; 'cambio de mente/pensamiento' where the cognitive force is primary. Here the verb follows explicitly 'even if it sins' (κἂν ἁμάρτῃ), placing it squarely in a sin-turning context. 'Se arrepiente' is the correct register. The cognitive etymology need not be foregrounded in the main text, though the footnote field captures that the Greek root means a change of mind/orientation.
theological_decisions:
- issue: 'μετανοεῖ after ἁμάρτῃ: cognitive vs. penitential rendering'
  english_pob_reading: immediately repents
  chosen_spanish_reading: inmediatamente se arrepiente
  alternative_spanish_readings:
  - inmediatamente cambia de mente
  - al instante se convierte
  rationale: The project defaults distinguish the cognitive force of μετανοέω ('cambio de mente') from the penitential sense ('arrepentirse'). In Testament of Asher 1:6 the context is explicitly sinning (ἁμάρτῃ), so the soul's response is a turning away from that sin — a volitional and moral reorientation, not merely an intellectual shift. 'Se arrepiente' captures this moral-penitential turning and is consistent with the English POB's 'repents'. The cognitive etymology (μετα + νοέω, a change of mind/orientation) does not require a different surface rendering here, but it is noted so the reader understands the word carries more than emotional remorse.
  doctrine_reference: Testament of Asher 1 contextualizes the two-inclination (δύο πρόσωπα) ethical framework; repentance here is the soul's corrective response within that dualist moral anthropology, aligning with Second Temple Jewish understandings of teshuvah.
translation_notes:
  revision_awareness: 'The English POB underwent one documented revision pass (azure-gpt-5.4-mini, 2026-05-03): ''desires'' → ''wants'' for θέλει (more direct volitional register) and ''deeds'' → ''actions'' for πράξεις (more behaviorally neutral). The Spanish draft incorporates both judgments: ''quiere'' for θέλει (not ''desea'') and ''acciones'' for πράξεις (not ''obras'' or ''hechos''). No further revisions are recorded; cross-check showed high agreement (0.93) with only minor issues flagged.'
  spanish_consistency_notes:
  - No divine name (יהוה / κύριος) appears in this verse; the 'Yahvé' default is not triggered.
  - δικαιοσύνη → 'justicia' per project default; ethical rather than forensic force here, so no need for 'rectitud'.
  - μετανοεῖ → 'se arrepiente' per project default for sin-turning contexts; the cognitive etymology is preserved in a theological decision note.
  - 'ψυχή → ''alma'': standard Spanish rendering; no wind/breath/spirit ambiguity present (πνεῦμα/רוּחַ default not triggered).'
  - No Χριστός or Ἰησοῦς terminology present; Mesías/Cristo/Jesús defaults not triggered.
