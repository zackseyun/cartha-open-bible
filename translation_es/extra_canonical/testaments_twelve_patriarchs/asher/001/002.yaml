translation:
  language: es
  text: 'Estando aún sano[a], les dijo: «Escuchen, hijos de Asher, su padre, y les mostraré todo lo recto[b] ante Dios[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego tiene Ὑγιαίνων ⌜γὰρ⌝ (Charles apara. nota 6: γὰρ es variante de algunos manuscritos). La partícula γὰρ conecta este versículo con v. 1:1, donde se menciona la edad de Asher (125 años). Esa referencia cronológica no aparece en el texto griego de v. 1:2 y no se ha incorporado a esta traducción.'
    reason: textual_variant
  - marker: b
    text: 'Gr. τὸ εὐθές, lit. ''lo recto/lo derecho''. El término es central en el Testament of Asher, que desarrolla la enseñanza sobre los dos caminos: el recto y el torcido. Alternativa: ''lo correcto''.'
    reason: lexical_alternative
  - marker: c
    text: El asterisco en τοῦ Θεοῦ en el aparato de Charles señala una variante textual. La traducción sigue el texto base con 'Dios' (θεός).
    reason: textual_variant
lexical_decisions:
- source_word: Ὑγιαίνων
  english_pob_choice: while still healthy
  chosen_spanish: estando aún sano
  alternatives_spanish:
  - estando en plena salud
  - gozando de buena salud
  - sano todavía
  lexicon: 'LSJ ὑγιαίνω: to be healthy, in good health (present participle)'
  rationale: El participio presente Ὑγιαίνων señala que Asher habla mientras goza de salud, rasgo típico del género testamentario. 'Estando aún sano' preserva la fuerza adverbial temporal y el matiz de continuidad. La nota textual (asterisco en el aparato de Charles) indica variante manuscrita sobre la forma verbal; la traducción sigue el texto base sin alterar el sentido.
- source_word: γὰρ
  english_pob_choice: (absorbed into year-of-life clause)
  chosen_spanish: (no traducido como partícula explícita; ver nota [a])
  alternatives_spanish:
  - pues
  - en efecto
  lexicon: 'BDAG γάρ: connective/causal particle, here linking to antecedent in v. 1:1'
  rationale: El γὰρ (señalado como variante ⌜γὰρ⌝⁶ en Charles) es una partícula conectiva que enlaza este verso con el contenido de v. 1:1 donde se menciona la edad del patriarca. La traducción POB en inglés absorbió el referente temporal de v. 1:1 ('In the one hundred and twenty-fifth year') dentro de este versículo, lo cual va más allá de lo que el texto griego de v. 1:2 contiene. El español omite una partícula conectiva explícita para no crear una anacolutia al presentar el versículo de forma aislada, y se remite a la nota.
- source_word: εἶπε πρὸς αὐτούς
  english_pob_choice: he said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - dijo a ellos
  - habló a ellos
  lexicon: BDAG λέγω aorist εἶπε; πρός + acusativo de destinatario
  rationale: '''Les dijo'' es la traducción más natural en español neutro y preserva la función narrativa de introducción al discurso directo. No se pierde información semántica.'
- source_word: τέκνα Ἀσήρ, τοῦ πατρὸς ὑμῶν
  english_pob_choice: children of Asher, your father
  chosen_spanish: hijos de Asher, su padre
  alternatives_spanish:
  - hijos de Asher, de vuestro padre
  - hijos míos, de Asher su padre
  lexicon: 'BDAG τέκνον: child, son/daughter; τοῦ πατρὸς ὑμῶν: genitivo de aposición'
  rationale: '''τέκνα'' en vocativo con el genitivo de identificación ''τοῦ πατρὸς ὑμῶν'' funciona como aposición aclaratoria: ''hijos de Asher —quien es su padre—''. ''Hijos'' es preferible a ''niños'' porque refleja la relación filial adulta en contexto testamentario. Se usa ''su padre'' (español neutro latinoamericano) en lugar de ''vuestro padre'' para mantener uniformidad de registro.'
- source_word: πᾶν τὸ εὐθές
  english_pob_choice: everything upright
  chosen_spanish: todo lo recto
  alternatives_spanish:
  - todo lo correcto
  - todo lo justo
  - todo lo que es recto
  lexicon: 'LSJ εὐθύς / εὐθές: straight, direct; morally upright, right (neuter substantive τὸ εὐθές = ''what is upright/right'')'
  rationale: '''Recto'' (de lat. rectus = derecho, correcto) capta el sentido de enderezamiento moral que εὐθές evoca. Es especialmente apropiado en el Testament of Asher, cuyo tema central son los dos caminos (recto/torcido). ''Correcto'' sería más neutro y perdería la connotación de rectitud moral; ''justo'' (δίκαιος) introduciría un término diferente. ''Todo lo recto'' preserva el alcance universal (πᾶν).'
- source_word: ἐνώπιον τοῦ Θεοῦ
  english_pob_choice: before God
  chosen_spanish: ante Dios
  alternatives_spanish:
  - delante de Dios
  - en presencia de Dios
  lexicon: 'BDAG ἐνώπιον: before, in the presence of (preposición de presencia/juicio divino)'
  rationale: '''Ante Dios'' es conciso y natural en español para la construcción judicial/relacional ἐνώπιον + genitivo divino. ''Delante de Dios'' es igualmente válido; se prefiere ''ante'' por su mayor sobriedad en contexto solemne. El asterisco en τοῦ Θεοῦ en el aparato de Charles indica variante textual sobre este sintagma (ver nota [c]).'
- source_word: ὑποδείξω ὑμῖν
  english_pob_choice: I will show you
  chosen_spanish: les mostraré
  alternatives_spanish:
  - les indicaré
  - les enseñaré
  - les haré ver
  lexicon: 'LSJ ὑποδείκνυμι: to show by example, point out, demonstrate (future ὑποδείξω)'
  rationale: '''Mostraré'' (futuro de mostrar) corresponde adecuadamente al futuro griego de un verbo que implica demostración o señalamiento. ''Enseñaré'' añadiría una dimensión pedagógica que el verbo griego no requiere necesariamente; ''indicaré'' es igualmente posible pero ligeramente más abstracto.'
theological_decisions:
- issue: τοῦ Θεοῦ (con asterisco de variante textual en Charles)
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Señor
  - el Altísimo
  rationale: 'Siguiendo los valores predeterminados del proyecto, θεός se traduce ''Dios''. El asterisco en el aparato de Charles sobre τοῦ Θεοῦ señala una variante manuscrita, pero el sentido teológico no se altera: la rectitud que Asher promete enseñar está definida en referencia a la norma divina. No hay evidencia de que la variante sustituya el nombre divino por otro término; se mantiene ''Dios'' sin oscurecer la variante en nota.'
  doctrine_reference: 'T12P contexto: la rectitud ética medida ''ante Dios'' es el eje del testamento de Asher (dos caminos).'
- issue: Ausencia del dato cronológico (125 años) en el texto griego de v. 1:2
  english_pob_reading: In the one hundred and twenty-fifth year of his life, while still healthy
  chosen_spanish_reading: Estando aún sano (sin referencia a los 125 años)
  alternative_spanish_readings:
  - En el centésimo vigésimo quinto año de su vida, estando aún sano
  rationale: El griego asignado a T12P.ASH.1.2 comienza con 'Ὑγιαίνων γὰρ εἶπε' sin incluir los 125 años. La información cronológica pertenece al versículo anterior (v. 1:1). La traducción POB en inglés absorbió ese dato en este versículo, lo que el cross_check_summary marca como 'major-issues' con acuerdo de 0.1. La traducción española sigue fielmente el texto griego de v. 1:2 y no importa información del versículo precedente.
  doctrine_reference: 'Principio editorial POB: no parafrasear más allá de lo que el texto fuente justifica; el audit trail debe ser reproducible desde el griego.'
translation_notes:
  revision_awareness: 'El cross_check_summary marca este versículo con ''major-issues'' (agreement 0.1). El problema central identificado en la revisión anterior es que la traducción POB en inglés incorporó a v. 1:2 el dato cronológico de los 125 años, que pertenece al griego de v. 1:1. Esta traducción española corrige ese desbordamiento volviendo estrictamente al texto griego asignado a v. 1:2. El applied_revisions está vacío y el último paso indicó ''unchanged: true'', lo que sugiere que el conflicto no fue resuelto en la cadena inglesa anterior. La traducción española opta por fidelidad al fuente sobre coherencia con la versión inglesa problemática.'
  spanish_consistency_notes:
  - 'Se usa español neutro latinoamericano: ''les dijo'', ''su padre'', ''les mostraré'' (no ''os dijo'', ''vuestro padre'', ''os mostraré'').'
  - θεός → 'Dios' conforme al valor predeterminado del proyecto.
  - τέκνα → 'hijos' (no 'niños') por el registro solemne testamentario.
  - εὐθές → 'recto' en vez de 'justo' para preservar la distinción semántica con δίκαιος.
