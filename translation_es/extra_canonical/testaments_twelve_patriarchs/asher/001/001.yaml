translation:
  language: es
  text: Testamento de Aser, el décimo hijo de Jacob y Zilpa.[a] 1[1]. Copia del testamento de Aser,[b] lo que habló a sus hijos en el año ciento veinticinco[c] de su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego Ζέλφας (gen. de Ζέλφα), transcripción del hebreo זִלְפָּה (Zilpá). Las traducciones españolas modernas usan uniformemente 'Zilpa'; la forma más antigua 'Zelfa' (Reina-Valera) se evita aquí.
    reason: lexical_alternative
  - marker: b
    text: 'Griego Ἀντίγραφον διαθήκης Ἀσήρ: ἀντίγραφον designa específicamente una copia escrita o transcripción de un documento. La traducción inglesa de la POB sólo reproduce esta frase y omite la cláusula relativa y el sintagma temporal que siguen en el texto griego; el borrador español restituye el versículo completo conforme al texto griego de Charles 1908.'
    reason: source_note
  - marker: c
    text: Griego ἐν ἑκατοστῷ εἰκοστῷ πέμπτῳ ἔτει τῆς ζωῆς αὐτοῦ. En la edición de Charles 1908 esta cláusula temporal aparece señalada con asteriscos (*), lo que puede indicar incertidumbre textual o dependencia de determinados manuscritos griegos. El borrador español la conserva siguiendo el texto base de Charles, pero se recomienda cotejar el aparato crítico.
    reason: textual_variant
lexical_decisions:
- source_word: Διαθήκη
  english_pob_choice: testament
  chosen_spanish: testamento
  alternatives_spanish:
  - pacto
  - convenio
  lexicon: 'BDAG διαθήκη 2: ''a formal declaration of one''s wishes''; in testamentary literature the term denotes a farewell discourse/last will, distinct from the covenant (berith) sense dominant in the LXX.'
  rationale: 'In the Testaments of the Twelve Patriarchs the genre is explicitly testamentary: a patriarch''s final address to his sons. ''Testamento'' is accurate and natural in Spanish. ''Pacto'' or ''convenio'' would introduce a false theological colouring absent from this context.'
- source_word: Ἀντίγραφον
  english_pob_choice: copy
  chosen_spanish: copia
  alternatives_spanish:
  - transcripción
  - traslado
  lexicon: 'LSJ ἀντίγραφον: ''a copy, transcript (of a document)''; emphasises the written, reproduced character of the text.'
  rationale: '''Copia'' is the standard Spanish equivalent for a written transcript. ''Transcripción'' would also be precise but is slightly more technical; ''copia'' is more natural and publication-readable.'
- source_word: ἃ ἐλάλησε
  english_pob_choice: (omitted in English POB)
  chosen_spanish: lo que habló
  alternatives_spanish:
  - las palabras que pronunció
  - lo que dijo
  lexicon: 'LSJ λαλέω: ''to speak, say''; aorist indicative active. The neuter plural relative ἃ refers anaphorically to the contents of the testament — ''the things which he spoke.'''
  rationale: '''Lo que habló'' renders ἃ ἐλάλησε faithfully: the neuter plural relative collapses naturally into ''lo que'' in Spanish, and the aorist is rendered by the preterite ''habló''. This relative clause is entirely absent from the English POB and is restored here from the Greek source.'
- source_word: Ζέλφας
  english_pob_choice: Zilpah
  chosen_spanish: Zilpa
  alternatives_spanish:
  - Zilfa
  - Zelfa
  lexicon: Greek Ζέλφα (genitive Ζέλφας), transcribing Hebrew זִלְפָּה (Zilpah). Standard Spanish OT translations (e.g. NBV, NVI) use 'Zilpa'.
  rationale: '''Zilpa'' is the standard modern Spanish form of the name, matching established Spanish Bible usage. ''Zelfa'' is the older Reina-Valera form; avoided here in favour of the modern convention.'
- source_word: ἑκατοστῷ εἰκοστῷ πέμπτῳ ἔτει
  english_pob_choice: (omitted in English POB)
  chosen_spanish: el año ciento veinticinco
  alternatives_spanish:
  - el año ciento vigésimo quinto
  lexicon: Greek ordinal numerals in the dative (ἑκατοστῷ εἰκοστῷ πέμπτῳ) used with ἔτει for temporal expression. Standard Spanish renders years of life with cardinal numerals.
  rationale: Greek uses ordinals stacked in the dative; Spanish idiom for years of a lifespan uses cardinals ('año ciento veinticinco de su vida'), which is more natural than the stilted ordinal form 'ciento vigésimo quinto'. The clause is absent from the English POB and is restored from the Greek.
- source_word: δεκάτου υἱοῦ
  english_pob_choice: (part of book title, not separately rendered in English POB verse)
  chosen_spanish: el décimo hijo
  alternatives_spanish:
  - el hijo décimo
  lexicon: Greek δέκατος, ordinal 'tenth'; υἱός 'son'.
  rationale: The book-level superscription identifies Asher as Jacob's tenth son. 'El décimo hijo' is natural Spanish word order for an ordinal modifier. The superscription is present in the Charles 1908 Greek source but not reproduced in the English POB's verse-level entry.
theological_decisions:
- issue: Genre of Διαθήκη in pseudepigraphal context vs. covenantal theology
  english_pob_reading: testament (farewell-discourse genre)
  chosen_spanish_reading: testamento
  alternative_spanish_readings:
  - pacto
  - alianza
  rationale: The Testaments of the Twelve Patriarchs belong to the Second Temple testamentary genre (Gattung), where Διαθήκη designates a patriarch's deathbed address, not a theological covenant. Rendering it 'pacto' or 'alianza' would import covenant theology that the literary genre does not carry here. 'Testamento' preserves the genre signal without theological overloading.
  doctrine_reference: T12P genre; cf. von Nordheim, Die Lehre der Alten I (1980); Charles 1908 introduction pp. xxxiv–xlii.
translation_notes:
  revision_awareness: 'El cross_check_summary marca este registro como major-issues con acuerdo de 0.1. El texto inglés de la POB («The copy of the testament of Asher») es significativamente incompleto: omite (1) la superscripción del libro que identifica a Aser como «el décimo hijo de Jacob y Zilpa»; (2) la cláusula relativa «lo que habló a sus hijos» (ἃ ἐλάλησε τοῖς υἱοῖς αὐτοῦ); y (3) el sintagma temporal «en el año ciento veinticinco de su vida» (ἐν ἑκατοστῷ εἰκοστῷ πέμπτῳ ἔτει τῆς ζωῆς αὐτοῦ). El borrador español trabaja directamente desde el texto griego de Charles 1908 y restituye los tres elementos. Los asteriscos del aparato de Charles que preceden al sintagma temporal sugieren variación manuscrita; se anota en la nota [c]. No hay revisiones aplicadas previas (applied_revisions vacío) ni decisiones léxicas o teológicas registradas en la POB inglesa, de modo que la cadena de auditoría española se construye enteramente desde el griego.'
  spanish_consistency_notes:
  - Se adopta 'Aser' (sin hache) como forma española estándar del nombre propio hebreo אָשֵׁר, coherente con el uso de las traducciones españolas modernas (NVI, NBV, BLP).
  - Se adopta 'Zilpa' (no 'Zilfa') como forma española de זִלְפָּה, siguiendo traducciones modernas; debe mantenerse consistente en toda la sección del Testamento de Aser.
  - La palabra 'testamento' se usa para Διαθήκη en todo el corpus de los Testamentos de los Doce Patriarcas; no debe alternarse con 'pacto' o 'alianza' dentro de este documento sin justificación fuente explícita.
  - '''Copia'' se adopta para Ἀντίγραφον; si el término reaparece en otros versículos introductorios del corpus T12P, debe mantenerse la misma elección léxica para coherencia editorial.'
