translation:
  language: es
  text: Por eso, todas las cosas son dobles[a], la una frente a la otra.
  philosophy: formal
  footnotes:
  - marker: a
    text: 'δύο (dyo): literalmente ''dos''; ''dobles'' refleja el sentido cualitativo de dualidad que el contexto requiere. La construcción ἐν κατέναντι τοῦ ἑνός significa literalmente ''en oposición al uno,'' es decir, que cada cosa tiene su contraparte directamente frente a ella. Los superíndices ¹⁷⁻¹⁹ en el texto griego de Charles 1908 remiten a variantes en el aparato crítico de las distintas familias de manuscritos griegos del Testamento de Aser.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο
  english_pob_choice: '[not represented in English POB — see revision_awareness]'
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Por esta razón
  - En consecuencia
  lexicon: BDAG s.v. διά II.2; LSJM s.v. κατέναντι
  rationale: Διὰ τοῦτο is a standard causal-resultative connective ('therefore / for this reason'). 'Por eso' is the most natural, modern Spanish equivalent. 'Por tanto' is equally valid but slightly more formal-archaic. The phrase introduces the conclusion or consequence of the preceding context.
- source_word: πάντα
  english_pob_choice: '[not represented in English POB — see revision_awareness]'
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todas las realidades
  lexicon: BDAG s.v. πᾶς 1b (neuter plural substantive)
  rationale: πάντα here is nominative neuter plural, functioning as subject ('all things'). 'Todas las cosas' is the standard formal rendering in Spanish theological literature. 'Todo' is possible but loses the distributive force the context requires (individual pairs, not a collective mass).
- source_word: δύο εἰσίν
  english_pob_choice: '[not represented in English POB — see revision_awareness]'
  chosen_spanish: son dobles
  alternatives_spanish:
  - son dos
  - son duales
  - existen en pares
  lexicon: BDAG s.v. δύο; LSJ s.v. δύο
  rationale: 'δύο εἰσίν is literally ''are two.'' In this dualistic context—the opening thesis of Asher''s testament—the predicate carries a qualitative rather than purely numerical force: each thing has a twofold character (good/evil counterpart). ''Son dobles'' captures this qualitative duality in Spanish. ''Son dos'' is more literal but reads as a mere count. A footnote preserves the literal alternative.'
- source_word: ἐν κατέναντι τοῦ ἑνός
  english_pob_choice: '[not represented in English POB — see revision_awareness]'
  chosen_spanish: la una frente a la otra
  alternatives_spanish:
  - una en oposición a la otra
  - la una en contra de la otra
  - una enfrentada a la otra
  lexicon: 'BDAG s.v. κατέναντι (preposition: ''over against, opposite, in front of''); LSJ s.v. κατέναντι'
  rationale: 'ἐν κατέναντι reinforces the spatial/relational sense of ''opposite, facing.'' τοῦ ἑνός (''the one'') completes the paired structure: each thing has its counterpart directly facing it. ''Frente a'' captures the face-to-face opposition without importing hostility (''en contra''). The article ''la una... la otra'' makes the Spanish pairing explicit and natural.'
theological_decisions:
- issue: Dualistic moral framework of Testament of Asher
  english_pob_reading: '[not represented in the English POB due to erroneous revision — see revision_awareness]'
  chosen_spanish_reading: todas las cosas son dobles, la una frente a la otra
  alternative_spanish_readings:
  - todas las cosas son dos, una opuesta a la otra
  rationale: 'T12P.ASH.1:4 is the thesis statement of Asher''s testament establishing its foundational ethical dualism: all moral realities exist as pairs of opposites. This verse is the hermeneutical key to the chapters that follow (the two-faced/two-way anthropology). The Spanish rendering preserves this programmatic force by rendering δύο as ''dobles'' (qualitative duality) rather than a bare numeral, and ἐν κατέναντι as ''frente a'' (face-to-face opposition) rather than a hostile collision term.'
  doctrine_reference: Cf. T12P.ASH.1:3–5 (Charles 1908 context); the two-way moral schema common in Second Temple literature (cf. 1QS III–IV; Did. 1:1)
translation_notes:
  revision_awareness: 'ALERTA CRÍTICA DE INTEGRIDAD DE DATOS: Existe una discordancia grave entre el texto fuente griego provisto en source_payload.text y la traducción inglesa final del POB. El texto griego proporcionado es: «Διὰ τοῦτο πάντα δύο εἰσίν, ἐν κατέναντι τοῦ ἑνός» (= ''Por eso, todas las cosas son dobles, la una frente a la otra''). Sin embargo, la revisión del 2026-05-03 sustituyó el borrador correcto ''Therefore all things are twofold, one over against the other'' por ''And he lifted up his feet and fell asleep in peace'', alegando que este último correspondía a frases griegas (ἐξάρας τοὺς πόδας αὐτοῦ; ἐκοιμήθη ἐν εἰρήνῃ) que NO aparecen en ningún lugar del texto fuente proporcionado. El contenido introducido por la revisión es propio de una fórmula de muerte/despedida (probablemente T12P.ASH.7:7 u otro pasaje de conclusión de testamento) y NO de T12P.ASH.1:4. En consecuencia, el borrador español presente IGNORA la traducción inglesa POB revisada y traduce fielmente el texto
    griego que figura en source_payload.text, conforme al principio rector del proyecto de trabajar desde la evidencia fuente original. Se recomienda investigación editorial urgente para determinar si hubo confusión de versículos en la cadena de revisión automatizada (azure-gpt-5.4-mini-revision-pass).'
  spanish_consistency_notes:
  - No hay nombres divinos (YHWH, Κύριος, θεός) en este versículo; los estándares terminológicos del proyecto no se activan aquí.
  - Este versículo no contiene δοῦλος, πνεῦμα, σάρξ, χάρις ni δικαιοσύνη; los términos por defecto del proyecto no son aplicables.
  - El texto pertenece a literatura deuterocanónica/pseudoepígrafa (Testamento de los Doce Patriarcas); el registro estilístico adoptado es formal-moderno, coherente con el tratamiento que el proyecto POB da a la sabiduría intertestamentaria.
  - La traducción española sigue al texto fuente griego (Charles 1908) directamente, no al inglés POB revisado, dada la discordancia documentada en revision_awareness.
