id: T12P.ASH.1.7
reference: Testament of Asher 1:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: Δίκαια *γὰρ λογιζομένη³¹ καὶ ἀπορρίπτουσα³² τὴν πονηρίαν ἀνατρέπει εὐθὺς τὸ κακόν³³, καὶ³⁴ ἐκριζοῖ³⁵ τὴν ἁμαρτίαν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/001/007.yaml
  text: For by considering what is righteous and casting away wickedness, it at once overturns evil and uproots sin.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:53Z'
    unchanged: false
    changes_summary: Adjusted 'thinking righteous thoughts' to a more literal and natural rendering of λογιζομένη ('considering what is righteous'); kept the rest, which accurately reflects the source.
translation:
  language: es
  text: Pues al considerar[a] lo justo y desechar[b] la maldad, al instante derrumba[c] el mal y desarraiga[d] el pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'λογιζομένη (participio de λογίζομαι): verbo con sentido deliberativo, de cálculo o reflexión ponderada; no meramente «pensar» sino «considerar detenidamente». La revisión inglesa del POB ajustó «thinking righteous thoughts» a «considering what is righteous» precisamente para recuperar esta matiz.'
    reason: lexical_alternative
  - marker: b
    text: 'ἀπορρίπτουσα: literalmente «arrojando» o «tirando lejos». Se prefiere «desechar» por su naturalidad en español y porque captura el rechazo intencional y decidido sin sobre-literalizar la imagen física.'
    reason: lexical_alternative
  - marker: c
    text: 'ἀνατρέπει: «vuelca, derrumba, derroca». La imagen es de algo que queda completamente invertido o tumbado. Alternativa: «vuelca el mal».'
    reason: lexical_alternative
  - marker: d
    text: 'ἐκριζοῖ: literalmente «arranca de raíz». «Desarraiga» preserva la metáfora agrícola; «extirpa» o «erradica» son posibles pero pierden la imagen de la raíz.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λογιζομένη
  english_pob_choice: considering (what is righteous)
  chosen_spanish: considerar (lo justo)
  alternatives_spanish:
  - pensar en lo justo
  - reflexionar sobre lo recto
  - calcular lo justo
  lexicon: 'LSJ λογίζομαι: to reckon, calculate, consider, reflect deliberatively'
  rationale: The English revision explicitly moved from 'thinking righteous thoughts' to 'considering what is righteous' to capture the deliberative, reckoning quality of λογίζομαι. Spanish 'considerar' reproduces this deliberative sense; 'pensar' would be too spontaneous/unreflective. The construction 'al considerar lo justo' (al + infinitive) handles the nominative-feminine participial subject without inserting a spurious noun, parallel to the Greek participle depending on context.
- source_word: ἀπορρίπτουσα
  english_pob_choice: casting away
  chosen_spanish: desechar
  alternatives_spanish:
  - arrojar
  - rechazar
  - deshacerse de
  lexicon: 'LSJ ἀποῤῥίπτω: to throw off/away, reject, discard'
  rationale: '''Desechar'' conveys the intentional, decisive rejection of wickedness — consistent with the deliberative tone of λογιζομένη. ''Arrojar'' (to hurl/throw) would over-literalize the physical metaphor and sound unnatural in modern Spanish theological prose. ''Rechazar'' is acceptable but slightly weaker.'
- source_word: τὴν πονηρίαν
  english_pob_choice: wickedness
  chosen_spanish: la maldad
  alternatives_spanish:
  - la iniquidad
  - la perversidad
  - lo malvado
  lexicon: 'LSJ πονηρία: badness, wickedness, depravity, moral evil'
  rationale: '''La maldad'' is the most natural, broadly intelligible modern Spanish rendering of πονηρία. ''La iniquidad'' is more archaic (Reina-Valera register) without added precision. ''La perversidad'' is possible but carries a stronger connotation of deliberate corruption.'
- source_word: ἀνατρέπει
  english_pob_choice: overturns
  chosen_spanish: derrumba
  alternatives_spanish:
  - vuelca
  - derroca
  - destruye
  - trastorna
  lexicon: 'LSJ ἀνατρέπω: to overturn, upset, throw down, demolish'
  rationale: '''Derrumba'' (collapses, brings down) preserves the decisive, instantaneous force of ἀνατρέπει while reading naturally in Spanish. ''Vuelca'' (overturns/tips over) is the more literal calque but risks sounding too domestic. ''Derroca'' implies a political overthrow. ''Derrumba'' best combines the sudden, total quality with natural Spanish idiom.'
- source_word: εὐθύς
  english_pob_choice: at once
  chosen_spanish: al instante
  alternatives_spanish:
  - inmediatamente
  - de inmediato
  - enseguida
  lexicon: 'BDAG εὐθύς (adv.): immediately, at once, right away'
  rationale: '''Al instante'' is precise, dignified, and idiomatic in modern Spanish theological prose. ''Inmediatamente'' is equally accurate but slightly more formal/bureaucratic; ''enseguida'' is colloquial.'
- source_word: ἐκριζοῖ
  english_pob_choice: uproots
  chosen_spanish: desarraiga
  alternatives_spanish:
  - extirpa
  - arranca de raíz
  - erradica
  lexicon: 'LSJ ἐκριζόω: to uproot, root out'
  rationale: '''Desarraiga'' directly preserves the agricultural/radical imagery of ἐκριζόω (''to pull up by the roots''). ''Extirpa'' is a Latinate medical term (excision) that shifts the register. ''Erradica'' is modern but loses the root/plant metaphor. ''Desarraiga'' keeps the image vivid and readable.'
- source_word: τὴν ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - la falta
  - el error
  - la transgresión
  lexicon: 'BDAG ἁμαρτία: sin, failure, missing the mark; in Jewish-Christian usage, moral/religious transgression'
  rationale: '''El pecado'' is the standard Spanish theological equivalent and is unambiguous in context. The alternatives (''la falta'', ''el error'') would flatten the moral-religious weight that ἁμαρτία carries in the Testaments of the Twelve Patriarchs, a Jewish text with clear moral-theological vocabulary.'
theological_decisions:
- issue: Implicit subject of the finite verbs and participial phrase
  english_pob_reading: it at once overturns evil and uproots sin
  chosen_spanish_reading: al instante derrumba el mal y desarraiga el pecado (subject implied, not stated)
  alternative_spanish_readings:
  - '[el alma] al instante derrumba...'
  - '[ella] al instante derrumba...'
  rationale: The Greek participles (λογιζομένη, ἀπορρίπτουσα) are nominative feminine singular, concording with ψυχή (soul) or a similar feminine noun in the surrounding discourse. The English POB renders this with 'it' (avoiding insertion of 'soul'). Spanish 'al + infinitive' construction naturally suppresses the subject, matching the English strategy and avoiding speculation about the exact antecedent without the broader context.
  doctrine_reference: T12P.ASH.1 — discourse on the two-faced soul and its moral capacity
translation_notes:
  revision_awareness: La revisión aplicada (2026-05-03, azure-gpt-5.4-mini) ajustó la traducción inglesa de λογιζομένη de «thinking righteous thoughts» a «considering what is righteous», recuperando el matiz deliberativo del término griego. El español «al considerar lo justo» sigue directamente esa decisión revisada y la confirma desde el léxico griego (LSJ λογίζομαι). El resto de la traducción inglesa se mantuvo sin cambios y tiene acuerdo alto (0.95) en el cross-check, lo que respalda el presente borrador español.
  spanish_consistency_notes:
  - No aparece יהוה / κύριος en este versículo; la política de 'Yahvé' no aplica aquí.
  - No hay terminología mesiánica, cristológica ni pneumatológica en este versículo.
  - «El pecado» (ἁμαρτία) y «la maldad» (πονηρία) se mantienen como sustantivos distinguibles; no se fusionan en un solo término.
  - El conector inicial «Pues» refleja γάρ explicativo-causal; es preferible a «Porque» para evitar una subordinación que haría del versículo una frase incompleta en lectura independiente.
  - La construcción 'al + infinitivo' para los participios griegos es solución estándar en español moderno y evita la inserción de un sujeto no documentado en el contexto inmediato.
