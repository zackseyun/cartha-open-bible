id: T12P.ASH.1.8
reference: Testament of Asher 1:8
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: Ἐὰν δὲ *ἐν †πονηρᾷ³⁶ κλίνῃ³⁷ †τὸ διαβούλιον†³⁸, *πᾶσα πρᾶξις αὐτῆς ἐστιν³⁹ ἐν πονηρίᾳ, καὶ⁴⁰ ἀπωθουμένη⁴¹ τὸ ἀγαθόν, *καὶ προσκολλώμενος⁴² τὸ κακόν, καὶ κυριευθεὶς⁴³ ὑπὸ⁴⁴ τοῦ Βελίαρ· κἂν⁴⁵ ἀγαθὸν⁴⁶ πράξει⁴⁷, Γἐν πονηρίᾳ⁴⁸ αὐτὸ⁴⁹ μεταστρέφει⁵⁰˥.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/001/008.yaml
  text: But if the intent inclines to evil, all its actions are in wickedness, driving away the good and clinging to the evil, and ruled by Beliar; and even if it does something good, it turns it into evil.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:53Z'
    unchanged: false
    changes_summary: Adjusted ‘purpose’ to ‘intent’ for closer lexical match to διαβούλιον and simplified ‘being ruled by’ to ‘ruled by’ to better fit the source participle while preserving meaning.
translation:
  language: es
  text: Pero si la intención[a] se inclina hacia el mal, todas sus acciones están en la maldad, rechazando lo bueno y aferrándose a lo malo, y dominada[b] por Beliar[c]; y aunque haga algo bueno, lo convierte en maldad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gr. τὸ διαβούλιον, «la deliberación» / «el propósito»; el inglés POB revisó «purpose» → «intent» para reflejar la carga deliberativa del término. Los signos †…† en la edición Charles señalan incertidumbre textual en torno a esta palabra. Se traduce «intención» por su fuerza volitiva-deliberativa en español.
    reason: lexical_alternative
  - marker: b
    text: Los participios gr. προσκολλώμενος y κυριευθεὶς están en masculino, frente a ἀπωθουμένη (femenino) que precede; el asterisco * en Charles marca estas formas como variantes textuales. El español normaliza al femenino por concordancia con «la intención».
    reason: textual_variant
  - marker: c
    text: 'Gr. Βελίαρ: transliteración griega del nombre del adversario espiritual del Segundo Templo. La tradición bíblica española usa a veces «Belial» (forma hebrea). Se conserva «Beliar» para fidelidad al texto griego fuente.'
    reason: source_note
lexical_decisions:
- source_word: τὸ διαβούλιον
  english_pob_choice: intent
  chosen_spanish: la intención
  alternatives_spanish:
  - el propósito
  - la deliberación
  - el designio
  lexicon: LSJ
  rationale: 'LSJ: διαβούλιον = ''deliberation, purpose''. El inglés POB revisó ''purpose'' → ''intent'' para capturar la carga deliberativa-volitiva del término. El español ''intención'' refleja esa orientación deliberada de la voluntad con naturalidad. El texto griego lleva marcas diacríticas †…† (Charles) que señalan incertidumbre textual en torno a este vocablo.'
- source_word: πονηρᾷ (adj.) / πονηρίᾳ (sust.)
  english_pob_choice: evil / wickedness
  chosen_spanish: el mal / la maldad
  alternatives_spanish:
  - malvado / malicia
  - el mal (ambas formas)
  lexicon: LSJ
  rationale: 'El versículo usa el adjetivo πονηρᾷ una vez y el sustantivo πονηρίᾳ dos veces. Se distinguen en español: ''el mal'' para el adjetivo y ''la maldad'' para el sustantivo, en paralelo con la distinción inglesa ''evil / wickedness'', preservando la fuerza nominal de πονηρίᾳ.'
- source_word: πρᾶξις
  english_pob_choice: actions
  chosen_spanish: acciones
  alternatives_spanish:
  - obras
  - actos
  - hechos
  lexicon: LSJ
  rationale: 'LSJ: πρᾶξις = ''doing, action, practice''. La revisión inglesa prefirió ''actions'' sobre ''deeds'' para una traducción más dinámica; ''acciones'' sigue esta elección con plena naturalidad en español.'
- source_word: ἀπωθουμένη
  english_pob_choice: driving away
  chosen_spanish: rechazando
  alternatives_spanish:
  - alejando
  - apartando
  - expulsando
  lexicon: LSJ
  rationale: 'LSJ: ἀπωθέω = ''push away, repel, reject''. ''Rechazando'' captura el rechazo activo y enérgico de lo bueno. ''Alejando'' resulta más débil; ''rechazando'' preserva mejor la fuerza de expulsión del participio griego.'
- source_word: τὸ ἀγαθόν / τὸ κακόν
  english_pob_choice: the good / the evil
  chosen_spanish: lo bueno / lo malo
  alternatives_spanish:
  - el bien / el mal
  - lo que es bueno / lo que es malo
  lexicon: LSJ
  rationale: 'Adjetivos sustantivados en neutro griego (τό + adj.). El español los renderiza como construcciones neutras sustantivadas con el artículo ''lo'': ''lo bueno'' / ''lo malo'', el equivalente natural de τὸ ἀγαθόν / τὸ κακόν. ''El bien / el mal'' también sería posible pero menos paralelo al texto fuente.'
- source_word: προσκολλώμενος
  english_pob_choice: clinging to
  chosen_spanish: aferrándose a
  alternatives_spanish:
  - pegándose a
  - apegándose a
  - adhiriéndose a
  lexicon: LSJ
  rationale: 'LSJ: προσκολλάω = ''glue/fasten to, attach closely''. ''Aferrándose a'' transmite la adhesión visceral e intencional del término. Nótese que el participio griego está en masculino (προσκολλώμενος) frente al femenino precedente ἀπωθουμένη; el español normaliza al femenino por concordancia con ''la intención'' (véase nota [b]).'
- source_word: κυριευθεὶς
  english_pob_choice: ruled by
  chosen_spanish: dominada por
  alternatives_spanish:
  - sojuzgada por
  - gobernada por
  - señoreada por
  lexicon: LSJ
  rationale: 'LSJ: κυριεύω = ''to be lord/master of, rule over''. Participio de aoristo pasivo que expresa sujeción total. La revisión inglesa simplificó ''being ruled by'' → ''ruled by'' para reflejar el aoristo sin aspecto progresivo; ''dominada por'' sigue esta decisión. El griego tiene masculino (κυριευθεὶς), pero el español usa femenino concordando con ''la intención''.'
- source_word: μεταστρέφει
  english_pob_choice: turns it into evil
  chosen_spanish: lo convierte en maldad
  alternatives_spanish:
  - lo transforma en maldad
  - lo pervierte
  - lo vuelve maldad
  lexicon: LSJ
  rationale: 'LSJ: μεταστρέφω = ''to turn about, transform, pervert''. ''Lo convierte en maldad'' preserva la fuerza transformadora del término: no mera apariencia de mal sino conversión real del bien en maldad. La cláusula está marcada con Γ…˥ en Charles, indicando pertenencia a un grupo de variantes; el sentido es coherente con el contexto.'
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: LSJ
  rationale: Βελίαρ es la forma griega del nombre del adversario espiritual, prominente en los Testamentos de los Doce Patriarcas y en la literatura del Segundo Templo (cf. 2 Cor 6:15). Se translitea como 'Beliar' siguiendo el griego fuente. 'Belial' (forma hebrea, בְּלִיַּעַל) es conocida en la tradición bíblica española pero se aparta de la forma griega textualmente atestiguada.
theological_decisions:
- issue: Beliar como figura del adversario espiritual y el sentido de 'dominada por Beliar'
  english_pob_reading: ruled by Beliar
  chosen_spanish_reading: dominada por Beliar
  alternative_spanish_readings:
  - sometida al poder de Beliar
  - bajo el señorío de Beliar
  - en poder de Belial
  rationale: En los Testamentos de los Doce Patriarcas, Beliar es la figura espiritual adversaria que se opone al camino de Dios; la sujeción pasiva a Beliar (κυριευθεὶς ὑπὸ τοῦ Βελίαρ) describe el estado de quien orienta su intención al mal. 'Dominada por Beliar' preserva la voz pasiva y la relación de señorío sin sobreinterpretar la naturaleza de la figura. No se añade 'el diablo' ni equivalentes que impongan una teología posterior.
  doctrine_reference: 'Antropología del Segundo Templo: doctrina de las dos inclinaciones y los dos espíritus; T12P Asher 1:3–9; cf. 2 Cor 6:15 (única aparición de Βελίαρ en el NT)'
- issue: El marco ético de las dos inclinaciones tras διαβούλιον + κλίνῃ ('la intención se inclina')
  english_pob_reading: the intent inclines to evil
  chosen_spanish_reading: la intención se inclina hacia el mal
  alternative_spanish_readings:
  - la voluntad se orienta al mal
  - el designio tiende hacia el mal
  rationale: T12P Asher 1 opera con un marco de dos inclinaciones (buena y mala) que subyace al vocabulario de κλίνω ('inclinarse'). El español 'la intención se inclina hacia el mal' captura la dinámica volitiva de esa orientación sin imponer terminología rabínica posterior (יֵצֶר הָרַע) ni aplanar el marco conceptual del texto. La elección es teológicamente neutra y accesible al lector hispanoparlante contemporáneo.
  doctrine_reference: Marco de las dos inclinaciones del Segundo Templo; T12P Asher 1:3–9; 1QS III–IV (Regla de la Comunidad, Dos Espíritus)
translation_notes:
  revision_awareness: 'El borrador inglés POB fue sometido a una revisión (azure-gpt-5.4-mini, 2026-05-03) que introdujo dos cambios: (1) «purpose» → «intent» para mayor fidelidad lexical a διαβούλιον y su carga deliberativa; (2) «being ruled by» → «ruled by» para reflejar el participio de aoristo pasivo (κυριευθεὶς) sin aspecto progresivo. El español sigue ambas decisiones revisadas: «intención» (sobre «propósito») y «dominada por» (sin aspecto progresivo ni gerundio «siendo dominada»).'
  spanish_consistency_notes:
  - Se distingue πονηρᾷ (adjetivo) → «el mal» de πονηρίᾳ (sustantivo) → «la maldad» a lo largo del versículo, en paralelo con la distinción inglesa «evil / wickedness».
  - Los participios se normalizan al femenino en español («rechazando», «aferrándose», «dominada») por concordancia con «la intención», aunque el griego presenta masculino en προσκολλώμενος y κυριευθεὶς (véase nota [b]).
  - «Lo bueno» y «lo malo» traducen τὸ ἀγαθόν y τὸ κακόν como construcciones neutras sustantivadas, el equivalente español más natural de los adjetivos sustantivados con artículo neutro en griego.
  - La marca Γ…˥ en Charles indica que la cláusula final (ἐν πονηρίᾳ αὐτὸ μεταστρέφει) proviene de un grupo de variantes; se traduce siguiendo el texto de Charles sin añadir nota textual adicional, dado que el sentido es coherente con el conjunto del versículo.
  - El nombre propio Βελίαρ se translitea como «Beliar» (no «Belial») de forma consistente con la forma griega, siguiendo el criterio POB de fidelidad a la fuente en nombres propios.
