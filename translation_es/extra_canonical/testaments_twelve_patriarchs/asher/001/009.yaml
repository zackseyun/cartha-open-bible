id: T12P.ASH.1.9
reference: Testament of Asher 1:9
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: '*Ὅτε γὰρ⁵¹ ἄρξεται⁵² *τὸ ἀγαθὸν ποιεῖν⁵³, τὸ τέλος τῆς πράξεως *εἰς πονηρὸν αὐτῷ ἐλαύνει⁵⁴. ἐπειδὴ ὁ⁵⁵ θησαυρὸς⁵⁶ τοῦ διαβουλίου⁵⁷ πονηροῦ⁵⁸ πνεύματος πεπλήρωται⁵⁹.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/001/009.yaml
  text: For whenever he begins to do evil against good, the end of the action drives him toward evil, because the treasure of the evil plan is filled with an evil spirit.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: Corrected the opening clause to reflect 'when he begins to do evil' rather than 'to do good in an evil way'; rendered 'τὸ τέλος τῆς πράξεως' more directly as 'the end of the action'; changed 'its purpose' to 'the evil plan' to better match the source and maintain coherence; kept the final clause's sense of being filled with an evil spirit.
translation:
  language: es
  text: Pues siempre que comienza a hacer el bien[a], el fin de la acción lo empuja hacia el mal[b], porque el tesoro de su propósito[c] está lleno de un espíritu maligno[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Gr. τὸ ἀγαθὸν ποιεῖν: literalmente «hacer el bien». La revisión del POB en inglés reza «comenzar a hacer el mal contra el bien», pero el griego no tiene esa lectura. Los asteriscos en el texto de Charles 1908 señalan variantes manuscritas; el texto griego suministrado dice τὸ ἀγαθὸν ποιεῖν sin calificación adicional. La verificación cruzada detectó problemas mayores (acuerdo 0,42) en la traducción inglesa revisada.'
    reason: textual_variant
  - marker: b
    text: 'Gr. εἰς πονηρὸν αὐτῷ ἐλαύνει: «lo conduce hacia el mal» o «lo arrastra al mal». ἐλαύνω evoca movimiento forzado o impulsado, más enérgico que «lleva» o «guía».'
    reason: lexical_alternative
  - marker: c
    text: 'Gr. τοῦ διαβουλίου: «de su propósito» o «de su deliberación»; διαβούλιον implica un plan interior meditado, no un impulso pasajero. Alt.: «de su plan» o «de su intención deliberada».'
    reason: lexical_alternative
  - marker: d
    text: 'Gr. πονηροῦ πνεύματος: «de un espíritu maligno». El adjetivo πονηροῦ podría modificar a διαβουλίου («el tesoro del propósito maligno»), pero el orden de palabras y la construcción con πεπλήρωται favorecen que πονηροῦ modifique a πνεύματος. Esta lectura se adopta aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: τὸ ἀγαθὸν ποιεῖν
  english_pob_choice: to do evil against good [revised] / to do good in an evil way [pre-revision]
  chosen_spanish: hacer el bien
  alternatives_spanish:
  - hacer lo bueno
  - hacer el bien de modo perverso
  lexicon: 'LSJ: ἀγαθός = good (morally, practically); ποιέω = to do, perform; the articular infinitive τὸ ἀγαθὸν ποιεῖν = ''the doing of good / to do the good'''
  rationale: 'The Greek τὸ ἀγαθὸν ποιεῖν is unambiguous: ''to do the good/good.'' The English POB revision changed the pre-revision ''to do good in an evil way'' to ''to do evil against good'' — both depart from the Greek in different directions. The cross-check flagged major issues (agreement 0.42). The Spanish follows the Greek source directly: ''hacer el bien.'' The asterisk in the Charles edition marks a textual variant in the manuscript tradition, but the Greek text as supplied reads τὸ ἀγαθὸν ποιεῖν without qualification.'
- source_word: ἄρξεται
  english_pob_choice: begins
  chosen_spanish: comienza
  alternatives_spanish:
  - empieza
  - se pone a
  lexicon: 'LSJ: ἄρχομαι (mid.) = to begin; future or aorist subj. in temporal clause with ὅτε'
  rationale: '''Comienza'' renders the ingressive force of ἄρχομαι naturally in Spanish. The subject is implicit (the two-faced person described in T12P.ASH.1 context); Spanish zero-subject is idiomatic.'
- source_word: τέλος τῆς πράξεως
  english_pob_choice: the end of the action
  chosen_spanish: el fin de la acción
  alternatives_spanish:
  - el resultado de la obra
  - el desenlace del acto
  lexicon: 'LSJ: τέλος = end, goal, outcome; πρᾶξις = action, deed, practice'
  rationale: '''El fin de la acción'' is the most direct rendering and matches Spanish idiom. πρᾶξις here means the carried-out action/deed rather than abstract ''practice.'' ''Acción'' captures this concretely.'
- source_word: ἐλαύνει (εἰς πονηρὸν αὐτῷ)
  english_pob_choice: drives him toward evil
  chosen_spanish: lo empuja hacia el mal
  alternatives_spanish:
  - lo conduce al mal
  - lo arrastra hacia el mal
  lexicon: 'LSJ: ἐλαύνω = to drive, push, set in motion; εἰς πονηρόν = toward evil/the evil; dative αὐτῷ marks the person affected'
  rationale: '''Lo empuja hacia el mal'' preserves the kinetic force of ἐλαύνω (to drive, propel). ''Conduce'' is possible but softer. ''Arrastra'' (drags) would overspecify directionality not in the Greek.'
- source_word: θησαυρὸς τοῦ διαβουλίου
  english_pob_choice: the treasure of the evil plan [revised] / the treasure of its purpose [pre-revision]
  chosen_spanish: el tesoro de su propósito
  alternatives_spanish:
  - el depósito de su deliberación
  - el tesoro de su plan
  - el almacén de su intención
  lexicon: 'LSJ: θησαυρός = treasure, storehouse, repository; διαβούλιον = deliberation, plan, counsel, settled intention'
  rationale: θησαυρὸς is used metaphorically as 'storehouse/repository' of inner intention; 'tesoro' preserves the metaphorical weight. διαβούλιον implies deliberate, interior planning — 'propósito' captures this better than 'plan' (which sounds more external). The English POB revision added 'evil' to διαβούλιον (making it 'evil plan'), but see footnote [d] — πονηροῦ more naturally modifies πνεύματος in the genitive chain.
- source_word: πονηροῦ πνεύματος πεπλήρωται
  english_pob_choice: is filled with an evil spirit
  chosen_spanish: está lleno de un espíritu maligno
  alternatives_spanish:
  - está lleno de espíritu malo
  - se ha llenado de un espíritu perverso
  lexicon: 'LSJ: πίμπλημι / πληρόω (pf. pass. πεπλήρωται) = to fill, be filled; πονηρός = evil, wicked, malicious; πνεῦμα = spirit, breath, wind'
  rationale: 'πεπλήρωται + genitive of content is standard: ''filled with.'' Spanish ''está lleno de'' renders the perfect passive state. ''Maligno'' is preferred over ''malo'' for πονηρός to convey active malevolence appropriate to a spiritual agent. ''Un espíritu maligno'' (with indefinite article) is more natural in Spanish than the anarthrous Greek; the English POB also uses ''an evil spirit.'''
theological_decisions:
- issue: Whether πονηροῦ modifies διαβουλίου ('evil plan') or πνεύματος ('evil spirit')
  english_pob_reading: the treasure of the evil plan is filled with an evil spirit [revised reading, attaching πονηροῦ to διαβουλίου]
  chosen_spanish_reading: el tesoro de su propósito está lleno de un espíritu maligno [πονηροῦ con πνεύματος]
  alternative_spanish_readings:
  - el tesoro del propósito maligno está lleno de espíritu
  rationale: The Greek word order πονηροῦ πνεύματος places the adjective immediately before the noun it most naturally modifies. A genitive of content after πεπλήρωται regularly follows immediately after the verb, making πονηροῦ πνεύματος the content the treasure is filled with. Attaching πονηροῦ to διαβουλίου (the English POB revision choice) requires reading across the verb, which is less natural. The pre-revision English ('the treasure of its purpose is filled with an evil spirit') had this right. The Spanish follows this reading.
  doctrine_reference: 'Testament of Asher 1 context: the two-faced (δίπροσωπος) person whose inner storehouse of intention is colonized by an evil spirit — a demonological/moral-psychology teaching found across the Testaments of the Twelve Patriarchs.'
- issue: Nature of the 'evil spirit' (πονηροῦ πνεύματος) — demonic entity or moral quality
  english_pob_reading: an evil spirit
  chosen_spanish_reading: un espíritu maligno (lowercase, indicating a malevolent spiritual power, not the Holy Spirit)
  alternative_spanish_readings:
  - un espíritu malo
  - el espíritu del mal
  rationale: In the T12P corpus, πνεῦμα πονηρόν can denote either a personal demonic entity or an evil inner disposition. Either way, lowercase 'espíritu' is correct; 'Espíritu' (capitalized) is reserved for the Holy Spirit per project convention. 'Maligno' preserves the active, agent-like connotation appropriate to either reading.
  doctrine_reference: 'Project convention: πνεῦμα / רוּחַ → ''espíritu''/''Espíritu'' by context; evil spirit entities do not receive capitalization.'
- issue: 'τὸ ἀγαθὸν ποιεῖν: does the person begin to do good (and then fall), or begin to do evil?'
  english_pob_reading: begins to do evil against good [revised English POB — departs from Greek]
  chosen_spanish_reading: comienza a hacer el bien [follows Greek source]
  alternative_spanish_readings:
  - comienza a hacer el mal contra el bien
  rationale: 'The Greek is τὸ ἀγαθὸν ποιεῖν — ''to do the good.'' The moral logic of T12P.ASH.1 is that the double-faced person may outwardly begin with a good action, but the inner corruption (spirit-filled storehouse of evil intention) ensures the outcome is evil. This is the coherent theological point: appearance of good, outcome of evil. The English POB revision (''to do evil against good'') inverts this and loses the two-faced paradox central to the passage. The Spanish follows the Greek.'
  doctrine_reference: 'Testament of Asher 1:3–9: the two-faced person (δίπροσωπος) is the subject; the teaching is that external moral appearance can mask internal corruption.'
translation_notes:
  revision_awareness: La revisión aplicada (2026-05-03, azure-gpt-5.4-mini) cambió «when it begins to do good in an evil way» por «when he begins to do evil against good». Esta corrección invierte el sentido del griego τὸ ἀγαθὸν ποιεῖν («hacer el bien») y contradice la lógica moral del Testamento de Aser 1 (el diprosōpos que aparenta hacer el bien mientras su interioridad está corrompida). La verificación cruzada asignó un acuerdo de 0,42 con veredicto «major-issues». El borrador español se aparta de la revisión inglesa y sigue directamente el texto griego. Se recomienda que un editor revise la versión inglesa antes de su publicación.
  spanish_consistency_notes:
  - No aparecen nombres divinos (Yahvé, κύριος) en este versículo; las convenciones de nomenclatura del proyecto no se activan.
  - '''Espíritu maligno'' usa minúscula consistente con la convención del proyecto (mayúscula reservada para el Espíritu Santo).'
  - '''El bien'' y ''el mal'' como categorías morales nominalizadas siguen el idioma español natural y corresponden a τὸ ἀγαθόν / πονηρόν del griego.'
  - No hay ocurrencias de δοῦλος, χάρις, δικαιοσύνη ni otros términos con defecto de traducción catalogado en el proyecto.
