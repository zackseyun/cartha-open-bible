translation:
  language: es
  text: Pues hay dos caminos, del bien y del mal; y en ellos están los dos propósitos[a] en nuestros pechos,[b] que los distinguen.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Gr. διαβούλια: puede traducirse también «deliberaciones» o «designios», con énfasis en el proceso de deliberación interna. En el contexto del Testamento de Aser, estos dos propósitos corresponden funcionalmente a los dos impulsos que orientan la conducta hacia uno u otro camino —concepto afín a los dos yétser del pensamiento judío del Segundo Templo—, aunque el texto no emplea esa terminología técnica.'
    reason: lexical_alternative
  - marker: b
    text: 'Gr. στέρνοις, plural de στέρνον («pecho», «tórax»): en la antropología griega, el pecho es sede del pensamiento y la voluntad interior. Se conserva la imagen literal en lugar de sustituirla por «corazones», que introduciría una paráfrasis cultural.'
    reason: cultural_note
  - marker: c
    text: 'Gr. διακρίνοντα αὐτά: el participio concuerda con διαβούλια («propósitos»); son los propósitos —no los caminos— los que disciernen o distinguen entre uno y otro camino. La edición Charles 1908 marca διακρίνοντα con asterisco (*), lo que indica una lectura con soporte textual parcial o una variante entre manuscritos; la traducción sigue el texto así establecido.'
    reason: textual_variant
lexical_decisions:
- source_word: Ὁδοὶ (hodoi)
  english_pob_choice: ways
  chosen_spanish: caminos
  alternatives_spanish:
  - vías
  - sendas
  lexicon: 'LSJ ὁδός: road, way, path; metaph. way of life or conduct'
  rationale: «Caminos» es el equivalente español más natural y de mayor dignidad para ὁδός en un contexto ético-dualista. Evoca la tradición de los «dos caminos» (cf. Did. 1:1; Sal 1:6) sin añadir interpretación. «Vías» sonaría más técnico; «sendas» tiene un matiz poético menos apropiado aquí.
- source_word: καλοῦ καὶ κακοῦ
  english_pob_choice: of good and of evil
  chosen_spanish: del bien y del mal
  alternatives_spanish:
  - de lo bueno y de lo malo
  - de lo bueno y lo malo
  lexicon: 'LSJ καλός: good, noble; κακός: bad, evil — here both as substantival genitives'
  rationale: El griego usa adjetivos sustantivados en genitivo de definición. «Del bien y del mal» los convierte en sustantivos abstractos en español, lo que es gramaticalmente natural y conserva la fuerza categórica sin añadir «lo» (que haría la frase más pesada).
- source_word: διαβούλια (diaboulia)
  english_pob_choice: purposes
  chosen_spanish: propósitos
  alternatives_spanish:
  - deliberaciones
  - designios
  - intenciones
  - inclinaciones
  lexicon: 'LSJ διαβούλιον: deliberation, counsel, purpose, design; BDAG (cognate διαβουλεύω): to deliberate, plan'
  rationale: 'El término tiene fuerza deliberativa: no solo «intenciones» sino propósitos activamente formados. «Propósitos» sigue la elección del POB inglés («purposes») y conserva la agentividad. «Deliberaciones» captaría mejor el proceso cognitivo pero resulta más pesado en español. En el contexto del Testamento de Aser, los dos διαβούλια corresponden funcionalmente a los dos impulsos internos (bien/mal), aunque el texto no emplea la terminología técnica de los dos yétser. Véase nota [a].'
- source_word: στέρνοις (sternois)
  english_pob_choice: breasts
  chosen_spanish: pechos
  alternatives_spanish:
  - pecho (singular)
  - corazones
  - entrañas
  lexicon: 'LSJ στέρνον: breast, chest — as seat of thought and feeling; plural in source'
  rationale: El plural griego στέρνοις se reproduce con «pechos». «Pechos» mantiene la imagen anatómica del griego (pecho como sede del pensamiento interior) sin reinterpretar mediante «corazones», que sería una paráfrasis culturalmente condicionada. Véase nota [b].
- source_word: διακρίνοντα αὐτά
  english_pob_choice: distinguishing them
  chosen_spanish: que los distinguen
  alternatives_spanish:
  - distinguiéndolos
  - que los disciernen
  - que los separan
  - discerniéndolos
  lexicon: 'LSJ διακρίνω: to separate, distinguish, discriminate, judge between; participio presente activo neutro plural, concertado con διαβούλια; αὐτά refiere a ὁδοί (los dos caminos)'
  rationale: 'El participio διακρίνοντα concuerda en género y número neutro plural con διαβούλια: son los propósitos los que distinguen/disciernen entre los dos caminos (αὐτά). Una oración de relativo «que los distinguen» es más natural en español que un participio colgante; conserva la relación sintáctica. «Disciernen» captaría bien el matiz cognitivo de διακρίνω, pero «distinguen» es más transparente. Véase nota [c] sobre la variante textual.'
theological_decisions:
- issue: Dualismo de los dos caminos y los dos propósitos internos
  english_pob_reading: two ways, of good and of evil; two purposes in our breasts, distinguishing them
  chosen_spanish_reading: dos caminos, del bien y del mal; dos propósitos en nuestros pechos, que los distinguen
  alternative_spanish_readings:
  - dos sendas… dos inclinaciones en nuestro pecho
  - dos vías… dos designios en nuestros pechos que los disciernen
  rationale: 'El Testamento de Aser presenta un dualismo ético estructurado: dos caminos externos corresponden a dos disposiciones internas (διαβούλια). El español preserva esta correspondencia sin aplanarla. No se introduce «inclinaciones» (que evoca el concepto rabínico del yétser) porque el texto griego no usa esa terminología técnica; hacerlo sería añadir una interpretación exegética no atestiguada en la fuente. El dualismo aquí es de carácter ético-conductual, comparable con Qumrán (1QS 3–4) y la Didajé (1:1), pero el texto debe hablar por sí mismo.'
  doctrine_reference: T12P dualismo ético; cf. 1QS 3:13–4:26 (Tratado de los Dos Espíritus); Did. 1:1; Sal 1:1–6
translation_notes:
  revision_awareness: 'El resumen de verificación cruzada marca este versículo como «major-issues» con una puntuación de acuerdo de 0,45. Los puntos de tensión más probables son: (1) la traducción de διαβούλια («purposes» / «propósitos»), término con rango semántico amplio que va de «deliberaciones» a «designios»; (2) la cláusula participial διακρίνοντα αὐτά, cuyo referente (αὐτά = los dos caminos) requiere decisión sintáctica explícita; y (3) las marcas textuales de la edición Charles (asteriscos y numeración de aparato crítico) que señalan variantes manuscritas en γάρ y en διακρίνοντα. La traducción española ha preservado las ambigüedades documentadas mediante notas al pie en lugar de resolverlas en el texto corrido.'
  spanish_consistency_notes:
  - «Caminos» se emplea como equivalente estable de ὁδός/hodoi en contextos de dualismo ético a lo largo del proyecto POB.
  - «Propósitos» sigue la elección «purposes» del POB inglés para διαβούλια, conservando la fuerza deliberativa sin recurrir a «inclinaciones» (que importaría terminología técnica rabínica no presente en la fuente griega).
  - «Pechos» mantiene el plural literal del griego στέρνοις en lugar de sustituirlo por «corazones», evitando una paráfrasis interpretativa.
  - No aparecen nombres divinos (Yahvé, Mesías, Espíritu) en este versículo; no se requieren decisiones de terminología teológica nuclear del proyecto.
  - El uso de oración de relativo («que los distinguen») para el participio διακρίνοντα sigue la pauta de construcciones participiales en español neutro moderno cuando el participio colgante resultaría poco natural.
