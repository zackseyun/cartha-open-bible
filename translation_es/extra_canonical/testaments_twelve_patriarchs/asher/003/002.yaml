source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: '*Τὴν ⌜δὲ⌝ κακίαν ἀποδράσατε¹⁰, ἀναιροῦντες *τὸ διαβούλιον¹¹ ἐν ταῖς ἀγαθαῖς ὑμῶν πράξεσι, ὅτι οἱ διπρόσωποι *οὐκ εἰσὶ τοῦ Θεοῦ¹², ἀλλὰ ταῖς ἐπιθυμίαις αὐτῶν δουλεύουσιν, ἵνα τῷ Βελίαρ ἀρέσωσιν, καὶ τοῖς ὁμοίοις¹³ αὐτῶν ἀνθρώποις.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/003/002.yaml
  text: But flee wickedness, destroying its plan by your good deeds; for the double-faced are not of God, but are enslaved to their own desires, so that they may please Beliar.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:53Z'
    unchanged: false
    changes_summary: Changed 'serve their own desires' to 'are enslaved to their own desires' to reflect δουλεύουσιν more accurately; removed the bracketed footnote marker and tightened the punctuation for smoother formal English.
translation:
  language: es
  text: Mas huid de la maldad[a], destruyendo su designio[b] con sus buenas obras; porque los de doble rostro[c] no son de Dios, sino que son esclavos de sus propios deseos[d], para agradar a Beliar y a hombres semejantes a ellos[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'κακίαν: «maldad» puede también verterse «malicia» (con énfasis en la intención dañina deliberada) o «vicio» (subrayando el hábito moral corrupto); «maldad» ofrece la equivalencia más amplia y natural.'
    reason: lexical_alternative
  - marker: b
    text: 'τὸ διαβούλιον: el término griego denota un plan o consejo deliberado, con posible matiz de maquinación o trama; «designio» preserva esa intencionalidad. Alternativas: «plan,» «maquinación».'
    reason: lexical_alternative
  - marker: c
    text: 'οἱ διπρόσωποι: lit. «los de doble cara/rostro» — término técnico en los Testamentos de los Doce Patriarcas para personas moralmente ambivalentes que sirven a dos señores a la vez. No equivale simplemente a «hipócritas»; el texto desarrolla este concepto a lo largo del capítulo.'
    reason: theological_note
  - marker: d
    text: 'δουλεύουσιν: verbo de raíz δοῦλος («esclavo»); la revisión del POB inglés corrigió «serve» por «are enslaved» para reflejar esta fuerza léxica. El español «son esclavos de sus propios deseos» reproduce el mismo matiz.'
    reason: lexical_alternative
  - marker: e
    text: La frase final del griego «καὶ τοῖς ὁμοίοις αὐτῶν ἀνθρώποις» ('y a hombres semejantes a ellos') está presente en el texto fuente Charles 1908 (marcada con aparato ¹³) pero fue omitida en la traducción POB inglesa. La versión española la restituye siguiendo el texto griego base.
    reason: textual_variant
lexical_decisions:
- source_word: κακίαν
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - el mal
  - la malicia
  - el vicio
  lexicon: BDAG
  rationale: 'κακία (BDAG: moral badness, wickedness, vice, malice) is well served by ''maldad,'' which conveys broad moral evil without the narrower connotation of ''malicia'' (targeted malice) or the more archaic ''vicio'' (vice as habit). ''Maldad'' is the most natural and dignified equivalent in broadly church-readable Latin American Spanish.'
- source_word: ἀποδράσατε
  english_pob_choice: flee
  chosen_spanish: huid
  alternatives_spanish:
  - escapad
  - apartaos
  - alejad
  lexicon: BDAG
  rationale: ἀποδιδράσκω in the aorist imperative (ἀποδράσατε) conveys urgent flight or escape. 'Huid' is the standard Latin American second-person plural imperative of 'huir' and matches both the urgency of the aorist and the flight metaphor. 'Escapad' is characteristically Peninsular; 'apartaos' softens the imagery of running away.
- source_word: τὸ διαβούλιον
  english_pob_choice: plan
  chosen_spanish: designio
  alternatives_spanish:
  - plan
  - maquinación
  - propósito
  - trama
  lexicon: LSJ
  rationale: 'διαβούλιον (LSJ: deliberation, counsel, scheme) carries a sense of purposeful, deliberate scheming. ''Designio'' in Spanish denotes intentional purpose and can carry a sinister undertone in context, preserving more of that scheming quality than the flat ''plan.'' ''Maquinación'' would be vivid but interpretively heavy; ''designio'' maintains dignity while keeping the purposive force.'
- source_word: οἱ διπρόσωποι
  english_pob_choice: the double-faced
  chosen_spanish: los de doble rostro
  alternatives_spanish:
  - los hipócritas
  - los de dos caras
  - los bifrontes
  - los de doble cara
  lexicon: LSJ
  rationale: 'δίπροσωπος (LSJ: two-faced, having two faces) is a technical moral descriptor in the Testaments of the Twelve Patriarchs for persons who live a double allegiance. ''Los de doble rostro'' preserves the literal imagery and the technical force without collapsing into ''hipócritas,'' which loses the specific double-path/double-loyalty concept central to this chapter. ''Bifrontes'' is literary but potentially opaque for a general readership.'
- source_word: δουλεύουσιν
  english_pob_choice: are enslaved to
  chosen_spanish: esclavos de
  alternatives_spanish:
  - sirven a
  - son siervos de
  - están sometidos a
  lexicon: BDAG
  rationale: 'δουλεύω (BDAG: to be a slave, perform the duties of a slave) is rooted in δοῦλος. The English POB revision specifically corrected ''serve their own desires'' to ''are enslaved to their own desires'' to honor this slave-root force. Per POB terminology defaults, δοῦλος-root words use slave language. ''Esclavos de sus propios deseos'' renders the participial force as a predicate in natural Spanish and aligns with the revised English reading.'
- source_word: ἐπιθυμίαις
  english_pob_choice: desires
  chosen_spanish: deseos
  alternatives_spanish:
  - pasiones
  - concupiscencias
  - apetitos
  lexicon: BDAG
  rationale: 'ἐπιθυμία (BDAG: desire, longing, craving; in ethical contexts, sinful desire) is rendered ''deseos.'' The modifier ''propios'' (own/self-directed) carries the pejorative weight in context. ''Concupiscencias'' would be archaically loaded for a modern readership; ''pasiones'' shifts toward emotional affect rather than the appetite/craving sense of ἐπιθυμία.'
- source_word: τοῖς ὁμοίοις αὐτῶν ἀνθρώποις
  english_pob_choice: (omitted in English POB)
  chosen_spanish: hombres semejantes a ellos
  alternatives_spanish:
  - personas como ellos
  - los que son como ellos
  - gente de su misma clase
  lexicon: LSJ
  rationale: 'ὅμοιος (LSJ: like, similar, resembling) with ἀνθρώποις (men/people) completes the final purpose clause: the double-faced seek to please both Beliar and people of their own moral kind. This phrase is present in the Charles 1908 Greek source text (marked with footnote apparatus ¹³) but was omitted from the English POB rendering. The Spanish restores it following the source text; see footnote [e].'
theological_decisions:
- issue: Βελίαρ — name of the adversarial figure
  english_pob_reading: Beliar
  chosen_spanish_reading: Beliar
  alternative_spanish_readings:
  - Belial
  - el Maligno
  - el Adversario
  rationale: Βελίαρ is the Greek form of the name of the chief adversarial figure in Second Temple Jewish literature (cf. 2 Cor 6:15). It is distinct from the Hebrew/Latin 'Belial.' The Greek source uses Βελίαρ throughout, so the Spanish follows the same transliteration. 'El Maligno' would paraphrase away the proper name and lose its intertextual specificity within the Testaments corpus.
  doctrine_reference: T12P uses Beliar consistently as the name of the satanic/adversarial figure opposed to God throughout the Testaments of the Twelve Patriarchs; this is a fixed proper name in the corpus.
- issue: οὐκ εἰσὶ τοῦ Θεοῦ — covenantal belonging negated
  english_pob_reading: are not of God
  chosen_spanish_reading: no son de Dios
  alternative_spanish_readings:
  - no pertenecen a Dios
  - no son del Señor
  rationale: The genitive τοῦ Θεοῦ after εἶναι indicates covenantal or moral belonging/allegiance. 'No son de Dios' is the most natural Spanish rendering, preserving the genitive-of-belonging construction. Per POB terminology, θεός → 'Dios.' 'No pertenecen a Dios' makes the belonging explicit but is slightly more paraphrastic than the source warrants.
  doctrine_reference: This construction (being 'of God' or 'not of God') appears in Johannine literature and Second Temple texts to mark covenantal alignment; in T12P it characterizes the moral condition of the διπρόσωποι.
translation_notes:
  revision_awareness: La revisión del POB inglés (2026-05-03, gpt-5.4-mini) cambió 'serve their own desires' por 'are enslaved to their own desires' para reflejar la fuerza de δουλεύουσιν (raíz δοῦλος). El español adopta directamente 'esclavos de sus propios deseos,' alineándose con el texto revisado y con la terminología POB (δοῦλος → esclavo). Además, la versión española restituye la cláusula final del griego ('καὶ τοῖς ὁμοίοις αὐτῶν ἀνθρώποις') omitida en el POB inglés sin justificación documentada; esto constituye una diferencia sustantiva respecto a la traducción inglesa y queda explicada en la nota [e].
  spanish_consistency_notes:
  - θεός → 'Dios' siguiendo los valores predeterminados del proyecto POB.
  - Βελίαρ → 'Beliar' transliterado del griego fuente, no 'Belial' (forma hebrea/latina alternativa), para preservar la forma del texto base.
  - Segunda persona plural usa 'sus' (no 'vuestras') conforme al español neutro latinoamericano; el contexto de la exhortación deja claro que se dirige a los lectores/oyentes.
  - No hay referencia a יהוה/YHWH ni a κύριος en este versículo; la terminología Yahvé no es aplicable.
  - δουλεύουσιν → 'esclavos de' sigue la política POB de aplicar lenguaje de esclavitud a la raíz δοῦλος, conforme a lo que la revisión inglesa documentó explícitamente.
