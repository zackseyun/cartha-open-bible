translation:
  language: es
  text: Pero ustedes, hijos míos, no se vuelvan de doble rostro[a] como ellos —en bondad y maldad—, sino aférrense únicamente a la bondad, porque el Señor[b] Dios reposa en ella, y la gente la anhela.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Gr. διπρόσωποι, literalmente «de dos rostros/caras». Término técnico-ético del Testamento de Asher para quien mezcla bondad y maldad de manera indistinta. Alternativa española más coloquial: «de dos caras».'
    reason: lexical_alternative
  - marker: b
    text: Gr. Κύριος (título divino). A diferencia de los textos del AT donde Κύριος sustituye al Tetragrámaton (יהוה/Yahvé), aquí el Testamento de Asher es una composición pseudoepigráfica en griego; Κύριος funciona como título, de ahí «el Señor Dios» y no «Yahvé Dios».
    reason: theological_note
lexical_decisions:
- source_word: διπρόσωποι
  english_pob_choice: double-faced
  chosen_spanish: de doble rostro
  alternatives_spanish:
  - de dos caras
  - bifronte
  - hipócritas
  lexicon: LSJ s.v. διπρόσωπος; BDAG s.v. πρόσωπον
  rationale: El griego δι- (dos) + πρόσωπον (rostro/cara) es el término técnico-ético central en todo el Testamento de Asher para quien mezcla bien y mal. «De doble rostro» preserva la imagen literal y la fuerza retórica sin interpretar en exceso. «De dos caras» es el modismo español equivalente y se ofrece como alternativa en nota; se desechó «hipócritas» por ser demasiado interpretativo y perder la imagen del 'rostro'. El inglés POB optó por «double-faced», que el español sigue de cerca.
- source_word: κολλήθητε
  english_pob_choice: cling to
  chosen_spanish: aférrense
  alternatives_spanish:
  - adhiéranse
  - péguense
  - manténganse unidos a
  lexicon: 'BDAG s.v. κολλάω (2: to cling/adhere firmly to)'
  rationale: Aoristo pasivo imperativo de κολλάω, que indica adhesión intensa. «Aferrarse» transmite esa fuerza de sujeción firme en español latinoamericano moderno mejor que «adherirse» (más técnico) o «pegarse» (demasiado coloquial). El inglés POB eligió «cling to», que «aferrarse» calca en intensidad.
- source_word: ἀγαθότης
  english_pob_choice: goodness
  chosen_spanish: bondad
  alternatives_spanish:
  - benignidad
  - virtud
  - bien
  lexicon: BDAG s.v. ἀγαθότης
  rationale: Sustantivo abstracto de la cualidad moral positiva. «Bondad» es el equivalente español más natural y de amplia comprensión eclesial; «benignidad» es más estrecho semánticamente y «virtud» desplaza el foco. Aparece dos veces en el versículo (genitivo especificativo y dativo de adhesión); se mantiene la misma palabra en ambas instancias para preservar la anáfora del texto griego.
- source_word: κακία
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - perversidad
  - vicio
  - maldicia
  lexicon: BDAG s.v. κακία
  rationale: El término griego abarca la disposición hacia el mal en sentido amplio. «Maldad» es el equivalente más directo y de mayor alcance semántico en español; «vicio» sería demasiado restrictivo y «perversidad» añade connotaciones no presentes en el texto.
- source_word: ἀναπαύεται
  english_pob_choice: rests
  chosen_spanish: reposa
  alternatives_spanish:
  - descansa
  - mora
  - se complace
  lexicon: 'BDAG s.v. ἀναπαύω (2: to rest, find rest in)'
  rationale: Presente medio/pasivo de ἀναπαύω. «Reposa» es más digno y litúrgicamente apropiado que «descansa», y preserva la imagen teológica del descanso divino. El inglés POB eligió «rests», que «reposa» traduce con equivalencia óptima.
- source_word: ποθοῦσιν
  english_pob_choice: long for
  chosen_spanish: anhela
  alternatives_spanish:
  - desea
  - añora
  - apetece
  lexicon: LSJ s.v. ποθέω; BDAG s.v. ποθέω
  rationale: ποθέω indica un deseo intenso de añoranza. «Anhelar» captura ese matiz de anhelo/ansia mejor que el más genérico «desear». La tercera persona singular («la gente la anhela») sigue la concordancia con «la gente» (singular colectivo), más natural en español latinoamericano que «la gente las anhelan».
- source_word: οἱ ἄνθρωποι
  english_pob_choice: people
  chosen_spanish: la gente
  alternatives_spanish:
  - los hombres
  - las personas
  - la humanidad
  lexicon: 'BDAG s.v. ἄνθρωπος (1: human being, person)'
  rationale: ἄνθρωποι es el término genérico para seres humanos sin distinción de género. «La gente» es la opción más natural y no marcada genéricamente en español latinoamericano contemporáneo; «los hombres» introduciría una connotación masculina ausente en el griego. El inglés POB optó por el neutro «people», que «la gente» reproduce con fidelidad.
theological_decisions:
- issue: Κύριος ὁ Θεὸς — título divino griego en texto pseudoepigráfico
  english_pob_reading: the Lord God
  chosen_spanish_reading: el Señor Dios
  alternative_spanish_readings:
  - Yahvé Dios
  - el Dios Soberano
  rationale: La norma del proyecto es rendir יהוה/YHWH como «Yahvé» en lugar de «Señor» como convención de enmascaramiento. Sin embargo, el Testamento de Asher es una composición pseudoepigráfica griega —no una traducción de un original hebreo con el Tetragrámaton—. El Κύριος aquí es un título divino en griego (paralelo con ὁ Θεὸς), no una representación de YHWH en la LXX. Por tanto «el Señor Dios» es la opción correcta y fiel; «Yahvé Dios» implicaría falsamente la presencia del Tetragrámaton en la fuente.
  doctrine_reference: Distinción entre κύριος como título griego y κύριος como traducción de YHWH en la LXX; directriz del proyecto sobre el uso de «Yahvé» únicamente donde la fuente remite al nombre divino hebreo.
- issue: διπρόσωποι como categoría ética del Testamento de Asher
  english_pob_reading: double-faced
  chosen_spanish_reading: de doble rostro
  alternative_spanish_readings:
  - de dos caras
  - hipócritas
  rationale: 'El concepto de «doble rostro» (διπρόσωπος) es el eje ético del Testamento de Asher: quien practica simultáneamente el bien y el mal sin distinción moral. La tradición rabínica y del Segundo Templo conoce este dualismo. Rendir el término literalmente («de doble rostro») preserva la tensión doctrinal entre integridad moral y duplicidad que el documento explora. Suavizarlo a «hipócritas» borraría el matiz específico del doble camino (cf. los ''dos caminos'' en Didajé 1–6).'
  doctrine_reference: Ética de los dos caminos en la literatura del Segundo Templo; contexto de integridad moral en los Testamentos de los Doce Patriarcas.
translation_notes:
  revision_awareness: 'El registro inglés del POB presenta la marca [a] en el cuerpo del texto («But you[a]») sobre el pronombre enfático Ὑμεῖς, pero el array de notas al pie inglesas está vacío —posible laguna en el registro fuente—. El borrador español no replica mecánicamente esa marca ni la suprime arbitrariamente: en su lugar, el matiz enfático del pronombre griego se absorbe en la construcción contrastiva «Pero ustedes» y se documenta en las notas de consistencia. La revisión más reciente (gpt-5.4-mini, 2026-05-03) dejó el texto inglés sin cambios; la verificación cruzada arrojó alta concordancia (0,93) con veredicto de problemas menores (1 paso con observaciones). El borrador español parte directamente de la fuente griega (edición Charles 1908) y usa la traducción inglesa del POB únicamente como contexto de auditoría, no como texto base.'
  spanish_consistency_notes:
  - Κύριος en texto pseudoepigráfico griego se rinde «el Señor» (no «Yahvé»), conforme a la directriz del proyecto que reserva «Yahvé» para fuentes con el Tetragrámaton hebreo.
  - Se usa «ustedes» (no «vosotros») en cumplimiento del objetivo de español neutro latinoamericano de amplia legibilidad eclesial.
  - «Hijos míos» mantiene la voz del discurso testamentario patriarcal, coherente con el género pseudoepigráfico de los Testamentos de los Doce Patriarcas.
  - «Bondad» se usa consistentemente para ἀγαθότης en ambas apariciones del versículo, preservando la anáfora retórica del original griego.
  - La marca [a] del inglés sobre el pronombre enfático Ὑμεῖς no tiene contenido de nota en el registro fuente; el español absorbe el matiz enfático en la sintaxis («Pero ustedes») en lugar de crear una nota sin base documental.
  - Los guiones largos en «—en bondad y maldad—» son convención española para el inciso aclarativo que especifica el ámbito del «doble rostro», equivalente funcional a la aposición de genitivo griego ἀγαθότητος καὶ κακίας.
