    changes_summary: Added commas around the appositive 'my brothers' for clearer, more natural English while preserving the meaning; otherwise retained the draft.
translation:
  language: es
  text: Y por esto serán dispersados, como Gad y Dan, mis hermanos, y no conocerán su tierra[a], tribu ni lengua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'χώρας αὐτῶν: el pronombre αὐτῶν («su/de ellos») modifica gramaticalmente solo a χώρας (tierra), pero contextualmente se extiende a tribu y lengua, siguiendo la lectura del POB inglés.'
    reason: textual_variant
lexical_decisions:
- source_word: διασκορπισθήσεσθε
  english_pob_choice: you will be scattered
  chosen_spanish: serán dispersados
  alternatives_spanish:
  - serán esparcidos
  - serán diseminados
  - se dispersarán
  lexicon: 'BDAG διασκορπίζω: to scatter, disperse; future passive indicative 2nd pl.'
  rationale: El verbo διασκορπίζω en voz pasiva future denota la dispersión forzada del pueblo (cf. uso en LXX para la diáspora). 'Serán dispersados' preserva la voz pasiva (agente externo implícito) y el matiz de dispersión involuntaria, preferible a 'se dispersarán' (reflexivo) o 'serán esparcidos' (más casual). Se usa 'serán' en lugar de 'seréis' conforme al español neutro latinoamericano de segunda persona plural con 'ustedes'.
- source_word: χώρας αὐτῶν
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su territorio
  - sus tierras
  - su región
  lexicon: 'LSJ χώρα: land, territory, region, country; αὐτῶν: genitive plural pronoun ''their''.'
  rationale: χώρα denota el territorio o la tierra natal de un pueblo. 'Tierra' en español recoge tanto el sentido geográfico como el de patria heredada, siendo la opción más natural y apropiada al contexto tribal. El αὐτῶν modifica gramaticalmente solo a χώρας, pero el contexto extiende la posesión a 'tribu' y 'lengua'; véase nota [a].
- source_word: φυλήν
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - clan
  - linaje
  lexicon: 'LSJ φυλή: tribe, clan; en el contexto de los Testamentos de los Doce Patriarcas se refiere claramente a las tribus de Israel.'
  rationale: '''Tribu'' es el equivalente estándar en español para φυλή en contextos del Antiguo Testamento y literatura intertestamentaria. ''Clan'' o ''linaje'' reducirían el alcance institucional-tribal que el texto presupone.'
- source_word: γλῶσσαν
  english_pob_choice: language
  chosen_spanish: lengua
  alternatives_spanish:
  - idioma
  - lenguaje
  lexicon: 'LSJ γλῶσσα: tongue (órgano), language, dialect.'
  rationale: '''Lengua'' preserva la polisemia del griego γλῶσσα (órgano físico y lengua como idioma) y es el término más frecuente en español bíblico e intertestamentario para referirse al idioma de un pueblo. ''Idioma'' sería más preciso pero pierde el registro bíblico.'
- source_word: ἀγνοήσετε
  english_pob_choice: you will not know
  chosen_spanish: no conocerán
  alternatives_spanish:
  - desconocerán
  - ignorarán
  - no sabrán
  lexicon: 'LSJ ἀγνοέω: to not know, to be ignorant of, to fail to recognize; future indicative active 2nd pl.'
  rationale: '''No conocerán'' rinde fielmente el sentido de privación de conocimiento (ἀ- privativo + γνοέω). ''Desconocerán'' es una alternativa válida pero ''no conocerán'' es más transparente. ''Ignorarán'' tiene connotaciones de desprecio voluntario que el texto no implica.'
theological_decisions:
- issue: Profecía de dispersión de la tribu de Aser comparada con Gad y Dan
  english_pob_reading: you will be scattered, like Gad and Dan, my brothers
  chosen_spanish_reading: serán dispersados, como Gad y Dan, mis hermanos
  alternative_spanish_readings:
  - seréis dispersados, al igual que Gad y Dan, mis hermanos
  rationale: La comparación con Gad y Dan como tribus ya dispersadas o igualmente destinadas a la dispersión es una profecía típica de la literatura de los Testamentos. No hay nombre divino ni terminología cristológica involucrada. La voz pasiva griega (διασκορπισθήσεσθε) preserva el carácter de dispersión como juicio o consecuencia sin nombrar explícitamente al agente divino.
  doctrine_reference: T12P.ASH.7.6 — profecía de diáspora tribal; sin paralelo directo en el canon hebreo.
translation_notes:
  revision_awareness: La revisión del POB inglés (2026-04-23, gpt-5.4) añadió comas alrededor del apositivo 'my brothers' para mayor claridad. En español, 'mis hermanos' lleva comas de apositivo de forma natural ('como Gad y Dan, mis hermanos,'), de modo que la misma corrección se aplica sin esfuerzo adicional. El cambio revisional no altera el sentido traducido al español.
  spanish_consistency_notes:
  - No hay nombre divino (YHWH/κύριος) en este versículo; la convención Yahvé no se aplica.
  - No aparece terminología cristológica ni pneumatológica.
  - Los nombres propios Gad y Dan se mantienen transliterados tal como en el texto griego (Γάδ, Δάν), siguiendo la convención del POB español para nombres de patriarcas/tribus.
  - Se usa 'serán' (ustedes — neutro latinoamericano) en lugar de 'seréis' (forma peninsular) conforme al registro objetivo del proyecto.
  - La serie de tres acusativos (tierra, tribu, lengua) se rinde sin repetir el posesivo 'su' ante cada elemento para mayor fluidez; la nota [a] aclara el alcance gramatical del αὐτῶν.
