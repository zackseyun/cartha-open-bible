base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/007/006.yaml
  text: And because of this you will be scattered, like Gad and Dan, my brothers, and you will not know their land, tribe, and language.
  revision_pass:
    model: gpt-5.4
