  text: '*Καὶ διὰ τοῦτο³⁹ διασκορπισθήσεσθε⁴⁰ ὡς Γὰδ καὶ⁴¹ Δάν, οἱ ἀδελφοί μου⁴², *καὶ ἀγνοήσετε χώρας αὐτῶν⁴³ καὶ φυλὴν καὶ γλῶσσαν⁴⁴.'
