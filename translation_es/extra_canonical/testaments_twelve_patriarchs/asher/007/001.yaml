  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: VII. Μὴ γίνεσθε¹ ὡς Σόδομα², ἥτις ἠγνόησε³ *τοὺς ἀγγέλους⁴ Κυρίου, καὶ ἀπώλετο ἕως αἰῶνος.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/007/001.yaml
  text: For I know that you will sin, and you will be handed over into the hands of your enemies; your land will be destroyed, your holy things will be scattered, and you will be dispersed to the four parts of the earth.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: 'Adjusted for closer lexical accuracy: changed ''be desolated'' to ''be destroyed'' for ἀφανισθήσεται, and ''holy places'' to ''holy things'' for τὰ ἅγια; rendered ''the four corners'' more literally as ''the four parts''.'
translation:
  language: es
  text: No sean como Sodoma, que desconoció[a] a los ángeles del Señor[b] y pereció para siempre.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'ἠγνόησε (aoristo de ἀγνοέω): puede significar «fue ignorante de» (falta pasiva de conocimiento) o «hizo caso omiso de» (desprecio activo). «Desconoció» mantiene abierta esa ambigüedad; «ignoró» implicaría indiferencia deliberada.'
    reason: lexical_alternative
  - marker: b
    text: Gr. Κυρίου («del Señor»). En la literatura pseudoepigráfica judía, κύριος sustituye con frecuencia al Tetragrama (יהוה). Dado que la fuente inmediata es el griego κύριος y no el hebreo יהוה, se traduce «del Señor» conforme a la convención del proyecto; el trasfondo del nombre divino queda señalado aquí.
    reason: theological_note
  - marker: c
    text: 'ἕως αἰῶνος: literalmente «hasta el siglo/la eternidad», giro de influencia semítica (cf. heb. עַד-עוֹלָם). «Para siempre» es la equivalencia española más natural; alternativas más literales son «hasta la eternidad» o «por los siglos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ γίνεσθε
  english_pob_choice: (absent from English POB; see revision_awareness)
  chosen_spanish: No sean
  alternatives_spanish:
  - No os hagáis
  - No lleguen a ser
  lexicon: 'LSJ: γίνομαι — ''to become, to be''; present prohibitive imperative with μή'
  rationale: 'Present middle imperative 2nd plural with negative particle μή signals ongoing prohibition: ''do not be / do not become.'' Latin American ''ustedes'' form (sean) used per project style rather than vosotros (seáis).'
- source_word: ἠγνόησε
  english_pob_choice: (absent from English POB; see revision_awareness)
  chosen_spanish: desconoció
  alternatives_spanish:
  - ignoró
  - no reconoció
  - pasó por alto
  lexicon: 'LSJ: ἀγνοέω — ''to be ignorant of, not to know, to fail to recognise'''
  rationale: Aorist indicating a completed act of epistemic/moral failure. 'Desconoció' captures the factual failure of recognition without prejudging whether it was passive or willful. 'Ignoró' would imply deliberate dismissal; 'no reconoció' is more circumscribed but less idiomatic. Footnote [a] preserves the ambiguity.
- source_word: τοὺς ἀγγέλους
  english_pob_choice: (absent from English POB; see revision_awareness)
  chosen_spanish: los ángeles
  alternatives_spanish:
  - los mensajeros
  lexicon: 'LSJ: ἄγγελος — ''messenger; angel'''
  rationale: The referent is the divine messengers who visited Sodom (Gen 18–19). In a Jewish pseudepigraphical exhortation recalling that event, 'ángeles' is the standard and theologically precise rendering; 'mensajeros' would be more literal but obscures the established intertextual link.
- source_word: Κυρίου
  english_pob_choice: (absent from English POB; see revision_awareness)
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  lexicon: 'LSJ: κύριος — ''lord, master''; in Jewish Greek texts frequently represents the Tetragrammaton'
  rationale: The project default is 'Yahvé' for direct Hebrew/Aramaic יהוה attestation. Here the immediate source is Greek κύριος in a pseudepigraphical text; following project convention for Greek κύριος, 'del Señor' is used, with footnote [b] flagging the probable divine-name background.
- source_word: ἀπώλετο
  english_pob_choice: (absent from English POB; see revision_awareness)
  chosen_spanish: pereció
  alternatives_spanish:
  - fue destruida
  - se perdió
  - fue aniquilada
  lexicon: 'LSJ: ἀπόλλυμι (middle) — ''to perish, be destroyed, be ruined'''
  rationale: Aorist middle of ἀπόλλυμι with intransitive ('perish') force. 'Pereció' is the most natural single-word Spanish equivalent and preserves the finality of the action. 'Fue destruida' shifts agency to an implied agent; 'se perdió' is too weak for eschatological destruction.
- source_word: ἕως αἰῶνος
  english_pob_choice: (absent from English POB; see revision_awareness)
  chosen_spanish: para siempre
  alternatives_spanish:
  - hasta la eternidad
  - por los siglos
  - para la eternidad
  lexicon: 'LSJ: αἰών — ''age, lifetime, eternity''; ἕως + genitive = ''until, up to'''
  rationale: A Semitic-influenced idiom (cf. Hebrew עַד-עוֹלָם) expressing perpetuity. 'Para siempre' is the most natural and broadly intelligible Spanish rendering. 'Hasta la eternidad' is more formal but stilted; 'por los siglos' is traditional liturgical phrasing. Footnote [c] preserves the literalistic option.
theological_decisions:
- issue: 'Sodom as paradigmatic warning: ''ignorance'' of the angels of the Lord'
  english_pob_reading: (absent from English POB text as provided; the English covers a different verse)
  chosen_spanish_reading: que desconoció a los ángeles del Señor
  alternative_spanish_readings:
  - que no reconoció a los mensajeros del Señor
  - que ignoró a los ángeles del Señor
  rationale: 'The Testament of Asher deploys Sodom as a moral exemplum: its destruction is traced to failure to recognise/acknowledge the divine messengers (Gen 18–19). The word ἠγνόησε (ἀγνοέω) carries both cognitive and moral dimensions — to not know, and therefore to not honour. ''Desconoció'' preserves this ambiguity. A translation with ''ignoró'' would weight the verse towards deliberate contempt; ''no reconoció'' towards mere failure of identification. The Spanish ''desconoció'' holds both open.'
  doctrine_reference: Gen 18–19 (divine messengers and Sodom); Jude 7 (Sodom as eschatological warning); cf. Wis 19:13–15
- issue: 'Κυρίου in a Greek pseudepigraphical text: divine name or title?'
  english_pob_reading: (absent from English POB; see revision_awareness)
  chosen_spanish_reading: del Señor
  alternative_spanish_readings:
  - de Yahvé
  rationale: In Jewish pseudepigrapha of this period, Greek κύριος routinely substitutes for the Tetragrammaton. The project default would be 'Yahvé' for a direct Hebrew/Aramaic יהוה source, but the immediate source is Greek κύριος. Per project convention, 'del Señor' is used when the source is Greek κύριος, with a footnote documenting the probable underlying divine-name referent so readers are not misled into thinking it is merely a human lord.
  doctrine_reference: 'Project Spanish terminology defaults: ''If the immediate source is Greek κύριος quoting or alluding to the divine name, explain the decision.'''
- issue: 'ἀπώλετο ἕως αἰῶνος: scope and finality of Sodom''s destruction'
  english_pob_reading: (absent from English POB)
  chosen_spanish_reading: pereció para siempre
  alternative_spanish_readings:
  - fue destruida para siempre
  - pereció eternamente
  rationale: The combination of ἀπόλλυμι (perish/be destroyed) with ἕως αἰῶνος (forever/unto the age) signals irreversible eschatological destruction — not merely historical ruin. 'Pereció para siempre' retains both the finality of the verb and the temporal absoluteness of the phrase without overstating 'eternal punishment' language not explicit in the Greek.
  doctrine_reference: Cf. Jude 7; 2 Pet 2:6; Philo, Abr. 141 (Sodom's total annihilation as permanent warning)
translation_notes:
  revision_awareness: 'ALERTA EDITORIAL CRÍTICA — DISCREPANCIA ENTRE FUENTE GRIEGA Y TRADUCCIÓN INGLESA DEL POB: El texto griego fuente provisto (Μὴ γίνεσθε ὡς Σόδομα, ἥτις ἠγνόησε τοὺς ἀγγέλους Κυρίου, καὶ ἀπώλετο ἕως αἰῶνος — «No sean como Sodoma, que desconoció a los ángeles del Señor y pereció para siempre») NO CORRESPONDE a la traducción inglesa del POB («For I know that you will sin, and you will be handed over into the hands of your enemies; your land will be destroyed, your holy things will be scattered, and you will be dispersed to the four parts of the earth»). El inglés del POB corresponde al contenido de T12P.ASH.7.1 tal como aparece en la edición Charles 1908 (profecía de pecado, entrega a enemigos, desolación de la tierra, dispersión a los cuatro vientos), mientras que el griego provisto en source_payload narra el exemplum de Sodoma. El rastro de revisión menciona ἀφανισθήσεται y τὰ ἅγια, palabras ausentes del griego fuente provisto. Esta traducción española trabaja desde el
    texto griego provisto en source_payload, que es la evidencia fuente primaria según la metodología del proyecto. No traduce el inglés del POB. Este registro requiere revisión editorial urgente para resolver el desajuste fuente-traducción antes de publicación.'
  spanish_consistency_notes:
  - «Del Señor» se usa para Κυρίου porque la fuente inmediata es κύριος griego; el valor por defecto «Yahvé» queda reservado para attestación directa del hebreo יהוה, conforme a la convención del proyecto.
  - La forma verbal «sean» (imperativo de ustedes) sigue el español latinoamericano neutro del proyecto; se evita la forma vosotros «seáis».
  - «Ángeles» se prefiere a «mensajeros» para τοὺς ἀγγέλους en este contexto de mensajeros divinos, por el vínculo intertextual establecido con Gén 18–19 y la tradición exegética.
  - «Pereció» se elige sobre «fue destruida» para conservar la voz intransitiva (media) de ἀπόλλυμι, que no implica un agente externo explícito.
  - «Para siempre» es la equivalencia idiomática de ἕως αἰῶνος; opciones más literales se documentan en nota [c] sin introducirlas en el texto de publicación.
