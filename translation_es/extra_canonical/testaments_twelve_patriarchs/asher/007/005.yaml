translation:
  language: es
  text: Pues yo sé que, desobedeciendo, desobedecerán,[a] y obrando con impiedad, obrarán con impiedad,[b] sin prestar atención a la ley de Dios, sino corrompidos por la maldad mediante los mandamientos de los hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego emplea una figura etymologica (construcción cognada): ἀπειθοῦντες ἀπειθήσετε. Este recurso retórico de influencia semítica —comparable al infinitivo absoluto hebreo— intensifica la certeza de la predicción profética: la desobediencia no es mera posibilidad sino destino anunciado. El español preserva el eco mediante gerundio + futuro del mismo radical.'
    reason: textual_variant
  - marker: b
    text: 'Segunda figura etymologica: ἀσεβοῦντες ἀσεβήσετε. El campo semántico de ἀσεβ- designa la impiedad religiosa —la falta de reverencia hacia Dios— más que la mera inmoralidad ética. Alternativa española posible: «actuando impíamente, actuarán impíamente»; se prefiere «con impiedad» por su mayor dignidad estilística en contexto litúrgico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπειθοῦντες + ἀπειθήσετε
  english_pob_choice: by disobeying, you will disobey
  chosen_spanish: desobedeciendo, desobedecerán
  alternatives_spanish:
  - al desobedecer, desobedecerán
  - siendo desobedientes, desobedecerán
  - ciertamente desobedecerán
  lexicon: 'BDAG s.v. ἀπειθέω: ''to be disobedient, refuse to be persuaded, be unbelieving'''
  rationale: El griego combina un participio presente (ἀπειθοῦντες) con un futuro indicativo del mismo radical (ἀπειθήσετε), formando una figura etymologica de influencia semítica. El gerundio español «desobedeciendo» espeja el participio griego y mantiene el eco cognado con «desobedecerán», preservando el efecto retórico-profético. Se usa la tercera persona plural (desobedecerán) siguiendo el uso del español latinoamericano neutro (equivalente a «vosotros desobedeceréis» en peninsular). Las alternativas parafrásticas («ciertamente desobedecerán») eliminarían la figura documentada.
- source_word: ἀσεβοῦντες + ἀσεβήσετε
  english_pob_choice: by acting ungodly, you will act ungodly
  chosen_spanish: obrando con impiedad, obrarán con impiedad
  alternatives_spanish:
  - actuando impíamente, actuarán impíamente
  - siendo impíos, obrarán con impiedad
  - procediendo con impiedad, procederán con impiedad
  lexicon: 'BDAG s.v. ἀσεβέω: ''to act in an ungodly manner, be impious''; ἀσέβεια denotes specifically religious impiety, failure of reverence toward God'
  rationale: La misma figura etymologica del primer miembro. «Impiedad» es el término teológico estándar en español para el campo semántico de ἀσέβεια/ἀσεβεῖν y es más preciso que «actuar de manera impía» (perifrástico) o «ser impío» (estativo). La repetición del sustantivo «impiedad» en ambas posiciones preserva el eco cognado sin resultar forzada en español.
- source_word: νόμῳ θεοῦ
  english_pob_choice: law of God
  chosen_spanish: ley de Dios
  alternatives_spanish:
  - la Torá de Dios
  - la instrucción de Dios
  lexicon: 'BDAG s.v. νόμος: ''law, rule, principle''; in deuteronomistic/Second Temple contexts regularly = Torah as divine instruction'
  rationale: «Ley de Dios» es el equivalente estándar de νόμος θεοῦ en contextos deuteronomísticos y del Judaísmo del Segundo Templo. «Torá» sería anacrónico en un texto griego de pseudepigrafía judía orientado a lectores generales. «Dios» sigue el parámetro del proyecto para θεός.
- source_word: ἐντολαῖς ἀνθρώπων
  english_pob_choice: commandments of men
  chosen_spanish: mandamientos de los hombres
  alternatives_spanish:
  - preceptos de los hombres
  - órdenes humanas
  - tradiciones de los hombres
  lexicon: 'BDAG s.v. ἐντολή: ''commandment, order, injunction''; ἄνθρωπος here in generic sense (humanity, not specifically males)'
  rationale: '«Mandamientos» es el equivalente bíblico estándar de ἐντολαί en español y mantiene la antítesis teológica con «ley» (νόμος): una es divina, la otra humana. «De los hombres» traduce el genitivo ἀνθρώπων en sentido genérico (seres humanos), que es el uso del griego ἄνθρωπος aquí. La expresión «mandamientos de los hombres» tiene además resonancia con la tradición bíblica (cf. Is 29,13 LXX; Mt 15,9; Col 2,22).'
- source_word: κακίᾳ
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - perversidad
  - malicia
  - el mal
  lexicon: 'BDAG s.v. κακία: ''wickedness, evil, malice''; ranges from general moral evil to specific ill-will'
  rationale: «Maldad» cubre el sentido moral general de κακία (daño moral, el opuesto de bondad/ἀγαθωσύνη) sin la connotación más específica de «malicia» (que implicaría intención). Es el instrumental del proceso de corrupción descrito en la cláusula final.
- source_word: διαφθειρόμενοι
  english_pob_choice: being corrupted
  chosen_spanish: corrompidos
  alternatives_spanish:
  - siendo corrompidos
  - siendo pervertidos
  - dejándose corromper
  lexicon: 'BDAG s.v. διαφθείρω: ''to cause deterioration of the inner life, corrupt, ruin'' (passive: to be corrupted/ruined)'
  rationale: El participio presente pasivo griego (διαφθειρόμενοι) describe la condición contemporánea o resultante de quienes siguen los mandamientos de los hombres. El adjetivo verbal «corrompidos» en español es levemente más conciso y natural que la construcción progresiva «siendo corrompidos», y evita la ambigüedad de si el proceso sigue activo. «Dejándose corromper» introduce una connotación de consentimiento voluntario que el pasivo griego no impone explícitamente.
- source_word: μὴ προσέχοντες
  english_pob_choice: paying no attention to
  chosen_spanish: sin prestar atención a
  alternatives_spanish:
  - sin hacer caso de
  - desatendiendo
  - sin escuchar
  lexicon: 'BDAG s.v. προσέχω: ''to pay attention to, give heed to, follow'''
  rationale: «Sin prestar atención a» reproduce la negación participial del griego de forma natural y directa en español. «Desatendiendo» sería más conciso pero ligeramente más ambiguo (puede significar descuido sin deliberación); «sin hacer caso» es más coloquial. La construcción negativa con infinitivo («sin + infinitivo») es el calco más transparente del participio negado griego.
theological_decisions:
- issue: Figura etymologica / cognate construction as prophetic intensifier
  english_pob_reading: by disobeying, you will disobey / by acting ungodly, you will act ungodly
  chosen_spanish_reading: desobedeciendo, desobedecerán / obrando con impiedad, obrarán con impiedad
  alternative_spanish_readings:
  - Ciertamente desobedecerán y obrarán con impiedad (paráfrasis intensificada)
  - Con toda seguridad desobedecerán (eliminación de la figura)
  rationale: 'Las dos construcciones cognadas (ἀπειθοῦντες ἀπειθήσετε; ἀσεβοῦντες ἀσεβήσετε) reproducen en griego el giro semítico del infinitivo absoluto hebreo + verbo finito (cf. Gen 2,17 LXX: θανάτῳ ἀποθανεῖσθε), un recurso que en la literatura testamentaria del Segundo Templo señala la certeza profética del oráculo. Eliminar la figura con una paráfrasis («ciertamente desobedecerán») destruiría un rasgo literario documentado y pondría en riesgo la auditoría de la traducción. El español preserva el cognado mediante gerundio + futuro.'
  doctrine_reference: Género testamentario del Judaísmo del Segundo Templo; profecía ex eventu en T12P; influencia del infinitivo absoluto hebreo en el griego de los LXX y pseudepígrafos
- issue: 'Antítesis ley de Dios / mandamientos de los hombres: eco de Is 29,13 LXX'
  english_pob_reading: paying no attention to the law of God, but being corrupted by wickedness through the commandments of men
  chosen_spanish_reading: sin prestar atención a la ley de Dios, sino corrompidos por la maldad mediante los mandamientos de los hombres
  alternative_spanish_readings:
  - sin seguir la voluntad de Dios sino las tradiciones humanas (interpretativo)
  - dejando la ley de Dios por las doctrinas de los hombres
  rationale: 'La antítesis νόμος θεοῦ / ἐντολαὶ ἀνθρώπων es teológicamente cargada: evoca Is 29,13 LXX (ἐντάλματα ἀνθρώπων), citado en Mt 15,9; Mc 7,7 y aludido en Col 2,22, donde la «tradición humana» corrompe la piedad verdadera. El texto griego no resuelve si ἐντολαῖς ἀνθρώπων funciona como el vehículo de la κακία o como un elemento de corrupción distinto; la versión española, como la inglesa del POB, mantiene κακία como instrumento y ἐντολαί como canal («mediante»), sin colapsar la tensión.'
  doctrine_reference: Is 29,13 LXX; Mt 15,9 par.; Col 2,22; tradición deuteronomística de crítica al reemplazo de la Torá por normativa humana
- issue: 'Naturaleza del conocimiento de Asher: ἔγνων como percepción profética'
  english_pob_reading: For I know that
  chosen_spanish_reading: Pues yo sé que
  alternative_spanish_readings:
  - Pues yo he llegado a saber que
  - Pues yo he conocido que
  rationale: ἔγνων es aoristo de γινώσκω, que puede indicar un conocimiento adquirido («llegué a saber»). En el género testamentario, sin embargo, la voz del patriarca en punto de muerte funciona como revelación profética, por lo que el presente gnómico «yo sé» reproduce la certeza autorizada de forma más natural en español. Una traducción literalista del aoristo («he llegado a saber») añadiría un matiz de proceso cognitivo que el contexto profético no enfatiza.
  doctrine_reference: Contexto de revelación deathbed en la literatura testamentaria; profecía patriarcal en el Judaísmo del Segundo Templo
translation_notes:
  revision_awareness: 'El control cruzado marcó este versículo como «needs-revision» con una concordancia del 0,78. Los puntos de tensión probables son: (1) si las figuras etymologicas están suficientemente señaladas para la auditoría —el español las preserva con notas [a] y [b]—; (2) la ambigüedad sintáctica de κακίᾳ + ἐντολαῖς ἀνθρώπων, que podría leerse como «corrompidos por la maldad de los mandamientos de los hombres» (genitivo objetivo) o «corrompidos por la maldad mediante los mandamientos de los hombres» (instrumentos separados). La versión española sigue la lectura del POB inglés —dos instrumentales distintos— y registra la alternativa en la decisión teológica correspondiente. No se introducen cambios de fondo respecto a la traducción inglesa del POB; los ajustes son de precisión léxica y preservación de figuras literarias.'
  spanish_consistency_notes:
  - 'ἀπειθέω → «desobedecer/desobedecerán»: coherente con el uso jurídico-moral en contextos de obediencia a la ley divina a lo largo del proyecto T12P.'
  - 'ἀσεβέω / ἀσέβεια → «obrar con impiedad / impiedad»: coherente con el campo semántico religioso establecido para los Testamentos de los Doce Patriarcas.'
  - 'νόμος θεοῦ → «ley de Dios»: terminología estándar del proyecto; no se usa «Torá» para mantener accesibilidad en español neutro.'
  - 'ἐντολή → «mandamiento/s»: coherente con el uso bíblico general del proyecto; se distingue de «ley» (νόμος) para preservar la antítesis teológica.'
  - 'θεός → «Dios»: según el parámetro del proyecto; no hay presencia de יהוה/YHWH ni de κύριος en este texto.'
  - 'κακία → «maldad»: preferida sobre «malicia» (demasiado específico) y «perversidad» (demasiado intenso) para el español neutro del proyecto.'
  - 'Persona verbal: se usa la tercera persona del plural (desobedecerán, obrarán) en lugar de la segunda del plural (vosotros) para seguir la convención del español latinoamericano neutro fijada en el proyecto.'
