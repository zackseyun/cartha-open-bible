translation:
  language: es
  text: Por tanto, hijos míos, también ustedes digan estas cosas a sus hijos, para que no lo desobedezcan.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gr. αὐτῷ, 'a él'; el referente no se nombra explícitamente en este versículo. En el contexto más amplio del Testamento de Aser, probablemente alude a Dios. La edición de Charles (1908) señala variantes textuales en la cláusula «τέκνα μου καὶ ὑμεῖς» (aparato crítico, notas 30–32).
    reason: textual_variant
lexical_decisions:
- source_word: Εἴπατε
  english_pob_choice: tell
  chosen_spanish: digan
  alternatives_spanish:
  - decid
  - cuenten
  - comuniquen
  lexicon: LSJ s.v. λέγω; BDAG s.v. λέγω
  rationale: Aorist imperative 2nd plural of λέγω. The English POB renders this as 'tell' (imperative). In neutral Latin American Spanish, the imperative function is most naturally conveyed by the present subjunctive 'digan' (ustedes), the broadly intelligible form. The vosotros imperative 'decid' is regionally marked and avoided per the project's neutral Latin American target.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - entonces
  - así que
  lexicon: LSJ s.v. οὖν; BDAG s.v. οὖν
  rationale: οὖν is an inferential/consecutive particle marking a logical conclusion from what precedes. 'Por tanto' preserves the formal, conclusive register appropriate to testamentary exhortation and matches the English POB 'therefore'. 'Entonces' or 'así que' would be too conversational for this solemn context.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijos míos
  lexicon: LSJ s.v. τέκνον
  rationale: τέκνον (plural τέκνα) denotes offspring/children. Used here as a vocative address in testamentary discourse. 'Hijos míos' is the natural Spanish vocative, with the postposed possessive lending the dignified register standard in wisdom and testamentary literature. 'Mis hijos' (prepositional possessive) would be less idiomatic in direct address.
- source_word: καὶ ὑμεῖς
  english_pob_choice: you also
  chosen_spanish: también ustedes
  alternatives_spanish:
  - ustedes también
  - vosotros también
  lexicon: LSJ s.v. καί (adjunctive); s.v. σύ
  rationale: The adjunctive καί ('also') combined with the emphatic personal pronoun ὑμεῖς stresses that the addressees are to perpetuate the teaching in turn. 'También ustedes' front-positions the adverb to mirror this emphasis. 'Ustedes también' is also acceptable but slightly weaker in emphasis.
- source_word: μὴ ἀπειθήσωσιν αὐτῷ
  english_pob_choice: so that they may not disobey him
  chosen_spanish: para que no lo desobedezcan
  alternatives_spanish:
  - para que no le desobedezcan
  - a fin de que no le sean desobedientes
  lexicon: LSJ s.v. ἀπειθέω; BDAG s.v. ἀπειθέω
  rationale: 'ἀπειθέω (aorist subjunctive with μή) forms a negative purpose clause: ''so that they may not disobey/be disobedient.'' ''Para que no lo desobedezcan'' is natural Spanish and preserves the purposive force. ''Lo'' is preferred over ''le'' for broad Latin American intelligibility; leísmo is not universal in the Americas. The implicit referent αὐτῷ (''him'') is not named in this verse — see footnote [a] and the theological decision below.'
theological_decisions:
- issue: Referent of αὐτῷ ('him') — identity of the one not to be disobeyed
  english_pob_reading: so that they may not disobey him
  chosen_spanish_reading: para que no lo desobedezcan
  alternative_spanish_readings:
  - para que no le desobedezcan a Dios
  - para que no desobedezcan sus mandamientos
  rationale: αὐτῷ is a 3rd person singular masculine dative ('to/him'). The English POB wisely left the referent unexpanded, as the source text does not name it at this point. In the broader narrative of the Testament of Asher, the referent is most plausibly God, though it could refer to the one through whom the testament or covenant is mediated. Following the English POB's restraint and in fidelity to the source, the Spanish preserves 'lo' without inserting a named referent, maintaining the source-text ambiguity for the reader.
  doctrine_reference: 'T12P.ASH broader context; translation restraint principle: no expansion beyond what the source warrants'
translation_notes:
  revision_awareness: La última revisión (gpt-5.4, 2026-04-23) no introdujo cambios; el acuerdo en la verificación cruzada es 0,97. El registro inglés del POB no llevaba notas al pie, decisiones léxicas ni teológicas. Este borrador español refleja esa misma sobriedad, añadiendo únicamente la justificación léxica desde el griego fuente y señalando en nota la ambigüedad del referente αὐτῷ, que el español «lo» preserva sin expansión editorial.
  spanish_consistency_notes:
  - 'τέκνα se traduce coherentemente como ''hijos'' en sus dos apariciones del versículo: vocativo τέκνα μου → ''hijos míos''; dativo τέκνοις ὑμῶν → ''sus hijos''. El contexto no exige diferenciación.'
  - El imperativo Εἴπατε se vierte como 'digan' (ustedes) y no como 'decid' (vosotros), conforme al español neutro latinoamericano establecido como registro objetivo del proyecto.
  - No aparece ningún tetragramma (YHWH/יהוה) ni κύριος en función de nombre divino; la convención Yahvé del proyecto no se activa en este versículo.
  - '''Por tanto'' se emplea para οὖν a fin de mantener el registro formal testamentario, coherente con el tono solemne esperado en la colección T12P.'
