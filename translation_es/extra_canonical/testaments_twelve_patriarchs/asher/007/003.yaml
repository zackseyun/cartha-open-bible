reference: Testament of Asher 7:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: Ἕως οὗ²⁰ ὁ ὕψιστος ἐπισκέψηται τὴν γῆν, καὶ αὐτὸς ἐλθὼν ⌜ὡς ἄνθρωπος²¹ μετὰ ἀνθρώπων *ἐσθίων καὶ πίνων²²⌝ καὶ²³ συντρίβων²⁴ τὴν κάραν²⁵ τοῦ δράκοντος *ἐπὶ τοῦ²⁶ ὕδατος, *οὗτος σώσει²⁷ τὸν Ἰσραὴλ καὶ πάντα τὰ ἔθνη [θεὸς²⁸ εἰς ἄνδρα ὑποκρινόμενος²⁹].
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/007/003.yaml
  text: '...crushing the head of the dragon over the water. He will save Israel and all the nations [God disguised as a man].'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:59Z'
    unchanged: false
    changes_summary: Changed 'upon the water' to 'over the water' for more natural rendering of ἐπὶ τοῦ ὕδατος, and revised '[God appearing as a man]' to '[God disguised as a man]' to reflect ὑποκρινόμενος more precisely.
translation:
  language: es
  text: Hasta que el Altísimo[a] visite la tierra; y él mismo, viniendo como hombre entre los hombres, comiendo y bebiendo, aplastando la cabeza[b] del dragón sobre el agua[c], salvará a Israel y a todas las naciones [Dios disfrazado[d] de hombre].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'ὕψιστος: título divino superlativo estándar en el judaísmo del Segundo Templo y el NT (cf. Lc 1:32, 35, 76). No es el nombre personal de Dios (YHWH), sino su cualidad de ser el más alto o supremo; la convención del proyecto de usar ''Yahvé'' no aplica aquí.'
    reason: lexical_alternative
  - marker: b
    text: 'κάραν: forma poética y arcaica del griego para ''cabeza'' (propia de Homero y la tragedia), distinta del prosaico κεφαλή. La imagen evoca Génesis 3:15, donde Dios anuncia que la descendencia de la mujer aplastará la cabeza de la serpiente.'
    reason: cross_reference
  - marker: c
    text: 'ἐπὶ τοῦ ὕδατος: lit. ''sobre el agua.'' La revisión del inglés POB (23 abr. 2026) prefirió ''over the water'' sobre ''upon the water'' por mayor naturalidad. La imagen puede evocar las aguas primordiales del caos (Sal 74:13-14) o el bautismo en el Jordán, aunque el texto griego no especifica.'
    reason: source_note
  - marker: d
    text: 'ὑποκρινόμενος: término teatral griego (''representar un papel / actuar''), raíz de ὑποκριτής (''actor / hipócrita''). La revisión del POB inglés precisó ''disguised as'' (disfrazado) en lugar de ''appearing as'' para capturar esta dimensión performativa. La frase entre corchetes —[Dios disfrazado de hombre]— es probablemente una glosa cristiana posterior; así lo señalan los corchetes en la edición crítica de Charles (1908).'
    reason: theological_note
lexical_decisions:
- source_word: ὕψιστος
  english_pob_choice: Most High (not in POB excerpt; rendered from full Greek text)
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Muy Alto
  - el Supremo
  lexicon: BDAG
  rationale: ὕψιστος es el título divino superlativo estándar en el judaísmo del Segundo Templo (LXX Gén 14:18; Dan 3:26; Lc 1:32). 'El Altísimo' es el equivalente español establecido en la tradición bíblica católica y protestante, preservando la fuerza superlativa y el carácter titular. No implica el nombre personal divino (YHWH); la convención 'Yahvé' del proyecto no aplica aquí.
- source_word: ἐπισκέψηται (ἐπισκέπτομαι)
  english_pob_choice: visits (not in POB excerpt; rendered from full Greek text)
  chosen_spanish: visite
  alternatives_spanish:
  - acuda a
  - intervenga en
  - cuide de
  lexicon: BDAG
  rationale: ἐπισκέπτομαι designa la visita divina de cuidado y supervisión. El aoristo subjuntivo en la cláusula temporal 'Ἕως οὗ ... ἐπισκέψηται' es construcción estándar para la expectativa escatológica. 'Visite' preserva tanto el sentido relacional como el de intervención soberana (cf. Lc 1:68; 7:16 en el NT).
- source_word: συντρίβων
  english_pob_choice: crushing
  chosen_spanish: aplastando
  alternatives_spanish:
  - quebrando
  - triturando
  - destrozando
  lexicon: BDAG
  rationale: συντρίβω significa 'machacar, triturar, destrozar por completo.' 'Aplastando' captura la fuerza física del aplastamiento mejor que 'quebrando' (fractura más suave) o 'triturando' (que evoca molienda). La imagen evoca directamente Génesis 3:15 (aplastar la cabeza de la serpiente).
- source_word: κάραν (κάρα)
  english_pob_choice: head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - la testa
  lexicon: LSJ
  rationale: κάρα es la forma poética y arcaica griega para 'cabeza' (usada en Homero y la tragedia), distinta del más prosáico κεφαλή. 'La cabeza' es el equivalente español natural y moderno; 'la testa' aproximaría el registro arcaico pero resultaría opaca en un texto de divulgación. El eco de Génesis 3:15 (aplastar la cabeza de la serpiente) se conserva en la imagen.
- source_word: ἐπὶ τοῦ ὕδατος
  english_pob_choice: over the water (revisado desde 'upon the water')
  chosen_spanish: sobre el agua
  alternatives_spanish:
  - en el agua
  - encima del agua
  - sobre las aguas
  lexicon: BDAG
  rationale: ἐπί + genitivo expresa posición 'sobre' o 'encima de la superficie de.' La revisión del inglés POB (2026-04-23) cambió 'upon' por 'over' en busca de mayor naturalidad. El español 'sobre' capta el mismo sentido espacial y es la opción más idiomática. 'En el agua' implicaría inmersión, distorsionando el sentido. La imagen puede evocar las aguas primordiales del caos o la escena del bautismo en el Jordán.
- source_word: σώσει
  english_pob_choice: will save
  chosen_spanish: salvará
  alternatives_spanish:
  - habrá de salvar
  lexicon: BDAG
  rationale: Futuro indicativo activo de σῴζω. El español 'salvará' es el equivalente directo, preservando la certeza escatológica del tiempo futuro griego.
- source_word: ἔθνη
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: BDAG
  rationale: '''Las naciones'' preserva el alcance universal de ἔθνη sin reducirlo a la distinción específicamente judeo-gentil que implicaría ''los gentiles.'' En este contexto escatológico —''todas las naciones''— el marco universal es el primario. ''Los pueblos'' es aceptable pero ''las naciones'' es el equivalente más consolidado en el español bíblico.'
- source_word: ὑποκρινόμενος
  english_pob_choice: disguised (revisado desde 'appearing')
  chosen_spanish: disfrazado
  alternatives_spanish:
  - tomando el papel de
  - haciéndose pasar por
  - fingiendo ser
  - adoptando la apariencia de
  lexicon: LSJ
  rationale: 'ὑποκρίνομαι es un término teatral griego que significa ''representar un papel, actuar'' (raíz de ὑποκριτής, ''actor / hipócrita''). La revisión del POB inglés rechazó específicamente ''appearing as'' en favor de ''disguised as'' para capturar la dimensión performativa-enmascaradora del verbo. El español ''disfrazado de hombre'' preserva este sentido teatral: Dios ''con el disfraz de'' o ''en el papel de'' hombre. ''Haciéndose pasar por'' conlleva una connotación negativa de engaño deliberado; ''tomando el papel de'' es más neutro pero menos idiomático en este contexto.'
- source_word: θεός
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Equivalencia estándar conforme a los valores predeterminados del proyecto. θεός aparece anartro aquí (θεὸς εἰς ἄνδρα), con fuerza cualitativa o predicativa; el español no requiere artículo antes de 'Dios' en contextos apositivos o predicativos.
theological_decisions:
- issue: La frase entre corchetes [θεὸς εἰς ἄνδρα ὑποκρινόμενος] identifica a la figura salvífica como Dios mismo actuando el papel de hombre, representando una cristología elevada. En el aparato crítico de Charles (1908), los corchetes señalan probable interpolación tardía o glosa secundaria.
  english_pob_reading: '[God disguised as a man]'
  chosen_spanish_reading: '[Dios disfrazado de hombre]'
  alternative_spanish_readings:
  - '[Dios tomando el papel de hombre]'
  - '[Dios haciéndose pasar por hombre]'
  rationale: 'Los corchetes se conservan en el texto español para mantener el aparato fuente-crítico que indica posible interpolación. ''Disfrazado de hombre'' sigue el razonamiento de la revisión del inglés: ὑποκρινόμενος como disfraz o rol teatral, no mera apariencia. La tensión teológica entre la identidad divina y el enmascaramiento humano se preserva en lugar de suavizarse con lenguaje dogmático de encarnación. El carácter parentético de la frase impide imponer terminología encarnacional contemporánea sobre lo que probablemente sea una glosa cristiana.'
  doctrine_reference: Encarnación cristológica; cf. Filipenses 2:6-8 (kénosis); posible interpolación cristiana en los Testamentos de los Doce Patriarcas
- issue: 'La imagen de aplastar la cabeza del dragón sobre el agua porta múltiples resonancias tipológicas: Génesis 3:15 (protoevangelio), la mitología del combate cósmico contra el dragón/Leviatán (Sal 74:13-14; Is 27:1), y posiblemente la escena del bautismo en el Jordán.'
  english_pob_reading: crushing the head of the dragon over the water
  chosen_spanish_reading: aplastando la cabeza del dragón sobre el agua
  alternative_spanish_readings:
  - quebrando la cabeza del dragón sobre las aguas
  - destrozando la cabeza de la serpiente sobre el agua
  rationale: Se usa 'dragón' (δράκων) y no 'serpiente' porque el texto fuente emplea específicamente δράκοντος, aunque la alusión a la serpiente del Génesis es transparente. 'Aplastando' preserva la fuerza física y violenta de συντρίβω. La escena 'sobre el agua' queda sin especificar en el texto griego; añadir interpretación baptismal o cosmológica al texto principal excedería la evidencia del original.
  doctrine_reference: Génesis 3:15; Salmo 74:13-14; Isaías 27:1; Apocalipsis 12; posible tipología bautismal
translation_notes:
  revision_awareness: 'La revisión del 23 de abril de 2026 (modelo: gpt-5.4) realizó dos cambios en el inglés POB: (1) ''upon the water'' → ''over the water'', argumentando mayor naturalidad para ἐπὶ τοῦ ὕδατος; (2) ''[God appearing as a man]'' → ''[God disguised as a man]'', para reflejar con mayor precisión el sentido teatral de ὑποκρινόμενος. El español adopta ambas decisiones: ''sobre el agua'' sigue la lectura revisada ''over'', y ''disfrazado de hombre'' recoge la fuerza performativa del término griego que la revisión identificó correctamente. La revisión cuenta con alto acuerdo (0.9) y veredicto ''minor-issues'', lo que la acredita como base sólida para las decisiones del español.'
  spanish_consistency_notes:
  - «El Altísimo» es la forma española establecida para ὕψιστος en contextos bíblicos y del Segundo Templo; no se aplica la convención de «Yahvé» porque no hay nombre divino personal en juego.
  - «Las naciones» (πάντα τὰ ἔθνη) se prefiere a «los gentiles» para preservar el alcance universal del texto escatológico.
  - «Dios» (θεός anartro) sigue los valores predeterminados del proyecto; no se añade artículo en la glosa apositiva.
  - Los corchetes de la frase [Dios disfrazado de hombre] se conservan íntegramente para mantener el aparato fuente-crítico de la edición de Charles (1908), que los usa para indicar posibles interpolaciones.
  - «Salvará» preserva el futuro indicativo (σώσει) con su plena fuerza escatológica, sin atenuarlo con subjuntivo o condicional.
  - «Aplastando» para συντρίβων es preferido sobre «quebrando» o «triturando» por capturar la fuerza física del aplastamiento total.
  - No aparece YHWH ni κύριος en este texto; la convención del proyecto de escribir «Yahvé» no se activa en ningún punto del versículo.
