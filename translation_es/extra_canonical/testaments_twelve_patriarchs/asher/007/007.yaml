translation:
  language: es
  text: Pero el Señor[a] los congregará en fe por medio de su compasión,[b] y por medio de Abraham, Isaac y Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sujeto 'el Señor' no aparece de forma explícita en el griego; ἐπισυνάξει es 3.ª persona singular del futuro sin sujeto nominal en este fragmento. Se suple desde el contexto del discurso, siguiendo la decisión del inglés POB. Al ser el texto fuente griego y no contener el tetragrámaton ni κύριος de forma expresa, la convención POB de 'Yahvé' no aplica; se usa 'el Señor' para marcar el referente divino contextualmente inferido.
    reason: source_note
  - marker: b
    text: 'Gr. εὐσπλαγχνία, literalmente ''buenas entrañas'' (εὖ + σπλάγχνα, las vísceras como sede del afecto profundo): compasión visceral o ternura entrañable. ''Compasión'' es la equivalencia más natural en español moderno; ''entrañas de misericordia'' preservaría la imagen somática del original pero resultaría arcaica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισυνάξει (ἐπισυνάγω)
  english_pob_choice: will gather
  chosen_spanish: congregará
  alternatives_spanish:
  - reunirá
  - juntará
  - recogerá
  lexicon: 'BDAG ἐπισυνάγω: to bring together at one place, gather together; the ἐπι- prefix intensifies or completes the action of gathering toward a point.'
  rationale: El verbo ἐπισυνάγω lleva el prefijo ἐπι-, que refuerza la idea de concentrar la reunión hacia un punto. 'Congregar' en español connota asamblea formal con mayor fuerza que 'reunir', y captura mejor este matiz. El inglés POB 'gather' es aceptable pero no marca el prefijo intensificador; 'congregará' lo aproxima sin ser forzado.
- source_word: ἐν πίστει
  english_pob_choice: in faith
  chosen_spanish: en fe
  alternatives_spanish:
  - en la fe
  - con fe
  - mediante la fe
  lexicon: 'BDAG πίστις: faith, trust, fidelity. Construcción anarticular (sin artículo) en el griego.'
  rationale: El griego carece de artículo (ἐν πίστει, no ἐν τῇ πίστει), lo que sugiere el modo o la cualidad de la reunión más que un cuerpo doctrinal definido. 'En fe' (sin artículo) preserva esa construcción anarticular; 'en la fe' añadiría una definición que el griego no impone.
- source_word: εὐσπλαγχνίας (εὐσπλαγχνία)
  english_pob_choice: compassion
  chosen_spanish: compasión
  alternatives_spanish:
  - misericordia entrañable
  - ternura
  - entrañas de misericordia
  lexicon: 'BDAG εὐσπλαγχνία: tender-heartedness, compassion; de εὔσπλαγχνος (εὖ + σπλάγχνα, las entrañas/vísceras como sede del afecto profundo).'
  rationale: 'εὐσπλαγχνία evoca literalmente las vísceras (σπλάγχνα) como sede del afecto más hondo, combinadas con εὖ (''bien/bueno''): una ternura visceral. ''Compasión'' es el equivalente español más directo y claro, y coincide con la elección del inglés POB. ''Entrañas de misericordia'' preservaría la imagen somática pero resultaría arcaica en español moderno; se reserva para nota al pie. Véase nota [b].'
- source_word: δι᾽ Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακώβ
  english_pob_choice: through Abraham and Isaac and Jacob
  chosen_spanish: por medio de Abraham, Isaac y Jacob
  alternatives_spanish:
  - por Abraham, Isaac y Jacob
  - por medio de Abraham, de Isaac y de Jacob
  lexicon: 'διά + genitivo: a través de, por medio de (agencia o mediación). Un solo διά gobierna los tres nombres en el griego.'
  rationale: El griego emplea un único δι᾽ para los tres nombres patriarcales; el español sigue la misma estructura con un solo 'por medio de'. Repetir 'de' ante cada nombre ('de Abraham, de Isaac y de Jacob') sería más enfático pero añadiría un calco que el original no requiere. 'Por medio de' es preferible a la forma corta 'por' para mantener el sentido de mediación/intercesión que el contexto patriarcal implica.
theological_decisions:
- issue: 'Sujeto implícito: el verbo ἐπισυνάξει carece de sujeto explícito en el fragmento griego'
  english_pob_reading: the Lord will gather
  chosen_spanish_reading: el Señor los congregará
  alternative_spanish_readings:
  - él los congregará
  - congregará a ustedes (sin sujeto explícito)
  rationale: 'El inglés POB suple ''the Lord'' a partir del contexto del discurso (Testamento de Aser 7, donde el agente divino es el referente natural). En español, el verbo puede funcionar sin sujeto expreso, pero la supresión podría oscurecer la agencia divina que el contexto establece. Se sigue la decisión del inglés POB y se suple ''el Señor'', marcándolo con nota [a]. Dado que el texto fuente es griego (no hebreo), la convención POB de usar ''Yahvé'' para el tetragrámaton no aplica aquí: no hay κύριος explícito en el griego, solo un sujeto contextualmente inferido. ''El Señor'' refleja esa inferencia sin imponer el tetragrámaton donde el fuente no lo tiene.'
  doctrine_reference: 'Convención POB: ''Yahvé'' para יהוה/YHWH; cuando la fuente inmediata es griega y el nombre divino no aparece explícitamente, se explica la decisión en nota.'
- issue: 'Fundamento patriarcal: ''por medio de Abraham, Isaac y Jacob'' como base de la reunión escatológica'
  english_pob_reading: through Abraham and Isaac and Jacob
  chosen_spanish_reading: por medio de Abraham, Isaac y Jacob
  alternative_spanish_readings:
  - en nombre de Abraham, Isaac y Jacob
  rationale: La frase evoca la promesa de la alianza y la intercesión patriarcal como fundamento de la reunión futura del pueblo. El uso de διά (mediación/agencia) —y no simplemente κατά (conforme a) o ἐν (en)— sugiere que los patriarcas funcionan como canal o garantía de la fidelidad divina, no solo como referentes históricos. 'Por medio de' preserva este matiz de mediación. La traducción 'en nombre de' sería una interpretación más libre.
  doctrine_reference: 'Contexto del Testamento de Aser: literatura parabiblical judía del Segundo Templo; la apelación a los patriarcas como garantes de la promesa divina es un motivo habitual (cf. Dt 9:27; Ne 9:7-8).'
translation_notes:
  revision_awareness: 'No se han aplicado revisiones al inglés POB (applied_revisions: []). La pasada de revisión más reciente (modelo gpt-5.4, 2026-04-23) no introdujo cambios (unchanged: true). El estado de verificación cruzada es high_agreement con minor-issues (puntuación 0,9, una pasada con issues menores). El borrador español sigue la traducción inglesa POB estable y no necesita incorporar ajustes de revisión pendientes.'
  spanish_consistency_notes:
  - El sujeto 'el Señor' se suple contextualmente; la convención POB de usar 'Yahvé' no aplica porque la fuente es griega y no contiene el tetragrámaton ni κύριος de forma explícita en este verso.
  - ἐπισυνάξει se rinde 'congregará' en lugar del más genérico 'reunirá' para conservar el matiz concentrador del prefijo ἐπι-.
  - La construcción anarticular ἐν πίστει se traduce 'en fe' (sin artículo) para respetar el valor modal del griego.
  - εὐσπλαγχνία se traduce 'compasión' en coherencia con la elección del inglés POB; la imagen somática visceral queda documentada en nota [b].
  - Un único 'por medio de' gobierna la serie patriarcal 'Abraham, Isaac y Jacob', siguiendo la estructura del griego con un solo διά.
