  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/007/002.yaml
  text: until the Most High visits the earth, and he himself comes as a man, eating and drinking with humans,
  revision_pass:
    model: gpt-5.4-mini
