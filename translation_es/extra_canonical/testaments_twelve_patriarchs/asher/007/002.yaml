source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: '*Ἐγὼ γὰρ οἶδα⁵ ὅτι ἁμαρτήσετε⁶ καὶ παραδοθήσεσθε εἰς χεῖρας ἐχθρῶν ὑμῶν, ⌜καὶ¹⁸ ἡ γῆ ὑμῶν⁹ ἐρημωθήσεται¹⁰, καὶ τὰ ἅγια ὑμῶν καταφθαρήσονται¹¹, καὶ ὑμεῖς¹² διασκορπισθήσεσθε¹³ εἰς τὰς τέσσαρας¹⁴ γωνίας *τῆς γῆς¹⁵, καὶ ἔσεσθε *εἰς διασπορὰν¹⁶ ἐξουδενωμένοι ὡς¹⁷ ὕδωρ¹⁸ ἄχρηστον¹⁹.⌝'
