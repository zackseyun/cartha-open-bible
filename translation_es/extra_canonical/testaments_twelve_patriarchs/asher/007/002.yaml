translation:
  language: es
  text: Porque yo sé que pecarán y serán entregados en manos de sus enemigos; su tierra quedará desolada, sus cosas sagradas[a] serán totalmente destruidas, y serán dispersados a los cuatro rincones[b] de la tierra, y quedarán en la diáspora[c], menospreciados[d] como agua inútil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego τὰ ἅγια, lit. ''las cosas santas''; puede referirse al templo, sus utensilios y los lugares sagrados en general. Alternativa: ''los santuarios''.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego εἰς τὰς τέσσαρας γωνίας τῆς γῆς, fórmula cosmológica fija (cf. Is 11:12; Ap 7:1). Alternativas: ''los cuatro extremos'' o ''los cuatro confines de la tierra''.'
    reason: lexical_alternative
  - marker: c
    text: Griego εἰς διασπορὰν, término técnico judío para las comunidades dispersas fuera de la tierra de Israel; el asterisco (*) en el aparato de Charles 1908 indica variante textual en este punto.
    reason: textual_variant
  - marker: d
    text: 'Griego ἐξουδενωμένοι, participio perfecto pasivo: ''contados como nada / tenidos en completo desprecio''. La imagen completa (agua inútil derramada) evoca la tradición profética de Israel en el exilio (cf. Lm 2).'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁμαρτήσετε (hamartēsete)
  english_pob_choice: '[not rendered in English POB — see revision_awareness]'
  chosen_spanish: pecarán
  alternatives_spanish:
  - cometerán pecado
  - transgredirán
  lexicon: 'BDAG s.v. ἁμαρτάνω: to act contrary to the will and law of God; future active indicative 2nd plural'
  rationale: Straightforward future of ἁμαρτάνω; 'pecarán' is the natural and doctrinally consistent rendering in Spanish. No tension with project defaults.
- source_word: παραδοθήσεσθε (paradothēsesthe)
  english_pob_choice: '[not rendered in English POB — see revision_awareness]'
  chosen_spanish: serán entregados
  alternatives_spanish:
  - serán traicionados
  - serán puestos en manos
  lexicon: 'BDAG s.v. παραδίδωμι: to hand over, deliver up; future passive 2nd plural'
  rationale: '''Serán entregados'' preserves the passive force (divine-permissive action) and the technical sense of being handed over to enemy power, matching the exile-theology pattern throughout the Testaments.'
- source_word: τὰ ἅγια (ta hagia)
  english_pob_choice: '[not rendered in English POB — see revision_awareness]'
  chosen_spanish: las cosas sagradas
  alternatives_spanish:
  - los santuarios
  - los lugares santos
  - las cosas santas
  lexicon: 'LSJ s.v. ἅγιος (neuter plural substantive): holy things, sanctuary, sacred objects'
  rationale: In T.Ash. context τὰ ἅγια most likely refers collectively to the Temple, its vessels, and sacred precincts (cf. Dan 8:13 LXX; 1 Macc 1:37). 'Las cosas sagradas' keeps the breadth of the neuter plural; 'los santuarios' would narrow it to architecture. Footnote preserves the alternative.
- source_word: καταφθαρήσονται (kataphtharsontai)
  english_pob_choice: '[not rendered in English POB — see revision_awareness]'
  chosen_spanish: serán totalmente destruidas
  alternatives_spanish:
  - serán corrompidas por completo
  - serán arruinadas
  lexicon: 'BDAG s.v. καταφθείρω: to destroy utterly, corrupt completely; the κατα- prefix intensifies the base φθείρω'
  rationale: The intensive prefix κατα- signals complete, irreversible destruction rather than mere damage; 'totalmente destruidas' captures that force. 'Corrompidas' (corrupted) is lexically possible but softer in Spanish register and less clear for sacred objects.
- source_word: διασκορπισθήσεσθε (diaskorpisthēsesthe)
  english_pob_choice: '[not rendered in English POB — see revision_awareness]'
  chosen_spanish: serán dispersados
  alternatives_spanish:
  - serán esparcidos
  - serán diseminados
  lexicon: 'BDAG s.v. διασκορπίζω: to scatter, disperse; future passive 2nd plural'
  rationale: '''Dispersados'' is the standard rendering in exile contexts and resonates with the diaspora theology that follows immediately. ''Esparcidos'' is acceptable but carries a slightly weaker connotation.'
- source_word: εἰς τὰς τέσσαρας γωνίας τῆς γῆς
  english_pob_choice: '[not rendered in English POB — see revision_awareness]'
  chosen_spanish: a los cuatro rincones de la tierra
  alternatives_spanish:
  - a los cuatro extremos de la tierra
  - a los cuatro confines de la tierra
  lexicon: γωνία = corner, angle (BDAG); τέσσαρες γωνίαι τῆς γῆς is a fixed cosmological idiom (cf. Rev 7:1; Isa 11:12)
  rationale: '''Los cuatro rincones de la tierra'' is the established Spanish idiom for this cosmological formula and is immediately intelligible. ''Extremos'' or ''confines'' are acceptable alternatives noted in the footnote.'
- source_word: εἰς διασπορὰν (eis diasporan)
  english_pob_choice: '[not rendered in English POB — see revision_awareness]'
  chosen_spanish: en la diáspora
  alternatives_spanish:
  - en la dispersión
  - en el destierro
  lexicon: 'BDAG s.v. διασπορά: dispersion, the Diaspora; a Jewish technical term for scattered communities living outside the homeland'
  rationale: The Greek uses the technical Jewish term διασπορά; Spanish 'diáspora' is universally recognized (cf. 1 Pet 1:1; Jn 7:35 in Spanish versions) and should be retained rather than paraphrased. The asterisk (*) in the Charles apparatus on *εἰς διασπορὰν indicates a textual variant at this point, noted in revision_awareness.
- source_word: ἐξουδενωμένοι (exoudenōmenoi)
  english_pob_choice: '[not rendered in English POB — see revision_awareness]'
  chosen_spanish: menospreciados
  alternatives_spanish:
  - tenidos en nada
  - despreciados
  - contados como nada
  lexicon: 'BDAG s.v. ἐξουδενόω / ἐξουθενόω: to regard as nothing, despise, treat with contempt; perfect passive participle'
  rationale: '''Menospreciados'' captures the social contempt implied: the scattered people are regarded as worthless by those among whom they live. ''Tenidos en nada'' is more literal but less natural in Spanish. The perfect participle implies a settled state of contempt.'
- source_word: ὕδωρ ἄχρηστον (hydōr achreston)
  english_pob_choice: '[not rendered in English POB — see revision_awareness]'
  chosen_spanish: agua inútil
  alternatives_spanish:
  - agua sin provecho
  - agua que no sirve para nada
  lexicon: ἄχρηστος = useless, unprofitable (BDAG); contrast χρήσιμος
  rationale: '''Agua inútil'' is the most concise and dignified rendering of this striking simile. The comparison of the scattered, despised people to water that has spilled and lost its usefulness is a powerful image from the Hebrew prophetic tradition (cf. Lam 2). No expansion needed.'
theological_decisions:
- issue: Critical mismatch between Greek source text and English POB translation
  english_pob_reading: until the Most High visits the earth, and he himself comes as a man, eating and drinking with humans,
  chosen_spanish_reading: Translation follows the Greek source text provided, not the English POB
  alternative_spanish_readings:
  - 'If translating the English POB text: ''hasta que el Altísimo visite la tierra, y él mismo venga como hombre, comiendo y bebiendo con los humanos,'''
  rationale: The Greek source text provided for T12P.ASH.7.2 is a prophetic prediction of exile and diaspora (sin → captivity → land desolated → holy things destroyed → scattered to four corners → despised like useless water). The English POB translation is about the incarnate visitation of the Most High — the content of what Charles' edition gives as T.Ash. 7:3 or the continuation of 7:2 beyond the ⌜...⌝ bracket. These are textually distinct clauses. Project instructions require working from the original source evidence first; accordingly, the Spanish draft translates the Greek text actually provided. The English POB audit trail appears to be displaced or to have been generated from a different textual segment. This discrepancy must be resolved by the editorial team before this record is finalized.
  doctrine_reference: The English POB portion (Most High visiting as a man) carries significant Christological implications in T.Ash.'s reception history; the Greek source portion is classic Jewish exile-and-return theology. Collapsing the two would misrepresent both.
- issue: Manuscript brackets ⌜...⌝ and asterisks in Charles' apparatus
  english_pob_reading: '[not addressed in English POB]'
  chosen_spanish_reading: Translation treats the bracketed text as the operative verse content, per source_payload as provided
  alternative_spanish_readings:
  - An edition following only the shorter recension would omit the material from καὶ ἡ γῆ ὑμῶν through ἄχρηστον
  rationale: The ⌜...⌝ notation in Charles 1908 marks material present in the longer recension (b-text) but possibly secondary. The asterisks (*) before *τῆς γῆς and *εἰς διασπορὰν flag variant readings in the apparatus. Since the source_payload presents this text as the operative source, the Spanish draft translates it in full. The editorial team should verify which recension the POB intends to follow and update the apparatus notes accordingly.
  doctrine_reference: Recension choice in the Testaments of the Twelve Patriarchs affects the presence or absence of explicitly Christian interpolations; the exile-diaspora material in the ⌜...⌝ bracket is generally regarded as part of the older Jewish stratum.
translation_notes:
  revision_awareness: 'ALERTA EDITORIAL CRÍTICA: El texto griego de la fuente (source_payload) para T12P.ASH.7.2 es una profecía de exilio y diáspora — Asher predice que su descendencia pecará, será entregada a sus enemigos, su tierra quedará desolada, sus cosas sagradas serán destruidas y serán dispersados como agua inútil. Sin embargo, la traducción inglesa del POB dice: "until the Most High visits the earth, and he himself comes as a man, eating and drinking with humans," que corresponde al contenido de T.Ash. 7:3 o de la continuación de 7:2 más allá del cierre del paréntesis ⌜...⌝ en Charles 1908 (la venida encarnada del Altísimo). La revisión de gpt-5.4-mini eliminó ''crushing the head of the dragon in water'' por no estar en el griego provisto, pero el texto inglés revisado sigue sin corresponder al griego provisto. Conforme a las instrucciones del proyecto —trabajar primero desde la evidencia de la fuente original—, el borrador español traduce el texto griego efectivamente suministrado.
    Se requiere decisión editorial: (1) confirmar que el griego provisto es el correcto para este versículo y corregir la traducción inglesa, o (2) proveer el griego que efectivamente subyace a la traducción inglesa. El presente registro no debe publicarse sin resolver esta discrepancia.'
  spanish_consistency_notes:
  - No aparece YHWH ni κύριος en este versículo; la terminología del proyecto para el nombre divino no se aplica aquí.
  - El término 'diáspora' se mantiene como transliteración técnica, coherente con el precedente del POB para términos técnicos judíos que tienen equivalente directo en español culto.
  - Se usa 'menospreciados' para ἐξουδενωμένοι en lugar de 'despreciados' para preservar el matiz de 'ser contados como nada' más que el de odio activo.
  - El plural 'ustedes' (forma latinoamericana neutra) se implica en las formas verbales de tercera persona plural del griego; el texto griego usa segunda persona plural (ὑμεῖς / ὑμῶν), por lo que la traducción española lo refleja mediante formas verbales de segunda persona plural implícitas o construidas con 'su/sus' para los posesivos.
  - La construcción 'su tierra quedará desolada... sus cosas sagradas serán... y serán dispersados' mantiene la progresión asindética/polisindética del original griego.
  - No se aplican términos del glosario del proyecto para δοῦλος, σάρξ, χάρις, μετάνοια ni δικαιοσύνη en este versículo.
