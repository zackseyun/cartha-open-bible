source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: V. Ὁρᾶτε¹, τέκνα², πῶς δύο³ εἰσὶν ⌜ἐν πᾶσιν⌝, ἓν⁴ κατέναντι τοῦ ἑνός, *καὶ ἓν ὑπὸ τοῦ ἑνὸς⁵ κέκρυπται· ⌜ἐν τῇ κτίσει ἡ πλεονεξία, ἐν τῇ εὐφροσύνῃ ἡ μέθη, ἐν τῷ γέλωτι τὸ πένθος, ἐν τῷ γάμῳ ἡ ἀσωτία⌝⁶.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/005/001.yaml
  text: 'See, my children, how there are two in all things, one opposite the other, and one is hidden under the other: in creation, greed; in merriment, drunkenness; in laughter, grief; in marriage, debauchery.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:27Z'
    unchanged: false
    changes_summary: Revised 'everything' to 'all things' for closer alignment with ἐν πᾶσιν, and changed 'wealth-getting' to 'creation' to reflect ἐν τῇ κτίσει accurately. Kept the remaining pairings with minor smoothing for formal natural English.
translation:
  language: es
  text: 'Miren, hijos, cómo hay dos en todas las cosas, uno frente al otro, y uno está oculto[a] bajo el otro: en la creación[b], la codicia; en el regocijo, la embriaguez; en la risa, el duelo; en el matrimonio, el libertinaje.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego κέκρυπται es perfecto pasivo de κρύπτω («ocultar»), con fuerza de estado resultante: «ha quedado oculto y así permanece». Se traduce como estado presente («está oculto») por fluidez en español, sin pérdida del sentido de permanencia.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego κτίσει, «creación». Algunos manuscritos leen κτήσει, «adquisición» o «riqueza acumulada», lo que daría «en la adquisición de bienes, la codicia». La edición Charles 1908 lee κτίσει; la revisión del POB inglés adoptó «creation» para reflejar este texto. La lectura κτίσει produce la paradoja teológica más significativa: el vicio de la codicia se esconde incluso dentro del bien de la creación.'
    reason: textual_variant
lexical_decisions:
- source_word: Ὁρᾶτε
  english_pob_choice: See
  chosen_spanish: Miren
  alternatives_spanish:
  - Ved
  - Vean
  - Observen
  lexicon: 'ὁράω (LSJ: imperativo pl. de segunda persona, «mirar», «ver», «percibir»)'
  rationale: Imperativo de segunda persona plural. En español latinoamericano neutro, «miren» es el equivalente natural y conserva el tono exhortativo directo del original. «Ved» es arcaico y propio del vosotros peninsular; «vean» funciona igualmente pero «miren» resulta más inmediato en contexto de discurso patriarcal.
- source_word: τέκνα
  english_pob_choice: my children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos míos
  - hijos e hijas
  lexicon: 'τέκνον (LSJ: hijo/a, descendiente, vocativo de afecto)'
  rationale: El griego τέκνα es vocativo plural sin posesivo explícito. El inglés POB añadió «my» por convención de la lengua inglesa; el español puede sobrentender la relación en contexto patriarcal y no requiere «míos» para ser natural. Se evita añadir lo que la fuente no dice explícitamente.
- source_word: ἐν πᾶσιν
  english_pob_choice: in all things
  chosen_spanish: en todas las cosas
  alternatives_spanish:
  - en todo
  - en todo lo existente
  - en todas las realidades
  lexicon: 'πᾶς (LSJ: todo, dativo plural πᾶσιν; con artículo implícito en contexto)'
  rationale: La revisión del POB inglés cambió «in everything» a «in all things» para reflejar fielmente el plural ἐν πᾶσιν. «En todas las cosas» mantiene ese plural y la amplitud ontológica del enunciado. «En todo» sería más fluido pero perdería el matiz distributivo del plural griego.
- source_word: κατέναντι τοῦ ἑνός
  english_pob_choice: opposite the other
  chosen_spanish: frente al otro
  alternatives_spanish:
  - en contra del otro
  - enfrente del otro
  - en oposición al otro
  lexicon: 'κατέναντι (LSJ: preposición de lugar, «enfrente de», «frente a», «en presencia de»)'
  rationale: κατέναντι indica posición directamente opuesta. «Frente al otro» es la expresión más natural en español para la oposición binaria cara a cara que el texto describe.
- source_word: κέκρυπται
  english_pob_choice: is hidden
  chosen_spanish: está oculto
  alternatives_spanish:
  - ha quedado oculto
  - se oculta
  - permanece escondido
  lexicon: 'κρύπτω (LSJ: ocultar, esconder; κέκρυπται es perfecto pasivo con fuerza de estado resultante)'
  rationale: 'El perfecto pasivo κέκρυπται señala un estado que se ha establecido y permanece: «ha sido ocultado y sigue oculto». En español, «está oculto» transmite ese estado resultante de forma natural, mientras que «se oculta» daría una acción presente continua que el perfecto griego no implica. Se añade nota de pie sobre el aspecto verbal.'
- source_word: κτίσει
  english_pob_choice: creation
  chosen_spanish: la creación
  alternatives_spanish:
  - la adquisición
  - la criatura
  - la riqueza
  lexicon: 'κτίσις (LSJ: acto de fundar/crear; la creación como resultado; criatura; cf. variante κτῆσις: posesión, adquisición)'
  rationale: 'La edición Charles 1908 lee κτίσει (dativo de κτίσις, «creación»). La revisión POB inglés corrigió explícitamente la traducción anterior «wealth-getting» —que reflejaba la variante κτήσει (κτῆσις, «adquisición»)— por «creation» para honrar el texto griego base. «La creación» es la traducción directa de κτίσει y encaja perfectamente con la estructura moral del pasaje: el vicio se oculta dentro de lo que en sí mismo es bueno (la creación, el regocijo, la risa, el matrimonio). Se documenta la variante en nota.'
- source_word: πλεονεξία
  english_pob_choice: greed
  chosen_spanish: la codicia
  alternatives_spanish:
  - la avaricia
  - la ambición desmedida
  - el ansia de tener más
  lexicon: 'πλεονεξία (BDAG/LSJ: deseo de tener más de lo que le corresponde, avaricia, codicia; lit. «el tener más»)'
  rationale: «Codicia» es el equivalente español más directo y de uso universal en contextos morales y bíblicos para πλεονεξία. «Avaricia» tiende a especificarse en dinero; «codicia» mantiene la amplitud del término griego.
- source_word: εὐφροσύνῃ
  english_pob_choice: merriment
  chosen_spanish: el regocijo
  alternatives_spanish:
  - la alegría
  - la festividad
  - el júbilo
  - la algazara
  lexicon: 'εὐφροσύνη (LSJ: alegría festiva y expresiva, jolgorio, buen ánimo exuberante; cf. εὔφρων, «de buen ánimo»)'
  rationale: εὐφροσύνη denota una alegría activa y expresiva, no simplemente un estado interior. «Regocijo» captura esa dimensión festiva y exuberante mejor que la simple «alegría». El inglés «merriment» transmitía lo mismo; «regocijo» es su par más cercano en español moderno.
- source_word: μέθη
  english_pob_choice: drunkenness
  chosen_spanish: la embriaguez
  alternatives_spanish:
  - la borrachera
  - la ebriedad
  - el alcoholismo
  lexicon: 'μέθη (LSJ: estado de embriaguez, intoxicación por vino)'
  rationale: «Embriaguez» es el término más preciso y de registro apropiado para un texto de enseñanza moral; «borrachera» es coloquial, «ebriedad» es más técnico-legal. «Embriaguez» mantiene el equilibrio entre claridad y dignidad.
- source_word: γέλωτι
  english_pob_choice: laughter
  chosen_spanish: la risa
  alternatives_spanish:
  - el reír
  - la carcajada
  - el regocijo
  lexicon: 'γέλως (LSJ: risa, el acto de reír; dativo singular γέλωτι)'
  rationale: «La risa» es la traducción directa y natural de γέλως. No hay ambigüedad en este término; se mantiene sin ornamento para conservar la simetría de los cuatro pares en el texto.
- source_word: πένθος
  english_pob_choice: grief
  chosen_spanish: el duelo
  alternatives_spanish:
  - el luto
  - el dolor
  - la aflicción
  - el lamento
  lexicon: 'πένθος (LSJ: duelo, lamento, pena intensa; frecuentemente asociado a la muerte y al luto expresivo)'
  rationale: πένθος denota pena profunda con su expresión externa, frecuentemente luto. «El duelo» captura ambas dimensiones —la emoción interna y su manifestación— mejor que «el dolor» (solo interno) o «el luto» (solo externo). El inglés «grief» es algo más interior; «duelo» amplía levemente hacia la expresión, pero se ajusta bien al uso griego del término.
- source_word: γάμῳ
  english_pob_choice: marriage
  chosen_spanish: el matrimonio
  alternatives_spanish:
  - las bodas
  - la boda
  - la unión conyugal
  lexicon: 'γάμος (LSJ: boda, matrimonio, la institución conyugal; dativo singular γάμῳ)'
  rationale: γάμος abarca tanto la ceremonia nupcial como el estado matrimonial. «Matrimonio» es el término más amplio y abarcador en español, fiel al alcance semántico del original. «Bodas» se limitaría a la ceremonia.
- source_word: ἀσωτία
  english_pob_choice: debauchery
  chosen_spanish: el libertinaje
  alternatives_spanish:
  - la disipación
  - la disolución
  - la licencia
  - la vida disoluta
  lexicon: 'ἀσωτία (LSJ: vida disoluta, prodigalidad moral; de ἄσωτος, «el que no puede ser salvado», el disoluto; cf. Ef 5:18, Tit 1:6)'
  rationale: ἀσωτία designa conducta sin freno moral, vida licenciosa y derrochadora de sí mismo. «Libertinaje» captura la dimensión de conducta desenfrenada y moralmente irresponsable. «Disipación» enfatiza el derroche; «disolución» puede confundirse con un proceso físico en español moderno. «Libertinaje» es el equivalente más claro y de uso eclesiástico frecuente.
theological_decisions:
- issue: 'κτίσει vs. κτήσει: variante textual con implicaciones morales y teológicas'
  english_pob_reading: in creation, greed
  chosen_spanish_reading: en la creación, la codicia
  alternative_spanish_readings:
  - en la adquisición de bienes, la codicia
  - en la acumulación de riqueza, la codicia
  rationale: 'La edición Charles 1908 del texto griego del Testamento de Aser lee κτίσει (creación), pero algunos manuscritos tienen κτήσει (adquisición, posesión, riqueza). La traducción inglesa anterior al POB usó «wealth-getting», reflejando κτήσει; la revisión del POB adoptó «creation» para honrar el texto griego base. Teológicamente, la lectura κτίσει —en la creación, la codicia— tiene mayor profundidad: el vicio no se esconde solo en el acto de acumular riqueza, sino dentro de la creación misma como orden dado. Esto encaja perfectamente con la estructura del pasaje, donde cada bien genuino (creación, regocijo, risa, matrimonio) contiene un mal oculto. La lectura κτήσει produciría una semi-tautología (en la adquisición de bienes, la codicia), mientras que κτίσει produce paradoja teológica. Se adopta la lectura del texto base con nota.'
  doctrine_reference: Teología de la creación; dualismo moral en la literatura del judaísmo del Segundo Templo (cf. la doctrina de los dos caminos, dos yetzarim)
- issue: 'Estructura binaria del pasaje: el bien que oculta el mal'
  english_pob_reading: how there are two in all things, one opposite the other, and one is hidden under the other
  chosen_spanish_reading: cómo hay dos en todas las cosas, uno frente al otro, y uno está oculto bajo el otro
  alternative_spanish_readings:
  - cómo coexisten dos en todas las cosas
  - que en todo hay una dualidad
  rationale: 'El Testamento de Aser desarrolla una doctrina característica de la dualidad moral: en cada realidad aparentemente buena se oculta un vicio correspondiente. Esta enseñanza es propia de la literatura de los Testamentos y se vincula al concepto de las dos naturalezas o dos inclinaciones (יֵצֶר). La traducción española respeta la estructura sintáctica del original —la proposición principal sobre la dualidad, seguida de la enumeración de cuatro pares— sin aplanar la tensión entre el bien visible y el mal oculto.'
  doctrine_reference: Doctrina de los dos caminos (δύο ὁδοί); teología moral del Segundo Templo; cf. Testamento de Aser 1:3–5
translation_notes:
  revision_awareness: 'La revisión del POB inglés (2026-04-23, gpt-5.4) hizo dos cambios clave respecto a la versión anterior: (1) «everything» → «all things», para reflejar el plural distributivo de ἐν πᾶσιν; (2) «wealth-getting» → «creation», corrigiendo la lectura de κτήσει a κτίσει conforme al texto griego base de Charles 1908. El borrador español adopta ambas correcciones: «en todas las cosas» y «en la creación». La variante κτήσει que motivó la traducción original «wealth-getting» se documenta en la nota [b] para preservar la transparencia del razonamiento lexical-textual, conforme al ethos del POB de razonamiento auditable. El estado de cross-check (needs_review, acuerdo 0.66) probablemente refleja la tensión sobre κτίσει/κτήσει; este borrador resuelve la cuestión a favor del texto base con documentación explícita.'
  spanish_consistency_notes:
  - No hay referencias a Yahvé, Jesús/Mesías, πνεῦμα, δοῦλος, σάρξ ni δικαιοσύνη en este pasaje; los valores terminológicos predeterminados del proyecto no se aplican aquí.
  - «Codicia» se emplea para πλεονεξία siguiendo el estándar del proyecto para términos de ambición/avaricia, coherente con contextos éticos neotestamentarios donde el mismo término aparece (Col 3:5, Ef 5:3).
  - «El libertinaje» para ἀσωτία es consistente con la tradición exegética en español (cf. Lc 15:13 en muchas versiones modernas) y evita «disipación» o «vida desenfrenada» que resultan más prolijos.
  - La puntuación española usa dos puntos (:) antes de la enumeración de pares, siguiendo el patrón del inglés POB y la estructura retórica del original griego, que introduce los ejemplos con punto y coma (·) tras la proposición principal.
  - Este versículo pertenece a los Testamentos de los Doce Patriarcas, texto deuterocanónico ampliado; no se aplican convenciones de libro canónico. La forma de dirección «hijos» sin artículo determinado («los hijos») sigue el vocativo griego.
