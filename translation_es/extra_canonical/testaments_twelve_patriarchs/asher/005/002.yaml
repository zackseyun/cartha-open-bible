reference: Testament of Asher 5:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: Τὴν⁷ ζωὴν ὁ θάνατος διαδέχεται, τὴν δόξαν ἡ ἀτιμία, τὴν ἡμέραν ἡ νύξ⁸, τὸ φῶς τὸ σκότος· τὰ δὲ πάντα⁹ ὑπὸ ἡμέραν εἰσίν¹⁰, ὑπὸ ζωὴν¹¹ τὰ δίκαια, ⌜ὑπὸ θανάτου τὰ ἄδικα⌝¹². διὸ καὶ¹³ τὸν θάνατον ἡ αἰώνιος ζωὴ ἀναμένει¹⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/005/002.yaml
  text: 'Death follows life, dishonor follows glory, night follows day, darkness follows light. But all things are under day: the righteous under life, and the unrighteous under death. Therefore eternal life also awaits death.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:57Z'
    unchanged: false
    changes_summary: Replaced 'Yet' with 'But' for a more direct contrast; removed the article in 'under day' to reflect the Greek more closely; changed 'righteous things'/'unrighteous things' to 'the righteous'/'the unrighteous' for more natural English and better fit with the Greek substantival adjectives.
translation:
  language: es
  text: 'La muerte sucede a la vida, la deshonra a la gloria, la noche al día, las tinieblas[a] a la luz. Pero todas las cosas están bajo el día[b]: los justos[c] bajo la vida, y los injustos bajo la muerte[d]. Por eso, también la vida eterna aguarda a la muerte.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego σκότος: ''oscuridad'' o ''tinieblas''. Se elige ''tinieblas'' por la resonancia moral-cósmica que esta palabra tiene en la literatura judía del Segundo Templo y en la tradición bíblica en español, donde σκότος suele designar no solo ausencia de luz sino un ámbito de muerte y mal.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego ὑπὸ ἡμέραν: el griego carece de artículo (''bajo día'', no ''bajo el día''), señalando un uso categórico o conceptual: ''el día'' como dominio cósmico que todo lo abarca. El español requiere el artículo por razones gramaticales; la fuerza conceptual anarticular se conserva en esta nota. La revisión del texto inglés POB también refleja esta característica griega.'
    reason: source_note
  - marker: c
    text: 'Griego τὰ δίκαια / τὰ ἄδικα: adjetivos sustantivados en neutro plural. Podrían traducirse ''las cosas justas / las cosas injustas'', pero el contexto (bajo la vida / bajo la muerte como destinos de personas) favorece la lectura personal: ''los justos / los injustos''. Alternativa: ''lo justo / lo injusto'' (abstracto categórico).'
    reason: lexical_alternative
  - marker: d
    text: 'El texto griego marca este miembro con corchetes angulares ⌜ὑπὸ θανάτου τὰ ἄδικα⌝ en la edición Charles (1908), indicando una lectura textualmente incierta o secundaria. Nótese además el cambio de caso: la cláusula anterior usa acusativo (ὑπὸ ζωήν, ''bajo la vida'' — relación de posición), mientras esta usa genitivo (ὑπὸ θανάτου, ''bajo la muerte'' — relación de dominio o agencia). El genitivo podría indicar ''bajo el poder de la muerte'', un matiz que el español no puede reproducir sin paráfrasis.'
    reason: textual_variant
lexical_decisions:
- source_word: διαδέχεται
  english_pob_choice: follows
  chosen_spanish: sucede a
  alternatives_spanish:
  - sigue a
  - viene tras
  - reemplaza a
  lexicon: 'BDAG s.v. διαδέχομαι: to receive in succession, succeed, follow after'
  rationale: διαδέχομαι denotes orderly succession — one thing taking the place of another. Spanish 'suceder a' (to succeed, to come after in sequence) captures this better than the neutral 'seguir a' (to follow), which lacks the substitution nuance. The parallel anaphoric structure of the four pairs is preserved by repeating the implied 'sucede a' across all four clauses.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: 'BDAG s.v. δόξα: honor, renown, glory'
  rationale: In this antithetical pair with ἀτιμία (dishonor), δόξα carries the sense of social honor and renown. 'Gloria' is the standard, and most natural, Spanish equivalent in a second-temple Jewish text of this register. 'Honor' would also work but lacks the elevation implied by δόξα.
- source_word: ἀτιμία
  english_pob_choice: dishonor
  chosen_spanish: deshonra
  alternatives_spanish:
  - ignominia
  - oprobio
  - vergüenza
  lexicon: 'BDAG s.v. ἀτιμία: dishonor, disgrace, ignominy'
  rationale: '''Deshonra'' is modern, dignified, and directly opposed to ''gloria,'' mirroring the Greek δόξα/ἀτιμία polarity. ''Ignominia'' is more archaic; ''oprobio'' is more public-shame specific; ''deshonra'' best fits broad church-readable neutral Latin American Spanish.'
- source_word: σκότος
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - sombras
  lexicon: 'BDAG s.v. σκότος: darkness (literal and metaphorical)'
  rationale: '''Tinieblas'' is chosen over ''oscuridad'' because this passage operates within a moral-cosmological dualism (light vs. darkness as categories of righteousness and death) characteristic of Second Temple Jewish literature. ''Tinieblas'' carries the fuller biblical resonance (cf. LXX, NT usage) that ''oscuridad'' lacks in Spanish literary tradition. The distinction between φῶς/σκότος as cosmic opposites warrants the more freighted term.'
- source_word: τὰ δίκαια / τὰ ἄδικα
  english_pob_choice: the righteous / the unrighteous
  chosen_spanish: los justos / los injustos
  alternatives_spanish:
  - las cosas justas / las cosas injustas
  - lo justo / lo injusto
  - los rectos / los inicuos
  lexicon: 'BDAG s.v. δίκαιος: used substantivally of persons who are upright, righteous; ἄδικος: unrighteous, unjust'
  rationale: Both τὰ δίκαια and τὰ ἄδικα are neuter plural substantival adjectives. They could denote abstract categories ('righteous things/deeds') or persons. The English POB revision explicitly moved from 'righteous things' to 'the righteous' based on the Greek substantival adjective argument. In Spanish, 'los justos / los injustos' (masculine plural persons) follows this judgment and produces more natural Spanish. The neuter Greek form does not map cleanly onto Spanish gender, and the person-referential reading makes the cosmological claim (placed under life vs. under death) more coherent.
- source_word: αἰώνιος ζωή
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida del siglo venidero
  - vida perdurable
  lexicon: 'BDAG s.v. αἰώνιος: eternal, pertaining to an age; ζωή: life'
  rationale: '''Vida eterna'' is the natural, established Spanish equivalent and avoids the archaism of ''vida perdurable.'' The phrase functions eschatologically here — the life that awaits on the other side of death — and ''eterna'' preserves that forward-looking, unlimited temporal force.'
- source_word: ἀναμένει
  english_pob_choice: awaits
  chosen_spanish: aguarda
  alternatives_spanish:
  - espera
  - está a la espera de
  lexicon: 'BDAG s.v. ἀναμένω: to wait for, await, expect'
  rationale: '''Aguarda'' is slightly more elevated in register than ''espera'' and suits the literary dignity of the concluding eschatological claim. Both are correct; ''aguarda'' mirrors the deliberate, patient waiting implied by ἀναμένω.'
theological_decisions:
- issue: Cosmological succession structure and eschatological reversal
  english_pob_reading: Death follows life… Therefore eternal life also awaits death.
  chosen_spanish_reading: La muerte sucede a la vida… Por eso, también la vida eterna aguarda a la muerte.
  alternative_spanish_readings:
  - A la vida sigue la muerte… Por tanto, también la muerte será sucedida por la vida eterna.
  - La muerte reemplaza a la vida… Así pues, también la muerte es aguardada por la vida eterna.
  rationale: 'The verse establishes a pattern of natural opposites succeeding one another (life→death, glory→dishonor, day→night, light→darkness) and then pivots: all things are ultimately ''under day,'' with the righteous under life and the unrighteous under death. The final clause inverts the opening: just as death follows life, eternal life awaits death. The Spanish preserves this rhetorical inversion without flattening it. The word order ''la vida eterna aguarda a la muerte'' places the subject (eternal life) in a position of active expectation over death, matching the Greek word order (τὸν θάνατον ἡ αἰώνιος ζωὴ ἀναμένει — accusative object first for emphasis).'
  doctrine_reference: Second Temple Jewish cosmological dualism; cf. Testament of Asher 1:3–5 (two-ways doctrine); 1QS III–IV (Community Rule light/darkness dualism)
- issue: 'Anarthrous ὑπὸ ἡμέραν: all things ''under day'' as a cosmological claim'
  english_pob_reading: all things are under day
  chosen_spanish_reading: todas las cosas están bajo el día
  alternative_spanish_readings:
  - todo está bajo el día
  - todas las cosas son del día
  rationale: The English POB revision deliberately removed the article to reflect the anarthrous Greek ὑπὸ ἡμέραν — signaling a categorical/conceptual 'day' rather than a specific day. Spanish grammar does not naturally permit the article-less 'bajo día,' so 'bajo el día' is the required Spanish form. The conceptual force (day as the overarching cosmological category encompassing all things) is preserved by footnote [b], which explains that the Greek lacks the article and why Spanish must add one. The theological claim is that even the existence of night, death, and darkness falls within the ultimately light-governed order of reality.
  doctrine_reference: Testament of Asher 1:3 (the two ways, but ultimately one lord over both)
translation_notes:
  revision_awareness: 'The English POB underwent one revision pass (azure-gpt-5.4, 2026-04-23): (1) ''Yet'' → ''But'' for a more direct contrastive conjunction, reflected in Spanish as ''Pero'' rather than ''Sin embargo'' or ''No obstante''; (2) ''under the day'' → ''under day'' to reflect the anarthrous Greek ὑπὸ ἡμέραν — Spanish requires the article by grammar, addressed in footnote [b]; (3) ''righteous things/unrighteous things'' → ''the righteous/the unrighteous'' to honor the Greek substantival adjectives — Spanish follows this judgment with ''los justos/los injustos'', explained in the τὰ δίκαια/τὰ ἄδικα lexical decision and footnote [c].'
  spanish_consistency_notes:
  - No divine name (יהוה/κύριος) appears in this verse; the YHWH → Yahvé default does not apply here.
  - No Χριστός/Mesías language appears; Christological defaults are not triggered.
  - σκότος rendered as 'tinieblas' throughout this verse, consistent with a policy of reserving 'tinieblas' for morally/cosmologically charged darkness contexts; 'oscuridad' remains available for purely physical or neutral darkness contexts elsewhere in T12P.
  - The succession verb διαδέχεται rendered as 'suceder a' — if this verb recurs in other T12P passages, consistency should be verified across the corpus.
  - τὰ δίκαια/τὰ ἄδικα rendered as persons ('los justos/los injustos') following English POB revision; if these neuter forms appear elsewhere in T12P in a clearly non-personal context, that rendering should be documented separately.
