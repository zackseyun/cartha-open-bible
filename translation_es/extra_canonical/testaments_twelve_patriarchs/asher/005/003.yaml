id: T12P.ASH.5.3
reference: Testament of Asher 5:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: Καὶ οὐκ¹⁵ ἔστιν εἰπεῖν τὴν ἀλήθειαν ψεῦδος, οὐδὲ *τὸ δίκαιον ἄδικον¹⁶, ὅτι πᾶσα ἀλήθεια ὑπὸ *τοῦ φωτός¹⁷ ἐστιν, ⌜καθὼς τὰ πάντα¹⁸ ὑπὸ *τοῦ Θεοῦ¹⁹⌝.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/005/003.yaml
  text: And one cannot call truth falsehood, nor what is righteous unrighteous, because all truth is under the light, just as all things are under God.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:57Z'
    unchanged: false
    changes_summary: Replaced 'say that truth is falsehood' with 'call truth falsehood' for a more direct and natural rendering of εἰπεῖν; removed the repeated 'that' before the second clause for smoother formal English.
translation:
  language: es
  text: Y no se puede llamar a la verdad mentira, ni a lo justo injusto, porque toda verdad está bajo la luz, así como todas las cosas están bajo Dios.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula «así como todas las cosas están bajo Dios» aparece entre corchetes angulares ⌜...⌝ en la edición crítica de Charles (1908), lo que indica incertidumbre textual o posible interpolación en algún testigo manuscrito griego. Se conserva en el texto principal por coherencia con el POB en inglés, a la espera de revisión editorial basada en la tradición manuscrita completa.
    reason: textual_variant
lexical_decisions:
- source_word: οὐκ ἔστιν εἰπεῖν
  english_pob_choice: one cannot call
  chosen_spanish: no se puede llamar
  alternatives_spanish:
  - no es posible decir
  - nadie puede llamar
  - no cabe decir
  lexicon: 'LSJ εἰπεῖν (aor. inf. of λέγω): ''to say, call, name, declare'''
  rationale: La construcción griega οὐκ ἔστιν + infinitivo es impersonal ('no es posible...'). El doble acusativo τὴν ἀλήθειαν ψεῦδος ('truth [as] falsehood') exige un verbo como 'llamar' en español, no 'decir que', de modo que la cláusula sea directa y el objeto y su complemento predicativo aparezcan yuxtapuestos. La revisión del POB en inglés (de 'say that truth is falsehood' a 'call truth falsehood') confirma esta lectura. El impersonal 'no se puede' es el equivalente más natural en español neutro.
- source_word: τὴν ἀλήθειαν ψεῦδος
  english_pob_choice: truth falsehood
  chosen_spanish: a la verdad mentira
  alternatives_spanish:
  - la verdad falsedad
  - la verdad como mentira
  lexicon: 'LSJ ἀλήθεια: ''truth, reality''; LSJ ψεῦδος: ''falsehood, lie'''
  rationale: El acusativo griego τὴν ἀλήθειαν es objeto directo definido; en español el objeto directo definido de persona o cosa personificada lleva 'a', de modo que 'a la verdad' es la forma estándar. El complemento predicativo ψεῦδος se vierte 'mentira', término más concreto y frecuente que 'falsedad', que capta mejor el sentido de ψεῦδος como lo opuesto activo a la verdad.
- source_word: τὸ δίκαιον
  english_pob_choice: what is righteous
  chosen_spanish: lo justo
  alternatives_spanish:
  - lo recto
  - lo que es justo
  - lo que es recto
  lexicon: 'LSJ δίκαιος: ''just, righteous''; artículo neutro sustantivado τό + δίκαιον = ''the righteous thing / what is righteous'''
  rationale: El adjetivo neutro sustantivado τὸ δίκαιον tiene correspondencia directa en la construcción española 'lo + adjetivo' ('lo justo'), que funciona como sustantivo abstracto del mismo modo que el griego. Esta forma es más elegante y fiel al griego que la relativa completa 'lo que es justo', y se alinea con el uso del POB inglés ('what is righteous').
- source_word: ἄδικον
  english_pob_choice: unrighteous
  chosen_spanish: injusto
  alternatives_spanish:
  - injusto
  - lo injusto
  - contrario a la justicia
  lexicon: 'LSJ ἄδικος: ''unjust, unrighteous, wrongful'''
  rationale: 'En posición de complemento predicativo (paralelo a ψεῦδος en el primer miembro), el adjetivo ''injusto'' cumple la misma función elíptica: ''[llamar] a lo justo injusto''. El POB inglés usa ''unrighteous''; ''injusto'' cubre ambas facetas (jurídica y moral) que el griego ἄδικος incluye, y es la opción más clara en español neutro.'
- source_word: πᾶσα ἀλήθεια
  english_pob_choice: all truth
  chosen_spanish: toda verdad
  alternatives_spanish:
  - toda la verdad
  lexicon: 'πᾶς + sustantivo sin artículo: uso distributivo/cualitativo (''every truth / all truth'')'
  rationale: La ausencia de artículo con πᾶσα ἀλήθεια apunta a un uso cualitativo-distributivo ('toda [realidad de la] verdad'). 'Toda verdad' sin artículo refleja exactamente esta construcción en español, mientras que 'toda la verdad' restringiría innecesariamente el alcance al conjunto definido.
- source_word: ὑπὸ τοῦ φωτός / ὑπὸ τοῦ Θεοῦ
  english_pob_choice: under the light / under God
  chosen_spanish: bajo la luz / bajo Dios
  alternatives_spanish:
  - debajo de la luz / debajo de Dios
  - sujeta a la luz / sujeta a Dios
  lexicon: 'LSJ ὑπό + genitivo: ''under, subject to, governed by'''
  rationale: La preposición ὑπό con genitivo expresa subordinación o gobierno. 'Bajo' en español captura tanto el sentido espacial como el de sujeción/dependencia, preservando la imagen cosmológica paralela del versículo. 'Debajo de' sería demasiado físico; 'sujeto a' sería interpretativo. 'Bajo Dios' es natural sin artículo en español, coherente con el uso convencional del nombre divino.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - la totalidad
  lexicon: 'τὰ πάντα: neuter plural articulado, fórmula cosmológica: ''all things, the totality'''
  rationale: '''Todas las cosas'' reproduce con fidelidad la fórmula griega τὰ πάντα y tiene resonancia bíblica establecida en español (cf. Colosenses 1:16). Evita la ambigüedad del escueto ''todo'', que en español puede leerse como adverbio.'
- source_word: καθώς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - del mismo modo que
  - tal como
  lexicon: 'LSJ καθώς: ''just as, even as, according as'''
  rationale: '''Así como'' es la equivalencia estándar y más natural de καθώς en español moderno; introduce la comparación con claridad y fluidez.'
theological_decisions:
- issue: τοῦ Θεοῦ — artículo definido griego con el nombre divino
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Dios
  rationale: El griego usa el artículo definido τοῦ Θεοῦ ('the God'), pero en español el nombre 'Dios' no lleva artículo en contextos predicativos o prepositivos de alcance universal ('bajo Dios'). Añadir 'el Dios' sonaría arcaico o sectario en español neutro. La traducción sigue la convención española que refleja el uso monoteísta donde 'Dios' es nombre propio y no necesita artículo.
  doctrine_reference: 'Tratamiento estándar de θεός en textos pseudoepigráficos judíos: ''Dios'' como nombre propio en español neutro.'
- issue: Cláusula final ⌜καθὼς τὰ πάντα ὑπὸ τοῦ Θεοῦ⌝ — corchetes angulares en Charles 1908
  english_pob_reading: just as all things are under God
  chosen_spanish_reading: así como todas las cosas están bajo Dios
  alternative_spanish_readings:
  - '[así como todas las cosas están bajo Dios]'
  rationale: La cláusula aparece entre corchetes angulares ⌜...⌝ en la edición de Charles (1908), señal de incertidumbre textual o posible glosa en algún testigo. El POB inglés la traduce sin advertencia en el texto principal. Se mantiene en el texto español para no divergir del POB inglés sin autorización del equipo editorial, pero se documenta la cuestión en nota al pie.
  doctrine_reference: Aparato crítico Charles 1908, Testamentos de los Doce Patriarcas, Asher 5:3 (nota 18-19).
translation_notes:
  revision_awareness: 'La revisión del POB inglés (2026-04-23, azure-gpt-5.4) clarificó la construcción de doble acusativo de εἰπεῖν: de «say that truth is falsehood» (decir que la verdad es mentira) a «call truth falsehood» (llamar mentira a la verdad). El español «llamar a la verdad mentira» incorpora directamente esta lectura revisada, que capta el doble acusativo griego mejor que una construcción con «que».'
  spanish_consistency_notes:
  - '''Dios'' se usa sin artículo en posición preposicional (''bajo Dios''), coherente con el uso estándar en español neutro para textos bíblicos y deuterocanónicos.'
  - '''Verdad'' y ''mentira'' se usan como sustantivos abstractos sin artículo en el primer miembro (''llamar a la verdad mentira''), reflejando el uso cualitativo del griego.'
  - '''Lo justo'' como sustantivo abstracto neutro es coherente con el tratamiento de adjetivos sustantivados griegos en el corpus POB.'
  - No aparece יהוה ni κύριος en este versículo; el único término divino es Θεός → 'Dios'.
