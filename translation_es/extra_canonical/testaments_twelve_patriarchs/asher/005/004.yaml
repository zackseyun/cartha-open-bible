id: T12P.ASH.5.4
reference: Testament of Asher 5:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: Ταῦτα οὖν²⁰ πάντα ⌜ἐγὼ⌝²¹ ἐδοκίμασα ἐν τῇ ζωῇ μου, καὶ οὐκ ἐπλανήθην ἀπὸ τῆς ἀληθείας Κυρίου, καὶ²² τὰς ἐντολὰς τοῦ ὑψίστου²³ ἐξεζήτησα²⁴ κατὰ πᾶσαν ἰσχύν μου πορευόμενος²⁵.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/005/004.yaml
  text: So then I tested all these things in my life, and I did not go astray from the truth of the Lord, and I sought the commandments of the Most High with all my strength as I walked.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:58Z'
    unchanged: false
    changes_summary: Replaced 'but sought out' with 'and I sought' to match the Greek conjunction and avoid unnecessary expansion; adjusted the final phrase to 'with all my strength as I walked' so κατὰ πᾶσαν ἰσχύν μου modifies the seeking more naturally while retaining πορευόμενος.
translation:
  language: es
  text: Así pues, todas estas cosas las puse a prueba en mi vida, y no me extravié de la verdad de Yahvé[a], y busqué los mandamientos del Altísimo con toda mi fuerza al caminar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gr. Κυρίου. En los escritos pseudoepígrafos judíos, Κύριος sustituye habitualmente al nombre divino YHWH. Siguiendo la convención del proyecto POB, se traduce «Yahvé» en lugar de enmascarar el nombre como «el Señor».
    reason: theological_note
  - marker: b
    text: Gr. πορευόμενος, participio presente de πορεύομαι («caminar»). La expresión puede leerse tanto como «mientras caminaba» (circunstancia temporal) como «en mi andar» (conducta y modo de vida). Se conserva «al caminar» para mantener ambos sentidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδοκίμασα (δοκιμάζω)
  english_pob_choice: tested
  chosen_spanish: puse a prueba
  alternatives_spanish:
  - probé
  - comprobé
  - examiné
  lexicon: 'BDAG δοκιμάζω: to make a critical examination of something to determine genuineness; prove by testing'
  rationale: δοκιμάζω carries deliberate, active testing rather than mere observation or experience. 'Puse a prueba' renders the intentional, effortful character of the examination ('I put to the test'). The simpler 'probé' can mean mere tasting/experiencing in Spanish without the sense of rigorous assessment; 'comprobé' implies confirming a prior assumption, which is absent from the Greek. 'Puse a prueba' best preserves the evaluative force.
- source_word: ἐπλανήθην (πλανάομαι)
  english_pob_choice: go astray
  chosen_spanish: me extravié
  alternatives_spanish:
  - me aparté
  - me desvié
  - erré
  lexicon: 'BDAG πλανάω (passive/middle): to go astray, wander, be led into error'
  rationale: The passive/middle aorist ἐπλανήθην conveys both the sense of wandering off a path and being deceived or led astray. 'Me extravié' captures the straying/wandering nuance naturally in Spanish and aligns with 'go astray' in the English POB. 'Me aparté' is more neutral (mere separation) and loses the connotation of lostness; 'me desvié' works but is slightly more mechanical.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: 'BDAG κύριος 2: the Lord, as divine name/title'
  rationale: Per POB project convention, Greek κύριος functioning as a divine-name substitute is rendered 'Yahvé' rather than masked as 'el Señor.' The Testaments of the Twelve Patriarchs is a Jewish pseudepigraphon in which κύριος consistently stands in for the divine name YHWH. No Hebrew base text exists for this edition, but the Jewish character of the document and the possessive genitive ('truth of the Lord' as a covenantal expression) make the divine-name substitution evident. See theological decision below.
- source_word: τοῦ ὑψίστου
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Supremo
  - el Excelso
  lexicon: 'BDAG ὕψιστος: highest, most high, as a divine epithet'
  rationale: '''El Altísimo'' is the established Spanish equivalent for ὕψιστος as a divine epithet and carries the same covenantal dignity across Jewish and Christian tradition. ''El Supremo'' leans secular; ''el Excelso'' is rare in modern Spanish usage. ''El Altísimo'' is widely intelligible and maintains the titular force without archaism.'
- source_word: ἐξεζήτησα (ἐκζητέω)
  english_pob_choice: sought
  chosen_spanish: busqué
  alternatives_spanish:
  - procuré
  - busqué con diligencia
  - indagué
  lexicon: 'BDAG ἐκζητέω: to seek out, search for carefully/diligently (compound ἐκ + ζητέω)'
  rationale: The compound ἐκζητέω implies diligent, earnest seeking beyond simple ζητέω. The English POB chose the simpler 'sought,' not expanding to 'sought out carefully.' Spanish 'busqué' is the natural equivalent at the same register; 'procuré' suggests striving/endeavouring (slightly too volitional); 'busqué con diligencia' would honor the compound force but overexpands relative to the English POB decision. 'Busqué' is retained in parallel with the English choice, with the compound force noted here.
- source_word: ἰσχύν (ἰσχύς)
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - vigor
  - poder
  - empeño
  lexicon: 'BDAG ἰσχύς: strength, power, might'
  rationale: '''Fuerza'' is the direct and natural Spanish equivalent for ἰσχύς in the sense of physical and moral capacity. ''Poder'' shifts toward authority/dominion; ''vigor'' is acceptable but slightly more physical; ''empeño'' (effort/zeal) captures the volitional dimension but loses the inherent capacity sense. ''Con toda mi fuerza'' mirrors the Greek κατὰ πᾶσαν ἰσχύν μου closely and is idiomatic in Spanish.'
- source_word: πορευόμενος (πορεύομαι)
  english_pob_choice: as I walked
  chosen_spanish: al caminar
  alternatives_spanish:
  - mientras caminaba
  - en mi andar
  - caminando
  lexicon: 'BDAG πορεύομαι: to go, travel, walk; in ethical contexts, to conduct oneself, live'
  rationale: πορευόμενος is a present participle denoting the accompanying manner or circumstance of the seeking. The English POB (post-revision) rendered it 'as I walked,' correctly attaching κατὰ πᾶσαν ἰσχύν to the main verb of seeking. Spanish 'al caminar' is a gerundive construction that preserves the temporal-circumstantial sense ('while walking') while also allowing the ethical-lifestyle connotation ('in my walk/conduct'). 'Mientras caminaba' is more explicit temporally but loses the double nuance; 'caminando' is also valid but slightly more detached from the main clause. 'Al caminar' is concise and idiomatic.
theological_decisions:
- issue: Κύριος as divine name in a Jewish pseudepigraphon
  english_pob_reading: the truth of the Lord
  chosen_spanish_reading: la verdad de Yahvé
  alternative_spanish_readings:
  - la verdad del Señor
  rationale: The Testament of Asher belongs to the Testaments of the Twelve Patriarchs, a Jewish pseudepigraphon in which Κύριος consistently functions as a substitute for the divine name YHWH, following Jewish scribal and liturgical convention in Greek. No Hebrew Vorlage is extant for this passage, but the expression 'truth of the Lord' parallels covenantal language from Psalm 25:10, 86:11, etc., where Κύριος/YHWH are used interchangeably. POB project convention calls for 'Yahvé' when Κύριος alludes to the divine name, avoiding the masking convention of 'el Señor' (= 'LORD' in capitalization-based traditions). Transparency is preferred; the footnote [a] alerts readers to the Greek form and the naming decision.
  doctrine_reference: 'POB project default: κύριος alluding to YHWH → ''Yahvé'' with explanatory note; transparency principle against name-masking conventions'
translation_notes:
  revision_awareness: 'La revisión inglesa (2026-04-23, gpt-5.4) corrigió dos puntos: (1) sustituyó la conjunción adversativa «but» por la copulativa «and» para reflejar el καί griego, evitando un contraste que el texto no establece; (2) reordenó el participio final para que κατὰ πᾶσαν ἰσχύν μου modifique el verbo principal «busqué» y no el participio «al caminar». El borrador español sigue la lectura revisada: «y busqué los mandamientos del Altísimo con toda mi fuerza al caminar» — la búsqueda es la acción principal calificada por «con toda mi fuerza», y «al caminar» es la circunstancia que la acompaña.'
  spanish_consistency_notes:
  - Κύριος → «Yahvé» conforme a la convención del proyecto POB para el nombre divino; se incluye nota al pie [a].
  - ὕψιστος → «el Altísimo», terminología bíblica estándar en español; coherente con otros pasajes del proyecto que usan este epíteto.
  - La estructura coordinada «y… y…» refleja el doble καί del griego original y evita convertir la segunda cláusula en contrastiva.
  - πορευόμενος → «al caminar» preserva la ambigüedad temporal/ética del participio; nota al pie [b] registra la alternativa «en mi andar».
  - δοκιμάζω → «puse a prueba» (no «probé» ni «comprobé») para mantener la fuerza de la prueba deliberada frente a la mera experiencia.
