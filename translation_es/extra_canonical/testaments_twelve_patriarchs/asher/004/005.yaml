  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: '*Οἱ γὰρ τοιοῦτοι³⁴ δορκάσι³⁵ καὶ ἐλάφοις³⁶ *εἰσὶν ὅμοιοι³⁷, ὅτι ἐν ἤθει ἀγρίων³⁸ δοκοῦσιν ἀκάθαρτοι εἶναι, *τὸ δὲ πᾶν³⁹ καθαροί εἰσιν³⁹, ὅτι ἐν ζήλῳ Κυρίου⁴⁰ ⌈πορεύονται⌉, ἀπεχόμενοι *ὧν καὶ ὁ Θεὸς διὰ τῶν ἐντολῶν μισῶν ἀπαγορεύει⁴¹, *ἀπείργων τὸ κακὸν τοῦ ἀγαθοῦ⁴².'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/004/005.yaml
  text: 'For such men are like gazelles and deer: though in the manner of wild animals they seem to be unclean, yet in every way they are clean, because they walk in zeal for the Lord, abstaining from what God also hates and forbids through the commandments, keeping evil away from good.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:55:00Z'
    unchanged: false
    changes_summary: Adjusted 'bearing' to 'manner' for ἤθει, added 'though...yet' for smoother contrast, changed 'keeping away from those things which' to 'abstaining from what' for a more direct rendering of ἀπεχόμενοι ὧν, and revised the final clause to 'keeping evil away from good' for a more natural translation of ἀπείργων τὸ κακὸν τοῦ ἀγαθοῦ.
translation:
  language: es
  text: 'Pues tales hombres son semejantes a gacelas y ciervos[a]: aunque en la manera de los animales salvajes parecen ser impuros, en todo son puros, porque caminan con celo por Yahvé[b], absteniéndose de lo que también Dios aborrece y prohíbe mediante los mandamientos, apartando el mal del bien.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La gacela (δορκάς) y el ciervo (ἔλαφος) figuran entre los animales ritualmente puros según la Ley mosaica (Dt 14:5; cf. Lv 11:3-8), aunque son animales salvajes —no domésticos—. El autor explota esta tensión: su aspecto y manera de vida parecen impuros a los ojos de quienes juzgan por apariencias, pero su condición real es de pureza. La analogía moral es característica de la literatura sapiencial judía tardía.'
    reason: cultural_note
  - marker: b
    text: Griego Κυρίου, la forma genitiva de Κύριος, término que en los textos judíos —incluidos los Testamentos de los Doce Patriarcas— representa el nombre divino יהוה (Yahvé). Se traduce 'Yahvé' conforme al criterio del Proyecto POB de no enmascarar el nombre divino. El contexto de 'celo' alude a los modelos de Finees (Nm 25:11) y Elías (1 Re 19:10) en la LXX.
    reason: theological_note
lexical_decisions:
- source_word: δορκάσι / δορκάς
  english_pob_choice: gazelles
  chosen_spanish: gacelas
  alternatives_spanish:
  - cabras montesas
  lexicon: 'LSJ s.v. δορκάς: gazelle (Gazella dorcas); standard Spanish zoological equivalent is ''gacela''.'
  rationale: '''Gacela'' is the direct and universally recognized Spanish equivalent of δορκάς. No alternative rendering better preserves the specificity of the animal referenced.'
- source_word: ἐλάφοις / ἔλαφος
  english_pob_choice: deer
  chosen_spanish: ciervos
  alternatives_spanish:
  - venados
  lexicon: 'LSJ s.v. ἔλαφος: deer, stag. ''Ciervo'' is standard in Latin American and Spanish usage; ''venado'' is regional.'
  rationale: '''Ciervos'' is the most broadly intelligible and neutral Latin American term, avoiding the regionally marked ''venado''. Both animals — gazelles and deer — are clean under Mosaic law (Deut 14:5) yet considered wild rather than domesticated, which is the author''s precise point.'
- source_word: ἤθει / ἦθος
  english_pob_choice: manner (revised from 'bearing')
  chosen_spanish: manera
  alternatives_spanish:
  - comportamiento
  - costumbre
  - porte
  lexicon: 'LSJ s.v. ἦθος: custom, habit, character, manner. The English POB revision adjudicated against ''bearing'' (too physical) in favor of ''manner'' (more inclusive of habit and character).'
  rationale: '''Manera'' (manner) follows the English POB revision rationale and renders the habitual/characteristic sense of ἦθος clearly in Spanish. ''Comportamiento'' (behavior) would lean too behavioral-scientific; ''costumbre'' (custom) is possible but suggests social convention rather than innate character. ''Manera'' preserves the ambiguity between outward appearance and underlying character that the verse exploits rhetorically.'
- source_word: ἀγρίων
  english_pob_choice: wild animals
  chosen_spanish: los animales salvajes
  alternatives_spanish:
  - animales silvestres
  - animales del campo
  lexicon: 'LSJ s.v. ἄγριος: wild, fierce, of the field/forest; used of animals in contrast to domesticated ones.'
  rationale: '''Salvajes'' is the most natural and widely understood term in Latin American Spanish for ἄγριος as applied to animals. ''Silvestres'' (woodland/forest) would narrow the sense unnecessarily.'
- source_word: τὸ δὲ πᾶν
  english_pob_choice: yet in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - sin embargo, en todo
  - pero en todo sentido
  - del todo
  lexicon: 'LSJ s.v. πᾶς: all, every, the whole. τὸ πᾶν = ''in everything / in all respects''.'
  rationale: 'The adversative δέ combined with τὸ πᾶν creates a strong contrast: ''yet in every respect.'' The contrast is handled structurally in the Spanish by the ''aunque…en todo'' construction, which distributes the adversative force across the clause rather than doubling up with a connective like ''sin embargo''. This produces more natural Spanish rhythm.'
- source_word: ζήλῳ
  english_pob_choice: zeal
  chosen_spanish: celo
  alternatives_spanish:
  - fervor
  - ardor
  - entusiasmo
  lexicon: 'LSJ s.v. ζῆλος: zeal, fervor, emulation. In Jewish religious contexts, ''zeal for the Lord'' (ζῆλος Κυρίου) echoes Phinehas (Num 25:11) and Elijah (1 Kgs 19:10,14).'
  rationale: '''Celo'' is the established Spanish theological term for ζῆλος in the sense of passionate devotion to God, well attested in biblical translations (e.g., ''celo por tu casa'' in Ps 69:9). ''Fervor'' or ''ardor'' are acceptable alternatives but lack the specific covenantal resonance that ''celo'' carries in Spanish religious vocabulary.'
- source_word: πορεύονται
  english_pob_choice: walk
  chosen_spanish: caminan
  alternatives_spanish:
  - andan
  - marchan
  - viven
  lexicon: 'LSJ s.v. πορεύομαι: to go, travel, walk; in ethical/moral contexts, to conduct one''s life.'
  rationale: '''Caminan'' preserves the metaphorical ''walk'' of moral conduct familiar in Hebrew Bible usage (הָלַךְ, hālak) and echoed throughout Jewish and early Christian ethical discourse. ''Andan'' is acceptable but slightly more colloquial in some registers.'
- source_word: ἀπεχόμενοι
  english_pob_choice: abstaining (revised from 'keeping away from those things which')
  chosen_spanish: absteniéndose
  alternatives_spanish:
  - apartándose de
  - guardándose de
  - evitando
  lexicon: 'LSJ s.v. ἀπέχομαι: to abstain from, refrain from, keep away from. The English POB revision moved to ''abstaining'' for directness.'
  rationale: '''Absteniéndose'' directly mirrors ἀπεχόμενοι and the English POB ''abstaining''. It is the standard Spanish theological term for voluntary refraining from prohibited things, well attested in ethical and ascetic contexts. ''Guardándose de'' would work but is slightly more defensive in tone.'
- source_word: μισῶν / μισέω
  english_pob_choice: hates
  chosen_spanish: aborrece
  alternatives_spanish:
  - odia
  - detesta
  lexicon: 'LSJ s.v. μισέω: to hate, detest. The participle μισῶν modifies the subject of ἀπαγορεύει.'
  rationale: '''Aborrece'' and ''odia'' are both accurate; ''aborrece'' is slightly more elevated in register and more natural in formal/theological Spanish. Both convey the strong divine rejection that μισέω carries in prophetic and wisdom contexts (cf. LXX Mal 2:16; Ps 5:5).'
- source_word: ἀπαγορεύει
  english_pob_choice: forbids
  chosen_spanish: prohíbe
  alternatives_spanish:
  - veda
  - rechaza
  lexicon: 'LSJ s.v. ἀπαγορεύω: to forbid, prohibit, declare off-limits.'
  rationale: '''Prohíbe'' is the direct and clear Spanish equivalent. ''Veda'' is more archaic and would feel stilted in modern publication-ready Spanish.'
- source_word: ἀπείργων τὸ κακὸν τοῦ ἀγαθοῦ
  english_pob_choice: keeping evil away from good (revised from 'holding back evil from good')
  chosen_spanish: apartando el mal del bien
  alternatives_spanish:
  - manteniendo el mal alejado del bien
  - impidiendo que el mal alcance el bien
  - rechazando el mal en favor del bien
  lexicon: 'LSJ s.v. ἀπείργω: to ward off, keep away, exclude, separate. τὸ κακόν = evil (substantivized neuter); τοῦ ἀγαθοῦ = from the good (genitive of separation).'
  rationale: '''Apartando el mal del bien'' renders ἀπείργων τὸ κακὸν τοῦ ἀγαθοῦ naturally and concisely. The genitive of separation (τοῦ ἀγαθοῦ) is captured by ''del bien''. ''Manteniendo el mal alejado del bien'' is more explicit but heavier. The English POB revision chose ''keeping evil away from good'' over ''holding back evil from good'', and ''apartando'' (separating/setting apart) matches that directional sense well.'
theological_decisions:
- issue: Κυρίου (genitive of Κύριος) — divine name representation
  english_pob_reading: the Lord (in 'zeal for the Lord')
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el SEÑOR
  rationale: The Greek source uses Κύριος, the standard LXX rendering of the divine name יהוה (YHWH). The Testaments of the Twelve Patriarchs is a Jewish pseudepigraphical work whose Greek transmission consistently uses Κύριος as a representation of the divine name, not merely as a generic title. The POB project defaults explicitly favor 'Yahvé' over masking conventions like 'SEÑOR'. Although no Hebrew vorlage for this specific passage is available for direct verification, the covenantal and ethical context ('zeal for the Lord') unmistakably echoes passages where Κύριος represents YHWH (e.g., 1 Kgs 19:10; Num 25:11 LXX). Rendering as 'Yahvé' honors the project's transparency commitment; the footnote [b] documents this decision for reader awareness.
  doctrine_reference: T12P.ASH.4.5; cf. Num 25:11 LXX ζηλώσας τὸν ζῆλόν μου (Phinehas); 1 Kgs 19:10 ζηλῶν ἐζήλωκα τῷ Κυρίῳ (Elijah)
- issue: Ritual purity analogy (gazelles and deer as 'clean' wild animals)
  english_pob_reading: though in the manner of wild animals they seem to be unclean, yet in every way they are clean
  chosen_spanish_reading: aunque en la manera de los animales salvajes parecen ser impuros, en todo son puros
  alternative_spanish_readings:
  - aunque su comportamiento es el de bestias salvajes, aparecen como impuros, pero son completamente puros
  rationale: 'The analogy depends on knowledge of Mosaic dietary law: gazelles and deer are explicitly listed as clean animals (Deut 14:5; Lev 11:3ff) yet are ''wild'' rather than domesticated. The author exploits the tension between their wild appearance/manner and their legal purity status to make a moral point about persons who may appear unclean (by external social or ritualistic criteria) but are genuinely pure. The Spanish text preserves this tension; a footnote (a) supplies the cultural context for readers unfamiliar with the dietary law background.'
  doctrine_reference: Deut 14:5; Lev 11:3-8; T12P.ASH.4.5
translation_notes:
  revision_awareness: 'The English POB underwent one revision pass (azure-gpt-5.4, 2026-04-23). Key changes adjudicated: (1) ἤθει rendered ''manner'' (not ''bearing''); (2) adversative conjunction pair ''though…yet'' adopted; (3) ἀπεχόμενοι ὧν rendered ''abstaining from what'' (not the longer ''keeping away from those things which''); (4) ἀπείργων τὸ κακὸν τοῦ ἀγαθοῦ rendered ''keeping evil away from good'' (not ''holding back evil from good''). The Spanish draft reflects all four of these adjudicated choices: ''manera'' for ἤθει, ''aunque…en todo'' for the though/yet contrast, ''absteniéndose de lo que'' for ἀπεχόμενοι ὧν, and ''apartando el mal del bien'' for the final clause. Cross-check status: high_agreement / minor-issues (score 0.9), indicating the revised English base is reliable.'
  spanish_consistency_notes:
  - Κύριος rendered as 'Yahvé' per POB project default, with explanatory footnote [b] documenting the Greek-source decision and the divine-name background.
  - Θεός rendered as 'Dios' per project default (θεός → 'Dios'); no singular/plural ambiguity in this passage.
  - No δοῦλος, σάρξ, δικαιοσύνη, χάρις, or πνεῦμα terminology present in this verse; project defaults for those terms are not activated here.
  - The particle 'también' (translating καί before ὁ Θεός) preserves the emphatic 'even God / God also' nuance of the Greek, indicating that the standard of abstinence aligns with divine abhorrence.
  - '''Caminan con celo por Yahvé'' renders ἐν ζήλῳ Κυρίου πορεύονται; the prepositional phrase ''con celo por'' captures the dative of manner (ἐν ζήλῳ) and the genitive of reference (Κυρίου) without introducing an unwarranted causative reading.'
