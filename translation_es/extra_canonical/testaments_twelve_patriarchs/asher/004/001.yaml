id: T12P.ASH.4.1
reference: Testament of Asher 4:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: IV. Οἱ γὰρ ἀγαθοὶ ἄνθρωποι¹ *⌜καὶ⌝ μονοπρόσωποι κἂν² νομισθῶσι παρὰ τῶν³ διπροσώπων⁴ ἁμαρτάνειν⁵, δίκαιοί εἰσι παρὰ τῷ⁶ Θεῷ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/004/001.yaml
  text: For good men, being single-faced, even if they are thought by the double-faced to be sinning, are righteous before God.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:55Z'
    unchanged: false
    changes_summary: 'Revised to: ''Good men, being single-faced, even if they are thought by the double-faced to be sinning, are righteous before God.'' Removed the awkward introductory ''For,'' which reflects the Greek particle but is unnatural in English at the start of this standalone verse.'
translation:
  language: es
  text: Las personas buenas,[a] siendo de un solo rostro,[b] aunque los de doble rostro[c] las tengan por pecadoras, son justas ante Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gr. ἄνθρωποι, término genérico para «personas» o «seres humanos», sin especificación de género (a diferencia de ἄνδρες, que designa varones). La POB en inglés usa «men» siguiendo la tradición; el español «personas» refleja con mayor fidelidad el alcance genérico del griego.
    reason: source_note
  - marker: b
    text: 'Gr. μονοπρόσωποι, lit. «de un solo rostro»: el concepto eje del Testamento de Aser para designar la integridad moral, la coherencia entre carácter interior y conducta exterior. La edición Charles (1908) marca *⌜καί⌝ antes de esta palabra, señalando que algunos manuscritos incluyen «y» (καί), lo que daría «personas buenas y de un solo rostro»; la variante no altera el sentido esencial del enunciado.'
    reason: textual_variant
  - marker: c
    text: Gr. διπροσώπων, lit. «de doble rostro», término directamente opuesto a μονοπρόσωποι [véase nota b]. En el Testamento de Aser designa a quienes mezclan bien y mal, o cuya conducta exterior no refleja su carácter verdadero; en sentido amplio, los hipócritas morales.
    reason: cross_reference
lexical_decisions:
- source_word: ἄνθρωποι
  english_pob_choice: men
  chosen_spanish: personas
  alternatives_spanish:
  - hombres
  - seres humanos
  lexicon: LSJ s.v. ἄνθρωπος (generic human being, not gender-specific)
  rationale: Greek ἄνθρωποι is the generic human term, contrasted in LSJ with ἀνήρ/ἄνδρες (adult male). The English POB chose 'men' following a traditional rendering, but the source does not restrict the referent to males. Spanish 'hombres' is increasingly read as gender-specific in contemporary Latin American usage, whereas 'personas' faithfully renders the scope of the Greek. The footnote records this divergence from the English POB choice.
- source_word: μονοπρόσωποι
  english_pob_choice: single-faced
  chosen_spanish: de un solo rostro
  alternatives_spanish:
  - de una sola cara
  - íntegros
  - sinceros
  lexicon: LSJ s.v. μονοπρόσωπος (of one face/appearance); compound μόνος + πρόσωπον
  rationale: 'The English POB preserves the literal face-metaphor (''single-faced'') as the organizing image of T12P.ASH. Spanish ''de un solo rostro'' is the parallel calque: more dignified than ''de una sola cara'' and more faithful to the source than sense-for-sense renderings such as ''íntegros'' or ''sinceros'', which would erase the documented textual metaphor. A footnote explains the term''s theological weight and the manuscript notation *⌜καί⌝.'
- source_word: διπροσώπων
  english_pob_choice: double-faced
  chosen_spanish: de doble rostro
  alternatives_spanish:
  - de dos caras
  - hipócritas
  - de doble cara
  lexicon: LSJ s.v. διπρόσωπος (two-faced); compound δι- + πρόσωπον
  rationale: Exact antithetical parallel to μονοπρόσωποι. 'De doble rostro' maintains the structural symmetry with 'de un solo rostro' and preserves the source metaphor. 'De dos caras' is more colloquial; 'hipócritas' would import an interpretation not in the text. The footnote cross-references the antithetical pair.
- source_word: νομισθῶσι
  english_pob_choice: are thought (to be)
  chosen_spanish: las tengan por
  alternatives_spanish:
  - las consideren
  - sean tenidas por
  - las juzguen
  lexicon: LSJ s.v. νομίζω (to consider, deem, hold an opinion); aorist passive subjunctive in κἂν-clause
  rationale: '''νομίζω'' means to hold an opinion or consider, without the formal evaluative weight of ''judge'' (κρίνω). Spanish ''tener por'' (hold as / consider to be) captures this sense naturally and avoids the stronger ''juzgar.'' The passive construction in Greek is rendered as an active with subject ''los de doble rostro'' for natural Spanish word order.'
- source_word: ἁμαρτάνειν
  english_pob_choice: sinning
  chosen_spanish: pecadoras
  alternatives_spanish:
  - en pecado
  - que pecan
  - culpables de pecar
  lexicon: BDAG s.v. ἁμαρτάνω (to sin, commit a wrong); present infinitive as complement of νομίζω
  rationale: 'The present infinitive ἁμαρτάνειν functions as the predicate complement of νομισθῶσι: ''to be sinning.'' In Spanish, ''tener por pecadoras'' idiomatically absorbs both verbs into a natural predicate structure. ''Culpables de pecar'' is a viable alternative that preserves the verbal aspect; ''pecadoras'' (as substantive adjective) is slightly more compact and natural with ''tener por.'''
- source_word: δίκαιοί
  english_pob_choice: righteous
  chosen_spanish: justas
  alternatives_spanish:
  - rectas
  - íntegras
  lexicon: BDAG s.v. δίκαιος (upright, righteous, just); predicate adjective, agrees with ἄνθρωποι
  rationale: Project default δικαιοσύνη → 'justicia/rectitud' applied to the adjective form. 'Justas' (f. pl., agreeing with 'personas') is the most direct rendering and preserves the covenantal/moral force. Gender agreement shifts from masculine 'δίκαιοί' to feminine 'justas' because the Spanish subject 'personas' is feminine.
- source_word: παρὰ τῷ Θεῷ
  english_pob_choice: before God
  chosen_spanish: ante Dios
  alternatives_spanish:
  - delante de Dios
  - a los ojos de Dios
  lexicon: LSJ s.v. παρά + dative (beside, in the presence of, before); Θεός → 'Dios' per project defaults
  rationale: '''Ante Dios'' is concise and dignified, the standard Spanish equivalent for παρά + dative in moral/judicial contexts. ''Delante de Dios'' is equally correct and slightly more explicit; ''a los ojos de Dios'' is interpretive. ''Ante Dios'' is preferred for economy and register.'
theological_decisions:
- issue: μονοπρόσωποι / διπρόσωποι as the central ethical category of T12P.ASH
  english_pob_reading: single-faced / double-faced
  chosen_spanish_reading: de un solo rostro / de doble rostro
  alternative_spanish_readings:
  - íntegros / hipócritas
  - de una sola cara / de dos caras
  rationale: 'The two-faces antithesis is the organizing theological concept of the Testament of Asher: moral righteousness consists in coherence between inner character and outward conduct (''single-faced''), while evil consists in mixing or dissimulating (''double-faced''). Preserving the literal face-metaphor in Spanish (''rostro'') maintains this documented structural tension and keeps the text auditable against the source rather than flattening it into generic virtue language like ''íntegros'' or ''hipócritas.'''
  doctrine_reference: T12P.ASH passim (two-ways / two-faces teaching; cf. Charles 1908 introduction to Testament of Asher)
- issue: Omission of Greek γάρ (connective 'for/because')
  english_pob_reading: Removed 'For' in the latest revision as unnatural for a standalone verse
  chosen_spanish_reading: No connective at the opening of the Spanish sentence
  alternative_spanish_readings:
  - Pues las personas buenas...
  - Porque las personas buenas...
  rationale: The English POB revision explicitly removed the initial 'For' that reflects Greek γάρ, judging it unnatural when the verse is presented as a standalone unit. Spanish 'Pues' or 'Porque' at the opening of a standalone sentence would carry the same unnaturalness. The connective function of γάρ (signaling that this verse concludes or grounds an earlier argument) is documented here but not imported into the main text.
  doctrine_reference: 'English POB revision note (2026-04-23): removed introductory ''For'' as unnatural in standalone presentation'
translation_notes:
  revision_awareness: 'The English POB underwent one documented revision (2026-04-23): the initial ''For'' reflecting Greek γάρ was removed as unnatural for a standalone verse. The Spanish draft follows the same rationale and does not begin with a connective (''Pues''/''Porque''). The revision did not affect any lexical or theological content beyond the opening particle.'
  spanish_consistency_notes:
  - Θεῷ → 'Dios' (not 'Señor'), per project default for θεός / אֱלֹהִים.
  - δίκαιοί → 'justas', following project default δικαιοσύνη → justicia/rectitud; gender agrees with Spanish subject 'personas' (f. pl.).
  - '''De un solo rostro'' and ''de doble rostro'' are hereby established as the Spanish rendering for the μονοπρόσωπος / διπρόσωπος word family in T12P.ASH; translators should use these forms consistently throughout the Testament of Asher to preserve the structural antithesis.'
  - γάρ not rendered at the opening of the sentence, consistent with the English POB revision rationale for standalone verse presentation.
