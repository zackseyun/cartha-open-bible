source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: '*Ἔστι τις μισῶν¹³ τὸν ἐλεήμονα καὶ ἄδικον¹⁴, ⌜καὶ⌝¹⁵ τὸν μοιχὸν καὶ¹⁶ νηστεύοντα¹⁷, *καὶ αὐτό ἐστι διπρόσωπον¹⁸, ἀλλὰ ⌈τὸ πᾶν⌉ ἔργον ἀγαθόν¹⁹, ὅτι μιμεῖται²⁰ Κύριον, μὴ²¹ †προσδοκώμενος²² τὸ δοκοῦν καλὸν †μετὰ²³ *τοῦ ἀληθινοῦ²⁴ καλοῦ²⁵.'
