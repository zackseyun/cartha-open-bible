base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/004/003.yaml
  text: There is one who hates the merciful and the unjust, and the adulterer and the one who fasts; this too is double-faced, but the whole work is good, because he imitates the Lord, not expecting what seems good along with what is truly good.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:55Z'
    unchanged: false
    changes_summary: Removed repeated 'man' for more natural English, and changed 'together with' to 'along with' for smoother formal style while preserving the sense.
translation:
  language: es
  text: Hay uno que odia al misericordioso y al injusto, y al adúltero y al que ayuna; también esto es de doble rostro[a], pero toda la obra es buena, porque imita al Señor[b], sin esperar[c] lo que parece bueno junto con lo verdaderamente bueno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«De doble rostro»: gr. διπρόσωπον, literalmente «de dos rostros». Este término técnico recorre el Testamento de Aser para describir a personas de conducta moralmente ambigua. Como alternativa: «de dos caras». El término no equivale a «hipócrita» sin más, pues en este versículo se afirma que la obra de este sujeto es buena.'
    reason: lexical_alternative
  - marker: b
    text: '«Al Señor»: el griego κύριον designa aquí a Dios. Los Testamentos de los Doce Patriarcas no conservan un Vorlage hebreo con יהוה en este punto, por lo que no se aplica la convención del proyecto de transliterar «Yahvé». Se mantiene «el Señor» como representación fiel del κύριος griego con referente divino.'
    reason: source_note
  - marker: c
    text: '«Sin esperar»: el participio griego †προσδοκώμενος y la preposición †μετά están marcados con óbelo (†) en el aparato crítico de Charles (1908), lo que indica una lectura textualmente dudosa o posiblemente corrupta. La traducción sigue la lectura mayoritaria de los editores. Una lectura alternativa podría ser «sin buscar» (sin buscar lo que parece bueno…).'
    reason: textual_variant
lexical_decisions:
- source_word: μισῶν (present participle of μισέω)
  english_pob_choice: hates / who hates
  chosen_spanish: que odia
  alternatives_spanish:
  - que aborrece
  - que detesta
  lexicon: 'BDAG μισέω: to have strong dislike or aversion; LSJ μισέω: to hate'
  rationale: The Greek participial construction Ἔστι τις μισῶν is rendered as 'Hay uno que odia,' naturalizing the participle into a relative clause as Spanish grammar requires. 'Odia' is the standard modern Spanish equivalent for μισέω in a morally charged context, matching the English POB 'hates.' 'Aborrece' and 'detesta' are valid but carry somewhat stronger emotional coloring.
- source_word: ἐλεήμονα (acc. of ἐλεήμων)
  english_pob_choice: the merciful
  chosen_spanish: al misericordioso
  alternatives_spanish:
  - al compasivo
  - al clemente
  lexicon: 'BDAG ἐλεήμων: merciful, compassionate; LSJ: disposed to pity'
  rationale: '''Misericordioso'' is the standard dignified Spanish rendering of ἐλεήμων and aligns with biblical usage (cf. Bienaventurados los misericordiosos, Mt 5:7). The article is retained to mirror the Greek τὸν ἐλεήμονα and because Spanish requires the personal accusative marker ''a'' before the noun.'
- source_word: ἄδικον (acc. of ἄδικος)
  english_pob_choice: the unjust
  chosen_spanish: al injusto
  alternatives_spanish:
  - al malvado
  - al inicuo
  - al perverso
  lexicon: 'BDAG ἄδικος: not right, unrighteous, unjust; LSJ: wrongful, unjust'
  rationale: '''Injusto'' is the most direct lexical equivalent of ἄδικος and is used in classical Spanish biblical translations. The pairing ἐλεήμονα καὶ ἄδικον (merciful and unjust) is rhetorically striking because the subject hates opposite types; ''injusto'' preserves that contrast without softening. ''Malvado'' would over-translate toward moral evil rather than legal/relational injustice.'
- source_word: μοιχὸν (acc. of μοιχός)
  english_pob_choice: the adulterer
  chosen_spanish: al adúltero
  alternatives_spanish:
  - al fornicario
  lexicon: 'BDAG μοιχός: adulterer; LSJ: adulterer'
  rationale: '''Adúltero'' is a precise, dignified, and well-established Spanish rendering of μοιχός. The second pairing (adulterer / one who fasts) again contrasts a moral transgressor with a pious practitioner, a tension the Spanish preserves.'
- source_word: νηστεύοντα (acc. ptc. of νηστεύω)
  english_pob_choice: the one who fasts
  chosen_spanish: al que ayuna
  alternatives_spanish:
  - el ayunador
  lexicon: 'BDAG νηστεύω: to fast, to abstain from food for religious reasons; LSJ: to fast'
  rationale: '''Al que ayuna'' naturalizes the Greek accusative participle into a Spanish noun phrase. ''El ayunador'' exists but is less natural in modern Spanish. The relative clause form mirrors the earlier ''al que odia'' pattern.'
- source_word: διπρόσωπον (adj. from δίς + πρόσωπον)
  english_pob_choice: double-faced
  chosen_spanish: de doble rostro
  alternatives_spanish:
  - de dos caras
  - de doble cara
  - hipócrita
  lexicon: 'LSJ διπρόσωπος: two-faced; Thayer: having two faces or aspects'
  rationale: '''De doble rostro'' is a more literal and elevated rendering than the colloquial ''de dos caras,'' appropriate for a semi-biblical pseudepigraphical text. It avoids the purely pejorative connotation of ''hipócrita,'' which would collapse the text''s more nuanced point—the double-faced person described here paradoxically ends up doing good. See footnote [a].'
- source_word: τὸ πᾶν ἔργον (⌈τὸ πᾶν⌉ in apparatus)
  english_pob_choice: the whole work
  chosen_spanish: toda la obra
  alternatives_spanish:
  - el conjunto de la obra
  - todo el trabajo
  lexicon: 'LSJ πᾶς: all, whole; ἔργον: work, deed, act'
  rationale: '''Toda la obra'' is the most natural and idiomatic Spanish equivalent for τὸ πᾶν ἔργον. The corner brackets in the source (⌈τὸ πᾶν⌉) indicate this reading is uncertain but is followed by Charles and the English POB. ''Obra'' captures both the singular collective sense and the moral/practical dimension of ἔργον better than ''trabajo'' (which is too mundane) or ''acto'' (too singular).'
- source_word: μιμεῖται (present middle of μιμέομαι)
  english_pob_choice: imitates
  chosen_spanish: imita
  alternatives_spanish:
  - remeda
  - sigue el ejemplo de
  lexicon: 'BDAG μιμέομαι: to imitate, to follow as an example; LSJ: to mimic, imitate'
  rationale: '''Imita'' is the standard Spanish equivalent and matches the English POB. ''Remeda'' exists but has a more negative, mocking connotation in modern Spanish. The theological concept of imitating God (imitatio Dei) is significant in Jewish ethics and should be preserved without pejorative connotation.'
- source_word: Κύριον (acc. of κύριος)
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - a Yahvé
  lexicon: 'BDAG κύριος: lord, master; when used absolutely in Jewish/Christian texts, refers to God'
  rationale: The project default renders יהוה/YHWH as 'Yahvé.' However, the source here is Greek κύριος in a pseudepigraphical text (Testaments of the Twelve Patriarchs) for which no Hebrew Vorlage with יהוה is extant at this point. The Greek κύριος clearly refers to God but cannot be directly traced to יהוה in the manuscript tradition. 'El Señor' preserves the Greek form while acknowledging the divine referent. See footnote [b].
- source_word: μὴ †προσδοκώμενος (neg. ptc., with textual dagger)
  english_pob_choice: not expecting
  chosen_spanish: sin esperar
  alternatives_spanish:
  - no esperando
  - sin buscar
  - sin anticipar
  lexicon: 'BDAG προσδοκάω: to wait for, to expect, to look for; LSJ: to expect, await'
  rationale: '''Sin esperar'' renders μὴ + the participle naturally in Spanish. The dagger (†) in the source marks a textually uncertain form; the English POB follows the majority editorial reading ''not expecting,'' and the Spanish follows suit. ''No esperando'' is also valid but ''sin esperar'' reads more elegantly in the participial phrase. See footnote [c].'
- source_word: τὸ δοκοῦν καλόν (ptc. of δοκέω + καλός)
  english_pob_choice: what seems good
  chosen_spanish: lo que parece bueno
  alternatives_spanish:
  - lo aparentemente bueno
  - lo que luce bueno
  lexicon: 'BDAG δοκέω: to seem, to appear; καλός: good, beautiful, noble'
  rationale: '''Lo que parece bueno'' is the natural Spanish rendering of the participial construction τὸ δοκοῦν καλόν. It preserves the epistemic nuance—the appearance of goodness versus its reality—which is central to the theological point of the verse.'
- source_word: τοῦ ἀληθινοῦ καλοῦ (gen. of ἀληθινός + καλός)
  english_pob_choice: what is truly good
  chosen_spanish: lo verdaderamente bueno
  alternatives_spanish:
  - lo genuinamente bueno
  - lo que es realmente bueno
  lexicon: 'BDAG ἀληθινός: true, genuine, real (as opposed to that which merely seems); LSJ: real, genuine'
  rationale: '''Lo verdaderamente bueno'' renders ἀληθινός καλός as a unified phrase. ''Verdaderamente'' captures the sense of genuine/authentic goodness over against mere appearance. The genitive in Greek (μετὰ τοῦ ἀληθινοῦ καλοῦ) is rendered idiomatically with ''junto con lo verdaderamente bueno,'' preserving the relational preposition μετά.'
theological_decisions:
- issue: The paradox of the 'double-faced' person who nonetheless does good by imitating God
  english_pob_reading: this too is double-faced, but the whole work is good, because he imitates the Lord
  chosen_spanish_reading: también esto es de doble rostro, pero toda la obra es buena, porque imita al Señor
  alternative_spanish_readings:
  - también este es hipócrita, pero toda su obra es buena
  - también esto es ambiguo, pero todo el trabajo es bueno
  rationale: 'The Testament of Asher develops a typology of ''two-faced'' (διπρόσωπον) persons. In this verse, the subject hates pairs of moral opposites (merciful/unjust; adulterer/fasting person), which qualifies them as double-faced. Yet the paradox is affirmed: the whole work is good because such impartial hatred imitates God''s own impartial judgment. The Spanish must not flatten this tension by choosing ''hipócrita'' (which carries modern negative connotation incompatible with the subsequent positive verdict) or by paraphrasing away the logical tension. ''De doble rostro'' preserves the descriptive term without preemptively judging the subject negatively.'
  doctrine_reference: Testament of Asher 1–6 typology of two-faced persons; Jewish imitatio Dei ethics
- issue: 'The final clause: not confusing apparent good with true good as the basis for the positive moral verdict'
  english_pob_reading: not expecting what seems good along with what is truly good
  chosen_spanish_reading: sin esperar lo que parece bueno junto con lo verdaderamente bueno
  alternative_spanish_readings:
  - sin confundir lo que parece bueno con lo verdaderamente bueno
  - no buscando lo meramente aparente como si fuera lo realmente bueno
  rationale: 'The concluding clause (with textually difficult readings marked by daggers) explains why the double-faced person''s work is nonetheless good: they do not treat apparent good (τὸ δοκοῦν καλόν) as equivalent to or combined with genuine good (τοῦ ἀληθινοῦ καλοῦ). This epistemological/ethical distinction is theologically significant and must not be collapsed. The Spanish ''sin esperar lo que parece bueno junto con lo verdaderamente bueno'' preserves the structure of the negated combination, following the English POB''s ''along with'' rendering of μετά.'
  doctrine_reference: Testament of Asher 4–6 on discernment between apparent and true good; Platonic and Jewish wisdom tradition of φαινόμενον vs. ἀληθινόν
translation_notes:
  revision_awareness: 'The English POB underwent a revision (azure-gpt-5.4, 2026-04-23) that removed repeated ''man'' (merciful man / unjust man) for natural English flow, and changed ''together with'' to ''along with.'' The Spanish draft reflects both revisions: the repeated noun is dropped (al misericordioso y al injusto, not al hombre misericordioso y al hombre injusto), and ''junto con'' renders the revised ''along with'' sense of μετά rather than the earlier ''together with.'' The cross-check status (needs_review, 0.62 agreement) is noted; no additional smoothing beyond what the source warrants has been applied.'
  spanish_consistency_notes:
  - κύριος rendered as 'el Señor' (not 'Yahvé') throughout this record because source is Greek pseudepigrapha without a traceable Hebrew יהוה antecedent at this locus.
  - διπρόσωπον consistently rendered as 'de doble rostro' rather than 'de dos caras' to maintain elevated register appropriate to the text.
  - 'Personal accusative ''a'' applied consistently before human direct objects: al misericordioso, al injusto, al adúltero, al que ayuna, al Señor.'
  - Greek participial constructions (μισῶν, νηστεύοντα, †προσδοκώμενος) naturalized into Spanish relative or prepositional phrases rather than retained as calqued participles.
  - The neuter αὐτό rendered as 'esto' (neuter/abstract in Spanish) rather than 'este' (masculine), since the reference is to the case or behavior described, not the person directly.
