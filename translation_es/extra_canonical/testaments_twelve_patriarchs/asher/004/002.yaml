reference: Testament of Asher 4:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: Πολλοὶ ⌜δὲ⌝⁷ ἀναιροῦντες τοὺς⁸ πονηρούς, δύο⁹ ποιοῦσιν ἔργα *καλοῦ τε καὶ κακοῦ¹⁰, *τὸ δὲ ὅλον¹¹ καλόν, ὅτι τὸ¹² κακὸν ἐκριζώσας ἀπώλεσεν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/004/002.yaml
  text: And many, in doing away with the wicked, do two things, good and evil; yet the whole is good, because he has uprooted and destroyed the evil.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:56Z'
    unchanged: false
    changes_summary: Revised 'perform two works, one good and one evil' to 'do two things, good and evil' for closer alignment with the Greek (δύο ποιοῦσιν ἔργα ... καλοῦ τε καὶ κακοῦ) and more natural English, while preserving the contrast and conclusion.
translation:
  language: es
  text: Y muchos[a], al eliminar[b] a los malvados, realizan dos obras de bien y de mal[c]; con todo, el conjunto es bueno, porque ha arrancado de raíz y destruido el mal[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego δέ (marcado ⌜δὲ⌝ en el aparato crítico de Charles 1908, con corchetes angulares que señalan variante textual o posible adición) funciona aquí como partícula conectiva. Se traduce como «Y» siguiendo la función de enlace con el argumento precedente.
    reason: textual_variant
  - marker: b
    text: 'Gr. ἀναιρέω (ἀναιροῦντες): el verbo abarca desde «retirar/quitar» hasta «matar/dar muerte». «Eliminar» preserva esta amplitud semántica en español sin forzar una lectura exclusivamente violenta.'
    reason: lexical_alternative
  - marker: c
    text: 'Gr. δύο ἔργα καλοῦ τε καὶ κακοῦ: literalmente «dos obras de bien y de mal». Los genitivos καλοῦ/κακοῦ califican las obras como participantes de ambas categorías morales, no como dos actos separados (uno bueno, otro malo). La revisión inglesa simplificó ἔργα como «things» (cosas) por naturalidad; el español retiene «obras» para preservar el término moral original.'
    reason: lexical_alternative
  - marker: d
    text: 'El griego pasa del sujeto plural (Πολλοί — «muchos») a formas singulares (ἐκριζώσας ἀπώλεσεν — «habiendo arrancado de raíz, destruyó»). Probable uso distributivo: cada uno de los «muchos» individualmente. No se excluye una lectura en la que la providencia divina sea el agente último que destruye el mal por medio de estas acciones humanas.'
    reason: theological_note
lexical_decisions:
- source_word: ἀναιρέω (ἀναιροῦντες)
  english_pob_choice: doing away with
  chosen_spanish: eliminar
  alternatives_spanish:
  - matar
  - suprimir
  - dar muerte a
  - quitar de en medio
  lexicon: 'LSJ: ἀναιρέω — (a) to take up; (b) to take away, remove; (c) to make away with, kill, slay (Hellenistic sense very common for killing enemies or criminals).'
  rationale: 'The English POB''s ''doing away with'' was deliberately chosen for semantic breadth, neither committing to ''killing'' nor to mere ''removing.'' Spanish ''eliminar'' achieves the same range: it covers removal and elimination including lethal action without forcing the violence explicit. ''Matar'' would overdetermine the meaning; ''suprimir'' is too bureaucratic. ''Eliminar'' is the nearest neutral-range Spanish equivalent.'
- source_word: πονηρούς (τοὺς πονηρούς)
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los malos
  - los perversos
  lexicon: 'LSJ: πονηρός — bad, worthless, wicked; morally evil in active, habitual sense.'
  rationale: '''Los malvados'' conveys active, habitual wickedness, fitting the moral context of the Testament of Asher''s two-ways teaching. ''Los impíos'' carries a cultic/religious slant not required by πονηρός here; ''los malos'' is too colloquially weak.'
- source_word: ἔργα (δύο ἔργα)
  english_pob_choice: things (after revision from 'works')
  chosen_spanish: obras
  alternatives_spanish:
  - cosas
  - actos
  - acciones
  lexicon: 'LSJ: ἔργον — work, deed, act; that which is done.'
  rationale: The English revision moved from 'two works' to 'two things' for naturalness. Spanish 'obras' retains the original ἔργα (moral deeds/works) more faithfully without sounding wooden — 'obras' is perfectly natural Spanish in ethical discourse. This is a deliberate, source-grounded departure from the English revision's naturalization move.
- source_word: καλοῦ τε καὶ κακοῦ
  english_pob_choice: good and evil
  chosen_spanish: de bien y de mal
  alternatives_spanish:
  - buenas y malas
  - de lo bueno y lo malo
  - tanto buenas como malas
  lexicon: 'LSJ: καλός — beautiful, good, noble; κακός — bad, evil, wicked. Both here are substantival adjectives in the genitive, qualifying ἔργα.'
  rationale: 'The genitives καλοῦ/κακοῦ function as genitives of quality/content: ''works [consisting] of good and of evil.'' Spanish prepositional phrase ''de bien y de mal'' preserves this partitive-qualifying force better than adjectival ''buenas y malas.'' The τε καὶ (''both … and'') structure signals that each act partakes of both moral categories, not that there are two separate acts — one good, one evil — as the pre-revision English implied.'
- source_word: τὸ ὅλον
  english_pob_choice: the whole
  chosen_spanish: el conjunto
  alternatives_spanish:
  - el todo
  - la totalidad
  - en su conjunto
  lexicon: 'LSJ: ὅλος — whole, entire; τὸ ὅλον used as neuter substantive meaning ''the whole [matter/thing].'''
  rationale: '''El conjunto'' (the whole, the totality, the overall picture) is natural, modern Spanish with the right philosophical weight. ''El todo'' is slightly more technical/philosophical; ''la totalidad'' is more formal. ''El conjunto es bueno'' reads naturally and captures the verdict-on-the-whole sense.'
- source_word: ἐκριζόω (ἐκριζώσας)
  english_pob_choice: uprooted
  chosen_spanish: arrancado de raíz
  alternatives_spanish:
  - desarraigado
  - extirpado
  lexicon: 'LSJ: ἐκριζόω — to root out, uproot. From ἐκ- (out) + ῥίζα (root).'
  rationale: '''Arrancar de raíz'' is the standard idiomatic Spanish expression for uprooting (literally and figuratively), and it transparently represents the etymological force of ἐκριζόω. ''Desarraigar'' is also correct but slightly more abstract.'
- source_word: ἀπόλλυμι (ἀπώλεσεν)
  english_pob_choice: destroyed
  chosen_spanish: destruido
  alternatives_spanish:
  - aniquilado
  - acabado con
  - hecho perecer
  lexicon: 'LSJ: ἀπόλλυμι — to destroy utterly, kill, ruin; aorist ἀπώλεσεν, 3rd singular.'
  rationale: '''Destruido'' conveys the finality and thoroughness of ἀπόλλυμι. Paired with ''arrancado de raíz,'' it forms a natural doublet in Spanish matching the Greek participle + finite verb construction.'
theological_decisions:
- issue: 'Singular number shift after plural subject: ἐκριζώσας ἀπώλεσεν (singular participle + verb) following plural Πολλοί (''many'')'
  english_pob_reading: because he has uprooted and destroyed the evil
  chosen_spanish_reading: porque ha arrancado de raíz y destruido el mal
  alternative_spanish_readings:
  - porque ellos han arrancado de raíz y destruido el mal
  - porque uno ha arrancado de raíz y destruido el mal
  rationale: The Greek shifts from the plural subject (Πολλοί — 'many') to a singular agent (ἐκριζώσας ἀπώλεσεν — 'having uprooted, he destroyed'). This is likely distributive — referring to each individual among the 'many' — but it could also allow a reading in which Providence or God is the ultimate agent who destroys evil through human acts. Spanish 'ha arrancado de raíz y destruido' (singular, no explicit pronoun) preserves the same ambiguity as the English POB. Supplying 'ellos' (they) would resolve the ambiguity toward the plural and contradict the Greek; an explicit 'él' would over-specify. The footnote [d] alerts the reader.
  doctrine_reference: Testament of Asher 1–6 (two-ways moral framework); consequentialist ethical reasoning within Second Temple Jewish paraenesis
- issue: 'Consequentialist moral logic: acts comprising both good and evil can be judged wholly good by their net outcome'
  english_pob_reading: yet the whole is good, because he has uprooted and destroyed the evil
  chosen_spanish_reading: con todo, el conjunto es bueno, porque ha arrancado de raíz y destruido el mal
  alternative_spanish_readings:
  - sin embargo, el resultado final es bueno
  - mas el total es bueno
  rationale: 'The text presents a moral verdict: acts that involve evil means may be judged good overall when they eradicate evil. This consequentialist reasoning is distinctive within the Testament of Asher''s ''two faces'' (δύο πρόσωπα) ethics. The Spanish rendering preserves this logic without editorial softening. ''Con todo'' is a natural Spanish adversative (''nevertheless, yet'') that matches the rhetorical turn; ''el conjunto es bueno'' renders the verdict clause without moralizing addition.'
  doctrine_reference: Testament of Asher 1:3–6:6 (the doctrine of the two ways and mixed moral acts); cf. Charles 1908, pp. 244–255
translation_notes:
  revision_awareness: 'The English POB underwent one revision (2026-04-23, azure-gpt-5.4): ''perform two works, one good and one evil'' was changed to ''do two things, good and evil'' for closer alignment with the Greek genitive structure (καλοῦ τε καὶ κακοῦ qualifying ἔργα rather than identifying two separate acts) and for natural English. The Spanish draft follows the revised English in avoiding ''una obra buena y una obra mala'' (which would replicate the pre-revision error of splitting the act into two discrete moral events), but departs from the English revision''s naturalization of ἔργα → ''things'' by retaining ''obras'' (works/deeds), which is warranted by the Greek and is natural Spanish in moral/ethical discourse.'
  spanish_consistency_notes:
  - No divine names (יהוה, κύριος, θεός) appear in this verse; project terminology defaults for these are not applicable.
  - No Mesías/Cristo, Jesús, espíritu, δοῦλος, μετάνοια, σάρξ, δικαιοσύνη, or χάρις terms appear; project defaults for these are not invoked.
  - The term 'malvados' (πονηρούς) should be checked for consistency with renderings of πονηρός elsewhere in the Testaments of the Twelve Patriarchs Spanish corpus.
  - The phrase 'arrancado de raíz' for ἐκριζόω should be standardized across any other occurrences of ἐκριζόω in the project.
