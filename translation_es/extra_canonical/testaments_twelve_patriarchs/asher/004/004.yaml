reference: Testament of Asher 4:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: Ἄλλος²⁶ οὐ θέλει *ἰδεῖν ⌈ἡμέρας⌉ ἀγαθὰς²⁷ μετὰ ἀσώτων, ἵνα μὴ αἰσχράνει²⁸ τὸ σῶμα²⁹ καὶ τὴν ψυχὴν μολυνεῖ³⁰. *καίγε τοῦτο διπρόσωπον³¹, ὅλον³² δὲ καλόν³³ ἐστιν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/004/004.yaml
  text: Another does not wish to see good days with the wasteful, lest he disgrace the body and defile the soul. Even though this is double-faced, yet it is wholly good.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:56Z'
    unchanged: false
    changes_summary: Replaced 'defile his body and pollute his soul' with 'disgrace the body and defile the soul' to reflect αἰσχράνει and μολυνεῖ more accurately and distinctly; kept the rest unchanged.
translation:
  language: es
  text: Otro no desea ver días buenos con los disolutos[a], para no deshonrar[b] el cuerpo ni contaminar el alma. Y aunque esto es de doble cara[c], es del todo bueno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Gr. ἀσώτων: personas de conducta disoluta y derrochadora (ἄσωτος, lit. ''irrecuperable, sin salvación''). El POB inglés optó por ''wasteful'' (malgastadores), subrayando el registro económico. Se prefiere ''disolutos'' porque el contexto inmediato —contaminación del cuerpo y el alma— indica que el autor privilegia la dimensión moral de la conducta.'
    reason: lexical_alternative
  - marker: b
    text: 'El griego emplea dos verbos distintos: αἰσχράνει (''deshonrar'', de αἰσχρός: vergonzoso/ignominioso) para el cuerpo, y μολυνεῖ (''contaminar'', de μολύνω: manchar/profanar) para el alma. La revisión del POB inglés (2026-04-23) recuperó esta distinción cambiando de ''defile his body and pollute his soul'' a ''disgrace the body and defile the soul''. La traducción española la preserva.'
    reason: textual_variant
  - marker: c
    text: 'Gr. διπρόσωπον: lit. ''de dos rostros/caras''. Es el término técnico de la tipología moral del Testamento de Aser. Aquí no implica hipocresía o engaño, sino que la conducta —evitar la compañía de los disolutos— puede parecer distante o arrogante, aunque su motivación sea íntegramente buena. Alt. literaria: ''bifronte''.'
    reason: theological_note
lexical_decisions:
- source_word: ἀσώτων
  english_pob_choice: the wasteful
  chosen_spanish: los disolutos
  alternatives_spanish:
  - los pródigos
  - los derrachadores
  - los libertinos
  - los que malgastan
  lexicon: LSJ
  rationale: ἄσωτος (genitivo plural ἀσώτων) etimológicamente significa 'irrecuperable, sin salvación' (ἀ- + σώζω), pero en uso funciona como adjetivo para personas de conducta disoluta, licenciosa y despilfarradora. El POB inglés eligió 'wasteful', privilegiando el registro del derroche económico. En este versículo, sin embargo, la preocupación central es la contaminación del cuerpo y el alma, lo que señala el registro moral de la disolución. 'Disolutos' integra tanto la irresponsabilidad económica como la depravación moral, y es el equivalente español más transparente para explicar por qué la asociación con tales personas pone en riesgo la integridad del cuerpo y el alma. 'Pródigos' tildaría demasiado hacia el despilfarro financiero; 'libertinos' acentúa el desenfreno sexual más de lo que el término griego requiere aquí.
- source_word: αἰσχράνει
  english_pob_choice: disgrace
  chosen_spanish: deshonrar
  alternatives_spanish:
  - avergonzar
  - envilecer
  - afrentar
  - deshonrar
  lexicon: LSJ
  rationale: 'αἰσχραίνω (αἰσχράνει, presente/futuro en cláusula final con ἵνα μή) deriva de αἰσχρός (''vergonzoso, ignominioso, deshonroso'') y pertenece al campo semántico del honor/vergüenza. La revisión del POB inglés distinguió deliberadamente este verbo de μολυνεῖ, cambiando de ''defile his body'' a ''disgrace the body''. ''Deshonrar'' preserva esa distinción en español: apunta a la dimensión pública y de integridad personal del cuerpo, diferenciándose del registro de contaminación/mancha de μολύνω. ''Avergonzar'' es subjetivo y psicológico; ''envilecer'' (degradar) es posible pero de uso menos corriente en contextos morales contemporáneos.'
- source_word: μολυνεῖ
  english_pob_choice: defile
  chosen_spanish: contaminar
  alternatives_spanish:
  - manchar
  - profanar
  - ensuciar
  - corromper
  lexicon: LSJ
  rationale: μολύνω denota mancharse, profanarse o contaminarse —en registros tanto ritual como moral—. La revisión del POB inglés mantuvo 'defile' para el alma, distinguiéndola del 'disgrace' del cuerpo. 'Contaminar' en español cubre bien la defilement moral/ritual y es semánticamente distinto de 'deshonrar', preservando la bipartición que la revisión recuperó del griego. 'Manchar' es más concreto y visual; 'profanar' añadiría un registro sacral no explícito en el griego de este contexto.
- source_word: διπρόσωπον
  english_pob_choice: double-faced
  chosen_spanish: de doble cara
  alternatives_spanish:
  - bifronte
  - de dos rostros
  - de doble aspecto
  - de doble semblante
  lexicon: LSJ
  rationale: 'διπρόσωπον (δι- + πρόσωπον: dos + cara/rostro) es el término técnico de la tipología moral del Testamento de Aser. ''De doble cara'' es la traducción más accesible para un amplio público hispanohablante. ''Bifronte'' es el calco clásico-literario (usado en iconografía para figuras de dos caras, como Jano) y preserva mejor la especificidad del término; se ofrece como alternativa en nota. Se evita ''hipócrita'' o ''falso'' porque en este pasaje la conducta no implica engaño sino una apariencia externa que contrasta con una motivación íntegramente recta.'
- source_word: καίγε
  english_pob_choice: Even though
  chosen_spanish: Y aunque
  alternatives_spanish:
  - Aunque
  - Mas aunque
  - Con todo, esto
  - Y sin embargo
  lexicon: LSJ
  rationale: καίγε combina καί (copulativa/enfática) con γε (partícula de énfasis/concesión). Introduce la idea de que la conducta descrita —evitar la compañía de los disolutos— tiene apariencia de 'doble cara' (quizás antisocial o presuntuosa), y sin embargo es del todo buena. 'Y aunque' en español captura tanto la conección narrativa (καί) como la concesión (γε) de manera natural y fluida.
- source_word: ὅλον... καλόν
  english_pob_choice: wholly good
  chosen_spanish: del todo bueno
  alternatives_spanish:
  - enteramente bueno
  - completamente bueno
  - totalmente bueno
  lexicon: LSJ
  rationale: ὅλον (entero, total) + καλόν (bueno, hermoso, noble). 'Del todo bueno' es la expresión más idiomática en español para 'wholly good' y contrasta bien con la apariencia 'de doble cara' de la acción. 'Enteramente bueno' es también natural y ligeramente más formal; ambas opciones son válidas. Se eligió 'del todo bueno' por su fluidez coloquial-literaria en español neutro.
theological_decisions:
- issue: διπρόσωπον como categoría moral técnica, no como hipocresía
  english_pob_reading: double-faced
  chosen_spanish_reading: de doble cara
  alternative_spanish_readings:
  - bifronte
  - de dos rostros
  - de doble semblante
  rationale: 'En el Testamento de Aser, διπρόσωπον es un término de la tipología moral de las ''dos caras'': una acción o persona puede tener doble cara y ser ''del todo buena'' (como aquí) o ''del todo mala'' (en otros pasajes del mismo texto). La connotación moderna española de ''de doble cara'' puede invocar hipocresía o engaño, sentido que el texto no tiene: aquí la ''doble cara'' reside en que la conducta —apartarse de los disolutos— puede parecer socialmente distante o arrogante, pero su intención es íntegramente pura. La nota al pie [c] advierte de esta distinción. Se descartó traducir libremente por ''ambiguo'' o ''malentendido'' porque borraría el término técnico del Testamento.'
  doctrine_reference: Tipología moral del Testamento de Aser (T12P.ASH); marco de 'dos caminos / dos caras' que recorre los capítulos 1–6
translation_notes:
  revision_awareness: 'La revisión del POB inglés (2026-04-23, modelo gpt-5.4) modificó ''defile his body and pollute his soul'' → ''disgrace the body and defile the soul'', con la finalidad de distinguir αἰσχράνει (campo semántico del honor/vergüenza: αἰσχρός) de μολυνεῖ (campo semántico de la mancha/contaminación: μολύνω), y de suprimir los posesivos (''his'') en favor del artículo definido griego (τὸ σῶμα, τὴν ψυχήν). La traducción española adopta ambas decisiones: ''deshonrar el cuerpo... contaminar el alma'', con artículo definido y verbos diferenciados.'
  spanish_consistency_notes:
  - 'σῶμα → ''cuerpo''; ψυχή → ''alma'': distinción semántica preservada. ψυχή no es πνεῦμα; no se usa ''espíritu'' para evitar confusión con las normas de proyecto sobre πνεῦμα/רוּחַ.'
  - Ningún nombre divino (יהוה/θεός) ni título mesiánico aparece en este versículo; las normas terminológicas del proyecto sobre Yahvé/Mesías/Dios no aplican aquí.
  - La coordinación negativa 'para no deshonrar el cuerpo ni contaminar el alma' usa 'ni' en lugar de 'y no', conforme a la gramática española para oraciones negativas coordinadas (Real Academia Española, Gramática §47.5).
  - Se mantiene el artículo definido ('el cuerpo', 'el alma') siguiendo el griego (τὸ σῶμα, τὴν ψυχήν) y la revisión del POB inglés, que eliminó los posesivos. El español con artículo definido es natural cuando el referente es claramente el propio cuerpo y alma del sujeto.
