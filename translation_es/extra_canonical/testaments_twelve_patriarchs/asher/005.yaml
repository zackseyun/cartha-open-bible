    changes_summary: 'Adjusted several phrases for closer lexical correspondence: ''in everything'' to ''in all things,'' ''wealth-getting'' to ''wealth,'' ''follows'' to ''succeeds'' where διαδέχεται is used, simplified paired clauses in v.2 to match the Greek, ''So then'' to ''Therefore,'' and ''sought out''/''with all my strength'' to ''sought''/''according to all my strength'' for a more formal and literal rendering.'
translation:
  language: es
  text: '1. Miren, hijos míos, cómo hay dos en todas las cosas, uno frente al otro, y uno está oculto bajo el otro: en la riqueza, la codicia[a]; en la alegría, la embriaguez; en la risa, la tristeza; en el matrimonio, el libertinaje. 2. A la vida le sucede la muerte, a la gloria la deshonra, al día la noche, a la luz las tinieblas; pero todas las cosas están bajo el día[b]: las cosas justas bajo la vida, y las cosas injustas bajo la muerte. Por eso la vida eterna también aguarda a la muerte[c]. 3. Y no se puede llamar a la verdad mentira, ni a lo justo injusto, porque toda verdad está bajo la luz, así como todas las cosas están bajo Dios. 4. Por tanto, yo puse a prueba todas estas cosas en mi vida, y no me extravié de la verdad de Yahvé[d], y busqué los mandamientos del Altísimo, caminando con toda mi fuerza.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'avaricia' para πλεονεξία (gr. πλεονεξία). El término abarca tanto la codicia como la avaricia en sentido amplio.
    reason: lexical_alternative
  - marker: b
    text: 'El lenguaje repetido de «bajo» (gr. ὑπό) en este capítulo designa probablemente un dominio moral o cósmico: «bajo el día… bajo la vida… bajo la muerte… bajo la luz… bajo Dios». El español mantiene la preposición literal en lugar de interpretar la relación como pertenencia o sujeción.'
    reason: cultural_note
  - marker: c
    text: 'La frase es textual y conceptualmente difícil. La traducción preserva la formulación griega (ἡ αἰώνιος ζωὴ ἀναμένει τὸν θάνατον: la vida eterna aguarda a la muerte) en lugar de parafrasear su sentido en dirección soteriológica.'
    reason: textual_variant
  - marker: d
    text: Gr. Κυρίου. En los escritos pseudoepígrafos judíos, Κύριος sustituye habitualmente al nombre divino YHWH. Siguiendo la convención del proyecto POB, se traduce «Yahvé» en lugar de enmascarar el nombre como «el Señor».
    reason: theological_note
lexical_decisions:
- source_word: Ὁρᾶτε
  english_pob_choice: See
  chosen_spanish: Mirad
  alternatives_spanish:
  - Ved
  - Observad
  lexicon: LSJ
  rationale: Imperativo plural de apertura en exhortación paternal directa. 'Mirad' es la forma más natural y viva en español neutro moderno; 'Ved' resulta más arcaico y 'Observad' pierde la urgencia directiva del griego.
- source_word: τέκνα
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - hijos
  - vosotros, hijos míos
  lexicon: LSJ
  rationale: Mantiene el vínculo afectivo propio del vocativo testamentario. El posesivo 'míos' está implícito en la situación enunciativa de Asher como padre que habla y es la forma más idiomática del español para el apóstrofe directo.
- source_word: ἐν τῇ κτίσει
  english_pob_choice: in wealth
  chosen_spanish: en la riqueza
  alternatives_spanish:
  - en la adquisición de bienes
  - en los bienes materiales
  - en la posesión
  lexicon: LSJ
  rationale: κτίσει (dat. de κτίσις) puede leerse como una forma de κτῆσις (posesión, riqueza; cf. LSJ κτῆσις II) en este contexto vice-catálogo. 'En la riqueza' sigue la lectura del inglés POB ('wealth') y contextualiza la codicia oculta en la prosperidad material. Si la lectura es κτίσις en sentido de 'creación', habría que reconsiderar, pero el paralelismo retórico con los otros términos favorece la lectura de adquisición/riqueza.
- source_word: πλεονεξία
  english_pob_choice: greed
  chosen_spanish: codicia
  alternatives_spanish:
  - avaricia
  - ambición desmedida
  lexicon: BDAG
  rationale: '''Codicia'' cubre tanto la avaricia como el deseo excesivo de lo ajeno, alineándose con el rango semántico de πλεονεξία en BDAG (avariciousness, greediness, desire to have more). Es el equivalente moderno más amplio en español neutro. Ver nota [a].'
- source_word: εὐφροσύνη
  english_pob_choice: merriment
  chosen_spanish: alegría
  alternatives_spanish:
  - regocijo
  - jolgorio
  - festejo
  lexicon: LSJ
  rationale: '''Alegría'' es el término más natural y digno; ''jolgorio'' acercaría más la noción festiva de ''merriment'' pero tiene connotación coloquial. El contraste moral con la embriaguez oculta funciona igualmente bien con ''alegría''.'
- source_word: μέθη
  english_pob_choice: drunkenness
  chosen_spanish: embriaguez
  alternatives_spanish:
  - borrachera
  - ebriedad
  lexicon: BDAG
  rationale: '''Embriaguez'' es el término más digno y preciso para un texto moral de género testamentario; evita el coloquialismo de ''borrachera'' y es más específico que ''ebriedad''.'
- source_word: πένθος
  english_pob_choice: grief
  chosen_spanish: tristeza
  alternatives_spanish:
  - duelo
  - lamento
  - pesar
  lexicon: LSJ
  rationale: El inglés POB eligió 'grief' sobre 'mourning' para evitar la connotación ritualizada. 'Tristeza' sigue esa decisión; 'duelo' sonaría demasiado ceremonial/ritual en español, mientras que 'tristeza' designa un estado anímico interior que contrasta naturalmente con la risa.
- source_word: ἀσωτία
  english_pob_choice: debauchery
  chosen_spanish: libertinaje
  alternatives_spanish:
  - disolución
  - vida disipada
  - licencia moral
  lexicon: BDAG
  rationale: 'En el contexto del matrimonio, ἀσωτία designa exceso moral y licencia sexual/moral (BDAG: debauchery, dissipation). ''Libertinaje'' comunica esa fuerza de vicio moral sin tecnicismos; ''disolución'' es más abstracto.'
- source_word: διαδέχεται
  english_pob_choice: succeeds
  chosen_spanish: le sucede
  alternatives_spanish:
  - sigue a
  - viene tras
  lexicon: LSJ
  rationale: La revisión inglesa cambió 'follows' por 'succeeds' para mayor cercanía léxica con διαδέχεται (succeed to, take over). La construcción 'A la vida le sucede la muerte' es idiomática y rítmica en español, con el dativo de interés reforzando la idea de sucesión.
- source_word: τὰ δὲ πάντα ὑπὸ ἡμέραν εἰσίν
  english_pob_choice: but all things are under the day
  chosen_spanish: pero todas las cosas están bajo el día
  alternatives_spanish:
  - pero todo está bajo el día
  - pero todo pertenece al día
  lexicon: LSJ
  rationale: Preserva la estructura ὑπό repetida en el capítulo. 'Bajo el día' es algo inusual en español, como lo es en inglés 'under the day', pero la opción de preservar la literalidad es defendida por ambas decisiones POB; la alternativa idiomática 'pertenece al día' colapsaría la metáfora espacial/cosmológica en una sola interpretación.
- source_word: τὰ δίκαια / τὰ ἄδικα
  english_pob_choice: righteous things / unrighteous things
  chosen_spanish: las cosas justas / las cosas injustas
  alternatives_spanish:
  - lo justo / lo injusto
  - los actos rectos / los actos inicuos
  lexicon: BDAG
  rationale: El plural neutro griego designa categorías morales de actos/realidades, no personas. 'Las cosas justas/injustas' preserva esa ambigüedad categorial frente a 'los justos/injustos' (que remitiría a personas), siguiendo la decisión inglesa POB de usar neuter plural como categoría.
- source_word: ἀναμένει
  english_pob_choice: awaits
  chosen_spanish: aguarda
  alternatives_spanish:
  - espera
  - está a la espera de
  lexicon: BDAG
  rationale: '''Aguarda'' es más formal y menos coloquial que ''espera'', apropiado para el tono del texto testamentario. Conserva la formulación paradójica sin resolverla interpretativamente, conforme a la decisión teológica del inglés POB.'
- source_word: τοῦ Θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Traducción directa y estándar. El texto griego distingue entre Θεός (v.3) y Κύριος (v.4); la distinción se mantiene en español como 'Dios' y 'el Señor' respectivamente.
- source_word: ἐδοκίμασα
  english_pob_choice: I tested
  chosen_spanish: puse a prueba
  alternatives_spanish:
  - examiné
  - comprobé
  - probé
  lexicon: BDAG
  rationale: '''Puse a prueba'' transmite el carácter experiencial de δοκιμάζω: el patriarca verificó estas verdades en su propia vida (BDAG: to try to learn the genuineness of something). ''Probé'' sería más corto pero puede confundirse con ''demostré''.'
- source_word: οὐκ ἐπλανήθην
  english_pob_choice: I did not go astray
  chosen_spanish: no me aparté
  alternatives_spanish:
  - no me extravié
  - no me desvié
  lexicon: BDAG
  rationale: Preserva la metáfora del camino moral. 'No me aparté' (no me desvié del camino) es ligeramente más natural en español culto que 'no me extravié', y mantiene la imagen de un desplazamiento moral deliberado.
- source_word: ἐξεζήτησα
  english_pob_choice: sought
  chosen_spanish: busqué
  alternatives_spanish:
  - busqué con diligencia
  - procuré
  - escudriñé
  lexicon: LSJ
  rationale: La revisión inglesa ajustó 'sought out' a 'sought'. 'Busqué' refleja esa lectura revisada. El compuesto griego ἐκζητέω sugiere búsqueda intensa; si se desea capturar esa fuerza, 'busqué con diligencia' es la alternativa natural en español.
- source_word: κατὰ πᾶσαν ἰσχύν μου
  english_pob_choice: according to all my strength
  chosen_spanish: con todas mis fuerzas
  alternatives_spanish:
  - según todas mis fuerzas
  - con todo mi vigor
  lexicon: BDAG
  rationale: El inglés revisado usa 'according to all my strength' como traducción más literal de κατά. En español, 'con todas mis fuerzas' es el giro idiomático natural para esta expresión; 'según toda mi fuerza' sería más calco pero menos natural. El campo semántico de κατά instrumental lo cubre 'con' en español.
- source_word: πορευόμενος
  english_pob_choice: walking
  chosen_spanish: caminando
  alternatives_spanish:
  - conduciendo mi vida
  - andando
  lexicon: BDAG
  rationale: Mantiene la metáfora ética de la vida como camino (halakhá), frecuente en la literatura parenética judía y en los Testamentos. 'Caminando' es la traducción participial más directa.
- source_word: Κύριος (τῆς ἀληθείας Κυρίου)
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: BDAG
  rationale: El texto fuente es griego (Κυρίου). El proyecto POB reserva 'Yahvé' para el Tetragrámaton hebreo o para κύριος que cite o aluda directamente al nombre divino en contexto de cita textual. En este texto extra-canónico griego no se edita desde un original hebreo con YHWH verificable en esta edición Charles 1908; se usa 'el Señor' conforme al uso griego. Ver nota [d] y decisión teológica.
- source_word: τοῦ ὑψίστου
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Excelso
  - el Supremo
  lexicon: BDAG
  rationale: Título divino estándar; 'el Altísimo' es la traducción establecida en español bíblico para ὕψιστος y es inmediatamente reconocible en el registro eclesiástico amplio.
theological_decisions:
- issue: Interpretación de la paradoja διὸ καὶ τὸν θάνατον ἡ αἰώνιος ζωὴ ἀναμένει
  english_pob_reading: Therefore eternal life also awaits death.
  chosen_spanish_reading: Por eso la vida eterna también aguarda a la muerte.
  alternative_spanish_readings:
  - Por eso la muerte también aguarda a la vida eterna.
  - Por eso, más allá de la muerte, la vida eterna aguarda.
  - Por eso, a la muerte también le espera la vida eterna.
  rationale: La sintaxis griega hace de ἡ αἰώνιος ζωὴ el sujeto nominativo y τὸν θάνατον el objeto acusativo. El español preserva esa paradoja en su literalidad ('la vida eterna aguarda a la muerte') sin reencuadrarla soteriológicamente. La revisión inglesa POB (2026-04-23) mantuvo esta formulación explícitamente. Traducir 'a la muerte también le espera la vida eterna' resolvería la tensión en la dirección esperada pero traicionaría la apertura deliberada del texto griego.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
- issue: Fuerza de las frases ὑπό repetidas en los contrastes moral-cosmológicos
  english_pob_reading: Retain 'under' language in the main text.
  chosen_spanish_reading: Mantener 'bajo' como preposición en todas las apariciones del patrón ὑπό en el capítulo.
  alternative_spanish_readings:
  - pertenece a / está del lado de
  - se halla en el ámbito de
  - está sujeto a
  rationale: 'El capítulo construye una secuencia retórica acumulativa con ὑπό: ''bajo el día'', ''bajo la vida'', ''bajo la muerte'', ''bajo la luz'', ''bajo Dios''. Preservar ''bajo'' en español mantiene esa textura y deja abierta la metáfora espacial/cosmológica. Traducir ''pertenece a'' o ''está en el ámbito de'' colapsaría la tensión del original en una sola interpretación de dominio moral, cerrando preguntas que el texto prefiere dejar abiertas.'
  doctrine_reference: DOCTRINE.md §Original-language primacy over translation tradition
- issue: 'Uso de Κύριος en un texto extra-canónico griego: ¿''Yahvé'' o ''el Señor''?'
  english_pob_reading: the truth of the Lord
  chosen_spanish_reading: la verdad del Señor
  alternative_spanish_readings:
  - la verdad de Yahvé
  rationale: El texto fuente es la versión griega del Testamento de Aser (Charles 1908); el griego tiene Κυρίου. El proyecto POB reserva 'Yahvé' para el Tetragrámaton hebreo (יהוה) o para κύριος que cite directamente el nombre divino en contexto de cita textual verificable. En este texto extra-canónico la edición de trabajo es la griega, y no se dispone de un texto semítico subyacente con YHWH en esta edición. Por tanto, se usa 'el Señor' como equivalente del griego Κύριος. Si en una revisión futura se coteja con evidencia de un Vorlage hebreo/arameo, la terminología deberá reconsiderarse.
  doctrine_reference: DOCTRINE.md §Yahvé/YHWH rendering policy; §Source-text primacy in extra-canonical books
translation_notes:
  revision_awareness: 'La revisión inglesa de 2026-04-23 (gpt-5.4) ajustó varias frases para mayor cercanía léxica: ''in everything'' → ''in all things'' (reflejado en ''en todas las cosas''); ''wealth-getting'' → ''wealth'' (reflejado en ''en la riqueza''); ''follows'' → ''succeeds'' para διαδέχεται (reflejado en ''le sucede''); ''So then'' → ''Therefore'' para el inicio de v.4 (reflejado en ''Por tanto''); ''sought out'' → ''sought'' (reflejado en ''busqué''); ''with all my strength'' → ''according to all my strength'' (reflejado en ''con todas mis fuerzas'', usando ''con'' como equivalente idiomático de κατά instrumental en lugar del calco ''según''). La presente traducción española sigue las lecturas revisadas en todos los puntos, con la única adaptación idiomática de ''con todas mis fuerzas'' frente al más literal ''según toda mi fuerza''.'
  spanish_consistency_notes:
  - Se mantiene 'bajo' (preposición) para ὑπό en todas sus apariciones del capítulo (vv. 2–3), preservando la textura retórica acumulativa del original griego y evitando colapsar la metáfora en una única interpretación de dominio moral.
  - El texto griego distingue entre Θεός (v.3) y Κύριος (v.4); la distinción se preserva en español como 'Dios' y 'el Señor' respectivamente, sin homogeneizar los títulos divinos.
  - τὰ δίκαια / τὰ ἄδικα se rinden como 'las cosas justas / las cosas injustas' (categorías neutras) y no como 'los justos / los injustos' (personas), preservando la ambigüedad del plural neutro griego.
  - El Altísimo (τοῦ ὑψίστου) se mantiene como título divino fijo en español bíblico neutro, coherente con el uso en otros libros del proyecto.
  - La metáfora del camino moral (πορευόμενος → 'caminando') se preserva literalmente, como en el inglés POB, sin sustituirla por 'conduciendo mi vida' u otras perífrasis explicativas.
