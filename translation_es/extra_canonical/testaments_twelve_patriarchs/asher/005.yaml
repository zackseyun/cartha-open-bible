base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/005.yaml
  text: '1[a]. See, my children, how there are two in all things, one opposite the other, and one is hidden under the other: in wealth, greed; in merriment, drunkenness; in laughter, grief[b]; in marriage, debauchery. 2. Death succeeds life, dishonor glory, night day, darkness light; but all things are under the day: righteous things under life, and unrighteous things under death. Therefore eternal life also awaits death. 3. And one cannot say that truth is falsehood, nor that what is righteous is unrighteous, because all truth is under the light, just as all things are under God. 4. Therefore I tested all these things in my life, and I did not go astray from the truth of the Lord, and I sought the commandments of the Most High[c], walking according to all my strength.'
  footnotes:
  - marker: a
    text: Or 'covetousness' for greed (πλεονεξία).
    reason: lexical_alternative
  - marker: b
    text: The line 'eternal life also awaits death' is textually and conceptually difficult; the translation preserves the Greek wording rather than paraphrasing the sense.
    reason: textual_variant
  - marker: c
    text: 'Repeated ''under'' language in this chapter likely marks moral or cosmic domain: ''under the day ... under life ... under death ... under the light ... under God.'''
    reason: cultural_note
  ai_draft:
    model_id: gpt-5.4
