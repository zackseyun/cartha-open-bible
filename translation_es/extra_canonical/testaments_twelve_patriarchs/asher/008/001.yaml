translation:
  language: es
  text: 'Y habiendo dicho estas cosas a ellos, les ordenó, diciendo: «Entierrenme en Hebrón». Y murió, habiendo dormido un buen sueño[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase griega ὕπνῳ καλῷ κοιμηθείς emplea un dativo cognado (durmiendo un sueño), figura semítica común en textos influenciados por la LXX. El obelisco (†) que precede a ὕπνῳ en la edición Charles 1908 señala una posible variante o problema textual en el testimonio manuscrito; la expresión se conserva como aparece en esa edición. El verbo κοιμάομαι funciona también como eufemismo de la muerte en la literatura judía del Segundo Templo.
    reason: textual_variant
lexical_decisions:
- source_word: εἰπὼν αὐτοῖς ταῦτα
  english_pob_choice: after saying these things to them
  chosen_spanish: habiendo dicho estas cosas a ellos
  alternatives_spanish:
  - después de decirles estas cosas
  - tras decirles estas cosas
  lexicon: 'BDAG: λέγω, aorist participle εἰπών — temporal or circumstantial subordinate action prior to the main verb'
  rationale: The aorist participle εἰπὼν expresses action prior to and logically leading into ἐνετείλατο. 'Habiendo dicho' preserves this perfective-temporal force more precisely than 'después de decir,' which risks losing the participial subordination. Spanish 'habiendo + participio' is the standard equivalent for a Greek aorist participle of antecedent circumstance.
- source_word: ἐνετείλατο
  english_pob_choice: he commanded them
  chosen_spanish: les ordenó
  alternatives_spanish:
  - les mandó
  - les encargó
  lexicon: 'BDAG: ἐντέλλομαι — to give authoritative instructions, command, order'
  rationale: '''Ordenó'' conveys the authoritative, directive force of ἐντέλλομαι (used for patriarchal deathbed instructions throughout the Testaments of the Twelve Patriarchs). ''Mandó'' is a viable synonym; ''encargó'' would soften the directiveness unnecessarily.'
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: 'BDAG: λέγω, present participle λέγων — contemporaneous action, introducing direct speech'
  rationale: The present participle λέγων introduces the direct quotation and is retained as 'diciendo' to preserve the Greek's explicit speech-introduction marker and avoid flattening the double-verb construction (commanded … saying).
- source_word: Θάψατέ με
  english_pob_choice: Bury me
  chosen_spanish: Enterradme
  alternatives_spanish:
  - Sepultadme
  - Dadle sepultura a mi cuerpo
  lexicon: 'BDAG: θάπτω — to bury, provide burial for a corpse; aorist imperative 2nd plural'
  rationale: '''Enterrad'' is the natural modern Spanish rendering of θάπτω in this funerary context; ''sepultad'' is equally precise but slightly more literary. The clitic ''-me'' attached to the imperative is the standard Spanish construction for the reflexive/dative object. The aorist imperative plural addresses the family members present at the deathbed scene.'
- source_word: Χεβρών
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  lexicon: Standard transliteration of Hebrew חֶבְרוֹן into Greek Χεβρών
  rationale: '''Hebrón'' is the established Spanish form of this patriarchal burial site (cf. Gen 23:19; 49:29–31 in Spanish Bibles). No alternative is contextually warranted.'
- source_word: ἀπέθανεν
  english_pob_choice: he died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  lexicon: 'BDAG: ἀποθνῄσκω — to die; aorist indicative 3rd singular'
  rationale: '''Murió'' is the direct, unadorned equivalent; ''falleció'' would add a register of politeness not present in the source.'
- source_word: †ὕπνῳ καλῷ κοιμηθείς
  english_pob_choice: having fallen asleep in a good sleep
  chosen_spanish: habiendo dormido un buen sueño
  alternatives_spanish:
  - habiéndose dormido con un sueño apacible
  - durmiéndose en un sueño hermoso
  lexicon: 'BDAG: κοιμάομαι — to sleep; frequently used as euphemism for death (cf. John 11:11; 1 Cor 15:6); ὕπνος — sleep, slumber. Dative ὕπνῳ καλῷ is a cognate dative (internal dative) after κοιμηθείς.'
  rationale: 'The Greek deploys a cognate dative construction (κοιμηθείς ὕπνῳ: ''having slept a sleep''), a Semitism common in LXX-influenced texts. Spanish ''habiendo dormido un buen sueño'' reproduces this cognate figure naturally — Spanish ''dormir un sueño'' is idiomatic — and retains the euphemistic overtone of κοιμάομαι (death as sleep). ''Sueño'' captures both the literal sleep-imagery and the peaceful-death idiom. The source-text dagger (†) is addressed in footnote [a].'
theological_decisions:
- issue: κοιμηθείς as death euphemism
  english_pob_reading: having fallen asleep in a good sleep
  chosen_spanish_reading: habiendo dormido un buen sueño
  alternative_spanish_readings:
  - habiéndose dormido apaciblemente
  - descansando en paz
  rationale: 'Throughout Second Temple Jewish literature and the Testaments of the Twelve Patriarchs, κοιμάομαι functions as a dignified euphemism for death (cf. T. Sim. 8:2; T. Levi 19:5; LXX Gen 47:30). The cognate dative ὕπνῳ καλῷ intensifies the peaceful, honorable quality of the patriarch''s passing. ''Habiendo dormido un buen sueño'' preserves the double register: literal sleep-imagery and the peaceful death of a righteous patriarch. Replacing this with a paraphrase like ''descansando en paz'' would erase the textual idiom and over-Christianize a Jewish compositional convention.'
  doctrine_reference: Patriarchal deathbed scene (T12P genre convention); cf. peaceful-death idiom in LXX Gen 47:30 (κοιμηθήσομαι μετὰ τῶν πατέρων μου)
translation_notes:
  revision_awareness: La revisión aplicada (2026-05-03, azure-gpt-5.4-mini) eliminó un marcador de nota al pie del texto inglés sin alterar la traducción de fondo. La versión española no depende de ese marcador suprimido; todas las decisiones léxicas y textuales relevantes (incluido el obelisco del texto griego) quedan documentadas en las notas de la presente ficha española.
  spanish_consistency_notes:
  - No aparecen en este versículo nombres divinos (יהוה/κύριος/θεός), por lo que los valores predeterminados del proyecto para 'Yahvé' y 'Dios' no tienen aplicación aquí.
  - El topónimo Χεβρών se vierte como 'Hebrón', forma canónica en el español bíblico.
  - Las particulas aoristas griegas se traducen sistemáticamente con la construcción española 'habiendo + participio' para preservar la subordinación temporal y perfectiva.
  - El participio κοιμηθείς no se colapsa en una glosa cristiana ('descansó en el Señor', etc.) en coherencia con la política del POB de no sobreinterpretar el sustrato teológico del texto fuente.
