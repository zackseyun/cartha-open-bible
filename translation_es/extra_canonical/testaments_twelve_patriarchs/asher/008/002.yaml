translation:
  language: es
  text: Y sus hijos hicieron todo cuanto les había mandado, y lo trasladaron a Hebrón y lo sepultaron con sus padres.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅσα (hosa)
  english_pob_choice: as he had commanded
  chosen_spanish: todo cuanto
  alternatives_spanish:
  - lo que
  - cuanto
  lexicon: 'BDAG ὅσος 1b: neuter plural relative pronoun denoting ''all that / as many things as''; carries a completeness nuance'
  rationale: ὅσα is a totality relative pronoun (not simply ὅ 'what'). 'Todo cuanto' preserves this completive force — the sons did the full scope of what he commanded — without paraphrase. Bare 'lo que' would flatten the quantitative nuance.
- source_word: ἐνετείλατο (eneteilato)
  english_pob_choice: he had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había encargado
  - les encomendó
  lexicon: 'BDAG ἐντέλλομαι 1: to give orders/instructions, command; aorist middle'
  rationale: ἐνετείλατο (aorist middle of ἐντέλλομαι) denotes a formal charge or solemn command given prior to the death narrated in context. Spanish pluperfect 'había mandado' correctly signals prior-action sequencing. 'Ordenado' or 'encargado' are acceptable synonyms; 'mandado' is the most direct and widely intelligible rendering across Latin American registers.
- source_word: ἀπήγαγον (apēgagon)
  english_pob_choice: they carried him away
  chosen_spanish: lo trasladaron
  alternatives_spanish:
  - lo llevaron
  - lo condujeron
  lexicon: 'BDAG ἀπάγω 1: to lead or take away from one place to another; aorist active 3rd plural'
  rationale: ἀπάγω connotes transport/conveyance away from a point of origin. In a burial context, 'trasladaron' (to transfer/transport remains) is more precise and dignified than the general 'llevaron'. The English POB 'carried him away' is idiomatic; the Spanish 'trasladaron' matches the source's directional force without over-specifying.
- source_word: ἔθαψαν (etapsan)
  english_pob_choice: buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  lexicon: 'BDAG θάπτω 1: to bury a dead body; aorist active 3rd plural'
  rationale: '''Sepultaron'' (from sepultar) is the dignified register for formal interment, matching the solemn burial context and biblical idiom. ''Enterraron'' is a valid synonym but slightly more colloquial; ''sepultaron'' better reflects the gravity of a patriarchal burial.'
- source_word: ἐν Χεβρών (en Chebrōn)
  english_pob_choice: to Hebron
  chosen_spanish: a Hebrón
  alternatives_spanish:
  - en Hebrón
  lexicon: Χεβρών = Hebron; ἐν used directionally (common in Hellenistic Greek)
  rationale: The Greek ἐν here functions directionally ('to/at Hebron') as is common in Hellenistic narrative. Spanish 'a Hebrón' renders the directional sense naturally. 'En Hebrón' would suggest static location; 'a Hebrón' correctly expresses movement toward the burial site. 'Hebrón' is the standard modern Spanish form of the place name.
- source_word: μετὰ τῶν πατέρων αὐτοῦ
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - junto a sus padres
  lexicon: 'πατήρ (pl. πατέρες): fathers/ancestors; standard biblical burial formula'
  rationale: '''Con sus padres'' renders the standard Hebrew-origin burial formula (cf. Gen 47:30; Judg 2:10 LXX: μετὰ τῶν πατέρων αὐτοῦ) exactly as it appears in biblical Spanish tradition. ''Antepasados'' (ancestors) would be semantically accurate but breaks the recognizable formulaic phrase; ''padres'' is idiomatic in this biblical register and broadly understood to mean forefathers.'
translation_notes:
  revision_awareness: The latest English POB revision pass (gpt-5.4-mini, 2026-05-03) found no changes needed; the cross-check returned high agreement (0.93) with minor issues only. The English text is stable. The Spanish draft follows the settled English rendering and the Greek source directly; no revision-driven adjustments were required. The superscript numerals (⁸–¹²) in the source Greek are Charles 1908 apparatus markers for manuscript variants, not content footnotes; they carry no translation weight and are not reproduced in the Spanish text.
  spanish_consistency_notes:
  - '''Hebrón'' is used consistently as the standard Spanish transliteration of Χεβρών / חֶבְרוֹן throughout the POB project.'
  - '''Sepultaron'' is preferred over ''enterraron'' for formal burial scenes in this corpus to maintain register consistency with other patriarchal burial narratives.'
  - The burial formula 'con sus padres' is rendered literally throughout the Testaments of the Twelve Patriarchs to preserve its formulaic biblical character.
  - No divine name (יהוה / κύριος) appears in this verse; the Yahvé default does not apply.
