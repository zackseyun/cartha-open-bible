id: T12P.ASH.6.4
reference: Testament of Asher 6:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: Ὅτι τὰ τέλη τῶν ἀνθρώπων δεικνύουσι¹⁷ τὴν δικαιοσύνην αὐτῶν¹⁸, *καὶ †γνωρίζονται¹⁹ *τοῖς ἀγγέλοις²⁰ Κυρίου, καὶ τοῦ Βελίαρ²¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/006/004.yaml
  text: For the ends of men reveal their righteousness, and they are made known to the angels of the Lord and to Beliar.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:53Z'
    unchanged: false
    changes_summary: Added ‘to’ before ‘Beliar’ to reflect the Greek dative construction (τοῖς ἀγγέλοις Κυρίου, καὶ τοῦ Βελίαρ) more explicitly and consistently.
translation:
  language: es
  text: Porque los fines[a] de los hombres revelan su rectitud[b], y son dados a conocer[c] a los ángeles de Yahvé[d] y de Beliar[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Gr. τέλη (pl. de τέλος): abarca tanto ''fines/resultados últimos'' como ''propósitos/metas de vida.'' La ambigüedad es productiva en el contexto sapiencial del Testamento.'
    reason: lexical_alternative
  - marker: b
    text: 'Gr. δικαιοσύνην: ''rectitud moral,'' calidad ética del carácter. Alternativa: ''justicia.'' Aquí se prefiere ''rectitud'' por el énfasis en la integridad personal más que en un veredicto forense.'
    reason: lexical_alternative
  - marker: c
    text: 'Gr. γνωρίζονται, pasivo de γνωρίζω: ''son dados a conocer'' — el pasivo sin agente explícito preserva la indeterminación del texto: no se especifica quién los revela, sino que la revelación ocurre (probablemente en la muerte o el juicio).'
    reason: textual_variant
  - marker: d
    text: Gr. Κυρίου (genitivo de Κύριος). El T12P es una composición judía cuyo original hebreo/arameo usaría probablemente יהוה (YHWH); el griego Κύριος es sustituto convencional. Siguiendo la política del POB, se traduce 'Yahvé' en lugar de perpetuar la convención enmascarante 'Señor.'
    reason: theological_note
  - marker: e
    text: 'Gr. τοῖς ἀγγέλοις Κυρίου, καὶ τοῦ Βελίαρ: ambos genitivos (Κυρίου y τοῦ Βελίαρ) modifican ἀγγέλοις, no al propio Beliar como receptor dativo independiente. La revisión inglesa del 03-05-2026 introdujo ''to Beliar'' como si fuera un destinatario dativo separado, pero la sintaxis griega apoya ''ángeles de Beliar'' en paralelo con ''ángeles de Yahvé.'' La revisión fue marcada como ''needs-revision'' (acuerdo 0,7) en la verificación cruzada.'
    reason: textual_variant
lexical_decisions:
- source_word: τέλη (τέλος)
  english_pob_choice: ends
  chosen_spanish: fines
  alternatives_spanish:
  - desenlaces
  - destinos
  - resultados finales
  lexicon: 'BDAG τέλος 1–3: end, outcome, goal, fate'
  rationale: τέλος (pl. τέλη) carries productive ambiguity between 'final outcomes/deaths' and 'purposes/goals.' The English POB preserves this with 'ends.' Spanish 'fines' replicates the same ambiguity — referring both to ultimate outcomes (including death) and to the moral trajectory of a life — without collapsing either sense. 'Desenlaces' (denouements) or 'destinos' would flatten toward one reading.
- source_word: δικαιοσύνην (δικαιοσύνη)
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - inocencia
  - integridad
  lexicon: 'BDAG δικαιοσύνη 2: uprightness, rectitude as quality of character'
  rationale: The project defaults allow 'justicia' or 'rectitud' by context. Here the context is the moral character of a person revealed at the end of their life — a personal, ethical quality rather than a forensic verdict or social justice. 'Rectitud' (uprightness, moral integrity) better captures the personal/ethical force in this wisdom context. 'Justicia' would imply a judicial outcome more strongly than the source warrants.
- source_word: δεικνύουσι (δείκνυμι)
  english_pob_choice: reveal
  chosen_spanish: revelan
  alternatives_spanish:
  - muestran
  - manifiestan
  - ponen de manifiesto
  lexicon: 'BDAG δείκνυμι 1–2: show, demonstrate, make visible'
  rationale: '''Revelan'' is the closest natural Spanish equivalent and mirrors the English POB choice. ''Muestran'' is slightly more neutral; ''manifiestan'' is more formal. ''Revelan'' carries the sense of uncovering what was previously hidden, appropriate in this judgment-disclosure context.'
- source_word: γνωρίζονται (γνωρίζω, passive)
  english_pob_choice: are made known
  chosen_spanish: son dados a conocer
  alternatives_spanish:
  - son conocidos
  - se hacen conocidos
  - quedan manifiestos
  lexicon: 'BDAG γνωρίζω 2: to make known, to cause to be known (passive: to be made known)'
  rationale: 'The passive voice is theologically significant: persons do not reveal themselves to the angels; they are disclosed to them — presumably at death or judgment. ''Son dados a conocer'' renders the passive force explicitly. ''Son conocidos'' (are known) is less marked for the moment of disclosure. The agentless passive in Greek is preserved by not supplying an agent in Spanish.'
- source_word: τοῖς ἀγγέλοις Κυρίου, καὶ τοῦ Βελίαρ
  english_pob_choice: to the angels of the Lord and to Beliar
  chosen_spanish: a los ángeles de Yahvé y de Beliar
  alternatives_spanish:
  - a los ángeles del Señor y a Beliar
  - a los ángeles del Señor y a los de Beliar
  lexicon: BDAG ἄγγελος 1; τοῖς ἀγγέλοις is dative plural governed by γνωρίζονται; Κυρίου and τοῦ Βελίαρ are both genitives modifying ἀγγέλοις
  rationale: 'Greek syntax: the dative τοῖς ἀγγέλοις is the indirect object of γνωρίζονται; both Κυρίου and τοῦ Βελίαρ are genitives of possession/origin modifying ἀγγέλοις. This yields ''the angels of the Lord and [the angels] of Beliar'' — two angelic groups, not ''the angels of the Lord'' plus a separately named individual ''Beliar.'' The English POB revision (2026-05-03) altered ''of Beliar'' to ''to Beliar,'' treating Beliar as a second dative recipient, but τοῦ Βελίαρ is grammatically genitive and syntactically parallel to Κυρίου. The Spanish ''a los ángeles de Yahvé y de Beliar'' restores the genitive-parallel structure faithful to the Greek, with ''a'' supplying the dative force over the entire phrase.'
- source_word: Κυρίου (Κύριος, genitive)
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Adonai
  lexicon: 'BDAG κύριος 2c: the Lord, divine name-substitute for YHWH'
  rationale: Per project default, the divine name is rendered 'Yahvé' rather than 'Señor' as a masking convention. The source is Greek Κύριος (not directly Hebrew יהוה), but the T12P is generally considered a Jewish composition originally written in Hebrew or Aramaic, where Κύριος translates YHWH. The footnote [d] documents this decision for transparency. 'Señor' would perpetuate the masking convention the POB project explicitly rejects.
theological_decisions:
- issue: 'Κύριος vs. YHWH: divine name in a Greek-source text'
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: The T12P is a Jewish pseudepigraphon widely understood to derive from Hebrew/Aramaic originals in which YHWH (יהוה) was the divine name. The Greek Κύριος here functions as a standard substitute for that name. The POB project uses 'Yahvé' to make this transparent rather than perpetuating the liturgical masking of 'Señor.' A footnote explains the Greek source form.
  doctrine_reference: 'POB project default: יהוה → ''Yahvé''; if source is Greek κύριος alluding to the divine name, explain the decision.'
- issue: 'Dual angelology: angels of Yahvé and angels of Beliar'
  english_pob_reading: the angels of the Lord and to Beliar
  chosen_spanish_reading: los ángeles de Yahvé y de Beliar
  alternative_spanish_readings:
  - los ángeles del Señor y de Beliar
  - los ángeles del Señor y a Beliar
  rationale: 'The T12P consistently presents a two-realm cosmology: angelic servants of God and demonic servants of Beliar observe and record human moral conduct, especially at life''s end. This verse is a key expression of that cosmology. The Spanish preserves both genitive constructions (''de Yahvé y de Beliar'') to make clear that both refer to angels (not one angelic group plus Beliar himself as a separate observer). The English POB revision''s ''to Beliar'' risks flattening ''angels of Beliar'' into ''Beliar'' as a direct recipient, which the Greek does not support syntactically.'
  doctrine_reference: 'T12P cosmology: two-spirits/two-angel framework; see also T.Asher 1:3-5, T.Judah 20:1-2.'
- issue: 'English POB revision: ''of Beliar'' changed to ''to Beliar'' — syntactic concern'
  english_pob_reading: to Beliar (revised 2026-05-03 from 'of Beliar')
  chosen_spanish_reading: de Beliar (genitive, modifying 'ángeles')
  alternative_spanish_readings:
  - a Beliar (treating as separate dative recipient)
  rationale: 'The applied revision added ''to'' before ''Beliar'' arguing for the Greek dative construction, but τοῦ Βελίαρ is genitive, not dative. The dative element is τοῖς ἀγγέλοις (the angels are the dative/indirect object). Beliar''s genitive is coordinate with Κυρίου, both modifying ἀγγέλοις. The cross-check flagged this as ''needs-revision'' with only 0.7 agreement. The Spanish returns to the syntactically grounded reading: ''a los ángeles de Yahvé y de Beliar.'' A footnote [e] documents this divergence from the current English POB text.'
  doctrine_reference: 'Cross-check status: needs_review; verdict: needs-revision (claude-opus-4-7[1m]).'
translation_notes:
  revision_awareness: 'La revisión inglesa del 03-05-2026 cambió ''of Beliar'' por ''to Beliar'' alegando el dativo griego, pero τοῦ Βελίαρ es genitivo y modifica ἀγγέλοις. La verificación cruzada lo marcó ''needs-revision'' (acuerdo 0,7). El español retorna a la lectura gramaticalmente fiel: ''a los ángeles de Yahvé y de Beliar,'' con ambos genitivos dependiendo de ángeles; véase nota [e].'
  spanish_consistency_notes:
  - 'Yahvé: usado según la política del proyecto (no ''Señor'') para Κύριος cuando representa al nombre divino; documentado en nota [d].'
  - 'Rectitud: preferido sobre ''justicia'' para δικαιοσύνη en contexto de carácter moral personal; documentado en nota [b].'
  - 'Fines: preserva la ambigüedad de τέλη (resultados últimos / propósitos); documentado en nota [a].'
  - 'Beliar: nombre propio mantenido sin artículo en español (''de Beliar'', no ''del Beliar''), como es la convención estándar para nombres propios en español.'
  - La construcción pasiva 'son dados a conocer' conserva el pasivo sin agente del griego γνωρίζονται, evitando añadir un agente no presente en el texto fuente.
