source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: ⌈Ὑμεῖς οὖν, τέκνα μου⁷ᵃ, τὸν νόμον Κυρίου⁹ φυλάξατε· καὶ¹⁰ μὴ προσέχετε *τῷ κακῷ ὡς καλῷ¹¹, ἀλλὰ κατὰ¹² τὸ ὄντως⁹ καλὸν¹³ ἀποβλέπετε, καὶ διατηρεῖτε αὐτὸ ἐν πάσαις ταῖς¹⁴ ἐντολαῖς Κυρίου, εἰς αὐτὸ¹⁵ ἀναστρεφόμενοι, καὶ ἐν αὐτῷ καταπαύοντες¹⁶.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/006/003.yaml
  text: You therefore, my children, keep the law of the Lord, and do not look upon evil as good; but look instead to what is truly good, and keep it in all the commandments of the Lord, turning toward it and resting in it.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: Adjusted 'regard' to 'look upon' to reflect προσέχετε more closely, and 'conducting yourselves in it' to 'turning toward it' to better match ἀναστρεφόμενοι while retaining the final 'resting in it.'
translation:
  language: es
  text: Ustedes, pues, hijos míos, guarden la ley del Señor[a]; no presten atención al mal como si fuera bien[b], sino pongan la vista en lo que es verdaderamente bueno, y manténganlo en todos los mandamientos del Señor, volviéndose hacia ello y reposando en ello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«del Señor»: el griego tiene Κυρίου (kyriou). Este texto pertenece a los Testamentos de los Doce Patriarcas, pseudoepígrafo compuesto en griego, sin un Vorlage hebreo con YHWH textualmente recuperable. Se traduce «el Señor» en lugar de «Yahvé» para no atribuir al texto una restauración del nombre divino que la evidencia textual no sustenta. En los dos usos de Κυρίου en el versículo se aplica el mismo principio.'
    reason: theological_note
  - marker: b
    text: '«al mal como si fuera bien»: en la edición Charles 1908 (el texto base de esta traducción), la frase τῷ κακῷ ὡς καλῷ está marcada con asterisco (*), convención editorial que en Charles señala material textualmente incierto o conjeturalmente enmendado. El testimonio griego principal incluye la frase tal como se traduce; el asterisco advierte que su autoridad textual es debatida.'
    reason: textual_variant
lexical_decisions:
- source_word: φυλάσσω (φυλάξατε)
  english_pob_choice: keep
  chosen_spanish: guarden
  alternatives_spanish:
  - observen
  - cumplan
  - custodien
  lexicon: 'BDAG φυλάσσω: to keep, guard, observe (a law or command)'
  rationale: φυλάσσω designa tanto la vigilancia activa como el cumplimiento normativo. «Guardar» preserva ambos matices —custodia y obediencia— en español. Se reserva para este verbo a lo largo del versículo; véase distinción con διατηρέω más adelante.
- source_word: προσέχω (προσέχετε)
  english_pob_choice: look upon (revisado desde 'regard')
  chosen_spanish: presten atención
  alternatives_spanish:
  - miren
  - atiendan
  - den oídos
  lexicon: 'BDAG προσέχω: to give heed to, pay close attention to, watch out for'
  rationale: La revisión inglesa pasó de 'regard' a 'look upon' para introducir un matiz visual. Sin embargo, el sentido primario de BDAG es cognitivo-atencional ('prestar atención', 'estar alerta'). El español «presten atención» es más fiel al griego y al mismo tiempo preserva la distinción con ἀποβλέπετε más adelante, que sí porta carga visual explícita. Usar «miren» para ambos verbos aplanaría una distinción deliberada del texto.
- source_word: ὄντως
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - realmente
  - en verdad
  - de veras
  lexicon: 'LSJ ὄντως: really, in very deed (adverbio de εἶναι, ''ser'')'
  rationale: 'ὄντως lleva peso ontológico: lo que es bueno en sentido real y no aparente. «Verdaderamente» captura tanto el énfasis como el fundamento en el ser, en contraste con el bien falso que encubre al mal.'
- source_word: ἀποβλέπω (ἀποβλέπετε)
  english_pob_choice: look instead to
  chosen_spanish: pongan la vista en
  alternatives_spanish:
  - dirijan la mirada hacia
  - fijen los ojos en
  - contemplen
  lexicon: 'BDAG ἀποβλέπω: to look away from other things and fix one''s gaze on something specific'
  rationale: ἀποβλέπω (ἀπο- + βλέπω) connota apartar la mirada de todo lo demás para fijarla en un único objeto. «Pongan la vista en» transmite esta atención visual exclusiva en español latinoamericano moderno sin resultar forzado.
- source_word: διατηρέω (διατηρεῖτε)
  english_pob_choice: keep it
  chosen_spanish: manténganlo
  alternatives_spanish:
  - guárdenlo
  - consérvelo
  - presérvelo
  lexicon: 'BDAG διατηρέω: to keep carefully, preserve throughout, maintain over time'
  rationale: διατηρέω es más intenso que el simple τηρέω; implica custodia sostenida en el tiempo. «Mantener» capta esa preservación continua. Se distingue deliberadamente de φυλάσσω ('guardar') para reflejar que el texto griego usa dos verbos distintos de custodia.
- source_word: ἀναστρέφω (ἀναστρεφόμενοι)
  english_pob_choice: turning toward it (revisado desde 'conducting yourselves in it')
  chosen_spanish: volviéndose hacia ello
  alternatives_spanish:
  - conduciéndose en ello
  - retornando a ello
  - dirigiéndose a ello
  lexicon: 'BDAG ἀναστρέφω: to turn back, return; en voz media: conducirse, habitar; con εἰς: dirigirse hacia'
  rationale: La clave es la preposición εἰς αὐτό ('hacia ello'), que indica dirección más que comportamiento habitual. La revisión inglesa correctamente prefirió 'turning toward' sobre 'conducting yourselves'. «Volviéndose hacia ello» refleja el movimiento de retorno/orientación que marca el participio.
- source_word: καταπαύω (καταπαύοντες)
  english_pob_choice: resting in it
  chosen_spanish: reposando en ello
  alternatives_spanish:
  - descansando en ello
  - hallando reposo en ello
  - cessando en ello
  lexicon: 'BDAG καταπαύω: to cause to rest, to give rest; to rest, to cease'
  rationale: καταπαύω (κατα- intensivo + παύω, cesar) denota un asentamiento definitivo. «Reposar» tiene un registro levemente más solemne que «descansar» y conviene al tono testamentario del texto.
theological_decisions:
- issue: 'Κύριος (kyrios) en texto pseudoepígrafo griego: ¿''el Señor'' o ''Yahvé''?'
  english_pob_reading: Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: 'La política del proyecto es restaurar «Yahvé» donde el texto griego κύριος representa el tetragrama hebreo YHWH (Septuaginta y citas neotestamentarias de textos hebreos). Sin embargo, los Testamentos de los Doce Patriarcas son pseudoepígrafos compuestos en griego o cuyo Vorlage hebreo no es recuperable con seguridad en este punto. No existe un subyacente YHWH textualmente verificable que restaurar. Usar «Yahvé» aquí sería overclaiming: presentaría como recuperación del nombre divino lo que es simplemente una traducción de κύριος griego. «El Señor» es la renderización honesta para κύριος en esta fuente.'
  doctrine_reference: 'Política de nomenclatura POB: κύριος griego sin Vorlage YHWH recuperable → «el Señor», no «Yahvé». Cf. directiva del proyecto sobre fuentes griegas pseudoepigráficas.'
translation_notes:
  revision_awareness: 'La revisión aplicada (2026-05-03, gpt-5.4-mini) realizó dos ajustes sobre el primer borrador inglés: (1) ''regard'' → ''look upon'' para reflejar προσέχετε con mayor precisión visual; (2) ''conducting yourselves in it'' → ''turning toward it'' para capturar ἀναστρεφόμενοι + εἰς αὐτό como movimiento de orientación, no solo de conducta habitual. El borrador español toma nota de ambas decisiones pero las aplica de forma independiente desde el griego: para (1), «presten atención» preserva la fuerza cognitiva primaria de BDAG (προσέχω = dar atención) y reserva el campo visual para ἀποβλέπετε («pongan la vista en»); para (2), «volviéndose hacia ello» sigue la dirección corregida, con εἰς αὐτό como elemento estructural decisivo. La lógica de la revisión es vinculante en su diagnóstico del griego; la elección española puede diferir del calco visual inglés cuando el griego lo justifica.'
  spanish_consistency_notes:
  - «El Señor» para Κύριος en este texto pseudoepígrafo griego, no «Yahvé», conforme a la política del proyecto para κύριος sin Vorlage YHWH recuperable.
  - Se distinguen deliberadamente φυλάσσω («guarden», con carga de vigilancia) y διατηρέω («manténganlo», con carga de preservación sostenida), evitando usar «guardar» para ambos verbos.
  - «Verdaderamente» para ὄντως preserva el peso ontológico del adverbio (adv. de εἶναι), preferido sobre «realmente» o «en verdad» por su doble cobertura enfática y filosófica.
  - «Pongan la vista en» para ἀποβλέπετε y «presten atención» para προσέχετε se distribuyen el campo semántico visual/atencional conforme a la distinción que el texto griego hace entre ambos verbos.
  - '«Reposar» en lugar de «descansar» para καταπαύοντες por razón de registro: el tono solemne de una exhortación testamentaria favorece el término más formal.'
