id: T12P.ASH.6.5
reference: Testament of Asher 6:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: Ὅτε²² γὰρ †πονηρὰ²³ ἡ ψυχὴ ἀπέρχεται²⁴, βασανίζεται ὑπὸ τοῦ πονηροῦ πνεύματος, *ὃ καὶ²⁵ ἐδούλευεν²⁶ ἐν ἐπιθυμίαις²⁷ καὶ ἔργοις πονηροῖς.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/006/005.yaml
  text: For when a wicked soul departs, it is tormented by the evil spirit, which also enslaved it in lusts and wicked deeds.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: Changed "served" to "enslaved" to reflect ἐδούλευεν more accurately and to preserve the ownership/bondage sense; retained the rest of the draft as faithful and natural.
translation:
  language: es
  text: Porque cuando el alma malvada[a] se aparta, es atormentada por el espíritu maligno, el cual también la esclavizó[b] en deseos[c] y en obras perversas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La daga (†) en el texto griego de Charles 1908 ante πονηρά («malvada») señala una probable corrupción textual en este punto. No existe enmienda manuscrita aceptada; se traduce el texto recibido.
    reason: textual_variant
  - marker: b
    text: 'Gr. ἐδούλευεν, de δουλεύω, normalmente intransitivo: «servir como esclavo». El pronombre relativo ὅ (neutro) refiere gramaticalmente a τοῦ πονηροῦ πνεύματος (el espíritu maligno) como sujeto. Lectura alternativa: «al cual [el alma] también sirvió como esclava en deseos y obras perversas», entendiendo que durante la vida el alma sirvió al espíritu en sus deseos. La revisión inglesa del POB prefirió la lectura causativa («esclavizó») para preservar la fuerza de esclavitud; esta traducción sigue esa decisión. La revisión de cotejo indicó divergencias mayores (acuerdo 0,55), posiblemente relacionadas con esta tensión gramatical.'
    reason: lexical_alternative
  - marker: c
    text: 'Gr. ἐπιθυμίαις: «deseos, anhelos»; en contexto moral negativo, implica deseos desordenados o pasiones pecaminosas. Nótese que el adjetivo πονηροῖς («perversas/os») concuerda gramaticalmente solo con ἔργοις («obras»), no con ἐπιθυμίαις, de modo que el griego deja «deseos» sin calificar explícitamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πονηρά (ψυχή)
  english_pob_choice: wicked (soul)
  chosen_spanish: malvada
  alternatives_spanish:
  - perversa
  - maliciosa
  - impía
  lexicon: 'BDAG πονηρός: ''pertaining to being morally or socially worthless, wicked, evil, bad'''
  rationale: πονηρά califica moralmente el alma. 'Malvada' es la opción más directa y moderna en español neutro para maldad moral deliberada; se evita 'perversa' aquí para reservarla a ἔργοις πονηροῖς y evitar la repetición plana del mismo lexema en la misma cláusula.
- source_word: ἀπέρχεται
  english_pob_choice: departs
  chosen_spanish: se aparta
  alternatives_spanish:
  - parte
  - se va
  - sale
  lexicon: 'BDAG ἀπέρχομαι: ''to go away from a reference point, go away, depart'''
  rationale: El verbo ἀπέρχεται designa la partida del alma al morir. 'Se aparta' capta el alejamiento definitivo del punto de referencia (la vida terrena); 'parte' es igualmente válido pero más neutro; se prefiere 'se aparta' por la connotación de separación que el contexto escatológico requiere.
- source_word: βασανίζεται
  english_pob_choice: is tormented
  chosen_spanish: es atormentada
  alternatives_spanish:
  - es torturada
  - sufre tormento
  lexicon: 'BDAG βασανίζω: ''to cause severe distress, torment, torture'''
  rationale: βασανίζω refiere a tormento intenso (originalmente la prueba del oro en la piedra de toque). 'Es atormentada' es la forma pasiva natural en español y preserva el agente implícito que el pasivo griego introduce antes de la frase prepositional ὑπό.
- source_word: τοῦ πονηροῦ πνεύματος
  english_pob_choice: the evil spirit
  chosen_spanish: el espíritu maligno
  alternatives_spanish:
  - el espíritu malo
  - el espíritu perverso
  lexicon: 'BDAG πονηρός aplicado a seres espirituales: ''evil, wicked''; πνεῦμα: ''spirit, a being with a focus on non-material nature'''
  rationale: '''Maligno'' es el término estándar en español para el mal de naturaleza espiritual activa e intencional (Ef 6,16; 1 Jn 5,18–19). ''Malo'' sería semánticamente débil en este contexto; ''perverso'' se reserva para los ἔργα humanos. Conforme a los valores por defecto del proyecto, πνεῦμα en sentido de ser espiritual personal → ''espíritu'' (minúscula), no ''Espíritu Santo''.'
- source_word: ἐδούλευεν
  english_pob_choice: enslaved (it) — tras revisión desde 'served'
  chosen_spanish: esclavizó
  alternatives_spanish:
  - sirvió como esclavo a
  - había subyugado
  - tenía esclavizada
  lexicon: 'BDAG δουλεύω: ''to be a slave, serve as a slave, be subject to''; normalmente intransitivo'
  rationale: 'δουλεύω es canónicamente intransitivo: ''servir como esclavo''. La revisión inglesa del POB transitivisó el verbo (''enslaved it'') para preservar la fuerza de la esclavitud. El español ''esclavizó'' sigue esa decisión aprobada. Sin embargo, gramaticalmente el sujeto de ἐδούλευεν es ὅ → el espíritu maligno (neutro como πνεύματος), lo que crea tensión: si es intransitivo, el espíritu es quien ''sirvió'' (¿a qué o a quién?); si se lee causativamente, el espíritu ''esclavizó'' al alma. La alternativa literal ''al cual el alma también sirvió como esclava'' (cambiando sujeto) no concuerda en género (ψυχή es femenino, ὅ es neutro). La revisión de cotejo marcó discrepancias mayores (acuerdo 0,55), probablemente en relación con esta tensión; véase nota [b].'
- source_word: ἐπιθυμίαις
  english_pob_choice: lusts
  chosen_spanish: deseos
  alternatives_spanish:
  - concupiscencias
  - pasiones
  - apetitos desordenados
  lexicon: 'BDAG ἐπιθυμία: ''desire, longing, craving''; en contextos negativos: ''lust, evil desire'''
  rationale: ἐπιθυμίαις es dativo plural femenino; el contexto moral negativo implica deseos desordenados. Se elige 'deseos' (sin adjetivo) por ser accesible en español moderno y porque el sentido peyorativo emerge del contexto clausal. 'Concupiscencias' (Reina-Valera) es arcaico; 'pasiones' amplía el matiz más allá del original. Nótese que πονηροῖς (neutro) no concuerda con ἐπιθυμίαις (femenino), por lo que la lengua griega deja 'deseos' sin calificar, solo califica a ἔργοις.
- source_word: ἔργοις πονηροῖς
  english_pob_choice: wicked deeds
  chosen_spanish: obras perversas
  alternatives_spanish:
  - hechos malvados
  - acciones perversas
  - obras malvadas
  lexicon: 'BDAG ἔργον: ''deed, work, action''; πονηρός: ''evil, wicked'''
  rationale: 'ἔργοις πονηροῖς es dativo plural neutro; πονηροῖς concuerda solo con ἔργοις, no con ἐπιθυμίαις. ''Obras perversas'' replica esta estructura: ''perversas'' califica solo ''obras'', fiel al griego. ''Perversas'' se reserva para ἔργα mientras ''malvada'' califica al alma, diferenciando así los dos usos de πονηρός en el versículo.'
theological_decisions:
- issue: 'Daga textual (†) ante πονηρά: posible corrupción del texto griego'
  english_pob_reading: wicked soul (traduce el texto recibido sin intervención)
  chosen_spanish_reading: alma malvada
  alternative_spanish_readings:
  - alma impura
  - el alma [que es] malvada
  rationale: La daga (†) en la edición Charles 1908 señala que el texto en ese punto es sospechoso de corrupción. La traducción sigue el texto recibido (πονηρά ἡ ψυχή) por ausencia de una enmienda aceptada; la nota [a] advierte al lector de esta incertidumbre crítica.
  doctrine_reference: 'Metodología textual POB: las corrupciones señaladas por daggers se traducen del texto recibido con nota; no se conjetura sin base manuscrita documentada.'
- issue: 'Escatología del alma y el espíritu maligno: continuidad del tormento post mortem'
  english_pob_reading: it is tormented by the evil spirit, which also enslaved it in lusts and wicked deeds
  chosen_spanish_reading: es atormentada por el espíritu maligno, el cual también la esclavizó en deseos y en obras perversas
  alternative_spanish_readings:
  - es afligida por el espíritu maligno al que también sirvió como esclava
  rationale: El Testamento de Aser 6:5 enseña que el espíritu maligno que operó sobre el alma durante la vida es el mismo agente que la atormenta tras la muerte. Esta continuidad de identidad entre el esclavizador y el atormentador es teológicamente significativa en el marco de los Testamentos de los Doce Patriarcas. La traducción preserva esta identidad mediante la cláusula relativa ('el cual también la esclavizó'), evitando disolver la tensión introduciendo una distinción entre espíritus.
  doctrine_reference: 'T12P.ASH.6.5 contexto narrativo: el texto desarrolla una teología de dos caminos (buen espíritu / mal espíritu) que culmina en el destino post mortem del alma.'
- issue: ἐδούλευεν — ¿el espíritu esclavizó al alma, o el alma sirvió al espíritu?
  english_pob_reading: which also enslaved it (revisión aprobada desde 'served')
  chosen_spanish_reading: el cual también la esclavizó
  alternative_spanish_readings:
  - al cual también el alma sirvió como esclava
  - mediante el cual también estuvo esclavizada
  rationale: El verbo griego δουλεύω es intransitivo; su uso transitivo ('esclavizar a alguien') requiere normalmente δουλόω. La revisión del POB eligió la lectura transitiva para subrayar la esclavitud del alma. La lectura alternativa ('al cual el alma sirvió como esclava') tiene soporte gramatical pero crea discordancia de género (ψυχή femenino, ὅ neutro). La puntuación de la revisión de cotejo (0,55) sugiere que esta tensión no está resuelta con plena certeza. El Spanish draft sigue la decisión aprobada por el POB y expone la tensión en nota [b].
  doctrine_reference: 'Principio POB: no borrar tensiones léxicas/teológicas documentadas; preservarlas en notas cuando afectan el significado.'
translation_notes:
  revision_awareness: La revisión inglesa aprobada (azure-gpt-5.4-mini, 2026-05-03) cambió «served» a «enslaved» para captar mejor la fuerza de esclavitud de ἐδούλευεν. El borrador español sigue esa decisión revisada con «esclavizó», pero la nota [b] expone la tensión gramatical subyacente (δουλεύω es intransitivo; ὅ refiere al espíritu, no al alma) porque el revisor de cotejo (claude-opus-4-7) marcó discrepancias mayores con acuerdo de solo 0,55. Esta tensión no está resuelta en el texto fuente (véase también la daga †) y no debe suprimirse en la traducción española.
  spanish_consistency_notes:
  - πνεῦμα πονηρόν → 'espíritu maligno' (minúscula; ser espiritual personal, no el Espíritu Santo); conforme a los valores por defecto del proyecto.
  - Yahvé (יהוה) no aparece en este versículo; la convención de nombre divino no se aplica aquí.
  - δοῦλος / δουλεύω → 'esclavizó' (siguiendo la revisión aprobada del POB que prefirió la fuerza de esclavitud); la alternativa 'siervo' no se aplica por ausencia de razón contextual documentada.
  - 'πονηρός se vierte de dos formas distintas en el mismo versículo: ''malvada'' (ψυχή) y ''perversas'' (ἔργα), diferenciando los dos usos del mismo adjetivo griego para evitar monotonía y aclarar el referente.'
  - ἐπιθυμίαις → 'deseos' (no 'concupiscencias'); opción moderna y accesible; el contexto negativo aporta la carga moral sin necesidad de adjetivo adicional.
  - σάρξ no aparece en este versículo; la convención carne/naturaleza humana no se activa.
