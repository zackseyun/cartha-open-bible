id: T12P.ASH.6.1
reference: Testament of Asher 6:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: VI. Προσέχετε οὖν *καὶ ὑμεῖς, τέκνα μου¹, *τὰς ἐντολὰς² Κυρίου³ μονοπροσώπως *ἀκολουθοῦντες τῇ ἀληθείᾳ⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/006/001.yaml
  text: Therefore take heed, you also, my children, following the commandments of the Lord with singleness of purpose, in truth.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:53Z'
    unchanged: false
    changes_summary: Adjusted the awkward phrasing for smoother English and rendered μονοπροσώπως more naturally as 'with singleness of purpose'; retained the full source content, including 'in truth.'
translation:
  language: es
  text: Por tanto, estén atentos también ustedes, hijos míos, siguiendo los mandamientos de Yahvé[a] con un solo propósito[b], en la verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: Κυρίου (''del Señor''). En este contexto pseudoepígrafo judío, Κύριος funciona como sustituto griego del nombre divino YHWH, siguiendo la convención de la LXX. El texto español usa ''Yahvé'' conforme a las directrices del proyecto, que evitan la convención enmascaradora ''SEÑOR''. El texto inglés del POB utilizó ''the Lord''.'
    reason: theological_note
  - marker: b
    text: 'Griego: μονοπροσώπως, adverbio raro compuesto de μόνος (''único'') y πρόσωπον (''rostro, semblante''): literalmente, ''con un solo semblante'', es decir, sin doblez ni duplicidad. Alternativa española: ''con integridad''. El POB inglés revisó la expresión original ''with singleness'' a ''with singleness of purpose'' para reflejar el matiz volitivo del término.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσέχετε
  english_pob_choice: take heed
  chosen_spanish: estén atentos
  alternatives_spanish:
  - presten atención
  - sean vigilantes
  - tengan cuidado
  lexicon: 'BDAG s.v. προσέχω 2: ''to pay close attention to, be alert to'''
  rationale: Προσέχετε (2nd pl. present imperative of προσέχω) conveys sustained attentiveness. 'Estén atentos' captures the continuous, alert quality of the imperative and reads naturally in neutral Latin American Spanish for a testamentary wisdom address. 'Presten atención' is an equally valid alternative but slightly more momentary in feel; 'estén atentos' better suits the sustained exhortation of a deathbed testament.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - mis pequeños
  lexicon: 'BDAG s.v. τέκνον 1: ''child, descendant''; vocative affective use common in testamentary literature'
  rationale: '''Hijos míos'' is the standard dignified Spanish vocative for τέκνα μου in a patriarchal address. The postposed possessive ''míos'' preserves the warmth and authority of the Greek construction. ''Mis hijos'' would be more prosaic and less appropriate for formal testamentary address.'
- source_word: ἐντολὰς Κυρίου
  english_pob_choice: commandments of the Lord
  chosen_spanish: mandamientos de Yahvé
  alternatives_spanish:
  - preceptos del Señor
  - órdenes de Yahvé
  - mandatos de Yahvé
  lexicon: 'BDAG s.v. ἐντολή 1: ''commandment, order, injunction''; standard for divine law in Jewish texts'
  rationale: '''Mandamientos'' is the most recognizable and theologically precise Spanish term for divine ἐντολαί in a Jewish context, resonating with the Decalogue tradition without reducing the text''s broader scope. ''Preceptos'' is a legitimate alternative but carries a slightly more academic register. ''Yahvé'' renders Κύριος per project convention and source context (see theological decision).'
- source_word: μονοπροσώπως
  english_pob_choice: with singleness of purpose
  chosen_spanish: con un solo propósito
  alternatives_spanish:
  - con integridad
  - con rectitud de corazón
  - sin doblez
  - con un solo semblante
  lexicon: 'LSJ s.v. μονοπρόσωπος: ''having one face/aspect''; adverb μονοπροσώπως is rare and does not appear in BDAG; compositionally μόνος (''single'') + πρόσωπον (''face, person'')'
  rationale: This adverb is hapax-level rare. Its compositional meaning is 'single-facedly'—acting with one face rather than two, i.e., without duplicity or double-mindedness. The English POB revision (from 'with singleness' to 'with singleness of purpose') clarified the volitional force. 'Con un solo propósito' reproduces that interpretation faithfully and reads naturally in Spanish. A footnote preserves the literal 'single-faced' nuance and the alternative 'con integridad,' which captures the non-duplicity sense without adding 'purpose' beyond what the source strictly warrants.
- source_word: τῇ ἀληθείᾳ
  english_pob_choice: in truth
  chosen_spanish: en la verdad
  alternatives_spanish:
  - en verdad
  - con verdad
  - según la verdad
  lexicon: 'BDAG s.v. ἀλήθεια 1: ''truth, what is true''; dative of sphere or manner'
  rationale: The Greek uses the articular dative τῇ ἀληθείᾳ, suggesting 'in the truth' (a specific sphere or norm) rather than simply the adverbial 'truly.' Spanish 'en la verdad' preserves the article's definiteness, denoting conformity with truth as a domain of conduct rather than just an affirmation of sincerity.
theological_decisions:
- issue: Κύριος rendered as 'Yahvé' vs. 'el Señor'
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el SEÑOR
  rationale: The Testament of Asher is a Jewish pseudepigraphon in which Κύριος consistently represents the God of Israel, functioning as a Greek rendering of the divine name YHWH in the tradition of the LXX. The superscript ³ in Charles's edition marks this as a textually significant term. Per the POB project-level Spanish terminology defaults, the divine name is rendered 'Yahvé' in the main text rather than masked as 'SEÑOR' or 'Señor.' The English POB used 'the Lord,' which is a legitimate convention but obscures the divine-name force. The Spanish draft restores this transparency. A footnote explains that the Greek source reads Κύριος.
  doctrine_reference: 'POB Spanish project defaults: ''יהוה / YHWH → Yahvé in the main Spanish text, not SEÑOR as a masking convention. If the immediate source is Greek κύριος quoting or alluding to the divine name, explain the decision.'''
translation_notes:
  revision_awareness: 'El POB inglés experimentó una revisión relevante para esta traducción: μονοπροσώπως pasó de ''with singleness'' a ''with singleness of purpose'' (revisión del 2026-05-03, adjudicada por azure-gpt-5.4-mini). El español ''con un solo propósito'' sigue esta revisión aprobada. Se conserva en nota la alternativa más literal ''con integridad'' / ''con un solo semblante'' para que el lector pueda evaluar el alcance semántico del griego. La puntuación de acuerdo cruzado (0,78) indica convergencia moderada; el veredicto ''needs-revision'' del inglés estaba vinculado a la frase μονοπροσώπως, ya resuelta en la revisión final antes de esta traducción.'
  spanish_consistency_notes:
  - 'Κύριος → ''Yahvé'' (no ''el Señor''): aplicación directa de las directrices del proyecto para el nombre divino en fuentes griegas pseudoepígrafas judías.'
  - 'τέκνα μου → ''hijos míos'' (vocativo con posesivo postpuesto): estilo testamentario digno en español neutro latinoamericano.'
  - 'ἐντολάς → ''mandamientos'' (no ''preceptos'' ni ''mandatos''): término más reconocible en el contexto de la ley divina judía.'
  - 'μονοπροσώπως → ''con un solo propósito'': sigue la revisión del POB inglés; la tensión con el sentido literal ''con un solo semblante / sin doblez'' se preserva en nota al pie.'
  - 'τῇ ἀληθείᾳ → ''en la verdad'' (articulado): se respeta la fuerza del artículo griego que señala la verdad como esfera normativa de conducta.'
  - 'Filosofía óptimo-equivalente mantenida: la sintaxis española es fluida sin parafrasear más allá de lo que autoriza la fuente griega.'
