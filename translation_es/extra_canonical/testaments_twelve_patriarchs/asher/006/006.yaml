id: T12P.ASH.6.6
reference: Testament of Asher 6:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: Ἐὰν δὲ *ἔστω ἥσυχος²⁸ *ἐν χαρᾷ²⁹ †γνωρίζει³⁰ τὸν ἄγγελον τῆς εἰρήνης, *καὶ εἰσφέρει αὐτὸν εἰς ζωὴν αἰώνιον³¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/006/006.yaml
  text: But if it is quiet in joy, it recognizes the angel of peace[b], and rejoices in him; and at its death he leads it into eternal life. And it does not come into the destruction of Beliar, as do the souls of sinners.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:54Z'
    unchanged: false
    changes_summary: Adjusted the opening clause to better reflect the source’s ‘quiet’ language and added ‘recognizes’ for γνωρίζει; kept the angel of peace wording and preserved the rest of the drafted clause.
translation:
  language: es
  text: Pero si está tranquila en gozo, reconoce al ángel de la paz[b], y se regocija en él; y a su muerte él la conduce a la vida eterna. Y no entra en la destrucción de Beliar, como sí lo hacen las almas de los pecadores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: 'El ''ángel de la paz'' es figura recurrente en los Testamentos de los Doce Patriarcas: el ser angélico que acompaña al alma justa y la introduce en la vida eterna, contrastando con Beliar que arrastra a las almas pecadoras.'
    reason: cultural_note
lexical_decisions:
- source_word: ἥσυχος
  english_pob_choice: quiet
  chosen_spanish: tranquila
  alternatives_spanish:
  - sosegada
  - en sosiego
  - apacible
  lexicon: LSJ
  rationale: ἥσυχος denota quietud o reposo interior. 'Tranquila' es natural en español y conserva el matiz de calma del alma.
- source_word: ἐν χαρᾷ
  english_pob_choice: in joy
  chosen_spanish: en gozo
  alternatives_spanish:
  - en alegría
  - en regocijo
  lexicon: LSJ
  rationale: '''Gozo'' tiene resonancia bíblica y se distingue del posterior ''se regocija'' (verbo).'
- source_word: γνωρίζει
  english_pob_choice: recognizes
  chosen_spanish: reconoce
  alternatives_spanish:
  - conoce
  - discierne
  lexicon: LSJ
  rationale: Sigue la revisión POB que ajustó 'knows' a 'recognizes'; 'reconoce' implica identificación con familiaridad.
- source_word: ἄγγελον τῆς εἰρήνης
  english_pob_choice: angel of peace
  chosen_spanish: ángel de la paz
  alternatives_spanish:
  - mensajero de la paz
  lexicon: LSJ
  rationale: Figura tradicional en este testamento; 'ángel' conserva la transliteración estándar.
- source_word: εἰσφέρει αὐτὸν εἰς ζωὴν αἰώνιον
  english_pob_choice: leads it into eternal life
  chosen_spanish: la conduce a la vida eterna
  alternatives_spanish:
  - la lleva a la vida eterna
  - la introduce en la vida eterna
  lexicon: LSJ
  rationale: εἰσφέρω literalmente 'introducir/llevar dentro'. 'Conducir a' es natural y digno en español.
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: LSJ
  rationale: Transliteración del griego, consistente con el resto del testamento.
translation_notes:
  revision_awareness: 'El POB inglés fue revisado de ''peaceful in joy, it knows'' a ''quiet in joy, it recognizes'', siguiendo más de cerca ἥσυχος y γνωρίζει. La versión española sigue el texto revisado: ''tranquila en gozo, reconoce''.'
  spanish_consistency_notes:
  - Βελίαρ → 'Beliar'
  - ἄγγελος → 'ángel'
  - ζωή αἰώνιος → 'vida eterna'
  - ψυχή → 'alma' (aquí 'la' como pronombre)
