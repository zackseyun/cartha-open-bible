translation:
  language: es
  text: Pues los de doble rostro[a] son castigados doblemente[b], ya que tanto practican el mal como aprueban[c] a quienes lo practican, imitando los espíritus del engaño[d] y luchando contra los hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego διπρόσωποι, compuesto de δι- (dos) + πρόσωπον (rostro/persona): término técnico del T12P para la duplicidad ética. Alternativas en español: ''los hipócritas'' (interpretativo) o ''los de dos caras'' (idiomático pero coloquial).'
    reason: lexical_alternative
  - marker: b
    text: El texto griego de Charles 1908 marca κολάζονται ('son castigados') con un dagger (†), señal de incertidumbre textual en la tradición manuscrita en este punto.
    reason: textual_variant
  - marker: c
    text: Griego συνευδοκοῦσι, 'dan aprobación conjunta / se complacen con.' El mismo verbo aparece en Romanos 1:32, donde aprobar a quienes practican el mal es equiparado en gravedad moral a practicarlo directamente.
    reason: cross_reference
  - marker: d
    text: 'Griego πλάνης: ''extravío, error, engaño, ilusión.'' Se elige ''engaño'' por su fuerza activa (inducir a error) sobre ''error'' (equivocación pasiva) o ''extravío'' (metáfora espacial de deambulación).'
    reason: lexical_alternative
lexical_decisions:
- source_word: διπρόσωποι
  english_pob_choice: double-faced
  chosen_spanish: los de doble rostro
  alternatives_spanish:
  - los hipócritas
  - los de dos caras
  - los bifaces
  lexicon: LSJ s.v. δίπροσωπος; Charles 1908 apparatus
  rationale: El compuesto δι- + πρόσωπον (dos + rostro/cara) es un término técnico de la literatura de los Testamentos para la duplicidad ética. 'Los de doble rostro' preserva la fuerza literal y la metáfora corporal que estructura la argumentación moral del T12P. 'Los hipócritas' sería interpretativo y eliminaría la categoría moral específica del texto; 'los de dos caras' es idiomático pero resulta demasiado coloquial para un texto de dignidad litúrgica.
- source_word: δισσῶς κολάζονται
  english_pob_choice: are punished doubly
  chosen_spanish: son castigados doblemente
  alternatives_spanish:
  - son penados dos veces
  - reciben doble castigo
  lexicon: BDAG s.v. κολάζω; nota textual ⁵ del aparato de Charles 1908
  rationale: κολάζω lleva el sentido de castigo punitivo (no meramente disciplinario). El dagger (†) en la edición Charles sobre κολάζονται marca incertidumbre textual, registrada en nota [b]. 'Castigados doblemente' conserva la voz pasiva y la fuerza adverbial de δισσῶς. Se prefiere 'castigados' sobre 'penados' por su registro más formal y su correspondencia con el campo semántico judicial.
- source_word: συνευδοκοῦσι τοῖς πράσσουσιν
  english_pob_choice: approve those who do it
  chosen_spanish: aprueban a quienes lo practican
  alternatives_spanish:
  - consienten con quienes lo hacen
  - respaldan a los que lo practican
  - se complacen con quienes lo practican
  lexicon: BDAG s.v. συνευδοκέω
  rationale: συνευδοκέω significa 'dar aprobación conjunta, consentir con, complacerse junto a.' 'Aprueban' captura el sentido activo de validación moral que el verbo exige. El mismo verbo aparece en Romanos 1:32, donde aprobar el mal recibe igual peso moral que practicarlo; véase nota [c]. 'Consienten con' enfatiza la complicidad pasiva, que también está presente, pero 'aprueban' expresa mejor la dimensión activa del verbo griego.
- source_word: τὰ πνεύματα τῆς πλάνης
  english_pob_choice: the spirits of deceit
  chosen_spanish: los espíritus del engaño
  alternatives_spanish:
  - los espíritus del error
  - los espíritus del extravío
  - los espíritus de la ilusión engañosa
  lexicon: BDAG s.v. πλάνη; LSJ s.v. πλάνη
  rationale: πλάνη abarca 'extravío, error, engaño, ilusión.' En el T12P estos son agentes espirituales personales en un dualismo moral cósmico (cf. T.Rub. 2:1; T.Jud. 20:1). 'Engaño' captura la fuerza activa de inducir a error, preferible a 'error' (que implicaría una mera equivocación) o 'extravío' (que enfatiza el movimiento espacial más que la acción engañadora). Se preserva el plural definido 'los espíritus' como entidades personales; véase decisión teológica correspondiente.
- source_word: συναγωνιζόμενοι κατὰ τῶν ἀνθρώπων
  english_pob_choice: contending against men
  chosen_spanish: luchando contra los hombres
  alternatives_spanish:
  - combatiendo contra los hombres
  - contendiendo contra los hombres
  - enfrentándose a los hombres
  lexicon: LSJ s.v. συναγωνίζομαι
  rationale: 'συναγωνίζομαι normalmente significa ''combatir junto a / en alianza con,'' pero con κατά + genitivo toma el sentido adversativo: ''esforzarse contra.'' ''Luchando contra'' es español moderno natural para este sentido bélico-adversarial. ''Contendiendo'' sería más literal pero resulta levemente arcaico; ''combatiendo'' también es válido aunque de registro más marcadamente militar.'
theological_decisions:
- issue: 'Naturaleza de los ''espíritus del engaño'': ¿entidades personales o abstracciones morales?'
  english_pob_reading: the spirits of deceit
  chosen_spanish_reading: los espíritus del engaño
  alternative_spanish_readings:
  - las fuerzas engañosas
  - los poderes del error
  - las influencias del engaño
  rationale: El T12P presenta consistentemente los πνεύματα τῆς πλάνης como agentes personales dentro de un dualismo angelológico-demonológico (cf. T.Rub. 2:1; T.Jud. 20:1; paralelo con el dualismo de Qumrán en 1QS 3:18–19). El plural con artículo definido 'los espíritus' preserva esta lectura de entidad personal. Renderizar como fuerzas abstractas aplanarría la demonología propia del T12P y oscurecería la analogía estructural con el 'espíritu de verdad' del mismo corpus.
  doctrine_reference: Angelología/demonología del T12P; cf. T.Rub. 2:1; T.Jud. 20:1; 1QS 3:18–19 (Regla de la Comunidad de Qumrán)
- issue: 'Doble castigo por duplicidad moral: principio de simetría punitiva'
  english_pob_reading: the double-faced are punished doubly
  chosen_spanish_reading: los de doble rostro son castigados doblemente
  alternative_spanish_readings:
  - los hipócritas son doblemente condenados
  - quienes tienen doble cara recibirán castigo doble
  rationale: 'El doble castigo (δισσῶς κολάζονται) refleja el principio de simetría moral del T12P: la pena corresponde a la naturaleza del pecado. La duplicidad produce doble culpa (hacer el mal + aprobar el mal de otros), por lo tanto doble castigo. Se preserva el registro judicial de ''castigados'' en lugar de suavizar a ''condenados'' o ''penados'', para mantener la fuerza del verbo κολάζω. La incertidumbre textual marcada con † no afecta al principio teológico, que es coherente con el contexto de T.Ash. 6:1.'
  doctrine_reference: Principio de simetría punitiva en el T12P; cf. T.Ash. 6:1; aplicación paralela de Romanos 1:32 al tema de la aprobación del mal
translation_notes:
  revision_awareness: 'El borrador inglés del POB no sufrió cambios en la revisión más reciente (modelo gpt-5.4-mini, 2026-05-03T07:41:53Z; unchanged: true). La verificación cruzada arrojó puntuación de acuerdo 0.93 con veredicto de problemas menores (1 pase con problemas). No se registraron decisiones lexicales ni teológicas documentadas en el expediente inglés, por lo que todas las decisiones presentes surgen del análisis directo del texto griego fuente (edición Charles 1908). Los marcadores textuales del aparato crítico (†, ⌜...⌝, *) se han recogido en notas al pie sin representación especial en el texto publicable.'
  spanish_consistency_notes:
  - El nombre divino Yahvé no aparece en este versículo; la norma del proyecto (Yahvé en lugar de SEÑOR) no requiere aplicación aquí.
  - Los 'espíritus del engaño' se tratan como entidades personales (plural con artículo definido 'los espíritus') conforme a la angelología/demonología del T12P, en coherencia con las demás referencias del corpus.
  - Se usa 'practican' para πράσσουσι (verbo de acción habitual) en lugar de 'hacen', para distinguir el hábito moral del acto puntual, coherente con el uso del T12P de πράσσω frente a ποιέω.
  - El texto fuente contiene sección entre corchetes angulares ⌜...⌝ y asterisco * que indican posible interpolación o variante en Charles 1908; el texto publicable sigue el texto completo tal como lo traduce el POB inglés, con la incertidumbre textual anotada en nota [b].
  - Se usa 'hombres' para ἀνθρώπων (genérico humano) siguiendo el registro del T12P y el POB inglés ('men'); una alternativa inclusiva sería 'los seres humanos', pero el contexto de combate espiritual sugiere que el texto se refiere a personas concretas, no a la humanidad abstracta.
