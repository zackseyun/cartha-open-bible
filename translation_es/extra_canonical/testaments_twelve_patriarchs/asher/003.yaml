translation:
  language: es
  text: Pero ustedes, hijos míos, no se vuelvan de doble cara[a] como ellos, en bondad y maldad, sino aférrense únicamente a la bondad, porque el Señor Dios[b] reposa en ella, y la gente la anhela. 2. Huyan de la maldad, destruyendo su designio[c] con sus buenas obras; porque los de doble cara no son de Dios, sino que son esclavos de sus propios deseos, para complacer a Beliar y a las personas semejantes a ellos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de dos caras». El término griego διπρόσωποι describe un carácter moral dividido, no meramente la insinceridad social.
    reason: lexical_alternative
  - marker: b
    text: El texto griego tiene Κύριος ὁ Θεός («Señor Dios»). Dado que los Testamentos de los Doce Patriarcas se conservan en griego y no se dispone de un texto hebreo base que atestigüe el Tetragrama en este versículo, se mantiene «el Señor Dios» en lugar de «Yahvé», conforme a la política del proyecto para usos de κύριος cuyo sustrato hebreo no puede verificarse.
    reason: theological_note
  - marker: c
    text: O «plan» (forma preferida en la revisión inglesa del POB, 2026-04-23) o «trama». El griego διαβούλιον denota un designio hostil o corrupto vinculado a la maldad.
    reason: lexical_alternative
  - marker: d
    text: El texto griego añade «καὶ τοῖς ὁμοίοις αὐτῶν ἀνθρώποις» («y a las personas semejantes a ellos»), frase que la traducción inglesa del POB no incluyó. Se recupera aquí conforme a la fuente griega de Charles 1908.
    reason: source_note
lexical_decisions:
- source_word: διπρόσωποι
  english_pob_choice: double-faced
  chosen_spanish: de doble cara
  alternatives_spanish:
  - de dos caras
  - hipócrita
  - de doble ánimo
  lexicon: LSJ
  rationale: El griego significa literalmente 'de dos caras' o 'de doble cara' y describe un carácter moral dividido. En español, 'de doble cara' preserva la imagen visual sin reducirla a insinceridad social ('hipócrita') ni desplazarla hacia lo puramente interno ('de doble ánimo', como en Sant 1:8). 'De dos caras' es igualmente literal y se señala en nota.
- source_word: ἀγαθότης
  english_pob_choice: goodness
  chosen_spanish: bondad
  alternatives_spanish:
  - virtud
  - el bien
  - benignidad
  lexicon: BDAG
  rationale: El capítulo opone ἀγαθότης a κακία en polaridad ética amplia. 'Bondad' es el equivalente natural en español moderno. 'Virtud' es más filosófico y clásico; 'el bien' es demasiado abstracto. 'Bondad' se mantiene uniforme en todo el pasaje.
- source_word: κολλήθητε
  english_pob_choice: cling
  chosen_spanish: aférrense
  alternatives_spanish:
  - adhiéranse
  - únanse firmemente
  - péguense
  lexicon: LSJ
  rationale: El aoristo pasivo imperativo de κολλάω ('pegar, unir') exige un verbo vívido de adhesión firme. 'Aférrense' transmite la urgencia y la firmeza del mandato exhortativo. 'Adhiéranse' es formalmente equivalente pero de registro más neutro.
- source_word: ἀναπαύεται
  english_pob_choice: rests
  chosen_spanish: reposa
  alternatives_spanish:
  - descansa
  - halla reposo
  - mora
  lexicon: BDAG
  rationale: '''Reposa'' preserva el sentido llano y la imagen teológica de que Dios toma repose en la bondad. ''Descansa'' es correcto pero de registro más coloquial; ''mora'' desplazaría hacia permanencia de residencia, excediendo el griego.'
- source_word: ποθοῦσιν
  english_pob_choice: long for
  chosen_spanish: la anhelan
  alternatives_spanish:
  - la desean
  - la apetecen
  - la codician
  lexicon: LSJ
  rationale: El verbo ποθέω implica un deseo profundo y atractivo. 'Anhelan' transmite esa intensidad sin connotación romántica excesiva. 'Desean' es más neutro y perdería la fuerza del original.
- source_word: κακίαν
  english_pob_choice: wickedness
  chosen_spanish: la maldad
  alternatives_spanish:
  - el mal
  - la malicia
  - la perversidad
  lexicon: BDAG
  rationale: En este contraste virtud-vicio, 'la maldad' corresponde a corrupción moral amplia. 'El mal' es más genérico; 'la malicia' reduciría el término al daño deliberado, perdiendo la amplitud de κακία.
- source_word: ἀποδράσατε
  english_pob_choice: flee
  chosen_spanish: huyan
  alternatives_spanish:
  - escapen
  - aléjense corriendo
  - apártense
  lexicon: LSJ
  rationale: El imperativo fuerte ἀποδράσατε exige un equivalente igualmente urgente. 'Huyan' es conciso y preserva la fuerza exhortativa de la evitación moral. 'Escapen' es válido pero menos enérgico en contexto.
- source_word: διαβούλιον
  english_pob_choice: plan
  chosen_spanish: designio
  alternatives_spanish:
  - plan
  - trama
  - propósito
  - artificio
  lexicon: LSJ
  rationale: El término denota un designio o plan hostil vinculado a la maldad. 'Designio' es digno y preserva la connotación de intencionalidad corrupta en el registro del texto. La revisión inglesa del POB pasó de 'scheme' a 'plan' por naturalidad; en español, 'designio' logra un registro equivalente y se señalan las alternativas en nota.
- source_word: οὐκ εἰσὶ τοῦ Θεοῦ
  english_pob_choice: are not of God
  chosen_spanish: no son de Dios
  alternatives_spanish:
  - no pertenecen a Dios
  - no proceden de Dios
  lexicon: BDAG
  rationale: La construcción genitiva compacta τοῦ Θεοῦ puede indicar origen o pertenencia. 'No son de Dios' es el calco más fiel y preserva la ambigüedad teológica sin forzar una lectura, tal como el POB inglés.
- source_word: ἐπιθυμίαις
  english_pob_choice: desires
  chosen_spanish: deseos
  alternatives_spanish:
  - pasiones
  - concupiscencias
  - apetitos
  lexicon: BDAG
  rationale: El término abarca tanto deseos sensuales como anhelos egoístas de tipo más general. 'Deseos' mantiene el alcance amplio que el contexto moral requiere. 'Pasiones' y 'concupiscencias' tienen resonancias eclesiásticas más estrechas en el español tradicional.
- source_word: δουλεύουσιν
  english_pob_choice: serve
  chosen_spanish: sirven
  alternatives_spanish:
  - son esclavos de
  - están al servicio de
  lexicon: BDAG
  rationale: Aunque el proyecto por defecto prefiere 'esclavo' para δοῦλος (sustantivo), aquí el verbo δουλεύω en construcción idiomática con ἐπιθυμίαις produce 'sirven a sus propios deseos' como equivalente natural y moralmente cargado. El POB inglés eligió explícitamente 'serve' sobre 'are enslaved to' por la misma razón contextual; la decisión se mantiene en español.
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: LSJ
  rationale: El texto griego atestigua Βελίαρ; se transliterada siguiendo la forma fuente en lugar de normalizar a la forma hebraizante 'Belial', tal como decidió el POB inglés.
- source_word: τοῖς ὁμοίοις αὐτῶν ἀνθρώποις
  english_pob_choice: (omitted in English POB)
  chosen_spanish: las personas semejantes a ellos
  alternatives_spanish:
  - gente como ellos
  - los hombres iguales a ellos
  lexicon: LSJ
  rationale: Esta frase aparece en el texto griego fuente («καὶ τοῖς ὁμοίοις αὐτῶν ἀνθρώποις») pero fue omitida en la traducción inglesa del POB sin rationale documentado. Se recupera aquí conforme al principio de fidelidad a la fuente griega de Charles 1908. 'Semejantes a ellos' traduce fielmente ὁμοίοις αὐτῶν.
theological_decisions:
- issue: Rendering de Κύριος ὁ Θεός en un texto pseudoepigráfico judío de tradición helenística
  english_pob_reading: the Lord God
  chosen_spanish_reading: el Señor Dios
  alternative_spanish_readings:
  - Yahvé Dios
  - el SEÑOR Dios
  rationale: El proyecto establece 'Yahvé' como equivalente de יהוה/YHWH. Sin embargo, el texto fuente es griego (Κύριος ὁ Θεός) y los Testamentos de los Doce Patriarcas no disponen de un texto hebreo base que atestigüe el Tetragrama de forma directa en este pasaje. Κύριος funciona aquí como título compuesto en la tradición pseudoepigráfica de influencia helenística, no necesariamente como sustituto explícito del Tetragrama hebreo verificable. Por tanto, se mantiene 'el Señor Dios' y se documenta la decisión en nota, conforme a la política del proyecto para usos de κύριος que aluden o citan el nombre divino pero cuyo sustrato no puede confirmarse.
  doctrine_reference: Project default §Yahvé; instrucción de sistema §si el origen inmediato es κύριος griego citando o aludiendo al nombre divino, explicar la decisión
- issue: 'Fórmula de identidad teológica: οἱ διπρόσωποι οὐκ εἰσὶ τοῦ Θεοῦ'
  english_pob_reading: the double-faced are not of God
  chosen_spanish_reading: los de doble cara no son de Dios
  alternative_spanish_readings:
  - los de doble cara no pertenecen a Dios
  - los de doble cara no proceden de Dios
  rationale: El genitivo τοῦ Θεοῦ puede indicar origen ('proceden de Dios') o pertenencia ('pertenecen a Dios'). La construcción española 'no son de Dios' preserva la ambigüedad teológica sin colapsar ninguna de las dos lecturas, siguiendo el principio del POB de no resolver tensiones que el texto fuente no resuelve.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La revisión inglesa del POB (2026-04-23, gpt-5.4) realizó dos ajustes: (1) cambió «with both goodness and wickedness» por «in goodness and wickedness» para reflejar más fielmente κατ᾽ αὐτοὺς διπρόσωποι, ἀγαθότητος καὶ κακίας; (2) sustituyó «scheme» por «plan» para τὸ διαβούλιον. El español sigue la lectura revisada: «en bondad y maldad» espeja directamente «in goodness and wickedness». Para διαβούλιον, el español opta por «designio» (registro equivalente a «plan» pero más adecuado al tono del texto testamentario), señalando «plan» como alternativa documentada en nota. Adicionalmente, la traducción española recupera «καὶ τοῖς ὁμοίοις αὐτῶν ἀνθρώποις» del texto griego fuente, frase omitida en el POB inglés sin rationale explícito.'
  spanish_consistency_notes:
  - Se usa «bondad» de forma uniforme para ἀγαθότης y «maldad» para κακία en todo el pasaje, preservando la polaridad ética del original.
  - «De doble cara» es el equivalente estándar de διπρόσωποι en este registro; se mantiene idéntico en ambas apariciones del término.
  - «Beliar» sigue la transliteración griega Βελίαρ del texto fuente, no la forma hebraizante «Belial».
  - Se emplea el español neutro latinoamericano (segunda persona plural «ustedes» con formas de imperativo e imperfecto de subjuntivo correspondientes), evitando «vosotros» que es ajeno al uso latinoamericano.
  - «El Señor Dios» se emplea para Κύριος ὁ Θεός con rationale documentado en decisión teológica y nota al pie; no se aplica aquí la sustitución por «Yahvé» dado el sustrato griego sin hebreo base verificable.
  - «Sirven» para δουλεύουσιν sigue la elección contextual del POB inglés (no «son esclavos de»), justificada por la construcción idiomática con «deseos»; la tensión con el valor por defecto del proyecto (δοῦλος → esclavo) se documenta en la decisión léxica correspondiente.
