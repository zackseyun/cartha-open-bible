base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/asher/003.yaml
  text: But you[a], my children, do not become double-faced like them, in goodness and wickedness, but cling to goodness alone, because the Lord God rests in it, and people long for it. But flee wickedness, destroying its plan by your good deeds[b]; for the double-faced are not of God, but serve their own desires, so that they may please Beliar.
  footnotes:
  - marker: a
    text: Or 'two-faced.' The Greek term pictures a divided moral character, not merely social insincerity.
    reason: lexical_alternative
  - marker: b
    text: Beliar is the Greek form of the name often rendered Belial.
    reason: lexical_alternative
