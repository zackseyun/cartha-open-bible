  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/007/003.yaml
  text: Therefore I command these things to you, so that you also may command your children, that they may keep them for their generations.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
    unchanged: false
    changes_summary: Removed the bracketed expansion '[the race of Israel]' as it is not in the source; tightened 'throughout their generations' to 'for their generations' to better match εἰς τὰς γενεὰς αὐτῶν.
translation:
  language: es
  text: Por tanto, les mando estas cosas, para que ustedes también manden a sus hijos, a fin de que las guarden para sus generaciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐντέλλομαι
  english_pob_choice: I command
  chosen_spanish: mando
  alternatives_spanish:
  - ordeno
  - les encargo
  lexicon: ἐντέλλομαι
  rationale: El griego expresa dar una orden o mandamiento; en español, «mando» conserva el valor imperativo sin sonar tan marcado como «ordeno» y encaja con el tono exhortativo del pasaje.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas instrucciones
  lexicon: ταῦτα
  rationale: «Estas cosas» sigue de cerca el demostrativo plural y evita añadir «instrucciones», que sería interpretativo.
- source_word: ἐντέλλεσθε
  english_pob_choice: may command
  chosen_spanish: manden
  alternatives_spanish:
  - ordenen
  - les manden
  lexicon: ἐντέλλεσθε
  rationale: Se mantiene la idea de transmitir mandatos a los hijos. «Manden» reproduce bien el paralelismo con «mando» y el valor exhortativo de la cláusula.
- source_word: τέκνοις
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendientes
  lexicon: τέκνοις
  rationale: Aquí el término apunta a la descendencia dentro del marco familiar y generacional; «hijos» es el equivalente natural en español y preserva la relación de transmisión intergeneracional.
- source_word: φυλάξωσιν
  english_pob_choice: they may keep
  chosen_spanish: las guarden
  alternatives_spanish:
  - las observen
  - las cumplan
  lexicon: φυλάσσω
  rationale: «Guardar» en español bíblico expresa bien conservar y observar mandamientos o enseñanzas. Se evita «cumplir», que puede estrechar demasiado el sentido.
- source_word: εἰς τὰς γενεὰς αὐτῶν
  english_pob_choice: for their generations
  chosen_spanish: para sus generaciones
  alternatives_spanish:
  - a lo largo de sus generaciones
  - por sus generaciones
  lexicon: γενεά
  rationale: La revisión inglesa ajustó la frase para reflejar mejor el alcance de εἰς τὰς γενεὰς αὐτῶν. «Para sus generaciones» conserva el valor de destino o continuidad sin introducir una expansión no atestiguada.
theological_decisions:
- issue: Transmisión intergeneracional de mandatos
  english_pob_reading: Therefore I command these things to you, so that you also may command your children, that they may keep them for their generations.
  chosen_spanish_reading: Por tanto, les mando estas cosas, para que ustedes también manden a sus hijos, a fin de que las guarden para sus generaciones.
  alternative_spanish_readings:
  - Por tanto, les ordeno estas cosas, para que ustedes también ordenen a sus hijos, para que las guarden por sus generaciones.
  rationale: El versículo presenta una cadena de autoridad y fidelidad transmitida en la familia. El español conserva esa secuencia sin suavizar la fuerza del mandato ni añadir una lectura doctrinal ajena al texto.
  doctrine_reference: Deuteronomy 6:6-7; Psalm 78:5-7
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que eliminó la expansión no atestiguada '[the race of Israel]' y ajustó 'throughout their generations' a 'for their generations'. Por eso la versión española evita cualquier ampliación identitaria y mantiene una formulación breve y directa de continuidad generacional.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico natural en español con «mando»/«manden» y «guardar» para conservar la fuerza exhortativa sin introducir tecnicismos.
  - No se usó «SEÑOR» ni terminología cristológica, porque el verso no contiene esos elementos.
  - La puntuación separa claramente las tres cláusulas finales para reflejar la progresión del griego.
