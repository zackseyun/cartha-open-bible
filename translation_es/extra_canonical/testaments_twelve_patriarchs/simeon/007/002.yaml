revisions:
- from: Porque el Señor levantará de Leví a un sumo sacerdote, y de Judá a un rey, [Dios y hombre]; este salvará [a todas las naciones y] la raza de Israel.
  to: Porque Yahvé levantará de Leví a un sumo sacerdote, y de Judá a un rey, [Dios y hombre]; este salvará [a todas las naciones y] el linaje de Israel.
  rationale: Se ajusta “el Señor” a “Yahvé” para alinearlo con la política terminológica del proyecto sobre el nombre divino, y se reemplaza “la raza de Israel” por “el linaje de Israel” para reflejar mejor γένος en español contemporáneo sin perder el matiz genealógico. No se requieren notas adicionales porque los corchetes ya preservan las lecturas textuales significativas.
