translation:
  language: es
  text: Porque el Señor levantará de Leví a un sumo sacerdote, y de Judá a un rey, [Dios y hombre]; este salvará [a todas las naciones y] la raza de Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: κύριος
  rationale: En este dicho profético la tradición del texto griego usa κύριος, y el POB inglés conserva “the Lord” en lugar de explicitar el nombre divino. En español, “el Señor” reproduce esa forma auditada sin forzar una identificación explícita con Yahvé en el cuerpo del verso.
- source_word: ἀρχιερέα
  english_pob_choice: a high priest
  chosen_spanish: a un sumo sacerdote
  alternatives_spanish:
  - a un gran sacerdote
  - a un sacerdote supremo
  lexicon: ἀρχιερεύς
  rationale: “Sumo sacerdote” es el equivalente español natural y preciso para el cargo sacerdotal de alto rango indicado por el griego y el inglés auditado.
- source_word: βασιλέα
  english_pob_choice: a king
  chosen_spanish: a un rey
  alternatives_spanish:
  - a un monarca
  lexicon: βασιλεύς
  rationale: Se mantiene el título político-real sencillo y directo, como en el inglés POB.
- source_word: Θεὸν καὶ ἄνθρωπον
  english_pob_choice: God and man
  chosen_spanish: Dios y hombre
  alternatives_spanish:
  - Dios y ser humano
  - divino y humano
  lexicon: θεός / ἄνθρωπος
  rationale: Se conserva la yuxtaposición fuerte del original sin suavizarla. “Dios y hombre” sigue de cerca el valor teológico del griego y la redacción inglesa auditada.
- source_word: σώσει
  english_pob_choice: he will save
  chosen_spanish: este salvará
  alternatives_spanish:
  - él salvará
  - salvará
  lexicon: σῴζω
  rationale: El sujeto inmediato (“este”) retoma correctamente al personaje compuesto del contexto sin añadir interpretación extra. Mantiene la continuidad referencial del verso.
- source_word: τὸ γένος τοῦ Ἰσραήλ
  english_pob_choice: the race of Israel
  chosen_spanish: la raza de Israel
  alternatives_spanish:
  - la estirpe de Israel
  - el linaje de Israel
  lexicon: γένος
  rationale: “Raza” reproduce la elección auditable del POB inglés y conserva el énfasis étnico-genealógico del término griego. Se evitan equivalentes más suavizados que perderían esa tensión.
theological_decisions:
- issue: Referencia al Señor en un contexto profético con posible trasfondo del nombre divino
  english_pob_reading: the Lord will raise up
  chosen_spanish_reading: el Señor levantará
  alternative_spanish_readings:
  - Yahvé levantará
  rationale: Aunque el principio editorial del proyecto favorece “Yahvé” para יהוה, aquí el packet griego presenta κύριος y el POB inglés conserva “the Lord”. Sin una justificación explícita adicional en el audit trail para reintroducir el nombre, se preserva la forma tradicional traducida del griego.
  doctrine_reference: Nomen divinum / uso contextual de κύριος
- issue: 'Cristología compuesta: sacerdocio, realeza y la fórmula ‘Dios y hombre’'
  english_pob_reading: '[God and man]'
  chosen_spanish_reading: '[Dios y hombre]'
  alternative_spanish_readings:
  - '[Dios y ser humano]'
  - '[divino y humano]'
  rationale: La frase entre corchetes parece ser una lectura textual/interpretativa transmitida por la tradición de versiones y se conserva sin reinterpretarla. La traducción mantiene la tensión cristológica explícita entre lo divino y lo humano.
  doctrine_reference: Cristología / lectura titulada mesiánica
- issue: 'Alcance de la salvación: ‘all the nations and the race of Israel’'
  english_pob_reading: '[all the nations and] the race of Israel'
  chosen_spanish_reading: '[a todas las naciones y] la raza de Israel'
  alternative_spanish_readings:
  - '[a todas las naciones y] la estirpe de Israel'
  - '[a todas las naciones y] el linaje de Israel'
  rationale: 'Se conserva la lectura alternativa entre corchetes tal como está en el POB inglés, sin decidirla a favor ni eliminarla. Esto mantiene visible la tensión textual: una extensión universal seguida por la focalización en Israel.'
  doctrine_reference: Alcance salvífico / variante textual
- issue: 'Identidad del personaje esperado: sacerdote, rey y salvador'
  english_pob_reading: For the Lord will raise up from Levi a high priest, and from Judah a king... he will save...
  chosen_spanish_reading: Porque el Señor levantará de Leví a un sumo sacerdote, y de Judá a un rey... este salvará...
  alternative_spanish_readings:
  - Porque el Señor suscitará...
  - Porque el Señor hará surgir...
  rationale: “Levantar” conserva la idea de suscitar/elevar sin introducir un matiz más interpretativo que el inglés POB. La construcción mantiene unidos los tres oficios y la función salvífica del mismo sujeto.
  doctrine_reference: Tipología mesiánica / oficios de Cristo
translation_notes:
  revision_awareness: The latest revision pass removed a duplicated bracketed phrase at the end and tightened the English to match the source more closely while preserving the existing bracketed alternative reading. The Spanish draft follows that corrected structure and avoids any duplicated bracketed material.
  spanish_consistency_notes:
  - Se mantuvo ‘el Señor’ para coincidir con el griego κύριος y con la forma auditada del inglés POB, sin introducir un nombre divino adicional no explicitado en el audit trail.
  - Se preservó la lectura entre corchetes ‘[Dios y hombre]’ y ‘[a todas las naciones y]’ como alternativas visibles en el texto, tal como exige la tradición editorial del POB.
  - ‘Sumo sacerdote’, ‘rey’ y ‘salvará’ conservan la sintaxis breve y paratáctica del original sin expandir el sentido.
  - ‘La raza de Israel’ sigue la decisión léxica inglesa para γένος y mantiene la tensión étnica del término.
