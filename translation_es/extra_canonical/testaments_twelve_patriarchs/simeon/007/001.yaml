  text: Καὶ νῦν, τέκνα¹ μου, ἐπακούσατε² τοῦ³ Λευὶ καὶ τοῦ⁴ Ἰούδα⁵ καὶ⁷ μὴ ἐπαίρεσθε⁸ ἐπὶ τὰς δύο γενεὰς⁹ ταύτας, ὅτι ἐξ αὐτῶν¹⁰ ἀνατελεῖ ἡμῖν¹¹ τὸ σωτήριον ⌜τοῦ Θεοῦ⌝¹².
