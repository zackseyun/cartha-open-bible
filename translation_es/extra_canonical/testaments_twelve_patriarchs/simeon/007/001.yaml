base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/007/001.yaml
  text: And now, my children, listen to Levi and to Judah, and do not exalt yourselves over these two tribes, because from them the salvation of God will rise for us.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
    unchanged: false
    changes_summary: Removed the stray bracketed note after ‘And now,’ and changed ‘will arise’ to the more natural ‘will rise’ while preserving the meaning.
translation:
  language: es
  text: Y ahora, hijos míos, escuchen a Leví y a Judá, y no se enaltezcan sobre estas dos tribus, porque de ellas nos brotará la salvación de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijos
  lexicon: τέκνον
  rationale: ‘Hijos míos’ conserva la relación afectiva y la apelación directa del griego, con un registro natural en español bíblico. ‘Mis hijos’ suena menos enfático en esta posición vocativa.
- source_word: ἐπακούσατε
  english_pob_choice: listen
  chosen_spanish: escuchen
  alternatives_spanish:
  - oigan
  - presten atención
  lexicon: ἐπακούω
  rationale: El verbo pide respuesta atenta a la exhortación, no mera percepción auditiva. ‘Escuchen’ reproduce bien el imperativo plural con naturalidad.
- source_word: μὴ ἐπαίρεσθε
  english_pob_choice: do not exalt yourselves
  chosen_spanish: no se enaltezcan
  alternatives_spanish:
  - no se engrían
  - no se ensoberbezcan
  lexicon: ἐπαίρω
  rationale: El griego sugiere elevarse con arrogancia. ‘Enaltezcan’ mantiene la imagen de elevación y el matiz moral sin volverlo demasiado interpretativo.
- source_word: τὰς δύο γενεὰς ταύτας
  english_pob_choice: these two tribes
  chosen_spanish: estas dos tribus
  alternatives_spanish:
  - estas dos generaciones
  - estas dos familias
  lexicon: γενεά
  rationale: Aquí el inglés POB ya interpreta γενεαί como ‘tribes’, coherente con el contexto de Leví y Judá. En español, ‘tribus’ preserva ese sentido contextual y evita una traducción literal engañosa.
- source_word: ἀνατελεῖ
  english_pob_choice: will rise
  chosen_spanish: brotará
  alternatives_spanish:
  - saldrá
  - se levantará
  - surgirá
  lexicon: ἀνατέλλω
  rationale: ‘Brotará’ expresa el surgir de la salvación con una imagen viva y bíblica, sin perder la idea de aparición/levantamiento que el inglés POB corrigió a ‘will rise’. Se mantiene el movimiento ascendente implícito.
- source_word: τὸ σωτήριον τοῦ Θεοῦ
  english_pob_choice: the salvation of God
  chosen_spanish: la salvación de Dios
  alternatives_spanish:
  - la salvación que viene de Dios
  - la liberación de Dios
  lexicon: σωτήριον
  rationale: ‘Salvación de Dios’ sigue de cerca la construcción genitiva y preserva la formulación del inglés POB. No se expande a ‘que viene de’ porque el genitivo puede quedar abierto y solemne.
theological_decisions:
- issue: Origen de la salvación vinculada a Leví y Judá
  english_pob_reading: from them the salvation of God will rise for us
  chosen_spanish_reading: de ellas nos brotará la salvación de Dios
  alternative_spanish_readings:
  - de ellos nos vendrá la salvación de Dios
  - de estas dos tribus surgirá para nosotros la salvación de Dios
  rationale: La frase conserva la referencia a las dos tribus y al origen instrumental de la salvación sin identificar explícitamente una figura mesiánica que el versículo aquí no nombra. ‘Brotará’ mantiene la imagen de surgimiento y la orientación futura del texto.
  doctrine_reference: Esperanza mesiánica/escatológica en los Testamentos de los Doce Patriarcas; tema de origen de la salvación
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para eliminar una nota ajena y cambiar ‘will arise’ por ‘will rise’. La traducción española sigue esa lectura revisada con un verbo de surgimiento natural (‘brotará’) y sin añadir material ajeno al versículo.
  spanish_consistency_notes:
  - Se usa ‘Y ahora’ para corresponder al adverbio inicial y mantener un giro bíblico natural en español.
  - Se conserva ‘Leví’ y ‘Judá’ como nombres propios transliterados estándar.
  - ‘Hijos míos’ y el vocativo plural ‘escuchen’ mantienen la apelación directa al grupo destinatario.
  - ‘Salvación de Dios’ respeta la formulación del texto fuente y el audit trail inglés, sin sustituirla por una paráfrasis explicativa.
