base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/004/006.yaml
  text: All his days he did not reproach us about this matter, but he loved us as his own soul, and honored us above his own sons, and granted us wealth and livestock and produce.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:50Z'
    unchanged: false
    changes_summary: Changed 'riches' to 'wealth' for a more natural and direct rendering of πλοῦτον; otherwise retained the draft as accurate and complete.
translation:
  language: es
  text: Todos sus días no nos reprochó por este asunto, sino que nos amó como a su propia alma, y nos honró por encima de sus propios hijos, y nos concedió riqueza, ganado y cosechas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὠνείδισεν
  english_pob_choice: did not reproach
  chosen_spanish: no nos reprochó
  alternatives_spanish:
  - no nos vituperó
  - no nos acusó
  lexicon: ὀνειδίζω
  rationale: Reproduce el sentido de reprender con deshonra implícita sin volverlo más fuerte que el griego ni añadir judicialidad que no aparece en el contexto.
- source_word: πᾶσας τὰς ἡμέρας
  english_pob_choice: All his days
  chosen_spanish: Todos sus días
  alternatives_spanish:
  - Durante todos sus días
  - Todo el tiempo de su vida
  lexicon: πᾶς + ἡμέρα
  rationale: Mantiene la extensión temporal total del original con una formulación natural en español.
- source_word: ὡς τὴν ψυχὴν αὐτοῦ
  english_pob_choice: as his own soul
  chosen_spanish: como a su propia alma
  alternatives_spanish:
  - como a su propia vida
  - como a sí mismo
  lexicon: ψυχή
  rationale: Conserva la comparación intensa del griego y evita reducir ψυχή a una simple perífrasis moderna; 'alma' sigue de cerca la imagen del texto.
- source_word: ὑπὲρ τοὺς υἱοὺς αὐτοῦ
  english_pob_choice: above his own sons
  chosen_spanish: por encima de sus propios hijos
  alternatives_spanish:
  - más que a sus propios hijos
  - sobre sus propios hijos
  lexicon: ὑπέρ + acusativo
  rationale: Expresa preferencia comparativa de manera clara y fiel en español, manteniendo la prioridad otorgada en el original.
- source_word: πλοῦτον
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - riquezas
  lexicon: πλοῦτος
  rationale: '''Riqueza'' es la correspondencia directa y natural para πλοῦτον; evita el plural estilístico ''riquezas'' que puede sonar menos preciso aquí.'
- source_word: κτήνη
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - animales
  - bestias
  lexicon: κτῆνος
  rationale: '''Ganado'' comunica de modo idiomático el conjunto de animales domésticos de valor económico, en línea con el sentido patrimonial del término.'
- source_word: καρπὸν
  english_pob_choice: produce
  chosen_spanish: fruto
  alternatives_spanish:
  - producción
  - cosecha
  - productos
  lexicon: καρπός
  rationale: '''Fruto'' mantiene la amplitud semántica de καρπός sin limitarlo exclusivamente a ''cosecha''; en español bíblico es una forma natural y suficientemente amplia.'
- source_word: ἐχαρίσατο
  english_pob_choice: granted
  chosen_spanish: nos concedió
  alternatives_spanish:
  - nos otorgó
  - nos dio generosamente
  lexicon: χαρίζομαι
  rationale: '''Conceder'' refleja el don gratuito implícito en χαρίζομαι mejor que un simple ''dar'', y preserva el matiz de favor benevolente.'
theological_decisions:
- issue: Preferential honor above the sons
  english_pob_reading: honored us above his own sons
  chosen_spanish_reading: nos honró por encima de sus propios hijos
  alternative_spanish_readings:
  - nos honró más que a sus propios hijos
  - nos dio más honor que a sus propios hijos
  rationale: Se conserva la afirmación de preferencia familiar sin suavizarla; el texto presenta una exaltación concreta de los hablantes por encima de los hijos del padre.
  doctrine_reference: No doctrinal expansion; maintains narrative preference as stated in the source.
translation_notes:
  revision_awareness: 'The English audit trail only records one revision: ''riches'' was updated to ''wealth'' for a more natural rendering of πλοῦτον. The Spanish draft follows that revision by using ''riqueza'' rather than a more ornamental plural like ''riquezas'', while keeping the rest aligned with the final English POB wording and the Greek source.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo verbal de la frase final con dos coordinaciones sucesivas, como en el griego y en el inglés auditado.
  - '''Alma'' se conserva para ψυχή por consistencia con el lenguaje bíblico tradicional y por su correspondencia con el símil del texto.'
  - No se introducen notas de pie porque el pasaje no presenta variantes textuales relevantes en el paquete provisto ni ambigüedades que requieran desdoblamiento editorial.
