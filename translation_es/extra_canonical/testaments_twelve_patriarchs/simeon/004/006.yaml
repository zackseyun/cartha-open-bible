source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: Πάσας⁴⁰ τὰς ἡμέρας⁴¹ οὐκ⁴² ὠνείδισεν ἡμᾶς⁴³ *περὶ τοῦ πράγματος τούτου⁴⁴, ἀλλ᾿⁴⁵ ἠγάπησεν ἡμᾶς ὡς τὴν *ψυχὴν αὐτοῦ⁴⁶ καὶ ὑπὲρ τοὺς υἱοὺς αὐτοῦ⁴⁷ ἐδόξασεν⁴⁸ ἡμᾶς, καὶ⁴⁹ *πλοῦτον καὶ κτήνη καὶ καρπὸν⁵⁰ *ἐχαρίσατο ἡμῖν⁵¹.
