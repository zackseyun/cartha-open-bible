id: T12P.SIM.4.9
reference: Testament of Simeon 4:9
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: '*Ὅτι καὶ⁷¹ ἐν ὕπνῳ *τις ζῆλος⁷² κακίας αὐτὸν⁷³ φαντάζουσα⁷⁴ κατεσθίει⁷⁵ καὶ⁷⁶ πνεύμασι πονηροῖς⁷⁷ διαταράσσει⁷⁸ τὴν ψυχὴν αὐτοῦ, καὶ ἐκθροεῖσθαι τὸ σῶμα ποιεῖ, καὶ ἐν ταραχῇ διυπνίζει⁷⁹ τὸν νοῦν, καὶ ὡς⁸⁰ πνεῦμα πονηρὸν *καὶ ἰοβόλον⁸¹, *οὕτως φαίνεται⁸² τοῖς ἀνθρώποις⁸³.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/004/009.yaml
  text: For even in sleep envy, presenting to him visions of wickedness, consumes him and troubles his soul with evil spirits, and makes the body shudder, and wakes the mind in turmoil; and like an evil and venomous spirit, so he appears to people.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:51Z'
    unchanged: false
    changes_summary: Removed the unnecessary 'by' before 'presenting' for smoother syntax closer to the Greek, and changed 'start up in fear' to 'shudder' to more directly reflect the sense of the body being made to tremble/start without adding 'in fear,' which is not explicit in the source.
translation:
  language: es
  text: Porque aun en sueños la envidia, presentándole visiones de maldad, lo consume y perturba su alma con espíritus malignos, hace temblar el cuerpo y despierta la mente en turbación; y como un espíritu maligno y venenoso, así aparece ante la gente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν ὕπνῳ
  english_pob_choice: in sleep
  chosen_spanish: en el sueño
  alternatives_spanish:
  - mientras duerme
  - durante el sueño
  lexicon: ὕπνος
  rationale: Conserva la referencia al estado de sueño sin introducir una explicación adicional. «En el sueño» sigue de cerca el griego y funciona de manera natural en español.
- source_word: ζῆλος κακίας
  english_pob_choice: envy
  chosen_spanish: la envidia
  alternatives_spanish:
  - el celo de maldad
  - el celo malo
  lexicon: ζῆλος
  rationale: El contexto describe una pasión destructiva que consume y turba; en español, «envidia» comunica bien esa fuerza afectiva negativa. Se mantiene la tensión del término sin convertirlo en un concepto moral más suave.
- source_word: φαντάζουσα
  english_pob_choice: presenting to him visions
  chosen_spanish: presentándole visiones
  alternatives_spanish:
  - mostrándole visiones
  - haciéndole ver
  lexicon: φαντάζω
  rationale: El participio se vierte de forma verbal y directa para conservar la imagen de visiones ofrecidas a la persona. «Presentándole» refleja el matiz sin recargar la frase.
- source_word: κατεσθίει
  english_pob_choice: consumes
  chosen_spanish: lo consume
  alternatives_spanish:
  - lo devora
  - lo consume por completo
  lexicon: κατεσθίω
  rationale: «Consumir» reproduce bien la imagen de desgaste interior y es idiomático en español. «Devorar» sería más fuerte, pero no necesario aquí.
- source_word: πνεύμασι πονηροῖς
  english_pob_choice: with evil spirits
  chosen_spanish: con espíritus malignos
  alternatives_spanish:
  - por espíritus malignos
  - con malos espíritus
  lexicon: πνεῦμα
  rationale: Se conserva el sentido personal/espiritual de πνεύματα. «Malignos» es más natural y digno que una calca demasiado literal, sin perder la carga negativa.
- source_word: διαταράσσει
  english_pob_choice: troubles
  chosen_spanish: perturba
  alternatives_spanish:
  - turba
  - agita
  lexicon: διαταράσσω
  rationale: «Perturba» expresa la alteración interior de alma y mente de manera clara y sobria. Mantiene la amplitud del verbo griego.
- source_word: ἐκθροεῖσθαι τὸ σῶμα ποιεῖ
  english_pob_choice: makes the body shudder
  chosen_spanish: hace temblar el cuerpo
  alternatives_spanish:
  - hace estremecer el cuerpo
  - hace que el cuerpo se estremezca
  lexicon: ἐκθροέω
  rationale: El griego expresa un sobresalto/temblor corporal. «Hace temblar el cuerpo» sigue bien la revisión inglesa que evitó añadir «de miedo» y conserva el efecto físico sin sobreinterpretarlo.
- source_word: ἐν ταραχῇ διυπνίζει τὸν νοῦν
  english_pob_choice: wakes the mind in turmoil
  chosen_spanish: despierta la mente en turbación
  alternatives_spanish:
  - despierta la mente con turbación
  - mantiene la mente en confusión al despertar
  lexicon: διυπνίζω
  rationale: «Despierta la mente» comunica el despertar en un estado alterado; «en turbación» conserva el ámbito de confusión/trastorno del griego y de la lectura inglesa revisada.
- source_word: πνεῦμα πονηρὸν καὶ ἰοβόλον
  english_pob_choice: an evil and venomous spirit
  chosen_spanish: un espíritu maligno y venenoso
  alternatives_spanish:
  - un espíritu malo y venenoso
  - un espíritu maligno y ponzoñoso
  lexicon: ἰοβόλος
  rationale: «Venenoso» da cuenta de ἰοβόλος con un español claro y formal. «Ponzoñoso» es posible, pero «venenoso» resulta más transparente para lectores amplios.
- source_word: φαίνεται τοῖς ἀνθρώποις
  english_pob_choice: he appears to people
  chosen_spanish: se muestra a los hombres
  alternatives_spanish:
  - aparece a los hombres
  - se manifiesta a las personas
  lexicon: φαίνω
  rationale: «Se muestra» conserva el valor de apariencia/manifestación y evita una traducción excesivamente técnica. «A los hombres» sigue el plural genérico del griego; se podría modernizar a «a las personas», pero eso suaviza el formulario del texto fuente.
theological_decisions:
- issue: La envidia como agente casi personal que actúa durante el sueño
  english_pob_reading: For even in sleep envy, presenting to him visions of wickedness, consumes him...
  chosen_spanish_reading: Porque aun en el sueño la envidia, presentándole visiones de maldad, lo consume...
  alternative_spanish_readings:
  - Porque aun en el sueño, al presentar visiones de maldad, la envidia lo consume
  - Porque aun dormido la envidia lo consume
  rationale: Se conserva la estructura en la que la envidia aparece como sujeto activo que opera durante el sueño. El griego permite esta personificación, y la redacción española mantiene esa tensión sin explicarla en exceso.
  doctrine_reference: Antropología moral del Testamento de los Doce Patriarcas; personificación retórica del vicio.
- issue: Espíritus malignos y perturbación interior
  english_pob_reading: troubles his soul with evil spirits
  chosen_spanish_reading: perturba su alma con espíritus malignos
  alternative_spanish_readings:
  - turba su alma con espíritus malos
  - alborota su alma con espíritus malignos
  rationale: La frase preserva que el daño afecta el alma y que los espíritus malignos son parte del cuadro, no mera metáfora psicológica. No se reduce a simple emoción interior.
  doctrine_reference: Demonología y antropología espiritual del documento pseudepigráfico.
- issue: El cuerpo ‘shudders’ sin añadir ‘de miedo’
  english_pob_reading: makes the body shudder
  chosen_spanish_reading: hace temblar el cuerpo
  alternative_spanish_readings:
  - hace estremecer el cuerpo
  - hace que el cuerpo se estremezca
  rationale: Se sigue la revisión inglesa que eliminó la adición interpretativa «in fear». El español evita introducir un motivo emocional que el griego no explicita.
  doctrine_reference: Fidelidad semántica al efecto corporal explícito del texto.
translation_notes:
  revision_awareness: La versión española toma en cuenta la revisión inglesa más reciente, especialmente la eliminación de la idea añadida de ‘fear’ en el efecto corporal y la preferencia por un verbo más directo (‘shudder’). También respeta la sintaxis participial del griego, manteniendo la acumulación de acciones sin reexplicarlas como causas separadas.
  spanish_consistency_notes:
  - Se mantiene «espíritus malignos» para πνεύματα πονηρά, evitando alternar con «malos espíritus» en este pasaje.
  - Se usa «envidia» para ζῆλος en coherencia con el inglés POB, aunque el término griego puede tener amplitud semántica mayor.
  - «Venenoso» se reserva para ἰοβόλον; no se sustituye por «ponzoñoso» para conservar claridad y consistencia estilística.
  - No se introduce mayúscula en «espíritu» porque aquí no se refiere al Espíritu Santo sino a un espíritu maligno genérico.
