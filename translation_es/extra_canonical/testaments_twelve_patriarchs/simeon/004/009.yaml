review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el inglés auditado: mantiene a la envidia como sujeto personificado, conserva las visiones de maldad, la perturbación del alma por espíritus malignos, el temblor corporal, el despertar de la mente en turbación y la comparación final con un espíritu maligno y venenoso. La única desviación relevante es «se muestra a los hombres», que atenúa el valor más simple de apariencia en φαίνεται τοῖς ἀνθρώποις; «aparece a la gente/las personas» o «parece ante la gente» refleja mejor el original.'
  spanish_quality_summary: El español es claro y digno. Sin embargo, «en el sueño» suena algo menos natural que «en sueños» o «mientras duerme», y «a los hombres» puede leerse hoy como masculino marcado. También conviene evitar la repetición algo pesada de «y» cuando una coordinación más fluida mantiene la fidelidad. El cambio principal recomendado es estilístico-semántico en la cláusula final.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Espíritus malignos», «mente», «alma» y «venenoso» son adecuados. La elección «la envidia» para ζῆλος en este contexto es defendible por el inglés auditado, aunque el griego podría tener un matiz más amplio de celo apasionado; no requiere adjudicación. '
  issues:
  - severity: medium
    issue: «se muestra a los hombres» para φαίνεται τοῖς ἀνθρώποις
    rationale: φαίνεται expresa aparecer/parecer ante otros. «Se muestra» introduce un matiz más voluntario o activo que no está en el griego. «Así aparece ante la gente» o «así aparece a las personas» preserva mejor la idea de apariencia.
  - severity: low
    issue: «en el sueño» suena algo rígido en español
    rationale: Aunque fiel, «en sueños» es más idiomático en español y conserva bien ἐν ὕπνῳ. Es una mejora de naturalidad, no una corrección indispensable.
  - severity: low
    issue: «a los hombres» como genérico
    rationale: τοῖς ἀνθρώποις significa personas/gente. En español actual eclesial amplio, «la gente» o «las personas» comunica mejor sin pérdida de sentido.
  revised_spanish_text: Porque aun en sueños la envidia, presentándole visiones de maldad, lo consume y perturba su alma con espíritus malignos, hace temblar el cuerpo y despierta la mente en turbación; y como un espíritu maligno y venenoso, así aparece ante la gente.
  revision_rationale: Se ajusta la cláusula final para reflejar mejor φαίνεται como apariencia ante otros, no auto-manifestación voluntaria. Además, «en sueños» y «ante la gente» mejoran la naturalidad del español sin apartarse del griego ni del inglés auditado. No se requieren notas al pie.
