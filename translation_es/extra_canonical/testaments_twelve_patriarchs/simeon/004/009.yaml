- from: Porque aun en el sueño la envidia, presentándole visiones de maldad, lo consume y perturba su alma con espíritus malignos, y hace temblar el cuerpo, y despierta la mente en turbación; y como un espíritu maligno y venenoso, así se muestra a los hombres.
  to: Porque aun en sueños la envidia, presentándole visiones de maldad, lo consume y perturba su alma con espíritus malignos, hace temblar el cuerpo y despierta la mente en turbación; y como un espíritu maligno y venenoso, así aparece ante la gente.
  rationale: Se ajusta la cláusula final para reflejar mejor φαίνεται como apariencia ante otros, no auto-manifestación voluntaria. Además, «en sueños» y «ante la gente» mejoran la naturalidad del español sin apartarse del griego ni del inglés auditado. No se requieren notas al pie.
