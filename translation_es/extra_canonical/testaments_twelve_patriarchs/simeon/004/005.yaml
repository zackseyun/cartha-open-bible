review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: exhortación a guardarse, evitar dos vicios, caminar en una disposición interior recta, y recibir de Dios gracia, gloria y bendición, con José como ejemplo. Sin embargo, la pareja ζήλου καὶ φθόνου se alinea mejor con ''celos y envidia'' que con ''celo y envidia'' en este contexto moral negativo, y el doble énfasis de ὑμεῖς no necesita mantenerse con el algo pesado ''ustedes''.'
  spanish_quality_summary: El español es claro y digno, pero 'Guárdense, pues, ustedes' suena algo recargado, y 'de todo celo y envidia' puede leerse como 'fervor' en sentido positivo, lo cual reduce la claridad inmediata para lectores hispanos. Una leve depuración mejora naturalidad y precisión semántica sin apartarse del original.
  glossary_alignment: 'Se mantiene correctamente ''Dios'', ''gracia'', ''gloria'', ''bendición'', y ''José''. No hay conflicto con la terminología del proyecto. La principal cuestión léxica es ζῆλος: aunque ''celo'' es posible, en español eclesial general ''celos'' comunica mejor el valor negativo exigido por el paralelo con φθόνος y por el contexto exhortativo.'
  issues:
  - severity: medium
    issue: ζῆλος traducido como 'celo'
    rationale: En español contemporáneo, 'celo' suele sugerir fervor, diligencia o celo positivo; aquí el contexto con φθόνος exige un vicio afín a 'jealousy'. 'Celos y envidia' preserva mejor la fuerza moral negativa del griego y coincide más naturalmente con el inglés auditado.
  - severity: low
    issue: Presencia de 'ustedes' tras 'Guárdense'
    rationale: El pronombre explícito reproduce ὑμεῖς, pero en español suena innecesario y algo torpe porque la forma verbal ya marca la persona. Omitirlo mejora fluidez sin pérdida semántica relevante.
  revised_spanish_text: Guárdense, pues, hijos míos, de todos los celos y la envidia, y caminen en sencillez de corazón, para que Dios también les dé gracia, gloria y bendición sobre sus cabezas, como vieron en José.
  revision_rationale: Se ajustó 'celo' a 'celos' para reflejar con más claridad el valor negativo de ζῆλος en paralelo con φθόνος, y se eliminó 'ustedes' por naturalidad española. También se suavizó la coordinación nominal a 'de todos los celos y la envidia', que suena más idiomática en español manteniendo el sentido de 'every jealousy and envy'.
