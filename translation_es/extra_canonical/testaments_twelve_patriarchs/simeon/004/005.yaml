base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/004/005.yaml
  text: Therefore guard yourselves, my children, from every jealousy and envy, and walk in simplicity of heart, so that God may also give you grace and glory and blessing upon your heads, just as you saw in Joseph.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:50Z'
    unchanged: false
    changes_summary: Changed 'favor' to 'grace' for closer lexical correspondence to χάριν. No other changes needed.
translation:
  language: es
  text: Guárdense, pues, ustedes, hijos míos, de todo celo y envidia, y caminen en sencillez de corazón, para que Dios también les dé gracia, gloria y bendición sobre sus cabezas, como vieron en José.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Φυλάξασθε οὖν ὑμεῖς
  english_pob_choice: Therefore guard yourselves
  chosen_spanish: Guárdense, pues, ustedes
  alternatives_spanish:
  - Por tanto, cuídense ustedes
  - Así que vigílense ustedes
  lexicon: φυλάσσω
  rationale: El imperativo reflexivo transmite bien la idea de guardarse o cuidarse; 'guárdense' suena natural y conserva el sentido exhortativo de vigilancia.
- source_word: ἀπὸ παντὸς ζήλου καὶ φθόνου
  english_pob_choice: from every jealousy and envy
  chosen_spanish: de todo celo y envidia
  alternatives_spanish:
  - de toda celotipia y envidia
  - de todo celo y recelo
  lexicon: ζῆλος / φθόνος
  rationale: '''ζῆλος'' puede ser celo o celos; aquí, en paralelo con φθόνος, ''celo'' preserva la tensión entre fervor celoso y rivalidad. ''Envidia'' corresponde con precisión a φθόνος.'
- source_word: πορεύεσθε ἐν ἁπλότητι καρδίας
  english_pob_choice: walk in simplicity of heart
  chosen_spanish: caminen en sencillez de corazón
  alternatives_spanish:
  - anden en simplicidad de corazón
  - vivan con un corazón sencillo
  lexicon: πορεύομαι / ἁπλότης / καρδία
  rationale: '''Caminen'' conserva el valor exhortativo de conducta continua; ''sencillez de corazón'' expresa con naturalidad ἁπλότητι καρδίας sin endurecerlo en un calco técnico.'
- source_word: ἵνα δῷ ... ὁ Θεὸς χάριν καὶ δόξαν καὶ εὐλογίαν
  english_pob_choice: so that God may also give you grace and glory and blessing
  chosen_spanish: para que Dios también les dé gracia, gloria y bendición
  alternatives_spanish:
  - a fin de que Dios también les conceda gracia, gloria y bendición
  - para que Dios les otorgue gracia, gloria y bendición
  lexicon: χάρις / δόξα / εὐλογία
  rationale: '''Gracia'' sigue la decisión revisada de la POB para χάριν; ''gloria'' y ''bendición'' son equivalentes directos y transparentes en español.'
- source_word: ἐπὶ τὰς κεφαλὰς ὑμῶν
  english_pob_choice: upon your heads
  chosen_spanish: sobre sus cabezas
  alternatives_spanish:
  - sobre la cabeza de ustedes
  - encima de sus cabezas
  lexicon: ἐπί + acusativo
  rationale: La imagen física se mantiene sin explicación añadida; 'sobre sus cabezas' reproduce de forma clara la metáfora de bendición derramada.
- source_word: καθὼς ἴδετε ἐν Ἰωσήφ
  english_pob_choice: just as you saw in Joseph
  chosen_spanish: como vieron en José
  alternatives_spanish:
  - tal como vieron en José
  - así como lo vieron en José
  lexicon: καθώς / ὁράω
  rationale: La formulación es breve y fiel; 'en José' conserva la referencia ejemplar al personaje sin añadir una paráfrasis interpretativa.
theological_decisions:
- issue: grace vs favor for χάριν
  english_pob_reading: The revised English POB explicitly changed 'favor' to 'grace' for closer lexical correspondence to χάριν.
  chosen_spanish_reading: gracia
  alternative_spanish_readings:
  - favor
  - benevolencia
  rationale: '''Gracia'' es la correspondencia más directa y mantiene la revisión auditada del inglés; ''favor'' suavizaría indebidamente el peso teológico de χάρις en este contexto.'
  doctrine_reference: Lexical-theological correspondence for χάρις in a blessing context
- issue: Rendering of ζῆλος with its possible positive/negative force
  english_pob_reading: The English POB chose 'jealousy and envy' without further differentiation.
  chosen_spanish_reading: celo y envidia
  alternative_spanish_readings:
  - celos y envidia
  - celo y celos
  rationale: En español, 'celo' conserva el campo semántico más amplio de ζῆλος y permite mantener la proximidad con 'envidia' sin fusionar ambos términos; la pareja 'celos y envidia' sería más familiar, pero menos precisa.
  doctrine_reference: Lexical nuance in moral exhortation
- issue: Simplicity of heart as moral disposition
  english_pob_reading: walk in simplicity of heart
  chosen_spanish_reading: caminen en sencillez de corazón
  alternative_spanish_readings:
  - anden en simplicidad de corazón
  - vivan con sencillez de corazón
  rationale: '''Sencillez de corazón'' comunica integridad, transparencia y ausencia de duplicidad; evita reducir ἁπλότης a mera ingenuidad.'
  doctrine_reference: Ethical anthropology in wisdom/exhortation literature
translation_notes:
  revision_awareness: 'The English audit trail shows one substantive revision: ''favor'' was corrected to ''grace'' to match χάριν more closely. The Spanish draft follows that revision and otherwise stays aligned with the established English POB reading and the Greek source, with no additional textual variants in the packet requiring annotation.'
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para ὁ Θεός, conforme al estándar del proyecto.
  - '''Yahvé'' no aparece en este versículo, por lo que no se introduce terminología adicional.'
  - 'Se conservó el paralelismo de la exhortación: guardarse, caminar, para que Dios dé.'
  - La imagen de bendición 'sobre sus cabezas' se mantuvo literal por su fuerza simbólica y su claridad en español.
