source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: '*Καὶ ὑμεῖς⁵², τέκνα μου⁵³, ἀγαπήσατε⁵⁴ ἕκαστος τὸν ἀδελφὸν⁵⁵ αὐτοῦ⁵⁶ ἐν ἀγαθῇ καρδίᾳ, καὶ *ἀποστήσεται ἀφ᾽ ὑμῶν τὸ πνεῦμα τοῦ φθόνου⁵⁷.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/004/007.yaml
  text: And you also, my children, let each one love his brother with a good heart, and the spirit of envy will depart from you.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:49Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y ustedes también, mis hijos, amen cada uno a su hermano con buen corazón, y el espíritu de la envidia se apartará de ustedes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀγαπήσατε
  english_pob_choice: let each one love
  chosen_spanish: amen cada uno
  alternatives_spanish:
  - que cada uno ame
  - amen
  lexicon: ἀγαπάω
  rationale: El griego expresa una exhortación directa; en español, «amen cada uno» conserva el imperativo plural con distribución individual sin añadir elementos ajenos al texto.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su hermano de él
  - a su prójimo
  lexicon: ἀδελφός
  rationale: «Hermano» corresponde con fidelidad al parentesco/fraternidad indicado por el original; «prójimo» ampliaría indebidamente el alcance.
- source_word: ἐν ἀγαθῇ καρδίᾳ
  english_pob_choice: with a good heart
  chosen_spanish: con buen corazón
  alternatives_spanish:
  - con un corazón bueno
  - de buen corazón
  lexicon: καρδία
  rationale: La expresión es natural en español y conserva la cualidad interior moral/afectiva del original sin volverla más abstracta de lo necesario.
- source_word: τὸ πνεῦμα τοῦ φθόνου
  english_pob_choice: the spirit of envy
  chosen_spanish: el espíritu de la envidia
  alternatives_spanish:
  - el espíritu envidioso
  - el espíritu de celos
  lexicon: πνεῦμα; φθόνος
  rationale: Se mantiene «espíritu» para πνεῦμα y «envidia» para φθόνος. «Celos» sería posible en algunos contextos, pero aquí el genitivo apunta mejor al vicio de la envidia.
- source_word: ἀποστήσεται ἀφ᾽ ὑμῶν
  english_pob_choice: will depart from you
  chosen_spanish: se apartará de ustedes
  alternatives_spanish:
  - se retirará de ustedes
  - se irá de ustedes
  lexicon: ἀφίστημι
  rationale: «Apartarse» comunica el alejamiento resultante sin imponer una imagen más fuerte que la del verbo griego.
theological_decisions:
- issue: Relación entre el amor fraternal y la retirada del espíritu de la envidia
  english_pob_reading: and the spirit of envy will depart from you
  chosen_spanish_reading: y el espíritu de la envidia se apartará de ustedes
  alternative_spanish_readings:
  - y el espíritu de envidia se irá de ustedes
  - y desaparecerá de ustedes el espíritu de la envidia
  rationale: 'Se conserva la conexión causal/resultado del texto: el amor fraterno no es solo mandato ético, sino medio por el cual se disipa una influencia viciosa personificada como espíritu.'
  doctrine_reference: Ética comunitaria y lucha contra los vicios interiores/personificados en la tradición sapiencial y testamentaria.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente indicada como unchanged; no se incorporaron cambios textuales adicionales. La redacción española se ajusta directamente al griego disponible y al auditorio POB sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este versículo no contiene el tetragrámaton ni κύριος con función de cita directa.
  - Se usó «espíritu» en minúscula para πνεῦμα en sentido de influencia viciosa, no del Espíritu Santo.
  - Se prefirió «hermano» por la estrecha correspondencia con ἀδελφός en el contexto de exhortación fraterna.
