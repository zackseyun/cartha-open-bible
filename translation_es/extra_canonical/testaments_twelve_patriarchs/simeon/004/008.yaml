source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: Ὅτι⁵⁸ ἀγριοῖ τοῦτο⁵⁹ τὴν ψυχήν⁶⁰, καὶ φθείρει *τὸ σῶμα⁶¹, *ὀργὴν καὶ πόλεμον παρέχει τῷ διαβουλίῳ⁶², καὶ εἰς⁶³ αἵματα⁶⁴ παροξύνει, καὶ εἰς ἔκστασιν ἄγει⁶⁵ *τὴν διάνοιαν⁶⁶, καὶ κλόνον⁶⁹ παρέχει τῇ ψυχῇ⁷⁰ καὶ τρόμον τῷ σώματι.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/004/008.yaml
  text: For this makes the soul savage, and destroys the body; it brings anger and war into one’s plans, and provokes to bloodshed, and leads the mind into frenzy, and gives the soul upheaval and the body trembling.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:50Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Porque esto vuelve salvaje[a] el alma, y destruye el cuerpo; introduce ira y guerra en los planes, e incita al derramamiento de sangre, y conduce la mente al frenesí, y da al alma agitación y al cuerpo temblor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como “vuelve feroz” o “enfurece”; se conserva “salvaje” por su cercanía al verbo griego y al giro del inglés POB.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγριοῖ
  english_pob_choice: makes ... savage
  chosen_spanish: vuelve salvaje
  alternatives_spanish:
  - enfurece
  - vuelve feroz
  lexicon: ἀγριόω
  rationale: Conserva la imagen de brutalización interior que refleja el inglés POB, y en español suena natural sin suavizar el verbo ni convertirlo en una mera emoción.
- source_word: ψυχή
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser interior
  lexicon: ψυχή
  rationale: El contexto opone el efecto sobre el alma y el cuerpo, por lo que 'alma' mantiene la distinción antropológica del texto.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - organismo
  - carne
  lexicon: σῶμα
  rationale: '''Cuerpo'' es la correspondencia directa y mantiene el paralelismo con ''alma'' y ''temblor del cuerpo'' al final del versículo.'
- source_word: διαβούλιον
  english_pob_choice: one’s plans
  chosen_spanish: los planes
  alternatives_spanish:
  - el consejo
  - la deliberación
  lexicon: διαβούλιον
  rationale: El término apunta a propósito, resolución o consejo interior; en español 'planes' comunica con claridad la esfera volitiva sin sobrecargar el texto.
- source_word: αἵματα
  english_pob_choice: bloodshed
  chosen_spanish: derramamiento de sangre
  alternatives_spanish:
  - sangre
  - matanza
  lexicon: αἷμα
  rationale: No se trata de sangre literal aislada sino del resultado violento; 'derramamiento de sangre' conserva la fuerza idiomática del inglés POB y la carga moral del plural griego.
- source_word: διάνοιαν
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - pensamiento
  lexicon: διάνοια
  rationale: '''Mente'' transmite la facultad cognitiva afectada y mantiene el contraste con alma y cuerpo.'
- source_word: ἔκστασιν
  english_pob_choice: frenzy
  chosen_spanish: frenesí
  alternatives_spanish:
  - éxtasis
  - desvarío
  lexicon: ἔκστασις
  rationale: '''Frenesí'' evita la ambigüedad positiva de ''éxtasis'' y reproduce el sentido de desorden mental extremo que marca el contexto.'
- source_word: κλόνον
  english_pob_choice: upheaval
  chosen_spanish: agitación
  alternatives_spanish:
  - conmoción
  - trastorno
  lexicon: κλόνος
  rationale: '''Agitación'' expresa la perturbación del alma sin añadir una imagen demasiado fuerte o técnica; es una equivalencia sobria del efecto interno.'
- source_word: τρόμον
  english_pob_choice: trembling
  chosen_spanish: temblor
  alternatives_spanish:
  - tremor
  - espanto
  lexicon: τρόμος
  rationale: '''Temblor'' mantiene el efecto físico del miedo o la conmoción sobre el cuerpo, con español natural y directo.'
theological_decisions:
- issue: Efecto antropológico tripartito del vicio/ira
  english_pob_reading: It makes the soul savage, destroys the body, and disturbs mind and soul
  chosen_spanish_reading: El texto distingue alma, mente y cuerpo, mostrando un desorden integral de la persona
  alternative_spanish_readings:
  - Solo daña las emociones
  - Se refiere únicamente al cuerpo
  rationale: 'La redacción conserva la secuencia del griego y del inglés POB: alma, cuerpo, mente, alma, cuerpo. No se reduce a una sola esfera moral o física.'
  doctrine_reference: Antropología bíblica; integridad de la persona
translation_notes:
  revision_awareness: Se siguió el testimonio griego proporcionado y el inglés POB vigente, sin revisiones aplicadas; la traducción inglesa no tenía notas ni variantes que requirieran reflejo adicional en español.
  spanish_consistency_notes:
  - Se mantuvo 'alma' para ψυχή y 'cuerpo' para σῶμα en todo el versículo.
  - Se evitó introducir terminología doctrinal ajena como 'carne' o 'espíritu' porque no corresponden a este pasaje.
  - '''Derramamiento de sangre'' preserva la intensidad moral de αἵματα sin convertirlo en una referencia literal a ''sangres''.'
