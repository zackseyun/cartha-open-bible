translation:
  language: es
  text: Porque me entristecía más que todos los demás, pues yo fui el culpable[a] de la venta de José.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «culpable» refleja el matiz moral de αἴτιος; también podría traducirse «responsable».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπένθουν
  english_pob_choice: I was grieving
  chosen_spanish: me entristecía
  alternatives_spanish:
  - estaba de duelo
  - me dolía profundamente
  lexicon: πενθέω
  rationale: El griego expresa luto o pesar intenso. En español, «me entristecía» comunica bien el estado emocional continuo sin sonar demasiado fúnebre para un contexto narrativo breve.
- source_word: παρὰ πάντας
  english_pob_choice: more than all the others
  chosen_spanish: más que todos los demás
  alternatives_spanish:
  - por encima de todos
  - más que todos
  lexicon: παρά + comparativo
  rationale: La comparación con «todos los demás» reproduce el sentido de excedencia sin sobrecargar el estilo. Es natural en español y mantiene la fuerza comparativa del original.
- source_word: αἴτιος
  english_pob_choice: responsible
  chosen_spanish: culpable
  alternatives_spanish:
  - responsable
  - causante
  lexicon: αἴτιος
  rationale: El término puede indicar causa o culpa. Aquí, por el contexto de la venta de José, «culpable» preserva la fuerza moral y evita suavizar indebidamente la carga ética.
- source_word: τῆς πράσεως Ἰωσήφ
  english_pob_choice: the sale of Joseph
  chosen_spanish: de la venta de José
  alternatives_spanish:
  - de vender a José
  - de la venta de José
  lexicon: πρᾶσις
  rationale: «Venta» refleja de forma directa el sustantivo griego y conserva la referencia concreta al acto mercantil injusto. «José» sigue la forma usual española del nombre bíblico.
theological_decisions:
- issue: Carga moral de la confesión
  english_pob_reading: I was responsible for the sale of Joseph
  chosen_spanish_reading: yo fui el culpable de la venta de José
  alternative_spanish_readings:
  - yo fui responsable de la venta de José
  - yo causé la venta de José
  rationale: La línea es una confesión de culpa personal; en español, «culpable» expresa mejor ese matiz que un simple enunciado causal. No añade doctrina nueva, sino que hace audible la responsabilidad moral implícita en αἴτιος.
  doctrine_reference: Responsabilidad moral personal / confesión de pecado
translation_notes:
  revision_awareness: El pasaje fue revisado en la pasada más reciente y quedó sin cambios; esta propuesta sigue de cerca el texto griego y el sentido ya estabilizado en la versión inglesa POB, sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se usa «José» para el nombre propio, conforme al uso bíblico estándar en español.
  - Se mantiene un registro sobrio y confesional, acorde con el tono penitencial del contexto.
  - No se introduce «Mesías», «SEÑOR» ni otros términos teológicamente cargados no presentes en el verso.
