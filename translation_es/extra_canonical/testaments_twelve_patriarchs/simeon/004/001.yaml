  to: 'Entonces mi padre seguía preguntando por mí, porque me había visto cabizbajo, y yo le dije: “Mi hígado está hinchado”.'
  rationale: Se ajusta “yo le decía” a “yo le dije” para respetar mejor la decisión auditada del inglés POB y evitar un matiz iterativo innecesario en español. También se cambia “sombrío” por “cabizbajo” para una descripción más natural del aspecto visible de la persona sin alterar el sentido.
