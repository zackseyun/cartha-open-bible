  text: Ἦν δὲ ὁ πατήρ μου ἐρωτῶν¹ ⌈περὶ ἐμοῦ⌉² *ὅτι ἑώρακέ με σκυθρωπόν³, καὶ⁴ ἔλεγον αὐτῷ⁵ *ὅτι τὰ ἤπατά μου ὀγκοῦμαι⁶.
