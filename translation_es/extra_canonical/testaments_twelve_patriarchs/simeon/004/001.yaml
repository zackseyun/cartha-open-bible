base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/004/001.yaml
  text: Now my father kept asking about me, because he had seen me gloomy, and I said to him, “My liver is swollen.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:48Z'
    unchanged: false
    changes_summary: Changed “I told him” to the more literal “I said to him” to reflect ἔλεγον αὐτῷ more closely. No other changes needed.
translation:
  language: es
  text: 'Entonces mi padre seguía preguntando por mí, porque me había visto cabizbajo, y yo le dije: “Mi hígado está hinchado”.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐρωτῶν περὶ ἐμοῦ
  english_pob_choice: kept asking about me
  chosen_spanish: seguía preguntando por mí
  alternatives_spanish:
  - seguía preguntando acerca de mí
  - me seguía preguntando
  lexicon: ἐρωτάω
  rationale: El griego presenta una acción continuada; “seguía preguntando por mí” comunica bien la insistencia sin endurecer el español. “Por mí” conserva la idea de interés sobre su estado o situación.
- source_word: σκυθρωπόν
  english_pob_choice: gloomy
  chosen_spanish: sombrío
  alternatives_spanish:
  - triste
  - cabizbajo
  - oscuro de semblante
  lexicon: σκυθρωπός
  rationale: El adjetivo describe un semblante o aspecto abatido. “Sombrío” es natural en español y mantiene la impresión visual y emocional del original sin convertirla en una explicación.
- source_word: ἔλεγον αὐτῷ
  english_pob_choice: I said to him
  chosen_spanish: yo le decía
  alternatives_spanish:
  - yo le dije
  - le decía
  lexicon: λέγω
  rationale: El imperfecto griego sugiere habla repetida o continuada; “yo le decía” refleja esa duratividad mejor que un perfecto puntual. Se mantiene la literalidad relacional de αὐτῷ con “le”.
- source_word: τὰ ἤπατά μου ὀγκοῦμαι
  english_pob_choice: My liver is swollen
  chosen_spanish: Mi hígado está hinchado
  alternatives_spanish:
  - Tengo el hígado hinchado
  - Mi hígado se me hincha
  lexicon: ἧπαρ
  rationale: Se conserva la imagen corporal concreta del texto. “Hígado” es el término normal en español; “está hinchado” transmite el estado descrito por ὀγκοῦμαι de modo directo y readable.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió “I told him” por “I said to him” para reflejar con más cercanía ἔλεγον αὐτῷ. La redacción española adopta igualmente un imperfecto (“decía”) para conservar esa continuidad aspectual. No se requieren notas textuales adicionales.
  spanish_consistency_notes:
  - Se evita “SEÑOR” u otras sustituciones no pertinentes, pues no aparece lenguaje divino en este versículo.
  - Se mantiene un registro sobrio y literal donde el español lo permite sin calco duro.
  - La puntuación reproduce el discurso directo y la progresión causal del griego.
