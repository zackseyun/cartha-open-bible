source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: '*Καὶ ὅτε¹⁰ κατέβημεν εἰς Αἴγυπτον, καὶ¹¹ ἔδησέ¹² με¹³ ὡς κατάσκοπον¹⁴, ἔγνων ὅτι δικαίως πάσχω¹⁵ καὶ οὐκ ἐλυπούμην¹⁶.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/004/003.yaml
  text: And when we went down into Egypt and he bound me as a spy, I knew that I was suffering justly, and I was not grieved.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:49Z'
    unchanged: false
    changes_summary: Replaced 'distressed' with 'grieved' to more closely reflect ἐλυπούμην while keeping the rest of the draft intact and natural.
translation:
  language: es
  text: Y cuando descendimos a Egipto, y él me ató como a un espía[a], supe que sufría con justicia, y no me entristecí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «como espía». El griego ὡς puede entenderse con un matiz comparativo o de trato.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «no me afligí». ἐλυπούμην expresa tristeza o pena interior; «no me entristecí» lo comunica de manera más natural en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέβημεν εἰς Αἴγυπτον
  english_pob_choice: we went down into Egypt
  chosen_spanish: descendimos a Egipto
  alternatives_spanish:
  - fuimos a Egipto
  - bajamos a Egipto
  lexicon: καταβαίνω
  rationale: El griego usa un verbo de descenso; «descendimos» conserva esa imagen sin sonar forzado en español y evita reducirla a un simple movimiento geográfico.
- source_word: ἔδησέ με
  english_pob_choice: he bound me
  chosen_spanish: me ató
  alternatives_spanish:
  - me sujetó
  - me encarceló
  lexicon: δέω
  rationale: El verbo básico es atar o amarrar. «Me ató» mantiene la fuerza literal y la relación con la acusación de espía.
- source_word: ὡς κατάσκοπον
  english_pob_choice: as a spy
  chosen_spanish: como a un espía
  alternatives_spanish:
  - como espía
  - por espía
  lexicon: κατάσκοπος
  rationale: «Como a un espía» suena natural en español y preserva el matiz de trato/comparación del griego ὡς.
- source_word: δικαίως πάσχω
  english_pob_choice: I was suffering justly
  chosen_spanish: sufría con justicia
  alternatives_spanish:
  - padecí justamente
  - sufría justamente
  lexicon: δικαίως + πάσχω
  rationale: Se conserva el adverbio de manera con el verbo de padecer. «Con justicia» mantiene el valor evaluativo y evita interpretar de más el tipo exacto de sufrimiento.
- source_word: ἐλυπούμην
  english_pob_choice: I was not grieved
  chosen_spanish: no me dolí
  alternatives_spanish:
  - no me entristecí
  - no me afligí
  lexicon: λυπέω
  rationale: La forma media/imperfecta expresa estar apenado o dolido. «No me dolí» intenta reflejar esa experiencia interna con un español sobrio; las alternativas explicitan el matiz emocional de manera más idiomática.
theological_decisions:
- issue: Valor de la retribución justa en el sufrimiento
  english_pob_reading: I was suffering justly
  chosen_spanish_reading: sufría con justicia
  alternative_spanish_readings:
  - padecí justamente
  - mi padecimiento era justo
  rationale: La frase se mantiene afirmativa sobre la justicia del sufrimiento sin convertirla en una reflexión doctrinal abstracta; eso respeta el testimonio personal del texto.
  doctrine_reference: Retribución / justicia moral del sufrimiento
- issue: Respuesta emocional ante la aflicción
  english_pob_reading: I was not grieved
  chosen_spanish_reading: no me dolí
  alternative_spanish_readings:
  - no me entristecí
  - no me afligí
  rationale: El texto no dice que la experiencia fuera agradable, sino que el hablante no quedó abatido por ella. La elección intenta conservar esa sobriedad sin exagerar la ausencia de dolor.
  doctrine_reference: Constancia en la aflicción
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «distressed» por «grieved» para acercarse más a ἐλυπούμην. La versión española sigue esa misma línea y evita un término psicológico demasiado fuerte, optando por una forma breve que conserve el matiz de pena interna.
  spanish_consistency_notes:
  - Se mantiene «Egipto» sin artículo, conforme al uso normal en español y al inglés POB.
  - Se conserva «justicia» como adverbialidad evaluativa, no como sustituto de un adverbio meramente moralizante.
  - Se evita «SEÑOR» u otra adaptación no presente en el texto fuente.
  - El pasaje está en primera persona singular después de una cláusula plural («descendimos»), y la traducción conserva esa alternancia narrativa del griego.
