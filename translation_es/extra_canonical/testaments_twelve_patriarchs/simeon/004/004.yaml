  text: Ἰωσὴφ δὲ¹⁷ ἦν *ἀγαθὸς ἀνήρ¹⁸, καὶ¹⁹ ἔχων²⁰ πνεῦμα θεοῦ *ἐν αὐτῷ²¹, εὔσπλαγχνος καὶ ἐλεήμων ὑπάρχων²² οὐκ²³ ἐμνησικάκησέν με²⁴, ἀλλὰ²⁵ ἠγάπησέ με *σὺν τοῖς ἀδελφοῖς μου²⁶.
