translation:
  language: es
  text: 'Por eso José era hermoso de figura y bello de apariencia[a], porque no habitó en él nada malo; pues el rostro revela la turbación del espíritu.


    Y ahora, hijos míos, hagan buenos sus corazones delante del Señor, y enderecen sus caminos delante de los hombres, y hallarán favor delante del Señor y de los hombres.


    Guárdense, pues, de la inmoralidad sexual, porque la inmoralidad sexual es madre de los males, apartando de Dios y acercando a Beliar[b].


    Porque he visto en la escritura de Enoc[c] que sus hijos serán corrompidos por la inmoralidad sexual, y harán violencia a los hijos de Leví con la espada.


    Pero no podrán resistir a Leví, porque él peleará la guerra del Señor y vencerá a todo su ejército.


    Y serán pocos en número, repartidos entre Leví y entre Judá[d], y ninguno de entre ustedes será para gobernar, así como también nuestro padre profetizó en sus bendiciones[e].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "hermoso en figura y bello a la vista". La duplicación retiene dos matices del par griego.'
    reason: alternative_reading
  - marker: b
    text: '"Beliar" refleja la forma griega de este testimonio; otras tradiciones suelen tener "Belial".'
    reason: textual_variant
  - marker: c
    text: La expresión remite a una fuente escrita enociana; no precisa cuál de los escritos de Enoc conservados o aludidos.
    reason: cross_reference
  - marker: d
    text: '"Repartidos entre Leví y entre Judá" puede entenderse como distribución o absorción dentro de esas tribus.'
    reason: alternative_reading
  - marker: e
    text: Compárese Génesis 49, donde las bendiciones de Jacob están detrás de esta afirmación profética final.
    reason: cross_reference
lexical_decisions:
- source_word: ὡραῖος τῷ εἴδει / καλὸς τῇ ὄψει
  english_pob_choice: handsome in form and beautiful in appearance
  chosen_spanish: hermoso de figura y bello de apariencia
  alternatives_spanish:
  - hermoso de forma y bello de aspecto
  - hermoso en figura y bello a la vista
  lexicon: LSJ
  rationale: Conserva el paralelismo de dos descripciones físicas sin fusionarlas en una sola idea; 'figura' y 'apariencia' son naturales en español y mantienen la doble evaluación estética.
- source_word: ἐνοίκησεν ἐν αὐτῷ
  english_pob_choice: dwelt in him
  chosen_spanish: habitó en él
  alternatives_spanish:
  - moró en él
  - residió en él
  lexicon: BDAG
  rationale: '''Habitar'' mantiene la idea de residencia interior y el peso moral de una presencia que no solo está, sino que mora.'
- source_word: ταραχῆς τοῦ πνεύματος
  english_pob_choice: the turmoil of the spirit
  chosen_spanish: la turbación del espíritu
  alternatives_spanish:
  - la agitación del espíritu
  - el tumulto del espíritu
  lexicon: LSJ
  rationale: '''Turbación'' conserva el sentido interior de desorden o perturbación anímica sin sonar demasiado técnico, y encaja con la afirmación de que el rostro lo revela.'
- source_word: Ἀγαθύνατε τὰς καρδίας ὑμῶν
  english_pob_choice: make your hearts good
  chosen_spanish: hagan buenos sus corazones
  alternatives_spanish:
  - endulcen sus corazones
  - hagan rectos sus corazones
  lexicon: LSJ
  rationale: Se preserva el carácter exhortativo y causativo del verbo. 'Hagan buenos' suena directo en español y evita reducirlo a simple mejora emocional.
- source_word: εὐθύνατε τὰς ὁδοὺς ὑμῶν
  english_pob_choice: make your ways straight
  chosen_spanish: enderecen sus caminos
  alternatives_spanish:
  - hagan rectos sus caminos
  - dirijan sus caminos
  lexicon: LSJ
  rationale: '''Enderezar los caminos'' es una equivalencia bíblica clara en español y conserva la metáfora ética de rectitud del texto.'
- source_word: ἔσεσθε εὑρίσκοντες χάριν
  english_pob_choice: you will find favor
  chosen_spanish: hallarán favor
  alternatives_spanish:
  - encontrarán favor
  - seguirán hallando favor
  lexicon: BDAG
  rationale: La revisión inglesa favorece una futura más natural; en español, 'hallarán favor' transmite el resultado prometido sin forzar una perífrasis progresiva.
- source_word: πορνεία
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - pecado sexual
  lexicon: BDAG
  rationale: '''Inmoralidad sexual'' mantiene la amplitud del término griego, evitando restringirlo a un solo acto y preservando el registro comprensible y eclesial.'
- source_word: μήτηρ ἐστὶ τῶν κακῶν
  english_pob_choice: is the mother of evils
  chosen_spanish: es madre de los males
  alternatives_spanish:
  - es la madre de los males
  - es fuente de males
  lexicon: LSJ
  rationale: Se conserva la metáfora vívida sin añadir 'todos'; 'de los males' refleja el genitivo plural sin sobreextender el alcance.
- source_word: χωρίζουσα ἀπὸ τοῦ θεοῦ καὶ προσεγγίζουσα τῷ Βελίαρ
  english_pob_choice: separating from God and drawing near to Beliar
  chosen_spanish: separando de Dios y acercando a Beliar
  alternatives_spanish:
  - apartando de Dios y acercando a Beliar
  - separando de Dios y aproximando a Beliar
  lexicon: LSJ
  rationale: 'La construcción participial se vierte de forma compacta y fiel, manteniendo el doble movimiento moral: alejamiento de Dios y cercanía a Beliar.'
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: LSJ
  rationale: Se conserva la forma griega atestiguada en este testimonio en lugar de normalizarla a la variante más conocida.
- source_word: ἐν χαρακτῆρι γραφῆς Ἐνώχ
  english_pob_choice: in the writing of Enoch
  chosen_spanish: en la escritura de Enoc
  alternatives_spanish:
  - en el escrito de Enoc
  - en el registro escrito de Enoc
  lexicon: LSJ
  rationale: La fórmula sugiere una fuente escrita enociana; 'escritura' es natural en español y deja intacta la apelación a un testimonio escrito.
- source_word: φθαρήσονται
  english_pob_choice: will be corrupted
  chosen_spanish: serán corrompidos
  alternatives_spanish:
  - serán destruidos
  - se pervertirán
  lexicon: BDAG
  rationale: '''Corrompidos'' retiene la idea moral de deterioro y se ajusta al contexto de inmoralidad sexual sin resolver indebidamente el matiz de ruina moral.'
- source_word: ἀδικήσουσιν ἐν ῥομφαίᾳ
  english_pob_choice: they will wrong ... with the sword
  chosen_spanish: harán injusticia ... con la espada
  alternatives_spanish:
  - dañarán ... con la espada
  - harán agravio ... con la espada
  lexicon: BDAG
  rationale: '''Hacer injusticia'' conserva el valor amplio de ἀδικέω y permite que la espada especifique el medio violento, sin reducirlo a mera agresión física.'
- source_word: πόλεμον Κυρίου πολεμήσει
  english_pob_choice: he will fight the Lord’s war
  chosen_spanish: peleará la guerra del Señor
  alternatives_spanish:
  - librará la guerra del Señor
  - hará la guerra del Señor
  lexicon: LSJ
  rationale: Mantiene el cognado y el énfasis sacral de la expresión; 'peleará' es natural en español y conserva la fuerza del binomio verbo-sustantivo.
- source_word: παρεμβολήν
  english_pob_choice: host
  chosen_spanish: campamento
  alternatives_spanish:
  - hueste
  - ejército
  lexicon: LSJ
  rationale: '''Campamento'' refleja el sentido colectivo militar del término en este contexto y deja abierta la imagen de una fuerza organizada.'
- source_word: ὀλιγοστοί
  english_pob_choice: few in number
  chosen_spanish: pocos en número
  alternatives_spanish:
  - escasos en número
  - serán pocos
  lexicon: LSJ
  rationale: Explicita el valor numérico de manera idiomática en español y conserva la predicción de reducción.
- source_word: ἐπιμεριζόμενοι ἐν τῷ Λευὶ καὶ ἐν τῷ Ἰούδᾳ
  english_pob_choice: being divided in Levi and in Judah
  chosen_spanish: repartidos entre Leví y entre Judá
  alternatives_spanish:
  - divididos en Leví y en Judá
  - distribuidos entre Leví y Judá
  lexicon: LSJ
  rationale: '''Repartidos entre'' expresa mejor en español la idea de distribución o asignación entre tribus que un calco de ''divididos en''.'
- source_word: εἰς ἡγεμονίαν
  english_pob_choice: for leadership
  chosen_spanish: para liderazgo
  alternatives_spanish:
  - para el mando
  - para gobernar
  lexicon: BDAG
  rationale: '''Liderazgo'' comunica la función de dirección sin sobredeterminar una oficina política específica.'
theological_decisions:
- issue: Joseph’s moral beauty as evidence of inner purity
  english_pob_reading: Nothing evil dwelt in him; the face reveals the turmoil of the spirit.
  chosen_spanish_reading: No habitó en él nada malo; el rostro revela la turbación del espíritu.
  alternative_spanish_readings:
  - No residió en él nada malo; el rostro revela la agitación del espíritu.
  - No moró en él nada malo; el rostro manifiesta el tumulto del espíritu.
  rationale: La traducción mantiene la relación causal entre pureza interior y apariencia exterior sin rebajarla a mera psicología. 'Habitar' sostiene la imagen de una presencia moral interior.
  doctrine_reference: Antropología moral; integridad interior que se manifiesta exteriormente.
- issue: Beliar as a named evil power
  english_pob_reading: drawing near to Beliar
  chosen_spanish_reading: acercando a Beliar
  alternative_spanish_readings:
  - acercando a Belial
  - acercando al maligno
  rationale: Se conserva el nombre propio atestiguado por el griego, evitando diluir la figura en una abstracción general.
  doctrine_reference: Preservar la nomenclatura del adversario espiritual conforme al testimonio textual.
- issue: Written authority of Enoch
  english_pob_reading: in the writing of Enoch
  chosen_spanish_reading: en la escritura de Enoc
  alternative_spanish_readings:
  - en el libro de Enoc
  - en el escrito de Enoc
  rationale: La frase deja explícita la referencia a una fuente escrita enociana sin decidir qué obra exacta es. Así se preserva la tensión histórica y literaria del texto.
  doctrine_reference: Mantener la referencia a tradición escrita sin harmonizarla con un canon posterior.
- issue: Tribal prophecy and loss of leadership
  english_pob_reading: none from among you will be for leadership
  chosen_spanish_reading: ninguno de entre ustedes será para liderazgo
  alternative_spanish_readings:
  - ninguno de entre ustedes gobernará
  - ninguno de entre ustedes será líder
  rationale: Se conserva el tono oracular y la restricción de futuro, sin convertirlo en un enunciado político más concreto de lo que el texto exige.
  doctrine_reference: Profecía tribal; juicio sobre la línea de Simeón y su posición entre Israel.
translation_notes:
  revision_awareness: He seguido la última revisión inglesa al preferir una futura natural ('hallarán favor') y una relación causal clara para φθαρήσονται ('serán corrompidos'). También he conservado el tono del audit trail al mantener el nombre griego Beliar y la apelación a la escritura de Enoc.
  spanish_consistency_notes:
  - Se usa 'Señor' para κύριος en esta sección, siguiendo el testimonio griego que alude al título divino; no se emplea 'Yahvé' aquí porque el texto fuente no contiene el Tetragrámaton ni un marcador directo del nombre hebreo.
  - '''Inmoralidad sexual'' traduce πορνεία de manera amplia y coherente con el registro del proyecto, sin restringirlo a un solo acto sexual.'
  - '''Escritura de Enoc'' conserva la forma escrita y evita sobredeterminar el corpus enociano.'
  - '''Beliar'' se mantiene como nombre propio del adversario según el testimonio griego.'
  - '''Liderazgo'' se usa para εἰς ἡγεμονίαν por ser suficientemente amplio para el sentido de dirección/autoridad sin introducir una oficina específica.'
