base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/005.yaml
  text: 'Therefore Joseph was handsome in form and beautiful in appearance[a], because nothing evil dwelt in him; for the face reveals the turmoil of the spirit.


    And now, my children, make your hearts good before the Lord, and make your ways straight before men, and you will find favor before the Lord and men.


    Guard yourselves, then, from sexual immorality, because sexual immorality is the mother of evils, separating from God and drawing near to Beliar.


    For I have seen in the writing of Enoch that your sons will be corrupted by sexual immorality, and they will wrong the sons of Levi with the sword.


    But they will not be able to stand against Levi, because he will fight the Lord’s war and will defeat your whole host.


    And they will be few in number, being divided in Levi and in Judah, and none from among you will be for leadership[e][d][c][b], just as our father also prophesied in his blessings.'
  footnotes:
  - marker: a
    text: Or 'you will find favor.' The Greek participial expression may imply an ongoing result rather than a simple future.
    reason: lexical_alternative
  - marker: b
    text: '''Beliar'' reflects the Greek form in this witness; other traditions often have ''Belial.'''
    reason: textual_variant
  - marker: c
    text: The phrase 'in the writing of Enoch' reflects an appeal to an Enochic written source.
    reason: cross_reference
  - marker: d
    text: '''Being divided in Levi and in Judah'' may mean being apportioned among or absorbed into those tribes.'
    reason: alternative_reading
  - marker: e
    text: Compare Jacob's blessings over the tribes in Genesis 49, which stand behind the closing prophetic claim.
    reason: cross_reference
