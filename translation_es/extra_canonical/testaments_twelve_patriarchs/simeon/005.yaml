  - marker: e
    text: Compárese Génesis 49, donde las bendiciones de Jacob están detrás de esta afirmación profética final.
    reason: cross_reference
  revision_rationale: 'La revisión corrige cuatro problemas principales sin apartarse del griego ni del rastro POB: (1) se cambia ''separando de Dios y acercando a Beliar'' por ''apartando de Dios y acercando a Beliar'' para expresar mejor el doble movimiento moral; (2) ''harán injusticia'' se reemplaza por ''harán violencia'' para un español más natural en contexto de espada; (3) ''campamento'' pasa a ''ejército'' para representar mejor la fuerza militar derrotada; y (4) ''será para liderazgo'' se corrige a ''será para gobernar'', que refleja mejor εἰς ἡγεμονίαν en español digno y claro.'
