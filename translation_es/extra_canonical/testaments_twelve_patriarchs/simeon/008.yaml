base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/008.yaml
  text: 'And when Simeon had finished commanding his sons[a], he fell asleep with his fathers, being one hundred and twenty years old.


    And they placed him in a wooden coffin, to bring up his bones to Hebron. And they brought them up secretly during a war of the Egyptians.


    For the Egyptians were keeping the bones of Joseph in the tombs of the kings, so as to bring him up. For the enchanters were telling them that, when Joseph’s bones went out, there would be over all the land darkness and gloom and a great plague for the Egyptians[c][b], so that even with a lamp each man would not recognize his brother.'
  footnotes:
  - marker: a
    text: Verse 3 is textually difficult. Some witnesses read 'store-chambers' instead of 'tombs,' yielding 'the Egyptians were keeping Joseph’s bones in the store-chambers of the kings.'
    reason: textual_variant
  - marker: b
    text: The phrase 'they brought them up secretly during a war of the Egyptians' is compressed in Greek and may mean 'in secret during an Egyptian war' or 'during war among the Egyptians.'
    reason: alternative_reading
  - marker: c
    text: Compare Genesis 50:25 and Exodus 13:19 on the carrying up of Joseph’s bones.
    reason: cross_reference
