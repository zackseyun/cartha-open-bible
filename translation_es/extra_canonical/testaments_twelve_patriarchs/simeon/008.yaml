translation:
  language: es
  text: 'Y cuando Simeón hubo terminado de mandar[a] a sus hijos, se durmió con sus padres, teniendo ciento veinte años.


    Y lo pusieron en un ataúd[b] de madera, para subir sus huesos a Hebrón. Y los subieron en secreto durante una guerra de los egipcios[c].


    Porque los egipcios estaban guardando los huesos de José en las tumbas de los reyes, para subirlos. Pues los encantadores les decían que, cuando los huesos de José salieran, habría sobre toda la tierra tinieblas y oscuridad y una gran plaga para los egipcios, de modo que aun con una lámpara cada uno no reconocería a su hermano.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente 'terminó al mandar'; el español normaliza la construcción manteniendo el sentido de conclusión del discurso y la fuerza del mandato.
    reason: spanish_style_note
  - marker: b
    text: '''Ataúd'' traduce de forma natural el contenedor funerario de madera; también podría entenderse como ''féretro'' o ''caja'' según el énfasis.'
    reason: lexical_alternative
  - marker: c
    text: La frase griega es comprimida y puede entenderse de varias maneras; esta redacción conserva la idea de secreto y el contexto de guerra sin forzar una reconstrucción histórica precisa.
    reason: alternative_reading
lexical_decisions:
- source_word: συνετέλεσεν ἐντελλόμενος
  english_pob_choice: had finished commanding
  chosen_spanish: hubo terminado de mandar
  alternatives_spanish:
  - terminó de mandar
  - acabó de instruir
  - concluyó de encargar
  lexicon: LSJ
  rationale: Conserva la idea de завершение de la acción y la fuerza autoritativa del mandato paternal. 'Mandar' refleja mejor la carga de ἐντελλόμενος que un simple 'instruir'.
- source_word: ἐκοιμήθη
  english_pob_choice: fell asleep
  chosen_spanish: se durmió
  alternatives_spanish:
  - falleció
  - murió
  - descansó
  lexicon: LSJ
  rationale: El griego usa el eufemismo convencional para la muerte. 'Se durmió' preserva ese registro bíblico-literario sin aplanarlo a 'murió'.
- source_word: μετὰ τῶν πατέρων αὐτοῦ
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres ancestrales
  lexicon: LSJ
  rationale: En español, 'padres' comunica de forma natural la fórmula funeraria heredada. Mantiene el tono tradicional sin perder inteligibilidad.
- source_word: θήκῃ ξυλίνῃ
  english_pob_choice: wooden coffin
  chosen_spanish: ataúd de madera
  alternatives_spanish:
  - cofre de madera
  - caja de madera
  - féretro de madera
  lexicon: LSJ
  rationale: '''Ataúd'' es el equivalente funerario más claro y natural en español. ''De madera'' conserva explícitamente ξυλίνῃ.'
- source_word: τοῦ ἀναγαγεῖν τὰ ὀστᾶ αὐτοῦ
  english_pob_choice: to bring up his bones
  chosen_spanish: para subir sus huesos
  alternatives_spanish:
  - para llevar sus huesos arriba
  - para traer sus huesos de vuelta
  lexicon: LSJ
  rationale: '''Subir'' reproduce el movimiento direccional de ἀνάγω hacia Hebrón, y ''huesos'' mantiene el lenguaje concreto del texto.'
- source_word: ἐν πολέμῳ Αἰγυπτίων κρυφῇ
  english_pob_choice: secretly during a war of the Egyptians
  chosen_spanish: en secreto durante una guerra de los egipcios
  alternatives_spanish:
  - secretamente en tiempo de guerra entre los egipcios
  - en secreto durante una guerra en Egipto
  lexicon: LSJ
  rationale: La cláusula es compacta y algo ambigua; el español conserva la doble información de secreto y contexto bélico sin imponer una reconstrucción histórica más precisa.
- source_word: ἐφύλαττον
  english_pob_choice: were keeping
  chosen_spanish: estaban guardando
  alternatives_spanish:
  - custodiaban
  - conservaban
  - guardaban
  lexicon: LSJ
  rationale: El imperfecto pide una acción continua. 'Estaban guardando' mantiene el valor durativo y una noción amplia de custodia.
- source_word: μνήμασι τῶν βασιλέων
  english_pob_choice: the tombs of the kings
  chosen_spanish: las tumbas de los reyes
  alternatives_spanish:
  - los sepulcros de los reyes
  - las cámaras funerarias de los reyes
  lexicon: LSJ
  rationale: Sigue el sentido funerario más directo del griego transmitido, sin descartar el matiz variante de 'almacenes' documentado en el aparato inglés.
- source_word: ἐπαοιδοί
  english_pob_choice: enchanters
  chosen_spanish: los encantadores
  alternatives_spanish:
  - los magos
  - los hechiceros
  - los ensalmadores
  lexicon: LSJ
  rationale: '''Encantadores'' reproduce el matiz de practicantes de conjuros y mantiene un registro bíblico comprensible en español.'
- source_word: σκότος καὶ γνόφος
  english_pob_choice: darkness and gloom
  chosen_spanish: tinieblas y oscuridad
  alternatives_spanish:
  - tinieblas y sombra espesa
  - oscuridad y negrura
  lexicon: LSJ
  rationale: La pareja intensiva se conserva con dos términos próximos pero no idénticos. 'Tinieblas' eleva el tono; 'oscuridad' refuerza el paralelismo.
- source_word: πληγὴ μεγάλη
  english_pob_choice: a great plague
  chosen_spanish: una gran plaga
  alternatives_spanish:
  - una gran calamidad
  - un gran azote
  - un gran castigo
  lexicon: LSJ
  rationale: '''Plaga'' reproduce el lenguaje de juicio y desastre sobre Egipto con la misma fuerza que en el inglés POB.'
- source_word: μετὰ λύχνου
  english_pob_choice: even with a lamp
  chosen_spanish: aun con una lámpara
  alternatives_spanish:
  - incluso con una lámpara
  - ni siquiera con una lámpara
  - a la luz de una lámpara
  lexicon: LSJ
  rationale: '''Aun con'' expresa la intensidad de la oscuridad. ''Lámpara'' es natural y fiel a λύχνος.'
- source_word: μὴ ἐπιγινώσκειν ἕκαστος τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: each man would not recognize his brother
  chosen_spanish: cada uno no reconocería a su hermano
  alternatives_spanish:
  - nadie reconocería a su hermano
  - cada hombre no reconocería a su hermano
  lexicon: LSJ
  rationale: Se conserva el distributivo ἕκαστος con 'cada uno', y el verbo 'reconocer' expresa bien ἐπιγινώσκειν en contexto de visibilidad impedida.
theological_decisions:
- issue: Eufemismo de muerte en ἐκοιμήθη
  english_pob_reading: fell asleep
  chosen_spanish_reading: se durmió
  alternative_spanish_readings:
  - falleció
  - murió
  - descansó
  rationale: Mantener el eufemismo conserva el registro testamentario y la resonancia bíblica sin añadir una interpretación doctrinal que el texto no explicita.
  doctrine_reference: DOCTRINE.md §Translation philosophy, preserve literary and theological weight of euphemisms
- issue: Fórmula de sepultura 'con sus padres'
  english_pob_reading: with his fathers
  chosen_spanish_reading: con sus padres
  alternative_spanish_readings:
  - con sus antepasados
  - con sus mayores
  rationale: La expresión es una fórmula tradicional de muerte/sepultura. En español, 'padres' comunica el parentesco ancestral de manera natural y reverente.
  doctrine_reference: DOCTRINE.md §Translation philosophy, biblical register
- issue: Cláusula difícil sobre el traslado secreto de los huesos de José
  english_pob_reading: the Egyptians were keeping Joseph’s bones in the tombs of the kings, so as to bring him up
  chosen_spanish_reading: los egipcios estaban guardando los huesos de José en las tumbas de los reyes, para subirlos
  alternative_spanish_readings:
  - los egipcios estaban guardando los huesos de José en los almacenes de los reyes, para subirlos
  - los egipcios los mantenían en las cámaras funerarias de los reyes
  rationale: La lectura elegida sigue la línea más coherente del griego transmitido y deja sin ocultar la dificultad textual. El posible variante de 'almacenes' se refleja indirectamente mediante la decisión lexical y la nota textual.
  doctrine_reference: DOCTRINE.md §Textual transparency and apparatus-aware translation
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin cambios de fondo respecto de la revisión más reciente; la redacción española mantiene la misma resolución de las decisiones léxicas y de la cláusula textual difícil sobre los huesos de José.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico y solemne, evitando calcos innecesarios pero conservando la fórmula testamentaria.
  - '''Huesos'', ''tumbas'', ''plaga'' y ''tinieblas'' mantienen la imaginería concreta del original y la coherencia interna del pasaje.'
  - No se usó 'Cristo', 'SEÑOR' ni terminología teológica no presente en el texto.
  - 'La puntuación separa con claridad los tres movimientos del pasaje: muerte de Simeón, traslado de sus restos y explicación sobre José.'
