translation:
  language: es
  text: '1. Entonces mi padre me seguía preguntando, porque me había visto triste, y yo le decía: «Mi hígado está hinchado».[a] 2. Porque yo me entristecía más que todos los demás, ya que yo era responsable de la venta de José. 3. Y cuando descendimos a Egipto, y él me ató como espía, entendí que padecía con justicia, y no me afligí. 4. Pero José era un hombre bueno, y teniendo el Espíritu de Dios en él, siendo compasivo y misericordioso, no guardó rencor contra mí, sino que me amó junto con mis hermanos. 5. Por tanto, guárdense ustedes, hijos míos, de todo celos y envidia, y anden en sencillez de corazón,[b] para que Dios también les dé gracia, gloria y bendición sobre sus cabezas, como ustedes vieron en José. 6. Todos los días de su vida no nos reprochó este asunto, sino que nos amó como a su propia alma, y nos honró más que a sus propios hijos, y nos concedió riquezas, ganado y fruto. 7. Y ustedes también, hijos míos, amen cada uno a su hermano con buen corazón, y el espíritu de la envidia
    se apartará de ustedes. 8. Porque esto vuelve salvaje al alma, y destruye el cuerpo; trae ira y guerra a los designios, y provoca derramamiento de sangre, y lleva la mente al frenesí, y da agitación al alma y temblor al cuerpo. 9. Pues aun en el sueño la envidia, al presentarle visiones de maldad, lo consume y perturba su alma con espíritus malos, y hace que el cuerpo se estremezca, y despierta la mente en turbación; y como un espíritu malo y venenoso, así aparece a los hombres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mi hígado está hinchado» conserva el modismo corporal antiguo en lugar de convertirlo en una simple frase de tristeza; el sentido es una angustia física/afectiva expresada de modo concreto.
    reason: cultural_note
  - marker: b
    text: «Sencillez de corazón» también puede entenderse como «sinceridad de corazón» o «corazón indiviso»; se conserva la fórmula tradicional del texto para no perder su tono sapiencial.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκυθρωπός
  english_pob_choice: gloomy
  chosen_spanish: triste
  alternatives_spanish:
  - abatido
  - sombrío
  lexicon: LSJ
  rationale: En español, ‘triste’ comunica el aspecto visible de abatimiento sin sonar forzado. ‘Sombrío’ podría sugerir rasgo de temperamento más que apariencia, y ‘abatido’ es más intenso de lo que el contexto exige.
- source_word: τὰ ἤπατά μου ὀγκοῦμαι
  english_pob_choice: My liver is swollen
  chosen_spanish: Mi hígado está hinchado
  alternatives_spanish:
  - Mi hígado está inflamado
  - Me duele el hígado
  lexicon: LSJ
  rationale: Se conserva el modismo corporal antiguo de forma concreta, como en el inglés auditado, sin espiritualizarlo. ‘Hinchado’ mantiene la imagen física; ‘inflamado’ y ‘me duele el hígado’ suavizan o modernizan demasiado el dicho.
- source_word: τῆς πράσεως
  english_pob_choice: the sale
  chosen_spanish: la venta
  alternatives_spanish:
  - la vendición
  - el vender
  lexicon: LSJ
  rationale: ‘Venta’ reproduce el hecho concreto de la transacción injusta respecto de José. ‘El vender’ suena menos natural y ‘vendición’ no es idiomático.
- source_word: δίκαιως πάσχω
  english_pob_choice: I was suffering justly
  chosen_spanish: padecía con justicia
  alternatives_spanish:
  - padecía justamente
  - sufría justamente
  lexicon: LSJ
  rationale: ‘Padecía con justicia’ conserva el valor moral-jurídico de δικαίως y suena natural en español. ‘Sufría justamente’ es posible, pero algo menos solemne; ‘padecía justamente’ puede sonar menos idiomático.
- source_word: ἀγαθὸς ἀνήρ
  english_pob_choice: a good man
  chosen_spanish: un hombre bueno
  alternatives_spanish:
  - un buen hombre
  - un hombre virtuoso
  lexicon: LSJ
  rationale: ‘Hombre bueno’ sigue de cerca el sentido simple y ético del original. ‘Buen hombre’ puede sonar a juicio general sobre carácter o a uso coloquial; ‘virtuoso’ introduce una nota más técnica.
- source_word: πνεῦμα θεοῦ ἐν αὐτῷ
  english_pob_choice: having the Spirit of God in him
  chosen_spanish: teniendo el Espíritu de Dios en él
  alternatives_spanish:
  - teniendo un espíritu de Dios en él
  - con el Espíritu de Dios en él
  lexicon: LSJ
  rationale: Se conserva la estructura participial destacada por la revisión inglesa, y se capitaliza ‘Espíritu’ por la lectura teológica más natural del contexto. ‘Con el Espíritu de Dios en él’ sería más fluido, pero debilita el eco del participio.
- source_word: εὔσπλαγχνος
  english_pob_choice: compassionate
  chosen_spanish: compasivo
  alternatives_spanish:
  - misericordioso
  - tierno de corazón
  lexicon: LSJ
  rationale: ‘Compasivo’ expresa la compasión interna con claridad moderna. ‘Misericordioso’ se reserva para la segunda cualidad para evitar redundancia.
- source_word: ἐμνησικάκησεν
  english_pob_choice: did not hold a grudge
  chosen_spanish: no guardó rencor
  alternatives_spanish:
  - no recordó el mal
  - no albergó resentimiento
  lexicon: LSJ
  rationale: ‘No guardó rencor’ es la equivalencia natural más directa en español para la negativa a conservar resentimiento. ‘No recordó el mal’ pierde claridad; ‘no albergó resentimiento’ es correcto pero menos idiomático.
- source_word: ἁπλότης καρδίας
  english_pob_choice: simplicity of heart
  chosen_spanish: sencillez de corazón
  alternatives_spanish:
  - sinceridad de corazón
  - corazón sencillo
  lexicon: LSJ
  rationale: ‘Sencillez de corazón’ conserva el lenguaje de virtud interior sin explicar en exceso. ‘Sinceridad de corazón’ desplaza el matiz hacia honestidad verbal; ‘corazón sencillo’ suena más libre y menos formulaico.
- source_word: ζῆλος / φθόνος
  english_pob_choice: jealousy and envy
  chosen_spanish: celosía y envidia
  alternatives_spanish:
  - celos y envidia
  - celos y rivalidad envidiosa
  lexicon: LSJ
  rationale: Se intenta mantener la pareja de dos términos negativos; ‘celosía’ aquí marca la primera noción como un sustantivo abstracto. Si se prefiriera mayor naturalidad, ‘celos y envidia’ es una alternativa fuerte; ambas opciones preservan la distinción entre los dos vocablos griegos.
- source_word: ἁπλότης καρδίας / ζῆλος / φθόνος
  english_pob_choice: simplicity of heart / jealousy and envy
  chosen_spanish: sencillez de corazón / celosía y envidia
  alternatives_spanish:
  - sinceridad de corazón / celos y envidia
  - sencillez de corazón / celos y envidia
  lexicon: LSJ
  rationale: La combinación busca mantener, por un lado, la virtud de integridad interior y, por otro, la doble viciosidad del pasaje. Se conserva la tensión de dos términos afines en el original, aunque el español no siempre distingue con la misma nitidez ambas voces.
- source_word: ψυχὴν αὐτοῦ
  english_pob_choice: his own soul
  chosen_spanish: su propia alma
  alternatives_spanish:
  - su propia vida
  - su propio ser
  lexicon: LSJ
  rationale: ‘Alma’ preserva el lenguaje antropológico del pasaje y su paralelismo con cuerpo, mente y espíritu. ‘Vida’ y ‘ser’ aplanan esa red conceptual.
- source_word: ἐδόξασεν
  english_pob_choice: honored
  chosen_spanish: honró
  alternatives_spanish:
  - glorificó
  - dio honor a
  lexicon: LSJ
  rationale: ‘Honró’ reproduce el sentido de conferir dignidad sin elevarlo indebidamente a ‘glorificar’. En español, ‘glorificar’ sería demasiado solemne para este contexto.
- source_word: πλοῦτον καὶ κτήνη καὶ καρπόν
  english_pob_choice: riches and livestock and produce
  chosen_spanish: riquezas, ganado y fruto
  alternatives_spanish:
  - riquezas, ganado y cosecha
  - bienes, ganado y fruto
  lexicon: LSJ
  rationale: ‘Fruto’ conserva la literalidad del tercer término y su amplitud agrícola. ‘Cosecha’ especifica demasiado; ‘bienes’ diluye la diferencia con ‘riquezas’.
- source_word: ἀγριοῖ
  english_pob_choice: makes ... savage
  chosen_spanish: vuelve salvaje
  alternatives_spanish:
  - embrutece
  - enfurece
  lexicon: LSJ
  rationale: ‘Vuelve salvaje’ mantiene la fuerza vívida de la imagen griega y sigue el audit trail inglés. ‘Embrutece’ y ‘enfurece’ captan aspectos parciales, pero no la totalidad de la brutalización interna.
- source_word: διαβούλιον
  english_pob_choice: one’s plans
  chosen_spanish: los designios
  alternatives_spanish:
  - los planes
  - la deliberación
  lexicon: LSJ
  rationale: ‘Designios’ recoge la esfera de intención y propósito con un matiz más elevado y preciso que ‘planes’. Se evita una lectura demasiado técnica de ‘deliberación’.
- source_word: ἔκστασις
  english_pob_choice: frenzy
  chosen_spanish: frenesí
  alternatives_spanish:
  - locura
  - arrebato
  lexicon: LSJ
  rationale: ‘Frenesí’ transmite agitación mental intensa sin fijar un diagnóstico clínico moderno. ‘Locura’ sería más fuerte y ‘arrebato’ menos abarcador.
- source_word: κλόνον
  english_pob_choice: upheaval
  chosen_spanish: agitación
  alternatives_spanish:
  - trastorno
  - conmoción
  lexicon: LSJ
  rationale: ‘Agitación’ funciona bien como paralelo interior al temblor corporal y es comprensible en estilo bíblico moderno. ‘Trastorno’ suena más clínico; ‘conmoción’ es posible, pero menos directa.
- source_word: φαντάζουσα
  english_pob_choice: presenting ... visions
  chosen_spanish: al presentarle visiones
  alternatives_spanish:
  - al mostrarle visiones
  - al presentarle apariciones
  lexicon: LSJ
  rationale: Se conserva la imaginería onírica y visual del griego sin reducirla a pensamiento abstracto. ‘Presentarle visiones’ refleja bien la acción subjetiva sobre el soñante.
- source_word: ἐκθροεῖσθαι
  english_pob_choice: makes the body shudder
  chosen_spanish: hace que el cuerpo se estremezca
  alternatives_spanish:
  - hace que el cuerpo tiemble
  - lo sobresalta
  lexicon: LSJ
  rationale: ‘Se estremezca’ comunica la reacción corporal súbita asociada al sobresalto del sueño. Es más cercano al efecto descrito que una simple ‘sacudida’ o el genérico ‘tiemble’.
- source_word: ἰοβόλος
  english_pob_choice: venomous
  chosen_spanish: venenoso
  alternatives_spanish:
  - ponzoñoso
  - tóxico
  lexicon: LSJ
  rationale: ‘Venenoso’ es natural en español y conserva la imagen moral-física del final del versículo. ‘Ponzoñoso’ sería más literario y ‘tóxico’ demasiado moderno y técnico.
theological_decisions:
- issue: πνεῦμα θεοῦ en José
  english_pob_reading: having the Spirit of God in him
  chosen_spanish_reading: teniendo el Espíritu de Dios en él
  alternative_spanish_readings:
  - teniendo un espíritu de Dios en él
  - con el Espíritu de Dios en él
  rationale: El contexto elogioso y moral favorece una referencia al Espíritu divino más que a una disposición humana. La capitalización en español conserva esa lectura sin ocultar la formulación griega.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: ψυχή como alma en un catálogo antropológico
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  - ser
  rationale: El pasaje contrapone alma, cuerpo, mente y espíritu; ‘alma’ preserva esa red conceptual. Traducirlo por ‘vida’ o ‘ser’ diluiría la estructura antropológica del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: ζῆλος / φθόνος como doble vicio
  english_pob_reading: jealousy and envy
  chosen_spanish_reading: celosía y envidia
  alternative_spanish_readings:
  - celos y envidia
  - celos y rivalidad envidiosa
  rationale: Se intenta conservar la duplicidad del griego, que junta dos términos afines pero no idénticos. ‘Celosía’ es menos común que ‘celos’, pero ayuda a no colapsar ambos vocablos en uno solo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: 'Se tomó en cuenta la última revisión inglesa: en el v. 4 se mantuvo la estructura participial (‘teniendo el Espíritu de Dios en él’) en vez de una expansión causal; en el v. 8 se eligió ‘designios’ para διαβούλιον; y en el v. 9 se expresó la reacción corporal como ‘se estremezca’, más cercana al matiz revisado de un sobresalto físico. También se respetó la nota cultural sobre el hígado y la nota alternativa sobre ‘sencillez de corazón’.'
  spanish_consistency_notes:
  - Se mantiene ‘Espíritu de Dios’ con mayúscula cuando el contexto sugiere referencia divina.
  - Se conserva ‘alma’ para ψυχή a lo largo del pasaje, en paralelo con ‘cuerpo’, ‘mente’ y ‘espíritu’.
  - Se evita sustituir la pareja viciosa por un solo término; se refleja la duplicidad del original.
  - Se conserva el modismo corporal del v. 1 sin espiritualizarlo ni modernizarlo en exceso.
  - La traducción sigue un registro bíblico moderno, claro y digno, sin recurrir a fórmulas tradicionales que oculten el texto fuente.
