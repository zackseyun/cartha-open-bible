- from: '1. Entonces mi padre me seguía preguntando, porque me había visto triste, y yo le decía: «Mi hígado está hinchado».[a] 2. Porque yo me entristecía más que todos los demás, ya que yo era responsable de la venta de José. 3. Y cuando descendimos a Egipto, y él me ató como espía, entendí que padecía con justicia, y no me afligí. 4. Pero José era un hombre bueno, y teniendo el Espíritu de Dios en él, siendo compasivo y misericordioso, no guardó rencor contra mí, sino que me amó junto con mis hermanos. 5. Por tanto, guárdense ustedes, hijos míos, de toda celosía y envidia, y anden en sencillez de corazón,[b] para que Dios también les dé gracia, gloria y bendición sobre sus cabezas, como ustedes vieron en José. 6. Todos los días de su vida no nos reprochó este asunto, sino que nos amó como a su propia alma, y nos honró más que a sus propios hijos, y nos concedió riquezas, ganado y fruto. 7. Y ustedes también, hijos míos, amen cada uno a su hermano con buen corazón, y el espíritu de la
    envidia se apartará de ustedes. 8. Porque esto vuelve salvaje al alma, y destruye el cuerpo; trae ira y guerra a los designios, y provoca derramamiento de sangre, y lleva la mente al frenesí, y da agitación al alma y temblor al cuerpo. 9. Pues aun en el sueño la envidia, al presentarle visiones de maldad, lo consume y perturba su alma con espíritus malos, y hace que el cuerpo se estremezca, y despierta la mente en turbación; y como un espíritu malo y venenoso, así aparece a los hombres.'
