base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/004.yaml
  text: 1[4:1]. Now my father kept asking about me, because he had seen me gloomy, and I told him, “My liver is swollen.” 2. For I was grieving more than all the others, because I was responsible for the sale of Joseph. 3. And when we went down into Egypt and he bound me as a spy, I knew that I was suffering justly, and I was not distressed. 4. But Joseph was a good man[4:5], and having the Spirit of God in him, being compassionate and merciful, he did not hold a grudge against me, but loved me along with my brothers. 5. Therefore guard yourselves, my children, from every jealousy and envy, and walk in simplicity of heart, so that God may also give you favor and glory and blessing upon your heads, just as you saw in Joseph. 6. All his days he did not reproach us about this matter, but he loved us as his own soul, and honored us above his own sons, and granted us riches and livestock and produce. 7. And you also, my children, let each one love his brother with a good heart, and the spirit
    of envy will depart from you. 8. For this makes the soul savage, and destroys the body; it brings anger and war to one’s designs, and provokes to bloodshed, and leads the mind into frenzy, and gives the soul upheaval and the body trembling. 9. For even in sleep envy, presenting to him visions of wickedness, consumes him and troubles his soul with evil spirits, and makes the body shudder, and wakes the mind in turmoil; and like an evil and venomous spirit[4:9][4:8], so he appears to people.
  footnotes:
  - marker: '4:1'
    text: '"My liver is swollen" reflects an ancient bodily idiom for inner anguish or distress; Simeon gives his father a physical explanation for his troubled appearance.'
    reason: cultural_note
  - marker: '4:5'
    text: '"Simplicity of heart" can also be rendered "single-heartedness" or "sincerity of heart."'
    reason: lexical_alternative
  - marker: '4:8'
    text: The pair "jealousy and envy" renders two related Greek terms (ζῆλος, φθόνος), both negative here.
    reason: lexical_alternative
  - marker: '4:9'
    text: The final clause may mean either that the envious person appears to others like an evil, venomous spirit, or that envy itself appears in that way.
    reason: alternative_reading
