translation:
  language: es
  text: Guardaos, pues, de la inmoralidad sexual, porque la inmoralidad sexual es madre de los males, separando de Dios y acercando a Beliar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Φυλάξασθε
  english_pob_choice: Guard yourselves
  chosen_spanish: Guardaos
  alternatives_spanish:
  - Cuidaos
  - Manteneos en guardia
  lexicon: φυλάσσω
  rationale: El imperativo medio pide vigilancia activa y autoprotección; «guardaos» conserva el matiz reflexivo y la fuerza exhortativa sin añadir paráfrasis.
- source_word: ἀπὸ τῆς πορνείας / πορνεία
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - impureza sexual
  lexicon: πορνεία
  rationale: Se mantiene el campo semántico amplio de conducta sexual ilícita. «Inmoralidad sexual» es transparente en español y evita restringir indebidamente el término a una sola práctica.
- source_word: μήτηρ τῶν κακῶν
  english_pob_choice: the mother of evils
  chosen_spanish: madre de los males
  alternatives_spanish:
  - madre de las maldades
  - origen de los males
  lexicon: μήτηρ
  rationale: La imagen de maternidad/origen se conserva literalmente porque el griego presenta una metáfora causal fuerte. «Males» reproduce el plural genérico de κακά sin moralizarlo de más.
- source_word: χωρίζουσα ἀπὸ τοῦ θεοῦ
  english_pob_choice: separating from God
  chosen_spanish: separando de Dios
  alternatives_spanish:
  - alejando de Dios
  - apartando de Dios
  lexicon: χωρίζω
  rationale: El participio expresa efecto continuo y causal; «separando» preserva la relación con el resultado de la πορνεία sin convertirlo en sustantivo.
- source_word: προσεγγίζουσα τῷ Βελίαρ
  english_pob_choice: drawing near to Beliar
  chosen_spanish: acercando a Beliar
  alternatives_spanish:
  - acercándose a Beliar
  - llevando a Beliar
  lexicon: προσεγγίζω
  rationale: 'Se conserva el paralelismo con «separando de Dios». El objeto implícito en español se sobreentiende con claridad: la conducta acerca a la persona a Beliar.'
theological_decisions:
- issue: Personificación del vicio como origen de otros males
  english_pob_reading: sexual immorality is the mother of evils
  chosen_spanish_reading: la inmoralidad sexual es madre de los males
  alternative_spanish_readings:
  - la inmoralidad sexual es origen de los males
  - la inmoralidad sexual engendra males
  rationale: Se preserva la personificación metafórica del griego y del inglés POB, porque forma parte del argumento moral del pasaje y no debe diluirse en una abstracción neutra.
  doctrine_reference: Sabiduría moral del judaísmo del Segundo Templo; no se requiere armonización doctrinal externa.
- issue: Contraste teológico entre Dios y Beliar
  english_pob_reading: separating from God and drawing near to Beliar
  chosen_spanish_reading: separando de Dios y acercando a Beliar
  alternative_spanish_readings:
  - apartando de Dios y acercando a Beliar
  - separándose de Dios y acercándose a Beliar
  rationale: 'El paralelo antitético se mantiene sin suavizar el contraste: la πορνεία aleja de Dios y aproxima a Beliar, un polo de oposición moral y espiritual.'
  doctrine_reference: Literatura testamentaria del Segundo Templo; oposición entre fidelidad a Dios y adhesión a Beliar.
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la revisión más reciente; no hubo ajustes textuales ni necesidad de notas variantes. La propuesta española sigue de cerca el griego y conserva el paralelismo retórico sin añadir glosas.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Beliar» como nombre propio transliterado, conforme al contexto del testamento.
  - «Inmoralidad sexual» conserva el alcance amplio de πορνεία y evita estrecharlo a un solo acto.
  - Se conserva el imperativo plural reflexivo «Guardaos» para reflejar la exhortación comunitaria.
