reference: Testament of Simeon 5:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: Ἀλλ' οὐ δυνήσονται πρὸς Λευὶ ἀντιστῆναι³², ὅτι *πόλεμον Κυρίου πολεμήσει³³ καὶ νικήσει ⌜πᾶσαν⌝³⁴ παρεμβολὴν³⁵ ὑμῶν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/005/005.yaml
  text: But they will not be able to stand against Levi, because he will wage the Lord’s war and will defeat your whole camp.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
    unchanged: false
    changes_summary: Changed "fight" to "wage" to better match the idiom "wage war" for πόλεμον ... πολεμήσει, and "host" to "camp" for παρεμβολήν.
translation:
  language: es
  text: Pero no podrán resistir ante Leví, porque él hará la guerra de Yahvé y derrotará todo su campamento.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐ δυνήσονται πρὸς Λευὶ ἀντιστῆναι
  english_pob_choice: they will not be able to stand against Levi
  chosen_spanish: no podrán resistir ante Leví
  alternatives_spanish:
  - no podrán mantenerse en pie frente a Leví
  - no podrán hacer frente a Leví
  lexicon: ἀνθίστημι / δύναμαι
  rationale: En español, 'resistir ante' conserva la idea de oposición efectiva sin sonar demasiado literal; 'mantenerse en pie' sería más idiomático en algunos contextos, pero aquí el contraste militar favorece 'resistir'.
- source_word: πόλεμον Κυρίου πολεμήσει
  english_pob_choice: he will wage the Lord’s war
  chosen_spanish: hará la guerra de Yahvé
  alternatives_spanish:
  - librará la guerra de Yahvé
  - peleará la guerra de Yahvé
  lexicon: πολέμος / πολεμέω
  rationale: '''Hará la guerra'' reproduce la idiomática ''wage war'' del audit trail inglés y mantiene la fuerza militar del griego. Se eligió ''Yahvé'' según el estándar del proyecto para el nombre divino.'
- source_word: νικήσει
  english_pob_choice: will defeat
  chosen_spanish: derrotará
  alternatives_spanish:
  - vencerá
  - triunfará sobre
  lexicon: νικάω
  rationale: '''Derrotará'' comunica bien el resultado de la victoria en un registro claro y bíblico, sin perder el sentido de superar militarmente al enemigo.'
- source_word: πᾶσαν παρεμβολὴν
  english_pob_choice: your whole camp
  chosen_spanish: todo su campamento
  alternatives_spanish:
  - toda su tropa
  - todo su ejército
  lexicon: παρεμβολή
  rationale: '''Campamento'' sigue la revisión inglesa que corrigió ''host'' a ''camp'', y refleja la idea de una unidad militar acampada más que simplemente ''ejército''.'
theological_decisions:
- issue: Nombre divino en una expresión de guerra
  english_pob_reading: the Lord’s war
  chosen_spanish_reading: la guerra de Yahvé
  alternative_spanish_readings:
  - la guerra del Señor
  - la guerra de Dios
  rationale: El griego usa Κυρίου; conforme al estándar del proyecto, el nombre divino se explicita como 'Yahvé' en español. 'La guerra de Yahvé' preserva además el matiz de guerra perteneciente a Dios, no solo autorizada por él.
  doctrine_reference: Nombre divino / teología bíblica de la guerra
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió 'fight' por 'wage' para πόλεμον ... πολεμήσει, y 'host' por 'camp' para παρεμβολήν; la versión española refleja ambos ajustes con 'hará la guerra' y 'campamento'.
  spanish_consistency_notes:
  - Se mantiene 'Leví' como nombre propio bíblico estándar en español.
  - Se usa 'Yahvé' por consistencia con las directrices del proyecto para יהוה / Κυρίου cuando alude al nombre divino.
