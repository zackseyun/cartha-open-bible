translation:
  language: es
  text: Por eso José era de hermoso aspecto y bella apariencia, porque nada malo habitaba en él; pues el rostro revela la turbación del espíritu.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὡραῖος τῷ εἴδει
  english_pob_choice: handsome in form
  chosen_spanish: hermoso en su forma
  alternatives_spanish:
  - hermoso de forma
  - apuesto en su aspecto
  - hermoso en apariencia
  lexicon: ὡραῖος; εἶδος
  rationale: Conserva la distinción del griego entre la cualidad general y el referente concreto de la forma física. 'Hermoso en su forma' suena natural en español y mantiene el paralelismo con la frase siguiente sobre la apariencia.
- source_word: καλὸς τῇ ὄψει
  english_pob_choice: beautiful in appearance
  chosen_spanish: bello en su apariencia
  alternatives_spanish:
  - hermoso en su apariencia
  - bello de aspecto
  - atractivo a la vista
  lexicon: καλός; ὄψις
  rationale: '''Bello en su apariencia'' refleja bien la segunda mitad del paralelismo y evita fusionarla con la primera cláusula. ''Apariencia'' mantiene el sentido visual del sustantivo griego.'
- source_word: οὐκ ἐνοίκησεν ἐν αὐτῷ οὐδὲν πονηρόν
  english_pob_choice: nothing evil dwelt in him
  chosen_spanish: nada malo habitaba en él
  alternatives_spanish:
  - ningún mal habitaba en él
  - nada perverso moraba en él
  - ninguna cosa mala vivía en él
  lexicon: οἰκέω/ἐνοικέω; πονηρός
  rationale: '''Habitaba en él'' preserva la imagen de residencia interior del verbo griego. ''Nada malo'' mantiene el término amplio del original sin intensificarlo indebidamente a ''perverso'' o moralizarlo más de lo que el texto dice.'
- source_word: ταραχῆς τοῦ πνεύματος
  english_pob_choice: the turmoil of the spirit
  chosen_spanish: la turbación del espíritu
  alternatives_spanish:
  - el tumulto del espíritu
  - la agitación del espíritu
  - la perturbación del espíritu
  lexicon: ταραχή; πνεῦμα
  rationale: '''Turbación'' es una equivalencia clara y digna para ταραχή. ''Del espíritu'' conserva el genitivo del griego sin especificar en exceso si se trata del espíritu humano en general, dado el contexto inmediato.'
- source_word: τὸ πρόσωπον δηλοῖ
  english_pob_choice: the face reveals
  chosen_spanish: el rostro revela
  alternatives_spanish:
  - la cara revela
  - el semblante revela
  - el rostro manifiesta
  lexicon: πρόσωπον; δηλόω
  rationale: '''Rostro'' es más natural y solemne en español bíblico que ''cara'', y ''revela'' reproduce bien el valor de δηλόω sin sobrecargarlo. Mantiene el registro de observación proverbial del cierre.'
theological_decisions:
- issue: Relación entre belleza exterior y pureza interior
  english_pob_reading: Joseph was handsome and beautiful because nothing evil dwelt in him; the face reveals the turmoil of the spirit.
  chosen_spanish_reading: José es descrito como hermoso y bello exteriormente, y esa belleza se vincula causalmente con la ausencia de mal que habitaba en él.
  alternative_spanish_readings:
  - José era bello porque no había mal en él
  - la hermosura de José provenía de su interior sin mal
  rationale: 'La partícula causal ''porque'' debe conservarse: el texto no solo yuxtapone rasgos, sino que los conecta con una explicación moral/espiritual. El español mantiene esa relación sin añadir una doctrina ajena al pasaje.'
  doctrine_reference: Antropología moral del Testamento de Simeón; relación entre interioridad y manifestación exterior.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó un marcador de nota que no alteraba el texto; por eso el español se ofrece sin nota textual, manteniendo el contenido estable y completo.
  spanish_consistency_notes:
  - Se mantiene 'José' para Ἰωσὴφ.
  - Se traduce πνεῦμα como 'espíritu' en sentido interior/antropológico, no como el Espíritu Santo.
  - Se conserva la coordinación de dos adjetivos paralelos ('hermoso' / 'bello') para reflejar el paralelismo del griego.
  - No se introduce terminología eclesiástica ajena al pasaje.
