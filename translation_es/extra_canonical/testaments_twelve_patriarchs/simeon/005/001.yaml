  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/005/001.yaml
  text: Therefore Joseph was handsome in form and beautiful in appearance, because nothing evil dwelt in him; for the face reveals the turmoil of the spirit.
