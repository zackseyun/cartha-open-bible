id: T12P.SIM.5.6
reference: Testament of Simeon 5:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: Καὶ ἔσονται ὀλιγοστοί³⁶ ἐπιμεριζόμενοι³⁷ *ἐν τῷ³⁸ Λευὶ καὶ *ἐν τῷ³⁹ Ἰούδᾳ⁴⁰ καὶ οὐκ⁴¹ ἔσται ἐξ ὑμῶν *τις εἰς ἡγεμονίαν⁴² καθὼς καὶ ὁ πατὴρ ἡμῶν⁴³ προεφήτευσεν⁴⁴ *ἐν ταῖς⁴⁵ εὐλογίαις⁴⁶.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/005/006.yaml
  text: And they will be few in number, being divided among Levi and among Judah, and none from among you will be for leadership, just as our father also prophesied in the blessings.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
    unchanged: false
    changes_summary: Adjusted ‘in Levi and in Judah’ to ‘among Levi and among Judah’ for natural English while preserving the source sense; removed the footnote markers from ‘leadership’; rendered ‘in the blessings’ more naturally as ‘in the blessings’ while keeping the plural reference.
translation:
  language: es
  text: Y serán pocos en número, distribuidos entre Leví y entre Judá, y ninguno de ustedes será para liderazgo, tal como también nuestro padre profetizó en las bendiciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὀλιγοστοί
  english_pob_choice: few in number
  chosen_spanish: pocos en número
  alternatives_spanish:
  - escasos en número
  - serán pocos
  lexicon: ὀλίγος
  rationale: Expresa con naturalidad la idea cuantitativa de escasez sin perder el énfasis del adjetivo griego en el número.
- source_word: ἐπιμεριζόμενοι
  english_pob_choice: being divided among
  chosen_spanish: distribuidos entre
  alternatives_spanish:
  - repartidos entre
  - divididos entre
  lexicon: μερίζω / ἐπιμερίζομαι
  rationale: '''Distribuidos entre'' conserva la imagen de reparto geográfico/tribal y suena más natural en español que una calca demasiado rígida.'
- source_word: ἐν τῷ Λευὶ καὶ ἐν τῷ Ἰούδᾳ
  english_pob_choice: among Levi and among Judah
  chosen_spanish: entre Leví y entre Judá
  alternatives_spanish:
  - en Leví y en Judá
  - dentro de Leví y dentro de Judá
  lexicon: ἐν + dativo
  rationale: Se mantiene el matiz distributivo de la preposición con nombres tribales, evitando el calco 'en' que sería menos claro en español.
- source_word: οὐκ ἔσται ἐξ ὑμῶν τις εἰς ἡγεμονίαν
  english_pob_choice: none from among you will be for leadership
  chosen_spanish: ninguno de ustedes será para liderazgo
  alternatives_spanish:
  - nadie de ustedes será para gobierno
  - ninguno de ustedes ejercerá liderazgo
  lexicon: ἡγεμονία
  rationale: '''Liderazgo'' refleja el sentido de función rectora sin imponer una especificación política más fuerte de la que exige el griego.'
- source_word: ἐν ταῖς εὐλογίαις
  english_pob_choice: in the blessings
  chosen_spanish: en las bendiciones
  alternatives_spanish:
  - en las bendiciones dichas
  - en las bendiciones paternas
  lexicon: εὐλογία
  rationale: Se conserva el plural del original y la referencia amplia a las bendiciones citadas en el contexto patrimonial del testamento.
theological_decisions:
- issue: Destino tribal de Leví y Judá
  english_pob_reading: they will be few in number, being divided among Levi and among Judah
  chosen_spanish_reading: serán pocos en número, distribuidos entre Leví y entre Judá
  alternative_spanish_readings:
  - serán escasos y repartidos entre Leví y Judá
  rationale: La formulación mantiene la tensión profética sobre la dispersión tribal sin interpretarla más allá del texto.
  doctrine_reference: Génesis 49; tradición testamentaria patriarcal
- issue: Ausencia de liderazgo desde el grupo
  english_pob_reading: none from among you will be for leadership
  chosen_spanish_reading: ninguno de ustedes será para liderazgo
  alternative_spanish_readings:
  - ninguno de ustedes ejercerá liderazgo
  - no habrá de entre ustedes quien lidere
  rationale: Se preserva la negación general del rol dirigente sin sustituirla por un matiz doctrinal ajeno al texto.
  doctrine_reference: testimonio profético del libro de Simeón
- issue: Referencia a las bendiciones del padre
  english_pob_reading: just as our father also prophesied in the blessings
  chosen_spanish_reading: tal como también nuestro padre profetizó en las bendiciones
  alternative_spanish_readings:
  - tal como también nuestro padre profetizó en sus bendiciones
  - tal como profetizó nuestro padre en las bendiciones
  rationale: El plural 'las bendiciones' se conserva porque el griego lo exige; se evita singularizar o reespecificar sin base textual.
  doctrine_reference: Génesis 49
translation_notes:
  revision_awareness: La revisión inglesa reciente suavizó 'in Levi and in Judah' a 'among Levi and among Judah' y mantuvo 'in the blessings' en plural. La versión española sigue esa misma decisión distributiva con 'entre' y conserva el plural 'bendiciones' sin añadir glosa interpretativa.
  spanish_consistency_notes:
  - Se usa 'Leví' y 'Judá' como nombres tribales propios, con mayúscula inicial.
  - '''Liderazgo'' se mantiene como término abstracto y neutro, evitando sustituirlo por ''gobierno'' o ''dominio'' sin necesidad textual.'
  - Se conserva el paralelismo 'entre... y entre...' para reflejar la distribución doble del original.
  - No se añaden notas al pie porque no hay una alternativa textual necesaria ni un punto de ambigüedad que el español requiera marcar.
