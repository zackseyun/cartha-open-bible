translation:
  language: es
  text: Porque yo he visto en el escrito de Enoc que sus hijos serán corrompidos en inmoralidad sexual[a], y harán daño a los hijos de Leví con la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fornicación». Se prefiere «inmoralidad sexual» porque comunica mejor el alcance amplio de πορνεία en español actual, mientras que «fornicación» conserva un matiz más tradicional y más estrecho.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἑώρακα ... ἐν χαρακτῆρι γραφῆς Ἐνώχ
  english_pob_choice: I have seen in the writing of Enoch
  chosen_spanish: he visto en el escrito de Enoc
  alternatives_spanish:
  - he visto en la escritura de Enoc
  - he visto en el escrito de Enoc
  lexicon: ἑώρακα / χαρακτήρ / γραφή / Ἐνώχ
  rationale: Conserva el perfecto de experiencia «he visto» y vierte la referencia al documento como «escrito», que suena natural en español y mantiene la idea de un testimonio escrito de Enoc.
- source_word: ἐν πορνείᾳ
  english_pob_choice: in sexual immorality
  chosen_spanish: en la fornicación
  alternatives_spanish:
  - en inmoralidad sexual
  - en sexual inmoralidad
  - en la sexualidad inmoral
  lexicon: πορνεία
  rationale: La revisión inglesa ya precisó la preposición «in» para reflejar ἐν. En español, «fornicación» preserva el peso moral y la categoría léxica tradicional de πορνεία sin diluirla en una paráfrasis genérica.
- source_word: φθαρήσονται
  english_pob_choice: will be corrupted
  chosen_spanish: serán corrompidos
  alternatives_spanish:
  - serán destruidos
  - se pervertirán
  lexicon: φθείρω
  rationale: «Serán corrompidos» conserva la pasiva futura y el sentido de deterioro moral/daño introducido por el contexto de πορνεία.
- source_word: τοῖς υἱοῖς Λευὶ ... ἀδικήσουσιν ἐν ῥομφαίᾳ
  english_pob_choice: they will wrong the sons of Levi with the sword
  chosen_spanish: harán daño a los hijos de Leví con la espada
  alternatives_spanish:
  - agraviarán a los hijos de Leví con la espada
  - cometerán injusticia contra los hijos de Leví con la espada
  lexicon: ἀδικέω / ῥομφαία / υἱοὶ Λευί
  rationale: «Harán daño» reproduce de modo natural el verbo de perjuicio sin volver demasiado técnico el castellano; «con la espada» mantiene el instrumento bélico explícito en el original.
theological_decisions:
- issue: Naturaleza moral de la corrupción por πορνεία
  english_pob_reading: will be corrupted in sexual immorality
  chosen_spanish_reading: serán corrompidos en la fornicación
  alternative_spanish_readings:
  - serán corrompidos por la fornicación
  - serán corrompidos en inmoralidad sexual
  rationale: Se conserva la localización conceptual marcada por ἐν, evitando convertirla en mera causalidad. «Fornicación» mantiene la denuncia ética concreta sin suavizarla ni modernizarla más de lo que el texto permite.
  doctrine_reference: Santidad sexual y corrupción moral en el lenguaje bíblico y apocalíptico
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «by sexual immorality» a «in sexual immorality» para ajustarse mejor a ἐν πορνείᾳ; la versión española refleja esa misma relación con «en la fornicación» y mantiene intacto el resto del enunciado.
  spanish_consistency_notes:
  - Se usa «Enoc» como forma española habitual del nombre propio.
  - Se conserva «Leví» como transliteración estándar en español bíblico.
  - «Espada» traduce ῥομφαία sin explicitar el tipo de arma, siguiendo la concisión del texto fuente.
