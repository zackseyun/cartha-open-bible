base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/005/004.yaml
  text: For I have seen in the writing of Enoch that your sons will be corrupted in sexual immorality, and they will wrong the sons of Levi with the sword.
