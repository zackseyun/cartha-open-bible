translation:
  language: es
  text: Y ahora, hijos míos, hagan buenos sus corazones delante del Señor, y enderecen sus caminos delante de los hombres, y hallarán favor delante del Señor y de los hombres.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀγαθύνατε τὰς καρδίας ὑμῶν
  english_pob_choice: make your hearts good
  chosen_spanish: hagan buenos sus corazones
  alternatives_spanish:
  - hagan bien sus corazones
  - mejoren sus corazones
  - hagan rectos sus corazones
  lexicon: ἀγαθύνω
  rationale: El griego usa el verbo causativo ἀγαθύνω, que significa hacer bueno/mejor. En español, «hagan buenos sus corazones» conserva la fuerza verbal y el objeto interno sin convertirlo en una paráfrasis moral demasiado amplia.
- source_word: ἐνώπιον Κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante el Señor
  - en presencia de Yahvé
  lexicon: ἐνώπιον + κύριος
  rationale: La fuente griega dice «delante de» en sentido de presencia/juicio. Se usa «Yahvé» por la convención del proyecto para el nombre divino, manteniendo el matiz relacional y público.
- source_word: εὐθύνατε τὰς ὁδοὺς ὑμῶν
  english_pob_choice: make your ways straight
  chosen_spanish: enderecen sus caminos
  alternatives_spanish:
  - hagan rectos sus caminos
  - allanen sus caminos
  - corrijan sus caminos
  lexicon: εὐθύνω
  rationale: εὐθύνω expresa enderezar o hacer recto. «Enderecen sus caminos» es natural en español bíblico actual y conserva la imagen de corregir la conducta sin suavizarla.
- source_word: ἐνώπιον τῶν ἀνθρώπων
  english_pob_choice: before men
  chosen_spanish: delante de los hombres
  alternatives_spanish:
  - ante los hombres
  - en presencia de los hombres
  - delante de la gente
  lexicon: ἐνώπιον + ἄνθρωπος
  rationale: Se conserva la contraposición con «delante de Yahvé» y el sustantivo genérico «hombres» porque el texto griego usa ἀνθρώπων. No se reemplaza por un término más inclusivo para no alterar el paralelismo heredado.
- source_word: εὑρίσκοντες χάριν
  english_pob_choice: you will find favor
  chosen_spanish: hallarán favor
  alternatives_spanish:
  - encontrarán favor
  - obtendrán favor
  - hallarán gracia
  lexicon: εὑρίσκω + χάρις
  rationale: La construcción idiomática pide «hallar»; «favor» refleja mejor la relación con el contexto y evita imponer «gracia» donde aquí la idea es aceptación/bienquerencia, coherente con la lectura inglesa auditada.
theological_decisions:
- issue: Relación entre conducta humana y favor divino
  english_pob_reading: you will find favor before the Lord and men
  chosen_spanish_reading: hallarán favor delante de Yahvé y de los hombres
  alternative_spanish_readings:
  - hallarán gracia delante de Yahvé y de los hombres
  - conseguirán favor de Yahvé y de los hombres
  rationale: 'El pasaje presenta una exhortación sapiencial: la rectitud interior y exterior conduce a favor/aceptación tanto ante Dios como ante la comunidad. «Favor» preserva la ambigüedad saludable del griego χάρις sin convertir el versículo en una declaración técnica sobre salvación por gracia.'
  doctrine_reference: Sabiduría/ética bíblica; favor divino y social
- issue: Uso del nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Señor Dios
  rationale: El paquete fuente y el estándar del proyecto piden traducir el nombre divino como «Yahvé». Aquí no hay indicio de una cita indirecta que justifique enmascararlo como «Señor».
  doctrine_reference: Tetragrámaton / nombre divino
translation_notes:
  revision_awareness: La versión revisada más reciente indica que no hubo cambios necesarios en el inglés POB. Por ello, el español se apoya directamente en la lectura auditada existente y en el griego de Charles 1908, sin introducir reajustes textuales ni decisiones de variante.
  spanish_consistency_notes:
  - Se mantiene la fórmula repetida «delante de» para reflejar ἐνώπιον en ambos miembros del versículo.
  - Se conserva el paralelismo entre «Yahvé» y «los hombres» como en el griego y en la traducción inglesa auditada.
  - El tono es exhortativo y sapiencial, no doctrinalmente técnico.
  - No se añaden notas al pie porque el verso no presenta variantes textuales ni alternativas que requieran anclaje en el texto español.
