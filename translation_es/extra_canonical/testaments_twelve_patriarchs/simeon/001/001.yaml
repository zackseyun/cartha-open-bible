lexical_decisions:
- source_word: Διαθήκη / Ἀντίγραφον λόγων
  english_pob_choice: A copy of the words
  chosen_spanish: Copia de las palabras
  alternatives_spanish:
  - Copia de los dichos
  - Transcripción de las palabras
  lexicon: ἀντίγραφον / λόγοι
  rationale: El griego conserva la idea de un documento transmitido como copia de un discurso; «Copia de las palabras» sigue de cerca la lectura auditada del POB inglés sin volverlo más técnico de lo que exige el contexto.
- source_word: τοῖς υἱοῖς αὐτοῦ
  english_pob_choice: his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus descendientes
  lexicon: υἱοί
  rationale: «Hijos» comunica de manera natural el sentido directo del plural griego y conserva la referencia familiar explícita del texto.
- source_word: πρὸ τοῦ ἀποθανεῖν αὐτόν
  english_pob_choice: before he died
  chosen_spanish: antes de morir
  alternatives_spanish:
  - antes de que muriera
  - antes de su muerte
  lexicon: ἀποθνῄσκω
  rationale: La construcción temporal se expresa con fluidez en español mediante infinitivo; mantiene el valor simple y directo del original.
- source_word: ἐν ἑκατοστῷ εἰκοστῷ ἔτει τῆς ζωῆς αὐτοῦ
  english_pob_choice: in the hundred and twentieth year of his life
  chosen_spanish: en el año ciento veinte de su vida
  alternatives_spanish:
  - a los ciento veinte años de su vida
  - en el año 120 de su vida
  lexicon: ἔτος / ζωή
  rationale: La formulación tradicional y clara en español es «año ciento veinte de su vida»; conserva el conteo de años sin añadir interpretación.
- source_word: ἐν ᾧ χρόνῳ ἀπέθανεν Ἰωσὴφ ὁ ἀδελφὸς αὐτοῦ
  english_pob_choice: at the time when Joseph his brother died
  chosen_spanish: en el tiempo en que murió José, su hermano
  alternatives_spanish:
  - cuando murió José, su hermano
  - al tiempo de la muerte de José, su hermano
  lexicon: χρόνος / ἀποθνῄσκω / ἀδελφός
  rationale: «En el tiempo en que» refleja el marco temporal del griego y corresponde al inglés auditado; «su hermano» preserva la relación fraterna sin sobrecargar la frase.
theological_decisions:
- issue: Estatus del encabezado como «copia» de un discurso patriarcal transmitido
  english_pob_reading: A copy of the words of Simeon
  chosen_spanish_reading: Copia de las palabras de Simeón
  alternative_spanish_readings:
  - Transcripción de las palabras de Simeón
  - Relato de las palabras de Simeón
  rationale: No hay herejía ni afirmación doctrinal explícita; se conserva el carácter documental/transmitido del testimonio sin convertirlo en una paráfrasis devocional.
  doctrine_reference: Transmisión textual y forma literaria del pseudepígrafo
- issue: Cronología de la muerte de José en relación con la edad de Simeón
  english_pob_reading: at the time when Joseph his brother died
  chosen_spanish_reading: en el tiempo en que murió José, su hermano
  alternative_spanish_readings:
  - cuando murió José, su hermano
  - al tiempo en que murió José, su hermano
  rationale: Se mantiene la simultaneidad/relación temporal sin decidir más allá de lo que el griego y el POB inglés indican.
  doctrine_reference: Cronología narrativa
translation_notes:
  revision_awareness: 'El texto inglés auditado quedó sin cambios en la última revisión (high_agreement; unchanged: true). La versión española sigue de cerca el sentido del griego y del POB inglés, sin introducir notas adicionales no sustentadas por el aparato dado.'
  spanish_consistency_notes:
