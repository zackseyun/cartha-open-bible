translation:
  language: es
  text: Copia de las palabras de Simeón[a], que dijo a sus hijos antes de que muriera, en el año ciento veinte de su vida, en el tiempo en que murió José, su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Copia» refleja el griego Ἀντίγραφον, que señala un documento transmitido como reproducción de palabras, no una composición nueva.
