review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: Simeón enfermo, llegada de los hijos para visitarlo, esfuerzo para incorporarse, beso y discurso. Sin embargo, «fueron a visitarlo» debilita el matiz de ἦλθον («vinieron/llegaron») y «se sentó» pierde parte del valor contextual de ἐκάθισε entendido aquí como «se incorporó/se sentó en la cama» ante la enfermedad. Una leve revisión mejora la alineación con la fuente y con el inglés auditado («came», «sat up»).'
  spanish_quality_summary: 'El español es claro y natural, con tono digno y legible. La sintaxis y puntuación funcionan bien. La mejora principal es escoger formulaciones más idiomáticas y precisas en contexto narrativo de enfermedad: «vinieron a visitarlo» y «se incorporó» suenan más naturales y transmiten mejor la escena que «fueron a visitarlo» y «se sentó».'
  glossary_alignment: No hay términos teológicos sensibles ni conflictos con la terminología base del proyecto. Las decisiones léxicas son mayormente adecuadas; solo conviene ajustar ἐπισκέψασθαι/ἦλθον a «vinieron a visitarlo» y ἐκάθισε a «se incorporó» por fidelidad contextual.
  issues:
  - severity: medium
    issue: «fueron a visitarlo» para ἦλθον ἐπισκέψασθαι αὐτόν
    rationale: El griego dice literalmente que «vinieron/llegaron» a visitarlo. «Fueron» cambia el punto de referencia y suena menos natural en esta escena narrada desde la perspectiva de Simeón.
  - severity: medium
    issue: «se sentó» para ἐκάθισε en contexto de enfermedad
    rationale: Aunque posible en abstracto, aquí el contexto de un enfermo y el inglés auditado «sat up» apuntan a la acción de incorporarse para sentarse. «Se incorporó» preserva mejor la escena sin añadir demasiado.
  revised_spanish_text: 'Y cuando Simeón estaba enfermo, sus hijos vinieron a visitarlo; y, reuniendo fuerzas, se incorporó, los besó y dijo:'
  revision_rationale: Se ajusta el verbo de movimiento a «vinieron» para reflejar ἦλθον y se cambia «se sentó» por «se incorporó» para expresar mejor ἐκάθισε en contexto de enfermedad, en línea con el inglés auditado «sat up». No se requieren notas.
