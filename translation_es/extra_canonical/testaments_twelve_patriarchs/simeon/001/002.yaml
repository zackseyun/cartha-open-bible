translation:
  language: es
  text: 'Y cuando Simeón estaba enfermo, sus hijos vinieron a visitarlo; y, reuniendo fuerzas, se incorporó, los besó y dijo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀρρωστοῦντος τοῦ Συμεὼν
  english_pob_choice: And when Simeon was sick
  chosen_spanish: Y cuando Simeón estaba enfermo
  alternatives_spanish:
  - Y cuando Simeón estaba enfermo de gravedad
  - Y estando Simeón enfermo
  lexicon: ἀρρωστοῦντος
  rationale: 'El participio genitivo expresa una circunstancia temporal simple: Simeón se hallaba enfermo. «Estaba enfermo» comunica bien el estado sin añadir matiz no atestiguado como «de gravedad».'
- source_word: ἐπισκέψασθαι αὐτόν
  english_pob_choice: came to visit him
  chosen_spanish: fueron a visitarlo
  alternatives_spanish:
  - vinieron a visitarlo
  - fueron para visitarlo
  lexicon: ἐπισκέπτομαι
  rationale: El verbo indica ir a ver a alguien con intención de atenderlo o visitarlo. «Fueron a visitarlo» reproduce el movimiento y el propósito de visita de manera natural en español.
- source_word: ἐνισχύσας
  english_pob_choice: gathering his strength
  chosen_spanish: reuniendo fuerzas
  alternatives_spanish:
  - fortaleciéndose
  - recobrando fuerzas
  lexicon: ἐνισχύω
  rationale: La idea es recuperar o reunir vigor para moverse. «Reuniendo fuerzas» conserva la imagen sin forzar una paráfrasis médica ni un modismo demasiado interpretativo.
- source_word: ἐκάθισε
  english_pob_choice: sat up
  chosen_spanish: se sentó
  alternatives_spanish:
  - se incorporó
  - se sentó derecho
  lexicon: κάθημαι
  rationale: En contexto de enfermedad, el inglés POB entiende el gesto de incorporarse para sentarse. «Se sentó» es natural y suficientemente fiel; «se incorporó» sería posible, pero introduce más especificidad corporal que el griego no exige explícitamente.
- source_word: κατεφίλησεν
  english_pob_choice: kissed them
  chosen_spanish: los besó
  alternatives_spanish:
  - los besó con afecto
  - los abrazó y los besó
  lexicon: καταφιλέω
  rationale: El verbo intensifica el beso, pero en español el simple «besó» transmite adecuadamente el gesto afectuoso sin sobrecargarlo. Se evita «abrazó» porque no está en el texto.
- source_word: καὶ εἶπεν
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y les dijo
  - y habló
  lexicon: λέγω
  rationale: La fórmula narrativa estándar se mantiene de forma directa. No se explicita «les» porque el complemento ya queda claro por el contexto y el español permite omitirlo.
theological_decisions:
- issue: Representación del estado de enfermedad y el gesto filial sin añadir lectura doctrinal
  english_pob_reading: Simeon was sick; his sons came to visit him; he gathered strength, sat up, kissed them, and said
  chosen_spanish_reading: Simeón estaba enfermo; sus hijos fueron a visitarlo; reunió fuerzas, se sentó, los besó y dijo
  alternative_spanish_readings:
  - Simeón enfermó; sus hijos vinieron a verlo; recobró fuerzas, se incorporó, los besó y dijo
  rationale: 'No hay un problema doctrinal directo, pero sí una tensión de matiz: el griego presenta un cuadro narrativo simple de enfermedad, visita y afecto. La redacción española evita añadir interpretación médica o emotiva no presente en la fuente.'
  doctrine_reference: N/A
