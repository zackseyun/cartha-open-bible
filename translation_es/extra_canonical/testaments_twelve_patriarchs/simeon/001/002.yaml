revisions:
- from: 'Y cuando Simeón estaba enfermo, sus hijos fueron a visitarlo; y, reuniendo fuerzas, se sentó, los besó y dijo:'
  to: 'Y cuando Simeón estaba enfermo, sus hijos vinieron a visitarlo; y, reuniendo fuerzas, se incorporó, los besó y dijo:'
  rationale: Se ajusta el verbo de movimiento a «vinieron» para reflejar ἦλθον y se cambia «se sentó» por «se incorporó» para expresar mejor ἐκάθισε en contexto de enfermedad, en línea con el inglés auditado «sat up». No se requieren notas.
