translation:
  language: es
  text: Y los hijos de Simeón lloraron por su padre[a]. Y estuvieron en Egipto hasta el día de su salida[b], por mano de Moisés[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lloraron de duelo».'
    reason: alternative_reading
  - marker: b
    text: 'O: «de su éxodo».'
    reason: alternative_reading
  - marker: c
    text: 'Expresión bíblica de agencia: «por medio de Moisés» o «bajo el liderazgo de Moisés».'
    reason: cultural_note
lexical_decisions:
- source_word: ἔκλαυσαν
  english_pob_choice: wept
  chosen_spanish: lloraron
  alternatives_spanish:
  - lloraron de duelo
  - sollozaron
  lexicon: LSJ
  rationale: El aoristo de κλαίω expresa llanto o lamento audible. En español, «lloraron» conserva el sentido directo y natural sin añadir una intensidad o matiz ritual que el griego no exige.
- source_word: υἱοὶ
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - hijos de varón
  lexicon: LSJ
  rationale: Aunque el inglés POB eligió «sons» por el marco genealógico, en español «hijos» es la forma natural y suficientemente precisa en este contexto patriarcal. El género masculino queda claro por «de Simeón» y por la referencia familiar.
- source_word: εἰς Αἴγυπτον
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - hacia Egipto
  - a Egipto
  lexicon: LSJ
  rationale: Como en el audit trail inglés, εἰς con ἦσαν expresa ubicación durativa más que movimiento. «En Egipto» reproduce ese valor locativo con naturalidad en español.
- source_word: ἕως ἡμέρας ἐξόδου αὐτῶν
  english_pob_choice: until the day of their departure
  chosen_spanish: hasta el día de su salida
  alternatives_spanish:
  - hasta el día de su éxodo
  - hasta el día de su partida
  lexicon: LSJ
  rationale: ἐξόδου puede ser «salida», «partida» o «éxodo». Elegí «salida» para mantener el sentido común del sustantivo sin imponer un título teológico o literario que el griego no marca explícitamente. «Partida» también sería posible, pero «salida» conserva mejor el tono bíblico.
- source_word: ἐν χειρὶ Μωϋσῆ
  english_pob_choice: by the hand of Moses
  chosen_spanish: por mano de Moisés
  alternatives_spanish:
  - por la mano de Moisés
  - por medio de Moisés
  - bajo el liderazgo de Moisés
  lexicon: LSJ
  rationale: La expresión conserva el idiomático bíblico de agencia/instrumentalidad. En español, «por mano de Moisés» mantiene la textura formal del original y evita una paráfrasis explicativa excesiva.
theological_decisions:
- issue: Cómo reflejar el matiz de ἐξόδου sin convertirlo en título canónico
  english_pob_reading: Rendered as the common noun 'departure' in the main text
  chosen_spanish_reading: «salida» en el texto principal
  alternative_spanish_readings:
  - «éxodo»
  - «la salida» con mayúscula implícita como evento histórico
  rationale: El griego usa un sustantivo común y el contexto basta para entender la referencia histórica a la salida de Egipto. Mantener «salida» preserva la apertura semántica del original y evita fijarlo como título propio.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Cómo traducir el idiomático ἐν χειρὶ Μωϋσῆ
  english_pob_reading: Retained the idiom 'by the hand of Moses'
  chosen_spanish_reading: «por mano de Moisés»
  alternative_spanish_readings:
  - «por medio de Moisés»
  - «bajo Moisés»
  rationale: La expresión bíblica de agencia se conserva de forma bastante literal para no perder el registro escritural ni desdibujar la mediación atribuida a Moisés. En español, la forma sin artículo sigue siendo inteligible y reverente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Tratamiento de la frase final y su continuidad textual
  english_pob_reading: The final line in the source transitions directly into the heading of the next work; it is not part of Simeon 9 proper.
  chosen_spanish_reading: No se añadió texto de encabezado ni explicación en el cuerpo principal
  alternative_spanish_readings:
  - Incluir una nota textual en el cuerpo
  - Marcar el corte con una nota extensa
  rationale: El pasaje en español se limita al contenido de Simeón 9, sin incorporar el encabezado del siguiente escrito. Así se respeta el límite textual indicado por el audit trail inglés.
  doctrine_reference: DOCTRINE.md §Textual integrity
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «remained in Egypt» por «were in Egypt» para ajustarse más al valor de ἦσαν. La redacción española sigue ese mismo valor locativo con «estuvieron en Egipto», evitando una idea de permanencia menos directa.
  spanish_consistency_notes:
  - Se mantuvo «Moisés» como nombre propio estándar en español.
  - Se evitó «SEÑOR» o sustitutos porque no aparece el nombre divino en este versículo.
  - «hijos» se usó como equivalente natural de υἱοὶ en un contexto genealógico, sin alterar la referencia masculina implícita.
  - La puntuación separa las dos oraciones como en el griego y en el audit trail inglés.
