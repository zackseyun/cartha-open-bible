theological_decisions:
- issue: Agencia maligna y responsabilidad moral en la caída de Simeón
  english_pob_reading: Translate both 'the ruler of deceit' and 'the spirit of jealousy' straightforwardly as active hostile powers influencing Simeon.
  chosen_spanish_reading: Traducir 'el gobernante del engaño' y 'el espíritu de celos' como poderes activos que influyen en Simeón.
  alternative_spanish_readings:
  - Tratar ambas expresiones como simples personificaciones de vicios internos
  - Convertir una en influencia demoníaca y la otra en impulso psicológico
  rationale: Se conserva la tensión entre influencia externa maligna y culpabilidad personal sin resolverla de manera reductora.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve it
- issue: μετανοήσας en v. 13
  english_pob_reading: Render as 'after repenting' in the main text.
  chosen_spanish_reading: Traducir como 'después de cambiar mi mente' en el texto principal.
  alternative_spanish_readings:
  - después de arrepentirme
  rationale: Se mantiene la guía del proyecto para el matiz cognitivo del verbo, mientras el contexto de llanto y oración conserva el peso penitencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: μετανοέω'
- issue: ἄγγελον en v. 8
  english_pob_reading: Translate as 'angel' rather than 'messenger.'
  chosen_spanish_reading: Traducir como 'ángel' y no como 'mensajero'.
  alternative_spanish_readings:
  - mensajero
  rationale: En este contexto de rescate divino, la lectura sobrenatural es la más natural y coherente.
  doctrine_reference: Angelology and narrative deliverance language
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó v. 6 de 'But' a 'For' por γάρ, v. 5 a 'in soul and body', y v. 13 a 'after repenting'. Esta redacción española sigue el sentido final revisado, pero conserva 'después de cambiar mi mente' por la pauta del proyecto para μετανοήσας.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al criterio del proyecto.
  - Se conserva 'hígado' en v. 4 y v. 7 para respetar el idiomático corporal griego.
  - Se distingue 'envidia' (v. 6, v. 13, v. 14) de 'celos' (v. 7) para reflejar la red léxica del pasaje.
  - Se usa 'ángel' para ἄγγελος, evitando neutralizar la escena de rescate.
  - No se añadieron notas ancladas que no aparezcan exactamente en el texto.
