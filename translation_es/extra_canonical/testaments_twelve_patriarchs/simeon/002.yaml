    Ὡς γὰρ⁴⁷ ἐγὼ ἐπορεύθην⁴⁸ *ἐν Σικίμοις⁴⁹ ἐνέγκαι⁵⁰ ἄλειμμα⁵¹ τοῖς ποιμνίοις⁵² καὶ Ῥουβὶμ⁵³ εἰς⁵⁴ Δοθαείμ⁵⁵, ὅπου⁵⁶ τὰ ἐγχρῄζοντα⁵⁷ ἡμῖν⁵⁸ καὶ πᾶσα⁵⁹ ἡ ἀπόθεσις ἦν⁶⁰, Ἰούδας⁶¹ ὁ ἀδελφός μου⁶² ἐπώλησεν αὐτὸν⁶³ ἐλθὼν τοῖς Ἰσμαηλίταις. 10. Καὶ *ὁ Ῥουβὶμ ἀκούσας ταῦτα⁶⁴ ἐλυπήθη⁶⁵. ἤθελε⁶⁶ γὰρ αὐτὸν⁶⁷ ἀπαγαγεῖν⁶⁸ πρὸς τὸν πατέρα⁶⁹. 11. Ἐγὼ δὲ⁷⁰ *ταῦτα ἀκούσας⁷¹ ὠργίσθην ἐπὶ⁷² τὸν⁷³ Ἰούδαν⁷⁴ Γσφόδρα⁷⁵, ὅτι⁷⁶ ζῶντα αὐτὸν ἀπέλυσεν· καὶ *ἐποίησα μῆνας πέντε ὀργιζόμενος ἐπʼ αὐτῷ⁷⁷. 12. Καίγε συνετρίβει με *ὁ Κύριος⁷⁸ καὶ ἐκώλυσεν δράσιν⁷⁹ *ἀπʼ ἐμοῦ⁸⁰. *ὅτι ἡ χείρ μου ἡ δεξιὰ ἡμίξηρος γέγονεν ἐπὶ ἡμέρας ἑπτά⁸¹. 13. Καὶ ἔγνων, τέκνα⁸², ὅτι *περὶ Ἰωσὴφ⁸³ *τοῦτό μοι συνέβη⁸⁴. καὶ⁸⁵ μετανοήσας ἔκλαυσα⁸⁶ καὶ⁸⁷ ηὐξάμην *Κυρίῳ τῷ Θεῷ⁸⁸ ἵνα⁸⁹ *ἀποκατασταθῇ ἡ χείρ μου⁹⁰ καὶ⁹¹ ἀποσχῶ⁹² ἀπὸ *παντὸς μολυσμοῦ καὶ φθόνου⁹³ Γκαὶ ἀπὸ πάσης ἀφροσύνης⁷. 14. Ἔγνων⁹⁴ γὰρ ὅτι πονηρὸν πρᾶγμα ἐνεθυμήθην ἐνώπιον κυρίου⁹⁵ καὶ⁹⁶ *Ἰακὼβ τοῦ πατρός μου⁹⁷ *διὰ Ἰωσὴφ⁹⁸ *τὸν ἀδελφόν μου, φθονήσας αὐτῷ⁹⁹.
