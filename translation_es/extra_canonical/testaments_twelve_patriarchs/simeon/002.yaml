base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/002.yaml
  text: '1[a]. Hear, my children, Simeon your father, and I will declare to you what I have in my heart.

    2. I was born from Jacob as the second son to my father, and Leah my mother called me Simeon, because the Lord heard her petition.

    3. For I became very strong; I did not shrink from any deed, nor was I afraid of anything.

    4. For my heart was hard, and my liver unmoved, and my inward parts without compassion.

    5. For courage also is given by the Most High to men in soul and body[b].

    6. For in the time of my youth I was very jealous of Joseph, because my father loved him above all.

    7. And I set my liver against him so as to kill him, because the ruler of deceit and the spirit of jealousy blinded my mind, so that I did not regard him as a brother, nor even spare Jacob my father.

    8. But his God and the God of our fathers sent his angel and rescued him from my hands.

    9. For when I went to Shechem to bring ointment for our flocks, and Reuben to Dothan, where our supplies and all our stores were, Judah my brother sold him to the Ishmaelites.

    10. And when Reuben heard these things, he was grieved, for he wanted to bring him back safely to our father.

    11. But when I heard this, I was very angry with Judah, because he had let him go alive;

    12. and for five months I was sick in my liver. And the Lord struck me, and my hand was withered for seven days.

    13. And I knew, my children, that this happened to me because of Joseph. And after repenting I wept and prayed to the Lord God that my hand might be restored, and that I might abstain from every defilement and envy and from all foolishness.

    14. For I knew that I had devised an evil thing before the Lord and against Jacob my father concerning Joseph my brother[c], by envying him.'
  footnotes:
  - marker: a
    text: Or 'the prince of error.' The Greek allows either 'deceit' or 'error/delusion' for πλάνη.
    reason: lexical_alternative
  - marker: b
    text: '''My liver'' reflects the Greek bodily idiom for the inner seat of passion or resolve; the same image recurs in this chapter.'
    reason: cultural_note
  - marker: c
    text: '''After changing my mind'' could also be rendered ''after repenting.'''
    reason: lexical_alternative
