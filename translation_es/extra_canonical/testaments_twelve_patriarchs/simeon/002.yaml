translation:
  language: es
  text: '1[a]. Escuchen, hijos míos, a Simeón, su padre, y les declararé lo que tengo en mi corazón.


    2. Yo nací de Jacob como el segundo hijo de mi padre, y Lea, mi madre, me llamó Simeón, porque el Señor oyó su petición.


    3. Porque llegué a ser muy fuerte; no me acobardé ante ningún hecho, ni tuve miedo de nada.


    4. Porque mi corazón era duro, y mi hígado, inmóvil, y mis entrañas, sin compasión.


    5. Porque el valor también es dado por el Altísimo a los hombres en alma y cuerpo.


    6. Porque en el tiempo de mi juventud tuve mucha envidia de José, porque mi padre lo amaba por encima de todos.


    7. Y puse mi hígado contra él para matarlo, porque el gobernante del engaño y el espíritu de celos cegó mi mente, de modo que no lo consideré como hermano, ni siquiera tuve miramiento por Jacob, mi padre.


    8. Pero su Dios y el Dios de nuestros padres envió a su ángel y lo rescató de mis manos.


    9. Porque cuando yo fui a Siquem para llevar ungüento para nuestros rebaños, y Rubén fue a Dotán, donde estaban nuestras provisiones y todas nuestras reservas, Judá, mi hermano, lo vendió a los ismaelitas.


    10. Y cuando Rubén oyó estas cosas, se dolió, porque quería traerlo de vuelta a salvo a nuestro padre.


    11. Pero cuando yo oí esto, me enojé mucho con Judá, porque lo había dejado ir con vida;


    12. y durante cinco meses estuve enfermo del hígado. Y el Señor me hirió, y mi mano quedó seca durante siete días.


    13. Y supe, hijos míos, que esto me sucedió por causa de José. Y después de cambiar de parecer, lloré y oré al Señor Dios, para que mi mano fuera restaurada, y para que yo me abstuviera de toda impureza y envidia y de toda insensatez.


    14. Porque supe que había concebido una mala cosa delante del Señor y contra Jacob, mi padre, respecto de José, mi hermano, por envidia de él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «Oigan» o «Presten oído». El griego introduce una exhortación solemne y directa.'
    reason: alternative_reading
