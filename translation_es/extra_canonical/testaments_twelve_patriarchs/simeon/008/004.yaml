review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: los encantadores hablan, la salida de los huesos de José desencadena oscuridad/gloom y una gran plaga sobre los egipcios, y la oscuridad impide reconocer al hermano aun con lámpara. Sin embargo, la cláusula final «cada uno no reconocería» suena poco natural en español y no expresa tan bien la estructura distributiva del griego como una formulación más idiomática.'
  spanish_quality_summary: 'El español es claro y digno en casi todo el versículo. «Pues los encantadores les decían», «cuando salieran los huesos de José» y «una gran plaga sobre los egipcios» funcionan bien. La única reparación necesaria es estilístico-sintáctica: en español natural conviene «nadie reconocería a su hermano» o «cada uno dejaría de reconocer...», especialmente porque el griego ἕκαστος aquí se vierte mejor con una formulación distributiva idiomática que evite el calco negativo.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Encantadores» corresponde bien a ἐπαοιδοί; «huesos de José», «tinieblas y oscuridad», «plaga» y «hermano» están alineados con el sentido fuente y con el rastro inglés auditado. No se requieren notas léxicas adicionales.
  issues:
  - severity: medium
    issue: Calco poco natural en «cada uno no reconocería a su hermano»
    rationale: Aunque comprensible, esta negación pospuesta suena forzada en español y no es la mejor manera de representar ὥστε ... μὴ ἐπιγινώσκειν ἕκαστος τὸν ἀδελφὸν αὐτοῦ. Una redacción como «nadie reconocería a su hermano» preserva el efecto distributivo con mejor legibilidad.
  revised_spanish_text: Pues los encantadores les decían que, cuando salieran los huesos de José, habría sobre toda la tierra tinieblas y oscuridad, y una gran plaga sobre los egipcios, de modo que nadie reconocería a su hermano, aun con una lámpara.
  revision_rationale: Se hizo una reparación mínima para mejorar la naturalidad del español en la cláusula final sin alterar el sentido fuente. «Nadie reconocería a su hermano» comunica con claridad el resultado distributivo de la oscuridad extrema, y «aun con una lámpara» mantiene el énfasis del griego y del inglés auditado.
