base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/008/004.yaml
  text: For the enchanters were telling them that, when Joseph’s bones went out, there would be over all the land darkness and gloom and a great plague on the Egyptians, so that each man would not recognize his brother, even with a lamp.
  revision_pass:
