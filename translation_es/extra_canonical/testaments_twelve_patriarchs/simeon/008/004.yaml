  to: Pues los encantadores les decían que, cuando salieran los huesos de José, habría sobre toda la tierra tinieblas y oscuridad, y una gran plaga sobre los egipcios, de modo que nadie reconocería a su hermano, aun con una lámpara.
  rationale: Se hizo una reparación mínima para mejorar la naturalidad del español en la cláusula final sin alterar el sentido fuente. «Nadie reconocería a su hermano» comunica con claridad el resultado distributivo de la oscuridad extrema, y «aun con una lámpara» mantiene el énfasis del griego y del inglés auditado.
