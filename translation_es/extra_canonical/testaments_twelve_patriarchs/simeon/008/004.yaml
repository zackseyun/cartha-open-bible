translation:
  language: es
  text: Pues los encantadores les decían que, cuando salieran los huesos de José, habría sobre toda la tierra tinieblas y oscuridad, y una gran plaga sobre los egipcios, de modo que nadie reconocería a su hermano, aun con una lámpara.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπαοιδοί
  english_pob_choice: enchanters
  chosen_spanish: encantadores
  alternatives_spanish:
  - hechiceros
  - magos
  - adivinos
  lexicon: BDAG ἐπαοιδός
  rationale: El griego designa a quienes usan encantamientos o fórmulas mágicas; «encantadores» conserva el campo semántico sin imponer una categoría bíblica más específica que el texto no explicita.
- source_word: ἐν ἐξόδῳ τῶν ὀστῶν Ἰωσήφ
  english_pob_choice: when Joseph’s bones went out
  chosen_spanish: cuando salieran los huesos de José
  alternatives_spanish:
  - cuando los huesos de José salieran
  - en la salida de los huesos de José
  - cuando fueran sacados los huesos de José
  lexicon: ἐξόδος; ὀστέα
  rationale: 'Mantiene la imagen extraña pero clara del original: no se trata de una paráfrasis sobre la muerte de José, sino de la ‘salida’ de sus huesos, en línea con la redacción griega y la lectura auditada en inglés.'
- source_word: σκότος καὶ γνόφος
  english_pob_choice: darkness and gloom
  chosen_spanish: tinieblas y oscuridad
  alternatives_spanish:
  - oscuridad y penumbra
  - tinieblas y niebla
  - oscuridad y tiniebla
  lexicon: BDAG σκότος; γνόφος
  rationale: Los dos términos forman una duplicación enfática de oscuridad opresiva. «Tinieblas y oscuridad» conserva la fuerza acumulativa sin forzar una distinción artificial en español.
- source_word: πληγὴ μεγάλη
  english_pob_choice: a great plague
  chosen_spanish: una gran plaga
  alternatives_spanish:
  - un gran castigo
  - una gran calamidad
  - una gran aflicción
  lexicon: BDAG πληγή
  rationale: «Plaga» reproduce el sentido de golpe/aflicción/calamidad que afecta a los egipcios, y coincide con la decisión inglesa de no suavizar el término.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su hermano
  - a su prójimo
  - a su pariente
  lexicon: BDAG ἀδελφός
  rationale: Se conserva el parentesco literal. El contexto de confusión visual en plena oscuridad pide mantener «hermano» sin ampliar a un sentido figurado.
theological_decisions:
- issue: Alcance de la oscuridad sobre la tierra
  english_pob_reading: there would be over all the land darkness and gloom
  chosen_spanish_reading: habría sobre toda la tierra tinieblas y oscuridad
  alternative_spanish_readings:
  - habría sobre toda la tierra oscuridad y tiniebla
  - habría en toda la tierra tinieblas y penumbra
  rationale: No se introduce una interpretación simbólica; la frase describe un juicio o desastre extendido geográficamente. «Sobre toda la tierra» sigue el valor distributivo del griego y del inglés POB.
  doctrine_reference: Narrative/judgment language; no doctrinal expansion
- issue: Identidad del sujeto de ‘enchanters’
  english_pob_reading: For the enchanters were telling them
  chosen_spanish_reading: Pues los encantadores les decían
  alternative_spanish_readings:
  - Pues los hechiceros les decían
  - Pues los magos les decían
  rationale: Se mantiene el grupo humano implícito en el texto sin convertirlo en una categoría eclesial o moralizada. «Encantadores» conserva el matiz de prácticas mágicas documentado por el lexema griego.
  doctrine_reference: Lexical, not doctrinal
- issue: Posibilidad de reconocimiento ‘ni aun con una lámpara’
  english_pob_reading: so that each man would not recognize his brother, even with a lamp
  chosen_spanish_reading: de modo que cada uno no reconocería a su hermano, ni aun con una lámpara
  alternative_spanish_readings:
  - de modo que cada uno no reconocería a su hermano, incluso con una lámpara
  - de modo que nadie reconocería a su hermano, aun con una lámpara
  rationale: 'La cláusula final se ajusta al griego: la oscuridad es tan intensa que ni la luz de una lámpara bastaría. Se conserva el énfasis sin reordenar excesivamente la oración.'
  doctrine_reference: Descriptive narrative; no doctrinal issue
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión reciente que eliminó marcas de nota y ajustó la última cláusula para acercarla al orden griego, preservando todo el contenido: en español se reflejó esa clausula final de forma directa con «ni aun con una lámpara».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque el pasaje no contiene el nombre divino.
  - Se evitó traducir mecánicamente como «hechiceros» para no estrechar innecesariamente el campo de ἐπαοιδοί; «encantadores» sigue la decisión léxica inglesa.
  - Se conservó la duplicación «tinieblas y oscuridad» para respetar la intensificación del griego.
  - No se añadieron notas al pie porque el contexto no exige variantes textuales ni ambigüedades abiertas adicionales en español.
