source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: Καὶ ὡς¹ συνετέλεσεν² Συμεὼν ἐντελλόμενος³ τοῖς υἱοῖς⁴ αὐτοῦ⁵, ἐκοιμήθη⁶ *μετὰ τῶν πατέρων αὐτοῦ⁷ *ὢν ἐτῶν ἑκατὸν εἴκοσι⁸.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/008/001.yaml
  text: And when Simeon had finished commanding his sons, he fell asleep with his fathers, being one hundred and twenty years old.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:00Z'
    unchanged: false
    changes_summary: Removed the footnote marker from “sons” and made the wording slightly smoother while preserving the source meaning.
translation:
  language: es
  text: Y cuando Simeón terminó de mandar a sus hijos, durmió con sus padres, siendo de ciento veinte años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνετέλεσεν
  english_pob_choice: had finished
  chosen_spanish: terminó
  alternatives_spanish:
  - acabó
  - concluyó
  lexicon: συνετελέω
  rationale: Expresa la acción de llevar a su fin el discurso o mandato de Simeón sin añadir matices innecesarios; en español, «terminó» suena natural y conserva el valor aspectual perfecto del griego.
- source_word: ἐντελλόμενος
  english_pob_choice: commanding
  chosen_spanish: mandar
  alternatives_spanish:
  - ordenar
  - encargar
  lexicon: ἐντέλλομαι
  rationale: El participio presente indica que Simeón estaba dando instrucciones a sus hijos; «mandar» conserva la fuerza directiva del verbo sin volverlo excesivamente formal o eclesiástico.
- source_word: τοῖς υἱοῖς αὐτοῦ
  english_pob_choice: his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos
  lexicon: υἱός
  rationale: Aunque el griego dice literalmente «hijos», en español «hijos» comunica bien el referente familiar sin forzar una distinción de género que el contexto no exige explícitamente.
- source_word: ἐκοιμήθη
  english_pob_choice: he fell asleep
  chosen_spanish: durmió
  alternatives_spanish:
  - se durmió
  - falleció
  lexicon: κοιμάομαι
  rationale: La imagen eufemística de la muerte se conserva con un verbo idiomático en español. «Durmió» mantiene la metáfora bíblica y el tono sobrio del original mejor que una paráfrasis más explícita.
- source_word: μετὰ τῶν πατέρων αὐτοῦ
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres y antepasados
  lexicon: μετά + πατέρες
  rationale: En este contexto funerario, la expresión apunta a la muerte y reunión con los antepasados. «Con sus padres» reproduce la forma literal y el parentesco ancestral sin introducir una interpretación más amplia que el texto no dice de manera explícita.
- source_word: ὢν ἐτῶν ἑκατὸν εἴκοσι
  english_pob_choice: being one hundred and twenty years old
  chosen_spanish: siendo de ciento veinte años
  alternatives_spanish:
  - teniendo ciento veinte años
  - a la edad de ciento veinte años
  lexicon: ἔτη / ἐτῶν
  rationale: La construcción idiomática griega se vierte con una fórmula natural en español que conserva el dato de edad y el vínculo sintáctico con el participio temporal.
theological_decisions:
- issue: Eufemismo bíblico para la muerte
  english_pob_reading: he fell asleep with his fathers
  chosen_spanish_reading: durmió con sus padres
  alternative_spanish_readings:
  - falleció y fue reunido con sus padres
  - se durmió con sus padres
  rationale: Se mantiene la metáfora bíblica de la muerte en lugar de reemplazarla por una formulación explícita. Esto respeta el registro del texto y la lectura tradicional del eufemismo sin ocultar el sentido.
  doctrine_reference: Biblical euphemism for death; cf. uso de 'dormir' en contextos de muerte en la Escritura
- issue: Reunión con los antepasados
  english_pob_reading: with his fathers
  chosen_spanish_reading: con sus padres
  alternative_spanish_readings:
  - con sus antepasados
  - con sus padres y antepasados
  rationale: La expresión puede entenderse como pertenencia a la línea ancestral de los patriarcas. «Con sus padres» conserva la ambigüedad respetando el relieve funerario y genealógico del original.
  doctrine_reference: Ancestral gathering motif in Second Temple and biblical idiom
translation_notes:
  revision_awareness: 'La revisión inglesa reciente eliminó un marcador de nota al pie en ''sons'' y suavizó la redacción sin cambiar el sentido. La versión española sigue esa decisión: no añade nota en ''hijos'' y mantiene una frase natural y directa.'
  spanish_consistency_notes:
  - Se mantiene 'Simeón' como forma española del nombre propio.
  - Se conserva el tono sobrio y narrativo del cierre de una sección biográfica.
  - No se introduce 'Señor' ni terminología litúrgica no presente en el griego.
