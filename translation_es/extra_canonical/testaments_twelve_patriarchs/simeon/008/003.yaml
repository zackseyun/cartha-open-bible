  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: '*Τὰ γὰρ ὀστᾶ τοῦ Ἰωσὴφ ἐφύλαττον¹³ *οἱ Αἰγύπτιοι¹⁴ ἐν τοῖς μνήμασι¹⁵ τῶν βασιλέων¹⁶.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/008/003.yaml
  text: For the Egyptians were keeping Joseph’s bones in the tombs of the kings, so as to bring him up.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
    unchanged: false
    changes_summary: Tightened the wording for natural English and removed the unnecessary article before 'Joseph' while preserving the source meaning.
translation:
  language: es
  text: Porque los egipcios guardaban los huesos de José en los sepulcros de los reyes, para sacarlo de allí.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. “para subirlo”. El griego expresa el propósito con un verbo de movimiento hacia arriba; en español se vierte de manera más natural como “para sacarlo de allí”.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὰ γὰρ ὀστᾶ τοῦ Ἰωσὴφ
  english_pob_choice: Joseph’s bones
  chosen_spanish: los huesos de José
  alternatives_spanish:
  - los huesos de Joseph
  - los restos de José
  lexicon: ὀστέον
  rationale: Huesos reproduce de forma directa y natural el sustantivo griego ὀστᾶ. Mantengo José como forma española estándar del nombre bíblico. "Restos" sería más interpretativo y menos preciso para el término concreto del original.
- source_word: οἱ Αἰγύπτιοι
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - los egipcios
  lexicon: Αἰγύπτιοι
  rationale: Se traduce literalmente con el etnónimo común en español, sin necesidad de mayúsculas especiales en medio de la oración.
- source_word: ἐν τοῖς μνήμασι τῶν βασιλέων
  english_pob_choice: in the tombs of the kings
  chosen_spanish: en los sepulcros de los reyes
  alternatives_spanish:
  - en las tumbas de los reyes
  - en los sepulcros reales
  lexicon: μνῆμα / βασιλεύς
  rationale: '"Sepulcros" conserva el registro más solemne y bíblico de μνήμα, sin cambiar el sentido. "Tumbas" también sería posible, pero menos elevado. "Reales" comprimiría la estructura griega y perdería la relación explícita "de los reyes".'
theological_decisions:
- issue: Final purposive clause expressing intent to retrieve Joseph
  english_pob_reading: so as to bring him up
  chosen_spanish_reading: para sacarlo de allí
  alternative_spanish_readings:
  - para subirlo
  - con el fin de sacarlo
  rationale: 'El griego presenta una finalidad: mantener los huesos en los sepulcros de los reyes para luego sacarlos. En español, "para sacarlo de allí" expresa con claridad el propósito sin introducir una imagen extraña o forzada. "Subirlo" sería más literal pero menos natural y ambiguo en español.'
  doctrine_reference: No aplica; se trata de una nota de finalidad narrativa, no de un punto doctrinal.
translation_notes:
  revision_awareness: El texto inglés auditado fue ajustado desde “the bones of Joseph” a “Joseph’s bones” para mejorar la naturalidad. La versión española refleja esa misma relación posesiva de forma idiomática con “los huesos de José”, sin necesidad de un equivalente posesivo explícito.
  spanish_consistency_notes:
  - Se mantiene el nombre bíblico “José” de manera uniforme.
  - '"Sepulcros" se usa con valor reverente y coherente con el registro bíblico.'
  - La cláusula final se traduce como finalidad, no como simple secuencia narrativa.
