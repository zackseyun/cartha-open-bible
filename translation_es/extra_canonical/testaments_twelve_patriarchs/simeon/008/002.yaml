translation:
  language: es
  text: Y lo pusieron en un ataúd de madera, para llevar sus huesos a Hebrón. Y los llevaron en secreto en una guerra de los egipcios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θήκῃ ξυλίνῃ
  english_pob_choice: wooden coffin
  chosen_spanish: ataúd de madera
  alternatives_spanish:
  - cofre de madera
  - féretro de madera
  lexicon: θήκη; ξύλινος
  rationale: El griego indica un recipiente funerario de madera. «Ataúd» comunica de forma natural el objeto y conserva la referencia material; «féretro» sería posible, pero «ataúd» es más común y directo en español contemporáneo.
- source_word: τοῦ ἀναγαγεῖν τὰ ὀστᾶ αὐτοῦ ἐν Χεβρών
  english_pob_choice: to bring up his bones to Hebron
  chosen_spanish: para llevar sus huesos a Hebrón
  alternatives_spanish:
  - para subir sus huesos a Hebrón
  - para trasladar sus huesos a Hebrón
  lexicon: ἀναγάγω; ὀστέα
  rationale: «Llevar» expresa bien el movimiento de traslado sin sonar forzado; «subir» puede insinuar mejor el verbo griego, pero en español suena menos natural aquí. Se mantiene el destino Hebrón y el objeto literal «huesos».
- source_word: ἐν πολέμῳ Αἰγυπτίων
  english_pob_choice: in a war of the Egyptians
  chosen_spanish: durante una guerra de los egipcios
  alternatives_spanish:
  - en una guerra de los egipcios
  - en guerra con los egipcios
  lexicon: πόλεμος; Αἰγύπτιος
  rationale: La revisión inglesa fijó «in a war» frente a «during a war» para reflejar mejor ἐν πολέμῳ. En español, «durante una guerra» comunica el valor temporal implícito sin perder el sentido; «en una guerra» también es viable, pero algo menos fluido.
- source_word: κρυφῇ
  english_pob_choice: secretly
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - a escondidas
  lexicon: κρυφῇ
  rationale: «En secreto» conserva el adverbio de modo con registro digno y claro. «A escondidas» sería más coloquial; «secretamente» suena más técnico y menos natural.
theological_decisions:
- issue: Referencia funeraria y traslado de restos
  english_pob_reading: They placed him in a wooden coffin, to bring up his bones to Hebron.
  chosen_spanish_reading: Lo pusieron en un ataúd de madera para trasladar sus huesos a Hebrón.
  alternative_spanish_readings:
  - Lo sepultaron en un féretro de madera para llevar sus huesos a Hebrón.
  - Lo depositaron en un cofre de madera para subir sus huesos a Hebrón.
  rationale: Se conserva la escena de enterramiento/depósito funerario sin suavizarla ni convertirla en una formulación interpretativa. «Huesos» mantiene la referencia corporal concreta del texto.
  doctrine_reference: Narrativa patrimonial/funeraria sin carga doctrinal explícita
- issue: Contexto bélico de la extracción y traslado
  english_pob_reading: And they brought them up secretly in a war of the Egyptians.
  chosen_spanish_reading: Y los llevaron en secreto durante una guerra de los egipcios.
  alternative_spanish_readings:
  - Y los llevaron en secreto en una guerra de los egipcios.
  - Y los llevaron en secreto mientras había guerra entre los egipcios.
  rationale: Se preserva la ambigüedad del contexto bélico sin precisar más de lo que da el griego. No se introduce una relación causal o política adicional que el texto no explicita.
  doctrine_reference: Contexto histórico narrativo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrigió 'during a war' a 'in a war' para reflejar mejor ἐν πολέμῳ. La versión española opta por 'durante una guerra' como equivalente natural del valor contextual, sin añadir contenido no presente en el griego.
  spanish_consistency_notes:
  - Se mantuvo 'Hebrón' como forma estable del topónimo.
  - Se conservó 'huesos' en sentido literal, coherente con el griego ὀστᾶ.
  - No se introdujo terminología eclesiástica ajena al registro narrativo del pasaje.
