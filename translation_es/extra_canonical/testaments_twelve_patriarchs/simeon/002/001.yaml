translation:
  language: es
  text: Escuchen, hijos míos, Simeón, su padre, yo les declararé lo que tengo en mi corazón.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀκούσατε
  english_pob_choice: Hear
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Escuchen ustedes
  lexicon: ἀκούω
  rationale: El imperativo plural en español natural y reverente es «Escuchen»; conserva el llamado directo del original sin sonar arcaico. «Oigan» sería posible, pero aquí el discurso exhortativo y solemne favorece «Escuchen».
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - niños míos
  lexicon: τέκνον
  rationale: «Hijos míos» reproduce el vocativo afectivo y familiar con buena fluidez en español. «Niños» sería incorrecto por edad y tono; «mis hijos» es posible, pero «hijos míos» preserva mejor la carga retórica.
- source_word: Συμεὼν τοῦ πατρὸς ὑμῶν
  english_pob_choice: Simeon your father
  chosen_spanish: Simeón, su padre
  alternatives_spanish:
  - Simeón, el padre de ustedes
  - Simeón, vuestro padre
  lexicon: Συμεών; πατήρ
  rationale: 'La secuencia griega presenta una identificación directa: «Simeón, el padre de ustedes». En español, la coma ayuda a reflejar ese apóstrofe/identificación sin forzar la sintaxis. Se evita el posesivo arcaizante «vuestro» por estilo.'
- source_word: ἀναγγελῶ
  english_pob_choice: I will declare
  chosen_spanish: declararé
  alternatives_spanish:
  - anunciaré
  - les declararé
  lexicon: ἀναγγέλλω
  rationale: «Declararé» transmite bien el acto de comunicar solemnemente lo que sigue. «Anunciaré» también es viable, pero «declarar» mantiene el matiz de exposición verbal con mayor cercanía al inglés POB.
- source_word: ὅσα ἔχω ἐν τῇ καρδίᾳ μου
  english_pob_choice: what I have in my heart
  chosen_spanish: lo que tengo en mi corazón
  alternatives_spanish:
  - lo que guardo en mi corazón
  - lo que hay en mi corazón
  lexicon: καρδία
  rationale: «En mi corazón» conserva el centro interior de pensamiento, voluntad y sentimiento expresado por καρδία. «Lo que guardo» añadiría una imagen no explícita en el griego; «lo que hay» pierde la posesión personal del verbo ἔχω.
theological_decisions:
- issue: Relación entre el apelativo «hijos míos» y «Simeón, su padre» en una oración de discurso directo
  english_pob_reading: Hear, my children, Simeon your father, and I will declare to you what I have in my heart.
  chosen_spanish_reading: Escuchen, hijos míos; Simeón, su padre, y les declararé lo que tengo en mi corazón.
  alternative_spanish_readings:
  - 'Escuchen, hijos míos: Simeón, su padre, y les declararé...'
  - Escuchen, hijos míos; yo, Simeón, su padre, les declararé...
  rationale: El griego de esta línea es textualmente condensado y presenta una formulación algo abrupta. En español se preserva esa densidad sin añadir palabras que no están en el testimonio fuente. La coma y el punto y coma ayudan a mantener la identificación del hablante y el arranque de la declaración sin suavizar excesivamente la estructura.
  doctrine_reference: Principio de sobriedad textual; no añadir armonizaciones no atestiguadas.
translation_notes:
  revision_awareness: Se revisó el contexto fuente griego y el audit trail inglés; no hay notas previas ni revisiones aplicadas. Se conservó la estructura breve y algo abrupta del original, ajustándola solo para una sintaxis española publicable.
  spanish_consistency_notes:
  - Se usó «Simeón» como forma española del nombre griego Συμεών.
  - Se mantuvo «corazón» para καρδία por consistencia bíblica y porque el contexto interior es claro.
  - No se introdujo terminología cristológica ni teológica adicional; el versículo es un encabezado discursivo sencillo.
