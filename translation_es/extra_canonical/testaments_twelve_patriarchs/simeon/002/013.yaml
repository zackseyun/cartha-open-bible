id: T12P.SIM.2.13
reference: Testament of Simeon 2:13
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: Καὶ ἔγνων, τέκνα⁸², ὅτι *περὶ Ἰωσὴφ⁸³ *τοῦτό μοι συνέβη⁸⁴. καὶ⁸⁵ μετανοήσας ἔκλαυσα⁸⁶ καὶ⁸⁷ ηὐξάμην *Κυρίῳ τῷ Θεῷ⁸⁸ ἵνα⁸⁹ *ἀποκατασταθῇ ἡ χείρ μου⁹⁰ καὶ⁹¹ ἀποσχῶ⁹² ἀπὸ *παντὸς μολυσμοῦ καὶ φθόνου⁹³ Γκαὶ ἀπὸ πάσης ἀφροσύνης⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/002/013.yaml
  text: And I knew, my children, that this happened to me because of Joseph. And after repenting, I wept and prayed to the Lord God that my hand might be restored, and that I might abstain from every defilement and envy and from all foolishness.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:46Z'
    unchanged: false
    changes_summary: Replaced 'after changing my mind' with 'after repenting' to more naturally and accurately render μετανοήσας in this context; otherwise retained the draft.
translation:
  language: es
  text: Y supe, hijos míos, que esto me había sucedido por causa de José. Y, después de arrepentirme, lloré y oré al Señor Dios para que mi mano fuera restaurada, y para que me abstuviera de toda impureza, de la envidia y de toda insensatez.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔγνων
  english_pob_choice: I knew
  chosen_spanish: supe
  alternatives_spanish:
  - conocí
  - llegué a saber
  lexicon: γινώσκω
  rationale: El contexto es una toma de conciencia retrospectiva; «supe» comunica mejor el hallazgo de la causa sin sonar rígido en español.
- source_word: τέκνα
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijos míos, queridos hijos
  lexicon: τέκνα
  rationale: Se mantiene el vocativo afectivo y natural en español, con la relación paternal implícita por el género literario.
- source_word: μετανοήσας
  english_pob_choice: after repenting
  chosen_spanish: después de arrepentirme
  alternatives_spanish:
  - luego de cambiar de mente
  - después de hacer penitencia
  lexicon: μετανοέω
  rationale: La revisión inglesa ya fijó «repenting» como la mejor lectura contextual; en español «arrepentirme» conserva el giro moral y volitivo sin reducirlo a mera alteración intelectual.
- source_word: ἔκλαυσα
  english_pob_choice: I wept
  chosen_spanish: lloré
  alternatives_spanish:
  - lloré amargamente
  - derramé lágrimas
  lexicon: κλαίω
  rationale: «Lloré» es la forma directa y fiel para expresar el llanto penitencial del contexto.
- source_word: ηὐξάμην
  english_pob_choice: I prayed
  chosen_spanish: oré
  alternatives_spanish:
  - supliqué
  - hice oración
  lexicon: εὔχομαι
  rationale: «Oré» es claro, sobrio y compatible con el tono devocional del pasaje.
- source_word: Κυρίῳ τῷ Θεῷ
  english_pob_choice: to the Lord God
  chosen_spanish: al Señor Dios
  alternatives_spanish:
  - a Yahvé Dios
  - al Señor, Dios
  lexicon: κύριος / θεός
  rationale: El griego aquí no usa el Tetragrámaton sino κύριος; el inglés POB conserva «Lord God». En español, «Señor Dios» reproduce fielmente el título compuesto sin forzar una decisión de nombre divino donde el texto base no la explicita.
- source_word: ἀποκατασταθῇ ἡ χείρ μου
  english_pob_choice: that my hand might be restored
  chosen_spanish: para que mi mano fuera restaurada
  alternatives_spanish:
  - para que mi mano se restableciera
  - para que me sanaran la mano
  lexicon: ἀποκαθίστημι
  rationale: «Fuera restaurada» mantiene la pasiva y la idea de restitución/reintegración física, evitando añadir especificidad médica no presente en el griego.
- source_word: ἀποσχῶ ἀπὸ παντὸς μολυσμοῦ καὶ φθόνου
  english_pob_choice: that I might abstain from every defilement and envy
  chosen_spanish: para que me abstuviera de toda impureza y de la envidia
  alternatives_spanish:
  - para apartarme de toda contaminación y envidia
  - para abstenerme de toda inmundicia y envidia
  lexicon: μολυσμός / φθόνος
  rationale: «Impureza» comunica el campo semántico moral/ritual de μολυσμός en un español eclesial amplio; «envidia» conserva el término ordinario para φθόνος. Se mantiene el paralelismo con «abstenerse».
- source_word: πάσης ἀφροσύνης
  english_pob_choice: all foolishness
  chosen_spanish: toda insensatez
  alternatives_spanish:
  - toda necedad
  - toda locura
  lexicon: ἀφροσύνη
  rationale: «Insensatez» preserva el matiz de falta de juicio moral y prudencial sin cargar el texto con una connotación clínica o cómica.
theological_decisions:
- issue: 'Traducción de μετανοήσας: arrepentimiento moral frente a cambio mental neutro'
  english_pob_reading: after repenting
  chosen_spanish_reading: después de arrepentirme
  alternative_spanish_readings:
  - después de cambiar de mente
  - después de convertirme
  rationale: La lectura revisada del POB inglés ya decide que el contexto demanda «repenting». En español, «arrepentirme» mantiene el sentido de dolor moral y giro de conducta que acompaña al llanto y la oración.
  doctrine_reference: Arrepentimiento bíblico; metanoia como giro moral y volitivo, no solo cognitivo.
- issue: Tratamiento del título divino Κυρίῳ τῷ Θεῷ
  english_pob_reading: to the Lord God
  chosen_spanish_reading: al Señor Dios
  alternative_spanish_readings:
  - a Yahvé Dios
  - al Señor, Dios
  rationale: Aunque la política del proyecto favorece «Yahvé» para יהוה, aquí el texto griego ofrece κύριος sin un marcador directo del nombre divino hebreo. Por fidelidad al testimonio griego y al audit trail inglés, se conserva el título compuesto tradicional en español.
  doctrine_reference: Nombre divino / títulos divinos en traducción; distinción entre nombre propio y título.
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa, que sustituyó «changing my mind» por «repenting» para μετανοήσας. No se detectaron notas de pie de página en el POB inglés para este versículo, así que no se introdujeron marcadores en el texto español.
  spanish_consistency_notes:
  - Se mantuvo el tono testimonial en primera persona singular con vocativo directo («hijos míos»).
  - 'Se preservó la secuencia narrativa causal: conocimiento → arrepentimiento → llanto y oración → petición de restauración → propósito ético.'
  - Se evitó «SEÑOR» en mayúsculas como convención de sustitución; aquí se usa «Señor» como título compuesto normal en español.
  - 'Se prefirió vocabulario moral claro y ampliamente comprensible: «arrepentirme», «impureza», «envidia», «insensatez».'
