  text: Καὶ *ὁ Ῥουβὶμ ἀκούσας ταῦτα⁶⁴ ἐλυπήθη⁶⁵. ἤθελε⁶⁶ γὰρ αὐτὸν⁶⁷ ἀπαγαγεῖν⁶⁸ πρὸς τὸν πατέρα⁶⁹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/002/010.yaml
  text: And Reuben, hearing these things, was grieved, for he wanted to bring him safely back to his father.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:45Z'
    unchanged: false
    changes_summary: Removed 'when' for a more direct rendering of the participle, changed 'our father' to 'his father' to match the Greek, and adjusted word order slightly for more natural formal English.
translation:
  language: es
  text: Y Rubén, al oír estas cosas, se entristeció, porque quería llevarlo sano y salvo de regreso a su padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ Ῥουβὶμ
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Ruben
  lexicon: nombre propio
  rationale: Se conserva el nombre bíblico en su forma castellana habitual y plenamente reconocible.
- source_word: ἀκούσας ταῦτα
  english_pob_choice: hearing these things
  chosen_spanish: al oír estas cosas
  alternatives_spanish:
  - cuando oyó estas cosas
  - oyendo estas cosas
  lexicon: participio aoristo de ἀκούω
  rationale: El participio se vierte de modo natural como circunstancial temporal en español, manteniendo la inmediatez del original sin añadir una subordinación más pesada de lo necesario.
- source_word: ἐλυπήθη
  english_pob_choice: was grieved
  chosen_spanish: se entristeció
  alternatives_spanish:
  - fue afligido
  - se dolió
  lexicon: aoristo pasivo de λυπέω con sentido resultativo
  rationale: En español, 'se entristeció' comunica bien la pena interior del sujeto y evita una pasiva forzada, conservando la fuerza afectiva del verbo griego.
- source_word: ἤθελε
  english_pob_choice: he wanted
  chosen_spanish: quería
  alternatives_spanish:
  - deseaba
  - quería llevar
  lexicon: imperfecto de θέλω
  rationale: El imperfecto expresa una disposición continuada o intención; 'quería' es la forma más sobria y fiel en español.
- source_word: ἀπαγαγεῖν
  english_pob_choice: to bring him safely back
  chosen_spanish: llevarlo sano y salvo de regreso
  alternatives_spanish:
  - devolverlo sano y salvo
  - traerlo de vuelta sano y salvo
  lexicon: infinitivo de ἀπάγω
  rationale: El verbo griego aquí apunta a conducir de vuelta; 'llevarlo de regreso' preserva ese movimiento sin forzar 'traer', que en español depende del punto de vista. 'Sano y salvo' refleja el matiz de seguridad presente en la traducción inglesa auditada.
- source_word: πρὸς τὸν πατέρα
  english_pob_choice: to his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - ante su padre
  - para su padre
  lexicon: preposición πρός + acusativo
  rationale: La construcción de dirección se expresa naturalmente con 'a su padre'. Se adopta 'su' porque el griego tiene el artículo con valor definido referido al padre de Rubén, y la revisión inglesa ya corrigió 'our' por 'his'.
theological_decisions:
- issue: Referencia al padre de Rubén
  english_pob_reading: his father
  chosen_spanish_reading: a su padre
  alternative_spanish_readings:
  - a nuestro padre
  - al padre
  rationale: Se sigue el ajuste del audit trail que corrigió 'our father' a 'his father', porque el griego dice simplemente 'al padre' con referencia contextual al propio padre de Rubén, no a un colectivo.
  doctrine_reference: Fidelidad referencial al antecedente inmediato en el texto griego
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó 'when' para representar más directamente el participio, y corrigió 'our father' por 'his father' para concordar con el griego. La versión española refleja ambos ajustes con una estructura participial natural ('al oír') y el posesivo singular ('su padre').
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y transparente, sin inflar el texto con explicaciones ausentes en el griego.
  - '''sano y salvo'' se usa como equivalente idiomático de seguridad en el retorno, sin añadir una afirmación extra sobre el modo del traslado.'
  - No se introduce 'Cristo', 'Señor' ni otras fórmulas ajenas al versículo.
  - Se preserva el sujeto explícito 'Y Rubén' para claridad narrativa en español.
