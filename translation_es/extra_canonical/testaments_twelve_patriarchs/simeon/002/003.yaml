source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: '*Δυνατὸς γὰρ ἐγενόμην¹¹ σφόδρα οὐκ ἐδειλίασα¹² πρᾶξιν¹³ οὐδὲ ἐφοβήθην *ἀπὸ παντὸς πράγματος¹⁴.'
