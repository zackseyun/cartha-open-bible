translation:
  language: es
  text: Pero su Dios y el Dios de nuestros padres envió a su ángel y lo rescató de mis manos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ θεὸς αὐτοῦ
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - Dios de él
  - el Dios de él
  lexicon: θεός
  rationale: Conservo la relación posesiva directa del griego sin añadir explicaciones; en español, «su Dios» es natural y mantiene la referencia personal.
- source_word: ὁ θεὸς τῶν πατέρων ἡμῶν
  english_pob_choice: the God of our fathers
  chosen_spanish: el Dios de nuestros padres
  alternatives_spanish:
  - el Dios de nuestros antepasados
  - el Dios de nuestros padres anteriores
  lexicon: θεός
  rationale: Mantengo la fórmula bíblica tradicional y transparente, que en español comunica bien la continuidad pactual e histórica del genitivo.
- source_word: ἀπέστειλε
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - mandó enviar
  lexicon: ἀποστέλλω
  rationale: «Envió» reproduce de forma directa el acto de enviar sin sobrecargar el verbo con matices adicionales.
- source_word: τὸν ἄγγελον αὐτοῦ
  english_pob_choice: his angel
  chosen_spanish: a su ángel
  alternatives_spanish:
  - su ángel
  lexicon: ἄγγελος
  rationale: El acusativo con objeto directo se expresa naturalmente en español como «a su ángel»; conserva la referencia al mensajero divino sin interpretar más allá del texto.
- source_word: ἐρρύσατο
  english_pob_choice: rescued
  chosen_spanish: lo rescató
  alternatives_spanish:
  - lo libró
  - lo salvó
  lexicon: ῥύομαι
  rationale: «Rescató» conserva el sentido de liberación efectiva del peligro, cercano al inglés auditado y claro en español moderno.
- source_word: ἐκ τῶν χειρῶν μου
  english_pob_choice: from my hands
  chosen_spanish: de mis manos
  alternatives_spanish:
  - de mis manos,
  - de mi poder
  lexicon: χείρ
  rationale: Sigo la imagen corporal del original; en español «de mis manos» preserva la expresión concreta de control y agresión.
theological_decisions:
- issue: Identidad del agente divino que actúa en favor del destinatario
  english_pob_reading: But his God and the God of our fathers sent his angel and rescued him from my hands.
  chosen_spanish_reading: Pero su Dios y el Dios de nuestros padres envió a su ángel y lo rescató de mis manos.
  alternative_spanish_readings:
  - Pero Dios, su Dios y el Dios de nuestros padres, envió a su ángel y lo rescató de mis manos.
  - Pero su Dios, el Dios de nuestros padres, envió a su ángel y lo rescató de mis manos.
  rationale: Conservo la doble mención de Dios tal como está en el griego, porque refuerza tanto la relación personal como la continuidad con los patriarcas. No fusiono las dos expresiones para no borrar la repetición enfática del texto.
  doctrine_reference: Continuidad del Dios de Israel con los patriarcas; providencia y liberación divina.
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada coinciden sustancialmente; no hay revisiones aplicadas en el historial reciente. La única atención traductológica es preservar la doble designación de Dios y la imagen concreta de «las manos» sin suavizarla.
  spanish_consistency_notes:
  - Uso «Dios» para θεός y mantengo la fórmula «el Dios de nuestros padres» como expresión bíblica estable.
  - Uso «ángel» para ἄγγελον sin añadir mayúsculas ni interpretaciones específicas no presentes en el texto.
  - Uso «rescató» para ἐρρύσατο por su fuerza de liberación, evitando una paráfrasis más débil.
