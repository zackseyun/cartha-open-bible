translation:
  language: es
  text: Pero cuando oí esto, me airé mucho contra Judá, porque había dejado ir vivo a aquel; y durante cinco meses permanecí airado con él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὠργίσθην
  english_pob_choice: I was very angry
  chosen_spanish: me airé mucho
  alternatives_spanish:
  - me enojé mucho
  - me enfurecí mucho
  lexicon: ὀργίζομαι
  rationale: El griego expresa un estado de ira intensa; «me airé mucho» conserva el carácter fuerte sin sonar innecesariamente moderno o demasiado coloquial.
- source_word: ἐπὶ τὸν Ἰούδαν
  english_pob_choice: with Judah
  chosen_spanish: contra Judá
  alternatives_spanish:
  - con Judá
  - para con Judá
  lexicon: ἐπί + acusativo
  rationale: La construcción con ἐπί y acusativo aquí marca dirección/hostilidad del enojo hacia Judá; «contra» refleja mejor esa fuerza que un simple «con».
- source_word: ζῶντα αὐτὸν ἀπέλυσεν
  english_pob_choice: he had let him go alive
  chosen_spanish: había dejado ir vivo a aquel
  alternatives_spanish:
  - lo había dejado ir con vida
  - lo había soltado vivo
  lexicon: ζῶντα ... ἀπολύω
  rationale: «Dejar ir vivo» sigue de cerca el sentido del griego y del inglés POB, mientras «aquel» evita añadir identificación no explícita en el segmento.
- source_word: μῆνας πέντε
  english_pob_choice: for five months
  chosen_spanish: durante cinco meses
  alternatives_spanish:
  - por cinco meses
  - cinco meses
  lexicon: μῆνας πέντε
  rationale: «Durante» expresa duración continua de forma natural en español y preserva el valor temporal del original.
- source_word: ὀργιζόμενος ἐπʼ αὐτῷ
  english_pob_choice: remained angry with him
  chosen_spanish: permanecí airado con él
  alternatives_spanish:
  - seguí airado con él
  - estuve enojado con él
  lexicon: ὀργίζομαι + ἐπί
  rationale: El participio presente describe un estado sostenido; «permanecí airado» conserva la continuidad temporal y la referencia relacional de ἐπʼ αὐτῷ.
theological_decisions:
- issue: Intensidad y dirección de la ira fraterna
  english_pob_reading: I was very angry with Judah
  chosen_spanish_reading: me airé mucho contra Judá
  alternative_spanish_readings:
  - me enojé mucho con Judá
  - me enfurecí contra Judá
  rationale: 'No hay atenuación moral en el texto: el hablante declara una ira fuerte y prolongada. La preposición «contra» hace visible la hostilidad implícita en la construcción griega.'
  doctrine_reference: Ninguna doctrina específica; fidelidad narrativa al afecto expresado.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; este borrador sigue la lectura estable del texto griego y coincide sustancialmente con la traducción inglesa auditada, ajustando solo la formulación española para reflejar con naturalidad la fuerza de ἐπὶ + acusativo y del participio durativo.
  spanish_consistency_notes:
  - Se mantiene «Judá» para Ἰούδας, conforme al uso bíblico en español.
  - Se usa «airado» como equivalente formal de ira intensa, evitando un registro demasiado coloquial.
  - No se añaden notas textuales porque el pasaje presentado no incluye variantes auditadas en el paquete dado.
