  glossary_alignment: No hay términos de glosario mayor implicados. «Judá» es correcto para Ἰούδαν. La representación de ὀργίζομαι como «enojé/airado» mantiene el campo semántico de ira. No hay conflicto con terminología teológica del proyecto.
