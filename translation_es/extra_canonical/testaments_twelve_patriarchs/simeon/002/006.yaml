base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/002/006.yaml
  text: For in the time of my youth I was very jealous of Joseph, because my father loved him above all.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:43Z'
    unchanged: false
    changes_summary: Changed 'But' to 'For' to reflect Ἐν γὰρ more accurately; retained the rest as natural and complete.
translation:
  language: es
  text: Pues, en el tiempo de mi juventud, tuve gran celo de José, porque mi padre lo amaba más que a todos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐν γὰρ τῷ καιρῷ τῆς νεότητός μου
  english_pob_choice: For in the time of my youth
  chosen_spanish: Pues, en el tiempo de mi juventud
  alternatives_spanish:
  - Porque en el tiempo de mi juventud
  - Pues en mi juventud
  lexicon: γὰρ
  rationale: Ἐν γὰρ introduce una explicación o causa, por lo que «Pues» conserva mejor el valor discursivo que un simple «Pero». «En el tiempo de mi juventud» se mantiene de forma natural y fiel al marco temporal.
- source_word: ἐζήλωσα
  english_pob_choice: I was very jealous
  chosen_spanish: tuve gran celo
  alternatives_spanish:
  - sentí gran envidia
  - estuve muy celoso
  lexicon: ζηλόω
  rationale: El verbo puede expresar celo, envidia o celo celoso según el contexto. Aquí, por tratarse de rivalidad afectiva por el favor paterno, «tuve gran celo» conserva la tensión semántica sin reducirla a una mera emoción moderna. El POB inglés eligió «jealous», y el español «celo» permite reflejar ese campo léxico con sobriedad.
- source_word: τὸν Ἰωσήφ
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: Ἰωσήφ
  rationale: 'Nombre propio bíblico estándar en español: «José».'
- source_word: ἠγάπα
  english_pob_choice: loved
  chosen_spanish: amaba
  alternatives_spanish:
  - quería
  - estimaba
  lexicon: ἀγαπάω
  rationale: «Amaba» reproduce bien el amor preferencial del padre sin introducir una matización demasiado afectiva o coloquial.
- source_word: ὁ πατήρ μου ... παρὰ πάντας
  english_pob_choice: my father loved him above all
  chosen_spanish: mi padre lo amaba más que a todos
  alternatives_spanish:
  - mi padre lo amaba sobre todos
  - mi padre lo amaba por encima de todos
  lexicon: παρὰ + acusativo
  rationale: La construcción comparativa se vierte de manera natural como «más que a todos», manteniendo la idea de preferencia superior del padre.
theological_decisions:
- issue: Preferencia paterna y rivalidad fraterna
  english_pob_reading: my father loved him above all
  chosen_spanish_reading: mi padre lo amaba más que a todos
  alternative_spanish_readings:
  - mi padre lo amaba sobre todos
  - mi padre lo amaba por encima de todos
  rationale: No se suaviza la preferencia explícita del padre; el español conserva la desigualdad afectiva que explica el celo de Simeón.
  doctrine_reference: Narrative theology of partiality within the patriarchal family (cf. Genesis 37:3-4).
translation_notes:
  revision_awareness: El texto inglés revisado cambió «But» por «For» para reflejar mejor Ἐν γὰρ; por eso la apertura española sigue una relación causal/explicativa con «Pues», no una adversativa. No se añadieron notas porque el griego y el inglés no presentan variantes textuales o tensiones que requieran marcarse en español.
  spanish_consistency_notes:
  - Se mantiene «José» como forma estándar del nombre bíblico.
  - Se evita «Cristo», «SEÑOR» u այլ terminología no pertinente al pasaje.
  - «Tuve gran celo» preserva el campo semántico de ζηλόω sin forzar una lectura exclusivamente moral ni emocional.
