base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/002/005.yaml
  text: For courage also is given by the Most High to men in soul and body.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:43Z'
    unchanged: false
    changes_summary: Removed the second 'in' before 'body' for more natural English while preserving the Greek sense; otherwise retained the draft's wording.
translation:
  language: es
  text: Porque también el valor[a] se da por el Altísimo a los hombres en el alma y en el cuerpo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: o ‘coraje’
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡ ἀνδρεία
  english_pob_choice: courage
  chosen_spanish: valor
  alternatives_spanish:
  - coraje
  - valentía
  - ánimo
  lexicon: ἀνδρεία
  rationale: En griego, ἀνδρεία puede abarcar valentía, coraje o fortaleza varonil. Dado el contexto ético y la forma breve del dicho, 'valor' comunica bien la disposición firme y no introduce un matiz demasiado técnico o masculino en español.
- source_word: ἀπὸ ὑψίστου
  english_pob_choice: by the Most High
  chosen_spanish: por el Altísimo
  alternatives_spanish:
  - del Altísimo
  - de parte del Altísimo
  lexicon: ὕψιστος
  rationale: '''Por el Altísimo'' conserva el agente de la pasiva (''es dado'') de manera natural en español y mantiene el título reverente usado para Dios sin necesidad de parafrasear.'
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: to men
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a las personas
  - a los seres humanos
  lexicon: ἄνθρωπος
  rationale: El griego usa un sustantivo humano general. 'A los hombres' sigue la forma tradicional y directa del texto; 'personas' suavizaría el masculino genérico, pero el contexto no exige esa adaptación.
- source_word: ἐν ψυχαῖς καὶ σώμασιν
  english_pob_choice: in soul and body
  chosen_spanish: en el alma y en el cuerpo
  alternatives_spanish:
  - en alma y cuerpo
  - en las almas y los cuerpos
  lexicon: ψυχή / σῶμα
  rationale: Se conserva la distinción antropológica del griego con 'alma' y 'cuerpo'. El artículo singular en español hace la frase más idiomática sin perder la distribución de sentido.
theological_decisions:
- issue: Fuente del valor humano
  english_pob_reading: For courage also is given by the Most High
  chosen_spanish_reading: Porque también el valor se da por el Altísimo
  alternative_spanish_readings:
  - Porque también el coraje se da por el Altísimo
  - Porque también la valentía se da por el Altísimo
  rationale: La pasiva divina del griego atribuye el don al Altísimo. La redacción española mantiene esa agencia teológica sin añadir explicaciones sobre el modo del don.
  doctrine_reference: Providencia divina / dones de Dios al ser humano
- issue: Alcance antropológico de 'soul and body'
  english_pob_reading: in soul and body
  chosen_spanish_reading: en el alma y en el cuerpo
  alternative_spanish_readings:
  - en alma y cuerpo
  - en el alma y cuerpo
  rationale: 'La fórmula conserva la tensión antropológica del original: el rasgo dado por Dios afecta tanto la dimensión interior como la corporal, sin resolver filosóficamente la relación entre ambas.'
  doctrine_reference: Antropología bíblica
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó un segundo ''in'' antes de ''body'' por naturalidad, pero no cambió el sentido. La redacción española evita esa repetición mediante una sola preposición compartida: ''en el alma y en el cuerpo''.'
  spanish_consistency_notes:
  - Se mantiene 'Altísimo' para ὕψιστος según la terminología del proyecto.
  - Se usa 'alma' y 'cuerpo' de manera coordinada para reflejar ψυχαῖς καὶ σώμασιν sin sobreinterpretar el antropologismo del texto.
  - '''Valor'' se eligió como término principal por su amplitud semántica y fluidez en español; la nota conserva la alternativa cercana ''coraje''.'
