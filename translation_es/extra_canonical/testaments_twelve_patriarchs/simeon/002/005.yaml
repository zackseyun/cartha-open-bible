  text: '*Ἐπειδὴ καὶ¹⁷ ἡ ἀνδρεία¹⁸ ἀπὸ¹⁹ ὑψίστου δίδοται²⁰ τοῖς²¹ ἀνθρώποις ἐν ψυχαῖς καὶ²² σώμασιν.'
