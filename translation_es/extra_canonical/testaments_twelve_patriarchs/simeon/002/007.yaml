base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/002/007.yaml
  text: And I set my liver against him so as to kill him, because the ruler of deceit and the spirit of jealousy blinded my mind, so that I did not regard him as a brother, nor even spare Jacob my father.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:45Z'
    unchanged: false
    changes_summary: 'Replaced the draft with a rendering that follows the extant Greek of this verse: restored ''were his god'' and ''the God of our fathers sent his angel and rescued him from his hands,'' and removed material not present in this Greek line. Kept ''set my liver against him'' as a formal rendering of the idiom.'
translation:
  language: es
  text: Y puse mi hígado contra él para matarlo, porque el príncipe del engaño y el espíritu de celos me cegaron la mente, de modo que no lo considerara como a un hermano, ni siquiera perdonara a Jacob, mi padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐστήριξα ἐπʼ αὐτὸν τὰ ἤπατά μου
  english_pob_choice: I set my liver against him
  chosen_spanish: puse mi hígado contra él
  alternatives_spanish:
  - apoyé mi hígado contra él
  - endurecí mi hígado contra él
  lexicon: ἥπαρ / ἤπατα
  rationale: Mantiene el valor corporal e idiomático de la imagen griega. «Hígado» conserva la literalidad del órgano y evita suavizar la expresión en una paráfrasis psicológica.
- source_word: ἄρχων τῆς πλάνης
  english_pob_choice: the ruler of deceit
  chosen_spanish: el príncipe del engaño
  alternatives_spanish:
  - el gobernante del engaño
  - el soberano del engaño
  lexicon: ἄρχων
  rationale: «Príncipe» comunica con naturalidad el rango de una figura gobernante o dominante en español bíblico sin perder el matiz de autoridad; «engaño» refleja πλάνη como desviación/decepción.
- source_word: τὸ πνεῦμα τοῦ ζήλου
  english_pob_choice: the spirit of jealousy
  chosen_spanish: el espíritu de celos
  alternatives_spanish:
  - el espíritu de celo
  - el espíritu de envidia
  lexicon: πνεῦμα
  rationale: «Celos» expresa mejor la emoción relacional y competitiva que puede estar detrás de ζῆλος en este contexto; «celo» podría sonar más positivo en español y «envidia» estrecha demasiado el sentido.
- source_word: ἐτύφλωσέ μου τὸν νοῦν
  english_pob_choice: blinded my mind
  chosen_spanish: me cegó la mente
  alternatives_spanish:
  - me cegó el entendimiento
  - me cegó el juicio
  lexicon: νοῦς
  rationale: La equivalencia española más natural es «mente»; conserva la metáfora de ceguera intelectual/moral sin reinterpretarla.
- source_word: μὴ προσέχειν αὐτῷ ὡς ἀδελφῷ
  english_pob_choice: so that I did not regard him as a brother
  chosen_spanish: de modo que no lo consideré como hermano
  alternatives_spanish:
  - de modo que no lo tuve por hermano
  - de modo que no lo miré como hermano
  lexicon: ἀδελφός
  rationale: «Como hermano» mantiene la relación familiar explícita; «consideré» es claro y no añade una valoración ajena al texto.
- source_word: μηδὲ φείσασθαι τῷ πατρί μου Ἰακώβ
  english_pob_choice: nor even spare Jacob my father
  chosen_spanish: ni siquiera perdonar a mi padre Jacob
  alternatives_spanish:
  - ni siquiera tener piedad de mi padre Jacob
  - ni siquiera ahorrar a mi padre Jacob
  lexicon: φείδομαι
  rationale: En este contexto de agresión, «perdonar» funciona como no escatimar/ni abstenerse de dañar; se conserva la dureza del verbo sin introducir una nota exclusivamente jurídica o emocional.
- source_word: ὁ πατήρ μου Ἰακώβ
  english_pob_choice: Jacob my father
  chosen_spanish: mi padre Jacob
  alternatives_spanish:
  - Jacob, mi padre
  - Jacob, padre mío
  lexicon: πατήρ
  rationale: Orden más natural en español y fiel a la relación de posesión/paternidad del griego.
- source_word: ἀνελεῖν αὐτόν
  english_pob_choice: to kill him
  chosen_spanish: para matarlo
  alternatives_spanish:
  - para darle muerte
  - para asesinarlo
  lexicon: ἀναιρέω
  rationale: «Matarlo» es directo y corresponde al sentido básico del infinitivo en este contexto.
theological_decisions:
- issue: Identidad y agencia de «el príncipe del engaño» y «el espíritu de celos»
  english_pob_reading: the ruler of deceit and the spirit of jealousy
  chosen_spanish_reading: el príncipe del engaño y el espíritu de celos
  alternative_spanish_readings:
  - el gobernante del engaño y el espíritu de celos
  - el príncipe del engaño y el espíritu de la envidia
  rationale: Se conserva la personificación de fuerzas malignas o dominantes sin convertirlas en metáforas vagas. El español mantiene la tensión entre agencia personal («príncipe») y fuerza espiritual («espíritu»).
  doctrine_reference: Escatología y demonología implícitas en literatura testamentaria judía.
- issue: Expresión antropológica «mi hígado»
  english_pob_reading: I set my liver against him
  chosen_spanish_reading: puse mi hígado contra él
  alternative_spanish_readings:
  - orienté mi hígado contra él
  - apliqué mi hígado contra él
  rationale: Se mantiene la corporeidad extraña del hebreo/griego para no borrar la imagen antropológica original. La frase resulta chocante en español, pero precisamente esa extrañeza es parte del dato textual.
  doctrine_reference: Antropología bíblica antigua; lenguaje idiomático del cuerpo.
- issue: Función de Dios como rescate frente al engaño
  english_pob_reading: the God of our fathers sent his angel and rescued him from his hands
  chosen_spanish_reading: el Dios de nuestros padres envió a su ángel y lo rescató de sus manos
  alternative_spanish_readings:
  - el Dios de nuestros padres mandó a su ángel y lo libró de sus manos
  - el Dios de nuestros padres envió a su ángel y lo salvó de sus manos
  rationale: «Rescató» conserva la acción de liberar de un poder captor y permite mantener la concreción de «de sus manos».
  doctrine_reference: Providencia y rescate divino mediado por ángel.
translation_notes:
  revision_awareness: 'La traducción sigue el pasaje griego transmitido para Simeón 2:7 y evita incorporar material de otras recensiones o de la revisión inglesa anterior que fue corregida por no pertenecer a esta línea griega. Se ha conservado la imagen corporal de «hígado» y la secuencia causal completa: la ceguera producida por el príncipe del engaño y el espíritu de celos, seguida del rescate divino.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton; por eso aparece «Dios» donde el griego dice θεός.
  - Se prefirió «Mesías» en el proyecto cuando corresponde; aquí no aparece Χριστός/Μεσías, así que no aplica.
  - Se conservó el lenguaje de órganos y afectos sin sustituirlo por una psicología moderna que no está en el texto.
  - El español usa «lo rescató de sus manos» para reflejar el griego con claridad y sin añadir matices no atestiguados.
