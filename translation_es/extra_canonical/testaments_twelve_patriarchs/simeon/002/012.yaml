source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: Καίγε συνετρίβει με *ὁ Κύριος⁷⁸ καὶ ἐκώλυσεν δράσιν⁷⁹ *ἀπʼ ἐμοῦ⁸⁰. *ὅτι ἡ χείρ μου ἡ δεξιὰ ἡμίξηρος γέγονεν ἐπὶ ἡμέρας ἑπτά⁸¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/002/012.yaml
  text: And the Lord crushed me and held back action from me, for my right hand became half-withered for seven days.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
    unchanged: false
    changes_summary: Adjusted the tense to match the Greek imperfect, rendered ἐνεπόδισέ με as 'hindered me' and ἀφείλετο τὴν ἐνέργειαν τῶν χειρῶν μου as 'took away the power of my hands.' Also included the final clause about the right hand becoming half-dead, which was missing from the draft.
translation:
  language: es
  text: Yahvé me quebrantó y me impidió actuar, porque mi mano derecha quedó semiseca durante siete días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Soberano
  lexicon: κύριος
  rationale: En este corpus, la referencia al Señor responde al nombre divino; la política del proyecto pide usar «Yahvé» en lugar de un ocultamiento genérico como «el Señor». Esto conserva la identidad divina implícita en el griego y evita perder la conexión con el nombre propio del Dios de Israel.
- source_word: συνετρίβει
  english_pob_choice: crushed me
  chosen_spanish: me quebrantó
  alternatives_spanish:
  - me aplastó
  - me destrozó
  lexicon: συντρίβω
  rationale: El verbo expresa una acción fuerte de quebrantar/romper; «me quebrantó» comunica bien la intensidad sin introducir una imagen corporal más específica que el griego no exige.
- source_word: ἐκώλυσεν δράσιν ἀπʼ ἐμοῦ
  english_pob_choice: held back action from me
  chosen_spanish: impidió mi acción
  alternatives_spanish:
  - retuvo mi acción
  - me estorbó para actuar
  - impidió obrar
  lexicon: κωλύω
  rationale: El griego habla de impedir la acción, y el español «impidió mi acción» preserva ese sentido de freno a la capacidad de actuar. Se evita una paráfrasis más interpretativa como «me quitó el poder de mis manos», aunque esa idea aparece en la tradición auditada en otras revisiones.
- source_word: ἡ χείρ μου ἡ δεξιὰ
  english_pob_choice: my right hand
  chosen_spanish: mi mano derecha
  alternatives_spanish:
  - mi diestra
  - mi mano diestra
  lexicon: χείρ / δεξιός
  rationale: «Mi mano derecha» es natural y fiel; «diestra» es posible, pero suena más marcado/tradicional. Se mantiene el sentido anatómico directo del griego.
- source_word: ἡμίξηρος
  english_pob_choice: half-withered
  chosen_spanish: medio seca
  alternatives_spanish:
  - medio marchita
  - medio lisiada
  - medio seca y marchita
  lexicon: ἡμίξηρος
  rationale: El adjetivo describe un estado de semisequedad o marchitez parcial. «Medio seca» reproduce la imagen de forma transparente y sin ampliar el sentido hacia discapacidad física distinta. Se conserva la tensión lexicál entre una lesión/atrofia y una marchitez literal.
- source_word: ἐπὶ ἡμέρας ἑπτά
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - por siete días seguidos
  lexicon: ἐπί + acusativo de tiempo
  rationale: «Por siete días» es idiomático en español y conserva la duración indicada por el griego.
theological_decisions:
- issue: 'Quién actúa sobre el narrador: la disciplina divina en el pasaje'
  english_pob_reading: And the Lord crushed me and held back action from me
  chosen_spanish_reading: Yahvé me quebrantó e impidió mi acción
  alternative_spanish_readings:
  - Yahvé me aplastó y frenó mi acción
  - Yahvé me quebrantó y me retuvo de actuar
  rationale: El texto atribuye la limitación al acto soberano de Yahvé. Se mantiene una formulación sobria que no diluye la agencia divina ni añade interpretación moral explícita. La frase conserva el paralelismo entre quebrantar e impedir la acción.
  doctrine_reference: Providencia / disciplina divina
translation_notes:
  revision_awareness: 'Se siguió el último ajuste registrado: el imperfecto griego se reflejó con una acción pasada simple en español de lectura natural, y se incorporó la cláusula final sobre la mano derecha medio seca durante siete días. La redacción evita la versión anterior que hablaba de cinco meses y del poder de las manos, porque no corresponde al texto griego provisto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para ὁ Κύριος conforme a la terminología del proyecto.
  - '«Me quebrantó» y «impidió mi acción» preservan dos acciones distintas del griego: daño/ruptura y obstaculización.'
  - No se introdujo «Cristo», «Señor» o notas explicativas adicionales porque el texto breve no las requiere.
  - La imagen corporal final se tradujo con sobriedad («medio seca») para no perder la metáfora de ἡμίξηρος.
