id: T12P.SIM.2.14
reference: Testament of Simeon 2:14
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: Ἔγνων⁹⁴ γὰρ ὅτι πονηρὸν πρᾶγμα ἐνεθυμήθην ἐνώπιον κυρίου⁹⁵ καὶ⁹⁶ *Ἰακὼβ τοῦ πατρός μου⁹⁷ *διὰ Ἰωσὴφ⁹⁸ *τὸν ἀδελφόν μου, φθονήσας αὐτῷ⁹⁹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/002/014.yaml
  text: For I knew that I had conceived an evil deed before the Lord and Jacob my father concerning Joseph my brother, being envious of him.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:47Z'
    unchanged: false
    changes_summary: Changed 'devised' to 'conceived' to better reflect ἐνεθυμήθην, removed 'against' since it is not in the Greek, changed 'thing' to 'deed' for πρᾶγμα, and rendered φθονήσας αὐτῷ more naturally as 'being envious of him.'
translation:
  language: es
  text: Porque supe que había concebido una mala acción delante de Yahvé y de Jacob, mi padre, respecto de José, mi hermano, siendo envidioso de él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐνεθυμήθην
  english_pob_choice: had conceived
  chosen_spanish: había concebido
  alternatives_spanish:
  - había pensado
  - había ideado
  - había tramado
  lexicon: ἐνθυμέομαι
  rationale: Mantiene la idea de un acto gestado en el interior; en español, 'concebir' refleja mejor la formación mental o moral previa que 'idear' o 'tramitar', y sigue el ajuste del POB inglés al evitar 'devised'.
- source_word: πρᾶγμα
  english_pob_choice: deed
  chosen_spanish: acción
  alternatives_spanish:
  - hecho
  - acto
  - cosa
  lexicon: πρᾶγμα
  rationale: '''Acción'' comunica mejor en español una conducta concreta y moralmente evaluada. ''Cosa'' sería demasiado vago y ''deed'' en español literal podría sonar forzado o arcaico.'
- source_word: ἐνώπιον κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante el Señor
  - en presencia de Yahvé
  lexicon: ἐνώπιον + κύριος
  rationale: Se conserva la referencia al Nombre divino como 'Yahvé' según la norma del proyecto, y 'delante de' reproduce bien el valor relacional/judicial de la expresión.
- source_word: Ἰακὼβ τοῦ πατρός μου
  english_pob_choice: Jacob my father
  chosen_spanish: de Jacob, mi padre
  alternatives_spanish:
  - de Jacob, mi padre
  - y de Jacob, mi padre
  lexicon: Ἰακώβ + genitivo de relación
  rationale: Se evita añadir 'contra', ya que el griego no lo dice. 'De Jacob, mi padre' preserva la relación posesiva/paterna de manera natural en español.
- source_word: διὰ Ἰωσὴφ τὸν ἀδελφόν μου
  english_pob_choice: concerning Joseph my brother
  chosen_spanish: respecto de José, mi hermano
  alternatives_spanish:
  - acerca de José, mi hermano
  - por causa de José, mi hermano
  lexicon: διά + acusativo
  rationale: '''Respecto de'' sigue el sentido referencial del contexto sin introducir una causalidad más fuerte que la del texto. ''Por causa de'' sería más interpretativo.'
- source_word: φθονήσας αὐτῷ
  english_pob_choice: being envious of him
  chosen_spanish: siendo envidioso de él
  alternatives_spanish:
  - teniendo envidia de él
  - envidiándolo
  - estando celoso de él
  lexicon: φθονέω
  rationale: '''Siendo envidioso de él'' conserva el participio y la fuerza moral del verbo. Se evita ''celoso'' por su posible ambigüedad y ''envidiándolo'' por ser menos explícito sobre el estado descrito.'
theological_decisions:
- issue: Referencia a la divinidad con κύριος
  english_pob_reading: before the Lord
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - ante el Señor
  - delante del Señor
  rationale: El proyecto exige traducir el Nombre divino como 'Yahvé' cuando el contexto griego usa κύριος en una alusión al Nombre. Aquí no se trata de una simple fórmula de reverencia, sino de una referencia directa al Señor divino en el marco del testimonio moral de Simeón.
  doctrine_reference: Nombre divino / Tetragrámaton
- issue: Culpa moral interna expresada por ἐνεθυμήθην + πρᾶγμα
  english_pob_reading: had conceived an evil deed
  chosen_spanish_reading: había concebido una mala acción
  alternative_spanish_readings:
  - había concebido un mal hecho
  - había tramado una mala acción
  rationale: La combinación apunta a la gestación interior de una conducta mala, no solo a un pensamiento abstracto. 'Mala acción' mantiene la valoración ética sin intensificar indebidamente a 'crimen' o 'delito'.
  doctrine_reference: pecado interior y responsabilidad moral
translation_notes:
  revision_awareness: Se siguió el pasaje revisado del inglés POB, evitando el antiguo 'devised' y la inserción no griega de 'against'. También se mantuvo el matiz de 'conceived' y de 'being envious of him' sin añadir interpretaciones causales ajenas al texto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para κύριος cuando refiere al Nombre divino.
  - Se mantiene 'José' como forma española de Ἰωσήφ.
  - No se añadieron notas al pie porque no se requirió una alternativa textual distinta ni una ambigüedad española que necesitara anclaje explícito.
