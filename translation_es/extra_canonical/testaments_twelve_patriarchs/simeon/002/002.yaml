    changes_summary: Added commas to clarify apposition and improve natural English; retained the draft wording as lexically accurate and complete.
translation:
  language: es
  text: Yo nací de Jacob, el segundo hijo para mi padre, y Lea, mi madre, me llamó Simeón, porque el Señor escuchó su petición.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐγὼ ἐγεννήθην ἐξ Ἰακώβ
  english_pob_choice: I was born from Jacob
  chosen_spanish: Yo nací de Jacob
  alternatives_spanish:
  - Yo fui engendrado de Jacob
  - Nací de Jacob
  lexicon: γεννάω
  rationale: El griego usa pasivo de γεννάω con ἐκ/ἐξ, que aquí expresa procedencia genealógica. En español, «nací de Jacob» conserva la relación de origen de forma natural y no añade tecnicismo innecesario.
- source_word: υἱὸς δεύτερος τῷ πατρὶ μου
  english_pob_choice: the second son to my father
  chosen_spanish: el segundo hijo para mi padre
  alternatives_spanish:
  - el segundo hijo de mi padre
  - como segundo hijo para mi padre
  lexicon: υἱός / δεύτερος
  rationale: Se mantiene la apposición aclaratoria del texto griego y la lectura auditada en inglés. «Para mi padre» refleja bien el dativo relacional del griego, aunque «de mi padre» también sería posible en español.
- source_word: Λία ἡ μήτηρ μου ἐκάλεσέ με Συμεώνα
  english_pob_choice: Leah my mother called me Simeon
  chosen_spanish: Lea, mi madre, me llamó Simeón
  alternatives_spanish:
  - Lea mi madre me llamó Simeón
  - Lea, mi madre, me nombró Simeón
  lexicon: καλέω
  rationale: «Llamó» es el equivalente más directo de ἐκάλεσεν y conserva el hecho nominal. Se usa la forma española «Simeón» como nombre propio tradicional y transparente.
- source_word: ὅτι ἤκουσε Κύριος τῆς δεήσεως αὐτῆς
  english_pob_choice: because the Lord heard her petition
  chosen_spanish: porque el Señor escuchó su petición
  alternatives_spanish:
  - porque el Señor oyó su petición
  - porque Yahvé escuchó su petición
  lexicon: Κύριος / δέησις / ἀκούω
  rationale: El inglés POB conserva «the Lord» para Κύριος, y aquí se mantiene «el Señor» porque el pasaje alude al título divino tal como aparece en la tradición textual griega. «Escuchó» traduce bien ἤκουσε y «petición» expresa δέησις con un registro natural y reverente.
theological_decisions:
- issue: Tratamiento de Κύριος en una tradición griega que puede reflejar el nombre divino
  english_pob_reading: the Lord heard her petition
  chosen_spanish_reading: el Señor escuchó su petición
  alternative_spanish_readings:
  - Yahvé escuchó su petición
  rationale: Aunque el proyecto prefiere «Yahvé» para יהוה, en este testimonio griego el término explícito es Κύριος y el POB inglés también lee «Lord». Por eso se conserva «el Señor» en el cuerpo principal para no afirmar más de lo que el texto griego presente permite directamente.
  doctrine_reference: Uso del título divino en textos griegos que aluden al nombre de Dios; distinción entre nombre y título
translation_notes:
  revision_awareness: La revisión inglesa reciente solo ajustó la puntuación para clarificar la apposición («the second son to my father»). La versión española refleja esa misma relación con comas y una estructura igualmente clara, sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se mantiene el orden natural del español con una apposición equivalente a la del griego y del inglés auditado.
  - Se conserva «Señor» para Κύριος en consonancia con la lectura inglesa y con la forma explícita del texto griego.
  - «Simeón» sigue la forma española estándar del nombre, sin transliteración artificial.
  - No se añaden notas textuales porque el pasaje y el audit trail no presentan variantes relevantes para esta línea.
