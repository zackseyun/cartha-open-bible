translation:
  language: es
  text: Porque mi corazón era duro, y mi hígado inmóvil, y mis entrañas sin compasión.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἡ γὰρ καρδία μου
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi corazón
  lexicon: καρδία
  rationale: Corazón es el equivalente natural y fiel para καρδία; conserva el centro interior de afecto y voluntad que el POB refleja en inglés.
- source_word: ἦν σκληρά
  english_pob_choice: was hard
  chosen_spanish: era duro
  alternatives_spanish:
  - estaba endurecido
  - era duro
  lexicon: σκληρός
  rationale: Duro expresa la dureza moral/afectiva del original sin añadir una explicación interpretativa que el texto no da.
- source_word: τὰ ἤπατά μου
  english_pob_choice: my liver
  chosen_spanish: mi hígado
  alternatives_spanish:
  - mi hígado
  lexicon: ἧπαρ
  rationale: Se conserva la referencia corporal concreta del griego. Aunque suene extraña, es parte del lenguaje antropológico del texto y no debe normalizarse a 'corazón' o 'interior'.
- source_word: ἀκίνητα
  english_pob_choice: unmoved
  chosen_spanish: inmóvil
  alternatives_spanish:
  - sin moverse
  - inmóvil
  lexicon: ἀκίνητος
  rationale: Inmóvil comunica el estado de falta de movimiento o conmoción de forma directa y natural en español.
- source_word: τὰ σπλάγχνα μου
  english_pob_choice: my inward parts
  chosen_spanish: mis entrañas
  alternatives_spanish:
  - mis entrañas
  - mis partes internas
  lexicon: σπλάγχνα
  rationale: Entrañas mantiene la imagen visceral del original y el valor afectivo de σπλάγχνα; es más fiel que una abstracción como 'interior'.
- source_word: ἀσυμπαθῆ
  english_pob_choice: without compassion
  chosen_spanish: sin compasión
  alternatives_spanish:
  - sin compasión
  - despiadadas
  lexicon: ἀσυμπαθής
  rationale: Sin compasión reproduce el negado de sentimiento del griego y conserva la conexión con la falta de misericordia del interior humano.
theological_decisions:
- issue: Antropología poética de órganos internos
  english_pob_reading: heart, liver, inward parts
  chosen_spanish_reading: corazón, hígado, entrañas
  alternative_spanish_readings:
  - corazón, interior, entrañas
  - corazón, vísceras, entrañas
  rationale: El texto enumera órganos/partes internas concretas para describir dureza afectiva y moral. Se conserva la literalidad corporal para no borrar la imaginería antigua.
  doctrine_reference: Antropología bíblica y lenguaje figurado corporal
translation_notes:
  revision_awareness: Sigue el pasaje griego directamente y coincide con el audit trail inglés de alta concordancia; no se introdujeron revisiones posteriores.
  spanish_consistency_notes:
  - Se mantiene 'corazón' como centro interior y 'entrañas' para σπλάγχνα, evitando términos más interpretativos.
  - '''Hígado'' se conserva por fidelidad al griego y para reflejar la imaginería corporal singular del texto.'
