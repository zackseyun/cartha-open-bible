  text: Ὡς γὰρ⁴⁷ ἐγὼ ἐπορεύθην⁴⁸ *ἐν Σικίμοις⁴⁹ ἐνέγκαι⁵⁰ ἄλειμμα⁵¹ τοῖς ποιμνίοις⁵² καὶ Ῥουβὶμ⁵³ εἰς⁵⁴ Δοθαείμ⁵⁵, ὅπου⁵⁶ τὰ ἐγχρῄζοντα⁵⁷ ἡμῖν⁵⁸ καὶ πᾶσα⁵⁹ ἡ ἀπόθεσις ἦν⁶⁰, Ἰούδας⁶¹ ὁ ἀδελφός μου⁶² ἐπώλησεν αὐτὸν⁶³ ἐλθὼν τοῖς Ἰσμαηλίταις.
