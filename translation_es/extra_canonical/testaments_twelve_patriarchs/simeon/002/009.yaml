translation:
  language: es
  text: Porque cuando yo fui a Siquem a llevar ungüento para nuestros rebaños, y Rubén fue a Dotán, donde estaban nuestras provisiones y todas nuestras reservas, Judá, mi hermano, lo vendió a los ismaelitas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Σικίμοις
  english_pob_choice: Shechem
  chosen_spanish: Siquem
  alternatives_spanish:
  - Siquén
  lexicon: topónimo bíblico
  rationale: Siquem es la forma bíblica estable y transparente en español; conserva la referencia geográfica del griego y del inglés POB sin introducir una grafía menos reconocible.
- source_word: ἄλειμμα
  english_pob_choice: ointment
  chosen_spanish: ungüento
  alternatives_spanish:
  - aceite perfumado
  - pomada
  lexicon: léxico de ungüentos / sustancias aplicadas externamente
  rationale: Ungüento expresa bien el valor medicinal o untuoso de ἄλειμμα en español bíblico y no restringe indebidamente el sentido.
- source_word: ποιμνίοις
  english_pob_choice: flocks
  chosen_spanish: rebaños
  alternatives_spanish:
  - ganados
  - manadas
  lexicon: léxico pastoril
  rationale: Rebaños es el equivalente natural y exacto en español para ποιμνίοις en contexto pastoril.
- source_word: Δοθαείμ
  english_pob_choice: Dothan
  chosen_spanish: Dotán
  alternatives_spanish:
  - Dotán
  - Dotaim
  lexicon: topónimo bíblico
  rationale: Dotán es la forma consagrada y clara en español para el topónimo bíblico Δοθαείμ, manteniendo la identificación tradicional del lugar.
- source_word: ἐγχρῄζοντα
  english_pob_choice: supplies
  chosen_spanish: provisiones
  alternatives_spanish:
  - necesidades
  - abastecimientos
  lexicon: léxico de abastecimiento / necesidad
  rationale: Provisiones refleja bien los bienes almacenados o disponibles para sustento; en este contexto encaja con la noción de suministros domésticos o del campamento.
- source_word: ἀπόθεσις
  english_pob_choice: stores
  chosen_spanish: depósitos
  alternatives_spanish:
  - reservas
  - almacenes
  - acopios
  lexicon: léxico de almacenamiento
  rationale: Depósitos conserva la idea de cosas guardadas/almacenadas y evita la ambigüedad de 'tiendas' o 'existencias'. En plural, expresa el acopio disponible en el lugar.
- source_word: Ἰσμαηλίταις
  english_pob_choice: Ishmaelites
  chosen_spanish: ismaelitas
  alternatives_spanish:
  - ismaelitas
  lexicon: etnónimo bíblico
  rationale: Ismaelitas es el etnónimo directo y normal en español bíblico para Ἰσμαηλίταις.
theological_decisions:
- issue: Venta de José por Judá a los ismaelitas
  english_pob_reading: Judah my brother sold him to the Ishmaelites.
  chosen_spanish_reading: Judá, mi hermano, lo vendió a los ismaelitas.
  alternative_spanish_readings:
  - Judá, mi hermano, lo vendió a los ismaelitas
  - Judá, mi hermano, vendió a él a los ismaelitas
  rationale: Se mantiene la afirmación directa del griego y del inglés POB sin suavizar la culpa ni alterar el sujeto/agente. El pronombre 'lo' preserva la referencia a la persona vendida, implícita en el contexto inmediato.
  doctrine_reference: Relato patriarcal; responsabilidad moral humana en la traición y venta de José.
translation_notes:
  revision_awareness: La versión inglesa auditada aparece marcada como unchanged en la última pasada de revisión; por tanto, el borrador español sigue de cerca el sentido ya estabilizado del POB inglés y del griego de Charles 1908, sin necesidad de incorporar variantes textuales ni notas de revisión.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'Siquem' y 'Dotán' como topónimos bíblicos estándar en español.
  - '''Ungüento'' y ''provisiones'' conservan el campo semántico concreto del suministro para los rebaños y la casa/campamento.'
  - No se introduce 'Cristo', 'SEÑOR' ni otras sustituciones no presentes en el texto fuente.
