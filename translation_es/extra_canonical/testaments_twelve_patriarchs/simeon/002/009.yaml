base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/002/009.yaml
  text: For when I went to Shechem to bring ointment for our flocks, and Reuben to Dothan, where our supplies and all our stores were, Judah my brother sold him to the Ishmaelites.
  revision_pass:
