- from: '1 He aquí, os he dicho todo, para que yo sea justificado[a] de vuestro pecado. 2 Pero si quitáis de vosotros la envidia y toda dureza de corazón, mis huesos florecerán como una rosa en Israel, y mi carne como un lirio en Jacob; y mi fragancia será como la fragancia del Líbano. Los santos se multiplicarán de mí por siempre jamás, y sus ramas se extenderán lejos.


    3 Entonces perecerá la descendencia de Canaán, y no quedará remanente en Amalec; todos los capadocios perecerán, y todos los heteos serán completamente destruidos. 4 Entonces la tierra de Cam[b] dejará de existir, y todo pueblo perecerá. Entonces toda la tierra cesará del tumulto, y todo lo que está bajo el cielo de la guerra.


