translation:
  language: es
  text: '1 He aquí, os he dicho todo, para que yo sea justificado[a] de vuestro pecado. 2 Pero si quitáis de vosotros la envidia y toda dureza de corazón, mis huesos florecerán como una rosa en Israel, y mi carne como un lirio en Jacob; y mi fragancia será como la fragancia del Líbano. Los consagrados se multiplicarán de mí por siempre jamás, y sus ramas se extenderán lejos.


    3 Entonces perecerá la descendencia de Canaán, y no quedará remanente en Amalec; todos los Capadocios perecerán, y todos los heteos serán completamente destruidos. 4 Entonces la tierra de Cam[b] desaparecerá, y todo pueblo perecerá. Entonces toda la tierra cesará del tumulto, y todo lo que está bajo el cielo cesará de la guerra.


    5 Entonces una gran señal[c] será glorificada para Israel, porque el Señor Dios, apareciendo en la tierra, vendrá y salvará a Adán[d] en él.[e] 6 Entonces todos los espíritus del engaño serán entregados para ser pisoteados, y los hombres gobernarán sobre los espíritus malos. 7 Entonces yo también me levantaré con alegría, y bendeciré al Altísimo por sus maravillas.[f]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «para que yo sea vindicado» o «para que yo sea eximido de culpa»; el griego conserva un matiz forense.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «la tierra de Cam».
    reason: source_note
  - marker: c
    text: 'Algunos testigos leen aquí: «Sem» o «Set», en lugar de «una gran señal».'
    reason: textual_variant
  - marker: d
    text: «Adán» puede entenderse representativamente como la humanidad, pero el griego nombra explícitamente a Adán.
    reason: lexical_alternative
  - marker: e
    text: Algunos testigos añaden «como hombre» después de «apareciendo en la tierra»; probablemente es una expansión posterior y no se incluye en el texto principal.
    reason: textual_variant
  - marker: f
    text: 'Algunos testigos añaden: «porque Dios, habiendo tomado un cuerpo y comido con los hombres, salvó a los hombres». Como aparece como expansión entre corchetes en la fuente, no se incluye en el texto principal.'
    reason: textual_variant
lexical_decisions:
- source_word: δικαιωθῶ
  english_pob_choice: I may be justified
  chosen_spanish: yo sea justificado
  alternatives_spanish:
  - yo sea vindicado
  - yo sea eximido
  lexicon: BDAG
  rationale: En este contexto testamentario, Simeón declara que advirtió completamente a sus hijos para no cargar con la culpa de su pecado. En español, 'sea justificado' conserva el matiz forense de la línea inglesa revisada, sin perder la fuerza de exoneración implícita.
- source_word: φθόνον
  english_pob_choice: envy
  chosen_spanish: la envidia
  alternatives_spanish:
  - los celos
  lexicon: BDAG
  rationale: El término central del pasaje y del tema de Simeón es la envidia destructiva; 'envidia' es la opción más estable y precisa en español.
- source_word: σκληροκαρδίαν
  english_pob_choice: hardness of heart
  chosen_spanish: dureza de corazón
  alternatives_spanish:
  - endurecimiento del corazón
  - corazón endurecido
  lexicon: BDAG
  rationale: La expresión es transparente y bíblicamente reconocible en español. Mantiene la condición moral interior sin suavizarla.
- source_word: ἀνθήσει
  english_pob_choice: will blossom
  chosen_spanish: florecerán
  alternatives_spanish:
  - brotarán
  - florecerán como
  lexicon: LSJ
  rationale: El verbo poético pide una imagen vegetal clara. 'Florecerán' conserva la metáfora sin sobreinterpretarla.
- source_word: ὀστᾶ μου
  english_pob_choice: my bones
  chosen_spanish: mis huesos
  alternatives_spanish:
  - mis restos
  lexicon: BDAG
  rationale: Se conserva el lenguaje corporal concreto del griego y el paralelismo con 'mi carne'.
- source_word: σάρξ μου
  english_pob_choice: my flesh
  chosen_spanish: mi carne
  alternatives_spanish:
  - mi cuerpo
  lexicon: BDAG
  rationale: La pareja 'huesos / carne' funciona como paralelo literal; 'carne' preserva la imaginería original y el ritmo del pasaje.
- source_word: ἅγιοι
  english_pob_choice: holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos de Dios
  - los consagrados
  lexicon: BDAG
  rationale: Aunque 'santos' puede sonar eclesial, aquí resulta idiomático y natural en español; sigue siendo suficientemente amplio para los descendientes o personas consagradas que el texto pueda evocar.
- source_word: κλάδοι
  english_pob_choice: branches
  chosen_spanish: ramas
  alternatives_spanish:
  - renuevos
  - vástagos
  lexicon: LSJ
  rationale: La metáfora botánica se mantiene en español con 'ramas', que deja abierta la referencia figurada a descendencia sin explicarla en exceso.
- source_word: ἐκλείψει
  english_pob_choice: will fail
  chosen_spanish: dejará de existir
  alternatives_spanish:
  - fallará
  - desaparecerá
  lexicon: LSJ
  rationale: Para 'la tierra de Cam', 'dejará de existir' comunica la idea de cese o desaparición de manera más natural que un calco literal.
- source_word: ταραχῆς
  english_pob_choice: turmoil
  chosen_spanish: tumulto
  alternatives_spanish:
  - agitación
  - confusión
  lexicon: BDAG
  rationale: '''Tumulto'' transmite desorden público y convulsión general, encajando con el paralelismo de guerra en la línea siguiente.'
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: signo
  alternatives_spanish:
  - señal
  - marca
  lexicon: BDAG
  rationale: Se conserva la ambigüedad revelatoria del término griego. 'Signo' suena solemne y evita cerrar la lectura hacia 'señal' o 'maravilla'.
- source_word: ἐνδοξασθήσεται
  english_pob_choice: will be glorified
  chosen_spanish: será glorificado
  alternatives_spanish:
  - será hecho glorioso
  - será honrado
  lexicon: BDAG
  rationale: El pasivo mantiene el registro profético elevado y corresponde bien al español bíblico.
- source_word: φαινόμενος ἐπὶ τῆς γῆς
  english_pob_choice: appearing on the earth
  chosen_spanish: apareciendo en la tierra
  alternatives_spanish:
  - manifestándose en la tierra
  - apareciendo sobre la tierra
  lexicon: BDAG
  rationale: La frase se vierte de manera directa para preservar el sentido epifánico sin expandirlo.
- source_word: σώζων ἐν αὐτῷ τὸν Ἀδάμ
  english_pob_choice: save Adam in him
  chosen_spanish: salvará a Adán en él
  alternatives_spanish:
  - salvará a Adán por medio de él
  - salvará a la humanidad en él
  lexicon: BDAG
  rationale: Se mantiene 'Adán' como nombre propio, porque el griego lo expresa explícitamente. 'En él' conserva la dificultad del original sin resolverla interpretativamente.
- source_word: πνεύματα τῆς πλάνης
  english_pob_choice: spirits of deceit
  chosen_spanish: espíritus del engaño
  alternatives_spanish:
  - espíritus del error
  - espíritus engañadores
  lexicon: BDAG
  rationale: En este contexto apocalíptico-moral, 'engaño' destaca la acción de seducir y desviar, equivalente natural de la opción inglesa.
- source_word: εἰς καταπάτησιν
  english_pob_choice: to be trampled down
  chosen_spanish: para ser pisoteados
  alternatives_spanish:
  - para ser aplastados
  - para ser hollados
  lexicon: LSJ
  rationale: '''Pisoteados'' conserva la imagen violenta de sometimiento con un verbo natural en español.'
- source_word: βασιλεύσουσιν
  english_pob_choice: will rule over
  chosen_spanish: gobernarán sobre
  alternatives_spanish:
  - reinarán sobre
  lexicon: BDAG
  rationale: '''Gobernarán sobre'' suena más natural en español moderno y conserva claramente la idea de dominio.'
- source_word: ἀναστησόμαι
  english_pob_choice: will arise
  chosen_spanish: me levantaré
  alternatives_spanish:
  - resucitaré
  - me alzaré
  lexicon: BDAG
  rationale: La forma puede sugerir resurrección o levantarse; 'me levantaré' preserva esa ambigüedad con una expresión idiomática y sobria.
- source_word: εὐφροσύνῃ
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: BDAG
  rationale: '''Alegría'' es clara y digna en español; mantiene el tono celebrativo del original.'
- source_word: θαυμασίοις
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - prodigios
  - obras maravillosas
  lexicon: BDAG
  rationale: '''Maravillas'' comunica bien el tono doxológico y evita una paráfrasis excesiva.'
theological_decisions:
- issue: Forma textual de la cláusula del versículo 5
  english_pob_reading: Then a great sign will be glorified for Israel, because the Lord God, appearing on the earth, will come and save Adam in him.
  chosen_spanish_reading: Entonces un gran signo será glorificado para Israel, porque el Señor Dios, apareciendo en la tierra, vendrá y salvará a Adán en él.
  alternative_spanish_readings:
  - Entonces será glorificado Set para Israel...
  - Entonces será glorificado Sem para Israel...
  rationale: La base griega normalizada aquí lee σημεῖον, por lo que la traducción principal sigue 'signo'. Las otras tradiciones atestiguadas en el aparato no se incorporan al cuerpo, sino que quedan reconocidas como variantes textuales. Esto preserva la transparencia sin forzar una armonización.
  doctrine_reference: Mantener la variante textual visible; no resolverla dogmáticamente en la traducción principal.
- issue: Phrasing of the divine manifestation in verse 5
  english_pob_reading: the Lord God, appearing on the earth
  chosen_spanish_reading: el Señor Dios, apareciendo en la tierra
  alternative_spanish_readings:
  - el Señor Dios, manifestándose en la tierra
  - el Señor Dios, que aparecerá en la tierra
  rationale: Se conserva el carácter epifánico de la frase sin añadir 'como hombre' al texto principal. La expansión entre corchetes en el testimonio inglés se trata como variante, no como parte del texto base.
  doctrine_reference: Transparencia frente a expansiones cristológicas o interpretativas secundarias.
- issue: Meaning of 'Adam' in verse 5
  english_pob_reading: save Adam in him
  chosen_spanish_reading: salvará a Adán en él
  alternative_spanish_readings:
  - salvará a la humanidad en él
  - salvará al hombre en él
  rationale: El griego nombra explícitamente a Adán; por tanto, se conserva el nombre propio. Aunque el término pueda tener valor representativo, no se borra esa concreción en la redacción principal.
  doctrine_reference: Primacía del dato del original sobre la generalización interpretativa.
- issue: Bracketed expansion in verse 7
  english_pob_reading: '[for God, having taken a body and eaten with men, saved men]'
  chosen_spanish_reading: se omite del texto principal y se registra como variante textual
  alternative_spanish_readings:
  - porque Dios, habiendo tomado un cuerpo y comido con los hombres, salvó a los hombres
  rationale: El testimonio fuente marca esta cláusula como expansión entre corchetes. Por transparencia textual, se excluye del cuerpo principal y no se integra silenciosamente a la línea final.
  doctrine_reference: Evitar incorporar una expansión textual discutida al texto corriente.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada en 2026-04-23 para acercar δικαιωθῶ a 'I may be justified' y para reflejar con más precisión ἐν τῷ ᾿Αμαλήκ. La redacción española sigue esa revisión, conservando el valor forense de δικαιωθῶ con 'sea justificado' y la localización de Amalec con 'en Amalec' en la lectura principal del verso 3.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparece el Tetragrámaton; aquí el griego dice Κύριος, por eso se traduce 'el Señor Dios' en línea con el inglés auditado.
  - Se conserva 'Adán' como nombre propio, no como 'humanidad', para respetar la forma explícita del griego.
  - '''Santos'' se usa para ἅγιοι por ser natural en español; no se sustituye por ''santos'' con sentido confesional estrecho, sino como término amplio de personas santas/consagradas.'
  - Se evita incorporar la expansión bracketed de versículo 7 al texto principal y se señala solo como variante textual.
  - '''Huesos'' y ''carne'' se mantienen en paralelo para conservar la imaginería corporal del pasaje.'
