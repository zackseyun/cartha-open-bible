base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/006.yaml
  text: '1 Behold[6:5], I have told you everything, so that I may be justified from your sin. 2 But if you remove from yourselves envy and every hardness of heart, my bones will blossom like a rose in Israel, and my flesh like a lily in Jacob; and my fragrance will be like the fragrance of Lebanon. Holy ones will be multiplied from me forever and ever, and their branches will extend far away.


    3 Then the seed of Canaan will perish[6:5], and no remnant will remain in Amalek; all the Cappadocians will perish, and all the Hittites will be utterly destroyed. 4 Then the land of Ham will fail, and every people will perish. Then all the earth will cease from turmoil, and all that is under heaven from war.


    5 Then a great sign will be glorified for Israel, because the Lord God, appearing on the earth, will come and save Adam in him. 6 Then all the spirits of deceit will be given over to be trampled down, and men will rule over the evil spirits. 7 Then I also will arise in gladness[6:7][6:5], and I will bless the Most High for his wonders.'
  footnotes:
  - marker: '6:5'
    text: Textually complex verse. Some witnesses read 'Then Shem will be glorified,' others 'Then Seth will be glorified,' instead of 'a great sign will be glorified.'
    reason: textual_variant
  - marker: '6:5'
    text: Some witnesses add 'as a man' after 'will appear on the earth.' This is likely a later expansion and is not included in the main text.
    reason: textual_variant
  - marker: '6:5'
    text: '''Adam'' may be understood representatively as humankind, but the Greek names Adam explicitly.'
    reason: lexical_alternative
  - marker: '6:7'
    text: 'Some witnesses add: ''for God, having taken a body and eaten with men, saved men.'' Because this appears as a bracketed expansion in the source, it is not included in the main text.'
    reason: textual_variant
