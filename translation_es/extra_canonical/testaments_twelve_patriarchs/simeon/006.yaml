  revision_rationale: 'La revisión corrige una omisión gramatical seria en el v. 4, añade las notas textuales y léxicas que el rastro inglés exige, y ajusta algunas elecciones españolas para mayor fidelidad y naturalidad: «señal» por «signo», «los consagrados» por «los santos», «desaparecerá» por «dejará de existir», y capitalización de «Capadocios». También se reclasifica la nota sobre δικαιωθῶ como alternativa léxica, no variante textual.'
