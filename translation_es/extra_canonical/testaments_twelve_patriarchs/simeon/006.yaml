  to: '1 He aquí, os he dicho todo, para que yo sea justificado[a] de vuestro pecado. 2 Pero si quitáis de vosotros la envidia y toda dureza de corazón, mis huesos florecerán como una rosa en Israel, y mi carne como un lirio en Jacob; y mi fragancia será como la fragancia del Líbano. Los consagrados se multiplicarán de mí por siempre jamás, y sus ramas se extenderán lejos.


    3 Entonces perecerá la descendencia de Canaán, y no quedará remanente en Amalec; todos los Capadocios perecerán, y todos los heteos serán completamente destruidos. 4 Entonces la tierra de Cam[b] desaparecerá, y todo pueblo perecerá. Entonces toda la tierra cesará del tumulto, y todo lo que está bajo el cielo cesará de la guerra.


    5 Entonces una gran señal[c] será glorificada para Israel, porque el Señor Dios, apareciendo en la tierra, vendrá y salvará a Adán[d] en él.[e] 6 Entonces todos los espíritus del engaño serán entregados para ser pisoteados, y los hombres gobernarán sobre los espíritus malos. 7 Entonces yo también me levantaré con alegría, y bendeciré al Altísimo por sus maravillas.[f]'
  rationale: 'La revisión corrige una omisión gramatical seria en el v. 4, añade las notas textuales y léxicas que el rastro inglés exige, y ajusta algunas elecciones españolas para mayor fidelidad y naturalidad: «señal» por «signo», «los consagrados» por «los santos», «desaparecerá» por «dejará de existir», y capitalización de «Capadocios». También se reclasifica la nota sobre δικαιωθῶ como alternativa léxica, no variante textual.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-08T03:06:56Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del griego y del rastro auditado en inglés, pero omite dos notas textuales importantes del v. 5 y usa algunas soluciones españolas menos fieles o menos naturales que conviene ajustar. Los puntos principales: δικαιωθῶ está aceptablemente como «sea justificado», aunque la nota actual lo trata como variante textual cuando en realidad es alternativa léxica; ἅγιοι se ha eclesializado como «los santos», mejor «los consagrados» o «los santos» con cautela, pero aquí el inglés documenta evitar asociaciones posteriores; ἐκλείψει para «la tierra de Cam» está demasiado fuerte en «dejará de existir»; y en 4b falta el verbo en español («y todo lo que está bajo el cielo de la guerra»). Además, el v. 5 en el español carece de la nota sobre «Adán» como posible referencia representativa a la humanidad y de la nota sobre la expansión «como hombre»; el v. 7 también carece de la nota sobre la expansión entre corchetes.'
  spanish_quality_summary: 'La lectura es en general clara y digna, pero presenta varios detalles mejorables: «signo» suena menos bíblico y natural que «señal» para σημεῖον; «dejará de existir» suena más absoluto que el griego; «los capadocios» debería capitalizarse como etnónimo; y la segunda mitad del v. 4 queda gramaticalmente incompleta. «Apareciendo en la tierra» es posible, pero «apareciendo sobre la tierra» o «manifestándose en la tierra» puede sonar mejor; aun así, se puede mantener. La propuesta revisada mejora fidelidad y fluidez sin sobreinterpretar.'
  glossary_alignment: No hay conflicto mayor con el glosario del proyecto salvo que «Señor Dios» no activa aquí la preferencia por «Yahvé», porque la fuente griega tiene κύριος θεός y el rastro inglés ya documenta la fórmula textual compleja. Sí conviene alinear mejor ἅγιοι con una opción menos cargada eclesiásticamente que «los santos». Se preserva «Adán», «carne», «espíritus», «Altísimo» y el registro profético.
  issues:
  - severity: high
    issue: 'El v. 4 está incompleto en español: «y todo lo que está bajo el cielo de la guerra».'
    rationale: 'El griego tiene un segundo miembro elíptico pero con sentido verbal claro: «[cesará] de guerra». El español necesita repetir o suplir el verbo: «y todo lo que está bajo el cielo [cesará] de la guerra» o mejor «y todo lo que está bajo el cielo, de la guerra»; la forma más natural es repetir «cesará».'
  - severity: high
    issue: Faltan notas textuales importantes heredadas del audit trail inglés para el v. 5 y v. 7.
    rationale: El inglés conserva variantes sobre «como hombre», sobre «Adán» como posible referencia representativa a la humanidad, y sobre la expansión bracketed del v. 7. El español solo incluye la variante «Sem/Set», por lo que pierde transparencia textual requerida por el proyecto.
  - severity: medium
    issue: La nota [a] clasifica una alternativa léxica como variante textual.
    rationale: «Vindicado/eximido» no es una variante de manuscritos sino una alternativa de traducción para δικαιωθῶ. Debe cambiarse la razón de la nota o eliminarse.
  - severity: medium
    issue: «Los santos» para ἅγιοι introduce asociaciones eclesiales posteriores que el inglés quiso evitar.
    rationale: La decisión inglesa favorece «holy ones». En español, «los consagrados» o «los santos» con nota sería posible, pero sin nota «los santos» corre el riesgo de importar un sentido posterior.
  - severity: medium
    issue: «La tierra de Cam dejará de existir» es más fuerte que ἐκλείψει.
    rationale: El griego apunta a cesar, fallar, desaparecer, no necesariamente a aniquilación ontológica. «desaparecerá» o «llegará a su fin» es más proporcionado.
  - severity: low
    issue: «Signo» podría mejorarse a «señal».
    rationale: Ambas son posibles, pero en español bíblico y religioso «señal» es más natural e inteligible para σημεῖον sin perder ambigüedad.
  - severity: low
    issue: «capadocios» debería ir con mayúscula inicial.
    rationale: Como etnónimo, «Capadocios» corresponde mejor a la convención ortográfica del español en este contexto editorial.
  revised_spanish_text: '1 He aquí, os he dicho todo, para que yo sea justificado[a] de vuestro pecado. 2 Pero si quitáis de vosotros la envidia y toda dureza de corazón, mis huesos florecerán como una rosa en Israel, y mi carne como un lirio en Jacob; y mi fragancia será como la fragancia del Líbano. Los consagrados se multiplicarán de mí por siempre jamás, y sus ramas se extenderán lejos.


    3 Entonces perecerá la descendencia de Canaán, y no quedará remanente en Amalec; todos los Capadocios perecerán, y todos los heteos serán completamente destruidos. 4 Entonces la tierra de Cam[b] desaparecerá, y todo pueblo perecerá. Entonces toda la tierra cesará del tumulto, y todo lo que está bajo el cielo cesará de la guerra.


    5 Entonces una gran señal[c] será glorificada para Israel, porque el Señor Dios, apareciendo en la tierra, vendrá y salvará a Adán[d] en él.[e] 6 Entonces todos los espíritus del engaño serán entregados para ser pisoteados, y los hombres gobernarán sobre los espíritus malos. 7 Entonces yo también me levantaré con alegría, y bendeciré al Altísimo por sus maravillas.[f]'
  revised_footnotes:
