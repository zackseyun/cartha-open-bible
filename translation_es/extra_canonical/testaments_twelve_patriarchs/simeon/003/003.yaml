base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/003/003.yaml
  text: But it always urges him to kill the one envied; and the one envied always flourishes, while the one who envies wastes away.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
    unchanged: false
    changes_summary: Removed the unnecessary 'it is' for smoother English, and replaced 'while' clause order to match the Greek contrast more closely while preserving all source content.
translation:
  language: es
  text: Pero siempre lo impulsa a matar al envidiado; y el envidiado siempre florece, mientras que el que envidia se marchita.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνελεῖν
  english_pob_choice: to kill
  chosen_spanish: matar
  alternatives_spanish:
  - dar muerte a
  - asesinar
  lexicon: ἀναιρέω
  rationale: El contexto exige una acción violenta dirigida contra una persona concreta; «matar» comunica con claridad el valor básico sin introducir una carga jurídica o moral más específica que el griego no explicita aquí.
- source_word: τὸν φθονούμενον
  english_pob_choice: the one envied
  chosen_spanish: el envidiado
  alternatives_spanish:
  - el que es envidiado
  - la persona envidiada
  lexicon: φθονέω
  rationale: El participio pasivo señala a la persona objeto de envidia. «El envidiado» preserva la concisión del griego y el contraste con «el que envidia».
- source_word: ὁ δὲ φθονῶν
  english_pob_choice: the one who envies
  chosen_spanish: el que envidia
  alternatives_spanish:
  - el envidioso
  - el que siente envidia
  lexicon: φθονέω
  rationale: El participio activo identifica al agente de la envidia. «El que envidia» mantiene la relación verbal del original y evita convertirlo prematuramente en un rasgo de carácter nominalizado.
- source_word: ἀνθεῖ
  english_pob_choice: flourishes
  chosen_spanish: florece
  alternatives_spanish:
  - prospera
  - está en flor
  lexicon: ἀνθέω
  rationale: La imagen de florecer/prosperar está presente en el verbo griego. «Florece» conserva la metáfora vegetal y su contraste con «se marchita».
- source_word: μαραίνεται
  english_pob_choice: wastes away
  chosen_spanish: se marchita
  alternatives_spanish:
  - se consume
  - se desvanece
  lexicon: μαραίνομαι
  rationale: El verbo expresa decrecimiento, desecación o marchitamiento. «Se marchita» reproduce la metáfora del deterioro y empareja bien con «florece».
theological_decisions:
- issue: Relación entre el envidiado y el que envidia en el paralelismo final
  english_pob_reading: the one envied always flourishes, while the one who envies wastes away
  chosen_spanish_reading: el envidiado siempre florece, mientras que el que envidia se marchita
  alternative_spanish_readings:
  - el envidiado siempre florece; el envidioso, en cambio, se marchita
  - siempre florece el envidiado, y el que envidia se marchita
  rationale: Se conserva el contraste moral y existencial del paralelismo griego sin añadir explicación doctrinal. El orden permite reflejar el segundo miembro como contrapunto directo del primero, como en el texto fuente.
  doctrine_reference: Sabiduría moral / antítesis entre envidia y bienestar del justo
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó el 'it is' innecesario y reordenó la cláusula contrastiva para seguir más de cerca el griego. La propuesta española sigue ese mismo contraste directo y evita añadidos explicativos, manteniendo el paralelismo fuente.
  spanish_consistency_notes:
  - Se usó español neutro y publicable, con registro sobrio.
  - Se mantuvo la metáfora de florecer/marchitar para preservar la imagen del griego.
  - No se introdujeron términos técnicos ni eclesiásticos no presentes en la fuente.
