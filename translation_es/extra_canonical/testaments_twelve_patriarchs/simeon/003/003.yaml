  text: Ἀλλὰ⁹ *πάντοτε ὑποβάλλει¹⁰ ἀνελεῖν¹¹ τὸν φθονούμενον· *καὶ ὁ μὲν φθονούμενος πάντοτε ἀνθεῖ, ὁ δὲ φθονῶν μαραίνεται¹².
