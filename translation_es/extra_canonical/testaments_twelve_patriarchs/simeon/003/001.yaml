  text: Καὶ νῦν, τέκνα¹ μου² Γἀκούσατέ μου καὶ¹³ φυλάξασθε⁴ ἀπὸ *τοῦ πνεύματος⁵ τῆς πλάνης καὶ τοῦ φθόνου.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/003/001.yaml
  text: And now, my children, hear me and guard yourselves against the spirit of deceit and envy.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:00Z'
    unchanged: false
    changes_summary: Removed the bracketed footnote marker and tightened 'from' to 'against' for smoother English while preserving the source meaning.
translation:
  language: es
  text: Y ahora, hijos míos, escúchenme y guárdense del espíritu de engaño y de envidia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y bien ahora
  - Y ahora, pues
  lexicon: Greek καὶ νῦν
  rationale: Conserva la transición exhortativa del original con una expresión natural en español. "Y ahora" comunica el cambio de discurso sin añadir matiz no sustentado.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - amados hijos míos
  lexicon: Greek τέκνα
  rationale: '"Hijos míos" mantiene la relación paterna y el tono afectivo del griego sin volverlo más solemne de lo necesario.'
- source_word: ἀκούσατέ μου
  english_pob_choice: hear me
  chosen_spanish: escúchenme
  alternatives_spanish:
  - óiganme
  - escuchen mis palabras
  lexicon: Greek ἀκούσατέ μου
  rationale: El imperativo pide atención obediente; "escúchenme" es natural en español y preserva el valor exhortativo de "hear me".
- source_word: φυλάξασθε
  english_pob_choice: guard yourselves
  chosen_spanish: guárdense
  alternatives_spanish:
  - manténganse alejados
  - guárdense ustedes mismos
  lexicon: Greek φυλάξασθε
  rationale: El verbo medio refleja una acción reflexiva de protegerse; "guárdense" comunica bien la idea de cuidarse/precaverse sin exagerar.
- source_word: πνεύματος τῆς πλάνης καὶ τοῦ φθόνου
  english_pob_choice: the spirit of deceit and envy
  chosen_spanish: del espíritu de engaño y de envidia
  alternatives_spanish:
  - del espíritu del engaño y de la envidia
  - del espíritu de falsedad y envidia
  lexicon: Greek πνεύματος τῆς πλάνης καὶ τοῦ φθόνου
  rationale: Se conserva "espíritu" para πνεῦμα y se traduce πλάνη como "engaño" para una español transparente. "Envidia" corresponde directamente a φθόνος. El genitivo cualitativo queda bien expresado con "de".
theological_decisions:
- issue: Naturaleza del "espíritu" exhortado a evitar
  english_pob_reading: the spirit of deceit and envy
  chosen_spanish_reading: el espíritu de engaño y de envidia
  alternative_spanish_readings:
  - el espíritu engañoso y envidioso
  - el espíritu de la mentira y de la envidia
  rationale: Se mantiene la formulación sustantiva del original y del inglés POB, sin convertirla en una mera descripción psicológica. Así se conserva la posible fuerza personal o moral del "espíritu" sin resolverla indebidamente.
  doctrine_reference: Discernimiento espiritual; lenguaje exhortativo sobre influencias malignas en la literatura testamentaria.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó una nota superflua y ajustó "from" a "against" por fluidez. La versión española sigue esa línea con "guárdense del", que es idiomático y mantiene el matiz de protección frente a una influencia nociva.
  spanish_consistency_notes:
  - Se usa "espíritu" en minúscula porque aquí designa una influencia o disposición moral específica, no el Espíritu Santo.
  - Se prefirió "engaño" sobre "decepción" porque corresponde mejor al alcance de πλάνη en este contexto y suena más natural en el registro bíblico español.
  - No se introdujo "Cristo" ni otra terminología teológica ajena al verso.
  - La puntuación mantiene el ritmo exhortativo de la oración griega y del POB inglés.
