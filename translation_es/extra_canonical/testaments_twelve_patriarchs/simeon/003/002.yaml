id: T12P.SIM.3.2
reference: Testament of Simeon 3:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: Καὶ γὰρ ὁ φθόνος κυριεύει *πάσης τῆς διανοίας τοῦ ἀνθρώπου⁶ καὶ οὐκ ἀφίησιν⁷ αὐτὸν Γοὔτε φαγεῖν, οὔτε πιεῖν, οὔτε¹ ποιῆσαί τι⁸ ἀγαθόν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/003/002.yaml
  text: For envy masters the whole mind of a person, and does not allow him either to eat or to drink or to do anything good.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
    unchanged: false
    changes_summary: 'Adjusted the clause to reflect the source more fully and naturally: added ''the whole'' before ''mind of a person'' to match πάσης τῆς διανοίας τοῦ ἀνθρώπου, and retained the sequence of prohibitions more closely to the Greek.'
translation:
  language: es
  text: Porque la envidia se apodera de toda la mente de una persona y no le permite ni comer, ni beber, ni hacer nada bueno.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φθόνος
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  - invidia
  lexicon: φθόνος
  rationale: «Envidia» expresa con precisión el vicio moral del texto y coincide con la fuerza del inglés POB; «celos» puede sonar a rivalidad afectiva, y «invidia» es menos natural en español bíblico moderno.
- source_word: κυριεύει
  english_pob_choice: masters
  chosen_spanish: se apodera de
  alternatives_spanish:
  - domina
  - se adueña de
  lexicon: κυριεύω
  rationale: La idea es de dominio total y control efectivo sobre la mente; «se apodera de» conserva fuerza verbal sin introducir un tono demasiado técnico o rígido.
- source_word: πάσης τῆς διανοίας τοῦ ἀνθρώπου
  english_pob_choice: the whole mind of a person
  chosen_spanish: toda la mente de una persona
  alternatives_spanish:
  - la mente entera de una persona
  - toda la mente del ser humano
  lexicon: διάνοια
  rationale: «Mente» comunica bien διάνοια en este contexto de facultad interior; «una persona» mantiene el matiz general del genérico griego τοῦ ἀνθρώπου y evita una masculinizacion innecesaria.
- source_word: οὐκ ἀφίησιν αὐτὸν
  english_pob_choice: does not allow him
  chosen_spanish: no le permite
  alternatives_spanish:
  - no lo deja
  - no lo deja
  lexicon: ἀφίημι
  rationale: El sentido causal de impedir queda bien en español con «no le permite»; mantiene el tono directo del griego sin sobrecargar la frase.
- source_word: φαγεῖν
  english_pob_choice: to eat
  chosen_spanish: comer
  alternatives_spanish:
  - a comer
  lexicon: ἐσθίω
  rationale: Infinitivo simple y natural en español, en paralelo con los demás verbos coordinados.
- source_word: πιεῖν
  english_pob_choice: to drink
  chosen_spanish: beber
  alternatives_spanish:
  - a beber
  lexicon: πίνω
  rationale: Conserva la serie verbal directa del original.
- source_word: ποιῆσαί τι ἀγαθόν
  english_pob_choice: to do anything good
  chosen_spanish: hacer nada bueno
  alternatives_spanish:
  - hacer algo bueno
  - realizar nada bueno
  lexicon: ποιέω
  rationale: La construcción negativa griega permite en español una negación coherente con «no le permite... ni... ni... ni...», de modo que «hacer nada bueno» refleja el alcance total de la prohibición y suena natural en este contexto.
theological_decisions:
- issue: Alcance moral de la envidia sobre la interioridad humana
  english_pob_reading: envy masters the whole mind of a person
  chosen_spanish_reading: la envidia se apodera de toda la mente de una persona
  alternative_spanish_readings:
  - la envidia domina toda la mente de una persona
  - la envidia toma posesión de toda la mente de una persona
  rationale: 'La formulación conserva la idea antropológica fuerte del texto: la envidia no es solo un sentimiento, sino una fuerza que invade y gobierna la interioridad. «Se apodera de» preserva esa tensión sin convertirla en una afirmación doctrinal ajena al pasaje.'
  doctrine_reference: Antropología moral del pecado y sus efectos sobre la voluntad e interioridad humana
translation_notes:
  revision_awareness: 'Se incorporó el ajuste del pass de revisión en inglés que subraya «the whole mind of a person». La versión española refleja ese alcance con «toda la mente de una persona» y mantiene el orden de las prohibiciones del griego: comer, beber, hacer nada bueno.'
  spanish_consistency_notes:
  - Se mantuvo «envidia» para φθόνος, conforme al valor moral estándar y al inglés POB.
  - Se usó «mente» para διάνοια por claridad bíblica contemporánea en español.
  - Se preservó la secuencia negativa coordinada del original griego y del texto inglés revisado.
  - No se introdujeron notas al pie porque el verso no presenta variantes textuales o alternativas decisivas que el español requiera explicitar.
