  text: Καὶ λοιπὸν συμπαθεῖ²⁴ τῷ φθονουμένῳ²⁵, καὶ²⁶ συγγινώσκει²⁷ *τοῖς ἀγαπῶσιν²⁸ αὐτόν²⁹, καὶ οὕτως³⁰ παύεται τοῦ φθόνου.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/003/006.yaml
  text: And from then on he has compassion for the one envied, and forgives those who love him, and so he ceases from envy.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
    unchanged: false
    changes_summary: Adjusted 'on' to 'for' to better reflect συμπαθεῖ with the dative, and removed the footnote marker from the main text. Kept the rest unchanged.
translation:
  language: es
  text: Y de ahí en adelante siente compasión por el envidiado, y perdona a los que lo aman, y así deja de envidiar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συμπαθεῖ
  english_pob_choice: has compassion for
  chosen_spanish: siente compasión por
  alternatives_spanish:
  - tiene compasión por
  - compadece a
  lexicon: συμπαθέω
  rationale: El verbo griego con dativo expresa compasión dirigida hacia la persona afectada. En español, 'siente compasión por' conserva la relación objetiva y evita un calco duro; 'compadece a' sería posible, pero es menos natural en registro moderno y puede sonar demasiado arcaico.
- source_word: τῷ φθονουμένῳ
  english_pob_choice: the one envied
  chosen_spanish: el envidiado
  alternatives_spanish:
  - la persona envidiada
  - el que es envidiado
  lexicon: φθονέω
  rationale: El participio pasivo requiere una forma sustantivada en español. 'El envidiado' es breve, fiel y mantiene la pasividad del griego sin añadir explicación interpretativa.
- source_word: συγγινώσκει
  english_pob_choice: forgives
  chosen_spanish: perdona
  alternatives_spanish:
  - da perdón a
  - muestra indulgencia con
  lexicon: συγγινώσκω
  rationale: El sentido aquí es el de tratar con benevolencia o perdonar. 'Perdona' es la equivalencia más directa y clara en español bíblico contemporáneo.
- source_word: τοῖς ἀγαπῶσιν αὐτόν
  english_pob_choice: those who love him
  chosen_spanish: a los que lo aman
  alternatives_spanish:
  - a quienes lo aman
  - a los que le aman
  lexicon: ἀγαπάω
  rationale: Se conserva el objeto personal y el participio presente con una construcción natural en español. 'Lo' es preferible en español neutral para el objeto directo personal.
- source_word: παύεται τοῦ φθόνου
  english_pob_choice: ceases from envy
  chosen_spanish: deja de envidiar
  alternatives_spanish:
  - cesa de envidiar
  - se aparta de la envidia
  lexicon: παύω
  rationale: El genitivo con παύομαι expresa cesación de una actividad o estado. 'Deja de envidiar' reproduce con naturalidad la acción de cesar en el vicio señalado.
- source_word: Καὶ λοιπὸν
  english_pob_choice: And from then on
  chosen_spanish: Y de ahí en adelante
  alternatives_spanish:
  - Y desde entonces
  - Y a partir de entonces
  lexicon: λοιπός
  rationale: La expresión marca continuidad temporal. 'De ahí en adelante' mantiene el matiz idiomático sin sonar literalista.
theological_decisions:
- issue: El sujeto implícito del verbo es la persona dominada por la envidia, no una referencia teológica a Dios.
  english_pob_reading: And from then on he has compassion... and so he ceases from envy.
  chosen_spanish_reading: Y de ahí en adelante siente compasión... y así deja de envidiar.
  alternative_spanish_readings:
  - Y de ahí en adelante tiene compasión...
  - Y de ahí en adelante se compadece...
  rationale: El contexto de la frase anterior y el cierre 'cesa de la envidia' muestran que la secuencia describe el cambio moral del envidioso. La traducción mantiene ese referente implícito sin añadir un sujeto explícito innecesario.
  doctrine_reference: Anthropology / moral transformation in paraenesis
translation_notes:
  revision_awareness: He seguido la revisión inglesa más reciente que prefirió 'for the one envied' frente a 'on the one envied' y eliminó la marca de nota en el cuerpo. En español se refleja esa corrección con 'por el envidiado', sin introducir notas adicionales porque no hay variantes textuales o decisiones con tensión lexical que requieran aparato.
  spanish_consistency_notes:
  - Se mantiene 'compasión por' para congruencia con el ajuste auditado del inglés.
  - No se usa 'SEÑOR' ni terminología cristológica, porque el verso no contiene esas unidades léxicas.
  - Se conserva un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
