base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/003/004.yaml
  text: For two years, then, in fear of the Lord I afflicted my soul with fasting, and I learned that the release from envy comes through fear of God.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:01Z'
    unchanged: false
    changes_summary: Removed the extra article before 'fear of the Lord' to better match the Greek and adjusted 'release from envy' for closer alignment with the source wording while preserving the draft's meaning.
translation:
  language: es
  text: Dos años, pues, con temor del Señor afligí mi alma con ayuno, y aprendí que la liberación de la envidia viene por medio del temor de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Δύο ... ἔτη
  english_pob_choice: For two years, then
  chosen_spanish: Dos años, pues
  alternatives_spanish:
  - Durante dos años, pues
  - Por dos años, pues
  lexicon: δύο; ἔτος
  rationale: Conserva la duración temporal y reproduce el matiz discursivo de τότε/οὖν con «pues», natural en español y fiel al enlace lógico del contexto.
- source_word: ἐν φόβῳ κυρίου
  english_pob_choice: in fear of the Lord
  chosen_spanish: en temor del Señor
  alternatives_spanish:
  - en el temor del Señor
  - con temor del Señor
  lexicon: φόβος; κύριος
  rationale: «Temor» refleja el sustantivo φόβος sin suavizarlo; «Señor» sigue la tradición contextual del título en este dicho, y «en» mantiene la construcción local del griego.
- source_word: ἐκάκωσα τὴν ψυχήν μου
  english_pob_choice: I afflicted my soul
  chosen_spanish: afiigí mi alma
  alternatives_spanish:
  - afligí mi vida
  - mortifiqué mi alma
  lexicon: κακόω; ψυχή
  rationale: «Afligí» preserva el sentido de hacer sufrir/tratar con dureza; «alma» mantiene ψυχή sin reemplazarla por una paráfrasis de «yo mismo» o «vida», que borraría el peso antropológico del original.
- source_word: ἐν νηστείᾳ
  english_pob_choice: with fasting
  chosen_spanish: con ayuno
  alternatives_spanish:
  - mediante ayuno
  - en ayuno
  lexicon: νηστεία
  rationale: «Con ayuno» es natural en español y conserva el instrumento/medio expresado por la preposición y el sustantivo.
- source_word: ἔγνων
  english_pob_choice: I learned
  chosen_spanish: aprendí
  alternatives_spanish:
  - llegué a saber
  - conocí
  lexicon: γινώσκω
  rationale: «Aprendí» comunica la adquisición de conocimiento resultante de la experiencia ascética, coherente con el valor perfectivo del verbo en este contexto.
- source_word: ἡ λύσις τοῦ φθόνου
  english_pob_choice: the release from envy
  chosen_spanish: la liberación de la envidia
  alternatives_spanish:
  - la soltura de la envidia
  - la liberación del celo
  lexicon: λύσις; φθόνος
  rationale: «Liberación» conserva λύσις como desatadura/liberación; «de la envidia» mantiene el genitivo objetivo más directamente que una paráfrasis interpretativa.
- source_word: διὰ φόβου θεοῦ
  english_pob_choice: through fear of God
  chosen_spanish: por medio del temor de Dios
  alternatives_spanish:
  - mediante el temor de Dios
  - a través del temor de Dios
  lexicon: διά; φόβος; θεός
  rationale: «Por medio de» expresa el medio/canal de manera clara y bíblicamente sobria; «temor de Dios» respeta el sintagma sin añadir artículos o matices no presentes en el griego.
theological_decisions:
- issue: Relación entre «temor del Señor» y «temor de Dios»
  english_pob_reading: fear of the Lord ... fear of God
  chosen_spanish_reading: temor del Señor ... temor de Dios
  alternative_spanish_readings:
  - temor del Señor ... temor del Señor
  - temor de Dios ... temor de Dios
  rationale: 'El texto distingue deliberadamente las dos expresiones: primero κυρίου y luego θεοῦ. Mantener ambas evita nivelarlas y conserva la textura del original, aun si en español ambas expresiones se solapan semánticamente.'
  doctrine_reference: Sabiduría reverente / temor de Dios en la piedad bíblica
- issue: Sentido de «afligí mi alma» como práctica ascética
  english_pob_reading: I afflicted my soul with fasting
  chosen_spanish_reading: afiigí mi alma con ayuno
  alternative_spanish_readings:
  - mortifiqué mi alma con ayuno
  - castigué mi alma con ayuno
  rationale: La versión conserva la dureza ascética del verbo sin introducir una doctrina ajena. «Afligí» evita cargar el texto con terminología más técnica que el griego no exige.
  doctrine_reference: Práctica de disciplina espiritual / ayuno
- issue: «Liberación de la envidia» como resultado moral-espiritual
  english_pob_reading: the release from envy comes through fear of God
  chosen_spanish_reading: la liberación de la envidia se da por medio del temor de Dios
  alternative_spanish_readings:
  - la liberación de la envidia viene por el temor de Dios
  - la liberación del envidiar se da por el temor de Dios
  rationale: Se mantiene la idea causal sin convertirla en una fórmula dogmática rígida. «Se da por medio de» preserva el origen instrumental del griego y el carácter sapiencial del enunciado.
  doctrine_reference: Formación moral por temor de Dios
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó un artículo extra antes de «fear of the Lord» y afinó «release from envy» para acercarse más al griego. En español se refleja esa misma economía: no se añade artículo innecesario antes de «temor del Señor», y se mantiene una construcción breve y directa para «la liberación de la envidia».'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada para el nombre divino cuando corresponda, pero aquí el griego tiene κύριος y θεός; por eso se traduce «Señor» y «Dios» según el título/categoría del texto.
  - Se mantiene la distinción entre «alma» y una posible paráfrasis de la persona completa, porque ψυχή está explícita en el original.
  - No se introduce puntuación interpretativa adicional que altere la secuencia temporal y causal del versículo.
