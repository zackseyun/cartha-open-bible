  text: Δύο Γοὖν¹¹³ ἔτη¹⁴ *ἐν φόβῳ κυρίου¹⁵ ἐκάκωσα *τὴν ψυχήν μου ἐν νηστείᾳ¹⁶, καὶ ἔγνων ὅτι ἡ¹⁷ λύσις τοῦ φθόνου διὰ φόβου¹⁸ θεοῦ¹⁹ γίνεται²⁰.
