revisions:
- from: Dos años, pues, en temor del Señor afiigí mi alma con ayuno, y aprendí que la liberación de la envidia se da por medio del temor de Dios.
  to: Dos años, pues, con temor del Señor afligí mi alma con ayuno, y aprendí que la liberación de la envidia viene por medio del temor de Dios.
  rationale: Se corrige el error ortográfico «afiigí» → «afligí». También se ajusta «en temor del Señor» a «con temor del Señor» para mejorar la naturalidad del español sin apartarse del sentido del griego. Finalmente, «se da por medio de» se simplifica a «viene por medio de» para reflejar mejor γίνεται con un español más directo y sapiencial.
