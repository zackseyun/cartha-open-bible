base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/003/005.yaml
  text: For if anyone takes refuge in the Lord, the evil spirit runs away from him, and the mind becomes light.
  revision_pass:
