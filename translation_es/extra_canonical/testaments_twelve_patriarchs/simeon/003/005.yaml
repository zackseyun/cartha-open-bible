    issue: «la mente se vuelve ligera» es poco idiomático
    rationale: Aunque calca aceptablemente κούφη/light, en español suena menos natural y puede implicar frivolidad o falta de seriedad. «La mente se aligera» preserva mejor la imagen de carga removida o despeje interior.
  revised_spanish_text: Porque si alguien se refugia en Yahvé, el espíritu malo huye de él, y la mente se aligera.
