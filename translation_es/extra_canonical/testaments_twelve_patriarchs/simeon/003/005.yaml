translation:
  language: es
  text: Porque si alguien se refugia en Yahvé, el espíritu malo huye de él, y la mente se aligera.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπὶ Κύριον καταφύγῃ
  english_pob_choice: takes refuge in the Lord
  chosen_spanish: se refugia en Yahvé
  alternatives_spanish:
  - toma refugio en Yahvé
  - busca refugio en Yahvé
  lexicon: καταφεύγω
  rationale: El griego expresa la idea de buscar amparo/refugio; «se refugia en» comunica bien el movimiento de dependencia y protección sin el giro poco natural de una traducción mecánica. Se usa «Yahvé» por la convención del proyecto para el nombre divino.
- source_word: τὸ πονηρὸν πνεῦμα
  english_pob_choice: the evil spirit
  chosen_spanish: el espíritu malo
  alternatives_spanish:
  - el espíritu maligno
  - el espíritu perverso
  lexicon: πονηρός + πνεῦμα
  rationale: «Espíritu malo» conserva la sencillez y el paralelismo del griego. «Maligno» intensifica más de lo que exige el texto; «perverso» suena menos natural en español actual.
- source_word: ἀποτρέχει
  english_pob_choice: runs away
  chosen_spanish: huye
  alternatives_spanish:
  - sale corriendo
  - se va corriendo
  lexicon: ἀποτρέχω
  rationale: El verbo indica alejamiento rápido; «huye» es breve, natural y suficientemente fuerte en español para reflejar que el espíritu se aparta al encontrarse con quien se refugia en Dios.
- source_word: ἡ διάνοια κούφη
  english_pob_choice: the mind becomes light
  chosen_spanish: la mente se vuelve ligera
  alternatives_spanish:
  - la mente se aligera
  - la mente queda liviana
  lexicon: διάνοια + κούφος
  rationale: «Mente» traduce διάνοια con su sentido de facultad interior/pensamiento; «ligera» mantiene la imagen de κούφη sin imponer una explicación interpretativa. Se conserva la expresión un poco metafórica del original.
theological_decisions:
- issue: Nombre divino en una frase con κατὰ/ἐπὶ Κύριον
  english_pob_reading: takes refuge in the Lord
  chosen_spanish_reading: se refugia en Yahvé
  alternative_spanish_readings:
  - se refugia en el Señor
  - toma refugio en el Señor
  rationale: Aunque el griego dice Κύριον, el contexto de esta obra y la política del proyecto favorecen traducir el nombre divino como «Yahvé» cuando λειτουργa como referencia a Dios. No se suaviza a «Señor» para no ocultar la decisión onomástica.
  doctrine_reference: Divine name rendering policy; source-language audit trail
- issue: Relación entre refugio en Dios y expulsión del mal
  english_pob_reading: the evil spirit runs away from him, and the mind becomes light
  chosen_spanish_reading: el espíritu malo huye de él, y la mente se vuelve ligera
  alternative_spanish_readings:
  - el espíritu malo se aparta de él, y la mente se aligera
  rationale: 'Se mantiene la correlación causal simple del texto: el refugio en Yahvé produce la huida del espíritu malo y una mente aligerada. «Huye» conserva la vivacidad del verbo griego sin añadir una teoría demonológica adicional.'
  doctrine_reference: Pneumatology; moral/spiritual causality in wisdom paraenesis
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que prefirió «takes refuge in» frente a una formulación más literal pero menos natural. El español adopta esa misma decisión semántica con «se refugia en».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología por defecto del proyecto para el nombre divino.
  - Se traduce πνεῦμα como «espíritu» y διάνοια como «mente» para conservar la distinción entre entidad espiritual y facultad interior.
  - La imagen de κούφη se conserva con «ligera» sin explicitarla como «tranquila» o «serena», para no exceder el texto.
