translation:
  language: es
  text: 'Copia de las palabras de Simeón[a], las cuales habló a sus hijos antes de morir, en el año ciento veinte de su vida, en el tiempo en que murió José, su hermano. Y cuando Simeón estaba enfermo, sus hijos vinieron a visitarlo; y, reuniendo sus fuerzas, se incorporó y los besó[b], y dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Un registro de las palabras de Simeón».'
    reason: alternative_reading
  - marker: b
    text: El verbo griego es intensivo y puede sugerir un beso afectuoso o repetido.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀντίγραφον
  english_pob_choice: A copy
  chosen_spanish: Copia
  alternatives_spanish:
  - Registro
  - Transcripción
  lexicon: LSJ
  rationale: «Copia» conserva el carácter documental del encabezamiento sin sobreinterpretar el matiz archivístico; en español suena natural en un preámbulo testamentario.
- source_word: λόγων
  english_pob_choice: of the words
  chosen_spanish: de las palabras
  alternatives_spanish:
  - de los dichos
  - del discurso
  lexicon: LSJ
  rationale: «Palabras» reproduce el sentido formal del encabezamiento y mantiene la proximidad al griego sin volverlo más interpretativo.
- source_word: πρὸ τοῦ ἀποθανεῖν
  english_pob_choice: before he died
  chosen_spanish: antes de morir
  alternatives_spanish:
  - antes de su muerte
  - antes de que muriera
  lexicon: BDAG
  rationale: La construcción infinitiva se vierte de modo idiomático en español con «antes de morir», conservando el valor temporal del griego.
- source_word: ἐν ἑκατοστῷ εἰκοστῷ ἔτει
  english_pob_choice: in the hundred and twentieth year
  chosen_spanish: en el año ciento veinte de su vida
  alternatives_spanish:
  - en el año ciento vigésimo de su vida
  - a los ciento veinte años
  lexicon: LSJ
  rationale: El griego ofrece una nota cronológica elevada y formularia; en español, «año ciento veinte de su vida» conserva ese registro sin sonar forzado.
- source_word: ἐν ᾧ χρόνῳ
  english_pob_choice: at the time when
  chosen_spanish: en el tiempo en que
  alternatives_spanish:
  - cuando
  - en el momento en que
  lexicon: LSJ
  rationale: «En el tiempo en que» mantiene la relación temporal explícita entre la muerte de Simeón y la de José, con tono documental.
- source_word: Ἀρρωστοῦντος
  english_pob_choice: was sick
  chosen_spanish: estaba enfermo
  alternatives_spanish:
  - estaba enfermo de salud
  - yacía enfermo
  lexicon: BDAG
  rationale: «Estaba enfermo» expresa con naturalidad el estado de Simeón en la escena, preservando el marco narrativo de la visita.
- source_word: ἐπισκέψασθαι
  english_pob_choice: to visit
  chosen_spanish: a visitarlo
  alternatives_spanish:
  - a verlo
  - a cuidarlo
  lexicon: BDAG
  rationale: «Visitarlo» reproduce el valor básico del verbo y es el equivalente más claro en español; el contexto aporta la cercanía afectiva.
- source_word: ἐνισχύσας
  english_pob_choice: gathering his strength
  chosen_spanish: reuniendo sus fuerzas
  alternatives_spanish:
  - fortaleciéndose
  - recobrando fuerzas
  lexicon: LSJ
  rationale: El participio sugiere un esfuerzo físico previo a incorporarse; «reuniendo sus fuerzas» comunica ese esfuerzo de manera natural y fiel.
- source_word: ἐκάθισε
  english_pob_choice: he sat up
  chosen_spanish: se incorporó
  alternatives_spanish:
  - se sentó
  - se levantó a sentarse
  lexicon: LSJ
  rationale: En contexto de enfermedad, el movimiento es el de pasar a una posición erguida; «se incorporó» expresa mejor esa acción que un simple «se sentó».
- source_word: κατεφίλησεν
  english_pob_choice: kissed
  chosen_spanish: los besó
  alternatives_spanish:
  - los besó repetidamente
  - los besó con afecto
  lexicon: BDAG
  rationale: El verbo intensivo puede sugerir afecto o reiteración, pero en español «los besó» basta en este contexto familiar; el matiz intensivo queda disponible en nota.
theological_decisions:
- issue: Marco cronológico unido a la muerte de José
  english_pob_reading: Translate both notices straightforwardly as part of the narrative frame
  chosen_spanish_reading: Traducir ambas referencias de manera directa como parte del marco narrativo
  alternative_spanish_readings:
  - Tratar la mención de José como glosa editorial posterior
  - Suavizar la cronología en una paráfrasis más fluida
  rationale: El testimonio griego presenta la mención de José como parte del encabezamiento y del arranque narrativo. Sin advertencia textual de exclusión, la versión española conserva honestamente ese marco en vez de armonizarlo o omitirlo.
  doctrine_reference: Transparencia textual y fidelidad al testimonio recibido; preferir notas antes que supresiones silenciosas.
translation_notes:
  revision_awareness: La fuente auditada no muestra revisiones aplicadas; el pasaje permanece sin cambios respecto del último pase, así que la versión española sigue de cerca el texto griego y el criterio óptimo ya asentado en el audit trail.
  spanish_consistency_notes:
  - Se mantiene «Simeón» y «José» de forma consistente con los nombres propios del pasaje.
  - Se conserva el tono de encabezamiento documental con sintaxis directa y elevada, sin volverlo litúrgico.
  - «Espíritu» no aparece en este tramo; no se requieren decisiones de ese campo léxico.
  - La nota cronológica de José se traduce sin atenuarla para respetar la integridad del marco fuente.
