base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/001.yaml
  text: 'A copy of the words of Simeon[a], which he spoke to his sons before he died, in the hundred and twentieth year of his life, at the time when Joseph his brother died. And when Simeon was sick, his sons came to visit him; and gathering his strength, he sat up and kissed them[b], and said:'
  footnotes:
