  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: Καὶ ἔκλαυσαν¹ οἱ² *υἱοὶ Συμεὼν³ τὸν πατέρα αὐτῶν⁴. Καὶ ἦσαν *εἰς Αἴγυπτον⁵ ἕως ἡμέρας ἐξόδου αὐτῶν⁶ *ἐν χειρὶ Μωϋσῆ⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/009/001.yaml
  text: And the sons of Simeon wept for their father. And they were in Egypt until the day of their departure by the hand of Moses.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:53Z'
    unchanged: false
    changes_summary: Changed 'remained' to 'were' to more directly reflect the Greek ἦσαν without adding nuance not explicit in the source. The rest is accurate and natural.
translation:
  language: es
  text: Y lloraron los hijos de Simeón por su padre. Y estuvieron en Egipto hasta el día de su salida por mano de Moisés.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἔκλαυσαν
  english_pob_choice: And ... wept
  chosen_spanish: Y lloraron
  alternatives_spanish:
  - Y lloraron amargamente
  - Y se lamentaron
  lexicon: κλαίω
  rationale: El aoristo expresa la acción de llorar sin añadir intensidad no documentada; «lloraron» conserva la sencillez y la relación directa con el sujeto.
- source_word: οἱ υἱοὶ Συμεὼν
  english_pob_choice: the sons of Simeon
  chosen_spanish: los hijos de Simeón
  alternatives_spanish:
  - los hijos de Simeón
  lexicon: υἱοί
  rationale: «Hijos» reproduce el parentesco filial de forma natural en español y mantiene el nombre propio bíblico usual «Simeón».
- source_word: τὸν πατέρα αὐτῶν
  english_pob_choice: their father
  chosen_spanish: su padre
  alternatives_spanish:
  - su padre de ellos
  - el padre de ellos
  lexicon: πατήρ
  rationale: El posesivo español singular «su» transmite el referente plural sin recargar la frase.
- source_word: ἦσαν εἰς Αἴγυπτον
  english_pob_choice: they were in Egypt
  chosen_spanish: estuvieron en Egipto
  alternatives_spanish:
  - estaban en Egipto
  - fueron en Egipto
  lexicon: εἰμί + εἰς
  rationale: Aunque el inglés POB eligió «were», en español «estuvieron» comunica la permanencia/localización pasada con naturalidad y sin cambiar el dato temporal del griego.
- source_word: ἕως ἡμέρας ἐξόδου αὐτῶν
  english_pob_choice: until the day of their departure
  chosen_spanish: hasta el día de su salida
  alternatives_spanish:
  - hasta el día de su partida
  - hasta el día de su éxodo
  lexicon: ἔξοδος
  rationale: «Salida» es una correspondencia sobria y transparente para ἔξοδος en este contexto narrativo; «éxodo» sería más técnico y podría sugerir un título bíblico no explicitado aquí.
- source_word: ἐν χειρὶ Μωϋσῆ
  english_pob_choice: by the hand of Moses
  chosen_spanish: por mano de Moisés
  alternatives_spanish:
  - por medio de Moisés
  - bajo la mano de Moisés
  lexicon: ἐν χειρί
  rationale: La expresión semítica se conserva de forma directa para mantener la imagen instrumental del original; «por medio de» sería más explicativo pero menos cercano al texto.
theological_decisions:
- issue: Referencia a Moisés como agente de la salida
  english_pob_reading: by the hand of Moses
  chosen_spanish_reading: por mano de Moisés
  alternative_spanish_readings:
  - por medio de Moisés
  - a través de Moisés
  rationale: 'No se interpreta la fórmula más allá de su valor instrumental: Moisés es el agente humano de la salida, sin añadir matices doctrinales no presentes en el versículo.'
  doctrine_reference: agencia humana bajo dirección divina implícita en el relato
- issue: Permanencia en Egipto
  english_pob_reading: they were in Egypt
  chosen_spanish_reading: estuvieron en Egipto
  alternative_spanish_readings:
  - estaban en Egipto
  - permanecieron en Egipto
  rationale: Se evita «permanecieron» porque añade una idea de continuidad enfática no exigida por ἦσαν; «estuvieron» mantiene el hecho narrativo de modo exacto y natural.
  doctrine_reference: precisión aspectual del verbo copulativo griego
translation_notes:
  revision_awareness: El texto inglés revisado cambió «remained» por «were» para reflejar más directamente ἦσαν sin añadir matiz. La versión española sigue esa revisión y opta por «estuvieron» para expresar estado/localización pasada con sobriedad, sin introducir una duración más fuerte que la del griego.
  spanish_consistency_notes:
  - Se mantiene «Moisés» y no una forma abreviada o litúrgica.
  - Se preserva el nombre «Simeón» con acento según uso bíblico estándar en español.
  - No se añade puntuación interpretativa ni se divide el período más allá de la sintaxis natural del español.
