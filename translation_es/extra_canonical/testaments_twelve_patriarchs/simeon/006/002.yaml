  text: But if you remove from yourselves envy and every hardness of heart, my bones will blossom like a rose in Israel, and my flesh like a lily in Jacob; and my fragrance will be like the fragrance of Lebanon. Holy ones will be multiplied from me forever and ever, and their branches will extend far away.
