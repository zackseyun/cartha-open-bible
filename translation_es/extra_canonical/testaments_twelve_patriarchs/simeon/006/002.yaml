translation:
  language: es
  text: Pero si apartan de ustedes la envidia y toda dureza de corazón, mis huesos florecerán como una rosa en Israel, y mi carne como un lirio en Jacob; y mi fragancia será como la fragancia del Líbano. Los santos se multiplicarán[a] por medio de mí para siempre jamás, y sus ramas se extenderán lejos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se multiplicarán de mí».'
    reason: alternative_reading
lexical_decisions:
- source_word: φθόνον
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  - rencor
  lexicon: φθόνος
  rationale: El griego nombra la envidia; 'envidia' es el equivalente directo y más natural en español, manteniendo la fuerza moral del vicio sin desplazarlo a una idea distinta como 'celos'.
- source_word: σκληροκαρδίαν
  english_pob_choice: hardness of heart
  chosen_spanish: dureza de corazón
  alternatives_spanish:
  - endurecimiento del corazón
  - corazón duro
  lexicon: σκληροκαρδία
  rationale: Se conserva la metáfora bíblica de un corazón endurecido. 'Dureza de corazón' es clara, digna y refleja bien la idiomaticidad del original y del inglés POB.
- source_word: ἀνθήσει
  english_pob_choice: will blossom
  chosen_spanish: florecerán
  alternatives_spanish:
  - brotarán
  - florecerá
  lexicon: ἀνθέω
  rationale: El verbo expresa florecimiento vegetal; en español, 'florecerán' mantiene la imagen y el plural concordado con 'mis huesos'.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  - naturaleza humana
  lexicon: σάρξ
  rationale: Se conserva 'carne' porque el inglés POB también mantiene el término fuerte y concreto. En este contexto poético no hace falta suavizarlo a 'cuerpo' o 'naturaleza humana'.
- source_word: ὀσμή
  english_pob_choice: fragrance
  chosen_spanish: fragancia
  alternatives_spanish:
  - aroma
  - olor
  lexicon: ὀσμή
  rationale: '''Fragancia'' reproduce el matiz positivo y poético del pasaje, coherente con la imagen de perfume agradable del Líbano.'
- source_word: ἅγιοι
  english_pob_choice: Holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los consagrados
  - los santos de Dios
  lexicon: ἅγιος
  rationale: En este contexto, el inglés POB traduce 'Holy ones' como un sustantivo colectivo. 'Los santos' es la forma española natural que conserva la referencia a personas apartadas para Dios.
- source_word: ἐξ ἐμοῦ
  english_pob_choice: from me
  chosen_spanish: por medio de mí
  alternatives_spanish:
  - de mí
  - a partir de mí
  lexicon: ἐκ
  rationale: Aunque la preposición puede ser 'de/desde', aquí la idea de procedencia fecunda y mediación se expresa mejor en español con 'por medio de mí', sin perder el sentido de origen que tiene el inglés 'from me'.
- source_word: ἕως αἰῶνας αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: para siempre jamás
  alternatives_spanish:
  - por los siglos de los siglos
  - por siempre y para siempre
  lexicon: ἕως αἰῶνας αἰώνων
  rationale: Se usa una fórmula idiomática española que comunica la durabilidad extrema del griego y del inglés POB. 'Para siempre jamás' es clara y solemne, sin introducir una fórmula litúrgica más técnica que el texto fuente.
- source_word: οἱ κλάδοι
  english_pob_choice: their branches
  chosen_spanish: sus ramas
  alternatives_spanish:
  - sus sarmientos
  - sus renuevos
  lexicon: κλάδος
  rationale: '''Ramas'' es la equivalencia directa y comprensible para la imagen arbórea. ''Sarmientos'' sería más específico y menos universal en español.'
theological_decisions:
- issue: Relación entre el alejamiento de la envidia/dureza de corazón y la bendición subsecuente
  english_pob_reading: But if you remove from yourselves envy and every hardness of heart, my bones will blossom...
  chosen_spanish_reading: Pero si apartan de ustedes la envidia y toda dureza de corazón, mis huesos florecerán...
  alternative_spanish_readings:
  - si quitan de sí...
  - si ustedes remueven de ustedes...
  rationale: Se conserva la condición moral como causa inmediata del lenguaje de bendición poética, sin añadir teología ajena. 'Apartan de ustedes' refleja la acción reflexiva implícita del griego y del inglés POB.
  doctrine_reference: Ética de santidad y renovación moral como preparación para bendición
- issue: Identidad de 'los santos'
  english_pob_reading: Holy ones will be multiplied from me forever and ever
  chosen_spanish_reading: Los santos se multiplicarán por medio de mí para siempre jamás
  alternative_spanish_readings:
  - Los santos se multiplicarán de mí para siempre jamás
  - Los consagrados se multiplicarán por medio de mí para siempre jamás
  rationale: '''Santos'' mantiene la tradición bíblica de personas apartadas para Dios, y no introduce una referencia posterior innecesaria. La opción ''por medio de mí'' conserva la idea de mediación/fructificación implícita en el griego.'
  doctrine_reference: Pueblo apartado para Dios; bendición mediada y fecundidad espiritual
- issue: Duración de la multiplicación y extensión de las ramas
  english_pob_reading: forever and ever, and their branches will extend far away
  chosen_spanish_reading: para siempre jamás, y sus ramas se extenderán lejos
  alternative_spanish_readings:
  - por los siglos de los siglos, y sus ramas se extenderán lejos
  - para siempre, y sus ramas se extenderán a lo lejos
  rationale: La expresión temporal debe sonar absoluta en español y no rebajar la intensidad del superlativo griego. 'Se extenderán lejos' conserva la imagen espacial sin sobreinterpretarla.
  doctrine_reference: Perduración de la bendición y expansión del pueblo
translation_notes:
  revision_awareness: 'Se verificó el estado más reciente del pasaje: sin cambios necesarios en la revisión más reciente; la redacción española se ajusta al texto griego y al audit trail inglés sin introducir revisiones no documentadas.'
  spanish_consistency_notes:
  - Se mantiene 'carne' para σάρξ de forma consistente con el valor fuerte del término.
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera; este versículo no contiene el tetragrámaton ni κύριος como cita divina.
  - La fórmula temporal 'para siempre jamás' se emplea consistentemente para ἕως αἰῶνας αἰώνων en estilo poético-bíblico.
  - La nota al pie marca explícitamente la alternativa de traducción para ἐξ ἐμοῦ, preservando la ambigüedad fuente sin duplicar marcadores.
