base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/006/004.yaml
  text: Then the land of Ham will perish, and every people will perish. Then all the earth will cease from turmoil, and all that is under heaven from war.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:52Z'
    unchanged: false
    changes_summary: Changed 'will fail' to 'will perish' for closer lexical accuracy to ἐκλείψει in this context of destruction/judgment; retained the rest as accurate and natural.
translation:
  language: es
  text: Entonces perecerá la tierra de Cam, y perecerá todo pueblo. Entonces toda la tierra cesará de la agitación, y todo lo que está bajo los cielos, de la guerra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκλείψει
  english_pob_choice: will perish
  chosen_spanish: desaparecerá
  alternatives_spanish:
  - perecerá
  - faltará
  - se acabará
  lexicon: ἐκλείπω
  rationale: En este contexto de juicio y ruina, el inglés POB corrigió su antigua lectura de 'will fail' a 'will perish' por mayor precisión léxica. En español, 'desaparecerá' comunica la desaparición/cesación del territorio como entidad vigente; 'perecerá' se reserva en la segunda cola para el pueblo, manteniendo el paralelismo y la fuerza de destrucción.
- source_word: ἡ γῆ Χάμ
  english_pob_choice: the land of Ham
  chosen_spanish: la tierra de Cam
  alternatives_spanish:
  - la tierra de Ham
  - la tierra de Cam
  lexicon: γῆ / Χάμ
  rationale: Se conserva 'Cam' como forma española habitual del nombre bíblico tradicional, equivalente a 'Ham' en inglés. 'Tierra' mantiene la referencia territorial o étnico-geográfica del sintagma griego.
- source_word: πᾶς ὁ λαός
  english_pob_choice: every people
  chosen_spanish: todo pueblo
  alternatives_spanish:
  - cada pueblo
  - todo el pueblo
  - toda nación
  lexicon: πᾶς / λαός
  rationale: '''Todo pueblo'' reproduce la universalidad distributiva sin forzar una abstracción moderna como ''nación''. El singular colectivo en español refleja bien el griego y el inglés POB, que habla de la totalidad de los pueblos como grupo.'
- source_word: καταπαύσει
  english_pob_choice: will cease
  chosen_spanish: cesará
  alternatives_spanish:
  - descansará
  - se detendrá
  - cesará
  lexicon: καταπαύω
  rationale: Aquí el verbo apunta al cese o quietud de la tierra, no a 'descansar' en sentido devocional. 'Cesará' conserva la idea de terminación de actividad o agitación y corresponde al inglés 'will cease'.
- source_word: ταραχή
  english_pob_choice: turmoil
  chosen_spanish: la turbulencia
  alternatives_spanish:
  - el tumulto
  - la agitación
  - la conmoción
  lexicon: ταραχή
  rationale: '''Turbulencia'' es un equivalente moderno y digno para la perturbación general; evita reducir el término a un conflicto meramente político o militar, y mantiene el sentido amplio de desorden.'
- source_word: ὑπ᾿ οὐρανῶν
  english_pob_choice: under heaven
  chosen_spanish: bajo los cielos
  alternatives_spanish:
  - bajo el cielo
  - debajo del cielo
  - bajo los cielos
  lexicon: ὑπό + οὐρανός
  rationale: '''Bajo los cielos'' reproduce de manera natural el plural poético griego y evita normalizarlo indebidamente a singular. En español suena elevado sin perder claridad.'
- source_word: πόλεμος
  english_pob_choice: war
  chosen_spanish: la guerra
  alternatives_spanish:
  - la guerra
  - el conflicto
  - la contienda
  lexicon: πόλεμος
  rationale: '''Guerra'' es la correspondencia directa y no diluye el alcance bélico del término. ''Dejará de estar en guerra'' expresa de forma natural el final de esa condición en español.'
theological_decisions:
- issue: Universalidad del juicio y del cese de la violencia
  english_pob_reading: all the earth will cease from turmoil, and all that is under heaven from war
  chosen_spanish_reading: toda la tierra cesará de la turbulencia, y todo lo que está bajo los cielos dejará de estar en guerra
  alternative_spanish_readings:
  - toda la tierra descansará de la turbulencia
  - todo lo que está bajo los cielos cesará de la guerra
  rationale: La línea no presenta una restauración espiritual técnica sino una paz universal cósmica/social. El español conserva la amplitud del anuncio sin añadir una interpretación escatológica más específica de la que ofrece el texto.
  doctrine_reference: Paz universal/judicial en lenguaje apocalíptico o profético, sin expansión doctrinal adicional.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que corrigió 'will fail' a 'will perish' para ἐκλείψει. La versión española adopta esa misma fuerza semántica en la primera cola y mantiene el paralelismo de destrucción y cesación en el resto.
  spanish_consistency_notes:
  - Se mantiene 'Cam' como forma española estándar del nombre bíblico.
  - Se usa 'tierra' tanto para la geografía de Cam como para la totalidad del mundo, según el paralelo griego y el inglés POB.
  - No se introduce 'SEÑOR' ni terminología cristológica; el verso no lo requiere.
  - La construcción 'bajo los cielos' conserva el color semítico/poético del original.
