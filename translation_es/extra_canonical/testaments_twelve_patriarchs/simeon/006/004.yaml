review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: destrucción de la tierra de Cam, perecer de todo pueblo, cese de la tierra respecto a la agitación, y cese universal de la guerra. Sin embargo, dos elecciones debilitan la fidelidad léxica y la naturalidad del paralelismo: ἐκλείψει fue auditado en inglés como ''will perish'', por lo que ''desaparecerá'' atenúa el matiz de ruina/destrucción; y ''dejará de estar en guerra'' introduce una paráfrasis más larga donde el griego y el inglés conservan un simple ''cesará de''.'
  spanish_quality_summary: El español es claro y digno, pero 'cesará de la turbulencia' suena menos natural que 'cesará de estar en agitación' o, mejor, 'cesará el tumulto/agitación'. Como el sujeto es 'toda la tierra', una solución más fiel y fluida es mantener la construcción tradicional 'cesará de la agitación'. También 'bajo los cielos' es comprensible, pero 'bajo el cielo' suena más natural en español bíblico general; no obstante, el plural puede tolerarse. El ajuste principal necesario es restaurar el paralelismo de destrucción y simplificar el último miembro.
  glossary_alignment: No hay términos teológicos de glosario principal implicados. 'Cam' es adecuado para Ham. 'Pueblo' preserva bien λαός en sentido distributivo. La revisión recomendada alinea mejor ἐκλείψει con 'perecerá' y mantiene el registro bíblico natural.
  issues:
  - severity: medium
    issue: ἐκλείψει traducido como 'desaparecerá'
    rationale: El expediente inglés corrigió explícitamente a 'will perish' por precisión léxica en contexto de juicio. 'Desaparecerá' comunica cesación, pero no con la misma fuerza de destrucción que 'perecerá'.
  - severity: low
    issue: '''dejará de estar en guerra'' es más parafrástico que el original'
    rationale: 'El griego omite el rodeo verbal y simplemente coordina dos cesaciones: de agitación y de guerra. En español puede mantenerse esa concisión sin perder naturalidad.'
  - severity: low
    issue: '''turbulencia'' suena menos idiomático para ταραχή en este contexto'
    rationale: Aunque posible, 'agitación' o 'tumulto' reflejan mejor el desorden general y encajan mejor con 'cesará de' en español bíblico legible.
  revised_spanish_text: Entonces perecerá la tierra de Cam, y perecerá todo pueblo. Entonces toda la tierra cesará de la agitación, y todo lo que está bajo los cielos, de la guerra.
  revision_rationale: 'Se cambia ''desaparecerá'' por ''perecerá'' para reflejar mejor ἐκλείψει según la auditoría inglesa y mantener el paralelismo de destrucción. Se sustituye ''turbulencia'' por ''agitación'' por mayor naturalidad con ταραχή en este contexto. Se simplifica el último miembro a una elipsis coordinada más cercana al griego y al inglés POB: ''y todo lo que está bajo los cielos, de la guerra''.'
