source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: Τότε²⁶ ἐκλείψει²⁷ *ἡ γῆ²⁸ Χάμ, καὶ πᾶς ὁ²⁹ λαὸς ἀπολεῖται. Τότε καταπαύσει *πᾶσα ἡ γῆ³⁰ ἀπὸ ταραχῆς, *καὶ πᾶσα ἡ³¹ ὑπ᾿ οὐρανῶν³² ἀπὸ πολέμου.
