  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: Ἰδοὺ εἴρηκα¹ ὑμῖν πάντα², *ὅπως δικαιωθῶ ἀπὸ τῆς ἁμαρτίας ὑμῶν³.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/006/001.yaml
  text: Behold, I have told you everything, so that I may be justified from your sin.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:53Z'
    unchanged: false
    changes_summary: Changed 'cleared' to 'justified' to more directly reflect δικαιωθῶ and maintain a more formal register.
translation:
  language: es
  text: He aquí, les he dicho todo, para que yo sea justificado de su pecado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - He aquí, pues
  lexicon: ἰδού
  rationale: «He aquí» conserva el valor de deíxis y solemnidad del original sin sonar artificial en español contemporáneo.
- source_word: εἴρηκα ὑμῖν πάντα
  english_pob_choice: I have told you everything
  chosen_spanish: les he dicho todo
  alternatives_spanish:
  - les he hablado de todo
  - les he dicho todas las cosas
  lexicon: λέγω / εἴρηκα
  rationale: «Les he dicho todo» transmite el perfecto con sentido de acción completada y el alcance total de πάντα sin añadir explicaciones no presentes en el texto.
- source_word: δικαιωθῶ
  english_pob_choice: I may be justified
  chosen_spanish: yo sea justificado
  alternatives_spanish:
  - yo sea declarado justo
  - yo sea vindicado
  lexicon: δικαιόω
  rationale: Se conserva «justificado» para reflejar el verbo δικαιόω y la revisión inglesa, manteniendo la tensión entre justificación y vindicación sin resolverla interpretativamente.
- source_word: ἀπὸ τῆς ἁμαρτίας ὑμῶν
  english_pob_choice: from your sin
  chosen_spanish: de su pecado
  alternatives_spanish:
  - de su pecado
  - por su pecado
  - a causa de su pecado
  lexicon: ἁμαρτία
  rationale: «De su pecado» reproduce la relación preposicional de ἀπό de manera natural en español y conserva la referencia moral singular del sustantivo griego.
theological_decisions:
- issue: 'δικαιωθῶ: justificación frente a vindicación/absolución'
  english_pob_reading: I may be justified
  chosen_spanish_reading: para que yo sea justificado
  alternative_spanish_readings:
  - para que yo sea vindicado
  - para que yo sea declarado justo
  rationale: La forma elegida sigue la revisión inglesa y mantiene abierta la tensión semántica de δικαιόω entre ser declarado justo y ser vindicado, sin imponer una glosa doctrinal que el texto no exige.
  doctrine_reference: Justificación / vindicación (δικαιόω)
- issue: 'ἀπὸ τῆς ἁμαρτίας ὑμῶν: relación causal o separativa'
  english_pob_reading: from your sin
  chosen_spanish_reading: de su pecado
  alternative_spanish_readings:
  - por su pecado
  - a causa de su pecado
  rationale: El español «de su pecado» conserva la ambigüedad relativa del ἀπό griego entre separación y referencia causal, evitando explicitar una causalidad que el texto no marca de forma inequívoca.
  doctrine_reference: Relación preposicional de ἀπό
translation_notes:
  revision_awareness: La versión inglesa fue revisada de «cleared» a «justified» para reflejar más directamente δικαιωθῶ; la propuesta española sigue esa revisión con «justificado» y conserva un registro formal equivalente.
  spanish_consistency_notes:
  - Se mantiene «He aquí» como fórmula solemne para Ἰδού.
  - Se usa «justificado» en consonancia con la revisión inglesa y con δικαιωθῶ.
  - Se conserva el pronombre de cortesía plural implícito en «les» para ὑμῖν.
  - No se añadieron notas al pie porque el pasaje no presenta una alternativa textual o lexical que requiera anclaje explícito en el texto español.
