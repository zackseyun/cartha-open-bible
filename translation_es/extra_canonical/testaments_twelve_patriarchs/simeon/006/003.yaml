base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/006/003.yaml
  text: Then the seed of Canaan will perish, and no remnant will remain in Amalek; all the Cappadocians will perish, and all the Hittites will be utterly destroyed.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:53Z'
    unchanged: false
    changes_summary: Changed 'for Amalek' to 'in Amalek' to more closely reflect ἐν τῷ ᾿Αμαλήκ. Kept the rest unchanged as accurate and natural.
translation:
  language: es
  text: Entonces perecerá la descendencia de Canaán, y no quedará remanente en Amalec; todos los capadocios perecerán, y todos los hititas serán totalmente destruidos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸ σπέρμα Χαναάν
  english_pob_choice: the seed of Canaan
  chosen_spanish: la descendencia de Canaán
  alternatives_spanish:
  - la semilla de Canaán
  - la prole de Canaán
  lexicon: σπέρμα
  rationale: En español, «descendencia» comunica de forma natural la idea genealógica/pactal de σπέρμα sin la dureza literal de «semilla», que en este contexto sonaría menos idiomática. Mantiene la referencia a un linaje completo.
- source_word: ἐγκατάλειμμα οὐκ ἔσται
  english_pob_choice: no remnant will remain
  chosen_spanish: no quedará remanente
  alternatives_spanish:
  - no habrá remanente
  - no permanecerá ningún resto
  lexicon: ἐγκατάλειμμα
  rationale: «Remanente» conserva el sentido de resto sobreviviente. «Quedará» expresa con naturalidad la idea de existencia residual sin añadir contenido ajeno.
- source_word: ἐν τῷ ᾿Αμαλήκ
  english_pob_choice: in Amalek
  chosen_spanish: en Amalec
  alternatives_spanish:
  - dentro de Amalec
  - entre Amalec
  lexicon: ἐν
  rationale: 'Sigo la corrección auditada del inglés POB: «in Amalek» corresponde mejor a ἐν τῷ ᾿Αμαλήκ. En español, «en Amalec» reproduce esa relación locativa sin forzar una paráfrasis.'
- source_word: οἱ Καππαδόκαι
  english_pob_choice: the Cappadocians
  chosen_spanish: los capadocios
  alternatives_spanish:
  - los habitantes de Capadocia
  lexicon: Καππαδόκαι
  rationale: «Capadocios» es el equivalente habitual en español para el etnónimo griego, y preserva la forma breve y directa del original. La alternativa explicativa sería más larga y menos fiel al paralelismo.
- source_word: οἱ Χετταῖοι
  english_pob_choice: the Hittites
  chosen_spanish: los hititas
  alternatives_spanish:
  - los heteos
  lexicon: Χετταῖοι
  rationale: «Hititas» es el etnónimo más reconocible y estándar en español para Χετταῖοι. Mantiene la correspondencia histórica y bíblica del término.
- source_word: ἐξολοθρευθήσονται
  english_pob_choice: will be utterly destroyed
  chosen_spanish: serán totalmente destruidos
  alternatives_spanish:
  - serán exterminados por completo
  - serán aniquilados
  lexicon: ἐξολοθρεύω
  rationale: «Totalmente destruidos» conserva la intensidad totalizante de ἐξολοθρευθήσονται sin recurrir a un término excesivamente técnico o más fuerte de lo que exige el texto. «Exterminados» podría sonar más duro y menos neutral en español contemporáneo.
theological_decisions:
- issue: Destino colectivo de pueblos/linajes en lenguaje profético
  english_pob_reading: Then the seed of Canaan will perish... all the Cappadocians will perish, and all the Hittites will be utterly destroyed.
  chosen_spanish_reading: Entonces perecerá la descendencia de Canaán... todos los capadocios perecerán, y todos los hititas serán totalmente destruidos.
  alternative_spanish_readings:
  - Entonces será destruida la descendencia de Canaán...
  - Entonces desaparecerá la descendencia de Canaán...
  rationale: Conservo el paralelismo de juicio colectivo del original sin suavizarlo ni añadir explicaciones interpretativas. «Perecerá» y «serán totalmente destruidos» mantienen el tono de sentencia histórica/escatológica presente en el texto.
  doctrine_reference: Lenguaje profético de juicio; mantener la fuerza del oráculo sin armonización doctrinal artificial.
translation_notes:
  revision_awareness: La versión española refleja la revisión auditada del inglés POB que corrigió «for Amalek» a «in Amalek»; por eso se traduce «en Amalec». No se introducen otras expansiones ni suavizaciones que el texto fuente no justifica.
  spanish_consistency_notes:
  - Se preserva «Yahvé»/«Mesías» como norma del proyecto cuando aparezcan; este versículo no los contiene.
  - Se usa un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - «Capadocios» e «hititas» mantienen los etnónimos estándar en español, coherentes con el paralelismo del griego.
