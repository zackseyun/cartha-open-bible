    unchanged: false
    changes_summary: Replaced 'in him' with 'by it' to reflect the Greek more naturally and avoid an ambiguous masculine pronoun; added a comma for readability. Retained 'will be glorified' and 'for Israel' as in the draft.
translation:
  language: es
  text: Entonces se glorificará un gran signo para Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel tiempo
  lexicon: τότε
  rationale: Marca una secuencia temporal simple; «Entonces» es natural en español y conserva el avance narrativo sin añadir interpretaciones.
- source_word: σημεῖον
  english_pob_choice: a great sign
  chosen_spanish: un gran signo
  alternatives_spanish:
  - una gran señal
  - un gran prodigio
  lexicon: σημεῖον
  rationale: «Signo» mantiene el valor amplio del término sin fijarlo de antemano como milagro, y respeta la elección inglesa de «sign».
- source_word: ἐνδοξασθήσεται
  english_pob_choice: will be glorified
  chosen_spanish: se glorificará
  alternatives_spanish:
  - será glorificado
  - será hecho glorioso
  lexicon: ἐνδοξάζω
  rationale: La pasiva griega admite tanto pasivo como medio-reflexivo; en español «se glorificará» conserva la idea de manifestación de gloria de forma natural y cercana al inglés POB.
- source_word: τῷ Ἰσραήλ
  english_pob_choice: for Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - en favor de Israel
  - a Israel
  lexicon: Israel
  rationale: La preposición griega dative here puede expresar beneficio o referencia; «para Israel» sigue la lectura inglesa y funciona bien en español sin forzar un dativo específico.
theological_decisions:
- issue: Naturaleza del «signo» y su relación con Israel
  english_pob_reading: a great sign will be glorified for Israel
  chosen_spanish_reading: un gran signo se glorificará para Israel
  alternative_spanish_readings:
  - un gran signo será glorificado para Israel
  - para Israel se glorificará un gran signo
  rationale: 'Se mantiene la ambigüedad del texto breve: no se explicita qué clase de signo es ni cómo se cumple; sólo se conserva su orientación hacia Israel. La formulación evita añadir contenido doctrinal no presente en este versículo aislado.'
  doctrine_reference: Economía de la revelación / no adición de contenido extratextual
translation_notes:
  revision_awareness: La revisión inglesa más reciente amplió el contexto con una cláusula explicativa sobre el Señor Dios, pero el paquete fuente de este versículo aislado contiene sólo la cláusula breve transmitida por el griego. Por ello, la traducción española sigue estrictamente la unidad textual disponible y no incorpora material ausente del texto fuente del registro.
  spanish_consistency_notes:
  - Se usa «signo» como término base para σημεῖον, consistente con una traducción transparente y con la elección inglesa de «sign».
  - Se evita «SEÑOR» o «Mesías» porque no aparecen en el texto griego de esta unidad.
  - La sintaxis española prioriza claridad y naturalidad sin expandir el contenido del fragmento.
