source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: Τότε δοθήσεται⁴⁸ πάντα τὰ πνεύματα τῆς πλάνης⁴⁹ εἰς καταπάτησιν⁵⁰ καὶ οἱ⁵¹ ἄνθρωποι⁵² βασιλεύσουσιν⁵³ τῶν⁵⁴ πονηρῶν πνευμάτων⁵⁵.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/006/006.yaml
  text: Then all the spirits of deceit will be given over to trampling, and men will rule over the evil spirits.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:52Z'
    unchanged: false
    changes_summary: Revised 'to be trampled down' to 'to trampling' for a closer rendering of εἰς καταπάτησιν while keeping natural formal English. No other changes needed.
translation:
  language: es
  text: Entonces todos los espíritus de engaño serán entregados al pisoteo, y los hombres gobernarán sobre los espíritus malignos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεύματα τῆς πλάνης
  english_pob_choice: the spirits of deceit
  chosen_spanish: los espíritus de engaño
  alternatives_spanish:
  - los espíritus de error
  - los espíritus de la mentira
  lexicon: πνεῦμα; πλάνη
  rationale: «Engaño» conserva bien la relación con πλάνη y resulta natural en español; evita hacer la frase más abstracta de lo que exige el griego.
- source_word: δοθήσεται ... εἰς καταπάτησιν
  english_pob_choice: will be given over to trampling
  chosen_spanish: serán entregados al pisoteo
  alternatives_spanish:
  - serán dados al pisoteo
  - serán entregados para ser pisoteados
  lexicon: δίδωμι; καταπάτησις
  rationale: «Entregados al pisoteo» mantiene la idea de ser puestos bajo sometimiento/destrucción expresada por εἰς καταπάτησιν sin convertirla en una paráfrasis más explícita que el griego.
- source_word: ἄνθρωποι βασιλεύσουσιν
  english_pob_choice: men will rule
  chosen_spanish: los hombres gobernarán
  alternatives_spanish:
  - los hombres reinarán
  - la humanidad gobernará
  lexicon: ἄνθρωπος; βασιλεύω
  rationale: «Gobernarán» comunica el verbo βασιλεύσουσιν de forma clara y digna. Se prefirió «los hombres» para reflejar el plural humano del texto, como en el inglés POB.
- source_word: πονηρῶν πνευμάτων
  english_pob_choice: the evil spirits
  chosen_spanish: los espíritus malignos
  alternatives_spanish:
  - los espíritus malos
  - los espíritus perversos
  lexicon: πονηρός; πνεῦμα
  rationale: «Malignos» reproduce el valor moral negativo de πονηρός con un registro sobrio; evita la posible ambigüedad de «malos» en español.
theological_decisions:
- issue: Destino de los espíritus de engaño
  english_pob_reading: will be given over to trampling
  chosen_spanish_reading: serán entregados al pisoteo
  alternative_spanish_readings:
  - serán puestos bajo pisoteo
  - serán entregados para ser pisoteados
  rationale: Se conserva la imagen de derrota y humillación sin suavizarla. «Pisoteo» mantiene la fuerza del sustantivo griego καταπάτησις y no introduce una doctrina adicional sobre el modo exacto de destrucción.
  doctrine_reference: Eschatology / judgment imagery
translation_notes:
  revision_awareness: The English audit trail revised 'to be trampled down' to 'to trampling' for closer alignment with εἰς καταπάτησιν. The Spanish draft follows that decision with the noun phrase «al pisoteo», preserving the same nominal force and avoiding a more interpretive passive construction.
  spanish_consistency_notes:
  - Se mantuvo «espíritus» en sentido espiritual, no físico.
  - Se evitó «SEÑOR»/«Cristo» y otros términos no presentes en el verso.
  - El paralelismo de dos cláusulas coordinadas se conserva con «Entonces ... y ...».
