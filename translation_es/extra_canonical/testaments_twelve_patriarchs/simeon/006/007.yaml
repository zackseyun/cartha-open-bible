  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: Τότε ἀναστησόμαι⁵⁶ κἀγὼ⁵⁷ ἐν⁵⁸ εὐφροσύνῃ καὶ εὐλογήσω⁵⁹ τὸν ὕψιστον ἐπὶ⁶⁰ τοῖς θαυμασίοις αὐτοῦ [ὅτι ὁ⁶¹ Θεὸς σῶμα λαβών, καὶ⁶² συνεσθίων ἀνθρώποις *ἔσωσεν ἀνθρώπους⁶³].
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/006/007.yaml
  text: Then I also will arise in gladness, and I will bless the Most High for his wonders [because God, having taken a body and eaten with men, saved men].
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:58:24Z'
    unchanged: false
    changes_summary: Added the bracketed clause present in the Greek source, which was omitted in the draft. Kept the formal tone and close rendering of the participial construction.
translation:
  language: es
  text: Entonces yo también me levantaré con alegría, y bendeciré al Altísimo por sus maravillas [porque Dios, habiendo tomado un cuerpo y comiendo con los hombres, salvó a los hombres].
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναστησόμαι
  english_pob_choice: I will arise
  chosen_spanish: me levantaré
  alternatives_spanish:
  - resurgiré
  - me alzaré
  lexicon: ἀνίστημι
  rationale: En este contexto futurado y voluntativo, «me levantaré» comunica el movimiento de ponerse en pie o alzarse con naturalidad en español sin perder la imagen verbal del griego.
- source_word: ἐν εὐφροσύνῃ
  english_pob_choice: in gladness
  chosen_spanish: con alegría
  alternatives_spanish:
  - en alegría
  - con gozo
  lexicon: εὐφροσύνη
  rationale: «Alegría» mantiene el sentido de gozo festivo y es más idiomático en español que un calco literal de «en regocijo».
- source_word: τὸν ὕψιστον
  english_pob_choice: the Most High
  chosen_spanish: al Altísimo
  alternatives_spanish:
  - al Dios Altísimo
  - al Supremo
  lexicon: ὕψιστος
  rationale: «Altísimo» es la forma española estable para el título divino y conserva el valor reverencial del original.
- source_word: θαυμασίοις
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - prodigios
  - obras maravillosas
  lexicon: θαύμασιον
  rationale: «Maravillas» es la equivalencia más natural y cultual en español para las obras portentosas de Dios.
- source_word: σῶμα λαβών
  english_pob_choice: having taken a body
  chosen_spanish: habiendo tomado un cuerpo
  alternatives_spanish:
  - habiendo asumido un cuerpo
  - tomando cuerpo
  lexicon: σῶμα
  rationale: La construcción participial se conserva de forma transparente; «tomado un cuerpo» evita sobreexplicar una cristología más definida de lo que el griego inmediato exige.
- source_word: συνεσθίων ἀνθρώποις
  english_pob_choice: eaten with men
  chosen_spanish: comiendo con los hombres
  alternatives_spanish:
  - comiendo con la gente
  - compartiendo mesa con los hombres
  lexicon: συνεσθίω
  rationale: «Comiendo con los hombres» sigue de cerca el gesto concreto del griego y preserva el paralelismo narrativo con la encarnación/manifestación corporal.
- source_word: ἔσωσεν ἀνθρώπους
  english_pob_choice: saved men
  chosen_spanish: salvó a los hombres
  alternatives_spanish:
  - salvó a las personas
  - rescató a los hombres
  lexicon: σῴζω
  rationale: «Salvó» es la traducción directa y mantiene la fuerza soteriológica del verbo; «a los hombres» reproduce el objeto humano del texto.
theological_decisions:
- issue: Bracketed clause about God taking a body and eating with men
  english_pob_reading: Included in the revision as an authentic clause from the Greek source.
  chosen_spanish_reading: Incluido en el texto español entre corchetes, como cláusula auténtica del griego.
  alternative_spanish_readings:
  - Omitir la cláusula por fluidez
  - Trasladarla a nota
  rationale: La revisión inglesa añadió esta cláusula porque está presente en el griego; el español debe conservarla también para no perder el testimonio cristológico del pasaje.
  doctrine_reference: Cristología / encarnación y manifestación de Dios entre los hombres
translation_notes:
  revision_awareness: The English POB revision pass restored the bracketed clause present in the Greek source. The Spanish draft follows that revision and keeps the clause in-text rather than relegating it to a note, preserving the source-backed participial sequence.
  spanish_consistency_notes:
  - Usé «Altísimo» para ὕψιστος conforme al registro bíblico español.
  - Mantuve «hombres» porque el griego ἀνθρώποις / ἀνθρώπους apunta al referente humano general, y el contexto no exige una neutralización adicional.
  - 'Conservé el paralelismo verbal del original: levantarse, bendecir, maravillas, tomar un cuerpo, comer con los hombres, salvar a los hombres.'
