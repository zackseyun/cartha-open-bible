revisions:
- from: Y ahora, hijos míos, escuchen a Leví y a Judá, y no se engrandezcan sobre estas dos tribus, porque de ellas surgirá para nosotros la salvación de Dios. Pues el Señor levantará de Leví, como sumo sacerdote, y de Judá, como rey, [Dios y hombre]; él salvará [a todas las naciones y] al linaje de Israel. Por eso les encargo estas cosas, para que ustedes también las encarguen a sus hijos, a fin de que las guarden por todas sus generaciones.
  to: Y ahora, hijos míos, escuchen a Leví y a Judá, y no se exalten por encima de estas dos tribus, porque de ellas surgirá para nosotros la salvación de Dios. Pues el Señor levantará de Leví, como sumo sacerdote, y de Judá, como rey, [Dios y hombre][a]; él salvará [a todas las naciones y][b] al linaje[c] de Israel. Por eso les encargo estas cosas, para que ustedes también las encarguen a sus hijos, a fin de que las guarden a lo largo de sus generaciones.
