translation:
  language: es
  text: Y ahora, hijos míos, escuchen a Leví y a Judá, y no se engrandezcan sobre estas dos tribus, porque de ellas surgirá para nosotros la salvación de Dios. Pues el Señor levantará de Leví, como sumo sacerdote, y de Judá, como rey, [Dios y hombre]; él salvará [a todas las naciones y] al linaje de Israel. Por eso les encargo estas cosas, para que ustedes también las encarguen a sus hijos, a fin de que las guarden por todas sus generaciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπακούσατε
  english_pob_choice: listen to
  chosen_spanish: escuchen a
  alternatives_spanish:
  - presten oído a
  - escuchen
  lexicon: BDAG
  rationale: El imperativo pide atención receptiva; en español, «escuchen a» mantiene el tono exhortativo directo sin volverlo más duro de lo que exige el contexto.
- source_word: μὴ ἐπαίρεσθε
  english_pob_choice: do not exalt yourselves over
  chosen_spanish: no se engrandezcan sobre
  alternatives_spanish:
  - no se exalten sobre
  - no se vuelvan orgullosos frente a
  lexicon: LSJ
  rationale: La idea central es de autoexaltación comparativa. «No se engrandezcan sobre» preserva la relación con las dos tribus y comunica la advertencia contra la soberbia.
- source_word: γενεὰς
  english_pob_choice: tribes
  chosen_spanish: tribus
  alternatives_spanish:
  - generaciones
  - linajes
  lexicon: LSJ
  rationale: Aunque el término puede significar «generaciones», aquí el contexto señala a Leví y Judá como grupos de linaje dentro de Israel; «tribus» comunica mejor el referente inmediato.
- source_word: τὸ σωτήριον τοῦ Θεοῦ
  english_pob_choice: the salvation of God
  chosen_spanish: la salvación de Dios
  alternatives_spanish:
  - la salvación que viene de Dios
  - el rescate de Dios
  lexicon: BDAG
  rationale: Se conserva la fórmula solemne y la conexión temática con el verbo «salvar» del versículo siguiente.
- source_word: ἀναστήσει
  english_pob_choice: will raise up
  chosen_spanish: levantará
  alternatives_spanish:
  - hará surgir
  - alzará
  lexicon: BDAG
  rationale: «Levantar» reproduce bien el idiomático lenguaje profético de Dios suscitando una figura de autoridad.
- source_word: ἀρχιερέα
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - sumo pontífice
  lexicon: BDAG
  rationale: «Sumo sacerdote» es la equivalencia natural y precisa en español para el oficio cultual.
- source_word: βασιλέα
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - gobernante
  - monarca
  lexicon: BDAG
  rationale: Se mantiene el título real concreto y tradicional.
- source_word: Θεὸν καὶ ἄνθρωπον
  english_pob_choice: '[God and man]'
  chosen_spanish: '[Dios y hombre]'
  alternatives_spanish:
  - '[divino y humano]'
  - '[Dios y ser humano]'
  lexicon: source-text bracketed Greek witness
  rationale: La frase aparece bracketed en el testimonio griego y debe conservarse visible en español para no ocultar la incertidumbre textual. Se traduce de manera literal para no resolverla doctrinalmente.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: '[all the nations and]'
  chosen_spanish: '[a todas las naciones y]'
  alternatives_spanish:
  - '[a todos los pueblos y]'
  - '[a los gentiles y]'
  lexicon: source-text bracketed Greek witness
  rationale: Se mantiene el corchete como señal de variante textual. «Naciones» conserva el alcance amplio y evita restringir el sentido a una categoría técnica de contraste.
- source_word: σώσει
  english_pob_choice: he will save
  chosen_spanish: él salvará
  alternatives_spanish:
  - él librará
  - él rescatará
  lexicon: BDAG
  rationale: Se conserva la raíz de salvación para mantener la relación léxica con σωτήριον.
- source_word: τὸ γένος τοῦ Ἰσραήλ
  english_pob_choice: the race of Israel
  chosen_spanish: el linaje de Israel
  alternatives_spanish:
  - el pueblo de Israel
  - la estirpe de Israel
  lexicon: LSJ
  rationale: γένος resalta ascendencia, descendencia o grupo de parentesco; «linaje» comunica esa carga genealógica con mayor naturalidad que «raza» en español actual.
- source_word: φυλάξωσιν
  english_pob_choice: may keep
  chosen_spanish: las guarden
  alternatives_spanish:
  - las observen
  - las conserven
  lexicon: BDAG
  rationale: En contexto de mandatos, «guardar» expresa tanto obedecer como preservar las instrucciones transmitidas a la siguiente generación.
theological_decisions:
- issue: Frase bracketed Θεὸν καὶ ἄνθρωπον
  english_pob_reading: Retained in the main text as [God and man]
  chosen_spanish_reading: Retenida en el texto principal como [Dios y hombre]
  alternative_spanish_readings:
  - Omitirla por tratarse de una posible expansión secundaria
  - Verterla de manera interpretativa como «[divino y humano]»
  rationale: El testimonio griego la presenta entre corchetes, señal de incertidumbre textual o expansión posterior posible. En coherencia con la transparencia POB, se traduce y se conserva visible sin intentar armonizarla con formulaciones doctrinales posteriores.
  doctrine_reference: Primacía del testimonio textual; preservar la tensión en lugar de resolverla.
- issue: Frase bracketed πάντα τὰ ἔθνη
  english_pob_reading: Retained in the main text as [all the nations and]
  chosen_spanish_reading: Retenida en el texto principal como [a todas las naciones y]
  alternative_spanish_readings:
  - Omitirla como expansión secundaria
  - Verterla como «[a los gentiles y]»
  rationale: La forma entre corchetes debe permanecer visible para reflejar la inestabilidad textual. «Naciones» mantiene un alcance potencialmente universal sin introducir una lectura técnica más estrecha de «gentiles».
  doctrine_reference: Transparencia textual y respeto por la amplitud semántica del original.
translation_notes:
  revision_awareness: Se siguió el testimonio griego suministrado y el aparato inglés POB, manteniendo las frases entre corchetes como parte visible del texto por transparencia textual. No se introdujeron notas adicionales porque los corchetes ya señalan las variantes relevantes y no hay ambigüedades nuevas que requieran anclaje separado en español.
  spanish_consistency_notes:
  - Se usó «Dios» para Θεός y «Señor» para Κύριος según el contexto.
  - Se mantuvo «salvación»/«salvará» para conservar la relación léxica entre σωτήριον y σώσει.
  - Se optó por «linaje» para γένος en lugar de «raza» porque en español contemporáneo suena más natural y evita malentendidos, sin perder el matiz genealógico.
  - No se añadieron notas al pie porque las únicas variantes textuales necesarias ya están marcadas con corchetes en el cuerpo del texto.
