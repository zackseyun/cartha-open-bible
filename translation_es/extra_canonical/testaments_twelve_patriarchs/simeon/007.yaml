    text: The Greek witness includes this phrase in brackets, suggesting textual uncertainty or possible later expansion. It is translated here for transparency rather than silently omitted.
    reason: textual_variant
  - marker: '[all the nations and]'
    text: This phrase is bracketed in the Greek witness and may reflect a textual expansion. The main text retains it with brackets to show the uncertainty.
    reason: textual_variant
  - marker: the race of Israel
    text: Or 'the people of Israel.' The Greek γένος emphasizes lineage or kin-group.
    reason: lexical_alternative
