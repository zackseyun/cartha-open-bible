    text: O «el pueblo de Israel». El griego γένος enfatiza linaje, ascendencia o grupo de parentesco.
    reason: lexical_alternative
  revision_rationale: 'La revisión hace tres ajustes: mejora la naturalidad de la advertencia contra la soberbia («no se exalten por encima de»), afina la fluidez final («a lo largo de sus generaciones»), y añade las notas requeridas para la transparencia textual y léxica ya presentes en la auditoría inglesa. No se introducen cambios doctrinales ni se altera la estructura del original.'
