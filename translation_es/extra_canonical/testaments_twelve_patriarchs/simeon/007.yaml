base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/007.yaml
  text: And now[[God and man]], my children, listen to Levi and to Judah, and do not exalt yourselves over these two tribes, because from them the salvation of God will arise for us. For the Lord will raise up from Levi as a high priest, and from Judah as a king, [God and man]; he will save [all the nations and] the race of Israel[[all the nations and]]. Therefore I command these things to you, so that you also may command your children[the race of Israel], that they may keep them throughout their generations.
  footnotes:
  - marker: '[God and man]'
    text: The Greek witness includes this phrase in brackets, suggesting textual uncertainty or possible later expansion. It is translated here for transparency rather than silently omitted.
    reason: textual_variant
  - marker: '[all the nations and]'
    text: This phrase is bracketed in the Greek witness and may reflect a textual expansion. The main text retains it with brackets to show the uncertainty.
    reason: textual_variant
  - marker: the race of Israel
    text: Or 'the people of Israel.' The Greek γένος emphasizes lineage or kin-group.
    reason: lexical_alternative
