base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/simeon/003.yaml
  text: And now[a], my children, hear me, and guard yourselves from the spirit of deceit and envy. For envy masters a man's whole mind, and does not allow him either to eat or to drink or to do anything good. But it is always urging him to kill the one envied; and while the one envied is always flourishing, the one who envies wastes away[b]. For two years, then, in the fear of the Lord I afflicted my soul with fasting, and I learned that release from envy comes through the fear of God. For if anyone flees for refuge to the Lord, the evil spirit runs away from him, and his mind becomes light. And from then on he has compassion on the one envied, and forgives those who love him[c], and so he ceases from envy.
  footnotes:
  - marker: a
    text: Or 'spirit of error' or 'spirit of delusion.' The Greek πλάνη can denote both deception and wandering into error.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the one envied ... the one envying.' The Greek sharpens the contrast between the target of envy and the envious person.
    reason: lexical_alternative
  - marker: c
    text: '''Those who love him'' may refer either to the person formerly envied or to the one being healed from envy; the Greek pronoun is brief and contextually compressed.'
    reason: alternative_reading
