translation:
  language: es
  text: Y ahora, hijos míos, escúchenme y guárdense del espíritu de engaño y de envidia.[a] Porque la envidia domina toda la mente del hombre y no le permite ni comer, ni beber, ni hacer nada bueno. Pero siempre lo impulsa a matar al envidiado; y mientras el envidiado siempre florece, el que envidia se consume.[b] Durante dos años, pues, en el temor del Señor afligí mi alma con ayuno, y aprendí que la liberación de la envidia viene por el temor de Dios. Porque si alguno huye para refugiarse en el Señor, el espíritu malo huye de él, y su mente se vuelve ligera. Y desde entonces tiene compasión del envidiado, y perdona a los que lo aman[c], y así deja de envidiar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espíritu de error» o «espíritu de extravío». El griego πλάνη puede denotar tanto engaño como desviación hacia el error.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el envidiado ... el que envidia». El griego acentúa el contraste entre la persona objeto de envidia y la persona envidiosa.
    reason: lexical_alternative
  - marker: c
    text: «Los que lo aman» puede referirse al antes envidiado o a la persona que está siendo sanada de la envidia; el pronombre griego es breve y comprimido por el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: Καὶ νῦν ... φυλάξασθε ἀπὸ
  english_pob_choice: And now ... guard yourselves from
  chosen_spanish: Y ahora ... guárdense de
  alternatives_spanish:
  - y ahora ... cuídense de
  - y ahora ... manténganse apartados de
  lexicon: LSJ
  rationale: La exhortación es directa y paternal; «guárdense» conserva el valor reflexivo e imperativo de φυλάξασθε con una vigilancia moral activa, más cercana al tono del texto que un simple «cuídense».
- source_word: πνεύματος τῆς πλάνης
  english_pob_choice: spirit of deceit
  chosen_spanish: espíritu de engaño
  alternatives_spanish:
  - espíritu de error
  - espíritu de engaño o extravío
  - espíritu de delusión
  lexicon: LSJ
  rationale: πλάνη puede significar error, engaño o extravío. En este contexto moral, unido a la envidia como poder corruptor, «engaño» comunica mejor la fuerza ética del pasaje que una mera equivocación intelectual.
- source_word: φθόνος
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  lexicon: LSJ
  rationale: Se mantiene el término estable en todo el pasaje. «Envidia» expresa mejor el resentimiento hostil ante el bien ajeno que «celos» en español.
- source_word: κυριεύει πάσης τῆς διανοίας
  english_pob_choice: masters a man's whole mind
  chosen_spanish: domina toda la mente del hombre
  alternatives_spanish:
  - se enseñorea de toda la mente del hombre
  - rige toda la mente del hombre
  lexicon: LSJ
  rationale: κυριεύει implica dominio, y «domina» transmite esa fuerza con naturalidad. διάνοια aquí es la facultad de pensamiento e intención; «mente» es la equivalencia más clara en español.
- source_word: οὐκ ἀφίησιν
  english_pob_choice: does not allow
  chosen_spanish: no le permite
  alternatives_spanish:
  - no le deja
  - no le concede
  lexicon: LSJ
  rationale: El verbo expresa restricción o impedimento; «no le permite» conserva el sentido de coerción interna sin volver la frase pesada.
- source_word: ὑποβάλλει
  english_pob_choice: is always urging
  chosen_spanish: siempre lo impulsa
  alternatives_spanish:
  - siempre lo incita
  - siempre lo mueve a
  lexicon: LSJ
  rationale: El verbo señala una sugestión continua hacia una acción mala. «Impulsa» reproduce bien esa presión persistente sin sobrecargar el texto.
- source_word: ἀνελεῖν
  english_pob_choice: to kill
  chosen_spanish: matar
  alternatives_spanish:
  - destruir
  - quitar de en medio
  lexicon: LSJ
  rationale: La violencia del infinitivo griego debe mantenerse. «Matar» es la opción más directa y fiel.
- source_word: ὁ φθονούμενος / ὁ φθονῶν
  english_pob_choice: the one envied / the one who envies
  chosen_spanish: el envidiado / el que envidia
  alternatives_spanish:
  - el objeto de envidia / el envidioso
  - el envidiado / el envidioso
  lexicon: LSJ
  rationale: Se conserva la contraposición fuerte del griego entre la persona que recibe la envidia y la que la ejerce. El español permite sostenerla sin perder claridad.
- source_word: ἀνθεῖ
  english_pob_choice: is always flourishing
  chosen_spanish: siempre florece
  alternatives_spanish:
  - prospera siempre
  - está siempre floreciendo
  lexicon: LSJ
  rationale: La imagen botánica se preserva con «florece», igualando el contraste figurado con el desgaste del envidioso.
- source_word: μαραίνεται
  english_pob_choice: wastes away
  chosen_spanish: se consume
  alternatives_spanish:
  - se marchita
  - se desvanece
  lexicon: LSJ
  rationale: «Se consume» expresa deterioro interior y desgaste vital, y en español funciona bien frente a «florece».
- source_word: ἐκάκωσα τὴν ψυχήν μου
  english_pob_choice: I afflicted my soul
  chosen_spanish: afligí mi alma
  alternatives_spanish:
  - humillé mi alma
  - castigué mi alma
  lexicon: LSJ
  rationale: La fórmula ascética es severa y debe conservarse. «Afligí mi alma» mantiene la gravedad del idiomatismo sin suavizarlo.
- source_word: ἐν νηστείᾳ
  english_pob_choice: with fasting
  chosen_spanish: con ayuno
  alternatives_spanish:
  - mediante ayuno
  - en ayuno
  lexicon: LSJ
  rationale: La preposición instrumental se expresa naturalmente en español con «con ayuno», manteniendo el medio ascético.
- source_word: λύσις τοῦ φθόνου
  english_pob_choice: release from envy
  chosen_spanish: la liberación de la envidia
  alternatives_spanish:
  - el alivio de la envidia
  - la liberación del envidiar
  lexicon: LSJ
  rationale: λύσις tiene sentido de liberación o soltura. «Liberación de la envidia» conserva la imagen de ser desatado de un vicio atador.
- source_word: καταφύγῃ
  english_pob_choice: flees for refuge to
  chosen_spanish: huye para refugiarse en
  alternatives_spanish:
  - se refugia en
  - acude en busca de refugio a
  lexicon: LSJ
  rationale: La imagen incluye movimiento urgente hacia un lugar seguro. «Huye para refugiarse en» conserva ese impulso y el carácter de dependencia.
- source_word: ἀποτρέχει
  english_pob_choice: runs away
  chosen_spanish: huye
  alternatives_spanish:
  - sale huyendo
  - se escapa
  lexicon: LSJ
  rationale: El movimiento brusco del espíritu malo queda claro con «huye», que en español suena natural y enérgico.
- source_word: κούφη
  english_pob_choice: light
  chosen_spanish: ligera
  alternatives_spanish:
  - aliviada
  - liviana
  lexicon: LSJ
  rationale: El adjetivo literal es «ligera», y preserva la metáfora de una mente descargada del peso de la envidia.
- source_word: συμπαθεῖ
  english_pob_choice: has compassion on
  chosen_spanish: tiene compasión de
  alternatives_spanish:
  - simpatiza con
  - se compadece de
  lexicon: LSJ
  rationale: El verbo expresa participación afectiva positiva. «Tiene compasión de» es claro, sobrio y fiel al giro ético del pasaje.
- source_word: συγγινώσκει
  english_pob_choice: forgives
  chosen_spanish: perdona
  alternatives_spanish:
  - muestra indulgencia con
  - les hace gracia
  lexicon: LSJ
  rationale: En este contexto moral, el verbo se acerca a perdonar o excusar. «Perdona» es la equivalencia más inteligible y fuerte en español.
- source_word: τοῖς ἀγαπῶσιν αὐτόν
  english_pob_choice: those who love him
  chosen_spanish: a los que lo aman
  alternatives_spanish:
  - a los que le aman
  - a los que aman a ese hombre
  lexicon: LSJ
  rationale: Se conserva la lectura más directa del griego. La referencia del pronombre es algo comprimida en el texto; el español mantiene la ambigüedad suficiente con una nota.
theological_decisions:
- issue: πνεῦμα τῆς πλάνης como fuerza moral-personal
  english_pob_reading: spirit of deceit
  chosen_spanish_reading: espíritu de engaño
  alternative_spanish_readings:
  - espíritu de error
  - espíritu de delusión
  rationale: El pasaje personifica la envidia como poder espiritual corruptor. «Espíritu de engaño» preserva esa tensión sin reducir πλάνη a simple equivocación mental.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
- issue: κύριος y θεός en contexto exhortativo
  english_pob_reading: the Lord / God
  chosen_spanish_reading: el Señor / Dios
  alternative_spanish_readings:
  - Yahvé / Dios
  rationale: Aquí κύριος y θεός funcionan como títulos reverenciales en un contexto paraenético. En español, «el Señor» mantiene el registro bíblico esperado sin introducir una cita directa del Nombre divino.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; preserve source-language primacy'
- issue: τὸ πονηρὸν πνεῦμα como entidad personal
  english_pob_reading: the evil spirit
  chosen_spanish_reading: el espíritu malo
  alternative_spanish_readings:
  - el espíritu maligno
  - un espíritu malo
  rationale: El artículo sugiere una expresión definida, y el texto presenta el mal como fuerza espiritual activa. «El espíritu malo» conserva esa personificación sin convertirla en mera metáfora psicológica.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El audit trail inglés fue revisado para acercar la segunda cláusula al participio griego («the one envied») y para eliminar la repetición innecesaria del artículo antes de «envy». La versión española sigue esa misma línea, manteniendo la oposición entre «el envidiado» y «el que envidia», y conserva la condensación pronominal de la última cláusula con una nota.
  spanish_consistency_notes:
  - Se usa «envidia» de forma estable para φθόνος en todo el pasaje.
  - Se conserva el contraste figurado «florece / se consume» para mantener la antítesis del griego.
  - «Espíritu malo» se mantiene literal para τὸ πονηρὸν πνεῦμα y no se suaviza a mera inclinación moral.
  - Se emplea «el Señor» como traducción de κύριος, conforme al criterio del proyecto.
  - La ambigüedad del pronombre en «a los que lo aman» queda señalada en nota sin alterar el texto principal.
