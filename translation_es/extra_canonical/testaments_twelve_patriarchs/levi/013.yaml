base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/013.yaml
  text: '1[13:4]. And now, my children, I command you: fear the Lord your God with all your heart, and walk in sincerity according to all his law. 2. And you also, teach your children letters, so that they may have understanding throughout all their life, reading the law of God without ceasing. 3. For everyone who comes to know the law of the Lord will be honored, and he will not be a stranger wherever he goes. 4[13:5]. Indeed, he will gain many friends more than parents, and many among men will desire to serve him and to hear the law from his mouth. 5. Therefore do righteousness, my children, upon the earth, so that you may find it in the heavens. 6. And sow good things in your souls, and you will find them in your life. But if you sow evil things, you will reap every turmoil and affliction. 7. Acquire wisdom in the fear of God, because if captivity comes, and cities and lands are destroyed, and gold and silver and every possession perishes, no one can take away the wise man''s wisdom,
    except the blindness of ungodliness and the hardening of sin. 8. For if anyone keeps himself from these evil works, then wisdom will become for him splendid even among enemies, and in a foreign land a homeland, and in the midst of foes he will be found a friend. 9. Everyone who teaches good things and does them will share the throne of kings[13:8], just as Joseph my brother also did.'
  footnotes:
  - marker: '13:4'
    text: The phrase 'many friends more than parents' is difficult. It likely means that the learned person gains many friends beyond the circle of family, or more than one ordinarily receives from parental standing alone.
    reason: lexical_alternative
  - marker: '13:5'
    text: Greek literally, 'do righteousness ... that you may find [it] in the heavens.' The object after 'find' is implicit.
    reason: alternative_reading
  - marker: '13:8'
    text: 'The Greek is highly compressed: wisdom becomes ''splendid among enemies,'' and a person finds ''homeland'' even in foreign territory.'
    reason: lexical_alternative
