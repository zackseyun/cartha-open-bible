translation:
  language: es
  text: '1. Y ahora, hijos míos, les ordeno: teman a Yahvé su Dios con todo su corazón, y caminen con sinceridad según toda su ley. 2. Y también ustedes, enseñen a sus hijos las letras[a], para que tengan entendimiento durante toda su vida, leyendo sin cesar la ley de Dios. 3. Porque todo el que llega a conocer la ley de Yahvé será honrado, y no será un extranjero dondequiera que vaya. 4. De hecho, ganará muchos amigos más que los padres[b], y muchos entre los hombres desearán servirle y oír la ley de su boca. 5. Por tanto, practiquen la justicia, hijos míos, sobre la tierra, para que la encuentren en los cielos[c]. 6. Y siembren cosas buenas en sus almas, y las encontrarán en su vida. Pero si siembran cosas malas, cosecharán toda turbación y aflicción. 7. Adquieran sabiduría en el temor de Dios, porque si llega el cautiverio, y son destruidas las ciudades y las tierras, y perecen el oro, la plata y toda posesión, a la sabiduría del sabio nadie puede arrebatársela, excepto la ceguera de
    la impiedad y el endurecimiento del pecado. 8. Porque si alguien se guarda de estas malas obras, entonces la sabiduría será para él resplandeciente aun entre enemigos, y en tierra ajena, patria[d], y en medio de enemigos será hallado como amigo. 9. Todo el que enseña cosas buenas y las practica compartirá el trono de los reyes, así como también lo hizo José, mi hermano.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Las letras'' conserva el sentido concreto del griego γράμματα: aprender a leer como base para leer la ley sin cesar.'
    reason: lexical_alternative
  - marker: b
    text: La expresión griega es difícil. Puede significar que la persona instruida ganará muchos amigos más allá del círculo familiar, o que ganará más de los que normalmente se reciben por la posición de los padres.
    reason: lexical_alternative
  - marker: c
    text: 'El griego es literal: ''practiquen la justicia ... para que la encuentren en los cielos''. El objeto de ''encontrar'' queda implícito en el original.'
    reason: alternative_reading
  - marker: d
    text: 'La frase griega es muy comprimida: la sabiduría se vuelve ''resplandeciente aun entre enemigos'', y en tierra extraña aparece como patria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁπλότης
  english_pob_choice: sincerity
  chosen_spanish: sinceridad
  alternatives_spanish:
  - simplicidad
  - integridad
  - singularidad de corazón
  lexicon: LSJ
  rationale: El griego apunta a una conducta sin doblez, recta y no dividida. 'Sinceridad' comunica bien esa idea en español contemporáneo y sigue el ajuste del POB inglés hacia 'sincerity' en este contexto moral.
- source_word: γράμματα
  english_pob_choice: letters
  chosen_spanish: las letras
  alternatives_spanish:
  - la lectura
  - las letras del alfabeto
  - la instrucción básica
  lexicon: LSJ
  rationale: La referencia más concreta es al aprendizaje de las letras como base de la alfabetización y de la lectura continua de la ley. 'Las letras' conserva esa concreción sin volverlo abstracto.
- source_word: σύνεσις
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - insight
  - discernimiento
  - comprensión
  lexicon: LSJ
  rationale: En el contexto educativo y moral, 'entendimiento' es natural en español y abarca la capacidad de comprender con madurez.
- source_word: ξένος
  english_pob_choice: stranger
  chosen_spanish: extranjero
  alternatives_spanish:
  - forastero
  - extraño
  - foráneo
  lexicon: LSJ
  rationale: Aunque 'stranger' puede ser 'forastero', aquí el paralelo con el ir y venir social favorece 'extranjero', que expresa bien la falta de condición ajena en cualquier lugar.
- source_word: δουλεῦσαι
  english_pob_choice: serve
  chosen_spanish: servir
  alternatives_spanish:
  - esclavizarse
  - estar al servicio de
  - rendir servicio
  lexicon: LSJ
  rationale: 'En este pasaje la acción es voluntaria y honorífica: muchos querrán atender al sabio y escucharle. ''Servir'' reproduce ese matiz mejor que ''esclavizarse''.'
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  - righteousness transliterado no aplica
  lexicon: BDAG
  rationale: Aquí la exhortación es a obrar rectamente ante Dios. En español, 'justicia' mantiene el peso ético y bíblico del término; 'rectitud' también sería posible, pero 'justicia' conecta mejor con el paralelismo y con el destino celeste del dicho.
- source_word: ψυχαῖς
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - vidas
  - seres
  - interior
  lexicon: LSJ
  rationale: Se conserva el lenguaje antropológico del griego. 'Almas' mantiene la metáfora de sembrar en el interior de la persona.
- source_word: ταραχή
  english_pob_choice: turmoil
  chosen_spanish: turbación
  alternatives_spanish:
  - turbulencia
  - trastorno
  - confusión
  lexicon: LSJ
  rationale: '''Turbación'' refleja bien el desorden, la agitación y la inquietud que el texto promete como cosecha del mal; funciona mejor que ''problema'' o ''confusión'' en esta enumeración.'
- source_word: κτήσασθε
  english_pob_choice: acquire
  chosen_spanish: adquieran
  alternatives_spanish:
  - obtengan
  - consigan
  - ganen
  lexicon: LSJ
  rationale: Es un imperativo fuerte de apropiarse de la sabiduría como bien precioso. 'Adquieran' conserva esa fuerza y el sentido de obtener algo valioso.
- source_word: φόβῳ Θεοῦ
  english_pob_choice: the fear of God
  chosen_spanish: el temor de Dios
  alternatives_spanish:
  - la reverencia a Dios
  - el respeto por Dios
  lexicon: LSJ
  rationale: Se conserva la fórmula bíblica tradicional y su densidad moral; en español, 'temor de Dios' sigue siendo clara y fiel.
- source_word: πώρωσις
  english_pob_choice: hardening
  chosen_spanish: endurecimiento
  alternatives_spanish:
  - dureza
  - insensibilidad
  - obstinación
  lexicon: BDAG
  rationale: '''Endurecimiento'' mantiene la imagen de un corazón que se vuelve inflexible y expresa bien la dimensión espiritual del término.'
- source_word: παρὰ τοῖς πολεμίοις λαμπρά
  english_pob_choice: splendid even among enemies
  chosen_spanish: resplandeciente aun entre enemigos
  alternatives_spanish:
  - gloriosa aun entre enemigos
  - luminosa aun ante los enemigos
  - brillante aun entre sus enemigos
  lexicon: LSJ
  rationale: La frase es muy comprimida; 'resplandeciente aun entre enemigos' preserva la idea de brillo/honor que permanece en contexto hostil.
- source_word: πατρίς
  english_pob_choice: homeland
  chosen_spanish: patria
  alternatives_spanish:
  - tierra natal
  - hogar
  - tierra propia
  lexicon: LSJ
  rationale: En la paradoja 'en tierra ajena, patria', 'patria' es idiomático y expresa pertenencia y arraigo. Mantiene el contraste con 'tierra ajena'.
- source_word: σύνθρονος ἔσται βασιλέων
  english_pob_choice: will share the throne of kings
  chosen_spanish: compartirá el trono de los reyes
  alternatives_spanish:
  - será entronizado con los reyes
  - se sentará en el trono con los reyes
  - compartirá el trono con reyes
  lexicon: LSJ
  rationale: La expresión griega es comprimida y apunta a compartir el trono o la condición real. 'Compartirá el trono de los reyes' sigue de cerca el POB inglés y evita inventar una pluralidad de tronos.
- source_word: ἐντέλλομαι
  english_pob_choice: I command you
  chosen_spanish: les ordeno
  alternatives_spanish:
  - les mando
  - les encargo
  - les instruyo
  lexicon: LSJ
  rationale: El verbo tiene fuerza imperativa; 'les ordeno' es natural en español y transmite la solemnidad del testamento.
theological_decisions:
- issue: YHWH / Κύριος en un texto griego testamentario
  english_pob_reading: '''the Lord your God'' reflects the divine name language of the source tradition; the English POB renders it as ''the Lord'' while remaining tied to the divine-name register.'
  chosen_spanish_reading: '''Yahvé su Dios'''
  alternative_spanish_readings:
  - el Señor su Dios
  - el Señor, su Dios
  rationale: Aunque el griego dice Κύριον, el contexto reproduce lenguaje de nombre divino de la tradición hebrea. La política del proyecto pide Yahvé para יהוה; por eso se explicita 'Yahvé' en lugar de enmascararlo como 'SEÑOR'.
  doctrine_reference: Nombrar el nombre divino de forma auditable según la política del proyecto.
- issue: '''do righteousness ... so that you may find it in the heavens'''
  english_pob_reading: The Greek leaves the object of 'find' implicit; the English preserves the reciprocity without over-specifying.
  chosen_spanish_reading: '''para que la encuentren en los cielos'''
  alternative_spanish_readings:
  - para que encuentren recompensa en los cielos
  - para que sean halladas en los cielos
  - para que allí la encuentren
  rationale: El objeto implícito puede entenderse como la justicia practicada, reencontrada como realidad o recompensa celestial. En español se conserva esa ambigüedad con 'la' sin introducir 'recompensa' ni otra especificación no garantizada por el griego.
  doctrine_reference: Preservar la tensión entre ética terrenal y correspondencia celestial sin resolverla artificialmente.
- issue: '''except the blindness of ungodliness and the hardening of sin'''
  english_pob_reading: Wisdom cannot be taken away externally; only moral-spiritual corruption can rob a person of it.
  chosen_spanish_reading: '''excepto la ceguera de la impiedad y el endurecimiento del pecado'''
  alternative_spanish_readings:
  - salvo la ceguera de la impiedad y la dureza del pecado
  - excepto la ceguera de la irreligión y la obstinación del pecado
  rationale: Se conserva el contraste entre seguridad externa de la sabiduría y su pérdida por corrupción moral. 'Ceguera' y 'endurecimiento' mantienen la fuerza ética y espiritual del pasaje.
  doctrine_reference: Mantener la advertencia moral sin convertirla en una explicación especulativa.
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión inglesa en los puntos relevantes: ἁπλότης se ha llevado a ''sinceridad'' en vez de ''simplicidad''; σύνθρονος ἔσται se refleja como ''compartirá el trono de los reyes'' en vez de una imagen plural de tronos; y la estructura de v.4 mantiene la idea de ''muchos amigos'' sin resolver la ambigüedad de ''más que los padres''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino conforme a la política del proyecto.
  - Se conserva 'sabiduría', 'justicia', 'temor de Dios' y 'ley de Dios' con terminología bíblica estable.
  - Se evita traducir δοῦλος porque aquí el verbo es δουλεῦσαι en sentido voluntario y honorífico.
  - La secuencia de v.8 conserva la compactación poética del griego sin expandirla en exceso.
