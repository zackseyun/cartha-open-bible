  text: XIII. Καὶ *νῦν, τέκνα μου¹, ἐντέλλομαι ὑμῖν, φοβεῖσθε² *Κύριον τὸν Θεὸν ὑμῶν³ Γἐξ ὅλης τῆς καρδίας ὑμῶν⁴⁾, καὶ πορεύεσθε ἐν ἁπλότητι⁵ *κατὰ πάντα τὸν νόμον αὐτοῦ⁶. 2. *Διδάξατε δὲ καὶ ὑμεῖς⁷ τὰ τέκνα ὑμῶν γράμματα⁸ ἵνα ἔχωσι⁹ σύνεσιν ἐν *πάσῃ τῇ ζωῇ αὐτῶν¹⁰, ἀναγινώσκοντες¹¹ ἀδιαλείπτως¹² τὸν νόμον τοῦ Θεοῦ¹³. 3. Ὅτι¹⁴ πᾶς, *ὃς γνώσεται¹⁵ *νόμον Κυρίου¹⁶, τιμηθήσεται, καὶ οὐκ ἔσται¹⁷ ξένος, ὅπου ὑπάγει¹⁸. 4. Καίγε πολλοὺς φίλους ὑπὲρ γονεῖς κτήσεται¹⁹ καὶ ἐπιθυμήσουσι πολλοὶ τῶν ἀνθρώπων δουλεῦσαι αὐτῷ²⁰ καὶ ἀκοῦσαι νόμου²¹ ἐκ τοῦ²² στόματος αὐτοῦ²³. 5. Ποιήσατε, Γοὖν²⁴⁾ δικαιοσύνην²⁵, τέκνα μου, ἐπὶ τῆς γῆς, ἵνα †εὕρητε²⁶ ἐν τοῖς οὐρανοῖς. 6. Καὶ σπείρατε²⁷ ἐν *ταῖς ψυχαῖς²⁸ ὑμῶν²⁹ ἀγαθὰ *καὶ εὑρήσετε³⁰ αὐτὰ³¹ *ἐν τῇ ζωῇ ὑμῶν³². *Ἐὰν δὲ σπείρητε πονηρὰ³³ *πᾶσαν ταραχὴν καὶ θλίψιν θερίσετε³⁴. 7. Σοφίαν κτήσασθε³⁵ *ἐν φόβῳ³⁶ Θεοῦ³⁷, ὅτι³⁸ ἐὰν *γένηται αἰχμαλωσία, καὶ ὀλοθρευθῶσι πόλεις καὶ χῶραι³⁹ *καὶ χρυσὸς καὶ ἄργυρος καὶ πᾶσα⁴⁰ κτῆσις⁴¹ ἀπολεῖται⁴², *τοῦ σοφοῦ τὴν σοφίαν⁴³ †οὐδεὶς⁴⁴
    δύναται⁴⁵ ἀφελέσθαι⁴⁶ εἰ μὴ τύφλωσις⁴⁷ ἀσεβείας⁴⁸ καὶ πώρωσις⁴⁹ ἁμαρτίας⁵⁰. 8. ⸀Ἐὰν γάρ τις φυλάξῃ αὐτὸν ἐκ τῶν πονηρῶν τούτων ἔργων⸀⁵¹ τότε⁵² γενήσεται⁵³ αὐτῷ σοφία⁵⁴ καὶ *παρὰ τοῖς πολεμίοις λαμπρὰ⁵⁵ καὶ ἐπὶ⁵⁶ γῆς ἀλλοτρίας⁵⁷ πατρίς, καὶ ἐν μέσῳ⁵⁸ ἐχθρῶν εὑρηθήσεται⁵⁹ φίλος. 9. *Πᾶς ὃς ἂν διδάσκει καλὰ καὶ πράττει⁶⁰ σύνθρονος ἔσται⁶¹ βασιλέων⁶², ὥσπερ⁶³ καὶ Ἰωσὴφ ὁ ἀδελφός⁶⁴ μου⁶⁵.
