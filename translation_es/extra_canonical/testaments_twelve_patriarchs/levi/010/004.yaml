base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/010/004.yaml
  text: And you will be scattered as captives among the nations, and there you will be for a reproach and a curse.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:12Z'
    unchanged: false
    changes_summary: Added the articles in 'a reproach and a curse' for more natural formal English while preserving the sense of εἰς ὄνειδος καὶ εἰς κατάραν; otherwise retained the draft.
translation:
  language: es
  text: Y seréis dispersados como cautivos entre las naciones, y allí seréis para oprobio y para maldición.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διασπαρήσεσθε
  english_pob_choice: you will be scattered
  chosen_spanish: seréis dispersados
  alternatives_spanish:
  - seréis esparcidos
  - seréis dispersados por todas partes
  lexicon: διασπείρω
  rationale: El verbo griego expresa dispersión amplia y pasiva; «seréis dispersados» conserva la imagen sin introducir matices ajenos. «Esparcidos» es posible, pero en español bíblico puede sonar menos natural en un contexto de exilio colectivo.
- source_word: αἰχμάλωτοι
  english_pob_choice: as captives
  chosen_spanish: como cautivos
  alternatives_spanish:
  - como prisioneros
  - en cautiverio
  lexicon: αἰχμάλωτος
  rationale: «Cautivos» mantiene la fuerza sustantiva del término y su vínculo con deportación/exilio. «Prisioneros» es más general y «en cautiverio» desplaza la construcción nominal del original.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las gentes
  lexicon: ἔθνη
  rationale: «Naciones» refleja el plural étnico-político del griego y mantiene la resonancia bíblica habitual. «Pueblos» suaviza la referencia; «gentes» es más ambiguo.
- source_word: εἰς ὄνειδος
  english_pob_choice: for a reproach
  chosen_spanish: para oprobio
  alternatives_spanish:
  - para vergüenza
  - para afrenta
  lexicon: ὄνειδος
  rationale: «Oprobio» conserva el peso formal y público del deshonor indicado por ὄνειδος. «Vergüenza» puede sonar más interior; «afrenta» es válida pero menos estable en registro bíblico español.
- source_word: κατάραν
  english_pob_choice: a curse
  chosen_spanish: maldición
  alternatives_spanish:
  - anatema
  - maldición de juicio
  lexicon: κατάρα
  rationale: «Maldición» reproduce de forma directa el término común y su carga de juicio adverso. «Anatema» sería más técnico y menos transparente para lectores generales.
theological_decisions:
- issue: 'Destino del pueblo: dispersión entre naciones como juicio'
  english_pob_reading: you will be scattered as captives among the nations
  chosen_spanish_reading: seréis dispersados como cautivos entre las naciones
  alternative_spanish_readings:
  - seréis esparcidos como cautivos entre las naciones
  - seréis llevados cautivos y dispersados entre las naciones
  rationale: La construcción mantiene tanto la dispersión como el estado de cautiverio sin convertirlos en una sola idea. El texto griego y la POB inglesa conservan ambas dimensiones como parte del juicio.
  doctrine_reference: Exilio/jucio pactual en la tradición bíblica
translation_notes:
  revision_awareness: 'La revisión inglesa solo ajustó los artículos: de ''for a reproach and a curse'' a ''for a reproach and a curse'' con artículos más naturales. En español, la forma natural ya usa artículo cero en la serie preposicional ''para oprobio y para maldición'', por lo que no requiere reflejo adicional.'
  spanish_consistency_notes:
  - Se mantuvo «cautivos» para αἰχμάλωτοι y «naciones» para ἔθνη, en línea con un registro bíblico claro.
  - No se usó «SEÑOR» ni otras convenciones de sustitución, pues el versículo no contiene el nombre divino ni títulos correlativos.
