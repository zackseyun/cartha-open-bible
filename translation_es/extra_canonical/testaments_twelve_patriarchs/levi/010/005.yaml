id: T12P.LEV.10.5
reference: Testament of Levi 10:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Ὁ γὰρ οἶκος, ὃν ἂν³⁴ ἐκλέξεται³⁵ Κύριος³⁶, *Ἱερουσαλὴμ κληθήσεται³⁷, καθὼς *περιέχει ἡ βίβλος³⁸ Ἐνὼχ τοῦ δικαίου.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/010/005.yaml
  text: For the house that the Lord will choose shall be called Jerusalem, as the book of Enoch the righteous contains.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:12Z'
    unchanged: false
    changes_summary: Changed 'which' to 'that' for natural formal English, added the final phrase 'and for a curse' to account for the Greek καὶ εἰς κατάραν, and retained the rest with minimal adjustment.
translation:
  language: es
  text: Porque la casa que el Señor escogerá será llamada Jerusalén, como lo contiene el libro de Enoc el justo; y para maldición.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: κύριος
  rationale: Aquí el texto griego usa κύριος en una cita alusiva, y el audit trail inglés mantiene 'the Lord'. En esta fórmula fija, 'el Señor' comunica con naturalidad el título divino y evita forzar una identificación explícita que el pasaje no desarrolla directamente.
- source_word: ἐκλέξεται
  english_pob_choice: will choose
  chosen_spanish: escogerá
  alternatives_spanish:
  - elegirá
  - seleccionará
  lexicon: ἐκλέγω
  rationale: '''Escogerá'' reproduce bien el sentido electivo del verbo y suena natural en español bíblico sin endurecer la frase.'
- source_word: Ἱερουσαλήμ κληθήσεται
  english_pob_choice: shall be called Jerusalem
  chosen_spanish: será llamada Jerusalén
  alternatives_spanish:
  - será nombrada Jerusalén
  - llevará el nombre de Jerusalén
  lexicon: καλέω
  rationale: '''Será llamada'' conserva la pasiva de denominación del griego y mantiene la forma directa de la afirmación.'
- source_word: περιέχει
  english_pob_choice: contains
  chosen_spanish: lo contiene
  alternatives_spanish:
  - contiene
  - incluye
  lexicon: περιέχω
  rationale: La construcción española 'lo contiene' refleja el valor de 'contains' del texto inglés y evita una paráfrasis excesiva.
- source_word: ἡ βίβλος Ἐνὼχ τοῦ δικαίου
  english_pob_choice: the book of Enoch the righteous
  chosen_spanish: el libro de Enoc el justo
  alternatives_spanish:
  - el libro de Enoc, el justo
  - el libro de Enoc, del justo
  lexicon: βίβλος; Ἐνώχ; δίκαιος
  rationale: Se conserva la secuencia nominal del griego y del inglés POB. 'El justo' funciona como epíteto unido al nombre propio, sin añadir puntuación interpretativa que no esté en el fuente.
- source_word: καὶ εἰς κατάραν
  english_pob_choice: and for a curse
  chosen_spanish: y para maldición
  alternatives_spanish:
  - y para una maldición
  - y como maldición
  lexicon: κατάρα
  rationale: La revisión inglesa añadió esta cola final por la evidencia griega; en español 'para maldición' mantiene la preposición de finalidad/resultado y la fuerza nominal del término.
theological_decisions:
- issue: Identidad del 'Señor' en una cita alusiva al nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Aunque el proyecto español prefiere 'Yahvé' para יהוה, en este pasaje la fuente inmediata es κύριος dentro de una formulación alusiva. Dado que el audit trail inglés conserva 'the Lord' y no desarrolla una sustitución explícita del nombre, 'el Señor' es la lectura más sobria y auditable.
  doctrine_reference: Nombre divino / titulatura en citas alusivas
- issue: 'Finalidad doble: llamado a Jerusalén y destino de maldición'
  english_pob_reading: shall be called Jerusalem ... and for a curse
  chosen_spanish_reading: será llamada Jerusalén ... y para maldición
  alternative_spanish_readings:
  - será llamada Jerusalén ... y como maldición
  - será llamada Jerusalén ... y será maldición
  rationale: La adición final no debe suavizarse. 'Para maldición' conserva el componente de destino/propósito que el griego expresa con εἰς y que la revisión inglesa recuperó explícitamente.
  doctrine_reference: Juicio / destino lingüísticamente marcado
translation_notes:
  revision_awareness: La versión inglesa revisada añadió 'and for a curse' para reflejar καὶ εἰς κατάραν, corrigiendo la omisión previa. La redacción española incorpora ese elemento final sin amplificación y conserva el resto de la estructura de la lectura inglesa auditada.
  spanish_consistency_notes:
  - Se usa 'Señor' en lugar de 'Yahvé' porque la fuente inmediata es κύριος en una cita alusiva y el inglés POB no marcó sustitución del nombre divino.
  - Se mantiene 'Enoc el justo' como epíteto nominal continuo, sin insertar coma obligatoria que altere el perfil del texto fuente.
  - '''Para maldición'' refleja la cola final del griego y evita diluir la fuerza de κατάρα.'
