translation:
  language: es
  text: Y ahora, hijos, guarden lo que yo les mando, porque les he declarado todo lo que oí de mis padres.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ τανῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y ahora bien
  - Pues ahora
  lexicon: N/A
  rationale: Mantiene la transición discursiva directa del griego sin añadir matices no presentes; «Y ahora» es natural en español y conserva la urgencia exhortativa.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - hijos míos
  - hijitos
  lexicon: N/A
  rationale: En este contexto exhortativo y familiar, «hijos» refleja mejor una forma de apelación filial que «niños»; evita la connotación infantil literal.
- source_word: φυλάξατε
  english_pob_choice: keep
  chosen_spanish: guarden
  alternatives_spanish:
  - conserven
  - observen
  - guarden cuidadosamente
  lexicon: N/A
  rationale: «Guardar» en español bíblico comunica obedecer y retener fielmente lo mandado, más cercano al imperativo del griego que «conservar» o «observar» aislados.
- source_word: ὅσα ἐγὼ ἐντέλλομαι ὑμῖν
  english_pob_choice: what I command you
  chosen_spanish: lo que yo les mando
  alternatives_spanish:
  - lo que yo les ordeno
  - todo lo que yo les encargo
  lexicon: N/A
  rationale: «Mando» reproduce bien el valor directivo del verbo sin endurecerlo innecesariamente; «les» conserva el destinatario plural.
- source_word: παρὰ τῶν πατέρων μου
  english_pob_choice: from my fathers
  chosen_spanish: de mis padres
  alternatives_spanish:
  - de mis antepasados
  - de mis padres mayores
  lexicon: N/A
  rationale: El griego dice literalmente «de mis padres»; en español, esa forma es clara y fiel. «Antepasados» interpretaría más libremente la referencia generacional.
theological_decisions:
- issue: Autoridad de la enseñanza transmitida
  english_pob_reading: I have declared to you all that I heard from my fathers
  chosen_spanish_reading: les he declarado todo lo que oí de mis padres
  alternative_spanish_readings:
  - les he enseñado todo lo que oí de mis padres
  - les he comunicado todo lo que recibí de mis padres
  rationale: La frase mantiene la idea de transmisión fiel de lo oído, sin convertirla en una elaboración doctrinal adicional. «Declarado» preserva el acto de poner por delante de manera explícita lo recibido.
  doctrine_reference: Transmisión fiel de la enseñanza recibida; no añade contenido doctrinal no presente en el texto.
translation_notes:
  revision_awareness: Se siguió la lectura griega provista en el paquete fuente y se alineó con la traducción inglesa POB existente, sin cambios revisionales adicionales; no se documentaron variantes relevantes en el audit trail.
  spanish_consistency_notes:
  - Se mantuvo el tono exhortativo directo del texto griego.
  - Se evitó «SEÑOR» o terminología eclesiástica no presente en el pasaje.
  - El registro es sobrio y bíblico, con vocabulario común y auditable.
