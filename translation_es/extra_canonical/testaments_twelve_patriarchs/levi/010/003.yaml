id: T12P.LEV.10.3
reference: Testament of Levi 10:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ ἀνομήσετε¹⁸ *ἐν τῷ¹⁹ Ἰσραήλ²⁰, ὥστε μὴ βαστάζειν²¹ τὴν²² Ἱερουσαλήμ²³ ἀπὸ προσώπου τῆς²⁴ πονηρίας ὑμῶν, ἀλλὰ σχισθήσεται²⁵ τὸ καταπέτασμα²⁶ τοῦ ναοῦ, ὥστε μὴ καλύψαι²⁷ τὴν²⁸ ἀσχημοσύνην ὑμῶν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/010/003.yaml
  text: And you will act lawlessly in Israel, so that Jerusalem will not be able to bear your wickedness; but the veil of the temple will be torn, so as no longer to cover your shame.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:42Z'
    unchanged: false
    changes_summary: Revised 'endure because of your wickedness' to 'bear your wickedness' for closer lexical alignment with βαστάζειν and ἀπὸ/ὑμῶν construction, while keeping the rest unchanged.
translation:
  language: es
  text: Y actuaréis con iniquidad en Israel, de modo que Jerusalén no podrá cargar con vuestra maldad; pero el velo del templo será rasgado, para que ya no cubra vuestra vergüenza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνομήσετε
  english_pob_choice: you will act lawlessly
  chosen_spanish: actuaréis con iniquidad
  alternatives_spanish:
  - actuaréis sin ley
  - obraréis con maldad
  lexicon: ἀνομέω
  rationale: En español, «actuaréis con iniquidad» conserva el sentido de conducta contraria a la ley sin sonar tan técnico como «sin ley». Mantiene la fuerza moral y judicial del verbo griego.
- source_word: ἐν τῷ Ἰσραήλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - dentro de Israel
  lexicon: ἐν + dativo
  rationale: La preposición simple «en» reproduce de forma natural el marco locativo y étnico-político del griego.
- source_word: βαστάζειν
  english_pob_choice: to bear
  chosen_spanish: cargar con
  alternatives_spanish:
  - soportar
  - aguantar
  lexicon: βαστάζω
  rationale: «Cargar con» expresa bien la idea de soportar o تحملar una carga moral/judicial. Además, mantiene la proximidad semántica con la revisión inglesa «bear your wickedness».
- source_word: τὴν Ἱερουσαλήμ ἀπὸ προσώπου τῆς πονηρίας ὑμῶν
  english_pob_choice: Jerusalem will not be able to bear your wickedness
  chosen_spanish: Jerusalén no podrá cargar con vuestra maldad
  alternatives_spanish:
  - Jerusalén no podrá soportar vuestra maldad
  - Jerusalén no podrá llevar vuestra perversidad
  lexicon: προσώπου + genitivo / πονηρία
  rationale: El griego usa una construcción idiomática que vincula la maldad de ellos con la imposibilidad de Jerusalén de sostenerla. «Vuestra maldad» es una equivalencia directa y clara; «cargar con» preserva la imagen de peso o responsabilidad.
- source_word: σχισθήσεται
  english_pob_choice: will be torn
  chosen_spanish: será rasgado
  alternatives_spanish:
  - será desgarrado
  - se partirá
  lexicon: σχίζω
  rationale: «Será rasgado» es la traducción más directa y solemne para el velo del templo, y encaja con el uso bíblico tradicional sin forzar una lectura más interpretativa.
- source_word: τὸ καταπέτασμα τοῦ ναοῦ
  english_pob_choice: the veil of the temple
  chosen_spanish: el velo del templo
  alternatives_spanish:
  - la cortina del templo
  - el telón del santuario
  lexicon: καταπέτασμα
  rationale: «Velo» es la correspondencia estable en español bíblico y conserva el referente cultual específico mejor que «cortina», que suena más doméstico.
- source_word: μὴ καλύψαι τὴν ἀσχημοσύνην ὑμῶν
  english_pob_choice: so as no longer to cover your shame
  chosen_spanish: para que ya no cubra vuestra vergüenza
  alternatives_spanish:
  - para no cubrir vuestra vergüenza
  - de modo que ya no cubra vuestra deshonra
  lexicon: ἀσχημοσύνη
  rationale: «Vergüenza» refleja de manera natural la deshonra expuesta por el texto; «cubrir» mantiene la imagen corporal y ritual del velo. «Vuestra» concuerda con el plural del pasaje.
theological_decisions:
- issue: Sentido moral-jurídico de «actuar con iniquidad»
  english_pob_reading: you will act lawlessly
  chosen_spanish_reading: actuaréis con iniquidad
  alternative_spanish_readings:
  - actuaréis sin ley
  - obraréis impíamente
  rationale: El pasaje acusa una transgresión del orden divino y del pacto, no solo una infracción legal civil. «Iniquidad» conserva el peso ético-teológico del original sin perder legibilidad.
  doctrine_reference: Santidad y pacto; pecado como transgresión del orden de Dios
- issue: Implicación de Jerusalén como sujeto que no puede soportar la culpa
  english_pob_reading: Jerusalem will not be able to bear your wickedness
  chosen_spanish_reading: Jerusalén no podrá cargar con vuestra maldad
  alternative_spanish_readings:
  - Jerusalén no podrá soportar vuestra maldad
  - Jerusalén no podrá llevar vuestra perversidad
  rationale: Se conserva la imagen de peso/carga inherente a βαστάζειν sin convertirlo en una mera imposibilidad psicológica. La redacción evita suavizar la responsabilidad colectiva.
  doctrine_reference: Juicio divino sobre el pecado colectivo
- issue: El velo del templo como señal de exposición y juicio
  english_pob_reading: the veil of the temple will be torn, so as no longer to cover your shame
  chosen_spanish_reading: el velo del templo será rasgado, para que ya no cubra vuestra vergüenza
  alternative_spanish_readings:
  - la cortina del templo será desgarrada, para no cubrir vuestra vergüenza
  rationale: «Rasgado» mantiene la imagen profética de ruptura del acceso/orden cultual y la relación entre el velo y la cobertura de la vergüenza. No se añade interpretación doctrinal adicional no explicitada por el texto.
  doctrine_reference: Señal profética de juicio y exposición
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió «endure because of your wickedness» por «bear your wickedness» para alinearse más de cerca con βαστάζειν y la construcción con ἀπὸ/ὑμῶν. La versión española sigue esa decisión con «cargar con vuestra maldad».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «templo» y «velo» por ser los equivalentes cultuales más claros y consagrados en español.
  - Se preserva el plural de segunda persona («vosotros/vuestra») para reflejar el auditorio colectivo del pasaje.
