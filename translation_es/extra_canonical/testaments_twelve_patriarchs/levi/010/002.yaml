base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/010/002.yaml
  text: And behold, I am innocent of your ungodliness and transgression, which you will commit at the consummation of the ages [against the Savior of the world, the Messiah], misleading Israel and stirring up great evils against him from the Lord.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:42Z'
    unchanged: false
    changes_summary: Moved 'against him' to modify 'stirring up great evils' more naturally and in closer alignment with the Greek word order; otherwise retained the draft.
translation:
  language: es
  text: Y he aquí, soy inocente de su impiedad y transgresión[a], que cometerán en la consumación de los siglos[b], [contra el Salvador del mundo, el Mesías], extraviando a Israel y despertando grandes males contra él[c] de parte de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Impiedad y transgresión'' mantiene dos términos distintos del griego: irreverencia ante Dios y violación activa del mandato.'
    reason: lexical_alternative
  - marker: b
    text: '''Consumación de los siglos'' reproduce literalmente el plural del griego y conserva el matiz escatológico de cierre de eras.'
    reason: spanish_style_note
  - marker: c
    text: '''De parte de Yahvé'' traduce la relación expresa por παρά + genitivo; no significa que Yahvé sea autor moral del mal, sino el origen/juzgamiento dentro del marco profético del texto.'
    reason: theological_note
lexical_decisions:
- source_word: ἀθῷός εἰμι
  english_pob_choice: I am innocent
  chosen_spanish: soy inocente
  alternatives_spanish:
  - estoy inocente
  - me declaro inocente
  lexicon: ἀθῷος
  rationale: ‘Soy inocente’ transmite con naturalidad el estado de no ser culpable y conserva el valor declarativo del griego sin endurecerlo innecesariamente.
- source_word: ἀσεβείας
  english_pob_choice: ungodliness
  chosen_spanish: impiedad
  alternatives_spanish:
  - inmiedad
  - irreverencia
  lexicon: ἀσέβεια
  rationale: ‘Impiedad’ es un equivalente digno y transparente en español para la falta de reverencia o piedad hacia Dios.
- source_word: παραβάσεως
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - violación
  - infracción
  lexicon: παράβασις
  rationale: ‘Transgresión’ preserva el matiz de pasar por encima de un límite o mandato, en paralelo con ‘impiedad’.
- source_word: συντελείᾳ τῶν αἰώνων
  english_pob_choice: consummation of the ages
  chosen_spanish: consumación de los siglos
  alternatives_spanish:
  - fin de los siglos
  - consumación de las edades
  lexicon: συντέλεια
  rationale: Se conserva la formulación apocalíptica tradicional y literal, que refleja bien el cierre escatológico del plural ‘αἰώνων’.
- source_word: σωτῆρα τοῦ κόσμου χριστόν
  english_pob_choice: the Savior of the world, the Messiah
  chosen_spanish: el Salvador del mundo, el Mesías
  alternatives_spanish:
  - el Salvador del mundo, el Cristo
  - el Salvador del mundo, el Ungido
  lexicon: σωτήρ / χριστός
  rationale: ‘Mesías’ mantiene el valor titular de χριστός y evita una cristianización automática donde el texto presenta la designación como título.
- source_word: πλανῶντες τὸν Ἰσραήλ
  english_pob_choice: misleading Israel
  chosen_spanish: extraviando a Israel
  alternatives_spanish:
  - engañando a Israel
  - descarriando a Israel
  lexicon: πλανάω
  rationale: ‘Extraviando’ conserva la idea de desviar o hacer errar, sin cargar el texto con una tonalidad exclusivamente moral o psicológica.
- source_word: ἐπεγείροντες κακὰ μεγάλα
  english_pob_choice: stirring up great evils
  chosen_spanish: despertando grandes males
  alternatives_spanish:
  - levantando grandes males
  - provocando grandes males
  lexicon: ἐπεγείρω
  rationale: ‘Despertando’ sigue la imagen verbal de ‘poner en movimiento/levantar’ y conserva el tono del original mejor que una paráfrasis más abstracta.
- source_word: παρὰ Κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: de parte de Yahvé
  alternatives_spanish:
  - del Señor
  - de Yahvé
  lexicon: παρά + genitivo / Κύριος
  rationale: Se explicita el referente divino como Yahvé, conforme al estándar del proyecto para Κύριος cuando el contexto apunta al nombre divino.
theological_decisions:
- issue: La lectura entre corchetes identifica al ‘Salvador del mundo, el Mesías’ como objeto de la oposición futura.
  english_pob_reading: '[against the Savior of the world, the Messiah]'
  chosen_spanish_reading: '[contra el Salvador del mundo, el Mesías]'
  alternative_spanish_readings:
  - '[contra el Salvador del mundo, el Cristo]'
  - '[respecto del Salvador del mundo, el Mesías]'
  rationale: Se mantiene la lectura entre corchetes como adición o glosa transmitida por la tradición textual/audit trail, sin integrarla al cuerpo principal del verso.
  doctrine_reference: Textual criticism / messianic title usage
- issue: Relación de origen en ‘great evils from the Lord against him’.
  english_pob_reading: stirring up great evils against him from the Lord
  chosen_spanish_reading: despertando grandes males contra él de parte de Yahvé
  alternative_spanish_readings:
  - despertando grandes males procedentes de Yahvé contra él
  - despertando grandes males desde Yahvé contra él
  rationale: ‘De parte de Yahvé’ conserva el valor de procedencia/agencia divina sin forzar la sintaxis española ni suavizar la tensión de que esos males vienen ‘de parte’ del Señor.
  doctrine_reference: Divine agency / prophetic judgment
translation_notes:
  revision_awareness: La revisión inglesa reciente movió ‘against him’ para que modifique más naturalmente a ‘stirring up great evils’; la versión española sigue esa misma relación sintáctica con ‘contra él’ al final de la cláusula. Se mantuvo además la lectura entre corchetes del título mesiánico, sin convertirla en texto corrido.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para Κύριος según la convención del proyecto, especialmente cuando la frase expresa procedencia divina.
  - Se conserva ‘Mesías’ para χριστός en el sintagma entre corchetes, en línea con el valor titular señalado por la fuente.
  - ‘Extraviando’ y ‘despertando’ buscan reflejar el aspecto verbal de participación continua, sin añadir acciones no presentes en el griego.
