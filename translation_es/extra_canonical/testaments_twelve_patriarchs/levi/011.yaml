translation:
  language: es
  text: '1. Cuando tomé esposa, yo tenía veintiocho años, y su nombre era Melca. 2. Y ella concibió y dio a luz un hijo, y llamé su nombre Gersam, porque estábamos en tierra de[ a] peregrinación. 3. Y vi acerca de él que no estaba en el primer rango. 4. Y Kohat nació en el trigésimo quinto año de mi vida, y vi en una visión, hacia la salida del sol, 5. que él estaba en medio de la congregación, en las alturas. 6. Por eso llamé su nombre Kohat, que es: comienzo de majestad y asamblea[a]. 7. Y un tercer hijo, Merari, me nació en el año cuadragésimo de mi vida; y porque su madre lo dio a luz con dificultad, lo llamé Merari, que es amargura. 8. Y Jocabed nació en Egipto, en el año sexagésimo cuarto de mi vida, pues en aquel tiempo yo era ilustre entre mis hermanos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega es textual y léxicamente difícil; la traducción conserva el sentido posible sin suavizar la aspereza del testimonio.
    reason: textual_variant
lexical_decisions:
- source_word: ἔλαβον γυναῖκα
  english_pob_choice: took a wife
  chosen_spanish: tomé esposa
  alternatives_spanish:
  - me casé
  - tomé una mujer
  lexicon: LSJ
  rationale: Sigo el valor idiomático matrimonial sin volverlo demasiado coloquial. 'Tomé esposa' conserva el registro bíblico y reproduce la iniciativa narrativa del griego mejor que simplemente 'me casé'.
- source_word: παροικίας
  english_pob_choice: sojourning
  chosen_spanish: peregrinación
  alternatives_spanish:
  - sojornamiento
  - residencia temporal
  - exilio
  lexicon: LSJ
  rationale: El griego expresa residencia como forastero/huésped. En español, 'peregrinación' comunica bien el carácter de estadía transitoria con resonancia bíblica; evito 'exilio' porque sería más fuerte de lo que el texto dice.
- source_word: πρώτῃ τάξει
  english_pob_choice: first rank
  chosen_spanish: primer rango
  alternatives_spanish:
  - primer orden
  - puesto principal
  - primera fila
  lexicon: LSJ
  rationale: '''Rango'' conserva la idea de orden o estatus y suena natural en español. Mantiene la evaluación jerárquica de Levi sin añadir explicaciones que el griego no da.'
- source_word: ἐν ὁράματι
  english_pob_choice: in a vision
  chosen_spanish: en una visión
  alternatives_spanish:
  - en visión
  - en un sueño-visión
  lexicon: LSJ
  rationale: La forma literal y clara en español es 'en una visión'. Preserva el carácter revelatorio del pasaje sin forzar una categoría más específica que el texto no exige.
- source_word: ἐν ὑψηλοῖς
  english_pob_choice: in the heights
  chosen_spanish: en las alturas
  alternatives_spanish:
  - en lo alto
  - en lugares altos
  lexicon: LSJ
  rationale: '''Alturas'' refleja el plural sustantivado y mantiene el tono elevado/visionario. Evita concretar indebidamente si se trata de altura física, celestial o simbólica.'
- source_word: συναγωγῆς
  english_pob_choice: congregation
  chosen_spanish: congregación
  alternatives_spanish:
  - asamblea
  - reunión
  lexicon: LSJ
  rationale: Mantengo 'congregación' como en la línea inglesa porque encaja con el entorno sagrado de la visión. En v. 6 traduzco el componente explicativo con 'asamblea' para reflejar la textura léxica del texto griego.
- source_word: ἀνατολὰς ἡλίου
  english_pob_choice: toward the sunrise
  chosen_spanish: hacia la salida del sol
  alternatives_spanish:
  - hacia el este
  - hacia el amanecer
  lexicon: LSJ
  rationale: La imagen del griego es concreta y visual; 'hacia la salida del sol' conserva esa vividez mejor que el más abstracto 'hacia el este'.
- source_word: ἀρχὴ μεγαλείου καὶ συμβιβασμός
  english_pob_choice: beginning of majesty and assembly
  chosen_spanish: comienzo de majestad y asamblea
  alternatives_spanish:
  - principio de grandeza y asamblea
  - inicio de majestad y reunión
  lexicon: LSJ
  rationale: Sigo de cerca la glosa etimológica preservando su dificultad textual. 'Majestad' comunica μεγαλείου con registro elevado, y 'asamblea' mantiene συμβιβασμός sin suavizar la tensión del pasaje.
- source_word: πικριασμός
  english_pob_choice: bitterness
  chosen_spanish: amargura
  alternatives_spanish:
  - amargor
  - amargura del parto
  - aflicción
  lexicon: LSJ
  rationale: '''Amargura'' es la equivalencia más natural y estable en español para el valor etimológico del nombre. Mantiene la referencia a la dificultad del parto sin expandirla más de lo que el texto dice.'
- source_word: ἔνδοξος
  english_pob_choice: illustrious
  chosen_spanish: ilustre
  alternatives_spanish:
  - glorioso
  - honrado
  - distinguido
  lexicon: LSJ
  rationale: '''Ilustre'' reproduce bien la dignidad retrospectiva de Levi sin cargar el término con un matiz exclusivamente teológico. Es más fiel al tono social de distinción del pasaje.'
theological_decisions:
- issue: Relación entre la visión de Kohat y la afirmación de su posición
  english_pob_reading: The text is rendered as a straightforward report of prophetic insight into the relative standing of Gersam and Kohath, without expanding it into later priestly hierarchy beyond what the Greek states.
  chosen_spanish_reading: El pasaje se presenta como un informe directo de visión profética sobre la posición relativa de Gersam y Kohat, sin convertirlo en una explicación posterior y más desarrollada de jerarquía levítica.
  alternative_spanish_readings:
  - Una alusión más explícita al orden sacerdotal posterior
  - Un simple presagio familiar sin implicaciones cultuales
  rationale: El griego solo ofrece una observación breve vinculada a nombres y estatus. La traducción conserva esa ambigüedad y no la resuelve hacia una estructura teológica posterior que el texto no explicita.
  doctrine_reference: Tradición levítica y profecía familiar en literatura testamentaria
- issue: 'Verso 6: glosa etimológica difícil en el testimonio griego'
  english_pob_reading: The explanatory phrase attached to Kohath's name is textually difficult in the Greek witness; the rendering follows the surviving sense without attempting to reconstruct a smoother text.
  chosen_spanish_reading: La glosa explicativa del nombre Kohat se traduce siguiendo el sentido conservado por el testimonio griego, sin reconstruir un texto más fluido de lo que la evidencia permite.
  alternative_spanish_readings:
  - Reformular la glosa para hacerla más elegante en español
  - Omitir la parte difícil como si fuera secundaria
  rationale: La fidelidad exige no borrar la aspereza textual. Por eso se mantiene la frase completa, aunque sea menos tersa, en vez de reemplazarla por una paráfrasis armonizada.
  doctrine_reference: Principio de integridad textual y cautela ante variantes
translation_notes:
  revision_awareness: 'He seguido la revisión más reciente que une el flujo de los vv. 4–5 en una sola visión: la mención de la salida del sol introduce la visión, y luego continúa con la escena de Kohat en medio de la congregación, en las alturas. También he mantenido el tono elevado de las glosas etimológicas y la distinción entre congregación/asamblea donde el griego lo sugiere.'
  spanish_consistency_notes:
  - He usado 'Kohat' y 'Jocabed' con formas hispanizadas coherentes con el resto del pasaje, y 'Gersam'/'Merari' sin modificar nombres propios tradicionalmente fijados.
  - He evitado 'SEÑOR' o equivalentes porque el pasaje no contiene el nombre divino.
  - He conservado 'congregación' en v. 5 y 'asamblea' en la glosa de v. 6 para reflejar la diferencia entre la escena visionaria y su explicación etimológica.
  - He mantenido la numeración continua y la puntuación sobria para un estilo publicable en español bíblico moderno.
