  text: XI. Ὅτε οὖν *ἔλαβον γυναῖκα, ἐγὼ εἴκοσι καὶ ὀκτὼ ἐτῶν ὑπῆρχον², *ἦν δὲ αὐτῇ ὄνομα Μελχά³. 2. Καὶ συλλαβοῦσα ἔτεκεν υἱόν⁴, καὶ ἐκάλεσα⁵ τὸ ὄνομα αὐτοῦ⁶ Γηρσάμ⁷, ὅτι *ἐν γῇ παροικίας ἦμεν⁸. 3. *Καὶ εἶδον⁹ περὶ αὐτόν¹⁰, ὅτι οὐκ ἔστιν¹¹ ἐν τῇ¹² πρώτῃ τάξει. 4. Καὶ¹³ ὁ Καὰθ¹⁴ ἐγεννήθη *ἐν τῷ¹⁵ τριακοστῷ πέμπτῳ¹⁶ ἔτει¹⁷ ⸢τῆς ζωῆς μου¹⁸⸥ *πρὸς ἀνατολὰς ἡλίου¹⁹. 5. *Καὶ εἶδον ἐν ὁράματι· μέσος ἐν ὑψηλοῖς ἵστατο πάσης τῆς συναγωγῆς²⁰. 6. *Διὰ τοῦτο ἐκάλεσα τὸ ὄνομα αὐτοῦ Καάθ²¹, [ὅ ἐστιν ἀρχὴ μεγαλείου καὶ συμβιβασμός]²². 7. Καὶ *τρίτον υἱὸν²³ ἔτεκέν μοι τὸν Μεραρεῖ²⁴ τῷ²⁵ τεσσαρακοστῷ²⁶ ἔτει²⁷ *τῆς ζωῆς μου²⁸, καὶ ἐπειδὴ²⁹ ἐδυστόκησεν ἡ μήτηρ αὐτοῦ ἐκάλεσα³⁰ αὐτὸν³¹ Μεραρεῖ³² ὅ ἐστι³³ *πικριασμός³⁴. 8. Ἡ δὲ Ἰωχαβέδ³⁵ *ἐγεννήθη ἐν Αἰγύπτῳ τῷ ἑξηκοστῷ τετάρτῳ μου ἔτει³⁶, *ἔνδοξος γὰρ ἦν τότε ἐν μέσῳ τῶν ἀδελφῶν μου³⁷.
