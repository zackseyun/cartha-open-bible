base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/011.yaml
  text: 1[11:6]. When I took a wife, I was twenty-eight years old, and her name was Melcha. 2. And she conceived and bore a son, and I called his name Gersam, because we were in a land of sojourning. 3. And I saw concerning him that he was not in the first rank. 4. And Kohath was born in the thirty-fifth year of my life, and I saw in a vision, toward the sunrise, 5. that he stood in the midst of the congregation[11:8], in the heights. 6. Therefore I called his name Kohath, which is, beginning of majesty and assembly. 7. And a third son, Merari, was born to me in the fortieth year of my life; and because his mother bore him with difficulty, I called him Merari, which is bitterness. 8. And Jochebed was born in Egypt, in the sixty-fourth year of my life, for at that time I was illustrious among my brothers.
  footnotes:
  - marker: '11:6'
    text: The explanatory phrase attached to Kohath's name is textually difficult in the Greek witness; the rendering follows the surviving sense without attempting to reconstruct a smoother text.
    reason: textual_variant
  - marker: '11:8'
    text: Some textual elements around this verse are compressed or unstable in the witness; the main line clearly states that Jochebed was born in Egypt in Levi's sixty-fourth year.
    reason: textual_variant
