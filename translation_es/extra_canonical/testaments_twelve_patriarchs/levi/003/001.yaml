source:
  edition: Charles 1908 Greek Versions (pages 92-133, Levi pilot full)
  text: ῎Ακουσον οὖν¹ περὶ τῶν δει- χθέντων σοι οὐρα- νῶν· ὁ κατώτερος *διὰ τοῦτό σοί ἐστι στυγνός, ἐπειδὴ² ὁρᾷ πάσας³ τὰς ἀδικίας τῶν ἀνθρώπων.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/003/001.yaml
  text: 'Listen, then, concerning the heavens that were shown to you. The lowest is gloomy for this reason: because it sees all the injustices of people.'
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: Changed “dark” to “gloomy” to better match στυγνός; rendered ἀδικίας as “injustices” and ἀνθρώπων as “people” for closer lexical accuracy and smoother formal English.
translation:
  language: es
  text: 'Escucha, pues, acerca de los cielos que te fueron mostrados. El más bajo es sombrío por esta razón: porque ve todas las injusticias de la gente.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ῎Ακουσον οὖν
  english_pob_choice: Listen, then
  chosen_spanish: Escucha, pues
  alternatives_spanish:
  - Oye, pues
  - Escuchen, pues
  lexicon: ἀκούω
  rationale: Imperativo singular dirigido a una persona; «Escucha» comunica el llamado directo y solemne sin perder naturalidad en español. «Pues» refleja οὖν como continuación discursiva.
- source_word: περὶ τῶν δειχθέντων σοι οὐρανῶν
  english_pob_choice: concerning the heavens that were shown to you
  chosen_spanish: acerca de los cielos que te fueron mostrados
  alternatives_spanish:
  - sobre los cielos que te fueron mostrados
  - respecto de los cielos que te fueron mostrados
  lexicon: οὐρανοί / δείκνυμι
  rationale: Se conserva el plural «cielos» y la pasiva «te fueron mostrados», fiel al verbo de revelación. «Acerca de» mantiene el valor introductorio de περὶ.
- source_word: ὁ κατώτερος
  english_pob_choice: The lowest
  chosen_spanish: El más bajo
  alternatives_spanish:
  - El inferior
  - El de más abajo
  lexicon: κατώτερος
  rationale: «Más bajo» reproduce el comparativo espacial de manera clara y evita interpretaciones doctrinales no explícitas en el texto. «El inferior» suena más abstracto en español.
- source_word: στυγνός
  english_pob_choice: gloomy
  chosen_spanish: sombrío
  alternatives_spanish:
  - triste
  - oscuro
  lexicon: στυγνός
  rationale: «Sombrío» recoge la carga de pesadumbre y oscuridad de στυγνός mejor que «oscuro» en este contexto, sin reducirlo solo al color físico.
- source_word: ὁρᾷ πάσας τὰς ἀδικίας τῶν ἀνθρώπων
  english_pob_choice: because it sees all the injustices of people
  chosen_spanish: porque ve todas las injusticias de la gente
  alternatives_spanish:
  - porque ve todas las injusticias de las personas
  - porque ve todas las iniquidades de los seres humanos
  lexicon: ἀδικία / ἄνθρωπος
  rationale: «Injusticias» sigue el sentido revisado por el POB inglés y evita cargar el término con una moralización más amplia de lo que el griego dice. «La gente» conserva el valor colectivo de ἀνθρώπων en español corriente sin sonar arcaico.
theological_decisions:
- issue: Descripción del nivel más bajo de los cielos como sombrío por su visión de la injusticia humana
  english_pob_reading: 'The lowest is gloomy for this reason: because it sees all the injustices of people.'
  chosen_spanish_reading: 'El más bajo es sombrío por esta razón: porque ve todas las injusticias de la gente.'
  alternative_spanish_readings:
  - 'El más bajo es triste por esta razón: porque ve todas las injusticias de la gente.'
  - 'El más bajo es oscuro por esta razón: porque ve todas las injusticias de la gente.'
  rationale: No se añade explicación doctrinal; se mantiene la relación causal dada por el griego. La elección de «sombrío» preserva la tensión descriptiva sin convertirla en una afirmación técnica sobre juicio o cosmología que el versículo no desarrolla.
  doctrine_reference: cosmología apocalíptica; lenguaje descriptivo, no dogmático
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «dark» por «gloomy» para στυγνός y precisó ἀδικίας como «injustices» y ἀνθρώπων como «people». La redacción española sigue esa revisión y evita suavizar el contraste del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto solo cuando aparezca el tetragrámaton; aquí no aplica.
  - «Cielos» conserva el plural del griego.
  - No se capitaliza «sombrío» ni se introduce lenguaje doctrinal ajeno al versículo.
  - Se mantiene el registro bíblico sobrio y legible para lectores de habla hispana.
