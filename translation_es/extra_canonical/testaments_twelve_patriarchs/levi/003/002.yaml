source:
  edition: Charles 1908 Greek Versions (pages 92-133, Levi pilot full)
  text: Καὶ ἔχει πῦρ χιόνα καὶ⁴ κρύσταλλον ἡτοιμασμένον⁵ εἰς A ª
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/003/002.yaml
  text: And it has fire, snow, and ice prepared for the day determined by God, as a righteous judgment of God upon men. In it are all the spirits of the punishments for vengeance on the lawless. Above this is the holy place, and in it are the hosts of the armies appointed for the day of judgment[b], to carry out vengeance on the spirits of deceit and of Beliar. Above them are the holy ones. In the highest of all dwells the Great Glory, far above all holiness. In the heaven next to it are the archangels, who minister and make propitiation to the Lord for all the sins committed in ignorance by the righteous, offering to the Lord a sweet-smelling fragrance, a reasonable and bloodless offering. And in the heaven below this are the angels who bear answers to the angels of the presence of the Lord. But in the heaven next below are thrones and dominions, in which hymns are continually offered to God. Therefore, when the Lord looks upon us through the degree of his holiness, the heavens are shaken.
    And the earth also is moved from its foundations, and, trembling, it is shaken to its depths. But the sons of men, having no understanding of these things[c], go astray and provoke him to anger.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y tiene fuego, nieve e hielo preparados para el día determinado por Dios, como un juicio justo de Dios sobre los hombres. En ella están todos los espíritus de los castigos para venganza contra los impíos. Encima de esto está el lugar santo, y en él están las huestes de los ejércitos designadas para el día del juicio, para ejecutar venganza sobre los espíritus del engaño y de Belial. Encima de ellos están los santos. En lo más alto de todo habita la Gran Gloria, muy por encima de toda santidad. En el cielo inmediatamente inferior están los arcángeles, que ministran y hacen propiciación al Señor por todos los pecados cometidos por ignorancia por los justos, ofreciendo al Señor un aroma fragante, una ofrenda razonable y sin sangre. En el cielo más abajo de este están los ángeles que llevan respuestas a los ángeles de la presencia del Señor. Pero en el cielo siguiente más abajo están tronos y dominios, en los cuales se ofrecen continuamente himnos a Dios. Por tanto, cuando el Señor nos
    mira a través del grado de su santidad, los cielos se estremecen. Y también la tierra es movida desde sus fundamentos, y, temblando, es sacudida hasta sus profundidades. Pero los hijos de los hombres, al no tener entendimiento de estas cosas[c], se extravían y lo provocan a ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: c
    text: «Estas cosas» remite a la compleja visión cosmológica y litúrgica descrita en el pasaje; la formulación conserva la ambigüedad del original.
    reason: spanish_style_note
lexical_decisions:
- source_word: πῦρ χιόνα καὶ κρύσταλλον
  english_pob_choice: fire, snow, and ice
  chosen_spanish: fuego, nieve e hielo
  alternatives_spanish:
  - fuego, nieve y hielo
  - fuego, nieve y cristal
  lexicon: πῦρ; χιών; κρύσταλλος
  rationale: Mantengo la tríada de elementos tal como aparece en el griego y en la POB inglesa. «Hielo» es la equivalencia española natural de κρύσταλλος en este contexto, mejor que «cristal», que puede sonar menos concreto o introducir ambigüedad.
- source_word: ἡτοιμασμένον εἰς
  english_pob_choice: prepared for
  chosen_spanish: preparados para
  alternatives_spanish:
  - preparado para
  - dispuestos para
  lexicon: ἑτοιμάζω
  rationale: Conservo la idea de preparación destinada a un momento específico. Ajusto el número en español a la enumeración plural de los elementos mencionados antes.
- source_word: ἡμέραν ὡρισμένην ὑπὸ θεοῦ
  english_pob_choice: the day determined by God
  chosen_spanish: el día determinado por Dios
  alternatives_spanish:
  - el día señalado por Dios
  - el día fijado por Dios
  lexicon: ὁρίζω; θεός
  rationale: «Determinado» reproduce bien la noción de un día fijado por decreto divino y es plenamente idiomático en español bíblico contemporáneo.
- source_word: κρίσιν δικαίαν θεοῦ
  english_pob_choice: a righteous judgment of God
  chosen_spanish: un juicio justo de Dios
  alternatives_spanish:
  - un juicio recto de Dios
  - un juicio de justicia de Dios
  lexicon: δίκαιος; κρίσις
  rationale: «Justo» conserva la fuerza moral/legal de δίκαιος sin forzar una formulación más abstracta. «Juicio» es el sustantivo más natural en español para κρίσις aquí.
- source_word: ἐπὶ τοὺς ἀνθρώπους
  english_pob_choice: upon men
  chosen_spanish: sobre los hombres
  alternatives_spanish:
  - contra los hombres
  - sobre la humanidad
  lexicon: ἄνθρωπος
  rationale: Sigo la lectura general de la POB, pero «sobre» conserva mejor la imagen de juicio que un simple «contra». «Los hombres» mantiene el paralelismo con la tradición de traducción del texto.
- source_word: οἱ πνεύματα τῶν κολάσεων
  english_pob_choice: the spirits of the punishments
  chosen_spanish: los espíritus de los castigos
  alternatives_spanish:
  - los espíritus de los tormentos
  - los espíritus de los suplicios
  lexicon: πνεῦμα; κόλασις
  rationale: Mantengo «espíritus» para πνεύματα y «castigos» para κόλασις, evitando intensificar hacia «tormentos» sin base explícita en el griego de este fragmento.
- source_word: εἰς ἐκδίκησιν
  english_pob_choice: for vengeance
  chosen_spanish: para venganza
  alternatives_spanish:
  - para retribución
  - para desquite
  lexicon: ἐκδίκησις
  rationale: «Venganza» conserva la dureza del término y el tono judicial del pasaje; «retribución» sería más suave y menos transparente para el lector.
- source_word: ἀνόμους
  english_pob_choice: the lawless
  chosen_spanish: los impíos
  alternatives_spanish:
  - los inicuos
  - los transgresores de la ley
  lexicon: ἄνομος
  rationale: La POB inglesa usa una categoría moral-teológica equivalente. En español, «impíos» comunica bien la condición de quienes se oponen a Dios y evita una perífrasis técnica.
- source_word: ὁ ἅγιος τόπος
  english_pob_choice: the holy place
  chosen_spanish: el lugar santo
  alternatives_spanish:
  - el lugar sagrado
  - el sitio santo
  lexicon: ἅγιος; τόπος
  rationale: «Lugar santo» es la equivalencia más directa y reconocible en español para el espacio sacro del texto.
- source_word: τὰ στρατεύματα τῶν στρατιῶν
  english_pob_choice: the hosts of the armies
  chosen_spanish: las huestes de los ejércitos
  alternatives_spanish:
  - las huestes militares
  - los ejércitos
  lexicon: στράτευμα; στρατιώτης
  rationale: Conservo la acumulación enfática de la expresión, aunque es redundante, porque el texto la presenta así. «Huestes de los ejércitos» replica la solemnidad y el carácter militar-celestial del original.
- source_word: παραστῆσαι
  english_pob_choice: to carry out
  chosen_spanish: para ejecutar
  alternatives_spanish:
  - para llevar a cabo
  - para realizar
  lexicon: παρίστημι
  rationale: Aquí el valor funcional es de comisión para actuar; «ejecutar» recoge la idea de puesta en obra del juicio/venganza sin suavizarla.
- source_word: τὰ πνεύματα τῆς ἀπάτης καὶ τοῦ Βελιάρ
  english_pob_choice: the spirits of deceit and of Beliar
  chosen_spanish: los espíritus del engaño y de Belial
  alternatives_spanish:
  - los espíritus del fraude y de Belial
  - los espíritus de la mentira y de Belial
  lexicon: ἀπάτη; Βελίαρ
  rationale: «Engaño» es la correspondencia más natural para ἀπάτη. Conservo «Belial» como transliteración habitual en español bíblico para este nombre demonológico.
- source_word: οἱ ἅγιοι
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos seres
  - los consagrados
  lexicon: ἅγιος
  rationale: En este contexto celestial, «los santos» es la forma más estable en español para los seres consagrados a Dios.
- source_word: ἡ Μεγάλη Δόξα
  english_pob_choice: the Great Glory
  chosen_spanish: la Gran Gloria
  alternatives_spanish:
  - la grande Gloria
  - la Gloria Majestuosa
  lexicon: δόξα
  rationale: Mantengo la designación titular y respetuosamente mayúscula. «Gran Gloria» preserva el carácter casi nominal del título sin añadir explicación interpretativa.
- source_word: λειτουργοῦσιν καὶ ἐξιλάσκονται
  english_pob_choice: who minister and make propitiation
  chosen_spanish: que ministran y hacen propiciación
  alternatives_spanish:
  - que sirven y hacen propiciación
  - que ministran y expían
  lexicon: λειτουργέω; ἐξιλάσκομαι
  rationale: Conservo «propiciación» porque la POB la elige deliberadamente y porque el término refleja la acción cultual dirigida a Dios. «Expiar» habría desplazado el foco hacia la culpa humana y perdería la matiz cultual del original.
- source_word: ὀλισθήματα τῶν δικαίων
  english_pob_choice: the sins committed in ignorance by the righteous
  chosen_spanish: los pecados cometidos por ignorancia por los justos
  alternatives_spanish:
  - las faltas cometidas por ignorancia por los justos
  - los pecados de los justos cometidos sin saber
  lexicon: ὀλίσθημα; δίκαιος
  rationale: Sigo de cerca la POB y mantengo el doble complemento para conservar que los justos son los autores de estos pecados por ignorancia.
- source_word: εὐώδη προσφορὰν
  english_pob_choice: a sweet-smelling fragrance, a reasonable and bloodless offering
  chosen_spanish: un aroma fragante, una ofrenda razonable y sin sangre
  alternatives_spanish:
  - un perfume fragante, una ofrenda razonable y sin sangre
  - un aroma grato, una ofrenda razonable y sin sangre
  lexicon: εὐώδης; προσφορά
  rationale: «Aroma fragante» comunica el matiz oloroso del griego. «Ofrenda razonable y sin sangre» sigue la formulación de la POB y conserva el lenguaje cultual sin expandirlo innecesariamente.
- source_word: ἀποκρίσεις
  english_pob_choice: answers
  chosen_spanish: respuestas
  alternatives_spanish:
  - contestaciones
  - respuestas orales
  lexicon: ἀπόκρισις
  rationale: «Respuestas» es directo y claro para el lector español. La imagen de mensajeros que llevan contestaciones queda intacta.
- source_word: θρόνοι καὶ κυριότητες
  english_pob_choice: thrones and dominions
  chosen_spanish: tronos y dominios
  alternatives_spanish:
  - tronos y señoríos
  - tronos y potestades
  lexicon: θρόνος; κυριότης
  rationale: «Dominios» sigue la POB inglesa y es suficientemente comprensible; «señoríos» o «potestades» introducirían una coloración distinta.
- source_word: ὑμνεῖται
  english_pob_choice: hymns are continually offered
  chosen_spanish: se ofrecen continuamente himnos
  alternatives_spanish:
  - se entonan continuamente himnos
  - se ofrecen himnos continuamente
  lexicon: ὑμνέω
  rationale: Respeto la pasiva impersonal de la POB con una formulación natural en español. «Se ofrecen» preserva la idea litúrgica de presentación continua.
- source_word: ἐθεασάμενος ... ἀπὸ τοῦ βαθμοῦ τῆς ἁγιότητος
  english_pob_choice: looks upon us through the degree of his holiness
  chosen_spanish: nos mira a través del grado de su santidad
  alternatives_spanish:
  - nos contempla según el grado de su santidad
  - nos mira conforme al grado de su santidad
  lexicon: θεάομαι; βαθμός; ἁγιότης
  rationale: Mantengo la expresión algo extraña «a través del grado de su santidad» porque la POB la ha conservado y refleja la particularidad del texto. En español es entendible y no requiere normalización.
- source_word: ἐσαλεύθησαν
  english_pob_choice: the heavens are shaken
  chosen_spanish: los cielos se estremecen
  alternatives_spanish:
  - los cielos son sacudidos
  - los cielos tiemblan
  lexicon: σαλεύω
  rationale: «Se estremecen» da buena fuerza cinética y sonoridad en español, manteniendo la pasiva/medio-reflexiva de la escena cósmica.
- source_word: ἡ γῆ ... ἐσαλεύθη εἰς τὰ βάθη αὐτῆς
  english_pob_choice: the earth is moved ... shaken to its depths
  chosen_spanish: la tierra es movida desde sus fundamentos, y, temblando, es sacudida hasta sus profundidades
  alternatives_spanish:
  - la tierra es removida desde sus fundamentos, y, temblando, es sacudida hasta sus profundidades
  - la tierra se mueve desde sus fundamentos, y, temblando, se sacude hasta sus profundidades
  lexicon: σαλεύω; βάθος
  rationale: Conservo la secuencia intensiva de movimiento y sacudida. «Desde sus fundamentos» y «hasta sus profundidades» reflejan la totalidad cósmica del estremecimiento.
- source_word: οἱ υἱοὶ τῶν ἀνθρώπων
  english_pob_choice: the sons of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los seres humanos
  - los hijos de la humanidad
  lexicon: υἱοί; ἄνθρωπος
  rationale: Mantengo la expresión idiomática heredada del texto para conservar su tono bíblico y su paralelismo con la POB.
- source_word: μὴ νοοῦντες ταῦτα
  english_pob_choice: having no understanding of these things
  chosen_spanish: al no tener entendimiento de estas cosas
  alternatives_spanish:
  - sin entender estas cosas
  - al no comprender estas cosas
  lexicon: νοέω
  rationale: «No tener entendimiento» reproduce bien la falta de percepción espiritual e intelectual del pasaje. La construcción es fluida en español y conserva el aspecto explicativo.
- source_word: πλανῶνται καὶ παροργίζουσιν αὐτόν
  english_pob_choice: go astray and provoke him to anger
  chosen_spanish: se extravían y lo provocan a ira
  alternatives_spanish:
  - se descarrían y lo provocan a ira
  - se desvían y lo irritan
  lexicon: πλανάω; παροργίζω
  rationale: «Se extravían» mantiene la imagen de desviación, y «provocan a ira» sigue la intensidad del verbo sin reducirlo a simple molestia.
theological_decisions:
- issue: Naturaleza y localización del juicio preparado por Dios
  english_pob_reading: the day determined by God, as a righteous judgment of God upon men
  chosen_spanish_reading: el día determinado por Dios, como un juicio justo de Dios sobre los hombres
  alternative_spanish_readings:
  - el día señalado por Dios, como un juicio recto de Dios sobre los hombres
  - el día fijado por Dios, como un juicio justo de Dios contra los hombres
  rationale: Conservo la lectura judicial y escatológica sin suavizar la escena. «Sobre los hombres» sigue la POB y deja abierta la relación entre juicio y objeto del juicio sin añadir una preposición más agresiva que el texto no exige.
  doctrine_reference: Juicio divino escatológico; cf. Ap 20:11-15
- issue: Propiciación por los pecados cometidos por ignorancia
  english_pob_reading: minister and make propitiation to the Lord for all the sins committed in ignorance by the righteous
  chosen_spanish_reading: ministran y hacen propiciación al Señor por todos los pecados cometidos por ignorancia por los justos
  alternative_spanish_readings:
  - ministran y expían ante el Señor por todos los pecados cometidos por ignorancia por los justos
  - ministran y ofrecen expiación al Señor por todos los pecados cometidos por ignorancia por los justos
  rationale: La POB preserva «propiciation» y yo la mantengo para no borrar la dirección cultual hacia Dios. Aunque «expiar» es posible, «propiciación» conserva mejor la tensión teológica y sacrificial del pasaje.
  doctrine_reference: Lenguaje sacrificial/cultual; cf. Levítico 4 y Heb 9:5-14
- issue: Belial como entidad personal del mal
  english_pob_reading: the spirits of deceit and of Beliar
  chosen_spanish_reading: los espíritus del engaño y de Belial
  alternative_spanish_readings:
  - los espíritus del engaño y de Beliar
  - los espíritus del engaño y del Maligno
  rationale: Conservo el nombre propio tradicional «Belial» para mantener la referencia demonológica/personificada del texto, en vez de sustituirlo por una glosa interpretativa más general.
  doctrine_reference: Angelología/demonología de la literatura intertestamentaria
- issue: Cosmología celestial jerarquizada
  english_pob_reading: Above this... In the highest of all... In the heaven next to it... next below... thrones and dominions
  chosen_spanish_reading: Encima de esto... En lo más alto de todo... En el cielo inmediatamente inferior... en el cielo siguiente más abajo... tronos y dominios
  alternative_spanish_readings:
  - Sobre esto... En lo más alto... En el cielo que le sigue... en el cielo inferior siguiente... tronos y dominios
  rationale: Mantengo la jerarquía de niveles celestiales tal como aparece en la POB y en la tradición del texto, sin reducirla a una formulación más moderna o simplificada.
  doctrine_reference: Cosmología apocalíptica/intertestamentaria; cf. 2 Co 12:2-4 (paralelo de cielos múltiples)
- issue: La expresión 'degree of his holiness'
  english_pob_reading: through the degree of his holiness
  chosen_spanish_reading: a través del grado de su santidad
  alternative_spanish_readings:
  - según el grado de su santidad
  - por el nivel de su santidad
  rationale: Aunque la expresión es inusual, la conservo para no borrar la rareza semántica del original y de la POB. La formulación mantiene el efecto de mediación/intensidad sin interpretarlo excesivamente.
  doctrine_reference: Santidad divina y teofanía; cf. Isa 6:1-5
translation_notes:
  revision_awareness: 'Se corrigió el problema detectado en la validación anterior: no se incluyen marcadores de nota sin anclaje. En esta versión solo aparece la nota [c], y está anclada explícitamente en el texto; no se usan marcadores [b] ni otros no presentes.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en lugar de «SEÑOR» solo donde el pasaje griego no contiene κύριος para el nombre divino; aquí el texto de fuente dado usa θεός/Señor en la POB inglesa, por lo que el registro español conserva «Dios» y «Señor» según corresponda.
  - Se conservó la cadencia enumerativa y las repeticiones del original, evitando simplificar la cosmología apocalíptica.
  - Se empleó español neutro y eclesialmente legible, sin reemplazar términos técnicos por glosas interpretativas innecesarias.
