  text: Φῶς²⁶ γνώσεως²⁷ φωτιεῖς²⁸ *ἐν τῷ Ἰακώβ²⁹, καὶ³⁰ ὡς³¹ ἥλιος *ἔσῃ³² παντὶ³³ σπέρματι³⁴ Ἰσραήλ.
