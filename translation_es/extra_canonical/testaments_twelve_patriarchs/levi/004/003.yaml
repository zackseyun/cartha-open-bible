base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/004/003.yaml
  text: You shall shine the light of knowledge in Jacob, and you shall be like the sun to all the seed of Israel.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:32Z'
    unchanged: false
    changes_summary: Changed 'shine forth the light' to 'shine the light' for closer alignment with the Greek φωτιεῖς while keeping natural formal English. Retained 'seed of Israel' as a literal rendering of σπέρματι Ἰσραήλ.
translation:
  language: es
  text: Tú iluminarás la luz del conocimiento en Jacob, y serás como el sol para toda la descendencia de Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Φῶς γνώσεως
  english_pob_choice: the light of knowledge
  chosen_spanish: la luz del conocimiento
  alternatives_spanish:
  - la luz del saber
  - la luz del conocimiento
  lexicon: φῶς; γνῶσις
  rationale: Conservo la construcción nominal literal y natural en español. «Conocimiento» mantiene mejor el valor objetivo del sustantivo que una paráfrasis como «saber», y «luz» refleja el símbolo de iluminación intelectual/espiritual sin añadir explicaciones.
- source_word: φωτιεῖς
  english_pob_choice: You shall shine the light
  chosen_spanish: iluminarás
  alternatives_spanish:
  - brillarás
  - iluminarás
  lexicon: φωτίζω
  rationale: El verbo griego expresa causar luz o iluminar. En español, «iluminarás» comunica la acción verbal con claridad y evita la redundancia de «brillar la luz», manteniendo la relación con la luz del conocimiento sin forzar una perífrasis.
- source_word: ἐν τῷ Ἰακώβ
  english_pob_choice: in Jacob
  chosen_spanish: en Jacob
  alternatives_spanish:
  - en Jacob
  lexicon: Ἰακώβ
  rationale: Mantengo el nombre propio y la preposición de forma directa, porque el texto apunta al ámbito de Jacob/Israel sin requerir ampliación interpretativa.
- source_word: ὡς ἥλιος
  english_pob_choice: like the sun
  chosen_spanish: como el sol
  alternatives_spanish:
  - como el sol
  lexicon: ἥλιος
  rationale: «Sol» es el equivalente natural y exacto en español. Conserva la comparación sin elevarla a metáfora explicativa adicional.
- source_word: παντὶ σπέρματι Ἰσραήλ
  english_pob_choice: to all the seed of Israel
  chosen_spanish: para toda la descendencia de Israel
  alternatives_spanish:
  - para toda la simiente de Israel
  - para toda la descendencia de Israel
  lexicon: σπέρμα
  rationale: «Descendencia» comunica el sentido genealógico y colectivo de σπέρμα sin la opacidad o posible extrañeza de «simiente» en español contemporáneo. Mantiene el paralelismo con el lenguaje bíblico de linaje.
theological_decisions:
- issue: Metáfora de iluminación aplicada a una figura de Jacob/Israel
  english_pob_reading: You shall shine the light of knowledge in Jacob
  chosen_spanish_reading: Tú iluminarás la luz del conocimiento en Jacob
  alternative_spanish_readings:
  - Tú brillarás con la luz del conocimiento en Jacob
  - Harás resplandecer la luz del conocimiento en Jacob
  rationale: Conservo la imagen de iluminación como imagen de instrucción o revelación, sin convertirla en una explicación doctrinal. La formulación mantiene la tensión entre el sujeto que irradia y la luz/conocimiento que se comunica.
  doctrine_reference: Sabiduría/revelación en lenguaje bíblico; no se hace identificación cristológica explícita aquí.
- issue: σπέρμα Ἰσραήλ y su fuerza colectiva/genealógica
  english_pob_reading: the seed of Israel
  chosen_spanish_reading: la descendencia de Israel
  alternative_spanish_readings:
  - la simiente de Israel
  - la descendencia de Israel
  rationale: Preservo el sentido corporativo y de linaje. «Descendencia» es comprensible y conserva la referencia al pueblo como posteridad, sin perder la literalidad básica del sustantivo.
  doctrine_reference: Lenguaje de pacto y posteridad israelita; referencia al linaje del pueblo de Israel.
translation_notes:
  revision_awareness: The latest English revision moved from 'shine forth the light of knowledge' to 'shine the light of knowledge' to align more closely with Greek φωτιεῖς while preserving a formal, readable rendering and retaining 'seed of Israel' literally. The Spanish draft follows that closer alignment by using a direct causative verb ('iluminarás') rather than expanding into 'brillarás la luz,' and keeps the collective lineage sense with 'descendencia de Israel'.
  spanish_consistency_notes:
  - Uso «descendencia» para σπέρμα en coherencia con un registro bíblico claro en español, evitando un calco poco natural.
  - Mantengo el futuro de indicativo en segunda persona singular para reproducir el tono profético/directivo del griego.
  - No añado notas textuales porque el paquete fuente no presenta variantes relevantes ni el inglés audit trail conserva notas adicionales.
