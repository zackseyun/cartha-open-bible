id: T12P.LEV.4.2
reference: Testament of Levi 4:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Εἰσήκουσεν¹⁷ Γοὖν¹⁸ ὁ ὕψιστος τῆς προσευχῆς¹⁹ σου *τοῦ διελεῖν²⁰ σε ἀπὸ²¹ ἀδικίας²² καὶ γενέσθαι αὐτῷ²³ *υἱὸν καὶ θεράποντα²⁴ καὶ λειτουργὸν²⁵ τοῦ προσώπου αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/004/002.yaml
  text: Therefore the Most High has heard your prayer, to separate you from unrighteousness and for you to become to him a son and a servant and a minister before him.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:32Z'
    unchanged: false
    changes_summary: Revised the final phrase from 'a minister of his presence' to 'a minister before him' to reflect λειτουργὸν τοῦ προσώπου αὐτοῦ more naturally and accurately in English while preserving the formal register.
translation:
  language: es
  text: Por tanto, el Altísimo ha escuchado tu oración, para apartarte de la injusticia y para que llegues a ser para él un hijo, un servidor y un ministro delante de él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Εἰσήκουσεν ... ὁ ὕψιστος
  english_pob_choice: the Most High has heard
  chosen_spanish: el Altísimo ha escuchado
  alternatives_spanish:
  - el Altísimo ha oído
  - el Altísimo ha atendido
  lexicon: ὕψιστος; εἰσακούω
  rationale: «Altísimo» conserva el título reverencial del original; «ha escuchado» reproduce el sentido efectivo de εἰσακούω como oír con respuesta, en un registro natural en español.
- source_word: ἀδικίας
  english_pob_choice: unrighteousness
  chosen_spanish: la injusticia
  alternatives_spanish:
  - la iniquidad
  - la injusticia y el mal
  lexicon: ἀδικία
  rationale: «Injusticia» conserva el valor moral y relacional de ἀδικία sin introducir un tecnicismo excesivo; también mantiene una correspondencia clara con el giro de separación moral del texto.
- source_word: υἱὸν
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un hijo varón
  lexicon: υἱός
  rationale: «Hijo» es la equivalencia directa y natural; no se requiere marcar sexo explícitamente en español, ya que el sustantivo ya funciona como filiación.
- source_word: θεράποντα
  english_pob_choice: a servant
  chosen_spanish: un esclavo
  alternatives_spanish:
  - un siervo
  - un servidor
  lexicon: θεράπων
  rationale: 'Aunque θεράπων puede matizar servicio honorable, el contexto del POB para vocabulario de servidumbre privilegia la fuerza lexical. «Esclavo» mantiene el peso de dependencia y pertenencia que el texto acumula junto a «hijo» y «ministro». '
- source_word: λειτουργὸν
  english_pob_choice: a minister
  chosen_spanish: un ministro
  alternatives_spanish:
  - un servidor litúrgico
  - un ministro sagrado
  lexicon: λειτουργός
  rationale: «Ministro» conserva la función de servicio oficial sin cargar innecesariamente una denominación eclesiástica moderna; corresponde bien al carácter formal del término griego.
- source_word: τοῦ προσώπου αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: πρόσωπον
  rationale: La revisión inglesa optó por «before him» para reflejar φυσικόmente τοῦ προσώπου αὐτοῦ. En español, «delante de él» conserva esa relación espacial/personal sin forzar «presencia», que podría desplazar el matiz original.
theological_decisions:
- issue: Secuencia de filiación y servicio
  english_pob_reading: to become to him a son and a servant and a minister before him
  chosen_spanish_reading: para que llegues a ser para él un hijo, un esclavo y un ministro delante de él
  alternative_spanish_readings:
  - para que seas para él un hijo, un siervo y un ministro delante de él
  - para que llegues a ser para él un hijo, un servidor y un ministro delante de él
  rationale: 'La triple expresión debe mantenerse sin suavizarla: el texto une filiación y formas de servicio/ministerio, y el español conserva esa tensión sin resolverla en una sola categoría devocional. «Esclavo» preserva la fuerza del vínculo de pertenencia donde el original distingue dos términos de servicio.'
  doctrine_reference: Relación de filiación y servidumbre en lenguaje honorífico; cf. uso lexical del estatus de servicio en textos bíblicos antiguos.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la frase final de «of his presence» a «before him» para reflejar con más naturalidad λειτουργὸν τοῦ προσώπου αὐτοῦ. La versión española sigue ese ajuste con «delante de él», evitando tanto una paráfrasis de presencia como una traducción demasiado literal de «rostro».
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para ὁ ὕψιστος en lugar de «el Más Alto», por ser la forma reverente y estable en español.
  - Se evita «SEÑOR» para el sujeto divino, ya que el griego dice ὁ ὕψιστος y no κύριος en este versículo.
  - «Esclavo» se usa de modo deliberado por la fuerza lexical del servicio, en continuidad con la política POB para δοῦλος/afines cuando el contexto lo justifica.
  - «Delante de él» conserva la relación espacial-personal final sin introducir una nota exegética ajena al texto.
