id: T12P.LEV.4.1
reference: Testament of Levi 4:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Νῦν οὖν γίνωσκε¹ ὅτι ποιήσει Κύριος κρίσιν ἐπὶ τοὺς υἱοὺς τῶν ἀνθρώπων. Ὅτι² πετρῶν³ σχιζομένων, καὶ τοῦ ἡλίου σβεννυμένου⁴ καὶ ὑδάτων⁵ ξηραινομένων καὶ τοῦ⁶ πυρὸς καταπτήσσοντος⁷ καὶ πάσης [τῆς]⁸ κτίσεως κλονουμένης⁹ καὶ τῶν ἀοράτων πνευμάτων¹⁰ τηκομένων¹¹ καὶ¹² τοῦ ᾅδου σκυλευομένου¹³ [ἐπὶ τῷ πάθει τοῦ ὑψίστου]¹⁴ *οἱ ἄνθρωποι ἀπειθοῦντες ἐπιμενοῦσι ταῖς ἀδικίαις¹⁵, διὰ τοῦτο ἐν Γτῇ¹⁶ κολάσει κριθήσονται.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/004/001.yaml
  text: Now therefore know that the Lord will execute judgment upon the sons of men. For when rocks are split, and the sun is extinguished, and waters dry up, and fire cowers, and all creation is shaken, and the invisible spirits melt away, and Hades is plundered [at the suffering of the Most High], disobedient men will persist in their injustices; therefore they will be judged in punishment.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:33Z'
    unchanged: false
    changes_summary: Removed unnecessary progressive forms for more natural formal English; changed 'are being split/extinguished/drying up/cowering/shaken/melting away/plundered' to simple present passive/active forms in the temporal clause; changed 'a greater punishment' to 'greater punishment' to reflect the anarthrous Greek more closely.
translation:
  language: es
  text: Ahora pues, sepan que el Señor ejecutará juicio sobre los hijos de los hombres. Porque cuando las rocas sean partidas, y el sol sea extinguido, y las aguas se sequen, y el fuego se acobarde, y toda la creación sea sacudida, y los espíritus invisibles se derritan, y el Hades sea despojado[a] [al padecimiento del Altísimo], los hombres desobedientes persistirán en sus injusticias; por eso serán juzgados con mayor castigo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «despojado» conserva la idea de expolio o saqueo del verbo griego σκυλεύω.
    reason: lexical_alternative
  - marker: b
    text: «mayor castigo» refleja el matiz comparativo sin añadir un artículo indefinido que no está en el griego.
    reason: theological_note
lexical_decisions:
- source_word: γίνωσκε
  english_pob_choice: know
  chosen_spanish: sepan
  alternatives_spanish:
  - sepa
  - conozcan
  lexicon: γινώσκω
  rationale: El imperativo exhortativo en plural se vierte naturalmente como «sepan» para conservar el llamado directo sin forzar un singular genérico.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: κύριος
  rationale: Aunque el proyecto suele usar «Yahvé» para el nombre divino, aquí el texto griego usa κύριος de manera titular y la formulación tradicional y legible en español es «el Señor».
- source_word: κρίσιν
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - juicio condenatorio
  lexicon: κρίσις
  rationale: «Juicio» conserva el término forense general sin añadir una modalidad condenatoria que el griego no explicita en este punto.
- source_word: υἱοὺς τῶν ἀνθρώπων
  english_pob_choice: sons of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los seres humanos
  - los hijos de la humanidad
  lexicon: υἱοί + ἄνθρωποι
  rationale: Se mantiene la expresión idiomática heredada del original, que no es meramente inclusiva sino proverbial y solemne.
- source_word: σχιζομένων
  english_pob_choice: are split
  chosen_spanish: sean partidas
  alternatives_spanish:
  - se partan
  - sean hendidas
  lexicon: σχίζω
  rationale: Se conserva la imagen física de fractura en un pasivo/subjuntivo natural en español.
- source_word: σβεννυμένου
  english_pob_choice: is extinguished
  chosen_spanish: sea extinguido
  alternatives_spanish:
  - se apague
  - sea apagado
  lexicon: σβέννυμι
  rationale: «Sea extinguido» refleja con más fidelidad el registro solemne y la idea de apagamiento total del sol.
- source_word: καταπτήσσοντος
  english_pob_choice: cowers
  chosen_spanish: se acobarde
  alternatives_spanish:
  - se estremezca
  - retroceda
  lexicon: καταπτήσσω
  rationale: El griego personifica el fuego con un movimiento de temor/encogimiento; «se acobarde» preserva esa personificación sin introducir una acción distinta.
- source_word: κλονουμένης
  english_pob_choice: is shaken
  chosen_spanish: sea sacudida
  alternatives_spanish:
  - sea conmovida
  - sea estremecida
  lexicon: κλονέω
  rationale: «Sacudida» conserva la fuerza de convulsión cósmica en un español claro y solemne.
- source_word: πνευμάτων ἀοράτων
  english_pob_choice: invisible spirits
  chosen_spanish: espíritus invisibles
  alternatives_spanish:
  - espíritus no visibles
  - espíritus ocultos
  lexicon: πνεῦμα + ἀόρατος
  rationale: La combinación se vierte de forma directa para mantener la tensión entre naturaleza espiritual e invisibilidad, sin reducirla a «seres» o «fuerzas».
- source_word: τηκομένων
  english_pob_choice: melt away
  chosen_spanish: se derritan
  alternatives_spanish:
  - se fundan
  - se licúen
  lexicon: τήκω
  rationale: «Se derritan» reproduce bien la imagen de disolución o debilitamiento extremo sin tecnicismos innecesarios.
- source_word: ᾅδου
  english_pob_choice: Hades
  chosen_spanish: el Hades
  alternatives_spanish:
  - el seol
  - el inframundo
  lexicon: ᾅδης
  rationale: Se conserva el nombre propio del ámbito de los muertos tal como lo hace la versión inglesa, evitando una sustitución interpretativa.
- source_word: σκυλευομένου
  english_pob_choice: is plundered
  chosen_spanish: sea despojado
  alternatives_spanish:
  - sea saqueado
  - sea despojado de botín
  lexicon: σκυλεύω
  rationale: «Despojado» comunica el saqueo/expolio con dignidad literaria y funciona bien con el sujeto Hades.
- source_word: ἐπιμενοῦσι
  english_pob_choice: will persist
  chosen_spanish: persistirán
  alternatives_spanish:
  - perseverarán
  - continuarán
  lexicon: ἐπιμένω
  rationale: «Persistirán» refleja la obstinación durativa del verbo en este contexto moral.
- source_word: ἀδικίαις
  english_pob_choice: injustices
  chosen_spanish: injusticias
  alternatives_spanish:
  - iniquidades
  - maldades
  lexicon: ἀδικία
  rationale: «Injusticias» mantiene el campo semántico de falta de rectitud/justicia sin moralizar más allá del texto.
- source_word: ἐν Γτῇ κολάσει
  english_pob_choice: in punishment
  chosen_spanish: con mayor castigo
  alternatives_spanish:
  - en castigo
  - con castigo mayor
  lexicon: κόλασις
  rationale: La revisión inglesa descartó el artículo indefinido y prefirió una construcción más cercana al griego; en español, «con mayor castigo» reproduce esa anarticularidad de forma natural.
theological_decisions:
- issue: Traducción de κύριος en una fuente que puede aludir al nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: En este pasaje, la forma griega presente es κύριος sin una marca explícita adicional de transcripción del nombre; por eso se traduce funcionalmente como «el Señor». Mantener «Yahvé» aquí requeriría una base más directa en el testimonio textual inmediato.
  doctrine_reference: Nombre divino / uso titular de κύριος
- issue: Mantenimiento de la imaginería apocalíptica cósmica
  english_pob_reading: when rocks are split... all creation is shaken... invisible spirits melt away
  chosen_spanish_reading: cuando las rocas sean partidas... toda la creación sea sacudida... los espíritus invisibles se derritan
  alternative_spanish_readings:
  - cuando las rocas se rompan... toda la creación tiemble... los espíritus invisibles desaparezcan
  rationale: Se preserva el encadenamiento de imágenes sin suavizarlo a una paráfrasis más abstracta; esto conserva la tensión escatológica y la secuencia de señales cósmicas del texto.
  doctrine_reference: Escatología / juicio final
- issue: Sentido de ᾅδης en relación con el mundo de los muertos
  english_pob_reading: Hades
  chosen_spanish_reading: el Hades
  alternative_spanish_readings:
  - el Seol
  - el inframundo
  rationale: Se retiene el nombre tradicional como término técnico, evitando una equivalencia interpretativa que podría borrar la resonancia intertestamentaria del pasaje.
  doctrine_reference: Estado de los muertos / vocabulario intertestamentario
- issue: Fuerza de κόλασις al final de la frase
  english_pob_reading: greater punishment
  chosen_spanish_reading: mayor castigo
  alternative_spanish_readings:
  - castigo mayor
  - castigo más severo
  rationale: La anarticularidad del griego favorece una expresión cualitativa; «mayor castigo» mantiene la comparación sin introducir un artículo que el griego no exige.
  doctrine_reference: Retribución / juicio penal
translation_notes:
  revision_awareness: 'La revisión inglesa simplificó las formas progresivas del temporal a presentes simples para mayor naturalidad y ajustó «a greater punishment» a «greater punishment» por la anarticularidad del griego. La redacción española sigue esa misma línea: usa presentes/auxiliares naturales en la cláusula temporal y evita introducir un artículo indefinido en el cierre.'
  spanish_consistency_notes:
  - Se mantiene «el Señor» para κύριος en consonancia con el texto fuente griego y con la decisión auditada del inglés.
  - Se conserva «Hades» como nombre propio técnico, no como «Seol» ni como «inframundo», para respetar la forma del audit trail inglés.
  - Las imágenes cósmicas se traducen con verbos de valor físico fuerte (partidas, extinguido, se acobarde, sacudida, se derritan) para no debilitar la tensión apocalíptica.
  - «Injusticias» y «castigo» mantienen el léxico moral-jurídico del pasaje sin sustituirlo por términos más explicativos.
