id: T12P.LEV.4.4
reference: Testament of Levi 4:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ δοθήσεταί σοι εὐλογία *καὶ παντὶ τῷ σπέρματί σου³⁵ ἕως³⁶ ἐπισκέψεται³⁷ Κύριος πάντα τὰ ἔθνη³⁸ ἐν σπλάγχνοις [υἱοῦ]³⁹ αὐτοῦ *ἕως αἰῶνος⁴⁰. [Πλὴν⁴¹ οἱ υἱοί σου ἐπιβαλοῦσι χεῖρας *ἐπ᾿ αὐτὸν⁴² *τοῦ ἀνασκολοπίσαι⁴³ αὐτόν.]
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/004/004.yaml
  text: And a blessing shall be given to you and to all your seed, until the Lord visits all the nations in the tender mercies of [his Son] forever. [But your sons shall lay hands upon him to impale him.]
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:32Z'
    unchanged: false
    changes_summary: Capitalized 'Son' to reflect the explicit filial reference in the Greek bracketed reading; otherwise the draft is accurate and natural.
translation:
  language: es
  text: Y se te dará bendición y a toda tu descendencia, hasta que Yahvé visite a todas las naciones en las entrañas misericordiosas de su Hijo para siempre. [a] [b] [c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Entrañas misericordiosas» conserva el lenguaje corporal-afectivo de σπλάγχνοις y explicita el matiz compasivo que la POB inglesa traduce como «tender mercies».
    reason: lexical_alternative
  - marker: b
    text: «Yahvé» se usa aquí para reflejar el nombre divino en κύριος según la política terminológica del proyecto, en lugar de una máscara reverencial.
    reason: theological_note
  - marker: c
    text: «Hijo» se capitaliza para reflejar la lectura explícitamente filial del griego entre corchetes y la revisión inglesa más reciente.
    reason: textual_variant
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: YHWH / κύριος
  rationale: El contexto habla de la visita de Dios a las naciones y la política terminológica del proyecto pide representar el nombre divino como «Yahvé» cuando el texto de origen remite al nombre divino, no ocultarlo bajo una forma reverencial genérica.
- source_word: σπλάγχνοις
  english_pob_choice: the tender mercies
  chosen_spanish: las entrañas misericordiosas
  alternatives_spanish:
  - las tiernas misericordias
  - las misericordias entrañables
  lexicon: σπλάγχνα
  rationale: «Entrañas» conserva el valor corporal-afectivo de σπλάγχνα; «misericordiosas» explicita el matiz de compasión que la POB inglesa verte como «tender mercies». La combinación mantiene la tensión entre literalidad y sentido.
- source_word: '[υἱοῦ]'
  english_pob_choice: '[his Son]'
  chosen_spanish: su Hijo
  alternatives_spanish:
  - su hijo
  lexicon: υἱός
  rationale: Se capitaliza «Hijo» porque el pasaje usa el sentido filial explícito en la lectura bracketed del griego y la revisión inglesa reciente también capitaliza esta referencia.
- source_word: σπέρματί σου
  english_pob_choice: your seed
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tu linaje
  lexicon: σπέρμα
  rationale: «Descendencia» es la forma española más natural y auditable para σπέρμα en contexto genealógico/promisorio, sin perder la referencia colectiva.
- source_word: ἐπισκέψεται
  english_pob_choice: visits
  chosen_spanish: visite
  alternatives_spanish:
  - atienda
  - se acuerde de
  lexicon: ἐπισκέπτομαι
  rationale: El verbo en futuro profético se vierte con subjuntivo final en español («hasta que Yahvé visite»), manteniendo la iniciativa divina y la idea de intervención providencial.
theological_decisions:
- issue: Referencia divina en κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: La edición POB en español debe ser transparente respecto del nombre divino; aquí «Yahvé» expresa mejor la referencia al Dios de Israel que una máscara litúrgica.
  doctrine_reference: Nombre divino / Tetragrámaton
- issue: Lectura filial en [υἱοῦ]
  english_pob_reading: his Son
  chosen_spanish_reading: su Hijo
  alternative_spanish_readings:
  - su hijo
  rationale: La capitalización distingue la referencia teológica del Hijo sin alterar el contenido del texto ni sobrerinterpretar el griego bracketed.
  doctrine_reference: Cristología
- issue: Alcance de la bendición
  english_pob_reading: a blessing shall be given to you and to all your seed
  chosen_spanish_reading: se te dará bendición y a toda tu descendencia
  alternative_spanish_readings:
  - se te concederá una bendición y a toda tu descendencia
  rationale: La pasiva impersonal española reproduce el don recibido y preserva el alcance corporativo sobre la descendencia, tal como en la lectura inglesa.
  doctrine_reference: Pacto / bendición patriarcal
translation_notes:
  revision_awareness: La revisión más reciente del contexto inglés solo corrigió la capitalización de «Son»; la versión española ya refleja esa distinción con «Hijo». No se añadieron glosas ajenas al griego, y se conservó la tensión interpretativa entre el lenguaje visceral de σπλάγχνοις y su valor compasivo. No se siguió la máscara «Señor» para κύριος por la política terminológica del proyecto y por la transparencia requerida.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y legible en español contemporáneo.
  - Se evitó «Cristo» porque el texto no usa χριστός; la referencia es al Hijo.
  - Se prefirió «descendencia» sobre «simiente» por claridad sin perder el sentido colectivo.
  - La puntuación y el orden sintáctico buscan reproducir la estructura causal-temporal del griego y del POB inglés.
