id: T12P.LEV.4.5
reference: Testament of Levi 4:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: ⸀Καὶ⸀⁴⁴ διὰ τοῦτο δέδωταί⁴⁵ σοι⁴⁶ βουλὴ καὶ σύνεσις τοῦ συνετίσαι τοὺς υἱούς σου⁴⁷ *περὶ τούτου⁴⁸.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/004/005.yaml
  text: And for this reason counsel and understanding have been given to you, so that you may instruct your sons concerning this.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:31Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y por esta razón te han sido dadas consejo y entendimiento, para que instruyas a tus hijos acerca de esto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: βουλὴ
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - counsel
  - consejo, consejo prudente
  - sabiduría práctica
  lexicon: βουλή
  rationale: Conserva la idea de una capacidad o don de consejo en un español natural y eclesialmente inteligible. 'Consejo' refleja bien el valor de orientación prudente sin añadir una noción técnica ajena al contexto.
- source_word: σύνεσις
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - inteligencia
  - discernimiento
  - comprensión
  lexicon: σύνεσις
  rationale: '''Entendimiento'' es la correspondencia más transparente y amplia para la capacidad de comprender y discernir. Mantiene el paralelismo con ''consejo'' sin forzar un matiz más técnico que el griego no exige aquí.'
- source_word: συνετίσαι
  english_pob_choice: to instruct
  chosen_spanish: instruyas
  alternatives_spanish:
  - enseñes
  - instruyas
  - hagas entender
  lexicon: συνίημι
  rationale: El infinitivo aoristo con valor de propósito expresa la finalidad de comunicar e inculcar. En español, 'instruyas' conserva el carácter formativo de la acción y sigue siendo más fiel que una paráfrasis explicativa.
- source_word: υἱούς σου
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos
  - tus hijos varones
  lexicon: υἱός
  rationale: Aunque el griego dice literalmente 'hijos/sons', en español 'tus hijos' comunica de forma natural la descendencia varonil sin introducir una restricción innecesariamente marcada. La opción 'hijos varones' sería más explícita, pero menos idiomática y más interpretativa.
- source_word: περὶ τούτου
  english_pob_choice: concerning this
  chosen_spanish: acerca de esto
  alternatives_spanish:
  - sobre esto
  - acerca de esto
  - en cuanto a esto
  lexicon: περί
  rationale: '''Acerca de esto'' reproduce con claridad la relación temática del sintagma preposicional sin sobrecargar la frase. Mantiene la referencia anafórica abierta, como en el griego.'
theological_decisions:
- issue: Sujeto implícito de la pasiva perfecta 'δέδωταί' y la lectura de don divino
  english_pob_reading: have been given to you
  chosen_spanish_reading: te han sido dadas
  alternative_spanish_readings:
  - te han sido otorgadas
  - te han sido concedidas
  - te han sido dadas por Dios
  rationale: La pasiva perfecta indica que el consejo y el entendimiento son dones recibidos, no cualidades autogeneradas. El español pasivo perifrástico preserva ese valor sin introducir explícitamente un agente que el texto no nombra en esta línea.
  doctrine_reference: Dones y capacitación divina para enseñar
- issue: Relación de propósito entre los dones y la instrucción de los hijos
  english_pob_reading: so that you may instruct your sons concerning this
  chosen_spanish_reading: para que instruyas a tus hijos acerca de esto
  alternative_spanish_readings:
  - para que enseñes a tus hijos acerca de esto
  - a fin de que instruyas a tus hijos sobre esto
  rationale: 'La cláusula final expresa finalidad: el consejo y el entendimiento tienen como propósito capacitar al destinatario para transmitir esa enseñanza. ''Para que instruyas'' preserva el propósito y la responsabilidad pedagógica del destinatario.'
  doctrine_reference: Transmisión fiel de la enseñanza en el ámbito familiar
translation_notes:
  revision_awareness: La versión inglesa POB ya estaba establecida como óptima-equivalente y sin cambios en la revisión más reciente; este borrador español sigue de cerca el sentido del griego sin necesidad de añadir notas textuales o variantes.
  spanish_consistency_notes:
  - Se mantiene 'consejo' y 'entendimiento' como pares semánticos claros y bíblicamente comprensibles.
  - Se evita traducir mecánicamente con calco inglés cuando el español permite una estructura natural ('te han sido dadas').
  - No se introduce 'Señor', 'Mesías' ni otro término confesional no presente en el versículo.
  - '''Tus hijos'' se conserva sin especificación adicional porque el contexto no exige una glosa más estrecha en esta línea.'
