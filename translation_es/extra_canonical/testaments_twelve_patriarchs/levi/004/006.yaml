translation:
  language: es
  text: Porque los que lo bendicen serán benditos, y los que lo maldicen perecerán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ εὐλογοῦντες
  english_pob_choice: those who bless
  chosen_spanish: los que lo bendicen
  alternatives_spanish:
  - los que lo bendicen
  - los que lo bendigan
  lexicon: εὐλογέω
  rationale: Se mantiene la acción presente/general del participio griego con una relativa natural en español. ‘Bendicen’ conserva el sentido activo y continuo sin añadir matices ajenos.
- source_word: εὐλογημένοι ἔσονται
  english_pob_choice: will be blessed
  chosen_spanish: serán benditos
  alternatives_spanish:
  - serán bendecidos
  - serán bienaventurados
  lexicon: εὐλογέω
  rationale: ‘Benditos’ conserva bien la forma adjetival/pasiva y suena más natural en una sentencia proverbial o profética que un pasivo más literal. ‘Bendecidos’ también es posible, pero ‘benditos’ refleja mejor el resultado recibido.
- source_word: οἱ καταρώμενοι
  english_pob_choice: those who curse
  chosen_spanish: los que maldicen
  alternatives_spanish:
  - los que lo maldicen
  - los que lo maldicen a él
  lexicon: καταράομαι
  rationale: ‘Maldicen’ transmite la fuerza de imprecación/reniego de κατάρα mejor que un simple ‘decir mal’. Se omite la repetición de ‘a él’ porque el pronombre objeto ya queda claro por el contexto y el ‘lo’.
- source_word: ἀπολοῦνται
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - se perderán
  - serán destruidos
  lexicon: ἀπόλλυμι
  rationale: ‘Perecerán’ reproduce bien la idea de ruina o perdición final sin especificar más de lo que el griego exige. ‘Serán destruidos’ intensifica el resultado; ‘se perderán’ puede sonar menos solemne.
theological_decisions:
- issue: Destino de quienes bendicen vs. quienes maldicen
  english_pob_reading: For those who bless him will be blessed, and those who curse him will perish.
  chosen_spanish_reading: Porque los que lo bendicen serán benditos, y los que lo maldicen perecerán.
  alternative_spanish_readings:
  - Pues los que lo bendigan serán bendecidos, y los que lo maldigan perecerán.
  rationale: Se conserva la estructura proverbial de retribución simétrica presente en el griego y reflejada en la POB inglesa. No se introduce interpretación adicional sobre el modo exacto de la bendición o la perdición.
  doctrine_reference: Principio de retribución/bendición y maldición en lenguaje sapiencial y profético
- issue: Referencia pronominal a la persona bendecida/maldecida
  english_pob_reading: him
  chosen_spanish_reading: lo
  alternative_spanish_readings:
  - a él
  rationale: El objeto directo masculino singular en español es la forma más natural y fiel al referente personal del texto. No se expande el referente por falta de base explícita en esta sola línea.
  doctrine_reference: Claridad referencial sin ampliar el referente textual
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios en la línea inglesa; por eso el español sigue de cerca el sentido ya estabilizado en la POB inglesa y el griego subyacente, sin añadir notas de variante textual.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente y sobrio propio de una fórmula oracular.
  - Se usa español neutral y publicable, evitando arcaísmos innecesarios.
  - No se emplea ‘Cristo’ ni ‘SEÑOR’ porque el texto no los contiene.
