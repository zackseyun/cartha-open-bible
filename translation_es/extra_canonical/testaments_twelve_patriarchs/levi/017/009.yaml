source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Διὰ τοῦτο ἐν αἰχμαλωσίᾳ καὶ ἐν προνομῇ ἔσονται· καὶ ἡ γῆ αὐτῶν⁴⁴ καὶ *ἡ ὕπαρξις⁴⁵ ἀφανισθήσεται⁴⁶.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/017/009.yaml
  text: Therefore they will be in captivity and in plunder, and their land and their possessions will be destroyed.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: Changed 'plundering' to the more direct 'plunder' to better match ἐν προνομῇ, and kept the rest while preserving the source's parallel clauses.
translation:
  language: es
  text: Por tanto, estarán en cautiverio y en despojo, y su tierra y sus posesiones serán destruidas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν αἰχμαλωσίᾳ
  english_pob_choice: in captivity
  chosen_spanish: en cautiverio
  alternatives_spanish:
  - en esclavitud
  - en cautividad
  lexicon: αἰχμαλωσία
  rationale: «Cautiverio» comunica el estado de ser llevados y mantenidos presos, y conserva el paralelismo con «despojo» sin sonar excesivamente arcaico. «Esclavitud» sería demasiado específico para la idea de captura, y «cautividad» es posible pero menos natural en español contemporáneo.
- source_word: ἐν προνομῇ
  english_pob_choice: in plunder
  chosen_spanish: en despojo
  alternatives_spanish:
  - en saqueo
  - en botín
  lexicon: προνομή
  rationale: El contexto y la revisión inglesa favorecen el sentido de resultado de saqueo, no el acto continuo de saquear. «Despojo» expresa bien la pérdida causada por pillaje y mantiene la simetría con «cautiverio». «Saqueo» puede sugerir la acción más que el estado resultante; «botín» suena más concreto pero menos abarcador.
- source_word: ἡ γῆ αὐτῶν
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - la tierra de ellos
  - su país
  lexicon: γῆ
  rationale: «Tierra» es la forma más directa y bíblica para γῆ aquí, sin desplazarlo a «país», que añadiría una precisión moderna no exigida por el griego.
- source_word: ἡ ὕπαρξις
  english_pob_choice: their possessions
  chosen_spanish: sus posesiones
  alternatives_spanish:
  - su existencia
  - sus bienes
  lexicon: ὕπαρξις
  rationale: Aunque ὕπαρξις puede abarcar «existencia» o «propiedad/bienes», el paralelo con la tierra y el contexto de despojo apoyan un sentido material. «Posesiones» mantiene esa amplitud patrimonial sin reducirlo solo a dinero o bienes muebles.
- source_word: ἀφανισθήσεται
  english_pob_choice: will be destroyed
  chosen_spanish: serán destruidas
  alternatives_spanish:
  - serán borradas
  - serán aniquiladas
  lexicon: ἀφανίζω
  rationale: «Destruir» refleja bien el borramiento o ruina total sin introducir una carga más fuerte de aniquilación absoluta. Se conserva el plural por la coordinación de «la tierra» y «las posesiones» en el español.
theological_decisions:
- issue: 'Destino de Israel/Judá en juicio: cautiverio y despojo como juicio divino implícito'
  english_pob_reading: Therefore they will be in captivity and in plunder, and their land and their possessions will be destroyed.
  chosen_spanish_reading: Por tanto, estarán en cautiverio y en despojo, y su tierra y sus posesiones serán destruidas.
  alternative_spanish_readings:
  - Por tanto, caerán en cautiverio y despojo...
  - Por tanto, estarán cautivos y serán saqueados...
  rationale: El versículo presenta un resultado judicial y colectivo; el español mantiene la pasiva perifrástica y el paralelismo sin añadir un sujeto explícito que el griego no da aquí. «En cautiverio y en despojo» preserva la fuerza del castigo sin sobreinterpretar el agente.
  doctrine_reference: Tema profético de juicio pactual y exilio; cf. patrones de maldición y deportación en la literatura bíblica.
translation_notes:
  revision_awareness: The English audit trail revised 'plundering' to 'plunder' for ἐν προνομῇ, emphasizing the result/state rather than the ongoing action. The Spanish rendering follows that revision by choosing 'en despojo' instead of a progressive or verbal form, and retains the tight parallelism of the two prepositional phrases plus the final destruction clause.
  spanish_consistency_notes:
  - Se usa «cautiverio» para αἰχμαλωσία de forma consistente con el sentido de captura y exilio.
  - Se evita «Cristo», «SEÑOR» u otras fórmulas no presentes en este verso.
  - «Despojo» traduce el estado de pillaje conforme a la revisión inglesa y al griego ἐν προνομῇ.
  - La oración conserva una cadencia bíblica clara y publicable sin añadir material interpretativo.
