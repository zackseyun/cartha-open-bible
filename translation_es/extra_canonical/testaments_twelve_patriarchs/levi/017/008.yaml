id: T12P.LEV.17.8
reference: Testament of Levi 17:8
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: '*Ἐν δὲ τῷ ἑβδόμῳ²⁷ ἔσται μιασμός⁴¹, ὃν οὐ δύναμαι⁴² εἰπεῖν ἐνώπιον⁴³ ἀνθρώπων· ὅτι αὐτοὶ γνώσονται οἱ ποιοῦντες αὐτά.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/017/008.yaml
  text: But in the seventh there will be defilement, which I cannot speak of before men, because those who do these things will know them.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: Changed 'for' to 'because' to reflect ὅτι, and kept the rest while preserving the source wording and structure.
translation:
  language: es
  text: Pero en el séptimo habrá contaminación,[a] que no puedo decir delante de los hombres, porque quienes hacen estas cosas las conocerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Contaminación» traduce el griego μιασμός y conserva la idea de impureza o corrupción sin decidir entre sentido ritual y moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσται
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - existirá
  - será
  lexicon: λέγω/εἰμί (copular existence in future)
  rationale: «Habrá» expresa la existencia futura de manera natural en español y sigue de cerca el valor de futuro existencial del griego sin forzar una perífrasis más pesada.
- source_word: μιασμός
  english_pob_choice: defilement
  chosen_spanish: contaminación
  alternatives_spanish:
  - impureza
  - mancha
  - profanación
  lexicon: μιασμός
  rationale: El término griego apunta a una contaminación/impureza ritual o moral. «Contaminación» mantiene la idea de ensuciamiento o corrupción resultante, sin cargar demasiado hacia una noción exclusivamente moral o exclusivamente ritual.
- source_word: οὐ δύναμαι εἰπεῖν
  english_pob_choice: I cannot speak of
  chosen_spanish: no puedo decir
  alternatives_spanish:
  - no puedo hablar de
  - no me es posible decir
  lexicon: δύναμαι + εἰπεῖν
  rationale: «No puedo decir» reproduce la restricción de habla con una forma idiomática y concisa en español; «hablar de» sería también posible, pero «decir» conserva mejor la economía del original.
- source_word: ἐνώπιον ἀνθρώπων
  english_pob_choice: before men
  chosen_spanish: delante de los hombres
  alternatives_spanish:
  - ante los hombres
  - en presencia de los hombres
  lexicon: ἐνώπιον
  rationale: «Delante de los hombres» conserva el matiz de presencia pública del original y sigue la tradición bíblica de esta preposición, sin volverla arcaizante.
- source_word: οἱ ποιοῦντες αὐτά
  english_pob_choice: those who do these things
  chosen_spanish: quienes hacen estas cosas
  alternatives_spanish:
  - los que hacen estas cosas
  - los que practican estas cosas
  lexicon: ποιέω
  rationale: «Quienes hacen estas cosas» es una forma natural y precisa; mantiene el sentido general de practicar/realizar actos concretos sin añadir interpretación.
- source_word: γνώσονται
  english_pob_choice: will know them
  chosen_spanish: las conocerán
  alternatives_spanish:
  - sabrán de ellas
  - las sabrán
  lexicon: γινώσκω
  rationale: El verbo griego puede implicar conocer o llegar a saber. «Las conocerán» conserva la referencia directa al objeto ya mencionado («estas cosas») y mantiene el enlace pronominal.
theological_decisions:
- issue: Naturaleza de μιασμός en un contexto profético-apocalíptico
  english_pob_reading: defilement
  chosen_spanish_reading: contaminación
  alternative_spanish_readings:
  - impureza
  - mancha ritual
  rationale: No se suaviza el término; se conserva una idea de contaminación real, compatible con lenguaje ritual y moral. «Contaminación» deja abierta la tensión entre impureza ceremonial y corrupción ética sin resolverla prematuramente.
  doctrine_reference: Pureza/impureza ritual en la tradición bíblica; cf. Levítico 11–15
- issue: Referencia de αὐτά y el alcance de 'these things'
  english_pob_reading: those who do these things will know them
  chosen_spanish_reading: quienes hacen estas cosas las conocerán
  alternative_spanish_readings:
  - los que hacen estas cosas las sabrán
  - quienes practican estas cosas las conocerán
  rationale: 'Se mantiene la ambigüedad del pronombre: puede apuntar al conocimiento interno de los propios actos o al reconocimiento de sus consecuencias. No se especifica más de lo que el griego permite.'
  doctrine_reference: Principio de cautela exegética; cf. 1 Corintios 4:5
- issue: Expresión pública 'before men'
  english_pob_reading: before men
  chosen_spanish_reading: delante de los hombres
  alternative_spanish_readings:
  - ante los hombres
  - en presencia de los hombres
  rationale: Se preserva la restricción pública del decir, sin convertirla en una alusión técnica. La frase mantiene el tono de solemnidad y reserva del original.
  doctrine_reference: Lenguaje de reserva profética; cf. Daniel 12:4
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió 'for' por 'because' para reflejar ὅτι. La redacción española reproduce esa relación causal con «porque» y conserva la estructura general de la oración del texto griego, incluyendo la pausa tras «habrá contaminación».
  spanish_consistency_notes:
  - Se mantiene «hombres» para ἀνθρώπων siguiendo el registro bíblico habitual del pasaje, sin introducir opciones inclusivas que no están sugeridas por el texto fuente.
  - Se evita 'Cristo', 'SEÑOR' u այլ terminología no presente en el versículo; el texto no contiene designaciones divinas o mesiánicas.
  - La puntuación separa la cláusula relativa con coma para reflejar la sintaxis del original y la revisión inglesa más reciente.
