base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/017/004.yaml
  text: But the third priest will be taken away with grief.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: Adjusted the verb phrase to better reflect παραληφθήσεται and made the prepositional phrase more natural English while preserving the source meaning.
translation:
  language: es
  text: Pero el tercer sacerdote será apartado con tristeza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὁ δὲ τρίτος ἱερεὺς
  english_pob_choice: But the third priest
  chosen_spanish: Pero el tercer sacerdote
  alternatives_spanish:
  - Pero el tercer sacerdote
  lexicon: ἱερεύς
  rationale: Se mantiene el orden y el sentido referencial de ‘the third priest’. En español, ‘sacerdote’ es la equivalencia natural y más precisa para ἱερεύς.
- source_word: παραληφθήσεται
  english_pob_choice: will be taken away
  chosen_spanish: será apartado
  alternatives_spanish:
  - será llevado
  - será tomado
  - será quitado
  lexicon: παραλαμβάνω
  rationale: La forma pasiva futura expresa una acción sufrida sobre el sujeto. ‘Ser apartado’ comunica con claridad la idea de retirada o remoción sin forzar una imagen demasiado específica que el contexto no exige.
- source_word: λύπῃ
  english_pob_choice: with grief
  chosen_spanish: con tristeza
  alternatives_spanish:
  - con dolor
  - con aflicción
  - en tristeza
  lexicon: λύπη
  rationale: λύπη puede abarcar tristeza, dolor o aflicción. En español, ‘con tristeza’ reproduce bien el matiz afectivo y resulta más natural que un calco rígido. Se evita ‘grief’ como ‘duelo’ porque el contexto no obliga a un luto formal.
theological_decisions:
- issue: Naturaleza de la remoción del tercer sacerdote
  english_pob_reading: will be taken away
  chosen_spanish_reading: será apartado
  alternative_spanish_readings:
  - será quitado
  - será llevado
  rationale: No se explicita la causa ni el destino final; por eso la traducción conserva la sobriedad del pasivo. ‘Apartado’ deja abierta la tensión del texto sin añadir interpretación.
  doctrine_reference: Soberanía divina y juicio en literatura apocalíptica/sapiencial
- issue: Valor afectivo de λύπῃ
  english_pob_reading: with grief
  chosen_spanish_reading: con tristeza
  alternative_spanish_readings:
  - con aflicción
  - con dolor
  rationale: El texto presenta la remoción acompañada por un estado de pena. ‘Tristeza’ mantiene el afecto sin sobreteologizarlo ni convertirlo en término técnico.
  doctrine_reference: Lenguaje bíblico de sufrimiento y lamentación
translation_notes:
  revision_awareness: La revisión inglesa ajustó 'taken in grief' a 'taken away with grief' para reflejar mejor παραληφθήσεται. El español sigue esa actualización mediante un pasivo natural (‘será apartado’) y conserva la preposición acompañante (‘con tristeza’), manteniendo el vínculo entre remoción y pena.
  spanish_consistency_notes:
  - Se usa ‘sacerdote’ de forma uniforme para ἱερεύς.
  - Se evita ‘Cristo’, ‘SEÑOR’ o formulaciones interpretativas ajenas al breve enunciado.
  - La frase conserva el tono profético y no añade sujetos tácitos ni detalles inexistentes en el griego.
