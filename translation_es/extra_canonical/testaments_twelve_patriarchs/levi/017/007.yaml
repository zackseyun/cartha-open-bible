translation:
  language: es
  text: Igualmente, el sexto y el séptimo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὡσαύτως
  english_pob_choice: Likewise
  chosen_spanish: Igualmente
  alternatives_spanish:
  - Asimismo
  - De igual modo
  lexicon: Ὡσαύτως
  rationale: El adverbio marca continuidad o correspondencia con lo anterior. «Igualmente» conserva ese valor relacional en español sin sonar forzado.
- source_word: ὁ ἕκτος
  english_pob_choice: the sixth
  chosen_spanish: el sexto
  alternatives_spanish:
  - el sexto [hombre]
  - el sexto [uno]
  lexicon: ἕκτος
  rationale: El griego usa ordinal sustantivado con artículo; en español puede quedar igualmente sustantivado como «el sexto» sin añadir un complemento que el texto no expresa.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: καί
  rationale: Conecta los dos ordinales de forma directa; la forma normal en español es «y».
- source_word: ὁ ἕβδομος
  english_pob_choice: the seventh
  chosen_spanish: el séptimo
  alternatives_spanish:
  - el séptimo [hombre]
  - el séptimo [uno]
  lexicon: ἕβδομος
  rationale: Se mantiene la misma sustantivación que en «el sexto», reflejando la brevedad del original sin añadir contenido implícito.
theological_decisions:
- issue: Referencia implícita de los ordinales a personas o elementos enumerados previamente
  english_pob_reading: Likewise, the sixth and the seventh.
  chosen_spanish_reading: Igualmente, el sexto y el séptimo.
  alternative_spanish_readings:
  - Igualmente, el sexto y el séptimo [hombres].
  - De igual modo, el sexto y el séptimo [elementos].
  rationale: El texto griego y la versión inglesa conservan la elipsis; no hay base suficiente para especificar si se trata de hombres, días, partes u otro referente. En español se preserva la misma apertura semántica.
  doctrine_reference: Principio de transparencia textual y no sobreespecificación
translation_notes:
  revision_awareness: La revisión inglesa reciente solo añadió una coma natural y no cambió el contenido. Por eso el español mantiene una estructura igualmente breve y una puntuación simple equivalente.
  spanish_consistency_notes:
  - Se conserva «Igualmente» para reflejar el adverbio de enlace del griego y la English POB.
  - Se mantiene la elipsis nominal del original; no se introduce un referente no explicitado.
  - El tono es sobrio y publicable, acorde con una nota breve de enumeración.
