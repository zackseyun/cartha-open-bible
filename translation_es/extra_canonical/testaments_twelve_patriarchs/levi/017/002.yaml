id: T12P.LEV.17.2
reference: Testament of Levi 17:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καθ’ ἕκαστον γὰρ ἰωβηλαῖον⁶ ἔσται ἱερωσύνη⁷. Καὶ⁸ ἐν τῷ⁹ πρώτῳ ἰωβηλαίῳ ὁ *χριόμενος πρῶτος¹⁰ εἰς ἱερωσύνην *ἔσται μέγας¹¹, καὶ λαλήσει¹² Θεῷ ὡς πατρί· καὶ ἡ ἱερωσύνη αὐτοῦ πλήρης μετὰ¹³ κυρίου· [καὶ ἐν ἡμέραις¹⁴ χαρᾶς αὐτοῦ¹⁵ *ἐπὶ σωτηρίᾳ¹⁶ κόσμου *αὐτὸς ἀναστήσεται]¹⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/017/002.yaml
  text: For in each jubilee there will be a priesthood. And in the first jubilee, the one first anointed for the priesthood will be great, and he will speak to God as to a father; and his priesthood will be full with the Lord. [And in the days of his joy, he will arise for the salvation of the world.]
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: Adjusted the opening to retain the source’s connective 'And'; changed 'complete' to 'full' to better reflect πλήρης; added a comma in the bracketed clause for natural English punctuation.
translation:
  language: es
  text: Porque en cada jubileo habrá un sacerdocio. Y en el primer jubileo, el primero ungido para el sacerdocio será grande, y hablará a Dios como a un padre; y su sacerdocio estará lleno[a] con el Señor. [Y en los días de su gozo, se levantará para la salvación del mundo.]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pleno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰωβηλαῖον
  english_pob_choice: jubilee
  chosen_spanish: jubileo
  alternatives_spanish:
  - año de jubileo
  lexicon: —
  rationale: Se conserva el término técnico bíblico e histórico 'jubileo', que en español es natural y comunica la institución del texto sin explicarla excesivamente.
- source_word: ἱερωσύνη
  english_pob_choice: priesthood
  chosen_spanish: sacerdocio
  alternatives_spanish:
  - sacerdocio ministerial
  lexicon: —
  rationale: '''Sacerdocio'' reproduce el sustantivo abstracto y mantiene la referencia institucional del pasaje.'
- source_word: χριόμενος
  english_pob_choice: the one first anointed
  chosen_spanish: el primero ungido
  alternatives_spanish:
  - el que primero es ungido
  - el ungido primero
  lexicon: —
  rationale: '''Ungido'' refleja directamente la raíz de χρίω y ''el primero'' preserva la prioridad temporal/secuencial del griego y del audit trail inglés.'
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - importante
  - magnífico
  lexicon: —
  rationale: '''Grande'' es la equivalencia más directa y sobria; evita introducir valoración interpretativa adicional.'
- source_word: λαλήσει Θεῷ ὡς πατρί
  english_pob_choice: he will speak to God as to a father
  chosen_spanish: hablará a Dios como a un padre
  alternatives_spanish:
  - hablará con Dios como con un padre
  - hablará a Dios como a Padre
  lexicon: —
  rationale: Se mantiene la comparación explícita 'como a un padre', sin capitalizar 'Padre' para no ir más allá del griego ni cerrar la imagen en una fórmula teológica fija.
- source_word: πλήρης
  english_pob_choice: full
  chosen_spanish: estará lleno
  alternatives_spanish:
  - será pleno
  - estará completo
  lexicon: —
  rationale: '''Estará lleno'' sigue de cerca la decisión revisada de ''full'' y preserva la imagen de plenitud/llenura sin forzar un tecnicismo.'
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: —
  rationale: Aquí se conserva 'el Señor' porque el griego usa κύριος y el contexto del audit trail inglés no indica con certeza que deba sustituirse por el nombre divino; además, la frase fija 'con el Señor' suena natural en español y mantiene la ambigüedad reverente del original.
- source_word: ἐπὶ σωτηρίᾳ κόσμου
  english_pob_choice: for the salvation of the world
  chosen_spanish: para la salvación del mundo
  alternatives_spanish:
  - a causa de la salvación del mundo
  - en favor de la salvación del mundo
  lexicon: —
  rationale: '''Para la salvación del mundo'' reproduce la finalidad/resultado del griego y coincide con la lectura inglesa sin añadir matices doctrinales ajenos.'
- source_word: ἀναστήσεται
  english_pob_choice: he will arise
  chosen_spanish: se levantará
  alternatives_spanish:
  - resucitará
  - surgirá
  lexicon: —
  rationale: '''Se levantará'' es la equivalencia española más neutral para ἀνίστημι/ἀναστήσεται en este contexto; ''resucitará'' sería demasiado interpretativo aquí.'
theological_decisions:
- issue: Relación con Dios expresada como paternidad
  english_pob_reading: he will speak to God as to a father
  chosen_spanish_reading: hablará a Dios como a un padre
  alternative_spanish_readings:
  - hablará con Dios como con un padre
  - hablará a Dios como a Padre
  rationale: Se preserva la tensión reverente y familiar del símil sin convertirlo en una designación doctrinal más fuerte de la que el texto ofrece.
  doctrine_reference: paternidad divina / lenguaje relacional
- issue: κύριος en el contexto de plenitud sacerdotal
  english_pob_reading: his priesthood will be full with the Lord
  chosen_spanish_reading: su sacerdocio estará lleno con el Señor
  alternative_spanish_readings:
  - su sacerdocio será pleno con el Señor
  - su sacerdocio estará lleno de el Señor
  rationale: Se mantiene la redacción con 'el Señor' y la idea de plenitud asociada a su presencia/acompañamiento, sin resolver de manera indebida si κύριος apunta aquí al nombre divino o al señorío general. La formulación española conserva esa tensión.
  doctrine_reference: κύριος / presencia del Señor
- issue: Cláusula bracketed concerning salvation of the world
  english_pob_reading: And in the days of his joy, he will arise for the salvation of the world.
  chosen_spanish_reading: Y en los días de su gozo, se levantará para la salvación del mundo.
  alternative_spanish_readings:
  - Y en los días de su alegría, se levantará para la salvación del mundo.
  - Y en los días de su gozo, resucitará para la salvación del mundo.
  rationale: Se conserva la cláusula entre corchetes como material textual adicional, sin intensificar 'se levantará' a 'resucitará', ya que el griego y el audit trail no obligan a esa lectura aquí.
  doctrine_reference: escatología / lenguaje de levantarse
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente al conservar la conectiva inicial «Y», traducir πλήρης con un valor de plenitud ('estará lleno') en vez de una idea de mera culminación, y mantener la cláusula bracketed con puntuación natural. También respeta el paratexto entre corchetes como en el testimonio griego y en el POB inglés.
  spanish_consistency_notes:
  - Se mantiene «jubileo» de forma consistente como término técnico.
  - Se evita «Cristo» porque el pasaje no usa Χριστός como título estándar en este contexto; se traduce el lenguaje de unción con «ungido».
  - Se conserva «el Señor» para κύριος en lugar de sustituirlo por «Yahvé», ya que el contexto inmediato no exige esa explicitación.
  - Se ha evitado una traducción que borre la distinción entre la cláusula principal y la frase entre corchetes.
