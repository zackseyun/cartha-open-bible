translation:
  language: es
  text: Y como habéis oído acerca de las setenta semanas, oíd también acerca del sacerdocio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ὅτι ἠκούσατε ... ἀκούσατε καὶ
  english_pob_choice: And since you have heard ... hear also
  chosen_spanish: Y como habéis oído ... oíd también
  alternatives_spanish:
  - Y puesto que habéis oído ... escuchad también
  - Y dado que habéis oído ... oíd también
  lexicon: ἀκούω
  rationale: El griego repite el verbo oír/escuchar como enlace retórico. En español, 'como habéis oído' conserva el valor causal-temporal de ὅτι en este contexto, y 'oíd también' mantiene el paralelismo imperativo sin sobrerreformular.
- source_word: τῶν ἑβδομήκοντα ἑβδομάδων
  english_pob_choice: the seventy weeks
  chosen_spanish: las setenta semanas
  alternatives_spanish:
  - las setenta semanas proféticas
  - las setenta hebdómadas
  lexicon: ἑβδομήκοντα / ἑβδομάδων
  rationale: La forma más transparente y fiel es 'setenta semanas'. 'Hebdómadas' sería más técnico pero menos natural y no aparece en el audit trail inglés. No se añade 'proféticas' porque el texto base solo dice 'seventy weeks'.
- source_word: τῆς ἱερωσύνης
  english_pob_choice: the priesthood
  chosen_spanish: el sacerdocio
  alternatives_spanish:
  - el ministerio sacerdotal
  - la función sacerdotal
  lexicon: ἱερωσύνη
  rationale: '''Sacerdocio'' es el equivalente español directo y mantiene el sustantivo abstracto del griego. Las alternativas explicativas serían más interpretativas que el original.'
theological_decisions:
- issue: Relación entre las 'setenta semanas' y el 'sacerdocio' como bloques temáticos de la exhortación
  english_pob_reading: And since you have heard about the seventy weeks, hear also about the priesthood.
  chosen_spanish_reading: Y como habéis oído acerca de las setenta semanas, oíd también acerca del sacerdocio.
  alternative_spanish_readings:
  - Y puesto que habéis oído acerca de las setenta semanas, escuchad también acerca del sacerdocio.
  - Y ya que habéis oído sobre las setenta semanas, oíd también sobre el sacerdocio.
  rationale: La frase mantiene la conexión discursiva simple del griego sin interpretar la relación teológica entre ambos temas. No se añade explicación escatológica o histórica, porque el versículo solo anuncia el cambio de asunto.
  doctrine_reference: T12P. Levi 17:1; continuity of discourse without doctrinal expansion
translation_notes:
  revision_awareness: The latest revision pass marked the verse unchanged; the Spanish draft follows the stable source reading and the English POB sense without introducing new interpretive decisions.
  spanish_consistency_notes:
  - Se mantiene 'sacerdocio' como término abstracto y eclesiástico común, sin ampliar a 'ministerio sacerdotal'.
  - Se conserva el paralelismo auditivo 'habéis oído / oíd también' para reflejar la reiteración del griego.
  - No se añade puntuación explicativa que altere el ritmo breve del verso.
