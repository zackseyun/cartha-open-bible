  text: '*Καὶ ἐν τῇ πέμπτῃ⁴⁷ ἑβδομάδι⁴⁸ ἐπιστρέψουσιν εἰς γῆν ἐρημώσεως αὐτῶν, καὶ⁴⁹ ἀνακαινοποιήσουσιν οἶκον κυρίου⁵⁰.'
