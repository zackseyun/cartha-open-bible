base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/017/010.yaml
  text: And in the fifth week they will return to the land of their desolation, and they will renew the house of the Lord.
  revision_pass:
    model: gpt-5.4-mini
