translation:
  language: es
  text: Y en la quinta semana volverán a la tierra de su desolación, y renovarán la casa de Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τῇ πέμπτῃ ἑβδομάδι
  english_pob_choice: in the fifth week
  chosen_spanish: en la quinta semana
  alternatives_spanish:
  - en la quinta semana profética
  - en la quinta septena
  lexicon: ἑβδομάς
  rationale: El griego usa ἑβδομάς, que aquí designa una unidad de siete, naturalmente expresable en español como «semana». Mantiene la misma referencia temporal que la versión inglesa sin introducir tecnicismos innecesarios.
- source_word: γῆν ἐρημώσεως αὐτῶν
  english_pob_choice: the land of their desolation
  chosen_spanish: la tierra de su desolación
  alternatives_spanish:
  - la tierra de su desolamiento
  - la tierra devastada de ellos
  lexicon: γῆ / ἐρήμωσις
  rationale: «Desolación» conserva el sustantivo abstracto del griego y refleja bien la idea de una tierra arrasada o vaciada. «Desolamiento» sería posible, pero menos natural en español contemporáneo.
- source_word: ἀνακαινοποιήσουσιν
  english_pob_choice: they will renew
  chosen_spanish: renovarán
  alternatives_spanish:
  - reharán
  - restaurarán
  - volverán a renovar
  lexicon: ἀνακαινοποιέω
  rationale: El verbo compuesto expresa hacer de nuevo o renovar. «Renovarán» es la forma más directa y fiel en español; evita sobrecargar con «restaurarán», que podría sugerir una reconstrucción más amplia de la que el texto exige.
- source_word: οἶκον κυρίου
  english_pob_choice: the house of the Lord
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa del Señor
  - el templo de Yahvé
  lexicon: οἶκος / κύριος
  rationale: Se mantiene «casa» porque el griego dice οἶκος y no un término técnico para templo. Se traduce κύριος como «Yahvé» conforme a la norma del proyecto para el nombre divino, dada la referencia al Dios de Israel.
theological_decisions:
- issue: Traducción del título divino κύριος en una construcción cultual
  english_pob_reading: the house of the Lord
  chosen_spanish_reading: la casa de Yahvé
  alternative_spanish_readings:
  - la casa del Señor
  - la casa del Dios
  rationale: Aunque el griego usa κύριος, en este contexto la referencia es al nombre divino de Israel, no a un título genérico. La política del proyecto pide Yahvé en español cuando el trasfondo es el nombre sagrado.
  doctrine_reference: Nombre divino / Tetragrámaton
translation_notes:
  revision_awareness: La versión inglesa revisada fue marcada como correcta sin cambios; la presente propuesta sigue esa lectura y no introduce variantes textuales ni notas adicionales.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo coordinado del griego con dos futuros: «volverán» / «renovarán».'
  - No se añadió artículo o especificación interpretativa en «casa» para no desplazar el paralelo con οἶκος.
  - Se evitó «SEÑOR» en favor de «Yahvé» según la terminología del proyecto.
