id: T12P.LEV.17.5
reference: Testament of Levi 17:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ²⁷ ὁ τέταρτος ἐν ὀδύναις²⁸ ἔσται· ὅτι²⁹ προσθήσει³⁰ *ἐπ’ αὐτῷ³¹ *ἡ ἀδικία³² *εἰς πλῆθος³³, καὶ πᾶς Ἰσραὴλ μισήσουσιν³⁴ ἕκαστος³⁵ τὸν³⁶ πλησίον αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/017/005.yaml
  text: And the fourth will be in pains, because lawlessness will increase upon him to abundance, and all Israel will hate each one his neighbor.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: Changed 'unrighteousness' to 'lawlessness' for ἀδικία, and smoothed the final clause to better reflect 'each one his neighbor' without added punctuation or paraphrase.
translation:
  language: es
  text: Y el cuarto estará en dolores, porque el desprecio por la ley se multiplicará sobre él hasta la abundancia, y todos en Israel odiarán, cada uno, a su prójimo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν ὀδύναις
  english_pob_choice: in pains
  chosen_spanish: en dolores
  alternatives_spanish:
  - en sufrimientos
  - con dolores
  lexicon: ὀδύναις
  rationale: Conserva la imagen de dolor intenso y pluralidad de aflicciones sin suavizarla a una interpretación más general como 'sufrimientos'.
- source_word: ἀδικία
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - anomia
  - ilegalidad
  - injusticia
  lexicon: ἀδικία
  rationale: La decisión inglesa de 'lawlessness' apunta a una idea de perversidad sin ley, pero en español 'iniquidad' comunica bien esa carga moral y evita un calco poco natural como 'sin ley' dentro de la frase.
- source_word: εἰς πλῆθος
  english_pob_choice: to abundance
  chosen_spanish: hasta abundancia
  alternatives_spanish:
  - en abundancia
  - hasta multiplicarse
  lexicon: πλῆθος
  rationale: Reproduce la intensificación del griego con una construcción idiomática en español, manteniendo la idea de incremento desbordado.
- source_word: πᾶς Ἰσραὴλ
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el Israel
  - Israel entero
  lexicon: πᾶς
  rationale: '''Todo Israel'' es la forma más natural y fiel al sujeto colectivo del texto.'
- source_word: μισήσουσιν
  english_pob_choice: will hate
  chosen_spanish: odiará
  alternatives_spanish:
  - aborrecerá
  - odiarán
  lexicon: μισέω
  rationale: Se mantiene el verbo fuerte del original. Se evitó 'aborrecerá' por ser más literario y menos directo.
- source_word: ἕκαστος τὸν πλησίον αὐτοῦ
  english_pob_choice: each one his neighbor
  chosen_spanish: cada uno a su prójimo
  alternatives_spanish:
  - cada uno a su vecino
  - uno a otro
  lexicon: πλησίον
  rationale: '''Prójimo'' preserva el valor relacional del término y suena más natural en español bíblico que ''vecino'' en este contexto.'
theological_decisions:
- issue: ἀδικία como condición moral o como legalidad quebrantada
  english_pob_reading: lawlessness will increase upon him
  chosen_spanish_reading: la iniquidad se multiplicará sobre él
  alternative_spanish_readings:
  - la anomia se multiplicará sobre él
  - la ilegalidad se multiplicará sobre él
  rationale: El texto describe una expansión de maldad que recae sobre el personaje; 'iniquidad' mantiene la fuerza ética sin introducir un tecnicismo ajeno al español bíblico.
  doctrine_reference: Hamartiology / pecado como corrupción moral
- issue: El sujeto colectivo de 'todo Israel' y el odio recíproco
  english_pob_reading: all Israel will hate each one his neighbor
  chosen_spanish_reading: todo Israel odiará cada uno a su prójimo
  alternative_spanish_readings:
  - todo Israel odiará a cada uno a su prójimo
  - todo Israel se odiará unos a otros
  rationale: Se conserva la construcción distributiva del griego sin reescribirla como una forma reflexiva interpretativa; 'cada uno a su prójimo' mantiene la universalidad del conflicto.
  doctrine_reference: División comunitaria / pecado social
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'unrighteousness' por 'lawlessness' para ἀδικία y ajustó la cláusula final para reflejar mejor la distribución de 'each one his neighbor' sin añadir explicaciones. La versión española sigue esa revisión al evitar 'injusticia' como equivalente principal y al conservar la estructura distributiva simple.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exija explícitamente; este versículo no lo contiene.
  - Se evita 'Cristo' porque no aparece χριστός en el pasaje.
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - No se introducen notas textuales porque el testimonio griego provisto no presenta variante relevante en este versículo.
