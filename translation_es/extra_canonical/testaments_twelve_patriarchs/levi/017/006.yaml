translation:
  language: es
  text: El quinto será tomado en tinieblas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὁ πέμπτος
  english_pob_choice: The fifth
  chosen_spanish: El quinto
  alternatives_spanish:
  - La quinta
  lexicon: ὁ πέμπτος
  rationale: El ordinal griego es masculino singular; en español, «el quinto» reproduce con naturalidad la referencia a una persona/miembro de la secuencia sin añadir contenido no presente en el texto.
- source_word: ἐν σκότει
  english_pob_choice: in darkness
  chosen_spanish: en tinieblas
  alternatives_spanish:
  - en oscuridad
  - en la oscuridad
  lexicon: ἐν σκότει
  rationale: «Tinieblas» conserva el registro bíblico y el matiz de oscuridad opresiva o no iluminada que el griego permite, sin volverlo más interpretativo que el original.
- source_word: παραληφθήσεται
  english_pob_choice: will be taken
  chosen_spanish: será tomado
  alternatives_spanish:
  - será llevado
  - será recogido
  lexicon: παραληφθήσεται
  rationale: El pasivo futuro de παραλαμβάνω admite «ser tomado» como versión directa y sobria. «Ser llevado» o «ser recogido» serían posibles, pero desplazan el matiz sin mayor necesidad aquí.
theological_decisions:
- issue: Sentido de «tomado» en un contexto oracular secuencial
  english_pob_reading: The fifth will be taken in darkness.
  chosen_spanish_reading: El quinto será tomado en tinieblas.
  alternative_spanish_readings:
  - El quinto será llevado en tinieblas.
  - El quinto será recogido en tinieblas.
  rationale: El texto no explicita si la acción es favorable, neutral o judicial; por eso se conserva la ambigüedad del pasivo griego y de la versión inglesa, sin añadir una interpretación doctrinal.
  doctrine_reference: Principio de preservar la ambigüedad textual cuando el original no determina la valoración del evento.
translation_notes:
  revision_awareness: La versión inglesa POB ya fue revisada y quedó sin cambios; la presente propuesta sigue el texto griego base directamente y mantiene la misma simplicidad semántica sin introducir ampliaciones.
  spanish_consistency_notes:
  - Se mantiene el registro breve y oracular del original.
  - No se introducen nombres propios ni términos teológicos no presentes en la frase griega.
  - «Tinieblas» se conserva como equivalente bíblico estable de σκότος en este contexto.
