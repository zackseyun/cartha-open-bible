id: T12P.LEV.17.3
reference: Testament of Levi 17:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Ἐν¹⁸ τῷ δευτέρῳ ἰωβηλαίῳ ὁ¹⁹ χριόμενος ἐν πένθει ἀγαπητοῦ²⁰ συλληφθήσεται²¹ *καὶ ἔσται²² ἡ ἱερωσύνη αὐτοῦ τιμία²³, καὶ παρὰ πάντων²⁴ δοξασθήσεται.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/017/003.yaml
  text: In the second jubilee, the anointed one will be seized in mourning for a beloved one, and his priesthood will be honored, and he will be glorified by all.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:42:00Z'
    unchanged: false
    changes_summary: Changed 'the one anointed' to 'the anointed one' for smoother, more natural English; changed 'conceived' to 'seized' to match συλληφθήσεται; changed 'in the sorrow of' to 'in mourning for' to better reflect ἐν πένθει ἀγαπητοῦ; retained the rest of the verse.
translation:
  language: es
  text: En el segundo jubileo, el ungido[a] será apresado en duelo por un ser amado, y su sacerdocio será honrado, y será glorificado por todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Mesías». El griego dice literalmente «el ungido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: χριόμενος
  english_pob_choice: the anointed one
  chosen_spanish: el ungido
  alternatives_spanish:
  - el mesías
  - el consagrado
  lexicon: χρίω
  rationale: El griego presenta un participio pasivo con sentido de ‘el que es ungido’. En español, ‘ungido’ conserva el valor lexical sin imponer todavía una identificación técnica posterior. Se evita ‘Mesías’ porque el contexto no fuerza aquí ese título como nombre propio, y el inglés auditado también mantiene una expresión descriptiva.
- source_word: συλληφθήσεται
  english_pob_choice: will be seized
  chosen_spanish: será apresado
  alternatives_spanish:
  - será tomado
  - será capturado
  lexicon: συλλαμβάνω
  rationale: El futuro pasivo admite la idea de ser tomado/aprehendido. ‘Apresado’ comunica bien la pasividad y la fuerza del verbo sin sonar demasiado técnico ni introducir un matiz penal específico que el contexto no exige.
- source_word: ἐν πένθει ἀγαπητοῦ
  english_pob_choice: in mourning for a beloved one
  chosen_spanish: en duelo por un ser amado
  alternatives_spanish:
  - en luto por un amado
  - en luto por un ser querido
  lexicon: πένθος
  rationale: ‘Duelo’ refleja mejor el campo semántico de πένθος que una simple ‘tristeza’. Añadir ‘por un ser amado’ expresa la relación objetiva del lamento. ‘Ser amado’ conserva amplitud y evita decidir indebidamente si el afecto es personal o colectivo.
- source_word: ἱερωσύνη
  english_pob_choice: his priesthood
  chosen_spanish: su sacerdocio
  alternatives_spanish:
  - su ministerio sacerdotal
  - su oficio sacerdotal
  lexicon: ἱερωσύνη
  rationale: ‘Sacerdocio’ es la equivalencia más directa y tradicionalmente inteligible para el sustantivo abstracto. Mantiene la referencia institucional sin suavizarla.
- source_word: δοξασθήσεται
  english_pob_choice: will be glorified
  chosen_spanish: será glorificado
  alternatives_spanish:
  - recibirá gloria
  - será honrado
  lexicon: δοξάζω
  rationale: ‘Glorificado’ conserva la voz pasiva y el peso doxológico del verbo. El texto ya incluye ‘honrado’ para la sacerdocio, por lo que conviene distinguir ambos términos en español.
theological_decisions:
- issue: Posible identificación del 'ungido' con una figura mesiánica específica
  english_pob_reading: the anointed one
  chosen_spanish_reading: el ungido
  alternative_spanish_readings:
  - el Mesías
  - el Cristo
  rationale: La fuente griega usa un participio descriptivo y el inglés revisado también evita fijar de antemano una denominación técnica. En español, ‘el ungido’ preserva la ambigüedad histórica y literaria del pasaje sin borrar la resonancia mesiánica potencial.
  doctrine_reference: Mesianismo / tipología sin identificación dogmática explícita
- issue: Relación entre el duelo y el arresto del ungido
  english_pob_reading: will be seized in mourning for a beloved one
  chosen_spanish_reading: será apresado en duelo por un ser amado
  alternative_spanish_readings:
  - será apresado en la tristeza por un amado
  - será apresado mientras se guarda duelo por un ser amado
  rationale: '‘En duelo por’ mantiene la conexión interpretativa indicada por la revisión inglesa (‘in mourning for’) y evita convertir el pasaje en una afirmación causal más fuerte de lo que permite el griego. La formulación conserva la tensión: el arresto ocurre en el marco del luto.'
  doctrine_reference: Lectura profética / lamento y sufrimiento del justo
- issue: Paralelismo entre honor del sacerdocio y glorificación pública
  english_pob_reading: his priesthood will be honored, and he will be glorified by all
  chosen_spanish_reading: su sacerdocio será honrado, y será glorificado por todos
  alternative_spanish_readings:
  - su sacerdocio será estimado, y todos lo glorificarán
  - su sacerdocio recibirá honor, y será exaltado por todos
  rationale: Se conserva la doble estructura pasiva del griego y del inglés auditado. ‘Por todos’ corresponde a παρὰ πάντων y evita suavizar el alcance universal del reconocimiento.
  doctrine_reference: Honor público / reconocimiento universal
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que corrigió el sentido de συλληφθήσεται a ‘seized’ y refinó ἐν πένθει ἀγαπητοῦ como ‘in mourning for a beloved one’. La versión española refleja esas decisiones y evita la lectura previa errónea de ‘conceived’.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ fuera del texto porque este versículo no contiene el nombre divino.
  - Se usó ‘ungido’ en lugar de ‘Cristo’ para conservar el valor descriptivo del original griego.
  - ‘Sacerdocio’ y ‘glorificado’ se distinguieron para respetar el paralelismo del verso.
  - Se prefirió ‘duelo’ como equivalente de πένθος para no debilitar el tono de lamento.
