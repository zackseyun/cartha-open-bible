reference: Testament of Levi 8:15
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Ἡ δὲ παρουσία⁷⁹ αὐτοῦ ἀγαπητή⁸⁰ ἐστιν⁸¹ ὡς προφήτης⁸² ὑψίστου⁸³ ἐκ σπέρματος Ἀβραὰμ τοῦ⁸⁴ πατρὸς ἡμῶν⁸⁵.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/008/015.yaml
  text: And his appearance is beloved, like a prophet of the Most High, from the seed of Abraham our father.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:39Z'
    unchanged: false
    changes_summary: Changed 'presence' to 'appearance' for a more natural and contextually fitting rendering of παρουσία here; otherwise retained the draft.
translation:
  language: es
  text: Y su aparición es amable, como un profeta del Altísimo, de la descendencia de Abraham nuestro padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρουσία
  english_pob_choice: appearance
  chosen_spanish: aparición
  alternatives_spanish:
  - presencia
  - venida
  lexicon: παρουσία
  rationale: La revisión inglesa fijó «appearance» frente a «presence», y en español «aparición» comunica mejor la manifestación visible o reconocible de la persona que «presencia». «Venida» sería posible en otros contextos, pero aquí el sintagma describe su modo de aparecer, no un acto de llegar.
- source_word: ἀγαπητή
  english_pob_choice: beloved
  chosen_spanish: amable
  alternatives_spanish:
  - amado
  - amable
  - querido
  lexicon: ἀγαπητός
  rationale: El sentido básico es de afecto/agrado. En español, «amado» podría sonar demasiado fuerte o sentimental en esta construcción descriptiva; «amable» conserva la idea de ser grato o bien recibido, y funciona bien con «es» en una frase nominal. «Querido» también es posible, pero menos solemne.
- source_word: ὡς προφήτης ὑψίστου
  english_pob_choice: like a prophet of the Most High
  chosen_spanish: como un profeta del Altísimo
  alternatives_spanish:
  - como profeta del Altísimo
  - como un profeta del Dios Altísimo
  lexicon: προφήτης / ὕψιστος
  rationale: Se mantiene la comparación directa de la fuente. «Del Altísimo» conserva la construcción reverente habitual para ὑψίστου sin introducir un título distinto. No se añadió artículo antes de «profeta» porque el español lo requiere con naturalidad en esta comparación.
- source_word: ἐκ σπέρματος Ἀβραὰμ
  english_pob_choice: from the seed of Abraham
  chosen_spanish: de la descendencia de Abraham
  alternatives_spanish:
  - de la simiente de Abraham
  - del linaje de Abraham
  lexicon: σπέρμα
  rationale: «Descendencia» expresa mejor en español contemporáneo la idea genealógica de σπέρμα sin la aspereza de «simiente». «Linaje» es posible, pero «descendencia» conserva el vínculo familiar y la metáfora hereditaria.
- source_word: πατρὸς ἡμῶν
  english_pob_choice: our father
  chosen_spanish: nuestro padre
  alternatives_spanish:
  - de nuestro padre
  - de nuestro antepasado
  lexicon: πατήρ
  rationale: Se traduce literalmente el poseedor/relación ancestral como «nuestro padre», manteniendo la referencia patriarcal a Abraham y la formulación de la fuente.
theological_decisions:
- issue: Función de παρουσία en un contexto descriptivo
  english_pob_reading: appearance
  chosen_spanish_reading: aparición
  alternative_spanish_readings:
  - presencia
  - venida
  rationale: La revisión inglesa ya determinó que aquí παρουσία no debía suavizarse como «presence». En español, «aparición» respeta la manifestación perceptible implícita en el contexto y evita perder la tensión entre manifestación visible y mera presencia abstracta.
  doctrine_reference: Uso léxico-contextual de παρουσία en literatura judía helenística; no implica una doctrina cristológica técnica aquí.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que cambió «presence» a «appearance» para παρουσία. La redacción española refleja ese ajuste y conserva el resto de la estructura sin expandir el sentido.
  spanish_consistency_notes:
  - Se mantuvo «Altísimo» para Ὑψίστου, coherente con el uso reverente habitual en español bíblico.
  - No se introdujo «Cristo» ni terminología eclesial ajena al texto; el pasaje habla de un profeta y de Abraham.
  - «Descendencia» se usó de forma consistente para σπέρμα en un sentido genealógico/ancestral, evitando un calco crudo.
