translation:
  language: es
  text: Y el primero me ungió con aceite santo y me dio una vara sacerdotal.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤλειψέ
  english_pob_choice: anointed
  chosen_spanish: ungió
  alternatives_spanish:
  - me untó
  - me consagró con unción
  lexicon: ἀλείφω
  rationale: El griego indica la acción de ungir/untar con aceite; en español bíblico y contemporáneo digno, «ungió» comunica bien la acción ritual sin volverla mecánica. Mantiene la relación con aceite santo y evita la pérdida de sentido ceremonial.
- source_word: ἐλαίῳ ἁγίῳ
  english_pob_choice: holy oil
  chosen_spanish: aceite santo
  alternatives_spanish:
  - óleo santo
  - aceite sagrado
  lexicon: ἔλαιον + ἅγιος
  rationale: «Aceite santo» refleja de forma directa y transparente el adjetivo del original. «Óleo» sería posible, pero «aceite» es más claro en español actual y conserva la concreción material del texto.
- source_word: ῥάβδον
  english_pob_choice: priestly staff
  chosen_spanish: vara sacerdotal
  alternatives_spanish:
  - báculo sacerdotal
  - vara de sacerdote
  lexicon: ῥάβδος
  rationale: El griego solo dice «vara»; la cualificación sacerdotal proviene del contexto del pasaje y de la traducción inglesa de POB. «Vara sacerdotal» conserva esa interpretación sin añadir un término más eclesiástico de lo necesario.
theological_decisions:
- issue: Añadir la idea de «sacerdotal» a ῥάβδον aunque el griego solo diga «vara»
  english_pob_reading: gave me a priestly staff
  chosen_spanish_reading: me dio una vara sacerdotal
  alternative_spanish_readings:
  - me dio una vara
  - me dio un báculo sacerdotal
  rationale: La tradición de POB ya explicita la función sacerdotal de la vara. En español, dejar solo «vara» perdería una especificación interpretativa relevante para la escena; «sacerdotal» conserva esa lectura sin exagerarla.
  doctrine_reference: Tipología/función sacerdotal en el contexto del Testamento de Leví
translation_notes:
  revision_awareness: La versión inglesa POB más reciente fue revisada y dejada sin cambios; esta propuesta española sigue esa lectura estable sin introducir variantes textuales ni cambios de sentido.
  spanish_consistency_notes:
  - Se conserva el registro bíblico sobrio y directo.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el verso.
  - «Ungió» y «aceite santo» mantienen la imagen ritual del original griego.
  - «Vara sacerdotal» sigue la especificación interpretativa ya reflejada en la traducción inglesa POB.
