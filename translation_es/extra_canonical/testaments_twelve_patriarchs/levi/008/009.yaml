translation:
  language: es
  text: Y el sexto me puso una corona sobre la cabeza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ ἕκτος
  english_pob_choice: the sixth
  chosen_spanish: el sexto
  alternatives_spanish:
  - el sexto [hombre]
  - el sexto [uno]
  lexicon: ἕκτος
  rationale: Mantengo el numeral ordinal con valor sustantivo, como en el inglés POB. En español, ‘el sexto’ es natural y suficiente; el referente humano se entiende por el contexto inmediato.
- source_word: στέφανόν
  english_pob_choice: a crown
  chosen_spanish: una corona
  alternatives_spanish:
  - una corona [de victoria]
  - una guirnalda
  lexicon: στέφανος
  rationale: ‘Corona’ es la equivalencia más directa y natural en español para στέφανος en este contexto. No añado ‘de victoria’ porque el texto griego no lo especifica explícitamente aquí.
- source_word: περιέθηκεν
  english_pob_choice: placed ... on
  chosen_spanish: me puso ... sobre
  alternatives_spanish:
  - me colocó ... sobre
  - me puso ... en
  lexicon: περιτίθημι
  rationale: ‘Puso ... sobre’ reproduce bien la acción de colocar algo sobre la cabeza sin sobrerrecrear el verbo griego. Mantengo el objeto indirecto ‘me’ porque el hablante es el receptor de la acción.
- source_word: τῇ κεφαλῇ
  english_pob_choice: my head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - mi cabeza
  lexicon: κεφαλή
  rationale: El posesivo ya queda expresado por el dativo de interés con ‘me puso’. En español, ‘sobre la cabeza’ es más fluido que repetir ‘mi cabeza’, aunque el sentido posesivo permanece claro.
theological_decisions:
- issue: Identificación implícita del agente en ‘el sexto’
  english_pob_reading: And the sixth placed a crown on my head.
  chosen_spanish_reading: Y el sexto me puso una corona sobre la cabeza.
  alternative_spanish_readings:
  - Y el sexto colocó una corona sobre mi cabeza.
  rationale: No se explicita el nombre del agente; conservar la referencia simple ‘el sexto’ evita introducir información no presente en el texto fuente. La voz sigue siendo narrativamente directa, como en el inglés POB.
  doctrine_reference: Fidelidad semántica y no-expansión narrativa
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios respecto del texto auditado en inglés; por ello, la versión española sigue de cerca la lectura estable y no introduce variantes textuales.
  spanish_consistency_notes:
  - Uso ‘corona’ para στέφανος en concordancia con el valor general del término y con el tono narrativo de esta sección.
  - Conservo un registro sobrio y clásico, pero con sintaxis española natural.
  - No añado notas al pie porque el pasaje no presenta una variante textual o alternativa lexical que requiera aclaración en esta unidad.
