translation:
  language: es
  text: Y el segundo me lavó con el agua pura del Señor, y me dio a comer pan santo y vino santo, y me puso una túnica santa y gloriosa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὕδατι κυρίου καθαρῷ
  english_pob_choice: the Lord's pure water
  chosen_spanish: el agua pura de Yahvé
  alternatives_spanish:
  - el agua pura del Señor
  - el agua limpia de Yahvé
  - el agua de Yahvé, pura
  lexicon: ὕδωρ; κύριος; καθαρός
  rationale: La frase griega tiene genitivo de pertenencia o procedencia con καθαρός. En español, "agua pura de Yahvé" conserva la relación posesiva y el matiz de pureza sin forzar una construcción genitiva artificial. Se usa "Yahvé" por la convención del proyecto para el nombre divino.
- source_word: ἐψώμισέν με ἄρτον καὶ οἶνον ἅγιον
  english_pob_choice: fed me holy bread and wine
  chosen_spanish: me dio a comer pan santo y vino santo
  alternatives_spanish:
  - me alimentó con pan santo y vino santo
  - me dio pan santo y vino santo
  - me dio a comer pan santo y vino
  lexicon: ψωμίζω; ἄρτος; οἶνος; ἅγιος
  rationale: ψωμίζω implica alimentar o dar de comer; en español, "me dio a comer" conserva la acción de dar alimento sin añadir una imagen más específica que el griego. Se repite "santo" con ambos sustantivos porque ἅγιον califica la dupla de alimentos de forma natural en español.
- source_word: στολὴν ἁγίαν καὶ ἔνδοξον
  english_pob_choice: a holy and glorious robe
  chosen_spanish: una túnica santa y gloriosa
  alternatives_spanish:
  - una vestidura santa y gloriosa
  - una ropa santa y gloriosa
  - una túnica sagrada y gloriosa
  lexicon: στολή; ἅγιος; ἔνδοξος
  rationale: στολή puede ser 'vestidura' o 'túnica'. 'Túnica' mantiene una imagen clara y sobria en español; 'santa y gloriosa' conserva el doble calificativo sin sustituirlo por un equivalente devocional distinto.
theological_decisions:
- issue: Nombre divino en 'κύριος' dentro de una frase posesiva
  english_pob_reading: the Lord's pure water
  chosen_spanish_reading: el agua pura de Yahvé
  alternative_spanish_readings:
  - el agua pura del Señor
  - el agua pura del Maestro
  rationale: Dado el marco del proyecto, κύριος que alude al nombre divino se vierte como 'Yahvé'. Aquí no se trata de una simple referencia honorífica humana, sino de una posesión sacra vinculada al agua pura. Mantener 'Yahvé' hace auditable la decisión y evita el ocultamiento del nombre.
  doctrine_reference: Tetragrámaton / convenciones del proyecto POB
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó 'pure water of the Lord' a 'the Lord's pure water' por naturalidad; el español sigue esa misma lectura posesiva con una estructura igualmente natural ('el agua pura de Yahvé'). No hay cambios textuales adicionales en el griego que requieran nota aparte.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según el estándar del proyecto para κύριος cuando apunta al nombre divino.
  - 'Se conserva un registro reverente pero no arcaizante: ''túnica'', ''santo'', ''gloriosa''.'
  - No se introduce 'Cristo' ni otros equivalentes no presentes en el versículo.
  - La coordinación de objetos en español respeta la repetición del original sin condensarla excesivamente.
