id: T12P.LEV.8.2
reference: Testament of Levi 8:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ εἶδον⁵ ἑπτὰ ἄνδρας⁶ ἐν ἐσθῆτι⁷ λευκῇ⁸ *λέγοντάς μοι⁹· Ἀναστὰς ἔνδυσαι τὴν στολὴν τῆς ἱερατείας, καὶ¹⁰ τὸν στέφανον τῆς δικαιοσύνης¹¹, *καὶ τὸ λόγιον¹² τῆς συνέσεως καὶ τὸν ποδήρη¹³ τῆς ἀληθείας καὶ τὸ πέταλον¹⁴ τῆς πίστεως καὶ τὴν μίτραν¹⁵ †τῆς κεφαλῆς†¹⁶ καὶ τὸ ἐφοὺδ τῆς προφητείας.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/008/002.yaml
  text: And I saw seven men in white clothing, saying to me, “Rise, put on the robe of the priesthood, and the crown of righteousness, and the breastpiece of understanding, and the full-length robe of truth, and the plate of faith, and the turban for the head, and the ephod of prophecy.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:37Z'
    unchanged: false
    changes_summary: Revised 'oracle of understanding' to 'breastpiece of understanding' for λόγιον, which here refers to the priestly breastpiece rather than an oracle. Adjusted 'the turban of the head' to 'the turban for the head' for more natural English while preserving the source.
translation:
  language: es
  text: 'Y vi siete hombres con vestiduras blancas, que me decían: «Levántate, ponte la túnica del sacerdocio, y la corona de justicia, y el pectoral de entendimiento, y la vestidura talar de la verdad, y la placa de la fe, y el turbante para la cabeza, y el efod de profecía».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἑπτὰ ἄνδρας
  english_pob_choice: seven men
  chosen_spanish: siete hombres
  alternatives_spanish:
  - siete varones
  - siete hombres
  lexicon: ἑπτά; ἀνήρ
  rationale: ‘hombres’ transmite de forma natural ἀνδρες en español bíblico sin forzar una lectura técnica; ‘varones’ sería más literal pero menos idiomático aquí.
- source_word: ἐσθῆτι λευκῇ
  english_pob_choice: white clothing
  chosen_spanish: vestiduras blancas
  alternatives_spanish:
  - ropa blanca
  - vestiduras blancas
  lexicon: ἐσθής; λευκός
  rationale: ‘vestiduras’ preserva el registro solemne y la imaginería de vestidura sagrada mejor que ‘ropa’.
- source_word: στολὴν τῆς ἱερατείας
  english_pob_choice: the robe of the priesthood
  chosen_spanish: la túnica del sacerdocio
  alternatives_spanish:
  - la vestidura del sacerdocio
  - la túnica del sacerdocio
  lexicon: στολή; ἱερατεία
  rationale: ‘túnica’ resulta más natural en español para una prenda interior/sacra, aunque ‘vestidura’ es posible; se mantiene el sentido cultual de la fuente.
- source_word: τὸν στέφανον τῆς δικαιοσύνης
  english_pob_choice: the crown of righteousness
  chosen_spanish: la corona de justicia
  alternatives_spanish:
  - la corona de rectitud
  - la corona de justicia
  lexicon: στέφανος; δικαιοσύνη
  rationale: ‘justicia’ conserva el término clave de la tradición POB y el campo legal/covenantal de δικαιοσύνη; ‘rectitud’ sería posible pero menos directo aquí.
- source_word: τὸ λόγιον τῆς συνέσεως
  english_pob_choice: the breastpiece of understanding
  chosen_spanish: el pectoral de entendimiento
  alternatives_spanish:
  - el pectoral de entendimiento
  - el pectoral del entendimiento
  lexicon: λόγιον; σύνεσις
  rationale: 'Se sigue la revisión auditada del inglés: λόγιον aquí designa el pectoral sacerdotal, no ‘oráculo’. ‘Pectoral’ comunica el objeto litúrgico con claridad.'
- source_word: τὸν ποδήρη τῆς ἀληθείας
  english_pob_choice: the full-length robe of truth
  chosen_spanish: la vestidura talar de la verdad
  alternatives_spanish:
  - la vestidura talar de la verdad
  - la túnica larga de la verdad
  lexicon: ποδήρης; ἀλήθεια
  rationale: ‘Vestidura talar’ conserva el matiz de prenda larga que llega hasta los pies, sin perder dignidad ni sonar excesivamente moderna.
- source_word: τὸ πέταλον τῆς πίστεως
  english_pob_choice: the plate of faith
  chosen_spanish: la placa de la fe
  alternatives_spanish:
  - la placa de la fe
  - la lámina de la fe
  lexicon: πέταλον; πίστις
  rationale: ‘Placa’ sigue de cerca la elección inglesa y evita introducir una identificación más específica que la que el texto da; ‘lámina’ sería menos usual en español bíblico.
- source_word: τὴν μίτραν τῆς κεφαλῆς
  english_pob_choice: the turban for the head
  chosen_spanish: el turbante para la cabeza
  alternatives_spanish:
  - el turbante para la cabeza
  - la mitra para la cabeza
  lexicon: μίτρα; κεφαλή
  rationale: ‘Turbante’ refleja bien la prenda y evita el tecnicismo eclesiástico ‘mitra’, que en español puede sugerir otro objeto litúrgico posterior.
- source_word: τὸ ἐφοὺδ τῆς προφητείας
  english_pob_choice: the ephod of prophecy
  chosen_spanish: el efod de profecía
  alternatives_spanish:
  - el efod de profecía
  lexicon: ἐφόδ
  rationale: Se conserva el préstamo tradicional ‘efod’, ya estabilizado en español bíblico para la prenda sacerdotal específica.
theological_decisions:
- issue: δικαιοσύνη como ‘justicia’ y no ‘rectitud’
  english_pob_reading: crown of righteousness
  chosen_spanish_reading: corona de justicia
  alternative_spanish_readings:
  - corona de rectitud
  rationale: La POB inglesa eligió ‘righteousness’; en español, ‘justicia’ preserva el rango legal y pactual del término sin moralizarlo en exceso. En este contexto ceremonial encaja mejor que ‘rectitud’.
  doctrine_reference: justicia/rectitud; lenguaje pactual y sacerdotal
- issue: λόγιον entendido como pectoral, no como oráculo
  english_pob_reading: breastpiece of understanding
  chosen_spanish_reading: pectoral de entendimiento
  alternative_spanish_readings:
  - oráculo de entendimiento
  - pectoral de entendimiento
  rationale: La revisión inglesa corrige una posible lectura de ‘oracle’ y fija el referente sacerdotal. En español debe reflejarse esa decisión para no introducir un objeto de revelación distinto al que el pasaje señala.
  doctrine_reference: tipología sacerdotal; léxico cultual
- issue: μίτρα traducido como turbante para evitar confusión con ‘mitra’ eclesiástica
  english_pob_reading: turban for the head
  chosen_spanish_reading: turbante para la cabeza
  alternative_spanish_readings:
  - mitra para la cabeza
  - turbante para la cabeza
  rationale: ‘Mitra’ en español actual puede evocar un tocado episcopal posterior y no el objeto bíblico. ‘Turbante’ mantiene la forma y función sin desviar la imagen textual.
  doctrine_reference: indumentaria sacerdotal del AT
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail que fija λόγιον como ‘breastpiece/pectoral’ y ajusta la formulación del tocado para la cabeza. El español evita una lectura de ‘oráculo’ y conserva el paralelismo de prendas sacerdotales del original griego.
  spanish_consistency_notes:
  - Se mantuvo el estilo solemne y enumerativo del original, con una sola oración citada.
  - ‘Vestiduras blancas’ preserva el tono bíblico sin modernizar en exceso a ‘ropa blanca’.
  - 'Se conservaron préstamos bíblicos estables donde el español los reconoce naturalmente: efod.'
  - No se usaron notas al pie porque no se introdujo una variante textual o lexical que requiriera anclaje explícito en el versículo.
