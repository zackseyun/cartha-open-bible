base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/008/003.yaml
  text: And each one of them was carrying something, and they placed it on me and said to me, “From now on, become a priest—you and all your seed.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:08Z'
    unchanged: false
    changes_summary: Replaced “these things” with “something” because the Greek does not explicitly supply an object and the singular better fits each individual bearer; changed “put” to “placed” for slightly more formal register. Kept “seed” as a formal rendering of σπέρμα.
translation:
  language: es
  text: 'Y cada uno de ellos llevaba algo, y lo colocaron sobre mí, y me dijeron: «Desde ahora, sé sacerdote[a]—tú y toda tu descendencia[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «sé sacerdote» refleja con concisión el imperativo griego de devenir; también puede entenderse «conviértete en sacerdote».
    reason: alternative_reading
  - marker: b
    text: σπέρμα puede traducirse literalmente «simiente», pero aquí se ha preferido «descendencia» por claridad y naturalidad en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: βαστάζοντες
  english_pob_choice: was carrying something
  chosen_spanish: llevaba algo
  alternatives_spanish:
  - estaba cargando algo
  - portaba algo
  lexicon: βαστάζω
  rationale: La forma participial indica que cada uno iba llevando una carga; «llevaba algo» conserva la acción continua sin sobreespecificar el objeto, igual que la revisión inglesa que evitó inventar «these things».
- source_word: ἐπέθηκαν μοι
  english_pob_choice: they placed it on me
  chosen_spanish: lo colocaron sobre mí
  alternatives_spanish:
  - lo pusieron sobre mí
  - lo echaron sobre mí
  lexicon: ἐπιτίθημι
  rationale: «Colocaron» mantiene el registro formal adoptado en la revisión inglesa («placed») y expresa una acción deliberada de poner sobre alguien.
- source_word: Ἀπὸ τοῦ νῦν γενοῦ εἰς ἱερέα
  english_pob_choice: From now on, become a priest
  chosen_spanish: Desde ahora, sé sacerdote
  alternatives_spanish:
  - Desde ahora, conviértete en sacerdote
  - A partir de ahora, sé sacerdote
  lexicon: ἱερεύς / γίνομαι
  rationale: El griego usa un imperativo con valor de devenir/ser; en español «sé sacerdote» es la forma más natural y fiel para expresar el mandato sin añadir una paráfrasis excesiva.
- source_word: πᾶν τὸ σπέρμα σου
  english_pob_choice: all your seed
  chosen_spanish: toda tu descendencia
  alternatives_spanish:
  - todo tu linaje
  - toda tu simiente
  lexicon: σπέρμα
  rationale: En español, «descendencia» comunica la referencia genealógica de σπέρμα con mayor claridad y dignidad que «simiente», que puede sonar arcaica o ambigua para lectores modernos.
theological_decisions:
- issue: Rendering of σπέρμα in a patriarchal blessing context
  english_pob_reading: all your seed
  chosen_spanish_reading: toda tu descendencia
  alternative_spanish_readings:
  - todo tu linaje
  - toda tu simiente
  rationale: El texto formula una promesa/mandato que abarca la línea familiar futura. «Descendencia» preserva el alcance colectivo y hereditario sin perder inteligibilidad en español.
  doctrine_reference: patriarchal blessing / covenantal lineage
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó un objeto añadido («these things») porque el griego no lo expresa; por eso el español usa el indefinido singular «algo» y no introduce un sustantivo no atestiguado. También siguió la preferencia formal de «placed», reflejada aquí con «colocaron».
  spanish_consistency_notes:
  - Se mantiene un registro formal y bíblico sin recurrir a calcos innecesarios del inglés.
  - No se usa «Cristo» ni terminología cristológica; el contexto es sacerdotal y genealógico.
  - «Descendencia» se emplea con valor colectivo para σπέρμα, consistente con la línea de promesa familiar del pasaje.
