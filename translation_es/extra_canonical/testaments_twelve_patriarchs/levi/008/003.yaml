source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ¹⁷ εἷς¹⁸ ἕκαστος αὐτῶν¹⁹ βαστάζοντες *ἦσαν καὶ²⁰ ἐπέθηκαν μοι²¹ καὶ εἰπόν²² μοι²³· Ἀπὸ τοῦ νῦν γενοῦ²⁴ εἰς ἱερέα²⁵, σὺ²⁶ καὶ *πᾶν τὸ σπέρμα²⁷ σου²⁸.
