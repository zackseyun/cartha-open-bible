  text: Ὁ δὲ⁴⁷ τέταρτος ζώνην *μοι περιέβαλεν⁴⁸, ὁμοίαν πορφύρας⁴⁹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/008/007.yaml
  text: And the fourth wrapped around me a belt, like purple.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:38Z'
    unchanged: false
    changes_summary: Changed 'girdle' to 'belt' for more natural formal English while preserving the sense of ζώνην; retained 'wrapped around me' and 'like purple' as faithful to the Greek.
translation:
  language: es
  text: Y el cuarto me envolvió con un cinturón, semejante al púrpura.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ζώνην
  english_pob_choice: belt
  chosen_spanish: cinturón
  alternatives_spanish:
  - cinto
  - faja
  - ceñidor
  lexicon: ζώνη
  rationale: ζώνην designa una banda ceñida a la cintura; en español, «cinturón» comunica bien la idea con naturalidad actual. Evito «faja» por posible ambigüedad moderna y «ceñidor» por sonar demasiado técnico o arcaico.
- source_word: περιέβαλεν
  english_pob_choice: wrapped around me
  chosen_spanish: me envolvió con
  alternatives_spanish:
  - me ciñó con
  - me rodeó con
  - me ajustó
  lexicon: περιβάλλω
  rationale: El verbo griego expresa colocar algo alrededor de una persona. «Me envolvió con» conserva esa acción sin forzar una imagen exclusivamente corporal como «ceñir», aunque esta sería una alternativa viable.
- source_word: πορφύρας
  english_pob_choice: purple
  chosen_spanish: el púrpura
  alternatives_spanish:
  - púrpura
  - color púrpura
  - tela púrpura
  lexicon: πορφύρα
  rationale: La comparación griega es literalmente «semejante a púrpura»; en español, «el púrpura» funciona como sustantivo de color y mantiene la brevedad del original. También puede entenderse como referencia al color o a la materia teñida.
theological_decisions:
- issue: Valor de la comparación final
  english_pob_reading: like purple
  chosen_spanish_reading: semejante al púrpura
  alternative_spanish_readings:
  - como púrpura
  - semejante al color púrpura
  rationale: El griego usa ὁμοίαν con un genitivo, señalando semejanza más que identidad. «Semejante al púrpura» conserva la comparación sin convertirla en identidad absoluta ni añadir una explicación ausente.
  doctrine_reference: N/A (comparación descriptiva)
- issue: Referencia cromática o material de πορφύρα
  english_pob_reading: purple
  chosen_spanish_reading: el púrpura
  alternative_spanish_readings:
  - púrpura
  - tela púrpura
  rationale: El término puede aludir al color o al tinte/tejido púrpura. La traducción principal mantiene la ambigüedad del original sin resolverla artificialmente.
  doctrine_reference: N/A (ambigüedad lexical preservada)
translation_notes:
  revision_awareness: La revisión inglesa cambió 'girdle' por 'belt' para mayor naturalidad, preservando ζώνην; la versión española sigue esa misma línea con un término natural y comprensible, sin perder la imagen de ceñimiento. También conserva la comparación simple del final, sin expandirla.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y ceremonial adecuado para un texto pseudepigráfico antiguo.
  - No se introducen mayúsculas devocionales ni equivalentes litúrgicos no presentes en el griego.
  - La construcción sigue el orden y la economía del original, evitando añadir sujetos o complementos interpretativos.
