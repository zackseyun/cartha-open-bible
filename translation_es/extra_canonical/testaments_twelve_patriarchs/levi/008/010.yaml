base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/008/010.yaml
  text: And the seventh put on me a diadem of priesthood and filled my hands with incense, so that I might serve as priest before the Lord God.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:38Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y el séptimo me puso una diadema de sacerdocio y llenó mis manos de incienso, para que yo sirviera como sacerdote ante el Señor Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διάδημά μοι ἱερατείας
  english_pob_choice: a diadem of priesthood
  chosen_spanish: una diadema de sacerdocio
  alternatives_spanish:
  - una corona de sacerdocio
  - una diadema sacerdotal
  lexicon: διάδημα
  rationale: Conservo la imagen de insignia real/sacerdotal con «diadema», que en español comunica mejor el objeto de honor que «corona»; «de sacerdocio» mantiene el genitivo de pertenencia o función sin convertirlo en adjetivo más técnico de lo necesario.
- source_word: ἐπλήρωσε τὰς χεῖράς μου θυμιάματος
  english_pob_choice: filled my hands with incense
  chosen_spanish: llenó mis manos de incienso
  alternatives_spanish:
  - colmó mis manos de incienso
  - llenó mis manos con incienso
  lexicon: πληρόω + χεῖρες + θυμίαμα
  rationale: Mantengo la construcción concreta «llenó mis manos», que refleja el griego y la imagen ritual; «de incienso» sigue el sustantivo θυμιάματος como contenido/ofrenda, sin añadir una explicación interpretativa.
- source_word: ἱερατεύειν με
  english_pob_choice: that I might serve as priest
  chosen_spanish: para que yo sirviera como sacerdote
  alternatives_spanish:
  - para que ejerciera el sacerdocio
  - para que yo oficiara como sacerdote
  lexicon: ἱερατεύω
  rationale: «Servir como sacerdote» conserva la función sin sobrecargar con tecnicismo; evita la ambigüedad de un mero oficio civil y respeta el valor verbal de ejercicio sacerdotal.
- source_word: Κυρίῳ, τῷ θεῷ
  english_pob_choice: before the Lord God
  chosen_spanish: ante el Señor Dios
  alternatives_spanish:
  - delante del Señor Dios
  - ante Yahvé, Dios
  lexicon: κύριος + θεός
  rationale: Sigo la forma auditada de la edición inglesa con «Señor Dios». Aunque el sistema español POB suele usar «Yahvé» para יהוה, aquí el griego trae κύριος en combinación con θεός, y el inglés POB ya fijó «Lord God»; en español «Señor Dios» refleja esa fórmula estable sin forzar una identificación que el texto griego no explicita directamente.
theological_decisions:
- issue: Tratamiento de Κυρίῳ, τῷ θεῷ en relación con el nombre divino
  english_pob_reading: before the Lord God
  chosen_spanish_reading: ante el Señor Dios
  alternative_spanish_readings:
  - ante Yahvé, Dios
  - delante del Señor, Dios
  rationale: El griego presenta la fórmula Κυρίῳ, τῷ θεῷ. Aunque el proyecto español prefiere «Yahvé» para יהוה, aquí el texto fuente usa κύριος con θεός y la traducción inglesa auditada ya normaliza como «Lord God». Por fidelidad al expediente textual y para no introducir una identificación más fuerte de la que el griego inmediato exige, mantengo «Señor Dios».
  doctrine_reference: Cristología y teología del nombre divino en traducción bíblica; uso contextual de κύριος/יהוה.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; por tanto, esta versión española sigue de cerca el texto fuente griego y el sentido estabilizado en la POB inglesa, sin incorporar variantes textuales adicionales.
  spanish_consistency_notes:
  - Conservo el registro solemne y narrativo propio de la obra.
  - Uso «sacerdocio» y «sacerdote» de manera consistente para ἱερατεία/ἱερατεύω.
  - No empleo «incienso» como metáfora; sigue siendo el contenido ritual literal del pasaje.
  - Mantengo «Señor Dios» por consistencia con la lectura auditada de κύριος + θεός en este contexto.
