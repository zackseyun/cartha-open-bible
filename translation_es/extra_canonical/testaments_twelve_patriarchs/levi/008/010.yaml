  text: Ὁ⁵⁵ ἕβδομος *διάδημά μοι ἱερατείας περιέθηκεν καὶ⁵⁶ ἐπλήρωσε⁵⁷ τὰς χεῖράς μου θυμιάματος⁵⁸, ὥστε ἱερατεύειν με⁵⁹ Κυρίῳ, *τῷ θεῷ⁶⁰.
