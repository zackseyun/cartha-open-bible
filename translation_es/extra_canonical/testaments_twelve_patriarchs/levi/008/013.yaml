base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/008/013.yaml
  text: And the second will be in the priesthood.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:09Z'
    unchanged: false
    changes_summary: 'Added the article for more natural and idiomatic formal English: ''in the priesthood'' rather than ''in priesthood.'''
translation:
  language: es
  text: Y el segundo será en el sacerdocio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δεύτερος
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - segundo
  - la segunda parte
  lexicon: δεύτερος
  rationale: Se conserva el ordinal de manera directa y natural en español, siguiendo el valor secuencial del griego y del inglés POB.
- source_word: ἐν ἱερωσύνῃ
  english_pob_choice: in the priesthood
  chosen_spanish: en el sacerdocio
  alternatives_spanish:
  - en el ministerio sacerdotal
  - como sacerdote
  lexicon: ἱερωσύνη
  rationale: ἱερωσύνη nombra la esfera o condición sacerdotal. 'Sacerdocio' refleja mejor la institución/función que 'sacerdote' como persona, y mantiene la lectura del POB inglés 'in the priesthood'.
theological_decisions:
- issue: Relación entre función sacerdotal e institución
  english_pob_reading: in the priesthood
  chosen_spanish_reading: en el sacerdocio
  alternative_spanish_readings:
  - como sacerdote
  - en el ministerio sacerdotal
  rationale: El griego habla de la esfera del sacerdocio, no simplemente del oficio individual. 'Sacerdocio' preserva esa amplitud sin añadir interpretación doctrinal extra.
  doctrine_reference: Distinción entre oficio, función e institución sacerdotal en el texto.
translation_notes:
  revision_awareness: 'El texto inglés revisado añadió el artículo definido: ''in the priesthood''. El español lo refleja de forma natural con ''en el sacerdocio'', sin necesidad de nota, porque el artículo no cambia el sentido base en español.'
  spanish_consistency_notes:
  - Se mantiene el tono formal y breve del original.
  - No se introduce 'Cristo', 'Señor' ni otros términos no presentes en el verso.
  - La sintaxis sigue el orden simple sujeto-copulativo-predicado del griego y del inglés auditado.
