  text: Καὶ⁶⁸ ὁ πρῶτος κλῆρος ἔσται μέγας· καὶ ὑπὲρ αὐτὸν οὐ γενήσεται ἕτερος.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/008/012.yaml
  text: And the first lot will be great, and no other will arise above it.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:39Z'
    unchanged: false
    changes_summary: Added the explicit conjunction and rendered ἕτερος as 'other' to account for the final source word more completely; adjusted 'greater than it' to the more literal 'arise above it.'
translation:
  language: es
  text: Y la primera suerte será grande, y no se levantará otra por encima de ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ πρῶτος κλῆρος
  english_pob_choice: the first lot
  chosen_spanish: la primera suerte
  alternatives_spanish:
  - el primer lote
  - la primera porción
  - la primera suerte echada
  lexicon: κλῆρος
  rationale: En este contexto profético, κλῆρος designa una suerte o porción asignada; «suerte» conserva mejor la idea de asignación por sorteo o reparto que «lote», y mantiene la naturalidad en español bíblico.
- source_word: ἔσται μέγας
  english_pob_choice: will be great
  chosen_spanish: será grande
  alternatives_spanish:
  - será muy grande
  - será importante
  - será sobresaliente
  lexicon: μέγας
  rationale: «Grande» reproduce la valoración amplia del griego sin intensificar más de lo que el texto exige. Evita paraphrasear con un término interpretativo como «importante».
- source_word: ὑπὲρ αὐτὸν
  english_pob_choice: above it
  chosen_spanish: por encima de ella
  alternatives_spanish:
  - sobre ella
  - por encima de ello
  - más allá de ella
  lexicon: ὑπέρ
  rationale: La preposición expresa superioridad o elevación respecto de la primera suerte; «por encima de ella» conserva esa relación comparativa de manera idiomática en español.
- source_word: οὐ γενήσεται ἕτερος
  english_pob_choice: no other will arise
  chosen_spanish: no se levantará otra
  alternatives_spanish:
  - no surgirá otra
  - no aparecerá otra
  - no habrá otra
  lexicon: γίνομαι / ἕτερος
  rationale: El verbo puede expresar llegar a ser, surgir o presentarse; «se levantará» mantiene la imagen de surgir. «Otra» traduce ἕτερος con la fuerza de alteridad, no solo de número, como en la revisión inglesa.
theological_decisions:
- issue: Superioridad de la primera suerte dentro de una secuencia profética
  english_pob_reading: the first lot will be great, and no other will arise above it
  chosen_spanish_reading: la primera suerte será grande, y no se levantará otra por encima de ella
  alternative_spanish_readings:
  - la primera suerte será grande, y ninguna otra se levantará por encima de ella
  - la primera suerte será grande, y no habrá otra superior a ella
  rationale: El texto afirma una primacía real de la primera suerte frente a las demás. Se preserva la comparación sin convertirla en una explicación doctrinal adicional.
  doctrine_reference: Testament of Levi 8:12; comparación de rangos o porciones dentro de una visión profética
translation_notes:
  revision_awareness: La versión inglesa revisada añadió la conjunción explícita y prefirió «other» para ἕτερος, además de acercarse más al valor literal de «arise above it». La redacción española sigue esa revisión con «y» y con «otra»/«se levantará por encima de ella», evitando una paráfrasis más interpretativa.
  spanish_consistency_notes:
  - Se mantiene «suerte» para κλῆρος, coherente con el valor de lote/porción asignada.
  - Se evita «Cristo», «Señor» u otros términos no presentes en el griego.
  - La comparación final se expresa con «por encima de ella» para conservar la relación espacial/metafórica del original.
