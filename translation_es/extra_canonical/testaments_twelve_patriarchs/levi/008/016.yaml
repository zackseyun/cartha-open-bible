id: T12P.LEV.8.16
reference: Testament of Levi 8:16
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: '*Πᾶν οὖν ἐπιθυμητὸν⁸⁶ ἐν Ἰσραὴλ⁸⁷ σοὶ⁸⁸ ἔσται καὶ τῷ σπέρματί σου⁸⁹, καὶ ἔδεσθε⁹⁰ πᾶν ὡραῖον ἐν⁹¹ ὁράσει, καὶ τὴν τράπεζαν Κυρίου διανεμεῖται⁹² τὸ σπέρμα σου⁹³.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/008/016.yaml
  text: Therefore every desirable thing in Israel will be for you and for your seed, and you will eat every beautiful thing for the eye, and your seed will apportion the table of the Lord.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:10Z'
    unchanged: false
    changes_summary: Added 'in action' to account for ἐν δράσει, which was omitted in the draft. Retained 'seed' and 'apportion the table of the Lord' as sufficiently formal and close to the Greek.
translation:
  language: es
  text: Por tanto, toda cosa deseable en Israel será para ti y para tu descendencia, y comerán toda cosa hermosa a la vista[a], y tu descendencia repartirá la mesa del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «a la vista» traduce el valor de ἐν ὁράσει, conservando la idea de belleza perceptible; también podría entenderse como «en la apariencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶν οὖν ἐπιθυμητὸν ἐν Ἰσραήλ
  english_pob_choice: every desirable thing in Israel
  chosen_spanish: toda cosa deseable en Israel
  alternatives_spanish:
  - todo lo deseable en Israel
  - toda cosa codiciable en Israel
  lexicon: ἐπιθυμητός
  rationale: «Deseable» reproduce la fuerza de algo valioso o apetecible sin sobrecargar con la idea moral de codicia; «toda cosa» preserva el alcance distributivo de πᾶν.
- source_word: τῷ σπέρματί σου / τὸ σπέρμα σου
  english_pob_choice: your seed
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu semilla
  - tu linaje
  lexicon: σπέρμα
  rationale: En español, «descendencia» comunica mejor el valor genealógico y prometeico de σπέρμα que una traducción literal como «semilla», que sonaría extraña aquí.
- source_word: ἔδεσθε
  english_pob_choice: you will eat
  chosen_spanish: comerán
  alternatives_spanish:
  - comeréis
  - se comerá
  lexicon: ἐσθίω
  rationale: El sujeto inmediato se entiende mejor en plural por el paralelo con «tu descendencia»; el español evita una ambigüedad innecesaria manteniendo el sentido de ingestión real.
- source_word: πᾶν ὡραῖον ἐν ὁράσει
  english_pob_choice: every beautiful thing for the eye
  chosen_spanish: toda cosa hermosa a la vista
  alternatives_spanish:
  - todo lo hermoso en la vista
  - todo lo bello para ver
  lexicon: ὡραῖος
  rationale: «Hermosa a la vista» conserva la referencia perceptiva de ἐν ὁράσει y refleja el matiz de belleza visible sin volverlo demasiado libre.
- source_word: τὴν τράπεζαν Κυρίου
  english_pob_choice: the table of the Lord
  chosen_spanish: la mesa del Señor
  alternatives_spanish:
  - la mesa de Yahvé
  - la mesa del Señor Dios
  lexicon: τράπεζα / κύριος
  rationale: Aquí «Señor» sigue el valor reverencial del griego Κυρίου en una fórmula cultual ya fijada por el contexto; «mesa» mantiene el objeto literal sin reinterpretarlo como «altar».
theological_decisions:
- issue: Referencia a Κυρίου en contexto cultual
  english_pob_reading: the table of the Lord
  chosen_spanish_reading: la mesa del Señor
  alternative_spanish_readings:
  - la mesa de Yahvé
  - la mesa del Señor Dios
  rationale: El griego usa Κυρίου sin marcador explícito del nombre divino; en una expresión ritual establecida, «Señor» preserva la forma tradicional del título sin afirmar más de lo que el texto griego explicita aquí.
  doctrine_reference: Nominal reference in cultic title; divine-name handling
- issue: Valor de σπέρμα como promesa colectiva
  english_pob_reading: your seed
  chosen_spanish_reading: tu descendencia
  alternative_spanish_readings:
  - tu linaje
  - tu prole
  rationale: La promesa se dirige a una línea sucesoria, no a un mero elemento botánico; «descendencia» conserva la dimensión corporativa y hereditaria del pasaje.
  doctrine_reference: Covenant lineage / promise language
- issue: Sintaxis del sujeto en la segunda cláusula
  english_pob_reading: and your seed will eat every beautiful thing in action
  chosen_spanish_reading: y comerán toda cosa hermosa a la vista
  alternative_spanish_readings:
  - y tu descendencia comerá toda cosa hermosa a la vista
  - y comeréis toda cosa hermosa a la vista
  rationale: El griego transmitido aquí no obliga a singularizar el verbo; el plural en español sigue naturalmente el antecedente colectivo «tu descendencia» y evita forzar una lectura singular.
  doctrine_reference: Collective subject agreement
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto inglés, que mantuvo «seed» y «the table of the Lord» y aclaró una omisión previa con «in action»; en el griego fuente aportado para este versículo no aparece ἐν δράσει, así que no se introdujo en la versión española.
  spanish_consistency_notes:
  - Se mantuvo «descendencia» para σπέρμα en toda la unidad.
  - Se evitó «SEÑOR» en mayúsculas porque el pasaje griego cita Κυρίου en un título cultual, no un esquema editorial de sustitución del nombre divino.
  - «Mesa del Señor» se conservó literalmente para no sustituirla por una glosa interpretativa como «altar».
