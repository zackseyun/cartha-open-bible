  text: '*Ἐξυπνισθεὶς οὖν¹⁰⁰ συνῆκα¹⁰¹, ὅτι *τοῦτο ὅμοιόν ἐστι τοῦ πρώτου ὀνείρου¹⁰².'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/008/018.yaml
  text: So when I awoke, I understood that this was like the first vision.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:10Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Así que, cuando desperté, entendí que esto era semejante a la primera visión.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐξυπνισθεὶς οὖν
  english_pob_choice: So when I awoke
  chosen_spanish: Así que, cuando desperté
  alternatives_spanish:
  - Entonces, al despertar
  - Por tanto, cuando desperté
  lexicon: ἐξυπνίζω
  rationale: 'El aoristo pasivo participial se expresa de forma natural en español como una acción puntual: ''cuando desperté''. ''Así que'' conserva la inferencia de οὖν sin volverla demasiado formal o rígida.'
- source_word: συνῆκα
  english_pob_choice: I understood
  chosen_spanish: entendí
  alternatives_spanish:
  - comprendí
  - me di cuenta
  lexicon: συνίημι
  rationale: El verbo indica comprensión repentina o percepción mental; 'entendí' es claro y fiel, y evita sobreinterpretar el matiz como mera conclusión racional o percepción visual.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - ello
  - esta cosa
  lexicon: οὗτος
  rationale: '''Esto'' mantiene de modo directo la referencia inmediata al contenido del sueño o visión anterior.'
- source_word: ὅμοιόν ἐστι
  english_pob_choice: was like
  chosen_spanish: era semejante
  alternatives_spanish:
  - era como
  - se parecía
  lexicon: ὅμοιος
  rationale: '''Semejante'' conserva el comparativo sin perder la sobriedad del griego. ''Era como'' sería más idiomático, pero menos preciso respecto al vínculo de similitud.'
- source_word: τοῦ πρώτου ὀνείρου
  english_pob_choice: the first vision
  chosen_spanish: la primera visión
  alternatives_spanish:
  - el primer sueño
  - la primera visión onírica
  lexicon: ὄνειρον
  rationale: Aunque el griego dice 'sueño', la POB inglesa eligió 'vision' siguiendo su lectura contextual del episodio. En español se mantiene esa decisión auditada para conservar la interpretación narrativa del texto recibido.
theological_decisions:
- issue: Visión vs. sueño para ὄνειρον
  english_pob_reading: the first vision
  chosen_spanish_reading: la primera visión
  alternative_spanish_readings:
  - el primer sueño
  - la primera visión onírica
  rationale: El texto griego usa ὄνειρον, pero el testimonio inglés POB ya leyó el pasaje como 'vision'. Para no borrar esa decisión interpretativa del equipo POB, se mantiene 'visión' en español y se registra la tensión fuente/tradición de traducción.
  doctrine_reference: Hermenéutica del pasaje; preservación de la lectura del audit trail POB
translation_notes:
  revision_awareness: El pasaje no tiene revisiones aplicadas y el último pase de revisión indica que no se necesitan cambios; por ello, el borrador español sigue de cerca la lectura auditada en inglés sin introducir variantes no justificadas.
  spanish_consistency_notes:
  - Se mantiene el orden natural del español sin añadir sujeto expreso innecesario.
  - '''Así que'' traduce οὖν con continuidad narrativa.'
  - '''Visión'' conserva la elección auditada del POB inglés, aun cuando el griego literal dice ''sueño''.'
