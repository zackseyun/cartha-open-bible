translation:
  language: es
  text: Y de entre ellos habrá sacerdotes, jueces y escribas; y por su boca se recibirá lo santo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἱερεῖς
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - presbíteros
  - sacerdotes del templo
  lexicon: ἱερεύς
  rationale: ‘Sacerdotes’ es el equivalente natural y preciso en español para el oficio cultual indicado por el griego. Conserva la referencia institucional sin introducir una ampliación innecesaria.
- source_word: κριταὶ
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - magistrados
  - árbitros
  lexicon: κριτής
  rationale: ‘Jueces’ reproduce de forma directa la función judicial del término griego y es la forma más clara y sobria en español.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - secretarios
  - letrados
  lexicon: γραμματεύς
  rationale: ‘Escribas’ mantiene el sentido histórico-religioso del término, más específico que ‘secretarios’ y más tradicionalmente reconocible que ‘letrados’ en este contexto.
- source_word: ἐπὶ στόματος αὐτῶν
  english_pob_choice: by their mouth
  chosen_spanish: por su boca
  alternatives_spanish:
  - por medio de su boca
  - según su palabra
  lexicon: στόμα
  rationale: La preposición y el sustantivo expresan mediación oral; ‘por su boca’ es una correspondencia idiomática natural en español y conserva la imagen original.
- source_word: τὸ ἅγιον
  english_pob_choice: the holy thing
  chosen_spanish: lo santo
  alternatives_spanish:
  - la cosa santa
  - el santuario
  - lo sagrado
  lexicon: ἅγιον
  rationale: El griego usa un neutro sustantivado. ‘Lo santo’ preserva esa sustantivación en español sin decidir de antemano si se trata de una cosa, porción u objeto santo, y evita sobreinterpretar el referente.
theological_decisions:
- issue: Cómo traducir τὸ ἅγιον sin fijar indebidamente el referente
  english_pob_reading: the holy thing will be received
  chosen_spanish_reading: se recibirá lo santo
  alternative_spanish_readings:
  - se recibirá la cosa santa
  - se recibirá el santo objeto
  - recibirán lo santo
  rationale: La frase griega es deliberadamente breve y neutra. ‘Lo santo’ conserva la ambigüedad del original y permite que el lector determine el referente por contexto, igual que en el inglés POB.
  doctrine_reference: No doctrinal issue; lexical ambiguity preserved
- issue: Voz impersonal/pasiva de ληφθήσεται
  english_pob_reading: will be received
  chosen_spanish_reading: se recibirá
  alternative_spanish_readings:
  - será recibido
  - lo recibirán
  rationale: El giro impersonal con ‘se’ reproduce de forma natural la pasiva futura griega y mantiene el foco en el hecho de la recepción, no en un agente explicitado.
  doctrine_reference: No doctrinal issue; verbal voice and agency
- issue: Lista de oficios y autoridad comunitaria
  english_pob_reading: priests and judges and scribes
  chosen_spanish_reading: sacerdotes, jueces y escribas
  alternative_spanish_readings:
  - sacerdotes, magistrados y escribas
  - sacerdotes, jueces y letrados
  rationale: La enumeración conserva la estructura y el peso institucional del texto fuente sin armonizarlo con categorías eclesiásticas posteriores.
  doctrine_reference: Community/order terminology; no later ecclesial replacement
translation_notes:
  revision_awareness: Se siguió el texto griego del testimonio de Levi 8:17 y el inglés auditado de POB, que ya había resuelto la línea final como ‘the holy thing will be received’. No hubo revisiones aplicadas en la pasada más reciente; la traducción española conserva esa lectura, junto con la ambigüedad deliberada de τὸ ἅγιον.
  spanish_consistency_notes:
  - Se mantiene ‘sacerdotes’ para ἱερεῖς y ‘escribas’ para γραμματεῖς en este registro.
  - Se usa ‘lo santo’ para preservar la sustantivación neutra del griego.
  - No se introduce terminología eclesiástica posterior ni se sustituye la enumeración por equivalentes más interpretativos.
