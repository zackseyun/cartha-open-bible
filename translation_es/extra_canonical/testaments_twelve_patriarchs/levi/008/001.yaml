source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Κἀκεῖ πάλιν εἶδον¹ *ὅραμα ὡς² τὸ πρότερον μετὰ *τὸ ποιῆσαι ἡμᾶς ἐκεῖ³ ἡμέρας ἑβδομήκοντα⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/008/001.yaml
  text: And there again I saw a vision like the former one, after we had spent seventy days there.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:37Z'
    unchanged: false
    changes_summary: Revised 'remained there seventy days' to 'spent seventy days there' for a more natural rendering of μετὰ τὸ ποιῆσαι ἡμᾶς ἐκεῖ ἡμέρας ἑβδομήκοντα, while preserving the sense. Kept the rest unchanged.
translation:
  language: es
  text: Y allí, de nuevo, vi una visión semejante a la anterior, después de haber pasado allí setenta días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ ἐκεῖ πάλιν εἶδον
  english_pob_choice: And there again I saw
  chosen_spanish: Y allí, de nuevo, vi
  alternatives_spanish:
  - Y allí otra vez vi
  - Y allí nuevamente vi
  lexicon: καί; ἐκεῖ; πάλιν; ὁράω
  rationale: Conserva la repetición enfática del griego con una secuencia natural en español. 'De nuevo' mantiene el valor de πάλιν sin sonar demasiado literal.
- source_word: ὅραμα
  english_pob_choice: a vision
  chosen_spanish: una visión
  alternatives_spanish:
  - un sueño visionario
  - una revelación
  lexicon: ὅραμα
  rationale: '''Visión'' es el equivalente directo y más transparente en español para este sustantivo, manteniendo el registro profético sin añadir matices no explícitos.'
- source_word: ὡς τὸ πρότερον
  english_pob_choice: like the former one
  chosen_spanish: semejante a la anterior
  alternatives_spanish:
  - como la anterior
  - como la primera
  lexicon: ὡς; πρότερος
  rationale: '''Semejante a la anterior'' preserva la comparación sin forzar identidad absoluta; refleja el valor comparativo de ὡς y el adjetivo de referencia temporal.'
- source_word: μετὰ τὸ ποιῆσαι ἡμᾶς ἐκεῖ ἡμέρας ἑβδομήκοντα
  english_pob_choice: after we had spent seventy days there
  chosen_spanish: después de haber pasado allí setenta días
  alternatives_spanish:
  - después de permanecer allí setenta días
  - cuando ya habíamos pasado allí setenta días
  lexicon: μετά + infinitivo; ποιέω; ἡμέρα; ἑβδομήκοντα
  rationale: La revisión inglesa optó por 'spent' para captar un sentido idiomático de permanencia temporal. 'Haber pasado allí setenta días' reproduce bien ese valor en español sin sonar rígido. 'Pasado' conserva la idea de transcurso de tiempo, no mera estancia estática.
translation_notes:
  revision_awareness: La revisión inglesa cambió 'remained there seventy days' por 'spent seventy days there' para expresar de manera más natural el giro griego μετὰ τὸ ποιῆσαι ἡμᾶς ἐκεῖ ἡμέρας ἑβδομήκοντα. La versión española adopta 'haber pasado allí setenta días' para seguir esa decisión auditada con naturalidad idiomática.
  spanish_consistency_notes:
  - Se mantiene el pasado simple 'vi' para concordar con la narración directa del testimonio.
  - Se evita 'SEÑOR' u otra terminología teológica no pertinente, ya que el pasaje no contiene vocabulario divino explícito.
  - '''Visión'' se usa de modo consistente para ὅραμα en contextos narrativos proféticos.'
