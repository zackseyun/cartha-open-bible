  text: Ὁ⁵⁰ πέμπτος *κλάδον μοι ἐλαίας ἔδωκεν πιότητος⁵¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/008/008.yaml
  text: And the fifth gave me a branch of a rich olive tree.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:08Z'
    unchanged: false
    changes_summary: Added the article and supplied 'tree' for natural English and clearer lexical sense of ἐλαίας; retained 'rich' for πιότητος.
translation:
  language: es
  text: Y el quinto me dio una rama de un olivo rico[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como “un olivo abundante” o “un olivo fecundo”; se conserva “rico” para reflejar la lectura auditada del POB inglés.
    reason: lexical_alternative
lexical_decisions:
- source_word: πέμπτος
  english_pob_choice: the fifth
  chosen_spanish: el quinto
  alternatives_spanish:
  - el quinto
  lexicon: No aplica
  rationale: Se conserva el ordinal con artículo definido, como en el griego y en el inglés POB.
- source_word: κλάδον
  english_pob_choice: a branch
  chosen_spanish: una rama
  alternatives_spanish:
  - un ramo
  - una rama
  lexicon: No aplica
  rationale: Rama es la opción más natural y fiel para κλάδον en español bíblico contemporáneo.
- source_word: ἐλαίας
  english_pob_choice: of a rich olive tree
  chosen_spanish: de un olivo
  alternatives_spanish:
  - de un árbol de olivo
  - de un olivo
  lexicon: No aplica
  rationale: ἐλαίας se entiende con naturalidad como el árbol de olivo; en español puede decirse simplemente 'olivo' sin perder el referente botánico.
- source_word: πιότητος
  english_pob_choice: rich
  chosen_spanish: rico
  alternatives_spanish:
  - frondoso
  - fecundo
  - abundante
  lexicon: No aplica
  rationale: Se mantiene la cualidad de abundancia/fertilidad transmitida por el inglés POB 'rich' sin convertirla en una paráfrasis más interpretativa.
theological_decisions:
- issue: Valor de πιότητος como riqueza/fertilidad del olivo
  english_pob_reading: a rich olive tree
  chosen_spanish_reading: un olivo rico
  alternative_spanish_readings:
  - un olivo frondoso
  - un olivo fecundo
  rationale: La imagen apunta a abundancia o riqueza del árbol, no a una cualidad teológica especial; se conserva la tensión entre literalidad y naturalidad sin explicitar más de lo que el texto dice.
  doctrine_reference: No doctrinal issue; imagery in Testament of Levi 8:8
translation_notes:
  revision_awareness: Se ajustó la redacción para evitar la lectura torpe "de un olivo rico" y para mantener la actualización del auditor inglés que añadió "tree"; en español se resuelve naturalmente con "olivo" sin añadir una perífrasis innecesaria. Además, se ancló la nota al texto con [a] para cumplir la validación.
  spanish_consistency_notes:
  - 'Se mantiene el orden simple coordinado del original: ''Y el quinto me dio...''.'
  - '''Rico'' conserva la decisión auditada del inglés POB y no se sustituye por un equivalente más interpretativo.'
  - No se introduce terminología confesional ajena al texto.
