translation:
  language: es
  text: Y el tercero me vistió con una túnica de lino, semejante a un efod.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: βυσσίνην
  english_pob_choice: linen garment
  chosen_spanish: túnica de lino
  alternatives_spanish:
  - vestidura de lino
  - prenda de lino
  - ropa de lino
  lexicon: βύσσινος / βύσσινον
  rationale: El griego indica una prenda hecha de lino fino. «Túnica de lino» comunica de forma natural una vestidura concreta y preserva la materia textil sin forzar un término técnico más específico de lo que el texto da.
- source_word: μοι περιέθηκεν
  english_pob_choice: put on me
  chosen_spanish: me vistió con
  alternatives_spanish:
  - me puso
  - me colocó sobre
  - me puso encima
  lexicon: περιτίθημι
  rationale: La construcción expresa que alguien coloca una prenda sobre la persona. En español, «me vistió con» reproduce bien la acción de poner una vestidura sobre él y suena natural sin perder el sentido de cobertura.
- source_word: ὁμοίαν ἐφούδ
  english_pob_choice: like an ephod
  chosen_spanish: semejante a un efod
  alternatives_spanish:
  - como un efod
  - parecida a un efod
  lexicon: ἐφούδ / ἐφόδ
  rationale: «Efod» se conserva como préstamo porque es un término técnico bíblico y cultual. «Semejante a» mantiene el matiz comparativo del griego ὁμοίαν sin sugerir identidad absoluta.
theological_decisions:
- issue: Conservación del término cultual «efod»
  english_pob_reading: like an ephod
  chosen_spanish_reading: semejante a un efod
  alternative_spanish_readings:
  - como un efod
  - parecida a un efod
  rationale: No hay indicación suficiente para sustituir el término por una descripción interpretativa. Mantener «efod» preserva la referencia cultual del original y evita borrar una posible alusión sacerdotal.
  doctrine_reference: Éxodo 28; 1 Samuel 2:18
- issue: Género y función de la prenda
  english_pob_reading: linen garment
  chosen_spanish_reading: túnica de lino
  alternative_spanish_readings:
  - vestidura de lino
  - prenda de lino
  rationale: El texto describe una vestidura, no una enseñanza doctrinal. «Túnica» ofrece una imagen clara en español y conserva el carácter corporal/ritual de la acción sin añadir significado teológico.
  doctrine_reference: Uso descriptivo no doctrinal
translation_notes:
  revision_awareness: La versión española sigue la lectura griega transmitida en el expediente fuente-fijo v2 y concuerda con la traducción inglesa POB revisada, que no requirió cambios en la última pasada. No se documentan variantes textuales ni notas previas que exijan marcar alternativas en el texto.
  spanish_consistency_notes:
  - Se conserva el nombre divino y la terminología cristológica solo cuando aparezcan en el pasaje; aquí no hay necesidad de ninguno de esos términos.
  - «Efod» se mantiene sin equivalente explicativo adicional para respetar el carácter técnico del objeto ritual.
  - El registro es sobrio y bíblico, pero con sintaxis natural en español contemporáneo.
