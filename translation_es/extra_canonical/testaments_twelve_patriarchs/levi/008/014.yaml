id: T12P.LEV.8.14
reference: Testament of Levi 8:14
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: '*Ὁ δὲ⁷⁵ τρίτος *ἐπικληθήσεται αὐτῷ ὄνομα καινόν⁷⁶, ὅτι βασιλεὺς †ἐκ τοῦ†⁷⁷ Ἰούδα ἀναστήσεται καὶ ποιήσει *ἱερατείαν νέαν, κατὰ τὸν τύπον τῶν ἐθνῶν εἰς πάντα τὰ ἔθνη⁷⁸.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/008/014.yaml
  text: And the third will be called by a new name, because a king will arise from Judah and will establish a new priesthood, according to the pattern of the nations, for all the nations.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:39Z'
    unchanged: false
    changes_summary: Changed 'after the pattern' to 'according to the pattern' for a more formal and direct rendering of κατὰ τὸν τύπον. Retained the rest as accurate and natural.
translation:
  language: es
  text: Y el tercero será llamado por un nombre nuevo, porque un rey se levantará de Judá y establecerá un nuevo sacerdocio, conforme al patrón de las naciones, para todas las naciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπικληθήσεται ... ὄνομα καινόν
  english_pob_choice: will be called by a new name
  chosen_spanish: será llamado por un nombre nuevo
  alternatives_spanish:
  - será nombrado con un nombre nuevo
  - recibirá un nombre nuevo
  lexicon: ἐπικαλέω / ὄνομα
  rationale: Conserva la pasiva y la idea de nominación externa expresada por el griego y reflejada en el POB inglés. 'Por un nombre nuevo' reproduce la construcción natural en español sin añadir contenido.
- source_word: βασιλεὺς
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  lexicon: βασιλεύς
  rationale: '''Rey'' es la equivalencia directa, clara y bíblica en español. ''Monarca'' sería más abstracto y menos fiel al registro del texto.'
- source_word: ἀναστήσεται
  english_pob_choice: will arise
  chosen_spanish: se levantará
  alternatives_spanish:
  - surgirá
  - aparecerá
  lexicon: ἀνίστημι
  rationale: '''Se levantará'' conserva la imagen dinámica de surgir o levantarse a una posición de autoridad, sin perder la fuerza futura del verbo griego.'
- source_word: ἱερατείαν νέαν
  english_pob_choice: a new priesthood
  chosen_spanish: un nuevo sacerdocio
  alternatives_spanish:
  - un sacerdocio nuevo
  - un ministerio sacerdotal nuevo
  lexicon: ἱερατεία
  rationale: '''Sacerdocio'' es la forma normal y precisa para ἱερατεία. ''Nuevo'' se coloca antes del sustantivo para un español natural y equivalente al orden del original.'
- source_word: κατὰ τὸν τύπον τῶν ἐθνῶν
  english_pob_choice: according to the pattern of the nations
  chosen_spanish: conforme al patrón de las naciones
  alternatives_spanish:
  - según el patrón de las naciones
  - de acuerdo con el modelo de las naciones
  lexicon: τύπος
  rationale: '''Patrón'' mantiene la idea de modelo o figura normativa, en continuidad con la revisión inglesa que prefirió ''according to''. ''Conforme a'' refleja más directamente κατὰ y suena más formal que una paráfrasis idiomática.'
- source_word: εἰς πάντα τὰ ἔθνη
  english_pob_choice: for all the nations
  chosen_spanish: para todas las naciones
  alternatives_spanish:
  - a todas las naciones
  - para todas las gentes
  lexicon: πᾶς / ἔθνος
  rationale: '''Para todas las naciones'' reproduce la dirección/beneficio expresada por εἰς y mantiene ''naciones'' como traducción consistente de ἔθνη. ''Gentes'' sería menos preciso en este contexto.'
theological_decisions:
- issue: Origen del rey y alcance universal del sacerdocio
  english_pob_reading: a king will arise from Judah and will establish a new priesthood ... for all the nations
  chosen_spanish_reading: un rey se levantará de Judá y establecerá un nuevo sacerdocio ... para todas las naciones
  alternative_spanish_readings:
  - un rey surgirá de Judá y establecerá un nuevo sacerdocio ... para todas las naciones
  - un rey de Judá se levantará ...
  rationale: Se conserva la procedencia mesiánica 'de Judá' y el alcance universal del sacerdocio sin suavizar el contraste entre Israel/Judá y las naciones. El texto no exige explicitar 'Mesías' en esta línea, por lo que se mantiene 'rey' como en el POB inglés.
  doctrine_reference: Génesis 49:10; Hebreos 7
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió 'after the pattern' a 'according to the pattern' para reflejar mejor κατὰ τὸν τύπον. La versión española adopta 'conforme al patrón' para mantener esa precisión formal y el mismo valor semántico directivo. No se incorporan otras notas porque el pasaje es breve y la opción principal no deja ambigüedades textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene 'naciones' para ἔθνη en todo el segmento.
  - Se usa 'sacerdocio' en lugar de alternativas más interpretativas para conservar la fuerza técnica del término.
  - La construcción futura pasiva ('será llamado') se conserva para reflejar el griego y el POB inglés.
  - No se introduce 'Cristo' ni 'Mesías' porque el original aquí dice simplemente 'rey'.
