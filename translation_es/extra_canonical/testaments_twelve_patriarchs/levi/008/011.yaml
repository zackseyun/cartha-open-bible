source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: '*Καὶ λέγουσι⁶¹ πρός με· Λευί⁶², εἰς τρεῖς ἀρχὰς διαιρεθήσεται⁶³ τὸ σπέρμα σου⁶⁴, εἰς⁶⁵ σημεῖον⁶⁶ *δόξης Κυρίου ἐπερχομένου⁶⁷.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/008/011.yaml
  text: And they say to me, “Levi, your seed will be divided into three divisions, as a sign of the glory of the Lord who is coming.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:10Z'
    unchanged: false
    changes_summary: Changed “offices” to “divisions” for closer lexical accuracy to διαιρεθήσεται/ἀρχάς, and rendered εἰς as “as” rather than “for” for more natural formal English.
translation:
  language: es
  text: 'Y me dicen: «Leví, tu descendencia será dividida en tres partes, como señal de la gloria del Señor que viene».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λέγουσι πρός με
  english_pob_choice: And they say to me
  chosen_spanish: Y me dicen
  alternatives_spanish:
  - Y me dijeron
  - Y dicen a mí
  lexicon: λέγω
  rationale: El griego presenta una fórmula de habla en presente; «me dicen» conserva el tiempo narrativo y suena natural en español sin forzar un pretérito.
- source_word: Λευί
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: Λευί
  rationale: Se adapta al uso español con tilde por prosodia, manteniendo el nombre propio bíblico reconocible.
- source_word: τὸ σπέρμα σου
  english_pob_choice: your seed
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu semilla
  - tu linaje
  lexicon: σπέρμα
  rationale: «Descendencia» comunica mejor en español el sentido genealógico del término sin perder la referencia a la posteridad de Levi.
- source_word: διαιρεθήσεται εἰς τρεῖς ἀρχάς
  english_pob_choice: will be divided into three divisions
  chosen_spanish: será dividida en tres partes
  alternatives_spanish:
  - será dividida en tres divisiones
  - será repartida en tres partes
  lexicon: διαιρέω / ἀρχή
  rationale: La revisión inglesa corrigió «offices» a «divisions» por fidelidad a διαιρεθήσεται y ἀρχάς. En español, «partes» transmite la partición real sin imponer un matiz administrativo que el contexto no exige.
- source_word: εἰς σημεῖον
  english_pob_choice: as a sign
  chosen_spanish: como señal
  alternatives_spanish:
  - para señal
  - en señal
  lexicon: σημεῖον
  rationale: «Como señal» refleja bien el valor resultativo/funcional de εἰς en este contexto y mantiene la naturalidad del español.
- source_word: δόξης Κυρίου ἐπερχομένου
  english_pob_choice: of the glory of the Lord who is coming
  chosen_spanish: de la gloria del Señor que viene
  alternatives_spanish:
  - de la gloria de Yahvé que viene
  - de la gloria del Señor que está por venir
  lexicon: δόξα / κύριος / ἔρχομαι
  rationale: Se conserva «gloria» para δόξα y se traduce κύριος aquí como «Señor» porque el griego remite a una fórmula reverencial de título divino en un texto de tradición bíblica griega. «Que viene» preserva la idea de presencia inminente sin sobreexplicar el aspecto.
theological_decisions:
- issue: Traducción de κύριος en una fórmula de tradición divina
  english_pob_reading: the Lord who is coming
  chosen_spanish_reading: el Señor que viene
  alternative_spanish_readings:
  - Yahvé que viene
  - el Señor que está por venir
  rationale: Aunque el proyecto prefiere «Yahvé» para יהוה, aquí el griego cita una fórmula transmitida como κύριος. Dado que la frase funciona como expresión reverencial estable dentro de esta tradición textual, «Señor» mantiene la continuidad del testimonio griego sin introducir una equivalencia no atestiguada directamente en el versículo.
  doctrine_reference: Nombre divino y uso de κύριος en tradición bíblica griega
- issue: Sentido de las «tres partes» como división profética
  english_pob_reading: divided into three divisions
  chosen_spanish_reading: dividida en tres partes
  alternative_spanish_readings:
  - dividida en tres divisiones
  - repartida en tres partes
  rationale: El texto griego dice literalmente que la descendencia será «dividida en tres ἀρχάς». La POB inglesa optó por «divisions» tras revisar «offices». En español, «partes» conserva la división concreta sin añadir una interpretación institucional excesiva que no está explicitada en el griego de este versículo.
  doctrine_reference: Profecía patriarcal / estructura de tribus o funciones
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del testimonio inglés, que corrigió «offices» a «divisions» y «for» a «as». En español, esto se reflejó mediante «partes» y «como» para evitar una lectura funcionalista que el griego no exige.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, sin arcaísmos innecesarios.
  - Se evitó traducir mecánicamente «Lord» como «SEÑOR» en mayúsculas; se empleó «Señor» por tratarse de una cita/tradición griega no marcada directamente con el tetragrámaton en el texto dado.
  - No se añadieron notas textuales porque el paquete fuente no presenta variantes relevantes ni notas inglesas asociadas.
