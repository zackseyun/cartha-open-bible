base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/013/001.yaml
  text: 'And now, my children, I command you: fear the Lord your God with all your heart, and walk in simplicity in accordance with all his law.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:58Z'
    unchanged: false
    changes_summary: Changed 'according to all his law' to 'in accordance with all his law' for more natural formal English while preserving the sense of κατὰ πάντα τὸν νόμον αὐτοῦ.
translation:
  language: es
  text: 'Y ahora, hijos míos, les mando: teman a Yahvé, su Dios, con todo su corazón, y anden en sencillez conforme a toda su ley.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κύριον τὸν Θεὸν ὑμῶν
  english_pob_choice: the Lord your God
  chosen_spanish: Yahvé, su Dios
  alternatives_spanish:
  - el Señor, su Dios
  - el Señor Dios de ustedes
  lexicon: יהוה / κύριος; θεός
  rationale: El griego usa Κύριον con referencia al Dios de Israel; conforme a la convención del proyecto, se restaura el nombre divino como «Yahvé» en el texto principal. «su Dios» conserva la relación posesiva del griego ὑμῶν.
- source_word: φοβεῖσθε
  english_pob_choice: fear
  chosen_spanish: teman
  alternatives_spanish:
  - tengan temor de
  - reverencien
  lexicon: φοβέομαι
  rationale: «Teman» conserva el mandato directo y la fuerza del verbo sin suavizarlo a una mera reverencia, que sería una interpretación posible pero menos explícita.
- source_word: ἐν ἁπλότητι
  english_pob_choice: in simplicity
  chosen_spanish: en sencillez
  alternatives_spanish:
  - con sencillez
  - en simplicidad
  lexicon: ἁπλότης
  rationale: «Sencillez» es natural en español y mantiene la idea de integridad, pureza o ausencia de doblez que puede llevar ἁπλότης. «Simplicidad» sería más literal pero menos idiomática.
- source_word: κατὰ πάντα τὸν νόμον αὐτοῦ
  english_pob_choice: in accordance with all his law
  chosen_spanish: conforme a toda su ley
  alternatives_spanish:
  - de acuerdo con toda su ley
  - según toda su ley
  lexicon: κατά + accusative; νόμος
  rationale: «Conforme a» refleja bien la relación normativa de κατά con acusativo y mantiene la idea de ajuste a la ley completa, sin reducirla a mera semejanza.
theological_decisions:
- issue: Restauración del nombre divino detrás de κύριος
  english_pob_reading: fear the Lord your God
  chosen_spanish_reading: teman a Yahvé, su Dios
  alternative_spanish_readings:
  - teman al Señor, su Dios
  - teman a Dios
  rationale: En esta tradición de trabajo, cuando κύριος se usa para el Dios de Israel y no para un título genérico, el texto español debe reflejar el nombre divino en lugar de ocultarlo con una sustitución reverencial. Esto preserva la trazabilidad hacia el hebreo subyacente y la decisión POB.
  doctrine_reference: Éxodo 3:15; Deuteronomio 6:4-5
translation_notes:
  revision_awareness: La versión inglesa auditada fue ajustada de «according to all his law» a «in accordance with all his law» para una formulación más natural. En español se reflejó esa misma precisión con «conforme a toda su ley», sin introducir una nota porque no cambia el sentido ni crea una tensión textual adicional.
  spanish_consistency_notes:
  - Se mantuvo el registro reverente y sobrio, con español moderno pero eclesialmente legible.
  - «Yahvé» se usó de manera consistente para el nombre divino en el texto principal, en línea con la política del proyecto.
  - «Ley» conserva el lenguaje legal/covenantal del original; no se sustituyó por «instrucción» porque el contexto aquí apela a la obediencia normativa completa.
