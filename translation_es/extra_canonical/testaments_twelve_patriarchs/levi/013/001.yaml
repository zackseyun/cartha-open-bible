source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ *νῦν, τέκνα μου¹, ἐντέλλομαι ὑμῖν, φοβεῖσθε² *Κύριον τὸν Θεὸν ὑμῶν³ Γἐξ ὅλης τῆς καρδίας ὑμῶν⁴⁾, καὶ πορεύεσθε ἐν ἁπλότητι⁵ *κατὰ πάντα τὸν νόμον αὐτοῦ⁶.
