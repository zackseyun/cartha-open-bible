source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: '*Πᾶς ὃς ἂν διδάσκει καλὰ καὶ πράττει⁶⁰ σύνθρονος ἔσται⁶¹ βασιλέων⁶², ὥσπερ⁶³ καὶ Ἰωσὴφ ὁ ἀδελφός⁶⁴ μου⁶⁵.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/013/009.yaml
  text: Everyone who teaches good things and does them will be enthroned with kings, just as Joseph my brother also was.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:05Z'
    unchanged: false
    changes_summary: Replaced 'will sit on thrones with kings' with 'will be enthroned with kings' to reflect σύνθρονος more directly; changed 'did' to 'was' for grammatical alignment with the predicate.
translation:
  language: es
  text: Todo el que enseña cosas buenas y las practica será entronizado con reyes, así como también José, mi hermano, lo fue.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πᾶς ὃς ἂν διδάσκει
  english_pob_choice: Everyone who teaches
  chosen_spanish: Todo el que enseña
  alternatives_spanish:
  - Todo el que instruye
  - Quien enseña
  lexicon: Πᾶς / διδάσκω
  rationale: Todo el que preserva el valor distributivo de πᾶς ὃς ἂν. «Enseña» es la equivalencia natural y directa para διδάσκει en español bíblico contemporáneo.
- source_word: καλὰ
  english_pob_choice: good things
  chosen_spanish: cosas buenas
  alternatives_spanish:
  - lo bueno
  - buenas cosas
  lexicon: καλός
  rationale: «Cosas buenas» conserva el plural neutro implícito y evita reducir καλὰ a una sola cualidad abstracta; refleja la amplitud de la enseñanza correcta.
- source_word: καὶ πράττει
  english_pob_choice: and does them
  chosen_spanish: y las practica
  alternatives_spanish:
  - y las hace
  - y actúa conforme a ellas
  lexicon: πράσσω
  rationale: «Las practica» transmite con naturalidad la idea de poner en obra lo enseñado, sin perder el vínculo directo con «cosas buenas».
- source_word: σύνθρονος ἔσται
  english_pob_choice: will be enthroned with kings
  chosen_spanish: será entronizado con reyes
  alternatives_spanish:
  - se sentará en trono con reyes
  - estará sentado junto a reyes
  lexicon: σύνθρονος
  rationale: La revisión inglesa corrigió «will sit on thrones with kings» a «will be enthroned with kings» para reflejar más directamente σύνθρονος. «Será entronizado» conserva esa imagen de elevación/regalidad mejor que una simple paráfrasis de sentarse.
- source_word: βασιλέων
  english_pob_choice: with kings
  chosen_spanish: con reyes
  alternatives_spanish:
  - entre reyes
  - junto a reyes
  lexicon: βασιλεύς
  rationale: «Con reyes» sigue de cerca la construcción griega y mantiene la relación compartida con el grupo de reyes.
- source_word: ὥσπερ καὶ Ἰωσὴφ ὁ ἀδελφός μου
  english_pob_choice: just as Joseph my brother also was
  chosen_spanish: así como también José, mi hermano, lo fue
  alternatives_spanish:
  - tal como también lo fue José, mi hermano
  - igual que también José, mi hermano, fue
  lexicon: ὥσπερ / Ἰωσὴφ / ἀδελφός
  rationale: «Así como también» reproduce el comparativo enfático de ὥσπερ καὶ. «Lo fue» mantiene la elipsis verbal del inglés revisado y vincula el predicado con José sin añadir contenido extra.
theological_decisions:
- issue: Recompensa/exaltación de los que enseñan y obedecen
  english_pob_reading: Everyone who teaches good things and does them will be enthroned with kings
  chosen_spanish_reading: Todo el que enseña cosas buenas y las practica será entronizado con reyes
  alternative_spanish_readings:
  - Todo el que enseña el bien y lo hace será exaltado con reyes
  - Todo el que enseña cosas buenas y las pone por obra será sentado con reyes
  rationale: Se mantiene la promesa de exaltación regia como recompensa a la coherencia entre enseñanza y práctica. «Será entronizado» conserva la fuerza honorífica sin diluir la imagen real del texto.
  doctrine_reference: Santidad práctica y vindicación/exaltación de los justos
translation_notes:
  revision_awareness: La edición inglesa revisada cambió «will sit on thrones with kings» por «will be enthroned with kings» para reflejar mejor σύνθρονος, y ajustó «did» a «was». La redacción española sigue esa revisión al usar «será entronizado», evitando una imagen menos precisa de simple asiento. Además, se mantuvo el valor comparativo de ὥσπερ καὶ con «así como también».
  spanish_consistency_notes:
  - Se emplea «José» para Ἰωσὴφ, consistente con el uso bíblico estándar en español.
  - Se usa «reyes» y no «monarcas» para mantener cercanía léxica con el griego y el registro bíblico.
  - No se añadieron notas porque el verso no presenta variantes textuales o tensiones léxicas que requieran alternativa explícita en español.
