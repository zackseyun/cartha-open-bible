translation:
  language: es
  text: Porque si alguno se guarda de estas malas obras, entonces para él la sabiduría será espléndida[a] aun entre enemigos, y en tierra extranjera, una patria, y en medio de los enemigos será hallado como amigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Espléndida» traduce aquí λαμπρά con el sentido de brillante, distinguida o resplandeciente; no implica necesariamente lujo material.
    reason: lexical_alternative
lexical_decisions:
- source_word: φυλάξῃ αὐτόν ἐκ τῶν πονηρῶν τούτων ἔργων
  english_pob_choice: keeps himself from these evil works
  chosen_spanish: se guarda de estas malas obras
  alternatives_spanish:
  - se preserva de estas malas obras
  - se abstiene de estas malas obras
  lexicon: φυλάσσω
  rationale: «Se guarda de» conserva la idea de vigilancia y evitación activa sin volverla demasiado paraphraseada. «Malas obras» reproduce el valor moral de πονηρῶν ἔργων con naturalidad en español.
- source_word: γενήσεται αὐτῷ σοφία
  english_pob_choice: wisdom will become for him
  chosen_spanish: la sabiduría será para él
  alternatives_spanish:
  - la sabiduría le llegará
  - la sabiduría se volverá para él
  lexicon: γίνομαι
  rationale: El griego expresa un devenir/resultar. «Será para él» conserva el sentido relacional de beneficio sin forzar una fórmula extraña; «sabiduría» mantiene el sustantivo abstracto del original.
- source_word: λαμπρὰ ... παρὰ τοῖς πολεμίοις
  english_pob_choice: splendid even among enemies
  chosen_spanish: espléndida aun entre enemigos
  alternatives_spanish:
  - brillante aun entre enemigos
  - resplandeciente aun entre enemigos
  lexicon: λαμπρός
  rationale: «Espléndida» refleja la cualidad de brillo/distinción de λαμπρός y enlaza bien con el contexto figurado de honor y excelencia. «Aun entre enemigos» conserva παρὰ τοῖς πολεμίοις sin añadir explicaciones.
- source_word: ἐπὶ γῆς ἀλλοτρίας πατρίς
  english_pob_choice: in a foreign land a homeland
  chosen_spanish: en tierra extranjera, una patria
  alternatives_spanish:
  - en tierra ajena, una patria
  - en país extranjero, un hogar
  lexicon: πατρίς
  rationale: «Patria» mantiene la fuerza de pertenencia y origen del término griego, mientras «tierra extranjera» traduce ἀλλοτρίας de forma clara. El orden español se ajusta para que la construcción resulte natural.
- source_word: ἐν μέσῳ ἐχθρῶν εὑρηθήσεται φίλος
  english_pob_choice: in the midst of foes he will be found a friend
  chosen_spanish: en medio de los enemigos será hallado como amigo
  alternatives_spanish:
  - en medio de los enemigos será hallado amigo
  - entre enemigos será encontrado como amigo
  lexicon: εὑρίσκω
  rationale: «Será hallado como amigo» conserva la pasiva y el valor resultativo de εὑρηθήσεται, evitando una afirmación más fuerte que el texto. «Como amigo» hace natural en español la construcción predicativa.
theological_decisions:
- issue: La relación entre sabiduría y conducta ética
  english_pob_reading: if anyone keeps himself from these evil works, then wisdom will become for him splendid
  chosen_spanish_reading: si alguno se guarda de estas malas obras, entonces la sabiduría será para él espléndida
  alternative_spanish_readings:
  - si alguno se aparta de estas malas obras, entonces la sabiduría le será espléndida
  - si alguno se abstiene de estas malas obras, entonces la sabiduría será espléndida para él
  rationale: La frase conserva la conexión causal entre apartarse del mal y recibir sabiduría como resultado, sin convertir la sabiduría en mera recompensa moral externa. Se mantiene el matiz de beneficio personal que muestra el original.
  doctrine_reference: Sabiduría y obediencia ética en la literatura de instrucción sapiencial
- issue: La expresión social y espacial de pertenencia en tierra extranjera
  english_pob_reading: in a foreign land a homeland
  chosen_spanish_reading: en tierra extranjera, una patria
  alternative_spanish_readings:
  - en tierra extranjera, un hogar
  - en país extranjero, una patria
  rationale: '«Patria» preserva la tensión entre extrañeza y pertenencia que el texto atribuye a la sabiduría: no elimina la extranjería, sino que afirma una pertenencia real dentro de ella. «Hogar» suavizaría demasiado la imagen y perdería parte de su densidad cultural.'
  doctrine_reference: Peregrinación, pertenencia y fidelidad en contextos de exilio
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; por eso se mantiene la lectura inglesa auditada como control, pero la redacción española se ajusta directamente al griego para conservar sus matices de devenir, brillo y pertenencia.
  spanish_consistency_notes:
  - Se usa «sabiduría» de manera consistente para σοφία, sin introducir distinciones artificiales.
  - Se mantiene «enemigos/enemigos» y «amigo» para conservar el paralelismo antitético del pasaje.
  - Se evita «SEÑOR» u otras sustituciones porque el texto no contiene el nombre divino ni una cita directa relevante.
  - La puntuación respeta la sintaxis española y conserva las tres cláusulas coordinadas del original.
