  text: ⸀Ἐὰν γάρ τις φυλάξῃ αὐτὸν ἐκ τῶν πονηρῶν τούτων ἔργων⸀⁵¹ τότε⁵² γενήσεται⁵³ αὐτῷ σοφία⁵⁴ καὶ *παρὰ τοῖς πολεμίοις λαμπρὰ⁵⁵ καὶ ἐπὶ⁵⁶ γῆς ἀλλοτρίας⁵⁷ πατρίς, καὶ ἐν μέσῳ⁵⁸ ἐχθρῶν εὑρηθήσεται⁵⁹ φίλος.
