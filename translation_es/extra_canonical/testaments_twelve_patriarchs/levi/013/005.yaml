id: T12P.LEV.13.5
reference: Testament of Levi 13:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Ποιήσατε, Γοὖν²⁴⁾ δικαιοσύνην²⁵, τέκνα μου, ἐπὶ τῆς γῆς, ἵνα †εὕρητε²⁶ ἐν τοῖς οὐρανοῖς.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/013/005.yaml
  text: Therefore do righteousness, my children, on the earth, so that you may be found in the heavens.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:03Z'
    unchanged: false
    changes_summary: Changed 'upon the earth' to the more natural 'on the earth.' Revised 'so that you may find it in the heavens' to 'so that you may be found in the heavens,' since the Greek εὕρητε here is better understood intransitively/passively in context rather than with an implied object 'it.'
translation:
  language: es
  text: Por tanto, hagan justicia, hijos míos, en la tierra, para que sean hallados en los cielos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ποιήσατε ... δικαιοσύνην
  english_pob_choice: do righteousness
  chosen_spanish: hagan justicia
  alternatives_spanish:
  - practiquen la justicia
  - obren rectamente
  lexicon: ποιέω; δικαιοσύνη
  rationale: El imperativo pide una acción concreta y sostenida; en español, 'hacer justicia' conserva bien la fuerza verbal de ποιήσατε y el sustantivo δικαιοσύνη con su sentido ético y relacional. 'Practiquen la justicia' es posible, pero 'hagan justicia' es más directo y sigue siendo natural.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - queridos hijos míos
  lexicon: τέκνα
  rationale: '''Hijos míos'' transmite cercanía afectiva y el vocativo plural del texto sin introducir un matiz más interpretativo como ''queridos''. ''Mis hijos'' es igualmente posible, pero ''hijos míos'' suena más exhortativo en español bíblico actual.'
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra aquí abajo
  lexicon: ἐπί; γῆ
  rationale: La revisión inglesa prefirió 'on the earth' por naturalidad. En español, 'en la tierra' expresa bien el ámbito de la conducta humana sin forzar una calca como 'sobre la tierra'.
- source_word: εὕρητε
  english_pob_choice: be found
  chosen_spanish: sean hallados
  alternatives_spanish:
  - se los halle
  - se encuentren
  lexicon: εὑρίσκω
  rationale: 'Sigo la lectura revisada del inglés: aquí el verbo no expresa ''encontrar'' algo, sino ser hallados. ''Sean hallados'' reproduce la voz pasiva implícita y evita añadir un objeto no presente en el griego.'
- source_word: ἐν τοῖς οὐρανοῖς
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos
  lexicon: οὐρανός
  rationale: Conservo el plural 'los cielos' porque el griego está en plural y porque mantiene el registro bíblico y la correspondencia formal con el original. 'En el cielo' simplificaría demasiado y perdería esa forma.
theological_decisions:
- issue: Relación entre la justicia humana en la tierra y el resultado celestial
  english_pob_reading: do righteousness on the earth, so that you may be found in the heavens
  chosen_spanish_reading: hagan justicia, hijos míos, en la tierra, para que sean hallados en los cielos
  alternative_spanish_readings:
  - practiquen la justicia en la tierra, para que sean encontrados en los cielos
  - obren rectamente en la tierra, para que sean hallados en los cielos
  rationale: La frase preserva la estructura exhortación-resultado del griego y del inglés revisado. No se suaviza la conexión moral entre la vida presente y la aceptación futura, porque el texto la expresa de forma directa.
  doctrine_reference: Énfasis sapiencial/exhortativo del Testamento de Leví; correlación moral entre conducta terrenal y destino celestial
translation_notes:
  revision_awareness: 'El inglés auditado revisó dos puntos clave: cambió ''upon the earth'' a ''on the earth'' por naturalidad, y corrigió ''so that you may find it in the heavens'' a ''so that you may be found in the heavens'' porque εὕρητε se entiende mejor aquí en sentido pasivo/intransitivo. La versión española refleja ambas decisiones con ''en la tierra'' y ''sean hallados en los cielos''.'
  spanish_consistency_notes:
  - Se mantiene 'justicia' para δικαιοσύνη de manera consistente con el valor ético-jurídico del término.
  - Se conserva el plural 'cielos' para οὐρανοί, evitando singularizar sin base textual.
  - No se añaden palabras explicativas como 'allí' o 'por Dios' que no están sustentadas por el texto.
