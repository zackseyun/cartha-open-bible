translation:
  language: es
  text: Y ustedes también, enseñen a sus hijos las letras[a], para que tengan entendimiento durante toda su vida, leyendo sin cesar la ley de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «las letras» refleja literalmente γράμματα, que aquí puede aludir al aprendizaje elemental de lectura/escritura.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ τέκνα ὑμῶν
  english_pob_choice: your children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - sus hijos e hijas
  lexicon: τέκνα
  rationale: «τέκνα» abarca hijos en sentido filial amplio; «sus hijos» es natural y fiel en español. Se evita una expansión de género que el texto no explicita.
- source_word: γράμματα
  english_pob_choice: letters
  chosen_spanish: las letras
  alternatives_spanish:
  - la instrucción
  - las letras del alfabeto
  lexicon: γράμματα
  rationale: El término puede referirse a letras/aprendizaje básico. «Las letras» conserva la referencia directa al aprendizaje de lectura y escritura sin sobreinterpretar como escolaridad formal.
- source_word: σύνεσιν
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - inteligencia
  lexicon: σύνεσις
  rationale: «Entendimiento» transmite capacidad de comprender con claridad, coherente con el valor sapiencial del término y con el contexto de instrucción continua.
- source_word: ἐν πάσῃ τῇ ζωῇ αὐτῶν
  english_pob_choice: throughout all their life
  chosen_spanish: durante toda su vida
  alternatives_spanish:
  - en toda su vida
  - a lo largo de toda su vida
  lexicon: πᾶς + ζωή
  rationale: La frase indica extensión temporal completa; «durante toda su vida» es natural, idiomático y fiel.
- source_word: ἀναγινώσκοντες
  english_pob_choice: reading
  chosen_spanish: leyendo
  alternatives_spanish:
  - al leer
  - mientras leen
  lexicon: ἀναγινώσκω
  rationale: El participio expresa la acción concomitante de leer; «leyendo» mantiene la relación sintáctica con el mandato y su continuidad.
- source_word: ἀδιαλείπτως
  english_pob_choice: without ceasing
  chosen_spanish: sin cesar
  alternatives_spanish:
  - sin interrupción
  - constantemente
  lexicon: ἀδιαλείπτως
  rationale: «Sin cesar» es la forma más directa y establece la idea de continuidad incesante del acto de leer.
- source_word: τὸν νόμον τοῦ Θεοῦ
  english_pob_choice: the law of God
  chosen_spanish: la ley de Dios
  alternatives_spanish:
  - la ley de Dios[a]
  - la instrucción de Dios
  lexicon: νόμος + θεός
  rationale: Se mantiene la expresión tradicional y precisa «ley de Dios», ya que el contexto habla de lectura continua del texto normativo divino. No se sustituye por términos más interpretativos.
theological_decisions:
- issue: La función formativa de la instrucción de la Ley
  english_pob_reading: teach your children letters, so that they may have understanding throughout all their life, reading the law of God without ceasing.
  chosen_spanish_reading: enseñen a sus hijos las letras, para que tengan entendimiento durante toda su vida, leyendo sin cesar la ley de Dios.
  alternative_spanish_readings:
  - enseñen a sus hijos a leer, para que tengan entendimiento...
  - enseñen a sus hijos las Escrituras...
  rationale: La formulación conserva la relación entre enseñanza básica, entendimiento duradero y lectura constante de la ley divina, sin convertir «γράμματα» en una paráfrasis más amplia ni adelantar explícitamente «Escrituras» donde el griego dice «ley».
  doctrine_reference: Instrucción sapiencial y formación en la ley divina
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; esta propuesta sigue el texto griego fijado y coincide sustancialmente con el sentido ya auditado en la versión inglesa POB.
  spanish_consistency_notes:
  - Se conserva «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se mantiene un registro bíblico claro y no se introduce vocabulario eclesiástico no atestiguado por el griego.
  - La puntuación refleja una sola oración exhortativa con propósito final y participio de manera natural en español.
