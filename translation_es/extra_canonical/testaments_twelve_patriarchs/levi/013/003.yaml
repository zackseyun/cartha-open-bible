translation:
  language: es
  text: Porque todo el que llegue a conocer la ley de Yahvé será honrado, y no será extranjero dondequiera que vaya.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: νόμον Κυρίου
  english_pob_choice: the law of the Lord
  chosen_spanish: la ley de Yahvé
  alternatives_spanish:
  - la ley del Señor
  - la instrucción de Yahvé
  lexicon: νόμος; κύριος
  rationale: Conserva el contenido jurídico/normativo de νόμος como «ley» y traduce el nombre divino con el término de proyecto «Yahvé», coherente con la fuente griega que habla de la ley perteneciente al Señor/divino nombre.
- source_word: γνώσεται
  english_pob_choice: comes to know
  chosen_spanish: llegue a conocer
  alternatives_spanish:
  - conozca
  - llegue a saber
  lexicon: γινώσκω
  rationale: La forma futura/gnómica en contexto general se comunica naturalmente en español con «llegue a conocer», que mantiene el matiz de acceso real al conocimiento sin reducirlo a mera información.
- source_word: τιμηθήσεται
  english_pob_choice: will be honored
  chosen_spanish: será honrado
  alternatives_spanish:
  - será honrado
  - recibirá honor
  lexicon: τιμάω
  rationale: «Será honrado» preserva la pasiva y el valor de reconocimiento público implicado por el verbo, sin añadir una interpretación más fuerte que el griego.
- source_word: ξένος
  english_pob_choice: a stranger
  chosen_spanish: extranjero
  alternatives_spanish:
  - forastero
  - ajeno
  lexicon: ξένος
  rationale: «Extranjero» comunica la idea de no ser tratado como ajeno o foráneo. «Forastero» sería posible, pero aquí «extranjero» suena más claro y natural en español bíblico actual.
theological_decisions:
- issue: Referencia al nombre divino en la frase «νόμον Κυρίου»
  english_pob_reading: the law of the Lord
  chosen_spanish_reading: la ley de Yahvé
  alternative_spanish_readings:
  - la ley del Señor
  - la ley de Dios
  rationale: La política del proyecto pide «Yahvé» para el tetragrámaton. Aunque el griego usa κύριος, el contexto del testamento conserva la referencia al Señor divino; por eso se mantiene «Yahvé» en lugar de una sustitución genérica.
  doctrine_reference: Divine name / Tetragrammaton handling
- issue: Promesa de honra y no extranjería
  english_pob_reading: he will not be a stranger wherever he goes
  chosen_spanish_reading: no será extranjero dondequiera que vaya
  alternative_spanish_readings:
  - no será forastero dondequiera que vaya
  - no será tratado como extraño adonde vaya
  rationale: Se conserva la afirmación directa del texto sin suavizarla a una explicación sociológica. «No será extranjero» mantiene la tensión de pertenencia y reconocimiento en cualquier lugar.
  doctrine_reference: Hospitality / covenant identity
translation_notes:
  revision_awareness: El inglés auditado no contiene notas ni revisiones sustantivas; la edición más reciente indica que no hacía falta cambiar el pasaje. La versión española sigue directamente el griego de Charles 1908 y mantiene el mismo sentido que la traducción inglesa aprobada.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con las normas del proyecto para el nombre divino.
  - 'Se conservó el paralelismo del verso con dos cláusulas futuras: honra y no extranjería.'
  - No se añadieron glosas explicativas para no diluir la concisión del original.
