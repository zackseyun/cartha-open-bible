reference: Testament of Levi 13:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ σπείρατε²⁷ ἐν *ταῖς ψυχαῖς²⁸ ὑμῶν²⁹ ἀγαθὰ *καὶ εὑρήσετε³⁰ αὐτὰ³¹ *ἐν τῇ ζωῇ ὑμῶν³². *Ἐὰν δὲ σπείρητε πονηρὰ³³ *πᾶσαν ταραχὴν καὶ θλίψιν θερίσετε³⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/013/006.yaml
  text: And sow good things in your souls, and you will find them in your life. But if you sow evil things, you will reap every turmoil and affliction.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:02Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y siembran cosas buenas en sus almas, y las encontrarán en su vida. Pero si siembran cosas malas, segarán toda turbación y aflicción.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σπείρατε / σπείρητε
  english_pob_choice: sow
  chosen_spanish: siembran / siembran
  alternatives_spanish:
  - siembren
  - siembren cosas
  lexicon: σπείρω
  rationale: El griego usa el verbo de sembrar en forma imperativa/condicional; en español, el presente generaliza bien la exhortación y mantiene el paralelismo con la consecuencia futura. 'Siembren' también sería posible, pero 'siembran' conserva un tono proverbial y fluido en esta sentencia.
- source_word: ἀγαθὰ
  english_pob_choice: good things
  chosen_spanish: cosas buenas
  alternatives_spanish:
  - bienes
  - lo bueno
  lexicon: ἀγαθός
  rationale: '''Cosas buenas'' reproduce el sustantivo neutro plural con naturalidad en español y evita estrechar el sentido a bienes materiales o a una abstracción moral demasiado vaga.'
- source_word: ἐν ταῖς ψυχαῖς ὑμῶν
  english_pob_choice: in your souls
  chosen_spanish: en sus almas
  alternatives_spanish:
  - en sus vidas interiores
  - en su interior
  lexicon: ψυχή
  rationale: Se mantiene 'almas' porque el texto griego nombra ψυχαί y el POB inglés conserva 'souls'. En español, 'almas' es claro y respeta la fuerza antropológica del término sin sustituirlo por una paráfrasis psicologizante.
- source_word: ἐν τῇ ζωῇ ὑμῶν
  english_pob_choice: in your life
  chosen_spanish: en su vida
  alternatives_spanish:
  - en su vida presente
  - a lo largo de su vida
  lexicon: ζωή
  rationale: '''En su vida'' sigue de cerca el griego y el inglés POB, manteniendo el contraste entre lo sembrado interiormente y su hallazgo/exhibición en la vida concreta.'
- source_word: πονηρά
  english_pob_choice: evil things
  chosen_spanish: cosas malas
  alternatives_spanish:
  - cosas perversas
  - maldades
  lexicon: πονηρός
  rationale: Aunque 'malas' es menos intenso que 'malvadas' o 'perversas', el contexto contrapone siembra y cosecha moral sin añadir un matiz más fuerte que el que el pasaje necesita. Se preserva así la simetría con 'cosas buenas'.
- source_word: πᾶσαν ταραχὴν
  english_pob_choice: every turmoil
  chosen_spanish: toda turbación
  alternatives_spanish:
  - toda perturbación
  - toda agitación
  lexicon: ταραχή
  rationale: '''Turbación'' captura el desorden interior o exterior de ταραχή y suena más natural que un calco demasiado técnico. Se conserva el sentido totalizador de πᾶσαν con ''toda''.'
- source_word: θλίψιν
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - tribulación
  - opresión
  lexicon: θλῖψις
  rationale: '''Aflicción'' corresponde bien al campo semántico de θλῖψις y mantiene el paralelismo con ''turbación'' sin cargar el texto con una terminología doctrinal posterior.'
theological_decisions:
- issue: Relación entre siembra moral y cosecha de consecuencias
  english_pob_reading: If you sow evil things, you will reap every turmoil and affliction.
  chosen_spanish_reading: Siembran cosas malas y segarán toda turbación y aflicción.
  alternative_spanish_readings:
  - siembran cosas malas y cosecharán toda turbación y aflicción
  - siembran maldad y segarán turbación y aflicción
  rationale: El texto presenta una correspondencia moral directa entre acciones y consecuencias. 'Segarán' conserva la metáfora agrícola de la cosecha y permite mantener el lenguaje proverbial sin suavizar la advertencia.
  doctrine_reference: Principio de retribución moral / siembra y cosecha (cf. Gál 6:7-8 como paralelo conceptual)
- issue: Alcance antropológico de 'almas'
  english_pob_reading: in your souls
  chosen_spanish_reading: en sus almas
  alternative_spanish_readings:
  - en su interior
  - en sus vidas
  rationale: Se conserva 'almas' para no diluir la distinción que el texto hace entre el ámbito interior de la siembra y el ámbito visible de la vida. No se convierte en mera psicología moderna.
  doctrine_reference: Antropología bíblica del alma/vida interior
translation_notes:
  revision_awareness: El pasaje no muestra cambios respecto del último pase de revisión; la versión inglesa POB también quedó sin modificaciones. La redacción española se construye directamente desde el griego con apoyo del acuerdo auditado en inglés, sin añadir variantes textuales ni notas editoriales adicionales.
  spanish_consistency_notes:
  - Se usa 'almas' para ψυχαῖς y 'vida' para ζωή, manteniendo la distinción semántica.
  - Se usa 'cosas buenas / cosas malas' para conservar el paralelismo del griego y del POB inglés.
  - Se evita 'SEÑOR' o terminología cristiana posterior porque no aparece en este versículo.
  - La cadencia proverbial se conserva con dos cláusulas principales y una oposición condicional clara.
