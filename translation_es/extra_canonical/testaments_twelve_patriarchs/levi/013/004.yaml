base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/013/004.yaml
  text: Indeed, he will gain many friends beyond his parents, and many among men will desire to serve him and to hear the law from his mouth.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:01Z'
    unchanged: false
    changes_summary: Revised 'more than parents' to 'beyond his parents' for more natural English while preserving the comparison with parents; added 'his' for clarity with γονεῖς; changed 'hear law' to 'hear the law' for idiomatic and formal English.
translation:
  language: es
  text: De hecho, adquirirá muchos amigos más allá de sus padres, y muchos entre los hombres desearán servirle y oír la ley de su boca.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καίγε πολλοὺς φίλους ὑπὲρ γονεῖς κτήσεται
  english_pob_choice: Indeed, he will gain many friends beyond his parents
  chosen_spanish: De hecho, adquirirá muchos amigos más allá de sus padres
  alternatives_spanish:
  - Ciertamente, ganará muchos amigos más que sus padres
  - Incluso, tendrá muchos amigos por encima de sus padres
  lexicon: κτάομαι / κτήσεται; φίλοι; ὑπέρ + acusativo
  rationale: κτήσεται expresa adquirir/obtener, por eso 'adquirirá' conserva mejor el matiz que un simple 'tendrá'. ὑπὲρ + genitivo/accusative here marks comparison/exceeding; 'más allá de' sigue el sentido comparativo sin convertirlo en una comparación afectiva extraña en español. φίλους se rinde como 'amigos' de forma directa, como en el inglés audit trail.
- source_word: ἐπιθυμήσουσι πολλοὶ τῶν ἀνθρώπων δουλεῦσαι αὐτῷ
  english_pob_choice: many among men will desire to serve him
  chosen_spanish: muchos entre los hombres desearán servirle
  alternatives_spanish:
  - muchos de los hombres querrán esclavizarse a él
  - muchos humanos desearán servirlo
  lexicon: ἐπιθυμέω; πολλοὶ τῶν ἀνθρώπων; δουλεύω
  rationale: El griego usa δουλεῦσαι, pero el contexto aquí es el deseo de someterse a su servicio; la tradición auditada en inglés optó por 'serve him'. En español, 'servirle' comunica esa relación sin forzar 'esclavos' donde el POB inglés no lo hizo en este versículo. 'Entre los hombres' mantiene τῶν ἀνθρώπων de manera idiomática.
- source_word: ἀκοῦσαι νόμου ἐκ τοῦ στόματος αὐτοῦ
  english_pob_choice: and to hear the law from his mouth
  chosen_spanish: y oír la ley de su boca
  alternatives_spanish:
  - y escuchar la ley de su boca
  - y oír la ley que sale de su boca
  lexicon: ἀκούω; νόμος; ἐκ τοῦ στόματος
  rationale: '''Oír'' conserva el paralelo simple del griego mejor que ''escuchar'', y ''ley'' mantiene νόμος. La preposición ἐκ con στόματος se vierte naturalmente como ''de su boca''; esta fórmula reproduce el auditable sentido de origen/oralidad sin añadir interpretación.'
theological_decisions:
- issue: Relación de servicio expresada por δουλεῦσαι αὐτῷ
  english_pob_reading: serve him
  chosen_spanish_reading: servirle
  alternative_spanish_readings:
  - esclavizarse a él
  - ser sus siervos
  rationale: Aunque δουλεῦσαι puede sugerir esclavitud, el POB inglés decidió no cargar el versículo con 'slave' aquí. En español, 'servirle' preserva la subordinación voluntaria/funcional que el contexto immediate sugiere y evita una intensificación no reflejada en el texto auditado.
  doctrine_reference: Interpretación lexical-contextual del verbo δουλεύω en literatura parabíblica; cf. uso semántico según contexto.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, especialmente 'beyond his parents' y 'hear the law from his mouth', procurando una equivalencia española natural sin perder la comparación explícita ni la referencia oral a la ley.
  spanish_consistency_notes:
  - Se mantiene 'ley' para νόμος de forma consistente con el audit trail inglés.
  - No se introduce 'Señor' ni 'Cristo' porque este versículo no contiene ni implica esos términos.
  - '''De hecho'' refleja la partícula inicial enfática sin sobrerrepresentar causalidad.'
