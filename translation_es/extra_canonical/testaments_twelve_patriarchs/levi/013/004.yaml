  text: Καίγε πολλοὺς φίλους ὑπὲρ γονεῖς κτήσεται¹⁹ καὶ ἐπιθυμήσουσι πολλοὶ τῶν ἀνθρώπων δουλεῦσαι αὐτῷ²⁰ καὶ ἀκοῦσαι νόμου²¹ ἐκ τοῦ²² στόματος αὐτοῦ²³.
