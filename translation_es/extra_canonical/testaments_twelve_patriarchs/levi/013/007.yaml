source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Σοφίαν κτήσασθε³⁵ *ἐν φόβῳ³⁶ Θεοῦ³⁷, ὅτι³⁸ ἐὰν *γένηται αἰχμαλωσία, καὶ ὀλοθρευθῶσι πόλεις καὶ χῶραι³⁹ *καὶ χρυσὸς καὶ ἄργυρος καὶ πᾶσα⁴⁰ κτῆσις⁴¹ ἀπολεῖται⁴², *τοῦ σοφοῦ τὴν σοφίαν⁴³ †οὐδεὶς⁴⁴ δύναται⁴⁵ ἀφελέσθαι⁴⁶ εἰ μὴ τύφλωσις⁴⁷ ἀσεβείας⁴⁸ καὶ πώρωσις⁴⁹ ἁμαρτίας⁵⁰.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/013/007.yaml
  text: Acquire wisdom in the fear of God, because if captivity comes, and cities and lands are destroyed, and gold and silver and every possession perish, no one can take away the wise man's wisdom, except the blindness of ungodliness and the hardening of sin.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:04Z'
    unchanged: false
    changes_summary: Adjusted 'perishes' to 'perish' for grammatical agreement with the compound subject 'gold and silver and every possession.'
translation:
  language: es
  text: Adquieran sabiduría en el temor de Dios, porque si llega el cautiverio, y son destruidas las ciudades y las tierras, y el oro y la plata y toda posesión perecen, a la sabiduría del sabio nadie puede arrebatársela, salvo la ceguera de la impiedad y el endurecimiento del pecado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Σοφίαν κτήσασθε
  english_pob_choice: Acquire wisdom
  chosen_spanish: Adquieran sabiduría
  alternatives_spanish:
  - Obtengan sabiduría
  - Adquieran la sabiduría
  lexicon: σοφία / κτάομαι
  rationale: «Adquieran» expresa la idea de procurarse o obtener sabiduría con un matiz de búsqueda activa, acorde con κτήσασθε. «Sabiduría» es la equivalencia directa de σοφία y conserva el énfasis sapiencial del pasaje.
- source_word: ἐν φόβῳ Θεοῦ
  english_pob_choice: in the fear of God
  chosen_spanish: en el temor de Dios
  alternatives_spanish:
  - en reverencia a Dios
  - con temor de Dios
  lexicon: φόβος + Θεός
  rationale: «Temor de Dios» mantiene la formulación bíblica y la carga de reverencia y obediencia que el contexto pide. «Reverencia» suavizaría demasiado la expresión.
- source_word: αἰχμαλωσία
  english_pob_choice: captivity
  chosen_spanish: cautiverio
  alternatives_spanish:
  - captividad
  - esclavitud
  lexicon: αἰχμαλωσία
  rationale: «Cautiverio» comunica mejor la condición de ser llevado o retenido en exilio/guerra sin introducir una imagen más técnica que el griego aquí no exige. «Captividad» también sería posible, pero «cautiverio» suena más natural en español bíblico.
- source_word: ὀλοθρευθῶσι πόλεις καὶ χῶραι
  english_pob_choice: cities and lands are destroyed
  chosen_spanish: son destruidas las ciudades y las tierras
  alternatives_spanish:
  - se destruyen ciudades y tierras
  - quedan arrasadas ciudades y tierras
  lexicon: ὀλοθρεύω + πόλις + χώρα
  rationale: Se conserva la estructura pasiva y la amplitud de χῶραι como «tierras», no restringiéndolo a «campos» o «regiones». «Son destruidas» sigue de cerca el verbo sin forzar un giro demasiado literario.
- source_word: πᾶσα κτῆσις
  english_pob_choice: every possession
  chosen_spanish: toda posesión
  alternatives_spanish:
  - toda propiedad
  - todo bien
  lexicon: πᾶς + κτῆσις
  rationale: «Posesión» corresponde a κτῆσις y mantiene el sentido de bienes poseídos. El singular colectivo «toda posesión» refleja bien el griego con naturalidad en español.
- source_word: ἀπολεῖται
  english_pob_choice: perish
  chosen_spanish: perecen
  alternatives_spanish:
  - perece
  - se pierde
  lexicon: ἀπόλλυμι
  rationale: Se ajusta al sujeto compuesto «el oro y la plata y toda posesión» en plural, siguiendo la revisión auditada del inglés. «Perecen» comunica pérdida total, no mera desaparición.
- source_word: τοῦ σοφοῦ τὴν σοφίαν
  english_pob_choice: the wise man's wisdom
  chosen_spanish: la sabiduría del sabio
  alternatives_spanish:
  - la sabiduría del hombre sabio
  - la sabiduría del que es sabio
  lexicon: σοφός + σοφία
  rationale: La construcción posesiva española «la sabiduría del sabio» reproduce de forma clara el contraste entre la persona sabia y su sabiduría, sin añadir contenido interpretativo.
- source_word: ἀφελέσθαι
  english_pob_choice: take away
  chosen_spanish: arrebatársela
  alternatives_spanish:
  - quitársela
  - tomársela
  lexicon: ἀφαιρέω
  rationale: «Arrebatar» refleja mejor la fuerza de quitar por la fuerza o privar de algo, y el pronombre la retoma con naturalidad en español.
- source_word: τύφλωσις ἀσεβείας
  english_pob_choice: the blindness of ungodliness
  chosen_spanish: la ceguera de la impiedad
  alternatives_spanish:
  - la ceguera de la irreligión
  - la ceguera de la maldad
  lexicon: τύφλωσις + ἀσέβεια
  rationale: «Impiedad» es la equivalente bíblica más precisa de ἀσέβεια y conserva el tono teológico del original. «Ceguera» traduce el sustantivo con claridad metafórica.
- source_word: πώρωσις ἁμαρτίας
  english_pob_choice: the hardening of sin
  chosen_spanish: el endurecimiento del pecado
  alternatives_spanish:
  - la dureza del pecado
  - el endurecimiento por el pecado
  lexicon: πώρωσις + ἁμαρτία
  rationale: «Endurecimiento del pecado» sigue de cerca el genitivo griego y mantiene la tensión textual de un estado endurecido ligado al pecado. No se suaviza a una frase explicativa más libre.
theological_decisions:
- issue: Relación entre sabiduría y temor de Dios
  english_pob_reading: Acquire wisdom in the fear of God
  chosen_spanish_reading: Adquieran sabiduría en el temor de Dios
  alternative_spanish_readings:
  - Obtengan sabiduría por medio del temor de Dios
  - Adquieran sabiduría con temor de Dios
  rationale: 'Se mantiene el nexo sapiencial: la sabiduría no es autónoma, sino buscada y situada dentro del temor reverente de Dios. No se convierte en una fórmula causal demasiado interpretativa.'
  doctrine_reference: Proverbios 1:7; 9:10
- issue: Inevitabilidad de la pérdida material frente a la permanencia de la sabiduría
  english_pob_reading: if captivity comes, and cities and lands are destroyed, and gold and silver and every possession perish, no one can take away the wise man's wisdom
  chosen_spanish_reading: si llega el cautiverio, y son destruidas las ciudades y las tierras, y el oro y la plata y toda posesión perecen, a la sabiduría del sabio nadie puede arrebatársela
  alternative_spanish_readings:
  - si viene el cautiverio... nadie puede quitar la sabiduría del sabio
  - aunque llegue el cautiverio...
  rationale: Se conserva la estructura condicional del texto y el contraste entre bienes materiales destruibles y la sabiduría no arrebatable. No se reinterpreta como concesiva, porque el griego presenta una condición real y una consecuencia comparativa.
  doctrine_reference: Mateo 6:19-21; Proverbios 3:13-18
- issue: 'Excepciones que amenazan la sabiduría: ceguera e endurecimiento'
  english_pob_reading: except the blindness of ungodliness and the hardening of sin
  chosen_spanish_reading: salvo la ceguera de la impiedad y el endurecimiento del pecado
  alternative_spanish_readings:
  - excepto la ceguera de la impiedad y la dureza del pecado
  - salvo que la impiedad ciegue y el pecado endurezca
  rationale: 'Se mantiene el carácter nominal y proverbial de la advertencia final: la sabiduría puede perderse no por fuerza externa, sino por deformación moral y espiritual. No se convierte en una paráfrasis causal para conservar la tensión del original.'
  doctrine_reference: Romanos 1:21-22; Efesios 4:17-19
translation_notes:
  revision_awareness: The English audit trail records a final revision from 'perishes' to 'perish' to match the compound subject 'gold and silver and every possession.' The Spanish draft follows that grammatical agreement by using the plural 'perecen' with 'el oro y la plata y toda posesión.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el nombre divino explícito; aquí el texto dice 'Dios', por lo que se traduce así.
  - Se preserva 'sabiduría' para σοφία y 'impiedad' para ἀσέβεια como términos técnicos coherentes con el estilo bíblico del proyecto.
  - El verbo final 'arrebatar' conserva la fuerza de ἀφελέσθαι mejor que un simple 'quitar'.
  - No se añadió puntuación interpretativa que altere la relación condicional del original; la coma tras 'Dios' y la secuencia del período siguen la lógica del griego y del inglés auditado.
