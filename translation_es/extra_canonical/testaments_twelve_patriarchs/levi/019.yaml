base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/019.yaml
  text: '1[a]. And now, my children, you have heard everything. Choose for yourselves either the light or the darkness, either the law of the Lord or the works of Beliar[b].

    2. And his sons answered him, saying, “Before the Lord we will walk, and according to his law.”

    3. And their father said to them, “The Lord is witness, and his angels are witnesses, and you are witnesses, and I am a witness concerning the word of your mouth.” And his sons said to him[c], “Witnesses.”'
  footnotes:
  - marker: a
    text: Or, 'the deeds of Beliar.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'walk before the Lord' is a biblical idiom for living one's life in accountable obedience before God.
    reason: cultural_note
  - marker: c
    text: The Greek names 'Beliar,' a form also known elsewhere as 'Belial.'
    reason: alternative_reading
