translation:
  language: es
  text: '1[a]. Y ahora, hijos míos, lo habéis oído todo. Elegid para vosotros mismos o la luz o las tinieblas, o la ley de Yahvé o las obras de Beliar[b].


    2. Y sus hijos le respondieron, diciendo: «Delante de Yahvé caminaremos, y conforme a su ley».


    3. Y su padre les dijo: «Yahvé es testigo, y sus ángeles son testigos, y vosotros sois testigos, y yo soy testigo[c] respecto de la palabra de vuestra boca». Y sus hijos le dijeron: «Testigos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Habéis oído todo».'
    reason: alternative_reading
  - marker: b
    text: 'O: «las acciones de Beliar».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «El Señor»; el griego aquí dice κύριος, y en este contexto se entiende como referencia al nombre divino.'
    reason: theological_note
lexical_decisions:
- source_word: Ἐκλέξασθε
  english_pob_choice: Choose for yourselves
  chosen_spanish: Elegid para vosotros mismos
  alternatives_spanish:
  - Elegid
  - Tomad para vosotros mismos
  lexicon: BDAG
  rationale: El imperativo medio pide una decisión personal y reflexiva; 'para vosotros mismos' conserva esa fuerza sin perder naturalidad en español.
- source_word: φῶς
  english_pob_choice: light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  lexicon: BDAG
  rationale: Mantiene el contraste simbólico y moral con 'tinieblas' sin expansión interpretativa.
- source_word: σκότος
  english_pob_choice: darkness
  chosen_spanish: las tinieblas
  alternatives_spanish:
  - la oscuridad
  lexicon: BDAG
  rationale: '''Tinieblas'' preserva mejor el paralelo bíblico con ''luz'' y el tono dualista del texto.'
- source_word: νόμον κυρίου
  english_pob_choice: the law of the Lord
  chosen_spanish: la ley de Yahvé
  alternatives_spanish:
  - la ley del Señor
  - la ley de Yahvé nuestro Dios
  lexicon: BDAG
  rationale: Se usa 'Yahvé' conforme a la política del proyecto para κύριος cuando remite al nombre divino, y 'ley' como traducción directa de νόμος.
- source_word: ἔργα τοῦ Βελίαρ
  english_pob_choice: the works of Beliar
  chosen_spanish: las obras de Beliar
  alternatives_spanish:
  - las obras del Beliar
  - los hechos de Beliar
  lexicon: BDAG
  rationale: '''Obras'' refleja ἔργα en un contexto moral-religioso; se translitera el nombre propio ''Beliar'' como en el texto griego.'
- source_word: Ἐνώπιον κυρίου πορευσόμεθα
  english_pob_choice: Before the Lord we will walk
  chosen_spanish: Delante de Yahvé caminaremos
  alternatives_spanish:
  - Caminaremos delante de Yahvé
  - En la presencia de Yahvé caminaremos
  lexicon: BDAG
  rationale: '''Delante de'' conserva el modismo bíblico de vivir bajo la mirada y responsabilidad ante Dios; ''caminaremos'' mantiene el valor idiomático de πορεύομαι.'
- source_word: κατὰ τὸν νόμον αὐτοῦ
  english_pob_choice: according to his law
  chosen_spanish: conforme a su ley
  alternatives_spanish:
  - según su ley
  - de acuerdo con su ley
  lexicon: BDAG
  rationale: '''Conforme a'' expresa bien el ajuste normativo de κατὰ con acusativo y suena natural en español reverente.'
- source_word: Μάρτυς
  english_pob_choice: witness
  chosen_spanish: testigo
  alternatives_spanish:
  - testigo ocular
  - atestiguador
  lexicon: BDAG
  rationale: '''Testigo'' mantiene la terminología jurídica y pactal del juramento sin añadir matices no presentes.'
- source_word: περὶ τοῦ λόγου τοῦ στόματος ὑμῶν
  english_pob_choice: concerning the word of your mouth
  chosen_spanish: respecto de la palabra de vuestra boca
  alternatives_spanish:
  - acerca de la palabra de vuestra boca
  - sobre lo que ha salido de vuestra boca
  lexicon: BDAG
  rationale: Se conserva la formulación solemne y literal del griego, evitando una paráfrasis que diluya la precisión del enunciado.
theological_decisions:
- issue: Dualismo ético entre luz/tinieblas y ley de Yahvé/obras de Beliar
  english_pob_reading: Translate the paired alternatives directly without softening them into abstract moral language.
  chosen_spanish_reading: Traducir los pares de alternativas de manera directa, sin convertirlos en fórmulas abstractas como 'bien y mal'.
  alternative_spanish_readings:
  - bien y mal
  - justicia e impiedad
  rationale: El pasaje presenta una elección tajante y paralela; conservar la imaginería mantiene el tono testamentario y apocalíptico del texto.
  doctrine_reference: 'PHILOSOPHY.md: preserve the source text''s plain sense and rhetorical texture'
- issue: Tratamiento de κύριος en una fórmula que remite al nombre divino
  english_pob_reading: the law of the Lord
  chosen_spanish_reading: la ley de Yahvé
  alternative_spanish_readings:
  - la ley del Señor
  rationale: La política del proyecto favorece 'Yahvé' para el nombre divino; aquí la frase no funciona como mera cortesía religiosa sino como referencia al Dios del pacto.
  doctrine_reference: 'Project terminology default: יהוה / YHWH -> Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca anclado en el texto español. También se alineó el tratamiento de κύριος con la terminología del proyecto, usando 'Yahvé' en el cuerpo del texto y explicándolo en nota.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de la enumeración: luz/tinieblas, ley/obras, testigos/testigo.'
  - '''Beliar'' se conserva como transliteración del testimonio griego, sin normalizar a ''Belial''.'
  - '''Tinieblas'' se prefirió sobre ''oscuridad'' por su resonancia bíblica y su correspondencia con el contraste con ''luz''.'
  - Se mantuvo el tono solemne del juramento con 'delante de Yahvé caminaremos' y 'respecto de la palabra de vuestra boca'.
