translation:
  language: es
  text: 1 Y después de que venga sobre ellos la venganza de parte de Yahvé, fallará el sacerdocio. 2 Entonces Yahvé levantará un sacerdote nuevo, a quien se le revelarán todas las palabras de Yahvé; y ejecutará un juicio de verdad sobre la tierra por muchos días. 3 Y su estrella saldrá en el cielo como la de un rey, dando luz con la luz del conocimiento, como el sol en el día, y será engrandecido en el mundo habitado. 4 Resplandecerá como el sol sobre la tierra, y quitará toda oscuridad de debajo del cielo, y habrá paz en toda la tierra. 5 Los cielos se alegrarán en sus días, y la tierra se gozará, y las nubes se alegrarán; y los ángeles de la gloria de la presencia de Yahvé se gozarán en él.[a] 6 Los cielos se abrirán, y desde el templo de la gloria vendrá sobre él santificación con voz paternal, como de Abraham a Isaac. 7 Y la gloria del Altísimo será pronunciada sobre él, y un espíritu de entendimiento y de santificación reposará sobre él. 8 Porque él dará la majestad de Yahvé a sus hijos
    en verdad para siempre, y no habrá sucesor para él por generación y generación, para siempre. 9 Y durante su sacerdocio las naciones se multiplicarán en conocimiento sobre la tierra, y serán iluminadas por la gracia de Yahvé.[b] Durante su sacerdocio el pecado cesará, y los inicuos dejarán de hacer el mal.[c] 10 Y en verdad él abrirá las puertas del paraíso, y quitará la espada amenazante contra Adán.[d] 11 Y dará a los santos a comer del árbol de la vida, y el espíritu de santidad estará sobre ellos.[e] 12 Y Beliar será atado por él, y dará autoridad a sus hijos para pisotear a los espíritus malos. 13 Y Yahvé se gozará sobre sus hijos, y se complacirá en sus amados para siempre. 14 Entonces Abraham e Isaac y Jacob se regocijarán, y yo me alegraré, y todos los santos se vestirán de justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos testigos añaden: ''y los ángeles de la gloria de la presencia de Yahvé se gozarán en él''.'
    reason: textual_variant
  - marker: b
    text: 'Algunos testigos añaden: ''y el conocimiento de Yahvé será derramado sobre la tierra como el agua de los mares''.'
    reason: textual_variant
  - marker: c
    text: 'Algunos testigos añaden: ''y el Israel será disminuido en ignorancia y oscurecido en duelo; pero los justos descansarán en él''.'
    reason: textual_variant
  - marker: d
    text: La espada amenazante alude a la espada puesta para guardar el camino al árbol de la vida después de la expulsión de Adán del Edén.
    reason: cross_reference
  - marker: e
    text: 'Algunos testigos añaden: ''en el agua''.'
    reason: textual_variant
lexical_decisions:
- source_word: ἱερωσύνη
  english_pob_choice: priesthood
  chosen_spanish: sacerdocio
  alternatives_spanish:
  - sacerdocio sacerdotal
  - oficio sacerdotal
  lexicon: BDAG
  rationale: En español, 'sacerdocio' es la equivalencia natural y estable para ἱερωσύνη, y conserva el peso institucional y teológico del pasaje.
- source_word: ἱερέα καινόν
  english_pob_choice: a new priest
  chosen_spanish: un sacerdote nuevo
  alternatives_spanish:
  - un nuevo sacerdote
  - un sacerdote renovado
  lexicon: BDAG
  rationale: '''Sacerdote nuevo'' suena más directo y mantiene la novedad de tipo o época sin añadir interpretación sobre identidad mesiánica.'
- source_word: κρίσιν ἀληθείας
  english_pob_choice: a judgment of truth
  chosen_spanish: un juicio de verdad
  alternatives_spanish:
  - un juicio verdadero
  - un juicio en verdad
  lexicon: BDAG
  rationale: La construcción española conserva la relación genitiva de manera sobria y respeta la fuerza profética de la expresión.
- source_word: οἰκουμένη
  english_pob_choice: inhabited world
  chosen_spanish: mundo habitado
  alternatives_spanish:
  - tierra habitada
  - mundo
  lexicon: BDAG
  rationale: '''Mundo habitado'' preserva la idea de la tierra poblada por seres humanos, no el cosmos abstracto.'
- source_word: ἀναλάμψει
  english_pob_choice: will shine forth
  chosen_spanish: resplandecerá
  alternatives_spanish:
  - brillará
  - irradiará
  lexicon: BDAG
  rationale: '''Resplandecerá'' comunica bien la imagen luminosa y el tono elevado del verbo griego.'
- source_word: ἁγίασμα
  english_pob_choice: sanctification
  chosen_spanish: santificación
  alternatives_spanish:
  - consagración
  - santidad
  lexicon: BDAG
  rationale: '''Santificación'' mantiene el sentido de endowment o acción santa sin forzar un objeto que el griego no explicita.'
- source_word: φωτίζων φῶς γνώσεως
  english_pob_choice: giving light with the light of knowledge
  chosen_spanish: dando luz con la luz del conocimiento
  alternatives_spanish:
  - irradiando la luz del conocimiento
  - dando luz con conocimiento
  lexicon: BDAG
  rationale: La duplicación de 'luz' conserva la intensificación imagética del griego y el vínculo entre iluminación y conocimiento.
- source_word: φωτίζων ... ἐν ἡλίῳ ἡμέρα
  english_pob_choice: like the sun by day
  chosen_spanish: como el sol en el día
  alternatives_spanish:
  - como el sol de día
  - como el sol durante el día
  lexicon: BDAG
  rationale: '''En el día'' resulta una correspondencia natural y sobria al valor comparativo del griego, manteniendo el paralelismo solar.'
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - por toda la tierra
  lexicon: BDAG
  rationale: '''Sobre la tierra'' refleja bien la extensión espacial del texto y su registro solemne.'
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: BDAG
  rationale: '''Las naciones'' evita un sesgo confesional posterior y corresponde al uso judío amplio del término.'
- source_word: φωτισθήσονται
  english_pob_choice: will be enlightened
  chosen_spanish: serán iluminadas
  alternatives_spanish:
  - serán alumbradas
  - serán esclarecidas
  lexicon: BDAG
  rationale: '''Serán iluminadas'' conserva el campo semántico de luz/conocimiento y funciona bien con el sujeto plural femenino ''naciones''.'
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - benevolencia
  lexicon: BDAG
  rationale: '''Gracia'' es el equivalente teológico más natural en español y reproduce la amplitud del término griego.'
- source_word: παράδεισος
  english_pob_choice: paradise
  chosen_spanish: paraíso
  alternatives_spanish:
  - jardín
  - edén
  lexicon: BDAG
  rationale: '''Paraíso'' conserva el valor escatológico del término ya desarrollado en la tradición textual griega.'
- source_word: ἀπειλοῦσαν ῥομφαίαν
  english_pob_choice: the threatening sword
  chosen_spanish: la espada amenazante
  alternatives_spanish:
  - la espada que amenaza
  - la espada terrible
  lexicon: BDAG
  rationale: '''Amenazante'' mantiene el carácter activo de la espada y es una buena solución en español para el participio adjetival.'
- source_word: πνεῦμα ἁγιωσύνης
  english_pob_choice: the spirit of holiness
  chosen_spanish: el espíritu de santidad
  alternatives_spanish:
  - espíritu de santidad
  - Espíritu de santidad
  lexicon: BDAG
  rationale: La frase queda sin capitalización doctrinal para no resolver prematuramente si se trata de una designación técnica posterior o de una cualidad espiritual.
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: BDAG
  rationale: Se conserva la forma griega atestiguada, en coherencia con el audit trail inglés.
- source_word: πατεῖν ἐπὶ τὰ πονηρὰ πνεύματα
  english_pob_choice: to trample on evil spirits
  chosen_spanish: pisotear a los espíritus malos
  alternatives_spanish:
  - pisotear espíritus malos
  - hollar a los espíritus malignos
  lexicon: BDAG
  rationale: '''Pisotear'' expresa la imagen de dominación victoriosa y ''espíritus malos'' es una formulación clara y bíblica en español.'
- source_word: ἐνδύσονται δικαιοσύνην
  english_pob_choice: will put on righteousness
  chosen_spanish: se vestirán de justicia
  alternatives_spanish:
  - se revestirán de justicia
  - pondrán justicia
  lexicon: BDAG
  rationale: La metáfora del vestido se conserva de manera natural y solemne en español.
theological_decisions:
- issue: Identidad del 'sacerdote nuevo'
  english_pob_reading: Translate generically as 'a new priest' without specifying Messiah, Christ, or a historical high priest in the main text.
  chosen_spanish_reading: Traducir de manera genérica como 'un sacerdote nuevo' sin identificarlo explícitamente en el texto principal.
  alternative_spanish_readings:
  - un sacerdote mesiánico
  - Cristo sacerdote
  - un sumo sacerdote renovado
  rationale: El texto griego presenta una figura singular y exaltada, pero la tradición textual y la identificación histórica siguen siendo debatidas. La traducción debe preservar esa tensión.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Material entre corchetes omitido del texto principal
  english_pob_reading: Omit bracketed material from the main text and preserve it in footnotes as textual variants.
  chosen_spanish_reading: Omitir los añadidos marcados como variantes textuales y anotarlos en notas.
  alternative_spanish_readings:
  - Incorporarlos en el cuerpo principal
  - Imprimirlos sin distinción
  rationale: La presentación crítica del material exige transparencia textual; las variantes no deben integrarse como si fueran seguras.
  doctrine_reference: Textual criticism / transmission transparency.
- issue: '''Spirit of holiness'''
  english_pob_reading: Retain the phrase as 'the spirit of holiness' rather than capitalizing it as a fixed Trinitarian title.
  chosen_spanish_reading: Mantener 'el espíritu de santidad' sin convertirlo en un título técnico fijo.
  alternative_spanish_readings:
  - el Espíritu Santo
  - el Espíritu de santidad
  rationale: El griego permite una lectura de cualidad espiritual sin exigir la terminología dogmática posterior.
  doctrine_reference: Original-language primacy over translation tradition; preserve theological tension.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, especialmente el ajuste de 'like the sun by day' para reflejar con mayor claridad ἐν ἡλίῳ ἡμέρα y la preferencia por 'cease from evil'. En español se mantuvo una equivalencia natural ('como el sol en el día'; 'dejarán de hacer el mal') sin perder el paralelismo ni la tensión textual.
  spanish_consistency_notes:
  - Se usó 'Yahvé' en todo el pasaje para el nombre divino, conforme al estándar del proyecto.
  - Se mantuvo 'Beliar' en vez de normalizar a 'Belial', siguiendo el testimonio griego del expediente.
  - Se preservó el lenguaje de luz/conocimiento con repeticiones intencionales para reflejar la retórica del original.
  - Las variantes textuales se colocaron en notas con marcadores únicos y no se incorporaron al cuerpo principal.
  - '''Espíritu de santidad'' se dejó en minúscula para no imponer una lectura trinitaria no resuelta por el texto.'
