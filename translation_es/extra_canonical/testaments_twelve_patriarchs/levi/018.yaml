  text: XVIII. Καὶ¹ μετὰ τὸ γενέσθαι τὴν ἐκδίκησιν αὐτῶν παρὰ κυρίου, *ἐκλείψει ἡ ἱερωσύνη². 2. Καὶ³ τότε ἐγερεῖ⁴ κύριος ἱερέα καινόν⁵, ᾧ⁶ πάντες οἱ λόγοι κυρίου⁷ ἀποκαλυφθήσονται⁸, καὶ αὐτὸς ποιήσει κρίσιν⁹ ἀληθείας¹⁰ ἐπὶ τῆς γῆς¹¹ *ἐν πλήθει¹² ἡμερῶν. 3. Καὶ ἀνατελεῖ¹³ ἄστρον αὐτοῦ¹⁴ ἐν οὐρανῷ ὡς βασιλέως¹⁵ φωτίζων¹⁶ φῶς γνώσεως †ἐν ἡλίῳ ἡμέρα†¹⁷, καὶ μεγαλυνθήσεται ἐν τῇ οἰκουμένῃ¹⁸. 4. Οὗτος¹⁹ ἀναλάμψει²⁰ *ὡς ὁ²¹ ἥλιος ἐν τῇ γῇ²², καὶ ἐξαρεῖ πᾶν σκότος *ἐκ τῆς ὑπ᾽ οὐρανὸν²³ καὶ ἔσται εἰρήνη ἐν πάσῃ τῇ γῇ. 5. Οἱ οὐρανοὶ ἀγαλλιάσονται²⁴ ἐν ταῖς ἡμέραις αὐτοῦ²⁵, καὶ ἡ γῆ χαρήσεται²⁶, καὶ αἱ²⁷ †νεφέλαι²⁸ εὐφρανθήσονται²⁹. [καὶ ἡ γνῶσις κυρίου³⁰ ἐκχυθήσεται³¹ ἐπὶ τῆς γῆς ὡς³² ὕδωρ θαλασσῶν³³] *καὶ οἱ ἄγγελοι τῆς δόξης τοῦ προσώπου κυρίου εὐφρανθήσονται ἐν αὐτῷ³⁴. 6. Οἱ οὐρανοὶ³⁵ ἀνοιγήσονται³⁶, καὶ³⁷ ἐκ τοῦ ναοῦ τῆς δόξης³⁸ ἥξει³⁹ ἐπ᾽⁴⁰ αὐτὸν ἁγίασμα μετὰ φωνῆς πατρικῆς ὡς ἀπὸ *Ἀβραὰμ πρὸς Ἰσαάκ⁴¹. 7. Καὶ *δόξα ὑψίστου ἐπ’ αὐτὸν ῥηθήσεται⁴², καὶ πνεῦμα συνέσεως καὶ ἁγιασμοῦ⁴³ καταπαύσει *ἐπ’
    αὐτόν⁴⁴ [ἐν τῷ ὕδατι]. 8. *Αὐτὸς γὰρ⁴⁵ δώσει τὴν μεγαλωσύνην⁴⁶ κυρίου⁴⁷ τοῖς υἱοῖς αὐτοῦ⁴⁸ ἐν ἀληθείᾳ εἰς τὸν αἰῶνα, καὶ οὐκ ἔσται διαδοχὴ⁴⁹ αὐτοῦ⁵⁰ εἰς γενεὰς *καὶ γενεὰς⁵¹ ἕως τοῦ αἰῶνος. 9. Καὶ ἐπὶ *τῆς ἱερωσύνης⁵² αὐτοῦ⁵³ *τὰ ἔθνη⁵⁴ πληθυνθήσονται⁵⁵ ἐν γνώσει ἐπὶ τῆς γῆς, καὶ φωτισθήσονται διὰ χάριτος κυρίου. [ὁ δὲ Ἰσραὴλ ἐλαττωθήσεται ἐν ἀγνωσίᾳ καὶ σκοτισθήσεται ἐν πένθει]⁵⁶. ἐπὶ τῆς ἱερωσύνης αὐτοῦ ἐκλείψει⁵⁷ ἡ⁵⁸ ἁμαρτία καὶ οἱ ἄνομοι *καταπαύσουσιν εἰς κακά⁵⁹, [οἱ δὲ δίκαιοι καταπαύσουσιν ἐν αὐτῷ]⁶⁰. 10. Καίγε⁶¹ αὐτὸς⁶² ἀνοίξει τὰς θύρας⁶³ τοῦ παραδείσου, *καὶ ἀποστήσει⁶⁴ τὴν ἀπειλοῦσαν ῥομφαίαν⁶⁵ κατὰ τοῦ⁶⁶ Ἀδάμ. 11. Καὶ δώσει τοῖς ἁγίοις φαγεῖν ἐκ τοῦ ξύλου τῆς ζωῆς, καὶ *πνεῦμα ἁγιωσύνης ἔσται⁶⁷ ἐπ᾿ αὐτοῖς⁶⁸. 12. Καὶ ὁ Βελίαρ δεθήσεται ὑπ᾿ αὐτοῦ, καὶ δώσει ἐξουσίαν τοῖς τέκνοις αὐτοῦ⁶⁹ πατεῖν ἐπὶ τὰ πονηρὰ πνεύματα. 13. Καὶ εὐφρανθήσεται κύριος ἐπὶ τοῖς τέκνοις αὐτοῦ⁷⁰, καὶ εὐδοκήσει⁷¹ ἐπὶ *τοῖς ἀγαπητοῖς⁷² αὐτοῦ *ἕως αἰῶνος⁷³. 14. Τοτὲ ἀγαλλιάσεται Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακώβ,
    κἀγὼ χαρήσομαι⁷⁴, καὶ πάντες οἱ ἅγιοι ἐνδύσονται⁷⁵ δικαιοσύνην⁷⁶.
