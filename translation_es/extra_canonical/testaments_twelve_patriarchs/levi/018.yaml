base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/018.yaml
  text: 1 And after their vengeance has come from the Lord[5], the priesthood will fail. 2 Then the Lord will raise up a new priest, to whom all the words of the Lord will be revealed; and he will execute a judgment of truth upon the earth for many days. 3 And his star will rise in heaven like a king, giving light with the light of knowledge like the sun by day, and he will be magnified in the inhabited world. 4 He will shine forth like the sun upon the earth, and he will remove all darkness from under heaven, and there will be peace in all the earth. 5 The heavens will rejoice in his days, and the earth will be glad, and the clouds will rejoice; and the angels of the glory of the Lord's presence will be glad in him. 6 The heavens will be opened, and from the temple of glory sanctification will come upon him with a fatherly voice, as from Abraham to Isaac. 7 And the glory of the Most High will be spoken over him, and a spirit of understanding and sanctification will rest upon him. 8 For
    he will give the majesty of the Lord to his sons in truth forever, and there will be no successor to him for generation upon generation, forever. 9 And during his priesthood the nations will be multiplied in knowledge upon the earth, and they will be enlightened by the grace of the Lord. During his priesthood sin will fail, and the lawless will cease from evil. 10 And indeed he will open the gates of paradise, and he will remove the threatening sword against Adam. 11 And he will give the holy ones to eat from the tree of life, and the spirit of holiness will be upon them. 12 And Beliar will be bound by him, and he will give authority to his children to trample on evil spirits. 13 And the Lord will rejoice over his children, and he will take pleasure in his beloved ones forever. 14 Then Abraham and Isaac and Jacob will exult, and I will be glad[10][9b][9a][7], and all the holy ones will put on righteousness.
  footnotes:
  - marker: '5'
    text: Some witnesses add, 'and the knowledge of the Lord will be poured out upon the earth like the water of the seas.'
    reason: textual_variant
  - marker: '7'
    text: Some witnesses add, 'in the water.'
    reason: textual_variant
  - marker: 9a
    text: Some witnesses add, 'but Israel will be diminished in ignorance and darkened in grief.'
    reason: textual_variant
  - marker: 9b
    text: Some witnesses add, 'but the righteous will rest in him.'
    reason: textual_variant
  - marker: '10'
    text: The threatening sword alludes to the sword set to guard the way to the tree of life after Adam's expulsion from Eden.
    reason: cross_reference
