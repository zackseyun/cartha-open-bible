source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ *τόπος ὑμῖν καθαρὸς οὐκ ἔσται³², ἀλλ᾽ ἔσεσθε³³ ἐν τοῖς ἔθνεσιν εἰς κατάραν καὶ *εἰς διασκορπισμόν³⁴, ἕως³⁵ *αὐτὸς πάλιν³⁶ ἐπισκέψηται³⁷ καὶ *οἰκτειρήσῃ καὶ³⁸ προσδέξηται³⁹.
