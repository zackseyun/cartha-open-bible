base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/016/005.yaml
  text: And no clean place will be for you, but you will be among the nations of the earth for a curse and for scattering, until he himself visits again and shows compassion and receives you.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: Adjusted the opening to match the source more closely (“will be for you” rather than “will remain for you”) and removed the bracketed verse notes from the running text.
translation:
  language: es
  text: Y no habrá para ustedes lugar limpio[a], sino que estarán entre las naciones de la tierra para maldición y para dispersión, hasta que él mismo vuelva a visitarlos, tenga compasión y los reciba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Limpio’ traduce el valor cultual de καθαρός; en español podría oírse también como ‘puro’. Se eligió ‘limpio’ para mantener la referencia concreta a un lugar apto/culto sin añadir una interpretación más técnica.
    reason: lexical_alternative
lexical_decisions:
- source_word: τόπος ... καθαρὸς
  english_pob_choice: no clean place
  chosen_spanish: lugar limpio
  alternatives_spanish:
  - lugar puro
  - espacio limpio
  lexicon: τόπος / καθαρός
  rationale: Conservo la combinación concreta de lugar + pureza/limpieza sin ampliar a una idea más interpretativa como ‘santuario’ o ‘tierra’. ‘Limpio’ mantiene la fuerza cultual del adjetivo en un español natural.
- source_word: ἔσται ὑμῖν
  english_pob_choice: will be for you
  chosen_spanish: habrá para ustedes
  alternatives_spanish:
  - será para ustedes
  - les יהיה
  lexicon: εἰμί + dativo
  rationale: La versión inglesa fue ajustada para reflejar que el texto dice ‘será para ustedes’. En español, ‘habrá para ustedes’ suena natural y conserva el valor prospectivo sin añadir permanencia.
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - en medio de las naciones
  - entre los pueblos
  lexicon: ἔθνη
  rationale: ‘Naciones’ sigue el sentido del griego y del POB inglés. ‘Entre’ conserva la idea locativa de estar dispersos en su medio.
- source_word: εἰς κατάραν
  english_pob_choice: for a curse
  chosen_spanish: para maldición
  alternatives_spanish:
  - como maldición
  - en maldición
  lexicon: κατάρα
  rationale: Mantengo la fuerza nominal y la relación de finalidad/resultado que expresa εἰς. ‘Maldición’ es la equivalencia más directa y bíblica.
- source_word: εἰς διασκορπισμόν
  english_pob_choice: for scattering
  chosen_spanish: para dispersión
  alternatives_spanish:
  - para esparcimiento
  - para ser dispersados
  lexicon: διασκορπισμός
  rationale: ‘Dispersión’ conserva el sustantivo abstracto y la conexión con el castigo comunitario. Evito convertirlo en una paráfrasis verbal que cambie el paralelismo.
- source_word: ἕως
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  lexicon: ἕως
  rationale: ‘Hasta que’ corresponde al valor temporal de la cláusula y prepara los verbos siguientes en subjuntivo, con buena fluidez en español.
- source_word: αὐτὸς πάλιν ἐπισκέψηται
  english_pob_choice: he himself visits again
  chosen_spanish: él mismo vuelva a visitarlos
  alternatives_spanish:
  - él mismo los visite de nuevo
  - él mismo vuelva nuevamente
  lexicon: αὐτός + πάλιν + ἐπισκέπτομαι
  rationale: Conservo el énfasis de αὐτός con ‘él mismo’ y la idea de retorno con ‘vuelva’. ‘Visitarlos’ mantiene el campo semántico de ἐπισκέπτομαι sin reducirlo a una visita casual.
- source_word: οἰκτειρήσῃ
  english_pob_choice: shows compassion
  chosen_spanish: tenga compasión
  alternatives_spanish:
  - muestre compasión
  - se compadezca
  lexicon: οἰκτείρω
  rationale: ‘Tenga compasión’ comunica la misericordia activa del verbo con un registro natural y sobrio. Evita tonalidades demasiado interpretativas.
- source_word: προσδέξηται
  english_pob_choice: receives you
  chosen_spanish: los reciba
  alternatives_spanish:
  - los acoja
  - los acepte
  lexicon: προσδέχομαι
  rationale: ‘Reciba’ preserva la apertura receptiva del verbo sin exagerar hacia una adopción teológica no explícita en la línea. El objeto plural ‘los’ corresponde al contexto colectivo.
theological_decisions:
- issue: 'Restitution after judgment: divine visitation, compassion, and reception'
  english_pob_reading: until he himself visits again and shows compassion and receives you
  chosen_spanish_reading: hasta que él mismo vuelva a visitarlos, tenga compasión y los reciba
  alternative_spanish_readings:
  - hasta que él mismo los visite de nuevo, se compadezca y los acoja
  - hasta que él mismo vuelva y tenga misericordia de ustedes
  rationale: Sigo la secuencia de acciones del texto sin suavizar el juicio previo ni la restauración final. ‘Reciba’ conserva la idea de aceptación/restauración sin imponer una formulación dogmática adicional.
  doctrine_reference: Restauración divina después del juicio; misericordia y retorno del favor divino
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, especialmente la apertura ‘And no clean place will be for you’ en lugar de una forma de permanencia (‘will remain’). También evita añadir notas o referencias ajenas al verso en el flujo principal.
  spanish_consistency_notes:
  - Se mantiene ‘naciones’ para ἔθνη, en coherencia con el POB inglés y con el registro bíblico del texto.
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera explícitamente; aquí no aparece el tetragrámaton, por lo que no se introduce.
  - ‘Maldición’ y ‘dispersión’ conservan el paralelismo sustantivo del griego.
  - El objeto plural ‘los’ refleja la pluralidad implícita del destinatario colectivo en el contexto de Levi.
