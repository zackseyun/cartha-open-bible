translation:
  language: es
  text: Y a un hombre que hace nueva la ley[a] en el poder del Altísimo lo llamarán engañador, y al fin se precipitarán para matarlo, sin conocer su altura[b], echándose encima sangre inocente con maldad sobre sus cabezas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hace nueva la ley» sigue de cerca el griego καινοποιοῦντα νόμον; el sentido es hacer nueva o renovar la ley, no simplemente promulgar otra distinta.
    reason: lexical_alternative
  - marker: b
    text: La palabra griega ἀνάστημα puede referirse a la altura o estatura; aquí se traduce «altura» para reflejar mejor el valor léxico señalado en la revisión inglesa («height») y sonar más natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: καινοποιοῦντα νόμον
  english_pob_choice: who renews the law
  chosen_spanish: que hace nueva la ley
  alternatives_spanish:
  - que renueva la ley
  - que restaura la ley
  - que introduce una nueva ley
  lexicon: καινοποιέω
  rationale: El griego expresa la acción de hacer algo nuevo; la revisión inglesa prefirió una formulación activa y directa. En español, «hace nueva la ley» conserva esa fuerza verbal sin convertirla en una simple paráfrasis interpretativa. «Renueva» es posible, pero puede suavizar el matiz de novedad explícita.
- source_word: πλάνου
  english_pob_choice: deceiver
  chosen_spanish: engañador
  alternatives_spanish:
  - seductor
  - impostor
  - engañoso
  lexicon: πλάνη / πλανάω
  rationale: La palabra apunta a quien extravía o engaña. «Engañador» reproduce bien la acusación personal del texto y mantiene el tono judicial del pasaje. «Seductor» podría sonar más moral o sexual en español, y «impostor» introduce una especificidad no requerida.
- source_word: ὑψίστου
  english_pob_choice: Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  - el Altísimo Dios
  lexicon: ὕψιστος
  rationale: «El Altísimo» es la forma natural y reverente en español para este título divino. Conserva el valor titular del griego sin añadir elementos que el texto no expresa.
- source_word: ἀποκτεῖναι
  english_pob_choice: to kill him
  chosen_spanish: matarlo
  alternatives_spanish:
  - darle muerte
  - asesinarlo
  - matarlo
  lexicon: ἀποκτείνω
  rationale: El verbo básico es matar. «Matarlo» es directo y fiel; «asesinarlo» añade una cualificación legal/moral más fuerte que el griego no obliga aquí.
- source_word: ἀνάστημα
  english_pob_choice: his rising / stature (revised to height)
  chosen_spanish: estatura
  alternatives_spanish:
  - altura
  - levantamiento
  - porte
  lexicon: ἀνάστημα
  rationale: La revisión inglesa fijó «height» para preservar el valor léxico de ἀνάστημα. En español, «estatura» comunica de forma natural la idea de altura corporal y evita una lectura interpretativa de «levantamiento» que sería demasiado libre en este contexto.
- source_word: ἀθῷον αἷμα
  english_pob_choice: innocent blood
  chosen_spanish: sangre inocente
  alternatives_spanish:
  - sangre sin culpa
  - sangre de inocente
  - sangre inocente derramada
  lexicon: ἀθῷος + αἷμα
  rationale: La combinación es una expresión bíblica estable. «Sangre inocente» conserva la solemnidad y la densidad forense del original, sin expandirla innecesariamente.
- source_word: ἐν κακίᾳ
  english_pob_choice: in wickedness
  chosen_spanish: con maldad
  alternatives_spanish:
  - en maldad
  - maliciosamente
  - en perversidad
  lexicon: κακία
  rationale: La frase adverbial pide una construcción natural en español. «Con maldad» expresa adecuadamente la manera culpable de la acción sin perder el tono moral del griego.
theological_decisions:
- issue: Cómo rendir la acusación contra quien reforma la ley en el poder del Altísimo
  english_pob_reading: And a man who renews the law in the power of the Most High you will call a deceiver
  chosen_spanish_reading: Y a un hombre que hace nueva la ley en el poder del Altísimo ustedes lo llamarán engañador
  alternative_spanish_readings:
  - y a un hombre que renueva la ley en el poder del Altísimo lo llamarán engañador
  - y a un hombre que hace nueva la ley, como ustedes piensan, lo llamarán engañador
  rationale: 'La revisión inglesa decidió mantener la secuencia verbal y la acusación, sin introducir una glosa que debilite el sentido. El español sigue esa línea y conserva la tensión: el hombre actúa en el poder del Altísimo, pero será mal llamado engañador. No se añadió «como ustedes piensan» porque no está explícito en esta forma del texto fuente proporcionado.'
  doctrine_reference: Tobit / apocalíptica del Testamento de Leví; acusación contra un reformador justo
- issue: Sentido de ἀνάστημα al final del verso
  english_pob_reading: not knowing his height
  chosen_spanish_reading: sin conocer su estatura
  alternative_spanish_readings:
  - sin conocer su altura
  - sin conocer su porte
  - sin conocer su levantamiento
  rationale: La revisión auditada corrigió el inglés hacia «height», indicando que el traductor debe preservar el dato físico/visible de ἀνάστημα. «Estatura» es la forma más clara en español, y mantiene el contraste entre la apariencia externa no conocida y la violencia injusta que sigue.
  doctrine_reference: Lexical note on ἀνάστημα in the revised POB audit trail
- issue: La imagen de la sangre inocente sobre las cabezas
  english_pob_reading: taking innocent blood in wickedness upon your heads
  chosen_spanish_reading: tomando sangre inocente con maldad sobre sus cabezas
  alternative_spanish_readings:
  - poniendo sangre inocente con maldad sobre sus cabezas
  - cargando sangre inocente sobre sus cabezas en maldad
  rationale: Se conserva la imagen de responsabilidad cargada sobre la cabeza, sin convertirla en una metáfora distinta. «Tomando... sobre sus cabezas» reproduce el movimiento del griego y el peso judicial/culpable de la expresión.
  doctrine_reference: Responsabilidad por sangre inocente en lenguaje bíblico
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente, que ajustó la primera mitad del verso para reflejar más directamente «makes the law new» y preservó el valor de ἀνάστημα como «height». La versión española sigue esa corrección, mantiene la acusación de «engañador» y conserva la clausula final sobre la sangre inocente sobre sus cabezas sin suavizarla.
  spanish_consistency_notes:
  - Se usó «Altísimo» para ὕψιστος conforme al estándar del proyecto.
  - Se mantuvo «engañador» para πλάνου por fuerza acusatoria, evitando sustituirlo por términos más interpretativos.
  - Se tradujo δοῦλος/siervo no aplica en este verso; no se introdujo terminología ajena.
  - El registro es reverente pero directo, apto para lectura pública.
  - Las notas distinguen entre la novedad legal y la posible idea de renovación, sin borrar la tensión textual.
