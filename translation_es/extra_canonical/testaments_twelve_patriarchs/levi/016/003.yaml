  glossary_alignment: No hay conflicto con la terminología del proyecto. «Altísimo» y «engañador» están bien. No aparecen términos con directrices especiales como Yahvé, Mesías, esclavo, etc. La nota sobre καινοποιοῦντα νόμον es adecuada. La nota sobre ἀνάστημα debe actualizarse a «altura» si se revisa el texto.
