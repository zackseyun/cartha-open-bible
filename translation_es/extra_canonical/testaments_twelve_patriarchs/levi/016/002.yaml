translation:
  language: es
  text: Y ustedes desecharán la ley y menospreciarán las palabras de los profetas en mala perversidad. Perseguirán a hombres justos, y odiarán a los piadosos; abominarán las palabras de los veraces.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸν νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la norma
  lexicon: νόμος
  rationale: El griego usa el término general para ley; «la ley» conserva el valor jurídico-covenantal del pasaje sin introducir explicaciones ajenas al texto.
- source_word: ἀθετήσετε
  english_pob_choice: set aside
  chosen_spanish: desecharán
  alternatives_spanish:
  - pondrán a un lado
  - anularán
  - rechazarán
  lexicon: ἀθετέω
  rationale: El verbo expresa invalidar, rechazar o tratar como sin valor. «Desecharán» comunica bien la fuerza de apartar o descartar la ley en español natural.
- source_word: λόγους προφητῶν
  english_pob_choice: the words of the prophets
  chosen_spanish: las palabras de los profetas
  alternatives_spanish:
  - los dichos de los profetas
  - los mensajes de los profetas
  lexicon: λόγος
  rationale: «Palabras» reproduce de forma directa el plural griego y mantiene la referencia a los mensajes proféticos, como en el inglés POB.
- source_word: ἐξουδενώσετε
  english_pob_choice: treat ... with contempt
  chosen_spanish: menospreciarán
  alternatives_spanish:
  - despreciarán
  - tratarán con desprecio
  lexicon: ἐξουδενόω
  rationale: El sentido es considerar como de ningún valor. «Menospreciarán» conserva el matiz de desprecio activo sin alargar la frase.
- source_word: ἐν διαστροφῇ κακῇ
  english_pob_choice: in evil perversity
  chosen_spanish: en mala perversidad
  alternatives_spanish:
  - en perversidad mala
  - en perversión maligna
  - con perversidad maligna
  lexicon: διαστροφή
  rationale: 'La frase griega es intensiva y redundante: perversidad/torcedura mala. «Mala perversidad» reproduce esa aspereza sin suavizarla, siguiendo de cerca la construcción del original.'
- source_word: διώξετε
  english_pob_choice: you will persecute
  chosen_spanish: Perseguirán
  alternatives_spanish:
  - Acosarán
  - Darían caza a
  lexicon: διώκω
  rationale: El verbo aquí es persecución hostil, no mera búsqueda. «Perseguirán» es la equivalencia normal y más transparente en español.
- source_word: ἄνδρας δικαίους
  english_pob_choice: righteous men
  chosen_spanish: a hombres justos
  alternatives_spanish:
  - a hombres rectos
  - a varones justos
  lexicon: δίκαιος
  rationale: «Justos» preserva el campo semántico de rectitud/justicia moral o covenantal. Mantengo «hombres» para reflejar ἄνδρας sin exagerar formalismo.
- source_word: εὐσεβεῖς
  english_pob_choice: the godly
  chosen_spanish: a los piadosos
  alternatives_spanish:
  - a los devotos
  - a los fieles
  lexicon: εὐσεβής
  rationale: «Piadosos» es el equivalente español establecido para personas reverentes o devotas de Dios, más cercano al registro bíblico que «devotos».
- source_word: ἀληθινῶν λόγους
  english_pob_choice: the words of the truthful
  chosen_spanish: las palabras de los veraces
  alternatives_spanish:
  - las palabras de los verdaderos
  - las palabras de los sinceros
  lexicon: ἀληθινός
  rationale: El genitivo plural puede referirse a personas verdaderas/veraces. «De los veraces» conserva la posible referencia personal sin convertirlo en una abstracción.
theological_decisions:
- issue: Cómo rendir la maldad acumulada de la expresión final inicial
  english_pob_reading: evil perversity
  chosen_spanish_reading: mala perversidad
  alternative_spanish_readings:
  - perversidad maligna
  - perversión maligna
  - con maldad perversa
  rationale: El texto griego intensifica la acusación mediante dos términos de desviación/maldad; la versión española debe sonar dura y redundante, no suavizada.
  doctrine_reference: Ética bíblica y juicio profético sobre la rebelión contra la ley y los profetas
- issue: Si traducir εὐσεβεῖς como una virtud general o como un grupo religioso
  english_pob_reading: the godly
  chosen_spanish_reading: los piadosos
  alternative_spanish_readings:
  - los devotos
  - los fieles
  rationale: En este contexto, el término designa a quienes viven en reverencia hacia Dios; «piadosos» permite mantener esa identidad sin imponer una denominación eclesial posterior.
  doctrine_reference: Piedad/reverencia a Dios en literatura sapiencial y profética
- issue: Interpretación de ἀληθινῶν λόγους
  english_pob_reading: the words of the truthful
  chosen_spanish_reading: las palabras de los veraces
  alternative_spanish_readings:
  - las palabras de los verdaderos
  - las palabras de los sinceros
  rationale: El griego puede leerse como palabras pertenecientes a personas veraces, no solo palabras objetivamente verdaderas. La solución española conserva la ambigüedad sin cerrarla.
  doctrine_reference: Testimonio veraz y rechazo del mensaje fiel
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador mantiene la estructura y el sentido del texto inglés POB mientras vuelve al griego para decisiones léxicas puntuales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se usa «la ley» en lugar de una paráfrasis más amplia para conservar la referencia jurídica del griego νόμον.
  - 'Se preserva el paralelismo verbal: desecharán / menospreciarán / perseguirán / odiarán / abominarán.'
  - No se introduce terminología eclesiástica posterior; el pasaje habla de profetas, justos, piadosos y veraces en un marco ético-profético.
