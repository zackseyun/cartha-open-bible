source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ τὸν νόμον ἀθετήσετε⁷ καὶ λόγους προφητῶν ἐξουδενώσετε⁸ *ἐν διαστροφῇ κακῇ⁹. *διώξετε δὲ¹⁰ ἄνδρας¹¹ δικαίους, καὶ εὐσεβεῖς μισήσετε¹², ἀληθινῶν¹³ λόγους βδελύξεσθε¹⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/016/002.yaml
  text: And you will set aside the law and treat the words of the prophets with contempt in evil perversity. You will persecute righteous men, and you will hate the godly; you will loathe the words of the truthful.
  revision_pass:
    model: gpt-5.4-mini
