source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ νῦν *ἐγὼ ἔγνωκα¹ ὅτι ἑβδομήκοντα ἑβδομάδας² πλανηθήσεσθε³, καὶ τὴν ἱερωσύνην βεβηλώσετε⁴ καὶ *τὰ θυσιαστήρια⁵ μιανεῖτε⁶.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/016/001.yaml
  text: And now I know that for seventy weeks you will go astray, and you will profane the priesthood and defile the altars.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y ahora sé que por setenta semanas ustedes se descarriarán, y profanarán el sacerdocio y contaminarán los altares.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔγνωκα
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - he llegado a saber
  - he conocido
  lexicon: γνωρίζω / γινώσκω
  rationale: El perfecto griego expresa un conocimiento adquirido con resultado presente. En español, «sé» comunica de modo natural ese estado de conocimiento sin añadir más contenido que el del texto.
- source_word: πλανηθήσεσθε
  english_pob_choice: you will go astray
  chosen_spanish: se descarriarán
  alternatives_spanish:
  - se extraviarán
  - serán desviados
  lexicon: πλανάω
  rationale: «Descarriarse» conserva la idea de desviación moral o religiosa y funciona bien en español bíblico actual, sin depender de un calco pesado.
- source_word: ἱερωσύνην
  english_pob_choice: the priesthood
  chosen_spanish: el sacerdocio
  alternatives_spanish:
  - la dignidad sacerdotal
  - el oficio sacerdotal
  lexicon: ἱερωσύνη
  rationale: «Sacerdocio» es la equivalencia directa y clara para el conjunto/condición sacerdotal, manteniendo el valor institucional del término.
- source_word: βεβηλώσετε
  english_pob_choice: you will profane
  chosen_spanish: profanarán
  alternatives_spanish:
  - desecrarán
  - mancharán
  lexicon: βεβηλόω
  rationale: «Profanar» reproduce con precisión la idea de tratar como común o impuro algo sagrado. Se mantiene el paralelo con el objeto sagrado ya nombrado.
- source_word: τὰ θυσιαστήρια
  english_pob_choice: the altars
  chosen_spanish: los altares
  alternatives_spanish:
  - los altares del sacrificio
  lexicon: θυσιαστήριον
  rationale: «Altares» es la traducción natural y fiel; el contexto sacrificial ya está implícito por el término griego y por la mención anterior del sacerdocio.
- source_word: μιανεῖτε
  english_pob_choice: defile
  chosen_spanish: contaminarán
  alternatives_spanish:
  - mancharán
  - profanarán
  lexicon: μιαίνω
  rationale: «Contaminar» conserva la fuerza de impurificación ritual/moral y evita repetir «profanar» dos veces. En español se distingue bien de βεβηλόω.
theological_decisions:
- issue: Tiempo profético de «setenta semanas»
  english_pob_reading: for seventy weeks
  chosen_spanish_reading: por setenta semanas
  alternative_spanish_readings:
  - durante setenta semanas
  - a lo largo de setenta semanas
  rationale: Se conserva la fórmula profética sin interpretar simbólicamente el período ni suavizar su carácter oracular.
  doctrine_reference: lectura profética literal del pasaje
- issue: Impureza cultual y profanación sacerdotal
  english_pob_reading: you will profane the priesthood and defile the altars
  chosen_spanish_reading: profanarán el sacerdocio y contaminarán los altares
  alternative_spanish_readings:
  - deshonrarán el sacerdocio y profanarán los altares
  - profanarán el sacerdocio y mancharán los altares
  rationale: La distinción entre «profanar» y «contaminar» preserva dos verbos griegos distintos y mantiene la tensión entre sacrilegio e impureza ritual.
  doctrine_reference: santidad del culto y del sacerdocio
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; por eso esta versión sigue de cerca el sentido del texto griego y coincide sustancialmente con el juicio auditado en inglés, sin introducir notas adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca; en este versículo no hay una mención explícita.
  - Se distingue «profanar» de «contaminar» para reflejar dos verbos griegos diferentes.
  - Se usa «sacerdocio» como término institucional estable y «altares» en plural, conforme al griego.
