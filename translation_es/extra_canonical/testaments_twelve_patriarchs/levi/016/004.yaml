translation:
  language: es
  text: Pero yo les digo que, por causa de él, sus lugares santos quedarán desolados hasta el suelo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Λέγω δὲ ὑμῖν ὅτι
  english_pob_choice: But I tell you that
  chosen_spanish: Pero yo les digo que
  alternatives_spanish:
  - Y les digo que
  - Pero les digo que
  lexicon: λέγω; ὑμῖν
  rationale: La forma idiomática española más natural para una declaración solemne directa es «Pero yo les digo que». Mantiene el contraste inicial de δέ y el pronombre explícito de énfasis de «yo».
- source_word: δι᾽ αὐτὸν
  english_pob_choice: because of him
  chosen_spanish: por causa de él
  alternatives_spanish:
  - a causa de él
  - por él
  lexicon: διά + acusativo
  rationale: La preposición con acusativo expresa causalidad; «por causa de él» conserva mejor la relación de causa que una lectura meramente instrumental o agentiva.
- source_word: τὰ ἅγια ὑμῶν
  english_pob_choice: your holy places
  chosen_spanish: sus lugares santos
  alternatives_spanish:
  - sus cosas santas
  - sus santuarios
  lexicon: τὰ ἅγια
  rationale: En este contexto, τὰ ἅγια puede referirse a los lugares sagrados más que a objetos santos en general. «Lugares santos» comunica el referente espacial sin imponer una especificación más estrecha que la del griego.
- source_word: ἔρημα
  english_pob_choice: laid waste
  chosen_spanish: desolados
  alternatives_spanish:
  - devastados
  - arruinados
  lexicon: ἔρημος
  rationale: «Desolados» reproduce bien el campo semántico de quedar en ruina, vacíos o abandonados, y suena natural en español bíblico contemporáneo.
- source_word: ἕως ἐδάφους
  english_pob_choice: to the ground
  chosen_spanish: hasta el suelo
  alternatives_spanish:
  - hasta el piso
  - a ras del suelo
  lexicon: ἕως + ἐδάφους
  rationale: La expresión idiomática indica destrucción completa o reducción al nivel del suelo. «Hasta el suelo» es claro, natural y conserva la imagen concreta del griego.
theological_decisions:
- issue: Alcance de τὰ ἅγια ὑμῶν en un anuncio de juicio
  english_pob_reading: your holy places
  chosen_spanish_reading: sus lugares santos
  alternative_spanish_readings:
  - sus santuarios
  - sus cosas santas
  rationale: El texto apunta al colapso de los espacios sagrados de la audiencia en el marco de juicio. «Lugares santos» mantiene la referencia sin convertirla de antemano en un término técnico más estrecho.
  doctrine_reference: Juicio sobre los lugares sagrados; referencia histórica y cultual sin extrapolar más allá del texto.
translation_notes:
  revision_awareness: La revisión inglesa solo añadió una coma tras «him» por claridad y no alteró el contenido; la versión española refleja ese mismo sentido sin requerir una nota adicional.
  spanish_consistency_notes:
  - Se mantiene «Pero yo les digo que» para el tono oracular y el contraste discursivo.
  - Se usa «por causa de él» para conservar la causalidad de δι᾽ αὐτόν.
  - «Lugares santos» sigue la amplitud del griego τὰ ἅγια sin sobretraducir a un tecnicismo más estrecho.
