translation:
  language: es
  text: 1[v2]. Y ahora, hijos, guarden lo que yo les mando, pues les he declarado todo lo que oí de mis padres. 2[v2]. Y he aquí, soy inocente de su impiedad y transgresión, que ustedes cometerán en la consumación de los siglos[a] [contra el Salvador del mundo, el Mesías], extraviando a Israel y provocando grandes males del Señor contra él[b]. 3. Y obrarán con iniquidad en Israel, de modo que Jerusalén no podrá soportarlo[c] a causa de su maldad; pero el velo del templo será rasgado, para no cubrir ya su vergüenza. 4. Y serán dispersados como cautivos entre las naciones, y allí serán para oprobio y para maldición. 5. Porque la casa que el Señor escogerá será llamada Jerusalén, como contiene el libro de Enoc el justo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega literalmente dice “la consumación de los siglos”; se conserva el tono apocalíptico en vez de reducirlo a un simple “fin del tiempo”.
    reason: lexical_alternative
  - marker: b
    text: El testimonio griego incluye aquí los términos “contra el Salvador del mundo, el Mesías”, pero la frase suele considerarse una ampliación cristiana posterior; por eso se mantiene entre corchetes.
    reason: textual_variant
  - marker: c
    text: También puede entenderse “no podrá soportarlo”; el verbo griego βαστάζειν permite la idea de resistir o llevar la carga.
    reason: lexical_alternative
lexical_decisions:
- source_word: φυλάξατε
  english_pob_choice: keep
  chosen_spanish: guarden
  alternatives_spanish:
  - conserven
  - obedezcan
  lexicon: LSJ
  rationale: En contexto exhortativo, el imperativo plural en español transmite la idea de observar fielmente lo mandado sin sonar mecánico.
- source_word: ἐντέλλομαι
  english_pob_choice: I command
  chosen_spanish: les mando
  alternatives_spanish:
  - les ordeno
  - les encargo
  lexicon: LSJ
  rationale: Mantiene la autoridad testamentaria y el valor imperativo del verbo.
- source_word: ἀθῷός εἰμι
  english_pob_choice: I am innocent
  chosen_spanish: soy inocente
  alternatives_spanish:
  - soy libre de culpa
  - soy irreprochable
  lexicon: LSJ
  rationale: Expresa bien la exención de responsabilidad por los pecados anunciados.
- source_word: ἀσεβείας
  english_pob_choice: ungodliness
  chosen_spanish: impiedad
  alternatives_spanish:
  - irreligión
  - desprecio de Dios
  lexicon: LSJ
  rationale: Conserva el matiz religioso y covenantal del término, más preciso que una simple falta moral.
- source_word: παράβασις
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - violación
  - traspaso
  lexicon: LSJ
  rationale: Es la equivalencia más estable para la idea de cruzar un límite o mandato conocido.
- source_word: συντέλεια τῶν αἰώνων
  english_pob_choice: the consummation of the ages
  chosen_spanish: la consumación de los siglos
  alternatives_spanish:
  - el fin de los siglos
  - la culminación de los siglos
  lexicon: LSJ
  rationale: Conserva el registro apocalíptico y la formulación más cercana al griego.
- source_word: σωτῆρα τοῦ κόσμου
  english_pob_choice: the Savior of the world
  chosen_spanish: el Salvador del mundo
  alternatives_spanish:
  - el Libertador del mundo
  lexicon: LSJ
  rationale: Traducción directa del título, manteniendo su fuerza mesiánica.
- source_word: χριστόν
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: LSJ
  rationale: Sigue el criterio del proyecto de verter el título como 'Mesías' para preservar su sentido hebraico.
- source_word: πλανῶντες
  english_pob_choice: misleading
  chosen_spanish: extraviando
  alternatives_spanish:
  - engañando
  - desviando
  lexicon: LSJ
  rationale: Comunica la acción de apartar a Israel del camino correcto con un verbo natural en español.
- source_word: ἐπεγείροντες
  english_pob_choice: stirring up
  chosen_spanish: provocando
  alternatives_spanish:
  - desatando
  - levantando
  lexicon: LSJ
  rationale: Recoge la idea de incitar o suscitar consecuencias adversas desde el Señor.
- source_word: κακὰ μεγάλα
  english_pob_choice: great evils
  chosen_spanish: grandes males
  alternatives_spanish:
  - grandes calamidades
  - grandes desgracias
  lexicon: LSJ
  rationale: '''Males'' reproduce el peso literal y profético del griego, sin suavizarlo demasiado.'
- source_word: ἀνομήσετε
  english_pob_choice: you will act lawlessly
  chosen_spanish: obraran con iniquidad
  alternatives_spanish:
  - actuarán sin ley
  - cometerán iniquidad
  lexicon: LSJ
  rationale: Se eligió una forma verbal idiomática en español que expresa conducta contra la ley divina; el matiz de impiedad e ilegalidad queda reflejado por 'iniquidad'.
- source_word: βαστάζειν
  english_pob_choice: bear it
  chosen_spanish: soportarlo
  alternatives_spanish:
  - sostenerlo
  - cargarlo
  lexicon: LSJ
  rationale: La construcción con Jerusalén como sujeto pide una idea de tolerar o resistir el peso; 'soportarlo' comunica bien la incapacidad de Jerusalén para resistir la maldad.
- source_word: καταπέτασμα
  english_pob_choice: veil
  chosen_spanish: velo
  alternatives_spanish:
  - cortina
  lexicon: LSJ
  rationale: '''Velo'' es el término cultual establecido para el templo y conserva la imaginería sagrada.'
- source_word: ἀσχημοσύνη
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - desnudez
  lexicon: LSJ
  rationale: '''Vergüenza'' funciona bien en español para la exposición humillante sugerida por el término.'
- source_word: διασπαρήσεσθε
  english_pob_choice: you will be scattered
  chosen_spanish: serán dispersados
  alternatives_spanish:
  - serán esparcidos
  - serán repartidos
  lexicon: LSJ
  rationale: Preserva el lenguaje de dispersión/exilio característico del juicio pactal.
- source_word: αἰχμάλωτοι
  english_pob_choice: as captives
  chosen_spanish: como cautivos
  alternatives_spanish:
  - en cautiverio
  - como prisioneros
  lexicon: LSJ
  rationale: Conserva la imagen concreta de exilio y esclavitud cautiva.
- source_word: ὄνειδος
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - afrenta
  lexicon: LSJ
  rationale: '''Oprobio'' suena bíblico y solemne, y encaja bien con el lenguaje de maldición.'
- source_word: κατάρα
  english_pob_choice: curse
  chosen_spanish: maldición
  alternatives_spanish:
  - anatema
  - maldición pronunciada
  lexicon: LSJ
  rationale: Es la forma más natural en español para el lenguaje de juicio.
- source_word: περιέχει
  english_pob_choice: contains
  chosen_spanish: contiene
  alternatives_spanish:
  - incluye
  - registra
  lexicon: LSJ
  rationale: Traducción sobria y precisa para una fórmula de cita escrita.
theological_decisions:
- issue: Frase entre corchetes en v.2 sobre 'el Salvador del mundo, el Mesías'
  english_pob_reading: Included in the main text in brackets
  chosen_spanish_reading: Incluida en el texto principal entre corchetes
  alternative_spanish_readings:
  - Omitirla como interpolación secundaria
  - Incluirla sin corchetes como texto integral
  rationale: El testimonio griego la contiene, pero su formulación cristológica es probablemente secundaria en la transmisión. Los corchetes preservan la honestidad textual sin ocultar la lectura.
  doctrine_reference: Preservar la tensión textual en lugar de resolverla silenciosamente.
- issue: Cláusula difícil 'provocando grandes males del Señor contra él' en v.2
  english_pob_reading: Retained as a difficult prophetic statement of divine judgments
  chosen_spanish_reading: Mantener la dificultad sintáctica y el referente pronominal
  alternative_spanish_readings:
  - Suavizar a 'grandes males del Señor contra ustedes'
  - Reasignar explícitamente el pronombre por interpretación
  rationale: La sintaxis es difícil y el referente de 'él' no es completamente claro. La traducción conserva la ambigüedad en vez de resolverla por paráfrasis.
  doctrine_reference: No resolver en traducción una tensión que el texto fuente deja abierta.
- issue: Tearing of the temple veil in v.3
  english_pob_reading: Translated straightforwardly as prophetic judgment imagery
  chosen_spanish_reading: Traducido como imaginería profética de juicio
  alternative_spanish_readings:
  - Explicitar una alusión a los Evangelios
  - Tratarlo solo como símbolo de exposición ritual
  rationale: El texto griego presenta el rasgado del velo como imagen del juicio y la vergüenza. Se conserva esa figura sin imponer una lectura posterior.
  doctrine_reference: Primacía del texto fuente sobre la armonización traductora.
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente del inglés POB que cambió en v.3 la idea de 'endure' a 'bear it'; por eso el español usa 'soportarlo', manteniendo la carga semántica de βαστάζειν. No se adoptó una traducción más libre en v.2 para no resolver la ambigüedad sintáctica del texto griego.
  spanish_consistency_notes:
  - Se mantuvo 'Mesías' para χριστός conforme al criterio del proyecto.
  - Se usó 'Yahvé' solo donde el griego cita κύριος en sentido divino no era necesario aquí; en este pasaje el referente queda como 'el Señor' en coherencia con el inglés auditado.
  - Se conservó el registro profético y pactal con 'impiedad', 'transgresión', 'maldición' y 'oprobio'.
  - Se evitó 'Cristo' como forma fija del título para no borrar la nota de posible interpolación cristiana en v.2.
  - '''Velo'' se mantuvo frente a ''cortina'' por ser el término cultual más claro en español para el contexto del templo.'
