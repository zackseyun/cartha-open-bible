translation:
  language: es
  text: Entonces el sueño cayó sobre mí, y vi un monte alto, y estaba yo en él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπέπεσέ ... ὕπνος
  english_pob_choice: sleep fell upon me
  chosen_spanish: el sueño cayó sobre mí
  alternatives_spanish:
  - me sobrevino el sueño
  - me cayó el sueño
  lexicon: ὕπνος
  rationale: Conservo la imagen de algo que ‘cae’ sobre la persona, como en el inglés POB, y uso ‘sueño’ para reflejar el sujeto impersonal del griego sin explicitar más de lo que el texto dice.
- source_word: ἐθεασάμην
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - contemplé
  - divisé
  lexicon: θεάομαι
  rationale: El verbo griego puede tener matiz de ‘ver/observar’; ‘vi’ es claro y fiel, sin añadir una intensidad no requerida por el contexto.
- source_word: ὄρος ὑψηλόν
  english_pob_choice: a high mountain
  chosen_spanish: un monte alto
  alternatives_spanish:
  - una montaña alta
  - un monte elevado
  lexicon: ὄρος
  rationale: ‘Monte’ conserva bien el registro bíblico y puede abarcar ‘mountain’; ‘alto’ reproduce ὑψηλόν de forma natural en español.
- source_word: ἤμην ἐν αὐτῷ
  english_pob_choice: I was on it
  chosen_spanish: estaba yo en él
  alternatives_spanish:
  - yo estaba sobre él
  - estaba sobre él
  lexicon: ἐν + αὐτῷ
  rationale: El griego dice literalmente ‘estaba en él’; en español ‘en él’ puede sonar menos idiomático para un monte, pero mantiene la cercanía al texto. ‘Estaba yo’ conserva el orden enfático sin forzar el sentido.
theological_decisions:
- issue: Naturaleza de la escena onírica/visionaria
  english_pob_reading: Then sleep fell upon me, and I saw...
  chosen_spanish_reading: Entonces el sueño cayó sobre mí, y vi...
  alternative_spanish_readings:
  - Entonces me sobrevino el sueño, y vi...
  rationale: Mantengo la secuencia narrativa exacta sin interpretar si la experiencia es sueño o visión; el texto griego solo afirma que el sueño cayó y que luego ‘vi’.
  doctrine_reference: No aplica; decisión de nivel narrativo-textual.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requieren cambios; el español sigue de cerca el griego y el inglés POB, sin introducir notas porque no hay variantes o tensiones léxicas documentadas en este versículo.
  spanish_consistency_notes:
  - Uso ‘monte’ para ὄρος en un registro bíblico natural.
  - Conservo ‘sueño cayó sobre mí’ para reflejar la imagen verbal del griego y la elección del POB inglés.
  - No introduzco ‘visión’ porque el griego dice ‘vi’ y no nombra explícitamente una visión en este versículo.
