translation:
  language: es
  text: Y yo era todavía joven, de unos veinte años, y entonces ejecuté la venganza junto con Simeón por nuestra hermana Dina[a] contra Hamor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Dina'' sigue la forma habitual en español; el griego ofrece Δείνας.'
    reason: source_note
lexical_decisions:
- source_word: νεώτερος, ὡς ἐτῶν εἴκοσι
  english_pob_choice: still young, about twenty years old
  chosen_spanish: todavía joven, de unos veinte años
  alternatives_spanish:
  - aún joven, como de veinte años
  - todavía joven, aproximadamente de veinte años
  lexicon: νεώτερος; ὡς; εἴκοσι
  rationale: Conserva la idea de juventud relativa y la aproximación numérica. 'Todavía joven' refleja el 'still young' de la POB y su tono narrativo natural en español.
- source_word: ἐποίησα τὴν ἐκδίκησιν
  english_pob_choice: carried out vengeance
  chosen_spanish: ejecuté la venganza
  alternatives_spanish:
  - llevé a cabo la venganza
  - realicé la venganza
  lexicon: ποιέω; ἐκδίκησις
  rationale: La expresión griega es literal 'hice la venganza', pero en español 'ejecuté la venganza' preserva el acto deliberado y formal sin volverla más interpretativa que el griego. Se evita suavizar 'venganza' porque el texto la nombra de forma explícita.
- source_word: μετὰ Συμεών
  english_pob_choice: with Simeon
  chosen_spanish: junto con Simeón
  alternatives_spanish:
  - con Simeón
  - en compañía de Simeón
  lexicon: μετά + genitivo
  rationale: '''Junto con'' expresa mejor la cooperación activa entre ambos en español y mantiene el sentido de acompañamiento del griego y de la POB inglesa.'
- source_word: τῆς ἀδελφῆς ἡμῶν Δείνας
  english_pob_choice: for our sister Dinah
  chosen_spanish: por nuestra hermana Dina
  alternatives_spanish:
  - por nuestra hermana Dinah
  - en favor de nuestra hermana Dina
  lexicon: ἀδελφή; ἡμῶν; Δείνα
  rationale: '''Por'' conserva el valor causal/justificativo de la frase inglesa y del contexto narrativo: venganza motivada por el ultraje a Dina. ''Dina'' sigue el uso español habitual del nombre bíblico.'
- source_word: ἀπὸ Ἐμμώρ
  english_pob_choice: against Hamor
  chosen_spanish: contra Hamor
  alternatives_spanish:
  - de Hamor
  - a causa de Hamor
  lexicon: ἀπό + genitivo; Ἐμμώρ
  rationale: Aunque el griego usa ἀπό, el contexto de 'ἐκδίκησις' demanda en español una relación adversativa clara. La POB inglesa ya interpretó el sentido como 'against Hamor'; se conserva esa lectura para claridad y fidelidad contextual.
theological_decisions:
- issue: La legitimidad o tono moral de la venganza en el relato
  english_pob_reading: carried out vengeance
  chosen_spanish_reading: ejecuté la venganza
  alternative_spanish_readings:
  - llevé a cabo la venganza
  - me vengué
  rationale: El texto no suaviza ni reinterpreta la acción; la narra como venganza ejecutada junto con Simeón. En español se mantiene el mismo relieve narrativo sin añadir una evaluación doctrinal explícita que el versículo no formula.
  doctrine_reference: Narrative ethics; no doctrinal gloss beyond the source
translation_notes:
  revision_awareness: La revisión más reciente indicó high agreement y no requirió cambios; por tanto, la redacción española sigue de cerca el texto griego con la lectura inglesa auditada, sin incorporar variantes adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva 'Simeón' y 'Hamor' con formas bíblicas españolas estándar.
  - No se añade puntuación interpretativa que altere la secuencia narrativa del original.
