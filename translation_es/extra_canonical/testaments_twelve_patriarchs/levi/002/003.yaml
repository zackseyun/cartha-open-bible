id: T12P.LEV.2.3
reference: Testament of Levi 2:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Ὡς δὲ ἐποίμαινον¹⁸ ἐν Ἀβελμαούλ¹⁹, πνεῦμα συνέσεως Κυρίου ἦλθεν ἐπʼ ἐμέ²⁰, καὶ *ἐθεώρουν πάντας ἀνθρώπους²¹ *ἀφανίσαντας τὴν ὁδὸν αὐτῶν²², καὶ *ἐπὶ τείχους οἰκοδομεῖτο ἡ ἁμαρτία καὶ ἐπὶ πύργους ἡ ἀδικία ἐκάθητο²³.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/002/003.yaml
  text: And as I was shepherding in Abelmaul, a spirit of understanding from the Lord came upon me, and I saw all people destroying their way, and sin was being built upon a wall, and injustice sat upon towers.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:31Z'
    unchanged: false
    changes_summary: Changed 'corrupting their way' to 'destroying their way' for closer lexical alignment with ἀφανίσαντας ('destroying, ruining').
translation:
  language: es
  text: Y mientras pastoreaba en Abelmaul, un espíritu de entendimiento de parte de Yahvé vino sobre mí, y vi a todos los hombres destruyendo su camino, y el pecado estaba siendo edificado sobre un muro, y la injusticia estaba sentada sobre torres.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεῦμα συνέσεως
  english_pob_choice: a spirit of understanding
  chosen_spanish: un espíritu de entendimiento
  alternatives_spanish:
  - un espíritu de inteligencia
  - un espíritu de comprensión
  lexicon: πνεῦμα; σύνεσις
  rationale: Mantiene el sustantivo 'espíritu' y el sustantivo abstracto 'entendimiento' como equivalente natural de σύνεσις, sin diluir el matiz cognitivo.
- source_word: Κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: de parte de Yahvé
  alternatives_spanish:
  - del Señor
  - de Yahvé
  lexicon: κύριος
  rationale: En esta obra, el nombre divino se expresa como 'Yahvé' cuando el trasfondo apunta al nombre divino; 'de parte de' conserva el origen/ procedencia de ἐπʼ ἐμέ con naturalidad en español.
- source_word: ἀφανίσαντας τὴν ὁδὸν αὐτῶν
  english_pob_choice: destroying their way
  chosen_spanish: destruyendo su camino
  alternatives_spanish:
  - arruinando su camino
  - corrompiendo su camino
  lexicon: ἀφανίζω; ὁδός
  rationale: Sigue la revisión inglesa que corrigió 'corrupting' a 'destroying/ruining'; 'su camino' comunica la metáfora moral sin forzarla.
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - pecado
  - la falta
  lexicon: ἁμαρτία
  rationale: '''El pecado'' es la equivalencia directa y clara en español; conserva el sujeto personificado de ''estaba siendo edificado''.'
- source_word: ἀδικία
  english_pob_choice: injustice
  chosen_spanish: la injusticia
  alternatives_spanish:
  - injusticia
  - iniquidad
  lexicon: ἀδικία
  rationale: '''Injusticia'' es la traducción más inmediata y mantiene el contraste con ''pecado'' sin cargar un matiz eclesiástico añadido.'
theological_decisions:
- issue: Nombre divino en κύριος
  english_pob_reading: from the Lord
  chosen_spanish_reading: de parte de Yahvé
  alternative_spanish_readings:
  - del Señor
  rationale: Aunque el griego dice κύριος, el contexto alude a la referencia divina; el estándar del proyecto es usar 'Yahvé' en el texto principal cuando la fuente remite al nombre divino.
  doctrine_reference: Convención POB sobre el Tetragrámaton / κύριος en alusiones al nombre divino
- issue: Personificación del pecado e injusticia
  english_pob_reading: sin was being built upon a wall, and injustice sat upon towers
  chosen_spanish_reading: el pecado estaba siendo edificado sobre un muro, y la injusticia estaba sentada sobre torres
  alternative_spanish_readings:
  - se edificaba el pecado sobre un muro, y la injusticia se sentaba sobre torres
  - sobre un muro se edificaba el pecado, y sobre torres se sentaba la injusticia
  rationale: 'Conserva la imagen extraña pero deliberada del texto: el pecado y la injusticia aparecen como entidades que ocupan posiciones arquitectónicas. No se suaviza a una paráfrasis moral.'
  doctrine_reference: Fidelidad a la imaginería profética/apocalíptica del texto fuente
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa más reciente ('destroying their way' en lugar de 'corrupting their way') al elegir 'destruyendo su camino'. No hay variantes textuales divergentes en el paquete actual que requieran nota adicional.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme a la terminología base del proyecto para alusiones al nombre divino.
  - 'Se conserva el orden de imágenes del griego: pastoreo, venida del espíritu, visión de la destrucción del camino, edificación del pecado y asiento de la injusticia.'
  - No se introduce 'Cristo', 'Señor' ni 'iniquidad' sin base textual en este pasaje.
