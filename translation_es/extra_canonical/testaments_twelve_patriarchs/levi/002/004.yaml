translation:
  language: es
  text: Y yo estaba entristecido por la raza de los hijos de los hombres, y supliqué al Señor para que yo fuera salvo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤμην λυπούμενος
  english_pob_choice: I was grieved
  chosen_spanish: yo estaba entristecido
  alternatives_spanish:
  - yo estaba afligido
  - me dolía el corazón
  lexicon: λυπέω
  rationale: El griego expresa un estado continuo de tristeza o aflicción. «Estaba entristecido» conserva el aspecto imperfectivo y suena natural en español sin intensificar indebidamente el término.
- source_word: ὑπὲρ γένους τῶν υἱῶν τῶν ἀνθρώπων
  english_pob_choice: over the race of the sons of men
  chosen_spanish: por la raza de los hijos de los hombres
  alternatives_spanish:
  - por la estirpe de los hijos de los hombres
  - por la humanidad
  lexicon: γένος
  rationale: Se mantiene «raza» porque el texto fuente habla de un colectivo humano en lenguaje genealógico. «Humanidad» suavizaría la expresión y perdería parte de la textura literal del griego; «estirpe» es posible, pero menos transparente para este registro.
- source_word: τῷ Κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: κύριος
  rationale: Aquí el griego usa κύριος con artículo en una fórmula de oración. Dado el contexto de plegaria y el uso estable de «Señor» en español bíblico para este tipo de invocación, se conserva «el Señor»; no se explicita «Yahvé» porque el texto griego no marca el nombre divino de manera directa en esta línea.
- source_word: ὅπως σωθῶ
  english_pob_choice: that I might be saved
  chosen_spanish: para que yo fuera salvo
  alternatives_spanish:
  - para que pudiera ser salvo
  - para que me salvaran
  lexicon: σῴζω
  rationale: «Fuera salvo» reproduce la finalidad expresada por ὅπως + subjuntivo aoristo pasivo, con un español natural y sobrio. «Pudiera ser salvo» es una alternativa válida pero algo más perifrástica.
theological_decisions:
- issue: Sentido de la salvación pedida
  english_pob_reading: that I might be saved
  chosen_spanish_reading: para que yo fuera salvo
  alternative_spanish_readings:
  - para que yo me salvara
  - para que yo fuera rescatado
  rationale: La pasiva «fuera salvo» deja abierta la agencia divina implícita en la petición y evita forzar una lectura demasiado autónoma del sujeto. «Me salvara» podría sonar reflexiva y «rescatado» estrecha el alcance semántico.
  doctrine_reference: Soteriology; divine agency in salvation petitions
- issue: Colectivo humano designado por γένος
  english_pob_reading: race of the sons of men
  chosen_spanish_reading: raza de los hijos de los hombres
  alternative_spanish_readings:
  - linaje de los hijos de los hombres
  - humanidad
  rationale: Se conserva el alcance amplio y el matiz genealógico del texto, sin suavizarlo en una abstracción moderna. Esto mantiene la tensión lexical del original y el registro de la POB inglesa.
  doctrine_reference: Anthropological vocabulary in Second Temple / pseudepigraphal literature
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y ningún cambio necesario; esta propuesta sigue ese perfil de estabilidad, manteniendo la correspondencia semántica del texto griego y la lectura inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en esta oración, coherente con el registro bíblico de súplica.
  - Se usa «salvo» como adjetivo pasivo de estado, no como paráfrasis doctrinal ampliada.
