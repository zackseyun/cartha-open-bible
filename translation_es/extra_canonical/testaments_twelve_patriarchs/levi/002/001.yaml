lexical_decisions:
- source_word: Ἐγὼ Λευὶ
  english_pob_choice: I, Levi
  chosen_spanish: Yo, Leví
  alternatives_spanish:
  - Yo, Levi
  lexicon: Leví
  rationale: Se conserva el nombre propio bíblico con acentuación española habitual. Se mantiene el pronombre explícito para reflejar el énfasis del griego Ἐγὼ.
- source_word: ἐγεννήθην
  english_pob_choice: was born
  chosen_spanish: nací
  alternatives_spanish:
  - fui nacido
  - fui engendrado
  lexicon: γεννάω
  rationale: El aoristo pasivo en contexto autobiográfico se vierte naturalmente en español como un pasado simple activo de sentido equivalente. 'Nací' comunica con claridad la idea de nacimiento sin forzar una pasiva poco natural.
- source_word: ἐν Χαρρὰν
  english_pob_choice: in Haran
  chosen_spanish: en Harán
  alternatives_spanish:
  - en Jarán
  lexicon: Χαρράν
  rationale: Se usa la forma geográfica usual en español bíblico. 'Harán' es transparente y ampliamente reconocible.
- source_word: σὺν τῷ πατρί μου
  english_pob_choice: with my father
  chosen_spanish: con mi padre
  alternatives_spanish:
  - junto con mi padre
  - en compañía de mi padre
  lexicon: σύν + dativo
  rationale: La preposición expresa compañía; 'con mi padre' es la forma más directa y natural en español, sin añadir matices no presentes en el griego.
- source_word: εἰς Σίκημα
  english_pob_choice: to Shechem
  chosen_spanish: a Siquem
  alternatives_spanish:
  - hasta Siquem
  lexicon: Σίκιμα
  rationale: Se conserva el topónimo bíblico tradicional. 'A Siquem' reproduce el valor direccional de εἰς sin sobretraducir.
theological_decisions:
- issue: Valor autobiográfico simple de la frase
  english_pob_reading: I, Levi, was born in Haran, and I came with my father to Shechem.
  chosen_spanish_reading: Yo, Leví, nací en Harán, y vine con mi padre a Siquem.
  alternative_spanish_readings:
  - Yo, Leví, fui nacido en Harán, y vine con mi padre a Siquem.
  rationale: No hay carga doctrinal especial en el versículo; la traducción debe conservar el tono testimonial sencillo del original griego, evitando construcciones forzadas que oscurezcan el relato.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El control textual y la revisión más reciente indican alta conformidad con la lectura establecida; no se detectaron cambios necesarios respecto del texto inglés auditado.
