translation:
  language: es
  text: 'Y he aquí, los cielos se abrieron, y un ángel de Yahvé me dijo: «Leví, Leví, entra».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ οὐρανοί
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: οὐρανός
  rationale: El plural griego se conserva naturalmente en español como «los cielos», que mantiene el sentido auditado por la POB inglesa sin forzar un singular técnico.
- source_word: ἄγγελος Κυρίου
  english_pob_choice: an angel of the Lord
  chosen_spanish: un ángel de Yahvé
  alternatives_spanish:
  - un ángel del Señor
  - un ángel de Yahvé
  lexicon: ἄγγελος
  rationale: Se preserva el referente divino del texto fuente con el nombre propio «Yahvé», conforme al criterio del proyecto para יהוה; aunque el griego dice κυρίου, en este contexto funciona como equivalente del nombre divino más que como título genérico.
- source_word: εἶπε πρός με
  english_pob_choice: said to me
  chosen_spanish: me dijo
  alternatives_spanish:
  - me habló
  - dijo a mí
  lexicon: λέγω
  rationale: «Me dijo» es la forma española más natural y fiel para el dativo personal del griego, sin añadir énfasis innecesario.
- source_word: Λευί, ⌈Λευί⌉
  english_pob_choice: “Levi, Levi,”
  chosen_spanish: «Leví, Leví,»
  alternatives_spanish:
  - «Leví, Leví,»
  - «Leví, Leví»
  lexicon: Λευί
  rationale: Se conserva la repetición vocativa y la forma española habitual del nombre bíblico con tilde en la última sílaba, manteniendo el doble llamado del original.
- source_word: εἴσελθε
  english_pob_choice: enter
  chosen_spanish: entra
  alternatives_spanish:
  - entra
  - ingresa
  lexicon: εἰσέρχομαι
  rationale: «Entra» reproduce el imperativo directo y breve del griego con estilo natural en español bíblico contemporáneo.
theological_decisions:
- issue: Identificación de «Κυρίου» con el nombre divino en una visión angélica
  english_pob_reading: an angel of the Lord
  chosen_spanish_reading: un ángel de Yahvé
  alternative_spanish_readings:
  - un ángel del Señor
  - un ángel de Yahvé
  rationale: Aunque la POB inglesa traduce literalmente «of the Lord», el contexto de la visión y la directriz del proyecto favorecen explicitar el nombre divino cuando κύριος reproduce o alude a יהוה. Esto evita la convención de máscara «SEÑOR» y mantiene transparencia source-grounded.
  doctrine_reference: Terminología del proyecto para יהוה / κύριος en contextos de equivalencia divina
translation_notes:
  revision_awareness: La revisión más reciente no modificó este versículo; el pasaje fue dejado sin cambios porque la correspondencia con el griego y la POB inglesa es estable y directa.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico claro y solemne, sin arcaismos innecesarios.
  - Se usa «Yahvé» de forma consistente para el nombre divino según la política terminológica del proyecto.
  - La puntuación dialogal española sigue la convención moderna con comillas angulares.
