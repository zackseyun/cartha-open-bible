translation:
  language: es
  text: '1 Y allí vi otra vez una visión como la anterior[a], después de haber pasado allí setenta días. 2 Y vi siete varones vestidos de blanco, que me decían: «Levántate, ponte la vestidura del sacerdocio, la corona de justicia, el oráculo de entendimiento, la túnica de cuerpo entero de la verdad, la placa de la fe, el turbante de la cabeza y el efod de la profecía». 3 Y cada uno de ellos llevaba estas cosas, y me las pusieron encima y me dijeron: «Desde ahora, sé sacerdote: tú y todo tu descendencia».


    4 Y el primero me ungió con óleo santo y me dio un báculo sacerdotal. 5 Y el segundo me lavó con agua pura del Señor, y me dio pan y vino santos, y me puso una vestidura santa y gloriosa. 6 Y el tercero me puso un lino, semejante a un efod. 7 Y el cuarto me ciñó un cinturón, semejante a púrpura. 8 Y el quinto me dio una rama de oliva rica[b]. 9 Y el sexto me puso una corona sobre la cabeza. 10 Y el séptimo me puso un diadema del sacerdocio y llenó mis manos de incienso, para que yo ministrara como sacerdote delante del Señor Dios.


    11 Y me dicen: «Leví, tu descendencia será dividida en tres funciones, como señal de la gloria del Señor que viene[c]. 12 Y el primer lote será grande; no habrá otro mayor que él. 13 Y el segundo será en el sacerdocio. 14 Y el tercero será llamado con un nombre nuevo, porque un rey surgirá de Judá y establecerá un nuevo sacerdocio, según el modelo de las naciones, para todas las naciones. 15 Y su presencia es amada, como la de un profeta del Altísimo, de la descendencia de Abraham nuestro padre. 16 Por tanto, todo lo deseable en Israel será para ti y para tu descendencia, y tu descendencia comerá toda cosa hermosa, y repartirá la mesa del Señor. 17 Y de entre ellos habrá sacerdotes, jueces y escribas; y por su boca será recibido lo santo. 18 Entonces, al despertar, comprendí que esto era semejante a la primera visión.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse simplemente como «la visión anterior».
    reason: alternative_reading
  - marker: b
    text: La expresión griega es difícil; puede entenderse también como «una rama de olivo fecunda» o «una rama de olivo rica».
    reason: lexical_alternative
  - marker: c
    text: La palabra griega puede significar también «venida» o «llegada»; se conserva «que viene» para mantener la ambigüedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅραμα
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - aparición
  - revelación
  lexicon: LSJ
  rationale: En un contexto testamentario-apocalíptico, «visión» conserva el registro profético sin interpretar de más.
- source_word: ἐσθῆτι λευκῇ
  english_pob_choice: white clothing
  chosen_spanish: vestidos de blanco
  alternatives_spanish:
  - con vestiduras blancas
  - con ropa blanca
  lexicon: LSJ
  rationale: En español suena natural y mantiene el valor simbólico del color y el carácter de investidura.
- source_word: στολή τῆς ἱερατείας
  english_pob_choice: robe of the priesthood
  chosen_spanish: vestidura del sacerdocio
  alternatives_spanish:
  - ropa sacerdotal
  - vestidura sacerdotal
  lexicon: LSJ
  rationale: «Vestidura del sacerdocio» conserva el genitivo y el tono ceremonial sin endurecer el español.
- source_word: στέφανον τῆς δικαιοσύνης
  english_pob_choice: crown of righteousness
  chosen_spanish: corona de justicia
  alternatives_spanish:
  - corona de rectitud
  lexicon: LSJ
  rationale: «Justicia» es el equivalente más directo y digno; «rectitud» queda como alternativa posible según matiz.
- source_word: λόγιον τῆς συνέσεως
  english_pob_choice: oracle of understanding
  chosen_spanish: oráculo de entendimiento
  alternatives_spanish:
  - oráculo de inteligencia
  - pectoral de entendimiento
  lexicon: LSJ
  rationale: «Oráculo» preserva la posible referencia a un objeto/medio revelatorio sin resolver la ambigüedad cultual.
- source_word: ποδήρη τῆς ἀληθείας
  english_pob_choice: full-length robe of truth
  chosen_spanish: túnica de cuerpo entero de la verdad
  alternatives_spanish:
  - túnica larga de la verdad
  - vestidura larga de la verdad
  lexicon: LSJ
  rationale: Expresa el sentido de una prenda que cubre todo el cuerpo, sin perder el vínculo genitivo con «verdad».
- source_word: πέταλον τῆς πίστεως
  english_pob_choice: plate of faith
  chosen_spanish: placa de la fe
  alternatives_spanish:
  - lámina de la fe
  - frontal de la fe
  lexicon: LSJ
  rationale: «Placa» mantiene la imagen sacerdotal breve y clara; «frontal» es posible pero más técnico.
- source_word: μίτραν τῆς κεφαλῆς
  english_pob_choice: turban of the head
  chosen_spanish: turbante de la cabeza
  alternatives_spanish:
  - turbante
  - mitra
  lexicon: LSJ
  rationale: Se conserva la imagen de tocado sacerdotal sin recurrir a un término eclesiástico posterior como «mitra».
- source_word: ἐφοὺδ τῆς προφητείας
  english_pob_choice: ephod of prophecy
  chosen_spanish: efod de la profecía
  alternatives_spanish:
  - efod profético
  lexicon: LSJ
  rationale: «Efod» se translitera por ser término culturalmente específico; el genitivo se conserva de modo transparente.
- source_word: γενοῦ εἰς ἱερέα
  english_pob_choice: become a priest
  chosen_spanish: sé sacerdote
  alternatives_spanish:
  - conviértete en sacerdote
  - llega a ser sacerdote
  lexicon: LSJ
  rationale: Captura la fuerza ingesiva del mandato; «sé sacerdote» es más breve y natural en español bíblico moderno.
- source_word: ἤλειψέ με ἐλαίῳ ἁγίῳ
  english_pob_choice: anointed me with holy oil
  chosen_spanish: me ungió con óleo santo
  alternatives_spanish:
  - me ungió con aceite santo
  - me consagró con óleo santo
  lexicon: BDAG
  rationale: «Ungió» es el verbo cultual adecuado; «óleo santo» conserva dignidad ritual.
- source_word: ὕδατι κυρίου καθαρῷ
  english_pob_choice: pure water of the Lord
  chosen_spanish: agua pura del Señor
  alternatives_spanish:
  - agua pura de Yahvé
  - agua limpia del Señor
  lexicon: LSJ
  rationale: Se mantiene la expresión genitiva extraña y su tono cultual; «Señor» aquí refleja el griego κύριος del texto fuente.
- source_word: ἐψώμισέν με ἄρτον καὶ οἶνον ἅγιον
  english_pob_choice: fed me holy bread and wine
  chosen_spanish: me dio pan y vino santos
  alternatives_spanish:
  - me alimentó con pan y vino santos
  - me dio pan y vino sagrados
  lexicon: LSJ
  rationale: «Dio» evita una formulación demasiado interpretativa y conserva el gesto ritual de alimentación sacra.
- source_word: βυσσίνην
  english_pob_choice: linen garment
  chosen_spanish: un lino
  alternatives_spanish:
  - una vestidura de lino
  - una prenda de lino
  lexicon: LSJ
  rationale: En este contexto, «un lino» funciona como sustantivo de vestidura y refleja la brevedad del griego.
- source_word: ζώνην
  english_pob_choice: girdle
  chosen_spanish: un cinturón
  alternatives_spanish:
  - una faja
  - un cinto
  lexicon: LSJ
  rationale: «Cinturón» es inteligible para lectores amplios; «faja» o «cinto» serían alternativas más literarias.
- source_word: κλάδον ... ἐλαίας πιότητος
  english_pob_choice: rich olive branch
  chosen_spanish: una rama de oliva rica
  alternatives_spanish:
  - una rama de olivo abundante
  - una rama de oliva fecunda
  lexicon: LSJ
  rationale: Sigue de cerca el texto griego, manteniendo la dificultad de la expresión sin resolverla de más.
- source_word: διάδημα ἱερατείας
  english_pob_choice: diadem of priesthood
  chosen_spanish: un diadema del sacerdocio
  alternatives_spanish:
  - una diadema sacerdotal
  - un diadema sacerdotal
  lexicon: LSJ
  rationale: Conserva el tono regio-sacerdotal del objeto sin sustituirlo por un término menos marcado.
- source_word: ἐπλήρωσε τὰς χεῖράς μου θυμιάματος
  english_pob_choice: filled my hands with incense
  chosen_spanish: llenó mis manos de incienso
  alternatives_spanish:
  - colmó mis manos de incienso
  - llenó mis manos con incienso
  lexicon: LSJ
  rationale: Es una traducción directa y ceremonial que deja visible el lenguaje de investidura.
- source_word: διαιρεθήσεται
  english_pob_choice: will be divided
  chosen_spanish: será dividida
  alternatives_spanish:
  - se dividirá
  - será repartida
  lexicon: BDAG
  rationale: Mantiene el futuro pasivo y la idea de reparto de la descendencia en funciones distintas.
- source_word: ἀρχὰς
  english_pob_choice: offices
  chosen_spanish: funciones
  alternatives_spanish:
  - oficios
  - cargos
  - órdenes
  lexicon: LSJ
  rationale: «Funciones» comunica la división operativa sin imponer una jerarquía posterior demasiado técnica.
- source_word: κλῆρος
  english_pob_choice: lot
  chosen_spanish: lote
  alternatives_spanish:
  - porción
  - heredad
  lexicon: LSJ
  rationale: «Lote» mantiene la imagen de asignación por suerte/parte y armoniza con el tono del pasaje.
- source_word: ὄνομα καινόν
  english_pob_choice: a new name
  chosen_spanish: un nombre nuevo
  alternatives_spanish:
  - un nuevo nombre
  lexicon: BDAG
  rationale: Se conserva el giro profético sin cargarlo con una interpretación adicional.
- source_word: ἱερατείαν νέαν
  english_pob_choice: a new priesthood
  chosen_spanish: un nuevo sacerdocio
  alternatives_spanish:
  - un nuevo orden sacerdotal
  - un nuevo ministerio sacerdotal
  lexicon: LSJ
  rationale: «Sacerdocio» es la forma más directa y fiel; no se introduce terminología eclesiástica ajena al texto.
- source_word: κατὰ τὸν τύπον τῶν ἐθνῶν
  english_pob_choice: after the pattern of the nations
  chosen_spanish: según el modelo de las naciones
  alternatives_spanish:
  - según el patrón de las naciones
  - a la manera de las naciones
  lexicon: LSJ
  rationale: «Modelo» refleja bien τύπος como forma/patrón y suena natural en español.
- source_word: παρουσία
  english_pob_choice: presence
  chosen_spanish: presencia
  alternatives_spanish:
  - venida
  - llegada
  - presencia/venida
  lexicon: BDAG
  rationale: «Presencia» preserva la ambigüedad entre presencia, llegada y venida, como en la auditoría inglesa.
- source_word: ἐπιθυμητόν
  english_pob_choice: desirable thing
  chosen_spanish: lo deseable
  alternatives_spanish:
  - lo precioso
  - lo apetecible
  lexicon: LSJ
  rationale: La sustantivación en español suena natural y conserva el campo semántico de lo escogido/deseable.
- source_word: τὴν τράπεζαν Κυρίου διανεμεῖται
  english_pob_choice: will apportion the table of the Lord
  chosen_spanish: repartirá la mesa del Señor
  alternatives_spanish:
  - administrará la mesa del Señor
  - distribuirá la mesa del Señor
  lexicon: LSJ
  rationale: «Repartirá» comunica el sentido distributivo del verbo sin ocultar el objeto sacro.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - secretarios
  - doctores de la ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente histórico directo y ampliamente reconocible.
- source_word: ἐπὶ στόματος αὐτῶν ληφθήσεται τὸ ἅγιον
  english_pob_choice: by their mouth the holy thing will be received
  chosen_spanish: por su boca será recibido lo santo
  alternatives_spanish:
  - por su boca será recibido el santo objeto
  - por su boca se recibirá lo santo
  lexicon: LSJ
  rationale: Sigue de cerca la sintaxis del griego y deja abierta la referencia exacta de τὸ ἅγιον.
theological_decisions:
- issue: Profecía sobre la tercera división y el rey de Judá que establece un nuevo sacerdocio
  english_pob_reading: The Greek witness explicitly speaks of a king from Judah who establishes a new priesthood for all the nations, and the translation should preserve that tension.
  chosen_spanish_reading: 'Se traduce de forma directa: un rey surgirá de Judá y establecerá un nuevo sacerdocio para todas las naciones.'
  alternative_spanish_readings:
  - referencia puramente histórica o hasmonea
  - interpolación cristiana posterior sobre el Mesías
  - lectura escatológica general sin identificación sectaria
  rationale: La redacción española mantiene la afirmación profética sin armonizarla con categorías doctrinales posteriores.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: παρουσία en el versículo 15
  english_pob_reading: Rendered as 'presence' to keep the term ambiguous between arrival and manifested presence.
  chosen_spanish_reading: Se traduce como «presencia».
  alternative_spanish_readings:
  - venida
  - llegada
  - aparición
  rationale: «Presencia» conserva la ambigüedad del término griego y evita fijarlo prematuramente a una lectura técnica.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Lenguaje del banquete sagrado en el versículo 5
  english_pob_reading: The text describes a consecratory feeding with holy bread and wine without forcing a sacramental interpretation.
  chosen_spanish_reading: Se conserva «pan y vino santos» como comida ritual de investidura.
  alternative_spanish_readings:
  - lectura eucarística explícita
  - lenguaje genérico de comida ritual
  rationale: La traducción retiene la imaginería cultual del griego sin capitalización ni sobrelectura doctrinal.
  doctrine_reference: Primacía del idioma original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: La redacción española toma en cuenta la última revisión inglesa, que ajustó el valor de «after we had spent seventy days there», afinó la imagen de «rich olive branch» y mantuvo «none will be greater than it». Se ha seguido esa dirección sin perder las tensiones léxicas del griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el hebreo fuente lo exige; aquí el griego usa κύριος, por lo que en la cita se conserva «Señor».
  - Se usa «sacerdocio» en vez de «orden sacerdotal» para no introducir una terminología posterior no presente en el griego.
  - Se conserva el lenguaje de investidura cultual con transliteraciones («efod») y equivalentes directos («oráculo», «diadema»), buscando claridad sin neutralizar la imaginería.
  - La construcción «por su boca será recibido lo santo» deja abierta la dificultad del original en lugar de reinterpretarla.
