translation:
  language: es
  text: 'Y ahora sé que por setenta semanas se desviarán[a], y profanarán el sacerdocio y contaminarán los altares. Y dejarán de lado la ley y tratarán con desprecio las palabras de los profetas en una perversión mala. Perseguirán a hombres justos, y odiarán a los piadosos; aborrecerán las palabras de los veraces.


    Y a un hombre que renueva la ley en el poder del Altísimo lo llamarán engañador, y al fin se precipitarán a matarlo, sin conocer su estatura[b], cargando sobre sus cabezas sangre inocente en maldad.


    Pero les digo que, por causa de él, sus lugares santos quedarán desolados hasta el suelo. Y no quedará para ustedes un lugar limpio, sino que estarán entre las naciones de la tierra para maldición y para dispersión[c], hasta que él mismo vuelva a visitar[d] y tenga compasión y los reciba.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego de esta oración es difícil y muestra señales de perturbación textual; la traducción sigue el testimonio transmitido, aunque la redacción podría reflejar expansión o interpolación posterior.
    reason: textual_variant
  - marker: b
    text: Literalmente, «su estatura»; el sentido puede ser «su verdadero valor» o «su majestad».
    reason: lexical_alternative
  - marker: c
    text: La cláusula puede entenderse también como «para cursing and dispersion»; se conserva aquí el sustantivo doble para mantener el ritmo profético.
    reason: lexical_alternative
  - marker: d
    text: El sujeto de «vuelva a visitar» puede entenderse como Dios, o posiblemente como la figura mencionada antes; el griego no obliga a una sola interpretación.
    reason: alternative_reading
lexical_decisions:
- source_word: ἑβδομήκοντα ἑβδομάδας
  english_pob_choice: seventy weeks
  chosen_spanish: setenta semanas
  alternatives_spanish:
  - setenta sietes
  lexicon: LSJ
  rationale: Conservo la expresión temporal literal «semanas» para mantener el eco apocalíptico y la misma apertura interpretativa que en el audit trail inglés; «sietes» explicaría más, pero interpretaría de más.
- source_word: πλανηθήσεσθε
  english_pob_choice: you will go astray
  chosen_spanish: se desviarán
  alternatives_spanish:
  - serán extraviados
  - andarán errantes
  lexicon: LSJ
  rationale: «Se desviarán» mantiene la idea de apartarse moralmente sin forzar si el matiz es activo o pasivo, y funciona naturalmente en español.
- source_word: ἱερωσύνην βεβηλώσετε
  english_pob_choice: you will profane the priesthood
  chosen_spanish: profanarán el sacerdocio
  alternatives_spanish:
  - desecrarán el sacerdocio
  lexicon: LSJ
  rationale: «Profanar» conserva el registro cultual y evita un giro más explicativo; «sacerdocio» corresponde bien a ἱερωσύνην.
- source_word: τὰ θυσιαστήρια μιανεῖτε
  english_pob_choice: defile the altars
  chosen_spanish: contaminarán los altares
  alternatives_spanish:
  - mancharán los altares
  - ensuciarán los altares
  lexicon: LSJ
  rationale: «Contaminar» reproduce la contaminación ritual de μιαίνω con un español claro; «altares» refleja el plural griego.
- source_word: τὸν νόμον ἀθετήσετε
  english_pob_choice: you will set aside the law
  chosen_spanish: dejarán de lado la ley
  alternatives_spanish:
  - rechazarán la ley
  - anularán la ley
  lexicon: LSJ
  rationale: «Dejar de lado» sigue la decisión inglesa de no cargar inmediatamente un tecnicismo mayor, pero sí expresar abandono real de la ley.
- source_word: λόγους προφητῶν ἐξουδενώσετε
  english_pob_choice: treat the words of the prophets with contempt
  chosen_spanish: tratarán con desprecio las palabras de los profetas
  alternatives_spanish:
  - despreciarán las palabras de los profetas
  lexicon: LSJ
  rationale: La frase completa en español conserva la fuerza de desprecio y deja claro el objeto verbal («las palabras»), como en el inglés auditado.
- source_word: ἐν διαστροφῇ κακῇ
  english_pob_choice: in evil perversity
  chosen_spanish: en una perversión mala
  alternatives_spanish:
  - en mala perversidad
  - con perversidad malvada
  lexicon: LSJ
  rationale: Mantengo la aspereza semántica del griego y del inglés, aunque suene tenso en español; «perversión mala» preserva la redundancia moral sin suavizarla.
- source_word: διώξετε
  english_pob_choice: you will persecute
  chosen_spanish: Perseguirán
  alternatives_spanish:
  - acosarán
  - hostigarán
  lexicon: LSJ
  rationale: «Perseguirán» transmite hostilidad sostenida y encaja con el contraste justo/piadoso del pasaje.
- source_word: εὐσεβεῖς
  english_pob_choice: the godly
  chosen_spanish: a los piadosos
  alternatives_spanish:
  - a los devotos
  - a los temerosos de Dios
  lexicon: LSJ
  rationale: «Piadosos» es un equivalente natural y solemne en español; conserva el tono religioso sin agregar una glosa.
- source_word: ἀληθινῶν λόγους βδελύξεσθε
  english_pob_choice: you will loathe the words of the truthful
  chosen_spanish: aborrecerán las palabras de los veraces
  alternatives_spanish:
  - abominarán las palabras de los sinceros
  - detestarán las palabras de los veraces
  lexicon: LSJ
  rationale: 'Sigo la decisión inglesa de mantener el matiz personal y verbal: no solo «verdad» abstracta, sino «los veraces» y sus palabras.'
- source_word: ἄνδρα καινοποιοῦντα ... νόμον
  english_pob_choice: a man who renews the law
  chosen_spanish: a un hombre que renueva la ley
  alternatives_spanish:
  - a un hombre que hace nueva la ley
  - a un reformador de la ley
  lexicon: LSJ
  rationale: «Renueva la ley» refleja el verbo de hacer nuevo sin imponer una terminología doctrinal posterior; conserva la ambigüedad hostil del texto.
- source_word: ἐν δυνάμει ὑψίστου
  english_pob_choice: in the power of the Most High
  chosen_spanish: en el poder del Altísimo
  alternatives_spanish:
  - por el poder del Altísimo
  lexicon: LSJ
  rationale: La forma elegida mantiene el instrumental y el título divino con naturalidad en español.
- source_word: πλάνον προσαγορεύσετε
  english_pob_choice: you will call a deceiver
  chosen_spanish: lo llamarán engañador
  alternatives_spanish:
  - lo llamarán impostor
  - lo llamarán seductor
  lexicon: LSJ
  rationale: «Engañador» conserva el juicio hostil directo del texto y funciona bien como acusación.
- source_word: ὁρμήσετε τοῦ ἀποκτεῖναι
  english_pob_choice: you will rush to kill
  chosen_spanish: se precipitarán a matarlo
  alternatives_spanish:
  - se lanzarán a matarlo
  - irán con ímpetu a matarlo
  lexicon: LSJ
  rationale: «Se precipitarán» reproduce la violencia súbita del giro griego sin sobreexplicar el modo.
- source_word: ἀνάστημα
  english_pob_choice: stature
  chosen_spanish: estatura
  alternatives_spanish:
  - true worth
  - majestad
  lexicon: LSJ
  rationale: Conservo la literalidad de la lectura textual difícil; «estatura» deja abierta la posibilidad de sentido físico o figurado, como en el inglés auditado.
- source_word: ἀθῷον αἷμα ... ἀναδεχόμενοι
  english_pob_choice: taking innocent blood upon your heads
  chosen_spanish: cargando sobre sus cabezas sangre inocente
  alternatives_spanish:
  - trayendo sangre inocente sobre sus cabezas
  - asumiendo culpa por sangre inocente
  lexicon: LSJ
  rationale: La construcción preserva la fórmula bíblica de culpa sobre la cabeza en un español natural y solemne.
- source_word: τὰ ἅγια ὑμῶν
  english_pob_choice: your holy places
  chosen_spanish: sus lugares santos
  alternatives_spanish:
  - sus santuarios
  - sus cosas santas
  lexicon: LSJ
  rationale: «Lugares santos» respeta el plural cultual y evita reducirlo a un solo santuario cuando el griego es más amplio.
- source_word: ἔρημα ἕως ἐδάφους
  english_pob_choice: laid waste to the ground
  chosen_spanish: quedarán desolados hasta el suelo
  alternatives_spanish:
  - quedarán arrasados hasta el suelo
  - serán devastados por completo
  lexicon: LSJ
  rationale: «Hasta el suelo» conserva el énfasis total de devastación, con un español fluido y directo.
- source_word: τόπος ... καθαρὸς
  english_pob_choice: clean place
  chosen_spanish: un lugar limpio
  alternatives_spanish:
  - un lugar puro
  - un lugar purificado
  lexicon: LSJ
  rationale: «Limpio» reproduce el lenguaje de pureza cultual con una palabra simple y comprensible; no todo contexto requiere «puro».
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  lexicon: LSJ
  rationale: Sigo la preferencia del POB inglés por «nations» para no importar automáticamente la oposición técnica «judíos/gentiles» donde el texto no la exige.
- source_word: εἰς κατάραν καὶ εἰς διασκορπισμόν
  english_pob_choice: for a curse and for scattering
  chosen_spanish: para maldición y para dispersión
  alternatives_spanish:
  - para maldecición y dispersión
  - como maldición y dispersión
  lexicon: LSJ
  rationale: La pareja nominal se mantiene visible, como en el inglés, para conservar el ritmo profético y la dureza del anuncio.
- source_word: ἐπισκέψηται
  english_pob_choice: visits again
  chosen_spanish: vuelva a visitar
  alternatives_spanish:
  - visite de nuevo
  - vuelva
  lexicon: LSJ
  rationale: «Vuelva a visitar» preserva la idea de visita con repetición, sin cerrar el referente; la ambigüedad se mantiene para el lector.
- source_word: οἰκτειρήσῃ καὶ προσδέξηται
  english_pob_choice: shows compassion and receives you
  chosen_spanish: tenga compasión y los reciba
  alternatives_spanish:
  - muestre compasión y los acepte
  - tenga misericordia y los reciba
  lexicon: LSJ
  rationale: «Tenga compasión» y «los reciba» expresan misericordia y restauración sin perder el movimiento de acogida del griego.
theological_decisions:
- issue: El pasaje intermedio sobre «un hombre que renueva la ley» es textualmente complejo y podría reflejar expansión posterior o interpolación.
  english_pob_reading: Included the bracketed material in the main text, translated straightforwardly, with a footnote noting textual complexity.
  chosen_spanish_reading: Se incluye el material en el cuerpo principal, traducido de manera directa, con una nota que advierte su complejidad textual.
  alternative_spanish_readings:
  - Omitir el tramo por considerarlo secundario
  - Reformularlo en términos mesiánicos explícitos
  rationale: Sigo el testimonio griego presentado en vez de suprimirlo. La nota permite transparencia sobre la posible inestabilidad textual sin resolverla artificialmente.
  doctrine_reference: 'PHILOSOPHY.md: traducir honestamente el testimonio griego y usar notas para probable interpolación o expansión.'
- issue: El referente de αὐτός en la cláusula final («hasta que él mismo vuelva a visitar») es ambiguo.
  english_pob_reading: Rendered as 'he himself' without identifying the referent in the main text.
  chosen_spanish_reading: Se mantiene «él mismo» sin identificar el referente en el texto principal.
  alternative_spanish_readings:
  - Dios mismo volverá a visitar
  - el hombre mencionado volverá a visitar
  rationale: La ambigüedad forma parte del testimonio y no debe resolverse prematuramente; la nota informa las posibilidades sin cerrar la lectura.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'Se revisó el material con base en la última pasada del modelo y en el resumen de cruzado: no se reportaron cambios aplicados, así que la redacción española mantiene la lectura completa del testimonio griego, incluyendo el tramo textual difícil y la ambigüedad final, con notas para no resolver indebidamente las tensiones.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general solo cuando aparezca el nombre divino explícito; en este pasaje no aparece.
  - Se conserva «ley», «sacerdocio», «altares» y «lugares santos» para sostener el registro cultual.
  - «Piadosos», «justos» y «veraces» se distinguen para reflejar tres grupos/rasgos del paralelismo.
  - Se evitó reemplazar la ambigüedad del texto por formulaciones doctrinalmente cerradas.
  - Las notas usan marcadores únicos y cada uno está anclado en el texto donde corresponde.
