base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/016.yaml
  text: 'And now I know that for seventy weeks you will go astray[16:3], and you will profane the priesthood and defile the altars. And you will set aside the law and treat the words of the prophets with contempt in evil perversity. You will persecute righteous men, and you will hate the godly; you will loathe the words of the truthful.


    And a man who renews the law in the power of the Most High you will call a deceiver, and at last you will rush to kill him, not knowing his stature, taking innocent blood upon your heads in wickedness.


    But I tell you that because of him your holy places will be laid waste to the ground. And no clean place will remain for you, but you will be among the nations of the earth for a curse and for scattering[16:5][16:3][16:3], until he himself visits again and shows compassion and receives you.'
  footnotes:
  - marker: '16:3'
    text: The Greek text of this sentence is difficult and shows signs of textual disturbance. The translation follows the witness provided, but the wording may reflect expansion or later interpolation.
    reason: textual_variant
  - marker: '16:3'
    text: Or 'a man making the law new.' The phrase could be heard as hostile accusation against a reforming figure.
    reason: lexical_alternative
  - marker: '16:3'
    text: '''His stature'' is literal; the sense may be ''his true worth'' or ''his majesty.'''
    reason: lexical_alternative
  - marker: '16:5'
    text: The subject of 'he himself visits again' may be understood as God, or possibly as the previously mentioned figure; the Greek does not force a single interpretation.
    reason: alternative_reading
