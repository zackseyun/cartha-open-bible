translation:
  language: es
  text: Y así llegamos a Hebrón para quedarnos allí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ Γοὕτως
  english_pob_choice: And so
  chosen_spanish: Y así
  alternatives_spanish:
  - Y de esta manera
  - Así pues
  lexicon: καί; οὕτως
  rationale: La combinación introductoria expresa continuación narrativa y resultado. «Y así» reproduce con naturalidad el enlace y el matiz consecutivo sin sobrecargar el estilo.
- source_word: ἤλθομεν
  english_pob_choice: we came
  chosen_spanish: llegamos
  alternatives_spanish:
  - vinimos
  - fuimos
  lexicon: ἔρχομαι
  rationale: En este contexto de movimiento hacia un lugar concreto, «llegamos» comunica mejor la llegada efectiva a Hebrón y suena natural en español.
- source_word: εἰς Χεβρὼν
  english_pob_choice: to Hebron
  chosen_spanish: a Hebrón
  alternatives_spanish:
  - a Hebrón
  lexicon: εἰς + acusativo
  rationale: La preposición de dirección se vierte normalmente con «a» en español. Se conserva el topónimo tradicional Hebrón.
- source_word: τοῦ καταμεῖναι ἐκεῖ
  english_pob_choice: to stay there
  chosen_spanish: para quedarnos allí
  alternatives_spanish:
  - para permanecer allí
  - para alojarnos allí
  lexicon: καταμένω
  rationale: El pasaje pide una finalidad con un verbo de permanencia. «Quedarnos allí» sigue bien el ajuste editorial inglés de «stay» frente a «remain», conservando naturalidad y el sentido de permanencia en el lugar.
theological_decisions:
- issue: Matiz de permanencia vs. mera visita
  english_pob_reading: to stay there
  chosen_spanish_reading: para quedarnos allí
  alternative_spanish_readings:
  - para permanecer allí
  - para residir allí
  rationale: 'No hay tensión doctrinal fuerte, pero sí una decisión semántica: el griego indica quedarse con permanencia temporal, no solo pasar por el lugar. «Quedarnos» conserva ese valor sin volverlo demasiado solemne.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que cambió «remain» por «stay» para reflejar mejor καταμεῖναι. La traducción española adopta esa misma preferencia semántica con «quedarnos».
  spanish_consistency_notes:
  - Se mantuvo un español neutral, moderno y bíblicamente digno.
  - Se conservó el topónimo Hebrón en su forma habitual en español.
  - No se añadieron notas porque el verso es breve y no presenta variantes relevantes en la redacción española.
