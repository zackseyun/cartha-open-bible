base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/009/008.yaml
  text: 'And every day he was instructing me, and being occupied with me, he said to me:'
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: 'Adjusted the wording to better match the source: rendered συνετίζων as "was instructing" and ἀσχολούμενος εἰς ἐμὲ as "being occupied with me," while keeping the direct address "said to me."'
translation:
  language: es
  text: 'Y cada día me instruía, y ocupándose de mí, me decía:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνετίζων
  english_pob_choice: was instructing
  chosen_spanish: me instruía
  alternatives_spanish:
  - me estaba instruyendo
  - me daba instrucción
  lexicon: συνετίζω
  rationale: El participio imperfectivo pide una acción continuada o reiterada; en español, «me instruía» comunica bien esa enseñanza diaria sin sonar forzado. Se evita añadir contenido como «sobre ofrendas voluntarias», que no está en este segmento griego.
- source_word: καθ᾽ ἑκάστην ἡμέραν
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - todos los días
  - día tras día
  lexicon: καθ᾽ ἑκάστην ἡμέραν
  rationale: «Cada día» conserva la repetición habitual y es natural en español. «Todos los días» también sería válido, pero «cada día» mantiene mejor el paralelismo sobrio del griego.
- source_word: ἀσχολούμενος εἰς ἐμὲ
  english_pob_choice: being occupied with me
  chosen_spanish: ocupándose de mí
  alternatives_spanish:
  - estando ocupado conmigo
  - prestándome atención
  lexicon: ἀσχολέομαι
  rationale: La expresión sugiere dedicación atenta o estar absorbido por la relación con el hablante. «Ocupándose de mí» conserva la idea de dedicación activa sin convertirla en una explicación interpretativa más amplia.
- source_word: ἔλεγέ μοι
  english_pob_choice: said to me
  chosen_spanish: me decía
  alternatives_spanish:
  - me decía a mí
  - me hablaba
  lexicon: λέγω
  rationale: El imperfecto indica habla repetida o continua; «me decía» lo refleja de manera natural. «Me hablaba» sería más general y perdería el matiz de enunciación reiterada.
theological_decisions:
- issue: Repetición e instrucción continua como rasgo narrativo
  english_pob_reading: And every day he was instructing me ... said to me
  chosen_spanish_reading: 'Y cada día me instruía, y ocupándose de mí, me decía:'
  alternative_spanish_readings:
  - 'Y todos los días me instruía, y ocupándose de mí, me decía:'
  - 'Y cada día me estaba instruyendo, y ocupándose de mí, me decía:'
  rationale: No hay doctrina explícita aquí, pero sí una escena de formación continua. La traducción conserva la repetición y la continuidad verbal del griego sin intensificar el sentido más allá del texto.
  doctrine_reference: Ninguna doctrina explícita; preservación aspectual del relato
translation_notes:
  revision_awareness: 'La revisión inglesa ajustó dos puntos: evitó añadir «freewill offerings» y cambió a «was instructing» / «being occupied with me» para ceñirse mejor al griego. El español sigue esa corrección, sin introducir el contenido eliminado y manteniendo el valor imperfectivo de los participios.'
  spanish_consistency_notes:
  - Se mantiene un español neutral, moderno y digno, adecuado para lectura eclesial amplia.
  - Se evita «SEÑOR» u otra sustitución terminológica porque no aparece ningún tetragrámaton ni κύριος en este segmento.
  - «Instruía» y «decía» preservan el aspecto iterativo del imperfecto griego.
  - No se añaden notas al pie porque el segmento no presenta una variante textual o ambigüedad que requiera anclaje en el texto español.
