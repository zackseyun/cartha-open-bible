translation:
  language: es
  text: Y después de dos días, yo y Judas subimos con nuestro padre Jacob a Isaac, nuestro abuelo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ μεθ’ ἡμέρας δύο
  english_pob_choice: And after two days
  chosen_spanish: Y después de dos días
  alternatives_spanish:
  - Y al cabo de dos días
  - Y tras dos días
  lexicon: μετά + acusativo de tiempo; ἡμέρα
  rationale: Conserva la relación temporal simple del griego sin añadir matices interpretativos. ‘Después de dos días’ es claro y directo en español, y refleja bien el valor temporal del original y de la versión inglesa auditada.
- source_word: ἀνέβην
  english_pob_choice: went up
  chosen_spanish: subimos
  alternatives_spanish:
  - fuimos
  - subimos
  lexicon: ἀναβαίνω
  rationale: ‘Subimos’ mantiene la imagen direccional del verbo griego, que normalmente expresa movimiento hacia arriba o hacia un lugar elevado. En español suena natural y conserva mejor la fuerza verbal que un simple ‘fuimos’.
- source_word: ἐγώ καὶ Ἰούδας
  english_pob_choice: I and Judah
  chosen_spanish: yo y Judas
  alternatives_spanish:
  - yo y Judá
  - yo y Judas
  lexicon: Ἰούδας
  rationale: Se conserva el nombre propio según la forma española habitual ‘Judas’, que corresponde al griego Ἰούδας. Aunque el referente bíblico histórico puede asociarse con ‘Judá’, aquí el texto griego y la tradición inglesa auditada usan la forma del nombre en griego.
- source_word: μετὰ τοῦ πατρὸς ἡμῶν Ἰακώβ
  english_pob_choice: with our father Jacob
  chosen_spanish: con nuestro padre Jacob
  alternatives_spanish:
  - junto con nuestro padre Jacob
  - con nuestro padre Jacob
  lexicon: μετά + genitivo; πατήρ
  rationale: ‘Con nuestro padre Jacob’ reproduce la relación acompañante del griego sin sobrecargar la frase. ‘Nuestro padre’ conserva el vínculo familiar explícito del original.
- source_word: πρὸς Ἰσαάκ
  english_pob_choice: to Isaac
  chosen_spanish: a Isaac
  alternatives_spanish:
  - hacia Isaac
  - a Isaac
  lexicon: πρός + acusativo
  rationale: La preposición indica dirección/encuentro; ‘a Isaac’ es la forma más natural en español y suficiente para reflejar el movimiento del grupo.
- source_word: προπάτορα ἡμῶν
  english_pob_choice: our grandfather
  chosen_spanish: nuestro abuelo
  alternatives_spanish:
  - nuestro antepasado
  - nuestro abuelo
  lexicon: προπάτωρ
  rationale: ‘Abuelo’ sigue la elección inglesa y expresa la relación genealógica inmediata de Isaac respecto a Jacob y sus hijos. ‘Antepasado’ sería más literal pero menos específico y menos personal en español.
theological_decisions:
- issue: Tratamiento genealógico de Isaac como ancestro
  english_pob_reading: our grandfather
  chosen_spanish_reading: nuestro abuelo
  alternative_spanish_readings:
  - nuestro antepasado
  - nuestro patriarca
  rationale: No hay tensión doctrinal; la cuestión es de claridad genealógica. ‘Nuestro abuelo’ reproduce la relación transmitida por la versión inglesa auditada y mantiene el carácter familiar del relato.
  doctrine_reference: Genealogía patriarcal en la literatura pseudepigráfica
translation_notes:
  revision_awareness: La revisión inglesa reciente solo eliminó un marcador de nota de pie del texto principal y ajustó ligeramente la puntuación; no alteró el contenido semántico. La redacción española sigue esa misma base sin añadir notas innecesarias.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ en la política general del proyecto solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se conserva un estilo narrativo sobrio y directo, acorde con la traducción inglesa auditada.
  - ‘Judas’ se usa como forma española del nombre griego Ἰούδας en coherencia con el texto fuente.
