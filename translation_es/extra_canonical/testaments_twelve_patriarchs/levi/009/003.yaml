translation:
  language: es
  text: Y cuando llegamos a Betel, mi padre Jacob vio una visión acerca de mí, que yo sería sacerdote para ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Βεθήλ
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bethel
  lexicon: topónimo bíblico
  rationale: Se adapta al uso español bíblico habitual del nombre propio, conservando la referencia geográfica sin añadir explicación innecesaria.
- source_word: ὁ πατήρ μου Ἰακώβ
  english_pob_choice: my father Jacob
  chosen_spanish: mi padre Jacob
  alternatives_spanish:
  - Jacob, mi padre
  - mi padre, Jacob
  lexicon: término de parentesco + nombre propio
  rationale: Mantiene la relación de parentesco y el orden natural en español, sin forzar una estructura más literal que suene menos natural.
- source_word: ὅραμα
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - sueño
  - revelación
  lexicon: sustantivo de experiencia revelatoria
  rationale: '"Visión" reproduce con precisión el tipo de experiencia revelatoria indicada por el griego y coincide con el valor semántico fijado en el texto base inglés.'
- source_word: περὶ ἐμοῦ
  english_pob_choice: about me
  chosen_spanish: acerca de mí
  alternatives_spanish:
  - sobre mí
  - con respecto a mí
  lexicon: preposición relacional
  rationale: '"Acerca de mí" refleja la relación temática de περὶ ἐμοῦ con una formulación natural en español y evita una traducción más rígida o menos fluida.'
- source_word: ἔσομαι
  english_pob_choice: would be
  chosen_spanish: sería
  alternatives_spanish:
  - estaré
  - seré
  lexicon: futuro en discurso indirecto
  rationale: El futuro de indicativo en griego se vierte de manera natural en español con el condicional en contexto de discurso referido, preservando el valor prospectivo respecto de la visión.
- source_word: εἰς ἱερέα
  english_pob_choice: to be a priest to them
  chosen_spanish: sería sacerdote para ellos
  alternatives_spanish:
  - sería sacerdote de ellos
  - sería sacerdote a ellos
  lexicon: preposición de resultado / relación
  rationale: El griego εἰς con acusativo expresa aquí destino o resultado; en español, "sería sacerdote para ellos" comunica esa función relacional de forma idiomática, mientras "a ellos" sonaría artificial.
theological_decisions:
- issue: Función sacerdotal de Levi en la visión
  english_pob_reading: that I would be a priest to them
  chosen_spanish_reading: que yo sería sacerdote para ellos
  alternative_spanish_readings:
  - que yo sería sacerdote de ellos
  - que yo sería sacerdote a ellos
  rationale: Se conserva la afirmación de destino/función sin ampliarla. "Para ellos" mantiene la relación de servicio o mediación sugerida por el griego y por la revisión inglesa, sin introducir matices eclesiásticos posteriores.
  doctrine_reference: Tema levítico / sacerdocio
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente al reflejar περὶ ἐμοῦ como "acerca de mí" y εἰς αὐτοῖς como una relación direccional/funcional expresada naturalmente por "para ellos"; aquí se optó por una formulación española equivalente y fluida sin perder la tensión semántica del original.
  spanish_consistency_notes:
  - Se mantiene "Betel" como topónimo bíblico estándar en español.
  - Se usa "visión" para ὅραμα en consonancia con el texto fuente y la traducción inglesa auditada.
  - Se preserva "sacerdote" como sustantivo de oficio, sin sustituirlo por términos más interpretativos.
  - No se añaden notas al pie porque el texto no presenta una variante textual o ambigüedad que requiera marcación explícita en esta unidad.
