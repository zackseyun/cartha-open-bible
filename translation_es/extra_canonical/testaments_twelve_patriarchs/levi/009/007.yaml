id: T12P.LEV.9.7
reference: Testament of Levi 9:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ ἐδίδασκέ *με²⁷ νόμον ἱερωσύνης²⁸, *θυσιῶν, ὁλοκαυτωμάτων²⁹, *ἀπαρχῶν ἑκουσίου, σωτηρίου³⁰.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/009/007.yaml
  text: And he taught me the law of the priesthood, of sacrifices, of whole burnt offerings, of freewill offerings, and of peace offerings.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: Removed the unattested 'firstfruits' to match the Greek source and preserve completeness without addition.
translation:
  language: es
  text: Y me enseñaba la ley del sacerdocio, de los sacrificios, de los holocaustos, de las ofrendas voluntarias y de las ofrendas de paz.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: νόμον ἱερωσύνης
  english_pob_choice: the law of the priesthood
  chosen_spanish: la ley del sacerdocio
  alternatives_spanish:
  - la ley del ministerio sacerdotal
  - la ley del oficio sacerdotal
  lexicon: νόμος; ἱερωσύνη
  rationale: La frase griega une νόμος con ἱερωσύνη; en español, «ley del sacerdocio» reproduce la relación de posesión/ámbito sin añadir interpretación. «Sacerdocio» conserva el campo institucional mejor que una perífrasis más larga.
- source_word: θυσιῶν
  english_pob_choice: sacrifices
  chosen_spanish: sacrificios
  alternatives_spanish:
  - ofrendas sacrificiales
  - sacrificios rituales
  lexicon: θυσία
  rationale: «Sacrificios» es la equivalencia directa y natural para θυσίαι en español bíblico contemporáneo, sin perder el sentido cultual.
- source_word: ὁλοκαυτωμάτων
  english_pob_choice: whole burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas totalmente
  - ofrendas totalmente quemadas
  lexicon: ὁλοκαύτωμα
  rationale: «Holocaustos» es el término técnico bíblico en español para ofrendas completamente consumidas por fuego. Aunque puede sonar tradicional, es el equivalente más asentado y preciso.
- source_word: ἀπαρχῶν ἑκουσίου
  english_pob_choice: freewill offerings
  chosen_spanish: ofrendas voluntarias
  alternatives_spanish:
  - ofrendas de libre voluntad
  - ofrendas espontáneas
  lexicon: ἀπαρχή; ἑκούσιος
  rationale: El griego transmitido en el testimonio aquí es textualmente difícil; la POB inglesa sigue la lectura contextual de ofrendas hechas voluntariamente. «Ofrendas voluntarias» expresa esa decisión sin introducir «primicias», que la revisión inglesa descartó por no estar atestiguadas en este pasaje.
- source_word: σωτηρίου
  english_pob_choice: peace offerings
  chosen_spanish: ofrendas de paz
  alternatives_spanish:
  - sacrificios de comunión
  - ofrendas de comunión
  lexicon: σωτήριος
  rationale: Para σωτηρίου, la tradición inglesa POB eligió «peace offerings»; en español, «ofrendas de paz» reproduce el valor sacrificial reconocido por la tradición bíblica y evita imponer una reinterpretación devocional distinta. En este contexto cultual, es la forma más transparente y auditable.
theological_decisions:
- issue: La secuencia de categorías sacrificiales debe conservarse sin agregar 'primicias'
  english_pob_reading: The English revision removed 'firstfruits' as unattested in the Greek source, leaving priesthood, sacrifices, whole burnt offerings, freewill offerings, and peace offerings.
  chosen_spanish_reading: la ley del sacerdocio, de los sacrificios, de los holocaustos, de las ofrendas voluntarias y de las ofrendas de paz
  alternative_spanish_readings:
  - '...de las primicias, de las ofrendas voluntarias...'
  rationale: Se sigue la revisión auditada del inglés y el griego disponible. Incluir 'primicias' introduciría un elemento no sustentado por este testimonio y rompería la correspondencia fuente-traducción.
  doctrine_reference: Texto y crítica textual; fidelidad a la fuente
- issue: Mantener el lenguaje sacrificial técnico en vez de suavizarlo a una formulación más general
  english_pob_reading: The verse lists specific sacrificial categories rather than a general statement about worship.
  chosen_spanish_reading: sacrificios, holocaustos, ofrendas voluntarias y ofrendas de paz
  alternative_spanish_readings:
  - actos de culto
  - ofrendas religiosas
  rationale: El pasaje enumera clases de ofrenda del sistema levítico. Una traducción genérica perdería la precisión cultual del texto y su estructura enumerativa.
  doctrine_reference: Culto levítico y terminología sacrificial
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó 'firstfruits' por no estar atestiguado en el griego; la versión española sigue esa decisión y conserva la enumeración completa sin añadir elementos. No se requieren notas textuales adicionales porque el griego y la revisión convergen en la misma lista final.
  spanish_consistency_notes:
  - Se usa 'holocaustos' como término técnico sacrificial, coherente con el registro bíblico español.
  - Se evita 'Cristo/Señor' u otra terminología no presente en el verso.
  - La coordinación 'de ... de ... y de ...' conserva el paralelismo del original griego.
  - '''ofrendas de paz'' sigue la elección POB inglesa para σωτηρίου sin introducir una paráfrasis teológica.'
