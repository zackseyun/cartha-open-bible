base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/009/010.yaml
  text: Therefore take for yourself a wife while you are still young, one who has no blemish or defilement, and not from the stock of foreign nations.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: Tightened the wording to reflect both μῶμον and βεβηλωμένην more fully by rendering them as 'no blemish or defilement.'
translation:
  language: es
  text: Por tanto, toma para ti una esposa mientras aún eres joven, una que no tenga mancha ni profanación, y no sea del linaje de naciones extranjeras.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Λαβὲ οὖν σεαυτῷ ... γυναῖκα
  english_pob_choice: take for yourself a wife
  chosen_spanish: toma para ti una esposa
  alternatives_spanish:
  - cásate
  - toma una mujer para ti
  lexicon: λαμβάνω; γυνή
  rationale: El griego usa un mandato directo con λαβέ y γυναῖκα. En español, 'toma para ti una esposa' conserva la fuerza imperativa y el matiz relacional sin añadir una formulación más interpretativa como 'cásate', que desplaza el énfasis del acto de tomar a la decisión matrimonial.
- source_word: ἔτι νέος ὤν
  english_pob_choice: while you are still young
  chosen_spanish: mientras aún eres joven
  alternatives_spanish:
  - siendo aún joven
  - todavía joven
  lexicon: νέος
  rationale: '''Mientras aún eres joven'' reproduce bien la circunstancia temporal del participio y mantiene el tono exhortativo. Evita sobreinterpretar una edad exacta.'
- source_word: μὴ ἔχουσαν μῶμον μήτε βεβηλωμένην
  english_pob_choice: one who has no blemish or defilement
  chosen_spanish: una que no tenga mancha ni profanación
  alternatives_spanish:
  - una que no tenga defecto ni esté profanada
  - una sin mancha ni contaminación
  lexicon: μῶμος; βεβηλόω
  rationale: Se distinguen los dos términos griegos con dos sustantivos españoles coordinados. 'Mancha' refleja bien μῶμος en sentido de defecto o mancha moral; 'profanación' preserva el valor de βεβηλωμένην como estado de haber sido profanada o contaminada ritualmente/moralmente. 'Profanación' evita aplanar la tensión entre impureza moral y ritual.
- source_word: ἀπὸ γένους ἀλλοφύλων ἐθνῶν
  english_pob_choice: not from the stock of foreign nations
  chosen_spanish: no sea del linaje de naciones extranjeras
  alternatives_spanish:
  - no provenga del linaje de pueblos extranjeros
  - no sea de la descendencia de naciones extranjeras
  lexicon: γένος; ἀλλόφυλος; ἔθνος
  rationale: '''Linaje'' traduce γένους y conserva el sentido de origen familiar/étnico. ''Naciones extranjeras'' reproduce ἐθνῶν con la cualidad de ''other-tribe/foreign'' de ἀλλοφύλων; aunque la combinación suena compacta, refleja fielmente la construcción del griego y la lectura inglesa auditada sin diluir el marcador étnico.'
theological_decisions:
- issue: Pureza de la esposa buscada
  english_pob_reading: one who has no blemish or defilement
  chosen_spanish_reading: una que no tenga mancha ni profanación
  alternative_spanish_readings:
  - una sin mancha ni contaminación
  - una que no esté contaminada
  rationale: 'La redacción conserva dos dimensiones del estado requerido: ausencia de defecto y ausencia de profanación. No se reduce a mera ''pureza'' porque el griego distingue μῶμος y βεβηλωμένην, y la revisión inglesa también quiso reflejar ambos términos.'
  doctrine_reference: Pureza ritual y moral en lenguaje de santidad; no se formula como doctrina sistemática, sino como requisito narrativo/parenético.
- issue: Restricción étnica en el matrimonio
  english_pob_reading: not from the stock of foreign nations
  chosen_spanish_reading: no sea del linaje de naciones extranjeras
  alternative_spanish_readings:
  - no provenga del linaje de pueblos extranjeros
  - no sea de la descendencia de naciones extranjeras
  rationale: Se mantiene el alcance étnico-expresivo del texto, sin suavizarlo a una mera diferencia cultural. El griego emplea lenguaje de origen y extranjería, y la traducción española debe dejar visible esa tensión.
  doctrine_reference: Identidad del pueblo y separación frente a pueblos ajenos; marco de pureza/comunidad en literatura testamentaria.
translation_notes:
  revision_awareness: La versión inglesa fue revisada para fortalecer la correspondencia con μῶμον y βεβηλωμένην, pasando de 'one having no blemish and not defiled' a 'one who has no blemish or defilement'. La española sigue esa decisión y también conserva la restricción de origen étnico del cierre.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto solo cuando aparece el nombre divino; aquí no aplica.
  - Se evita 'Cristo'/'Mesías' porque no hay título mesiánico en el verso.
  - Se mantiene un registro digno y público, sin calco excesivo del inglés.
  - '''Profanación'' se eligió para conservar la fuerza de βεβηλωμένην sin convertirlo en una mera redundancia de ''mancha''.'
