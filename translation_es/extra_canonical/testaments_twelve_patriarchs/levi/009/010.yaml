source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: '*Λαβὲ οὖν σεαυτῷ⁴² *γυναῖκα, ἔτι⁴³ νέος ὤν, *μὴ ἔχουσαν μῶμον μήτε βεβηλωμένην, μήτε ἀπὸ γένους⁴⁴ ἀλλοφύλων⁴⁵ ἐθνῶν.'
