translation:
  language: es
  text: Y antes de entrar en las cosas santas, lávate; y al sacrificar, lávate; y otra vez, al terminar el sacrificio, lávate.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πρὸ τοῦ εἰσελθεῖν σε εἰς τὰ ἅγια
  english_pob_choice: before you enter into the holy things
  chosen_spanish: antes de entrar en las cosas santas
  alternatives_spanish:
  - antes de entrar en el santuario
  - antes de entrar en lo santo
  lexicon: πρὸ + infinitivo; τὰ ἅγια
  rationale: Se conserva el valor temporal de πρὸ y el plural concreto de τὰ ἅγια. ‘Las cosas santas’ evita estrechar indebidamente el referente a un lugar específico si el griego apunta a los objetos/ámbitos santos en general.
- source_word: λούου
  english_pob_choice: wash
  chosen_spanish: lávate
  alternatives_spanish:
  - lava
  - purifícate
  lexicon: λούω
  rationale: El imperativo reflexivo en español expresa con naturalidad la acción requerida al sujeto, manteniendo el sentido básico de lavar sin añadir interpretación ritual explícita que el griego no verbaliza aquí.
- source_word: ἐν τῷ θύειν σε
  english_pob_choice: when you sacrifice
  chosen_spanish: al sacrificar
  alternatives_spanish:
  - cuando sacrifices
  - cuando ofrezcas el sacrificio
  lexicon: θύω
  rationale: ‘Al sacrificar’ reproduce la circunstancia repetida del griego con fluidez y sin forzar un complemento que el texto no da. Se evita añadir ‘delante de él’ porque no está en este verso base.
- source_word: νίπτου
  english_pob_choice: wash
  chosen_spanish: lávate
  alternatives_spanish:
  - lava
  - lava tus manos
  lexicon: νίπτω
  rationale: Se mantiene la repetición de la orden de lavarse. No se especifican ‘manos’ porque el griego no lo hace en este versículo; esa ampliación pertenecería a otra tradición textual o interpretación.
- source_word: ἀπαρτίζων πάλιν τὴν θυσίαν
  english_pob_choice: when you finish the sacrifice
  chosen_spanish: al terminar el sacrificio
  alternatives_spanish:
  - cuando completes el sacrificio
  - al concluir de nuevo el sacrificio
  lexicon: ἀπαρτίζω; θυσία
  rationale: ‘Al terminar’ comunica el cierre de la acción con naturalidad. ‘El sacrificio’ conserva el sustantivo singular del griego. ‘Otra vez’ traduce πάλιν y mantiene la reiteración.
theological_decisions:
- issue: Repetición triple de la purificación antes, durante y después del acto sagrado
  english_pob_reading: And before you enter into the holy things, wash; and when you sacrifice, wash; and again, when you finish the sacrifice, wash.
  chosen_spanish_reading: Y antes de entrar en las cosas santas, lávate; y al sacrificar, lávate; y otra vez, al terminar el sacrificio, lávate.
  alternative_spanish_readings:
  - Y antes de entrar en el santuario, lávate; y cuando ofrezcas el sacrificio, lávate; y de nuevo, al concluirlo, lávate.
  rationale: La formulación conserva la insistencia ritual del texto y no suaviza la repetición. Tampoco introduce una explicación doctrinal sobre purificación sacerdotal que el verso no desarrolla explícitamente.
  doctrine_reference: Pureza ritual / disciplina cultual en contexto levítico
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó el pasaje para reflejar con más cercanía la serie de mandatos de lavado. En español se sigue esa misma lectura sobria y repetitiva, sin incorporar añadidos como ‘en la presencia de él’ o ‘manos’ que no aparecen en el griego base de este registro.
  spanish_consistency_notes:
  - Se mantiene ‘lávate’ de forma consistente para ambos verbos de lavado.
  - Se conserva ‘cosas santas’ para τὰ ἅγια, evitando alternar con ‘santuario’ dentro del mismo versículo.
  - ‘Otra vez’ traduce πάλιν y mantiene la repetición de la instrucción final.
  - No se introduce ‘Yahvé’ porque este versículo no contiene el nombre divino en el texto base presentado.
