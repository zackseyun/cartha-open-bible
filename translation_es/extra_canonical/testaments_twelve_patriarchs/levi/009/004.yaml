  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ ἀναστὰς¹⁴ *τῷ πρωὶ¹⁵ *ἀπεδεκάτωσε πάντα¹⁶ δι’ ἐμοῦ ῾τῷ Κυρίῳ’¹⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/009/004.yaml
  text: And rising early in the morning, he tithed everything through me to the Lord.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: Changed ‘gave a tenth of everything’ to the more direct ‘tithed everything’ to better match ἀπεδεκάτωσε πάντα; retained the rest.
translation:
  language: es
  text: Y levantándose de madrugada, diezmo todo por medio de mí para Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἀναστὰς τῷ πρωὶ
  english_pob_choice: And rising early in the morning
  chosen_spanish: Y levantándose de madrugada
  alternatives_spanish:
  - Y levantándose por la mañana temprano
  - Y al levantarse muy de mañana
  lexicon: ἀναστὰς; τῷ πρωὶ
  rationale: ἀναστὰς expresa la acción de levantarse, y τῷ πρωὶ indica la mañana temprana. 'De madrugada' comunica bien la prontitud sin sonar demasiado literal ni forzado en español.
- source_word: ἀπεδεκάτωσε
  english_pob_choice: he tithed
  chosen_spanish: diezmo
  alternatives_spanish:
  - dio el diezmo
  - pagó el diezmo
  lexicon: ἀπεδεκάτωσε
  rationale: El verbo griego es un aoristo causativo con el sentido de 'dar el diezmo' o 'diezmar'. En español, 'diezmó' puede sonar ambiguo, mientras que 'diezmo' mantiene la idea cultual con naturalidad en esta construcción.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo cuanto
  lexicon: πάντα
  rationale: '''Todo'' reproduce la totalidad sin añadir matiz. Se conserva la amplitud del griego sin expandirla innecesariamente.'
- source_word: δι’ ἐμοῦ
  english_pob_choice: through me
  chosen_spanish: por medio de mí
  alternatives_spanish:
  - a través de mí
  - por mi mediación
  lexicon: δι’ ἐμοῦ
  rationale: La preposición con genitivo aquí expresa mediación/instrumentalidad. 'Por medio de mí' es claro, preciso y evita un calco menos idiomático.
- source_word: τῷ Κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - al Señor
  - para el Señor
  lexicon: Κύριος
  rationale: Aunque el texto griego dice Κύριος, en este proyecto el nombre divino se rinde normalmente como 'Yahvé'. Aquí el contexto de ofrenda/diezmo cultual favorece tratarlo como referencia al nombre divino, no como un simple título genérico.
theological_decisions:
- issue: Render of Κύριος in a cultic/offering context
  english_pob_reading: to the Lord
  chosen_spanish_reading: para Yahvé
  alternative_spanish_readings:
  - al Señor
  - para el Señor
  rationale: La fórmula griega con artículo y mayúscula remite al Dios de Israel, y el marco de diezmo sostiene la identificación con el nombre divino. Se evita la sustitución por 'Señor' como máscara convencional para preservar la transparencia del texto fuente.
  doctrine_reference: Nombre divino en la traducción POB; uso contextual de Κύριος para el Dios de Israel
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'gave a tenth of everything' por 'tithed everything' para ajustarse mejor a ἀπεδεκάτωσε πάντα. La versión española sigue esa decisión con una construcción directa de diezmo/diezmar, sin reintroducir una paráfrasis más amplia.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal del nombre divino, conforme al estándar del proyecto.
  - '''Por medio de mí'' conserva la mediación de δι’ ἐμοῦ sin sobreinterpretarla.'
  - 'La secuencia verbal intenta reproducir el ritmo narrativo breve del griego: acción, circunstancia temporal, acto cultual, destinatario.'
