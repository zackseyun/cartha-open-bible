source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Πρόσεχε³⁴ σεαυτῷ³⁵ ἀπὸ τοῦ πνεύματος τῆς πορνείας. τοῦτο γὰρ³⁶ †ἐνδελεχῆ ἐστιν†³⁷ *καὶ μέλλει μιαίνειν³⁸ διὰ³⁹ τοῦ σπέρματός σου⁴⁰ *τὰ ἅγια⁴¹.
