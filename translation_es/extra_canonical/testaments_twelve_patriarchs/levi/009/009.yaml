translation:
  language: es
  text: Ten cuidado contigo mismo[a] del espíritu de la inmoralidad sexual, porque este es persistente y está por contaminar las cosas santas por medio de tu descendencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «Presta atención a ti mismo».
    reason: alternative_reading
lexical_decisions:
- source_word: Πρόσεχε σεαυτῷ
  english_pob_choice: Take heed to yourself
  chosen_spanish: Ten cuidado contigo mismo
  alternatives_spanish:
  - Presta atención a ti mismo
  - Cuídate a ti mismo
  lexicon: προσέχω; σεαυτῷ
  rationale: Expresa el imperativo de vigilancia personal con un español natural y directo. «Ten cuidado contigo mismo» conserva la fuerza exhortativa sin sonar arcaico ni excesivamente interpretativo.
- source_word: πνεύματος τῆς πορνείας
  english_pob_choice: the spirit of sexual immorality
  chosen_spanish: el espíritu de la inmoralidad sexual
  alternatives_spanish:
  - el espíritu de fornicación
  - el espíritu de inmoralidad sexual
  lexicon: πνεῦμα; πορνεία
  rationale: Se mantiene «espíritu» por la fuerza personal/impulsora del término, y «inmoralidad sexual» por ser una equivalencia amplia y comprensible en español moderno, evitando restringir innecesariamente πορνεία a un solo acto.
- source_word: ἐνδελεχῆ
  english_pob_choice: persistent
  chosen_spanish: persistente
  alternatives_spanish:
  - constante
  - perseverante
  - incesante
  lexicon: ἐνδελεχής
  rationale: La palabra griega comunica continuidad o persistencia. «Persistente» reproduce bien esa cualidad en español sin introducir una interpretación más específica que el texto no obliga a afirmar.
- source_word: μέλλει μιαίνειν
  english_pob_choice: is about to defile
  chosen_spanish: está por contaminar
  alternatives_spanish:
  - va a contaminar
  - está a punto de contaminar
  lexicon: μέλλω; μιαίνω
  rationale: «Está por» conserva la proximidad futura de μέλλει, y «contaminar» comunica la profanación/impureza moral de μιαίνειν en un registro natural para el lector español.
- source_word: τὰ ἅγια
  english_pob_choice: the holy things
  chosen_spanish: las cosas santas
  alternatives_spanish:
  - lo santo
  - los objetos santos
  - las cosas sagradas
  lexicon: ἅγιος
  rationale: «Las cosas santas» preserva el plural concreto del griego y evita reemplazarlo por una abstracción que borre la referencia a realidades sagradas específicas.
- source_word: διὰ τοῦ σπέρματός σου
  english_pob_choice: through your offspring
  chosen_spanish: por medio de tu descendencia
  alternatives_spanish:
  - a través de tu descendencia
  - mediante tu descendencia
  - por tu descendencia
  lexicon: σπέρμα
  rationale: «Descendencia» es la opción más clara y reverente en español para σπέρμα en este contexto genealógico. «Por medio de» expresa el canal instrumental del griego mejor que una simple relación posesiva.
theological_decisions:
- issue: La frase «espíritu de la inmoralidad sexual» puede sugerir una entidad personal o una influencia moral.
  english_pob_reading: the spirit of sexual immorality
  chosen_spanish_reading: el espíritu de la inmoralidad sexual
  alternative_spanish_readings:
  - la inclinación a la inmoralidad sexual
  - el impulso de inmoralidad sexual
  rationale: Se conserva «espíritu» porque el griego πνεῦμα y la lectura POB sostienen la imagen de una fuerza/influencia que actúa de forma persistente. Cambiarlo a «inclinación» o «impulso» suavizaría esa tensión textual.
  doctrine_reference: Testamento de Leví 9:9; lectura lexical de πνεῦμα
- issue: «Las cosas santas» plantea si se trata del santuario, las ofrendas, o realidades sagradas en general.
  english_pob_reading: the holy things
  chosen_spanish_reading: las cosas santas
  alternative_spanish_readings:
  - el santuario
  - las cosas sagradas
  rationale: El griego usa un plural neutro amplio; «las cosas santas» conserva esa amplitud sin concretar indebidamente a un único referente. La frase deja abierta la tensión referencial que el texto no resuelve explícitamente.
  doctrine_reference: Testamento de Leví 9:9; sustantivo neutro plural τὰ ἅγια
- issue: «Por medio de tu descendencia» mantiene la idea de transmisión a través de la línea genealógica y no solo una acción indirecta.
  english_pob_reading: through your offspring
  chosen_spanish_reading: por medio de tu descendencia
  alternative_spanish_readings:
  - a través de tu descendencia
  - mediante tu descendencia
  rationale: La formulación enfatiza la mediación genealógica que el griego διὰ con genitivo permite, y conserva la seriedad de la advertencia sobre contaminación transmitida por la descendencia.
  doctrine_reference: Testamento de Leví 9:9; preposición διά con genitivo
translation_notes:
  revision_awareness: La revisión más reciente eliminó una nota insertada en el cuerpo del texto inglés y afinó la cláusula final para conservar la persistencia y la idea de contaminación de las cosas santas por medio de la descendencia. La redacción española sigue esa revisión, evitando paréntesis interpretativos en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «espíritu» para πνεῦμα y no se lo redujo a mera actitud, siguiendo la tensión lexical del fuente y la práctica POB.
  - Se eligió «inmoralidad sexual» en lugar de un término más estrecho como «fornicación» para abarcar el alcance lexical de πορνεία.
  - «Las cosas santas» conserva el plural del griego τὰ ἅγια y evita singularizar o especificar sin base textual.
  - Se usó «descendencia» para σπέρμα por su claridad genealógica en español y por respetar el canal instrumental de διά.
