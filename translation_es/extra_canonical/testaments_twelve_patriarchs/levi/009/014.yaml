id: T12P.LEV.9.14
reference: Testament of Levi 9:14
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ *παντὸς πρωτογεννήματός σου⁶⁰ καὶ οἴνου⁶¹ πρόσφερε *ἀπαρχὰς εἰς θυσίαν Κυρίῳ⁶² Γτῷ θεῷ⁶³⁾. *Καὶ πᾶσαν θυσίαν ἅλατι ἁλιεῖς⁶⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/009/014.yaml
  text: And of all your first produce and of wine offer firstfruits as a sacrifice to the Lord God. And every sacrifice you shall salt with salt.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: Removed the article before ‘Lord God’ to better match the source and keep the divine title tighter; otherwise retained the draft.
translation:
  language: es
  text: Y de todos los primeros frutos de tu tierra y del vino ofrece las primicias como sacrificio a Yahvé, Dios. Y toda ofrenda la sazonarás con sal.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παντὸς πρωτογεννήματός σου
  english_pob_choice: all your first produce
  chosen_spanish: todos los primeros frutos de tu tierra
  alternatives_spanish:
  - todo tu primer producto
  - toda tu primera cosecha
  lexicon: πρωτογέννημα
  rationale: La idea es de la primera producción, especialmente agrícola. En español, 'primeros frutos' comunica bien la noción de primicias sin forzar un calco técnico. Añadí 'de tu tierra' para hacer explícita la referencia implícita al fruto producido por la tierra, coherente con el contexto sacrificial.
- source_word: οἴνου
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - mosto
  lexicon: οἶνος
  rationale: '''Vino'' es la equivalencia directa y natural en español bíblico para οἶνος.'
- source_word: ἀπαρχὰς
  english_pob_choice: firstfruits
  chosen_spanish: las primicias
  alternatives_spanish:
  - los primeros frutos
  - la ofrenda de primicias
  lexicon: ἀπαρχή
  rationale: '''Primicias'' preserva el término cultual y su fuerza sacrificial. En este contexto funciona como ofrenda, por eso lo mantengo sin expandir excesivamente en el texto principal.'
- source_word: Κυρίῳ θεῷ
  english_pob_choice: the Lord God
  chosen_spanish: Yahvé, Dios
  alternatives_spanish:
  - el Señor Dios
  - al Señor Dios
  lexicon: κύριος / θεός
  rationale: El paquete fuente combina κύριος con θεός, y la norma del proyecto exige Yahvé para el nombre divino. 'Dios' mantiene el segundo título sin ocultar la forma original. Omití el artículo antes de 'Dios' para conservar la concisión del título, en línea con la revisión inglesa.
- source_word: πᾶσαν θυσίαν
  english_pob_choice: every sacrifice
  chosen_spanish: toda ofrenda
  alternatives_spanish:
  - todo sacrificio
  - toda sacrificio
  lexicon: θυσία
  rationale: '''Ofrenda'' permite un español más fluido y amplio para θυσία en este mandato ritual; ''sacrificio'' también sería posible, pero ''ofrenda'' evita una repetición pesada con el verbo sacrificial anterior. El sentido cultual se mantiene por el contexto.'
- source_word: ἅλατι ἁλιεῖς
  english_pob_choice: you shall salt with salt
  chosen_spanish: la sazonarás con sal
  alternatives_spanish:
  - la salarás con sal
  - la condimentarás con sal
  lexicon: ἁλίζω
  rationale: El griego expresa la acción de salar. 'Sazonarás con sal' es idiomático y fiel, conservando la repetición semántica de sal sin sonar torpe en español. La forma con 'sal' explícita refleja el énfasis del texto.
theological_decisions:
- issue: Nombre divino en el título final
  english_pob_reading: Lord God
  chosen_spanish_reading: Yahvé, Dios
  alternative_spanish_readings:
  - Señor Dios
  - el Señor Dios
  rationale: Según la convención del proyecto, יהוה se vierte como 'Yahvé'. Aunque el segmento griego aquí presenta κύριος junto a θεός, el contexto del testimonio patriarcal remite al nombre divino; por eso no se usa una convención de mayúsculas ni se sustituye por 'Señor' en el texto principal.
  doctrine_reference: Éxodo 3:15; convención editorial del proyecto para יהוה
translation_notes:
  revision_awareness: La revisión inglesa eliminó el artículo antes de 'Lord God' para ajustarse mejor al fuente. La versión española refleja esa concisión con 'Yahvé, Dios' sin artículo delante del título, manteniendo además el mandato paralelo de 'toda ofrenda'.
  spanish_consistency_notes:
  - Se mantuvo 'primicias' para ἀπαρχή en coherencia con el vocabulario sacrificial bíblico.
  - Se usó 'Yahvé' como forma estándar del proyecto para el nombre divino.
  - Se prefirió 'ofrenda' para θυσία en el segundo miembro, porque el contexto ya establece el campo sacrificial y la repetición directa de 'sacrificio' sonaría menos natural en español.
  - Se mantuvo la estructura de dos mandatos coordinados para reflejar la paralelismo del griego.
