translation:
  language: es
  text: Y Isaac seguía llamándome continuamente para recordarme la ley del Señor[a], así como me lo había mostrado el ángel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Señor'' reproduce aquí el título Κυρίου del griego; no se introduce ''Yahvé'' porque esta línea no usa directamente el nombre divino hebreo.'
    reason: theological_note
lexical_decisions:
- source_word: Ἰσαὰκ
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  alternatives_spanish:
  - Isaák
  lexicon: Isaac (nombre propio)
  rationale: Se conserva el nombre bíblico estándar en español para máxima inteligibilidad y correspondencia directa con el original.
- source_word: ἐκάλει με συνεχῶς
  english_pob_choice: kept calling me continually
  chosen_spanish: seguía llamándome continuamente
  alternatives_spanish:
  - me llamaba continuamente
  - me estuvo llamando continuamente
  lexicon: καλέω
  rationale: La perífrasis 'seguía llamándome' comunica bien la acción repetida o insistente del imperfecto; 'continuamente' mantiene el adverbio de intensidad del griego.
- source_word: τοῦ ὑπομνῆσαί με
  english_pob_choice: to remind me
  chosen_spanish: para recordarme
  alternatives_spanish:
  - a fin de recordarme
  - para hacerme recordar
  lexicon: ὑπομιμνῄσκω
  rationale: '''Recordarme'' expresa de forma natural la finalidad del infinitivo griego sin añadir contenido ajeno.'
- source_word: νόμον Κυρίου
  english_pob_choice: the law of the Lord
  chosen_spanish: la ley del Señor[a]
  alternatives_spanish:
  - la ley de Yahvé[a]
  - la ley del Señor Dios[a]
  lexicon: νόμος / κύριος
  rationale: Se traduce νόμον como 'ley'. Aunque el proyecto prefiere 'Yahvé' para יהוה, aquí el griego dice Κυρίου; en una obra de tono bíblico en español, 'Señor' reproduce el título reverente del texto receptor y evita forzar una identificación que el griego no explicita de manera directa en esta línea.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - del mismo modo que
  lexicon: καθώς
  rationale: '''Así como'' es la equivalencia natural y fiel en español para introducir la comparación/modo.'
- source_word: ἔδειξέ μοι ὁ ἄγγελος
  english_pob_choice: the angel had shown me
  chosen_spanish: me lo había mostrado el ángel
  alternatives_spanish:
  - el ángel me había mostrado esto
  - el ángel me lo mostró
  lexicon: δεικνύω
  rationale: Se mantiene el pluscuamperfecto para reflejar la anterioridad relativa del mostrar del ángel respecto al recordar de Isaac. El objeto neutro implícito se expresa con 'lo' para evitar ambigüedad en español.
theological_decisions:
- issue: Tratamiento del título divino en 'Κυρίου'
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Yahvé
  rationale: Aunque el proyecto usa 'Yahvé' para el nombre divino cuando el texto lo exige, en esta cláusula el griego presenta el título 'Señor'. Traducirlo como 'el Señor' preserva la forma del texto fuente y el registro reverente sin introducir una explicitación no marcada aquí.
  doctrine_reference: Nombre divino / cristología del título
- issue: Relación entre la acción de Isaac y la revelación del ángel
  english_pob_reading: just as the angel had shown me
  chosen_spanish_reading: así como me lo había mostrado el ángel
  alternative_spanish_readings:
  - tal como me lo había mostrado el ángel
  - como me lo había mostrado el ángel
  rationale: Se mantiene la dependencia de la enseñanza previa del ángel como fundamento de lo que Isaac repetía, sin atenuar ni intensificar la relación causal o revelatoria más allá del griego.
  doctrine_reference: Transmisión revelatoria
translation_notes:
  revision_awareness: Se siguió el texto griego proporcionado (Charles 1908 Greek Versions, Levi source-fix v2) y se confirmó que la auditoría inglesa reciente no requirió revisiones. No se añadieron notas textuales porque no hay variantes auditadas en el paquete dado.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico natural y solemne en español, evitando arcaísmos innecesarios.
  - Se preservó la relación temporal del pluscuamperfecto ('había mostrado') para respetar el orden de la fuente.
  - La nota sobre 'Señor' se incluyó por la tensión proyectiva entre la norma del proyecto ('Yahvé') y la forma efectiva del griego ('Κυρίου').
