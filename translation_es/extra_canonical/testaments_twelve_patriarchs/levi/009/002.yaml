base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/009/002.yaml
  text: And my grandfather blessed me because of the visions that I had seen, and he was not willing to go with us to Bethel.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: Rendered "the father of my father" more naturally as "my grandfather" and changed "according to" to "because of" to better reflect the causal sense of κατὰ with the visions.
translation:
  language: es
  text: Y mi abuelo me bendijo a causa de las visiones que había visto, y no quiso ir con nosotros a Betel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ πατὴρ τοῦ πατρός μου
  english_pob_choice: my grandfather
  chosen_spanish: mi abuelo
  alternatives_spanish:
  - el padre de mi padre
  lexicon: γονεὺς / πατήρ (relational kinship phrase)
  rationale: La frase griega es literalmente 'el padre de mi padre', pero el propio audit trail inglés ya la naturaliza como 'my grandfather'. En español, 'mi abuelo' comunica con claridad la relación de parentesco sin perder el sentido del original.
- source_word: κατὰ τῶν ὁραμάτων ὧν εἶδον
  english_pob_choice: because of the visions that I had seen
  chosen_spanish: a causa de las visiones que había visto
  alternatives_spanish:
  - por las visiones que había visto
  - a causa de lo que había visto en visiones
  lexicon: κατά + acusativo con valor causal; ὁράματα
  rationale: El pasaje exige una relación causal, no meramente normativa o temporal. 'A causa de' preserva el matiz causal señalado por la revisión inglesa y suena natural en español bíblico contemporáneo.
- source_word: οὐκ ἠθέλησε πορευθῆναι μεθ’ ἡμῶν
  english_pob_choice: he was not willing to go with us
  chosen_spanish: no quiso ir con nosotros
  alternatives_spanish:
  - no estuvo dispuesto a ir con nosotros
  - no quiso acompañarnos
  lexicon: θέλω + infinitivo; πορεύομαι μετὰ
  rationale: '''No quiso ir con nosotros'' mantiene la negativa de voluntad del griego y evita una construcción demasiado pesada. ''Acompañarnos'' sería posible, pero ''ir con nosotros'' reproduce mejor el movimiento simple del verbo.'
- source_word: Βεθήλ
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bethel
  lexicon: topónimo bíblico tradicional
  rationale: En español bíblico, 'Betel' es la forma habitual y legible del topónimo, sin alterar la identificación del lugar.
theological_decisions:
- issue: La bendición ligada a las visiones
  english_pob_reading: because of the visions that I had seen
  chosen_spanish_reading: a causa de las visiones que había visto
  alternative_spanish_readings:
  - según las visiones que había visto
  - conforme a las visiones que había visto
  rationale: La relación es causal, no solamente conformativa. Traducirla como 'a causa de' evita suavizar el peso de la experiencia visionaria en la bendición.
  doctrine_reference: Narrativa patriarcal; valor revelatorio de las visiones sin formulación doctrinal explícita.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que corrigió la expresión relacional a 'my grandfather' y el valor de κατὰ a una causa ('because of'). La versión española refleja esos mismos ajustes.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; aquí no ocurre.
  - '''Betel'' se usa como topónimo bíblico estándar en español.'
  - No se introducen notas textuales porque el versículo no presenta variantes relevantes en el audit trail proporcionado.
