source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ εὐλόγησέν με *⁵ὁ πατὴρ τοῦ πατρός μου⁵ κατὰ⁶ *τῶν ὁραμάτων ὧν⁷ εἶδον· *καὶ οὐκ ἠθέλησε πορευθῆναι μεθ’ ἡμῶν εἰς Βεθήλ⁸.
