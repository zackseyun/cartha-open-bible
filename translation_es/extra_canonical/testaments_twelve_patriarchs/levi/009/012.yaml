  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: '*Δώδεκα οὖν δένδρων ἐχόντων φύλλα⁵¹ ἀνάγαγε⁵² τῷ⁵³ Κυρίῳ⁵⁴ *ὡς κἀμὲ⁵⁵ Ἀβραὰμ ἐδίδαξε.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/009/012.yaml
  text: From twelve trees having leaves, then offer to the Lord, as Abraham taught me.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: Adjusted the opening to better reflect the source's exhortative wording and removed the unnecessary 'And'; retained the Lord reference and Abraham clause.
translation:
  language: es
  text: Así que, de doce árboles que tienen hojas, ofrécele al Señor, como Abraham me enseñó.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Δώδεκα οὖν δένδρων ἐχόντων φύλλα
  english_pob_choice: From twelve trees having leaves
  chosen_spanish: de doce árboles que tienen hojas
  alternatives_spanish:
  - de doce árboles con hojas
  - de doce árboles frondosos
  lexicon: δένδρον; φύλλα
  rationale: Conservo la imagen concreta de árboles y hojas sin añadir una interpretación simbólica. Prefiero 'que tienen hojas' para reflejar el participio ἐχόντων de modo explícito y natural en español; 'frondosos' sería más idiomático pero menos transparente al griego.
- source_word: ἀνάγαγε
  english_pob_choice: offer
  chosen_spanish: ofrécele
  alternatives_spanish:
  - preséntalo al Señor
  - levántalo al Señor
  lexicon: ἀνάγω
  rationale: El contexto y la tradición auditada en inglés entienden un acto de ofrenda. 'Ofrécele' mantiene el valor exhortativo y la dirección al destinatario divino, sin forzar una equivalencia sacrificial técnica que el contexto no desarrolla.
- source_word: τῷ Κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - a Yahvé
  - al Señor Yahvé
  lexicon: κύριος
  rationale: Aunque la norma del proyecto favorece 'Yahvé' para el nombre divino, aquí el griego usa κύριος y la fuente inglesa conserva 'the Lord'. Dado el contexto litúrgico-testamentario y la ausencia de un indicador textual explícito del Tetragrámaton en este pasaje, mantengo 'Señor' como correspondencia directa del audit trail inglés.
- source_word: ὡς κἀμὲ Ἀβραὰμ ἐδίδαξε
  english_pob_choice: as Abraham taught me
  chosen_spanish: como Abraham me enseñó
  alternatives_spanish:
  - tal como Abraham me enseñó
  - así como Abraham me enseñó
  lexicon: ὡς; ἐδίδαξε
  rationale: Sigo de cerca la comparación simple del griego y la redacción inglesa. 'Como Abraham me enseñó' conserva la relación de modelo o instrucción sin añadir matices.
theological_decisions:
- issue: Referencia al destinatario divino con κύριος
  english_pob_reading: to the Lord
  chosen_spanish_reading: al Señor
  alternative_spanish_readings:
  - a Yahvé
  rationale: La decisión mantiene la lectura del texto base griego y el inglés auditado. No hay aquí una cita directa del nombre divino en forma inequívoca, por lo que no traslado automáticamente a 'Yahvé' para no introducir una identificación no explicitada por el pasaje.
  doctrine_reference: Uso reverencial del título divino en traducción bíblica; distinción entre κύριος y el Tetragrámaton cuando el contexto no obliga a igualarlos.
translation_notes:
  revision_awareness: The English revision pass changed 'And from twelve trees having leaves offer to the Lord...' to 'From twelve trees having leaves, then offer to the Lord...' in order to better reflect exhortative force and remove an unnecessary conjunction. The Spanish draft reflects that tightened exhortative opening with 'Así que' and preserves the imperative force.
  spanish_consistency_notes:
  - Mantengo un registro español sobrio y directo, acorde con una versión bíblica pública.
  - No uso 'SEÑOR' en versales porque el texto fuente y el audit trail inglés no distinguen aquí un masking convention específico.
  - '''Árboles'' traduce δένδρων de manera literal y clara; no se opta por una paráfrasis vegetal más interpretativa.'
