translation:
  language: es
  text: Y de todo animal limpio y de toda ave, ofrece un sacrificio a Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παντὸς ζώου καθαροῦ
  english_pob_choice: every clean animal
  chosen_spanish: todo animal limpio
  alternatives_spanish:
  - cada animal limpio
  - todo animal puro
  lexicon: ζῷον
  rationale: «Todo animal limpio» conserva el sentido distributivo de παντὸς y el valor ritual de καθαροῦ sin introducir una paráfrasis explicativa. «Limpio» es la forma más natural en español para la distinción cultual de animales aptos para sacrificio.
- source_word: πετεινοῦ
  english_pob_choice: bird
  chosen_spanish: ave
  alternatives_spanish:
  - pájaro
  - ave del cielo
  lexicon: πετεινόν
  rationale: «Ave» es más amplio y solemne que «pájaro», y encaja mejor con el registro cultual del pasaje. Mantiene la referencia genérica sin añadir matices no presentes en el griego.
- source_word: τῷ Κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: κύριος
  rationale: Aunque el griego dice κύριος, el contexto del Nombre divino en esta tradición y la política terminológica del proyecto favorecen «Yahvé» en el texto principal. «El Señor» quedaría como ocultación del nombre donde el auditable trasfondo apunta a la referencia divina.
theological_decisions:
- issue: Renderización de τῷ Κυρίῳ en contexto sacrificial
  english_pob_reading: to the Lord
  chosen_spanish_reading: a Yahvé
  alternative_spanish_readings:
  - al Señor
  - a Dios
  rationale: El griego usa κύριος con artículo en un contexto donde el destinatario del sacrificio es el Dios de Israel; en este proyecto se evita la convención de mascar el Nombre divino. «Yahvé» preserva la referencia teológica y la coherencia terminológica establecida.
  doctrine_reference: Tetragrámaton / política terminológica del POB en español
translation_notes:
  revision_awareness: La versión inglesa POB permanece sin cambios en la revisión más reciente; el griego de base tampoco muestra variantes que obliguen a notas textuales. La redacción española sigue de cerca el sentido del original sin añadir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene el tono imperativo exhortativo del versículo con «ofrece» como equivalente natural de πρόσφερε.
  - Se usa «Yahvé» de forma consistente con la terminología por defecto del proyecto para κύριος cuando remite al Nombre divino.
  - No se introducen notas al pie porque el texto fuente y la traducción inglesa auditada no presentan variantes o alternativas relevantes para este versículo.
