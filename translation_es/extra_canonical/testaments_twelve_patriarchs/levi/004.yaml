  text: IV. Νῦν οὖν γίνωσκε¹ ὅτι ποιήσει Κύριος κρίσιν ἐπὶ τοὺς υἱοὺς τῶν ἀνθρώπων. Ὅτι² πετρῶν³ σχιζομένων, καὶ τοῦ ἡλίου σβεννυμένου⁴ καὶ ὑδάτων⁵ ξηραινομένων καὶ τοῦ⁶ πυρὸς καταπτήσσοντος⁷ καὶ πάσης [τῆς]⁸ κτίσεως κλονουμένης⁹ καὶ τῶν ἀοράτων πνευμάτων¹⁰ τηκομένων¹¹ καὶ¹² τοῦ ᾅδου σκυλευομένου¹³ [ἐπὶ τῷ πάθει τοῦ ὑψίστου]¹⁴ *οἱ ἄνθρωποι ἀπειθοῦντες ἐπιμενοῦσι ταῖς ἀδικίαις¹⁵, διὰ τοῦτο ἐν Γτῇ¹⁶ κολάσει κριθήσονται. 2. Εἰσήκουσεν¹⁷ Γοὖν¹⁸ ὁ ὕψιστος τῆς προσευχῆς¹⁹ σου *τοῦ διελεῖν²⁰ σε ἀπὸ²¹ ἀδικίας²² καὶ γενέσθαι αὐτῷ²³ *υἱὸν καὶ θεράποντα²⁴ καὶ λειτουργὸν²⁵ τοῦ προσώπου αὐτοῦ. 3. Φῶς²⁶ γνώσεως²⁷ φωτιεῖς²⁸ *ἐν τῷ Ἰακώβ²⁹, καὶ³⁰ ὡς³¹ ἥλιος *ἔσῃ³² παντὶ³³ σπέρματι³⁴ Ἰσραήλ. 4. Καὶ δοθήσεταί σοι εὐλογία *καὶ παντὶ τῷ σπέρματί σου³⁵ ἕως³⁶ ἐπισκέψεται³⁷ Κύριος πάντα τὰ ἔθνη³⁸ ἐν σπλάγχνοις [υἱοῦ]³⁹ αὐτοῦ *ἕως αἰῶνος⁴⁰. [Πλὴν⁴¹ οἱ υἱοί σου ἐπιβαλοῦσι χεῖρας *ἐπ᾿ αὐτὸν⁴² *τοῦ ἀνασκολοπίσαι⁴³ αὐτόν.] 5. ⸀Καὶ⸀⁴⁴ διὰ τοῦτο δέδωταί⁴⁵ σοι⁴⁶ βουλὴ καὶ σύνεσις τοῦ συνετίσαι τοὺς υἱούς σου⁴⁷ *περὶ τούτου⁴⁸.
    6. Ὅτι *οἱ εὐλογοῦντες⁴⁹ †αὐτὸν⁵⁰ εὐλογημένοι⁵¹ ἔσονται⁵² *καὶ οἱ⁵³ καταρώμενοι †αὐτὸν⁵⁰ ἀπολοῦνται⁵⁴.
