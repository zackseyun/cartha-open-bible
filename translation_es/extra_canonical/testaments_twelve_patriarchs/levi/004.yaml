translation:
  language: es
  text: '1. Ahora, pues, sabe que el Señor ejecutará juicio sobre los hijos de los hombres. Porque cuando las peñas sean hendidas, y el sol sea apagado, y las aguas se sequen, y el fuego se acobarde, y toda la creación sea sacudida, y los espíritus invisibles se derritan, y el Hades sea saqueado[a] al padecimiento del Altísimo, los hombres, siendo desobedientes, persistirán en sus injusticias. Por tanto, serán juzgados con un castigo mayor.


    2. Por eso el Altísimo ha escuchado tu oración, para separarte de la injusticia y para que llegues a ser para él un hijo y un esclavo y un ministro de su presencia.


    3. Harás resplandecer la luz del conocimiento en Jacob, y serás como el sol para toda la simiente de Israel.


    4. Y se te dará bendición, y a toda tu simiente, hasta que el Señor visite a todas las naciones en las tiernas misericordias de su hijo[b] para siempre.


    5. Y por esta causa te han sido dados consejo y entendimiento, para que instruyas a tus hijos acerca de esto.


    6. Porque los que lo bendicen serán benditos[c], y los que lo maldicen perecerán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El giro 'sea saqueado' traduce el valor de despojo/conquista de σκυλευομένου y sigue el testimonio griego suministrado, sin suavizar la imagen.
    reason: textual_variant
  - marker: b
    text: El término 'hijo' está marcado en el testimonio recibido como lectura textualmente incierta; se conserva en la traducción por transparencia.
    reason: textual_variant
  - marker: c
    text: El pronombre 'lo' puede referirse al Señor, al hijo mencionado en el versículo 4 o a Leví / su línea sacerdotal; el griego no lo especifica.
    reason: alternative_reading
lexical_decisions:
- source_word: κρίσιν
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - justicia
  lexicon: BDAG
  rationale: En este contexto apocalíptico, κρίσις designa acto judicial divino. 'Juicio' conserva el sentido forense y solemne sin reducirlo a 'justicia' abstracta.
- source_word: υἱοὺς τῶν ἀνθρώπων
  english_pob_choice: sons of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los seres humanos
  - los hijos de la humanidad
  lexicon: BDAG
  rationale: La expresión semitizante se conserva en español para mantener el registro elevado y el alcance universal del aviso.
- source_word: σβεννυμένου
  english_pob_choice: being extinguished
  chosen_spanish: sea apagado
  alternatives_spanish:
  - se esté extinguiendo
  - se apague
  lexicon: LSJ
  rationale: El participio expresa un proceso cósmico de apagamiento; 'sea apagado' preserva la acción pasiva y la fuerza imagética en español natural.
- source_word: καταπτήσσοντος
  english_pob_choice: is cowering
  chosen_spanish: se acobarde
  alternatives_spanish:
  - retroceda aterrorizado
  - se encogea
  lexicon: LSJ
  rationale: Aplicado al fuego en la lista cósmica, el verbo antropomórfico se traduce con un giro que conserva la imagen extraña sin endurecer el español.
- source_word: κτίσεως
  english_pob_choice: creation
  chosen_spanish: la creación
  alternatives_spanish:
  - el orden creado
  - todo lo creado
  lexicon: BDAG
  rationale: '''La creación'' expresa con naturalidad el alcance cósmico que el texto presenta.'
- source_word: τηκομένων
  english_pob_choice: melting away
  chosen_spanish: se derritan
  alternatives_spanish:
  - se deshagan
  - se consuman
  lexicon: LSJ
  rationale: La imagen es de disolución bajo cataclismo divino; 'se derritan' mantiene el dinamismo del participio.
- source_word: ᾅδου σκυλευομένου
  english_pob_choice: Hades is being plundered
  chosen_spanish: el Hades sea saqueado
  alternatives_spanish:
  - el Hades sea despojado
  - el Seol sea saqueado
  lexicon: BDAG
  rationale: '''Saqueado'' reproduce el matiz de despojo tras conquista y evita suavizar la imagen; se conserva ''Hades'' por transparencia con el auditorio y el texto griego.'
- source_word: πάθει
  english_pob_choice: suffering
  chosen_spanish: al padecimiento
  alternatives_spanish:
  - al sufrimiento
  - a la pasión
  lexicon: BDAG
  rationale: '''Padecimiento'' refleja el sentido de sufrimiento sin importar un tecnicismo teológico posterior; enlaza bien con la frase causal.'
- source_word: ἀπειθοῦντες ἐπιμενοῦσι
  english_pob_choice: being disobedient, will persist
  chosen_spanish: siendo desobedientes, persistirán
  alternatives_spanish:
  - desobedeciendo, perseverarán
  - al ser desobedientes, continuarán
  lexicon: BDAG
  rationale: La revisión inglesa separa el participio y el verbo finito; el español sigue esa estructura para reflejar mejor el griego y mantener la insistencia moral.
- source_word: ἀδικίαις
  english_pob_choice: injustices
  chosen_spanish: injusticias
  alternatives_spanish:
  - maldades
  - injusticias cometidas
  lexicon: BDAG
  rationale: El plural se conserva en español para no neutralizar la concreción moral-social del término.
- source_word: κολάσει
  english_pob_choice: with a greater punishment
  chosen_spanish: con un castigo mayor
  alternatives_spanish:
  - con un castigo más severo
  - con mayor pena
  lexicon: BDAG
  rationale: '''Castigo'' comunica claramente el matiz punitivo de κόλασις sin perder la comparación expresada por el texto.'
- source_word: διελεῖν σε ἀπὸ ἀδικίας
  english_pob_choice: to separate you from unrighteousness
  chosen_spanish: para separarte de la injusticia
  alternatives_spanish:
  - para apartarte de la injusticia
  - para dividirte de la injusticia
  lexicon: BDAG
  rationale: El infinitivo expresa apartamiento divino; 'separarte' conserva la idea de separación moral, mientras 'injusticia' mantiene el campo semántico de ἀδικία.
- source_word: θεράποντα
  english_pob_choice: servant
  chosen_spanish: un esclavo
  alternatives_spanish:
  - un siervo
  - un servidor
  lexicon: BDAG
  rationale: Dado el estándar del proyecto para δοῦλος/servicio de fuerza lexical y el paralelo honorífico con 'hijo' y 'ministro', 'esclavo' mantiene la rudeza potencial del vínculo de pertenencia y evita suavizarlo sin base textual suficiente.
- source_word: λειτουργὸν τοῦ προσώπου αὐτοῦ
  english_pob_choice: a minister of his presence
  chosen_spanish: un ministro de su presencia
  alternatives_spanish:
  - un oficiante de su presencia
  - un servidor litúrgico ante su rostro
  lexicon: BDAG
  rationale: '''Ministro de su presencia'' conserva la resonancia cultual y relacional de λειτουργός sin volverlo demasiado técnico o eclesiástico.'
- source_word: Φῶς γνώσεως
  english_pob_choice: the light of knowledge
  chosen_spanish: la luz del conocimiento
  alternatives_spanish:
  - la luz del saber
  - la luz del entendimiento
  lexicon: BDAG
  rationale: La expresión compacta se mantiene casi literalmente; 'conocimiento' preserva el contenido cognitivo y revelatorio.
- source_word: φωτιεῖς
  english_pob_choice: You shall shine forth
  chosen_spanish: Harás resplandecer
  alternatives_spanish:
  - Brillarás
  - Iluminarás
  lexicon: LSJ
  rationale: El futuro con matiz causativo reproduce el sentido verbal y su energía imagética, sin perder la referencia inmediata a la luz.
- source_word: σπέρματι
  english_pob_choice: seed
  chosen_spanish: simiente
  alternatives_spanish:
  - descendencia
  - linaje
  lexicon: BDAG
  rationale: '''Simiente'' conserva la dicción bíblica de pacto y el sentido colectivo que el texto requiere.'
- source_word: ἐπισκέψεται
  english_pob_choice: visits
  chosen_spanish: visite
  alternatives_spanish:
  - acuda a
  - se acuerde de
  lexicon: BDAG
  rationale: '''Visitar'' mantiene el idiomático sentido bíblico de intervención divina con posibles matices de favor y acción salvadora.'
- source_word: ἐν σπλάγχνοις
  english_pob_choice: in the tender mercies
  chosen_spanish: en las tiernas misericordias
  alternatives_spanish:
  - en la compasión entrañable
  - en las entrañas de misericordia
  lexicon: BDAG
  rationale: La locución se vierte con una expresión comprensible en español que conserva la intensidad afectiva de σπλάγχνα.
- source_word: βουλή
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - counsel
  - propósito
  lexicon: BDAG
  rationale: '''Consejo'' funciona bien en un marco testamentario y expresa guía sabia otorgada para instruir.'
- source_word: σύνεσις
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - inteligencia
  lexicon: BDAG
  rationale: En pareja con 'consejo', 'entendimiento' ofrece un equivalente natural y fiel de la capacidad de comprender.
- source_word: συνετίσαι
  english_pob_choice: instruct
  chosen_spanish: instruyas
  alternatives_spanish:
  - hagas entender
  - enseñes
  lexicon: BDAG
  rationale: El infinitivo apunta a comunicar comprensión a los hijos; 'instruyas' suena idiomático en español y conserva el contenido pedagógico.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre queda deliberadamente ambiguo en español, como en el griego, sin resolver de antemano si el referente es el Señor, el hijo o la línea sacerdotal.
theological_decisions:
- issue: Cláusula textual incierta 'al padecimiento del Altísimo' en v.1
  english_pob_reading: Included in the main text as part of the extant Greek witness, without doctrinal expansion.
  chosen_spanish_reading: Se incluye en el texto principal como parte del testimonio griego transmitido, sin expansión doctrinal.
  alternative_spanish_readings:
  - Omitirla por considerarla expansión secundaria
  - Traducirla con una formulación cristológica más explícita
  rationale: La transparencia exige traducir la cláusula tal como está atestiguada, aunque sea textualmente incierta; no se harmoniza ni se suprime silenciosamente.
  doctrine_reference: Preservar la tensión textual y no resolverla dogmáticamente.
- issue: Frase bracketed '[son]' en v.4
  english_pob_reading: Retained in the main text as 'until the Lord visits all the nations in the tender mercies of his son forever.'
  chosen_spanish_reading: Se conserva en el texto principal como 'hasta que el Señor visite a todas las naciones en las tiernas misericordias de su hijo para siempre'.
  alternative_spanish_readings:
  - '''en sus tiernas misericordias'' si se omite ''hijo'''
  - Eliminar la frase por considerarla interpolación tardía
  rationale: El testimonio transmitido incluye el término entre corchetes; se traduce y se marca como textualmente incierto para no ocultar el problema crítico.
  doctrine_reference: Traducir honestamente lo atestiguado y explicar la incertidumbre en nota.
- issue: Referente de 'lo' en v.6
  english_pob_reading: 'Left ambiguous in the main text: ''those who bless him... those who curse him...'''
  chosen_spanish_reading: 'Se deja ambiguo en el texto principal: ''los que lo bendicen... los que lo maldicen...'''
  alternative_spanish_readings:
  - el Señor
  - el hijo
  - Leví / la línea sacerdotal
  rationale: El griego no explicita antecedente inmediato inequívoco; el español preserva esa ambigüedad para no fijar una interpretación que el texto no obliga a tomar.
  doctrine_reference: Preservar la tensión interpretativa en lugar de resolverla.
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó ἀπειθοῦντες en v.1 como participio independiente ('being disobedient') y mantuvo ἐπιμενοῦσι ταῖς ἀδικίαις como 'will persist in their injustices'. La presente redacción española refleja esa revisión separando 'siendo desobedientes' de 'persistirán en sus injusticias'. También conserva la cláusula textualmente incierta sobre el padecimiento del Altísimo y la frase bracketed sobre 'su hijo' con marcación crítica.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el tetragrámaton en el proyecto, pero en este pasaje el texto griego tiene Κύριος; por eso se traduce 'el Señor' conforme al audit trail y al uso del testimonio griego.
  - '''Mesías'' no aparece en este pasaje; se mantiene la terminología de parentesco y servicio tal como la transmite el griego.'
  - '''Esclavo'' se emplea para θεράπων aquí siguiendo la decisión de fuerza lexical y el paralelismo honorífico del pasaje, no como simplificación devocional.'
  - '''Simiente'' se conserva de manera consistente para σπέρμα en todo el pasaje.'
  - Se preserva la ambigüedad del pronombre final con 'lo' para no cerrar el referente interpretativo.
