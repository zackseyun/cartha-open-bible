source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: III. ῎Ακουσον οὖν¹ περὶ τῶν δειχθέντων σοι οὐρανῶν· ὁ κατώτερος *διὰ τοῦτό σοί ἐστι στυγνός, ἐπειδὴ² ὁρᾷ πάσας³ τὰς ἀδικίας τῶν ἀνθρώπων. 2. Καὶ ἔχει πῦρ χιόνα καὶ⁴ κρύσταλλον ἡτοιμασμένον⁵ εἰς ἡμέραν κρίσεως ἐν τῇ δικαιοκρισίᾳ τοῦ Θεοῦ· ἐν αὐτῷ γάρ εἰσι πάντα τὰ πνεύματα τῶν ἐπαγωγῶν εἰς ἐκδίκησιν τῶν ἀνθρώπων. 3. Ἐν δὲ τῷ δευτέρῳ εἰσὶν αἱ δυνάμεις τῶν παρεμβολῶν οἱ ταχθέντες εἰς ἡμέραν κρίσεως ποιῆσαι ἐκδίκησιν τοῖς πνεύμασι τῆς πλάνης καὶ τοῦ Βελίαρ· καὶ ἐπ᾿ αὐτούς εἰσιν οἱ ἅγιοι. 4. Ἐν τῷ ἀνωτέρῳ δὲ πάντων καταλύματι²¹ ἡ²² μεγάλη δόξα ὑπεράνω²³ πάσης ἁγιότητος. 5. Ἐν τῷ μετ᾿ †αὐτῶν⁴² εἰσιν ἀρχάγγελοι οἱ λειτουργοῦντες καὶ ἐξιλασκόμενοι πρὸς Κύριον ἐπὶ πάσαις ταῖς ἀγνοίαις τῶν δικαίων, 6. Προσφέροντες τῷ Κυρίῳ ὀσμὴν εὐωδίας⁴³ λογικὴν⁴⁴ καὶ ἀναίμακτον θυσίαν. 7. Ἐν δὲ τῷ ὑποκάτω εἰσὶν⁴⁵ ἄγγελοι οἱ φέροντες τὰς ἀποκρίσεις τοῖς ἀγγέλοις τοῦ προσώπου κυρίου. 8. Ἐν δὲ τῷ⁴⁶ μετ᾿ †αὐτῶν⁴⁷ εἰσιν θρόνοι καὶ *ἐξουσίαι⁴⁸, ἐν ᾧ †ἀεὶ ὕμνοι τῷ θεῷ προσφέρονται⁴⁹. 9. Ὅταν οὖν ἐπιβλέψει⁵⁷ Κύριος
    ἐφ᾿ ἡμᾶς⁵⁸ καὶ⁵⁹ πάντες τρέμομεν⁶⁸ καὶ ὁ οὐρανὸς⁶⁹ καὶ ἡ γῆ καὶ †ἡ ἄβυσσος⁶⁹ ἀπὸ προσώπου τῆς μεγαλωσύνης αὐτοῦ σαλεύονται. 10. Οἱ δὲ υἱοὶ τῶν ἀνθρώπων ἐν⁷⁹ τούτοις⁸⁰ ἀναισθητοῦντες⁸¹ ἁμαρτάνουσι *καὶ παροργίζουσι τὸν ὕψιστον⁸².
