translation:
  language: es
  text: 'Escucha, pues, acerca de los cielos que se te mostraron. El más bajo es sombrío[a] por esta razón: porque ve todas las injusticias de la gente. Y tiene fuego, nieve y hielo preparados para el día determinado por Dios, como un juicio justo de Dios sobre los hombres. En él están todos los espíritus de los castigos para venganza contra los impíos. Sobre este está el lugar santo, y en él están las huestes de los ejércitos designadas para el día del juicio[b], para ejecutar venganza sobre los espíritus del engaño y de Beliar; y sobre ellos están los santos. En el más alto de todos habita la Gran Gloria, por encima de toda santidad. En el cielo junto a él están los arcángeles, que ministran y hacen propiciación al Señor por todos los pecados cometidos por ignorancia por los justos, ofreciendo al Señor un aroma agradable, una ofrenda racional y sin sangre[c]. En el cielo debajo de este están los ángeles que llevan respuestas a los ángeles de la presencia del Señor. Pero en el cielo inmediatamente
    debajo están tronos y dominios, en los cuales se ofrecen continuamente himnos a Dios. Por tanto, cuando el Señor mira sobre nosotros según el grado de su santidad, los cielos son sacudidos. Y también la tierra es removida desde sus fundamentos, y, temblando, es sacudida hasta sus profundidades. Pero los hijos de los hombres, sin entender estas cosas, se extravían y lo provocan a ira.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hacer propiciación al Señor». El verbo griego ἐξιλάσκομαι puede verterse como «hacer propiciación» o «hacer expiación» en contextos cultuales.'
    reason: lexical_alternative
  - marker: b
    text: «Beliar» refleja la forma griega del nombre, que otras tradiciones suelen rendir como «Belial».
    reason: lexical_alternative
  - marker: c
    text: 'O: «una ofrenda razonable y sin sangre». El adjetivo griego λογική puede entenderse también como «racional» o, de manera más interpretativa, «espiritual».'
    reason: lexical_alternative
lexical_decisions:
- source_word: στυγνός
  english_pob_choice: dark
  chosen_spanish: oscuro
  alternatives_spanish:
  - tenebroso
  - sombrío
  - sombrío
  lexicon: LSJ
  rationale: En el contexto del cielo más bajo que ve la injusticia humana, 'oscuro' comunica con claridad la cualidad sombría sin sobrecargar el tono con una connotación emocional más fuerte de la que exige el griego.
- source_word: ἀδικίας
  english_pob_choice: unrighteous deeds
  chosen_spanish: obras injustas
  alternatives_spanish:
  - injusticias
  - maldades
  - hechos injustos
  lexicon: BDAG
  rationale: '''Obras injustas'' conserva el carácter concreto de acciones y mantiene el peso moral-religioso de ἀδικία mejor que una simple abstracción jurídica.'
- source_word: ἡτοιμασμένον
  english_pob_choice: prepared
  chosen_spanish: preparados
  alternatives_spanish:
  - dispuestos
  - preparado
  - listos
  lexicon: BDAG
  rationale: '''Preparados'' reproduce el valor de disponibilidad escatológica del participio y fluye bien con la lista de elementos celestes.'
- source_word: ἐκδίκησις / ἐκδικήσεως
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - castigo
  - vindicación
  - retribución
  lexicon: BDAG
  rationale: '''Venganza'' conserva la fuerza judicial-apocalíptica del sustantivo sin suavizarla hacia un término más abstracto.'
- source_word: ἄνομοι
  english_pob_choice: lawless
  chosen_spanish: impíos
  alternatives_spanish:
  - inicuos
  - sin ley
  - transgresores
  lexicon: BDAG
  rationale: Aunque 'sin ley' es más literal, 'impíos' resulta más natural en español e integra mejor el tono bíblico-apocalíptico de la frase, sin perder la oposición moral al orden divino.
- source_word: ἅγιον
  english_pob_choice: holy place
  chosen_spanish: lugar santo
  alternatives_spanish:
  - santuario
  - espacio santo
  lexicon: LSJ
  rationale: '''Lugar santo'' es transparente en español y preserva la noción de una esfera celestial sagrada sin forzar una identificación técnica con el templo terrenal.'
- source_word: Βελιάρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: Proper name tradition
  rationale: Se mantiene la forma griega transliterada para respetar el testimonio textual principal y no armonizarla con la variante más familiar.
- source_word: Μεγάλη Δόξα
  english_pob_choice: the Great Glory
  chosen_spanish: la Gran Gloria
  alternatives_spanish:
  - la Majestuosa Gloria
  - la grande Gloria
  lexicon: LSJ
  rationale: La mayúscula y el título compuesto preservan el carácter reverencial del circunloquio divino sin reducirlo a una simple paráfrasis de 'Dios'.
- source_word: λειτουργοῦσιν
  english_pob_choice: minister
  chosen_spanish: ministran
  alternatives_spanish:
  - sirven litúrgicamente
  - prestan servicio sagrado
  lexicon: BDAG
  rationale: '''Ministran'' conserva el tono cultual y es natural en español eclesial, sin convertir la acción en un tecnicismo excesivo.'
- source_word: ἐξιλάσκονται
  english_pob_choice: make propitiation
  chosen_spanish: hacen propiciación
  alternatives_spanish:
  - hacen expiación
  - hacen atonación
  - hacen reconciliación
  lexicon: BDAG
  rationale: '''Propiciación'' preserva la carga cultual del verbo y evita borrar la tensión teológica entre intercesión y expiación que el griego mantiene.'
- source_word: ἀγνοημάτων
  english_pob_choice: sins committed in ignorance
  chosen_spanish: pecados cometidos por ignorancia
  alternatives_spanish:
  - faltas por ignorancia
  - errores cometidos por ignorancia
  - pecados de ignorancia
  lexicon: BDAG
  rationale: La expansión explícita en español aclara el matiz sacrificial y evita que el lector reduzca el término a simples equivocaciones intelectuales.
- source_word: ὀσμὴ εὐωδίας
  english_pob_choice: a sweet-smelling fragrance
  chosen_spanish: un aroma agradable
  alternatives_spanish:
  - un olor fragante
  - un perfume suave
  - una fragancia de aroma agradable
  lexicon: LXX sacrificial idiom
  rationale: '''Aroma agradable'' comunica el modismo sacrificial con dignidad y naturalidad; evita la literalidad pesada de ''fragancia de buen olor''.'
- source_word: λογικὴν καὶ ἀναίμακτον προσφοράν
  english_pob_choice: a reasonable and bloodless offering
  chosen_spanish: una ofrenda racional y sin sangre
  alternatives_spanish:
  - una ofrenda espiritual y sin sangre
  - una ofrenda razonable y sin sangre
  lexicon: LSJ/BDAG
  rationale: '''Racional'' es el equivalente más cercano de λογική y mantiene la tensión conceptual sin interpretarla como ''espiritual''; ''sin sangre'' conserva la expresión literal con su peso teológico.'
- source_word: ἄγγελοι τῆς παρουσίας
  english_pob_choice: the angels of the presence of the Lord
  chosen_spanish: los ángeles de la presencia del Señor
  alternatives_spanish:
  - los ángeles de su presencia
  lexicon: LXX/Second Temple usage
  rationale: Se conserva la fórmula técnica y se explicita 'del Señor' para dejar claro el referente de la presencia en el contexto inmediato.
- source_word: θρόνοι καὶ κυριότητες
  english_pob_choice: thrones and dominions
  chosen_spanish: tronos y dominios
  alternatives_spanish:
  - tronos y potestades
  - tronos y señoríos
  lexicon: BDAG
  rationale: '''Dominios'' sigue de cerca la tradición de equivalentes angelológicos y resulta inteligible sin perder el registro cósmico.'
- source_word: ὕμνοι
  english_pob_choice: hymns
  chosen_spanish: himnos
  alternatives_spanish:
  - cánticos de alabanza
  - salmos
  lexicon: LSJ
  rationale: '''Himnos'' mantiene el tono litúrgico formal y corresponde bien al plural en contexto celestial.'
- source_word: παροργίζουσιν
  english_pob_choice: provoke him to anger
  chosen_spanish: lo provocan a ira
  alternatives_spanish:
  - lo enfurecen
  - lo irritan
  - lo provocan a enojo
  lexicon: BDAG
  rationale: La forma verbal conserva la causalidad activa y el lenguaje bíblico de provocar la ira divina sin añadir interpretación adicional.
theological_decisions:
- issue: Acción cultual de los arcángeles por los justos
  english_pob_reading: Translated the Greek directly as archangels who 'minister and make propitiation to the Lord' for sins committed in ignorance by the righteous.
  chosen_spanish_reading: Se tradujo directamente como arcángeles que 'ministran y hacen propiciación al Señor' por los pecados cometidos por ignorancia por los justos.
  alternative_spanish_readings:
  - '''hacen expiación al Señor'''
  - '''interceden ante el Señor'''
  rationale: El griego presenta lenguaje cultual explícito; la traducción mantiene esa textura sin reducirla a mera intercesión ni resolver la tensión entre propiciación y expiación.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
- issue: Título divino de la Gran Gloria
  english_pob_reading: Rendered Μεγάλη Δόξα as 'the Great Glory.'
  chosen_spanish_reading: Se conservó como 'la Gran Gloria'.
  alternative_spanish_readings:
  - '''la Majestuosa Gloria'''
  - '''Dios'''
  rationale: El circunloquio funciona como título reverencial y debe preservarse como tal en español para no aplanar el registro apocalíptico.
  doctrine_reference: 'POB style principle: preserve reverential circumlocutions when textually marked'
- issue: Nombre del poder maligno
  english_pob_reading: Used 'Beliar' in the main text.
  chosen_spanish_reading: Se conservó 'Beliar'.
  alternative_spanish_readings:
  - '''Belial'''
  rationale: La forma griega del testimonio principal se respeta en el texto español para no ocultar la evidencia textual ni armonizarla con una tradición posterior.
  doctrine_reference: Transparency principle for named entities
translation_notes:
  revision_awareness: No applied revisions in the source audit trail; latest revision pass is unchanged. The Spanish draft therefore follows the current English audit context without introducing unrecorded harmonizations.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no requerido aquí porque el pasaje usa Κύριος; por fidelidad al audit trail se tradujo con 'Señor' en las fórmulas cultuales y de presencia.
  - Se preservó la distinción entre 'espíritus' y 'ángeles' según el griego.
  - '''Beliar'' se mantuvo como forma principal, con la alternativa tradicional registrada en decisión léxica.'
  - Se evitó sustituir 'propiciación' por 'expiación' en el texto principal para conservar la tensión registrada en el audit trail.
