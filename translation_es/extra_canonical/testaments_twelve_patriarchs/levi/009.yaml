translation:
  language: es
  text: 'Y después de dos días, subimos yo y Judá con nuestro padre Jacob a Isaac, nuestro antepasado. Y el padre de mi padre me bendijo conforme a las visiones que yo había visto, y no quiso ir con nosotros a Betel.


    Y cuando llegamos a Betel, mi padre Jacob vio una visión acerca de mí, que yo sería sacerdote para ellos. Y, levantándose de madrugada, entregó la décima parte de todo por medio de mí a Yahvé.


    Y así llegamos a Hebrón para quedarnos allí. E Isaac me llamaba continuamente para recordarme la ley de Yahvé, tal como el ángel me la había mostrado. Y me enseñaba la ley del sacerdocio, de los sacrificios, de los holocaustos completos, de las primicias, de las ofrendas voluntarias y de los sacrificios de paz. Y cada día me instruía en las ofrendas voluntarias, y, ocupándose de mí, me decía:


    «Cuídate del espíritu de la inmoralidad sexual[a], porque este persiste y está por contaminar las cosas santas por medio de tu descendencia. Toma, pues, para ti una esposa mientras aún eres joven, una que no tenga defecto ni esté profanada, y que no sea de la estirpe de naciones extranjeras.


    Y antes de entrar en las cosas santas, lávate; y cuando ofrezcas sacrificio en presencia de Yahvé, lávate las manos. Y cuando completes de nuevo el sacrificio, lávate.


    Y de doce árboles que tienen hojas ofrece a Yahvé, como Abraham me enseñó. Y de todo animal limpio y de toda ave ofrece un sacrificio a Yahvé. Y de todo tu primer fruto y de tu vino ofrece primicias como sacrificio a Yahvé, Dios[b]. Y sazona con sal todo sacrificio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego difícil sugiere una cualidad continua o persistente del impulso inmoral; por eso la advertencia se vierte como una realidad que persiste.
    reason: textual_variant
  - marker: b
    text: La expresión griega para 'Dios' acompaña la fórmula final; se conserva aquí para reflejar el cierre solemne de la lista sacrificial.
    reason: source_note
lexical_decisions:
- source_word: Ἰησοῦς / יהוה implied in κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: N/A (project terminology default for YHWH)
  rationale: El contexto cultual y la terminología proyectual piden restaurar el nombre divino en lugar de ocultarlo tras un título. Aquí κύριος traduce/alude al nombre divino en fórmulas sacrificiales, por lo que se usa Yahvé.
- source_word: ἱερέα
  english_pob_choice: priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - sacerdotal ministro
  lexicon: LSJ
  rationale: En el pasaje se trata del oficio cultual de Levi; 'sacerdote' es la equivalencia natural en español y conserva la función institucional.
- source_word: νόμον ἱερωσύνης
  english_pob_choice: the law of the priesthood
  chosen_spanish: la ley del sacerdocio
  alternatives_spanish:
  - la ley sacerdotal
  - la ley acerca del sacerdocio
  lexicon: LSJ
  rationale: Mantiene visible la relación genitiva y el tono de instrucción hereditaria del texto.
- source_word: ὁλοκαυτωμάτων
  english_pob_choice: whole burnt offerings
  chosen_spanish: holocaustos completos
  alternatives_spanish:
  - holocaustos
  - sacrificios totalmente quemados
  lexicon: LSJ
  rationale: '''Holocaustos completos'' preserva el énfasis de totalidad del compuesto griego sin depender solo del término tradicional breve.'
- source_word: ἀπαρχῶν
  english_pob_choice: firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - primeros frutos
  - ofrendas de las primicias
  lexicon: LSJ
  rationale: Es el término cultual asentado en español para ἀπαρχαί y encaja con la secuencia de ofrendas.
- source_word: ἑκουσίου
  english_pob_choice: freewill offerings
  chosen_spanish: ofrendas voluntarias
  alternatives_spanish:
  - ofrendas de libre voluntad
  - ofrendas espontáneas
  lexicon: LSJ
  rationale: '''Ofrendas voluntarias'' comunica bien el carácter no obligado y evita un calco menos natural.'
- source_word: σωτηρίου
  english_pob_choice: peace offerings
  chosen_spanish: sacrificios de paz
  alternatives_spanish:
  - ofrendas de paz
  - sacrificios de bienestar
  lexicon: LSJ
  rationale: Se conserva la categoría sacrificial con una fórmula clara en español. 'Paz' sigue la equivalencia funcional del POB inglés, aunque el campo semántico también puede incluir bienestar/liberación.
- source_word: πρόσεχε σεαυτῷ
  english_pob_choice: Take heed to yourself
  chosen_spanish: Cuídate
  alternatives_spanish:
  - Estate atento
  - Guárdate
  lexicon: LSJ
  rationale: En español bíblico actual, 'Cuídate' transmite la advertencia personal y urgente sin sonar artificial.
- source_word: πνεύματος τῆς πορνείας
  english_pob_choice: the spirit of sexual immorality
  chosen_spanish: el espíritu de la inmoralidad sexual
  alternatives_spanish:
  - el espíritu de fornicación
  - el espíritu de prostitución
  lexicon: LSJ
  rationale: '''Inmoralidad sexual'' es el equivalente más claro y amplio para πορνεία en español moderno, y ''espíritu'' conserva la personificación del mal.'
- source_word: ἐνδελεχές
  english_pob_choice: persists
  chosen_spanish: persiste
  alternatives_spanish:
  - es continuo
  - permanece
  lexicon: LSJ
  rationale: La idea textual difícil se expresa con una forma natural que conserva la noción de continuidad o persistencia.
- source_word: μιαίνειν τὰ ἅγια
  english_pob_choice: to defile the holy things
  chosen_spanish: contaminar las cosas santas
  alternatives_spanish:
  - profanar las cosas santas
  - manchar lo sagrado
  lexicon: LSJ
  rationale: '''Contaminar'' mantiene la idea de impureza ritual y ''cosas santas'' conserva la amplitud del plural griego.'
- source_word: μὴ ἔχουσαν μῶμον
  english_pob_choice: one having no blemish
  chosen_spanish: una que no tenga defecto
  alternatives_spanish:
  - una sin mancha
  - una sin defecto
  lexicon: LSJ
  rationale: '''Sin defecto'' es la equivalencia más natural; se mantiene el valor cultual de integridad/ausencia de falta.'
- source_word: βεβηλωμένην
  english_pob_choice: defiled
  chosen_spanish: profanada
  alternatives_spanish:
  - contaminada
  - envilecida
  lexicon: LSJ
  rationale: '''Profanada'' conserva el matiz ritual del verbo mejor que un simple término moral.'
- source_word: ἀλλοφύλων ἐθνῶν
  english_pob_choice: foreign nations
  chosen_spanish: naciones extranjeras
  alternatives_spanish:
  - pueblos extraños
  - naciones ajenas
  lexicon: LSJ
  rationale: Reproduce el marcador de separación étnica/cultual sin ampliar indebidamente el sentido.
- source_word: τὰ ἅγια
  english_pob_choice: the holy things
  chosen_spanish: las cosas santas
  alternatives_spanish:
  - los santos asuntos
  - las cosas sagradas
  lexicon: LSJ
  rationale: Se conserva la amplitud del plural, evitando restringirlo solo al santuario físico.
- source_word: νίπτου
  english_pob_choice: wash your hands
  chosen_spanish: lávate las manos
  alternatives_spanish:
  - lávate
  - haz abluciones
  lexicon: LSJ
  rationale: El contexto sacrificial sugiere lavado ritual; en español conviene explicitar 'las manos' como hizo la revisión inglesa para dar claridad sin añadir más que el uso probable.
- source_word: ἀπαρτίζων
  english_pob_choice: when you complete
  chosen_spanish: cuando completes
  alternatives_spanish:
  - cuando termines
  - cuando concluyas
  lexicon: LSJ
  rationale: Expresa el cierre del acto sacrificial de manera directa y fiel al participio.
- source_word: δώδεκα ... δένδρων ἐχόντων φύλλα
  english_pob_choice: from twelve trees having leaves
  chosen_spanish: de doce árboles que tienen hojas
  alternatives_spanish:
  - de doce árboles frondosos
  - de hojas de doce árboles
  lexicon: LSJ
  rationale: Se mantiene la formulación oscura del griego sin reconstruir el rito más allá de lo atestiguado.
- source_word: πρωτογεννήματός σου
  english_pob_choice: your first produce
  chosen_spanish: tu primer fruto
  alternatives_spanish:
  - tu primera cosecha
  - tu primer producto
  lexicon: LSJ
  rationale: En español, 'primer fruto' comunica bien la ofrenda de los primeros productos agrícolas y mantiene el registro bíblico.
- source_word: ἅλατι ἁλιεῖς
  english_pob_choice: season every sacrifice with salt
  chosen_spanish: sazona con sal todo sacrificio
  alternatives_spanish:
  - salpica con sal todo sacrificio
  - da sal a todo sacrificio
  lexicon: LSJ
  rationale: '''Sazonar con sal'' es idiomático y transmite el mandato ritual sin perder literalidad.'
theological_decisions:
- issue: Nombre divino en fórmulas cultuales
  english_pob_reading: the Lord / Lord God
  chosen_spanish_reading: Yahvé / Yahvé, Dios
  alternative_spanish_readings:
  - Señor
  - el Señor Dios
  rationale: El proyecto exige restaurar el nombre divino donde el trasfondo es el Tetragrámaton o una alusión directa a él. En el cierre, 'Yahvé, Dios' preserva el doble referente de la fórmula griega.
  doctrine_reference: Ex 3:15; práctica editorial POB para יהוה
- issue: Advertencia de pureza ligada a la descendencia sacerdotal
  english_pob_reading: this persists and is about to defile the holy things through your offspring
  chosen_spanish_reading: este persiste y está por contaminar las cosas santas por medio de tu descendencia
  alternative_spanish_readings:
  - esto continúa y va a contaminar las cosas santas
  - este es constante y va a profanar lo santo por tu descendencia
  rationale: La advertencia no se reduce a moralidad general; conserva la conexión entre la impureza sexual, la descendencia y la santidad cultual.
  doctrine_reference: Lev 21; pureza sacerdotal en la tradición levítica
- issue: Categoría sacrificial σωτηρίου
  english_pob_reading: peace offerings
  chosen_spanish_reading: sacrificios de paz
  alternative_spanish_readings:
  - ofrendas de paz
  - sacrificios de bienestar
  rationale: Se mantiene una denominación sacrificial reconocible en español, sin borrar que el término también puede abarcar bienestar o reconciliación.
  doctrine_reference: Lv 3; LXX/uso cultual
translation_notes:
  revision_awareness: La revisión inglesa eliminó 'from my family' porque no está en el griego; el español sigue esa corrección y no añade parentesco no atestiguado. También incorporé la precisión de 'wash your hands' en el contexto sacrificial, reflejando la nota auditada del POB. Además, mantuve la oscilación cultual entre claridad y literalidad en el grupo de ofrendas y en la frase oscura sobre los doce árboles.
  spanish_consistency_notes:
  - Se usa Yahvé de manera consistente para κύριος en contexto cultual.
  - '''Cosas santas'' conserva el plural amplio de τὰ ἅγια, sin restringirlo al edificio del santuario.'
  - '''Ofrendas voluntarias'' y ''sacrificios de paz'' siguen la terminología cultual del capítulo y evitan reemplazos eclesiásticos modernos.'
  - '''Holocaustos completos'' mantiene la fuerza del compuesto griego mejor que un simple ''holocaustos''.'
  - Se evita introducir 'de mi familia' u otro parentesco no presente en el griego.
