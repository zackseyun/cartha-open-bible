    μήτε ἀπὸ γένους⁴⁴ ἀλλοφύλων⁴⁵ ἐθνῶν. 11. Καὶ πρὸ⁴⁶ τοῦ εἰσελθεῖν σε⁴⁷ εἰς τὰ ἅγια, λούου· καὶ ἐν τῷ θύειν σε⁴⁸, νίπτου⁴⁹· καὶ ἀπαρτίζων πάλιν⁵⁰ τὴν θυσίαν, νίπτου. 12. *Δώδεκα οὖν δένδρων ἐχόντων φύλλα⁵¹ ἀνάγαγε⁵² τῷ⁵³ Κυρίῳ⁵⁴ *ὡς κἀμὲ⁵⁵ Ἀβραὰμ ἐδίδαξε. 13. Καὶ ἐκ⁵⁶ παντὸς ζώου καθαροῦ⁵⁷ Γκαὶ πετεινοῦ⁵⁸⁾ πρόσφερε θυσίαν *τῷ Κυρίῳ⁵⁹. 14. Καὶ *παντὸς πρωτογεννήματός σου⁶⁰ καὶ οἴνου⁶¹ πρόσφερε *ἀπαρχὰς εἰς θυσίαν Κυρίῳ⁶² Γτῷ θεῷ⁶³⁾. *Καὶ πᾶσαν θυσίαν ἅλατι ἁλιεῖς⁶⁴.
