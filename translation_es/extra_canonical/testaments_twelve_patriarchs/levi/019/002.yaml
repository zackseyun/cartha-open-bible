source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ *ἀπεκρίθησαν αὐτῷ οἱ υἱοὶ αὐτοῦ λέγοντες⁸. Ἐνώπιον κυρίου πορευσόμεθα⁹ ⌜καὶ⌝¹⁰ κατὰ τὸν νόμον αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/019/002.yaml
  text: And his sons answered him, saying, “Before the Lord we will walk according to his law.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:14Z'
    unchanged: false
    changes_summary: Removed the unnecessary conjunction before 'according to his law' to better reflect the Greek and produce more natural English while preserving the sense of πορευσόμεθα ... κατὰ τὸν νόμον αὐτοῦ.
translation:
  language: es
  text: 'Y sus hijos le respondieron, diciendo: «Delante de Yahvé caminaremos conforme a su ley».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Delante de» conserva la imagen de vivir en la presencia de Dios; también puede entenderse como «ante» o «en presencia de».
    reason: spanish_style_note
lexical_decisions:
- source_word: ἀπεκρίθησαν ... λέγοντες
  english_pob_choice: answered him, saying
  chosen_spanish: le respondieron, diciendo
  alternatives_spanish:
  - le contestaron, diciendo
  - respondieron, diciendo
  lexicon: ἀποκρίνομαι
  rationale: Conserva la fórmula narrativa de respuesta directa y el dativo de destinatario («le»), con un verbo natural en español que mantiene el registro bíblico sin sobrecargarlo.
- source_word: Ἐνώπιον κυρίου
  english_pob_choice: Before the Lord
  chosen_spanish: Delante de Yahvé
  alternatives_spanish:
  - Ante el Señor
  - En presencia de Yahvé
  lexicon: ἐνώπιον + κύριος
  rationale: «Delante de» reproduce bien la relación espacial/metafórica de ἐνώπιον y mantiene la imagen de caminar en la presencia de Dios. Se usa «Yahvé» por la política terminológica del proyecto para el nombre divino; no se opta por «Señor» como máscara.
- source_word: πορευσόμεθα
  english_pob_choice: we will walk
  chosen_spanish: caminaremos
  alternatives_spanish:
  - andaremos
  - iremos
  lexicon: πορεύομαι
  rationale: «Caminar» en español bíblico expresa adecuadamente la metáfora ética de conducir la vida; evita la ambigüedad de «iremos», que podría sonar meramente locativa.
- source_word: κατὰ τὸν νόμον αὐτοῦ
  english_pob_choice: according to his law
  chosen_spanish: conforme a su ley
  alternatives_spanish:
  - según su ley
  - de acuerdo con su ley
  lexicon: κατά + νόμος
  rationale: «Conforme a» es una equivalencia natural y digna para la norma de conducta establecida por la ley divina, manteniendo el paralelismo con el verbo de caminar y evitando una repetición más pesada.
theological_decisions:
- issue: Nombre divino en el marco de κύριος
  english_pob_reading: Before the Lord we will walk
  chosen_spanish_reading: Delante de Yahvé caminaremos
  alternative_spanish_readings:
  - Delante del Señor caminaremos
  - Ante Yahvé caminaremos
  rationale: Aunque el griego usa κύριος, el contexto traduce una referencia al nombre divino según la política del proyecto. «Yahvé» preserva esa identificación y evita la convención de ocultarlo bajo «Señor».
  doctrine_reference: Uso consistente del Tetragrámaton en la traducción base del proyecto
translation_notes:
  revision_awareness: La revisión inglesa eliminó una conjunción innecesaria antes de «according to his law» para reflejar mejor la estructura del griego (πορευσόμεθα ... κατὰ τὸν νόμον αὐτοῦ). En español se sigue esa misma economía sintáctica con una sola cláusula coordinada sin añadir un equivalente de «y».
  spanish_consistency_notes:
  - Se mantiene el paralelismo narrativo breve y solemne propio del texto.
  - «Caminar» se usa en sentido ético, no meramente físico.
  - La puntuación con comillas angulares sigue la norma editorial en español.
