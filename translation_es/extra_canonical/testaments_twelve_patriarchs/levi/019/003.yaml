source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ εἶπεν *αὐτοῖς ὁ πατὴρ αὐτῶν¹¹. Μάρτυς ἐστι¹² κύριος, καὶ μάρτυρες οἱ¹³ ἄγγελοι αὐτοῦ, *καὶ μάρτυρες ὑμεῖς καὶ μάρτυς ἐγὼ¹⁴ *περὶ τοῦ λόγου τοῦ στόματος ὑμῶν¹⁵. Καὶ *εἶπον αὐτῷ οἱ υἱοὶ αὐτοῦ¹⁶. Μάρτυρες¹⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/019/003.yaml
  text: And their father said to them, “The Lord is witness, and his angels are witnesses, and you are witnesses, and I am a witness concerning the word of your mouth.” And his sons said to him, “We are witnesses.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:13Z'
    unchanged: false
    changes_summary: Changed the final reply from “Witnesses.” to “We are witnesses.” for natural English while preserving the Greek sense. No other changes needed.
translation:
  language: es
  text: 'Y su padre les dijo: «Yahvé es testigo, y sus ángeles son testigos, y ustedes son testigos, y yo soy testigo acerca de la palabra de su boca». Y sus hijos le dijeron: «Somos testigos».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κύριος
  english_pob_choice: The Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Señor Yahvé
  lexicon: κύριος
  rationale: El contexto identifica a Dios como testigo; según el estándar del proyecto, el nombre divino se vierte como «Yahvé» en el texto principal. «El Señor» ocultaría la referencia nominal explícita y debilitaría la trazabilidad con el griego y la tradición textual subyacente.
- source_word: μάρτυς ἐστι
  english_pob_choice: is witness
  chosen_spanish: es testigo
  alternatives_spanish:
  - da testimonio
  - es testigo de
  lexicon: μάρτυς
  rationale: «Testigo» conserva el valor nominal de μάρτυς mejor que una paráfrasis verbal. En español, la construcción predicativa «es testigo» reproduce con naturalidad la forma breve y solemne del original.
- source_word: ἄγγελοι
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  - sus mensajeros
  lexicon: ἄγγελος
  rationale: El contexto celestial y la tradición del pasaje favorecen «ángeles». «Mensajeros» sería una alternativa léxicamente posible, pero aquí disminuiría la claridad y no está exigida por el griego.
- source_word: περὶ τοῦ λόγου τοῦ στόματος ὑμῶν
  english_pob_choice: concerning the word of your mouth
  chosen_spanish: acerca de la palabra de su boca
  alternatives_spanish:
  - sobre la palabra de su boca
  - respecto de la palabra de su boca
  lexicon: λόγος; στόμα
  rationale: «Palabra de su boca» refleja de manera directa la expresión idiomática del griego. Se eligió «acerca de» para evitar un calco torpe, manteniendo el sentido relacional de περί. Se conservó el pronombre de tratamiento plural «su» por concordancia con «ustedes» en español.
- source_word: Μάρτυρες
  english_pob_choice: We are witnesses
  chosen_spanish: Somos testigos
  alternatives_spanish:
  - Somos testigos de ello
  - Testigos somos
  lexicon: μάρτυρες
  rationale: La respuesta final en griego es telegráfica, pero el sentido completo en español requiere un verbo copulativo explícito para sonar natural sin añadir contenido. «Somos testigos» preserva exactamente el valor declarativo que la revisión inglesa aclaró.
theological_decisions:
- issue: Referencia al nombre divino en κύριος
  english_pob_reading: The Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Señor
  rationale: El pasaje atribuye testimonio directo a Dios. Dado el marco de traducción del proyecto, se mantiene la referencia al nombre divino con «Yahvé» en lugar de una sustitución reverencial que borre la huella del original.
  doctrine_reference: Tetragrámaton / nombre divino
- issue: 'Estructura tripartita de testigos: Dios, sus ángeles, los hijos, y el padre'
  english_pob_reading: The Lord is witness, and his angels are witnesses, and you are witnesses, and I am a witness
  chosen_spanish_reading: Yahvé es testigo, y sus ángeles son testigos, y ustedes son testigos, y yo soy testigo
  alternative_spanish_readings:
  - Yahvé da testimonio, y sus ángeles dan testimonio, y ustedes dan testimonio, y yo doy testimonio
  rationale: Se conservó la repetición de «testigo/testigos» para reproducir la fuerza forense del original y mantener simetría retórica. La alternativa verbal suaviza la repetición, pero debilita el paralelismo explícito del texto.
  doctrine_reference: Testimonio legal y retórico
- issue: Última réplica de los hijos
  english_pob_reading: We are witnesses
  chosen_spanish_reading: Somos testigos
  alternative_spanish_readings:
  - Testigos
  - Somos testigos de ello
  rationale: La revisión inglesa aclaró que la réplica debe entenderse como una afirmación completa, no como una sola palabra aislada. «Somos testigos» conserva la brevedad y evita crear una ambigüedad innecesaria en español.
  doctrine_reference: Respuesta testimonial
translation_notes:
  revision_awareness: 'This draft follows the latest revision pass, which normalized the sons’ reply to a full affirmative statement: “We are witnesses.” No other textual changes were indicated by the audit trail.'
  spanish_consistency_notes:
  - Se mantuvo «testigo/testigos» de forma consistente para μάρτυς/μάρτυρες.
  - Se empleó «Yahvé» conforme a la terminología proyectual para κύριος cuando refiere al nombre divino.
  - Se usó «ustedes/su» para reflejar el plural griego de segunda persona en un registro neutral y respetuoso.
  - No se añadieron notas al pie porque no era necesario resolver una variante textual o léxica que exigiera anclaje explícito.
