translation:
  language: es
  text: Y ahora, hijos míos, todo lo habéis oído. Escoged para vosotros mismos o la luz o la oscuridad, o la ley del Señor o las obras de Beliar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijos míos, amados
  lexicon: τέκνα
  rationale: «hijos míos» reproduce el vocativo afectuoso y natural del griego sin cargarlo de un matiz más específico de filiación biológica que el contexto no exige.
- source_word: πάντα ἠκούσατε
  english_pob_choice: you have heard everything
  chosen_spanish: todo lo habéis oído
  alternatives_spanish:
  - habéis oído todo
  - todo lo habéis escuchado
  lexicon: ἀκούω
  rationale: La forma española mantiene el perfecto con valor de hecho completado y conserva el sentido global de haber recibido toda la enseñanza, sin añadir interpretación.
- source_word: Ἐκλέξασθε ἑαυτοῖς
  english_pob_choice: Choose for yourselves
  chosen_spanish: Escoged para vosotros mismos
  alternatives_spanish:
  - Elegid para vosotros mismos
  - Escogeos a vosotros mismos
  lexicon: ἐκλέγομαι
  rationale: «Escoged» refleja el imperativo plural y «para vosotros mismos» conserva el énfasis reflexivo de ἑαυτοῖς.
- source_word: τὸ φῶς / τὸ σκότος
  english_pob_choice: the light / the darkness
  chosen_spanish: la luz / la oscuridad
  alternatives_spanish:
  - la luz / las tinieblas
  - la claridad / la oscuridad
  lexicon: φῶς / σκότος
  rationale: «La luz» se mantiene literal; «la oscuridad» es idiomática en español moderno y preserva el contraste moral sin forzar un plural poético que el griego no exige.
- source_word: τὸν νόμον κυρίου
  english_pob_choice: the law of the Lord
  chosen_spanish: la ley del Señor
  alternatives_spanish:
  - la ley de Yahvé
  - la instrucción del Señor
  lexicon: νόμος / κύριος
  rationale: Se conserva «ley» por correspondencia directa con νόμος. Aquí «Señor» refleja el audit trail inglés y la formulación tradicional del título divino en la obra, aunque el proyecto normalmente use Yahvé para יהוה; el contexto de esta sentencia exhortativa y la ausencia de un testigo hebreo directo hacen prudente mantener la forma fija recibida en el texto base.
- source_word: τὰ ἔργα τοῦ Βελίαρ
  english_pob_choice: the works of Beliar
  chosen_spanish: las obras de Beliar
  alternatives_spanish:
  - las obras de Beliar
  - las obras de Belial
  lexicon: ἔργα / Βελίαρ
  rationale: «Obras» traduce ἔργα de manera directa. Se conserva «Beliar» como transliteración del nombre propio tal como aparece en el texto fuente y en la traducción inglesa auditada.
theological_decisions:
- issue: Contraste moral de elección entre dos caminos
  english_pob_reading: Choose for yourselves either the light or the darkness, either the law of the Lord or the works of Beliar.
  chosen_spanish_reading: Escoged para vosotros mismos o la luz o la oscuridad, o la ley del Señor o las obras de Beliar.
  alternative_spanish_readings:
  - Elegid entre la luz y la oscuridad, entre la ley del Señor y las obras de Beliar.
  - 'Escoged una de dos: la luz o la oscuridad, la ley del Señor o las obras de Beliar.'
  rationale: La redacción conserva el paralelismo disyuntivo del original y el carácter exhortativo de una decisión moral real, sin suavizar la oposición entre los dos ámbitos.
  doctrine_reference: Ética de la elección; dualismo moral del Testamento de Leví
- issue: Uso de «Señor» frente al default editorial «Yahvé»
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Dios
  rationale: Aunque el proyecto prefiere «Yahvé» para יהוה, aquí el testimonio fuente es griego con κύριος y la tradición textual auditada del POB inglés fija «the Lord». En una sección extra-canónica sin hebreo subyacente recuperable, «Señor» evita una certeza fingida sobre el nombre divino exacto y preserva la fórmula heredada.
  doctrine_reference: Nombre divino; criterio de traducción para κύριος
- issue: Identificación de Beliar como figura de oposición
  english_pob_reading: Beliar
  chosen_spanish_reading: Beliar
  alternative_spanish_readings:
  - Belial
  - Beliar
  rationale: No se normaliza a «Belial» porque el testigo y la traducción inglesa auditada conservan «Beliar»; esto preserva la forma específica transmitida por la tradición de esta obra.
  doctrine_reference: Figura demonológica en literatura testamental
- issue: Alcance de «todo»
  english_pob_reading: you have heard everything
  chosen_spanish_reading: todo lo habéis oído
  alternative_spanish_readings:
  - habéis oído todo
  rationale: La elección mantiene la totalidad del contenido ya comunicado, sin introducir un matiz de exhaustividad distinto al del griego.
  doctrine_reference: Plenitud de la instrucción previa
translation_notes:
  revision_awareness: The latest revision pass marked the verse unchanged; no further textual changes were indicated in the audit trail. The Spanish draft therefore follows the stable Greek source-fixed reading and the audited English sense without introducing new textual conjectures.
  spanish_consistency_notes:
  - Se mantiene el estilo exhortativo en imperativos plurales.
  - No se introduce «Yahvé» porque el término fuente inmediato es κύριος en griego y el audit trail inglés fija «the Lord».
  - Se conserva la transliteración «Beliar» por consistencia con la obra y el texto fuente.
  - La puntuación reproduce la estructura disyuntiva del original con dos pares alternativos.
