  text: Καὶ νῦν, τέκνα μου¹, πάντα ἠκούσατε². Ἐκλέξασθε³ ἑαυτοῖς *ἢ τὸ φῶς ἢ τὸ σκότος⁴, ἢ τὸν⁵ νόμον⁶ κυρίου, ἢ *τὰ ἔργα τοῦ Βελίαρ⁷.
