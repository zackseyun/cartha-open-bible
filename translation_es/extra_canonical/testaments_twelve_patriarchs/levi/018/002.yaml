id: T12P.LEV.18.2
reference: Testament of Levi 18:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ³ τότε ἐγερεῖ⁴ κύριος ἱερέα καινόν⁵, ᾧ⁶ πάντες οἱ λόγοι κυρίου⁷ ἀποκαλυφθήσονται⁸, καὶ αὐτὸς ποιήσει κρίσιν⁹ ἀληθείας¹⁰ ἐπὶ τῆς γῆς¹¹ *ἐν πλήθει¹² ἡμερῶν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/018/002.yaml
  text: Then the Lord will raise up a new priest, to whom all the words of the Lord will be revealed; and he will execute true judgment upon the earth for many days.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:11Z'
    unchanged: false
    changes_summary: Revised 'a judgment of truth' to the more natural and accurate 'true judgment' for κρίσιν ἀληθείας. Kept the rest unchanged, as it is faithful and complete.
translation:
  language: es
  text: Entonces el Señor levantará un nuevo sacerdote, a quien se revelarán todas las palabras del Señor; y él ejecutará juicio verdadero sobre la tierra durante muchos días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: κύριος
  rationale: En este versículo el contexto griego usa κύριος como título divino. Mantengo «el Señor» en lugar de introducir «Yahvé» en el texto principal porque la fuente inmediata no escribe el nombre divino, aunque el referente sea el Dios de Israel. Esto conserva el audit trail del original griego y la fluidez natural en español.
- source_word: ἱερέα καινόν
  english_pob_choice: a new priest
  chosen_spanish: un nuevo sacerdote
  alternatives_spanish:
  - un sacerdote nuevo
  - un sacerdote renovado
  lexicon: ἱερεύς
  rationale: «Sacerdote» es la correspondencia normal de ἱερεύς en español bíblico. «Nuevo» conserva καινόν sin sobreinterpretarlo como una renovación moral específica.
- source_word: ἀποκαλυφθήσονται
  english_pob_choice: will be revealed
  chosen_spanish: se revelarán
  alternatives_spanish:
  - serán reveladas
  lexicon: ἀποκαλύπτω
  rationale: La forma pasiva se expresa naturalmente con «se revelarán». «Las palabras» mantiene el plural del griego, evitando reducirlo a un sentido más general.
- source_word: ποιήσει κρίσιν ἀληθείας
  english_pob_choice: he will execute true judgment
  chosen_spanish: ejecutará juicio verdadero
  alternatives_spanish:
  - hará juicio verdadero
  - ejecutará un juicio verdadero
  lexicon: κρίσις / ἀλήθεια
  rationale: Sigo la revisión inglesa que corrigió «a judgment of truth» a «true judgment». En español, «juicio verdadero» conserva la cualidad adjetival de ἀληθείας y evita la estructura menos natural «juicio de verdad».
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  lexicon: γῆ
  rationale: «Sobre la tierra» reproduce la cobertura territorial del griego y el tono bíblico de la expresión.
- source_word: ἐν πλήθει ἡμερῶν
  english_pob_choice: for many days
  chosen_spanish: durante muchos días
  alternatives_spanish:
  - por muchos días
  - en muchos días
  lexicon: πλῆθος / ἡμέρα
  rationale: «Durante muchos días» comunica duración continua de modo natural en español y conserva el sentido temporal de la frase.
theological_decisions:
- issue: Identidad del «Señor»
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Aunque el nombre divino del proyecto suele ser «Yahvé» cuando el texto lo exige, aquí el testimonio recibido está en griego con κύριος. Por fidelidad al estrato textual disponible y para no forzar una retroversión no explícita, se mantiene «el Señor».
  doctrine_reference: Criterio de transparencia textual y distinción entre el uso griego de κύριος y la convención editorial para el Tetragrámaton.
- issue: Naturaleza de la realeza sacerdotal futura
  english_pob_reading: a new priest
  chosen_spanish_reading: un nuevo sacerdote
  alternative_spanish_readings:
  - un nuevo sumo sacerdote
  - un sacerdote renovado
  rationale: El texto griego habla de un «sacerdote» nuevo sin añadir explícitamente «sumo». Mantenerlo así evita ampliar el cargo más allá del dato textual.
  doctrine_reference: Principio de no sobreespecificar títulos donde el original no los da.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «a judgment of truth» por «true judgment» para κρίσιν ἀληθείας. La traducción española sigue esa revisión con «juicio verdadero», evitando una estructura posesiva o abstracta que no refleja bien el griego. No se añadieron notas porque no surgieron variantes textuales ni ambigüedades que requirieran marcarse en el texto español.
  spanish_consistency_notes:
  - 'Se conserva una correspondencia sobria y literal en la secuencia temporal: «Entonces... levantará... se revelarán... ejecutará... durante muchos días».'
  - Se mantiene el registro bíblico estándar con «Señor», «sacerdote», «juicio» y «tierra», sin introducir terminología eclesiástica posterior no exigida por el texto.
  - No se emplea «Cristo» ni «Mesías» porque el verso no contiene el título χριστός/משיח.
  - La frase «palabras del Señor» se mantiene en plural para respetar el griego y el sentido de revelación completa.
