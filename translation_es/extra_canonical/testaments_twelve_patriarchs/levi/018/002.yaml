- from: Entonces el Señor levantará un nuevo sacerdote, a quien se revelarán todas las palabras del Señor; y él ejecutará juicio verdadero sobre la tierra durante muchos días.
  to: Entonces Yahvé levantará un nuevo sacerdote, a quien se revelarán todas las palabras de Yahvé; y él ejecutará verdadero juicio sobre la tierra durante muchos días.
  rationale: 'Se revisa principalmente para ajustar la terminología divina a la política del proyecto: «Yahvé» en lugar de «el Señor». Además, se pule ligeramente el orden de «verdadero juicio» para una lectura más natural y digna en español, manteniendo intacto el sentido del griego y de la revisión inglesa.'
