review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: τότε/ἐγερεῖ = «Entonces ... levantará», ἱερέα καινόν = «un nuevo sacerdote», ᾧ ... ἀποκαλυφθήσονται = «a quien se revelarán...», y ἐν πλήθει ἡμερῶν = «durante muchos días». La única desviación relevante es κύριος, que por la política terminológica del proyecto normalmente debe renderizarse «Yahvé» cuando refiere al Dios de Israel; aquí el borrador conserva «Señor» por dependencia del griego, pero el mandato del proyecto pide explicar excepciones y no hace de este caso una excepción necesaria. También «ejecutará juicio verdadero» es comprensible, pero «hará justicia verdadera» o «ejercerá juicio verdadero» sería más idiomático; aun así, no es un error grave de sentido.'
  spanish_quality_summary: El español es claro y digno, pero puede alinearse mejor con el estilo del proyecto y sonar un poco más natural. «Entonces Yahvé levantará...» mejora la consistencia terminológica. «sobre la tierra» y «durante muchos días» son naturales. «ejecutará juicio verdadero» es aceptable, aunque algo rígido; «ejecutará verdadero juicio» fluye mejor en registro bíblico.
  glossary_alignment: 'Desalineación principal con la guía del proyecto en יהוה/YHWH -> «Yahvé». Aunque la fuente inmediata tenga κύριος, el referente es claramente divino y no hay nota ni justificación suficiente para apartarse de la convención principal en el texto. El resto del glosario está bien: ἱερεύς = «sacerdote», ἀποκαλυφθήσονται = «se revelarán», γῆ = «tierra».'
  issues:
  - severity: medium
    issue: Uso de «el Señor» en lugar de «Yahvé»
    rationale: La guía del proyecto establece «Yahvé» como forma principal para el nombre divino. Aquí κύριος refiere al Dios de Israel en un contexto profético; mantener «Señor» sin nota de excepción debilita la consistencia terminológica del proyecto.
  - severity: low
    issue: «ejecutará juicio verdadero» suena algo rígido en español
    rationale: 'Es fiel al sentido de κρίσιν ἀληθείας, pero una leve mejora de orden puede hacerla más natural sin cambiar el significado: «ejecutará verdadero juicio».'
  revised_spanish_text: Entonces Yahvé levantará un nuevo sacerdote, a quien se revelarán todas las palabras de Yahvé; y él ejecutará verdadero juicio sobre la tierra durante muchos días.
  revision_rationale: 'Se revisa principalmente para ajustar la terminología divina a la política del proyecto: «Yahvé» en lugar de «el Señor». Además, se pule ligeramente el orden de «verdadero juicio» para una lectura más natural y digna en español, manteniendo intacto el sentido del griego y de la revisión inglesa.'
