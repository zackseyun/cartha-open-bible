id: T12P.LEV.18.6
reference: Testament of Levi 18:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Οἱ οὐρανοὶ³⁵ ἀνοιγήσονται³⁶, καὶ³⁷ ἐκ τοῦ ναοῦ τῆς δόξης³⁸ ἥξει³⁹ ἐπ᾽⁴⁰ αὐτὸν ἁγίασμα μετὰ φωνῆς πατρικῆς ὡς ἀπὸ *Ἀβραὰμ πρὸς Ἰσαάκ⁴¹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/018/006.yaml
  text: The heavens will be opened, and from the temple of glory holiness will come upon him with a fatherly voice, as from Abraham to Isaac.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:12Z'
    unchanged: false
    changes_summary: Changed 'sanctification' to 'holiness' for a more natural and contextually fitting rendering of ἁγίασμα; otherwise retained the draft.
translation:
  language: es
  text: Los cielos se abrirán, y del templo de la gloria vendrá sobre él santidad con voz paterna, como de Abraham a Isaac.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Οἱ οὐρανοί
  english_pob_choice: The heavens
  chosen_spanish: Los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: οὐρανός
  rationale: Conserva el plural solemne del griego y corresponde al registro bíblico del inglés POB sin aplanarlo a singular.
- source_word: ἀνοιγήσονται
  english_pob_choice: will be opened
  chosen_spanish: se abrirán
  alternatives_spanish:
  - serán abiertos
  - se descorrerán
  lexicon: ἀνοίγω
  rationale: El pasivo futuro se expresa naturalmente en español con voz media/reflexiva; mantiene la imagen de apertura sin añadir matiz no presente en la fuente.
- source_word: ἐκ τοῦ ναοῦ τῆς δόξης
  english_pob_choice: from the temple of glory
  chosen_spanish: del templo de la gloria
  alternatives_spanish:
  - del templo glorioso
  - desde el templo de la gloria
  lexicon: ναός; δόξα
  rationale: Se conserva la construcción genitiva del griego. 'De la gloria' reproduce mejor la relación nominal que 'glorioso', que desplazaría el foco desde la gloria como ámbito o cualidad hacia un adjetivo.
- source_word: ἁγίασμα
  english_pob_choice: holiness
  chosen_spanish: santidad
  alternatives_spanish:
  - holgura
  - consagración
  - santidad
  lexicon: ἁγίασμα
  rationale: El inglés POB actualizó de 'sanctification' a 'holiness' por ser más natural; en español 'santidad' comunica mejor ese resultado/estado sagrado que 'santificación', que suena más procesual o doctrinal.
- source_word: μετὰ φωνῆς πατρικῆς
  english_pob_choice: with a fatherly voice
  chosen_spanish: con voz paterna
  alternatives_spanish:
  - con voz de padre
  - con una voz paternal
  lexicon: φωνή; πατρικός
  rationale: '''Paterna'' conserva el adjetivo relacional del griego y la dignidad del registro; evita una paráfrasis más interpretativa.'
- source_word: ὡς ἀπὸ Ἀβραὰμ πρὸς Ἰσαάκ
  english_pob_choice: as from Abraham to Isaac
  chosen_spanish: como de Abraham a Isaac
  alternatives_spanish:
  - como entre Abraham e Isaac
  - como de Abraham para Isaac
  lexicon: ὡς; ἀπό; πρός
  rationale: Mantiene la comparación breve y la relación direccional del original sin explicitar más de lo que la frase ofrece.
theological_decisions:
- issue: Naturaleza de ἁγίασμα
  english_pob_reading: holiness
  chosen_spanish_reading: santidad
  alternative_spanish_readings:
  - santificación
  - consagración
  rationale: La revisión inglesa decidió evitar una lectura excesivamente técnica ('sanctification'). En español, 'santidad' reproduce mejor el valor cualitativo/resultativo y conserva la tensión entre estado santo e irrupción de lo santo sobre él.
  doctrine_reference: Santidad/consagración en contexto cultual; cf. uso léxico de ἁγίασμα en tradición bíblica griega.
- issue: '''temple of glory'' as cultic/heavenly imagery'
  english_pob_reading: temple of glory
  chosen_spanish_reading: templo de la gloria
  alternative_spanish_readings:
  - templo glorioso
  - santuario de gloria
  rationale: Se mantiene el sustantivo 'templo' para no diluir la imagen cultual. 'De la gloria' conserva la relación genitiva y el tono apocalíptico sin sustituirlo por una paráfrasis interpretativa.
  doctrine_reference: Imaginería del templo celestial y la gloria divina en literatura apocalíptica.
translation_notes:
  revision_awareness: El texto inglés de trabajo fue revisado desde 'sanctification' a 'holiness'; la versión española sigue esa decisión con 'santidad' para evitar un tecnicismo excesivo y reflejar mejor el resultado sacral del término ἁγίασμα. No se introdujeron notas textuales porque la base griega y el inglés auditado coinciden sustancialmente.
  spanish_consistency_notes:
  - Se conserva 'cielos' en plural por coherencia con el griego y con el registro bíblico.
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino explícito.
  - '''Santidad'' se reserva aquí para ἁγίασμα como efecto o cualidad sagrada, no como proceso técnico de ''santificación''.'
