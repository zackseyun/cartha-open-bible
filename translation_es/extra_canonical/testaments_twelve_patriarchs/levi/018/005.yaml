translation:
  language: es
  text: Los cielos se regocijarán en sus días, y la tierra se alegrará, y las nubes[a] se gozarán; [y el conocimiento de Yahvé[b] será derramado sobre la tierra como agua de los mares;] y los ángeles de la gloria de la presencia[c] de Yahvé se gozarán en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego trae un óbelo (†) antes de «nubes» (νεφέλαι), señal de que Charles (1908) sospechaba una corrupción o glosa en este punto. El término se preserva en la traducción, pero su autenticidad textual es incierta.
    reason: textual_variant
  - marker: b
    text: Gr. κυρίου («del Señor»). En los Testamentos de los Doce Patriarcas —texto judío— κύριος representa el nombre divino hebreo יהוה (YHWH). Siguiendo la norma del proyecto, se traduce «Yahvé» en lugar de la convención de enmascaramiento «Señor». Esta equivalencia se aplica a ambas apariciones de κυρίου en el versículo.
    reason: source_note
  - marker: c
    text: 'Gr. τοῦ προσώπου, lit. «del rostro». La locución «ángeles del rostro de Yahvé» es un título técnico establecido en la literatura judía para los seres celestiales que permanecen ante Dios (cf. Is 63:9; 1 Hen. 40:9; Jub. 2:2; T.Lev. 3:5). Se traduce «presencia» para hacer explícita esa función ante el lector hispanohablante; alternativa literal: «los ángeles de la gloria del rostro de Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγαλλιάσονται
  english_pob_choice: will rejoice
  chosen_spanish: se regocijarán
  alternatives_spanish:
  - exultarán
  - se alegrarán con júbilo
  - se alborozarán
  lexicon: 'BDAG ἀγαλλιάω: exult, be overjoyed; stronger register than χαίρω or εὐφραίνω'
  rationale: ἀγαλλιάω denotes intense exultation, a degree above ordinary gladness. 'Se regocijarán' captures this stronger register in natural Spanish and preserves the lexical distinction from the two other joy-verbs in the same verse (χαρήσεται, εὐφρανθήσονται). The English POB collapsed the distinction by rendering both ἀγαλλιάσονται and εὐφρανθήσονται as 'rejoice'; Spanish can and should differentiate.
- source_word: χαρήσεται
  english_pob_choice: will be glad
  chosen_spanish: se alegrará
  alternatives_spanish:
  - se regocijará
  - se gozará
  lexicon: 'BDAG χαίρω: rejoice, be glad; the standard LXX/NT verb for joy'
  rationale: χαίρω is the unmarked, general term for rejoicing. 'Se alegrará' is the natural Spanish equivalent and occupies the middle register between the strong ἀγαλλιάσονται ('se regocijarán') and εὐφρανθήσονται ('se gozarán').
- source_word: εὐφρανθήσονται
  english_pob_choice: will rejoice / will be glad (used inconsistently across two occurrences)
  chosen_spanish: se gozarán
  alternatives_spanish:
  - se alegrarán
  - se regocijarán
  lexicon: 'BDAG εὐφραίνω: make glad, rejoice, experience joy; often associated with festive gladness'
  rationale: εὐφραίνω appears twice—once for the clouds and once for the angels—and both times receives a consistent Spanish rendering 'se gozarán'. The English POB used 'rejoice' for the clouds and 'be glad' for the angels despite the identical Greek verb; Spanish here restores consistency while maintaining a distinct term from the other two joy-verbs in the verse.
- source_word: γνῶσις
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - ciencia
  lexicon: 'BDAG γνῶσις: knowledge, especially revealed or cognitive understanding; distinct from σοφία (wisdom)'
  rationale: '''Conocimiento'' is the standard Spanish equivalent for γνῶσις in theological contexts. The phrase echoes Hab 2:14 / Is 11:9 (''the earth will be filled with the knowledge of the glory of the LORD''); ''conocimiento'' preserves that intertextual resonance in Spanish.'
- source_word: ἐκχυθήσεται
  english_pob_choice: will be poured out
  chosen_spanish: será derramado
  alternatives_spanish:
  - se derramará
  - fluirá
  lexicon: 'BDAG ἐκχέω: pour out; future passive here'
  rationale: ἐκχέω in the passive ('will be poured out') carries the image of abundant, overflowing distribution. 'Será derramado' mirrors the passive construction and the standard Spanish verb for pouring/shedding. 'Se derramará' (reflexive) would also work but slightly loses the passive/divine-agent nuance.
- source_word: θαλασσῶν
  english_pob_choice: of the seas
  chosen_spanish: de los mares
  alternatives_spanish:
  - del mar
  lexicon: 'θάλασσα plural genitive: of the seas'
  rationale: The Greek is a genuine plural (θαλασσῶν). 'De los mares' preserves that plurality, which may intensify the imagery of boundless waters. The English POB likewise preserved the plural.
- source_word: κυρίου
  english_pob_choice: the Lord / Lord's
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: κύριος in Jewish pseudepigrapha as rendering of יהוה (YHWH)
  rationale: The immediate source is Greek κύριος (not a direct Hebrew text), but in T.Levi—a Jewish pseudepigraphon—κύριος consistently represents the divine name YHWH. Project default requires 'Yahvé' even when the source surface is κύριος, with explanation. See footnote [b]. Both occurrences in this verse are rendered 'Yahvé' consistently.
- source_word: τοῦ προσώπου
  english_pob_choice: presence (in 'Lord's presence')
  chosen_spanish: de la presencia
  alternatives_spanish:
  - del rostro
  lexicon: 'πρόσωπον: face, countenance; but idiomatically ''presence'' in constructions like ἐνώπιον / ἄγγελοι τοῦ προσώπου'
  rationale: Literally 'face'; however, 'ángeles del rostro de Yahvé' is an established Jewish technical term for heavenly beings who stand before God's face (cf. Is 63:9; 1 En. 40:9; Jub. 2:2). 'Presencia' makes this liturgical function explicit in Spanish. The literal 'rostro' is preserved as an alternative in footnote [c].
- source_word: δόξης
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - majestad
  lexicon: 'BDAG δόξα: glory, splendor; standard theological term'
  rationale: '''Gloria'' is the established Spanish theological equivalent for δόξα and is both natural and dignified in this context.'
theological_decisions:
- issue: κυρίου rendered as 'Yahvé' despite Greek surface source
  english_pob_reading: the Lord / Lord's
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Señor Dios
  rationale: T.Levi 18 is a Jewish pseudepigraphon in which κύριος is the standard Greek representation of the divine name יהוה. Using 'el Señor' would mask the divine name behind a titular convention, contrary to the POB transparency principle. 'Yahvé' is therefore the correct rendering per project norms, with this note as the required source-based rationale for rendering a Greek κύριος as the divine name rather than the generic title 'Señor'. The decision applies to both occurrences in the verse.
  doctrine_reference: POB divine-name rendering policy; Jewish pseudepigrapha κύριος = YHWH convention
- issue: ἄγγελοι τῆς δόξης τοῦ προσώπου κυρίου — angelic title with messianic and eschatological weight
  english_pob_reading: angels of the glory of the Lord's presence
  chosen_spanish_reading: los ángeles de la gloria de la presencia de Yahvé
  alternative_spanish_readings:
  - los ángeles de la gloria del rostro de Yahvé
  - los ángeles de la presencia gloriosa de Yahvé
  rationale: 'The genitive chain δόξης τοῦ προσώπου is dense: ''of-the-glory of-the-face''. In T.Levi 18 the pericope describes the eschatological priest-messiah; ''the angels of the glory of the presence'' are those throne-room beings whose rejoicing (''in him'', ἐν αὐτῷ) validates the messianic figure. Rendering τοῦ προσώπου as ''presencia'' rather than ''rostro'' aligns with the established Jewish concept of the ángeles de la presencia (cf. Is 63:9 LXX; 1 En. 40:9; Jub. 2:2) and communicates the concept to Spanish readers without requiring a footnote to parse ''face-of-God'' idiom. The literal ''rostro'' is preserved as an alternative in footnote [c] so the source force is not erased.'
  doctrine_reference: 'Jewish angelology: angels of the presence (ángeles de la presencia/ángeles del rostro); cf. Is 63:9; 1 En. 40; Jub. 2:2; T.Levi 3:5'
- issue: Bracketed clause [καὶ ἡ γνῶσις κυρίου ἐκχυθήσεται...] — possible secondary addition echoing Hab 2:14 / Is 11:9
  english_pob_reading: '[and the knowledge of the Lord will be poured out upon the earth like the water of the seas;]'
  chosen_spanish_reading: '[y el conocimiento de Yahvé será derramado sobre la tierra como agua de los mares;]'
  rationale: The square brackets in the Charles 1908 Greek text signal a textually suspect or secondary clause. The clause echoes Hab 2:14 / Is 11:9 and has strong eschatological resonance. The Spanish preserves the brackets following the English POB formatting convention; no paraphrase is introduced. The intertextual allusion to the filling of the earth with divine knowledge is theologically significant in the messianic context of T.Levi 18.
  doctrine_reference: 'Intertextual: Hab 2:14; Is 11:9; eschatological knowledge motif in Jewish messianism'
translation_notes:
  revision_awareness: 'La última revisión registrada (modelo gpt-5.4, 2026-04-23) confirmó que no se requerían cambios en el texto inglés (unchanged: true). No hay revisiones aplicadas ni historial de revisiones en español previo. Este borrador español es la primera traducción documentada de T12P.LEV.18.5 en el proyecto POB; no hay tensiones de revisión anteriores que conciliar.'
  spanish_consistency_notes:
  - «Yahvé» se emplea para ambas ocurrencias de κυρίου en el versículo, conforme a la norma del proyecto para el nombre divino en textos judíos de lengua griega.
  - Se usan tres verbos españoles distintos para los tres verbos griegos de alegría/gozo (ἀγαλλιάσονται → «se regocijarán»; χαρήσεται → «se alegrará»; εὐφρανθήσονται → «se gozarán»), preservando una distinción léxica que el POB inglés aplanó al usar «rejoice» y «be glad» de forma inconsistente.
  - El verbo εὐφρανθήσονται recibe el mismo rendering («se gozarán») en sus dos ocurrencias dentro del versículo (nubes y ángeles), restaurando la coherencia que el inglés POB no mantuvo.
  - Los corchetes del texto fuente ([...]) que delimitan la cláusula de conocimiento se preservan en el español siguiendo la convención del POB inglés.
  - La construcción pasiva ἐκχυθήσεται se traduce como pasiva en español («será derramado») para reflejar la voz del original griego.
  - El plural θαλασσῶν («de los mares») se preserva como «de los mares» en lugar de singularizar a «del mar».
