base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/018/005.yaml
  text: The heavens will rejoice in his days, and the earth will be glad, and the clouds will rejoice; [and the knowledge of the Lord will be poured out upon the earth like the water of the seas;] and the angels of the glory of the Lord's presence will be glad in him.
  revision_pass:
