  text: Οἱ οὐρανοὶ ἀγαλλιάσονται²⁴ ἐν ταῖς ἡμέραις αὐτοῦ²⁵, καὶ ἡ γῆ χαρήσεται²⁶, καὶ αἱ²⁷ †νεφέλαι²⁸ εὐφρανθήσονται²⁹. [καὶ ἡ γνῶσις κυρίου³⁰ ἐκχυθήσεται³¹ ἐπὶ τῆς γῆς ὡς³² ὕδωρ θαλασσῶν³³] *καὶ οἱ ἄγγελοι τῆς δόξης τοῦ προσώπου κυρίου εὐφρανθήσονται ἐν αὐτῷ³⁴.
