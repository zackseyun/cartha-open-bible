base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/018/014.yaml
  text: Then Abraham and Isaac and Jacob will exult, and I will rejoice, and all the holy ones will put on righteousness.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:13Z'
    unchanged: false
    changes_summary: Changed 'be glad' to 'rejoice' for closer lexical correspondence to χαρήσομαι and better consistency in elevated register; otherwise retained the draft.
translation:
  language: es
  text: Entonces Abraham, Isaac y Jacob exultarán de gozo, y yo me regocijaré, y todos los santos se vestirán de justicia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀγαλλιάσεται
  english_pob_choice: will exult
  chosen_spanish: se regocijarán
  alternatives_spanish:
  - exultarán
  - saltarán de gozo
  lexicon: ἀγαλλιάω
  rationale: El griego expresa júbilo intenso y elevado. En español, «regocijarse» conserva un registro digno y bíblico sin volverlo anticuado o excesivamente literal. «Exultar» también sería posible, pero «regocijarse» fluye mejor en este contexto de alabanza futura.
- source_word: χαρήσομαι
  english_pob_choice: will rejoice
  chosen_spanish: me regocijaré
  alternatives_spanish:
  - me alegraré
  - me gozaré
  lexicon: χαίρω
  rationale: La revisión inglesa ya ajustó «be glad» a «rejoice» para acercarse más a χαρήσομαι. En español, «me regocijaré» mantiene esa correspondencia léxica y el tono solemne del pasaje.
- source_word: ἐνδύσονται
  english_pob_choice: will put on
  chosen_spanish: se vestirán de
  alternatives_spanish:
  - se revestirán de
  - pondrán sobre sí
  lexicon: ἐνδύω
  rationale: La imagen es de revestirse con una cualidad, no solo de llevar una prenda física. «Vestirse de» comunica la metáfora con naturalidad; «revestirse de» sería más formal pero menos fluido.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: δικαιοσύνη
  rationale: En español bíblico, «justicia» es la equivalencia más amplia y transparente para δικαιοσύνη. «Rectitud» resaltaría el matiz moral, pero el texto presenta una imagen de revestimiento escatológico que en español se expresa mejor con «justicia».
- source_word: οἱ ἅγιοι
  english_pob_choice: all the holy ones
  chosen_spanish: todos los santos
  alternatives_spanish:
  - todos los consagrados
  - todos los santos seres
  lexicon: ἅγιος
  rationale: «Santos» es la forma natural y reconocible en español para el grupo de los consagrados a Dios. Mantiene la referencia colectiva sin introducir una aclaración innecesaria.
theological_decisions:
- issue: Imagen de revestirse de justicia
  english_pob_reading: all the holy ones will put on righteousness
  chosen_spanish_reading: todos los santos se vestirán de justicia
  alternative_spanish_readings:
  - todos los santos se revestirán de justicia
  - todos los santos llevarán justicia
  rationale: Conserva la metáfora bíblica de una justicia que se asume como vestidura, sin reinterpretarla como mera conducta ética. Esto respeta la fuerza simbólica del griego y la lectura inglesa.
  doctrine_reference: Imputación / revestimiento escatológico de justicia en lenguaje simbólico bíblico
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «be glad» por «rejoice» para acercarse más a χαρήσομαι. La redacción española sigue esa corrección con «me regocijaré» y mantiene el resto de la sintaxis y la imaginería del borrador inglés sin añadir explicaciones ajenas al texto.
  spanish_consistency_notes:
  - Se mantuvo «santos» para οἱ ἅγιοι, coherente con el uso bíblico común en español.
  - Se prefirió «regocijarse» en ambos verbos de júbilo para sostener el paralelismo del versículo.
  - No se usó «Señor» ni terminología litúrgica no presente en el texto fuente.
