translation:
  language: es
  text: Yahvé se alegrará por causa de sus hijos, y se deleitará en sus amados[a] para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Amados» puede leerse también como «los que él ama»; se mantiene la forma nominal para reflejar más de cerca el griego τοῖς ἀγαπητοῖς.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Soberano
  lexicon: κύριος
  rationale: El contexto alude a la divinidad con lenguaje de nombre propio y, según las normas del proyecto, el tetragrámaton se vierte como «Yahvé» en el texto principal en lugar de ocultarlo con «SEÑOR». Aunque el griego usa κύριος, aquí la referencia es claramente a Dios, no a un mero título humano.
- source_word: εὐφρανθήσεται
  english_pob_choice: will rejoice
  chosen_spanish: se alegrará
  alternatives_spanish:
  - se regocijará
  - se gozará
  lexicon: εὐφραίνομαι
  rationale: «Se alegrará» comunica con naturalidad en español el matiz de gozo/rejoicing sin volverlo artificioso. «Regocijará» o «gozará» son posibles, pero la forma reflexiva conserva bien el sentido activo del verbo pasivo/futuro.
- source_word: τέκνοις αὐτοῦ
  english_pob_choice: his children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - su descendencia
  lexicon: τέκνον
  rationale: «Hijos» es el equivalente más directo y sobrio para τέκνα en español bíblico. «Descendencia» perdería la cercanía filial; «niños» sería demasiado restrictivo por edad.
- source_word: εὐδοκήσει
  english_pob_choice: will take pleasure
  chosen_spanish: se deleitará
  alternatives_spanish:
  - se complacerá
  - se agradará
  lexicon: εὐδοκέω
  rationale: El verbo expresa complacencia favorable. «Se deleitará» conserva bien la idea de placer gozoso y es más idiomático que un calco como «tendrá placer».
- source_word: τοῖς ἀγαπητοῖς αὐτοῦ
  english_pob_choice: his beloved ones
  chosen_spanish: sus amados
  alternatives_spanish:
  - los que él ama
  - sus amados hijos
  lexicon: ἀγαπητός
  rationale: «Amados» reproduce la cualidad de ser objeto de amor, manteniendo el tono relacional del griego. «Los que él ama» explicaría el sentido, pero suaviza la expresión nominal del original.
- source_word: ἕως αἰῶνος
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - hasta la eternidad
  lexicon: αἰών
  rationale: «Para siempre» es la equivalencia más natural y fiel para una duración sin límite. Conserva el valor temporal absoluto sin introducir una fórmula más litúrgica de lo necesario.
theological_decisions:
- issue: Referencia divina de κύριος en un texto griego que refleja lenguaje del nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Aunque el griego conserva κύριος, el contenido identifica a Dios como sujeto de la acción. Conforme a la política del proyecto, se explicita el nombre divino como «Yahvé» en lugar de la convención reverencial «el Señor», para no ocultar la referencia subyacente al nombre sagrado.
  doctrine_reference: Nombre divino / tetragrámaton
- issue: Tono afectivo de la acción divina hacia los «amados»
  english_pob_reading: he will take pleasure in his beloved ones
  chosen_spanish_reading: se deleitará en sus amados
  alternative_spanish_readings:
  - se complacerá en sus amados
  - se agradará de sus amados
  rationale: La frase mantiene un afecto positivo y personal, sin convertirlo en un juicio técnico. «Deleitarse» preserva la calidez del original y evita una lectura demasiado fría o jurídica.
  doctrine_reference: Amor electivo / favor divino
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador sigue esa lectura base del inglés POB, pero ajusta el texto español a la evidencia griega y a la terminología del proyecto, especialmente en la referencia a κύριος y en el valor afectivo de εὐδοκήσει.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para referencias divinas implícitas en κύριος.
  - Se prefirió «sus hijos» y «sus amados» por ser las correspondencias más directas y transparentes del griego.
  - Se evitó «Cristo» u otra terminología ajena al pasaje, ya que el texto no la contiene.
