translation:
  language: es
  text: Y ciertamente él abrirá las puertas del paraíso, y apartará la espada amenazante contra Adán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καίγε αὐτός
  english_pob_choice: And indeed he
  chosen_spanish: Y de hecho él
  alternatives_spanish:
  - Y ciertamente él
  - Y en verdad él
  lexicon: καίγε
  rationale: La partícula intensiva añade énfasis; «de hecho» comunica bien esa fuerza en español sin volver el texto demasiado arcaico. Se conserva el sujeto explícito «él» para mantener el énfasis del griego.
- source_word: ἀνοίξει τὰς θύρας
  english_pob_choice: will open the gates
  chosen_spanish: abrirá las puertas
  alternatives_spanish:
  - abrirá las puertas
  - abrirá los portones
  lexicon: ἀνοίγω
  rationale: «Puertas» es la equivalencia natural de θύρας y mantiene el sentido de acceso abierto. «Portones» sería más enfático, pero no necesario aquí.
- source_word: τοῦ παραδείσου
  english_pob_choice: of paradise
  chosen_spanish: del paraíso
  alternatives_spanish:
  - del paraíso
  - del jardín
  lexicon: παράδεισος
  rationale: «Paraíso» es el equivalente directo y tradicionalmente inteligible en español; «jardín» perdería la carga escatológica y simbólica del término en este contexto.
- source_word: ἀποστήσει
  english_pob_choice: he will remove
  chosen_spanish: quitará
  alternatives_spanish:
  - apartará
  - retirará
  lexicon: ἀφίστημι / ἀποστήσει
  rationale: El verbo expresa apartar o remover una realidad amenazante. «Quitar» comunica de forma clara y natural la acción de remover la espada sin sobrecargar el estilo.
- source_word: τὴν ἀπειλοῦσαν ῥομφαίαν
  english_pob_choice: the threatening sword
  chosen_spanish: la espada amenazante
  alternatives_spanish:
  - la espada que amenazaba
  - la espada amenazadora
  lexicon: ῥομφαία
  rationale: Se conserva el sustantivo concreto «espada» y el participio como adjetivo «amenazante» para reproducir la imagen sin calco torpe. No se translitera ῥομφαία porque el español ya tiene un término claro.
- source_word: κατὰ τοῦ Ἀδάμ
  english_pob_choice: against Adam
  chosen_spanish: contra Adán
  alternatives_spanish:
  - contra Adán
  - en contra de Adán
  lexicon: κατά + genitivo
  rationale: La preposición «contra» expresa adecuadamente la oposición personal marcada por κατά con genitivo. Se conserva «Adán» como nombre propio bíblico reconocido.
theological_decisions:
- issue: Apertura del paraíso como acceso restaurado
  english_pob_reading: he will open the gates of paradise
  chosen_spanish_reading: él abrirá las puertas del paraíso
  alternative_spanish_readings:
  - él abrirá las puertas del paraíso
  - él abrirá las puertas del jardín del paraíso
  rationale: La redacción mantiene la imagen de acceso celestial/restaurado sin explicitar más de lo que el griego dice. No se añade interpretación doctrinal extra sobre el modo de esa apertura.
  doctrine_reference: Tema de restauración/entrada al paraíso; no se formula doctrina sistemática adicional.
- issue: La espada como amenaza contra Adán
  english_pob_reading: the threatening sword against Adam
  chosen_spanish_reading: la espada amenazante contra Adán
  alternative_spanish_readings:
  - la espada amenazante contra Adán
  - la espada que amenazaba a Adán
  rationale: Se conserva la tensión literal de una espada personificada o caracterizada por su amenaza, sin suavizarla a una mera metáfora abstracta. «Contra Adán» mantiene el carácter adversativo del texto.
  doctrine_reference: Tema de juicio/expulsión y su remoción; no se añade lectura allegórica no atestiguada.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y quedó sin cambios; por eso el español se alinea estrechamente con el griego y con la solución inglesa existente, sin introducir nuevas notas o desviaciones.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y sobrio, sin arcaísmos innecesarios.
  - «Paraíso» se conserva como término técnico en lugar de sustituirlo por una paráfrasis.
  - No se introduce «Señor» ni otras equivalencias no presentes en este versículo.
  - La puntuación respeta una coordinación simple y directa, acorde con la estructura del griego.
