id: T12P.LEV.18.7
reference: Testament of Levi 18:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ *δόξα ὑψίστου ἐπ’ αὐτὸν ῥηθήσεται⁴², καὶ πνεῦμα συνέσεως καὶ ἁγιασμοῦ⁴³ καταπαύσει *ἐπ’ αὐτόν⁴⁴ [ἐν τῷ ὕδατι].
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/018/007.yaml
  text: And the glory of the Most High will be spoken over him, and a spirit of understanding and sanctification will rest upon him [in the water].
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:11Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y se hablará sobre él la gloria del Altísimo, y un espíritu de entendimiento y santificación reposará sobre él [en el agua].
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δόξα
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el esplendor
  - el honor
  lexicon: δόξα
  rationale: «Gloria» es la correspondencia más directa y litúrgicamente inteligible para δόξα, y conserva el peso doxológico del pasaje sin suavizarlo.
- source_word: ὑψίστου
  english_pob_choice: of the Most High
  chosen_spanish: del Altísimo
  alternatives_spanish:
  - del Dios Altísimo
  - del Supremo
  lexicon: ὕψιστος
  rationale: «Altísimo» reproduce el título divino de forma natural en español y mantiene el registro reverente del griego.
- source_word: ῥηθήσεται
  english_pob_choice: will be spoken over him
  chosen_spanish: se hablará sobre él
  alternatives_spanish:
  - será proclamada sobre él
  - se dirá sobre él
  lexicon: λέγω / ῥέω? (passive of λέγω in idiomatic sense)
  rationale: La pasiva impersonal en español expresa bien que algo será pronunciado acerca de él, sin forzar una estructura artificial.
- source_word: πνεῦμα συνέσεως καὶ ἁγιασμοῦ
  english_pob_choice: a spirit of understanding and sanctification
  chosen_spanish: un espíritu de entendimiento y santificación
  alternatives_spanish:
  - un espíritu de inteligencia y santificación
  - un espíritu de comprensión y consagración
  lexicon: πνεῦμα; σύνεσις; ἁγιασμός
  rationale: «Entendimiento» conserva el sentido cognitivo-relacional de σύνεσις, y «santificación» mantiene el sustantivo derivado de ἁγιασμός, que es más preciso que un término más general como «consagración».
- source_word: καταπαύσει
  english_pob_choice: will rest upon him
  chosen_spanish: reposará sobre él
  alternatives_spanish:
  - descansará sobre él
  - permanecerá sobre él
  lexicon: καταπαύω
  rationale: «Reposará» comunica bien la idea de asentarse y permanecer en calma sobre alguien, en un español bíblico claro y no arcaico.
- source_word: ἐν τῷ ὕδατι
  english_pob_choice: '[in the water]'
  chosen_spanish: '[en el agua]'
  alternatives_spanish:
  - '[en el agua]'
  lexicon: ἐν + ὕδωρ
  rationale: Se conserva la frase entre corchetes como inciso textual del testimonio griego; «agua» es la traducción directa y transparente de ὕδωρ.
theological_decisions:
- issue: Cómo rendir el título divino ὑψίστου
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Dios Altísimo
  - el Supremo
  rationale: La forma breve «el Altísimo» preserva el título teológico sin añadir explicaciones que el texto no contiene. Mantiene el paralelo con el uso bíblico común del título de Dios.
  doctrine_reference: Título divino en lenguaje bíblico reverente
- issue: Sentido de ἁγιασμοῦ
  english_pob_reading: sanctification
  chosen_spanish_reading: santificación
  alternative_spanish_readings:
  - consagración
  - santidad
  rationale: «Santificación» refleja mejor el sustantivo abstracto del griego y sugiere la acción/estado de ser hecho santo, sin reducirlo solo a una cualidad estática.
  doctrine_reference: Santificación como obra o estado asociado al Espíritu
- issue: Naturaleza del sintagma con ἐν τῷ ὕδατι
  english_pob_reading: '[in the water]'
  chosen_spanish_reading: '[en el agua]'
  alternative_spanish_readings:
  - '[en agua]'
  - '[en el bautismo]'
  rationale: Se mantiene la literalidad del paréntesis/corchete griego sin expandirlo a una interpretación sacramental que el segmento por sí solo no obliga.
  doctrine_reference: Precaución hermenéutica ante posibles alusiones rituales
translation_notes:
  revision_awareness: The latest revision pass marked the English source unchanged and required no changes; the Spanish draft therefore follows the English audit trail closely while grounding lexical choices in the Greek source text.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» como título divino y no como nombre propio transliterado.
  - Se conserva «santificación» por precisión lexical, evitando sustituirlo por términos menos específicos.
  - El inciso final permanece entre corchetes para reflejar su carácter de añadido/variación textual sin forzar una interpretación.
  - La sintaxis española busca sonar pública y bíblicamente natural sin apartarse del orden de las unidades semánticas del griego.
