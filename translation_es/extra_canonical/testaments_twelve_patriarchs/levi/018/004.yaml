translation:
  language: es
  text: Él resplandecerá como el sol sobre la tierra, y quitará toda oscuridad de debajo del cielo, y habrá paz en toda la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναλάμψει
  english_pob_choice: he will shine forth
  chosen_spanish: resplandecerá
  alternatives_spanish:
  - brillará
  - fulgirá
  lexicon: ἀναλάμπω
  rationale: El griego expresa la idea de brillar o resplandecer con salida visible; «resplandecerá» conserva el matiz de manifestación luminosa sin sonar arcaico o demasiado técnico en español.
- source_word: ὡς ὁ ἥλιος
  english_pob_choice: like the sun
  chosen_spanish: como el sol
  alternatives_spanish:
  - igual que el sol
  - cual el sol
  lexicon: ὡς + ὁ ἥλιος
  rationale: Se mantiene la comparación directa y sencilla del original; «como el sol» es la formulación natural y fiel en español.
- source_word: ἐξαρεῖ
  english_pob_choice: he will remove
  chosen_spanish: quitará
  alternatives_spanish:
  - eliminará
  - arrancará
  lexicon: ἐξαίρω
  rationale: El verbo griego indica apartar, retirar o quitar. «Quitará» preserva la acción de remover sin intensificar innecesariamente la imagen.
- source_word: πᾶν σκότος
  english_pob_choice: all darkness
  chosen_spanish: toda oscuridad
  alternatives_spanish:
  - toda tiniebla
  - toda la oscuridad
  lexicon: πᾶς + σκότος
  rationale: «Oscuridad» reproduce el sustantivo general del griego; el adjetivo «toda» conserva el alcance total de πᾶν.
- source_word: ὑπ᾽ οὐρανόν
  english_pob_choice: under heaven
  chosen_spanish: debajo del cielo
  alternatives_spanish:
  - bajo el cielo
  - sobre la tierra
  lexicon: ὑπὸ + οὐρανός
  rationale: La expresión idiomática se vierte de modo natural como «debajo del cielo», manteniendo el alcance universal sin forzar una equivalencia demasiado literal.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - shalom
  - armonía
  lexicon: εἰρήνη
  rationale: «Paz» es la equivalencia directa y adecuada en español para εἰρήνη, conservando el sentido de ausencia de conflicto y bienestar extendido.
theological_decisions:
- issue: Alcance universal de la remoción de la oscuridad
  english_pob_reading: he will remove all darkness from under heaven
  chosen_spanish_reading: quitará toda oscuridad de debajo del cielo
  alternative_spanish_readings:
  - quitará toda oscuridad bajo el cielo
  - quitará toda oscuridad de la tierra
  rationale: Se conserva la amplitud cósmica/total de la frase, sin reducirla a una geografía local. «Debajo del cielo» refleja el idioma bíblico del original y su universalidad.
  doctrine_reference: Eschatological restoration / universal peace imagery
translation_notes:
  revision_awareness: La versión inglesa más reciente quedó sin cambios tras la revisión; por tanto, el borrador español sigue de cerca el testimonio griego y la lectura inglesa auditada, sin introducir variantes no motivadas por el texto fuente.
  spanish_consistency_notes:
  - Se usa «paz» de forma consistente para εἰρήνη.
  - Se evita introducir «SEÑOR» o terminología no presente en este versículo.
  - El tono es solemne y publicable, con sintaxis natural para español contemporáneo.
