base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/018/011.yaml
  text: And he will give the holy ones to eat from the tree of life, and the spirit of holiness will be upon them.
  revision_pass:
    model: gpt-5.4
