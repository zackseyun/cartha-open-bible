translation:
  language: es
  text: Y dará a los santos a comer del árbol de la vida, y el espíritu de santidad estará sobre ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τοῖς ἁγίοις
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los consagrados
  - los santos de Dios
  lexicon: ἅγιος
  rationale: El griego designa a los pertenecientes a Dios, no simplemente a personas moralmente buenas. ‘Los santos’ es la forma más natural y reconocible en español eclesial, y conserva el valor de pertenencia/consagración del término.
- source_word: φαγεῖν ἐκ τοῦ ξύλου τῆς ζωῆς
  english_pob_choice: to eat from the tree of life
  chosen_spanish: a comer del árbol de la vida
  alternatives_spanish:
  - para comer del árbol de la vida
  - a comer del madero de la vida
  lexicon: φαγεῖν; ξύλον τῆς ζωῆς
  rationale: Se mantiene el sentido directo de alimento/participación sin añadir elementos ajenos. ‘Árbol de la vida’ es la correspondencia transparente y estable para ξύλον τῆς ζωῆς.
- source_word: πνεῦμα ἁγιωσύνης
  english_pob_choice: the spirit of holiness
  chosen_spanish: el espíritu de santidad
  alternatives_spanish:
  - el Espíritu de santidad
  - un espíritu de santidad
  lexicon: πνεῦμα; ἁγιωσύνη
  rationale: ‘Espíritu de santidad’ sigue de cerca la construcción genitiva y preserva la ambigüedad posible entre una cualidad espiritual y una referencia más personal. Se usa minúscula porque el texto griego no especifica aquí una mención inequívoca al Espíritu Santo como nombre propio.
theological_decisions:
- issue: Alcance de ‘πνεῦμα ἁγιωσύνης’
  english_pob_reading: the spirit of holiness
  chosen_spanish_reading: el espíritu de santidad
  alternative_spanish_readings:
  - el Espíritu de santidad
  - un espíritu de santidad
  rationale: La frase puede leerse como una cualidad/realidad de santidad que estará sobre ellos, sin forzar una identificación explícita con el Espíritu Santo si el contexto inmediato no lo exige. La traducción conserva esa tensión documental del original.
  doctrine_reference: Pneumatología; ambigüedad referencial en fórmulas de ‘espíritu de...’
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios respecto al texto inglés base; por eso la propuesta española sigue de cerca el sentido del griego y el resultado auditado en inglés, sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como convención general del proyecto solo cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se conserva ‘santos’ para ἅγιοι por coherencia con el registro bíblico y para evitar una paráfrasis explicativa.
  - No se añade nota textual porque el testimonio griego proporcionado ya está fijado y el inglés auditado no incluye variantes ni notas.
