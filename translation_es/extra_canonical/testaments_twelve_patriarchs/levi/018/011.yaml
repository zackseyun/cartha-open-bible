  text: Καὶ δώσει τοῖς ἁγίοις φαγεῖν ἐκ τοῦ ξύλου τῆς ζωῆς, καὶ *πνεῦμα ἁγιωσύνης ἔσται⁶⁷ ἐπ᾿ αὐτοῖς⁶⁸.
