id: T12P.LEV.18.3
reference: Testament of Levi 18:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ ἀνατελεῖ¹³ ἄστρον αὐτοῦ¹⁴ ἐν οὐρανῷ ὡς βασιλέως¹⁵ φωτίζων¹⁶ φῶς γνώσεως †ἐν ἡλίῳ ἡμέρα†¹⁷, καὶ μεγαλυνθήσεται ἐν τῇ οἰκουμένῃ¹⁸.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/018/003.yaml
  text: And his star will rise in heaven like a king, giving the light of knowledge like the sun by day, and he will be magnified in the inhabited world.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:12Z'
    unchanged: false
    changes_summary: Replaced 'giving light with the light of knowledge as the sun by day' with 'giving the light of knowledge like the sun by day' for closer alignment with the Greek and more natural English. Kept 'magnified' and 'inhabited world' as acceptable formal renderings.
translation:
  language: es
  text: Y su estrella saldrá en el cielo como la de un rey, dando la luz del conocimiento como el sol en el día, y será engrandecido en el mundo habitado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνατελεῖ ἄστρον
  english_pob_choice: his star will rise
  chosen_spanish: su estrella saldrá
  alternatives_spanish:
  - su estrella surgirá
  - su estrella se levantará
  lexicon: ἀνατέλλω
  rationale: En español, «saldrá» conserva la imagen de salida/aparición de un astro sin forzar una construcción más pesada. «Surgirá» y «se levantará» son posibles, pero «saldrá» suena más natural y sigue el sentido astronómico del verbo griego.
- source_word: ὡς βασιλέως
  english_pob_choice: like a king
  chosen_spanish: como la de un rey
  alternatives_spanish:
  - como un rey
  - como rey
  lexicon: βασιλεύς
  rationale: El griego modifica a la estrella con la comparación regia. En español, «como la de un rey» evita ambigüedad y conserva la referencia implícita al resplandor/majestad real sin añadir elementos no presentes.
- source_word: φωτίζων φῶς γνώσεως
  english_pob_choice: giving the light of knowledge
  chosen_spanish: dando la luz del conocimiento
  alternatives_spanish:
  - iluminando con la luz del conocimiento
  - dando luz de conocimiento
  lexicon: φωτίζω; φῶς; γνῶσις
  rationale: 'La lectura inglesa revisada refleja bien el participio griego: no «la luz con la luz», sino la acción de iluminar mediante el conocimiento. «Dando la luz del conocimiento» mantiene la relación estrecha entre luz y conocimiento sin redundancia innecesaria.'
- source_word: ἐν ἡλίῳ ἡμέρα
  english_pob_choice: like the sun by day
  chosen_spanish: como el sol en el día
  alternatives_spanish:
  - como el sol de día
  - como el sol durante el día
  lexicon: ἥλιος; ἡμέρα
  rationale: La construcción griega es un símil temporal asociado al sol. «Como el sol en el día» comunica la comparación con claridad y conserva el paralelismo natural en español.
- source_word: μεγαλυνθήσεται
  english_pob_choice: he will be magnified
  chosen_spanish: será engrandecido
  alternatives_spanish:
  - será exaltado
  - será magnificado
  lexicon: μεγαλύνω
  rationale: «Engrandecido» reproduce bien la idea de ser hecho grande o exaltado y suena más idiomático en español bíblico que «magnificado», aunque esta última sería formalmente posible.
- source_word: ἐν τῇ οἰκουμένῃ
  english_pob_choice: in the inhabited world
  chosen_spanish: en el mundo habitado
  alternatives_spanish:
  - en la tierra habitada
  - en el orbe habitado
  lexicon: οἰκουμένη
  rationale: «Mundo habitado» sigue de cerca el valor geográfico-universal del término griego y conserva el alcance amplio del enunciado. «Tierra habitada» también es viable, pero «mundo habitado» mantiene mejor la resonancia literaria del texto.
theological_decisions:
- issue: La imagen de la estrella y su posible referencia mesiánica o real
  english_pob_reading: And his star will rise in heaven like a king
  chosen_spanish_reading: Y su estrella saldrá en el cielo como la de un rey
  alternative_spanish_readings:
  - Y su estrella se alzará en el cielo como la de un rey
  - Y su estrella aparecerá en el cielo como la de un rey
  rationale: El texto presenta una imagen simbólica elevada; la traducción no debe resolver de antemano su referencia, sino conservar la ambigüedad literaria. «Como la de un rey» mantiene el tono de majestad sin convertir la figura en una afirmación doctrinal explícita.
  doctrine_reference: Imaginería mesiánica/regia en literatura intertestamentaria; no se añade glosa doctrinal al versículo.
- issue: El valor de οἰκουμένη como alcance universal
  english_pob_reading: the inhabited world
  chosen_spanish_reading: el mundo habitado
  alternative_spanish_readings:
  - la tierra habitada
  - el orbe habitado
  rationale: La traducción conserva la amplitud universal del griego sin reducirlo a un territorio local. «Mundo habitado» mantiene la fuerza escatológica y retórica del pasaje.
  doctrine_reference: Universalidad del alcance del reinado/manifestación en literatura judía del Segundo Templo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que simplificó y ajustó 'giving the light of knowledge like the sun by day'. La versión española sigue esa corrección al unir directamente la acción de dar/irradiar con 'la luz del conocimiento' y evitar una repetición innecesaria de 'luz'.
  spanish_consistency_notes:
  - Se mantiene 'estrella' para ἄστρον, sin sustituirlo por 'astro' en el texto principal por fluidez y claridad.
  - Se conserva un registro bíblico sobrio y transparente, evitando paráfrasis explicativas no presentes en el griego.
  - '''Mundo habitado'' se usa como equivalente estable de οἰκουμένη dentro de este record.'
