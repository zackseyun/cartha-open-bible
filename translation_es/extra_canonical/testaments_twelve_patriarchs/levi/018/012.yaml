id: T12P.LEV.18.12
reference: Testament of Levi 18:12
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ ὁ Βελίαρ δεθήσεται ὑπ᾿ αὐτοῦ, καὶ δώσει ἐξουσίαν τοῖς τέκνοις αὐτοῦ⁶⁹ πατεῖν ἐπὶ τὰ πονηρὰ πνεύματα.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/018/012.yaml
  text: And Beliar will be bound by him, and he will give authority to his children to trample on the evil spirits.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:12Z'
    unchanged: false
    changes_summary: Added the article in 'the evil spirits' to reflect τὰ πονηρὰ πνεύματα more precisely; otherwise retained the draft.
translation:
  language: es
  text: Y Beliar será atado por él, y dará autoridad a sus hijos para pisotear a los espíritus malos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  - Beliar
  lexicon: N/A
  rationale: Se conserva el nombre propio tal como aparece en el contexto fuente y en la tradición textual del pasaje; en español, 'Beliar' mantiene la forma más cercana al griego y evita imponer una identificación interpretativa no explicitada aquí.
- source_word: δεθήσεται
  english_pob_choice: will be bound
  chosen_spanish: será atado
  alternatives_spanish:
  - será encadenado
  - será sujeto
  lexicon: N/A
  rationale: El futuro pasivo en griego pide una construcción pasiva clara en español. 'Será atado' reproduce la imagen de sujeción física/forense sin añadir material interpretativo.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - autoridad
  lexicon: N/A
  rationale: '''Autoridad'' refleja bien el dominio/delegación implicados por ἐξουσίαν y conserva el sentido de prerrogativa otorgada, no solo capacidad general.'
- source_word: τοῖς τέκνοις αὐτοῦ
  english_pob_choice: his children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus descendientes
  - a sus hijos
  lexicon: N/A
  rationale: '''Hijos'' es la correspondencia más directa y mantiene el lenguaje familiar/genealógico del texto. ''Descendientes'' explicitaría la extensión, pero sería más interpretativo.'
- source_word: πατεῖν ἐπὶ
  english_pob_choice: to trample on
  chosen_spanish: pisotear
  alternatives_spanish:
  - hollar
  - pisar sobre
  lexicon: N/A
  rationale: '''Pisotear'' comunica la fuerza idiomática del verbo griego y funciona naturalmente en español con un objeto plural como ''los espíritus malos''.'
- source_word: τὰ πονηρὰ πνεύματα
  english_pob_choice: the evil spirits
  chosen_spanish: los espíritus malos
  alternatives_spanish:
  - los espíritus malignos
  - los espíritus malos
  lexicon: N/A
  rationale: Se sigue la revisión inglesa que añadió el artículo para reflejar τὰ. En español, 'los espíritus malos' conserva el artículo definido y el adjetivo moral del original; 'malignos' intensificaría el matiz más de lo necesario.
theological_decisions:
- issue: Identificación y transliteración de Beliar
  english_pob_reading: Beliar
  chosen_spanish_reading: Beliar
  alternative_spanish_readings:
  - Belial
  rationale: No se normaliza a 'Belial' porque el testimonio griego dado usa Βελίαρ. Mantener 'Beliar' respeta la forma textual base y evita una armonización con otras tradiciones que el pasaje aquí no exige.
  doctrine_reference: Transmisión textual y onomástica del Segundo Templo / literatura testamentaria
- issue: La sujeción de Beliar y la autoridad delegada a los hijos
  english_pob_reading: And Beliar will be bound by him, and he will give authority to his children
  chosen_spanish_reading: Y Beliar será atado por él, y dará autoridad a sus hijos
  alternative_spanish_readings:
  - Y Beliar será encadenado por él, y otorgará autoridad a sus hijos
  rationale: Se conserva la secuencia causal y la delegación de autoridad sin explicitar quién es el referente de 'él' más allá de lo que el versículo aporta. 'Otorgará' sería posible, pero 'dará autoridad' sigue más de cerca el registro de la fuente auditada.
  doctrine_reference: Angelología/escatología de la literatura testamentaria
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada solo en el último segmento para añadir 'the' antes de 'evil spirits' a fin de reflejar τὰ πονηρὰ πνεύματα con mayor precisión. La redacción española mantiene esa precisión mediante 'los espíritus malos'.
  spanish_consistency_notes:
  - Se mantiene 'Beliar' de forma consistente con el texto griego aportado.
  - '''Espíritus malos'' conserva el artículo definido plural exigido por τὰ πονηρὰ πνεύματα.'
  - No se introduce mayúscula en 'espíritus' porque no se trata del Espíritu Santo sino de seres espirituales descritos negativamente.
