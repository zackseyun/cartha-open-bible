translation:
  language: es
  text: Y después de que venga sobre ellos la venganza de parte del Señor, el sacerdocio desaparecerá.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μετὰ τὸ γενέσθαι
  english_pob_choice: after ... has come
  chosen_spanish: después de que venga
  alternatives_spanish:
  - después de que haya venido
  - cuando haya llegado
  lexicon: μετά + infinitivo aoristo
  rationale: La construcción temporal griega expresa anterioridad respecto de un hecho consumado o que llega a cumplirse; en español, «después de que venga» conserva bien esa relación sin volver la frase pesada. «Haya venido» también sería posible, pero el presente de subjuntivo mantiene fluidez y solemnidad.
- source_word: τὴν ἐκδίκησιν αὐτῶν
  english_pob_choice: their vengeance
  chosen_spanish: la venganza de parte de ellos
  alternatives_spanish:
  - su venganza
  - su vindicación
  lexicon: ἐκδίκησις
  rationale: ἐκδίκησις puede abarcar venganza o vindicación según contexto. La versión inglesa optó por «vengeance», y aquí se conserva el mismo valor. Se deja el genitivo implícito en español como «de parte de ellos» para evitar la ambigüedad de «su venganza», que podría referirse tanto a la venganza ejercida por ellos como sufrida por ellos. La forma final usa «sobre ellos» en el texto para reflejar el contexto de juicio del pasaje.
- source_word: παρὰ κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: de parte del Señor
  alternatives_spanish:
  - del Señor
  - por parte del Señor
  lexicon: παρά + genitivo
  rationale: παρά con genitivo expresa procedencia/origen. «De parte del Señor» comunica esa procedencia con naturalidad en español y mantiene la agencia divina que el texto atribuye a la venganza.
- source_word: ἡ ἱερωσύνη
  english_pob_choice: the priesthood
  chosen_spanish: el sacerdocio
  alternatives_spanish:
  - el ministerio sacerdotal
  - la dignidad sacerdotal
  lexicon: ἱερωσύνη
  rationale: «Sacerdocio» es la equivalencia directa y clara en español para el oficio/colectivo sacerdotal. Evita ampliar el sentido más allá del texto.
theological_decisions:
- issue: Origen divino del acto retributivo
  english_pob_reading: their vengeance has come from the Lord
  chosen_spanish_reading: la venganza vendrá de parte del Señor
  alternative_spanish_readings:
  - la vindicación vendrá de parte del Señor
  - la venganza vendrá del Señor
  rationale: Se mantiene la atribución explícita a Yahvé/Señor como fuente del juicio, sin suavizarla a una mera consecuencia histórica. El texto presenta una retribución que procede de Dios, y la traducción preserva esa afirmación sin añadir explicación interpretativa.
  doctrine_reference: Justicia divina; retribución; juicio de Dios
- issue: Destino del sacerdocio
  english_pob_reading: the priesthood will fail
  chosen_spanish_reading: el sacerdocio desaparecerá
  alternative_spanish_readings:
  - el sacerdocio cesará
  - el sacerdocio fallará
  rationale: «Desaparecerá» transmite el valor de ἐκλείψει como cesar, extinguirse o dejar de existir. «Fallará» puede sonar en español a incapacidad moral o técnica, y por eso resulta menos preciso. La frase conserva la tensión profética de una institución que llega a su fin.
  doctrine_reference: Cese profético del sacerdocio
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios. Se respetó la lectura griega fijada por la fuente y la equivalencia inglesa existente, sin introducir variantes textuales ni ajustes de sentido no motivados por el original.
  spanish_consistency_notes:
  - Se usa «Señor» porque el texto fuente griego dice κυρίου; no se introduce «Yahvé» en esta línea sin una cita explícita del nombre divino.
  - Se conserva «sacerdocio» como término técnico estable.
  - «Venganza» se mantiene por fidelidad a ἐκδίκησις; no se sustituye por «vindicación» aunque la palabra pueda tener ese matiz en otros contextos.
