id: T12P.LEV.18.8
reference: Testament of Levi 18:8
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: '*Αὐτὸς γὰρ⁴⁵ δώσει τὴν μεγαλωσύνην⁴⁶ κυρίου⁴⁷ τοῖς υἱοῖς αὐτοῦ⁴⁸ ἐν ἀληθείᾳ εἰς τὸν αἰῶνα, καὶ οὐκ ἔσται διαδοχὴ⁴⁹ αὐτοῦ⁵⁰ εἰς γενεὰς *καὶ γενεὰς⁵¹ ἕως τοῦ αἰῶνος.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/018/008.yaml
  text: For he will give the majesty of the Lord to his sons in truth forever, and there will be no succession to him for generations and generations, until eternity.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:13Z'
    unchanged: false
    changes_summary: Changed 'successor' to 'succession' to reflect διαδοχή more accurately, rendered γενεὰς καὶ γενεὰς as 'generations and generations,' and translated ἕως τοῦ αἰῶνος as 'until eternity' rather than repeating 'forever.'
translation:
  language: es
  text: Porque él dará la majestad del Señor a sus hijos en verdad, para siempre, y no habrá sucesión de él por generaciones y generaciones, hasta la eternidad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Αὐτὸς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  - ese hombre
  lexicon: pronombre personal de tercera persona
  rationale: Conserva la referencia al sujeto masculino singular del contexto sin añadir énfasis no requerido.
- source_word: δώσει
  english_pob_choice: will give
  chosen_spanish: dará
  alternatives_spanish:
  - entregará
  - concederá
  lexicon: verbo de dar
  rationale: «Dará» reproduce el futuro simple de modo natural y directo, adecuado al sentido de concesión/transmisión del texto.
- source_word: τὴν μεγαλωσύνην
  english_pob_choice: the majesty
  chosen_spanish: la majestad
  alternatives_spanish:
  - la grandeza
  - la magnificencia
  lexicon: sustantivo de grandeza/exaltación
  rationale: «Majestad» refleja bien el rango elevado y la dignidad expresada por μεγαλωσύνη, manteniendo un registro digno y bíblico.
- source_word: κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Soberano
  lexicon: κυρίου / κύριος
  rationale: Aquí κύριος funciona como título divino y, siguiendo el marco del texto griego citado, «Señor» comunica esa referencia sin forzar una sustitución innecesaria en esta cláusula.
- source_word: τοῖς υἱοῖς αὐτοῦ
  english_pob_choice: to his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus descendientes
  lexicon: hijos / descendencia
  rationale: «Hijos» mantiene la referencia literal a υἱοῖς y es idiomático en español; «descendientes» sería más interpretativo.
- source_word: ἐν ἀληθείᾳ
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - con verdad
  - de veras
  lexicon: expresión adverbial de veracidad
  rationale: «En verdad» reproduce la frase griega de forma natural y conserva el matiz de sinceridad/lealtad.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - eternamente
  lexicon: duración indefinida
  rationale: «Para siempre» es la forma española más natural para este valor durativo.
- source_word: διαδοχὴ
  english_pob_choice: succession
  chosen_spanish: sucesión
  alternatives_spanish:
  - relevo
  - herencia sucesoria
  lexicon: sustantivo de continuidad de oficio/linaje
  rationale: La revisión inglesa corrigió «successor» a «succession»; «sucesión» preserva mejor la idea de continuidad o transmisión de lugar/función sin reducirla a una sola persona.
- source_word: εἰς γενεὰς καὶ γενεὰς
  english_pob_choice: for generations and generations
  chosen_spanish: por generaciones y generaciones
  alternatives_spanish:
  - de generación en generación
  - por siglos y siglos
  lexicon: expresión idiomática de duración prolongada
  rationale: «Por generaciones y generaciones» corresponde de cerca al griego y mantiene la repetición enfática.
- source_word: ἕως τοῦ αἰῶνος
  english_pob_choice: until eternity
  chosen_spanish: hasta la eternidad
  alternatives_spanish:
  - hasta el fin
  - hasta siempre
  lexicon: marcador temporal escatológico
  rationale: «Hasta la eternidad» reproduce la revisión inglesa «until eternity» y evita redundar con «para siempre» mientras conserva la amplitud temporal del cierre.
theological_decisions:
- issue: Referencia de κύριος a la divinidad
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Soberano
  rationale: El griego usa κύριος en una expresión de prestigio o pertenencia divina. En este segmento, la forma española «Señor» mantiene la referencia reverencial sin afirmar que el texto aquí exija explícitamente el nombre propio Yahvé en esta misma cláusula.
  doctrine_reference: Título divino en contexto bíblico; distinción entre nombre propio y título reverencial.
- issue: διαδοχή como continuidad y no solo reemplazo personal
  english_pob_reading: succession
  chosen_spanish_reading: sucesión
  alternative_spanish_readings:
  - sucesor
  - relevo
  rationale: La revisión del inglés muestra que el punto es la continuidad de la línea o del cargo, no simplemente la existencia de un individuo que reemplaza a otro. «Sucesión» preserva esa ambigüedad productiva mejor que «sucesor».
  doctrine_reference: Continuidad de linaje/oficio en lenguaje bíblico de herencia y transmisión.
- issue: Doble expresión temporal final
  english_pob_reading: for generations and generations, until eternity
  chosen_spanish_reading: por generaciones y generaciones, hasta la eternidad
  alternative_spanish_readings:
  - por generaciones y generaciones, para siempre
  - de generación en generación, eternamente
  rationale: 'Se conserva la doble cadencia del griego y de la revisión inglesa: una fórmula de prolongación histórica seguida de un cierre absoluto. «Hasta la eternidad» evita aplanar ambas expresiones en una sola idea repetida.'
  doctrine_reference: Énfasis semítico/poético de duración indefinida.
translation_notes:
  revision_awareness: La revisión inglesa corrigió 'successor' a 'succession', cambió 'for generation upon generation' a 'for generations and generations', y distinguió 'until eternity' de 'forever'. La versión española refleja esas tres decisiones con 'sucesión', 'por generaciones y generaciones' y 'hasta la eternidad'.
  spanish_consistency_notes:
  - Mantengo un registro bíblico-digno sin arcaísmos innecesarios.
  - Uso 'Señor' como título reverencial en esta cláusula, en consonancia con el griego κύριος.
  - Evito duplicar 'para siempre' en la clausura para respetar la distinción entre εἰς τὸν αἰῶνα y ἕως τοῦ αἰῶνος.
