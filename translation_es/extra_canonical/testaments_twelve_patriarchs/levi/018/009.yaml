id: T12P.LEV.18.9
reference: Testament of Levi 18:9
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ ἐπὶ *τῆς ἱερωσύνης⁵² αὐτοῦ⁵³ *τὰ ἔθνη⁵⁴ πληθυνθήσονται⁵⁵ ἐν γνώσει ἐπὶ τῆς γῆς, καὶ φωτισθήσονται διὰ χάριτος κυρίου. [ὁ δὲ Ἰσραὴλ ἐλαττωθήσεται ἐν ἀγνωσίᾳ καὶ σκοτισθήσεται ἐν πένθει]⁵⁶. ἐπὶ τῆς ἱερωσύνης αὐτοῦ ἐκλείψει⁵⁷ ἡ⁵⁸ ἁμαρτία καὶ οἱ ἄνομοι *καταπαύσουσιν εἰς κακά⁵⁹, [οἱ δὲ δίκαιοι καταπαύσουσιν ἐν αὐτῷ]⁶⁰.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/018/009.yaml
  text: And during his priesthood the nations will be multiplied in knowledge upon the earth, and they will be enlightened by the grace of the Lord. [But Israel will be diminished in ignorance and darkened in mourning.] During his priesthood sin will cease, and the lawless will cease from evil; [and the righteous will rest in him].
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:13Z'
    unchanged: false
    changes_summary: Changed 'sin will fail' to 'sin will cease' for a more natural rendering of ἐκλείψει, and changed 'the lawless will cease for evil' to 'the lawless will cease from evil' for more accurate and natural English.
translation:
  language: es
  text: Y durante su sacerdocio las naciones se multiplicarán en conocimiento sobre la tierra, y serán iluminadas por la gracia del Señor[a]. [Pero Israel será disminuido en ignorancia y oscurecido en luto.] Durante su sacerdocio el pecado cesará, y los impíos cesarán del mal; [y los justos descansarán en él].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Señor» refleja aquí κύριος del griego; no se ha expandido a «Yahvé» porque el texto fuente usa el título, no el nombre escrito.
    reason: source_note
lexical_decisions:
- source_word: ἱερωσύνη
  english_pob_choice: priesthood
  chosen_spanish: sacerdocio
  alternatives_spanish:
  - ministerio sacerdotal
  - oficio sacerdotal
  lexicon: ἱερωσύνη
  rationale: «Sacerdocio» es el equivalente natural y preciso para el cargo/ministerio sacerdotal de Levi; mantiene la fuerza institucional del texto sin sobretraducción.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: ἔθνη
  rationale: «Las naciones» preserva el valor colectivo y la amplitud del plural griego, y sigue de cerca la elección inglesa de POB.
- source_word: πληθυνθήσονται
  english_pob_choice: will be multiplied
  chosen_spanish: se multiplicarán
  alternatives_spanish:
  - aumentarán
  - se harán numerosas
  lexicon: πληθυνθήσονται
  rationale: «Se multiplicarán» refleja bien el crecimiento numérico o expansivo del verbo sin añadir un matiz ajeno.
- source_word: ἐν γνώσει
  english_pob_choice: in knowledge
  chosen_spanish: en conocimiento
  alternatives_spanish:
  - en saber
  - con conocimiento
  lexicon: γνῶσις
  rationale: «En conocimiento» conserva la preposición y el sustantivo abstracto del original, en un registro claro y bíblico.
- source_word: διὰ χάριτος κυρίου
  english_pob_choice: by the grace of the Lord
  chosen_spanish: por la gracia del Señor
  alternatives_spanish:
  - mediante la gracia del Señor
  - a través de la gracia del Señor
  lexicon: χάρις
  rationale: «Por la gracia» expresa adecuadamente la mediación causal de διά con genitivo y mantiene la terminología teológica normal en español.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Soberano
  lexicon: κύριος
  rationale: En este contexto la frase griega cita o alude a lenguaje divino estándar; el texto inglés opta por «the Lord». En español se conserva «el Señor» como forma idiomática y reverente, sin introducir aquí una afirmación explícita del nombre divino donde el griego no lo escribe.
- source_word: ἐλαττωθήσεται
  english_pob_choice: will be diminished
  chosen_spanish: será disminuido
  alternatives_spanish:
  - disminuirá
  - será reducido
  lexicon: ἐλαττόω
  rationale: «Será disminuido» sigue de cerca la pasiva y el sentido de reducción o mengua del original.
- source_word: ἐν ἀγνωσίᾳ
  english_pob_choice: in ignorance
  chosen_spanish: en ignorancia
  alternatives_spanish:
  - por ignorancia
  - en desconocimiento
  lexicon: ἀγνωσία
  rationale: «En ignorancia» reproduce la construcción adverbial y el matiz de carencia de conocimiento del texto.
- source_word: σκοτισθήσεται
  english_pob_choice: darkened
  chosen_spanish: oscurecido
  alternatives_spanish:
  - ensombrecido
  - será oscurecido
  lexicon: σκοτίζω
  rationale: «Oscurecido» funciona naturalmente en español para la idea de quedar en tinieblas; mantiene el paralelo con la ignorancia y el duelo.
- source_word: ἐν πένθει
  english_pob_choice: in mourning
  chosen_spanish: en luto
  alternatives_spanish:
  - en duelo
  - de duelo
  lexicon: πένθος
  rationale: «Luto» es un equivalente idiomático y sobrio; conserva el estado de aflicción funeraria más que una simple emoción interior.
- source_word: ἐκλείψει
  english_pob_choice: will cease
  chosen_spanish: cesará
  alternatives_spanish:
  - desaparecerá
  - terminará
  lexicon: ἐκλείπω
  rationale: La revisión inglesa optó por «will cease»; en español «cesará» transmite el mismo cese natural y evita la impropiedad de «fallará» o «faltará».
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - el error
  - la culpa
  lexicon: ἁμαρτία
  rationale: «El pecado» es el equivalente directo y teológicamente estándar en español.
- source_word: οἱ ἄνομοι
  english_pob_choice: the lawless
  chosen_spanish: los impíos
  alternatives_spanish:
  - los injustos
  - los sin ley
  lexicon: ἄνομος
  rationale: «Los impíos» traduce el tipo moral-religioso del término con naturalidad en español bíblico; «sin ley» resultaría más literal pero menos idiomático aquí.
- source_word: καταπαύσουσιν εἰς κακά
  english_pob_choice: will cease from evil
  chosen_spanish: cesarán del mal
  alternatives_spanish:
  - se apartarán del mal
  - dejarán el mal
  lexicon: καταπαύω
  rationale: 'La revisión inglesa aclaró la dirección del verbo: no «por el mal», sino «del mal». «Cesarán del mal» mantiene esa dirección aunque suene algo más bíblico que coloquial.'
- source_word: οἱ δὲ δίκαιοι καταπαύσουσιν ἐν αὐτῷ
  english_pob_choice: and the righteous will rest in him
  chosen_spanish: y los justos descansarán en él
  alternatives_spanish:
  - y los justos reposarán en él
  - y los justos se reposarán en él
  lexicon: δίκαιος
  rationale: «Los justos» conserva el contraste moral con «los impíos»; «descansarán en él» reproduce el sentido de reposo final o permanencia sin añadir detalles.
theological_decisions:
- issue: Alusión al nombre divino en κύριος
  english_pob_reading: the grace of the Lord
  chosen_spanish_reading: la gracia del Señor
  alternative_spanish_readings:
  - la gracia de Yahvé
  - la gracia del Señor Yahvé
  rationale: Aunque el proyecto usa «Yahvé» para יהוה cuando el texto lo presenta claramente, aquí el griego dice κύριος y el audit trail inglés mantiene «the Lord». Por eso se preserva «el Señor» sin forzar una sustitución que el pasaje griego no marca explícitamente.
  doctrine_reference: Divine Name / κύριος and reverential address
translation_notes:
  revision_awareness: 'La revisión inglesa reciente corrigió dos puntos de sentido: ἐκλείψει debía expresarse como «cesará», y καταπαύσουσιν εἰς κακά como «cesarán del mal». La versión española sigue esas correcciones con «cesará» y «cesarán del mal», evitando el antiguo error de un cese «por» o «para» el mal.'
  spanish_consistency_notes:
  - Se mantiene la estructura de dos cláusulas paralelas con los verbos en futuro para conservar el tono profético.
  - «Los impíos» y «los justos» se mantienen como pares contrastivos coherentes en todo el pasaje.
  - La puntuación entre corchetes reproduce las secciones parentéticas del texto fuente sin convertirlas en un aparato crítico extenso.
