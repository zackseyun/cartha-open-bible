  text: Καὶ εἶπεν³⁸· Ἐγώ εἰμι ὁ ἄγγελος ὁ *παραιτούμενος τὸ γένος³⁹ Ἰσραήλ, τοῦ μὴ πατάξαι⁴⁰ αὐτούς⁴¹.
