base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/005/006.yaml
  text: And he said, “I am the angel who intercedes for the race of Israel, so that they may not be struck down.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:34Z'
    unchanged: false
    changes_summary: Retained the draft wording but replaced the semicolon with a comma for smoother, more natural English punctuation within the sentence.
translation:
  language: es
  text: 'Y dijo: «Yo soy el ángel que intercede por la raza de Israel, para que no sean heridos».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄγγελος
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: ἄγγελος
  rationale: Mantengo «ángel» porque el contexto presenta al hablante como un ser celestial con función mediadora; «mensajero» sería posible léxicamente, pero aquí diluiría la identificación personal del hablante que el inglés POB preserva.
- source_word: παραιτούμενος
  english_pob_choice: intercedes for
  chosen_spanish: intercede por
  alternatives_spanish:
  - ruega por
  - aboga por
  - suplica por
  lexicon: παραιτέομαι
  rationale: El verbo griego admite la idea de pedir a favor de otro o interceder. «Intercede por» conserva esa mediación activa en español sin añadir la connotación de simple solicitud que a veces tendría «ruega por».
- source_word: τὸ γένος Ἰσραήλ
  english_pob_choice: the race of Israel
  chosen_spanish: la raza de Israel
  alternatives_spanish:
  - el linaje de Israel
  - el pueblo de Israel
  lexicon: γένος
  rationale: Conservo «raza» porque el inglés POB eligió «race» y el griego γένος señala descendencia/grupo de parentesco. «Pueblo» suavizaría demasiado la referencia étnico-genealógica; «linaje» es posible, pero no reproduce tan directamente el valor colectivo del término.
- source_word: τοῦ μὴ πατάξαι αὐτούς
  english_pob_choice: so that they may not be struck down
  chosen_spanish: para que no sean heridos
  alternatives_spanish:
  - para que no sean golpeados
  - para que no sean abatidos
  - para que no sean destruidos
  lexicon: πατάσσω
  rationale: πατάσσω significa golpear, herir o abatir. «Heridos» preserva la noción de ser alcanzados por un golpe sin forzar una traducción excesivamente técnica; en este contexto resultaba más natural que una perífrasis más dura como «abatidos» o «destruidos».
theological_decisions:
- issue: Función mediadora del ángel
  english_pob_reading: the angel who intercedes for the race of Israel
  chosen_spanish_reading: el ángel que intercede por la raza de Israel
  alternative_spanish_readings:
  - el ángel que ruega por la raza de Israel
  - el ángel que aboga por la raza de Israel
  rationale: La traducción mantiene la función de mediación protectora sin convertir al personaje en una figura meramente abstracta. «Intercede» comunica tanto petición como representación a favor del pueblo, en línea con la lectura inglesa.
  doctrine_reference: Angelología / mediación celestial
- issue: Alcance de la amenaza
  english_pob_reading: so that they may not be struck down
  chosen_spanish_reading: para que no sean heridos
  alternative_spanish_readings:
  - para que no sean golpeados
  - para que no sean abatidos
  rationale: El griego expresa el propósito negativo de evitar el impacto del juicio. «Heridos» mantiene la idea de daño causado por un golpe, sin introducir una destrucción total que el texto base no explicita en esta versión.
  doctrine_reference: Juicio y preservación divina
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó únicamente la puntuación interna, manteniendo el contenido léxico. La traducción española sigue esa lectura estable y no requiere reflejar una variante textual adicional.
  spanish_consistency_notes:
  - Se mantiene «ángel» para ἄγγελος en consonancia con el valor celestial del pasaje.
  - Se conserva «intercede por» para reflejar la mediación activa de παραιτούμενος.
  - Se traduce γένος con «raza» siguiendo la decisión auditada del inglés POB y preservando el matiz genealógico.
  - No se introduce una intensificación como «completamente» o «del todo», porque el texto griego y la última revisión inglesa no la requieren.
