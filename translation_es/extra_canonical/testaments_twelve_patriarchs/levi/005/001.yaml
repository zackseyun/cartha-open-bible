translation:
  language: es
  text: Y en esto, el ángel me abrió las puertas del cielo, y vi al Santo Altísimo sentado en un trono.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤνοιξέ μοι ... τὰς πύλας τοῦ οὐρανοῦ
  english_pob_choice: the angel opened to me the gates of heaven
  chosen_spanish: me abrió las puertas del cielo
  alternatives_spanish:
  - abrió para mí las puertas del cielo
  - me abrió las puertas celestiales
  lexicon: ἀνοίγω; πύλη; οὐρανός
  rationale: Mantiene la acción directa y la imagen espacial del texto griego. «Puertas del cielo» reproduce de forma natural la metáfora sin añadir explicación interpretativa.
- source_word: ὁ ἄγγελος
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - un ángel
  lexicon: ἄγγελος
  rationale: El artículo definido concuerda con el griego y con la referencia a un mensajero ya conocido en el contexto inmediato.
- source_word: τὸν ἅγιον ὕψιστον
  english_pob_choice: the Holy Most High
  chosen_spanish: al Santo Altísimo
  alternatives_spanish:
  - al Santísimo Altísimo
  - al Santo, el Altísimo
  lexicon: ἅγιος; ὕψιστος
  rationale: Conserva la coordinación de los dos títulos divinos y el valor reverencial de ambos. «Santo Altísimo» evita suavizar el doble título y sigue siendo idiomático en español.
- source_word: ἐπὶ θρόνου καθήμενον
  english_pob_choice: seated on a throne
  chosen_spanish: sentado en un trono
  alternatives_spanish:
  - sentado sobre un trono
  - entronizado
  lexicon: κάθημαι; θρόνος
  rationale: «Sentado en un trono» es una equivalencia directa y clara; «entronizado» sería más interpretativo y menos transparente al gesto descrito.
theological_decisions:
- issue: 'Títulos divinos acumulados: “Santo” y “Altísimo”'
  english_pob_reading: the Holy Most High
  chosen_spanish_reading: al Santo Altísimo
  alternative_spanish_readings:
  - al Santo, el Altísimo
  - al Altísimo Santo
  rationale: El griego presenta ambos elementos como una sola designación reverente. La forma elegida preserva esa densidad sin descomponer innecesariamente el título.
  doctrine_reference: Reverencia y títulos divinos en la doxología bíblica; cf. uso de ἅγιος y ὕψιστος en contextos de exaltación divina.
- issue: “Puertas del cielo” como imagen de acceso revelado
  english_pob_reading: the gates of heaven
  chosen_spanish_reading: las puertas del cielo
  alternative_spanish_readings:
  - las puertas celestiales
  - las puertas del cielo abierto
  rationale: Se conserva la imagen de acceso al ámbito celestial sin convertirla en una explicación doctrinal. El relato trata de revelación visionaria, no de una descripción física.
  doctrine_reference: Lenguaje visionario y apocalíptico de acceso al mundo celestial.
translation_notes:
  revision_awareness: El texto fuente griego ya estaba marcado como sin cambios en la revisión más reciente; por ello esta versión española sigue de cerca la lectura crítica dada por el paquete fuente y el auditable inglés POB, sin introducir variantes textuales nuevas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el tetragrámaton.
  - Se mantiene «ángel» y no se sustituye por un término más explicativo, para conservar la sencillez narrativa.
  - «Altísimo» se conserva con mayúscula por tratarse de un título divino directo en el contexto.
  - No se añaden notas al pie porque el verso no presenta variantes textuales o alternativas decisivas que requieran anclaje en el texto español.
