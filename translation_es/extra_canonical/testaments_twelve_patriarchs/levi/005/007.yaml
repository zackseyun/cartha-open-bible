translation:
  language: es
  text: Y después de esto, cuando desperté, bendije al Altísimo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔξυπνος γενόμενος
  english_pob_choice: when I awoke
  chosen_spanish: cuando desperté
  alternatives_spanish:
  - cuando fui despertado
  - al despertar
  - cuando cobré conciencia
  lexicon: ἔξυπνος γενόμενος
  rationale: El griego expresa el hecho de volver al estado de vigilia; en español, «desperté» comunica con naturalidad ese paso sin añadir una causa pasiva que el texto no requiere.
- source_word: τὸν ὕψιστον
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Supremo
  lexicon: ὕψιστος
  rationale: «El Altísimo» es la forma española directa y reverente para el título divino del griego, manteniendo el valor honorífico sin introducir una glosa interpretativa adicional.
theological_decisions:
- issue: Título divino en la doxología final
  english_pob_reading: I blessed the Most High
  chosen_spanish_reading: bendije al Altísimo
  alternative_spanish_readings:
  - bendije a Dios Altísimo
  - bendije al Dios Altísimo
  rationale: Se conserva el título reverencial del original sin sustituirlo por una formulación más explicativa. El dativo/objeto del verbo en español se expresa naturalmente con «al Altísimo», manteniendo el referente divino sin masking de nombre.
  doctrine_reference: Doxología dirigida a Dios como el Altísimo
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios; por ello, el español sigue de cerca la lectura estable del griego y del inglés POB, sin introducir variaciones textuales ni notas de variante.
  spanish_consistency_notes:
  - 'Se mantiene el orden narrativo simple del original: «Y después de esto…».'
  - No se añade el nombre propio de Dios, porque el texto griego usa el título ὕψιστος.
  - El verbo «bendije» conserva el acto de alabanza o bendición dirigido a Dios en un registro bíblico claro y natural.
