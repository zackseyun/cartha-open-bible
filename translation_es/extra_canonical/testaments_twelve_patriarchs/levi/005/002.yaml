base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/005/002.yaml
  text: And he said to me, “Levi, to you I have given the blessings of the priesthood until I come and dwell in the midst of Israel.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:32Z'
