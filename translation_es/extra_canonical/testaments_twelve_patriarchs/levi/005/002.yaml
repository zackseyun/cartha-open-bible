translation:
  language: es
  text: 'Y me dijo: «Leví, a ti te he dado las bendiciones del sacerdocio, hasta que venga y habite en medio de Israel».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ εἰπέ μοι
  english_pob_choice: And he said to me
  chosen_spanish: Y me dijo
  alternatives_spanish:
  - Y me habló
  - Y me dijo a mí
  lexicon: εἶπον / λέγω
  rationale: La forma breve «Y me dijo» comunica con naturalidad el dativo de destinatario («μοι») sin añadir énfasis innecesario. «Me dijo a mí» sería más literal pero menos idiomático en español.
- source_word: Λευί
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: Λευί
  rationale: Se conserva el nombre propio con acento gráfico español «Leví», forma clara y publicable para el lector hispanohablante.
- source_word: σοὶ ἔδωκα
  english_pob_choice: to you I have given
  chosen_spanish: a ti te he dado
  alternatives_spanish:
  - te he dado
  - a ti he dado
  lexicon: δίδωμι
  rationale: El griego destaca el destinatario mediante el dativo; en español se puede conservar con el doble marcado «a ti te». «Te he dado» sería correcto, pero pierde algo de la focalización del original.
- source_word: τὰς εὐλογίας
  english_pob_choice: the blessings
  chosen_spanish: las bendiciones
  alternatives_spanish:
  - las bendiciones favorables
  - las bendiciones dadas
  lexicon: εὐλογία
  rationale: «Bendiciones» es la equivalencia directa y transparente. No se introduce una paráfrasis como «favores» porque el contexto mantiene el sentido de dones/beneficios declarados.
- source_word: τῆς ἱερατείας
  english_pob_choice: of the priesthood
  chosen_spanish: del sacerdocio
  alternatives_spanish:
  - del oficio sacerdotal
  - del sacerdocio ministerial
  lexicon: ἱερατεία
  rationale: «Sacerdocio» es el término natural y fiel para ἱερατεία. Se evita expandir innecesariamente el sintagma con glosas interpretativas.
- source_word: ἕως ἐλθὼν κατοικήσω
  english_pob_choice: until I come and dwell
  chosen_spanish: hasta que venga y habite
  alternatives_spanish:
  - hasta que yo venga y habite
  - hasta venir y habitar
  lexicon: ἕως + participio + subjuntivo
  rationale: La secuencia temporal se vierte de modo fluido en español con «hasta que venga y habite». Se mantiene la doble acción futura sin forzar un calco sintáctico.
- source_word: ἐν μέσῳ τοῦ Ἰσραήλ
  english_pob_choice: in the midst of Israel
  chosen_spanish: en medio de Israel
  alternatives_spanish:
  - en medio del Israel
  - dentro de Israel
  lexicon: ἐν μέσῳ
  rationale: «En medio de Israel» reproduce la imagen espacial y bíblica con máxima claridad. «Dentro de Israel» suavizaría demasiado la metáfora de presencia central.
theological_decisions:
- issue: Sujeto implícito de «venga y habite»
  english_pob_reading: I come and dwell
  chosen_spanish_reading: «venga y habite» con sujeto implícito en primera persona
  alternative_spanish_readings:
  - «yo venga y habite»
  - «él venga y habite»
  rationale: El inglés POB refleja una primera persona implícita («I come and dwell»). En español, el verbo en subjuntivo con sujeto omitido conserva la referencia sin necesidad de repetir «yo», que sería pesada; el contexto narrativo ya identifica al hablante divino.
  doctrine_reference: Discurso divino directo; referencia narrativa sin cambio doctrinal.
- issue: Valor de «bendiciones del sacerdocio»
  english_pob_reading: the blessings of the priesthood
  chosen_spanish_reading: «las bendiciones del sacerdocio»
  alternative_spanish_readings:
  - «las bendiciones sacerdotales»
  - «las bendiciones del oficio sacerdotal»
  rationale: Se mantiene la formulación concreta del texto, que presenta unas bendiciones vinculadas al sacerdocio como don conferido a Leví. No se abstrae a un adjetivo genérico para no debilitar la carga institucional del pasaje.
  doctrine_reference: Elección léxica sin implicación doctrinal añadida; fidelidad al rol sacerdotal de Leví.
translation_notes:
  revision_awareness: La versión inglesa POB más reciente quedó marcada como unchanged/no changes needed; esta propuesta sigue esa lectura estable y no introduce variantes textuales ni reajustes interpretativos más allá de la traslación al español.
  spanish_consistency_notes:
  - Se usa «Leví» con tilde, pero se preserva el referente propio del nombre bíblico.
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el tetragrámaton ni κύριος, por lo que no se introduce.
  - Se conserva un registro reverente y sobrio, con puntuación española y comillas angulares para el discurso directo.
