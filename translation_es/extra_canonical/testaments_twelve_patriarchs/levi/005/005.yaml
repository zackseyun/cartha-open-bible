base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/005/005.yaml
  text: And I said to him, “I beg you, Lord, teach me your name, so that I may call on you in the day of affliction.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:34Z'
    unchanged: false
    changes_summary: Changed 'in a day of affliction' to 'in the day of affliction' for a more natural and direct rendering of ἐν ἡμέρᾳ θλίψεως.
translation:
  language: es
  text: 'Y le dije: «Te ruego, Señor, enséñame tu nombre, para que pueda invocarte en el día de la aflicción».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Εἶπον δὲ αὐτῷ
  english_pob_choice: And I said to him
  chosen_spanish: Y le dije
  alternatives_spanish:
  - Y yo le dije
  - Entonces le dije
  lexicon: λέγω / εἶπον
  rationale: Spanish puede omitir el pronombre explícito sin perder claridad; el enlace con ‘Y’ conserva la continuidad narrativa del griego y del inglés POB.
- source_word: Δέομαί σου
  english_pob_choice: I beg you
  chosen_spanish: Te ruego
  alternatives_spanish:
  - Te suplico
  - Te imploro
  lexicon: δέομαι
  rationale: ‘Te ruego’ reproduce la súplica respetuosa y digna del griego y corresponde bien al registro devocional del contexto.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Soberano
  lexicon: κύριος
  rationale: Aquí el vocativo funciona como tratamiento reverente; ‘Señor’ es la forma natural y fiel en español.
- source_word: δίδαξόν με
  english_pob_choice: teach me
  chosen_spanish: enséñame
  alternatives_spanish:
  - instrúyeme
  - muéstrame
  lexicon: διδάσκω
  rationale: ‘Enséñame’ es la equivalencia directa y transparente en español, sin añadir matices ajenos.
- source_word: τὸ ὄνομά σου
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu nombre propio
  - tu nombre
  lexicon: ὄνομα
  rationale: Se conserva la expresión literal porque el pedido del nombre es central y no requiere paráfrasis.
- source_word: ἐπικαλέσομαί σε
  english_pob_choice: I may call on you
  chosen_spanish: pueda invocarte
  alternatives_spanish:
  - pueda llamarte
  - pueda clamar a ti
  lexicon: ἐπικαλέομαι
  rationale: ‘Invocarte’ mantiene el sentido de apelar a alguien en oración o súplica, más preciso que ‘llamarte’ en este contexto.
- source_word: ἐν ἡμέρᾳ θλίψεως
  english_pob_choice: in the day of affliction
  chosen_spanish: en el día de la aflicción
  alternatives_spanish:
  - en el día de angustia
  - en el día de tribulación
  lexicon: ἡμέρα / θλῖψις
  rationale: Se sigue la revisión inglesa y la estructura griega con artículo definido; ‘aflicción’ conserva la fuerza de θλῖψις sin sobreinterpretar.
theological_decisions:
- issue: Tratamiento del vocativo divino Κύριε
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Dueño
  rationale: El griego presenta un vocativo de respeto dirigido a una figura superior; en español ‘Señor’ comunica reverencia sin convertir automáticamente el título en el nombre divino.
  doctrine_reference: Cristología y teología del vocativo divino; distinción entre tratamiento y nombre propio
- issue: Sentido de ἐπικαλέσομαί σε en contexto de aflicción
  english_pob_reading: so that I may call on you
  chosen_spanish_reading: para que pueda invocarte
  alternative_spanish_readings:
  - para que pueda llamarte
  - para que pueda clamar a ti
  rationale: ‘Invocar’ mantiene el carácter litúrgico/devocional del verbo y su relación con la petición de conocer el nombre; no se reduce a mera mención verbal.
  doctrine_reference: Oración e invocación del nombre divino
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó ‘in a day of affliction’ a ‘in the day of affliction’; por eso el español usa ‘en el día de la aflicción’ para reflejar el artículo definido y la relación directa con ἐν ἡμέρᾳ θλίψεως.
  spanish_consistency_notes:
  - Se mantiene ‘Señor’ para Κύριος en el vocativo del texto base.
  - Se usa ‘aflicción’ de forma consistente para θλῖψις en esta unidad.
  - No se introduce ‘Cristo’ ni ‘Yahvé’ porque el pasaje no lo exige en este punto del griego fuente.
