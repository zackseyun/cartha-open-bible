  text: Εἶπον δὲ αὐτῷ³⁰· Δέομαί σου³¹, Κύριε³², *δίδαξόν με³³ τὸ ὄνομά σου ἵνα³⁴ ἐπικαλέσομαί³⁵ σε³⁶ ἐν ἡμέρᾳ θλίψεως³⁷.
