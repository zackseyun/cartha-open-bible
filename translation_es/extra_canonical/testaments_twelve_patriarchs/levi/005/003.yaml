id: T12P.LEV.5.3
reference: Testament of Levi 5:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Τότε¹³ ὁ ἄγγελος¹⁴ κατήγαγέν¹⁵ με ἐπὶ τὴν γῆν, καὶ ἔδωκέ¹⁶ μοι *ὅπλον καὶ ῥομφαίαν¹⁷, καὶ εἰπέ μοι¹⁸· Ποίησον ἐκδίκησιν ἐν Συχὲμ¹⁹ ὑπὲρ Δείνας²⁰ *τῆς ἀδελφῆς σου²¹, κἀγὼ²² ἔσομαι μετά σου²³, ὅτι Κύριος *ἀπέστειλέν †με²⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/005/003.yaml
  text: Then the angel brought me down to the earth and gave me a weapon and a sword, and said to me, “Execute vengeance in Shechem for Dinah your sister, and I will be with you, because the Lord has sent me.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:34Z'
    unchanged: false
    changes_summary: Changed 'shield' to 'weapon' for ὅπλον, which is broader and more accurate here; changed 'Carry out vengeance' to 'Execute vengeance' for a more formal and natural rendering of Ποίησον ἐκδίκησιν. Kept the rest unchanged.
translation:
  language: es
  text: 'Entonces el ángel me bajó a la tierra y me dio un arma[a] y una espada, y me dijo: «Ejecuta venganza en Siquem por Dina, tu hermana, y yo estaré contigo, porque el Señor me ha enviado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «arma» traduce ὅπλον en su sentido general, más amplio que «escudo»; la revisión inglesa corrigió así una lectura demasiado estrecha.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἄγγελος
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - un ángel
  lexicon: ángel
  rationale: El griego presenta al mensajero celestial como figura definida en el contexto; en español, «el ángel» conserva esa referencia identificable sin añadir una interpretación innecesaria.
- source_word: κατήγαγέν
  english_pob_choice: brought me down
  chosen_spanish: me bajó
  alternatives_spanish:
  - me hizo descender
  - me llevó hacia abajo
  lexicon: bajar / descender
  rationale: «Me bajó» expresa de manera natural la idea de descenso físico del griego, manteniendo la dirección del movimiento sin sobrecargar el estilo.
- source_word: ὅπλον
  english_pob_choice: weapon
  chosen_spanish: arma
  alternatives_spanish:
  - arma de guerra
  - instrumento
  lexicon: arma
  rationale: Se siguió la revisión inglesa que corrigió «shield» por «weapon», porque ὅπλον es más amplio que «escudo»; en español, «arma» es el equivalente más directo y amplio.
- source_word: ῥομφαίαν
  english_pob_choice: a sword
  chosen_spanish: una espada
  alternatives_spanish:
  - una gran espada
  - una espada larga
  lexicon: espada
  rationale: «Espada» reproduce el arma blanca indicada por ῥομφαίαν sin añadir especificación no atestiguada en el texto base.
- source_word: Ποίησον ἐκδίκησιν
  english_pob_choice: Execute vengeance
  chosen_spanish: Ejecuta venganza
  alternatives_spanish:
  - Haz venganza
  - Lleva a cabo venganza
  lexicon: venganza
  rationale: La forma imperativa conserva el mandato. «Ejecuta venganza» sigue la decisión inglesa revisada y mantiene el tono formal sin diluir la fuerza judicial/retributiva del griego.
- source_word: ἐν Συχὲμ
  english_pob_choice: in Shechem
  chosen_spanish: en Siquem
  alternatives_spanish:
  - en Siquem
  - en Shekem
  lexicon: Siquem
  rationale: «Siquem» es la forma española asentada para el topónimo bíblico, sin alterar la referencia geográfica.
- source_word: Δείνας
  english_pob_choice: Dinah
  chosen_spanish: Dina
  alternatives_spanish:
  - Diná
  lexicon: Dina
  rationale: «Dina» es la forma española habitual y transparente del nombre propio; se evita anglicismo innecesario.
- source_word: τῆς ἀδελφῆς σου
  english_pob_choice: your sister
  chosen_spanish: tu hermana
  alternatives_spanish:
  - tu hermana
  lexicon: hermana
  rationale: Se mantiene la relación de parentesco con un posesivo directo y natural en español.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: Señor
  rationale: Aunque el proyecto prefiere «Yahvé» para יהוה, aquí el griego cita directamente Κύριος dentro de la fórmula narrativa tradicional del texto fuente; se conserva «el Señor» para respetar el audit trail inglés y la forma establecida de esta cita.
theological_decisions:
- issue: Identidad del mensajero que habla en nombre de Dios
  english_pob_reading: because the Lord has sent me
  chosen_spanish_reading: porque el Señor me ha enviado
  alternative_spanish_readings:
  - porque Yahvé me ha enviado
  - porque Dios me ha enviado
  rationale: Se mantiene la formulación del audit trail inglés y la distinción entre el ángel enviado y el Señor que lo envía, sin fusionar ambas figuras.
  doctrine_reference: Mediación angelical y envío divino en narrativas patriarcales
- issue: Naturaleza de ὅπλον
  english_pob_reading: weapon
  chosen_spanish_reading: arma
  alternative_spanish_readings:
  - escudo
  - arma de guerra
  rationale: Se preserva la amplitud semántica de ὅπλον y la corrección textual de la revisión inglesa, evitando estrechar indebidamente el sentido a «escudo».
  doctrine_reference: Precisión léxica del texto griego
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada en 2026-04-23 para cambiar «shield» por «weapon» en ὅπλον y «Carry out vengeance» por «Execute vengeance» en Ποίησον ἐκδίκησιν. La redacción española refleja esas correcciones y mantiene la estructura narrativa, el mandato y la cita final sin añadir matices no presentes en el griego.
  spanish_consistency_notes:
  - Se usa «Dina» para el nombre propio y «Siquem» para el topónimo, conforme al uso bíblico en español.
  - Se conserva «el Señor» en la cita final por tratarse de Κύριος en una fórmula narrativa ya tradicional, sin desplazar el sentido del envío divino.
  - El estilo es formal y bíblico, pero con sintaxis natural en español contemporáneo.
