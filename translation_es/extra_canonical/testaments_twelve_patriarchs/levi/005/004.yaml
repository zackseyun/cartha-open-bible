source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ συνετέλεσα†²⁵ τῷ καιρῷ ἐκείνῳ *τοὺς υἱοὺς²⁶ Ἐμμώρ²⁷, καθὼς γέγραπται ἐν πλαξὶ²⁸ τῶν πατέρων²⁹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/005/004.yaml
  text: And in that time I destroyed the sons of Hamor, as it is written on the tablets of the fathers.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:34Z'
    unchanged: false
    changes_summary: Removed 'heavenly,' which is not present in the Greek; retained the rest with a more literal rendering of πλαξὶ τῶν πατέρων as 'the tablets of the fathers.'
translation:
  language: es
  text: Y en aquel tiempo destruí a los hijos de Hamor, como está escrito en las tablas[a] de los padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tablas» traduce literalmente πλαξὶ; puede aludir a placas o tablillas inscritas.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ συνετέλεσα
  english_pob_choice: And I destroyed
  chosen_spanish: destruí
  alternatives_spanish:
  - acabé con
  - aniquilé
  - destruí por completo
  lexicon: συντελέω
  rationale: El griego expresa consumación/terminación efectiva de la acción; en este contexto el POB inglés tomó el sentido resultativo de destrucción. En español, «destruí» comunica bien la acción consumada sin añadir intensificación no explicitada.
- source_word: τῷ καιρῷ ἐκείνῳ
  english_pob_choice: in that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - entonces
  lexicon: καιρός
  rationale: «Aquel tiempo» mantiene la referencia temporal demostrativa y el tono bíblico natural en español.
- source_word: τοὺς υἱοὺς Ἐμμώρ
  english_pob_choice: the sons of Hamor
  chosen_spanish: los hijos de Hamor
  alternatives_spanish:
  - los hijos de Emmor
  - los descendientes de Hamor
  lexicon: υἱούς + Ἐμμώρ
  rationale: Se conserva la filiación literal del griego. Se mantiene «Hamor» como forma habitual del nombre en español bíblico y para alineación con la fuente inglesa.
- source_word: ἐν πλαξὶ τῶν πατέρων
  english_pob_choice: on the tablets of the fathers
  chosen_spanish: en las tablas de los padres
  alternatives_spanish:
  - en las tablas de los antepasados
  - en las tablillas de los padres
  lexicon: πλαξίν
  rationale: «Tablas» es la traducción más directa y conserva la imagen de registro/escritura. «Padres» se mantiene por fidelidad a τῶν πατέρων, aunque en español puede percibirse como «antepasados»; no se suaviza para no borrar la literalidad textual.
theological_decisions:
- issue: 'Naturaleza del registro escrito: ¿tablas «celestiales» o simplemente «tablas»?'
  english_pob_reading: The tablets of the fathers
  chosen_spanish_reading: las tablas de los padres
  alternative_spanish_readings:
  - las tablas celestiales de los padres
  - las tablas del cielo
  rationale: La revisión inglesa eliminó «heavenly» porque no está en el griego. En español se sigue esa decisión y no se introduce una cualidad celestial ausente en el texto fuente.
  doctrine_reference: Fidelidad textual y control de adiciones interpretativas
translation_notes:
  revision_awareness: La revisión más reciente retiró «heavenly» del inglés porque no aparece en el griego. El español sigue esa corrección y evita añadir cualquier calificación no atestiguada.
  spanish_consistency_notes:
  - Se mantiene el tiempo verbal pasado simple para reflejar la acción completa de συνετέλεσα.
  - Se conserva el nombre Hamor en forma tradicional en español, coherente con el contexto bíblico.
  - No se introduce «celestiales» ni equivalente, en consonancia con la revisión del texto base inglés.
