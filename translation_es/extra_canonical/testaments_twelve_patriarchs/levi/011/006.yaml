    timestamp: '2026-04-23T14:56:49Z'
    unchanged: false
    changes_summary: Added the article for natural English, and revised the final phrase from 'assembly' to 'the union of all' to better reflect πάσης συμβιβασμός ('union/reconciliation of all') rather than an assembled group.
translation:
  language: es
  text: Por eso le puse por nombre Caat[a], [que es, el comienzo de la majestad y la unión de todos].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La transliteración del nombre propio sigue la forma griega Καάθ; otras tradiciones castellanas pueden presentar variantes como «Cohat», «Caath» o «Kahath».
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο ἐκάλεσα
  english_pob_choice: Therefore I called
  chosen_spanish: Por eso llamé
  alternatives_spanish:
  - Por tanto llamé
  - Así que llamé
  lexicon: διὰ τοῦτο; καλέω
  rationale: «Por eso» expresa de forma natural la relación causal del griego sin añadir matices innecesarios; «llamé» sigue de cerca ἐκάλεσα en pasado narrativo.
- source_word: τὸ ὄνομα αὐτοῦ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de él
  lexicon: ὄνομα
  rationale: «Su nombre» es la forma española más natural y fiel para el posesivo de persona en este contexto.
- source_word: Καάθ
  english_pob_choice: Kohath
  chosen_spanish: Caat[h]
  alternatives_spanish:
  - Caat
  - Cohat
  - Caath
  lexicon: Καάθ
  rationale: Se mantiene el nombre propio según la forma griega del testimonio fuente. En español, «Caat[h]» preserva la pronunciación aproximada y deja visible la forma histórica del nombre; la h entre corchetes marca una solución editorial de transliteración para un nombre no normalizado en uso bíblico castellano.
- source_word: ἀρχὴ μεγαλείου
  english_pob_choice: the beginning of majesty
  chosen_spanish: el comienzo de la majestad
  alternatives_spanish:
  - el principio de la majestad
  - el inicio de la majestad
  lexicon: ἀρχή; μεγαλείο
  rationale: «Comienzo» comunica bien ἀρχή aquí sin rigidez filosófica; «majestad» conserva la elevación y dignidad de μεγαλείου.
- source_word: συμβιβασμός
  english_pob_choice: the union of all
  chosen_spanish: la unión de todos
  alternatives_spanish:
  - la reconciliación de todos
  - la concordia de todos
  - el unimiento de todos
  lexicon: συμβιβασμός
  rationale: La revisión inglesa entendió συμβιβασμός como «union/reconciliation of all». En español, «la unión de todos» conserva la amplitud semántica y evita restringir prematuramente a un solo matiz; «reconciliación» sería posible, pero introduce un tono más teológico que el sintagma griego por sí solo no exige.
theological_decisions:
- issue: 'Sentido de συμβιβασμός: unión, reconciliación o ensamblaje'
  english_pob_reading: the union of all
  chosen_spanish_reading: la unión de todos
  alternative_spanish_readings:
  - la reconciliación de todos
  - la concordia de todos
  rationale: Sigo la revisión auditada del inglés, que corrigió «assembly» hacia «union of all» para reflejar mejor el alcance del término. «Unión de todos» mantiene la apertura semántica sin sobreespecificar un proceso doctrinal concreto.
  doctrine_reference: lexical-semantic caution; no dogmatic claim beyond the text
translation_notes:
  revision_awareness: La redacción refleja la revisión inglesa más reciente, que añadió el artículo («the beginning of majesty») y reemplazó «assembly» por «the union of all». En español se conservó ese ajuste semántico con «el comienzo de la majestad y la unión de todos».
  spanish_consistency_notes:
  - Se preservó el paralelismo del enunciado nominal final sin añadir verbos auxiliares.
  - Se evitó «SEÑOR» u այլ sustituciones porque el texto no contiene el Tetragrámaton ni κύριος.
  - «Unión de todos» traduce el valor global de συμβιβασμός sin imponer una lectura eclesiológica específica.
