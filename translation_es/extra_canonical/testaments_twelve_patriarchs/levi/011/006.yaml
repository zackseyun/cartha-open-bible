  text: '*Διὰ τοῦτο ἐκάλεσα τὸ ὄνομα αὐτοῦ Καάθ²¹, [ὅ ἐστιν ἀρχὴ μεγαλείου καὶ συμβιβασμός]²².'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/011/006.yaml
  text: Therefore I called his name Kohath, [which is, the beginning of majesty and uniting].
  revision_pass:
