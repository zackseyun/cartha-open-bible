base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/011/007.yaml
  text: And a third son, Merari, was born to me in the fortieth year of my life; and because his mother had difficulty in childbirth, I called him Merari, which means bitterness.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:50Z'
    unchanged: false
    changes_summary: Adjusted 'bore him with difficulty' to the more natural and precise 'had difficulty in childbirth,' and rendered ὅ ἐστι as 'which means' for clearer formal English.
translation:
  language: es
  text: Y un tercer hijo, Merarí, me nació en el año cuarenta de mi vida; y, como su madre tuvo dificultad en el parto, lo llamé Merarí, que significa amargura.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τρίτον υἱόν
  english_pob_choice: a third son
  chosen_spanish: un tercer hijo
  alternatives_spanish:
  - un tercer hijo varón
  - el tercer hijo
  lexicon: υἱός
  rationale: «Hijo» reproduce el parentesco filial del griego y mantiene la naturalidad del español. El artículo indefinido comunica la introducción narrativa de un nuevo hijo; «varón» no es necesario porque el contexto ya lo indica.
- source_word: ἐν τῷ τεσσαρακοστῷ ἔτει τῆς ζωῆς μου
  english_pob_choice: in the fortieth year of my life
  chosen_spanish: en el año cuarenta de mi vida
  alternatives_spanish:
  - en mi año cuarenta de vida
  - cuando tenía cuarenta años
  lexicon: ἔτος; ζωή
  rationale: Se conserva la estructura temporal del original y del inglés POB. «Año cuarenta de mi vida» es claro en español y mantiene el tono autobiográfico sin volverlo demasiado libre.
- source_word: ἐδυστόκησεν ἡ μήτηρ αὐτοῦ
  english_pob_choice: his mother had difficulty in childbirth
  chosen_spanish: su madre tuvo dificultad en el parto
  alternatives_spanish:
  - su madre padeció dificultad al darlo a luz
  - su madre tuvo un parto difícil
  lexicon: δυστοκέω
  rationale: El griego expresa dificultad en el alumbramiento; la forma elegida es natural en español y conserva la fuerza descriptiva sin añadir matices emocionales que no están en el texto.
- source_word: Μεραρεῖ ... ὅ ἐστι πικριασμός
  english_pob_choice: Merari, which means bitterness
  chosen_spanish: Merarí, que significa amargura
  alternatives_spanish:
  - Merarí, que quiere decir amargura
  - Merarí, es decir, amargura
  lexicon: ὅ ἐστι; πικριασμός
  rationale: «Que significa» reproduce el valor explicativo de ὅ ἐστι, tal como la revisión inglesa prefirió «which means». «Amargura» refleja con precisión πικριασμός y es idiomática en español bíblico.
theological_decisions:
- issue: Nombre explicativo del hijo derivado de la experiencia del parto
  english_pob_reading: Merari, which means bitterness
  chosen_spanish_reading: Merarí, que significa amargura
  alternative_spanish_readings:
  - Merarí, que quiere decir amargura
  - Merarí, es decir, amargura
  rationale: No hay una doctrina en disputa, pero sí una decisión de traducción sobre cómo presentar la etimología narrativa. Se mantiene el sentido explicativo sin suavizar la asociación semántica con la amargura.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, especialmente en la frase causal naturalizada («tuvo dificultad en el parto») y en la equivalencia explicativa de ὅ ἐστι («que significa»). No se incorporan notas porque el pasaje no presenta variantes textuales relevantes en el paquete dado ni ambigüedades que requieran glosa adicional.
  spanish_consistency_notes:
  - Se usa «Merarí» con tilde para la adaptación española del nombre propio, de acuerdo con uso ortográfico estándar de nombres bíblicos en español.
  - Se evita «Señor» o terminología teológica no presente en el pasaje; el texto es narrativo y etimológico.
  - Se mantiene un registro sobrio y bíblico, pero con sintaxis fluida para lectura pública.
