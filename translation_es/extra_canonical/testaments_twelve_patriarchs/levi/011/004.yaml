base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/011/004.yaml
  text: And Kohath was born in the thirty-fifth year of my life, toward the sunrise.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:48Z'
    unchanged: false
    changes_summary: Removed material not present in the Greek draft ('that he stood in the midst of the congregation, in the heights') and rendered ἐν ὁρά- μου / πρὸς ἀνατολὰς ἡλίου more directly as 'in my vision toward the sunrise.'
translation:
  language: es
  text: Y Kohat nació en el trigésimo quinto año de mi vida, hacia la salida del sol.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὰθ
  english_pob_choice: Kohath
  chosen_spanish: Kohat
  alternatives_spanish:
  - Cohat
  - Kohath
  lexicon: nombre propio
  rationale: Se translitera el nombre propio de forma breve y natural en español. ‘Kohat’ conserva la identificación con el personaje y evita una grafía demasiado anglicada; ‘Cohat’ es posible, pero ‘Kohat’ sigue más de cerca la forma del nombre en la tradición crítica moderna.
- source_word: ἐγεννήθη
  english_pob_choice: was born
  chosen_spanish: nació
  alternatives_spanish:
  - fue nacido
  - fue engendrado
  lexicon: γεννάω
  rationale: El pasivo aoristo se expresa de manera natural en español con ‘nació’. Mantiene el hecho biográfico sin forzar una construcción más literal que suene artificial.
- source_word: ἐν τῷ τριακοστῷ πέμπτῳ ἔτει τῆς ζωῆς μου
  english_pob_choice: in the thirty-fifth year of my life
  chosen_spanish: en el trigésimo quinto año de mi vida
  alternatives_spanish:
  - a los treinta y cinco años de mi vida
  - en mis treinta y cinco años
  lexicon: expresión temporal
  rationale: Se conserva la estructura temporal explícita del griego. ‘De mi vida’ refleja el genitivo posesivo sin introducir paráfrasis.
- source_word: πρὸς ἀνατολὰς ἡλίου
  english_pob_choice: toward the sunrise
  chosen_spanish: hacia la salida del sol
  alternatives_spanish:
  - hacia el oriente
  - al amanecer
  lexicon: ἀνατολή / ἥλιος
  rationale: La imagen direccional se traduce con una expresión española clara y fiel. ‘Hacia la salida del sol’ conserva el valor espacial de ‘πρὸς’ y la imagen concreta del texto.
theological_decisions:
- issue: Dirección espacial/imaginería de ‘toward the sunrise’
  english_pob_reading: toward the sunrise
  chosen_spanish_reading: hacia la salida del sol
  alternative_spanish_readings:
  - hacia el oriente
  - al amanecer
  rationale: No se espiritualiza ni se amplía la frase. Se mantiene como referencia direccional concreta, conforme al griego y a la revisión inglesa que eliminó material no atestiguado.
  doctrine_reference: none
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó una ampliación no presente en el griego (‘that he stood in the midst of the congregation, in the heights’) y dejó solo la referencia al nacimiento y la dirección ‘toward the sunrise’. La versión española sigue esa forma depurada y no reintroduce el material descartado.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y narrativo adecuado para un texto apócrifo/pseudepigráfico.
  - ‘Kohat’ se usa como nombre propio transliterado de forma estable; no se añade glosa explicativa porque el contexto ya identifica al personaje.
  - No se añaden notas al pie porque no hay variantes textuales o ambigüedades que requieran anotación en este versículo.
