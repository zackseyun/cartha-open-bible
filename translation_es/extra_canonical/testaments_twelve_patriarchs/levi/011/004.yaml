  text: Καὶ¹³ ὁ Καὰθ¹⁴ ἐγεννήθη *ἐν τῷ¹⁵ τριακοστῷ πέμπτῳ¹⁶ ἔτει¹⁷ ⸢τῆς ζωῆς μου¹⁸⸥ *πρὸς ἀνατολὰς ἡλίου¹⁹.
