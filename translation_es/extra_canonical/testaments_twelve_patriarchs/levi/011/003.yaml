translation:
  language: es
  text: Y vi acerca de él que no estaba en el primer rango.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ εἶδον
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y vi
  lexicon: οἶδα / ὁράω
  rationale: El griego expresa una visión directa; «vi» conserva la observación inmediata sin añadir matiz interpretativo. Se mantiene la coordinación inicial con «Y» como en el original.
- source_word: περὶ αὐτόν
  english_pob_choice: concerning him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - sobre él
  - acerca de él
  lexicon: περί + acusativo
  rationale: «Acerca de él» reproduce el sentido relacional/de referencia del griego sin sonar excesivamente técnico en español. «Sobre él» podría sugerir contenido temático, menos preciso aquí.
- source_word: ὅτι οὐκ ἔστιν
  english_pob_choice: that he was not
  chosen_spanish: que no estaba
  alternatives_spanish:
  - que no era
  - que no se encontraba
  lexicon: εἰμί + negación
  rationale: Aunque el inglés POB usa pasado («was not»), el presente griego en discurso indirecto puede expresarse naturalmente en español como un imperfecto contextual («estaba») para evitar una construcción rígida. Se conserva la negación simple.
- source_word: ἐν τῇ πρώτῃ τάξει
  english_pob_choice: in the first rank
  chosen_spanish: en el primer rango
  alternatives_spanish:
  - en la primera fila
  - en el primer lugar
  - en el primer rango
  lexicon: τάξις
  rationale: «Rango» mantiene la idea de orden/clasificación jerárquica o de posición dentro de un grupo. «Fila» o «lugar» podrían estrechar o desplazar el sentido; «primer rango» sigue de cerca la imagen del texto fuente y el inglés auditado.
theological_decisions:
- issue: Valor de la expresión de posición/orden
  english_pob_reading: he was not in the first rank
  chosen_spanish_reading: no estaba en el primer rango
  alternative_spanish_readings:
  - no estaba en la primera fila
  - no ocupaba el primer lugar
  rationale: No se introduce una interpretación doctrinal; la frase se mantiene descriptiva, reflejando solamente la posición relativa dentro de un orden o grupo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada coinciden de forma estable; la revisión más reciente indicó que no hubo cambios necesarios. Esta versión española sigue esa lectura sin añadir expansión explicativa.
  spanish_consistency_notes:
  - 'Se conserva el orden simple de la cláusula griega: acción de ver + referencia a él + cláusula de contenido.'
  - Se evita introducir términos eclesiásticos no presentes en el fuente, como «puesto» o «jerarquía», para no sobreinterpretar τάξις.
  - No se usan notas al pie porque no hay variante textual ni alternativa necesaria para la lectura española.
