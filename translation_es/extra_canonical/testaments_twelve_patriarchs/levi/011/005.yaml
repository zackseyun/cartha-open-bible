id: T12P.LEV.11.5
reference: Testament of Levi 11:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: '*Καὶ εἶδον ἐν ὁράματι· μέσος ἐν ὑψηλοῖς ἵστατο πάσης τῆς συναγωγῆς²⁰.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/011/005.yaml
  text: And I saw in the vision that he stood in the midst of the congregation, in the heights.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:48Z'
    unchanged: false
    changes_summary: Added the phrase 'in the heights' to account for ἐν ὑψηλοῖς, which was omitted in the draft. Retained 'in the midst of the congregation' as the natural rendering of μεσῶν τῆς συναγωγῆς.
translation:
  language: es
  text: Y vi en la visión que él estaba en medio de la congregación, en las alturas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ εἶδον ἐν ὁράματι
  english_pob_choice: And I saw in the vision
  chosen_spanish: Y vi en la visión
  alternatives_spanish:
  - Y vi en el visionario
  - Y vi en una visión
  lexicon: ἑώρακα / ὁράμα
  rationale: Mantengo el pretérito simple para la experiencia visionaria y conservo ἐν ὁράματι como «en la visión», siguiendo de cerca el valor preposicional del griego sin añadir más de lo que el texto da.
- source_word: μέσος
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en el centro de
  - en medio de la
  lexicon: μέσος
  rationale: «En medio de» es la correspondencia natural en español para la ubicación central indicada por μέσος y preserva la relación espacial sin exceso de literalidad.
- source_word: πάσης τῆς συναγωγῆς
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - la reunión
  lexicon: συναγωγή
  rationale: «Congregación» conserva el sentido colectivo del grupo reunido y coincide con la elección inglesa de POB, evitando cargar el término con una lectura estrictamente institucional o sinagogal que el contexto no exige.
- source_word: ἐν ὑψηλοῖς
  english_pob_choice: in the heights
  chosen_spanish: en las alturas
  alternatives_spanish:
  - en lo alto
  - en lugares altos
  lexicon: ὑψηλός
  rationale: La frase añade una ubicación elevada real. «En las alturas» reproduce bien el plural sustantivado del griego y mantiene la solemnidad de la escena visionaria.
theological_decisions:
- issue: Presencia situada «en medio» y simultáneamente «en las alturas»
  english_pob_reading: he stood in the midst of the congregation, in the heights
  chosen_spanish_reading: él estaba en medio de la congregación, en las alturas
  alternative_spanish_readings:
  - él estaba entre la congregación, en lo alto
  - él estaba en medio de la congregación, en lo alto
  rationale: 'Conservo ambas coordenadas espaciales porque el texto griego las ofrece juntas: una presencia central entre el pueblo y, a la vez, elevada. No armonizo ni explico la tensión, pues la visión parece querer mantenerla.'
  doctrine_reference: Imágenes visionarias y teofánicas en literatura del Segundo Templo
translation_notes:
  revision_awareness: La revisión inglesa añadió «in the heights» para reflejar ἐν ὑψηλοῖς, que estaba omitido en el borrador. La versión española incorpora explícitamente esa adición con «en las alturas» y conserva «en medio de la congregación» como el equivalente natural de μέσος/μεσῶν τῆς συναγωγῆς.
  spanish_consistency_notes:
  - Uso «congregación» para συναγωγή de forma consistente con la POB inglesa cuando el contexto no requiere «sinagoga».
  - Conservo el tono sobrio y visionario del original sin introducir interpretaciones adicionales.
  - 'Mantengo la coordinación espacial de la frase griega: centralidad («en medio») y elevación («en las alturas»).'
