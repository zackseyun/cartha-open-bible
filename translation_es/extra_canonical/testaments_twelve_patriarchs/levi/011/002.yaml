source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ συλλαβοῦσα ἔτεκεν υἱόν⁴, καὶ ἐκάλεσα⁵ τὸ ὄνομα αὐτοῦ⁶ Γηρσάμ⁷, ὅτι *ἐν γῇ παροικίας ἦμεν⁸.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/011/002.yaml
  text: And she conceived and bore a son, and I called his name Gersam, because we were in a land of sojourning.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:45Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y ella concibió y dio a luz un hijo, y le puse por nombre Gersam, porque en tierra de peregrinación estábamos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συλλαβοῦσα
  english_pob_choice: conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó embarazada
  - concibió
  lexicon: BDAG s.v. συλλαμβάνω
  rationale: El aoristo participial expresa el inicio de la gestación; «concibió» conserva la concisión y el registro bíblico sin añadir una explicación ajena al texto.
- source_word: ἔτεκεν υἱόν
  english_pob_choice: bore a son
  chosen_spanish: dio a luz un hijo
  alternatives_spanish:
  - parió un hijo
  - dio a luz un hijo
  lexicon: BDAG s.v. τίκτω
  rationale: La idea central es el alumbramiento de un hijo varón; «dio a luz» es natural en español y suficientemente formal para un texto bíblico.
- source_word: ἐκάλεσα τὸ ὄνομα αὐτοῦ Γηρσάμ
  english_pob_choice: I called his name Gersam
  chosen_spanish: le puse por nombre Gersam
  alternatives_spanish:
  - lo llamé Gersam
  - le puse por nombre Gersam
  lexicon: BDAG s.v. καλέω
  rationale: En español, la fórmula nominal «poner por nombre» comunica bien el acto de nombrar y evita la rigidez de un calco innecesario.
- source_word: Γηρσάμ
  english_pob_choice: Gersam
  chosen_spanish: Gersam
  alternatives_spanish:
  - Guersam
  - Gersam
  lexicon: Nombre propio tradicional atestiguado en transliteraciones bíblicas
  rationale: Se conserva la forma ya usada en la tradición textual del auditorio en español y en la POB inglesa, sin forzar una transliteración más técnica.
- source_word: ἐν γῇ παροικίας
  english_pob_choice: in a land of sojourning
  chosen_spanish: en tierra de peregrinación
  alternatives_spanish:
  - en tierra de forastería
  - en tierra de peregrinación
  - en tierra donde habitábamos como extranjeros
  lexicon: BDAG s.v. παροικία
  rationale: «Peregrinación» preserva el matiz de residencia temporal/extranjera y resulta idiomático en español bíblico; «forastería» sería más literal pero menos natural.
theological_decisions:
- issue: Matiz de «sojourning» como condición temporal de extranjería
  english_pob_reading: land of sojourning
  chosen_spanish_reading: tierra de peregrinación
  alternative_spanish_readings:
  - tierra de forastería
  - tierra de residencia temporal
  rationale: El texto no enseña peregrinación en sentido devocional, sino estadía no permanente. «Peregrinación» mantiene la idea de vivir como extranjero sin sobrerreligiosizarla.
  doctrine_reference: Génesis 47:9; Hebreos 11:13
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requieren cambios; este borrador sigue el texto griego fijado y el sentido ya estabilizado en la traducción inglesa POB, sin introducir nuevas variantes.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Gersam» como en la traducción inglesa auditada.
  - Se evita «SEÑOR» o cualquier terminología de sustitución, porque no aparece el tetragrámaton en este versículo.
  - La frase final conserva el carácter temporal de la estancia sin convertirla en una paráfrasis doctrinal.
