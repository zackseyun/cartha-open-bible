translation:
  language: es
  text: Cuando tomé esposa, yo tenía veintiocho años, y su nombre era Melca.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔλαβον γυναῖκα
  english_pob_choice: When I took a wife
  chosen_spanish: Cuando tomé esposa
  alternatives_spanish:
  - Cuando me casé
  - Cuando tomé una esposa
  lexicon: λαμβάνω + γυναῖκα
  rationale: Tomé esposa conserva de modo breve y natural la idea de contraer matrimonio sin introducir un giro más explicativo que el griego no exige. ‘Me casé’ sería idiomático, pero suaviza la forma verbal de tomar/recibir esposa; ‘tomé una esposa’ suena menos natural en español.
- source_word: ἐγὼ εἴκοσι καὶ ὀκτὼ ἐτῶν ὑπῆρχον
  english_pob_choice: I was twenty-eight years old
  chosen_spanish: yo tenía veintiocho años
  alternatives_spanish:
  - yo era de veintiocho años
  - yo estaba en veintiocho años
  lexicon: ὑπάρχω + ἐτῶν
  rationale: ‘Tenía veintiocho años’ expresa con claridad la edad en español moderno y reproduce el sentido de estado/edad del griego. Se evita una construcción más literal pero poco natural como ‘era de veintiocho años’.
- source_word: Μελχά
  english_pob_choice: Melcha
  chosen_spanish: Melca
  alternatives_spanish:
  - Melcha
  - Melkha
  lexicon: nombre propio griego/semítico
  rationale: Se adapta la transliteración al español con ‘c’ suave para una lectura más natural, manteniendo el mismo nombre propio sin alterar su identidad. ‘Melcha’ conserva la grafía más cercana al inglés, pero en español puede sugerir una pronunciación menos clara.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; por ello la versión española mantiene una equivalencia óptima, directa y sin expansión interpretativa innecesaria.
  spanish_consistency_notes:
  - Se conserva el punto de vista en primera persona singular, acorde con el testimonio del texto fuente.
  - No se introduce lenguaje eclesiástico adicional ni títulos no presentes en el original.
  - El nombre propio se uniforma de forma consistente con una ortografía española legible.
