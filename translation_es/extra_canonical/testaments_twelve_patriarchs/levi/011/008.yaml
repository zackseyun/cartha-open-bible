translation:
  language: es
  text: Y Jocabed nació en Egipto, en el año sesenta y cuatro de mi vida, porque entonces yo era ilustre entre mis hermanos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἰωχαβέδ
  english_pob_choice: Jochebed
  chosen_spanish: Jocabed
  alternatives_spanish:
  - Jochebed
  lexicon: nombre propio
  rationale: En español bíblico, «Jocabed» es la forma asentada y más inteligible para este nombre hebreo; conserva la identidad del personaje sin depender de la grafía inglesa.
- source_word: ἐγεννήθη
  english_pob_choice: was born
  chosen_spanish: nació
  alternatives_spanish:
  - fue nacida
  - le nació
  lexicon: γίνομαι / γεννάω
  rationale: El aoristo pasivo se vierte de manera natural como «nació» en español. Es fiel al hecho de nacimiento y evita una construcción forzada.
- source_word: ἐν Αἰγύπτῳ
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  lexicon: Αἴγυπτος
  rationale: La forma breve «en Egipto» reproduce bien el locativo griego y es clara en español. No hace falta expandirla más.
- source_word: τῷ ἑξηκοστῷ τετάρτῳ μου ἔτει
  english_pob_choice: in the sixty-fourth year of my life
  chosen_spanish: en el año sesenta y cuatro de mi vida
  alternatives_spanish:
  - en mi sexagésimo cuarto año
  - cuando yo tenía sesenta y cuatro años
  lexicon: χρονολογический/expresión temporal
  rationale: La construcción conserva el sentido de edad vital del original. «De mi vida» refleja mejor el genitivo posesivo y mantiene el tono autobiográfico del texto.
- source_word: ἔνδοξος
  english_pob_choice: illustrious
  chosen_spanish: ilustre
  alternatives_spanish:
  - glorioso
  - famoso
  lexicon: ἔνδοξος
  rationale: «Ilustre» comunica la idea de honor y distinción pública sin sobrecargarla con resonancias exclusivamente religiosas que «glorioso» podría sugerir en español.
- source_word: ἐν μέσῳ τῶν ἀδελφῶν μου
  english_pob_choice: among my brothers
  chosen_spanish: entre mis hermanos
  alternatives_spanish:
  - en medio de mis hermanos
  lexicon: ἐν μέσῳ + genitivo
  rationale: «Entre mis hermanos» fluye mejor en español y conserva la noción relacional de estar en medio del grupo. Es equivalente al griego sin dureza literal.
theological_decisions:
- issue: Autobiographical honor/status claim
  english_pob_reading: for at that time I was illustrious among my brothers
  chosen_spanish_reading: porque entonces yo era ilustre entre mis hermanos
  alternative_spanish_readings:
  - pues entonces yo era famoso entre mis hermanos
  - porque entonces era honrado entre mis hermanos
  rationale: No se introduce una interpretación moral o espiritual ajena al texto; se mantiene la afirmación de prestigio o distinción social del narrador en su contexto familiar.
