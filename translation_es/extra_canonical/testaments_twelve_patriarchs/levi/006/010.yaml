id: T12P.LEV.6.10
reference: Testament of Levi 6:10
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: '*Καίγε οὕτως⁵⁵ ἐποίουν *πᾶσι τοῖς ξένοις⁵⁶, *ἐν δυναστείᾳ ἁρπάζοντες⁵⁷ *τὰς ξένας⁵⁸ καὶ †ἐξενηλάτουν⁵⁹ αὐτάς⁶⁰.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/006/010.yaml
  text: And indeed in this way they used to act toward all strangers, seizing the foreign women by force and driving them away.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:36Z'
    unchanged: false
    changes_summary: Replaced 'their women' with 'the foreign women' to reflect τὰς ξένας more accurately and avoid implying possession by the strangers; retained the rest with minor consistency in lexical rendering.
translation:
  language: es
  text: Y aun así actuaban con todos los extranjeros, arrebatando por la fuerza a las mujeres extranjeras[a] y expulsándolas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «las mujeres forasteras»; se prefiere «extranjeras» por la correspondencia más directa con ξένας y para conservar el paralelismo con «los extranjeros».
    reason: lexical_alternative
lexical_decisions:
- source_word: Καίγε οὕτως ἐποίουν
  english_pob_choice: And indeed in this way they used to act
  chosen_spanish: Y aun así actuaban
  alternatives_spanish:
  - Y ciertamente así hacían
  - Y de ese modo procedían
  lexicon: καίγε; οὕτως; ποιέω
  rationale: Reproduce el matiz enfático de καίγε con ‘aun así’/‘y aun así’, y el imperfectivo de ἐποίουν con ‘actuaban’, que suena natural en español para una acción habitual o repetida.
- source_word: πᾶσι τοῖς ξένοις
  english_pob_choice: toward all strangers
  chosen_spanish: con todos los extranjeros
  alternatives_spanish:
  - para con todos los extranjeros
  - hacia todos los extranjeros
  lexicon: πᾶς; ξένος
  rationale: ‘Con’ expresa mejor en español la conducta dirigida a personas que ‘toward’ sin sonar forzado. ‘Extranjeros’ conserva el sentido amplio de ξένοι, en línea con la POB inglesa.
- source_word: ἐν δυναστείᾳ ἁρπάζοντες
  english_pob_choice: seizing ... by force
  chosen_spanish: arrebatando por la fuerza
  alternatives_spanish:
  - apoderándose por la fuerza
  - robando por la fuerza
  lexicon: δυναστεία; ἁρπάζω
  rationale: La construcción indica violencia/abuso de poder; ‘arrebatando por la fuerza’ conserva el componente de ἁρπάζοντες sin añadir una precisión legal no explícita. ‘Por la fuerza’ traslada ἐν δυναστείᾳ de forma clara y fiel.
- source_word: τὰς ξένας
  english_pob_choice: the foreign women
  chosen_spanish: las mujeres extranjeras
  alternatives_spanish:
  - las extranjeras
  - las mujeres forasteras
  lexicon: ξένος
  rationale: La revisión inglesa corrigió una lectura posesiva a una descriptiva; el español debe reflejar que son mujeres ‘extranjeras’, no ‘de ellos’. ‘Mujeres extranjeras’ mantiene la referencia explícita y evita ambigüedad.
- source_word: καὶ ἐξενηλάτουν αὐτάς
  english_pob_choice: and driving them away
  chosen_spanish: y expulsándolas
  alternatives_spanish:
  - y ahuyentándolas
  - y echándolas fuera
  lexicon: ἐξενηλατέω
  rationale: ‘Expulsándolas’ comunica el acto de removerlas/desalojarlas con un registro digno y claro. ‘Ahuyentándolas’ sería más interpretativo y ‘echándolas fuera’ más coloquial.
theological_decisions:
- issue: Violencia y abuso de poder contra extranjeras
  english_pob_reading: seizing the foreign women by force and driving them away
  chosen_spanish_reading: arrebatando por la fuerza a las mujeres extranjeras y expulsándolas
  alternative_spanish_readings:
  - apoderándose por la fuerza de las mujeres extranjeras y echándolas fuera
  - tomando por la fuerza a las mujeres extranjeras y apartándolas
  rationale: El texto describe una acción violenta y abusiva; conviene mantener esa dureza sin suavizarla. ‘Arrebatando por la fuerza’ preserva tanto la coerción como el carácter concreto del acto.
  doctrine_reference: Ética bíblica sobre violencia, opresión y trato al extranjero
- issue: Referencia social a 'los extranjeros' frente a 'las mujeres extranjeras'
  english_pob_reading: toward all strangers, seizing the foreign women
  chosen_spanish_reading: con todos los extranjeros, arrebatando por la fuerza a las mujeres extranjeras
  alternative_spanish_readings:
  - contra todos los extranjeros, arrebatando por la fuerza a sus mujeres
  - con todos los forasteros, tomando por la fuerza a las mujeres extranjeras
  rationale: La revisión inglesa evita sugerir posesión por parte de los extranjeros. El español sigue esa decisión y conserva la distinción entre el trato general a ‘todos los extranjeros’ y el subcaso de ‘las mujeres extranjeras’.
  doctrine_reference: Precisión referencial y justicia del texto base
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que corrigió ‘their women’ a ‘the foreign women’ para reflejar τὰς ξένας sin sugerir posesión. El español mantiene esa corrección y conserva el tono continuo del imperfecto, la fuerza de ἐν δυναστείᾳ y el sentido de expulsión de ἐξενηλάτουν.
  spanish_consistency_notes:
  - Se usa «extranjeros/extranjeras» de forma consistente para ξένοι/ξέναι.
  - Se preserva la violencia explícita del pasaje sin suavizarla.
  - No se introduce terminología doctrinal ajena al texto; el registro es narrativo-descriptivo.
