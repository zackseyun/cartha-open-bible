source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: '*Ἀλλ᾿ ἐγὼ εἶδον ὅτι ἀπόφασις θεοῦ ἦν εἰς κακὰ³⁸ διότι ἤθελον ἐποίησεν *καὶ τὴν Σαρρὰ³⁹ ⌈καὶ τὴν Ῥεβέκκα⌉⁴⁰ ποιῆσαι ⌈ὃν τρόπον ἐποίησαν *τὴν Δείναν⁴¹ *τὴν ἀδελφὴν ἡμῶν⁴²⌉, καὶ ὁ⁴³ Κύριος ἐκώλυσεν αὐτούς.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/006/008.yaml
  text: But I saw that it was a decree of God for evil against them, because they intended to do to Sarah and Rebekah as they had done to Dinah our sister; and the Lord restrained them.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:35Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Pero yo vi que era un decreto de Dios para mal contra ellos, porque habían intentado hacer a Sara y a Rebeca lo que habían hecho a Dina, nuestra hermana; y el Señor los contuvo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπόφασις θεοῦ
  english_pob_choice: a decree of God
  chosen_spanish: un decreto de Dios
  alternatives_spanish:
  - una decisión de Dios
  - un fallo de Dios
  lexicon: ἀπόφασις
  rationale: El griego expresa una determinación o sentencia divinamente establecida. «Decreto» conserva el valor jurídico y decisorio sin forzar una paráfrasis.
- source_word: εἰς κακὰ
  english_pob_choice: for evil
  chosen_spanish: para mal
  alternatives_spanish:
  - hacia el mal
  - para cosas malas
  lexicon: κακός
  rationale: La frase indica finalidad o resultado adverso. «Para mal» es natural en español y mantiene la ambigüedad entre propósito y efecto.
- source_word: ἐκώλυσεν
  english_pob_choice: restrained
  chosen_spanish: los contuvo
  alternatives_spanish:
  - los refrenó
  - los detuvo
  lexicon: κωλύω
  rationale: «Contuvo» comunica la idea de impedir o frenar una acción prevista, con buen español y sin añadir una imagen más fuerte de arresto o castigo.
theological_decisions:
- issue: La acción divina descrita como decreto orientado al mal.
  english_pob_reading: it was a decree of God for evil against them
  chosen_spanish_reading: era un decreto de Dios para mal contra ellos
  alternative_spanish_readings:
  - era una sentencia de Dios para su mal
  - era un decreto de Dios que resultaba en mal para ellos
  rationale: 'Se conserva la tensión del original: no suaviza la afirmación de que el decreto divino se relaciona con un desenlace adverso para los agresores, sin convertirlo en una explicación moralizante.'
  doctrine_reference: Providencia divina y juicio retributivo en narrativas bíblicas
- issue: Identidad del sujeto divino final.
  english_pob_reading: the Lord restrained them
  chosen_spanish_reading: el Señor los contuvo
  alternative_spanish_readings:
  - Yahvé los contuvo
  - el Señor los refrenó
  rationale: El testimonio griego usa Κύριος; aquí se conserva «el Señor» como traducción directa del título en esta cláusula, manteniendo el contraste con «Dios» en la frase anterior y sin imponer una decisión de nombre propio que el segmento griego no explicita.
  doctrine_reference: Uso reverencial de Κύριος en textos griegos
translation_notes:
  revision_awareness: La fuente griega y la traducción inglesa auditada fueron revisadas; el texto inglés no presenta notas ni revisiones aplicadas, y se mantiene sin cambios en la última pasada. La versión española sigue de cerca esa lectura estable sin introducir variantes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «el Señor» para Κύριος, respetando la distinción presente en el griego.
  - Se usa «Sara» y «Rebeca» como formas españolas estándar de los nombres propios.
  - «Nuestra hermana» conserva el vínculo familiar explícito de τὴν ἀδελφὴν ἡμῶν.
