id: T12P.LEV.6.7
reference: Testament of Levi 6:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: '*Διότι ἡμάρτομεν ἐπειδὴ³⁵ παρὰ γνώμην αὐτοῦ τοῦτο πεποιήκαμεν³⁶, καίγε ἐμαλακίσθη³⁷ ἐν τῇ ἡμέρᾳ ἐκείνῃ.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/006/007.yaml
  text: For we sinned, because we had done this contrary to his will, although he became weak on that day.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:36Z'
    unchanged: false
    changes_summary: Changed 'judgment' to 'will' for more natural and likely more accurate rendering of γνώμη here; retained the rest with minor smoothing.
translation:
  language: es
  text: Porque pecamos, ya que habíamos hecho esto contrario a su voluntad, aunque aquel día se debilitó.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡμάρτομεν
  english_pob_choice: For we sinned
  chosen_spanish: Porque pecamos
  alternatives_spanish:
  - pues pecamos
  - porque habíamos pecado
  lexicon: ἁμαρτάνω
  rationale: Mantiene el sentido moral y culpable de la forma aorista en contexto de confesión. «Porque» reproduce la conexión causal con lo anterior sin forzar una subordinación más pesada.
- source_word: παρὰ γνώμην αὐτοῦ
  english_pob_choice: contrary to his will
  chosen_spanish: contrario a su voluntad
  alternatives_spanish:
  - contra su voluntad
  - en contra de su voluntad
  - contra su juicio
  lexicon: γνώμη
  rationale: La revisión inglesa favorece «will», y en español «voluntad» expresa de manera natural la idea de actuar contra lo que él quería o determinaba. «Juicio» sería posible, pero aquí sonaría menos directo y no seguiría la revisión adjudicada.
- source_word: ἐπειδὴ ... πεποιήκαμεν
  english_pob_choice: because we had done this
  chosen_spanish: ya que habíamos hecho esto
  alternatives_spanish:
  - porque habíamos hecho esto
  - puesto que habíamos hecho esto
  lexicon: ποιέω
  rationale: Conserva el valor causal temporal de la cláusula y el aspecto de acción previa. «Habíamos hecho» refleja bien el pluscuamperfecto del inglés auditado y la relación temporal del griego.
- source_word: ἐμαλακίσθη
  english_pob_choice: he became weak
  chosen_spanish: se debilitó
  alternatives_spanish:
  - se volvió débil
  - se aflojó
  lexicon: μαλακίζω
  rationale: «Se debilitó» es la forma más clara y natural en español para una condición de aflojamiento o debilidad física. Evita una traducción demasiado literal que sonaría extraña.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - en aquel día
  - ese día
  lexicon: ἡμέρα
  rationale: «Aquel día» fluye mejor en español y conserva la referencia deíctica al día ya mencionado.
theological_decisions:
- issue: Relación entre pecado y debilitamiento
  english_pob_reading: For we sinned ... although he became weak on that day.
  chosen_spanish_reading: Porque pecamos ... aunque aquel día se debilitó.
  alternative_spanish_readings:
  - pues pecamos ... aunque se debilitó aquel día
  - porque pecamos ... y aquel día se debilitó
  rationale: El griego coordina la confesión de pecado con una observación adicional sobre la debilidad de la persona referida. «Aunque» conserva el matiz concesivo del inglés auditado sin convertirlo en una causa directa o una simple adición neutra.
  doctrine_reference: Confesión moral y causalidad narrativa sin dogmatizar más allá del texto.
translation_notes:
  revision_awareness: La base inglesa revisó «judgment» a «will» para γνώμη; por eso el español adopta «voluntad» y no «juicio». Se mantuvo el resto del sentido del inglés auditado con ajuste natural de sintaxis española.
  spanish_consistency_notes:
  - Se conserva un registro bíblico sobrio y moderno.
  - No se introduce terminología eclesiástica innecesaria.
  - La relación causal y concesiva del griego se refleja sin sobreexplicar.
