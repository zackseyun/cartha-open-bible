  text: Καὶ ἤκουσεν²⁶ ὁ πατήρ *μου ⌈ταῦτα⌉²⁷ *καὶ ὀργισθεὶς²⁸ ἐλυπήθη²⁹ ὅτι κατεδέξαντο³⁰ τὴν περιτομὴν καὶ³¹ ἀπέθανον³², *καὶ ἐν ταῖς εὐλογίαις³³ †παρεῖδεν ἡμῖν³⁴.
