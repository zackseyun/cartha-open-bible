base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/006/006.yaml
  text: And my father heard these things, and being angry, he was grieved because they had accepted circumcision and died, and in his blessings he passed over us.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:35Z'
    unchanged: false
    changes_summary: Added a comma after 'being angry' for natural English punctuation; otherwise the draft is accurate and complete.
translation:
  language: es
  text: Y mi padre oyó estas cosas, y, enojado, se entristeció porque habían aceptado la circuncisión y murieron; y en sus bendiciones nos pasó por alto.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Pasó por alto» conserva la ambigüedad del giro griego: puede sugerir omisión o que no se les dio lugar en la bendición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἤκουσεν ὁ πατήρ μου ταῦτα
  english_pob_choice: And my father heard these things
  chosen_spanish: Y mi padre oyó estas cosas
  alternatives_spanish:
  - Y mi padre escuchó estas cosas
  - Y mi padre oyó aquello
  lexicon: ἀκούω
  rationale: «Oír» conserva el valor básico de percepción auditiva y mantiene la sencillez narrativa del griego; «escuchó» sería posible, pero sugiere una atención más deliberada que no está exigida por el texto.
- source_word: ὀργισθεὶς ἐλυπήθη
  english_pob_choice: being angry, he was grieved
  chosen_spanish: enojado, se entristeció
  alternatives_spanish:
  - airado, se entristeció
  - enojado, le dolió
  lexicon: ὀργίζομαι / λυπέω
  rationale: «Enojado» comunica la reacción de ira sin sobrerreligiosidad; «se entristeció» refleja el pasivo emocional de λυπέω. La coordinación mantiene ambas reacciones sin fusionarlas en una sola idea.
- source_word: κατεδέξαντο τὴν περιτομήν
  english_pob_choice: they had accepted circumcision
  chosen_spanish: habían aceptado la circuncisión
  alternatives_spanish:
  - habían recibido la circuncisión
  - se habían sometido a la circuncisión
  lexicon: περιτομή
  rationale: «Aceptar la circuncisión» sigue de cerca la elección inglesa y evita cargar el acto con un matiz técnico no explícito en esta frase. «Recibir» o «someterse a» serían posibles, pero alteran ligeramente el perfil semántico.
- source_word: ἀπέθανον
  english_pob_choice: died
  chosen_spanish: murieron
  alternatives_spanish:
  - fallecieron
  - habían muerto
  lexicon: ἀποθνῄσκω
  rationale: «Murieron» es la equivalencia directa y natural en español. No se añade especificación causal porque el texto solo yuxtapone el hecho de la muerte.
- source_word: ἐν ταῖς εὐλογίαις †παρεῖδεν ἡμῖν
  english_pob_choice: and in his blessings he passed over us
  chosen_spanish: y en sus bendiciones nos pasó por alto
  alternatives_spanish:
  - y en sus bendiciones nos omitió
  - y en sus bendiciones nos dejó de lado
  lexicon: παροράω
  rationale: La expresión española «pasó por alto» conserva la tensión del gesto de exclusión/omisión que ya estaba en el inglés POB. «Omitió» suena más administrativo; «dejó de lado» es más interpretativo y menos fiel al giro verbal.
theological_decisions:
- issue: La frase final puede implicar favoritismo paterno en la bendición, no necesariamente un juicio doctrinal sobre elección divina.
  english_pob_reading: and in his blessings he passed over us
  chosen_spanish_reading: y en sus bendiciones nos pasó por alto
  alternative_spanish_readings:
  - y en sus bendiciones nos omitió
  - y al bendecir, nos dejó fuera
  rationale: 'Se conserva la ambigüedad del original: el problema es narrativo y relacional, no se amplía hacia una doctrina específica. «Pasó por alto» deja abierta la fuerza de exclusión sin exagerarla.'
  doctrine_reference: Narrative characterization; no explicit doctrinal claim beyond the text.
translation_notes:
  revision_awareness: 'La versión inglesa revisada solo añadió una coma tras «being angry»; la sintaxis española ya integra naturalmente esa pausa con comas, sin cambiar el sentido. Se mantuvo la secuencia completa del testimonio: oído, ira, tristeza, aceptación de la circuncisión, muerte y omisión en la bendición.'
  spanish_consistency_notes:
  - Se mantuvo «circuncisión» como término técnico estable para περιτομή.
  - Se evitó «SEÑOR» o sustituciones teológicas porque el texto no contiene el nombre divino.
  - Se preservó el paralelismo narrativo de acciones con una sola cláusula principal y coordinaciones sucesivas.
  - El verbo final se dejó en forma idiomática pero cercana al original para no borrar la posible nota de exclusión en la bendición.
