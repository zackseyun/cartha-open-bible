    changes_summary: Replaced 'completely' with 'fully' to better reflect εἰς τέλος in a more natural formal register while preserving the sense of complete arrival.
translation:
  language: es
  text: Pero la ira de Dios vino sobre ellos plenamente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἔφθασε ... εἰς τέλος
  english_pob_choice: came upon them fully
  chosen_spanish: vino sobre ellos plenamente
  alternatives_spanish:
  - llegó a ellos en plenitud
  - vino sobre ellos completamente
  lexicon: φθάνω + εἰς τέλος
  rationale: El griego expresa la llegada efectiva y plena de la ira, con matiz de culminación. «Vino sobre ellos plenamente» conserva la imagen de irrupción y el valor de εἰς τέλος sin sonar rígido en español.
- source_word: ἡ ὀργὴ τοῦ θεοῦ
  english_pob_choice: the wrath of God
  chosen_spanish: la ira de Dios
  alternatives_spanish:
  - el furor de Dios
  - la cólera de Dios
  lexicon: ὀργή
  rationale: «Ira» es la equivalencia más natural y fiel en español bíblico para ὀργή. «Furor» o «cólera» son posibles, pero cambian el registro o la carga semántica sin necesidad.
theological_decisions:
- issue: La expresión divina de juicio en forma de ira
  english_pob_reading: the wrath of God came upon them fully
  chosen_spanish_reading: la ira de Dios vino sobre ellos plenamente
  alternative_spanish_readings:
  - el juicio de Dios vino sobre ellos plenamente
  - la cólera de Dios vino sobre ellos plenamente
  rationale: Se mantiene la formulación explícita de «ira de Dios» porque el texto fuente la afirma directamente. Sustituirla por «juicio» suavizaría una tensión teológica que el original no atenúa.
  doctrine_reference: Juicio divino; retribución de Dios
- issue: El alcance de εἰς τέλος
  english_pob_reading: fully
  chosen_spanish_reading: plenamente
  alternative_spanish_readings:
  - completamente
  - del todo
  rationale: La revisión inglesa favoreció «fully» sobre «completely» para reflejar mejor εἰς τέλος con un tono más formal. «Plenamente» preserva ese matiz de totalidad consumada y suena natural en español.
  doctrine_reference: Consumación plena del juicio
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «completely» a «fully» para expresar mejor εἰς τέλος con un registro formal y natural. La redacción española sigue esa decisión con «plenamente», evitando una equivalencia más mecánica.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός conforme al estándar del proyecto.
  - No se introduce «SEÑOR» ni otras sustituciones tradicionales, porque el versículo habla explícitamente de «Dios».
  - «Ira» conserva el valor de ὀργή sin suavizar el juicio divino.
