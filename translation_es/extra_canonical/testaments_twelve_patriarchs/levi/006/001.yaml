base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/006/001.yaml
  text: And as I was going to my father, I found a bronze shield; therefore the name of the mountain is Aspis, which is near Gebal, to the right of Abim.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:34Z'
    unchanged: false
    changes_summary: Changed 'on the right of Abim' to 'to the right of Abim' for more natural formal English; otherwise retained the draft.
translation:
  language: es
  text: Y cuando iba hacia mi padre, hallé un escudo de bronce; por eso el nombre del monte es Aspis, que está cerca de Gebal, a la derecha de Abim.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀσπίδα χαλκῆν
  english_pob_choice: a bronze shield
  chosen_spanish: un escudo de bronce
  alternatives_spanish:
  - un escudo broncíneo
  - un escudo de cobre
  lexicon: ἀσπίς; χαλκός
  rationale: ‘Escudo de bronce’ reproduce el objeto y el material con naturalidad en español, manteniendo la fuerza lexical del griego sin suavizarlo. ‘Broncíneo’ suena más literario, y ‘cobre’ no es tan preciso como ‘bronce’.
- source_word: Ἄσπις
  english_pob_choice: Aspis
  chosen_spanish: Aspis
  alternatives_spanish:
  - Aspis (como nombre del monte)
  lexicon: Ἄσπις
  rationale: Se conserva el nombre propio transliterado, como en el contexto inglés, porque el texto lo presenta como topónimo derivado del hallazgo del escudo.
- source_word: ἐγγὺς Γεβάλ
  english_pob_choice: near Gebal
  chosen_spanish: cerca de Gebal
  alternatives_spanish:
  - próximo a Gebal
  - junto a Gebal
  lexicon: ἐγγύς
  rationale: ‘Cerca de’ expresa la relación espacial de manera directa y sobria, sin añadir matices no presentes en el griego.
- source_word: ἐκ δεξιῶν Ἀβιμά
  english_pob_choice: to the right of Abim
  chosen_spanish: a la derecha de Abim
  alternatives_spanish:
  - al lado derecho de Abim
  - hacia la derecha de Abim
  lexicon: ἐκ δεξιῶν
  rationale: La expresión española más natural y fiel para la referencia espacial es ‘a la derecha de’. Mantiene el sentido locativo del griego y del audit trail inglés revisado.
theological_decisions:
- issue: Topónimo derivado de un objeto encontrado
  english_pob_reading: therefore the name of the mountain is Aspis
  chosen_spanish_reading: por eso el nombre del monte es Aspis
  alternative_spanish_readings:
  - por lo cual el nombre del monte es Aspis
  - por tanto, el nombre del monte es Aspis
  rationale: No hay una carga doctrinal explícita aquí, pero se conserva la causalidad narrativa del original (‘por eso’) y la identificación del monte por el hallazgo, sin expandirla interpretativamente.
  doctrine_reference: n/a
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail en la ubicación espacial: el inglés final dice ‘to the right of Abim’, y la traducción española usa ‘a la derecha de Abim’ para reflejar esa formulación sin calco incómodo.'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y publicable, con sintaxis directa.
  - Se conservaron los nombres propios Gebal, Abim y Aspis sin adaptación adicional, siguiendo el texto fuente y el inglés auditado.
  - No se introdujeron notas al pie porque el pasaje no presenta una alternativa textual o lexical necesaria para esta sección.
