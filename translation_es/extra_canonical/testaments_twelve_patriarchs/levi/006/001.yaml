  text: Καὶ¹ ὡς ἠρχόμην πρὸς τὸν πατέρα μου εὗρον ἀσπίδα χαλκῆν *διὸ καὶ τὸ ὄνομα τοῦ ὄρους Ἄσπις² *ὅ ἐστιν³ ἐγγὺς Γεβάλ, ἐκ δεξιῶν Ἀβιμά⁴.
