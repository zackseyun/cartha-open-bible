  text: Καὶ μετὰ ταῦτα ἐλθόντες²² οἱ ἀδελφοί μου²³ ἐπάταξαν τὴν πόλιν ⌈ἐκείνην⌉²⁴ ἐν στόματι μαχαίρας²⁵.
