base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/006/005.yaml
  text: And after this my brothers came and struck that city with the edge of the sword.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:35Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y después de esto, vinieron mis hermanos y atacaron aquella ciudad con el filo de la espada.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ μετὰ ταῦτα
  english_pob_choice: And after this
  chosen_spanish: Y después de esto
  alternatives_spanish:
  - Y luego de esto
  - Y tras esto
  lexicon: καί; μετά + acusativo
  rationale: Conserva la secuencia narrativa simple del griego y la fluidez natural del español sin añadir matiz interpretativo.
- source_word: ἐλθόντες οἱ ἀδελφοί μου
  english_pob_choice: my brothers came
  chosen_spanish: vinieron mis hermanos
  alternatives_spanish:
  - mis hermanos llegaron
  - mis hermanos fueron y vinieron
  lexicon: ἔρχομαι; ἀδελφοί μου
  rationale: «Vinieron» refleja el movimiento hacia el hablante o el marco narrativo con naturalidad en español; mantiene el sentido básico de llegada sin sobreexplicar.
- source_word: ἐπάταξαν
  english_pob_choice: struck
  chosen_spanish: atacaron
  alternatives_spanish:
  - hirieron
  - golpearon
  - asaltaron
  lexicon: πατάσσω
  rationale: En este contexto bélico, «atacaron» comunica mejor el golpe militar contra la ciudad que un simple «golpearon»; evita una literalidad ambigua en español.
- source_word: τὴν πόλιν ἐκείνην
  english_pob_choice: that city
  chosen_spanish: aquella ciudad
  alternatives_spanish:
  - esa ciudad
  - la ciudad aquella
  lexicon: πόλις; ἐκεῖνος
  rationale: «Aquella» conserva la distancia deíctica del griego y suena natural en español bíblico contemporáneo.
- source_word: ἐν στόματι μαχαίρας
  english_pob_choice: with the edge of the sword
  chosen_spanish: con el filo de la espada
  alternatives_spanish:
  - a filo de espada
  - con la punta de la espada
  lexicon: στόμα; μάχαιρα
  rationale: La expresión griega literalmente habla del «boca» de la espada; en español, «filo de la espada» preserva la imagen tradicional y el sentido exacto de arma cortante sin forzar un calco.
theological_decisions:
- issue: Violence formula / idiom of sword-edge
  english_pob_reading: with the edge of the sword
  chosen_spanish_reading: con el filo de la espada
  alternative_spanish_readings:
  - a filo de espada
  - con la boca de la espada
  rationale: No hay carga doctrinal especial; la decisión es estilística y semántica. Se evita «boca» porque en español sería poco natural y podría ocultar el modismo bélico.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el español sigue de cerca el sentido del texto griego y coincide en contenido con la traducción inglesa auditada, sin añadir notas porque no hay variantes o tensiones registradas en el paquete proporcionado.
  spanish_consistency_notes:
  - Se mantiene «hermanos» para οἱ ἀδελφοί μου siguiendo la relación fraterna explícita.
  - Se usa el pasado narrativo simple en toda la cláusula para reflejar la progresión temporal del original.
  - No se introducen términos eclesiásticos ajenos al contexto militar del pasaje.
