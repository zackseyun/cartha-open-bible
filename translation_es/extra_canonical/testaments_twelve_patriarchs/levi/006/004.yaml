translation:
  language: es
  text: Y yo maté primero a Siquem, y Simeón mató a Emor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνεῖλον
  english_pob_choice: I killed
  chosen_spanish: maté
  alternatives_spanish:
  - asesiné
  - di muerte a
  lexicon: LSJ ἀναιρέω
  rationale: El aoristo aquí expresa una acción puntual de matar; «maté» reproduce de manera natural y directa el valor verbal sin añadir matiz interpretativo. «Asesiné» cargaría el acto con una valoración moral no explicitada por el griego.
- source_word: τὸν Συχὲμ
  english_pob_choice: Shechem
  chosen_spanish: Siquem
  alternatives_spanish:
  - Siquén
  - Siquén
  lexicon: nombre propio bíblico tradicional
  rationale: «Siquem» es la forma hispana estable y reconocible del topónimo/persona bíblica, y conserva la referencia propia del nombre hebreo-griego mejor que una transliteración más cruda.
- source_word: Συμεὼν
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simón
  lexicon: nombre propio bíblico tradicional
  rationale: «Simeón» mantiene la forma bíblica habitual y evita confusión con «Simón», que en español puede evocar otro nombre distinto.
- source_word: Ἐμμώρ
  english_pob_choice: Emmor
  chosen_spanish: Emor
  alternatives_spanish:
  - Emmor
  - Hemor
  lexicon: nombre propio bíblico tradicional
  rationale: La forma «Emor» adapta el nombre griego al uso bíblico en español de modo legible, conservando la identidad del personaje sin añadir una grafía innecesariamente pesada.
theological_decisions:
- issue: Tono moral de la declaración de matar
  english_pob_reading: And I killed Shechem first, and Simeon killed Emmor.
  chosen_spanish_reading: Y yo maté primero a Siquem, y Simeón mató a Emor.
  alternative_spanish_readings:
  - Y yo asesiné primero a Siquem, y Simeón asesinó a Emor.
  - Y yo di muerte primero a Siquem, y Simeón dio muerte a Emor.
  rationale: El texto simplemente afirma el hecho de matar; no introduce aquí una evaluación moral explícita. Por eso se evita «asesiné», que impondría una carga interpretativa mayor que la del original.
  doctrine_reference: Fidelidad semántica al enunciado narrativo; no se infiere juicio moral adicional sin apoyo del texto.
translation_notes:
  revision_awareness: El pasaje fue revisado en el flujo más reciente sin cambios; por eso la redacción española sigue de cerca el sentido ya asentado en el audit trail inglés y no introduce notas adicionales.
  spanish_consistency_notes:
  - Se mantiene el nombre divino/terminología teológica fuera de este versículo porque no aparece en el texto base.
  - Se conserva el orden paratáctico simple del griego y del inglés POB para no sobreinterpretar la relación entre las dos cláusulas.
  - La elección de nombres propios sigue el uso bíblico español estándar para maximizar claridad y continuidad intertextual.
