source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ⁴⁴ ἐδίωξαν Ἀβραὰμ τὸν πατέρα ἡμῶν ξένον ὄντα⁴⁵ καὶ κατεπόνησαν⁴⁶ τὰ ποίμνια⁴⁷ ὀγκούμενα⁴⁸ ὄντα⁴⁹, καὶ Ἐβλαὴν⁵⁰ τὸν οἰκογενῆ⁵¹ αὐτοῦ⁵² σφόδρα⁵³ ἠκίσαντο⁵⁴.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/006/009.yaml
  text: And they pursued Abraham our father while he was a stranger, and they oppressed his flocks while they were increasing, and they cruelly mistreated Eblan, his home-born servant.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:07Z'
    unchanged: false
    changes_summary: Changed 'when he was' to 'while he was' for smoother formal English; replaced 'swollen with increase' with 'increasing' to more naturally reflect the Greek without awkwardness; added a comma before the appositive 'his home-born servant.'
translation:
  language: es
  text: Y persiguieron a Abraham, nuestro padre, mientras era forastero, y oprimieron sus rebaños mientras iban aumentando, y maltrataron cruelmente a Eblan, su esclavo de la casa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ξένον ὄντα
  english_pob_choice: while he was a stranger
  chosen_spanish: mientras era forastero
  alternatives_spanish:
  - mientras era extranjero
  - cuando era forastero
  lexicon: ξένος
  rationale: «Forastero» conserva la idea de alguien que no pertenece al lugar o al grupo, y en español puede abarcar la condición social de extraño/extranjero sin introducir una carga étnica más fuerte de la necesaria. La construcción con «mientras» sigue el valor temporal del inglés revisado y del griego participial.
- source_word: κατεπόνησαν
  english_pob_choice: they oppressed
  chosen_spanish: oprimieron
  alternatives_spanish:
  - afligieron
  - explotaron
  lexicon: καταπονέω
  rationale: «Oprimieron» reproduce bien la idea de trato duro y opresivo sobre los rebaños. «Afligieron» sería más débil y «explotaron» añade una noción económica que no está explicitada en el texto.
- source_word: τὰ ποίμνια ὀγκούμενα ὄντα
  english_pob_choice: his flocks while they were increasing
  chosen_spanish: sus rebaños mientras iban aumentando
  alternatives_spanish:
  - sus rebaños mientras crecían
  - sus rebaños en aumento
  lexicon: ποίμνιον / ὀγκούμενα
  rationale: La revisión inglesa evitó una imagen demasiado literal como «swollen with increase» y optó por «increasing». En español, «iban aumentando» mantiene el proceso continuo y naturalidad idiomática, sin perder la idea de crecimiento progresivo.
- source_word: οἰκογενῆ
  english_pob_choice: home-born servant
  chosen_spanish: esclavo de la casa
  alternatives_spanish:
  - siervo nacido en casa
  - nacido en la casa
  lexicon: οἰκογενής
  rationale: «Esclavo de la casa» conserva la fuerza social del término y evita suavizarlo a «siervo» sin base contextual. «De la casa» mantiene la relación doméstica/familiar del vocablo; la formulación completa resulta clara en español y fiel al contraste con un esclavo adquirido.
- source_word: σφόδρα ἠκίσαντο
  english_pob_choice: they cruelly mistreated
  chosen_spanish: maltrataron cruelmente
  alternatives_spanish:
  - trataron con gran crueldad
  - atormentaron cruelmente
  lexicon: σφόδρα + ἀκίζομαι
  rationale: «Maltrataron cruelmente» expresa la intensidad de σφόδρα y el sentido de trato abusivo de ἠκίσαντο sin forzar una especificación más fuerte que el griego no exige.
theological_decisions:
- issue: La condición de Abraham como forastero frente a la hostilidad ajena
  english_pob_reading: while he was a stranger
  chosen_spanish_reading: mientras era forastero
  alternative_spanish_readings:
  - mientras era extranjero
  - mientras estaba como forastero
  rationale: El pasaje subraya la vulnerabilidad del patriarca en tierra ajena. «Forastero» comunica esa situación sin introducir una categoría doctrinal nueva; se mantiene el foco narrativo y social del texto.
  doctrine_reference: Hospitalidad / extranjería patriarcal en la narrativa bíblica
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó «when he was» por «while he was» para reflejar mejor el griego y cambió «swollen with increase» por «increasing» para sonar más natural; la traducción española sigue esa revisión con «mientras era forastero» y «mientras iban aumentando». También se respetó la coma del aposítivo en «Eblan, su esclavo de la casa», manteniendo la relación explicativa sin crear ambigüedad.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el tetragrámaton ni κύριος en este versículo.
  - Se mantiene «esclavo» para οἰκογενής según la fuerza del término y la línea terminológica POB.
  - «Maltrataron cruelmente» conserva el matiz intensivo sin volverlo interpretativo.
