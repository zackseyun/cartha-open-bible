id: T12P.LEV.6.3
reference: Testament of Levi 6:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: '*Μετὰ δὲ τοῦτο συνεβούλευσα⁵ *τῷ πατρί μου καὶ⁶ τῷ⁷ Ῥουβὴμ⁸ ἵνα εἴπῃ⁹ *τοῖς υἱοῖς¹⁰ Ἐμμώρ¹¹ τοῦ¹² μὴ¹³ *περιτμηθῆναι αὐτούς¹⁴, ὅτι¹⁵ ἐζήλωσα *διὰ τὸ βδέλυγμα¹⁶, *ὃ ἐποίησαν¹⁷ *ἐπὶ τῇ ἀδελφῇ μου¹⁸.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/006/003.yaml
  text: After this I took counsel with my father and with Reuben, that he should tell the sons of Emmor not to circumcise themselves, because I was zealous because of the abomination which they had committed against my sister.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:35Z'
    unchanged: false
    changes_summary: Changed 'on account of' to 'because of' for a more natural rendering of διὰ τὸ, while preserving the formal sense. No other changes needed.
translation:
  language: es
  text: Después de esto, aconsejé con mi padre y con Rubén, para que él dijera a los hijos de Emmor que no se circuncidaran, porque tuve celo por la abominación que habían cometido contra mi hermana.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μετὰ δὲ τοῦτο
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Más tarde
  - Luego de esto
  lexicon: μετά + acusativo temporal
  rationale: Mantiene la secuencia temporal simple y directa del griego, sin añadir matices narrativos que no están en el texto.
- source_word: συνεβούλευσα
  english_pob_choice: I took counsel
  chosen_spanish: aconsejé
  alternatives_spanish:
  - consulté
  - tomé consejo
  lexicon: συμβουλεύω
  rationale: En español, 'aconsejé' expresa mejor la acción de deliberar y dar consejo en una forma natural y fiel; 'tomé consejo' suena más arcaico.
- source_word: τῷ πατρί μου καὶ τῷ Ῥουβὴμ
  english_pob_choice: with my father and with Reuben
  chosen_spanish: con mi padre y con Rubén
  alternatives_spanish:
  - con mi padre y con Reubén
  - junto con mi padre y con Rubén
  lexicon: πατήρ / Ῥουβήμ
  rationale: Conserva los nombres propios en forma castellana usual y la preposición 'con' como en el contexto de consulta conjunta.
- source_word: ἵνα εἴπῃ
  english_pob_choice: that he should tell
  chosen_spanish: para que él dijera
  alternatives_spanish:
  - para que dijese
  - a fin de que él dijera
  lexicon: ἵνα + subjuntivo
  rationale: '''Para que'' expresa bien la finalidad; el imperfecto de subjuntivo mantiene el valor dependiente y narrativo.'
- source_word: τοῖς υἱοῖς Ἐμμώρ
  english_pob_choice: the sons of Emmor
  chosen_spanish: a los hijos de Emmor
  alternatives_spanish:
  - a los hijos de Hemor
  - a los hijos de Emmor
  lexicon: υἱοί / Ἐμμώρ
  rationale: Sigue la forma propia del testimonio inglés y la transliteración tradicional del nombre en este pasaje.
- source_word: τοῦ μὴ περιτμηθῆναι αὐτούς
  english_pob_choice: not to circumcise themselves
  chosen_spanish: que no se circuncidaran
  alternatives_spanish:
  - que no se circuncidaran ellos mismos
  - que no fueran circuncidados
  lexicon: περιτέμνω
  rationale: El pasivo medio en español se expresa naturalmente con reflexivo; evita ambigüedad y conserva la prohibición de la acción.
- source_word: ἐζήλωσα
  english_pob_choice: I was zealous
  chosen_spanish: tuve celo
  alternatives_spanish:
  - fui celoso
  - estuve celoso
  lexicon: ζηλόω
  rationale: '''Tuve celo'' preserva el valor positivo/intenso de la raíz sin introducir la connotación moderna negativa de ''celoso''.'
- source_word: διὰ τὸ βδέλυγμα
  english_pob_choice: because of the abomination
  chosen_spanish: por la abominación
  alternatives_spanish:
  - a causa de la abominación
  - debido a la abominación
  lexicon: διὰ + acusativo / βδέλυγμα
  rationale: '''Por'' comunica la causalidad de manera natural en español; ''abominación'' reproduce la fuerza repulsiva del término griego.'
- source_word: ὃ ἐποίησαν
  english_pob_choice: which they had committed
  chosen_spanish: que habían cometido
  alternatives_spanish:
  - que hicieron
  - que perpetraron
  lexicon: ποιέω
  rationale: '''Cometido'' es adecuado en contexto moral y evita una literalidad débil de ''hecho''.'
- source_word: ἐπὶ τῇ ἀδελφῇ μου
  english_pob_choice: against my sister
  chosen_spanish: contra mi hermana
  alternatives_spanish:
  - sobre mi hermana
  - respecto de mi hermana
  lexicon: ἐπί + dativo
  rationale: La relación hostil se expresa correctamente con 'contra', que refleja el sentido adversativo del contexto.
theological_decisions:
- issue: Sentido de 'celo' frente a 'celoso'
  english_pob_reading: I was zealous
  chosen_spanish_reading: tuve celo
  alternative_spanish_readings:
  - estuve celoso
  - fui celoso
  rationale: El pasaje habla de una reacción de fervor moral contra una ofensa, no de envidia o posesividad; 'tuve celo' conserva ese valor ético y evita una lectura psicológica moderna no deseada.
  doctrine_reference: Zelo santo / indignación moral en contexto narrativo
- issue: Referencia a la circuncisión como no acción del sujeto
  english_pob_reading: not to circumcise themselves
  chosen_spanish_reading: que no se circuncidaran
  alternative_spanish_readings:
  - que no se circuncidaran ellos mismos
  - que no se sometieran a la circuncisión
  rationale: El reflexivo español mantiene la idea de autocircuncisión sin introducir perífrasis interpretativa excesiva.
  doctrine_reference: Circuncisión como marcador de alianza en narrativa patriarcal
- issue: Violencia moral implícita en 'abominación'
  english_pob_reading: the abomination which they had committed against my sister
  chosen_spanish_reading: la abominación que habían cometido contra mi hermana
  alternative_spanish_readings:
  - el ultraje que habían cometido contra mi hermana
  - la vileza que habían cometido contra mi hermana
  rationale: '''Abominación'' conserva el juicio fuerte del texto fuente y evita suavizar la valoración ética del acto.'
  doctrine_reference: Lenguaje moral de repulsión/impureza
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado solo en una microdecisión estilística ('on account of' -> 'because of') sin cambio de sentido. La versión española sigue esa misma causalidad directa con 'porque' / 'por', sin añadir matices explicativos no presentes en el griego.
  spanish_consistency_notes:
  - Se conserva 'Emmor' para mantener consistencia con el contexto inglés auditado y la transliteración usada en el paquete fuente.
  - Se usa 'tuve celo' como fórmula consistente para ζηλόω cuando el contexto es de fervor moral, no de celos humanos.
  - No se incorpora 'SEÑOR' ni otros sustitutos reverenciales, pues el versículo no contiene el tetragrámaton ni κύριος en función divina.
