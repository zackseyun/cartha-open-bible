  text: Y guardé estas palabras en mi corazón.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνετήρουν
  english_pob_choice: kept
  chosen_spanish: guardé
  alternatives_spanish:
  - conservé
  - retuve
  - mantuve
  lexicon: sustaining/keeping in memory
  rationale: 'El imperfecto griego expresa una acción continuada: “seguía guardando / conservando”. En español, “guardé” comunica de forma natural la apropiación interior de las palabras, sin perder la idea de retenerlas en la memoria y el afecto. “Conservé” o “retuve” también serían posibles, pero suenan más marcadas o menos idiomáticas aquí.'
- source_word: τοὺς λόγους τούτους
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas dichas
  - estos dichos
  - estas palabras dichas
  lexicon: λόγοι
  rationale: λόγοι aquí se refiere a palabras, dichos o mensajes recibidos. “Palabras” es la opción más clara y fiel en español; mantiene la cercanía con el texto inglés POB sin forzar una perífrasis innecesaria.
- source_word: ἐν τῇ καρδίᾳ μου
  english_pob_choice: in my heart
  chosen_spanish: en mi corazón
  alternatives_spanish:
  - dentro de mi corazón
  - en lo profundo de mi corazón
  lexicon: heart as inner person
  rationale: '“Corazón” conserva el sentido bíblico del centro interior de la persona: memoria, voluntad y afecto. No hace falta ampliar la frase porque el español ya entiende bien esta imagen.'
theological_decisions:
- issue: Interiorización de la palabra recibida
  english_pob_reading: And I kept these words in my heart.
  chosen_spanish_reading: Y guardé estas palabras en mi corazón.
  alternative_spanish_readings:
  - Y conservé estas palabras en mi corazón.
  - Y retuve estas palabras en mi corazón.
  rationale: 'No hay una carga doctrinal disputada, pero sí una imagen espiritual importante: no solo oír, sino guardar interiormente. La traducción mantiene esa tensión devocional sin añadir interpretaciones.'
  doctrine_reference: Sabiduría / meditación interior de la palabra recibida
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios. Se mantiene la lectura directa del griego con correspondencia natural al español, sin añadir notas porque el verso no presenta variantes textuales ni tensiones léxicas mayores en el contexto dado.
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y bíblico del registro.
  - No se introduce terminología eclesiástica adicional.
  - El uso de “corazón” preserva el sentido antropológico bíblico sin paráfrasis.
