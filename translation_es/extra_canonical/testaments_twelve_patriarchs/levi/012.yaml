translation:
  language: es
  text: 1. Y Gersam tomó mujer, y ella le dio a luz a Lomne y a Semee. 2. Y los hijos de Kaath fueron Ambram, Isachar, Chebron y Ozeel. 3. Y los hijos de Merari fueron Mooli y Mouses. 4. Y en el año noventa y cuatro de mi vida, Abraham tomó a Jocabed mi hija como mujer para sí, porque él y mi hija nacieron en un mismo día. 5. Tenía ocho años cuando entré en la tierra de Canaán, y dieciocho años cuando maté a Siquem, y diecinueve años cuando serví como sacerdote[a], y veintiocho años cuando tomé mujer, y cuarenta y ocho años cuando entré en Egipto. 6. Y he aquí, mis hijos, ustedes son la tercera generación. 7. José murió en el año ciento dieciocho de mi vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Serví como sacerdote'' traduce el verbo griego para el desempeño del servicio sacerdotal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβεν ... γυναῖκα
  english_pob_choice: took a wife
  chosen_spanish: tomó mujer
  alternatives_spanish:
  - tomó esposa
  - se casó
  lexicon: LSJ
  rationale: La fórmula genealógica pide un registro elevado y breve. En español, 'tomó mujer' conserva el giro semítico-genealógico sin convertirlo en una paráfrasis moderna como 'se casó'.
- source_word: ἔτεκεν ... ἐξ αὐτῆς
  english_pob_choice: she bore to him
  chosen_spanish: ella le dio a luz a
  alternatives_spanish:
  - ella lo alumbró
  - ella le dio hijos
  lexicon: LSJ
  rationale: La secuencia griega enfatiza el acto de alumbrar y la relación de origen 'de ella'. 'Le dio a luz a' mantiene ese foco de maternidad y suena natural en español bíblico actual.
- source_word: υἱοί
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - varones
  - descendientes
  lexicon: LSJ
  rationale: Aunque el inglés usa 'sons', en esta estrofa la lista es genealógica y en español 'hijos' comunica la descendencia nominal sin forzar una marca masculina donde el contexto ya la aporta.
- source_word: θυγατέρα μου
  english_pob_choice: my daughter
  chosen_spanish: mi hija
  alternatives_spanish:
  - hija mía
  lexicon: LSJ
  rationale: Es el equivalente directo y más transparente para el parentesco explícito del texto griego.
- source_word: εἰς γυναῖκα
  english_pob_choice: as a wife
  chosen_spanish: como mujer para sí
  alternatives_spanish:
  - como esposa para sí
  - por esposa
  lexicon: LSJ
  rationale: Conserva el valor formal de la fórmula matrimonial y evita suavizar demasiado el griego. 'Mujer para sí' refleja el movimiento del texto sin imponer una normalización eclesiástica.
- source_word: ἐν μιᾷ ἡμέρᾳ ἐγεννήθησαν
  english_pob_choice: were born on one and the same day
  chosen_spanish: nacieron en un mismo día
  alternatives_spanish:
  - nacieron en un solo día
  - nacieron el mismo día
  lexicon: LSJ
  rationale: La expresión española transmite la coincidencia temporal con claridad y dignidad, sin sobrecargar el verso con redundancia.
- source_word: ἱεράτευσα
  english_pob_choice: served as priest
  chosen_spanish: serví como sacerdote
  alternatives_spanish:
  - ejercí el sacerdocio
  - presté servicio sacerdotal
  lexicon: LSJ
  rationale: La forma verbal pide una acción ministerial; 'serví como sacerdote' preserva el sentido funcional señalado por el audit trail inglés y es idiomática en español.
- source_word: ἰδού
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: LSJ
  rationale: La interjección profética/testamentaria se expresa mejor con la fórmula tradicional 'he aquí', que mantiene el tono solemne del discurso.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mis hijos e hijas
  - mis descendientes
  lexicon: LSJ
  rationale: El contexto patriarcal es claramente filial y genealógico; 'mis hijos' es directo y conserva el tono de exhortación familiar.
- source_word: τρίτη γενεά
  english_pob_choice: the third generation
  chosen_spanish: la tercera generación
  alternatives_spanish:
  - una tercera generación
  lexicon: LSJ
  rationale: La lectura definida es la más natural en español y reproduce la identificación genealógica del grupo destinatario.
- source_word: Ἰωσὴφ
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joseph
  lexicon: LSJ
  rationale: Se usa la forma bíblica española común y plenamente reconocible para el nombre propio.
- source_word: Γερσὰμ, Καὰθ, Ἀβραάμ, Ἰσαχάρ, Χεβρών, Ὀζηήλ, Μεραρεῖ, Μοολὶ, Μωυσής, Ἰωχαβέδ
  english_pob_choice: Gersam, Kaath, Ambram, Isachar, Chebron, Ozeel, Merari, Mooli, Mouses, Jochebed
  chosen_spanish: Gersam, Kaath, Ambram, Isachar, Chebron, Ozeel, Merari, Mooli, Mouses, Jocabed
  alternatives_spanish:
  - Gersón, Caath, Amram, Isacar, Hebrón, Oziel, Merari, Mahli, Mosis, Jocabed
  lexicon: LSJ
  rationale: Se preservan las formas griegas transmitidas en el testimonio fuente para no armonizar silenciosamente con spellings bíblicos más familiares. Donde el inglés ya documenta una forma transliterada, el español sigue esa misma estrategia auditable.
theological_decisions:
- issue: Divergencia genealógica de los nombres respecto de formas bíblicas más conocidas
  english_pob_reading: Retain transliterated forms close to the Greek witness.
  chosen_spanish_reading: 'Conservar las formas cercanas al testimonio griego: Gersam, Kaath, Ambram, Isachar, Chebron, Ozeel, Mooli, Mouses, Jocabed.'
  alternative_spanish_readings:
  - Normalizar a Gersón, Caath, Amram, Isacar, Hebrón, Oziel, Mahli, Mosis, Jocabed
  rationale: La prioridad es la transparencia respecto del texto griego transmitido. Normalizar los nombres ocultaría la evidencia textual y borraría la tensión documentada con las genealogías bíblicas más conocidas.
  doctrine_reference: 'PHILOSOPHY.md: primacía de la lengua original; DOCTRINE.md: transliterar nombres'
- issue: Afirmación cronológica sobre Jocabed como 'mi hija'
  english_pob_reading: Translate the Greek claim directly without harmonizing it to Exodus genealogies.
  chosen_spanish_reading: 'Traducir la afirmación literalmente: ''Ambram tomó a Jocabed mi hija...''.'
  alternative_spanish_readings:
  - Parafrasear para evitar la dificultad genealógica
  - Interpretar 'hija' en sentido amplio como descendiente
  rationale: La frase griega explícitamente llama a Jocabed 'mi hija'. La traducción debe exponer esa tensión en vez de resolverla por adelantado.
  doctrine_reference: 'PHILOSOPHY.md: traducir lo que dice la fuente y hacer visibles las tensiones'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que ajustó la cláusula de ἔτεκεν ... ἐξ αὐτῆς para hacerla más directa y natural. En español se optó por 'ella le dio a luz a' para reflejar ese mismo valor sin perder fluidez ni registro genealógico.
  spanish_consistency_notes:
  - Se conservan las formas transliteradas del testimonio griego para los nombres propios, evitando armonización con formas bíblicas más familiares salvo donde el español eclesial común exige una forma estable (José).
  - Se mantuvo un registro solemne y genealógico, con sintaxis breve y paralelística.
  - No se añadió puntuación interpretativa que suavizara la tensión textual en torno a Jocabed.
  - El marcador [a] aparece exactamente en el texto y corresponde a la nota sobre el matiz de ἱεράτευσα.
