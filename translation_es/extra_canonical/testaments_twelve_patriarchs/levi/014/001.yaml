source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Ἐγὼ¹ οὖν, τέκνα μου², ἔγνων³ ὅτι ἐπὶ τὰ τέλη τῶν αἰώνων ἀσεβήσετε⁴ *ἐπὶ Κυρίου, χεῖρας ἐπιβάλλοντες⁵ ἐν⁶ κακίᾳ [ἐπ᾿ αὐτὸν]⁷ καὶ ἐν⁸ πᾶσι τοῖς ἔθνεσιν γενήσεσθε⁹ χλευασμός.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/014/001.yaml
  text: Therefore I, my children, have known that at the end of the ages you will act ungodly against the Lord, laying hands in wickedness [upon him], and among all the nations you will become a mockery.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:07Z'
    unchanged: false
    changes_summary: Changed 'know' to 'have known' to reflect the Greek perfect ἔγνων more formally, and revised 'become an object of mockery' to the more direct 'become a mockery' for closer lexical correspondence to χλευασμός.
translation:
  language: es
  text: Por tanto yo, hijos míos, he sabido que al fin de los siglos obrarán impíamente contra el Señor, poniendo manos sobre él en maldad, y entre todas las naciones llegarán a ser una burla.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐγὼ οὖν, τέκνα μου
  english_pob_choice: Therefore I, my children
  chosen_spanish: Por tanto yo, hijos míos
  alternatives_spanish:
  - Así que yo, hijos míos
  - Por ello yo, hijos míos
  lexicon: Ἐγὼ / τέκνα μου
  rationale: Conserva la relación vocativa directa y el cierre inferencial de οὖν con una fórmula natural en español.
- source_word: ἔγνων
  english_pob_choice: have known
  chosen_spanish: he sabido
  alternatives_spanish:
  - he conocido
  - sé
  lexicon: ἔγνων
  rationale: El perfecto griego se refleja mejor con un perfecto español; 'he sabido' mantiene el matiz de conocimiento alcanzado y sostenido sin forzar una literalidad rígida.
- source_word: ἐπὶ τὰ τέλη τῶν αἰώνων
  english_pob_choice: at the end of the ages
  chosen_spanish: al fin de los siglos
  alternatives_spanish:
  - al final de los tiempos
  - en el fin de los siglos
  lexicon: τέλη / αἰώνων
  rationale: '''Siglos'' reproduce bien el valor de αἰώνων en este contexto escatológico y preserva la cadencia tradicional sin abandonar el español actual.'
- source_word: ἀσεβήσετε ἐπὶ Κυρίου
  english_pob_choice: you will act ungodly against the Lord
  chosen_spanish: obraréis impíamente contra el Señor
  alternatives_spanish:
  - seréis impíos contra el Señor
  - cometeréis impiedad contra el Señor
  lexicon: ἀσεβέω / Κύριος
  rationale: '''Obrar impíamente'' expresa el adverbio de conducta de manera natural; ''contra el Señor'' refleja ἐπὶ con valor adversativo/agresivo. Se mantiene ''Señor'' porque aquí el nombre divino aparece a través del griego κύριος en el testamento griego transmitido.'
- source_word: χεῖρας ἐπιβάλλοντες ἐν κακίᾳ [ἐπ᾿ αὐτόν]
  english_pob_choice: laying hands in wickedness [upon him]
  chosen_spanish: poniendo manos sobre él en maldad
  alternatives_spanish:
  - alzando las manos contra él en maldad
  - ejerciendo violencia sobre él con maldad
  lexicon: χεῖρας ἐπιβάλλοντες / κακίᾳ
  rationale: '''Poniendo manos sobre él'' conserva la imagen verbal de la construcción griega y el complemento explícito ''[upon him]'' del texto transmitido; ''en maldad'' mantiene el dativo de modo/instrumento sin ampliar indebidamente el sentido.'
- source_word: ἐν πᾶσι τοῖς ἔθνεσιν
  english_pob_choice: among all the nations
  chosen_spanish: entre todas las naciones
  alternatives_spanish:
  - en medio de todas las naciones
  - en todas las naciones
  lexicon: ἐν πᾶσι τοῖς ἔθνεσιν
  rationale: '''Entre'' recoge la distribución entre pueblos y evita una lectura meramente locativa; es idiomático y fiel.'
- source_word: γενήσεσθε χλευασμός
  english_pob_choice: you will become a mockery
  chosen_spanish: llegaréis a ser una burla
  alternatives_spanish:
  - seréis una burla
  - os convertiréis en una burla
  lexicon: γενήσεσθε / χλευασμός
  rationale: '''Llegaréis a ser'' preserva la idea de devenir del futuro medio y ''burla'' expresa χλευασμός de manera natural en español. ''Una burla'' corresponde a la lectura directa del sustantivo abstracto.'
theological_decisions:
- issue: Tratamiento del título Κυρίου en un texto griego extrabíblico con resonancia divina
  english_pob_reading: against the Lord
  chosen_spanish_reading: contra el Señor
  alternative_spanish_readings:
  - contra Yahvé
  - contra el Señor Dios
  rationale: Aunque el proyecto prefiere 'Yahvé' para יהוה, aquí el testimonio griego dice κύριος en una obra patrimonial sin equivalencia directa explícita al tetragrámaton en este versículo; mantener 'Señor' respeta el audit trail y evita una identificación no demostrada por el texto base.
  doctrine_reference: Nombre divino / traducción del título κύριος en textos no bíblicos helenísticos
- issue: Posible ambigüedad del gesto 'poner las manos sobre él'
  english_pob_reading: laying hands in wickedness [upon him]
  chosen_spanish_reading: poniendo manos sobre él en maldad
  alternative_spanish_readings:
  - alzando las manos contra él con maldad
  - poniendo las manos contra él en maldad
  rationale: La frase española mantiene la referencia concreta al acto sobre la víctima sin convertirlo en paráfrasis interpretativa. El añadido textual '[upon him]' del griego transmitido queda suficientemente representado por 'sobre él'.
  doctrine_reference: Violencia contra la figura del Señor / literalidad del gesto
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó 'know' a 'have known' por el perfecto ἔγνων y 'object of mockery' a 'mockery' por χλευασμός. La versión española refleja esos dos ajustes con 'he sabido' y 'una burla', sin introducir una amplificación explicativa.
  spanish_consistency_notes:
  - Se mantiene la preferencia del proyecto por 'Señor' cuando el testimonio fuente griego usa κύριος sin evidencia suficiente para sustituirlo por 'Yahvé'.
  - Se conserva el tono escatológico con 'fin de los siglos', evitando un giro más libre como 'tiempos finales'.
  - '''Burla'' se usa para χλευασμός de modo uniforme y directo, sin añadir ''objeto de'' ni otras expansiones no atestiguadas.'
