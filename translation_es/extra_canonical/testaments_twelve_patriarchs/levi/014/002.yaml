source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ γὰρ ὁ πατὴρ ἡμῶν Ἰσραὴλ καθαρός ἐστιν¹⁸ ἀπὸ τῆς¹⁹ ἀσεβείας²⁰ τῶν ἀρχιερέων [οἵτινες ἐπιβαλοῦσι²¹ τὰς χεῖρας αὐτῶν ἐπὶ τὸν σωτῆρα τοῦ κόσμου]²².
