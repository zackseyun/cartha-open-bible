base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/014/002.yaml
  text: For our father Israel is pure from the ungodliness of the chief priests [who will lay their hands on the Savior of the world].
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:07Z'
    unchanged: false
    changes_summary: Capitalized 'Savior' for formal register and restored the bracketed phrase to reflect the source text's textual marking.
translation:
  language: es
  text: Pues nuestro padre Israel es puro de la impiedad de los sumos sacerdotes[a] [que pondrán sus manos sobre el Salvador del mundo].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sumos sacerdotes» traduce el plural ἀρχιερέων con el cargo sacerdotal superior; no debe leerse como una referencia a un solo sacerdote.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθαρός ἐστιν
  english_pob_choice: is pure
  chosen_spanish: es puro
  alternatives_spanish:
  - es limpio
  - está puro
  lexicon: καθαρός
  rationale: «Puro» reproduce la afirmación moral/ritual del griego y encaja con el registro sobrio de la sección. «Limpio» puede sonar demasiado doméstico; «está puro» añade un matiz aspectual que el texto no exige.
- source_word: ἀσεβείας
  english_pob_choice: ungodliness
  chosen_spanish: impiedad
  alternatives_spanish:
  - maldad
  - irreligiosidad
  lexicon: ἀσέβεια
  rationale: «Impiedad» conserva el valor de falta de reverencia o piedad hacia Dios sin diluir la fuerza teológica del término. «Maldad» es más general; «irreligiosidad» suena demasiado moderno y sociológico.
- source_word: τῶν ἀρχιερέων
  english_pob_choice: of the chief priests
  chosen_spanish: de los sumos sacerdotes
  alternatives_spanish:
  - de los principales sacerdotes
  - de los jefes de los sacerdotes
  lexicon: ἀρχιερεύς
  rationale: «Sumos sacerdotes» es el equivalente español más asentado para el cargo sacerdotal superior y preserva el sentido oficial del plural griego. «Principales sacerdotes» es posible, pero menos natural en español bíblico.
- source_word: ἐπιβαλοῦσι τὰς χεῖρας αὐτῶν ἐπὶ
  english_pob_choice: will lay their hands on
  chosen_spanish: pondrán sus manos sobre
  alternatives_spanish:
  - echarán sus manos sobre
  - impondrán sus manos sobre
  lexicon: ἐπιβάλλω / χείρ
  rationale: «Pondrán sus manos sobre» refleja el gesto hostil del griego y del inglés POB sin introducir la connotación litúrgica de «impondrán sus manos», que aquí sería engañosa.
- source_word: σωτῆρα τοῦ κόσμου
  english_pob_choice: the Savior of the world
  chosen_spanish: el Salvador del mundo
  alternatives_spanish:
  - el Salvador del mundo
  - el que salva al mundo
  lexicon: σωτήρ
  rationale: Se mantiene «Salvador» porque el audit trail inglés capitaliza el título y la frase funciona como designación reverente. «El que salva al mundo» explicita el sentido pero pierde el carácter titular.
theological_decisions:
- issue: Identidad y pureza de Israel frente a la impiedad sacerdotal
  english_pob_reading: For our father Israel is pure from the ungodliness of the chief priests.
  chosen_spanish_reading: Pues nuestro padre Israel es puro de la impiedad de los sumos sacerdotes.
  alternative_spanish_readings:
  - Porque nuestro padre Israel es puro de la impiedad de los sumos sacerdotes.
  - Y nuestro padre Israel es puro de la impiedad de los sumos sacerdotes.
  rationale: «Pues» recoge la conexión explicativa de γάρ sin volver la frase demasiado pesada. «De la impiedad» mantiene la relación de separación o liberación expresada por ἀπό, sin convertirla en un juicio absoluto sobre todo Israel más allá de lo que el texto dice.
  doctrine_reference: Pureza/impiedad en lenguaje bíblico; separación entre fidelidad de Israel y corrupción sacerdotal.
- issue: Valor del pasaje entre corchetes en la edición base
  english_pob_reading: '[who will lay their hands on the Savior of the world]'
  chosen_spanish_reading: '[que pondrán sus manos sobre el Salvador del mundo]'
  alternative_spanish_readings:
  - '[que pondrán sus manos sobre el Salvador del mundo]'
  - '[que echarán sus manos sobre el Salvador del mundo]'
  rationale: Se conserva el material entre corchetes para reflejar la marcación textual de la fuente y la revisión inglesa, sin convertirlo en una afirmación sin reservas del cuerpo principal. La redacción sigue de cerca el griego y la auditoría POB.
  doctrine_reference: Marcación textual y cautela sobre una cláusula transmitida entre corchetes.
translation_notes:
  revision_awareness: La versión inglesa revisada restauró la cláusula entre corchetes y capitalizó «Savior»; la versión española conserva ambos rasgos mediante corchetes y «Salvador» con mayúscula inicial dentro de la cita, respetando la marcación textual del testimonio y el registro formal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se mantiene «Mesías/Cristo» fuera de este versículo; no aplica.
  - Se conserva el tono bíblico formal sin arcaísmos innecesarios.
  - La frase entre corchetes permanece como material textual delimitado, no integrado al enunciado principal.
