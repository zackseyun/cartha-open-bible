base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/014/003.yaml
  text: For just as the sun is pure before the Lord upon the earth, so also you are, the lights of Israel, beyond all the nations.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:57:07Z'
