translation:
  language: es
  text: Porque así como el sol es puro delante del Señor sobre la tierra, así también ustedes son, las lumbreras de Israel, por encima de todas las naciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ ἥλιος ... καθαρὸς
  english_pob_choice: the sun is pure
  chosen_spanish: el sol es puro
  alternatives_spanish:
  - el sol es limpio
  - el sol está puro
  lexicon: ἥλιος; καθαρός
  rationale: «Puro» conserva el juicio de pureza del adjetivo griego sin forzar una imagen ritual ajena; «limpio» suena más doméstico y menos solemne en español bíblico. Mantengo el presente gnómico como en el griego y la versión inglesa.
- source_word: ἐνώπιον κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante del Señor
  alternatives_spanish:
  - ante el Señor
  - en presencia del Señor
  lexicon: ἐνώπιον; κύριος
  rationale: «Delante de» comunica bien la relación espacial/metafórica de estar en la presencia de alguien. Aquí «Señor» sigue el valor del griego κύριος en un contexto reverente, y la forma evita sobrecargar el sintagma.
- source_word: ἐπὶ τὴν γῆν
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra en este mundo
  lexicon: ἐπί; γῆ
  rationale: «Sobre la tierra» reproduce la imagen de localización del original y coincide con el tono poético de la línea. «Tierra» es el equivalente más natural de γῆ aquí.
- source_word: φωστῆρες
  english_pob_choice: the lights
  chosen_spanish: las lumbreras
  alternatives_spanish:
  - las luces
  - los resplandores
  lexicon: φωστήρ
  rationale: «Lumbreras» conserva el matiz de cuerpos luminosos o astros, más fuerte y bíblicamente estable que un simple «luces». En español resuena además con lenguaje de creación y luminarias.
- source_word: τοῦ Ἰσραήλ
  english_pob_choice: of Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de Israel
  - para Israel
  lexicon: Ἰσραήλ
  rationale: Se mantiene la relación posesiva/genitiva sin añadir interpretación. «De Israel» es la forma más directa y fiel.
- source_word: παρὰ πάντα τὰ ἔθνη
  english_pob_choice: beyond all the nations
  chosen_spanish: por encima de todas las naciones
  alternatives_spanish:
  - más allá de todas las naciones
  - por sobre todas las naciones
  lexicon: παρά; ἔθνη
  rationale: La expresión griega admite una idea comparativa de superioridad o distinción. «Por encima de» preserva el sentido de exaltación/posición superior que la versión inglesa quiso comunicar, sin volverlo necesariamente espacial.
theological_decisions:
- issue: Título divino en κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Yahvé
  rationale: En este dicho sapiencial-poético, el griego usa κύριος sin una cita explícita de la forma del nombre divino; en español, «Señor» mantiene la equivalencia reverente y evita introducir una decisión más específica sin apoyo adicional inmediato en este verso.
  doctrine_reference: Uso reverente de κύριος en traducción bíblica; distinción entre nombre divino y título contextual.
- issue: Identidad y metáfora de Israel como lumbreras
  english_pob_reading: you are, the lights of Israel
  chosen_spanish_reading: ustedes son, las lumbreras de Israel
  alternative_spanish_readings:
  - ustedes son, las luces de Israel
  - ustedes son las lumbreras para Israel
  rationale: Se conserva la metáfora de los destinatarios como cuerpos luminosos, no solo como personas que iluminan. La coma reproduce la apposición del original y la tensión retórica del pasaje.
  doctrine_reference: Metáfora honorífica aplicada al pueblo/tribus de Israel en literatura testamentaria.
translation_notes:
  revision_awareness: La versión inglesa POB y su auditoría textual indican que no se requieren revisiones; la presente propuesta sigue esa lectura sin añadir notas textuales ni cambios interpretativos mayores. Se ha trabajado directamente desde el griego transmitido en el paquete fuente y se ha mantenido la equivalencia óptima del inglés como control secundario.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en este versículo, conforme al registro reverente del pasaje.
  - Se usa «lumbreras» para φωστῆρες para conservar el tono imagético y evitar banalizar la metáfora.
  - «Por encima de todas las naciones» reproduce la comparación jerárquica/posicional de παρὰ πάντα τὰ ἔθνη con naturalidad en español.
