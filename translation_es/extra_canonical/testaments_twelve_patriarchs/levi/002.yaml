  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/002.yaml
  text: 1[2:3]. I, Levi, was born in Haran, and I came with my father to Shechem. 2. And I was still young, about twenty years old, and then I carried out vengeance with Simeon for our sister Dinah against Hamor. 3[2:4]. And as I was shepherding in Abelmaul, a spirit of understanding from the Lord came upon me, and I saw all people destroying their way, and sin was being built upon a wall, and injustice sat upon towers. 4. And I was grieved over the race of the sons of men, and I prayed to the Lord that I might be saved. 5. Then sleep fell upon me, and I saw a high mountain, and I was on it. 6. And behold, the heavens were opened, and an angel of the Lord said to me, “Levi, Levi[2:6], enter.”
  footnotes:
  - marker: '2:3'
    text: The phrase 'corrupting their way' literally reflects people ruining or destroying their own way of life/conduct.
    reason: lexical_alternative
  - marker: '2:4'
    text: '''The race of the sons of men'' is a solemn Semitic-style expression for humankind.'
    reason: cultural_note
  - marker: '2:6'
    text: The opening of the heavens is standard apocalyptic vision language; compare other biblical and Jewish visionary scenes.
    reason: cross_reference
