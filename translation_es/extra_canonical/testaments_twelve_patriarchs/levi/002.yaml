translation:
  language: es
  text: '1. Yo, Leví, nací en Jarán y vine con mi padre a Siquem. 2. Era aún joven, de unos veinte años, y entonces tomé venganza junto con Simeón por nuestra hermana Dina contra Hamor. 3. Y mientras apacentaba en Abelmaúl, un espíritu de entendimiento del Señor[a] vino sobre mí, y vi a todos los hombres destruyendo su camino[b], y el pecado se edificaba sobre un muro, y la injusticia se asentaba sobre torres. 4. Y estaba afligido por el linaje de los hijos de los hombres[c], y oré al Señor para que fuera salvado. 5. Entonces el sueño cayó sobre mí, y vi un alto monte y estaba sobre él. 6. Y he aquí que se abrieron los cielos[d], y un ángel del Señor me dijo: «Leví, Leví, entra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El Señor» traduce Κύριος en el texto griego de esta fuente pseudoepigráfica. En textos judíos helénicos, Κύριος frecuentemente representa el Tetragrámaton subyacente (YHWH/Yahvé); sin embargo, dado que la transmisión de los Testamentos es grecófona y no existe certeza de un Vorlage hebreo con el Tetragrámaton en cada instancia, se mantiene «el Señor» para preservar la ambigüedad del griego tal como fue transmitido, en vez de imponer «Yahvé» sin base textual directa.
    reason: source_note
  - marker: b
    text: El participio ἀφανίσαντας (de ἀφανίζω) puede significar tanto «destruir/hacer desaparecer» como «arruinar/corromper». La versión revisada del POB inglés prefirió «destroying» por mayor cercanía lexical con el griego; «destruyendo su camino» sigue esta decisión. No obstante, «corrompiendo» o «arruinando su camino de vida» permanecen como alternativas igualmente válidas desde el original, pues el matiz moral de una conducta echada a perder está presente.
    reason: lexical_alternative
  - marker: c
    text: «El linaje de los hijos de los hombres» (γένους τῶν υἱῶν τῶν ἀνθρώπων) es una expresión de registro solemne con sabor semítico, equivalente en sentido a «la humanidad», pero con mayor amplitud antropológica y gravedad. Compárese con el uso de בְּנֵי אָדָם / υἱοὶ τῶν ἀνθρώπων en la literatura bíblica y judía.
    reason: cultural_note
  - marker: d
    text: La apertura de los cielos es lenguaje estándar de visión apocalíptica que señala el inicio de una teofanía o revelación angélica; compárense escenas similares en Ez 1:1; Is 63:19 (LXX); Mc 1:10; Ap 19:11 y otros textos visionarios judíos del Segundo Templo.
    reason: cross_reference
lexical_decisions:
- source_word: ἐκδίκησις / ἐποίησα τὴν ἐκδίκησιν
  english_pob_choice: I carried out vengeance
  chosen_spanish: tomé venganza
  alternatives_spanish:
  - ejercí venganza
  - llevé a cabo la venganza
  - ejecuté la venganza
  lexicon: BDAG
  rationale: «Tomé venganza» es activo, contundente e idiomático en español moderno; conserva la fuerza retributiva del acto sin suavizarlo. «Llevé a cabo la venganza» está más próximo al inglés del POB pero resulta más torpe. «Ejercí venganza» es posible pero menos natural en prosa narrativa. El testamento exige un registro grave y directo, que «tomé venganza» cumple.
- source_word: νεώτερος
  english_pob_choice: still young
  chosen_spanish: aún joven
  alternatives_spanish:
  - joven todavía
  - de poca edad
  lexicon: LSJ
  rationale: «Aún joven» es la expresión más natural para el autoubicamiento autobiográfico con la acotación inmediata de edad («unos veinte años»). Preserva el matiz de juventud relativa que el griego νεώτερος («más joven», «bastante joven») expresa.
- source_word: πνεῦμα συνέσεως
  english_pob_choice: a spirit of understanding
  chosen_spanish: un espíritu de entendimiento
  alternatives_spanish:
  - un espíritu de discernimiento
  - un espíritu de comprensión
  - el Espíritu de entendimiento
  lexicon: LSJ
  rationale: La frase griega es anártrona (sin artículo), lo que evita una lectura hipostática forzada. «Entendimiento» refleja σύνεσις (capacidad integrada de comprensión y discernimiento) conforme al análisis del POB inglés. Se mantiene minúscula para preservar la apertura teológica documentada; véase decisión teológica correspondiente.
- source_word: ἀφανίσαντας τὴν ὁδὸν αὐτῶν
  english_pob_choice: destroying their way
  chosen_spanish: destruyendo su camino
  alternatives_spanish:
  - corrompiendo su camino
  - arruinando su camino
  - borrando su camino
  lexicon: LSJ
  rationale: Se sigue la revisión final del POB inglés (2026-04-23), que corrigió «corrupting» por «destroying» para mayor cercanía con ἀφανίζω (hacer desaparecer, destruir). «Destruyendo su camino» refleja esta elección. La alternativa «corrompiendo/arruinando su camino de vida» permanece lexicalmente válida desde el griego y se documenta en la nota [b].
- source_word: ἁμαρτία ... ἐπὶ τείχους οἰκοδομεῖτο
  english_pob_choice: sin was being built upon a wall
  chosen_spanish: el pecado se edificaba sobre un muro
  alternatives_spanish:
  - el pecado era edificado sobre un muro
  - el pecado se construía sobre un muro
  lexicon: LSJ
  rationale: La voz pasiva refleja del original se preserva con la construcción reflexiva «se edificaba», más idiomática en español que la perífrasis «era edificado». La metáfora arquitectónica no se parafrasea.
- source_word: ἀδικία ἐκάθητο ἐπὶ πύργους
  english_pob_choice: injustice sat upon towers
  chosen_spanish: la injusticia se asentaba sobre torres
  alternatives_spanish:
  - la injusticia estaba sentada sobre torres
  - la iniquidad se asentaba sobre torres
  - la injusticia reinaba sobre torres
  lexicon: LSJ
  rationale: '«Se asentaba» preserva la personificación estática y la imagen visual del original (ἐκάθητο: estar sentado, reposar). «Estaba sentada» es también válida pero algo pesada en español. «Reinaba» introduce una interpretación no contenida en el griego y elimina la imagen de postura sentada.'
- source_word: γένους τῶν υἱῶν τῶν ἀνθρώπων
  english_pob_choice: the race of the sons of men
  chosen_spanish: el linaje de los hijos de los hombres
  alternatives_spanish:
  - la raza de los hijos de los hombres
  - la estirpe de los hijos de los hombres
  - la humanidad
  lexicon: LSJ
  rationale: «Linaje» conserva el registro solemne y el sabor semítico de la expresión sin las connotaciones étnico-raciales modernas que «raza» puede generar en español. «La humanidad» aplana el tono elevado del original. «Estirpe» es posible pero tiene uso más restringido en el español moderno eclesial.
- source_word: ὅπως σωθῶ
  english_pob_choice: that I might be saved
  chosen_spanish: para que fuera salvado
  alternatives_spanish:
  - para que fuera librado
  - para ser preservado
  - a fin de que me salvara
  lexicon: BDAG
  rationale: La voz pasiva de σῴζω se preserva con «fuera salvado», manteniendo que la salvación proviene de fuera de Leví (del Señor). «Para que fuera librado» estrecha el sentido hacia el rescate físico; «preservado» lo reduce excesivamente. «Para que fuera salvado» mantiene la amplitud teológica entre liberación existencial y salvación en sentido pleno.
- source_word: ἐπέπεσέ με ὕπνος
  english_pob_choice: sleep fell upon me
  chosen_spanish: el sueño cayó sobre mí
  alternatives_spanish:
  - me sobrevino el sueño
  - el sueño se apoderó de mí
  - me venció el sueño
  lexicon: LSJ
  rationale: 'Se preserva la vividez del idioma visionario: el sueño como agente que «cae» sobre la persona. «Me sobrevino» es idiomático pero pierde la imagen física de caída que el verbo ἐπιπίπτω expresa y que el POB inglés conservó.'
- source_word: ἀνεῴχθησαν οἱ οὐρανοί
  english_pob_choice: the heavens were opened
  chosen_spanish: se abrieron los cielos
  alternatives_spanish:
  - los cielos fueron abiertos
  - el cielo se abrió
  lexicon: LSJ
  rationale: El plural «los cielos» (οἱ οὐρανοί) del griego se preserva, en consonancia con la dición apocalíptica judía. La construcción reflexiva «se abrieron» es más idiomática en español que la perífrasis pasiva «fueron abiertos», y mantiene el mismo peso dramático.
theological_decisions:
- issue: 'Κύριος en un texto pseudoepigráfico judío: ¿«el Señor» o «Yahvé»?'
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Los predeterminados del proyecto establecen «Yahvé» para YHWH/יהוה, pero solicitan explicar la decisión cuando la fuente inmediata es Κύριος griego. En los Testamentos de los Doce Patriarcas el texto griego usa Κύριος de forma consistente. Aunque en la literatura judía helenística Κύριος frecuentemente representó el Tetragrámaton del substrato semítico, la transmisión de este texto es grecófona y no existe certeza de un Vorlage hebreo con el Tetragrámaton explícito en cada instancia. El POB inglés optó por «the Lord»; se mantiene «el Señor» en español para preservar la ambigüedad propia del griego transmitido y no imponer «Yahvé» donde el texto no lo certifica directamente. La tensión queda documentada en la nota [a].
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve it
- issue: 'Naturaleza de πνεῦμα συνέσεως: ¿entidad hipostática o don divino?'
  english_pob_reading: a divinely given spirit of understanding from the Lord, not explicitly identified as the Holy Spirit by title
  chosen_spanish_reading: un espíritu de entendimiento del Señor (sin capitalizar)
  alternative_spanish_readings:
  - un Espíritu de entendimiento del Señor
  - el Espíritu Santo de entendimiento
  rationale: La frase es anártrona en griego y carece de marcadores que exijan una identificación doctrinal ulterior con el Espíritu Santo. Mantener minúscula «espíritu» en español preserva la apertura teológica del texto y evita la sobre-especificación más allá de lo que la fuente permite. Se documenta la alternativa titular en la decisión léxica.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve it
- issue: Alcance de σωθῶ en la oración de Leví
  english_pob_reading: that I might be saved
  chosen_spanish_reading: para que fuera salvado
  alternative_spanish_readings:
  - para que fuera librado
  - para ser preservado
  rationale: El contexto es la corrupción moral generalizada de la humanidad y el lamento de Leví ante ella. «Salvado» mantiene la amplitud de σῴζω entre rescate físico, liberación moral y salvación en sentido teológico pleno, sin estrechar el sentido hacia uno solo de estos registros. La elección sigue el análisis del POB inglés.
  doctrine_reference: DOCTRINE.md § Original-language primacy over translation tradition
translation_notes:
  revision_awareness: 'La revisión del POB inglés (2026-04-23, revisora: gpt-5.4) modificó «corrupting their way» por «destroying their way» para mayor proximidad lexical con ἀφανίσαντας. El presente borrador español sigue la versión revisada —«destruyendo su camino»— pero documenta en la nota [b] y en la decisión lexical correspondiente la alternativa «corrompiendo/arruinando su camino», preservando así la tensión registrada en la pista de auditoría del POB y evitando que la revisión inglesa cierre una ambigüedad legítima del original griego.'
  spanish_consistency_notes:
  - Κύριος se traduce «el Señor» (no «Yahvé») en todo este pasaje porque la fuente inmediata es el griego κύριος en un texto pseudoepigráfico de transmisión grecófona; la justificación completa figura en la nota [a] y en la decisión teológica correspondiente.
  - πνεῦμα συνέσεως se traduce «un espíritu de entendimiento» (minúscula inicial en «espíritu») para preservar la apertura teológica de la frase anártrica; no se capitaliza «Espíritu» porque el texto griego no especifica la Tercera Persona trinitaria.
  - 'Los nombres propios siguen la forma española estándar consolidada en las Biblias en español: Leví (Λευί), Jarán (Χαρράν), Siquem (Σίκημα), Dina (Δείνα), Hamor (Ἐμμώρ); Abelmaúl (Ἀβελμαούλ) se transliterada del griego al no tener forma española fijada.'
  - El doble vocativo «Leví, Leví» (Λευί, ⌈Λευί⌉) del griego se preserva íntegro en español para mantener el énfasis del original, siguiendo el texto inglés del POB.
  - δικαιοσύνη no aparece en este pasaje, pero ἀδικία se traduce «injusticia» (antónimo de δικαιοσύνη = «justicia/rectitud»), preservando la fuerza legal y moral personificada del término.
  - El discurso directo final se introduce con guillemets angulares («…») conforme a la puntuación estándar del español.
