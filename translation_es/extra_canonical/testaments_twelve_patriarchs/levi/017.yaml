translation:
  language: es
  text: "Y puesto que habéis oído acerca de las setenta semanas[a], oíd también acerca del sacerdocio. Porque en cada jubileo habrá un sacerdocio. En el primer jubileo, el que primero sea ungido para el sacerdocio[b] será grande, y hablará a Dios como a un padre; y su sacerdocio será pleno con el Señor. [Y en los días de su gozo se levantará para la salvación del mundo.]\n\n\n    En el segundo jubileo, el ungido será apresado en duelo por un ser amado, y su sacerdocio será honrado, y será glorificado por todos.\n\n\n    Pero el tercer sacerdote será tomado en aflicción. Y el cuarto estará en dolores, porque la injusticia aumentará sobre él en abundancia, y todo Israel odiará, cada uno, a su prójimo. El quinto será tomado en tinieblas. Así también el sexto y el séptimo.\n\n\n    Pero en el séptimo habrá una contaminación[c], que no puedo decir delante de los hombres; porque quienes hacen estas cosas las conocerán. Por eso estarán en cautiverio y en despojo, y su tierra y sus posesiones serán\
    \ destruidas.\n\n\n    Y en la quinta semana volverán a la tierra de su desolación[d], y renovarán la casa de Yahvé."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Setenta semanas» evoca el lenguaje cronológico apocalíptico conocido por Daniel; el texto presupone que el auditorio ya ha oído esa explicación previa.
    reason: cross_reference
  - marker: b
    text: La forma griega destaca literalmente «el que primero sea ungido»; se evita convertirlo de antemano en un título fijo para no añadir un matiz que el contexto inmediato todavía no exige.
    reason: lexical_alternative
  - marker: c
    text: «Contaminación» puede abarcar aquí tanto impureza cultual como corrupción moral, especialmente en un pasaje sobre el deterioro del sacerdocio.
    reason: lexical_alternative
  - marker: d
    text: «La tierra de su desolación» puede implicar restauración o reconstrucción tras la devastación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑβδομήκοντα ἑβδομάδων
  english_pob_choice: seventy weeks
  chosen_spanish: setenta semanas
  alternatives_spanish:
  - setenta sietes
  - setenta periodos
  lexicon: LSJ
  rationale: Sigo la lectura apocalíptica tradicional del sintagma, pero en español 'semanas' es la equivalencia natural y transparente para ἑβδομάδες; mantiene la alusión cronológica sin introducir una paráfrasis.
- source_word: ἱερωσύνη
  english_pob_choice: priesthood
  chosen_spanish: sacerdocio
  alternatives_spanish:
  - oficio sacerdotal
  - ministerio sacerdotal
  lexicon: LSJ
  rationale: '''Sacerdocio'' es el término normal y exacto para la institución/oficio en este contexto. Conserva la secuencia profética de funciones sacerdotales sin suavizarla.'
- source_word: ἰωβηλαῖον
  english_pob_choice: jubilee
  chosen_spanish: jubileo
  alternatives_spanish:
  - período de jubileo
  - año jubilar
  lexicon: LSJ
  rationale: '''Jubileo'' reproduce directamente el término calendárico y su valor estructural en la cadena de épocas.'
- source_word: χριόμενος
  english_pob_choice: the one first anointed / the one anointed
  chosen_spanish: el que primero sea ungido / el que sea ungido
  alternatives_spanish:
  - el ungido
  - el que está siendo ungido
  lexicon: LSJ
  rationale: La forma participial pide una solución descriptiva. 'Ungido' puede sonar demasiado nominal y cargar matices mesiánicos; la construcción relativa mantiene el sentido de investidura sacerdotal.
- source_word: λαλήσει Θεῷ ὡς πατρί
  english_pob_choice: he will speak to God as to a father
  chosen_spanish: hablará a Dios como a un padre
  alternatives_spanish:
  - hablará con Dios como con un padre
  - le hablará a Dios como a su padre
  lexicon: LSJ
  rationale: Conserva la comparación filial fuerte y directa, sin diluirla en una intimidad genérica.
- source_word: πλήρης μετὰ κυρίου
  english_pob_choice: complete with the Lord
  chosen_spanish: será pleno con el Señor
  alternatives_spanish:
  - será completo con el Señor
  - estará lleno con el Señor
  lexicon: LSJ
  rationale: '''Pleno'' funciona mejor en español que ''completo'' para un estado culminado. Mantiene la dureza de la frase griega sin interpretarla como ''cumplido'' o ''colmado'' de manera más libre.'
- source_word: ἐπὶ σωτηρίᾳ κόσμου
  english_pob_choice: for the salvation of the world
  chosen_spanish: para la salvación del mundo
  alternatives_spanish:
  - en favor de la salvación del mundo
  - con miras a la salvación del mundo
  lexicon: LSJ
  rationale: La preposición se vierte de modo natural y directo. 'Mundo' conserva el alcance universal del texto, y 'salvación' refleja σωτηρία sin añadir doctrina posterior.
- source_word: συλληφθήσεται
  english_pob_choice: will be conceived
  chosen_spanish: será concebido
  alternatives_spanish:
  - será recibido
  - será tomado
  lexicon: LSJ
  rationale: En este contexto la forma futura pasiva encaja mejor con un inicio de vida/concepción dentro de la serie de nacimientos o surgimientos sacerdotales.
- source_word: ἐν πένθει ἀγαπητοῦ
  english_pob_choice: in the sorrow of a beloved one
  chosen_spanish: en el dolor de un amado
  alternatives_spanish:
  - en el duelo de un amado
  - en el dolor de un ser amado
  lexicon: LSJ
  rationale: Mantiene la ambigüedad del genitivo y el tono afectivo. 'Amado' conserva brevedad y pathos sin especificar indebidamente quién es el amado.
- source_word: τιμία
  english_pob_choice: honored
  chosen_spanish: honrado
  alternatives_spanish:
  - estimado
  - preciado
  lexicon: LSJ
  rationale: Para el sacerdocio, 'honrado' comunica estima pública y dignidad reconocida, como en el inglés auditado.
- source_word: παραληφθήσεται
  english_pob_choice: will be taken
  chosen_spanish: será tomado
  alternatives_spanish:
  - será recibido
  - será llevado
  lexicon: LSJ
  rationale: La fórmula es deliberadamente sobria para conservar la ambigüedad del griego, que puede implicar ser arrebatado o alcanzado por una condición de dolor/tinieblas.
- source_word: ὀδύναις
  english_pob_choice: pains
  chosen_spanish: dolores
  alternatives_spanish:
  - angustias
  - tormentos
  lexicon: LSJ
  rationale: '''Dolores'' es la opción más natural en español y conserva la intensidad sin estrechar el sentido a dolor físico solamente.'
- source_word: ἡ ἀδικία εἰς πλῆθος
  english_pob_choice: unrighteousness will increase upon him in abundance
  chosen_spanish: la injusticia aumentará sobre él en abundancia
  alternatives_spanish:
  - la injusticia se multiplicará en gran manera
  - la iniquidad crecerá sobre él abundantemente
  lexicon: LSJ
  rationale: Sigo la corrección del audit trail ('increase upon him in abundance') y mantengo 'injusticia' para ἀδικία, que en español expresa bien la carga moral y social del término.
- source_word: σκότει
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - sombra
  lexicon: LSJ
  rationale: '''Tinieblas'' conserva el registro bíblico y el tono ominoso del pasaje mejor que ''oscuridad''.'
- source_word: μιασμός
  english_pob_choice: defilement
  chosen_spanish: contaminación
  alternatives_spanish:
  - contaminación ritual
  - impureza
  lexicon: LSJ
  rationale: '''Contaminación'' deja visible la fuerza cultual y moral del término. En español evita que el sentido quede reducido solo a ''impureza'' subjetiva, aunque esa alternativa se mantiene como posible.'
- source_word: ἐνώπιον ἀνθρώπων
  english_pob_choice: before men
  chosen_spanish: delante de los hombres
  alternatives_spanish:
  - ante los hombres
  - en presencia de los hombres
  lexicon: LSJ
  rationale: Mantiene el tono solemne del original y la formulación tradicional del contraste entre lo pronunciable y lo indecible.
- source_word: αἰχμαλωσίᾳ
  english_pob_choice: captivity
  chosen_spanish: cautiverio
  alternatives_spanish:
  - captividad
  - exilio
  lexicon: LSJ
  rationale: '''Cautiverio'' conserva la idea de ser llevado/puesto bajo dominio ajeno, y suena natural en español bíblico sin perder claridad.'
- source_word: προνομῇ
  english_pob_choice: plundering
  chosen_spanish: saqueo
  alternatives_spanish:
  - despojo
  - pillaje
  lexicon: LSJ
  rationale: '''Saqueo'' es el equivalente más directo y comprensible para el estado de ser despojado por violencia.'
- source_word: ὕπαρξις
  english_pob_choice: possessions
  chosen_spanish: posesiones
  alternatives_spanish:
  - bienes
  - propiedades
  lexicon: LSJ
  rationale: '''Posesiones'' corresponde bien al sentido material de holdings/properties y permite mantener el paralelismo con la tierra.'
- source_word: ἀνακαινοποιήσουσιν οἶκον κυρίου
  english_pob_choice: they will renew the house of the Lord
  chosen_spanish: renovarán la casa de Yahvé
  alternatives_spanish:
  - reconstruirán la casa de Yahvé
  - restaurarán la casa de Yahvé
  lexicon: LSJ
  rationale: '''Renovarán'' sigue de cerca el compuesto griego de hacer nuevo otra vez, y evita decidir prematuramente entre restauración y reconstrucción. ''Casa de Yahvé'' preserva la forma del nombre divino según el criterio del proyecto.'
theological_decisions:
- issue: Cláusula textual incierta sobre el gozo y la salvación del mundo
  english_pob_reading: 'Translated in brackets as a possibly secondary expansion: ''[And in the days of his joy he will arise for the salvation of the world.]'''
  chosen_spanish_reading: '[Y en los días de su gozo se levantará para la salvación del mundo.]'
  alternative_spanish_readings:
  - Omitirla por ser secundaria
  - Integrarla sin corchetes como texto completo
  rationale: El testimonio griego auditado la presenta en corchetes, señalando incertidumbre textual. La versión española la conserva también entre corchetes para no ocultarla ni normalizarla indebidamente.
  doctrine_reference: Transparencia textual; no resolver la variante por armonización doctrinal o histórica.
- issue: Secuencia profética de jubileos y sacerdotes
  english_pob_reading: Render the sequence straightforwardly as prophetic priestly periods without harmonizing to a specific historical reconstruction
  chosen_spanish_reading: Presentar la sucesión como esquema profético de sacerdocios vinculados a jubileos, sin identificar nombres históricos dentro del texto
  alternative_spanish_readings:
  - Identificar cada sacerdote con figuras históricas concretas
  - Reformular el pasaje como mera alegoría
  rationale: El griego da una secuencia esquemática y testamentaria. La traducción debe preservar ese diseño sin forzar una reconstrucción histórica ni diluir la expectativa profética.
  doctrine_reference: Respeto del género apocalíptico-testamentario y de la tensión entre esquema simbólico e historia.
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión del inglés auditado: adopta la redacción más natural de ''increase upon him in abundance'' como ''aumentará sobre él en abundancia'', mantiene el clausal bracketed passage como texto incierto, y conserva la secuencia juvenil/jubilar de manera sobria sin historizarla.'
  spanish_consistency_notes:
  - He usado 'Yahvé' para el nombre divino según el estándar del proyecto, incluyendo 'casa de Yahvé' al final.
  - He mantenido 'sacerdocio' para ἱερωσύνη y 'ungido' solo en la perícopa de investidura, sin introducir 'Mesías' porque el contexto es sacerdotal y no cristológico.
  - He preferido 'tinieblas', 'cautiverio' y 'saqueo' por su registro bíblico y su correspondencia con el tono del original.
  - He conservado la clausula entre corchetes para reflejar la incertidumbre textual señalada en el audit trail.
