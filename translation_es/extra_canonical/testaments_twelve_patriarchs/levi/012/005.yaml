translation:
  language: es
  text: Ocho años tenía cuando entré en la tierra de Canaán, y dieciocho años cuando maté a Siquem, y diecinueve años cuando ejercí el sacerdocio, y veintiocho años cuando tomé esposa, y cuarenta y ocho años cuando entré en Egipto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐτῶν / years old
  english_pob_choice: X years old
  chosen_spanish: X años
  alternatives_spanish:
  - a la edad de X años
  - tenía X años
  lexicon: ἔτος
  rationale: 'El griego expresa edad con genitivo de años; en español, la forma más natural y fiel es mencionar la edad de manera directa. En la primera cláusula se invierte el orden para mayor fluidez: «Ocho años tenía».},{'
- source_word: γῆν Χανάαν
  english_pob_choice: the land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - el país de Canaán
  - la tierra de Canaan
  lexicon: γῆ
  rationale: «Tierra» reproduce el valor geográfico-bíblico de γῆ mejor que «país». Se conserva la transliteración habitual Canaán con tilde española.
- source_word: ἀπέκτεινα τὸν Συχέμ
  english_pob_choice: I killed Shechem
  chosen_spanish: maté a Siquem
  alternatives_spanish:
  - dije muerte a Siquem
  - asesiné a Siquem
  lexicon: ἀποκτείνω
  rationale: El verbo griego significa matar; «maté» es directo y sobrio. «Siquem» es la forma española habitual del nombre propio. Se evita intensificar con «asesiné», que añade una valoración no explícita en el texto.
- source_word: ἱεράτευσα
  english_pob_choice: I served as priest
  chosen_spanish: ejercí el sacerdocio
  alternatives_spanish:
  - oficié como sacerdote
  - serví como sacerdote
  lexicon: ἱερατεύω
  rationale: El verbo indica ejercer funciones sacerdotales; «ejercí el sacerdocio» mantiene el sustantivo de oficio y suena natural en español bíblico sin perder el valor verbal. «Serví como sacerdote» sería posible, pero menos preciso respecto al matiz institucional.
- source_word: ἔλαβον γυναῖκα
  english_pob_choice: I took a wife
  chosen_spanish: tomé esposa
  alternatives_spanish:
  - tomé una esposa
  - me casé
  lexicon: λαμβάνω + γυνή
  rationale: «Tomé esposa» conserva el giro semítico y la literalidad del acto matrimonial, acorde con la fuerza del griego y del paralelo inglés. «Me casé» suaviza demasiado la expresión y pierde el eco tradicional del texto.
- source_word: εἰσῆλθον εἰς Αἴγυπτον
  english_pob_choice: I entered Egypt
  chosen_spanish: entré en Egipto
  alternatives_spanish:
  - fui a Egipto
  - llegué a Egipto
  lexicon: εἰσέρχομαι
  rationale: «Entré en Egipto» sigue de cerca el griego y mantiene la estructura paralela con «entré en la tierra de Canaán».
theological_decisions:
- issue: Cronología autobiográfica en una obra de tradición patriarcal
  english_pob_reading: Simple chronological report with no doctrinal expansion
  chosen_spanish_reading: Relato cronológico sobrio, sin amplificación interpretativa
  alternative_spanish_readings:
  - Narración hagiográfica más exaltada
  - Paráfrasis explicativa
  rationale: El verso presenta una secuencia de edades y acciones. La traducción evita añadir matices doctrinales o devocionales que el griego no expresa, preservando el carácter testimonial del pasaje.
  doctrine_reference: Narrative fidelity / historical reporting
translation_notes:
  revision_awareness: La revisión más reciente del expediente inglés indica que no hubo cambios necesarios y no existen notas ni variantes aplicadas; por eso la versión española sigue de cerca el texto griego y el POB inglés, sin introducir aparato crítico adicional.
  spanish_consistency_notes:
  - 'Se mantiene la terminología bíblica estándar y sobria: Canaán, Siquem, Egipto.'
  - Se evita «SEÑOR» u այլ sustituciones porque el verso no contiene el nombre divino.
  - Se conserva el paralelismo sintáctico de la lista de edades para reflejar la estructura del original.
