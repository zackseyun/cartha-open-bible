base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/012/004.yaml
  text: And in the ninety-fourth year of my life, Abraham took Jochebed my daughter as a wife for himself, because he and my daughter were born on one and the same day.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:56Z'
    unchanged: false
    changes_summary: 'Corrected two lexical details from the Greek: ''sixty-fourth'' to ''ninety-fourth'' (ἐνενηκοστῷ τετάρτῳ) and ''Ambram'' to ''Abraham'' (᾿Αβραὰμ).'
translation:
  language: es
  text: Y en el año noventa y cuatro de mi vida, Abraham tomó a Jocabed, mi hija, para sí como esposa, porque él y mi hija nacieron en un mismo día.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐνενηκοστῷ τετάρτῳ
  english_pob_choice: ninety-fourth
  chosen_spanish: noventa y cuatro
  alternatives_spanish:
  - nonagésimo cuarto
  - ciento noventa y cuatro
  lexicon: ἐνενηκοστῷ τετάρτῳ
  rationale: El griego fija el ordinal en 94.º; en español, para una formulación fluida y precisa en un contexto narrativo genealógico, se expresa como cardinal con valor ordinal en «el año noventa y cuatro de mi vida». Se evita cualquier forma que contradiga la corrección textual del audit trail.
- source_word: Ἀβραὰμ
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abram
  lexicon: Ἀβραὰμ
  rationale: El texto griego de base lee Ἀβραὰμ, y la revisión documentada corrige la forma anterior. En español se mantiene «Abraham» por fidelidad al griego y por ser la forma estable y reconocible del nombre.
- source_word: Ἰωχαβὲδ
  english_pob_choice: Jochebed
  chosen_spanish: Jocabed
  alternatives_spanish:
  - Jocabet
  - Yocabed
  lexicon: Ἰωχαβὲδ
  rationale: Se vierte el nombre propio al castellano como «Jocabed», forma naturalizada y transparente, sin alterar la identidad del personaje. Se preserva el referente femenino y familiar del original.
- source_word: εἰς γυναῖκα
  english_pob_choice: as a wife for himself
  chosen_spanish: como esposa
  alternatives_spanish:
  - por esposa
  - en esposa para sí
  lexicon: γυνή
  rationale: La construcción griega indica toma matrimonial. «Como esposa» comunica el resultado/estatus sin cargar el español con un giro excesivamente literal. «Para sí» se mantiene en «tomó a... para sí» para conservar la reflexividad del original.
- source_word: ἐν μιᾷ ἡμέρᾳ
  english_pob_choice: on one and the same day
  chosen_spanish: en un mismo día
  alternatives_spanish:
  - en un solo día
  - el mismo día
  lexicon: εἷς / μία / ἕν + ἡμέρα
  rationale: 'La expresión idiomática griega se reproduce con una locución española natural que conserva la simultaneidad exacta: «en un mismo día».'
theological_decisions:
- issue: Nacimiento simultáneo de Abraham y la hija del hablante
  english_pob_reading: because he and my daughter were born on one and the same day
  chosen_spanish_reading: porque él y mi hija nacieron en un mismo día
  alternative_spanish_readings:
  - porque él y mi hija nacieron el mismo día
  - porque mi hija y él habían nacido en el mismo día
  rationale: Se conserva sin suavizar la afirmación extraordinaria del texto fuente, ya que el audit trail no indica que deba armonizarse ni explicarse alegóricamente. El español mantiene la tensión narrativa tal como está en el griego.
  doctrine_reference: Texto pseudepigráfico; fidelidad literaria al enunciado fuente sin importación doctrinal externa
translation_notes:
  revision_awareness: 'El draft sigue la revisión más reciente documentada: corrige «sixty-fourth» a «ninety-fourth» y «Ambram» a «Abraham», conforme al griego ἐνενηκοστῷ τετάρτῳ y Ἀβραὰμ. No se heredan las lecturas corregidas por el pass anterior.'
  spanish_consistency_notes:
  - Se conserva el registro narrativo en primera persona («mi vida», «mi hija») acorde con el testimonio del texto.
  - Se mantiene «Abraham» y no «Abram» por la corrección textual documentada.
  - No se introduce terminología eclesiástica ajena al pasaje.
  - La puntuación sigue el español moderno y la relación causal se expresa con «porque» como en el original.
