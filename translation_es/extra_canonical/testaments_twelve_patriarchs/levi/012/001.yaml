source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ ἔλαβεν ὁ¹ Γερσὰμ² γυναῖκα³ καὶ ἔτεκεν⁴ *ἐξ αὐτῆς⁵ τὸν Λομνὴ⁶ καὶ Σεμεῆ⁷.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/012/001.yaml
  text: And Gersam took a wife, and she bore to him Lomne and Semee.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:52Z'
    unchanged: false
    changes_summary: Replaced 'by her he fathered' with 'she bore to him' to reflect the Greek more directly and naturally, since the verb's subject is the wife implied by the prior clause.
translation:
  language: es
  text: Y Gersam tomó una esposa, y ella le dio a luz a Lomne y a Semee.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔλαβεν ... γυναῖκα
  english_pob_choice: took a wife
  chosen_spanish: tomó una esposa
  alternatives_spanish:
  - tomó mujer
  - se casó
  lexicon: λαμβάνω / γυνή
  rationale: 'Mantengo el sentido narrativo directo del griego: tomar una esposa. «Esposa» comunica mejor el vínculo conyugal que «mujer» en español, y evita una paráfrasis más libre como «se casó».'
- source_word: ἔτεκεν
  english_pob_choice: she bore to him
  chosen_spanish: ella le dio a luz a
  alternatives_spanish:
  - ella le parió a
  - él engendró por medio de ella
  lexicon: τίκτω
  rationale: El griego pone como sujeto a la esposa implícita del contexto; por eso traduzco con sujeto femenino explícito. «Dar a luz» conserva la imagen de nacimiento sin introducir una formulación más técnica o masculina como «engendró».
- source_word: Λομνή / Σεμεή
  english_pob_choice: Lomne and Semee
  chosen_spanish: Lomne y Semee
  alternatives_spanish:
  - Lomné y Semee
  - Lomne y Semeé
  lexicon: nombres propios griegos transcritos
  rationale: Conservo las formas del auditorio POB en español lo más cerca posible de la transliteración inglesa, sin añadir acentos no respaldados por el testimonio textual disponible.
theological_decisions:
- issue: Relación entre el verbo de nacimiento y la agente implícita
  english_pob_reading: she bore to him
  chosen_spanish_reading: ella le dio a luz a
  alternative_spanish_readings:
  - por ella él engendró
  - ella lo alumbró
  rationale: 'Sigo la revisión inglesa que corrigió una lectura más interpretativa para reflejar el griego con mayor naturalidad. En español, la estructura con sujeto femenino explícito preserva la misma tensión: el nacimiento se atribuye a la esposa, no al esposo.'
  doctrine_reference: Narración genealógica; precisión del sujeto verbal en el relato
translation_notes:
  revision_awareness: La revisión inglesa cambió de «by her he fathered» a «she bore to him» para ajustarse más de cerca al griego y al sujeto implícito del verbo. La versión española sigue esa decisión y evita una construcción que haría del padre el agente verbal principal.
  spanish_consistency_notes:
  - He usado «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - He mantenido los nombres propios según la forma inglesa auditada del POB, con transliteración sencilla para lectura fluida.
  - No se requieren notas al pie porque no hay variante textual o ambigüedad lexicográfica documentada que deba preservarse en este versículo.
