lexical_decisions:
- source_word: Καὶ ἰδού
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y miren
  - Y ved
  lexicon: καί; ἰδού
  rationale: He conservado la exclamación exhortativa y deíctica del griego con una fórmula natural en español bíblico contemporáneo. «Y he aquí» mantiene el valor enfático sin sonar artificiosa.
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - mis niños
  lexicon: τέκνον
  rationale: «Hijos míos» reproduce el tono afectivo y paternal del vocativo en español con mayor fluidez que «mis hijos» en esta posición.
- source_word: τρίτη γενεά
  english_pob_choice: the third generation
  chosen_spanish: la tercera generación
  alternatives_spanish:
  - la tercera descendencia
  - la tercera estirpe
  lexicon: γενεά
  rationale: «Generación» es la correspondencia directa y más transparente en español para γενεά en este contexto genealógico. Otras opciones son más interpretativas o menos naturales.
translation_notes:
  revision_awareness: La traducción inglesa auditada permanece sin cambios («And behold, my children, you are the third generation.»); por tanto, no se introducen ajustes textuales ni notas variantes en español.
  spanish_consistency_notes:
  - Se mantiene «Y he aquí» como fórmula bíblica sobria y reconocible, sin reemplazarla por una paráfrasis más moderna.
  - Se usa segunda persona plural de cortesía («ustedes») para reflejar el plural del griego de forma clara en español neutral.
  - No se capitaliza «generación» porque no funciona como título ni nombre propio en este contexto.
