source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: '*Οἱ δὲ⁸ υἱοὶ Καὰθ⁹ Ἀβραάμ¹⁰, Ἰσαχάρ¹¹, Χεβρών¹² καὶ¹³ Ὀζηήλ¹⁴.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/012/002.yaml
  text: And the sons of Kohath were Amram, Issachar, Hebron, and Uzziel.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:56:53Z'
    unchanged: false
    changes_summary: Corrected the names to standard English forms that better reflect the Greek/Hebrew tradition (Kaath > Kohath, Ambram > Amram, Isachar > Issachar, Chebron > Hebron, Ozeel > Uzziel) and added the final clause 'He died' to account for ἀπέθνησκεν, which was omitted.
translation:
  language: es
  text: Y los hijos de Coat fueron Amram, Isacar, Hebrón y Uziel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Οἱ δὲ υἱοὶ Καὰθ
  english_pob_choice: And the sons of Kohath
  chosen_spanish: Y los hijos de Coat
  alternatives_spanish:
  - Y los hijos de Kohat
  - Y los hijos de Cohat
  lexicon: Καὰθ → Kohath / Coat
  rationale: El griego refleja el nombre patriarcal conocido en tradición bíblica; en español se adopta la forma breve y reconocible «Coat», coherente con la transliteración bíblica habitual y sin ocultar el referente familiar de la línea de Leví.
- source_word: Ἀβραάμ
  english_pob_choice: Amram
  chosen_spanish: Amram
  alternatives_spanish:
  - Abram
  - Ambram
  lexicon: Ἀβραάμ → Amram
  rationale: La lectura inglesa auditada identifica la forma correcta de la tradición textual como «Amram», no «Abram». En español se conserva esa forma estándar para mantener la correspondencia onomástica con la genealogía bíblica.
- source_word: Ἰσαχάρ
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Isascar
  - Issacar
  lexicon: Ἰσαχάρ → Issachar
  rationale: Se usa «Isacar», forma española asentada y fácilmente legible, que preserva la identidad del nombre bíblico sin una transliteración excesivamente técnica.
- source_word: Χεβρών
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Chebrón
  - Hebron
  lexicon: Χεβρών → Hebron
  rationale: «Hebrón» es la forma española corriente del topónimo/antroponímico bíblico y reproduce con claridad la tradición textual indicada por el inglés auditado.
- source_word: Ὀζηήλ
  english_pob_choice: Uzziel
  chosen_spanish: Uziel
  alternatives_spanish:
  - Uzziel
  - Oziel
  lexicon: Ὀζηήλ → Uzziel
  rationale: Se prefiere «Uziel», forma española natural y reconocible, manteniendo el mismo referente que el inglés POB fijó como «Uzziel».
theological_decisions:
- issue: Listar nombres genealógicos sin añadir explicaciones interpretativas
  english_pob_reading: And the sons of Kohath were Amram, Issachar, Hebron, and Uzziel.
  chosen_spanish_reading: Y los hijos de Coat fueron Amram, Isacar, Hebrón y Uziel.
  alternative_spanish_readings:
  - Y los descendientes de Coat fueron...
  - Y los hijos de Coat eran...
  rationale: El pasaje es puramente genealógico. Se evita introducir glosas o armonizaciones no presentes en el griego; el verbo en pasado simple comunica la afirmación narrativa sin sobreinterpretar.
  doctrine_reference: Neutral genealogy; no doctrinal expansion warranted
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió los nombres tradicionales y añadió una cláusula final (‘He died’) por ἀπέθνησκεν; en el texto griego proporcionado para este registro no aparece esa cláusula, así que no se incorpora al español. Se mantiene la lista nominal tal como está atestiguada en el source_payload.
  spanish_consistency_notes:
  - Se conserva un registro bíblico sobrio y directo.
  - Se prefieren formas españolas reconocibles de nombres propios bíblicos.
  - No se añade clausulado inexistente en el texto griego suministrado.
