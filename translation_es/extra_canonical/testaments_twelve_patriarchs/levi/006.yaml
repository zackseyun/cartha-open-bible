translation:
  language: es
  text: 1 Y cuando iba a mi padre, hallé un escudo de bronce; por eso el nombre del monte es Aspis, que está cerca de Gebal, a la derecha de Abim. 2 Y guardé estas palabras en mi corazón. 3 Después de esto tomé consejo con mi padre y con Rubén, para que dijera a los hijos de Emmor que no se circuncidaran[a], porque yo tuve celo por causa de la abominación que habían cometido contra mi hermana. 4 Y yo maté primero a Siquem, y Simeón mató a Emmor. 5 Y después de esto mis hermanos vinieron y atacaron aquella ciudad a filo de espada. 6 Y mi padre oyó estas cosas, y, enojado, se entristeció porque habían aceptado la circuncisión y murieron, y en sus bendiciones pasó sobre nosotros[b]. 7 Porque pecamos, pues habíamos hecho esto contra su voluntad, aunque él se debilitó[c] aquel día. 8 Pero vi que era un decreto de Dios para mal contra ellos, porque querían hacer a Sara y a Rebeca como habían hecho a Dina nuestra hermana; y el Señor los contuvo. 9 Y persiguieron a Abraham nuestro padre mientras
    era forastero, y oprimieron sus rebaños mientras iban aumentando, y maltrataron cruelmente a Eblán, su esclavo nacido en la casa[d]. 10 Y de cierto así solían actuar con todos los extranjeros, apoderándose por fuerza de mujeres extranjeras y echándolas fuera. 11 Pero la ira de Dios vino sobre ellos plenamente[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que no fueran circuncidados». El giro griego expresa su negativa a someterse a la circuncisión.'
    reason: alternative_reading
  - marker: b
    text: 'O: «nos pasó por alto en las bendiciones»; es decir, Jacob no favoreció a Leví y Simeón al bendecir.'
    reason: lexical_alternative
  - marker: c
    text: El verbo griego es difícil y puede sugerir que Jacob se ablandó, se debilitó o perdió resolución aquel día.
    reason: textual_variant
  - marker: d
    text: El nombre «Eblán» es incierto en la transmisión; el sentido es el de un esclavo nacido en la casa de Abraham que fue tratado con dureza.
    reason: textual_variant
  - marker: e
    text: Compárese el modismo «ira ... hasta el fin» para expresar un juicio completo o definitivo.
    reason: cross_reference
lexical_decisions:
- source_word: ἀσπίδα χαλκῆν
  english_pob_choice: a bronze shield
  chosen_spanish: un escudo de bronce
  alternatives_spanish:
  - un broquel de bronce
  - un escudo broncíneo
  lexicon: LSJ
  rationale: ἀσπίς designa un escudo; χαλκήν precisa el material. 'Escudo de bronce' es natural en español y mantiene el vínculo etiológico con el nombre Aspis.
- source_word: συνετήρουν ... ἐν τῇ καρδίᾳ μου
  english_pob_choice: I kept these words in my heart
  chosen_spanish: guardé estas palabras en mi corazón
  alternatives_spanish:
  - conservé estas palabras en mi corazón
  - atesoré estas palabras en mi corazón
  lexicon: LSJ
  rationale: La imagen idiomática de retener interiormente se expresa de modo claro y solemne con 'guardé ... en mi corazón'.
- source_word: συνεβούλευσα
  english_pob_choice: I took counsel
  chosen_spanish: tomé consejo
  alternatives_spanish:
  - consulté
  - deliberé
  lexicon: LSJ
  rationale: La idea es una consulta deliberada; 'tomé consejo' conserva el registro formal del relato.
- source_word: μὴ περιτμηθῆναι αὐτούς
  english_pob_choice: not to circumcise themselves
  chosen_spanish: que no se circuncidaran
  alternatives_spanish:
  - que no fueran circuncidados
  - que no pasaran por la circuncisión
  lexicon: LSJ
  rationale: El infinitivo medio/pasivo se vierte naturalmente en español como una acción que ellos mismos rehúsan realizar o aceptar; aquí 'se circuncidaran' evita una perífrasis pesada.
- source_word: ἐζήλωσα
  english_pob_choice: I was zealous
  chosen_spanish: estaba celoso
  alternatives_spanish:
  - ardía en celo
  - estaba lleno de celo
  lexicon: LSJ
  rationale: En español, 'estar celoso por causa de' comunica el fervor indignado del contexto, aunque la idea sea de celo moral más que de envidia.
- source_word: βδέλυγμα
  english_pob_choice: abomination
  chosen_spanish: la abominación
  alternatives_spanish:
  - la cosa detestable
  - el ultraje
  lexicon: LSJ
  rationale: '''Abominación'' conserva la fuerte carga moral y cultual del término griego.'
- source_word: ἐν στόματι μαχαίρας
  english_pob_choice: with the edge of the sword
  chosen_spanish: a filo de espada
  alternatives_spanish:
  - con el filo de la espada
  - con la punta de la espada
  lexicon: LSJ
  rationale: Se trata de un giro semítico habitual; 'a filo de espada' es la equivalencia española más idiomática y fiel.
- source_word: παρεῖδεν ἡμῖν
  english_pob_choice: he passed over us
  chosen_spanish: pasó sobre nosotros
  alternatives_spanish:
  - nos pasó por alto
  - nos dejó de lado
  lexicon: LSJ
  rationale: En el contexto de las bendiciones, la idea es que no favoreció a Levi y Simeón; 'pasó sobre nosotros' conserva la ambigüedad solemne del testimonio.
- source_word: παρὰ γνώμην αὐτοῦ
  english_pob_choice: contrary to his judgment
  chosen_spanish: contra su juicio
  alternatives_spanish:
  - contra su decisión
  - contra su parecer
  lexicon: LSJ
  rationale: γνώμη aquí implica juicio deliberado; 'juicio' mantiene la fuerza normativa del término.
- source_word: ἐμαλακίσθη
  english_pob_choice: he became weak
  chosen_spanish: se debilitó
  alternatives_spanish:
  - se ablandó
  - se sintió débil
  lexicon: LSJ
  rationale: El verbo es difícil en la tradición textual; 'se debilitó' es sobrio y no resuelve indebidamente la ambigüedad.
- source_word: ἀπόφασις θεοῦ
  english_pob_choice: a decree of God
  chosen_spanish: un decreto de Dios
  alternatives_spanish:
  - una decisión de Dios
  - una sentencia divina
  lexicon: LSJ
  rationale: '''Decreto'' conserva el valor jurídico y providencial del sustantivo.'
- source_word: εἰς κακά
  english_pob_choice: for evil against them
  chosen_spanish: para mal contra ellos
  alternatives_spanish:
  - para su daño
  - para calamidad
  lexicon: LSJ
  rationale: La expresión mantiene la dureza del griego y su dirección adversativa.
- source_word: ἐκώλυσεν
  english_pob_choice: restrained
  chosen_spanish: los contuvo
  alternatives_spanish:
  - los detuvo
  - los impidió
  lexicon: LSJ
  rationale: El Señor actúa impidiendo que consumen su propósito; 'contuvo' es breve y solemne.
- source_word: οἰκογενῆ
  english_pob_choice: home-born servant
  chosen_spanish: esclavo nacido en la casa
  alternatives_spanish:
  - siervo nacido en la casa
  - servidor de la casa
  lexicon: LSJ
  rationale: Se conserva la fuerza social del término y la idea de pertenencia doméstica, sin suavizarlo a 'siervo'.
- source_word: ἐν δυναστείᾳ ἁρπάζοντες
  english_pob_choice: seizing foreign women by force
  chosen_spanish: apoderándose por fuerza de mujeres extranjeras
  alternatives_spanish:
  - arrebatando por la fuerza mujeres extranjeras
  - tomando por la fuerza a mujeres extranjeras
  lexicon: LSJ
  rationale: La frase subraya el abuso violento del poder; 'apoderándose por fuerza' recoge el matiz opresivo sin exceso de paráfrasis.
- source_word: τὰς ξένας
  english_pob_choice: foreign women
  chosen_spanish: mujeres extranjeras
  alternatives_spanish:
  - mujeres forasteras
  - mujeres de otros pueblos
  lexicon: LSJ
  rationale: '''Extranjeras'' sigue de cerca el adjetivo y la revisión inglesa, y evita una interpretación posesiva no requerida por el griego.'
- source_word: ἔφθασε ... εἰς τέλος
  english_pob_choice: came upon them completely
  chosen_spanish: vino sobre ellos hasta el fin
  alternatives_spanish:
  - los alcanzó por completo
  - vino sobre ellos completamente
  lexicon: LSJ
  rationale: El idioma transmite un juicio total y definitivo; 'hasta el fin' preserva el eco idiomático de plenitud final.
theological_decisions:
- issue: La tensión entre culpa humana y decreto divino en la matanza de Siquem
  english_pob_reading: Levi afirma a la vez que pecaron al actuar contra el juicio de Jacob, y que aun así hubo un decreto de Dios para mal contra los agresores.
  chosen_spanish_reading: La traducción mantiene simultáneamente «pecamos» y «era un decreto de Dios para mal contra ellos», sin resolver la tensión.
  alternative_spanish_readings:
  - La acción fue enteramente justa y no pecaminosa
  - La acción fue sólo pecado humano, sin decreto divino
  rationale: El pasaje sostiene ambas afirmaciones; la versión española debe conservar esa tensión doctrinal y narrativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: La referencia a Sara y Rebeca en el v. 8
  english_pob_reading: The text explicitly names Sarah and Rebekah and translates the difficult witness rather than omitting it.
  chosen_spanish_reading: Se traduce con Sara y Rebeca, aun cuando la construcción sea textualmente difícil.
  alternative_spanish_readings:
  - Omitir la línea por corrupta
  - Generalizarla como 'las mujeres de nuestra casa'
  rationale: La transparencia textual exige reflejar el testimonio griego recibido y no suavizar la dificultad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
- issue: La frase final sobre la ira de Dios
  english_pob_reading: The idiom expresses complete or final judgment.
  chosen_spanish_reading: «vino sobre ellos hasta el fin» comunica juicio pleno o definitivo.
  alternative_spanish_readings:
  - vino sobre ellos completamente
  - les alcanzó hasta el final
  rationale: La expresión final debe conservar el peso de un juicio total, no sólo un castigo parcial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés: en el v. 10 se prefirió ''mujeres extranjeras'' para reflejar τὰς ξένας con mayor precisión. La redacción española sigue esa revisión y conserva el resto de las decisiones auditadas sin cambios sustantivos.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' no porque aparezca explícitamente en este pasaje, sino como norma del proyecto cuando corresponda; aquí no aplica.
  - Se usa 'esclavo' para οἰκογενῆ en coherencia con el registro lexical del proyecto y con la fuerza social del término.
  - Se mantiene 'Mesías/Cristo' fuera de este pasaje porque no aparece ningún término correspondiente.
  - 'Los nombres propios se hispanizan de forma estable: Rubén, Siquem, Simeón, Emmor, Sara, Rebeca, Dina, Abraham, Gebal, Abim, Eblán.'
