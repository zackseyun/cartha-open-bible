base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/006.yaml
  text: 1 And as I was going to my father[6:6], I found a bronze shield; therefore the name of the mountain is Aspis, which is near Gebal, on the right of Abim. 2 And I kept these words in my heart. 3 After this I took counsel with my father and with Reuben, that he should tell the sons of Emmor not to circumcise themselves, because I was zealous on account of the abomination which they had committed against my sister. 4 And I killed Shechem first, and Simeon killed Emmor. 5 And after this my brothers came and struck that city with the edge of the sword. 6 And my father heard these things, and being angry he was grieved because they had accepted circumcision and died, and in his blessings he passed over us. 7 For we sinned, because we had done this contrary to his judgment, though he became weak on that day. 8 But I saw that it was a decree of God for evil against them, because they intended to do to Sarah and Rebekah as they had done to Dinah our sister; and the Lord restrained them. 9
    And they pursued Abraham our father when he was a stranger, and they oppressed his flocks when they were swollen with increase, and they cruelly mistreated Eblan his home-born servant. 10 And indeed in this way they used to act toward all strangers, seizing foreign women by force and driving them away[6:11][6:9][6:8][6:7]. 11 But the wrath of God came upon them completely.
  footnotes:
  - marker: '6:6'
    text: Or, 'he overlooked us in the blessings,' that is, Jacob did not favor Levi and Simeon when he pronounced blessings.
    reason: lexical_alternative
  - marker: '6:7'
    text: The Greek verb rendered 'became weak' is difficult and may suggest that Jacob was softened, weakened, or overcome on that day.
    reason: textual_variant
  - marker: '6:8'
    text: This verse is textually difficult. The Greek appears to say that the men of Shechem intended to treat Sarah and Rebekah as they had treated Dinah.
    reason: textual_variant
  - marker: '6:9'
    text: The name 'Eblan' is uncertain in transmission; the sense is that a household-born servant of Abraham was harshly abused.
    reason: textual_variant
  - marker: '6:11'
    text: Compare the idiom 'wrath ... to the end' for complete or final judgment.
    reason: cross_reference
