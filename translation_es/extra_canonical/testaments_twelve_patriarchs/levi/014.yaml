  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/014.yaml
  text: 1[a]. Therefore I, my children, have known that at the end of the ages you will act ungodly against the Lord, laying hands on him in wickedness, and among all the nations you will become a mockery[b]. 2. For our father Israel is pure from the ungodliness of the chief priests, who will lay their hands on the savior of the world. 3. For just as the sun is pure before the Lord upon the earth, so also...
  footnotes:
  - marker: a
    text: The clause 'who will lay their hands on the savior of the world' is bracketed in the source witness and may reflect a later expansion in transmission; it is translated here because it stands in the Greek text provided.
    reason: textual_variant
  - marker: b
    text: The chapter text in the provided witness breaks off after 'so also...'; the translation therefore preserves the extant wording only.
    reason: textual_variant
