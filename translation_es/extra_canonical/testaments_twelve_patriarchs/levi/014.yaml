revisions:
- from: 1[a]. Por tanto, yo, hijos míos, he sabido que al final de los siglos actuarán con impiedad contra el Señor, poniendo manos sobre él en maldad, y entre todas las naciones serán una burla[b]. 2. Pues nuestro padre Israel es puro de la impiedad de los sumos sacerdotes, que pondrán sus manos sobre el salvador del mundo[c]. 3. Porque así como el sol es puro delante del Señor sobre la tierra, así también...
  to: 1. Por tanto, yo, hijos míos, he sabido que al final de los siglos actuarán con impiedad contra el Señor, echando mano de él con maldad, y entre todas las naciones serán una burla. 2. Pues nuestro padre Israel es puro de la impiedad de los principales sacerdotes,[a] que echarán mano del salvador del mundo. 3. Porque así como el sol es puro delante del Señor sobre la tierra, así también...[b]
  rationale: Se corrigen los anclajes de notas para que correspondan exactamente a las frases comentadas; se sustituye el calco duro «poner manos sobre» por «echar mano de», que suena natural en español bíblico y conserva la fuerza del griego; y se ajusta «sumos sacerdotes» a «principales sacerdotes» para seguir mejor la decisión documentada de ἀρχιερεῖς como ‘chief priests’. Se mantiene el resto del sentido, incluida la cláusula textual problemática en v. 2 y la interrupción del v. 3.
