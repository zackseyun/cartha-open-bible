translation:
  language: es
  text: 1[a]. Por tanto, yo, hijos míos, he sabido que al final de los siglos actuarán con impiedad contra el Señor, poniendo manos sobre él en maldad, y entre todas las naciones serán una burla[b]. 2. Pues nuestro padre Israel es puro de la impiedad de los sumos sacerdotes, que pondrán sus manos sobre el salvador del mundo[c]. 3. Porque así como el sol es puro delante del Señor sobre la tierra, así también...
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula «que pondrán sus manos sobre el salvador del mundo» está entre corchetes en el testigo griego y puede reflejar una ampliación posterior en la transmisión; se traduce porque está presente en el texto proporcionado.
    reason: textual_variant
  - marker: b
    text: El texto del capítulo en el testigo proporcionado se interrumpe después de «así también...», por lo que la traducción conserva solo lo que se ha transmitido.
    reason: textual_variant
  - marker: c
    text: Esta frase está marcada como textual y teológicamente problemática en el testigo; se mantiene en el texto principal por fidelidad al testimonio griego, no como afirmación doctrinal resuelta.
    reason: theological_note
lexical_decisions:
- source_word: ἔγνων
  english_pob_choice: have known
  chosen_spanish: he sabido
  alternatives_spanish:
  - he conocido
  - sé
  lexicon: LSJ
  rationale: El perfecto griego expresa un conocimiento adquirido con resultado vigente; en español, «he sabido» conserva mejor esa perspectiva que un presente simple.
- source_word: ἀσεβήσετε
  english_pob_choice: you will act ungodly
  chosen_spanish: actuarán con impiedad
  alternatives_spanish:
  - serán impíos
  - cometerán impiedad
  lexicon: LSJ
  rationale: Se conserva el valor verbal de conducta irreligiosa; «actuar con impiedad» suena natural y mantiene la fuerza ética del verbo.
- source_word: ἐπὶ Κυρίου
  english_pob_choice: against the Lord
  chosen_spanish: contra el Señor
  alternatives_spanish:
  - hacia el Señor
  - en contra del Señor
  lexicon: LSJ
  rationale: El contexto es hostil; «contra el Señor» reproduce la relación adversativa sin añadir interpretaciones.
- source_word: χεῖρας ἐπιβάλλοντες
  english_pob_choice: laying hands on him
  chosen_spanish: poniendo manos sobre él
  alternatives_spanish:
  - echando mano de él
  - echando las manos sobre él
  lexicon: BDAG
  rationale: La expresión mantiene el registro bíblico y la ambigüedad entre detención y violencia, sin precisar más de lo que el griego permite.
- source_word: χλευασμός
  english_pob_choice: a mockery
  chosen_spanish: una burla
  alternatives_spanish:
  - un escarnio
  - un objeto de burla
  lexicon: LSJ
  rationale: «Una burla» expresa bien el resultado público de ridículo entre las naciones y sigue de cerca la revisión del inglés.
- source_word: καθαρός
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - inocente
  lexicon: LSJ
  rationale: «Puro» conserva la resonancia moral y cultual del contraste con ἀσέβεια.
- source_word: ἀσεβείας
  english_pob_choice: ungodliness
  chosen_spanish: impiedad
  alternatives_spanish:
  - irreverencia
  - maldad
  lexicon: LSJ
  rationale: «Impiedad» mantiene la dimensión específicamente religiosa del sustantivo y la coherencia con ἀσεβήσετε.
- source_word: ἀρχιερέων
  english_pob_choice: chief priests
  chosen_spanish: sumos sacerdotes
  alternatives_spanish:
  - jefes de los sacerdotes
  - principales sacerdotes
  lexicon: BDAG
  rationale: Aunque el griego es plural y en contexto del Segundo Templo puede rendirse como «chief priests», en español bíblico «sumos sacerdotes» comunica con claridad el grupo dirigente sacerdotal.
- source_word: σωτῆρα τοῦ κόσμου
  english_pob_choice: savior of the world
  chosen_spanish: salvador del mundo
  alternatives_spanish:
  - libertador del mundo
  lexicon: BDAG
  rationale: Se traduce de forma directa el sintagma griego; «salvador» preserva la carga teológica y el alcance universal del título.
- source_word: ἥλιος
  english_pob_choice: sun
  chosen_spanish: el sol
  lexicon: LSJ
  rationale: Equivalencia literal y transparente en el símil.
theological_decisions:
- issue: Cláusula entre corchetes en v. 2 que identifica a los sumos sacerdotes como quienes pondrán las manos sobre el salvador del mundo
  english_pob_reading: Included in the main text with a note of probable secondary or Christian expansion
  chosen_spanish_reading: Incluida en el texto principal con nota de posible expansión secundaria o cristiana
  alternative_spanish_readings:
  - Omitir la cláusula como secundaria
  - Mantenerla pero marcarla como interpolación incierta
  rationale: El testigo griego suministrado la incluye; por fidelidad al testimonio se traduce, pero se señala su carácter textual problemático para no ocultar la tensión histórica y teológica.
  doctrine_reference: 'PHILOSOPHY.md: traducir honestamente el testigo griego y usar notas en lugar de armonizar'
- issue: Referente de «el Señor» / «él» en v. 1
  english_pob_reading: Rendered as the direct object implied by the Greek, preserving the startling formulation
  chosen_spanish_reading: Conservado como objeto directo implícito del griego, manteniendo la formulación abrupta «contra el Señor ... poniendo manos sobre él»
  alternative_spanish_readings:
  - Interpretarlo más libremente como rebelión contra la autoridad del Señor
  - Hacer explícito el referente y armonizarlo con el «salvador del mundo»
  rationale: El griego presenta una acusación profética tajante; la traducción no debe resolver el referente más allá de lo que el texto dice.
  doctrine_reference: 'PHILOSOPHY.md: respetar la formulación del testigo y no suavizar tensiones'
- issue: Relación entre el final de v. 3 y la interrupción del testimonio
  english_pob_reading: The chapter text in the provided witness breaks off after 'so also...'; the translation therefore preserves the extant wording only.
  chosen_spanish_reading: La traducción conserva el corte con puntos suspensivos tras «así también...»
  alternative_spanish_readings:
  - Completar la frase a partir de otra tradición
  - Suavizar la interrupción con una paráfrasis
  rationale: El estado fragmentario del pasaje forma parte del dato textual y debe quedar visible en español.
  doctrine_reference: 'PHILOSOPHY.md: no completar artificialmente un texto truncado'
translation_notes:
  revision_awareness: Se incorporó la revisión del inglés que ajustó ἔγνων a «have known» y χλευασμός a una formulación más directa; en español se reflejó con «he sabido» y «una burla». También se conservó la cláusula entre corchetes del v. 2 en el texto principal, con nota de su posible carácter secundario.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para Κυρίου, dado que en este testimonio no aparece el nombre divino hebreo explícito y el contexto exige una referencia reverente y directa.
  - Se prefirió «impiedad» para ἀσέβεια / ἀσεβήσετε por coherencia interna.
  - «Sumos sacerdotes» traduce el plural griego con naturalidad en español bíblico, sin perder el sentido de grupo dirigente.
  - Se usó «salvador del mundo» de forma literal para no diluir la carga cristológica del testigo.
  - Se respetó la elipsis final del v. 3 con puntos suspensivos, evitando completar el fragmento.
