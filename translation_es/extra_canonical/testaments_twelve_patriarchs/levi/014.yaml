review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en lo esencial el sentido del griego y del rastro de auditoría inglés: conserva la acusación directa «contra el Señor ... poniendo manos sobre él», mantiene la cláusula entre corchetes de v. 2 en el texto principal y respeta la interrupción textual de v. 3. Sin embargo, hay varios desajustes de fidelidad y de legibilidad: «actuarán / serán» cambia indebidamente la segunda persona plural del griego a tercera persona; «poniendo manos sobre él» suena poco idiomático en español bíblico; y el anclaje de notas es incorrecto, porque [a] aparece en v. 1 pero comenta una cláusula de v. 2, mientras [b] aparece tras «una burla» aunque comenta la truncación de v. 3.'
  spanish_quality_summary: 'La redacción es mayormente comprensible, pero necesita pulido para un español eclesial natural y preciso. «Yo, hijos míos» funciona, aunque «yo, hijos míos» puede mantenerse; el problema principal es gramatical: debe ser «actuarán»/«serán» en segunda persona plural («actuarán» -> «actuarán» no, debe «actuarán»? En español de ustedes sí coincide, pero el sujeto explícito «hijos míos» pide claridad; mejor «ustedes actuarán... serán» o mantener futuro plural sin ambigüedad). Más importante, «poniendo manos sobre él» y «pondrán sus manos sobre» son calcos duros; «echando mano de él» / «echarán mano del» preserva mejor el registro bíblico y la ambigüedad entre arresto y violencia. También conviene reubicar las notas a sus lugares correctos.'
  glossary_alignment: 'No hay conflicto grave con la terminología del proyecto. «Señor» para κύριος aquí es admisible porque el texto griego tiene Κυρίου, no el Tetragrámaton hebreo. «salvador del mundo» refleja bien σωτῆρα τοῦ κόσμου. El punto mejorable es ἀρχιερέων: el inglés documenta «chief priests»; en español «principales sacerdotes» se alinea mejor que «sumos sacerdotes», que puede sugerir un oficio singular repetido más que el grupo dirigente sacerdotal.'
  issues:
  - severity: high
    issue: Las notas al pie están ancladas en lugares incorrectos.
    rationale: La nota [a] trata la cláusula entre corchetes de v. 2, pero el marcador está al inicio de v. 1. La nota [b] trata la interrupción después de «así también...», pero el marcador está tras «una burla». Esto incumple la disciplina requerida de anclar cada nota en la palabra o frase pertinente.
  - severity: high
    issue: La expresión «poniendo manos sobre él / pondrán sus manos sobre» es un calco poco natural.
    rationale: Aunque intenta reflejar χεῖρας ἐπιβάλλοντες, en español suena forzado. «Echando mano de él» y «echarán mano del salvador del mundo» mantienen el registro bíblico y la ambigüedad hostil mejor que el calco literal.
  - severity: medium
    issue: «sumos sacerdotes» no sigue la decisión léxica auditada tan bien como «principales sacerdotes».
    rationale: El griego plural ἀρχιερέων y la nota inglesa favorecen ‘chief priests’. «Principales sacerdotes» comunica mejor el grupo dirigente del período del Segundo Templo y evita la impresión de varios titulares del cargo de sumo sacerdote.
  - severity: low
    issue: La nota teológica adicional [c] no es necesaria como nota separada.
    rationale: La preocupación textual-teológica ya queda cubierta por la nota sobre la cláusula entre corchetes. Mantener una nota extra recarga el aparato sin añadir información esencial distinta para este registro.
