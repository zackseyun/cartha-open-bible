translation:
  language: es
  text: 'Y le dije a mi padre Jacob[a]: «En ti el Señor reducirá a nada a los cananeos, y dará su tierra a ti y a tu descendencia después de ti. Porque desde hoy la ciudad llamada Siquem será ciudad de necios. Porque así como uno se burla de un necio, así nos burlamos nosotros de ellos, porque en verdad cometieron una necedad en Israel al profanar a mi hermana. Entonces, después de llevarla[b], fuimos a Betel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Siquem es la forma española habitual del lugar más conocido en inglés como Shechem.
    reason: lexical_alternative
  - marker: b
    text: 'O: «después de apartarla»; el participio probablemente se refiere a retirar a Dina antes de seguir a Betel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξουδενώσει
  english_pob_choice: will bring ... to nothing
  chosen_spanish: reducirá a nada
  alternatives_spanish:
  - aniquilará
  - hará de ningún valor
  - humillará por completo
  lexicon: LSJ
  rationale: La idea central es la de hacer inútiles o sin cuenta a los cananeos en este contexto de juicio y conquista. «Reducirá a nada» conserva esa fuerza sin sonar demasiado interpretativo.
- source_word: σπέρματι
  english_pob_choice: seed
  chosen_spanish: descendencia
  alternatives_spanish:
  - semilla
  - prole
  - linaje
  lexicon: LSJ
  rationale: En español, «descendencia» comunica con naturalidad la promesa patriarcal. Mantiene el valor de linaje prometido sin el posible extrañeza de «semilla» en este contexto.
- source_word: ἀσυνέτων
  english_pob_choice: of fools
  chosen_spanish: de necios
  alternatives_spanish:
  - de insensatos
  - de faltos de entendimiento
  - de fatuos
  lexicon: LSJ
  rationale: El griego forma una caracterización moral de la ciudad. «Necios» conserva el tono bíblico y el paralelo con la burla al necio en la frase siguiente.
- source_word: χλευάσει
  english_pob_choice: mocks
  chosen_spanish: se burla de
  alternatives_spanish:
  - ridiculiza
  - escarnece de
  - se mofa de
  lexicon: LSJ
  rationale: «Se burla de» es natural en español y preserva el matiz de menosprecio del verbo griego, además de corresponder al paralelismo con la cláusula siguiente.
- source_word: ἐχλευάσαμεν
  english_pob_choice: we mocked
  chosen_spanish: nos burlamos
  alternatives_spanish:
  - nos mofamos
  - lo escarnecimos
  - lo ridiculizamos
  lexicon: LSJ
  rationale: Se mantiene el eco verbal de χλευάσει mediante la misma raíz semántica en español. La expresión es clara y no exagera más allá del griego.
- source_word: ἀφροσύνην
  english_pob_choice: folly
  chosen_spanish: necedad
  alternatives_spanish:
  - insensatez
  - locura
  - falta de juicio
  lexicon: LSJ
  rationale: «Necedad» reproduce el juicio moral del texto con un registro bíblico y legible. Evita suavizar el reproche y conserva la carga ética.
- source_word: μιάναντες
  english_pob_choice: defiling
  chosen_spanish: profanar
  alternatives_spanish:
  - contaminar
  - manchar
  - corromper
  lexicon: LSJ
  rationale: En este pasaje, el acto no es solo social sino religioso-moral. «Profanar» transmite bien la idea de contaminar lo sagrado o impurificar a alguien dentro del marco de Israel.
- source_word: Ἀπάραντες
  english_pob_choice: after taking her up
  chosen_spanish: después de llevarla
  alternatives_spanish:
  - después de tomarla
  - después de apartarla
  - después de sacarla de allí
  lexicon: LSJ
  rationale: La particípio apunta al movimiento de retirar a Dina antes de continuar. «Después de llevarla» es lo bastante cercano al griego y permite una lectura natural en español, aunque deja abierta la alternativa de alejamiento implícita.
- source_word: Βεθήλ
  english_pob_choice: Bethel
  chosen_spanish: Betel
  lexicon: LSJ
  rationale: Se conserva el nombre propio en forma usual en español bíblico, sin necesidad de nota explicativa.
- source_word: Σύκημα
  english_pob_choice: Sychem
  chosen_spanish: Siquem
  alternatives_spanish:
  - Sychem
  lexicon: LSJ
  rationale: El testimonio griego da la forma Συκημα, pero en español la forma más reconocible y bíblicamente establecida es «Siquem». Esto mantiene la identificación del lugar sin introducir una transliteración menos natural.
theological_decisions:
- issue: 'Lenguaje de pacto: tierra y descendencia'
  english_pob_reading: Retain 'seed' and the Lord's gift of the land as explicit promise language
  chosen_spanish_reading: Conservar la promesa de tierra y descendencia con formulación explícita
  alternative_spanish_readings:
  - usar solo «descendientes»
  - volver la frase en una predicción general de victoria
  rationale: El pasaje conserva el molde de promesa patriarcal. «Tierra» y «descendencia» mantienen la textura de pacto y herencia sin diluir el sentido teológico del texto.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; consistency of key terms'
- issue: Caracterización moral del acto contra Dina
  english_pob_reading: 'Translate ἀφροσύνην and μιάναντες with explicitly moral language: ''folly'' and ''defiling'''
  chosen_spanish_reading: 'Usar lenguaje moral explícito: «necedad» y «profanar»'
  alternative_spanish_readings:
  - «ofensa» y «deshonrar»
  - una formulación más social o eufemística
  rationale: El griego presenta el acto como impiedad moral dentro de Israel. «Necedad» y «profanar» conservan esa valoración sin añadir detalles sexuales ajenos al texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto coincide con la última revisión del audit trail: no se requerían cambios adicionales. La versión española ajusta la onomástica a uso bíblico corriente en español («Siquem», «Betel») y conserva la carga de pacto y de juicio moral del griego.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para Κύριος en este contexto del testimonio griego, sin máscara tipográfica, porque el audit trail lo trata como referencia al Señor divino en la fórmula narrativa.
  - Se conserva «descendencia» para σπέρμα, en línea con el lenguaje de promesa patriarcal.
  - Se usa un registro bíblico sobrio, evitando «Cristo» u այլ terminología no presente en el texto.
  - La nota [a] acompaña la forma española «Siquem» para señalar la alternativa anglófona documentada en el audit trail.
  - La nota [b] preserva la ambigüedad del participio Ἀπάραντες sin resolverla de forma excesiva.
