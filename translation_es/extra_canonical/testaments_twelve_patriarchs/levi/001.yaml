translation:
  language: es
  text: 'Un [a]copiado de las palabras de Leví, las cuales dispuso para sus hijos acerca de todo lo que harían, y de lo que les acontecería hasta el día del juicio.


    Porque estaba en buena salud cuando los llamó a sí; pero se le reveló que estaba a punto de morir. Y cuando se reunieron, les dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma más natural en español sería «una copia»; se conserva aquí el matiz documental del encabezado griego y del POB inglés.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀντίγραφον
  english_pob_choice: A copy
  chosen_spanish: Un copiado
  alternatives_spanish:
  - Una copia
  - Un registro
  - Una transcripción
  lexicon: LSJ
  rationale: El encabezado griego presenta el documento como un duplicado escrito. «Un copiado» intenta conservar la idea de copia documental del POB inglés. «Una copia» sería más natural en español, pero aquí puede sonar menos explícitamente textual; aun así, sigue siendo la alternativa más idiomática.
- source_word: λόγων
  english_pob_choice: of the words
  chosen_spanish: de las palabras
  alternatives_spanish:
  - de los dichos
  - de los discursos
  lexicon: LSJ
  rationale: «Palabras» mantiene el sentido amplio y formal del encabezado testamentario. «Dichos» o «discursos» estrechan o desplazan innecesariamente el registro.
- source_word: διέθετο
  english_pob_choice: ordained
  chosen_spanish: dispuso
  alternatives_spanish:
  - ordenó
  - estableció
  - decretó
  lexicon: LSJ
  rationale: En contexto testamentario, el verbo expresa la disposición solemne de últimas instrucciones. «Dispuso» conserva esa fuerza sin imponer el matiz eclesiástico de «ordenó» ni el legal más rígido de «decretó».
- source_word: κατὰ πάντα ἃ ποιήσουσιν
  english_pob_choice: concerning all that they would do
  chosen_spanish: acerca de todo lo que harían
  alternatives_spanish:
  - con respecto a todo lo que harían
  - sobre todo lo que harían
  lexicon: LSJ
  rationale: La frase mira hacia la conducta futura de los hijos. «Acerca de todo lo que harían» sigue de cerca la construcción y su tono instructivo-predictivo.
- source_word: συναντήσει αὐτοῖς
  english_pob_choice: would happen to them
  chosen_spanish: les acontecería
  alternatives_spanish:
  - les sucedería
  - les ocurriría
  - les sobrevendría
  lexicon: LSJ
  rationale: El giro griego sugiere eventos que «se encuentran» con ellos, es decir, lo que les sale al paso. «Les acontecería» conserva ese valor de lo que les vendrá encima sin sonar demasiado coloquial. «Les sobrevendría» es posible, pero más cargado.
- source_word: ἕως ἡμέρας κρίσεως
  english_pob_choice: until the day of judgment
  chosen_spanish: hasta el día del juicio
  alternatives_spanish:
  - hasta el día del juicio final
  - hasta el día del juicio
  lexicon: LSJ
  rationale: «Día del juicio» reproduce el valor formal y escatológico de la expresión. Se evita «juicio final» porque añade precisión doctrinal no explícita en el griego.
- source_word: Ὑγιαίνων
  english_pob_choice: in sound health
  chosen_spanish: en buena salud
  alternatives_spanish:
  - sano
  - bien de salud
  lexicon: LSJ
  rationale: La participio subraya que Levi no estaba ya postrado al llamar a sus hijos. «En buena salud» comunica la misma idea con español natural y digno.
- source_word: ἀπεκαλύφθη
  english_pob_choice: it was revealed
  chosen_spanish: se le reveló
  alternatives_spanish:
  - le fue revelado
  - se dio a conocer
  lexicon: LSJ
  rationale: El pasivo tiene tono de revelación recibida. «Se le reveló» conserva la pasividad y la apertura a una acción divina implícita.
- source_word: μέλλει ἀποθνήσκειν
  english_pob_choice: he was about to die
  chosen_spanish: estaba a punto de morir
  alternatives_spanish:
  - iba a morir
  - estaba por morir
  lexicon: LSJ
  rationale: Expresa con claridad la inminencia de la muerte sin endurecer el tono. «Iba a morir» es posible, pero algo menos solemne.
- source_word: συνήχθησαν
  english_pob_choice: they had gathered together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se habían reunido
  - se congregaron
  lexicon: LSJ
  rationale: El verbo indica la reunión de los hijos en respuesta al llamado de Levi. «Se reunieron» es claro y natural; «se congregaron» suena más litúrgico de lo necesario.
theological_decisions:
- issue: La expresión escatológica ἕως ἡμέρας κρίσεως
  english_pob_reading: until the day of judgment
  chosen_spanish_reading: hasta el día del juicio
  alternative_spanish_readings:
  - hasta el día del juicio final
  rationale: Se mantiene la referencia al juicio venidero sin precisar más de lo que el texto dice. Esto preserva la tensión escatológica en lugar de resolverla con formulaciones doctrinales posteriores.
  doctrine_reference: 'DOCTRINE.md § Translation philosophy: preserve theological tension rather than resolve it'
- issue: El encabezado testamentario como documento escrito
  english_pob_reading: A copy of the words of Levi
  chosen_spanish_reading: Un copiado de las palabras de Leví
  alternative_spanish_readings:
  - Una copia de las palabras de Leví
  - Un registro de las palabras de Leví
  rationale: El texto abre como encabezado documental, no como narración. Se conserva esa lectura y su solemnidad. «Un copiado» es una solución menos natural en español, pero intenta reflejar el carácter de ‘copy’ como documento transmitido; se deja constancia de la alternativa más idiomática.
  doctrine_reference: DOCTRINE.md § Formal documentary headings should remain visibly documentary
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa que ajustó «what he ordained» a «which he ordained» para referirlo naturalmente a «the words». En español se reflejó con una oración relativa natural («las cuales dispuso»). También se respetó la secuencia narrativa del párrafo y el tono formal del encabezado testamentario.
  spanish_consistency_notes:
  - Se usó «Leví» con tilde como forma normalizada en español.
  - Se evitó «SEÑOR» porque aquí no aparece el Tetragrámaton ni una cita directa del nombre divino.
  - Se mantuvo «día del juicio» para conservar la formulación escatológica formal del original.
  - Se prefirió un español de registro bíblico moderno, sin arcaísmos innecesarios.
