translation:
  language: es
  text: "Y en esto[a], el ángel me abrió las puertas del cielo; y vi al santo Altísimo sentado en un trono.\n\n\n    2 Y me dijo: «Leví, a ti te he dado las bendiciones del sacerdocio hasta que, habiendo venido, habite en medio de Israel».\n\n\n    3 Entonces el ángel me bajó a la tierra y me dio un arma y una espada, y me dijo: «Ejecuta venganza en Siquem por Dina, tu hermana, y yo estaré contigo, porque el Señor me ha enviado».\n\n\n    4 Y en aquel tiempo destruí a los hijos de Hamor, como está escrito en las tablas de los padres[b].\n\n\n    5 Y le dije: «Te ruego, Señor, enséñame tu nombre, para que pueda invocarte en un día de aflicción».\n\n\n    6 Y dijo: «Yo soy el ángel que aparta la raza de Israel, para que no los hiera; porque todo espíritu maligno se lanza contra ella».\n\n\n    7 Y después de esto, cuando desperté, bendije al Altísimo."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «en esto». En este contexto visionario, la expresión se entiende como «en esto» o «al ver esto».'
    reason: lexical_alternative
  - marker: b
    text: Griego literalmente, «en las tablas de los padres». En este contexto apocalíptico puede aludir a registros preescritos celestiales, pero el texto conservado no añade «celestiales» de forma explícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅγιον ὕψιστον
  english_pob_choice: the Holy Most High
  chosen_spanish: el santo Altísimo
  alternatives_spanish:
  - el Santo Altísimo
  - el Altísimo santo
  - el Muy Santo Altísimo
  lexicon: LSJ
  rationale: Mantiene el valor reverencial del título compuesto sin volverlo una paráfrasis. En español, ‘santo Altísimo’ conserva la yuxtaposición de adjetivo + título y evita forzar una formulación menos natural.
- source_word: τὰς εὐλογίας τῆς ἱερατείας
  english_pob_choice: the blessings of the priesthood
  chosen_spanish: las bendiciones del sacerdocio
  alternatives_spanish:
  - las bendiciones sacerdotales
  - las bendiciones pertenecientes al sacerdocio
  lexicon: LSJ
  rationale: 'Conserva explícita la relación genitiva: son bendiciones ligadas al sacerdocio, no simplemente el acto de bendecir. ‘Sacerdocio’ refleja bien el alcance institucional del término.'
- source_word: ἕως ἐλθὼν κατοικήσω ἐν μέσῳ τοῦ Ἰσραήλ
  english_pob_choice: until I come and dwell in the midst of Israel
  chosen_spanish: hasta que, habiendo venido, habite en medio de Israel
  alternatives_spanish:
  - hasta que venga y habite en medio de Israel
  - hasta que, cuando venga, habite en medio de Israel
  - hasta venir y habitar en medio de Israel
  lexicon: LSJ
  rationale: La construcción participial + verbo finito se expresa con ‘habiendo venido’ para conservar la secuencia temporal sin perder claridad. ‘En medio de Israel’ mantiene el matiz de presencia interna y comunitaria.
- source_word: ὅπλον καὶ ῥομφαίαν
  english_pob_choice: a weapon and a sword
  chosen_spanish: un arma y una espada
  alternatives_spanish:
  - un arma y un machete
  - un arma y una espada ancha
  - armamento y espada
  lexicon: LSJ
  rationale: Ὅπλον es amplio y el último ajuste inglés prefirió ‘weapon’ sobre ‘shield’. En español, ‘arma’ es la correspondencia más neutral y fiel al valor amplio del término en este contexto.
- source_word: Ποίησον ἐκδίκησιν
  english_pob_choice: Carry out vengeance
  chosen_spanish: Ejecuta venganza
  alternatives_spanish:
  - Haz venganza
  - Realiza venganza
  - Lleva a cabo venganza
  lexicon: LSJ
  rationale: Preserva la fuerza imperativa y el carácter retributivo/judicial de ἐκδίκησις. ‘Ejecuta’ comunica acción deliberada sin suavizar el mandato.
- source_word: συνετέλεσα
  english_pob_choice: I destroyed
  chosen_spanish: destruí
  alternatives_spanish:
  - acabé con
  - doy fin a
  - consumé la destrucción de
  lexicon: LSJ
  rationale: En el contexto de violencia contra los hijos de Hamor, el verbo comunica consumación destructiva. ‘Destruí’ es la forma más directa y sobria en español.
- source_word: ἐν πλαξὶ τῶν πατέρων
  english_pob_choice: on the tablets of the fathers
  chosen_spanish: en las tablas de los padres
  alternatives_spanish:
  - en las tablas de los padres celestiales
  - en las tablas de los antepasados
  - sobre las tablas de los padres
  lexicon: LSJ
  rationale: Se evita introducir ‘celestiales’ porque el griego conservado no lo dice explícitamente. ‘Tablas de los padres’ sigue de cerca el texto y deja abierta la referencia apocalíptica sin resolverla prematuramente.
- source_word: ἐν ἡμέρᾳ θλίψεως
  english_pob_choice: in a day of affliction
  chosen_spanish: en un día de aflicción
  alternatives_spanish:
  - en un día de angustia
  - en un tiempo de aflicción
  - en el día de la tribulación
  lexicon: LSJ
  rationale: Conserva el valor idiomático singular de una ocasión representativa de prueba. ‘Aflicción’ mantiene el registro elevado sin cargarlo con una interpretación más específica.
- source_word: ὁ ἄγγελος ὁ παραιτούμενος τὸ γένος Ἰσραήλ
  english_pob_choice: the angel who declines the race of Israel
  chosen_spanish: el ángel que aparta la raza de Israel
  alternatives_spanish:
  - el ángel que intercede por la raza de Israel
  - el ángel que libra a la raza de Israel
  - el ángel que rehúsa la raza de Israel
  lexicon: LSJ
  rationale: El participio es textualmente difícil. ‘Aparta’ conserva la idea de apartar/alejar de daño sin importar una interpretación más fuerte que el griego no garantiza en esta forma de base. ‘Raza’ mantiene la correspondencia literal con γένος, como en el audit trail inglés.
- source_word: πᾶν πνεῦμα πονηρὸν εἰς αὐτὸν προσβάλλει
  english_pob_choice: for every evil spirit attacks it
  chosen_spanish: porque todo espíritu maligno se lanza contra ella
  alternatives_spanish:
  - porque todo espíritu maligno lo ataca
  - porque todo espíritu malo se abalanza contra ella
  - pues todo espíritu perverso la asalta
  lexicon: LSJ
  rationale: ‘Se lanza contra’ traduce el valor hostil de προσβάλλει con imagen de ataque frontal. Se eligió ‘espíritu maligno’ para reflejar el carácter maléfico del agente y mantener el sustantivo genérico de espíritu.
- source_word: ἔξυπνος γενόμενος
  english_pob_choice: when I awoke
  chosen_spanish: cuando desperté
  alternatives_spanish:
  - al despertar
  - cuando volví en mí
  - al recobrar el sentido
  lexicon: LSJ
  rationale: Es el equivalente natural en español para el cierre de una visión o sueño. Evita una literalidad extraña y conserva el sentido narrativo inmediato.
theological_decisions:
- issue: Habla en primera persona del Altísimo en el v. 2
  english_pob_reading: Retained as first-person divine speech from the enthroned Most High rather than reassigned to the angel.
  chosen_spanish_reading: Se mantiene como habla divina en primera persona del Altísimo entronizado, no reasignada al ángel.
  alternative_spanish_readings:
  - El ángel podría estar hablando en nombre de Dios en todo el pasaje.
  - La línea podría reflejar una transición entre voz divina y voz angélica.
  rationale: El contexto inmediato presenta al Altísimo sentado en un trono y luego habla en primera persona. La traducción española conserva esa tensión sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión textual sin armonización excesiva.
- issue: Sentido de las ‘tablas de los padres’ en el v. 4
  english_pob_reading: Understood as heavenly/prewritten tablets known from apocalyptic tradition, but the adjective ‘heavenly’ is not explicit in the surviving text.
  chosen_spanish_reading: Se traduce literalmente como ‘tablas de los padres’, sin añadir ‘celestiales’.
  alternative_spanish_readings:
  - tablas celestiales de los padres
  - registros de los padres
  - tablas preescritas de los padres
  rationale: La tradición apocalíptica puede estar implícita, pero el griego conservado no obliga a explicitarla. Se deja la referencia abierta y auditables las opciones.
  doctrine_reference: No introducir información interpretativa ausente del texto base.
- issue: Identidad y función del ángel en el v. 6
  english_pob_reading: Protective intercessor for Israel against destruction and demonic assault, though the Greek is textually difficult.
  chosen_spanish_reading: 'Se conserva una formulación literal y ambigua: ‘el ángel que aparta la raza de Israel’ y la explicación de que todo espíritu maligno se lanza contra ella.'
  alternative_spanish_readings:
  - el ángel que intercede por la raza de Israel
  - el ángel que libra a Israel
  - el ángel que evita que Israel sea herido
  rationale: Dado que el pasaje es textualmente difícil y el audit trail revisado prefirió no importar una expansión variante, la versión española retiene la dificultad en vez de resolverla teológicamente.
  doctrine_reference: Preservar la dificultad textual y no sobreinterpretar el papel angélico.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail: se evita importar ‘celestial/heavenly’ al v. 4, se conserva la literalidad difícil del v. 6 en lugar de expandirla con una variante textual, y se respeta la estructura participial del v. 2 con una solución española clara. También se tomó en cuenta la revisión que prefirió ‘weapon’ para ὅπλον, por lo que se tradujo como ‘arma’.'
  spanish_consistency_notes:
  - Se mantiene ‘Altísimo’ para ὕψιστος, con ‘santo’ en minúscula por función adjetival en español.
  - Se conserva ‘raza de Israel’ para γένος, en coherencia con el audit trail inglés y para mantener la amplitud genealógica del término.
  - ‘Tablas’ se usa de manera consistente para πλάξ/πλαξί.
  - Se evita alternar entre ‘Señor’ y ‘Yahvé’ porque el pasaje griego cita Κύριος; aquí el español del pasaje funciona mejor con ‘Señor’ como equivalente contextual en la cita directa.
  - La puntuación y comillas siguen un estilo bíblico moderno y legible para texto litúrgico/estudio.
