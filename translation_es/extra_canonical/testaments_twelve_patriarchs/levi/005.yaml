base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/005.yaml
  text: 'And in this[a], the angel opened to me the gates of heaven, and I saw the holy Most High seated on a throne.


    2 And he said to me, “Levi, to you I have given the blessings of the priesthood until, having come, I dwell in the midst of Israel.”


    3 Then the angel brought me down to the earth and gave me a weapon and a sword, and said to me, “Carry out vengeance in Shechem for Dinah your sister, and I will be with you, because the Lord has sent me.”


    4 And in that time I destroyed the sons of Hamor, as it is written on the tablets of the fathers[b].


    5 And I said to him, “I beg you, Lord, teach me your name, so that I may call on you in a day of affliction.”


    6 And he said, “I am the angel who declines the race of Israel, so that he might not strike them, standing before the race.”


    7 And after this, when I awoke, I blessed the Most High.'
  footnotes:
  - marker: a
    text: Greek literally, 'on the tablets of the fathers.' In this apocalyptic context this likely refers to heavenly tablets, though the adjective 'heavenly' is not explicit in the surviving text.
    reason: lexical_alternative
  - marker: b
    text: The Greek of verse 6 is textually difficult. Some witnesses expand the line to 'so that they may not be struck down utterly,' clarifying the angel's protective role.
    reason: textual_variant
