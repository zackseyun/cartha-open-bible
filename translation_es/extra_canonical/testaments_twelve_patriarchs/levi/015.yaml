translation:
  language: es
  text: Por tanto, el templo que el Señor escogerá quedará desolado en vuestra impureza, y seréis llevados cautivos entre todas las naciones. Seréis una abominación para ellos, y recibiréis oprobio y vergüenza eterna de la recta justicia de Dios. Y todos los que os odian se alegrarán por vuestra destrucción. Y si no fuera por Abraham, Isaac y Jacob, nuestros padres, no recibiríais misericordia; ni uno solo de vuestra descendencia quedaría sobre la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ναός
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  - sagrario
  lexicon: LSJ
  rationale: En este contexto testamental judío, ναός designa el templo de Jerusalén como lugar sagrado escogido por Dios. ‘Templo’ es la equivalencia natural y suficientemente específica en español.
- source_word: ἐκλέξεται
  english_pob_choice: will choose
  chosen_spanish: escogerá
  alternatives_spanish:
  - elegirá
  - seleccionará
  lexicon: LSJ
  rationale: El futuro medio expresa la acción divina de escoger el lugar de culto. ‘Escogerá’ conserva el sentido de elección sin sonar técnico.
- source_word: ἔρημος ἔσται
  english_pob_choice: will become desolate
  chosen_spanish: quedará desolado
  alternatives_spanish:
  - será desierto
  - será arrasado
  lexicon: LSJ
  rationale: La frase comunica devastación y abandono como juicio. ‘Quedará desolado’ reproduce bien el matiz profético en español.
- source_word: ἀκαθαρσία
  english_pob_choice: uncleanness
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia
  - contaminación ritual
  lexicon: LSJ
  rationale: Aquí el campo es cultual y moral. ‘Impureza’ conserva la idea de contaminación ritual sin caer en una forma arcaica o demasiado técnica.
- source_word: αἰχμάλωτοι ἔσεσθε
  english_pob_choice: you will be taken captive
  chosen_spanish: seréis llevados cautivos
  alternatives_spanish:
  - seréis hechos cautivos
  - iréis a cautiverio
  lexicon: LSJ
  rationale: La pasiva se expresa de modo idiomático en español con ‘seréis llevados cautivos’, manteniendo la fuerza de deportación/exilio.
- source_word: βδέλυγμα
  english_pob_choice: abomination
  chosen_spanish: abominación
  alternatives_spanish:
  - objeto de aborrecimiento
  - cosa detestable
  lexicon: LSJ
  rationale: ‘Abominación’ preserva la fuerza moral y de pacto del término en un oráculo de juicio.
- source_word: ὄνειδος
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - afrenta
  lexicon: LSJ
  rationale: ‘Oprobio’ encaja bien con el registro elevado de la denuncia profética y combina con ‘vergüenza eterna’.
- source_word: αἰσχύνην αἰώνιον
  english_pob_choice: everlasting shame
  chosen_spanish: vergüenza eterna
  alternatives_spanish:
  - vergüenza perpetua
  - deshonra eterna
  lexicon: LSJ
  rationale: La expresión mantiene el carácter duradero y solemne del juicio divino sin introducir categorías ajenas al pasaje.
- source_word: δικαιοκρισίας
  english_pob_choice: righteous judgment
  chosen_spanish: recta justicia
  alternatives_spanish:
  - justo juicio
  - juicio de justicia
  lexicon: LSJ
  rationale: El compuesto subraya un juicio caracterizado por rectitud/justicia. ‘Recta justicia’ intenta conservar ambas ideas y evitar reducir el matiz solo a ‘juicio’.
- source_word: ἀπωλείᾳ
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: LSJ
  rationale: En este contexto se refiere al colapso nacional y a la pérdida del pueblo, por lo que ‘destrucción’ es claro y fuerte.
- source_word: ἔλεος λήψεσθε
  english_pob_choice: you would receive mercy
  chosen_spanish: recibiríais misericordia
  alternatives_spanish:
  - obtendríais misericordia
  - hallaríais misericordia
  lexicon: LSJ
  rationale: La condicionalidad del pasaje se expresa con naturalidad en español. ‘Recibiríais misericordia’ conserva la idea de un don concedido.
- source_word: οὐ μὴ καταλειφθῇ
  english_pob_choice: not one ... would be left
  chosen_spanish: ni uno solo ... quedaría
  alternatives_spanish:
  - no quedaría ninguno
  - ni uno ... permanecería
  lexicon: LSJ
  rationale: La negación enfática se transmite con ‘ni uno solo’, que comunica totalidad de manera idiomática en español.
- source_word: σπέρματος
  english_pob_choice: seed
  chosen_spanish: descendencia
  alternatives_spanish:
  - linaje
  - simiente
  lexicon: LSJ
  rationale: Aunque el POB inglés retiene ‘seed’ por su fuerza pactual, en español ‘descendencia’ comunica mejor el linaje sin perder el trasfondo de pacto.
theological_decisions:
- issue: Relación causal entre la impureza del pueblo y la desolación del templo
  english_pob_reading: The temple will become desolate in your uncleanness.
  chosen_spanish_reading: El templo quedará desolado en vuestra impureza.
  alternative_spanish_readings:
  - El templo quedará desolado a causa de vuestra impureza
  - El templo quedará desolado por vuestra impureza
  rationale: El griego usa ἐν τῇ ἀκαθαρσίᾳ ὑμῶν, y la revisión inglesa corrigió ‘because of’ a ‘in’. El español mantiene esa relación textual sin convertirla en una causalidad más explícita de lo que dice el original.
  doctrine_reference: DOCTRINE.md § Original-language primacy over translation tradition
- issue: Justicia de Dios como juicio recto
  english_pob_reading: righteous judgment of God
  chosen_spanish_reading: la recta justicia de Dios
  alternative_spanish_readings:
  - el justo juicio de Dios
  - el juicio recto de Dios
  rationale: El compuesto δικαιοκρισίας expresa un juicio caracterizado por justicia. ‘Recta justicia’ preserva la tensión entre juicio y justicia sin normalizarla demasiado.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve it
- issue: Mercy grounded in the patriarchs
  english_pob_reading: if it were not for Abraham and Isaac and Jacob our fathers, you would receive no mercy
  chosen_spanish_reading: si no fuera por Abraham, Isaac y Jacob, nuestros padres, no recibiríais misericordia
  alternative_spanish_readings:
  - si no fuera por ... no obtendríais misericordia
  - si no fuera por ... no hallaríais misericordia
  rationale: 'La traducción conserva de forma directa la lógica pactal del pasaje: la misericordia vendría solo por causa de los patriarcas. No se suaviza a una mera referencia ejemplar.'
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que cambió ‘because of your uncleanness’ por ‘in your uncleanness’ para reflejar con mayor precisión ἐν τῇ ἀκαθαρσίᾳ ὑμῶν. La redacción española sigue esa corrección con ‘en vuestra impureza’. También se respetó la continuidad del resto del audit trail, incluyendo ‘righteous judgment’ y la retención del sentido pactual de la descendencia.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento plural reverencial/no reverencial coherente con un tono profético directo ('vosotros/vuestra').
  - ‘Señor’ se usa para κύριος conforme a la convención del proyecto cuando no hay un intento de ocultar el nombre divino en este testamento.
  - No se añadieron notas al pie porque no había una alternativa textual que requiriera anclaje explícito en el texto español; las decisiones léxicas se documentan en los campos de auditoría.
