base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/015.yaml
  text: Therefore the temple which the Lord will choose will become desolate in your uncleanness[15:1], and you will be taken captive among all the nations. And you will be an abomination to them, and you will receive reproach and everlasting shame from the righteous judgment of God. And all who hate you will rejoice over your destruction. And if it were not for Abraham and Isaac and Jacob our fathers, you would receive no mercy[15:4][15:2]; not one from your seed would be left upon the earth.
  footnotes:
  - marker: '15:1'
    text: Or 'sanctuary'; the Greek ναός specifically denotes the holy temple.
    reason: lexical_alternative
  - marker: '15:2'
    text: '''Righteous judgment'' could also be rendered ''just judgment.'''
    reason: lexical_alternative
  - marker: '15:4'
    text: The Greek uses 'seed,' a covenantal lineage term; 'offspring' or 'descendants' would be smoother English.
    reason: lexical_alternative
