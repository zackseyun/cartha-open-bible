  text: XV. Διὰ¹ τοῦτο² *ὁ ναός³, ὃν⁴ ἐκλέξεται⁵ κύριος⁶, *ἔρημος ἔσται⁷ *ἐν τῇ ἀκαθαρσίᾳ ὑμῶν⁸, καὶ ὑμεῖς αἰχμάλωτοι ἔσεσθε εἰς πάντα τὰ ἔθνη. 2. Καὶ *ἔσεσθε βδέλυγμα⁹ αὐτοῖς¹⁰, καὶ λήψεσθε¹¹ ὄνειδος¹² καὶ αἰσχύνην αἰώνιον παρὰ *τῆς δικαιοκρισίας¹³ τοῦ Θεοῦ. 3. Καὶ πάντες οἱ μισοῦντες¹⁴ ὑμᾶς *χαρήσονται ἐπὶ τῇ ἀπωλείᾳ¹⁵ ὑμῶν¹⁶. 4. Καὶ¹⁷ εἰ μὴ¹⁸ δι᾽ Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακὼβ *τῶν πατέρων ἡμῶν ἔλεος λήψεσθε¹⁹, εἷς²⁰ ἐκ τοῦ σπέρματος²¹ ὑμῶν²² *οὐ μὴ²³ καταλειφθῇ²⁴ ἐπὶ τῆς γῆς.
