base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/007/001.yaml
  text: And I said to my father Jacob, “In you the Lord will bring the Canaanites to nothing, and he will give their land to you and to your seed after you.”
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: Removed the footnote marker after Jacob and closed the quotation mark. Kept the wording otherwise unchanged, as it is accurate and complete.
translation:
  language: es
  text: 'Y dije a mi padre Jacob: «En ti Yahvé aniquilará a los cananeos y dará su tierra a ti y a tu descendencia después de ti».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Dios
  lexicon: YHWH
  rationale: El griego usa Κύριος como referencia al Nombre divino; conforme al criterio del proyecto, en español se vierte como Yahvé y no como un enmascaramiento genérico, para conservar la identidad del sujeto de la acción.
- source_word: ἐξουδενώσει
  english_pob_choice: will bring ... to nothing
  chosen_spanish: aniquilará
  alternatives_spanish:
  - reducirá a nada
  - despreciará
  lexicon: ἐξουδενόω
  rationale: La frase inglesa expresa destrucción/anulación efectiva de los cananeos; 'aniquilará' comunica con fuerza esa nulificación en español sin introducir un matiz distinto.
- source_word: Χαναναίους
  english_pob_choice: the Canaanites
  chosen_spanish: a los cananeos
  alternatives_spanish:
  - a los cananeos de Canaán
  - a los cananeos
  lexicon: Χαναναῖοι
  rationale: Se mantiene el etnónimo directo y reconocido en español bíblico, con objeto directo explícito concordante con el verbo.
- source_word: σπέρματί σου
  english_pob_choice: your seed
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tu linaje
  lexicon: σπέρμα
  rationale: En español bíblico, 'descendencia' preserva la referencia genealógica y la fuerza colectiva de σπέρμα sin sonar arcaico o ambiguo para lectores modernos.
theological_decisions:
- issue: Uso del Nombre divino en una promesa de juicio y herencia
  english_pob_reading: the Lord will bring the Canaanites to nothing
  chosen_spanish_reading: Yahvé aniquilará a los cananeos
  alternative_spanish_readings:
  - el Señor aniquilará a los cananeos
  - Dios aniquilará a los cananeos
  rationale: La lectura mantiene al sujeto divino identificado con el Nombre yahvista, coherente con la convención del proyecto y con el trasfondo del texto griego. No se suaviza la acción judicial del verbo.
  doctrine_reference: Nombre divino / fidelidad pactual
- issue: Promesa de tierra a Jacob y a su descendencia
  english_pob_reading: he will give their land to you and to your seed after you
  chosen_spanish_reading: dará su tierra a ti y a tu descendencia después de ti
  alternative_spanish_readings:
  - dará la tierra de ellos a ti y a tu descendencia después de ti
  - te dará su tierra a ti y a tu descendencia después de ti
  rationale: Se conserva la estructura posesiva del original y la idea de continuidad pactual 'después de ti', sin añadir explicaciones interpretativas.
  doctrine_reference: Promesa de tierra / pacto patriarcal
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que eliminó el marcador de nota tras 'Jacob' y cerró correctamente la comilla; por eso la versión española también omite cualquier nota allí y presenta una puntuación cerrada y publicable.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como traducción del sujeto divino en coherencia con la terminología del proyecto.
  - '''descendencia'' se usa de manera consistente para σπέρμα en contextos genealógicos/pactuales.'
  - No se añadió nota al nombre 'Jacob' porque la revisión auditada eliminó ese marcador como no necesario.
