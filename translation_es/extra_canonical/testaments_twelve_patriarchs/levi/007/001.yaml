  text: Καὶ εἶπον¹ Γἐγὼ²⁾ τῷ πατρί μου³, Ἰακώβ⁴, ὅτι ἐν σοὶ ἐξουδενώσει⁵ Κύριος⁶ τοὺς Χαναναίους⁷ καὶ δώσει⁸ τὴν γῆν αὐτῶν σοι καὶ τῷ σπέρματί σου μετὰ σε.
