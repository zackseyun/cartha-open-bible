reference: Testament of Levi 7:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Ἔσται γὰρ ἀπὸ τῆς⁹ σήμερον *ἡ Σύκημα¹⁰ λεγομένη πόλις ἀσυνέτων¹¹, ὅτι¹² ὡσεί¹³ τις *χλευάσει μωρὸν¹⁴ οὕτως ἐχλευάσαμεν αὐτούς¹⁵.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/007/002.yaml
  text: For from this day the city called Sychem shall be a city of senseless people. For just as someone mocks a fool, so we mocked them,
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: Changed 'fools' to 'senseless people' to reflect ἀσυνέτων more closely; kept the rest unchanged.
translation:
  language: es
  text: Porque desde este día la ciudad llamada Siquem será una ciudad de gente insensata. Pues así como alguien se burla de un necio, así nos burlamos de ellos,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἔσται γὰρ ἀπὸ τῆς σήμερον
  english_pob_choice: For from this day
  chosen_spanish: Porque desde este día
  alternatives_spanish:
  - Pues desde este día
  - Porque a partir de hoy
  lexicon: γάρ; ἀπό; σήμερον
  rationale: «Porque» conserva la relación explicativa causal del γάρ; «desde este día» refleja ἀπό τῆς σήμερον de forma natural en español, manteniendo el tono oracular del enunciado.
- source_word: ἡ Σύκημα λεγομένη πόλις
  english_pob_choice: the city called Sychem
  chosen_spanish: la ciudad llamada Siquem
  alternatives_spanish:
  - la ciudad llamada Sychem
  - la ciudad conocida como Siquem
  lexicon: πόλις; λεγομένη; Σύκημα
  rationale: Se conserva el nombre propio bíblico en la forma castellana más reconocible, «Siquem», y «llamada» reproduce bien λεγομένη sin añadir matices ajenos.
- source_word: ἀσυνέτων
  english_pob_choice: senseless people
  chosen_spanish: gente insensata
  alternatives_spanish:
  - gente sin entendimiento
  - personas insensatas
  - gente necia
  lexicon: ἀσύνετος
  rationale: «Insensata» expresa la falta de juicio o entendimiento que el inglés POB aclaró como «senseless people». «Gente» mantiene el sustantivo colectivo, evitando reducirlo a un mero adjetivo aplicado a la ciudad.
- source_word: ὡσεί τις χλευάσει μωρόν
  english_pob_choice: just as someone mocks a fool
  chosen_spanish: así como alguien se burla de un necio
  alternatives_spanish:
  - como alguien se burla de un necio
  - tal como uno se burla de un necio
  - así como alguien ridiculiza a un necio
  lexicon: ὡσεί; χλευάζω; μωρός
  rationale: «Así como» corresponde a ὡσεί; «se burla de» traduce χλευάζω con naturalidad en español bíblico moderno; «necio» conserva el campo semántico de μωρός mejor que «tonto» o «estúpido».
- source_word: οὕτως ἐχλευάσαμεν αὐτούς
  english_pob_choice: so we mocked them
  chosen_spanish: así nos burlamos de ellos
  alternatives_spanish:
  - así los burlamos
  - de la misma manera nos burlamos de ellos
  - así los ridiculizamos
  lexicon: οὕτως; ἐχλευάσαμεν; αὐτούς
  rationale: Se mantiene la correlación comparativa con «así». «Nos burlamos de ellos» sigue el verbo elegido para χλευάζω y expresa el sujeto plural explícito del griego sin sobretraducir el pronombre.
theological_decisions:
- issue: Caracterización moral de la ciudad como «insensata»
  english_pob_reading: the city called Sychem shall be a city of senseless people
  chosen_spanish_reading: la ciudad llamada Siquem será una ciudad de gente insensata
  alternative_spanish_readings:
  - será una ciudad de necios
  - será una ciudad sin entendimiento
  rationale: Se preserva la dureza evaluativa del texto sin intensificarla más allá de ἀσυνέτων. «Insensata» y «sin entendimiento» son posibles, pero «insensata» encaja mejor con el registro proverbial y moral del pasaje.
  doctrine_reference: Sabiduría bíblica / lenguaje moral evaluativo
- issue: Identidad de quien habla en primera persona plural
  english_pob_reading: so we mocked them
  chosen_spanish_reading: así nos burlamos de ellos
  alternative_spanish_readings:
  - así los burlamos
  - así nos reímos de ellos
  rationale: La primera persona plural se conserva porque está explícita en el griego y forma parte del testimonio narrativo del hablante. «Nos burlamos de ellos» mantiene la implicación colectiva sin cambiar el referente.
  doctrine_reference: Lectura narrativa del discurso testamental
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «fools» por «senseless people» para reflejar con mayor precisión ἀσυνέτων. La redacción española adopta esa actualización mediante «gente insensata», evitando un equivalente demasiado fuerte como «necios» en la cláusula principal, aunque conserva «necio» en la comparación para μωρόν.
  spanish_consistency_notes:
  - Se mantiene «Siquem» para la topografía bíblica en vez de transliteración inglesa.
  - Se distingue entre ἀσυνέτων («insensata») y μωρόν («necio») para no fusionar dos términos griegos diferentes.
  - El tono general sigue siendo sobrio y declarativo, apto para lectura pública.
