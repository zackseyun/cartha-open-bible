translation:
  language: es
  text: Y habiendo partido, llegamos a Dinán Betel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀπάραντες
  english_pob_choice: And departing
  chosen_spanish: Y habiendo partido
  alternatives_spanish:
  - Y partiendo
  - Y después de partir
  - Y salimos
  lexicon: ἀπαίρω
  rationale: El participio aoristo se entiende naturalmente como acción previa a ‘llegamos’; en español, ‘habiendo partido’ conserva esa anterioridad sin introducir un objeto no expresado.
- source_word: ἤλθομεν
  english_pob_choice: we came
  chosen_spanish: llegamos
  alternatives_spanish:
  - vinimos
  - fuimos
  - arribamos
  lexicon: ἔρχομαι
  rationale: ‘Llegamos’ comunica bien el movimiento con destino final y suena más natural en español bíblico moderno que una literalidad rígida.
- source_word: Δίναν Βεθήλ
  english_pob_choice: Dinan Bethel
  chosen_spanish: Dinan Betel
  alternatives_spanish:
  - Dinan Bethel
  - Dinán Betel
  - Dinan-Betel
  lexicon: toponimia
  rationale: Se conserva el nombre propio ‘Dinan’ que el texto griego explicita, y se adapta ‘Βεθήλ’ a la forma española estable ‘Betel’.
theological_decisions:
- issue: Presencia del topónimo adicional Δίναν
  english_pob_reading: restored ‘Dinan’ so the place name Δίναν is not omitted
  chosen_spanish_reading: se conserva ‘Dinan’ en el texto principal
  alternative_spanish_readings:
  - omitir Dinan y decir solo Betel
  - glosar Dinan como nota
  rationale: No hay base para omitir el topónimo atestiguado en el griego. Mantenerlo evita aplanar el testimonio textual y sigue la revisión reciente del audit trail.
  doctrine_reference: principio de fidelidad textual
translation_notes:
  revision_awareness: La revisión más reciente corrigió la omisión de ‘Dinan’ y evitó un objeto implícito (‘her’) que no estaba en el griego. La versión española sigue esa adjudicación y refleja la secuencia participial sin introducir elementos ajenos.
  spanish_consistency_notes:
  - Se usa ‘Betel’ como forma española habitual de Βεθήλ.
  - No se introduce artículo definido antes de ‘Dinan Betel’ para no alterar la toponimia del original.
  - Se mantiene un tono sobrio y narrativo, acorde con el estilo de la serie POB.
