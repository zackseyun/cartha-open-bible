  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Ὅτι καίγε¹⁶ ἀφροσύνην ἔπραξαν ἐν Ἰσραὴλ μιάναντες¹⁷ τὴν ἀδελφήν μου¹⁸.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/007/003.yaml
  text: because they indeed committed folly in Israel, defiling my sister.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:58Z'
    unchanged: false
    changes_summary: Added a comma to better reflect the participial clause and make the sentence flow more naturally while preserving the source meaning.
translation:
  language: es
  text: porque ciertamente cometieron necedad en Israel, profanando a mi hermana.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀφροσύνην
  english_pob_choice: folly
  chosen_spanish: necedad
  alternatives_spanish:
  - insensatez
  - locura
  - necedad
  lexicon: ἀφροσύνη
  rationale: El griego expresa falta de juicio moral, no solo torpeza intelectual. «Necedad» comunica bien esa culpa moral en un español claro y bíblico sin volverlo arcaico.
- source_word: ἔπραξαν
  english_pob_choice: committed
  chosen_spanish: cometieron
  alternatives_spanish:
  - hicieron
  - obraron
  - cometieron
  lexicon: πράσσω
  rationale: «Cometieron» reproduce la fuerza de una acción culpable; en este contexto encaja mejor que un simple «hicieron».
- source_word: ἐν Ἰσραήλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - en Israel
  lexicon: ἐν + Ἰσραήλ
  rationale: Se conserva la referencia territorial y comunitaria de la frase sin necesidad de expansión.
- source_word: μιάναντες
  english_pob_choice: defiling
  chosen_spanish: profanando
  alternatives_spanish:
  - contaminando
  - manchando
  - profanando
  lexicon: μιαίνω
  rationale: El participio comunica una acción degradante o contaminante. «Profanando» mantiene la carga moral y cultual del verbo sin sonar demasiado técnico en español.
- source_word: τὴν ἀδελφήν μου
  english_pob_choice: my sister
  chosen_spanish: mi hermana
  alternatives_spanish:
  - mi hermana
  lexicon: ἀδελφή
  rationale: Traducción directa y transparente del posesivo y del sustantivo. No se añade aclaración porque el texto no la requiere.
theological_decisions:
- issue: Alcance moral y cultual de «defiling/profanando»
  english_pob_reading: defiling my sister
  chosen_spanish_reading: profanando a mi hermana
  alternative_spanish_readings:
  - contaminando a mi hermana
  - deshonrando a mi hermana
  rationale: El griego permite una idea de contaminación/profanación que tiene resonancia ética y ritual. «Profanando» preserva esa tensión mejor que una paráfrasis puramente social como «deshonrando».
  doctrine_reference: Pureza ritual / santidad moral en el lenguaje bíblico
translation_notes:
  revision_awareness: La revisión inglesa reciente solo ajustó la puntuación para reflejar mejor la cláusula participial. En español, la coma antes del participio («...en Israel, profanando...») ya expresa naturalmente ese mismo flujo sintáctico, sin necesidad de nota adicional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - Se conserva el tono sobrio y publication-readable, evitando una paráfrasis explicativa que debilitaría la fuerza moral del original.
  - No se introducen notas al pie porque el griego y el inglés auditado no requieren una alternativa textual decisiva para este versículo.
