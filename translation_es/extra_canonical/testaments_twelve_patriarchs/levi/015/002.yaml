  text: Καὶ *ἔσεσθε βδέλυγμα⁹ αὐτοῖς¹⁰, καὶ λήψεσθε¹¹ ὄνειδος¹² καὶ αἰσχύνην αἰώνιον παρὰ *τῆς δικαιοκρισίας¹³ τοῦ Θεοῦ.
