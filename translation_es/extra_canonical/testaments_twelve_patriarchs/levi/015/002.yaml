translation:
  language: es
  text: Y serán una abominación para ellos, y recibirán oprobio y vergüenza eterna de parte del justo juicio de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: βδέλυγμα
  english_pob_choice: abomination
  chosen_spanish: abominación
  alternatives_spanish:
  - repugnancia
  - cosa detestable
  lexicon: βδέλυγμα
  rationale: Mantiene el fuerte valor de repulsión moral/religiosa del término griego y corresponde bien al inglés auditado. En español, 'abominación' conserva la fuerza sin suavizarla indebidamente.
- source_word: ὄνειδος
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - deshonra
  lexicon: ὄνειδος
  rationale: '''Oprobio'' comunica mejor la carga de vergüenza pública y desprecio que ''reproche'' en español, sin perder el matiz de afrenta social presente en el contexto.'
- source_word: αἰσχύνην αἰώνιον
  english_pob_choice: everlasting shame
  chosen_spanish: vergüenza eterna
  alternatives_spanish:
  - vergüenza perpetua
  - afrenta eterna
  lexicon: αἰσχύνη
  rationale: '''Vergüenza eterna'' reproduce con naturalidad el paralelismo del texto y conserva el adjetivo durativo; ''eterna'' expresa el alcance sin introducir paráfrasis.'
- source_word: δικαιοκρισίας τοῦ Θεοῦ
  english_pob_choice: the righteous judgment of God
  chosen_spanish: el justo juicio de Dios
  alternatives_spanish:
  - el juicio justo de Dios
  - la justa sentencia de Dios
  lexicon: δικαιοκρισία
  rationale: La forma 'justo juicio' preserva la relación entre justicia y juicio con un sintagma natural en español. 'Sentencia' sería posible, pero estrecha más el campo legal que el griego permite.
theological_decisions:
- issue: Cómo traducir δικαιοκρισία sin borrar su tensión entre justicia y juicio
  english_pob_reading: righteous judgment of God
  chosen_spanish_reading: el justo juicio de Dios
  alternative_spanish_readings:
  - el juicio justo de Dios
  - la justicia judicial de Dios
  rationale: 'Se mantiene la combinación de rectitud y juicio, sin convertirla en una abstracción distinta. ''Justo juicio'' conserva la ambigüedad productiva del original: juicio conforme a la justicia divina.'
  doctrine_reference: Justicia/juicio divinos
- issue: Intensidad del destino final expresado por αἰώνιον
  english_pob_reading: everlasting shame
  chosen_spanish_reading: vergüenza eterna
  alternative_spanish_readings:
  - vergüenza perpetua
  - afrenta eterna
  rationale: '''Eterna'' comunica duración indefinida y mantiene la severidad escatológica del texto. No se atenúa a una vergüenza temporal ni se interpreta simbólicamente.'
  doctrine_reference: Juicio final
translation_notes:
  revision_awareness: La versión inglesa auditada no introdujo notas ni variantes; la redacción española sigue de cerca el sentido del griego y mantiene el paralelismo retórico del versículo sin añadir material interpretativo.
  spanish_consistency_notes:
  - Se conserva 'Dios' para Θεός y no se usa 'SEÑOR', porque el texto griego nombra explícitamente a Dios.
  - '''Abominación'' y ''oprobio'' mantienen la fuerza despectiva del pasaje.'
  - 'El orden español se ajusta para sonar natural, pero sin alterar la progresión: resultado social (''abominación''/''oprobio'') seguido de fundamento teológico (''justo juicio de Dios'').'
