base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/015/002.yaml
  text: And you will be an abomination to them, and you will receive reproach and everlasting shame from the righteous judgment of God.
  revision_pass:
    model: gpt-5.4-mini
