base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/015/004.yaml
  text: And if it were not for Abraham and Isaac and Jacob, our fathers, you would receive no mercy; not one of your seed would be left on the earth.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: Improved punctuation for natural English and clearer apposition of 'our fathers'; preserved the source meaning of 'not one of your seed would be left on the earth.'
translation:
  language: es
  text: Y si no fuera por Abraham, Isaac y Jacob, nuestros padres, no recibirían misericordia; no quedaría en la tierra ni uno de tu descendencia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔλεος λήψεσθε
  english_pob_choice: you would receive no mercy
  chosen_spanish: no recibirían misericordia
  alternatives_spanish:
  - no obtendrían misericordia
  - no recibirían compasión
  lexicon: ἔλεος
  rationale: Se mantiene el sustantivo concreto «misericordia», que es el equivalente natural y estable en español para ἔλεος; «recibir» conserva bien la construcción pasiva de resultadо sin volverla pesada.
- source_word: τῶν πατέρων ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  - nuestros padres ancestrales
  lexicon: πατήρ
  rationale: El contexto patriarcal apunta a los patriarcas de Israel; «nuestros padres» reproduce la fórmula bíblica tradicional y sigue el sentido del inglés POB sin sobreexplicar.
- source_word: σπέρματος
  english_pob_choice: your seed
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu linaje
  - tu simiente
  lexicon: σπέρμα
  rationale: «Descendencia» comunica con claridad el valor genealógico de σπέρμα en español actual; «simiente» sería más literal pero menos natural y potencialmente ambiguo.
- source_word: καταλειφθῇ
  english_pob_choice: would be left
  chosen_spanish: quedaría
  alternatives_spanish:
  - sería dejado
  - permanecería
  lexicon: καταλείπω
  rationale: «Quedaría» expresa la idea de permanecer/restenar en la tierra con fluidez natural, sin añadir una pasiva dura que en español suena menos idiomática.
theological_decisions:
- issue: Referencia a los patriarcas como causa mediadora de misericordia
  english_pob_reading: And if it were not for Abraham and Isaac and Jacob, our fathers, you would receive no mercy
  chosen_spanish_reading: Y si no fuera por Abraham, Isaac y Jacob, nuestros padres, no recibirían misericordia
  alternative_spanish_readings:
  - Y si no fuera por Abraham, Isaac y Jacob, nuestros padres, no obtendrían misericordia
  - Y si no fuera por Abraham, Isaac y Jacob, nuestros padres, no habría misericordia para ustedes
  rationale: 'Se conserva la relación causal implícita del texto: la misericordia hacia los oyentes está mediada por la memoria/pacto asociado a los patriarcas. No se añade explicación doctrinal fuera de lo que el verso afirma.'
  doctrine_reference: Pacto patriarcal / misericordia divina mediada por los patriarcas
- issue: Negación enfática de supervivencia de la descendencia
  english_pob_reading: not one of your seed would be left on the earth
  chosen_spanish_reading: no quedaría en la tierra ni uno de tu descendencia
  alternative_spanish_readings:
  - no sería dejado en la tierra ni uno de tu descendencia
  - no permanecería en la tierra ni uno de tu descendencia
  rationale: La negación enfática se conserva con «ni uno» y «no quedaría», reproduciendo la fuerza absoluta del griego οὐ μὴ sin suavizarla. Se evita introducir una idea de destrucción explícita que el verso no verbaliza.
  doctrine_reference: Juicio y preservación del linaje
- issue: Uso de plural verbal en la segunda cláusula
  english_pob_reading: not one of your seed would be left
  chosen_spanish_reading: no quedaría en la tierra ni uno de tu descendencia
  alternative_spanish_readings:
  - no quedarían en la tierra ni uno de tu descendencia
  - no se dejaría en la tierra ni uno de tu descendencia
  rationale: 'Aunque «descendencia» es singular colectivo, el sentido global es distributivo: ningún descendiente quedaría. El singular verbal evita una discordancia innecesaria y mantiene el foco en la totalidad del grupo.'
  doctrine_reference: Concordancia de colectivo singular en español bíblico
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente solo ajustó la puntuación y clarificó la apposición de «our fathers», sin cambiar el contenido. La traducción española sigue ese mismo sentido estable: patriarcas identificados como «nuestros padres» y negación absoluta de que quede descendencia en la tierra.'
  spanish_consistency_notes:
  - Se usa «misericordia» para ἔλεος, conforme a la terminología bíblica estándar y al inglés POB.
  - Se usa «descendencia» para σπέρμα por claridad natural en español; no se emplea «simiente» salvo necesidad estilística o intertextual específica.
  - Se conserva «Y si no fuera por... » para reflejar la condición irreal del griego con naturalidad en español.
  - No se introduce «SEÑOR» ni «Cristo» porque el verso no los contiene.
  - La puntuación separa claramente la cláusula condicional de la consecuencia, siguiendo la revisión inglesa más reciente.
