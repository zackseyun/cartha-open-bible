source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: Καὶ¹⁷ εἰ μὴ¹⁸ δι᾽ Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακὼβ *τῶν πατέρων ἡμῶν ἔλεος λήψεσθε¹⁹, εἷς²⁰ ἐκ τοῦ σπέρματος²¹ ὑμῶν²² *οὐ μὴ²³ καταλειφθῇ²⁴ ἐπὶ τῆς γῆς.
