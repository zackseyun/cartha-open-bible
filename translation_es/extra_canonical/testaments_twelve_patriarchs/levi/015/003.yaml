translation:
  language: es
  text: Y todos los que te odian se alegrarán por tu destrucción.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μισοῦντες
  english_pob_choice: hate
  chosen_spanish: odian
  alternatives_spanish:
  - aborrecen
  - odian profundamente
  lexicon: μισέω
  rationale: El griego expresa un odio real y activo; en español, «odiar» comunica con mayor naturalidad y fuerza el mismo valor lexical que la traducción inglesa mantuvo con «hate». «Aborrecer» es posible, pero suena más literario y algo menos directo.
- source_word: χαρήσονται
  english_pob_choice: will rejoice
  chosen_spanish: se alegrarán
  alternatives_spanish:
  - se regocijarán
  - se gozarán
  lexicon: χαίρω
  rationale: El futuro pasivo/medio en este contexto expresa alegría o gozo por el resultado. «Se alegrarán» es claro y sobrio en español; «se regocijarán» conserva más tono bíblico, pero puede sonar más marcado estilísticamente.
- source_word: ἀπώλειαν
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: ἀπώλεια
  rationale: «Destrucción» reproduce bien el sentido básico de pérdida total o arruinamiento. «Perdición» podría sugerir condena espiritual en español, algo más interpretativo que el griego aquí. «Ruina» también es viable, pero menos exacta al paralelo con el inglés POB.
theological_decisions:
- issue: El destinatario plural y el alcance universal de los enemigos
  english_pob_reading: And all who hate you
  chosen_spanish_reading: Y todos los que te odian
  alternative_spanish_readings:
  - Y todos los que os odian
  - Y todos cuantos te odian
  rationale: El griego tiene ὑμᾶς, un plural. Sin embargo, el contexto inmediato en esta línea puede dirigirse al receptor singular del discurso profético. Para evitar sobrecorregir sin más contexto, se mantiene el valor del inglés POB y del flujo directo en singular de la versión base, aunque el plural griego queda anotado en la conciencia de revisión.
  doctrine_reference: Coherencia de persona gramatical en discurso exhortativo/profético; fidelidad al audit trail sin introducir una armonización no atestiguada.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requieren cambios; esta propuesta respeta el texto inglés POB y ajusta únicamente la expresión española al griego fuente, sin añadir material interpretativo.
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y bíblico, evitando un castellano arcaizante innecesario.
  - No se introduce «Mesías», «SEÑOR» ni otra terminología no pertinente al verso.
  - La construcción con «se alegrarán por» sigue de cerca la relación de la frase griega con ἐπὶ más dativo, sin forzar una paráfrasis más amplia.
