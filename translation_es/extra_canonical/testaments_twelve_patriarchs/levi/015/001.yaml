base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/levi/015/001.yaml
  text: Therefore the temple which the Lord will choose will become desolate in your uncleanness, and you will be taken captive to all the nations.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:59Z'
    unchanged: false
    changes_summary: 'Removed the bracketed verse marker from the main text and tightened the final clause to reflect the source more directly: ''among all the nations'' → ''to all the nations''.'
translation:
  language: es
  text: Por tanto, el templo que el Señor escogerá quedará desolado en su impureza, y serán llevados cautivos a todas las naciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ ναός
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el santuario
  - el templo sagrado
  lexicon: ναός
  rationale: ναός designa aquí el edificio del templo; "el templo" es el equivalente natural y fiel en español, sin añadir matices no presentes en el griego.
- source_word: ἐκλέξεται κύριος
  english_pob_choice: the Lord will choose
  chosen_spanish: el Señor escogerá
  alternatives_spanish:
  - el Señor elegirá
  - Yahvé escogerá
  lexicon: ἐκλέγομαι / κύριος
  rationale: El verbo expresa elección futura; "escogerá" comunica bien la selección divina. Se mantiene "Señor" porque el texto griego usa κύριος en el marco de la cita/audición del nombre divino, aunque el POB español normalmente prefiere "Yahvé" en textos directos del nombre hebreo.
- source_word: ἔρημος ἔσται
  english_pob_choice: will become desolate
  chosen_spanish: quedará desolado
  alternatives_spanish:
  - será desolado
  - se volverá desolado
  lexicon: ἔρημος / ἔρημος ἔσται
  rationale: La construcción indica un estado resultante de desolación; "quedará desolado" suena natural en español y conserva el valor pasivo/resultativo.
- source_word: ἐν τῇ ἀκαθαρσίᾳ ὑμῶν
  english_pob_choice: in your uncleanness
  chosen_spanish: en vuestra impureza
  alternatives_spanish:
  - en vuestra inmundicia
  - por causa de vuestra impureza
  lexicon: ἀκαθαρσία
  rationale: ἀκαθαρσία puede referirse a impureza ritual/moral. "Impureza" preserva esa amplitud sin cargar de forma excesiva la expresión. Se usa "vuestra" para reflejar el plural del griego y mantener un registro bíblico claro.
- source_word: αἰχμάλωτοι ἔσεσθε
  english_pob_choice: you will be taken captive
  chosen_spanish: seréis llevados cautivos
  alternatives_spanish:
  - seréis cautivos
  - iréis al cautiverio
  lexicon: αἰχμάλωτος
  rationale: El griego comunica cautiverio como resultado de ser llevados; "seréis llevados cautivos" conserva tanto la pasividad como el sentido de deportación.
- source_word: εἰς πάντα τὰ ἔθνη
  english_pob_choice: to all the nations
  chosen_spanish: a todas las naciones
  alternatives_spanish:
  - entre todas las naciones
  - a todos los pueblos
  lexicon: εἰς + acusativo / ἔθνη
  rationale: La revisión inglesa ya precisó "to all the nations" frente a "among". En español, "a todas las naciones" reproduce esa dirección sin introducir la idea relacional de "entre".
theological_decisions:
- issue: Título divino κύριος en un contexto de elección del templo
  english_pob_reading: the Lord will choose
  chosen_spanish_reading: el Señor escogerá
  alternative_spanish_readings:
  - Yahvé escogerá
  - el Señor elegirá
  rationale: Aunque el proyecto suele rendir el nombre divino como "Yahvé", aquí el texto griego presenta κύριος en una formulación tradicional de cita. Se mantiene "Señor" para respetar el audit trail y la forma recibida sin ocultar el referente divino.
  doctrine_reference: Nombre divino / forma citacional
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó cualquier marcador intratextual y ajustó la cláusula final de "among all the nations" a "to all the nations". La traducción española sigue esa revisión, sin añadir notas ni marcadores no anclados.
  spanish_consistency_notes:
  - Se mantiene el plural reverencial "vuestra/vosotros" para corresponder al plural griego de segunda persona.
  - No se introduce "Yahvé" porque el testimonio griego transmitido usa κύριος; se conserva la tensión terminológica documentada en el proyecto.
  - '"Impureza" conserva el campo semántico amplio de ἀκαθαρσία sin reducirlo solo a lo ritual o solo a lo moral.'
