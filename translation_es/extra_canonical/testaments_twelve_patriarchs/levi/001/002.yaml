translation:
  language: es
  text: 'Pues estaba en buena salud cuando los llamó a reunirse con él; pero se le reveló que estaba por morir. Y cuando se habían reunido, les dijo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὑγιαίνων
  english_pob_choice: in sound health
  chosen_spanish: en buena salud
  alternatives_spanish:
  - sano
  - con buena salud
  lexicon: ὑγιαίνω
  rationale: El participio expresa el estado físico de estar sano o en buena salud. «En buena salud» conserva bien el sentido y suena natural en español bíblico contemporáneo sin reducirlo a un mero adjetivo de estado.
- source_word: ἐκάλεσεν αὐτοὺς πρὸς ἑαυτόν
  english_pob_choice: he called them to himself
  chosen_spanish: los llamó a reunirse con él
  alternatives_spanish:
  - los llamó a sí
  - los convocó ante sí
  lexicon: καλέω + πρὸς ἑαυτόν
  rationale: La construcción indica convocatoria hacia su presencia. «A reunirse con él» comunica el movimiento relacional de la frase en español natural; «los llamó a sí» sería más literal pero menos idiomático.
- source_word: ἀπεκαλύφθη δὲ αὐτῷ
  english_pob_choice: but it was revealed to him
  chosen_spanish: pero se le reveló
  alternatives_spanish:
  - pero le fue revelado
  - pero se le dio a conocer
  lexicon: ἀποκαλύπτω
  rationale: La pasiva divina/impersonal se refleja bien con «se le reveló», que mantiene la forma pasiva y evita introducir un sujeto no expresado por el griego.
- source_word: μέλλει ἀποθνήσκειν
  english_pob_choice: he was about to die
  chosen_spanish: estaba por morir
  alternatives_spanish:
  - iba a morir
  - estaba a punto de morir
  lexicon: μέλλω + ἀποθνήσκω
  rationale: La perífrasis marca inminencia futura. «Estaba por morir» es breve, natural y fiel a la inminencia sin intensificar innecesariamente el matiz.
- source_word: συνήχθησαν
  english_pob_choice: they had gathered together
  chosen_spanish: se habían reunido
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: συνάγω
  rationale: El pasivo medio/ingresivo se traduce con la forma reflexiva habitual en español. «Se habían reunido» conserva el sentido de congregación previa al habla.
- source_word: εἶπεν πρὸς αὐτούς
  english_pob_choice: he said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - dijo a ellos
  lexicon: λέγω + πρός
  rationale: «Les dijo» es la fórmula española más natural y precisa para introducir discurso directo, sin perder el destinatario plural.
theological_decisions:
- issue: Agencia implícita en la revelación
  english_pob_reading: it was revealed to him
  chosen_spanish_reading: se le reveló
  alternative_spanish_readings:
  - le fue revelado
  rationale: Mantiene la pasiva sin añadir explícitamente al agente de la revelación, respetando la ambigüedad del griego y del inglés POB.
  doctrine_reference: Pasivas divinas / impersonalidad de la revelación
- issue: Inminencia de la muerte
  english_pob_reading: he was about to die
  chosen_spanish_reading: estaba por morir
  alternative_spanish_readings:
  - iba a morir
  - estaba a punto de morir
  rationale: Preserva el carácter inmediato del anuncio sin convertirlo en una afirmación más fuerte que la del texto fuente.
  doctrine_reference: Presciencia y anuncio de la muerte
- issue: Convocatoria personal
  english_pob_reading: he called them to himself
  chosen_spanish_reading: los llamó a reunirse con él
  alternative_spanish_readings:
  - los llamó a sí
  - los convocó ante sí
  rationale: La frase sugiere llamada deliberada a la presencia del hablante; el español elegido mantiene ese matiz sin sobreactuarlo.
  doctrine_reference: Discurso narrativo / escena de despedida
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el griego y la traducción inglesa auditada; no se registran revisiones aplicadas ni tensiones textuales relevantes. La redacción española sigue el mismo contenido semántico, ajustando solo la sintaxis para sonar natural en español.
  spanish_consistency_notes:
  - Se mantuvo el registro narrativo sobrio y lineal de la fuente.
  - No se introdujeron términos técnicos innecesarios ni glosas interpretativas.
  - 'Se preservó la secuencia temporal y causal del original: salud, revelación, reunión, discurso.'
