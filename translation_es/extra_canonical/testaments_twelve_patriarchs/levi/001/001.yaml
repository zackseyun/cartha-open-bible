translation:
  language: es
  text: Copia de las palabras de Leví, que él dispuso para sus hijos acerca de todo lo que ellos harían, y de todo lo que les sucedería[a] hasta el día del juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa συναντήσει (literalmente «lo que les saldrá al encuentro»), que puede verterse también como «lo que les sobrevendrá» o «lo que les acontecerá».
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾿Αντίγραφον
  english_pob_choice: A copy
  chosen_spanish: Copia
  alternatives_spanish:
  - Transcripción
  - Copia escrita
  lexicon: ἀντίγραφον
  rationale: ‘Copia’ conserva de forma natural y fiel la idea de un documento derivado o reproducido sin añadir matices no explicitados por el griego.
- source_word: λόγων
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los dichos
  - las declaraciones
  lexicon: λόγος
  rationale: En este contexto, ‘palabras’ mantiene la referencia a un conjunto de enunciados/mandatos transmitidos por escrito, sin forzar ‘dichos’ o ‘declaraciones’.
- source_word: Λευί
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: Λευί
  rationale: Se usa la forma española bíblica ‘Leví’, más natural en lectura eclesial en español.
- source_word: ὅσα διέθετο
  english_pob_choice: which he ordained
  chosen_spanish: que él dispuso
  alternatives_spanish:
  - que él ordenó
  - que él decretó
  lexicon: διατίθημι
  rationale: ‘Dispuso’ recoge la fuerza de establecer/ disponer con intención normativa sin volver más rígido el verbo que ‘decretó’ ni más ambiguo que ‘ordenó’.
- source_word: τοῖς υἱοῖς αὐτοῦ
  english_pob_choice: for his sons
  chosen_spanish: para sus hijos
  alternatives_spanish:
  - a sus hijos
  - para sus hijos
  lexicon: υἱοί
  rationale: ‘Para sus hijos’ refleja el destinatario del discurso y mantiene la relación de instrucción hereditaria presente en el texto.
- source_word: κατὰ πάντα ἃ ποιήσουσιν
  english_pob_choice: about all that they would do
  chosen_spanish: acerca de todo lo que ellos harían
  alternatives_spanish:
  - sobre todo lo que ellos harían
  - en cuanto a todo lo que ellos harían
  lexicon: κατά + πάντα + ἅ + ποιέω
  rationale: Se conserva la amplitud de ‘acerca de todo’ siguiendo la revisión inglesa, y ‘harían’ expresa adecuadamente el valor futuro del verbo griego en el discurso retrospectivo.
- source_word: καὶ ὅσα συναντήσει αὐτοῖς
  english_pob_choice: and all that would happen to them
  chosen_spanish: y de todo lo que les sucedería
  alternatives_spanish:
  - y todo lo que les ocurriría
  - y de todas las cosas que les pasarían
  lexicon: ὅσα + συναντάω
  rationale: ‘Sucedería’ comunica con naturalidad el valor de acontecer/acontecerles del verbo, manteniendo la totalidad introducida por ὅσα.
- source_word: ἕως ἡμέρας κρίσεως
  english_pob_choice: until the day of judgment
  chosen_spanish: hasta el día del juicio
  alternatives_spanish:
  - hasta el día del juicio final
  - hasta el día de la sentencia
  lexicon: ἡμέρα κρίσεως
  rationale: ‘Día del juicio’ es el equivalente más directo y comprensible; ‘juicio final’ sería interpretativo y ‘sentencia’ desplaza el énfasis del día escatológico.
theological_decisions:
- issue: Nature of the document as transmitted instruction
  english_pob_reading: A copy of the words of Levi
  chosen_spanish_reading: Copia de las palabras de Leví
  alternative_spanish_readings:
  - Copia del testamento de Leví
  - Copia de los dichos de Leví
  rationale: El griego presenta el encabezado como copia de unas palabras, no como título doctrinalmente desarrollado; por eso se conserva la formulación documental sobria.
  doctrine_reference: Transmisión textual / literatura testamentaria
- issue: Scope of the content governed by Levi's words
  english_pob_reading: about all that they would do, and all that would happen to them
  chosen_spanish_reading: acerca de todo lo que ellos harían, y de todo lo que les sucedería
  alternative_spanish_readings:
  - sobre todo lo que ellos harían y todo lo que les ocurriría
  - en cuanto a todo lo que ellos harían y todo lo que les sucedería
  rationale: La revisión inglesa reforzó ‘all that would happen’ con ‘all that’; el español mantiene esa totalidad doble sin reducirla a una sola parte del contenido.
  doctrine_reference: Providencia / exhortación profética
- issue: Final temporal horizon
  english_pob_reading: until the day of judgment
  chosen_spanish_reading: hasta el día del juicio
  alternative_spanish_readings:
  - hasta el día del juicio final
  - hasta el día de la condenación
  rationale: Se preserva la formulación escatológica general sin añadir un calificativo que el griego no exige.
  doctrine_reference: Escatología / juicio divino
translation_notes:
  revision_awareness: 'La versión española sigue el pasaje griego base y refleja la revisión inglesa más reciente: mantiene ‘about all that they would do’ como una esfera amplia de contenido y ‘all that would happen’ para reproducir πλήρως el valor de ὅσα. No introduce ampliaciones interpretativas ni términos eclesiásticos ajenos al tenor documental del encabezado.'
  spanish_consistency_notes:
  - Se mantiene ‘Leví’ como forma estándar española del nombre bíblico.
  - Se usa ‘juicio’ y no ‘condenación’ para conservar la neutralidad escatológica del griego.
  - Se evita ‘Señor’ u այլ terminology irrelevante porque el versículo no contiene el nombre divino ni una cita del mismo.
