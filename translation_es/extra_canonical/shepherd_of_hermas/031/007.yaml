    rationale: La secuencia «Si una mujer», dije, «señor, o también algún hombre...» suena forzada en español y dificulta seguir la pregunta. Reordenar el vocativo/inciso mantiene el sentido y mejora la lectura.
  - severity: low
    issue: «uno de ellos» suena menos idiomático en una hipótesis general
    rationale: En español, «si alguno de los dos se casa» expresa mejor la referencia distributiva sin alterar el sentido.
  revised_spanish_text: «Si una mujer, señor —dije—, o también algún hombre, se durmiera, y alguno de los dos se casa, ¿peca el que se casa?»
  revision_rationale: Se hizo una corrección menor de estilo y sintaxis para que el diálogo suene natural en español sin cambiar el significado del original ni la ambigüedad conservada por la versión inglesa auditada.
