  yaml_path: translation/extra_canonical/shepherd_of_hermas/031/007.yaml
  text: “If a woman,” I say, “sir, or again some man, should fall asleep, and one of them marries, does the one who marries sin?”
translation:
  language: es
  text: «Si una mujer, señor —dije—, o también algún hombre, se durmiera, y alguno de los dos se casa, ¿peca el que se casa?»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γυνή
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  - mujer casada
  lexicon: γυνή
  rationale: Aquí el griego puede referirse en general a una mujer, y el inglés POB también mantiene el término genérico. «Mujer» preserva esa amplitud sin introducir explícitamente el matiz de «esposa», que no está exigido por el contexto inmediato.
- source_word: ἀνήρ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - varón
  lexicon: ἀνήρ
  rationale: «Hombre» es la forma natural y amplia en español para reflejar el contraste con «mujer»; «varón» sería posible, pero suena más marcado y menos idiomático en este diálogo.
- source_word: κοιμηθῇ
  english_pob_choice: should fall asleep
  chosen_spanish: se durmiera
  alternatives_spanish:
  - muriera
  - fuera a dormir
  lexicon: κοιμάω
  rationale: La expresión griega puede funcionar como eufemismo para morir, pero el inglés POB la entendió literalmente en esta pregunta hipotética. En español, «se durmiera» conserva esa literalidad y deja abierta la tensión semántica sin resolverla artificialmente.
- source_word: γαμήσῃ
  english_pob_choice: marries
  chosen_spanish: se casara
  alternatives_spanish:
  - se casase
  - contrajera matrimonio
  lexicon: γαμέω
  rationale: El verbo griego expresa casarse; «se casara» es natural en español y mantiene el valor reflexivo de la acción sin forzar un lenguaje técnico.
- source_word: ἁμαρτάνει
  english_pob_choice: sin
  chosen_spanish: peca
  alternatives_spanish:
  - comete pecado
  - obra mal
  lexicon: ἁμαρτάνω
  rationale: «Peca» reproduce el valor moral del verbo con concisión y fidelidad. «Comete pecado» sería más explícito, pero menos fluido en esta pregunta directa.
theological_decisions:
- issue: Posible eufemismo de «dormirse» como morir
  english_pob_reading: should fall asleep
  chosen_spanish_reading: se durmiera
  alternative_spanish_readings:
  - muriera
  - falleciera
  rationale: La tradición textual y el uso bíblico permiten una lectura eufemística. Sin embargo, la formulación inglesa auditada eligió no explicitar la muerte; por eso el español conserva el mismo nivel de ambigüedad. Esto evita sobreinterpretar la pregunta y respeta la tensión del original.
  doctrine_reference: Uso semítico/eufemístico del verbo κοιμάω en contexto narrativo o hipotético
- issue: Carácter interrogativo moral de la conclusión
  english_pob_reading: does the one who marries sin?
  chosen_spanish_reading: ¿peca el que se casa?
  alternative_spanish_readings:
  - ¿peca quien se casa?
  - ¿comete pecado el que se casa?
  rationale: La pregunta final mantiene el enfoque en la acción de casarse como posible pecado, sin añadir una valoración doctrinal previa. «Peca» conserva la concisión del griego y del inglés POB.
  doctrine_reference: Lenguaje ético de ἁμαρτάνω
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete. Se mantiene la lectura breve y directa del inglés POB, con atención al posible eufemismo de κοιμάω sin resolverlo de forma interpretativa.
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo «señor» como vocativo, en paralelo con el inglés POB.
  - La sintaxis interrogativa reproduce la estructura dialogal del original y evita añadir conectores explicativos.
  - Se usa puntuación española estándar con comillas angulares no requeridas; se opta por comillas dobles por claridad de cita dentro de la pregunta.
