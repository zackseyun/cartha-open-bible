base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/031/008.yaml
  text: “He does not sin,” he says; “but if someone remains by himself, he obtains for himself greater honor and great glory with the Lord; but if he also marries, he does not sin. Therefore keep purity and dignity, and you will live to God. These things that I speak to you and am about to speak, keep from now on, from the day you were entrusted to me, and I will dwell in your house. And for your former trespasses there will be forgiveness, if you keep my commandments; and there will also be forgiveness for all, if they keep these commandments of mine and walk in this purity.”
translation:
  language: es
  text: «No peca», dice; «pero si alguien permanece solo, obtiene para sí mayor honra y gran gloria delante del Señor; pero si también se casa, no peca. Por tanto, guardad la pureza y la dignidad, y viviréis para Dios. Estas cosas que os digo y que estoy por decir, guardadlas desde ahora, desde el día en que me fuisteis confiados, y habitaré en vuestra casa. Y por vuestras faltas anteriores habrá perdón, si guardáis mis mandamientos; y habrá perdón también para todos los demás, si guardan estos mandamientos míos y andan en esta pureza».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἁμαρτάνει / ἁμαρτία
  english_pob_choice: He does not sin / does not sin
  chosen_spanish: no peca
  alternatives_spanish:
  - no comete pecado
  - no yerra
  lexicon: N/A
  rationale: El griego expresa la idea estándar de pecar; el POB inglés usa la negación simple sin intensificar. «No peca» es natural en español bíblico contemporáneo y conserva el valor verbal directo sin añadir matices ajenos.
- source_word: μείνῃ αὐτὸς μόνος
  english_pob_choice: remains by himself
  chosen_spanish: permanece solo
  alternatives_spanish:
  - permanece por sí mismo
  - permanece apartado
  lexicon: N/A
  rationale: La frase apunta a permanecer sin casarse; «solo» comunica de forma breve y fiel la condición de no tener cónyuge, sin convertirla en aislamiento social.
- source_word: τιμή
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - honor
  - estima
  lexicon: N/A
  rationale: «Honra» preserva el registro bíblico y evita la ambigüedad moderna de «honor» como simple cortesía o etiqueta, manteniendo la elevación de estatus que el contexto sugiere.
- source_word: δόξα μεγάλη
  english_pob_choice: great glory
  chosen_spanish: gran gloria
  alternatives_spanish:
  - mucha gloria
  - gloria grande
  lexicon: N/A
  rationale: Se mantiene la combinación adjetival sencilla del original; «gran gloria» es la forma más natural y transparente en español.
- source_word: παρὰ τῷ κυρίῳ
  english_pob_choice: with the Lord
  chosen_spanish: delante del Señor
  alternatives_spanish:
  - ante el Señor
  - con el Señor
  lexicon: N/A
  rationale: El POB inglés eligió una relación de presencia/consideración ante el Señor. En español, «delante del Señor» conserva esa orientación evaluativa sin forzar una lectura meramente instrumental de «con».
- source_word: καθαρότητα
  english_pob_choice: purity
  chosen_spanish: pureza
  alternatives_spanish:
  - limpieza
  - castidad
  lexicon: N/A
  rationale: «Pureza» mantiene el campo semántico moral y ritual del término, más amplio que una referencia solo sexual. «Castidad» estrecharía demasiado el alcance.
- source_word: σεμνότητα
  english_pob_choice: dignity
  chosen_spanish: dignidad
  alternatives_spanish:
  - seriedad
  - decoro
  lexicon: N/A
  rationale: «Dignidad» reproduce bien el sentido de conducta respetable y gravedad moral; las alternativas reducen o desplazan ese tono.
- source_word: ζησήσεσθε τῷ θεῷ
  english_pob_choice: you will live to God
  chosen_spanish: viviréis para Dios
  alternatives_spanish:
  - viviréis para Dios
  - viviréis a Dios
  lexicon: N/A
  rationale: La expresión española «vivir para Dios» transmite finalidad/dedicación de manera natural y fiel. Se evita una literalidad extraña como «a Dios».
- source_word: μνημονεύετε / τηρεῖτε
  english_pob_choice: keep
  chosen_spanish: guardad
  alternatives_spanish:
  - tened presentes
  - observad
  lexicon: N/A
  rationale: El imperativo abarca conservar y obedecer; «guardad» integra ambos matices en español bíblico claro.
- source_word: ἀφεσις
  english_pob_choice: forgiveness
  chosen_spanish: perdón
  alternatives_spanish:
  - remisión
  - indulto
  lexicon: N/A
  rationale: «Perdón» es la opción más natural y comprensible en español moderno, sin perder el sentido de remisión de culpa que el texto promete.
- source_word: παραπτώματα
  english_pob_choice: former trespasses
  chosen_spanish: faltas anteriores
  alternatives_spanish:
  - transgresiones anteriores
  - pecados pasados
  lexicon: N/A
  rationale: «Faltas anteriores» conserva la referencia al pasado sin sobrecargar el término con una formulación más dura de la que el contexto inmediato requiere; el POB inglés también mantiene una expresión relativamente amplia.
- source_word: ἐν ταύτῃ τῇ καθαρότητι
  english_pob_choice: in this purity
  chosen_spanish: en esta pureza
  alternatives_spanish:
  - en esta limpieza
  - en esta castidad
  lexicon: N/A
  rationale: La forma demostrativa reproduce la deicticidad del griego y remite a la pureza previamente mandada. «Castidad» estrecharía indebidamente el sentido.
theological_decisions:
- issue: Marriage is said not to be sin, while remaining single receives greater honor and glory
  english_pob_reading: but if he also marries, he does not sin
  chosen_spanish_reading: pero si también se casa, no peca
  alternative_spanish_readings:
  - pero si también toma esposa, no peca
  - pero si también se casa, no comete pecado
  rationale: Se conserva la afirmación directa de que el matrimonio no constituye pecado, sin suavizarla ni moralizarla. El contraste con permanecer solo y recibir mayor honra/gloria se mantiene explícito como tensión del pasaje.
  doctrine_reference: Shepherd of Hermas, Mandate 4; lexical note on marriage/continence
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete de entrada; el borrador español se ha construido directamente desde el griego con el POB inglés como control auditado de decisiones léxicas y teológicas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto fuente lo requiera; aquí el pasaje griego dice κυρίῳ/κυρίου y se traduce con «Señor» conforme al propio audit trail inglés.
  - Se preservó el paralelismo de imperativos con «guardad» para mantener el ritmo exhortativo del pasaje.
  - Se evitó sustituir «pureza» por un término más restrictivo, ya que el contexto abarca conducta íntegra en general y no solo continencia sexual.
