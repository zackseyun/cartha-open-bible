revisions:
- from: «No peca», dice; «pero si alguien permanece solo, obtiene para sí mayor honra y gran gloria delante del Señor; pero si también se casa, no peca. Por tanto, guardad la pureza y la dignidad, y viviréis para Dios. Estas cosas que os digo y que estoy por decir, guardadlas desde ahora, desde el día en que me fuisteis confiados, y habitaré en vuestra casa. Y por vuestras faltas anteriores habrá perdón, si guardáis mis mandamientos; y también habrá perdón para todos, si guardan estos mandamientos míos y andan en esta pureza».
  to: «No peca», dice; «pero si alguien permanece solo, obtiene para sí mayor honra y gran gloria delante del Señor; pero si también se casa, no peca. Por tanto, guardad la pureza y la dignidad, y viviréis para Dios. Estas cosas que os digo y que estoy por decir, guardadlas desde ahora, desde el día en que me fuisteis confiados, y habitaré en vuestra casa. Y por vuestras faltas anteriores habrá perdón, si guardáis mis mandamientos; y habrá perdón también para todos los demás, si guardan estos mandamientos míos y andan en esta pureza».
  rationale: Se hace una reparación menor de cohesión en la cláusula final para expresar con más naturalidad en español que la promesa de perdón se extiende de los destinatarios inmediatos a «todos los demás», sin cambiar el sentido fuente ni la lógica condicional del pasaje.
  reviewer_model: gpt-5.4
