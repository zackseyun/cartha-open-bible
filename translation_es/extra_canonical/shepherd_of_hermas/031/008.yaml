review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego reflejado en el POB inglés: no pecar, permanecer sin casarse como estado de mayor honra y gloria, casarse sin pecar, guardar pureza y dignidad, promesa de vida para Dios, presencia del mensajero en la casa, y perdón condicionado a guardar los mandamientos. No hay desviaciones doctrinales mayores. Sin embargo, hay un problema de persona gramatical en la segunda mitad: el texto pasa de tratamiento plural de segunda persona («os», «guardad», «vuestra») a tercera persona plural («si guardan»), cuando el inglés y el flujo del pasaje distinguen primero a los destinatarios y luego extienden la promesa a «todos». En español conviene mantener explícita esa distinción con una formulación más natural.'
  spanish_quality_summary: 'El español es claro y digno, pero mezcla voseo reverencial/peninsular de segunda persona plural con una extensión final menos fluida. También «delante del Señor» es defendible, aunque «ante el Señor» o «con el Señor» podrían sonar más ligeros; no exige cambio. La reparación principal es estilística y de cohesión: hacer más natural «y habrá perdón también para todos los demás, si guardan…».'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: «Señor» aquí no representa יהוה sino κύριος en un texto griego extracanonónico; «Dios», «pureza», «dignidad» y «perdón» están bien elegidos. «Honra» es aceptable aunque «honor» también sería posible. No se requieren notas léxicas adicionales.'
  issues:
  - severity: medium
    issue: Cohesión deficiente en el cambio de destinatario al final
    rationale: El pasaje se dirige en segunda persona plural a los receptores inmediatos y luego amplía la promesa a «todos». La secuencia actual «si guardáis…; y también habrá perdón para todos, si guardan…» es comprensible, pero suena abrupta. Añadir «los demás» aclara la extensión sin alterar el sentido.
  - severity: low
    issue: Registro pronominal potencialmente menos natural para español latinoamericano
    rationale: El uso de «guardad / viviréis / os / vuestra» no es incorrecto en registro bíblico, pero es menos neutral latinoamericano. Aun así, dado el tono eclesial y la consistencia interna del resto del texto, no hace falta una reescritura completa; solo una reparación mínima.
  revised_spanish_text: «No peca», dice; «pero si alguien permanece solo, obtiene para sí mayor honra y gran gloria delante del Señor; pero si también se casa, no peca. Por tanto, guardad la pureza y la dignidad, y viviréis para Dios. Estas cosas que os digo y que estoy por decir, guardadlas desde ahora, desde el día en que me fuisteis confiados, y habitaré en vuestra casa. Y por vuestras faltas anteriores habrá perdón, si guardáis mis mandamientos; y habrá perdón también para todos los demás, si guardan estos mandamientos míos y andan en esta pureza».
  revision_rationale: Se hace una reparación menor de cohesión en la cláusula final para expresar con más naturalidad en español que la promesa de perdón se extiende de los destinatarios inmediatos a «todos los demás», sin cambiar el sentido fuente ni la lógica condicional del pasaje.
