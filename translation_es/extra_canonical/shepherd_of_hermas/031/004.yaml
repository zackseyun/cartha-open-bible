  text: He says to me, “You heard well; for so it is. For the one who has received forgiveness—”
translation:
  language: es
  text: 'Él me dice: «Has oído bien; porque así es. Pues el que ha recibido el perdón—»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤκουσας καλῶς / "You heard well"
  english_pob_choice: You heard well
  chosen_spanish: Has oído bien
  alternatives_spanish:
  - Escuchaste bien
  - Oíste bien
  lexicon: ἀκούω
  rationale: Conservo la afirmación de comprensión confirmada por el interlocutor. «Has oído bien» suena natural en español y mantiene el valor evaluativo del griego sin añadir matices no presentes.
- source_word: οὕτως ἐστίν / "for so it is"
  english_pob_choice: for so it is
  chosen_spanish: porque así es
  alternatives_spanish:
  - pues así es
  - porque de ese modo es
  lexicon: εἰμί
  rationale: La frase confirma la veracidad de lo dicho. «Porque así es» reproduce la sencillez y fuerza assertiva del original y del inglés POB sin sobreformalizar.
- source_word: ὁ λαβὼν τὴν ἄφεσιν / "the one who has received forgiveness"
  english_pob_choice: the one who has received forgiveness
  chosen_spanish: el que ha recibido el perdón
  alternatives_spanish:
  - el que ha recibido remisión
  - quien ha recibido el perdón
  lexicon: ἄφεσις
  rationale: «Ἄφεσις» aquí significa remisión/perdón. Opto por «el perdón» porque es claro en español y conserva la idea de una concesión recibida; «remisión» es posible pero menos inmediata para lectores generales.
theological_decisions:
- issue: Naturaleza del 'perdón' recibido
  english_pob_reading: the one who has received forgiveness
  chosen_spanish_reading: el que ha recibido el perdón
  alternative_spanish_readings:
  - el que ha recibido remisión
  - el que ha recibido absolución
  rationale: El contexto visible solo afirma que hay alguien que ha recibido perdón; no desarrolla el medio ni la autoridad de ese perdón. Por eso mantengo una formulación neutral que no inserta categorías doctrinales posteriores.
  doctrine_reference: Soteriology / forgiveness language
translation_notes:
  revision_awareness: No hay revisiones aplicadas ni aparato de variantes en el paquete provisto; la redacción española sigue de cerca el enunciado griego y el texto auditado en inglés, sin ampliar el fragmento incompleto.
  spanish_consistency_notes:
  - Conservo el corte final con raya larga porque el segmento fuente termina abruptamente.
  - Uso estilo de cita con comillas angulares en español.
  - Mantengo el sujeto explícito «Él» para reflejar el griego/inglés auditado y evitar ambigüedad discursiva.
