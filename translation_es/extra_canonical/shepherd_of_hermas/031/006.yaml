  text: —«Habla», dice él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λάλησον / speak
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Hablad
  lexicon: speech imperative
  rationale: El griego pide un mandato breve de habla dirigida. «Habla» conserva la inmediatez y la naturalidad en español sin añadir contenido. «Di» sería posible, pero suena más a reproducir contenido literal que a introducir una intervención de habla; «hablad» no corresponde al singular del contexto.
theological_decisions:
- issue: Introducción de un mandato directo sin sobre-interpretarlo
  english_pob_reading: “Speak,” he says.
  chosen_spanish_reading: «Habla», dice él.
  alternative_spanish_readings:
  - «Di», dice él.
  - «Habla», dijo él.
  rationale: No hay carga doctrinal adicional en el enunciado; la cuestión es solo cómo reproducir el imperativo de habla y el verbo introductorio en estilo narrativo. Se mantiene el tiempo presente de la cita indirecta como en el inglés POB y como fórmula natural en español.
  doctrine_reference: No aplica; texto narrativo breve sin afirmación doctrinal específica.
translation_notes:
  revision_awareness: No se registran revisiones previas en el expediente; el inglés POB ofrece una sola línea sin notas, por lo que el español se construye directamente desde el griego y el audit trail disponible.
  spanish_consistency_notes:
  - Se usa comillas angulares para el discurso directo conforme a norma tipográfica española.
  - Se mantiene un estilo breve y sobrio, acorde con la concisión del original y del POB en inglés.
