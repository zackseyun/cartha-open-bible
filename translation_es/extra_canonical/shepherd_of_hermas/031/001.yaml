  text: “Still,” I say, “sir, I will add another question.”
translation:
  language: es
  text: «Todavía», digo, «señor, añadiré otra pregunta».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἔτι
  english_pob_choice: Still
  chosen_spanish: Todavía
  alternatives_spanish:
  - Aún
  - Todavía así
  lexicon: adverbio de tiempo/progresión
  rationale: El adverbio griego marca continuación del turno de habla, no oposición fuerte. «Todavía» conserva la idea de que el hablante sigue hablando y va a añadir algo más, con un español natural y sobrio.
- source_word: λέγω
  english_pob_choice: I say
  chosen_spanish: digo
  alternatives_spanish:
  - dije
  - estoy diciendo
  lexicon: verbo de decir en presente narrativo
  rationale: El presente en español reproduce bien el presente dramático del griego y del inglés POB, manteniendo vivacidad narrativa sin cambiar el tiempo del enunciado.
- source_word: κύριε
  english_pob_choice: sir
  chosen_spanish: señor
  alternatives_spanish:
  - señor mío
  - maestro
  lexicon: vocativo de respeto
  rationale: Aquí el vocativo es de cortesía hacia el interlocutor humano de Hermas. «Señor» es la equivalencia más directa y natural en español, sin introducir una identificación divina que el contexto inmediato no exige.
- source_word: προσθήσω
  english_pob_choice: I will add
  chosen_spanish: añadiré
  alternatives_spanish:
  - sumaré
  - agregaré
  lexicon: verbo de adición futura
  rationale: «Añadiré» expresa con precisión la intención de incorporar una pregunta adicional, conservando el futuro simple que corresponde al griego y al inglés auditado.
- source_word: ἄλλην ἐρώτησιν
  english_pob_choice: another question
  chosen_spanish: otra pregunta
  alternatives_spanish:
  - una pregunta más
  - una cuestión adicional
  lexicon: sustantivo + cuantificador de repetición
  rationale: «Otra pregunta» es la formulación más natural y fiel. «Cuestión» sería más formal, pero «pregunta» reproduce mejor el acto de interrogación concreto del pasaje.
theological_decisions:
- issue: Registro de cortesía hacia el interlocutor
  english_pob_reading: sir
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - maestro
  - señor mío
  rationale: No hay tensión doctrinal especial en este verso; la decisión afecta solo al nivel de respeto. «Señor» mantiene la deferencia sin forzar una lectura teológica superior al contexto del diálogo.
  doctrine_reference: No aplica; vocativo narrativo no doctrinal.
translation_notes:
  revision_awareness: No se documentan revisiones previas ni variantes textuales en el paquete de fuente para este segmento. La propuesta sigue de cerca el valor semántico del griego normalizado y el trazado breve del inglés POB.
  spanish_consistency_notes:
  - Se mantiene el vocativo «señor» en minúscula por ser tratamiento directo dentro de la cita.
  - Se conserva la puntuación entrecomillada para reflejar el discurso directo tripartito del original y del inglés auditado.
