review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego y del POB en inglés: primera persona parentética («oí», «digo»), referencia a ciertos maestros, negación de otra μετάνοια aparte de la vinculada al descenso al agua y al perdón de pecados previos. No obstante, «aquel cuando» suena poco natural en español y debilita la claridad sintáctica de la cláusula exclusiva.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «no hay otro arrepentimiento sino aquel cuando...» resulta forzado. Una formulación como «excepto aquel que hubo cuando...» conserva el sentido temporal y mejora la legibilidad. También conviene añadir artículo en «el perdón» para mayor naturalidad idiomática.
  glossary_alignment: 'La terminología clave está bien alineada: μετάνοια → «arrepentimiento», διδάσκαλοι → «maestros», κατεβήκαμεν εἰς τὸ ὕδωρ → «descendimos al agua», ἄφεσις → «perdón». No hay conflictos con los términos globales del proyecto.'
  issues:
  - severity: medium
    issue: 'Construcción poco natural: «sino aquel cuando»'
    rationale: Aunque refleja de manera literal la estructura inglesa, en español esta secuencia suena torpe y puede entorpecer la comprensión. «Excepto aquel que hubo cuando...» o «sino aquel que tuvimos cuando...» preserva mejor la relación entre el arrepentimiento único y el momento del descenso al agua.
  - severity: low
    issue: Falta de artículo en «recibimos perdón»
    rationale: «Recibimos el perdón de nuestros pecados anteriores» suena más natural y completo en español eclesial y general, sin alterar el significado.
  revised_spanish_text: «Lo oí», digo, «señor, de ciertos maestros, que no hay otro arrepentimiento excepto aquel que hubo cuando descendimos al agua y recibimos el perdón de nuestros pecados anteriores».
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad y claridad del español sin cambiar el contenido: «excepto aquel que hubo cuando» reemplaza la secuencia forzada «sino aquel cuando», y se añadió el artículo en «el perdón».'
