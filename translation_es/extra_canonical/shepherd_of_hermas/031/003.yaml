  yaml_path: translation/extra_canonical/shepherd_of_hermas/031/003.yaml
  text: “I heard,” I say, “sir, from certain teachers, that there is no other repentance except that one when we went down into the water and received forgiveness of our former sins.”
translation:
  language: es
  text: «Lo oí», digo, «señor, de ciertos maestros, que no hay otro arrepentimiento excepto aquel que hubo cuando descendimos al agua y recibimos el perdón de nuestros pecados anteriores».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: repentance
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - cambio de mente
  - penitencia
  lexicon: μετάνοια
  rationale: El contexto habla de un acto vinculado al descenso al agua y al perdón de los pecados anteriores; en español, «arrepentimiento» comunica de forma natural el giro moral y religioso que el griego expresa aquí. «Cambio de mente» sería demasiado técnico y debilitía el sentido devocional del pasaje.
- source_word: went down into the water
  english_pob_choice: went down into the water
  chosen_spanish: descendimos al agua
  alternatives_spanish:
  - entramos en el agua
  - bajamos al agua
  lexicon: κατεβήκαμεν εἰς τὸ ὕδωρ
  rationale: «Descendimos al agua» conserva el movimiento ritual del original y funciona bien en español sin introducir una paráfrasis explicativa. «Entramos en el agua» sería más llano, pero pierde el matiz de descenso.
- source_word: received forgiveness of our former sins
  english_pob_choice: received forgiveness of our former sins
  chosen_spanish: recibimos perdón de nuestros pecados anteriores
  alternatives_spanish:
  - recibimos el perdón de nuestros pecados pasados
  - obtuvimos perdón de nuestros antiguos pecados
  lexicon: ἄφεσιν τῶν προτέρων ἁμαρτιῶν
  rationale: «Perdón» refleja ἄφεσις en un registro natural y bíblico. «Anteriores» traduce con sobriedad προτέρων y evita la posible connotación temporal demasiado coloquial de «pasados»; «pecados anteriores» mantiene la referencia a los pecados previos al rito.
- source_word: teachers
  english_pob_choice: teachers
  chosen_spanish: maestros
  alternatives_spanish:
  - doctores
  - enseñantes
  lexicon: διδασκάλων
  rationale: «Maestros» es el equivalente más directo y comprensible en español para διδάσκαλοι. «Doctores» sería eclesiástico y más técnico de lo que exige el pasaje.
theological_decisions:
- issue: Alcance de «no hay otro arrepentimiento»
  english_pob_reading: there is no other repentance except that one when we went down into the water and received forgiveness of our former sins
  chosen_spanish_reading: no hay otro arrepentimiento sino aquel cuando descendimos al agua y recibimos perdón de nuestros pecados anteriores
  alternative_spanish_readings:
  - no existe otro arrepentimiento fuera de aquel…
  - no hay más arrepentimiento que aquel…
  rationale: La redacción española mantiene la exclusividad afirmada por el texto sin suavizarla. No se amplía ni se corrige la afirmación, porque el pasaje presenta una tensión teológica real entre el bautismo y el perdón inicial que debe permanecer visible en la traducción.
  doctrine_reference: Mandato 4, sección iii; teología del bautismo y del arrepentimiento en Hermas
- issue: Referencia implícita al rito bautismal
  english_pob_reading: when we went down into the water
  chosen_spanish_reading: cuando descendimos al agua
  alternative_spanish_readings:
  - cuando fuimos bautizados
  - cuando entramos en el agua
  rationale: Aunque el contexto sugiere el bautismo, el texto griego no lo nombra de forma explícita en esta cláusula. Se conserva la imagen acuática sin insertar la interpretación en la línea principal.
  doctrine_reference: Lectura contextual del rito de inmersión en Hermas
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés. Se tradujo directamente desde el griego normalizado con apoyo del texto inglés POB para verificar el alcance de la exclusividad («no hay otro arrepentimiento») y la imagen de inmersión en el agua.
  spanish_consistency_notes:
  - Se conserva «señor» en minúscula dentro de la cita directa, conforme al habla respetuosa del interlocutor y sin forzar una decisión teológica sobre el título.
  - Se mantiene una sintaxis cercana al original, con comillas españolas y ritmo de discurso directo, para preservar la estructura del testimonio citado.
  - Se usa «perdón» en lugar de una fórmula más litúrgica o eclesiástica, porque el pasaje trata de la remisión de pecados en un marco narrativo y doctrinal temprano.
