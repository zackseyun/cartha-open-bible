  text: “Ten paciencia conmigo”[a], dije, “y aclárame también esto”.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría traducirse «Aguántame», pero en español suena más áspero; «Ten paciencia conmigo» conserva mejor el tono de ruego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνεχου / bear with me
  english_pob_choice: Bear with me
  chosen_spanish: Ten paciencia conmigo
  alternatives_spanish:
  - Aguántame
  - Soporta conmigo
  lexicon: ἄνεχου
  rationale: La exhortación pide tolerancia/paciencia del interlocutor, no mera resistencia física. «Ten paciencia conmigo» reproduce el tono natural y respetuoso del ruego en español sin perder el sentido de aguantar o soportar.
- source_word: σαφὲς / make this clear
  english_pob_choice: make this clear
  chosen_spanish: hazme también esto claro
  alternatives_spanish:
  - aclárame también esto
  - haz esto también claro para mí
  lexicon: σαφές
  rationale: '«Claro» conserva la idea de hacer inteligible algo dudoso. Mantengo «también» porque refleja la adición del texto: además de lo anterior, pide aclaración sobre este punto.'
theological_decisions:
- issue: No hay término doctrinal explícito en la frase
  english_pob_reading: —
  chosen_spanish_reading: —
  rationale: El segmento es una petición coloquial de aclaración y paciencia; no introduce una elección doctrinal o terminológica de peso teológico.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el contexto proporcionado; la redacción se apoya directamente en el griego normalizado y en la equivalencia óptima del POB inglés.
  spanish_consistency_notes:
  - Se preserva un registro reverente y conversacional adecuado para una cita breve en discurso directo.
  - «Claro» se usa como adjetivo predicativo con «hacer», una construcción natural en español contemporáneo.
  - No se introduce terminología eclesiástica ajena al breve enunciado.
