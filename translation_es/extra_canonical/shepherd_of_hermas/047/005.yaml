  text: “You will keep them,” he says, “if you bend toward your own city.
translation:
  language: es
  text: “Las guardarás”, dijo, “si te inclinas hacia tu propia ciudad.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τηρήσεις αὐτά
  english_pob_choice: You will keep them
  chosen_spanish: Las guardarás
  alternatives_spanish:
  - Las preservarás
  - Las cumplirás
  lexicon: τηρέω
  rationale: El verbo griego expresa conservar, guardar o observar. En este contexto breve, “guardar” comunica bien la idea de mantenerlas fielmente; el pronombre átono “las” conserva el objeto directo plural del griego y del inglés POB.
- source_word: κλίνῃς πρὸς τὴν ἰδίαν πόλιν
  english_pob_choice: if you bend toward your own city
  chosen_spanish: si te inclinas hacia tu propia ciudad
  alternatives_spanish:
  - si te vuelves hacia tu propia ciudad
  - si te orientas hacia tu propia ciudad
  lexicon: κλίνω
  rationale: κλίνω tiene la idea de inclinarse o doblarse hacia algo. “Te inclinas hacia” mantiene la imagen física del original y evita suavizarla en exceso; “tu propia ciudad” conserva el sentido de pertenencia del adjetivo ἰδίαν.
theological_decisions:
- issue: Imagen de lealtad/retorno implícita en “tu propia ciudad”
  english_pob_reading: if you bend toward your own city
  chosen_spanish_reading: si te inclinas hacia tu propia ciudad
  alternative_spanish_readings:
  - si vuelves a tu ciudad
  - si te diriges a tu ciudad
  rationale: El texto no desarrolla la metáfora, pero sí presenta una orientación interior o direccional hacia la ciudad propia. Mantener “te inclinas” conserva esa tensión imagética sin convertirla en una simple acción de regreso.
  doctrine_reference: No doctrinal issue; interpretive imagery in Shepherd of Hermas.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el contexto proporcionado. Se ha seguido directamente el texto griego normalizado y el sentido ya reflejado en la traducción inglesa POB.
  spanish_consistency_notes:
  - Se mantuvo un español sobrio y legible, sin elevar el registro más allá del tono del texto fuente.
  - Se evitó sustituir la imagen verbal por una paráfrasis explicativa, para respetar la concisión del original.
  - No se añadieron notas al pie porque el segmento no presenta variantes textuales ni tensiones léxicas que requieran aclaración en este registro.
