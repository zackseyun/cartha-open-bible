  yaml_path: translation/extra_canonical/shepherd_of_hermas/047/003.yaml
  text: Listen to me, then, and fear the One who is able to do all things, to save and to destroy; and keep these commandments, and you will live to God.
translation:
  language: es
  text: Escúchame, pues, y teman al que puede hacerlo todo, salvar y destruir; y guarden estos mandamientos, y vivirán para Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄκουσόν μοι οὖν
  english_pob_choice: Listen to me, then
  chosen_spanish: Escúchenme, pues
  alternatives_spanish:
  - Óiganme, pues
  - Escúchame, pues
  lexicon: ἀκούω
  rationale: El imperativo plural da mejor el tono exhortativo en español con «Escúchenme». «Pues» conserva el valor inferencial de οὖν sin sonar arcaico.
- source_word: φοβήθητε
  english_pob_choice: fear
  chosen_spanish: teman
  alternatives_spanish:
  - tengan temor de
  - reverencien
  lexicon: φοβέομαι
  rationale: «Teman» preserva el mandato de temor real que el contexto une al poder de Dios para salvar y destruir. «Reverencien» suavizaría la fuerza lexical.
- source_word: τὸν δυνάμενον πάντα ποιῆσαι
  english_pob_choice: the One who is able to do all things
  chosen_spanish: al que puede hacer todas las cosas
  alternatives_spanish:
  - al que es capaz de hacer todo
  - al que puede hacerlo todo
  lexicon: δύναμαι / πᾶς / ποιέω
  rationale: La construcción mantiene el alcance universal («todas las cosas») sin introducir paráfrasis devocional. «Al que» refleja el participio sustantivado.
- source_word: σῶσαι καὶ ἀπολέσαι
  english_pob_choice: to save and to destroy
  chosen_spanish: salvar y destruir
  alternatives_spanish:
  - salvar y perder
  - salvar y hacer perecer
  lexicon: σῴζω / ἀπόλλυμι
  rationale: «Destruir» conserva la tensión fuerte del griego y del inglés POB. «Hacer perecer» sería más explicativo, pero menos directo.
- source_word: τὰς ἐντολὰς ταύτας
  english_pob_choice: these commandments
  chosen_spanish: estos mandamientos
  alternatives_spanish:
  - estos preceptos
  - estas órdenes
  lexicon: ἐντολή
  rationale: «Mandamientos» corresponde al uso bíblico y al valor normativo de ἐντολή en este contexto exhortativo.
- source_word: ζήσεσθε τῷ θεῷ
  english_pob_choice: you will live to God
  chosen_spanish: vivirán para Dios
  alternatives_spanish:
  - vivirán para Dios
  - vivirán a Dios
  lexicon: ζάω + dativo θεῷ
  rationale: «Para Dios» expresa con naturalidad en español la orientación de vida indicada por el dativo; evita la forma menos idiomática «a Dios» sin perder el sentido de pertenencia y dirección.
theological_decisions:
- issue: Alcance del temor ante Dios que puede salvar y destruir
  english_pob_reading: fear the One who is able to do all things, to save and to destroy
  chosen_spanish_reading: 'teman al que puede hacer todas las cosas: salvar y destruir'
  alternative_spanish_readings:
  - 'reverencien al que puede hacer todas las cosas: salvar y destruir'
  - tengan temor de aquel que puede hacerlo todo, salvar y destruir
  rationale: Se mantiene el temor solemne unido al poder soberano de Dios, sin reducirlo a simple respeto. La puntuación con dos puntos hace explícita la enumeración de las acciones divinas.
  doctrine_reference: Proverbios 1:7; Mateo 10:28; Santiago 4:12
- issue: Relación entre obediencia y vida en Dios
  english_pob_reading: keep these commandments, and you will live to God
  chosen_spanish_reading: guarden estos mandamientos, y vivirán para Dios
  alternative_spanish_readings:
  - observen estos mandamientos, y vivirán para Dios
  - guarden estos mandatos, y vivirán para Dios
  rationale: 'La frase conserva la estructura condicional implícita del original y del inglés POB: obediencia concreta vinculada a una vida orientada a Dios. No se suaviza en una formulación meramente ética.'
  doctrine_reference: Deuteronomio 30:16; Juan 14:15; Romanos 6:10-11
translation_notes:
  revision_awareness: No applied revisions were listed in the audit context; the draft follows the provided English POB reading while remaining directly accountable to the Greek source.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se introduce «Señor», porque el pasaje no requiere el reemplazo del nombre divino.
  - Se usa un español bíblico moderno pero no arcaizante, con verbos imperativos y futuro de resultado natural en lectura pública.
  - Se conserva la tensión fuerte entre salvar y destruir, sin atenuarla con un eufemismo.
