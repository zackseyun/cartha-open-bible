base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/047/004.yaml
  text: I say to him, “Lord, now I have been strengthened in all the righteous requirements of the Lord, because you are with me; and I know that you will cut off all the devil’s power, and we shall gain mastery over him and prevail against all his works. And I hope, Lord, that now I can keep these commandments that you have commanded, with the Lord strengthening me.”
translation:
  language: es
  text: 'Le digo: «Señor, ahora he sido fortalecido en todos los mandamientos justos del Señor, porque tú estás conmigo; y sé que cortarás todo el poder del diablo, y obtendremos dominio[a] sobre él y prevaleceremos contra todas sus obras. Y espero, Señor, que ahora podré guardar estos mandamientos que me has mandado, con el Señor fortaleciéndome».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo dominaremos».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν πάσαις ταῖς δικαίαις ἐντολαῖς
  english_pob_choice: in all the righteous requirements of the Lord
  chosen_spanish: en todos los mandamientos justos del Señor
  alternatives_spanish:
  - en todas las justas exigencias del Señor
  - en todos los requisitos justos del Señor
  lexicon: δικαίαις ἐντολαῖς
  rationale: La expresión combina el contenido normativo de ἐντολαί con el adjetivo δικαίαις; en español, «mandamientos justos» conserva la fuerza ética y mandatoria sin convertirlo en una paráfrasis excesiva como «exigencias».
- source_word: τοῦ διαβόλου
  english_pob_choice: the devil’s
  chosen_spanish: del diablo
  alternatives_spanish:
  - del diablo
  - de Satanás
  lexicon: διάβολος
  rationale: «Diablo» es el equivalente natural y fiel en español; mantiene la referencia personal sin introducir una equivalencia interpretativa adicional.
- source_word: κρατήσομεν αὐτοῦ
  english_pob_choice: we shall gain mastery over him
  chosen_spanish: venceremos sobre él
  alternatives_spanish:
  - obtendremos dominio sobre él
  - lograremos dominarlo
  lexicon: κρατέω
  rationale: El verbo expresa dominio/victoria; «venceremos sobre él» comunica el sentido de superioridad y derrota del adversario, aunque en nota se preserva la alternativa de dominio por si el lector percibe la imagen de soberanía.
- source_word: καὶ νικήσομεν κατὰ πάντων τῶν ἔργων αὐτοῦ
  english_pob_choice: and prevail against all his works
  chosen_spanish: y prevaleceremos contra todas sus obras
  alternatives_spanish:
  - y venceremos contra todas sus obras
  - y saldremos victoriosos contra todas sus obras
  lexicon: νικάω
  rationale: «Prevaleceremos» conserva la continuidad con el inglés POB y el matiz de salir victoriosos de una contienda; «obras» traduce ἔργα sin suavizar el alcance de las acciones del enemigo.
- source_word: τοὺς ἐντολὰς ταύτας
  english_pob_choice: these commandments
  chosen_spanish: estos mandamientos
  alternatives_spanish:
  - estas órdenes
  - estos preceptos
  lexicon: ἐντολή
  rationale: «Mandamientos» es el término más estable en español bíblico y refleja el carácter vinculante del mandato; «preceptos» sería posible pero menos directo en este contexto de obediencia.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor
  - dueño
  lexicon: κύριος
  rationale: Aquí la forma de tratamiento y referencia a Dios en la voz de oración se traduce naturalmente como «Señor»; no se requiere la forma del nombre divino porque el griego usa κύριος en el discurso dirigido al Señor.
- source_word: ἐνισχύοντός με
  english_pob_choice: with the Lord strengthening me
  chosen_spanish: con el Señor fortaleciéndome
  alternatives_spanish:
  - mientras el Señor me fortalece
  - con el Señor que me fortalece
  lexicon: ἐνισχύω
  rationale: La construcción participial expresa acción acompañante; «con el Señor fortaleciéndome» preserva el paralelismo y la dependencia continua que muestra el griego y el inglés POB.
theological_decisions:
- issue: Relación entre el Señor invocado y el agente que fortalece
  english_pob_reading: because you are with me ... with the Lord strengthening me
  chosen_spanish_reading: porque tú estás conmigo ... con el Señor fortaleciéndome
  alternative_spanish_readings:
  - porque tú estás conmigo ... mientras el Señor me fortalece
  - porque tú estás conmigo ... con el Señor que me fortalece
  rationale: El texto mantiene una cercanía entre la presencia del Señor y la fortaleza recibida, sin fusionar indebidamente las funciones; el español conserva esa doble referencia para no borrar la dependencia personal del orante.
  doctrine_reference: providencia y asistencia divina en la obediencia
- issue: Lenguaje de conflicto espiritual y victoria
  english_pob_reading: cut off all the devil’s power ... we shall gain mastery over him and prevail against all his works
  chosen_spanish_reading: cortarás todo el poder del diablo ... venceremos sobre él y prevaleceremos contra todas sus obras
  alternative_spanish_readings:
  - destruirás todo el poder del diablo ... obtendremos dominio sobre él
  - quitarás todo el poder del diablo ... venceremos y saldremos victoriosos
  rationale: Se conserva el lenguaje de confrontación real contra el diablo y sus obras, sin rebajarlo a mera metáfora moral. «Cortarás» mantiene la imagen de restricción/abolición del poder hostil, y «prevaleceremos» expresa victoria continuada.
  doctrine_reference: guerra espiritual y perseverancia en la obediencia
translation_notes:
  revision_awareness: No se detectan revisiones aplicadas en el paquete auditado. La redacción española se apoya directamente en el texto griego normalizado y en la equivalencia óptima del inglés POB, sin depender de una tradición eclesiástica fija.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος por tratarse de discurso orante y no de una cita explícita del nombre divino.
  - Se usa «mandamientos» de forma consistente para ἐντολαί, en línea con el tono exhortativo del pasaje.
  - Se conserva la tensión entre victoria humana («venceremos») y dependencia divina («con el Señor fortaleciéndome»).
