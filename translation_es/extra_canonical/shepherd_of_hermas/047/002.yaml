    text: «Sanidad» conserva la metáfora de curación del original; también podría entenderse como «curación».
    reason: lexical_alternative
  revision_rationale: Se ajusta la exhortación inicial a un español más natural y más cercano al matiz de πιστεύω con dativo mediante «confíen en Dios». También se reestructura la oración para evitar la secuencia torpe «ustedes... que si», y se suaviza «sanidad a sus pecados» a «sanidad para sus pecados» para conservar la metáfora con mejor idiomaticidad. No se requieren cambios doctrinales ni adjudicación especializada.
