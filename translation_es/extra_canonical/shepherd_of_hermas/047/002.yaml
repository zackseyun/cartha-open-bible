base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/047/002.yaml
  text: Therefore, believe God—you who, on account of your sins, have despaired of your life, and are adding sins and weighing down your life—that if you turn back to the Lord with your whole heart and work righteousness for the remaining days of your life, and serve him rightly according to his will, he will bring healing to your former sins, and you will have power to gain mastery over the works of the devil. And do not at all fear the devil’s threat; for he is powerless, like the sinews of a dead man.
translation:
  language: es
  text: Por tanto, confíen en Dios, ustedes que, a causa de sus pecados, han desesperado de su vida y siguen añadiendo pecados y cargando su vida; si vuelven al Señor con todo su corazón, practican la justicia por los días que les quedan de vida y le sirven rectamente conforme a su voluntad, él traerá sanidad[a] para sus pecados anteriores, y tendrán poder para dominar las obras del diablo. Y no teman en absoluto la amenaza del diablo, porque él es impotente, como los tendones de un hombre muerto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sanidad» conserva la metáfora de curación del original; también podría entenderse como «curación».
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστευε τῷ θεῷ
  english_pob_choice: believe God
  chosen_spanish: crean en Dios
  alternatives_spanish:
  - crean a Dios
  - confíen en Dios
  lexicon: πιστεύω + dativo
  rationale: El dativo con πιστεύω puede expresar confiar/creer; en español bíblico fluido, «crean en Dios» comunica mejor el acto de fe que «crean a Dios», que suena menos natural y más ambiguo. «Confíen en Dios» sería posible, pero «crean en Dios» mantiene más de cerca la formulación exhortativa del texto.
- source_word: ἀπογνόντες
  english_pob_choice: have despaired of your life
  chosen_spanish: han desesperado de su vida
  alternatives_spanish:
  - han perdido la esperanza de su vida
  - han desesperado de la vida
  lexicon: ἀπογινώσκω
  rationale: Se conserva el sentido de desánimo extremo vinculado con la propia vida. «Han desesperado de su vida» sigue de cerca la estructura y mantiene el tono serio del original; se evita una paráfrasis más explicativa que debilitaría la fuerza de la exhortación.
- source_word: ἐργασάμενοι δικαιοσύνην
  english_pob_choice: work righteousness
  chosen_spanish: practican la justicia
  alternatives_spanish:
  - obran justicia
  - hacen justicia
  lexicon: δικαιοσύνη
  rationale: «Practican la justicia» expresa bien el resultado concreto y continuado de ἐργάζομαι + acusativo en un español natural. Se evita «rectitud» porque aquí el contexto es ético y conductual, no meramente interior.
- source_word: δουλεύσατε αὐτῷ καλῶς
  english_pob_choice: serve him rightly
  chosen_spanish: le sirven rectamente
  alternatives_spanish:
  - le sirven bien
  - le sirven correctamente
  lexicon: δουλεύω
  rationale: El verbo conserva la imagen de servicio leal a Dios. «Rectamente» reproduce el valor adverbial de καλῶς sin suavizarlo a un mero «bien», y armoniza con la idea de obediencia conforme a su voluntad.
- source_word: τὰ πρότερα ἁμαρτήματα
  english_pob_choice: your former sins
  chosen_spanish: sus pecados anteriores
  alternatives_spanish:
  - sus pecados pasados
  - sus pecados de antes
  lexicon: ἁμάρτημα
  rationale: «Anteriores» mantiene el matiz temporal directo sin añadir una carga interpretativa extra. Es una fórmula sobria y publicable en español actual.
- source_word: νικῆσαι τὰ ἔργα τοῦ διαβόλου
  english_pob_choice: gain mastery over the works of the devil
  chosen_spanish: dominar las obras del diablo
  alternatives_spanish:
  - vencer las obras del diablo
  - triunfar sobre las obras del diablo
  lexicon: νικάω + ἔργα
  rationale: «Dominar» conserva la idea de superioridad efectiva y capacidad de prevalecer. «Obras del diablo» mantiene la referencia causal/agentiva del genitivo sin reescritura doctrinal.
- source_word: ὡς νεκροῦ ἀνδρὸς νεῦρα
  english_pob_choice: like the sinews of a dead man
  chosen_spanish: como los tendones de un hombre muerto
  alternatives_spanish:
  - como los nervios de un muerto
  - como las cuerdas de un muerto
  lexicon: νεῦρα
  rationale: «Tendones» es la equivalencia más directa para νεῦρα en este contexto de fuerza física nula. Se evita «nervios», que en español moderno puede sonar anatómicamente impreciso o figurado.
theological_decisions:
- issue: Tratamiento del nombre divino en un contexto exhortativo
  english_pob_reading: believe God ... turn back to the Lord
  chosen_spanish_reading: crean en Dios ... vuelven al Señor
  alternative_spanish_readings:
  - crean en Dios ... vuelven a Yahvé
  - crean en Dios ... vuelven al Señor
  rationale: El texto griego alterna θεῷ y κυρίῳ; en la primera ocurrencia se traduce con «Dios» y en la segunda con «el Señor» siguiendo el audit trail del inglés POB, sin forzar una identidad explícita en el castellano donde el contexto ya la sugiere. En esta unidad, el uso de «Señor» conserva la referencia reverente establecida por el texto y por la tradición de la pieza, mientras que «Dios» mantiene la fuerza del dative de fe.
  doctrine_reference: Monoteísmo bíblico; uso reverente de κύριος en literatura cristiana primitiva
- issue: Relación entre arrepentimiento práctico y perdón/curación
  english_pob_reading: he will bring healing to your former sins
  chosen_spanish_reading: él traerá sanidad a sus pecados anteriores
  alternative_spanish_readings:
  - él sanará sus pecados anteriores
  - él traerá curación a sus pecados anteriores
  rationale: «Sanidad» conserva la metáfora terapéutica del texto sin convertirla en una formulación puramente jurídica. Se evita eliminar la imagen de curación, que aquí es parte del argumento espiritual de restauración.
  doctrine_reference: Restauración moral y perdón de los pecados en la práctica penitencial primitiva
- issue: Imagen de impotencia del diablo
  english_pob_reading: he is powerless, like the sinews of a dead man
  chosen_spanish_reading: él es impotente, como los tendones de un hombre muerto
  alternative_spanish_readings:
  - él no tiene poder, como los tendones de un hombre muerto
  - él es débil, como los tendones de un hombre muerto
  rationale: Se mantiene la comparación corporal cruda del original para subrayar la completa incapacidad del diablo. «Impotente» refleja el juicio explícito del texto y «tendones» preserva la imagen física sin suavizarla.
  doctrine_reference: Victoria sobre el diablo; limitación del poder demoníaco
translation_notes:
  revision_awareness: No se registran revisiones previas aplicadas en el paquete. La redacción sigue directamente el griego normalizado del texto fuente, usando el inglés POB solo como control de decisión para mantener la equivalencia óptima y las imágenes retóricas del pasaje.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Señor» para κύριος, conforme al patrón del proyecto y al contexto inmediato.
  - Se conserva «justicia» para δικαιοσύνη por su fuerza ética concreta.
  - «Diablo» se usa consistentemente para διάβολος y se mantiene el plural de sentido en «obras» sin expandir la interpretación.
  - La exhortación está en segunda persona plural, coherente con el destinatario colectivo del pasaje.
