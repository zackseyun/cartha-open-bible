  text: …to establish them in the faith.
translation:
  language: es
  text: …para establecerlos en la fe.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν τῇ πίστει
  english_pob_choice: in the faith
  chosen_spanish: en la fe
  alternatives_spanish:
  - en la fidelidad
  - en la confianza
  lexicon: πίστις
  rationale: El griego pide aquí el sentido normal de ‘fe’ como adhesión confiada a Dios; ‘la fe’ conserva el artículo y el valor comunitario de la expresión sin volverla doctrinalmente más estrecha de lo que el texto permite.
- source_word: στήσαι / ἵστημι
  english_pob_choice: to establish
  chosen_spanish: establecer
  alternatives_spanish:
  - afirmar
  - consolidar
  lexicon: ἵστημι
  rationale: ‘Establecer’ reproduce bien la idea de hacer firme o firme establecido a alguien; ‘afirmar’ o ‘consolidar’ serían posibles, pero ‘establecer’ mantiene mejor el matiz de fijar en una condición estable.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - les
  lexicon: αὐτός
  rationale: El acusativo plural directo del pronombre se expresa naturalmente con ‘los’ en español, manteniendo la referencia a las personas implicadas sin añadir contenido.
theological_decisions:
- issue: El sentido de ‘la fe’ como confianza creyente o como el cuerpo de la fe cristiana
  english_pob_reading: in the faith
  chosen_spanish_reading: en la fe
  alternative_spanish_readings:
  - en la fidelidad
  - en la fe cristiana
  rationale: El contexto breve no obliga a precisar entre fe subjetiva y contenido objetivo; por eso se conserva la formulación abierta ‘en la fe’, que puede abarcar la fidelidad creyente y la esfera de la fe sin sobreinterpretar.
  doctrine_reference: πίστις / faith semantics; context-sensitive usage
translation_notes:
  revision_awareness: No se registran revisiones aplicadas ni variantes textuales en el expediente proporcionado; el renglón inglés disponible (‘…to establish them in the faith.’) es breve y no trae aparato de notas, por lo que la versión española sigue de cerca esa formulación sin introducir expansiones.
  spanish_consistency_notes:
  - Se mantiene una dicción sobria y eclesial, pero sin recurrir a fórmulas tradicionales que oculten el valor léxico del original.
  - No se añaden notas al pie porque el expediente no documenta variantes ni alternativas textuales relevantes para este segmento.
