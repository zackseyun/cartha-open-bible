review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego tal como lo refleja la traducción POB inglesa: reprensión triple, pertenencia ajena de los bienes, autoridad del señor de la ciudad/tierra, expulsión y la inutilidad de las posesiones. No hay desviaciones doctrinales notables. Sin embargo, hay pequeños puntos de forma y matiz: «casas» en la enumeración rompe la correspondencia con singular posterior («tu casa»), y «te dice con razón» suena menos inmediato que el presente histórico del inglés; además, conviene mantener el paralelismo con «moradas»/«casa».'
  spanish_quality_summary: 'El español es claro y digno, generalmente natural y legible. La fraseo jurídico y admonitorio funciona bien. Aun así, una leve pulida mejora la cohesión interna: «moradas» enlaza mejor con el griego/inglés «dwellings» sin sonar técnico, y «te dice, con razón» mejora la puntuación. El resto es idiomático y fiel.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «señor» para κύριος aquí es correcto por tratarse de dominio humano/metafórico, no del nombre divino. «ajenas», «autoridad», «leyes» y «miserable» son decisiones defendibles y fieles al razonamiento del pasaje.
  issues:
  - severity: medium
    issue: Inconsistencia léxica entre «casas» y luego «tu casa»
    rationale: El original/POB inglés tiene «dwellings» y luego singular «your house». En español, «campos, casas» seguido de «tu casa» no es incorrecto, pero «campos, moradas» o «campos y moradas» conserva mejor la amplitud inicial sin chocar con el singular posterior.
  - severity: low
    issue: Matiz de discurso en «te dice con razón»
    rationale: La colocación sin coma suena un poco menos natural. «te dice, con razón» o «te dirá, con razón» mejora la fluidez sin cambiar el sentido.
