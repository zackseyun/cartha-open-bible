  revision_rationale: 'La revisión es menor y busca mejorar la cohesión léxica y la naturalidad del español sin alterar el sentido: «moradas» refleja mejor el plural amplio de κατοικήσεις/dwellings antes del singular «tu casa», y la coma en «te dice, con razón» mejora el flujo. No se requieren notas adicionales.'
