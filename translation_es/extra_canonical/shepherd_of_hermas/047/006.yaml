  text: Foolish, double‑minded, and wretched man, do you not understand that all these things are alien, and are under the authority of another? For the lord of this city will say, ‘I do not want you to dwell in my city; rather, go out from this city, because you do not make use of my laws.’ So then, you—having fields and dwellings and many other possessions—when you are cast out by him, what will you do with your field and your house, and the rest of the things you have prepared for yourself? For the lord of this land says to you, rightly, ‘Either make use of my laws, or withdraw from my land.’ So then, what are you about to do, having…
translation:
  language: es
  text: '¡Insensato, de doble ánimo y miserable! ¿No entiendes que todas estas cosas son ajenas y están bajo la autoridad de otro? Porque el señor de esta ciudad te dirá: «No quiero que habites en mi ciudad; más bien, sal de esta ciudad, porque no haces uso de mis leyes». Así pues, tú, que tienes campos, moradas y muchas otras posesiones, cuando él te eche fuera, ¿qué harás con tu campo y tu casa, y con el resto de las cosas que has preparado para ti? Porque el señor de esta tierra te dice, con razón: «O haces uso de mis leyes, o te retiras de mi tierra». Así pues, ¿qué vas a hacer, teniendo…'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μωρέ
  english_pob_choice: Foolish
  chosen_spanish: Insensato
  alternatives_spanish:
  - Necio
  - ¡Insensato!
  lexicon: μωρός
  rationale: Opté por un término fuerte y natural en español para el reproche directo. "Insensato" conserva mejor el tono admonitorio que un simple "necio" y evita una coloración demasiado coloquial.
- source_word: δίψυχε
  english_pob_choice: double-minded
  chosen_spanish: de doble ánimo
  alternatives_spanish:
  - de doble pensamiento
  - inconstante
  lexicon: δίψυχος
  rationale: La expresión tradicional "de doble ánimo" es clara, bíblica y transmite bien la división interior sin banalizarla. "De doble pensamiento" suena más literal pero menos idiomático.
- source_word: ταπεινέ
  english_pob_choice: wretched
  chosen_spanish: miserable
  alternatives_spanish:
  - desdichado
  - pobre
  lexicon: ταπεινός
  rationale: Aquí el inglés POB toma un valor de humillación/aflicción. "Miserable" conserva la fuerza del reproche y funciona mejor que "pobre", que sería ambiguo.
- source_word: ἀλλότρια
  english_pob_choice: alien
  chosen_spanish: ajenas
  alternatives_spanish:
  - extrañas
  - de otro
  lexicon: ἀλλότριος
  rationale: Elegí "ajenas" para mantener la idea de pertenencia ajena, no solo rareza. Encaja con el contraste jurídico de propiedad y autoridad en el pasaje.
- source_word: ἐξουσία
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - dominio
  lexicon: ἐξουσία
  rationale: '"Autoridad" refleja bien la capacidad legítima de mando que el texto atribuye al señor de la ciudad y de la tierra.'
- source_word: κύριος
  english_pob_choice: lord
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - dueño
  lexicon: κύριος
  rationale: En este contexto de posesión y jurisdicción, "señor" preserva la relación de dominio sin imponer necesariamente la carga teológica de "Yahvé" o "Señor" en sentido divino.
- source_word: νόμοι
  english_pob_choice: laws
  chosen_spanish: leyes
  alternatives_spanish:
  - mandatos
  - estatutos
  lexicon: νόμος
  rationale: '"Leyes" es el equivalente más directo y apropiado para las reglas de la ciudad y de la tierra; mantiene el marco legal del argumento.'
- source_word: ἀπέρχου
  english_pob_choice: go out / withdraw
  chosen_spanish: sal de esta ciudad / te retiras de mi tierra
  alternatives_spanish:
  - vete
  - aléjate
  lexicon: ἀπέρχομαι
  rationale: 'Dado que el griego transmite dos formulaciones parecidas en contextos paralelos, conservé ambas matizando según el objeto: "sal de esta ciudad" y "te retiras de mi tierra". Esto mantiene el valor de salida/separación sin forzar una sola solución.'
- source_word: κτήματα
  english_pob_choice: possessions
  chosen_spanish: posesiones
  alternatives_spanish:
  - bienes
  - propiedades
  lexicon: κτῆμα
  rationale: '"Posesiones" es suficientemente amplio para campos, casas y demás bienes enumerados, y evita restringir el término a propiedad inmueble solamente.'
theological_decisions:
- issue: Autoridad legítima sobre un territorio ajeno frente a la pertenencia del creyente
  english_pob_reading: all these things are alien, and are under the authority of another
  chosen_spanish_reading: todas estas cosas son ajenas y están bajo la autoridad de otro
  alternative_spanish_readings:
  - son de otro
  - están sujetas a otro
  rationale: 'La formulación conserva la tensión entre pertenencia y jurisdicción: no solo son "de otro", sino que están bajo su autoridad. Esto refleja mejor el razonamiento moral del pasaje.'
  doctrine_reference: Cristología práctica / mayordomía y desapego del mundo
- issue: Imperativos alternativos del señor de la tierra
  english_pob_reading: Either make use of my laws, or withdraw from my land.
  chosen_spanish_reading: O haces uso de mis leyes, o te retiras de mi tierra
  alternative_spanish_readings:
  - O usa mis leyes, o sal de mi tierra
  - O te sirves de mis leyes, o abandona mi tierra
  rationale: 'Mantengo la disyuntiva tajante del original: o se participa en el orden legal del dueño, o se abandona el territorio. La redacción evita suavizar el mandato.'
  doctrine_reference: Ética de obediencia / separación
- issue: Dirección del reproche y acumulación de posesiones
  english_pob_reading: having fields and dwellings and many other possessions
  chosen_spanish_reading: que tienes campos, casas y muchas otras posesiones
  alternative_spanish_readings:
  - teniendo campos y viviendas y muchas otras cosas
  - poseyendo campos, casas y muchas otras propiedades
  rationale: 'Conservo la enumeración concreta que intensifica la pregunta retórica: incluso con abundancia de bienes, el expulsado no podrá retenerlos. "Casas" es más natural que "viviendas" en español actual.'
  doctrine_reference: Vanidad de la riqueza / incertidumbre de la posesión humana
translation_notes:
  revision_awareness: No hay revisiones registradas en el paquete; la traducción se hizo directamente desde el griego normalizado del apócrifo cristiano, usando la traducción inglesa POB solo como control de decisiones léxicas y de tono.
  spanish_consistency_notes:
  - Mantuve "señor" en minúscula para los dueños humanos del símil, diferenciándolo del uso divino de "Yahvé" según la norma del proyecto.
  - Conservé el paralelismo retórico y las preguntas directas del original, sin convertirlas en paráfrasis explicativa.
  - Usé "de doble ánimo" como expresión estable en español bíblico por su claridad y concisión.
