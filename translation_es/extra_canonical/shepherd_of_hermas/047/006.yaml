revisions:
- from: '¡Insensato, de doble ánimo y miserable! ¿No entiendes que todas estas cosas son ajenas y están bajo la autoridad de otro? Porque el señor de esta ciudad te dirá: “No quiero que habites en mi ciudad; más bien, sal de esta ciudad, porque no haces uso de mis leyes”. Así pues, tú, que tienes campos, casas y muchas otras posesiones, cuando él te eche fuera, ¿qué harás con tu campo y tu casa, y con el resto de las cosas que has preparado para ti? Porque el señor de esta tierra te dice con razón: “O haces uso de mis leyes, o te retiras de mi tierra”. Así pues, ¿qué vas a hacer, teniendo…'
  to: '¡Insensato, de doble ánimo y miserable! ¿No entiendes que todas estas cosas son ajenas y están bajo la autoridad de otro? Porque el señor de esta ciudad te dirá: «No quiero que habites en mi ciudad; más bien, sal de esta ciudad, porque no haces uso de mis leyes». Así pues, tú, que tienes campos, moradas y muchas otras posesiones, cuando él te eche fuera, ¿qué harás con tu campo y tu casa, y con el resto de las cosas que has preparado para ti? Porque el señor de esta tierra te dice, con razón: «O haces uso de mis leyes, o te retiras de mi tierra». Así pues, ¿qué vas a hacer, teniendo…'
  rationale: 'La revisión es menor y busca mejorar la cohesión léxica y la naturalidad del español sin alterar el sentido: «moradas» refleja mejor el plural amplio de κατοικήσεις/dwellings antes del singular «tu casa», y la coma en «te dice, con razón» mejora el flujo. No se requieren notas adicionales.'
