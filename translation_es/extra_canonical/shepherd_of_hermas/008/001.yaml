revisions:
- from: 'Y me fue revelado, hermanos, mientras dormía, por un joven de gran belleza, que me dijo: «La anciana, de quien recibiste el librito, ¿quién piensas que es?» Yo dije: «La Sibila». «Te equivocas», dice él; «no lo es». «Entonces, ¿quién es?», digo yo. «La Iglesia», dice él. Yo le dije: «¿Por qué, entonces, es anciana?» «Porque», dice él, «fue creada antes que todas las cosas; por eso es anciana, y por ella fue formado el mundo».'
  to: 'Y se me reveló, hermanos, mientras dormía, por medio de un joven de gran belleza, que me dijo: «La anciana, de quien recibiste el librito, ¿quién piensas que es?» Yo dije: «La Sibila». «Te equivocas», dice él; «no es ella». «Entonces, ¿quién es?», digo yo. «La Iglesia», dice él. Yo le dije: «¿Por qué, entonces, es anciana?» «Porque», dice él, «fue creada antes que todas las cosas; por eso es anciana, y por ella fue formado el mundo».'
  rationale: Se ajusta una expresión poco idiomática («no lo es») a una negación de identidad más natural en español («no es ella») y se suaviza levemente la apertura narrativa («se me reveló» / «por medio de») sin alterar el sentido del original ni las decisiones teológicas o léxicas principales.
