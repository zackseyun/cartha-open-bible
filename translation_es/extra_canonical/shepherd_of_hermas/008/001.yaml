  revision_rationale: Se ajusta una expresión poco idiomática («no lo es») a una negación de identidad más natural en español («no es ella») y se suaviza levemente la apertura narrativa («se me reveló» / «por medio de») sin alterar el sentido del original ni las decisiones teológicas o léxicas principales.
