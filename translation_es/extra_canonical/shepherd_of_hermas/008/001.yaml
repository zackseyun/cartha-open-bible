base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/008/001.yaml
  text: 'And it was revealed to me, brothers, while I was asleep, by a very handsome young man who said to me: “The old woman, from whom you received the little book—who do you think she is?” I said, “The Sibyl.” “You are mistaken,” he says; “she is not.” “Then who is she?” I say. “The Church,” he says. I said to him, “Why then is she old?” “Because,” he says, “she was created first of all; for this reason she is old, and for her sake the world was formed.”'
translation:
  language: es
  text: 'Y se me reveló, hermanos, mientras dormía, por medio de un joven de gran belleza, que me dijo: «La anciana, de quien recibiste el librito, ¿quién piensas que es?» Yo dije: «La Sibila». «Te equivocas», dice él; «no es ella». «Entonces, ¿quién es?», digo yo. «La Iglesia», dice él. Yo le dije: «¿Por qué, entonces, es anciana?» «Porque», dice él, «fue creada antes que todas las cosas; por eso es anciana, y por ella fue formado el mundo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐνεφανίσθη / ἐφανερώθη (reported revelation)
  english_pob_choice: it was revealed to me
  chosen_spanish: me fue revelado
  alternatives_spanish:
  - se me manifestó
  - se me dio a conocer
  lexicon: revelar / manifestar
  rationale: El sentido narrativo es pasivo y sobrenatural; «me fue revelado» conserva la pasividad y la iniciativa divina sin añadir matices no atestiguados.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanas y hermanos
  - amados hermanos
  lexicon: ἀδελφοί
  rationale: La forma vocativa en el contexto eclesial se vierte de manera natural como «hermanos», siguiendo el registro de la audiencia y sin forzar inclusividad no presente en el texto base.
- source_word: καλὸς νεανίσκος
  english_pob_choice: a very handsome young man
  chosen_spanish: un joven de gran belleza
  alternatives_spanish:
  - un joven muy hermoso
  - un joven muy apuesto
  lexicon: καλός / νεανίσκος
  rationale: «De gran belleza» comunica el valor estético de καλός sin reducirlo solo a apariencia masculina; «apuesto» es posible, pero menos abarcador y más coloquial.
- source_word: βιβλαρίδιον
  english_pob_choice: the little book
  chosen_spanish: el librito
  alternatives_spanish:
  - el pequeño libro
  - el librito pequeño
  lexicon: diminutivo de βιβλίον
  rationale: El diminutivo español «librito» reproduce bien la forma y el valor afectivo/tamaño del original.
- source_word: Σίβυλλα
  english_pob_choice: the Sibyl
  chosen_spanish: la Sibila
  alternatives_spanish:
  - la Sibila
  - la sibila
  lexicon: Σίβυλλα
  rationale: Se conserva el nombre propio tradicionalmente adaptado en español como «Sibila», coherente con el referente cultural grecorromano.
- source_word: Ἐκκλησία
  english_pob_choice: the Church
  chosen_spanish: la Iglesia
  alternatives_spanish:
  - la asamblea
  - la congregación
  lexicon: ἐκκλησία
  rationale: «Iglesia» es la equivalencia estable en español para el sujeto alegórico eclesial del pasaje; «asamblea» perdería la personificación tradicional y el alcance teológico del contexto.
- source_word: πρῶτον ἐκτίσθη
  english_pob_choice: she was created first of all
  chosen_spanish: fue creada antes que todas las cosas
  alternatives_spanish:
  - fue creada primero de todo
  - fue creada en primer lugar
  lexicon: κτίζω / πρῶτον
  rationale: La frase «antes que todas las cosas» explicita en español el valor temporal y absoluto de πρῶτον en el argumento, evitando una construcción poco natural sin debilitar la prioridad ontológica.
- source_word: διὰ τοῦτο γέρουσιν
  english_pob_choice: for this reason she is old
  chosen_spanish: por eso es anciana
  alternatives_spanish:
  - por eso es vieja
  - por esta causa es anciana
  lexicon: γέρων
  rationale: «Anciana» conserva el tono respetuoso y alegórico de la figura femenina; «vieja» sonaría demasiado coloquial o despectivo en español.
- source_word: δι’ αὐτὴν ὁ κόσμος κατεσκευάσθη
  english_pob_choice: for her sake the world was formed
  chosen_spanish: y por ella fue formado el mundo
  alternatives_spanish:
  - y a causa de ella fue formado el mundo
  - y el mundo fue formado por causa de ella
  lexicon: διὰ + acusativo / κατασκευάζω
  rationale: 'La construcción final mantiene la causalidad teleológica: el mundo fue formado «por ella» / «por su causa». La forma escogida es fluida y fiel al argumento del pasaje.'
theological_decisions:
- issue: Identidad alegórica de la anciana
  english_pob_reading: The old woman ... is the Church
  chosen_spanish_reading: La anciana ... es la Iglesia
  alternative_spanish_readings:
  - la asamblea
  - la congregación
  rationale: Se conserva la interpretación cristiana explícita del texto y la personificación eclesial; cambiarla a términos sociológicos diluiría la identificación teológica del pasaje.
  doctrine_reference: Eclesiología alegórica primitiva en Shepherd of Hermas
- issue: Prioridad de la Iglesia en la creación
  english_pob_reading: she was created first of all; for this reason she is old, and for her sake the world was formed
  chosen_spanish_reading: fue creada antes que todas las cosas; por eso es anciana, y por ella fue formado el mundo
  alternative_spanish_readings:
  - fue creada primero de todo; por eso es antigua, y por causa de ella fue hecho el mundo
  rationale: La redacción preserva la afirmación fuerte y potencialmente tensionante de preexistencia/fundamento cósmico de la Iglesia tal como aparece en la obra, sin suavizarla hacia una mera prioridad histórica.
  doctrine_reference: Cristología/eclesiología simbólica en literatura cristiana primitiva
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete; la versión española sigue el texto base auditado y conserva el tono narrativo-directo del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este pasaje no contiene el nombre divino.
  - Se usa «Iglesia» para Ἐκκλησία por coherencia con el discurso alegórico cristiano del texto.
  - Se conserva el diminutivo «librito» para reflejar el matiz del original griego.
