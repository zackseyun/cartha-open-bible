  text: 2. Afterward I saw a vision in my house. The old woman came and asked me whether I had already given the book to the elders. I denied having given it. “You have done well,” she says; “for I have words to add. When, therefore, I complete all the words, through you they will be made known to all the elect.
translation:
  language: es
  text: 2. Después vi una visión en mi casa. La anciana vino y me preguntó si ya había entregado el libro a los ancianos. Yo negué haberlo entregado. «Has hecho bien», me dice; «porque tengo palabras para añadir. Cuando, pues, termine todas las palabras, por medio de ti serán dadas a conocer a todos los escogidos».
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: βιβλίον / book
  english_pob_choice: book
  chosen_spanish: libro
  alternatives_spanish:
  - escrito
  - rollo
  lexicon: βιβλίον
  rationale: El griego indica un libro o escrito concreto; en español moderno “libro” es la opción más natural y fiel. “Rollo” sería posible históricamente, pero no está exigido por el contexto inmediato ni por la redacción inglesa auditada.
- source_word: πρεσβύτεροι / elders
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  lexicon: πρεσβύτεροι
  rationale: POB mantiene “elders” en sentido eclesial/comunitario. En español, “ancianos” conserva esa amplitud sin imponer de antemano una lectura ministerial técnica que el contexto no desarrolla.
- source_word: ἀρνέομαι / denied
  english_pob_choice: I denied having given it
  chosen_spanish: negué haberlo entregado
  alternatives_spanish:
  - dije que no lo había dado
  - rechacé haberlo entregado
  lexicon: ἀρνέομαι
  rationale: “Negué” reproduce bien la negación del hecho y suena natural en español. “Entregarlo” evita la repetición de “dar” y comunica el acto de pasar el libro a los ancianos.
- source_word: λόγους προσθεῖναι / have words to add
  english_pob_choice: I have words to add
  chosen_spanish: tengo palabras para añadir
  alternatives_spanish:
  - me quedan palabras por añadir
  - tengo aún más palabras
  lexicon: λόγος
  rationale: 'Se conserva la imagen verbal del original: todavía hay más palabras por comunicar. “Palabras para añadir” refleja el contenido pendiente sin expandir el sentido.'
- source_word: γνωσθήσονται / will be made known
  english_pob_choice: they will be made known
  chosen_spanish: serán dadas a conocer
  alternatives_spanish:
  - serán conocidas
  - se harán conocer
  lexicon: γνωρίζω
  rationale: “Serán dadas a conocer” mantiene la pasiva con matiz comunicativo y suena idiomática en español bíblico contemporáneo.
- source_word: ἐκλεκτοί / elect
  english_pob_choice: elect
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  - electos
  lexicon: ἐκλεκτοί
  rationale: “Escogidos” comunica claramente la idea de selección divina/comunitaria en español amplio. “Electos” es más técnico; “elegidos” es viable pero menos consistente con el uso bíblico de POB en español.
theological_decisions:
- issue: Identidad y tratamiento de la figura de la “anciana”
  english_pob_reading: The old woman came
  chosen_spanish_reading: La anciana vino
  alternative_spanish_readings:
  - La mujer anciana vino
  - La vieja vino
  rationale: Se conserva la figura simbólica sin cargarla con un tono peyorativo. “Anciana” es fiel al inglés auditado y apto para un registro reverente.
  doctrine_reference: Ninguna doctrina específica; decisión de registro y caracterización narrativa.
- issue: Divulgación del mensaje a los elegidos
  english_pob_reading: through you they will be made known to all the elect
  chosen_spanish_reading: por medio de ti serán dadas a conocer a todos los escogidos
  alternative_spanish_readings:
  - por ti serán conocidas por todos los escogidos
  - a través de ti se conocerán para todos los escogidos
  rationale: 'Se mantiene la mediación profética del narrador: el contenido llega a los escogidos mediante él, no por iniciativa autónoma humana. La pasiva evita sobreinterpretar la agencia.'
  doctrine_reference: Revelación profética / mediación del mensaje.
translation_notes:
  revision_awareness: La versión inglesa auditada es de alta concordancia y no presenta notas léxicas ni teológicas registradas. La revisión detecta solo cuestiones menores de fluidez, por lo que la presente redacción sigue de cerca el sentido del inglés POB sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se mantiene “ancianos” para πρεσβύτεροι, en línea con un registro eclesial amplio y sin forzar un tecnicismo ministerial.
  - Se usa “escogidos” para ἐκλεκτοί para conservar la terminología bíblica sin introducir “electos”, menos natural en español común.
  - 'Se conserva el tiempo narrativo simple y la secuencia de acciones del original: visión, pregunta, negación, aprobación, anuncio final.'
