  yaml_path: translation/extra_canonical/shepherd_of_hermas/008/003.yaml
  text: 3. “So you will write two little booklets, and you will send one to Clement and one to Grapte. Then Clement will send it to the cities outside, for this has been entrusted to him; but Grapte will admonish the widows and the orphans. But you will read it aloud in this city with the elders who preside over the church.”
translation:
  language: es
  text: 3. «Así, escribirás dos libritos, y enviarás uno a Clemente y otro a Grapte. Entonces Clemente lo enviará a las ciudades de afuera, porque esto le ha sido confiado; pero Grapte amonestará a las viudas y a los huérfanos. Y tú lo leerás en voz alta en esta ciudad, con los ancianos que presiden la iglesia».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μικρὰ βιβλαρίδια / little booklets
  english_pob_choice: two little booklets
  chosen_spanish: dos libritos
  alternatives_spanish:
  - dos libritos pequeños
  - dos pequeños cuadernillos
  lexicon: librito
  rationale: El diminutivo español reproduce bien el valor de βιβλαρίδια sin volverse demasiado técnico; ‘cuadernillos’ sería posible, pero ‘libritos’ mantiene naturalidad y cercanía al matiz de ‘little booklets’.
- source_word: ἀποστελεῖς / you will send
  english_pob_choice: you will send
  chosen_spanish: enviarás
  alternatives_spanish:
  - mandarás
  lexicon: enviar
  rationale: ‘Enviar’ es más sobrio y adecuado para una traducción eclesial; conserva la acción sin añadir coloquialidad.
- source_word: Κλήμεντι
  english_pob_choice: Clement
  chosen_spanish: Clemente
  alternatives_spanish:
  - Clement
  lexicon: Clemente
  rationale: Se adapta al nombre propio al uso castellano tradicional y legible, sin alterar la referencia personal.
- source_word: Γραπτῇ
  english_pob_choice: Grapte
  chosen_spanish: Grapte
  alternatives_spanish:
  - Grapté
  lexicon: Grapte
  rationale: Se conserva la forma transliterada estable del nombre; no hay necesidad de castellanizarlo con acento gráfico adicional.
- source_word: ἔξω πόλεις / the cities outside
  english_pob_choice: the cities outside
  chosen_spanish: las ciudades de afuera
  alternatives_spanish:
  - las ciudades exteriores
  - las ciudades fuera de aquí
  lexicon: afuera
  rationale: ‘De afuera’ refleja el contraste espacial del griego y del inglés POB sin sobreinterpretar el referente; mantiene la ambigüedad de si son ciudades externas al área inmediata o fuera de la ciudad presente.
- source_word: παρεγγύηται / has been entrusted to him
  english_pob_choice: has been entrusted to him
  chosen_spanish: le ha sido confiado
  alternatives_spanish:
  - se le ha encomendado
  - ha sido puesto a su cargo
  lexicon: confiar/encomendar
  rationale: ‘Le ha sido confiado’ conserva la pasiva y el carácter de delegación de responsabilidad; ‘encomendado’ sería igualmente válido, pero ‘confiado’ sigue de cerca el valor de entrust.
- source_word: νουθετήσει / will admonish
  english_pob_choice: will admonish
  chosen_spanish: amonestará
  alternatives_spanish:
  - exhortará
  - advertirá
  lexicon: amonestar
  rationale: ‘Amonestar’ preserva la fuerza correctiva/pastoral de νουθετέω, mejor que un simple ‘aconsejar’ o ‘exhortar’.
- source_word: χήρας καὶ ὀρφανούς / the widows and the orphans
  english_pob_choice: the widows and the orphans
  chosen_spanish: las viudas y los huérfanos
  alternatives_spanish:
  - las viudas y a los huérfanos
  - viudas y huérfanos
  lexicon: viudas/huérfanos
  rationale: Se mantiene la fórmula social y bíblica estándar, clara en español y fiel al original.
- source_word: ἀναγνώσῃς / you will read aloud
  english_pob_choice: you will read it aloud
  chosen_spanish: lo leerás en voz alta
  alternatives_spanish:
  - lo leerás en público
  - lo proclamarás
  lexicon: leer en voz alta
  rationale: ‘Leerás en voz alta’ preserva el carácter oral explícito del verbo y evita introducir un matiz litúrgico más fuerte de ‘proclamar’.
- source_word: μετὰ τῶν πρεσβυτέρων τῶν προεστώτων τῆς ἐκκλησίας / with the elders who preside over the church
  english_pob_choice: with the elders who preside over the church
  chosen_spanish: con los ancianos que presiden sobre la iglesia
  alternatives_spanish:
  - con los ancianos que presiden la iglesia
  - con los ancianos encargados de la iglesia
  lexicon: ancianos/presidir
  rationale: ‘Ancianos’ traduce πρεσβύτεροι sin sustituirlo por una terminología denominacional ajena; ‘presiden sobre la iglesia’ refleja la relación de gobierno/guía del participio sin diluirla en una formulación más genérica.
theological_decisions:
- issue: Autoridad y distribución eclesial del escrito
  english_pob_reading: Clement is entrusted with sending it to the cities outside, while Grapte admonishes widows and orphans, and the reader reads it aloud with the elders who preside over the church.
  chosen_spanish_reading: Clemente lo enviará a las ciudades de afuera, porque esto le ha sido confiado; pero Grapte amonestará a las viudas y a los huérfanos. Y tú lo leerás en voz alta en esta ciudad, con los ancianos que presiden sobre la iglesia.
  alternative_spanish_readings:
  - Clemente lo enviará a las ciudades de afuera, pues se le ha encomendado esto; pero Grapte exhortará a las viudas y a los huérfanos. Y tú lo leerás en esta ciudad junto con los ancianos que presiden la iglesia.
  rationale: La redacción conserva la distribución concreta de funciones sin armonizarla con estructuras eclesiales posteriores. Se mantiene el carácter delegativo de ‘le ha sido confiado’ y la acción pastoral diferenciada de Grapte hacia viudas y huérfanos.
  doctrine_reference: Polity/history of early Christian ministry; no later ecclesiastical hierarchy is imposed.
translation_notes:
  revision_awareness: El texto griego y la versión inglesa POB coinciden estrechamente en contenido y estructura; no se detectan variantes textuales relevantes en este tramo. La traducción española sigue la misma segmentación y conserva los nombres propios, la distribución de responsabilidades y el contraste espacial de ‘ciudades de afuera’.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ fuera de este pasaje porque no aparece el nombre divino.
  - Se evitó ‘Señor’ como sustitución interpretativa; el texto no lo requiere.
  - Se preservó el orden narrativo y la coordinación con ‘entonces / pero / y’ para reflejar las relaciones del original.
  - Se usó ‘iglesia’ en minúscula por tratarse de la institución/comunidad, no de un nombre propio.
