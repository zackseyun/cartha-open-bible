review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y del inglés POB: dos libritos, envío a Clemente y Grapte, función delegada de Clemente, amonestación de Grapte a viudas y huérfanos, y lectura pública en la ciudad con los ancianos que presiden. No hay desviaciones semánticas mayores. Sin embargo, hay una mejora de naturalidad y precisión idiomática en la última cláusula: en español eclesial natural, ''presiden la iglesia'' es mejor que ''presiden sobre la iglesia'', que suena calcado.'
  spanish_quality_summary: El texto es claro y legible, con buen registro moderno y digno. 'Libritos' funciona bien. 'Las ciudades de afuera' es aceptable, aunque algo coloquial; no requiere cambio porque mantiene la ambigüedad del original. La principal reparación necesaria es evitar el giro poco natural 'presiden sobre la iglesia'.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Ancianos' para πρεσβύτεροι es adecuado y evita imponer terminología denominacional posterior. 'Amonestará' para νουθετήσει preserva bien la fuerza pastoral-correctiva. No aparecen términos sensibles del glosario principal como Yahvé/Mesías/esclavo.
  issues:
  - severity: medium
    issue: Calco poco natural en 'presiden sobre la iglesia'
    rationale: Aunque comunica la idea, en español natural se dice 'presiden la iglesia' o 'están al frente de la iglesia'. El griego τῶν προεστώτων τῆς ἐκκλησίας no exige la preposición 'sobre', y su inclusión produce rigidez innecesaria.
  revised_spanish_text: 3. «Así, escribirás dos libritos, y enviarás uno a Clemente y otro a Grapte. Entonces Clemente lo enviará a las ciudades de afuera, porque esto le ha sido confiado; pero Grapte amonestará a las viudas y a los huérfanos. Y tú lo leerás en voz alta en esta ciudad, con los ancianos que presiden la iglesia».
  revision_rationale: 'Se hace una única corrección de estilo-fidelidad: ''presiden la iglesia'' reemplaza ''presiden sobre la iglesia'' para sonar natural en español sin perder el sentido de liderazgo/presidencia del griego.'
