revisions:
- from: 'Ella se rió y me dice: «El deseo malo ha surgido en tu corazón. ¿O no te parece que es una cosa malvada si el deseo malo surge en el corazón de un hombre justo? Ciertamente es un pecado —y uno grande, dice ella—. Porque un hombre justo planea lo que es justo. Por eso, al planear lo que es justo, su gloria queda establecida en los cielos, y tiene al Señor dispuesto a reconciliarse[a] con él en toda cosa suya. Pero los que planean el mal en su corazón se atraen muerte y cautiverio, especialmente los que aseguran para sí esta edad presente, se jactan en sus riquezas y no se aferran a las cosas buenas que vienen».'
  to: 'Ella se rió y me dice: «El deseo malo ha surgido en tu corazón. ¿O no te parece que es una cosa malvada si el deseo malo surge en el corazón de un hombre justo? Ciertamente es un pecado —y uno grande, dice ella—. Porque un hombre justo planea lo que es justo. Por eso, al planear lo que es justo, su gloria queda establecida en los cielos, y tiene al Señor dispuesto a reconciliarse[a] con él en todo asunto suyo. Pero los que planean el mal en su corazón se atraen muerte y cautiverio, especialmente los que se aseguran esta edad presente para sí, se glorían en sus riquezas y no se aferran a las cosas buenas que vienen».'
