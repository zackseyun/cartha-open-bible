base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/001/002.yaml
  text: She laughed and says to me, "Evil desire has risen up into your heart. Or does it not seem to you to be a wicked thing for a righteous man if evil desire rises into his heart? It is indeed a sin—and a great one, she says. For a righteous man plans what is righteous. Therefore, in planning what is righteous, his glory is established in the heavens, and he has the Lord readily reconciled in every matter of his. But those who plan evil in their hearts bring upon themselves death and captivity—especially those who secure this present age for themselves, who exult in their wealth, and who do not hold fast to the good things that are coming.
translation:
  language: es
  text: 'Ella se rió y me dice: «El deseo malo ha surgido en tu corazón. ¿O no te parece que es una cosa malvada si el deseo malo surge en el corazón de un hombre justo? Ciertamente es un pecado —y uno grande, dice ella—. Porque un hombre justo planea lo que es justo. Por eso, al planear lo que es justo, su gloria queda establecida en los cielos, y tiene al Señor dispuesto a reconciliarse[a] con él en todo asunto suyo. Pero los que planean el mal en su corazón se atraen muerte y cautiverio, especialmente los que se aseguran esta edad presente para sí, se glorían en sus riquezas y no se aferran a las cosas buenas que vienen».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de este miembro es difícil; la idea exacta puede leerse como una disponibilidad o prontitud del Señor para reconciliarse con él.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιθυμία κακή / evil desire
  english_pob_choice: evil desire
  chosen_spanish: deseo malo
  alternatives_spanish:
  - deseo maligno
  - mal deseo
  - concupiscencia mala
  lexicon: ἐπιθυμία
  rationale: Conservo el sustantivo de deseo y el calificativo moral explícito; «deseo malo» evita cargar con una tradición doctrinal más técnica que el texto no exige, pero mantiene la tensión ética del griego y del inglés POB.
- source_word: ἁμαρτία / sin
  english_pob_choice: sin—and a great one
  chosen_spanish: pecado —y uno grande
  alternatives_spanish:
  - pecado grave —y muy grande
  - pecado —y uno enorme
  lexicon: ἁμαρτία
  rationale: «Pecado» es la equivalencia directa; «uno grande» conserva el énfasis retórico sin añadir una clasificación moral ajena al pasaje.
- source_word: δίκαιος ἀνήρ / righteous man
  english_pob_choice: righteous man
  chosen_spanish: hombre justo
  alternatives_spanish:
  - justo
  - varón justo
  lexicon: δίκαιος
  rationale: «Hombre justo» mantiene la referencia al sujeto humano individual y el valor judicial/moral de δίκαιος sin sonar arcaico.
- source_word: λογίζεται τὰ δίκαια / plans what is righteous
  english_pob_choice: plans what is righteous
  chosen_spanish: planea lo que es justo
  alternatives_spanish:
  - piensa lo que es justo
  - proyecta lo que es justo
  lexicon: λογίζομαι
  rationale: El verbo aquí expresa deliberación mental y propósito; «planea» reproduce bien la idea de formar planes, mientras que «lo que es justo» conserva la sustantivación ética de τὰ δίκαια.
- source_word: ἡ δόξα αὐτοῦ ἐν τοῖς οὐρανοῖς στηρίζεται / his glory is established in the heavens
  english_pob_choice: his glory is established in the heavens
  chosen_spanish: su gloria queda establecida en los cielos
  alternatives_spanish:
  - su gloria se establece en los cielos
  - su gloria queda afirmada en el cielo
  lexicon: δόξα
  rationale: «Gloria» es la equivalencia estable para δόξα; «queda establecida» conserva la imagen de firmeza/confirmación del griego y del inglés auditado.
- source_word: ἕτοιμον ἔχει τὸν κύριον εἰς πάντα πράγματά του / has the Lord readily reconciled in every matter of his
  english_pob_choice: has the Lord readily reconciled in every matter of his
  chosen_spanish: tiene al Señor dispuesto a reconciliarse con él en toda cosa suya
  alternatives_spanish:
  - tiene al Señor listo para reconciliarse con él en cada asunto suyo
  - tiene al Señor presto para reconciliarse con él en todo lo suyo
  lexicon: ἕτοιμον ἔχει / readily reconciled
  rationale: El griego es difícil y el inglés POB preserva esa tensión con una formulación poco idiomática; en español, «dispuesto a reconciliarse» conserva la idea de disponibilidad relacional sin borrar la rareza del original.
- source_word: οἱ πονηρὰ λογιζόμενοι / those who plan evil
  english_pob_choice: those who plan evil
  chosen_spanish: los que planean el mal
  alternatives_spanish:
  - los que piensan el mal
  - los que maquinan el mal
  lexicon: λογίζομαι
  rationale: Mantengo el paralelo con «planea lo que es justo»; así se ve el contraste entre la deliberación recta y la deliberación perversa.
- source_word: θάνατον καὶ αἰχμαλωσίαν / death and captivity
  english_pob_choice: death and captivity
  chosen_spanish: muerte y cautiverio
  alternatives_spanish:
  - muerte y esclavitud
  - muerte y prisión
  lexicon: αἰχμαλωσία
  rationale: «Cautiverio» conserva el campo semántico de estar llevado/tenido preso, sin perder la resonancia espiritual y moral del pasaje.
- source_word: ἐν τῷ πλούτῳ αὐτῶν / in their wealth
  english_pob_choice: in their wealth
  chosen_spanish: en sus riquezas
  alternatives_spanish:
  - en su riqueza
  - por sus riquezas
  lexicon: πλοῦτος
  rationale: El plural español suena natural y conserva el sentido colectivo/material del término.
- source_word: μὴ κατέχοντες τὰ ἐρχόμενα καλά / who do not hold fast to the good things that are coming
  english_pob_choice: who do not hold fast to the good things that are coming
  chosen_spanish: no se aferran a las cosas buenas que vienen
  alternatives_spanish:
  - no retienen las cosas buenas que vienen
  - no se mantienen firmes en las cosas buenas que vienen
  lexicon: κατέχω
  rationale: «Se aferran» expresa con fuerza la idea de retener firmemente; «cosas buenas que vienen» preserva la referencia abierta a los bienes futuros sin especificarlos.
theological_decisions:
- issue: Moral seriousness of evil desire entering the heart of a righteous person
  english_pob_reading: It is indeed a sin—and a great one
  chosen_spanish_reading: Ciertamente es un pecado —y uno grande—
  alternative_spanish_readings:
  - Es ciertamente un pecado —y muy grande—
  - Sí, es pecado, y grave
  rationale: La formulación mantiene que la irrupción del deseo malo en el corazón del justo no es neutral; el texto subraya culpa real y gravedad creciente sin convertirlo en una definición sistemática del pecado.
  doctrine_reference: Ética del corazón; santidad interior
- issue: Temporal contrast between present age and coming goods
  english_pob_reading: those who secure this present age for themselves ... and do not hold fast to the good things that are coming
  chosen_spanish_reading: los que aseguran para sí esta edad presente ... y no se aferran a las cosas buenas que vienen
  alternative_spanish_readings:
  - los que se apropian de esta edad presente ... y no retienen las cosas buenas futuras
  - los que hacen suya esta era presente ...
  rationale: «Esta edad presente» conserva el contraste escatológico del pasaje y evita reducirlo a mera ‘vida actual’; el énfasis recae en la orientación equivocada hacia el presente frente a los bienes venideros.
  doctrine_reference: Escatología moral; perseverancia
- issue: Relational availability of the Lord toward the righteous
  english_pob_reading: has the Lord readily reconciled in every matter of his
  chosen_spanish_reading: tiene al Señor dispuesto a reconciliarse con él en toda cosa suya
  alternative_spanish_readings:
  - tiene al Señor pronto para reconciliarse con él en cada asunto suyo
  - tiene al Señor favorable en todo lo suyo
  rationale: El pasaje es textual y semánticamente difícil; la traducción conserva la idea de accesibilidad o prontitud relacional del Señor sin resolverla artificialmente en un sentido teológico más estrecho que el del testimonio recibido.
  doctrine_reference: Relación con el Señor; favor/reconciliación
translation_notes:
  revision_awareness: Se siguió el texto inglés auditado con acuerdo alto y sin notas previas, pero se ajustó el español para conservar la fuerza retórica y la rareza sintáctica del segmento difícil sobre «el Señor dispuesto a reconciliarse», sin suavizarla en exceso.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este pasaje no se usa el Tetragrámaton.
  - Se eligió «hombre justo / lo que es justo» para conservar el paralelismo léxico entre el sujeto y su deliberación recta.
  - Se conservó un registro sobrio y eclesial, evitando tanto arcaísmos innecesarios como paráfrasis explicativas.
