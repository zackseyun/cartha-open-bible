base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/001/003.yaml
  text: '"Their souls will repent—those who have no hope, but have despaired of themselves and of their life. But you—pray to God, and he will heal your sins, and those of your whole household, and of all the holy ones."'
translation:
  language: es
  text: «Sus almas se arrepentirán[a]—las de los que no tienen esperanza, y han desesperado de sí mismos y de su vida. Pero tú, ora a Dios, y él sanará tus pecados, los de toda tu casa y los de todos los santos.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «cambiarán de mente»; el griego puede expresar un giro interior de arrepentimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετανοήσουσιν / repent
  english_pob_choice: repent
  chosen_spanish: se arrepentirá
  alternatives_spanish:
  - cambiará de mente
  - se volverá
  lexicon: μετανοέω
  rationale: El contexto de desesperanza apunta a un giro interior y moral, no solo a una operación cognitiva. En español, «arrepentirse» comunica con claridad ese cambio de orientación personal sin volverlo demasiado técnico.
- source_word: ἐλπίς / hope
  english_pob_choice: have no hope
  chosen_spanish: no tienen esperanza
  alternatives_spanish:
  - carecen de esperanza
  - no esperan nada
  lexicon: ἐλπίς
  rationale: «No tienen esperanza» es natural en español y conserva la negación absoluta del estado descrito por el griego y reflejado en la versión inglesa.
- source_word: ἀπεγνωκότες / despaired
  english_pob_choice: have despaired of themselves and of their life
  chosen_spanish: han desesperado de sí mismos y de su vida
  alternatives_spanish:
  - han perdido toda esperanza en sí mismos y en su vida
  - se han desesperado de sí mismos y de su vida
  lexicon: ἀπελπίζω / ἀπεγνωκέναι
  rationale: 'Se mantiene la doble referencia del original: desesperación respecto de sí mismos y respecto de su vida. La fórmula «han desesperado de» preserva la estructura y la tensión semántica del inglés auditado.'
- source_word: προσεύχου
  english_pob_choice: pray to God
  chosen_spanish: ora a Dios
  alternatives_spanish:
  - ora a Dios continuamente
  - ruega a Dios
  lexicon: προσεύχομαι
  rationale: «Ora a Dios» es directo, digno y fiel al imperativo. Se evita intensificar sin base textual.
- source_word: ἰάσεται
  english_pob_choice: he will heal your sins
  chosen_spanish: sanará tus pecados
  alternatives_spanish:
  - curará tus pecados
  - te sanará de tus pecados
  lexicon: ἰάομαι
  rationale: La imagen de «sanar» conserva la metáfora terapéutica del griego y del inglés POB. En español, el objeto directo «tus pecados» mantiene el paralelismo con la formulación recibida.
- source_word: ὁ οἶκος σου
  english_pob_choice: your whole household
  chosen_spanish: toda tu casa
  alternatives_spanish:
  - toda tu familia
  - todo tu hogar
  lexicon: οἶκος
  rationale: «Casa» reproduce bien el valor semítico y eclesial de οἶκος, y evita reducirlo solo a vínculos biológicos.
- source_word: πάντων τῶν ἁγίων
  english_pob_choice: all the holy ones
  chosen_spanish: todos los santos
  alternatives_spanish:
  - todos los consagrados
  - todos los santos y consagrados
  lexicon: ἅγιος
  rationale: «Santos» es el equivalente natural y transparente para ἅγιοι en un registro cristiano. Se conserva la amplitud colectiva del plural.
theological_decisions:
- issue: El alcance de «sanará tus pecados»
  english_pob_reading: he will heal your sins, and those of your whole household, and of all the holy ones
  chosen_spanish_reading: sanará tus pecados, los de toda tu casa y los de todos los santos
  alternative_spanish_readings:
  - perdonará tus pecados
  - sanará tus heridas causadas por el pecado
  rationale: La POB inglesa conserva la metáfora de sanidad aplicada a los pecados; no la sustituimos por «perdonará», porque eso borraría una tensión lexical importante del testimonio. El español mantiene esa imagen terapéutica sin explicar más de lo que el texto permite.
  doctrine_reference: Metáfora bíblica de sanidad aplicada al pecado; cf. Is 53:5; Sal 103:3
- issue: «Los que no tienen esperanza» como sujeto de arrepentimiento
  english_pob_reading: Their souls will repent—those who have no hope, but have despaired of themselves and of their life.
  chosen_spanish_reading: Su alma se arrepentirá—los que no tienen esperanza, y han desesperado de sí mismos y de su vida.
  alternative_spanish_readings:
  - Se arrepentirán sus almas—los que no tienen esperanza...
  - Sus almas cambiarán...
  rationale: Se mantiene el sujeto «su alma» tal como aparece en la tradición griega/inglesa, aun si en español suena comprimido. Eso preserva la antropología del pasaje y la asociación entre el estado interior y el giro moral.
  doctrine_reference: Antropología moral en literatura cristiana primitiva; cf. lenguaje de alma/vida en textos paraenéticos
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente. Se siguió la traducción inglesa auditada solo como contexto de control, prestando atención al griego normalizado y conservando la metáfora de sanidad del original.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, conforme al estándar del proyecto.
  - Se usa «santos» para ἅγιοι sin capitalización especial, porque aquí funciona como sustantivo colectivo.
  - Se conserva «casa» para οἶκος por su valor comunitario y no meramente doméstico.
  - La puntuación con raya larga reproduce la pausa enfática del original y de la versión inglesa auditada.
