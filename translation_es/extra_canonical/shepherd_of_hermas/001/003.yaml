revisions:
- from: «Su alma se arrepentirá[a]—los que no tienen esperanza, y han desesperado de sí mismos y de su vida. Pero tú, ora a Dios, y él sanará tus pecados, los de toda tu casa y los de todos los santos.»
  to: «Sus almas se arrepentirán[a]—las de los que no tienen esperanza, y han desesperado de sí mismos y de su vida. Pero tú, ora a Dios, y él sanará tus pecados, los de toda tu casa y los de todos los santos.»
  rationale: Se corrige la discordancia singular/plural en la primera cláusula para que el español sea gramatical y fiel al referente plural del pasaje, manteniendo a la vez la mención de «almas». También se ajusta la nota léxica al plural revisado. No se requieren otros cambios.
