base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/001/001.yaml
  text: '"Did I speak? Did I not always regard you as a goddess? Did I not always respect you as a sister? Why do you falsely accuse me, woman, of these wicked and unclean things?"'
translation:
  language: es
  text: «¿Acaso hablé? ¿No te he considerado siempre como una diosa? ¿No te he respetado siempre como a una hermana? ¿Por qué me acusas falsamente, mujer, de estas cosas malas e impuras?»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐλάλησα
  english_pob_choice: Did I speak?
  chosen_spanish: ¿Acaso hablé?
  alternatives_spanish:
  - ¿Hablé acaso?
  - ¿He hablado acaso?
  lexicon: ἐλάλησα
  rationale: El griego expresa una pregunta retórica en aoristo; en español, «¿Acaso hablé?» conserva la fuerza interrogativa sin sobrecargar el tiempo verbal. «¿He hablado acaso?» es posible, pero sugiere más bien un valor perfecto que el contexto no exige.
- source_word: θεά
  english_pob_choice: goddess
  chosen_spanish: diosa
  alternatives_spanish:
  - divinidad femenina
  - deidad femenina
  lexicon: θεά
  rationale: «Diosa» es la equivalencia directa y natural en español para el sentido literal del término, manteniendo la tensión del insulto o del reproche en la escena. Las alternativas explicitan más, pero debilitan el golpe del vocablo.
- source_word: ἀδελφή
  english_pob_choice: sister
  chosen_spanish: hermana
  alternatives_spanish:
  - hermana de fe
  - compañera
  lexicon: ἀδελφή
  rationale: La relación literal es «hermana». No hay señal en el texto de que deba restringirse a un sentido eclesial; por eso se conserva la forma simple.
- source_word: γύναι
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - señora
  lexicon: γύναι
  rationale: «Mujer» reproduce el vocativo griego de manera directa y sin añadir cortesía que el original no garantiza. «Señora» suavizaría indebidamente el tono.
- source_word: ψευδομαρτυρεῖς
  english_pob_choice: falsely accuse me
  chosen_spanish: me acusas falsamente
  alternatives_spanish:
  - das falso testimonio contra mí
  - me calumnias
  lexicon: ψευδομαρτυρεῖς
  rationale: El verbo combina la idea de falsa acusación o falso testimonio. En este contexto narrativo, «me acusas falsamente» comunica bien la fuerza del reproche sin introducir una formulación judicial demasiado específica.
- source_word: πονηρῶν καὶ ἀκαθάρτων
  english_pob_choice: wicked and unclean things
  chosen_spanish: cosas malas e impuras
  alternatives_spanish:
  - cosas malvadas e impuras
  - cosas perversas e inmundas
  lexicon: πονηρῶν καὶ ἀκαθάρτων
  rationale: «Malas e impuras» es claro y mantiene los dos ejes morales/rituales del griego. «Perversas e inmundas» sería más fuerte, pero en español puede sonar más interpretativo y menos equilibrado.
theological_decisions:
- issue: El vocativo «mujer» y el lenguaje de «diosa» pueden sonar extraños en español religioso moderno.
  english_pob_reading: 'The English POB keeps the literal contrast: goddess / sister / woman, without smoothing the scene.'
  chosen_spanish_reading: 'Se conserva el contraste literal: «diosa / hermana / mujer», manteniendo el tono vivo y el reproche directo.'
  alternative_spanish_readings:
  - suavizar a «señora»
  - parafrasear como «dama» o «persona»
  rationale: La escena depende del contraste abrupto entre una elevación aparente («diosa») y una interpelación acusatoria («mujer»). Suavizarlo borra parte del efecto retórico del original.
  doctrine_reference: Respeto por la literalidad retórica del texto; no hay doctrina cristiana directa en juego aquí, pero sí fidelidad a la escena narrativa.
translation_notes:
  revision_awareness: El contexto en inglés muestra acuerdo alto y no presenta notas ni revisiones aplicadas. La presente versión sigue de cerca la estructura retórica del griego y del POB inglés, con ajustes mínimos de naturalidad en español.
  spanish_consistency_notes:
  - Se mantiene la repetición interrogativa como en el original para conservar la intensidad retórica.
  - «Diosa», «hermana» y «mujer» se dejan en contraste directo, sin suavizaciones.
  - No se introducen marcas de cita bíblica ni terminología eclesiástica ajena al pasaje.
