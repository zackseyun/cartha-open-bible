base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/058/003.yaml
  text: “The one who indulges himself and is deceived for a single day and does what he wants has clothed himself with much foolishness and does not perceive the deed he is doing; for on the next day he forgets what he did the day before. For indulgence and deception have no memory because of the foolishness with which he has clothed himself. But when punishment and torment cling to a person for one day, he is punished and tormented for up to a year; for punishment and torment have great memory.
translation:
  language: es
  text: “El que se entrega al placer y es engañado por un solo día, y hace lo que quiere, se ha revestido de mucha necedad y no percibe el acto que está haciendo; porque al día siguiente olvida lo que hizo el día anterior. Pues la indulgencia y el engaño no tienen memoria a causa de la necedad con que se ha revestido. Pero cuando el castigo y el tormento se adhieren a una persona por un día, es castigada y atormentada por hasta un año; porque el castigo y el tormento tienen gran memoria.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: indulges himself
  english_pob_choice: indulges himself
  chosen_spanish: se da a los placeres
  alternatives_spanish:
  - se entrega al placer
  - se complace a sí mismo
  - vive en indulgencia
  lexicon: N/A
  rationale: La idea no es solo autocuidado, sino ceder a la satisfacción desordenada. «Se da a los placeres» conserva el matiz de autoindulgencia sin sonar demasiado técnico o arcaizante.
- source_word: deceived
  english_pob_choice: deceived
  chosen_spanish: es engañado
  alternatives_spanish:
  - se deja engañar
  - es seducido
  - cae en engaño
  lexicon: N/A
  rationale: Mantiene la pasividad del sujeto frente al engaño y refleja bien el paralelo con «indulges himself».
- source_word: clothed himself
  english_pob_choice: clothed himself
  chosen_spanish: se ha revestido
  alternatives_spanish:
  - se ha vestido
  - se ha cubierto
  - se ha puesto
  lexicon: N/A
  rationale: «Revestirse» conserva la metáfora de cobertura moral del griego y de la redacción inglesa, más fuerte que un simple «vestirse».
- source_word: foolishness
  english_pob_choice: foolishness
  chosen_spanish: necedad
  alternatives_spanish:
  - insensatez
  - torpeza
  - locura
  lexicon: N/A
  rationale: «Necedad» es la opción más natural en español para una imprudencia moral y no meramente intelectual, manteniendo la fuerza sapiencial del término.
- source_word: does not perceive the deed he is doing
  english_pob_choice: does not perceive the deed he is doing
  chosen_spanish: no percibe la obra que está haciendo
  alternatives_spanish:
  - no advierte la acción que hace
  - no entiende la obra que realiza
  - no se da cuenta de lo que hace
  lexicon: N/A
  rationale: «Percibe» y «obra» reproducen con cierta dignidad el sentido de no advertir la propia acción. «Obra» conserva también el matiz de acto realizado con consecuencias.
- source_word: punishment and torment
  english_pob_choice: punishment and torment
  chosen_spanish: el castigo y el tormento
  alternatives_spanish:
  - el castigo y la tortura
  - el castigo y el sufrimiento
  - la pena y el tormento
  lexicon: N/A
  rationale: Se preserva la pareja semántica de la fuente y del inglés POB. «Tormento» mantiene el peso de aflicción persistente sin introducir una connotación demasiado técnica.
- source_word: have great memory
  english_pob_choice: have great memory
  chosen_spanish: tienen gran memoria
  alternatives_spanish:
  - recuerdan mucho
  - guardan gran memoria
  - no olvidan fácilmente
  lexicon: N/A
  rationale: Se conserva la personificación original. Aunque suena inusual, «gran memoria» reproduce la imagen del texto y la tensión lexical del inglés POB.
theological_decisions:
- issue: Relación entre autoindulgencia, engaño y responsabilidad moral
  english_pob_reading: The one who indulges himself and is deceived... has clothed himself with much foolishness
  chosen_spanish_reading: El sujeto no solo es engañado, sino que se reviste él mismo de necedad al entregarse a los placeres.
  alternative_spanish_readings:
  - El que se entrega a los placeres y es engañado...
  - El que se complace y es engañado...
  rationale: 'La formulación española mantiene la doble responsabilidad: el engaño recibido y la autoformación de una condición moral de necedad. No se suaviza el juicio ético del pasaje.'
  doctrine_reference: Ética moral y responsabilidad personal en la literatura cristiana primitiva
- issue: Memoria moral del castigo versus olvido moral del placer
  english_pob_reading: indulgence and deception have no memory... punishment and torment have great memory
  chosen_spanish_reading: El placer engañoso olvida rápido; el castigo persiste en la conciencia y deja huella duradera.
  alternative_spanish_readings:
  - el placer y el engaño no tienen memoria
  - el castigo y el tormento recuerdan mucho
  rationale: 'Aunque la expresión sigue siendo figurada, la traducción conserva la antítesis central: lo placentero y engañoso pasa, mientras el castigo permanece como realidad recordada y efectiva.'
  doctrine_reference: Sabiduría moral retributiva en la patrística temprana
translation_notes:
  revision_awareness: No hay revisiones aplicadas ni notas textuales adicionales en el paquete proporcionado. La redacción sigue de cerca el griego a través del inglés auditado, conservando la metáfora de revestirse, la antítesis memoria/olvido y la personificación del castigo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la pauta general del proyecto, aunque en este pasaje no aparece el nombre divino.
  - Se usa un registro formal y eclesialmente legible, evitando una paráfrasis explicativa que diluya la imaginería del texto.
  - Se conserva la estructura argumentativa en dos miembros paralelos, con puntuación que ayuda a la lectura pública.
