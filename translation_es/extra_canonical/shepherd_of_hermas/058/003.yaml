  to: “El que se entrega al placer y es engañado por un solo día, y hace lo que quiere, se ha revestido de mucha necedad y no percibe el acto que está haciendo; porque al día siguiente olvida lo que hizo el día anterior. Pues la indulgencia y el engaño no tienen memoria a causa de la necedad con que se ha revestido. Pero cuando el castigo y el tormento se adhieren a una persona por un día, es castigada y atormentada por hasta un año; porque el castigo y el tormento tienen gran memoria.”
