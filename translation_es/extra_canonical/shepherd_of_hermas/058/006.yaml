base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/058/006.yaml
  text: He says, “Every deed is an indulgence to a person, whatever he does with pleasure. For even the hot‑tempered man, by giving his own passion its fill, indulges himself; and the adulterer and the drunkard and the slanderer and the liar and the greedy person and the defrauder and the one doing things like these gives his own disease its fill; he therefore indulges himself in his act. All these indulgences are harmful to the slaves of God. Therefore, because of these deceptions, those who are punished and tormented suffer.
translation:
  language: es
  text: 'Él dice: «Toda obra es una complacencia indulgente para una persona, cualquier cosa que haga con gusto. Porque aun el hombre iracundo, al dar satisfacción a su propia pasión, se da gusto a sí mismo; y el adúltero, el ebrio, el difamador, el mentiroso, el avaro[a], el defraudador y el que hace cosas semejantes da satisfacción a su propia enfermedad; por lo tanto, se da gusto a sí mismo en su acto. Todas estas complacencias indulgentes son dañinas para los esclavos de Dios. Por eso, a causa de estos engaños, los que son castigados y atormentados sufren.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Avaro» traduce el término griego en su sentido clásico de deseo de tener más; también puede entenderse como «codicioso».
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν ἔργον
  english_pob_choice: Every deed
  chosen_spanish: Toda obra
  alternatives_spanish:
  - Cada obra
  - Todo acto
  lexicon: πᾶς; ἔργον
  rationale: «Toda obra» conserva la amplitud general de πᾶν ἔργον y suena natural en español; «acto» es posible, pero «obra» mantiene mejor el tono sentencioso del pasaje.
- source_word: ἡδονή
  english_pob_choice: an indulgence
  chosen_spanish: un deleite
  alternatives_spanish:
  - una indulgencia
  - un placer
  lexicon: ἡδονή
  rationale: La POB inglesa usa «indulgence» para el sentido de entrega complaciente al propio deseo. En español, «deleite» comunica esa satisfacción voluntaria sin sonar tan técnico como «indulgencia» ni reducirse a un mero «placer».
- source_word: ἐκτελεῖ
  english_pob_choice: whatever he does with pleasure
  chosen_spanish: sea lo que sea que haga con gusto
  alternatives_spanish:
  - lo que haga con placer
  - cualquier cosa que haga con agrado
  lexicon: ἐκτελέω
  rationale: La forma española intenta reflejar la generalidad de la cláusula y el matiz de hacerlo con agrado o gusto; «con gusto» es idiomático y suficientemente fiel.
- source_word: θυμώδης
  english_pob_choice: the hot-tempered man
  chosen_spanish: el hombre iracundo
  alternatives_spanish:
  - el hombre de mal genio
  - el colérico
  lexicon: θυμός
  rationale: «Iracundo» mantiene la intensidad moral del adjetivo y evita una expresión demasiado coloquial.
- source_word: πάθος
  english_pob_choice: his own passion
  chosen_spanish: su propia pasión
  alternatives_spanish:
  - su propio deseo
  - su propio impulso
  lexicon: πάθος
  rationale: «Pasión» preserva el vínculo léxico con el impulso desordenado o afectivo que domina al sujeto; la alternativa «deseo» atenúa el matiz de descontrol que el contexto sugiere.
- source_word: μοιχεία
  english_pob_choice: the adulterer
  chosen_spanish: el adúltero
  alternatives_spanish:
  - el adúltero y la adúltera
  lexicon: μοιχός
  rationale: El singular genérico masculino funciona como término de clase en español y sigue el listado vicios/pecados del original.
- source_word: μέθυσος
  english_pob_choice: the drunkard
  chosen_spanish: el borracho
  alternatives_spanish:
  - el ebrio
  - el bebedor
  lexicon: μέθυσος
  rationale: «Borracho» es claro y directo en español; «ebrio» es más formal, pero menos natural en esta enumeración.
- source_word: κατάλαλος
  english_pob_choice: the slanderer
  chosen_spanish: el difamador
  alternatives_spanish:
  - el calumniador
  - el malhablado
  lexicon: κατάλαλος
  rationale: «Difamador» cubre la idea de hablar contra otro para dañarlo y resulta más amplio que «calumniador».
- source_word: ψεύστης
  english_pob_choice: the liar
  chosen_spanish: el mentiroso
  alternatives_spanish:
  - el falso
  - el mentiroso habitual
  lexicon: ψεύστης
  rationale: La equivalencia directa es clara y estable en español.
- source_word: πλεονέκτης
  english_pob_choice: the greedy person
  chosen_spanish: el avaro
  alternatives_spanish:
  - el codicioso
  - el ambicioso
  lexicon: πλεονέκτης
  rationale: El término griego abarca afán de tener más y codicia; «avaro» es la opción más estable y reconocible, aunque «codicioso» sigue siendo una alternativa válida.
- source_word: ἀποστερητής
  english_pob_choice: the defrauder
  chosen_spanish: el defraudador
  alternatives_spanish:
  - el estafador
  - el expoliador
  lexicon: ἀποστερητής
  rationale: «Defraudador» mantiene la idea de privar o quitar fraudulentamente y encaja bien en la serie.
- source_word: νόσος
  english_pob_choice: his own disease
  chosen_spanish: su propia enfermedad
  alternatives_spanish:
  - su propia dolencia
  - su propio mal
  lexicon: νόσος
  rationale: La metáfora de la enfermedad moral queda explícita con «enfermedad»; «dolencia» suaviza demasiado la imagen.
- source_word: δοῦλοι τοῦ θεοῦ
  english_pob_choice: the slaves of God
  chosen_spanish: los esclavos de Dios
  alternatives_spanish:
  - los siervos de Dios
  lexicon: δοῦλος; θεός
  rationale: Se conserva el forceful lexical choice de la POB inglesa («slaves») para δοῦλοι; «siervos» atenuaría la dureza conceptual del original y borraría una tensión lexical deliberada.
- source_word: ἀπατη
  english_pob_choice: these deceptions
  chosen_spanish: estos engaños
  alternatives_spanish:
  - estas ilusiones
  - estas seducciones
  lexicon: ἀπάτη
  rationale: «Engaños» es la opción más directa y amplia para el sustantivo griego, y enlaza bien con la idea de autoindulgencia engañosa del pasaje.
- source_word: κολαζόμενοι καὶ βασανιζόμενοι
  english_pob_choice: those who are punished and tormented suffer
  chosen_spanish: los que son castigados y atormentados sufren
  alternatives_spanish:
  - los que son castigados y torturados sufren
  - los castigados y afligidos padecen
  lexicon: κολάζω; βασανίζω
  rationale: «Castigados y atormentados» sigue de cerca la dualidad del griego y de la POB inglesa; «atormentados» conserva la intensidad de βασανίζω sin introducir un tecnicismo innecesario.
theological_decisions:
- issue: Relación entre autoindulgencia y castigo moral
  english_pob_reading: Every deed done with pleasure is an indulgence that becomes harmful to the slaves of God, and deceptive acts lead to suffering.
  chosen_spanish_reading: Toda acción complaciente se entiende como una forma de deleite dañino que conduce al sufrimiento y al castigo.
  alternative_spanish_readings:
  - Toda obra placentera es inocente por naturaleza.
  - Todo acto agradable es simplemente neutro.
  rationale: El pasaje no presenta el placer como moralmente neutro; más bien describe una complacencia que alimenta el vicio y termina en daño. La redacción española mantiene esa advertencia moral sin suavizarla.
  doctrine_reference: Ética moral y retribución en literatura cristiana primitiva
translation_notes:
  revision_awareness: 'Se siguió la lectura inglesa de la POB como guía auditada, pero el español se formuló directamente desde el texto griego disponible en el expediente: se mantuvo la enumeración de vicios, la metáfora de la enfermedad y el contraste final entre engaño, castigo y tormento. No hubo revisiones aplicadas en el historial provisto.'
  spanish_consistency_notes:
  - Se mantuvo «esclavos de Dios» conforme a la política terminológica del proyecto y a la fuerza léxica de δοῦλοι.
  - «Engaños» y «deleite» se usaron para preservar el campo semántico de autoengaño y autoindulgencia sin introducir términos doctrinales ajenos.
  - La serie de vicios se tradujo con sustantivos masculinos genéricos para conservar fluidez y paralelismo en español.
