- from: «Porque —dije—, señor, no he entendido en absoluto lo del tiempo del engaño, la indulgencia y el tormento; acláramelo más, te ruego».
  to: «Pues —dije—, señor, no he entendido en absoluto acerca del tiempo del engaño, la indulgencia y el tormento; explíquemelo con más claridad».
  rationale: Se ajusta γάρ a un arranque dialogal más natural en español («Pues»), se eleva el registro de «lo del tiempo» a «acerca del tiempo», y se elimina «te ruego» para evitar una adición no exigida por la evidencia auditada. «Explíquemelo con más claridad» expresa mejor σαφέστερον en un tono respetuoso y claro.
