  yaml_path: translation/extra_canonical/shepherd_of_hermas/058/001.yaml
  text: “Since,” I say, “sir, I have not understood at all about the time of deception and indulgence and torment, make it more clear to me.”
translation:
  language: es
  text: «Pues —dije—, señor, no he entendido en absoluto acerca del tiempo del engaño, la indulgencia y el tormento; explíquemelo con más claridad».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “Since,” I say
  english_pob_choice: “Since,” I say
  chosen_spanish: «Porque —dije—
  alternatives_spanish:
  - «Pues —dije—
  - «Ya que —dije—
  lexicon: γάρ
  rationale: El griego introduce una explicación o motivo; en español, «Porque» reproduce bien ese arranque discursivo y mantiene el tono coloquial del diálogo sin recargarlo. Se conserva el inciso narrativo «dije» para reflejar el marco conversacional.
- source_word: sir
  english_pob_choice: sir
  chosen_spanish: señor
  alternatives_spanish:
  - señor mío
  - maestro
  lexicon: κύριε
  rationale: Aquí el vocativo es deferente y sigue la forma de tratamiento del original y de la tradición de traducción inglesa. «Señor» es natural en español y mantiene la relación de respeto sin convertirlo en un título teológico.
- source_word: time of deception and indulgence and torment
  english_pob_choice: time of deception and indulgence and torment
  chosen_spanish: el tiempo del engaño, la indulgencia y el tormento
  alternatives_spanish:
  - el tiempo del engaño, del desenfreno y del tormento
  - el tiempo de la seducción, la indulgencia y el tormento
  lexicon: χρόνος / ἀπάτη / τρυφή / βάσανος
  rationale: Se conserva la triple serie nominal del original. «Engaño» mantiene la idea de deception; «indulgencia» sigue la elección inglesa para τρυφή, aunque en español puede sonar algo más abstracta que «desenfreno». Se deja esa tensión porque el texto parece contraponer una fase de complacencia/laxitud con el tormento.
- source_word: make it more clear to me
  english_pob_choice: make it more clear to me
  chosen_spanish: acláramelo más, te ruego
  alternatives_spanish:
  - hazlo más claro para mí, te ruego
  - explícamelo con más claridad, te ruego
  lexicon: σαφέστερον
  rationale: «Acláramelo más» conserva la petición de mayor claridad con un registro natural en español. «Te ruego» refleja la súplica implícita del original y del inglés, sin introducir solemnidad excesiva.
theological_decisions:
- issue: La triple expresión del ‘tiempo’ con términos moralmente cargados
  english_pob_reading: time of deception and indulgence and torment
  chosen_spanish_reading: el tiempo del engaño, la indulgencia y el tormento
  alternative_spanish_readings:
  - el tiempo del engaño, del desenfreno y del tormento
  - el tiempo de la seducción, la indulgencia y el tormento
  rationale: No se armoniza la serie para suavizarla. La secuencia mantiene la tensión moral entre una etapa de seducción/autoindulgencia y otra de castigo o aflicción; por eso se preserva el triple contraste en español.
  doctrine_reference: Didáctica moral y lenguaje de juicio en la literatura cristiana primitiva
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete de auditoría; la redacción española se apoya directamente en el griego normalizado y en la solución inglesa óptima, manteniendo el orden y el énfasis del diálogo.
  spanish_consistency_notes:
  - Se usa «señor» como vocativo de respeto, no como sustituto del nombre divino.
  - Se evita «Cristo»/«Mesías» porque el pasaje no contiene esa referencia.
  - Se mantiene «indulgencia» por fidelidad a la opción auditada, aunque «desenfreno» sería una alternativa española más idiomática en ciertos contextos.
