  source_alignment_summary: 'La pregunta española conserva bien la estructura básica del griego y del POB inglés: interrogativa directa, vocativo respetuoso y predicado sobre cuáles indulgencias son dañinas. Sin embargo, la colocación de «digo yo» entre rayas suena menos natural que una simple coma parentética y añade una marcación enfática no necesaria para el breve «I say» del inglés auditado.'
