  text: «¿Qué indulgencias, señor, digo yo, son dañinas?»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τίνας ἀφέσεις / indulgences (question term in context)
  english_pob_choice: indulgences
  chosen_spanish: indulgencias
  alternatives_spanish:
  - condescendencias
  - concesiones
  - relajaciones
  lexicon: ἀφεσις
  rationale: El contexto del breve diálogo pide un sustantivo que conserve la idea de permisos o concesiones. «Indulgencias» reproduce la elección léxica inglesa del POB y resulta comprensible en español contemporáneo, aunque puede sugerir matices eclesiásticos posteriores; por eso se conserva sin forzar una equivalencia doctrinal.
- source_word: κύριε
  english_pob_choice: sir
  chosen_spanish: señor
  alternatives_spanish:
  - señor mío
  - amo
  lexicon: κύριος
  rationale: Aquí el vocativo es una fórmula de respeto dirigida al interlocutor humano. «Señor» es la forma natural y sobria en español; no se traduce como el nombre divino ni se carga de sentido cristológico.
theological_decisions:
- issue: Tratamiento del vocativo respetuoso en un texto no bíblico
  english_pob_reading: sir
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - señor mío
  - amo
  rationale: El pasaje presenta una pregunta coloquial y reverente, sin contenido doctrinal explícito. La traducción mantiene el registro de respeto sin introducir una lectura religiosa adicional.
  doctrine_reference: pragmatics of address; no doctrinal claim in the source
translation_notes:
  revision_awareness: No hay revisiones registradas en el paquete fuente ni en el audit trail inglés; se traduce directamente desde el griego normalizado con apoyo del inglés POB solo para confirmar el tono y la segmentación interrogativa.
  spanish_consistency_notes:
  - Se mantiene la puntuación interrogativa y el inciso discursivo «digo yo» para reflejar la formulación directa del diálogo.
  - No se introduce terminología eclesiástica ajena al contexto inmediato; «indulgencias» se usa como equivalente de la concesión o permiso en cuestión.
