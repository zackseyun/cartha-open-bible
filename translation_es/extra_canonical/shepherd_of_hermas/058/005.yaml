  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Señor» para κύριε como tratamiento humano es correcto. «Indulgencias» sigue la decisión léxica del POB inglés; aunque en español puede evocar un sentido católico posterior, el propio expediente léxico ya reconoce esa posible resonancia y no exige sustitución en este contexto mínimo.
