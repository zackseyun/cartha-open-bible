base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/058/007.yaml
  text: “But there are also indulgences that save people; for many, by doing good things, indulge themselves, being carried along by their own pleasure. This indulgence, therefore, is beneficial for the slaves of God, and it secures life for such a person; but the harmful indulgences previously mentioned procure torments and punishments for them; and if they persist and do not repent, they procure death for themselves.”
translation:
  language: es
  text: Pero también hay placeres que salvan a las personas; porque muchos, al hacer cosas buenas, disfrutan de ello, dejándose llevar por su propio placer. Este placer, por tanto, es provechoso para los esclavos de Dios, y le asegura la vida a esa persona; pero los placeres dañinos mencionados antes les procuran tormentos y castigos; y si persisten y no se arrepienten, se procuran la muerte a sí mismos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπολαύσεις / indulgences
  english_pob_choice: indulgences
  chosen_spanish: complacencias
  alternatives_spanish:
  - placeres
  - deleites
  - indulgencias
  lexicon: ἀπόλαυσις
  rationale: El pasaje contrapone complacencias benéficas y dañinas. En español, "indulgencias" puede sonar demasiado técnico o eclesiástico; "complacencias" conserva la idea de búsqueda o satisfacción placentera sin perder el contraste moral del contexto.
- source_word: σώζουσιν / save
  english_pob_choice: save
  chosen_spanish: salvan
  alternatives_spanish:
  - rescatan
  - preservan
  lexicon: σῴζω
  rationale: El griego expresa efecto salvador real; "salvan" reproduce esa fuerza con naturalidad en español.
- source_word: ἀγαθὰ πράγματα / doing good things
  english_pob_choice: doing good things
  chosen_spanish: al hacer cosas buenas
  alternatives_spanish:
  - al hacer el bien
  - por obras buenas
  lexicon: ἀγαθός
  rationale: La formulación española mantiene el sentido general sin introducir una lectura más técnica de "obras" que el contexto no exige.
- source_word: δοῦλοι τοῦ θεοῦ
  english_pob_choice: slaves of God
  chosen_spanish: los esclavos de Dios
  alternatives_spanish:
  - los siervos de Dios
  lexicon: δοῦλος
  rationale: Se conserva la fuerza léxica de δοῦλος, siguiendo la elección inglesa POB y evitando suavizarla a "siervos" sin base contextual suficiente.
- source_word: ζωὴν πορίζεται
  english_pob_choice: it secures life
  chosen_spanish: asegura la vida
  alternatives_spanish:
  - procura la vida
  - consigue la vida
  lexicon: πορίζω
  rationale: '"Asegura" comunica de forma clara que la complacencia benéfica produce vida para esa persona.'
- source_word: αἱ βλαβεραὶ ἀπολαύσεις
  english_pob_choice: the harmful indulgences
  chosen_spanish: las complacencias dañinas
  alternatives_spanish:
  - los placeres perjudiciales
  - las indulgencias nocivas
  lexicon: ἀπόλαυσις
  rationale: Se mantiene el mismo término base para conservar el contraste interno del griego y del inglés POB.
- source_word: βασάνους καὶ τιμωρίας
  english_pob_choice: torments and punishments
  chosen_spanish: tormentos y castigos
  alternatives_spanish:
  - tormentos y penas
  - suplicios y castigos
  lexicon: βάσανος; τιμωρία
  rationale: '"Tormentos y castigos" es la correspondencia más directa y legible para dos términos distintos de juicio.'
- source_word: μετανοέω
  english_pob_choice: repent
  chosen_spanish: se arrepienten
  alternatives_spanish:
  - cambian de mente
  - hacen penitencia
  lexicon: μετανοέω
  rationale: En este contexto de advertencia moral y juicio, el sentido de giro ético se comunica bien con "arrepentirse".
- source_word: θάνατον ἑαυτοῖς
  english_pob_choice: death for themselves
  chosen_spanish: se procuran la muerte a sí mismos
  alternatives_spanish:
  - se atraen muerte para sí
  - se causan la muerte
  lexicon: θάνατος
  rationale: La construcción reflexiva preserva el matiz de responsabilidad personal del griego y del inglés POB.
theological_decisions:
- issue: Preservar la tensión entre complacencias salvadoras y complacencias dañinas
  english_pob_reading: But there are also indulgences that save people... This indulgence... is beneficial... but the harmful indulgences... procure torments and punishments
  chosen_spanish_reading: Pero también hay complacencias que salvan a las personas... Esta complacencia... es provechosa... pero las complacencias dañinas... les procuran tormentos y castigos
  alternative_spanish_readings:
  - Pero también hay placeres que salvan...
  - Pero también hay indulgencias que salvan...
  rationale: El texto distingue dos usos del mismo campo semántico con consecuencias opuestas. La traducción conserva esa tensión sin moralizarla ni resolverla artificialmente.
  doctrine_reference: Advertencia moral y juicio retributivo en literatura cristiana primitiva; coherente con el contraste entre vida y muerte en exhortación ética.
- issue: Mantener δοῦλοι τοῦ θεοῦ con fuerza social y religiosa
  english_pob_reading: slaves of God
  chosen_spanish_reading: los esclavos de Dios
  alternative_spanish_readings:
  - los siervos de Dios
  rationale: La POB inglesa opta por la fuerza literal de "slaves"; en español se mantiene para no atenuar la pertenencia radical implicada en el texto.
  doctrine_reference: Lenguaje de pertenencia a Dios en tradición cristiana primitiva; cf. uso bíblico de δοῦλος.
- issue: Traducir μετανοέω como arrepentimiento efectivo, no solo cambio intelectual
  english_pob_reading: if they persist and do not repent
  chosen_spanish_reading: si persisten y no se arrepienten
  alternative_spanish_readings:
  - si persisten y no cambian de mente
  - si perseveran y no se convierten
  rationale: El contexto exige una respuesta moral y volitiva frente al juicio, no únicamente una corrección cognitiva.
  doctrine_reference: Arrepentimiento como giro moral ante el pecado y sus consecuencias.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete de auditoría; la redacción española sigue de cerca la solución óptima-equivalente ya fijada en inglés, manteniendo el contraste semántico entre complacencias benéficas y dañinas y la culminación en arrepentimiento o muerte.
  spanish_consistency_notes:
  - Se conserva "complacencias" de forma consistente para ambas ocurrencias de ἀπόλαυσις, a fin de reflejar el paralelismo del original.
  - Se usa "esclavos de Dios" sin suavización a "siervos" por coherencia con la decisión léxica POB.
  - No se introduce terminología eclesiástica adicional que no esté respaldada por el griego o por la auditoría inglesa.
