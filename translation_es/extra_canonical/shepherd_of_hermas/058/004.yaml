    reason: lexical_alternative
  revision_rationale: 'Se corrigen dos fallas formales importantes: el error gramatical ''el indulgencia'' y la discordancia ''Toda persona... se han entregado''. Además, se ajusta el vocabulario para reflejar con más precisión ἀκολασία sin añadir especificidad innecesaria; ''autoindulgencia'' y ''se complace a sí misma'' mantienen el sentido del original y del POB inglés en un español más natural y exacto.'
