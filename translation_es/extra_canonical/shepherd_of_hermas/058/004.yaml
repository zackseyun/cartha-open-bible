base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/058/004.yaml
  text: “So, being tormented and punished the whole year, he remembers the indulgence and the deception, and he knows that because of them he suffers evil things. Every person who indulges himself and is deceived is tormented in this way, because, though having life, they have handed themselves over to death.”
translation:
  language: es
  text: Así, siendo atormentado y castigado durante todo el año, recuerda la autoindulgencia[a] y el engaño, y sabe que por causa de ellos padece males. Toda persona que se complace a sí misma y es engañada es atormentada de este modo, porque, aun teniendo vida, se ha entregado a sí misma a la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Autoindulgencia’ traduce aquí ἀκολασία, con el sentido de complacencia propia o desenfreno. Se prefiere esta forma sobre ‘indulgencia’ sola porque en español evita la ambigüedad con ‘clemencia’ y preserva mejor la fuerza moral del término.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασανιζόμενος / κολαζόμενος
  english_pob_choice: tormented and punished
  chosen_spanish: atormentado y castigado
  alternatives_spanish:
  - atormentado y sancionado
  - afligido y castigado
  lexicon: βασανίζω; κολάζω
  rationale: Conserva la doble idea de tormento intenso y castigo retributivo sin suavizarla. ‘Castigado’ comunica mejor que ‘sancionado’ el tono punitivo del pasaje.
- source_word: ἐνιαυτόν ὅλον
  english_pob_choice: the whole year
  chosen_spanish: durante todo el año
  alternatives_spanish:
  - todo el año
  - a lo largo de un año entero
  lexicon: ἐνιαυτός
  rationale: La expresión temporal es literal y natural en español; ‘durante todo el año’ mantiene la duración continua del castigo.
- source_word: μέμνηται τῆς ἀκολασίας καὶ τῆς πλάνης
  english_pob_choice: he remembers the indulgence and the deception
  chosen_spanish: recuerda la indulgencia y el engaño
  alternatives_spanish:
  - recuerda la disipación y el engaño
  - recuerda la complacencia y el engaño
  lexicon: ἀκολασία; πλάνη
  rationale: ‘Indulgencia’ preserva el matiz de autoindulgencia/desenfreno que la POB inglesa retuvo con ‘indulgence’; ‘engaño’ traduce πλάνη de forma directa y clara.
- source_word: δι' αὐτὰ πάσχει κακά
  english_pob_choice: because of them he suffers evil things
  chosen_spanish: por causa de ellos padece males
  alternatives_spanish:
  - por ellos sufre cosas malas
  - a causa de ellos sufre males
  lexicon: πάσχω; κακά
  rationale: ‘Padece males’ conserva el registro serio y la amplitud de κακά sin especificar más de lo que el griego dice.
- source_word: ἑαυτὸν / ἑαυτούς παραδιδόναι τῷ θανάτῳ
  english_pob_choice: they have handed themselves over to death
  chosen_spanish: se han entregado a sí mismas a la muerte
  alternatives_spanish:
  - se han entregado a la muerte
  - se han abandonado a la muerte
  lexicon: παραδίδωμι; θάνατος
  rationale: Mantiene el matiz de autoentrega responsable. ‘A sí mismas’ respeta la referencia generalizada a ‘every person’ en español inclusivo de concordancia natural.
theological_decisions:
- issue: Autoindulgencia como causa de ruina moral y muerte
  english_pob_reading: Every person who indulges himself and is deceived is tormented in this way, because, though having life, they have handed themselves over to death.
  chosen_spanish_reading: Toda persona que se entrega a los placeres y es engañada es atormentada de este modo, porque, aun teniendo vida, se han entregado a sí mismas a la muerte.
  alternative_spanish_readings:
  - Toda persona que se da a sí misma al desenfreno y es engañada...
  - Todo el que se autoindulge y es engañado...
  rationale: 'La redacción conserva la relación moral del texto: el autoengaño y la autoentrega conducen a un estado de muerte. ‘Se entrega a los placeres’ evita una expresión menos natural en español sin diluir la responsabilidad personal.'
  doctrine_reference: Antropología moral en literatura cristiana primitiva; la muerte como consecuencia del pecado y el autoengaño.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés. La versión española sigue directamente el griego normalizado y conserva la estructura de la POB inglesa sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene ‘muerte’ para θάνατος y ‘vida’ para ζωή, sin espiritualizar el contraste.
  - Se conserva la duplicación de sujeto en ‘se han entregado a sí mismas’ para reflejar la autoentrega voluntaria del griego.
  - ‘Engañada’ se usa en sentido moral/espiritual, no meramente cognitivo.
