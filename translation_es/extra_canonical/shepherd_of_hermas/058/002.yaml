  yaml_path: translation/extra_canonical/shepherd_of_hermas/058/002.yaml
  text: He answered me and says, “Your foolishness is persistent, and you are unwilling to cleanse your heart and to serve God. Watch out lest the time be fulfilled, and you be found foolish. Listen then,” he says, “as you desire, so that you may understand these things.
translation:
  language: es
  text: 'Él me respondió y dijo: «Tu necedad es persistente, y no quieres limpiar tu corazón ni servir a Dios. Cuídate, no sea que el tiempo se cumpla y seas hallado necio. Escucha, pues, dice, como lo deseas, para que entiendas estas cosas».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μωρία
  english_pob_choice: foolishness
  chosen_spanish: necedad
  alternatives_spanish:
  - locura
  - insensatez
  - foolishness/tontería
  lexicon: μωρία
  rationale: ‘Necedad’ comunica bien la falta moral e intelectual de sensatez sin caer en un registro demasiado coloquial; preserva la fuerza de la acusación. ‘Locura’ podría sonar más fuerte pero en español puede sugerir enfermedad mental, y ‘tontería’ rebaja demasiado el peso.
- source_word: καρδίαν
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón interior
  - alma
  - interior
  lexicon: καρδία
  rationale: ‘Corazón’ es la equivalencia más natural y fiel en español bíblico para el centro interior de la persona. ‘Interior’ explicita el sentido pero pierde la imaginería directa del original.
- source_word: θεῷ δουλεῦσαι
  english_pob_choice: to serve God
  chosen_spanish: servir a Dios
  alternatives_spanish:
  - esclavizarte a Dios
  - ser siervo de Dios
  - obedecer a Dios
  lexicon: δουλεύω
  rationale: Aquí el verbo expresa servicio/lealtad religiosa, no la metáfora de esclavitud literal. ‘Servir a Dios’ preserva la idea de devoción activa y es idiomático en español. ‘Siervo’ introduciría un sustantivo no presente en el griego.
- source_word: μὴ μήποτε πληρωθῇ ὁ χρόνος
  english_pob_choice: lest the time be fulfilled
  chosen_spanish: no sea que el tiempo se cumpla
  alternatives_spanish:
  - no sea que se complete el tiempo
  - no sea que llegue el tiempo a su plenitud
  - para que no se cumpla el tiempo
  lexicon: πληρόω
  rationale: ‘Cumplirse el tiempo’ conserva la imagen de un tiempo que llega a su plenitud o se completa, y mantiene la formulación sobria del texto. ‘Llegue a su plenitud’ explicita el sentido pero añade interpretación.
- source_word: εὑρεθῇς μωρός
  english_pob_choice: you be found foolish
  chosen_spanish: seas hallado necio
  alternatives_spanish:
  - te hallen necio
  - se descubra que eres necio
  - seas encontrado necio
  lexicon: εὑρίσκω
  rationale: ‘Ser hallado necio’ reproduce de forma transparente la pasiva del griego y conserva la fórmula de evaluación al momento decisivo. ‘Te hallen necio’ sería más natural, pero menos literal.
- source_word: ἀκούσατε δή
  english_pob_choice: Listen then
  chosen_spanish: Escucha, pues
  alternatives_spanish:
  - Escuchad, pues
  - Oye, entonces
  - Escuchen, entonces
  lexicon: ἀκούω
  rationale: El griego singular se refleja mejor con ‘Escucha’. ‘Pues’ reproduce la partícula inferencial de modo natural en español. Se evita el plural porque el interlocutor directo es singular.
- source_word: ὡς θέλεις
  english_pob_choice: as you desire
  chosen_spanish: como lo deseas
  alternatives_spanish:
  - según deseas
  - tal como quieres
  - como quieres
  lexicon: θέλω
  rationale: ‘Como lo deseas’ mantiene la relación comparativa/ajustativa del griego y conserva un tono cercano al diálogo. ‘Tal como quieres’ sería más idiomático pero algo más libre.
theological_decisions:
- issue: La admonición sobre la necedad persistente y el posible desenlace de ser hallado necio
  english_pob_reading: Your foolishness is persistent... lest the time be fulfilled, and you be found foolish.
  chosen_spanish_reading: Tu necedad es persistente... no sea que el tiempo se cumpla y seas hallado necio.
  alternative_spanish_readings:
  - Tu necedad continúa...
  - Tu insensatez persiste...
  rationale: Se conserva la advertencia moral sin suavizarla ni convertirla en mera torpeza intelectual. ‘Ser hallado necio’ mantiene la dimensión de juicio/evaluación que la pasiva sugiere, evitando una paráfrasis que diluya la amonestación.
  doctrine_reference: Advertencia moral y juicio conforme al estado espiritual de la persona, sin introducir categorías doctrinales ajenas al texto.
- issue: ‘Servir a Dios’ como lealtad obediente frente a una posible lectura de esclavitud religiosa
  english_pob_reading: to serve God
  chosen_spanish_reading: servir a Dios
  alternative_spanish_readings:
  - ser esclavo de Dios
  - obedecer a Dios
  rationale: En este contexto la frase apunta a la disposición obediente y dedicada del corazón, no a una categoría social de esclavitud. ‘Servir a Dios’ es fiel y natural en español, y no borra la exigencia del llamado.
  doctrine_reference: Piedad/obediencia como respuesta adecuada a Dios.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; la redacción sigue de cerca el griego normalizado y la traducción inglesa auditada, sin notas textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo ‘Dios’ para θεός y no se introdujo ‘Señor’ porque el pasaje no lo requiere.
  - Se conservó el tono admonitorio directo con segunda persona singular, coherente con el diálogo del pasaje.
  - Se evitó el uso de ‘Cristo’ o terminología cristológica ajena al segmento.
  - La puntuación española sigue un diálogo directo con comillas angulares para claridad editorial.
