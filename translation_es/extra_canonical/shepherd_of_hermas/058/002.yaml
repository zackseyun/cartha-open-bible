revisions:
- from: 'Él me respondió y dijo: «Tu necedad es persistente, y no quieres limpiar tu corazón ni servir a Dios. Mira bien, no sea que el tiempo se cumpla y seas hallado necio. Escucha, pues —dice—, como lo deseas, para que entiendas estas cosas».'
  to: 'Él me respondió y dijo: «Tu necedad es persistente, y no quieres limpiar tu corazón ni servir a Dios. Cuídate, no sea que el tiempo se cumpla y seas hallado necio. Escucha, pues, dice, como lo deseas, para que entiendas estas cosas».'
  rationale: Se ajusta «Mira bien» a «Cuídate» para reflejar mejor la advertencia del original y del POB inglés («Watch out»). También se simplifica la puntuación de la cláusula parentética para una lectura más natural en español, sin cambiar el contenido.
  reviewer_model: gpt-5.4
