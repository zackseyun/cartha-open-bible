review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego y del POB inglés: respuesta directa, reprensión por la necedad persistente, llamado a limpiar el corazón y servir a Dios, advertencia sobre el cumplimiento del tiempo y cierre exhortativo para entender. No hay desviaciones teológicas ni terminológicas mayores.'
  spanish_quality_summary: El español es claro, natural y digno. Sin embargo, «Mira bien» introduce un matiz algo más coloquial y perceptivo que el valor admonitorio de βλέπε/βλέπετε en contexto; «Cuídate» o «Mira» refleja mejor la advertencia. Además, la puntuación con raya parentética en «Escucha, pues —dice—» es posible, pero una coma simple fluye mejor en este tipo de narración traducida.
  glossary_alignment: 'No hay conflicto con la glosa del proyecto: θεῷ se vierte correctamente como «Dios»; δουλεῦσαι aquí está bien como «servir», no «esclavizarte». «Necedad», «corazón» y «seas hallado necio» son elecciones fieles y suficientemente legibles.'
  issues:
  - severity: medium
    issue: «Mira bien» suaviza y desplaza la advertencia
    rationale: La expresión española puede sugerir ‘fíjate cuidadosamente’, mientras que el contexto exhortativo pide una advertencia más directa del tipo «Cuídate» o «Mira». Esto mejora la correspondencia pragmática con el griego y con «Watch out» del POB inglés.
  - severity: low
    issue: Puntuación algo pesada en «Escucha, pues —dice—»
    rationale: La inserción parentética con rayas no es incorrecta, pero una puntuación más simple («Escucha, pues, dice, ...» o mejor integrando «Entonces escucha» si se reestructura) suena más natural en español narrativo sin afectar el sentido.
  revised_spanish_text: 'Él me respondió y dijo: «Tu necedad es persistente, y no quieres limpiar tu corazón ni servir a Dios. Cuídate, no sea que el tiempo se cumpla y seas hallado necio. Escucha, pues, dice, como lo deseas, para que entiendas estas cosas».'
  revision_rationale: Se ajusta «Mira bien» a «Cuídate» para reflejar mejor la advertencia del original y del POB inglés («Watch out»). También se simplifica la puntuación de la cláusula parentética para una lectura más natural en español, sin cambiar el contenido.
