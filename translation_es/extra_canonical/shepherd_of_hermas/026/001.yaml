base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/026/001.yaml
  text: First of all, believe that God is one—the one who created and ordered all things, and made all things out of nonexistence into being, and who contains all things, while he alone is uncontainable. Therefore believe him and fear him; and having feared, exercise self-control. Keep these things, and you will cast off all wickedness from yourself and put on every virtue of righteousness, and you will live to God, if you keep this command.
translation:
  language: es
  text: 'Ante todo, cree que Dios es uno: el que creó y ordenó todas las cosas, y que hizo pasar todas las cosas de la inexistencia a la existencia, y que contiene todas las cosas, pero él solo es incontenible. Por tanto, créele y témele; y, habiéndolo temido, ejerce dominio propio. Guarda estas cosas, y apartarás de ti toda maldad y te revestirás de toda virtud de justicia, y vivirás para Dios, si guardas este mandato.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θεός ἐστιν εἷς
  english_pob_choice: God is one
  chosen_spanish: Dios es uno
  alternatives_spanish:
  - uno es Dios
  - Dios es único
  lexicon: θεός
  rationale: La afirmación subraya la unidad de Dios; 'Dios es uno' conserva la forma breve y confesional del griego y del inglés POB sin introducir una glosa explicativa innecesaria.
- source_word: ἐποίησεν καὶ ἐκόσμησεν
  english_pob_choice: created and ordered
  chosen_spanish: creó y ordenó
  alternatives_spanish:
  - hizo y dispuso
  - creó y adornó/embelleció
  lexicon: ποιέω; κοσμέω
  rationale: '''Ordenó'' refleja mejor κοσμέω en este contexto de estructurar/poner en orden el universo que una idea ornamental; mantiene el paralelismo con ''creó''.'
- source_word: τὰ πάντα ἐξ οὐκ ὄντων εἰς τὸ εἶναι
  english_pob_choice: all things out of nonexistence into being
  chosen_spanish: todas las cosas de la inexistencia a la existencia
  alternatives_spanish:
  - todas las cosas de lo que no existía al ser
  - todas las cosas de la nada al ser
  lexicon: οὐκ ὄντων; εἰς τὸ εἶναι
  rationale: '''Inexistencia'' / ''existencia'' conserva el contraste ontológico del griego y evita añadir ''nada'' como interpretación más filosófica de la que el texto exige.'
- source_word: περιέχοντα τὰ πάντα
  english_pob_choice: contains all things
  chosen_spanish: contiene todas las cosas
  alternatives_spanish:
  - abarca todas las cosas
  - sostiene todas las cosas
  lexicon: περιέχω
  rationale: '''Contiene'' sigue de cerca el valor de περιέχω y preserva la imagen de abarcar/incluir; las alternativas se alejan más hacia interpretación teológica.'
- source_word: αὐτὸς μόνος ἀχώρητός ἐστιν
  english_pob_choice: he alone is uncontainable
  chosen_spanish: él solo es incontenible
  alternatives_spanish:
  - él solo no puede ser contenido
  - él solo es inabarcable
  lexicon: ἀχώρητος
  rationale: '''Incontenible'' es el equivalente directo y relativamente natural en español para ἀχώρητος en este contraste con ''contiene todas las cosas''.'
- source_word: φοβήθητι αὐτόν
  english_pob_choice: fear him
  chosen_spanish: témele
  alternatives_spanish:
  - tenle temor
  - témele reverencia
  lexicon: φοβέομαι
  rationale: Se conserva el sentido de temor reverente y obediente sin añadir la palabra 'reverencia', que suavizaría el imperativo y podría ocultar la fuerza del mandato.
- source_word: ἐγκρατεύου
  english_pob_choice: exercise self-control
  chosen_spanish: ejerce dominio propio
  alternatives_spanish:
  - ten dominio propio
  - practica el dominio propio
  lexicon: ἐγκρατεύομαι
  rationale: '''Dominio propio'' es la expresión más natural en español bíblico actual para la idea ética de ἐγκράτεια; ''ejerce'' reproduce el matiz imperativo de la exhortación.'
- source_word: πᾶσαν ἀρετὴν δικαιοσύνης
  english_pob_choice: every virtue of righteousness
  chosen_spanish: toda virtud de justicia
  alternatives_spanish:
  - toda virtud de rectitud
  - toda virtud justa
  lexicon: ἀρετή; δικαιοσύνη
  rationale: '''Justicia'' conserva el campo moral-jurídico de δικαιοσύνη y evita reducirlo a una mera cualidad moral abstracta; ''virtud'' mantiene ἀρετή como excelencia moral.'
theological_decisions:
- issue: Unidad de Dios como confesión primera
  english_pob_reading: God is one—the one who created and ordered all things
  chosen_spanish_reading: 'Dios es uno: el que creó y ordenó todas las cosas'
  alternative_spanish_readings:
  - 'Uno es Dios: el que creó y ordenó todas las cosas'
  - 'Dios es único: el que creó y ordenó todas las cosas'
  rationale: La versión mantiene la afirmación confesional sin desplazar el foco hacia una formulación filosófica. 'Dios es uno' comunica con claridad la unidad divina y enlaza directamente con los atributos creadores que siguen.
  doctrine_reference: Monoteísmo bíblico; Deuteronomio 6:4; Marcos 12:29
- issue: Creación ex nihilo y preservación divina
  english_pob_reading: made all things out of nonexistence into being, and who contains all things, while he alone is uncontainable
  chosen_spanish_reading: hizo pasar todas las cosas de la inexistencia a la existencia, y que contiene todas las cosas, mientras que él solo es incontenible
  alternative_spanish_readings:
  - hizo todas las cosas de la nada al ser, y contiene todas las cosas, mientras que él solo no puede ser contenido
  - trajo todas las cosas de no ser a ser, y abarca todas las cosas, mientras que él solo es inabarcable
  rationale: 'Se conserva la tensión entre trascendencia e inmanencia: Dios trae al ser lo que no era y a la vez contiene todo, pero no está limitado por nada. ''Inexistencia'' evita fijar prematuramente una terminología técnica no explícita en el griego normalizado.'
  doctrine_reference: Creación ex nihilo; trascendencia divina; Colosenses 1:16-17
- issue: Temor, autocontrol y obediencia como secuencia ética
  english_pob_reading: Therefore believe him and fear him; and having feared, exercise self-control. Keep these things, and you will cast off all wickedness from yourself and put on every virtue of righteousness, and you will live to God, if you keep this command.
  chosen_spanish_reading: Por tanto, créelo y témele; y, habiéndolo temido, ejerce dominio propio. Guarda estas cosas, y apartarás de ti toda maldad y te revestirás de toda virtud de justicia, y vivirás para Dios, si guardas este mandato.
  alternative_spanish_readings:
  - Por tanto, créelo y tenle temor; y, una vez que le hayas temido, practica el dominio propio...
  - '...y vivirás para Dios, si guardas este precepto'
  rationale: 'El orden exhortativo se conserva: creer, temer, disciplinarse, guardar, vivir. ''Dominiio propio'' y ''te revestirás'' mantienen la secuencia moral sin moralizar el texto más allá de su forma imperativa.'
  doctrine_reference: Santificación práctica; obediencia; Gálatas 5:22-23; Romanos 13:14
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente; el borrador sigue directamente el texto griego normalizado y el auditor inglés POB como contexto de comparación, sin evidencia de variantes textuales decisivas en el paquete suministrado.
  spanish_consistency_notes:
  - Se mantiene 'Dios' de forma uniforme para θεός, sin sustituir por 'Señor'.
  - '''Mandato'' traduce consistently el command/mandate del contexto, evitando ''precepto'' como variante no necesaria.'
  - 'Se conserva el paralelismo verbal del original con una cadena de participios/imperativos en español natural: creó/ordenó, hizo pasar/contiene, cree/teme/ejerce/guarda.'
  - No se introducen notas al pie porque el texto fuente y el auditor inglés no documentan variantes o ambigüedades que requieran anclaje explícito.
