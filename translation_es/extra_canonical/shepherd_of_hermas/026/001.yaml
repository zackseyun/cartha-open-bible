  to: 'Ante todo, cree que Dios es uno: el que creó y ordenó todas las cosas, y que hizo pasar todas las cosas de la inexistencia a la existencia, y que contiene todas las cosas, pero él solo es incontenible. Por tanto, créele y témele; y, habiéndolo temido, ejerce dominio propio. Guarda estas cosas, y apartarás de ti toda maldad y te revestirás de toda virtud de justicia, y vivirás para Dios, si guardas este mandato.'
  rationale: Se corrige 'créelo' por 'créele' para reflejar con fidelidad que el mandato es creerle a Dios, no creer una cosa. Además, se aligera el contraste con 'pero' para mejorar la naturalidad del español sin alterar el sentido. No se requieren notas adicionales.
