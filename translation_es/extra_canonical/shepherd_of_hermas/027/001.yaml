  yaml_path: translation/extra_canonical/shepherd_of_hermas/027/001.yaml
  text: 'He says to me: Have simplicity, and become guileless, and you will be like the little ones who do not know the wickedness that destroys the life of human beings.'
translation:
  language: es
  text: 'Me dice: Ten sencillez, y hazte inocente, y serás como los pequeños, que no conocen la maldad que destruye la vida de los seres humanos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἁπλότης / simplicity
  english_pob_choice: simplicity
  chosen_spanish: sencillez
  alternatives_spanish:
  - simplicidad
  - llaneza
  lexicon: ἁπλότης
  rationale: «Sencillez» comunica con naturalidad la cualidad moral de ser simple, sin artificio ni doblez, en un español bíblico actual y readable. «Simplicidad» también es posible, pero suena más abstracta; «llaneza» es más marcada regionalmente.
- source_word: ἄκακος / guileless
  english_pob_choice: guileless
  chosen_spanish: inocente
  alternatives_spanish:
  - sin malicia
  - sin engaño
  - sin doblez
  lexicon: ἄκακος
  rationale: El griego apunta a una ausencia de astucia o malicia. «Inocente» mantiene la idea de no tener perversidad o intención torcida y funciona bien en español. Las otras opciones explican más el matiz, pero resultan más largas o menos idiomáticas en esta sentencia breve.
- source_word: μικροί / the little ones
  english_pob_choice: the little ones
  chosen_spanish: los pequeños
  alternatives_spanish:
  - los niños
  - los pequeños de edad
  lexicon: μικροί
  rationale: «Los pequeños» conserva la referencia a la pequeñez sin restringirla necesariamente solo a la edad, que es la ambigüedad útil del original. «Los niños» sería más específico de edad y estrecharía el alcance.
- source_word: πονηρία / wickedness
  english_pob_choice: wickedness
  chosen_spanish: la maldad
  alternatives_spanish:
  - la perversidad
  - la malicia
  - la iniquidad
  lexicon: πονηρία
  rationale: «Maldad» es el equivalente más natural y amplio. Mantiene el contraste moral sin sonar excesivamente técnico. Las alternativas son válidas, pero cada una introduce un matiz más específico que el contexto no exige.
- source_word: τοῦς ἀνθρώπους / human beings
  english_pob_choice: human beings
  chosen_spanish: los seres humanos
  alternatives_spanish:
  - los hombres
  - la gente
  lexicon: ἄνθρωπος
  rationale: «Los seres humanos» evita el masculino genérico ambiguo y expresa con precisión el valor colectivo del griego. «La gente» sería menos formal y «los hombres» puede sonar más restringido o tradicional.
theological_decisions:
- issue: La comparación con «los pequeños» y su alcance moral/spiritual
  english_pob_reading: Like the little ones who do not know the wickedness that destroys the life of human beings.
  chosen_spanish_reading: como los pequeños, que no conocen la maldad que destruye la vida de los seres humanos
  alternative_spanish_readings:
  - como los niños, que no conocen la maldad que destruye la vida de los hombres
  - como los pequeños que ignoran la perversidad que arruina la vida humana
  rationale: La frase conserva la comparación moral sin convertirla en una afirmación doctrinal más amplia de lo que el texto dice. «Los pequeños» mantiene la imagen abierta; «no conocen» preserva la ignorancia inocente, no una inocencia moral absoluta.
  doctrine_reference: None
- issue: «Destruye la vida» como efecto de la maldad
  english_pob_reading: the wickedness that destroys the life of human beings
  chosen_spanish_reading: la maldad que destruye la vida de los seres humanos
  alternative_spanish_readings:
  - la maldad que arruina la vida de los seres humanos
  - la maldad que mata la vida de los seres humanos
  rationale: «Destruye» reproduce bien el alcance fuerte del verbo sin necesidad de intensificarlo. La formulación mantiene el vínculo causal entre maldad y destrucción humana, sin inferencias adicionales.
  doctrine_reference: None
translation_notes:
  revision_awareness: No hay revisiones documentadas en el paquete actual; la redacción sigue de cerca el sentido del griego normalizado y armoniza con la elección óptima de la POB en inglés.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, sin arcaísmos innecesarios.
  - No se añadió puntuación interpretativa; la sintaxis sigue la sentencia breve del original.
  - «Sencillez» e «inocente» conservan la tensión ética del mandato sin suavizarla.
