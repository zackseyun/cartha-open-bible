base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/027/006.yaml
  text: Therefore the one who gives is innocent; for just as he received from the Lord the ministry to carry out, he carried it out simply, making no distinction as to whom he should give or not give. Thus this ministry, having been carried out simply, became glorious before God. Therefore the one who thus ministers simply to God will live.
translation:
  language: es
  text: Por tanto, inocente es el que da; porque, así como recibió del Señor el ministerio para llevarlo a cabo, así lo llevó a cabo con sencillez, sin hacer distinción acerca de a quién debía dar o no dar. Así, este ministerio, al ser realizado con sencillez, llegó a ser glorioso delante de Dios. Por tanto, el que así ministra con sencillez a Dios vivirá.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ διδούς
  english_pob_choice: the one who gives
  chosen_spanish: el que da
  alternatives_spanish:
  - el que entrega
  - el que otorga
  lexicon: διδωμι
  rationale: La idea es la de dar/entregar algo recibido para distribuirlo. «El que da» conserva la generalidad y la fluidez del pasaje; «entrega» sería posible, pero aquí la repetición con el ministerio se entiende mejor con «da».
- source_word: ἀθῷος
  english_pob_choice: innocent
  chosen_spanish: inocente
  alternatives_spanish:
  - sin culpa
  - libre de culpa
  lexicon: ἀθῷος
  rationale: «Inocente» reproduce bien la exención de culpa en español bíblico contemporáneo. «Sin culpa» explicita el sentido, pero suena más explicativo que el original.
- source_word: διακονία
  english_pob_choice: ministry
  chosen_spanish: ministerio
  alternatives_spanish:
  - servicio
  - diaconía
  lexicon: διακονία
  rationale: Se conserva «ministerio» porque el contexto describe una función/encargo recibido del Señor. «Servicio» sería demasiado general; «diaconía» es menos natural en español de lectura pública.
- source_word: ἁπλῶς
  english_pob_choice: simply
  chosen_spanish: con sencillez
  alternatives_spanish:
  - simplemente
  - sin complicaciones
  lexicon: ἁπλῶς
  rationale: Aquí la noción es de actuación sin parcialidad ni artificio. «Con sencillez» comunica mejor la integridad y la ausencia de complicación que un adverbio meramente formal como «simplemente».
- source_word: μὴ διακρινόμενος περί τίνος δῷ ἢ μὴ δῷ
  english_pob_choice: making no distinction as to whom he should give or not give
  chosen_spanish: sin hacer distinción acerca de a quién debía dar o no dar
  alternatives_spanish:
  - sin distinguir a quién dar o no dar
  - sin discriminar a quién debía dar o no dar
  lexicon: διακρίνω
  rationale: Se mantiene la noción de «hacer distinción» porque expresa la idea de no parcialidad sin introducir un matiz moderno ajeno. «Discriminar» sería demasiado fuerte y anacrónico para este contexto.
- source_word: ἔνδοξος
  english_pob_choice: glorious
  chosen_spanish: glorioso
  alternatives_spanish:
  - honroso
  - ilustre
  lexicon: ἔνδοξος
  rationale: «Glorioso» preserva la evaluación positiva del acto delante de Dios. «Honroso» atenúa el eco de gloria; «ilustre» suena más social que teológico.
- source_word: πτωχῷ ... πλουσίῳ
  english_pob_choice: to whom he should give or not give
  chosen_spanish: a quién debía dar o no dar
  alternatives_spanish:
  - al pobre o al rico
  - al uno o al otro
  lexicon: contextual
  rationale: El texto griego subyacente alude a la cuestión de dar sin parcialidad entre pobres y ricos, pero la formulación conservada en el inglés POB no lo explicita. En español se mantiene la misma amplitud para no añadir información no explicitada en el versículo traducido.
theological_decisions:
- issue: La inocencia del que administra el don/ministerio recibido
  english_pob_reading: Therefore the one who gives is innocent
  chosen_spanish_reading: Por tanto, inocente es el que da
  alternative_spanish_readings:
  - Por tanto, el que da es inocente
  - Por tanto, queda inocente el que da
  rationale: Se conserva la afirmación de inocencia como evaluación moral del acto de dar cuando se hace con la disposición descrita. El orden enfático «inocente es el que da» refleja el peso inicial del predicado del original.
  doctrine_reference: Integridad moral y rectitud del servicio ante Dios
- issue: La frase «del Señor» como origen del ministerio
  english_pob_reading: he received from the Lord the ministry to carry out
  chosen_spanish_reading: recibió del Señor el ministerio para llevarlo a cabo
  alternative_spanish_readings:
  - recibió del Señor el ministerio para cumplirlo
  - recibió del Señor el encargo ministerial para ejecutarlo
  rationale: Se mantiene «del Señor» como referente del don/encargo originario. La frase refleja que la capacidad o comisión no nace del agente, sino del Señor que la otorga.
  doctrine_reference: Llamamiento y mayordomía recibidos de Dios
- issue: La simplicidad como rasgo moral del ministerio
  english_pob_reading: he carried it out simply
  chosen_spanish_reading: lo llevó a cabo con sencillez
  alternative_spanish_readings:
  - lo realizó simplemente
  - lo ejecutó con sencillez
  rationale: La simplicidad aquí no es solo estilo, sino ausencia de favoritismo y de cálculo humano. «Con sencillez» permite conservar esa carga ética.
  doctrine_reference: Pureza de intención en el servicio a Dios
- issue: 'El resultado: gloria delante de Dios y vida para el que ministra así'
  english_pob_reading: became glorious before God ... will live
  chosen_spanish_reading: llegó a ser glorioso delante de Dios ... vivirá
  alternative_spanish_readings:
  - se hizo glorioso ante Dios ... vivirá
  - fue glorioso delante de Dios ... vivirá
  rationale: 'Se respeta la secuencia causal del texto: una acción sencilla produce reconocimiento delante de Dios y culmina en la promesa de vida. «Vivirá» se mantiene sin explicitar más que el original.'
  doctrine_reference: Aprobación divina y vida como recompensa final
translation_notes:
  revision_awareness: No se detectaron revisiones previas en el paquete; la redacción española sigue directamente el texto griego normalizado y el sentido ya estabilizado en la traducción inglesa POB como apoyo auditado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplicable aquí; el texto dice «el Señor» en referencia al κύριος del pasaje, y se conserva esa forma porque el audit trail inglés también la usa de manera directa sin necesidad de expansión nominal.
  - Se eligió «inocente» y no «sin culpa» para preservar el valor evaluativo breve del original.
  - Se prefirió «ministerio» por consistencia con el campo semántico de διακονία en el contexto.
  - No se añadieron notas de pie porque el texto español no requiere variantes significativas no ya contenidas en las decisiones léxicas.
