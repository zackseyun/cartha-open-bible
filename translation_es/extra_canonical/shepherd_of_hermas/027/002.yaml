review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del inglés POB: prohíbe la maledicencia, condena escucharla con placer, y atribuye culpa al oyente que cree la acusación. Sin embargo, hay una pequeña inconsistencia léxica interna: el primer y segundo miembros usan ‘hablar mal’, mientras luego se nominaliza como ‘difamación’ y ‘difamador’. Dado que καταλαλέω / κατάλαλος aquí tiene fuerza más específica que simple ‘hablar mal’, conviene unificar con ‘difamar’ para preservar mejor la relación léxica y la gravedad moral del original.'
  spanish_quality_summary: 'El español es claro y natural, con buen registro eclesial moderno. La sintaxis fluye bien. La mejora necesaria es menor: sustituir ‘habla mal’ por ‘difama’ y ‘la difamación’ por una formulación más natural como ‘lo que oyes’ o ‘esa difamación’, evitando mezcla de registros y haciendo más elegante la repetición.'
  glossary_alignment: 'No hay términos del glosario maestro especialmente disputados en este pasaje. ‘Pecado’, ‘hermano’ y ‘culpable’ están bien. La principal cuestión es la consistencia de καταλαλέω: mejor ‘difamar’/‘difamador’ que alternar con ‘hablar mal’, ya que el inglés POB fijó ‘slander’.'
  issues:
  - severity: medium
    issue: Inconsistencia léxica en la familia de καταλαλέω
    rationale: El texto comienza con ‘no hables mal de nadie’ y ‘a quien habla mal’, pero después usa ‘difamación’ y ‘difamador’. Esa mezcla debilita la cohesión del original, que repite la misma raíz semántica.
  - severity: low
    issue: ‘la difamación que oyes’ suena algo rígido
    rationale: Aunque comprensible, en español resulta menos natural que ‘lo que oyes’ o ‘esa difamación’, especialmente en una frase ya cargada de repeticiones forenses.
  revised_spanish_text: Ante todo, no difames a nadie, y no escuches con gusto a quien difama; de otro modo, tú también, el que oye, serás culpable del pecado del difamador, si crees lo que oyes. Porque, al creerlo, tú mismo también tendrás algo contra tu hermano. Así serás culpable del pecado del difamador.
  revision_rationale: La revisión es menor y busca alinear mejor el español con la repetición léxica del griego y del inglés POB. ‘Difamar’ expresa con más precisión la fuerza de καταλαλέω que ‘hablar mal’, y ‘si crees lo que oyes’ mantiene el sentido sin rigidez innecesaria.
