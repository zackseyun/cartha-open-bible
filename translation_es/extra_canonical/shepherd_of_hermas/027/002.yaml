  to: Ante todo, no difames a nadie, y no escuches con gusto a quien difama; de otro modo, tú también, el que oye, serás culpable del pecado del difamador, si crees lo que oyes. Porque, al creerlo, tú mismo también tendrás algo contra tu hermano. Así serás culpable del pecado del difamador.
