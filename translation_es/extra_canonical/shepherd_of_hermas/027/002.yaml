base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/027/002.yaml
  text: First of all, slander no one, and do not listen with pleasure to someone who slanders; otherwise you too, the hearer, will be guilty of the slanderer’s sin if you believe the slander you hear. For by believing it, you yourself also will have something against your brother. Thus you will be guilty of the slanderer’s sin.
translation:
  language: es
  text: Ante todo, no difames a nadie, y no escuches con gusto a quien difama; de otro modo, tú también, el que oye, serás culpable del pecado del difamador, si crees lo que oyes. Porque, al creerlo, tú mismo también tendrás algo contra tu hermano. Así serás culpable del pecado del difamador.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μὴ καταλαλήσῃς
  english_pob_choice: slander no one
  chosen_spanish: no hables mal de nadie
  alternatives_spanish:
  - no difames a nadie
  - no calumnies a nadie
  lexicon: καταλαλέω
  rationale: El verbo griego expresa hablar mal, difamar o calumniar; en español ‘hablar mal de’ comunica bien el acto y su alcance general, sin hacer más técnico el reproche de lo que el contexto exige.
- source_word: μηδὲ ἡδονῇ ἀκούσῃς καταλαλοῦντος
  english_pob_choice: do not listen with pleasure to someone who slanders
  chosen_spanish: no escuches con gusto a quien habla mal
  alternatives_spanish:
  - no oigas con agrado a quien difama
  - no te deleites oyendo al que calumnia
  lexicon: ἀκούω + ἡδονῇ + καταλαλέω
  rationale: La construcción combina oír con agrado y el contenido difamatorio. ‘Escuchar con gusto’ conserva la idea de una recepción complacida, natural en español actual y suficientemente cercana al griego.
- source_word: καταλαλιοῦντος
  english_pob_choice: the slanderer’s
  chosen_spanish: del difamador
  alternatives_spanish:
  - del calumniador
  - del que habla mal
  lexicon: κατάλαλος / καταλαλέω
  rationale: Se usa ‘difamador’ para mantener el vínculo lexical con la acción de difamar/hablar mal y evitar una repetición demasiado pesada de la misma frase.
- source_word: ἔνοχος
  english_pob_choice: will be guilty
  chosen_spanish: serás culpable
  alternatives_spanish:
  - quedarás sujeto
  - serás reo
  lexicon: ἔνοχος
  rationale: ‘Culpable’ es el equivalente más claro y publicado en español, y mantiene la fuerza forense/moral del término griego.
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - falta
  - culpa
  lexicon: ἁμαρτία
  rationale: El contexto habla de una falta moral real atribuible al oyente; ‘pecado’ conserva la densidad ética tradicional y la inteligibilidad eclesial.
- source_word: ἀδελφός
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - hermano en la fe
  - prójimo
  lexicon: ἀδελφός
  rationale: ‘Hermano’ refleja el vínculo comunitario implícito en el texto y coincide con el uso cristiano estándar sin añadir glosa innecesaria.
theological_decisions:
- issue: La culpabilidad del oyente que recibe y cree la difamación
  english_pob_reading: otherwise you too, the hearer, will be guilty of the slanderer’s sin if you believe the slander you hear
  chosen_spanish_reading: de otro modo, tú también, el que oye, serás culpable del pecado del difamador, si crees la difamación que oyes
  alternative_spanish_readings:
  - de otro modo, tú también, el oyente, serás culpable del pecado del difamador
  - si das crédito a la difamación que oyes, tú también serás culpable
  rationale: La frase griega responsabiliza al oyente no sólo por oír, sino por creer y participar en la difusión/aceptación de la calumnia. El español mantiene esa imputación moral sin suavizarla.
  doctrine_reference: Ética de la responsabilidad moral del oyente; cf. temas bíblicos de no participar en el mal ajeno.
- issue: Repetición del ‘pecado del difamador’
  english_pob_reading: Thus you will be guilty of the slanderer’s sin
  chosen_spanish_reading: Así serás culpable del pecado del difamador
  alternative_spanish_readings:
  - Así quedarás culpable del pecado del difamador
  - De este modo serás culpable del pecado del difamador
  rationale: La repetición final refuerza el peligro moral y se conserva para no atenuar el paralelismo enfático del original y de la traducción inglesa.
  doctrine_reference: Llamado a evitar la participación en el pecado de la lengua.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido del griego y el trazo auditado de la POB inglesa, manteniendo la progresión: prohibición de hablar mal, prohibición de deleitarse oyendo la difamación, responsabilidad del oyente que cree, y conclusión enfática sobre la culpa compartida.'
  spanish_consistency_notes:
  - Se mantuvo ‘difamador/difamación’ para conservar una familia léxica coherente y transparente en español.
  - Se evitó ‘calumnia’ como única opción principal porque puede sonar más jurídico o restringido; ‘hablar mal’ transmite mejor el campo semántico amplio del griego en un español natural.
  - ‘Hermano’ se conserva como vocativo relacional comunitario sin añadir explicaciones al texto base.
