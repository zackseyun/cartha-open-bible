base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/027/007.yaml
  text: So keep this commandment, as I have spoken to you, so that your repentance and that of your household may be found in simplicity, and your heart clean and unstained.
translation:
  language: es
  text: Así que guarda este mandamiento, como te he hablado, para que tu arrepentimiento y el de tu casa sean hallados en sencillez, y tu corazón limpio y sin mancha.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν ἁπλότητι
  english_pob_choice: in simplicity
  chosen_spanish: en sencillez
  alternatives_spanish:
  - en simplicidad
  - con sencillez
  lexicon: ἁπλότης
  rationale: Sencillez comunica de manera natural la idea de una disposición sin doblez o sin mezcla, sin introducir una abstracción innecesariamente técnica. Mantiene la fuerza moral del pasaje y suena más idiomático en español que un calco rígido.
- source_word: καρδίαν σου καθαρὰν καὶ ἀμόλυντον
  english_pob_choice: your heart clean and unstained
  chosen_spanish: tu corazón limpio y sin mancha
  alternatives_spanish:
  - tu corazón puro e incontaminado
  - tu corazón limpio e inmaculado
  lexicon: καθαρός; ἀμόλυντος; καρδία
  rationale: ‘Limpio y sin mancha’ preserva el doble matiz de pureza y ausencia de contaminación, sin forzar un tecnicismo doctrinal. ‘Sin mancha’ conserva bien ἀμόλυντος con una imagen comprensible en español.
- source_word: μετάνοια
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - cambio de mente
  - arrepentimiento/volverse
  lexicon: μετάνοια
  rationale: En este contexto moral y exhortativo, ‘arrepentimiento’ expresa mejor la respuesta concreta que el texto pide. ‘Cambio de mente’ sería posible en un registro más analítico, pero resultaría menos natural aquí.
- source_word: καὶ τῆς οἰκίας σου
  english_pob_choice: and that of your household
  chosen_spanish: y el de tu casa
  alternatives_spanish:
  - y el de tu familia
  - y el de tu hogar
  lexicon: οἰκία
  rationale: ‘Casa’ mantiene el valor bíblico-social del término, que puede abarcar más que la familia nuclear. Además, enlaza bien con el paralelismo de la frase y con el español bíblico actual.
- source_word: ἐν ἁπλότητι ... καθαρὰν καὶ ἀμόλυντον
  english_pob_choice: in simplicity ... clean and unstained
  chosen_spanish: en sencillez ... limpio y sin mancha
  alternatives_spanish:
  - en simplicidad ... puro e incontaminado
  lexicon: ἁπλότης; καθαρός; ἀμόλυντος
  rationale: El conjunto conserva el tono ético del original sin sobreexplicar. La combinación de ‘sencillez’ con ‘limpio y sin mancha’ mantiene el contraste entre una disposición interior íntegra y una pureza moral visible.
theological_decisions:
- issue: Naturaleza de la exhortación a la ‘casa’ del oyente
  english_pob_reading: that of your household
  chosen_spanish_reading: y el de tu casa
  alternative_spanish_readings:
  - y el de tu familia
  - y el de tu hogar
  rationale: La formulación ‘casa’ preserva la amplitud social y doméstica del griego y evita reducir el alcance a una familia moderna estrictamente nuclear. También mantiene la resonancia bíblica de una unidad doméstica bajo exhortación religiosa.
  doctrine_reference: Uso bíblico de οἶκος/οἰκία como casa doméstica extendida; cf. formulaciones veterotestamentarias y neotestamentarias sobre la ‘casa’.
- issue: Relación entre arrepentimiento y pureza interior
  english_pob_reading: so that your repentance ... may be found ... and your heart clean and unstained
  chosen_spanish_reading: para que tu arrepentimiento ... sea hallado ... y tu corazón limpio y sin mancha
  alternative_spanish_readings:
  - para que tu arrepentimiento ... resulte ... y tu corazón puro e incontaminado
  - para que se halle ...
  rationale: La construcción mantiene la finalidad moral del mandato sin diluir la idea de que el arrepentimiento debe resultar comprobable o ‘hallado’ en una condición concreta. ‘Hallado’ conserva la pasividad implícita del original y la idea de examen o verificación.
  doctrine_reference: Énfasis moral-exhortativo del texto patrístico; integridad interior como fruto visible del arrepentimiento.
translation_notes:
  revision_awareness: No se registran revisiones previas en el paquete provisto; el borrador se ha hecho directamente desde el griego normalizado y corroborado con la traducción inglesa auditada, sin huellas de variantes textuales en el expediente actual.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - ‘Arrepentimiento’ se usa en sentido moral y exhortativo, no como un tecnicismo de ‘cambio de mente’.
  - ‘Casa’ se conserva por su amplitud semítica y eclesial, en lugar de reducirla a ‘familia’.
  - No se introduce terminología eclesiástica posterior; el tono permanece sobrio y directamente dependiente del griego.
