  yaml_path: translation/extra_canonical/shepherd_of_hermas/027/003.yaml
  text: Slander is evil; it is an unsettled demon, never at peace, but always dwelling amid divisions. So keep away from it, and you will always have prosperity with all.
translation:
  language: es
  text: La difamación es mala; es un demonio inquieto, nunca en paz, sino que siempre vive en medio de divisiones. Así que aléjate de ella, y siempre tendrás prosperidad con todos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: slander
  english_pob_choice: Slander
  chosen_spanish: calumnia
  alternatives_spanish:
  - murmuración
  - difamación
  lexicon: calumnia
  rationale: El griego describe una práctica dañina de habla injuriosa; «calumnia» conserva con naturalidad el sentido de falsear o dañar el buen nombre, sin suavizar la fuerza moral del término.
- source_word: evil
  english_pob_choice: evil
  chosen_spanish: mala
  alternatives_spanish:
  - malvada
  - perversa
  lexicon: malo
  rationale: El predicado simple «mala» reproduce la valoración negativa directa del texto y suena natural en español; aquí no exige un matiz técnico más fuerte.
- source_word: unsettled demon
  english_pob_choice: an unsettled demon
  chosen_spanish: un demonio inquieto
  alternatives_spanish:
  - un demonio inestable
  - un demonio sin descanso
  lexicon: demonio; inquieto
  rationale: «Inquieto» comunica bien la idea de falta de reposo y agitación constante. Evita una paráfrasis excesiva y mantiene el carácter personal/espiritual del término.
- source_word: never at peace
  english_pob_choice: never at peace
  chosen_spanish: nunca en paz
  alternatives_spanish:
  - jamás en paz
  - sin descanso
  lexicon: paz
  rationale: La construcción negativa directa conserva la oposición entre paz y agitación que el texto enfatiza.
- source_word: dwelling amid divisions
  english_pob_choice: always dwelling amid divisions
  chosen_spanish: siempre habita entre divisiones
  alternatives_spanish:
  - siempre mora entre discordias
  - siempre vive en medio de divisiones
  lexicon: habitar; divisiones
  rationale: «Habita» mantiene el valor estable de residencia del original; «divisiones» preserva el lenguaje concreto del conflicto comunitario sin sustituirlo por una abstracción más interpretativa como «discordias».
- source_word: keep away from it
  english_pob_choice: So keep away from it
  chosen_spanish: aléjate de ella
  alternatives_spanish:
  - apártate de ella
  - mantente lejos de ella
  lexicon: alejarse
  rationale: El imperativo directo es claro y idiomático en español, y el pronombre femenino concuerda con «calumnia».
- source_word: you will always have prosperity with all
  english_pob_choice: you will always have prosperity with all
  chosen_spanish: siempre tendrás prosperidad con todos
  alternatives_spanish:
  - siempre estarás en paz con todos
  - siempre te irá bien con todos
  lexicon: prosperidad; con todos
  rationale: «Prosperidad» refleja el beneficio integral prometido por el texto sin reducirlo a mera ausencia de conflicto. «Con todos» conserva la amplitud social del original.
theological_decisions:
- issue: Naturaleza espiritual de la calumnia
  english_pob_reading: Slander is evil; it is an unsettled demon
  chosen_spanish_reading: La calumnia es mala; es un demonio inquieto
  alternative_spanish_readings:
  - La calumnia es mala; es un espíritu inquieto
  - La calumnia es mala; es un demonio sin descanso
  rationale: El texto personifica la calumnia como una realidad demoníaca; «demonio» conserva esa personificación y evita diluirla en una metáfora meramente psicológica. «Inquieto» expresa la falta de paz sin reinterpretar el pasaje.
  doctrine_reference: Angelología y lenguaje espiritual del mal
- issue: Resultado moral y comunitario de evitar la calumnia
  english_pob_reading: So keep away from it, and you will always have prosperity with all
  chosen_spanish_reading: aléjate de ella, y siempre tendrás prosperidad con todos
  alternative_spanish_readings:
  - apártate de ella, y siempre tendrás paz con todos
  - aléjate de ella, y siempre vivirás en armonía con todos
  rationale: «Prosperidad» sigue la amplitud del beneficio prometido por la fuente y no reduce el resultado a una sola dimensión emocional o relacional. Mantener «con todos» conserva el alcance comunitario explícito.
  doctrine_reference: Ética comunitaria y fruto de la obediencia
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el contexto proporcionado. La redacción española se elaboró directamente desde el griego normalizado y se contrastó con la traducción POB en inglés para mantener el tono, la personificación demoníaca y el cierre exhortativo-promisorio.
  spanish_consistency_notes:
  - Se usa «demonio» de forma consistente con la personificación espiritual del mal en este pasaje.
  - Se preserva «divisiones» para mantener el vocabulario concreto del conflicto, en lugar de reemplazarlo por un término más general o eclesiástico.
  - Se evita «SEÑOR» u այլ terminología de sustitución porque el pasaje no contiene el nombre divino.
