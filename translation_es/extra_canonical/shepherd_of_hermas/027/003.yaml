review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego reflejado en la auditoría inglesa: la calumnia/difamación como mal personificado, su carácter intranquilo, su asociación continua con las divisiones, y la exhortación a apartarse de ella para gozar de bienestar relacional. Sin embargo, hay un ajuste léxico importante: «calumnia» en español suele estrecharse a acusación falsa específica, mientras que el sentido aquí es más amplio, como habla difamatoria o maledicencia. También «habita entre divisiones» suena algo rígido; una formulación más idiomática puede preservar mejor el valor de residencia en medio de conflictos.'
  spanish_quality_summary: El español es claro y mayormente natural, con tono digno. No obstante, «calumnia» puede sonar demasiado técnico/forense para un contexto ético general, y «habita entre divisiones» resulta algo calcado. «Difamación» y «vive en medio de divisiones» mejoran legibilidad sin perder fuerza.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La personificación demoníaca se conserva adecuadamente con «demonio». La revisión propuesta es principalmente de precisión semántica y naturalidad idiomática en español.
  issues:
  - severity: medium
    issue: «Calumnia» puede ser demasiado estrecho para el sentido de slander
    rationale: En español bíblico y eclesial, «calumnia» suele implicar falsedad concreta; el pasaje parece abarcar el habla difamatoria/maledicente de forma más amplia. «Difamación» preserva mejor el campo semántico sin reducirlo indebidamente.
  - severity: low
    issue: «habita entre divisiones» suena algo rígido en español
    rationale: La idea de morar de continuo en medio de conflictos está bien captada, pero «vive en medio de divisiones» suena más natural y mantiene el aspecto durativo.
  revised_spanish_text: La difamación es mala; es un demonio inquieto, nunca en paz, sino que siempre vive en medio de divisiones. Así que aléjate de ella, y siempre tendrás prosperidad con todos.
  revision_rationale: Se ajusta «calumnia» a «difamación» para reflejar mejor un sentido más amplio de habla injuriosa, y se suaviza «habita entre divisiones» a una expresión más idiomática en español sin perder el valor del original.
