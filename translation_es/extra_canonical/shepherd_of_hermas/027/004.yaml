review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego y del English POB: vestirse de una cualidad moral, ausencia de tropiezo dañino, hacer el bien, dar de los propios recursos recibidos de Dios, y hacerlo sin vacilar ni discriminar entre destinatarios. Sin embargo, varias formulaciones suenan calcadas o poco idiomáticas en español y una decisión léxica clave debilita el matiz de ἁπλῶς.'
  spanish_quality_summary: 'El texto es comprensible, pero tiene giros poco naturales: «tropiezo malo», «todas las cosas son suaves y alegres», «de tus trabajos, que Dios te da», y «a todos se les dé» resultan torpes o ambiguos. Una revisión menor mejora legibilidad y dignidad sin apartarse del sentido fuente.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» es correcto. No aparecen términos como Yahvé, Mesías, espíritu, carne, gracia, etc. Sí conviene ajustar ἁπλῶς a un español que exprese sencillez/franqueza en el dar, y σκάνδαλον a una expresión más natural como «mal tropiezo» o «obstáculo malo».
  issues:
  - severity: medium
    issue: «tropiezo malo» suena antinatural en español
    rationale: Aunque intenta preservar la imagen de σκάνδαλον, el orden adjetival y la colocación no son idiomáticos. «mal tropiezo» conserva mejor la imagen y suena más natural; también podría usarse «obstáculo malo», pero pierde la metáfora de tropezar.
  - severity: medium
    issue: «todas las cosas son suaves y alegres» es un calco poco claro
    rationale: La combinación funciona en inglés, pero en español «suaves» aplicado a «todas las cosas» suena extraño. «Todo es llano y alegre» o «todo es sereno y alegre» sería más natural; «llano» preserva mejor el matiz de algo despejado/sin tropiezo.
  - severity: medium
    issue: «de tus trabajos, que Dios te da» sugiere que Dios da los trabajos mismos
    rationale: 'El sentido es dar de los recursos procedentes del trabajo que Dios concede. En español conviene explicitar la relación: «de lo que obtienes de tus trabajos, que Dios te da» o equivalente.'
  - severity: medium
    issue: «con sencillez» para ἁπλῶς puede sonar a modestia de modales más que a dar sin reservas
    rationale: Aquí el contexto es la forma de dar a todos sin cálculo. «Generosamente» añadiría demasiado; «sin reservas» o «con franqueza» aclaran mejor el matiz de dar abiertamente. «Simplemente» también es posible pero menos fuerte.
  - severity: low
    issue: «a todos se les dé» es correcto pero rígido
    rationale: Una forma más natural y directa es «que de sus propios dones se dé a todos» o «que a todos se les dé de sus propios dones». La segunda mantiene la universalidad, pero puede pulirse en el conjunto de la frase.
  revised_spanish_text: Pero vístete de dignidad, en la cual no hay ningún mal tropiezo, sino que todo es llano y alegre. Haz lo que es bueno, y de lo que obtienes de tus trabajos, que Dios te da, da sin reservas a todos los que están necesitados, sin vacilar acerca de a quién debes dar o a quién no debes dar. Da a todos, porque Dios quiere que a todos se les dé de sus propios dones.
  revision_rationale: 'La revisión mantiene el contenido del borrador, pero corrige calcos y mejora la naturalidad del español: «mal tropiezo» para preservar σκάνδαλον sin extrañeza, «todo es llano y alegre» para expresar λείον καὶ ἱλαρόν de manera idiomática, «de lo que obtienes de tus trabajos» para evitar la ambigüedad de que Dios da los trabajos mismos, y «sin reservas» para reflejar mejor ἁπλῶς en contexto de generosidad imparcial.'
