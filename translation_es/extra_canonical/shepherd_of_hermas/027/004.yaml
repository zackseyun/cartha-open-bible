base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/027/004.yaml
  text: But clothe yourself with dignity, in which there is no evil stumbling block, but all things are smooth and cheerful. Do what is good, and from your labors, which God gives you, give simply to all who are in need, not hesitating as to whom you should give or to whom you should not give. Give to all, for God wants all to be given from his own gifts.
translation:
  language: es
  text: Pero vístete de dignidad, en la cual no hay ningún mal tropiezo, sino que todo es llano y alegre. Haz lo que es bueno, y de lo que obtienes de tus trabajos, que Dios te da, da sin reservas a todos los que están necesitados, sin vacilar acerca de a quién debes dar o a quién no debes dar. Da a todos, porque Dios quiere que a todos se les dé de sus propios dones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐνδυσάμενος / clothe yourself
  english_pob_choice: clothe yourself with dignity
  chosen_spanish: vístete de dignidad
  alternatives_spanish:
  - revístete de dignidad
  - ponte dignidad
  lexicon: Lexical choice for the reflexive imperative nuance of clothing oneself with an abstract quality
  rationale: “Vístete” preserves the concrete clothing image of the source and matches the English POB’s metaphor. “Revístete” is possible, but “vístete” is more natural in modern Spanish while remaining faithful. “Ponte dignidad” would flatten the metaphor.
- source_word: σεμνότης / dignity
  english_pob_choice: dignity
  chosen_spanish: dignidad
  alternatives_spanish:
  - decoro
  - modestia
  - seriedad
  lexicon: Term for honorable, becoming, restrained conduct
  rationale: “Dignidad” is broad and readable in Spanish, and keeps the positive moral quality without narrowing it to sexual modesty or mere seriousness. It best fits the source and the English POB choice.
- source_word: σκάνδαλον / stumbling block
  english_pob_choice: evil stumbling block
  chosen_spanish: tropiezo malo
  alternatives_spanish:
  - piedra de tropiezo mala
  - escándalo malo
  - obstáculo malo
  lexicon: Image of something that causes moral stumble
  rationale: The phrase “tropiezo malo” keeps the stumbling image and avoids the ecclesiastical overtones of “escándalo” in Spanish. “Piedra de tropiezo” is possible but more expanded. “Tropiezo” is concise and faithful.
- source_word: πᾶν ... λείον καὶ ἱλαρόν / all things are smooth and cheerful
  english_pob_choice: all things are smooth and cheerful
  chosen_spanish: todas las cosas son suaves y alegres
  alternatives_spanish:
  - todo es liso y alegre
  - todas las cosas son llanas y alegres
  - todo está sereno y alegre
  lexicon: Two adjectives describing an unobstructed, pleasant manner
  rationale: “Suaves y alegres” reflects the paired qualities without sounding unnatural in Spanish. “Lisas” or “llanas” would preserve physical smoothness but sound odd here; “sereno” would add an interpretive tone not explicit in the source.
- source_word: ἀγαθὸν / what is good
  english_pob_choice: What is good
  chosen_spanish: lo que es bueno
  alternatives_spanish:
  - el bien
  - lo bueno
  lexicon: Generic ethical good
  rationale: “Lo que es bueno” closely follows the source and remains flexible. “El bien” is more abstract; “lo bueno” is possible but slightly less formal.
- source_word: ἐκ τῶν πόνων / from your labors
  english_pob_choice: from your labors
  chosen_spanish: de tus trabajos
  alternatives_spanish:
  - de tus labores
  - de tu esfuerzo
  - de tu sudor
  lexicon: Source phrase for work, toil, or labor
  rationale: “Trabajos” is a natural, dignified equivalent for toil/labor in Spanish and preserves the sense of earned resources. “Labores” is also possible but can sound more formal or agricultural; “esfuerzo” shifts emphasis away from the work itself.
- source_word: ἁπλῶς / simply
  english_pob_choice: simply
  chosen_spanish: con sencillez
  alternatives_spanish:
  - simplemente
  - sin reserva
  - con liberalidad
  lexicon: Adverb of plainness, sincerity, and open-handedness
  rationale: “Con sencillez” captures the manner of giving in a transparent, unpretentious way. “Simplemente” can sound merely adverbial and miss the ethical nuance; “con liberalidad” adds generosity not explicit in the word.
- source_word: δός ... πᾶσι / give to all
  english_pob_choice: Give to all
  chosen_spanish: Da a todos
  alternatives_spanish:
  - Dales a todos
  - Da a todos sin excepción
  lexicon: Universal distributive command
  rationale: Short imperative in direct Spanish. “Da a todos” preserves the universality and force of the command.
- source_word: τὰ ἴδια τοῦ θεοῦ / God's own gifts
  english_pob_choice: his own gifts
  chosen_spanish: sus propios dones
  alternatives_spanish:
  - sus propios regalos
  - lo que es suyo
  - sus propios bienes
  lexicon: Possessive and gift vocabulary
  rationale: “Dones” reflects bestowed gifts and fits ecclesial Spanish without diluting meaning. “Regalos” sounds too casual; “bienes” is too broad. “Sus propios dones” keeps the source emphasis that the gifts are God’s.
theological_decisions:
- issue: Universal giving without discernment of person
  english_pob_reading: not hesitating as to whom you should give or to whom you should not give. Give to all
  chosen_spanish_reading: sin vacilar acerca de a quién debes dar o a quién no debes dar. Da a todos
  alternative_spanish_readings:
  - sin dudar a quién debes dar o a quién no
  - sin hacer acepción de personas
  rationale: The source and English POB stress universal generosity and the refusal to become selective by human calculation. “Sin vacilar” preserves the internal hesitation implied by the command without importing a technical legal sense. “Sin hacer acepción de personas” is a valid theological echo, but it is a later biblical idiom not present in the source wording.
  doctrine_reference: Generosity / impartiality in giving
- issue: What God gives and God owns
  english_pob_reading: God wants all to be given from his own gifts
  chosen_spanish_reading: porque Dios quiere que a todos se les dé de sus propios dones
  alternative_spanish_readings:
  - porque Dios quiere que se dé a todos de sus propios dones
  - porque Dios quiere que todo se distribuya de sus dones
  rationale: This keeps the theological claim that what is given to others comes from God’s own gifts, not from the giver’s autonomous possession. The impersonal passive in Spanish preserves the source’s distributive force. “A todos se les dé” also reflects the universal scope, though it is slightly more formal.
  doctrine_reference: Divine ownership of gifts / stewardship
translation_notes:
  revision_awareness: No applied revisions are listed for this unit. The draft follows the English POB’s optimal-equivalence rendering while staying close to the Greek source phrases for clothing, smooth/cheerful qualities, simple giving, and universal distribution.
  spanish_consistency_notes:
  - Usé “Yahvé” only when the source explicitly requires the divine name; this unit uses “Dios,” so no name substitution issue arises.
  - Mantengo “dones” para τὰ ἴδια τοῦ θεοῦ, coherente con un vocabulario de dones recibidos y administrados.
  - Conservo la fuerza imperativa directa en español, alineada con el tono exhortativo del mandato.
