revisions:
- from: Pero vístete de dignidad, en la cual no hay ningún tropiezo malo, sino que todas las cosas son suaves y alegres. Haz lo que es bueno, y de tus trabajos, que Dios te da, da con sencillez a todos los que están necesitados, sin vacilar acerca de a quién debes dar o a quién no debes dar. Da a todos, porque Dios quiere que a todos se les dé de sus propios dones.
  to: Pero vístete de dignidad, en la cual no hay ningún mal tropiezo, sino que todo es llano y alegre. Haz lo que es bueno, y de lo que obtienes de tus trabajos, que Dios te da, da sin reservas a todos los que están necesitados, sin vacilar acerca de a quién debes dar o a quién no debes dar. Da a todos, porque Dios quiere que a todos se les dé de sus propios dones.
  rationale: 'La revisión mantiene el contenido del borrador, pero corrige calcos y mejora la naturalidad del español: «mal tropiezo» para preservar σκάνδαλον sin extrañeza, «todo es llano y alegre» para expresar λείον καὶ ἱλαρόν de manera idiomática, «de lo que obtienes de tus trabajos» para evitar la ambigüedad de que Dios da los trabajos mismos, y «sin reservas» para reflejar mejor ἁπλῶς en contexto de generosidad imparcial.'
