base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/027/005.yaml
  text: Therefore those who receive will render an account to God why they received and for what; for those who receive while afflicted will not be judged, but those who receive in hypocrisy will pay the penalty.
translation:
  language: es
  text: Por lo tanto, los que reciben darán cuenta a Dios de por qué recibieron y para qué; porque los que reciben en aflicción no serán juzgados, pero los que reciben en hipocresía pagarán la pena.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ λαμβάνοντες
  english_pob_choice: those who receive
  chosen_spanish: los que reciben
  alternatives_spanish:
  - los que aceptan
  - quienes reciben
  lexicon: λαμβάνω
  rationale: Se conserva la generalidad del participio sin añadir una idea específica de ‘aceptar’; ‘los que reciben’ sigue de cerca el sentido del griego y la redacción inglesa POB.
- source_word: λόγον δώσουσιν τῷ θεῷ
  english_pob_choice: will render an account to God
  chosen_spanish: rendirán cuentas a Dios
  alternatives_spanish:
  - darán cuenta a Dios
  - rendirán un informe a Dios
  lexicon: λόγον διδόναι
  rationale: ‘Rendir cuentas’ es la equivalencia natural en español para la expresión forense de ‘dar cuenta’; mantiene el valor de responsabilidad ante Dios.
- source_word: διὰ τί καὶ εἰς τί
  english_pob_choice: why they received and for what
  chosen_spanish: de por qué recibieron y con qué fin
  alternatives_spanish:
  - por qué recibieron y para qué
  - por qué las recibieron y con qué propósito
  lexicon: διά + interrogativos
  rationale: La doble pregunta se preserva de modo transparente; ‘con qué fin’ comunica bien la idea de propósito sin volverla interpretativa.
- source_word: μετὰ θλίψεως
  english_pob_choice: while afflicted
  chosen_spanish: mientras están afligidos
  alternatives_spanish:
  - en aflicción
  - en medio de la aflicción
  lexicon: θλῖψις
  rationale: ‘Afligidos’ conserva el matiz de presión/sufrimiento presente en θλῖψις y mantiene la conexión causal/temporal con el recibir.
- source_word: οὐ κριθήσονται
  english_pob_choice: will not be judged
  chosen_spanish: no serán juzgados
  alternatives_spanish:
  - no serán condenados
  - no serán sometidos a juicio
  lexicon: κρίνω
  rationale: ‘Juzgados’ reproduce el verbo judicial sin cargar el texto con ‘condenados’, que sería más específico de lo que exige el griego.
- source_word: οἱ ... ἐν ὑποκρίσει
  english_pob_choice: those who receive in hypocrisy
  chosen_spanish: los que reciben en hipocresía
  alternatives_spanish:
  - los que reciben hipócritamente
  - los que reciben con hipocresía
  lexicon: ὑπόκρισις
  rationale: Se conserva el sustantivo abstracto, como en el inglés POB, para no suavizar la acusación moral ni convertirla en mero adverbio estilístico.
- source_word: τίσουσιν
  english_pob_choice: will pay the penalty
  chosen_spanish: pagarán la pena
  alternatives_spanish:
  - sufrirán el castigo
  - pagarán el castigo
  lexicon: τίω / τίνω
  rationale: ‘Pagarán la pena’ mantiene el valor retributivo del verbo mejor que una simple paráfrasis; ‘pena’ evita sobreespecificar el tipo de sanción.
theological_decisions:
- issue: Responsabilidad ante Dios por los dones o recepciones recibidas
  english_pob_reading: will render an account to God why they received and for what
  chosen_spanish_reading: rendirán cuentas a Dios de por qué recibieron y con qué fin
  alternative_spanish_readings:
  - darán cuenta a Dios de por qué recibieron y para qué
  rationale: La formulación conserva la obligación moral ante Dios sin interpretar qué ‘recibieron’ en concreto; el texto queda abierto como en el original.
  doctrine_reference: Mayordomía y juicio divino
- issue: Distinción entre recibir en aflicción y recibir en hipocresía
  english_pob_reading: those who receive while afflicted will not be judged, but those who receive in hypocrisy will pay the penalty
  chosen_spanish_reading: los que reciben mientras están afligidos no serán juzgados, pero los que reciben en hipocresía pagarán la pena
  alternative_spanish_readings:
  - los que reciben en aflicción no serán juzgados, pero los que reciben con hipocresía pagarán el castigo
  rationale: 'Se mantiene la tensión moral del contraste: la aflicción no invalida la recepción, pero la hipocresía sí atrae juicio retributivo.'
  doctrine_reference: Juicio, integridad moral e hipocresía
translation_notes:
  revision_awareness: No se registran revisiones previas ni notas textuales en el paquete; la redacción se apoya directamente en el griego normalizado y en la solución inglesa POB como control de equivalencia, sin divergencias documentadas.
  spanish_consistency_notes:
  - Se usa ‘Dios’ de manera consistente para θεός.
  - Se mantiene ‘afligidos/aflicción’ para θλῖψις, evitando ‘tribulación’ por preferencia estilística no documentada en el paquete.
  - Se conserva el contraste judicial con ‘juzgados’ y ‘pagarán la pena’, sin ampliar a condena explícita.
