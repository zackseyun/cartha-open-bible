review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del English POB: responsabilidad ante Dios por recibir, contraste entre recibir en aflicción y recibir con hipocresía, y resultado judicial/retributivo. Sin embargo, dos giros españoles no son los más fieles ni naturales: «de por qué recibieron» suena torpe tras «rendirán cuentas», y «mientras están afligidos» introduce un matiz progresivo menos directo que el griego/preposición de estado.'
  spanish_quality_summary: El texto es claro y mayormente natural, pero puede mejorarse en fluidez y precisión jurídica. «Darán cuenta a Dios de por qué recibieron y para qué» o «por qué y para qué recibieron» suena más idiomático que «rendirán cuentas... de por qué». Asimismo, «en aflicción» refleja mejor el sintagma griego que «mientras están afligidos».
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Dios», «juzgados» y el campo semántico moral/judicial están bien. «Los que reciben» preserva adecuadamente οἱ λαμβάνοντες. «Pagarán la pena» es aceptable, aunque «pagarán el castigo» sería más explícito; no es necesario cambiarlo.
  issues:
  - severity: medium
    issue: «rendirán cuentas a Dios de por qué recibieron»
    rationale: Aunque comprensible, en español «rendir cuentas de por qué...» suena menos natural que «darán cuenta a Dios de por qué...» o «rendirán cuentas a Dios por...». Conviene ajustar la construcción para legibilidad sin perder el matiz forense.
  - severity: low
    issue: «mientras están afligidos»
    rationale: El griego μετὰ θλίψεως se refleja mejor como estado o circunstancia («en aflicción») que como perífrasis progresiva temporal. La revisión mejora fidelidad y concisión.
  revised_spanish_text: Por lo tanto, los que reciben darán cuenta a Dios de por qué recibieron y para qué; porque los que reciben en aflicción no serán juzgados, pero los que reciben en hipocresía pagarán la pena.
  revision_rationale: Se ajusta la sintaxis a un español más idiomático y se acerca mejor el sintagma de aflicción al valor circunstancial del griego, sin cambiar el sentido del English POB ni las decisiones teológicas documentadas.
