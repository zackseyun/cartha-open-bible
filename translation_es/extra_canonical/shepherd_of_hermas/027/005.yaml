revisions:
- from: Por lo tanto, los que reciben rendirán cuentas a Dios de por qué recibieron y con qué fin; porque los que reciben mientras están afligidos no serán juzgados, pero los que reciben en hipocresía pagarán la pena.
  to: Por lo tanto, los que reciben darán cuenta a Dios de por qué recibieron y para qué; porque los que reciben en aflicción no serán juzgados, pero los que reciben en hipocresía pagarán la pena.
  rationale: Se ajusta la sintaxis a un español más idiomático y se acerca mejor el sintagma de aflicción al valor circunstancial del griego, sin cambiar el sentido del English POB ni las decisiones teológicas documentadas.
