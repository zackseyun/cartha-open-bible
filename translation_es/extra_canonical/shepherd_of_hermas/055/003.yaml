  yaml_path: translation/extra_canonical/shepherd_of_hermas/055/003.yaml
  text: 5. Again we went on a little, and he shows me a great shepherd, savage in appearance, wearing a white goatskin, and he had a bag on his shoulders, and a very hard staff with knots, and a great whip. He had a very harsh look, so that I was afraid of him—such was his look.
translation:
  language: es
  text: '5. Otra vez avanzamos un poco, y me mostró un gran pastor, de aspecto salvaje, vestido con una piel blanca de cabra; llevaba un zurrón al hombro, una vara muy dura con nudos y un gran látigo. Tenía un aspecto muy terrible, tanto que tuve miedo de él: tal era su aspecto.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πάλιν ἐπορευόμεθα μικρόν
  english_pob_choice: Again we went on a little
  chosen_spanish: Otra vez avanzamos un poco
  alternatives_spanish:
  - De nuevo seguimos un poco
  - Otra vez caminamos un poco
  lexicon: πάλιν; πορεύομαι; μικρόν
  rationale: Conserva la repetición de continuidad (“otra vez”) y el avance breve (“un poco”), con un verbo natural en español que no añade interpretación.
- source_word: ποιμένα μέγαν
  english_pob_choice: a great shepherd
  chosen_spanish: un gran pastor
  alternatives_spanish:
  - un pastor grande
  - un pastor magnífico
  lexicon: ποιμήν; μέγας
  rationale: “Gran” mantiene el valor de grandeza/impresión del original sin convertirlo en elogio moral; evita “magnífico”, que sería más interpretativo.
- source_word: ἀγριώδη τὴν ἰδέαν
  english_pob_choice: savage in appearance
  chosen_spanish: de aspecto salvaje
  alternatives_spanish:
  - de apariencia fiera
  - de aspecto feroz
  lexicon: ἀγριώδης; ἰδέα
  rationale: “Salvaje” reproduce la rudeza visual sugerida por el griego y por la versión inglesa, manteniendo el tono amenazante.
- source_word: λαιόν... ἐνδεδυμένον
  english_pob_choice: wearing a white goatskin
  chosen_spanish: vestido con una piel blanca de cabra
  alternatives_spanish:
  - cubierto con una piel blanca de cabra
  - llevando puesta una piel blanca de cabra
  lexicon: λαῖος / αἰγός; ἐνδύω
  rationale: “Piel blanca de cabra” refleja el contenido material sin suavizarlo a una prenda genérica; “vestido con” conserva la imagen visible.
- source_word: πήραν ἐπὶ τοῦ ὤμου
  english_pob_choice: he had a bag on his shoulders
  chosen_spanish: llevaba un saco sobre los hombros
  alternatives_spanish:
  - tenía una bolsa sobre los hombros
  - llevaba una mochila al hombro
  lexicon: πήρα; ὦμος
  rationale: “Saco” es suficientemente cercano a una bolsa/carga de pastor y conserva la rusticidad de la escena; “mochila” modernizaría demasiado.
- source_word: ῥάβδον... τραχεῖαν... κόμβοις
  english_pob_choice: a very hard staff with knots
  chosen_spanish: un bastón muy duro con nudos
  alternatives_spanish:
  - una vara muy áspera con nudos
  - un cayado muy duro con nudos
  lexicon: ῥάβδος; τραχύς; κόμβος
  rationale: “Bastón” comunica el objeto en español común; “muy duro” y “con nudos” preservan la rudeza física que la POB inglesa resaltó.
- source_word: μάστιγα μεγάλην
  english_pob_choice: a great whip
  chosen_spanish: un gran látigo
  alternatives_spanish:
  - un látigo grande
  - un látigo enorme
  lexicon: μάστιξ
  rationale: “Gran látigo” sigue de cerca el original y mantiene la fuerza visual sin inflarlo innecesariamente.
- source_word: σφόδρα δεινὴν τὴν ὄψιν
  english_pob_choice: He had a very harsh look
  chosen_spanish: Tenía un semblante muy severo
  alternatives_spanish:
  - Tenía un aspecto muy duro
  - Su mirada era muy terrible
  lexicon: δεινός; ὄψις
  rationale: “Severo” expresa dureza y severidad de rostro sin caer en “terrible”, que en español puede sonar más a emoción que a apariencia.
- source_word: φοβηθῆναί με αὐτόν
  english_pob_choice: so that I was afraid of him
  chosen_spanish: tanto que tuve miedo de él
  alternatives_spanish:
  - de modo que le tuve miedo
  - hasta el punto de que me dio miedo
  lexicon: φοβέομαι
  rationale: Reproduce la relación causal y el miedo personal de forma idiomática en español.
- source_word: τοιαύτη αὐτοῦ ἦν ἡ ὄψις
  english_pob_choice: —such was his look
  chosen_spanish: tal era su aspecto
  alternatives_spanish:
  - así era su aspecto
  - tal era su semblante
  lexicon: ὄψις; τοιοῦτος
  rationale: Mantiene la clausula enfática final del griego y de la POB inglesa, reforzando la impresión visual.
theological_decisions:
- issue: Descripción ominosa de la figura pastoral
  english_pob_reading: a great shepherd, savage in appearance
  chosen_spanish_reading: un gran pastor, de aspecto salvaje
  alternative_spanish_readings:
  - un gran pastor, de apariencia feroz
  - un pastor enorme y salvaje en su aspecto
  rationale: No se suaviza ni se moraliza la imagen; se conserva la ambigüedad/amenaza narrativa del texto de Hermas sin identificarla teológicamente más allá de la descripción.
  doctrine_reference: Hermas, Similitude 6; lectura narrativa sin dogmatización
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete auditado. La redacción española sigue el texto griego normalizado y la decisión óptima de la POB inglesa, sin introducir variantes textuales no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene 'pastor' para ποιμήν en coherencia con el título y la imaginería de la obra.
  - Se usa 'látigo' para μάστιξ y 'bastón' para ῥάβδος, distinguiendo claramente ambos objetos.
  - Se conserva el tono descriptivo y repetitivo del original, sin embellecer la escena.
