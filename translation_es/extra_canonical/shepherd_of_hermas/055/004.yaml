base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/055/004.yaml
  text: 6. This shepherd, then, took over the sheep from the shepherd who was a young man—those that were living wastefully and self-indulgently, but not skipping—and he cast them into a certain steep, thorny place full of thistles, so that, because of the thorns and thistles, the sheep were unable to disentangle themselves, but [were entangled in the thorns and thistles; these, then,] being entangled, grazed among the thorns and thistles. They suffered greatly, being torn by him; he drove them here and there and gave them no rest, and those sheep were not at all steady.
translation:
  language: es
  text: 6. Entonces este pastor tomó a las ovejas del pastor que era un hombre joven —las que vivían disolutamente y entregadas a los placeres, pero sin apartarse—, y las arrojó a un cierto lugar escarpado y lleno de espinos, repleto de cardos, de modo que, por causa de los espinos y de los cardos, las ovejas no podían desenredarse[a]; más bien, estando enredadas, pacían entre los espinos y los cardos. Sufrían mucho, siendo desgarradas por él; las empujaba de un lado a otro y no les daba descanso, y aquellas ovejas no estaban en absoluto firmes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Desenredarse» mantiene la imagen concreta del griego: las ovejas quedan atrapadas físicamente en los espinos y los cardos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ποιμὴν οὗτος / this shepherd
  english_pob_choice: this shepherd
  chosen_spanish: este pastor
  alternatives_spanish:
  - ese pastor
  - aquel pastor
  lexicon: ποιμήν
  rationale: «Pastor» conserva el oficio-imagen del texto; «este» reproduce la proximidad discursiva del griego y del inglés POB sin introducir una identificación más fuerte de la que el contexto da.
- source_word: τοῦ ποιμένος τοῦ νεανίου / the shepherd who was a young man
  english_pob_choice: the shepherd who was a young man
  chosen_spanish: el pastor que era un hombre joven
  alternatives_spanish:
  - el pastor joven
  - el pastor que era joven
  lexicon: ποιμήν
  rationale: Se mantiene la relación descriptiva sin convertirla en apodo. «Hombre joven» sigue de cerca el valor del inglés POB y evita una posible ambigüedad si solo se dijera «joven».
- source_word: ζῶντες ἀσώτως καὶ φιληδόνως
  english_pob_choice: living wastefully and self-indulgently
  chosen_spanish: vivían disolutamente y entregadas a los placeres
  alternatives_spanish:
  - vivían despilfarradamente y autoindulgentemente
  - vivían licenciosamente y amantes de los placeres
  lexicon: ἀσώτως / φιληδόνως
  rationale: «Disolutamente» y «entregadas a los placeres» conservan la idea moral de derroche/vida desordenada y búsqueda del placer. Se evita un calco menos natural como «autoindulgentemente».
- source_word: μὴ ἀπολιπόντες / but not skipping
  english_pob_choice: but not skipping
  chosen_spanish: pero sin apartarse
  alternatives_spanish:
  - pero sin faltar
  - pero no omitiendo nada
  lexicon: ἀπολείπω
  rationale: La frase inglesa es oscura y probablemente refleja una lectura de que, aunque vivían desordenadamente, no se habían «apartado» del todo. «Sin apartarse» comunica esa tensión sin forzar un sentido técnico inseguro.
- source_word: τόπον τραχὺν καὶ ἀκανθώδη
  english_pob_choice: a certain steep, thorny place
  chosen_spanish: un cierto lugar escarpado y lleno de espinos
  alternatives_spanish:
  - un lugar escarpado y espinoso
  - un sitio abrupto y lleno de espinas
  lexicon: τραχύς / ἀκανθώδης
  rationale: «Escarpado» traduce la aspereza del terreno y «lleno de espinos» mantiene la imagen física. Se conserva «cierto» para el matiz indefinido del original.
- source_word: γεμοντα τριβόλων / full of thistles
  english_pob_choice: full of thistles
  chosen_spanish: repleto de cardos
  alternatives_spanish:
  - lleno de cardos
  - repleto de espinas
  lexicon: τρίβολος
  rationale: «Cardos» refleja mejor la maleza espinosa evocada por el griego y complementa «espinos» sin repetir exactamente el mismo término castellano.
- source_word: οὐκ ἠδυνήθησαν διακριθῆναι / unable to disentangle themselves
  english_pob_choice: unable to disentangle themselves
  chosen_spanish: no podían desenredarse
  alternatives_spanish:
  - no podían soltarse
  - no podían liberarse
  lexicon: διακρίνω
  rationale: «Desenredarse» expresa la imagen corporal de quedar atrapadas en espinas y cardos, que es más concreta que «liberarse» y más natural que un calco abstracto.
- source_word: ἐμπλεκόμεναι / being entangled
  english_pob_choice: being entangled
  chosen_spanish: estando enredadas
  alternatives_spanish:
  - al quedar enredadas
  - mientras estaban enredadas
  lexicon: ἐμπλέκω
  rationale: Se conserva el estado resultante y la continuidad con «desenredarse», reforzando la coherencia imagética del pasaje.
- source_word: βοσκόμεναι
  english_pob_choice: grazed
  chosen_spanish: pacían
  alternatives_spanish:
  - pastaban
  - comían
  lexicon: βόσκω
  rationale: '«Pacían» es el verbo pastoril más preciso y mantiene el contraste irónico: en vez de pastar en buen pasto, lo hacen entre espinos y cardos.'
- source_word: ὑπ᾽ αὐτοῦ ἐκακώθησαν / They suffered greatly, being torn by him
  english_pob_choice: They suffered greatly, being torn by him
  chosen_spanish: Sufrían mucho, siendo desgarradas por él
  alternatives_spanish:
  - Padecían mucho, siendo rasgadas por él
  - Sufrieron mucho, siendo heridas por él
  lexicon: κακόω
  rationale: «Desgarradas» reproduce la violencia física y verbaliza el daño causado por el pastor; se mantiene el sujeto/agente «por él».
- source_word: ἤλασεν ἄνω καὶ κάτω / he drove them here and there
  english_pob_choice: he drove them here and there
  chosen_spanish: las empujaba de un lado a otro
  alternatives_spanish:
  - las conducía de aquí para allá
  - las arriaba de un lado a otro
  lexicon: ἐλαύνω
  rationale: «Empujaba de un lado a otro» es idiomático y conserva la idea de movimiento forzado sin introducir un tecnicismo ganadero innecesario.
- source_word: οὐδὲν ἡσύχιον παρεῖχεν / gave them no rest
  english_pob_choice: gave them no rest
  chosen_spanish: no les daba descanso
  alternatives_spanish:
  - no les concedía reposo
  - no las dejaba en paz
  lexicon: ἡσύχιος
  rationale: «Descanso» comunica la ausencia de alivio continua y suena natural en español bíblico contemporáneo.
- source_word: οὐδὲν ἑδραῖαι
  english_pob_choice: not at all steady
  chosen_spanish: no estaban en absoluto firmes
  alternatives_spanish:
  - no estaban nada firmes
  - de ningún modo estaban firmes
  lexicon: ἑδραῖος
  rationale: «Firmes» traslada el sentido de estabilidad y permanencia. «En absoluto» refuerza el negativo intensivo del griego.
theological_decisions:
- issue: Caracterización moral de las ovejas antes del castigo
  english_pob_reading: living wastefully and self-indulgently, but not skipping
  chosen_spanish_reading: vivían disolutamente y entregadas a los placeres, pero sin apartarse
  alternative_spanish_readings:
  - vivían despilfarradamente y autoindulgentemente, pero sin omitir nada
  - vivían licenciosamente y amantes de los placeres, pero no abandonadas
  rationale: La frase inglesa conserva una tensión interpretativa en «but not skipping». En español se preserva como una cláusula cauta («pero sin apartarse») para no borrar la ambigüedad de la fuente y, al mismo tiempo, mantener coherencia moral con el pasaje.
  doctrine_reference: Tensión moral/ascética del texto patrístico, sin doctrinalizar más allá de la escena alegórica.
- issue: Fuerza de la metáfora de atrapamiento y daño
  english_pob_reading: unable to disentangle themselves ... being entangled ... suffered greatly, being torn by him
  chosen_spanish_reading: no podían desenredarse ... estando enredadas ... Sufrían mucho, siendo desgarradas por él
  alternative_spanish_readings:
  - no podían liberarse ... al quedar atrapadas ... padecían mucho, siendo heridas por él
  rationale: 'Se conserva el doble movimiento: imposibilidad de salir y daño activo infligido por el pastor. No se suaviza la imagen, porque la violencia alegórica es parte del sentido del pasaje.'
  doctrine_reference: Alegoría pastoral de disciplina y daño; no se introduce lectura soteriológica adicional.
translation_notes:
  revision_awareness: No constan revisiones previas ni notas de aparato en el paquete en inglés. La redacción española se construyó directamente desde el griego normalizado, usando el inglés POB solo como control de decisiones semánticas y de tono.
  spanish_consistency_notes:
  - Se mantuvo «pastor» de forma uniforme para ποιμήν, evitando alternar con «guía» o «cuidado» que diluirían la imagen.
  - 'Se conservó la secuencia de imágenes de atrapamiento con un par léxico coherente: «espinos / cardos» y «desenredarse / enredadas».'
  - Se evitó «SEÑOR» y otras sustituciones teológicas ajenas, porque el pasaje no contiene el Tetragrámaton ni una cita directa relevante.
  - El registro es literario y sobrio, adecuado para una publicación bíblica patrística en español.
