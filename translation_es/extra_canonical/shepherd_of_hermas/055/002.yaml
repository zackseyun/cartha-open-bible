review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB inglés: contrasta ovejas entregadas a lujos y engaños pero no blasfemas, todavía con esperanza de arrepentimiento, frente a la muerte con destrucción eterna. Sin embargo, hay un punto importante de fidelidad idiomática y semántica: «han sido corrompidas apartándose de la verdad» introduce una matización reflexiva/participial no necesaria y menos directa que el inglés auditado «have been corrupted from the truth». Conviene una formulación más cercana al valor de alejamiento desde la verdad sin sugerir acción propia adicional.'
  spanish_quality_summary: El texto es claro y digno, pero «viste, no saltando» suena algo trabado en español, y «han sido corrompidas apartándose de la verdad» resulta poco natural. Una leve pulida mejora la legibilidad sin perder precisión. El resto del pasaje fluye bien y mantiene el tono eclesial moderno.
  glossary_alignment: No hay conflictos mayores con la terminología del proyecto. «Señor» para κύριος es aceptable aquí porque no hay evidencia de que funcione como sustituto del nombre divino Yahvé en este pasaje extracanónico. «Arrepentimiento», «corrupción», «renovación» y «destrucción eterna» concuerdan con las decisiones auditadas.
  issues:
  - severity: medium
    issue: «han sido corrompidas apartándose de la verdad» es semántica e idiomáticamente débil
    rationale: La frase española sugiere que ellas mismas se apartan en el acto de ser corrompidas, mientras que el sentido auditado es más bien que han sido corrompidas con respecto a/desde la verdad. «se han corrompido, apartándose de la verdad» también sería posible, pero cambiaría la voz. Una solución más fiel y natural es «han sido corrompidas, alejándose de la verdad» o mejor «se han corrompido, apartándose de la verdad» según el griego; dado el rastro inglés, conviene mantener la pasiva de resultado con una expresión de alejamiento más limpia.
  - severity: low
    issue: «Las ovejas que viste, no saltando sino pastando...» suena forzado
    rationale: 'En español narrativo es más natural «que viste no saltando, sino pastando» o «que viste: no estaban saltando, sino pastando». Es una mejora estilística menor, no un error de sentido.'
  revised_spanish_text: «Las ovejas que viste no saltando, sino pastando en un mismo lugar, son las que se entregaron a los lujos y a los engaños, y sin embargo no blasfemaron en absoluto contra el Señor. Estas, pues, han sido corrompidas al apartarse de la verdad; en ellas hay esperanza de arrepentimiento, por la cual pueden vivir. Así pues, la corrupción tiene esperanza de cierta renovación, pero la muerte tiene destrucción eterna.»
  revision_rationale: Se ajustó la puntuación inicial para una lectura más natural en español y se reformuló la cláusula sobre la corrupción y la verdad para expresar mejor el alejamiento implicado sin añadir una interpretación más fuerte que la atestiguada. También se simplificó «una cierta renovación» a «cierta renovación», más idiomático en español y equivalente en sentido.
