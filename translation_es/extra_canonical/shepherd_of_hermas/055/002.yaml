  yaml_path: translation/extra_canonical/shepherd_of_hermas/055/002.yaml
  text: “Those sheep you saw not skipping but grazing in one place—these are the ones who have handed themselves over to luxuries and deceptions, yet they have not blasphemed the Lord at all. These, then, have been corrupted from the truth; in them there is hope of repentance, by which they can live. Corruption, then, has hope of a certain renewal, but death has eternal destruction.”
translation:
  language: es
  text: «Las ovejas que viste no saltando, sino pastando en un mismo lugar, son las que se entregaron a los lujos y a los engaños, y sin embargo no blasfemaron en absoluto contra el Señor. Estas, pues, han sido corrompidas al apartarse de la verdad; en ellas hay esperanza de arrepentimiento, por la cual pueden vivir. Así pues, la corrupción tiene esperanza de cierta renovación, pero la muerte tiene destrucción eterna.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πρόβατα
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - corderos
  - ganado ovino
  lexicon: —
  rationale: El referente animal es directo y natural en español; ‘ovejas’ mantiene la imagen pastoral sin añadir matices no presentes en el griego.
- source_word: τρυφῇ καὶ ἀπάτῃ
  english_pob_choice: luxuries and deceptions
  chosen_spanish: los lujos y a los engaños
  alternatives_spanish:
  - los placeres y los engaños
  - las comodidades y los engaños
  lexicon: —
  rationale: ‘τρυφή’ expresa vida de lujo/abundancia sensual, y la POB inglesa eligió ‘luxuries’; ‘lujos’ conserva ese valor. ‘ἀπάτη’ es ‘engaño’, pluralizado en español para reflejar la acumulación de prácticas engañosas.
- source_word: ὅλως
  english_pob_choice: at all
  chosen_spanish: en absoluto
  alternatives_spanish:
  - de ningún modo
  - para nada
  lexicon: —
  rationale: Equivale bien al refuerzo negativo del griego y mantiene el tono enfático de la POB inglesa.
- source_word: ἀπὸ τῆς ἀληθείας
  english_pob_choice: from the truth
  chosen_spanish: apartándose de la verdad
  alternatives_spanish:
  - de la verdad
  - separándose de la verdad
  lexicon: —
  rationale: El griego con ἀπό expresa alejamiento/origen. ‘Apartándose de la verdad’ comunica la desviación sin volverlo más interpretativo que la fuente.
- source_word: μετάνοια
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - cambio de mente
  - conversión
  lexicon: —
  rationale: En este contexto la POB inglesa tomó la lectura moral/soteriológica habitual; ‘arrepentimiento’ es la forma más clara y fiel en español.
- source_word: ζήσεως
  english_pob_choice: they can live
  chosen_spanish: pueden vivir
  alternatives_spanish:
  - pueden seguir viviendo
  - pueden vivir de nuevo
  lexicon: —
  rationale: La construcción final expresa capacidad de vida resultante de la esperanza de arrepentimiento; ‘pueden vivir’ reproduce la brevedad del original sin añadir ‘de nuevo’.
- source_word: φθορᾶς
  english_pob_choice: Corruption
  chosen_spanish: la corrupción
  alternatives_spanish:
  - la ruina
  - la descomposición
  lexicon: —
  rationale: ‘Corrupción’ es el equivalente directo y conserva el contraste semántico con ‘vida’ y ‘muerte’.
- source_word: ἀνανέωσις
  english_pob_choice: renewal
  chosen_spanish: renovación
  alternatives_spanish:
  - reanudación
  - nuevo comienzo
  lexicon: —
  rationale: ‘Renovación’ es el sustantivo español más natural para ἀνανέωσις y preserva la idea de restauración.
- source_word: θάνατος
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: —
  rationale: Se mantiene el término directo y el artículo para conservar el paralelismo con ‘la corrupción’.
- source_word: ἀπώλεια αἰώνιος
  english_pob_choice: eternal destruction
  chosen_spanish: destrucción eterna
  alternatives_spanish:
  - perdición eterna
  - ruina eterna
  lexicon: —
  rationale: ‘Destrucción eterna’ reproduce el vínculo entre pérdida total y duración perpetua que la POB inglesa quiso conservar; ‘perdición’ podría sonar más doctrinalmente cargado en español.
theological_decisions:
- issue: Esperanza de arrepentimiento para los corrompidos frente a destrucción eterna para la muerte
  english_pob_reading: in them there is hope of repentance ... Corruption, then, has hope of a certain renewal, but death has eternal destruction.
  chosen_spanish_reading: en ellas hay esperanza de arrepentimiento ... la corrupción tiene esperanza de una cierta renovación, pero la muerte tiene destrucción eterna
  alternative_spanish_readings:
  - en ellas hay esperanza de conversión ...
  - la corrupción tiene esperanza de restauración ...
  rationale: Se conserva la distinción del texto entre un estado corrupto todavía recuperable y la muerte como estado sin remedio. ‘Arrepentimiento’ y ‘renovación’ mantienen la tensión original sin suavizarla.
  doctrine_reference: Perseverancia, arrepentimiento y juicio final en la tradición cristiana primitiva; la distinción entre disciplina remedial y condena irreversible.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; se ha seguido el sentido auditado de la POB inglesa y el griego subyacente sin introducir variantes textuales no atestiguadas.
  spanish_consistency_notes:
  - Se mantuvo ‘Señor’ para κυρίος en este texto, ya que el contexto griego cita título divino y la tradición de la obra usa el referente reverencial; no se aplica aquí la sustitución de Yahvé porque el pasaje griego no contiene el tetragrama.
  - Se conservó el paralelismo retórico entre ‘corrupción’ y ‘muerte’ para que el cierre tenga el mismo contraste teológico que el texto fuente.
  - Se evitó ‘siervos’/‘siervo’ porque el pasaje no contiene δοῦλος ni un campo semántico servil.
