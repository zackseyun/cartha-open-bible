revisions:
- from: «Las ovejas que viste, no saltando sino pastando en un mismo lugar, son las que se entregaron a los lujos y a los engaños, y sin embargo no blasfemaron en absoluto contra el Señor. Estas, pues, han sido corrompidas apartándose de la verdad; en ellas hay esperanza de arrepentimiento, por la cual pueden vivir. Así pues, la corrupción tiene esperanza de una cierta renovación, pero la muerte tiene destrucción eterna.»
  to: «Las ovejas que viste no saltando, sino pastando en un mismo lugar, son las que se entregaron a los lujos y a los engaños, y sin embargo no blasfemaron en absoluto contra el Señor. Estas, pues, han sido corrompidas al apartarse de la verdad; en ellas hay esperanza de arrepentimiento, por la cual pueden vivir. Así pues, la corrupción tiene esperanza de cierta renovación, pero la muerte tiene destrucción eterna.»
  rationale: Se ajustó la puntuación inicial para una lectura más natural en español y se reformuló la cláusula sobre la corrupción y la verdad para expresar mejor el alejamiento implicado sin añadir una interpretación más fuerte que la atestiguada. También se simplificó «una cierta renovación» a «cierta renovación», más idiomático en español y equivalente en sentido.
