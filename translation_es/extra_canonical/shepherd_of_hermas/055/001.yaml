  text: And he says to me, “Do you see this shepherd?” “I do,” I say, “sir.”
translation:
  language: es
  text: 'Y él me dice: «¿Ves a este pastor?». «Sí, lo veo», digo yo, «señor».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ λέγει μοι
  english_pob_choice: And he says to me
  chosen_spanish: Y él me dice
  alternatives_spanish:
  - Y me dice
  - Y dijo a mí
  lexicon: καὶ + λέγω + dativo
  rationale: Conserva la secuencia narrativa inmediata en presente histórico, como en el inglés POB, y evita una construcción más rígida o arcaica en español.
- source_word: βλέπεις τοῦτον τὸν ποιμένα
  english_pob_choice: Do you see this shepherd?
  chosen_spanish: ¿Ves a este pastor?
  alternatives_spanish:
  - ¿Ves este pastor?
  - ¿Miras a este pastor?
  lexicon: βλέπω + τὸν ποιμένα
  rationale: «Ves» comunica la percepción visual directa. Se añade la a personal con persona referida por el sustantivo «pastor»; «pastor» sigue al inglés POB y al griego literal, sin sustituirlo por una paráfrasis interpretativa.
- source_word: ναί
  english_pob_choice: I do
  chosen_spanish: Sí, lo veo
  alternatives_spanish:
  - Sí
  - Así es, lo veo
  lexicon: ναί
  rationale: En español, «Sí, lo veo» mantiene la respuesta elíptica y explícita a la vez, evitando una réplica demasiado desnuda que sonaría incompleta en prosa publicada.
- source_word: κύριε
  english_pob_choice: sir
  chosen_spanish: señor
  alternatives_spanish:
  - señor mío
  - maestro
  lexicon: κύριος
  rationale: Aquí κύριε funciona como tratamiento respetuoso y no como referencia al nombre divino. «Señor» es el equivalente natural en español, y se conserva la ambigüedad de cortesía del original sin teologizarla.
theological_decisions:
- issue: Tratamiento de κύριε como cortesía humana, no como título divino
  english_pob_reading: sir
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - Señor
  rationale: El contexto inmediato muestra un vocativo de cortesía en diálogo. En español, «señor» reproduce esa función social; no se introduce «Yahvé» ni una lectura cristológica que el pasaje no exige.
  doctrine_reference: Uso pragmático del vocativo en discurso narrativo; no implica identificación con el nombre divino.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete; el español se basa directamente en el griego normalizado y en la lectura inglesa auditada, manteniendo la misma segmentación breve en diálogo.
  spanish_consistency_notes:
  - Se mantiene el tiempo verbal de presente narrativo para reflejar el estilo del inglés POB y la vivacidad del diálogo.
  - No se añadió nota de pie porque no hay variantes textuales o tensiones léxicas que requieran explicación adicional en este versículo breve.
  - «Pastor» se conserva como traducción directa de ποιμένα, sin capitalización teológica añadida.
