  text: And after I rose from prayer, I see before me the elderly woman whom I had also seen last year, walking and reading a little book. And she says to me, “Are you able to report these things to the elect of God?” I say to her, “Lady, I am not able to remember so many things; but give me the little book, so that I may copy it.” “Take it,” she says, “and you will give it back to me.”
translation:
  language: es
  text: 'Y después de que me levanté de la oración, vi delante de mí a la anciana que también había visto el año pasado, caminando y leyendo un librito. Y me dice: «¿Puedes comunicar estas cosas a los escogidos de Dios?». Yo le digo: «Señora, no soy capaz de recordar tantas cosas; pero dame el librito, para que pueda copiarlo». «Tómalo», dice ella, «y me lo devolverás».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γερουσία / anciana (elderly woman)
  english_pob_choice: the elderly woman
  chosen_spanish: la anciana
  alternatives_spanish:
  - la mujer de edad avanzada
  - la señora mayor
  lexicon: γέρων / γέραιρα
  rationale: La fuente describe a una mujer de edad avanzada; «la anciana» reproduce la referencia de edad con naturalidad y sin añadir connotación eclesiástica. Se evita «señora» como equivalente principal porque en español puede sonar más cortesano que descriptivo.
- source_word: βιβλαρίδιον / little book
  english_pob_choice: a little book
  chosen_spanish: un librito
  alternatives_spanish:
  - un pequeño libro
  - un librito pequeño
  lexicon: βιβλαρίδιον
  rationale: «Librito» conserva el diminutivo de objeto físico pequeño y resulta idiomático en español. Se mantiene el matiz de tamaño, no de importancia.
- source_word: δυνασαι / are you able
  english_pob_choice: Are you able
  chosen_spanish: ¿Eres capaz de... ?
  alternatives_spanish:
  - ¿Puedes... ?
  - ¿Tienes la capacidad de... ?
  lexicon: δύναμαι
  rationale: «Ser capaz de» expresa la capacidad solicitada con un registro claro y fiel. «Puedes» sería más breve, pero «ser capaz» deja explícita la cuestión de aptitud que plantea el griego y el inglés POB.
- source_word: ἀπαγγεῖλαι / report, tell, communicate
  english_pob_choice: report
  chosen_spanish: comunicar
  alternatives_spanish:
  - relatar
  - informar
  - dar a conocer
  lexicon: ἀπαγγέλλω
  rationale: «Comunicar» preserva la idea de transmitir el contenido recibido sin forzar un matiz administrativo de «informar» ni un tono más narrativo de «relatar». En este contexto funciona como equivalente sobrio de «report».
- source_word: ἐκλεκτοῖς τοῦ θεοῦ / elect of God
  english_pob_choice: the elect of God
  chosen_spanish: los escogidos de Dios
  alternatives_spanish:
  - los elegidos de Dios
  - los electos de Dios
  lexicon: ἐκλεκτός
  rationale: Se elige «escogidos» porque es claro, bíblico y menos técnico que «electos», sin perder la idea de elección divina. Se conserva «de Dios» por el genitivo del original.
- source_word: μνημονεύω / remember
  english_pob_choice: remember
  chosen_spanish: recordar
  alternatives_spanish:
  - acordarme de
  - memorizar
  lexicon: μνημονεύω
  rationale: «Recordar» expresa la dificultad de retener en la memoria. «Acordarme de» sería más coloquial y menos apto en un diálogo de este registro.
- source_word: ἀντιγράφω / copy it
  english_pob_choice: copy it
  chosen_spanish: lo copie
  alternatives_spanish:
  - lo transcriba
  - haga una copia
  lexicon: ἀντιγράφω
  rationale: «Copiar» es la equivalencia más directa y transparente para reproducir por escrito. «Transcribir» sería correcto, pero introduce un matiz más técnico que no exige el pasaje.
- source_word: ἀποδοῦναί μοι / you will give it back to me
  english_pob_choice: you will give it back to me
  chosen_spanish: me lo devolverás
  alternatives_spanish:
  - me lo darás de vuelta
  - me lo regresarás
  lexicon: ἀποδίδωμι
  rationale: «Devolver» es el equivalente natural en español para la idea de retornar el objeto al poseedor original. Mantiene la promesa implícita sin redundancia.
theological_decisions:
- issue: Identidad y tratamiento de la mujer anciana
  english_pob_reading: the elderly woman whom I had also seen last year
  chosen_spanish_reading: la anciana que también había visto el año pasado
  alternative_spanish_readings:
  - la mujer anciana que también había visto el año pasado
  - la vieja mujer que también había visto el año pasado
  rationale: No hay indicio de un título eclesiástico; la descripción es simplemente de una mujer de edad avanzada. «Anciana» mantiene neutralidad y evita dureza o ambigüedad despectiva.
  doctrine_reference: Narrative description; no doctrinal claim
translation_notes:
  revision_awareness: La versión inglesa POB presenta acuerdo alto con el texto fuente y no registra notas ni revisiones aplicadas; por eso el español sigue de cerca su estructura sintáctica sin añadir explicaciones interpretativas innecesarias.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en el proyecto, pero aquí no aparece el nombre divino en el texto base; por tanto no se aplica.
  - «Escogidos de Dios» conserva la terminología de elección sin sustituirla por un vocabulario eclesiástico más tardío.
  - Se conserva el tono narrativo directo con diálogo breve y puntuación clara, adecuado para publicación.
  - No se introducen notas al pie porque el pasaje no presenta variantes textuales o alternativas lexicales que requieran anclaje en el texto principal.
