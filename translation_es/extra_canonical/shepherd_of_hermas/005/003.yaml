revisions:
- from: 'Y después que me levanté de la oración, vi delante de mí a la anciana que también había visto el año pasado, caminando y leyendo un librito. Y me dice: «¿Eres capaz de comunicar estas cosas a los escogidos de Dios?» Yo le digo: «Señora, no soy capaz de recordar tantas cosas; pero dame el librito, para que yo lo copie». «Tómalo», dice ella, «y me lo devolverás».'
  to: 'Y después de que me levanté de la oración, vi delante de mí a la anciana que también había visto el año pasado, caminando y leyendo un librito. Y me dice: «¿Puedes comunicar estas cosas a los escogidos de Dios?». Yo le digo: «Señora, no soy capaz de recordar tantas cosas; pero dame el librito, para que pueda copiarlo». «Tómalo», dice ella, «y me lo devolverás».'
  rationale: 'La revisión no cambia el contenido, sino que pule tres puntos de naturalidad y estilo en español general: se corrige «después que» a «después de que», se simplifica la pregunta a «¿Puedes comunicar...?» y se mejora la finalidad con «para que pueda copiarlo». Se conservan las decisiones léxicas principales («la anciana», «librito», «los escogidos de Dios», «me lo devolverás») por ser fieles y claras.'
