  text: As I was going to Cumae at the same season as the year before, while walking I recalled last year’s vision, and again the Spirit lifts me up and carries me away to the same place as the year before.
translation:
  language: es
  text: Cuando iba a Cumas en la misma época del año pasado, mientras caminaba recordé la visión del año pasado, y de nuevo el Espíritu me levanta y me lleva al mismo lugar que el año pasado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ βαδίζων εἰς Κύμας
  english_pob_choice: As I was going to Cumae ... while walking
  chosen_spanish: Cuando iba a Cumas ... mientras caminaba
  alternatives_spanish:
  - Al ir a Cumas ... mientras iba caminando
  - Mientras me dirigía a Cumas ... al caminar
  lexicon: Κύμαι / Cumae
  rationale: Conservo el topónimo clásico 'Cumas' y la idea procesual de movimiento con un gerundio o cláusula temporal natural en español. 'Mientras caminaba' refleja el participio de manera idiomática sin sobrecargar la sintaxis.
- source_word: κατὰ τὸν αὐτὸν καιρὸν τοῦ ἐνιαυτοῦ πέρυσιν
  english_pob_choice: at the same season as the year before
  chosen_spanish: en la misma estación del año anterior
  alternatives_spanish:
  - en la misma época del año pasado
  - en la misma temporada del año anterior
  lexicon: καιρός / ἐνιαυτός
  rationale: '''Estación'' comunica bien la idea de periodo estacional y mantiene la repetición temporal del griego; ''año anterior'' reproduce el contraste explícito con ''el año pasado/anterior''.'
- source_word: ἀνεμνήσθην τῆς ὄψεως τῆς πρὸς τὸν ἐνιαυτὸν τὸν πρότερον
  english_pob_choice: I recalled last year’s vision
  chosen_spanish: recordé la visión del año pasado
  alternatives_spanish:
  - recordé la visión del año anterior
  - volví a traer a la memoria la visión del año pasado
  lexicon: ἀναμιμνῄσκομαι
  rationale: '''Recordé'' expresa la rememoración directa y natural; ''visión del año pasado'' conserva la referencia temporal asociada a la visión sin añadir matices no presentes.'
- source_word: πάλιν τὸ πνεῦμα με λαβὼν ἀνέφερεν
  english_pob_choice: again the Spirit lifts me up and carries me away
  chosen_spanish: de nuevo el Espíritu me levanta y me lleva
  alternatives_spanish:
  - otra vez el Espíritu me alza y me transporta
  - de nuevo el Espíritu me toma y me conduce
  lexicon: πνεῦμα
  rationale: Se conserva 'Espíritu' con mayúscula por el contexto visionario y porque la acción es atribuida al agente espiritual. 'Me levanta y me lleva' sigue de cerca el doble verbo griego sin exagerar el componente extático.
- source_word: εἰς τὸν αὐτὸν τόπον
  english_pob_choice: to the same place
  chosen_spanish: al mismo lugar
  alternatives_spanish:
  - al mismo sitio
  - a ese mismo lugar
  lexicon: τόπος
  rationale: '''Lugar'' es la equivalencia más natural y fiel en español para τόπος en este contexto narrativo.'
theological_decisions:
- issue: Agencia del Espíritu en la experiencia visionaria
  english_pob_reading: again the Spirit lifts me up and carries me away
  chosen_spanish_reading: de nuevo el Espíritu me levanta y me lleva
  alternative_spanish_readings:
  - de nuevo el Espíritu me alza y me transporta
  - otra vez el Espíritu me toma y me conduce
  rationale: Mantengo la atribución explícita al Espíritu como agente de la visión, sin suavizarla a una experiencia interior vaga. El español conserva la intensidad narrativa del griego y del POB inglés.
  doctrine_reference: Pneumatología narrativa en literatura cristiana primitiva; no se requiere una armonización doctrinal adicional.
translation_notes:
  revision_awareness: La revisión cruzada indica alta concordancia (0.92) con solo cuestiones menores. No se registraron revisiones aplicadas; por tanto, el borrador sigue de cerca el testimonio griego normalizado y el sentido ya establecido en la traducción inglesa POB.
  spanish_consistency_notes:
  - Se usa 'Espíritu' con mayúscula por el contexto de acción personal y visionaria.
  - Se conserva el topónimo 'Cumas' como forma castellana estándar para Cumae.
  - Se evita 'SEÑOR' porque el pasaje no contiene κύριος ni un aludido directo al nombre divino.
  - '''Año anterior'' y ''año pasado'' se alternan de manera controlada para reflejar la repetición temporal sin sonoridad torpe.'
