revisions:
- from: Cuando iba a Cumas en la misma estación del año anterior, mientras caminaba recordé la visión del año pasado, y de nuevo el Espíritu me levanta y me lleva al mismo lugar que el año anterior.
  to: Cuando iba a Cumas en la misma época del año pasado, mientras caminaba recordé la visión del año pasado, y de nuevo el Espíritu me levanta y me lleva al mismo lugar que el año pasado.
  rationale: Se ajusta la expresión temporal para que suene natural en español y se aclara la comparación final sin alterar el sentido del griego ni del POB inglés. No hacen falta notas, porque el cambio es estilístico y de precisión sintáctica, no de ambigüedad textual.
