  yaml_path: translation/extra_canonical/shepherd_of_hermas/005/002.yaml
  text: So, having come to the place, I knelt and began to pray to the Lord and to glorify his name, because he had deemed me worthy and had made known to me my former sins.
translation:
  language: es
  text: Así que, al llegar al lugar, me arrodillé y comencé a orar al Señor y a glorificar su nombre, porque me había juzgado digno y me había dado a conocer cuáles habían sido mis pecados anteriores.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προσεύχεσθαι / ἐδόξαζον
  english_pob_choice: to pray ... and to glorify his name
  chosen_spanish: orar ... y glorificar su nombre
  alternatives_spanish:
  - rezar ... y glorificar su nombre
  - orar ... y alabar su nombre
  lexicon: προσεύχομαι; δοξάζω
  rationale: «Orar» comunica bien el acto de dirigirse a Dios en español contemporáneo y mantiene el paralelismo con «glorificar». «Glorificar su nombre» conserva la construcción del POB inglés sin volverla más litúrgica de lo que exige el griego.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dueño
  lexicon: κύριος
  rationale: Aquí el griego usa κύριος como designación reverente de Dios; el POB inglés lo vierte como «the Lord». En español, «el Señor» es la forma natural y fiel para este contexto de oración, sin necesidad de explicitar Yahvé en el texto principal.
- source_word: ἠξίωσέν με
  english_pob_choice: had deemed me worthy
  chosen_spanish: me había juzgado digno
  alternatives_spanish:
  - me había considerado digno
  - me había hecho digno
  lexicon: ἀξιόω
  rationale: «Juzgado digno» conserva el juicio evaluativo implícito en ἀξιόω y el sentido del inglés POB. «Hacer digno» sería más interpretativo; «considerar digno» suaviza algo la fuerza evaluativa.
- source_word: τὰ πρὸ ἁμαρτήματα μου
  english_pob_choice: my former sins
  chosen_spanish: mis pecados anteriores
  alternatives_spanish:
  - mis pecados de antes
  - mis pecados pasados
  lexicon: ἁμάρτημα
  rationale: «Pecados anteriores» reproduce con claridad la idea temporal del original y del POB. «Anteriores» evita una paráfrasis excesiva y mantiene el tono sobrio del pasaje.
theological_decisions:
- issue: Designación de Dios en la oración
  english_pob_reading: prayed to the Lord
  chosen_spanish_reading: oré al Señor
  alternative_spanish_readings:
  - oré a Yahvé
  - oré al Dueño
  rationale: El contexto de oración personal en este pasaje favorece la forma reverente y natural «el Señor» en español. Aunque el proyecto prefiere «Yahvé» para יהוה, aquí no hay un nombre divino hebreo en el texto fuente; κύριος funciona como título reverente y el español idiomático mantiene esa referencia sin forzar una equivalencia técnica.
  doctrine_reference: Cristología y lenguaje reverente de la Septuaginta / cristiano primitivo
- issue: Reconocimiento de mérito y revelación de pecado
  english_pob_reading: had deemed me worthy and had made known to me my former sins
  chosen_spanish_reading: me había juzgado digno y me había dado a conocer mis pecados anteriores
  alternative_spanish_readings:
  - me había considerado digno y me había mostrado mis pecados anteriores
  - me había hecho digno y me había revelado mis pecados anteriores
  rationale: 'La frase conserva dos acciones distintas: una valoración positiva del sujeto y una revelación de su estado pecaminoso. «Juzgado digno» y «dado a conocer» mantienen esa tensión sin suavizarla ni convertirla en una sola idea devocional.'
  doctrine_reference: Gracia, arrepentimiento y reconocimiento del pecado
translation_notes:
  revision_awareness: La versión inglesa POB ya fue revisada y cuenta con alto acuerdo (0.97) sin observaciones; no se introducen cambios textuales sustantivos, sino una traslación española fiel al original griego y coherente con la decisión inglesa de conservar la secuencia narrativa y la doble idea de dignificación y revelación de pecado.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y narrativo del segmento.
  - «Señor» se usa como título reverente contextual, no como sustituto de un nombre divino hebreo.
  - No se introduce «Cristo» ni terminología eclesiástica ajena al pasaje.
  - 'La sintaxis española conserva la acumulación de participios/acciones del original: llegar, arrodillarse, orar, glorificar, ser tenido por digno, y recibir conocimiento de los pecados.'
