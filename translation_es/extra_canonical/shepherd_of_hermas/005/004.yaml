  text: So I took it, and withdrawing to a certain place in the field, I copied it all letter by letter, for I could not make out the syllables. And when I had finished the letters of the book, suddenly the little book was snatched from my hand; but by whom I did not see.
translation:
  language: es
  text: Entonces lo tomé, y me retiré a cierto lugar del campo, y lo copié todo letra por letra, porque no podía distinguir las sílabas. Y cuando terminé de escribir las letras del libro, de pronto el librito fue arrebatado de mi mano; pero no vi por quién fue.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: I took it
  english_pob_choice: I took it
  chosen_spanish: lo tomé
  alternatives_spanish:
  - lo recibí
  - lo agarré
  lexicon: λαμβάνω
  rationale: Tomé expresa la recepción y el acto de tomar el objeto con naturalidad en español, sin añadir matices de posesión o violencia que el contexto no exige.
- source_word: withdrawing to a certain place in the field
  english_pob_choice: withdrawing to a certain place in the field
  chosen_spanish: me retiré a cierto lugar del campo
  alternatives_spanish:
  - me aparté a un sitio del campo
  - me fui a un lugar apartado del campo
  lexicon: ἀναχωρέω / ἀγρός
  rationale: Me retiré conserva el movimiento de apartarse para escribir; cierto lugar del campo mantiene la indefinición del original y el orden natural del español.
- source_word: copied it all letter by letter
  english_pob_choice: copied it all letter by letter
  chosen_spanish: lo copié todo letra por letra
  alternatives_spanish:
  - lo transcribí todo letra por letra
  - lo escribí todo letra a letra
  lexicon: ἀντιγράφω
  rationale: Copiar es la forma más directa y legible en español para la acción de transcribir un texto; letra por letra conserva la insistencia en la reproducción exacta.
- source_word: I could not make out the syllables
  english_pob_choice: I could not make out the syllables
  chosen_spanish: porque no podía distinguir las sílabas
  alternatives_spanish:
  - porque no podía descifrar las sílabas
  - porque no lograba distinguir las sílabas
  lexicon: συλλαβή
  rationale: Distinguir comunica bien la incapacidad de percibir con claridad la secuencia sonora o gráfica a la que alude el griego, sin sobreinterpretar como 'descifrar'.
- source_word: when I had finished the letters of the book
  english_pob_choice: when I had finished the letters of the book
  chosen_spanish: cuando terminé de escribir las letras del libro
  alternatives_spanish:
  - cuando hube terminado las letras del libro
  - cuando acabé las letras del libro
  lexicon: γράμματα
  rationale: Escribir las letras del libro refleja que la tarea consistía en reproducir sus letras; terminar de escribir fluye mejor en español que una calca más rígida.
- source_word: the little book was snatched from my hand
  english_pob_choice: the little book was snatched from my hand
  chosen_spanish: el librito fue arrebatado de mi mano
  alternatives_spanish:
  - el librito me fue arrebatado de la mano
  - el librito fue quitado de mi mano
  lexicon: βιβλαρίδιον / ἁρπάζω
  rationale: Librito traduce el diminutivo con un matiz natural; fue arrebatado conserva la brusquedad y pasividad del original mejor que una opción más débil como 'quitado'.
- source_word: but by whom I did not see
  english_pob_choice: but by whom I did not see
  chosen_spanish: pero no vi quién lo hizo
  alternatives_spanish:
  - pero no vi quién fue
  - pero no vi por quién
  lexicon: οὐκ εἶδον τίς
  rationale: No vi quién lo hizo expresa de manera idiomática la ignorancia del agente, manteniendo la oscuridad del pasaje sin añadir información.
theological_decisions:
- issue: The agent who snatches the book remains unidentified
  english_pob_reading: but by whom I did not see
  chosen_spanish_reading: pero no vi quién lo hizo
  alternative_spanish_readings:
  - pero no vi quién fue
  - pero no vi por quién
  rationale: La traducción conserva la indefinición del agente sin intentar identificarlo. El texto solo afirma que no lo vio.
  doctrine_reference: Narrative ambiguity; no doctrinal inference warranted
