review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro inglés: mantiene la secuencia narrativa, la ambigüedad de «cierto hombre», la apariencia gloriosa, la vestimenta pastoral, la piel blanca, la bolsa sobre los hombros, el bastón en la mano y el saludo recíproco. No hay desvíos teológicos ni omisiones sustanciales.'
  spanish_quality_summary: 'El español es claro y mayormente natural, pero tiene dos puntos mejorables: «y sentado sobre el diván» queda gramaticalmente incompleto tras «después de haber»; conviene coordinar con infinitivo compuesto/paralelo («y haberme sentado»). Además, «bolso» suena demasiado moderno y urbano para πήρα; «bolsa» o «alforja» encajan mejor en un contexto de pastor. También «diván» puede sonar algo marcado; «lecho» refleja mejor κλίνη en registro digno y no necesariamente funerario aquí.'
  glossary_alignment: No hay términos del glosario doctrinal principal en este pasaje. Las decisiones léxicas generales son fieles, pero se recomienda ajustar κλίνη a «lecho» y πήρα a «bolsa» para mayor precisión y tono literario-natural en español eclesial amplio.
  issues:
  - severity: medium
    issue: Construcción verbal desigual en la apertura
    rationale: «Después de haber orado en la casa y sentado sobre el diván» mezcla «haber orado» con un participio/adjetivo («sentado») y suena incompleto. El griego presenta dos acciones previas coordinadas; en español conviene «después de haber orado... y haberme sentado...».
  - severity: medium
    issue: «Bolso» para πήρα
    rationale: «Bolso» suele evocar un accesorio moderno o urbano. πήρα es una bolsa/zurrón de viaje o pastoril; «bolsa» es más neutro y fiel sin sobreespecificar tanto como «alforja».
  - severity: low
    issue: «Diván» puede sonar demasiado específico o moderno
    rationale: Aunque posible, «diván» introduce una imagen más contemporánea y particular. «Lecho» mantiene la dignidad del registro y se acerca mejor a κλίνη como mueble de reposo.
  revised_spanish_text: Después de haber orado en la casa y haberme sentado sobre el lecho, entró cierto hombre, glorioso en apariencia, vestido como pastor, con una piel blanca, y llevando una bolsa sobre los hombros y un bastón en la mano. Y me saludó, y yo le devolví el saludo.
  revision_rationale: 'Se ajusta la sintaxis inicial para un español correcto y paralelo, y se afinan dos elecciones léxicas para reflejar mejor el contexto y el registro del original: «lecho» por κλίνη y «bolsa» por πήρα. El resto del borrador preserva bien el sentido y la ambigüedad narrativa del texto fuente.'
