base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/025/001.yaml
  text: After I had prayed in the house and sat down on the couch, a certain man entered, glorious in appearance, in shepherd’s attire, wearing a white skin, and having a bag on his shoulders and a staff in his hand. And he greeted me, and I returned his greeting.
translation:
  language: es
  text: Después de haber orado en la casa y haberme sentado sobre el lecho, entró cierto hombre, glorioso en apariencia, vestido como pastor, con una piel blanca, y llevando una bolsa sobre los hombros y un bastón en la mano. Y me saludó, y yo le devolví el saludo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠράμην προσευξάμενος ἐν τῷ οἴκῳ καὶ καθίσας ἐπὶ τῆς κλίνης
  english_pob_choice: After I had prayed in the house and sat down on the couch
  chosen_spanish: Después de haber orado en la casa y sentado sobre el diván
  alternatives_spanish:
  - Después de haber orado en la casa y sentado en el sofá
  - Después de haber orado en la casa y recostado en el lecho
  lexicon: προσεύχομαι; καθίζω; κλίνη
  rationale: «Orado» conserva el acto de oración sin añadir matices; «diván» transmite el mueble de reposo/sentada de manera natural en español y mantiene la imagen doméstica de κλίνη mejor que un «sofá» moderno o «lecho» demasiado marcado por contexto funerario o literario.
- source_word: ἀνήρ τις
  english_pob_choice: a certain man
  chosen_spanish: cierto hombre
  alternatives_spanish:
  - un hombre
  - un cierto hombre
  lexicon: ἀνήρ; τις
  rationale: «Cierto hombre» reproduce el indefinido con un matiz narrativo de παρουσία específica sin volverlo demasiado arcaico; evita sobreinterpretar identidad o estatus.
- source_word: ἐν στολῇ ποιμένος
  english_pob_choice: in shepherd’s attire
  chosen_spanish: vestido como pastor
  alternatives_spanish:
  - con atuendo de pastor
  - con ropas de pastor
  lexicon: στολή; ποιμήν
  rationale: El sintagma describe apariencia/vestimenta asociada al pastor; «vestido como pastor» es claro y natural. «Atuendo de pastor» sería más formal, pero menos fluido.
- source_word: δέρριν λευκὴν
  english_pob_choice: wearing a white skin
  chosen_spanish: con una piel blanca
  alternatives_spanish:
  - con una piel de color blanco
  - llevando una piel blanca
  lexicon: δέρρις
  rationale: Se conserva la literalidad básica de «piel» porque el texto describe una prenda/peña de piel; «blanca» mantiene el adjetivo del original. No se armoniza a «lana» ni a otra prenda no atestiguada aquí.
- source_word: πήραν ἐπὶ τοὺς ὤμους
  english_pob_choice: having a bag on his shoulders
  chosen_spanish: llevando un bolso sobre los hombros
  alternatives_spanish:
  - con una bolsa sobre los hombros
  - con alforja sobre los hombros
  lexicon: πήρα
  rationale: «Bolso» ofrece una equivalencia comprensible y neutra; «alforja» podría sugerir un instrumento más específico o rural, mientras que «bolsa» puede sonar demasiado general. Se mantiene el complemento locativo sobre los hombros.
- source_word: ῥάβδον ἐν τῇ χειρὶ αὐτοῦ
  english_pob_choice: and a staff in his hand
  chosen_spanish: y un bastón en la mano
  alternatives_spanish:
  - y una vara en la mano
  - y un cayado en la mano
  lexicon: ῥάβδος
  rationale: «Bastón» preserva la imagen de portación manual y resulta inteligible; «vara» puede sonar demasiado abstracta o disciplinaria, y «cayado» introduce una concreción pastoral más específica que no está explicitada por el griego.
- source_word: καὶ ἠσπάσατό με καὶ ἀντησπασάμην αὐτόν
  english_pob_choice: And he greeted me, and I returned his greeting
  chosen_spanish: Y me saludó, y yo le devolví el saludo
  alternatives_spanish:
  - Y me saludó, y yo le correspondí el saludo
  - Y me saludó, y yo también lo saludé
  lexicon: ἀσπάζομαι; ἀντασπάζομαι
  rationale: «Devolví el saludo» reproduce la reciprocidad del verbo compuesto y suena natural en español; evita la repetición torpe de «saludar» y conserva el intercambio cortés.
theological_decisions:
- issue: Identidad y simbolismo del personaje vestido como pastor
  english_pob_reading: a certain man, glorious in appearance, in shepherd’s attire
  chosen_spanish_reading: cierto hombre, glorioso en apariencia, vestido como pastor
  alternative_spanish_readings:
  - un hombre determinado, glorioso en apariencia, con atuendo de pastor
  - un varón, glorioso en apariencia, vestido de pastor
  rationale: No se explicita aquí identidad angelical o cristológica; la traducción conserva la ambigüedad narrativa del original y el valor simbólico de la imagen pastoral sin doctrinalizarla.
  doctrine_reference: Narrative ambiguity / christological-symbolic caution
- issue: ‘Piel blanca’ como detalle descriptivo
  english_pob_reading: wearing a white skin
  chosen_spanish_reading: con una piel blanca
  alternative_spanish_readings:
  - vestido con una piel blanca
  - llevando una piel blanca
  rationale: Se mantiene el detalle material sin reinterpretarlo alegóricamente. El texto ofrece rasgo visual, no una glosa doctrinal; la traducción evita sustituirlo por una prenda diferente o por una explicación simbólica.
  doctrine_reference: Textual descriptiveness / material imagery
translation_notes:
  revision_awareness: No applied revisions or cross-check corrections were supplied for this unit. The Spanish draft therefore follows the Greek source packet and the English POB wording closely, preserving narrative sequence, descriptive imagery, and reciprocal greeting without adding interpretive expansion.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' policy only when the source is the divine name; este pasaje no la requiere.
  - Se preserva el registro narrativo sobrio y la ambigüedad interpretativa del original.
  - Se evita 'señor' para no introducir una relación de título que el griego no expresa aquí.
