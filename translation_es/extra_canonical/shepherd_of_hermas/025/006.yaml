  text: 6. So I wrote the commandments and the parables, just as he commanded me.
translation:
  language: es
  text: 6. Así que escribí los mandamientos y las parábolas, tal como él me lo mandó.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐντολάς
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandatos
  - preceptos
  - ordenanzas
  lexicon: ἐντολή
  rationale: «Mandamientos» mantiene la fuerza normativa del término y coincide con el valor establecido en la tradición cristiana del vocabulario moral sin volverlo más técnico de lo que exige el contexto.
- source_word: παραβολάς
  english_pob_choice: parables
  chosen_spanish: parábolas
  alternatives_spanish:
  - comparaciones
  - similitudes
  - alegorías
  lexicon: παραβολή
  rationale: «Parábolas» es la correspondencia natural y transparente en español para el plural de παραβολή, y conserva el género literario sin añadir interpretación.
- source_word: ἐνετείλατο
  english_pob_choice: he commanded me
  chosen_spanish: me lo mandó
  alternatives_spanish:
  - me lo ordenó
  - me lo mandó hacer
  - me dio la orden
  lexicon: ἐντέλλομαι
  rationale: '«Mandó» reproduce bien la acción directiva personal del original; el añadido «lo» evita ambigüedad en español y retoma de forma natural el contenido ya mencionado: escribir los mandamientos y las parábolas.'
theological_decisions:
- issue: Autoridad de la instrucción recibida
  english_pob_reading: just as he commanded me
  chosen_spanish_reading: tal como él me lo mandó
  alternative_spanish_readings:
  - como él me ordenó
  - según me lo mandó
  rationale: La frase conserva la obediencia exacta del narrador sin intensificarla teológicamente. «Tal como» refleja la conformidad plena del acto de escribir con la instrucción recibida.
  doctrine_reference: Obediencia a la revelación/instrucción divina o mediada, sin expansión doctrinal adicional
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete de auditoría. La traducción sigue de cerca el texto griego disponible y armoniza con la versión inglesa POB, manteniendo el orden y la relación causal/consecutiva de la cláusula final.
  spanish_consistency_notes:
  - Se usa «mandamientos» en plural para mantener la correspondencia con ἐντολάς y con la formulación inglesa auditada.
  - Se conserva el pasado simple narrativo («escribí») para reproducir el valor de la narración concluida.
  - No se introducen notas al pie porque el segmento no presenta variantes textuales ni ambigüedades que el audit trail inglés haya documentado.
