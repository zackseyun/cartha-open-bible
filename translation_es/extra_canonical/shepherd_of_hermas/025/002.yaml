  text: 2. And immediately he sat beside me and says to me, “I have been sent by the most venerable angel, that I may dwell with you for the rest of the days of your life.”
translation:
  language: es
  text: '2. Y enseguida se sentó junto a mí y me dice: «He sido enviado por el ángel más venerable, para que habite contigo por el resto de los días de tu vida».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ εὐθέως
  english_pob_choice: And immediately
  chosen_spanish: Y enseguida
  alternatives_spanish:
  - Y de inmediato
  - Y al instante
  lexicon: εὐθέως
  rationale: En español, «enseguida» comunica la rapidez inmediata del griego sin sonar forzado; mantiene el tono narrativo fluido del texto.
- source_word: ἐκάθισεν παρ’ ἐμοὶ
  english_pob_choice: he sat beside me
  chosen_spanish: se sentó junto a mí
  alternatives_spanish:
  - se sentó a mi lado
  - se sentó cerca de mí
  lexicon: κάθημαι / παρά
  rationale: «Junto a mí» conserva la cercanía física de παρά con naturalidad en español y evita sobredeterminar la posición.
- source_word: καὶ λέγει μοι
  english_pob_choice: and says to me
  chosen_spanish: y me dice
  alternatives_spanish:
  - y me dijo
  - y me declaró
  lexicon: λέγω
  rationale: Se mantiene el presente histórico del relato, como en la traducción inglesa, para conservar vivacidad y continuidad narrativa.
- source_word: ἀπεστάλην
  english_pob_choice: I have been sent
  chosen_spanish: He sido enviado
  alternatives_spanish:
  - fui enviado
  - me han enviado
  lexicon: ἀποστέλλω
  rationale: La voz pasiva perfecta se refleja mejor con «he sido enviado», que expresa un envío ya realizado con relevancia presente.
- source_word: παρὰ τοῦ σεμνοτάτου ἀγγέλου
  english_pob_choice: by the most venerable angel
  chosen_spanish: por el ángel más venerable
  alternatives_spanish:
  - por el ángel más reverenciado
  - por el ángel sumamente venerable
  lexicon: σεμνότατος
  rationale: «Venerable» es un equivalente directo y sobrio para σεμνότατος; «más venerable» conserva el superlativo del griego sin añadir matices eclesiásticos ajenos.
- source_word: ἵνα συνοικήσω μετὰ σοῦ
  english_pob_choice: that I may dwell with you
  chosen_spanish: para que habite contigo
  alternatives_spanish:
  - para morar contigo
  - para vivir contigo
  lexicon: συνοικέω
  rationale: «Habite contigo» conserva el sentido de residencia compartida y la posible solemnidad del verbo sin perder inteligibilidad.
- source_word: ἕως τῶν λοιπῶν τῶν ἡμερῶν τῆς ζωῆς σου
  english_pob_choice: for the rest of the days of your life
  chosen_spanish: por el resto de los días de tu vida
  alternatives_spanish:
  - durante los días restantes de tu vida
  - hasta el fin de los días de tu vida
  lexicon: λοιπός / ζωή
  rationale: La fórmula española reproduce el valor temporal completo del griego y coincide con el registro narrativo del pasaje.
theological_decisions:
- issue: Identidad y rango del mensajero celeste
  english_pob_reading: the most venerable angel
  chosen_spanish_reading: el ángel más venerable
  alternative_spanish_readings:
  - el ángel sumamente venerable
  - el ángel más reverenciado
  rationale: No se introduce lenguaje doctrinal adicional; se conserva el superlativo que marca honor o dignidad del mensajero sin convertirlo en una categoría técnica ajena al texto.
  doctrine_reference: Angelología cristiana primitiva; respeto al mensajero celestial sin definición dogmática adicional.
translation_notes:
  revision_awareness: No se aplicaron revisiones previas en el paquete proporcionado. La redacción sigue directamente el griego normalizado y toma el inglés POB solo como control de sentido y registro.
  spanish_consistency_notes:
  - Se conserva el presente narrativo «me dice» para armonizar con el estilo del pasaje y con la traducción inglesa auditada.
  - Se usa «Yahvé» no aplica en este versículo; no hay nombres divinos en el texto.
  - Se evita «siervo» o «mensajero» porque el griego especifica explícitamente «ángel».
