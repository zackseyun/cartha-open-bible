revisions:
- from: '5. Pero él me respondió y dijo: «No te confundas, sino fortalécete en mis mandamientos, que estoy a punto de mandarte. Porque he sido enviado —dice— para mostrártelo de nuevo todo lo que viste antes, especialmente los puntos principales que te son provechosos. Primero de todo, escribe mis mandamientos y las parábolas; pero las demás cosas, según te las muestre, así las escribirás». Por esta razón, dice: «Te mando primero escribir los mandamientos y las parábolas, para que puedas leerlas fácilmente a mano y puedas guardarlas».'
  to: '5. Pero él me respondió y dijo: «No te confundas, sino fortalécete en mis mandamientos, que estoy a punto de mandarte. Porque he sido enviado —dice— para mostrarte de nuevo todo lo que viste antes, especialmente los puntos principales que te son provechosos. Primero de todo, escribe mis mandamientos y las parábolas; pero las demás cosas, según te las muestre, así las escribirás». Por esta razón, dice: «Te mando primero escribir los mandamientos y las parábolas, para que puedas leerlos fácilmente teniéndolos a mano y puedas guardarlos».'
  rationale: 'Se corrigen dos problemas de español que afectan la fidelidad y la legibilidad: se elimina el pronombre sobrante en «mostrarte de nuevo…», y se rehace la frase final para expresar con naturalidad el sentido de παρὰ χεῖρας («teniéndolos a mano»). Además, se ajusta la concordancia pronominal a masculino plural inclusivo («leerlos… guardarlos») para corresponder al referente conjunto «mandamientos y parábolas».'
