  yaml_path: translation/extra_canonical/shepherd_of_hermas/025/005.yaml
  text: 5. But he answered me and says, “Do not be confounded, but be strengthened in my commandments, which I am about to command you. For I have been sent,” he says, “that I may show you again all the things you saw before, especially the main points that are beneficial for you. First of all, write my commandments and the parables; but the other things, as I show you, so you will write.” For this reason, he says, “I command you first to write the commandments and parables, so that you may read them readily at hand and be able to keep them.”
translation:
  language: es
  text: '5. Pero él me respondió y dijo: «No te confundas, sino fortalécete en mis mandamientos, que estoy a punto de mandarte. Porque he sido enviado —dice— para mostrarte de nuevo todo lo que viste antes, especialmente los puntos principales que te son provechosos. Primero de todo, escribe mis mandamientos y las parábolas; pero las demás cosas, según te las muestre, así las escribirás». Por esta razón, dice: «Te mando primero escribir los mandamientos y las parábolas, para que puedas leerlos fácilmente teniéndolos a mano y puedas guardarlos».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μὴ ταράσσου
  english_pob_choice: Do not be confounded
  chosen_spanish: No te confundas
  alternatives_spanish:
  - No te turbes
  - No te desconciertes
  lexicon: ταράσσω
  rationale: El griego expresa la idea de ser perturbado, agitado o confundido. En español, «No te confundas» comunica bien la exhortación sin sonar arcaico; «No te turbes» mantiene un tono más solemne, pero puede sugerir un matiz emocional más fuerte que el contexto inmediato no exige.
- source_word: ἀλλὰ κράτει ἐν ταῖς ἐντολαῖς μου
  english_pob_choice: but be strengthened in my commandments
  chosen_spanish: sino fortalécete en mis mandamientos
  alternatives_spanish:
  - sino cobra ánimo en mis mandamientos
  - sino permanece firme en mis mandamientos
  lexicon: κρατέω
  rationale: El inglés POB interpretó el mandato como fortalecerse o sostenerse en los mandamientos. En español, «fortalécete» conserva esa idea de firmeza activa y evita suavizar el imperativo. «Permanece firme» es posible, pero pierde el matiz de ser fortalecido que el contexto sugiere.
- source_word: ἔπεμψα
  english_pob_choice: I have been sent
  chosen_spanish: he sido enviado
  alternatives_spanish:
  - fui enviado
  - he sido mandado
  lexicon: πέμπω
  rationale: La pasiva refleja el hecho de haber sido enviado. «He sido enviado» conserva el perfecto y el tono de misión presente en el contexto. «Fui enviado» sería más simple narrativamente, pero atenúa la relevancia actual del envío.
- source_word: τὰ πρῶτα πάντα ἃ εἶδες πρότερον
  english_pob_choice: all the things you saw before
  chosen_spanish: todo lo que viste antes
  alternatives_spanish:
  - todas las cosas que viste antes
  - todo cuanto viste antes
  lexicon: πᾶς
  rationale: La frase alude al conjunto de lo ya visto. «Todo lo que viste antes» es natural y suficientemente inclusivo. «Todo cuanto viste antes» es más literario; «todas las cosas» suena más pesado en español moderno.
- source_word: μάλιστα τὰ κεφάλαια τὰ ὠφέλιμά σοι
  english_pob_choice: especially the main points that are beneficial for you
  chosen_spanish: especialmente los puntos principales que te son provechosos
  alternatives_spanish:
  - especialmente los aspectos principales que te son útiles
  - sobre todo las cosas principales que te aprovechan
  lexicon: κεφάλαια
  rationale: El sustantivo puede significar encabezados, puntos principales o resúmenes. «Puntos principales» conserva la estructura conceptual del inglés POB y es claro en español. «Provechosos» mantiene el matiz de beneficio personal sin caer en un lenguaje demasiado coloquial.
- source_word: γράψον πρῶτον τὰς ἐντολὰς καὶ τὰς παραβολάς
  english_pob_choice: write my commandments and the parables
  chosen_spanish: escribe mis mandamientos y las parábolas
  alternatives_spanish:
  - escribe los mandamientos y las parábolas
  - anota mis mandamientos y las parábolas
  lexicon: ἐντολή
  rationale: Se conserva «mandamientos» porque el texto los presenta como las instrucciones autoritativas que deben quedar escritas. «Anota» sería demasiado débil; «preceptos» sería posible, pero menos directo y menos consistente con el registro del pasaje.
- source_word: ἵνα ἀναγινώσκων αὐτὰ εὐχερῶς ἔχῃς παρὰ χεῖρας
  english_pob_choice: so that you may read them readily at hand
  chosen_spanish: para que puedas leerlas fácilmente a mano
  alternatives_spanish:
  - para que puedas leerlas fácilmente a tu alcance
  - para que las tengas listas para leer
  lexicon: παρὰ χεῖρας
  rationale: La expresión idiomática significa «a mano», «a la mano», «al alcance». «Fácilmente a mano» reproduce esa idea de disponibilidad inmediata. «A tu alcance» es claro, pero pierde el color idiomático de la frase griega.
- source_word: καὶ φυλάττῃς αὐτά
  english_pob_choice: and be able to keep them
  chosen_spanish: y puedas guardarlas
  alternatives_spanish:
  - y puedas observarlas
  - y puedas cumplirlas
  lexicon: φυλάσσω
  rationale: Aquí el sentido es conservar/fidelizar/guardar en el sentido de observar obedientemente lo escrito. «Guardarlas» retiene esa amplitud semántica y permite una lectura obediente sin especificar más de lo que el texto exige. «Cumplirlas» interpreta la consecuencia práctica, pero estrecha el campo semántico.
theological_decisions:
- issue: Autoridad de las instrucciones y su relación con la obediencia
  english_pob_reading: my commandments
  chosen_spanish_reading: mis mandamientos
  alternative_spanish_readings:
  - mis preceptos
  - mis instrucciones
  rationale: El texto presenta las palabras recibidas como mandatos vinculantes. «Mandamientos» preserva la fuerza normativa que el pasaje atribuye al hablante. «Instrucciones» suavizaría demasiado la autoridad del lenguaje.
  doctrine_reference: Autoridad exhortativa del mensajero en la literatura cristiana primitiva; obediencia práctica a las palabras recibidas.
- issue: Finalidad pedagógica del envío
  english_pob_reading: that I may show you again all the things you saw before, especially the main points that are beneficial for you
  chosen_spanish_reading: para mostrártelo de nuevo todo lo que viste antes, especialmente los puntos principales que te son provechosos
  alternative_spanish_readings:
  - para volver a mostrarte todo lo que viste antes, sobre todo los puntos principales que te benefician
  rationale: La formulación conserva tanto la repetición didáctica como la selección de lo más útil para el destinatario. No se reduce a una simple recapitulación; hay una intención formativa explícita.
  doctrine_reference: Instrucción revelada con finalidad de edificación y perseverancia.
translation_notes:
  revision_awareness: Esta redacción sigue de cerca el inglés POB auditado, pero corrige la sintaxis para español natural y mantiene la distinción entre el envío del hablante y la función didáctica de repetir y seleccionar lo ya visto. No se introdujeron notas textuales porque el contexto provisto no registra variantes ni decisiones adicionales.
  spanish_consistency_notes:
  - Se mantiene «mandamientos» de forma uniforme para ἐντολαί.
  - Se conserva la pasiva «he sido enviado» para reflejar el estado de misión sin convertirlo en un simple pasado narrativo.
  - «Parábolas» se preserva como término técnico del corpus de Hermas, sin sustituirlo por «comparaciones» o «alegorías».
  - Se usa «a mano» para reflejar la idiomaticidad de παρὰ χεῖρας sin forzar una equivalencia demasiado literal.
