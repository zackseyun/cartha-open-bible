base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/025/007.yaml
  text: 7. If then, having heard them, you keep them and walk in them and do them with a pure heart, you will receive from the Lord what he promised you; but if, having heard, you do not repent, but still add to your sins, you will receive from the Lord the opposite things. The Shepherd, the angel of repentance, commanded me to write all these things in this way.
translation:
  language: es
  text: 7. Si, pues, al oírlos, los guardas, vives de acuerdo con ellos y los practicas con corazón puro, recibirás del Señor lo que te prometió; pero si, después de oírlos, no te arrepientes, sino que sigues añadiendo a tus pecados, recibirás del Señor lo contrario. El Pastor, el ángel del arrepentimiento, me mandó escribir todas estas cosas de esta manera.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ταῦτα / them / all these things
  english_pob_choice: them / all these things
  chosen_spanish: los / todas estas cosas
  alternatives_spanish:
  - estas cosas
  - ellas
  lexicon: pronombre demostrativo / pronombre átono de objeto directo
  rationale: El texto se refiere a los mandatos y contenidos recién oídos; «los» conserva la referencia directa y natural en español, y «todas estas cosas» refleja la clausura formal del mandato de escritura.
- source_word: φυλάσσω / keep
  english_pob_choice: keep
  chosen_spanish: los guardas
  alternatives_spanish:
  - los observas
  - los conservas
  lexicon: guardar, observar, conservar
  rationale: «Guardar» reproduce bien la idea de retener fielmente lo oído y obrar conforme a ello, sin perder el matiz de custodia obediente.
- source_word: περιπατέω / walk in
  english_pob_choice: walk in them
  chosen_spanish: caminas en ellos
  alternatives_spanish:
  - andas en ellos
  - vives en ellos
  lexicon: caminar, andar, vivir
  rationale: Se mantiene la metáfora moral de andar según preceptos. «Caminas en ellos» es transparente y suficientemente literal para el contexto exhortativo.
- source_word: ποιέω / do
  english_pob_choice: do them
  chosen_spanish: los practicas
  alternatives_spanish:
  - los haces
  - los cumples
  lexicon: practicar, hacer, cumplir
  rationale: En español, «practicar» expresa mejor la ejecución habitual de mandatos que un simple «hacer», sin exceder el sentido del original.
- source_word: καθαρὰ καρδία / pure heart
  english_pob_choice: pure heart
  chosen_spanish: corazón puro
  alternatives_spanish:
  - corazón limpio
  - corazón sincero
  lexicon: corazón puro / limpio
  rationale: Se conserva la formulación bíblica directa y solemne. «Corazón puro» refleja integridad interior y pureza moral.
- source_word: παρὰ τοῦ κυρίου / from the Lord
  english_pob_choice: from the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor Yahvé
  lexicon: Señor
  rationale: Aquí el texto griego usa κύριος en el contexto de recompensa y juicio; en español, «Señor» preserva la forma del título en la tradición del texto cristiano. No se sustituye por «Yahvé» porque el pasaje del padre apostólico no está citando explícitamente el tetragrámaton ni requiere esa identificación en la redacción castellana.
- source_word: μετανοέω / repent
  english_pob_choice: repent
  chosen_spanish: te arrepientes
  alternatives_spanish:
  - cambias de mente
  - haces penitencia
  lexicon: arrepentirse
  rationale: El contexto es de retorno moral y obediencia, no meramente de cambio cognitivo; «arrepentirse» comunica el giro ético y espiritual requerido.
- source_word: ἐπὶ ταῖς ἁμαρτίαις / add to your sins
  english_pob_choice: add to your sins
  chosen_spanish: sigues añadiendo a tus pecados
  alternatives_spanish:
  - añades pecados a tus pecados
  - incrementas tus pecados
  lexicon: añadir a los pecados
  rationale: La imagen acumulativa del griego se conserva con una construcción natural en español que expresa aumento continuado de culpa.
- source_word: ἄντικρυ / the opposite things
  english_pob_choice: the opposite things
  chosen_spanish: lo contrario
  alternatives_spanish:
  - las cosas contrarias
  - la contraparte opuesta
  lexicon: lo contrario
  rationale: La expresión inglesa ya refleja una formulación idiomática; en español «lo contrario» es la equivalencia más clara y natural para la retribución opuesta implícita.
- source_word: ὁ ποιμήν / the Shepherd
  english_pob_choice: The Shepherd
  chosen_spanish: El Pastor
  alternatives_spanish:
  - El Pastor divino
  - El que apacienta
  lexicon: pastor
  rationale: Se mantiene el título propio de la obra, ya establecido en español como «El Pastor». No se sustituye por otra perífrasis para conservar la identificación literaria.
- source_word: ὁ ἄγγελος τῆς μετανοίας / the angel of repentance
  english_pob_choice: the angel of repentance
  chosen_spanish: el ángel del arrepentimiento
  alternatives_spanish:
  - el ángel de la penitencia
  - el ángel de la conversión
  lexicon: ángel del arrepentimiento
  rationale: «Arrepentimiento» mantiene la correspondencia con μετανοία y evita cargar el término con una idea sacramental no presente en el griego.
theological_decisions:
- issue: Recompensa u opuesto según obediencia o persistencia en el pecado
  english_pob_reading: If ... you will receive from the Lord what he promised you; ... you will receive from the Lord the opposite things.
  chosen_spanish_reading: '... recibirás del Señor lo que te prometió; ... recibirás del Señor lo contrario.'
  alternative_spanish_readings:
  - recibirás del Señor lo prometido
  - recibirás del Señor cosas opuestas
  rationale: Se conserva la estructura condicional de recompensa y retribución opuesta sin suavizarla. La segunda cláusula mantiene el contraste moral fuerte del texto.
  doctrine_reference: Retribución moral; obediencia y arrepentimiento en la literatura patrística temprana.
- issue: Naturaleza del arrepentimiento
  english_pob_reading: do not repent
  chosen_spanish_reading: no te arrepientes
  alternative_spanish_readings:
  - no cambias de mente
  - no te conviertes
  rationale: El pasaje presupone una respuesta ética total, no sólo cognitiva. «Arrepentirse» es el término español más fiel al uso exhortativo del texto.
  doctrine_reference: Conversión, metanoia, disciplina penitencial en contexto patrístico temprano.
- issue: Identidad del 'Señor' en el marco del texto griego
  english_pob_reading: from the Lord
  chosen_spanish_reading: del Señor
  alternative_spanish_readings:
  - de Yahvé
  rationale: Aunque la política general del proyecto prefiere «Yahvé» para el nombre divino, aquí la fórmula funciona como título cristiano en una obra patrística y no hay una cita explícita del tetragrámaton. «Señor» evita introducir una identificación no marcada por el texto.
  doctrine_reference: Cristología y uso patrístico del título κύριος.
translation_notes:
  revision_awareness: No se registran revisiones previas en el paquete de fuente; la versión inglesa auditada presenta una sola redacción optimal-equivalence sin notas textuales añadidas. La redacción española sigue esa línea, manteniendo el paralelismo condicional, la clausula final de mandato de escritura y el contraste retributivo sin expandir el contenido.
  spanish_consistency_notes:
  - Se mantiene «El Pastor» como título de obra y personaje, conforme al uso ya fijado en español.
  - Se usa «arrepentimiento/arrepentirse» para μετανοία/μετανοέω, reservando otras equivalencias sólo cuando el contexto las exija.
  - Se conserva «Señor» para κύριος en esta obra patrística, por tratarse de una fórmula cristiana sin señal explícita del tetragrámaton en el pasaje.
  - 'La secuencia condicional se ha mantenido con sintaxis natural en español: «Si, pues...; pero si...» para reproducir el contraste del original.'
