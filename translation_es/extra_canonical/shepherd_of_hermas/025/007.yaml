  to: 7. Si, pues, al oírlos, los guardas, vives de acuerdo con ellos y los practicas con corazón puro, recibirás del Señor lo que te prometió; pero si, después de oírlos, no te arrepientes, sino que sigues añadiendo a tus pecados, recibirás del Señor lo contrario. El Pastor, el ángel del arrepentimiento, me mandó escribir todas estas cosas de esta manera.
