  yaml_path: translation/extra_canonical/shepherd_of_hermas/025/004.yaml
  text: 4. While he was still speaking, his appearance was changed, and I recognized him, that he was the one to whom I had been entrusted, and immediately I was confounded, and fear seized me, and I was completely crushed with grief, because I had answered him so wickedly and foolishly.
translation:
  language: es
  text: '4. Mientras él todavía hablaba, su apariencia cambió, y lo reconocí: que era aquel a cuyo cuidado yo había sido encomendado; e inmediatamente quedé consternado, y el temor se apoderó de mí, y quedé completamente abrumado por la tristeza, porque le había respondido de manera tan perversa e insensata.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: his appearance was changed
  english_pob_choice: his appearance was changed
  chosen_spanish: su apariencia fue cambiada
  alternatives_spanish:
  - cambió de apariencia
  - su aspecto cambió
  lexicon: μορφή / ὄψις (appearance, outward form)
  rationale: Conserva el pasivo del original y la observación de un cambio visible en la figura/apariencia, sin añadir interpretación. «Apariencia» funciona de modo claro y dignificado en español.
- source_word: I recognized him
  english_pob_choice: I recognized him
  chosen_spanish: lo reconocí
  alternatives_spanish:
  - lo identifiqué
  - me di cuenta de quién era
  lexicon: ἐπέγνων (recognize, know again)
  rationale: «Reconocí» reproduce el valor de conocer de nuevo a alguien ya visto, que es más exacto que una simple identificación abstracta.
- source_word: that he was the one to whom I had been entrusted
  english_pob_choice: that he was the one to whom I had been entrusted
  chosen_spanish: que era aquel a quien yo había sido encomendado
  alternatives_spanish:
  - que era el que me había sido confiado
  - que era aquel que me había recibido a mi cargo
  lexicon: παρατεθεὶς / παρατίθημι (entrust, place in charge of)
  rationale: «Encomendado» preserva la idea de ser puesto al cuidado o cargo de otro, sin suavizar la relación de autoridad/custodia. La voz pasiva en español mantiene la dependencia del sujeto respecto de quien encomendó.
- source_word: I was confounded
  english_pob_choice: I was confounded
  chosen_spanish: quedé confuso
  alternatives_spanish:
  - me quedé desconcertado
  - quedé turbado
  lexicon: κατεπλάγην / ἐξεπλήγην (be astonished, confounded)
  rationale: «Confuso» transmite el golpe mental y emocional del reconocimiento inesperado, aunque el término también puede sugerir desconcierto. Se conserva la impresión de quedar sobrecogido.
- source_word: fear seized me
  english_pob_choice: fear seized me
  chosen_spanish: el temor se apoderó de mí
  alternatives_spanish:
  - me invadió el temor
  - el miedo me sobrecogió
  lexicon: φόβος ἐπελάβετο (fear seized)
  rationale: La imagen de «apoderarse» reproduce la fuerza del verbo griego y del inglés auditado, sin reducirla a una emoción leve.
- source_word: I was completely crushed with grief
  english_pob_choice: I was completely crushed with grief
  chosen_spanish: quedé completamente abrumado por la tristeza
  alternatives_spanish:
  - quedé totalmente aplastado por el dolor
  - me vi del todo vencido por el duelo
  lexicon: συντρίβω / λύπη (crush, grief)
  rationale: «Abrumado» comunica la pasividad total y el peso emocional; «tristeza» es una opción sobria en español para λύπη, aunque mantiene menos la intensidad que «dolor» o «duelo». Se prefiere por claridad y naturalidad literaria.
- source_word: because I had answered him so wickedly and foolishly
  english_pob_choice: because I had answered him so wickedly and foolishly
  chosen_spanish: porque le había respondido de manera tan perversa e insensata
  alternatives_spanish:
  - porque le había contestado tan malvadamente y neciamente
  - porque le había respondido con tanta maldad y necedad
  lexicon: πονηρῶς καὶ ἀφρόνως (wickedly and foolishly)
  rationale: «Perversa» conserva el juicio moral fuerte de πονηρῶς; «insensata» traduce ἀφρόνως con un término natural en español que retiene la falta de juicio sin debilitarla.
theological_decisions:
- issue: Recognition of the messenger after his changed appearance
  english_pob_reading: I recognized him, that he was the one to whom I had been entrusted
  chosen_spanish_reading: 'lo reconocí: que era aquel a quien yo había sido encomendado'
  alternative_spanish_readings:
  - 'lo reconocí: era el que me había sido confiado'
  - 'lo reconocí: era aquel bajo cuya custodia yo estaba'
  rationale: El texto expresa un reconocimiento que desencadena conciencia de relación y responsabilidad, no una afirmación doctrinal adicional. La redacción mantiene la ambigüedad del vínculo de encomienda sin definir más de lo que el griego y el inglés auditado sostienen.
  doctrine_reference: Narrative anthropology / angelic-messenger context in Shepherd of Hermas
- issue: Emotional collapse in response to shame
  english_pob_reading: I was completely crushed with grief, because I had answered him so wickedly and foolishly
  chosen_spanish_reading: quedé completamente abrumado por la tristeza, porque le había respondido de manera tan perversa e insensata
  alternative_spanish_readings:
  - quedé aplastado por el dolor, porque le había respondido tan mal
  - me sentí del todo quebrantado por la pena, porque le había contestado con maldad y necedad
  rationale: No se convierte la reacción en mera tristeza moderada ni en una categoría moral abstracta. La frase conserva vergüenza, pesar y colapso afectivo como reacción a una respuesta culpable.
  doctrine_reference: Moral exhortation / repentance and humility in early Christian literature
translation_notes:
  revision_awareness: No applied revisions or cross-check flags are present in the audit context. The Spanish draft follows the English POB sense closely while checking against the Greek-style source semantics reflected in the audit packet.
  spanish_consistency_notes:
  - Mantengo «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece ningún nombre divino.
  - Conservo un tono sobrio y narrativo, evitando ornamentos devocionales ajenos al pasaje.
  - No introduzco términos eclesiásticos no presentes en el original; «encomendado» preserva la relación de custodia sin amplificación doctrinal.
