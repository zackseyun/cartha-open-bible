  text: 3. I thought that he had come to test me, and I say to him, “Who then are you? For I,” I say, “know the one to whom I was entrusted.” He says to me, “Do you not recognize me?” “No,” I say. “I,” he says, “am the Shepherd to whom you were entrusted.”
translation:
  language: es
  text: '3. Pensé que había venido a probarme, y le dije: «¿Quién eres entonces? Porque yo», le digo, «conozco a aquel a quien fui confiado». Él me dice: «¿No me reconoces?». «No», le digo. «Yo», dice, «soy el Pastor a quien fuiste confiado».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πειράσοντά με / probarme
  english_pob_choice: to test me
  chosen_spanish: probarme
  alternatives_spanish:
  - examinarme
  - ponerme a prueba
  lexicon: πειράζω
  rationale: «Probarme» mantiene el sentido de someter a una prueba o contraste, cercano al inglés POB «to test me», sin añadir la carga moral de tentación que no está en el pasaje.
- source_word: παρεδόθην / fue encomendado
  english_pob_choice: was entrusted
  chosen_spanish: fui encomendado
  alternatives_spanish:
  - me fue confiado
  - fui entregado
  lexicon: παραδίδωμι
  rationale: La encomendación expresa bien la transmisión bajo custodia y preserva la relación personal con el Pastor; «confiado» también sería posible, pero «encomendado» suena más cercano al registro del texto.
- source_word: ποιμήν
  english_pob_choice: the Shepherd
  chosen_spanish: el Pastor
  alternatives_spanish:
  - el que apacienta
  - el pastor
  lexicon: ποιμήν
  rationale: Se conserva el término titular y antropomórfico «Pastor», que en español funciona como nombre/figura reconocible y refleja la identificación revelada al final.
theological_decisions:
- issue: Identidad revelada del Pastor
  english_pob_reading: I am the Shepherd to whom you were entrusted.
  chosen_spanish_reading: Yo soy el Pastor a quien fuiste encomendado.
  alternative_spanish_readings:
  - Yo soy el Pastor que te fue confiado
  - Yo soy el Pastor a quien se te encomendó
  rationale: La formulación mantiene la autoidentificación directa y la idea de custodia/encargo sin suavizarla en una paráfrasis más interpretativa. No se introduce lenguaje doctrinal ajeno al relato.
  doctrine_reference: Christological/self-identification in apocryphal Christian narrative; no dogmatic expansion beyond the text.
translation_notes:
  revision_awareness: La versión inglesa POB ya ofrece una redacción optimizada y sin notas; el español sigue esa línea, conservando el intercambio vivo de discurso directo, el contraste entre no conocer/reconocer, y el valor relacional de παρεδόθην sin añadir explicaciones. No se registran revisiones textuales en el paquete provisto.
  spanish_consistency_notes:
  - Se mantiene «Pastor» con mayúscula en sentido titular, coherente con la autoidentificación final.
  - Se usa «reconocer» para ἐπιγινώσκω/γνωρίζω en un contexto de identificación personal, evitando «conocer» repetido de forma excesiva en español.
  - La puntuación conserva la alternancia de comillas y verbos de habla del original auditado.
