  text: I asked her, saying, “Lady, to what place in the field?” “Wherever you wish,” she says. I chose a good, secluded spot. But before I spoke to her and named the place, she says to me, “I will come there where you wish.”
translation:
  language: es
  text: 'Le pregunté, diciendo: «Señora, ¿en qué parte del campo?». «Dondequiera que quieras», me dice. Elegí un buen lugar, apartado. Pero antes de que le hablara y le nombrara el lugar, me dice: «Vendré allí, donde quieras».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Lady
  english_pob_choice: Lady
  chosen_spanish: Señora
  alternatives_spanish:
  - Dama
  - Señora mía
  lexicon: standard Spanish honorific
  rationale: El inglés POB conserva el tratamiento respetuoso sin explicitar un título teológico; «Señora» reproduce la cortesía y la distancia reverencial en español con naturalidad.
- source_word: to what place in the field
  english_pob_choice: to what place in the field
  chosen_spanish: ¿a qué lugar del campo?
  alternatives_spanish:
  - ¿en qué parte del campo?
  - ¿a qué sitio del campo?
  lexicon: lugar / campo
  rationale: «Lugar del campo» sigue de cerca el valor locativo del griego y del inglés, manteniendo la imagen espacial sin añadir matices no presentes en el texto.
- source_word: Wherever you wish
  english_pob_choice: Wherever you wish
  chosen_spanish: Dondequiera que quieras
  alternatives_spanish:
  - Donde tú quieras
  - Adonde quieras
  lexicon: indefinite spatial phrase
  rationale: «Dondequiera que quieras» conserva el alcance abierto de la respuesta; «adonde» o una simplificación a «donde tú quieras» serían posibles, pero esta forma mantiene mejor la amplitud del original.
- source_word: a good, secluded spot
  english_pob_choice: a good, secluded spot
  chosen_spanish: un lugar bueno y apartado
  alternatives_spanish:
  - un sitio bueno y apartado
  - un lugar agradable y retirado
  lexicon: adjective pair for place
  rationale: «Apartado» expresa la idea de retiro/seclusión sin cargar el pasaje con una interpretación moral. «Bueno» se mantiene por fidelidad a la valoración simple del texto.
- source_word: before I spoke to her and named the place
  english_pob_choice: before I spoke to her and named the place
  chosen_spanish: antes de que yo le hablara y le nombrara el lugar
  alternatives_spanish:
  - antes de hablarle y de nombrarle el lugar
  - antes de que le hablara y designara el lugar
  lexicon: speech and naming
  rationale: 'Se conserva la doble acción verbal del original: hablar y nombrar el sitio. «Nombrara el lugar» es más literal y transparente que «designara».'
- source_word: I will come there where you wish
  english_pob_choice: I will come there where you wish
  chosen_spanish: Allí iré, donde tú quieras
  alternatives_spanish:
  - Iré allí, donde tú quieras
  - Allí vendré, donde tú quieras
  lexicon: deictic motion
  rationale: «Iré» reproduce el movimiento hacia el lugar indicado; «allí» conserva la referencia deíctica previa. «Vendré» sería posible, pero «iré» sigue mejor la orientación del hablante en español.
theological_decisions:
- issue: Treatment of the feminine address to the visionary figure
  english_pob_reading: The English keeps 'Lady' as a respectful address without doctrinal expansion.
  chosen_spanish_reading: «Señora» como tratamiento respetuoso, sin convertirlo en título doctrinal.
  alternative_spanish_readings:
  - «Dama»
  - «Señora mía»
  rationale: El pasaje no exige una lectura mariológica ni una identificación doctrinal; la traducción debe conservar el tono reverente y narrativo tal como está, sin sobredeterminación.
  doctrine_reference: Honorific address in narrative dialogue; no doctrinal claim implied
