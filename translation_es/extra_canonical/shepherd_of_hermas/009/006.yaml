base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/009/006.yaml
  text: And she came with six young men—whom I had seen also before—and she stood by me and listened while I was praying and confessing my sins to the Lord. And touching me she says, “Hermas, stop asking everything about your sins; ask also about righteousness, so that you may receive some share of it for your household.”
translation:
  language: es
  text: 'Y ella vino con seis jóvenes —a quienes yo también había visto antes— y se puso junto a mí y escuchó mientras yo oraba y confesaba mis pecados al Señor. Y, tocándome, me dice: «Hermas, deja ya de preguntar siempre acerca de tus pecados; pregunta también por la justicia, para que recibas alguna parte de ella para tu casa».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ ἦλθεν μετὰ τῶν ἕξ νεανίσκων
  english_pob_choice: And she came with six young men
  chosen_spanish: Y ella vino con seis jóvenes
  alternatives_spanish:
  - Y vino con seis jóvenes
  - Y ella llegó con seis jóvenes
  lexicon: νεανίσκος
  rationale: ‘jóvenes’ comunica el valor básico de νεανίσκοι sin añadir matices no presentes. ‘Vino’ mantiene la secuencia narrativa directa; ‘llegó’ es posible, pero ‘vino’ conserva mejor el movimiento hacia el hablante.
- source_word: οὓς εἶδον καὶ πρότερον
  english_pob_choice: whom I had seen also before
  chosen_spanish: a quienes yo también había visto antes
  alternatives_spanish:
  - a quienes también había visto antes
  - a los cuales yo había visto antes
  lexicon: ὁράω
  rationale: Se conserva el carácter relacional del relativo y el aspecto de anterioridad con ‘había visto antes’. ‘También’ corresponde al καί de refuerzo inclusivo.
- source_word: καὶ ἔστη παρ᾽ ἐμοὶ καὶ ἤκουε
  english_pob_choice: and she stood by me and listened
  chosen_spanish: y se puso junto a mí y escuchó
  alternatives_spanish:
  - y estuvo junto a mí y escuchó
  - y se quedó junto a mí escuchando
  lexicon: ἵστημι / ἀκούω
  rationale: ‘Se puso junto a mí’ refleja el gesto de colocarse al lado; ‘escuchó’ evita ampliar innecesariamente la acción con una perífrasis más interpretativa.
- source_word: προσευχομένου μου καὶ ἐξαγορεύοντος τὰ ἁμαρτήματά μου τῷ κυρίῳ
  english_pob_choice: while I was praying and confessing my sins to the Lord
  chosen_spanish: mientras yo oraba y confesaba mis pecados al Señor
  alternatives_spanish:
  - mientras oraba y declaraba mis pecados al Señor
  - mientras estaba orando y confesando mis pecados al Señor
  lexicon: προσεύχομαι / ἐξαγορεύω / ἁμαρτήματα / κύριος
  rationale: ‘Oraba’ es una equivalencia natural y fiel. ‘Confesaba mis pecados’ preserva el sentido explícito de reconocerlos ante el Señor. Se mantiene ‘Señor’ porque el audit trail inglés así lo hace; en un contexto cristiano griego, κύριος aquí funciona como tratamiento reverente para Dios, sin necesidad de sustituirlo por Yahvé en el texto principal de esta unidad.
- source_word: καὶ ἁψαμένη μου λέγει
  english_pob_choice: And touching me she says
  chosen_spanish: Y, tocándome, me dice
  alternatives_spanish:
  - Y, al tocarme, me dice
  - Y me toca y dice
  lexicon: ἅπτομαι / λέγω
  rationale: La construcción participial se vierte de manera natural como ‘tocándome’. ‘Me dice’ conserva el presente narrativo del griego y del inglés POB.
- source_word: Ἅρμα, ἄφες πειρωτῶν πάντα περὶ τῶν ἁμαρτιῶν σου
  english_pob_choice: Hermas, stop asking everything about your sins
  chosen_spanish: Hermas, deja de preguntar por completo acerca de tus pecados
  alternatives_spanish:
  - Hermas, deja de indagar totalmente sobre tus pecados
  - Hermas, deja de preguntar todo acerca de tus pecados
  lexicon: ἄφες / πειράω / ἁμαρτίαι
  rationale: El griego transmite una orden de cesar esa línea de búsqueda; ‘deja de preguntar por completo’ conserva la fuerza totalizante de πάντα sin sonar torpe. ‘Acerca de tus pecados’ explicita el complemento y evita una calca poco idiomática.
- source_word: ἀλλὰ καὶ περὶ δικαιοσύνης
  english_pob_choice: ask also about righteousness
  chosen_spanish: pregunta también por la justicia
  alternatives_spanish:
  - pregunta también por la rectitud
  - pregunta además por la justicia
  lexicon: δικαιοσύνη
  rationale: ‘Justicia’ es la equivalencia más directa y mantiene el contraste temático con ‘pecados’. ‘Rectitud’ es posible, pero pierde más fácilmente el peso forense/covenantal que δικαιοσύνη puede tener aquí.
- source_word: ἵνα καὶ λαβῇς μέρος τι αὐτῆς
  english_pob_choice: so that you may receive some share of it
  chosen_spanish: para que recibas alguna parte de ella
  alternatives_spanish:
  - para que recibas una parte de ella
  - a fin de que recibas algo de ella
  lexicon: μέρος / λαμβάνω
  rationale: ‘Alguna parte de ella’ reproduce el indefinido τι y mantiene la referencia a una participación parcial, no total. ‘Recibas’ sigue el subjuntivo final natural en español.
- source_word: πρὸς τὸν οἶκόν σου
  english_pob_choice: for your household
  chosen_spanish: para tu casa
  alternatives_spanish:
  - para tu hogar
  - para tu familia
  lexicon: οἶκος
  rationale: ‘Casa’ es la forma breve y fiel a οἶκος, que en este contexto puede incluir el ámbito doméstico/familiar. ‘Hogar’ suaviza demasiado; ‘familia’ explicita más de lo que el término griego exige.
theological_decisions:
- issue: Confesión de pecados ante el Señor
  english_pob_reading: confessing my sins to the Lord
  chosen_spanish_reading: confesaba mis pecados al Señor
  alternative_spanish_readings:
  - confesaba mis pecados ante el Señor
  - reconocía mis pecados al Señor
  rationale: Se conserva la dimensión de confesión directa y personal, sin convertirla en una formulación sacramental o litúrgica no exigida por el texto. ‘Al Señor’ mantiene la referencia de κύριος como destinatario de la confesión.
  doctrine_reference: Piedad y confesión personal; no se introduce doctrina sacramental ajena al pasaje.
- issue: Justicia como objeto de búsqueda espiritual
  english_pob_reading: ask also about righteousness
  chosen_spanish_reading: pregunta también por la justicia
  alternative_spanish_readings:
  - pregunta también por la rectitud
  - pregunta también acerca de la justicia
  rationale: El pasaje contrapone la preocupación por los pecados con la búsqueda de δικαιοσύνη. ‘Justicia’ preserva mejor el valor moral y relacional del término y su posible trasfondo de conducta recta delante de Dios.
  doctrine_reference: δικαιοσύνη como justicia/rectitud delante de Dios; exhortación ética.
translation_notes:
  revision_awareness: La traducción sigue de cerca la lectura inglesa aprobada por el audit trail, sin necesitar ajustes textuales adicionales; la revisión marcada como high_agreement confirma una correspondencia estable con el griego normalizado.
  spanish_consistency_notes:
  - Se mantiene el tratamiento narrativo en tercera persona singular femenino para la figura que se acerca.
  - Se conserva el presente narrativo en ‘me dice’ para reflejar la vivacidad del original y del inglés POB.
  - ‘Señor’ se mantiene como traducción reverente de κύριος en esta unidad, sin sustituirlo por Yahvé porque el contexto inmediato no documenta una cita explícita del nombre divino.
  - No se introducen notas al pie porque el pasaje no presenta variantes o ambigüedades textuales relevantes en el audit trail proporcionado.
