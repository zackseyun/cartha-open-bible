review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el audit trail inglés en la secuencia narrativa, la confesión de pecados al Señor, la exhortación a pedir por la justicia y la finalidad para la casa. Sin embargo, una frase clave no preserva bien el sentido de πάντα en ἄφες πειρωτῶν πάντα περὶ τῶν ἁμαρτιῶν σου: «deja de preguntar por completo acerca de tus pecados» suena a dejar de preguntar completamente, no a dejar de preguntar siempre/solo sobre ese tema. También hay una puntuación poco natural alrededor de la raya.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «deja de preguntar por completo acerca de tus pecados» resulta poco idiomático y semánticamente equívoco. «Se puso junto a mí» es aceptable, aunque «se paró junto a mí» o «se quedó junto a mí» sería más directo; no exige cambio. La puntuación de «jóvenes—a quienes…—,» debe normalizarse.
  glossary_alignment: 'La terminología principal está bien alineada: κύριος como «Señor» es apropiado en este contexto no bíblico griego; δικαιοσύνη como «justicia» está bien; οἶκος como «casa» es defendible. No hay conflictos con los términos por defecto del proyecto que requieran nota.'
  issues:
  - severity: medium
    issue: Traducción inadecuada de πάντα en la orden a Hermas
    rationale: «deja de preguntar por completo acerca de tus pecados» en español modifica el grado de preguntar, no el objeto o la insistencia temática. El sentido es más bien «deja de preguntar siempre/solo acerca de tus pecados» o «deja ya de preguntar tanto por tus pecados».
  - severity: low
    issue: Puntuación antinatural con raya e inciso
    rationale: «jóvenes—a quienes yo también había visto antes—,» mezcla raya de inciso con coma externa de forma poco elegante; conviene «jóvenes —a quienes yo también había visto antes— y…».
  revised_spanish_text: 'Y ella vino con seis jóvenes —a quienes yo también había visto antes— y se puso junto a mí y escuchó mientras yo oraba y confesaba mis pecados al Señor. Y, tocándome, me dice: «Hermas, deja ya de preguntar siempre acerca de tus pecados; pregunta también por la justicia, para que recibas alguna parte de ella para tu casa».'
  revision_rationale: 'Se ajusta la puntuación para un español más natural y se corrige la orden principal para reflejar mejor el valor de πάντα: no cesar absolutamente de preguntar, sino dejar de centrarse continuamente en los pecados. No hacen falta notas adicionales.'
