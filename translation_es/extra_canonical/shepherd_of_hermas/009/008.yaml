  text: And after the young men withdrew and we were alone, she says to me, “Sit here.” I say to her, “Lady, let the elders sit first.” “What I tell you,” she says, “sit.”
translation:
  language: es
  text: 'Y después de que los jóvenes se retiraron y quedamos solos, ella me dijo: «Siéntate aquí». Yo le dije: «Señora, que se sienten primero los ancianos». «Haz lo que te digo: siéntate», me dijo.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: νεανίσκοι
  english_pob_choice: young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los mozos
  lexicon: νεανίσκοι
  rationale: El griego nombra a varones jóvenes; «los jóvenes» comunica naturalmente la edad y conserva el plural masculino sin sonar arcaico.
- source_word: ἐγκαταλείπω / ἐκλείπω (contextual withdrawal)
  english_pob_choice: withdrew
  chosen_spanish: se retiraron
  alternatives_spanish:
  - se fueron
  - se apartaron
  lexicon: retirarse
  rationale: La idea es que los jóvenes se apartan del grupo; «se retiraron» refleja bien la salida sin añadir matices ajenos.
- source_word: λέγει / φησί
  english_pob_choice: she says
  chosen_spanish: me dijo / me dijo
  alternatives_spanish:
  - me dice
  - me hablaba
  lexicon: decir
  rationale: Aunque el griego usa presente discursivo, en español la narración fluye mejor con pasado; se conserva el carácter dialogal sin forzar un presente continuo.
- source_word: δέσποινα
  english_pob_choice: Lady
  chosen_spanish: Señora
  alternatives_spanish:
  - Señora mía
  - Dama
  lexicon: señor/señora
  rationale: «Señora» reproduce el trato respetuoso y suena natural en español; «Dama» sería más literario pero menos directo.
- source_word: πρεσβύτεροι
  english_pob_choice: elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los presbíteros
  - los mayores
  lexicon: anciano
  rationale: Aquí el sentido es de personas de mayor edad, no necesariamente un cargo eclesial; «los ancianos» conserva esa lectura y evita imponer la institución de «presbíteros».
theological_decisions:
- issue: Tratamiento respetuoso hacia la figura femenina interlocutora
  english_pob_reading: Lady
  chosen_spanish_reading: Señora
  alternative_spanish_readings:
  - Señora mía
  - Dama
  rationale: No hay indicio de una categoría doctrinal especial; se preserva el tono reverente del diálogo con un tratamiento español transparente.
  doctrine_reference: cortesía narrativa; no doctrinal
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el contexto fuente; la traducción sigue de cerca el texto griego y coincide sustancialmente con la versión auditada en inglés.
  spanish_consistency_notes:
  - Se mantiene «Señora» como tratamiento consistente con el inglés auditado «Lady».
  - Se traduce el griego discursivo con pasado narrativo español para evitar una literalidad rígida.
  - «Ancianos» se usa en sentido etario, no como cargo eclesiástico.
