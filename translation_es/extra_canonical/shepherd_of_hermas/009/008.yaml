review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del griego y del POB inglés: retirada de los jóvenes, quedar a solas, mandato de sentarse, objeción de Hermas, y respuesta insistente de la interlocutora. Sin embargo, «después que» suena menos natural que «después de que», y la réplica final «Lo que te digo —me dijo—, siéntate» reproduce de manera algo forzada el inglés/greigo. En español claro y fiel, conviene explicitar el imperativo: «Haz lo que te digo: siéntate».'
  spanish_quality_summary: 'El español es generalmente claro y digno, con diálogo natural. Los principales ajustes son de fluidez idiomática y puntuación: «después de que» mejora la naturalidad; «Haz lo que te digo: siéntate» expresa mejor la orden que en el borrador queda sintácticamente extraña. El resto del registro es apropiado para una edición eclesial legible.'
  glossary_alignment: No hay terminología teológica mayor en juego. «Señora» para δέσποινα y «ancianos» para πρεσβύτεροι son decisiones adecuadas en este contexto narrativo. «Los jóvenes» para νεανίσκοι también está bien. No se requieren notas.
  issues:
  - severity: medium
    issue: «después que» suena menos idiomático en español general
    rationale: Aunque comprensible, en prosa bíblica moderna neutral se prefiere «después de que».
  - severity: medium
    issue: La frase «Lo que te digo —me dijo—, siéntate» es poco natural y algo ambigua
    rationale: 'No comunica con claridad la fuerza imperativa del original/POB inglés («What I tell you … sit»). «Haz lo que te digo: siéntate» preserva el sentido con español natural.'
  revised_spanish_text: 'Y después de que los jóvenes se retiraron y quedamos solos, ella me dijo: «Siéntate aquí». Yo le dije: «Señora, que se sienten primero los ancianos». «Haz lo que te digo: siéntate», me dijo.'
  revision_rationale: Se corrige la sintaxis para un español más natural y se reformula la orden final para reflejar con claridad la insistencia imperativa del original sin calco torpe.
