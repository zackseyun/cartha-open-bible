  text: And she raised me by the hand and leads me to the couch, and she says to the young men, “Go and build.”
translation:
  language: es
  text: 'Y ella me levantó de la mano y me lleva al lecho, y dice a los jóvenes: «Vayan y construyan».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ ἀνέλαβέν με τῆς χειρός
  english_pob_choice: she raised me by the hand
  chosen_spanish: me levantó de la mano
  alternatives_spanish:
  - me tomó de la mano y me levantó
  - me alzó de la mano
  lexicon: ἀναλαμβάνω + χείρ
  rationale: La imagen griega expresa apoyo físico y elevación; «me levantó de la mano» conserva el gesto sin recargarlo. «Tomó de la mano» es posible, pero «levantó» reproduce mejor el movimiento hacia arriba que el contexto sugiere.
- source_word: καὶ ἄγει με πρὸς τὴν κλίνην
  english_pob_choice: and leads me to the couch
  chosen_spanish: y me lleva al lecho
  alternatives_spanish:
  - y me conduce al lecho
  - y me lleva al sofá
  lexicon: ἄγω + κλίνη
  rationale: En este contexto, κλίνη es una cama/lecho, no un «sofá» moderno; «lecho» mantiene dignidad y precisión. «Lleva» es un equivalente natural de ἄγει y evita una calca demasiado rígida.
- source_word: τοῖς νεανίσκοις
  english_pob_choice: to the young men
  chosen_spanish: a los jóvenes
  alternatives_spanish:
  - a los muchachos
  - a los jóvenes hombres
  lexicon: νεανίσκος
  rationale: «Jóvenes» comunica la referencia de manera clara y natural en español; «jóvenes hombres» sería más literal pero más pesado. El contexto no exige una restricción más fuerte que la edad/condición juvenil.
- source_word: Ὑπάγετε καὶ οἰκοδομήσατε
  english_pob_choice: Go and build
  chosen_spanish: Vayan y construyan
  alternatives_spanish:
  - Vayan y edifiquen
  - Id y construid
  lexicon: ὑπάγω + οἰκοδομέω
  rationale: «Construyan» traduce el acto de edificar con lenguaje transparente en español moderno. «Edifiquen» conservaría un registro más bíblico, pero puede sonar más eclesiástico de lo necesario para el imperativo concreto del texto.
translation_notes:
  revision_awareness: No se reportan revisiones textuales o variantes relevantes en el paquete; el texto inglés POB y la revisión cruzada muestran acuerdo alto con el griego normalizado.
  spanish_consistency_notes:
  - Se mantiene el sujeto femenino «ella» para reflejar la figura personificada del texto.
  - Se conserva el orden narrativo simple del original, sin añadir explicaciones interpretativas.
  - «Lecho» se usa para κλίνη por fidelidad contextual y para evitar un término moderno impropio.
