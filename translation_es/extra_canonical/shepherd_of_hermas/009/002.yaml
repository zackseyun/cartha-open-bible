review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego y del POB inglés: ayunos repetidos, súplica al Señor, revelación prometida por medio de la anciana, aparición nocturna, convocatoria al campo y promesa de mostrar lo necesario. No obstante, hay dos ajustes de fidelidad/idiomaticidad: «tan necesitado» suena forzado en este contexto y «me apareceré a ti» es poco natural en español; además, la nota [a] no es necesaria si se adopta una solución más clara.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero presenta dos giros poco naturales para español eclesial general: «eres tan necesitado» y «me apareceré a ti». «Donde te hospedas» funciona, aunque «donde te alojas» sería algo más natural; no es indispensable cambiarlo. La sintaxis general y el registro son buenos.'
  glossary_alignment: «Señor» para κύριος es aceptable aquí, dado que no hay base suficiente para imponer «Yahvé» en esta obra griega. «Revelación», «anciana», «se me apareció», «quinta hora» y «lo que debes ver» están alineados con las decisiones del proyecto. No hay conflicto terminológico mayor.
  issues:
  - severity: medium
    issue: «tan necesitado» es semántica y estilísticamente débil aquí
    rationale: Aunque intenta reflejar carencia/dependencia, en español suena poco idiomático aplicado al deseo de conocer. Una formulación como «tienes tanta necesidad» conserva mejor la idea sin dureza extraña.
  - severity: medium
    issue: «me apareceré a ti» es un calco poco natural
    rationale: En español estándar, la construcción natural es «me apareceré ante ti» o simplemente «me apareceré». La forma actual entorpece la lectura.
  - severity: low
    issue: La nota [a] deja de ser necesaria si se mejora la redacción principal
    rationale: La alternativa explicativa responde a una elección menos feliz del texto base; al revisar a una formulación más natural, la nota puede omitirse.
  revised_spanish_text: 'Después de ayunar muchas veces y suplicar al Señor que me diera a conocer la revelación que había prometido mostrarme por medio de aquella anciana, aquella misma noche la anciana se me apareció y me dijo: «Puesto que tienes tanta necesidad y eres tan ávido de saberlo todo, ve al campo donde te hospedas, y hacia la quinta hora me apareceré ante ti y te mostraré lo que debes ver».'
  revision_rationale: Se corrigen dos giros poco naturales en español («tan necesitado» y «me apareceré a ti») sin alterar el sentido del original ni las decisiones léxicas centrales. Al hacerlo, la nota léxica deja de aportar valor y se elimina.
