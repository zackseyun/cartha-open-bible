base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/009/002.yaml
  text: 'After fasting many times and pleading with the Lord to make known to me the revelation he had promised to show me through that aged woman, on that very night the aged woman appeared to me and said: “Since you are so needy and so eager to know everything, come to the field where you stay, and about the fifth hour I will appear to you and show you what you must see.”'
translation:
  language: es
  text: 'Después de ayunar muchas veces y suplicar al Señor que me diera a conocer la revelación que había prometido mostrarme por medio de aquella anciana, aquella misma noche la anciana se me apareció y me dijo: «Puesto que eres tan necesitado[a] y tan ávido de saberlo todo, ve al campo donde te hospedas, y hacia la quinta hora me apareceré a ti y te mostraré lo que debes ver».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «necesitado» traduce la idea de carencia o dependencia del original; también podría entenderse como «miserable» o «en necesidad», pero esas opciones son menos naturales aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: fasting many times
  english_pob_choice: After fasting many times
  chosen_spanish: Después de ayunar muchas veces
  alternatives_spanish:
  - Tras ayunar repetidas veces
  - Después de muchos ayunos
  lexicon: ayunar
  rationale: Mantiene el sentido repetitivo e intensivo del participio plural sin añadir matices no presentes en el griego.
- source_word: the Lord
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Amo
  lexicon: κύριος
  rationale: Aquí el contexto de súplica y revelación conserva naturalmente la forma reverente 'el Señor' en español; no hay indicio suficiente para introducir el nombre divino explícito en este parlamento de la obra.
- source_word: the revelation
  english_pob_choice: the revelation
  chosen_spanish: la revelación
  alternatives_spanish:
  - la visión
  - el mensaje revelado
  lexicon: ἀποκάλυψις
  rationale: La obra y el contexto visionario apuntan a 'revelación' como término más preciso y estable en español.
- source_word: that aged woman
  english_pob_choice: through that aged woman
  chosen_spanish: por medio de aquella anciana
  alternatives_spanish:
  - a través de aquella anciana
  - mediante aquella mujer anciana
  lexicon: γυνή πρεσβῦτις
  rationale: '''Anciana'' reproduce la referencia a la mujer mayor sin forzar un término eclesiástico. ''Por medio de'' conserva la mediación indicada por la construcción griega y por el inglés POB.'
- source_word: Since you are so needy
  english_pob_choice: Since you are so needy
  chosen_spanish: Puesto que eres tan necesitado
  alternatives_spanish:
  - Ya que eres tan necesitado
  - Puesto que tienes tanta necesidad
  lexicon: δεόμενος / ἐνδεής
  rationale: '''Necesitado'' refleja la dependencia o carencia expresada por el griego, manteniendo el tono directo del discurso.'
- source_word: eager to know everything
  english_pob_choice: eager to know everything
  chosen_spanish: tan ávido de saberlo todo
  alternatives_spanish:
  - tan deseoso de saberlo todo
  - tan ansioso por saberlo todo
  lexicon: πολυπερίεργος / φιλομαθής
  rationale: '''Ávido'' comunica bien el impulso intenso de conocer; ''saberlo todo'' conserva el alcance totalizante del original sin sonar excesivamente moderno.'
- source_word: come to the field where you stay
  english_pob_choice: come to the field where you stay
  chosen_spanish: ve al campo donde te hospedas
  alternatives_spanish:
  - ven al campo donde te quedas
  - ve al campo donde resides
  lexicon: ἀγρός + καταλύεις
  rationale: '''Te hospedas'' expresa mejor la estancia temporal implícita en el verbo que ''resides''. ''Campo'' mantiene la localización simple del relato.'
- source_word: about the fifth hour
  english_pob_choice: about the fifth hour
  chosen_spanish: hacia la quinta hora
  alternatives_spanish:
  - como a la quinta hora
  - aproximadamente a la quinta hora
  lexicon: πέμπτη ὥρα
  rationale: '''Hacia'' reproduce la aproximación temporal con naturalidad en español y sin añadir precisión.'
- source_word: I will appear to you
  english_pob_choice: I will appear to you
  chosen_spanish: me apareceré a ti
  alternatives_spanish:
  - me presentaré ante ti
  - apareceré ante ti
  lexicon: ὀφθήσομαι
  rationale: La pasiva divina/visionaria en griego se traduce de forma natural con 'me apareceré', preservando la experiencia sobrenatural del encuentro.
- source_word: what you must see
  english_pob_choice: what you must see
  chosen_spanish: lo que debes ver
  alternatives_spanish:
  - lo que has de ver
  - lo que necesitas ver
  lexicon: δεῖ + ἰδεῖν
  rationale: '''Debes ver'' expresa obligación/necesidad sin introducir una formulación demasiado formal.'
theological_decisions:
- issue: Mediated revelation through the aged woman
  english_pob_reading: the revelation he had promised to show me through that aged woman
  chosen_spanish_reading: la revelación que había prometido mostrarme por medio de aquella anciana
  alternative_spanish_readings:
  - la revelación que había prometido mostrarme a través de aquella anciana
  - la revelación que me había prometido mostrar mediante aquella anciana
  rationale: La formulación conserva la mediación humana sin convertir a la anciana en autora de la revelación. 'Por medio de' deja clara la intermediación del instrumento visionario.
  doctrine_reference: Revelación mediada / profecía visionaria
- issue: Visionary appearance rather than ordinary arrival
  english_pob_reading: the aged woman appeared to me
  chosen_spanish_reading: la anciana se me apareció
  alternative_spanish_readings:
  - la anciana apareció ante mí
  - la anciana se apareció a mí
  rationale: El reflexivo 'se me apareció' preserva el carácter de aparición sobrenatural propio del relato visionario.
  doctrine_reference: Teofanía/visión narrativa
- issue: Temporal approximation of the fifth hour
  english_pob_reading: about the fifth hour
  chosen_spanish_reading: hacia la quinta hora
  alternative_spanish_readings:
  - como a la quinta hora
  - aproximadamente a la quinta hora
  rationale: Se mantiene la indeterminación temporal del original, evitando una lectura más precisa de la que el texto ofrece.
  doctrine_reference: Precisión narrativa del tiempo
translation_notes:
  revision_awareness: 'La versión inglesa POB es óptimamente equivalente y no presenta notas; el texto griego subyacente coincide sustancialmente con la secuencia del relato visionario. La única tensión principal es léxica: el adjetivo de necesidad/indigencia aplicado al interlocutor, y la elección de un español natural sin perder el tono de dependencia. También se ha preservado la aproximación temporal y el lenguaje de aparición visionaria sin amplificación interpretativa.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος en esta oración, conforme al tono de súplica y sin una señal explícita del nombre divino en el contexto inmediato.
  - Se mantiene 'anciana' para la mujer mayor del relato, evitando cargarla con un título doctrinal no atestiguado aquí.
  - '''Me apareceré'' y ''se me apareció'' se usan de forma consistente para la lógica visionaria del pasaje.'
  - '''Campo'' y ''quinta hora'' conservan la sobriedad narrativa del original sin modernización excesiva.'
