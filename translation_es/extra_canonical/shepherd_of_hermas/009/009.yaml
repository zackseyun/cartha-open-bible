  text: So when I wanted to sit on the right side, she did not permit me, but motioned to me with her hand that I should sit on the left side. So as I reasoned and was grieved that she had not allowed me to sit on the right side, she says to me, “Are you grieved, Hermas? The place on the right side belongs to others—those who have already pleased God and suffered for the sake of the Name; but you lack many things to sit with them. But as you remain in your simplicity, remain, and you will sit with them, as will all who do their works and endure what they also endured.”
translation:
  language: es
  text: 'Así que, cuando quise sentarme a la derecha, ella no me lo permitió, sino que me hizo señas con la mano para que me sentara a la izquierda. Y mientras pensaba en esto y me afligía porque no me había permitido sentarme a la derecha, me dice: «¿Te afliges, Hermas? El lugar de la derecha pertenece a otros: a los que ya agradaron a Dios y padecieron por causa del Nombre; pero a ti te faltan muchas cosas para sentarte con ellos. Pero sigue así en tu sencillez, y te sentarás con ellos, como también todos los que hacen sus obras y soportan lo que ellos también soportaron».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δεξιά
  english_pob_choice: right side
  chosen_spanish: la derecha
  alternatives_spanish:
  - el lado derecho
  - la parte derecha
  lexicon: δεξιός
  rationale: La expresión espacial se conserva de forma natural en español con «la derecha», que reproduce el valor posicional del griego y del inglés POB sin introducir interpretación simbólica adicional.
- source_word: ἀριστερά
  english_pob_choice: left side
  chosen_spanish: la izquierda
  alternatives_spanish:
  - el lado izquierdo
  - la parte izquierda
  lexicon: ἀριστερός
  rationale: Se mantiene el contraste espacial directo con «la izquierda», una forma idiomática y clara en español.
- source_word: εὐηρέστησαν τῷ θεῷ
  english_pob_choice: have already pleased God
  chosen_spanish: ya agradaron a Dios
  alternatives_spanish:
  - ya complacieron a Dios
  - ya fueron aceptos a Dios
  lexicon: εὐαρεστεῖν
  rationale: «Agradaron a Dios» expresa el valor relacional de haber sido gratos/aceptos ante Dios sin sobrecargar el texto con una fórmula más técnica.
- source_word: διὰ τὸ ὄνομα
  english_pob_choice: for the sake of the Name
  chosen_spanish: por causa del Nombre
  alternatives_spanish:
  - por el Nombre
  - a causa del Nombre
  lexicon: ὄνομα
  rationale: Se conserva el uso reverente de «el Nombre» con mayúscula, siguiendo la audacia semántica del original y del POB inglés.
- source_word: ἁπλότητι
  english_pob_choice: simplicity
  chosen_spanish: sencillez
  alternatives_spanish:
  - simplicidad
  - candor
  lexicon: ἁπλότης
  rationale: «Sencillez» comunica mejor en español la cualidad de integridad, llaneza y sin doblez que sugiere el griego en este contexto exhortativo.
- source_word: ὑπομένω
  english_pob_choice: endure
  chosen_spanish: soportan
  alternatives_spanish:
  - perseveran
  - resisten
  - aguantan
  lexicon: ὑπομένω
  rationale: «Soportan» preserva la idea de permanecer bajo una carga o prueba, en paralelo con el inglés POB «endure», sin volverlo excesivamente abstracto.
theological_decisions:
- issue: Acceso al lugar de la derecha como recompensa escatológica y moral
  english_pob_reading: The place on the right side belongs to others—those who have already pleased God and suffered for the sake of the Name; but you lack many things to sit with them.
  chosen_spanish_reading: 'El lugar de la derecha pertenece a otros: a los que ya agradaron a Dios y padecieron por causa del Nombre; pero a ti te faltan muchas cosas para sentarte con ellos.'
  alternative_spanish_readings:
  - El lugar de la derecha es de otros
  - El lado derecho pertenece a otros
  rationale: La formulación mantiene la restricción del acceso y la conexión entre agrado divino, sufrimiento por el Nombre y participación futura en el mismo lugar. No suaviza la tensión moral del texto.
  doctrine_reference: Soteriología y perseverancia en la literatura patrística temprana
