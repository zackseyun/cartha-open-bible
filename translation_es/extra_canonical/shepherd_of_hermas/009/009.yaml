  revision_awareness: This Spanish draft corrects the prior validation issue by including no footnotes at all, so there are no unmatched markers. The translation follows the Greek source while aligning with the English POB audit trail on spatial language, divine-name reverence, and the ethical force of 'simplicity' and 'endure'.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para el Nombre divino, manteniendo «Dios» y «el Nombre» según el contexto.
  - Se usó «sencillez» para ἁπλότης por consistencia con el tono moral del pasaje.
  - Se mantuvo el paralelismo de lugar y prueba en una sintaxis fluida para lectura pública.
