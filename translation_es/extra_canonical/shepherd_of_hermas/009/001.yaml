lexical_decisions:
- source_word: ὅρασις / vision
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - visión profética
  - revelación
  lexicon: vision
  rationale: El griego y la traducción inglesa señalan una experiencia visionaria concreta; «visión» conserva de forma directa el género del relato sin añadir matices no presentes en el texto.
- source_word: ἰδὼν / I saw
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - he visto
  - observé
  lexicon: see
  rationale: «Vi» reproduce con naturalidad la primera persona del pasado y mantiene la sencillez del original y del inglés POB.
- source_word: ἀδελφοί / brothers
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos en la fe
  - amigos
  lexicon: brothers
  rationale: «Hermanos» refleja el vocativo comunitario del griego y coincide con la elección auditada en inglés, sin ampliar el alcance del término.
theological_decisions:
- issue: Marco comunitario del relato
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos en la fe
  - amados
  rationale: El texto introduce la visión como testimonio dirigido a la comunidad cristiana; «hermanos» preserva ese tono fraternal sin cargarlo de solemnidad adicional.
  doctrine_reference: Comunidad eclesial primitiva; vocativo fraternal
translation_notes:
  revision_awareness: No se registran revisiones aplicadas ni notas textuales en el paquete de auditoría; la redacción sigue de cerca la breve unidad griega y la versión inglesa aprobada.
  spanish_consistency_notes:
  - Se mantiene «visión» como término técnico para evitar alternarlo con «revelación» o «sueño» sin base textual.
  - 'El orden de la oración sigue el patrón sencillo del original: núcleo nominal, verbo de percepción, vocativo, y cierre introductorio.'
  - No se añade puntuación interpretativa ni glosa explicativa, dado el carácter introductorio y conciso del versículo.
