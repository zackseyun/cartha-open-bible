  yaml_path: translation/extra_canonical/shepherd_of_hermas/009/004.yaml
  text: So I went, brothers, into the field, and I counted the hours, and I came to the place where I had directed her to come; and I see an ivory couch set there, and upon the couch there lay a linen pillow, and on top a spread-out towel of fine linen.
translation:
  language: es
  text: Así que fui, hermanos, al campo, y conté las horas, y llegué al lugar donde le había indicado que viniera; y vi allí un lecho de marfil, y sobre el lecho una almohada de lino, y encima un paño extendido de lino fino.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀγρόν
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - el terreno
  - la campiña
  lexicon: ἀγρός
  rationale: «Campo» reproduce de manera natural el espacio abierto indicado por el griego y coincide con la imagen simple del POB inglés sin añadir matices pastorales innecesarios.
- source_word: ὥρας
  english_pob_choice: the hours
  chosen_spanish: las horas
  alternatives_spanish:
  - los momentos
  - las horas del día
  lexicon: ὥρα
  rationale: Se mantiene la referencia temporal literal del texto; «conté las horas» conserva la expresión y su posible sentido de espera o cálculo del tiempo sin explicitar más de lo que el griego dice.
- source_word: κλίνην ἐλέφантίνην / ἐλεφάντινον
  english_pob_choice: an ivory couch
  chosen_spanish: un lecho de marfil
  alternatives_spanish:
  - un diván de marfil
  - un sofá de marfil
  lexicon: κλίνη / ἐλεφάντινος
  rationale: «Lecho» es amplio y fiel para κλίνη, y «de marfil» traduce ἐλεφάντινος directamente. «Couch» en inglés puede sonar moderno, pero el objeto antiguo se expresa mejor en español con «lecho».
- source_word: προσκεφάλαιον λίνου / λινόν
  english_pob_choice: a linen pillow
  chosen_spanish: una almohada de lino
  alternatives_spanish:
  - un cojín de lino
  - una almohada de tela de lino
  lexicon: προσκεφάλαιον
  rationale: «Almohada» transmite la función del objeto de descanso; se conserva «de lino» para reflejar el material indicado por el griego y por el inglés auditado.
- source_word: σουδάριον λεπτόν
  english_pob_choice: a spread-out towel of fine linen
  chosen_spanish: una toalla extendida de lino fino
  alternatives_spanish:
  - un paño extendido de lino fino
  - un lienzo extendido de lino fino
  lexicon: σουδάριον / λεπτός
  rationale: «Toalla» sigue el valor práctico del paño; «extendida» refleja el participio/estado del objeto, y «de lino fino» conserva el calificativo de calidad. En español, «paño» o «lienzo» serían posibles, pero «toalla» comunica mejor la escena sin perder la función textil.
theological_decisions:
- issue: Retaining the direct vocative «hermanos» in a narrative address
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos míos
  - amigos
  rationale: El apelativo fraterno del POB inglés se conserva sin intensificarlo; el griego y el contexto narrativo permiten el simple vocativo «hermanos».
  doctrine_reference: Comunitary address in early Christian narrative style
translation_notes:
  revision_awareness: No applied revisions were supplied beyond the audited English POB rendering. The Spanish draft therefore follows the source packet and the English audit context directly, with only minor naturalization for idiomatic Spanish.
  spanish_consistency_notes:
  - Se conserva el registro sobrio y narrativo del POB en español.
  - Se evita sustituir términos concretos por equivalentes más interpretativos cuando el griego ofrece imágenes físicas precisas.
  - «Lino fino» mantiene la distinción de calidad sin sobreexplicar el material.
