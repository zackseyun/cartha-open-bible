review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego y del POB inglés: entrada al campo, cómputo de las horas, llegada al lugar indicado, y descripción del mobiliario/textiles. No hay pérdidas teológicas ni cambios narrativos sustanciales. Sin embargo, «toalla» para σουδάριον suena demasiado doméstico-moderno en este contexto de mobiliario dispuesto; un término más amplio como «paño» preserva mejor el objeto textil sin imponer un uso específico. También conviene suavizar la repetición de «allí ... había» para mayor naturalidad.'
  spanish_quality_summary: El español es claro y digno, generalmente natural. «Así que fui» funciona, pero «Entonces fui» o mantenerlo tal cual son opciones igualmente válidas; no exige cambio. La frase final mejora con «un paño extendido de lino fino», que suena más literario y contextual que «una toalla extendida». El resto es legible y fiel.
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. «Hermanos» está bien conservado. Las decisiones léxicas «campo», «horas», «lecho de marfil», «almohada de lino» se alinean con el sentido fuente. La única excepción recomendada es ajustar σουδάριον de «toalla» a «paño».
  issues:
  - severity: medium
    issue: «toalla» para σουδάριον
    rationale: Aunque posible en sentido amplio, «toalla» en español contemporáneo sugiere un objeto de aseo y suena demasiado específico/moderno para la escena. «Paño» conserva mejor la ambigüedad y la función textil del término.
  - severity: low
    issue: Leve rigidez estilística en «vi allí ... y sobre el lecho había»
    rationale: No es incorrecto, pero una formulación ligeramente más fluida mejora la lectura sin alterar el sentido.
  revised_spanish_text: Así que fui, hermanos, al campo, y conté las horas, y llegué al lugar donde le había indicado que viniera; y vi allí un lecho de marfil, y sobre el lecho una almohada de lino, y encima un paño extendido de lino fino.
  revision_rationale: Se mantiene la estructura y el contenido del borrador, pero se reemplaza «toalla» por «paño» para reflejar mejor σουδάριον en un contexto narrativo antiguo y evitar una connotación demasiado moderna/específica. También se suprime un «había» para una sintaxis más natural en español.
