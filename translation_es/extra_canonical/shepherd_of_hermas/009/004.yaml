  rationale: Se mantiene la estructura y el contenido del borrador, pero se reemplaza «toalla» por «paño» para reflejar mejor σουδάριον en un contexto narrativo antiguo y evitar una connotación demasiado moderna/específica. También se suprime un «había» para una sintaxis más natural en español.
