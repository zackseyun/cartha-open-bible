base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/009/005.yaml
  text: Seeing these things set there and no one in the place, I was astonished, and a tremor, as it were, seized me, and my hair stood on end; and a shudder, as it were, came upon me, since I was alone. Then, coming to myself and remembering the glory of God, and taking courage, I knelt and again confessed my sins to the Lord, as before.
translation:
  language: es
  text: Al ver estas cosas puestas allí y no habiendo nadie en el lugar, me asombré, como si un temblor se apoderara de mí, y se me erizó el cabello; y un estremecimiento, por así decirlo, me sobrevino, pues estaba solo. Entonces, volviendo en mí y recordando la gloria de Dios, y cobrando ánimo, me arrodillé y confesé de nuevo mis pecados al Señor, como antes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐθαύμασα / ἐθαυμασάμην
  english_pob_choice: I was astonished
  chosen_spanish: me asombré
  alternatives_spanish:
  - me maravillé
  - quedé asombrado
  lexicon: θαυμάζω
  rationale: El griego expresa quedar sobrecogido por lo visto; «me asombré» conserva la reacción sin volverla más enfática de lo que pide el contexto.
- source_word: τρόμος / τρόμον
  english_pob_choice: a tremor, as it were, seized me
  chosen_spanish: como que un temblor se apoderó de mí
  alternatives_spanish:
  - me sobrecogió un temblor
  - un escalofrío me invadió
  lexicon: τρόμος
  rationale: Se mantiene la imagen corporal de algo que «se apodera» del narrador; «como que» reproduce el matiz atenuado de «as it were».
- source_word: ἡ θρίξ μου ὀρθὴ ἐγένετο
  english_pob_choice: my hair stood on end
  chosen_spanish: se me erizó el cabello
  alternatives_spanish:
  - se me puso el cabello de punta
  - el cabello se me puso erizado
  lexicon: θρίξ
  rationale: Es la manera natural y fiel de expresar en español la reacción física descrita por el griego.
- source_word: φρίκη / φρίξις
  english_pob_choice: a shudder, as it were
  chosen_spanish: un estremecimiento, por así decirlo
  alternatives_spanish:
  - un escalofrío, por así decirlo
  - un temblor, por así decirlo
  lexicon: φρίκη
  rationale: «Estremecimiento» preserva el campo semántico de sacudida interna y corporal; «por así decirlo» traduce el matiz cauteloso del original y del inglés.
- source_word: δόξαν τοῦ θεοῦ
  english_pob_choice: the glory of God
  chosen_spanish: la gloria de Dios
  alternatives_spanish:
  - el esplendor de Dios
  - la gloria divina
  lexicon: δόξα
  rationale: La expresión es estable y directa; no requiere innovación léxica.
- source_word: ἀναλαβὼν θάρσος
  english_pob_choice: taking courage
  chosen_spanish: cobrando ánimo
  alternatives_spanish:
  - tomando valor
  - recobrando el valor
  lexicon: θάρσος
  rationale: «Cobrar ánimo» es idiomático y transmite la recuperación interior de firmeza.
- source_word: ἐξωμολογησάμην
  english_pob_choice: confessed my sins
  chosen_spanish: confesé de nuevo mis pecados
  alternatives_spanish:
  - volví a confesar mis pecados
  - reconocí otra vez mis pecados
  lexicon: ἐξομολογέω
  rationale: El texto indica una confesión repetida; «de nuevo» preserva la iteración señalada por «as before».
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - a Yahvé
  lexicon: κύριος
  rationale: Aquí el destinatario inmediato está expresado como κύριος en el texto griego y el POB inglés conserva «the Lord»; en español, «el Señor» es la forma más natural y mantiene la referencia reverente sin forzar una sustitución por el nombre divino.
theological_decisions:
- issue: Confesión repetida de pecados
  english_pob_reading: and again confessed my sins to the Lord, as before
  chosen_spanish_reading: y confesé de nuevo mis pecados al Señor, como antes
  alternative_spanish_readings:
  - y volví a confesar mis pecados al Señor, como antes
  - y confesé otra vez mis pecados al Señor, como antes
  rationale: La frase presenta una repetición explícita de la confesión; el español debe conservar esa reiteración sin diluirla. «De nuevo» mantiene la continuidad devocional del acto.
  doctrine_reference: Arrepentimiento y confesión reiterada ante Dios
- issue: Preservación del matiz comparativo
  english_pob_reading: as it were / as before
  chosen_spanish_reading: como que / por así decirlo / como antes
  alternative_spanish_readings:
  - cual si
  - casi
  - tal como antes
  rationale: El relato usa atenuadores que señalan aproximación descriptiva, no identidad literal. Conviene preservarlos en español para no absolutizar la experiencia interior narrada.
  doctrine_reference: Lenguaje fenomenológico y cautela descriptiva
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando cualquier marca de nota no anclada en el texto. La presente versión no usa pies de nota, de modo que cada elemento del record queda internamente consistente y pasa la restricción de marcadores.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y confesional, coherente con la narrativa visionaria.
  - Se evita el calco rígido, pero se conserva la secuencia de acciones y reacciones del griego.
  - «Señor» se usa de forma reverente y consistente con el audit trail en inglés.
  - No se introduce terminología eclesiástica ajena al texto ni una equivalencia doctrinal no apoyada por la fuente.
