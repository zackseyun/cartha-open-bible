base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/013/002.yaml
  text: “And the ones drawn up from the deep and set into the building and fitting together at their joints with the other stones already built—who are they?” “These are the ones who suffered on account of the name of the Lord.”
translation:
  language: es
  text: «¿Y los que fueron sacados de lo profundo y puestos en la edificación, y encajados en sus juntas con las demás piedras ya colocadas, quiénes son?». «Estos son los que padecieron por causa del nombre del Señor».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ ἐκ τοῦ βυθοῦ ἀνασπασθέντες
  english_pob_choice: the ones drawn up from the deep
  chosen_spanish: los que fueron levantados desde el fondo
  alternatives_spanish:
  - los que fueron sacados desde el abismo
  - los que fueron alzados desde lo profundo
  lexicon: ἀνασπάω
  rationale: El griego expresa la acción de sacar o levantar desde una profundidad. «Levantados» conserva la imagen de ascenso sin introducir una noción más técnica que el texto no requiere; «desde el fondo» mantiene la referencia espacial concreta que la traducción inglesa resolvió como “from the deep”.
- source_word: εἰς τὴν οἰκοδομήν
  english_pob_choice: into the building
  chosen_spanish: puestos en la edificación
  alternatives_spanish:
  - puestos en la construcción
  - introducidos en la obra
  lexicon: οἰκοδομή
  rationale: En este contexto la palabra no describe solo un edificio, sino el proceso/resultado de edificación simbólica. «Edificación» conserva el valor constructivo y, a la vez, el tono figurado propio de la alegoría.
- source_word: καὶ συναρμολογηθέντες
  english_pob_choice: and fitting together
  chosen_spanish: y encajados
  alternatives_spanish:
  - y ajustados
  - y unidos
  lexicon: συναρμολογέω
  rationale: El verbo indica ser ensamblados o articulados para encajar con otras piezas. «Encajados» comunica bien la imagen de ajuste preciso sin borrar la dimensión de unión estructural.
- source_word: ταῖς ἁρμοῖς
  english_pob_choice: at their joints
  chosen_spanish: en sus juntas
  alternatives_spanish:
  - en sus uniones
  - en sus articulaciones
  lexicon: ἁρμός
  rationale: «Juntas» es la correspondencia más natural en español para las uniones entre piedras, y mantiene la imagen arquitectónica del texto.
- source_word: οἱ ἤδη οἰκοδομηθέντες λίθοι
  english_pob_choice: the other stones already built
  chosen_spanish: las demás piedras ya edificadas
  alternatives_spanish:
  - las otras piedras ya colocadas
  - las piedras ya construidas
  lexicon: οἰκοδομέω / λίθος
  rationale: Se conserva la imagen de piedras integradas previamente en la estructura. «Edificadas» suena menos natural aplicado a piedras, pero preserva la personificación/alegoría del original y del inglés POB.
- source_word: οὗτοί εἰσιν οἱ διὰ τὸ ὄνομα τοῦ κυρίου παθόντες
  english_pob_choice: These are the ones who suffered on account of the name of the Lord
  chosen_spanish: Estos son los que padecieron por causa del nombre del Señor
  alternatives_spanish:
  - Estos son los que sufrieron por el nombre del Señor
  - Estos son los que padecieron a causa del nombre del Señor
  lexicon: πάσχω / ὄνομα / κύριος
  rationale: «Padecieron» mantiene un registro algo más solemne que «sufrieron» y encaja con el tono confesional del texto. «Por causa de» refleja fielmente la construcción causal; «Señor» traduce κύριος según el uso del pasaje, donde el inglés POB ya fija la forma de título cristológico sin requerir una explicación adicional aquí.
theological_decisions:
- issue: Identificación del «Señor» en la cláusula final
  english_pob_reading: name of the Lord
  chosen_spanish_reading: el nombre del Señor
  alternative_spanish_readings:
  - el nombre de Yahvé
  - el nombre del Mesías
  rationale: En este pasaje la frase griega usa κύριος como título reverencial en un dicho cristiano, y el audit trail inglés mantiene “the Lord”. En español, «Señor» conserva esa ambigüedad reverencial sin forzar una identificación explícita que el contexto inmediato no desarrolla.
  doctrine_reference: Cristología y uso de κύριος en literatura cristiana primitiva
- issue: Naturaleza alegórica de la construcción con piedras
  english_pob_reading: drawn up from the deep... set into the building
  chosen_spanish_reading: levantados desde el fondo... puestos en la edificación
  alternative_spanish_readings:
  - sacados del abismo... colocados en el edificio
  - alzados desde lo profundo... integrados en la construcción
  rationale: El texto funciona como una alegoría arquitectónica. La traducción española conserva la secuencia de movimiento e integración sin desactivar la metáfora ni explicitarla más allá de lo que el original permite.
  doctrine_reference: Uso alegórico de la imagen de edificación en literatura cristiana primitiva
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente; la versión inglesa POB muestra alto acuerdo con la fuente griega (0.95), por lo que el español sigue de cerca la sintaxis e imaginería del original con ajustes mínimos de naturalidad.
  spanish_consistency_notes:
  - Se mantiene «Señor» como equivalente de κύριος en esta línea, coherente con el texto fuente y con la práctica de la edición inglesa.
  - Se conserva el paralelismo arquitectónico de «edificación / juntas / piedras» para no diluir la alegoría.
  - El registro es solemne pero no arcaizante, acorde con el español público de lectura eclesial.
