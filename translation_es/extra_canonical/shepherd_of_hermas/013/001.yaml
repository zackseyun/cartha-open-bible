revisions:
- from: Escucha ahora acerca de las piedras que entran en la construcción. Las piedras, pues, que son cuadradas y blancas y que encajan en sus juntas —éstas son los apóstoles, obispos, maestros y diáconos, que anduvieron en la dignidad reverente de Dios y supervisaron, enseñaron y sirvieron a los elegidos de Dios con pureza y reverencia—, unos han dormido, y otros todavía viven. Siempre estuvieron de acuerdo entre sí, tuvieron paz entre ellos y se escucharon unos a otros; por esta razón sus juntas encajan en la construcción de la torre.
  to: 'Escucha ahora acerca de las piedras que entran en la construcción. Las piedras, pues, que son cuadradas y blancas y que encajan en sus juntas —éstos son los apóstoles, obispos, maestros y diáconos, que anduvieron en la dignidad reverente de Dios y supervisaron, enseñaron y sirvieron a los elegidos de Dios con pureza y reverencia—: unos se han dormido, y otros todavía viven. Siempre estuvieron de acuerdo entre sí, tuvieron paz entre ellos y se escucharon unos a otros; por esta razón sus juntas encajan en la construcción de la torre.'
  rationale: Se corrige la discordancia gramatical en la identificación de las piedras con los ministros, se ajusta el eufemismo de muerte a un español más natural y se mejora levemente la puntuación, manteniendo intacto el contenido y la metáfora arquitectónica del original.
  reviewer_model: gpt-5.4
