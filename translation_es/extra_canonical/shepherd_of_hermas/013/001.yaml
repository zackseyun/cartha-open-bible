base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/013/001.yaml
  text: “Listen now about the stones that go into the building. The stones, then, that are square and white and that fit together at their joints—these are the apostles and bishops and teachers and deacons, who walked in the reverent dignity of God and who oversaw and taught and served God’s elect with purity and reverence—some have fallen asleep, and some are still alive. They were always in agreement with one another, had peace among themselves, and listened to each other; for this reason their joints fit in the building of the tower.
translation:
  language: es
  text: 'Escucha ahora acerca de las piedras que entran en la construcción. Las piedras, pues, que son cuadradas y blancas y que encajan en sus juntas —éstos son los apóstoles, obispos, maestros y diáconos, que anduvieron en la dignidad reverente de Dios y supervisaron, enseñaron y sirvieron a los elegidos de Dios con pureza y reverencia—: unos se han dormido, y otros todavía viven. Siempre estuvieron de acuerdo entre sí, tuvieron paz entre ellos y se escucharon unos a otros; por esta razón sus juntas encajan en la construcción de la torre.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄκουε νῦν περὶ τῶν λίθων
  english_pob_choice: Listen now about the stones
  chosen_spanish: Escucha ahora acerca de las piedras
  alternatives_spanish:
  - Oye ahora acerca de las piedras
  - Escucha ahora sobre las piedras
  lexicon: ἄκουε = escuchar/oir; λίθοι = piedras
  rationale: Conserva el tono exhortativo directo y el referente literal de las piedras, con un español natural y público.
- source_word: τετράγωνοι καὶ λευκοὶ
  english_pob_choice: square and white
  chosen_spanish: cuadradas y blancas
  alternatives_spanish:
  - cuadrados y blancos
  - de forma cuadrada y blancas
  lexicon: τετράγωνοι = cuadrado, de forma cuadrada; λευκοί = blancos
  rationale: Se mantiene la descripción física simbólica sin forzar una lectura más interpretativa.
- source_word: συναρμολογούμενοι ἐν ταῖς ἁρμοῖς αὐτῶν
  english_pob_choice: that fit together at their joints
  chosen_spanish: que encajan en sus juntas
  alternatives_spanish:
  - que se ensamblan en sus juntas
  - que se ajustan en sus uniones
  lexicon: συναρμολογέω = encajar/ensamblar; ἁρμός = junta, unión
  rationale: «Encajan» comunica bien el ajuste estructural y conserva la imagen de construcción.
- source_word: οὗτοι εἰσὶν οἱ ἀπόστολοι καὶ ἐπίσκοποι καὶ διδάσκαλοι καὶ διάκονοι
  english_pob_choice: these are the apostles and bishops and teachers and deacons
  chosen_spanish: éstas son los apóstoles, obispos, maestros y diáconos
  alternatives_spanish:
  - éstos son los apóstoles, obispos, maestros y diáconos
  - éstas representan a los apóstoles, obispos, maestros y diáconos
  lexicon: ἀπόστολοι = apóstoles; ἐπίσκοποι = obispos/supervisores; διδάσκαλοι = maestros; διάκονοι = diáconos/servidores
  rationale: Se conserva el léxico eclesial recibido por el texto y por la auditoría inglesa, sin suavizar los cargos.
- source_word: ἐπολιτεύσαντο ἐν τῇ σεμνότητι τοῦ θεοῦ
  english_pob_choice: who walked in the reverent dignity of God
  chosen_spanish: que anduvieron en la dignidad reverente de Dios
  alternatives_spanish:
  - que vivieron en la dignidad reverente de Dios
  - que caminaron en la dignidad reverente de Dios
  lexicon: σεμνότης = seriedad, dignidad, reverencia; πολιτεύομαι = vivir/conducirse
  rationale: «Anduvieron» mantiene la imagen conductual del griego y «dignidad reverente» refleja σεμνότης con solemnidad sin perder naturalidad.
- source_word: προεστάναι καὶ διδάσκειν καὶ λειτουργεῖν τοὺς ἐκλεκτοὺς τοῦ θεοῦ
  english_pob_choice: who oversaw and taught and served God’s elect
  chosen_spanish: supervisaron, enseñaron y sirvieron a los elegidos de Dios
  alternatives_spanish:
  - presidieron, enseñaron y sirvieron a los elegidos de Dios
  - supervisaron, enseñaron y ministraron a los elegidos de Dios
  lexicon: προΐστημι = dirigir, presidir, supervisar; λειτουργέω = servir, ministrar
  rationale: «Supervisaron» comunica la función de dirección sin introducir un título ajeno; «sirvieron» preserva el sentido amplio de λειτουργεῖν.
- source_word: μετὰ ἁγνότητος καὶ αἰδοῦς
  english_pob_choice: with purity and reverence
  chosen_spanish: con pureza y reverencia
  alternatives_spanish:
  - con pureza y pudor reverente
  - con pureza y respeto reverente
  lexicon: ἁγνότης = pureza; αἰδώς = reverencia, recato, pudor respetuoso
  rationale: «Reverencia» es la opción más clara y fiel en español para αἰδώς en este contexto devocional.
- source_word: κεκοίμηνται καί τινες ζῶσιν
  english_pob_choice: some have fallen asleep, and some are still alive
  chosen_spanish: unos han dormido, y otros todavía viven
  alternatives_spanish:
  - unos han fallecido, y otros todavía viven
  - unos se han dormido, y otros todavía viven
  lexicon: κοιμάομαι = dormir, eufemismo por morir; ζῶσιν = viven
  rationale: «Han dormido» conserva el eufemismo del original y evita sustituirlo por una paráfrasis más explícita.
- source_word: ἐν ἀλλήλοις εἶχον ὁμόνοιαν
  english_pob_choice: They were always in agreement with one another
  chosen_spanish: Siempre estuvieron de acuerdo entre sí
  alternatives_spanish:
  - Siempre mantuvieron unanimidad entre sí
  - Siempre estuvieron en armonía entre sí
  lexicon: ὁμόνοια = acuerdo, unanimidad, armonía
  rationale: «De acuerdo entre sí» transmite el sentido relacional sin cargar el término con un tecnicismo.
- source_word: εἰρήνην μετ’ ἀλλήλων ἐποίουν
  english_pob_choice: had peace among themselves
  chosen_spanish: tuvieron paz entre ellos
  alternatives_spanish:
  - mantuvieron paz entre ellos
  - hicieron paz entre ellos
  lexicon: εἰρήνη = paz; ποιέω con εἰρήνη = hacer/mantener paz
  rationale: La frase es breve y directa, y «tuvieron paz» conserva el resultado relacional.
- source_word: ἤκουον ἀλλήλων
  english_pob_choice: listened to each other
  chosen_spanish: se escucharon unos a otros
  alternatives_spanish:
  - oyeron unos a otros
  - escuchaban unos a otros
  lexicon: ἀκούω = oír, escuchar
  rationale: «Se escucharon» expresa reciprocidad activa y encaja con el paralelo de acuerdo y paz.
- source_word: διὰ τοῦτο ἁρμόζουσιν αἱ ἁρμοὶ αὐτῶν ἐν τῇ οἰκοδομῇ τοῦ πύργου
  english_pob_choice: for this reason their joints fit in the building of the tower
  chosen_spanish: por esta razón sus juntas encajan en la construcción de la torre
  alternatives_spanish:
  - por esta razón sus uniones encajan en la construcción de la torre
  - por eso sus juntas encajan en el edificio de la torre
  lexicon: ἁρμοί = juntas/uniones; οἰκοδομή = construcción; πύργος = torre
  rationale: Se mantiene la metáfora arquitectónica completa y la conexión causal explícita del texto.
theological_decisions:
- issue: Identificación eclesial de los cargos
  english_pob_reading: apóstoles and bishops and teachers and deacons
  chosen_spanish_reading: apóstoles, obispos, maestros y diáconos
  alternative_spanish_readings:
  - apóstoles, supervisores, maestros y diáconos
  - apóstoles, obispos, doctores y diáconos
  rationale: Se preserva la lista ministerial tal como la auditó la versión inglesa, sin reemplazar ἐπίσκοποι por un término menos tradicional o más técnico que altere la recepción eclesial del pasaje.
  doctrine_reference: Eclesiología histórica y terminología ministerial del cristianismo primitivo
- issue: Sentido de los que han muerto
  english_pob_reading: some have fallen asleep
  chosen_spanish_reading: unos han dormido
  alternative_spanish_readings:
  - unos han fallecido
  - unos se han dormido
  rationale: El eufemismo de dormir se conserva porque el texto lo usa como modo sobrio de hablar de la muerte; no se explicita más de lo que el griego permite.
  doctrine_reference: Lenguaje bíblico sobre la muerte como sueño
- issue: Relación entre unidad moral y ajuste arquitectónico
  english_pob_reading: their joints fit in the building of the tower
  chosen_spanish_reading: sus juntas encajan en la construcción de la torre
  alternative_spanish_readings:
  - sus uniones encajan en la construcción de la torre
  - sus juntas se ajustan en la torre
  rationale: La imagen de cohesión comunitaria como ajuste de piedras debe permanecer transparente; la traducción preserva la metáfora sin espiritualizarla en exceso.
  doctrine_reference: Unidad de la iglesia y edificación comunitaria
translation_notes:
  revision_awareness: La versión anterior fue rechazada por incluir un marcador de nota al pie no anclado en el texto. Esta revisión elimina toda nota al pie y mantiene una redacción publicación-readable sin cambiar el sentido auditado.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «elegidos de Dios» para τοὺς ἐκλεκτοὺς τοῦ θεοῦ.
  - Se usa «obispos» por coherencia con la auditoría inglesa y la terminología ministerial recibida.
  - No se introduce «Cristo» ni «SEÑOR» porque el pasaje no los contiene.
  - 'Se conserva la metáfora de piedras y torre con vocabulario arquitectónico consistente: piedras, juntas, construcción, torre.'
  - Se evita alternar entre «escuchar» y «oír» sin necesidad, para preservar la reciprocidad de ἤκουον ἀλλήλων.
