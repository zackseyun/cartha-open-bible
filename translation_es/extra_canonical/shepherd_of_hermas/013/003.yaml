  yaml_path: translation/extra_canonical/shepherd_of_hermas/013/003.yaml
  text: “I want to know who the other stones are that are being carried from the dry land, lady.” She said, “Those that go into the building without being hewn—the Lord approved these, because they walked in the uprightness of the Lord and kept his commandments.”
translation:
  language: es
  text: '«Quiero saber quiénes son las otras piedras que traen de la tierra seca, señora». Ella dijo: «Las que entran en el edificio sin haber sido labradas: estas aprobó el Señor, porque anduvieron en la rectitud del Señor y guardaron sus mandamientos».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: the other stones
  english_pob_choice: the other stones
  chosen_spanish: las otras piedras
  alternatives_spanish:
  - las demás piedras
  - las piedras restantes
  lexicon: stones → piedras
  rationale: Mantiene el sustantivo concreto del original y el matiz de “otras” como contraste dentro de la visión, sin añadir interpretación.
- source_word: being carried from the dry land
  english_pob_choice: being carried from the dry land
  chosen_spanish: que son traídas de la tierra seca
  alternatives_spanish:
  - que son llevadas de la tierra seca
  - que se traen desde la tierra seca
  lexicon: carried → traídas; dry land → tierra seca
  rationale: “Traídas” preserva la pasividad del participio; “tierra seca” reproduce la imagen visual del griego sin convertirla en paráfrasis.
- source_word: without being hewn
  english_pob_choice: without being hewn
  chosen_spanish: sin haber sido labradas
  alternatives_spanish:
  - sin ser talladas
  - sin ser cinceladas
  lexicon: hewn → labradas/talladas/cinceladas
  rationale: “Labradas” conserva la idea de trabajo sobre la piedra con una forma natural en español bíblico, sin perder la noción de talla artesanal.
- source_word: approved
  english_pob_choice: approved
  chosen_spanish: aprobó
  alternatives_spanish:
  - aceptó
  - apreció
  lexicon: approved → aprobó
  rationale: “Aprobó” conserva el juicio favorable implícito en el original y en la traducción inglesa, sin intensificarlo a una formulación más doctrinal.
- source_word: uprightness
  english_pob_choice: uprightness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - integridad
  lexicon: uprightness → rectitud
  rationale: “Rectitud” es la opción más estable para preservar la cualidad ética y moral del término sin confundirlo con justicia judicial.
- source_word: kept his commandments
  english_pob_choice: kept his commandments
  chosen_spanish: guardaron sus mandamientos
  alternatives_spanish:
  - obedecieron sus mandamientos
  - cumplieron sus mandamientos
  lexicon: kept → guardaron; commandments → mandamientos
  rationale: “Guardaron” mantiene el valor de observancia fiel y memorativo, muy natural en registro bíblico español.
theological_decisions:
- issue: Identidad de “el Señor” en una obra cristiana antigua no canónica
  english_pob_reading: the Lord approved these
  chosen_spanish_reading: estas aprobó el Señor
  alternative_spanish_readings:
  - estas aprobó Yahvé
  - estas aprobó el Señor Jesucristo
  rationale: El contexto de la obra usa “Lord” como título cristológico/divino no explicitado por el fragmento; “el Señor” mantiene la correspondencia auditada con la traducción inglesa sin introducir una identificación más específica que el pasaje no exige.
  doctrine_reference: Cristología y uso reverencial del título divino en literatura cristiana primitiva
- issue: “Anduvieron en la rectitud del Señor” como expresión ética relacional
  english_pob_reading: they walked in the uprightness of the Lord
  chosen_spanish_reading: anduvieron en la rectitud del Señor
  alternative_spanish_readings:
  - anduvieron en la justicia del Señor
  - vivieron rectamente ante el Señor
  rationale: Conserva la metáfora de caminar y la estructura relacional del original; “rectitud” evita cargar el verso con una lectura meramente jurídica que el contexto no requiere.
  doctrine_reference: Ética de la obediencia y fidelidad al Señor
translation_notes:
  revision_awareness: El pasaje presenta concordancia alta con el inglés POB; no hay notas textuales previas ni revisiones aplicadas. La única decisión sensible fue mantener la imagen de las piedras “traídas” y el valor ético de “rectitud” frente a posibles equivalentes más interpretativos.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico natural en español sin arcaísmos innecesarios.
  - Se preservó la forma pasiva/participial del original en “son traídas” y “sin haber sido labradas”.
  - No se introdujo “Cristo” ni “Yahvé” porque el texto y el audit trail inglés no lo documentan aquí.
  - El tratamiento de “mandamientos” y “rectitud” sigue el léxico bíblico español más transparente para lectores eclesiales amplios.
