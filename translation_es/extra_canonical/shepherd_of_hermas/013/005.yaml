base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/013/005.yaml
  text: '“And those whom they were casting away and throwing aside—who are they?” “These are people who have sinned and want to repent. For this reason they were not flung far away outside the tower, because they will be useful for the building, if they repent. Therefore those who are going to repent—if they repent—will be strong in the faith, if they repent now, while the tower is being built. But if the building is completed, they no longer have a place, but will be cast out. But they have only this: to lie beside the tower.”'
translation:
  language: es
  text: '“¿Y quiénes son[a] a quienes estaban desechando y apartando?” “Estos son los que han pecado y quieren arrepentirse. Por esta razón no fueron lanzados muy lejos fuera de la torre, porque serán útiles para la edificación, si se arrepienten. Así que los que van a arrepentirse —si se arrepienten— serán fuertes en la fe, si ahora se arrepienten, mientras se está edificando la torre. Pero si la edificación se completa, ya no tienen lugar, sino que serán echados fuera. Pero tienen solo esto: yacer junto a la torre.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «desechando y apartando» conserva la duplicación verbal del griego y del inglés POB para intensificar la imagen de rechazo, pero con una formulación más natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπορρίπτοντες / ἀπορρίψαντες (casting away, throwing aside)
  english_pob_choice: casting away and throwing aside
  chosen_spanish: arrojando y echando fuera
  alternatives_spanish:
  - desechando y apartando
  - arrojando y apartando
  lexicon: ἀπορρίπτω
  rationale: Mantengo la duplicación verbal del griego y del inglés POB para conservar la imagen de expulsión/descarto sin suavizarla. «Echar fuera» es natural en español y preserva el valor fuerte de rechazo.
- source_word: μετανοεῖν / μετανοήσουσιν (repent)
  english_pob_choice: repent
  chosen_spanish: arrepentirse
  alternatives_spanish:
  - hacer penitencia
  - cambiar de mente
  lexicon: μετανοέω
  rationale: En este contexto el sentido es moral y volitivo, no meramente cognitivo; por eso «arrepentirse» comunica mejor la intención que un calco como «cambiar de mente».
- source_word: οἰκοδομή (building)
  english_pob_choice: building
  chosen_spanish: edificación
  alternatives_spanish:
  - construcción
  - obra
  lexicon: οἰκοδομή
  rationale: «Edificación» mantiene el campo semántico de construcción y además suena natural en un contexto eclesial/imagético de la torre. «Construcción» sería posible, pero menos resonante en español bíblico.
- source_word: πίστις (faith)
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  lexicon: πίστις
  rationale: «Fe» es la equivalencia directa y clara en español. El contexto no exige «fidelidad», aunque esa posible matización queda implícita en la constancia de arrepentirse ahora.
- source_word: τόπος (place)
  english_pob_choice: no longer have a place
  chosen_spanish: ya no tienen lugar
  alternatives_spanish:
  - ya no tienen sitio
  - ya no tendrán lugar
  lexicon: τόπος
  rationale: «Tener lugar» es idiomático y conserva la exclusión del proyecto de la torre cuando la obra ya esté concluida.
- source_word: παραβεβλημένοι / lie beside
  english_pob_choice: lie beside the tower
  chosen_spanish: yacer junto a la torre
  alternatives_spanish:
  - quedar tendidos junto a la torre
  - estar acostados junto a la torre
  lexicon: παραβάλλω / παράκειται
  rationale: El verbo «yacer» transmite la postura pasiva y final del texto. «Junto a la torre» reproduce la cercanía sin añadir interpretación.
theological_decisions:
- issue: La posibilidad de arrepentimiento antes de que termine la construcción de la torre
  english_pob_reading: Those who are going to repent—if they repent—will be strong in the faith, if they repent now, while the tower is being built.
  chosen_spanish_reading: Los que van a arrepentirse —si se arrepienten— serán fuertes en la fe, si ahora se arrepienten, mientras la torre está siendo edificada.
  alternative_spanish_readings:
  - los que van a arrepentirse, si se arrepienten, serán fuertes en la fe
  - los que se arrepientan ahora serán fuertes en la fe
  rationale: Conservo la repetición condicionada porque el texto insiste en la oportunidad limitada del arrepentimiento antes de la conclusión de la torre. Suavizarla borraría la tensión escatológica del pasaje.
  doctrine_reference: Exhortación moral con límite temporal dentro de la alegoría de la construcción; no formular una doctrina sistemática fuera del texto.
- issue: La utilidad de los pecadores arrepentidos para la edificación
  english_pob_reading: because they will be useful for the building, if they repent.
  chosen_spanish_reading: porque serán útiles para la edificación, si se arrepienten.
  alternative_spanish_readings:
  - porque servirán para la construcción, si se arrepienten
  - porque serán provechosos para la edificación, si se arrepienten
  rationale: 'Mantengo el condicional y el valor instrumental del original: el arrepentimiento no borra la utilidad, sino que la hace posible dentro del marco narrativo de la torre.'
  doctrine_reference: Alegoría de incorporación útil tras el arrepentimiento, sin negar la gravedad del pecado previo.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparece exactamente en el texto español donde corresponde. No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo «torre» de forma uniforme para la figura central del pasaje.
  - Se mantuvo la repetición de «si se arrepienten» para reflejar el énfasis condicional del original.
  - Se prefirió español bíblico claro y moderno, evitando calcos innecesarios pero preservando la estructura argumentativa del texto.
