revisions:
- from: '“¿Y quiénes son aquellos que estaban arrojando y echando fuera?[a]” “Estos son los que han pecado y quieren arrepentirse. Por esta razón no fueron lanzados muy lejos fuera de la torre, porque serán útiles para la edificación, si se arrepienten. Así que los que van a arrepentirse —si se arrepienten— serán fuertes en la fe, si ahora se arrepienten, mientras la torre está siendo edificada. Pero si la edificación se completa, ya no tienen lugar, sino que serán echados fuera. Pero tienen solo esto: yacer junto a la torre.”'
  to: '“¿Y quiénes son[a] a quienes estaban desechando y apartando?” “Estos son los que han pecado y quieren arrepentirse. Por esta razón no fueron lanzados muy lejos fuera de la torre, porque serán útiles para la edificación, si se arrepienten. Así que los que van a arrepentirse —si se arrepienten— serán fuertes en la fe, si ahora se arrepienten, mientras se está edificando la torre. Pero si la edificación se completa, ya no tienen lugar, sino que serán echados fuera. Pero tienen solo esto: yacer junto a la torre.”'
  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad del español sin alterar el sentido del original ni del audit trail inglés: se refinó la pregunta inicial, se mantuvo la duplicación verbal con mejor idiomaticidad y se aligeró una perífrasis pasiva.'
