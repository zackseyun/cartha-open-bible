base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/013/004.yaml
  text: “And the ones being brought and set into the building—who are they?” “They are new in the faith and faithful. But they are being admonished by the angels to do good, because evil was found in them.”
translation:
  language: es
  text: '«¿Y los que son traídos y puestos en el edificio[a], quiénes son?» «Son nuevos en la fe y fieles. Pero los ángeles los están amonestando a hacer el bien, porque se halló mal en ellos».


    [a] edificio: aquí conserva la imagen del “edificio”/construcción, que en el contexto alegórico puede referirse a la edificación espiritual, sin explicitarla en el texto principal.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “edificio” mantiene la imagen arquitectónica del pasaje; en este contexto alegórico puede aludir a la construcción espiritual.
    reason: cultural_note
lexical_decisions:
- source_word: brought and set into the building
  english_pob_choice: brought and set into the building
  chosen_spanish: son traídos y puestos en el edificio
  alternatives_spanish:
  - son llevados y colocados en la construcción
  - son introducidos y puestos en la edificación
  lexicon: ἄγω / τίθημι + οἰκοδομή
  rationale: 'Conservo la secuencia verbal doble del griego/inglés: movimiento hacia dentro y colocación dentro de la imagen arquitectónica. ''Edificio'' mantiene la metáfora concreta sin convertirla de entrada en una abstracción interpretativa; ''edificación'' sería más interpretativo.'
- source_word: new in the faith
  english_pob_choice: new in the faith
  chosen_spanish: nuevos en la fe
  alternatives_spanish:
  - recién llegados a la fe
  - nuevos en la creencia
  lexicon: καινοί / πίστις
  rationale: '''Nuevos en la fe'' reproduce la cualidad de novedad en relación con la fe como ámbito de pertenencia y experiencia, con español natural y eclesialmente inteligible.'
- source_word: faithful
  english_pob_choice: faithful
  chosen_spanish: fieles
  alternatives_spanish:
  - leales
  - confiables
  lexicon: πιστοί
  rationale: '''Fieles'' es el equivalente más directo y común para πιστοί en contexto religioso, preservando tanto la idea de fiabilidad como la de perseverancia creyente.'
- source_word: admonished
  english_pob_choice: being admonished
  chosen_spanish: los ángeles los están amonestando
  alternatives_spanish:
  - los ángeles los están exhortando
  - los ángeles los están reprendiéndo
  lexicon: νουθετέω
  rationale: '''Amonestar'' conserva la fuerza correctiva/exhortativa sin volverla más dura que el original. En español permite la idea de instrucción disciplinaria por parte de los ángeles.'
- source_word: do good
  english_pob_choice: do good
  chosen_spanish: hacer el bien
  alternatives_spanish:
  - practicar el bien
  - obrar bien
  lexicon: ἀγαθοποιεῖν
  rationale: '''Hacer el bien'' es la formulación más transparente y fiel para la acción moral continuada, sin añadir matices ajenos.'
- source_word: evil was found in them
  english_pob_choice: evil was found in them
  chosen_spanish: se halló mal en ellos
  alternatives_spanish:
  - se encontró mal en ellos
  - se descubrió mal en ellos
  lexicon: κακόν εὑρέθη ἐν αὐτοῖς
  rationale: '''Se halló mal en ellos'' sigue de cerca la pasiva del griego y mantiene la tensión de hallazgo/descubrimiento. ''Mal'' conserva la indeterminación del sustantivo, evitando especificar actos concretos que el texto no nombra.'
theological_decisions:
- issue: Identidad de los que son traídos y puestos en el edificio
  english_pob_reading: They are new in the faith and faithful.
  chosen_spanish_reading: Son nuevos en la fe y fieles.
  alternative_spanish_readings:
  - Son nuevos en la fe y creyentes fieles
  - Son recién convertidos y fieles
  rationale: Mantengo la descripción doble sin resolverla en una categoría eclesiástica más técnica. El texto distingue novedad en la fe y fidelidad; la traducción conserva ambas notas sin sobreinterpretar el estatus de los referidos.
  doctrine_reference: Ecclesiology / moral formation in apocalyptic allegory
- issue: Agencia angélica en la amonestación moral
  english_pob_reading: they are being admonished by the angels to do good
  chosen_spanish_reading: los ángeles los están amonestando a hacer el bien
  alternative_spanish_readings:
  - los ángeles les exhortan a hacer el bien
  - son amonestados por los ángeles para hacer el bien
  rationale: Conservo la mediación angelical explícita del pasaje. No la suavizo ni la reemplazo por una voz genérica, porque la tensión entre exhortación celestial y conducta moral pertenece al sentido del texto.
  doctrine_reference: Angelology / moral exhortation
- issue: Causa de la amonestación
  english_pob_reading: because evil was found in them
  chosen_spanish_reading: porque se halló mal en ellos
  alternative_spanish_readings:
  - porque se encontró mal en ellos
  - porque fue hallado mal en ellos
  rationale: La pasiva impersonal preserva el tono de constatación del texto. No especifico el tipo de mal, porque el griego y la traducción inglesa no lo detallan; así se mantiene la ambigüedad moral del original.
  doctrine_reference: Sinlessness / moral inspection
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete de auditoría. La versión inglesa POB más reciente presenta acuerdo moderado con observaciones menores; esta propuesta sigue ese texto base sin introducir cambios interpretativos sustantivos.
  spanish_consistency_notes:
  - Uso 'Dios'/'Yahvé' no aplica en este versículo.
  - Conservo 'ángeles' en plural y la voz pasiva/impersonal donde el griego y el inglés la muestran.
  - Evito 'siervos', 'justos' o 'edificación' para no desplazar la metáfora ni intensificar el juicio moral más allá del texto.
