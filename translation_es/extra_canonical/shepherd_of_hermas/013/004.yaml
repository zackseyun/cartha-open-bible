review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del griego auditado por el POB: pregunta por los que son llevados y colocados en la construcción, identificación como nuevos en la fe y fieles, y explicación de que los ángeles los corrigen/exhortan porque se halló mal en ellos. Sin embargo, la formulación verbal puede alinearse mejor con el inglés auditado en dos puntos: 1) ''puestos en el edificio'' suena menos natural que ''colocados en el edificio''; 2) ''los están amonestando a hacer el bien'' es comprensible, pero en español ''amonestar a hacer'' suena algo forzado, y conviene una estructura más idiomática que preserve la fuerza de νουθετέω sin perder claridad.'
  spanish_quality_summary: El texto es legible y digno, pero la nota [a] no es necesaria porque 'edificio' ya es claro en español y la instrucción pide no crear notas sin necesidad real. Además, la nota en el bloque de texto y el objeto de nota no coinciden exactamente en redacción, aunque sí en contenido. Una ligera revisión mejora naturalidad y elimina carga explicativa innecesaria.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''Fe'', ''fieles'', ''bien'' y ''mal'' están bien. ''Edificio'' es aceptable para οἰκοδομή en esta imagen. La principal mejora es estilística/sintáctica: preferir ''colocados'' y una construcción más natural para la admonición angélica.'
  issues:
  - severity: medium
    issue: 'Construcción poco natural: ''los están amonestando a hacer el bien'''
    rationale: 'Aunque fiel al inglés, en español suena forzado con ''amonestar a + infinitivo''. ''Los están exhortando a hacer el bien'' o ''los amonestan para que hagan el bien'' fluye mejor. Dado que el borrador defendió ''amonestar'' por la fuerza correctiva, puede mantenerse con una estructura más idiomática: ''los están amonestando para que hagan el bien''.'
  - severity: low
    issue: '''Puestos en el edificio'' es correcto pero menos idiomático que ''colocados en el edificio'''
    rationale: La secuencia doble del original se conserva mejor en español natural con 'traídos y colocados', sin perder la imagen arquitectónica.
  - severity: low
    issue: Nota [a] innecesaria
    rationale: '''Edificio'' no crea una ambigüedad problemática que requiera nota, y la explicación alegórica ya está suficientemente preservada por el contexto. Eliminarla simplifica y ajusta la disciplina de notas.'
  revised_spanish_text: «¿Y los que son traídos y colocados en el edificio, quiénes son?» «Son nuevos en la fe y fieles. Pero los ángeles los están amonestando para que hagan el bien, porque se halló mal en ellos».
  revision_rationale: 'Se hacen ajustes menores para mejorar la naturalidad del español sin alterar el sentido fuente: ''colocados'' en vez de ''puestos'', y ''amonestando para que hagan el bien'' en vez de ''amonestando a hacer el bien''. Se elimina la nota sobre ''edificio'' por innecesaria.'
