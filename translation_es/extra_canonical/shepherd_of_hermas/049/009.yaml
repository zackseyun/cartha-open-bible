  text: 1. He showed me again many trees, some sprouting and others dry, and he says to me, “Do you see these trees?” “I see,” I say, “sir, some sprouting and others dry.”
translation:
  language: es
  text: '1. Me mostró de nuevo muchos árboles, unos brotando y otros secos, y me dice: «¿Ves estos árboles?». «Sí, señor, los veo: unos brotando y otros secos».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔδειξέν μοι πάλιν πολλὰ δένδρα
  english_pob_choice: He showed me again many trees
  chosen_spanish: Me mostró de nuevo muchos árboles
  alternatives_spanish:
  - Me enseñó otra vez muchos árboles
  - Me mostró otra vez muchos árboles
  lexicon: δένδρα
  rationale: «Árboles» reproduce el sustantivo concreto sin ampliar ni espiritualizar. «De nuevo» conserva πάλιν con naturalidad en español y mantiene el valor narrativo de repetición.
- source_word: τὰ μὲν βλαστάνοντα τὰ δὲ ξηρά
  english_pob_choice: some sprouting and others dry
  chosen_spanish: unos brotando y otros secos
  alternatives_spanish:
  - unos que brotan y otros secos
  - unos brotantes y otros secos
  lexicon: βλαστάνοντα / ξηρά
  rationale: «Brotando» conserva la imagen verbal de crecimiento en curso. «Secos» expresa ξηρά con sencillez y fidelidad; «árboles secos» es idiomático en español sin añadir interpretación.
- source_word: Καὶ λέγει μοι
  english_pob_choice: and he says to me
  chosen_spanish: y me dice
  alternatives_spanish:
  - y me dijo
  - y me estaba diciendo
  lexicon: λέγει
  rationale: Se mantiene el presente narrativo del griego y del inglés POB, que da vivacidad al relato visionario.
- source_word: Βλέπεις ταῦτα τὰ δένδρα;
  english_pob_choice: Do you see these trees?
  chosen_spanish: ¿Ves estos árboles?
  alternatives_spanish:
  - ¿Ves esos árboles?
  - ¿Miras estos árboles?
  lexicon: βλέπεις
  rationale: «¿Ves…?» es la correspondencia directa y natural; «estos» conserva la proximidad de ταῦτα en el diálogo.
- source_word: Βλέπω, φημί, κύριε
  english_pob_choice: I see, I say, sir
  chosen_spanish: Los veo», digo, «señor
  alternatives_spanish:
  - Los veo», respondo, «señor
  - Veo», digo, «señor
  lexicon: κύριε
  rationale: Se conserva el vocativo respetuoso sin forzar una equivalencia religiosa no explicitada en este segmento. «Los veo» es más idiomático que repetir «veo» en español.
- source_word: τὰ μὲν βλαστάνοντα τὰ δὲ ξηρά
  english_pob_choice: some sprouting and others dry
  chosen_spanish: unos brotando y otros secos
  alternatives_spanish:
  - unos brotando y otros áridos
  - unos floreciendo y otros secos
  lexicon: βλαστάνοντα / ξηρά
  rationale: «Secos» es el equivalente más directo y transparente. «Áridos» es posible pero más abstracto; «floreciendo» añade una imagen no presente en el griego.
theological_decisions:
- issue: El vocativo κύριε en una obra cristiana temprana puede sonar a «Señor», pero aquí funciona como tratamiento de respeto al interlocutor.
  english_pob_reading: sir
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - Señor
  - maestro
  rationale: Se eligió «señor» en minúscula para reflejar el valor de cortesía del intercambio y evitar introducir una lectura cristológica no requerida por el contexto inmediato.
  doctrine_reference: Cristología / pragmática del vocativo
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete inglés; la redacción española sigue el texto fuente griego y la línea óptima del POB inglés, sin añadir notas textuales ni variantes documentadas en este segmento.
  spanish_consistency_notes:
  - Se mantiene el presente narrativo («me dice») para concordar con el griego y con el auditable choice del inglés POB.
  - Se evita sustituir «bro tando» por un verbo interpretativo como «floreciendo», para no debilitar la imagen concreta del original.
  - «Señor» se usa solo como vocativo de respeto en minúscula, no como sustituto de un nombre divino.
