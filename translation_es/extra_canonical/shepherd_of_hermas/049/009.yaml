    issue: Puntuación y orden del discurso directo en la segunda respuesta
    rationale: 'La secuencia «Los veo», digo, «señor: unos brotando y otros secos» es comprensible, pero en español suena forzada por la inserción de «digo» y del vocativo antes de los dos miembros finales. Reordenar a «Sí, señor, los veo: unos brotando y otros secos» conserva el contenido y mejora mucho la naturalidad.'
