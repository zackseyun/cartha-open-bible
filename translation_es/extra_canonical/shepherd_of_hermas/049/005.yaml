  yaml_path: translation/extra_canonical/shepherd_of_hermas/049/005.yaml
  text: 1. He showed me many trees that had no leaves, but they seemed to me to be dry; for they were all alike. And he says to me, “Do you see these trees?” “I see,” I say, “sir, that they are alike and dry.” Answering, he says to me, “These trees that you see are those who dwell in this age.”
translation:
  language: es
  text: '1. Me mostró muchos árboles que no tenían hojas, pero me parecían secos, porque todos eran iguales. Y me dice: «¿Ves estos árboles?». «Veo», digo, «señor, que son iguales y secos». Respondiendo, me dice: «Estos árboles que ves son los que habitan en este siglo[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «esta era». Gr. αἰών, con sentido de tiempo o era presente, no del mundo material.'
    reason: Aclara el valor temporal/escatológico de αἰών y evita que «siglo» se entienda de modo demasiado estrecho o cronológico.
lexical_decisions:
- source_word: δένδρα
  english_pob_choice: trees
  chosen_spanish: árboles
  alternatives_spanish:
  - árboles frutales
  - maderas
  lexicon: δένδρον
  rationale: El griego habla de árboles en sentido general; «árboles» conserva el referente sin añadir especificación no presente en el texto.
- source_word: ἄφυλλα
  english_pob_choice: had no leaves
  chosen_spanish: no tenían hojas
  alternatives_spanish:
  - sin hojas
  - desnudos
  lexicon: ἄφυλλος
  rationale: La construcción negativa explícita reproduce fielmente la ausencia de hojas; «no tenían hojas» es claro y natural en español.
- source_word: ξηρά
  english_pob_choice: dry
  chosen_spanish: secos
  alternatives_spanish:
  - áridos
  - marchitos
  lexicon: ξηρός
  rationale: «Secos» mantiene el valor básico de ξηρός y funciona bien para árboles; «marchitos» introduciría una imagen más vegetal que el griego no obliga.
- source_word: ὅμοια
  english_pob_choice: alike
  chosen_spanish: iguales
  alternatives_spanish:
  - semejantes
  - parecidos
  lexicon: ὅμοιος
  rationale: El contexto enfatiza que todos los árboles eran del mismo aspecto; «iguales» comunica bien la uniformidad observada.
- source_word: οἰκοῦντες
  english_pob_choice: dwell
  chosen_spanish: habitan
  alternatives_spanish:
  - viven
  - residen
  lexicon: οἰκέω
  rationale: «Habitan» conserva el matiz de morar/permanecer y suena más solemne que «viven» en este contexto visionario.
- source_word: αἰών
  english_pob_choice: this age
  chosen_spanish: esta edad
  alternatives_spanish:
  - este siglo
  - este mundo
  lexicon: αἰών
  rationale: «Edad» refleja el trasfondo temporal/era de αἰών mejor que «mundo», y evita una identificación innecesaria con el cosmos material.
theological_decisions:
- issue: Identificación de los árboles con personas de la era presente
  english_pob_reading: These trees that you see are those who dwell in this age.
  chosen_spanish_reading: Estos árboles que ves son los que habitan en esta edad.
  alternative_spanish_readings:
  - Estos árboles que ves son los que viven en este siglo.
  - Estos árboles que ves son los que habitan en este mundo.
  rationale: La frase conserva la interpretación simbólica sin explicitar más de lo que el texto dice. «Esta edad» mantiene el valor escatológico-temporal de αἰών y el lenguaje figurado de la visión.
  doctrine_reference: Uso simbólico de la visión; escatología de los dos tiempos
translation_notes:
  revision_awareness: No se aplicaron revisiones previas en el paquete inglés; la versión española sigue de cerca la estructura del texto fuente y la traducción auditada en inglés, preservando la repetición y la identificación simbólica final.
  spanish_consistency_notes:
  - Se mantuvo «señor» como tratamiento directo para respetar la escena dialógica y la convención del texto auditado.
  - Se usó puntuación española estándar con comillas angulares para el discurso directo.
  - Se preservó la repetición de «secos» y «iguales» para reproducir el efecto descriptivo acumulativo del original.
