    issue: ‘en aquel siglo’ suena ambiguo y poco natural para ‘in that age’
    rationale: Aunque ‘siglo’ puede ocasionalmente significar ‘era’, en español contemporáneo y eclesial amplio suele entenderse como periodo de cien años o como giro demasiado calcado. ‘En aquella era’ preserva mejor el matiz escatológico del POB y mejora la legibilidad.
