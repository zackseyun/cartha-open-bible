  text: 4. “But the Gentiles and the sinners—like the dry trees you saw—will be found such, dry and fruitless in that age, and as …”
translation:
  language: es
  text: '4. “Pero los gentiles y los pecadores—como los árboles secos que viste—serán hallados así: secos y sin fruto en aquella era, y como …”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔθνη / Gentiles
  english_pob_choice: Gentiles
  chosen_spanish: gentiles
  alternatives_spanish:
  - naciones
  - paganos
  lexicon: ἔθνη
  rationale: En este contexto apocalíptico y moral, la referencia contrasta a quienes están fuera del pueblo fiel; ‘gentiles’ conserva el valor étnico-religioso del término sin convertirlo en un prejuicio meramente cultural.
- source_word: ἁμαρτωλοί / sinners
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - impuros
  - malvados
  lexicon: ἁμαρτωλοί
  rationale: ‘Pecadores’ es la correspondencia directa y mantiene el contraste moral del pasaje sin añadir matices que no están explícitos en el griego.
- source_word: ξηρά δένδρα / dry trees
  english_pob_choice: dry trees
  chosen_spanish: árboles secos
  alternatives_spanish:
  - árboles marchitos
  - árboles sin savia
  lexicon: ξηρός
  rationale: ‘Secos’ reproduce la imagen física de desecación del original y conserva la metáfora de esterilidad espiritual con la mínima expansión posible.
- source_word: ἄκαρπα / fruitless
  english_pob_choice: fruitless
  chosen_spanish: sin fruto
  alternatives_spanish:
  - estériles
  - infructuosos
  lexicon: ἄκαρπος
  rationale: ‘Sin fruto’ sigue de cerca la imagen arbórea del pasaje y evita cargar el término con una abstracción excesiva; en español suena natural y fiel a la metáfora.
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ / in that age
  english_pob_choice: in that age
  chosen_spanish: en aquel siglo
  alternatives_spanish:
  - en aquella edad
  - en aquel tiempo
  lexicon: ἐκείνη
  rationale: La lectura contextual apunta a una era escatológica, no simplemente a un día cronológico. ‘Siglo’ conserva el valor de ‘era’/‘edad’ y refleja bien la intención apocalíptica del texto.
theological_decisions:
- issue: Alcance escatológico de ‘that age’
  english_pob_reading: in that age
  chosen_spanish_reading: en aquel siglo
  alternative_spanish_readings:
  - en aquel tiempo
  - en aquella edad
  rationale: Se mantiene la referencia a una condición/era futura de juicio, no a un instante puntual. ‘Siglo’ en español eclesial puede comunicar ‘era’ o ‘edad’ y preserva la tensión escatológica del griego.
  doctrine_reference: escatología; juicio final
translation_notes:
  revision_awareness: No se registran revisiones previas en el paquete. La frase inglesa auditada queda claramente cortada con una elipsis final (‘and as …’), así que la versión española conserva esa interrupción sin intentar completarla.
  spanish_consistency_notes:
  - 'Se conserva la estructura enumerativa del original: contraste (‘Pero’), doble sujeto (‘los gentiles y los pecadores’) y comparación con los ‘árboles secos’.'
  - Se mantiene la elipsis final porque el expediente fuente ya presenta el texto truncado; no debe suplirse material no atestiguado.
  - Se usa puntuación española con raya para el inciso comparativo, respetando la cadencia del enunciado original.
