  text: 9. Thus both become partners in the work of the righteous one. Therefore the one who does these things will not be abandoned by God, but will be inscribed in the books of the living.
translation:
  language: es
  text: 9. Así, ambos llegan a ser compañeros en la obra del justo. Por tanto, el que hace estas cosas no será abandonado por Dios, sino que será inscrito en los libros de los vivos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δίκαιος / τοῦ δικαίου
  english_pob_choice: the righteous one
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el hombre justo
  lexicon: δικαιοσύνη / δίκαιος
  rationale: El contexto habla de la obra del justo como agente moral, no de un título técnico. «El justo» conserva la fuerza ética y la forma breve del griego, sin imponer una lectura más doctrinal de lo necesario.
- source_word: κοινωνοί
  english_pob_choice: partners
  chosen_spanish: compañeros
  alternatives_spanish:
  - participantes
  - socios
  lexicon: κοινωνός
  rationale: En español, «compañeros» comunica bien la participación compartida en una obra común. «Participantes» sería más literal pero menos natural; «socios» suena comercial y no conviene aquí.
- source_word: ἔργον
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - acción
  lexicon: ἔργον
  rationale: «Obra» mantiene el sentido de una actividad concreta y con valor moral o religioso, que encaja mejor que «trabajo» en este contexto.
- source_word: ὁ ποιῶν ταῦτα
  english_pob_choice: the one who does these things
  chosen_spanish: el que hace estas cosas
  alternatives_spanish:
  - el que practica estas cosas
  - quien hace estas cosas
  lexicon: ποιέω
  rationale: «Hace estas cosas» sigue de cerca el griego y conserva la amplitud de ποιέω. «Practica» podría sugerir una repetición técnica que no está explícita.
- source_word: οὐ μὴ ἐγκαταλειφθήσεται ὑπὸ τοῦ θεοῦ
  english_pob_choice: will not be abandoned by God
  chosen_spanish: no será abandonado por Dios
  alternatives_spanish:
  - Dios no lo abandonará
  - no quedará desamparado por Dios
  lexicon: ἐγκαταλείπω
  rationale: La pasiva española «no será abandonado por Dios» reproduce bien la voz del griego y la relación agente-paciente. «Desamparado» es posible, pero menos directo.
- source_word: βιβλίοις τῶν ζώντων
  english_pob_choice: the books of the living
  chosen_spanish: los libros de los vivos
  alternatives_spanish:
  - el libro de los vivos
  - los libros de vida
  lexicon: βιβλίον
  rationale: Se mantiene el plural del griego y la imagen tradicional de registros celestiales. «Los libros de vida» suavizaría la construcción y podría perder la referencia concreta a libros/registros.
theological_decisions:
- issue: Participación en la obra del justo
  english_pob_reading: both become partners in the work of the righteous one
  chosen_spanish_reading: ambos llegan a ser compañeros en la obra del justo
  alternative_spanish_readings:
  - ambos se hacen partícipes de la obra del justo
  - ambos son asociados en la obra del justo
  rationale: La frase conserva la cooperación moral entre ambos sujetos sin convertirla en una afirmación eclesial más específica de lo que exige el texto. «Compañeros» deja abierta la relación de participación compartida.
  doctrine_reference: ética de la cooperación en obras justas
- issue: No abandono divino y registro escatológico
  english_pob_reading: will not be abandoned by God, but will be inscribed in the books of the living
  chosen_spanish_reading: no será abandonado por Dios, sino que será inscrito en los libros de los vivos
  alternative_spanish_readings:
  - Dios no lo abandonará, sino que lo inscribirá en los libros de los vivos
  - no quedará desamparado por Dios, sino inscrito en los libros de los vivos
  rationale: Se preserva el contraste entre perseverancia divina y destino inscrito. «Inscrito» mantiene el lenguaje administrativo/judicial del registro final sin ampliar el contenido doctrinal.
  doctrine_reference: perseverancia y juicio final
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete actual; la redacción española sigue directamente el texto griego normalizado y el rastro auditado en inglés, sin depender de una cadena de revisiones previas.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se introduce «SEÑOR», ya que el pasaje no requiere el nombre divino.
  - Se conserva el plural «los libros de los vivos» como reflejo del griego y del inglés auditado.
  - No se emplea terminología eclesiástica más fuerte que la evidenciada por el texto fuente.
