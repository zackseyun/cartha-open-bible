  text: 10. Blessed are those who have and understand that they are made rich by the Lord; for those who think this way will be able to do some good.
translation:
  language: es
  text: 10. Bienaventurados los que tienen y entienden que han sido enriquecidos por el Señor; porque los que piensan de esta manera podrán hacer algún bien.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Dichosos
  - Felices
  lexicon: μακάριος
  rationale: ‘Bienaventurados’ conserva el tono declarativo y solemne de la bienaventuranza sin reducirlo a una mera emoción subjetiva; encaja bien con el registro de una sentencia sapiencial/religiosa.
- source_word: ἔχοντες καὶ συνιέντες
  english_pob_choice: who have and understand
  chosen_spanish: los que tienen y entienden
  alternatives_spanish:
  - los que poseen y comprenden
  - los que tienen y perciben
  lexicon: ἔχω / συνίημι
  rationale: 'Mantengo la coordinación verbal del griego: no solo poseer, sino también comprender. ‘Entienden’ expresa la fuerza cognitiva de συνιέντες con naturalidad en español.'
- source_word: πεπλουτημένους ὑπὸ τοῦ Κυρίου
  english_pob_choice: that they are made rich by the Lord
  chosen_spanish: que han sido enriquecidos por el Señor
  alternatives_spanish:
  - que el Señor los ha enriquecido
  - que son hechos ricos por el Señor
  lexicon: πλουτίζω / κύριος
  rationale: ‘Han sido enriquecidos’ conserva el pasivo y la idea de acción recibida. ‘Señor’ sigue el inglés POB en este contexto de κύριος; no se introduce ‘Yahvé’ porque el texto griego aquí no explicita el nombre divino, sino el título.
- source_word: τοῦτον γὰρ τὸν τρόπον φρονήσαντες
  english_pob_choice: for those who think this way
  chosen_spanish: porque los que piensan de esta manera
  alternatives_spanish:
  - porque los que tienen esta manera de pensar
  - pues quienes tengan esta mentalidad
  lexicon: φρονέω
  rationale: ‘Piensan de esta manera’ reproduce bien el sentido de actitud/disposición mental, no solo de acto intelectual aislado. Evita volverlo demasiado abstracto.
- source_word: δυνήσονται καὶ εὐεργετήσειν
  english_pob_choice: will be able to do some good
  chosen_spanish: podrán hacer algún bien
  alternatives_spanish:
  - podrán hacer obras buenas
  - serán capaces de beneficiar a otros
  lexicon: εὐεργετεῖν
  rationale: '‘Hacer algún bien’ conserva el alcance general y algo modesto del verbo griego: realizar acciones beneficiosas. ‘Algún’ refleja la indefinición del original sin exagerar.'
theological_decisions:
- issue: Naturaleza de la ‘riqueza’ atribuida al Señor
  english_pob_reading: made rich by the Lord
  chosen_spanish_reading: han sido enriquecidos por el Señor
  alternative_spanish_readings:
  - han recibido riqueza del Señor
  - han sido hechos ricos por el Señor
  rationale: La frase apunta a una riqueza recibida de origen divino, no necesariamente material. ‘Enriquecidos’ mantiene esa amplitud y la dependencia del agente divino sin especificar más de lo que el texto ofrece.
  doctrine_reference: Providencia divina / bienes recibidos de Dios
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; la redacción española se apoya directamente en el griego normalizado y en la equivalencia funcional del POB inglés, sin cambios textuales documentados que deban reflejarse.
  spanish_consistency_notes:
  - Se mantiene ‘Señor’ para κύριος en armonía con el texto griego aquí presentado y con el contexto inmediato del enunciado.
  - Se conserva un registro solemne y sapiencial, evitando modernizaciones coloquiales que debiliten la forma de bienaventuranza.
  - ‘Enriquecidos’ se usa en sentido amplio, no como referencia exclusiva a prosperidad material.
