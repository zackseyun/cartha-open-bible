  yaml_path: translation/extra_canonical/shepherd_of_hermas/049/007.yaml
  text: 3. “For just as in winter the trees, having cast off their leaves, are alike, and it is not apparent which are dry or which are living, so in this age neither the righteous nor the sinners are apparent, but all are alike.”
translation:
  language: es
  text: 3. Porque así como en invierno los árboles, después de haber perdido sus hojas, son semejantes, y no es evidente cuáles están secos y cuáles están vivos, así también en este siglo no se distinguen ni los justos ni los pecadores, sino que todos son semejantes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χειμών / winter
  english_pob_choice: winter
  chosen_spanish: invierno
  alternatives_spanish:
  - estación invernal
  lexicon: No aplicable
  rationale: La imagen temporal es directa y natural en español; 'invierno' conserva la referencia estacional sin añadir matices.
- source_word: δένδρα / trees
  english_pob_choice: the trees
  chosen_spanish: los árboles
  alternatives_spanish:
  - los árboles del campo
  lexicon: No aplicable
  rationale: '''Árboles'' reproduce el referente común del símil y suena natural en español.'
- source_word: τὰ φύλλα / their leaves
  english_pob_choice: their leaves
  chosen_spanish: sus hojas
  alternatives_spanish:
  - las hojas de ellos
  lexicon: No aplicable
  rationale: '''Sus hojas'' es la formulación idiomática en español y conserva la posesión sin ambigüedad.'
- source_word: ἀποβαλόντα / having cast off
  english_pob_choice: having cast off
  chosen_spanish: después de haber soltado
  alternatives_spanish:
  - habiendo desprendido
  - tras perder
  lexicon: No aplicable
  rationale: El participio expresa una acción previa; 'haber soltado' mantiene la imagen de desprenderse de las hojas sin rigidizar la sintaxis.
- source_word: ὁμοῖα / alike
  english_pob_choice: are alike
  chosen_spanish: son semejantes entre sí
  alternatives_spanish:
  - son iguales
  - se parecen
  lexicon: No aplicable
  rationale: '''Semejantes entre sí'' conserva la comparación del símil y evita la idea de identidad absoluta que ''iguales'' podría sugerir.'
- source_word: δῆλον / apparent
  english_pob_choice: it is not apparent
  chosen_spanish: no se hace evidente
  alternatives_spanish:
  - no se distingue
  - no resulta visible
  lexicon: No aplicable
  rationale: La construcción impersonal expresa bien la ausencia de discernimiento visible o reconocido en español.
- source_word: ξηρά / dry
  english_pob_choice: dry
  chosen_spanish: secos
  alternatives_spanish:
  - áridos
  lexicon: No aplicable
  rationale: '''Secos'' es el equivalente natural para árboles sin vida vegetal; ''áridos'' suena menos directo en este contexto.'
- source_word: ζῶντα / living
  english_pob_choice: living
  chosen_spanish: viven
  alternatives_spanish:
  - están vivos
  lexicon: No aplicable
  rationale: '''Viven'' mantiene el contraste dinámico con ''secos'' y conserva la imagen de vida vegetal activa.'
- source_word: αἰών / this age
  english_pob_choice: this age
  chosen_spanish: este siglo
  alternatives_spanish:
  - esta era
  - este tiempo
  lexicon: No aplicable
  rationale: '''Este siglo'' sigue la elección del inglés POB y reproduce la idea de la presente era histórica, no solo del calendario de cien años.'
- source_word: δίκαιοι / righteous
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justificados
  lexicon: No aplicable
  rationale: '''Justos'' es el equivalente estándar para el grupo moral/relacional descrito por el griego y coincide con el contraste del texto.'
- source_word: ἁμαρτωλοί / sinners
  english_pob_choice: the sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los impíos
  - los culpables
  lexicon: No aplicable
  rationale: '''Pecadores'' conserva el contraste habitual con ''justos'' y sigue la semántica del término griego.'
theological_decisions:
- issue: Visibilidad moral en el presente
  english_pob_reading: in this age neither the righteous nor the sinners are apparent, but all are alike
  chosen_spanish_reading: en este siglo no se hacen evidentes ni los justos ni los pecadores, sino que todos son semejantes
  alternative_spanish_readings:
  - en este siglo no se distinguen ni los justos ni los pecadores, sino que todos son iguales
  - en este siglo no resulta manifiesto quién es justo o pecador
  rationale: 'Se conserva la tensión del símil: la apariencia externa no permite discernir el estado moral real. ''Semejantes'' evita borrar la idea de indistinción observable sin afirmar una igualdad ontológica o moral.'
  doctrine_reference: Discernimiento moral provisional; tema sapiencial/parenético sin definición doctrinal técnica.
translation_notes:
  revision_awareness: La traducción inglesa POB aquí es breve y sin notas. La versión española sigue de cerca el símil y mantiene la estructura comparativa con una sintaxis natural en español, sin introducir glosas doctrinales.
  spanish_consistency_notes:
  - Se mantuvo 'este siglo' para conservar la consistencia con el inglés POB y con el valor de 'age' como era presente.
  - Se usó 'justos'/'pecadores' como contraste moral estable en el registro bíblico español.
  - No se añadieron notas porque el pasaje no presenta variantes textuales ni alternativas léxicas que requieran anclaje en el texto español.
