  to: 2. «¿Por qué entonces, señor, son como si estuvieran secos y fueran iguales entre sí?», digo. «Porque», dice él, «ni los justos ni los pecadores son visibles en esta era, sino que son iguales; pues esta era es invierno para los justos, y no son visibles mientras viven entre pecadores».
