base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/049/006.yaml
  text: 2. “Why then, sir, are they as if dry and alike?” I say. “Because,” he says, “neither the righteous nor the sinners are visible in this age, but they are alike; for this age is winter for the righteous, and they are not visible while dwelling among sinners.”
translation:
  language: es
  text: 2. «¿Por qué entonces, señor, son como si estuvieran secos y fueran iguales entre sí?», digo. «Porque», dice él, «ni los justos ni los pecadores son visibles en esta era, sino que son iguales; pues esta era es invierno para los justos, y no son visibles mientras viven entre pecadores».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δίκαιοι
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justificados
  lexicon: δίκαιοι
  rationale: «Justos» reproduce la fuerza ética/judicial del término de manera natural en español y sigue la opción inglesa sin introducir un matiz doctrinal adicional. «Justificados» sería demasiado interpretativo aquí.
- source_word: ἁμαρτωλοί
  english_pob_choice: the sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los que pecan
  - los impíos
  lexicon: ἁμαρτωλοί
  rationale: «Pecadores» es la correspondencia directa y transparente en español; mantiene el contraste general con «los justos» sin ampliar a «impíos», que sería más fuerte de lo que el griego exige.
- source_word: ἐν τούτῳ τῷ αἰῶνι
  english_pob_choice: in this age
  chosen_spanish: en esta era
  alternatives_spanish:
  - en este siglo
  - en este tiempo
  lexicon: ἐν τούτῳ τῷ αἰῶνι
  rationale: «Era» conserva el sentido de período/red de edad histórica y evita el posible anacronismo de «siglo» en español contemporáneo, aunque ambas opciones son viables.
- source_word: χειμὼν
  english_pob_choice: winter
  chosen_spanish: invierno
  alternatives_spanish:
  - estación invernal
  - tiempo de invierno
  lexicon: χειμών
  rationale: «Invierno» es la equivalencia directa y preserva la metáfora temporal/climática del texto, que contrasta visibilidad y condición estacional.
- source_word: φανεροί
  english_pob_choice: visible
  chosen_spanish: visibles
  alternatives_spanish:
  - manifiestos
  - evidentes
  lexicon: φανεροί
  rationale: «Visibles» sigue de cerca el valor del adjetivo y mantiene el énfasis en que no se perciben a simple vista, sin pasar a «manifiestos», que sería más interpretativo.
- source_word: ὡς ξηροί
  english_pob_choice: as if dry
  chosen_spanish: como si estuvieran secos
  alternatives_spanish:
  - como secos
  - como si fueran secos
  lexicon: ξηροί
  rationale: La forma «como si estuvieran secos» transmite con naturalidad la comparación y conserva la imagen de sequedad sin volverla explicativa. «Como secos» sería más breve, pero menos idiomático en este contexto.
- source_word: ὁμοίως
  english_pob_choice: alike
  chosen_spanish: iguales
  alternatives_spanish:
  - de la misma manera
  - semejantes
  lexicon: ὁμοίως
  rationale: «Iguales» mantiene la observación del narrador sobre la falta de distinción visible. «Semejantes» sería posible, pero menos enfático en la identidad aparente que sugiere el pasaje.
theological_decisions:
- issue: La invisibilidad de justos y pecadores en esta era
  english_pob_reading: neither the righteous nor the sinners are visible in this age, but they are alike
  chosen_spanish_reading: ni los justos ni los pecadores son visibles en esta era, sino que son iguales
  alternative_spanish_readings:
  - ni los justos ni los pecadores se ven en esta era, pero son semejantes
  - ni los justos ni los pecadores son manifiestos en esta era, sino que se parecen
  rationale: 'La redacción conserva la tensión del original: en el tiempo presente ambos grupos comparten una condición de indistinción observable. «Son visibles» evita agregar una conclusión moral que no está explicitada, y «iguales» preserva el contraste retórico del texto.'
  doctrine_reference: Similitude 4; metáfora moral de ocultamiento presente en la tradición de Hermas
- issue: La frase «esta era es invierno para los justos»
  english_pob_reading: for this age is winter for the righteous
  chosen_spanish_reading: pues esta era es invierno para los justos
  alternative_spanish_readings:
  - porque esta era es invierno para los justos
  - pues en esta era hay invierno para los justos
  rationale: Se mantiene la metáfora sin explicarla. «Es invierno» preserva la equivalencia simbólica del texto, donde la estación nombra una condición de dureza u ocultamiento, no un dato meteorológico literal.
  doctrine_reference: Lectura simbólica de la condición presente del justo en Similitude 4
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete; la versión inglesa auditada ya resuelve el pasaje con equivalencia óptima, y la propuesta española sigue de cerca esa estructura sin introducir notas textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «señor» como vocativo por fidelidad al diálogo, sin convertirlo en título teológico añadido.
  - Se traduce αἰών como «era» de forma consistente con el carácter del pasaje y para evitar una modernización excesiva.
  - No se introduce ninguna nota de pie porque el inglés auditado no contenía variantes ni alternativas documentadas para este versículo.
