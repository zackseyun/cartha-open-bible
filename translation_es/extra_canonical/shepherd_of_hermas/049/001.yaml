revisions:
- from: …ellos completan su riqueza, y, a su vez, los ricos, al proveer a los pobres de las cosas que necesitan, completan sus almas.
  to: …ellos hacen plena su riqueza, y, a su vez, los ricos, al proveer a los pobres de lo que necesitan, hacen plenas sus almas.
  rationale: Se ajusta la expresión de τελειόω a un español más natural y fiel a la idea de plenitud, y se aligera la frase sobre las necesidades de los pobres sin cambiar el sentido.
