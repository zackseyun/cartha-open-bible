review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura recíproca del griego reflejada en el inglés POB: los pobres/pertenecientes al primer grupo completan la riqueza de los ricos, y los ricos completan sus almas al suplir las necesidades de los pobres. Sin embargo, la expresión ''completan su riqueza'' suena menos natural en español y puede sugerir una suma cuantitativa algo rígida. El sentido de τελειόω aquí se entiende mejor como ''llevan a plenitud'' o ''hacen plena'' en ambas mitades, manteniendo el paralelismo moral-económico/espiritual.'
  spanish_quality_summary: El texto es claro, pero 'las cosas que necesitan' es algo pesado en español, y 'completan su riqueza' resulta poco idiomático. Una ligera revisión mejora la fluidez sin apartarse del sentido fuente. 'Lo que necesitan' es más natural que 'las cosas que necesitan', y 'hacen plena su riqueza' preserva mejor la idea de plenitud sin sonar mecánico.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Riqueza', 'los ricos', 'los pobres' y 'almas' son elecciones adecuadas. La revisión propuesta ajusta principalmente la naturalidad y la fuerza semántica de τελειόω en español.
  issues:
  - severity: medium
    issue: '''completan su riqueza'' suena poco natural en español'
    rationale: Aunque es una traducción cercana al inglés, en español eclesial general 'hacer plena su riqueza' o 'llevar a plenitud su riqueza' comunica mejor el valor de τελειόω sin rigidez literalista.
  - severity: low
    issue: '''las cosas que necesitan'' es algo pesado'
    rationale: '''Lo que necesitan'' expresa el mismo contenido de manera más idiomática y legible en español neutro.'
  revised_spanish_text: …ellos hacen plena su riqueza, y, a su vez, los ricos, al proveer a los pobres de lo que necesitan, hacen plenas sus almas.
  revision_rationale: Se ajusta la expresión de τελειόω a un español más natural y fiel a la idea de plenitud, y se aligera la frase sobre las necesidades de los pobres sin cambiar el sentido.
