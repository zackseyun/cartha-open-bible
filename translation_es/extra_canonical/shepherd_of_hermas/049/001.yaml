  yaml_path: translation/extra_canonical/shepherd_of_hermas/049/001.yaml
  text: …they make their wealth complete, and in turn the rich, by supplying the poor with the things they need, make their souls complete.
translation:
  language: es
  text: …ellos hacen plena su riqueza, y, a su vez, los ricos, al proveer a los pobres de lo que necesitan, hacen plenas sus almas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: wealth
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - posesiones
  - caudal
  lexicon: πλοῦτος
  rationale: ‘Riqueza’ conserva el sentido económico general de wealth sin introducir un matiz más limitado como ‘bienes’ ni un registro demasiado arcaico como ‘caudal’.
- source_word: complete
  english_pob_choice: complete
  chosen_spanish: completan
  alternatives_spanish:
  - llenan
  - perfeccionan
  - consuman
  lexicon: τελειόω
  rationale: El griego expresa la idea de llevar a plenitud o completar; ‘completan’ mantiene esa fuerza de manera clara en español, sin sobrecargar el verso con un término técnico.
- source_word: rich
  english_pob_choice: rich
  chosen_spanish: los ricos
  alternatives_spanish:
  - los adinerados
  - los acaudalados
  lexicon: πλούσιοι
  rationale: ‘Los ricos’ es la equivalencia natural y transparente para πλούσιοι en este contexto social.
- source_word: supplying
  english_pob_choice: supplying
  chosen_spanish: al proveer
  alternatives_spanish:
  - al suministrar
  - al dar
  - al abastecer
  lexicon: χορηγέω
  rationale: ‘Proveer’ comunica bien la acción de abastecer con lo necesario; ‘suministrar’ sería más técnico y ‘abastecer’ más comercial.
- source_word: the poor
  english_pob_choice: the poor
  chosen_spanish: a los pobres
  alternatives_spanish:
  - a los necesitados
  - a los indigentes
  lexicon: οἱ πτωχοί
  rationale: ‘A los pobres’ conserva el contraste social directo del original y coincide con el registro sencillo del pasaje.
- source_word: the things they need
  english_pob_choice: the things they need
  chosen_spanish: las cosas que necesitan
  alternatives_spanish:
  - lo que necesitan
  - sus necesidades
  lexicon: τὰ δεόμενα / τὰ χρῄζοντα
  rationale: La frase mantiene la referencia concreta a las cosas necesarias; ‘lo que necesitan’ sería más idiomático, pero ‘las cosas que necesitan’ sigue de cerca el contenido del original.
- source_word: souls
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - vidas
  - personas
  lexicon: ψυχαί
  rationale: ‘Almas’ preserva el término antropológico explícito del original y mantiene la simetría con la primera cláusula.
theological_decisions:
- issue: Relación entre riqueza material y plenitud del alma
  english_pob_reading: the rich, by supplying the poor with the things they need, make their souls complete
  chosen_spanish_reading: los ricos, al proveer a los pobres de las cosas que necesitan, completan sus almas
  alternative_spanish_readings:
  - los ricos, al ayudar a los pobres con lo que necesitan, perfeccionan sus almas
  - los ricos, al suplir las necesidades de los pobres, llevan sus almas a plenitud
  rationale: 'La formulación conserva la reciprocidad moral del pasaje sin diluirla: la ayuda material a los pobres tiene un efecto espiritual en los ricos. ‘Completan sus almas’ reproduce la tensión de τελειόω y evita sustituirla por una paráfrasis devocional.'
  doctrine_reference: Antropología moral del Shepherd of Hermas; relación entre obras de misericordia y crecimiento espiritual.
translation_notes:
  revision_awareness: No se registran revisiones previas en el paquete de auditoría; la redacción se apoya directamente en el texto griego normalizado y en la traducción inglesa POB como control de consistencia semántica.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de dos miembros con estructura recíproca.
  - No se introdujo vocabulario eclesiástico ajeno al pasaje.
  - Se preservó el contraste económico-social explícito entre ricos y pobres.
  - El español evita un calco excesivamente duro, pero conserva la relación semántica de completar/perfeccionar del original.
