  to: 3. Porque, así como en el verano los frutos de cada árbol se hacen visibles y se reconoce lo que son, así también los frutos de los justos serán visibles, y todos serán conocidos; [a] los menores, floreciendo en aquella edad.
  rationale: 'Se hicieron reparaciones menores de naturalidad y fluidez del español sin cambiar el sentido: «qué son» -> «lo que son»; «los que son los menores» -> «los menores». Se mantuvo la aspereza de la cláusula final y la nota explicativa correspondiente.'
