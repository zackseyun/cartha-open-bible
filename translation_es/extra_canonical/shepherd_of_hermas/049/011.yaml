  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y la línea de la POB inglesa: la comparación estacional, la visibilidad de los frutos y el reconocimiento de todos. También preserva correctamente la dificultad de la cláusula final sobre «los menores». Sin embargo, «se reconoce qué son» suena algo forzado en español, y la puntuación/flujo de la cláusula final puede ajustarse mejor para conservar la aspereza del original sin perder legibilidad.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero hay dos puntos mejorables: «se reconoce qué son» es menos natural que «se reconoce lo que son», y en la cola final conviene evitar «los que son los menores», que resulta pesado, a favor de «los menores», manteniendo la nota de dificultad. También es preferible unir mejor la aposición final con raya o coma fuerte para reflejar su carácter abrupto.'
  glossary_alignment: 'La terminología principal está alineada: καρποί -> «frutos», δικαίων -> «los justos», φανεροὶ -> «visibles», γνωσθήσονται -> «serán conocidos». No hay conflictos con los términos doctrinales por defecto del proyecto. La elección «aquella edad» para αἰών es aceptable aquí por fidelidad a la POB inglesa, aunque «era» sería más idiomático; no es necesario cambiarlo.'
  issues:
