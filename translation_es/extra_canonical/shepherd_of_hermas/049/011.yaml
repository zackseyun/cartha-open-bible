    issue: 'Frase poco natural: «se reconoce qué son»'
    rationale: En español general y bíblico suena más idiomático «se reconoce lo que son», sin alterar el sentido del original ni de la POB inglesa.
  - severity: medium
    issue: 'Expresión pesada: «los que son los menores»'
    rationale: Aunque intenta reflejar el griego, en español queda innecesariamente trabada. «Los menores» preserva mejor la dificultad sin introducir interpretación adicional.
  - severity: low
    issue: Puntuación de la cláusula final
    rationale: La secuencia después de «serán conocidos» queda más clara con una pausa más marcada antes de la frase difícil, manteniendo su carácter condensado.
