  yaml_path: translation/extra_canonical/shepherd_of_hermas/049/011.yaml
  text: 3. “For just as in summer the fruits of each tree become visible and are recognized for what they are, so also the fruits of the righteous will be visible, and all will be known, [those who are least] being flourishing in that age.”
translation:
  language: es
  text: 3. Porque, así como en el verano los frutos de cada árbol se hacen visibles y se reconoce lo que son, así también los frutos de los justos serán visibles, y todos serán conocidos; [a] los menores, floreciendo en aquella edad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase final es difícil en el griego y refleja una construcción condensada; se conserva sin resolverla interpretativamente para no perder la tensión del original.
    reason: source_note
lexical_decisions:
- source_word: καρποί
  english_pob_choice: fruits
  chosen_spanish: frutos
  alternatives_spanish:
  - frutas
  - productos
  - obras
  lexicon: καρπός
  rationale: «Frutos» conserva la imagen agrícola literal del griego y sigue de cerca el uso del inglés POB. «Obras» interpretaría demasiado; «frutas» suena menos natural en este contexto moral y bíblico.
- source_word: δικαίων
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los piadosos
  lexicon: δίκαιος
  rationale: «Justos» reproduce el valor moral-forense del término y es el equivalente más directo en español bíblico sin imponer una lectura más devocional que el texto.
- source_word: φανεροὶ
  english_pob_choice: visible
  chosen_spanish: visibles
  alternatives_spanish:
  - manifiestos
  - patentes
  lexicon: φανερός
  rationale: «Visibles» mantiene la observación de que los frutos aparecerán a la vista; «manifiestos» es posible, pero añade un matiz más formal y menos concreto.
- source_word: γνωσθήσονται
  english_pob_choice: will be known
  chosen_spanish: serán conocidos
  alternatives_spanish:
  - serán reconocidos
  - se darán a conocer
  lexicon: γινώσκω
  rationale: «Serán conocidos» refleja el pasivo del griego y conserva la pasividad del proceso; «serán reconocidos» podría sugerir identificación por parte de otros, y «se darán a conocer» es más idiomático pero menos literal.
- source_word: οἱ ἐλάχιστοι
  english_pob_choice: those who are least
  chosen_spanish: los que son los menores
  alternatives_spanish:
  - los más pequeños
  - los más humildes
  - los menores
  lexicon: ἐλάχιστος
  rationale: La expresión «los que son los menores» conserva la comparación superlativa del griego sin convertirla en una categoría distinta; «los más humildes» introduce una interpretación moral que el texto no explicita.
- source_word: ἀνθήσοντες
  english_pob_choice: being flourishing
  chosen_spanish: floreciendo
  alternatives_spanish:
  - floreciendo
  - florecerán
  - estarán floreciendo
  lexicon: ἀνθέω
  rationale: «Floreciendo» mantiene la metáfora vegetal del griego y armoniza con el paralelismo de los frutos; evita explicar la imagen como mera prosperidad abstracta.
theological_decisions:
- issue: Imagen de los frutos de los justos como evidencia pública
  english_pob_reading: the fruits of the righteous will be visible, and all will be known
  chosen_spanish_reading: los frutos de los justos serán visibles, y todos serán conocidos
  alternative_spanish_readings:
  - las obras de los justos serán visibles
  - se conocerá a todos por sus frutos
  rationale: Se preserva la tensión entre visibilidad externa y reconocimiento universal sin convertir la metáfora en una tesis doctrinal más explícita de lo que el pasaje dice. La formulación mantiene la imagen moral de la maduración visible.
  doctrine_reference: Mt 7:16-20; cf. Gal 5:22-23
- issue: Sentido de «los menores» en la clausula final
  english_pob_reading: '[those who are least] being flourishing in that age'
  chosen_spanish_reading: los que son los menores, floreciendo en aquella edad
  alternative_spanish_readings:
  - los más pequeños, floreciendo en aquella edad
  - los más humildes, floreciendo en aquella edad
  rationale: La POB inglesa conserva la dificultad de la frase entre corchetes; el español también la preserva sin resolverla interpretativamente. «Aquella edad» mantiene el matiz escatológico/era futura del original.
  doctrine_reference: Uso simbólico de la edad venidera en literatura cristiana primitiva
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete inglés. Se siguió de cerca la redacción POB existente, pero el español vuelve al griego para mantener la metáfora agrícola, el pasivo de «serán conocidos» y la clausula final difícil sin suavizarla.
  spanish_consistency_notes:
  - Se usa «justos» para δίκαιοι y «frutos» para καρποί de manera consistente con el tono bíblico del pasaje.
  - «Yahvé» no aparece en este segmento; no se requiere ajuste del nombre divino.
  - Se evita introducir «obras» o «virtudes» para no sustituir la imagen original de fruto.
  - La puntuación mantiene la estructura comparativa y la secuencia retórica del griego.
