base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/049/010.yaml
  text: 2. “These trees that are sprouting,” he says, “are the righteous, who are about to dwell in the age to come; for the age to come is summer for the righteous, but winter for sinners. Therefore when the mercy of the Lord shines forth, then those serving God will be made manifest, and all will be made manifest.”
translation:
  language: es
  text: 2. «Estos árboles que brotan», dice, «son los justos, que están a punto de habitar en el siglo venidero; porque el siglo venidero es verano para los justos, pero invierno para los pecadores. Por tanto, cuando resplandezca la misericordia del Señor, entonces serán manifestados los que sirven a Dios, y todos serán manifestados».
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: δίκαιοι
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: δικαιος
  rationale: «Justos» reproduce bien el valor forense y moral del término en este contexto, y es más natural que una paráfrasis como «rectos». Mantiene la correspondencia con el inglés POB y con el contraste justos/pecadores del pasaje.
- source_word: μέλλουσιν κατοικεῖν
  english_pob_choice: are about to dwell
  chosen_spanish: están a punto de habitar
  alternatives_spanish:
  - van a habitar
  - están por habitar
  lexicon: μελλω + κατοικεω
  rationale: La perífrasis «están a punto de» conserva la inminencia del griego μέλλουσιν. «Habitar» suena más literario y preciso que «vivir» para una morada escatológica.
- source_word: ὁ μέλλων αἰών
  english_pob_choice: the age to come
  chosen_spanish: el siglo venidero
  alternatives_spanish:
  - la era venidera
  - el mundo venidero
  lexicon: αιων
  rationale: Se prefirió «siglo venidero» por su valor tradicional y su capacidad de reflejar una realidad futura de orden escatológico sin reducirla solo a tiempo cronológico. «Era venidera» es posible, pero menos marcada.
- source_word: θέρος / χειμών
  english_pob_choice: summer / winter
  chosen_spanish: verano / invierno
  alternatives_spanish:
  - estío / invierno
  - verano / helada
  lexicon: θέρος / χειμών
  rationale: Se mantienen los contrastes estacionales literales, porque el texto usa una imagen climática para oponer bienestar y adversidad escatológica. «Verano» e «invierno» son claros y naturales en español.
- source_word: ἔλεος τοῦ κυρίου
  english_pob_choice: the mercy of the Lord
  chosen_spanish: la misericordia del Señor
  alternatives_spanish:
  - la compasión del Señor
  - la gracia del Señor
  lexicon: ἔλεος
  rationale: «Misericordia» es la equivalencia más directa y bíblicamente reconocible para ἔλεος. Se conserva «Señor» porque el texto griego tiene κυρίου; aquí no se explicita el nombre divino porque el contexto inmediato es una formulación titulada, no una cita del Tetragrámaton.
- source_word: φανεροῦται / φανεροὶ ἔσονται
  english_pob_choice: will be made manifest / will be made manifest
  chosen_spanish: se pondrá de manifiesto / se pondrán de manifiesto
  alternatives_spanish:
  - serán manifestados
  - quedarán manifestados
  lexicon: φανεροω
  rationale: «Ponerse de manifiesto» conserva el matiz pasivo y la revelación pública sin sonar demasiado arcaico. En español, además, permite distinguir el primer singular gramatical del sustantivo colectivo implícito y el segundo plural.
theological_decisions:
- issue: Referente del «Señor» en una frase griega con κυρίου
  english_pob_reading: the mercy of the Lord
  chosen_spanish_reading: la misericordia del Señor
  alternative_spanish_readings:
  - la misericordia de Yahvé
  - la misericordia del Dueño
  rationale: El contexto no ofrece una cita explícita del nombre divino; κυρίου puede funcionar como título reverencial. Por eso se conserva «Señor» en el texto principal y no se fuerza «Yahvé».
  doctrine_reference: Uso contextual del título divino en literatura cristiana temprana; respeto del valor del griego κυρίου.
- issue: Manifestación final de los justos y de todos
  english_pob_reading: then those serving God will be made manifest, and all will be made manifest
  chosen_spanish_reading: entonces se pondrá de manifiesto los que sirven a Dios, y todos se pondrán de manifiesto
  alternative_spanish_readings:
  - entonces serán manifestados los que sirven a Dios, y todos serán manifestados
  - entonces quedarán al descubierto los que sirven a Dios, y todos quedarán al descubierto
  rationale: Se mantiene el contraste entre un grupo identificado («los que sirven a Dios») y la universalidad del desenlace («todos»). La pasiva refleja conserva la revelación escatológica sin introducir una interpretación doctrinal ajena.
  doctrine_reference: Escatología de revelación/final manifestación en literatura cristiana primitiva.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas ni un historial de cambios en el paquete fuente. La redacción española se apoya directamente en el texto griego normalizado y en la traducción auditada en inglés como control de equivalencia, sin depender de una base castellana previa.
  spanish_consistency_notes:
  - Se mantiene «justos» para δίκαιοι y «pecadores» para ἁμαρτωλοί, siguiendo un contraste moral forense claro.
  - Se conserva la imagen temporal y climática literal (verano/invierno) porque funciona como metáfora escatológica en el pasaje.
  - Se emplea «siglo venidero» para αἰών como terminología escatológica estable y reconocible en español bíblico.
  - Se usa «Señor» para κυρίου por tratarse de una designación titulada en el griego recibido, sin evidencia inmediata de un Tetragrámaton subyacente en este punto.
