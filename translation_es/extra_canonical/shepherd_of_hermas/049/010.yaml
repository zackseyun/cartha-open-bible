review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del inglés POB: los árboles que brotan representan a los justos, el siglo venidero se contrasta como verano para ellos e invierno para los pecadores, y al resplandecer la misericordia del Señor se produce una manifestación pública. Sin embargo, en la cláusula final el español actual no preserva bien la sintaxis ni la voz del original/inglés: «se pondrá de manifiesto los que sirven a Dios» es gramaticalmente defectuoso y desajusta el valor pasivo plural de la frase.'
  spanish_quality_summary: El texto es en general claro y digno, con buenas elecciones como «los justos», «verano / invierno» y «misericordia del Señor». La principal falla es de gramática y naturalidad en «se pondrá de manifiesto los que sirven a Dios». Debe corregirse a una forma plural pasiva/natural, idealmente «serán manifestados» o «quedarán de manifiesto». Además, la nota al pie actual intenta justificar una redacción defectuosa; tras corregirla, la nota deja de ser necesaria.
  glossary_alignment: La terminología está mayormente alineada con los criterios del proyecto. «Señor» para κυρίου es defendible aquí, ya que no hay base para imponer «Yahvé». «Siglo venidero» es aceptable, aunque «era venidera» también sería natural; no requiere cambio. No hay conflictos relevantes con los glosarios troncales.
  issues:
  - severity: high
    issue: Construcción gramatical incorrecta en «entonces se pondrá de manifiesto[a] los que sirven a Dios»
    rationale: Con sujeto plural expreso («los que sirven a Dios»), la forma singular «se pondrá» resulta incorrecta y además no reproduce bien la pasiva del griego/inglés («will be made manifest»).
  - severity: medium
    issue: La nota [a] defiende una redacción que no conviene conservar
    rationale: El pie de nota no preserva una alternativa textual necesaria, sino que intenta explicar una formulación española defectuosa. Una vez corregida la frase principal, la nota sobra.
  revised_spanish_text: 2. «Estos árboles que brotan», dice, «son los justos, que están a punto de habitar en el siglo venidero; porque el siglo venidero es verano para los justos, pero invierno para los pecadores. Por tanto, cuando resplandezca la misericordia del Señor, entonces serán manifestados los que sirven a Dios, y todos serán manifestados».
  revised_footnotes: []
  revision_rationale: Se corrige la cláusula final para que el español sea gramatical, natural y fiel al valor pasivo plural del original y del inglés POB. «Serán manifestados» expresa con claridad la revelación pública escatológica sin forzar una construcción refleja defectuosa. Al no quedar ya una ambigüedad relevante, se elimina la nota al pie.
