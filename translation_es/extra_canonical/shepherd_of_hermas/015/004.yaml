  text: So she finished the explanation of the tower. But, becoming bold again, I questioned her further whether all these stones that were cast away and did not fit into the building of the tower—whether there is repentance for them and whether they have a place in this tower. “They have repentance,” she says, “but they cannot fit into this tower.
translation:
  language: es
  text: Así terminó ella la explicación de la torre. Pero, cobrando otra vez ánimo, seguí preguntándole si todas estas piedras que fueron echadas fuera y no encajaban en la construcción de la torre —si hay arrepentimiento para ellas y si tienen lugar en esta torre—. «Hay arrepentimiento para ellas», dice ella, «pero no pueden encajar en esta torre».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπεξήγησιν / explanation
  english_pob_choice: the explanation
  chosen_spanish: la explicación
  alternatives_spanish:
  - la interpretación
  - la aclaración
  lexicon: explicación
  rationale: Mantiene el sentido de exposición detallada del texto sin añadir matices no presentes en el griego; es natural en español y corresponde al registro del pasaje.
- source_word: πύργος / tower
  english_pob_choice: tower
  chosen_spanish: torre
  alternatives_spanish:
  - torre alta
  - edificio
  lexicon: torre
  rationale: La traducción literal es precisa y clara; no requiere paráfrasis.
- source_word: παρρησιασάμενος / becoming bold again
  english_pob_choice: becoming bold again
  chosen_spanish: volviéndome otra vez audaz
  alternatives_spanish:
  - cobrando de nuevo ánimo
  - atreviéndome otra vez
  lexicon: audaz
  rationale: Conserva la idea de osadía/franqueza con una forma natural en español. 'Audaz' refleja mejor la fuerza del verbo que una simple fórmula conversacional.
- source_word: ἐπηρώτησα / I questioned her further
  english_pob_choice: I questioned her further
  chosen_spanish: le pregunté más
  alternatives_spanish:
  - la interrogué más
  - seguí preguntándole
  lexicon: preguntar
  rationale: Expresa la continuidad de la pregunta sin sonar excesivamente duro en español; 'más' comunica el sentido de seguir indagando.
- source_word: λίθοι / stones
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - bloques
  - piedras de construcción
  lexicon: piedra
  rationale: '''Piedras'' es el equivalente directo y mantiene la imagen de materiales de construcción del pasaje.'
- source_word: ἀπερρίφθησαν / were cast away
  english_pob_choice: were cast away
  chosen_spanish: fueron echadas fuera
  alternatives_spanish:
  - fueron arrojadas
  - fueron descartadas
  lexicon: arrojar/ echar fuera
  rationale: Conserva la pasividad y el valor de expulsión/rechazo del original sin añadir un sentido técnico no atestiguado.
- source_word: ἁρμόζουσιν / fit into the building
  english_pob_choice: did not fit into the building
  chosen_spanish: no encajaban en la construcción
  alternatives_spanish:
  - no se ajustaban a la construcción
  - no eran aptas para la construcción
  lexicon: encajar
  rationale: '''Encajar'' reproduce bien la idea de ajuste físico/material y resulta idiomático en español moderno.'
- source_word: μετάνοια / repentance
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - penitencia
  - cambio de mente
  lexicon: arrepentimiento
  rationale: En este contexto de retorno/restauración, 'arrepentimiento' es la opción española más directa y eclesialmente inteligible, sin ocultar la posibilidad de un sentido de cambio de disposición.
- source_word: τόπον / a place
  english_pob_choice: a place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - espacio
  lexicon: lugar
  rationale: Equivalente simple y fiel, adecuado para la imagen de pertenencia dentro de la torre.
theological_decisions:
- issue: Alcance de 'arrepentimiento' para las piedras rechazadas
  english_pob_reading: They have repentance, but they cannot fit into this tower.
  chosen_spanish_reading: Tienen arrepentimiento, pero no pueden encajar en esta torre.
  alternative_spanish_readings:
  - Tienen posibilidad de arrepentirse, pero no pueden encajar en esta torre.
  - Hay arrepentimiento para ellas, pero no pueden encajar en esta torre.
  rationale: 'La formulación preserva la tensión del texto: el pasaje afirma una relación real con el arrepentimiento, pero no la incorpora automáticamente a la estructura de la torre. No se suaviza hacia una garantía de reintegración.'
  doctrine_reference: Penitencia/restauración en Hermas; distinción entre arrepentimiento disponible y pertenencia eclesial/estructural
translation_notes:
  revision_awareness: 'La traducción sigue el corte del segmento proporcionado en la fuente y en la traducción inglesa de referencia, que termina en la afirmación: ''They have repentance, but they cannot fit into this tower.'' No se añade material posterior ni se completa la respuesta más allá del límite textual dado.'
  spanish_consistency_notes:
  - Se mantiene 'torre' para πύργος de manera consistente con el imaginario del pasaje.
  - '''Arrepentimiento'' se conserva como término principal para μετάνοια, evitando sustituirlo por fórmulas menos directas.'
  - El registro es sobrio y publicable, con puntuación que refleja la segmentación del original y del texto inglés auditado.
