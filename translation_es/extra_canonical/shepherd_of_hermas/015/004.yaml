revisions:
- from: Así terminó ella la explicación de la torre. Pero, volviéndome otra vez audaz, le pregunté más acerca de si todas estas piedras que fueron echadas fuera y no encajaban en la construcción de la torre —si para ellas hay arrepentimiento y si tienen lugar en esta torre. «Tienen arrepentimiento», dice ella, «pero no pueden encajar en esta torre».
  to: Así terminó ella la explicación de la torre. Pero, cobrando otra vez ánimo, seguí preguntándole si todas estas piedras que fueron echadas fuera y no encajaban en la construcción de la torre —si hay arrepentimiento para ellas y si tienen lugar en esta torre—. «Hay arrepentimiento para ellas», dice ella, «pero no pueden encajar en esta torre».
  rationale: 'La revisión hace ajustes menores de naturalidad y precisión: reemplaza un calco poco idiomático (''volviéndome otra vez audaz'') por una expresión española fluida; mejora la sintaxis interrogativa; y formula μετάνοια de manera más natural en español (''hay arrepentimiento para ellas'') sin cambiar el sentido teológico del texto.'
