base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/015/002.yaml
  text: But those that fall into the fire and are burned—these are the ones who have finally turned away from the living God, and it no longer came up into their heart to repent because of the desires of their lewdness and the evils they have done.
translation:
  language: es
  text: Pero los que caen en el fuego y son quemados[a] —estos son los que finalmente se apartaron del Dios vivo, y ya no les surgió en el corazón arrepentirse[b], a causa de los deseos de su indecencia[c] y de los males que han hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «son quemados» refleja el resultado de κατακαέντας; también puede entenderse como «son consumidos».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no subió a ellos al corazón arrepentirse». La metáfora del corazón se conserva en un español más natural.'
    reason: source_note
  - marker: c
    text: «Indecencia» traduce αἰσχρότης con un sentido amplio de vergüenza o bajeza moral; también puede entenderse como «impureza» o, en un sentido más fuerte, «lascivia».
    reason: lexical_alternative
lexical_decisions:
- source_word: τοὺς δὲ εἰς τὸ πῦρ πεσόντας καὶ κατακαέντας
  english_pob_choice: those that fall into the fire and are burned
  chosen_spanish: los que caen en el fuego y son quemados
  alternatives_spanish:
  - los que caen en el fuego y se queman
  - los que cayeron en el fuego y fueron quemados
  lexicon: πίπτω / κατακαίω
  rationale: Conserva la imagen activa de caída al fuego y el resultado pasivo de ser consumidos. Usé presente generalizante para un rasgo descriptivo del tipo de personas, acorde con el valor proverbial/expositivo del pasaje.
- source_word: ἀπεστράφησαν ἀπὸ τοῦ θεοῦ τοῦ ζῶντος
  english_pob_choice: have finally turned away from the living God
  chosen_spanish: finalmente se apartaron del Dios vivo
  alternatives_spanish:
  - se volvieron atrás del Dios vivo
  - se desviaron del Dios vivo
  lexicon: ἀποστρέφω
  rationale: «Se apartaron» expresa el giro alejándose de Dios sin introducir un matiz más fuerte que el griego. «Dios vivo» mantiene la fórmula estable de ζῶντος.
- source_word: οὐκέτι ἀνέβη αὐτοῖς εἰς τὴν καρδίαν μετανοῆσαι
  english_pob_choice: it no longer came up into their heart to repent
  chosen_spanish: ya no les vino al corazón arrepentirse
  alternatives_spanish:
  - ya no les pasó por el corazón arrepentirse
  - ya no surgió en su corazón arrepentirse
  lexicon: ἀναβαίνω εἰς τὴν καρδίαν + μετανοέω
  rationale: «Vino al corazón» conserva la metáfora interna del griego y del inglés POB; «arrepentirse» es el equivalente natural en español para μετανοῆσαι en este contexto de retorno moral.
- source_word: διὰ τὰς ἐπιθυμίας τῆς αἰσχρότητος αὐτῶν
  english_pob_choice: because of the desires of their lewdness
  chosen_spanish: a causa de los deseos de su lascivia
  alternatives_spanish:
  - a causa de los deseos de su impureza
  - a causa de los deseos de su indecencia
  lexicon: ἐπιθυμία / αἰσχρότης
  rationale: «Lascivia» comunica con fuerza moral y sexual la idea de αἰσχρότης sin suavizarla. Mantiene el vínculo entre deseos desordenados y el carácter vergonzoso de su conducta.
- source_word: καὶ τὰ κακὰ ἃ ἐποίησαν
  english_pob_choice: and the evils they have done
  chosen_spanish: y de los males que han hecho
  alternatives_spanish:
  - y de las malas obras que han hecho
  - y de los males que cometieron
  lexicon: κακός
  rationale: «Males» reproduce la sustantivación del griego y la amplitud moral de κακά; «han hecho» sigue el presente perfecto del inglés POB y deja abierta la vigencia de la culpa.
theological_decisions:
- issue: Descriptive warning versus doctrinal finality
  english_pob_reading: have finally turned away from the living God
  chosen_spanish_reading: finalmente se apartaron del Dios vivo
  alternative_spanish_readings:
  - se apartaron para siempre del Dios vivo
  - terminaron alejándose del Dios vivo
  rationale: La adición de «para siempre» endurecería el alcance más allá del griego y del inglés POB. «Finalmente» conserva el matiz de desenlace sin convertirlo en una formulación dogmática explícita.
  doctrine_reference: Perseverancia/apostasía; evitar inferir más de lo que el texto afirma
- issue: The interior motion toward repentance
  english_pob_reading: it no longer came up into their heart to repent
  chosen_spanish_reading: ya no les vino al corazón arrepentirse
  alternative_spanish_readings:
  - ya no quisieron arrepentirse
  - ya no pensaron en arrepentirse
  rationale: El texto subraya la ausencia de impulso interior, no solo una negativa volitiva. La metáfora del corazón preserva esa antropología moral sin resolverla en una mera decisión racional.
  doctrine_reference: Arrepentimiento como disposición interna y retorno moral
- issue: Severity of sexual immorality
  english_pob_reading: desires of their lewdness
  chosen_spanish_reading: los deseos de su lascivia
  alternative_spanish_readings:
  - los deseos de su inmoralidad sexual
  - los deseos de su impureza
  rationale: «Lascivia» conserva el registro fuerte y la carga moral de vergüenza/indecencia que el pasaje asocia con la caída. Es preferible a un término más clínico o genérico.
  doctrine_reference: Santificación / pecado sexual
translation_notes:
  revision_awareness: El contexto en inglés muestra alta concordancia con el griego y solo leves cuestiones de formulación. Mantengo la misma estructura lógica del pasaje, la secuencia causal y la metáfora del corazón, sin introducir ampliaciones como «para siempre» ni suavizar el lenguaje moral.
  spanish_consistency_notes:
  - He mantenido «Dios vivo» para conservar la fórmula estable de ζῶντος.
  - He usado «arrepentirse» para μετανοῆσαι, en línea con el valor moral y volitivo del pasaje.
  - 'He preservado el paralelo causal: caída al fuego → apartarse de Dios → ausencia de arrepentimiento → motivación sexual y obras malas.'
