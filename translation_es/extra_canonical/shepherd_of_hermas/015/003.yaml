revisions:
- from: 'Y aquellos otros que caen cerca de las aguas, pero no son capaces de rodar hasta el agua: ¿quieres saber quiénes son? Estos son los que han oído la palabra y quieren ser bautizados en el nombre del Señor; entonces, cuando la pureza de la verdad vuelve a su memoria, se arrepienten y vuelven otra vez tras sus malos deseos.'
  to: 'Y aquellos otros que caen cerca de las aguas, pero no son capaces de rodar dentro del agua: ¿quieres saber quiénes son? Estos son los que han oído la palabra y quieren ser bautizados en el nombre del Señor; entonces, cuando la pureza de la verdad vuelve a su memoria, se echan atrás y vuelven otra vez a sus malos deseos.'
  rationale: Se ajusta «rodar hasta el agua» a «rodar dentro del agua» para conservar el contraste espacial del original. También se reemplaza «se arrepienten» por «se echan atrás» en esta frase concreta para evitar la lectura engañosa de arrepentimiento seguido de recaída, y se simplifica el cierre a «vuelven otra vez a sus malos deseos» para mejorar la naturalidad del español manteniendo el sentido de retorno culpable.
  reviewer_model: gpt-5.4
