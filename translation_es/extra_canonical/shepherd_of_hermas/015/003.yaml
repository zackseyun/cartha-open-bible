review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego según el audit trail inglés: distingue a los que caen cerca del agua pero no entran en ella, mantiene el deseo de ser bautizados en el nombre del Señor y conserva la secuencia oír–recordar–volver a los malos deseos. Sin embargo, «rodar hasta el agua» no preserva bien el valor de entrar en el agua implícito en el inglés «roll into the water»; conviene expresar movimiento hacia dentro. Además, «se arrepienten y vuelven otra vez tras sus malos deseos» en español sugiere primero un arrepentimiento genuino y luego una recaída posterior, cuando el contexto parece describir un volverse atrás al recordar la pureza de la verdad. Una redacción más natural y fiel debe evitar esa ambigüedad temporal.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos puntos mejorables: «rodar hasta el agua» suena algo incompleto frente a la imagen original, y «vuelven otra vez tras sus malos deseos» resulta poco idiomático y semánticamente confuso. Una ligera revisión produce un español más natural sin perder la literalidad básica.'
  glossary_alignment: 'La terminología principal está bien alineada: «Señor» para κύριος es defendible aquí por tratarse de una fórmula bautismal cristiana, y no hay base suficiente para imponer «Yahvé». «Se arrepienten» para μετανοέω es aceptable por el contexto moral. No hay conflictos mayores con el glosario del proyecto.'
  issues:
  - severity: medium
    issue: «rodar hasta el agua» debilita el sentido de entrada al agua
    rationale: El audit trail inglés dice «roll into the water», no solo aproximarse al borde. «Hasta» puede implicar que no llegan a entrar, justo lo contrario del contraste que el pasaje está trazando.
  - severity: medium
    issue: La secuencia «se arrepienten y vuelven otra vez tras sus malos deseos» es ambigua y poco natural
    rationale: 'En español puede leerse como dos acciones consecutivas: primero se arrepienten y luego recaen. El contexto exhortativo parece señalar más bien que, cuando recuerdan la pureza de la verdad, retroceden/ceden y vuelven a sus malos deseos. Una formulación como «se echan atrás y vuelven...» evita esa tensión.'
  - severity: low
    issue: «tras sus malos deseos» es comprensible pero algo forzado
    rationale: No es incorrecto, pero «a sus malos deseos» o «detrás de sus malos deseos» suena más transparente para lectura continua. Dado el contexto, puede simplificarse sin pérdida relevante.
  revised_spanish_text: 'Y aquellos otros que caen cerca de las aguas, pero no son capaces de rodar dentro del agua: ¿quieres saber quiénes son? Estos son los que han oído la palabra y quieren ser bautizados en el nombre del Señor; entonces, cuando la pureza de la verdad vuelve a su memoria, se echan atrás y vuelven otra vez a sus malos deseos.'
  revision_rationale: Se ajusta «rodar hasta el agua» a «rodar dentro del agua» para conservar el contraste espacial del original. También se reemplaza «se arrepienten» por «se echan atrás» en esta frase concreta para evitar la lectura engañosa de arrepentimiento seguido de recaída, y se simplifica el cierre a «vuelven otra vez a sus malos deseos» para mejorar la naturalidad del español manteniendo el sentido de retorno culpable.
