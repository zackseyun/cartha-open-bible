base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/015/003.yaml
  text: And those others that fall near the waters yet are not able to roll into the water—do you want to know who they are? These are the ones who have heard the word and want to be baptized into the name of the Lord; then, when the purity of the truth comes to their remembrance, they repent and go back again after their evil desires.
translation:
  language: es
  text: 'Y aquellos otros que caen cerca de las aguas, pero no son capaces de rodar dentro del agua: ¿quieres saber quiénes son? Estos son los que han oído la palabra y quieren ser bautizados en el nombre del Señor; entonces, cuando la pureza de la verdad vuelve a su memoria, se echan atrás y vuelven otra vez a sus malos deseos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: fall near the waters
  english_pob_choice: fall near the waters
  chosen_spanish: caen cerca de las aguas
  alternatives_spanish:
  - caen junto a las aguas
  - caen cerca del agua
  lexicon: πίπτω / ὕδωρ
  rationale: Conserva la imagen espacial de caer cerca del agua sin explicitar más de lo que el texto da. «Aguas» mantiene el plural con sabor bíblico y evita reducir la escena a un solo cuerpo de agua si el original la deja abierta.
- source_word: roll into the water
  english_pob_choice: roll into the water
  chosen_spanish: rodar hasta el agua
  alternatives_spanish:
  - rodar dentro del agua
  - entrar rodando al agua
  lexicon: κυλίω / ὕδωρ
  rationale: «Rodar» preserva el movimiento corporal e incidental del original; «hasta el agua» comunica la meta sin añadir una inmersión que el giro no exige necesariamente.
- source_word: want to be baptized into the name of the Lord
  english_pob_choice: want to be baptized into the name of the Lord
  chosen_spanish: quieren ser bautizados en el nombre del Señor
  alternatives_spanish:
  - quieren ser bautizados en el nombre de Yahvé
  - quieren bautizarse en el nombre del Señor
  lexicon: βαπτίζω / ὄνομα / κύριος
  rationale: Mantengo «bautizados» porque el rito es el del texto; «en el nombre del Señor» sigue la formulación del audit trail inglés y el valor cristológico-litúrgico natural de κύριος en este contexto, sin introducir una decisión sobre el nombre divino donde el griego citado no lo explicita aquí.
- source_word: the purity of the truth
  english_pob_choice: the purity of the truth
  chosen_spanish: la pureza de la verdad
  alternatives_spanish:
  - la limpieza de la verdad
  - la pureza de lo verdadero
  lexicon: ἁγνότης / ἀλήθεια
  rationale: «Pureza» conserva el matiz moral y cultual que puede haber en el griego; «de la verdad» mantiene la construcción genitiva sin paraphrasear hacia «verdad pura», que sería menos fiel a la forma.
- source_word: they repent
  english_pob_choice: they repent
  chosen_spanish: se arrepienten
  alternatives_spanish:
  - cambian de mente
  - se vuelven atrás en arrepentimiento
  lexicon: μετανοέω
  rationale: En este contexto de retorno desde malos deseos, «arrepentirse» expresa adecuadamente el giro moral y volitivo sin perder la fuerza de conversión del verbo.
- source_word: go back again after their evil desires
  english_pob_choice: go back again after their evil desires
  chosen_spanish: vuelven otra vez tras sus malos deseos
  alternatives_spanish:
  - regresan otra vez detrás de sus malos deseos
  - vuelven de nuevo a sus malos deseos
  lexicon: ἐπιστρέφω / ἐπιθυμία
  rationale: «Vuelven otra vez» conserva el énfasis redundante del original y de la traducción inglesa. «Tras sus malos deseos» reproduce el seguimiento/arrastre implícito en el giro, sin suavizarlo a una simple recaída interior.
theological_decisions:
- issue: Meaning of κύριος in the baptismal phrase
  english_pob_reading: name of the Lord
  chosen_spanish_reading: nombre del Señor
  alternative_spanish_readings:
  - nombre de Yahvé
  - nombre del Maestro
  rationale: El contexto cristiano del bautismo favorece «Señor» como lectura litúrgica estable. No se fuerza «Yahvé» porque el audit trail inglés no documenta aquí una cita directa del Tetragrámaton, y el texto habla del bautismo cristiano en la comunidad de Hermas.
  doctrine_reference: Bautismal and christological usage of κύριος in early Christian literature
- issue: Relationship between hearing the word and moral reversal
  english_pob_reading: have heard the word ... then, when the purity of the truth comes to their remembrance, they repent and go back again after their evil desires
  chosen_spanish_reading: han oído la palabra ... cuando la pureza de la verdad vuelve a su memoria, se arrepienten y vuelven otra vez tras sus malos deseos
  alternative_spanish_readings:
  - han escuchado la palabra ... al recordar la verdad pura, se arrepienten y recaen en sus malos deseos
  - han oído el mensaje ... cuando recuerdan la verdad limpia, se vuelven y siguen sus malos deseos
  rationale: La secuencia auditiva-rememorativa-moral se mantiene sin psicologizarla más allá del texto. «Vuelve a su memoria» conserva el valor de remembranza que activa la decisión moral.
  doctrine_reference: Repentance and perseverance in early Christian exhortation
translation_notes:
  revision_awareness: The English POB rendering shows no footnotes but a review status of needs-revision. The Spanish draft keeps the same clause structure while tightening punctuation and preserving the moral sequence and the baptismal formula without introducing unsupported interpretive expansions.
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος por coherencia con el contexto bautismal cristiano y el audit trail inglés.
  - Se mantuvo «pureza de la verdad» porque el español permite la misma relación genitiva sin necesidad de reordenar la frase.
  - Se prefirió «vuelven otra vez» para preservar el tono reiterativo del original y del English POB.
