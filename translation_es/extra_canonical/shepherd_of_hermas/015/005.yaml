  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego y del English POB: otro lugar más pequeño, tormento previo, cumplimiento de los días de sus pecados, traslado por haber participado de la palabra del justo, posible liberación de los tormentos si sus malas obras llegan al corazón, y falta de salvación por dureza de corazón. No hay desviaciones doctrinales mayores.'
  spanish_quality_summary: 'El español es claro y mayormente natural, pero tiene dos puntos mejorables: ‘ocuparán otro lugar’ suena menos idiomático para un destino asignado que ‘estarán en otro lugar’ o ‘tendrán lugar en’; y ‘vienen a su corazón’ suena algo calcado. También ‘serán trasladados fuera de sus tormentos’ puede expresarse con mayor naturalidad como ‘serán trasladados fuera de medio de sus tormentos’ o mejor ‘serán trasladados fuera de sus tormentos’ manteniendo la imagen; aquí el cambio principal necesario es el giro de καρδία en español. Además, ‘no son salvados’ es fiel pero algo rígido; ‘no son salvos’ sería más eclesial, aunque no imprescindible.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. ‘Del justo’ preserva la ambigüedad del griego/inglés auditado; ‘atormentados’, ‘trasladados’, ‘corazón’ y ‘salvados’ son aceptables dentro del marco lexical documentado.
  issues:
