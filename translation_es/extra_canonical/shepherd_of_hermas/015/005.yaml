    issue: ‘ocuparán otro lugar’ suena poco natural en este contexto
    rationale: En español, ‘ocupar un lugar’ suele denotar llenarlo físicamente o desempeñar un puesto. Aquí el sentido es de ser colocados/asignados en otro lugar. ‘estarán en otro lugar’ o ‘tendrán otro lugar’ fluye mejor sin perder el sentido.
  - severity: medium
    issue: ‘vienen a su corazón’ es un calco algo torpe
    rationale: Aunque intenta preservar la imagen de εἰς τὴν καρδίαν, en español natural la expresión más idiomática es ‘suben a su corazón’ o ‘llegan a su corazón’. Esto conserva la metáfora interior sin reducirla meramente a memoria.
