  revision_rationale: 'Se hacen ajustes menores de naturalidad española sin alterar el sentido auditado: ‘estarán en otro lugar’ evita un uso poco idiomático de ‘ocupar’; ‘suben a su corazón’ conserva mejor la imagen interior del griego que ‘vienen a su corazón’. El resto del texto puede mantenerse tal como está.'
