base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/015/005.yaml
  text: Rather, they will fit in another place, much smaller; and this will be when they have been tormented and have completed the days of their sins. And for this reason they will be transferred, because they have shared in the word of the righteous one. And then it will happen that they are transferred from their torments, if the evil deeds they have done come up into their heart. But if they do not come up into their heart, they are not saved because of their hardness of heart.”
translation:
  language: es
  text: Más bien, estarán en otro lugar, mucho más pequeño; y esto sucederá cuando hayan sido atormentados y hayan cumplido los días de sus pecados. Y por esta razón serán trasladados, porque han participado de la palabra del justo. Y entonces sucederá que serán trasladados fuera de sus tormentos, si las malas obras que hicieron suben a su corazón. Pero si no suben a su corazón, no son salvados a causa de la dureza de su corazón.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄλλῳ τόπῳ πολύ σμικρότερον
  english_pob_choice: another place, much smaller
  chosen_spanish: otro lugar, mucho más pequeño
  alternatives_spanish:
  - otro sitio, mucho más pequeño
  - un lugar distinto, mucho más pequeño
  lexicon: τόπος
  rationale: ‘Lugar’ conserva el valor espacial directo del griego y suena natural en español; ‘sitio’ es posible, pero menos solemne. ‘Mucho más pequeño’ reproduce el comparativo intensivo sin añadir matiz interpretativo.
- source_word: βασανισθῶσιν
  english_pob_choice: have been tormented
  chosen_spanish: hayan sido atormentados
  alternatives_spanish:
  - hayan sido torturados
  - hayan sido castigados con tormento
  lexicon: βασανίζω
  rationale: ‘Atormentados’ mantiene el valor de sufrir tormento sin sobrecargar con ‘torturados’, que en español puede sugerir violencia física más específica. ‘Castigados con tormento’ interpreta más de lo que el verbo exige.
- source_word: τὰς ἡμέρας τῆς ἁμαρτίας αὐτῶν
  english_pob_choice: the days of their sins
  chosen_spanish: los días de sus pecados
  alternatives_spanish:
  - los días de su pecado
  - el tiempo de sus pecados
  lexicon: ἁμαρτία
  rationale: Se conserva la forma plural del original y del inglés auditado. ‘Los días de sus pecados’ suena más literal y mantiene la relación temporal del texto.
- source_word: μετατεθῶσιν
  english_pob_choice: will be transferred
  chosen_spanish: serán trasladados
  alternatives_spanish:
  - serán transferidos
  - serán movidos
  lexicon: μετατίθημι
  rationale: ‘Trasladados’ refleja el movimiento de un lugar a otro sin adoptar un tecnicismo moderno como ‘transferidos’. ‘Movidos’ resulta demasiado general y menos fiel al registro.
- source_word: μετεσχηκότες τοῦ λόγου τοῦ δικαίου
  english_pob_choice: have shared in the word of the righteous one
  chosen_spanish: porque han participado de la palabra del justo
  alternatives_spanish:
  - porque han tenido parte en la palabra del justo
  - porque han compartido la palabra del justo
  lexicon: μετέχω + λόγος + δίκαιος
  rationale: ‘Participado de’ mantiene la construcción de participación real sin reducirla a mera posesión. ‘El justo’ conserva la posible referencia personal del griego y del inglés (‘the righteous one’) sin forzar una glosa doctrinal.
- source_word: ἔλθωσιν εἰς τὴν καρδίαν αὐτῶν
  english_pob_choice: if the evil deeds they have done come up into their heart
  chosen_spanish: si las malas obras que hicieron vienen a su corazón
  alternatives_spanish:
  - si las malas obras que hicieron entran en su corazón
  - si recuerdan en su corazón las malas obras que hicieron
  lexicon: καρδία
  rationale: ‘Vienen a su corazón’ preserva la imagen del texto y evita psicologizarla en exceso. ‘Corazón’ mantiene el centro interior de conciencia, memoria y arrepentimiento.
- source_word: οὐ σῴζονται
  english_pob_choice: they are not saved
  chosen_spanish: no son salvados
  alternatives_spanish:
  - no se salvan
  - no serán salvos
  lexicon: σῴζω
  rationale: ‘No son salvados’ conserva la pasiva y la dependencia de una acción recibida. ‘No se salvan’ puede sonar más idiomático, pero borra algo de la forma verbal del original.
- source_word: σκληρότητα τῆς καρδίας
  english_pob_choice: hardness of heart
  chosen_spanish: dureza de su corazón
  alternatives_spanish:
  - endurecimiento de su corazón
  - corazón endurecido
  lexicon: σκληρότης
  rationale: ‘Dureza de su corazón’ es una expresión natural en español y reproduce bien la imagen moral. ‘Endurecimiento’ enfatiza el proceso más que el estado.
theological_decisions:
- issue: Destino de los que han participado de la palabra del justo, pero aún necesitan purificación/traslado
  english_pob_reading: they will be transferred... because they have shared in the word of the righteous one
  chosen_spanish_reading: serán trasladados... porque han participado de la palabra del justo
  alternative_spanish_readings:
  - serán transferidos...
  - serán movidos...
  rationale: Se mantiene la ambigüedad del pasaje sobre la naturaleza exacta del ‘traslado’, sin convertirlo en una afirmación doctrinal más específica de lo que el texto ofrece. ‘Participado de la palabra’ conserva el vínculo causal que el texto establece.
  doctrine_reference: Soteriology; purification/judgment in apocalyptic literature
- issue: Condición para ser librados de los tormentos
  english_pob_reading: if the evil deeds they have done come up into their heart... if they do not come up into their heart
  chosen_spanish_reading: si las malas obras que hicieron vienen a su corazón... si no vienen a su corazón
  alternative_spanish_readings:
  - si recuerdan las malas obras que hicieron
  - si las malas obras les vuelven a la memoria
  rationale: Se conserva la lógica moral y psicológica del texto sin convertir ‘corazón’ en una mera metáfora de memoria. La condición queda abierta entre remordimiento, recuerdo y conversión interior, como en el griego.
  doctrine_reference: Repentance; moral memory; judgment
- issue: Negación final de salvación por dureza de corazón
  english_pob_reading: they are not saved because of their hardness of heart
  chosen_spanish_reading: no son salvados a causa de la dureza de su corazón
  alternative_spanish_readings:
  - no se salvan por la dureza de su corazón
  - no obtienen salvación a causa de la dureza de su corazón
  rationale: La pasiva ‘son salvados’ mantiene la forma recibida y la dependencia de la salvación. La causalidad moral se deja explícita con ‘a causa de’.
  doctrine_reference: Hardness of heart; salvation as divine action
translation_notes:
  revision_awareness: No applied revisions were supplied in the source packet. The Spanish draft follows the Greek source directly, using the English POB as an audit reference for the chosen sense of each clause and preserving the textual tensions around ‘trasladados’, ‘corazón’, and passive salvation language.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como regla general del proyecto, pero este pasaje no contiene el Tetragrámaton.
  - ‘Justo’ se usa para λόγος τοῦ δικαίου siguiendo el valor personal posible del griego; no se explicita ‘Cristo’ ni otra identificación no atestiguada en el paquete.
  - Se conserva la pasiva en ‘son salvados’ para no borrar la estructura del original.
  - No se añadieron notas al pie porque no hubo una alternativa textual o léxica que requiriera anclaje explícito en el verso.
