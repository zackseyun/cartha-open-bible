base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/015/001.yaml
  text: 'As for the other stones that you saw thrown far from the tower and falling into the road and rolling from the road into the pathless places: these are those who have believed, but because of their double‑mindedness they abandon their true road. Thinking, then, that they are able to find a better road, they go astray and suffer misery as they walk in the pathless places.'
translation:
  language: es
  text: 'En cuanto a las otras piedras que viste arrojadas lejos de la torre, cayendo en el camino y rodando del camino hacia lugares sin senda: estas son las personas que han creído, pero, por su doble ánimo, abandonan su camino verdadero. Pensando, entonces, que pueden hallar un camino mejor, se extravían y padecen miseria mientras andan por lugares sin senda.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λίθοι / stones
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - rocas
  - piedras de piedra
  lexicon: léxico común
  rationale: «Piedras» es el equivalente natural y transparente para el objeto del símbolo; mantiene la imaginería sin añadir dureza interpretativa innecesaria.
- source_word: μακρὰν ἀπὸ τοῦ πύργου / thrown far from the tower
  english_pob_choice: thrown far from the tower
  chosen_spanish: arrojadas lejos de la torre
  alternatives_spanish:
  - echadas lejos de la torre
  - tiradas lejos de la torre
  lexicon: léxico común
  rationale: «Arrojadas» conserva la idea de expulsión violenta o decisiva que sugiere el contexto, y «lejos de la torre» reproduce la distancia marcada por el griego.
- source_word: ὁδός / road
  english_pob_choice: road
  chosen_spanish: camino
  alternatives_spanish:
  - ruta
  - sendero
  lexicon: léxico común
  rationale: «Camino» es el equivalente más natural en español para el valor figurado y moral del término, sin perder la referencia literal a una vía de tránsito.
- source_word: ἀνόητος / pathless places
  english_pob_choice: pathless places
  chosen_spanish: lugares sin senda
  alternatives_spanish:
  - lugares sin camino
  - parajes sin sendero
  lexicon: léxico común
  rationale: «Lugares sin senda» preserva la ausencia de vía y mantiene un matiz más literario que «sin camino», evitando sobreinterpretar el paisaje simbólico.
- source_word: διψυχία / double-mindedness
  english_pob_choice: double-mindedness
  chosen_spanish: doble ánimo
  alternatives_spanish:
  - doblez de ánimo
  - mente dividida
  lexicon: léxico teológico y semántico
  rationale: «Doble ánimo» sigue la tradición española comprensible y conserva la tensión interior de la indecisión moral; no se reduce a mera vacilación psicológica.
- source_word: ἀληθινὴν ὁδόν / true road
  english_pob_choice: true road
  chosen_spanish: camino verdadero
  alternatives_spanish:
  - camino recto
  - verdadero camino
  lexicon: léxico común
  rationale: «Camino verdadero» conserva la correspondencia directa con el inglés POB y el contraste ético entre el camino real y la desviación.
- source_word: πλανῶνται / go astray
  english_pob_choice: go astray
  chosen_spanish: se extravían
  alternatives_spanish:
  - andan errantes
  - se desvían
  lexicon: léxico común
  rationale: «Se extravían» expresa desviación activa e involuntaria con buena fluidez bíblica en español.
- source_word: κακοπαθοῦσιν / suffer misery
  english_pob_choice: suffer misery
  chosen_spanish: padecen miseria
  alternatives_spanish:
  - sufren miseria
  - padecen aflicción
  lexicon: léxico común
  rationale: «Padecen miseria» conserva la gravedad del sufrimiento y evita suavizar el matiz de aflicción resultante del extravío.
theological_decisions:
- issue: Valor moral de la «doble ánimo» en los creyentes que se apartan del camino
  english_pob_reading: these are those who have believed, but because of their double-mindedness they abandon their true road
  chosen_spanish_reading: estos son los que han creído, pero, por su doble ánimo, abandonan su camino verdadero
  alternative_spanish_readings:
  - estos son los creyentes que, por su indecisión, abandonan su camino verdadero
  - estos son los que creyeron, pero su doble ánimo los aparta de su camino verdadero
  rationale: 'Se conserva la afirmación fuerte de que han creído, y a la vez la causa moral de la desviación: no es falta de conocimiento sino inestabilidad interior. «Doble ánimo» deja visible la tensión ética sin domesticarla.'
  doctrine_reference: cf. Stg 1:8; 4:8
- issue: Descripción del extravío como alejamiento real del camino, no solo error intelectual
  english_pob_reading: they go astray and suffer misery as they walk in the pathless places
  chosen_spanish_reading: se extravían y padecen miseria mientras andan por los lugares sin senda
  alternative_spanish_readings:
  - se pierden y sufren miseria al andar por lugares sin senda
  - se desvían y padecen miseria caminando por lugares sin camino
  rationale: 'La secuencia mantiene una progresión moral: decisión equivocada, extravío y sufrimiento. «Andan» evita embellecer el cuadro y conserva el movimiento penoso del texto.'
  doctrine_reference: cf. Prov 14:12
translation_notes:
  revision_awareness: No applied revisions were supplied in the audit context; the English POB text is stable under a high-agreement review pass (0.96). The Spanish draft follows the audited English sense closely while allowing Spanish idiom to carry the figurative contrasts naturally.
  spanish_consistency_notes:
  - Se mantiene «camino» para ὁδός en esta sección por consistencia con el contraste «camino verdadero / lugares sin senda».
  - Se usa «doble ánimo» como término estable para διψυχία, evitando alternarlo con «indecisión» dentro del mismo pasaje.
  - Se evita «Cristo», «SEÑOR» u otros términos no presentes en el texto fuente, dado que esta unidad no los requiere.
