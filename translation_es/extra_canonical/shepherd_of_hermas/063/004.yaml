  rationale: «Varas» reproduce el objeto al que alude el contexto y mantiene la concisión del inglés. Conserva la duplicación semántica «secas y cortadas» sin suavizarla ni interpretarla alegóricamente.
- source_word: handed them in
  english_pob_choice: handed them in
  chosen_spanish: las entregaron
  alternatives_spanish:
  - las presentaron
  - las dieron
  lexicon: hand in
  rationale: «Entregaron» refleja el acto de presentar algo para examen o comprobación, que es el sentido natural en el contexto narrativo.
- source_word: were found likewise to be dry and cut
  english_pob_choice: were found likewise to be dry and cut
  chosen_spanish: se halló que también estaban secas y cortadas
