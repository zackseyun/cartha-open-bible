  chosen_spanish: ordenó que se apartaran
  alternatives_spanish:
  - mandó que se apartaran
  - les ordenó que se apartaran
  lexicon: stand apart
  rationale: «Apartarse» expresa de forma natural la separación requerida y evita un calco rígido de «estar de pie aparte»; el sentido narrativo es la puesta aparte.
