  to: '2. Al verme ceñido y listo para servirle, me dijo: «Llama a los hombres cuyas varas han sido plantadas, por rangos, tal como cada uno entregó las varas». Y salí al campo y los llamé a todos; y todos se colocaron en sus rangos.'
