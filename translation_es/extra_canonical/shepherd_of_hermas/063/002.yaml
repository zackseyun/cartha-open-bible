  text: 2. Seeing me girded and ready to serve him, he says, “Call the men whose rods have been planted, by rank, just as each gave the rods.” And I went out to the field and called them all; and they all stood in their ranks.
translation:
  language: es
  text: '2. Al verme ceñido y listo para servirle, me dijo: «Llama a los hombres cuyas varas han sido plantadas, por rangos, tal como cada uno entregó las varas». Y salí al campo y los llamé a todos; y todos se colocaron en sus rangos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: girded
  english_pob_choice: girded
  chosen_spanish: ceñido
  alternatives_spanish:
  - preparado
  - ajustado con el cinturón
  lexicon: cf. ceñir
  rationale: «Ceñido» conserva la imagen corporal de estar ajustado para el servicio, sin explicitar más de lo que el griego y el inglés auditado muestran.
- source_word: ready to serve him
  english_pob_choice: ready to serve him
  chosen_spanish: listo para servirle
  alternatives_spanish:
  - dispuesto a servirle
  - preparado para servirle
  lexicon: cf. servir
  rationale: Mantiene la idea funcional de disponibilidad para el servicio inmediato, con un español natural y reverente.
- source_word: Call the men
  english_pob_choice: Call the men
  chosen_spanish: Llama a los hombres
  alternatives_spanish:
  - Convoca a los hombres
  - Llama a los varones
  lexicon: cf. llamar
  rationale: «Llama» reproduce el mandato directo; «hombres» mantiene el referente humano sin forzar un registro más técnico.
- source_word: whose rods have been planted
  english_pob_choice: whose rods have been planted
  chosen_spanish: cuyas varas han sido plantadas
  alternatives_spanish:
  - cuyas varas han sido sembradas
  - cuyas varas fueron plantadas
  lexicon: cf. plantar
  rationale: «Plantadas» conserva la metáfora agrícola del texto fuente y el carácter pasivo del hecho realizado previamente.
- source_word: by rank
  english_pob_choice: by rank
  chosen_spanish: por orden
  alternatives_spanish:
  - en orden
  - por filas
  lexicon: cf. τάξις / orden
  rationale: «Por orden» expresa la disposición jerárquica o secuencial indicada por el griego sin añadir una organización militar demasiado específica.
- source_word: just as each gave the rods
  english_pob_choice: just as each gave the rods
  chosen_spanish: tal como cada uno entregó las varas
  alternatives_spanish:
  - según cada uno entregó las varas
  - como cada uno dio las varas
  lexicon: cf. δίδωμι
  rationale: «Entregó» da un tono algo más formal y preciso que «dio», y encaja con el acto de presentar las varas al inicio.
- source_word: went out to the field
  english_pob_choice: went out to the field
  chosen_spanish: salí al campo
  alternatives_spanish:
  - fui al campo
  - salí al terreno
  lexicon: cf. campo
  rationale: «Salí al campo» conserva la salida física hacia el lugar de reunión y resulta idiomático en español.
- source_word: stood in their ranks
  english_pob_choice: stood in their ranks
  chosen_spanish: se pusieron en sus puestos
  alternatives_spanish:
  - se colocaron en sus filas
  - se mantuvieron en sus puestos
  lexicon: cf. τάξις / rango
  rationale: «En sus puestos» transmite la disposición ordenada y respetuosa del grupo; evita una literalidad rígida de «rangos» que sonaría extraña en español.
theological_decisions:
- issue: Orden visible de los convocados
  english_pob_reading: The men are called and stand in the order corresponding to the rods they planted.
  chosen_spanish_reading: Los hombres son llamados y se colocan conforme al orden asociado con las varas que entregaron y plantaron.
  alternative_spanish_readings:
  - Los hombres quedan ordenados según las varas plantadas.
  - Los hombres se agrupan por rangos.
  rationale: No hay necesidad de cargar la escena con una teología explícita; se preserva la idea de orden discernible y correspondencia entre acción previa y resultado posterior.
  doctrine_reference: Order and discernment in didactic parable, without doctrinal expansion
translation_notes:
  revision_awareness: The English POB is already an optimal-equivalence rendering with no footnotes or revisions in the audit context. The Spanish draft follows the same verse segmentation and preserves the action sequence, rank/order language, and planted-rods metaphor without adding interpretive glosses.
  spanish_consistency_notes:
  - Se mantiene «varas» para rods, evitando «bastones» o «ramas», que cambiarían el campo semántico.
  - Se usa «orden»/«puestos» para respetar la idea de disposición secuencial sin introducir tecnicismos militares.
  - No se añade puntuación explicativa fuera del discurso directo, para conservar el ritmo narrativo breve del original.
