  text: 5. Then those who had the dry but not cut [rods] handed them in. And some of them handed in their rods green, but others dry and cut, as if worm-eaten. So those who had handed in green [rods] he ordered to stand apart, but those with dry—
translation:
  language: es
  text: 5. Entonces los que tenían las varas secas pero no cortadas las entregaron. Y algunos de ellos presentaron sus varas verdes, pero otros, secas y cortadas, como si estuvieran carcomidas por gusanos. Así que a los que habían entregado varas verdes les ordenó que se apartaran, pero a los que habían entregado secas—
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: rods
  english_pob_choice: '[rods]'
  chosen_spanish: varas [las]
  alternatives_spanish:
  - bastones [los]
  - ramas [las]
  lexicon: rhabdos / ῥάβδος
  rationale: «Vara» es el equivalente más natural y sobrio en español para ῥάβδος en este contexto; conserva la imagen material sin añadir connotaciones pastorales o monásticas de «bastón» ni vegetales de «rama». El pronombre «las» reproduce el elemento elíptico del inglés entre corchetes.
- source_word: green
  english_pob_choice: green [rods]
  chosen_spanish: verdes [varas]
  alternatives_spanish:
  - tiernas [varas]
  - frescas [varas]
  lexicon: chlōros / χλωρός
  rationale: «Verdes» mantiene el contraste visible con «secas» y refleja el color/estado fresco de la madera. «Tiernas» o «frescas» explicitarían la idea, pero el texto griego permite la imagen directa de algo aún verde.
- source_word: dry
  english_pob_choice: dry
  chosen_spanish: secas
  alternatives_spanish:
  - áridas
  - ya secas
  lexicon: xēros / ξηρός
  rationale: «Secas» es la opción más transparente y idiomática para ξηρός en referencia a madera; conserva la oposición básica con «verdes».
- source_word: cut
  english_pob_choice: cut
  chosen_spanish: cortadas
  alternatives_spanish:
  - podadas
  - melladas
  lexicon: temnō / τέμνω
  rationale: «Cortadas» reproduce el hecho de haber sido seccionadas sin introducir un matiz especializado como «podadas», que sugeriría tratamiento agrícola no explicitado.
- source_word: worm-eaten
  english_pob_choice: as if worm-eaten
  chosen_spanish: como si estuvieran carcomidas por gusanos
  alternatives_spanish:
  - como comidas por gusanos
  - como apolilladas
  lexicon: skōlēkobrotos / σκωλήκοβρωτος
  rationale: La expresión «carcomidas por gusanos» conserva el carácter vívido y deteriorativo de la imagen, y suena natural en español bíblico/solemne. «Apolilladas» cambiaría la imagen zoológica, y «comidas por gusanos» es más llano pero menos preciso.
theological_decisions:
- issue: Conservar la secuencia simbólica de contraste material sin interpretarla alegóricamente
  english_pob_reading: The English keeps the concrete rod imagery and the contrast between green, dry, cut, and worm-eaten rods without explanatory expansion.
  chosen_spanish_reading: El español mantiene la imagen concreta de las varas y su estado físico, sin añadir una interpretación simbólica que el texto aquí no explicita.
  alternative_spanish_readings:
  - Parafrasear el estado de las varas como signos morales.
  - Aclarar el símbolo con una glosa interpretativa.
  rationale: El pasaje funciona narrativamente mediante una clasificación visible; introducir explicaciones excedería el alcance del segmento y borraría la tensión entre estados materiales contrastantes.
  doctrine_reference: Hermas, Similitud 8, sección iv; principio de no sobre-interpretación en traducción
- issue: Conservar la frase truncada del final
  english_pob_reading: 'The English ends with a dash: ''but those with dry—'''
  chosen_spanish_reading: «pero a los que tenían secas—»
  alternative_spanish_readings:
  - Completar la frase con una inferencia.
  - Suavizar el corte con puntos suspensivos.
  rationale: El corte final parece depender de la continuidad textual del contexto mayor; reproducir la interrupción preserva la estructura del testimonio transmitido y evita completar lo que no está presente en el segmento.
  doctrine_reference: Crítica textual y respeto del límite de unidad transmitida
translation_notes:
  revision_awareness: No applied revisions are present in the audit context. The Spanish draft therefore follows the provided Greek-source-backed English segment closely, preserving the fragmentary ending and the inventory of rod conditions without adding interpretive material.
  spanish_consistency_notes:
  - Se mantiene «varas» para ῥάβδος de forma consistente.
  - Se mantiene la oposición «verdes / secas» para conservar el contraste de estado material.
  - Se conserva el final cortado con raya para reflejar la fragmentación del segmento transmitido.
