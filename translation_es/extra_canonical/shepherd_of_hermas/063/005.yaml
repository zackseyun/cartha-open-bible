  revision_rationale: Se corrige la última cláusula para conservar la misma referencia verbal del original y del inglés auditado ('habían entregado'), y se elimina el corchete artificial '[las]' para un español más natural. También se suaviza una repetición inmediata con 'presentaron' sin alterar el sentido.
