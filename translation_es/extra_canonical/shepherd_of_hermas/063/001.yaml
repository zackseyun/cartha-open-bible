  text: And after a few days we came to the place, and the Shepherd sat down in the place of the angel, and I stood beside him. And he says to me, “Gird yourself with a raw-linen garment, and serve me.” So I girded myself with a clean raw-linen garment made from sackcloth.
translation:
  language: es
  text: 'Y después de unos pocos días llegamos al lugar, y el Pastor se sentó en el lugar del ángel, y yo me puse de pie junto a él. Y me dice: «Cíñete con una vestidura de lino crudo y sírveme». Así que me ceñí con una vestidura limpia de lino crudo, hecha de tela de saco.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ ποιμὴν / the Shepherd
  english_pob_choice: the Shepherd
  chosen_spanish: el Pastor
  alternatives_spanish:
  - el Pastor espiritual
  - el Pastor divino
  lexicon: N/A
  rationale: Se conserva el título propio tradicional del texto, sin forzar una identificación interpretativa más allá del griego y del uso del inglés POB.
- source_word: ἄγγελος / angel
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: N/A
  rationale: El contexto inmediato del relato exige la referencia personal celestial; 'ángel' mantiene la correspondencia directa con el original y con el audit trail inglés.
- source_word: ζώσασθε / gird yourself
  english_pob_choice: Gird yourself
  chosen_spanish: cíñete
  alternatives_spanish:
  - ajústate
  - átate
  lexicon: N/A
  rationale: '''Cíñete'' reproduce con naturalidad la acción de ajustarse una prenda para el servicio, sin perder el valor verbal concreto del original.'
- source_word: ὀθόνιον / raw-linen garment
  english_pob_choice: raw-linen garment
  chosen_spanish: vestidura de lino crudo
  alternatives_spanish:
  - prenda de lino crudo
  - ropa de lino sin blanquear
  lexicon: N/A
  rationale: '''Lino crudo'' conserva la cualidad material indicada por el inglés y evita introducir una noción de pureza ritual no explicitada por el término.'
- source_word: σάκκος / sackcloth
  english_pob_choice: sackcloth
  chosen_spanish: tela de saco
  alternatives_spanish:
  - sayal
  - cilicio
  lexicon: N/A
  rationale: '''Tela de saco'' es una forma transparente en español y preserva el sentido material de la fibra/prenda, sin cargarlo con la connotación ascética de ''cilicio''.'
- source_word: καθαρόν / clean
  english_pob_choice: clean
  chosen_spanish: limpia
  alternatives_spanish:
  - pura
  - sin mancha
  lexicon: N/A
  rationale: Se conserva el adjetivo simple de limpieza, que en este contexto modifica la prenda sin ampliar el sentido a pureza moral.
theological_decisions:
- issue: Identidad y función del 'Pastor'
  english_pob_reading: the Shepherd sat down in the place of the angel
  chosen_spanish_reading: el Pastor se sentó en el lugar del ángel
  alternative_spanish_readings:
  - el Pastor se sentó donde estaba el ángel
  - el Pastor tomó el lugar del ángel
  rationale: La redacción mantiene la relación espacial y funcional del pasaje sin añadir explicaciones sobre ontología o simbolismo del Pastor; se sigue el valor narrativo directo del inglés POB.
  doctrine_reference: Narrative Christological/angelic imagery in Shepherd of Hermas; no doctrinal expansion beyond the text.
- issue: Imperativo de servicio
  english_pob_reading: serve me
  chosen_spanish_reading: sírveme
  alternative_spanish_readings:
  - atiéndeme
  - hazme servicio
  rationale: '''Sírveme'' conserva la brevedad e imperatividad del original y del inglés POB, sin sustituirlo por una perífrasis más débil o más interpretativa.'
  doctrine_reference: Servanthood/obedience motif in early Christian literature.
translation_notes:
  revision_awareness: No se registran revisiones previas ni variantes editoriales en el paquete de entrada; la redacción se apoya directamente en el griego normalizado OCR y en la traducción auditada en inglés.
  spanish_consistency_notes:
  - Se usó 'lino crudo' de manera consistente para raw-linen, evitando 'lino blanco' o 'lino fino' que alterarían el referente material.
  - Se mantuvo la puntuación narrativa sencilla para reflejar la cadencia de la fuente y del inglés POB.
  - No se introdujeron notas al pie porque el paquete no documenta variantes textuales ni alternativas obligatorias para este segmento.
