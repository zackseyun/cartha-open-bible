- from: 'Y después de pocos días llegamos al lugar, y el Pastor se sentó en el lugar del ángel, y yo me puse de pie junto a él. Y me dice: «Cíñete con una vestidura de lino crudo y sírveme». Así que me ceñí con una vestidura limpia de lino crudo hecha de tela de saco.'
  to: 'Y después de unos pocos días llegamos al lugar, y el Pastor se sentó en el lugar del ángel, y yo me puse de pie junto a él. Y me dice: «Cíñete con una vestidura de lino crudo y sírveme». Así que me ceñí con una vestidura limpia de lino crudo, hecha de tela de saco.'
  rationale: Se mantiene íntegramente el contenido del original y del POB inglés, pero se corrige la naturalidad del español. 'Unos pocos días' refleja mejor el indefinido del original mediado por el inglés, y la coma en la última oración aclara que la prenda de lino crudo estaba hecha de tela de saco, evitando una secuencia pesada y potencialmente ambigua.
