    issue: Concordancia inconsistente entre sujeto distributivo singular y verbo plural
    rationale: '«Cada uno saque ... y tráiganmelas» mezcla singular y plural dentro del mismo mandato. El griego/inglés expresan una instrucción a cada individuo; en español conviene sostener el singular distributivo: «traígamela» o reformular todo en plural.'
  - severity: low
    issue: «sus propias varas» puede sonar menos preciso que «su propia vara» en contexto distributivo
    rationale: 'Dado «Cada uno», el español idiomático normalmente expresa la posesión individual con singular: «su propia vara». Así se preserva mejor el valor distributivo sin ambigüedad.'
  revised_spanish_text: '3. Él les dice: «Cada uno saque su propia vara y tráigamela».'
  revision_rationale: Se corrige la concordancia para que todo el mandato mantenga el singular distributivo introducido por «Cada uno». También se ajusta «sus propias varas» a «su propia vara», que en español expresa mejor la posesión individual implícita en el original y en el POB inglés, sin cambiar el sentido.
