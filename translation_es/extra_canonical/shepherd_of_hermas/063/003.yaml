translation_notes:
  revision_awareness: No se reportan revisiones aplicadas ni variantes textuales en el paquete de auditoría; la redacción se apoya directamente en el texto griego normalizado y en la equivalencia óptima del POB inglés.
  spanish_consistency_notes:
  - Se mantiene el presente narrativo («dice») para conservar vivacidad y concordar con el estilo del POB.
  - «Varas» se conserva de modo uniforme para el objeto material del pasaje.
  - El imperativo plural en segunda persona («tráiganmelas») refleja el mandato dirigido al grupo sin añadir formalidad innecesaria.
