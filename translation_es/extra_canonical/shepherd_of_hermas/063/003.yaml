  text: 3. He says to them, “Let each pull up his own rods and bring them to me.”
translation:
  language: es
  text: '3. Él les dice: «Cada uno saque su propia vara y tráigamela».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λέγει αὐτοῖς / He says to them
  english_pob_choice: He says to them
  chosen_spanish: Él les dice
  alternatives_spanish:
  - Les dice
  - Y les dice
  lexicon: λέγω
  rationale: Conservo el presente narrativo del original y del POB en español natural. «Él» explicita el sujeto sin forzar la sintaxis, y «les dice» mantiene el destinatario plural.
- source_word: ἕκαστος
  english_pob_choice: each
  chosen_spanish: Cada uno
  alternatives_spanish:
  - Cada quien
  - Cada cual
  lexicon: ἕκαστος
  rationale: «Cada uno» es la opción más clara y neutra en español, y reproduce la distribución individual del mandato sin añadir matiz interpretativo.
- source_word: ἐξέλκῃ / pull up
  english_pob_choice: pull up
  chosen_spanish: saque
  alternatives_spanish:
  - arranque
  - extraiga
  - levante
  lexicon: ἐξέλκω
  rationale: El verbo griego expresa sacar hacia fuera; en español, «saque» comunica la acción de retirar las varas de manera idiomática y suficientemente concreta. «Arranque» sería más fuerte de lo que exige el contexto, y «extraiga» suena más técnico.
- source_word: τὴν ῥάβδον αὐτοῦ / his own rods
  english_pob_choice: his own rods
  chosen_spanish: sus propias varas
  alternatives_spanish:
  - sus varas
  - la vara que le pertenece
  lexicon: ῥάβδος
  rationale: «Varas» respeta el objeto concreto del relato; «sus propias» conserva la insistencia en posesión individual que tiene el original y que el POB inglés también hace explícita con «own».
- source_word: καὶ φέρειν αὐτάς / and bring them to me
  english_pob_choice: and bring them to me
  chosen_spanish: y tráiganmelas
  alternatives_spanish:
  - y tráiganlas a mí
  - y llévenmelas
  lexicon: φέρω
  rationale: Uso la forma enclítica «tráiganmelas» para sonar natural en español y mantener la idea de traer los objetos al hablante. La combinación de mandato plural y pronombre átono conserva la referencia directa a las varas.
theological_decisions:
