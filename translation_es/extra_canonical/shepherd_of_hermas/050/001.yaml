review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego y del inglés POB: una pregunta de llegada seguida por la explicación de que el hablante está cumpliendo un puesto/guardia. Sin embargo, «porque» suena causal y poco natural aquí para introducir la respuesta; el inglés refleja más bien una contestación elíptica: «Yes, sir, because I am keeping a station» o «I have come because...», pero el español tal como está queda torpe. Además, «haciendo mi guardia» comunica bien la función, aunque «estoy de guardia» suena más idiomático en español general.'
  spanish_quality_summary: El texto es mayormente claro, pero necesita una pequeña mejora de naturalidad y fluidez dialogal. «¿Has venido?» y «señor» funcionan bien. La frase final se lee mejor como «estoy de guardia», que conserva el sentido de puesto asignado sin el giro algo literal «haciendo mi guardia».
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. κύριε se vierte adecuadamente como «señor» en contexto humano. No hay términos teológicos sensibles. La decisión para σταθμόν debe priorizar español idiomático: «de guardia»/«en mi puesto» mejor que una literalidad opaca.'
  issues:
  - severity: medium
    issue: «porque» introduce la respuesta de forma poco natural en español.
    rationale: Aunque copia el inglés POB, en español dialogal la secuencia «digo, porque...» suena forzada y ambigua. «Pues» o una simple yuxtaposición reproduce mejor la respuesta explicativa sin alterar el sentido.
  - severity: low
    issue: «estoy haciendo mi guardia» es comprensible pero menos idiomático que «estoy de guardia».
    rationale: El griego/inglés apuntan a cumplir un puesto o guardia. «Estoy de guardia» expresa esto con mayor naturalidad en español ampliamente legible.
  revised_spanish_text: «¿Has venido?», digo. «Sí, señor; estoy de guardia».
  revision_rationale: Se ajusta la puntuación y la formulación de la respuesta para un español más natural, manteniendo el sentido de llegada seguida de la explicación de que el hablante cumple un puesto/guardia. «Estoy de guardia» preserva mejor el valor funcional de σταθμόν en español idiomático.
