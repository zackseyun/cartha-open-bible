  yaml_path: translation/extra_canonical/shepherd_of_hermas/050/001.yaml
  text: '"Have you come?" I say, "Because, sir, I am keeping a station."'
translation:
  language: es
  text: «¿Has venido?», digo. «Sí, señor; estoy de guardia».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἦλθες; / “Have you come?”
  english_pob_choice: Have you come?
  chosen_spanish: ¿Has venido?
  alternatives_spanish:
  - ¿Viniste?
  - ¿Has llegado?
  lexicon: ἔρχομαι
  rationale: La pregunta expresa llegada/arribo en forma natural de presente perfecto en español. ‘¿Has venido?’ conserva la cercanía del original sin forzar un giro más interpretativo como ‘¿Has llegado?’. El pretérito simple sería posible, pero menos directo para una pregunta inmediata.
- source_word: κύριε / “sir”
  english_pob_choice: sir
  chosen_spanish: señor
  alternatives_spanish:
  - señor mío
  - amo
  lexicon: κύριος
  rationale: Aquí el vocativo es de cortesía hacia el interlocutor humano en el diálogo. ‘Señor’ reproduce el tono respetuoso del inglés POB sin introducir una lectura divina o eclesiástica no sugerida por el contexto inmediato.
- source_word: σταθμόν / “station”
  english_pob_choice: keeping a station
  chosen_spanish: haciendo mi guardia
  alternatives_spanish:
  - estando de puesto
  - cumpliendo mi turno
  lexicon: σταθμός
  rationale: La imagen parece referirse a estar de guardia o de puesto, no a una ‘estación’ en sentido moderno. ‘Haciendo mi guardia’ comunica en español la idea funcional de permanecer en un puesto asignado, con naturalidad y sin perder el matiz de vigilancia.
translation_notes:
  revision_awareness: No se registran revisiones previas en el paquete; se mantiene la lectura breve y directa del texto griego y la traducción inglesa auditada, evitando añadir explicaciones o armonizaciones no presentes en la fuente.
  spanish_consistency_notes:
  - Se mantiene un tono dialogal breve, con comillas españolas y puntuación moderna.
  - No se introduce terminología doctrinal; el pasaje se traduce de forma estrictamente narrativa y situacional.
  - ‘Señor’ se usa como vocativo cortés en este contexto, no como sustituto reverencial de un nombre divino.
