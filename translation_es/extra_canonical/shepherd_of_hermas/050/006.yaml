base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/050/006.yaml
  text: '"After a time the master of the slave [and of the field] came and went into the vineyard. And seeing the vineyard well fenced, and even dug, and [all] the weeds pulled out, he rejoiced greatly over his slave on account of his deed. Summoning again his friends and his son, the master announced to them the deed the slave had done with his portions which he had received; and they approved all the more that the slave should become co-heir with his son."'
translation:
  language: es
  text: «Después de un tiempo, el amo del esclavo y del campo vino y entró en la viña. Y al ver la viña bien cercada, y además cavada, con todas las malas hierbas arrancadas[a], se alegró mucho por su esclavo a causa de su obra. Llamando de nuevo a sus amigos y a su hijo, el amo les anunció la obra que el esclavo había realizado con las porciones que había recibido; y aprobaron aún más que el esclavo llegara a ser coheredero con su hijo»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma entre corchetes del inglés POB refleja un elemento omitido o implicado en el texto griego normalizado; en español se expresa naturalmente como «todas las malas hierbas».
    reason: textual_variant
lexical_decisions:
- source_word: ὁ κύριος τοῦ δούλου
  english_pob_choice: the master of the slave
  chosen_spanish: el dueño del esclavo
  alternatives_spanish:
  - el señor del esclavo
  - el amo del esclavo
  lexicon: κύριος; δοῦλος
  rationale: Conservo la relación de propiedad/autoridad con «dueño» para κύριος en este contexto narrativo, y mantengo «esclavo» para δοῦλος siguiendo la fuerza léxica del texto y la elección de POB en inglés. «Amo» suena más idiomático en español, pero puede oscurecer el matiz social y jurídico que el texto conserva.
- source_word: τοῦ ἀγροῦ
  english_pob_choice: of the field
  chosen_spanish: del campo
  alternatives_spanish:
  - de la tierra
  - de la parcela
  lexicon: ἀγρός
  rationale: «Campo» es la equivalencia más natural y fiel en español para ἀγρός en este marco agrícola. «Parcela» sería más específica, pero introduce precisión no exigida por el texto.
- source_word: τὸν ἀμπελῶνα
  english_pob_choice: the vineyard
  chosen_spanish: la viña
  alternatives_spanish:
  - el viñedo
  - la viña
  lexicon: ἀμπελών
  rationale: «Viña» mantiene la imagen bíblica y es perfectamente inteligible en español. «Viñedo» es posible, pero «viña» conserva mejor la sencillez del relato y su resonancia tradicional sin perder exactitud.
- source_word: ἀναγγείλας
  english_pob_choice: announced
  chosen_spanish: anunció
  alternatives_spanish:
  - dio a conocer
  - declaró
  lexicon: ἀναγγέλλω
  rationale: «Anunció» comunica con claridad el acto de informar solemnemente; evita sobrecargar el verbo con matices no necesarios para el sentido narrativo.
- source_word: συγκληρονομῆσαι
  english_pob_choice: become co-heir
  chosen_spanish: llegara a ser coheredero
  alternatives_spanish:
  - se convirtiera en coheredero
  - fuera heredero juntamente
  lexicon: συγκληρονομέω
  rationale: «Coheredero» es el equivalente directo y natural en español para la idea de heredar conjuntamente. Mantengo el subjuntivo narrativo «llegara a ser» para reflejar la cláusula de aprobación/resultativo sin forzar una interpretación doctrinal adicional.
theological_decisions:
- issue: Relación entre el esclavo y el hijo del dueño
  english_pob_reading: the slave should become co-heir with his son
  chosen_spanish_reading: que el esclavo llegara a ser coheredero con su hijo
  alternative_spanish_readings:
  - que el esclavo fuera coheredero junto con su hijo
  - que el esclavo se hiciera coheredero de su hijo
  rationale: 'Conservo la tensión del original: el esclavo recibe una dignidad compartida con el hijo, sin suavizar la asimetría social ni convertirla en mera metáfora espiritual. «Coheredero con su hijo» preserva la estructura relacional del texto.'
  doctrine_reference: Herma, Similitude 5; tema de recompensa y adopción compartida en lenguaje parabólico, no formulación dogmática directa
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marca de nota al pie aparezca explícitamente en el texto español. Además, se mantuvo la correspondencia con el griego normalizado y con la decisión inglesa POB de conservar «slave» como «esclavo».
  spanish_consistency_notes:
  - Se usa «viña» y no «viñedo» para mantener una expresión breve, natural y tradicional sin desplazar el sentido agrícola del pasaje.
  - Se evita «siervo» porque el texto distingue claramente la condición de δοῦλος y la relación de propiedad del dueño.
  - Se preserva la estructura narrativa completa con dos verbos de movimiento («vino y entró») para reflejar el griego y el inglés auditado.
  - No se introduce terminología eclesiástica ajena al relato; el lenguaje permanece parabólico y doméstico.
