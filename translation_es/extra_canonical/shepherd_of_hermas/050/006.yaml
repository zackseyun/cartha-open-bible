revisions:
- from: «Después de un tiempo, el dueño del esclavo[a] y del campo[b] vino y entró en la viña. Y al ver la viña bien cercada, y aun cavada, y arrancadas [c] todas las malas hierbas, se alegró mucho por su esclavo a causa de lo que había hecho. Llamando de nuevo a sus amigos y a su hijo, el dueño les anunció la obra que el esclavo había realizado con sus porciones, las que había recibido; y aprobaron tanto más que el esclavo llegara a ser coheredero con su hijo».
  to: «Después de un tiempo, el amo del esclavo y del campo vino y entró en la viña. Y al ver la viña bien cercada, y además cavada, con todas las malas hierbas arrancadas[a], se alegró mucho por su esclavo a causa de su obra. Llamando de nuevo a sus amigos y a su hijo, el amo les anunció la obra que el esclavo había realizado con las porciones que había recibido; y aprobaron aún más que el esclavo llegara a ser coheredero con su hijo»
  rationale: 'La revisión conserva el sentido del original y del English POB, pero mejora la naturalidad del español, corrige la colocación del marcador de nota y simplifica giros algo calcados o pesados. También reduce notas innecesarias: no hace falta explicar «campo» ni «amo» en nota si el texto principal ya es claro.'
