review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego y del English POB: regreso del amo/propietario, inspección de la viña, gozo por la obra del esclavo y aprobación de que sea coheredero con el hijo. Sin embargo, hay pequeños problemas de naturalidad y de anclaje de notas: «y aun cavada» suena algo calcado, «arrancadas [c] todas las malas hierbas» tiene colocación poco natural y el marcador [c] está separado del elemento anotado. Además, «porciones» para the portions he had received es entendible pero algo opaco en español sin contexto adicional.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero puede mejorar en fluidez con ajustes mínimos: «y además cavada» o «e incluso cavada», «con todas las malas hierbas arrancadas[a]», y «con las porciones que había recibido». También conviene usar «amo» en el cuerpo del texto para mayor naturalidad narrativa en español, manteniendo una nota léxica si se desea explicar κύριος; la propia justificación del borrador reconoce que «amo» es más idiomático.'
  glossary_alignment: Se mantiene correctamente «esclavo» para δοῦλος y «coheredero» para συγκληρονομέω, en línea con la política del proyecto. No hay términos teológicos sensibles que requieran cambio. El uso de «dueño» para κύριος es defendible, pero «amo» encaja mejor en este contexto de esclavitud y preserva la relación social/jurídica sin sonar abstracto.
  issues:
  - severity: medium
    issue: La frase «y aun cavada» suena poco natural en español actual.
    rationale: Parece un calco del inglés «and even dug». En español narrativo claro, «y además cavada» o «e incluso cavada» transmite mejor el sentido sin perder fidelidad.
  - severity: medium
    issue: «arrancadas [c] todas las malas hierbas» tiene orden y anclaje de nota poco naturales.
    rationale: En español es más fluido «con todas las malas hierbas arrancadas[a]». Además, el marcador debe ir pegado a la palabra o frase anotada, no separado por espacio.
  - severity: low
    issue: «con sus porciones, las que había recibido» es algo torpe.
    rationale: La repetición relativa añade pesadez. «con las porciones que había recibido» conserva el sentido del English POB con mejor legibilidad.
  - severity: low
    issue: «dueño del esclavo» es posible, pero «amo del esclavo» resulta más idiomático en esta escena.
    rationale: Dado que el contexto explícito es esclavitud, «amo» expresa con naturalidad la relación de autoridad/propiedad. Puede conservarse una nota para indicar la posibilidad de «señor» o «dueño».
