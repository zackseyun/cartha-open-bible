  text: I say, "Why, sir, do you say this?"
translation:
  language: es
  text: 'Digo: «¿Por qué, señor, dices esto?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λέγω / λέγεις (implicit dialogue speech)
  english_pob_choice: I say, "Why, sir, do you say this?"
  chosen_spanish: 'Digo: «¿Por qué, señor, dices esto?»'
  alternatives_spanish:
  - 'pregunto: «¿Por qué, señor, dices esto?»'
  - 'digo: «¿Por qué, señor, me dices esto?»'
  lexicon: λέγω
  rationale: El griego presenta una réplica directa de habla; «digo» conserva el movimiento narrativo y la forma de discurso del inglés POB sin añadir interpretación. «Pregunto» haría más explícita la función interrogativa de lo que exige el texto; «me dices esto» sería una expansión no garantizada por el griego.
- source_word: κύριε
  english_pob_choice: sir
  chosen_spanish: señor
  alternatives_spanish:
  - señor mío
  - maestro
  lexicon: κύριος
  rationale: Aquí κύριε funciona como vocativo de respeto, no como referencia al nombre divino. «Señor» es el equivalente natural y digno en español contemporáneo; «maestro» introduciría una relación distinta, y «señor mío» suena más enfático de lo que el pasaje requiere.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - eso
  - tal cosa
  lexicon: οὗτος
  rationale: «Esto» reproduce de manera directa el demostrativo cercano del griego y la brevedad del inglés POB. «Eso» puede funcionar, pero en español suele alejar ligeramente el referente; «tal cosa» añade una carga estilística innecesaria.
theological_decisions:
- issue: Vocativo κύριε y posible confusión con lenguaje divino
  english_pob_reading: sir
  chosen_spanish_reading: señor como tratamiento humano de respeto
  alternative_spanish_readings:
  - Señor con mayúscula
  - Señor
  rationale: En este contexto no hay indicio de que el vocativo apunte al título divino; es una fórmula de cortesía dirigida al interlocutor. Mantener minúscula evita una lectura teológica no sustentada por el pasaje.
  doctrine_reference: Distinción entre uso honorífico humano y uso teológico del título divino en el discurso bíblico y cristiano primitivo
translation_notes:
  revision_awareness: No se documentan revisiones previas ni notas textuales en el paquete de auditoría. La redacción sigue directamente el breve intercambio del texto fuente y la solución inglesa ya establecida.
  spanish_consistency_notes:
  - Se mantiene un español sobrio y publicable, con puntuación de cita en estilo moderno.
  - No se emplea 'SEÑOR' en mayúsculas porque el vocativo griego aquí no corresponde al nombre divino.
  - La brevedad del enunciado se conserva sin añadir glosas explicativas.
