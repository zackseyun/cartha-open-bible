base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/050/005.yaml
  text: He says to me, "I tell you, this is not fasting, the kind you suppose you are fasting to the Lord. Listen to a parable. A vineyard, not having weeds, will give more fruit, not being choked by the weeds. So the slave took up [his tool], dug the vineyard, and pulled up all the weeds that were in the vineyard. And that vineyard became very comely and thriving, having no weeds to choke it.
translation:
  language: es
  text: 'Él me dice: «Te digo que esto no es ayuno, el que supones que estás haciendo para el Señor. Escucha una parábola. Una viña, si no tiene maleza, dará más fruto, al no ser ahogada por la maleza. Así que el esclavo tomó [su herramienta], cavó la viña y arrancó toda la maleza que había en la viña. Y aquella viña se volvió muy hermosa y floreciente, al no tener maleza que la ahogara».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: νηστεία / νηστεύειν (conceptual)
  english_pob_choice: fasting
  chosen_spanish: ayuno
  alternatives_spanish:
  - abstinencia
  lexicon: N/A
  rationale: El contexto trata del acto religioso de ayunar; «ayuno» es la forma natural y fiel en español. «Abstinencia» sería más general y menos precisa aquí.
- source_word: παραβολή
  english_pob_choice: parable
  chosen_spanish: parábola
  alternatives_spanish:
  - comparación
  - alegoría
  lexicon: N/A
  rationale: «Parábola» es el equivalente directo y de uso bíblico claro en español; conserva el carácter didáctico del recurso.
- source_word: ἀμπελών
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  lexicon: N/A
  rationale: «Viña» es el término más natural y bíblicamente reconocible para el cultivo de vides; mantiene la imagen agrícola del original.
- source_word: ζιζάνια / ζιζάνιον (conceptual)
  english_pob_choice: weeds
  chosen_spanish: maleza
  alternatives_spanish:
  - hierbas malas
  - cizaña
  lexicon: N/A
  rationale: El texto habla genéricamente de vegetación invasora; «maleza» es amplio y evita introducir la especie específica «cizaña», que podría sugerir otro pasaje o una identificación más estrecha de la prevista.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: N/A
  rationale: Se conserva la fuerza léxica de δοῦλος como «esclavo», siguiendo la decisión inglesa y evitando suavizar el término a «siervo» sin base textual.
- source_word: σκεῦος / ὄργανον (instrumento de labor)
  english_pob_choice: '[his tool]'
  chosen_spanish: '[su herramienta]'
  alternatives_spanish:
  - '[su instrumento]'
  - '[su apero]'
  lexicon: N/A
  rationale: La expresión entre corchetes señala una palabra implícita o reconstruida por el contexto. «Herramienta» es la opción más transparente y natural para el español moderno.
- source_word: καθάρω / καθαίρω (idea de limpiar/desyerbar)
  english_pob_choice: dug the vineyard, and pulled up all the weeds
  chosen_spanish: cavó la viña y arrancó toda la maleza
  alternatives_spanish:
  - labró la viña y arrancó toda la maleza
  - desyerbó la viña
  lexicon: N/A
  rationale: «Cavó» reproduce la labor concreta de preparar el terreno; «arrancó toda la maleza» preserva el sentido de eliminación completa de la vegetación nociva.
- source_word: εὐπρεπής / καλός (idea de belleza, buena condición)
  english_pob_choice: very comely and thriving
  chosen_spanish: muy hermosa y floreciente
  alternatives_spanish:
  - muy bella y próspera
  - muy agradable y vigorosa
  lexicon: N/A
  rationale: La pareja inglesa combina apariencia agradable y prosperidad/vitalidad. «Hermosa y floreciente» transmite ambos matices con español natural y digno.
- source_word: πνίγω (idea de ahogar/asfixiar)
  english_pob_choice: choked
  chosen_spanish: ahogada
  alternatives_spanish:
  - sofocada
  - estrangulada
  lexicon: N/A
  rationale: «Ahogada» mantiene la metáfora de ser impedida y sofocada por la maleza, sin intensificarla innecesariamente.
theological_decisions:
- issue: Valor de «para el Señor» en el ayuno
  english_pob_reading: the kind you suppose you are fasting to the Lord
  chosen_spanish_reading: el que supones que estás haciendo para el Señor
  alternative_spanish_readings:
  - el que supones que ayunas al Señor
  - el que crees que ofreces al Señor
  rationale: 'Se mantiene la relación devocional indicada por el inglés: el ayuno supuesto está orientado a Dios, pero el pasaje lo corrige. «Para el Señor» conserva la referencia sin imponer una formulación más litúrgica que el texto no exige.'
  doctrine_reference: Piedad y práctica religiosa auténtica frente a observancia meramente externa.
- issue: Conservación de la imagen alegórica agrícola
  english_pob_reading: A vineyard, not having weeds, will give more fruit
  chosen_spanish_reading: Una viña, si no tiene maleza, dará más fruto
  alternative_spanish_readings:
  - Una viña sin maleza dará más fruto
  - Una viña, al no tener maleza, producirá más fruto
  rationale: La parábola se conserva como imagen de limpieza y productividad espiritual o moral. La formulación evita espiritualizarla en exceso y mantiene la comparación agrícola literal.
  doctrine_reference: Uso de parábolas e imágenes para instrucción moral.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de contexto. La redacción española sigue de cerca la resolución óptima del inglés POB, pero con atención directa a los conceptos griegos implicados en la imagen del ayuno, la parábola y el trabajo en la viña.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiriera explícitamente; aquí el contexto habla de «el Señor», por lo que se conservó esa relación devocional sin sustituirla por el nombre divino.
  - Se mantuvo «esclavo» para δοῦλος por consistencia con el valor léxico fuerte del original.
  - Se prefirió «maleza» a «cizaña» para no sobreespecificar el tipo de planta nociva.
  - La puntuación y el uso de comillas angulares siguen la norma tipográfica del español.
  - Se conservó la interpolación entre corchetes en la misma posición funcional para reflejar el elemento implícito del texto fuente y del inglés auditado.
