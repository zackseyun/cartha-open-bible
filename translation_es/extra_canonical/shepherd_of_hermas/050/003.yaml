review_pass:
  verdict: revise
  source_alignment_summary: ‘El borrador conserva bien el sentido básico del griego y del English POB: una reprensión de que la persona no sabe ayunar para/al Señor y que el ayuno practicado no califica como verdadero ayuno. Sin embargo, «haces para él» suena menos natural para un acto de ayuno, y la nota añadida no parece necesaria porque el texto español ya comunica la repetición retórica sin ambigüedad.’
  spanish_quality_summary: El español es mayormente claro y digno, pero «este ayuno vano que haces para él» resulta algo forzado. «Ayunas para él» o «practicas para él» sería más natural; la mejor solución es mantener el verbo ayunar repetido. También conviene quitar la nota explicativa redundante para evitar sobrecargar un pasaje sencillo.
  glossary_alignment: No hay conflictos relevantes con la terminología del proyecto. «Señor» para κύριος es adecuado aquí. «Ayunar / ayuno» reproduce bien νηστεύω / νηστεία. «Vano» es aceptable para μάταιος en registro eclesial legible.
  issues:
  - severity: medium
    issue: ‘Expresión poco natural: «este ayuno vano que haces para él»’
    rationale: En español, el ayuno normalmente se «hace», pero con complemento «para él» la construcción suena torpe. Dado que el original y el English POB repiten la raíz de ‘fast’, es mejor reflejarlo con «ayunas» para conservar fuerza y naturalidad.
  - severity: low
    issue: Nota al pie innecesaria
    rationale: La repetición de «ayuno» ya se entiende en español y no crea una ambigüedad nueva. La nota explica algo que el propio texto comunica suficientemente.
  revised_spanish_text: ‘Él dice: «No sabes cómo ayunar para el Señor, ni este vano ayuno que ayunas para él es un ayuno».’
  revised_footnotes: []
  revision_rationale: Se ajusta la frase central para que el español refleje mejor la repetición verbal del original y suene más natural que «haces para él». Se elimina la nota porque no aporta una aclaración necesaria.
