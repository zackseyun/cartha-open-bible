  text: He says, "You do not know how to fast to the Lord, nor is this useless fast that you fast to him a fast."
translation:
  language: es
  text: 'Él dice: «No sabes cómo ayunar para el Señor, ni este vano ayuno que ayunas para él es un ayuno».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: fast
  english_pob_choice: fast
  chosen_spanish: ayunar / ayuno
  alternatives_spanish:
  - abstenerse de comida / abstinencia
  - hacer ayuno
  lexicon: νηστεύω / νηστεία
  rationale: 'El contexto requiere el verbo y el sustantivo de la misma raíz para reproducir la acusación del texto: no basta cualquier abstinencia, sino que la práctica no llega a ser un ayuno verdadero para el Señor.'
- source_word: to the Lord
  english_pob_choice: to the Lord
  chosen_spanish: para el Señor
  alternatives_spanish:
  - al Señor
  - delante del Señor
  lexicon: κυρίῳ
  rationale: «Para el Señor» conserva la finalidad/dirección de la acción y suena natural en español; mantiene la fuerza relacional del original sin oscurecerla con una formulación más rígida.
- source_word: useless
  english_pob_choice: useless
  chosen_spanish: vano
  alternatives_spanish:
  - inútil
  - sin provecho
  lexicon: μάταιος
  rationale: «Vano» comunica bien en registro bíblico que la práctica carece de valor efectivo o resultado delante de Dios, sin reducirlo solo a utilidad pragmática.
theological_decisions:
- issue: Repetición enfática de «ayuno» para negar que toda abstinencia sea espiritualmente válida
  english_pob_reading: You do not know how to fast to the Lord, nor is this useless fast that you fast to him a fast.
  chosen_spanish_reading: No sabes cómo ayunar para el Señor, ni este ayuno vano que haces para él es un ayuno.
  alternative_spanish_readings:
  - No sabes ayunar para el Señor, y este ayuno inútil que haces para él no es ayuno.
  - No sabes cómo ayunar al Señor, ni este ayuno vano que le haces es ayuno.
  rationale: 'Se conserva la tensión del original: la segunda ocurrencia de «ayuno» no es meramente redundante, sino una negación retórica de que la práctica descrita merezca realmente ese nombre. La formulación española mantiene esa fuerza sin suavizarla.'
  doctrine_reference: discernimiento sobre el ayuno aceptable delante de Dios; ética de la piedad externa versus la realidad interior
translation_notes:
  revision_awareness: No se registran revisiones previas en el contexto; la propuesta sigue directamente el texto griego normalizado y el sentido reflejado por la traducción inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene «Señor» como traducción de κυρίῳ en esta cláusula, en una relación funcional normal en español.
  - Se conserva la repetición de «ayuno» para reproducir la fuerza enfática del original.
  - El registro es sobrio y eclesial, evitando paráfrasis que borren la distinción entre ayunar y el ayuno que Dios aprueba.
