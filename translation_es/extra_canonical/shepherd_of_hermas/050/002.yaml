  yaml_path: translation/extra_canonical/shepherd_of_hermas/050/002.yaml
  text: '"What," he says, "is a station?" I say, "I am fasting, sir." He says, "And what is this fasting that you are fasting?" I say, "As I have been accustomed, sir, so I fast."'
translation:
  language: es
  text: '«¿Qué es una estación?», dice él. Yo digo: «Estoy ayunando, señor». Y él dice: «¿Y qué es este ayuno que estás haciendo?». Yo digo: «Según tengo por costumbre, señor, así ayuno».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τί ἐστιν στάσις
  english_pob_choice: What is a station?
  chosen_spanish: ¿Qué es una estación?
  alternatives_spanish:
  - ¿Qué es una parada?
  - ¿Qué es una estación ritual?
  - ¿Qué significa una estación?
  lexicon: στάσις
  rationale: Mantengo el sentido interrogativo directo y la rareza del término en español con «estación», porque la tradición del pasaje usa un término técnico/ambiguo que la POB inglesa deja sin explicitar; así se conserva la tensión lexical sin imponer una glosa excesiva.
- source_word: νηστεύω
  english_pob_choice: I am fasting / this fasting
  chosen_spanish: estoy ayunando / este ayuno
  alternatives_spanish:
  - estoy en ayuno / esta abstinencia
  - estoy practicando el ayuno / este ayunar
  lexicon: νηστεύω
  rationale: «Ayunar» es el equivalente natural y exacto en español para la acción de abstenerse de comer; en la segunda ocurrencia, «este ayuno» preserva el sustantivo concreto del original y del inglés POB.
- source_word: κύριε
  english_pob_choice: sir
  chosen_spanish: señor
  alternatives_spanish:
  - señor mío
  - maestro
  - amo
  lexicon: κύριε
  rationale: «Señor» reproduce el vocativo respetuoso del diálogo y funciona de manera natural en español sin cargarlo innecesariamente con resonancias doctrinales.
- source_word: ὡς εἴθισμαι
  english_pob_choice: As I have been accustomed
  chosen_spanish: Tal como he estado acostumbrado
  alternatives_spanish:
  - Como me he acostumbrado
  - Según mi costumbre
  - Como he solido hacer
  lexicon: εἴθισμαι
  rationale: La forma «he estado acostumbrado» conserva el valor de hábito/patrón continuo sin volverlo demasiado libre; «tal como» refleja la comparación normativa del texto.
theological_decisions:
- issue: No hay una afirmación doctrinal explícita; el reto principal es conservar la ambigüedad del término técnico «στάσις».
  english_pob_reading: What is a station?
  chosen_spanish_reading: ¿Qué es una estación?
  alternative_spanish_readings:
  - ¿Qué es una parada?
  - ¿Qué es una estación ritual?
  rationale: El inglés POB no resuelve el valor de «station», y el contexto no permite fijarlo sin sobreinterpretación. Por eso se deja en una forma igualmente abierta en español, evitando reemplazarlo por una explicación que el texto no da.
  doctrine_reference: No aplica; cuestión terminológica/contextual.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando cualquier nota al pie no anclada. El texto ahora contiene solo el contenido traducido, sin marcadores huérfanos.
  spanish_consistency_notes:
  - Se conserva el diálogo breve y repetitivo del original, sin añadir explicaciones.
  - «Señor» se usa como vocativo de cortesía, no como sustituto del nombre divino.
  - La puntuación sigue el estilo español, manteniendo comillas y preguntas breves del texto fuente.
