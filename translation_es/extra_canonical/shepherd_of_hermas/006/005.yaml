review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido global del griego y del POB inglés: juramento solemne, límite del arrepentimiento para los justos/santos y continuación para las naciones hasta el último día. Sin embargo, un punto léxico importante no preserva bien el matiz del original: ὁ Δεσπότης se refleja mejor como «el Amo» o «el Soberano»/«el Dueño» que como «el Señor», ya que «Señor» en este proyecto puede confundirse con el tratamiento divino estándar o con κύριος. Además, «todavía ocurre el pecado» suena poco natural en español y conviene ajustar la redacción sin perder la impersonalidad/severidad del original.'
  spanish_quality_summary: El español es claro y digno, pero «todavía ocurre el pecado» resulta forzado y poco idiomático. «Señor» para δεσπότης también reduce precisión terminológica. El resto del texto fluye bien y mantiene el tono eclesial legible.
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto como Yahvé, Mesías, Espíritu, etc. Sí hay una desalineación menor con la filosofía léxica fuente-céntrica: δεσπότης no debería nivelarse a «Señor» cuando el POB inglés distinguió «Master». «Arrepentimiento», «santos» y «las naciones» están bien elegidos.'
  issues:
  - severity: medium
    issue: δεσπότης se tradujo como «Señor» en vez de reflejar su fuerza distintiva.
    rationale: El inglés auditado eligió «the Master», precisamente distinguiéndolo de «Lord». En español, «Señor» borra esa distinción y puede inducir asociación con κύριος o con el uso reverencial divino del proyecto. «el Amo» preserva mejor la relación de autoridad absoluta de δεσπότης, aunque sea más fuerte.
  - severity: medium
    issue: «todavía ocurre el pecado» suena antinatural en español.
    rationale: Aunque intenta conservar una formulación impersonal, en español esta expresión es poco idiomática. «todavía se comete pecado» mantiene el carácter general/impersonal y suena natural.
  revised_spanish_text: 'Porque el Amo juró por su gloria acerca de sus escogidos: si, después de este día señalado, todavía se comete pecado, no tienen salvación; pues para los justos el arrepentimiento tiene un fin. Los días de arrepentimiento se han cumplido para todos los santos, pero para las naciones hay arrepentimiento hasta el último día.'
  revision_rationale: Se corrige «Señor» a «Amo» para reflejar mejor δεσπότης y preservar la distinción del POB inglés frente a «Lord». Se ajusta «todavía ocurre el pecado» a «todavía se comete pecado» para un español natural que mantiene la generalidad impersonal del original. No se requieren notas adicionales.
