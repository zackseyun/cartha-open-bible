base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/006/005.yaml
  text: 'For the Master swore by his glory concerning his chosen ones: if, after this appointed day, sin should still occur, they have no salvation; for repentance has an end for the righteous. The days of repentance have been fulfilled for all the holy ones, but for the nations there is repentance until the last day.'
translation:
  language: es
  text: 'Porque el Amo juró por su gloria acerca de sus escogidos: si, después de este día señalado, todavía se comete pecado, no tienen salvación; pues para los justos el arrepentimiento tiene un fin. Los días de arrepentimiento se han cumplido para todos los santos, pero para las naciones hay arrepentimiento hasta el último día.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ Δεσπότης
  english_pob_choice: the Master
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Soberano
  - el Amo
  lexicon: δεσπότης
  rationale: En español, «Señor» comunica con naturalidad la autoridad absoluta que el inglés POB expresa con «Master». «Amo» sería demasiado social/esclavista en esta construcción, y «Dueño» o «Soberano» desplazan el tono del original. Se conserva la mayúscula reverencial para reflejar la referencia elevada del contexto.
- source_word: ὤμοσεν
  english_pob_choice: swore
  chosen_spanish: juró
  alternatives_spanish:
  - prometió con juramento
  - prestó juramento
  lexicon: ὄμνυμι
  rationale: «Juró» es la forma más directa y natural en español para el acto de hablar bajo juramento, manteniendo la fuerza legal-retórica del griego.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - honor
  lexicon: δόξα
  rationale: «Gloria» es el equivalente más estable y fiel en este contexto teológico; «esplendor» y «honor» no conservan tan bien el valor confesional de la fórmula.
- source_word: ἐκλεκτῶν
  english_pob_choice: chosen ones
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  - seleccionados
  lexicon: ἐκλεκτός
  rationale: «Escogidos» reproduce bien la idea de elección sin sonar técnico en exceso. «Elegidos» es posible, pero «escogidos» mantiene una cercanía mayor con el registro bíblico y con la noción de selección divina.
- source_word: μετάνοια
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - cambio de mente
  - penitencia
  lexicon: μετάνοια
  rationale: Aquí la fuerza del pasaje es moral y escatológica, no meramente cognitiva; por eso «arrepentimiento» es la opción adecuada. «Penitencia» introduciría un matiz eclesiástico posterior que el griego no exige.
- source_word: ἅγιοι
  english_pob_choice: holy ones
  chosen_spanish: santos
  alternatives_spanish:
  - sagrados
  - consagrados
  lexicon: ἅγιος
  rationale: «Santos» es el equivalente español más transparente para un grupo de personas apartadas para Dios. «Consagrados» sería más explicativo y menos idiomático aquí.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: ἔθνος
  rationale: El inglés POB conserva «the nations», y en español «las naciones» mantiene la amplitud étnico-histórica del griego sin convertirlo de antemano en «gentiles». Esa última opción sería una interpretación más cerrada de la referencia.
theological_decisions:
- issue: Alcance temporal de la salvación tras el día señalado
  english_pob_reading: if, after this appointed day, sin should still occur, they have no salvation
  chosen_spanish_reading: si, después de este día señalado, todavía ocurre el pecado, no tienen salvación
  alternative_spanish_readings:
  - si después de este día designado aún pecan, no tienen salvación
  - si tras este día fijado el pecado todavía sucede, no hay salvación para ellos
  rationale: Se conserva la fuerza condicional y la severidad escatológica del pasaje. «Ocurre el pecado» mantiene la construcción impersonal del inglés POB sin suavizarla, y evita convertir el enunciado en una exhortación moral más general de lo que el texto dice.
  doctrine_reference: Escatología moral del arrepentimiento y juicio final en literatura cristiana primitiva
- issue: Fin del arrepentimiento para los justos y los santos, pero no para las naciones
  english_pob_reading: repentance has an end for the righteous... The days of repentance have been fulfilled for all the holy ones, but for the nations there is repentance until the last day
  chosen_spanish_reading: para los justos el arrepentimiento tiene un fin... Los días de arrepentimiento se han cumplido para todos los santos, pero para las naciones hay arrepentimiento hasta el último día
  alternative_spanish_readings:
  - el arrepentimiento termina para los justos...
  - los días de arrepentimiento se han agotado para todos los santos
  rationale: 'Se mantiene la tensión textual: hay un límite para los justos/santos, mientras que las naciones conservan oportunidad hasta el último día. «Se han cumplido» traduce la idea de consumación sin diluir el contraste temporal.'
  doctrine_reference: Distinción apocalíptica entre el tiempo de corrección de los justos y la oportunidad persistente para las naciones
translation_notes:
  revision_awareness: 'Cross-check status: moderate agreement (0.85), verdict needs-revision. The Spanish draft follows the English POB sense closely while checking the Greek-driven distinctions: δεσπότης as a reverential authority title, μετάνοια as moral repentance rather than cognitive change, and τὰ ἔθνη as nations rather than a narrower Gentiles gloss.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» only when the divine name is explicit in the source; here the text refers generically to «el Señor», so no masking-name decision is required.
  - «Escogidos», «justos», «santos» y «naciones» preserve the source's differentiated groups without collapsing them.
  - The Spanish avoids ecclesiastical penitential language («penitencia») and keeps the eschatological limit explicit.
  - No footnotes were necessary because the source sense is stable in Spanish and the main ambiguities are handled in lexical decisions.
