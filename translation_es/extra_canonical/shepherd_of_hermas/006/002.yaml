revisions:
- from: «Tu descendencia, Hermas, ha rechazado a Dios y ha blasfemado del Señor, y ha traicionado a sus padres con gran maldad; y fueron oídos como traidores de padres; y, aunque los traicionaron, no obtuvieron ninguna ventaja, sino que añadieron todavía a sus pecados actos de desenfreno y mezclas de maldad, y así se colmaron sus obras sin ley.»
  to: «Tus hijos, Hermas, rechazaron a Dios y blasfemaron contra el Señor, y traicionaron a sus padres con gran maldad; y quedaron señalados como traidores de sus padres; y, aunque traicionaron a sus padres, no sacaron ningún provecho, sino que añadieron todavía a sus pecados actos de desenfreno y mezclas de maldad, y así se colmaron sus hechos sin ley.»
  rationale: La revisión mantiene el contenido del original y del English POB, pero corrige calcos y ambigüedades del borrador. «Tus hijos» expresa con claridad el referente personal de la descendencia en este contexto admonitorio; «blasfemaron contra el Señor» es español idiomático; «quedaron señalados como traidores de sus padres» comunica el valor de la construcción pasiva sin el calco oscuro «fueron oídos»; «no sacaron ningún provecho» refleja mejor la inutilidad práctica y moral; y «hechos sin ley» conserva el vínculo con ἄνομος en mejor español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:08:15Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido global del griego y del English POB: rechazo de Dios, blasfemia contra el Señor, traición a los padres, ausencia de provecho, adición de pecados y culminación de hechos sin ley. Sin embargo, hay varios puntos de ajuste para mayor fidelidad y español natural: la concordancia verbal con «descendencia» resulta problemática; «blasfemado del Señor» es menos idiomático que «blasfemado contra el Señor»; «fueron oídos» calca el inglés y suena opaco en español, donde conviene expresar que «quedaron señalados» o «se supo» que eran traidores; y «aunque los traicionaron» introduce un pronombre ambiguo que no está bien resuelto en español.'
  spanish_quality_summary: 'El texto es entendible, pero contiene giros poco naturales o demasiado calcados: «ha rechazado… ha blasfemado… ha traicionado» con sujeto colectivo «descendencia» suena forzado; «blasfemado del Señor» no es el régimen más claro; «fueron oídos como traidores de padres» es poco idiomático; y «obras sin ley» es literal pero tosco. Una revisión ligera mejora legibilidad sin perder la extrañeza moral del original.'
  glossary_alignment: No hay conflicto con la terminología central del proyecto. «Dios» está bien para θεόν. «el Señor» es aceptable para κύριον en este texto extracanonico, y no hay base suficiente para imponer «Yahvé». «mezclas de maldad» preserva adecuadamente la imagen difícil. Se recomienda «obras fuera de la ley» o «hechos sin ley» en lugar de «obras sin ley» para reflejar mejor el matiz de ἄνομος en español natural.
  issues:
  - severity: medium
    issue: Concordancia verbal inconsistente con «descendencia»
    rationale: «Descendencia» es singular colectivo en español; la secuencia «ha rechazado… ha blasfemado… ha traicionado» seguida de plurales posteriores crea aspereza. Conviene reestructurar con plural explícito («Tus hijos/descendientes») o mantener singular coherente, pero el contexto posterior favorece el plural personal.
  - severity: medium
    issue: «Blasfemado del Señor» es poco idiomático
    rationale: En español general y eclesial se dice más naturalmente «blasfemar contra el Señor» o simplemente «blasfemar del nombre del Señor» según contexto. Aquí «contra» transmite mejor el acto injurioso.
  - severity: high
    issue: «fueron oídos como traidores de padres» no comunica claramente el sentido
    rationale: Es un calco semántico poco transparente. El pasaje apunta a que fueron tenidos o conocidos por traidores de sus padres. El español necesita una formulación idiomática equivalente.
  - severity: medium
    issue: «aunque los traicionaron» contiene referencia pronominal ambigua
    rationale: El antecedente de «los» podría confundirse. Repetir «a sus padres» evita ambigüedad y preserva claridad.
  - severity: low
    issue: «obras sin ley» es demasiado literal y áspero
    rationale: Aunque defendible, «hechos sin ley» o «obras fuera de la ley» suena más natural y conserva el matiz moral-jurídico.
  revised_spanish_text: «Tus hijos, Hermas, rechazaron a Dios y blasfemaron contra el Señor, y traicionaron a sus padres con gran maldad; y quedaron señalados como traidores de sus padres; y, aunque traicionaron a sus padres, no sacaron ningún provecho, sino que añadieron todavía a sus pecados actos de desenfreno y mezclas de maldad, y así se colmaron sus hechos sin ley.»
  revision_rationale: La revisión mantiene el contenido del original y del English POB, pero corrige calcos y ambigüedades del borrador. «Tus hijos» expresa con claridad el referente personal de la descendencia en este contexto admonitorio; «blasfemaron contra el Señor» es español idiomático; «quedaron señalados como traidores de sus padres» comunica el valor de la construcción pasiva sin el calco oscuro «fueron oídos»; «no sacaron ningún provecho» refleja mejor la inutilidad práctica y moral; y «hechos sin ley» conserva el vínculo con ἄνομος en mejor español.
