base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/006/002.yaml
  text: “Your offspring, Hermas, have rejected God and blasphemed the Lord, and they have betrayed their parents in great wickedness, and they were heard as betrayers of parents; and though they betrayed them, they gained no advantage, but they added still to their sins licentious acts and mixtures of wickedness, and thus their lawless deeds were filled up.
translation:
  language: es
  text: «Tus hijos, Hermas, rechazaron a Dios y blasfemaron contra el Señor, y traicionaron a sus padres con gran maldad; y quedaron señalados como traidores de sus padres; y, aunque traicionaron a sus padres, no sacaron ningún provecho, sino que añadieron todavía a sus pecados actos de desenfreno y mezclas de maldad, y así se colmaron sus hechos sin ley.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπώσαντο τὸν θεόν
  english_pob_choice: rejected God
  chosen_spanish: ha rechazado a Dios
  alternatives_spanish:
  - han rechazado a Dios
  - repudiaron a Dios
  lexicon: ἀπωθέομαι / reject, thrust away
  rationale: «Rechazado» conserva la fuerza de apartar o desechar a Dios sin introducir una paráfrasis más fuerte que el griego o el inglés POB.
- source_word: ἐβλασφήμησαν τὸν κύριον
  english_pob_choice: blasphemed the Lord
  chosen_spanish: ha blasfemado del Señor
  alternatives_spanish:
  - han blasfemado del Señor
  - blasfemaron contra el Señor
  lexicon: βλασφημέω / blaspheme
  rationale: «Blasfemado del Señor» mantiene el sentido verbal directo y la referencia a κύριος tal como aparece en el texto griego, sin sustituirla por una fórmula eclesiástica distinta.
- source_word: παραδόντες τοὺς γονεῖς
  english_pob_choice: betrayed their parents
  chosen_spanish: ha traicionado a sus padres
  alternatives_spanish:
  - han traicionado a sus padres
  - entregaron a sus padres
  lexicon: παραδίδωμι / hand over, betray
  rationale: «Traicionado» expresa la traición activa que el contexto exige; «entregar» sería demasiado neutral en español para el matiz moral del pasaje.
- source_word: πολλῇ κακίᾳ
  english_pob_choice: in great wickedness
  chosen_spanish: con gran maldad
  alternatives_spanish:
  - en gran maldad
  - con mucha maldad
  lexicon: κακία / wickedness, evil
  rationale: «Gran maldad» reproduce el intensificador y el valor moral del sustantivo sin suavizarlo a un término demasiado general.
- source_word: παραδόται γονέων
  english_pob_choice: betrayers of parents
  chosen_spanish: traidores de padres
  alternatives_spanish:
  - traidores de sus padres
  - los que traicionan a sus padres
  lexicon: παραδότης / betrayer
  rationale: Se conserva la denominación acusatoria del texto; aunque «traidores de sus padres» suena menos idiomático, refleja la construcción nominal del original y del inglés POB.
- source_word: ἀλλ᾽ οὐδὲν αὐτοῖς ὠφέλησαν
  english_pob_choice: they gained no advantage
  chosen_spanish: no obtuvieron ninguna ventaja
  alternatives_spanish:
  - no les aprovechó de nada
  - no sacaron ningún beneficio
  lexicon: ὠφελέω / benefit, profit
  rationale: «Obtener ventaja» reproduce bien la idea de provecho sin perder el contraste entre la traición y su inutilidad moral.
- source_word: ἀκολασίαις καὶ μίξεσι κακίας
  english_pob_choice: licentious acts and mixtures of wickedness
  chosen_spanish: actos de desenfreno y mezclas de maldad
  alternatives_spanish:
  - actos licenciosos y mezclas de maldad
  - desenfrenos y mezclas de maldad
  lexicon: ἀκολασία / licentiousness; μῖξις / mixture
  rationale: «Desenfreno» comunica ἀκολασία de manera natural en español; «mezclas de maldad» conserva la imagen extraña del texto, que no debe ser aplanada en una abstracción más interpretativa.
- source_word: ἐπληρώθησαν
  english_pob_choice: their lawless deeds were filled up
  chosen_spanish: se colmaron sus obras sin ley
  alternatives_spanish:
  - fueron colmadas sus obras sin ley
  - se completaron sus obras sin ley
  lexicon: πληρόω / fill, fulfill
  rationale: «Se colmaron» preserva la pasiva y la idea de llegar a su plenitud; «obras sin ley» conserva el eco de ἄνομος sin reemplazarlo por una explicación más larga.
theological_decisions:
- issue: Tratamiento del título κύριος en una obra extra-canónica con posible eco divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor (con nota)
  rationale: Aquí el texto griego usa κύριος en paralelo con «Dios» y dentro de una acusación de blasfemia; en español «el Señor» conserva la forma del título sin forzar una identificación explícita con el nombre divino revelado, ya que el pasaje no ofrece por sí mismo un marcador inequívoco para sustituirlo por «Yahvé».
  doctrine_reference: Uso reverente del título divino; distinción entre nombre propio y título en traducción bíblica
- issue: Marcador ético de ‘lawless deeds’
  english_pob_reading: lawless deeds
  chosen_spanish_reading: obras sin ley
  alternative_spanish_readings:
  - obras inicuas
  - obras de iniquidad
  rationale: La expresión literal conserva el vínculo con ἄνομος/ἀνομία y mantiene el tono jurídico-moral del pasaje; «iniquidad» sería correcto pero más interpretativo en español.
  doctrine_reference: Lenguaje bíblico de ley/violación de la ley
- issue: Secuencia verbal con perfectos/pretérito en una traducción narrativa compacta
  english_pob_reading: have rejected... have blasphemed... they have betrayed... they were heard... they gained no advantage
  chosen_spanish_reading: ha rechazado... ha blasfemado... ha traicionado... fueron oídos... no obtuvieron...
  alternative_spanish_readings:
  - rechazaron... blasfemaron... traicionaron... fueron oídos... no obtuvieron...
  - han rechazado... han blasfemado... han traicionado... fueron oídos... no obtuvieron...
  rationale: Se usa una mezcla de presente perfecto y pretérito para mantener la vivacidad del inglés POB sin sacrificar la fluidez del español; el tramo final en pretérito refleja la clausura de la acción y su constatación.
  doctrine_reference: Aspecto verbal en traducción narrativa de literatura cristiana primitiva
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego normalizado y el inglés POB, conservando la acumulación retórica de acusaciones y la imagen final de actos ‘sin ley’ colmados. Se evitó suavizar ‘mezclas de maldad’ o sustituir ‘obras sin ley’ por un abstracto más eclesiástico. No se detectaron notas previas en el POB inglés que requirieran preservación explícita de variantes.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para θεός y ‘el Señor’ para κύριος según la convención del proyecto y la ambigüedad contextual del pasaje.
  - Se eligió ‘desenfreno’ para ἀκολασία por ser natural en español y suficientemente fuerte para el registro moral del texto.
  - Se preservó el paralelismo acusatorio con repeticiones de ‘traicionado/traidores’, importante para el tono del pasaje.
  - No se introdujeron abreviaturas litúrgicas ni equivalentes tradicionales que borraran la textura semántica del original.
