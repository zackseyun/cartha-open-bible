  yaml_path: translation/extra_canonical/shepherd_of_hermas/006/007.yaml
  text: Persevere, then, you who work righteousness, and do not be double‑minded, so that your passing may be with the holy angels. Blessed are you who endure the great tribulation that is coming, and who will not deny their life.
translation:
  language: es
  text: Persevera, pues, tú que obras justicia, y no seas de doble ánimo, para que tu tránsito sea con los santos ángeles. Bienaventurado eres tú, que soportas la gran tribulación que viene, y que no negarás tu vida.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: righteousness
  english_pob_choice: work righteousness
  chosen_spanish: obras justicia
  alternatives_spanish:
  - practicas justicia
  - haces lo recto
  lexicon: δικαιοσύνη
  rationale: ‘Obrar justicia’ conserva el valor ético y activo del participio sin añadir una lectura más abstracta que la del texto griego, y suena natural en español bíblico contemporáneo.
- source_word: double-minded
  english_pob_choice: do not be double-minded
  chosen_spanish: no seas de doble ánimo
  alternatives_spanish:
  - no seas indeciso
  - no tengas doble pensamiento
  lexicon: δίψυχος
  rationale: ‘Doble ánimo’ mantiene la imagen de división interior que el griego sugiere y evita reducirlo solo a indecisión intelectual.
- source_word: passing
  english_pob_choice: your passing
  chosen_spanish: tu paso
  alternatives_spanish:
  - tu tránsito
  - tu partida
  lexicon: παράβασις / πορεία contextual
  rationale: Aquí ‘paso’ comunica de manera breve el tránsito o trayectoria de la vida del oyente; es más natural que una abstracción forzada y mantiene la idea de un movimiento acompañado por los ángeles.
- source_word: holy angels
  english_pob_choice: the holy angels
  chosen_spanish: los santos ángeles
  alternatives_spanish:
  - los ángeles santos
  - los ángeles sagrados
  lexicon: ἅγιοι ἄγγελοι
  rationale: ‘Santos ángeles’ conserva la formulación tradicional y el adjetivo atributivo sin perder claridad en español.
- source_word: great tribulation
  english_pob_choice: the great tribulation
  chosen_spanish: la gran tribulación
  alternatives_spanish:
  - la gran aflicción
  - la gran prueba
  lexicon: θλῖψις μεγάλη
  rationale: ‘Tribulación’ corresponde bien al campo semántico de θλῖψις y mantiene la resonancia bíblica de una aflicción intensa.
- source_word: deny their life
  english_pob_choice: will not deny their life
  chosen_spanish: no negarán su vida
  alternatives_spanish:
  - no renunciarán a su vida
  - no la negarán
  - no traicionarán su vida
  lexicon: ἀρνέομαι τὴν ψυχήν/ζωήν
  rationale: ‘Negar su vida’ sigue de cerca la construcción del texto y preserva la tensión de una negativa o renuncia extrema sin interpretarla excesivamente.
theological_decisions:
- issue: The blessedness of endurance under coming tribulation
  english_pob_reading: Blessed are you who endure the great tribulation that is coming
  chosen_spanish_reading: Bienaventurados los que soportan la gran tribulación que viene
  alternative_spanish_readings:
  - Bienaventurados los que perseveran en la gran tribulación que viene
  - Bienaventurados los que resisten la gran tribulación que viene
  rationale: ‘Soportan’ expresa la perseverancia sufrida requerida por el contexto y mantiene el paralelo con la bienaventuranza final sin añadir explicaciones apocalípticas no explícitas en el verso.
  doctrine_reference: Endurance under persecution; beatitude language
- issue: The manner of the traveler’s association with angels
  english_pob_reading: your passing may be with the holy angels
  chosen_spanish_reading: para que tu paso sea con los santos ángeles
  alternative_spanish_readings:
  - para que tu tránsito sea con los santos ángeles
  - para que al pasar vayas con los santos ángeles
  rationale: La frase conserva la asociación entre el creyente y los ángeles en el momento del paso, sin especificar más allá de lo que el texto dice.
  doctrine_reference: Angelic accompaniment in eschatological passage
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior eliminando todo aparato de notas: no se incluyen marcadores ni notas al pie, para evitar desalineación entre texto y metadatos.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y publicable, evitando calcos innecesarios.
  - No se usó ‘SEÑOR’ ni ‘Cristo’, pues este pasaje no los requiere según el testimonio fuente.
  - ‘Bienaventurados’ conserva el tono solemne de la bienaventuranza apocalíptica en español eclesial.
