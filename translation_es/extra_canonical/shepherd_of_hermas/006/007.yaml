review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la traducción inglesa auditada y preserva los elementos principales del griego: exhortación a perseverar, obrar justicia, evitar la duplicidad interior, bienaventuranza por soportar la tribulación venidera y no negar la propia vida. Sin embargo, dos giros españoles no representan bien el sentido o suenan poco naturales: ''tu paso'' para ''your passing'' resulta ambiguo en español y no comunica claramente tránsito/partida; además, el cambio de singular a plural en ''Bienaventurados los que...'' frente al inglés auditado ''Blessed are you...'' debilita la referencia directa del original traducido por POB.'
  spanish_quality_summary: El español es generalmente claro y digno, con buena terminología en 'justicia', 'doble ánimo', 'santos ángeles' y 'gran tribulación'. No obstante, 'tu paso sea con los santos ángeles' suena extraño y poco idiomático en contexto religioso; 'tu tránsito' es más claro y conserva el matiz de paso/partida. También conviene mantener la segunda persona directa en la bienaventuranza para coherencia retórica con el inicio del versículo.
  glossary_alignment: No hay conflicto con los términos por defecto del proyecto. 'Justicia', 'tribulación' y 'ángeles' están bien alineados. 'Doble ánimo' es aceptable para δίψυχος. La única decisión léxica que requiere ajuste es 'tu paso' → 'tu tránsito' por fidelidad semántica y legibilidad. También se ajusta la bienaventuranza a 'Bienaventurado eres...' para reflejar mejor el inglés auditado y la exhortación directa.
  issues:
  - severity: medium
    issue: '''tu paso'' es ambiguo y poco natural'
    rationale: En español, 'paso' suele sugerir un paso físico, un trámite o un ritmo, no claramente el tránsito o partida de la vida. 'Tu tránsito' comunica mejor el sentido de 'your passing' sin añadir interpretación extra.
  - severity: medium
    issue: La bienaventuranza cambia de segunda persona directa a tercera persona plural
    rationale: El inglés POB auditado dice 'Blessed are you who endure...', en continuidad con 'you who work righteousness'. Pasar a 'Bienaventurados los que...' pierde esa dirección personal y altera el tono exhortativo.
  revised_spanish_text: Persevera, pues, tú que obras justicia, y no seas de doble ánimo, para que tu tránsito sea con los santos ángeles. Bienaventurado eres tú, que soportas la gran tribulación que viene, y que no negarás tu vida.
  revision_rationale: Se reemplaza 'tu paso' por 'tu tránsito' para expresar de manera más natural y fiel la idea de paso/partida acompañada por los ángeles. Además, se restaura la segunda persona singular en la bienaventuranza ('Bienaventurado eres tú... soportas... no negarás') para mantener la coherencia retórica y el sentido directo del texto auditado por POB.
