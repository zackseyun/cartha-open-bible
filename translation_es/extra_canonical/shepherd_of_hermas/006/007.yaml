revisions:
- from: Persevera, pues, tú que obras justicia, y no seas de doble ánimo, para que tu paso sea con los santos ángeles. Bienaventurados los que soportan la gran tribulación que viene, y que no negarán su vida.
  to: Persevera, pues, tú que obras justicia, y no seas de doble ánimo, para que tu tránsito sea con los santos ángeles. Bienaventurado eres tú, que soportas la gran tribulación que viene, y que no negarás tu vida.
  rationale: Se reemplaza 'tu paso' por 'tu tránsito' para expresar de manera más natural y fiel la idea de paso/partida acompañada por los ángeles. Además, se restaura la segunda persona singular en la bienaventuranza ('Bienaventurado eres tú... soportas... no negarás') para mantener la coherencia retórica y el sentido directo del texto auditado por POB.
  reviewer_model: gpt-5.4
