base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/006/001.yaml
  text: 'After fifteen days, when I had been fasting and had asked the Lord many things, the understanding of the writing was revealed to me. And this was written:'
translation:
  language: es
  text: 'Después de quince días, cuando había estado ayunando y había pedido al Señor muchas cosas, se me reveló la comprensión del escrito. Y esto fue escrito:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μετὰ δεκαπέντε ἡμέρας
  english_pob_choice: After fifteen days
  chosen_spanish: Después de quince días
  alternatives_spanish:
  - Transcurridos quince días
  - Pasados quince días
  lexicon: μετά + acusativo; χρονική relación
  rationale: Mantiene la relación temporal directa y natural en español sin añadir matices no presentes en el griego.
- source_word: νηστεύσας
  english_pob_choice: had been fasting
  chosen_spanish: había estado ayunando
  alternatives_spanish:
  - había ayunado
  - estaba ayunando
  lexicon: νηστεύω
  rationale: El pluscuamperfecto compuesto refleja una acción previa y prolongada antes de la revelación, preservando la duratividad implícita.
- source_word: πολλά παρὰ τοῦ κυρίου αἰτησάμενος
  english_pob_choice: had asked the Lord many things
  chosen_spanish: había pedido al Señor muchas cosas
  alternatives_spanish:
  - había pedido muchas cosas al Señor
  - había suplicado al Señor muchas cosas
  lexicon: αἰτέω
  rationale: '"Pedir" reproduce bien el acto de solicitar al Señor; "muchas cosas" conserva la amplitud indefinida del objeto griego sin restringirla.'
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dueño
  lexicon: κύριος
  rationale: En este contexto el inglés POB conserva la forma devocional "the Lord"; en español "el Señor" es la correspondencia idiomática natural para una referencia reverente a Dios, sin introducir aquí el nombre divino explícito porque el griego usa el título κύριος.
- source_word: ἡ διάνοια τοῦ γράμματος
  english_pob_choice: the understanding of the writing
  chosen_spanish: el entendimiento de la escritura
  alternatives_spanish:
  - la comprensión de la escritura
  - el sentido del escrito
  lexicon: διάνοια; γράμμα/γραφή
  rationale: '"Entendimiento" conserva el sustantivo abstracto del original y evita reducir la frase a una simple interpretación; "escritura" sigue la ambigüedad del texto, que puede referirse a un escrito específico o a la escritura en general.'
- source_word: ἐφανερώθη
  english_pob_choice: was revealed
  chosen_spanish: se me reveló
  alternatives_spanish:
  - me fue revelado
  - fue revelado a mí
  lexicon: φανερόω
  rationale: La construcción pronominal española expresa con naturalidad la pasividad divina implicada en el verbo sin perder el foco receptor de la revelación.
- source_word: Καὶ ταῦτα ἐγράφη
  english_pob_choice: And this was written
  chosen_spanish: Y esto fue escrito
  alternatives_spanish:
  - Y esto se escribió
  - Y esto quedó escrito
  lexicon: γράφω
  rationale: Se mantiene la voz pasiva y el enlace narrativo simple del original, fiel al carácter introductorio de la fórmula.
theological_decisions:
- issue: Revelación del entendimiento del escrito tras ayuno y súplica
  english_pob_reading: the understanding of the writing was revealed to me
  chosen_spanish_reading: se me reveló el entendimiento de la escritura
  alternative_spanish_readings:
  - se me dio a entender la escritura
  - se me reveló el sentido del escrito
  rationale: La formulación conserva la idea de revelación como don recibido, no como mera deducción intelectual. También deja abierta la tensión entre "escritura" como texto concreto y como contenido escrito, sin resolverla artificialmente.
  doctrine_reference: Revelación; hermenéutica inspirada
- issue: Uso reverente de 'el Señor' frente a la opción de nombrar a Dios
  english_pob_reading: asked the Lord
  chosen_spanish_reading: había pedido al Señor
  alternative_spanish_readings:
  - había pedido a Yahvé
  - había suplicado al Señor
  rationale: Dado que el griego dice κύριος y el contexto devocional es directo, "el Señor" preserva el registro reverente sin afirmar explícitamente una sustitución del nombre divino que el texto no marca aquí.
  doctrine_reference: Nombre divino; reverencia
- issue: Carácter de la 'escritura'
  english_pob_reading: the writing
  chosen_spanish_reading: la escritura
  alternative_spanish_readings:
  - el escrito
  - el texto
  rationale: '"La escritura" mantiene la ambigüedad del sustantivo inglés y griego, permitiendo que el lector entienda tanto un documento particular como un escrito en sentido más amplio.'
  doctrine_reference: Canonicidad / texto revelado
translation_notes:
  revision_awareness: La versión inglesa auditada es estable y de alta concordancia con el texto fuente; no hay notas críticas ni revisiones aplicadas que requieran reflejo especial en español. Se preserva la sintaxis narrativa sencilla y la secuencia temporal del original.
  spanish_consistency_notes:
  - Se usa "Señor" como tratamiento reverente para κύριος en este contexto narrativo.
  - Se mantiene "escritura" para conservar la ambigüedad del griego γράμμα/γραφή según la lectura inglesa auditada.
  - No se introducen términos confesionales ajenos al pasaje ni se amplía el contenido de la revelación más allá de lo explícito.
