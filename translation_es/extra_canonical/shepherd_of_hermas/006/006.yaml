base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/006/006.yaml
  text: Therefore you shall say to those who lead the church that they should set their ways straight in righteousness, so that they may receive the promises in full, with much glory.
translation:
  language: es
  text: Por tanto, dirás a los que guían la iglesia que enderecen sus caminos en justicia, para que reciban en plenitud las promesas, con mucha gloria.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τοῖς ἡγουμένοις τῆς ἐκκλησίας
  english_pob_choice: those who lead the church
  chosen_spanish: los que conducen la iglesia
  alternatives_spanish:
  - los que presiden la iglesia
  - los que guían la iglesia
  lexicon: ἡγέομαι
  rationale: La idea central es de liderazgo/guía real; en español, «conducen» expresa dirección funcional sin imponer una estructura eclesiástica más específica que la del griego.
- source_word: κατευθύνειν
  english_pob_choice: set their ways straight
  chosen_spanish: enderezar sus caminos
  alternatives_spanish:
  - poner rectos sus caminos
  - dirigir rectamente su conducta
  lexicon: κατευθύνω
  rationale: «Enderezar» conserva la imagen de corregir una trayectoria torcida; «caminos» reproduce el valor moral de la conducta de forma natural en español.
- source_word: ἐν δικαιοσύνῃ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - con justicia
  lexicon: δικαιοσύνη
  rationale: Se mantiene «justicia» para conservar el peso ético y judicial del término; «rectitud» sería posible, pero atenúa el matiz de conformidad moral objetiva.
- source_word: τὰς ἐπαγγελίας
  english_pob_choice: the promises
  chosen_spanish: las promesas
  alternatives_spanish:
  - las promesas divinas
  - las promesas
  lexicon: ἐπαγγελία
  rationale: La forma simple «las promesas» es suficiente y fiel; el contexto ya sugiere que son promesas de Dios sin necesidad de explicitarlo en el texto.
- source_word: εἰς πληρότητα
  english_pob_choice: in full
  chosen_spanish: en plenitud
  alternatives_spanish:
  - plenamente
  - por completo
  lexicon: πλήρωμα
  rationale: «En plenitud» conserva la idea de cumplimiento completo con un matiz más formal y bíblico que «por completo».
- source_word: μετὰ πολλῆς δόξης
  english_pob_choice: with much glory
  chosen_spanish: con mucha gloria
  alternatives_spanish:
  - con gran gloria
  - en mucha gloria
  lexicon: δόξα
  rationale: «Con mucha gloria» sigue de cerca el griego y la decisión inglesa, manteniendo la relación acompañante sin sobreinterpretar el alcance exacto de la gloria.
theological_decisions:
- issue: Naturaleza de la exhortación a los dirigentes de la iglesia
  english_pob_reading: those who lead the church
  chosen_spanish_reading: los que conducen la iglesia
  alternative_spanish_readings:
  - los que presiden la iglesia
  - los que guían la iglesia
  rationale: Se conserva una designación amplia de liderazgo sin concretar una oficina eclesiástica específica. Esto respeta la ambigüedad funcional del original y la lectura inglesa.
  doctrine_reference: Eclesiología; ministerio y liderazgo comunitario
- issue: Relación entre justicia y recepción plena de las promesas
  english_pob_reading: set their ways straight in righteousness, so that they may receive the promises in full
  chosen_spanish_reading: enderezar sus caminos en justicia, para que reciban en plenitud las promesas
  alternative_spanish_readings:
  - enderezar sus caminos con justicia, para que reciban plenamente las promesas
  - corregir su conducta en justicia, para recibir las promesas en su totalidad
  rationale: La cláusula final mantiene la lógica de exhortación moral seguida de resultado prometido. «En plenitud» conserva la fuerza teleológica del griego sin reducirlo a una simple intensidad adverbial.
  doctrine_reference: Santificación; perseverancia; recompensa/promesa
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete de auditoría; la traducción sigue el texto griego normalizado y coincide sustancialmente con la versión inglesa POB, con acuerdo alto (0.97).
  spanish_consistency_notes:
  - Se mantiene «iglesia» para ἐκκλησία conforme al contexto eclesial del pasaje.
  - Se usa un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - No se introduce «Cristo» ni terminología cristológica ajena al versículo.
  - La puntuación refleja una sola oración exhortativa con cláusula final de propósito.
