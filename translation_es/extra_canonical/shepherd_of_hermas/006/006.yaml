revisions:
- from: Por tanto, dirás a los que conducen la iglesia que enderecen sus caminos en justicia, para que reciban en plenitud las promesas, con mucha gloria.
  to: Por tanto, dirás a los que guían la iglesia que enderecen sus caminos en justicia, para que reciban en plenitud las promesas, con mucha gloria.
  rationale: Se reemplaza «conducen» por «guían» para lograr un español más natural y eclesialmente neutro, sin perder la amplitud del original griego. No se requieren otros cambios ni notas.
