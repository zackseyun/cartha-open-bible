review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido global del griego y del POB inglés: una exhortación mediada a los dirigentes de la iglesia para que rectifiquen su conducta, con el fin de recibir plenamente las promesas con gloria. Sin embargo, «conducen la iglesia» suena menos idiomático y más mecánico que la idea de guiar/liderar que transmite τοῖς ἡγουμένοις.'
  spanish_quality_summary: El español es claro y mayormente fiel, pero «los que conducen la iglesia» resulta poco natural en registro eclesial general. «Los que guían la iglesia» conserva la amplitud funcional del griego y mejora la legibilidad. El resto del texto es sólido; «enderecen sus caminos en justicia» es comprensible y digno.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Justicia», «promesas» y «gloria» están bien alineadas. La principal mejora es estilística-lexical en ἡγέομαι: preferir «guían» sobre «conducen» en español eclesial neutral.'
  issues:
  - severity: medium
    issue: «los que conducen la iglesia» suena poco idiomático
    rationale: Aunque es semánticamente posible, en español neutral eclesial «conducir» para personas que lideran una comunidad suena forzado. «Guiar» expresa mejor liderazgo sin imponer un oficio específico, y sigue fielmente τοῖς ἡγουμένοις / English POB «those who lead the church».
  revised_spanish_text: Por tanto, dirás a los que guían la iglesia que enderecen sus caminos en justicia, para que reciban en plenitud las promesas, con mucha gloria.
  revision_rationale: Se reemplaza «conducen» por «guían» para lograr un español más natural y eclesialmente neutro, sin perder la amplitud del original griego. No se requieren otros cambios ni notas.
