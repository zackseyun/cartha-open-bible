review_pass:
  verdict: revise
  source_alignment_summary: El borrador español sigue de cerca el sentido del inglés POB y, en líneas generales, preserva bien el contraste entre los que están por negar al Señor y los que lo negaron antes, así como el motivo de la misericordia. Sin embargo, la frase 'quedan apartados de su vida' debilita la imagen verbal fuerte de ἀποκόπτονται ('son cortados/separados') y además 'su vida' suena ambigua o poco natural en español. También conviene reflejar mejor el valor de ἠλέησεν con una formulación idiomática más directa.
  spanish_quality_summary: 'El español es claro y de registro apropiado, pero una pequeña reparación mejora la naturalidad y la fuerza semántica: ''quedan separados de la vida'' suena más idiomático y más cercano al audit trail que ''quedan apartados de su vida''. Asimismo, ''tuvo misericordia de ellos'' es una expresión más natural y bíblicamente legible que ''les mostró misericordia'' en este contexto.'
  glossary_alignment: La elección 'el Señor' es aceptable aquí, ya que no hay base suficiente en la evidencia provista para imponer 'Yahvé'. 'Su Hijo', 'negaron', 'días venideros' y 'compasión' están bien alineados. No hay conflicto con la terminología por defecto del proyecto que exija nota.
  issues:
  - severity: medium
    issue: '''quedan apartados de su vida'' para ἀποκόπτονται ἐκ τῆς ζωῆς'
    rationale: La redacción atenúa la fuerza de 'are cut off' y crea una construcción posesiva ('su vida') que en español resulta menos clara que 'de la vida'. Una traducción como 'quedan separados de la vida' conserva mejor el juicio de exclusión sin sonar torpe.
  - severity: low
    issue: '''les mostró misericordia'' para ἠλέησεν'
    rationale: Es comprensible, pero 'tuvo misericordia de ellos' expresa de forma más idiomática y directa el verbo griego en español eclesial legible.
  revised_spanish_text: Porque el Señor juró por su Hijo que aquellos que negaron a su Señor quedan separados de la vida[a] —aquellos que ahora están a punto de negarlo en los días venideros; pero de los que negaron antes, por su gran compasión, tuvo misericordia.
  revised_footnotes:
  - marker: a
    text: 'O: ''son cortados de la vida''. El griego conserva una imagen fuerte de exclusión o separación.'
    reason: Preservar en nota la fuerza más literal de ἀποκόπτονται mientras se mantiene una redacción española natural en el texto principal.
  revision_rationale: Se ajusta una frase para reflejar mejor la fuerza del griego y mejorar la claridad idiomática en español, y se sustituye una expresión menos natural por una formulación más corriente y fiel en registro bíblico. La revisión es menor y no requiere adjudicación adicional.
