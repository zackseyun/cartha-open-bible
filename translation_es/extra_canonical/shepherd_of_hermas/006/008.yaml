base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/006/008.yaml
  text: For the Lord swore by his Son that those who denied their Lord are cut off from their life—those who are now about to deny him in the coming days; but to those who denied before, because of his great compassion, he became merciful.”
translation:
  language: es
  text: Porque el Señor juró por su Hijo que aquellos que negaron a su Señor quedan separados de la vida[a] —aquellos que ahora están a punto de negarlo en los días venideros; pero de los que negaron antes, por su gran compasión, tuvo misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''son cortados de la vida''. El griego conserva una imagen fuerte de exclusión o separación.'
    reason: Preservar en nota la fuerza más literal de ἀποκόπτονται mientras se mantiene una redacción española natural en el texto principal.
lexical_decisions:
- source_word: ὁ Κύριος / Lord
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dueño
  lexicon: κύριος
  rationale: Aquí el texto inglés no explicita el nombre divino como YHWH, sino la referencia reverente a 'the Lord'. En español, 'el Señor' conserva el tono deíctico y la ambigüedad del griego sin imponer una identificación más precisa que la evidencia disponible.
- source_word: ὤμοσεν
  english_pob_choice: swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo un juramento
  - prometió bajo juramento
  lexicon: ὄμνυμι
  rationale: '''Juró'' es la correspondencia directa y natural en español para el acto solemne de jurar; mantiene la fuerza legal y religiosa del original.'
- source_word: υἱός
  english_pob_choice: his Son
  chosen_spanish: su Hijo
  alternatives_spanish:
  - su propio Hijo
  - el Hijo de él
  lexicon: υἱός
  rationale: '''Su Hijo'' reproduce la relación posesiva sin sobrecargar el texto. No se añade ''propio'' porque no aparece en el inglés POB ni es necesario para la claridad aquí.'
- source_word: ἀρνησάμενοι
  english_pob_choice: denied
  chosen_spanish: negaron
  alternatives_spanish:
  - renegaron
  - lo negaron
  lexicon: ἀρνέομαι
  rationale: '''Negaron'' preserva la fuerza básica de rechazo/repudio personal y se ajusta al paralelismo con ''negarlo'' más adelante. ''Renegaron'' introduciría una connotación más idiomática que el griego no exige.'
- source_word: ἀποκόπτονται ἐκ τῆς ζωῆς
  english_pob_choice: are cut off from their life
  chosen_spanish: quedan apartados de su vida
  alternatives_spanish:
  - son cortados de su vida
  - son separados de la vida
  lexicon: ἀποκόπτω + ζωή
  rationale: El inglés POB conserva la imagen de exclusión/separación. En español, 'quedan apartados de su vida' mantiene la idea de quedar fuera de la vida vinculada a Dios, evitando una literalidad áspera que podría sonar poco natural sin ganar precisión.
- source_word: μέλλοντες ἀρνεῖσθαι
  english_pob_choice: who are now about to deny him
  chosen_spanish: aquellos que ahora están a punto de negarlo
  alternatives_spanish:
  - los que están por negarlo
  - los que van a negarlo
  lexicon: μέλλω + ἀρνέομαι
  rationale: '''Están a punto de'' expresa inmediatez futura de forma clara y fiel. Se mantiene el objeto ''lo'' para referir a ''their Lord / him'' en español con coherencia pronominal.'
- source_word: ἐν ταῖς ἐρχομέναις ἡμέραις
  english_pob_choice: in the coming days
  chosen_spanish: en los días venideros
  alternatives_spanish:
  - en los días que vienen
  - en los días por venir
  lexicon: ἡμέραι
  rationale: '''Días venideros'' es idiomático y conserva el matiz profético-temporal del original y del inglés POB.'
- source_word: τοῖς δὲ ἔμπροσθεν ἀρνησαμένοις
  english_pob_choice: to those who denied before
  chosen_spanish: a los que negaron antes
  alternatives_spanish:
  - a los que negaron anteriormente
  - a los que antes lo negaron
  lexicon: ἔμπροσθεν + ἀρνέομαι
  rationale: '''Antes'' transmite la anterioridad temporal de manera concisa. Se mantiene la referencia a quienes ya habían negado, en contraste con los futuros negadores.'
- source_word: διὰ τὴν πολλὴν αὐτοῦ οἰκτιρμὸν
  english_pob_choice: because of his great compassion
  chosen_spanish: por su gran compasión
  alternatives_spanish:
  - a causa de su gran compasión
  - por su mucha compasión
  lexicon: οἰκτιρμός
  rationale: '''Compasión'' es el equivalente más natural y semánticamente fiel para οἰκτιρμός. ''Por su gran compasión'' sigue de cerca el inglés POB y conserva la motivación causal.'
- source_word: ἠλέησεν
  english_pob_choice: he became merciful
  chosen_spanish: les mostró misericordia
  alternatives_spanish:
  - tuvo misericordia de ellos
  - fue misericordioso con ellos
  lexicon: ἐλεέω
  rationale: El griego expresa el acto de misericordiar; en español, 'les mostró misericordia' conserva la acción efectiva y su relación interpersonal. 'Fue misericordioso' es menos concreto; 'tuvo misericordia' también es válido, pero 'mostró misericordia' suena más activo y claro.
theological_decisions:
- issue: Alcance de 'the Lord' y posible referencia al nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Jesús
  rationale: El contexto del fragmento no obliga a identificar aquí explícitamente YHWH o Jesús en el castellano. 'El Señor' mantiene la reverencia y la ambigüedad heredada del audit trail inglés sin forzar una aclaración teológica no documentada.
  doctrine_reference: Christology / divine-name handling
- issue: 'Resultado para los que niegan: separación de la vida'
  english_pob_reading: are cut off from their life
  chosen_spanish_reading: quedan apartados de su vida
  alternative_spanish_readings:
  - son cortados de su vida
  - quedan separados de la vida
  rationale: La formulación conserva la severidad del juicio y la imagen de exclusión sin convertirla en una paráfrasis doctrinal. 'Su vida' mantiene la relación posesiva que el inglés POB deja abierta.
  doctrine_reference: Judgment and apostasy
- issue: Contraste entre negadores futuros y negadores pasados
  english_pob_reading: those who are now about to deny him ... those who denied before
  chosen_spanish_reading: aquellos que ahora están a punto de negarlo ... a los que negaron antes
  alternative_spanish_readings:
  - los que van a negarlo ... a los que antes lo negaron
  - los que están por negarlo ... a los que ya lo habían negado
  rationale: Se conserva el contraste temporal explícito del original y del inglés POB, evitando nivelar ambos grupos. Esto sostiene la tensión moral del pasaje entre amenaza presente y misericordia retrospectiva.
  doctrine_reference: Repentance / divine mercy
translation_notes:
  revision_awareness: The source packet shows high-agreement status with only minor issues in review; no applied revisions are listed. I therefore retained the English POB's sense structure while expressing it in natural Spanish and avoided introducing footnotes not anchored in the text.
  spanish_consistency_notes:
  - Usé 'Señor' consistentemente para κύριος, since no source evidence here required 'Yahvé'.
  - Mantengo 'negar'/'negarlo' as the lexical thread for ἀρνέομαι.
  - '''Misericordia'' and ''compasión'' are distinguished, mirroring the source''s causal phrasing and merciful action.'
  - The sentence preserves the two-clause contrast with a semicolon and em dash, matching the discourse structure of the English audit text.
