revisions:
- from: Porque el Señor juró por su Hijo que aquellos que negaron a su Señor quedan apartados de su vida —aquellos que ahora están a punto de negarlo en los días venideros; pero a los que negaron antes, por su gran compasión, les mostró misericordia.
  to: Porque el Señor juró por su Hijo que aquellos que negaron a su Señor quedan separados de la vida[a] —aquellos que ahora están a punto de negarlo en los días venideros; pero de los que negaron antes, por su gran compasión, tuvo misericordia.
  rationale: Se ajusta una frase para reflejar mejor la fuerza del griego y mejorar la claridad idiomática en español, y se sustituye una expresión menos natural por una formulación más corriente y fiel en registro bíblico. La revisión es menor y no requiere adjudicación adicional.
  reviewer_model: gpt-5.4
