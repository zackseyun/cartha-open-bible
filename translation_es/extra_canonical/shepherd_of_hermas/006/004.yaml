  yaml_path: translation/extra_canonical/shepherd_of_hermas/006/004.yaml
  text: After you have made known to them these words which the Master commanded me to be revealed to you, then all their sins that they formerly committed are forgiven them, and also to all the holy ones who have sinned up to this day, if they repent with all their heart and remove from their heart their double‑mindedness.
translation:
  language: es
  text: Después de que les hayas dado a conocer estas palabras que el Maestro ordenó que te fueran reveladas, entonces les son perdonados todos sus pecados que antes cometieron; y también a todos los santos que han pecado hasta este día, si se arrepienten de todo corazón y apartan de su corazón la doblez de ánimo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «doblez de ánimo» traduce el concepto de double-mindedness con un matiz de duplicidad interior; también podría leerse «doble ánimo», pero aquí se evita una expresión que en español puede sonar menos precisa.
    reason: lexical_alternative
lexical_decisions:
- source_word: words / these words
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estos dichos
  - estas cosas
  lexicon: palabras
  rationale: «Palabras» reproduce de forma natural el contenido verbal comunicado por el Maestro y mantiene el sentido directo del inglés POB sin sobreexplicar.
- source_word: Master
  english_pob_choice: Master
  chosen_spanish: el Maestro
  alternatives_spanish:
  - el Señor
  - el Dueño
  lexicon: Maestro
  rationale: Se conserva el título relacional y didáctico del texto; «Maestro» corresponde bien al griego/uso del pasaje sin sustituirlo por una forma eclesiástica más interpretativa.
- source_word: to be revealed to you
  english_pob_choice: to be revealed to you
  chosen_spanish: que te fueran reveladas
  alternatives_spanish:
  - que se te revelaran
  - que te fueran dadas a conocer
  lexicon: revelar
  rationale: La pasiva refleja en español es posible, pero «te fueran reveladas» preserva con claridad la pasiva del original y el carácter de mensaje recibido.
- source_word: forgiven
  english_pob_choice: are forgiven
  chosen_spanish: les son perdonados
  alternatives_spanish:
  - les quedan perdonados
  - son perdonados
  lexicon: perdonar
  rationale: «Les son perdonados» conserva el pasivo y la referencia a remisión de pecados sin añadir matices no presentes.
- source_word: all their sins that they formerly committed
  english_pob_choice: all their sins that they formerly committed
  chosen_spanish: todos los pecados que antes cometieron
  alternatives_spanish:
  - todos sus pecados pasados
  - todos los pecados que habían cometido antes
  lexicon: pecados
  rationale: La redacción mantiene el alcance total («todos») y el valor temporal de «formerly committed» con una sintaxis natural en español.
- source_word: holy ones
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los consagrados
  - los fieles
  lexicon: santos
  rationale: «Santos» es la forma más transparente y tradicional para los consagrados a Dios, y refleja bien el plural del texto.
- source_word: repent
  english_pob_choice: repent
  chosen_spanish: se arrepienten
  alternatives_spanish:
  - se convierten
  - cambian de mente
  lexicon: arrepentirse
  rationale: En este contexto moral-exhortativo, «arrepentirse» comunica adecuadamente el giro de conducta requerido, sin perder la dimensión interior.
- source_word: with all their heart
  english_pob_choice: with all their heart
  chosen_spanish: de todo corazón
  alternatives_spanish:
  - con todo su corazón
  - con entero corazón
  lexicon: corazón
  rationale: «De todo corazón» es idiomático en español y conserva la intensidad total del compromiso interior.
- source_word: double-mindedness
  english_pob_choice: double-mindedness
  chosen_spanish: doblez de ánimo
  alternatives_spanish:
  - duda
  - doble ánimo
  lexicon: double-mindedness
  rationale: Se preserva la tensión lexical del inglés POB con una expresión que suena bíblica en español; «doblez de ánimo» mantiene la duplicidad interior más que una simple duda intelectual.
theological_decisions:
- issue: Conditional forgiveness tied to repentance
  english_pob_reading: sins are forgiven ... if they repent with all their heart
  chosen_spanish_reading: les son perdonados ... si se arrepienten de todo corazón
  alternative_spanish_readings:
  - serán perdonados si se arrepienten
  - quedan perdonados si se arrepienten
  rationale: La cláusula condicional se conserva sin atenuar el vínculo entre arrepentimiento sincero y perdón de los pecados, tal como lo presenta la lectura POB.
  doctrine_reference: arrepentimiento y perdón condicionados; cf. enseñanza moral del arrepentimiento genuino
- issue: Scope of forgiveness to former sins and present sins of the holy ones
  english_pob_reading: all their sins that they formerly committed ... and also to all the holy ones who have sinned up to this day
  chosen_spanish_reading: todos los pecados que antes cometieron; y también a todos los santos que han pecado hasta este día
  alternative_spanish_readings:
  - todos sus pecados pasados ... y también a todos los santos que han pecado hasta hoy
  - todos los pecados antiguos ... y también a todos los santos que han pecado hasta este día
  rationale: 'Se mantiene la amplitud temporal y el doble alcance del perdón: pecados previos de los destinatarios y los cometidos hasta la fecha por los santos.'
  doctrine_reference: perdón extendido, alcance temporal del pecado y del arrepentimiento
- issue: Internal division or duplicity as moral problem
  english_pob_reading: remove from their heart their double-mindedness
  chosen_spanish_reading: apartan de su corazón la doblez de ánimo
  alternative_spanish_readings:
  - eliminan de su corazón el doble ánimo
  - quitan de su corazón la duda vacilante
  rationale: 'La formulación conserva el carácter moral e interior del problema: no solo vacilación, sino una división de lealtad que debe ser removida del corazón.'
  doctrine_reference: integridad del corazón; exhortación a la entera dedicación a Dios
translation_notes:
  revision_awareness: El texto inglés POB presenta una sola oración larga, sin notas ni variantes; el borrador español sigue esa estructura y conserva el alcance condicional, el doble objeto del perdón y la tensión de «double-mindedness» con una nota lexical mínima.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este pasaje no contiene el tetragrámaton ni una cita directa que lo requiera.
  - Se usa «el Maestro» de forma consistente con el registro del pasaje y con la relación entre el revelador y el receptor.
  - «Santos» se conserva para holy ones por ser el equivalente más claro y estable en este contexto extra canónico.
  - La puntuación separa la cláusula principal y la condicional para facilitar la lectura sin alterar la dependencia sintáctica del original.
