review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del texto griego según la traducción POB en inglés: comunicar las palabras reveladas por mandato del Maestro, el perdón de pecados anteriores, la extensión a los santos que han pecado hasta hoy, y la condición de arrepentimiento sincero junto con la remoción de la duplicidad interior. Sin embargo, hay un pequeño problema de fidelidad pronominal en «todos los pecados que antes cometieron», porque el inglés auditado explicita «all their sins», y en español conviene conservar «sus» para evitar una referencia ligeramente menos precisa.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. La sintaxis general funciona bien, pero «les son perdonados todos los pecados» suena algo más rígido de lo necesario, y «todos los pecados que antes cometieron» queda mejor como «todos sus pecados que antes cometieron» o, más naturalmente, «todos sus pecados anteriores». Además, «doblez de ánimo» es comprensible pero algo menos natural que «doble ánimo» o una formulación explicativa; dado que el borrador ya documenta la decisión y el sentido moral de duplicidad interior, puede mantenerse si se suaviza lo demás.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Maestro», «santos», «arrepienten» y «corazón» están bien alineados. La elección «doblez de ánimo» es defendible como decisión léxica contextual, aunque no es la opción más idiomática; no requiere adjudicación mayor.
  issues:
  - severity: medium
    issue: Falta el posesivo en «todos los pecados que antes cometieron»
    rationale: El texto auditado en inglés dice «all their sins that they formerly committed». En español, omitir «sus» no destruye el sentido, pero debilita la referencia exacta a los pecados de ellos.
  - severity: low
    issue: «Les son perdonados» resulta algo tieso en español
    rationale: Es fiel, pero «les son perdonados todos sus pecados» mejora si se reequilibra la frase completa sin perder el valor pasivo/resultado. Se trata de una mejora menor de fluidez, no de contenido.
  revised_spanish_text: Después de que les hayas dado a conocer estas palabras que el Maestro ordenó que te fueran reveladas, entonces les son perdonados todos sus pecados que antes cometieron; y también a todos los santos que han pecado hasta este día, si se arrepienten de todo corazón y apartan de su corazón la doblez de ánimo[a].
  revised_footnotes:
  - marker: a
    text: «doblez de ánimo» traduce el concepto de double-mindedness con un matiz de duplicidad interior; también podría leerse «doble ánimo», pero aquí se evita una expresión que en español puede sonar menos precisa.
    reason: lexical_alternative
