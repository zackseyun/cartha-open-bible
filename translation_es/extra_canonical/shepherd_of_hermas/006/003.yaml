base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/006/003.yaml
  text: But make these words known to all your children and to your wife, who is to be your sister; for she too does not refrain from her tongue, by which she acts wickedly. But when she hears these words, she will refrain, and she will obtain mercy.
translation:
  language: es
  text: Pero haz saber estas palabras a todos tus hijos y a tu esposa, que ha de ser tu hermana; porque ella tampoco refrena su lengua, por la cual obra mal. Pero cuando oiga estas palabras, se refrenará y alcanzará misericordia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γνῶθι / γνωρίζω (make these words known)
  english_pob_choice: make these words known
  chosen_spanish: haz saber estas palabras
  alternatives_spanish:
  - da a conocer estas palabras
  - haz conocer estas palabras
  lexicon: γινώσκω / γνωρίζω
  rationale: «Haz saber» comunica de forma natural el mandato de comunicar una instrucción a otros, sin endurecer el español con un calco poco idiomático. Conserva la fuerza exhortativa del original y del POB inglés.
- source_word: τέκνα (children)
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos e hijas
  - niños
  lexicon: τέκνον
  rationale: «Hijos» funciona como genérico familiar en español bíblico actual y mantiene la relación doméstica del contexto. «Hijos e hijas» explicita el inclusivo, pero el griego aquí no obliga a esa expansión.
- source_word: γυνή / wife
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - cónyuge
  lexicon: γυνή
  rationale: «Esposa» es la relación conyugal precisa y clara en español; evita la ambigüedad de «mujer».
- source_word: ἀδελφή (sister)
  english_pob_choice: sister
  chosen_spanish: hermana
  alternatives_spanish:
  - como hermana
  lexicon: ἀδελφή
  rationale: Se conserva la designación relacional de «hermana», que en este contexto expresa la nueva forma de vínculo espiritual o comunitario sin añadir glosa interpretativa.
- source_word: γλῶσσα (tongue)
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - palabra
  - habla
  lexicon: γλῶσσα
  rationale: «Lengua» mantiene la imagen concreta del órgano del habla y su sentido moral tradicional en español bíblico, más cercano al griego que una abstracción como «habla».
- source_word: κακῶς ποιεῖ (acts wickedly)
  english_pob_choice: acts wickedly
  chosen_spanish: obra mal
  alternatives_spanish:
  - hace el mal
  - actúa perversamente
  lexicon: κακῶς ποιέω
  rationale: «Obra mal» es breve, idiomático y suficientemente fuerte para reflejar conducta moralmente torcida sin sobrerrefinar el matiz.
- source_word: ἐγκρατής / refrain
  english_pob_choice: refrain
  chosen_spanish: se refrenará
  alternatives_spanish:
  - se abstendrá
  - se contendrá
  lexicon: ἐγκρατής / ἐγκρατεύομαι
  rationale: «Se refrenará» conserva la idea de autocontrol y de freno de la lengua con un verbo natural en español; evita «abstenerse», que suena más genérico.
- source_word: ἔλεος (mercy)
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - piedad
  - compasión
  lexicon: ἔλεος
  rationale: «Misericordia» es el equivalente bíblico más estable en español y conserva la dimensión de favor compasivo implicada por el griego y por el POB inglés.
theological_decisions:
- issue: Relación entre esposa y hermana
  english_pob_reading: who is to be your sister
  chosen_spanish_reading: que ha de ser tu hermana
  alternative_spanish_readings:
  - que será tu hermana
  - la cual será para ti como hermana
  rationale: Se mantiene la formulación futura/de destinación «ha de ser» para no suavizar la instrucción ni convertirla en mera descripción. «Hermana» conserva la lectura relacional del texto, sin resolver por paráfrasis el potencial sentido comunitario o espiritual.
  doctrine_reference: Hermandad cristiana / lenguaje comunitario del cristianismo primitivo
- issue: Eficacia de la amonestación para el cambio moral
  english_pob_reading: when she hears these words, she will refrain, and she will obtain mercy
  chosen_spanish_reading: cuando oiga estas palabras, se refrenará, y alcanzará misericordia
  alternative_spanish_readings:
  - cuando escuche estas palabras, se contendrá, y obtendrá misericordia
  - cuando oiga estas palabras, dejará de hacerlo, y recibirá misericordia
  rationale: 'La versión española conserva la secuencia causal-moral del original: escuchar las palabras conduce al autocontrol y a la recepción de misericordia. No se explicita quién concede la misericordia, porque el texto tampoco lo hace aquí.'
  doctrine_reference: Arrepentimiento y disciplina moral / misericordia divina
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el inglés POB, pero se apoya en la sintaxis y léxico del griego para resolver puntos donde el español exige naturalidad: «haz saber», «esposa», «hermana», «se refrenará» y «alcanzará misericordia». No se detectaron revisiones previas aplicadas en este pasaje; el acuerdo alto con el control cruzado sugiere que solo había ajustes menores de formulación.'
  spanish_consistency_notes:
  - Se mantiene «misericordia» y no «gracia», conforme al sentido de ἔλεος.
  - No se usa «Señor» ni otros equivalentes no presentes en el segmento.
  - «Lengua» conserva la imagen corporal y moral del original; no se la reduce a «habla».
  - La relación familiar se expresa con «esposa» y «hermana» para mantener la tensión interpretativa del texto.
