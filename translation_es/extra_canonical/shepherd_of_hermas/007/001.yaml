  to: Pero tú, Hermas, ya no guardes rencor contra tus hijos, ni permitas que tu hermana continúe, para que sean limpiados de sus pecados anteriores. Porque recibirán una disciplina justa, si no guardas rencor contra ellos. Guardar rencor produce muerte. Pero tú, Hermas, has tenido grandes tribulaciones personales a causa de las transgresiones de tu casa, porque no cuidaste de ellos, sino que los descuidaste y te enredaste en tus perversos negocios.
  rationale: 'Se hace una reparación menor: se elimina «así», que no está claramente sustentado por la evidencia provista, y se suaviza la construcción «disciplinados con disciplina justa» a «recibirán una disciplina justa» para un español más natural sin pérdida de sentido. No se requieren notas.'
