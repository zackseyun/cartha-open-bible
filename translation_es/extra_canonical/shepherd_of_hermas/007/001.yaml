review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego según la auditoría inglesa: la exhortación a no guardar rencor, la meta de limpieza de pecados previos, la disciplina correctiva, el proverbio sobre la muerte y la acusación contra Hermas por descuidar a su casa y enredarse en negocios malos. Sin embargo, hay un desajuste menor de cohesión en «ni permitas que tu hermana continúe así», porque «así» no corresponde a ningún elemento expreso del texto auditado inglés y puede sonar añadido o ambiguo. También conviene mejorar la naturalidad de «disciplinados con disciplina justa».'
  spanish_quality_summary: El español es claro y mayormente digno y natural. «Guardar rencor», «transgresiones», «te enredaste» y «perversos negocios» funcionan bien. La principal mejora es eliminar «así» tras «continúe», y ajustar «serán disciplinados con disciplina justa» a una formulación más idiomática sin perder el paralelismo semántico.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas clave son fieles: μνησικακεῖν → «guardar rencor», καθαρισθῶσι → «sean limpiados», παιδεία → «disciplina/corrección», οἶκος → «casa», πονηροῖς πραγματεύμασιν → «negocios perversos/perversos negocios». Recomiendo «recibirán una disciplina justa» para mejor español, manteniendo el valor de παιδευθήσονται ... δικαίας παιδείας.'
  issues:
  - severity: medium
    issue: «ni permitas que tu hermana continúe así» añade un «así» no respaldado claramente por la evidencia dada.
    rationale: El inglés auditado dice «nor allow your sister to continue», sin complemento adverbial. En español, «continúe así» introduce una manera o estado específico no explicitado y crea ambigüedad.
  - severity: low
    issue: «serán disciplinados con disciplina justa» suena pesado en español.
    rationale: Aunque es semánticamente fiel, la repetición disciplinados/disciplina resulta poco idiomática. «Recibirán una disciplina justa» o «serán corregidos con justa disciplina» conserva mejor el sentido con mejor fluidez.
  revised_spanish_text: Pero tú, Hermas, ya no guardes rencor contra tus hijos, ni permitas que tu hermana continúe, para que sean limpiados de sus pecados anteriores. Porque recibirán una disciplina justa, si no guardas rencor contra ellos. Guardar rencor produce muerte. Pero tú, Hermas, has tenido grandes tribulaciones personales a causa de las transgresiones de tu casa, porque no cuidaste de ellos, sino que los descuidaste y te enredaste en tus perversos negocios.
  revision_rationale: 'Se hace una reparación menor: se elimina «así», que no está claramente sustentado por la evidencia provista, y se suaviza la construcción «disciplinados con disciplina justa» a «recibirán una disciplina justa» para un español más natural sin pérdida de sentido. No se requieren notas.'
