base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/007/001.yaml
  text: But you, Hermas, no longer bear a grudge against your children, nor allow your sister to continue, so that they may be cleansed from their former sins. For they will be disciplined with righteous discipline, if you do not bear a grudge against them. Bearing a grudge produces death. But you, Hermas, have had great personal tribulations because of the transgressions of your household, because you did not care for them, but neglected them and became entangled in your wicked business dealings.
translation:
  language: es
  text: Pero tú, Hermas, ya no guardes rencor contra tus hijos, ni permitas que tu hermana continúe, para que sean limpiados de sus pecados anteriores. Porque recibirán una disciplina justa, si no guardas rencor contra ellos. Guardar rencor produce muerte. Pero tú, Hermas, has tenido grandes tribulaciones personales a causa de las transgresiones de tu casa, porque no cuidaste de ellos, sino que los descuidaste y te enredaste en tus perversos negocios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μὴ μνησικακεῖν / bear a grudge
  english_pob_choice: bear a grudge
  chosen_spanish: guardar rencor
  alternatives_spanish:
  - no resentir
  - no albergar resentimiento
  lexicon: μνησικακέω
  rationale: ‘Guardar rencor’ expresa de manera natural y pública la idea de conservar resentimiento contra alguien, manteniendo el mismo campo semántico que la elección inglesa sin volverla más suave que el griego.
- source_word: τέκνα / children
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus niños
  - tu prole
  lexicon: τέκνα
  rationale: En español bíblico y natural, ‘hijos’ comunica bien la relación familiar. ‘Prole’ sería más técnico y menos transparente.
- source_word: ἡ ἀδελφή / your sister
  english_pob_choice: your sister
  chosen_spanish: tu hermana
  alternatives_spanish:
  - tu hermana de familia
  - tu pariente
  lexicon: ἀδελφή
  rationale: La equivalencia directa es la más fiel y clara en este contexto familiar.
- source_word: καθαρισθῶσι / be cleansed
  english_pob_choice: be cleansed
  chosen_spanish: sean limpiados
  alternatives_spanish:
  - sean purificados
  - sean lavados
  lexicon: καθαρίζω
  rationale: ‘Limpiados’ conserva la imagen concreta del texto y sigue siendo inteligible; ‘purificados’ podría sonar más interpretativo, aunque es una alternativa viable.
- source_word: τῶν προτέρων ἁμαρτημάτων / former sins
  english_pob_choice: their former sins
  chosen_spanish: sus pecados anteriores
  alternatives_spanish:
  - sus pecados pasados
  - sus pecados de antes
  lexicon: ἁμαρτήματα
  rationale: ‘Anteriores’ mantiene la referencia temporal sin cargar más teológicamente el adjetivo; evita sonar demasiado coloquial.
- source_word: παιδευθήσονται / will be disciplined
  english_pob_choice: will be disciplined
  chosen_spanish: serán disciplinados
  alternatives_spanish:
  - recibirán disciplina
  - serán corregidos
  lexicon: παιδεύω
  rationale: ‘Disciplinados’ mantiene la conexión con παιδεύω como formación/corrección, y conserva el enlace con la expresión siguiente sobre ‘disciplina justa’.
- source_word: δικαίας παιδείας / righteous discipline
  english_pob_choice: righteous discipline
  chosen_spanish: disciplina justa
  alternatives_spanish:
  - corrección justa
  - disciplina recta
  lexicon: δίκαιος
  rationale: ‘Justa’ traduce bien la calidad moral/legal de δίκαιος y suena más natural en español que ‘recta’ dentro de esta fórmula.
- source_word: πικρία / bearing a grudge
  english_pob_choice: Bearing a grudge produces death
  chosen_spanish: Guardar rencor produce muerte
  alternatives_spanish:
  - La amargura produce muerte
  - El resentimiento produce muerte
  lexicon: πικρία
  rationale: Aunque el griego puede apuntar a ‘amargura’, la secuencia del pasaje y la elección inglesa POB favorecen una formulación con rencor/resentimiento; ‘guardar rencor’ mantiene la coherencia interna del argumento.
- source_word: θάνατον / death
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - la muerte
  lexicon: θάνατος
  rationale: La traducción directa es suficiente; no requiere glosa.
- source_word: θλῖψιν μεγάλην / great tribulations
  english_pob_choice: great personal tribulations
  chosen_spanish: grandes tribulaciones personales
  alternatives_spanish:
  - grandes aflicciones personales
  - muchas tribulaciones personales
  lexicon: θλῖψις
  rationale: ‘Tribulaciones personales’ sigue de cerca la lectura inglesa auditada y conserva el alcance experiencial del término.
- source_word: παραπτώματα / transgressions
  english_pob_choice: transgressions
  chosen_spanish: transgresiones
  alternatives_spanish:
  - faltas
  - caídas
  lexicon: παράπτωμα
  rationale: ‘Transgresiones’ mantiene la fuerza de desviación o infracción moral, más cercana al registro del texto que ‘faltas’.
- source_word: οἶκος / household
  english_pob_choice: household
  chosen_spanish: tu casa
  alternatives_spanish:
  - tu casa y familia
  - tu hogar
  lexicon: οἶκος
  rationale: ‘Casa’ puede abarcar el ámbito doméstico/familiar en español y mantiene la imagen del texto; ‘familia’ explicaría más, pero va más allá de la forma breve del original.
- source_word: οὐκ ἐπιμεληθείς / did not care for them
  english_pob_choice: you did not care for them
  chosen_spanish: no cuidaste de ellos
  alternatives_spanish:
  - no te preocupaste por ellos
  - no los atendiste
  lexicon: ἐπιμελέομαι
  rationale: ‘Cuidaste de ellos’ conserva la idea de atención responsable y suena natural en el contexto familiar.
- source_word: κατεφρόνησας / neglected them
  english_pob_choice: neglected them
  chosen_spanish: los descuidaste
  alternatives_spanish:
  - los menospreciaste
  - los abandonaste
  lexicon: καταφρονέω
  rationale: ‘Descuidaste’ es la contrapartida natural de ‘no cuidaste de ellos’, manteniendo el paralelismo del griego sin exagerar a ‘abandonaste’.
- source_word: ἐμπλακείς / became entangled
  english_pob_choice: became entangled
  chosen_spanish: te enredaste
  alternatives_spanish:
  - te involucraste
  - quedaste atrapado
  lexicon: ἐμπλέκω
  rationale: ‘Enredaste’ preserva la imagen de quedar atrapado/enmarañado en asuntos, con claridad idiomática en español.
- source_word: πονηροῖς πραγματεύμασιν / wicked business dealings
  english_pob_choice: wicked business dealings
  chosen_spanish: tus perversos negocios
  alternatives_spanish:
  - tus negocios perversos
  - tus transacciones malvadas
  lexicon: πραγματεία
  rationale: ‘Negocios’ refleja la esfera de ocupación o trato comercial; ‘perversos’ conserva el juicio moral fuerte del texto.
theological_decisions:
- issue: Relación entre la advertencia contra el rencor y la purificación de los hijos
  english_pob_reading: If you do not bear a grudge against them, they will be cleansed from their former sins and disciplined with righteous discipline.
  chosen_spanish_reading: Si no guardas rencor contra ellos, serán limpiados de sus pecados anteriores y disciplinados con disciplina justa.
  alternative_spanish_readings:
  - si no resentís contra ellos
  - si no los guardas rencor, ellos serán purificados
  rationale: La cláusula condicional debe mantenerse causalmente unida a la limpieza y disciplina posteriores. La formulación española conserva esa relación sin suavizar la condición moral del pasaje.
  doctrine_reference: Sanctification/discipline language in paraenesis; no doctrinal harmonization beyond the source.
- issue: Sentido de πικρία en el proverbio final
  english_pob_reading: Bearing a grudge produces death.
  chosen_spanish_reading: Guardar rencor produce muerte.
  alternative_spanish_readings:
  - La amargura produce muerte
  - El resentimiento produce muerte
  rationale: El contexto inmediato trata del rencor hacia los hijos; por eso ‘guardar rencor’ es más coherente en español que ‘amargura’, aunque la raíz griega puede incluir esa idea. Se preserva así la tensión semántica sin imponer una sola lectura psicológica.
  doctrine_reference: Ethics of resentment and spiritual consequence; paraenetic warning.
- issue: Carga moral de la culpa doméstica de Hermas
  english_pob_reading: because you did not care for them, but neglected them and became entangled in your wicked business dealings.
  chosen_spanish_reading: porque no cuidaste de ellos, sino que los descuidaste y te enredaste en tus perversos negocios.
  alternative_spanish_readings:
  - porque no los atendiste, sino que los abandonaste
  - y te involucraste en negocios malvados
  rationale: 'La versión conserva la progresión de culpa: falta de cuidado, descuido y enredo en negocios perversos. No se atenúa la reprobación moral que el texto presenta.'
  doctrine_reference: Household responsibility and moral accountability in early Christian paraenesis.
translation_notes:
  revision_awareness: El pasaje presenta una advertencia exhortativa con paralelismo entre el deber de no guardar rencor y el resultado de limpieza/disciplina. La revisión auditada no reporta cambios textuales relevantes respecto del inglés POB; la principal tarea es sostener la fuerza moral y la imagen concreta del griego, especialmente en μνησικακεῖν/πικρία y en la cadena verbal de responsabilidad doméstica.
  spanish_consistency_notes:
  - Se mantuvo 'guardar rencor' en ambos miembros donde el inglés POB usa la misma idea, para preservar cohesión léxica.
  - '''Disciplina justa'' reproduce el binomio de corrección + justicia sin introducir ''rectitud'' como sustituto más abstracto.'
  - '''Tu casa'' se usó para οἶκος, evitando una expansión innecesaria a ''familia'' aunque el sentido doméstico está implícito.'
  - No se añadieron notas al pie porque el texto español no requiere una variante textual o semántica que el audit trail haya destacado como alternativa obligatoria.
