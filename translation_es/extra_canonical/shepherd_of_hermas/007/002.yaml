base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/007/002.yaml
  text: But what saves you is that you did not depart from the living God, and your simplicity and great self-control. These have saved you, if you continue in them, and they save all who do such things and who walk in innocence and simplicity. These prevail over all wickedness and remain unto eternal life.
translation:
  language: es
  text: Pero lo que te salva es que no te apartaste del Dios vivo, y tu sencillez y gran dominio propio. Estas te han salvado, si continúas en ellas; y salvan a todos los que hacen tales cosas y andan en inocencia y sencillez. Estas prevalecen sobre toda maldad y permanecen hasta la vida eterna.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: the living God
  english_pob_choice: the living God
  chosen_spanish: el Dios vivo
  alternatives_spanish:
  - el Dios viviente
  - el Dios que vive
  lexicon: θεός / ζῶν
  rationale: Mantiene la expresión bíblica estable en español y conserva la fuerza de contraste con la idolatría o la separación de Dios; 'vivo' es natural y fiel al modismo original.
- source_word: simplicity
  english_pob_choice: simplicity
  chosen_spanish: sencillez
  alternatives_spanish:
  - simplicidad
  - inocencia
  lexicon: ἁπλότης
  rationale: '''Sencillez'' comunica mejor en español la cualidad moral de franqueza, claridad y ausencia de doblez que suele tener el término en este contexto; ''simplicidad'' puede sonar más intelectual y menos ética.'
- source_word: great self-control
  english_pob_choice: great self-control
  chosen_spanish: gran dominio propio
  alternatives_spanish:
  - gran templanza
  - gran autocontrol
  lexicon: ἐγκράτεια
  rationale: '''Dominio propio'' es la equivalencia más clara y bíblica en español para la virtud moral de autocontrol; se conserva ''gran'' para reflejar el intensificador del griego y del inglés POB.'
- source_word: continue in them
  english_pob_choice: if you continue in them
  chosen_spanish: si continúas en ellas
  alternatives_spanish:
  - si permaneces en ellas
  - si perseveras en ellas
  lexicon: μένω / ἐν αὐτοῖς
  rationale: '''Continuas en ellas'' mantiene la continuidad práctica sin forzar una terminología más técnica; ''permaneces'' o ''perseveras'' también serían posibles, pero ''continúas'' resulta más directo en español contemporáneo.'
- source_word: walk in innocence and simplicity
  english_pob_choice: walk in innocence and simplicity
  chosen_spanish: andan en inocencia y sencillez
  alternatives_spanish:
  - viven en inocencia y sencillez
  - caminan en inocencia y sencillez
  lexicon: περιπατέω + ἀκακία/ἁπλότης
  rationale: '''Andan'' conserva la metáfora bíblica de conducta habitual y evita una paráfrasis moderna; ''inocencia'' refleja bien la ausencia de malicia o astucia, en paralelo con ''sencillez''.'
- source_word: These prevail over all wickedness
  english_pob_choice: These prevail over all wickedness
  chosen_spanish: Estas prevalecen sobre toda maldad
  alternatives_spanish:
  - Estas vencen toda maldad
  - Estas triunfan sobre toda maldad
  lexicon: ἰσχύω / κακός
  rationale: '''Prevalecen'' conserva la idea de superioridad moral y eficacia victoriosa sin añadir un tono demasiado triunfalista; sigue de cerca la lectura inglesa auditada.'
- source_word: remain unto eternal life
  english_pob_choice: remain unto eternal life
  chosen_spanish: permanecen hasta la vida eterna
  alternatives_spanish:
  - permanecen para vida eterna
  - perduran hasta la vida eterna
  lexicon: μένω εἰς ζωὴν αἰώνιον
  rationale: '''Permanecen'' comunica continuidad estable; ''hasta la vida eterna'' respeta la dirección escatológica del original sin transformar la frase en un giro más doctrinal de lo necesario.'
theological_decisions:
- issue: Qué dimensión salvífica tienen las virtudes mencionadas
  english_pob_reading: These have saved you, if you continue in them, and they save all who do such things
  chosen_spanish_reading: Estas cosas te han salvado, si continúas en ellas; y salvan a todos los que hacen tales cosas
  alternative_spanish_readings:
  - Estas cosas te salvaron, si continúas en ellas; y salvan a todos los que hacen tales cosas
  - Estas cosas te han preservado, si continúas en ellas; y preservan a todos los que hacen tales cosas
  rationale: 'La formulación mantiene la tensión del texto: las virtudes aparecen como medio real de salvación/preservación, condicionado por la perseverancia. ''Han salvado'' reproduce el valor perfecto del inglés POB sin resolver excesivamente la teología del pasaje.'
  doctrine_reference: Soteriología moral/exhortativa en literatura cristiana primitiva; no se debe suavizar la causalidad expresada por el texto.
- issue: Relación entre conducta inocente y vida eterna
  english_pob_reading: These prevail over all wickedness and remain unto eternal life.
  chosen_spanish_reading: Estas prevalecen sobre toda maldad y permanecen hasta la vida eterna.
  alternative_spanish_readings:
  - Estas vencen toda maldad y permanecen para vida eterna
  - Estas triunfan sobre toda maldad y duran para siempre
  rationale: Se conserva la afirmación fuerte de superioridad moral y continuidad escatológica sin convertirla en una glosa doctrinal posterior. La traducción evita reemplazar el efecto del original por una explicación sobre méritos.
  doctrine_reference: Ética cristiana primitiva y recompensa escatológica; mantener la fuerza del enunciado sin reinterpretarlo.
translation_notes:
  revision_awareness: High-agreement source packet; no applied revisions were supplied. The Spanish draft follows the English POB audit context closely while checking the Greek-driven ethical terms for natural Spanish equivalents.
  spanish_consistency_notes:
  - Se mantiene 'Dios vivo' para the living God, en línea con el uso bíblico natural en español.
  - '''Sencillez'' se usa consistentemente para ἁπλότης, reservando ''simplicidad'' para contextos más abstractos o técnicos.'
  - Se conserva la metáfora de andar/caminar para la conducta habitual.
  - No se introducen notas porque no hay variantes textuales, lecturas alternativas documentadas ni tensiones lexicales que requieran marcadores en el texto.
