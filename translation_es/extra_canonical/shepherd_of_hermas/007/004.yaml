revisions:
- from: 'Y dirás a Máximo: Mira, viene la tribulación, si te parece bien negar otra vez. El Señor está cerca de los que se vuelven a él, como está escrito en Eldad y Modat, quienes profetizaron al pueblo en el desierto.'
  to: 'Y dirás a Máximo: Mira, viene la tribulación, si decides negar otra vez. Yahvé está cerca de los que se vuelven a él, como está escrito en Eldad y Modat, quienes profetizaron al pueblo en el desierto.'
  rationale: Se ajusta «el Señor» a «Yahvé» conforme a la terminología por defecto del proyecto para el nombre divino en el texto principal. También se suaviza una construcción algo dura en español («si te parece bien negar otra vez») a «si decides negar otra vez», que mantiene la advertencia condicional y la responsabilidad personal con mejor naturalidad.
