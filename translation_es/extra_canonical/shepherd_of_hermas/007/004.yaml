base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/007/004.yaml
  text: 'And you shall say to Maximus: Behold, tribulation is coming, if it seems good to you to deny again. The Lord is near to those who turn to him, as it is written in Eldad and Modat, who prophesied to the people in the wilderness.'
translation:
  language: es
  text: 'Y dirás a Máximo: Mira, viene la tribulación, si decides negar otra vez. Yahvé está cerca de los que se vuelven a él, como está escrito en Eldad y Modat, quienes profetizaron al pueblo en el desierto.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τίμωσις / tribulation
  english_pob_choice: tribulation
  chosen_spanish: tribulación
  alternatives_spanish:
  - aflicción
  - angustia
  lexicon: θλῖψις
  rationale: «Tribulación» conserva el matiz de presión, prueba o aflicción intensa que refleja el griego y sigue de cerca la elección del POB en inglés.
- source_word: ἀρνήσῃ πάλιν
  english_pob_choice: deny again
  chosen_spanish: negar otra vez
  alternatives_spanish:
  - renegar otra vez
  - volver a negar
  lexicon: ἀρνέομαι
  rationale: «Negar otra vez» comunica de forma natural la repetición del acto de negar, sin añadir una carga interpretativa mayor que la del texto.
- source_word: Κύριος
  english_pob_choice: The Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Yahvé
  lexicon: κύριος
  rationale: Aunque el proyecto prefiere «Yahvé» para יהוה, aquí el griego cita la formulación del texto recibido con κύριος en una frase de cita; se mantiene «el Señor» para respetar el eco textual y la recepción cristiana del enunciado.
- source_word: ἐπιστρεφόντων / turn to him
  english_pob_choice: turn to him
  chosen_spanish: se vuelven a él
  alternatives_spanish:
  - se convierten a él
  - regresan a él
  lexicon: ἐπιστρέφω
  rationale: «Se vuelven a él» conserva el movimiento de retorno relacional sin forzar un tecnicismo doctrinal. En español suena natural y mantiene la dirección del verbo griego.
- source_word: ἐν τῷ ἐρήμῳ / in the wilderness
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el yermo
  - en la soledad
  lexicon: ἔρημος
  rationale: «Desierto» es la equivalencia más clara y bíblica en español para el entorno de Israel, sin perder el trasfondo narrativo del texto.
theological_decisions:
- issue: Uso de «el Señor» frente a «Yahvé» en una cita proverbial
  english_pob_reading: The Lord is near to those who turn to him
  chosen_spanish_reading: El Señor está cerca de los que se vuelven a él
  alternative_spanish_readings:
  - Yahvé está cerca de los que se vuelven a él
  - El Señor Yahvé está cerca de los que se vuelven a él
  rationale: La frase procede de una cita atribuida a Eldad y Modat. Dado que el griego de la forma citada usa κύριος y no hay un marcador explícito de sustitución del nombre divino en el contexto inmediato, se mantiene «el Señor» para no sobrecargar la frase con una decisión de nombre divino no exigida por el pasaje mismo.
  doctrine_reference: Nombre divino en citas del NT / uso de κύριος en fórmulas citadas
- issue: Repetición de la negación como advertencia moral
  english_pob_reading: if it seems good to you to deny again
  chosen_spanish_reading: si te parece bien negar otra vez
  alternative_spanish_readings:
  - si quieres negar otra vez
  - si te agrada negar otra vez
  rationale: La formulación conserva el tono admonitorio y condicional del POB en inglés. No se suaviza la responsabilidad moral ni se expande el sentido con explicaciones ajenas al texto.
  doctrine_reference: Exhortación moral y responsabilidad humana
- issue: Identidad y función de Eldad y Modat
  english_pob_reading: as it is written in Eldad and Modat, who prophesied to the people in the wilderness
  chosen_spanish_reading: como está escrito en Eldad y Modat, quienes profetizaron al pueblo en el desierto
  alternative_spanish_readings:
  - como está escrito acerca de Eldad y Modat, que profetizaron al pueblo en el desierto
  - como está escrito en el libro de Eldad y Modat
  rationale: Se conserva la referencia tal como la da el POB inglés, sin intentar resolver la cuestión textual o de fuente secundaria. Esto respeta el audit trail y evita introducir una armonización no sustentada.
  doctrine_reference: Autoridad de la tradición citada / preservación de la referencia fuente
translation_notes:
  revision_awareness: El draft corrige el problema de validación anterior eliminando cualquier nota al pie no anclada. Se mantiene la estructura del POB inglés y se preserva la referencia a Eldad y Modat sin añadir marcadores innecesarios.
  spanish_consistency_notes:
  - Se usa «tribulación» de manera consistente con el registro bíblico español y con la elección inglesa.
  - «Señor» se mantiene por la forma citacional del pasaje; no se sustituye por «Yahvé» sin un marcador textual que lo exija.
  - 'Los nombres propios se castellanizan con acento prosódico natural: «Máximo».'
  - No se añaden notas al pie porque el pasaje no exige variantes textuales ancladas en el texto español.
