review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego según el rastro del POB inglés: mandato de hablar a Máximo, anuncio de tribulación, advertencia condicional sobre volver a negar, afirmación de cercanía divina a quienes se vuelven a él, y referencia a Eldad y Modat en el desierto. No hay desalineaciones graves de contenido.'
  spanish_quality_summary: El español es claro y natural en general. Sin embargo, «si te parece bien negar otra vez» suena algo torpe en una admonición directa; «si decides negar otra vez» o «si te parece bien volver a negar» fluye mejor. Además, por la política terminológica del proyecto, «Yahvé» debe preferirse en el texto principal cuando κύριος refleja el nombre divino; aquí la frase citada tiene sabor escriturario y no hay razón suficiente para mantener «el Señor» como excepción en el texto principal.
  glossary_alignment: Alineación parcial. «tribulación», «se vuelven a él» y «desierto» concuerdan bien con el proyecto. La principal divergencia es «el Señor» donde el proyecto establece «Yahvé» como valor por defecto para el nombre divino; la justificación dada no parece suficiente para apartarse del estándar en este pasaje. No se requieren notas léxicas adicionales.
  issues:
  - severity: medium
    issue: Uso de «el Señor» en lugar de «Yahvé»
    rationale: La política del proyecto pide «Yahvé» en el texto principal para el nombre divino, salvo excepción documentada y convincente. Aquí no se aporta evidencia suficiente para una excepción; la formulación citada puede verterse naturalmente como «Yahvé está cerca...».
  - severity: low
    issue: «si te parece bien negar otra vez» suena poco idiomático
    rationale: Aunque semánticamente correcto, el orden y la construcción resultan algo rígidos en español. «si decides negar otra vez» preserva mejor la fuerza volitiva implícita y mejora la legibilidad sin añadir contenido.
  revised_spanish_text: 'Y dirás a Máximo: Mira, viene la tribulación, si decides negar otra vez. Yahvé está cerca de los que se vuelven a él, como está escrito en Eldad y Modat, quienes profetizaron al pueblo en el desierto.'
  revision_rationale: Se ajusta «el Señor» a «Yahvé» conforme a la terminología por defecto del proyecto para el nombre divino en el texto principal. También se suaviza una construcción algo dura en español («si te parece bien negar otra vez») a «si decides negar otra vez», que mantiene la advertencia condicional y la responsabilidad personal con mejor naturalidad.
