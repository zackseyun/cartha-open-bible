  text: Blessed are all who practice righteousness; they will never be destroyed.
translation:
  language: es
  text: Bienaventurados todos los que practican la justicia; nunca serán destruidos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δικαιοσύνη / righteousness
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: δικαιοσύνη
  rationale: En este contexto el sentido es el de conducta conforme a lo recto ante Dios; en español, «la justicia» comunica bien esa práctica moral y covenantal sin añadir explicaciones ajenas al texto.
- source_word: μακάριοι / blessed
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Dichosos
  - Felices
  lexicon: μακάριοι
  rationale: «Bienaventurados» es la forma más estable y digna en español bíblico para el valor de bendición/aprobación divina, y conserva el tono declarativo del original.
- source_word: οὐ μή / they will never
  english_pob_choice: they will never
  chosen_spanish: nunca
  alternatives_spanish:
  - de ningún modo
  - jamás
  lexicon: οὐ μή
  rationale: La doble negación enfática del griego se expresa naturalmente en español con «nunca», que conserva la fuerza absoluta de la negación.
theological_decisions:
- issue: Relación entre practicar justicia y la preservación final
  english_pob_reading: they will never be destroyed
  chosen_spanish_reading: nunca serán destruidos
  alternative_spanish_readings:
  - no serán destruidos jamás
  - de ningún modo perecerán
  rationale: El griego afirma una negación enfática de destrucción; mantener «serán destruidos» conserva la pasiva y la seriedad del juicio sin suavizar la promesa.
  doctrine_reference: Seguridad/preservación final en forma descriptiva, sin desarrollar una formulación doctrinal más allá del dicho del texto.
translation_notes:
  revision_awareness: No hay revisiones aplicadas ni variantes textuales relevantes en el paquete provisto; la traducción sigue directamente el griego normalizado y coincide sustancialmente con la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y publicable.
  - No se introduce «Cristo», «SEÑOR» ni otras equivalencias no presentes en este dicho.
  - «Practican la justicia» conserva el aspecto habitual/continuo de la acción en español natural.
