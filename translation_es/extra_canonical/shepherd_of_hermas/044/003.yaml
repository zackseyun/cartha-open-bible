base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/044/003.yaml
  text: 'Now I say to you: if you do not keep these, but neglect them, do not follow the commandments of the devil, which are difficult and bitter and savage and licentious; and do not fear the devil, because he has no power against you. For I will be with you—I, the angel of repentance, who has mastery over him. The devil has only fear, but his fear has no force. Therefore do not fear him, and he will flee from you.”'
translation:
  language: es
  text: 'Ahora les digo: si no guardan estas cosas, sino que las descuidan, no sigan los mandamientos del diablo, que son difíciles, amargos, salvajes y licenciosos; y no teman al diablo, porque no tiene poder contra ustedes. Porque estaré con ustedes: yo, el ángel del arrepentimiento, que tengo dominio sobre él. El diablo solo tiene temor, pero su temor no tiene fuerza. Por tanto, no le teman, y huirá de ustedes.”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φυλάσσετε ταῦτα / keep these
  english_pob_choice: keep these
  chosen_spanish: guarden estas cosas
  alternatives_spanish:
  - conserven estas cosas
  - observen estas cosas
  lexicon: φυλάσσω
  rationale: «Guardar» comunica bien la idea de mantener y obedecer lo recibido, sin añadir una legalidad más fuerte que la del contexto.
- source_word: ἀμελῆτε / neglect
  english_pob_choice: neglect
  chosen_spanish: las descuiden
  alternatives_spanish:
  - las desatiendan
  - las menosprecien
  lexicon: ἀμελέω
  rationale: «Descuidar» preserva la idea de omisión por falta de atención, que encaja con el contraste entre guardar y dejar de lado.
- source_word: ἐντολάς / commandments
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - órdenes
  - preceptos
  lexicon: ἐντολή
  rationale: «Mandamientos» es el equivalente más directo y reconocible en español, manteniendo el peso normativo del término.
- source_word: διάβολος / devil
  english_pob_choice: devil
  chosen_spanish: diablo
  alternatives_spanish:
  - el diablo
  - Satanás
  lexicon: διάβολος
  rationale: Se usa «diablo» y no «Satanás» porque el griego aquí dice διάβολος; en español la forma natural con artículo definido es «el diablo».
- source_word: ἔχει δύναμιν / has power
  english_pob_choice: has no power against you
  chosen_spanish: no tiene poder contra ustedes
  alternatives_spanish:
  - no puede contra ustedes
  - no tiene dominio sobre ustedes
  lexicon: δύναμις
  rationale: «No tiene poder contra ustedes» conserva la formulación de capacidad efectiva sin convertirla en una noción distinta de dominio absoluto.
- source_word: ἄγγελος τῆς μετανοίας / angel of repentance
  english_pob_choice: the angel of repentance
  chosen_spanish: el ángel del arrepentimiento
  alternatives_spanish:
  - el ángel de la penitencia
  - el ángel del cambio de mente
  lexicon: μετάνοια
  rationale: «Arrepentimiento» mantiene la lectura moral y volitiva que el contexto exige; «penitencia» sonaría más eclesiástico y menos directo.
- source_word: κράτος / mastery
  english_pob_choice: has mastery over him
  chosen_spanish: tengo dominio sobre él
  alternatives_spanish:
  - tengo autoridad sobre él
  - lo domino
  lexicon: κράτος
  rationale: «Dominio» expresa la superioridad y control sin exagerar hacia una formulación técnica que no aparece en el texto.
- source_word: φόβος / fear
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  lexicon: φόβος
  rationale: «Temor» funciona mejor en español bíblico para la cualidad impersonal que aquí se atribuye al diablo; evita la carga emotiva más cotidiana de «miedo».
- source_word: ἔχει δύναμιν οὐδὲν / has no force
  english_pob_choice: his fear has no force
  chosen_spanish: su temor no tiene fuerza
  alternatives_spanish:
  - su temor no tiene poder
  - su temor no produce efecto
  lexicon: δύναμις
  rationale: «Fuerza» traduce el énfasis de eficacia/efecto del griego y conserva el paralelismo con «poder» en la frase anterior.
theological_decisions:
- issue: Autoridad limitada del diablo
  english_pob_reading: the devil has no power against you; his fear has no force
  chosen_spanish_reading: el diablo no tiene poder contra ustedes; su temor no tiene fuerza
  alternative_spanish_readings:
  - el diablo no puede contra ustedes; su temor no produce efecto
  - el diablo carece de poder sobre ustedes; su temor es impotente
  rationale: La redacción mantiene la tensión del texto entre poder real y limitación real del diablo sin convertirla en una negación absoluta de toda influencia.
  doctrine_reference: Efe 6:12; Stg 4:7; 1 Pe 5:8-9
- issue: Identidad y función del hablante
  english_pob_reading: I, the angel of repentance
  chosen_spanish_reading: yo, el ángel del arrepentimiento
  alternative_spanish_readings:
  - yo, el ángel de la penitencia
  - yo, el ángel que llama al arrepentimiento
  rationale: Se conserva la autoidentificación literal del mensajero y su relación con el arrepentimiento, sin suavizarla ni reinterpretarla.
  doctrine_reference: Hch 5:31; Ap 2:5
- issue: Llamado a no temer al diablo
  english_pob_reading: do not fear the devil
  chosen_spanish_reading: no teman al diablo
  alternative_spanish_readings:
  - no tengan miedo del diablo
  - no le teman
  rationale: La forma imperativa plural mantiene el tono exhortativo del mandato y la cercanía con el original, sin añadir matices devocionales ajenos.
  doctrine_reference: Jos 1:9; Mt 10:28
translation_notes:
  revision_awareness: No applied revisions were supplied in the source packet. The Spanish draft follows the normalized Greek source as mediated by the audited English POB rendering, preserving the sequence and rhetorical force of the exhortation.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento plural de segunda persona como «ustedes» para neutralidad panhispánica.
  - Se empleó «diablo» de manera consistente para διάβολος, evitando alternancia innecesaria con «Satanás».
  - Se conservó «arrepentimiento» como término técnico principal para μετάνοια, acorde con el rol del ángel mencionado.
  - La puntuación reproduce el encadenamiento exhortativo y la cita directa final con cierre de comillas.
