review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del inglés POB: condición volitiva inicial, facilidad resultante, y contraste con la convicción interior de imposibilidad. Sin embargo, en la segunda mitad cambia innecesariamente el sujeto implícito de referencia al pasar de un neutro/plural tácito (''ellas/los mandamientos'') a ''guardadas'', mientras que la primera mitad usa ''las guardarás''; una forma activa paralela suena más natural y preserva mejor la simetría argumentativa del original y del inglés.'
  spanish_quality_summary: El español es claro y digno, pero 'que pueden guardarse' suena algo impersonal frente a la continuación 'las guardarás'. También 'ser guardadas por un ser humano' es correcto, aunque más pesado de lo necesario. Una leve revisión mejora la fluidez y el paralelismo sin perder precisión.
  glossary_alignment: No hay términos del glosario maestro especialmente implicados. 'Guardar' para τηρεῖν está bien elegido en contexto de mandamientos. 'Ser humano' refleja adecuadamente ἀνθρώπου como genérico.
  issues:
  - severity: medium
    issue: Asimetría y pesadez en la segunda cláusula
    rationale: El texto alterna entre 'pueden guardarse / las guardarás' y luego 'no pueden ser guardadas por un ser humano / no las guardarás'. Una formulación activa paralela ('que un ser humano no puede guardarlas') suena más natural en español y mantiene mejor la lógica exhortativa del pasaje.
  - severity: low
    issue: Leve rigidez en 'que pueden guardarse'
    rationale: Aunque fiel, la forma pronominal impersonal es algo menos natural que una formulación más directa en español. No es error grave, pero conviene alinear mejor la frase con el resto del período.
  revised_spanish_text: 'Respondiendo, me dice: «Si te propones que pueden guardarse, las guardarás fácilmente, y no serán difíciles. Pero si ya ha surgido en tu corazón que un ser humano no puede guardarlas, no las guardarás.»'
  revision_rationale: Se conserva la estructura y el sentido del original, pero se reemplaza la pasiva perifrástica final por una construcción activa más natural en español y mejor paralela con 'las guardarás'. No se requieren notas.
