  yaml_path: translation/extra_canonical/shepherd_of_hermas/044/002.yaml
  text: Answering, he says to me, “If you set before yourself that they can be kept, you will keep them easily, and they will not be hard. But if it has already arisen in your heart that they cannot be kept by a human being, you will not keep them.
translation:
  language: es
  text: 'Respondiendo, me dice: «Si te propones que pueden guardarse, las guardarás fácilmente, y no serán difíciles. Pero si ya ha surgido en tu corazón que un ser humano no puede guardarlas, no las guardarás.»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐγώφησεν / answering, he says to me
  english_pob_choice: Answering, he says to me
  chosen_spanish: Respondiendo, me dice
  alternatives_spanish:
  - Y respondiendo, me dijo
  - Él respondió y me dijo
  lexicon: N/A
  rationale: Mantiene el marco dialogal directo del griego y del inglés POB sin añadir más solemnidad que la que exige el texto.
- source_word: ἐὰν θέσῃς ἐπὶ σεαυτὸν
  english_pob_choice: If you set before yourself
  chosen_spanish: Si te propones
  alternatives_spanish:
  - Si te pones delante de ti
  - Si te lo propones
  lexicon: N/A
  rationale: La idea es volitiva e interior; «te propones» expresa mejor la auto-posición mental que una traducción más literal y extraña en español.
- source_word: δύνανται τηρηθῆναι
  english_pob_choice: they can be kept
  chosen_spanish: pueden guardarse
  alternatives_spanish:
  - pueden ser observadas
  - pueden ser cumplidas
  lexicon: N/A
  rationale: «Guardar» conserva el sentido de observar mandamientos. Se evita «cumplir» porque puede sonar a desempeño externo más que a mantenimiento fiel.
- source_word: ῥᾳδίως
  english_pob_choice: easily
  chosen_spanish: fácilmente
  alternatives_spanish:
  - con facilidad
  - sin dificultad
  lexicon: N/A
  rationale: Equivalente directo y natural en español, sin perder la idea de ausencia de dificultad.
- source_word: οὐ χαλεπαί
  english_pob_choice: they will not be hard
  chosen_spanish: no serán difíciles
  alternatives_spanish:
  - no serán duras
  - no serán arduas
  lexicon: N/A
  rationale: «Difíciles» comunica la cualidad de carga o dificultad en español contemporáneo; evita el calco «duras», menos idiomático aquí.
- source_word: ἐὰν δὲ ἤδη ἀναβέβηκεν ἐν τῇ καρδίᾳ σου
  english_pob_choice: But if it has already arisen in your heart
  chosen_spanish: Pero si ya ha surgido en tu corazón
  alternatives_spanish:
  - Pero si ya ha subido en tu corazón
  - Pero si ya se ha levantado en tu corazón
  lexicon: N/A
  rationale: «Surgido» transmite la imagen de algo que aparece o se levanta interiormente, fiel al griego y natural en español.
- source_word: οὐ δύνανται τηρηθῆναι ὑπὸ ἀνθρώπου
  english_pob_choice: they cannot be kept by a human being
  chosen_spanish: no pueden ser guardadas por un ser humano
  alternatives_spanish:
  - no puede guardarlas ningún hombre
  - no pueden ser cumplidas por un ser humano
  lexicon: N/A
  rationale: «Ser humano» evita un masculinismo innecesario y preserva el valor genérico de ἀνθρώπου.
theological_decisions:
- issue: Capacidad humana para obedecer los mandamientos
  english_pob_reading: If one assumes the commands can be kept, they will be kept; if one assumes they cannot be kept by a human being, they will not be kept.
  chosen_spanish_reading: Si uno se dispone interiormente a creer que pueden guardarse, las obedecerá/guardará; pero si cree que no pueden ser guardadas por un ser humano, no las guardará.
  alternative_spanish_readings:
  - Si uno piensa que es imposible guardarlas
  - Si uno cree que el ser humano no puede cumplirlas
  rationale: El texto presenta una relación entre la disposición interior y la posibilidad práctica de obediencia. La traducción conserva esa tensión sin convertirla en una tesis filosófica más fuerte de la que el pasaje expresa.
  doctrine_reference: Mandato 12, sección iv; exhortación moral sobre obediencia y disposición interior
translation_notes:
  revision_awareness: No se registran revisiones previas en el paquete; se sigue de cerca el griego normalizado OCR y la formulación inglesa POB para reflejar el paralelismo retórico sin introducir glosas.
  spanish_consistency_notes:
  - Se mantiene «guardar» para τηρεῖν/τηρηθῆναι conforme al uso POB de observar mandamientos.
  - Se evita «SEÑOR» y otros términos no presentes en el pasaje.
  - El tono es directo y didáctico, acorde con una sentencia de instrucción moral.
