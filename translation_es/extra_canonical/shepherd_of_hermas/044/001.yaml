  text: But I do not know whether these commandments can be kept by a human being, because they are very hard.
translation:
  language: es
  text: Pero no sé si un ser humano puede guardar estos mandamientos, porque son muy difíciles.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑπ᾽ ἀνθρώπου / ἀνθρώπῳ (human being)
  english_pob_choice: by a human being
  chosen_spanish: por un ser humano
  alternatives_spanish:
  - por el hombre
  - por una persona humana
  lexicon: ἄνθρωπος
  rationale: “Ser humano” comunica el sentido general sin dar un matiz masculino exclusivo. Mantiene la referencia a la capacidad humana en términos naturales para el español.
- source_word: φυλάσσεσθαι / keep
  english_pob_choice: be kept
  chosen_spanish: ser guardados
  alternatives_spanish:
  - cumplirse
  - observarse
  lexicon: φυλάσσω
  rationale: En este contexto de mandamientos, “ser guardados” conserva la idea de observar o cumplir lo mandado sin forzar una paráfrasis. También preserva el matiz de capacidad práctica para obedecerlos.
- source_word: σφόδρα χαλεποί / very hard
  english_pob_choice: very hard
  chosen_spanish: muy difíciles
  alternatives_spanish:
  - muy duros
  - muy arduos
  lexicon: χαλεπός
  rationale: “Difíciles” es natural en español y expresa bien la carga de dificultad que el griego atribuye a los mandamientos. “Duros” o “arduos” son posibles, pero menos fluidos aquí.
theological_decisions:
- issue: La posibilidad real de obedecer los mandamientos
  english_pob_reading: But I do not know whether these commandments can be kept by a human being, because they are very hard.
  chosen_spanish_reading: Pero no sé si estos mandamientos pueden ser guardados por un ser humano, porque son muy difíciles.
  alternative_spanish_readings:
  - Pero no sé si un ser humano puede guardar estos mandamientos, porque son muy difíciles.
  - Pero no sé si estos mandamientos los puede cumplir un ser humano, porque son muy difíciles.
  rationale: La redacción mantiene la duda expresada por el hablante sin resolverla teológicamente. No suaviza la tensión entre el mandato y la capacidad humana que el texto presenta.
  doctrine_reference: Antropología moral / obediencia humana frente a mandamientos difíciles
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas ni notas textuales en el paquete proporcionado. La presente redacción sigue de cerca el sentido del griego normalizado y el inglés auditado, sin añadir notas de variante.
  spanish_consistency_notes:
  - Se usa un español neutral y eclesial, evitando calcos innecesarios.
  - No se introduce “Señor”, “Cristo” ni otros términos no presentes en este pasaje.
  - La construcción impersonal “pueden ser guardados” conserva la voz pasiva del sentido griego y el enfoque en la observancia de los mandamientos.
