  source_alignment_summary: 'El borrador sigue de cerca el griego según el rastro inglés: aparición de dos hombres, contacto físico en los codos, desplazamiento hacia donde estaba la silla al oriente, salida gozosa de ella y exhortación final a Hermas. El único ajuste importante es que «la tomaron por los codos» debilita el valor de ‘lifted her by the elbows’, donde el inglés auditado preserva una acción de alzar/levantar, no solo sujetar.'
