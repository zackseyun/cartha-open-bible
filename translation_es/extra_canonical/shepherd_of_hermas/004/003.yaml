  text: While she was speaking with me, two men appeared, lifted her by the elbows, and went away to where the chair also was, toward the east. She went away cheerful, and as she was going she said to me, "Take courage, Hermas."
translation:
  language: es
  text: 'Mientras ella hablaba conmigo, aparecieron dos hombres, la levantaron por los codos y se fueron al lugar donde también estaba la silla, hacia el oriente. Ella se fue contenta, y al irse me dijo: «Ten ánimo, Hermas».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: two men
  english_pob_choice: two men appeared
  chosen_spanish: aparecieron dos hombres
  alternatives_spanish:
  - se presentaron dos hombres
  - vinieron dos hombres
  lexicon: ἀνδρεῖς
  rationale: Mantiene el hecho narrativo de la aparición repentina con un español natural; «hombres» conserva la referencia humana sin añadir matiz interpretativo.
- source_word: lifted her by the elbows
  english_pob_choice: lifted her by the elbows
  chosen_spanish: la tomaron por los codos
  alternatives_spanish:
  - la levantaron por los codos
  - la alzaron por los codos
  lexicon: ἔλαβον αὐτὴν ἀπὸ τῶν ἀγκώνων
  rationale: «Tomaron por los codos» comunica la acción de sujetarla desde los codos con un giro idiomático fluido en español, sin perder la concreción física del original.
- source_word: went away to where the chair also was, toward the east
  english_pob_choice: went away to where the chair also was, toward the east
  chosen_spanish: se fueron al lugar donde también estaba la silla, hacia el oriente
  alternatives_spanish:
  - se fueron al sitio donde también estaba la silla, hacia el oriente
  - se retiraron al lugar donde estaba también la silla, hacia el oriente
  lexicon: ἐκεῖ ἦν καὶ ἡ καθέδρα, εἰς ἀνατολάς
  rationale: Conserva la relación espacial y la redundancia del texto («también estaba la silla») y traduce εἰς ἀνατολάς con «hacia el oriente», forma digna y precisa.
- source_word: Went away cheerful
  english_pob_choice: She went away cheerful
  chosen_spanish: Ella se fue contenta
  alternatives_spanish:
  - Ella se fue alegre
  - Ella partió contenta
  lexicon: ἔχαιρεν / μετ' εὐθυμίας
  rationale: «Contenta» transmite el tono gozoso sin exagerar la intensidad; conserva el matiz afectivo del griego y encaja bien con el movimiento narrativo.
- source_word: Take courage
  english_pob_choice: Take courage
  chosen_spanish: Ten ánimo
  alternatives_spanish:
  - Cobrad ánimo
  - Ánimo
  lexicon: θάρσει
  rationale: «Ten ánimo» es una exhortación natural, directa y fiel al valor imperativo de consuelo y valentía del original.
theological_decisions:
- issue: Directional symbolism of the east
  english_pob_reading: toward the east
  chosen_spanish_reading: hacia el oriente
  alternative_spanish_readings:
  - hacia el este
  - al oriente
  rationale: «Oriente» preserva el registro literario y puede mantener el valor simbólico tradicional sin forzar una explicación doctrinal que el pasaje no desarrolla explícitamente.
  doctrine_reference: None; literary-symbolic spatial reference only.
translation_notes:
  revision_awareness: The English POB text already presents a high-agreement, minor-issues reading with no footnotes or applied revisions. The Spanish draft follows that stable narrative segmentation and preserves the scene movement, the spatial clause about the chair, and the final exhortation without introducing new interpretive expansions.
  spanish_consistency_notes:
  - Se mantiene «oriente» como equivalente de directionality elevated but readable.
  - No se introduce terminología eclesial ajena al relato; «silla» conserva la sencillez del referente narrativo.
  - El tono general sigue siendo sobrio y narrativo, acorde con la prosa visionaria del texto.
