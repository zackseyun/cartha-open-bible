base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/004/002.yaml
  text: Then she called me over, touched my chest, and said to me, "Did my reading please you?" And I said to her, "Lady, these last things please me, but the earlier things are hard and harsh." But she said to me, "These last things are for the righteous, but the earlier are for the nations and for the apostates."
translation:
  language: es
  text: 'Entonces me llamó, me tocó el pecho y me dijo: «¿Te agradó mi lectura?». Y yo le dije: «Señora, estas últimas cosas me agradan, pero las anteriores son duras y ásperas». Pero ella me dijo: «Estas últimas cosas son para los justos, pero las anteriores son para las naciones y para los apóstatas».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: called me over
  english_pob_choice: called me over
  chosen_spanish: me llamó
  alternatives_spanish:
  - me hizo acercarme
  - me llamó hacia ella
  lexicon: llamar
  rationale: El griego expresa que ella lo hizo venir hacia sí; en español, «me llamó» comunica ese movimiento de forma natural sin añadir detalles no explicitados por el texto.
- source_word: touched my chest
  english_pob_choice: touched my chest
  chosen_spanish: me tocó el pecho
  alternatives_spanish:
  - me tocó el corazón
  - me tocó el pecho
  lexicon: tocar
  rationale: Se conserva «pecho» para evitar espiritualizar o reinterpretar el gesto corporal; «corazón» sería una especificación no sustentada por la fuente.
- source_word: Lady
  english_pob_choice: Lady
  chosen_spanish: Señora
  alternatives_spanish:
  - Señorita
  - Dama
  lexicon: κυρία / lady
  rationale: «Señora» es el vocativo español más natural y respetuoso, y mantiene la relación reverencial sin forzar un registro eclesiástico.
- source_word: these last things
  english_pob_choice: these last things
  chosen_spanish: estas últimas cosas
  alternatives_spanish:
  - estas cosas últimas
  - estas cosas finales
  lexicon: οὗτοι / ἔσχατα
  rationale: La construcción conserva la oposición temporal/ordenativa del original y el contraste con «las anteriores».
- source_word: hard and harsh
  english_pob_choice: hard and harsh
  chosen_spanish: duras y ásperas
  alternatives_spanish:
  - difíciles y severas
  - duras y severas
  lexicon: σκληρά
  rationale: «Duras y ásperas» reproduce el doble matiz de dificultad y aspereza/crudeza sin suavizar la fuerza del adjetivo griego.
- source_word: for the righteous
  english_pob_choice: for the righteous
  chosen_spanish: para los justos
  alternatives_spanish:
  - para los rectos
  - para los justificados
  lexicon: δίκαιοι
  rationale: «Justos» es la forma más directa y estándar para el grupo moral/covenantal indicado; «rectos» sería posible pero menos transparente en español.
- source_word: for the nations
  english_pob_choice: for the nations
  chosen_spanish: para las naciones
  alternatives_spanish:
  - para los gentiles
  - para los pueblos
  lexicon: ἔθνη
  rationale: Se preserva «naciones» como equivalente amplio de ἔθνη, evitando sustituirlo por «gentiles» sin necesidad, aunque ese sea el sentido en contexto.
- source_word: apostates
  english_pob_choice: apostates
  chosen_spanish: apóstatas
  alternatives_spanish:
  - rebeldes
  - renegados
  lexicon: ἀποστάται
  rationale: «Apóstatas» mantiene la carga religiosa específica de abandono de la fe, más precisa que términos generales como «rebeldes».
theological_decisions:
- issue: Destinatarios contrapuestos de la revelación
  english_pob_reading: These last things are for the righteous, but the earlier are for the nations and for the apostates.
  chosen_spanish_reading: Estas últimas cosas son para los justos, pero las anteriores son para las naciones y para los apóstatas.
  alternative_spanish_readings:
  - Estas últimas cosas pertenecen a los justos, pero las anteriores a las naciones y a los apóstatas.
  - Estas últimas cosas están destinadas a los justos, pero las anteriores a las naciones y a los apóstatas.
  rationale: La formulación conserva la distribución excluyente del texto sin añadir explicaciones doctrinales. «Son para» mantiene la simplicidad del original y la oposición entre dos destinatarios.
  doctrine_reference: distinción de destinatarios en literatura apocalíptica/parabólica; no requiere armonización doctrinal externa
translation_notes:
  revision_awareness: La traducción sigue el testimonio griego normalizado y coincide ampliamente con la versión inglesa POB; no se detectan notas textuales o variantes relevantes en el paquete proporcionado, y la principal decisión de ajuste consiste en mantener el contraste semántico de σκληρά como «duras y ásperas».
  spanish_consistency_notes:
  - Se conserva el trato reverente en segunda persona singular indirecta («me dijo»), como en el inglés auditado.
  - No se introduce terminología eclesiástica tradicional donde el texto simple basta; «Señora» traduce el vocativo sin sobrecarga interpretativa.
  - «Naciones» y «apóstatas» se mantienen como términos con valor técnico-religioso, coherentes con el griego y el inglés POB.
