  yaml_path: translation/extra_canonical/shepherd_of_hermas/004/001.yaml
  text: So when she had finished reading and had risen from the chair, four young men came, lifted the chair, and went away toward the east.
translation:
  language: es
  text: Así que, cuando ella terminó de leer y se levantó de la silla, cuatro jóvenes vinieron, levantaron la silla y se fueron hacia el oriente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: finished reading
  english_pob_choice: had finished reading
  chosen_spanish: terminó de leer
  alternatives_spanish:
  - acabó de leer
  - hubo terminado de leer
  lexicon: τελέω + lectura contextual
  rationale: El griego expresa la acción concluida; en español, «terminó de leer» reproduce con naturalidad la finalización previa al resto de acciones sin añadir solemnidad innecesaria.
- source_word: rose from the chair
  english_pob_choice: had risen from the chair
  chosen_spanish: se levantó de la silla
  alternatives_spanish:
  - se puso de pie de la silla
  - se alzó de la silla
  lexicon: ἀνίστημι / ἐγείρω contextual
  rationale: «Se levantó de la silla» es la forma más natural y clara en español para la acción de ponerse en pie desde donde estaba sentada.
- source_word: four young men
  english_pob_choice: four young men
  chosen_spanish: cuatro jóvenes
  alternatives_spanish:
  - cuatro muchachos
  - cuatro hombres jóvenes
  lexicon: νεανίσκοι
  rationale: «Jóvenes» conserva la referencia a edad y masculinidad implícita en el contexto narrativo sin endurecerla con un giro más pesado.
- source_word: lifted the chair
  english_pob_choice: lifted the chair
  chosen_spanish: levantaron la silla
  alternatives_spanish:
  - alzaron la silla
  - tomaron la silla
  lexicon: αἴρω + θρόνος/κάθισμα contextual
  rationale: El verbo español debe reflejar el movimiento de cargar o alzar el asiento; «levantaron» comunica el acto de forma directa y idiomática.
- source_word: toward the east
  english_pob_choice: toward the east
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - hacia el este
  - en dirección al oriente
  lexicon: ἀνατολή
  rationale: «Oriente» mantiene un registro digno y tradicional, pero sigue siendo claro en español; no altera el sentido direccional del original.
theological_decisions:
- issue: No explicit theological terminology in the sentence
  english_pob_reading: Purely narrative movement without doctrinal vocabulary
  chosen_spanish_reading: Mantener el enunciado como narración simple y objetiva
  alternative_spanish_readings:
  - Introducir matices devocionales o interpretativos
  - Aumentar la solemnidad con lenguaje eclesiástico
  rationale: El pasaje describe una secuencia de acciones; no hay base en el texto para insertar interpretación teológica o vocabulario confesional adicional.
  doctrine_reference: Principio de sobriedad narrativa y no sobrerinterpretación
translation_notes:
  revision_awareness: No applied revisions or variant readings were supplied in the audit context; the English POB translation is already in high agreement with the source, so the Spanish draft follows the straightforward narrative sequence closely.
  spanish_consistency_notes:
  - 'Se preserva el orden de acciones del original: terminó de leer, se levantó, vinieron, levantaron la silla, se fueron.'
  - Se usa «oriente» como equivalente natural y elevado de la dirección este sin cambiar el sentido.
  - No se añaden notas al pie porque no hay variantes textuales ni ambigüedades relevantes documentadas en el paquete auditado.
