  text: He says, "I will explain everything to you, and whatever I speak with you I will show you. The one who has received the commands of prudence will fill his own soul and will pray to the Lord on your behalf.
translation:
  language: es
  text: 'Él dice: «Te explicaré todo, y todo lo que hable contigo te lo mostraré. El que ha recibido los mandamientos de la prudencia llenará su propia alma y orará al Señor por ti».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: He says
  english_pob_choice: He says
  chosen_spanish: Él dice
  alternatives_spanish:
  - Dice
  lexicon: λέγει
  rationale: Se mantiene el presente narrativo del discurso directo; «Él dice» conserva claridad y el valor introductorio sin añadir sujeto innecesario al estilo español.
- source_word: I will explain everything to you
  english_pob_choice: I will explain everything to you
  chosen_spanish: Te explicaré todo
  alternatives_spanish:
  - Te explicaré todas las cosas
  - Te daré explicación de todo
  lexicon: δηλώσω / ἐξηγήσομαι (según el sentido del pasaje)
  rationale: «Explicar» comunica adecuadamente la idea de hacer claro o exponer; «todo» reproduce la amplitud de «everything» sin sobrecargar la frase.
- source_word: whatever I speak with you I will show you
  english_pob_choice: whatever I speak with you I will show you
  chosen_spanish: y todo lo que te diga te lo mostraré
  alternatives_spanish:
  - y todo lo que hable contigo te lo mostraré
  - y cuanto te diga te lo haré ver
  lexicon: λαλήσω / δείξω
  rationale: «Decir» y «mostrar» en español transmiten con naturalidad la combinación de hablar y hacer ver; se conserva el paralelismo del original sin calco duro.
- source_word: the commands of prudence
  english_pob_choice: the commands of prudence
  chosen_spanish: los mandamientos de la prudencia
  alternatives_spanish:
  - las órdenes de la prudencia
  - los preceptos de la prudencia
  lexicon: ἐντολαί / φρόνησις
  rationale: «Mandamientos» mantiene el peso normativo de ἐντολαί, y «prudencia» refleja φρόνησις como sabiduría práctica/discreción más que simple inteligencia.
- source_word: will fill his own soul
  english_pob_choice: will fill his own soul
  chosen_spanish: llenará su propia alma
  alternatives_spanish:
  - colmará su alma
  - satisfará su alma
  lexicon: ψυχή
  rationale: Se conserva «alma» por fidelidad semántica y por el contraste interior implícito; «su propia» refuerza el valor reflexivo de la construcción.
- source_word: will pray to the Lord on your behalf
  english_pob_choice: will pray to the Lord on your behalf
  chosen_spanish: orará al Señor en tu favor
  alternatives_spanish:
  - rogará al Señor por ti
  - rezará al Señor por ti
  lexicon: προσεύξεται τῷ Κυρίῳ ὑπὲρ σοῦ
  rationale: «Orará» es más amplio y respetuoso que «rezará» en registro bíblico; «en tu favor» conserva la intercesión de ὑπὲρ σοῦ sin perder naturalidad en español.
theological_decisions:
- issue: Rendering of "Lord" in a non-biblical early Christian text
  english_pob_reading: The English text uses "the Lord" without masking or commentary.
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Soberano
  rationale: En este pasaje de Hermas, el título λειτουργa como designación reverente de Dios en el flujo cristiano primitivo; «el Señor» es la forma española natural y fiel al contexto, sin forzar una identificación explícita con el Tetragrámaton.
  doctrine_reference: Early Christian devotional title for God / κύριος in ecclesial usage
- issue: Meaning of "commands of prudence"
  english_pob_reading: The phrase is preserved literally with no interpretive paraphrase.
  chosen_spanish_reading: los mandamientos de la prudencia
  alternative_spanish_readings:
  - las enseñanzas de la prudencia
  - los preceptos de la sensatez
  rationale: Se conserva la tensión entre mandato y virtud práctica. «Prudencia» mantiene el campo semántico de sabiduría disciplinada sin reducirlo a mera astucia o a un consejo general.
  doctrine_reference: Ethical formation / virtue language in early Christian catechesis
translation_notes:
  revision_awareness: No English footnotes or later revisions were provided for this unit. The Spanish draft therefore follows the extant English audit text and the Greek source-level sense without introducing unattested variants.
  spanish_consistency_notes:
  - Se mantiene el trato de segunda persona singular («te», «tu») como en el inglés y presumiblemente en el griego.
  - Se usa «Señor» con mayúscula por consistencia reverente en un título divino.
  - No se introduce puntuación interpretativa adicional más allá de la necesaria para el discurso directo.
  - El final del fragmento termina abierto, como en el texto fuente proporcionado.
