  spanish_quality_summary: 'El texto es claro, natural y de registro digno. La sintaxis funciona bien en español eclesial moderno. Conviene ajustar dos giros para mayor precisión semántica y fluidez: «todo lo que hable contigo» y «orará al Señor por ti».'
  glossary_alignment: 'La terminología general está bien alineada: «mandamientos» para ἐντολαί, «prudencia» para φρόνησις, «alma» para ψυχή. El uso de «Señor» para κύριος en Hermas está justificado por contexto devocional no veterotestamentario directo, por lo que no requiere «Yahvé».'
