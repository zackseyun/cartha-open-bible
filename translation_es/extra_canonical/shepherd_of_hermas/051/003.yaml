base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/051/003.yaml
  text: '"If, then, you complete the fast in this way as I commanded you, your sacrifice will be acceptable before God, and this fast will be recorded; and the service performed in this way is good and cheerful and acceptable to the Lord.'
translation:
  language: es
  text: «Si, pues, completas el ayuno de esta manera, como te lo mandé, tu sacrificio será aceptable delante de Dios, y este ayuno quedará registrado; y el servicio realizado de esta manera es bueno, alegre y aceptable al Señor.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: νηστεία / fast
  english_pob_choice: fast
  chosen_spanish: ayuno
  alternatives_spanish:
  - abstinencia
  lexicon: ayuno
  rationale: En español eclesial contemporáneo, «ayuno» comunica de forma natural la práctica ascética indicada por el contexto; «abstinencia» sería más técnico y menos directo aquí.
- source_word: θυσία / sacrifice
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - ofrenda
  lexicon: sacrificio
  rationale: El griego pide una noción sacrificial amplia; «sacrificio» conserva la fuerza cultual que el inglés POB también retiene.
- source_word: πρόσδεκτος / acceptable
  english_pob_choice: acceptable
  chosen_spanish: aceptable
  alternatives_spanish:
  - agradable
  - bien recibido
  lexicon: aceptable
  rationale: «Aceptable» mantiene la relación de recepción favorable sin suavizarla hacia una simple preferencia subjetiva.
- source_word: ἐνώπιον τοῦ θεοῦ / before God
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  lexicon: delante de + Dios
  rationale: «Delante de Dios» es idiomático y fiel; conserva la referencia relacional y pública del acto ante Dios.
- source_word: ἀναγράφηται / will be recorded
  english_pob_choice: will be recorded
  chosen_spanish: quedará registrado
  alternatives_spanish:
  - será anotado
  - será inscrito
  lexicon: registrar/anotar
  rationale: «Quedará registrado» expresa bien la pasiva futura y la permanencia del acto en un registro; «inscrito» sonaría más solemne pero menos transparente.
- source_word: διακονία / service
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - ministerio
  - ministración
  lexicon: servicio
  rationale: El sustantivo griego aquí denota la acción realizada; «servicio» es la opción más natural y suficientemente amplia sin introducir connotaciones institucionales.
- source_word: καλόν καὶ εὐφρόσυνον καὶ πρόσδεκτον / good and cheerful and acceptable
  english_pob_choice: good and cheerful and acceptable
  chosen_spanish: bueno, alegre y aceptable
  alternatives_spanish:
  - bueno, gozoso y aceptable
  - bueno, placentero y aceptable
  lexicon: adjectival triad
  rationale: «Alegre» traduce adecuadamente la idea de εὐφρόσυνος en español común; conserva el matiz de disposición gozosa del acto, sin forzar un término técnico.
- source_word: τῷ κυρίῳ / to the Lord
  english_pob_choice: to the Lord
  chosen_spanish: para el Señor
  alternatives_spanish:
  - al Señor
  lexicon: Señor
  rationale: Se conserva la fórmula reverente del original y la opción del inglés POB; en español, «para el Señor» expresa bien la aprobación y orientación final del servicio.
theological_decisions:
- issue: Relación entre ayuno y sacrificio aceptable
  english_pob_reading: your sacrifice will be acceptable before God, and this fast will be recorded
  chosen_spanish_reading: tu sacrificio será aceptable delante de Dios, y este ayuno quedará registrado
  alternative_spanish_readings:
  - tu ofrenda será aceptable delante de Dios, y este ayuno será inscrito
  rationale: 'La formulación mantiene la coordinación del texto: el ayuno obediente se describe como sacrificio aceptable y, además, como acto que queda registrado. No se fusionan las dos imágenes para no perder la doble afirmación del pasaje.'
  doctrine_reference: Ascetical obedience as offering; source-text distinction between sacrifice and fast
- issue: Valor de «Señor» en un texto patrístico griego
  english_pob_reading: acceptable to the Lord
  chosen_spanish_reading: aceptable para el Señor
  alternative_spanish_readings:
  - aceptable ante el Señor
  rationale: Se preserva la designación reverente «Señor» sin sustituirla por otro término; no hay base en este pasaje para forzar explícitamente Yahvé, y el texto patrístico sigue el κύριος del contexto cristiano.
  doctrine_reference: Divine title usage in early Christian literature
translation_notes:
  revision_awareness: No applied revisions were supplied in the source packet. The draft follows the normalized OCR Greek sense as reflected in the English POB audit translation, with no added textual emendations.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Señor» para κύριος, conforme al contexto patrístico del pasaje.
  - Se conserva la estructura de dos cláusulas coordinadas para reflejar el paralelismo entre sacrificio aceptable y ayuno registrado.
  - El registro estilístico es reverente y claro, evitando calcos innecesarios pero sin expandir el sentido del original.
