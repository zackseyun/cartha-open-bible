  yaml_path: translation/extra_canonical/shepherd_of_hermas/051/001.yaml
  text: I say, "Sir, I do not know these parables, nor am I able to understand them unless you explain them to me."
translation:
  language: es
  text: 'Le digo: «Señor, no conozco estas parábolas, ni soy capaz de entenderlas, a menos que me las expliques».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λέγω / λέγειν (as narrated speech introduction)
  english_pob_choice: I say
  chosen_spanish: Le digo
  alternatives_spanish:
  - Digo
  - Le respondo
  lexicon: N/A
  rationale: Conserva el presente narrativo de la respuesta directa en estilo vivo y natural en español, sin añadir información que no está en el pasaje.
- source_word: κύριε
  english_pob_choice: Sir
  chosen_spanish: Señor
  alternatives_spanish:
  - señor
  - mi señor
  lexicon: N/A
  rationale: En el contexto de diálogo respetuoso, 'Señor' reproduce la forma de trato reverente que el inglés POB traduce con 'Sir', y es idiomático en español bíblico sin imponer necesariamente una identificación teológica adicional.
- source_word: παραβολάς
  english_pob_choice: these parables
  chosen_spanish: estas parábolas
  alternatives_spanish:
  - estos dichos figurados
  - estas comparaciones
  lexicon: N/A
  rationale: '''Parábolas'' es el equivalente más directo y reconocido para παραβολάς; mantiene el género figurado del texto con claridad para el lector.'
- source_word: συνιέναι / συνιῶ
  english_pob_choice: understand
  chosen_spanish: entenderlas
  alternatives_spanish:
  - comprenderlas
  - captarlas
  lexicon: N/A
  rationale: '''Entenderlas'' transmite de forma natural la dificultad intelectual del hablante sin sobrecargar el registro.'
- source_word: ἐὰν μὴ ἐξηγῇς μοι
  english_pob_choice: unless you explain them to me
  chosen_spanish: a menos que me las expliques
  alternatives_spanish:
  - si no me las explicas
  - a menos que me las interpretes
  lexicon: N/A
  rationale: '''Explicar'' conserva bien la idea de ἐξηγῇς para un lector español, y ''me las expliques'' respeta el objeto directo plural del original.'
theological_decisions:
- issue: Tratamiento del vocativo κύριε en un contexto de conversación con un intérprete/maestro
  english_pob_reading: Sir
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor mío
  - señor
  rationale: El contexto inmediato muestra un trato respetuoso dentro del diálogo; 'Señor' mantiene la reverencia sin forzar una lectura devocional mayor que la del pasaje. No se oculta el vocativo con una sustitución litúrgica, y se preserva la ambigüedad contextual.
  doctrine_reference: Pragmatics of address; no doctrinal claim beyond respectful address
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas ni pasajes paralelos en el paquete de auditoría; la redacción sigue de cerca el sentido del griego según el texto fuente y la traducción inglesa auditada, sin introducir notas textuales adicionales.
  spanish_consistency_notes:
  - Se usa puntuación española para diálogo directo con comillas angulares.
  - Se mantiene el presente narrativo 'Le digo' para concordar con el estilo del POB inglés 'I say' y con la vivacidad del relato.
  - No se introduce 'Cristo', 'Yahvé' ni otras terminologías no presentes en este segmento.
