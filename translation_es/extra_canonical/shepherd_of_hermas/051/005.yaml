  yaml_path: translation/extra_canonical/shepherd_of_hermas/051/005.yaml
  text: I say to him, "Sir, since I have you with me, I must ask you and question you; for you show me everything and speak with me. But if apart from you I were seeing or hearing these things, I would ask the Lord that it might be made clear to me."
translation:
  language: es
  text: 'Le digo: «Señor, puesto que te tengo conmigo, debo preguntarte y hacerte preguntas; porque me muestras todo y hablas conmigo. Pero si, aparte de ti, yo viera u oyera estas cosas, pediría al Señor que me las aclarara».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κύριε / Sir
  english_pob_choice: Sir
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - señor
  lexicon: κύριε
  rationale: En este contexto de trato respetuoso directo, «Señor» comunica la deferencia del hablante sin sonar artificial. «Señor mío» sería más enfático de lo que exige el griego; «señor» en minúscula pierde la elevación del registro.
- source_word: ἔχω σε μετ’ ἐμαυτοῦ
  english_pob_choice: I have you with me
  chosen_spanish: te tengo conmigo
  alternatives_spanish:
  - te tengo a mi lado
  - te tengo conmigo aquí
  lexicon: ἔχω + μετά
  rationale: «Te tengo conmigo» reproduce la cercanía personal del original con español natural y sobrio. «A mi lado» añade una imagen espacial no explicitada.
- source_word: ἐρωτῆσαί σε καὶ πυνθάνεσθαί σε
  english_pob_choice: I must ask you and question you
  chosen_spanish: debo preguntarte y hacerte preguntas
  alternatives_spanish:
  - debo preguntarte e inquirir de ti
  - debo interrogarte
  lexicon: ἐρωτάω / πυνθάνομαι
  rationale: La doble expresión griega sugiere insistencia o amplitud de consulta. «Preguntarte y hacerte preguntas» conserva esa repetición con un español claro; «interrogarte» suena más policial o judicial de lo que requiere el contexto.
- source_word: πάντα μοι δείκνυς καὶ λαλεῖς μετ’ ἐμοῦ
  english_pob_choice: you show me everything and speak with me
  chosen_spanish: me muestras todo y hablas conmigo
  alternatives_spanish:
  - me enseñas todo y hablas conmigo
  - me revelas todo y conversas conmigo
  lexicon: δείκνυμι / λαλέω
  rationale: «Muestras» mantiene el valor visual de δείκνυμι; «hablas conmigo» reproduce el contacto comunicativo sin sobrecargar el tono. «Revelas» sería más interpretativo y «conversas» más libre.
- source_word: εἰ δὲ χωρὶς σοῦ εἶδον ἢ ἤκουον ταῦτα
  english_pob_choice: But if apart from you I were seeing or hearing these things
  chosen_spanish: Pero si, aparte de ti, yo viera u oyera estas cosas
  alternatives_spanish:
  - Pero si, sin ti, yo viera u oyera estas cosas
  - Pero si, fuera de ti, yo viera u oyera estas cosas
  lexicon: χωρίς + genitive
  rationale: «Aparte de ti» conserva la separación expresada por χωρὶς σοῦ sin sonar tan rígido como «sin ti». Mantener el imperfecto/subjuntivo en español («viera u oyera») sigue la irrealidad condicional del griego.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - al Señor
  lexicon: κύριος
  rationale: Aquí el artículo y el contexto hacen natural «al Señor» como destinatario de la petición; no se añade «Dios» porque el griego no lo explicita. El referente puede ser el Señor divino del discurso sin necesidad de expandirlo.
- source_word: γνωσθῆναί μοι
  english_pob_choice: it might be made clear to me
  chosen_spanish: me fueran aclaradas
  alternatives_spanish:
  - me fueran dadas a conocer
  - llegaran a serme claras
  lexicon: γνωστός / γνωρίζω
  rationale: La pasiva impersonal española «me fueran aclaradas» expresa bien la idea de que las cosas se vuelvan comprensibles para el hablante. «Dadas a conocer» es posible, pero menos idiomático aquí.
theological_decisions:
- issue: Referente de «el Señor» en la petición final
  english_pob_reading: I would ask the Lord that it might be made clear to me
  chosen_spanish_reading: pediría al Señor que me fueran aclaradas
  alternative_spanish_readings:
  - pediría al Señor que me las aclarara
  - pediría al Señor que me fueran dadas a conocer
  rationale: 'La ambigüedad del referente se mantiene: el texto no precisa si el hablante se refiere al Señor divino o al señor/interlocutor como fuente de aclaración. La traducción conserva esa apertura sin resolverla artificialmente.'
  doctrine_reference: respeto al alcance semántico de κύριος en contexto narrativo
- issue: Forma de la consulta doble
  english_pob_reading: I must ask you and question you
  chosen_spanish_reading: debo preguntarte y hacerte preguntas
  alternative_spanish_readings:
  - debo preguntarte e interrogarte
  - debo consultarte y preguntarte
  rationale: Se preserva la insistencia retórica del original sin convertirla en un matiz técnico o judicial. Esto evita imponer una lectura más dura de la relación entre los interlocutores.
  doctrine_reference: principio de correspondencia semántica sin sobrerinterpretación
- issue: Condicional irreal en la visión/audición
  english_pob_reading: if apart from you I were seeing or hearing these things
  chosen_spanish_reading: si, aparte de ti, yo viera u oyera estas cosas
  alternative_spanish_readings:
  - si, sin ti, yo viera u oyera estas cosas
  - si, aparte de ti, yo estuviera viendo u oyendo estas cosas
  rationale: La forma subjuntiva imperfecta comunica adecuadamente la hipótesis contrafactual. No se fuerza un aspecto progresivo innecesario en español.
  doctrine_reference: equivalencia de modo verbal y modalidad
- issue: Tratamiento respetuoso a la figura interlocutora
  english_pob_reading: Sir
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - señor
  - mi señor
  rationale: Se adopta el título respetuoso estándar en español, manteniendo la dignidad del tono sin introducir un vínculo de servidumbre que el contexto no requiere.
  doctrine_reference: registro honorífico en discurso directo
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete inglés; la presente propuesta sigue de cerca la redacción auditada de POB en inglés, manteniendo la estructura retórica, la duplicación verbal y la modalidad condicional del original griego.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριε en trato respetuoso y también en la petición final, dejando abierta la referencia contextual.
  - Se conserva la repetición verbal «preguntarte y hacerte preguntas» para reflejar la duplicación del griego.
  - El estilo busca naturalidad litúrgica sobria sin introducir terminología eclesiástica ajena al texto.
