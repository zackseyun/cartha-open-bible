base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/051/004.yaml
  text: '"You shall keep these things thus—you, with your children and your whole household; and having kept them you will be blessed; and as many as, having heard them, keep them will be blessed, and they will receive understanding from the Lord."'
translation:
  language: es
  text: '«Tú guardarás estas cosas así: tú, con tus hijos y toda tu casa; y, habiéndolas guardado, serás bienaventurado; y cuantos, habiéndolas oído, las guardarán, serán bienaventurados, y recibirán entendimiento del Señor».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas
  lexicon: ταῦτα
  rationale: ‘Estas cosas’ conserva el referente plural del griego y del inglés POB, evitando reducirlo a un singular impreciso.
- source_word: τηρήσεις
  english_pob_choice: you shall keep
  chosen_spanish: tú guardarás
  alternatives_spanish:
  - tú observarás
  - tú conservarás
  lexicon: τηρέω
  rationale: ‘Guardar’ es la opción más natural en español para la idea de observar fielmente/atenerse a mandatos; mantiene la fuerza exhortativa del futuro del original y del POB.
- source_word: σὺ μετὰ τῶν τέκνων σου καὶ ὅλου τοῦ οἴκου σου
  english_pob_choice: you, with your children and your whole household
  chosen_spanish: tú, con tus hijos y toda tu casa
  alternatives_spanish:
  - tú, con tus niños y toda tu familia
  - tú, con tus hijos y toda tu familia
  lexicon: τέκνα / οἶκος
  rationale: ‘Casa’ conserva el valor bíblico de οἶκος como casa/hogar/casa doméstica, más cercano al POB que ‘familia’ en este contexto.
- source_word: τηρήσαντες
  english_pob_choice: having kept them
  chosen_spanish: habiéndolas guardado
  alternatives_spanish:
  - después de guardarlas
  - tras haberlas guardado
  lexicon: τηρέω
  rationale: Mantiene el participio perfecto con matiz temporal-anterior, sin perder naturalidad en español.
- source_word: μακάριοι
  english_pob_choice: blessed
  chosen_spanish: bienaventurado / bienaventurados
  alternatives_spanish:
  - bendecido / bendecidos
  - feliz / felices
  lexicon: μακάριος
  rationale: ‘Bienaventurado’ preserva el tono bíblico y el valor de estado favorable ante Dios mejor que ‘bendecido’ o ‘feliz’.
- source_word: ὅσοι ἀκούσαντες αὐτά τηρήσουσιν
  english_pob_choice: as many as, having heard them, keep them
  chosen_spanish: cuantos, habiéndolas oído, las guarden
  alternatives_spanish:
  - todos los que, al oírlas, las guarden
  - tantos como las oigan y las guarden
  lexicon: ὅσοι + participio + futuro
  rationale: ‘Cuantos’ reproduce el cuantificador inclusivo del griego y del POB; ‘habiéndolas oído’ conserva la secuencia participial.
- source_word: συνέσεως
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - inteligencia
  lexicon: σύνεσις
  rationale: ‘Entendimiento’ es la opción más sobria y amplia en español, y evita cargar el término con un matiz técnico no explicitado por el contexto.
- source_word: παρὰ τοῦ Κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de parte del Señor
  - de Yahvé
  lexicon: κύριος
  rationale: Aquí la fuente griega usa κύριος sin una cita explícita del nombre divino; ‘del Señor’ sigue de cerca el griego y el POB. No se introduce ‘Yahvé’ porque el contexto inmediato no documenta una sustitución requerida por cita del tetragrámaton.
theological_decisions:
- issue: Bienaventuranza como resultado de guardar y oír
  english_pob_reading: having kept them you will be blessed; and as many as, having heard them, keep them will be blessed
  chosen_spanish_reading: habiéndolas guardado, serás bienaventurado; y cuantos, habiéndolas oído, las guarden, serán bienaventurados
  alternative_spanish_readings:
  - si las guardas, serás bendecido; y todos los que, al oírlas, las guarden, serán bendecidos
  rationale: Se mantiene la relación causal y la repetición de μακάριος como estado de bienaventuranza ligado a obediencia y recepción auditiva, tal como en el POB.
  doctrine_reference: Sabiduría bíblica y obediencia recompensada; cf. Sal 1; Lc 11:28
- issue: ‘Recibirán entendimiento del Señor’ como don, no solo habilidad humana
  english_pob_reading: they will receive understanding from the Lord
  chosen_spanish_reading: recibirán entendimiento del Señor
  alternative_spanish_readings:
  - recibirán comprensión del Señor
  - obtendrán entendimiento del Señor
  rationale: ‘Recibirán’ conserva la idea de don recibido; ‘entendimiento’ deja abierta la dimensión de comprensión espiritual sin forzar un tecnicismo doctrinal.
  doctrine_reference: Iluminación divina y sabiduría concedida por Dios; cf. Pr 2:6; Ef 1:17
translation_notes:
  revision_awareness: No applied revisions were provided in the source packet. The Spanish draft follows the English POB audit text closely while checking the Greek structure for the participles, the plural neuter reference in ‘estas cosas’, and the blessing formula. No textual variant is signaled in the supplied packet, so no variant footnotes were added.
  spanish_consistency_notes:
  - Se mantiene ‘bienaventurado’ de forma consistente para μακάριος.
  - Se usa ‘guardar’ para τηρέω en sentido de observar fielmente.
  - Se conserva ‘Señor’ para κύριος en ausencia de un indicio explícito para ‘Yahvé’.
  - Se emplea ‘casa’ para οἶκος como término bíblico de hogar/doméstico.
