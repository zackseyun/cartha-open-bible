review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido global del griego y del English POB: mandato de guardar, extensión a hijos y casa, bendición por obediencia, y recepción de entendimiento del Señor. Sin embargo, en la segunda cláusula condicional/exhortativa, el español cambia innecesariamente el futuro del original/POB (''keep them will be blessed'') a subjuntivo presente (''las guarden''), lo que debilita el paralelismo verbal y la progresión de oír→guardar→ser bendecidos.'
  spanish_quality_summary: El texto es claro y digno, con buen tono eclesial. 'Bienaventurado(s)' y 'entendimiento' funcionan bien. La frase 'toda tu casa' es inteligible, aunque algo literal; sigue siendo aceptable por el valor de οἶκος. La mejora principal es ajustar 'las guarden' a 'las guardarán' para reflejar mejor el futuro griego y el POB, y suavizar ligeramente la puntuación.
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Señor' para κύριος está bien justificado en este contexto no tetragramático. 'Bienaventurado(s)' para μακάριος y 'guardar' para τηρέω están alineados con el sentido fuente y con un español bíblico natural.
  issues:
  - severity: medium
    issue: '''las guarden'' no refleja bien el futuro de τηρήσουσιν'
    rationale: El original griego y el English POB presentan futuro indicativo, no un subjuntivo dependiente. En español, 'cuantos... las guardarán' o 'todos los que... las guardarán' mantiene mejor la forma y el paralelismo con 'serán bienaventurados'.
  - severity: low
    issue: Puntuación algo cargada
    rationale: Las comas alrededor de los participios son aceptables, pero una puntuación un poco más limpia mejora la legibilidad sin alterar el sentido.
  revised_spanish_text: '«Tú guardarás estas cosas así: tú, con tus hijos y toda tu casa; y, habiéndolas guardado, serás bienaventurado; y cuantos, habiéndolas oído, las guardarán, serán bienaventurados, y recibirán entendimiento del Señor».

    '
  revision_rationale: Se corrige el verbo de la segunda mitad a futuro ('las guardarán') para preservar con mayor fidelidad el valor verbal del griego τηρήσουσιν y el paralelismo con el English POB. No se requieren notas adicionales.
