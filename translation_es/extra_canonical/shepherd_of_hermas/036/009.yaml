base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/036/009.yaml
  text: 'Look at this double-mindedness: for it is evil and senseless, and it uproots many from the faith, even those who are very faithful and strong. For this double-mindedness is a daughter of the devil, and it acts very wickedly toward the slaves of God.'
translation:
  language: es
  text: Mira esta mente dividida[a], porque es mala e insensata, y arranca de la fe a muchos, incluso a los que son muy fieles y fuertes. Porque esta mente dividida es hija del diablo, y obra con gran maldad contra los esclavos de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «inconstancia interior» o, más literalmente, «doble ánimo».
    reason: lexical_alternative
lexical_decisions:
- source_word: διψυχία / double-mindedness
  english_pob_choice: double-mindedness
  chosen_spanish: doble ánimo
  alternatives_spanish:
  - doblez
  - inconstancia
  - vacilación interior
  lexicon: Semantic rendering of a compound indicating divided inner loyalty or instability of mind/will.
  rationale: En español, 'doble ánimo' conserva el sentido de mente/corazón dividido sin suavizar el término ni convertirlo en una explicación más larga. Mantiene la tensión lexical del original y del inglés POB.
- source_word: πονηρά / evil
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - malvado
  - perverso
  - malo y perverso
  lexicon: Common moral adjective for wickedness, with context of moral defect.
  rationale: '''Malo'' aquí funciona de manera natural en español para un predicado moral directo; ''malvado'' podría intensificar más de lo que exige el sintagma breve del original.'
- source_word: ἀνόητον / senseless
  english_pob_choice: senseless
  chosen_spanish: insensato
  alternatives_spanish:
  - necio
  - falto de juicio
  - sin sentido
  lexicon: Adjective of lacking understanding/judgment.
  rationale: '''Insensato'' reproduce bien la falta de juicio y conserva un tono sobrio y bíblico sin volverlo paráfrasis.'
- source_word: ἐκριζοῦσα / uproots
  english_pob_choice: uproots
  chosen_spanish: arranca
  alternatives_spanish:
  - desarraiga
  - arranca de raíz
  lexicon: Agricultural metaphor for pulling up by the roots.
  rationale: '''Arranca'' comunica la imagen de expulsar o sacar de la raíz de forma clara y natural; ''desarraiga'' también sería posible, pero ''arranca'' sigue de cerca la imagen verbal.'
- source_word: πίστεως / faith
  english_pob_choice: the faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fidelidad
  - la creencia
  lexicon: Contextual religious noun referring to trust/faith in the community of believers.
  rationale: '''La fe'' es la forma más transparente y fiel al uso religioso del texto, sin forzar un matiz distinto.'
- source_word: δοῦλοι / slaves
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  lexicon: Lexical force for bonded servants/slaves.
  rationale: Se mantiene 'esclavos' para conservar la fuerza léxica elegida por la POB en inglés y evitar suavizar la relación de pertenencia/servidumbre.
theological_decisions:
- issue: Origen del doble ánimo y personificación como hija del diablo
  english_pob_reading: double-mindedness is a daughter of the devil
  chosen_spanish_reading: este doble ánimo es hija del diablo
  alternative_spanish_readings:
  - esta doble ánimo es hija del diablo
  - esta duplicidad es hija del diablo
  - este doble ánimo proviene del diablo
  rationale: Se conserva la personificación directa del original y del inglés POB. 'Hija del diablo' mantiene la afirmación fuerte sin convertirla en mera procedencia causal.
  doctrine_reference: Personification and moral agency in wisdom/paranetic literature
- issue: Alcance de 'those who are very faithful and strong'
  english_pob_reading: even those who are very faithful and strong
  chosen_spanish_reading: incluso a los que son muy fieles y fuertes
  alternative_spanish_readings:
  - incluso a los más fieles y fuertes
  - hasta a los muy fieles y fuertes
  rationale: '''Muy fieles y fuertes'' preserva la doble cualidad moral y de firmeza del texto sin añadir comentarios interpretativos.'
  doctrine_reference: Perseverance and moral warning in paraenesis
- issue: '''slaves of God'' as a status term'
  english_pob_reading: the slaves of God
  chosen_spanish_reading: los esclavos de Dios
  alternative_spanish_readings:
  - los siervos de Dios
  rationale: Se mantiene la fuerza social y teológica de δοῦλοι, evitando la sustitución tradicional por 'siervos' sin base textual suficiente.
  doctrine_reference: Bondservant imagery for divine ownership
translation_notes:
  revision_awareness: La validación anterior falló porque había una nota al pie sin marcador en el texto. En esta versión, el marcador [a] aparece directamente sobre 'doble ánimo', y no se añaden notas sin anclaje.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' no aplica aquí porque el pasaje no contiene el nombre divino.
  - Se mantiene 'esclavos' de forma consistente con la política léxica POB para δοῦλοι.
  - La puntuación reproduce la estructura exhortativa del original y del inglés POB sin añadir segmentos interpretativos.
