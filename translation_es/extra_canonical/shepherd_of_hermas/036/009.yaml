review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del inglés POB: advertencia contra la διψυχία, su carácter malo e insensato, su efecto de apartar a muchos de la fe, su personificación como hija del diablo, y su acción malvada contra los δοῦλοι de Dios. Sin embargo, hay un problema importante de español y concordancia en la expresión repetida «doble ánimo».'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero «esta doble ánimo»/«este doble ánimo» suena antinatural en español y crea choque de género con «es hija del diablo». La opción propuesta en nota, «mente dividida», comunica mejor διψυχία en español actual y permite concordancia natural: «esta mente dividida ... es hija del diablo». También mejora la legibilidad sin perder fuerza semántica.'
  glossary_alignment: Se mantiene bien «esclavos» para δοῦλοι, conforme al proyecto. No hay términos de glosario mayores en conflicto. La excepción recomendada es apartarse de «doble ánimo» en favor de una expresión española más idiomática y fiel al concepto de inner dividedness.
  issues:
  - severity: high
    issue: Expresión principal «doble ánimo» poco natural y con concordancia problemática
    rationale: Aunque intenta reflejar literalmente double-mindedness, en español moderno eclesial suena forzado. Además genera conflicto al decir «este doble ánimo es hija del diablo», donde el sustantivo masculino choca con la personificación femenina. «Mente dividida» o «inconstancia interior» resuelven esto y preservan el sentido.
  - severity: medium
    issue: Demostrativo discordante en la segunda mención
    rationale: El texto tiene «este doble ánimo es hija del diablo». Aun si se mantuviera «doble ánimo», la personificación femenina hace la frase estilísticamente deficiente en español. Conviene reformular toda la expresión, no solo el artículo.
  revised_spanish_text: Mira esta mente dividida[a], porque es mala e insensata, y arranca de la fe a muchos, incluso a los que son muy fieles y fuertes. Porque esta mente dividida es hija del diablo, y obra con gran maldad contra los esclavos de Dios.
  revised_footnotes:
  - marker: a
    text: También puede entenderse como «inconstancia interior» o, más literalmente, «doble ánimo».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «doble ánimo» por «mente dividida» para expresar διψυχία de forma más natural en español y permitir concordancia femenina coherente con la personificación «hija del diablo». Se ajusta además «malo» a «mala» por concordancia con «mente». El resto del contenido preserva adecuadamente el sentido fuente y las decisiones léxicas del POB.
