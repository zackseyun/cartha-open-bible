revisions:
- from: Mira esta doble ánimo[a], porque es malo e insensato, y arranca de la fe a muchos, incluso a los que son muy fieles y fuertes. Porque este doble ánimo es hija del diablo, y obra con gran maldad contra los esclavos de Dios.
  to: Mira esta mente dividida[a], porque es mala e insensata, y arranca de la fe a muchos, incluso a los que son muy fieles y fuertes. Porque esta mente dividida es hija del diablo, y obra con gran maldad contra los esclavos de Dios.
  rationale: Se reemplaza «doble ánimo» por «mente dividida» para expresar διψυχία de forma más natural en español y permitir concordancia femenina coherente con la personificación «hija del diablo». Se ajusta además «malo» a «mala» por concordancia con «mente». El resto del contenido preserva adecuadamente el sentido fuente y las decisiones léxicas del POB.
