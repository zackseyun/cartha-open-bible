revisions:
- from: Por tanto, desprecia la doble intención[a] y domínala en todo asunto, después de haberte revestido de la fe fuerte y poderosa. Porque la fe promete todas las cosas y las realiza todas; pero la doble intención, porque no confía, falla en todas las obras que hace.
  to: Por tanto, desprecia el doble ánimo[a] y domínalo en todo asunto, después de haberte revestido de la fe fuerte y poderosa. Porque la fe promete todas las cosas y las realiza todas; pero el doble ánimo, porque no confía, falla en todas las obras que hace.
  rationale: Se reemplazó «doble intención» por «doble ánimo» para reflejar con mayor fidelidad el sentido de disposición interior dividida del original y del POB inglés. Se ajustó la nota para evitar el falso matiz de motivo oculto que «doble intención» suele tener en español. El resto del versículo puede mantenerse, pues conserva bien el paralelismo y la fuerza exhortativa del texto.
