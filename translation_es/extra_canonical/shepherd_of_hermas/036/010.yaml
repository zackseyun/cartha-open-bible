  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el contraste del griego/POB inglés: imperativos contra la disposición interior dividida, revestirse de fe fuerte, y el paralelismo entre la eficacia de la fe y el fracaso de la mente dividida. Sin embargo, «doble intención» no representa fielmente el sentido principal de double-mindedness/δίψυχία, que apunta a ánimo o mente dividida, no a una segunda intención.'
  spanish_quality_summary: El español es claro y fluido, pero «doble intención» suena en español a motivo oculto o segunda intención, lo que desplaza el sentido hacia suspicacia o duplicidad pragmática. «Doble ánimo» o «mente dividida» comunican mejor el estado interior vacilante del pasaje y siguen siendo legibles en registro eclesial.
  glossary_alignment: No hay términos del glosario mayor en juego. La principal cuestión léxica es mantener el valor de ‘double-mindedness’ como interioridad dividida. «Doble ánimo» se alinea mejor con la justificación teológica dada (cf. Sant 1:6-8) que «doble intención».
