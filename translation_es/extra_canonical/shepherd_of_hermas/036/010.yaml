base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/036/010.yaml
  text: Therefore despise double-mindedness and master it in every matter, having put on the strong and mighty faith. For faith promises all things and accomplishes all things, but double-mindedness, because it does not trust, fails in all the works that it does.
translation:
  language: es
  text: Por tanto, desprecia el doble ánimo[a] y domínalo en todo asunto, después de haberte revestido de la fe fuerte y poderosa. Porque la fe promete todas las cosas y las realiza todas; pero el doble ánimo, porque no confía, falla en todas las obras que hace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «mente dividida». Se eligió «doble ánimo» porque comunica una interioridad vacilante o escindida, sin sugerir una «segunda intención» oculta.
    reason: alternative_reading
lexical_decisions:
- source_word: double-mindedness
  english_pob_choice: double-mindedness
  chosen_spanish: doble intención
  alternatives_spanish:
  - doblez de ánimo
  - doble ánimo
  - duplicidad
  lexicon: No lexicon entry number supplied in source packet.
  rationale: La expresión griega comunica una mente dividida, pero en español ‘doble intención’ conserva la idea de una voluntad/mente escindida sin sonar rígidamente calcada. ‘Doble ánimo’ es posible, pero puede sugerir solo fluctuación emocional; ‘duplicidad’ carga un matiz moral más fuerte que el contexto aquí no exige.
- source_word: master it
  english_pob_choice: master it
  chosen_spanish: domínala
  alternatives_spanish:
  - véncela
  - sujétala
  - hazte dueño de ella
  lexicon: No lexicon entry number supplied in source packet.
  rationale: ‘Domínala’ refleja bien la idea de ejercer control sobre algo interno. Mantiene el imperativo fuerte del texto y es idiomático en español bíblico contemporáneo.
- source_word: strong and mighty faith
  english_pob_choice: strong and mighty faith
  chosen_spanish: la fe fuerte y poderosa
  alternatives_spanish:
  - la fe fuerte y valiente
  - la fe poderosa y vigorosa
  - la fe robusta y poderosa
  lexicon: No lexicon entry number supplied in source packet.
  rationale: Se conservan ambos adjetivos con una coordinación natural en español. ‘Poderosa’ expresa bien la fuerza efectiva de la fe; ‘fuerte’ preserva el primer calificativo sin alterar el peso retórico.
- source_word: faith promises all things
  english_pob_choice: faith promises all things
  chosen_spanish: la fe promete todas las cosas
  alternatives_spanish:
  - la fe promete todo
  - la fe garantiza todas las cosas
  lexicon: No lexicon entry number supplied in source packet.
  rationale: ‘Promete’ corresponde al verbo de la fuente y mantiene el paralelismo del pasaje. ‘Garantiza’ sería más interpretativo y desplazaría el registro del texto.
- source_word: accomplishes all things
  english_pob_choice: accomplishes all things
  chosen_spanish: las realiza todas
  alternatives_spanish:
  - lo realiza todo
  - las cumple todas
  - lo logra todo
  lexicon: No lexicon entry number supplied in source packet.
  rationale: ‘Realiza’ conserva la amplitud del verbo griego y permite tomar ‘todas las cosas’ como objeto implícito. ‘Cumple’ podría sonar más contractual; ‘logra’ enfatiza éxito humano más que eficacia de la fe.
- source_word: because it does not trust
  english_pob_choice: because it does not trust
  chosen_spanish: porque no confía
  alternatives_spanish:
  - porque no cree
  - porque no tiene confianza
  - porque no se fía
  lexicon: No lexicon entry number supplied in source packet.
  rationale: ‘No confía’ expresa con claridad la causa del fracaso de la doble intención y evita reducir la idea a mera creencia intelectual. ‘No cree’ sería más doctrinalmente estrecho.
- source_word: fails in all the works that it does
  english_pob_choice: fails in all the works that it does
  chosen_spanish: falla en todas las obras que hace
  alternatives_spanish:
  - fracasa en todas las obras que hace
  - no prospera en todas las obras que hace
  - falla en todo lo que hace
  lexicon: No lexicon entry number supplied in source packet.
  rationale: Se mantiene la estructura de ‘obras que hace’ para conservar el paralelismo del original y del inglés POB. ‘Falla’ reproduce el contraste directo con la eficacia atribuida a la fe.
theological_decisions:
- issue: Naturaleza de la fe como agente eficaz en contraste con la doble intención
  english_pob_reading: faith promises all things and accomplishes all things, but double-mindedness, because it does not trust, fails in all the works that it does.
  chosen_spanish_reading: la fe promete todas las cosas y las realiza todas; pero la doble intención, porque no confía, falla en todas las obras que hace.
  alternative_spanish_readings:
  - la fe promete todo y lo realiza todo; pero la doble intención, al no confiar, fracasa en todas sus obras.
  - la fe promete todas las cosas y las cumple todas; pero la doble intención, porque no cree, falla en todo lo que hace.
  rationale: El texto atribuye a la fe una eficacia amplia y contrasta esa eficacia con la esterilidad de la doble intención. La traducción evita suavizar esa afirmación y conserva el paralelismo retórico sin añadir explicaciones externas.
  doctrine_reference: Sant 1:6-8; relación entre fe perseverante y mente dividida
- issue: Elección de ‘doble intención’ frente a un giro más moralizante como ‘duplicidad’
  english_pob_reading: double-mindedness
  chosen_spanish_reading: doble intención
  alternative_spanish_readings:
  - duplicidad
  - doble ánimo
  - mente dividida
  rationale: ‘Duplicidad’ podría introducir una acusación ética de engaño no explicitada por el término aquí. ‘Doble intención’ conserva la división interior y deja abierta la tensión antropológica del texto.
  doctrine_reference: Sabiduría práctica sobre integridad interior; cf. Sant 1:8
translation_notes:
  revision_awareness: No se registran revisiones previas aplicadas en el paquete fuente. Se trabajó directamente desde el griego normalizado y se contrastó con la formulación inglesa POB para conservar el paralelismo y la fuerza retórica del original.
  spanish_consistency_notes:
  - Se mantuvo ‘Dios/Jesús/Mesías/Yahvé’ fuera del pasaje porque no aparecen en este versículo.
  - Se preservó el paralelismo fe/doble intención para que la cadencia del original siga siendo transparente en español.
  - ‘Obras’ se conservó dos veces para reproducir la repetición del texto fuente y del POB inglés.
