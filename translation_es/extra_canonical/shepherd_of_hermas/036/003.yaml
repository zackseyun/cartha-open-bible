- from: Porque Dios no es como los seres humanos, que recuerdan las ofensas; más bien, él no recuerda las ofensas y tiene compasión de lo que ha hecho.
  to: Porque Dios no es como los seres humanos, que guardan rencor; más bien, él no guarda rencor y se compadece de lo que ha hecho.
  rationale: Se ajusta el verbo para reflejar mejor el sentido de no retener agravios y se mejora ligeramente la naturalidad del español sin apartarse del significado del original ni del POB inglés.
