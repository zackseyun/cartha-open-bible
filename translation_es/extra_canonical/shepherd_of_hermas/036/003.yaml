  yaml_path: translation/extra_canonical/shepherd_of_hermas/036/003.yaml
  text: For God is not like human beings who remember wrongs; rather, he does not remember wrongs, and he has compassion on what he has made.
translation:
  language: es
  text: Porque Dios no es como los seres humanos, que guardan rencor; más bien, él no guarda rencor y se compadece de lo que ha hecho.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: God
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Señor
  lexicon: θεός
  rationale: El original habla de Dios de manera directa; en español bíblico contemporáneo, «Dios» es la forma natural y fiel, sin añadir un artículo innecesario.
- source_word: human beings
  english_pob_choice: human beings
  chosen_spanish: los seres humanos
  alternatives_spanish:
  - los hombres
  - la humanidad
  lexicon: ἄνθρωποι
  rationale: «Seres humanos» evita que «hombres» se lea como masculino genérico restringido y conserva el contraste antropológico del texto.
- source_word: remember wrongs
  english_pob_choice: remember wrongs
  chosen_spanish: recuerdan las ofensas
  alternatives_spanish:
  - recuerdan los males
  - guardan rencor
  - retienen las ofensas
  lexicon: μνησικακεῖν / equivalente semántico
  rationale: La idea no es mera memoria, sino retener agravios. «Ofensas» comunica bien el sentido moral y relacional del verbo en español natural.
- source_word: does not remember wrongs
  english_pob_choice: does not remember wrongs
  chosen_spanish: no recuerda las ofensas
  alternatives_spanish:
  - no se acuerda de las ofensas
  - no guarda rencor
  lexicon: μνησικακεῖν / equivalent semántico
  rationale: Se mantiene la misma raíz verbal para conservar el paralelismo con la primera cláusula y el contraste con la compasión divina.
- source_word: he has compassion on what he has made
  english_pob_choice: he has compassion on what he has made
  chosen_spanish: tiene compasión de lo que ha hecho
  alternatives_spanish:
  - se compadece de lo que ha creado
  - tiene compasión de lo que ha formado
  lexicon: σπλαγχνίζομαι / ποιέω
  rationale: El inglés POB entiende el objeto como la obra creada por Dios. «Lo que ha hecho» reproduce esa amplitud sin introducir explícitamente «creado», aunque esa sea una posible glosa interpretativa.
theological_decisions:
- issue: Contraste entre memoria humana del agravio y la actitud divina
  english_pob_reading: God is unlike humans who remember wrongs; he does not remember wrongs and is compassionate toward his workmanship.
  chosen_spanish_reading: Dios no se comporta como los seres humanos que retienen ofensas; al contrario, perdona el agravio y muestra compasión por su obra.
  alternative_spanish_readings:
  - Dios no es como los seres humanos, que guardan rencor
  - Dios no recuerda las ofensas
  rationale: 'La formulación conserva el contraste moral y relacional del texto: la humana tendencia a conservar el agravio frente a la disposición divina de no retenerlo y compadecerse. No se explicita «perdona» en el texto principal para no ir más allá del griego/inglés, pero la lectura completa apunta en esa dirección.'
  doctrine_reference: Carácter misericordioso de Dios; cf. Sal 103:8-14; Jer 31:34
translation_notes:
  revision_awareness: No hay revisiones previas ni notas textuales en el expediente inglés; se ha trabajado directamente desde el griego normalizado y la traducción auditada en inglés.
  spanish_consistency_notes:
  - Se preserva «Dios» como referencia directa al sujeto divino.
  - Se evita «SEÑOR» porque el pasaje no depende aquí de un sustituto del nombre divino.
  - «Ofensas» se usa de manera consistente para el campo semántico de agravios recordados/retendidos.
  - La clausula final mantiene la referencia amplia a la obra de Dios sin forzar una teología más específica de la creación de la que el contexto inmediato exige.
