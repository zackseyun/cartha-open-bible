base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/036/004.yaml
  text: Therefore cleanse your heart from all the vanities of this age and from the words previously spoken to you, and ask from the Lord; and you will receive everything, and you will lack nothing in any of your petitions, if you ask from the Lord without doubting.
translation:
  language: es
  text: Por tanto, limpia tu corazón de todas las vanidades de esta era y de las cosas que antes se te dijeron, y pide al Señor; y recibirás todo, y no te faltará nada en ninguna de tus peticiones, si pides al Señor sin dudar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καθάρισον τὴν καρδίαν σου
  english_pob_choice: cleanse your heart
  chosen_spanish: limpia tu corazón
  alternatives_spanish:
  - purifica tu corazón
  - limpia tu interior
  lexicon: καθαρίζω / καρδία
  rationale: «Limpia tu corazón» conserva la imagen moral de depuración y suena natural en español, sin suavizar el imperativo. «Purifica» es una alternativa válida, pero «limpia» sigue de cerca el valor exhortativo del griego y del inglés POB.
- source_word: ἀπὸ πάντων τῶν ματαιοτήτων τοῦ αἰῶνος τούτου
  english_pob_choice: from all the vanities of this age
  chosen_spanish: de todas las vanidades de esta era
  alternatives_spanish:
  - de todas las vanidades de este siglo
  - de todas las vanidades de este tiempo
  lexicon: ματαιότης / αἰών
  rationale: «Vanidades» mantiene el sentido de vaciedad, inutilidad o falsedad moral. «Era» refleja mejor el valor de αἰών como período presente o edad, y evita un calco arcaizante de «siglo».
- source_word: καὶ ἀπὸ τῶν προτέρως λελαλημένων σοι
  english_pob_choice: and from the words previously spoken to you
  chosen_spanish: y de las palabras que antes se te dijeron
  alternatives_spanish:
  - y de las palabras dichas antes a ti
  - y de lo que antes se te habló
  lexicon: λέγω / λαλέω
  rationale: 'La forma elegida es clara y fiel al pasivo implícito: palabras que te fueron dichas. Conserva la referencia auditiva/verbal sin introducir interpretación adicional.'
- source_word: αἰτεῖ ἀπὸ τοῦ κυρίου
  english_pob_choice: ask from the Lord
  chosen_spanish: pide al Señor
  alternatives_spanish:
  - pide del Señor
  - pide al Señor Jesús
  lexicon: αἰτέω / κύριος
  rationale: En español, «pedir al Señor» expresa de modo natural la dirección del ruego. Se evita «del Señor», que suena menos idiomático. No se expande a «Jesús» porque el texto griego usa κύριος sin aclaración explícita en este segmento.
- source_word: καὶ λήμψῃ πάντα
  english_pob_choice: and you will receive everything
  chosen_spanish: y recibirás todo
  alternatives_spanish:
  - y obtendrás todo
  - y recibirás todas las cosas
  lexicon: λαμβάνω
  rationale: «Recibirás todo» es directo, idiomático y conserva la amplitud del objeto indefinido πάντων/πάντα sin hacerlo más específico de lo que el griego permite.
- source_word: καὶ οὐδὲν ἐν πάσῃ αἰτήσει ἐλλείψει σοι
  english_pob_choice: and you will lack nothing in any of your petitions
  chosen_spanish: y no te faltará nada en ninguna de tus peticiones
  alternatives_spanish:
  - y nada te faltará en toda petición tuya
  - y no carecerás de nada en cada una de tus peticiones
  lexicon: ἐλλείπω / αἴτησις
  rationale: «No te faltará nada» preserva la idea de ausencia de carencia. «En ninguna de tus peticiones» sigue de cerca la estructura distributiva y evita una paráfrasis excesiva.
- source_word: ἐὰν αἰτῇς αὐτὸν ἀκλινῶς
  english_pob_choice: if you ask from the Lord without doubting
  chosen_spanish: si pides al Señor sin dudar
  alternatives_spanish:
  - si le pides al Señor sin vacilar
  - si pides al Señor sin titubear
  lexicon: ἀκλινῶς / αἰτέω
  rationale: «Sin dudar» comunica bien la idea de firmeza interior y sigue el sentido que la tradición inglesa del POB ya fijó. «Sin vacilar» es una alternativa posible, pero «dudar» es más transparente para lectores modernos.
theological_decisions:
- issue: Whether κύριος should be rendered as a masked title or as a direct reference to God/Lord
  english_pob_reading: ask from the Lord ... if you ask from the Lord without doubting
  chosen_spanish_reading: pide al Señor ... si pides al Señor sin dudar
  alternative_spanish_readings:
  - pide a Yahvé
  - pide al Señor Jesús
  rationale: El griego usa κύριος sin especificación adicional en esta unidad. Dado el contexto exhortativo y la forma establecida en la traducción inglesa auditada, se conserva «el Señor» sin forzar una identificación más precisa que el texto no da explícitamente aquí.
  doctrine_reference: Cristología implícita y uso reverencial de κύριος en literatura cristiana primitiva
- issue: How strongly to render the moral exhortation about earthly vanities
  english_pob_reading: the vanities of this age
  chosen_spanish_reading: las vanidades de esta era
  alternative_spanish_readings:
  - las vanidades de este siglo
  - las vanidades del mundo presente
  rationale: «Esta era» mantiene el contraste escatológico y la textura moral del griego αἰών sin imponer una lectura cosmológica más amplia que el texto no desarrolla en esta línea.
  doctrine_reference: Ética de separación del presente orden temporal
- issue: How to express the promise of sufficiency in petitions
  english_pob_reading: you will lack nothing in any of your petitions
  chosen_spanish_reading: no te faltará nada en ninguna de tus peticiones
  alternative_spanish_readings:
  - no carecerás de nada en cada una de tus peticiones
  - no te faltará nada en toda petición que hagas
  rationale: La formulación elegida preserva el alcance total de la promesa y la relación directa entre petición y provisión, sin introducir una universalidad teológica no explicitada por el texto.
  doctrine_reference: Confianza en la respuesta divina a la oración perseverante
translation_notes:
  revision_awareness: No hay revisiones aplicadas ni pasajes cruzados que alteren la base. La redacción sigue de cerca el griego normalizado de la unidad y refleja la solución óptima del inglés POB sin depender mecánicamente de él.
  spanish_consistency_notes:
  - Se mantiene «Señor» como traducción de κύριος en esta unidad, coherente con el audit trail inglés y sin introducir «Yahvé» donde el griego no lo explicita.
  - «Vanidades» se conserva para ματαιότητες por su valor moral de vaciedad y porque encaja en español eclesial contemporáneo.
  - Se usa «sin dudar» como equivalente natural de ἀκλινῶς, manteniendo la idea de firmeza interior sin arcaísmo.
