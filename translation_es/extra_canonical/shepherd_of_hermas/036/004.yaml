review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el English POB en la estructura general: imperativo de limpieza moral, separación de las vanidades de la presente era, exhortación a pedir al Señor, promesa de recibir y condición de pedir sin vacilar. Sin embargo, «de las palabras que antes se te dijeron» suena algo opaco en español y puede sugerir simplemente palabras previas en general; el segmento se expresa con más claridad y fidelidad idiomática como «de las cosas que antes se te dijeron» o similar. Además, «pide al Señor» es idiomático, pero dado que el English POB marcó repetidamente “ask from the Lord”, conviene mantener la idea de procedencia en la explicación, aunque no necesariamente en el texto.'
  spanish_quality_summary: 'El español es claro y generalmente digno. La frase central necesita una mejora menor de naturalidad: «de las palabras que antes se te dijeron» resulta rígida y poco elegante en contexto exhortativo; «de las cosas que antes se te dijeron» fluye mejor y conserva el sentido amplio de lo hablado previamente. El resto del versículo lee bien y no requiere notas.'
  glossary_alignment: No hay conflicto serio con la terminología del proyecto. El uso de «Señor» para κύριος es aceptable aquí porque no hay evidencia inmediata de cita del nombre divino Yahvé ni razón contextual suficiente para forzar «Yahvé». «Vanidades de esta era» está bien alineado con αἰών. No aparecen términos del glosario que exijan corrección adicional.
  issues:
  - severity: medium
    issue: Expresión poco natural en «de las palabras que antes se te dijeron»
    rationale: Aunque comprensible, la frase suena rígida y estrecha innecesariamente el alcance de τῶν προτέρως λελαλημένων σοι. En español natural, «de las cosas que antes se te dijeron» comunica mejor el contenido previamente hablado sin perder fidelidad.
  revised_spanish_text: Por tanto, limpia tu corazón de todas las vanidades de esta era y de las cosas que antes se te dijeron, y pide al Señor; y recibirás todo, y no te faltará nada en ninguna de tus peticiones, si pides al Señor sin dudar.
  revision_rationale: 'Se hace una reparación menor de estilo y fidelidad idiomática en el segmento sobre lo previamente hablado: «cosas» refleja mejor en español el contenido referido por el participio perfecto pasivo y evita una formulación tiesa. No se requieren otros cambios.'
