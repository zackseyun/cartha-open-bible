review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: limpiar el corazón de la disposición dividida, revestirse de fe, creer que Dios concederá lo pedido, y no caer en esa misma disposición cuando la respuesta tarda. Sin embargo, hay dos puntos mejorables para mayor fidelidad: (1) δίγνωμος se expresa mejor como ''doble ánimo'' que como ''doblez'', porque el griego apunta a una mente/corazón dividido, no principalmente a insinceridad moral; (2) ''no te dejes llevar por la doblez'' suaviza el imperativo ontológico ''no seas / no llegues a ser de doble ánimo''. También conviene hacer explícito ''todas las peticiones que pides'' de forma idiomática en español.'
  spanish_quality_summary: El español es claro y digno, pero 'doblez' suena menos natural y menos preciso en contexto devocional que 'doble ánimo'. La frase 'recibirás todo lo que pidas' es buena, pero 'todas las peticiones que hagas' refleja mejor αἰτήματα sin pesadez. 'Lo recibes más lentamente' funciona, aunque 'la recibes con más demora' o 'la recibes más tarde' sería más natural; aun así, puede mantenerse una formulación cercana al POB. El conjunto requiere solo reparación menor.
  glossary_alignment: 'La terminología principal está bien alineada: πίστις > ''fe'', θεός > ''Dios'', κύριος > ''el Señor'', πειρασμός > ''prueba'', παράπτωμα > ''transgresión''. La desviación principal es δίγνωμος, donde el proyecto debería preferir una expresión que preserve la noción de mente/ánimo dividido; ''doble ánimo'' encaja mejor que ''doblez''.'
  issues:
  - severity: medium
    issue: δίγνωμος traducido como 'doblez'
    rationale: '''Doblez'' en español tiende a sugerir falsedad o hipocresía; aquí el sentido central es vacilación interior o ánimo dividido. ''Doble ánimo'' preserva mejor la fuerza léxica y pastoral del pasaje.'
  - severity: medium
    issue: '''no te dejes llevar por la doblez'' reinterpreta el mandato'
    rationale: El original/POB dice 'do not be double-minded', no tanto 'no te dejes arrastrar'. La versión propuesta introduce una dinámica adicional y debilita la exhortación directa.
  - severity: low
    issue: Inconsistencia con la decisión léxica de αἴτημα
    rationale: En el texto se alterna 'pedir algo' / 'lo recibes' / 'la petición de tu alma', mientras la decisión léxica dice 'peticiones'. Conviene armonizar la redacción para mayor claridad y coherencia.
  revised_spanish_text: Purifica, pues, tu corazón del doble ánimo, y vístete de fe, porque es fuerte; y cree a Dios, que recibirás todas las peticiones que hagas. Y si alguna vez, después de pedir alguna petición al Señor, la recibes más lentamente, no seas de doble ánimo por no haber recibido pronto la petición de tu alma; porque, sin duda, es por alguna prueba o alguna transgresión, que no conoces, que recibes tu petición más lentamente.
  revision_rationale: Se reemplaza 'doblez' por 'doble ánimo' para reflejar mejor δίγνωμος, y se hace más directa la exhortación con 'no seas de doble ánimo'. También se ajusta levemente la redacción de las peticiones para acercarse al sentido del original y del POB inglés sin perder naturalidad. No hace falta adjudicación adicional.
