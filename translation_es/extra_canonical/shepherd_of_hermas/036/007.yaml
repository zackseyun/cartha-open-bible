base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/036/007.yaml
  text: Cleanse, then, your heart from double-mindedness, and put on faith, because it is strong, and believe God, that all your requests which you ask you will receive. And if ever, after asking some request from the Lord, you receive it more slowly, do not be double-minded because you did not quickly receive the request of your soul; for surely it is because of some testing or some transgression, which you do not know, that you receive your request more slowly.
translation:
  language: es
  text: Purifica, pues, tu corazón del doble ánimo, y vístete de fe, porque es fuerte; y cree a Dios, que recibirás todas las peticiones que hagas. Y si alguna vez, después de pedir alguna petición al Señor, la recibes más lentamente, no seas de doble ánimo por no haber recibido pronto la petición de tu alma; porque, sin duda, es por alguna prueba o alguna transgresión, que no conoces, que recibes tu petición más lentamente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δίγνωμος / doble-mindedness
  english_pob_choice: double-mindedness
  chosen_spanish: doblez
  alternatives_spanish:
  - doble ánimo
  - vacilación
  - inconstancia
  lexicon: δίγνωμος
  rationale: El griego señala una mente dividida, pero en español 'doblez' comunica con concisión la falta de sinceridad o división interior sin sonar demasiado moderno ni psicológico. Se evita 'doble ánimo' por ser menos idiomático aquí y 'inconstancia' porque desplaza el matiz hacia la conducta más que al interior.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - creencia
  lexicon: πίστις
  rationale: La correspondencia normal y más natural en español eclesial es 'fe'. 'Confianza' podría aclarar el componente relacional, pero debilita el término establecido por el texto y por la tradición de lectura de este pasaje.
- source_word: ἀγαθόν / strong
  english_pob_choice: it is strong
  chosen_spanish: porque es fuerte
  alternatives_spanish:
  - porque es poderosa
  - porque tiene fuerza
  lexicon: ἀγαθός / κραταιός (contextual force in audit trail)
  rationale: El audit trail en inglés entiende que la fe es 'strong'; en español, 'fuerte' conserva el valor de firmeza y eficacia sin introducir una reinterpretación más abstracta. 'Poderosa' sería más interpretativa.
- source_word: θεός / God
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - a Dios
  lexicon: θεός
  rationale: Aquí el verbo 'cree' rige una construcción que en español funciona naturalmente con 'creer a Dios'. Se mantiene el objeto directo/indirecto conforme al sentido de fiarse de lo que Dios dice, sin alterar la referencia divina.
- source_word: αἴτημα / requests
  english_pob_choice: requests
  chosen_spanish: peticiones
  alternatives_spanish:
  - pedidos
  - súplicas
  lexicon: αἴτημα
  rationale: '''Peticiones'' es el equivalente más claro y dignificado para lo pedido en oración. ''Pedidos'' resulta demasiado general y ''súplicas'' añade una tonalidad devocional no exigida por el griego.'
- source_word: λαμβάνω / receive
  english_pob_choice: receive
  chosen_spanish: recibir
  alternatives_spanish:
  - obtener
  - alcanzar
  lexicon: λαμβάνω
  rationale: '''Recibir'' mantiene la pasividad receptiva del creyente frente a la respuesta de Dios, con buena naturalidad en español.'
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dueño
  lexicon: κύριος
  rationale: El texto griego usa 'Señor', y la construcción de la frase pide conservar esa forma. No se reemplaza por 'Yahvé' porque el audit trail aquí no documenta un caso de cita o alusión explícita al nombre divino hebreo en este segmento.
- source_word: πειρασμός
  english_pob_choice: testing
  chosen_spanish: prueba
  alternatives_spanish:
  - tentación
  - examen
  lexicon: πειρασμός
  rationale: '''Prueba'' preserva la ambigüedad del griego entre test y trial sin forzar el sentido hacia ''tentación'', que en español se inclina más hacia la seducción al pecado.'
- source_word: παράπτωμα
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - falta
  - pecado
  lexicon: παράπτωμα
  rationale: '''Transgresión'' corresponde bien al quebrantamiento de un límite o mandato. ''Falta'' es más genérico y ''pecado'' intensifica doctrinalmente más de lo que exige el término.'
theological_decisions:
- issue: Relación entre demora en la respuesta y causa moral/espiritual oculta
  english_pob_reading: the delay may be because of some testing or some transgression, which you do not know
  chosen_spanish_reading: la demora puede deberse a alguna prueba o a alguna transgresión, que tú no conoces
  alternative_spanish_readings:
  - la demora es por alguna tentación o alguna transgresión que desconoces
  - la demora obedece a alguna prueba o falta oculta
  rationale: 'Se conserva la tensión del texto: la demora no se explica automáticamente por incredulidad, sino que puede tener otra causa espiritual o moral que el lector ignora. El español mantiene la cautela causal con ''puede deberse a'' y no resuelve la ambigüedad más allá de lo permitido por el original.'
  doctrine_reference: discernimiento providencial; sufrimiento y pruebas no siempre son retribución inmediata
- issue: Exhortación a no caer en la doblez ante la tardanza
  english_pob_reading: do not be double-minded because you did not quickly receive the request of your soul
  chosen_spanish_reading: no te dejes llevar por la doblez por no haber recibido pronto la petición de tu alma
  alternative_spanish_readings:
  - no vaciles por no haber recibido pronto lo que pidió tu alma
  - no seas de doble ánimo porque tu petición tarda
  rationale: 'La formulación conserva la lógica pastoral del pasaje: la tardanza no autoriza a la vacilación interior. ''Dejarse llevar por la doblez'' expresa el proceso interno sin desactivar el término central del mandato.'
  doctrine_reference: perseverancia en la fe; integridad interior ante la oración demorada
translation_notes:
  revision_awareness: No se registran revisiones previas ni divergencias textuales en el paquete proporcionado; la redacción sigue de cerca el griego normalizado y el audit trail inglés, preservando las dos repeticiones de 'petición/peticiones' y la estructura exhortativa del pasaje.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος en este segmento, coherente con la construcción oracional del texto.
  - Se usa 'fe' y 'Dios' como términos estables de la serie bíblica en español.
  - Se conserva la ambigüedad de πειρασμός con 'prueba' y no con 'tentación' para no estrechar el sentido.
  - No se introduce 'Cristo' ni terminología eclesiástica ajena al segmento.
  - El español evita un calco excesivo pero conserva el paralelismo retórico de las dos cláusulas exhortativas.
