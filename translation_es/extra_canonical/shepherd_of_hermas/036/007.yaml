revisions:
- from: Purifica, pues, tu corazón de la doblez, y vístete de fe, porque es fuerte; y cree a Dios que recibirás todo lo que pidas. Y si alguna vez, después de pedir algo al Señor, lo recibes más lentamente, no te dejes llevar por la doblez por no haber recibido pronto la petición de tu alma; porque, sin duda, es a causa de alguna prueba o de alguna transgresión, que tú no conoces, que recibes tu petición más lentamente.
  to: Purifica, pues, tu corazón del doble ánimo, y vístete de fe, porque es fuerte; y cree a Dios, que recibirás todas las peticiones que hagas. Y si alguna vez, después de pedir alguna petición al Señor, la recibes más lentamente, no seas de doble ánimo por no haber recibido pronto la petición de tu alma; porque, sin duda, es por alguna prueba o alguna transgresión, que no conoces, que recibes tu petición más lentamente.
  rationale: Se reemplaza 'doblez' por 'doble ánimo' para reflejar mejor δίγνωμος, y se hace más directa la exhortación con 'no seas de doble ánimo'. También se ajusta levemente la redacción de las peticiones para acercarse al sentido del original y del POB inglés sin perder naturalidad. No hace falta adjudicación adicional.
