  yaml_path: translation/extra_canonical/shepherd_of_hermas/036/005.yaml
  text: But if you waver in your heart, you will by no means receive anything of your petitions. For those who doubt with respect to God—these are the double-minded—and they do not at all obtain their petitions.
translation:
  language: es
  text: Pero si vacilas en tu corazón, de ningún modo recibirás nada de tus peticiones. Porque los que dudan con respecto a Dios —estos son los de doble ánimo— no obtienen en absoluto sus peticiones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διστάζω / vacilar
  english_pob_choice: waver / doubt
  chosen_spanish: vacilar
  alternatives_spanish:
  - dudar
  - titubear
  lexicon: N/A
  rationale: El contexto contrasta la inestabilidad interior con la firmeza de fe; «vacilar» comunica bien esa inconstancia sin reducirla solo al acto cognitivo de dudar.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: N/A
  rationale: «Corazón» mantiene el valor antropológico bíblico de centro interior de decisión y confianza, coherente con el griego y con el castellano eclesial.
- source_word: αἰτήματα
  english_pob_choice: petitions
  chosen_spanish: peticiones
  alternatives_spanish:
  - súplicas
  - pedidos
  lexicon: N/A
  rationale: «Peticiones» conserva el sentido de lo pedido en oración y evita suavizar el plural concreto del original.
- source_word: οἱ διακρινόμενοι / doubting ones
  english_pob_choice: those who doubt
  chosen_spanish: los que dudan
  alternatives_spanish:
  - los que vacilan
  - los indecisos
  lexicon: N/A
  rationale: Se mantiene una construcción personal equivalente al participio sustantivado, natural en español y fiel al grupo descrito.
- source_word: δίψυχοι
  english_pob_choice: double-minded
  chosen_spanish: de doble ánimo
  alternatives_spanish:
  - de doble mente
  - de ánimo dividido
  lexicon: N/A
  rationale: «De doble ánimo» es una forma estable y comprensible en español para el término compuesto, y conserva la tensión moral/espiritual del original sin banalizarla.
- source_word: ἐκλαμβάνω / obtain
  english_pob_choice: obtain
  chosen_spanish: obtienen
  alternatives_spanish:
  - reciben
  - consiguen
  lexicon: N/A
  rationale: «Obtienen» reproduce la afirmación negativa del texto sobre no alcanzar lo pedido, con una carga algo más formal que «reciben».
theological_decisions:
- issue: Relación entre duda interior y eficacia de la oración
  english_pob_reading: those who doubt with respect to God... do not at all obtain their petitions
  chosen_spanish_reading: los que dudan con respecto a Dios... no obtienen en absoluto sus peticiones
  alternative_spanish_readings:
  - los que dudan de Dios...
  - los que tienen dudas acerca de Dios...
  rationale: Se conserva la idea de que la duda dirigida a Dios afecta la recepción de lo pedido, sin expandir el argumento más allá del texto.
  doctrine_reference: Santiago 1:6-8 (paralelo conceptual)
translation_notes:
  revision_awareness: No hay revisiones aplicadas ni variantes textuales registradas en el paquete; la redacción española sigue de cerca el sentido del texto griego reflejado en la traducción inglesa auditada.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este pasaje no contiene el Tetragrámaton ni una cita directa que lo requiera.
  - Se usa «de doble ánimo» como término eclesial legible en español, sin sustituirlo por una paráfrasis psicológica moderna.
  - Se mantiene la negación enfática con «de ningún modo» / «en absoluto» para reflejar la doble negación intensiva del original y de la versión inglesa auditada.
