review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del griego según el rastro inglés: contraste entre la fe que viene de arriba/del Señor y la disposición opuesta como espíritu terrenal del diablo, con gran poder frente a falta de poder. Sin embargo, «Entonces ves» suena menos natural que el inglés «You see then» y que el valor discursivo probable; y «la mente dividida» no representa tan bien el sustantivo abstracto δίψυχος como un estado de doblez interior. Además, el artículo definido en español («la mente dividida») puede sonar demasiado concreto.'
  spanish_quality_summary: El español es generalmente claro y digno, pero puede pulirse para mayor naturalidad y fuerza exhortativa. «Ya ves, entonces» o «Ves, entonces» funciona mejor como introducción coloquial-didáctica. «La duplicidad de ánimo» o «el doble ánimo» suena más idiomático y más cercano a la tradición cristiana que «la mente dividida», evitando un giro algo moderno/psicologizante.
  glossary_alignment: 'No hay conflicto serio con la glosa del proyecto. «el Señor» es aceptable aquí, ya que no hay base suficiente para imponer «Yahvé» en este contexto griego de Hermas. «espíritu terrenal», «del diablo» y «poder» están bien alineados. El principal ajuste terminológico es δίψυχος: conviene «doble ánimo» en vez de «mente dividida».'
  issues:
  - severity: medium
    issue: 'Apertura discursiva poco natural: «Entonces ves»'
    rationale: En español suena invertido o calcado. El sentido exhortativo del pasaje se expresa mejor con «Ya ves, entonces,» o «Ves, entonces,».
  - severity: medium
    issue: δίψυχος vertido como «la mente dividida»
    rationale: Aunque intenta preservar la duplicidad interior, resulta menos idiomático y más concreto de lo que pide el sustantivo abstracto inglés/griego. «el doble ánimo» es expresión española estable y fiel al campo semántico.
  - severity: low
    issue: Nota al pie mejorable
    rationale: La nota actual explica bien la alternativa, pero si se adopta «doble ánimo» conviene conservar «doble mente» como alternativa y aclarar que la expresión indica una interioridad partida, no mera indecisión.
  revised_spanish_text: «Ya ves, entonces», dice, «que la fe viene de arriba, del Señor, y tiene gran poder; pero el doble ánimo[a] es un espíritu terrenal, del diablo, y no tiene poder.»
  revised_footnotes:
