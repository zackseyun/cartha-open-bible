revisions:
- from: «Entonces ves», dice, «que la fe viene de arriba, del Señor, y tiene gran poder; pero la mente dividida[a] es un espíritu terrenal, del diablo, y no tiene poder.»
  to: «Ya ves, entonces», dice, «que la fe viene de arriba, del Señor, y tiene gran poder; pero el doble ánimo[a] es un espíritu terrenal, del diablo, y no tiene poder.»
  rationale: Se ajusta la apertura para un español más natural y se reemplaza «la mente dividida» por «el doble ánimo», que refleja mejor δίψυχος en registro eclesial legible y conserva la duplicidad interior del original. Se mantiene intacta la antítesis teológica y el resto de las decisiones léxicas principales.
