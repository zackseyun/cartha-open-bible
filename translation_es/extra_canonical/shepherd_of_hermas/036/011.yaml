  yaml_path: translation/extra_canonical/shepherd_of_hermas/036/011.yaml
  text: “You see then,” he says, “that faith is from above, from the Lord, and it has great power; but double-mindedness is an earthly spirit from the devil, having no power.
translation:
  language: es
  text: «Ya ves, entonces», dice, «que la fe viene de arriba, del Señor, y tiene gran poder; pero el doble ánimo[a] es un espíritu terrenal, del diablo, y no tiene poder.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, algo como «doble alma/ánimo»; también puede expresarse «doble mente». La idea es una interioridad dividida, no solo indecisión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνωθεν / from above
  english_pob_choice: from above
  chosen_spanish: viene de arriba
  alternatives_spanish:
  - proviene de lo alto
  - viene de lo alto
  lexicon: NA
  rationale: Spanish mantiene la imagen espacial y la procedencia celestial sin volverla más abstracta de lo que permite el griego y el inglés POB.
- source_word: κύριος / the Lord
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dueño
  lexicon: NA
  rationale: Aquí el referente es una fuente de procedencia divina, y el auditorio español entiende naturalmente la fórmula reverente 'el Señor'; no hay indicio suficiente para sustituirla por el nombre propio Yahvé en este contexto de cita sapiencial.
- source_word: δίψυχος / double-mindedness
  english_pob_choice: double-mindedness
  chosen_spanish: la mente dividida
  alternatives_spanish:
  - la doble ánimo
  - la doble mente
  - la indecisión
  lexicon: NA
  rationale: '''Mente dividida'' conserva la imagen de duplicidad interior del término griego sin reducirlo a mera indecisión psicológica. ''Doble ánimo'' es idiomático, pero menos transparente para el vínculo con ''mind'' que el POB inglés preserva.'
- source_word: πνεῦμα γήϊνον / earthly spirit
  english_pob_choice: an earthly spirit
  chosen_spanish: un espíritu terrenal
  alternatives_spanish:
  - un espíritu de la tierra
  - un espíritu mundano
  lexicon: NA
  rationale: '''Terrenal'' refleja el adjetivo de pertenencia a la tierra y mantiene el contraste con ''de arriba''. ''Mundano'' introduciría una connotación moral adicional que no está exigida por el griego.'
- source_word: ἀπό τοῦ διαβόλου / from the devil
  english_pob_choice: from the devil
  chosen_spanish: del diablo
  alternatives_spanish:
  - del demonio
  - del maligno
  lexicon: NA
  rationale: '''Del diablo'' corresponde al referente personal del griego y es el equivalente natural en español. ''Del maligno'' sería más interpretativo.'
- source_word: ἄνευ δυνάμεως / having no power
  english_pob_choice: having no power
  chosen_spanish: y no tiene poder
  alternatives_spanish:
  - y carece de poder
  - sin poder
  lexicon: NA
  rationale: Se conserva la negación directa y el paralelismo con la primera cláusula, sin introducir una paráfrasis más fuerte que la fuente.
theological_decisions:
- issue: Origen de la fe versus origen de la duplicidad interior
  english_pob_reading: faith is from above, from the Lord ... double-mindedness is an earthly spirit from the devil
  chosen_spanish_reading: la fe viene de arriba, del Señor ... la mente dividida es un espíritu terrenal, del diablo
  alternative_spanish_readings:
  - la fe procede de lo alto, del Señor ... la doble ánimo es un espíritu terrenal, del diablo
  - la fe viene de arriba, del Señor ... la doble mente es un espíritu terrenal, del diablo
  rationale: 'La traducción mantiene la antítesis teológica: la fe tiene origen celestial y eficaz; la duplicidad interior pertenece al ámbito terrenal y demoníaco. No se suaviza la oposición ni se convierte ''espíritu'' en simple actitud, porque el texto le atribuye agencia e impotencia reales.'
  doctrine_reference: Soteriology / spiritual discernment in early Christian exhortation
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete; la redacción se apoya directamente en el texto griego normalizado y en el equivalente inglés auditado para preservar la antítesis y el valor de los términos de procedencia.
  spanish_consistency_notes:
  - Se mantiene 'del Señor' como fórmula reverente coherente con el contexto, sin sustituirla por un nombre divino explícito no atestiguado en esta cláusula.
  - '''Espíritu'' se usa en sentido común de un ser/impulso espiritual, no como el Espíritu Santo, por el contraste con ''del diablo''.'
  - '''Terrenal'' y ''de arriba'' quedan en contraste semántico directo para sostener la estructura del original.'
