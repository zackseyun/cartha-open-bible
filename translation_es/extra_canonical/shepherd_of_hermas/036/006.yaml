revisions:
- from: Pero los que son perfectos en la fe piden todas las cosas, habiendo puesto su confianza en el Señor, y las reciben, porque piden sin dudar, sin ser en absoluto de doble ánimo. Porque todo hombre de doble ánimo, a menos que se arrepienta, será salvado con dificultad.
  to: Pero los que son perfectos en la fe piden todo, habiendo puesto su confianza en Yahvé, y reciben, porque piden sin dudar, sin ser en absoluto de doble ánimo. Porque todo hombre de doble ánimo, a menos que se arrepienta, será salvado con dificultad.
  rationale: Se ajusta un giro poco natural (“piden todas las cosas” -> “piden todo”) y se alinea κύριος con la política terminológica del proyecto (“Yahvé”). Se mantiene “perfectos en la fe”, “de doble ánimo”, “arrepienta” y “será salvado con dificultad” por fidelidad al sentido y al registro del texto.
