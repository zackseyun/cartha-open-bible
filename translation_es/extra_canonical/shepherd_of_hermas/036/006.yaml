review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego y del inglés POB: contrasta a los que tienen fe íntegra, que piden confiando y reciben sin dudar, con el hombre de doble ánimo que, si no se arrepiente, solo será salvo con dificultad. Sin embargo, hay dos puntos de mejora para mayor fidelidad idiomática y terminológica: (1) πάντα αἰτοῦσιν suena más natural en español como “piden todo” que “piden todas las cosas”; (2) dado el estándar del proyecto, κύριος debe revisarse a “Yahvé” si aquí funciona como referencia al Señor divino y no hay razón documentada para mantener “el Señor”.'
  spanish_quality_summary: El texto es claro y comprensible, pero conserva algunos giros demasiado calcados del inglés/griego. “Perfectos en la fe” y “de doble ánimo” son defendibles y legibles en registro eclesial. La mejora principal de fluidez está en “piden todo”. También conviene evitar el pronombre “las” si se simplifica el objeto. El resto mantiene un tono digno y natural.
  glossary_alignment: 'Buena alineación general con la terminología POB: μετανοέω -> “arrepentirse”, σωθήσεται -> “será salvado”, δίψυχος -> “de doble ánimo”. Posible desalineación con el valor de κύριος, ya que el proyecto prefiere “Yahvé” para el nombre divino en el texto principal; sin evidencia adicional de que aquí deba mantenerse como simple título, conviene ajustar a “Yahvé”.'
  issues:
  - severity: medium
    issue: “piden todas las cosas” suena poco idiomático en español
    rationale: Aunque es muy literal, en español moderno y natural “piden todo” transmite el mismo alcance semántico sin rigidez innecesaria.
  - severity: medium
    issue: “el Señor” puede desalinearse con la política del proyecto sobre el nombre divino
    rationale: El proyecto indica usar “Yahvé” en el texto principal en lugar de la convención de enmascaramiento “SEÑOR/Señor”. Si κύριος aquí refiere al Dios de Israel de modo devocional general, “Yahvé” es la opción por defecto.
  revised_spanish_text: Pero los que son perfectos en la fe piden todo, habiendo puesto su confianza en Yahvé, y reciben, porque piden sin dudar, sin ser en absoluto de doble ánimo. Porque todo hombre de doble ánimo, a menos que se arrepienta, será salvado con dificultad.
  revision_rationale: Se ajusta un giro poco natural (“piden todas las cosas” -> “piden todo”) y se alinea κύριος con la política terminológica del proyecto (“Yahvé”). Se mantiene “perfectos en la fe”, “de doble ánimo”, “arrepienta” y “será salvado con dificultad” por fidelidad al sentido y al registro del texto.
