base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/036/006.yaml
  text: But those who are complete in faith ask for all things, having put their trust in the Lord, and they receive, because they ask without doubting, not being at all double-minded. For every double-minded man, unless he repents, will be saved with difficulty.
translation:
  language: es
  text: Pero los que son perfectos en la fe piden todo, habiendo puesto su confianza en Yahvé, y reciben, porque piden sin dudar, sin ser en absoluto de doble ánimo. Porque todo hombre de doble ánimo, a menos que se arrepienta, será salvado con dificultad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τελείοι / complete
  english_pob_choice: complete in faith
  chosen_spanish: perfectos en la fe
  alternatives_spanish:
  - completos en la fe
  - maduros en la fe
  lexicon: τελείος
  rationale: El inglés POB usa “complete in faith”, pero en español “completos en la fe” suena poco natural. “Perfectos” conserva la idea de plenitud/culminación del adjetivo griego sin suavizarla; “maduros” sería posible, pero desplaza el matiz de integridad total que el contexto sugiere.
- source_word: πάντα αἰτοῦσιν
  english_pob_choice: ask for all things
  chosen_spanish: piden todas las cosas
  alternatives_spanish:
  - piden todo
  - piden por todas las cosas
  lexicon: αἰτέω
  rationale: Se mantiene la amplitud de “all things” sin restringir el objeto. “Piden todas las cosas” es literal y claro en español; “piden todo” sería más idiomático, pero menos transparente para el paralelismo con el original.
- source_word: πεποιθότες ἐν τῷ κυρίῳ
  english_pob_choice: having put their trust in the Lord
  chosen_spanish: habiendo puesto su confianza en el Señor
  alternatives_spanish:
  - confiando en el Señor
  - habiéndose confiado al Señor
  lexicon: πεποιθώς / πείθω
  rationale: Se conserva la idea de confianza asentada y previa a la petición. “Habiendo puesto su confianza” refleja el participio perfecto con un estado resultante; “confiando” debilitaría ese matiz.
- source_word: λαμβάνουσιν
  english_pob_choice: they receive
  chosen_spanish: las reciben
  alternatives_spanish:
  - reciben
  - las obtienen
  lexicon: λαμβάνω
  rationale: El pronombre retoma “todas las cosas” y evita ambigüedad en español. “Reciben” solo también sería correcto, pero menos explícito; “las obtienen” introduce un tono menos fiel al verbo receptor.
- source_word: ἀναμφιβόλως
  english_pob_choice: without doubting
  chosen_spanish: sin dudar
  alternatives_spanish:
  - sin vacilar
  - sin ninguna duda
  lexicon: ἀναμφίβολος
  rationale: “Sin dudar” transmite el sentido directo y resulta natural. “Sin vacilar” sería posible, pero más estilizado; “sin ninguna duda” vuelve a introducir una formulación explicativa.
- source_word: δίψυχος
  english_pob_choice: double-minded
  chosen_spanish: de doble ánimo
  alternatives_spanish:
  - de mente dividida
  - vacilante
  - dudoso
  lexicon: δίψυχος
  rationale: “De doble ánimo” es el equivalente tradicional y conserva la tensión antropológica del término. “De mente dividida” explicita el sentido, pero cambia el registro y pierde la fórmula heredada en el ámbito bíblico.
- source_word: ἐὰν μὴ μετανοήσῃ
  english_pob_choice: unless he repents
  chosen_spanish: a menos que se arrepienta
  alternatives_spanish:
  - si no se arrepiente
  - salvo que se arrepienta
  lexicon: μετανοέω
  rationale: El contexto exige el sentido moral y volitivo de “arrepentirse”, no un mero cambio mental. “A menos que” conserva la estructura condicional del griego y del inglés POB.
- source_word: σωθήσεται
  english_pob_choice: will be saved
  chosen_spanish: será salvado
  alternatives_spanish:
  - será salvo
  - se salvará
  lexicon: σῴζω
  rationale: Se conserva el pasivo con “será salvado”, manteniendo la voz y la seriedad del juicio. “Se salvará” sería más idiomático, pero menos fiel a la pasiva del original.
- source_word: μόγις
  english_pob_choice: with difficulty
  chosen_spanish: con dificultad
  alternatives_spanish:
  - apenas
  - difícilmente
  lexicon: μόγις
  rationale: “Con dificultad” reproduce el adverbio sin exceder el alcance semántico. “Difícilmente” podría sonar más natural, pero en español puede leerse como una certeza adverbial distinta; “apenas” introduce un matiz no garantizado por el contexto.
theological_decisions:
- issue: Estado espiritual requerido para pedir y recibir
  english_pob_reading: those who are complete in faith ask for all things ... and they receive
  chosen_spanish_reading: los que son perfectos en la fe piden todas las cosas ... y las reciben
  alternative_spanish_readings:
  - los maduros en la fe piden todas las cosas ... y las reciben
  - los que son completos en la fe piden todas las cosas ... y las reciben
  rationale: 'No se atenúa la afirmación del texto: la recepción está ligada a la plenitud de la fe, no a una petición genérica. Se conserva el vínculo directo entre confianza, ausencia de duda y eficacia de la petición.'
  doctrine_reference: Sant 1:6-8; Mc 11:24
- issue: Doble ánimo como condición salvífica
  english_pob_reading: For every double-minded man, unless he repents, will be saved with difficulty.
  chosen_spanish_reading: Porque todo hombre de doble ánimo, a menos que se arrepienta, será salvado con dificultad.
  alternative_spanish_readings:
  - Porque todo hombre de doble ánimo, si no se arrepiente, será salvado con dificultad.
  - Porque todo hombre de doble ánimo, salvo que se arrepienta, será salvado con dificultad.
  rationale: 'Se mantiene la advertencia moral sin convertirla en una negación absoluta de salvación. “Con dificultad” conserva la tensión del texto: la salvación no se presenta como automática para el indeciso, sino como algo gravemente obstaculizado por su duplicidad.'
  doctrine_reference: Sant 1:8; Mt 7:13-14
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete. La redacción española se construye directamente desde el griego, usando el inglés POB como audit trail de decisiones léxicas y de sentido, sin depender de una calca del inglés.
  spanish_consistency_notes:
  - Se mantiene Yahvé no aplicable aquí porque el texto usa κύριος y el inglés POB traduce Lord; en este pasaje se ha conservado «el Señor» por tratarse de una referencia relacional estable y no de una cita explícita del nombre divino.
  - Se usa «de doble ánimo» como fórmula bíblica reconocible y coherente con el valor de δίψυχος.
  - Se prefiere el pasivo «será salvado» para mantener la forma verbal del original y su gravedad escatológica.
