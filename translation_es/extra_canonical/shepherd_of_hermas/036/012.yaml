base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/036/012.yaml
  text: Therefore serve faith, which has power, and keep away from double-mindedness, which has no power, and you will live to God—and all who think these things will live to God.”
translation:
  language: es
  text: Por tanto, sirvan a la fe, que tiene poder, y aléjense del doble ánimo, que no tiene poder, y vivirán para Dios, y todos los que piensan estas cosas vivirán para Dios.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: πίστις
  rationale: La POB inglesa usa “faith”; en español, “fe” es el equivalente más natural y fiel en este contexto exhortativo. “Fidelidad” o “confianza” podrían sugerir matices parciales, pero aquí la construcción personifica a la fe como una realidad a la que se sirve, por lo que “fe” conserva mejor el término base sin sobreinterpretar.
- source_word: δισψυχία
  english_pob_choice: double-mindedness
  chosen_spanish: doble mente
  alternatives_spanish:
  - doble ánimo
  - indecisión dividida
  - mente dividida
  lexicon: δισψυχία
  rationale: La POB inglesa preserva la imagen compuesta “double-mindedness” y su fuerza lexical. En español, “doble mente” mantiene esa literalidad y la tensión semántica de una mente/ánimo dividido, sin suavizarla hacia una sola idea psicológica. “Doble ánimo” sería más idiomático, pero borra parte de la imagen del compuesto griego.
- source_word: δυνάμεως / ἔχει δύναμιν
  english_pob_choice: has power
  chosen_spanish: tiene poder
  alternatives_spanish:
  - tiene fuerza
  - tiene capacidad
  lexicon: δύναμις
  rationale: “Tiene poder” reproduce con claridad la afirmación de capacidad efectiva que contrasta con la impotencia de la doble mente. “Fuerza” podría sonar más física y “capacidad” más abstracta; “poder” conserva mejor el contraste lexical del texto.
- source_word: ζήσεσθε τῷ θεῷ
  english_pob_choice: you will live to God
  chosen_spanish: vivirán para Dios
  alternatives_spanish:
  - vivirán para Dios
  - vivirán a Dios
  - vivirán con Dios
  lexicon: ζάω + dative
  rationale: La POB inglesa conserva el dativo con “to God”. En español, “vivir para Dios” comunica la orientación relacional y final sin forzar una calca poco natural como “vivir a Dios”. “Con Dios” debilitaría la dirección del dativo.
- source_word: πάντες οἱ ταῦτα φρονοῦντες
  english_pob_choice: all who think these things
  chosen_spanish: todos los que piensan estas cosas
  alternatives_spanish:
  - todos los que tienen estas ideas
  - todos los que consideran estas cosas
  - todos los que meditan en estas cosas
  lexicon: φρονέω
  rationale: “Piensan” sigue la decisión inglesa y refleja el campo de φρονέω como orientar la mente, tener una disposición o pensar de cierto modo. Otras opciones son posibles, pero “piensan” mantiene la brevedad y la paridad con el audit trail.
theological_decisions:
- issue: La personificación de la fe y la doble mente como realidades con poder o sin poder.
  english_pob_reading: faith, which has power ... double-mindedness, which has no power
  chosen_spanish_reading: la fe aparece como algo a lo que se sirve y que tiene poder; la doble mente aparece como carente de poder
  alternative_spanish_readings:
  - la fe como confianza activa frente a la indecisión
  - la fidelidad frente a la mente dividida
  rationale: El texto contrapone dos principios o disposiciones con eficacia espiritual opuesta. La traducción conserva la personificación y el contraste sin explicar más de lo que el griego y la POB inglesa indican.
  doctrine_reference: Santificación práctica; perseverancia frente a la división interior.
- issue: El dativo final orientado a Dios.
  english_pob_reading: you will live to God
  chosen_spanish_reading: vivirán para Dios
  alternative_spanish_readings:
  - vivirán a Dios
  - vivirán con Dios
  rationale: “Para Dios” expresa de forma inteligible la orientación de vida hacia Dios. No convierte el texto en una afirmación de mera convivencia ni en una paráfrasis devocional ajena al griego.
  doctrine_reference: Vida consagrada a Dios; obediencia orientada a él.
translation_notes:
  revision_awareness: No se registran revisiones previas en el paquete proporcionado; se siguió la POB inglesa como guía auditada, pero se priorizó el ajuste directo al griego para resolver las exigencias idiomáticas del español.
  spanish_consistency_notes:
  - Se mantuvo “Dios” para θεός/τῷ θεῷ sin necesidad de nota, ya que no hay aquí ambigüedad con el nombre divino.
  - Se evitó “SEÑOR” porque el pasaje no usa κύριος ni un sustituto del nombre divino.
  - Se conservó un tono exhortativo y solemne, coherente con un texto de mandato.
  - No se añadieron notas al pie porque el versículo no presenta variantes textuales ni alternativas lexicales que requirieran anclaje en el texto principal.
