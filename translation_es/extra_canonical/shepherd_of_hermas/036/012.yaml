review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del audit trail inglés: contraste exhortativo entre la fe y la disposición dividida, ambas descritas en términos de poder/impotencia, con la promesa de vivir para Dios. Sin embargo, una elección clave no preserva bien ni el sentido ni la legibilidad del original en español: “doble mente” suena forzado y poco natural para δισψυχία. En este contexto, “doble ánimo” comunica mejor la idea tradicional de interioridad dividida sin desviar el significado.'
  spanish_quality_summary: El español es claro en casi todo, pero “sirvan a la fe” resulta algo extraño aunque tolerable dado el original y la personificación. El problema principal es “la doble mente”, que suena como calco rígido y poco idiomático. También conviene mantener una puntuación más natural en español con coma antes de “y todos”.
  glossary_alignment: 'Se mantiene correctamente “fe” para πίστις, “Dios” para θεῷ, y “tiene poder / no tiene poder” para δύναμις. No hay conflicto con la terminología doctrinal del proyecto. La excepción recomendada es δισψυχία: aunque el audit trail inglés usa “double-mindedness”, en español “doble ánimo” es la mejor equivalencia fiel y eclesialmente inteligible; “doble mente” preserva forma pero no buena comprensión.'
  issues:
  - severity: medium
    issue: “doble mente” como traducción de δισψυχία
    rationale: Es un calco poco natural en español y puede sonar psicológico o artificial. “Doble ánimo” comunica mejor la división interior/moral que el término expresa, sin paraprasear excesivamente.
  - severity: low
    issue: Puntuación con punto y coma antes de “y todos”
    rationale: No es incorrecta, pero una coma fluye mejor en español aquí y mantiene la continuidad de la promesa final.
  revised_spanish_text: Por tanto, sirvan a la fe, que tiene poder, y aléjense del doble ánimo, que no tiene poder, y vivirán para Dios, y todos los que piensan estas cosas vivirán para Dios.”
