review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del English POB: exhorta a perseverar en pedir, promete recepción, y traslada la responsabilidad al orante si se fatiga y se vuelve δίψυχος. Sin embargo, «lo que tu alma solicita» debilita la formulación más concreta «the request of your soul» y suena algo perifrástica; «la petición de tu alma» preserva mejor la estructura y la imagen del original.'
  spanish_quality_summary: El español es claro y legible. No obstante, «lo que tu alma solicita» resulta menos natural en registro bíblico-digno que «la petición de tu alma», y «a quien te lo da» puede simplificarse a «al que te da» para sonar más directo, aunque no es incorrecto. El resto fluye bien y mantiene un tono exhortativo apropiado.
  glossary_alignment: No hay términos del glosario principal en disputa. «De doble ánimo» refleja bien δίψυχος y coincide con un registro eclesial comprensible. «Alma» preserva ψυχή correctamente. No se detectan conflictos terminológicos de proyecto.
  issues:
  - severity: medium
    issue: Perífrasis en «lo que tu alma solicita»
    rationale: El griego y el English POB apuntan a una expresión nominal concreta («the request of your soul»), no tanto a una reformulación verbal. «La petición de tu alma» preserva mejor la compactación semántica y el tono del original.
  - severity: low
    issue: «a quien te lo da» suena algo más pesado de lo necesario
    rationale: La idea del dador queda clara; en español «al que te da» o «al que te lo da» puede funcionar. Mantener «lo» ayuda a recuperar el objeto pedido, pero conviene una formulación más natural en cadena con «échate la culpa a ti mismo».
  revised_spanish_text: Así que no dejes de pedir la petición de tu alma, y la recibirás. Pero si te cansas y te vuelves de doble ánimo mientras pides, échate la culpa a ti mismo y no al que te la da.
  revision_rationale: Se ajusta «lo que tu alma solicita» a «la petición de tu alma» para reflejar más fielmente la forma nominal del original y del English POB. También se alisa la última cláusula con «al que te la da», conservando el referente de la petición y mejorando la naturalidad en español.
