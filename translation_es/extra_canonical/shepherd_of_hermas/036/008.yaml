- from: Así que no dejes de pedir lo que tu alma solicita, y lo recibirás. Pero si te cansas y te vuelves de doble ánimo mientras pides, échate la culpa a ti mismo y no a quien te lo da.
  to: Así que no dejes de pedir la petición de tu alma, y la recibirás. Pero si te cansas y te vuelves de doble ánimo mientras pides, échate la culpa a ti mismo y no al que te la da.
