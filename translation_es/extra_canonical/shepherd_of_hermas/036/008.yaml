base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/036/008.yaml
  text: So do not cease asking for the request of your soul, and you will receive it. But if you grow weary and become double-minded while asking, blame yourself and not the one who gives to you.
translation:
  language: es
  text: Así que no dejes de pedir la petición de tu alma, y la recibirás. Pero si te cansas y te vuelves de doble ánimo mientras pides, échate la culpa a ti mismo y no al que te la da.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μὴ παύσῃ αἰτούμενος
  english_pob_choice: do not cease asking
  chosen_spanish: no dejes de pedir
  alternatives_spanish:
  - no ceses de pedir
  - no dejes de solicitar
  lexicon: μὴ παύσῃ + αἰτέω
  rationale: La construcción expresa continuidad insistente en la petición. «No dejes de pedir» conserva el aspecto exhortativo natural en español y el valor de perseverancia sin sonar demasiado literal o arcaico.
- source_word: τῆς ψυχῆς σου
  english_pob_choice: the request of your soul
  chosen_spanish: lo que tu alma solicita
  alternatives_spanish:
  - la petición de tu alma
  - la solicitud de tu alma
  lexicon: ψυχή
  rationale: «Alma» mantiene el término antropológico del original. «Lo que tu alma solicita» evita una expresión rígida y reproduce bien la idea de una petición nacida de la interioridad, sin añadir contenido ajeno.
- source_word: λήμψῃ
  english_pob_choice: you will receive it
  chosen_spanish: lo recibirás
  alternatives_spanish:
  - lo obtendrás
  - lo recibirás de nuevo
  lexicon: λαμβάνω
  rationale: El futuro simple en español transmite la certeza de recepción. «Lo» retoma naturalmente la petición implícita del contexto.
- source_word: δίψυχος
  english_pob_choice: double-minded
  chosen_spanish: de doble ánimo
  alternatives_spanish:
  - vacilante
  - de mente dividida
  lexicon: δίψυχος
  rationale: «De doble ánimo» es una equivalencia bíblica comprensible en español y conserva la tensión interior del término. «Vacilante» explicaría el sentido, pero pierde la imagen de duplicidad interior.
- source_word: αἰτούμενος
  english_pob_choice: asking
  chosen_spanish: mientras pides
  alternatives_spanish:
  - mientras solicitas
  - al pedir
  lexicon: αἰτέω
  rationale: Se mantiene la acción en progreso con una construcción natural en español. «Mientras pides» conserva el aspecto durativo del participio.
- source_word: αἰτίασον σεαυτόν
  english_pob_choice: blame yourself
  chosen_spanish: échate la culpa a ti mismo
  alternatives_spanish:
  - culpa a ti mismo
  - recrimínate a ti mismo
  lexicon: αἰτιάομαι
  rationale: La idea es de responsabilizarse por la falta de perseverancia o de fe vacilante. «Échate la culpa a ti mismo» es idiomático y conserva la fuerza exhortativa sin suavizarla.
- source_word: καὶ μὴ τὸν διδόντα σοι
  english_pob_choice: and not the one who gives to you
  chosen_spanish: y no a quien te lo da
  alternatives_spanish:
  - y no a quien te da
  - y no al que te da
  lexicon: δίδωμι
  rationale: «A quien te lo da» reproduce la relación personal del dativo y mantiene la referencia al don implícito. El pronombre «lo» ayuda a recuperar el objeto pedido sin introducirlo explícitamente.
theological_decisions:
- issue: Responsabilidad del orante frente a la demora o vacilación
  english_pob_reading: If you grow weary and become double-minded while asking, blame yourself and not the one who gives to you.
  chosen_spanish_reading: si te cansas y te vuelves de doble ánimo mientras pides, échate la culpa a ti mismo y no a quien te lo da
  alternative_spanish_readings:
  - si te desalientas y dudas al pedir, culparte a ti mismo y no al que da
  - si flaqueas y eres de doble ánimo al pedir, recrimínate a ti mismo y no al dador
  rationale: 'La formulación conserva la exhortación moral del texto: la falla se atribuye al orante que se fatiga o vacila, no al dador. Se evita suavizar la imputación, porque el original presenta una amonestación directa.'
  doctrine_reference: Perseverancia en la oración; responsabilidad moral del creyente
- issue: Tensión entre interioridad del deseo y acto de petición
  english_pob_reading: the request of your soul
  chosen_spanish_reading: lo que tu alma solicita
  alternative_spanish_readings:
  - la petición de tu alma
  - la súplica de tu alma
  rationale: La expresión mantiene la relación entre alma e impulso de pedir sin convertirla en una abstracción doctrinal. Se preserva la amplitud del término ψυχή como interioridad viviente.
  doctrine_reference: Antropología bíblica; oración perseverante
translation_notes:
  revision_awareness: No applied revisions or prior footnotes were present in the supplied audit context. The Spanish draft therefore follows the source packet and the English POB renderings directly, while preserving the rhetorical parallelism of exhortation and warning.
  spanish_consistency_notes:
  - Se usa «alma» para ψυχή conforme al valor antropológico habitual del proyecto.
  - Se mantiene «de doble ánimo» para δίψυχος como término bíblico reconocido en español.
  - Se evita «SEÑOR» porque no hay tetragrámaton ni κύριος divino en este pasaje.
  - El registro es exhortativo y sobrio, con sintaxis natural en español de lectura eclesial.
