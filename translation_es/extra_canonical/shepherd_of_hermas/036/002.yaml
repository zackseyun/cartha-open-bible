revisions:
- from: No razonéis acerca de estas cosas, sino volveos al Señor con todo vuestro corazón, y pedidle sin dudar; y conoceréis su gran compasión, porque ciertamente no os abandonará, sino que cumplirá la petición de vuestra alma.
  to: No te pongas a razonar sobre estas cosas, sino vuélvete al Señor con todo tu corazón, y pídele sin dudar; y llegarán a conocer[a] su gran compasión, porque ciertamente no te abandonará, sino que cumplirá la petición de tu alma.
  rationale: Se corrige el problema principal de fidelidad pronominal pasando a singular en las formas claramente singulares del original, y se evita el registro de "vosotros" para ajustarse al español neutral. Se conserva una nota por la anomalía de número en la cláusula de "conocer", ya que el expediente inglés la nivela mientras que la forma griega normalizada puede reflejar variación textual o transmisión irregular. No hace falta adjudicación superior porque la solución es manejable con nota explicativa.
