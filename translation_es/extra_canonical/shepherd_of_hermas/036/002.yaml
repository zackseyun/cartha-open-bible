base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/036/002.yaml
  text: Do not reason about these things, but turn to the Lord with your whole heart, and ask from him without doubting; and you will come to know his great compassion, because he will certainly not abandon you, but will fulfill the request of your soul.
translation:
  language: es
  text: No te pongas a razonar sobre estas cosas, sino vuélvete al Señor con todo tu corazón, y pídele sin dudar; y llegarán a conocer[a] su gran compasión, porque ciertamente no te abandonará, sino que cumplirá la petición de tu alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "conocerás". El expediente inglés tiene "you will come to know", pero la forma griega normalizada aquí puede leerse con un cambio de número dentro de la frase; la traducción principal conserva ese rasgo textual y la nota da la opción de nivelarlo en singular para el español.
    reason: El texto fuente/auditoría presenta una tensión de número que en español puede percibirse como extraña; la nota preserva la alternativa sin ocultar el dato textual.
lexical_decisions:
- source_word: μὴ λογίζου
  english_pob_choice: Do not reason about these things
  chosen_spanish: No razonéis acerca de estas cosas
  alternatives_spanish:
  - No penséis sobre estas cosas
  - No os pongáis a razonar sobre estas cosas
  lexicon: λογίζομαι
  rationale: El verbo apunta a ocupar la mente con cálculos o razonamientos; "razonar" mantiene la fuerza intelectual sin volverlo demasiado técnico. "Acerca de estas cosas" sigue el alcance del objeto sin añadir matiz no atestiguado.
- source_word: ἀλλὰ ἐπιστράφητι πρὸς τὸν κύριον
  english_pob_choice: but turn to the Lord
  chosen_spanish: sino volveos al Señor
  alternatives_spanish:
  - sino volvedos al Señor
  - sino volve al Señor
  lexicon: ἐπιστρέφω; κύριος
  rationale: '"Volver(se)" comunica el giro de orientación personal requerido por el griego. Se conserva "Señor" porque el audit trail inglés lo hace así y aquí no hay señal suficiente para sustituirlo explícitamente por Yahvé en este testimonio cristiano antiguo.'
- source_word: ἐν ὅλῃ τῇ καρδίᾳ
  english_pob_choice: with your whole heart
  chosen_spanish: con todo vuestro corazón
  alternatives_spanish:
  - de todo vuestro corazón
  - con el corazón entero
  lexicon: καρδία
  rationale: '"Con todo vuestro corazón" es natural en español bíblico y preserva la idea de totalidad interior, no solo emoción.'
- source_word: καὶ αἰτοῦ αὐτὸν ἀδιστάκτως
  english_pob_choice: and ask from him without doubting
  chosen_spanish: y pedidle sin dudar
  alternatives_spanish:
  - y pedidle sin vacilar
  - y pedidle sin ninguna duda
  lexicon: αἰτέω; ἀδιστάκτως
  rationale: '"Pedir" expresa mejor la súplica dirigida a una persona que "solicitar". "Sin dudar" mantiene el matiz de ausencia de vacilación/interior división que la forma adverbial exige.'
- source_word: καὶ γνώσῃ τὴν μεγάλην αὐτοῦ οἰκτιρμόν
  english_pob_choice: and you will come to know his great compassion
  chosen_spanish: y conoceréis su gran compasión
  alternatives_spanish:
  - y llegaréis a conocer su gran compasión
  - y reconoceréis su gran compasión
  lexicon: γινώσκω; οἰκτιρμός
  rationale: '"Conoceréis" mantiene la certeza de experiencia adquirida. "Compasión" recoge bien οἰκτιρμός, evitando endurecerlo como mera piedad abstracta.'
- source_word: ὅτι οὐ μὴ σε ἐγκαταλίπῃ
  english_pob_choice: because he will certainly not abandon you
  chosen_spanish: porque ciertamente no os abandonará
  alternatives_spanish:
  - porque en ningún caso os abandonará
  - porque no os dejará de ningún modo
  lexicon: ἐγκαταλείπω
  rationale: La doble negación enfática se expresa con "ciertamente no"; "abandonará" es el equivalente natural y fiel para el sentido de desamparo.
- source_word: ἀλλὰ πληρώσει τὴν αἴτησιν τῆς ψυχῆς σου
  english_pob_choice: but will fulfill the request of your soul
  chosen_spanish: sino que cumplirá la petición de vuestra alma
  alternatives_spanish:
  - sino que colmará la petición de vuestra alma
  - sino que satisfará la petición de vuestra alma
  lexicon: πληρόω; αἴτησις; ψυχή
  rationale: '"Cumplirá" conserva la idea de llevar a efecto la petición; "petición" corresponde con claridad a αἴτησις. "Alma" mantiene ψυχή sin reemplazarla por una paráfrasis psicológica, preservando el alcance antropológico del texto.'
theological_decisions:
- issue: Objeto de la confianza y el ruego
  english_pob_reading: turn to the Lord ... ask from him
  chosen_spanish_reading: volveos al Señor ... pedidle
  alternative_spanish_readings:
  - volvéos a Yahvé ... pedidle
  - volvéos al Señor Jesús ... pedidle
  rationale: El contexto del texto cristiano antiguo y el audit trail inglés sostienen la invocación al Señor. No hay base suficiente aquí para reescribir el referente como Yahvé de forma explícita en el cuerpo del texto, ni para precisar "Señor Jesús" sin apoyo textual directo.
  doctrine_reference: Cristología y uso de κύριος en literatura cristiana primitiva
- issue: Seguridad de la respuesta divina
  english_pob_reading: he will certainly not abandon you, but will fulfill the request of your soul
  chosen_spanish_reading: ciertamente no os abandonará, sino que cumplirá la petición de vuestra alma
  alternative_spanish_readings:
  - de ningún modo os abandonará, sino que satisfará la petición de vuestra alma
  - no os dejará, sino que realizará la petición de vuestra alma
  rationale: La frase mantiene la promesa con énfasis y sin suavizar el doble negativo. "Cumplirá la petición" evita que la afirmación se vuelva mecánica o excesivamente moderna, y conserva la tensión entre abandono y respuesta.
  doctrine_reference: Providencia divina y confianza en la respuesta a la oración
translation_notes:
  revision_awareness: No se registran revisiones aplicadas ni notas de auditoría previas en el paquete inglés. La redacción española sigue directamente el griego normalizado y armoniza con la traducción inglesa POB sin depender mecánicamente de ella.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverencial de segunda persona plural coherente con el tono eclesial del texto y con la forma plural del verbo.
  - Se preserva "Señor" como término de referencia principal porque el expediente no ofrece un criterio textual suficiente para sustituirlo en español por otra forma.
  - No se introducen notas al pie porque el paquete fuente no trae variantes, alternativas textuales ni ambigüedades auditadas que exijan marcación en el texto.
