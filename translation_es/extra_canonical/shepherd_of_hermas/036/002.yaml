    rationale: El original preservado en el expediente muestra singular en verbos y pronombres clave (ἐπιστράφητι, αἰτοῦ, σε, σου). El borrador usa plural uniforme (volveos, pedidle, os, vuestra), lo que altera un rasgo formal del texto y de la promesa dirigida al oyente.
  - severity: medium
    issue: Registro no neutral para el proyecto
    rationale: El uso de "vosotros/vuestra" y formas como "razonéis" no corresponde al objetivo de español neutral latinoamericano / ampliamente legible en iglesia.
  - severity: low
    issue: '"No razonéis acerca de estas cosas" suena algo rígido'
    rationale: Es fiel, pero para una audiencia amplia suena más natural "No se pongan a razonar sobre estas cosas" o una forma singular coherente con el original. La revisión propuesta mantiene fidelidad y mejora fluidez.
