review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del griego y sigue de cerca la English POB: quitar la διψυχία, no vacilar al pedir a Dios, y no razonar interiormente desde la propia indignidad. Sin embargo, la pareja léxica griega διψυχία / διψυχέω se refleja de modo menos coherente al alternar «doblez de ánimo» con «ánimo dudoso». El segundo giro atenúa la idea de mente/corazón dividido y se acerca más a simple duda que a doble ánimo.'
  spanish_quality_summary: El español es claro y digno, pero «doblez de ánimo» suena algo menos idiomático que «doble ánimo», y «ser de ánimo dudoso» resulta más forzado. Una formulación más natural y consistente en español eclesial es «doble ánimo» / «tener doble ánimo». El resto del período fluye bien.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» está bien para θεός. «Señor» en la cita interior corresponde a κύριος de la fuente inmediata y no exige «Yahvé». La revisión propuesta mejora la consistencia léxica sin afectar la teología.
  issues:
  - severity: medium
    issue: Inconsistencia en la traducción de διψυχία / διψυχέω
    rationale: El sustantivo y el verbo/adjetivo pertenecen al mismo campo léxico y conviene reflejar esa relación en español. «Doblez de ánimo» + «ánimo dudoso» diluye el paralelismo exhortativo del original.
  - severity: low
    issue: «Ser de ánimo dudoso» suena poco natural
    rationale: Aunque comprensible, no es una expresión española tan fluida como «tener doble ánimo» o «dudar». Dado que el original repite la raíz, conviene una solución natural que preserve esa repetición.
  revised_spanish_text: 'Él me dice: «Quita de ti el doble ánimo, y no tengas en absoluto doble ánimo cuando pidas algo a Dios, diciendo dentro de ti: “¿Cómo puedo pedir al Señor y recibir, yo que he pecado tanto contra él?”»'
  revision_rationale: Se sustituye «doblez de ánimo» por «doble ánimo» y «ser de ánimo dudoso» por «tener doble ánimo» para reflejar con mayor fidelidad la repetición léxica de διψυχία / διψυχέω, mejorar la naturalidad del español y mantener el matiz moral de una interioridad dividida, no mera incertidumbre.
