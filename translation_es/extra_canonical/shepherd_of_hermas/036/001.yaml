base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/036/001.yaml
  text: 'He says to me: Remove double-mindedness from yourself, and do not at all be double-minded when asking anything from God, saying within yourself, “How am I able to ask from the Lord and receive, I who have sinned so much against him?”'
translation:
  language: es
  text: 'Él me dice: «Quita de ti el doble ánimo, y no tengas en absoluto doble ánimo cuando pidas algo a Dios, diciendo dentro de ti: “¿Cómo puedo pedir al Señor y recibir, yo que he pecado tanto contra él?”»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διψυχία / double-mindedness
  english_pob_choice: double-mindedness
  chosen_spanish: doblez de ánimo
  alternatives_spanish:
  - duda interior
  - doble ánimo
  - vacilación
  lexicon: N/A
  rationale: El griego expresa una división interior, no solo incertidumbre intelectual. «Doblez de ánimo» conserva la idea de un corazón dividido y suena natural en español eclesial sin reducir el matiz moral del término.
- source_word: διψυχέω / be double-minded
  english_pob_choice: be double-minded
  chosen_spanish: ser de ánimo dudoso
  alternatives_spanish:
  - tener doble ánimo
  - vacilar
  - dudar
  lexicon: N/A
  rationale: La prohibición requiere un verbo/adjetivo que funcione bien en español. «Ser de ánimo dudoso» mantiene la carga exhortativa y evita una repetición mecánica de la misma raíz, preservando el sentido de inestabilidad interior.
- source_word: παρὰ τοῦ κυρίου / from the Lord
  english_pob_choice: from the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor
  lexicon: N/A
  rationale: En esta frase de súplica, el destinatario implícito es el Señor; «al Señor» reproduce el régimen natural del español con el verbo «pedir» y mantiene la referencia reverente sin forzar una fórmula más técnica.
- source_word: θεός / God
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: N/A
  rationale: El texto original y la tradición de la obra usan el nombre común de la deidad; «Dios» es la forma directa y clara en español, sin necesidad de perífrasis.
- source_word: ἥμαρτον / I have sinned
  english_pob_choice: I who have sinned
  chosen_spanish: yo que he pecado
  alternatives_spanish:
  - yo que he cometido tantos pecados
  - yo, que he pecado
  lexicon: N/A
  rationale: «He pecado» conserva el perfecto con valor de estado/resultante que justifica la objeción interior del hablante. Se evita añadir intensificación no necesaria como «tantos» dentro de la cita, porque el original solo dice «mucho» en la línea anterior de la English POB.
theological_decisions:
- issue: La frase interior de indignidad al pedir a Dios
  english_pob_reading: saying within yourself, “How am I able to ask from the Lord and receive, I who have sinned so much against him?”
  chosen_spanish_reading: 'diciendo dentro de ti: “¿Cómo puedo pedir al Señor y recibir, yo que he pecado tanto contra él?”'
  alternative_spanish_readings:
  - pensando para ti mismo
  - diciéndote a ti mismo
  rationale: 'La lectura mantiene la tensión espiritual del pasaje: el problema no es la imposibilidad objetiva de orar, sino la autoinculpación que alimenta la indecisión. Se conserva la cita interior como parte de la advertencia moral del mandato.'
  doctrine_reference: Exhortación a la confianza perseverante en la oración; cf. Stg 1:6-8.
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido del griego transmitido por la edición de Lightfoot & Harmer y el tramo auditado en inglés. No se observaron revisiones aplicadas en el paquete, y la versión inglesa ya resuelve la sintaxis en una frase exhortativa directa con cita interior.
  spanish_consistency_notes:
  - Se usó «Dios» para θεός y «Señor» para κύριος, manteniendo la distinción del habla de súplica.
  - Se evitó «siervo» porque aquí no aparece δοῦλος; el núcleo léxico del pasaje es la división interior del ánimo.
  - No se introdujeron notas al pie porque la fuente auditada no preserva variantes ni alternativas textuales en este segmento.
