revisions:
- from: 'Él me dice: «Quita de ti la doblez de ánimo, y no seas en absoluto de ánimo dudoso cuando pidas algo a Dios, diciendo dentro de ti: “¿Cómo puedo pedir al Señor y recibir, yo que he pecado tanto contra él?”»'
  to: 'Él me dice: «Quita de ti el doble ánimo, y no tengas en absoluto doble ánimo cuando pidas algo a Dios, diciendo dentro de ti: “¿Cómo puedo pedir al Señor y recibir, yo que he pecado tanto contra él?”»'
  rationale: Se sustituye «doblez de ánimo» por «doble ánimo» y «ser de ánimo dudoso» por «tener doble ánimo» para reflejar con mayor fidelidad la repetición léxica de διψυχία / διψυχέω, mejorar la naturalidad del español y mantener el matiz moral de una interioridad dividida, no mera incertidumbre.
