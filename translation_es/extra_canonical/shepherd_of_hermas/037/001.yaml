  rationale: 'Se ajusta el texto para reflejar con más precisión el sentido del original y del POB inglés: ‘Quita de ti’ corresponde mejor a la idea de remover; ‘doble ánimo’ evita el matiz de duplicidad moral presente en ‘doblez’; y ‘mal genio’ expresa una disposición pronta a enojarse mejor que ‘arrebato de ira’, que sugiere un episodio puntual.'
