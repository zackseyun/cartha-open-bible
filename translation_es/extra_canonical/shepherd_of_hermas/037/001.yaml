  text: “Remove sorrow from yourself,” he says, “for it is a sister of double‑mindedness and quick temper.”
translation:
  language: es
  text: “Quita de ti la tristeza”, dice él, “porque es hermana del doble ánimo y del mal genio.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λύπη / sorrow
  english_pob_choice: sorrow
  chosen_spanish: tristeza
  alternatives_spanish:
  - pena
  - aflicción
  lexicon: —
  rationale: “Tristeza” reproduce de manera natural y directa el afecto negativo pedido por el texto, sin intensificarlo innecesariamente. “Pena” y “aflicción” son posibles, pero suenan más interpretativos o más fuertes según el contexto.
- source_word: ἀπόστησον / remove from yourself
  english_pob_choice: Remove from yourself
  chosen_spanish: Aparta de ti
  alternatives_spanish:
  - Quita de ti
  - Aleja de ti
  lexicon: —
  rationale: La forma imperativa expresa bien el mandato y mantiene el matiz reflexivo de separación personal. “Aparta de ti” es idiomático en español bíblico contemporáneo y conserva la fuerza directiva sin volverlo mecánico.
- source_word: ἀδελφή / sister
  english_pob_choice: sister
  chosen_spanish: hermana
  alternatives_spanish:
  - hermana carnal
  - afín
  lexicon: —
  rationale: Se conserva la metáfora relacional literal. En español, “hermana” es clara y suficientemente natural para mantener la imagen del parentesco moral del pasaje.
- source_word: δίψυχος / double-mindedness
  english_pob_choice: double-mindedness
  chosen_spanish: doblez de ánimo
  alternatives_spanish:
  - doble ánimo
  - inconstancia
  lexicon: —
  rationale: “Doblez de ánimo” preserva el valor compuesto de la expresión y sugiere una interioridad dividida sin reducirla solo a indecisión. “Doble ánimo” es posible, pero menos explícita; “inconstancia” pierde el elemento de división interna.
- source_word: ὀξύθυμος / quick temper
  english_pob_choice: quick temper
  chosen_spanish: arrebato de ira
  alternatives_spanish:
  - pronto enojo
  - carácter iracundo
  lexicon: —
  rationale: La idea es una irritación rápida y explosiva. “Arrebato de ira” comunica bien el estallido emocional; “pronto enojo” suena más coloquial y “carácter iracundo” se desplaza hacia una descripción permanente más que hacia el rasgo puntual del texto.
theological_decisions:
- issue: La relación moral entre la tristeza, la doblez interior y la ira
  english_pob_reading: sorrow is described as a sister of double-mindedness and quick temper
  chosen_spanish_reading: la tristeza es presentada como hermana de la doblez de ánimo y del arrebato de ira
  alternative_spanish_readings:
  - la tristeza se vincula con la doblez de ánimo y la ira
  - la tristeza pertenece a la misma familia moral que la doblez de ánimo y la ira
  rationale: El texto mantiene una personificación moral sin convertirla en afirmación doctrinal más amplia. “Hermana de” preserva la metáfora de parentesco y la conexión ética entre las actitudes, tal como la transmite el original y la traducción inglesa.
  doctrine_reference: Ética moral del texto de Hermas; no hay formulación doctrinal explícita adicional.
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el material de referencia; la redacción española se construyó directamente desde el griego normalizado y el audit trail inglés, preservando la metáfora de parentesco y el tono imperativo breve.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y eclesialmente legible, evitando calcos rígidos cuando el español requiere una construcción natural.
  - No se introdujeron términos técnicos ajenos al pasaje; la metáfora de parentesco se conservó literalmente.
  - Se eligió un equivalente que mantiene la tensión entre rasgo emocional y disposición moral, sin convertir el texto en una paráfrasis interpretativa.
