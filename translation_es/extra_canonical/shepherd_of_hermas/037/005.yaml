  yaml_path: translation/extra_canonical/shepherd_of_hermas/037/005.yaml
  text: “Listen,” he says. “Those who have never inquired about the truth nor sought concerning the divine, but have only believed, and are mixed up with business affairs and wealth and pagan friendships and many other affairs of this age—so all who devote themselves to these do not understand the parables of the divine; for they are darkened by these pursuits and are corrupted and become barren. Just as good vineyards, when they are neglected, become barren from thorns and various weeds, so also the people who have believed and fall into these many pursuits just mentioned are led astray from their understanding, and they understand nothing at all about righteousness. And even when they hear about the divine and the truth, their mind is occupied with their business, and they understand nothing at all.
translation:
  language: es
  text: «Escucha», dice él. «Los que nunca han indagado sobre la verdad ni han buscado lo divino[a], sino que solo han creído, y están enredados en los negocios, las riquezas, las amistades paganas y muchos otros asuntos de esta era[b], todos los que se entregan a estas cosas no entienden las parábolas de lo divino; porque quedan oscurecidos por estas ocupaciones, se corrompen y se vuelven estériles. Así como las buenas viñas, cuando se descuidan, se vuelven estériles por las espinas y las diversas malas hierbas, así también las personas que han creído y caen en estas muchas ocupaciones ya mencionadas se extravían de su entendimiento, y no entienden nada en absoluto acerca de la justicia. Y aun cuando oyen hablar de lo divino y de la verdad, su mente está ocupada con sus negocios, y no entienden nada en absoluto».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «lo divino» traduce la sustantivación del griego; no funciona aquí como un simple adjetivo decorativo, sino como referencia a la realidad o esfera divina.
    reason: lexical_alternative
  - marker: b
    text: «esta era» refleja αἰών y conserva la referencia al orden presente; también puede entenderse como «siglo» o «tiempo» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ θεῖον / τοῦ θείου
  english_pob_choice: the divine
  chosen_spanish: lo divino
  alternatives_spanish:
  - lo divino y sagrado
  - las cosas divinas
  lexicon: θεῖος
  rationale: La frase griega apunta a lo divino como esfera o realidad, no simplemente a un adjetivo ornamental. «Lo divino» conserva esa sustantivación y sigue de cerca la opción del POB en inglés.
- source_word: ἀλήθεια
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la verdad divina
  - la realidad
  lexicon: ἀλήθεια
  rationale: «La verdad» es la correspondencia normal y suficientemente exacta para ἀλήθεια aquí; el contexto contrasta con ocupaciones terrenales, no con una definición filosófica más técnica.
- source_word: πραγματείαι
  english_pob_choice: business affairs
  chosen_spanish: los negocios
  alternatives_spanish:
  - los asuntos de negocio
  - las actividades comerciales
  lexicon: πραγματεία
  rationale: «Negocios» comunica la idea de ocupaciones comerciales o lucrativas sin alargar innecesariamente la frase. Mantiene el contraste con lo divino y la verdad.
- source_word: πλοῦτος
  english_pob_choice: wealth
  chosen_spanish: las riquezas
  alternatives_spanish:
  - la riqueza
  - los bienes
  lexicon: πλοῦτος
  rationale: El plural español naturaliza la referencia a posesiones/riqueza acumulada y armoniza con la lista de múltiples afanes.
- source_word: φιλία
  english_pob_choice: pagan friendships
  chosen_spanish: las amistades paganas
  alternatives_spanish:
  - las amistades con los paganos
  - las amistades del paganismo
  lexicon: φιλία
  rationale: La expresión inglesa ya interpreta la relación como amistades con el mundo pagano; «amistades paganas» conserva la carga cultural-religiosa sin expandir el sentido más allá de la evidencia.
- source_word: αἰών
  english_pob_choice: this age
  chosen_spanish: este tiempo
  alternatives_spanish:
  - este siglo
  - esta era
  lexicon: αἰών
  rationale: «Tiempo» es claro y neutral en español; evita una carga demasiado técnica de «siglo» y conserva la oposición escatológica implícita.
- source_word: παραβολάς
  english_pob_choice: parables
  chosen_spanish: parábolas
  alternatives_spanish:
  - comparaciones
  - enseñanzas figuradas
  lexicon: παραβολή
  rationale: «Parábolas» sigue el valor habitual de la palabra y respeta la forma en que el texto habla de comprensión de enseñanzas figuradas.
- source_word: ἐσκοτίσθησαν
  english_pob_choice: are darkened
  chosen_spanish: se oscurecen
  alternatives_spanish:
  - se entenebrecen
  - quedan oscurecidos
  lexicon: σκοτίζω
  rationale: 'La forma pasiva/medio-pasiva puede expresarse de manera viva en español con un presente gnómico: «se oscurecen», que conserva la imagen de pérdida de claridad mental o espiritual.'
- source_word: καὶ φθείρονται
  english_pob_choice: are corrupted
  chosen_spanish: se corrompen
  alternatives_spanish:
  - se arruinan
  - se echan a perder
  lexicon: φθείρω
  rationale: «Se corrompen» reproduce la idea de deterioro moral y espiritual, en línea con la fuerza del verbo y con el registro del texto.
- source_word: ἄκαρποι
  english_pob_choice: barren
  chosen_spanish: estériles
  alternatives_spanish:
  - sin fruto
  - infructuosas
  lexicon: ἄκαρπος
  rationale: «Estériles» conserva la imagen agrícola del texto y su fuerza negativa; encaja con la comparación de las viñas descuidadas.
- source_word: ἀμπελῶνες
  english_pob_choice: vineyards
  chosen_spanish: viñas
  alternatives_spanish:
  - viñedos
  - parras
  lexicon: ἀμπελών
  rationale: «Viñas» es breve, natural y suficientemente fiel en español bíblico; conserva bien la metáfora agrícola.
- source_word: τῶν ἀκανθῶν καὶ τῶν λοιπῶν ζιζανίων
  english_pob_choice: thorns and various weeds
  chosen_spanish: las espinas y las diversas malas hierbas
  alternatives_spanish:
  - las espinas y las otras malezas
  - los espinos y las diversas malezas
  lexicon: ἄκανθα / ζιζάνιον
  rationale: «Diversas malas hierbas» da el sentido de ζιζάνια sin tecnicismo excesivo. «Espinas» mantiene el obstáculo simbólico del descuido.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: δικαιοσύνη
  rationale: En este contexto la POB inglesa eligió «righteousness»; en español, «justicia» preserva el campo semántico legal y moral, evitando una redundancia menos natural con «rectitud».
theological_decisions:
- issue: Relación entre creer y no entender por falta de búsqueda de la verdad
  english_pob_reading: Those who have never inquired about the truth nor sought concerning the divine, but have only believed... do not understand
  chosen_spanish_reading: Los que nunca se han preguntado por la verdad ni han buscado acerca de lo divino, sino que solo han creído... no entienden
  alternative_spanish_readings:
  - Los que solo han creído, sin investigar la verdad
  - Los que creen pero no buscan lo divino
  rationale: El texto contrapone fe meramente asentida con búsqueda intelectual y espiritual. La redacción española conserva esa tensión sin resolverla en favor de una sola postura.
  doctrine_reference: Formación de la fe; discernimiento; conocimiento espiritual
- issue: Oscurecimiento y corrupción producidos por ocupaciones y riquezas
  english_pob_reading: are darkened by these pursuits and are corrupted and become barren
  chosen_spanish_reading: se oscurecen por estas ocupaciones y se corrompen y quedan estériles
  alternative_spanish_readings:
  - quedan entenebrecidos y se echan a perder
  - se vuelven infructuosos
  rationale: 'Se mantiene la secuencia causal y la degradación progresiva: oscurecimiento, corrupción, esterilidad. No se suaviza el efecto moral del pasaje.'
  doctrine_reference: Ascética; advertencia contra afanes mundanos
- issue: Sentido de las 'parábolas de lo divino' y de 'la verdad'
  english_pob_reading: understand the parables of the divine... they understand nothing at all about righteousness... even when they hear about the divine and the truth
  chosen_spanish_reading: no entienden las parábolas de lo divino... no entienden nada en absoluto acerca de la justicia... aun cuando oyen hablar de lo divino y de la verdad
  alternative_spanish_readings:
  - no comprenden las parábolas de lo divino
  - no captan nada acerca de la rectitud
  rationale: La repetición de incomprensión se preserva para mostrar el énfasis moral y espiritual del original. «Justicia» mantiene el nexo entre conocimiento y vida justa.
  doctrine_reference: Iluminación espiritual; obediencia práctica
- issue: Metáfora agrícola de las viñas estériles
  english_pob_reading: Just as good vineyards, when they are neglected, become barren from thorns and various weeds
  chosen_spanish_reading: Así como las buenas viñas, cuando se descuidan, se vuelven estériles por las espinas y las diversas malas hierbas
  alternative_spanish_readings:
  - Así como los buenos viñedos, descuidados, quedan estériles por espinas y malezas
  rationale: 'La imagen debe conservar el valor demostrativo del ejemplo: una realidad buena se arruina por negligencia. La formulación elegida es natural y mantiene la fuerza comparativa.'
  doctrine_reference: Perseverancia; necesidad de vigilancia
translation_notes:
  revision_awareness: No se registran revisiones previas en el paquete de auditoría. La redacción española se ha elaborado directamente desde el griego con apoyo del texto inglés POB para verificar decisiones léxicas y el tono retórico acumulativo del pasaje.
  spanish_consistency_notes:
  - Se mantiene «lo divino» de manera consistente para θει- en este segmento, evitando alternar con «las cosas divinas» salvo en la nota.
  - Se conserva la enumeración acumulativa con polisíndeton y repeticiones, porque el original enfatiza la saturación de ocupaciones mundanas.
  - «Justicia» se usa aquí por el peso moral-legal de δικαιοσύνη; no se alterna con «rectitud» dentro del mismo pasaje.
  - El registro es eclesial y legible en español contemporáneo, sin introducir vocabulario devocional que no esté sustentado por el texto.
