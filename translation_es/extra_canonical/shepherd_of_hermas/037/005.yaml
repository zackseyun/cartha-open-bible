  to: «Escucha», dice él. «Los que nunca han indagado sobre la verdad ni han buscado lo divino[a], sino que solo han creído, y están enredados en los negocios, las riquezas, las amistades paganas y muchos otros asuntos de esta era[b], todos los que se entregan a estas cosas no entienden las parábolas de lo divino; porque quedan oscurecidos por estas ocupaciones, se corrompen y se vuelven estériles. Así como las buenas viñas, cuando se descuidan, se vuelven estériles por las espinas y las diversas malas hierbas, así también las personas que han creído y caen en estas muchas ocupaciones ya mencionadas se extravían de su entendimiento, y no entienden nada en absoluto acerca de la justicia. Y aun cuando oyen hablar de lo divino y de la verdad, su mente está ocupada con sus negocios, y no entienden nada en absoluto».
