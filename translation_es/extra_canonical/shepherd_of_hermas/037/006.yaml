base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/037/006.yaml
  text: “But those who have the fear of God and inquire about the divine and the truth and have their heart toward the Lord quickly understand and comprehend everything spoken to them, because they have the fear of the Lord within themselves; for where the Lord dwells, there also is abundant understanding. Therefore cling to the Lord, and you will understand and comprehend all things.”
translation:
  language: es
  text: «Pero los que tienen temor de Dios y preguntan por lo divino y por la verdad, y tienen su corazón vuelto hacia el Señor, entienden y comprenden pronto todo lo que se les dice, porque tienen dentro de sí el temor del Señor; pues donde habita el Señor, allí también hay abundante entendimiento. Por tanto, aférrense al Señor, y entenderán y comprenderán todas las cosas.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φόβον τοῦ Θεοῦ
  english_pob_choice: the fear of God
  chosen_spanish: temor de Dios
  alternatives_spanish:
  - miedo de Dios
  - reverencia de Dios
  lexicon: φόβος
  rationale: La expresión bíblica admite tanto temor reverente como temor en sentido fuerte; «temor de Dios» conserva la ambigüedad útil y suena natural en español eclesial sin suavizarla indebidamente.
- source_word: τὰ θεῖα
  english_pob_choice: the divine
  chosen_spanish: lo divino
  alternatives_spanish:
  - las cosas divinas
  - lo sagrado
  lexicon: θεῖος
  rationale: La forma neutra plural/abstracta se refleja mejor con un sustantivo abstracto en español. «Lo divino» mantiene la amplitud del término sin concretarlo de más.
- source_word: τὴν ἀλήθειαν
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la verdad misma
  - la realidad
  lexicon: ἀλήθεια
  rationale: «La verdad» es la equivalencia directa y suficientemente amplia en español; no se requiere especificación adicional por el contexto.
- source_word: τὴν καρδίαν αὐτῶν πρὸς τὸν κύριον
  english_pob_choice: have their heart toward the Lord
  chosen_spanish: tienen su corazón vuelto hacia el Señor
  alternatives_spanish:
  - tienen el corazón dirigido al Señor
  - tienen su corazón orientado al Señor
  lexicon: καρδία / πρός
  rationale: «Vuelto hacia» expresa con naturalidad la orientación relacional del griego πρός sin perder la imagen del corazón como centro de disposición interior.
- source_word: συνιοῦσι ταχέως καὶ συνιᾶσιν
  english_pob_choice: quickly understand and comprehend
  chosen_spanish: entienden y comprenden pronto
  alternatives_spanish:
  - comprenden rápidamente y captan
  - entienden con rapidez y comprenden
  lexicon: συνίημι
  rationale: Se preserva la duplicación enfática de dos verbos afines con dos verbos españoles también afines. «Pronto» transmite la rapidez sin volver la frase pesada.
- source_word: πάντα τὰ λαλούμενα
  english_pob_choice: everything spoken to them
  chosen_spanish: todo lo que se les dice
  alternatives_spanish:
  - todas las cosas dichas a ellos
  - todo lo hablado para ellos
  lexicon: λαλέω
  rationale: 'La pasiva implícita en español se expresa con naturalidad: «se les dice». Mantiene el sentido auditivo/comunicado de lo hablado.'
- source_word: τὸν φόβον τοῦ κυρίου ἔχουσιν ἐν ἑαυτοῖς
  english_pob_choice: they have the fear of the Lord within themselves
  chosen_spanish: tienen dentro de sí el temor del Señor
  alternatives_spanish:
  - llevan dentro de sí el temor del Señor
  - tienen el temor del Señor en su interior
  lexicon: φόβος / κύριος
  rationale: La preposición ἐν ἑαυτοῖς se vierte de modo idiomático como «dentro de sí». Se conserva «temor del Señor» porque el contexto griego usa κύριος y el inglés POB sigue esa misma formulación, sin necesidad de sustituirla por Yahvé en esta cita griega indirecta.
- source_word: ὅπου ὁ κύριος κατοικεῖ
  english_pob_choice: where the Lord dwells
  chosen_spanish: donde habita el Señor
  alternatives_spanish:
  - donde mora el Señor
  - donde el Señor habita
  lexicon: κατοικέω
  rationale: «Habita» comunica residencia estable y suena más natural que un calco. Se mantiene la mayúscula reverencial por tratarse de κύριος en contexto divino.
- source_word: ἐκεῖ καὶ περισσεύει σύνεσις
  english_pob_choice: there also is abundant understanding
  chosen_spanish: allí también hay abundante entendimiento
  alternatives_spanish:
  - allí también abunda el entendimiento
  - allí también hay mucha comprensión
  lexicon: σύνεσις
  rationale: «Entendimiento» corresponde bien a σύνεσις y mantiene el registro bíblico. «Abundante» refleja el verbo περισσεύει sin necesidad de una paráfrasis más larga.
- source_word: κολλᾶσθε τῷ κυρίῳ
  english_pob_choice: cling to the Lord
  chosen_spanish: aférrate al Señor
  alternatives_spanish:
  - adhiérete al Señor
  - pégate al Señor
  lexicon: κολλάω
  rationale: El verbo pide una imagen de adhesión fuerte. «Aferra[r]se» conserva la fuerza semántica mejor que «seguir» o «permanecer con», y funciona de forma exhortativa en español.
- source_word: συνήσεις καὶ συνιήσεις πάντα
  english_pob_choice: you will understand and comprehend all things
  chosen_spanish: entenderás y comprenderás todas las cosas
  alternatives_spanish:
  - comprenderás y entenderás todas las cosas
  - entenderás y captarás todo
  lexicon: συνίημι
  rationale: Se respeta la repetición de dos verbos cognitivos. «Todas las cosas» reproduce el alcance total del griego sin rebajar el énfasis universal.
theological_decisions:
- issue: Temor de Dios / temor del Señor como disposición interior que produce entendimiento
  english_pob_reading: those who have the fear of God ... because they have the fear of the Lord within themselves
  chosen_spanish_reading: los que tienen temor de Dios ... porque tienen dentro de sí el temor del Señor
  alternative_spanish_readings:
  - los que reverencian a Dios ... porque llevan dentro la reverencia al Señor
  - los que temen a Dios ... porque tienen interiormente el temor del Señor
  rationale: El texto vincula el temor reverente con la capacidad de discernimiento. Mantener «temor» en ambos lugares preserva la tensión bíblica entre reverencia y temor real, sin reducirla a mera cortesía religiosa.
  doctrine_reference: Proverbios 1:7; 9:10; Salmo 111:10
- issue: Relación entre lo divino/la verdad y la iluminación interior
  english_pob_reading: inquire about the divine and the truth ... where the Lord dwells, there also is abundant understanding
  chosen_spanish_reading: preguntan por lo divino y por la verdad ... donde habita el Señor, allí también hay abundante entendimiento
  alternative_spanish_readings:
  - buscan lo divino y la verdad ... donde mora el Señor, allí abunda el entendimiento
  rationale: Se conserva la idea de búsqueda activa y la conexión entre presencia del Señor y entendimiento abundante, sin transformar el pasaje en una explicación doctrinal más amplia de la que el texto ofrece.
  doctrine_reference: Salmo 27:4; Juan 14:23
- issue: Exhortación a aferrarse al Señor como vía de comprensión
  english_pob_reading: Therefore cling to the Lord, and you will understand and comprehend all things
  chosen_spanish_reading: Por tanto, aférrate al Señor, y entenderás y comprenderás todas las cosas
  alternative_spanish_readings:
  - Por eso, adhiérete al Señor, y comprenderás todas las cosas
  - Así que aférrate al Señor, y entenderás todo
  rationale: 'La exhortación final se mantiene como promesa condicional implícita: la cercanía al Señor conduce a entendimiento. No se suaviza la fuerza imperativa del original.'
  doctrine_reference: Santiago 4:8; Proverbios 2:3-6
translation_notes:
  revision_awareness: No applied revisions or cross-check corrections were supplied for this unit; the draft follows the normalized Greek source and the English POB audit translation without additional textual emendation.
  spanish_consistency_notes:
  - Se conserva «Señor» para κύριος en esta cita griega indirecta, coherente con el contexto auditado y sin introducir un masking convention no presente en la fuente.
  - Se mantiene la duplicación verbal («entienden y comprenden», «entenderás y comprenderás») para reflejar el paralelismo enfático del griego.
  - «Temor de Dios» y «temor del Señor» se distinguen solo por el referente inmediato del original griego, no por una diferencia doctrinal añadida.
