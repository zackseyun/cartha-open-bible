  text: “You are senseless, man,” he says, “and do you not perceive that sorrow is more evil than all the spirits and most dreadful for the slaves of God, and that beyond all the spirits it destroys a person and wears away the Holy Spirit—and then saves again?”
translation:
  language: es
  text: «Eres insensato, hombre», dice, «¿y no percibes que la tristeza es más mala que todos los espíritus y la más terrible para los esclavos de Dios, y que, por encima de todos los espíritus, destruye a la persona y consume al Espíritu Santo, y luego salva otra vez a la persona?»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνὴρ / man
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - varón
  - persona
  lexicon: ἀνήρ
  rationale: El vocativo requiere una forma natural en español; «hombre» conserva el tono directo e interpela al destinatario sin introducir una especificación innecesaria de sexo biológico más allá del vocativo del original.
- source_word: ἀφρων / senseless
  english_pob_choice: senseless
  chosen_spanish: insensato
  alternatives_spanish:
  - necio
  - falto de entendimiento
  lexicon: ἄφρων
  rationale: «Insensato» comunica bien la falta de juicio moral/espiritual y mantiene un registro digno; evita una traducción demasiado coloquial.
- source_word: λύπη / sorrow
  english_pob_choice: sorrow
  chosen_spanish: tristeza
  alternatives_spanish:
  - dolor
  - aflicción
  lexicon: λύπη
  rationale: En este contexto la palabra apunta a una pena opresiva que actúa como fuerza destructiva; «tristeza» funciona de forma amplia y clara en español, aunque deja abierta la gama semántica de aflicción.
- source_word: κακῶν ... πνευμάτων / all the spirits
  english_pob_choice: all the spirits
  chosen_spanish: todos los espíritus
  alternatives_spanish:
  - todos los malos espíritus
  - todos los espíritus malos
  lexicon: πνεῦμα
  rationale: El griego no añade explícitamente «malos» en la frase citada; por eso se conserva «todos los espíritus» como en el audit trail inglés, dejando que el contexto determine el contraste negativo.
- source_word: δούλων τοῦ θεοῦ / slaves of God
  english_pob_choice: slaves of God
  chosen_spanish: los esclavos de Dios
  alternatives_spanish:
  - los siervos de Dios
  lexicon: δοῦλος
  rationale: Se conserva la fuerza lexical de δοῦλος con «esclavos», conforme a la práctica POB cuando el término tiene peso identitario y no solo funcional; «siervos» suavizaría el impacto del original.
- source_word: τὸ πνεῦμα τὸ ἅγιον / the Holy Spirit
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el espíritu santo
  lexicon: πνεῦμα ἅγιον
  rationale: La mayúscula es la forma idiomática para la referencia personal al Espíritu Santo; el contexto de «consume»/«destruye» exige mantener la lectura personal y no genérica.
theological_decisions:
- issue: La frase final «y luego salva otra vez» es tensional y aparentemente paradójica.
  english_pob_reading: and then saves again
  chosen_spanish_reading: —y luego la salva otra vez—
  alternative_spanish_readings:
  - —y luego salva otra vez—
  - —y luego lo salva otra vez—
  rationale: Se conserva la paradoja tal como aparece en el testimonio inglés auditado, sin armonizarla o explicarla. El pronombre «la» se refiere a la persona previamente mencionada y preserva la ambigüedad estilística del original traducido.
  doctrine_reference: Mantener la tensión textual sin resolverla artificialmente; principio de fidelidad al testimonio recibido.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete proporcionado; se ha trabajado directamente con el texto griego normalizado y el audit trail inglés, preservando la estructura retórica interrogativa y la paradoja final.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este pasaje no contiene el tetragrámaton ni una cita directa relevante.
  - Se conservó «Espíritu Santo» como término técnico cristiano; no se rebajó a un sentido impersonal.
  - La puntuación reproduce el encadenamiento retórico del original sin dividir el período en oraciones más modernas que alterarían el tono.
