  yaml_path: translation/extra_canonical/shepherd_of_hermas/037/004.yaml
  text: “I, lord,” I say, “am senseless, and I do not understand these parables. For how can it wear away and then save? I do not understand.”
translation:
  language: es
  text: 'Yo digo: «Señor, soy insensato y no entiendo estas parábolas. Porque ¿cómo puede gastarse y luego salvar? No lo entiendo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κύριε
  english_pob_choice: lord
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - señor mío
  lexicon: κύριος
  rationale: En este contexto de diálogo respetuoso, 'señor' reproduce el vocativo del inglés POB ('lord') sin forzar una lectura teológica. 'Amo' sería demasiado marcado socialmente; 'señor mío' suena más solemne de lo que pide el pasaje.
- source_word: ἄφρων
  english_pob_choice: senseless
  chosen_spanish: insensato
  alternatives_spanish:
  - falto de entendimiento
  - necio
  lexicon: ἄφρων
  rationale: El griego expresa falta de juicio/entendimiento. 'Insensato' conserva bien esa fuerza y suena natural en español bíblico contemporáneo. 'Necio' es posible, pero puede sonar más áspero o más tradicional; 'falto de entendimiento' explicita demasiado.
- source_word: οὐ συνιῶ
  english_pob_choice: I do not understand
  chosen_spanish: no entiendo
  alternatives_spanish:
  - no comprendo
  - no alcanzo a entender
  lexicon: συνίημι
  rationale: '''No entiendo'' comunica de forma directa la incapacidad de captar el sentido. ''No comprendo'' y ''no alcanzo a entender'' son válidas, pero menos naturales en esta confesión breve.'
- source_word: παραβολαί
  english_pob_choice: parables
  chosen_spanish: parábolas
  alternatives_spanish:
  - comparaciones
  - alegorías
  lexicon: παραβολή
  rationale: '''Parábolas'' es el equivalente normal y conserva el género literario indicado por el original. ''Comparaciones'' sería más descriptivo pero menos preciso; ''alegorías'' desplaza el matiz.'
- source_word: πῶς δύναται φθάρη καὶ σῶσαι
  english_pob_choice: how can it wear away and then save?
  chosen_spanish: ¿cómo puede gastarse y luego salvar?
  alternatives_spanish:
  - ¿cómo puede corromperse y salvar?
  - ¿cómo puede perecer y salvar?
  lexicon: φθείρω + σῴζω
  rationale: La secuencia griega contrapone deterioro/pérdida con salvación. 'Gastarse' transmite la idea de desgaste o consumo sin introducir una destrucción más fuerte de la que el contexto exige. 'Salvar' mantiene la ambigüedad del verbo sin añadir un objeto explícito.
theological_decisions:
- issue: Sentido del vocativo 'señor' en una obra cristiana antigua no bíblica
  english_pob_reading: lord
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - Señor
  - amo
  rationale: Aunque en otros contextos cristianos 'Señor' puede funcionar como título divino, aquí el hablante se dirige a su interlocutor humano en una discusión pedagógica. Se conserva el respeto del vocativo sin cargarlo innecesariamente con mayúscula teológica.
  doctrine_reference: discernimiento contextual del vocativo; evitación de sobrelectura cristológica
- issue: La aparente paradoja de 'gastarse y luego salvar'
  english_pob_reading: how can it wear away and then save?
  chosen_spanish_reading: ¿cómo puede gastarse y luego salvar?
  alternative_spanish_readings:
  - ¿cómo puede corromperse y salvar?
  - ¿cómo puede perecer y salvar?
  rationale: Se preserva la tensión lógica exacta del original sin resolverla en la traducción. No se expande a 'salvarse' ni se añade una explicación interpretativa; el hablante expresa genuina incomprensión.
  doctrine_reference: preservación de la tensión narrativa y retórica del texto
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete de auditoría; la versión española se construye directamente desde el griego con el apoyo contextual de la traducción inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y contemporáneo, evitando arcaísmos innecesarios.
  - Se preserva la brevedad interrogativa y exclamativa del original.
  - No se introduce puntuación explicativa que suavice la confesión de ignorancia del hablante.
