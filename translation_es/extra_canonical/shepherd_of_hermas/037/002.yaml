  yaml_path: translation/extra_canonical/shepherd_of_hermas/037/002.yaml
  text: “How, lord,” I say, “is it a sister of these? For quick temper seems to me one thing, double‑mindedness another, and sorrow another.”
translation:
  language: es
  text: —¿Cómo, señor? —digo—. ¿Es una hermana de estas? Porque el enojo fácil me parece una cosa, la doblez de ánimo otra, y la tristeza otra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: How, lord
  english_pob_choice: How, lord
  chosen_spanish: ¿Cómo, señor?
  alternatives_spanish:
  - ¿Cómo así, señor?
  - ¿De qué manera, señor?
  lexicon: interrogative adverb / vocative
  rationale: Conserva la extrañeza e interrogación del griego/inglés, con un vocativo natural en español. 'Señor' refleja el tratamiento respetuoso del interlocutor sin introducir 'Señor' como título divino.
- source_word: is it a sister of these
  english_pob_choice: is it a sister of these
  chosen_spanish: ¿Acaso es una hermana de estas?
  alternatives_spanish:
  - ¿Es una hermana de estas?
  - ¿Es como una hermana de estas?
  lexicon: sister / sister of these
  rationale: Mantiene la formulación enigmática y breve del original, sin explicarla de más. 'Hermana' sigue el lenguaje relacional del texto; 'de estas' conserva la deíxis del grupo mencionado.
- source_word: quick temper
  english_pob_choice: quick temper
  chosen_spanish: la ira rápida
  alternatives_spanish:
  - el pronto enojo
  - el mal genio
  - la cólera rápida
  lexicon: anger / quick-temperedness
  rationale: '''Ira rápida'' conserva la fuerza lexical y la cualidad de prontitud del término, evitando diluirlo en una parafrasis. ''Ira'' es más fuerte y más cercano al registro de vicios morales del pasaje que ''mal genio''.'
- source_word: double-mindedness
  english_pob_choice: double-mindedness
  chosen_spanish: la doblez de ánimo
  alternatives_spanish:
  - la doble mente
  - la indecisión
  - la duplicidad de ánimo
  lexicon: double-mindedness
  rationale: '''Doblez de ánimo'' reproduce la imagen de duplicidad interior sin convertirla en mera indecisión psicológica. Conserva la tensión moral del término, más que un simple vacilar.'
- source_word: sorrow
  english_pob_choice: sorrow
  chosen_spanish: la tristeza
  alternatives_spanish:
  - el dolor
  - la aflicción
  - la pena
  lexicon: sorrow
  rationale: '''Tristeza'' es la opción más directa y sobria en español para el estado anímico nombrado por el texto, sin cargarlo con matices excesivamente emotivos o físicos.'
theological_decisions:
- issue: Relación entre los tres rasgos enumerados como distintos
  english_pob_reading: quick temper, double-mindedness, and sorrow are three distinct things
  chosen_spanish_reading: la ira rápida, la doblez de ánimo y la tristeza son tres cosas distintas
  alternative_spanish_readings:
  - la ira rápida, la doble mente y la tristeza
  - el pronto enojo, la indecisión y la tristeza
  rationale: La sintaxis española preserva la distinción triádica del texto, sin fusionar los rasgos ni convertirlos en una sola categoría moral. Esto respeta la observación del hablante de que no son equivalentes.
  doctrine_reference: No aplica; texto patrístico/extramural sobre virtudes y pasiones, no una formulación doctrinal canónica.
translation_notes:
  revision_awareness: No hay revisiones aplicadas ni aparato de variantes en el contexto suministrado; la versión española se apoya directamente en el texto griego subyacente tal como está reflejado por la traducción inglesa auditada.
  spanish_consistency_notes:
  - Se evita 'Cristo/Señor' como fórmula litúrgica; 'señor' aquí es vocativo humano.
  - Se mantiene un registro sobrio y directo, acorde con un intercambio breve de catequesis moral.
  - No se añade explicación interpretativa a 'hermana de estas' para preservar la ambigüedad del original.
