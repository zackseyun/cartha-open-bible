    rationale: 'El griego coordina tres infinitivos con el mismo objeto. En español, repetir el objeto implícito o integrarlo al último verbo mejora la naturalidad: «hacerla crecer, edificarla y gobernarla» o similar.'
  - severity: low
    issue: «Será llevada a su cumplimiento» suena menos idiomático que otras opciones
    rationale: Aunque transmite consumación, en español bíblico-natural resulta más fluido «será llevada a su consumación» o «será completada». «Consumación» preserva mejor el matiz teleológico señalado en la rationale.
  revised_spanish_text: '«Estos son los santos ángeles de Dios, los primeros creados, a quienes el Señor confió toda su creación, para hacerla crecer, edificarla y gobernarla. Por medio de ellos, pues, la edificación de la torre será llevada a su consumación».

    '
