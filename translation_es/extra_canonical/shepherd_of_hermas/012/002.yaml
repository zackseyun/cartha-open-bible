base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/012/002.yaml
  text: '"These are the holy angels of God, the first-created, to whom the Lord entrusted all his creation, to increase and to build and to rule over all creation. By these, therefore, the building of the tower will be brought to completion."'
translation:
  language: es
  text: «Estos son los santos ángeles de Dios, los primeros creados, a quienes el Señor confió toda su creación, para hacerla crecer, edificarla y gobernarla. Por medio de ellos, pues, la edificación de la torre será llevada a su consumación».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἅγιοι ἄγγελοι τοῦ θεοῦ
  english_pob_choice: the holy angels of God
  chosen_spanish: los santos ángeles de Dios
  alternatives_spanish:
  - los ángeles santos de Dios
  - los ángeles sagrados de Dios
  lexicon: ἅγιος, ἄγγελος, θεός
  rationale: «Santos» conserva el valor consagrado/divinamente apartados sin caer en una paráfrasis. «Ángeles de Dios» sigue de cerca la relación genitiva del griego y mantiene la formulación del POB inglés.
- source_word: πρωτόκτιστοι
  english_pob_choice: the first-created
  chosen_spanish: los primeros creados
  alternatives_spanish:
  - los primogénitos en ser creados
  - los creados primero
  lexicon: πρωτόκτιστος
  rationale: «Primeros creados» transmite de forma natural en español la prioridad temporal de la creación. Evita introducir ideas de supremacía doctrinal que el término por sí solo no exige.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: κύριος
  rationale: Aquí el texto griego usa κύριος en un contexto de cita/eco teológico sobre autoridad divina; el POB inglés conserva «Lord». En español, «el Señor» mantiene ese eco reverente sin forzar una identificación explícita con el nombre divino en este pasaje.
- source_word: πάσαν τὴν κτίσιν αὐτοῦ
  english_pob_choice: all his creation
  chosen_spanish: toda su creación
  alternatives_spanish:
  - toda la creación que es suya
  - toda su criatura
  lexicon: κτίσις
  rationale: «Toda su creación» reproduce la amplitud total del objeto confiado y conserva la posesión divina expresada por el pronombre.
- source_word: αὐξάνειν καὶ οἰκοδομεῖν καὶ κυριεύειν
  english_pob_choice: to increase and to build and to rule over
  chosen_spanish: para aumentarla, edificarla y gobernar sobre
  alternatives_spanish:
  - para hacerla crecer, construirla y dominar sobre
  - para incrementarla, edificarla y regir sobre
  lexicon: αὐξάνω, οἰκοδομέω, κυριεύω
  rationale: Se opta por verbos directos y coordinados que reflejan la serie verbal del griego. «Aumentarla» conserva el sentido de hacer crecer; «edificarla» respeta el lenguaje de construcción del contexto; «gobernar sobre» evita una carga más dura de «dominar» que podría sobrerrepresentar κυριεύειν en español.
- source_word: ὑπ' αὐτῶν οὖν
  english_pob_choice: By these, therefore
  chosen_spanish: Por medio de ellos, pues
  alternatives_spanish:
  - Así pues, por ellos
  - Por ellos, por tanto
  lexicon: ὑπό, οὖν
  rationale: «Por medio de ellos» expresa instrumentación, que es el punto funcional de la preposición en este contexto. «Pues» reproduce la partícula inferencial οὖν con naturalidad en español.
- source_word: οἰκοδομὴ τοῦ πύργου
  english_pob_choice: the building of the tower
  chosen_spanish: la edificación de la torre
  alternatives_spanish:
  - la construcción de la torre
  - el edificio de la torre
  lexicon: οἰκοδομή, πύργος
  rationale: «Edificación» mantiene el registro eclesial-constructivo del original y del inglés POB, y evita la posible ambigüedad de «edificio». «Torre» es la traducción directa y estable de πύργος.
- source_word: συντελεσθήσεται
  english_pob_choice: will be brought to completion
  chosen_spanish: será llevada a su cumplimiento
  alternatives_spanish:
  - será completada
  - quedará terminada
  lexicon: συντελέω
  rationale: «Llevada a su cumplimiento» conserva el tono formal y teleológico de la forma pasiva futura, y refleja mejor que «terminada» la idea de consumación plena del proceso.
theological_decisions:
- issue: Identidad de los «ángeles santos de Dios» y su relación con la autoridad delegada
  english_pob_reading: The Lord entrusted all his creation to these first-created holy angels to increase, build, and rule over it.
  chosen_spanish_reading: El Señor confió toda su creación a estos ángeles santos y primeros creados como administradores delegados de su obra.
  alternative_spanish_readings:
  - El Señor les encomendó toda su creación para que la aumentaran, edificaran y gobernaran
  - El Señor puso su creación bajo su cuidado
  rationale: 'La redacción española conserva explícitamente la delegación de autoridad sin suavizarla. No se introduce una doctrina ajena: el pasaje presenta una función encomendada a estos ángeles dentro del relato, y la traducción mantiene esa tensión sin resolverla teológicamente.'
  doctrine_reference: Ángeles; providencia divina; delegación de gobierno creado
- issue: Término inferencial final y consumación de la torre
  english_pob_reading: the building of the tower will be brought to completion.
  chosen_spanish_reading: la edificación de la torre será llevada a su cumplimiento
  alternative_spanish_readings:
  - la construcción de la torre será completada
  - la torre quedará terminada
  rationale: «Llevada a su cumplimiento» preserva la perspectiva de proceso culminado por una acción externa o providencial, en vez de reducirlo a un simple acabado material. Esto mantiene la fuerza narrativa y simbólica de la torre en Hermas.
  doctrine_reference: Escatología simbólica del relato; consumación
translation_notes:
  revision_awareness: Se siguió el texto griego normalizado y el audit trail inglés con acuerdo alto; no hubo revisiones aplicadas ni variantes textuales destacadas en el paquete actual. La redacción española conserva la estructura sintáctica del original y el valor funcional de las series verbales.
  spanish_consistency_notes:
  - Se mantiene «Señor» en esta sección por corresponder al griego κύριος y al POB inglés, sin sustituirlo por «Yahvé» en ausencia de un marcador textual explícito del nombre divino en el segmento.
  - Se evita «Cristo» porque el pasaje no lo contiene; «ángeles de Dios» y «el Señor» bastan para el sentido del texto.
  - «Edificación» se usa de manera consistente con el vocabulario constructivo simbólico de Hermas.
  - Se conserva un registro reverente pero claro, apto para lectura eclesial moderna.
