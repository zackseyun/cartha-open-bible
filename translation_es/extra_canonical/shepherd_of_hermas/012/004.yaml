- from: «También ellos son ángeles santos de Dios; pero estos seis son superiores a ellos. Luego se llevará a cabo la construcción de la torre, y todos juntos se alegrarán alrededor de la torre y glorificarán a Dios, porque se ha completado la construcción de la torre» .
