base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/012/004.yaml
  text: '"They too are holy angels of God; but these six are superior to them. The building of the tower, then, will be brought to completion, and all together will rejoice around the tower and will glorify God, because the building of the tower has been completed."'
translation:
  language: es
  text: «También ellos son ángeles santos de Dios; pero estos seis son superiores a ellos. Luego se completará la construcción de la torre, y todos juntos se alegrarán alrededor de la torre y glorificarán a Dios, porque se ha completado la construcción de la torre».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: holy angels of God
  english_pob_choice: holy angels of God
  chosen_spanish: ángeles santos de Dios
  alternatives_spanish:
  - ángeles sagrados de Dios
  - santos ángeles de Dios
  lexicon: ἅγιοι ἄγγελοι τοῦ θεοῦ
  rationale: Conservo el sentido directo de santidad con «santos» y la relación posesiva con «de Dios». «Ángeles santos» suena natural en español y sigue de cerca la estructura del original sin cambiar el matiz.
- source_word: these six are superior to them
  english_pob_choice: these six are superior to them
  chosen_spanish: estos seis son superiores a ellos
  alternatives_spanish:
  - estos seis los superan
  - estos seis están por encima de ellos
  lexicon: οὗτοι οἱ ἕξ ὑπερέχουσιν αὐτῶν
  rationale: «Superiores a ellos» preserva la idea comparativa de preeminencia sin añadir una jerarquía más fuerte de la que exige el griego.
- source_word: the building of the tower will be brought to completion
  english_pob_choice: The building of the tower ... will be brought to completion
  chosen_spanish: la construcción de la torre ... se llevará a cabo / se completará
  alternatives_spanish:
  - la edificación de la torre será terminada
  - la obra de la torre llegará a su fin
  lexicon: ἡ οἰκοδομὴ τοῦ πύργου τελειωθήσεται
  rationale: «Se llevará a cabo» enmarca el proceso y «se ha completado» al final refleja la consumación. «Construcción» traduce con claridad οἰκοδομή en español actual.
- source_word: will rejoice around the tower
  english_pob_choice: will rejoice around the tower
  chosen_spanish: se alegrarán alrededor de la torre
  alternatives_spanish:
  - se regocijarán alrededor de la torre
  - se gozarán alrededor de la torre
  lexicon: περὶ τὸν πύργον χαρήσονται
  rationale: «Se alegrarán» comunica bien la respuesta comunitaria y es más natural que un calco solemne; «alrededor de la torre» mantiene la imagen espacial.
- source_word: will glorify God
  english_pob_choice: will glorify God
  chosen_spanish: glorificarán a Dios
  alternatives_spanish:
  - darán gloria a Dios
  - alabarán a Dios
  lexicon: δοξάσουσιν τὸν θεόν
  rationale: «Glorificarán a Dios» es la correspondencia directa y conserva el valor doxológico del verbo.
theological_decisions:
- issue: Identidad y estatus de los ángeles
  english_pob_reading: They too are holy angels of God; but these six are superior to them.
  chosen_spanish_reading: También ellos son ángeles santos de Dios; pero estos seis son superiores a ellos.
  alternative_spanish_readings:
  - También ellos son ángeles sagrados de Dios; pero estos seis los superan.
  rationale: Mantengo la afirmación literal del texto sin suavizar la distinción de rango entre los grupos angélicos. No se añade más explicación doctrinal de la que ofrece la fuente.
  doctrine_reference: Angelología; no definicional dogmática
- issue: Consumación de la torre como evento de finalización
  english_pob_reading: The building of the tower ... will be brought to completion ... because the building of the tower has been completed.
  chosen_spanish_reading: Luego se llevará a cabo la construcción de la torre ... porque se ha completado la construcción de la torre.
  alternative_spanish_readings:
  - Luego se terminará la edificación de la torre ... porque la edificación de la torre ha sido terminada.
  rationale: 'Conservo la tensión temporal del pasaje: futuro de consumación y motivo en perfecto/resultativo. Esto evita borrar el énfasis en el cierre definitivo de la obra.'
  doctrine_reference: Escatología simbólica del pasaje; fidelidad aspectual
- issue: Gloria dada a Dios como respuesta comunitaria
  english_pob_reading: all together will rejoice around the tower and will glorify God
  chosen_spanish_reading: todos juntos se alegrarán alrededor de la torre y glorificarán a Dios
  alternative_spanish_readings:
  - todos juntos se regocijarán alrededor de la torre y darán gloria a Dios
  rationale: Preservo la acción conjunta y la respuesta de alabanza como consecuencia del cumplimiento de la obra. «Todos juntos» refleja la totalidad comunitaria del griego.
  doctrine_reference: Liturgia/adoración; doxología
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; la versión española se mantiene alineada con el texto griego normalizado y con la traducción inglesa POB de referencia, sin necesidad de correcciones textuales documentadas.
  spanish_consistency_notes:
  - Uso «torre» de manera constante para πύργος.
  - Conservo «Dios» sin mayúsculas reverenciales añadidas más allá de la norma española.
  - Mantengo el tono narrativo-profético sin introducir términos eclesiásticos no presentes en la fuente.
