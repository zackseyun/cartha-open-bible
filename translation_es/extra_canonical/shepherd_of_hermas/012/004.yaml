  rationale: Se corrige la primera mención de la torre para reflejar explícitamente el valor de culminación de τελειωθήσεται y se normaliza la puntuación final. No hacen falta notas al pie, porque no hay ambigüedad nueva en español ni alternativas preservadas por el POB inglés.
