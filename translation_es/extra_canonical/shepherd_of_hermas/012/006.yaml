  - severity: medium
    issue: '''Poderosas'' en la tríada final no refleja bien la idea de solidez'
    rationale: El contexto y el POB inglés ('strong and sure and well-founded') apuntan a firmeza, seguridad y fundamento. 'Poderosas' sugiere capacidad o fuerza activa más que estabilidad confiable.
