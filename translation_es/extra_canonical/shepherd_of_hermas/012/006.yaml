base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/012/006.yaml
  text: Answering me, she says, "It is not because you are more worthy than all that it is revealed to you; for there are others before you and better than you, to whom it was fitting that these visions should be revealed. But in order that the name of God might be glorified, it has been revealed to you and will be revealed, for the sake of the double-minded—those who reason within their hearts whether these things are so or not. Tell them that all these things are true, and nothing is outside the truth; rather, all are strong and sure and well-founded."
translation:
  language: es
  text: 'Respondiéndome, ella dice: «No se te ha revelado porque seas más digno que todos; pues hay otros antes que tú y mejores que tú, a quienes convenía que se les revelaran estas visiones. Pero para que el nombre de Dios sea glorificado, se te ha revelado y se te revelará, por causa de los de doble ánimo[a] —los que razonan dentro de su corazón si estas cosas son así o no—. Diles que todas estas cosas son verdaderas, y nada está fuera de la verdad; más bien, todas son firmes, seguras y bien fundadas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De doble ánimo» traduce una expresión tradicional para quienes están interiormente divididos entre dos pensamientos o lealtades.
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιος / ἄξιος (idea de “más digno”)
  english_pob_choice: more worthy
  chosen_spanish: más digno
  alternatives_spanish:
  - más merecedor
  - más valioso
  lexicon: digno
  rationale: La idea del texto es de mérito o idoneidad, no de valor intrínseco. «Más digno» conserva la comparación de merecimiento que refleja el inglés auditado y su trasfondo griego.
- source_word: ἐνδείκνυται / ἀποκαλύπτεται (idea de “it is revealed”)
  english_pob_choice: it is revealed / will be revealed
  chosen_spanish: se te ha revelado / se te revelará
  alternatives_spanish:
  - se te da a conocer / se te dará a conocer
  - te ha sido revelado / te será revelado
  lexicon: revelar
  rationale: «Revelar» mantiene la pasiva divina y el carácter de comunicación de un misterio o visión. La forma pronominal en español comunica bien la pasividad sin volver la frase artificial.
- source_word: ὄνομα τοῦ θεοῦ
  english_pob_choice: the name of God
  chosen_spanish: el nombre de Dios
  alternatives_spanish:
  - el nombre de Dios Padre
  - el nombre divino
  lexicon: nombre de Dios
  rationale: Se conserva literalmente la expresión para no diluir el motivo teológico del honor público debido al nombre divino.
- source_word: δίψυχοι / double-minded
  english_pob_choice: the double-minded
  chosen_spanish: los de doble ánimo
  alternatives_spanish:
  - los indecisos
  - los de mente dividida
  lexicon: doble ánimo
  rationale: «Doble ánimo» es el equivalente tradicional en español bíblico y comunica la división interior sin sustituirla por una paráfrasis psicológica.
- source_word: λογιζόμενοι ἐν ταῖς καρδίαις αὐτῶν
  english_pob_choice: those who reason within their hearts
  chosen_spanish: los que razonan dentro de su corazón
  alternatives_spanish:
  - los que discurren en su corazón
  - los que se preguntan en su corazón
  lexicon: razonar en el corazón
  rationale: La formulación conserva la imagen semítica de deliberación interior. «Razonan» evita reducirlo solo a sentir o dudar y mantiene la tensión cognitiva del original.
- source_word: ἀληθῆ / ἀλήθειας
  english_pob_choice: true / the truth
  chosen_spanish: verdaderas / la verdad
  alternatives_spanish:
  - ciertas / la verdad
  - auténticas / la verdad
  lexicon: verdad
  rationale: El texto enfatiza tanto veracidad factual como conformidad con la verdad. «Verdaderas» y «la verdad» preservan ese campo semántico sin excesiva reinterpretación.
- source_word: στερεά, ἀσφαλῆ, καὶ εὐθεῖα / well-founded, strong, and sure
  english_pob_choice: strong and sure and well-founded
  chosen_spanish: poderosas, seguras y bien fundadas
  alternatives_spanish:
  - fuertes, seguras y bien fundadas
  - firmes, seguras y bien fundadas
  lexicon: firmes / seguras / bien fundadas
  rationale: La triple serie final expresa solidez y confiabilidad. «Poderosas» rinde bien la fuerza efectiva del término sin perder el sentido de estabilidad, y «bien fundadas» comunica base sólida.
theological_decisions:
- issue: 'Razón de la revelación: no por superioridad del vidente sino para glorificar el nombre de Dios y beneficiar a los de doble ánimo'
  english_pob_reading: not because you are more worthy ... but in order that the name of God might be glorified ... for the sake of the double-minded
  chosen_spanish_reading: No se te ha revelado porque seas más digno... sino para que el nombre de Dios sea glorificado... por causa de los de doble ánimo
  alternative_spanish_readings:
  - No se te ha revelado por ser superior...
  - '...a fin de glorificar el nombre de Dios...'
  rationale: 'La redacción mantiene la contraposición entre mérito personal y propósito divino, que es el núcleo pastoral y teológico del pasaje. También conserva el destinatario secundario del mensaje: los indecisos o divididos interiormente.'
  doctrine_reference: revelación divina; humildad; edificación de la comunidad
- issue: Afirmación de la verdad y estabilidad de las visiones
  english_pob_reading: all these things are true, and nothing is outside the truth; rather, all are strong and sure and well-founded
  chosen_spanish_reading: todas estas cosas son verdaderas, y nada está fuera de la verdad; más bien, todas son poderosas, seguras y bien fundadas
  alternative_spanish_readings:
  - nada se aparta de la verdad
  - todo es firme y seguro
  rationale: Se preserva la afirmación fuerte de verdad total sin suavizar el absoluto retórico del original. La triple calificación final se mantiene para reflejar la insistencia en la confiabilidad de las visiones.
  doctrine_reference: verdad revelada; autoridad de la visión; certeza
translation_notes:
  revision_awareness: 'El texto base en inglés no incluye notas; la redacción española sigue de cerca la traducción auditada y mantiene sus tensiones principales: mérito insuficiente del vidente, propósito doxológico de la revelación, audiencia de los indecisos y triple afirmación de verdad/solidez. No se reportan revisiones aplicadas en el paquete de referencia.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» como designación directa del referente divino, conforme al paquete de terminología del proyecto.
  - Se usó «doble ánimo» en lugar de una paráfrasis moderna para conservar el eco bíblico y la fuerza moral de la expresión.
  - La clausula final preserva una tríada de cualidades para respetar el relieve retórico del original.
