  text: 3. I asked her, saying, "Lady, I wished to know the outcome of the stones and their power—what sort it is."
translation:
  language: es
  text: '3. Le pregunté: «Señora, deseaba saber el resultado de las piedras y su poder, de qué clase es».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: asked her, saying
  english_pob_choice: I asked her, saying
  chosen_spanish: Le pregunté, diciendo
  alternatives_spanish:
  - Le pregunté
  - Yo le pregunté
  lexicon: λέγω / ἐρωτάω
  rationale: Conserva la estructura narrativa del original y la formulación directa del discurso. En español, «le pregunté, diciendo» suena algo solemne pero sigue siendo natural en un registro bíblico; mantiene la relación entre el acto de preguntar y la cita siguiente.
- source_word: Lady
  english_pob_choice: Lady
  chosen_spanish: Señora
  alternatives_spanish:
  - Dama
  - Señora
  lexicon: κυρία
  rationale: «Señora» comunica el tratamiento respetuoso de la interlocutora sin sonar demasiado moderno ni demasiado cortesano. «Dama» sería posible, pero en español puede sonar más social que honorífico; «Señora» es más neutro y fiel al tono.
- source_word: wished to know
  english_pob_choice: I wished to know
  chosen_spanish: deseaba saber
  alternatives_spanish:
  - quería saber
  - anhelaba saber
  lexicon: βούλομαι / θέλω + γινώσκω
  rationale: «Deseaba saber» transmite deseo e intención sin intensificar indebidamente el matiz. «Quería saber» también es viable, pero «deseaba» mantiene un tono ligeramente más literario acorde con la obra.
- source_word: the outcome
  english_pob_choice: the outcome
  chosen_spanish: el resultado
  alternatives_spanish:
  - el desenlace
  - el fin
  lexicon: τέλος / ἀποτέλεσμα
  rationale: El griego apunta al efecto o resultado de las piedras, no necesariamente a un final escatológico. «Resultado» es la opción más directa y transparente; «desenlace» sonaría más interpretativo.
- source_word: the stones
  english_pob_choice: the stones
  chosen_spanish: las piedras
  alternatives_spanish:
  - las piedras
  lexicon: λίθοι
  rationale: Se conserva el término literal porque el contexto no exige especificación adicional.
- source_word: their power—what sort it is
  english_pob_choice: and their power—what sort it is
  chosen_spanish: 'y su poder: qué clase de poder es'
  alternatives_spanish:
  - y su poder, de qué clase es
  - 'y su poder: qué tipo de poder tiene'
  lexicon: δύναμις / ποιός
  rationale: 'Se mantiene la doble pregunta del original: primero el poder en sí, luego su clase o tipo. «Qué clase de poder es» conserva la indagación cualitativa sin sobreexplicar.'
theological_decisions:
- issue: No hay tensión doctrinal explícita; el pasaje es interrogativo y visionario.
  english_pob_reading: I asked her, saying, "Lady, I wished to know the outcome of the stones and their power—what sort it is."
  chosen_spanish_reading: Le pregunté a la Señora por el resultado y la clase de poder de las piedras.
  alternative_spanish_readings:
  - Le pregunté a la Señora cuál sería el desenlace de las piedras y cuál era su poder.
  rationale: Se preserva el carácter de consulta visionaria sin añadir explicación doctrinal. La traducción evita convertir la pregunta en una afirmación interpretativa.
  doctrine_reference: None
- issue: Tratamiento honorífico de la interlocutora.
  english_pob_reading: Lady
  chosen_spanish_reading: Señora
  alternative_spanish_readings:
  - Dama
  rationale: No implica culto ni título teológico; es un tratamiento respetuoso dentro de la visión. «Señora» es suficientemente elevado sin introducir connotaciones no presentes en el texto.
  doctrine_reference: None
translation_notes:
  revision_awareness: This draft follows the high-agreement English POB rendering and the Greek source closely. No applied revisions were listed, and the only review note concerns minor issues, which are addressed here by keeping the syntax close to the source while making the Spanish fully readable.
  spanish_consistency_notes:
  - Se conserva un registro reverente y sobrio, adecuado para una obra visionaria.
  - «Señora» se usa como tratamiento honorífico consistente con el uso en visiones narrativas.
  - «Resultado» y «poder» se mantienen sin expansión interpretativa.
