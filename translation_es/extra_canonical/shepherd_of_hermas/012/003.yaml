  text: 2. "And the others who are carrying the stones—who are they?"
translation:
  language: es
  text: 2. «¿Y los demás que llevan las piedras, quiénes son?»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ λοιποί
  english_pob_choice: the others
  chosen_spanish: los demás
  alternatives_spanish:
  - los otros
  - los restantes
  lexicon: λοιπός
  rationale: «Los demás» expresa de forma natural el grupo restante al que se alude en español, sin añadir matiz interpretativo. Mantiene la referencia relacional de «the others» en el contexto de una enumeración.
- source_word: οἱ κομίζοντες τὰς λίθους
  english_pob_choice: who are carrying the stones
  chosen_spanish: que llevan las piedras
  alternatives_spanish:
  - que cargan las piedras
  - que transportan las piedras
  lexicon: κομίζω
  rationale: Se eligió «llevan» para conservar la idea simple de portar/cargar propia de κομίζω en este contexto, con un español fluido y digno. «Cargan» también sería posible, pero puede sugerir mayor esfuerzo físico que el griego no exige necesariamente.
- source_word: λίθους
  english_pob_choice: the stones
  chosen_spanish: las piedras
  alternatives_spanish:
  - las rocas
  lexicon: λίθος
  rationale: «Piedras» es la equivalencia normal y más transparente en español para λίθοις/λίθους en este contexto visionario.
theological_decisions:
- issue: Identificación indefinida de los portadores de piedras
  english_pob_reading: who are they?
  chosen_spanish_reading: ¿quiénes son?
  alternative_spanish_readings:
  - ¿quiénes serán?
  - ¿quiénes son esos?
  rationale: No se añade identificación ni aclaración teológica al interrogante. El griego y el inglés presentan una pregunta abierta, así que el español conserva la indeterminación.
  doctrine_reference: Principio de sobriedad exegética; no se explicitan identificaciones no dadas por el texto.
translation_notes:
  revision_awareness: No hay revisiones aplicadas ni variantes textuales registradas en el paquete. La redacción sigue de cerca el inglés POB auditado y se ajusta al griego normalizado sin introducir glosa interpretativa.
  spanish_consistency_notes:
  - Se mantiene «piedras» de forma consistente para λίθοις/λίθους.
  - Se conserva el tono interrogativo directo del original.
  - No se usa terminología eclesiástica añadida; el registro es sobrio y narrativo.
