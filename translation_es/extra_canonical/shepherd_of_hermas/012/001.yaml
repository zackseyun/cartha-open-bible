  yaml_path: translation/extra_canonical/shepherd_of_hermas/012/001.yaml
  text: Answering, I say to her, "Lady, this matter is great and marvelous. And the six young men who are building—who are they, Lady?"
translation:
  language: es
  text: 'Respondiendo, le dije: «Señora, este asunto es grande y admirable. Y los seis jóvenes que están construyendo, ¿quiénes son, Señora?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀποκριθεὶς / Answering
  english_pob_choice: Answering
  chosen_spanish: Respondiendo
  alternatives_spanish:
  - Y respondiendo
  - Entonces respondí
  lexicon: ἀποκρίνομαι
  rationale: El participio griego introduce la respuesta de manera directa; en español, «Respondiendo» conserva la relación narrativa sin añadir énfasis innecesario. «Entonces respondí» es posible, pero suaviza la forma participial del original.
- source_word: δέσποινα / Lady
  english_pob_choice: Lady
  chosen_spanish: Señora
  alternatives_spanish:
  - Dama
  - Señora mía
  lexicon: δέσποινα
  rationale: En este contexto visionario y de respeto, «Señora» reproduce el trato reverencial del vocativo sin sobrecargarlo con formulaciones devocionales posteriores. «Dama» suena más distante en español; «Señora mía» añade un matiz que el texto no exige.
- source_word: πρᾶγμα
  english_pob_choice: matter
  chosen_spanish: asunto
  alternatives_spanish:
  - cosa
  - tema
  lexicon: πρᾶγμα
  rationale: «Asunto» expresa bien la referencia a una cuestión o realidad importante. «Cosa» sería demasiado general; «tema» suena más abstracto que el original.
- source_word: μέγας καὶ θαυμαστός
  english_pob_choice: great and marvelous
  chosen_spanish: grande y admirable
  alternatives_spanish:
  - grande y maravilloso
  - grande y asombroso
  lexicon: μέγας; θαυμαστός
  rationale: «Admirable» preserva el valor de algo digno de asombro y aprecio, sin forzar una solemnidad excesiva. «Maravilloso» es válido, pero en español puede sonar más emotivo que el griego; «asombroso» enfatiza el impacto, pero pierde el tono de admiración.
- source_word: οἱ ἓξ νεανίσκοι
  english_pob_choice: the six young men
  chosen_spanish: los seis jóvenes
  alternatives_spanish:
  - los seis muchachos
  - los seis mozos
  lexicon: νεανίσκος
  rationale: «Jóvenes» es la opción más natural y fiel para νεανίσκος en español actual. «Muchachos» puede sonar más coloquial; «mozos» es menos universalmente transparente.
- source_word: οἰκοδομοῦντες
  english_pob_choice: who are building
  chosen_spanish: que están construyendo
  alternatives_spanish:
  - que construyen
  - que edifican
  lexicon: οἰκοδομέω
  rationale: «Están construyendo» conserva el aspecto progresivo implícito en la escena visual y hace natural la frase en español. «Construyen» es correcto pero menos vívido; «edifican» podría sonar más eclesiástico que descriptivo.
theological_decisions:
- issue: Vocativo reverencial hacia la figura femenina ('Lady')
  english_pob_reading: Lady
  chosen_spanish_reading: Señora
  alternative_spanish_readings:
  - Dama
  - Señora mía
  rationale: La elección mantiene un trato respetuoso y jerárquico sin añadir una identificación doctrinal que el texto no ofrece en este versículo.
  doctrine_reference: Respeto narrativo y registro visionario; no se requiere lectura doctrinal específica.
translation_notes:
  revision_awareness: El inglés POB no llevaba notas ni decisiones léxicas explícitas; la redacción española sigue de cerca la sintaxis del texto fuente griego, manteniendo el vocativo repetido y la pregunta final sin expansión interpretativa.
  spanish_consistency_notes:
  - Se conserva el vocativo repetido «Señora» para mantener la coherencia del discurso directo.
  - Se usa «construyendo» para reflejar la acción en curso de los jóvenes sin introducir glosa explicativa.
