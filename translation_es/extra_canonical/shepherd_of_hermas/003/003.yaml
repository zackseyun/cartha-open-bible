  to: 'Después de decir estas palabras, me dice: «¿Quieres oírme leer?». Y yo digo: «Sí, deseo». Me dice: «Hazte oyente y escucha las glorias de Dios». Oí cosas grandes y maravillosas que no pude recordar, porque todas las palabras eran terribles, cosas que un ser humano no puede soportar. Así que recordé las últimas palabras, porque eran provechosas y apacibles para nosotros:'
