  yaml_path: translation/extra_canonical/shepherd_of_hermas/003/003.yaml
  text: 'After she had stopped these words, she says to me, “Do you wish to hear me reading?” And I say, “I do, Lady.” She says to me, “Become a hearer, and hear the glories of God.” I heard great and wondrous things which I was not able to remember; for all the words were terrifying—things a human being is not able to bear. So I remembered the last words, for they were beneficial and gentle for us:'
translation:
  language: es
  text: 'Después de decir estas palabras, me dice: «¿Quieres oírme leer?». Y yo digo: «Sí, deseo». Me dice: «Hazte oyente y escucha las glorias de Dios». Oí cosas grandes y maravillosas que no pude recordar, porque todas las palabras eran terribles, cosas que un ser humano no puede soportar. Así que recordé las últimas palabras, porque eran provechosas y apacibles para nosotros:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λέγει / says
  english_pob_choice: she says to me
  chosen_spanish: me dice
  alternatives_spanish:
  - me dijo
  - dice a mí
  lexicon: λέγω
  rationale: Se mantiene el presente narrativo del griego y de la POB inglesa, que conserva vivacidad directa en el diálogo.
- source_word: ἀκροατής / hearer
  english_pob_choice: Become a hearer
  chosen_spanish: Hazte oyente
  alternatives_spanish:
  - Conviértete en oyente
  - Llega a ser oyente
  lexicon: ἀκροατής
  rationale: «Oyente» comunica bien el sustantivo funcional en español moderno sin añadir matices eclesiásticos ajenos; «hazte» preserva el imperativo de volverse/ponerse en ese estado.
- source_word: δόξας τοῦ θεοῦ / glories of God
  english_pob_choice: the glories of God
  chosen_spanish: las glorias de Dios
  alternatives_spanish:
  - las glorias de Dios [a]
  - las maravillas gloriosas de Dios
  lexicon: δόξα
  rationale: Se conserva el plural y la fuerza de 'glorias' como manifestaciones de honor/esplendor divino, sin suavizarlo a 'alabanzas' o 'grandezas'.
- source_word: φοβερά / terrifying
  english_pob_choice: terrifying
  chosen_spanish: terribles
  alternatives_spanish:
  - espantosas
  - atemorizantes
  lexicon: φοβερός
  rationale: «Terribles» mantiene el valor fuerte de algo sobrecogedor y temible, más sobrio y fiel al registro que opciones más coloquiales.
- source_word: ἀνθρώπου / human being
  english_pob_choice: a human being
  chosen_spanish: un ser humano
  alternatives_spanish:
  - un hombre
  - una persona
  lexicon: ἄνθρωπος
  rationale: «Ser humano» expresa el género inclusivo del griego y evita restringirlo innecesariamente a varón.
- source_word: οὐ δύναται βαστάσαι / is not able to bear
  english_pob_choice: is not able to bear
  chosen_spanish: no puede soportar
  alternatives_spanish:
  - no puede llevar
  - no puede aguantar
  lexicon: δύναμαι + βαστάζω
  rationale: «Soportar» comunica bien la incapacidad de resistir o cargar algo tan pesado en español natural.
- source_word: ἔσχατα / last words
  english_pob_choice: the last words
  chosen_spanish: las últimas palabras
  alternatives_spanish:
  - las palabras finales
  - las postreras palabras
  lexicon: ἔσχατος
  rationale: «Últimas palabras» es la equivalencia directa y natural en español.
- source_word: ὠφέλιμα καὶ πραεῖα / beneficial and gentle
  english_pob_choice: beneficial and gentle
  chosen_spanish: beneficiosas y suaves
  alternatives_spanish:
  - útiles y apacibles
  - provechosas y mansedumbres
  lexicon: ὠφέλιμος + πραΰς
  rationale: 'Se conserva la dualidad semántica: utilidad real y tono apacible. «Suaves» refleja la mansedumbre/benignidad con un español claro y no técnico.'
theological_decisions:
- issue: Modo de referencia a Dios
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Dios
  - Señor
  rationale: Se mantiene la referencia directa y sin máscara litúrgica, conforme al estándar del proyecto y al griego θεός.
  doctrine_reference: Nombre divino y teología del discurso directo
translation_notes:
  revision_awareness: No se introdujeron notas al pie porque el texto no presenta una variante o ambigüedad que requiera anclaje explícito; se corrigió la validación anterior evitando marcadores sin ancla en el texto.
  spanish_consistency_notes:
  - Se mantuvo el presente narrativo en los verbos de habla para reflejar el estilo del pasaje.
  - «Señora» traduce el vocativo respetuoso de la interlocutora según la POB inglesa.
  - Se evitó el término eclesiástico 'Señor' para no desdibujar la dirección del diálogo ni añadir una convención no atestiguada en este segmento.
