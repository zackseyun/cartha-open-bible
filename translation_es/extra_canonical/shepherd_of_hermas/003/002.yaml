revisions:
- from: Pero la abundante compasión del Señor ha tenido misericordia de ti y de tu casa, y él te fortalecerá y te afirmará en su gloria. Solo no seas perezoso, sino cobra ánimo y fortalece a tu casa. Porque, así como el herrero, al martillar su obra, domina lo que se ha propuesto hacer, así también la palabra justa, pronunciada cada día, prevalece sobre toda maldad. No ceses, por tanto, de amonestar a tus hijos; porque sé que, si se arrepienten con todo el corazón, serán escritos en los libros de la vida con los santos.
  to: Pero la abundante compasión del Señor se compadeció de ti y de tu casa, y él te fortalecerá y te afirmará en su gloria. Solo no seas perezoso, sino cobra ánimo y fortalece a tu casa. Porque, así como el herrero, al martillar su obra, domina lo que se ha propuesto hacer, así también la palabra justa, pronunciada cada día, prevalece sobre toda maldad. No ceses, por tanto, de amonestar a tus hijos; porque sé que, si se arrepienten con todo el corazón, serán inscritos en los libros de la vida con los santos.
  rationale: 'Se hacen dos reparaciones menores: 1) se reemplaza ''ha tenido misericordia'' por ''se compadeció'' para evitar pesadez y mantener el campo semántico de compasión/misericordia con español más natural; 2) se reemplaza ''serán escritos'' por ''serán inscritos'' para reflejar mejor la imagen de registro en los libros de la vida. No se requieren cambios teológicos ni notas.'
