review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego según la audit trail inglesa: compasión/misericordia, fortalecimiento y establecimiento, exhortación a no aflojar, metáfora del herrero, eficacia de la palabra justa, amonestación de los hijos y arrepentimiento que lleva a ser escritos con los santos en los libros de la vida. No obstante, hay dos ajustes de fidelidad y claridad: en español suena más natural y preciso ''se compadeció'' que ''ha tenido misericordia'' tras ''la abundante compasión''; y ''serán inscritos'' refleja mejor la imagen de registro en libros que ''serán escritos''.'
  spanish_quality_summary: El español es generalmente claro, digno y bien legible. La cadencia es buena y evita calcos excesivamente rígidos. Sin embargo, 'ha tenido misericordia' después de 'compasión' resulta algo pesado, y 'serán escritos en los libros' suena menos idiomático que 'serán inscritos en los libros'. El resto del texto es natural y apropiado para un registro eclesial amplio.
  glossary_alignment: La terminología está mayormente alineada con el proyecto. 'el Señor' es una excepción justificable aquí porque la fuente inmediata usa κύριος como título y no hay evidencia de que deba forzarse 'Yahvé'. 'palabra justa', 'arrepienten', 'maldad', 'santos' y el plural 'libros de la vida' respetan bien las decisiones documentadas. No se requieren notas nuevas.
  issues:
  - severity: medium
    issue: '''ha tenido misericordia'' tras ''abundante compasión'' suena redundante y menos idiomático'
    rationale: La combinación preserva dos ideas del original, pero en español 'se compadeció' expresa mejor el acto de misericordia sin pesadez estilística y mantiene el paralelismo compasión/compadecerse.
  - severity: medium
    issue: '''serán escritos en los libros de la vida'' es menos natural que ''serán inscritos'''
    rationale: La metáfora es de registro celestial; 'inscritos' comunica con más precisión la idea de nombres asentados en libros, sin alterar el sentido fuente ni armonizar indebidamente con otras tradiciones.
  revised_spanish_text: Pero la abundante compasión del Señor se compadeció de ti y de tu casa, y él te fortalecerá y te afirmará en su gloria. Solo no seas perezoso, sino cobra ánimo y fortalece a tu casa. Porque, así como el herrero, al martillar su obra, domina lo que se ha propuesto hacer, así también la palabra justa, pronunciada cada día, prevalece sobre toda maldad. No ceses, por tanto, de amonestar a tus hijos; porque sé que, si se arrepienten con todo el corazón, serán inscritos en los libros de la vida con los santos.
  revision_rationale: 'Se hacen dos reparaciones menores: 1) se reemplaza ''ha tenido misericordia'' por ''se compadeció'' para evitar pesadez y mantener el campo semántico de compasión/misericordia con español más natural; 2) se reemplaza ''serán escritos'' por ''serán inscritos'' para reflejar mejor la imagen de registro en los libros de la vida. No se requieren cambios teológicos ni notas.'
