base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/003/002.yaml
  text: But the Lord’s abundant compassion has had mercy on you and your household, and he will strengthen you and establish you in his glory. Only do not be slothful, but take heart and strengthen your household. For, as the blacksmith hammering his work masters the thing he intends, so also the righteous word spoken daily prevails over every wickedness. Do not, therefore, cease admonishing your children; for I know that if they repent with their whole heart, they will be written in the books of life with the holy ones.
translation:
  language: es
  text: Pero la abundante compasión del Señor se compadeció de ti y de tu casa, y él te fortalecerá y te afirmará en su gloria. Solo no seas perezoso, sino cobra ánimo y fortalece a tu casa. Porque, así como el herrero, al martillar su obra, domina lo que se ha propuesto hacer, así también la palabra justa, pronunciada cada día, prevalece sobre toda maldad. No ceses, por tanto, de amonestar a tus hijos; porque sé que, si se arrepienten con todo el corazón, serán inscritos en los libros de la vida con los santos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dueño
  lexicon: κύριος
  rationale: En este contexto el texto griego usa el título κύριος; aunque el proyecto prefiere Yahvé para el nombre divino, la formulación heredada en la audit trail es "the Lord" y aquí el título funciona como designación reverente del Dios que muestra compasión. En español, "el Señor" conserva esa relación textual y la cadencia del pasaje.
- source_word: ἐλεημοσύνη / οἶκτος (compassion/mercy)
  english_pob_choice: abundant compassion ... had mercy
  chosen_spanish: abundante compasión ... ha tenido misericordia
  alternatives_spanish:
  - gran compasión ... se ha compadecido
  - misericordia abundante ... tuvo misericordia
  lexicon: campo semántico de compasión/misericordia
  rationale: La doble idea de compasión y misericordia se mantiene sin simplificarla a un solo término. "Abundante compasión" refleja el énfasis cuantitativo de la frase inglesa, y "ha tenido misericordia" conserva el acto efectivo de favor inmerecido.
- source_word: οἶκος
  english_pob_choice: your household
  chosen_spanish: tu casa
  alternatives_spanish:
  - tu casa y familia
  - tu familia
  lexicon: οἶκος
  rationale: La POB inglesa usa "household"; en español, "tu casa" es una equivalencia bíblica natural que puede abarcar el núcleo familiar y la unidad doméstica sin forzar una paráfrasis moderna. Se conserva la posible amplitud doméstica de οἶκος.
- source_word: στηρίξει / στηρίξει σε
  english_pob_choice: he will strengthen you and establish you
  chosen_spanish: te fortalecerá y te afirmará
  alternatives_spanish:
  - te fortalecerá y te establecerá
  - te dará fuerza y te consolidará
  lexicon: στηρίζω
  rationale: '"Afirmar" comunica bien la idea de hacer firme, establecer con solidez, y evita una repetición demasiado literal de "establecer" en español. Mantiene la fuerza de dos verbos coordinados: fortalecer y dar estabilidad.'
- source_word: ἐν τῇ δόξῃ αὐτοῦ
  english_pob_choice: in his glory
  chosen_spanish: en su gloria
  alternatives_spanish:
  - dentro de su gloria
  - en la gloria de él
  lexicon: δόξα
  rationale: Se conserva la expresión directa y teológicamente cargada "en su gloria", que en español es clara y fiel a la fórmula griega.
- source_word: μὴ ὀκνῇς
  english_pob_choice: do not be slothful
  chosen_spanish: no seas perezoso
  alternatives_spanish:
  - no te vuelvas negligente
  - no te demores
  lexicon: ὀκνέω
  rationale: '"Perezoso" es el equivalente natural más cercano para la falta de diligencia o cobardía implícita en el verbo. Aunque "negligente" sería posible, la frase imperativa del pasaje pide una traducción más directa y comprensible.'
- source_word: ἀλλὰ θαρσεῖ
  english_pob_choice: but take heart
  chosen_spanish: sino cobra ánimo
  alternatives_spanish:
  - sino ten valor
  - sino anímate
  lexicon: θαρσέω
  rationale: '"Cobra ánimo" reproduce el gesto exhortativo de recuperar firmeza interior, y suena idiomático en español bíblico sin perder la tonalidad pastoral del original.'
- source_word: τὸ ἐργον τοῦ σιδηρουργοῦ / σιδηρουργός
  english_pob_choice: the blacksmith hammering his work
  chosen_spanish: el herrero, al martillar su obra
  alternatives_spanish:
  - el herrero que golpea su obra
  - el herrero mientras forja su trabajo
  lexicon: σιδηρουργός
  rationale: '"Herrero" es la equivalencia natural de sιδηρουργός. "Al martillar su obra" conserva el carácter artesanal y repetitivo de la imagen sin introducir un término técnico innecesario.'
- source_word: κρατεῖ / κατισχύει
  english_pob_choice: masters the thing he intends
  chosen_spanish: domina lo que se ha propuesto hacer
  alternatives_spanish:
  - domina lo que pretende hacer
  - vence la pieza que intenta
  lexicon: κατισχύω / κρατέω
  rationale: La idea no es solo hacer, sino imponer forma eficazmente a lo trabajado. "Domina" comunica la fuerza del paralelismo y mantiene el sentido de control sobre la materia o tarea.
- source_word: ὁ δίκαιος λόγος
  english_pob_choice: the righteous word
  chosen_spanish: la palabra justa
  alternatives_spanish:
  - la palabra recta
  - la palabra de justicia
  lexicon: δίκαιος
  rationale: La combinación "palabra justa" conserva la raíz moral/jurídica de δίκαιος sin convertirla automáticamente en un adjetivo piadoso. "Justa" permite la resonancia de rectitud y corrección moral.
- source_word: καθ' ἡμέραν
  english_pob_choice: daily
  chosen_spanish: cada día
  alternatives_spanish:
  - diariamente
  - día tras día
  lexicon: καθ' ἡμέραν
  rationale: '"Cada día" es más transparente en español que un adverbio más formal y mantiene el énfasis distributivo del original.'
- source_word: κακία
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - iniquidad
  - perversidad
  lexicon: κακία
  rationale: '"Maldad" es un término amplio y sobrio que encaja con la fuerza general del contraste ético del pasaje.'
- source_word: νουθετεῖν
  english_pob_choice: admonishing
  chosen_spanish: amonestar
  alternatives_spanish:
  - exhortar
  - advertir
  lexicon: νουθετέω
  rationale: '"Amonestar" conserva el matiz de instrucción correctiva, más fuerte que simplemente aconsejar y más preciso que "exhortar" en este contexto paternal.'
- source_word: μετανοοῦσιν ἐξ ὅλης καρδίας
  english_pob_choice: if they repent with their whole heart
  chosen_spanish: si se arrepienten con todo el corazón
  alternatives_spanish:
  - si se vuelven de todo corazón
  - si hacen arrepentimiento con todo el corazón
  lexicon: μετανοέω
  rationale: Aquí el sentido es claramente moral y volitivo, no meramente cognitivo; por eso "arrepentirse" es la mejor opción en español. "Con todo el corazón" preserva la intensidad total del compromiso.
- source_word: βίβλοις τῆς ζωῆς
  english_pob_choice: books of life
  chosen_spanish: los libros de la vida
  alternatives_spanish:
  - el libro de la vida
  - los libros de la vida
  lexicon: βίβλοις τῆς ζωῆς
  rationale: Se conserva el plural de la fuente y de la POB inglesa, aunque en tradición bíblica suele aparecer el singular. Mantener el plural respeta la forma del texto recibido y su posible referencia a registros celestiales.
- source_word: μετὰ τῶν ἁγίων
  english_pob_choice: with the holy ones
  chosen_spanish: con los santos
  alternatives_spanish:
  - con los consagrados
  - con los santos de Dios
  lexicon: ἅγιοι
  rationale: '"Santos" es la traducción estable y más natural de ἅγιοι en este contexto comunitario/escatológico. "Con los santos" conserva la referencia a los que pertenecen a Dios sin sobreexplicar.'
theological_decisions:
- issue: Nombre divino y uso de κύριος en el texto griego
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Dueño
  rationale: Aunque el proyecto normalmente usa Yahvé para el nombre divino, aquí el texto base y la audit trail presentan κύριος como título reverente y no como una cita explícita del tetragrámaton. Por fidelidad al registro griego y a la POB inglesa, se traduce "el Señor" en el cuerpo principal.
  doctrine_reference: teología del nombre divino; convención de traducción de κύριος
- issue: Destino final expresado como inscripción en los libros de la vida
  english_pob_reading: they will be written in the books of life with the holy ones
  chosen_spanish_reading: serán escritos en los libros de la vida con los santos
  alternative_spanish_readings:
  - serán inscritos en el libro de la vida con los santos
  - serán registrados en los libros de la vida con los santos
  rationale: Se preserva la imagen de inscripción celestial sin suavizarla. El plural de "libros" permanece porque es parte del testimonio textual recibido y evita armonizar prematuramente con usos más conocidos del singular.
  doctrine_reference: escatología; registro celestial de los justos
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete; la versión inglesa auditada presenta acuerdo moderado con observaciones menores, así que la redacción española sigue de cerca el texto base sin introducir resoluciones no atestiguadas.
  spanish_consistency_notes:
  - Se mantuvo "el Señor" en lugar de Yahvé porque el testimonio textual aquí es κύριος y el inglés POB también lo trata como "the Lord".
  - Se conservó el plural "libros de la vida" por fidelidad al texto fuente, aunque el oído bíblico en español suele esperar el singular.
  - '"Casa" se usó para household como solución bíblica natural y semánticamente amplia.'
  - No se usó un registro eclesiástico arcaizante salvo donde ayuda a la resonancia bíblica y no oscurece el sentido.
