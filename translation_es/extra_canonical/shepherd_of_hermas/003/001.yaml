review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido global del griego y del POB inglés: la ira de Dios/Señor, el llamado a hacer volver a la casa, la falta de amonestación, la ruina de la casa y la posterior sanidad/restauración. Sin embargo, hay dos puntos que conviene ajustar para mayor fidelidad y mejor español: (1) «hagas volver a tu casa» suena poco natural y puede sugerir mover físicamente la casa; en español eclesial claro, «hagas volver a los de tu casa» preserva mejor la fuerza de οἶκος como unidad doméstica; (2) «obras impías» no refleja tan bien el matiz de ‘lawless deeds’ como «acciones malvadas» o «acciones inicuas»; el inglés auditado opta por ‘lawless deeds’, y «acciones inicuas» mantiene mejor el tono moral/jurídico sin sonar extraño.'
  spanish_quality_summary: El texto es generalmente claro y digno, con buen registro. «Está airado» y «amonestaste» funcionan bien. No obstante, «hagas volver a tu casa» es una construcción torpe en español y «arruinarse gravemente» podría mejorarse levemente en fluidez manteniéndose muy cerca del original. La revisión propuesta mejora naturalidad sin paraprasear.
  glossary_alignment: No hay conflictos mayores con la terminología del proyecto. «Dios» y «Señor» son aceptables aquí dado que el testimonio fuente/auditoría inglesa usa ‘God’ y ‘Lord’ sin evidencia en el paquete de que deba sustituirse por «Yahvé». «Casa» para οἶκος es defendible, pero en este contexto verbal requiere expansión idiomática («los de tu casa») para sonar natural y conservar referencia personal. No hay otros términos doctrinales sensibles del glosario principal en juego.
  issues:
  - severity: medium
    issue: «hagas volver a tu casa» es poco idiomático y semánticamente impreciso
    rationale: Aunque intenta conservar οἶκος, en español parece que se hace volver a una casa-objeto. El contexto trata de los miembros del hogar que han pecado; «hagas volver a los de tu casa» expresa mejor el referente humano y la intención de retorno moral.
  - severity: medium
    issue: «obras impías» no corresponde óptimamente a ‘lawless deeds’
    rationale: «Impías» enfatiza irreverencia religiosa, mientras que el inglés auditado y el trasfondo léxico apuntan más a iniquidad/anomia. «Acciones inicuas» conserva mejor la dimensión moral-jurídica.
  - severity: low
    issue: «la dejaste arruinarse gravemente» puede sonar algo duro/forzado
    rationale: No es incorrecto, pero «la dejaste quedar gravemente arruinada» o similar fluye mejor. Aun así, el borrador es comprensible; no es un error grave.
  revised_spanish_text: Pero no es por esto que Dios está airado contigo, sino para que hagas volver a los de tu casa, que han pecado contra el Señor y contra nosotros, sus padres. Sin embargo, por tu cariño a tus hijos, no amonestaste a tu casa, sino que la dejaste quedar gravemente arruinada; por esto el Señor está airado contigo. Pero sanará todos los males pasados en tu casa; porque, a causa de sus pecados y acciones inicuas, tú mismo quedaste arruinado por los asuntos de este mundo.
  revision_rationale: Se corrige una construcción poco natural en español («hagas volver a tu casa») para reflejar claramente que οἶκος se refiere a los miembros del hogar en este contexto. También se ajusta «obras impías» a «acciones inicuas» para acercarse mejor al valor de ‘lawless deeds’. El resto del texto conserva el registro digno y el sentido del original.
