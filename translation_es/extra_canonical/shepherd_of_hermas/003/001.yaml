base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/003/001.yaml
  text: But it is not for this that God is angry with you, but so that you may turn back your household, which has sinned against the Lord and against us, their parents. Yet, being fond of your children, you did not admonish your household, but you let it be grievously ruined; for this the Lord is angry with you. But he will heal all the past evils in your household; for because of their sins and lawless deeds you yourself were ruined by worldly affairs.
translation:
  language: es
  text: Pero no es por esto que Dios está airado contigo, sino para que hagas volver a los de tu casa, que han pecado contra el Señor y contra nosotros, sus padres. Sin embargo, por tu cariño a tus hijos, no amonestaste a tu casa, sino que la dejaste quedar gravemente arruinada; por esto el Señor está airado contigo. Pero sanará todos los males pasados en tu casa; porque, a causa de sus pecados y acciones inicuas, tú mismo quedaste arruinado por los asuntos de este mundo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὀργίζεται / ὀργή (anger)
  english_pob_choice: angry
  chosen_spanish: está airado
  alternatives_spanish:
  - está enojado
  - está غضado
  lexicon: ὀργή
  rationale: «Airado» conserva un registro bíblico y solemne en español sin neutralizar la fuerza de la ira divina; evita el tono demasiado coloquial de «enojado».
- source_word: οἶκος
  english_pob_choice: household
  chosen_spanish: casa
  alternatives_spanish:
  - familia
  - hogar
  - casa de tu casa
  lexicon: οἶκος
  rationale: El contexto habla de la unidad doméstica y de sus miembros; «casa» mantiene la amplitud de οἶκος sin reducirla solo a edificio o solo a parentesco.
- source_word: ἐπίστρεψαι / ἐπιστρέφω
  english_pob_choice: turn back
  chosen_spanish: hagas volver
  alternatives_spanish:
  - conviertas
  - vuelvas
  - reorientes
  lexicon: ἐπιστρέφω
  rationale: La frase exige una acción sobre la casa, no solo un giro interior; «hagas volver» reproduce el movimiento de retorno con claridad natural en español.
- source_word: παρακαλέω / νουθετέω (admonish)
  english_pob_choice: admonish
  chosen_spanish: amonestaste
  alternatives_spanish:
  - reprendiste
  - exhortaste
  - advertiste
  lexicon: νουθετέω
  rationale: «Amonestar» conserva el matiz de advertir y corregir a la familia, sin endurecerlo innecesariamente como «reprender».
- source_word: κακῶς ἀπολέσθαι / ruin
  english_pob_choice: grievously ruined
  chosen_spanish: arruinarse gravemente
  alternatives_spanish:
  - destruirse gravemente
  - perecer miserablemente
  - verse gravemente arruinada
  lexicon: ἀπόλλυμι
  rationale: La pasiva señala ruina real, no simple pérdida; «arruinarse gravemente» conserva intensidad y fluidez.
- source_word: ἰάσεται
  english_pob_choice: heal
  chosen_spanish: sanará
  alternatives_spanish:
  - curará
  - restaurará
  lexicon: ἰάομαι
  rationale: «Sanará» mantiene la imagen terapéutica del texto y deja abierta la restauración integral implícita.
- source_word: τὰ ὑστέρια κακὰ
  english_pob_choice: the past evils
  chosen_spanish: todos los males pasados
  alternatives_spanish:
  - todos los males anteriores
  - los males del pasado
  lexicon: ὕστερος
  rationale: «Pasados» preserva la referencia temporal; «males» refleja el carácter dañino y moral de κακά. «Todos» sigue el alcance total del original.
- source_word: βιοτικαῖς πραγματείαις
  english_pob_choice: worldly affairs
  chosen_spanish: los asuntos de este mundo
  alternatives_spanish:
  - los negocios de la vida
  - las ocupaciones mundanas
  lexicon: βιοτικός
  rationale: «Asuntos de este mundo» comunica el ámbito de las preocupaciones temporales sin sonar excesivamente arcaico ni técnico.
theological_decisions:
- issue: Relación entre el pecado de la casa y la responsabilidad del padre
  english_pob_reading: your household, which has sinned against the Lord and against us, their parents
  chosen_spanish_reading: tu casa, que ha pecado contra el Señor y contra nosotros, sus padres
  alternative_spanish_readings:
  - tu familia, que ha pecado contra el Señor y contra nosotros, sus padres
  - tu casa, que ha pecado contra el Señor y contra nosotros, sus progenitores
  rationale: Se mantiene la atribución del pecado tanto a la casa como a los padres ofendidos, sin suavizar la tensión ética del pasaje.
  doctrine_reference: Responsabilidad doméstica y disciplina familiar en el marco moral de la comunidad cristiana primitiva
- issue: Causa de la ira del Señor y de la ruina doméstica
  english_pob_reading: for this the Lord is angry with you ... because of their sins and lawless deeds you yourself were ruined by worldly affairs
  chosen_spanish_reading: por esto el Señor está airado contigo ... a causa de sus pecados y obras impías, tú mismo quedaste arruinado por los asuntos de este mundo
  alternative_spanish_readings:
  - por esto el Señor se enoja contigo ... por causa de sus pecados y obras impías, tú mismo fuiste arruinado por las preocupaciones mundanas
  rationale: 'El pasaje conserva una causalidad moral directa: la omisión paterna, la corrupción de la casa y la ruina personal se encadenan sin diluirse.'
  doctrine_reference: Consecuencia moral del pecado y responsabilidad pastoral/familiar
translation_notes:
  revision_awareness: This draft follows the current English POB reading with no documented footnotes or applied revisions. The Spanish aims to mirror the same argument flow and causal relationships while rendering οἶκος, ἐπιστρέφω, νουθετέω, ἰάομαι, and βιοτικαῖς πραγματείαις in idiomatic but source-sensitive Spanish.
  spanish_consistency_notes:
  - Se preservó «Yahvé» como forma por defecto para el nombre divino, pero en este segmento el fuente griego usa «Señor»; por eso se traduce «el Señor» aquí para no forzar una equivalencia no explicitada en el griego de este pasaje.
  - «Casa» se usó de manera inclusiva para οἶκος, manteniendo la referencia doméstica y familiar.
  - Se evitó «Cristo» porque el pasaje no lo contiene.
  - El paralelismo causal se mantuvo con «pero / sin embargo / por esto / porque» para conservar la progresión retórica del original.
