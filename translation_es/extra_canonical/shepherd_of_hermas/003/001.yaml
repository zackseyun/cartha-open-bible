revisions:
- from: Pero no es por esto que Dios está airado contigo, sino para que hagas volver a tu casa, que ha pecado contra el Señor y contra nosotros, sus padres. Sin embargo, por tu cariño a tus hijos, no amonestaste a tu casa, sino que la dejaste arruinarse gravemente; por esto el Señor está airado contigo. Pero sanará todos los males pasados en tu casa; porque, a causa de sus pecados y obras impías, tú mismo quedaste arruinado por los asuntos de este mundo.
  to: Pero no es por esto que Dios está airado contigo, sino para que hagas volver a los de tu casa, que han pecado contra el Señor y contra nosotros, sus padres. Sin embargo, por tu cariño a tus hijos, no amonestaste a tu casa, sino que la dejaste quedar gravemente arruinada; por esto el Señor está airado contigo. Pero sanará todos los males pasados en tu casa; porque, a causa de sus pecados y acciones inicuas, tú mismo quedaste arruinado por los asuntos de este mundo.
  rationale: Se corrige una construcción poco natural en español («hagas volver a tu casa») para reflejar claramente que οἶκος se refiere a los miembros del hogar en este contexto. También se ajusta «obras impías» a «acciones inicuas» para acercarse mejor al valor de ‘lawless deeds’. El resto del texto conserva el registro digno y el sentido del original.
