revisions:
- from: «He aquí, el Dios de los ejércitos, que por su poder invisible y poderoso y por su gran inteligencia creó el mundo, y por su glorioso consejo adornó su creación con hermosura, y por su palabra poderosa afirmó el cielo y cimentó la tierra sobre las aguas, y por su propia sabiduría y providencia creó su santa iglesia, a la cual también bendijo—he aquí, él está moviendo los cielos y los montes y los collados y los mares, y todas las cosas quedan niveladas para sus escogidos, para que les dé la promesa que les prometió con mucha gloria y gozo, si guardan los estatutos de Dios que recibieron con gran fe».
  to: «He aquí, el Dios de los ejércitos, que por su poder invisible y potente y por su gran inteligencia creó el mundo, y por su glorioso consejo adornó su creación con hermosura, y por su palabra poderosa afirmó el cielo y cimentó la tierra sobre las aguas, y por su propia sabiduría y providencia santificó[a] su santa iglesia, y también la bendijo—he aquí, él está moviendo los cielos y los montes y los collados y los mares, y todas las cosas quedan niveladas para sus escogidos, para que les dé la promesa que les prometió con mucha gloria y gozo, si guardan los estatutos de Dios que recibieron con gran fe».
  rationale: 'Se corrige el único problema serio de fidelidad al griego: ἡγίασεν debe traducirse como «santificó» (o «consagró»), no «creó». Además, se mejora la naturalidad de «poder invisible y poderoso» a «poder invisible y potente» y se aligera una cláusula relativa para mejor fluidez, sin alterar el contenido.'
