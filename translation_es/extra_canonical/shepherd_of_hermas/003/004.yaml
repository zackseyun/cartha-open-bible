base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/003/004.yaml
  text: “Behold, the God of hosts, who by his invisible and mighty power and by his great understanding created the world, and by his glorious counsel adorned his creation with beauty, and by his mighty word fixed the heaven and founded the earth upon the waters, and by his own wisdom and providence created his holy church, which also he blessed—behold, he is moving the heavens and the mountains and the hills and the seas, and all things become level for his elect, in order that he may give to them the promise which he promised with much glory and joy, if they keep the statutes of God which they received with great faith.”
translation:
  language: es
  text: «He aquí, el Dios de los ejércitos, que por su poder invisible y potente y por su gran inteligencia creó el mundo, y por su glorioso consejo adornó su creación con hermosura, y por su palabra poderosa afirmó el cielo y cimentó la tierra sobre las aguas, y por su propia sabiduría y providencia santificó[a] su santa iglesia, y también la bendijo—he aquí, él está moviendo los cielos y los montes y los collados y los mares, y todas las cosas quedan niveladas para sus escogidos, para que les dé la promesa que les prometió con mucha gloria y gozo, si guardan los estatutos de Dios que recibieron con gran fe».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «consagró». El verbo griego ἡγίασεν significa «santificó/consagró», no «creó».
    reason: Aclara el sentido léxico del griego en un punto donde el borrador seguía una lectura inglesa auditada que no refleja bien el verbo fuente.
lexical_decisions:
- source_word: ὁ θεὸς τῶν δυνάμεων
  english_pob_choice: the God of hosts
  chosen_spanish: el Dios de los ejércitos
  alternatives_spanish:
  - el Dios de las huestes
  - el Dios de los poderes
  lexicon: θεός; δυνάμεις
  rationale: Conservo la fórmula bíblica reconocible para esta expresión titular; «ejércitos» comunica el valor tradicional de «hosts» sin perder la referencia a potestades/celestes huestes en español.
- source_word: ἀόρατος καὶ δυνατῇ δυνάμει
  english_pob_choice: invisible and mighty power
  chosen_spanish: poder invisible y poderoso
  alternatives_spanish:
  - poder invisible y fuerte
  - fuerza invisible y poderosa
  lexicon: ἀόρατος; δύναμις
  rationale: El griego subraya que el poder es invisible y eficaz; «poder invisible y poderoso» conserva la doble idea sin forzar una repetición extraña en español.
- source_word: μεγάλῃ συνέσει
  english_pob_choice: great understanding
  chosen_spanish: gran inteligencia
  alternatives_spanish:
  - gran entendimiento
  - gran sabiduría
  lexicon: σύνεσις
  rationale: «Inteligencia» reproduce bien la capacidad comprensiva/ordenadora del término; «entendimiento» también sería posible, pero en español suena algo más abstracto aquí.
- source_word: τὸν κόσμον ἐποίησεν
  english_pob_choice: created the world
  chosen_spanish: creó el mundo
  alternatives_spanish:
  - hizo el mundo
  - formó el mundo
  lexicon: κόσμος; ποιέω
  rationale: «Creó» es la equivalencia natural y suficientemente precisa para el acto creador descrito.
- source_word: τῇ δόξῃ αὐτοῦ βουλῇ
  english_pob_choice: by his glorious counsel
  chosen_spanish: por su glorioso consejo
  alternatives_spanish:
  - por su consejo glorioso
  - con su glorioso designio
  lexicon: βουλή; δόξα
  rationale: Mantengo la relación causal/instrumental de «by» y conservo «glorioso» como rasgo del consejo divino.
- source_word: τὴν κτίσιν αὐτοῦ
  english_pob_choice: his creation
  chosen_spanish: su creación
  alternatives_spanish:
  - la creación que hizo
  - su obra creada
  lexicon: κτίσις
  rationale: La forma simple «su creación» es fiel y natural en español.
- source_word: ὡραΐσεν
  english_pob_choice: adorned ... with beauty
  chosen_spanish: adornó ... con hermosura
  alternatives_spanish:
  - embelleció ... con belleza
  - adornó ... con belleza
  lexicon: ὡραΐζω
  rationale: «Hermosura» preserva el matiz de belleza adornada sin sonar tautológico en español.
- source_word: τῷ δυνατῷ αὐτοῦ λόγῳ
  english_pob_choice: by his mighty word
  chosen_spanish: por su palabra poderosa
  alternatives_spanish:
  - por su palabra poderosa y eficaz
  - por su palabra potente
  lexicon: λόγος; δυνατός
  rationale: «Poderosa» transmite la eficacia activa del λόγος; en español es claro y sobrio.
- source_word: ἐστήριξεν τὸν οὐρανόν
  english_pob_choice: fixed the heaven
  chosen_spanish: afirmó el cielo
  alternatives_spanish:
  - estableció el cielo
  - sostuvo el cielo
  lexicon: στηρίζω
  rationale: «Afirmó» recoge la idea de establecer/firmar con un matiz ligeramente más literario que «estableció».
- source_word: ἐθεμελίωσεν τὴν γῆν ἐπὶ τῶν ὑδάτων
  english_pob_choice: founded the earth upon the waters
  chosen_spanish: cimentó la tierra sobre las aguas
  alternatives_spanish:
  - fundó la tierra sobre las aguas
  - puso los cimientos de la tierra sobre las aguas
  lexicon: θεμελιόω
  rationale: «Cimentó» conserva la metáfora de fundamento y suena más natural que un calco demasiado técnico.
- source_word: τῇ αὑτοῦ σοφίᾳ καὶ προνοίᾳ
  english_pob_choice: by his own wisdom and providence
  chosen_spanish: por su propia sabiduría y providencia
  alternatives_spanish:
  - con su propia sabiduría y providencia
  - por su sabiduría y providencia
  lexicon: σοφία; πρόνοια
  rationale: «Providencia» es el equivalente normal de πρόνοια en este contexto y preserva la distinción con «sabiduría».
- source_word: ἡγίασεν τὴν ἁγίαν ἐκκλησίαν αὐτοῦ
  english_pob_choice: created his holy church
  chosen_spanish: creó su santa iglesia
  alternatives_spanish:
  - fundó su santa iglesia
  - creó su iglesia santa
  lexicon: ἁγιάζω; ἐκκλησία
  rationale: Sigo la lectura auditada del inglés «created» para no borrar el acto creativo atribuido a la iglesia; mantengo «santa iglesia» como calificación explícita.
- source_word: καὶ αὐτὴν εὐλόγησεν
  english_pob_choice: which also he blessed
  chosen_spanish: a la cual también bendijo
  alternatives_spanish:
  - y también la bendijo
  - y la bendijo también
  lexicon: εὐλογέω
  rationale: Respeta el relativo de la cláusula y el orden solemne del pasaje.
- source_word: μετακινεῖ τοὺς οὐρανοὺς καὶ τὰ ὄρη καὶ τοὺς βουνοὺς καὶ τὰς θαλάσσας
  english_pob_choice: he is moving the heavens and the mountains and the hills and the seas
  chosen_spanish: está moviendo los cielos y los montes y los collados y los mares
  alternatives_spanish:
  - está removiendo los cielos y los montes y los collados y los mares
  - está haciendo temblar los cielos y los montes y los collados y los mares
  lexicon: μετακινέω
  rationale: «Mover» preserva el aspecto progresivo y la imagen cósmica sin introducir una interpretación más fuerte como «remover» o «hacer temblar».
- source_word: πάντα ἐπιπέδως γίνονται
  english_pob_choice: all things become level
  chosen_spanish: todas las cosas quedan niveladas
  alternatives_spanish:
  - todo queda allanado
  - todas las cosas se vuelven llanas
  lexicon: ἐπίπεδος; γίνομαι
  rationale: «Quedan niveladas» transmite el efecto pasivo y la imagen de allanamiento; es idiomático y visual en español.
- source_word: τοῖς ἐκλεκτοῖς αὐτοῦ
  english_pob_choice: for his elect
  chosen_spanish: para sus escogidos
  alternatives_spanish:
  - para sus elegidos
  - para sus electos
  lexicon: ἐκλεκτός
  rationale: «Escogidos» es la forma más natural y extendida en español para este término, manteniendo la fuerza electiva.
- source_word: ἵνα δῷ αὐτοῖς τὴν ἐπαγγελίαν
  english_pob_choice: in order that he may give to them the promise
  chosen_spanish: para que les dé la promesa
  alternatives_spanish:
  - a fin de que les dé la promesa
  - para darles la promesa
  lexicon: ἵνα; ἐπαγγελία
  rationale: Sigo la finalidad explícita del griego; «la promesa» conserva el objeto definido tal como en el inglés auditado.
- source_word: ἣν ὑπέσχετο
  english_pob_choice: which he promised
  chosen_spanish: que les prometió
  alternatives_spanish:
  - que había prometido
  - que les había prometido
  lexicon: ὑπισχνέομαι
  rationale: El castellano puede expresar el antecedente con claridad mediante un relativo simple sin perder el sentido.
- source_word: μετὰ πολλῆς δόξης καὶ χαρᾶς
  english_pob_choice: with much glory and joy
  chosen_spanish: con mucha gloria y gozo
  alternatives_spanish:
  - con gran gloria y gozo
  - con mucha gloria y alegría
  lexicon: δόξα; χαρά
  rationale: «Gozo» mantiene un registro bíblico adecuado y evita reducir χαρά a una alegría meramente emocional.
- source_word: ἐὰν τηρῶσιν τὰ προστάγματα τοῦ θεοῦ
  english_pob_choice: if they keep the statutes of God
  chosen_spanish: si guardan los estatutos de Dios
  alternatives_spanish:
  - si guardan los mandamientos de Dios
  - si observan los preceptos de Dios
  lexicon: πρόσταγμα
  rationale: «Estatutos» preserva el matiz normativo y formal que el inglés POB ya fijó con «statutes».
- source_word: ἃ ἔλαβον μετὰ πίστεως πολλῆς
  english_pob_choice: which they received with great faith
  chosen_spanish: que recibieron con gran fe
  alternatives_spanish:
  - que recibieron con mucha fe
  - que aceptaron con gran fe
  lexicon: λαμβάνω; πίστις
  rationale: La relación entre recibir y fe se expresa de modo directo y natural, sin diluir la fuerza del acto receptivo.
theological_decisions:
- issue: ¿Traducir ἡγίασεν τὴν ἁγίαν ἐκκλησίαν como «creó su santa iglesia» o como «santificó su santa iglesia»?
  english_pob_reading: created his holy church
  chosen_spanish_reading: creó su santa iglesia
  alternative_spanish_readings:
  - santificó su santa iglesia
  - consagró su santa iglesia
  rationale: Sigo la lectura auditada del POB en inglés, que entiende aquí un acto creador fundacional respecto de la iglesia. Aunque ἡγίασεν puede sugerir santificar/consagrar, el contexto inmediato ya la presenta como obra divina bendecida, y el audit trail fija «created»; traducirlo como «creó» evita borrar esa decisión de lectura.
  doctrine_reference: Ecclesiology; divine initiative in the church
- issue: Cómo verter «ὁ θεὸς τῶν δυνάμεων» en un texto cristiano antiguo sin ocultar la alusión bíblica
  english_pob_reading: the God of hosts
  chosen_spanish_reading: el Dios de los ejércitos
  alternative_spanish_readings:
  - el Dios de las huestes
  - el Dios de los poderes
  rationale: La expresión alude a un título bíblico tradicional de Dios soberano sobre huestes celestes. «Ejércitos» mantiene el eco escriturario y la solemnidad sin neutralizar el sentido militar/cósmico del título.
  doctrine_reference: Divine sovereignty; biblical divine title
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete; el cross-check indica alta concordancia con solo observaciones menores. He conservado la estructura paratáctica larga del original y la del inglés auditado, sin añadir explicaciones interpretativas ajenas al texto.
  spanish_consistency_notes:
  - He mantenido el tratamiento de Dios como «Dios» y el título divino particular como «Yahvé» no aparece en este pasaje.
  - He conservado el registro solemne y la enumeración acumulativa del original.
  - No se han introducido notas textuales porque el paquete no provee variantes ni footnotes en el inglés auditado.
