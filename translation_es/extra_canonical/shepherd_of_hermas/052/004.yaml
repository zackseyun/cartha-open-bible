revisions:
- from: Por eso tomó al Hijo y a los ángeles gloriosos como consejeros, para que esta carne también, habiendo servido al Espíritu sin culpa, pudiera tener algún lugar de morada, y no pareciera haber perdido la recompensa de su servicio. Porque toda carne que se halla sin mancha e incontaminada, en la cual ha habitado el Espíritu Santo, recibirá recompensa. También has recibido la interpretación de esta parábola.”
  to: Por eso tomó al Hijo y a los ángeles gloriosos como consejeros, para que esta carne también, habiendo servido al Espíritu sin reproche, pudiera tener algún lugar de morada, y no pareciera haber perdido la recompensa de su servicio. Porque toda carne que se halla sin mancha e incontaminada, en la cual ha habitado el Espíritu Santo, recibirá recompensa. También tienes la interpretación de esta parábola.”
  rationale: Se ajusta la frase final para evitar la adición de ‘has recibido’, ausente del sentido base, y se mejora ligeramente la naturalidad de ‘sin culpa’ a ‘sin reproche’ sin cambiar la teología ni la estructura del pasaje. No se requieren notas.
