  yaml_path: translation/extra_canonical/shepherd_of_hermas/052/004.yaml
  text: Therefore he took the Son and the glorious angels as counselors, in order that this flesh also, having served the Spirit blamelessly, might have some place of dwelling, and might not seem to have lost the reward of its service. For every flesh that is found undefiled and unstained, in which the Holy Spirit has dwelt, will receive a reward. You have the interpretation of this parable also.”
translation:
  language: es
  text: Por eso tomó al Hijo y a los ángeles gloriosos como consejeros, para que esta carne también, habiendo servido al Espíritu sin reproche, pudiera tener algún lugar de morada, y no pareciera haber perdido la recompensa de su servicio. Porque toda carne que se halla sin mancha e incontaminada, en la cual ha habitado el Espíritu Santo, recibirá recompensa. También tienes la interpretación de esta parábola.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza humana
  - cuerpo
  lexicon: σάρξ
  rationale: Se conserva el valor material y antropológico de ‘flesh’ con ‘carne’, que en español bíblico mantiene la tensión entre lo corporal y lo humano sin suavizarla excesivamente. ‘Naturaleza humana’ explicita demasiado y borra el matiz concreto; ‘cuerpo’ estrecha el sentido.
- source_word: πνεῦμα / τὸ Ἅγιον Πνεῦμα
  english_pob_choice: Spirit / Holy Spirit
  chosen_spanish: Espíritu / Espíritu Santo
  alternatives_spanish:
  - Espíritu
  - Espíritu Santo
  lexicon: πνεῦμα
  rationale: Se distingue el uso general de ‘Espíritu’ en ‘servir al Espíritu’ y el referente pleno de ‘Espíritu Santo’ en la cláusula final. La mayúscula conserva la referencia personal donde el contexto la exige.
- source_word: ἄγγελοι
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: ἄγγελοι
  rationale: ‘Ángeles’ es la equivalencia directa y natural en español religioso; ‘mensajeros’ sería posible etimológicamente pero menos fiel al uso del pasaje y a la lectura tradicional de este contexto.
- source_word: συμβούλους
  english_pob_choice: counselors
  chosen_spanish: consejeros
  alternatives_spanish:
  - asesores
  - consultores
  lexicon: συμβούλους
  rationale: ‘Consejeros’ reproduce el sentido de quienes deliberan o aconsejan. ‘Asesores’ y ‘consultores’ suenan modernos y técnicos, y no corresponden al registro del texto.
- source_word: μὴ δοκεῖν ἀποβεβληκέναι τὴν μισθαποδοσίαν
  english_pob_choice: might not seem to have lost the reward of its service
  chosen_spanish: y no pareciera haber perdido la recompensa de su servicio
  alternatives_spanish:
  - y no pareciera haber perdido el pago de su servicio
  - y no pareciera haber dejado de recibir la recompensa de su servicio
  lexicon: μισθαποδοσία
  rationale: ‘Recompensa’ sigue la opción del POB inglés y preserva el valor retributivo del término. ‘Pago’ es posible pero reduce el efecto moral/escatológico; la formulación mantiene el matiz de apariencia (‘pareciera’) del original.
- source_word: μὴ κηλιδωθέντι μηδὲ μεμιασμένῳ
  english_pob_choice: undefiled and unstained
  chosen_spanish: sin mancha e incontaminada
  alternatives_spanish:
  - sin mancha y sin contaminación
  - sin defecto e inmaculada
  lexicon: κηλιδόω / μιαίνω
  rationale: Se conserva el doblete ético-ritual con ‘sin mancha e incontaminada’, que refleja dos verbos distintos y mantiene el paralelismo. ‘Inmaculada’ puede sonar demasiado doctrinal o mariano en español; ‘sin contaminación’ es correcto pero menos idiomático aquí.
theological_decisions:
- issue: El papel del Hijo y de los ángeles gloriosos como ‘consejeros’
  english_pob_reading: Therefore he took the Son and the glorious angels as counselors
  chosen_spanish_reading: Por eso tomó al Hijo y a los ángeles gloriosos como consejeros
  alternative_spanish_readings:
  - Por eso tomó al Hijo y a los ángeles gloriosos como consultores
  - Por eso tomó al Hijo y a los ángeles gloriosos como consejeros en consejo
  rationale: Se mantiene la coordinación explícita entre el Hijo y los ángeles gloriosos sin domesticarla. ‘Consejeros’ conserva la imagen deliberativa del pasaje y evita reescrituras que diluyan la escena.
  doctrine_reference: Cristología y angelología del texto patrístico; fidelidad a la imagen narrativa sin armonización doctrinal externa.
- issue: Relación entre el servicio de la carne y la morada del Espíritu
  english_pob_reading: having served the Spirit blamelessly ... in which the Holy Spirit has dwelt
  chosen_spanish_reading: habiendo servido al Espíritu sin culpa ... en la cual ha habitado el Espíritu Santo
  alternative_spanish_readings:
  - habiendo servido al Espíritu irreprensiblemente ... en la cual ha habitado el Espíritu Santo
  - habiendo servido al Espíritu sin reproche ... en la cual ha habitado el Espíritu Santo
  rationale: ‘Sin culpa’ traduce de forma directa el estado moral exigido por el texto y conserva la relación con la recompensa. La segunda cláusula distingue claramente la presencia del Espíritu Santo como inhabitación, no solo influencia.
  doctrine_reference: Pneumatología del texto patrístico; perseverancia y recompensa de la obediencia.
- issue: ‘Recibir una recompensa’ para la carne que ha permanecido sin mancha
  english_pob_reading: will receive a reward
  chosen_spanish_reading: recibirá recompensa
  alternative_spanish_readings:
  - recibirá una recompensa
  - obtendrá recompensa
  rationale: La forma indefinida ‘recompensa’ reproduce la generalidad del original y del POB inglés. No se especifica el tipo de retribución para no añadir contenido ausente.
  doctrine_reference: Escatología retributiva del pasaje; no se precisa la forma de la recompensa.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el contexto disponible; la presente redacción sigue de cerca el griego normalizado y el POB inglés óptimo-equivalente, manteniendo las tensiones léxicas relevantes sin ampliarlas interpretativamente.
  spanish_consistency_notes:
  - Se mantiene ‘carne’ para σάρξ en todo el pasaje, por coherencia semántica.
  - Se usa ‘Espíritu’ y ‘Espíritu Santo’ de modo consistente, distinguiendo el referente general del específico.
  - Se conserva el registro bíblico-patrístico con sintaxis clara y publicación-readable en español.
  - No se introducen notas al pie porque el contexto no registra variantes textuales ni alternativas obligatorias que requieran anclaje en el texto.
