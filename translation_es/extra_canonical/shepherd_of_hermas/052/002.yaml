  text: Therefore, having cleansed the sins of the people, he showed them the paths of life, giving them the law that he received from his Father. “You see,” he says, “that he himself is Lord of the people, having received all authority from his Father. And as for the Lord’s taking his Son and the glorious angels as counselors concerning the inheritance of the slave—listen.
translation:
  language: es
  text: Por lo tanto, habiendo purificado los pecados del pueblo, les mostró los caminos de la vida, dándoles la ley que recibió de su Padre. «Ves —dice— que él mismo es Señor del pueblo, habiendo recibido toda autoridad de su Padre. Y en cuanto a que el Señor tomó a su Hijo y a los ángeles gloriosos como consejeros acerca de la herencia del esclavo[a] —escucha.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Esclavo» conserva el término fuerte del original; «siervo» suavizaría la tensión lexical.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθαρίσας τὰς ἁμαρτίας τοῦ λαοῦ
  english_pob_choice: having cleansed the sins of the people
  chosen_spanish: habiendo purificado los pecados del pueblo
  alternatives_spanish:
  - habiendo limpiado los pecados del pueblo
  - habiendo expiado los pecados del pueblo
  lexicon: καθαρίζω; ἁμαρτία; λαός
  rationale: Conservo la idea de limpieza/purificación sin forzar una lectura sacrificial más específica que el contexto inmediato no exige. «Purificar» suena natural en español y mantiene el paralelismo con la presentación de los «caminos de la vida».
- source_word: τὰς ὁδοὺς τῆς ζωῆς
  english_pob_choice: the paths of life
  chosen_spanish: los caminos de la vida
  alternatives_spanish:
  - las sendas de la vida
  - las vías de la vida
  lexicon: ὁδός; ζωή
  rationale: «Caminos» es la correspondencia más transparente y bíblicamente comprensible en español, conservando el plural y la imagen moral de dirección de vida.
- source_word: νόμον ὃν παρέλαβεν ἀπὸ τοῦ Πατρός
  english_pob_choice: giving them the law that he received from his Father
  chosen_spanish: dándoles la ley que recibió de su Padre
  alternatives_spanish:
  - dándoles la ley que tomó de su Padre
  - entregándoles la ley que recibió de su Padre
  lexicon: νόμος; παραλαμβάνω; πατήρ
  rationale: «Ley» mantiene el valor normativo del término. «Recibió» refleja mejor el matiz de transmisión/autorización que una simple formulación como «tomó».
- source_word: κύριος τοῦ λαοῦ
  english_pob_choice: he himself is Lord of the people
  chosen_spanish: él mismo es Señor del pueblo
  alternatives_spanish:
  - él mismo es Señor del pueblo
  - él mismo es el Señor del pueblo
  lexicon: κύριος; λαός
  rationale: Se conserva «Señor» porque el contexto cristológico lo exige y porque el texto ya lo usa como título. «Del pueblo» sigue de cerca el genitivo sin imponer una expansión interpretativa.
- source_word: πᾶσαν ἐξουσίαν
  english_pob_choice: all authority
  chosen_spanish: toda autoridad
  alternatives_spanish:
  - toda potestad
  - toda autoridad plena
  lexicon: ἐξουσία
  rationale: «Autoridad» es la opción más natural y fiel en español contemporáneo; «potestad» puede sonar más eclesiástico o jurídico y no añade claridad aquí.
- source_word: κληρονομίας τοῦ δοῦλου
  english_pob_choice: the inheritance of the slave
  chosen_spanish: la herencia del esclavo
  alternatives_spanish:
  - la herencia del siervo
  - la herencia del esclavo
  lexicon: κληρονομία; δοῦλος
  rationale: Conservo «esclavo» porque el término tiene fuerza lexical y social específica; sustituirlo por «siervo» diluiría una tensión importante del original y del audit trail inglés. La expresión puede sonar dura en español, pero precisamente por eso preserva el valor del término.
theological_decisions:
- issue: Cristología de autoridad recibida del Padre
  english_pob_reading: he himself is Lord of the people, having received all authority from his Father
  chosen_spanish_reading: él mismo es Señor del pueblo, habiendo recibido toda autoridad de su Padre
  alternative_spanish_readings:
  - él mismo es Señor del pueblo, porque recibió toda autoridad de su Padre
  - él mismo es Señor del pueblo, después de recibir toda autoridad de su Padre
  rationale: 'Mantengo la relación de origen y subordinación explícita en el texto: la autoridad no es independiente sino recibida. La formulación evita suavizar la dependencia filial que el pasaje afirma.'
  doctrine_reference: Cristología y economía trinitaria en lectura patrística; autoridad delegada del Hijo por el Padre
- issue: Herencia del esclavo
  english_pob_reading: the inheritance of the slave
  chosen_spanish_reading: la herencia del esclavo
  alternative_spanish_readings:
  - la herencia del siervo
  - la herencia del esclavo
  rationale: La dureza del término es probablemente intencional y participa del contraste entre jerarquía, herencia y consejo divino. Traducirlo como «siervo» neutralizaría una tensión lexical relevante.
  doctrine_reference: Antropología bíblica y lenguaje de esclavitud/servidumbre en la literatura cristiana primitiva
translation_notes:
  revision_awareness: 'No se aplicaron revisiones previas ni hay pasajes paralelos enlazados en el paquete. La redacción española sigue de cerca el texto griego y el inglés auditado, preservando el orden argumental: purificación del pueblo, camino de vida, ley recibida del Padre, y afirmación de la autoridad del Señor sobre la herencia del esclavo.'
  spanish_consistency_notes:
  - Se mantiene «Padre» con mayúscula cuando refiere a Dios en sentido cristológico.
  - Se usa «Señor» como título, no como sustituto editorial del nombre divino.
  - Se conserva «esclavo» de forma consistente con la política POB para δοῦλος.
  - La puntuación reproduce el cambio a discurso directo y el inciso final con guion largo para la cláusula suspendida.
