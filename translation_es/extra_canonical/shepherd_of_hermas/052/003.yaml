base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/052/003.yaml
  text: The Holy Spirit, which preexisted, which created all creation, God caused to dwell in flesh that he willed. This flesh, then, in which the Holy Spirit dwelt, served the Spirit well, walking in modesty and purity, in no way at all defiling the Spirit. Therefore, since it had conducted itself well and purely, and had toiled together with the Spirit and cooperated in every matter, conducting itself strongly and courageously, he chose it as a partner with the Holy Spirit; for the conduct of this flesh pleased [the Lord], because it was not defiled upon the earth while having the Holy Spirit.
translation:
  language: es
  text: El Espíritu Santo, que preexistía y creó toda la creación, Dios lo hizo habitar en la carne que él quiso. Esta carne, entonces, en la que habitó el Espíritu Santo, sirvió bien al Espíritu, andando con modestia y pureza, sin manchar de ningún modo al Espíritu. Por tanto, como se había conducido bien y puramente, y había trabajado junto con el Espíritu y cooperado en todo, conduciéndose con fuerza y valentía, la escogió como compañera junto con el Espíritu Santo; porque la conducta de esta carne agradó al Señor, ya que no fue manchada sobre la tierra teniendo al Espíritu Santo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεῦμα ἅγιον / Holy Spirit
  english_pob_choice: Holy Spirit
  chosen_spanish: Espíritu Santo
  alternatives_spanish:
  - espíritu santo
  lexicon: πνεῦμα
  rationale: Se mantiene el referente personal y teológico del Espíritu Santo; en español bíblico natural la mayúscula distingue la referencia divina sin introducir otra terminología.
- source_word: προϋπάρχον / preexisted
  english_pob_choice: preexisted
  chosen_spanish: preexistía
  alternatives_spanish:
  - existía antes
  - preexistía desde antes
  lexicon: προϋπάρχω
  rationale: ‘Preexistía’ conserva el valor temporal anterior sin sobretraducir ni convertirlo en explicación doctrinal.
- source_word: σάρξ / flesh
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  - naturaleza humana
  lexicon: σάρξ
  rationale: ‘Carne’ preserva el término técnico del texto y la tensión antropológica del original; no se suaviza a ‘naturaleza humana’.
- source_word: ἔδωκεν κατοικῆσαι / caused to dwell
  english_pob_choice: caused to dwell
  chosen_spanish: hizo habitar
  alternatives_spanish:
  - hizo morar
  - hizo residir
  lexicon: κατοικέω
  rationale: ‘Hizo habitar’ expresa la causación divina y la permanencia de la presencia del Espíritu en un registro claro y bíblico.
- source_word: καλῶς ἐδούλευσεν / served well
  english_pob_choice: served well
  chosen_spanish: sirvió bien
  alternatives_spanish:
  - sirvió fielmente
  - prestó buen servicio
  lexicon: δουλεύω
  rationale: Se conserva la idea de servicio eficaz y aprobado sin introducir ‘esclavo’, porque aquí el verbo describe la función de la carne respecto del Espíritu.
- source_word: ἐν σωφροσύνῃ καὶ ἁγνείᾳ / in modesty and purity
  english_pob_choice: in modesty and purity
  chosen_spanish: con modestia y pureza
  alternatives_spanish:
  - con sensatez y pureza
  - con templanza y pureza
  lexicon: σωφροσύνη
  rationale: ‘Modestia’ y ‘pureza’ reproducen bien el par de virtudes y son comprensibles en español eclesial contemporáneo.
- source_word: οὐδαμῶς μίαναι / in no way at all defiling
  english_pob_choice: in no way at all defiling
  chosen_spanish: sin manchar en modo alguno
  alternatives_spanish:
  - sin contaminar en absoluto
  - sin profanar de ningún modo
  lexicon: μιαίνω
  rationale: ‘Manchar’ mantiene la imagen moral/ritual del verbo; ‘en modo alguno’ refuerza la negación total del original.
- source_word: συνμοχθήσασα ... συνεργήσασα / toiled together ... cooperated
  english_pob_choice: toiled together ... cooperated
  chosen_spanish: había trabajado junto con el Espíritu y cooperado en todo
  alternatives_spanish:
  - había luchado junto con el Espíritu y colaborado en todo
  - había trabajado con el Espíritu y cooperado en cada asunto
  lexicon: συμμοχθέω / συνεργέω
  rationale: 'Se conservan ambos matices: esfuerzo compartido (‘trabajado junto con’) y cooperación activa (‘cooperado’), sin borrar la repetición retórica del griego.'
- source_word: προέκρινε ... κοινωνὸν / chose ... as a partner
  english_pob_choice: he chose it as a partner
  chosen_spanish: la escogió como compañera
  alternatives_spanish:
  - la escogió como socia
  - la escogió como compañera asociada
  lexicon: κοινωνός
  rationale: ‘Compañera’ comunica participación asociada en un registro natural; evita ‘socia’ por sonar moderno-comercial y conserva la idea de comunión o colaboración.
- source_word: ἠρέσεν / pleased
  english_pob_choice: pleased [the Lord]
  chosen_spanish: agradó al Señor
  alternatives_spanish:
  - fue del agrado del Señor
  - agradó [al Señor]
  lexicon: ἀρέσκω
  rationale: Se sigue la lectura del inglés POB con el complemento implícito ‘el Señor’, que el contexto entiende; el español fluye de forma natural sin añadir más que la inferencia ya presente.
- source_word: ἐπὶ τῆς γῆς / upon the earth
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra mientras estaba en la tierra
  lexicon: γῆ
  rationale: ‘Sobre la tierra’ conserva la preposición del POB y el tono elevado del pasaje.
theological_decisions:
- issue: Preexistencia del Espíritu Santo y encarnación/habitación en carne
  english_pob_reading: The Holy Spirit, which preexisted, ... God caused to dwell in flesh that he willed.
  chosen_spanish_reading: El Espíritu Santo, que preexistía ... Dios lo hizo habitar en la carne que quiso.
  alternative_spanish_readings:
  - El Espíritu Santo, que ya existía ...
  - Dios hizo morar al Espíritu Santo en la carne que quiso.
  rationale: La formulación mantiene tanto la preexistencia como la acción divina de hacer habitar al Espíritu en carne, sin convertir el pasaje en una paráfrasis doctrinalmente más explícita que el original.
  doctrine_reference: Cristología y pneumatología; distinción entre preexistencia del Espíritu y su habitación en la carne, conforme al tenor alegórico del pasaje.
- issue: Aprobación por la conducta de la carne
  english_pob_reading: the conduct of this flesh pleased [the Lord], because it was not defiled upon the earth while having the Holy Spirit.
  chosen_spanish_reading: la conducta de esta carne agradó al Señor, ya que no fue manchada sobre la tierra mientras tenía al Espíritu Santo.
  alternative_spanish_readings:
  - la conducta de esta carne fue agradable al Señor ...
  - porque no se contaminó ...
  rationale: Se mantiene la tensión entre conducta moral y aprobación divina sin eliminar el lenguaje de mancha/contaminación; el sujeto implícito del agrado se conserva como en la tradición auditada.
  doctrine_reference: Santificación y obediencia ejemplar; lectura alegórica del cuerpo/carne como receptáculo fiel del Espíritu.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando toda nota al pie no anclada en el texto. La presente redacción no introduce marcadores de nota, por lo que no hay desajuste entre el cuerpo y las notas.
  spanish_consistency_notes:
  - Se mantiene ‘Espíritu Santo’ con mayúscula por referencia personal divina.
  - Se conserva ‘carne’ para σάρξ en todo el pasaje.
  - ‘Compañera’ se usa para κοινωνός en sentido de asociación, no en sentido doméstico.
  - No se sustituye ‘Dios’ ni se introduce ‘SEÑOR’ como máscara del nombre divino; ‘el Señor’ aparece solo por la lectura explícita del inglés POB en la cláusula de agrado.
