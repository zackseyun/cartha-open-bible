base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/052/001.yaml
  text: He says, “I told you just now that you are crafty and headstrong, asking for the interpretations of the parables. But since you are so persistent, I will interpret for you the parable of the field and the rest. He entrusted them to the angels to keep them; and he himself cleansed their sins, having labored much and endured many toils—for no one can dig without toil or labor.
translation:
  language: es
  text: 'Él dice: «Te dije hace un momento que eres astuto y obstinado, al pedir las interpretaciones de las parábolas. Pero, puesto que eres tan persistente, te interpretaré la parábola del campo y lo demás. Él[a] los confió a los ángeles para que los guardaran; y él mismo limpió sus pecados, habiendo trabajado mucho y soportado muchas fatigas, porque nadie puede cavar sin trabajo ni labor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pronombre «él» mantiene en español el sujeto enfático del relato; el contexto inmediato identifica al hablante referido y no requiere aclaración adicional en el texto principal.
    reason: source_note
lexical_decisions:
- source_word: πανοῦργος / crafty
  english_pob_choice: crafty
  chosen_spanish: astuto
  alternatives_spanish:
  - hábil
  - mañoso
  lexicon: No inventar número de léxico; decisión semántica contextual.
  rationale: «Astuto» conserva el matiz de viveza estratégica que el inglés POB marcó con 'crafty' sin cargarlo de manera innecesariamente insultante; en español suena natural y fiel al reproche.
- source_word: θρασύς / headstrong
  english_pob_choice: headstrong
  chosen_spanish: obstinado
  alternatives_spanish:
  - terco
  - arrogante
  lexicon: No inventar número de léxico; decisión semántica contextual.
  rationale: «Obstinado» reproduce la idea de insistencia voluntariosa y resistencia a la corrección. «Terco» sería posible, pero «obstinado» mantiene un registro más sobrio.
- source_word: τὰς παραβολὰς / the parables
  english_pob_choice: the parables
  chosen_spanish: las parábolas
  alternatives_spanish:
  - las similitudes
  - las alegorías
  lexicon: No inventar número de léxico; decisión semántica contextual.
  rationale: Se conserva el término corriente y claro «parábolas», que corresponde al género didáctico del pasaje y al uso del inglés POB.
- source_word: ἐξηγήσομαι / interpret for you
  english_pob_choice: I will interpret for you
  chosen_spanish: te interpretaré
  alternatives_spanish:
  - te explicaré
  - te expondré
  lexicon: No inventar número de léxico; decisión semántica contextual.
  rationale: «Interpretar» mantiene el vínculo con la explicación autorizada del sentido de la alegoría; es más preciso que «explicar» para un texto con lenguaje figurado.
- source_word: τὴν παραβολὴν τοῦ ἀγροῦ / the parable of the field
  english_pob_choice: the parable of the field
  chosen_spanish: la parábola del campo
  alternatives_spanish:
  - la parábola del terreno
  - la alegoría del campo
  lexicon: No inventar número de léxico; decisión semántica contextual.
  rationale: «Campo» traduce de forma directa y natural el sustantivo griego, manteniendo la imagen agraria del texto.
- source_word: ἐνεχείρισεν αὐτοὺς τοῖς ἀγγέλοις / He entrusted them to the angels
  english_pob_choice: He entrusted them to the angels
  chosen_spanish: los confió a los ángeles
  alternatives_spanish:
  - los encomendó a los ángeles
  - los entregó a los ángeles
  lexicon: No inventar número de léxico; decisión semántica contextual.
  rationale: «Confiar» transmite bien la idea de poner algo bajo custodia o cuidado. «Encomendar» es alternativa válida, pero «los confió» sigue de cerca el valor de encargo y protección.
- source_word: τηρεῖν / to keep them
  english_pob_choice: to keep them
  chosen_spanish: para que los guardaran
  alternatives_spanish:
  - para cuidarlos
  - para vigilarlos
  lexicon: No inventar número de léxico; decisión semántica contextual.
  rationale: «Guardar» reproduce con naturalidad la función de custodia. El plural de objeto directo («los») se mantiene para respetar el antecedente implícito en el contexto.
- source_word: καὶ αὐτὸς ἐκαθάρισεν τὰς ἁμαρτίας αὐτῶν / and he himself cleansed their sins
  english_pob_choice: and he himself cleansed their sins
  chosen_spanish: y él mismo limpió sus pecados
  alternatives_spanish:
  - y él mismo purificó sus pecados
  - y él mismo expió sus pecados
  lexicon: No inventar número de léxico; decisión semántica contextual.
  rationale: Se conserva el verbo de limpieza, como hace el inglés POB, porque el texto presenta una acción de purificación ligada a la obra del sujeto. «Expiar» sería más teológicamente interpretativo y menos transparente al griego literal.
- source_word: κοπιάσας πολλὰ καὶ ὑπομείνας πολλοὺς κόπους / having labored much and endured many toils
  english_pob_choice: having labored much and endured many toils
  chosen_spanish: habiendo trabajado mucho y soportado muchas fatigas
  alternatives_spanish:
  - habiendo laborado mucho y soportado muchos trabajos
  - tras mucho trabajo y muchas fatigas soportadas
  lexicon: No inventar número de léxico; decisión semántica contextual.
  rationale: «Trabajado» y «fatigas» reflejan el paralelismo del griego entre esfuerzo y penuria; «soportado» mantiene el valor de perseverar bajo cargas.
- source_word: οὐδεὶς γὰρ δύναται σκάπτειν ἄνευ κόπου ἢ πόνου / for no one can dig without toil or labor
  english_pob_choice: for no one can dig without toil or labor
  chosen_spanish: porque nadie puede cavar sin trabajo ni labor
  alternatives_spanish:
  - porque nadie puede cavar sin esfuerzo ni fatiga
  - pues nadie puede cavar sin penoso trabajo
  lexicon: No inventar número de léxico; decisión semántica contextual.
  rationale: «Trabajo ni labor» conserva la doble cadencia del original y del inglés POB, con un español comprensible y sobrio; «cavar» mantiene la imagen concreta de la comparación.
theological_decisions:
- issue: La referencia a que él mismo limpió sus pecados puede sonar, en español, a una formulación de expiación más fuerte de lo que el texto griego dice literalmente.
  english_pob_reading: and he himself cleansed their sins
  chosen_spanish_reading: y él mismo limpió sus pecados
  alternative_spanish_readings:
  - y él mismo expió sus pecados
  - y él mismo purificó sus pecados
  rationale: Se mantiene la imagen de limpieza/purificación sin añadir una doctrina de expiación que el pasaje no desarrolla explícitamente en esta frase. Esto preserva la tensión textual entre limpieza moral y la obra eficaz del sujeto.
  doctrine_reference: Purificación/limpieza de pecados; evitar sobreinterpretación expiatoria.
- issue: El sujeto implícito/expreso en la frase final cambia de la tercera persona singular a un referente general impersonal en la comparación sobre cavar.
  english_pob_reading: for no one can dig without toil or labor
  chosen_spanish_reading: porque nadie puede cavar sin trabajo ni labor
  alternative_spanish_readings:
  - pues nadie puede cavar sin esfuerzo ni fatiga
  rationale: 'Se conserva el valor proverbial/general del enunciado: la tarea material requiere esfuerzo. No se teologiza la imagen más allá de su función argumentativa.'
  doctrine_reference: Afirmación proverbial sobre el esfuerzo humano.
translation_notes:
  revision_awareness: No se detectaron revisiones previas aplicadas en el paquete fuente. La redacción española sigue de cerca la lectura inglesa auditada, pero vuelve al griego para sostener los matices de «astuto», «obstinado», «limpió» y la comparación final sobre cavar.
  spanish_consistency_notes:
  - Se mantiene «parábola» de forma consistente para παραβολή, en consonancia con la POB inglesa.
  - Se conserva «limpió sus pecados» para no ocultar la tensión lexical entre limpieza y expiación.
  - El registro es bíblico pero moderno, evitando arcaísmos innecesarios como «hízolo» o «parabola» sin tilde.
  - No se introduce «SEÑOR» ni «Cristo» porque el pasaje no los contiene.
