  yaml_path: translation/extra_canonical/shepherd_of_hermas/010/008.yaml
  text: 8. Many other stones lay around the tower, and they were not using them for the building—for some of them were scabby, others had cracks, others were mutilated, others were white and round, not fitting for the building.
translation:
  language: es
  text: 8. Muchas otras piedras estaban alrededor de la torre, y no las estaban usando para la construcción; porque unas estaban cubiertas de costras, otras tenían grietas, otras estaban mutiladas, y otras eran blancas y redondas, y no servían para la construcción.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λίθοι / stones
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - piedras de construcción
  - bloques
  lexicon: No aplica
  rationale: «Piedras» es natural en español y conserva la imagen concreta del material alrededor de la torre. «Bloques» sería más interpretativo y menos transparente al original.
- source_word: περὶ τὸν πύργον / around the tower
  english_pob_choice: around the tower
  chosen_spanish: alrededor de la torre
  alternatives_spanish:
  - en torno a la torre
  - junto a la torre
  lexicon: No aplica
  rationale: La preposición simple reproduce bien la relación espacial sin añadir matices no presentes en el griego.
- source_word: οὐκ ἐχρῶντο / they were not using them
  english_pob_choice: they were not using them
  chosen_spanish: no las estaban usando
  alternatives_spanish:
  - no las usaban
  - no las empleaban
  lexicon: No aplica
  rationale: El imperfecto progresivo en español mantiene el valor aspectual de la acción continua o en curso mejor que un pretérito simple.
- source_word: οἰκοδομή / building
  english_pob_choice: the building
  chosen_spanish: la construcción
  alternatives_spanish:
  - edificación
  - edificio
  lexicon: No aplica
  rationale: «Construcción» preserva el proceso y la función arquitectónica del contexto; «edificio» podría sonar demasiado estático en este pasaje.
- source_word: λεπρῶν / scabby
  english_pob_choice: scabby
  chosen_spanish: llenas de sarna
  alternatives_spanish:
  - con costras
  - escamosas
  lexicon: No aplica
  rationale: El inglés auditado usa «scabby» para una afección visible de la piedra. «Llenas de sarna» conserva esa fuerza patológica en español, aunque suena chocante; es preferible a suavizarla con un término más vago. Dado que no hay leyenda léxica adicional en el audit trail, se mantiene la imagen sin normalizarla.
- source_word: ῥήγματα / cracks
  english_pob_choice: cracks
  chosen_spanish: grietas
  alternatives_spanish:
  - rajaduras
  - fisuras
  lexicon: No aplica
  rationale: «Grietas» es la equivalencia más directa, clara y idiomática en español.
- source_word: κολοβωμένα / mutilated
  english_pob_choice: mutilated
  chosen_spanish: mutiladas
  alternatives_spanish:
  - despedazadas
  - truncadas
  lexicon: No aplica
  rationale: «Mutiladas» conserva la idea de daño severo y no meramente superficial. Aunque personifica, mantiene la dureza del original y del inglés POB.
- source_word: λευκὰ καὶ στρογγύλα / white and round
  english_pob_choice: white and round
  chosen_spanish: blancas y redondas
  alternatives_spanish:
  - blancas y de forma redonda
  - blanquecinas y redondas
  lexicon: No aplica
  rationale: La coordinación adjetival se conserva sin artificio. «Blancas y redondas» es transparente y fiel al retrato visual.
- source_word: οὐκ εὔχρηστα εἰς τὴν οἰκοδομήν / not fitting for the building
  english_pob_choice: not fitting for the building
  chosen_spanish: no servían para la construcción
  alternatives_spanish:
  - no eran aptas para la construcción
  - no eran útiles para la edificación
  lexicon: No aplica
  rationale: «Servían» expresa utilidad y aptitud de modo natural en español. «No aptas» sería también válido, pero menos fluido en este contexto descriptivo.
theological_decisions:
- issue: La referencia a la «torre» como imagen simbólica debe mantenerse sin explicarla ni reinterpretarla.
  english_pob_reading: The tower is described as a building image with stones judged for use or rejection.
  chosen_spanish_reading: La torre se presenta solo como imagen arquitectónica del pasaje, sin añadir interpretación alegórica en el texto.
  alternative_spanish_readings:
  - La torre como símbolo eclesial explícito
  - La torre como referencia doctrinal desarrollada
  rationale: El segmento no desarrolla aquí la interpretación; por fidelidad al texto y al audit trail, conviene conservar la descripción concreta sin ampliar su sentido.
  doctrine_reference: Hermas, Visiones 3; principio de no sobreinterpretación en la traducción
- issue: La clasificación negativa de las piedras debe reflejar su inutilidad para la obra sin suavizar la evaluación.
  english_pob_reading: Some stones are unsuitable for the building because of visible defects.
  chosen_spanish_reading: Algunas piedras son rechazadas para la construcción por sus defectos visibles.
  alternative_spanish_readings:
  - Algunas piedras no se usan por estar dañadas
  - Algunas piedras son desechadas por no ser aptas
  rationale: La formulación española conserva el juicio práctico del pasaje. No se introduce una valoración moral adicional ni se atenúa la exclusión de las piedras.
  doctrine_reference: Hermas, Visiones 3; lenguaje de discernimiento y selección
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas ni pasajes conflictivos en el audit trail; la versión inglesa muestra alta concordancia y sin notas. Por ello, el español se construye directamente desde el griego con apoyo del inglés POB solo como control de equivalencia.
  spanish_consistency_notes:
  - Se mantiene «torre» de forma consistente para πύργος.
  - Se usa «construcción» de manera uniforme para οἰκοδομή.
  - Se conserva el plural femenino en los pronombres («las») para concordar con «piedras».
  - No se introduce terminología eclesiástica posterior que no aparezca en este segmento.
