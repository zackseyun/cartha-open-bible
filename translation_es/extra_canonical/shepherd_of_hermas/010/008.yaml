    issue: «llenas de sarna» aplicado a piedras
    rationale: Aunque intenta reflejar «scabby», en español se asocia demasiado literalmente con una enfermedad de seres vivos. «Cubiertas de costras» conserva la imagen de superficie defectuosa y resulta más natural para piedras.
  - severity: low
    issue: «yacían» suena algo literario/forzado aquí
    rationale: No es incorrecto, pero «estaban alrededor de la torre» o «se hallaban» encaja mejor con el español moderno y el tono descriptivo del pasaje sin afectar el sentido.
