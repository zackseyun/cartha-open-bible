  text: 4. And again she took hold of my hand, raised me up, and seated me on the bench on the left; and she herself sat on the right. And, lifting up a certain bright rod, she says to me, “Do you see a great thing?” I say to her, “Lady, I see nothing.” She says to me, “[You,] look—do you not see opposite you a great tower being built upon the waters with square, shining stones?”
translation:
  language: es
  text: '4. Y otra vez me tomó de la mano, me levantó y me sentó en el banco de la izquierda; y ella misma se sentó a la derecha. Y, levantando una cierta vara brillante, me dice: «¿Ves una cosa grande?» Yo le digo: «Señora, no veo nada». Ella me dice: «Mira tú: ¿no ves delante de ti una gran torre que se está construyendo sobre las aguas con piedras cuadradas y resplandecientes?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπιλαβομένη
  english_pob_choice: took hold of my hand
  chosen_spanish: me tomó de la mano
  alternatives_spanish:
  - me asió de la mano
  - me sujetó de la mano
  lexicon: λαμβάνω / ἐπιλαμβάνομαι
  rationale: La acción es física y directa; «tomó de la mano» suena natural en español y conserva el gesto de guía sin añadir intensidad innecesaria.
- source_word: ῥάβδον τινα λαμπράν
  english_pob_choice: a certain bright rod
  chosen_spanish: una cierta vara brillante
  alternatives_spanish:
  - una vara brillante
  - una vara resplandeciente
  lexicon: ῥάβδος
  rationale: «Vara» mantiene el objeto alargado de autoridad o señal; «cierta» reproduce el indefinido del griego y del inglés POB. «Brillante» es fiel y claro en español.
- source_word: ὁρᾷς / βλέπεις
  english_pob_choice: Do you see? / I see nothing
  chosen_spanish: ¿Ves? / no veo nada
  alternatives_spanish:
  - ¿Miras? / no miro nada
  - ¿Apercibes? / no percibo nada
  lexicon: ὁράω
  rationale: En este pasaje el verbo de visión es literal y repetido; «ver» es la opción más idiomática y transparente.
- source_word: πύργον μέγαν
  english_pob_choice: a great tower
  chosen_spanish: una gran torre
  alternatives_spanish:
  - una torre grande
  - un gran torreón
  lexicon: πύργος
  rationale: «Torre» es el equivalente directo y estándar; el adjetivo antepuesto conserva el tono enfático del original y del inglés POB.
- source_word: ἐπὶ τῶν ὑδάτων
  english_pob_choice: upon the waters
  chosen_spanish: sobre las aguas
  alternatives_spanish:
  - encima de las aguas
  - sobre el agua
  lexicon: ὕδωρ
  rationale: «Sobre las aguas» reproduce bien la imagen y evita singularizar un plural que puede ser deliberado en la visión.
- source_word: τετραγώνοις λίθοις
  english_pob_choice: with square, shining stones
  chosen_spanish: con piedras cuadradas y resplandecientes
  alternatives_spanish:
  - con piedras cuadradas y brillantes
  - con piedras de forma cuadrada y resplandecientes
  lexicon: λίθος
  rationale: «Piedras» conserva la materialidad de la construcción; «cuadradas» traduce la forma geométrica, y «resplandecientes» capta el brillo visual del contexto visionario.
theological_decisions:
- issue: La identificación respetuosa de la interlocutora como «Lady»
  english_pob_reading: Lady
  chosen_spanish_reading: Señora
  alternative_spanish_readings:
  - Señora mía
  - Señora
  rationale: En español, «Señora» preserva la cortesía reverente sin imponer una identificación doctrinal adicional. Dado que el texto es visionario y mantiene la ambigüedad narrativa, no se explicita más.
  doctrine_reference: No aplica; decisión de registro y respeto narrativo.
- issue: La imagen de la torre edificada sobre las aguas
  english_pob_reading: a great tower being built upon the waters
  chosen_spanish_reading: una gran torre que se está construyendo sobre las aguas
  alternative_spanish_readings:
  - una gran torre edificada sobre las aguas
  - una gran torre que construyen sobre las aguas
  rationale: Se mantiene el aspecto progresivo del participio presente, que en la visión subraya el proceso de construcción y no solo el estado final. No se suaviza la extrañeza de la escena.
  doctrine_reference: No aplica; imagen visionaria apocalíptica/simbólica.
translation_notes:
  revision_awareness: La versión inglesa auditada no presenta notas ni revisiones textuales adicionales; el control de calidad indica alta concordancia (0.95) con acuerdo general. La draft española sigue de cerca la sintaxis y la imaginería del POB inglés, pero anclándose en el griego para el léxico de visión, objeto y construcción.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de cortesía en segunda persona singular con «me dice»/«le digo», acorde con el tono directo del diálogo.
  - Se conserva la alternancia narrativa de pasado y presente («dice») como recurso de vivacidad del original.
  - No se introducen términos eclesiásticos ajenos al pasaje; la imagen permanece visionaria y concreta.
  - «Yahvé», «Mesías» y otros términos del proyecto no aparecen en este versículo, por lo que no se aplican.
