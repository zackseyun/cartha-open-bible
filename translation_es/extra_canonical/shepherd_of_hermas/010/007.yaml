  to: 7. Pero de las otras piedras que eran traídas de la tierra seca, unas las rechazaban, y otras las ponían en la edificación; a otras las cortaban y las arrojaban lejos de la torre.
  rationale: 'Se hace una reparación pequeña de estilo y precisión contextual: se elimina la coma innecesaria tras ''Pero'' y se sustituye ''en la construcción'' por ''en la edificación'', que suena más natural en español e indica mejor la incorporación de las piedras a la estructura en curso.'
