  text: 7. But of the other stones being brought from the dry land, some they were rejecting, and some they were putting into the building; others they were cutting and throwing far from the tower.
translation:
  language: es
  text: 7. Pero de las otras piedras que eran traídas de la tierra seca, unas las rechazaban, y otras las ponían en la edificación; a otras las cortaban y las arrojaban lejos de la torre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λιθοὶ / piedras
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - piedras
  - piedras de construcción
  lexicon: λίθος
  rationale: '"Piedras" reproduce el sustantivo general del original y mantiene la imagen material del pasaje sin añadir precisión que el texto no exige.'
- source_word: τῆς ξηρᾶς γῆς
  english_pob_choice: from the dry land
  chosen_spanish: de la tierra seca
  alternatives_spanish:
  - de la tierra seca
  - de la tierra árida
  lexicon: ξηρός + γῆ
  rationale: '"Tierra seca" conserva la imagen literal y clara en español. "Árida" es posible, pero introduce un matiz más interpretativo.'
- source_word: ἀπεδοκίμαζον
  english_pob_choice: they were rejecting
  chosen_spanish: las rechazaban
  alternatives_spanish:
  - las rechazaban
  - las desechaban
  lexicon: ἀποδοκιμάζω
  rationale: '"Rechazaban" comunica bien la exclusión evaluativa del verbo griego. "Desechaban" también es viable, pero "rechazaban" resulta más natural en español actual.'
- source_word: ἐμβάλλειν εἰς τὴν οἰκοδομήν
  english_pob_choice: putting into the building
  chosen_spanish: las ponían en la construcción
  alternatives_spanish:
  - las ponían en la construcción
  - las colocaban en la obra
  lexicon: οἰκοδομή
  rationale: '"Construcción" conserva el sentido de la obra edificada sin sobrecargar el texto con terminología técnica. "Obra" es posible, pero "construcción" suena más directo en este contexto alegórico.'
- source_word: ἀπετίμουν / ἔρριπτον ... πόρρω
  english_pob_choice: throwing far from the tower
  chosen_spanish: las arrojaban lejos de la torre
  alternatives_spanish:
  - las arrojaban lejos de la torre
  - las echaban muy lejos de la torre
  lexicon: πόρρω + πύργος
  rationale: '"Arrojaban lejos" reproduce la fuerza del desecho y conserva la distancia explícita del original. "Echaban" es menos enfático.'
theological_decisions:
- issue: Imagen alegórica de selección y descarte de piedras
  english_pob_reading: some they were rejecting, and some they were putting into the building; others they were cutting and throwing far from the tower
  chosen_spanish_reading: unas las rechazaban, y otras las ponían en la construcción; a otras las cortaban y las arrojaban lejos de la torre
  alternative_spanish_readings:
  - unas las rechazaban, y otras las incorporaban en la construcción; a otras las cortaban y las arrojaban lejos de la torre
  - unas las desechaban, y otras las colocaban en el edificio; a otras las cortaban y las arrojaban lejos de la torre
  rationale: La formulación conserva la secuencia de aceptación, incorporación y descarte del símbolo sin reinterpretarlo. "Construcción" mantiene el valor alegórico de una obra en curso; "torre" se conserva por ser parte central de la imagen del pasaje.
  doctrine_reference: Shepherd of Hermas, Vision 3, allegorical imagery
- issue: No explicit theological technical term in this verse
  english_pob_reading: But of the other stones being brought from the dry land
  chosen_spanish_reading: Pero, de las otras piedras que eran traídas de la tierra seca
  alternative_spanish_readings:
  - Pero, de las otras piedras que eran traídas de la tierra seca
  - Pero, de las demás piedras que eran traídas de la tierra seca
  rationale: Se mantiene el énfasis narrativo sin introducir doctrinas ni terminología eclesiástica ajena al texto.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: This draft follows the provided English POB wording closely while returning to the Greek imagery for the source-grounded Spanish renderings. No applied revisions were supplied, and the cross-check reported high agreement with only minor issues.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y literario apto para publicación.
  - '"Torre" y "construcción" conservan la imaginería alegórica sin sustituirla por glosas interpretativas.'
  - Se evitó el uso de "edificio" para no perder la idea dinámica de la obra en proceso.
