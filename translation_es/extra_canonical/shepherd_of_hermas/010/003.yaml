  text: 3. After she had said these things, she wanted to depart; but I fell at her feet and asked her by the Lord to show me the vision that she had promised me.
translation:
  language: es
  text: 3. Después de haber dicho estas cosas, quiso irse; pero yo caí a sus pies y le rogué en el Señor que me mostrara la visión que me había prometido.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μετὰ δὲ τὸ εἰπεῖν αὐτὴν ταῦτα
  english_pob_choice: After she had said these things
  chosen_spanish: Después de que ella hubo dicho estas cosas
  alternatives_spanish:
  - Después de que dijo estas cosas
  - Después de haber dicho estas cosas
  lexicon: μετά + infinitivo aoristo; demonstrativo ταῦτα
  rationale: Mantiene la relación temporal pasada sin sonar mecánicamente calcada. «Hubo dicho» preserva el matiz de anterioridad completa del aoristo en un español solemne y claro.
- source_word: ἠθέλησεν ἀπελθεῖν
  english_pob_choice: she wanted to depart
  chosen_spanish: quiso irse
  alternatives_spanish:
  - quería partir
  - quiso partir
  lexicon: θέλω + infinitivo; ἀπέρχομαι
  rationale: «Irse» es natural en español para la idea de marcharse, y conserva la sencillez del griego. «Partir» sería más elevado, pero menos idiomático aquí.
- source_word: ἐγὼ δὲ πεσὼν εἰς τοὺς πόδας αὐτῆς
  english_pob_choice: I fell at her feet
  chosen_spanish: yo me arrojé a sus pies
  alternatives_spanish:
  - caí a sus pies
  - me eché a sus pies
  lexicon: πίπτω εἰς τοὺς πόδας
  rationale: La fórmula griega expresa una caída postrada; «me arrojé a sus pies» comunica mejor la súplica urgente y reverente que un simple «caí».
- source_word: παρεκάλουν αὐτὴν ἐν τῷ Κυρίῳ
  english_pob_choice: asked her by the Lord
  chosen_spanish: le pedí, por el Señor
  alternatives_spanish:
  - la rogué en el Señor
  - le suplicaba en el Señor
  lexicon: παρακαλέω + ἐν τῷ Κυρίῳ
  rationale: Se conserva el valor de súplica respetuosa de παρακαλέω. «Por el Señor» refleja la mediación invocada en la expresión griega y suena natural en español.
- source_word: δεῖξαί μοι τὴν ὁπτασίαν
  english_pob_choice: to show me the vision
  chosen_spanish: que me mostrara la visión
  alternatives_spanish:
  - que me enseñara la visión
  - que me hiciera ver la visión
  lexicon: δείκνυμι + ὁπτασία
  rationale: «Mostrar» es la equivalencia más directa y sobria para δείκνυμι, y «visión» mantiene el término técnico del relato.
- source_word: ἣν ἐπηγγείλατό μοι
  english_pob_choice: that she had promised me
  chosen_spanish: que me había prometido
  alternatives_spanish:
  - que me había asegurado
  - que me había anunciado
  lexicon: ἐπαγγέλλομαι
  rationale: «Prometer» reproduce con precisión el compromiso verbal del verbo griego y coincide con el audit trail inglés.
theological_decisions:
- issue: Invocación cristológica de autoridad en una súplica
  english_pob_reading: asked her by the Lord
  chosen_spanish_reading: le pedí, por el Señor
  alternative_spanish_readings:
  - le rogué en el Señor
  - le supliqué en el Señor
  rationale: La frase no introduce doctrina nueva, pero sí conserva la fórmula devocional de pedir bajo la referencia al Señor. «Por el Señor» mantiene la dependencia invocacional sin sobrerinterpretar.
  doctrine_reference: piedad e invocación al Señor en contexto narrativo
translation_notes:
  revision_awareness: El inglés POB y el griego muestran plena concordancia de sentido en esta unidad; no hay revisiones aplicadas ni variantes textuales relevantes en el paquete auditado.
  spanish_consistency_notes:
  - Se mantiene «visión» para ὁπτασία en todo el pasaje.
  - Se usa «Señor» solo para el elemento devocional de ἐν τῷ Κυρίῳ, siguiendo el contexto del relato, no como sustituto del nombre divino.
  - El tono es narrativo y sobrio, con sintaxis española fluida pero cercana al orden del original.
