base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/010/001.yaml
  text: '1. “What,” I said, “did they endure?” She says, “Listen: scourges, imprisonments, great afflictions, crosses, wild beasts—for the sake of the Name. For this reason the right-hand parts of the sanctuary belong to them, and to whoever suffers because of the Name; but the left-hand parts belong to the rest. Yet for both, those sitting on the right and those on the left, the gifts are the same and the promises the same—only those on the right sit there and have some glory.”'
translation:
  language: es
  text: '1. «¿Qué», dije, «soportaron?» Ella dice: «Escucha: azotes, prisiones, grandes aflicciones, cruces, bestias salvajes, por causa del Nombre. Por eso las partes de la derecha del santuario pertenecen a ellos y a todo el que padece por causa del Nombre; pero las partes de la izquierda pertenecen a los demás. Sin embargo, para ambos, para los que están sentados a la derecha y para los que están a la izquierda, los dones son los mismos y las promesas las mismas; solo los de la derecha se sientan allí y tienen cierta gloria».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν τῷ ὀνόματι / for the sake of the Name
  english_pob_choice: for the sake of the Name
  chosen_spanish: por causa del Nombre
  alternatives_spanish:
  - por el Nombre
  - en favor del Nombre
  lexicon: Nombre
  rationale: Conservo la mayúscula para reflejar el uso reverencial del título y mantengo la relación causal/teleológica de la expresión inglesa sin domesticarla a una fórmula eclesiástica más interpretativa.
- source_word: δεξιά / right-hand parts
  english_pob_choice: the right-hand parts
  chosen_spanish: las partes de la derecha
  alternatives_spanish:
  - las partes derechas
  - el lado derecho
  lexicon: derecha
  rationale: La referencia es espacial y no simbólica. «Partes de la derecha» reproduce la imagen del texto y evita añadir una connotación doctrinal no explicitada aquí.
- source_word: ἀριστερά / left-hand parts
  english_pob_choice: the left-hand parts
  chosen_spanish: las partes de la izquierda
  alternatives_spanish:
  - las partes izquierdas
  - el lado izquierdo
  lexicon: izquierda
  rationale: Mantiene el paralelismo con «las partes de la derecha» y conserva la simetría espacial del pasaje.
- source_word: δωρεαί / gifts
  english_pob_choice: the gifts
  chosen_spanish: los dones
  alternatives_spanish:
  - los regalos
  - las dádivas
  lexicon: don
  rationale: «Dones» es el equivalente natural y sobrio en español para este contexto, y preserva el matiz de beneficio concedido.
- source_word: ἐπαγγελίαι / promises
  english_pob_choice: the promises
  chosen_spanish: las promesas
  alternatives_spanish:
  - los compromisos
  - las garantías
  lexicon: promesa
  rationale: Es la correspondencia directa y clara del término, sin sobreinterpretar el alcance de la promesa.
- source_word: δόξα / glory
  english_pob_choice: some glory
  chosen_spanish: cierta gloria
  alternatives_spanish:
  - algo de gloria
  - alguna gloria
  lexicon: gloria
  rationale: «Cierta gloria» reproduce la restricción indefinida del inglés POB («some glory») y evita absolutizar el privilegio de los de la derecha.
theological_decisions:
- issue: Privilegio diferencial entre derecha e izquierda sin cambio de dones/promesas
  english_pob_reading: only those on the right sit there and have some glory
  chosen_spanish_reading: solo los de la derecha se sientan allí y tienen cierta gloria
  alternative_spanish_readings:
  - solo los de la derecha tienen gloria
  - solo los de la derecha poseen más gloria
  rationale: 'La traducción conserva la tensión: hay una distinción real en la ubicación y en «cierta gloria», pero no en los dones ni en las promesas, que permanecen iguales para ambos grupos.'
  doctrine_reference: Distinción de recompensa sin negar igualdad de gracia/promesa en el pasaje
translation_notes:
  revision_awareness: El texto base y la versión inglesa auditada muestran acuerdo alto; no se registran revisiones aplicadas ni variantes textuales relevantes en este segmento.
  spanish_consistency_notes:
  - Se usa «Nombre» con mayúscula de modo consistente para reflejar el valor reverencial del texto.
  - Se evita «SEÑOR» porque el pasaje habla del Nombre, no de una sustitución del tetragrámaton.
  - Se mantiene el paralelismo «derecha/izquierda» para conservar la estructura retórica del original.
