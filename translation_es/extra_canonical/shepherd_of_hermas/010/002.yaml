    issue: ‘te apresuras’ no refleja con la mejor precisión σπουδάζεις en este contexto
    rationale: Aunque puede solaparse con ‘darse prisa’, aquí el punto principal no es la velocidad sino el afán o empeño por ocupar el lugar de honor. ‘Te empeñas en sentarte’ conserva mejor la fuerza volitiva del griego y suena más natural en español.
  - severity: low
    issue: La nota al pie puede pulirse estilísticamente
    rationale: ‘Para conservar el matiz moral y cultual del pasaje’ es correcta, pero una formulación un poco más fluida mejora la calidad editorial sin cambiar el contenido.
