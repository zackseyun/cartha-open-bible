  text: 2. “But you are eager to sit on the right with them; yet your shortcomings are many. Still, you will be cleansed from your shortcomings, and all who are not double-minded will be cleansed from all their sins up to this day.”
translation:
  language: es
  text: 2. «Pero tú te empeñas en sentarte a la derecha con ellos; sin embargo, tus faltas son muchas. Con todo, serás purificado[a] de tus faltas, y todos los que no son de doble ánimo serán purificados de todos sus pecados hasta este día».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego καθαρισθήσῃ: también puede traducirse “serás limpiado”; se prefirió “purificado” para conservar el matiz moral y cultual del texto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δεξιά / right
  english_pob_choice: the right
  chosen_spanish: a la derecha
  alternatives_spanish:
  - a mano derecha
  - del lado derecho
  lexicon: right (directional position)
  rationale: Mantengo el valor espacial de “right” como posición de honor junto a otros, sin introducir una formulación más interpretativa como “a la diestra”, que en español bíblico suele sonar más cristológica y puede sobrecargar el matiz aquí.
- source_word: σπουδάζεις / eager
  english_pob_choice: you are eager
  chosen_spanish: te apresuras
  alternatives_spanish:
  - estás ansioso
  - te empeñas
  lexicon: eager, hasten, be eager
  rationale: La idea principal en el contexto es el impulso de buscar asiento de honor; “te apresuras” conserva la fuerza volitiva y evita psicologizar demasiado el verbo.
- source_word: ἐλλείψεις / shortcomings
  english_pob_choice: shortcomings
  chosen_spanish: faltas
  alternatives_spanish:
  - deficiencias
  - carencias
  - defectos
  lexicon: defects, failings, shortcomings
  rationale: “Faltas” comunica bien la insuficiencia moral o espiritual del pasaje en español natural y mantiene una amplitud compatible con el griego.
- source_word: καθαρισθήσῃ / will be cleansed
  english_pob_choice: will be cleansed
  chosen_spanish: serás purificado
  alternatives_spanish:
  - serás limpiado
  - serás purificado y limpiado
  lexicon: to cleanse, purify
  rationale: “Purificado” refleja tanto la limpieza moral como la resonancia cultual del verbo sin forzar una imagen exclusivamente higiénica.
- source_word: οἱ μὴ διψυχοι / all who are not double-minded
  english_pob_choice: all who are not double-minded
  chosen_spanish: todos los que no son de doble ánimo
  alternatives_spanish:
  - todos los que no dudan
  - todos los que no son vacilantes
  lexicon: double-minded, of two souls
  rationale: “De doble ánimo” preserva la expresión tradicional y la metáfora interna de doble lealtad o vacilación, más cercana al griego que una paráfrasis psicológica.
- source_word: ἁμαρτίαι / sins
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - culpas
  - faltas
  lexicon: sins
  rationale: “Pecados” es la equivalencia directa y estable en español para el campo moral-religioso del texto.
theological_decisions:
- issue: Purificación frente a perdón como resultado prometido
  english_pob_reading: you will be cleansed from your shortcomings, and all who are not double-minded will be cleansed from all their sins up to this day
  chosen_spanish_reading: serás purificado de tus faltas, y todos los que no son de doble ánimo serán purificados de todos sus pecados hasta este día
  alternative_spanish_readings:
  - serás perdonado de tus faltas
  - serás limpiado de tus faltas
  rationale: El pasaje habla de limpieza/purificación, no simplemente de absolución jurídica. Conservar “purificado” mantiene la tensión moral y ritual del original y el alcance de la promesa.
  doctrine_reference: santificación y purificación moral en lenguaje visionario/apocalíptico
- issue: ‘De doble ánimo’ como condición excluyente para la purificación
  english_pob_reading: all who are not double-minded
  chosen_spanish_reading: todos los que no son de doble ánimo
  alternative_spanish_readings:
  - todos los que son sinceros
  - todos los que tienen un solo ánimo
  rationale: La formulación conserva la condición del texto sin suavizarla. “De doble ánimo” es la mejor manera de mantener la ambigüedad moral y la advertencia del original.
  doctrine_reference: integridad interior / advertencia contra la duplicidad
translation_notes:
  revision_awareness: La auditoría en inglés marca alta concordancia y solo cuestiones menores. No hubo revisiones aplicadas; por eso la redacción española sigue de cerca el sentido del original griego y la versión inglesa POB, con una sola nota léxica donde el español ofrece una alternativa relevante.
  spanish_consistency_notes:
  - Se mantiene “Yahvé”/“Mesías” por norma del proyecto solo cuando aparecen esos léxicos; aquí no aplican.
  - “De doble ánimo” conserva la terminología bíblica tradicional y la tensión semántica del griego sin convertirla en una paráfrasis.
  - Se evitó “a la diestra” porque en español puede sugerir una lectura cristológica no presente de forma explícita en este contexto.
