  yaml_path: translation/extra_canonical/shepherd_of_hermas/010/005.yaml
  text: 5. The tower was being built in a square by the six young men who had come with her; and myriads of other men were bringing stones, some from the deep and others from the land, and were handing them to the six young men. They would take them and build.
translation:
  language: es
  text: 5. La torre estaba siendo construida en un cuadrado por los seis jóvenes que habían venido con ella; y miríadas de otros hombres traían piedras, unas del abismo y otras de la tierra, y se las entregaban a los seis jóvenes. Ellos las tomaban y construían con ellas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πύργος
  english_pob_choice: the tower
  chosen_spanish: la torre
  alternatives_spanish:
  - la fortaleza
  - la construcción
  lexicon: N/A
  rationale: «Torre» es el equivalente directo y natural en español; mantiene la imagen arquitectónica del pasaje sin añadir matiz interpretativo.
- source_word: τετραγώνως
  english_pob_choice: in a square
  chosen_spanish: en forma de cuadrado
  alternatives_spanish:
  - cuadrada
  - de manera cuadrada
  lexicon: N/A
  rationale: La expresión describe la forma de la construcción. «En forma de cuadrado» es más claro y natural que un calco adverbial literal en español.
- source_word: οἱ ἕξ νεανίσκοι
  english_pob_choice: the six young men
  chosen_spanish: los seis jóvenes
  alternatives_spanish:
  - los seis muchachos
  - los seis jóvenes varones
  lexicon: N/A
  rationale: «Jóvenes» conserva el valor de νεανίσκοι sin sobreespecificar edad o tono; el contexto masculino queda claro por el participio y el resto de la frase.
- source_word: μυριάδες
  english_pob_choice: myriads
  chosen_spanish: miríadas
  alternatives_spanish:
  - multitudes
  - millares
  lexicon: N/A
  rationale: «Miríadas» reproduce la hipérbole numérica y el registro elevado del texto fuente mejor que una cifra aproximada.
- source_word: πέτρους
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - lajas
  - piedrones
  lexicon: N/A
  rationale: «Piedras» es la traducción directa y suficientemente amplia para el material de construcción del pasaje.
- source_word: ἐκ τοῦ βάθους
  english_pob_choice: from the deep
  chosen_spanish: del abismo
  alternatives_spanish:
  - de las profundidades
  - del fondo
  lexicon: N/A
  rationale: «Abismo» mantiene la imagen de profundidad extrema y el contraste con «de la tierra»; además conserva el tono casi cosmológico del griego mejor que una simple referencia espacial.
- source_word: ἐκ τῆς γῆς
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del suelo
  - de la tierra firme
  lexicon: N/A
  rationale: «Tierra» corresponde de manera directa a γῆ y preserva el paralelo con «del abismo».
- source_word: ἐπέδιδον
  english_pob_choice: were handing them to
  chosen_spanish: se las entregaban
  alternatives_spanish:
  - se las pasaban
  - se las daban
  lexicon: N/A
  rationale: «Entregaban» comunica el acto de pasar materiales con cierta formalidad y claridad. El pronombre enclítico «se las» mantiene la referencia a las piedras ya mencionadas.
- source_word: λαμβάνοντες
  english_pob_choice: They would take them
  chosen_spanish: Ellos las tomaban
  alternatives_spanish:
  - las recibían
  - las recogían
  lexicon: N/A
  rationale: «Tomaban» refleja la repetición habitual del participio y conserva la sencillez narrativa del griego y del inglés POB.
- source_word: οἰκοδομοῦντες
  english_pob_choice: and build
  chosen_spanish: y construían
  alternatives_spanish:
  - y edificaban
  - y levantaban
  lexicon: N/A
  rationale: «Construían» es idiomático en español y sigue el sentido básico de edificar la torre sin introducir un término demasiado técnico o eclesiástico.
theological_decisions:
- issue: Imagen de la torre como construcción simbólica sin reinterpretación doctrinal
  english_pob_reading: 'The English POB keeps the scene descriptive: a tower being built by specified agents, with no added allegory in the verse itself.'
  chosen_spanish_reading: La versión española conserva la descripción literal de la acción, sin cargar el verso con explicaciones alegóricas no presentes en el pasaje.
  alternative_spanish_readings:
  - La torre se levantaba como símbolo...
  - La torre era edificada en sentido espiritual...
  rationale: El texto de este segmento funciona narrativamente. Mantenerlo descriptivo respeta la economía del original y evita sobreinterpretación.
  doctrine_reference: Hermas, Vision 3, section ii; no doctrinal expansion in verse 5
translation_notes:
  revision_awareness: The source packet indicates high agreement and only minor issues; no applied revisions are listed. The Spanish draft therefore follows the English POB closely while making only idiomatic adjustments required by Spanish.
  spanish_consistency_notes:
  - Se mantiene «torre» de manera uniforme.
  - Se conserva el paralelismo «del abismo / de la tierra».
  - No se introduce terminología eclesiástica ajena al pasaje.
