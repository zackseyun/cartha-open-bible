revisions:
- from: 9. Y vi otras piedras que eran arrojadas lejos de la torre y caían en el camino, y no permanecían en el camino, sino que rodaban hacia el desierto; otras caían en el fuego y eran quemadas; otras caían cerca de las aguas y no podían rodar hasta el agua, aunque querían rodar y llegar al agua.
  to: 9. Y vi otras piedras que eran arrojadas lejos de la torre y llegaban al camino, y no permanecían en el camino, sino que rodaban hacia el desierto; otras caían en el fuego y eran quemadas; otras caían cerca de las aguas y no podían rodar al agua, aunque querían rodar y llegar al agua.
  rationale: Se ajusta «caían en el camino» a «llegaban al camino» para reflejar mejor el movimiento indicado por el original y por el POB inglés. Se cambia «rodar hasta el agua» por «rodar al agua» para mejorar la naturalidad y precisión espacial en español. No se requieren notas.
