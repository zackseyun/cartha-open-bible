  text: 9. And I saw other stones being thrown far from the tower and coming into the road, and not remaining in the road but rolling into the wasteland; others falling into fire and being burned; others falling near waters and not being able to roll into the water, though they wanted to roll and come into the water.
translation:
  language: es
  text: 9. Y vi otras piedras que eran arrojadas lejos de la torre y llegaban al camino, y no permanecían en el camino, sino que rodaban hacia el desierto; otras caían en el fuego y eran quemadas; otras caían cerca de las aguas y no podían rodar al agua, aunque querían rodar y llegar al agua.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λίθοι / stones
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - piedras
  - rocas
  lexicon: λίθος
  rationale: «Piedras» mantiene la imagen concreta y fluida del pasaje en español; «rocas» sugeriría un tamaño mayor que el griego no exige.
- source_word: πρόρριπτον / being thrown far from
  english_pob_choice: being thrown far from
  chosen_spanish: eran arrojadas lejos de
  alternatives_spanish:
  - eran lanzadas lejos de
  - eran echadas lejos de
  lexicon: προρρίπτω
  rationale: La idea central es separación violenta y distancia respecto de la torre; «arrojadas» conserva mejor esa fuerza que una opción más neutra.
- source_word: εἰς τὴν ὁδόν / into the road
  english_pob_choice: into the road
  chosen_spanish: en el camino
  alternatives_spanish:
  - en el camino
  - a la senda
  lexicon: ὁδός
  rationale: «Camino» es natural en español y mantiene el sentido de vía o senda transitada sin introducir una imagen demasiado técnica.
- source_word: κυλισθέντα / rolling
  english_pob_choice: rolling
  chosen_spanish: rodaban
  alternatives_spanish:
  - rodaban
  - se rodaban
  lexicon: κυλίω
  rationale: «Rodaban» expresa el movimiento continuo y pasivo/medio del griego de manera idiomática en español.
- source_word: εἰς τὴν ἔρημον / into the wasteland
  english_pob_choice: into the wasteland
  chosen_spanish: hacia el desierto
  alternatives_spanish:
  - hacia el desierto
  - al yermo
  lexicon: ἔρημος
  rationale: «Desierto» comunica bien la idea de lugar baldío y coincide con el uso bíblico amplio; «yermo» sería más literal pero menos corriente.
- source_word: πῦρ / fire
  english_pob_choice: fire
  chosen_spanish: el fuego
  alternatives_spanish:
  - el fuego
  - las llamas
  lexicon: πῦρ
  rationale: «El fuego» conserva el sustantivo genérico del griego y el paralelismo de la escena de juicio.
- source_word: ἐκαίοντο / being burned
  english_pob_choice: being burned
  chosen_spanish: eran quemadas
  alternatives_spanish:
  - eran quemadas
  - se consumían
  lexicon: καίω
  rationale: «Eran quemadas» reproduce el pasivo del original y mantiene la imagen directa de destrucción por fuego.
- source_word: πλησίον τῶν ὑδάτων / near waters
  english_pob_choice: near waters
  chosen_spanish: cerca de las aguas
  alternatives_spanish:
  - cerca de las aguas
  - junto al agua
  lexicon: ὕδωρ
  rationale: El plural «las aguas» respeta la forma griega y da la amplitud de la escena; «junto al agua» singularizaría indebidamente la imagen.
- source_word: μὴ δυνάμενα / not being able to
  english_pob_choice: not being able to
  chosen_spanish: no podían
  alternatives_spanish:
  - no podían
  - no eran capaces de
  lexicon: δύναμαι
  rationale: «No podían» es la forma más natural y concisa para expresar incapacidad.
theological_decisions:
- issue: Imágenes de juicio y destino de las piedras
  english_pob_reading: stones are cast far from the tower, into the road, wasteland, fire, and waters, illustrating varying fates
  chosen_spanish_reading: 'las piedras son arrojadas lejos de la torre y sufren diversos destinos: camino, desierto, fuego y aguas'
  alternative_spanish_readings:
  - las piedras representan diversos destinos morales
  - las piedras aluden a distintos resultados del juicio
  rationale: La redacción española preserva la imagen concreta sin explicar alegóricamente más de lo que el texto dice; el pasaje funciona como escena simbólica de juicio, pero la traducción no debe cerrar su interpretación.
  doctrine_reference: Simbología moral y escatológica del Pastor de Hermas; lectura prudente de imágenes
- issue: Deseo frustrado de llegar al agua
  english_pob_reading: though they wanted to roll and come into the water
  chosen_spanish_reading: aunque querían rodar y llegar al agua
  alternative_spanish_readings:
  - aunque deseaban rodar y entrar en el agua
  - aunque querían llegar al agua
  rationale: Se conserva la tensión entre deseo y imposibilidad, sin suavizarla ni convertirla en una mera descripción espacial.
  doctrine_reference: Tensión narrativa entre voluntad e incapacidad en el símbolo
- issue: Pluralidad de las aguas
  english_pob_reading: waters
  chosen_spanish_reading: las aguas
  alternative_spanish_readings:
  - el agua
  - las aguas
  rationale: El plural puede ser simplemente estilístico, pero en español conviene mantenerlo para no borrar una posible resonancia simbólica o pictórica del griego.
  doctrine_reference: Respeto a la forma del símbolo en textos visionarios
translation_notes:
  revision_awareness: El texto inglés POB coincide estrechamente con el griego disponible y no presenta notas ni revisiones especiales; la mayor atención editorial aquí es conservar el encadenamiento de participios y la serie de destinos espaciales sin añadir interpretaciones.
  spanish_consistency_notes:
  - Se mantiene «torre» para πύργος en coherencia con el resto del pasaje de Hermas.
  - Se conserva el plural «las aguas» en correspondencia con el inglés POB y la forma griega.
  - Se usa un registro sobrio y visionario, evitando modernizaciones coloquiales.
