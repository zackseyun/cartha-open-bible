  yaml_path: translation/extra_canonical/shepherd_of_hermas/010/006.yaml
  text: 6. The stones hauled up from the deep they set, every one, into the building just as they were; for they were fitted and matched the joining with the other stones, and so were joined to one another, so that their joint was not visible. The construction of the tower appeared as if it had been built from a single stone.
translation:
  language: es
  text: 6. Las piedras sacadas de lo profundo las colocaron, cada una, en la construcción tal como estaban; porque estaban ajustadas y encajaban en la juntura con las demás piedras, y así quedaron unidas entre sí, de modo que su junta no era visible. La construcción de la torre parecía haber sido edificada con una sola piedra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: stones hauled up from the deep
  english_pob_choice: The stones hauled up from the deep
  chosen_spanish: Las piedras transportadas desde el fondo
  alternatives_spanish:
  - Las piedras sacadas desde lo profundo
  - Las piedras traídas desde el fondo del mar
  lexicon: πέτρα / λίθος
  rationale: ‘Transportadas’ comunica el traslado realizado por agentes sin forzar un verbo más específico que el griego y evita añadir ‘mar’ o ‘abismo’ que no están explícitos en el texto recibido.
- source_word: they set, every one, into the building just as they were
  english_pob_choice: they set, every one, into the building just as they were
  chosen_spanish: las colocaron, cada una, en la construcción tal como estaban
  alternatives_spanish:
  - las pusieron, cada una, en el edificio tal como estaban
  - las asentaron, cada una, en la construcción sin cambiarlas
  lexicon: τίθημι / οἰκοδομή
  rationale: ‘Colocaron’ conserva la acción de poner dentro de la estructura sin introducir un matiz técnico excesivo; ‘tal como estaban’ refleja que se mantuvo su condición original.
- source_word: they were fitted and matched the joining with the other stones
  english_pob_choice: they were fitted and matched the joining with the other stones
  chosen_spanish: fueron ajustadas y encajadas con la unión con las demás piedras
  alternatives_spanish:
  - fueron adaptadas y combinadas con la unión de las demás piedras
  - fueron acomodadas y hechas coincidir con la juntura de las otras piedras
  lexicon: ἁρμόζω / συνάπτω
  rationale: ‘Ajustadas’ y ‘encajadas’ reproducen la idea de encaje y concordancia; ‘unión’ intenta conservar el sustantivo de la conexión física sin volverlo demasiado abstracto.
- source_word: their joint was not visible
  english_pob_choice: their joint was not visible
  chosen_spanish: su junta no era visible
  alternatives_spanish:
  - no se veía su juntura
  - la unión entre ellas no se veía
  lexicon: ἁρμός
  rationale: ‘Junta’ es natural en español para una línea de unión material y mantiene la imagen de una obra perfectamente ensamblada.
- source_word: as if it had been built from a single stone
  english_pob_choice: as if it had been built from a single stone
  chosen_spanish: parecía como si hubiera sido edificada con una sola piedra
  alternatives_spanish:
  - parecía como si se hubiera construido de una sola piedra
  - parecía hecha de una sola piedra
  lexicon: ἐκ μιᾶς λίθου
  rationale: ‘Edificada’ mantiene el tono arquitectónico; ‘una sola piedra’ conserva la imagen hiperbólica de unidad visible en el original.
theological_decisions:
- issue: Imagery of perfect unity in the tower
  english_pob_reading: The tower appears seamless, as if made of one stone.
  chosen_spanish_reading: La torre parece perfectamente unida, como si fuera de una sola piedra.
  alternative_spanish_readings:
  - La torre parece sin fisuras, como si hubiera sido hecha de una sola piedra
  - La torre aparenta unidad total, como si se hubiera levantado con una sola piedra
  rationale: La formulación conserva la metáfora de ensamblaje perfecto sin convertirla en una abstracción doctrinal no presente en el pasaje. La unidad visible de la torre es el punto retórico central.
  doctrine_reference: Unidad e integridad de la comunidad simbolizada por la torre (sin lectura dogmática añadida)
translation_notes:
  revision_awareness: The English POB text already resolves the Greek into a straightforward architectural image with no footnotes or major theological disputes. The Spanish draft follows that high-agreement reading and preserves the repeated building/joint imagery without adding interpretive expansion.
  spanish_consistency_notes:
  - Se mantiene ‘torre’ para el símbolo arquitectónico central.
  - Se conserva ‘piedras’ y ‘junta/unión’ para reproducir la imaginería material con consistencia.
  - No se introduce vocabulario eclesiástico adicional que no esté exigido por el texto.
