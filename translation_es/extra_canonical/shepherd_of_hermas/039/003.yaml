  to: «¿Por qué», pregunto yo, «la oración del que está triste no sube al altar?» «Porque», dice él, «la tristeza se ha asentado en su corazón. Por eso la tristeza, mezclada con la oración, no permite que la oración suba pura al altar. Porque, así como el vinagre y el vino, mezclados, no tienen el mismo agrado, así también la tristeza, mezclada con el Espíritu Santo, no produce la misma oración[a]».
