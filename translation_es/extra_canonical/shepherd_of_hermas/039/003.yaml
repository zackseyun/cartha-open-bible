  yaml_path: translation/extra_canonical/shepherd_of_hermas/039/003.yaml
  text: “Why,” I ask, “does the prayer of the one who is sorrowing not ascend to the altar?” “Because,” he says, “sorrow has settled in his heart. Therefore sorrow, mixed with the prayer, does not allow the prayer to ascend pure to the altar. For just as vinegar and wine, mixed together, do not have the same pleasantness, so also sorrow, mixed with the Holy Spirit, does not have the same prayer.”
translation:
  language: es
  text: «¿Por qué», pregunto yo, «la oración del que está triste no sube al altar?» «Porque», dice él, «la tristeza se ha asentado en su corazón. Por eso la tristeza, mezclada con la oración, no permite que la oración suba pura al altar. Porque, así como el vinagre y el vino, mezclados, no tienen el mismo agrado, así también la tristeza, mezclada con el Espíritu Santo, no produce la misma oración[a]».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «no tiene la misma clase de oración». El griego repite «oración» de forma abrupta al final; en español se explicita ligeramente el sentido para evitar una frase opaca.'
    reason: Preservar la rareza significativa de la construcción final sin sacrificar claridad en español.
lexical_decisions:
- source_word: προσευχή
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - ruego
  - plegaria
  lexicon: προσευχή
  rationale: «Oración» es el equivalente español más natural y neutral para la plegaria dirigida a Dios; mantiene la amplitud del término sin añadir matices no presentes en el griego.
- source_word: λυπούμενος / λύπη
  english_pob_choice: sorrow / sorrowing
  chosen_spanish: triste / tristeza
  alternatives_spanish:
  - afligido / aflicción
  - dolor / dolor
  lexicon: λύπη
  rationale: El contexto contrasta el estado interior que contamina la oración; «tristeza» comunica bien el afecto duradero y permite conservar la idea de mezcla con la oración. «Afligido» podía sonar más interpretativo.
- source_word: ἀναβαίνειν ἐπὶ τὸ θυσιαστήριον
  english_pob_choice: ascend to the altar
  chosen_spanish: suba al altar
  alternatives_spanish:
  - ascienda al altar
  - suba al sacrificio
  lexicon: ἀναβαίνω / θυσιαστήριον
  rationale: «Subir al altar» es natural en español y conserva la imagen cultual de ascenso sin volverla más abstracta.
- source_word: καθαρὰν
  english_pob_choice: pure
  chosen_spanish: pura
  alternatives_spanish:
  - limpia
  - sin mancha
  lexicon: καθαρός
  rationale: «Pura» conserva la idea de pureza no mezclada, en paralelo con el argumento sobre la mezcla de vinagre y vino.
- source_word: ὄξος καὶ οἶνος
  english_pob_choice: vinegar and wine
  chosen_spanish: vinagre y vino
  alternatives_spanish:
  - vinagre y vino tinto
  - vinagre y mosto
  lexicon: ὄξος / οἶνος
  rationale: La pareja léxica es directa y suficientemente transparente en español.
- source_word: τὴν αὐτὴν ἡδονήν
  english_pob_choice: the same pleasantness
  chosen_spanish: la misma dulzura
  alternatives_spanish:
  - el mismo agrado
  - el mismo sabor agradable
  lexicon: ἡδονή
  rationale: En español, «dulzura» transmite con claridad la idea de agradableza/sabor placentero de la mezcla sin sonar técnico ni extraño; mantiene el paralelo sensible con el ejemplo del vinagre y el vino.
- source_word: Ἅγιον Πνεῦμα
  english_pob_choice: Holy Spirit
  chosen_spanish: Espíritu Santo
  alternatives_spanish:
  - Santo Espíritu
  lexicon: Ἅγιον Πνεῦμα
  rationale: Se conserva el nombre reverente y consagrado en español estándar; aquí no hay motivo para otra paráfrasis.
theological_decisions:
- issue: La oración contaminada por la tristeza no asciende pura al altar
  english_pob_reading: sorrow mixed with the prayer does not allow the prayer to ascend pure to the altar
  chosen_spanish_reading: la tristeza, mezclada con la oración, no permite que la oración suba pura al altar
  alternative_spanish_readings:
  - la tristeza mezclada con la oración no deja que la oración ascienda limpia al altar
  - la tristeza, unida a la oración, impide que la oración suba pura al altar
  rationale: 'Se conserva el esquema causal y la imagen cultual del texto: la tristeza actúa como elemento mezclado que impide la pureza de la oración ante Dios. «Suba pura» preserva la tensión entre ascenso y pureza sin sobreinterpretar el mecanismo.'
  doctrine_reference: Pureza cultual y disposición interior en la oración; cf. el tema bíblico de corazón limpio en la adoración (Sal 24:3–4; Stg 4:8).
- issue: La comparación con vinagre y vino como analogía moral/espiritual
  english_pob_reading: vinegar and wine, mixed together, do not have the same pleasantness
  chosen_spanish_reading: así como el vinagre y el vino, mezclados juntos, no tienen la misma dulzura
  alternative_spanish_readings:
  - no tienen el mismo agrado
  - no producen el mismo deleite
  rationale: La analogía compara incompatibilidad gustativa/afectiva para explicar la incompatibilidad espiritual. «Dulzura» en español sostiene la lógica comparativa sin exagerar el sentido moral más allá del texto.
  doctrine_reference: Analogía sapiencial sobre mezcla incompatible y efecto en la oración; no implica una doctrina técnica sobre el Espíritu, sino una imagen pastoral.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego normalizado del pasaje y el giro del English POB para conservar la estructura retórica de pregunta-respuesta, la repetición de «tristeza/oración/altar», y la analogía final con vinagre y vino. No se introdujeron notas textuales porque el contexto proporcionado no documenta variantes ni tensiones léxicas que requieran marcación en el texto español.
  spanish_consistency_notes:
  - Se mantuvo «altar» como traducción cultual directa de θυσιαστήριον, coherente con la imaginería del pasaje.
  - Se usó «Espíritu Santo» con mayúsculas por tratarse de la referencia al Espíritu divino en el contexto.
  - Se prefirió una sintaxis sobria y publicable, evitando arcaísmos como «plegaria» salvo donde el tono pudiera requerirlos, pero aquí «oración» resulta más natural y fiel.
