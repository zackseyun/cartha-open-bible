  text: Cleanse yourself, then, from this evil sorrow, and you will live to God; and all will live to God, as many as cast off sorrow from themselves and clothe themselves with all cheerfulness.
translation:
  language: es
  text: Límpiate, pues, de esta tristeza mala, y vivirás para Dios; y todos los que se despojen de la tristeza y se vistan de toda alegría vivirán para Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καθαρίσθητι / cleanse yourself
  english_pob_choice: Cleanse yourself
  chosen_spanish: Límpiate
  alternatives_spanish:
  - Purifícate
  - Lávate
  lexicon: καθαρίζω
  rationale: El griego pide una acción directa de apartarse de lo que contamina o ensucia interiormente. En español, «límpiate» comunica esa idea con naturalidad y conserva el valor exhortativo sin introducir un matiz ritual no explicitado.
- source_word: λύπη πονηρά / evil sorrow
  english_pob_choice: this evil sorrow
  chosen_spanish: esta tristeza mala
  alternatives_spanish:
  - esta tristeza maligna
  - este mal de tristeza
  lexicon: λύπη
  rationale: «Tristeza mala» mantiene la cualidad moral negativa del sustantivo sin sobrecargarlo. Evita convertirlo en una emoción genérica y conserva la tensión del texto entre tristeza y una disposición dañina.
- source_word: ζήσεσθε τῷ θεῷ / live to God
  english_pob_choice: you will live to God
  chosen_spanish: vivirás para Dios
  alternatives_spanish:
  - vivirás a Dios
  - vivirás ante Dios
  lexicon: ζάω
  rationale: «Para Dios» reproduce de manera idiomática la orientación del vivir hacia Dios. «A Dios» sería más literal, pero menos natural en español. Se conserva el sentido de pertenencia y dirección de la vida.
- source_word: πάντες ζήσονται τῷ θεῷ / all will live to God
  english_pob_choice: all will live to God
  chosen_spanish: vivirán para Dios todos
  alternatives_spanish:
  - todos vivirán para Dios
  - todos vivirán a Dios
  lexicon: ζάω
  rationale: El orden español se ajusta por claridad, pero mantiene el universal «todos». La estructura refleja que la promesa se aplica a cuantos abandonan la tristeza y se revisten de alegría.
- source_word: ἀποθέντες / cast off
  english_pob_choice: cast off
  chosen_spanish: se quiten de sí
  alternatives_spanish:
  - se despojen de
  - dejen
  - arrojen de sí
  lexicon: ἀποτίθημι
  rationale: «Quitarse de sí» conserva la imagen de despojo personal y reflexivo. «Despojarse de» también sería posible, pero aquí se quiere evitar una formulación demasiado técnica y mantener la fluidez.
- source_word: περιβαλόμενοι / clothe themselves
  english_pob_choice: clothe themselves
  chosen_spanish: se vistan de
  alternatives_spanish:
  - se revistan de
  - se cubran con
  lexicon: περιβάλλω
  rationale: «Vestirse de» es la correspondencia natural en español para la metáfora de ponerse una cualidad como ropa. Conserva la imagen moral del texto y la paraleliza con «quitarse de sí».
- source_word: εὐφροσύνη / cheerfulness
  english_pob_choice: all cheerfulness
  chosen_spanish: toda alegría
  alternatives_spanish:
  - toda jovialidad
  - toda regocijo
  lexicon: εὐφροσύνη
  rationale: «Alegría» es la opción más clara y bíblicamente reconocible en español. «Toda» preserva la totalidad del término griego y evita rebajar la intensidad de la exhortación.
theological_decisions:
- issue: La relación entre tristeza moral y vida para Dios
  english_pob_reading: The verse links removing evil sorrow with living to God; sorrow is treated as spiritually harmful rather than merely emotional.
  chosen_spanish_reading: El texto presenta la tristeza como una disposición mala que debe ser abandonada para vivir para Dios.
  alternative_spanish_readings:
  - El texto podría leerse como rechazo de toda tristeza emocional.
  - El texto podría entenderse como una simple recomendación de optimismo.
  rationale: La formulación española evita absolutizar el pasaje contra cualquier dolor legítimo. Mantiene que el problema es la tristeza dañina o moralmente desordenada, conforme al contraste del griego y a la lectura inglesa.
  doctrine_reference: Ascética moral / disposición del corazón; discernimiento entre tristeza pecaminosa y dolor legítimo
- issue: Universalidad condicionada de la promesa
  english_pob_reading: all will live to God, as many as cast off sorrow from themselves and clothe themselves with all cheerfulness.
  chosen_spanish_reading: 'La promesa es universal en el grupo cualificado: todos los que se despojan de la tristeza y se visten de alegría vivirán para Dios.'
  alternative_spanish_readings:
  - Todos vivirán para Dios sin condición.
  - Solo unos pocos excepcionales vivirán para Dios.
  rationale: La sintaxis española deja claro que el «todos» depende de la cláusula relativa y no convierte la frase en una universalidad absoluta sin condición. Esto preserva la estructura griega y la lectura inglesa.
  doctrine_reference: Condicionalidad de la exhortación ética
- issue: Ausencia de terminología eclesiástica tradicional añadida
  english_pob_reading: Live to God / cheerfulness
  chosen_spanish_reading: Se evita introducir vocabulario devocional más cargado que el original, como «gozo» o «consagrarse», salvo donde la imagen lo exige.
  alternative_spanish_readings:
  - «gozo» en vez de «alegría»
  - «consagrarse a Dios» en vez de «vivir para Dios»
  rationale: «Alegría» y «vivir para Dios» conservan el tono moral y práctico del pasaje sin añadir matices no documentados por el texto base. Esto mantiene la transparencia traductora propia de POB.
  doctrine_reference: Principio de transparencia textual
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete; se sigue la lectura inglesa POB óptima, apoyada por el griego normalizado del mandato.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός conforme al estándar del proyecto.
  - Se usa una sintaxis fluida en español sin perder la estructura condicional del original.
  - No se introduce puntuación interpretativa adicional más allá de la necesaria para la claridad.
  - Se conserva el paralelismo entre «quitarse» y «vestirse» para reflejar las imágenes verbales del griego.
