review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego y del inglés auditado: la persona entristecida obra mal, entristece al Espíritu Santo, incurre en ἀνομία al omitir oración y confesión, y su oración no asciende al altar de Dios. La imagen cultual y la referencia al Espíritu se conservan bien. Sin embargo, hay un punto importante de fidelidad semántica: «comete iniquidad, sin orar ni confesar al Señor» puede leerse en español como simple circunstancia acompañante, mientras que el original/inglés presenta «ni orando ni confesando» como explicación más estrecha de cómo obra ἀνομία. Además, «como alegre» suena algo duro en español; puede mejorarse sin alterar la rareza deliberada del original.'
  spanish_quality_summary: El texto es claro, digno y mayormente natural en español eclesial contemporáneo. «Obra mal», «entristece al Espíritu Santo» y «subir al altar de Dios» funcionan bien. La principal mejora estilística y semántica es reemplazar «sin orar ni confesar» por «ni ora ni confiesa al Señor», que expresa con más claridad la coordinación negativa del original. También conviene suavizar «como alegre» a «siendo alegre», que preserva el rasgo del Espíritu sin sonar tan calcado.
  glossary_alignment: 'La terminología del proyecto está bien respetada: «Espíritu Santo», «Dios», «Señor», «iniquidad» para ἀνομία, y el mantenimiento de la imaginería del altar. No hay conflictos con los glosarios mayores del proyecto. La única observación es de formulación, no de glosario: el segmento sobre el Espíritu «dado... como alegre» se beneficia de una forma española más idiomática sin perder la extrañeza del original.'
  issues:
  - severity: medium
    issue: «sin orar ni confesar al Señor» debilita la relación sintáctica del original
    rationale: El griego οὔτε... οὔτε... y el inglés «neither praying nor confessing» presentan estas acciones omitidas como parte directa de la ἀνομία que realiza. En español, «sin...» puede sonar más circunstancial que coordinado. «Ni ora ni confiesa al Señor» refleja mejor la estructura y la fuerza.
  - severity: low
    issue: «que fue dado al ser humano como alegre» suena algo rígido
    rationale: La idea difícil del original debe mantenerse, pero «como alegre» resulta menos idiomático en español. «que fue dado al ser humano siendo alegre» conserva el rasgo atribuido al Espíritu y mejora la fluidez.
  revised_spanish_text: 'Pero el hombre afligido siempre obra mal: primero, obra mal porque entristece al Espíritu Santo, que fue dado al ser humano siendo alegre; segundo, al entristecer al Espíritu Santo obra iniquidad: ni ora ni confiesa al Señor. Porque la oración de un hombre afligido nunca tiene poder para subir al altar de Dios.'
  revision_rationale: 'Se hacen dos ajustes menores pero importantes: (1) se reemplaza «sin orar ni confesar» por «ni ora ni confiesa» para reflejar con más precisión la coordinación negativa del original y del inglés auditado; (2) se cambia «como alegre» por «siendo alegre» para mantener la lectura difícil sobre el Espíritu sin un calco menos natural. También se prefiere «obra iniquidad» en paralelo con «obra mal», más cercano al valor verbal de ἐργάζεται.'
