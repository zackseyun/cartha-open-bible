base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/039/002.yaml
  text: 'But the sorrowful man always acts wickedly: first, he acts wickedly because he grieves the Holy Spirit that was given to the human being as cheerful; second, by grieving the Holy Spirit he works lawlessness, neither praying nor confessing to the Lord. For the prayer of a sorrowful man never has power to ascend to the altar of God.'
translation:
  language: es
  text: 'Pero el hombre afligido siempre obra mal: primero, obra mal porque entristece al Espíritu Santo, que fue dado al ser humano siendo alegre; segundo, al entristecer al Espíritu Santo obra iniquidad: ni ora ni confiesa al Señor. Porque la oración de un hombre afligido nunca tiene poder para subir al altar de Dios.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λυπούμενος ἄνθρωπος
  english_pob_choice: the sorrowful man
  chosen_spanish: el hombre afligido
  alternatives_spanish:
  - el hombre triste
  - el hombre apenado
  lexicon: λυπέω / λυπούμενος
  rationale: “Afligido” conserva el valor afectivo negativo sin reducirlo a mera tristeza emocional y suena natural en español bíblico contemporáneo.
- source_word: κακῶς ποιεῖ
  english_pob_choice: acts wickedly
  chosen_spanish: obra mal
  alternatives_spanish:
  - hace lo malo
  - actúa perversamente
  lexicon: κακῶς ποιέω
  rationale: Se preserva la fuerza moral de la expresión con una formulación breve y natural; “obra mal” sigue el tono sentencioso del griego y del inglés auditado.
- source_word: λυπεῖ τὸ Ἅγιον Πνεῦμα
  english_pob_choice: grieves the Holy Spirit
  chosen_spanish: entristece al Espíritu Santo
  alternatives_spanish:
  - aflige al Espíritu Santo
  - da tristeza al Espíritu Santo
  lexicon: λυπέω / Ἅγιον Πνεῦμα
  rationale: “Entristece” refleja con claridad el verbo de causar tristeza y mantiene la relación personal con el Espíritu Santo sin suavizarla.
- source_word: τὸ δοθὲν τῷ ἀνθρώπῳ ὡς εὐφρόν
  english_pob_choice: that was given to the human being as cheerful
  chosen_spanish: que fue dado al ser humano como alegre
  alternatives_spanish:
  - que fue dado al ser humano como gozoso
  - que fue dado al hombre como alegre
  lexicon: δοθέν / εὐφρόν
  rationale: Se conserva la tensión de un Espíritu descrito como “alegre”; “como alegre” reproduce la construcción comparativa sin añadir más interpretación de la necesaria.
- source_word: ἀνομίαν ἐργάζεται
  english_pob_choice: he works lawlessness
  chosen_spanish: comete iniquidad
  alternatives_spanish:
  - obra iniquidad
  - practica la anarquía
  lexicon: ἀνομία
  rationale: “Iniquidad” transmite la falta de conformidad moral y legal implicada por ἀνομία en un español bíblico entendible; evita una traducción demasiado técnica como “anomia” o demasiado sociológica como “anarquía”.
- source_word: οὔτε προσευχόμενος οὔτε ἐξομολογούμενος τῷ κυρίῳ
  english_pob_choice: neither praying nor confessing to the Lord
  chosen_spanish: sin orar ni confesar al Señor
  alternatives_spanish:
  - ni orando ni confesando al Señor
  - sin orar ni dar confesión al Señor
  lexicon: προσεύχομαι / ἐξομολογέομαι / κύριος
  rationale: La coordinación negativa se vuelve idiomática en español con “sin… ni…”. “Confesar al Señor” mantiene la referencia relacional del texto y el valor de ἐξομολογέομαι como confesión/declaración.
- source_word: ἡ προσευχὴ τοῦ λυπουμένου ἀνθρώπου
  english_pob_choice: the prayer of a sorrowful man
  chosen_spanish: la oración de un hombre afligido
  alternatives_spanish:
  - la oración del hombre triste
  - la plegaria del hombre afligido
  lexicon: προσευχή / λυπούμενος
  rationale: Se conserva la referencia general al tipo de persona y se evita repetir mecánicamente “triste”, que en español puede sonar demasiado leve.
- source_word: οὐ μὴ ἔχῃ ἰσχὺν ἀναβῆναι ἐπὶ τὸ θυσιαστήριον τοῦ θεοῦ
  english_pob_choice: never has power to ascend to the altar of God
  chosen_spanish: nunca tiene poder para subir al altar de Dios
  alternatives_spanish:
  - nunca puede subir al altar de Dios
  - nunca tiene fuerza para ascender al altar de Dios
  lexicon: ἰσχύς / ἀναβαίνω / θυσιαστήριον
  rationale: “Tener poder para subir” reproduce la estructura de capacidad + ascenso del original y del inglés auditado, conservando la imagen cultual del altar.
theological_decisions:
- issue: Relación entre el Espíritu Santo y el estado afectivo descrito como “alegre”
  english_pob_reading: the Holy Spirit that was given to the human being as cheerful
  chosen_spanish_reading: el Espíritu Santo, que fue dado al ser humano como alegre
  alternative_spanish_readings:
  - el Espíritu Santo, dado al ser humano como gozoso
  - el Espíritu Santo, dado al hombre para alegría
  rationale: 'Se mantiene la formulación extraña pero atestiguada del texto: el Espíritu es descrito con un rasgo afectivo positivo. No se lo normaliza a una perífrasis más doctrinalmente familiar, para no borrar la tensión del original.'
  doctrine_reference: Pneumatología básica; lectura literal del testimonio patrístico
- issue: ἁμαρτία / ἀνομία en relación con la oración omitida y la confesión omitida
  english_pob_reading: by grieving the Holy Spirit he works lawlessness, neither praying nor confessing to the Lord
  chosen_spanish_reading: al entristecer al Espíritu Santo comete iniquidad, sin orar ni confesar al Señor
  alternative_spanish_readings:
  - al entristecer al Espíritu Santo obra maldad, sin orar ni confesar al Señor
  - al entristecer al Espíritu Santo practica anomia, sin orar ni confesar al Señor
  rationale: La versión española conserva el vínculo causal entre la tristeza causada al Espíritu, la iniquidad y la omisión de oración/confesión. “Iniquidad” es suficientemente bíblico y no oculta el alcance moral de ἀνομία.
  doctrine_reference: Ética cristiana; arrepentimiento y comunión con Dios
- issue: Imagen cultual de la oración que asciende al altar de Dios
  english_pob_reading: the prayer of a sorrowful man never has power to ascend to the altar of God
  chosen_spanish_reading: la oración de un hombre afligido nunca tiene poder para subir al altar de Dios
  alternative_spanish_readings:
  - la oración de un hombre afligido nunca puede subir al altar de Dios
  - la oración de un hombre afligido no tiene fuerza para ascender al altar de Dios
  rationale: Se mantiene la imagen sacrificial/cultual sin explicarla ni desactivarla. En español, “subir al altar” es claro y preserva el movimiento vertical de la metáfora.
  doctrine_reference: Culto y oración en clave sacrificial
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; esta propuesta sigue de cerca la lectura auditada de POB y sólo ajusta el español para naturalidad y claridad sin alterar las tensiones léxicas del original.
  spanish_consistency_notes:
  - Se conserva 'Espíritu Santo' con mayúsculas para la referencia personal al Espíritu.
  - Se usa 'Yahvé' por defecto no porque aparezca aquí, sino por consistencia del proyecto; este versículo habla de 'Dios' y 'el Señor' en el texto transmitido.
  - '''afligido'' se mantiene uniforme para λυπούμενος en las dos apariciones.'
  - No se introduce 'Cristo' ni terminología eclesial adicional que no esté en el pasaje.
