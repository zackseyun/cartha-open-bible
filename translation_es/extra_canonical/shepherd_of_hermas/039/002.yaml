revisions:
- from: 'Pero el hombre afligido siempre obra mal: primero, obra mal porque entristece al Espíritu Santo, que fue dado al ser humano como alegre; segundo, al entristecer al Espíritu Santo comete iniquidad, sin orar ni confesar al Señor. Porque la oración de un hombre afligido nunca tiene poder para subir al altar de Dios.'
  to: 'Pero el hombre afligido siempre obra mal: primero, obra mal porque entristece al Espíritu Santo, que fue dado al ser humano siendo alegre; segundo, al entristecer al Espíritu Santo obra iniquidad: ni ora ni confiesa al Señor. Porque la oración de un hombre afligido nunca tiene poder para subir al altar de Dios.'
  rationale: 'Se hacen dos ajustes menores pero importantes: (1) se reemplaza «sin orar ni confesar» por «ni ora ni confiesa» para reflejar con más precisión la coordinación negativa del original y del inglés auditado; (2) se cambia «como alegre» por «siendo alegre» para mantener la lectura difícil sobre el Espíritu sin un calco menos natural. También se prefiere «obra iniquidad» en paralelo con «obra mal», más cercano al valor verbal de ἐργάζεται.'
