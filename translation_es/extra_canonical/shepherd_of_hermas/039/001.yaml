base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/039/001.yaml
  text: Clothe yourself, then, with cheerfulness, which always has favor with God and is acceptable to him, and delight in it. For every cheerful man does good, thinks good things, and despises sorrow.
translation:
  language: es
  text: Revístete, pues, de alegría, que siempre tiene favor delante de Dios y le es agradable, y gózate en ella. Porque todo hombre alegre hace el bien, piensa cosas buenas y desprecia la tristeza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: '"cheerfulness"'
  english_pob_choice: cheerfulness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - buena disposición
  - alegría de ánimo
  lexicon: 'Greek: εὐφροσύνη / related cheerfulness term in context'
  rationale: En español, "alegría" comunica de forma natural la disposición gozosa y luminosa que exige el contexto. "Gozo" es posible, pero aquí sonaría más devocional que descriptivo. "Buena disposición" explicaría el matiz, pero perdería la fuerza positiva del término.
- source_word: '"clothe yourself"'
  english_pob_choice: Clothe yourself
  chosen_spanish: Revístete
  alternatives_spanish:
  - vístete
  - cúbrete
  - ponte
  lexicon: 'Greek: ἐνδύου / vesting imperative'
  rationale: '"Revístete" conserva la imagen de vestirse con una cualidad moral, tal como en el original y en el inglés POB. Es más idiomático y solemne que "cúbrete" o "ponte".'
- source_word: '"good things"'
  english_pob_choice: good things
  chosen_spanish: cosas buenas
  alternatives_spanish:
  - pensamientos buenos
  - cosas rectas
  - bienes
  lexicon: 'Greek: καλά / ἀγαθά (contextual good-things language)'
  rationale: '"Cosas buenas" reproduce con transparencia la amplitud del plural griego y mantiene el paralelo con "hace el bien". "Pensamientos buenos" estrecharía demasiado el sentido.'
- source_word: '"despises sorrow"'
  english_pob_choice: despises sorrow
  chosen_spanish: desprecia la tristeza
  alternatives_spanish:
  - rechaza la tristeza
  - menosprecia la tristeza
  - desdeña la tristeza
  lexicon: 'Greek: καταφρονεῖ λύπης'
  rationale: '"Desprecia la tristeza" conserva la dureza del verbo y el paralelismo moral del texto. "Rechaza" suavizaría demasiado la afirmación; "desdeña" es válido, pero menos común en registro bíblico contemporáneo.'
theological_decisions:
- issue: Valor moral de la alegría como disposición agradable a Dios
  english_pob_reading: cheerfulness always has favor with God and is acceptable to him
  chosen_spanish_reading: la alegría siempre tiene favor delante de Dios y le es agradable
  alternative_spanish_readings:
  - la alegría siempre agrada a Dios
  - la alegría siempre cuenta con el favor de Dios
  rationale: 'La formulación mantiene ambas ideas del original: favor y aceptación. "Le es agradable" conserva la relación personal con Dios y evita reducir el segundo miembro a una mera repetición del primero.'
  doctrine_reference: Piedad práctica y ética de virtud en la tradición cristiana primitiva
translation_notes:
  revision_awareness: No se registran revisiones previas aplicadas en el paquete; la redacción se ha hecho directamente desde el griego normalizado, tomando el inglés POB como control auditado para equivalencias semánticas y tono.
  spanish_consistency_notes:
  - Se usa "Dios" de manera consistente para θεός.
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - No se introduce terminología eclesial técnica que no esté motivada por el texto fuente.
