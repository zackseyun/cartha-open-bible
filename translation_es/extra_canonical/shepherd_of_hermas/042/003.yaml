  text: 3. But all who are overmastered by them and do not resist them will die utterly; for these desires are deadly.
translation:
  language: es
  text: 3. Pero todos los que son dominados por ellas y no les resisten morirán por completo, porque estos deseos son mortíferos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πάντες οἱ ὑπ’ αὐτῶν κρατούμενοι
  english_pob_choice: all who are overmastered by them
  chosen_spanish: todos los que son dominados por ellas
  alternatives_spanish:
  - todos los que son subyugados por ellas
  - todos los que quedan bajo su dominio
  lexicon: κρατέω
  rationale: «Dominados» comunica la idea de ser vencidos o controlados por fuerzas ajenas sin endurecer el español con un calco. «Por ellas» mantiene la referencia a los deseos/personas ya mencionados en el contexto.
- source_word: καὶ μὴ ἀντιστεκόμενοι
  english_pob_choice: and do not resist them
  chosen_spanish: y no les resisten
  alternatives_spanish:
  - y no se resisten a ellas
  - y no se oponen a ellas
  lexicon: ἀντιστέκομαι
  rationale: «Resisten» conserva la fuerza activa del verbo griego y el paralelismo con «son dominados». La construcción dativa en español con «les» evita repetir «a ellas» de forma pesada.
- source_word: ἀποθανοῦνται παντελῶς
  english_pob_choice: will die utterly
  chosen_spanish: morirán por completo
  alternatives_spanish:
  - morirán del todo
  - perecerán completamente
  lexicon: ἀποθνῄσκω / παντελῶς
  rationale: «Por completo» refleja el valor intensificador de παντελῶς y mantiene la solemnidad del juicio final. Se evita «del todo» por sonar más coloquial.
- source_word: αἱ γὰρ ἐπιθυμίαι αὗται θανάσιμα εἰσίν
  english_pob_choice: for these desires are deadly
  chosen_spanish: porque estos deseos son mortales
  alternatives_spanish:
  - porque estos deseos son mortíferos
  - porque estos deseos llevan a la muerte
  lexicon: θανάσιμος
  rationale: «Mortales» es una equivalencia natural en español que conserva la idea de algo que causa muerte. «Mortíferos» sería posible, pero suena más técnico o enfático.
theological_decisions:
- issue: Naturaleza de los deseos como fuerza mortal
  english_pob_reading: these desires are deadly
  chosen_spanish_reading: estos deseos son mortales
  alternative_spanish_readings:
  - estos deseos llevan a la muerte
  - estos deseos son mortíferos
  rationale: 'La frase mantiene el juicio moral del texto sin suavizarlo: los deseos no son neutros, sino mortales. «Mortales» conserva la advertencia ética y espiritual del pasaje.'
  doctrine_reference: Advertencia ascética y moral sobre la esclavitud al deseo y sus consecuencias destructivas.
translation_notes:
  revision_awareness: No hay revisiones registradas en el paquete. La versión española sigue de cerca el griego normalizado y el sentido ya fijado por la traducción inglesa auditada, sin introducir notas textuales porque no se documentan variantes ni tensiones léxicas adicionales en este segmento.
  spanish_consistency_notes:
  - Se mantiene el referente plural implícito de «ellas» para concordar con los deseos ya mencionados en el contexto inmediato.
  - Se usa un registro sobrio y eclesialmente legible, evitando arcaísmos innecesarios.
  - No se emplea «SEÑOR» ni terminología cristológica porque el segmento no lo requiere.
