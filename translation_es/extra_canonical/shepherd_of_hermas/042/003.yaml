review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el inglés POB en la estructura principal: πάντες οἱ ὑπ’ αὐτῶν κρατούμενοι = «todos los que son dominados por ellas»; καὶ μὴ ἀντιστεκόμενοι = «y no les resisten»; ἀποθανοῦνται παντελῶς = «morirán por completo». La última cláusula transmite correctamente la idea causal de αἱ γὰρ ἐπιθυμίαι αὗται θανάσιμα εἰσίν, pero «mortales» en español tiende a significar “sujeto a morir” más que “que causa muerte”, por lo que debilita ligeramente «deadly».'
  spanish_quality_summary: El español es claro, natural y digno. Sin embargo, «estos deseos son mortales» suena menos preciso en español moderno que «estos deseos son mortíferos» o «llevan a la muerte». La sintaxis general es buena; el ajuste necesario es pequeño y mejora la fidelidad semántica sin volver el texto rígido.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la consistencia con equivalencias semánticas fuertes. El proyecto favorece preservar la fuerza léxica del original; por eso θανάσιμα se representa mejor con «mortíferos» que con «mortales» en este contexto.
  issues:
  - severity: medium
    issue: «estos deseos son mortales» debilita θανάσιμα
    rationale: En español, «mortales» suele describir a seres que mueren o algo gravísimo, mientras que θανάσιμα aquí describe deseos que causan muerte. «Mortíferos» conserva mejor la fuerza causal del original y del inglés POB «deadly».
  revised_spanish_text: 3. Pero todos los que son dominados por ellas y no les resisten morirán por completo, porque estos deseos son mortíferos.
  revision_rationale: Se mantiene toda la estructura del borrador y solo se corrige la última expresión para reflejar con mayor precisión el sentido causal de θανάσιμα. También se alisa levemente la puntuación suprimiendo la coma antes de «morirán», que no es necesaria en español con esta construcción.
