base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/042/001.yaml
  text: Foremost of all is desire for another’s wife or husband, and for the luxury of wealth, and for many vain foods and drunken drinks, and for many other foolish indulgences; for every indulgence is foolish and empty for the slaves of God.
translation:
  language: es
  text: Lo primero de todo es el deseo de la mujer o del marido de otro, y el lujo de las riquezas, y de muchas comidas vanas y bebidas que embriagan, y de muchas otras complacencias necias; porque toda complacencia es necia y vacía para los esclavos de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: desire for another’s wife or husband
  english_pob_choice: desire for another’s wife or husband
  chosen_spanish: el deseo de la mujer o del marido de otro
  alternatives_spanish:
  - el deseo de la esposa o del esposo ajenos
  - el deseo de la mujer ajena o del hombre ajeno
  lexicon: ἐπιθυμία; γυνή; ἀνήρ
  rationale: Conservo la construcción inclusiva del inglés POB, que expresa la idea de codiciar el cónyuge de otra persona sin fijar el género del sujeto deseante. En español, «de otro» mantiene la ambigüedad relacional del original sin introducir una paráfrasis excesiva.
- source_word: the luxury of wealth
  english_pob_choice: the luxury of wealth
  chosen_spanish: el lujo de las riquezas
  alternatives_spanish:
  - la opulencia de las riquezas
  - el derroche de bienes
  lexicon: τρυφή; πλοῦτος
  rationale: «Lujo» reproduce el matiz de vida acomodada, refinada o entregada al placer que apunta el griego; «riquezas» conserva el campo semántico de wealth sin reducirlo a dinero solamente.
- source_word: many vain foods and drunken drinks
  english_pob_choice: many vain foods and drunken drinks
  chosen_spanish: muchas comidas vanas y bebidas que embriagan
  alternatives_spanish:
  - muchos alimentos vanos y bebidas embriagantes
  - muchas comidas inútiles y bebidas embriagantes
  lexicon: πολλὴν ματαιότητα τροφῶν; μέθας πομάτων
  rationale: «Comidas» es más natural que un calco rígido de «alimentos» en este contexto de práctica indulgente. «Vanas» conserva la idea de vaciedad/inutilidad; «que embriagan» expresa la cualidad de las bebidas sin forzar un adjetivo poco idiomático.
- source_word: many other foolish indulgences
  english_pob_choice: many other foolish indulgences
  chosen_spanish: muchas otras complacencias necias
  alternatives_spanish:
  - muchos otros caprichos necios
  - muchas otras entregas insensatas
  lexicon: πολλὰς ἄλλας ἀφροσύνας
  rationale: «Complacencias» da cuenta de prácticas de autoindulgencia mejor que «placeres» o «caprichos», y «necias» conserva la valoración moral explícita del original. Evito suavizar la censura del texto.
- source_word: every indulgence is foolish and empty
  english_pob_choice: for every indulgence is foolish and empty
  chosen_spanish: porque toda complacencia es necia y vacía
  alternatives_spanish:
  - porque toda autoindulgencia es necia y vacía
  - porque todo exceso es necio y vacío
  lexicon: πᾶσα ... ἀφροσύνη καὶ κενή
  rationale: Reproduzco el paralelo entre la conducta y su juicio moral. «Vacía» conserva la idea de κενή como carente de valor real; «complacencia» mantiene la coherencia con la línea anterior.
- source_word: slaves of God
  english_pob_choice: the slaves of God
  chosen_spanish: los esclavos de Dios
  alternatives_spanish:
  - los siervos de Dios
  - los servidores de Dios
  lexicon: δοῦλοι θεοῦ
  rationale: Sigo la decisión léxica por defecto de la POB para δοῦλος con «esclavos», porque el texto subraya pertenencia y obediencia radical. «Siervos» suavizaría una tensión lexical importante que el audit trail no autoriza a eliminar.
theological_decisions:
- issue: Moral force of indulgence language
  english_pob_reading: The passage treats these desires and indulgences as morally foolish and empty for God's slaves.
  chosen_spanish_reading: El pasaje presenta estos deseos y complacencias como moralmente necios y vacíos para los esclavos de Dios.
  alternative_spanish_readings:
  - El pasaje los describe simplemente como malos hábitos.
  - El pasaje suena a una advertencia general contra excesos.
  rationale: Mantengo la condena moral fuerte del original y del inglés POB, sin rebajarla a mera prudencia ascética. El contraste entre deseo/indulgencia y servicio a Dios es central en la sección.
  doctrine_reference: Ética cristiana de la obediencia; lenguaje de esclavitud a Dios en el marco del discipulado
- issue: Scope of the prohibition
  english_pob_reading: The list gathers several forms of indulgent desire as representative examples.
  chosen_spanish_reading: La lista reúne varias formas representativas de deseo indulgente.
  alternative_spanish_readings:
  - La lista enumera prohibiciones exhaustivas.
  - La lista es solo una advertencia simbólica sin fuerza normativa.
  rationale: La redacción evita convertir la enumeración en un catálogo cerrado o en una mera figura retórica. El original funciona como lista representativa de apetitos desordenados.
  doctrine_reference: Santidad práctica y dominio propio
translation_notes:
  revision_awareness: No applied revisions were supplied in the source packet; this draft follows the normalized Greek source and the existing English POB rendering without documented later corrections.
  spanish_consistency_notes:
  - Se conserva «esclavos de Dios» de manera consistente con la terminología POB para δοῦλος.
  - «Vacía» se usa para κενή con el mismo valor de inutilidad moral, no meramente de ausencia física.
  - El sintagma «comidas vanas y bebidas que embriagan» busca mantener la cadencia enumerativa del original y del inglés auditado.
