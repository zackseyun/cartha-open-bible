base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/042/005.yaml
  text: 5. So then, having been crowned against it, come to the desire for righteousness, and, handing over to it the victory you received, serve it as it wills. If you serve the good desire and submit to it, you will be able to master the evil desire and to subject it as you wish.
translation:
  language: es
  text: 5. Así pues, habiendo sido coronado contra él, ven al deseo de la justicia, y, entregándole la victoria que recibiste, sírvelo como él quiera. Si sirves al buen deseo y te sometes a él, podrás dominar el mal deseo y sujetarlo como quieras.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: having been crowned against it
  english_pob_choice: having been crowned against it
  chosen_spanish: habiendo sido coronado[a] contra ello
  alternatives_spanish:
  - habiendo sido coronado para vencerlo
  - después de haber sido coronado contra ello
  lexicon: στεφανοῦσθαι / crown imagery
  rationale: Conservo la imagen de la corona como metáfora de victoria, y mantengo 'contra ello' porque el original expresa combate o oposición frente al deseo malo; 'coronado para vencerlo' suaviza demasiado la relación adversarial.
- source_word: desire for righteousness
  english_pob_choice: desire for righteousness
  chosen_spanish: deseo de la justicia
  alternatives_spanish:
  - deseo de rectitud
  - anhelo de justicia
  lexicon: ἐπιθυμία + δικαιοσύνη
  rationale: '''Justicia'' es la opción más directa y amplia para δικαιοσύνη en este contexto moral; ''rectitud'' sería posible, pero aquí puede sonar más abstracta en español. Mantengo ''deseo'' para el paralelismo con ''buen deseo'' y ''mal deseo''.'
- source_word: handing over to it the victory you received
  english_pob_choice: handing over to it the victory you received
  chosen_spanish: entregándole la victoria que recibiste
  alternatives_spanish:
  - cediéndole la victoria que recibiste
  - pasándole la victoria que recibiste
  lexicon: νίκην / victory
  rationale: '''Entregarle la victoria'' preserva la idea de ceder el dominio obtenido en la lucha. ''Recibiste'' conserva el dato pasivo del triunfo como algo otorgado, no auto-producido.'
- source_word: serve it as it wills
  english_pob_choice: serve it as it wills
  chosen_spanish: sírvelo como él quiera
  alternatives_spanish:
  - sírvelo como quiera
  - sírvelo según su voluntad
  lexicon: δουλεύειν / serve
  rationale: Uso 'sírvelo' porque el español requiere un verbo natural para obediencia o sometimiento a un deseo personificado. 'Como él quiera' reproduce la agencia atribuida al deseo; no fuerzo aquí 'esclavo' porque el giro idiomático en español se vuelve menos claro.
- source_word: good desire
  english_pob_choice: good desire
  chosen_spanish: el buen deseo
  alternatives_spanish:
  - el deseo bueno
  - la buena inclinación
  lexicon: ἀγαθὴ ἐπιθυμία
  rationale: Mantengo la fórmula paralela 'buen deseo / mal deseo' para reflejar el contraste estructural del pasaje. 'Buena inclinación' interpretaría más de lo que el texto exige.
- source_word: submit to it
  english_pob_choice: submit to it
  chosen_spanish: te sometes a él
  alternatives_spanish:
  - te sometes a ello
  - te rindes a él
  lexicon: ὑποτάσσεσθαι
  rationale: '''Someterse'' conserva la fuerza de subordinación moral del verbo. Uso ''él'' por concordancia con ''deseo'' personificado, siguiendo el paralelismo del pasaje.'
- source_word: master the evil desire
  english_pob_choice: master the evil desire
  chosen_spanish: podrás dominar el mal deseo
  alternatives_spanish:
  - podrás vencer el mal deseo
  - podrás gobernar el mal deseo
  lexicon: κυριεύειν
  rationale: '''Dominar'' expresa bien la idea de tener señorío sobre una pasión interior; ''vencer'' es correcto pero repite demasiado la imagen de la lucha inicial.'
- source_word: subject it as you wish
  english_pob_choice: subject it as you wish
  chosen_spanish: y sujetarlo como quieras
  alternatives_spanish:
  - y someterlo como quieras
  - y ponerlo bajo tu control como quieras
  lexicon: καταδουλοῦν / subject
  rationale: '''Sujetarlo'' mantiene el paralelo con ''someterse'' y evita introducir ''esclavo'' donde el español puede sonar excesivamente fuerte si no se explicita el matiz. Conserva el control voluntario del deseo malo.'
theological_decisions:
- issue: Personification of desires as opposed powers
  english_pob_reading: The good desire and the evil desire are treated as opposing powers that can be served, mastered, and subjected.
  chosen_spanish_reading: Los deseos se presentan como poderes opuestos, personificados con pronombres y verbos de servicio/sometimiento.
  alternative_spanish_readings:
  - Los deseos se entienden solo como inclinaciones psicológicas
  - Los deseos se traducen sin personificación
  rationale: El pasaje no habla meramente de sentimientos internos, sino de dos fuerzas en conflicto con capacidad de gobernar a la persona. Por eso conservo la personificación verbal del original y del inglés POB.
  doctrine_reference: Antropología moral y ascesis en la literatura cristiana primitiva
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés; la presente redacción sigue la lectura óptima del inglés POB, pero se apoya directamente en el griego para conservar la metáfora de coronación, la oposición entre deseos y el paralelismo de dominio/sometimiento.
  spanish_consistency_notes:
  - He mantenido 'deseo' en toda la unidad para preservar el paralelismo técnico del pasaje.
  - He usado 'justicia' y no 'rectitud' como término principal para δικαιοσύνη, dejando abierta la opción semántica en la nota lexical.
  - He evitado 'esclavo' en la línea principal porque aquí el griego y el sentido discursivo funcionan mejor con verbos de dominio/sometimiento en español, sin perder la asimetría moral del texto.
