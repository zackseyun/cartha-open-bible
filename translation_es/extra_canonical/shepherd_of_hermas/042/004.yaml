review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego reflejado en el POB inglés: exhortación a vestirse del deseo de justicia, armarse con el temor del Señor/Dios, resistir, y la huida del mal deseo ante esas armas. La estructura lógica y las imágenes principales se preservan bien. Sin embargo, hay un problema menor de referencia pronominal en español: ''resísteles'' sugiere un referente plural explícito que aquí no está claro en el propio verso, mientras que luego el texto pasa al singular ''el mal deseo... resistiéndole''. Conviene unificar con un objeto singular claro en español para mejor fidelidad y legibilidad.'
  spanish_quality_summary: 'El español es claro y digno, con buen registro eclesial moderno. ''Deseo de justicia'', ''temor del Señor/Dios'', ''habita'' y ''armado'' funcionan bien. La principal mejora es estilística y de claridad: reemplazar ''resísteles'' por ''resístele'' para evitar una discordancia interna de número y hacer más natural la progresión argumentativa. También resulta más fluido ''porque le teme a tus armas'' que ''porque teme tus armas'', aunque esta última no es incorrecta.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: δικαιοσύνη -> ''justicia''; φόβος -> ''temor''; ἐπιθυμία -> ''deseo''; ὅπλα -> ''armas''. No aparece vocabulario con conflicto con los defaults mayores del proyecto. ''Señor'' refleja κύριος según el inglés auditado; no hay base aquí para introducir ''Yahvé''.'
  issues:
  - severity: medium
    issue: Pronombre de objeto en 'resísteles'
    rationale: Dentro del mismo versículo el referente operativo es singular ('el mal deseo'). En español, 'resísteles' introduce una pluralidad poco anclada en el texto inmediato y crea una pequeña incoherencia con 'resistiéndole'. 'Resístele' conserva mejor la continuidad semántica y evita tropiezo de lectura.
  - severity: low
    issue: Giro final ligeramente menos natural en español
    rationale: '''Porque teme tus armas'' es comprensible, pero ''porque le teme a tus armas'' suena más idiomático en español general sin alterar el sentido de ''being afraid of your weapons''.'
  revised_spanish_text: '4. Pero tú: vístete del deseo de justicia, y, habiéndote armado con el temor del Señor, resístele. Porque el temor de Dios habita en el buen deseo. Si el mal deseo te ve armado con el temor de Dios y resistiéndole, huirá lejos de ti, y ya no se te aparecerá, porque le teme a tus armas.'
  revision_rationale: Se hace una reparación menor para unificar el referente del objeto en singular y mejorar la naturalidad del cierre en español, sin cambiar el contenido ni las decisiones léxicas principales.
