  yaml_path: translation/extra_canonical/shepherd_of_hermas/042/004.yaml
  text: 4. But you—put on the desire for righteousness, and, having armed yourself with the fear of the Lord, resist them. For the fear of God dwells in the good desire. If the evil desire sees you armed with the fear of God and resisting it, it will flee far away from you, and it will no longer appear to you, being afraid of your weapons.
translation:
  language: es
  text: '4. Pero tú: vístete del deseo de justicia, y, habiéndote armado con el temor del Señor, resístele. Porque el temor de Dios habita en el buen deseo. Si el mal deseo te ve armado con el temor de Dios y resistiéndole, huirá lejos de ti, y ya no se te aparecerá, porque le teme a tus armas.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δίκαιον / δικαιοσύνην (desire for righteousness)
  english_pob_choice: desire for righteousness
  chosen_spanish: deseo de justicia
  alternatives_spanish:
  - deseo de rectitud
  - ansia de justicia
  lexicon: δικαιοσύνη
  rationale: En este contexto exhortativo, la idea no es solo un ideal abstracto sino una orientación deseada hacia lo justo; 'justicia' conserva mejor el campo moral y relacional que 'rectitud' en español general, mientras mantiene la fuerza del deseo.
- source_word: φόβος τοῦ κυρίου / φόβος θεοῦ
  english_pob_choice: fear of the Lord / fear of God
  chosen_spanish: temor del Señor / temor de Dios
  alternatives_spanish:
  - miedo del Señor / miedo de Dios
  - reverencia del Señor / reverencia de Dios
  lexicon: φόβος
  rationale: Se conserva 'temor' para reflejar la ambivalencia reverencial y sobrecogedora del término, evitando reducirlo a mera 'reverencia' y manteniendo la tensión lexical que el POB inglés preserva.
- source_word: ἀντιστήτε αὐτοῖς / resisting it
  english_pob_choice: resist them / resisting it
  chosen_spanish: resísteles / resistiéndole
  alternatives_spanish:
  - opónte a ellos / oponiéndote a ello
  - hazles frente / haciéndole frente
  lexicon: ἀνθίστημι
  rationale: El verbo expresa resistencia activa frente a una fuerza hostil. 'Resistir' reproduce bien la fuerza del mandato y evita suavizar el conflicto; los pronombres se ajustan al referente plural o singular del mal deseo.
- source_word: οἰκεῖ
  english_pob_choice: dwells
  chosen_spanish: habita
  alternatives_spanish:
  - mora
  - reside
  lexicon: οἰκέω
  rationale: '''Habita'' es natural en español bíblico contemporáneo y conserva la imagen de permanencia interna sin arcaísmo excesivo.'
- source_word: ἐπιθυμία ἀγαθή / πονηρὰ ἐπιθυμία
  english_pob_choice: good desire / evil desire
  chosen_spanish: buen deseo / mal deseo
  alternatives_spanish:
  - deseo bueno / deseo malo
  - deseo recto / deseo perverso
  lexicon: ἐπιθυμία
  rationale: Se mantiene la oposición simple del griego y del inglés POB, sin moralizarlo como si fueran dos facultades distintas; 'deseo' conserva la fuerza antropológica del término.
- source_word: φεύξεται μακρὰν ἀπὸ σοῦ
  english_pob_choice: it will flee far away from you
  chosen_spanish: huirá lejos de ti
  alternatives_spanish:
  - huirá muy lejos de ti
  - saldrá huyendo de ti
  lexicon: φεύγω
  rationale: '''Huirá'' conserva el movimiento de escape y ''lejos de ti'' reproduce la distancia intensificada sin añadir adverbios innecesarios.'
- source_word: φοβούμενον τὰ ὅπλα σου
  english_pob_choice: being afraid of your weapons
  chosen_spanish: porque teme tus armas
  alternatives_spanish:
  - porque tiene miedo de tus armas
  - pues teme tus armas
  lexicon: φοβέομαι
  rationale: '''Teme'' mantiene la relación de miedo/temor activa en el sujeto hostil y ''armas'' traduce ὅπλα con precisión, respetando la metáfora militar del pasaje.'
theological_decisions:
- issue: Relación entre 'temor' y 'reverencia' en el mandato espiritual
  english_pob_reading: The fear of God is a real protective stance against evil desire, not merely a positive attitude.
  chosen_spanish_reading: El temor de Dios se presenta como una disposición real de protección frente al mal deseo, no solo como reverencia interior.
  alternative_spanish_readings:
  - La reverencia de Dios habita en el buen deseo.
  - El respeto a Dios habita en el buen deseo.
  rationale: 'La formulación española debe conservar el carácter fuerte del original: un temor que actúa como armadura espiritual. ''Reverencia'' o ''respeto'' suavizarían la carga conceptual y perderían la tensión que el texto quiere preservar.'
  doctrine_reference: Sabiduría bíblica sobre el temor de Yahvé/Dios como principio protector y orientador (cf. Prov 1:7)
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; la redacción se hizo directamente desde el griego normalizado y el texto inglés POB como contexto de decisión, sin notas textuales previas que obliguen a emendar el versículo.
  spanish_consistency_notes:
  - Se mantiene 'Señor' en la fórmula fija 'temor del Señor' por el valor tradicional y por correspondencia con el inglés auditado, mientras que 'Dios' aparece donde el griego explícitamente lo dice.
  - Se conserva el contraste entre 'buen deseo' y 'mal deseo' para no desdibujar la antropología moral del pasaje.
  - La puntuación con dos puntos tras 'Pero tú' busca reflejar el giro exhortativo enfático del original sin alterar el sentido.
