  text: 2. These, then, are evil desires, putting the slaves of God to death. For this evil desire is the devil’s daughter. Therefore one must abstain from evil desires, so that, by abstaining, you may live to God.
translation:
  language: es
  text: 2. Estos, pues, son deseos malos, que dan muerte a los esclavos de Dios. Porque tal deseo malo es hija del diablo. Por tanto, deben abstenerse de los deseos malos, para que, al abstenerse, vivan para Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κακὲς ἐπιθυμίαι / evil desires
  english_pob_choice: evil desires
  chosen_spanish: malos deseos
  alternatives_spanish:
  - deseos malos
  - malos apetitos
  - deseos malignos
  lexicon: ἐπιθυμία
  rationale: El griego y el inglés destacan el carácter moralmente malo del deseo; en español, «malos deseos» comunica bien esa fuerza sin forzar un tecnicismo. «Apetitos» sería más interpretativo y menos general.
- source_word: τοὺς δούλους τοῦ θεοῦ / the slaves of God
  english_pob_choice: the slaves of God
  chosen_spanish: los esclavos de Dios
  alternatives_spanish:
  - los siervos de Dios
  - los servidores de Dios
  lexicon: δοῦλος
  rationale: Se preserva la fuerza lexical de δοῦλος que la POB inglesa ya ha escogido con «slaves». «Siervos» suavizaría una tensión intencional del texto y diluiría la imagen de pertenencia.
- source_word: ἀποθνῄσκουσαι / putting ... to death
  english_pob_choice: putting ... to death
  chosen_spanish: que dan muerte a
  alternatives_spanish:
  - matando a
  - que causan la muerte de
  - que llevan a la muerte de
  lexicon: ἀποθνῄσκω
  rationale: La frase expresa efecto letal de los deseos; «que dan muerte a» reproduce esa relación causal de forma natural en español y mantiene el vigor del original.
- source_word: ὁ πονηρὸς / this evil desire is the devil’s daughter
  english_pob_choice: this evil desire is the devil’s daughter
  chosen_spanish: este mal deseo es hija del diablo
  alternatives_spanish:
  - este mal deseo es la hija del diablo
  - este deseo malo procede del diablo
  lexicon: θυγάτηρ / figurative kinship
  rationale: Se conserva la metáfora filial tal como aparece en el texto. En español, «hija del diablo» mantiene la personificación y el vínculo de origen/afinidad sin explicitar más de lo que el texto dice.
- source_word: ἀπέχεσθαι / abstain from
  english_pob_choice: abstain from
  chosen_spanish: abstenerse de
  alternatives_spanish:
  - apartarse de
  - evitar
  - renunciar a
  lexicon: ἀπέχω
  rationale: «Abstenerse de» es la correspondencia más directa y natural para el mandato. Mantiene el tono exhortativo del pasaje.
- source_word: ζήσεσθε τῷ θεῷ / you may live to God
  english_pob_choice: live to God
  chosen_spanish: vivan para Dios
  alternatives_spanish:
  - vivan para Dios
  - vivan a Dios
  - vivan en relación con Dios
  lexicon: ζάω + dative
  rationale: La dativa relación-finalidad se expresa con naturalidad en español como «para Dios». Se eligió el plural «vivan» por concordancia lógica con el sujeto implícito plural «ustedes/ustedes todos» del mandato.
theological_decisions:
- issue: Cómo verter δοῦλοι τοῦ θεοῦ sin neutralizar la fuerza social y teológica del término
  english_pob_reading: the slaves of God
  chosen_spanish_reading: los esclavos de Dios
  alternative_spanish_readings:
  - los siervos de Dios
  - los servidores de Dios
  rationale: La POB inglesa opta por «slaves», por lo que la versión española conserva esa dureza lexical. El texto no pide suavizarla; al contrario, la pertenencia absoluta a Dios forma parte del argumento moral.
  doctrine_reference: Lexical/theological consistency with δοῦλος in POB policy
- issue: Interpretación del parentesco metafórico en 'the devil’s daughter'
  english_pob_reading: the devil’s daughter
  chosen_spanish_reading: hija del diablo
  alternative_spanish_readings:
  - procedente del diablo
  - del diablo
  rationale: El enunciado presenta una personificación y una relación de procedencia/afinidad maligna. Mantener «hija» evita borrar la imagen retórica del original y del inglés POB.
  doctrine_reference: Figurative language preservation; no doctrinal expansion
- issue: El sentido de 'live to God'
  english_pob_reading: live to God
  chosen_spanish_reading: vivan para Dios
  alternative_spanish_readings:
  - vivan a Dios
  - vivan en Dios
  rationale: «Para Dios» preserva la orientación de la vida hacia Dios sin añadir matices devocionales no explícitos. La forma plural respeta la lectura exhortativa general del pasaje.
  doctrine_reference: Dative of advantage/purpose in Hellenistic Greek
translation_notes:
  revision_awareness: This draft follows the supplied Greek source and the existing English POB rendering without needing a recorded revision pass. No footnotes were supplied in the audit context, and no textual variants were indicated in the source packet.
