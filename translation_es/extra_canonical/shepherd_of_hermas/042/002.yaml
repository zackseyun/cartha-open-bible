review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego y del inglés POB: identifica los malos deseos, mantiene «los esclavos de Dios», conserva la metáfora «hija del diablo» y reproduce la exhortación a abstenerse para vivir para Dios. Sin embargo, hay un problema importante de concordancia/pronombre en la última cláusula: «uno debe… para que… vivan» mezcla singular impersonal con plural de segunda/tercera persona. Además, «Porque este mal deseo» suena menos natural que «Porque este deseo malo» o «Porque tal mal deseo» al retomar el plural anterior.'
  spanish_quality_summary: El español es mayormente claro y digno, pero la frase final necesita reparación para sonar natural y coherente. También conviene cambiar «malos deseos» por «deseos malos» en esta construcción, porque suena más idiomático en registro cuidado y evita una leve aspereza. «Que dan muerte a» funciona, aunque «dan muerte» sin «a» también sería posible; el texto revisado mantiene una formulación natural y directa.
  glossary_alignment: 'Buena alineación con la política terminológica: δοῦλος se conserva correctamente como «esclavos»; Dios se mantiene como «Dios»; no hay conflicto con términos teológicos principales. La metáfora filial «hija del diablo» preserva adecuadamente la imagen del original y del POB inglés.'
  issues:
  - severity: medium
    issue: Incongruencia de persona y número en la exhortación final
    rationale: «Uno debe abstenerse… para que… vivan» mezcla una construcción impersonal singular con un verbo plural, lo que debilita fidelidad y legibilidad. Debe unificarse, p. ej. con «deben… vivan» o «uno… viva».
  - severity: low
    issue: «Malos deseos» suena algo menos natural que «deseos malos» en este contexto
    rationale: Ambas opciones son comprensibles, pero «deseos malos» fluye mejor en español cuidado al calificar moralmente el sustantivo sin sonar tan calcado.
  - severity: low
    issue: Retoma singular algo rígida en «Porque este mal deseo»
    rationale: La frase es entendible, pero «Porque tal deseo malo» o «Porque un deseo malo como este» enlaza mejor con el antecedente plural sin afectar el sentido.
  revised_spanish_text: 2. Estos, pues, son deseos malos, que dan muerte a los esclavos de Dios. Porque tal deseo malo es hija del diablo. Por tanto, deben abstenerse de los deseos malos, para que, al abstenerse, vivan para Dios.
  revision_rationale: Se corrigió la incoherencia de persona y número en la exhortación final, se suavizó la formulación española para mayor naturalidad, y se mantuvo intacta la fuerza léxica principal del original y del POB inglés, incluida la metáfora «hija del diablo» y «los esclavos de Dios».
