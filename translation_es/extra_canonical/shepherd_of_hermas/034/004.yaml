  revision_rationale: Se reemplaza «Yahvé» por «el Señor» en todas las ocurrencias para ajustarse al griego κύριος y al English POB auditado, sin evidencia suficiente para explicitar el nombre divino en este pasaje. No se requieren otros cambios.
