review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la estructura y el sentido del griego y del English POB: contrasta dos efectos del temor, repite la exhortación a temer al Señor, y conserva la orientación final de vivir hacia Dios. Sin embargo, la decisión de traducir κύριος como «Yahvé» no está sustentada por evidencia interna aquí: el original griego disponible dice κύριον/κυρίου, y el English POB traduce consistentemente «the Lord», sin nota que justifique explicitar el nombre divino. En un texto extracanónico griego, esa explicitación sobrepasa la evidencia fuente.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Lo malo / lo bueno», «temor», «mandamientos» y la sintaxis general leen bien. El único ajuste necesario es terminológico: cambiar «Yahvé» por «el Señor» para ajustarse a la evidencia fuente y evitar una precisión teológica no documentada. El resto del texto puede mantenerse casi intacto.'
  glossary_alignment: 'Buena alineación general con el glosario en «temor», «mandamientos» y «vivir para Dios». Excepción necesaria al valor por defecto de YHWH > «Yahvé»: aquí el testimonio fuente es griego κύριος en Hermas, no una ocurrencia hebrea del nombre divino ni una cita explícita auditada que exija restaurarlo. Por eso debe usarse «el Señor».'
  issues:
  - severity: high
    issue: «Yahvé» introduce una identificación no demostrada por la fuente
    rationale: El texto base es griego extracanónico y presenta κύριος; el English POB no documenta aquí una restauración del nombre divino. Traducir «Yahvé» añade una capa interpretativa más allá de la evidencia disponible.
  - severity: low
    issue: La justificación lexical sobre el nombre divino invoca una política general sin atender la excepción contextual
    rationale: La política del proyecto permite excepciones contextuales. En este caso, la fidelidad a la fuente requiere mantener «el Señor».
