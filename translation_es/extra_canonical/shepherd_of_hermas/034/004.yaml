  yaml_path: translation/extra_canonical/shepherd_of_hermas/034/004.yaml
  text: '4. Therefore there are two fears: if you wish to do what is evil, fear the Lord and you will not do it; and if, on the other hand, you wish to do what is good, fear the Lord and you will do it. Thus the fear of the Lord is strong and great and glorious. So fear the Lord, and you will live to him; and all who fear him, among those who keep his commandments, will live to God.'
translation:
  language: es
  text: '4. Por tanto, hay dos temores: si quieres hacer lo malo, teme al Señor, y no lo harás; y si, por otra parte, quieres hacer lo bueno, teme al Señor, y lo harás. Así, el temor del Señor es fuerte, grande y glorioso. Por eso, teme al Señor, y vivirás para él; y todos los que le temen, entre los que guardan sus mandamientos, vivirán para Dios.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φόβοι / fear
  english_pob_choice: fear
  chosen_spanish: temores / temor
  alternatives_spanish:
  - miedo
  - reverencia
  lexicon: φόβος
  rationale: 'El contexto distingue dos efectos del ‘temor’: uno que frena el mal y otro que impulsa el bien. En español, ‘temor’ mantiene la fuerza lexical amplia mejor que ‘miedo’, y ‘temores’ en plural conserva la estructura del texto. ‘Reverencia’ suavizaría demasiado el sentido exhortativo.'
- source_word: κύριον
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: κύριος
  rationale: Aunque el griego dice ‘Señor’, el pasaje alude al nombre divino en un contexto bíblico-teológico. Conforme al criterio del proyecto, se explicita ‘Yahvé’ para no ocultar el nombre divino mediante una convención de máscara.
- source_word: ἀγαθόν / evil-good contrast
  english_pob_choice: evil / good
  chosen_spanish: lo malo / lo bueno
  alternatives_spanish:
  - el mal / el bien
  lexicon: ἀγαθός
  rationale: ‘Lo malo’ y ‘lo bueno’ suenan naturales en español y conservan la oposición ética directa del griego. ‘El mal/el bien’ también sería posible, pero aquí la forma neutra verbaliza mejor el contraste inmediato de acciones.
- source_word: ζήσῃ / live
  english_pob_choice: live to him / live to God
  chosen_spanish: vivirás para él / vivirán para Dios
  alternatives_spanish:
  - vivirás para él y vivirán para Dios
  - vivirás en relación con él
  lexicon: ζάω
  rationale: El griego presenta una vida orientada a Dios; ‘vivir para él’ preserva esa dirección sin añadir una paráfrasis interpretativa excesiva. Se mantiene la diferencia entre ‘él’ y ‘Dios’ según el contexto del final de la frase.
- source_word: ἐντολὰς
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - preceptos
  - órdenes
  lexicon: ἐντολή
  rationale: ‘Mandamientos’ es el equivalente más claro y tradicional en español para normas divinas vinculantes, y encaja con el tono del pasaje. ‘Preceptos’ sería más formal pero menos transparente.
theological_decisions:
- issue: Uso del nombre divino frente a ‘el Señor’
  english_pob_reading: The Lord / fear the Lord
  chosen_spanish_reading: Yahvé / teme a Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Señor Dios
  rationale: El criterio del proyecto exige no ocultar el nombre divino cuando el trasfondo apunta al tetragrámaton. En este pasaje, la exhortación al ‘temor del Señor’ funciona como referencia al Dios de Israel, por lo que se opta por ‘Yahvé’.
  doctrine_reference: Nombre divino y traducción transparente
translation_notes:
  revision_awareness: 'No se registran revisiones previas en el paquete fuente. La redacción sigue la lectura inglesa auditada, pero vuelve al griego para los elementos léxicos decisivos: φόβος, κύριος, ζάω y ἐντολή, manteniendo la estructura argumentativa del mandato.'
  spanish_consistency_notes:
  - Se conserva la repetición de ‘teme a Yahvé’ para reproducir el paralelismo enfático del original.
  - Se mantiene ‘vivir para él’ y ‘vivirán para Dios’ como dos formulaciones relacionadas pero no idénticas, siguiendo el cambio de referencia del texto.
  - La puntuación en dos puntos y punto y coma reproduce la progresión condicional y conclusiva del pasaje.
