review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego y del POB inglés: mandato de temer al Señor, guardar los mandamientos, resultado de fortaleza moral/práctica, conducta sobresaliente, hacer bien todas las cosas, y conclusión salvífica. Sin embargo, hay una inconsistencia importante en la referencia de κύριος: primero se vierte como «Yahvé» y luego como «el Señor», sin evidencia en este registro de una razón textual para alternar. Dado el criterio terminológico del proyecto, conviene unificar.'
  spanish_quality_summary: El español es claro, digno y legible. Solo requiere un ajuste menor de consistencia terminológica y una leve mejora de puntuación/fluidez. «Harás bien todo» es comprensible, pero «harás todo bien» suena más natural en español sin perder el sentido.
  glossary_alignment: 'Buen alineamiento general con «mandamientos», «Dios», «temor» y «serás salvo». El principal desajuste es κύριος: el proyecto prefiere «Yahvé» en el texto principal cuando se refiere al Dios de Israel; por tanto, no debería alternarse con «el Señor» aquí sin nota justificativa. No hay base documentada en el expediente inglés para una excepción.'
  issues:
  - severity: medium
    issue: Inconsistencia en la traducción de κύριος dentro del mismo pasaje
    rationale: El borrador usa «Yahvé» al inicio y «el Señor» después. El proyecto pide «Yahvé» como forma principal; alternar sin motivo textual o nota crea inconsistencia terminológica.
  - severity: low
    issue: Orden poco natural en «harás bien todo»
    rationale: Aunque inteligible, en español general suena más natural «harás todo bien», que preserva el alcance de πάντα/everything sin rigidez.
  revised_spanish_text: 1. «Teme», dijo, «a Yahvé, y guarda sus mandamientos. Al guardar los mandamientos de Dios, serás poderoso en toda obra, y tu conducta será incomparable. Porque, al temer a Yahvé, harás todo bien. Este es el temor que debes tener, y serás salvo».
  revision_rationale: Se revisa para unificar κύριος como «Yahvé» según la terminología del proyecto y para mejorar la naturalidad de «harás todo bien». También se añade una coma tras el complemento inicial para una lectura más fluida en español.
