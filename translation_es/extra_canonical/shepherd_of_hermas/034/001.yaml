  yaml_path: translation/extra_canonical/shepherd_of_hermas/034/001.yaml
  text: 1. “Fear,” he says, “the Lord, and keep his commandments. By keeping the commandments of God you will be powerful in every deed, and your conduct will be incomparable. For in fearing the Lord you will do everything well. This is the fear that you must have—and you will be saved.
translation:
  language: es
  text: 1. «Teme», dijo, «a Yahvé, y guarda sus mandamientos. Al guardar los mandamientos de Dios, serás poderoso en toda obra, y tu conducta será incomparable. Porque, al temer a Yahvé, harás todo bien. Este es el temor que debes tener, y serás salvo».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φόβος / φοβεῖσθαι (fear)
  english_pob_choice: Fear
  chosen_spanish: Teme / temor
  alternatives_spanish:
  - Ten reverencia / reverencia
  - Respeta / respeto
  lexicon: φόβος; φοβεῖσθαι
  rationale: Conservo el campo léxico de 'temor' porque el contexto manda un temor religioso real, no solo respeto leve. En español, 'temor' mantiene mejor la fuerza del mandato y la relación con 'serás salvo'.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Dios
  lexicon: κύριος
  rationale: En esta serie, cuando 'el Señor' se refiere al Dios de Israel, el proyecto pide reflejar el nombre divino como 'Yahvé' en el texto principal. Luego, la expresión tradicional 'al temer al Señor' se conserva dentro de la fórmula heredada del dicho, pero el referente inicial se aclara con 'Yahvé'.
- source_word: ἐντολαί
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - preceptos
  - órdenes
  lexicon: ἐντολή
  rationale: '''Mandamientos'' es el equivalente más directo y fiel para el tono normativo del pasaje, y funciona bien en español eclesial sin perder precisión.'
- source_word: θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Dios verdadero
  lexicon: θεός
  rationale: '''Dios'' preserva el referente divino sin sobrecargar el verso. Mantengo la singularidad contextual sin añadir glosas innecesarias.'
- source_word: ἔργον / πρᾶξις (deed, conduct)
  english_pob_choice: deed / conduct
  chosen_spanish: obra / conducta
  alternatives_spanish:
  - acción / modo de vida
  - hecho / proceder
  lexicon: ἔργον; ἀναστροφή
  rationale: '''Obra'' comunica la eficacia práctica de la obediencia; ''conducta'' traduce la idea de comportamiento visible y sostenido, con un registro natural en español.'
- source_word: σωθήσῃ / saved
  english_pob_choice: you will be saved
  chosen_spanish: serás salvo
  alternatives_spanish:
  - serás rescatado
  - alcanzarás salvación
  lexicon: σῴζω
  rationale: '''Serás salvo'' conserva la fórmula salvífica tradicional y la pasiva implícita del griego, sin introducir un matiz más interpretativo que el texto no exige.'
theological_decisions:
- issue: Relación entre 'temor' de Dios y obediencia
  english_pob_reading: This is the fear that you must have—and you will be saved.
  chosen_spanish_reading: Este es el temor que debes tener; y serás salvo.
  alternative_spanish_readings:
  - Este es el respeto que debes tener; y serás salvo.
  - Este es el temor reverente que debes tener; y serás salvo.
  rationale: El pasaje presenta el temor de Dios como disposición necesaria y vinculada a la salvación. 'Temor' mantiene la tensión reverente y la obligación moral; 'temor reverente' explicita demasiado, y 'respeto' debilita el peso teológico del mandato.
  doctrine_reference: Proverbios 1:7; Eclesiastés 12:13; Hechos 10:35
- issue: Uso de 'Yahvé' frente a 'el Señor'
  english_pob_reading: Fear the Lord
  chosen_spanish_reading: Teme a Yahvé
  alternative_spanish_readings:
  - Teme al Señor
  rationale: Siguiendo la terminología del proyecto, el referente divino se expresa como 'Yahvé' cuando el contexto apunta al nombre divino. Sin embargo, en la clausura proverbial 'al temer al Señor' se conserva el giro heredado porque en español suena natural y no altera el sentido.
  doctrine_reference: Éxodo 3:15; Deuteronomio 6:13
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés ni notas textuales adicionales. La redacción española sigue el contenido del texto fuente y la decisión auditada de mantener una formulación directa, sin amplificación interpretativa.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y sobrio, apto para lectura pública.
  - Se preserva la alternancia 'Yahvé' / 'el Señor' solo donde ayuda a la naturalidad del español sin borrar el referente divino.
  - No se introducen notas al pie porque el pasaje no presenta variantes textuales ni alternativas léxicas indispensables para la publicación.
