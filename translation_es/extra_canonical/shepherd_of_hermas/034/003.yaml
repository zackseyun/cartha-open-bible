  text: 3. But fear the works of the devil, for they are evil. So, by fearing the Lord, you will fear the works of the devil, and you will not do them, but will keep away from them.
translation:
  language: es
  text: 3. Pero teme las obras del diablo, porque son malas. Así, al temer al Señor, temerás las obras del diablo, y no las harás, sino que te apartarás de ellas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φοβοῦ
  english_pob_choice: fear
  chosen_spanish: teme
  alternatives_spanish:
  - tema
  - ten miedo de
  lexicon: φοβέομαι
  rationale: El griego manda sentir temor reverente y evitar lo contrario; en español, «teme» conserva la fuerza imperativa breve y natural. «Tema» sería posible, pero menos directo en registro exhortativo.
- source_word: τὰ ἔργα τοῦ διαβόλου
  english_pob_choice: the works of the devil
  chosen_spanish: las obras del diablo
  alternatives_spanish:
  - las obras del maligno
  - las obras del diablo
  lexicon: ἔργον; διάβολος
  rationale: «Obras» refleja bien ἔργα y mantiene el contraste moral del texto. Se conserva «diablo» porque el inglés POB también lo hace y el término es claro en español bíblico.
- source_word: πονηρά
  english_pob_choice: evil
  chosen_spanish: malas
  alternatives_spanish:
  - malvadas
  - malas
  - malignas
  lexicon: πονηρός
  rationale: En este contexto adjetival, «malas» expresa con naturalidad la cualidad moral de las obras. «Malignas» podría sonar más abstracto; «malvadas» es más enfático, pero menos sobrio.
- source_word: φοβούμενος
  english_pob_choice: by fearing
  chosen_spanish: al temer
  alternatives_spanish:
  - temiendo
  - por temor de
  lexicon: φοβέομαι
  rationale: 'La estructura causal/instrumental del griego queda bien en español con «al temer», que suena natural y conserva la relación: el temor al Señor produce el rechazo del mal.'
- source_word: τὸν Κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor
  - Yahvé
  lexicon: κύριος
  rationale: Aquí el texto griego usa κύριος de manera general para el Señor; en este dicho exhortativo la forma tradicional «el Señor» es la más natural en español y evita forzar una identificación explícita que el pasaje no desarrolla.
- source_word: μὴ πράξεις
  english_pob_choice: you will not do them
  chosen_spanish: no las harás
  alternatives_spanish:
  - no las harás
  - no las practicarás
  lexicon: πράσσω
  rationale: «Hacer» traduce bien el verbo general de ejecutar/realizar acciones. Se mantiene la referencia pronominal a «las» para ligar con «las obras».
- source_word: ἀποστήσῃ ἀπ’ αὐτῶν
  english_pob_choice: will keep away from them
  chosen_spanish: te apartarás de ellas
  alternatives_spanish:
  - te apartarás de ellas
  - te alejarás de ellas
  lexicon: ἀφίστημι
  rationale: El griego expresa apartarse/retirarse; «te apartarás de ellas» conserva el matiz de separación activa y es más cercano a la forma exhortativa que «alejarás».
theological_decisions:
- issue: Relación entre temor de Dios y rechazo del mal
  english_pob_reading: So, by fearing the Lord, you will fear the works of the devil, and you will not do them, but will keep away from them.
  chosen_spanish_reading: Así, al temer al Señor, temerás las obras del diablo, y no las harás, sino que te apartarás de ellas.
  alternative_spanish_readings:
  - Así, al temer al Señor, tendrás temor de las obras del diablo, y no las harás, sino que te apartarás de ellas.
  rationale: 'La formulación mantiene la lógica espiritual del pasaje: el temor debido a Dios desplaza el temor/atracción hacia las obras del diablo. No se suaviza a una mera cautela psicológica; se conserva una relación moral y religiosa fuerte.'
  doctrine_reference: Mandate 7 (exhortación moral a la pureza y al rechazo de las obras del diablo)
translation_notes:
  revision_awareness: No hay revisión aplicada en el paquete de auditoría; la redacción sigue de cerca el griego normalizado y el sentido ya captado por la traducción inglesa POB, sin notas textuales adicionales.
  spanish_consistency_notes:
  - Se conserva el contraste entre «el Señor» y «el diablo» para mantener la oposición moral explícita del original.
  - Se usa «obras» en plural para reflejar el plural griego y la referencia concreta a acciones, no solo a una abstracción del mal.
  - El imperativo inicial se resuelve con «teme» para un español bíblico claro y directo.
