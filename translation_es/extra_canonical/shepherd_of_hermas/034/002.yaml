review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del rastro de auditoría inglés: contraste entre temer al Señor y no temer al diablo, negación de poder en el diablo, y el aforismo sobre poder y temor. Sin embargo, la frase española ''dominarás al diablo'' suena algo fuerte y menos idiomática para el valor de ''gain mastery over'' en este contexto; ''tendrás dominio sobre el diablo'' preserva mejor el matiz de predominio sin implicar necesariamente sometimiento directo como objeto personal. El resto del paralelismo está bien conservado.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. La sintaxis es natural y no suena acartonada. La única mejora recomendada es suavizar 'dominarás al diablo' a una formulación más idiomática y exacta en español eclesial. 'Poder glorioso' es entendible aunque algo poco usual; no obstante, refleja la construcción auditada y no requiere cambio forzoso.
  glossary_alignment: 'La terminología del proyecto está bien manejada: διάβολος -> ''diablo''; φοβέομαι/φόβος -> ''temer/temor''; κύριος -> ''Señor'' con justificación válida por tratarse de título griego no identificable aquí como tetragrámaton; δύναμις/ἰσχύς -> ''poder''. No hay conflicto serio con las directrices globales.'
  issues:
  - severity: medium
    issue: '''dominarás al diablo'' puede sobreexpresar o sonar menos idiomático que la formulación auditada inglesa.'
    rationale: El inglés 'you will gain mastery over the devil' apunta a predominio o señorío sobre él como resultado de temer al Señor. En español, 'dominarás al diablo' puede sonar más directo, casi de control activo sobre una persona, mientras que 'tendrás dominio sobre el diablo' conserva mejor el matiz y sigue siendo natural.
  revised_spanish_text: 2. Pero no temas al diablo; porque, al temer al Señor, tendrás dominio sobre el diablo, ya que no hay poder en él. En aquel en quien no hay poder, no hay temor; pero en aquel en quien hay poder glorioso, también hay temor. Porque todo el que tiene poder tiene temor, pero el que no tiene poder es despreciado por todos.
  revision_rationale: Se hace una reparación menor para ajustar mejor el matiz de la frase central al sentido auditado en inglés y al español natural, sin cambiar el contenido doctrinal ni el paralelismo del pasaje.
