  yaml_path: translation/extra_canonical/shepherd_of_hermas/034/002.yaml
  text: 2. But do not fear the devil; for by fearing the Lord you will gain mastery over the devil, because there is no power in him. In one in whom there is no power, there is no fear; but in one in whom there is glorious power, there is also fear. For everyone who has power has fear, but the one who has no power is despised by all.
translation:
  language: es
  text: 2. Pero no temas al diablo; porque, al temer al Señor, tendrás dominio sobre el diablo, ya que no hay poder en él. En aquel en quien no hay poder, no hay temor; pero en aquel en quien hay poder glorioso, también hay temor. Porque todo el que tiene poder tiene temor, pero el que no tiene poder es despreciado por todos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διάβολος
  english_pob_choice: devil
  chosen_spanish: diablo
  alternatives_spanish:
  - demonio
  - acusador
  lexicon: διάβολος
  rationale: La POB en inglés usa el término personal ‘devil’; en español, ‘diablo’ es la correspondencia natural y auditable para esa referencia personal, sin suavizarla a un término más general como ‘demonio’. “Acusador” sería demasiado interpretativo aquí.
- source_word: φοβέομαι / φόβος
  english_pob_choice: fear
  chosen_spanish: temer / temor
  alternatives_spanish:
  - tener miedo / miedo
  - reverenciar / reverencia
  lexicon: φοβέομαι
  rationale: El contexto contrasta el temor producido por el poder con la ausencia de temor donde no hay poder. ‘Temer’ y ‘temor’ conservan mejor esa relación que ‘miedo’, y evitan reducir el matiz reverente o el de pánico sin perder la fuerza del texto.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: κύριος
  rationale: Aunque la norma del proyecto prefiere ‘Yahvé’ para el nombre divino, aquí el texto griego de Hermas usa ‘Señor’ como título religioso y no como cita transparente del tetragrámaton; por eso ‘Señor’ es la opción más fiel al flujo del pasaje y a la forma de la obra griega.
- source_word: ἰσχύς / δύναμις
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - autoridad
  lexicon: ἰσχύς
  rationale: ‘Poder’ mantiene el paralelismo repetido del pasaje (‘no hay poder… tiene poder…’) y refleja la idea de capacidad efectiva. ‘Autoridad’ introduciría un matiz más jurídico que el contexto no exige.
- source_word: δοξα
  english_pob_choice: glorious power
  chosen_spanish: poder glorioso
  alternatives_spanish:
  - poder de gloria
  - gloria poderosa
  lexicon: δόξα
  rationale: La combinación del original expresa poder cualificado por gloria, no solo una cualidad abstracta. ‘Poder glorioso’ conserva esa unión sin forzar una paráfrasis más libre.
- source_word: καταφρονεῖται
  english_pob_choice: is despised
  chosen_spanish: es despreciado
  alternatives_spanish:
  - es menospreciado
  - es tenido en poco
  lexicon: καταφρονέω
  rationale: ‘Despreciado’ reproduce bien el valor social de ser tratado como inferior por todos. ‘Menospreciado’ sería posible, pero aquí ‘despreciado’ mantiene la dureza del contraste con el que tiene poder.
theological_decisions:
- issue: Relación entre temor de Dios y dominio sobre el diablo
  english_pob_reading: By fearing the Lord you will gain mastery over the devil.
  chosen_spanish_reading: Al temer al Señor, dominarás al diablo.
  alternative_spanish_readings:
  - porque al temer al Señor vencerás al diablo
  - pues al temer al Señor tendrás dominio sobre el diablo
  rationale: La redacción española conserva la causalidad y la idea de dominio/maduración del sujeto creyente sobre el diablo. ‘Dominarás’ es breve y directo, y no agrega un matiz militar no explícito.
  doctrine_reference: Sant 4:7; 1 Pe 5:8-9
- issue: Afirmación de ausencia de poder en el diablo
  english_pob_reading: because there is no power in him.
  chosen_spanish_reading: ya que no hay poder en él.
  alternative_spanish_readings:
  - porque en él no hay poder
  - puesto que no tiene poder
  rationale: 'La frase mantiene la afirmación ontológica limitada del texto: el diablo no posee poder propio autosuficiente. Se evita intensificarla a una negación absoluta de toda eficacia, que el contexto no declara.'
  doctrine_reference: Heb 2:14; Col 2:15
- issue: Aforismo sobre poder, temor y desprecio
  english_pob_reading: For everyone who has power has fear, but the one who has no power is despised by all.
  chosen_spanish_reading: Porque todo el que tiene poder tiene temor, pero el que no tiene poder es despreciado por todos.
  alternative_spanish_readings:
  - porque quien tiene poder también teme, pero el que no tiene poder es despreciado por todos
  - porque todo poseedor de poder tiene temor, pero el que no tiene poder es despreciado por todos
  rationale: Se conserva el paralelismo proverbial del griego y de la POB inglesa. ‘Tiene temor’ corresponde al juego retórico del original, donde el poder no elimina la posibilidad de temor en quien lo posee.
  doctrine_reference: Prov 29:25; Rom 8:15
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; la versión inglesa disponible ya refleja una decisión interpretativa estable. Por ello, el español sigue de cerca el sentido de la POB inglesa sin introducir variantes textuales o conjeturas adicionales.
  spanish_consistency_notes:
  - Se mantiene ‘diablo’ para διάβολος y ‘Señor’ para κύριος, coherente con la referencia religiosa del pasaje.
  - Se conserva ‘poder’ de forma repetida para reproducir el paralelismo enfático del original y de la POB inglesa.
  - ‘Temor/temer’ se usa de modo consistente para φόβος/φοβέομαι, evitando alternarlo con ‘miedo’ para no debilitar el patrón retórico del texto.
  - No se introduce ‘Yahvé’ porque el texto fuente aquí no cita el nombre divino explícito; el título ‘Señor’ respeta mejor el griego de Hermas.
