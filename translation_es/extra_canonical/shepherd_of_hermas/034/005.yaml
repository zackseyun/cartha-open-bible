  text: 5. “Why,” I said, “sir, did you say about those who keep his commandments, ‘They will live to God’?” “Because,” he said, “all creation fears the Lord, but it does not keep his commandments. Therefore the life of those who fear him and keep his commandments is with God; but for those who do not keep his commandments, there is not even life in them.”
translation:
  language: es
  text: '5. «¿Por qué dijiste, señor, acerca de los que guardan sus mandamientos: “Vivirán para Dios”?», dije. «Porque», dijo, «toda la creación teme al Señor, pero no guarda sus mandamientos. Por tanto, la vida de los que le temen y guardan sus mandamientos está con Dios; pero para los que no guardan sus mandamientos, ni siquiera hay vida en ellos».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φοβέω / φοβεῖται
  english_pob_choice: fears
  chosen_spanish: teme
  alternatives_spanish:
  - tiene temor de
  - respeta con temor
  lexicon: φόβος / φοβέω
  rationale: ‘Teme’ conserva el valor reverencial y de temor real que tiene el griego en este contexto, sin suavizarlo a una mera deferencia.
- source_word: ἐντολή
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandatos
  - preceptos
  lexicon: ἐντολή
  rationale: ‘Mandamientos’ es la opción más natural en español eclesial y mantiene la fuerza normativa del término.
- source_word: ζήσονται τῷ θεῷ
  english_pob_choice: They will live to God
  chosen_spanish: Vivirán para Dios
  alternatives_spanish:
  - vivirán a Dios
  - vivirán con Dios
  lexicon: ζάω + dativo
  rationale: La construcción griega admite una relación orientada a Dios; ‘para Dios’ conserva esa dirección sin introducir todavía una equivalencia interpretativa más fuerte como ‘con Dios’.
- source_word: ἡ ζωή ... μετὰ θεοῦ
  english_pob_choice: the life ... is with God
  chosen_spanish: la vida ... está con Dios
  alternatives_spanish:
  - la vida ... es con Dios
  - su vida ... está junto a Dios
  lexicon: μετά + genitivo
  rationale: ‘Está con Dios’ sigue de cerca la relación expresada por μετά con genitivo y refleja la ubicación/comunión asociada a la vida.
- source_word: πᾶσα ἡ κτίσις
  english_pob_choice: all creation
  chosen_spanish: toda la creación
  alternatives_spanish:
  - toda criatura
  - todo lo creado
  lexicon: κτίσις
  rationale: ‘Toda la creación’ preserva el alcance colectivo del griego mejor que ‘toda criatura’, que podría sonar más individualizado.
- source_word: οὐ τηρεῖ
  english_pob_choice: does not keep
  chosen_spanish: no guarda
  alternatives_spanish:
  - no observa
  - no cumple
  lexicon: τηρέω
  rationale: ‘Guardar’ mantiene el paralelo con ‘guardar sus mandamientos’ y reproduce bien la idea de observar fielmente.
- source_word: οὐκ ἔστιν ἐν αὐτοῖς ζωή
  english_pob_choice: there is not even life in them
  chosen_spanish: ni siquiera hay vida en ellos
  alternatives_spanish:
  - no hay vida en ellos
  - ni vida hay en ellos
  lexicon: εἰμί + ἐν
  rationale: ‘Ni siquiera hay vida en ellos’ conserva el énfasis de negación total que el inglés POB expresa con ‘not even’.
theological_decisions:
- issue: Destino de los que guardan los mandamientos
  english_pob_reading: They will live to God
  chosen_spanish_reading: Vivirán para Dios
  alternative_spanish_readings:
  - Vivirán con Dios
  - Vivirá para Dios
  rationale: Se mantiene la orientación teológica hacia Dios sin convertir el enunciado en una fórmula más desarrollada de comunión escatológica que el griego no explicita aquí.
  doctrine_reference: Vida eterna / obediencia como fruto de la fidelidad
- issue: Relación entre temor de Dios y obediencia
  english_pob_reading: all creation fears the Lord, but it does not keep his commandments
  chosen_spanish_reading: toda la creación teme al Señor, pero no guarda sus mandamientos
  alternative_spanish_readings:
  - toda la creación teme al Señor, pero no cumple sus mandamientos
  rationale: 'Se conserva la tensión del pasaje: el temor universal no equivale a obediencia universal. ‘Señor’ aquí refleja el lenguaje reverencial del contexto griego sin introducir un título alternativo innecesario.'
  doctrine_reference: Temor reverente de Dios / obediencia
- issue: Vida presente o vida poseída realmente
  english_pob_reading: there is not even life in them
  chosen_spanish_reading: ni siquiera hay vida en ellos
  alternative_spanish_readings:
  - no tienen vida en sí mismos
  - no hay vida en ellos
  rationale: La negación enfática se conserva sin suavizarla a una mera ausencia externa; el español permite mantener la dureza antropológica del dicho.
  doctrine_reference: Muerte espiritual / vida verdadera
translation_notes:
  revision_awareness: 'No applied revisions were supplied in the source packet. The Spanish draft follows the English POB reading while checking the Greek phrases directly for the key contrasts: temor/obediencia, ζωή μετὰ θεοῦ, and la negación final.'
  spanish_consistency_notes:
  - Se mantiene ‘mandamientos’ para ἐντολή y ‘guardar’ para τηρέω para conservar el paralelismo interno.
  - Se usa ‘Señor’ para κύριος en este contexto de cita general sobre la creación, sin sustituir la referencia por un término más interpretativo.
  - ‘Vivirán para Dios’ y ‘está con Dios’ distinguen la orientación de la vida del estado de esa vida, siguiendo el griego y el inglés POB.
