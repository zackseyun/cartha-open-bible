base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/018/002.yaml
  text: 'Now I say to you who lead the church and to the first-seaters: do not become like poisoners. Poisoners carry their drugs in boxes; but you carry your drug and your poison in your heart. You are encrusted and do not wish to cleanse your hearts and to bring your understanding together as one in a pure heart, so that you may receive mercy from the great King. Watch then, children, lest these dissensions of yours deprive you of life. How can you wish to train the Lord’s chosen ones when you yourselves do not have training? Train one another and be at peace among yourselves, so that I also, standing joyfully before the Father, may give an account on behalf of you all to your Lord.'
translation:
  language: es
  text: 'Ahora les digo a ustedes, los que guían la iglesia y los que ocupan los primeros asientos: no se hagan como envenenadores. Los envenenadores llevan sus drogas en cajas; pero ustedes llevan su droga y su veneno en el corazón. Están cubiertos de costras y no quieren limpiar sus corazones ni reunir su entendimiento en uno, en un corazón puro, para que reciban misericordia del gran Rey. Miren, entonces, hijos, no sea que estas disensiones suyas los priven de la vida. ¿Cómo quieren formar a los elegidos del Señor si ustedes mismos no tienen formación? Fórmense unos a otros y estén en paz entre ustedes, para que yo también, estando gozosamente delante del Padre, pueda dar cuenta por todos ustedes ante su Señor.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ τὴν ἐκκλησίαν ἄγοντες
  english_pob_choice: you who lead the church
  chosen_spanish: los que guían la iglesia
  alternatives_spanish:
  - los que conducen la iglesia
  - los que gobiernan la iglesia
  lexicon: ἄγω
  rationale: «Guiar» conserva la idea de dirigir/conducir sin imponer una lectura jerárquica más fuerte que la del griego y funciona de modo natural en español.
- source_word: πρωτοκαθεδρίταις
  english_pob_choice: the first-seaters
  chosen_spanish: los primeros asientos
  alternatives_spanish:
  - los que ocupan los primeros puestos
  - los primeros en sentarse
  lexicon: πρωτοκαθεδρία
  rationale: Se mantiene el referente literal al honor de los primeros lugares; «asientos» evita una paráfrasis excesiva y preserva la imagen social del texto.
- source_word: φαρμακοποιοῖς
  english_pob_choice: poisoners
  chosen_spanish: envenenadores
  alternatives_spanish:
  - venenadores
  - los que preparan venenos
  lexicon: φαρμακοποιός
  rationale: El sentido contextual es de quienes administran/mezclan veneno; «envenenadores» reproduce la fuerza moral del insulto y es idiomático en español.
- source_word: φάρμακα
  english_pob_choice: drugs
  chosen_spanish: drogas
  alternatives_spanish:
  - remedios
  - medicinas
  - pócimas
  lexicon: φάρμακον
  rationale: Se conserva la ambigüedad léxica de la palabra griega, que puede significar droga, medicina o veneno; aquí el contexto opone «droga» y «veneno».
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - interior
  - mente
  - ánimo
  lexicon: καρδία
  rationale: «Corazón» es la correspondencia más directa y conserva la unidad bíblica de centro interior de la persona.
- source_word: σύνεσιν
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - criterio
  - comprensión
  lexicon: σύνεσις
  rationale: «Entendimiento» refleja el aspecto cognitivo sin añadir un matiz técnico ajeno al pasaje.
- source_word: ἁγνῇ καρδίᾳ
  english_pob_choice: in a pure heart
  chosen_spanish: en un corazón puro
  alternatives_spanish:
  - con un corazón puro
  - de corazón puro
  lexicon: ἁγνός
  rationale: La preposición y el adjetivo se vierten de manera natural en español manteniendo la pureza moral requerida por el contexto.
- source_word: ἐλεηθῆτε ὑπὸ τοῦ μεγάλου βασιλέως
  english_pob_choice: you may receive mercy from the great King
  chosen_spanish: reciban misericordia del gran Rey
  alternatives_spanish:
  - obtengan misericordia del gran Rey
  - sean compadecidos por el gran Rey
  lexicon: ἐλεέω
  rationale: «Reciban misericordia» sigue la lectura verbal pasiva sin forzar la sintaxis; «gran Rey» conserva la mayestática designación del Dios/juez supremo del texto.
- source_word: μαθητεύσατε
  english_pob_choice: Train
  chosen_spanish: Entrénense
  alternatives_spanish:
  - discipúlense
  - formen entre ustedes
  lexicon: μαθητεύω
  rationale: El inglés POB ya entendió aquí una idea de formación/entrenamiento, no de «hacer discípulos» en sentido misionero; en español «Entrénense» reproduce esa lectura práctica.
- source_word: τὰ ἐκλεκτὰ τοῦ κυρίου
  english_pob_choice: the Lord’s chosen ones
  chosen_spanish: los elegidos del Señor
  alternatives_spanish:
  - los escogidos del Señor
  - los elegidos de Yahvé
  lexicon: ἐκλεκτός
  rationale: Se conserva la noción de elección con un término común y comprensible. Dado que el griego aquí usa κύριος, se mantiene «Señor» en esta frase, como reflejo del texto recibido y de la formulación fija del pasaje.
theological_decisions:
- issue: Cómo verter κύριος en la expresión «τοῦ κυρίου» dentro de una cita exhortativa no explícitamente ligada al Tetragrámaton.
  english_pob_reading: the Lord’s chosen ones
  chosen_spanish_reading: los elegidos del Señor
  alternative_spanish_readings:
  - los elegidos de Yahvé
  - los escogidos del Señor
  rationale: En este pasaje el título κύριος funciona dentro de la recepción cristiana del texto y la formulación inglesa ya fijó «Lord». Mantener «Señor» evita introducir una identificación explícita con el Tetragrámaton que el contexto inmediato no exige.
  doctrine_reference: Cristología y uso reverencial de κύριος en literatura cristiana primitiva
- issue: Sentido de μαθητεύσατε en un contexto de corrección comunitaria.
  english_pob_reading: Train one another
  chosen_spanish_reading: Entrénense unos a otros
  alternative_spanish_readings:
  - discipúlense unos a otros
  - instrúyanse unos a otros
  rationale: El contexto habla de disciplina mutua y preparación ética para vivir en paz; «entrenarse» preserva la lectura funcional adoptada por el POB inglés y evita importar la fórmula misionera de Mateo 28.
  doctrine_reference: Formación comunitaria y disciplina eclesial
- issue: Valor de φάρμακον como término ambiguo entre medicina y veneno.
  english_pob_reading: drugs ... drug and poison
  chosen_spanish_reading: drogas ... droga y veneno
  alternative_spanish_readings:
  - medicinas ... medicina y veneno
  - pócimas ... pócima y veneno
  rationale: El texto contrapone el recipiente externo con la corrupción interna y juega con la ambivalencia del término. En español, «droga» permite conservar esa tensión semántica y el contraste retórico sin suavizarlo.
  doctrine_reference: Retórica moral del vicio interior vs. apariencia externa
translation_notes:
  revision_awareness: La traducción inglesa auditada no presenta notas ni revisiones aplicadas; se mantuvieron sus decisiones semánticas principales, con ajustes mínimos de naturalidad en español y sin introducir soluciones doctrinales ajenas al griego recibido.
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος en consonancia con la formulación inglesa auditada y con el flujo cristiano del pasaje.
  - Se mantuvo «Yahvé» como término por defecto del proyecto, pero este versículo no exige una sustitución explícita en el texto recibido porque la referencia griega inmediata es κύριος y la traducción inglesa ya la resolvió como «Lord».
  - Se preservó la tríada retórica «corazón / entendimiento / corazón puro» para no perder la progresión del original.
  - No se introdujeron notas al pie porque no había variantes textuales o lexicográficas que requirieran anclaje explícito en el texto español.
