review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego según la auditoría inglesa: exhortación a los dirigentes, metáfora de los envenenadores, corrupción interior, llamado a la unidad/paz y finalidad de poder rendir cuenta ante el Señor. Sin embargo, hay dos puntos donde el español no preserva bien la forma o el sentido: «a los primeros asientos» no funciona como referente personal para πρωτοκαθεδρίταις, y «presentándome con alegría» cambia el matiz de ἑστὼς/standing joyfully por una acción de comparecer en vez de estar de pie ante el Padre. Además, «entrenamiento» suena mecánico en este contexto eclesial, aunque refleja la línea del inglés.'
  spanish_quality_summary: 'El texto es generalmente claro, pero tiene giros poco naturales o demasiado literales: «a los primeros asientos» es impropio en español; «unir su entendimiento en un solo pensamiento» puede simplificarse a una formulación más idiomática sin perder contenido; «entrenamiento» y «Entrénense» son comprensibles pero algo duros en registro eclesial. Una revisión leve mejora legibilidad y dignidad sin apartarse del original.'
  glossary_alignment: No hay conflicto grave con la terminología del proyecto. «Señor» para κύριος en este contexto está justificado. «Iglesia», «corazón», «misericordia», «gran Rey» y «elegidos» están bien. «Droga» conserva el giro del inglés, aunque en español contemporáneo puede sonar moderno; se tolera por la explicación lexical y el paralelo con «veneno».
  issues:
  - severity: high
    issue: «los primeros asientos» no traduce adecuadamente πρωτοκαθεδρίταις como personas
    rationale: El griego se refiere a quienes ocupan los primeros puestos/asientos, no a los asientos mismos. La frase actual resulta agramatical/forzada tras «digo a ustedes ... y a». Debe ser «los que ocupan los primeros asientos» o equivalente.
  - severity: medium
    issue: «presentándome con alegría delante del Padre» desplaza el sentido de estar de pie
    rationale: La auditoría inglesa refleja «standing joyfully before the Father». «Presentándome» introduce un matiz de comparecencia que no está necesariamente en el participio; «estando de pie/gozosamente delante del Padre» preserva mejor la imagen.
  - severity: medium
    issue: «entrenamiento» / «Entrénense» suena mecánico y poco natural en español eclesial
    rationale: Aunque sigue la lectura inglesa de μαθητεύω como formación práctica, en español «formación» y «fórmense» conservan mejor el sentido didáctico-comunitario sin sonar deportivo o técnico.
  - severity: low
    issue: «unir su entendimiento en un solo pensamiento» es pesado
    rationale: Puede expresarse de modo más natural como «reunir su entendimiento en uno» o «unir su entendimiento en un solo corazón puro», siempre conservando la idea de unidad interior. La revisión propuesta suaviza sin cambiar el sentido.
