  revision_rationale: 'Se corrigen dos problemas principales de fidelidad y español: πρωτοκαθεδρίταις se vierte como personas que ocupan los primeros asientos, no como los asientos mismos, y la cláusula final recupera la imagen de estar delante del Padre. También se mejora la naturalidad de μαθητεύω con «formación/formar» y se alisa una frase cognitiva pesada sin alterar el contenido. No hacen falta notas nuevas.'
