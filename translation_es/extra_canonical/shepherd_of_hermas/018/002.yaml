revisions:
- from: 'Ahora digo a ustedes, los que guían la iglesia y a los primeros asientos: no se hagan como envenenadores. Los envenenadores llevan sus drogas en cajas; pero ustedes llevan su droga y su veneno en su corazón. Están cubiertos de costras y no quieren limpiar sus corazones ni unir su entendimiento en un solo pensamiento, en un corazón puro, para que reciban misericordia del gran Rey. Miren, entonces, hijos, no sea que estas disensiones suyas los priven de la vida. ¿Cómo pueden querer entrenar a los elegidos del Señor si ustedes mismos no tienen entrenamiento? Entrénense unos a otros y estén en paz entre ustedes, para que yo también, presentándome con alegría delante del Padre, pueda dar cuenta por todos ustedes ante su Señor.'
  to: 'Ahora les digo a ustedes, los que guían la iglesia y los que ocupan los primeros asientos: no se hagan como envenenadores. Los envenenadores llevan sus drogas en cajas; pero ustedes llevan su droga y su veneno en el corazón. Están cubiertos de costras y no quieren limpiar sus corazones ni reunir su entendimiento en uno, en un corazón puro, para que reciban misericordia del gran Rey. Miren, entonces, hijos, no sea que estas disensiones suyas los priven de la vida. ¿Cómo quieren formar a los elegidos del Señor si ustedes mismos no tienen formación? Fórmense unos a otros y estén en paz entre ustedes, para que yo también, estando gozosamente delante del Padre, pueda dar cuenta por todos ustedes ante su Señor.'
  rationale: 'Se corrigen dos problemas principales de fidelidad y español: πρωτοκαθεδρίταις se vierte como personas que ocupan los primeros asientos, no como los asientos mismos, y la cláusula final recupera la imagen de estar delante del Padre. También se mejora la naturalidad de μαθητεύω con «formación/formar» y se alisa una frase cognitiva pesada sin alterar el contenido. No hacen falta notas nuevas.'
  reviewer_model: gpt-5.4
