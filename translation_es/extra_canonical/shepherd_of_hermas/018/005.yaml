revisions:
- from: Se me apareció, hermanos, en la primera visión —la del año pasado— muy anciana y sentada en una silla. Y en la segunda visión su apariencia era más joven, pero su carne y su cabello eran más viejos, y, cuando estaba de pie, me habló; y estaba más alegre que antes. Y en la tercera visión era completamente más joven y de hermosura muy distinguida, solo su cabello era más viejo; y estuvo alegre hasta el final y estaba sentada en un asiento acolchado.
  to: Se me apareció, hermanos, en la primera visión —la del año pasado— muy anciana y sentada en una silla. Y en la segunda visión su apariencia era más joven, pero su carne y su cabello eran más viejos, y, estando de pie, me habló; y estaba más alegre que antes. Y en la tercera visión era enteramente más joven y de hermosura muy distinguida; solo su cabello era más viejo. Y se mantuvo alegre en todo momento y estaba sentada en un asiento mullido.
  rationale: 'Se hicieron ajustes menores de estilo y fidelidad: «enteramente más joven» mejora la naturalidad sin perder el sentido de totalidad; «se mantuvo alegre en todo momento» evita una lectura temporal potencialmente equívoca; «asiento mullido» ofrece un español más natural para ‘cushioned seat’. También se dividió la última oración para mayor claridad.'
