base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/018/005.yaml
  text: She appeared to me, brothers, in the first vision—the one last year—very aged and sitting on a chair. And in the second vision her appearance was younger, but her flesh and her hair were older, and as she stood she spoke to me; and she was more cheerful than before. And in the third vision she was wholly younger and most distinguished in beauty, only her hair was older; and she was cheerful to the end and was seated on a cushioned seat.
translation:
  language: es
  text: Se me apareció, hermanos, en la primera visión —la del año pasado— muy anciana y sentada en una silla. Y en la segunda visión su apariencia era más joven, pero su carne y su cabello eran más viejos, y, estando de pie, me habló; y estaba más alegre que antes. Y en la tercera visión era enteramente más joven y de hermosura muy distinguida; solo su cabello era más viejo. Y se mantuvo alegre en todo momento y estaba sentada en un asiento mullido.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐφάνη / appeared
  english_pob_choice: She appeared to me
  chosen_spanish: Se me apareció
  alternatives_spanish:
  - Se manifestó ante mí
  - Apareció ante mí
  lexicon: φανερόω / φαίνω
  rationale: «Se me apareció» conserva la experiencia visionaria y el dativo personal implícito sin forzar un estilo demasiado literal en español.
- source_word: γέροντα / aged
  english_pob_choice: very aged
  chosen_spanish: muy anciana
  alternatives_spanish:
  - muy envejecida
  - de edad muy avanzada
  lexicon: γέρων
  rationale: «Anciana» comunica la vejez marcada de la figura femenina de manera natural y fiel al contexto.
- source_word: ἐπὶ καθέδρας / on a chair
  english_pob_choice: sitting on a chair
  chosen_spanish: sentada en una silla
  alternatives_spanish:
  - sentada en una silla
  - sentada en una cátedra
  lexicon: κάθεδρα
  rationale: «Silla» es el equivalente más claro y neutral para el asiento simple del pasaje; «cátedra» sonaría demasiado técnico o eclesiástico.
- source_word: νεωτέρα / younger
  english_pob_choice: younger
  chosen_spanish: más joven
  alternatives_spanish:
  - más joven de aspecto
  - juvenil
  lexicon: νέος
  rationale: Se mantiene la comparación directa del texto griego sin añadir matices no presentes.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  - naturaleza humana
  lexicon: σάρξ
  rationale: «Carne» preserva la fuerza lexical del término y evita diluir la tensión del contraste con la apariencia externa.
- source_word: θρίξ / hair
  english_pob_choice: hair
  chosen_spanish: cabello
  alternatives_spanish:
  - pelo
  - cabellera
  lexicon: θρίξ
  rationale: «Cabello» es la forma más digna y natural en español contemporáneo para este contexto descriptivo.
- source_word: ἑστῶσα / stood
  english_pob_choice: as she stood
  chosen_spanish: cuando estaba de pie
  alternatives_spanish:
  - de pie
  - mientras estaba de pie
  lexicon: ἵστημι
  rationale: La construcción mantiene el valor circunstancial del griego y su fluidez en español.
- source_word: χαριεστέρα / more cheerful
  english_pob_choice: more cheerful
  chosen_spanish: más alegre
  alternatives_spanish:
  - más gozosa
  - más complacida
  lexicon: χαριεις
  rationale: «Alegre» comunica con sencillez el cambio de semblante/estado expresado por el comparativo.
- source_word: ἔκπρεπος / distinguished in beauty
  english_pob_choice: most distinguished in beauty
  chosen_spanish: de hermosura muy distinguida
  alternatives_spanish:
  - sumamente hermosa
  - de gran belleza
  lexicon: ἔκπρεπος
  rationale: Se conserva el matiz de excelencia y distinción estética sin reducirlo solo a «hermosa».
- source_word: κλινη / cushioned seat
  english_pob_choice: cushioned seat
  chosen_spanish: asiento acolchado
  alternatives_spanish:
  - sillón acolchado
  - asiento mullido
  lexicon: κλίνη / κάθισμα
  rationale: «Asiento acolchado» reproduce la comodidad indicada por el adjetivo sin imponer una forma de mueble más específica de la necesaria.
theological_decisions:
- issue: Mantenimiento de la figura visionaria femenina sin identificación doctrinal adicional
  english_pob_reading: The text describes a female figure across three visions without adding an interpretive identification.
  chosen_spanish_reading: El texto describe a una figura femenina a lo largo de tres visiones sin añadir identificación doctrinal.
  alternative_spanish_readings:
  - La mujer apareció con rasgos simbólicos
  - La Iglesia apareció en forma de mujer
  rationale: La traducción evita anticipar una interpretación no explicitada en este segmento, respetando el nivel descriptivo del pasaje.
  doctrine_reference: Hermas 18:5; contexto inmediato de la visión
- issue: Contraste entre apariencia y rasgos corporales
  english_pob_reading: In the second vision her appearance was younger, but her flesh and her hair were older.
  chosen_spanish_reading: En la segunda visión su apariencia era más joven, pero su carne y su cabello eran más viejos.
  alternative_spanish_readings:
  - su aspecto era más joven, pero su carne y su cabello eran más viejos
  - parecía más joven, pero su carne y su cabello eran más viejos
  rationale: Se preserva la tensión del contraste entre apariencia exterior y rasgos corporales, sin suavizarla ni armonizarla artificialmente.
  doctrine_reference: Lectura descriptiva del símbolo en la visión
translation_notes:
  revision_awareness: 'Corrección aplicada: se eliminó toda nota al pie no anclada; el texto no contiene marcadores de nota porque no se requiere una alternativa textual adicional para este pasaje.'
  spanish_consistency_notes:
  - Se mantuvo «visión» para uniformidad con el contexto inmediato.
  - Se usó «hermosa/hermosura» en registro elevado pero natural.
  - No se introdujo terminología eclesial posterior que no está en el griego de este segmento.
  - El contraste temporal de las tres visiones quedó explícito en español sin añadir información interpretativa.
