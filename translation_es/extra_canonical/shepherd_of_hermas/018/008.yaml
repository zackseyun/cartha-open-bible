  yaml_path: translation/extra_canonical/shepherd_of_hermas/018/008.yaml
  text: Answering him again, I said, “But from you, Lord, we shall learn these things more precisely.”
translation:
  language: es
  text: 'Respondiéndole de nuevo, le dije: «Pero de ti, Señor, aprenderemos estas cosas con mayor precisión».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀποκριθεὶς ... εἶπον
  english_pob_choice: Answering him again, I said
  chosen_spanish: Respondiéndole de nuevo, le dije
  alternatives_spanish:
  - Y respondiendo de nuevo, dije
  - Le respondí de nuevo y dije
  lexicon: responder; decir
  rationale: Conserva la secuencia narrativa del participio aoristo seguido del verbo principal, con un español natural y readable. «Respondiéndole de nuevo» mantiene la relación con el interlocutor implícita en el griego y evita una paráfrasis excesiva.
- source_word: ἀπὸ σοῦ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - por ti
  - de parte de ti
  lexicon: de + pronombre personal
  rationale: El griego expresa procedencia/origen de la enseñanza; «de ti» es la forma más directa y natural en español. «De parte de ti» sería más marcado y menos idiomático; «por ti» desplaza el matiz.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - dueño
  - amo
  lexicon: κύριος
  rationale: Aunque el proyecto prefiere «Yahvé» cuando κύριος funciona como sustituto del nombre divino, aquí el interlocutor se dirige respetuosamente a una figura hablante en el relato, por lo que «Señor» conserva el tratamiento directo y el valor honorífico sin forzar una sustitución del Nombre.
- source_word: μαθησόμεθα
  english_pob_choice: we shall learn
  chosen_spanish: aprenderemos
  alternatives_spanish:
  - llegaremos a aprender
  - sabremos
  lexicon: μανθάνω
  rationale: «Aprenderemos» transmite bien el futuro de adquisición de conocimiento y mantiene la sencillez del enunciado. «Llegaremos a aprender» añade énfasis no presente en el griego.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas verdades
  lexicon: demostrativo neutro plural
  rationale: El plural neutro griego se rinde de forma natural como «estas cosas»; evita interpretar demasiado el contenido como «verdades» o reducirlo a un singular abstracto.
- source_word: ἀκριβέστερον
  english_pob_choice: more precisely
  chosen_spanish: con mayor precisión
  alternatives_spanish:
  - más exactamente
  - de manera más precisa
  lexicon: adverbio comparativo
  rationale: «Con mayor precisión» conserva el valor comparativo y suena natural en español moderno. «Más exactamente» es posible, pero un poco más técnico; «de manera más precisa» resulta más pesado.
theological_decisions:
- issue: Tratamiento de κύριε en una obra no bíblica con un interlocutor identificado como maestro/figura de autoridad
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor mío
  - Maestro
  rationale: No hay base en este segmento para aplicar el reemplazo devocional de YHWH por «Yahvé». El vocativo funciona como título reverencial de diálogo, y «Señor» preserva esa relación sin añadir un matiz de identificación divina que el contexto inmediato no exige.
  doctrine_reference: Respeto vocativo y uso contextual de κύριος
translation_notes:
  revision_awareness: 'El inglés POB lee de manera sobria y directa: una respuesta breve, con futuro de aprendizaje y adverbio de precisión. La versión española mantiene esa economía y no introduce comentarios interpretativos adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Señor» como vocativo de respeto en esta línea, coherente con el contexto narrativo inmediato.
  - Se conserva el tono de diálogo directo y la sencillez sintáctica del inglés POB, pero anclada al griego.
  - No se añaden notas porque el segmento no presenta variantes textuales ni ambigüedades doctrinales relevantes en el auditable disponible.
