    y su gemido suba al Señor, y ustedes queden excluidos junto con sus bienes inútiles fuera de la puerta de la torre.
  revision_rationale: Se ajusta el inicio para reflejar mejor ἁγνισθῆτε y el matiz de σκολιότης, y se corrige la sintaxis de la frase sobre la sobreabundancia de alimentos para que el español comunique con claridad el sentido del original y del audit trail inglés. También se suaviza un calco poco idiomático ('participen solos') sin cambiar el contenido. No se requieren notas nuevas.
