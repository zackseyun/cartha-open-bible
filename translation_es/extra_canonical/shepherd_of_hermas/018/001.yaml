  yaml_path: translation/extra_canonical/shepherd_of_hermas/018/001.yaml
  text: Be made holy from all wickedness and from all crookedness. But you do not want to depart from your wickedness. Now then, listen to me and be at peace among yourselves, and look after one another and support one another; and do not alone partake of God’s creatures in an overflow of abundance, but share also with those who are in want. For some, from their many foods, bring weakness upon the flesh and ruin their flesh; but the flesh of those who do not have food is ruined because they do not have enough nourishment, and their body is destroyed. This lack of moderation then is harmful to you who have and do not share with those who lack. Look to the judgment that is coming. Therefore, you who are well-off, seek out the hungry while the tower is not yet finished; for after the tower has been finished you will want to do good, and you will not have a place. So watch, you who pride yourselves in your wealth, lest those in need should groan, and their groaning go up to the Lord, and you
    be shut out together with your useless goods outside the door of the tower.
translation:
  language: es
  text: Purifíquense de toda maldad y de toda torcedura. Pero ustedes no quieren apartarse de su maldad. Ahora bien, escúchenme y estén en paz entre ustedes; cuídense unos a otros y apóyense unos a otros; y no disfruten ustedes solos de las criaturas de Dios en abundancia desmedida, sino compartan también con los que tienen necesidad. Porque algunos, por sus muchos alimentos, traen debilidad sobre la carne y arruinan su carne; pero la carne de los que no tienen comida se arruina porque no reciben suficiente alimento, y su cuerpo se destruye. Esta falta de moderación, entonces, les hace daño a ustedes que tienen y no comparten con los que carecen. Miren el juicio que viene. Por tanto, ustedes que tienen bienes, busquen a los hambrientos mientras la torre aún no ha sido terminada; porque después que la torre haya sido terminada, querrán hacer el bien, y no tendrán lugar. Así que manténganse alerta, ustedes que se enorgullecen de su riqueza, no sea que los necesitados giman, y su gemido suba
    al Señor, y ustedes queden excluidos junto con sus bienes inútiles fuera de la puerta de la torre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἁγνισθῆτε ἀπὸ πάσης πονηρίας καὶ ἀπὸ πάσης σκολιότητος
  english_pob_choice: Be made holy from all wickedness and from all crookedness.
  chosen_spanish: Sean hechos santos de toda maldad y de toda perversidad.
  alternatives_spanish:
  - Sean purificados de toda maldad y de toda torcedura.
  - Santifíquense de toda maldad y de toda perversidad.
  lexicon: ἁγνίζω / πονηρία / σκολιότης
  rationale: Conserva el imperativo pasivo de ser hechos santos/purificados y refleja la doble idea moral de maldad y desviación torcida con un término español natural y digno; 'perversidad' mantiene el matiz de torcedura ética sin sonar excesivamente técnico.
- source_word: κτίσματα Θεοῦ
  english_pob_choice: God’s creatures
  chosen_spanish: las criaturas de Dios
  alternatives_spanish:
  - las cosas creadas por Dios
  - las creaciones de Dios
  lexicon: κτίσμα
  rationale: '''Criaturas de Dios'' reproduce la amplitud de lo creado que el inglés POB deja abierta; en español es claro y mantiene el vínculo con Dios como fuente de lo que se comparte.'
- source_word: ἐν ἀφθονίᾳ
  english_pob_choice: in an overflow of abundance
  chosen_spanish: en abundancia desmedida
  alternatives_spanish:
  - en exceso de abundancia
  - con abundancia sobrante
  lexicon: ἀφθονία
  rationale: La frase intenta captar el sentido de abundancia que rebasa la medida, evitando una repetición dura de 'abundancia de abundancia' y conservando la crítica moral a la sobreabundancia.
- source_word: σαρκί
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la naturaleza humana
  - el cuerpo
  lexicon: σάρξ
  rationale: Se mantiene 'carne' para preservar la fuerza lexicológica del término griego y la tensión entre vulnerabilidad corporal y moral que el POB conserva.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo físico
  - organismo
  lexicon: σῶμα
  rationale: Aquí el contraste con 'carne' favorece 'cuerpo' como equivalente natural y distinto, sin perder la referencia a la destrucción física por falta de alimento.
- source_word: οἱ ἔχοντες / οἱ ὑστερούμενοι
  english_pob_choice: you who have / those who lack
  chosen_spanish: ustedes que tienen / los que carecen
  alternatives_spanish:
  - ustedes que poseen / los necesitados
  - los que tienen / los que no tienen
  lexicon: ἔχω / ὑστερέω
  rationale: La oposición social y material queda clara con 'tener' y 'carecer', preservando la sencillez exhortativa del pasaje.
- source_word: πύργος
  english_pob_choice: tower
  chosen_spanish: torre
  alternatives_spanish:
  - torre
  - edificio de la torre
  lexicon: πύργος
  rationale: Se conserva 'torre' porque es la imagen central de la visión y coincide con el término técnico narrativo del texto.
theological_decisions:
- issue: Riqueza, compartir y juicio venidero
  english_pob_reading: The passage warns the well-off to share with the needy before the tower is finished and to look to the coming judgment.
  chosen_spanish_reading: El pasaje advierte a los que tienen bienes que compartan con los necesitados antes de que la torre sea terminada y que miren al juicio que viene.
  alternative_spanish_readings:
  - '...antes de que se termine la torre...'
  - '...y consideren el juicio venidero...'
  rationale: Se mantiene la urgencia escatológica y la dimensión ética social del texto sin suavizar la advertencia contra la retención de bienes.
  doctrine_reference: Exhortación moral y escatología en la literatura cristiana primitiva; cf. Santiago 5:1-6; Lucas 12:15-21
- issue: Participación exclusiva en los bienes de Dios
  english_pob_reading: Do not alone partake of God’s creatures... but share also with those who are in want.
  chosen_spanish_reading: No participen solos de las criaturas de Dios... sino compartan también con los que tienen necesidad.
  alternative_spanish_readings:
  - No disfruten solos de lo creado por Dios...
  - No tomen para ustedes solos los dones de Dios...
  rationale: El énfasis está en la comunión de bienes dados por Dios frente al consumo aislado; 'participen' preserva el matiz de tomar parte y compartir.
  doctrine_reference: Comunidad de bienes y caridad fraterna en la iglesia antigua; cf. Hechos 2:44-45; 4:32-35
translation_notes:
  revision_awareness: La versión anterior falló por incluir marcadores de nota no anclados en el texto. Esta corrección elimina por completo las notas al pie para garantizar coherencia entre el texto español y la estructura de metadatos.
  spanish_consistency_notes:
  - Se mantiene 'torre' de forma uniforme para πύργος.
  - Se conserva la distinción 'carne' / 'cuerpo' para σάρξ / σῶμα.
  - Se usa 'los que carecen' para la oposición social de ἔχοντες / ὑστερούμενοι.
  - Se traduce el imperativo exhortativo con registro solemne y legible en español moderno.
