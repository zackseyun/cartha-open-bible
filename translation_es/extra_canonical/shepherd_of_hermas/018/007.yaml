base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/018/007.yaml
  text: 'And answering him I said, “Lord, this only I ask—that concerning the three forms of the aged woman the revelation may become complete.” He answered me and said: “How long will you be senseless? Rather, your double-mindednesses make you senseless, and your heart is not toward the Lord.”'
translation:
  language: es
  text: 'Y respondiéndole, le dije: «Señor, solo esto te pido: que respecto de las tres formas de la anciana la revelación llegue a completarse». Él me respondió y dijo: «¿Hasta cuándo seguirás sin entendimiento? Más bien, tu doble ánimo te vuelve sin entendimiento, y tu corazón no está orientado hacia el Señor».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀποκριθείς / answering him
  english_pob_choice: And answering him I said
  chosen_spanish: Y respondiéndole, le dije
  alternatives_spanish:
  - Y al responderle, le dije
  - Y contestándole, dije
  lexicon: participial narrative formula
  rationale: Conserva la relación inmediata entre la respuesta y el discurso directo en un español natural y solemne, sin añadir contenido ajeno al griego.
- source_word: Κύριε / Lord
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Señor mío
  lexicon: vocative honorífico
  rationale: En vocativo dirigido a Jesús o al mensajero, «Señor» es la forma española más clara y digna; «Señor mío» suena más enfático de lo que exige el contexto.
- source_word: τὰς τρεῖς μορφὰς
  english_pob_choice: the three forms
  chosen_spanish: las tres formas
  alternatives_spanish:
  - las tres figuras
  - las tres apariencias
  lexicon: μορφή
  rationale: «Formas» conserva el sentido descriptivo general sin decidir innecesariamente por «figuras» o «apariencias», que podrían estrechar o desplazar el matiz.
- source_word: πρεσβύτιδος
  english_pob_choice: of the aged woman
  chosen_spanish: de la anciana
  alternatives_spanish:
  - de la mujer anciana
  - de la vieja
  lexicon: edad/femenino
  rationale: «Anciana» reproduce el rasgo de edad con dignidad; evita «vieja», que en español suele sonar despectivo.
- source_word: ἡ ἀποκάλυψις
  english_pob_choice: the revelation
  chosen_spanish: la revelación
  alternatives_spanish:
  - la visión
  - el desvelamiento
  lexicon: revelación
  rationale: Mantiene el término tradicional y exacto para el contenido recibido, sin convertirlo en «visión», que sería más interpretativo aquí.
- source_word: τελεσθῇ
  english_pob_choice: may become complete
  chosen_spanish: llegue a completarse
  alternatives_spanish:
  - se complete
  - quede completa
  lexicon: perfección/culminación
  rationale: Expresa la idea de culminación o consumación de manera idiomática en español, preservando el carácter resultativo del verbo.
- source_word: μέχρι πότε
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo será esto?
  - ¿Por cuánto tiempo?
  lexicon: interrogativo temporal
  rationale: Equivale naturalmente a la reprensión retórica del texto griego, con tono bíblico y comprensible.
- source_word: ἀσυνέτοι / senseless
  english_pob_choice: senseless
  chosen_spanish: sin entendimiento
  alternatives_spanish:
  - insensato
  - falto de juicio
  lexicon: negación cognitiva
  rationale: Opta por una expresión que refleja la falta de comprensión más que mera torpeza moral; así se conserva el valor intelectual del reproche.
- source_word: δίψυχοι / double-mindednesses
  english_pob_choice: your double-mindednesses
  chosen_spanish: tus dobles pensamientos
  alternatives_spanish:
  - tu doble ánimo
  - tus vacilaciones
  lexicon: διψυχία
  rationale: Se evita homogenizar el término con un giro doctrinal posterior; «dobles pensamientos» conserva la duplicidad interior que el plural griego enfatiza y que el English POB también deja visible.
- source_word: ἡ καρδία
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu interior
  - tu mente
  lexicon: corazón
  rationale: Respeta la antropología bíblica del texto, donde «corazón» abarca voluntad, pensamiento y orientación interior.
- source_word: πρὸς τὸν κύριον
  english_pob_choice: toward the Lord
  chosen_spanish: hacia el Señor
  alternatives_spanish:
  - para con el Señor
  - del lado del Señor
  lexicon: orientación relacional
  rationale: «Hacia» mantiene la dirección moral/relacional del original y evita una formulación más abstracta o devocional que el griego no exige.
theological_decisions:
- issue: La repetición del reproche sobre la falta de entendimiento y la duplicidad interior
  english_pob_reading: your double-mindednesses make you senseless, and your heart is not toward the Lord
  chosen_spanish_reading: tus dobles pensamientos te vuelven sin entendimiento, y tu corazón no está hacia el Señor
  alternative_spanish_readings:
  - tu doble ánimo te hace insensato, y tu corazón no está para el Señor
  - tus vacilaciones te dejan sin entendimiento, y tu corazón no se orienta al Señor
  rationale: La versión española conserva la tensión entre diagnóstico intelectual («sin entendimiento») y desorden interior («dobles pensamientos»), sin suavizar la reprensión ni convertirla en mera indecisión emocional.
  doctrine_reference: antropología bíblica; integridad del corazón
- issue: Uso de «Señor» para el vocativo
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Soberano
  rationale: Aquí el vocativo forma parte del discurso directo y la forma española más estable y auditable es «Señor»; no se aplica la convención de «Yahvé» porque no se trata de un tetragrámaton en el texto griego de este pasaje.
  doctrine_reference: nomenclatura divina y vocativo cristológico
translation_notes:
  revision_awareness: Esta redacción corrige el problema de validación anterior evitando cualquier nota al pie no anclada en el texto. No se añaden marcadores de nota porque el verso no requiere alternativa textual visible en la línea principal para esta entrega.
  spanish_consistency_notes:
  - Se mantiene el registro reverente y narrativo, acorde con una sección visionaria.
  - Se conserva la repetición de la segunda persona singular para reflejar la reprensión directa.
  - No se usa «Cristo» ni «Yahvé» porque el pasaje no contiene esos lexemas en la fuente griega presentada.
