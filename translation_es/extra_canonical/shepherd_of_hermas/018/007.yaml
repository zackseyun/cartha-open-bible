review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego y del English POB: la petición sobre las tres formas de la anciana, la idea de que la revelación llegue a su culminación, y la reprensión por falta de entendimiento causada por la duplicidad interior. Sin embargo, dos puntos pueden mejorarse para reflejar mejor el valor del original: «esto solo te pido» suena algo marcado en español, y «tus dobles pensamientos» resulta menos natural y algo opaco para transmitir διψυχίαι/‘double-mindednesses’.'
  spanish_quality_summary: El texto es claro y digno, pero conviene pulirlo para mayor naturalidad y fuerza idiomática. «Solo esto te pido» suena más natural que «esto solo te pido». En la reprensión final, «tu corazón no está orientado hacia el Señor» lee mejor en español que «no está hacia el Señor», conservando la dirección relacional del griego sin sonar calcado.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Señor» es apropiado para Κύριε/κύριον en este contexto no tetragramático. «Anciana», «revelación» y «corazón» están bien. La principal excepción recomendada es ajustar la expresión de δίψυχοι desde «dobles pensamientos» a una formulación más idiomática que conserve la duplicidad interior; «tu doble ánimo» refleja bien el concepto en español eclesial y legible.
  issues:
  - severity: medium
    issue: «esto solo te pido» suena menos natural que el orden español habitual
    rationale: El sentido es correcto, pero «solo esto te pido» suena más fluido y mantiene el énfasis sin rigidez innecesaria.
  - severity: medium
    issue: «tus dobles pensamientos» es poco idiomático para διψυχίαι
    rationale: Aunque intenta conservar el plural del English POB, en español resulta forzado y menos claro. «Tu doble ánimo» comunica mejor la duplicidad interior sin perder el reproche moral-cognitivo.
  - severity: low
    issue: «tu corazón no está hacia el Señor» parece calco semántico
    rationale: «Orientado hacia el Señor» preserva la dirección relacional del original con mejor español.
