base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/018/006.yaml
  text: 'About these things I was very much distressed, wanting to know this revelation. And I see the aged woman in a vision of the night, saying to me: “Every inquiry has need of humility; therefore fast, and you will receive what you ask from the Lord.” So I fasted one day, and on that very night a young man appeared to me and said to me: “Since you are asking for revelations in prayer, watch lest by asking for many things you harm your flesh. These revelations are sufficient for you. Are you able to see revelations more powerful than those you have seen?”'
translation:
  language: es
  text: 'Por estas cosas estaba muy angustiado, queriendo conocer esta revelación. Y veo a la anciana en una visión de la noche, diciéndome: «Toda petición requiere humildad; por tanto, ayuna, y recibirás lo que pidas del Señor». Así que ayuné un día, y esa misma noche se me apareció un joven y me dijo: «Puesto que pides revelaciones en oración, cuídate de que, al pedir muchas cosas, dañes tu carne. Estas revelaciones te bastan. ¿Eres capaz de ver revelaciones más poderosas que las que has visto?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐλυπούμην / distressed
  english_pob_choice: I was very much distressed
  chosen_spanish: estaba muy angustiado
  alternatives_spanish:
  - estaba muy afligido
  - me dolía mucho
  lexicon: λύπη / λυπέω
  rationale: ‘Angustiado’ comunica bien la carga emocional intensa sin sonar excesivamente interpretativo; conserva la fuerza de la inquietud interior que el inglés POB expresa con ‘very much distressed’.
- source_word: ἀποκάλυψις / revelation
  english_pob_choice: revelation(s)
  chosen_spanish: revelación / revelaciones
  alternatives_spanish:
  - apocalipsis
  - manifestación
  lexicon: ἀποκάλυψις
  rationale: ‘Revelación’ es el equivalente natural y preciso en español. Mantengo el singular y plural según el contexto del pasaje, como en el inglés POB.
- source_word: ταπεινοφροσύνη / humility
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - bajeza
  - humillación
  lexicon: ταπεινοφροσύνη
  rationale: ‘Humildad’ es la forma estable y fiel en español para la virtud requerida; ‘humillación’ sería demasiado pasiva y ‘bajeza’ demasiado negativa.
- source_word: νήστευε / fast
  english_pob_choice: fast
  chosen_spanish: ayuna / ayuné
  alternatives_spanish:
  - haz ayuno
  - practica el ayuno
  lexicon: νηστεύω
  rationale: ‘Ayunar’ es la traducción directa y clara del mandato; el imperativo y el pasado se adaptan naturalmente al español narrativo.
- source_word: Κύριος / Lord
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - Yahvé
  lexicon: κύριος
  rationale: Aquí el griego cita el título ‘Lord’ en una formulación cristiana del texto; ‘el Señor’ conserva el registro esperado en español y el valor reverencial del original sin imponer ‘Yahvé’ donde no está explícito el nombre divino.
- source_word: σάρξ / flesh
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  - naturaleza humana
  lexicon: σάρξ
  rationale: ‘Carne’ preserva la tensión lexical y teológica del término, evitando suavizarlo a ‘cuerpo’ o ‘naturaleza humana’.
- source_word: ἰσχυρότερας / more powerful
  english_pob_choice: more powerful
  chosen_spanish: más poderosas
  alternatives_spanish:
  - más fuertes
  - más vigorosas
  lexicon: ἰσχυρός
  rationale: ‘Más poderosas’ expresa con naturalidad la comparación de fuerza/autoridad en visiones, coherente con el inglés POB.
theological_decisions:
- issue: Discernimiento espiritual frente a curiosidad excesiva en busca de revelaciones
  english_pob_reading: Every inquiry has need of humility; therefore fast, and you will receive what you ask from the Lord.
  chosen_spanish_reading: Toda pregunta necesita humildad; por tanto, ayuna, y recibirás lo que pidas del Señor.
  alternative_spanish_readings:
  - Toda investigación necesita humildad
  - Toda petición necesita humildad
  rationale: La frase resume la instrucción moral del texto sin añadir doctrina extra; ‘pregunta’ mantiene el sentido de inquiry/asking en forma breve y publicable.
  doctrine_reference: 1 Pedro 5:5; Santiago 1:5
- issue: Cautela contra dañar la carne por exceso de solicitudes en oración
  english_pob_reading: watch lest by asking for many things you harm your flesh
  chosen_spanish_reading: vigila, no sea que, al pedir muchas cosas, dañes tu carne
  alternative_spanish_readings:
  - estate alerta para no dañar tu carne
  - mira que no perjudiques tu carne
  rationale: ‘Vigila’ conserva el tono admonitorio; ‘carne’ mantiene la fuerza de σάρξ y su posible carga ascética/antropológica sin explicarla en exceso.
  doctrine_reference: Romanos 7:18; Gálatas 5:17
- issue: Suficiencia de las revelaciones ya recibidas
  english_pob_reading: These revelations are sufficient for you.
  chosen_spanish_reading: Estas revelaciones te bastan.
  alternative_spanish_readings:
  - Estas revelaciones son suficientes para ti
  - Te son suficientes estas revelaciones
  rationale: ‘Te bastan’ es idiomático y conserva la suficiencia afirmada por el texto con concisión.
  doctrine_reference: 2 Corintios 12:9
translation_notes:
  revision_awareness: La traducción inglesa de referencia presenta un acuerdo moderado con el texto fuente (0.86) y no reporta notas léxicas o teológicas previas; se ha mantenido la estructura narrativa y las admoniciones clave sin introducir glosas adicionales.
  spanish_consistency_notes:
  - Se conserva el estilo narrativo directo y las comillas angulares para discurso citado.
  - Se mantiene ‘carne’ para σάρξ de forma consistente en todo el pasaje.
  - No se usa ‘Cristo’ ni ‘SEÑOR’ como convención de sustitución; el título traducido ‘el Señor’ aparece solo donde el inglés auditado dice ‘the Lord’.
  - La alternancia ‘revelación/revelaciones’ sigue el número del original y del inglés POB para evitar uniformar indebidamente el término.
