base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/018/003.yaml
  text: X. When she had ceased speaking with me, the six young men who were building came and carried her to the tower, and four others lifted the cushioned seat and carried it also to the tower. I did not see their faces, because they were turned away.
translation:
  language: es
  text: X. Cuando dejó de hablar conmigo, los seis jóvenes que estaban edificando vinieron y la llevaron a la torre; y otros cuatro levantaron el asiento acolchado y también lo llevaron a la torre. No vi sus rostros, porque estaban vueltos hacia otro lado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ ἓξ νεανίσκοι οἱ οἰκοδομοῦντες
  english_pob_choice: the six young men who were building
  chosen_spanish: los seis jóvenes que estaban edificando
  alternatives_spanish:
  - los seis jóvenes que construían
  - los seis muchachos que estaban construyendo
  lexicon: οἰκοδομέω
  rationale: ‘Edificar’ conserva el matiz de construcción formal del contexto y evita un coloquialismo excesivamente moderno; el participio progresivo español expresa bien la acción en curso del inglés POB.
- source_word: ἤνεγκαν αὐτὴν εἰς τὸν πύργον
  english_pob_choice: carried her to the tower
  chosen_spanish: la llevaron a la torre
  alternatives_spanish:
  - la condujeron a la torre
  - la llevaron hasta la torre
  lexicon: φέρω
  rationale: ‘Llevar’ comunica el traslado físico sin añadir matices de dirección o solemnidad que el texto no exige.
- source_word: τέσσαρες ἄλλοι ἤραν τὸ ἔπιπλον
  english_pob_choice: four others lifted the cushioned seat
  chosen_spanish: otros cuatro levantaron el asiento acolchado
  alternatives_spanish:
  - cuatro más alzaron el asiento acolchado
  - otros cuatro levantaron el sillón acolchado
  lexicon: αἴρω / ἔπιπλον
  rationale: ‘Asiento acolchado’ mantiene la descripción material sin imponer una identificación más específica que el griego no asegura; ‘levantaron’ refleja el acto de alzar para moverlo.
- source_word: καὶ αὐτὸ ἤνεγκαν εἰς τὸν πύργον
  english_pob_choice: and carried it also to the tower
  chosen_spanish: y también lo llevaron a la torre
  alternatives_spanish:
  - y también lo transportaron a la torre
  - y lo llevaron asimismo a la torre
  lexicon: φέρω
  rationale: Se conserva la repetición simple del movimiento al mismo destino, en paralelo con la primera cláusula.
- source_word: οὐκ εἶδον αὐτῶν τὰ πρόσωπα
  english_pob_choice: I did not see their faces
  chosen_spanish: No vi sus rostros
  alternatives_spanish:
  - No vi sus caras
  - No pude ver sus rostros
  lexicon: πρόσωπον
  rationale: ‘Rostros’ es una opción digna y natural en registro bíblico en español; ‘caras’ sería posible, pero menos elevado.
- source_word: ἀπεστραμμένα γὰρ ἦσαν
  english_pob_choice: because they were turned away
  chosen_spanish: porque estaban vueltos hacia otro lado
  alternatives_spanish:
  - porque estaban de espaldas
  - porque estaban girados hacia otro lado
  lexicon: στρέφω
  rationale: ‘Vueltos hacia otro lado’ evita precisar un giro corporal total que el griego no obliga y refleja bien la razón de la invisibilidad de los rostros.
translation_notes:
  revision_awareness: The English POB text is concise and closely tracks the Greek narrative sequence. No applied revisions or footnotes were present in the audit context, and the cross-check indicates high agreement with only minor issues, so the Spanish draft preserves the same straightforward narrative flow without adding interpretive embellishment.
  spanish_consistency_notes:
  - Mantengo la secuencia narrativa con dos cláusulas unidas por punto y coma, siguiendo el paralelismo del original y del inglés POB.
  - Uso el pasado simple en español para la acción narrativa principal, con imperfecto solo donde el participio griego expresa acción en curso ('estaban edificando').
  - Conservo el tono sobrio y descriptivo, sin ampliar la escena ni explicitar personajes o gestos no mencionados en la fuente.
