  yaml_path: translation/extra_canonical/shepherd_of_hermas/018/004.yaml
  text: And as she was going, I asked her to reveal to me about the three forms in which she had appeared to me. She answered me and said, “About these, you must ask another, so that it may be revealed to you.”
translation:
  language: es
  text: 'Y mientras ella se iba, le pedí que me revelara acerca de las tres formas en que se me había aparecido. Ella me respondió y dijo: «Sobre estas cosas, debes preguntar a otro, para que te sea revelado».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν τρισὶν εἴδεσιν
  english_pob_choice: the three forms
  chosen_spanish: las tres formas
  alternatives_spanish:
  - los tres aspectos
  - las tres figuras
  lexicon: εἶδος
  rationale: «Formas» conserva el sentido visible/manifestado del griego y sigue de cerca la opción inglesa documentada; «aspectos» suavizaría el término, pero podría debilitar la idea de distintas apariciones concretas.
- source_word: ἐφάνης μοι
  english_pob_choice: she had appeared to me
  chosen_spanish: se me había aparecido
  alternatives_spanish:
  - se me había mostrado
  - había aparecido ante mí
  lexicon: φαίνομαι
  rationale: «Se me había aparecido» expresa con naturalidad la aparición personal y mantiene el valor pasivo/medio del verbo sin convertirlo en una simple observación visual.
- source_word: ἀνακάλυψόν μοι
  english_pob_choice: reveal to me
  chosen_spanish: revelara acerca de
  alternatives_spanish:
  - me descubriera
  - me explicara
  lexicon: ἀποκαλύπτω
  rationale: La construcción «le pregunté que me revelara» reproduce el ruego de dar a conocer algo oculto. Añadir «acerca de» aclara el objeto de la revelación en español, sin exceder el contenido del griego.
- source_word: πρὸς ταῦτα
  english_pob_choice: About these
  chosen_spanish: Sobre estas cosas
  alternatives_spanish:
  - Respecto de estas cosas
  - En cuanto a esto
  lexicon: πρός
  rationale: «Sobre estas cosas» es idiomático y fiel a la referencia temática; conserva el carácter de respuesta limitada de la mujer.
- source_word: ἄλλον
  english_pob_choice: another
  chosen_spanish: a otro
  alternatives_spanish:
  - a otra persona
  - a alguien más
  lexicon: ἄλλος
  rationale: «A otro» mantiene la indeterminación del griego y el tono de remisión a otra autoridad sin identificarla.
- source_word: ἵνα σοι ἀποκαλυφθῇ
  english_pob_choice: so that it may be revealed to you
  chosen_spanish: para que te sea revelado
  alternatives_spanish:
  - a fin de que se te revele
  - para que eso te sea revelado
  lexicon: ἵνα + pasivo
  rationale: La pasiva «te sea revelado» conserva el matiz de que la revelación depende de otro agente, tal como en el griego y en la traducción inglesa auditada.
theological_decisions:
- issue: Revelación diferida a otra autoridad
  english_pob_reading: About these, you must ask another, so that it may be revealed to you.
  chosen_spanish_reading: Sobre estas cosas, debes preguntárselo a otro, para que te sea revelado.
  alternative_spanish_readings:
  - Sobre estas cosas, debes preguntar a otro, para que se te revele.
  - Sobre estas cosas, tendrás que consultarlo con otro, para que te sea revelado.
  rationale: La respuesta no resuelve el contenido por sí misma, sino que remite a otra fuente de revelación. La formulación elegida conserva esa dependencia y evita convertirla en una simple negativa o evasiva.
  doctrine_reference: Autoridad revelatoria y mediación de la instrucción en la literatura visionaria temprana
translation_notes:
  revision_awareness: No applied revisions were listed; the draft follows the high-agreement English POB reading and the normalized Greek source with no noted textual variants affecting the verse.
  spanish_consistency_notes:
  - Se mantiene «formas» para εἴδη en consonancia con el inglés POB y para distinguirlo de una mera «aparición» singular.
  - Se usa «revelado» / «revelar» de manera consistente para ἀποκαλύπτω, evitando alternar con «mostrar» sin necesidad.
  - El tono es sobrio y literario, adecuado para un texto visionario antiguo, sin arcaísmos innecesarios.
