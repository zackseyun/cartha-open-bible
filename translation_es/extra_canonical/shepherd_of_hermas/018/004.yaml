review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB en inglés: Hermas pregunta por las tres manifestaciones/apariciones, y ella lo remite a otra fuente para que se le revele. Sin embargo, hay un desajuste sintáctico importante en «le pregunté que me revelara», que en español natural y preciso debería ser «le pedí que me revelara» o «le pregunté acerca de...». También «debes preguntárselo a otro» introduce un clítico de objeto que no está expresado en el original y suena algo forzado; «debes preguntar a otro» o «debes preguntarle a otro» preserva mejor la indeterminación.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero contiene dos giros poco idiomáticos o innecesariamente pesados: «le pregunté que me revelara» y «debes preguntárselo a otro». Una reparación menor mejora mucho la naturalidad sin alterar el contenido. El resto de la fraseología («las tres formas», «se me había aparecido», «para que te sea revelado») es legible y fiel.'
  glossary_alignment: No hay términos del glosario principal particularmente implicados aquí. «Las tres formas» corresponde bien a ἐν τρισὶν εἴδεσιν y al POB inglés «the three forms». «Se me había aparecido» refleja adecuadamente ἐφάνης μοι. «Para que te sea revelado» preserva bien el pasivo de ἀποκαλυφθῇ.
  issues:
  - severity: medium
    issue: «le pregunté que me revelara» es una construcción poco natural en español
    rationale: En español estándar, «preguntar que» no funciona bien en este contexto; el griego/inglés expresan una solicitud de revelación, mejor captada por «le pedí que me revelara».
  - severity: low
    issue: «debes preguntárselo a otro» añade un objeto pronominal no necesario
    rationale: El original solo dice que debe preguntar a otro; el «lo» implícito en «preguntárselo» puede sugerir un contenido más explicitado de lo que el griego indica y además suena más pesado.
  revised_spanish_text: 'Y mientras ella se iba, le pedí que me revelara acerca de las tres formas en que se me había aparecido. Ella me respondió y dijo: «Sobre estas cosas, debes preguntar a otro, para que te sea revelado».'
  revision_rationale: 'Se corrigen dos giros para lograr un español más natural y fiel al valor del original: «le pedí que me revelara» expresa correctamente la solicitud, y «debes preguntar a otro» evita un clítico añadido y mantiene la indeterminación del griego.'
