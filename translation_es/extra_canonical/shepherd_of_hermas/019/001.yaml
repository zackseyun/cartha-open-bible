  text: “Listen,” he says, “about the three forms you are inquiring about. In the first vision, why did she appear to you as an old woman and seated on a chair? Because your spirit is old and already withered and has no strength because of your weaknesses and your double‑mindedness. For just as the aged, no longer having hope of being renewed, expect nothing else but their sleep, so also you, having been weakened by the affairs of life, have handed yourselves over to negligence, and you did not cast your anxieties upon the Lord; instead your mind has been shattered, and you have grown old in your sorrows.”
translation:
  language: es
  text: «Escucha», dice, «acerca de las tres formas por las que preguntas. En la primera visión, ¿por qué se te apareció anciana y sentada en un asiento? Porque tu espíritu es viejo y ya está marchito, y no tiene fuerza a causa de tus debilidades y de tu doble ánimo. Pues así como los ancianos, al no tener ya esperanza de ser renovados, no esperan otra cosa sino su sueño, así también tú, debilitado por los asuntos de la vida, te has entregado al descuido, y no echaste tus preocupaciones sobre el Señor; antes bien, tu mente ha sido quebrantada, y has envejecido en tus tristezas.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γῆρας / γέρων imagery
  english_pob_choice: old woman / aged
  chosen_spanish: mujer anciana / ancianos
  alternatives_spanish:
  - vieja / viejos
  - de edad avanzada / personas mayores
  lexicon: imaginería de vejez
  rationale: Conservo la imagen de envejecimiento literal para mantener el paralelismo retórico entre la visión y la explicación; en español, «anciana/ancianos» comunica dignidad y la fuerza simbólica del pasaje mejor que un calco más tosco.
- source_word: δίψυχος / double-mindedness
  english_pob_choice: double-mindedness
  chosen_spanish: doble ánimo
  alternatives_spanish:
  - doblez de ánimo
  - inconstancia
  - ambivalencia
  lexicon: doble ánimo
  rationale: «Doble ánimo» es la forma más natural en español eclesial y conserva la idea de división interior sin suavizar el diagnóstico moral.
- source_word: ἀμέριμνα / cares, anxieties
  english_pob_choice: anxieties
  chosen_spanish: ansiedades
  alternatives_spanish:
  - preocupaciones
  - cargas
  - inquietudes
  lexicon: preocupación / ansiedad
  rationale: «Ansiedades» sigue de cerca la carga afectiva del pasaje y permite el eco bíblico de echar las preocupaciones sobre el Señor, sin perder intensidad.
- source_word: ἐπιρρίψαντες ... τῷ κυρίῳ
  english_pob_choice: cast your anxieties upon the Lord
  chosen_spanish: echaron sus ansiedades sobre el Señor
  alternatives_spanish:
  - pusieron sus ansiedades en el Señor
  - depositaron sus ansiedades en el Señor
  lexicon: expresión idiomática bíblica
  rationale: «Echar sobre» conserva la imagen concreta del original y la tradición bíblica del gesto de poner la carga en Dios; «sobre el Señor» se mantiene como referencia directa sin sustituirla por una paráfrasis.
- source_word: νοῦς / mind
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - pensamiento
  - mente interior
  lexicon: νοῦς
  rationale: «Mente» es transparente y fiel al campo semántico de νοῦς en este contexto; evita una solemnización excesiva y encaja con la imagen de una facultad interior quebrantada.
theological_decisions:
- issue: Relación entre la vejez de la visión y el estado espiritual del destinatario
  english_pob_reading: Because your spirit is old and already withered...
  chosen_spanish_reading: Porque tu espíritu es viejo y ya está marchito...
  alternative_spanish_readings:
  - Porque tu espíritu está envejecido y marchito
  - Porque tu espíritu es antiguo y se ha secado
  rationale: Mantengo la conexión directa entre la edad de la figura y el estado del espíritu, porque el texto explica la visión con una correspondencia moral y espiritual, no solo psicológica.
  doctrine_reference: Lectura alegórica-moral del Shepherd of Hermas
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior eliminando cualquier nota no anclada: no se incluyen marcadores de nota en el texto, por lo que no hay pies de nota sin soporte textual.'
  spanish_consistency_notes:
  - Se conserva el tratamiento en segunda persona plural cuando el texto pasa de la explicación singular a la amonestación general («ustedes»).
  - Se mantiene «Señor» para κύριος en la fórmula bíblica habitual del pasaje, sin intentar reconstruir aquí un nombre divino explícito que el texto griego no presenta de forma inequívoca en esta cláusula.
  - La puntuación reproduce la alternancia de discurso directo para facilitar lectura pública.
