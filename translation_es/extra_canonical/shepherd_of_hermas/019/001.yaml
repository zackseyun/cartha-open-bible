revisions:
- from: «Escucha», dice, «acerca de las tres formas sobre las que preguntas. En la primera visión, ¿por qué se te apareció como una mujer anciana y sentada en una silla? Porque tu espíritu es viejo y ya está marchito, y no tiene fuerzas a causa de tus debilidades y de tu doble ánimo. Pues así como los ancianos, al no tener ya esperanza de ser renovados, no esperan otra cosa sino su sueño, así también ustedes, debilitados por los asuntos de la vida, se han entregado al descuido, y no echaron sus ansiedades sobre el Señor; antes bien, su mente ha sido destrozada, y han envejecido en sus tristezas.»
  to: «Escucha», dice, «acerca de las tres formas por las que preguntas. En la primera visión, ¿por qué se te apareció anciana y sentada en un asiento? Porque tu espíritu es viejo y ya está marchito, y no tiene fuerza a causa de tus debilidades y de tu doble ánimo. Pues así como los ancianos, al no tener ya esperanza de ser renovados, no esperan otra cosa sino su sueño, así también tú, debilitado por los asuntos de la vida, te has entregado al descuido, y no echaste tus preocupaciones sobre el Señor; antes bien, tu mente ha sido quebrantada, y has envejecido en tus tristezas.»
