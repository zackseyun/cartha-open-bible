review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego reflejado en la auditoría inglesa: la explicación de las tres formas, la primera visión con la mujer anciana sentada, la vejez y marchitez del espíritu, la falta de fuerza por debilidades y doble ánimo, la comparación con los ancianos que esperan solo el sueño, y la negligencia resultante de los afanes de la vida. Sin embargo, hay algunos puntos de fidelidad léxica y naturalidad que conviene ajustar: ''se te apareció como una mujer anciana'' suena menos directo que ''se te apareció anciana''; ''silla'' probablemente debilita la imagen de ''chair'' en registro solemne español, donde ''asiento'' o ''silla'' ambos son posibles, pero ''sentada en un asiento'' evita una resonancia demasiado doméstica; y ''destrozada'' para la mente resulta algo más violento/coloquial que el tono del pasaje. También conviene unificar el tratamiento pronominal, ya que el texto pasa de ''tu'' a ''ustedes'' por el plural implícito
    del inglés.'
  spanish_quality_summary: El español es generalmente claro y legible, con buen tono eclesial moderno. 'Mujer anciana', 'doble ánimo' y 'marchito' están bien elegidos. No obstante, hay mezcla de segunda persona singular y plural dentro del mismo discurso ('tu espíritu' ... 'ustedes, debilitados'), lo que afecta la fluidez. 'Ansiedades' es comprensible, pero 'preocupaciones' suele sonar más natural en español para esta expresión bíblica; aun así, no es un error grave. 'Su sueño' puede mantenerse como eco literal, aunque en español puede sonar ambiguo; el contexto lo sostiene. 'Antes bien' funciona bien.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. 'Señor' refleja κύριος en esta obra griega no canónica y no exige sustituirse por 'Yahvé'. 'Espíritu' en minúscula está bien por contexto. 'Doble ánimo' concuerda con la racionalidad léxica documentada. La revisión propuesta preserva estas decisiones, mejorando coherencia pronominal y naturalidad semántica.
  issues:
  - severity: medium
    issue: Mezcla de tratamiento singular y plural
    rationale: El borrador pasa de 'tu espíritu' y 'se te apareció' a 'ustedes, debilitados' y luego 'su mente', lo que entorpece la cohesión del discurso en español. Conviene mantener singular de forma consistente, ya que el marco discursivo inmediato está dirigido a un interlocutor singular.
  - severity: low
    issue: '''se te apareció como una mujer anciana'' suena algo forzado'
    rationale: En español, con verbos de apariencia en este contexto es más natural 'se te apareció anciana' o 'se te apareció como anciana' que insertar 'una mujer' cuando ya el referente es femenino.
  - severity: low
    issue: '''destrozada'' para la mente es demasiado brusco'
    rationale: Aunque transmite ruptura, 'quebrantada' o 'hecha pedazos' encajan mejor con el tono moral y espiritual del pasaje sin sonar tan coloquiales o físicos.
  revised_spanish_text: «Escucha», dice, «acerca de las tres formas por las que preguntas. En la primera visión, ¿por qué se te apareció anciana y sentada en un asiento? Porque tu espíritu es viejo y ya está marchito, y no tiene fuerza a causa de tus debilidades y de tu doble ánimo. Pues así como los ancianos, al no tener ya esperanza de ser renovados, no esperan otra cosa sino su sueño, así también tú, debilitado por los asuntos de la vida, te has entregado al descuido, y no echaste tus preocupaciones sobre el Señor; antes bien, tu mente ha sido quebrantada, y has envejecido en tus tristezas.»
  revision_rationale: 'La revisión hace reparaciones menores: mantiene el sentido del original y las decisiones léxicas principales, pero corrige la inconsistencia entre singular y plural, mejora la naturalidad de la descripción de la aparición, y suaviza ''destrozada'' a ''quebrantada'' para un tono más fiel y digno. También cambia ''fuerzas'' a ''fuerza'' y ''ansiedades'' a ''preocupaciones'' para mayor idiomaticidad en español sin alterar el contenido.'
