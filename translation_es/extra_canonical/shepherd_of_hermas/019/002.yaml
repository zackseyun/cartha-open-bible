  yaml_path: translation/extra_canonical/shepherd_of_hermas/019/002.yaml
  text: “Why then was she seated in a chair? I wanted to know, sir.” “Because every weak person sits in a chair because of his weakness, in order that the weakness of his body may be supported. You have the pattern of the first vision.”
translation:
  language: es
  text: «¿Entonces por qué estaba sentada en una silla? Quería saberlo, señor». «Porque toda persona débil se sienta en una silla a causa de su debilidad, para que su cuerpo reciba apoyo en su debilidad. Tienes el modelo de la primera visión».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καθέζομαι / ἐκάθητο (to sit, was seated)
  english_pob_choice: was seated
  chosen_spanish: estaba sentada
  alternatives_spanish:
  - se sentaba
  - yacía sentada
  lexicon: N/A
  rationale: El griego describe una postura resultante y el inglés POB la expresa como estado ('was seated'). En español, 'estaba sentada' reproduce bien esa condición estática sin forzar un verbo más técnico o litúrgico.
- source_word: θρόνος/καθέδρα (chair, seat)
  english_pob_choice: chair
  chosen_spanish: silla
  alternatives_spanish:
  - asiento
  - sitial
  lexicon: N/A
  rationale: '''Silla'' es el equivalente natural y claro en español para el objeto de apoyo físico del contexto. ''Asiento'' sería más general y ''sitial'' demasiado elevado para el pasaje.'
- source_word: ἀσθενής (weak person)
  english_pob_choice: weak person
  chosen_spanish: persona débil
  alternatives_spanish:
  - débil
  - enfermo
  lexicon: N/A
  rationale: La debilidad aquí es física y contextual, no necesariamente moral. 'Persona débil' preserva la fuerza descriptiva del griego y del inglés POB sin introducir una patologización no atestiguada.
- source_word: ἀσθένεια (weakness)
  english_pob_choice: weakness
  chosen_spanish: debilidad
  alternatives_spanish:
  - flaqueza
  - enfermedad
  lexicon: N/A
  rationale: '''Debilidad'' mantiene el sentido general de fragilidad física requerido por el argumento. ''Flaqueza'' sería posible pero algo más literaria; ''enfermedad'' estrecharía indebidamente el sentido.'
- source_word: ὑποστηρίζω / ἀναπαύω (be supported, upheld)
  english_pob_choice: may be supported
  chosen_spanish: pueda ser sostenida
  alternatives_spanish:
  - pueda ser apoyada
  - pueda sostenerse
  lexicon: N/A
  rationale: El pasivo en español ('ser sostenida') conserva la idea de soporte externo del cuerpo débil. 'Apoyada' sería comprensible, pero 'sostenida' refleja mejor la función de la silla.
- source_word: τύπος (pattern, type)
  english_pob_choice: pattern
  chosen_spanish: modelo
  alternatives_spanish:
  - patrón
  - figura
  lexicon: N/A
  rationale: '''Modelo'' comunica la idea de ejemplo visible o figura de referencia en español moderno. ''Patrón'' puede sonar demasiado abstracto o técnico, y ''figura'' podría sugerir tipología sin claridad inmediata.'
- source_word: πρώτη ὅρασις (first vision)
  english_pob_choice: first vision
  chosen_spanish: primera visión
  alternatives_spanish:
  - primer visión
  - primera aparición
  lexicon: N/A
  rationale: Se conserva la referencia interna a la 'primera visión' como título/segmento del libro, siguiendo de cerca el inglés POB y el contexto narrativo.
theological_decisions:
- issue: Sentido de la 'debilidad' corporal como apoyo simbólico
  english_pob_reading: Because every weak person sits in a chair because of his weakness, in order that the weakness of his body may be supported.
  chosen_spanish_reading: Porque toda persona débil se sienta en una silla a causa de su debilidad, para que la debilidad de su cuerpo pueda ser sostenida.
  alternative_spanish_readings:
  - Porque toda persona débil se sienta en una silla por su debilidad, para que se sostenga la debilidad de su cuerpo.
  - Porque toda persona débil se sienta en una silla debido a su debilidad, a fin de que su cuerpo reciba apoyo.
  rationale: La frase mantiene la lógica explicativa del pasaje sin convertirla en una alegoría más explícita de lo que el texto permite. 'Debilidad de su cuerpo' preserva la concreción física del argumento.
  doctrine_reference: Ninguna doctrina específica; sentido literal-narrativo del texto apócrifo.
- issue: Valor de 'pattern/model' como referencia interna a la visión previa
  english_pob_reading: You have the pattern of the first vision.
  chosen_spanish_reading: Tienes el modelo de la primera visión.
  alternative_spanish_readings:
  - Tienes el patrón de la primera visión.
  - Tienes la figura de la primera visión.
  rationale: La frase indica que el interlocutor ya posee una imagen-guía obtenida en la visión anterior. 'Modelo' conserva esa función referencial sin introducir terminología técnica innecesaria.
  doctrine_reference: Ninguna doctrina específica; intertextualidad interna de la obra.
translation_notes:
  revision_awareness: La traducción sigue de cerca el texto griego normalizado y concuerda en sustancia con el inglés POB, sin evidencias de revisiones textuales que requieran nota crítica adicional. No se detectan variantes relevantes en el contexto proporcionado.
  spanish_consistency_notes:
  - Se mantiene 'silla' de forma consistente para el mueble de apoyo físico.
  - Se mantiene 'debilidad' para weak/weakness con el fin de evitar desplazamientos semánticos.
  - El registro es sobrio y legible, con puntuación española estándar y comillas angulares para el discurso directo.
