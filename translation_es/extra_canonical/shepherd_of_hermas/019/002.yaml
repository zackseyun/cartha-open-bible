review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego según la auditoría inglesa: pregunta sobre por qué ella estaba sentada en una silla, explicación basada en la debilidad corporal, y referencia a la primera visión como patrón/modelo. No hay problemas teológicos ni terminológicos mayores. Sin embargo, una formulación española clave suena poco natural y ligeramente imprecisa: ''para que la debilidad de su cuerpo pueda ser sostenida'' personifica la debilidad en vez de expresar con claridad que el cuerpo débil recibe apoyo.'
  spanish_quality_summary: El español es claro y mayormente fiel, pero necesita un ajuste de naturalidad y precisión semántica en la cláusula final de la explicación. 'Reciba apoyo' o 'sea apoyado' aplicado al cuerpo comunica mejor el sentido en español moderno y evita una construcción pasiva torpe. También conviene cerrar la cita final con puntuación española consistente dentro de las comillas angulares.
  glossary_alignment: No hay conflictos con el glosario base del proyecto. Los términos relevantes ('seated' -> 'estaba sentada', 'chair' -> 'silla', 'weak person' -> 'persona débil', 'weakness' -> 'debilidad', 'first vision' -> 'primera visión') están bien encaminados. 'Pattern' como 'modelo' es aceptable aquí.
  issues:
  - severity: medium
    issue: 'Construcción poco natural: ''para que la debilidad de su cuerpo pueda ser sostenida'''
    rationale: En español, se entiende mejor que la silla apoya el cuerpo débil, no que 'sostiene la debilidad'. La redacción actual es gramaticalmente posible pero semánticamente torpe y menos fiel al sentido físico de apoyo corporal.
  - severity: low
    issue: Puntuación de cierre de cita mejorable
    rationale: Es preferible mantener la puntuación final dentro de las comillas de cierre en ambas intervenciones para una presentación española consistente del diálogo.
  revised_spanish_text: «¿Entonces por qué estaba sentada en una silla? Quería saberlo, señor». «Porque toda persona débil se sienta en una silla a causa de su debilidad, para que su cuerpo reciba apoyo en su debilidad. Tienes el modelo de la primera visión».
  revision_rationale: 'Se reemplaza la cláusula final por una formulación idiomática en español que expresa con claridad el sentido físico del original: la silla sirve de apoyo al cuerpo debilitado. Se conserva el resto del contenido, incluyendo ''modelo'' para τύπος y la referencia a la ''primera visión''.'
