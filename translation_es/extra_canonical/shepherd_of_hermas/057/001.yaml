revisions:
- from: 'Le dije: «Señor, explícamelo más». Él dice: «¿Qué estás buscando?». Le dije: «Entonces, Señor, ¿los que se entregan a sí mismos y son engañados son atormentados durante el mismo tiempo que dura el engaño? Porque el tiempo del engaño es una hora, pero la hora del tormento tiene la fuerza de treinta días. Por tanto, si alguien se entrega a sí mismo por un día y es engañado, y es atormentado por un día, el día de tormento equivale a un año entero. Así que, por tantos días como una persona se entregue a sí misma, por tantos años será atormentada». «Ves, entonces —dice—, que el tiempo de la entrega y del engaño es muy corto, pero el tiempo del castigo y del tormento es largo».'
  to: 'Le dije: «Señor, explícame esto más». Él dice: «¿Qué estás buscando?». Le dije: «Entonces, Señor, ¿los que se complacen y son engañados son atormentados durante el mismo tiempo que dura el engaño? Porque el tiempo del engaño es una hora, pero la hora del tormento tiene la fuerza de treinta días. Por tanto, si alguien se complace por un día y es engañado, y es atormentado por un día, el día de tormento equivale a un año entero. Así que, por tantos días como una persona se complace, por tantos años será atormentada». «Ves, entonces —dice—, que el tiempo de la complacencia y del engaño es muy corto, pero el tiempo del castigo y del tormento es largo».'
  rationale: Se revisa únicamente para mejorar la fidelidad semántica y la naturalidad del español. 'Se complacen' comunica mejor la idea de indulgencia/autocomplacencia de κατατρυφάω sin especificar indebidamente 'placeres' ni introducir un calco torpe. También se ajusta la primera frase a un español más natural.
