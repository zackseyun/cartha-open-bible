  text: I say to him, "Lord, explain this to me further." He says, "What are you seeking?" I say, "Then, Lord, are those who indulge themselves and are deceived tormented for the same length of time as the time of the deception? For the time of deception is one hour, but the hour of torment has the force of thirty days. Therefore, if someone indulges himself for one day and is deceived, and is tormented for one day, the day of torment amounts to a whole year. So then, for as many days as a person indulges himself, for that many years he is tormented." "You see then," he says, "that the time of indulgence and deception is very short, but the time of punishment and torment is long."
translation:
  language: es
  text: 'Le dije: «Señor, explícame esto más». Él dice: «¿Qué estás buscando?». Le dije: «Entonces, Señor, ¿los que se complacen y son engañados son atormentados durante el mismo tiempo que dura el engaño? Porque el tiempo del engaño es una hora, pero la hora del tormento tiene la fuerza de treinta días. Por tanto, si alguien se complace por un día y es engañado, y es atormentado por un día, el día de tormento equivale a un año entero. Así que, por tantos días como una persona se complace, por tantos años será atormentada». «Ves, entonces —dice—, que el tiempo de la complacencia y del engaño es muy corto, pero el tiempo del castigo y del tormento es largo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κύριε / Lord
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - dueño
  - amo
  lexicon: κύριος
  rationale: Aquí funciona como tratamiento reverencial en el diálogo, no como título divino explícito en la escena; en español 'Señor' comunica con naturalidad la deferencia del hablante y conserva la relación dialogal del texto.
- source_word: ἀπατάω / deceived
  english_pob_choice: deceived
  chosen_spanish: engañados / engañado
  alternatives_spanish:
  - seducidos
  - extraviados
  lexicon: ἀπατάω
  rationale: '''Engañar'' reproduce con precisión el sentido de ser inducido al error. ''Seducir'' añadiría connotaciones no exigidas por el pasaje, y ''extraviarse'' desplazaria el foco del engaño recibido al desvío propio.'
- source_word: κατατρυφάω / indulge themselves
  english_pob_choice: indulge themselves
  chosen_spanish: se entregan a sí mismos
  alternatives_spanish:
  - se entregan a los placeres
  - se deleitan
  lexicon: κατατρυφάω
  rationale: La expresión apunta a abandonarse al propio placer o autocomplacencia; 'se entregan a sí mismos' mantiene la reflexividad del griego sin volver demasiado interpretativa la frase. Se conserva la tensión moral sin especificar más de lo que el contexto exige.
- source_word: βασανίζω / tormented
  english_pob_choice: tormented
  chosen_spanish: atormentados / atormentada / atormentadas
  alternatives_spanish:
  - torturados
  - castigados
  lexicon: βασανίζω
  rationale: '''Atormentar'' sigue de cerca el campo semántico de sufrimiento intenso y mantiene la repetición estructural del pasaje. ''Torturar'' sería más físico y ''castigar'' demasiado general.'
- source_word: πληγὴ / punishment
  english_pob_choice: punishment
  chosen_spanish: castigo
  alternatives_spanish:
  - pena
  - sanción
  lexicon: πληγή (según el sentido punitivo del contexto)
  rationale: Aunque el griego puede abarcar golpe/herida, el contexto exige la idea de retribución; por eso 'castigo' expresa el valor punitivo que la frase contrapone al 'tormento'.
- source_word: χρόνος / time
  english_pob_choice: time
  chosen_spanish: tiempo
  alternatives_spanish:
  - duración
  - lapso
  lexicon: χρόνος
  rationale: '''Tiempo'' es el equivalente natural y exacto en español. En la primera pregunta, ''durante el mismo tiempo que dura el engaño'' evita una repetición rígida y mantiene la relación temporal del argumento.'
theological_decisions:
- issue: Relación entre el tiempo breve del engaño y el tiempo largo del castigo
  english_pob_reading: The time of indulgence and deception is very short, but the time of punishment and torment is long.
  chosen_spanish_reading: El tiempo de la entrega y del engaño es muy corto, pero el tiempo del castigo y del tormento es largo.
  alternative_spanish_readings:
  - el tiempo del placer y del engaño es muy corto
  - el tiempo de la autocomplacencia y del engaño es muy corto
  rationale: 'Se conserva la antítesis moral del pasaje: un disfrute breve frente a una retribución prolongada. ''Entrega'' preserva la reflexividad del original sin imponer una lectura más fuerte que el texto no exige, y ''castigo'' mantiene la dimensión retributiva junto con ''tormento''.'
  doctrine_reference: Justicia retributiva; relación entre pecado temporal y pena prolongada en la literatura moral cristiana temprana.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el contexto disponible; el español se ajusta directamente al texto griego normalizado y al trazado interpretativo de la traducción inglesa POB.
  spanish_consistency_notes:
  - Se mantiene la voz dialogal con 'Le dije' / 'Él dice' para reflejar la alternancia del original sin forzar un estilo narrativo más literario de lo necesario.
  - Se conserva la repetición de 'tiempo', 'día' y 'año' para sostener el argumento proporcional del pasaje.
  - Se evita 'SEÑOR' como máscara tipográfica; aquí 'Señor' es tratamiento de respeto en el diálogo.
  - '''Atormentados'' y ''atormentada'' siguen el mismo lema verbal para mantener cohesión léxica en la serie temporal del pasaje.'
