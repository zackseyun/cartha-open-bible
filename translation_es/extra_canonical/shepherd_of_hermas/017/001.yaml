revisions:
- from: Escúchame, hijos. Yo los crié en gran sencillez, inocencia y dignidad, por la misericordia del Señor, que hizo destilar justicia sobre ustedes, para que fueran justificados y …
  to: Escúchame, hijos. Los crié en gran sencillez, inocencia y dignidad, por la misericordia del Señor, que hizo gotear justicia sobre ustedes, para que fueran justificados y …
  rationale: Se hace una reparación menor para mejorar la naturalidad del español sin perder la imagen del original. «Hizo gotear justicia sobre ustedes» conserva mejor el matiz de ‘drip upon you’ que «hizo destilar». También se elimina el «Yo» explícito por estilo español más fluido. No se requieren notas al pie adicionales.
