  text: Listen to me, children. I reared you in great simplicity and innocence and dignity, through the mercy of the Lord, who caused righteousness to drip upon you, so that you might be justified and …
translation:
  language: es
  text: Escúchame, hijos. Los crié en gran sencillez, inocencia y dignidad, por la misericordia del Señor, que hizo gotear justicia sobre ustedes, para que fueran justificados y …
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τέκνα / children
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - hijos míos
  lexicon: τέκνα
  rationale: En español, «hijos» reproduce de manera natural y reverente la relación de instrucción paterna/materna implícita en el vocativo, sin volverlo infantil como «niños». Mantiene el tono afectivo y exhortativo del griego y del inglés POB.
- source_word: ἐθρεψά / I reared
  english_pob_choice: I reared
  chosen_spanish: los crié
  alternatives_spanish:
  - los alimenté
  - los eduqué
  lexicon: τρέφω
  rationale: «Crié» comunica el sentido de haberlos formado y cuidado en su desarrollo, más amplio que solo alimentar. En español refleja bien el alcance pastoral del verbo sin añadir una paráfrasis excesiva.
- source_word: ἁπλότητι πολλῇ / great simplicity
  english_pob_choice: great simplicity
  chosen_spanish: gran sencillez
  alternatives_spanish:
  - mucha simplicidad
  - gran sencillez de corazón
  lexicon: ἁπλότης
  rationale: «Sencillez» es la opción más natural en español para la cualidad moral de integridad y ausencia de doblez. «Simplicidad» puede sonar más técnico o menos idiomático; por eso se prefirió «sencillez».
- source_word: ἀκακίᾳ / innocence
  english_pob_choice: innocence
  chosen_spanish: inocencia
  alternatives_spanish:
  - sin malicia
  - candor
  lexicon: ἀκακία
  rationale: «Inocencia» preserva la fuerza moral del término y encaja con el paralelo de virtudes del pasaje. Otras opciones suavizan demasiado el valor ético del griego.
- source_word: σεμνότητι / dignity
  english_pob_choice: dignity
  chosen_spanish: dignidad
  alternatives_spanish:
  - seriedad
  - modestia
  lexicon: σεμνότης
  rationale: «Dignidad» es la equivalencia más clara para la cualidad de gravedad honorable. Aunque «seriedad» se acerca, «dignidad» conserva mejor el matiz de respetabilidad moral.
- source_word: διὰ τοῦ ἐλέους τοῦ κυρίου / through the mercy of the Lord
  english_pob_choice: through the mercy of the Lord
  chosen_spanish: por la misericordia del Señor
  alternatives_spanish:
  - por la gracia del Señor
  - por la compasión del Señor
  lexicon: ἔλεος
  rationale: «Misericordia» es la correspondencia directa y estable en español para ἔλεος. Se conserva el mayúsculo reverente «Señor» siguiendo la forma establecida por el POB inglés en este contexto devocional.
- source_word: ὃς ἐστάλαξεν δικαιοσύνην ἐφ’ ὑμᾶς / who caused righteousness to drip upon you
  english_pob_choice: who caused righteousness to drip upon you
  chosen_spanish: que hizo destilar justicia sobre ustedes
  alternatives_spanish:
  - que derramó justicia sobre ustedes
  - que hizo caer justicia sobre ustedes
  lexicon: σταλάζω / δικαιοσύνη
  rationale: «Hizo destilar» conserva la imagen vívida de algo que gotea o cae en gotas, sin neutralizarla en un mero «derramó». «Justicia» mantiene el valor moral/legal de δικαιοσύνη, coherente con el POB y con el lenguaje del pasaje.
- source_word: ἵνα δικαιωθῆτε / so that you might be justified
  english_pob_choice: so that you might be justified
  chosen_spanish: para que fueran justificados
  alternatives_spanish:
  - para que fueran declarados justos
  - a fin de que fueran justificados
  lexicon: δικαιόω
  rationale: Se mantiene «justificados» porque reproduce la terminología de δικαιόω sin interpretar de más el resultado. «Declarados justos» explicita una implicación posible, pero la forma pasiva simple respeta mejor la tensión textual.
theological_decisions:
- issue: La relación entre «justicia» derramada y «ser justificados»
  english_pob_reading: who caused righteousness to drip upon you, so that you might be justified
  chosen_spanish_reading: que hizo destilar justicia sobre ustedes, para que fueran justificados
  alternative_spanish_readings:
  - que derramó justicia sobre ustedes, para que fueran declarados justos
  - que hizo destilar rectitud sobre ustedes, para que fueran justificados
  rationale: 'La secuencia preserva la imagen del texto: una justicia que viene sobre los destinatarios y produce el resultado de la justificación. En español se evita resolver la relación como mera metáfora moral o como fórmula jurídica cerrada; se conserva la tensión entre don recibido y efecto judicial/salvífico.'
  doctrine_reference: justificación; lenguaje de justicia salvadora
- issue: El vocativo afectivo y pastoral en «children / hijos»
  english_pob_reading: Listen to me, children.
  chosen_spanish_reading: Escúchame, hijos.
  alternative_spanish_readings:
  - Escúchenme, hijos míos.
  - Oiganme, hijos.
  rationale: «Hijos» conserva el tono de paternidad espiritual sin añadir un posesivo inexistente en el texto. El imperativo singular con complemento plural es natural en español reverente y mantiene la cercanía exhortativa del original.
  doctrine_reference: paternidad espiritual; exhortación pastoral
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete inglés; la versión española sigue directamente el texto griego normalizado y el acuerdo alto del control cruzado, manteniendo la imagen de «destilar justicia» y la progresión hacia «ser justificados».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» como máscara automática; aquí «Señor» traduce el genitivo reverente del inglés POB y corresponde a κύριος en el contexto devocional.
  - «Justicia» se conservó para δικαιοσύνη por coherencia terminológica; no se sustituyó por «rectitud» porque el contexto incluye justificación.
  - La elipsis final con puntos suspensivos reproduce el carácter fragmentario del segmento fuente y del inglés auditado.
