base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/024/004.yaml
  text: '"You, therefore, do not cease speaking in the ears of the holy ones. You also have the pattern of the great tribulation that is coming; but if you are willing, it will be nothing. Remember the things written beforehand."'
translation:
  language: es
  text: «Por tanto, tú no dejes de hablar a los oídos de los santos. También tú tienes el modelo de la gran tribulación que viene; pero si estás dispuesto, no será nada. Recuerda las cosas escritas de antemano».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μὴ παύσῃ λαλοῦν
  english_pob_choice: do not cease speaking
  chosen_spanish: no dejes de hablar
  alternatives_spanish:
  - no ceses de hablar
  - no dejes de hablar continuamente
  lexicon: παύω + λαλέω
  rationale: La combinación expresa una prohibición de interrumpir la acción de hablar. En español, «no dejes de hablar» transmite la continuidad exigida sin sonar excesivamente literal o pesado; mantiene la fuerza exhortativa del griego y del inglés POB.
- source_word: εἰς τὰ ὦτα τῶν ἁγίων
  english_pob_choice: in the ears of the holy ones
  chosen_spanish: al oído de los santos
  alternatives_spanish:
  - en los oídos de los santos
  - a los oídos de los santos
  lexicon: οὖς
  rationale: El giro semítico «hablar al oído» es natural en español y conserva la imagen de comunicación íntima o insistente. «Santos» mantiene el valor del término comunitario sin sustituirlo por una perífrasis eclesiástica.
- source_word: τύπον ἔχεις τῆς μεγάλης θλίψεως
  english_pob_choice: you also have the pattern of the great tribulation
  chosen_spanish: también tú tienes el modelo de la gran tribulación
  alternatives_spanish:
  - también tú tienes el patrón de la gran tribulación
  - también tú tienes el tipo de la gran tribulación
  lexicon: τύπος
  rationale: «Modelo» comunica bien la idea de una figura o ejemplar dado de antemano y evita el tecnicismo ambiguo de «tipo» en español. Se conserva la relación de correspondencia prevista por el griego y reflejada en el inglés POB.
- source_word: τῆς μεγάλης θλίψεως
  english_pob_choice: the great tribulation
  chosen_spanish: la gran tribulación
  alternatives_spanish:
  - la gran aflicción
  - la gran angustia
  lexicon: θλῖψις
  rationale: «Tribulación» es la forma más reconocible en español para θλῖψις en este contexto escatológico/apocalíptico y corresponde al inglés POB. Se preserva la carga de prueba o aflicción intensa.
- source_word: ἐρχομένης
  english_pob_choice: that is coming
  chosen_spanish: que va a venir
  alternatives_spanish:
  - que viene
  - que está por venir
  lexicon: ἔρχομαι
  rationale: «Que va a venir» expresa con naturalidad la inminencia futura sin sobrecargar la frase. Mantiene el matiz prospectivo del participio griego.
- source_word: ἐὰν δὲ θέλῃς
  english_pob_choice: but if you are willing
  chosen_spanish: pero si estás dispuesto
  alternatives_spanish:
  - pero si quieres
  - pero si lo deseas
  lexicon: θέλω
  rationale: «Estás dispuesto» conserva el matiz de voluntad efectiva o disponibilidad, algo más fuerte que un mero deseo, y suena claro en español moderno.
- source_word: οὐδέν ἐστιν
  english_pob_choice: it will be nothing
  chosen_spanish: no será nada
  alternatives_spanish:
  - no será nada en absoluto
  - no significará nada
  lexicon: οὐδείς / οὐδέν
  rationale: La negación presenta la tribulación como sin efecto si hay disposición; «no será nada» reproduce la fuerza idiomática del inglés POB y del griego de manera natural en español.
- source_word: μνήσθητι τῶν προγεγραμμένων
  english_pob_choice: Remember the things written beforehand
  chosen_spanish: Recuerda las cosas escritas de antemano
  alternatives_spanish:
  - Recuerda lo escrito antes
  - Acuérdate de las cosas escritas previamente
  lexicon: μιμνήσκομαι + προγράφω
  rationale: «Escritas de antemano» conserva el valor de προγεγραμμένων y mantiene el carácter de instrucciones o anuncios previos. «Cosas» refleja el objeto plural neutro sin añadir especificación no presente en el texto.
theological_decisions:
- issue: Naturaleza de la exhortación dirigida a los 'santos'
  english_pob_reading: speak in the ears of the holy ones
  chosen_spanish_reading: hablar al oído de los santos
  alternative_spanish_readings:
  - hablar a los santos
  - hablar en presencia de los santos
  rationale: Se mantiene el sentido de comunicación insistente o privada que sugiere la imagen idiomática. No se convierte en una mera proclamación pública, porque el original conserva la metáfora del oído.
  doctrine_reference: Ecclesiology / exhortation imagery
- issue: Sentido de la 'gran tribulación' como prueba futura
  english_pob_reading: the great tribulation that is coming; but if you are willing, it will be nothing
  chosen_spanish_reading: la gran tribulación que va a venir; pero si estás dispuesto, no será nada
  alternative_spanish_readings:
  - la gran aflicción que viene; pero si quieres, no será nada
  - la gran tribulación que está por venir; pero si estás dispuesto, no será nada
  rationale: La redacción conserva el contraste entre una aflicción real y su anulación práctica mediante la disposición de la voluntad. No se atenúa la tensión escatológica del texto.
  doctrine_reference: Eschatology / perseverance
- issue: Memoria de lo ya escrito como norma interpretativa
  english_pob_reading: Remember the things written beforehand
  chosen_spanish_reading: Recuerda las cosas escritas de antemano
  alternative_spanish_readings:
  - Recuerda lo que fue escrito antes
  - Acuérdate de lo previamente escrito
  rationale: La exhortación final apunta a la autoridad de escritos previos. Se conserva la referencia a una tradición escrita anterior sin precisar más allá de lo que el texto ofrece.
  doctrine_reference: Scriptural memory / textual authority
translation_notes:
  revision_awareness: No applied revisions are listed in the audit packet; the Spanish draft follows the supplied Greek source and the English POB rendering without documented later corrections.
  spanish_consistency_notes:
  - Se conserva el tratamiento directo en segunda persona singular («tú», «estás dispuesto», «recuerda»), coherente con el inglés POB y con la exhortación inmediata del pasaje.
  - Se usa «santos» para ἁγίων, sin añadir una denominación eclesiástica más específica.
  - Se mantiene «tribulación» como término técnico estable para θλῖψις en este registro apocalíptico.
  - No se introduce 'Cristo', 'Señor' ni otra terminología ajena al segmento; el pasaje no la requiere.
