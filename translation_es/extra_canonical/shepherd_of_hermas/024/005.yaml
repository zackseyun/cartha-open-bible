  text: Having said these things, she went away, and I did not see to what place she went; for a noise occurred. And I turned around in fear, thinking that the beast was coming.
translation:
  language: es
  text: Después de decir estas cosas, ella se fue, y no vi adónde se fue; porque se produjo un ruido. Y me di vuelta con miedo, pensando que la bestia venía.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἶπεν ταῦτα / Having said these things
  english_pob_choice: Having said these things
  chosen_spanish: Después de decir estas cosas
  alternatives_spanish:
  - Dicho esto
  - Habiendo dicho estas cosas
  lexicon: λέγω
  rationale: El griego introduce una acción anterior inmediata; en español, «Después de decir estas cosas» conserva la secuencia temporal sin sonar demasiado literal o arcaico.
- source_word: ἀπῆλθεν / she went away
  english_pob_choice: she went away
  chosen_spanish: ella se fue
  alternatives_spanish:
  - se marchó
  - se alejó
  lexicon: ἀπέρχομαι
  rationale: «Se fue» es natural y fiel al simple movimiento de salida indicado por el verbo.
- source_word: οὐκ εἶδον ποῦ ἀπῆλθεν / I did not see to what place she went
  english_pob_choice: I did not see to what place she went
  chosen_spanish: no vi a qué lugar se fue
  alternatives_spanish:
  - no vi adónde fue
  - no vi a dónde se fue
  lexicon: ὅπου / ποῦ
  rationale: Se preserva la incertidumbre espacial con una formulación clara en español; «a qué lugar» refleja el matiz del texto y evita forzar una locución demasiado idiomática que oculte la pregunta espacial.
- source_word: θόρυβος ἐγένετο / a noise occurred
  english_pob_choice: a noise occurred
  chosen_spanish: se produjo un ruido
  alternatives_spanish:
  - hubo un ruido
  - surgió un ruido
  lexicon: θόρυβος
  rationale: «Se produjo» conserva la idea de un evento súbito que irrumpe; «ruido» reproduce el sentido general sin añadir interpretación.
- source_word: περιβλέψας δὲ ἐν φόβῳ / And I turned around in fear
  english_pob_choice: And I turned around in fear
  chosen_spanish: Y me volví con miedo
  alternatives_spanish:
  - y me di la vuelta con miedo
  - y me volví temeroso
  lexicon: περιβλέπω
  rationale: El verbo describe un giro de atención/cuerpo en reacción al sobresalto; «me volví» es un equivalente natural y suficientemente amplio.
- source_word: νομίζων τὸ θηρίον ἔρχεσθαι / thinking that the beast was coming
  english_pob_choice: thinking that the beast was coming
  chosen_spanish: pensando que la bestia venía
  alternatives_spanish:
  - pensando que venía la bestia
  - creyendo que la bestia se acercaba
  lexicon: θηρίον
  rationale: «Bestia» mantiene la fuerza del término griego y su carga narrativa sin suavizarlo a «animal»; el imperfecto «venía» conserva la amenaza en curso.
theological_decisions:
- issue: Referencia narrativa a la bestia como figura amenazante
  english_pob_reading: thinking that the beast was coming
  chosen_spanish_reading: pensando que la bestia venía
  alternative_spanish_readings:
  - pensando que la bestia se acercaba
  - pensando que venía la bestia
  rationale: No se explicita una identificación doctrinal de la bestia; se mantiene la referencia narrativa inmediata y su efecto de temor sin añadir interpretación alegórica no presente en el segmento.
  doctrine_reference: Narrative imagery in Shepherd of Hermas; avoid over-specification
