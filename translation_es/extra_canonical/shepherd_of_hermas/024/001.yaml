  text: I asked her about the four colors that the beast had on its head. But she answered me and says, "Again you are curious about such matters." "Yes, my Lady," I say; "make known to me what these things are."
translation:
  language: es
  text: 'Le pregunté acerca de los cuatro colores que la bestia tenía en la cabeza. Pero ella me respondió y dijo: «Otra vez tienes curiosidad por esas cosas». «Sí, mi Señora —dije—; hazme saber qué son estas cosas».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἐπηρώτησα αὐτὴν
  english_pob_choice: I asked her
  chosen_spanish: Le pregunté
  alternatives_spanish:
  - La interrogué
  - Le hice una pregunta
  lexicon: ἐπερωτάω
  rationale: El griego expresa una pregunta directa. «Le pregunté» conserva la sencillez narrativa del inglés POB y suena natural en español sin añadir matices de dureza que no están en el texto.
- source_word: περὶ τῶν τεσσάρων χρωμάτων
  english_pob_choice: about the four colors
  chosen_spanish: acerca de los cuatro colores
  alternatives_spanish:
  - sobre los cuatro colores
  - por los cuatro colores
  lexicon: περί + χρῶμα
  rationale: «Acerca de» reproduce el valor de tema o asunto de περί. «Colores» sigue el sentido evidente del griego, y el número cuatro se mantiene sin interpretación adicional.
- source_word: τὰ ἐν τῇ κεφαλῇ τοῦ θηρίου
  english_pob_choice: that the beast had on its head
  chosen_spanish: que la bestia tenía en la cabeza
  alternatives_spanish:
  - que la bestia llevaba en la cabeza
  - que estaban en la cabeza de la bestia
  lexicon: κεφαλή, θηρίον
  rationale: La colocación de los colores se expresa de manera natural con «tenía en la cabeza». Se evita una literalidad forzada y se preserva la imagen del texto.
- source_word: πάλιν
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Nuevamente
  lexicon: πάλιν
  rationale: «Otra vez» es una equivalencia natural y clara para la repetición enfatizada por πάλιν.
- source_word: περίεργος εἶ
  english_pob_choice: you are curious about such matters
  chosen_spanish: estás curioso[a] por tales cosas
  alternatives_spanish:
  - te inquietas por tales cosas
  - andas curioso[a] por tales cosas
  lexicon: περίεργος
  rationale: El adjetivo griego puede implicar curiosidad, pero también una intromisión o interés excesivo. En español, «curioso[a]» preserva el sentido base y la nota en el texto permite reflejar la concordancia de género sin fijarla indebidamente.
- source_word: γίνωσκε μοι
  english_pob_choice: make known to me
  chosen_spanish: hazme saber
  alternatives_spanish:
  - dímelo
  - haz que yo sepa
  lexicon: γνωρίζω
  rationale: «Hazme saber» mantiene el valor causativo de hacer conocer algo, con un registro digno y bíblico-natural en español.
- source_word: τίνα ταῦτα ἐστίν
  english_pob_choice: what these things are
  chosen_spanish: qué son estas cosas
  alternatives_spanish:
  - qué significan estas cosas
  - qué es esto
  lexicon: τίς, οὗτος
  rationale: «Qué son estas cosas» sigue de cerca la formulación del original y deja abierta la demanda de explicación sin introducir interpretaciones.
theological_decisions:
- issue: Tratamiento del vocativo respetuoso para la figura femenina de autoridad
  english_pob_reading: my Lady
  chosen_spanish_reading: mi Señora
  alternative_spanish_readings:
  - mi señora
  - señora mía
  rationale: El inglés POB conserva el vocativo reverente. «Mi Señora» mantiene esa deferencia y la mayúscula ayuda a señalar el tratamiento honorífico en español sin alterar el texto.
  doctrine_reference: No doctrinal issue; register and honorific speech in narrative dialogue.
- issue: Curiosidad como rasgo de la interlocución
  english_pob_reading: you are curious about such matters
  chosen_spanish_reading: estás curioso[a] por tales cosas
  alternative_spanish_readings:
  - tienes curiosidad por tales cosas
  - andas curioso[a] por tales cosas
  rationale: El texto presenta una observación de la interlocutora sobre la insistencia del hablante. Se conserva la tensión entre curiosidad simple e interés excesivo sin suavizarla.
  doctrine_reference: Narrative characterization; no doctrinal formulation.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete de auditoría. La redacción española se apoya directamente en el griego normalizado y en la equivalencia óptima del POB en inglés, sin depender mecánicamente de la sintaxis inglesa cuando el español exige una formulación más natural.
  spanish_consistency_notes:
  - Se conserva «bestia» para θηρίον en armonía con el registro narrativo del texto.
  - «Mi Señora» traduce el vocativo de respeto sin sustituirlo por un tratamiento eclesiástico posterior.
  - No se introduce terminología doctrinal ajena al pasaje; el foco permanece en la petición de explicación de los colores y su significado.
