base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/024/002.yaml
  text: 'She says, "Listen: the black is this world, in which you dwell. And the fiery and blood-red is because this world must be destroyed by blood and fire. But the golden portion is you who have escaped this world. For just as gold is tested by fire and becomes useful, so also you are being tested in them. Therefore, those who remain and are burned by it will be purified. Just as gold casts off its dross, so also you will cast off every grief and distress, and you will be purified and will be useful for the building of the tower.'
translation:
  language: es
  text: 'Ella dice: «Escucha: lo negro es este mundo, en el cual habitas. Y lo ardiente y rojo sangre es porque este mundo debe ser destruido por sangre y fuego. Pero la porción de oro[a] eres tú, que has escapado de este mundo. Porque así como el oro es probado por fuego y se vuelve útil, así también tú estás siendo probado por medio de estas cosas. Por tanto, los que permanezcan y sean quemados por ello serán purificados. Así como el oro desecha su escoria, así también tú desecharás toda tristeza y angustia, y serás purificado y útil para la edificación de la torre.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega tiene literalmente la estructura «la porción de oro»; esta formulación conserva el vínculo con la imagen del metal precioso dentro de la alegoría.
    reason: lexical_alternative
lexical_decisions:
- source_word: μέλαν
  english_pob_choice: the black
  chosen_spanish: lo negro
  alternatives_spanish:
  - el negro
  - la negrura
  lexicon: μέλας
  rationale: Mantengo el valor cromático sustantivado del griego con una forma natural en español. «Lo negro» conserva el uso adjetival sustantivado del pasaje y evita introducir una abstracción mayor que el original.
- source_word: πῦρ / αἷμα
  english_pob_choice: the fiery and blood-red
  chosen_spanish: lo ígneo y rojo como sangre
  alternatives_spanish:
  - lo ardiente y rojo sangre
  - lo ígneo y sanguíneo
  lexicon: πῦρ; αἷμα
  rationale: 'El griego presenta dos rasgos cromáticos y materiales: fuego y sangre. La expresión española conserva ambos sin suavizarlos, manteniendo la imaginería apocalíptica del texto.'
- source_word: κόσμος
  english_pob_choice: this world
  chosen_spanish: este mundo
  alternatives_spanish:
  - este siglo
  - este orden del mundo
  lexicon: κόσμος
  rationale: «Mundo» es la correspondencia directa y clara en español para el ámbito presente del pasaje. «Este siglo» sería más interpretativo y menos inmediato para el lector general.
- source_word: δοκιμάζω
  english_pob_choice: is tested
  chosen_spanish: es probado / estás siendo probado
  alternatives_spanish:
  - es examinado
  - es refinado
  lexicon: δοκιμάζω
  rationale: «Probar» conserva la doble idea de examen y refino que el contexto de oro por fuego exige. En el segundo caso, el presente progresivo reproduce el proceso en curso.
- source_word: χρυσίον / χρυσός
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro puro
  - oro fino
  lexicon: χρυσός
  rationale: «Oro» es la equivalencia natural y suficiente. No añado «puro» ni «fino» porque el texto ya desarrolla la purificación por el fuego.
- source_word: ὠφέλιμος
  english_pob_choice: useful
  chosen_spanish: útil
  alternatives_spanish:
  - provechoso
  - apto
  lexicon: ὠφέλιμος
  rationale: '«Útil» comunica bien la idea funcional del pasaje: el oro refinado sirve para la construcción de la torre.'
- source_word: πύργος
  english_pob_choice: the tower
  chosen_spanish: la torre
  alternatives_spanish:
  - la torre alta
  - la torre
  lexicon: πύργος
  rationale: Conservo «torre» como término estable del simbolismo de Hermas. No se amplía con adjetivos porque el original no lo hace aquí.
theological_decisions:
- issue: Purificación por fuego de los que permanecen
  english_pob_reading: those who remain and are burned by it will be purified
  chosen_spanish_reading: los que permanezcan y sean quemados por él serán purificados
  alternative_spanish_readings:
  - los que permanezcan y sean abrasados por él serán purificados
  - los que permanezcan y pasen por el fuego serán purificados
  rationale: 'Mantengo la tensión entre juicio y purificación: el texto no suaviza el hecho de ser quemados, pero sí afirma un resultado purificador. «Quemados» conserva esa dureza sin interpretar demasiado el mecanismo.'
  doctrine_reference: Purificación mediante prueba/jucio; no doctrina sacramental explícita.
- issue: Despojamiento de tristeza y angustia como efecto del refinamiento
  english_pob_reading: you will cast off every grief and distress
  chosen_spanish_reading: desecharás toda tristeza y angustia
  alternative_spanish_readings:
  - te desprenderás de toda tristeza y angustia
  - arrojarás lejos toda pena y aflicción
  rationale: «Desecharás» refleja el gesto de remover escoria del oro y enlaza con el motivo del refinamiento. «Tristeza y angustia» mantiene dos términos afectados sin reducirlos a un solo concepto.
  doctrine_reference: Purificación moral/escatológica dentro de la alegoría.
- issue: Identidad de los que han escapado del mundo
  english_pob_reading: you who have escaped this world
  chosen_spanish_reading: tú, que has escapado de este mundo
  alternative_spanish_readings:
  - tú, que te has librado de este mundo
  - tú, que has huido de este mundo
  rationale: «Escapado» sigue de cerca la imagen de salida/liberación del sistema presente y conserva el contraste con «este mundo».
  doctrine_reference: Contraste entre el orden presente y los fieles preservados.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas ni variantes textuales en el paquete provisto; la redacción sigue de cerca el griego subyacente y la formulación auditada en inglés POB, preservando la alegoría del fuego, la sangre y el oro sin introducir ampliaciones doctrinales.
  spanish_consistency_notes:
  - Se usa «mundo» para κόσμος de modo consistente con el contraste del pasaje.
  - Se conserva «torre» como término técnico simbólico dentro de Hermas.
  - 'Se mantiene la secuencia retórica del original: identificación del símbolo, explicación del juicio, comparación del oro y aplicación a los oyentes.'
  - La puntuación y comillas españolas se adaptan a un texto de discurso directo sin alterar el contenido.
