base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/024/003.yaml
  text: '"But the white portion is the age that is coming, in which the elect of God will dwell; because those chosen by God for eternal life will be spotless and pure.'
translation:
  language: es
  text: «Pero la porción blanca es la era que viene, en la cual habitarán los escogidos de Dios; porque los escogidos por Dios para vida eterna serán sin mancha y puros.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λευκόν μέρος / white portion
  english_pob_choice: the white portion
  chosen_spanish: la porción blanca
  alternatives_spanish:
  - la parte blanca
  - la porción de color blanco
  lexicon: λευκός
  rationale: Mantiene la imagen simbólica de 'white portion' sin añadir interpretación. 'Porción' conserva la idea de una parte asignada o delimitada mejor que 'parte' en este contexto alegórico.
- source_word: ὁ αἰὼν ὁ ἐρχόμενος / age that is coming
  english_pob_choice: the age that is coming
  chosen_spanish: la era que viene
  alternatives_spanish:
  - la edad que viene
  - el siglo venidero
  lexicon: αἰών
  rationale: '''Era'' comunica mejor en español moderno el sentido de una etapa/orden de realidad futura. ''Edad'' es posible, pero en español bíblico puede sonar menos natural; ''siglo venidero'' introduce un giro más tradicional que no es necesario aquí.'
- source_word: οἱ ἐκλεκτοὶ τοῦ θεοῦ / the elect of God
  english_pob_choice: the elect of God
  chosen_spanish: los escogidos de Dios
  alternatives_spanish:
  - los elegidos de Dios
  - los electos de Dios
  lexicon: ἐκλεκτός
  rationale: '''Escogidos'' conserva el valor pasivo de elección divina y suena natural en español bíblico. ''Elegidos'' es viable, pero ''escogidos'' suele expresar con más claridad la acción de Dios sobre el sujeto.'
- source_word: κατοικήσουσιν / will dwell
  english_pob_choice: will dwell
  chosen_spanish: mोरarán
  alternatives_spanish:
  - habitarán
  - vivirán
  lexicon: κατοικέω
  rationale: '''Morarán'' conserva el matiz solemne de residencia estable, adecuado para un texto visionario. ''Habitarán'' también sería fiel, pero ''morar'' enlaza mejor con el registro religioso sin volverlo arcaico en exceso.'
- source_word: οἱ εἰς ζωὴν αἰώνιον ἐκλεγέντες / those chosen by God for eternal life
  english_pob_choice: those chosen by God for eternal life
  chosen_spanish: los que Dios ha escogido para vida eterna
  alternatives_spanish:
  - los escogidos por Dios para vida eterna
  - los que fueron escogidos para vida eterna
  lexicon: ἐκλέγομαι
  rationale: Se conserva la relación explícita con Dios que el inglés POB hace visible. 'Ha escogido' mantiene presente y perfecto el acto electivo con efecto perdurable; 'escogidos por Dios' también es fiel, pero la forma verbal ayuda a enlazar la cláusula causal.
- source_word: ἄμωμοι καὶ καθαροί / spotless and pure
  english_pob_choice: spotless and pure
  chosen_spanish: sin mancha y puros
  alternatives_spanish:
  - irreprochables y puros
  - sin mancha y limpios
  lexicon: ἄμωμος, καθαρός
  rationale: '''Sin mancha'' traduce bien el valor de ἄμωμος sin perder su resonancia moral. ''Puros'' preserva καθαρός de forma directa; ''limpios'' sería demasiado físico en español y ''irreprochables'' desplaza el foco hacia evaluación externa.'
theological_decisions:
- issue: Referencia al tiempo futuro y a los elegidos de Dios
  english_pob_reading: the age that is coming, in which the elect of God will dwell
  chosen_spanish_reading: la era que viene, en la cual morarán los escogidos de Dios
  alternative_spanish_readings:
  - el siglo venidero, en el cual habitarán los escogidos de Dios
  - la edad futura, en la cual vivirán los escogidos de Dios
  rationale: Se mantiene la expectativa escatológica sin doctrinalizar más allá del texto. 'Escogidos de Dios' conserva la elección divina explícita del griego y del inglés POB, sin convertirla en una fórmula confesional adicional.
  doctrine_reference: Escatología; elección divina
- issue: Vida eterna como destino de los escogidos
  english_pob_reading: those chosen by God for eternal life
  chosen_spanish_reading: los que Dios ha escogido para vida eterna
  alternative_spanish_readings:
  - los escogidos por Dios para vida eterna
  - los que fueron destinados a vida eterna
  rationale: '''Para vida eterna'' reproduce la finalidad expresada en el texto sin introducir un determinismo que no esté explicitado aquí. Se evita ''destinados'', que podría sugerir un matiz teológico más fuerte que el audit trail no documenta.'
  doctrine_reference: Vida eterna; elección
- issue: Pureza moral de los elegidos
  english_pob_reading: will be spotless and pure
  chosen_spanish_reading: serán sin mancha y puros
  alternative_spanish_readings:
  - serán irreprochables y puros
  - serán sin mancha y limpios
  rationale: La combinación mantiene el paralelismo y la fuerza ética del original. 'Sin mancha' y 'puros' expresan tanto la integridad moral como la limpieza ritual/metafórica sin imponer una sola lectura exclusiva.
  doctrine_reference: Santificación; pureza moral
translation_notes:
  revision_awareness: No se registran revisiones aplicadas ni variantes textuales en el paquete auditado; por ello, la redacción española sigue de cerca el sentido del griego normalizado y del inglés POB, sin notas textuales adicionales.
  spanish_consistency_notes:
  - Se preservó 'Dios' como sujeto explícito de la elección, en línea con el paquete inglés y con el griego.
  - Se usó 'escogidos' / 'ha escogido' para mantener la relación léxica entre elección divina y destino a vida eterna.
  - Se evitó 'SEÑOR' porque el segmento no contiene el nombre divino ni una cita directa del tetragrama.
  - Se mantuvo un registro bíblico sobrio, con puntuación y comillas españolas, apto para publicación.
