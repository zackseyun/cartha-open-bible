base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/046/001.yaml
  text: 'But I, the angel of repentance, say to you: do not fear the devil. For I was sent," he says, "to be with you who are repenting with all your heart and to streng—'
translation:
  language: es
  text: 'Pero yo, el ángel del arrepentimiento, les digo: no teman al diablo. Porque fui enviado —dice— para estar con ustedes, los que se arrepienten de todo corazón, y para fortalec...'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ ἄγγελος τῆς μετανοίας
  english_pob_choice: the angel of repentance
  chosen_spanish: el ángel del arrepentimiento
  alternatives_spanish:
  - el ángel de la conversión
  - el ángel del cambio de mente
  lexicon: ἄγγελος; μετάνοια
  rationale: Conservo el vínculo directo entre 'ángel' y 'arrepentimiento', que el griego expresa con una relación posesiva. 'Arrepentimiento' es la opción más natural y fiel en español eclesial; 'conversión' o 'cambio de mente' explicitan matices posibles, pero no son necesarios aquí.
- source_word: μὴ φοβηθῆτε τὸν διάβολον
  english_pob_choice: do not fear the devil
  chosen_spanish: no teman al diablo
  alternatives_spanish:
  - no tengan miedo del diablo
  - no teman al acusador
  lexicon: φοβέομαι; διάβολος
  rationale: '''No teman'' reproduce el imperativo plural con naturalidad. ''Diablo'' refleja el término personal usado en el griego; ''acusador'' sería una glosa interpretativa no exigida por el contexto inmediato.'
- source_word: ἀπεστάλην
  english_pob_choice: I was sent
  chosen_spanish: fui enviado
  alternatives_spanish:
  - he sido enviado
  - me enviaron
  lexicon: ἀποστέλλω
  rationale: '''Fui enviado'' conserva la pasividad divina o delegada del verbo y el tono solemne del envío. ''He sido enviado'' es posible, pero el pretérito simple suena más directo en este discurso.'
- source_word: σὺν ὑμῖν
  english_pob_choice: to be with you
  chosen_spanish: para estar con ustedes
  alternatives_spanish:
  - para acompañarlos
  - para estar junto a ustedes
  lexicon: μετά / σύν
  rationale: '''Para estar con ustedes'' mantiene la idea de presencia compartida sin añadir matices afectivos ajenos al texto. ''Acompañarlos'' suena más interpretativo.'
- source_word: τοῖς μετανοοῦσιν ἐξ ὅλης τῆς καρδίας
  english_pob_choice: you who are repenting with all your heart
  chosen_spanish: los que se arrepienten de todo corazón
  alternatives_spanish:
  - los que se arrepienten con todo su corazón
  - los que están arrepintiéndose con toda su alma
  lexicon: μετανοέω; καρδία
  rationale: '''Se arrepienten de todo corazón'' es idiomático y fiel. ''Con todo su corazón'' también es posible, pero ''de todo corazón'' funciona mejor como adverbial en español y conserva la intensidad del original.'
- source_word: ἵνα στηρίξω
  english_pob_choice: and to streng—
  chosen_spanish: y para fortalec...
  alternatives_spanish:
  - y para afirmar...
  - y para fortalecerlos...
  lexicon: στηρίζω
  rationale: El texto fuente y la traducción inglesa están truncados en el punto de corte; por eso conservo el corte con puntos suspensivos. 'Fortalecer' es el equivalente más natural para στηρίζω en este contexto de apoyo/confirmación.
theological_decisions:
- issue: 'Identidad y función del hablante: el ángel del arrepentimiento'
  english_pob_reading: But I, the angel of repentance, say to you
  chosen_spanish_reading: Pero yo, el ángel del arrepentimiento, les digo
  alternative_spanish_readings:
  - Pero yo, el ángel del arrepentimiento, les digo a ustedes
  - Yo, el ángel del arrepentimiento, les digo
  rationale: Mantengo la autoidentificación solemne del hablante sin suavizarla ni convertirla en una paráfrasis explicativa. El texto presenta una figura angélica con función ministerial ligada al arrepentimiento, y el español debe preservar esa tensión narrativa sin resolverla.
  doctrine_reference: Angelología y mediación en literatura cristiana antigua; cf. uso del mensajero celestial como figura funcional, no como dogma normativo.
- issue: Exhortación a no temer al diablo
  english_pob_reading: do not fear the devil
  chosen_spanish_reading: no teman al diablo
  alternative_spanish_readings:
  - no teman al mal
  - no teman al demonio
  rationale: Conservo la referencia personal al diablo, porque el griego la nombra directamente. No rebajo el alcance a una abstracción como 'el mal', ni cambio el referente a 'demonio' si no es necesario.
  doctrine_reference: Demonología bíblica y lenguaje personal del mal.
- issue: Presencia con los arrepentidos y envío para fortalecer
  english_pob_reading: For I was sent ... to be with you who are repenting with all your heart and to streng—
  chosen_spanish_reading: Porque fui enviado ... para estar con ustedes, los que se arrepienten de todo corazón, y para fortalec...
  alternative_spanish_readings:
  - Porque fui enviado ... para estar con ustedes ... y para afirmar...
  rationale: El corte textual debe respetarse porque tanto la fuente griega como el audit trail inglés se interrumpen. No completo la frase con contenido no atestiguado. Teológicamente, la frase afirma acompañamiento y fortalecimiento a los arrepentidos; eso se conserva sin extrapolar más allá del fragmento.
  doctrine_reference: Pneumatología/ministerio de ayuda en exhortación penitencial; principio de no sobretraducción de fragmentos truncados.
translation_notes:
  revision_awareness: La fuente griega y la traducción inglesa auditada terminan truncadas en la última palabra/frase ('στηρίξω' / 'streng—'). Por ello la versión española mantiene el corte con puntos suspensivos y no intenta completar el contenido perdido.
  spanish_consistency_notes:
  - He usado 'arrepentimiento/arrepienten' para μετάνοια/μετανοοῦσιν conforme al valor predominante en este contexto.
  - He preservado 'diablo' como referente personal explícito, sin sustituirlo por glosas interpretativas.
  - He mantenido el fragmento truncado con elipsis para no inventar el cierre del período.
  - El registro busca ser bíblico y legible en español latinoamericano sin caer en arcaísmos innecesarios.
