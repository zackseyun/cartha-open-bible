revisions:
- from: 'Mientras consideraba estas cosas y las meditaba en mi corazón, veo delante de mí una gran silla blanca, hecha de lana nevada. Y entró una anciana con vestiduras muy resplandecientes, llevando un libro en sus manos, y se sentó sola, y me saludó: «Hermas, salud». Y yo, afligido y llorando, dije: «Señora, salud».'
  to: 'Mientras consideraba estas cosas y las meditaba en mi corazón, veo delante de mí una gran silla blanca, hecha de lana blanca como la nieve. Y entró una anciana con vestiduras muy resplandecientes, llevando un libro en sus manos, y se sentó sola y me saludó: «Hermas, te saludo». Y yo, afligido y llorando, dije: «Señora, la saludo».'
  rationale: 'Se conservó la estructura, el presente histórico y la prudencia de «silla» frente a «trono», pero se repararon dos puntos de legibilidad/fidelidad idiomática: la imagen de la lana se hizo natural en español y la fórmula de saludo se expresó de manera inteligible y digna sin perder el valor formal del original auditado.'
