review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido general del griego según la auditoría inglesa: reflexión interior, aparición de un gran asiento blanco, entrada de una mujer anciana con libro, saludo mutuo y respuesta de Hermas en aflicción. Sin embargo, dos elecciones españolas debilitan la fidelidad idiomática y estilística: «salud» como fórmula de saludo suena poco natural en español actual, y «lana nevada» resulta más forzada que la imagen comparativa natural de blancura nívea que comunica el inglés auditado.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero necesita pequeños ajustes para sonar natural en español eclesial legible. «Veo» para presente histórico funciona; «gran silla blanca» puede mantenerse por prudencia frente a «trono». Las mejoras principales son sustituir la fórmula de saludo por «te saludo / la saludo» y pulir «hecha de lana blanca como la nieve». También conviene simplificar la puntuación del discurso directo.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. «Señora» para el vocativo es adecuado. «Anciana», «vestiduras», «corazón» y «llorando» están bien alineados. La revisión propuesta no afecta términos doctrinales, solo mejora naturalidad y precisión visual.
  issues:
  - severity: medium
    issue: La fórmula «Hermas, salud» / «Señora, salud» es demasiado literal y poco natural en español contemporáneo.
    rationale: Aunque «greetings» en inglés refleja una fórmula breve de saludo, en español «salud» como saludo directo suena arcaizante o extraño y no comunica bien el acto de saludar. «Hermas, te saludo» y «Señora, la saludo» preservan el sentido sin paráfrasis excesiva.
  - severity: low
    issue: «Lana nevada» suena algo forzado en español.
    rationale: El inglés auditado «made of snowy wool» comunica lana de blancura nívea. En español, «hecha de lana blanca como la nieve» o equivalente transmite mejor la imagen sin opacidad estilística.
  - severity: low
    issue: Puntuación algo cargada en la cadena verbal de la mujer.
    rationale: Reducir una coma antes de «y me saludó» mejora el flujo natural del español sin alterar la estructura narrativa.
  revised_spanish_text: 'Mientras consideraba estas cosas y las meditaba en mi corazón, veo delante de mí una gran silla blanca, hecha de lana blanca como la nieve. Y entró una anciana con vestiduras muy resplandecientes, llevando un libro en sus manos, y se sentó sola y me saludó: «Hermas, te saludo». Y yo, afligido y llorando, dije: «Señora, la saludo».'
  revision_rationale: 'Se conservó la estructura, el presente histórico y la prudencia de «silla» frente a «trono», pero se repararon dos puntos de legibilidad/fidelidad idiomática: la imagen de la lana se hizo natural en español y la fórmula de saludo se expresó de manera inteligible y digna sin perder el valor formal del original auditado.'
