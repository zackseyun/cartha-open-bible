  text: While I was considering these things and pondering them in my heart, I see before me a great white chair made of snowy wool. And an elderly woman came in most radiant clothing, holding a book in her hands, and sat down alone and greeted me, “Hermas, greetings.” And I, grieving and weeping, said, “Lady, greetings.”
translation:
  language: es
  text: 'Mientras consideraba estas cosas y las meditaba en mi corazón, veo delante de mí una gran silla blanca, hecha de lana blanca como la nieve. Y entró una anciana con vestiduras muy resplandecientes, llevando un libro en sus manos, y se sentó sola y me saludó: «Hermas, te saludo». Y yo, afligido y llorando, dije: «Señora, la saludo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: considering these things and pondering them in my heart
  english_pob_choice: considering... and pondering... in my heart
  chosen_spanish: consideraba estas cosas y las meditaba en mi corazón
  alternatives_spanish:
  - pensaba en estas cosas y las reflexionaba en mi corazón
  - consideraba estas cosas y las guardaba en mi corazón
  lexicon: Considerar / meditar
  rationale: Conserva el paralelismo del griego y del inglés POB entre la reflexión exterior y la interior; «meditaba» comunica bien la acción continua, y «en mi corazón» mantiene el ámbito interior sin volverlo idiomáticamente extraño.
- source_word: great white chair
  english_pob_choice: a great white chair
  chosen_spanish: una gran silla blanca
  alternatives_spanish:
  - un gran trono blanco
  - una gran cátedra blanca
  lexicon: silla / trono
  rationale: «Chair» aquí puede ser asiento o trono. Mantengo «silla» porque el testimonio base no obliga a «trono»; la grandeza y el color ya sugieren solemnidad sin añadir una connotación que el texto no explicita.
- source_word: made of snowy wool
  english_pob_choice: made of snowy wool
  chosen_spanish: hecha de lana nevada
  alternatives_spanish:
  - hecha de lana blanca como nieve
  - de lana tan blanca como la nieve
  lexicon: lana / nieve
  rationale: «Lana nevada» reproduce de forma compacta la imagen material y cromática; es natural en español y conserva la metáfora de pureza/blancura sin sobreexplicar.
- source_word: an elderly woman
  english_pob_choice: an elderly woman
  chosen_spanish: una anciana
  alternatives_spanish:
  - una mujer de edad avanzada
  - una mujer anciana
  lexicon: anciana
  rationale: «Anciana» es la opción más directa y digna en español para el retrato de edad avanzada, sin perder la sobriedad del pasaje.
- source_word: most radiant clothing
  english_pob_choice: most radiant clothing
  chosen_spanish: vestiduras muy resplandecientes
  alternatives_spanish:
  - vestiduras brillantísimas
  - vestiduras de gran resplandor
  lexicon: vestiduras / resplandecientes
  rationale: «Vestiduras» mantiene el tono elevado; «resplandecientes» conserva el brillo intenso del inglés POB sin recurrir a un superlativo artificialmente rígido.
- source_word: holding a book in her hands
  english_pob_choice: holding a book in her hands
  chosen_spanish: llevando un libro en sus manos
  alternatives_spanish:
  - teniendo un libro en sus manos
  - con un libro en las manos
  lexicon: libro / manos
  rationale: «Llevando» refleja la presentación visual de la escena; «en sus manos» conserva el detalle corporal del texto. No se traduce como «rollo» porque la fuente auditada en inglés dice «book» y no impone una corrección textual aquí.
- source_word: sat down alone
  english_pob_choice: sat down alone
  chosen_spanish: se sentó sola
  alternatives_spanish:
  - se sentó aparte
  - se sentó en solitario
  lexicon: sola
  rationale: «Sola» sigue el sentido de que se sienta sin compañía y preserva la simplicidad del inglés POB.
- source_word: greeted me
  english_pob_choice: greeted me
  chosen_spanish: me saludó
  alternatives_spanish:
  - me dio saludos
  - me dirigió un saludo
  lexicon: saludar
  rationale: «Saludó» es el equivalente natural y conserva el tono de encuentro formal.
- source_word: Hermas, greetings
  english_pob_choice: Hermas, greetings
  chosen_spanish: «Hermas, salud»
  alternatives_spanish:
  - «Hermas, salve»
  - «Hermas, paz»
  lexicon: saludo formular
  rationale: «Salud» traduce de manera directa la fórmula de saludo breve del inglés POB y evita imponer un registro litúrgico que el griego no obliga.
- source_word: grieving and weeping
  english_pob_choice: grieving and weeping
  chosen_spanish: afligido y llorando
  alternatives_spanish:
  - dolido y llorando
  - entristecido y llorando
  lexicon: afligido / llorando
  rationale: «Afligido» recoge el peso emocional de la escena y «llorando» mantiene la acción visible y concreta.
- source_word: Lady, greetings
  english_pob_choice: Lady, greetings
  chosen_spanish: «Señora, salud»
  alternatives_spanish:
  - «Señora, paz»
  - «Señora, salve»
  lexicon: Señora
  rationale: «Señora» corresponde al vocativo respetuoso del griego y del inglés POB; «salud» mantiene la simetría con el saludo recibido sin sustituirla por una fórmula eclesial no exigida por el texto.
theological_decisions:
- issue: The seated figure and possible throne-language
  english_pob_reading: a great white chair
  chosen_spanish_reading: una gran silla blanca
  alternative_spanish_readings:
  - un gran trono blanco
  - una gran cátedra blanca
  rationale: No se intensifica la imagen a «trono» porque el texto auditado del POB conserva la ambigüedad de «chair». La elección evita introducir una lectura teológica más específica de la que la frase por sí sola garantiza.
  doctrine_reference: Iconografía visionaria; prudencia hermenéutica
translation_notes:
  revision_awareness: 'El inglés POB de referencia es de filosofía optimal-equivalence y aquí presenta acuerdo alto con el testimonio base; no hay notas en la versión inglesa, así que la traducción española sigue el mismo perfil sin añadir expansión interpretativa innecesaria. Se atendió al único punto potencialmente sensible: «chair» se mantiene sin convertirlo en «trono».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este pasaje porque no aparece ningún nombre divino en el texto.
  - Se usa «libro» siguiendo el audit trail en inglés; no se fuerza «rollo» o «libro» según hábitos de otras traducciones.
  - El saludo se mantiene simple y repetido («salud») para preservar la simetría del diálogo inicial.
