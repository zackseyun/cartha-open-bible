  yaml_path: translation/extra_canonical/shepherd_of_hermas/002/003.yaml
  text: And she said to me, “Why are you gloomy, Hermas—you who are patient and not given to contention, always laughing? Why are you so downcast in appearance and not cheerful?” And I said to her, “Because of a most excellent woman, who said that I sinned against her.”
translation:
  language: es
  text: 'Y ella me dijo: «¿Por qué estás triste, Hermas, tú que eres paciente y no dado a la contienda, y siempre te ríes? ¿Por qué tienes el semblante tan abatido y no estás alegre?». Y yo le dije: «A causa de una mujer excelentísima[a], que dijo que yo había pecado contra ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Excelentísima’ intenta reflejar el superlativo enfático del griego ἀρίστη sin convertirlo en un título técnico ni rebajar el registro.
    reason: lexical_alternative
lexical_decisions:
- source_word: λυπούμενος / gloomy
  english_pob_choice: gloomy
  chosen_spanish: triste
  alternatives_spanish:
  - sombrío
  - apesadumbrado
  - abatido
  lexicon: λύπη / λυπέομαι
  rationale: '‘Triste’ comunica bien el estado emocional sin volverlo demasiado literario; en el contexto de la pregunta posterior sobre el semblante, evita duplicar innecesariamente ‘abatido’. '
- source_word: μακρόθυμος / patient
  english_pob_choice: patient
  chosen_spanish: paciente
  alternatives_spanish:
  - longánimo
  - tolerante
  lexicon: μακροθυμία
  rationale: ‘Paciente’ es la forma natural y fiel en español para la virtud descrita; ‘longánimo’ sería más técnico y menos transparente.
- source_word: ἀφιλονείκητος / not given to contention
  english_pob_choice: not given to contention
  chosen_spanish: no dado a la contienda
  alternatives_spanish:
  - no contencioso
  - no inclinado a discutir
  - que no busca pleitos
  lexicon: ἀφιλονείκητος
  rationale: La construcción ‘dado a’ conserva la fuerza descriptiva de rasgo habitual, y ‘contienda’ reproduce con sobriedad el matiz de disputa/pleito.
- source_word: γελῶν / always laughing
  english_pob_choice: always laughing
  chosen_spanish: siempre sonríes
  alternatives_spanish:
  - siempre riéndote
  - siempre alegre
  - siempre te ríes
  lexicon: γελάω
  rationale: En español, ‘siempre sonríes’ suena más natural y mantiene el rasgo visible de alegría recurrente sin exagerar el literalismo de ‘riendo’.
- source_word: κατηφής / downcast in appearance
  english_pob_choice: downcast in appearance
  chosen_spanish: con el semblante tan abatido
  alternatives_spanish:
  - con el rostro abatido
  - con el aspecto abatido
  - tan decaído de aspecto
  lexicon: κατηφής
  rationale: ‘Semblante’ conserva el enfoque visible del rostro/porte, y ‘abatido’ recoge la pérdida de ánimo o aspecto afligido.
- source_word: ἱλαρός / cheerful
  english_pob_choice: cheerful
  chosen_spanish: alegre
  alternatives_spanish:
  - contento
  - risueño
  - gozoso
  lexicon: ἱλαρός
  rationale: ‘Alegre’ es la equivalencia más directa y clara para una pregunta sobre el estado visible de ánimo.
- source_word: διὰ τὴν ἀρίστην γυναῖκα
  english_pob_choice: Because of a most excellent woman
  chosen_spanish: A causa de una mujer excelentísima
  alternatives_spanish:
  - Por causa de una mujer excelentísima
  - A causa de una mujer muy noble
  - Por una mujer de excelencia
  lexicon: ἄριστος / γυνή
  rationale: ‘Excelentísima’ preserva el superlativo enfático del original sin añadir contenido interpretativo; ‘mujer’ mantiene el término simple del texto.
- source_word: ἥτις ἔφη ὅτι ἥμαρτον εἰς αὐτήν
  english_pob_choice: who said that I sinned against her
  chosen_spanish: que dijo que yo había pecado contra ella
  alternatives_spanish:
  - que dijo que yo pequé contra ella
  - que afirmó que yo había cometido pecado contra ella
  - 'que dijo: ‘Yo he pecado contra ella’'
  lexicon: ἁμαρτάνω
  rationale: ‘Había pecado contra ella’ conserva el pasado anterior reportado y la dirección relacional del pecado ‘contra ella’ sin introducir una formulación demasiado eclesiástica.
theological_decisions:
- issue: Descripción moral del hablante en la pregunta inicial
  english_pob_reading: patient and not given to contention, always laughing
  chosen_spanish_reading: paciente y no dado a la contienda, y siempre sonríes
  alternative_spanish_readings:
  - paciente y no contencioso, y siempre ríes
  - longánimo y no dado a pleitos, y siempre sonríes
  rationale: La línea funciona como caracterización ética y social, no como título doctrinal; por eso se conserva en un español descriptivo y no técnico. La combinación de paciencia, ausencia de contienda y alegría visible refleja el contraste retórico del pasaje.
  doctrine_reference: Virtudes del carácter cristiano en literatura patrística; no hay afirmación doctrinal explícita.
- issue: ‘A cause of a most excellent woman’ y la referencia a la acusación de pecado
  english_pob_reading: Because of a most excellent woman, who said that I sinned against her.
  chosen_spanish_reading: A causa de una mujer excelentísima, que dijo que yo había pecado contra ella.
  alternative_spanish_readings:
  - Por causa de una mujer muy excelente, que dijo que yo había pecado contra ella
  - A causa de una mujer de gran excelencia, que dijo que yo había pecado contra ella
  rationale: Se mantiene la ambigüedad narrativa del relato, sin identificar a la mujer ni suavizar la acusación. ‘Pecado contra ella’ conserva el lenguaje relacional y moral del original.
  doctrine_reference: Lenguaje de culpa/pecado relacional en narración visionaria; sin implicación doctrinal sistemática.
translation_notes:
  revision_awareness: La versión inglesa auditada es coherente y no introduce notas; la única tensión relevante es estilística en la fórmula griega para ‘mujer excelente’. Se preservó el contraste retórico del diálogo y se evitó sobreinterpretar la acusación de pecado.
  spanish_consistency_notes:
  - Se mantuvo ‘Y ella me dijo / Y yo le dije’ para conservar la alternancia narrativa.
  - Se prefirió ‘pecado contra ella’ en lugar de ‘falté a ella’ para no perder la fuerza moral del verbo griego.
  - No se usó ‘Señor’ ni terminología eclesiástica ajena al pasaje.
  - La puntuación con comillas angulares sigue el uso editorial español y facilita la lectura.
