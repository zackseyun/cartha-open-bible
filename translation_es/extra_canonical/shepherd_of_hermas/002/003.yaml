revisions:
- from: 'Y ella me dijo: «¿Por qué estás triste, Hermas; tú que eres paciente y no dado a la contienda, y siempre sonríes? ¿Por qué tienes el semblante tan abatido y no estás alegre?». Y yo le dije: «A causa de una mujer [a]excelentísima, que dijo que yo había pecado contra ella».'
  to: 'Y ella me dijo: «¿Por qué estás triste, Hermas, tú que eres paciente y no dado a la contienda, y siempre te ríes? ¿Por qué tienes el semblante tan abatido y no estás alegre?». Y yo le dije: «A causa de una mujer excelentísima[a], que dijo que yo había pecado contra ella».'
  rationale: Se ajusta γελῶν a ‘siempre te ríes’ para preservar mejor el sentido de ‘always laughing’, y se corrige la puntuación/colocación del vocativo y del marcador de nota al pie para una lectura española más natural sin cambiar el sentido.
