  yaml_path: translation/extra_canonical/shepherd_of_hermas/002/001.yaml
  text: After she had spoken these words, the heavens were shut, and I was wholly trembling and grieving. And I said within myself, “If this sin is charged against me, how will I be able to be saved? Or how shall I make atonement to God for my completed sins? Or with what words shall I ask the Lord, that he may be propitious to me?”
translation:
  language: es
  text: 'Después que ella dijo estas palabras, los cielos se cerraron, y yo quedé completamente temblando y afligido. Y me dije a mí mismo: «Si este pecado se me imputa, ¿cómo podré ser salvo? ¿O cómo haré expiación a Dios por mis pecados ya cometidos? ¿O con qué palabras pediré al Señor que me sea propicio?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ οὐρανοί
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: οὐρανός
  rationale: Mantengo el plural de la imagen celestial presente en el inglés POB y en el griego, sin reducirlo al singular más idiomático cuando el plural conserva mejor el eco bíblico y visionario.
- source_word: ἐκλείσθησαν
  english_pob_choice: were shut
  chosen_spanish: fueron cerrados
  alternatives_spanish:
  - se cerraron
  - fueron clausurados
  lexicon: κλείω
  rationale: «Fueron cerrados» reproduce con sobriedad la pasiva del original y el valor narrativo del inglés POB sin añadir matiz interpretativo.
- source_word: ἐσείσθην ὅλος
  english_pob_choice: I was wholly trembling
  chosen_spanish: quedé todo tembloroso
  alternatives_spanish:
  - estuve completamente temblando
  - me quedé enteramente temblando
  lexicon: σείω
  rationale: Opto por una formulación natural en español que conserva la totalidad de la reacción física/afectiva. «Tembloroso» traduce el estado resultante mejor que una perífrasis más literal.
- source_word: λυπούμενος
  english_pob_choice: grieving
  chosen_spanish: apenado
  alternatives_spanish:
  - afligido
  - entristecido
  lexicon: λυπέω
  rationale: «Apenado» expresa la tristeza interior en un español claro y digno, sin intensificar innecesariamente hacia un dolor más técnico o solemne.
- source_word: λογισάμενος
  english_pob_choice: I said within myself
  chosen_spanish: me dije a mí mismo
  alternatives_spanish:
  - pensé para mis adentros
  - me dije dentro de mí
  lexicon: λογίζομαι
  rationale: La fórmula refleja el acto interior de razonar o decirse a sí mismo que expresa el griego y el inglés POB.
- source_word: ἁμάρτημα
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - falta
  - culpa
  lexicon: ἁμάρτημα
  rationale: «Pecado» es la correspondencia más directa y comprensible en español e integra bien el marco penitencial del pasaje.
- source_word: ἐπιτελεσθείς
  english_pob_choice: completed
  chosen_spanish: ya consumados
  alternatives_spanish:
  - cometidos
  - consumados
  lexicon: τελέω
  rationale: «Ya consumados» conserva la idea de actos ya llevados a término; evita alargar la frase con una paráfrasis, y mantiene el matiz de obra concluida.
- source_word: ἱλάσκεσθαι
  english_pob_choice: make atonement
  chosen_spanish: hacer expiación
  alternatives_spanish:
  - propiciar
  - expiar
  lexicon: ἱλάσκομαι
  rationale: «Hacer expiación» preserva la carga sacrificial y relacional del término sin reducirlo a una sola dimensión. Es más auditable que «propiciar» en este contexto de culpa.
- source_word: εὐπαράδεκτος / propitious
  english_pob_choice: he may be propitious to me
  chosen_spanish: me sea propicio
  alternatives_spanish:
  - me sea favorable
  - me acoja con favor
  lexicon: εὐπαράδεκτος
  rationale: Conserva el lenguaje relacional del favor divino y el eco del inglés POB, con una fórmula natural en español religioso.
theological_decisions:
- issue: La relación entre culpa, expiación y la posibilidad de salvación
  english_pob_reading: If this sin is charged against me, how will I be able to be saved? Or how shall I make atonement to God for my completed sins?
  chosen_spanish_reading: Si este pecado me es cargado, ¿cómo podré ser salvo? ¿O cómo haré expiación a Dios por mis pecados ya consumados?
  alternative_spanish_readings:
  - Si este pecado se me atribuye, ¿cómo podré salvarme?
  - ¿cómo podré obtener perdón?
  rationale: 'Sostengo la secuencia moral-jurídica del original: imputación del pecado, incapacidad de salvarse y necesidad de expiación ante Dios. No sustituyo «expiación» por «perdón», porque el texto no dice simplemente perdón sino un acto de reparación/atonamiento.'
  doctrine_reference: doctrina de pecado, culpa y expiación
- issue: El uso de «Señor» junto a «Dios» en la súplica final
  english_pob_reading: With what words shall I ask the Lord, that he may be propitious to me?
  chosen_spanish_reading: ¿O con qué palabras pediré al Señor, para que me sea propicio?
  alternative_spanish_readings:
  - '...pediré a Yahvé...'
  - '...pediré al Señor Dios...'
  rationale: Conservo «Señor» porque el inglés POB lo hace y el contexto de súplica personal favorece la forma tradicional de address, mientras «Dios» ya aparece explícitamente en la cláusula anterior. No introduzco una sustitución con «Yahvé» aquí, ya que el audit trail inglés no documenta un intento de reconstrucción del nombre divino en esta cola de la oración.
  doctrine_reference: uso reverencial del título divino
translation_notes:
  revision_awareness: El borrador sigue el inglés POB sin añadir notas no ancladas. Se corrigió la validación anterior evitando cualquier marcador de nota no presente en el texto principal; por eso este registro no incluye pie de nota.
  spanish_consistency_notes:
  - Mantengo un registro sobrio y visionario, sin modernizar en exceso la sintaxis.
  - Conservo la tensión entre imputación, expiación y propiciación con vocabulario distinto pero relacionado.
  - Evito «SEÑOR» en mayúsculas como convención de sustitución; aquí «Señor» funciona como tratamiento reverencial dentro de la cita.
  - «Los cielos» preserva el plural visionario del original.
