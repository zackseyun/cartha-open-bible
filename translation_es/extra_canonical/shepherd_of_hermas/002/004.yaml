base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/002/004.yaml
  text: But she said, “By no means does this matter apply to the slave of God. Yet surely a thought concerning her rose up in your heart. For such an intention brings sin upon the slaves of God. For it is an evil and startling intention for a most reverent spirit, and one already proven, if it should desire an evil deed—especially Hermas, the self-controlled one, who abstains from every evil desire and is full of all simplicity and great innocence.”
translation:
  language: es
  text: 'Pero ella dijo: «De ningún modo es eso propio del esclavo[a] de Dios. Sin embargo, sin duda surgió en tu corazón un pensamiento acerca de ella. Porque tal intención trae pecado sobre los esclavos de Dios. Pues es una intención mala y sorprendente para un espíritu[b] sumamente reverente y ya probado, si llegara a desear una acción mala, especialmente Hermas, el de dominio propio, que se abstiene de todo deseo malo y está lleno de simplicidad y de gran inocencia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Esclavo» traduce con fuerza deliberada el valor de δοῦλος; compárese la alternativa tradicional «siervo», pero aquí se conserva el matiz de pertenencia total.
    reason: lexical_alternative
  - marker: b
    text: «Espíritu» puede referirse aquí al estado interior moral de la persona, no al Espíritu Santo ni a un viento o aliento físico.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: slave of God
  chosen_spanish: esclavo de Dios
  alternatives_spanish:
  - siervo de Dios
  - servidor de Dios
  lexicon: δοῦλος
  rationale: La POB inglesa eligió 'slave' por la fuerza léxica del término; en español, 'esclavo' conserva esa contundencia y evita suavizar el vínculo de pertenencia/obediencia. 'Siervo' sería una atenuación tradicional no pedida por el contexto.
- source_word: λογισμός / ἐνθύμημα (idea, pensamiento, intención)
  english_pob_choice: thought / intention
  chosen_spanish: pensamiento / intención
  alternatives_spanish:
  - pensamiento
  - intención
  - propósito
  lexicon: λογισμός
  rationale: 'El contexto une el surgimiento interior con la responsabilidad moral; por eso se mantiene la doble dimensión: ''pensamiento'' para el movimiento interno y ''intención'' para su orientación volitiva, reflejando la tensión del texto fuente.'
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - espíritu
  - aliento
  - ánimo
  lexicon: πνεῦμα
  rationale: Aquí no se trata de viento ni de aliento, sino del estado espiritual/moral de la persona; 'espíritu' conserva el registro religioso y la cualidad interior del griego.
- source_word: ἀπλότης
  english_pob_choice: simplicity
  chosen_spanish: simplicidad
  alternatives_spanish:
  - simplicidad
  - sencillez
  - candor
  lexicon: ἀπλότης
  rationale: '''Simplicidad'' reproduce el valor de pureza e integridad moral que la POB deja en inglés, mientras ''sencillez'' y ''candor'' desplazan el matiz hacia estilo o transparencia afectiva.'
- source_word: ἐγκράτεια / ἐγκρατής
  english_pob_choice: self-controlled
  chosen_spanish: de dominio propio
  alternatives_spanish:
  - templado
  - dueño de sí
  - autocontrolado
  lexicon: ἐγκράτεια
  rationale: La expresión española 'de dominio propio' es idiomática en registro bíblico y conserva la idea de autocontrol moral sin sonar mecánica.
theological_decisions:
- issue: Responsabilidad moral por un pensamiento interior respecto de 'ella'
  english_pob_reading: A thought concerning her rose up in your heart. For such an intention brings sin upon the slaves of God.
  chosen_spanish_reading: Sin embargo, un pensamiento acerca de ella se levantó en tu corazón; tal intención trae pecado sobre los esclavos de Dios.
  alternative_spanish_readings:
  - un pensamiento sobre ella surgió en tu corazón
  - una intención acerca de ella nació en tu corazón
  rationale: Se conserva la vinculación entre interioridad y culpa moral tal como la POB la formula. 'Se levantó' mantiene la imagen dinámica del griego y la responsabilidad no se diluye en una simple ocurrencia mental.
  doctrine_reference: ética de la intención; responsabilidad moral del pensamiento interno
- issue: Descripción moral del sujeto como 'a most reverent spirit, and one already proven'
  english_pob_reading: for a most reverent spirit, and one already proven
  chosen_spanish_reading: para un espíritu sumamente reverente, y ya probado
  alternative_spanish_readings:
  - para un espíritu muy reverente y ya probado
  - para un espíritu de suma reverencia y ya probado
  rationale: 'Se conserva el carácter cualitativo del sujeto: reverente y probado. ''Sumamente reverente'' mantiene el énfasis intensivo del inglés sin convertirlo en una paráfrasis doctrinal.'
  doctrine_reference: formación moral; prueba/aprobación del carácter
- issue: Caracterización final de Hermas como abstinente de todo deseo malo
  english_pob_reading: who abstains from every evil desire and is full of all simplicity and great innocence
  chosen_spanish_reading: que se abstiene de todo deseo malo y está lleno de toda simplicidad y gran inocencia
  alternative_spanish_readings:
  - que se aparta de todo deseo malo y está lleno de toda sencillez y gran inocencia
  - que se abstiene de todo deseo malo y rebosa de simplicidad e inocencia
  rationale: '''Se abstiene'' conserva el hábito disciplinado del sujeto; ''simplicidad'' e ''inocencia'' mantienen el binomio moral sin sobreinterpretarlo. No se suaviza a ''no tiene malas intenciones'', porque el texto es más fuerte.'
  doctrine_reference: ascética moral; pureza de intención y conducta
translation_notes:
  revision_awareness: No se documentan revisiones específicas en el paquete de origen; la redacción sigue la lectura inglesa POB como guía auditada, manteniendo la tensión entre pensamiento interior, intención moral y caracterización del sujeto sin añadir explicaciones ajenas al pasaje.
  spanish_consistency_notes:
  - Se preserva 'Dios' para θεός y no se introduce 'Señor' donde no corresponde.
  - Se mantiene el registro eclesial sobrio, sin sustituir la fuerza de δοῦλος por 'siervo'.
  - Se usa puntuación española con comillas angulares y un guion largo para la incisión final, respetando el flujo del original.
