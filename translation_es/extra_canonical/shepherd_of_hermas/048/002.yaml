  yaml_path: translation/extra_canonical/shepherd_of_hermas/048/002.yaml
  text: '‘How so, sir?’ I say. ‘Make it known to me.’ ‘Listen,’ he says: ‘The rich man has much money, but toward the Lord he is poor, being distracted about his wealth, and he has very little confession and intercession toward the Lord; and what he has is small and feeble, and has no power to go up above. When, therefore, the rich man goes to the needy and supplies him with what is necessary, believing that what he does for the needy he will be able to find as his reward from God—for the needy is rich in intercession [and in confession], and his intercession has great power with God—the rich man supplies the needy with everything without hesitation. And the needy, being supplied by the rich, intercedes for him, giving thanks to God on behalf of the one who gives to him. And that one is still more eager concerning the needy, so that he may be unceasing in his life; for he knows that the intercession of the needy is acceptable and rich before God. Therefore both complete the work: the needy
    performs the intercession in which he is rich, [which he received from the Lord;] this he renders to the Lord for the one who supplies him. And likewise the rich man without hesitation provides to the needy the wealth which he received from the Lord. And this is a great work and acceptable with God, because he understood concerning his wealth and worked for the needy out of the gifts of the Lord and fulfilled the Lord’s ministry rightly. Therefore, among people the elm seems not to bear fruit; and they do not know nor understand that, if there should be a drought, the elm, having water, nourishes the vine, and the vine, having unceasing water, gives double fruit, both for itself and for the elm. In the same way also the needy, interceding with the Lord on behalf of the rich...'
translation:
  language: es
  text: '—¿Cómo es eso, señor? —digo yo—. Hágamelo saber. —Escucha —dice él—: el rico tiene mucho dinero, pero para con el Señor es pobre, porque está distraído por su riqueza; y tiene muy poca confesión[a] e intercesión hacia el Señor, y lo que tiene es poco y débil, y no tiene poder para subir a lo alto. Cuando, pues, el rico va al necesitado y le provee lo necesario, creyendo que lo que hace por el necesitado podrá hallarlo como recompensa de parte de Dios —porque el necesitado es rico en intercesión [y en confesión], y su intercesión tiene gran poder delante de Dios—, el rico provee al necesitado de todo sin vacilar. Y el necesitado, al ser provisto por el rico, intercede por él, dando gracias a Dios en favor de quien le da. Y aquel se muestra todavía más diligente con respecto al necesitado, para que no le falte nada en su vida; pues sabe que la intercesión del necesitado es aceptable y rica delante de Dios. Por tanto, ambos completan la obra: el necesitado realiza la intercesión en
    la que es rico, [la cual recibió del Señor;] esta la ofrece al Señor por quien lo provee. Y del mismo modo el rico, sin vacilar, entrega al necesitado las riquezas que recibió del Señor. Y esta es una gran obra y aceptable ante Dios, porque entendió el sentido de sus riquezas y trabajó para el necesitado a partir de los dones del Señor, y cumplió rectamente el ministerio del Señor. Por eso, entre los hombres el olmo parece no dar fruto; y no saben ni entienden que, si hubiera sequía, el olmo, teniendo agua, alimenta a la vid, y la vid, teniendo agua incesante, da fruto doble, tanto para sí misma como para el olmo. Del mismo modo también el necesitado, intercediendo ante el Señor en favor del rico...'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La tradición textual y la redacción paralela sugieren que aquí 'confesión' puede abarcar también la idea de alabanza o reconocimiento verbal; se mantiene el término abierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλούσιος / πλοῦτος
  english_pob_choice: rich / wealth
  chosen_spanish: rico / riquezas
  alternatives_spanish:
  - adinerado / dinero
  - acaudalado / bienes
  lexicon: No se inventa número de entrada; decisión contextual de léxico social-económico.
  rationale: La POB inglesa mantiene la oposición rica/wealth sin suavizarla. En español, "rico" y "riquezas" conservan el contraste semántico y la carga relacional del pasaje mejor que alternativas más explicativas.
- source_word: πένης / ὁ πένης
  english_pob_choice: the needy
  chosen_spanish: el necesitado
  alternatives_spanish:
  - el pobre
  - el menesteroso
  lexicon: No se inventa número de entrada; decisión contextual de léxico social-económico.
  rationale: '"Necesitado" reproduce la relación funcional del texto, que no es solo carencia económica sino dependencia concreta para recibir ayuda y devolver intercesión. "Pobre" sería inteligible, pero menos preciso para el intercambio descrito.'
- source_word: προσευχή / ἱκεσία / ἐντευξις (intercession language)
  english_pob_choice: intercession
  chosen_spanish: intercesión
  alternatives_spanish:
  - súplica
  - ruego
  lexicon: No se inventa número de entrada; decisión de registro eclesial transparente.
  rationale: La tradición de la POB usa "intercesión" para este campo léxico; en español es exacto y suficientemente transparente. Se mantiene también la idea de eficacia delante de Dios sin litigarla con sinónimos más débiles.
- source_word: ἐξομολόγησις
  english_pob_choice: confession
  chosen_spanish: confesión
  alternatives_spanish:
  - reconocimiento
  - alabanza
  lexicon: No se inventa número de entrada; término con posible ambivalencia de alabanza/confesión.
  rationale: El texto inglés conserva "confession"; en español "confesión" preserva la tensión posible entre confesión verbal y acción de reconocimiento. Se deja la frase entre corchetes en el texto, como en el audit trail, para no cerrar indebidamente la lectura.
- source_word: ἀναβαίνειν / ἄνω
  english_pob_choice: go up above
  chosen_spanish: subir arriba
  alternatives_spanish:
  - ascender
  - subir al cielo
  lexicon: No se inventa número de entrada; giro espacial conservado con naturalidad española.
  rationale: Aunque suena enfático, "subir arriba" refleja la redundancia del original y de la versión inglesa sin convertirla en una interpretación teológica más específica.
- source_word: χάρις / δωρεά
  english_pob_choice: gifts of the Lord
  chosen_spanish: los dones del Señor
  alternatives_spanish:
  - los regalos del Señor
  - las dádivas del Señor
  lexicon: No se inventa número de entrada; opción idiomática y reverente.
  rationale: '"Dones" es el equivalente español más natural en registro bíblico para bienes recibidos de Dios sin perder el matiz de don gratuito.'
theological_decisions:
- issue: La pobreza delante del Señor se define por distracción por las riquezas y escasez de intercesión/confesión, no por mera falta material.
  english_pob_reading: toward the Lord he is poor, being distracted about his wealth
  chosen_spanish_reading: delante del Señor es pobre, porque está distraído por sus bienes
  alternative_spanish_readings:
  - ante el Señor es pobre, por estar preocupado por su riqueza
  - para el Señor es pobre, al distraerse con sus riquezas
  rationale: Se mantiene la relación moral/espiritual del contraste sin convertirla en simple denuncia económica. "Delante del Señor" conserva la orientación relacional del texto.
  doctrine_reference: Espiritualidad de la limosna e intercesión en la literatura patrística; no se formula doctrina normativa ajena al pasaje.
- issue: La eficacia de la intercesión del necesitado se presenta como real y grande delante de Dios, no meramente simbólica.
  english_pob_reading: his intercession has great power with God
  chosen_spanish_reading: su intercesión tiene gran poder delante de Dios
  alternative_spanish_readings:
  - su intercesión es muy eficaz ante Dios
  - su ruego tiene gran fuerza ante Dios
  rationale: '"Gran poder" reproduce la audacia del original y de la POB inglesa. No se atenúa a "eficaz" porque el texto afirma una potencia efectiva, no solo resultados prácticos.'
  doctrine_reference: Doctrina práctica de la oración/intercesión en clave moral, sin implicar mediación sustitutiva.
- issue: 'La obra es recíproca: el rico da bienes materiales; el necesitado devuelve intercesión y gratitud.'
  english_pob_reading: Therefore both complete the work
  chosen_spanish_reading: Por tanto, ambos completan la obra
  alternative_spanish_readings:
  - Así ambos llevan a cabo la obra
  - De modo que los dos cumplen la obra
  rationale: 'Se conserva la simetría ética del pasaje: dos actos complementarios, no dos méritos competitivos.'
  doctrine_reference: Ética de reciprocidad caritativa en la tradición cristiana primitiva.
- issue: La comparación del olmo y la vid se conserva como imagen de beneficio mutuo, sin explicitar alegoría adicional.
  english_pob_reading: the elm seems not to bear fruit; ... the vine, having unceasing water, gives double fruit
  chosen_spanish_reading: el olmo parece no dar fruto... la vid... da fruto doble
  alternative_spanish_readings:
  - el olmo parece infructuoso... la vid produce doble fruto
  rationale: No se añade interpretación externa. Se mantiene la imagen agrícola como analogía final del intercambio entre rico y necesitado.
  doctrine_reference: Uso de imágenes naturales para ilustrar la взаимidad de la caridad.
translation_notes:
  revision_awareness: No se registran revisiones previas aplicadas en el paquete. La formulación sigue la lectura inglesa auditada y conserva los corchetes donde el texto transmitido ya muestra incertidumbre o adición discutida ([y en confesión], [la cual recibió del Señor;]).
  spanish_consistency_notes:
  - Se usa "delante de Dios / del Señor" de manera consistente para conservar la orientación relacional del original y de la POB inglesa.
  - Se mantiene "intercesión" como término técnico uniforme; no se alterna con "ruego" o "súplica" dentro del pasaje.
  - Se preserva "rico / riquezas" y "necesitado" para sostener la antítesis y la dinámica de intercambio.
  - Se conserva el estilo de discurso directo con incisos y puntos y coma para reflejar la estructura discursiva del texto fuente.
