review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego según la auditoría inglesa: contrasta al rico y al necesitado, mantiene la lógica de reciprocidad entre bienes materiales e intercesión, y conserva la imagen final del olmo y la vid. Sin embargo, hay varios puntos donde el español se aparta de la fuerza o naturalidad del original/POB: el imperativo singular se volvió plural (''Escuchen''), la petición inicial quedó poco natural (''Háganmelo saber''), ''subir arriba'' suena torpe en español, y ''para que este no cese en su vida'' no expresa bien el sentido de continuidad/no interrupción del vivir del necesitado. También conviene ajustar ''delante del Señor'' en un lugar a ''hacia el Señor'' o ''para con el Señor'' para reflejar mejor la orientación relacional de πρὸς/English ''toward the Lord''.'
  spanish_quality_summary: El registro es mayormente digno y legible, pero con algunos calcos ingleses o giros poco idiomáticos. 'Dímelo' o 'Hágamelo saber' encaja mejor que 'Háganmelo saber'; 'Escucha' concuerda con el interlocutor singular; 'subir hasta arriba' o mejor 'subir a lo alto' evita una torpeza literal; y 'para que no le falte nada en su vida' o 'para que su vida no carezca' expresa mejor la idea que la redacción actual. En general, el texto necesita una corrección menor para sonar natural sin perder fidelidad.
  glossary_alignment: 'La terminología clave está bien encaminada: ''rico'', ''necesitado'', ''intercesión'', ''confesión'', ''dones del Señor''. No hay conflicto con los defaults del proyecto. La nota sobre ''confesión'' es defendible, aunque el anclaje podría asociarse más directamente a ''confesión'' que a ''intercesión''; aun así, basta con conservar la nota y el marcador en el lugar relevante del sintagma. Se mantiene ''Señor'' porque aquí no hay base para sustituir por ''Yahvé'' en un texto griego patrístico.'
  issues:
  - severity: medium
    issue: Cambio de número/persona en el discurso directo
    rationale: 'El borrador dice ''Escuchen'', pero el diálogo es singular (''How so, sir?... Listen, he says''). Debe ir en singular: ''Escucha''.'
  - severity: medium
    issue: Petición inicial poco natural en español
    rationale: '''Háganmelo saber'' introduce plural y suena forzado. El sentido es singular y directo: ''Hágamelo saber'' o ''Dímelo''/''Explíquemelo''.'
  - severity: medium
    issue: Calco torpe en 'subir arriba'
    rationale: Aunque el inglés conserva redundancia, en español la expresión resulta demasiado dura. 'Subir a lo alto' mantiene el movimiento ascendente sin introducir una interpretación teológica extra.
  - severity: medium
    issue: 'Frase oscura: ''para que este no cese en su vida'''
    rationale: No comunica claramente el sentido del inglés 'so that he may be unceasing in his life'. En contexto, se refiere a procurar que al necesitado no le falte sustento/continuidad de vida. Hace falta una formulación española comprensible.
  - severity: low
    issue: Matiz relacional de 'toward the Lord'
    rationale: '''Delante del Señor'' puede funcionar, pero en ''he is poor toward the Lord'' la orientación relacional se expresa mejor como ''para con el Señor'' o ''hacia el Señor''.'
