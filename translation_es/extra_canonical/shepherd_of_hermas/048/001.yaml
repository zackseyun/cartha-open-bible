  to: Porque para este fin el Amo los ha hecho ricos, para que lleven a cabo para él estos ministerios; es mucho mejor comprar tales campos [y fincas] y casas, que encontrarán en su ciudad cuando lleguen a ella. Este lujo es bueno y alegre, sin tristeza ni temor, sino con gozo. Así que no practiquen el lujo de las naciones, porque no les es provechoso a ustedes, esclavos de Dios. Más bien, practiquen su propio lujo, en el cual pueden alegrarse. Porque todo lujo de esta clase es provechoso. Pero el lujo de las naciones es amargo y áspero. Esta parábola, entonces, se presenta ante los esclavos de Dios, para los pobres y para los ricos.
  rationale: Se ajustó 'the Master' a 'el Amo' para preservar la relación de autoridad/posesión del contexto; se reemplazó el registro peninsular por formas neutrales; y se pulieron dos frases poco idiomáticas ('cuando lleguen a ella', 'se presenta ante') sin alterar el contenido. No se requieren notas nuevas.
