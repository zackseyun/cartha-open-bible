review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego y del POB inglés: finalidad de la riqueza dada por el amo/señor, contraste entre un uso bueno de los bienes y el ''lujo de las naciones'', conservación de δοῦλοι como ''esclavos'', y cierre dirigido tanto a pobres como a ricos. Sin embargo, hay varios puntos donde la redacción española no preserva con suficiente precisión o naturalidad el valor del original auditado.'
  spanish_quality_summary: El texto es generalmente claro, pero mezcla un registro peninsular ('os', 'vuestra', 'practiquéis') con la guía de español neutral latinoamericano/broadly church-readable. Además, 'se pone delante de' suena poco natural, y 'cuando entréis en ella' es pesado. Conviene ajustar a un español más neutral y fluido sin perder literalidad.
  glossary_alignment: Buena alineación en 'esclavos de Dios', 'Dios', 'ministerios' y el mantenimiento de 'lujo' por coherencia con el POB inglés. No obstante, 'ὁ κύριος / the Master' se tradujo como 'el Señor', lo que en español eclesial puede deslizarse hacia título divino más que hacia 'amo/master' del contexto. 'el Amo' preserva mejor la relación de posesión/autoridad aquí. También conviene evitar el voseo/vosotros para cumplir el perfil de español neutral.
  issues:
  - severity: medium
    issue: '''el Señor'' para ὁ κύριος / the Master'
    rationale: Aunque es eclesialmente natural, en este contexto 'the Master' enfatiza señorío doméstico/propietario sobre esclavos. 'el Señor' en español puede sonar como título divino convencional y desdibujar la imaginería de amo-esclavos que el pasaje retiene.
  - severity: medium
    issue: Uso de segunda persona plural peninsular
    rationale: Formas como 'os', 'vuestra', 'podáis', 'practiquéis' no encajan con el objetivo de español neutral latinoamericano. Puede resolverse con formulaciones impersonales o plurales neutrales ('los ha hecho ricos', 'su ciudad', 'no practiquen').
  - severity: low
    issue: '''se pone delante de'' es calco poco natural'
    rationale: Para 'This parable, then, is set before...' una opción como 'se presenta' o 'queda expuesta ante' suena más idiomática y fiel en español moderno.
  - severity: low
    issue: '''cuando entréis en ella'' y repetición posesiva'
    rationale: La frase es comprensible pero pesada. 'cuando lleguen a ella' o 'al llegar a ella' mejora la naturalidad manteniendo el sentido.
