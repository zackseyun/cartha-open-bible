base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/048/001.yaml
  text: For to this end the Master has made you rich, that you might carry out these ministries for him; it is far better to buy such fields [and estates] and houses, which you will find in your city when you arrive in it. This luxury is good and cheerful, having no grief nor fear, but having joy. So do not practice the luxury of the nations; for it is unprofitable for you, the slaves of God. Rather practice your own luxury, in which you are able to rejoice. For all luxury of this kind is profitable. But the luxury of the nations is bitter and harsh. This parable, then, is set before the slaves of God, for the poor and the rich.
translation:
  language: es
  text: Porque para este fin el Amo los ha hecho ricos, para que lleven a cabo para él estos ministerios; es mucho mejor comprar tales campos [y fincas] y casas, que encontrarán en su ciudad cuando lleguen a ella. Este lujo es bueno y alegre, sin tristeza ni temor, sino con gozo. Así que no practiquen el lujo de las naciones, porque no les es provechoso a ustedes, esclavos de Dios. Más bien, practiquen su propio lujo, en el cual pueden alegrarse. Porque todo lujo de esta clase es provechoso. Pero el lujo de las naciones es amargo y áspero. Esta parábola, entonces, se presenta ante los esclavos de Dios, para los pobres y para los ricos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ κύριος / the Master
  english_pob_choice: the Master
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Amo
  - el Maestro
  lexicon: κύριος
  rationale: En español, 'el Señor' comunica con naturalidad la autoridad del dueño/amo en un registro eclesial legible. 'Amo' suena más áspero y más restrictivo; 'Maestro' desplaza el sentido hacia enseñanza, no hacia posesión o autoridad sobre siervos.
- source_word: πλούσιος / made you rich
  english_pob_choice: has made you rich
  chosen_spanish: os ha hecho ricos
  alternatives_spanish:
  - os ha enriquecido
  - os ha vuelto ricos
  lexicon: πλουτίζω
  rationale: Conserva el verbo de agencia divina y el resultado de riqueza material. 'Enriquecido' es posible, pero 'os ha hecho ricos' mantiene la transparencia del enunciado y su contraste con los pobres y los ricos al final.
- source_word: λειτουργίας / these ministries
  english_pob_choice: these ministries
  chosen_spanish: estos ministerios
  alternatives_spanish:
  - estos servicios
  - estas tareas
  lexicon: λειτουργία
  rationale: '''Ministerios'' refleja el campo semántico de servicio religioso/público que el texto desarrolla. ''Servicios'' sería más general y perdería el matiz formal de encargo.'
- source_word: ἀγροὺς καὶ οἰκίας / fields [and estates] and houses
  english_pob_choice: such fields [and estates] and houses
  chosen_spanish: tales campos [y fincas] y casas
  alternatives_spanish:
  - tales campos [y propiedades] y casas
  - tales terrenos [y fincas] y casas
  lexicon: ἀγρός / οἰκία
  rationale: '''Campos'' reproduce el término concreto; ''fincas'' mantiene la aclaración entre corchetes del inglés auditado para el lector moderno. ''Casas'' se conserva literalmente.'
- source_word: ἡδονὴ / luxury
  english_pob_choice: luxury
  chosen_spanish: lujo
  alternatives_spanish:
  - placer
  - deleite
  lexicon: ἡδονή
  rationale: Se sigue la elección del POB inglés de 'luxury', que aquí no significa simple consumo elegante sino una vida de gozo/abundancia. 'Lujo' permite mantener la repetición retórica del pasaje.
- source_word: οὐ λύπη οὐδὲ φόβος / having no grief nor fear
  english_pob_choice: having no grief nor fear
  chosen_spanish: sin tristeza ni temor
  alternatives_spanish:
  - sin dolor ni temor
  - sin aflicción ni temor
  lexicon: λύπη / φόβος
  rationale: '''Tristeza'' captura el efecto afectivo de λύπη de modo natural en español; ''temor'' corresponde directamente a φόβος.'
- source_word: οὐ συμφέρει / it is unprofitable
  english_pob_choice: it is unprofitable
  chosen_spanish: no os aprovecha
  alternatives_spanish:
  - no os es provechoso
  - no os beneficia
  lexicon: συμφέρει
  rationale: Se conserva la idea de utilidad/provecho, con una formulación idiomática en español. 'No os aprovecha' refleja bien el valor práctico y relacional del verbo.
- source_word: δοῦλοι τοῦ θεοῦ / the slaves of God
  english_pob_choice: the slaves of God
  chosen_spanish: esclavos de Dios
  alternatives_spanish:
  - siervos de Dios
  lexicon: δοῦλος
  rationale: Se mantiene la fuerza lexical de δοῦλος sin suavizarla a 'siervos', en continuidad con el inglés POB y con la instrucción de no diluir el término.
- source_word: καρποφόρος / profitable
  english_pob_choice: profitable
  chosen_spanish: provechoso
  alternatives_spanish:
  - fructífero
  - útil
  lexicon: καρποφόρος
  rationale: '''Provechoso'' conserva el sentido de ganancia o beneficio espiritual/material. ''Fructífero'' sería posible, pero en español sonaría más metafórico y menos directo aquí.'
- source_word: πικρὸν καὶ αὐστηρόν / bitter and harsh
  english_pob_choice: bitter and harsh
  chosen_spanish: amargo y áspero
  alternatives_spanish:
  - amargo y severo
  - amargo y duro
  lexicon: πικρός / αὐστηρός
  rationale: '''Amargo y áspero'' reproduce el contraste sensorial y moral del griego con una pareja natural en español. ''Severo'' pierde la dimensión de aspereza.'
theological_decisions:
- issue: Conservar la tensión entre riqueza concedida por Dios y el uso correcto de esa riqueza
  english_pob_reading: The Master has made you rich ... it is far better to buy ... fields and houses
  chosen_spanish_reading: el Señor os ha hecho ricos ... mucho mejor es comprar ... campos [y fincas] y casas
  alternative_spanish_readings:
  - Dios os ha hecho ricos ...
  - el Maestro os ha hecho ricos ...
  rationale: El pasaje no condena la posesión sino su uso al servicio de Dios. 'El Señor' mantiene una referencia reverente y funcional sin borrar que el texto atribuye la riqueza a una autoridad superior. La formulación mantiene explícita la finalidad ministerial y la preferencia por adquirir bienes útiles.
  doctrine_reference: Stewardship / mayordomía cristiana; riqueza como encargo para el servicio
- issue: Mantener la auto-designación social de los creyentes como esclavos de Dios
  english_pob_reading: the slaves of God
  chosen_spanish_reading: esclavos de Dios
  alternative_spanish_readings:
  - siervos de Dios
  - servidores de Dios
  rationale: 'La dureza del término es parte del argumento del texto: el lujo mundano no conviene a quienes pertenecen a Dios. Suavizarlo eliminaría una tensión retórica y social que el griego y el POB inglés preservan.'
  doctrine_reference: Cristología y señorío divino; identidad de pertenencia
- issue: Interpretar 'lujo' como categoría moral positiva o negativa según el referente
  english_pob_reading: This luxury is good and cheerful ... do not practice the luxury of the nations
  chosen_spanish_reading: Este lujo es bueno y alegre ... no practiquéis el lujo de las naciones
  alternative_spanish_readings:
  - Este deleite es bueno y alegre ...
  - esta vida de lujo es buena y alegre ...
  rationale: El texto distingue entre un 'lujo' propio, permitido y gozoso, y el 'lujo de las naciones', amargo y dañino. 'Lujo' se conserva para preservar la repetición y la antítesis; el contexto evita una lectura meramente consumista.
  doctrine_reference: Ética de separación y uso legítimo de los bienes
- issue: Conservar el cierre inclusivo para pobres y ricos
  english_pob_reading: for the poor and the rich
  chosen_spanish_reading: para los pobres y para los ricos
  alternative_spanish_readings:
  - para pobres y ricos
  - para los pobres y los ricos
  rationale: La redundancia preposicional ayuda a sonar natural y a reflejar la amplitud retórica del texto, que aplica la parábola a ambos estados sociales sin excepción.
  doctrine_reference: Universalidad pastoral de la instrucción
translation_notes:
  revision_awareness: Revisado para corregir el problema anterior de marcadores de nota sin anclaje. Esta versión no incluye notas al pie, de modo que no hay marcadores huérfanos ni referencias no ancladas. También se ajustó 'el Señor' para reflejar el lenguaje reverente esperado en español sin introducir una nota innecesaria.
  spanish_consistency_notes:
  - Se mantuvo 'esclavos de Dios' de forma consistente en toda la sección.
  - '''Lujo'' se usó de manera uniforme para conservar la repetición retórica del original y del POB inglés.'
  - Se preservó la distinción entre bienes concretos ('campos', 'casas') y la aclaración editorial entre corchetes ('fincas').
  - La puntuación y el orden de cláusulas siguen una estructura solemne y legible en español contemporáneo.
