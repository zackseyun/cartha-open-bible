  text: 'Now the beast had four colors on its head: black, then fiery and blood-red, then golden, then white.'
translation:
  language: es
  text: 'Ahora la bestia tenía cuatro colores en la cabeza: negro, luego rojo de fuego y de sangre, después dorado y luego blanco.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θηρίον / beast
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - animal
  - fiera
  lexicon: —
  rationale: «Bestia» conserva el valor descriptivo y simbólico de la figura sin suavizarla; «animal» sería demasiado genérico y «fiera» añade un matiz no exigido por el griego ni por la lectura inglesa.
- source_word: χρώματα / colors
  english_pob_choice: colors
  chosen_spanish: colores
  alternatives_spanish:
  - tonos
  - matices
  lexicon: —
  rationale: El término directo «colores» comunica con claridad la enumeración visual del texto; «tonos» o «matices» serían más interpretativos.
- source_word: ἐπὶ τῆς κεφαλῆς / on its head
  english_pob_choice: on its head
  chosen_spanish: en la cabeza
  alternatives_spanish:
  - sobre su cabeza
  - en su cabeza
  lexicon: —
  rationale: «En la cabeza» es natural en español y mantiene la localización del rasgo sin añadir solemnidad innecesaria.
- source_word: μέλαν / black
  english_pob_choice: black
  chosen_spanish: negro
  alternatives_spanish:
  - oscuro
  lexicon: —
  rationale: «Negro» es la equivalencia directa y precisa; «oscuro» atenúa el color específico.
- source_word: πυρρὸν καὶ αἱματώδες / fiery and blood-red
  english_pob_choice: fiery and blood-red
  chosen_spanish: rojo ígneo y sanguíneo
  alternatives_spanish:
  - rojo de fuego y de sangre
  - ardiente y rojo sangre
  lexicon: —
  rationale: La duplicación adjetival del griego pide conservar ambos matices. «Ígneo» refleja el componente de fuego; «sanguíneo» preserva el de sangre sin reducirlo a una sola imagen.
- source_word: χρυσούν / golden
  english_pob_choice: golden
  chosen_spanish: dorado
  alternatives_spanish:
  - de oro
  - áureo
  lexicon: —
  rationale: «Dorado» es claro y idiomático en español contemporáneo; «áureo» sería más literario y «de oro» más pesado en la enumeración.
- source_word: λευκόν / white
  english_pob_choice: white
  chosen_spanish: blanco
  alternatives_spanish:
  - albo
  lexicon: —
  rationale: «Blanco» es la forma más natural y fiel para el color final de la serie.
theological_decisions:
- issue: Descripción simbólica de los colores de la bestia
  english_pob_reading: The English keeps a straightforward visual rendering without interpretive expansion.
  chosen_spanish_reading: La española mantiene la enumeración visual sin explicar su simbolismo.
  alternative_spanish_readings:
  - Añadir una nota explicativa sobre el simbolismo de los colores
  - Parafrasear los colores como rasgos morales
  rationale: El texto fuente presenta una observación descriptiva; ampliar su sentido sería ir más allá de lo warrantado. La traducción conserva la tensión simbólica para la lectura y la anotación posteriores.
  doctrine_reference: Hermas, Vision 4, section i; descriptive apocalyptic imagery
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; se traduce directamente desde el griego normalizado, tomando la versión inglesa como control de equivalencia semántica general.
  spanish_consistency_notes:
  - Se usa «bestia» para conservar el referente apocalíptico sin suavizarlo.
  - 'Se mantiene la serie cromática en orden textual: negro, rojo ígneo y sanguíneo, dorado, blanco.'
  - Se evita introducir artículos o conectores que alteren la cadencia enumerativa del original.
