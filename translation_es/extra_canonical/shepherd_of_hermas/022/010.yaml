review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura básica del griego y del inglés POB: la bestia tiene cuatro colores en la cabeza y la secuencia cromática está preservada. Sin embargo, la formulación del segundo color, «rojo ígneo y sanguíneo», suena menos natural y menos fiel al emparejamiento descriptivo «fiery and blood-red» que una opción más transparente en español.'
  spanish_quality_summary: El texto es claro, pero la serie enumerativa queda algo pesada por repetir «luego» tres veces y por la combinación «rojo ígneo y sanguíneo», que resulta técnica y poco idiomática para lectura eclesial general. Una leve mejora estilística produce un español más natural sin apartarse del original.
  glossary_alignment: No hay términos del glosario principal en juego salvo la preferencia general por equivalencias directas. «Bestia», «colores», «dorado» y «blanco» están bien. La única decisión léxica que conviene ajustar es πυρρὸν καὶ αἱματώδες, para reflejar mejor los dos matices visuales en español común.
  issues:
  - severity: medium
    issue: «rojo ígneo y sanguíneo» es poco idiomático
    rationale: Aunque intenta conservar ambos matices, «sanguíneo» en español suele asociarse a temperamento o a lo relativo a la sangre, no de manera tan natural a un color visual. «Rojo de fuego y de sangre» o similar comunica mejor la imagen original.
  - severity: low
    issue: La repetición de «luego» en toda la lista suena algo mecánica
    rationale: No es infiel, pero una enumeración con «después» en la segunda repetición o una puntuación más natural mejora la fluidez sin cambiar el sentido.
  revised_spanish_text: 'Ahora la bestia tenía cuatro colores en la cabeza: negro, luego rojo de fuego y de sangre, después dorado y luego blanco.'
  revision_rationale: Se ajusta únicamente la expresión del segundo color para que preserve con mayor naturalidad en español los dos matices del griego y del inglés POB («de fuego» y «de sangre»). También se aligera ligeramente la enumeración para mejorar la legibilidad sin alterar la secuencia descriptiva.
