  rationale: Se ajusta únicamente la expresión del segundo color para que preserve con mayor naturalidad en español los dos matices del griego y del inglés POB («de fuego» y «de sangre»). También se aligera ligeramente la enumeración para mejorar la legibilidad sin alterar la secuencia descriptiva.
