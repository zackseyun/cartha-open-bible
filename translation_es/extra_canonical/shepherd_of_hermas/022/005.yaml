base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/022/005.yaml
  text: I went on a little, brothers, and behold, I see dust rising as if to the sky, and I began to say within myself, “Perhaps cattle are coming and stirring up dust?” For it was about a stadion away from me.
translation:
  language: es
  text: 'Avancé un poco, hermanos, y vi que se levantaba polvo como hasta el cielo, y comencé a decirme a mí mismo: «¿Quizá viene ganado y está levantando polvo?». Porque estaba como a un estadio de distancia de mí.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προῆλθον μικρόν
  english_pob_choice: I went on a little
  chosen_spanish: Avancé un poco
  alternatives_spanish:
  - Seguí adelante un poco
  - Caminé un poco más
  lexicon: προέρχομαι / μικρόν
  rationale: Expresa avance espacial breve con naturalidad en español, sin cargarlo de matiz interpretativo adicional.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - amados hermanos
  lexicon: ἀδελφοί
  rationale: Conserva la forma vocativa fraternal directa del griego y la decisión inglesa, sin añadir género inclusivo no explícito en el texto.
- source_word: σκόνην ἀναβαίνουσαν ὡς εἰς τὸν οὐρανόν
  english_pob_choice: I see dust rising as if to the sky
  chosen_spanish: vi que se levantaba polvo como si fuera hasta el cielo
  alternatives_spanish:
  - vi subir polvo como hasta el cielo
  - vi polvo que ascendía como hasta el cielo
  lexicon: σκόνη / ἀναβαίνω / ὡς εἰς τὸν οὐρανόν
  rationale: Mantiene la imagen visual de polvo elevándose con comparación aproximada, preservando el carácter perceptivo de la escena.
- source_word: εἶπον ἐμαυτῷ
  english_pob_choice: I began to say within myself
  chosen_spanish: comencé a decirme a mí mismo
  alternatives_spanish:
  - empecé a decirme para mis adentros
  - me dije a mí mismo
  lexicon: λέγω + ἐμαυτῷ
  rationale: Reproduce el movimiento reflexivo interno del hablante de manera idiomática y clara en español.
- source_word: βόες ἔρχονται καὶ ταράσσουσι τὴν σκόνην
  english_pob_choice: Perhaps cattle are coming and stirring up dust?
  chosen_spanish: ¿Quizá vienen animales y están levantando el polvo?
  alternatives_spanish:
  - ¿Quizá vienen reses y están alborotando el polvo?
  - ¿Tal vez vienen ganados y levantan el polvo?
  lexicon: βόες / ταράσσω / σκόνη
  rationale: βόες designa literalmente ganado vacuno, pero en español 'animales' comunica el sentido general sin forzar un término demasiado técnico; 'levantando el polvo' conserva la imagen del movimiento provocado.
- source_word: σταδίου ἦν ἀπέχον ἀπ’ ἐμοῦ
  english_pob_choice: For it was about a stadion away from me
  chosen_spanish: Porque estaba a la distancia de un estadio de mí
  alternatives_spanish:
  - Porque estaba a unos mil ochocientos pies de mí
  - Pues estaba como a un estadio de distancia
  lexicon: στάδιον
  rationale: Conserva la medida antigua 'estadio' para respetar la concreción del original; 'de mí' mantiene la relación espacial simple del griego.
theological_decisions:
- issue: Modo de percepción y autocorrección narrativa
  english_pob_reading: I see ... I began to say within myself
  chosen_spanish_reading: vi ... comencé a decirme a mí mismo
  alternative_spanish_readings:
  - veo ... empecé a decirme
  - vi ... me dije a mí mismo
  rationale: La escena es descriptiva y no doctrinal; se conserva la secuencia perceptiva e introspectiva sin convertirla en una formulación más interpretativa.
  doctrine_reference: Narrative immediacy; no doctrinal claim
- issue: Referencia a 'cattle' versus valor semántico más amplio
  english_pob_reading: Perhaps cattle are coming
  chosen_spanish_reading: ¿Quizá vienen animales?
  alternative_spanish_readings:
  - ¿Quizá vienen reses?
  - ¿Quizá viene ganado?
  rationale: El griego literal alude a ganado vacuno, pero en español un término más general puede evitar una restricción innecesaria cuando el contexto describe el polvo y la distancia, no la especie exacta. Se preserva la incertidumbre del hablante.
  doctrine_reference: Lexical ambiguity in narrative detail
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete. La redacción española se elaboró directamente desde el griego normalizado con la traducción inglesa como contexto de auditoría, sin dependencia mecánica de la sintaxis inglesa.
  spanish_consistency_notes:
  - Se conserva 'estadio' como medida antigua coherente con el registro del texto.
  - Se mantiene 'hermanos' como vocativo fraternal directo.
  - Se evita capitalizar 'polvo' o 'cielo' por tratarse de sustantivos comunes en contexto narrativo.
