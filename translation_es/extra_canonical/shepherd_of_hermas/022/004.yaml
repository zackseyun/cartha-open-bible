base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/022/004.yaml
  text: 'And while I was glorifying and giving thanks to him, something like the sound of a voice answered me: “Do not be double-minded, Hermas.” I began to reason within myself and say, “What do I have to be double-minded about, being so firmly established by the Lord and having seen glorious things?”'
translation:
  language: es
  text: 'Y mientras yo lo glorificaba y le daba gracias, algo como el sonido de una voz me respondió: «No seas de doble ánimo, Hermas». Yo empecé a razonar dentro de mí y a decir: «¿Qué tengo yo para ser de doble ánimo, estando tan firmemente establecido por el Señor y habiendo visto cosas gloriosas?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: glorifying and giving thanks
  english_pob_choice: glorifying and giving thanks
  chosen_spanish: lo glorificaba y le daba gracias
  alternatives_spanish:
  - lo alababa y le daba gracias
  - lo glorificaba y daba gracias
  lexicon: δοξάζω / εὐχαριστέω
  rationale: 'Conservo dos acciones coordinadas: glorificar y dar gracias. En español, «glorificaba» mantiene la relación de honra hacia Dios, y «le daba gracias» expresa con naturalidad εὐχαριστέω sin reducirlo a una simple alabanza.'
- source_word: something like the sound of a voice
  english_pob_choice: something like the sound of a voice
  chosen_spanish: algo como el sonido de una voz
  alternatives_spanish:
  - como el sonido de una voz
  - algo semejante al sonido de una voz
  lexicon: φωνὴ / ὡς
  rationale: La formulación conserva la comparación sin decidir de manera excesiva si se trató de una voz plenamente articulada o de un sonido semejante a una voz.
- source_word: double-minded
  english_pob_choice: double-minded
  chosen_spanish: de doble ánimo
  alternatives_spanish:
  - indeciso
  - vacilante
  - de dos pensamientos
  lexicon: δίψυχος
  rationale: '«De doble ánimo» es una expresión bíblica reconocible en español y preserva bien la tensión de la palabra griega: una interioridad dividida o vacilante. «Indeciso» o «vacilante» suavizan demasiado el valor técnico del término.'
- source_word: reason within myself and say
  english_pob_choice: I began to reason within myself and say
  chosen_spanish: empecé a razonar dentro de mí y a decir
  alternatives_spanish:
  - comencé a pensar dentro de mí y decir
  - empecé a reflexionar dentro de mí y a decir
  lexicon: λογίζομαι / λέγω
  rationale: «Razonar» comunica el proceso mental reflexivo del verbo, y «dentro de mí» conserva el matiz introspectivo del original. La coordinación con «a decir» reproduce el paso del pensamiento al discurso interior.
- source_word: firmly established by the Lord
  english_pob_choice: being so firmly established by the Lord
  chosen_spanish: estando tan firmemente establecido por el Señor
  alternatives_spanish:
  - estando tan sólidamente afirmado por el Señor
  - pues el Señor me ha establecido firmemente
  lexicon: στηρίζω
  rationale: «Firmemente establecido» mantiene la imagen de haber sido asentado o confirmado con estabilidad. «Por el Señor» respeta la agencia divina explícita del texto.
- source_word: glorious things
  english_pob_choice: glorious things
  chosen_spanish: cosas gloriosas
  alternatives_spanish:
  - cosas de gloria
  - cosas espléndidas
  lexicon: ἔνδοξα
  rationale: «Cosas gloriosas» sigue de cerca la forma adjetival y conserva el registro elevado sin añadir especificaciones no presentes en el texto.
theological_decisions:
- issue: La voz que responde parece no ser descrita con plena corporalidad, sino como semejante al sonido de una voz.
  english_pob_reading: something like the sound of a voice answered me
  chosen_spanish_reading: algo como el sonido de una voz me respondió
  alternative_spanish_readings:
  - una voz me respondió
  - como si fuera una voz la que me respondió
  rationale: Mantener la comparación evita cerrar el alcance fenomenológico del pasaje. El texto deja una ambigüedad auditiva que conviene preservar sin convertirla en una simple voz inequívoca.
  doctrine_reference: No doctrinal assertion; source-text phenomenology.
- issue: El “doble ánimo” expresa una división interior moral y espiritual, no mera duda intelectual.
  english_pob_reading: Do not be double-minded
  chosen_spanish_reading: No seas de doble ánimo
  alternative_spanish_readings:
  - No dudes
  - No vaciles
  rationale: La expresión tradicional en español conserva mejor la carga ética y espiritual de δίψυχος. Evita reducir el término a una duda momentánea o solo cognitiva.
  doctrine_reference: James 1:8 lexical parallel; integrity of heart
translation_notes:
  revision_awareness: No applied revisions are listed in the supplied audit context. The Spanish draft follows the high-agreement English POB reading and preserves its existing ambiguity around the voice-like response.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí el source packet y el inglés audit trail hablan de «the Lord»; por fidelidad al contexto griego y al texto auditado se traduce «el Señor» sin introducir una equivalencia no atestiguada en este pasaje.
  - Se usa «de doble ánimo» de forma consistente con el valor bíblico de δίψυχος.
  - Se conserva un registro sobrio y readable, evitando paraphraseo expansivo.
