  text: I came near it, and that huge sea monster stretched itself out on the ground and did nothing except thrust out its tongue; it did not move at all until I had passed by it.
translation:
  language: es
  text: Me acerqué, y aquel enorme monstruo marino se tendió en el suelo y no hizo nada, sino que sacó la lengua; no se movió en absoluto hasta que yo pasé junto a él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤγγισα / came near
  english_pob_choice: I came near it
  chosen_spanish: Me acerqué a él
  alternatives_spanish:
  - Me aproximé a él
  - Llegué cerca de él
  lexicon: ἤγγισα
  rationale: ‘Me acerqué’ conserva el movimiento hacia el objeto con un español natural y directo; ‘a él’ mantiene la referencia personalizada del pronombre implícito del contexto narrativo sin sobrecargarlo.
- source_word: τὸ κῆτος μέγα / that huge sea monster
  english_pob_choice: that huge sea monster
  chosen_spanish: aquel enorme monstruo marino
  alternatives_spanish:
  - ese enorme monstruo del mar
  - aquel gran monstruo marino
  lexicon: κῆτος
  rationale: ‘Monstruo marino’ reproduce el valor de κῆτος como criatura monstruosa del mar; ‘aquel’ refleja la deixis narrativa de la escena y ‘enorme’ comunica el énfasis de tamaño del inglés.
- source_word: ἐξετάθη / stretched itself out
  english_pob_choice: stretched itself out
  chosen_spanish: se tendió
  alternatives_spanish:
  - se extendió
  - se alargó
  lexicon: ἐκτείνω
  rationale: ‘Se tendió’ es idiomático en español para un cuerpo que se echa o se despliega en el suelo y conserva la imagen sin sonar mecánico.
- source_word: ἐπὶ τῆς γῆς / on the ground
  english_pob_choice: on the ground
  chosen_spanish: en el suelo
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  lexicon: γῆ
  rationale: ‘En el suelo’ es la forma más natural en español para la superficie inmediata bajo el monstruo; mantiene la escena visual sin perder fidelidad.
- source_word: οὐδὲν ἐποίησεν / did nothing
  english_pob_choice: did nothing
  chosen_spanish: no hizo nada
  alternatives_spanish:
  - no realizó nada
  - no hizo absolutamente nada
  lexicon: ποιέω
  rationale: La frase española reproduce la negación total del acto; la opción simple evita intensificación innecesaria y sigue de cerca el sentido del griego.
- source_word: εἰ μὴ ἐξέβαλε τὴν γλῶσσαν / except thrust out his tongue
  english_pob_choice: except thrust out its tongue
  chosen_spanish: sino sacar la lengua
  alternatives_spanish:
  - salvo sacar la lengua
  - excepto sacar la lengua
  lexicon: ἐκβάλλω
  rationale: ‘Sino’ conserva la excepción negativa con claridad en español; ‘sacar la lengua’ es la expresión natural para la acción descrita, manteniendo el gesto sin añadir interpretación.
- source_word: οὐκ ἐκινήθη καθόλου / it did not move at all
  english_pob_choice: it did not move at all
  chosen_spanish: no se movió en absoluto
  alternatives_spanish:
  - no se movió nada
  - no se movió para nada
  lexicon: κινέω
  rationale: ‘En absoluto’ transmite con fuerza la inmovilidad total expresada por καθόλου, manteniendo el énfasis narrativo del original.
- source_word: ἕως οὗ παρῆλθον αὐτό / until I had passed by it
  english_pob_choice: until I had passed by it
  chosen_spanish: hasta que yo pasé junto a él
  alternatives_spanish:
  - hasta que hube pasado junto a él
  - hasta que pasé por delante de él
  lexicon: παρέρχομαι
  rationale: ‘Pasé junto a él’ es natural en español y conserva la idea de pasar al lado del monstruo; el pretérito simple funciona bien en la narración y evita una construcción más pesada.
theological_decisions:
- issue: Naturaleza de la criatura descrita como κῆτος
  english_pob_reading: that huge sea monster
  chosen_spanish_reading: aquel enorme monstruo marino
  alternative_spanish_readings:
  - aquel gran monstruo marino
  - aquel enorme monstruo del mar
  rationale: No se suaviza la imagen mítica/monstruosa del término griego; ‘monstruo marino’ conserva el carácter extraordinario de la criatura sin convertirla en un animal ordinario.
  doctrine_reference: None (narrative imagery)
- issue: Intensificación de la inmovilidad
  english_pob_reading: it did not move at all
  chosen_spanish_reading: no se movió en absoluto
  alternative_spanish_readings:
  - no se movió nada
  - no se movió para nada
  rationale: 'La formulación mantiene la tensión narrativa: la criatura permanece inmóvil hasta que el narrador pasa. ‘En absoluto’ refleja bien la total ausencia de movimiento.'
  doctrine_reference: None (narrative emphasis)
translation_notes:
  revision_awareness: No applied revisions or cross-check summary were provided beyond the English POB sentence, so the Spanish draft follows the Greek-based sense reflected in the audited English translation without introducing additional textual variants.
  spanish_consistency_notes:
  - Se mantiene ‘monstruo marino’ para κῆτος, consistente con el valor monstruoso del término.
  - Se usa ‘se tendió’ para una imagen corporal completa y narrativa, no una paráfrasis abstracta.
  - 'Se conserva el ritmo de dos miembros coordinados: acercamiento, inmovilidad, excepción de la lengua, y paso del narrador.'
