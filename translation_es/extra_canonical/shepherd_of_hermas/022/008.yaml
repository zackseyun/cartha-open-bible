revisions:
- from: Así que, hermanos, habiendo vestido la fe del Señor y habiendo recordado las obras poderosas que él me había enseñado, cobré ánimo y me entregué a la bestia. Ahora la bestia venía con un rugido tal que podía destruir una ciudad.
  to: Así que, hermanos, habiéndome revestido de la fe del Señor y habiendo recordado las grandes obras que él me había enseñado, cobré ánimo y me entregué a la bestia. La bestia venía con un rugido tan grande que podía destruir una ciudad.
  rationale: Se corrige el principal problema de naturalidad y fidelidad idiomática cambiando «habiendo vestido la fe» por «habiéndome revestido de la fe», que conserva la metáfora de ponerse algo sobre sí. También se ajusta «obras poderosas» a «grandes obras» para un español más natural y más cercano al valor de μεγάλα. Se simplifica «Ahora» a «La» al inicio de la segunda oración, porque el griego/inglés aquí introduce la bestia narrativamente y no exige un adverbio temporal explícito.
  reviewer_model: gpt-5.4
