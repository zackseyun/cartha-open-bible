base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/022/008.yaml
  text: So then, brothers, having put on the faith of the Lord and having remembered the mighty deeds that he had taught me, I took courage and gave myself over to the beast. Now the beast was coming with such a roar that it could destroy a city.
translation:
  language: es
  text: Así que, hermanos, habiéndome revestido de la fe del Señor y habiendo recordado las grandes obras que él me había enseñado, cobré ánimo y me entregué a la bestia. La bestia venía con un rugido tan grande que podía destruir una ciudad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos, hermanos
  lexicon: ἀδελφοί
  rationale: El vocativo fraternal en español eclesial se comunica de forma natural con «hermanos», manteniendo el tono comunitario del original y del POB inglés sin añadir una expansión de género que el griego no exige aquí.
- source_word: ἐνδυσάμενοι τὴν πίστιν
  english_pob_choice: having put on the faith
  chosen_spanish: habiendo vestido la fe
  alternatives_spanish:
  - habiendo puesto la fe
  - habiéndome revestido de fe
  lexicon: ἐνδύω / πίστις
  rationale: «Vestir/revestirse» conserva la metáfora corpórea de ponerse algo encima, más fiel que una paráfrasis como «poner». Se mantiene «la fe» como objeto directo, en paralelo con el audit trail inglés.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Amo
  lexicon: κύριος
  rationale: Aquí el contexto griego habla de «el Señor» en una fórmula de propiedad/confianza, y el POB inglés ya fija «Lord». En español, «Señor» es la forma más natural y auditable para este uso cristológico sin forzar una sustitución por Yahvé que no está apoyada por el contexto inmediato.
- source_word: μεμνημένος
  english_pob_choice: having remembered
  chosen_spanish: habiendo recordado
  alternatives_spanish:
  - acordándome de
  - teniendo presente
  lexicon: μιμνήσκομαι
  rationale: «Recordado» conserva la acción completiva del participio y evita suavizarla en una mera actitud mental. El sujeto implícito sigue siendo el narrador.
- source_word: τὰ μεγάλα ἔργα
  english_pob_choice: the mighty deeds
  chosen_spanish: las obras poderosas
  alternatives_spanish:
  - las grandes obras
  - las obras magníficas
  lexicon: μέγας / ἔργον
  rationale: «Poderosas» comunica el valor eficaz y extraordinario de ἔργα mejor que una simple calificación estética como «grandes». Se mantiene el sustantivo «obras» como en el inglés POB.
- source_word: ἃ ἐδίδαξάς με
  english_pob_choice: that he had taught me
  chosen_spanish: que él me había enseñado
  alternatives_spanish:
  - que me había instruido
  - que me había mostrado
  lexicon: διδάσκω
  rationale: El relativo recoge el antecedente neutro plural y el verbo «enseñar» sigue de cerca διδάσκω, como en el inglés POB, sin exagerar hacia «mostrar» o «instruir».
- source_word: ἐθάρρησα
  english_pob_choice: I took courage
  chosen_spanish: cobré ánimo
  alternatives_spanish:
  - tomé valor
  - me animé
  lexicon: θαρρέω
  rationale: «Cobré ánimo» es una equivalencia idiomática natural en español para el acto de fortalecerse interiormente. Evita una dureza innecesaria y conserva la intensificación del original.
- source_word: παρέδωκα ἐμαυτόν
  english_pob_choice: I gave myself over
  chosen_spanish: me entregué
  alternatives_spanish:
  - me di
  - me abandoné
  lexicon: παραδίδωμι
  rationale: «Me entregué» expresa la rendición voluntaria y completa del pronombre reflexivo mejor que un calco literal. Mantiene la fuerza del griego y del inglés POB.
- source_word: τῷ θηρίῳ
  english_pob_choice: to the beast
  chosen_spanish: a la bestia
  alternatives_spanish:
  - al monstruo
  - a la fiera
  lexicon: θηρίον
  rationale: «Bestia» preserva la resonancia bíblica y apocalíptica del término, coherente con el inglés POB y más estable que «fiera» o «monstruo».
- source_word: βρυχωμένη
  english_pob_choice: with such a roar
  chosen_spanish: con un rugido tal
  alternatives_spanish:
  - con un bramido tan grande
  - con tal estruendo
  lexicon: βρύχομαι
  rationale: «Rugido» conserva la imagen sonora animal del griego. La construcción «tal» refleja la intensidad del participio con valor modal.
- source_word: πόλιν ἀπολέσαι
  english_pob_choice: it could destroy a city
  chosen_spanish: podía destruir una ciudad
  alternatives_spanish:
  - podía arrasar una ciudad
  - podía perder una ciudad
  lexicon: ἀπόλλυμι
  rationale: «Destruir» reproduce adecuadamente el valor de arruinar o devastar sin añadir dramatización. «Una ciudad» mantiene el indefinido del original y del inglés POB.
theological_decisions:
- issue: El «Señor» del texto y la manera de nombrarlo en español
  english_pob_reading: of the Lord
  chosen_spanish_reading: del Señor
  alternative_spanish_readings:
  - de Yahvé
  - del Señor Jesús
  rationale: El pasaje no da un contexto suficiente para sustituir «Señor» por «Yahvé» en el texto principal. Dado que el audit trail inglés ya eligió una forma cristiana general («Lord»), la traducción española conserva esa designación sin imponer una identificación más específica no explicitada aquí.
  doctrine_reference: Uso reverente del título kyrios; distinción entre nombre divino y título contextual
- issue: La fuerza narrativa de la entrega a la bestia
  english_pob_reading: I gave myself over to the beast
  chosen_spanish_reading: me entregué a la bestia
  alternative_spanish_readings:
  - me abandoné a la bestia
  - me rendí a la bestia
  rationale: «Me entregué» preserva la idea de rendición voluntaria y total, importante para la escena de martirio/valentía. Evita suavizar la acción o convertirla en mera pasividad.
  doctrine_reference: Martirio, valentía y perseverancia en la prueba
translation_notes:
  revision_awareness: No hay revisiones aplicadas ni pasajes paralelos en el paquete; la versión española sigue de cerca el texto griego a través del audit trail inglés, manteniendo la metáfora de vestirse/revestirse, la rendición voluntaria y la imagen acústica del rugido.
  spanish_consistency_notes:
  - Se usa «Señor» con mayúscula como título reverente y coherente con el POB inglés.
  - Se mantiene «bestia» para θηρίον por consistencia apocalíptica/bíblica.
  - Se usa pasado perfecto compuesto en la primera mitad («habiendo vestido», «habiendo recordado») para reflejar la secuencia participial del griego y la prioridad temporal respecto de «cobré ánimo».
