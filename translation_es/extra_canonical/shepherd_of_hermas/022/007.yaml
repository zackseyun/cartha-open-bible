  yaml_path: translation/extra_canonical/shepherd_of_hermas/022/007.yaml
  text: 'I began to weep and to ask the Lord that he would deliver me from it. And I remembered the word that I had heard: “Do not be double-minded, Hermas.”'
translation:
  language: es
  text: 'Comencé a llorar y a pedir al Señor que me librara de ello. Y recordé la palabra que había oído: «No seas de doble ánimo, Hermas».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκείνου / it
  english_pob_choice: from it
  chosen_spanish: de ello
  alternatives_spanish:
  - de eso
  - de aquello
  lexicon: αὐτός / ἐκεῖνο
  rationale: El referente es el estado o situación de angustia mencionada antes; «de ello» mantiene la referencia amplia sin forzar un antecedente más concreto que el griego no exige.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dueño
  lexicon: κύριος
  rationale: Aquí el texto griego usa κύριος en un contexto de súplica directa; en español, «el Señor» conserva la forma reverente y auditivamente natural. No se sustituyó por «Yahvé» porque no hay indicio explícito de un reemplazo del nombre divino en esta cita narrativa.
- source_word: μὴ δίψυχος
  english_pob_choice: Do not be double-minded
  chosen_spanish: No seas de doble ánimo
  alternatives_spanish:
  - No seas vacilante
  - No dudes entre dos pensamientos
  lexicon: δίψυχος
  rationale: «De doble ánimo» reproduce la imagen de una voluntad o lealtad dividida. Evita diluir la fuerza proverbial del término y mantiene una formulación reconocible en español cristiano sin depender mecánicamente de una calca.
theological_decisions:
- issue: La forma de dirigirse a Dios / al Señor en la súplica
  english_pob_reading: that he would deliver me from it
  chosen_spanish_reading: que me librara de ello
  alternative_spanish_readings:
  - que me rescatara de ello
  - que me sacara de ello
  rationale: «Librar» conserva la petición de liberación con un registro sobrio y bíblico. No se añadió un matiz doctrinal específico que el pasaje no explicita.
  doctrine_reference: Oración y liberación en contexto narrativo; no se introduce desarrollo doctrinal adicional.
translation_notes:
  revision_awareness: No se reportan revisiones previas ni variantes textuales aplicadas en el paquete auditado; la redacción sigue de cerca el griego normalizado y la traducción inglesa POB como control de sentido, sin depender mecánicamente de ella.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en la súplica narrativa, conforme al contexto inmediato.
  - «De doble ánimo» se usa de manera consistente con la tradición bíblica española para δίψυχος, preservando la tensión entre lealtades divididas.
  - «Llorar» y «pedir» reflejan dos acciones coordinadas del original y del inglés POB, sin añadir intensificación no sustentada.
