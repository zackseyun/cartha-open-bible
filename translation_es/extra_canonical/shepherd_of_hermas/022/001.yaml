review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego y del English POB: una visión vista por Hermas, dirigida a «hermanos», ocurrida veinte días después de la anterior, y entendida como anticipación de una tribulación venidera. Sin embargo, «llegó» para la visión suena menos natural y menos fiel al evento de experiencia visionaria que «tuve» o «se me dio», y «modelo» debilita el matiz de εἰς τύπον como figura/patrón prefigurativo.'
  spanish_quality_summary: El español es claro y legible, pero «La visión que vi... llegó» resulta algo torpe estilísticamente. «Fue como una figura» o «fue como un anticipo» suena más idiomático y conserva mejor el tono religioso-literario que «era como un modelo».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Tribulación» y «hermanos» están bien. La principal cuestión léxica es εἰς τύπον, donde «modelo» no es incorrecto, pero «figura» se alinea mejor con el valor prefigurativo documentado.
  issues:
  - severity: medium
    issue: «llegó» para describir la visión
    rationale: Aunque comunica posterioridad temporal, en español una visión normalmente «la tuve», «la vi» o «se presentó». «Llegó» personifica la visión de manera menos natural y no mejora la fidelidad al original.
  - severity: medium
    issue: «modelo» para εἰς τύπον
    rationale: «Modelo» puede sugerir ejemplar o maqueta más que figura representativa/prefigurativa. «Figura» preserva mejor el sentido de patrón anticipatorio indicado por el contexto y la nota teológica.
  revised_spanish_text: La visión que vi, hermanos, fue veinte días después de la visión anterior; fue como una figura de la tribulación que viene.
  revision_rationale: Se reemplaza «llegó» por «fue ... después» para un español más natural y más cercano al valor narrativo de la frase. Se cambia «modelo» por «figura» para reflejar mejor εἰς τύπον como representación o prefiguración de la tribulación venidera, sin introducir tecnicismo excesivo.
