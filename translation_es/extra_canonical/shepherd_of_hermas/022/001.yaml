  text: The vision that I saw, brothers, came twenty days after the former vision; it was as a pattern of the tribulation that is coming.
translation:
  language: es
  text: La visión que vi, hermanos, fue veinte días después de la visión anterior; fue como una figura de la tribulación que viene.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅρασις / vision
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - revelación
  - aparición
  lexicon: —
  rationale: Mantiene el sentido directo de una experiencia revelatoria sin añadir matices no atestiguados por el griego o por la traducción inglesa.
- source_word: ἀδελφοί / brothers
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - amados
  lexicon: —
  rationale: Conserva la forma vocativa fraternal del original y coincide con el uso eclesial natural en español.
- source_word: μετὰ εἴκοσι ἡμέρας / twenty days after
  english_pob_choice: came twenty days after
  chosen_spanish: llegó veinte días después
  alternatives_spanish:
  - vino veinte días después
  - apareció veinte días después
  lexicon: —
  rationale: Expresa la relación temporal de manera natural en español y respeta el valor narrativo de la llegada de la visión.
- source_word: πρὸς τὴν προτέραν ὅρασιν / former vision
  english_pob_choice: the former vision
  chosen_spanish: la visión anterior
  alternatives_spanish:
  - la visión previa
  - la visión de antes
  lexicon: —
  rationale: «Anterior» reproduce con claridad la referencia retrospectiva sin sobrecargar el estilo.
- source_word: εἰς τύπον / as a pattern
  english_pob_choice: as a pattern
  chosen_spanish: como un modelo
  alternatives_spanish:
  - como una figura
  - como un tipo
  lexicon: —
  rationale: «Modelo» comunica bien la idea de correspondencia ejemplar en español moderno, sin perder la noción de representación anticipada.
- source_word: τῆς θλίψεως τῆς ἐρχομένης / of the tribulation that is coming
  english_pob_choice: of the tribulation that is coming
  chosen_spanish: de la tribulación que viene
  alternatives_spanish:
  - de la aflicción que viene
  - de la tribulación venidera
  lexicon: —
  rationale: «Tribulación» conserva el tono bíblico y apocalíptico; «que viene» traduce el participio presente con sencillez y fidelidad.
theological_decisions:
- issue: Nature of the vision as anticipatory pattern
  english_pob_reading: it was as a pattern of the tribulation that is coming
  chosen_spanish_reading: era como un modelo de la tribulación que viene
  alternative_spanish_readings:
  - era como una figura de la tribulación que viene
  - era un tipo de la tribulación que viene
  rationale: El griego τύπος sugiere una correspondencia ejemplar o prefigurativa. «Modelo» mantiene la fuerza de anticipación sin imponer un tecnicismo doctrinal innecesario en el texto principal.
  doctrine_reference: Typology / prefiguración
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego y concuerda con la versión inglesa auditada; no se detectan revisiones aplicadas ni variantes textuales que exijan nota adicional.
  spanish_consistency_notes:
  - Se mantiene «visión» en dos ocurrencias para conservar la cohesión léxica.
  - Se traduce el marco temporal con una expresión española natural, sin alterar el orden de las relaciones temporales.
  - «Tribulación» se conserva como término de registro bíblico para mantener continuidad con el campo semántico escatológico.
