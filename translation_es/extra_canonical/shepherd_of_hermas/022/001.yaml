revisions:
- from: La visión que vi, hermanos, llegó veinte días después de la visión anterior; era como un modelo de la tribulación que viene.
  to: La visión que vi, hermanos, fue veinte días después de la visión anterior; fue como una figura de la tribulación que viene.
  rationale: Se reemplaza «llegó» por «fue ... después» para un español más natural y más cercano al valor narrativo de la frase. Se cambia «modelo» por «figura» para reflejar mejor εἰς τύπον como representación o prefiguración de la tribulación venidera, sin introducir tecnicismo excesivo.
