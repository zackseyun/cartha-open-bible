  yaml_path: translation/extra_canonical/shepherd_of_hermas/022/006.yaml
  text: As the dust grew greater and greater, I supposed it was something divine. The sun shone out a little, and behold, I see a very great beast, like some sea monster, and from its mouth fiery locusts were coming out. The beast was about a hundred feet in length, and its head was like a jar.
translation:
  language: es
  text: A medida que el polvo crecía más y más, supuse que era algo divino. El sol brilló un poco, y he aquí, veo una bestia muy grande, semejante a algún monstruo marino, y de su boca salían langostas de fuego. La bestia medía como cien pies de largo, y su cabeza era como un jarro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σκόνη / polvo
  english_pob_choice: the dust grew greater and greater
  chosen_spanish: el polvo crecía más y más
  alternatives_spanish:
  - el polvo aumentaba cada vez más
  - el polvo se levantaba cada vez más
  lexicon: —
  rationale: El griego expresa incremento progresivo; en español, "crecía más y más" conserva esa intensificación sin volverlo mecánico.
- source_word: θεῖον / something divine
  english_pob_choice: something divine
  chosen_spanish: algo divino
  alternatives_spanish:
  - algo de origen divino
  - una señal divina
  lexicon: —
  rationale: '"Algo divino" mantiene la ambigüedad reverente del texto: no explicita más de lo que la visión permite.'
- source_word: ἥλιος
  english_pob_choice: The sun shone out a little
  chosen_spanish: El sol brilló un poco
  alternatives_spanish:
  - El sol salió un poco
  - El sol resplandeció un poco
  lexicon: —
  rationale: '"Brilló un poco" reproduce la atenuación del griego y la fluidez del español actual.'
- source_word: θηρίον
  english_pob_choice: a very great beast
  chosen_spanish: una bestia muy grande
  alternatives_spanish:
  - una gran bestia
  - una bestia enorme
  lexicon: —
  rationale: '"Bestia" conserva el valor monstruoso del término; "muy grande" sigue la intensificación del original y de la traducción inglesa.'
- source_word: ὥσπερ κῆτος
  english_pob_choice: like some sea monster
  chosen_spanish: semejante a algún monstruo marino
  alternatives_spanish:
  - como un monstruo marino
  - parecido a un monstruo del mar
  lexicon: —
  rationale: '"Monstruo marino" refleja el símil y evita precisar una especie concreta; "algún" mantiene el matiz indeterminado del inglés."'
- source_word: στόμα
  english_pob_choice: from its mouth
  chosen_spanish: de su boca
  alternatives_spanish:
  - de la boca de la bestia
  lexicon: —
  rationale: Traducción directa y natural, sin necesidad de ampliación.
- source_word: ἀκρίδες πυρίναι
  english_pob_choice: fiery locusts
  chosen_spanish: langostas de fuego
  alternatives_spanish:
  - langostas ígneas
  - langostas ardientes
  lexicon: —
  rationale: '"Langostas de fuego" conserva la imagen apocalíptica con una formulación idiomática en español; evita reducirla a "ardientes" sin perder el tono visionario.'
- source_word: πέντε ἢ ἑκατὸν ποδῶν
  english_pob_choice: about a hundred feet in length
  chosen_spanish: medía como cien pies de largo
  alternatives_spanish:
  - medía unos cien pies de largo
  - tenía cerca de cien pies de largo
  lexicon: —
  rationale: Se mantiene la medida aproximada tal como la comunica el texto. "Como" reproduce la incertidumbre aproximada del original y del inglés POB.
- source_word: κεφαλή
  english_pob_choice: its head was like a jar
  chosen_spanish: su cabeza era como un cántaro
  alternatives_spanish:
  - su cabeza era como una vasija
  - su cabeza parecía un cántaro
  lexicon: —
  rationale: '"Cántaro" es un equivalente claro y concreto para la vasija/jarro del símil, preservando la extrañeza visual del pasaje.'
theological_decisions:
- issue: Interpretación de la impresión visionaria como "divina"
  english_pob_reading: I supposed it was something divine
  chosen_spanish_reading: supuse que era algo divino
  alternative_spanish_readings:
  - pensé que era algo divino
  - supuse que era una cosa divina
  rationale: El texto presenta una inferencia subjetiva de Hermas, no una afirmación doctrinal. "Supuse" conserva esa cautela interpretativa.
  doctrine_reference: No aplica; observación narrativa de una visión.
- issue: Naturaleza de la criatura
  english_pob_reading: a very great beast, like some sea monster
  chosen_spanish_reading: una bestia muy grande, semejante a algún monstruo marino
  alternative_spanish_readings:
  - una gran bestia, como un monstruo marino
  - una bestia enorme, parecida a un monstruo del mar
  rationale: Se mantiene la cualidad monstruosa y el símil sin identificar la criatura con una entidad doctrinalmente específica.
  doctrine_reference: No aplica; imaginería visionaria apocalíptica.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete; la propuesta sigue de cerca la redacción inglesa auditada, pero vuelve al griego para resolver matices de intensificación, símil y registro visionario.
  spanish_consistency_notes:
  - Se conserva "bestia" para el término del ser monstruoso, en línea con el valor fuerte del original.
  - Se usa "algo divino" como formulación sobria para la impresión subjetiva de Hermas.
  - La medida se mantiene en "pies" porque el texto fuente y la traducción inglesa así la presentan; no se convierte a unidades modernas para no introducir una interpretación ajena.
