revisions:
- from: Y cuanto más y más crecía el polvo, supuse que era algo divino. El sol brilló un poco, y he aquí, vi una bestia muy grande, semejante a algún monstruo marino, y de su boca salían langostas de fuego. La bestia medía como cien pies de largo, y su cabeza era como un cántaro.
  to: A medida que el polvo crecía más y más, supuse que era algo divino. El sol brilló un poco, y he aquí, veo una bestia muy grande, semejante a algún monstruo marino, y de su boca salían langostas de fuego. La bestia medía como cien pies de largo, y su cabeza era como un jarro.
  rationale: Se ajusta la sintaxis inicial para mayor naturalidad, se conserva el presente vívido con 'veo' tras 'he aquí' para reflejar mejor la inmediatez del original auditado, y se cambia 'cántaro' por 'jarro' para corresponder más estrechamente a 'jar' sin añadir interpretación. No se requieren notas.
