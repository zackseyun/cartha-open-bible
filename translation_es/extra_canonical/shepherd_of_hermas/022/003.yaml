base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/022/003.yaml
  text: So, walking alone, I was beseeching the Lord to bring to completion the revelations and the visions that he had shown me through his holy Church, so that he would strengthen me and give repentance to his servants who have stumbled, in order that his great and glorious name might be glorified, because he counted me worthy to show me his wonders.
translation:
  language: es
  text: Así, caminando solo, estaba suplicando al Señor que llevara a término las revelaciones y las visiones que me había mostrado por medio de su santa Iglesia, para que me fortaleciera y concediera arrepentimiento a sus siervos que han tropezado, a fin de que su gran y glorioso nombre fuera glorificado, porque me tuvo por digno de mostrarme sus maravillas.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: παρακαλῶν / beseeching
  english_pob_choice: beseeching
  chosen_spanish: suplicando
  alternatives_spanish:
  - rogando
  - implorando
  lexicon: παρακαλέω
  rationale: El inglés POB expresa una súplica intensa; en español, «suplicando» conserva esa fuerza sin sonar rígido.
- source_word: κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: κύριος
  rationale: Aquí el contexto griego usa «Señor» sin marca explícita del nombre divino; el POB inglés también mantiene 'the Lord'. En español, «el Señor» reproduce el referente reverente sin forzar una sustitución por Yahvé cuando el texto no la explicita directamente.
- source_word: ἐλεήσει / give repentance
  english_pob_choice: give repentance
  chosen_spanish: concediera arrepentimiento
  alternatives_spanish:
  - diera arrepentimiento
  - concediera cambio de mente
  lexicon: μετάνοια
  rationale: El contexto es de restauración moral y caída espiritual, por lo que «arrepentimiento» comunica bien la respuesta buscada; «concediera» mantiene que depende de la acción divina.
- source_word: δούλοις
  english_pob_choice: servants
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: δοῦλος
  rationale: Siguiendo la preferencia POB cuando se busca fuerza léxica, «esclavos» conserva el peso de δοῦλος mejor que «siervos», aunque resulta menos tradicional.
- source_word: πταισάντων
  english_pob_choice: have stumbled
  chosen_spanish: han tropezado
  alternatives_spanish:
  - han caído
  - han errado
  lexicon: πταίω
  rationale: «Tropezado» refleja la imagen verbal de tropiezo y caída moral sin añadir matices no presentes en el griego.
- source_word: τὸ μέγα καὶ ἔνδοξον ὄνομα
  english_pob_choice: his great and glorious name
  chosen_spanish: su gran y glorioso nombre
  alternatives_spanish:
  - su gran y esplendoroso nombre
  - su nombre grande y glorioso
  lexicon: ὄνομα
  rationale: La colocación normal en español es natural y fiel; «glorioso» conserva ἔνδοξον sin sustituirlo por una paráfrasis.
- source_word: τὰ θαυμάσια
  english_pob_choice: his wonders
  chosen_spanish: sus maravillas
  alternatives_spanish:
  - sus obras maravillosas
  - sus prodigios
  lexicon: θαυμάσια
  rationale: «Maravillas» es el equivalente más directo y bíblicamente reconocible para θαυμάσια.
theological_decisions:
- issue: Mediation of revelation through the Church
  english_pob_reading: through his holy Church
  chosen_spanish_reading: por medio de su santa Iglesia
  alternative_spanish_readings:
  - a través de su santa Iglesia
  - mediante su santa Iglesia
  rationale: «Por medio de» reproduce la mediación instrumental del griego sin sugerir que la Iglesia sea la fuente última de la revelación.
  doctrine_reference: ecclesiology; revelation mediation
- issue: Divine strengthening and repentance for fallen servants
  english_pob_reading: that he would strengthen me and give repentance to his servants who have stumbled
  chosen_spanish_reading: para que me fortaleciera y concediera arrepentimiento a sus esclavos que han tropezado
  alternative_spanish_readings:
  - para que me fortaleciera y diera arrepentimiento a sus siervos que han tropezado
  - para que me fortaleciera y trajera arrepentimiento a sus esclavos que han tropezado
  rationale: La formulación mantiene la dependencia total de la gracia divina y la conexión entre fortaleza y restauración de los caídos.
  doctrine_reference: grace; repentance; sanctification
translation_notes:
  revision_awareness: Se siguió la lectura inglesa POB como control de sentido, pero la redacción se ajustó al griego para preservar el flujo de la oración, la mediación «por medio de su santa Iglesia» y la fuerza de δοῦλοι. No se detectaron variantes textuales relevantes en el paquete proporcionado.
  spanish_consistency_notes:
  - Se mantuvo «el Señor» para κύριος en este contexto, sin sustituirlo por «Yahvé», porque el paquete no documenta un nombre divino explícito en el texto griego citado.
  - Se preservó la alternancia natural entre formas verbales subordinadas en imperfecto/subjuntivo para reflejar la oración continua del hablante.
  - Se empleó puntuación española con comas para los incisos largos y para mantener legible la cadena de propósitos.
