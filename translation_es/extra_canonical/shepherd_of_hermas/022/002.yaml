  yaml_path: translation/extra_canonical/shepherd_of_hermas/022/002.yaml
  text: I was going into the countryside by the Campanian road. It is about ten stadia from the public road, and the place is easy to travel.
translation:
  language: es
  text: Yo iba hacia el campo por el camino de Campania. Está a unos diez estadios del camino público, y el lugar es fácil de transitar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπὶ τὴν χώραν
  english_pob_choice: going into the countryside
  chosen_spanish: hacia el campo
  alternatives_spanish:
  - al campo
  - hacia la zona rural
  lexicon: χώρα
  rationale: El griego indica desplazamiento hacia una zona rural o campestre. «Hacia el campo» conserva la dirección del movimiento y suena natural en español; «countryside» del inglés POB se refleja sin añadir precisión geográfica innecesaria.
- source_word: κατὰ τὴν Καμπανίαν ὁδόν
  english_pob_choice: by the Campanian road
  chosen_spanish: por el camino de Campania
  alternatives_spanish:
  - junto al camino de Campania
  - por la vía Campania
  lexicon: ὁδός
  rationale: El texto nombra una ruta identificada con Campania. «Camino de Campania» reproduce el valor toponímico del griego sin latinizar en exceso ni ocultar que se trata de una vía concreta.
- source_word: δέκα σταδίους
  english_pob_choice: about ten stadia
  chosen_spanish: unos diez estadios
  alternatives_spanish:
  - aproximadamente diez estadios
  - como diez estadios
  lexicon: στάδιον
  rationale: Se conserva la unidad antigua «estadios», ya que el texto mide distancia con un término técnico del original. «Unos» reproduce el matiz aproximado de «about».
- source_word: ἀπὸ τῆς δημοσίας ὁδοῦ
  english_pob_choice: from the public road
  chosen_spanish: del camino público
  alternatives_spanish:
  - de la vía pública
  - de la calzada pública
  lexicon: δημόσιος
  rationale: «Camino público» expresa de forma natural la vía común o principal indicada por el griego. Mantiene la referencia funcional sin introducir un tecnicismo moderno ajeno al pasaje.
- source_word: καὶ ῥᾴδιόν ἐστιν ὁ τόπος
  english_pob_choice: and the place is easy to travel
  chosen_spanish: y el lugar es fácil de recorrer
  alternatives_spanish:
  - y el lugar es fácil de transitar
  - y el lugar es de fácil acceso
  lexicon: ῥᾴδιος
  rationale: El griego alude a que el lugar no presenta dificultad para desplazarse por él. «Fácil de recorrer» conserva esa idea con una formulación idiomática en español.
theological_decisions:
- issue: Descripción geográfica sin carga doctrinal
  english_pob_reading: The sentence is purely descriptive and contains no theological claim.
  chosen_spanish_reading: La frase se mantiene como descripción geográfica sin introducir matices devocionales.
  alternative_spanish_readings:
  - La frase podría sonar más literaria o más bíblica, pero sin contenido doctrinal añadido.
  - No se añade interpretación espiritual al dato del recorrido.
  rationale: No hay términos teológicos explícitos en el segmento. La traducción debe limitarse a la descripción del trayecto y de la distancia, sin convertir el pasaje en alegoría.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El inglés POB coincide de manera alta con el testimonio griego normalizado; no se detectan revisiones aplicadas ni tensiones textuales relevantes en este versículo.
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y narrativo del POB.
  - Se conservan las unidades antiguas de distancia cuando aparecen en el original.
  - No se introduce terminología eclesiástica que el texto no requiere.
