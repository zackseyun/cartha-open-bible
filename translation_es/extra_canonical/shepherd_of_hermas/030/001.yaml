base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/030/001.yaml
  text: I asked him again, saying, "Since the Lord has counted me worthy that you should dwell with me always, bear with a few more words from me, since I understand nothing, and my heart has been hardened by my former deeds. Give me understanding, for I am very foolish and altogether perceive nothing."
translation:
  language: es
  text: 'Le volví a preguntar, diciendo: «Ya que el Señor me ha tenido por digno de que tú habites siempre conmigo, ten paciencia con unas pocas palabras más de mi parte, porque no entiendo nada, y mi corazón ha sido endurecido por mis obras pasadas. Dame entendimiento, porque soy muy insensato y no percibo absolutamente nada».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠρώτησα αὐτὸν πάλιν λέγων
  english_pob_choice: I asked him again, saying
  chosen_spanish: Le volví a preguntar, diciendo
  alternatives_spanish:
  - Lo interrogé de nuevo, diciendo
  - Le pregunté otra vez, diciendo
  lexicon: ἠρωτάω
  rationale: Conserva la repetición del acto de pedir/interrogar y el gerundio introductorio. «Le volví a preguntar» suena natural en español y mantiene el avance discursivo sin intensificar indebidamente a «interrogar».
- source_word: ἄξιός σε παρέσχεν
  english_pob_choice: the Lord has counted me worthy that you should dwell with me always
  chosen_spanish: el Señor me ha tenido por digno de que tú habites siempre conmigo
  alternatives_spanish:
  - el Señor me ha considerado digno de que tú habites siempre conmigo
  - el Señor me ha juzgado digno de que tú vivas siempre conmigo
  lexicon: ἄξιος / παρέχω
  rationale: «Ha tenido por digno» refleja el valor evaluativo del griego y del inglés POB, conservando la idea de concesión de dignidad. «Habites siempre conmigo» traduce con claridad la permanencia del estar con él.
- source_word: προσεχῆ ἔτι ῥήματα
  english_pob_choice: bear with a few more words from me
  chosen_spanish: concédeme aún unas pocas palabras más
  alternatives_spanish:
  - tolera aún unas pocas palabras más de mí
  - soporta todavía unas pocas palabras más de mí
  lexicon: ῥῆμα
  rationale: La expresión pide paciencia para escuchar más palabras; «concédeme» evita un calco áspero de «bear with» y mantiene el tono respetuoso de ruego. «Pocas palabras» conserva la modestia del original.
- source_word: οὐδὲν γινώσκων
  english_pob_choice: since I understand nothing
  chosen_spanish: porque no entiendo nada
  alternatives_spanish:
  - porque no sé nada
  - ya que no comprendo nada
  lexicon: γινώσκω
  rationale: «Entiendo nada» recoge la incapacidad cognitiva sin sonar rebuscado. «Comprendo nada» sería posible, pero «entiendo» es más natural en este contexto de instrucción.
- source_word: ἡ καρδία μου τετύφλωται
  english_pob_choice: my heart has been hardened
  chosen_spanish: mi corazón ha sido endurecido
  alternatives_spanish:
  - mi corazón se ha endurecido
  - mi corazón ha quedado endurecido
  lexicon: καρδία / τύφω
  rationale: El inglés POB lee «hardened»; en español, «endurecido» conserva la metáfora moral y afectiva. Aunque el verbo griego puede sugerir ceguedad, aquí se mantiene la línea del audit trail inglés.
- source_word: δὸς μοι σύνεσιν
  english_pob_choice: Give me understanding
  chosen_spanish: Dame entendimiento
  alternatives_spanish:
  - Concédeme entendimiento
  - Dame comprensión
  lexicon: σύνεσις
  rationale: «Entendimiento» es la equivalencia más directa y solemne para la petición de capacidad discernidora.
- source_word: σφόδρα ἀνόητος εἰμί
  english_pob_choice: for I am very foolish
  chosen_spanish: porque soy muy insensato
  alternatives_spanish:
  - porque soy muy necio
  - porque soy completamente necio
  lexicon: ἀνόητος
  rationale: «Insensato» mantiene dignidad de registro y evita un exceso de coloquialidad. «Muy» preserva el intensificador.
- source_word: οὐδὲν πάντα συνιῶ
  english_pob_choice: and altogether perceive nothing
  chosen_spanish: y no percibo absolutamente nada
  alternatives_spanish:
  - y no entiendo absolutamente nada
  - y no capto nada en absoluto
  lexicon: συνίημι
  rationale: «Percibo» conserva la amplitud semántica de captar/entender, y «absolutamente nada» reproduce el énfasis total del original y del inglés POB.
theological_decisions:
- issue: Relación entre la dignidad concedida por el Señor y la permanencia del interlocutor con el hablante
  english_pob_reading: the Lord has counted me worthy that you should dwell with me always
  chosen_spanish_reading: el Señor me ha tenido por digno de que tú habites siempre conmigo
  alternative_spanish_readings:
  - el Señor me ha considerado digno de que tú habites siempre conmigo
  - el Señor me ha juzgado digno de que tú vivas siempre conmigo
  rationale: Se conserva la idea de una dignidad otorgada por iniciativa divina, no merecida por el hablante. «Habites siempre conmigo» mantiene la relación continua sin introducir una carga doctrinal extra.
  doctrine_reference: Providencia divina y humildad humana
- issue: Autoevaluación moral y cognitiva del hablante
  english_pob_reading: my heart has been hardened by my former deeds ... I am very foolish and altogether perceive nothing
  chosen_spanish_reading: mi corazón ha sido endurecido por mis obras anteriores ... soy muy insensato y no percibo absolutamente nada
  alternative_spanish_readings:
  - mi corazón se ha endurecido por mis obras anteriores
  - mi corazón ha quedado endurecido por mis obras anteriores
  rationale: La formulación conserva la confesión de efecto moral previo sobre el interior del hablante y su incapacidad actual para discernir. No se suaviza la autocrítica ni se reinterpreta psicológicamente más allá del texto.
  doctrine_reference: Arrepentimiento, humildad y necesidad de entendimiento divino
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego subyacente y el inglés POB auditado, sin revisiones aplicadas previas en este pasaje. La redacción española busca equivalencia óptima con sintaxis natural, manteniendo la confesión de indignidad, la petición de paciencia y la autoacusación de falta de entendimiento.
  spanish_consistency_notes:
  - Se emplea «Señor» para κύριος en este testimonio narrativo, dado que el propio contexto del apócrifo cristiano usa lenguaje reverencial sin requerir aquí la restitución explícita de Yahvé.
  - Se mantuvo el registro humilde y dialogal del original, evitando una paráfrasis devocional añadida.
  - No se introdujeron notas al pie porque el pasaje no presenta variantes textuales o alternativas de traducción que requirieran anclaje en el texto principal.
