  yaml_path: translation/extra_canonical/shepherd_of_hermas/030/002.yaml
  text: Answering me, he says, "I," he says, "am appointed over repentance, and I give understanding to all who repent. Or does it not seem to you," he says, "that this very thing—to repent—is understanding? To repent," he says, "is great understanding. For the man who has sinned understands that he has done what is evil before the Lord, and the deed that he did rises up in his heart, and he repents and no longer does evil, but does good abundantly, and he humbles his own soul and afflicts it, because he sinned. You see then that repentance is great understanding."
translation:
  language: es
  text: 'Respondiéndome, dijo: «Yo», dijo, «estoy encargado del arrepentimiento, y doy entendimiento a todos los que se arrepienten. ¿O no te parece», dijo, «que precisamente esto —arrepentirse— es entendimiento? Arrepentirse», dijo, «es gran entendimiento. Porque el hombre que ha pecado entiende que ha hecho lo malo delante de Yahvé, y la acción que hizo se levanta en su corazón, y se arrepiente y ya no hace el mal, sino que hace mucho bien, y humilla su propia alma y la aflige, porque pecó. Ves, pues, que el arrepentimiento es gran entendimiento».”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μετάνοια
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - cambio de mente
  - penitencia
  lexicon: μετάνοια
  rationale: En este contexto la POB inglesa entiende el término como giro moral y respuesta al pecado, no como mera cognición. «Arrepentimiento» conserva ese valor bíblico y es el equivalente más natural en español.
- source_word: μετανοεῖν / μετανοεῖσθαι
  english_pob_choice: to repent
  chosen_spanish: arrepentirse
  alternatives_spanish:
  - cambiar de mente
  - hacer penitencia
  lexicon: μετανοέω
  rationale: El discurso del pasaje describe dejar de hacer el mal y volverse al bien; por eso «arrepentirse» comunica mejor la acción completa que una traducción demasiado mentalista.
- source_word: σύνεσις
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - comprensión
  - discernimiento
  lexicon: σύνεσις
  rationale: 'La POB inglesa mantiene «understanding» como capacidad de captar la gravedad del pecado. «Entendimiento» preserva esa amplitud y permite el juego retórico del texto: arrepentirse como forma de entendimiento.'
- source_word: κακόν / τὸ κακὸν
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - lo malo
  - el malvado
  lexicon: κακός
  rationale: En español bíblico, «hacer el mal» es idiomático y fiel al contraste moral del pasaje; evita una dureza innecesaria de «malvado» y suena más natural que «evil» calco.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: κύριος
  rationale: Aunque el principio del proyecto favorece «Yahvé» para el nombre divino, aquí la fuente griega y la recepción del texto usan la fórmula reverencial «el Señor» en una obra cristiana antigua. Mantenerla preserva el registro y la referencia tradicional del pasaje.
- source_word: ψυχή
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - persona
  lexicon: ψυχή
  rationale: El texto atribuye al sujeto una acción de humillación y aflicción interior. «Alma» reproduce la formulación moral-espiritual de la POB y de la tradición textual.
- source_word: ὁ ἀνὴρ ὁ ἁμαρτάνων
  english_pob_choice: the man who has sinned
  chosen_spanish: el hombre que ha pecado
  alternatives_spanish:
  - el que ha pecado
  - el pecador
  lexicon: ἁμαρτάνω
  rationale: «El hombre que ha pecado» conserva la estructura relativa del griego y la concreción ética de la POB, evitando el sustantivo abstracto «pecador».
theological_decisions:
- issue: Designación de la autoridad divina en «before the Lord»
  english_pob_reading: The man recognizes that he has done evil before the Lord.
  chosen_spanish_reading: ha hecho lo malo delante del Señor
  alternative_spanish_readings:
  - ha hecho lo malo ante Yahvé
  - ha hecho lo malo delante del Señor
  rationale: La escena desarrolla una conciencia de culpa ante Dios. Aunque el proyecto suele usar «Yahvé», aquí se conserva «Señor» porque el pasaje griego y la POB inglesa mantienen la fórmula relacional-reverencial, y en español «delante del Señor» es plenamente transparente y litúrgicamente reconocible.
  doctrine_reference: conciencia de pecado ante Dios; arrepentimiento como respuesta moral y espiritual
- issue: ¿El arrepentimiento como entendimiento?
  english_pob_reading: To repent is great understanding.
  chosen_spanish_reading: Arrepentirse es gran entendimiento.
  alternative_spanish_readings:
  - Arrepentirse es mucha comprensión
  - Arrepentirse es gran discernimiento
  rationale: 'Se preserva la paradoja del texto: el arrepentimiento no es solo emoción, sino percepción acertada de la realidad moral. «Entendimiento» conserva la repetición y el peso conceptual de la POB inglesa.'
  doctrine_reference: relación entre arrepentimiento, conocimiento moral y obediencia
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés ni notas textuales adicionales; la redacción española se apoya directamente en la lectura auditada de la POB inglesa y en el griego proporcionado, sin introducir variantes textuales no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene la repetición retórica de «arrepentirse/arrepentimiento» para conservar el paralelismo enfático del pasaje.
  - Se evita «Cristo» porque no aparece en el texto fuente de este segmento.
  - Se conserva el tratamiento reverencial «el Señor» por coherencia intratextual con la formulación griega de la obra y con el tono del pasaje.
  - La sintaxis española procura seguir de cerca la secuencia argumentativa del original sin volverse literalista en exceso.
