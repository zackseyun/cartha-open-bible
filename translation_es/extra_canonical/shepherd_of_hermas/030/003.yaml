base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/030/003.yaml
  text: '"For this reason then," I say, "sir, I inquire of you carefully about everything: first, because I am a sinner; then, because I do not know by doing what works I shall live, for my sins are many and manifold."'
translation:
  language: es
  text: '«Por esta razón, pues», dije yo, «señor, le pregunto con cuidado acerca de todo: primero, porque soy un pecador; luego, porque no sé por medio de qué obras viviré, pues mis pecados son muchos y de muchas clases».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διὰ τοῦτο οὖν
  english_pob_choice: For this reason then
  chosen_spanish: Por esta razón, pues
  alternatives_spanish:
  - Por eso, pues
  - Por esta causa, pues
  lexicon: διά + demostrativo; οὖν
  rationale: La fórmula causal-conclusiva se conserva con una construcción natural en español. «Por esta razón, pues» refleja el enlace argumentativo sin endurecer el registro ni añadir explicaciones que el griego no expresa.
- source_word: κύριε
  english_pob_choice: sir
  chosen_spanish: señor
  alternatives_spanish:
  - señor mío
  - amo
  lexicon: κύριος
  rationale: Aquí el interlocutor usa un tratamiento respetuoso, no la referencia al nombre divino. En español, «señor» reproduce ese vocativo con dignidad y sin convertirlo en una fórmula más doméstica de lo que exige el contexto.
- source_word: ἐξέταζω
  english_pob_choice: I inquire of you carefully about everything
  chosen_spanish: le pregunto con cuidado acerca de todo
  alternatives_spanish:
  - le inquiero cuidadosamente sobre todo
  - le consulto con atención sobre todo
  lexicon: ἐξετάζω
  rationale: El verbo tiene un matiz de indagación cuidadosa. «Le pregunto con cuidado» transmite la actitud de examen sin sonar técnico o forzado en español.
- source_word: ἁμαρτωλός
  english_pob_choice: I am a sinner
  chosen_spanish: soy un pecador
  alternatives_spanish:
  - soy un hombre pecador
  - soy pecador
  lexicon: ἁμαρτωλός
  rationale: Se conserva el sustantivo/adjetivo moral fuerte que usa la tradición cristiana y que corresponde bien al griego. «Pecador» es claro, directo y no atenúa la confesión.
- source_word: οὐκ οἶδα ποίων ἔργων ζήσομαι
  english_pob_choice: I do not know by doing what works I shall live
  chosen_spanish: no sé haciendo qué obras viviré
  alternatives_spanish:
  - no sé por medio de qué obras viviré
  - no sé qué obras he de hacer para vivir
  lexicon: ζάω + ποῖος + ἔργον
  rationale: La estructura griega es algo enrevesada y el inglés POB la conserva. En español, «haciendo qué obras viviré» mantiene la tensión entre acción y vida sin interpretarla excesivamente como mérito o justificación.
- source_word: πολλά εἰσιν καὶ παντοδαπά
  english_pob_choice: my sins are many and manifold
  chosen_spanish: mis pecados son muchos y de muchas clases
  alternatives_spanish:
  - mis pecados son muchos y variados
  - mis pecados son numerosos y diversos
  lexicon: πολύς + παντοδαπός
  rationale: «De muchas clases» conserva el matiz de variedad/variegación de παντοδαπά, que no se agota en «varios» y evita una repetición meramente estilística de «muchos».
theological_decisions:
- issue: La confesión de pecado como base de la súplica o pregunta
  english_pob_reading: because I am a sinner; then, because I do not know by doing what works I shall live
  chosen_spanish_reading: primero, porque soy un pecador; luego, porque no sé haciendo qué obras viviré
  alternative_spanish_readings:
  - primero, porque soy pecador; luego, porque no sé qué obras debo hacer para vivir
  - primero, porque soy un pecador; luego, porque no sé por qué obras viviré
  rationale: 'La traducción mantiene la secuencia causal del texto: la confesión de pecado y la ignorancia respecto del modo de vida. Se evita convertir la frase en una formulación doctrinal más explícita de lo que el pasaje ofrece, preservando la tensión del original.'
  doctrine_reference: Humildad/confesión de pecado; antropología moral del texto
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; por ello, el borrador español sigue de cerca la lectura auditada de Lightfoot & Harmer (1891) y la traducción inglesa POB sin incorporar variantes no documentadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo para el nombre divino; aquí no aparece ninguna forma del tetragrama ni una cita de κύριος con función divina.
  - Se mantiene «pecador» como término moral fuerte y no se sustituye por perífrasis más suaves.
  - 'Se conserva el orden retórico del original: causa inicial, vocativo, confesión y segunda causa.'
  - «Obras» se mantiene por fidelidad al griego ἔργα y al inglés POB; no se reemplaza por «acciones» para no diluir el campo semántico.
