review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: conserva la cadena causal, el vocativo respetuoso «señor», la confesión «soy un pecador» y el cierre «muchos y de muchas clases». La principal dificultad está en οὐκ οἶδα ποίων ἔργων ζήσομαι, donde el español propuesto «no sé haciendo qué obras viviré» resulta gramaticalmente áspero y menos claro de lo que permite el original, aunque intenta preservar su tensión.'
  spanish_quality_summary: El texto es mayormente natural y digno, pero «no sé haciendo qué obras viviré» suena forzado en español y entorpece la lectura. Una leve reparación a «no sé por medio de qué obras viviré» mantiene el vínculo entre obras y vida sin introducir una paráfrasis doctrinal ni una sintaxis extraña.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «señor» para κύριε es correcto aquí como trato humano respetuoso, no como nombre divino. «pecador» y «pecados» reflejan bien ἁμαρτωλός / ἁμαρτίαι. No se requieren notas léxicas adicionales.
  issues:
  - severity: medium
    issue: Sintaxis poco natural en «no sé haciendo qué obras viviré»
    rationale: Aunque busca reflejar de cerca el giro del POB inglés, en español esa construcción resulta torpe y menos inteligible. «Por medio de qué obras» comunica la relación instrumental implícita con mejor legibilidad y sin sobreinterpretar.
  revised_spanish_text: '«Por esta razón, pues», dije yo, «señor, le pregunto con cuidado acerca de todo: primero, porque soy un pecador; luego, porque no sé por medio de qué obras viviré, pues mis pecados son muchos y de muchas clases».'
  revision_rationale: Se hace una sola corrección de estilo-fidelidad en la cláusula sobre las obras y la vida. El resto del borrador es fiel al sentido del original y al registro deseado.
