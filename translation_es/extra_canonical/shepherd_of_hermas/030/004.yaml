- from: «Vivirás», dice, «si guardas mis mandamientos y andas en ellos; y cualquiera que, habiendo oído estos mandamientos, los guarda, vivirá para Dios».
  to: «Vivirás», dice, «si guardas mis mandamientos y caminas en ellos; y cualquiera que, habiendo oído estos mandamientos, los guarda, vivirá para Dios».
  rationale: Se hace una reparación menor para mejorar la naturalidad y la coherencia verbal del español, manteniendo el modismo ético de περιπατέω y el sentido exacto del original y del inglés POB. No se requieren notas.
