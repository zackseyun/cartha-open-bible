  yaml_path: translation/extra_canonical/shepherd_of_hermas/030/004.yaml
  text: '"You will live," he says, "if you keep my commandments and walk in them; and whoever, having heard these commandments, keeps them, will live to God."'
translation:
  language: es
  text: «Vivirás», dice, «si guardas mis mandamientos y caminas en ellos; y cualquiera que, habiendo oído estos mandamientos, los guarda, vivirá para Dios».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ζήσῃ / ζήσῃς
  english_pob_choice: You will live
  chosen_spanish: Vivirás
  alternatives_spanish:
  - Vivirás con vida
  - Tendrás vida
  lexicon: ζάω
  rationale: La forma simple y directa «Vivirás» comunica el valor verbal básico sin añadir matices no presentes en el griego ni en el inglés POB.
- source_word: ἐντολάς
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandatos
  - preceptos
  lexicon: ἐντολή
  rationale: «Mandamientos» es el equivalente más natural y fiel al campo semántico de ἐντολή; mantiene la fuerza normativa del texto.
- source_word: περιπατήσῃς ἐν αὐτοῖς
  english_pob_choice: walk in them
  chosen_spanish: andas en ellos
  alternatives_spanish:
  - caminas en ellos
  - vives conforme a ellos
  lexicon: περιπατέω
  rationale: «Andar en» conserva el modismo bíblico y la continuidad con el griego, sin forzar una paráfrasis explicativa.
- source_word: θεῷ
  english_pob_choice: to God
  chosen_spanish: para Dios
  alternatives_spanish:
  - ante Dios
  - por Dios
  lexicon: θεός
  rationale: La preposición «para» reproduce de manera sobria la orientación del resultado/relación expresada en el griego y coincide con el valor del inglés POB.
theological_decisions:
- issue: Vida vinculada a la obediencia a los mandamientos
  english_pob_reading: if you keep my commandments and walk in them; ... keeps them, will live to God
  chosen_spanish_reading: si guardas mis mandamientos y andas en ellos; ... los guarda, vivirá para Dios
  alternative_spanish_readings:
  - si obedeces mis mandamientos y vives conforme a ellos; ... los obedece, vivirá para Dios
  rationale: Se conserva la relación condicional entre guardar los mandamientos y recibir vida, sin suavizarla ni convertirla en una generalidad moral.
  doctrine_reference: Obediencia y vida en el marco de exhortación ética del texto
- issue: «vivirá para Dios»
  english_pob_reading: will live to God
  chosen_spanish_reading: vivirá para Dios
  alternative_spanish_readings:
  - vivirá ante Dios
  - vivirá hacia Dios
  rationale: La redacción mantiene la dirección teológica del original y la del inglés POB, evitando una interpretación más interpretativa como «vivirá en comunión con Dios» que no está explícita.
  doctrine_reference: Relación final de vida orientada a Dios
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; la propuesta española sigue de cerca el valor del texto griego y la formulación inglesa auditada, sin introducir notas textuales o variantes no documentadas.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona singular («Vivirás», «guardas») acorde con el inglés POB y el tono directo del mandato.
  - Se conserva «Dios» en lugar de una perífrasis teológica más desarrollada, porque el griego y el inglés son breves y no requieren ampliación.
  - No se introduce «Cristo», «Señor» ni terminología eclesial ajena al pasaje.
