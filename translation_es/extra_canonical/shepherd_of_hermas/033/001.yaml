  yaml_path: translation/extra_canonical/shepherd_of_hermas/033/001.yaml
  text: He says, “I commanded you in the first commandment to keep faith and fear and self-control.” “Yes, lord,” I say. “But now,” he says, “I also want to make known to you their powers, so that you may understand what power and activity each of them has. For their activities are twofold; so they are set over the righteous and the unrighteous. So you—trust the righteous, but do not trust the unrighteous; for righteousness has a straight path, but unrighteousness a crooked one. But you, walk on the straight [and level] path, and leave the crooked.
translation:
  language: es
  text: 'Él dice: “Te mandé en el primer mandamiento que guardaras la fe, el temor y el dominio propio”. “Sí, señor”, respondo. “Pero ahora”, dice, “también quiero darte a conocer cuáles son sus poderes, para que entiendas qué poder y actividad tiene cada uno de ellos. Porque sus actividades son de dos clases; así están puestos sobre los justos y los injustos. Así que tú, confía en los justos, pero no confíes en los injustos; porque la justicia tiene un camino recto, pero la injusticia, uno torcido. Pero tú, camina por el camino recto y llano, y deja el torcido.”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: πίστις
  rationale: En este contexto de mandamiento moral, la POB inglesa conserva ‘faith’; en español, ‘fe’ es la forma más natural y fiel sin perder el sentido de lealtad confiada.
- source_word: φόβον
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - reverencia
  lexicon: φόβος
  rationale: ‘Temor’ mantiene mejor el valor bíblico-religioso y evita reducirlo a miedo psicológico.
- source_word: ἐγκράτειαν
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - autocontrol
  - continencia
  lexicon: ἐγκράτεια
  rationale: ‘Dominio propio’ es la equivalencia más transparente y ampliamente inteligible en español eclesial moderno.
- source_word: δυνάμεις
  english_pob_choice: powers
  chosen_spanish: poderes
  alternatives_spanish:
  - fuerzas
  - capacidades
  lexicon: δύναμις
  rationale: La POB inglesa usa ‘powers’; en español ‘poderes’ conserva la idea de capacidades efectivas o eficacias operantes de estas virtudes.
- source_word: πρᾶξις / πράξεις
  english_pob_choice: activity
  chosen_spanish: actividad
  alternatives_spanish:
  - obra
  - funcionamiento
  lexicon: πρᾶξις
  rationale: ‘Actividad’ reproduce el contraste con ‘poder’ y comunica el ejercicio o despliegue concreto de cada virtud.
- source_word: διπλᾶ
  english_pob_choice: twofold
  chosen_spanish: de dos clases
  alternatives_spanish:
  - dobles
  - en dos aspectos
  lexicon: διπλοῦς
  rationale: ‘De dos clases’ expresa con naturalidad que sus actividades se distribuyen en dos direcciones sin forzar una calco rígido.
- source_word: δίκαιοι
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justificados
  lexicon: δίκαιος
  rationale: ‘Los justos’ es la correspondencia habitual y preserva el contraste moral/legal del pasaje.
- source_word: ἄδικοι
  english_pob_choice: the unrighteous
  chosen_spanish: los injustos
  alternatives_spanish:
  - los impíos
  - los malvados
  lexicon: ἄδικος
  rationale: ‘Los injustos’ mantiene el paralelismo directo con ‘los justos’ y la oposición de justicia/injusticia.
- source_word: ἡ δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: δικαιοσύνη
  rationale: En español, ‘justicia’ conserva la raíz del contraste y puede abarcar tanto rectitud moral como justicia relacional.
- source_word: σκολιός
  english_pob_choice: crooked
  chosen_spanish: torcido
  alternatives_spanish:
  - torcido
  - retorcido
  - desviado
  lexicon: σκολιός
  rationale: ‘Torcido’ es la traducción directa y más idiomática para oponerlo a ‘recto’.
- source_word: εὐθύς
  english_pob_choice: straight
  chosen_spanish: recto
  alternatives_spanish:
  - derecho
  - recto
  lexicon: εὐθύς
  rationale: ‘Recto’ es idiomático y mantiene el contraste ético de camino recto frente a camino torcido.
- source_word: λεῖος
  english_pob_choice: level
  chosen_spanish: llano
  alternatives_spanish:
  - nivelado
  - plano
  lexicon: λείος
  rationale: La adición inglesa ‘level’ señala la lisura del camino; ‘llano’ comunica esa idea de forma natural en español.
theological_decisions:
- issue: Relación entre fe, temor y dominio propio como mandamiento ético
  english_pob_reading: The first commandment groups these three virtues as required conduct.
  chosen_spanish_reading: El primer mandamiento agrupa estas tres virtudes como conducta requerida.
  alternative_spanish_readings:
  - El primer mandamiento pide estas tres actitudes
  - En el primer mandamiento se mandó guardar estas tres virtudes
  rationale: La traducción mantiene el carácter normativo del mandato sin añadir matices doctrinales ajenos al texto.
  doctrine_reference: Ética cristiana; virtud y obediencia
- issue: ‘Their powers’ and ‘their activities’ as real operative effects of virtues
  english_pob_reading: The virtues have distinct powers and activities, not merely abstract qualities.
  chosen_spanish_reading: Las virtudes tienen poderes y actividades concretas, no solo rasgos abstractos.
  alternative_spanish_readings:
  - sus fuerzas y funciones
  - sus capacidades y obras
  rationale: ‘Poderes’ y ‘actividad’ conservan la idea de eficacia operante; evita reducir el pasaje a mera psicología moral.
  doctrine_reference: Virtudes como realidades activas en la vida moral
- issue: The straight and crooked path as moral contrast
  english_pob_reading: Righteousness has a straight path; unrighteousness has a crooked one.
  chosen_spanish_reading: La justicia tiene un camino recto; la injusticia, uno torcido.
  alternative_spanish_readings:
  - La rectitud tiene un camino derecho; la injusticia, uno torcido
  rationale: Se preserva el paralelismo y el contraste moral tradicional del texto, sin suavizar la oposición entre ambas sendas.
  doctrine_reference: Camino de justicia vs. camino de pecado
translation_notes:
  revision_awareness: No se aplicaron revisiones previas. Se corrigió el problema de validación anterior eliminando cualquier nota al pie no anclada en el texto; el resultado no contiene marcadores huérfanos.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ fuera de este pasaje porque el texto no contiene el nombre divino explícito.
  - Se conservó el tratamiento directo ‘sí, señor’ para reflejar el diálogo respetuoso del original.
  - ‘Camino recto y llano’ traduce la combinación de εὐθύς + λεῖος sin añadir comentario interpretativo.
