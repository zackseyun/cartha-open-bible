revisions:
- from: 'Él dice: “Te mandé en el primer mandamiento que guardaras la fe, el temor y el dominio propio.” “Sí, señor”, respondo. “Pero ahora”, dice, “también quiero darte a conocer sus poderes, para que entiendas qué poder y qué actividad tiene cada uno de ellos. Porque sus actividades son de dos clases; así están puestos sobre los justos y los injustos. Así que tú: confía en los justos, pero no confíes en los injustos; porque la justicia tiene un camino recto, pero la injusticia uno torcido. Pero tú, anda por el camino recto y llano, y deja el torcido.”'
  to: 'Él dice: “Te mandé en el primer mandamiento que guardaras la fe, el temor y el dominio propio”. “Sí, señor”, respondo. “Pero ahora”, dice, “también quiero darte a conocer cuáles son sus poderes, para que entiendas qué poder y actividad tiene cada uno de ellos. Porque sus actividades son de dos clases; así están puestos sobre los justos y los injustos. Así que tú, confía en los justos, pero no confíes en los injustos; porque la justicia tiene un camino recto, pero la injusticia, uno torcido. Pero tú, camina por el camino recto y llano, y deja el torcido.”'
