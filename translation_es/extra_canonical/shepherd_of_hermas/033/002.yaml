  text: For the crooked path has no tracks, but pathless places and many stumbling blocks; and it is rough and thorny. Therefore it is harmful. But hear also the works of the other way. First of all, if there should come upon you a quick temper or bitterness, know that he is in you. Then come desire for many activities, and extravagance in many foods and drinks, and many drunken sprees, and various luxuries, and things that are not fitting; and desire for women, and greed, and arrogance, and boastfulness, and whatever things are akin and similar to these. Therefore, whenever these things rise up in your heart, know that the angel of wickedness is with you.
translation:
  language: es
  text: Pues el camino torcido no tiene senda, sino lugares sin camino y muchos tropiezos; y es áspero y espinoso. Por tanto, es dañino. Pero escucha también las obras del otro camino. Ante todo, si te sobreviene un pronto enojo[a] o amargura, sabe que él está en ti. Luego viene el deseo de muchas actividades, y el exceso en muchos alimentos y bebidas, y muchas borracheras, y diversos lujos, y cosas que no convienen; y el deseo de mujeres, y la codicia, y la arrogancia, y la jactancia, y todo lo que es afín y semejante a estas cosas. Por tanto, cada vez que estas cosas se levanten en tu corazón, sabe que el ángel de la maldad está contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego puede referirse a un pronto enojo o a una disposición irritable; se eligió la expresión más natural en este contexto, sin excluir el matiz de irascibilidad.
    reason: alternative_reading
lexical_decisions:
- source_word: crooked path
  english_pob_choice: crooked path
  chosen_spanish: camino torcido
  alternatives_spanish:
  - sendero torcido
  - ruta torcida
  lexicon: 'Greek: indirect reference to the way/path imagery in the source; no fixed lexicon number supplied'
  rationale: ‘Camino torcido’ mantiene la imagen moral y direccional sin forzar una expresión demasiado literal o extraña en español.
- source_word: has no tracks
  english_pob_choice: has no tracks
  chosen_spanish: no tiene huellas
  alternatives_spanish:
  - no deja huellas
  - no tiene marcas
  lexicon: 'Greek: absence of tracks/footprints; no fixed lexicon number supplied'
  rationale: ‘Huellas’ reproduce la idea de un sendero no trazado o no practicable en español claro.
- source_word: pathless places
  english_pob_choice: pathless places
  chosen_spanish: lugares sin sendero
  alternatives_spanish:
  - lugares sin camino
  - parajes sin senda
  lexicon: 'Greek: places lacking a path; no fixed lexicon number supplied'
  rationale: ‘Sin sendero’ conserva la idea de ausencia de vía marcada, más natural que una calca rígida.
- source_word: stumbling blocks
  english_pob_choice: stumbling blocks
  chosen_spanish: tropiezos
  alternatives_spanish:
  - piedras de tropiezo
  - obstáculos
  lexicon: 'Greek: items causing stumbling; no fixed lexicon number supplied'
  rationale: ‘Tropiezos’ expresa el efecto inmediato y mantiene un registro bíblico comprensible.
- source_word: rough and thorny
  english_pob_choice: rough and thorny
  chosen_spanish: áspero y lleno de espinas
  alternatives_spanish:
  - áspero y espinoso
  - áspero y con espinas
  lexicon: 'Greek: rough, thorny terrain; no fixed lexicon number supplied'
  rationale: ‘Lleno de espinas’ es idiomático en español y conserva la fuerza imagética del terreno hostil.
- source_word: quick temper
  english_pob_choice: quick temper
  chosen_spanish: temperamento irritable[a]
  alternatives_spanish:
  - ira repentina
  - pronto enojo
  - mal genio
  lexicon: 'Greek: quickness to anger or irritability; no fixed lexicon number supplied'
  rationale: El griego puede apuntar a irritabilidad o irascibilidad; se eligió una formulación amplia, con nota para preservar la ambigüedad semántica.
- source_word: bitterness
  english_pob_choice: bitterness
  chosen_spanish: amargura
  alternatives_spanish:
  - rencor
  - resentimiento
  lexicon: 'Greek: bitterness; no fixed lexicon number supplied'
  rationale: ‘Amargura’ es la equivalencia directa y mantiene el matiz moral/afectivo.
- source_word: desire for many activities
  english_pob_choice: desire for many activities
  chosen_spanish: el deseo de muchas actividades
  alternatives_spanish:
  - afán de muchas ocupaciones
  - deseo de muchas tareas
  lexicon: 'Greek: desire for many undertakings; no fixed lexicon number supplied'
  rationale: Se conserva la formulación amplia del POB inglés y la amplitud del vicio descrito.
- source_word: extravagance in many foods and drinks
  english_pob_choice: extravagance in many foods and drinks
  chosen_spanish: el exceso en muchos alimentos y bebidas
  alternatives_spanish:
  - la desmesura en comida y bebida
  - la extravagancia en alimentos y bebidas
  lexicon: 'Greek: excess in consumption; no fixed lexicon number supplied'
  rationale: ‘Exceso’ comunica bien la idea moral de desbordamiento sin añadir interpretaciones ajenas.
- source_word: many drunken sprees
  english_pob_choice: many drunken sprees
  chosen_spanish: muchas borracheras
  alternatives_spanish:
  - muchos excesos de embriaguez
  - muchas juergas de borrachera
  lexicon: 'Greek: repeated drunken bouts; no fixed lexicon number supplied'
  rationale: ‘Borracheras’ es claro y conserva el plural repetitivo del listado.
- source_word: various luxuries
  english_pob_choice: various luxuries
  chosen_spanish: diversos lujos
  alternatives_spanish:
  - varios deleites
  - diversos refinamientos
  lexicon: 'Greek: luxury/soft living; no fixed lexicon number supplied'
  rationale: ‘Lujos’ conserva la connotación de vida disipada o cómoda en exceso.
- source_word: things that are not fitting
  english_pob_choice: things that are not fitting
  chosen_spanish: cosas que no convienen
  alternatives_spanish:
  - cosas impropias
  - cosas inconvenientes
  lexicon: 'Greek: unsuitable/not proper things; no fixed lexicon number supplied'
  rationale: ‘No convienen’ es formal y suficientemente amplio para abarcar decoro y aptitud moral.
- source_word: desire for women
  english_pob_choice: desire for women
  chosen_spanish: el deseo de mujeres
  alternatives_spanish:
  - deseo por mujeres
  - concupiscencia de mujeres
  lexicon: 'Greek: desire toward women; no fixed lexicon number supplied'
  rationale: Se mantiene la formulación del POB, evitando una explicitación más interpretativa.
- source_word: greed
  english_pob_choice: greed
  chosen_spanish: la codicia
  alternatives_spanish:
  - avaricia
  - ambición desordenada
  lexicon: 'Greek: greed/covetousness; no fixed lexicon number supplied'
  rationale: ‘Codicia’ es una equivalencia natural y adecuada en registro bíblico.
- source_word: arrogance
  english_pob_choice: arrogance
  chosen_spanish: la arrogancia
  alternatives_spanish:
  - soberbia
  - altivez
  lexicon: 'Greek: arrogance/pride; no fixed lexicon number supplied'
  rationale: ‘Arrogancia’ mantiene el tono directo del listado y es plenamente transparente.
- source_word: boastfulness
  english_pob_choice: boastfulness
  chosen_spanish: la jactancia
  alternatives_spanish:
  - fanfarronería
  - presunción
  lexicon: 'Greek: boasting; no fixed lexicon number supplied'
  rationale: ‘Jactancia’ es preciso y conserva el paralelismo con ‘arrogancia’.
- source_word: angel of wickedness
  english_pob_choice: angel of wickedness
  chosen_spanish: el ángel de la maldad
  alternatives_spanish:
  - el ángel de la iniquidad
  - el ángel malvado
  lexicon: 'Greek: angel characterized by wickedness; no fixed lexicon number supplied'
  rationale: Se mantiene la personificación literal y la formulación del POB inglés, sin suavizar la fuerza demonológica del texto.
theological_decisions:
- issue: Identidad del agente en el corazón cuando surgen los vicios
  english_pob_reading: know that he is in you / the angel of wickedness is with you
  chosen_spanish_reading: sabe que él está en ti / sabe que el ángel de la maldad está contigo
  alternative_spanish_readings:
  - sabe que está en ti
  - reconoce que el ángel de la maldad está contigo
  rationale: El texto conserva la personificación masculina y la relación de presencia/influencia espiritual sin convertirla en mera metáfora psicológica.
  doctrine_reference: Antropología moral y lenguaje de agencia espiritual en literatura cristiana temprana
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] aparece ahora exactamente en el texto principal junto al sintagma correspondiente. No se añadieron notas sin anclaje.'
  spanish_consistency_notes:
  - Se mantiene ‘ángel de la maldad’ para el paralelismo con el inglés POB y la personificación del original.
  - Se usa ‘camino’ y ‘sendero’ de forma consistente para la imagen de la vía moral.
  - Se evitó ‘SEÑOR’ y no aplica terminología de YHWH en este pasaje.
  - La lista de vicios conserva estructura acumulativa y tono exhortativo sin ampliar el contenido fuente.
