revisions:
- from: Pues el camino torcido no tiene huellas, sino lugares sin sendero y muchos tropiezos; y es áspero y lleno de espinas. Por tanto, es dañino. Pero escucha también las obras del otro camino. Ante todo, si te sobreviene un temperamento irritable[a] o amargura, sabe que él está en ti. Luego vienen el deseo de muchas actividades, el exceso en muchos alimentos y bebidas, y muchas borracheras, y diversos lujos, y cosas que no convienen; y el deseo de mujeres, y la codicia, y la arrogancia, y la jactancia, y todo lo que es afín y semejante a estas cosas. Por tanto, cada vez que estas cosas se levanten en tu corazón, sabe que el ángel de la maldad está contigo.
  to: Pues el camino torcido no tiene senda, sino lugares sin camino y muchos tropiezos; y es áspero y espinoso. Por tanto, es dañino. Pero escucha también las obras del otro camino. Ante todo, si te sobreviene un pronto enojo[a] o amargura, sabe que él está en ti. Luego viene el deseo de muchas actividades, y el exceso en muchos alimentos y bebidas, y muchas borracheras, y diversos lujos, y cosas que no convienen; y el deseo de mujeres, y la codicia, y la arrogancia, y la jactancia, y todo lo que es afín y semejante a estas cosas. Por tanto, cada vez que estas cosas se levanten en tu corazón, sabe que el ángel de la maldad está contigo.
  rationale: 'Se ajustaron dos expresiones para acercarlas mejor al sentido probable del griego y al inglés auditado, a la vez que se mejora la naturalidad del español: ‘no tiene senda’ comunica mejor la idea del camino carente de trazado, y ‘pronto enojo’ refleja mejor ‘quick temper’ que ‘temperamento irritable’. También se simplificó ‘lleno de espinas’ a ‘espinoso’ por fluidez sin pérdida de sentido.'
