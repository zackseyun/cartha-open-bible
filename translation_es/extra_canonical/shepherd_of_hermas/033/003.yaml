review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego según el rastro inglés POB: reconocer las obras, apartarse del ángel malo, confiar en el ángel de la justicia, la correspondencia entre el pensamiento que surge en el corazón y la acción resultante, y la conclusión de vivir para Dios. Conserva bien δοῦλοι como «esclavos» y mantiene la oposición moral entre ambos ángeles. Sin embargo, hay varios puntos de forma y naturalidad que requieren corrección menor para reflejar mejor el flujo del original y la legibilidad en español.'
  spanish_quality_summary: El texto es generalmente claro, pero mezcla tuteo plural con tercera persona («ustedes tienen... entiéndanlas»), usa algunas expresiones poco naturales o demasiado literales («se levanta en su corazón», «mala en toda obra», «gravosas»), y contiene un problema de puntuación en la cita («Vean entonces”, dice, “...») además de un salto innecesario de registro entre singular y plural. Con ajustes menores, puede quedar fiel y más idiomático.
  glossary_alignment: 'La alineación terminológica es en general buena: «esclavos de Dios» refleja correctamente δοῦλοι; «ángel de la justicia» y «ángel de la maldad» son decisiones aceptables y coherentes con el expediente inglés. «Vivan para Dios» también está bien. Recomiendo solo pulir formulaciones sintácticas, no cambiar la terminología central.'
  issues:
  - severity: medium
    issue: Mezcla inconsistente de tratamiento plural
    rationale: El borrador alterna «ustedes tienen» con imperativos de «vosotros» como «entiéndanlas» y «aléjense». En español neutro latinoamericano debe mantenerse «ustedes» con formas como «entiéndanlas», «confíen», «aléjense», pero conviene uniformar toda la oración para evitar sensación híbrida.
  - severity: medium
    issue: «Su enseñanza es mala en toda obra» suena poco natural y opaco
    rationale: Aunque reproduce el inglés, en español resulta más claro «su enseñanza es mala en todas sus obras» o «en cada obra», para expresar que la maldad caracteriza todo lo que produce.
  - severity: low
    issue: «El pensamiento... se levanta en su corazón» es demasiado literal
    rationale: Una formulación como «surge en su corazón» comunica mejor el movimiento interno sin perder el vínculo con el original y el audit trail inglés.
  - severity: low
    issue: «Gravosas» es correcto pero rígido en este contexto pastoral
    rationale: «Graves» transmite bien el peso moral de grievous y suena más natural y ampliamente comprensible en español eclesial general.
  - severity: medium
    issue: Puntuación defectuosa en la cita directa
    rationale: La secuencia «Vean entonces”, dice, “que...» tiene comillas colocadas de manera incorrecta. Debe ajustarse a una puntuación española clara.
