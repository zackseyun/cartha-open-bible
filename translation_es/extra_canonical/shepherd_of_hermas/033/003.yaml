base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/033/003.yaml
  text: 'So when you recognize his works, withdraw from him and put no trust in him, because his works are wicked and harmful to God’s slaves. You therefore have the activities of both angels; understand them, and trust the angel of righteousness. But withdraw from the angel of wickedness, because his teaching is wicked in every deed. For if someone is a faithful man, and the thought of this angel rises up in his heart, that man or woman must commit some sin. But if again some man or woman is very wicked, and the works of the angel of righteousness rise up in his or her heart, that person must of necessity do something good. You see then,” he says, “that it is good to follow the angel of righteousness, and to renounce the angel of wickedness. As to faith, this commandment makes it clear: that you should trust the works of the angel of righteousness, and, having done them, live to God. But believe that the works of the angel of wickedness are grievous; so by not doing them, you will live
    to God.”'
translation:
  language: es
  text: 'Así que, cuando reconozcan sus obras, aléjense de él y no confíen en él, porque sus obras son malas y perjudiciales para los esclavos de Dios. Por tanto, ustedes tienen las actividades de ambos ángeles; entiéndanlas y confíen en el ángel de la justicia. Pero aléjense del ángel de la maldad, porque su enseñanza es mala en todas sus obras. Porque si alguien es un hombre fiel, y el pensamiento de este ángel surge en su corazón, ese hombre o esa mujer necesariamente cometerá algún pecado. Pero si, por otra parte, algún hombre o alguna mujer es muy malvado, y las obras del ángel de la justicia surgen en su corazón, esa persona necesariamente hará algo bueno. Ya ven, entonces —dice—, que es bueno seguir al ángel de la justicia y renunciar al ángel de la maldad. En cuanto a la fe, este mandamiento lo deja claro: que ustedes confíen en las obras del ángel de la justicia y, habiéndolas hecho, vivan para Dios. Pero crean que las obras del ángel de la maldad son graves; así, al no hacerlas,
    vivirán para Dios.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοῦλοι τοῦ θεοῦ
  english_pob_choice: God’s slaves
  chosen_spanish: esclavos de Dios
  alternatives_spanish:
  - siervos de Dios
  - servidores de Dios
  lexicon: δοῦλος
  rationale: Mantengo la fuerza lexical de δοῦλος con «esclavos», porque el inglés POB preserva la tensión del término y no la suaviza a «servants». En español, «esclavos de Dios» comunica esa relación de pertenencia/obediencia sin sustituirla por un término eclesiástico más blando.
- source_word: ἄγγελος δικαιοσύνης
  english_pob_choice: angel of righteousness
  chosen_spanish: ángel de la justicia
  alternatives_spanish:
  - ángel de la rectitud
  - ángel justo
  lexicon: ἄγγελος / δικαιοσύνη
  rationale: «Justicia» es la opción más natural y fiel para δικαιοσύνη en este contexto moral; conserva el contraste con «maldad» y la fuerza ética del pasaje. «Rectitud» sería posible, pero aquí la relación con obras y vida para Dios favorece «justicia».
- source_word: ἄγγελος πονηρίας
  english_pob_choice: angel of wickedness
  chosen_spanish: ángel de la maldad
  alternatives_spanish:
  - ángel de la perversidad
  - ángel de la iniquidad
  lexicon: ἄγγελος / πονηρία
  rationale: «Maldad» expresa de forma clara y amplia πονηρία, manteniendo el paralelismo con «ángel de la justicia». «Iniquidad» o «perversidad» sonarían más marcados o más arcaicos sin añadir ventaja contextual aquí.
- source_word: ἔργα / πράξεις
  english_pob_choice: works / activities
  chosen_spanish: obras / actividades
  alternatives_spanish:
  - obras / acciones
  - obras / prácticas
  lexicon: ἔργον / πράξις
  rationale: Sigo la distinción del inglés POB entre «works» y «activities» con «obras» y «actividades». En la primera mitad del pasaje, «actividades» conserva la idea de operación/manifestación de ambos ángeles; «obras» mantiene la repetición moral del texto.
- source_word: ζήσεσθε τῷ θεῷ / ζῆν τῷ θεῷ
  english_pob_choice: live to God
  chosen_spanish: vivan para Dios
  alternatives_spanish:
  - vivan a Dios
  - vivan ante Dios
  lexicon: ζάω + dativo
  rationale: '«Vivan para Dios» refleja bien la orientación del dativo: vida dirigida a Dios. «Vivan a Dios» sería menos natural en español; «ante Dios» desplaza el sentido hacia presencia más que finalidad.'
- source_word: ἀγαθόν / βαρύ
  english_pob_choice: good / grievous
  chosen_spanish: bueno / gravosas
  alternatives_spanish:
  - bueno / pesadas
  - bueno / penosas
  lexicon: ἀγαθός / βαρύς
  rationale: «Gravosas» traduce el peso moral de βαρύς con una palabra que en español comunica carga, seriedad y dificultad. «Pesadas» sería demasiado físico; «penosas» añade un matiz emocional no explicitado.
theological_decisions:
- issue: Origen y estatus de los dos ángeles como agentes morales opuestos
  english_pob_reading: The English POB preserves the text’s contrast between the angel of righteousness and the angel of wickedness as real moral agencies, without collapsing them into mere abstractions.
  chosen_spanish_reading: Mantengo el contraste entre el ángel de la justicia y el ángel de la maldad como agentes morales reales, no como simples metáforas abstractas.
  alternative_spanish_readings:
  - reducirlos a personificaciones morales
  - parafrasearlos como impulsos internos
  rationale: El pasaje atribuye obras, enseñanza, pensamiento que se levanta en el corazón y efectos morales concretos; la traducción debe conservar esa agencia personal sin añadir especulación doctrinal. Eso sigue la lectura del inglés POB y deja visible la tensión del texto.
  doctrine_reference: Angelología moral del Shepherd of Hermas; lectura narrativa del combate entre obediencia y pecado.
- issue: Relación entre pensamiento interior y acto pecaminoso o bueno
  english_pob_reading: If the thought of either angel rises in the heart, the corresponding moral action follows with necessity.
  chosen_spanish_reading: Conservo que el pensamiento que se levanta en el corazón conduce necesariamente al acto correspondiente, sea pecado o bien.
  alternative_spanish_readings:
  - suavizar la necesidad con ‘puede conducir’
  - hacerlo meramente exhortativo
  rationale: El texto presenta una lógica fuerte de correspondencia moral; no conviene debilitarla. «Necesariamente» refleja la fuerza del argumento y mantiene la advertencia pastoral del pasaje.
  doctrine_reference: Antropología moral y formación del carácter en literatura cristiana primitiva.
- issue: ‘Live to God’ como finalidad de vida resultante de obedecer
  english_pob_reading: Doing the works of the angel of righteousness results in living to God; not doing the wicked works also results in living to God.
  chosen_spanish_reading: Traduzco la expresión final como ‘vivan para Dios’, destacando finalidad y orientación de la vida.
  alternative_spanish_readings:
  - ‘vivan a Dios’
  - ‘vivan ante Dios’
  rationale: 'La fórmula española elegida conserva el valor teleológico del dativo y evita confusiones con mero juicio externo. Además, armoniza con la secuencia: confiar, hacer, vivir.'
  doctrine_reference: Vida orientada a Dios como fruto de la obediencia.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete; la redacción se ha construido directamente desde el griego normalizado y el audit trail inglés, preservando la tensión lexical de δοῦλος y la personificación moral de los dos ángeles.
  spanish_consistency_notes:
  - Se mantiene ‘ángel de la justicia’ / ‘ángel de la maldad’ de forma consistente en todo el pasaje.
  - Se conserva ‘esclavos de Dios’ para respetar la fuerza de δοῦλος y la preferencia auditada del POB.
  - ‘Vivan para Dios’ se usa de manera uniforme para ζῆν τῷ θεῷ.
  - Se evita alternar entre ‘rectitud’ y ‘justicia’ para no diluir el contraste ético del texto.
