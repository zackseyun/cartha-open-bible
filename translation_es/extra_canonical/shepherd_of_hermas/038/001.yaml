review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego según la auditoría inglesa: la tristeza desgasta/aflige al Espíritu, el doble ánimo lleva al fracaso, el enojo produce pesar y arrepentimiento, y el Espíritu dado a la carne no tolera tristeza ni estrechez. Sin embargo, hay varios ajustes de fidelidad y naturalidad: en español se pierde la referencia impersonal de ''the person'' al cambiar a ''él''; ''clame a Dios'' no refleja bien la idea de apelar/quejarse a Dios; y ''gravosas'' suena menos idiomático que una formulación más directa.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero tiene algunos giros algo rígidos o poco naturales para español eclesial amplio: ''se adhiere a una persona'' y ''respecto de algún asunto'' son pesados; ''gravosas para el Espíritu Santo'' no suena idiomático; y la alternancia de género en una construcción genérica (''persona ... y él'') entorpece la lectura. Conviene además mantener la repetición del sujeto humano de forma inclusiva y natural.'
  glossary_alignment: 'La terminología principal está bien alineada con el proyecto: ''Espíritu Santo'', ''doble ánimo'', ''tristeza'', ''se arrepiente'', ''carne''. No hay conflictos con Yahvé/Mesías. Se recomienda conservar ''doble ánimo'' y ''carne''. El problema principal no es glosarial sino sintáctico-semántico: ''clame a Dios'' debe ajustarse a algo como ''apele a Dios'' o ''se queje ante Dios'' para preservar el matiz del inglés auditado.'
  issues:
  - severity: medium
    issue: Cambio impropio a referente masculino singular en 'y él se amarga sobremanera'
    rationale: El original y la POB usan una referencia genérica a 'la persona'; en español, introducir 'él' después de 'una persona' rompe la concordancia inclusiva y añade un matiz no presente.
  - severity: medium
    issue: '''clame a Dios'' no refleja bien ''appeal to God'''
    rationale: '''Clamar'' sugiere pedir ayuda a gritos, mientras que aquí el sentido auditado es más bien apelar/quejarse ante Dios y marcharse. Debe preservarse ese matiz sin paraprasear demasiado.'
  - severity: low
    issue: '''son gravosas para el Espíritu Santo'' suena poco idiomático'
    rationale: Aunque comprensible, en español natural y digno es mejor 'son penosas para el Espíritu Santo' o 'entristecen al Espíritu Santo'.
  - severity: low
    issue: 'Algunos giros son innecesariamente rígidos: ''se adhiere'', ''respecto de algún asunto'''
    rationale: 'Una leve suavización mejora la legibilidad sin alejarse del sentido: ''se apodera de alguien por algún asunto'' o ''surge en una persona por algún asunto''.'
