  yaml_path: translation/extra_canonical/shepherd_of_hermas/038/001.yaml
  text: '“Listen, then,” he says, “foolish one, how sorrow wears down the Holy Spirit and then again saves. Whenever the double‑minded person undertakes some action and fails in it because of his double‑mindedness, this sorrow enters into the person and grieves the Holy Spirit and wears it down. Then again, when quick temper clings to a person concerning some matter, and he becomes exceedingly embittered, again sorrow enters into the heart of the person who became quick‑tempered, and he is grieved over the deed that he did and repents, because he did what is evil. This sorrow, then, seems to bring salvation, because after doing what is evil he repented. Therefore both things grieve the Spirit: double‑mindedness, because it did not attain its purpose; and quick temper grieves the Spirit, because it did what is evil. Both, then, are grievous to the Holy Spirit—double‑mindedness and quick temper. Remove, therefore, sorrow from yourself, and do not afflict the Holy Spirit that dwells in you,
    lest it appeal to God and depart from you. For the Spirit of God that was given to this flesh does not endure sorrow or distress.”'
translation:
  language: es
  text: '“Escucha, pues”, dice, “oh insensato, cómo la tristeza desgasta al Espíritu Santo y luego, otra vez, salva. Cuando la persona de doble ánimo emprende alguna acción y fracasa en ella a causa de su doble ánimo, esta tristeza entra en la persona, contrista al Espíritu Santo y lo desgasta. Luego, cuando un arrebato de ira se apodera de una persona por algún asunto, y esta se amarga sobremanera, otra vez la tristeza entra en el corazón de la persona que se enojó, y se entristece por la obra que hizo y se arrepiente, porque hizo lo malo. Esta tristeza, pues, parece traer salvación, porque, después de hacer lo malo, se arrepintió. Por tanto, ambas cosas contristan al Espíritu: el doble ánimo, porque no alcanzó su propósito; y el arrebato de ira contrista al Espíritu, porque hizo lo malo. Ambas, pues, son penosas para el Espíritu Santo: el doble ánimo y el arrebato de ira. Quita, por tanto, la tristeza de ti, y no aflijas al Espíritu Santo que mora en ti, no sea que apele a Dios y se aparte
    de ti. Porque el Espíritu de Dios que fue dado a esta carne no soporta la tristeza ni la angustia.”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διψυχία / διψυχος (double-mindedness)
  english_pob_choice: double-mindedness / double-minded person
  chosen_spanish: doble ánimo / persona de doble ánimo
  alternatives_spanish:
  - doblez de ánimo
  - vacilación
  - inconstancia
  lexicon: No inventado
  rationale: Mantiene la imagen ética de mente/corazón dividido que la POB expresa con 'double-mindedness', y en español bíblico 'doble ánimo' es claro y natural sin perder el matiz moral.
- source_word: λύπη (sorrow)
  english_pob_choice: sorrow
  chosen_spanish: tristeza
  alternatives_spanish:
  - aflicción
  - pesar
  lexicon: No inventado
  rationale: '''Tristeza'' comunica bien el efecto interior y conserva la repetición del pasaje; ''aflicción'' sonaría más interpretativa en varios contextos.'
- source_word: πνεῦμα ἅγιον
  english_pob_choice: Holy Spirit
  chosen_spanish: Espíritu Santo
  alternatives_spanish:
  - Espíritu Santo de Dios
  - Santo Espíritu
  lexicon: No inventado
  rationale: La forma reverente y estándar en español es 'Espíritu Santo'; preserva el referente personal del texto sin añadir explicación.
- source_word: θυμός / quick temper
  english_pob_choice: quick temper
  chosen_spanish: arrebato de ira
  alternatives_spanish:
  - ira pronta
  - mal genio
  - prontitud para la ira
  lexicon: No inventado
  rationale: '''Arrebato de ira'' expresa mejor la fuerza repentina del término y evita una locución demasiado coloquial; conserva el contraste moral con la mansedumbre implícita.'
- source_word: μετανοεῖ (repents)
  english_pob_choice: repents
  chosen_spanish: se arrepiente
  alternatives_spanish:
  - cambia de mente
  - se vuelve
  - hace penitencia
  lexicon: No inventado
  rationale: Aquí la acción sigue a la conciencia de haber hecho el mal, por lo que 'se arrepiente' comunica adecuadamente el giro moral sin imponer un marco sacramental.
- source_word: σάρξ (flesh)
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza humana
  - cuerpo
  lexicon: No inventado
  rationale: '''Carne'' conserva la terminología antropológica del texto y evita suavizarla a ''naturaleza humana'', que sería más interpretativa.'
theological_decisions:
- issue: Relación entre tristeza y salvación
  english_pob_reading: This sorrow... seems to bring salvation, because after doing what is evil he repented.
  chosen_spanish_reading: Esta tristeza... parece traer salvación, porque, después de hacer lo malo, se arrepintió.
  alternative_spanish_readings:
  - Esta tristeza... parece conducir a la salvación
  - Esta tristeza... parece salvar
  rationale: Se mantiene la cautela de 'parece' y la conexión causal dada por la POB, sin afirmar una eficacia automática de la tristeza misma.
  doctrine_reference: Arrepentimiento y fruto moral del reconocimiento del pecado
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando toda nota al pie no anclada en el texto; el presente borrador no incluye marcadores de nota, por lo que no hay riesgo de desajuste entre texto y aparato.
  spanish_consistency_notes:
  - Se mantuvo la alternancia entre 'tristeza' y 'arrebato de ira' para reflejar dos causas distintas de contricción del Espíritu.
  - '''Espíritu'' se capitaliza cuando refiere al Espíritu Santo y se conserva como ''espíritu'' solo en la expresión fija ''el Espíritu de Dios''.'
  - '''Dios'' se traduce sin máscara litúrgica, conforme al criterio del proyecto.'
