  yaml_path: translation/extra_canonical/shepherd_of_hermas/062/007.yaml
  text: “Who then, Sir,” I say, “are the ones who are crowned and go into the tower?”
translation:
  language: es
  text: 'Entonces dije: «Señor, ¿quiénes son los que son coronados y entran en la torre?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τίς οὖν
  english_pob_choice: Who then
  chosen_spanish: ¿quiénes son, entonces
  alternatives_spanish:
  - ¿quién, entonces
  - ¿quiénes, pues
  lexicon: τίς
  rationale: El interrogativo griego pide una pregunta directa. En español, «quiénes» refleja mejor la referencia plural implícita en la respuesta del contexto («los que son coronados»), mientras que «entonces» conserva la transición lógica de οὖν sin forzar un registro arcaico como «pues».
- source_word: κύριε
  english_pob_choice: Sir
  chosen_spanish: señor
  alternatives_spanish:
  - señor mío
  - amo
  lexicon: κύριος
  rationale: Aquí el vocativo es una forma de tratamiento respetuosa al interlocutor humano en la escena, no una alusión al nombre divino. «Señor» mantiene la cortesía y la naturalidad del español; «amo» sería demasiado fuerte para este contexto, y «señor mío» suena innecesariamente intensificado.
- source_word: οἱ στεφανωθέντες
  english_pob_choice: the ones who are crowned
  chosen_spanish: los que son coronados
  alternatives_spanish:
  - los coronados
  - los que reciben la corona
  lexicon: στεφανοῦν / στεφανόω
  rationale: La voz pasiva preserva la idea de que la coronación es recibida, no autoconferida. «Los que son coronados» mantiene ese matiz con claridad; «los coronados» es más breve, pero pierde algo de la acción verbal.
- source_word: εἰς τὸν πύργον
  english_pob_choice: into the tower
  chosen_spanish: en la torre
  alternatives_spanish:
  - hacia la torre
  - dentro de la torre
  lexicon: πύργος
  rationale: El griego con εἰς indica movimiento de entrada. En español, «entran en la torre» comunica naturalmente ese ingreso sin necesidad de un calco rígido como «hacia dentro de la torre».
theological_decisions:
- issue: Tratamiento del vocativo κύριε en una escena de diálogo
  english_pob_reading: Sir
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - Señor
  - mi señor
  rationale: No hay indicio aquí de que el vocativo se refiera a Dios o al Señor cristológico; es una forma respetuosa de dirigirse al interlocutor. Por eso se evita la mayúscula devocional como lectura impuesta, manteniendo la ambigüedad del original.
  doctrine_reference: Christology / honorific address; no doctrinal assertion in this line
translation_notes:
  revision_awareness: La traducción inglesa de POB es breve y no contiene notas ni decisiones léxicas registradas; esta propuesta se apoya directamente en el enunciado griego conservado en la unidad, manteniendo la estructura interrogativa y el contraste entre ser coronados e ingresar en la torre.
  spanish_consistency_notes:
  - Se mantiene el tratamiento respetuoso «señor» sin convertirlo en título divino.
  - Se evita «Cristo» o «Mesías» porque no aparecen en el segmento.
  - La sintaxis busca sonar natural en español sin perder la pasiva del participio griego.
  - «Torre» se conserva de forma literal para concordar con el símbolo narrativo del contexto inmediato.
