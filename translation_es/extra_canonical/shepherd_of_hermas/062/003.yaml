- from: «Y el gran y glorioso ángel es Miguel, que tiene autoridad sobre este pueblo y los gobierna. Porque él es el que les da la ley, en el corazón de los que creen; por eso él mismo visita a aquellos a quienes se la dio, para ver si la han guardado.»
  to: «Y el gran y glorioso ángel es Miguel, que tiene autoridad sobre este pueblo y los gobierna. Porque él es el que les da la ley en los corazones de los que creen; por eso él mismo visita a aquellos a quienes se la dio, para ver si la han guardado.»
