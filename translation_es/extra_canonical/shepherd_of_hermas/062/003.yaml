base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/062/003.yaml
  text: “And the great and glorious angel is Michael, who has authority over this people and governs them. For he is the one who gives the law to them, into the hearts of those who believe; therefore he himself visits those to whom he gave it, to see whether they have kept it.
translation:
  language: es
  text: «Y el gran y glorioso ángel es Miguel, que tiene autoridad sobre este pueblo y los gobierna. Porque él es el que les da la ley en los corazones de los que creen; por eso él mismo visita a aquellos a quienes se la dio, para ver si la han guardado.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ μέγας καὶ ἔνδοξος ἄγγελος
  english_pob_choice: the great and glorious angel
  chosen_spanish: el gran y glorioso ángel
  alternatives_spanish:
  - el ángel grande y glorioso
  - el ángel magnífico y glorioso
  lexicon: ἄγγελος
  rationale: Conservo «ángel» para ἄγγελος y mantengo el paralelismo adjetival de «great and glorious» con una fórmula natural en español. «Gran» evita una rigidez innecesaria y comunica mejor la dignidad del personaje.
- source_word: Μιχαήλ
  english_pob_choice: Michael
  chosen_spanish: Miguel
  alternatives_spanish:
  - Micael
  lexicon: Μιχαήλ
  rationale: Miguel es la forma española establecida y plenamente inteligible para el nombre propio.
- source_word: ἐξουσίαν ἔχει ἐπὶ τοῦ λαοῦ τούτου
  english_pob_choice: has authority over this people
  chosen_spanish: tiene autoridad sobre este pueblo
  alternatives_spanish:
  - tiene dominio sobre este pueblo
  - ejerce autoridad sobre este pueblo
  lexicon: ἐξουσία
  rationale: «Autoridad» refleja bien ἐξουσία sin intensificarlo indebidamente a «dominio»; «pueblo» reproduce el sustantivo colectivo del contexto.
- source_word: ποιμαίνει αὐτούς
  english_pob_choice: governs them
  chosen_spanish: los gobierna
  alternatives_spanish:
  - los pastorea
  - los guía
  lexicon: ποιμαίνω
  rationale: Aunque el verbo puede tener matiz de pastoreo, el inglés POB eligió «governs», y en español «los gobierna» conserva ese sentido sin introducir una imagen pastoral que el contexto inmediato no exige.
- source_word: νόμον αὐτοῖς δίδωσιν
  english_pob_choice: gives the law to them
  chosen_spanish: les da la ley
  alternatives_spanish:
  - les da la norma
  - les entrega la ley
  lexicon: νόμος
  rationale: «La ley» es la correspondencia directa y mantiene la fuerza jurídica del término. «Norma» suavizaría demasiado el enunciado.
- source_word: εἰς τὰς καρδίας τῶν πιστευόντων
  english_pob_choice: into the hearts of those who believe
  chosen_spanish: en el corazón de los que creen
  alternatives_spanish:
  - en los corazones de los creyentes
  - dentro del corazón de los que creen
  lexicon: καρδία
  rationale: Uso «en el corazón» para un español natural y para preservar la interiorización del mandato; «los que creen» sigue de cerca el participio sin imponer una terminología eclesial más cerrada.
- source_word: αὐτὸς ἐπισκέπτεται τοὺς ᾧ ἔδωκεν αὐτόν
  english_pob_choice: he himself visits those to whom he gave it
  chosen_spanish: él mismo visita a aquellos a quienes se la dio
  alternatives_spanish:
  - él mismo visita a los que se la dio
  - él mismo pasa a ver a aquellos a quienes se la dio
  lexicon: ἐπισκέπτομαι
  rationale: «Visita» reproduce el valor básico de ἐπισκέπτομαι sin añadir un matiz técnico de «inspección» que el texto también sugiere pero que no domina la frase; el pronombre «se la» conserva la referencia a «la ley».
- source_word: ἵνα ἴδῃ εἰ ἐτήρησαν αὐτήν
  english_pob_choice: to see whether they have kept it
  chosen_spanish: para ver si la han guardado
  alternatives_spanish:
  - para ver si la han observado
  - para ver si la han cumplido
  lexicon: τηρέω
  rationale: «Guardar» conserva bien τηρέω en sentido de observar/fidelidad a la ley. «Cumplir» sería posible, pero «guardar» preserva mejor el eco de custodia obediente y la referencia pronominal femenina a «la ley».
theological_decisions:
- issue: Identificación del ángel glorioso con Miguel
  english_pob_reading: the great and glorious angel is Michael
  chosen_spanish_reading: el gran y glorioso ángel es Miguel
  alternative_spanish_readings:
  - ese gran y glorioso ángel es Miguel
  - el gran ángel glorioso es Miguel
  rationale: Sigo la lectura del POB inglés al presentar la identificación directa sin suavizarla. No se añade explicación doctrinal en el texto, porque el pasaje afirma la identificación de manera simple y narrativa.
  doctrine_reference: Angelicology / identification of Michael in Shepherd of Hermas
translation_notes:
  revision_awareness: No hay revisiones aplicadas ni variantes auditadas en el paquete proporcionado; la versión española se redacta directamente desde el griego normalizado, tomando el inglés POB como control de equivalencia y de decisiones léxicas ya fijadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este pasaje porque no aparece el nombre divino.
  - Se conserva la distinción entre «ángel» y nombres propios; no se traduce Miguel como título.
  - Se usa «ley» de forma consistente con la carga normativa del griego νόμος.
  - Se mantiene la referencia femenina implícita de «la» al remitir a «la ley» en español.
