  text: “All who transgressed the law which they received from him,” he says, “he left under my authority for repentance; but those who have already been pleasing to the law and have kept it, he has under his own authority.”
translation:
  language: es
  text: “A todos los que transgredieron la ley que recibieron de él” —dice— “los dejó bajo mi autoridad para arrepentimiento; pero a los que ya han agradado a la ley y la han guardado, los tiene bajo su propia autoridad.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: transgreded / transgressed
  english_pob_choice: transgressed
  chosen_spanish: transgredieron
  alternatives_spanish:
  - quebraron
  - violaron
  lexicon: παραβαίνω
  rationale: “Transgredieron” conserva la idea de pasar por encima de un mandato sin suavizar la falta. “Violaron” puede sonar excesivamente jurídico o moderno; “quebraron” es posible, pero menos preciso como término de infracción.
- source_word: law
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la norma
  - el mandamiento
  lexicon: νόμος
  rationale: En este contexto, “ley” mantiene el valor normativo del original y coincide con la formulación inglesa auditada. “Norma” sería más interpretativa; “mandamiento” estrecha demasiado el sentido.
- source_word: repentance
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - cambio de mente
  - conversión
  lexicon: μετάνοια
  rationale: Aquí el movimiento es ético-volitivo y requiere una respuesta de retorno; “arrepentimiento” comunica bien ese sentido en español eclesial contemporáneo. “Cambio de mente” explicita el componente cognitivo, pero suena menos natural en este pasaje.
- source_word: pleasing to the law
  english_pob_choice: pleasing to the law
  chosen_spanish: han sido agradables a la ley
  alternatives_spanish:
  - han complacido a la ley
  - han obedecido la ley
  lexicon: εὐάρεστοι τῷ νόμῳ
  rationale: Se conserva la imagen de “ser agradables” o “aceptables” a la ley, que el inglés POB deja visible. “Han obedecido la ley” aclararía el sentido, pero borra la tensión metafórica del original.
- source_word: kept it
  english_pob_choice: have kept it
  chosen_spanish: la han guardado
  alternatives_spanish:
  - la han observado
  - la han cumplido
  lexicon: τηρέω
  rationale: “Guardar” mantiene la relación clásica entre mandato y fidelidad, y funciona bien en registro bíblico español. “Cumplir” es válido, pero más abstracto; “observar” es correcto, aunque menos inmediato.
- source_word: authority
  english_pob_choice: under my authority / under his own authority
  chosen_spanish: bajo mi autoridad / bajo su propia autoridad
  alternatives_spanish:
  - bajo mi poder / bajo su propio poder
  - bajo mi jurisdicción / bajo su propia jurisdicción
  lexicon: ἐξουσία
  rationale: “Autoridad” conserva el contraste del texto entre dos ámbitos de gobierno o asignación. “Poder” sería posible, pero desplaza el énfasis hacia fuerza; “jurisdicción” es demasiado técnico para esta sección.
theological_decisions:
- issue: Distribución de los pecadores y de los obedientes entre dos autoridades
  english_pob_reading: Those who transgressed are left under my authority for repentance, while those who have been pleasing to the law and have kept it are under his own authority.
  chosen_spanish_reading: Los transgresores quedan bajo la autoridad del hablante para arrepentimiento, mientras que los que han sido agradables a la ley y la han guardado quedan bajo la propia autoridad de él.
  alternative_spanish_readings:
  - Los desobedientes quedan para corrección bajo mi autoridad, y los obedientes bajo la suya
  - Los que faltaron a la ley quedan bajo mi mando para que se arrepientan, y los fieles quedan bajo el suyo
  rationale: La versión española preserva la distribución dual y la finalidad de arrepentimiento sin suavizar el contraste. No se introduce “corrección” ni “mando” porque desplazarían el matiz de autoridad delegada y el propósito penitencial explícito del texto.
  doctrine_reference: Autoridad delegada; disciplina y arrepentimiento como respuesta al pecado.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete proporcionado; la redacción sigue de cerca la lectura inglesa auditada y el griego disponible, sin necesidad de notas textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene “autoridad” de modo uniforme para ἐξουσία.
  - Se conserva “arrepentimiento” para μετάνοια conforme al uso doctrinal estándar en español.
  - Se mantiene la estructura contrastiva del original con “pero” para marcar la oposición entre ambos grupos.
