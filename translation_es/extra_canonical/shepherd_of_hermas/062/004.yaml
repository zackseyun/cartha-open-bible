base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/062/004.yaml
  text: “You see the rods of each person; for the rods are the law. You see, then, many rods made worthless; and you will recognize all those who have not kept the law, and you will see the dwelling of each one.”
translation:
  language: es
  text: «Ves las varas de cada uno; porque las varas son la ley. Ves, pues, muchas varas hechas inútiles; y reconocerás a todos los que no han guardado la ley, y verás la morada de cada uno».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ῥάβδοι / rods
  english_pob_choice: rods
  chosen_spanish: varas
  alternatives_spanish:
  - bastones
  - cayados
  - vara
  lexicon: ῥάβδος
  rationale: «Varas» conserva el valor literal y simbólico del objeto, y suena natural en español. «Bastones» o «cayados» desplazan el matiz concreto; «vara» en singular podría sonar más abstracto aquí, aunque el plural también es posible.
- source_word: νόμος / law
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - mandamiento
  - norma
  - ley divina
  lexicon: νόμος
  rationale: La correspondencia directa y más transparente es «ley». Mantiene el enlace entre las varas y la norma evaluativa del pasaje sin introducir una paráfrasis interpretativa.
- source_word: ἄχρηστοι / made worthless
  english_pob_choice: made worthless
  chosen_spanish: hechas inútiles
  alternatives_spanish:
  - hechas inservibles
  - sin valor
  - devenidas inútiles
  lexicon: ἄχρηστος
  rationale: «Hechas inútiles» refleja el juicio de inutilidad o inutilización sin exagerar hacia «sin valor», que sería más fuerte. «Inservibles» es posible, pero «inútiles» conserva mejor la transparencia del griego.
- source_word: οἳ οὐκ ἐτήρησαν τὸν νόμον / those who have not kept the law
  english_pob_choice: those who have not kept the law
  chosen_spanish: los que no han guardado la ley
  alternatives_spanish:
  - los que no observaron la ley
  - los que no cumplieron la ley
  lexicon: τηρέω
  rationale: «Guardar la ley» es la equivalencia más estable y bíblicamente inteligible para τηρέω en este contexto. «Observar» o «cumplir» son posibles, pero «guardar» mantiene mejor la continuidad con el inglés POB y con el lenguaje de obligación moral.
- source_word: οἴκησις / dwelling
  english_pob_choice: dwelling
  chosen_spanish: morada
  alternatives_spanish:
  - habitación
  - vivienda
  - estancia
  lexicon: οἴκησις
  rationale: «Morada» transmite el sentido de lugar de habitación con un tono digno y religioso, más adecuado que «vivienda» o «estancia» para este contexto visionario.
theological_decisions:
- issue: Relación simbólica entre las varas y la ley
  english_pob_reading: the rods are the law
  chosen_spanish_reading: las varas son la ley
  alternative_spanish_readings:
  - las varas representan la ley
  - las varas significan la ley
  rationale: Se mantiene la identificación directa del símbolo con la ley, como en el inglés POB. No se suaviza a «representan» o «significan», porque eso debilitaría la fuerza declarativa del texto.
  doctrine_reference: simbología moral/forense del pasaje
- issue: Juicio sobre quienes no guardaron la ley
  english_pob_reading: you will recognize all those who have not kept the law
  chosen_spanish_reading: reconocerás a todos los que no han guardado la ley
  alternative_spanish_readings:
  - conocerás a todos los que no guardaron la ley
  - identificarás a todos los que no guardaron la ley
  rationale: «Reconocerás» sigue de cerca el inglés POB y preserva la idea de discernimiento en la visión. «Identificarás» es posible, pero suena más técnico y menos acorde con el tono revelatorio.
  doctrine_reference: discernimiento moral y revelación visionaria
- issue: Referencia a la morada de cada uno
  english_pob_reading: you will see the dwelling of each one
  chosen_spanish_reading: verás la morada de cada uno
  alternative_spanish_readings:
  - verás la casa de cada uno
  - verás dónde habita cada uno
  rationale: «Morada» mantiene el registro elevado y evita una trivialización doméstica. La frase conserva la ambigüedad entre lugar de residencia y estado asignado por la visión, sin añadir interpretación.
  doctrine_reference: imaginario visionario de destino/ubicación
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete base. La traducción sigue de cerca el texto inglés auditado, pero vuelve al griego para las decisiones léxicas clave (ῥάβδοι, νόμος, ἄχρηστοι, τηρέω, οἴκησις).
  spanish_consistency_notes:
  - Se mantiene «ley» para νόμος y «morada» para οἴκησις, coherentes con un registro bíblico sobrio.
  - Se usa «guardar la ley» para τηρέω, evitando oscilación con «cumplir» en este registro.
  - «Varas» se conserva en plural para reflejar la repetición imagística del original.
