  text: “Listen,” he says. “This great tree that covers plains and mountains and the whole earth is the law of God given to the whole world. And this law is the Son of God, proclaimed to the ends of the earth; and the peoples under the shade are those who heard the proclamation and believed in him.
translation:
  language: es
  text: «Escucha», dice. «Este gran árbol que cubre llanuras, montes y toda la tierra es la ley de Dios dada a todo el mundo. Y esta ley es el Hijo de Dios, proclamado hasta los confines de la tierra; y los pueblos bajo su sombra son los que oyeron la proclamación y creyeron en él.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λόγος / ἀκοῦσον (implícito en “Listen”)
  english_pob_choice: Listen
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escuchen
  lexicon: —
  rationale: Imperativo singular directo y natural en español, conservando el tono oral del diálogo sin volverlo más solemne de lo que el griego y el inglés sostienen.
- source_word: νόμος τοῦ θεοῦ
  english_pob_choice: the law of God
  chosen_spanish: la ley de Dios
  alternatives_spanish:
  - la ley de Yahvé
  - la norma de Dios
  lexicon: —
  rationale: «Ley de Dios» reproduce con claridad el sentido jurídico-covenantal del original y coincide con el uso establecido en español bíblico; no se sustituye por «Yahvé» aquí porque el segmento refleja la formulación griega θεοῦ, no una cita explícita del nombre divino.
- source_word: υἱὸς τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - el Hijo de Yahvé
  - el Hijo divino
  lexicon: —
  rationale: La expresión cristológica es fija y transparente en español. Mantiene el título relacional del original sin suavizarlo a una paráfrasis.
- source_word: κηρυχθεῖσα / proclamation
  english_pob_choice: proclaimed
  chosen_spanish: proclamada
  alternatives_spanish:
  - anunciada
  - predicada
  lexicon: —
  rationale: «Proclamada» conserva el matiz público y universal de κηρύσσω mejor que un simple «anunciada», y refleja el alcance misionero del texto.
- source_word: λαοί
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las gentes
  - las naciones
  lexicon: —
  rationale: «Los pueblos» preserva el plural colectivo del griego y el sentido de grupos humanos bajo la sombra del árbol, sin imponer un tecnicismo etnográfico.
- source_word: ὑπὸ τὴν σκιάν
  english_pob_choice: under the shade
  chosen_spanish: bajo su sombra
  alternatives_spanish:
  - a la sombra
  - bajo la sombra
  lexicon: —
  rationale: «Bajo su sombra» expresa la relación espacial y protectora que el símbolo del árbol comunica; el posesivo se añade en español por claridad referencial, dado que el antecedente inmediato es inequívoco.
theological_decisions:
- issue: Identidad de la «ley de Dios» como «Hijo de Dios»
  english_pob_reading: And this law is the Son of God
  chosen_spanish_reading: Y esta ley es el Hijo de Dios
  alternative_spanish_readings:
  - Y esta ley es del Hijo de Dios
  - Y esta ley significa al Hijo de Dios
  rationale: Se mantiene la identificación fuerte del texto, aun si resulta teológicamente densa, porque el inglés POB no atenúa la equivalencia. La redacción española conserva la tensión simbólica sin explicarla ni domesticarla.
  doctrine_reference: Cristología simbólica y tipológica en Hermas; no se reinterpreta como mera metáfora moral.
- issue: «Creyeron en él» como referencia cristológica
  english_pob_reading: believed in him
  chosen_spanish_reading: creyeron en él
  alternative_spanish_readings:
  - creyeron a él
  - pusieron su fe en él
  rationale: «Creyeron en él» es idiomático en español y mantiene la referencia personal al Hijo de Dios. No se expande a una frase más interpretativa.
  doctrine_reference: Fe personal en la figura del Hijo de Dios, conforme al contexto cristiano primitivo del pasaje.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete provisto; la versión inglesa auditada es breve y no presenta notas textuales ni variantes que exijan marcación adicional en español.
  spanish_consistency_notes:
  - Se conserva el tratamiento directo del interlocutor con «dice» y comillas de cita para reflejar el estilo narrativo del inglés.
  - No se introduce «Cristo» porque el pasaje usa «Hijo de Dios», y el español puede reproducir esa formulación sin forzar una equivalencia litúrgica.
  - La sintaxis mantiene el paralelismo de dos oraciones coordinadas con punto y coma, como en la versión inglesa, para no diluir la estructura expositiva del símbolo del árbol.
