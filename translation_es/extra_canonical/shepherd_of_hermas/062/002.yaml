  to: «Escucha», dice. «Este gran árbol que cubre llanuras, montes y toda la tierra es la ley de Dios dada a todo el mundo. Y esta ley es el Hijo de Dios, proclamado hasta los confines de la tierra; y los pueblos bajo su sombra son los que oyeron la proclamación y creyeron en él.»
