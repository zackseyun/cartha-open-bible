revisions:
- from: 'Pero los otros, que también entregaron sus varas verdes y con retoños laterales, aunque sin fruto: estos son los que fueron presionados por causa de la ley, pero no padecieron ni negaron su ley.'
  to: Pero los otros, que también entregaron sus varas verdes y con retoños laterales, aunque sin fruto, estos son los que fueron oprimidos por causa de la ley, pero no padecieron ni negaron su ley.
  rationale: Se ajusta ἐθλίβησαν a «fueron oprimidos», que comunica mejor el apremio/aflicción del original y del POB inglés, y se suaviza la puntuación para una lectura más natural en español sin alterar el contenido.
