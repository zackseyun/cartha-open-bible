base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/062/009.yaml
  text: “But the others, who themselves also handed in their rods green and having side-shoots, yet without fruit—these are those who were hard-pressed for the law, but did not suffer, nor did they deny their law.
translation:
  language: es
  text: Pero los otros, que también entregaron sus varas verdes y con retoños laterales, aunque sin fruto, estos son los que fueron oprimidos por causa de la ley, pero no padecieron ni negaron su ley.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄλλοι / "the others"
  english_pob_choice: the others
  chosen_spanish: los otros
  alternatives_spanish:
  - los demás
  - los restantes
  lexicon: ἄλλος
  rationale: «Los otros» reproduce el contraste del griego y del inglés POB de manera directa y natural en español.
- source_word: παρέδωκαν τὰς ῥάβδους
  english_pob_choice: handed in their rods
  chosen_spanish: entregaron sus varas
  alternatives_spanish:
  - presentaron sus varas
  - dieron sus varas
  lexicon: ῥάβδος
  rationale: «Varas» conserva el objeto simbólico; «entregaron» refleja el acto de presentar/dejar en el contexto narrativo sin forzar un tecnicismo ajeno al español.
- source_word: χλωράς
  english_pob_choice: green
  chosen_spanish: verdes
  alternatives_spanish:
  - tiernas
  - verdosas
  lexicon: χλωρός
  rationale: «Verdes» es la equivalencia más transparente para el color/estado vegetal señalado por el griego y el inglés POB.
- source_word: πλάγια βλαστάρια / side-shoots
  english_pob_choice: having side-shoots
  chosen_spanish: con retoños laterales
  alternatives_spanish:
  - con brotes laterales
  - con ramas laterales
  lexicon: βλαστός
  rationale: «Retoños laterales» mantiene la imagen botánica y evita una paráfrasis interpretativa; suena natural en español bíblico contemporáneo.
- source_word: ἄκαρποι
  english_pob_choice: without fruit
  chosen_spanish: sin fruto
  alternatives_spanish:
  - infructuosas
  - sin dar fruto
  lexicon: ἄκαρπος
  rationale: «Sin fruto» conserva la concisión del original y la fuerza imagística del griego, igual que el inglés POB.
- source_word: ὑπὲρ τοῦ νόμου
  english_pob_choice: for the law
  chosen_spanish: por causa de la ley
  alternatives_spanish:
  - a favor de la ley
  - por la ley
  lexicon: νόμος
  rationale: «Por causa de» explicita el matiz de presión/sufrimiento en favor de la ley; evita la ambigüedad de «por la ley» en español.
- source_word: ἐθλίβησαν
  english_pob_choice: were hard-pressed
  chosen_spanish: fueron presionados
  alternatives_spanish:
  - fueron oprimidos
  - fueron afligidos
  lexicon: θλίβω
  rationale: «Fueron presionados» conserva la idea de apremio/compresión del verbo sin cargarlo innecesariamente con un sentido más fuerte que el contexto no exige.
- source_word: οὐκ ἔπαθον
  english_pob_choice: did not suffer
  chosen_spanish: no padecieron
  alternatives_spanish:
  - no sufrieron
  - no fueron afligidos
  lexicon: πάσχω
  rationale: «Padecieron» mantiene un registro sobrio y amplio para el sufrimiento padecido, sin especificar más de lo que el texto da.
- source_word: οὐδὲ ἠρνήσαντο τὸν νόμον αὐτῶν
  english_pob_choice: nor did they deny their law
  chosen_spanish: ni negaron su ley
  alternatives_spanish:
  - ni renunciaron a su ley
  - ni repudiaron su ley
  lexicon: ἀρνέομαι
  rationale: «Negaron» reproduce el valor de rechazo/abjuración del verbo y conserva la formulación breve del inglés POB.
theological_decisions:
- issue: Suffering in relation to the law
  english_pob_reading: who were hard-pressed for the law, but did not suffer
  chosen_spanish_reading: fueron presionados por causa de la ley, pero no padecieron
  alternative_spanish_readings:
  - fueron oprimidos por causa de la ley, pero no sufrieron
  - fueron apremiados por la ley, pero no padecieron
  rationale: La frase mantiene la tensión entre presión externa y ausencia de sufrimiento consumado, sin resolverla en una interpretación moralizante o más intensa de la que ofrece el texto.
  doctrine_reference: Martirio/confesión bajo presión; fidelidad a la ley
- issue: Their law
  english_pob_reading: their law
  chosen_spanish_reading: su ley
  alternative_spanish_readings:
  - la ley de ellos
  - su propia ley
  rationale: «Su ley» conserva la referencia posesiva del texto y deja abierta la identificación exacta, tal como ocurre en el pasaje.
  doctrine_reference: Pertenencia de la ley al grupo mencionado
translation_notes:
  revision_awareness: No se registran revisiones aplicadas ni un aparato crítico alternativo en el paquete proporcionado; por ello la versión española sigue de cerca el texto griego normalizado y el enunciado inglés POB, sin introducir notas de variante textual no documentadas.
  spanish_consistency_notes:
  - Se conserva «ley» de forma consistente para νόμος, en concordancia con el inglés POB.
  - Se mantiene el tono descriptivo y simbólico del pasaje, sin introducir vocabulario eclesiástico ajeno al original.
  - No se emplean términos doctrinales posteriores que no aparezcan en el texto base.
