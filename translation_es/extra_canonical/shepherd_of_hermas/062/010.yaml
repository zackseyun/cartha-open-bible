base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/062/010.yaml
  text: “And those who handed in green rods just as they received them are dignified and righteous and have walked with a very pure heart, and have guarded the commandments of the Lord. The rest you will learn when I examine these rods that have been planted and watered.”
translation:
  language: es
  text: Y los que entregaron varas verdes tal como las recibieron son honorables y justos, y han andado con un corazón muy puro y han guardado los mandamientos del Señor. Lo demás lo aprenderás cuando examine estas varas que han sido plantadas y regadas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: green rods
  english_pob_choice: green rods
  chosen_spanish: varas verdes
  alternatives_spanish:
  - ramas verdes
  - bastones verdes
  lexicon: rod/vara
  rationale: «Varas» conserva el objeto alargado de madera sin introducir una imagen distinta; «verdes» mantiene el rasgo cromático vegetal que el contexto sugiere.
- source_word: dignified
  english_pob_choice: dignified
  chosen_spanish: dignos
  alternatives_spanish:
  - honorables
  - respetables
  lexicon: worthy/dignified
  rationale: En este contexto moral, «dignos» comunica adecuadamente la cualidad de honor y buen testimonio sin alargar la frase.
- source_word: righteous
  english_pob_choice: righteous
  chosen_spanish: justos
  alternatives_spanish:
  - rectos
  - piadosos
  lexicon: righteous
  rationale: «Justos» reproduce el valor ético y judicial del término, y es natural en español bíblico contemporáneo.
- source_word: very pure heart
  english_pob_choice: very pure heart
  chosen_spanish: un corazón muy puro
  alternatives_spanish:
  - un corazón sumamente limpio
  - un corazón totalmente puro
  lexicon: heart/pure
  rationale: Se conserva la metáfora del corazón como centro interior; «muy puro» sigue de cerca la intensificación del original y del inglés POB.
- source_word: guarded the commandments of the Lord
  english_pob_choice: guarded the commandments of the Lord
  chosen_spanish: han guardado los mandamientos del Señor
  alternatives_spanish:
  - han guardado los mandamientos de Yahvé
  - han observado los mandamientos del Señor
  lexicon: keep/commandments/Lord
  rationale: Se mantiene «mandamientos» y «han guardado» como fórmula clara. Se conserva «Señor» aquí porque el contexto del Shepherd of Hermas y el inglés POB usan esa forma como designación reverente; no hay en este pasaje una base directa suficiente para substituirla por «Yahvé» sin forzar el flujo de la obra.
- source_word: The rest you will learn
  english_pob_choice: The rest you will learn
  chosen_spanish: Lo demás lo aprenderás
  alternatives_spanish:
  - El resto lo sabrás
  - Lo restante lo conocerás
  lexicon: the rest/learn
  rationale: «Lo demás» es idiomático y compacto; «aprenderás» conserva la idea de recibir información por instrucción o revelación progresiva.
- source_word: when I examine these rods
  english_pob_choice: when I examine these rods
  chosen_spanish: cuando examine estas varas
  alternatives_spanish:
  - cuando inspeccione estas varas
  - cuando revise estas varas
  lexicon: examine
  rationale: «Examinar» es preciso y mantiene el acto de evaluación interpretativa del visionario.
- source_word: planted and watered
  english_pob_choice: that have been planted and watered
  chosen_spanish: que han sido plantadas y regadas
  alternatives_spanish:
  - que fueron plantadas y regadas
  - que se han plantado y regado
  lexicon: planted/watered
  rationale: La pasiva compuesta conserva el estado resultante de las varas y el paralelismo de cultivo simbólico del pasaje.
theological_decisions:
- issue: Rendering of "Lord" in a non-biblical Christian text that may echo scriptural diction
  english_pob_reading: The English POB keeps "Lord" without forcing an explicit divine-name rendering here.
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: En este texto patrístico, «Señor» respeta el tono reverente y la continuidad literaria del pasaje sin introducir una decisión sobre el nombre divino que el contexto inmediato no exige.
  doctrine_reference: Divine-name rendering policy; contextual Christological/divine reference in early Christian literature
- issue: Moral descriptors as traits of the faithful
  english_pob_reading: '"dignified and righteous" are rendered as moral qualities of the men who handed in the rods.'
  chosen_spanish_reading: dignos y justos
  alternative_spanish_readings:
  - honorables y rectos
  - dignos y rectos
  rationale: 'La lectura española mantiene dos cualidades distintas sin fusionarlas: honor público («dignos») y rectitud moral/legal («justos»).'
  doctrine_reference: Ethics/virtue language in early Christian moral teaching
translation_notes:
  revision_awareness: No applied revisions are listed in the audit context, so the Spanish draft follows the provided English POB sense directly while keeping close attention to the Greek-source imagery of rods, purity of heart, and the progressive disclosure signaled by the final clause.
  spanish_consistency_notes:
  - Se conservó la metáfora de las varas en todo el versículo para no debilitar la alegoría.
  - Se evitó sustituir «Señor» por «Yahvé» en ausencia de una base textual explícita en este segmento.
  - La sintaxis española busca ser natural sin añadir explicación interpretativa no presente en el texto.
