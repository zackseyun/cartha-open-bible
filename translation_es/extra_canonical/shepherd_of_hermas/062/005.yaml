  text: I say to him, “Sir, why did he send some away into the tower, but leave others to you?”
translation:
  language: es
  text: 'Le digo: «Señor, ¿por qué envió a unos a la torre, pero dejó a otros contigo?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λέγω / I say
  english_pob_choice: I say to him
  chosen_spanish: Le digo
  alternatives_spanish:
  - Le digo a él
  - Le respondo
  lexicon: λέγω
  rationale: El griego presenta una fórmula discursiva de respuesta directa; «Le digo» reproduce la inmediatez sin sobrecargar el español con una perífrasis innecesaria.
- source_word: κύριε / Sir
  english_pob_choice: Sir
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  lexicon: κύριος
  rationale: Aquí funciona como vocativo respetuoso; «Señor» conserva la cortesía y la naturalidad en español sin introducir una nota confesional que el contexto inmediato no exige.
- source_word: πύργος / tower
  english_pob_choice: tower
  chosen_spanish: torreón
  alternatives_spanish:
  - torre
  - torre fuerte
  lexicon: πύργος
  rationale: «Torreón» comunica una estructura alta y fortificada, adecuada al contexto simbólico de la obra, sin perder el sentido básico de πύργος.
theological_decisions:
- issue: 'Distribución desigual: unos son enviados al torreón y otros permanecen con el interlocutor'
  english_pob_reading: why did he send some away into the tower, but leave others to you?
  chosen_spanish_reading: ¿por qué envió a unos al torreón, pero dejó a otros contigo?
  alternative_spanish_readings:
  - ¿por qué mandó a unos al torreón, pero dejó a otros contigo?
  - ¿por qué envió a unos al torreón y dejó a otros contigo?
  rationale: La frase conserva la tensión narrativa de selección y retención sin suavizarla. «Dejó a otros contigo» mantiene el contraste del original y evita explicar de más la lógica de la escena.
  doctrine_reference: Ninguna; se trata de una observación narrativa del diálogo.
translation_notes:
  revision_awareness: No hubo revisiones previas ni pasajes paralelos en el audit trail inglés para este segmento breve; la redacción se basa directamente en el griego proporcionado en el encabezado y en la formulación inglesa auditada como contexto.
  spanish_consistency_notes:
  - Se mantiene un registro reverente pero no eclesiástico-arcaizante.
  - «torreón» se usa con valor concreto y simbólico, no como equivalencia técnica fija en todo el corpus.
  - No se añadió nota textual porque el segmento no presenta variantes ni ambigüedades que el texto español no pueda resolver con claridad.
