  text: “[Those who grappled with the devil and overcame him,” he says, “are crowned.] These are the ones who suffered for the law.
translation:
  language: es
  text: “Los que lucharon con el diablo y lo vencieron” —dice— “son coronados. Estos son los que padecieron por la ley.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ παλαίσαντες / grappled with
  english_pob_choice: grappled with
  chosen_spanish: lucharon con
  alternatives_spanish:
  - forcejearon con
  - combatieron con
  lexicon: παλαίω
  rationale: En español, «luchar con» transmite la imagen de combate cuerpo a cuerpo sin sonar artificial. «Forcejear» es posible, pero resulta menos natural en este contexto; «combatieron con» pierde la intensidad física sugerida por el verbo griego y por el inglés POB.
- source_word: τὸν διάβολον / the devil
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el Diablo
  lexicon: διάβολος
  rationale: «Diablo» es la forma estándar en español y conserva el referente personal del enemigo. No se capitaliza aquí porque el uso común en español no lo exige y el texto fuente no obliga a una forma nominalizada especial.
- source_word: ἐστεφανωμένοι εἰσίν / are crowned
  english_pob_choice: are crowned
  chosen_spanish: son coronados
  alternatives_spanish:
  - están coronados
  - reciben la corona
  lexicon: στεφανόω
  rationale: «Son coronados» conserva la pasiva y la imagen de recompensa/coronación. «Reciben la corona» explicita el sentido, pero añade material interpretativo; «están coronados» suena menos verbal y menos directo.
- source_word: οὗτοί εἰσιν / These are
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Éstos son
  lexicon: οὗτος
  rationale: La deíxis se mantiene de forma sencilla y natural en español. No requiere una alternativa marcada.
- source_word: οἱ ὑπὲρ τοῦ νόμου παθόντες / those who suffered for the law
  english_pob_choice: the ones who suffered for the law
  chosen_spanish: los que padecieron por la ley
  alternatives_spanish:
  - los que sufrieron por la ley
  - los que padecieron a causa de la ley
  lexicon: πάσχω
  rationale: «Padecieron» preserva la gravedad del sufrimiento y su tono más solemne. «Sufrieron» es viable, pero un poco más general. Se mantiene «por la ley» para reflejar la preposición y la posible relación causal/representativa sin sobreexplicar.
theological_decisions:
- issue: Identificación del grupo coronado como mártires o confesores
  english_pob_reading: These are the ones who suffered for the law.
  chosen_spanish_reading: Estos son los que padecieron por la ley.
  alternative_spanish_readings:
  - Estos son los que sufrieron por la ley
  - Estos son los que padecieron a causa de la ley
  rationale: La frase griega y la traducción POB no especifican explícitamente «mártires»; conservan una formulación amplia. En español conviene no estrechar el sentido más allá del testimonio textual, aunque la imagen de la corona sugiere recompensa por fidelidad sufriente.
  doctrine_reference: Martirio/confesión y recompensa escatológica en literatura cristiana primitiva; mantener la amplitud del texto evita una inferencia doctrinal no explicitada.
translation_notes:
  revision_awareness: 'No hay revisiones previas ni notas textuales registradas en el paquete de auditoría. La versión española sigue de cerca el breve enunciado inglés POB, pero vuelve al griego para sostener las decisiones léxicas clave: el verbo de lucha física, la pasiva de coronación y la frase causal/representativa «por la ley».'
  spanish_consistency_notes:
  - Se conserva «ley» sin mayúscula porque el contexto inmediato no exige una referencia técnica a la Torá, aunque puede aludir a la ley divina o al marco de fidelidad obediente.
  - Se mantiene el paralelismo breve de dos enunciados para respetar el tono sentencioso del original.
  - No se introduce «Cristo», «salvación» ni «mártires» porque no aparecen en el texto fuente de esta unidad.
