base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/062/001.yaml
  text: I say to him, “Sir, make known to me what this tree is; for I am perplexed about it, because, though so many branches have been cut off, the tree is sound, and nothing appears to have been cut away from it. About this, therefore, I am at a loss.”
translation:
  language: es
  text: 'Le digo: «Señor, hazme saber qué árbol es este; porque esto me desconcierta, pues, aunque han sido cortadas tantas ramas, el árbol está sano, y no parece que se le haya cortado nada. Por eso estoy perplejo».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Sir
  english_pob_choice: Sir
  chosen_spanish: Señor
  alternatives_spanish:
  - señor
  - amo
  lexicon: κύριε / κύριος
  rationale: En este parlamento directo, la forma vocativa natural y reverente en español es «Señor». Conserva el tono deferente del griego sin introducir una paráfrasis explicativa. «Amo» sería demasiado específico y no corresponde al contexto de respeto.
- source_word: make known to me
  english_pob_choice: make known to me
  chosen_spanish: hazme saber
  alternatives_spanish:
  - dame a conocer
  - házmelo saber
  lexicon: γνωρίσαι μοι
  rationale: El giro pide claridad en español con un imperativo dirigido a la acción de revelar. «Hazme saber» comunica bien la petición directa sin añadir color doctrinal ni sonar arcaico.
- source_word: what this tree is
  english_pob_choice: what this tree is
  chosen_spanish: qué árbol es este
  alternatives_spanish:
  - qué clase de árbol es este
  - qué es este árbol
  lexicon: τί τὸ δένδρον τοῦτο ἐστίν
  rationale: La pregunta apunta a la identidad del árbol. «Qué árbol es este» es breve y fiel; «qué clase de árbol» explicita de más, y «qué es este árbol» suena menos natural en español.
- source_word: I am perplexed about it / I am at a loss
  english_pob_choice: I am perplexed about it / I am at a loss
  chosen_spanish: estoy perplejo acerca de él ... estoy perplejo
  alternatives_spanish:
  - estoy confundido acerca de él ... por eso no lo entiendo
  - me desconcierta ... estoy desconcertado
  lexicon: ἀπορῶ
  rationale: El griego expresa desconcierto, estar sin salida o sin comprensión. «Perplejo» preserva la tensión intelectual sin reducirla a mera confusión emocional. Mantengo la repetición final para reflejar el énfasis del original y del inglés auditado.
- source_word: though so many branches have been cut off
  english_pob_choice: though so many branches have been cut off
  chosen_spanish: aunque han sido cortadas tantas ramas
  alternatives_spanish:
  - aunque se han cortado tantas ramas
  - aunque tantas ramas fueron cortadas
  lexicon: τοσαῦτα κλάδοι ἀποκεκόπασιν / ἀποκεκόπησαν
  rationale: La pasiva conserva el hecho de corte sin nombrar agente, como en el original. «Han sido cortadas» mantiene esa fuerza y suena natural en español. «Se han cortado» sería posible, pero menos explícitamente pasiva.
- source_word: the tree is sound
  english_pob_choice: the tree is sound
  chosen_spanish: el árbol está sano
  alternatives_spanish:
  - el árbol está íntegro
  - el árbol sigue firme
  lexicon: ὑγιαίνει
  rationale: «Sano» transmite el estado intacto, vigoroso, no dañado. «Íntegro» sería más abstracto y «firme» desplaza el sentido hacia estabilidad estructural. El contexto contrasta ramas cortadas con la condición no afectada del árbol.
- source_word: nothing appears to have been cut away from it
  english_pob_choice: nothing appears to have been cut away from it
  chosen_spanish: no parece que se le haya cortado nada
  alternatives_spanish:
  - no parece que nada le haya sido cortado
  - no parece que le falte nada
  lexicon: οὐδὲν φαίνεται ἀφῃρῆσθαι
  rationale: La formulación mantiene la apariencia perceptible, no una afirmación absoluta sobre lo sucedido. «Se le haya cortado nada» conserva el pasivo y el matiz de remoción/corte sin sobreinterpretar.
theological_decisions:
- issue: Whether to preserve the respectful address without ecclesiastical amplification
  english_pob_reading: Sir
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor mío
  - señor
  rationale: No hay base en el pasaje para una titulación teológica adicional; el vocativo expresa respeto al interlocutor. «Señor» mantiene la relación discursiva sin cargar el texto con formulaciones devocionales no requeridas.
  doctrine_reference: Pragmatics of address; no doctrinal distinction asserted in the passage
- issue: Maintaining the repeated perplexity as a rhetorical emphasis
  english_pob_reading: I am perplexed about it ... I am at a loss
  chosen_spanish_reading: estoy perplejo acerca de él ... estoy perplejo
  alternative_spanish_readings:
  - estoy confundido ... estoy desconcertado
  - no lo entiendo ... estoy sin saber qué decir
  rationale: La repetición en el griego y en el inglés auditado marca insistencia retórica. Reproducirla en español conserva la estructura del lamento/pregunta sin suavizarla.
  doctrine_reference: Rhetorical emphasis; no doctrinal content
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete. La redacción sigue de cerca el griego, con apoyo del inglés auditado solo para confirmar el tono de desconcierto y la repetición retórica, sin depender mecánicamente de él.
  spanish_consistency_notes:
  - Se mantiene un español moderno y digno, evitando arcaísmos innecesarios.
  - Se conserva la pasiva donde el griego no nombra agente, para no introducir interpretaciones.
  - No se introducen términos eclesiásticos ajenos al pasaje; el vocativo se resuelve de forma funcional como «Señor».
