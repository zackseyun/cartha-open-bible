  text: “I wanted,” I said, “sir, to know in what ways I must serve desire…”
translation:
  language: es
  text: «Quería», dije, «señor, saber de qué maneras debo servir al deseo…»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θέλω / ἤθελον (implícito en “I wanted”)
  english_pob_choice: I wanted
  chosen_spanish: Quería
  alternatives_spanish:
  - Quise
  - Deseaba
  lexicon: verb de querer / desear
  rationale: El griego expresa un querer pasado y cortés; «quería» reproduce bien ese matiz sin sonar demasiado abrupto. «Deseaba» sería posible, pero en español puede sugerir un matiz más emotivo o menos directo.
- source_word: κύριε
  english_pob_choice: sir
  chosen_spanish: señor
  alternatives_spanish:
  - señor mío
  - maestro
  lexicon: vocativo de respeto
  rationale: La forma inglesa «sir» corresponde a un vocativo respetuoso; «señor» es natural y digno en español. «Maestro» introduciría una relación más específica que no está exigida por el texto.
- source_word: ὑπηρετεῖν / δουλεύειν τῇ ἐπιθυμίᾳ (idea de servir al deseo)
  english_pob_choice: serve desire
  chosen_spanish: servir al deseo
  alternatives_spanish:
  - ser esclavo del deseo
  - obedecer al deseo
  lexicon: servir / esclavitud al deseo
  rationale: La redacción inglesa conserva la imagen de servicio; en español «servir al deseo» mantiene esa literalidad funcional sin añadir la metáfora de esclavitud que no aparece explícita en este fragmento. «Ser esclavo del deseo» sería más fuerte y no queda justificado aquí.
theological_decisions:
- issue: Cómo rendir la relación con el ‘deseo’ sin ampliar la carga moral
  english_pob_reading: serve desire
  chosen_spanish_reading: servir al deseo
  alternative_spanish_readings:
  - servir a la concupiscencia
  - ser dominado por el deseo
  rationale: El fragmento conserva una formulación general; no hay base suficiente para precisar el término hacia ‘concupiscencia’ o ‘pasión carnal’. Por eso se mantiene la expresión neutra «el deseo», dejando intacta la tensión semántica del original.
  doctrine_reference: Formación del deseo y disciplina moral en la literatura cristiana primitiva
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el paquete auditado; se mantiene la formulación breve y directa que corresponde al segmento de diálogo preservado.
  spanish_consistency_notes:
  - Se conserva el tono de diálogo directo con comillas angulares y un vocativo respetuoso.
  - Se evita sobreinterpretar el término ‘deseo’ con vocabulario ascético más específico que el texto no obliga a usar.
