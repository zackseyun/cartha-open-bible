review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del griego según la auditoría inglesa: pregunta sobre el poder de cada virtud, explicación de su mutua conexión y secuencia de nacimiento, evaluación de sus obras, y promesa de morar en la torre con los santos de Dios. Sin embargo, hay dos puntos de ajuste para mayor fidelidad y naturalidad: (1) «demuestra ser capaz» es más expansivo que «proves able» y suena algo pesado; «resulta capaz» o «prueba ser capaz» refleja mejor el valor evidencial sin añadir énfasis. (2) «dignas» para describir las obras no conserva bien el matiz de σεμνότης / “dignified”; «decorosas» o «honorables» transmite mejor la cualidad moral derivada de esa virtud.'
  spanish_quality_summary: 'El español es claro y de registro adecuado, pero presenta una elección poco idiomática en la serie de virtudes: «Dominio propio» se entiende, aunque en español amplio y eclesial «autodominio» suena más natural y compacto en una enumeración abstracta. Además, «se siguen unos a otros» con referentes femeninos abstractos puede simplificarse a «se siguen unas a otras». En conjunto, el texto es muy sólido y requiere solo reparación menor de estilo y precisión.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Fe», «Conocimiento», «Amor», «obras» y «santos de Dios» están bien alineados. La única preferencia revisable es ἐγκράτεια: «autodominio» encaja mejor que «Dominio propio» en español contemporáneo y conserva el sentido elegido por el POB inglés.'
  issues:
  - severity: medium
    issue: «Dominio propio» suena menos natural que «autodominio» en una cadena de virtudes abstractas.
    rationale: La frase actual se entiende, pero es más pesada y menos idiomática en español general. «Autodominio» es claro, moderno y mantiene el sentido de ἐγκράτεια sin recurrir a un tecnicismo oscuro.
  - severity: medium
    issue: «dignas» debilita el matiz de “dignified” aplicado a las obras.
    rationale: «Dignas» en español suele significar ‘merecedoras’ o ‘valiosas’, mientras que aquí se describe una cualidad moral de compostura/decoro derivada de la virtud previa. «Decorosas» preserva mejor ese matiz.
  - severity: low
    issue: «demuestra ser capaz de» es más largo e interpretativo que el inglés auditado.
    rationale: El texto fuente/inglés expresa que la persona ‘resulta’ o ‘prueba’ ser capaz. Una forma más directa mejora la cercanía al original y la fluidez.
  revised_spanish_text: '«Quería —dije— saber, señora, qué poder tiene cada una de ellas». «Escucha —dice ella— los poderes que tienen. Sus poderes se mantienen unidos entre sí, y se siguen unas a otras, tal como nacieron: de la Fe nace el autodominio, del autodominio la Sencillez, de la Sencillez la Inocencia, de la Inocencia la Dignidad, de la Dignidad el Conocimiento, y del Conocimiento el Amor. Así, pues, las obras de estas son puras, decorosas y divinas. Quien, entonces, sirve a estas y resulta capaz de aferrarse a sus obras tendrá su morada en la torre con los santos de Dios».'
  revision_rationale: 'La revisión conserva totalmente el sentido del pasaje y solo pule tres puntos: sustituye «Dominio propio» por «autodominio» para una serie de virtudes más idiomática; cambia «dignas» por «decorosas» para reflejar mejor el matiz de ‘dignified’; y simplifica «demuestra ser capaz» a «resulta capaz» para mayor cercanía al valor del original auditado. No se requieren notas.'
