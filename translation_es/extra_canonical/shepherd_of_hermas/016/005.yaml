base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/016/005.yaml
  text: '“I wanted,” I said, “to know, lady, what power each of them has.” “Hear,” she says, “the powers they have. Their powers are held together by one another, and they follow one another, just as they were born: from Faith is born Self-control, from Self-control Simplicity, from Simplicity Innocence, from Innocence Dignity, from Dignity Knowledge, and from Knowledge Love. So, then, the works of these are pure and dignified and divine. Whoever, then, serves these and proves able to hold fast to their works will have his dwelling in the tower with the holy ones of God.”'
translation:
  language: es
  text: '«Quería —dije— saber, señora, qué poder tiene cada una de ellas». «Escucha —dice ella— los poderes que tienen. Sus poderes se mantienen unidos entre sí, y se siguen unas a otras, tal como nacieron: de la Fe nace el autodominio, del autodominio la Sencillez, de la Sencillez la Inocencia, de la Inocencia la Dignidad, de la Dignidad el Conocimiento, y del Conocimiento el Amor. Así, pues, las obras de estas son puras, decorosas y divinas. Quien, entonces, sirve a estas y resulta capaz de aferrarse a sus obras tendrá su morada en la torre con los santos de Dios».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δύναμις / powers
  english_pob_choice: powers
  chosen_spanish: poderes
  alternatives_spanish:
  - fuerzas
  - capacidades
  lexicon: δύναμις
  rationale: Mantengo el sentido de capacidad/eficacia activa de las virtudes personificadas; «poderes» conserva la estructura del inglés POB y suena natural en español sin convertirlo en «fuerzas» físicas.
- source_word: Faith
  english_pob_choice: Faith
  chosen_spanish: Fe
  alternatives_spanish:
  - fidelidad
  lexicon: πίστις
  rationale: En esta cadena de virtudes, el sustantivo abstracto funciona como nombre de virtud; «Fe» es la forma más transparente y fiel al paralelismo.
- source_word: Self-control
  english_pob_choice: Self-control
  chosen_spanish: Dominio propio
  alternatives_spanish:
  - templanza
  - autocontrol
  lexicon: ἐγκράτεια
  rationale: «Dominio propio» expresa bien la disciplina interior y evita depender de un tecnicismo eclesiástico menos inmediato para lectores diversos.
- source_word: Simplicity
  english_pob_choice: Simplicity
  chosen_spanish: Sencillez
  alternatives_spanish:
  - simplicidad
  lexicon: ἁπλότης
  rationale: «Sencillez» comunica mejor la cualidad moral de una disposición sin doblez; en español bíblico contemporáneo suele sonar más natural que «simplicidad».
- source_word: Innocence
  english_pob_choice: Innocence
  chosen_spanish: Inocencia
  alternatives_spanish:
  - pureza
  - candidez
  lexicon: ἀκακία
  rationale: La cadena de virtudes pide un término positivo y reconocible; «Inocencia» conserva la idea de ausencia de malicia sin añadir matices ajenos.
- source_word: Dignity
  english_pob_choice: Dignity
  chosen_spanish: Dignidad
  alternatives_spanish:
  - honor
  - nobleza
  lexicon: σεμνότης
  rationale: «Dignidad» refleja la gravedad respetable y la nobleza moral del término mejor que opciones más interpretativas.
- source_word: Knowledge
  english_pob_choice: Knowledge
  chosen_spanish: Conocimiento
  alternatives_spanish:
  - gnosis
  - saber
  lexicon: γνῶσις
  rationale: Se evita «gnosis» por su carga técnica; «Conocimiento» mantiene la conexión con la secuencia de virtudes y la inteligibilidad general.
- source_word: Love
  english_pob_choice: Love
  chosen_spanish: Amor
  alternatives_spanish:
  - caridad
  lexicon: ἀγάπη
  rationale: «Amor» es más directo y menos confesionalmente marcado que «caridad», y preserva la culminación relacional de la serie.
- source_word: works
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - acciones
  - hechos
  lexicon: ἔργα
  rationale: «Obras» mantiene la equivalencia más estable con el lenguaje moral del pasaje y con el empleo cristiano amplio del término.
- source_word: the holy ones of God
  english_pob_choice: the holy ones of God
  chosen_spanish: los santos de Dios
  alternatives_spanish:
  - los consagrados de Dios
  - los santos pertenecientes a Dios
  lexicon: οἱ ἅγιοι τοῦ θεοῦ
  rationale: El POB inglés opta por «the holy ones of God»; en español, «santos de Dios» preserva la fórmula bíblica reconocible sin perder la relación de pertenencia a Dios.
theological_decisions:
- issue: Naturaleza de la cadena de virtudes y su engendramiento mutuo
  english_pob_reading: 'Their powers are held together by one another, and they follow one another, just as they were born: from Faith is born Self-control...'
  chosen_spanish_reading: 'Sus poderes se mantienen unidos entre sí, y se siguen unos a otros, tal como nacieron: de la Fe nace el Dominio propio...'
  alternative_spanish_readings:
  - están enlazados unos con otros
  - se entrelazan unos con otros
  rationale: Mantengo la imagen de un orden de procedencia y encadenamiento moral sin suavizarla; el texto presenta una secuencia naciente, no una simple lista.
  doctrine_reference: Virtudes como frutos/derivaciones morales en literatura cristiana primitiva; cf. formación ética por hábitos de virtud.
- issue: Identidad de quienes habitan en la torre
  english_pob_reading: will have his dwelling in the tower with the holy ones of God
  chosen_spanish_reading: tendrá su morada en la torre con los santos de Dios
  alternative_spanish_readings:
  - habitará en la torre junto con los santos de Dios
  - tendrá su morada en la torre con los escogidos de Dios
  rationale: «Morada» conserva el matiz de residencia estable y esperada; «santos de Dios» sigue de cerca la lectura POB y el lenguaje del texto, sin introducir una equivalencia doctrinal más específica.
  doctrine_reference: Imágenes de la torre/edificio y de pertenencia al pueblo santo en literatura cristiana temprana.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el expediente inglés; por eso la propuesta sigue de cerca el texto auditado y conserva la secuencia retórica, la serie de virtudes y la imagen final de la torre sin introducir variantes textuales no documentadas.
  spanish_consistency_notes:
  - Se mantiene un estilo bíblico sobrio y legible, con mayúsculas reverenciales solo donde el sustantivo funciona como nombre de virtud («Fe», «Amor») o entidad moral.
  - Se evita el calco excesivo cuando el español pide orden natural, pero se preserva la repetición estructural de la cadena («de X nace Y») porque es parte del argumento del pasaje.
  - «Señora» traduce de forma estable el apelativo respetuoso del diálogo visionario.
  - No se usa «caridad» para ἀγάπη, en continuidad con la decisión de nombrar la virtud final como «Amor».
