    issue: Conector final 'Así que'
    rationale: En este diálogo, οὖν/entonces funciona mejor como transición inferencial dentro de la respuesta que como consecuencia coloquial fuerte. 'Entonces' suena más fiel y natural en español bíblico-literario.
  - severity: low
    issue: Fluidez de la cláusula condicional final
    rationale: La frase 'cuando haces todas las obras de su madre, puedes vivir' es comprensible, pero 'cuando haces las obras de su madre, puedes vivir' suena más natural en español sin pérdida de sentido; no obstante, mantener 'todas' también es válido. Se conserva 'todas' por fidelidad al inglés auditado y al énfasis del original.
  revised_spanish_text: «Pero las otras, señora, ¿quiénes son?» «Son hijas unas de otras. Y se llaman Simplicidad, Conocimiento, Inocencia, Dignidad y Amor. Entonces, cuando haces todas las obras de su madre, puedes vivir.»
  revision_rationale: 'Se propone una reparación menor: sustituir ''Así que'' por ''Entonces'' para reflejar mejor la transición lógica del original y mejorar el registro del diálogo. No se requieren notas ni cambios léxicos adicionales.'
