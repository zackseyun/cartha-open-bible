base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/016/004.yaml
  text: “But the others, lady, who are they?” “They are daughters of one another. And they are called Simplicity, Knowledge, Innocence, Dignity, and Love. Whenever, then, you do all the works of their mother, you are able to live.”
translation:
  language: es
  text: «Pero las otras, señora, ¿quiénes son?» «Son hijas unas de otras. Y se llaman Simplicidad, Conocimiento, Inocencia, Dignidad y Amor. Entonces, cuando haces todas las obras de su madre, puedes vivir.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ αἱ λοιπαί
  english_pob_choice: the others
  chosen_spanish: las otras
  alternatives_spanish:
  - las restantes
  - las demás
  lexicon: Greek λοιπός
  rationale: «Las otras» reproduce con naturalidad el contraste del diálogo sin añadir matiz que el griego no exige.
- source_word: δέσποινα
  english_pob_choice: lady
  chosen_spanish: señora
  alternatives_spanish:
  - señora
  - dama
  lexicon: Greek δέσποινα
  rationale: «Señora» conserva el tono respetuoso y es idiomático en español; «dama» sonaría más literario y menos directo en diálogo.
- source_word: θυγατέρες ἀλλήλων
  english_pob_choice: They are daughters of one another.
  chosen_spanish: Son hijas unas de otras.
  alternatives_spanish:
  - Son hijas la una de la otra
  - Son hijas recíprocamente
  lexicon: Greek θυγατέρες ἀλλήλων
  rationale: La construcción recíproca en español debe sonar natural; «unas de otras» preserva la reciprocidad sin sobreexplicar.
- source_word: ἁπλότης
  english_pob_choice: Simplicity
  chosen_spanish: Simplicidad
  alternatives_spanish:
  - Sencillez
  lexicon: Greek ἁπλότης
  rationale: «Simplicidad» refleja bien el sustantivo abstracto y mantiene la serie de nombres personificados.
- source_word: γνῶσις
  english_pob_choice: Knowledge
  chosen_spanish: Conocimiento
  alternatives_spanish:
  - Saber
  - Conocimiento
  lexicon: Greek γνῶσις
  rationale: «Conocimiento» es el equivalente más estable para el valor intelectual y doctrinal del término.
- source_word: ἁκακία
  english_pob_choice: Innocence
  chosen_spanish: Inocencia
  alternatives_spanish:
  - Inocencia
  - Candor
  lexicon: Greek ἁκακία
  rationale: «Inocencia» comunica la ausencia de malicia de forma clara y fiel.
- source_word: σεμνότης
  english_pob_choice: Dignity
  chosen_spanish: Dignidad
  alternatives_spanish:
  - Dignidad
  - Seriedad
  lexicon: Greek σεμνότης
  rationale: «Dignidad» mantiene el valor de gravedad honorable que el término sugiere.
- source_word: ἀγάπη
  english_pob_choice: Love
  chosen_spanish: Amor
  alternatives_spanish:
  - Amor
  - Caridad
  lexicon: Greek ἀγάπη
  rationale: «Amor» es el término más natural en español y evita un sesgo eclesiástico que «caridad» podría introducir.
- source_word: ποίησῃς ... τὰ ἔργα τῆς μητρὸς αὐτῶν
  english_pob_choice: you do all the works of their mother
  chosen_spanish: haces todas las obras de su madre
  alternatives_spanish:
  - cumples todas las obras de su madre
  - haces todas las obras de la madre de ellas
  lexicon: Greek ποιεῖν / ἔργα / μήτηρ
  rationale: «Haces» y «obras» conservan la formulación directa del texto; «su madre» mantiene la referencia relacional sin rigidez.
- source_word: ζήσῃ
  english_pob_choice: you are able to live
  chosen_spanish: puedes vivir
  alternatives_spanish:
  - podrás vivir
  - llegarás a vivir
  lexicon: Greek ζάω
  rationale: «Puedes vivir» conserva la capacidad o posibilidad expresada por el inglés auditado y evita un futuro que el griego no obliga.
theological_decisions:
- issue: Personification of virtues as daughters and as a means of life
  english_pob_reading: They are named virtues, and doing the works associated with their mother enables life.
  chosen_spanish_reading: Son virtudes personificadas como hijas, y practicar las obras de su madre permite vivir.
  alternative_spanish_readings:
  - Son virtudes alegorizadas como hijas, y hacer las obras de su madre te hace vivir.
  - Son cualidades morales personificadas, y al hacer sus obras puedes vivir.
  rationale: El pasaje presenta una personificación moral, no una afirmación doctrinal independiente. La traducción debe conservar ese carácter figurado sin convertirlo en teología sistemática.
  doctrine_reference: Virtud personificada; no doctrina definida
- issue: Whether 'mother' should be clarified as the source or set of virtues
  english_pob_reading: their mother
  chosen_spanish_reading: su madre
  alternative_spanish_readings:
  - la madre de ellas
  - la madre de todas
  rationale: «Su madre» preserva la relación literaria simple del texto y evita introducir una explicación no presente en el griego.
  doctrine_reference: Relación literaria interna del texto
translation_notes:
  revision_awareness: No applied revisions or prior Spanish draft were supplied for this verse; this is a fresh draft based on the Greek source packet and the audited English POB rendering.
  spanish_consistency_notes:
  - Se mantuvo un registro de diálogo claro y respetuoso con «señora».
  - Se conservaron los nombres de las virtudes como sustantivos abstractos capitalizados solo en la enumeración, sin imponer un título técnico adicional.
  - No se añadió puntuación explicativa fuera de la exigida por el diálogo para no expandir el sentido del pasaje.
