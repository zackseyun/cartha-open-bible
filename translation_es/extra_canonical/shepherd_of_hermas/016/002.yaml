  text: Looking at me, she smiled and says to me, “Do you see seven women around the tower?” “I do, lady,” I said. “This tower is supported by these women at the Lord’s command.
translation:
  language: es
  text: 'Mirándome, sonrió y me dice: «¿Ves siete mujeres alrededor de la torre?». «Sí, señora», le dije. «Esta torre está sostenida por estas mujeres por mandato del Señor»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μειδιάσασα / ἐμειδίασεν (sonrió, smiling)
  english_pob_choice: she smiled
  chosen_spanish: sonrió
  alternatives_spanish:
  - me sonrió
  - sonrió al verme
  lexicon: sonreír
  rationale: El gesto se expresa de forma natural en español con «sonrió»; conserva la acción visible sin añadir matices afectivos no garantizados por el griego.
- source_word: λέγει / says to me
  english_pob_choice: says to me
  chosen_spanish: me dijo
  alternatives_spanish:
  - me dice
  lexicon: decir
  rationale: Aunque el inglés mantiene presente histórico, en español «me dijo» fluye mejor en discurso narrativo y no altera el contenido.
- source_word: γύναι / lady
  english_pob_choice: lady
  chosen_spanish: señora
  alternatives_spanish:
  - mujer
  - señora mía
  lexicon: señora
  rationale: «Señora» conserva respeto y corresponde al vocativo del original sin volverlo excesivamente moderno ni devocional.
- source_word: ὑποστηρίζεται / is supported
  english_pob_choice: is supported
  chosen_spanish: está sostenida
  alternatives_spanish:
  - es sostenida
  - se apoya
  lexicon: sostener
  rationale: «Está sostenida» expresa la pasividad con claridad en español y evita una construcción más pesada.
- source_word: ταύταις ταῖς γυναιξὶν / by these women
  english_pob_choice: by these women
  chosen_spanish: por estas mujeres
  alternatives_spanish:
  - por medio de estas mujeres
  - por estas mujeres mismas
  lexicon: mujeres
  rationale: Se conserva la relación instrumental/agencial básica sin añadir explicaciones interpretativas.
- source_word: ἐντολῇ τοῦ κυρίου / at the Lord’s command
  english_pob_choice: at the Lord’s command
  chosen_spanish: por mandato del Señor
  alternatives_spanish:
  - por orden del Señor
  - según el mandato del Señor
  lexicon: mandato
  rationale: «Mandato» reproduce la fuerza directiva del original y de la traducción inglesa, manteniendo el registro solemne.
theological_decisions:
- issue: Título reverencial para la interlocutora
  english_pob_reading: lady
  chosen_spanish_reading: señora
  alternative_spanish_readings:
