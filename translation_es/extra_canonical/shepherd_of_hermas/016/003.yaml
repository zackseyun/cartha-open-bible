base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/016/003.yaml
  text: Now hear their functions. The first of them, the one clasping her hands, is called Faith; through her the chosen of God are saved. And the second, the one girded about and acting bravely, is called Self-control; she is the daughter of Faith. Whoever, then, follows her becomes blessed in his life, because he will refrain from all evil works, believing that if he refrains from every evil desire he will inherit eternal life.”
translation:
  language: es
  text: Ahora escucha sus funciones. La primera de ellas, la que tiene las manos juntas, se llama Fe; por medio de ella son salvados los elegidos de Dios. Y la segunda, la que está ceñida y actúa con valentía, se llama Dominio de sí; ella es la hija de la Fe. Por tanto, quien la sigue será bienaventurado en su vida, porque se abstendrá de toda obra mala, creyendo que, si se abstiene de todo deseo malo, heredará la vida eterna.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄκουε
  english_pob_choice: Now hear
  chosen_spanish: Ahora escucha
  alternatives_spanish:
  - Escucha ahora
  - Oye ahora
  lexicon: ἀκούω
  rationale: El imperativo se vierte de forma natural en español como una exhortación directa; 'Ahora escucha' conserva el carácter de transición discursiva de 'Now hear' sin calco rígido.
- source_word: αἱ λειτουργίαι
  english_pob_choice: their functions
  chosen_spanish: sus funciones
  alternatives_spanish:
  - sus ministerios
  - sus oficios
  lexicon: λειτουργία
  rationale: Aquí el contexto describe papeles o actividades personificadas, no un ministerio eclesiástico técnico; 'funciones' refleja bien el valor operativo y evita sobrerreligiosizar el término.
- source_word: ἡ πρώτη ... ἡ τὰς χεῖρας αὐτῆς ἐσφιγμένη
  english_pob_choice: the first of them, the one clasping her hands
  chosen_spanish: la primera de ellas, la que tiene las manos cruzadas
  alternatives_spanish:
  - la primera de ellas, la que tiene las manos juntas
  - la primera de ellas, la que aprieta sus manos
  lexicon: σφίγγω + χείρ
  rationale: La imagen corporal en español resulta más idiomática como 'manos cruzadas/juntas' que como un calco literal. 'Cruzadas' mantiene el gesto visible y la quietud sugerida por el participio.
- source_word: Πίστις
  english_pob_choice: Faith
  chosen_spanish: Fe
  alternatives_spanish:
  - Fidelidad
  lexicon: πίστις
  rationale: El nombre personificado en este contexto se traduce de modo estable como 'Fe', que es natural en español y coincide con la designación tradicional de la figura.
- source_word: δι' αὐτῆς οἱ ἐκλεκτοὶ τοῦ θεοῦ σῴζονται
  english_pob_choice: through her the chosen of God are saved
  chosen_spanish: por medio de ella son salvados los elegidos de Dios
  alternatives_spanish:
  - por ella son salvados los elegidos de Dios
  - por medio de ella se salva a los elegidos de Dios
  lexicon: σῴζω + ἐκλεκτοί
  rationale: '''Por medio de ella'' reproduce la mediación del griego; ''elegidos de Dios'' traduce ἐκλεκτοί con el matiz de elección divina sin recurrir a una fórmula doctrinal ajena al contexto.'
- source_word: ἡ δευτέρα ... ἡ περιζωσμένη καὶ ἀνδρεία
  english_pob_choice: the second, the one girded about and acting bravely
  chosen_spanish: la segunda, la que está ceñida y actúa con valentía
  alternatives_spanish:
  - la segunda, la ceñida y valerosa
  - la segunda, la que está ceñida y procede con valor
  lexicon: περιζώννυμι + ἀνδρεία
  rationale: '''Ceñida'' conserva la imagen de estar ceñida de la fuente; ''actúa con valentía'' expresa el sentido de ἀνδρεία sin perder el tono personificado.'
- source_word: Ἐγκράτεια
  english_pob_choice: Self-control
  chosen_spanish: Dominio propio
  alternatives_spanish:
  - Autocontrol
  - Templanza
  lexicon: ἐγκράτεια
  rationale: '''Dominio propio'' es una equivalencia bíblica clara y reverente en español; evita la posible frialdad técnica de ''autocontrol'' y la carga más clásica de ''templanza''.'
- source_word: θυγάτηρ τῆς Πίστεως
  english_pob_choice: she is the daughter of Faith
  chosen_spanish: ella es la hija de la Fe
  alternatives_spanish:
  - ella es hija de la Fe
  lexicon: θυγάτηρ
  rationale: Se conserva la relación genealógica personificada tal como aparece en la fuente, con artículo para hacer claro el referente personificado.
- source_word: ὃς ἂν οὖν ἀκολουθήσῃ αὐτῇ
  english_pob_choice: Whoever, then, follows her
  chosen_spanish: Por tanto, quien la sigue
  alternatives_spanish:
  - Así pues, el que la sigue
  - Quien, pues, la siga
  lexicon: ἀκολουθέω
  rationale: La construcción generalizante se naturaliza en español con 'quien la sigue'; 'Por tanto' traslada el marcador inferencial οὖν.
- source_word: μακάριος ἔσται ἐν τῇ ζωῇ αὐτοῦ
  english_pob_choice: becomes blessed in his life
  chosen_spanish: se hace bienaventurado en su vida
  alternatives_spanish:
  - será bienaventurado en su vida
  - será dichoso en su vida
  lexicon: μακάριος
  rationale: '''Bienaventurado'' conserva el registro bíblico y solemne del término; ''se hace'' refleja el cambio resultativo del verbo griego.'
- source_word: ἀπέχῃ ἀπὸ παντὸς πονηροῦ ἔργου
  english_pob_choice: refrain from all evil works
  chosen_spanish: se abstendrá de toda obra mala
  alternatives_spanish:
  - se apartará de toda obra mala
  - se contendrá de toda obra mala
  lexicon: ἀπέχω + πονηρός + ἔργον
  rationale: '''Abstenerse'' comunica con precisión la renuncia voluntaria; ''obra mala'' mantiene el carácter ético general del plural griego.'
- source_word: πειθόμενος
  english_pob_choice: believing that
  chosen_spanish: creyendo que
  alternatives_spanish:
  - convencido de que
  - fiado en que
  lexicon: πείθομαι
  rationale: Aunque πείθομαι puede tener valor de persuadirse/ser convencido, el contexto exhortativo de confianza en la promesa queda bien expresado por 'creyendo que'.
- source_word: ἐὰν ἀπέχῃ ἀπὸ πάσης ἐπιθυμίας πονηρᾶς
  english_pob_choice: if he refrains from every evil desire
  chosen_spanish: si se abstiene de todo deseo malo
  alternatives_spanish:
  - si se aparta de todo deseo malo
  - si se contiene de todo deseo malo
  lexicon: ἐπιθυμία + πονηρός
  rationale: '''Deseo malo'' reproduce de forma directa la cualidad ética del sintagma; no se introduce una glosa interpretativa más específica que la que da la fuente.'
- source_word: κληρονομήσει ζωὴν αἰώνιον
  english_pob_choice: he will inherit eternal life
  chosen_spanish: heredará la vida eterna
  alternatives_spanish:
  - recibirá la vida eterna
  - obtendrá la vida eterna
  lexicon: κληρονομέω + ζωὴ αἰώνιος
  rationale: '''Heredará la vida eterna'' conserva el lenguaje patrimonial y escatológico del griego, que en español bíblico es claro y natural.'
theological_decisions:
- issue: Personification of virtues as named figures
  english_pob_reading: Faith and Self-control are presented as named persons with roles and kinship language.
  chosen_spanish_reading: Fe y Dominio propio se presentan como figuras personificadas con funciones y relación de hija.
  alternative_spanish_readings:
  - Fe y Autocontrol como abstracciones morales
  - Fe y Templanza como personificaciones
  rationale: La sección no trata de virtudes abstractas sino de figuras personificadas; el español debe conservar los nombres propios funcionales y la filiación figurada para no borrar el recurso literario-teológico del texto.
  doctrine_reference: Literary-theological personification in early Christian allegory
- issue: Divine election in salvation language
  english_pob_reading: the chosen of God are saved
  chosen_spanish_reading: los elegidos de Dios son salvados
  alternative_spanish_readings:
  - los escogidos de Dios son salvos
  - los elegidos de Dios son hechos salvos
  rationale: '''Elegidos'' mantiene el eco de elección divina sin imponer una formulación confesional distinta; ''salvados'' conserva el pasivo del griego y evita una abstracción innecesaria.'
  doctrine_reference: Election and salvation terminology in soteriological discourse
- issue: Moral condition for inheriting eternal life
  english_pob_reading: refraining from evil works and evil desire leads to inheriting eternal life
  chosen_spanish_reading: la obediencia expresada en abstenerse de toda obra mala y de todo deseo malo se vincula con heredar la vida eterna
  alternative_spanish_readings:
  - la recompensa de la vida eterna se presenta como consecuencia moral
  - la vida eterna se obtiene por abstinencia moral
  rationale: El texto formula una relación exhortativa y condicional, no una sistematización doctrinal completa. La redacción española conserva esa conexión sin convertirla en una tesis extrínseca de mérito automático.
  doctrine_reference: Ethics and eschatological inheritance
translation_notes:
  revision_awareness: No se registran revisiones previas en el paquete auditado. La redacción española se elaboró directamente desde el griego normalizado, con la traducción inglesa de POB como control de equivalencia y de decisiones léxicas ya estabilizadas.
  spanish_consistency_notes:
  - Se mantiene Yahvé solo cuando aparezca el nombre divino; aquí el texto dice θεός, por lo que corresponde 'Dios'.
  - Se conserva el registro bíblico de 'Fe', 'Dominio propio', 'bienaventurado' y 'vida eterna' para que el pasaje suene eclesialmente reconocible sin abandonar la base griega.
  - No se introducen notas al pie porque no hay variantes textuales ni ambigüedades críticas documentadas en el paquete auditado.
