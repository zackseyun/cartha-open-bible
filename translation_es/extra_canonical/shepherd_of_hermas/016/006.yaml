review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue fielmente el sentido del griego según el rastro inglés: Hermas pregunta por los tiempos y si ya llegó el fin; la mujer responde con una reprensión, explica que el fin llega cuando la torre termine de construirse, afirma que será terminada pronto/rápidamente, y cierra diciendo que esta amonestación/recordatorio y la renovación de los espíritus bastan para él y para los santos. La estructura argumental y las imágenes se conservan bien.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero tiene dos puntos mejorables para español e idiomaticidad: 1) la mezcla de tratamiento singular y plural en «para ti» frente a «vuestros espíritus» crea una incongruencia pronominal; 2) «está siendo edificada» y «sea completada en su edificación» son comprensibles pero algo pesados. Conviene suavizar a un español más natural sin perder la fuerza del original. Además, «clamó» puede sonar algo excesivo frente a «cried out»; «gritó» o «exclamó» con «a gran voz»/«en voz fuerte» funciona mejor.'
  glossary_alignment: No hay términos del glosario principal en disputa. «Torre», «fin», «renovación», «espíritus» y «santos» están bien alineados con el sentido fuente. Mantener el plural «espíritus» es defendible y el pie de nota lo justifica correctamente. La principal corrección es de estilo y coherencia pronominal, no de terminología teológica.
  issues:
  - severity: medium
    issue: Incongruencia de segunda persona en «vuestros espíritus ... para ti»
    rationale: El español estándar requiere coherencia de tratamiento. Si la interlocutora habla a una sola persona, lo natural es «tus espíritus» o una reformulación singular. Mantener «vuestros» junto con «ti» suena descuidado y puede confundir al lector.
  - severity: medium
    issue: Fraseo demasiado calcado en «todavía está siendo edificada» y «sea completada en su edificación»
    rationale: Aunque fiel, ese giro resulta más pesado de lo necesario en español. «Todavía se está edificando» y «cuando se complete su edificación» conservan el proceso pasivo y mejoran la legibilidad sin pérdida de sentido.
  - severity: low
    issue: «Clamó con voz fuerte» suena menos natural que otras opciones
    rationale: Es entendible, pero «gritó en voz fuerte» tampoco es ideal. «Exclamó a gran voz» o «gritó con fuerte voz» comunican mejor la reprensión solemne en español eclesial legible.
  revised_spanish_text: 'Y yo seguía preguntándole acerca de los tiempos: si ya era el fin. Pero ella exclamó a gran voz, diciendo: «¡Hombre insensato, no ves que la torre todavía se está edificando? Cuando, pues, la torre se complete en su edificación, llegará a su fin. Pero será edificada con rapidez. No me preguntes más; este recordatorio y la renovación de tus espíritus[a] son suficientes para ti y para los santos».'
  revised_footnotes:
  - marker: a
    text: Lit. «espíritus»; el plural conserva el griego πνευμάτων y no se reduce aquí a un singular abstracto.
    reason: lexical_alternative
  revision_rationale: Se ajusta la incoherencia pronominal («vuestros» > «tus») para concordar con «ti», y se mejora la naturalidad del español en dos giros pasivos sin alterar el sentido fuente ni las decisiones léxicas principales. Se conserva el plural «espíritus» con nota, porque refleja una decisión de fidelidad al griego.
