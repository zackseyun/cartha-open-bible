  yaml_path: translation/extra_canonical/shepherd_of_hermas/016/006.yaml
  text: And I kept asking her about the times—whether it is already the end. But she cried out with a loud voice, saying, “Senseless man, do you not see that the tower is still being built? Whenever, then, the tower is completed in its building, it comes to an end. But it will be built up quickly. Do not question me any further; this reminder and the renewal of your spirits are enough for you and for the holy ones.
translation:
  language: es
  text: 'Y yo seguía preguntándole acerca de los tiempos: si ya era el fin. Pero ella exclamó a gran voz, diciendo: «¡Hombre insensato, no ves que la torre todavía se está edificando? Cuando, pues, la torre se complete en su edificación, llegará a su fin. Pero será edificada con rapidez. No me preguntes más; este recordatorio y la renovación de tus espíritus[a] son suficientes para ti y para los santos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «espíritus»; el plural conserva el griego πνευμάτων y no se reduce aquí a un singular abstracto.
    reason: lexical_alternative
lexical_decisions:
- source_word: tower / πύργος
  english_pob_choice: tower
  chosen_spanish: torre
  alternatives_spanish:
  - edificio
  - fortaleza
  lexicon: πύργος
  rationale: ‘Torre’ es la equivalencia directa y natural en español; preserva la imagen simbólica sin añadir connotaciones ajenas.
- source_word: being built / οἰκοδομεῖται
  english_pob_choice: is still being built
  chosen_spanish: todavía está siendo edificada
  alternatives_spanish:
  - todavía se está edificando
  - aún se construye
  lexicon: οἰκοδομέω
  rationale: La pasiva progresiva mantiene el proceso en curso y conserva el valor de construcción literal y simbólica.
- source_word: end / τέλος
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - el término
  - la conclusión
  lexicon: τέλος
  rationale: ‘El fin’ es natural en español y mantiene la apertura semántica del cierre o consumación del proceso.
- source_word: quickly / ταχέως
  english_pob_choice: quickly
  chosen_spanish: con rapidez
  alternatives_spanish:
  - pronto
  - rápidamente
  lexicon: ταχέως
  rationale: ‘Con rapidez’ suena fluido y conserva el matiz adverbial sin forzar un calco.
- source_word: reminder / ὑπόμνησις
  english_pob_choice: this reminder
  chosen_spanish: este recordatorio
  alternatives_spanish:
  - esta amonestación
  - esta memoria
  lexicon: ὑπόμνησις
  rationale: ‘Recordatorio’ expresa bien la función de traer a la memoria y evita un tono demasiado técnico.
- source_word: renewal / ἀνακαίνισις
  english_pob_choice: renewal
  chosen_spanish: renovación
  alternatives_spanish:
  - restauración
  - rejuvenecimiento
  lexicon: ἀνακαίνισις
  rationale: ‘Renovación’ reproduce el sentido de hacer nuevo otra vez y funciona bien con ‘espíritus’.
- source_word: spirits / πνευμάτων
  english_pob_choice: your spirits
  chosen_spanish: vuestros espíritus
  alternatives_spanish:
  - vuestros ánimos
  - vuestro espíritu
  lexicon: πνεῦμα
  rationale: El plural ‘espíritus’ sigue de cerca el griego y conserva la particularidad antropológica; ‘ánimos’ sería más idiomático pero menos preciso.
- source_word: holy ones / ἁγίοις
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los consagrados
  - los justos
  lexicon: ἅγιος
  rationale: ‘Santos’ es la equivalencia normal y transparente para ἅγιοι en un contexto de comunidad fiel.
theological_decisions:
- issue: The tower as an eschatological image that is not yet complete
  english_pob_reading: the tower is still being built ... whenever the tower is completed in its building, it comes to an end
  chosen_spanish_reading: la torre todavía está siendo edificada ... cuando la torre sea completada en su edificación, llegará a su fin
  alternative_spanish_readings:
  - la torre aún se construye ... cuando termine de construirse, terminará
  rationale: La formulación conserva la tensión escatológica del proceso todavía incompleto y el final ligado a su consumación, sin suavizar la imagen.
  doctrine_reference: Eschatological imagery in Shepherd of Hermas; literary-theological coherence with the text’s symbolic tower motif.
- issue: ‘Spirit’ language as plural anthropological renewal rather than a generic singular
  english_pob_reading: the renewal of your spirits
  chosen_spanish_reading: la renovación de vuestros espíritus
  alternative_spanish_readings:
  - la renovación de vuestro espíritu
  - la renovación de vuestros ánimos
  rationale: El plural respeta el griego y la lectura POB; evita reducir la expresión a una interioridad singular no marcada en el texto.
  doctrine_reference: Anthropological plural in πνευμάτων; preserve source-level number and semantic range.
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el paquete recibido; la redacción sigue de cerca el texto griego normalizado y la lectura inglesa auditada, manteniendo las imágenes y el paralelismo sintáctico del pasaje.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este pasaje no contiene el nombre divino.
  - Se conserva «santos» para ἁγίοις por consistencia con el valor comunitario del término.
  - Se mantiene el tratamiento de segunda persona plural en «vuestros» y «vuestros espíritus» conforme al plural griego y al tono exhortativo del pasaje.
