revisions:
- from: 'Y yo seguía preguntándole acerca de los tiempos: si ya era el fin. Pero ella clamó con voz fuerte, diciendo: «¡Hombre insensato, no ves que la torre todavía está siendo edificada? Cuando, pues, la torre sea completada en su edificación, llegará a su fin. Pero será edificada con rapidez. No me preguntes más; este recordatorio y la renovación de vuestros espíritus[a] son suficientes para ti y para los santos».'
  to: 'Y yo seguía preguntándole acerca de los tiempos: si ya era el fin. Pero ella exclamó a gran voz, diciendo: «¡Hombre insensato, no ves que la torre todavía se está edificando? Cuando, pues, la torre se complete en su edificación, llegará a su fin. Pero será edificada con rapidez. No me preguntes más; este recordatorio y la renovación de tus espíritus[a] son suficientes para ti y para los santos».'
  rationale: Se ajusta la incoherencia pronominal («vuestros» > «tus») para concordar con «ti», y se mejora la naturalidad del español en dos giros pasivos sin alterar el sentido fuente ni las decisiones léxicas principales. Se conserva el plural «espíritus» con nota, porque refleja una decisión de fidelidad al griego.
