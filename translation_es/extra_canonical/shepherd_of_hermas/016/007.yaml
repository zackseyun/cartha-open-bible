review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido general del griego y del POB inglés: la revelación no es privada, Hermas debe entender primero, luego comunicar las palabras a toda la comunidad santa, y la obediencia conduce a limpieza moral compartida. Sin embargo, hay un problema sintáctico importante en la cláusula parentética: «y yo primero te lo ordeno, Hermas, las palabras...» no expresa bien la relación del verbo con su objeto y suena incorrecto en español. También «al oído de los santos» debilita el plural/imágenes del original y resulta menos natural que «a los oídos de los santos».'
  spanish_quality_summary: El español es en general claro y digno, pero la frase central necesita reparación para sonar natural y fiel. La revisión propuesta mantiene el tono solemne, mejora la sintaxis del inciso y evita un pronombre «lo» ambiguo. También ajusta una construcción más idiomática en «a los oídos de los santos».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «los santos», «reveló», «limpiados» y «males» son aceptables en contexto. No aparecen términos sensibles del glosario principal como Yahvé, Mesías o esclavo.
  issues:
  - severity: high
    issue: Construcción defectuosa en «y yo primero te lo ordeno, Hermas, las palabras...»
    rationale: En español, «ordenar las palabras» o «te lo ordeno... las palabras» queda gramaticalmente trabado y no refleja limpiamente el sentido de ἐντέλλομαί σοι + τὰ ῥήματα. Conviene reformular como mandato de hablar/guardar las palabras o como inciso que introduzca las palabras que siguen.
  - severity: medium
    issue: «al oído de los santos» reduce el plural concreto del original
    rationale: El griego tiene «a los oídos de los santos». Aunque «al oído» es idiomático, aquí la imagen plural y la referencia comunitaria se preservan mejor con «a los oídos de los santos», que además suena natural en registro bíblico.
  - severity: low
    issue: Pronombre singular «lo» en «lo hagas saber a todos»
    rationale: Funciona por antecedente implícito, pero el referente real son las palabras/mensajes revelados. Puede mantenerse, aunque una formulación plural sería marginalmente más explícita. No es necesario forzar cambio si el resto de la frase queda claro.
  revised_spanish_text: Pero no se te reveló solo a ti, sino para que lo hagas saber a todos. Después de tres días —porque primero debes entender, y yo te ordeno primero, Hermas, las palabras que estoy a punto de decirte— háblalas todas a los oídos de los santos, para que, después de oírlas y ponerlas por obra, sean limpiados de sus males, y tú también con ellos.”
  revision_rationale: Se corrige la cláusula parentética para que el mandato suene gramatical y solemnemente natural en español sin alejarse del orden y sentido del original. También se ajusta «al oído» a «a los oídos» para reflejar mejor la imagen del griego y del POB inglés.
