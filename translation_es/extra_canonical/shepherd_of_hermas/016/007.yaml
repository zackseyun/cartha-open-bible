revisions:
- from: Pero no se te reveló solo a ti, sino para que lo hagas saber a todos. Después de tres días —porque primero debes entender, y yo primero te lo ordeno, Hermas, las palabras que estoy a punto de decirte— háblalas todas al oído de los santos, para que, después de oírlas y ponerlas por obra, sean limpiados de sus males, y tú también con ellos.”
  to: Pero no se te reveló solo a ti, sino para que lo hagas saber a todos. Después de tres días —porque primero debes entender, y yo te ordeno primero, Hermas, las palabras que estoy a punto de decirte— háblalas todas a los oídos de los santos, para que, después de oírlas y ponerlas por obra, sean limpiados de sus males, y tú también con ellos.”
  rationale: Se corrige la cláusula parentética para que el mandato suene gramatical y solemnemente natural en español sin alejarse del orden y sentido del original. También se ajusta «al oído» a «a los oídos» para reflejar mejor la imagen del griego y del POB inglés.
