base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/016/007.yaml
  text: But it was not revealed to you alone, but so that you may make them known to all. After three days—for first you must understand, and I first command you, Hermas, the words I am about to say to you—speak them all into the ears of the holy ones, so that, after hearing them and doing them, they may be cleansed from their evils, and you also with them.”
translation:
  language: es
  text: Pero no se te reveló solo a ti, sino para que lo hagas saber a todos. Después de tres días —porque primero debes entender, y yo te ordeno primero, Hermas, las palabras que estoy a punto de decirte— háblalas todas a los oídos de los santos, para que, después de oírlas y ponerlas por obra, sean limpiados de sus males, y tú también con ellos.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπεδείχθη / revealed
  english_pob_choice: it was not revealed to you alone
  chosen_spanish: no se te reveló solo a ti
  alternatives_spanish:
  - no se te mostró solo a ti
  - no se te dio a conocer solo a ti
  lexicon: ἐπιδείκνυμι
  rationale: La idea central es de una revelación/demostración comunicada a Hermas. "Se te reveló" conserva la pasiva y la iniciativa divina, y suena natural en español.
- source_word: πᾶσιν γνωσθῇ / make them known to all
  english_pob_choice: make them known to all
  chosen_spanish: lo hagas saber a todos
  alternatives_spanish:
  - lo des a conocer a todos
  - lo hagas conocido a todos
  lexicon: γνωρίζω
  rationale: '"Hacer saber" comunica bien la función divulgativa del mandato sin endurecer la sintaxis. El objeto implícito se entiende por el contexto de las palabras reveladas.'
- source_word: μετὰ τρεῖς ἡμέρας
  english_pob_choice: After three days
  chosen_spanish: Después de tres días
  alternatives_spanish:
  - Tras tres días
  - Al cabo de tres días
  lexicon: μετά + acusativo temporal
  rationale: La expresión temporal es directa y no requiere adaptación especial.
- source_word: πρῶτον γὰρ δεῖ σε συνιέναι
  english_pob_choice: for first you must understand
  chosen_spanish: porque primero debes entender
  alternatives_spanish:
  - pues primero debes comprender
  - porque antes debes entender
  lexicon: δεῖ + συνίημι
  rationale: Se conserva la obligación/ necesidad expresada por δεῖ y el orden lógico del original. "Entender" mantiene la formulación sobria del POB inglés.
- source_word: καὶ πρῶτον ἐγὼ ἐντέλλομαί σοι
  english_pob_choice: and I first command you
  chosen_spanish: y yo primero te lo ordeno
  alternatives_spanish:
  - y primero te lo mando
  - y yo en primer lugar te lo ordeno
  lexicon: ἐντέλλομαι
  rationale: '"Ordeno" evita una suavización a "invito" o "encargo" y refleja el tono imperativo. Se añade "lo" para ligar la orden con las palabras que vienen a continuación.'
- source_word: Ἅρμα, τὰ ῥήματα
  english_pob_choice: Hermas, the words
  chosen_spanish: Hermas, las palabras
  alternatives_spanish:
  - Hermas, las expresiones
  - Hermas, las cosas que digo
  lexicon: ῥῆμα
  rationale: '"Palabras" es el equivalente más natural y preciso para el discurso que debe repetirse.'
- source_word: λαλῆσαι αὐτά πᾶσιν εἰς τὰ ὦτα τῶν ἁγίων
  english_pob_choice: speak them all into the ears of the holy ones
  chosen_spanish: háblalas todas al oído de los santos
  alternatives_spanish:
  - diles todo al oído de los santos
  - habla todas ellas a los oídos de los santos
  lexicon: λαλέω + εἰς τὰ ὦτα
  rationale: '"Al oído" reproduce la imagen idiomática de comunicar confidencialmente. "De los santos" conserva la designación comunitaria sin sustituirla por una denominación eclesiástica posterior.'
- source_word: ἀκούσαντες καὶ ποιήσαντες
  english_pob_choice: after hearing them and doing them
  chosen_spanish: después de oírlas y ponerlas por obra
  alternatives_spanish:
  - después de escucharlas y hacerlas
  - tras oírlas y cumplirlas
  lexicon: ἀκούω / ποιέω
  rationale: '"Ponerlas por obra" transmite la idea de obediencia práctica mejor que un simple "hacerlas" en español. "Oírlas" mantiene la relación con "al oído".'
- source_word: καθαρισθῶσιν ἀπὸ τῶν κακῶν αὐτῶν
  english_pob_choice: they may be cleansed from their evils
  chosen_spanish: sean limpiados de sus males
  alternatives_spanish:
  - sean purificados de sus males
  - queden limpios de sus males
  lexicon: καθαρίζω
  rationale: '"Limpiados" sigue la imagen moral de purificación presente en el texto. "Males" traduce el plural sustantivado sin ampliar innecesariamente a vicios o pecados.'
theological_decisions:
- issue: 'Destino de la revelación: exclusiva versus comunitaria'
  english_pob_reading: not revealed to you alone, but so that you may make them known to all
  chosen_spanish_reading: no se te reveló solo a ti, sino para que lo hagas saber a todos
  alternative_spanish_readings:
  - no se te reveló únicamente a ti, sino para que lo des a conocer a todos
  - no fue revelado solo para ti, sino para hacerlo saber a todos
  rationale: El texto contrapone una revelación personal con una finalidad pública. La versión española mantiene esa tensión sin convertirla en una explicación abstracta.
  doctrine_reference: Transmisión pública de la revelación y responsabilidad comunitaria
- issue: Autoridad del mandato en primera persona
  english_pob_reading: I first command you, Hermas, the words I am about to say to you
  chosen_spanish_reading: y yo primero te lo ordeno, Hermas, las palabras que estoy a punto de decirte
  alternative_spanish_readings:
  - y primero te mando, Hermas, las palabras que estoy a punto de decirte
  - y yo te ordeno primero, Hermas, las palabras que voy a decirte
  rationale: La coordinación de la cláusula es abrupta en el original; en español se conserva esa solemnidad con una puntuación que marca la inserción del destinatario y del objeto verbal.
  doctrine_reference: Autoridad profética del mensajero
- issue: 'Grupo receptor: ''holy ones'''
  english_pob_reading: the holy ones
  chosen_spanish_reading: los santos
  alternative_spanish_readings:
  - los consagrados
  - los santos de Dios
  rationale: '"Los santos" es la forma más estable y reconocible para la comunidad de los apartados por Dios, sin añadir glosa interpretativa.'
  doctrine_reference: Santidad del pueblo de Dios
- issue: Efecto de la obediencia en la purificación
  english_pob_reading: after hearing them and doing them, they may be cleansed from their evils, and you also with them
  chosen_spanish_reading: después de oírlas y ponerlas por obra, sean limpiados de sus males, y tú también con ellos
  alternative_spanish_readings:
  - tras escucharlas y cumplirlas, sean purificados de sus males, y tú también con ellos
  - al oírlas y practicarlas, sean limpiados de sus males, y tú también con ellos
  rationale: Se preserva la relación entre oír y obedecer como medio para la limpieza moral, sin convertir la frase en una doctrina sacramental que el texto no explicita.
  doctrine_reference: Obediencia y purificación moral
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el contexto proporcionado; la redacción sigue de cerca el sentido griego normalizado y la solución óptima-equivalente del inglés POB, ajustada a un español publicable.
  spanish_consistency_notes:
  - Se usó "santos" de manera consistente para τῶν ἁγίων, evitando alternar con perífrasis más largas.
  - Se mantuvo "se te reveló" y "lo hagas saber" para conservar la relación entre recepción privada y proclamación pública.
  - La secuencia imperativa se puntuó con guiones largos para reflejar la inserción explicativa del original sin perder legibilidad en español.
