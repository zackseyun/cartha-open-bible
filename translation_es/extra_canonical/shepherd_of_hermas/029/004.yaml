review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego y del POB inglés: ignorancia sin culpa, culpa compartida al convivir con la esposa adúltera no arrepentida, separación, prohibición de nuevas nupcias, recepción de la esposa arrepentida y aplicación de la norma a ambos sexos. No obstante, hay un ajuste importante de fidelidad léxica y claridad: ἀπολύω aquí se alinea mejor con ‘divorciar’/‘se divorcia’ que con ‘repudiar’/‘es repudiada’, porque el contexto patrístico trata la disolución matrimonial y en español actual ‘repudiar’ puede sonar a simple rechazo más que a divorcio. También conviene evitar ‘toma otra’, que en español suena elíptico frente a ‘se casa con otra’.'
  spanish_quality_summary: El español es generalmente claro y digno, con buen registro eclesial. Sin embargo, ‘repudiar’/‘repudiada’ resulta menos natural y potencialmente ambiguo para lectores modernos. ‘Atrae sobre sí un gran pecado’ es comprensible, pero ‘carga sobre sí’ suena más idiomático en contexto moral. El resto del pasaje lee bien y conserva la fuerza disciplinaria.
  glossary_alignment: 'Buen alineamiento general con las preferencias del proyecto: μετανοέω como ‘arrepentirse’, δοῦλος como ‘esclavos’, πορνεία como ‘fornicación’, μοιχεία como ‘adulterio’. No hay conflicto con terminología principal. La principal excepción recomendada es sustituir ‘repudie/repudiada’ por ‘divorcie/divorciada’, no por glosario sino por fidelidad contextual y legibilidad española.'
  issues:
  - severity: medium
    issue: ‘la repudie / es repudiada’ para ἀπολύω
    rationale: Aunque ‘repudiar’ puede reflejar un trasfondo jurídico antiguo, en español moderno eclesial amplio suele sugerir rechazo más que divorcio formal. Dado que el pasaje contrasta con volver a casarse y presupone estado matrimonial alterado, ‘divorciar/divorciada’ comunica mejor el sentido.
  - severity: low
    issue: ‘toma otra’
    rationale: La frase es comprensible, pero menos natural que ‘se casa con otra’, que además hace explícita la acción que fundamenta el adulterio en el razonamiento del pasaje y coincide con el POB inglés ‘marries another’.
  - severity: low
    issue: ‘atrae sobre sí un gran pecado’
    rationale: No es incorrecto, pero ‘carga sobre sí un gran pecado’ o ‘se echa encima un gran pecado’ suena más idiomático en español formal. Es un ajuste de estilo, no de sentido.
