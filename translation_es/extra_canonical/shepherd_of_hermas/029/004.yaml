base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/029/004.yaml
  text: “As long as he is ignorant,” he says, “he does not sin; but if the husband comes to know her sin, and the wife does not repent but persists in her fornication, and the husband lives together with her, he becomes guilty of her sin and a sharer in her adultery. "What then, sir," I say, "should the husband do, if the wife persists in this passion?" "Let him divorce her," he says, "and let the husband remain by himself; but if, after divorcing his wife, he marries another, he himself also commits adultery." "If then, sir," I say, "after the wife is divorced, she repents and wishes to return to her own husband, will she not be received?" "Indeed," he says, "if the husband does not receive her, he sins and brings a great sin upon himself; rather, the one who has sinned and is repenting must be received—but not repeatedly—for to the slaves of God repentance is one. Because of repentance, then, the man ought not to marry. This rule is laid upon both woman and man.
translation:
  language: es
  text: “Mientras él lo ignore”, dice, “no peca; pero si el esposo llega a conocer su pecado, y la esposa no se arrepiente sino que persevera en su fornicación, y el esposo sigue viviendo con ella, él se hace culpable de su pecado y partícipe de su adulterio. ‘¿Qué debe hacer entonces, señor?’, digo yo, ‘si la esposa persevera en esta pasión?’ ‘Que se divorcie de ella’, dice, ‘y que el esposo permanezca solo; pero si, después de divorciarse de su esposa, se casa con otra, también él comete adulterio’. ‘Si entonces, señor’, digo yo, ‘después de que la esposa es divorciada, se arrepiente y quiere volver a su propio esposo, ¿no será recibida?’ ‘Ciertamente’, dice, ‘si el esposo no la recibe, peca y carga sobre sí un gran pecado; más bien, la que ha pecado y se está arrepintiendo debe ser recibida, pero no repetidas veces; porque para los esclavos de Dios el arrepentimiento es uno solo. Por causa del arrepentimiento, entonces, el hombre no debe casarse. Esta norma se impone tanto a la mujer
    como al hombre.’
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀγνοεῖ
  english_pob_choice: he is ignorant
  chosen_spanish: lo ignore
  alternatives_spanish:
  - esté ignorante
  - no lo sepa
  lexicon: ἀγνοέω
  rationale: En español, ‘lo ignore’ conserva la idea de no tener conocimiento del hecho concreto sin sonar tan extraño como ‘esté ignorante’. Mantiene el contraste con ‘llega a conocer’.
- source_word: ἁμαρτάνει
  english_pob_choice: does not sin / sins
  chosen_spanish: no peca / peca
  alternatives_spanish:
  - no comete pecado / comete pecado
  lexicon: ἁμαρτάνω
  rationale: ‘Pecar’ es la equivalencia más directa y natural para el verbo, y encaja con el tono moral y disciplinario del pasaje.
- source_word: μετανοεῖ
  english_pob_choice: repent / repenting
  chosen_spanish: se arrepiente / se está arrepintiendo
  alternatives_spanish:
  - hace arrepentimiento
  - cambia de mente
  lexicon: μετανοέω
  rationale: Aquí el sentido es claramente de arrepentimiento moral y retorno, no meramente cognitivo. ‘Se está arrepintiendo’ ayuda a reflejar el participio presente del texto fuente.
- source_word: πορνεία
  english_pob_choice: fornication
  chosen_spanish: fornicación
  alternatives_spanish:
  - inmoralidad sexual
  - inmoralidad
  lexicon: πορνεία
  rationale: Se conserva el término tradicional y suficientemente preciso para el contexto, sin rebajar la fuerza moral del término.
- source_word: μοιχεία
  english_pob_choice: adultery
  chosen_spanish: adulterio
  alternatives_spanish:
  - infidelidad conyugal
  lexicon: μοιχεία
  rationale: ‘Adulterio’ es el equivalente normal y exacto en español para la infidelidad sexual dentro del matrimonio.
- source_word: ἀπολύσῃ
  english_pob_choice: divorce her
  chosen_spanish: la repudie
  alternatives_spanish:
  - la divorcie
  - la separe
  lexicon: ἀπολύω
  rationale: ‘Repudiar’ mantiene mejor el registro jurídico-tradicional del acto de disolver el matrimonio; ‘divorciar’ suena más moderno pero algo menos preciso en este contexto patrístico.
- source_word: δοῦλοι τοῦ θεοῦ
  english_pob_choice: slaves of God
  chosen_spanish: esclavos de Dios
  alternatives_spanish:
  - siervos de Dios
  lexicon: δοῦλος
  rationale: Se conserva la fuerza lexical de δοῦλος, evitando suavizarla con ‘siervos’. En el pasaje, la expresión sostiene la lógica de pertenencia y disciplina.
- source_word: μία ἐστίν
  english_pob_choice: repentance is one
  chosen_spanish: el arrepentimiento es uno solo
  alternatives_spanish:
  - el arrepentimiento es único
  - hay un solo arrepentimiento
  lexicon: εἷς / μία
  rationale: La formulación castellana busca mantener la contundencia proverbial de la frase sin añadir explicaciones interpretativas.
- source_word: ὁ ἀνήρ
  english_pob_choice: the man / husband
  chosen_spanish: el esposo / el hombre
  alternatives_spanish:
  - el marido
  lexicon: ἀνήρ
  rationale: Se alterna ‘esposo’ cuando el contexto matrimonial es explícito y ‘hombre’ donde el enunciado generaliza la norma para ambos sexos.
theological_decisions:
- issue: Responsabilidad compartida del cónyuge que continúa la convivencia tras conocer el pecado
  english_pob_reading: if the husband knows, and continues living with her, he becomes guilty of her sin and a sharer in her adultery
  chosen_spanish_reading: si el esposo llega a conocer su pecado… él se hace culpable de su pecado y partícipe de su adulterio
  alternative_spanish_readings:
  - se vuelve cómplice
  - participa en su adulterio
  rationale: La redacción conserva la imputación moral directa sin suavizarla. ‘Partícipe’ comunica participación real en la culpa, no solo aprobación pasiva.
  doctrine_reference: responsabilidad moral compartida / culpabilidad por consentimiento
- issue: Recepción del cónyuge arrepentido, pero no repetidamente
  english_pob_reading: the one who has sinned and is repenting must be received—but not repeatedly—for to the slaves of God repentance is one
  chosen_spanish_reading: la que ha pecado y se está arrepintiendo debe ser recibida, pero no repetidas veces; porque para los esclavos de Dios el arrepentimiento es uno solo
  alternative_spanish_readings:
  - debe ser aceptada, pero no otra vez
  - el arrepentimiento ocurre una sola vez
  rationale: Se preserva la tensión entre misericordia y límite disciplinario. ‘No repetidas veces’ refleja el matiz del inglés y evita convertir la frase en una tesis teológica más amplia de la que el pasaje exige.
  doctrine_reference: disciplina eclesial / arrepentimiento y restauración
- issue: La norma de no volver a casarse después de la separación por adulterio
  english_pob_reading: Because of repentance, then, the man ought not to marry. This rule is laid upon both woman and man
  chosen_spanish_reading: Por causa del arrepentimiento, entonces, el hombre no debe casarse. Esta norma se impone tanto a la mujer como al hombre
  alternative_spanish_readings:
  - por causa de este arrepentimiento
  - el varón no debe volver a casarse
  rationale: La formulación sigue de cerca la lógica del texto y mantiene la aplicación bilateral. ‘Se impone’ traduce la obligación normativa sin introducir más interpretación.
  doctrine_reference: ética matrimonial / norma aplicable a ambos sexos
translation_notes:
  revision_awareness: No se documentaron revisiones aplicadas en el paquete inglés; la redacción española se elaboró directamente a partir del griego normalizado y del auditable English POB, preservando sus decisiones léxicas y su tono disciplinario.
  spanish_consistency_notes:
  - Se mantuvo ‘esclavos de Dios’ conforme a la elección léxica POB y al valor fuerte de δοῦλος.
  - Se usó ‘repudie’ para ἀπολύω por consistencia con el registro jurídico del matrimonio en el pasaje.
  - Se conservó la alternancia ‘esposo/hombre’ para reflejar el cambio entre referencia concreta y norma general.
  - No se añadieron notas al pie porque el paquete inglés no contenía variantes ni observaciones textuales que exigieran marcador en el texto español.
