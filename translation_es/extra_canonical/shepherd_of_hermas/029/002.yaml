base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/029/002.yaml
  text: '“For if this thought rises up upon your heart, you will transgress—and if other such evil things [do], you commit sin. For this thought is a great sin for a slave of God; and if anyone carries out this evil deed, he brings death upon himself. Look to yourself, then: keep away from this thought; for where modesty dwells, there lawlessness ought not to rise up upon the heart of a righteous man.”'
translation:
  language: es
  text: '“Porque, si este pensamiento se levanta en tu corazón, caerás en transgresión; y si haces otras cosas malas semejantes, cometes pecado. Porque este pensamiento es un gran pecado para un esclavo[a] de Dios; y si alguien lleva a cabo esta mala obra, trae muerte sobre sí mismo. Cuídate, pues: apártate de este pensamiento; porque donde habita la modestia, la iniquidad no debe levantarse en el corazón de un hombre justo.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Esclavo’ reproduce la fuerza de δοῦλος; ‘siervo’ sería una atenuación interpretativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: slave of God
  english_pob_choice: slave of God
  chosen_spanish: esclavo de Dios
  alternatives_spanish:
  - siervo de Dios
  - criado de Dios
  lexicon: δοῦλος
  rationale: Se conserva la fuerza lexical de δοῦλος, que el POB inglés mantiene como 'slave'; 'siervo' suavizaría indebidamente la relación servil documentada por el texto.
- source_word: thought
  english_pob_choice: thought
  chosen_spanish: pensamiento
  alternatives_spanish:
  - idea
  - pensamiento interior
  lexicon: λογισμός / ἐνθύμημα (thought, inner thought)
  rationale: '''Pensamiento'' comunica de forma natural en español la idea interior que ''se levanta en el corazón'' sin añadir matices psicológicos no explicitados.'
- source_word: modesty
  english_pob_choice: modesty
  chosen_spanish: modestia
  alternatives_spanish:
  - pudor
  - decoro
  lexicon: αἰδώς / σωφροσύνη (modesty, restraint)
  rationale: '''Modestia'' mantiene la virtud moral indicada por el contexto y permite un registro bíblico comprensible; ''pudor'' sería más estrecho y ''decoro'' más estilístico que lexical.'
- source_word: lawlessness
  english_pob_choice: lawlessness
  chosen_spanish: ilegalidad
  alternatives_spanish:
  - iniquidad
  - desobediencia a la ley
  lexicon: ἀνομία
  rationale: Se eligió 'ilegalidad' para reflejar la raíz legal de ἀνομία y la elección del inglés POB por 'lawlessness', evitando una paráfrasis moralizante. Se conserva la tensión entre transgresión y ausencia de ley.
- source_word: righteous man
  english_pob_choice: righteous man
  chosen_spanish: hombre justo
  alternatives_spanish:
  - justo
  - varón justo
  lexicon: δίκαιος
  rationale: '''Hombre justo'' conserva el sustantivo masculino explícito del contexto y reproduce la noción moral/legal de δίκαιος con español claro y bíblicamente reconocible.'
theological_decisions:
- issue: Relación entre 'pensamiento' interior y pecado efectivo
  english_pob_reading: This thought is a great sin for a slave of God; and if anyone carries out this evil deed, he brings death upon himself.
  chosen_spanish_reading: Este pensamiento ya es un gran pecado para un esclavo de Dios; y si alguien realiza esta mala obra, trae muerte sobre sí mismo.
  alternative_spanish_readings:
  - este pensamiento es un gran pecado ante Dios
  - este pensamiento lleva a un gran pecado para un esclavo de Dios
  rationale: 'Se mantiene la escalera moral del original: el pensamiento mismo ya es pecado, y la ejecución del acto agrava hasta la muerte. No se atenúa con fórmulas más generales que borrarían la advertencia.'
  doctrine_reference: Ética de intención y acto; advertencias sobre pecado interior y mortalidad moral.
- issue: ‘Where modesty dwells’ and the prohibition of rising evil upon the heart
  english_pob_reading: where modesty dwells, there lawlessness ought not to rise up upon the heart of a righteous man
  chosen_spanish_reading: donde habita la modestia, la ilegalidad no debe levantarse en el corazón de un hombre justo
  alternative_spanish_readings:
  - donde mora la modestia, no debe levantarse la anarquía en el corazón de un hombre justo
  - donde habita el pudor, no debe surgir la iniquidad en el corazón de un justo
  rationale: Se conserva la imagen de habitación interior y el deber moral implícito ('no debe levantarse') sin transformar el enunciado en una exhortación distinta. 'Ilegalidad' retiene la conexión con ἀνομία que el POB inglés quiso dejar visible.
  doctrine_reference: Santificación interior; incompatibilidad entre virtud y anomia.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete. La redacción española sigue de cerca el sentido del griego transmitido por la versión inglesa POB, manteniendo la progresión condicional, la advertencia moral y la imaginería de corazón/inhabitación interior sin introducir terminología eclesiástica ajena.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de este pasaje porque el texto no contiene el nombre divino ni una cita directa del tetragrama.
  - Se conserva el paralelismo entre 'pensamiento' y 'mala obra' para que la advertencia conserve su gradación.
  - '''Ilegalidad'' se usa de forma consistente como equivalente de lawlessness/ἀνομία en este registro, aun cuando en español suene menos tradicional que ''iniquidad''.'
