revisions:
- from: '“Porque, si este pensamiento se levanta en tu corazón, tú cometerás transgresión; y si haces otras cosas malas semejantes, cometes pecado. Porque este pensamiento es un gran pecado para un esclavo[a] de Dios; y si alguien realiza esta mala obra, trae muerte sobre sí mismo. Mira, pues, por ti mismo: apártate de este pensamiento; porque donde habita la modestia, la ilegalidad no debe levantarse en el corazón de un hombre justo.”'
  to: '“Porque, si este pensamiento se levanta en tu corazón, caerás en transgresión; y si haces otras cosas malas semejantes, cometes pecado. Porque este pensamiento es un gran pecado para un esclavo[a] de Dios; y si alguien lleva a cabo esta mala obra, trae muerte sobre sí mismo. Cuídate, pues: apártate de este pensamiento; porque donde habita la modestia, la iniquidad no debe levantarse en el corazón de un hombre justo.”'
  rationale: 'Se hicieron tres ajustes menores: (1) ''caerás en transgresión'' mejora la naturalidad sin cambiar el sentido; (2) ''Cuídate, pues'' expresa mejor la exhortación reflexiva; y (3) ''iniquidad'' sustituye a ''ilegalidad'' para ἀνομία por ser más idiomático y adecuado al registro moral-religioso del pasaje en español. Se mantuvo ''esclavo'' con nota por fidelidad léxica a δοῦλος.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:32:44Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego y del POB inglés: la secuencia pensamiento interior → transgresión/pecado → ejecución del mal acto → muerte sobre sí mismo está bien preservada. También mantiene la imaginería de que el pensamiento ''se levanta'' en el corazón y la conclusión moral sobre la modestia y el corazón del justo. Sin embargo, hay dos puntos que conviene reparar para mayor fidelidad y español natural: ''tú cometerás transgresión'' suena menos idiomático que ''caerás en transgresión'' o ''transgredirás'', y ''ilegalidad'' para ἀνομία, aunque formalmente cercano a ''lawlessness'', en español eclesial resulta demasiado jurídico-moderno y menos fiel al registro moral del pasaje que ''iniquidad'' o ''anomia''.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta leves rigideces calcas del inglés: ''tú cometerás transgresión'' y ''Mira, pues, por ti mismo'' suenan menos naturales que ''caerás en transgresión'' y ''cuídate''. ''Ilegalidad'' es comprensible, pero poco bíblico y algo chocante en este contexto de virtud interior. El resto del texto lee bien y el uso de ''esclavo'' está bien justificado.'
  glossary_alignment: 'Alinea correctamente con las decisiones del proyecto en ''esclavo'' para δοῦλος y mantiene ''modestia''. No hay términos divinos del glosario principal implicados. La principal desviación es la elección de ''ilegalidad'' para ἀνομία: aunque intenta reflejar la raíz legal, en español bíblico general ''iniquidad'' comunica mejor el valor moral-religioso sin perder fidelidad, y evita un registro administrativo ajeno al pasaje.'
  issues:
  - severity: medium
    issue: '''ilegalidad'' para ἀνομία'
    rationale: Aunque transparenta la raíz de 'ley', en español actual suele sonar a tecnicismo jurídico o civil. En un contexto de virtud interior y pecado, 'iniquidad' es más natural y bíblicamente reconocible. Si se desea preservar el matiz de 'lawlessness', una nota puede explicarlo, pero aquí no parece imprescindible.
  - severity: low
    issue: '''tú cometerás transgresión'''
    rationale: Es entendible, pero menos idiomático en español que 'caerás en transgresión' o 'transgredirás'. La frase actual suena calcada y algo torpe.
  - severity: low
    issue: '''Mira, pues, por ti mismo'''
    rationale: La idea exhortativa de βλέπε σεαυτῷ/πρόσεχε σεαυτῷ se expresa mejor en español con 'cuídate' o 'mira por ti mismo'. 'Mira, pues, por ti mismo' resulta pesado.
  revised_spanish_text: '“Porque, si este pensamiento se levanta en tu corazón, caerás en transgresión; y si haces otras cosas malas semejantes, cometes pecado. Porque este pensamiento es un gran pecado para un esclavo[a] de Dios; y si alguien lleva a cabo esta mala obra, trae muerte sobre sí mismo. Cuídate, pues: apártate de este pensamiento; porque donde habita la modestia, la iniquidad no debe levantarse en el corazón de un hombre justo.”'
  revised_footnotes:
  - marker: a
    text: ‘Esclavo’ reproduce la fuerza de δοῦλος; ‘siervo’ sería una atenuación interpretativa.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron tres ajustes menores: (1) ''caerás en transgresión'' mejora la naturalidad sin cambiar el sentido; (2) ''Cuídate, pues'' expresa mejor la exhortación reflexiva; y (3) ''iniquidad'' sustituye a ''ilegalidad'' para ἀνομία por ser más idiomático y adecuado al registro moral-religioso del pasaje en español. Se mantuvo ''esclavo'' con nota por fidelidad léxica a δοῦλος.'
