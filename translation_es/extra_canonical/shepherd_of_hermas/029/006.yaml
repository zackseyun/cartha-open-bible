  yaml_path: translation/extra_canonical/shepherd_of_hermas/029/006.yaml
  text: “I therefore,” he says, “do not give an occasion for this practice to be carried through in this way, but so that the one who has sinned may no longer sin. But with regard to his former sin, there is One who is able to give healing—for he is the One who has authority over all.”
translation:
  language: es
  text: “Yo, pues —dice él—, no doy ocasión para que esta práctica se lleve a cabo de este modo, sino para que el que ha pecado no peque más. Pero respecto a su pecado anterior, hay Uno que puede sanar, porque él es el que tiene autoridad sobre todos.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δός / διδόναι αἰτίαν (give an occasion)
  english_pob_choice: do not give an occasion
  chosen_spanish: no den ocasión
  alternatives_spanish:
  - no den lugar
  - no den pretexto
  lexicon: N/A
  rationale: El inglés POB expresa la idea de ofrecer una oportunidad o base para que algo avance; en español, «dar ocasión» conserva esa fuerza causal sin sobretraducir ni moralizar el término.
- source_word: ἵνα μηκέτι ἁμάρτῃ (that the one who has sinned may no longer sin)
  english_pob_choice: so that the one who has sinned may no longer sin
  chosen_spanish: para que el que ha pecado no peque más
  alternatives_spanish:
  - para que el que pecó no siga pecando
  - para que el que ha pecado deje de pecar
  lexicon: N/A
  rationale: Se mantiene el sentido de cese continuo de pecado con un giro natural en español. «No peque más» preserva el valor exhortativo y progresivo del griego/inglés POB.
- source_word: ἐπὶ δὲ τῇ προτέρᾳ ἁμαρτίᾳ (with regard to his former sin)
  english_pob_choice: with regard to his former sin
  chosen_spanish: respecto a su pecado anterior
  alternatives_spanish:
  - en cuanto a su pecado pasado
  - acerca de su pecado anterior
  lexicon: N/A
  rationale: «Respecto a» reproduce la relación temática sin añadir matices ajenos; «pecado anterior» sigue de cerca el valor de προτέρα sin sonar arcaico.
- source_word: ἔστιν ὁ δυνάμενος ἰᾶσθαι (there is One who is able to give healing)
  english_pob_choice: there is One who is able to give healing
  chosen_spanish: hay Uno que puede dar sanidad
  alternatives_spanish:
  - hay Uno que puede sanar
  - hay Uno capaz de curar
  lexicon: N/A
  rationale: «Dar sanidad» conserva el sustantivo verbal del inglés POB y mantiene abierta la imagen de restauración, no solo de curación física.
- source_word: ἔχων τὴν ἐξουσίαν ἐπὶ πάντων (for he is the One who has authority over all)
  english_pob_choice: for he is the One who has authority over all
  chosen_spanish: porque él es el que tiene autoridad sobre todos
  alternatives_spanish:
  - porque él es quien tiene autoridad sobre todos
  - pues él tiene autoridad sobre todos
  lexicon: N/A
  rationale: Se conserva la razón causal introducida por «for» y la universalidad de la autoridad con «sobre todos», una forma natural y fiel en español.
theological_decisions:
- issue: La identidad implícita de «Uno» capaz de dar sanidad y con autoridad sobre todos
  english_pob_reading: One... he is the One who has authority over all
  chosen_spanish_reading: Uno... él es el que tiene autoridad sobre todos
  alternative_spanish_readings:
  - Uno... el que tiene autoridad sobre todos
  - uno... quien tiene autoridad sobre todos
  rationale: Se mantiene la mayúscula en «Uno» para reflejar la referencia reverente e implícita del inglés POB, sin nombrar explícitamente al referente, ya que el pasaje mismo lo deja indirecto.
  doctrine_reference: Cristología implícita en el contexto del Pastor de Hermas; referencia reverente indirecta.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el expediente inglés; la redacción española sigue de cerca el sentido auditado del POB inglés y el griego normalizado disponible, sin introducir variantes textuales no atestiguadas.
  spanish_consistency_notes:
  - Se conserva un registro formal y eclesial, pero con sintaxis española natural.
  - «Sanidad» se usa para respetar la amplitud restauradora del término en el contexto.
  - No se sustituye la referencia reverente indirecta por un nombre explícito, para no exceder el texto fuente.
