review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego según la auditoría inglesa: prohibición de dar ocasión para que la práctica continúe, propósito de que quien pecó no vuelva a pecar, y afirmación de que hay Uno capaz de sanar con autoridad sobre todos. Sin embargo, hay un desajuste importante de persona verbal en «no den ocasión», que rompe la concordancia con «Yo, pues» y con el singular del discurso directo del original/inglés («I ... do not give»).'
  spanish_quality_summary: El español es mayormente claro y digno, pero «no den ocasión» suena gramaticalmente incoherente dentro de una primera persona singular. También conviene suavizar «dar sanidad» a «sanar» para un español más natural sin pérdida de sentido. El resto del texto es legible y fiel.
  glossary_alignment: No hay conflictos relevantes con la terminología base del proyecto. La mayúscula reverencial en «Uno» puede mantenerse por la decisión teológica documentada. «Autoridad sobre todos» está bien. El ajuste principal es sintáctico, no glosarial.
  issues:
  - severity: high
    issue: Cambio incorrecto de persona verbal en «no den ocasión»
    rationale: 'El discurso cita a un hablante en primera persona: «Yo, pues —dice él—». La forma «den» es tercera persona plural/subjuntivo de cortesía y no corresponde al original ni al inglés POB («I ... do not give»). Debe ser «no doy ocasión» u otra forma de primera persona singular.'
  - severity: medium
    issue: «Dar sanidad» suena poco natural en este contexto
    rationale: Aunque refleja la formulación inglesa, en español eclesial general «hay Uno que puede sanar» comunica mejor ἰᾶσθαι y evita una construcción forzada. No altera el sentido de restauración.
  revised_spanish_text: “Yo, pues —dice él—, no doy ocasión para que esta práctica se lleve a cabo de este modo, sino para que el que ha pecado no peque más. Pero respecto a su pecado anterior, hay Uno que puede sanar, porque él es el que tiene autoridad sobre todos.”
  revision_rationale: Se corrige la persona verbal para alinearla con el original y con la traducción inglesa auditada, y se mejora la naturalidad de «dar sanidad» a «sanar» sin cambiar el sentido. No hacen falta notas adicionales.
