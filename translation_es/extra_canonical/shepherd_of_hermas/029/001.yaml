review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido general del griego y del POB inglés: mandato de guardar la castidad, evitar pensamientos sexuales ilícitos en el corazón, gravedad del pecado resultante y protección mediante el recuerdo de la propia esposa. Sin embargo, una frase clave suena poco fiel/idiomática en español: ''imágenes semejantes de mal'' no comunica bien la idea de representaciones o impulsos mentales malos afines, y parece calcada/oscura. También ''ningún pensamiento acerca de...'' en singular coordinado con varias frases resulta algo trabado; conviene reordenar para mayor claridad sin perder el alcance del pensamiento prohibido.'
  spanish_quality_summary: El registro es digno y mayormente natural, pero presenta rigidez innecesaria. 'Suba a tu corazón' es defendible con nota, aunque en español resulta algo extraño; aun así puede conservarse si se explica. La principal dificultad de legibilidad está en 'imágenes semejantes de mal', que no es una expresión española clara. Una leve revisión mejora mucho la fluidez y preserva la fuerza moral del pasaje.
  glossary_alignment: 'La terminología principal está bien alineada: ''castidad'' para chastity, ''esposa de otro hombre'' para γυναικὸς ἀλλοτρίου, ''fornicación'' para πορνεία, y ''transgredirás'' para παραβῇς son aceptables dentro del proyecto. La excepción es la decisión para ''evil likenesses'': la opción actual no refleja bien en español la intención documentada de representaciones/concepciones mentales afines. ''malas imágenes semejantes'' o ''otras imágenes malas semejantes'' encaja mejor con la rationale dada.'
  issues:
  - severity: medium
    issue: La expresión 'imágenes semejantes de mal' es poco natural y semánticamente opaca.
    rationale: Aunque intenta preservar la rareza del original/inglés ('evil likenesses'), en español suena antinatural y no deja claro que se trata de imágenes o imaginaciones malas del mismo tipo. Debe reformularse para claridad sin sobreinterpretar.
  - severity: low
    issue: La secuencia 'ningún pensamiento acerca de... ni acerca de... ni acerca de...' resulta pesada.
    rationale: No es incorrecta, pero una redacción más compacta mejora la legibilidad y mantiene el mismo alcance sintáctico del pensamiento prohibido.
  revised_spanish_text: «Yo te mando —dice— que guardes la castidad, y no dejes que suba a tu corazón[a] ningún pensamiento acerca de la esposa de otro hombre, ni de ninguna fornicación, ni de otras malas imágenes semejantes. Porque al hacer esto cometes un gran pecado. Pero si recuerdas siempre a tu propia esposa, nunca transgredirás.»
  revised_footnotes:
  - marker: a
    text: '''a tu corazón'' refleja el movimiento de ascenso interior del griego; también puede entenderse simplemente como ''en tu corazón''.'
    reason: alternative_reading
  revision_rationale: Se conserva la estructura y las decisiones léxicas principales del borrador, pero se sustituye 'imágenes semejantes de mal' por 'otras malas imágenes semejantes' para producir un español claro y fiel al sentido de representaciones malas afines. También se aligera la coordinación con 'ni de...' para mayor naturalidad sin cambiar el significado.
