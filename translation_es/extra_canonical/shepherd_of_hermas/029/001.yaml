  yaml_path: translation/extra_canonical/shepherd_of_hermas/029/001.yaml
  text: “I am commanding you,” he says, “to guard chastity, and do not let a thought about another man’s wife, or about any fornication, or about any such evil likenesses, rise up upon your heart. For in doing this you commit a great sin. But if you remember your own wife always, you will never transgress.
translation:
  language: es
  text: «Yo te mando —dice— que guardes la castidad, y no dejes que suba a tu corazón[a] ningún pensamiento acerca de la esposa de otro hombre, ni de ninguna fornicación, ni de otras malas imágenes semejantes. Porque al hacer esto cometes un gran pecado. Pero si recuerdas siempre a tu propia esposa, nunca transgredirás.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''a tu corazón'' refleja el movimiento de ascenso interior del griego; también puede entenderse simplemente como ''en tu corazón''.'
    reason: alternative_reading
lexical_decisions:
- source_word: παρθένευε / chastity
  english_pob_choice: guard chastity
  chosen_spanish: guardes la castidad
  alternatives_spanish:
  - guardes la pureza
  - practiques la continencia
  lexicon: castidad
  rationale: La orden central es preservar la pureza sexual; 'castidad' mantiene la fuerza moral y el registro eclesial sin reducirla solo a abstinencia física.
- source_word: γυναικὸς ἀλλοτρίου
  english_pob_choice: another man’s wife
  chosen_spanish: la esposa de otro hombre
  alternatives_spanish:
  - la mujer de otro hombre
  - la mujer ajena
  lexicon: esposa
  rationale: '''Esposa'' hace explícita la relación matrimonial que el griego comunica aquí y evita una ambigüedad más amplia de ''mujer''.'
- source_word: πορνεία
  english_pob_choice: fornication
  chosen_spanish: fornicación
  alternatives_spanish:
  - inmoralidad sexual
  - impureza sexual
  lexicon: fornicación
  rationale: Se conserva el término tradicional que refleja el campo semántico de conducta sexual ilícita sin ampliarlo indebidamente.
- source_word: πονηραῖς ἐπιθυμίαις / evil likenesses
  english_pob_choice: any such evil likenesses
  chosen_spanish: imágenes semejantes de mal
  alternatives_spanish:
  - malas imaginaciones semejantes
  - formas semejantes de mal
  lexicon: imagen / semejanza
  rationale: El texto apunta a representaciones o concepciones mentales afines; 'imágenes semejantes de mal' preserva la rareza expresiva del original sin interpretarla demasiado.
- source_word: ἐν τῇ καρδίᾳ
  english_pob_choice: upon your heart
  chosen_spanish: a tu corazón
  alternatives_spanish:
  - sobre tu corazón
  - en tu corazón
  lexicon: corazón
  rationale: '''A tu corazón'' mantiene la imagen de irrupción y ascenso interior del griego y la redacción inglesa.'
- source_word: παραβῇς
  english_pob_choice: transgress
  chosen_spanish: transgredirás
  alternatives_spanish:
  - quebrantarás
  - desobedecerás
  lexicon: transgredir
  rationale: '''Transgredir'' conserva la idea de cruzar un límite moral/jurídico de manera más precisa que un simple ''desobedecer''.'
theological_decisions:
- issue: Interioridad del pecado sexual
  english_pob_reading: A thought about another man’s wife, or about any fornication, or about any such evil likenesses, rise up upon your heart.
  chosen_spanish_reading: ningún pensamiento acerca de la esposa de otro hombre, ni acerca de ninguna fornicación, ni acerca de imágenes semejantes de mal, suba a tu corazón
  alternative_spanish_readings:
  - ningún pensamiento... surja en tu corazón
  - ningún pensamiento... llegue a tu corazón
  rationale: Se conserva la idea de surgimiento interior como comienzo del pecado, no solo como acto externo.
  doctrine_reference: ética del corazón / pecado interior
- issue: Relación entre recordar a la propia esposa y evitar la transgresión
  english_pob_reading: if you remember your own wife always, you will never transgress.
  chosen_spanish_reading: si recuerdas siempre a tu propia esposa, nunca transgredirás
  alternative_spanish_readings:
  - si siempre recuerdas a tu propia esposa, jamás pecarás
  rationale: '''Transgredir'' mantiene el eco legal-moral del texto; ''pecar'' es más general y pierde la correspondencia con el mandato anterior.'
  doctrine_reference: fidelidad matrimonial / disciplina moral
translation_notes:
  revision_awareness: Se revisó la redacción para eliminar cualquier nota sin anclaje visible y asegurar que el marcador [a] aparezca exactamente junto a la frase correspondiente en el texto español.
  spanish_consistency_notes:
  - Se mantuvo el tú singular, coherente con la segunda persona directa del mandato.
  - Se preservó el paralelismo de la lista negativa y la advertencia final.
  - Se evitó 'SEÑOR' o 'Cristo' porque el pasaje no contiene esos términos.
  - La puntuación reproduce el estilo exhortativo del original con comillas directas y frase declarativa introductoria.
