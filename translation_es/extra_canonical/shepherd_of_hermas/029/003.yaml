base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/029/003.yaml
  text: I say to him, “Sir, allow me to ask you a few things.” “Speak,” he says. “Sir,” I say, “if someone has a wife who is faithful in the Lord, and he finds her in some adultery, does the husband sin by living together with her?”
translation:
  language: es
  text: 'Le digo: «Señor, permíteme preguntarte unas cuantas cosas». «Habla», dice él. «Señor», le digo, «si alguien tiene una esposa fiel en el Señor, y la descubre en algún adulterio, ¿peca el marido al seguir viviendo con ella?».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Sir
  english_pob_choice: Sir
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Señor, te ruego
  lexicon: κύριε / direct address
  rationale: En español, «Señor» comunica una forma respetuosa de tratamiento y conserva la ambigüedad reverencial del vocativo griego; «Señor mío» sería más enfático de lo que exige el contexto.
- source_word: allow me to ask you a few things
  english_pob_choice: allow me to ask you a few things
  chosen_spanish: permíteme preguntarte unas cuantas cosas
  alternatives_spanish:
  - déjame preguntarte algunas cosas
  - permíteme hacerte unas preguntas
  lexicon: ἐπίτρεψόν μοι ... ἐρωτῆσαί σε
  rationale: La petición es cortés y directa; «unas cuantas cosas» reproduce el carácter indefinido de τὰ ὀλίγα/unas pocas cosas sin volverla demasiado formal ni demasiado amplia.
- source_word: Speak
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Dime
  lexicon: λάλει
  rationale: Imperativo breve y natural en español; conserva la respuesta autorizante del interlocutor.
- source_word: wife
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - cónyuge
  lexicon: γυνή
  rationale: Aquí el contexto pide una relación matrimonial explícita; «esposa» evita la ambigüedad de «mujer» en español.
- source_word: faithful in the Lord
  english_pob_choice: faithful in the Lord
  chosen_spanish: fiel en el Señor
  alternatives_spanish:
  - fiel al Señor
  - fiel para con el Señor
  lexicon: πιστὴ ἐν κυρίῳ
  rationale: Se conserva la construcción preposicional del original y la referencia religiosa de pertenencia/lealtad, sin forzar una reinterpretación.
- source_word: adultery
  english_pob_choice: adultery
  chosen_spanish: adulterio
  alternatives_spanish:
  - infidelidad
  - fornicación
  lexicon: μοιχεία
  rationale: «Adulterio» es el correlato jurídico-moral más preciso y mantiene la fuerza del término fuente.
- source_word: does the husband sin by living together with her?
  english_pob_choice: does the husband sin by living together with her?
  chosen_spanish: ¿peca el marido al seguir viviendo con ella?
  alternatives_spanish:
  - ¿peca el esposo por convivir con ella?
  - ¿comete pecado el marido al habitar con ella?
  lexicon: ὁ ἀνὴρ ἁμαρτάνει συνοικῶν αὐτῇ
  rationale: «Seguir viviendo con ella» expresa de forma natural la idea de convivir/habitar con la esposa después del hallazgo de adulterio, sin añadir una conclusión moral no presente en la pregunta.
theological_decisions:
- issue: Treatment of the husband’s guilt question
  english_pob_reading: does the husband sin by living together with her?
  chosen_spanish_reading: ¿peca el marido al seguir viviendo con ella?
  alternative_spanish_readings:
  - ¿peca el esposo por convivir con ella?
  - ¿comete pecado el marido al habitar con ella?
  rationale: La pregunta se mantiene como interrogación abierta sobre culpa moral, sin resolverla en la traducción. Se evita suavizar ἁμαρτάνει a una mera impropiedad social.
  doctrine_reference: Moral accountability / marital fidelity
- issue: Rendering of 'faithful in the Lord'
  english_pob_reading: a wife who is faithful in the Lord
  chosen_spanish_reading: una esposa fiel en el Señor
  alternative_spanish_readings:
  - una esposa fiel al Señor
  - una esposa fiel para con el Señor
  rationale: La frase puede entenderse como fidelidad religiosa o como lealtad cristiana dentro del matrimonio. La versión elegida preserva esa ambigüedad reverente sin imponer una paráfrasis doctrinal.
  doctrine_reference: Piety and covenant fidelity
translation_notes:
  revision_awareness: No applied revisions were supplied in the source packet; the Spanish draft therefore follows the English POB reading closely while remaining grounded in the Greek source summary for vocative address, marital terms, and the adultery/sin question.
  spanish_consistency_notes:
  - Se mantiene «Señor» para el tratamiento respetuoso, distinto de «Yahvé», ya que el pasaje no usa el nombre divino sino un vocativo de cortesía.
  - Se usa «esposa»/«marido» para marcar con claridad el marco matrimonial.
  - Se conserva la estructura interrogativa del original y no se introduce una valoración interpretativa adicional.
