review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego según la auditoría inglesa: diálogo directo, petición cortés, respuesta breve, esposa fiel en el Señor, hallazgo de adulterio y la pregunta moral sobre si el marido peca al continuar conviviendo con ella. No hay desviaciones doctrinales sustanciales.'
  spanish_quality_summary: 'El español es claro y natural, pero hay un ajuste menor de estilo y fidelidad aspectual: «la encuentra en adulterio» suena menos idiomático que «la descubre en algún adulterio», y además el inglés auditado preserva «some adultery», que conviene reflejar con «algún». También es preferible repetir el sujeto de dicción como «dice él» para evitar una leve aspereza en «me dice» en medio del intercambio.'
  glossary_alignment: 'La terminología concuerda con las pautas del proyecto: «Señor» para vocativo respetuoso, «esposa» para γυνή en contexto matrimonial, «fiel en el Señor» preservando la construcción, «adulterio» para μοιχεία, y «peca» para ἁμαρτάνει. No hay conflictos con los glosarios principales.'
  issues:
  - severity: medium
    issue: No se refleja el matiz indefinido de «some adultery»
    rationale: El borrador dice «la encuentra en adulterio», mientras que la auditoría inglesa conserva «in some adultery». En español, «la descubre en algún adulterio» o similar preserva mejor ese indefinido sin volver la frase torpe.
  - severity: low
    issue: «Me dice» en la acotación intermedia suena menos fluido
    rationale: «Habla», dice él es más natural como inciso narrativo breve en este intercambio y evita que el foco se desplace al narrador receptor del habla.
  revised_spanish_text: 'Le digo: «Señor, permíteme preguntarte unas cuantas cosas». «Habla», dice él. «Señor», le digo, «si alguien tiene una esposa fiel en el Señor, y la descubre en algún adulterio, ¿peca el marido al seguir viviendo con ella?».'
  revision_rationale: Se hicieron ajustes menores para reflejar mejor el indefinido del original auditado («algún adulterio») y mejorar la fluidez idiomática del inciso narrativo («dice él»). El resto del texto es fiel y claro, por lo que no se requieren notas adicionales.
