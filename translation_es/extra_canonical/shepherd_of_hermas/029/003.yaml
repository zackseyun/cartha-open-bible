  to: 'Le digo: «Señor, permíteme preguntarte unas cuantas cosas». «Habla», dice él. «Señor», le digo, «si alguien tiene una esposa fiel en el Señor, y la descubre en algún adulterio, ¿peca el marido al seguir viviendo con ella?».'
  rationale: Se hicieron ajustes menores para reflejar mejor el indefinido del original auditado («algún adulterio») y mejorar la fluidez idiomática del inciso narrativo («dice él»). El resto del texto es fiel y claro, por lo que no se requieren notas adicionales.
