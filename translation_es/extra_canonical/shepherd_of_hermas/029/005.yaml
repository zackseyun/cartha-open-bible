review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego según la audit trail inglesa: adulterio como imagen moral tanto para la impureza sexual como para la fabricación de imágenes como las naciones; mandato de apartarse del persistente impenitente; y razón pastoral de tal separación por la posibilidad de arrepentimiento. No hay desviaciones doctrinales mayores.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos puntos mejorables: «aun en tales obras» suena algo torpe en español y menos natural que una formulación equivalente; y «si alguien persevera» puede sugerir constancia virtuosa, mientras que en este contexto «persiste» o «continúa» expresa mejor la permanencia en el mal. El resto es idiomático y fiel.'
  glossary_alignment: 'Buen ajuste con las pautas del proyecto: «carne», «adulterio», «arrepentirse» y «partícipe» están bien elegidos. No hay términos del glosario principal en conflicto. «Hace imágenes» preserva prudentemente la referencia sin sobreinterpretar como «ídolos».'
  issues:
  - severity: medium
    issue: «si alguien persevera» puede sonar positivamente valorado
    rationale: En español bíblico y general, «perseverar» suele tener connotación favorable. Aquí el sentido es persistir en prácticas pecaminosas, por lo que «persiste» comunica mejor el valor contextual sin cambiar el contenido.
  - severity: low
    issue: «aun en tales obras» resulta algo forzado
    rationale: La frase se entiende, pero suena menos natural que «incluso en tales casos» o formulación similar. La revisión mejora fluidez sin apartarse del sentido general del original y de la traducción inglesa.
