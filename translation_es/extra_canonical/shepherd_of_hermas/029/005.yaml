  yaml_path: translation/extra_canonical/shepherd_of_hermas/029/005.yaml
  text: “Not only,” he says, “is it adultery if someone defiles his flesh, but whoever makes images as the nations do is committing adultery. Therefore, even in such works, if someone persists and does not repent, keep away from him and do not live together with him; otherwise you too are a sharer in his sin. For this reason it was commanded you to remain by yourselves, whether man or woman, for in cases like these there can be repentance.
translation:
  language: es
  text: «No solo —dice— hay adulterio si alguien mancha su carne, sino también quien hace imágenes como hacen las naciones comete adulterio. Por tanto, incluso en tales casos, si alguien persiste y no se arrepiente, aléjate de él y no convivas con él; de otro modo, tú también serás partícipe de su pecado. Por esta razón se te mandó permanecer aparte, sea hombre o mujer, porque en casos como estos puede haber arrepentimiento.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μοιχεύει / μοιχεία (adultery imagery)
  english_pob_choice: adultery
  chosen_spanish: adulterio
  alternatives_spanish:
  - infidelidad
  - falta conyugal
  lexicon: —
  rationale: Conserva el valor moral y relacional fuerte del término; en este contexto la comparación entre impureza corporal e idolatría requiere la fuerza jurídica/moral de «adulterio» en español.
- source_word: τὴν σάρκα
  english_pob_choice: defiles his flesh
  chosen_spanish: mancha su carne
  alternatives_spanish:
  - contamina su carne
  - defrauda su carne
  lexicon: —
  rationale: «Carne» mantiene el término de la fuente y su ambigüedad antropológica; «mancha» reproduce bien la idea de profanación/impureza sin perder naturalidad en español.
- source_word: εἰκόνας ποιεῖ
  english_pob_choice: makes images
  chosen_spanish: hace imágenes
  alternatives_spanish:
  - fabrique imágenes
  - produce imágenes
  lexicon: —
  rationale: La frase es suficientemente literal y clara; evita introducir una especificación técnica que el texto no da. Mantiene el paralelo con la fabricación idolátrica de las naciones.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - las naciones paganas
  lexicon: —
  rationale: Se conserva la expresión sobria de la fuente. «Las naciones» puede incluir el matiz etnorreligioso sin cargar el texto con una glosa interpretativa.
- source_word: μετανοέω
  english_pob_choice: repent
  chosen_spanish: se arrepiente
  alternatives_spanish:
  - cambia de mente
  - se vuelve atrás
  lexicon: —
  rationale: Aquí el contexto es claramente exhortativo y moral; «se arrepiente» comunica el sentido de retorno y cambio de conducta que exige el pasaje.
- source_word: κοινωνός
  english_pob_choice: a sharer in
  chosen_spanish: partícipe de
  alternatives_spanish:
  - copartícipe de
  - compartícipe de
  lexicon: —
  rationale: «Partícipe de» es idiomático y refleja bien la idea de participación real en la culpa, sin perder el nexo con el original.
- source_word: καθῆσθαι / μένειν ... καθ’ ἑαυτούς
  english_pob_choice: remain by yourselves
  chosen_spanish: permanecer aparte
  alternatives_spanish:
  - quedarse solos
  - mantenerse separados
  lexicon: —
  rationale: «Permanecer aparte» conserva el mandato de separación sin sonar demasiado coloquial; evita una lectura exclusivamente individualista de «by yourselves».
- source_word: ἀνὴρ ἢ γυνή
  english_pob_choice: whether man or woman
  chosen_spanish: sea hombre o mujer
  alternatives_spanish:
  - varón o mujer
  - hombre o mujer
  lexicon: —
  rationale: Mantiene el paralelismo inclusivo del original con un español claro y natural.
theological_decisions:
- issue: La relación entre idolatría e adulterio moral
  english_pob_reading: whoever makes images as the nations do is committing adultery
  chosen_spanish_reading: quien hace imágenes como hacen las naciones comete adulterio
  alternative_spanish_readings:
  - quien fabrica ídolos como las naciones comete adulterio
  - quien hace imágenes idolátricas como las naciones comete adulterio
  rationale: 'La traducción conserva la tensión del texto: el griego habla de «imágenes», no añade explícitamente «ídolos». El paralelismo con adulterio se mantiene sin resolver de antemano la discusión terminológica.'
  doctrine_reference: idolatría como infidelidad; cf. lenguaje profético bíblico sobre adulterio espiritual
- issue: Separación disciplinaria y posibilidad de arrepentimiento
  english_pob_reading: if someone persists and does not repent, keep away from him and do not live together with him; otherwise you too are a sharer in his sin
  chosen_spanish_reading: si alguien persevera y no se arrepiente, aléjate de él y no convivas con él; de otro modo, tú también serás partícipe de su pecado
  alternative_spanish_readings:
  - si alguien continúa y no se arrepiente, apártate de él
  - si alguien persiste y no hace penitencia
  rationale: Se preserva tanto la advertencia disciplinaria como el fundamento moral de no compartir la culpa. No se sustituye por «hacer penitencia», porque el verbo fuente y la audit trail favorecen un lenguaje de arrepentimiento.
  doctrine_reference: disciplina comunitaria y responsabilidad compartida
- issue: Motivo de la orden de separarse
  english_pob_reading: it was commanded you to remain by yourselves ... for in cases like these there can be repentance
  chosen_spanish_reading: se te mandó permanecer aparte ... porque en casos como estos puede haber arrepentimiento
  alternative_spanish_readings:
  - se os mandó permanecer separados
  - se les mandó estar solos
  rationale: El singular de la fuente se conserva en español con el impersonal/personal «se te mandó», evitando forzar un plural donde el contexto de exhortación puede ser individual. La cláusula final mantiene la esperanza de arrepentimiento sin minimizar la separación previa.
  doctrine_reference: restauración posible aun tras grave pecado
translation_notes:
  revision_awareness: No hay revisiones documentadas en el paquete proporcionado; la redacción se apoya directamente en el griego normalizado y en la solución óptimo-equivalente del POB inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando aparezca el nombre divino; en este pasaje no ocurre.
  - Se conserva «carne» para σάρξ y «arrepentirse» para μετανοεῖν, coherente con el léxico POB.
  - Se evita introducir términos eclesiásticos posteriores que el texto no exige, como «penitencia» o «excomulgar», porque el pasaje habla de separación y arrepentimiento.
  - La puntuación reproduce un estilo publicable con incisos y comillas españolas, manteniendo la cadencia exhortativa del original.
