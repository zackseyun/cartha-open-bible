  to: «No solo —dice— hay adulterio si alguien mancha su carne, sino también quien hace imágenes como hacen las naciones comete adulterio. Por tanto, incluso en tales casos, si alguien persiste y no se arrepiente, aléjate de él y no convivas con él; de otro modo, tú también serás partícipe de su pecado. Por esta razón se te mandó permanecer aparte, sea hombre o mujer, porque en casos como estos puede haber arrepentimiento.»
