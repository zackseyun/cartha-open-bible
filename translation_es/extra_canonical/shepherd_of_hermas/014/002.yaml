  yaml_path: translation/extra_canonical/shepherd_of_hermas/014/002.yaml
  text: '2. “And the others you saw—many lying there, not going into the building—these are the scabby ones: they came to know the truth, but did not remain in it, nor did they join themselves to the saints; therefore they are useless.'
translation:
  language: es
  text: '2. «Y a los otros que viste —muchos tendidos allí, sin entrar en el edificio— estos son los sarnosos: llegaron a conocer la verdad, pero no permanecieron en ella, ni se unieron a los santos; por eso son inútiles.»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ λειχηνιαῖοι / ‘the scabby ones’
  english_pob_choice: the scabby ones
  chosen_spanish: los llenos de sarna
  alternatives_spanish:
  - los sarnosos
  - los leprosos de sarna
  - los escabiosos
  lexicon: λεχήν / λειχην- (derivational image of scab/leprous affliction)
  rationale: El inglés POB conserva la imagen corporal degradada. En español, 'llenos de sarna' comunica la misma afección visible y despectiva sin forzar un tecnicismo médico oscuro. 'Escabiosos' es más técnico y menos transparente; 'leprosos' altera la imagen específica.
- source_word: τὴν ἀλήθειαν
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la verdad plena
  - la verdad verdadera
  lexicon: ἀλήθεια
  rationale: La traducción directa 'la verdad' mantiene la fuerza doctrinal y relacional del texto, acorde con el auditable sentido del original y con el uso estable en español bíblico.
- source_word: οὐκ ἐπέμειναν
  english_pob_choice: did not remain in it
  chosen_spanish: no permanecieron en ella
  alternatives_spanish:
  - no perseveraron en ella
  - no se quedaron en ella
  lexicon: ἐπιμένω
  rationale: '''Permanecieron en ella'' reproduce bien la idea de persistencia en la verdad. ''Perseveraron'' añade un matiz exhortativo más interpretativo; ''se quedaron'' suena demasiado coloquial.'
- source_word: οὐδὲ συνετάχθησαν τοῖς ἁγίοις
  english_pob_choice: nor did they join themselves to the saints
  chosen_spanish: ni se unieron a los santos
  alternatives_spanish:
  - ni se asociaron con los santos
  - ni se allegaron a los santos
  lexicon: συντάσσω / juntarse con
  rationale: '''Unieron a'' conserva la idea de adhesión/solidaridad del griego y coincide con la elección del inglés POB. ''Se asociaron'' es posible pero más sociológico; ''allegaron'' es demasiado arcaico.'
- source_word: ἀχρεῖοί εἰσιν
  english_pob_choice: therefore they are useless
  chosen_spanish: por eso son inútiles
  alternatives_spanish:
  - por eso no sirven
  - por eso carecen de provecho
  lexicon: ἀχρεῖος
  rationale: '''Inútiles'' reproduce el juicio de inutilidad del término griego y mantiene la dureza del POB inglés. ''No sirven'' es más idiomático pero menos formal; ''carecen de provecho'' debilita el veredicto.'
theological_decisions:
- issue: Relación entre 'la verdad' y pertenencia a los santos
  english_pob_reading: they came to know the truth, but did not remain in it, nor did they join themselves to the saints; therefore they are useless.
  chosen_spanish_reading: llegaron a conocer la verdad, pero no permanecieron en ella, ni se unieron a los santos; por eso son inútiles.
  alternative_spanish_readings:
  - conocieron la verdad, pero no perseveraron en ella
  - llegaron a conocer la verdad, pero no se incorporaron a los santos
  rationale: 'El español conserva la secuencia moral del original: conocimiento inicial, falta de permanencia y ausencia de comunión con los santos. No suavizo el veredicto final, porque el texto presenta una evaluación de inutilidad ligada a la infidelidad y ruptura comunitaria.'
  doctrine_reference: Santidad/comunión eclesial; perseverancia en la verdad
translation_notes:
  revision_awareness: No applied revisions were provided; the draft follows the source payload and the audited English POB wording with high agreement (0.95).
  spanish_consistency_notes:
  - Se mantiene 'verdad' como sustantivo clave y 'santos' para ἅγιοι, sin sustituir por 'creyentes' o 'santas personas'.
  - La puntuación reproduce la estructura parentética del inglés POB para claridad oral y lectura pública.
  - Se usa 'edificio' para 'building' siguiendo la imagen del pasaje sin añadir interpretación alegórica.
