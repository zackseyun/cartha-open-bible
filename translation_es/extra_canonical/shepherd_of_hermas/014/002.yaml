review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue fielmente la estructura y el sentido del griego según el rastro inglés: los otros vistos, muchos tendidos allí, sin entrar en el edificio; identificación como quienes padecen una afección cutánea figurada; conocimiento de la verdad sin permanencia en ella; falta de adhesión a los santos; y veredicto final de inutilidad. La única mejora necesaria es léxica-estilística en la etiqueta descriptiva.'
  spanish_quality_summary: El español es claro, digno y legible. La sintaxis y puntuación funcionan bien. Sin embargo, «los llenos de sarna» suena algo perifrástico y menos natural que un adjetivo directo. «Los sarnosos» preserva mejor la concisión categorial del griego y del inglés («the scabby ones») sin introducir tecnicismo médico ni cambiar la imagen.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «la verdad», «los santos» y «por eso son inútiles» están bien alineados. La revisión propuesta solo afina la representación de οἱ λειχηνιαῖοι.
  issues:
  - severity: medium
    issue: «los llenos de sarna» es menos natural y menos equivalente como etiqueta nominal que el original.
    rationale: El griego usa una designación sustantivada/adjetival breve («the scabby ones» en el POB inglés). En español, «los sarnosos» reproduce mejor esa categorización compacta y mantiene la dureza imagética. «Llenos de sarna» comunica el sentido, pero suena más explicativo que textual.
  revised_spanish_text: '2. «Y a los otros que viste —muchos tendidos allí, sin entrar en el edificio— estos son los sarnosos: llegaron a conocer la verdad, pero no permanecieron en ella, ni se unieron a los santos; por eso son inútiles.»'
  revision_rationale: Se cambia únicamente «los llenos de sarna» por «los sarnosos» para reflejar con más naturalidad y precisión la etiqueta breve y corporal del griego, en línea con el inglés POB «the scabby ones». No se requieren notas al pie porque no surge nueva ambigüedad en español.
