  yaml_path: translation/extra_canonical/shepherd_of_hermas/014/001.yaml
  text: “Do you want to know about those who are being cut down and thrown far from the tower? These are the sons of lawlessness[3:vi.1 ‘sons of lawlessness’]; they believed in hypocrisy, and no wickedness departed from them. For this reason they have no salvation, because they are not fit for the building on account of their wicked deeds. Therefore they were cut down and thrown far away because of the anger of the Lord, because they provoked him.
translation:
  language: es
  text: ¿Quieres saber acerca de los que son derribados y arrojados lejos de la torre? Estos son los hijos del desafuero[a]; creyeron en la hipocresía, y ninguna maldad se apartó de ellos. Por esta razón no tienen salvación, porque no son aptos para la edificación a causa de sus malas obras. Por tanto fueron derribados y arrojados lejos por causa de la ira del Señor, porque lo provocaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Desafuero» traduce aquí el griego ἀνομία, que el inglés POB rindió como «lawlessness», para conservar su fuerza moral y judicial de rechazo de la ley, más específica que «iniquidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ υἱοὶ τῆς ἀνομίας
  english_pob_choice: the sons of lawlessness
  chosen_spanish: los hijos de la iniquidad
  alternatives_spanish:
  - los hijos de la falta de ley
  - los hijos de la impiedad
  lexicon: ἀνομία
  rationale: El inglés POB conserva la imagen semítica de filiación más el sustantivo abstracto de la cualidad moral. En español, «iniquidad» reproduce con dignidad el peso ético y judicial de ἀνομία sin convertirlo en una fórmula eclesiástica fija; «falta de ley» sería más literal pero más torpe, y «impiedad» desplaza el énfasis hacia irreligiosidad.
- source_word: ἐπίστευσαν ἐν τῇ ὑποκρίσει
  english_pob_choice: they believed in hypocrisy
  chosen_spanish: creyeron en la hipocresía
  alternatives_spanish:
  - pusieron su fe en la hipocresía
  - creyeron hipócritamente
  lexicon: πιστεύω + ὑπόκρισις
  rationale: Se mantiene el giro del original, que no dice simplemente que eran hipócritas, sino que «creyeron en» la hipocresía. El español admite la misma construcción sin forzarla; «pusieron su fe en» sería más interpretativo.
- source_word: οὐκ ἀπέστη ἀπ’ αὐτῶν πᾶσα πονηρία
  english_pob_choice: no wickedness departed from them
  chosen_spanish: ninguna maldad se apartó de ellos
  alternatives_spanish:
  - no se apartó de ellos ninguna maldad
  - ninguna perversidad se retiró de ellos
  lexicon: ἀφίστημι / πονηρία
  rationale: La versión conserva el movimiento de alejamiento descrito por el verbo y el alcance total de πονηρία. «Maldad» es claro y suficientemente amplio; «perversidad» endurece el registro y no es necesario aquí.
- source_word: οὐ δύνανται σωθῆναι
  english_pob_choice: they have no salvation
  chosen_spanish: no tienen salvación
  alternatives_spanish:
  - no pueden ser salvados
  - no hay salvación para ellos
  lexicon: σῴζω / σωτηρία
  rationale: El POB inglés expresa el resultado como posesión negada, no como mera incapacidad. En español «no tienen salvación» reproduce bien esa formulación breve y solemne.
- source_word: οὐκ εἰσὶν ἱκανοὶ εἰς τὴν οἰκοδομήν
  english_pob_choice: they are not fit for the building
  chosen_spanish: no son aptos para la edificación
  alternatives_spanish:
  - no son idóneos para la construcción
  - no son dignos para la edificación
  lexicon: ἱκανός / οἰκοδομή
  rationale: «Edificación» conserva la imagen del edificio en clave espiritual y funciona mejor en español eclesial que «construcción»; «aptos» traduce con precisión la suficiencia moral requerida.
- source_word: διὰ τὰ ἔργα αὐτῶν τὰ πονηρά
  english_pob_choice: on account of their wicked deeds
  chosen_spanish: a causa de sus malas obras
  alternatives_spanish:
  - por sus obras malas
  - a causa de sus obras perversas
  lexicon: ἔργα πονηρά
  rationale: «Malas obras» es transparente y mantiene el vínculo entre conducta y juicio. «Perversas» es posible, pero más cargado y menos fluido para esta sección.
- source_word: διὰ τὴν ὀργὴν τοῦ Κυρίου
  english_pob_choice: because of the anger of the Lord
  chosen_spanish: por causa de la ira del Señor
  alternatives_spanish:
  - a causa de la ira del Señor
  - por la ira del Señor
  lexicon: ὀργή + κύριος
  rationale: Se conserva la causalidad explícita del griego y la elección del POB inglés. «Señor» aquí traduce κύριος en el contexto narrativo cristiano del texto, sin introducir la convención de ocultar el nombre divino.
theological_decisions:
- issue: Expresión «hijos de la iniquidad» para el grupo condenado
  english_pob_reading: sons of lawlessness
  chosen_spanish_reading: hijos de la iniquidad
  alternative_spanish_readings:
  - hijos de la falta de ley
  - hijos de la impiedad
  rationale: La metáfora de filiación no se suaviza; se conserva como descripción identitaria y moral del grupo. «Iniquidad» mantiene la densidad judicial y ética del término sin convertirlo en una frase devocional más blanda.
  doctrine_reference: Juicio moral y pertenencia caracterizada por la conducta; cf. uso bíblico de ἀνομία en lenguaje de juicio.
- issue: Referencia a la «ira del Señor»
  english_pob_reading: because of the anger of the Lord
  chosen_spanish_reading: por causa de la ira del Señor
  alternative_spanish_readings:
  - a causa de la ira del Señor
  - por la ira del Señor
  rationale: Se mantiene la atribución personal del juicio sin neutralizarla. En este pasaje la causalidad forma parte de la explicación del derribo, no de un mero estado emocional humano.
  doctrine_reference: Doctrina del juicio divino y retribución moral; cf. lenguaje bíblico de la ira de Dios/Señor.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete; la redacción sigue el texto griego normalizado y el valor de acuerdo del control cruzado fue alto con observaciones menores, por lo que se preservan las imágenes y la lógica causal del original sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «torre» y «edificación» como imágenes coherentes dentro de la visión.
  - Se usa «Señor» para κύριος en este texto narrativo, coherente con la traducción inglesa auditada, sin recurrir al ocultamiento tipográfico del nombre divino.
  - El registro es sobrio y eclesial, evitando arcaísmos innecesarios pero conservando la solemnidad del juicio.
