  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego y del POB inglés: pregunta introductoria, identificación del grupo, persistencia de la maldad, falta de salvación, ineptitud para la edificación y juicio por la ira del Señor. La principal desviación está en οἱ υἱοὶ τῆς ἀνομίας: «hijos de la iniquidad» atenúa y desplaza el matiz específico de ἀνομία (‘desafuero’, ‘ilegalidad’, ‘anomia’, ‘desprecio de la ley’) que el POB inglés preservó expresamente como ‘lawlessness’.'
