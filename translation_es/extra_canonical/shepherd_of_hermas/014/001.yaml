  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. «Señor» para κύριος en este texto extracanónico es aceptable. El punto de glosario relevante es ἀνομία: dado que el POB inglés documenta ‘lawlessness’, el español debería conservar mejor ese campo semántico, idealmente «desafuero» o «falta de ley»; «iniquidad» es demasiado amplio y menos específico.'
