  yaml_path: translation/extra_canonical/shepherd_of_hermas/014/005.yaml
  text: 5. “And the white and round ones that do not fit into the building—who are they, Lady?” She answered me, saying, “How long will you be foolish and without understanding, asking about everything and understanding nothing? These are those who have faith, but also have the wealth of this age. When affliction comes, because of their wealth and their business dealings they deny their Lord.”
translation:
  language: es
  text: '5. «¿Y los blancos y redondos que no encajan en la edificación, quiénes son, Señora?». Ella me respondió, diciendo: «¿Hasta cuándo serás insensato y sin entendimiento, preguntando sobre todo y sin entender nada? Estos son los que tienen fe, pero también las riquezas de este siglo. Cuando viene la aflicción, por sus riquezas y sus negocios niegan a su Señor».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: white and round ones
  english_pob_choice: the white and round ones
  chosen_spanish: los blancos y redondos
  alternatives_spanish:
  - los de color blanco y forma redonda
  - los blancos y los redondos
  lexicon: λευκοί / στρογγύλοι
  rationale: Conservo la doble descripción física del original sin aclararla alegóricamente; en español, «blancos y redondos» comunica la forma de manera directa y natural.
- source_word: do not fit into the building
  english_pob_choice: do not fit into the building
  chosen_spanish: no encajan en la construcción
  alternatives_spanish:
  - no se ajustan a la edificación
  - no caben en la construcción
  lexicon: οὐ συμφωνοῦσιν εἰς τὴν οἰκοδομήν
  rationale: «Encajan» conserva la imagen de ajuste/apropiación al edificio sin volverla interpretativa; «construcción» mantiene la imagen arquitectónica del contexto.
- source_word: Lady
  english_pob_choice: Lady
  chosen_spanish: Señora
  alternatives_spanish:
  - Señora mía
  - Dama
  lexicon: κυρία
  rationale: «Señora» es el equivalente más claro y reverente en español; evita un tono demasiado literario de «Dama» y mantiene la dirección respetuosa del diálogo.
- source_word: How long will you be foolish and without understanding
  english_pob_choice: How long will you be foolish and without understanding
  chosen_spanish: ¿Hasta cuándo serás insensato y sin entendimiento?
  alternatives_spanish:
  - ¿Hasta cuándo seguirás siendo necio y sin entendimiento?
  - ¿Hasta cuándo estarás sin juicio y sin entendimiento?
  lexicon: μέχρι πότε ἔσῃ ἄφρων καὶ ἀσύνετος
  rationale: «Insensato» y «sin entendimiento» preservan el paralelismo del reproche; «necio» era posible, pero «insensato» suena más sobrio y amplio en español bíblico contemporáneo.
- source_word: asking about everything and understanding nothing
  english_pob_choice: asking about everything and understanding nothing
  chosen_spanish: preguntando sobre todo y sin entender nada
  alternatives_spanish:
  - preguntando acerca de todo y no entendiendo nada
  - preguntando por todo y sin comprender nada
  lexicon: περὶ πάντων ἐρωτῶν καὶ μηδὲν συνιείς
  rationale: Mantengo la antítesis del original con una construcción natural en español. «Sin entender nada» reproduce la fuerza total del griego.
- source_word: have faith, but also have the wealth of this age
  english_pob_choice: have faith, but also have the wealth of this age
  chosen_spanish: tienen fe, pero también las riquezas de este siglo
  alternatives_spanish:
  - tienen fe, pero también las riquezas de esta era
  - tienen fe, pero también la riqueza de este tiempo
  lexicon: πίστιν ἔχουσιν, ἀλλὰ καὶ τοῦ αἰῶνος τούτου τὸν πλοῦτον
  rationale: «Riquezas de este siglo» sigue de cerca el contraste temporal del original y mantiene la expresión tradicional en español para el orden presente transitorio.
- source_word: deny their Lord
  english_pob_choice: deny their Lord
  chosen_spanish: niegan a su Señor
  alternatives_spanish:
  - niegan a su Señor y Maestro
  - reniegan de su Señor
  lexicon: ἀρνοῦνται τὸν κύριον αὐτῶν
  rationale: «Niegan a su Señor» conserva la fórmula verbal directa; «reniegan de» es viable, pero aquí la secuencia causal ya explica la negación como abandono práctico bajo aflicción.
theological_decisions:
- issue: Designación de la figura interlocutora como Lady/Señora
  english_pob_reading: Lady
  chosen_spanish_reading: Señora
  alternative_spanish_readings:
  - Dama
  - Señora mía
  rationale: El texto presenta a la interlocutora con tratamiento reverente; «Señora» mantiene la cortesía sin añadir contenido doctrinal. No se identifica más allá de lo que permite el pasaje.
  doctrine_reference: Christology / angelology not specified; narrative address only
- issue: Sentido de la riqueza como factor de apostasía bajo aflicción
  english_pob_reading: because of their wealth and their business dealings they deny their Lord
  chosen_spanish_reading: por sus riquezas y sus transacciones comerciales niegan a su Señor
  alternative_spanish_readings:
  - a causa de sus riquezas y de sus negocios niegan a su Señor
  - por su riqueza y sus actividades comerciales reniegan de su Señor
  rationale: 'La frase conserva la tensión moral del original: la posesión de riqueza no es en sí el veredicto, sino su efecto cuando llega la aflicción. «Transacciones comerciales» mantiene el matiz de negocio/actividad mercantil sin suavizarlo.'
  doctrine_reference: Perseverance under trial; wealth as spiritual danger, cf. Synoptic warnings
translation_notes:
  revision_awareness: El inglés POB no trae notas ni variantes para este versículo, y el control de concordancia indica alto acuerdo (0.96). La versión española sigue de cerca el sentido del original griego transmitido por la edición Lightfoot & Harmer, sin introducir aclaraciones interpretativas adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero aquí no aparece el nombre divino.
  - «Mesías» no aplica en este verso.
  - «Señor» se conserva porque el original griego usa κύριον en una fórmula relacional no equivalente al nombre divino.
  - «siglo» traduce αἰών en sentido de orden temporal presente, en coherencia con el estilo del proyecto.
