revisions:
- from: '5. «¿Y los blancos y redondos que no encajan en la construcción, quiénes son, Señora?». Ella me respondió, diciendo: «¿Hasta cuándo serás insensato y sin entendimiento, preguntando sobre todo y sin entender nada? Estos son los que tienen fe, pero también las riquezas de este siglo. Cuando viene la aflicción, por sus riquezas y sus transacciones comerciales niegan a su Señor».'
  to: '5. «¿Y los blancos y redondos que no encajan en la edificación, quiénes son, Señora?». Ella me respondió, diciendo: «¿Hasta cuándo serás insensato y sin entendimiento, preguntando sobre todo y sin entender nada? Estos son los que tienen fe, pero también las riquezas de este siglo. Cuando viene la aflicción, por sus riquezas y sus negocios niegan a su Señor».'
  rationale: 'Se hace una reparación menor para mejorar la fidelidad de registro y la legibilidad: «sus negocios» comunica mejor el sentido de actividad comercial lucrativa sin tecnicismo moderno, y «edificación» armoniza mejor con la imagen arquitectónica simbólica del pasaje.'
