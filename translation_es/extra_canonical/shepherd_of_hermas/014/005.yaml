review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido global del griego y del POB en inglés: la pregunta sobre las piedras blancas y redondas, la reprensión por falta de entendimiento, la afirmación de que tienen fe y riqueza, y la negación del Señor cuando llega la aflicción. Sin embargo, «transacciones comerciales» resulta más técnico y menos natural que el sentido probable de ocupaciones/negocios; además, «construcción» puede mantenerse, pero «edificación» refleja mejor οἰκοδομή en este contexto de edificio simbólico.'
  spanish_quality_summary: El español es claro y digno, pero hay una mejora pequeña de naturalidad y registro. «Sus negocios» suena más idiomático y eclesialmente legible que «sus transacciones comerciales». También conviene evitar una formulación demasiado moderna/empresarial en un texto cristiano antiguo.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Señora» para κυρία y «Señor» para κύριος aquí son adecuados. «Este siglo» es una buena opción para αἰών en este contexto. No se requieren notas.
  issues:
  - severity: medium
    issue: «transacciones comerciales» suena demasiado técnico y moderno
    rationale: El original apunta a negocios, comercio u ocupaciones lucrativas; la expresión actual introduce un matiz de tecnicismo económico poco congruente con el registro del pasaje y menos natural en español bíblico legible.
  - severity: low
    issue: «construcción» es aceptable, pero «edificación» encaja mejor con el campo semántico simbólico
    rationale: En contexto de piedras y edificio espiritual, «edificación» suele sonar más natural y cercano al valor de οἰκοδομή, aunque «construcción» no es incorrecto.
  revised_spanish_text: '5. «¿Y los blancos y redondos que no encajan en la edificación, quiénes son, Señora?». Ella me respondió, diciendo: «¿Hasta cuándo serás insensato y sin entendimiento, preguntando sobre todo y sin entender nada? Estos son los que tienen fe, pero también las riquezas de este siglo. Cuando viene la aflicción, por sus riquezas y sus negocios niegan a su Señor».'
  revision_rationale: 'Se hace una reparación menor para mejorar la fidelidad de registro y la legibilidad: «sus negocios» comunica mejor el sentido de actividad comercial lucrativa sin tecnicismo moderno, y «edificación» armoniza mejor con la imagen arquitectónica simbólica del pasaje.'
