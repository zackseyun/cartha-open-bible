base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/014/007.yaml
  text: '7. “Learn first from yourself: when you were rich, you were useless; but now you are useful and beneficial for life. Become useful to God[3:vi.7 ‘make use of the same stones’][3:vi.7 textual][3:vi.6 ‘square’][3:vi.6 ‘which captivates their souls’][3:vi.3 ‘cracks’][3:vi.2 ‘scabbed ones’]; for you yourself also are used from the same stones.”'
translation:
  language: es
  text: '7. «Aprende primero de ti mismo: cuando eras rico, eras inútil; pero ahora eres útil y provechoso para la vida. Llega a ser útil para Dios[a]; porque tú mismo también eres usado de las mismas piedras».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «vuélvete útil para Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: χρήσιμος / ὠφέλιμος (idea de “useful and beneficial”)
  english_pob_choice: useful and beneficial
  chosen_spanish: útil y provechoso
  alternatives_spanish:
  - útil y beneficioso
  - de utilidad y provecho
  lexicon: χρήσιμος; ὠφέλιμος
  rationale: Mantengo la doble idea del griego y del inglés POB con dos adjetivos naturales en español. «Útil» conserva la fuerza funcional; «provechoso» transmite el valor resultante sin volver la frase demasiado técnica.
- source_word: ἀχρεῖος (idea de “useless”)
  english_pob_choice: useless
  chosen_spanish: inútil
  alternatives_spanish:
  - de ningún provecho
  - sin utilidad
  lexicon: ἀχρεῖος
  rationale: «Inútil» es la correspondencia más clara y directa en español para expresar falta de valor práctico, en paralelo con «útil» del miembro siguiente.
- source_word: χρῆσις / χράομαι (idea de “used / make use of”)
  english_pob_choice: you yourself also are used
  chosen_spanish: tú mismo también eres empleado
  alternatives_spanish:
  - tú mismo también eres usado
  - también se te usa
  lexicon: χράομαι; χρῆσις
  rationale: «Eres empleado» conserva el pasivo y la idea de ser puesto en uso sin convertirla en una frase demasiado moderna o ininteligible. La forma activa reflexiva «se te usa» sonaría menos directa para este contexto.
- source_word: αὐτοὺς / αὐτῶν … λίθοις (reference to stones)
  english_pob_choice: the same stones
  chosen_spanish: las mismas piedras
  alternatives_spanish:
  - esas mismas piedras
  - de las mismas piedras
  lexicon: λίθος
  rationale: Conservo «las mismas piedras» porque el contexto ya alude a la imagen de las piedras trabajadas; la formulación mantiene la conexión interna con las referencias auditadas en el POB inglés sin expandir el sentido.
theological_decisions:
- issue: 'Imperativo: “Become useful to God” y la relación entre utilidad humana y servicio divino'
  english_pob_reading: Become useful to God
  chosen_spanish_reading: Llega a ser útil para Dios
  alternative_spanish_readings:
  - Vuélvete útil para Dios
  - Sé útil para Dios
  rationale: «Llega a ser» refleja mejor el carácter exhortativo-progresivo del griego y evita reducir la frase a un mero rasgo de desempeño. «Para Dios» conserva el dativo de ventaja/relación sin imponer una idea de ‘utilidad’ aplicada a Dios en sentido antropomórfico fuerte.
  doctrine_reference: Exhortación ética y transformación del creyente; lenguaje de utilidad en servicio a Dios
translation_notes:
  revision_awareness: No se aplicaron revisiones previas en el paquete; la versión inglesa POB usa una cadena de notas cruzadas para preservar el contexto de la imagen de las piedras. En español se mantuvo el enlace conceptual sin reproducir esas referencias internas, porque pertenecen al aparato inglés de auditoría y no al cuerpo del versículo.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona singular a lo largo del versículo.
  - Se preserva la oposición inútil/útil como eje retórico principal.
  - Se evita ‘Cristo’ o terminología eclesial ajena al pasaje; el texto sigue el vocabulario material de la metáfora de las piedras.
