review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: la pregunta sobre cuándo serán aptos para la construcción, la imagen de la riqueza como impedimento, y el símil de la piedra redonda que debe ser recortada para servir en la obra. Sin embargo, «arrancado / se les arranca la riqueza» desplaza la imagen principal desde cortar/recortar hacia arrancar, lo que encaja menos con el símil inmediato de la piedra que es cortada para volverse cuadrada. También «si no es cortada y no desprende algo de sí misma» suena algo forzado frente al inglés auditado «unless it is cut and casts off something from itself».'
  spanish_quality_summary: El español es claro y digno, pero admite una mejora pequeña para mayor naturalidad y mejor cohesión imagística. «Llegarán a ser aptos» puede simplificarse a «serán aptos» sin pérdida. La repetición de «arranca» en contexto de piedra y riqueza debilita la consistencia metafórica; «se les haya quitado / recortado» funciona mejor. Además, «desprende algo de sí misma» puede pulirse a «se le quita algo» para sonar más idiomático y seguir la lógica del tallado.
  glossary_alignment: 'No hay conflictos relevantes con la terminología del proyecto. «Señora», «Dios» y «Señor» son adecuados aquí. «Construcción» es defendible, aunque «edificación» también sería posible; no hace falta cambiarlo. La principal cuestión es léxica-contextual: mantener la fuerza de ἀφαιρεθῇ sin romper la imagen de corte del pasaje.'
  issues:
  - severity: medium
    issue: «arrancado / se les arranca la riqueza» no refleja tan bien la imagen de corte del pasaje
    rationale: El POB inglés auditado usa «cut away», y el símil inmediato habla de una piedra que debe ser cortada. «Arrancar» añade una imagen distinta; «quitar» o una formulación con «cortar» conserva mejor la cohesión metafórica y sigue siendo natural en español.
  - severity: low
    issue: «si no es cortada y no desprende algo de sí misma» suena algo rígido en español
    rationale: La idea es clara, pero la construcción resulta menos idiomática. Una formulación como «si no es cortada y no se le quita algo» reproduce mejor el sentido funcional de remover material de la piedra.
  - severity: low
    issue: «llegarán a ser aptos» puede simplificarse
    rationale: «Serán aptos» es más natural y suficientemente fiel al sentido del original y del inglés auditado.
  revised_spanish_text: '6. Y yo le respondí: «Señora, ¿cuándo, entonces, serán aptos para la construcción?». Ella dijo: «Cuando se les haya quitado la riqueza que los enreda, entonces serán útiles para Dios. Porque así como una piedra redonda, si no es cortada y no se le quita algo, no puede volverse cuadrada, así también los que son ricos en este siglo, si no se les quita la riqueza, no pueden volverse útiles para el Señor».'
  revision_rationale: 'Se hacen ajustes menores para alinear mejor la imagen verbal con el griego auditado por el POB inglés: la riqueza debe ser «quitada/cortada» en paralelo con la piedra que es cortada. También se mejora la naturalidad del español sin alterar el contenido ni la teología del pasaje.'
