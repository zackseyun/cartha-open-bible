  yaml_path: translation/extra_canonical/shepherd_of_hermas/014/006.yaml
  text: 6. And I answered her, “Lady, when then will they become fit for the building?” She said, “When their wealth that ensnares them has been cut away, then they will be useful to God. For just as a round stone, unless it is cut and casts off something from itself, cannot become square, so also those who are rich in this age, unless their wealth is cut away, cannot become useful to the Lord.
translation:
  language: es
  text: '6. Y yo le respondí: «Señora, ¿cuándo, entonces, serán aptos para la construcción?». Ella dijo: «Cuando se les haya quitado la riqueza que los enreda, entonces serán útiles para Dios. Porque así como una piedra redonda, si no es cortada y no se le quita algo, no puede volverse cuadrada, así también los que son ricos en este siglo, si no se les quita la riqueza, no pueden volverse útiles para el Señor».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γυναῖκα / lady address in context
  english_pob_choice: Lady
  chosen_spanish: Señora
  alternatives_spanish:
  - Señora
  - Dama
  lexicon: address/vocative
  rationale: El vocativo respetuoso del original y del inglés POB se reproduce con «Señora», que suena natural y mantiene el tono de respeto. «Dama» es posible, pero menos usual en este contexto.
- source_word: οἰκοδομή
  english_pob_choice: building
  chosen_spanish: construcción
  alternatives_spanish:
  - edificación
  - construcción
  lexicon: building/edification
  rationale: El contexto de la imagen de una piedra apta para la obra pide una palabra concreta y clara. «Construcción» conserva la idea material sin imponer un sentido eclesial demasiado técnico. «Edificación» quedaría más abstracto y tradicional.
- source_word: πλοῦτος / wealth that ensnares them
  english_pob_choice: their wealth that ensnares them
  chosen_spanish: la riqueza que los enreda
  alternatives_spanish:
  - su riqueza que los enreda
  - su riqueza engañosa
  - la riqueza que los atrapa
  lexicon: wealth/snare
  rationale: «Enreda» refleja el matiz de algo que captura o compromete sin suavizar la fuerza del texto. Mantiene el vínculo entre posesión y esclavitud moral implícito en la imagen.
- source_word: ἀφαιρεθῇ / cut away
  english_pob_choice: has been cut away
  chosen_spanish: se les haya arrancado
  alternatives_spanish:
  - se les haya quitado
  - se les haya cortado
  - sea arrancada
  lexicon: remove/cut away
  rationale: «Arrancar» conserva la imagen fuerte de separación y despojo que el símil exige mejor que un verbo más débil como «quitar». En español, además, combina bien con el efecto de liberación del obstáculo.
- source_word: χρήσιμοι / useful
  english_pob_choice: useful
  chosen_spanish: útiles
  alternatives_spanish:
  - aptos
  - útiles
  - provechosos
  lexicon: useful/usefulness
  rationale: «Útiles» corresponde de manera directa al valor funcional del término. «Aptos» se usa también más adelante para evitar repetir sin necesidad, pero aquí el paralelismo con el texto fuente favorece «útiles».
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: para Dios
  alternatives_spanish:
  - para Dios
  - a Dios
  lexicon: to God
  rationale: «Para Dios» expresa bien la finalidad/uso de la construcción en español y mantiene el paralelismo con la segunda mitad del pasaje. No se sustituye por una formulación devocional más tradicional sin necesidad.
- source_word: τετράγωνος
  english_pob_choice: square
  chosen_spanish: cuadrada
  alternatives_spanish:
  - cuadrada
  - de cuatro lados
  lexicon: square/shaped stone
  rationale: La imagen geométrica del original y del inglés POB se conserva con «cuadrada». Aunque la piedra sea femenina en español por concordancia con «piedra», el sentido es el de una forma apta para el encaje.
- source_word: αἱ ἐν τῷ αἰῶνι τούτῳ πλούσιοι
  english_pob_choice: those who are rich in this age
  chosen_spanish: los que son ricos en este siglo
  alternatives_spanish:
  - los que son ricos en este siglo
  - los ricos de este mundo
  - los que son ricos en esta era
  lexicon: this age/this world
  rationale: «En este siglo» conserva la distinción de época presente del original y evita reducir el sentido a «mundo» en un sentido meramente espacial. «Siglo» es natural en español bíblico y mantiene la tensión escatológica.
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: para el Señor
  alternatives_spanish:
  - para el Señor
  - al Señor
  lexicon: Lord
  rationale: «Señor» reproduce el registro cristiano del POB inglés y encaja con el paralelismo de utilidad/servicio. En este texto no se requiere explicitar Yahvé, porque el referente inmediato es el Señor como figura de autoridad divina en la parábola.
theological_decisions:
- issue: Valor moral/funcional de los ricos frente a Dios o el Señor
  english_pob_reading: those who are rich in this age ... cannot become useful to the Lord / useful to God
  chosen_spanish_reading: los ricos en este siglo ... no pueden volverse útiles para Dios / para el Señor
  alternative_spanish_readings:
  - no pueden volverse aptos para Dios / para el Señor
  - no pueden servir a Dios / al Señor
  rationale: La traducción conserva la tensión del texto entre posesión de riqueza y aptitud para la obra divina. No se suaviza con «servir», porque el original insiste en utilidad funcional y en una condición previa de despojo.
  doctrine_reference: Formación moral; renuncia a los bienes como condición de disponibilidad para la obra de Dios, sin convertir el pasaje en una doctrina sistemática de pobreza
- issue: Metáfora de la piedra redonda que debe ser recortada para volverse cuadrada
  english_pob_reading: a round stone ... cannot become square
  chosen_spanish_reading: una piedra redonda ... no puede volverse cuadrada
  alternative_spanish_readings:
  - una piedra redonda ... no puede hacerse cuadrada
  - una piedra redonda ... no puede quedar cuadrada
  rationale: 'Se conserva la imagen exacta y su lógica artesanal: la forma natural debe ser corregida para servir en la construcción. No se espiritualiza la metáfora ni se la convierte en alegoría libre.'
  doctrine_reference: Imagen moral de la conformación del creyente para el servicio de Dios
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores en el paquete; se sigue el texto inglés POB dado, con atención directa a la imagen griega y a su correspondencia semántica en español.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «Dios» y «Señor» según el paralelismo del pasaje y sin imponer una sustitución uniforme.
  - Se conserva la fuerza material de la imagen de la piedra y del despojo de la riqueza, evitando términos excesivamente abstractos.
  - El registro es digno y eclesial, pero evita fórmulas tradicionales que no aportan precisión al sentido original.
