revisions:
- from: '6. Y yo le respondí: «Señora, ¿cuándo, entonces, llegarán a ser aptos para la construcción?». Ella dijo: «Cuando se les haya arrancado la riqueza que los enreda, entonces serán útiles para Dios. Porque así como una piedra redonda, si no es cortada y no desprende algo de sí misma, no puede volverse cuadrada, así también los que son ricos en este siglo, si no se les arranca la riqueza, no pueden volverse útiles para el Señor».'
  to: '6. Y yo le respondí: «Señora, ¿cuándo, entonces, serán aptos para la construcción?». Ella dijo: «Cuando se les haya quitado la riqueza que los enreda, entonces serán útiles para Dios. Porque así como una piedra redonda, si no es cortada y no se le quita algo, no puede volverse cuadrada, así también los que son ricos en este siglo, si no se les quita la riqueza, no pueden volverse útiles para el Señor».'
  rationale: 'Se hacen ajustes menores para alinear mejor la imagen verbal con el griego auditado por el POB inglés: la riqueza debe ser «quitada/cortada» en paralelo con la piedra que es cortada. También se mejora la naturalidad del español sin alterar el contenido ni la teología del pasaje.'
  reviewer_model: gpt-5.4
