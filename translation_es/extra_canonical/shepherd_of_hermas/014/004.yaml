  text: 4. “And the mutilated ones—these are those who have believed and have the greater part in righteousness, but have certain parts of lawlessness. For this reason they are mutilated and not whole.
translation:
  language: es
  text: 4. «Y los mutilados, estos son los que han creído y en su mayor parte están en la justicia, pero tienen ciertas partes de iniquidad. Por esta razón están mutilados y no enteros».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ κωλοβοί / the mutilated ones
  english_pob_choice: the mutilated ones
  chosen_spanish: los mutilados
  alternatives_spanish:
  - los lisiados
  - los amputados
  lexicon: κωλός/κωλόβος
  rationale: Conserva la imagen corporal de ‘mutilated ones’ sin suavizarla. ‘Los mutilados’ es natural en español y mantiene la fuerza metafórica del pasaje.
- source_word: πιστεύσαντες / have believed
  english_pob_choice: have believed
  chosen_spanish: han creído
  alternatives_spanish:
  - creyeron
  - han llegado a creer
  lexicon: πιστεύω
  rationale: '‘Han creído’ refleja el perfecto del inglés POB y el valor resultativo del griego: una fe ya asumida como realidad presente.'
- source_word: τὸ πλεῖον μέρος ἐν δικαιοσύνῃ / the greater part in righteousness
  english_pob_choice: the greater part in righteousness
  chosen_spanish: la mayor parte en la justicia
  alternatives_spanish:
  - la mayor parte en rectitud
  - la parte mayor en justicia
  lexicon: δικαιοσύνη
  rationale: ‘Justicia’ conserva el rango legal/covenantal de δικαιοσύνη. ‘Mayor parte’ preserva la imagen de una proporción predominante, no absoluta.
- source_word: ἀνομία / lawlessness
  english_pob_choice: lawlessness
  chosen_spanish: injusticia
  alternatives_spanish:
  - ilegalidad
  - anomia
  - desorden
  lexicon: ἀνομία
  rationale: ‘Injusticia’ comunica el contraste moral del pasaje en español claro. Se evita ‘anomia’ por ser demasiado técnico y ‘ilegalidad’ por reducir el sentido a lo jurídico.
- source_word: οὐ ὁλοκλήρους / not whole
  english_pob_choice: not whole
  chosen_spanish: no enteros
  alternatives_spanish:
  - no completos
  - no íntegros
  lexicon: ὁλόκληρος
  rationale: ‘No enteros’ reproduce la metáfora de integridad fragmentada con sencillez directa. ‘Íntegros’ sería más abstracto; ‘completos’ menos idiomático aquí.
theological_decisions:
- issue: La combinación de justicia e injusticia en las mismas personas
  english_pob_reading: those who have believed and have the greater part in righteousness, but have certain parts of lawlessness
  chosen_spanish_reading: los que han creído y tienen la mayor parte en la justicia, pero tienen ciertas partes de injusticia
  alternative_spanish_readings:
  - los que han creído y tienen la mayor parte en la rectitud, pero tienen ciertas partes de ilegalidad
  - los que han creído y en su mayor parte son justos, pero conservan algunas partes de injusticia
  rationale: 'Mantiene la tensión antropológica del texto: la pertenencia a la justicia es real pero no total. La formulación evita diluir el contraste entre la parte predominante y las ‘ciertas partes’ defectuosas.'
  doctrine_reference: Anthropology / sanctification imagery in Shepherd of Hermas; no direct doctrinal harmonization imposed
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido del griego normalizado y coincide sustancialmente con la versión inglesa POB. No se introdujeron notas porque no hay una variante textual o ambigüedad española que requiera marcación explícita en este versículo.
  spanish_consistency_notes:
  - Se mantuvo ‘justicia’ para δικαιοσύνη por coherencia con el uso jurídico-moral estándar del POB.
  - Se evitó ‘SEÑOR’ o formulaciones eclesiásticas no pertinentes; el pasaje no contiene el nombre divino.
  - La imagen de mutilación se preserva de forma literal, sin convertirla en una paráfrasis psicológica.
