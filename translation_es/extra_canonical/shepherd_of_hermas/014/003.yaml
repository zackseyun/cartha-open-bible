    issue: «guardan cosas unos contra otros» es poco idiomático
    rationale: Aunque intenta conservar la vaguedad del inglés, en español suena extraño y no comunica con claridad la idea de agravios o resentimientos mutuos que el contexto exige.
  - severity: medium
    issue: «tienen un rostro de paz» suena rígido
    rationale: Preserva la metáfora, pero en español eclesial general resulta menos natural que una formulación como «muestran rostro de paz», que conserva la imagen externa sin sonar calcada.
  - severity: low
    issue: «su corazón» tras referentes plurales puede leerse distributivamente, pero aquí «sus corazones» mejora la claridad
    rationale: El pasaje habla de males que permanecen en cada uno de ellos; el plural evita una leve aspereza y mantiene mejor la referencia mutua.
