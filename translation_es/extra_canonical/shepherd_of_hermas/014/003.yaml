  yaml_path: translation/extra_canonical/shepherd_of_hermas/014/003.yaml
  text: 3. “And those that have cracks—who are they? These are the ones who harbor things against one another in their hearts and are not at peace among themselves, but have a face of peace; yet when they depart from one another, their evils remain in their hearts. These, then, are the cracks that the stones have.
translation:
  language: es
  text: 3. «¿Y los que tienen grietas[a], quiénes son? Estos son los que guardan agravios unos contra otros en sus corazones y no están en paz entre sí, sino que muestran rostro de paz; pero, cuando se apartan unos de otros, sus maldades permanecen en sus corazones. Estas, pues, son las grietas que tienen las piedras».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Grietas» traduce la imagen física del texto; también puede entenderse como «hendiduras» o «fisuras».
    reason: lexical_alternative
lexical_decisions:
- source_word: cracks
  english_pob_choice: cracks
  chosen_spanish: grietas
  alternatives_spanish:
  - hendiduras
  - fisuras
  lexicon: —
  rationale: El griego describe una ruptura o abertura en la piedra; «grietas» reproduce bien la imagen física y mantiene la metáfora moral sin exagerarla.
- source_word: harbor things against one another
  english_pob_choice: harbor things against one another
  chosen_spanish: guardan cosas unos contra otros
  alternatives_spanish:
  - guardan resentimiento unos contra otros
  - albergan cosas contra los demás
  lexicon: —
  rationale: La expresión es idiomática y su sentido es interno y relacional; «guardan cosas» conserva la vaguedad del original, permitiendo que el contexto determine que se trata de agravios o resentimientos.
- source_word: in their hearts
  english_pob_choice: in their hearts
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en sus corazones
  - dentro de sí
  lexicon: —
  rationale: Se mantiene el singular distributivo natural en español y la localización interior del conflicto moral.
- source_word: not at peace among themselves
  english_pob_choice: not at peace among themselves
  chosen_spanish: no están en paz entre sí
  alternatives_spanish:
  - no viven en paz entre ellos
  - no tienen paz entre sí
  lexicon: —
  rationale: «Entre sí» comunica correctamente la relación mutua; «estar en paz» es directo y fiel al contraste con la apariencia externa de paz.
- source_word: have a face of peace
  english_pob_choice: have a face of peace
  chosen_spanish: tienen un rostro de paz
  alternatives_spanish:
  - aparentan paz
  - muestran una apariencia de paz
  lexicon: —
  rationale: La imagen literal del original se conserva para mantener el contraste entre apariencia externa y condición interior.
- source_word: their evils remain in their hearts
  english_pob_choice: their evils remain in their hearts
  chosen_spanish: sus maldades permanecen en su corazón
  alternatives_spanish:
  - sus males permanecen en su corazón
  - sus malas intenciones permanecen en su corazón
  lexicon: —
  rationale: «Maldades» preserva el plural moral del original y permite abarcar tanto acciones como disposiciones perversas; «permanecen» refleja la persistencia.
theological_decisions:
- issue: Contraste entre apariencia externa de paz e interior de conflicto
  english_pob_reading: have a face of peace ... but ... their evils remain in their hearts
  chosen_spanish_reading: tienen un rostro de paz ... pero ... sus maldades permanecen en su corazón
  alternative_spanish_readings:
  - aparentan paz ... pero ... sus maldades permanecen en su corazón
  - muestran una apariencia de paz ... pero ... sus maldades permanecen en su corazón
  rationale: 'La metáfora denuncia hipocresía relacional: una paz visible no equivale a paz real. La formulación española conserva esa tensión sin suavizarla.'
  doctrine_reference: Ética del corazón; integridad interior vs. apariencia externa
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido del pasaje con equivalencia óptima. Frente al inglés POB, se mantuvo la metáfora de «rostro de paz» y se evitó explicitar demasiado «things against one another» para no cerrar el alcance del conflicto interior más allá de lo que el texto sugiere.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto lo requiera explícitamente; este pasaje no contiene el nombre divino.
  - Se conserva el registro moral-relacional del original con vocabulario comprensible en español contemporáneo.
  - No se introducen términos eclesiales técnicos ajenos al pasaje; la imagen de las piedras se deja intacta.
