    rationale: Aunque comprensible, en español fluye mejor 'Ya tienes la revelación completa' o 'Tienes completa la revelación'. Es una mejora de legibilidad, no de sentido.
  - severity: medium
    issue: '''No preguntes más nada'' suena regional/menos natural para neutral amplio'
    rationale: Para una meta neutral latinoamericana y eclesial amplia, 'No preguntes nada más' es más estándar y digno, manteniendo exactamente el mandato de no seguir preguntando.
  revised_spanish_text: Por tanto, los que se han arrepentido plenamente serán nuevos y firmemente fundados, los que se han arrepentido de todo corazón. Ya tienes la revelación completa. No preguntes nada más acerca de la revelación; pero si algo hace falta, te será revelado.
  revision_rationale: 'Se hacen solo ajustes menores de naturalidad y registro: se mejora el orden de ''la revelación completa'' y se sustituye ''más nada'' por ''nada más'' para un español neutral más amplio, sin cambiar el contenido ni las decisiones léxicas principales.'
