base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/021/004.yaml
  text: Therefore those who have repented completely will be new and firmly founded, those who have repented from their whole heart. You have the revelation complete. No longer ask anything about revelation; but if anything is needed, it will be revealed to you.
translation:
  language: es
  text: Por tanto, los que se han arrepentido plenamente serán nuevos y firmemente fundados, los que se han arrepentido de todo corazón. Ya tienes la revelación completa. No preguntes nada más acerca de la revelación; pero si algo hace falta, te será revelado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μετανοέω / μετανοήσαντες
  english_pob_choice: repented completely / repented from their whole heart
  chosen_spanish: se han arrepentido plenamente / se han arrepentido de todo corazón
  alternatives_spanish:
  - han cambiado de mente por completo
  - se han vuelto por completo
  lexicon: μετανοέω
  rationale: La POB en inglés interpreta el énfasis como arrepentimiento consumado e interior; en español, 'arrepentirse' comunica bien ese giro moral y volitivo. 'De todo corazón' conserva la intensidad del origen interior que el inglés expresa con 'from their whole heart'.
- source_word: καινοί / καινοί καὶ βεβασιλευμένοι?
  english_pob_choice: new and firmly founded
  chosen_spanish: nuevos y firmemente fundados
  alternatives_spanish:
  - nuevos y bien cimentados
  - nuevos y firmes
  lexicon: καινός / στηρίζω
  rationale: '''Nuevos'' mantiene la cualidad de renovación; ''firmemente fundados'' reproduce el matiz de establecimiento estable que la POB traduce con ''firmly founded''. ''Fundados'' resulta más cercano a la imagen de edificación/cimiento que ''firmes'' a secas.'
- source_word: ἀποκάλυψις
  english_pob_choice: revelation
  chosen_spanish: revelación
  alternatives_spanish:
  - apocalipsis
  lexicon: ἀποκάλυψις
  rationale: En español bíblico 'revelación' es el equivalente natural y preciso; 'apocalipsis' sonaría como nombre de libro o género, no como el acto aquí descrito.
- source_word: ζητεῖν περὶ τῆς ἀποκαλύψεως
  english_pob_choice: No longer ask anything about revelation
  chosen_spanish: No preguntes más nada acerca de la revelación
  alternatives_spanish:
  - No sigas preguntando sobre la revelación
  - No indagues ya más acerca de la revelación
  lexicon: ζητέω / ἐρωτᾶν contextual
  rationale: La POB prohíbe seguir preguntando; en español 'No preguntes más nada' conserva la orden directa y el alcance total. 'Acerca de la revelación' mantiene el complemento explícito del inglés.
- source_word: ἐὰν δέ τι ᾖ χρεία
  english_pob_choice: if anything is needed
  chosen_spanish: si algo hace falta
  alternatives_spanish:
  - si algo es necesario
  - si hubiera necesidad de algo
  lexicon: χρεία
  rationale: '''Hace falta'' es idiomático y suficientemente literal para la necesidad contingente expresada por el griego y el inglés POB.'
- source_word: ἀποκαλυφθήσεται
  english_pob_choice: it will be revealed to you
  chosen_spanish: te será revelado
  alternatives_spanish:
  - se te revelará
  - te lo revelarán
  lexicon: ἀποκαλύπτω
  rationale: Se conserva la voz pasiva con matiz de pasiva divina/impersonal, equivalente al inglés 'will be revealed to you'.
theological_decisions:
- issue: La suficiencia de la revelación recibida
  english_pob_reading: You have the revelation complete. No longer ask anything about revelation; but if anything is needed, it will be revealed to you.
  chosen_spanish_reading: Ya tienes completa la revelación. No preguntes más nada acerca de la revelación; pero si algo hace falta, te será revelado.
  alternative_spanish_readings:
  - Tienes completa la revelación
  - La revelación ya está completa para ti
  rationale: La POB entiende que la revelación dada a Hermas llega a su culminación funcional; el español conserva esa suficiencia sin convertirla en una tesis abstracta adicional.
  doctrine_reference: suficiencia de la revelación en el marco literario del texto
- issue: Arrepentimiento total como condición de renovación
  english_pob_reading: those who have repented completely ... those who have repented from their whole heart
  chosen_spanish_reading: los que se han arrepentido plenamente ... los que se han arrepentido de todo corazón
  alternative_spanish_readings:
  - los que se han convertido por completo
  - los que han cambiado de mente de todo corazón
  rationale: Se mantiene la doble formulación del inglés para no perder la insistencia del texto en la integridad del arrepentimiento como base de la novedad y el establecimiento firme.
  doctrine_reference: arrepentimiento integral y renovación moral
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con la traducción inglesa POB y solo exige ajustes de naturalidad en español: ''repented'' se rinde como ''se han arrepentido'', ''firmly founded'' como ''firmemente fundados'', y ''you have the revelation complete'' como ''Ya tienes completa la revelación'' para mantener el sentido de suficiencia sin sobrerinterpretar. No se detectan variantes textuales que obliguen a notas críticas en esta unidad.'
  spanish_consistency_notes:
  - Se mantiene 'revelación' de forma consistente para ἀποκάλυψις.
  - Se evita 'Cristo' u otra terminología ajena al pasaje.
  - El tono es directivo pero sobrio, acorde con una instrucción final en el texto.
  - '''Firmemente fundados'' conserva la imaginería de establecimiento y no la reduce a mera estabilidad emocional.'
