  text: But in the third vision you saw her younger, beautiful, and cheerful, and her appearance was beautiful.
translation:
  language: es
  text: Pero en la tercera visión la viste más joven, hermosa y alegre; y su aspecto era hermoso.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: νεωτέρα / younger
  english_pob_choice: younger
  chosen_spanish: más joven
  alternatives_spanish:
  - joven
  - de menor edad
  lexicon: νεώτερος
  rationale: «Más joven» conserva el valor comparativo del griego y sigue de cerca la elección inglesa, sin introducir una edad exacta que el texto no da.
- source_word: καλή / beautiful
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bella
  - bonita
  lexicon: καλός
  rationale: «Hermosa» comunica belleza visible en un registro natural para el español bíblico, y mantiene la repetición del rasgo estético del original.
- source_word: χαίρουσα / cheerful
  english_pob_choice: cheerful
  chosen_spanish: alegre
  alternatives_spanish:
  - gozosa
  - contenta
  lexicon: χαίρω
  rationale: «Alegre» expresa el tono gozoso/afable del participio sin forzar un matiz emocional más fuerte que el testimonio fuente.
- source_word: τὸ εἶδος / her appearance
  english_pob_choice: her appearance was beautiful
  chosen_spanish: su aspecto era hermoso
  alternatives_spanish:
  - su semblante era hermoso
  - su apariencia era hermosa
  lexicon: εἶδος
  rationale: «Aspecto» es idiomático y fiel para εἶδος aquí; se conserva la repetición semántica con «hermosa» para reflejar el énfasis del griego y del inglés POB.
theological_decisions:
- issue: Repetición del rasgo de belleza en la frase final
  english_pob_reading: and her appearance was beautiful
  chosen_spanish_reading: y su aspecto era hermoso
  alternative_spanish_readings:
  - y su apariencia era hermosa
  - y era hermosa de aspecto
  rationale: El griego repite la idea de belleza en la descripción general y en el aspecto; la versión española conserva esa duplicación en vez de simplificarla, para no perder el énfasis descriptivo del texto.
  doctrine_reference: No doctrinal issue; descriptive emphasis in narrative vision
translation_notes:
  revision_awareness: El texto fuente y la traducción inglesa coinciden sustancialmente; no se observan revisiones relevantes ni variantes textuales documentadas en el paquete proporcionado. La única decisión sensible es mantener la repetición de belleza/appearance en español.
  spanish_consistency_notes:
  - Se usa «hermosa» en dos lugares para respetar la repetición descriptiva del original.
  - «Más joven» evita una paráfrasis interpretativa y conserva la comparación del texto.
  - El registro es sobrio y readable en español latinoamericano, sin arcaismos innecesarios.
