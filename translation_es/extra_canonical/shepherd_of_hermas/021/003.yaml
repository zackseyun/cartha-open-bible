  yaml_path: translation/extra_canonical/shepherd_of_hermas/021/003.yaml
  text: And because you saw her sitting on a bench, the position is firm; because the bench has four feet and stands firmly. For indeed the world is held together by four elements.
translation:
  language: es
  text: Y porque la viste sentada sobre un banco, la posición es firme; porque el banco tiene cuatro patas y se mantiene firmemente. Pues el mundo, en efecto, está sostenido por cuatro elementos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καθέδρα / bench
  english_pob_choice: bench
  chosen_spanish: banco
  alternatives_spanish:
  - asiento
  - banqueta
  lexicon: —
  rationale: «Banco» reproduce el objeto de forma natural en español y conserva la imagen de un apoyo sencillo y estable. «Asiento» es más general; «banqueta» puede sonar regional o demasiado concreto.
- source_word: σταθερά / firmly standing
  english_pob_choice: stands firmly
  chosen_spanish: se mantiene firmemente
  alternatives_spanish:
  - permanece firme
  - está sólidamente erguido
  lexicon: —
  rationale: La idea central es la estabilidad, no el acto de ponerse de pie. «Se mantiene firmemente» expresa la firmeza del soporte de manera clara y idiomática.
- source_word: στοιχεῖα / elements
  english_pob_choice: four elements
  chosen_spanish: cuatro elementos
  alternatives_spanish:
  - cuatro principios
  - cuatro componentes
  lexicon: —
  rationale: Se conserva el sentido cosmológico clásico de la frase. «Elementos» es el equivalente español natural y mantiene la tensión interpretativa del texto.
theological_decisions:
- issue: La afirmación cosmológica de que el mundo es sostenido por cuatro elementos
  english_pob_reading: For indeed the world is held together by four elements.
  chosen_spanish_reading: Pues el mundo, en efecto, está sostenido por cuatro elementos.
  alternative_spanish_readings:
  - porque el mundo está compuesto por cuatro elementos
  - pues el mundo se mantiene unido por cuatro elementos
  rationale: La traducción preserva el enunciado explicativo sin suavizar su afirmación cosmológica. «Está sostenido» mantiene la idea de soporte y cohesión que el contexto pide.
  doctrine_reference: Cosmología antigua del texto; no se introduce una doctrina bíblica normativa, sino la imagen argumentativa del pasaje.
translation_notes:
  revision_awareness: El inglés POB no introduce notas ni variantes; el español sigue de cerca su estructura argumentativa y conserva el paralelismo causal («porque... porque... pues...»), sin añadir explicaciones ajenas al texto.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y legible, adecuado para una obra patrística/apócrifa en español.
  - No se sustituye «elementos» por un lenguaje moderno de física, para no borrar la referencia histórica del pasaje.
