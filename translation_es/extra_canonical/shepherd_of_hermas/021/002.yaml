base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/021/002.yaml
  text: For just as when some good message comes to someone who is grieving, he immediately forgets his former sorrows and welcomes nothing else except the message that he heard, and from then on he is strengthened for what is good, and his spirit is renewed because of the joy that he received, so also you have received a renewal of your spirits by seeing these good things.
translation:
  language: es
  text: Pues así como, cuando a alguien afligido le llega una buena noticia, de inmediato olvida sus antiguas tristezas y no recibe nada más sino la noticia que oyó, y desde entonces queda fortalecido para lo bueno, y su espíritu es renovado a causa del gozo que recibió, así también ustedes han recibido una renovación de sus espíritus al ver estas cosas buenas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: good message
  english_pob_choice: good message
  chosen_spanish: buena noticia
  alternatives_spanish:
  - buen mensaje
  - noticia buena
  lexicon: λόγος / ἀγγελία (conceptual expression in context)
  rationale: En español, ‘buena noticia’ transmite de forma natural el valor de un anuncio beneficioso y conserva el matiz de mensaje recibido con alivio; ‘mensaje’ es posible, pero menos idiomático en este paralelismo.
- source_word: grieving
  english_pob_choice: grieving
  chosen_spanish: afligido
  alternatives_spanish:
  - entristecido
  - dolorido
  lexicon: λυπούμενος
  rationale: ‘Afligido’ reproduce el estado de pesar sin exagerar el componente emocional; mantiene un tono digno y amplio para el contexto.
- source_word: for what is good
  english_pob_choice: for what is good
  chosen_spanish: para lo bueno
  alternatives_spanish:
  - para el bien
  - para las cosas buenas
  lexicon: τὸ ἀγαθόν
  rationale: ‘Para lo bueno’ es breve y fiel al sustantivo abstracto griego; evita convertirlo innecesariamente en una frase más interpretativa.
- source_word: his spirit is renewed
  english_pob_choice: his spirit is renewed
  chosen_spanish: su espíritu es renovado
  alternatives_spanish:
  - su espíritu se renueva
  - su espíritu es reanimado
  lexicon: τὸ πνεῦμα αὐτοῦ ἀνανεοῦται
  rationale: Se conserva la pasiva con ‘es renovado’, que sigue de cerca la fuerza del original y mantiene la referencia a ‘espíritu’ sin reducirla a mero ánimo.
- source_word: renewal of your spirits
  english_pob_choice: a renewal of your spirits
  chosen_spanish: una renovación de sus espíritus
  alternatives_spanish:
  - un renovarse de sus espíritus
  - un nuevo vigor de sus espíritus
  lexicon: ἀνανέωσις τῶν πνευμάτων ὑμῶν
  rationale: ‘Renovación’ corresponde directamente al sustantivo abstracto y permite conservar la pluralidad de ‘sus espíritus’ tal como aparece en el texto recibido.
- source_word: seeing these good things
  english_pob_choice: by seeing these good things
  chosen_spanish: al ver estas cosas buenas
  alternatives_spanish:
  - al contemplar estas cosas buenas
  - por ver estas cosas buenas
  lexicon: βλέποντες ταῦτα τὰ καλά
  rationale: ‘Al ver’ expresa bien la circunstancia causal o concomitante del griego; ‘cosas buenas’ mantiene la referencia concreta sin añadir interpretaciones.
theological_decisions:
- issue: Espíritu singular/plural y fuerza antropológica
  english_pob_reading: The English POB preserves singular ‘his spirit’ and plural ‘your spirits’ without flattening the distinction.
  chosen_spanish_reading: su espíritu ... sus espíritus
  alternative_spanish_readings:
  - su ánimo ... sus ánimos
  - su espíritu ... vuestro espíritu
  rationale: Se conserva la distinción del texto entre el efecto interior del individuo y la pluralidad dirigida a los destinatarios, sin suavizarla a ‘ánimo’, que debilitaría la carga antropológica.
  doctrine_reference: Anthropology / pneumatology
- issue: La renovación vinculada al gozo recibido
  english_pob_reading: Renewal results from the joy received when the good message is heard.
  chosen_spanish_reading: renovado a causa del gozo que recibió
  alternative_spanish_readings:
  - renovado por el gozo que recibió
  - renovado debido al gozo recibido
  rationale: ‘A causa de’ preserva la relación de motivo/causa del original sin convertirla en una causalidad doctrinalmente más fuerte de lo necesario; sigue la audit trail del inglés.
  doctrine_reference: Inner renewal through glad tidings
translation_notes:
  revision_awareness: The English POB uses optimal-equivalence and has no footnotes here. I kept the sentence structure and causal sequence closely aligned with the source, with only minor Spanish smoothing (e.g., 'buena noticia' and 'al ver'). No documented revisions affected this unit.
  spanish_consistency_notes:
  - Uso de ‘Yahvé’ no aplica a esta unidad.
  - Se mantiene ‘espíritu’ para πνεῦμα según el contexto antropológico, sin introducir ‘Espíritu Santo’.
  - ‘Buena noticia’ evita el registro eclesiástico demasiado técnico y conserva el carácter de anuncio alentador.
  - La estructura repetitiva (‘de inmediato… y… y… así también…’) refleja el paralelismo del original y del inglés POB.
