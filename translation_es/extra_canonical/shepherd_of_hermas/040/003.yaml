base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/040/003.yaml
  text: 3. For he, being empty, answers empty men with empty things; for whatever he is asked, he answers according to the emptiness of the person. But he also speaks some true words; for the devil fills him with his own spirit, if perhaps he may be able to tear away some of the righteous.
translation:
  language: es
  text: 3. Porque él, estando vacío, responde a hombres vacíos con cosas vacías; pues cualquier cosa que se le pregunte, responde según el vacío de esa persona. Pero también dice algunas palabras verdaderas; porque el diablo lo llena de su propio espíritu, si acaso pudiera arrebatar a algunos de los justos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: empty / κενός
  english_pob_choice: empty
  chosen_spanish: vacío
  alternatives_spanish:
  - hueco
  - vacante
  lexicon: N/A
  rationale: «Vacío» conserva la repetición enfática del original y del inglés POB, y funciona tanto para la condición del hablante como para sus respuestas y palabras. «Hueco» suena más idiomático en algunos contextos, pero debilita la cadena lexical; «vacante» no encaja semánticamente.
- source_word: answers empty men with empty things
  english_pob_choice: answers empty men with empty things
  chosen_spanish: responde a hombres vacíos con cosas vacías
  alternatives_spanish:
  - responde a gente vacía con cosas vacías
  - responde a los vacíos con vaciedades
  lexicon: N/A
  rationale: Se mantiene la estructura repetida de «vacío» para reflejar el paralelismo del griego y del inglés POB. «Hombres» traduce el sujeto genérico del original; «gente» suaviza el tono pero borra la forma masculina genérica del texto fuente.
- source_word: according to the emptiness of the person
  english_pob_choice: according to the emptiness of the person
  chosen_spanish: conforme al vacío de la persona
  alternatives_spanish:
  - según el vacío de la persona
  - de acuerdo con la vacuidad de la persona
  lexicon: N/A
  rationale: «Conforme a» refleja bien la idea de correspondencia normativa o proporcional. «Persona» evita introducir una lectura excesivamente genérica como «él» y respeta el sustantivo del inglés POB. «Vacuidad» es posible, pero más abstracta y menos transparente en español bíblico contemporáneo.
- source_word: speaks some true words
  english_pob_choice: speaks some true words
  chosen_spanish: también dice algunas palabras verdaderas
  alternatives_spanish:
  - también pronuncia algunas palabras verdaderas
  - también habla algunas palabras verdaderas
  lexicon: N/A
  rationale: «Dice» es natural y suficientemente fiel al verbo amplio del original. «Palabras verdaderas» conserva la tensión de que no todo lo que dice es falso; «pronuncia» sería demasiado formal y «habla» menos preciso con el complemento directo.
- source_word: the devil fills him with his own spirit
  english_pob_choice: the devil fills him with his own spirit
  chosen_spanish: el diablo lo llena con su propio espíritu
  alternatives_spanish:
  - el diablo lo llena de su propio espíritu
  - el diablo lo llena con el espíritu que es suyo
  lexicon: N/A
  rationale: Se conserva «su propio espíritu» para mantener la ambigüedad referencial y la fuerza del vínculo posesivo. «Con» refleja el inglés POB; «de» sería idiomático, pero desplaza ligeramente la imagen instrumental/de contenido.
- source_word: if perhaps he may be able to tear away some of the righteous
  english_pob_choice: if perhaps he may be able to tear away some of the righteous
  chosen_spanish: si acaso pudiera arrebatar a algunos de los justos
  alternatives_spanish:
  - por si acaso pudiera apartar a algunos de los justos
  - si tal vez lograra arrancar a algunos de los justos
  lexicon: N/A
  rationale: «Arrebatar» reproduce bien la violencia figurada de «tear away» y el sentido de separar con fuerza. «Algunos de los justos» sigue de cerca el original; «apartar» sería menos intenso y «arrancar» puede sonar demasiado literal/agrícola.
theological_decisions:
- issue: La acción del diablo y su capacidad de influir sin suprimir la verdad parcial
  english_pob_reading: the devil fills him with his own spirit, if perhaps he may be able to tear away some of the righteous
  chosen_spanish_reading: el diablo lo llena con su propio espíritu, si acaso pudiera arrebatar a algunos de los justos
  alternative_spanish_readings:
  - el diablo lo llena de su propio espíritu, para ver si puede apartar a algunos de los justos
  - el diablo lo llena con su espíritu propio, con tal de arrebatar a algunos de los justos
  rationale: La frase conserva la atribución directa de influencia demoníaca y la finalidad tentativa expresada en el original. No se suaviza la posibilidad con una interpretación más psicológica, porque el texto presenta una acción espiritual real y una intención depredadora sobre los justos.
  doctrine_reference: Spiritual conflict / demonology in patristic moral teaching
translation_notes:
  revision_awareness: No applied revisions are recorded in the source packet. The Spanish draft therefore follows the normalized Greek source as mediated by the English POB audit context, preserving the repeated lexical pattern around κενός / empty and the tentative force of εἰ δὲ μήπως / if perhaps.
  spanish_consistency_notes:
  - Se conserva la repetición de «vacío» para mantener la cohesión léxica del pasaje.
  - Se evita reemplazar «justos» por términos más interpretativos como «creyentes», ya que el texto fuente usa una designación moral directa.
  - El registro es sobrio y público, sin aumentar la explicación implícita del demonio o de la verdad parcial más allá de lo que el texto dice.
