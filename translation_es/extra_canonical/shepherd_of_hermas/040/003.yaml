revisions:
- from: 3. Porque él, estando vacío, responde a hombres vacíos con cosas vacías; pues cualquier cosa que se le pregunte, responde conforme al vacío de la persona. Pero también dice algunas palabras verdaderas; porque el diablo lo llena con su propio espíritu, si acaso pudiera arrebatar a algunos de los justos.
  to: 3. Porque él, estando vacío, responde a hombres vacíos con cosas vacías; pues cualquier cosa que se le pregunte, responde según el vacío de esa persona. Pero también dice algunas palabras verdaderas; porque el diablo lo llena de su propio espíritu, si acaso pudiera arrebatar a algunos de los justos.
  rationale: 'Se hacen dos reparaciones menores: una de idiomaticidad (‘llena de’ en vez de ‘llena con’) y otra de fluidez sintáctica (‘según el vacío de esa persona’). No se alteran las decisiones centrales de significado ni la repetición léxica de ‘vacío’.'
