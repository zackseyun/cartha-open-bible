review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido global del griego y del inglés POB: mantiene la triple repetición de κενός/‘empty’, la observación de que el falso hablante a veces dice verdad, y la finalidad tentativa de la acción diabólica. Sin embargo, ‘lo llena con su propio espíritu’ suena menos natural en español que ‘lo llena de su propio espíritu’ y no mejora la fidelidad al sentido. Además, ‘conforme al vacío de la persona’ es comprensible pero algo tieso; ‘según el vacío de esa persona’ fluye mejor sin perder la correspondencia semántica.'
  spanish_quality_summary: 'El español es claro y mayormente digno, pero tiene dos puntos de mejora estilístico-semántica: 1) ‘cosas vacías’ funciona, aunque ‘vaciedades’ sería posible; no hace falta cambiarlo. 2) ‘lo llena con su propio espíritu’ es un calco poco idiomático; ‘de su propio espíritu’ es la construcción española natural para ‘fill with’. También conviene ajustar levemente ‘conforme al vacío de la persona’ a una formulación más natural.'
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. ‘espíritu’ está bien en minúscula por contexto demoníaco/no-Holy Spirit. ‘justos’ refleja adecuadamente ‘the righteous’. No intervienen Yahvé/Mesías/Cristo ni otros términos controlados.
  issues:
  - severity: medium
    issue: Construcción poco idiomática en ‘el diablo lo llena con su propio espíritu’
    rationale: En español natural, ‘llenar de’ expresa mejor el contenido con que alguien/algo es llenado. ‘Con’ aquí suena calcado del inglés y resta legibilidad sin ganar precisión.
  - severity: low
    issue: ‘conforme al vacío de la persona’ suena algo rígido
    rationale: La frase comunica el sentido, pero ‘según el vacío de esa persona’ o similar resulta más natural en español corriente y mantiene la proporcionalidad expresada en el original.
  revised_spanish_text: 3. Porque él, estando vacío, responde a hombres vacíos con cosas vacías; pues cualquier cosa que se le pregunte, responde según el vacío de esa persona. Pero también dice algunas palabras verdaderas; porque el diablo lo llena de su propio espíritu, si acaso pudiera arrebatar a algunos de los justos.
  revision_rationale: 'Se hacen dos reparaciones menores: una de idiomaticidad (‘llena de’ en vez de ‘llena con’) y otra de fluidez sintáctica (‘según el vacío de esa persona’). No se alteran las decisiones centrales de significado ni la repetición léxica de ‘vacío’.'
