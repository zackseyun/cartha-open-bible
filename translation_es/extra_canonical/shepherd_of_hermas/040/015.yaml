  yaml_path: translation/extra_canonical/shepherd_of_hermas/040/015.yaml
  text: 19. “How,” I say, “sir, can these things be? For you have said both these things are impossible.” “As these, then, are impossible, so also the spirits that are earthly are impossible and inert.
translation:
  language: es
  text: 19. «¿Cómo, pues —digo yo—, señor, pueden ser posibles estas cosas? Porque has dicho que las dos cosas son imposibles». «Así como estas cosas son imposibles, así también los espíritus terrenales son imposibles e inertes».
  philosophy: formal
lexical_decisions:
- source_word: How ... can these things be?
  english_pob_choice: How ... can these things be?
  chosen_spanish: ¿Cómo ... pueden ser estas cosas?
  alternatives_spanish:
  - ¿Cómo ... puede ser esto?
  - ¿De qué manera ... pueden suceder estas cosas?
  lexicon: interrogative
  rationale: Mantiene la pregunta retórica y el plural de «these things» sin suavizarlo a una paráfrasis más explicativa.
- source_word: sir
  english_pob_choice: sir
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - maestro
  lexicon: vocative
  rationale: «Señor» conserva un tratamiento respetuoso y natural en español, correspondiente al tono del diálogo.
- source_word: impossible
  english_pob_choice: impossible
  chosen_spanish: imposibles
  alternatives_spanish:
  - incapaces
  - inviables
  lexicon: adjective
  rationale: «Imposibles» reproduce con claridad la imposibilidad afirmada en el texto sin desplazarla a una mera dificultad.
- source_word: spirits that are earthly
  english_pob_choice: spirits that are earthly
  chosen_spanish: los espíritus terrenales
  alternatives_spanish:
  - los espíritus de la tierra
  - los espíritus mundanos
  lexicon: spirit
  rationale: «Terrenales» conserva la relación con la esfera de la tierra en contraste con lo espiritual elevado; «mundanos» introduciría una connotación moral más interpretativa que el griego no exige aquí.
- source_word: inert
  english_pob_choice: inert
  chosen_spanish: inactivos
  alternatives_spanish:
  - inerte
  - sin fuerza
  lexicon: adjective
  rationale: Se elige «inactivos» para expresar falta de eficacia o operatividad; en español «inerte» también sería posible, pero suena más físico y menos verbal en este contexto.
theological_decisions:
- issue: Characterización de los «espíritus terrenales»
  english_pob_reading: earthly spirits are impossible and inert
  chosen_spanish_reading: los espíritus terrenales son imposibles e inactivos
  alternative_spanish_readings:
  - los espíritus terrenales son incapaces y sin fuerza
  - los espíritus de la tierra son imposibles e inertes
  rationale: La versión conserva la afirmación fuerte de incapacidad e ineficacia atribuida a estos espíritus, sin diluirla en una descripción meramente psicológica o metafórica.
  doctrine_reference: Antropología/angelología implícita en Hermas; no se formula como doctrina bíblica normativa, sino como afirmación del texto fuente.
translation_notes:
  revision_awareness: No se registran revisiones previas aplicadas en este pasaje; la traducción se alinea directamente con el texto griego normalizado y la lectura inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene el tratamiento dialogal con comillas angulares y puntuación española.
  - «imposibles» se conserva como predicado repetido para reflejar la paralelización del original.
  - No se introduce terminología eclesiástica ajena al pasaje.
