review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB inglés: la pregunta sobre cómo distinguir entre profeta y falso profeta, la instrucción de escuchar el criterio, y el mandato de probar al hombre que tiene el espíritu divino por su vida. Sin embargo, una formulación suena menos natural en español y puede oscurecer el valor instrumental/final de la última cláusula.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «de la manera en que estoy a punto de decirte, así pondrás a prueba» suena algo calcada, y «Examina al hombre... por su vida» resulta poco idiomática en español actual. «Pon a prueba... por su conducta» comunica mejor el criterio ético observable sin alejarse del original.
  glossary_alignment: 'La terminología clave está bien alineada: «profeta», «falso profeta» y «espíritu divino» preservan el sentido fuente y la decisión inglesa. No hay conflictos con los términos troncales del proyecto. La sustitución de «vida» por «conducta» en la cláusula final se justifica por legibilidad española y por el valor práctico de βίος en este contexto.'
  issues:
  - severity: medium
    issue: «Examina al hombre que tiene el espíritu divino por su vida» suena poco natural en español.
    rationale: Aunque «vida» refleja βίος de forma literal, en español «examinar/probar a alguien por su vida» es torpe. El contexto exige evaluar la vida observable, por lo que «por su conducta» o «por su manera de vivir» expresa mejor el criterio sin perder el sentido.
  - severity: low
    issue: «de la manera en que estoy a punto de decirte, así pondrás a prueba» está algo calcado.
    rationale: No es incorrecto, pero una redacción más fluida como «del modo que estoy por decirte» o «de la manera que voy a decirte» mejora la naturalidad manteniendo la estructura exhortativa del original.
  revised_spanish_text: 7. «¿Cómo, entonces —digo—, señor, sabrá una persona cuál de ellos es profeta y cuál es falso profeta?» «Escucha —dice— acerca de ambos profetas; y, del modo que estoy por decirte, así pondrás a prueba al profeta y al falso profeta. Pon a prueba al hombre que tiene el espíritu divino por su conducta.»
  revision_rationale: 'Se hace una reparación menor de estilo y claridad: se suaviza una construcción calcada y se cambia «por su vida» por «por su conducta» para expresar de manera idiomática en español el criterio ético visible implícito en βίος dentro de este mandato de discernimiento. No se requieren notas adicionales.'
