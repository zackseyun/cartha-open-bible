  text: 7. “How then,” I say, “sir, will a person know which of them is a prophet and which is a false prophet?” “Listen,” he says, “about both prophets; and in the way I am about to tell you, so you shall test the prophet and the false prophet. Test the man who has the divine spirit by his life.
translation:
  language: es
  text: 7. «¿Cómo, entonces —digo—, señor, sabrá una persona cuál de ellos es profeta y cuál es falso profeta?» «Escucha —dice— acerca de ambos profetas; y, del modo que estoy por decirte, así pondrás a prueba al profeta y al falso profeta. Pon a prueba al hombre que tiene el espíritu divino por su conducta.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προφήτης
  english_pob_choice: prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - vidente
  - mensajero profético
  lexicon: profeta
  rationale: El griego usa el término técnico estándar para un portavoz inspirado; «profeta» es el equivalente natural y transparente en español e identifica correctamente la función sin añadir matices ajenos.
- source_word: ψευδοπροφήτης
  english_pob_choice: false prophet
  chosen_spanish: falso profeta
  alternatives_spanish:
  - profeta falso
  - falso vidente
  lexicon: falso profeta
  rationale: La secuencia adjetival «falso profeta» conserva el contraste directo del original y la forma más idiomática en español para este tipo de etiqueta religiosa.
- source_word: πνεῦμα θεῖον
  english_pob_choice: the divine spirit
  chosen_spanish: el espíritu divino
  alternatives_spanish:
  - el Espíritu divino
  - el espíritu de Dios
  lexicon: espíritu
  rationale: Mantengo «espíritu divino» porque el texto no desarrolla aquí explícitamente el Espíritu Santo como título; el adjetivo conserva la cualidad del espíritu sin cerrar indebidamente la referencia.
- source_word: βίος
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - conducta
  - modo de vida
  lexicon: vida
  rationale: El mandato de discernimiento se formula por la vida observable de la persona; «vida» sigue de cerca el sustantivo griego y permite la evaluación ética requerida por el contexto.
- source_word: δοκιμάζω
  english_pob_choice: test
  chosen_spanish: poner a prueba / examina
  alternatives_spanish:
  - probar
  - examinar
  lexicon: probar
  rationale: El verbo pide un discernimiento activo. En español se alterna «poner a prueba» y «examina» para evitar repetición y preservar la fuerza evaluativa del original.
theological_decisions:
- issue: Criterio para discernir al profeta verdadero y al falso profeta
  english_pob_reading: Test the man who has the divine spirit by his life.
  chosen_spanish_reading: Examina al hombre que tiene el espíritu divino por su vida.
  alternative_spanish_readings:
  - Pon a prueba al hombre que tiene el espíritu divino por su conducta.
  - Prueba al hombre que tiene el espíritu divino por su manera de vivir.
  rationale: 'Sigo el criterio ético del pasaje: el discernimiento no depende solo de afirmaciones espirituales, sino de la vida visible de la persona. Mantener «por su vida» conserva la brevedad y la tensión del texto fuente.'
  doctrine_reference: Discernimiento de profecía por el fruto visible y la conducta
- issue: Referencia de «espíritu divino»
  english_pob_reading: the divine spirit
  chosen_spanish_reading: el espíritu divino
  alternative_spanish_readings:
  - el Espíritu divino
  - el espíritu de Dios
  rationale: No convierto automáticamente la expresión en una designación técnica del Espíritu Santo, porque el pasaje sólo dice «espíritu divino». Dejo la ambigüedad histórica y lexical abierta.
  doctrine_reference: Distinción entre cualidad divina del espíritu y el nombre propio del Espíritu Santo
translation_notes:
  revision_awareness: 'Ajusté la redacción para corregir el problema de validación anterior: no incluyo notas al pie no ancladas. También reforcé la naturalidad española con guion y puntuación de diálogo, sin alterar el contenido del audit trail.'
  spanish_consistency_notes:
  - Uso «falso profeta» de manera uniforme para ψευδοπροφήτης.
  - Mantengo «espíritu divino» en minúscula para no imponer una identificación doctrinal que el texto no explicita.
  - Conservo el tono de diálogo directo con «señor» y «escucha», acorde al registro del pasaje.
