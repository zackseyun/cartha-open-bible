base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/040/004.yaml
  text: 4. Therefore, as many as are strong in the faith of the Lord, having put on the truth, do not cling to such spirits, but keep away from them. But those who are double‑minded and often repent practice divination like the nations and bring a greater sin upon themselves by practicing idolatry; for the one who consults a false prophet about any matter is an idolater, empty of the truth and foolish.
translation:
  language: es
  text: 4. Por tanto, todos los que son fuertes en la fe del Señor, habiéndose revestido de la verdad, no se apeguen a tales espíritus, sino aléjense de ellos. Pero los que son de doble ánimo y se arrepienten con frecuencia practican la adivinación como las naciones y se atraen sobre sí un pecado mayor al practicar la idolatría; porque el que consulta a un falso profeta sobre cualquier asunto es un idólatra, vacío de la verdad e insensato.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δυνατοί / strong
  english_pob_choice: strong
  chosen_spanish: fuertes
  alternatives_spanish:
  - poderosos
  - firmes
  lexicon: strong
  rationale: «Fuertes» conserva la idea de capacidad espiritual y mantiene el paralelismo natural en español con «en la fe del Señor». «Firmes» sería posible, pero desplaza el matiz de fuerza que el inglés POB retuvo.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: faith
  rationale: En este contexto, «fe» es la equivalencia natural y clara para el contenido religioso de la frase, sin añadir un matiz que el texto no exige.
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - realidad
  - verdad plena
  lexicon: truth
  rationale: «Verdad» reproduce de manera directa el valor doctrinal y moral del término, y además permite conservar la imagen de «haber vestido la verdad».
- source_word: περιβεβλημένοι
  english_pob_choice: having put on
  chosen_spanish: habiendo vestido
  alternatives_spanish:
  - habiéndose revestido de
  - habiendo puesto sobre sí
  lexicon: put on
  rationale: «Habiendo vestido» mantiene la metáfora de revestirse sin volverla pesada; «revestido» también sería posible, pero aquí la forma verbal enlaza bien con el paralelo ético del pasaje.
- source_word: πνεύματα
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - influencias espirituales
  - seres espirituales
  lexicon: spirits
  rationale: «Espíritus» conserva el referente espiritual directo del original y no fuerza una explicación interpretativa que el texto no desarrolla.
- source_word: δίψυχοι
  english_pob_choice: double-minded
  chosen_spanish: de doble ánimo
  alternatives_spanish:
  - indecisos
  - inconstantes
  lexicon: double-minded
  rationale: «De doble ánimo» es la opción tradicional y transparente en español para una mente dividida o vacilante, y preserva el énfasis moral del término.
- source_word: μετανοοῦντες συχνά
  english_pob_choice: often repent
  chosen_spanish: se arrepienten con frecuencia
  alternatives_spanish:
  - se arrepienten a menudo
  - cambian de mente con frecuencia
  lexicon: repent
  rationale: El inglés POB eligió «repent», y en español el sentido moral y religioso queda mejor con «se arrepienten» que con una traducción más cognitiva como «cambian de mente».
- source_word: μαντεύονται
  english_pob_choice: practice divination
  chosen_spanish: practican la adivinación
  alternatives_spanish:
  - adivinan
  - se dedican a la adivinación
  lexicon: divination
  rationale: «Practican la adivinación» expresa con claridad la actividad condenada y evita una ambigüedad moderna de «adivinan», que podría sonar a simple conjetura.
- source_word: ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: nations
  rationale: Se conserva «las naciones» porque el inglés POB la mantiene y el término puede aludir al mundo no perteneciente al pueblo de Dios sin introducir una glosa interpretativa.
- source_word: εἰδωλολατρία
  english_pob_choice: idolatry
  chosen_spanish: idolatría
  alternatives_spanish:
  - culto a los ídolos
  - idolatría pagana
  lexicon: idolatry
  rationale: «Idolatría» es la equivalencia directa y estándar, y mantiene el juicio teológico del pasaje sin amplificación.
- source_word: ψευδοπροφήτης
  english_pob_choice: false prophet
  chosen_spanish: falso profeta
  alternatives_spanish:
  - profeta falso
  - pseudo-profeta
  lexicon: false prophet
  rationale: «Falso profeta» es la forma natural y bíblicamente reconocible en español, fiel al valor polémico del término.
- source_word: κενός τῆς ἀληθείας
  english_pob_choice: empty of the truth
  chosen_spanish: vacío de la verdad
  alternatives_spanish:
  - vacío de verdad
  - sin la verdad
  lexicon: empty of the truth
  rationale: «Vacío de la verdad» conserva la dureza evaluativa del original y el eco del inglés POB, manteniendo la frase casi literal pero natural en español.
- source_word: ἄφρων
  english_pob_choice: foolish
  chosen_spanish: insensato
  alternatives_spanish:
  - necio
  - falto de juicio
  lexicon: foolish
  rationale: «Insensato» comunica con claridad la falta de juicio moral e intelectual sin sonar excesivamente coloquial.
theological_decisions:
- issue: Relación entre «la fe del Señor» y la fortaleza espiritual
  english_pob_reading: as many as are strong in the faith of the Lord
  chosen_spanish_reading: todos los que son fuertes en la fe del Señor
  alternative_spanish_readings:
  - los que son firmes en la fe del Señor
  - los que tienen una fe fuerte en el Señor
  rationale: Conservo la estructura del inglés POB y la referencia explícita al Señor como ámbito de la fe. «Fuertes» mantiene la afirmación de capacidad espiritual sin suavizarla.
  doctrine_reference: Perseverancia y madurez espiritual en la comunidad creyente.
- issue: «Vestir la verdad» como metáfora ética
  english_pob_reading: having put on the truth
  chosen_spanish_reading: habiendo vestido la verdad
  alternative_spanish_readings:
  - habiéndose revestido de la verdad
  - habiendo puesto la verdad sobre sí
  rationale: La metáfora de revestimiento se mantiene sin explicarla en exceso, porque el texto la usa como rasgo de identidad moral frente a los espíritus engañosos.
  doctrine_reference: Ética de la verdad frente al engaño y la seducción espiritual.
- issue: Condena de la adivinación y la idolatría
  english_pob_reading: practice divination like the nations and bring a greater sin upon themselves by practicing idolatry
  chosen_spanish_reading: practican la adivinación como las naciones y se atraen sobre sí un pecado mayor al practicar la idolatría
  alternative_spanish_readings:
  - se dedican a la adivinación como las naciones y cargan sobre sí un pecado mayor por la idolatría
  - practican adivinación entre las naciones y se hacen culpables de un pecado mayor por idolatría
  rationale: 'Mantengo la progresión causal del inglés POB: adivinación, semejanza con las naciones y agravamiento del pecado por idolatría. No se atenúa la fuerza moral del juicio.'
  doctrine_reference: Rechazo de prácticas ocultistas e idolátricas.
- issue: Consulta al falso profeta como acto idolátrico
  english_pob_reading: the one who consults a false prophet about any matter is an idolater
  chosen_spanish_reading: el que consulta a un falso profeta sobre cualquier asunto es un idólatra
  alternative_spanish_readings:
  - el que pregunta a un falso profeta sobre cualquier asunto es un idólatra
  - quien acude a un falso profeta por cualquier asunto es idólatra
  rationale: 'La formulación directa conserva la identificación teológica del acto: consultar a un falso profeta no es neutral, sino idolatría.'
  doctrine_reference: Fidelidad exclusiva a Dios frente a mediaciones proféticas falsas.
translation_notes:
  revision_awareness: This draft follows the supplied English POB text for Shepherd of Hermas 40:4 with no listed applied revisions and no existing English footnotes. Because the source packet provides only normalized OCR Greek plus the audited English POB rendering, the Spanish aims to mirror the established English lexical decisions while remaining accountable to the Greek source. No textual variants were introduced beyond necessary Spanish naturalness.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, but aquí el pasaje usa «el Señor» en la frase fija de la fe; no se introduce una máscara del nombre divino porque el source packet no requiere resolver una cita explícita del tetragrámaton.
  - Se preserva «falso profeta», «idolatría» y «adivinación» como términos estables del registro bíblico.
  - Se usa «de doble ánimo» por ser una locución española clara y tradicional sin perder el sentido de división interior.
  - No se añaden notas a pie porque el inglés POB no presentó notas y no emergió una variante textual necesaria en esta sección.
