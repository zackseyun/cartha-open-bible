review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego según la auditoría inglesa: contrasta a los fuertes en la fe con los de doble ánimo, mantiene la prohibición de adherirse a tales espíritus, conserva la condena de la adivinación y de consultar a un falso profeta como idolatría, y refleja bien el cierre evaluativo (''vacío de la verdad e insensato'').'
  spanish_quality_summary: El español es claro y fiel, pero hay dos puntos mejorables para naturalidad y precisión. 'Habiendo vestido la verdad' suena menos idiomático que 'habiéndose revestido de la verdad'. Además, en este contexto exhortativo tras 'todos los que son fuertes...', el imperativo negativo y positivo en subjuntivo ('no se apeguen... aléjense') resulta algo menos natural que una formulación descriptiva coordinada con el participio, o bien una exhortación explícita; la mejor reparación mínima es mantener la exhortación pero mejorar el giro de revestimiento.
  glossary_alignment: 'La terminología principal está alineada con el proyecto: ''Señor'', ''fe'', ''verdad'', ''espíritus'', ''de doble ánimo'', ''adivinación'', ''naciones'', ''idolatría'', ''falso profeta'', ''idólatra''. No hay términos del glosario mayor (Yahvé, Mesías, esclavo, etc.) implicados aquí. La única mejora léxica recomendada es ''habiéndose revestido de la verdad'' por fidelidad metafórica y mejor español.'
  issues:
  - severity: medium
    issue: '''habiendo vestido la verdad'' es poco idiomático en español'
    rationale: Aunque comprensible, el giro no suena natural en registro bíblico moderno. El original/metáfora de 'ponerse' o 'revestirse' se expresa mejor con 'habiéndose revestido de la verdad', que preserva la imagen sin dureza innecesaria.
  - severity: low
    issue: La secuencia 'todos los que son fuertes..., habiendo..., no se apeguen..., sino aléjense...' mezcla descripción con exhortación de forma algo tensa
    rationale: No impide la comprensión y sigue el inglés, por lo que no requiere reestructuración mayor. Pero conviene al menos suavizar el segmento participial para que el período fluya mejor.
  revised_spanish_text: 4. Por tanto, todos los que son fuertes en la fe del Señor, habiéndose revestido de la verdad, no se apeguen a tales espíritus, sino aléjense de ellos. Pero los que son de doble ánimo y se arrepienten con frecuencia practican la adivinación como las naciones y se atraen sobre sí un pecado mayor al practicar la idolatría; porque el que consulta a un falso profeta sobre cualquier asunto es un idólatra, vacío de la verdad e insensato.
  revision_rationale: 'Se hace una reparación mínima para mejorar la naturalidad y fidelidad metafórica en español: ''habiéndose revestido de la verdad'' expresa mejor el valor de περιβεβλημένοι / ''having put on'' que ''habiendo vestido la verdad''. El resto del texto puede mantenerse porque conserva bien el sentido fuente y la lógica teológica del pasaje.'
