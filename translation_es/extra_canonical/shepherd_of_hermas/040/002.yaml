base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/040/002.yaml
  text: 2. These, then, the double‑minded, come to him as to a magician and ask him what will happen to them; and that false prophet, having in himself no power of a divine spirit, speaks with them according to their questions [and according to the desires of their wickedness], and fills their souls as they desire.
translation:
  language: es
  text: 2. Estos, pues, los de doble ánimo, vienen a él como a un mago y le preguntan qué les sucederá; y aquel falso profeta, al no tener en sí poder de un espíritu divino, les habla conforme a sus preguntas [y conforme a los deseos de su maldad], y llena sus almas como ellos desean.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διψυχοι / double-minded
  english_pob_choice: the double-minded
  chosen_spanish: los de doble ánimo
  alternatives_spanish:
  - los indecisos
  - los de mente dividida
  lexicon: No lexicon number supplied in source packet
  rationale: «Doble ánimo» preserva la imagen de división interior que el inglés POB ya fijó, y es natural en español bíblico sin diluir la fuerza moral del término.
- source_word: μάγον
  english_pob_choice: a magician
  chosen_spanish: a un mago
  alternatives_spanish:
  - a un hechicero
  - a un encantador
  lexicon: No lexicon number supplied in source packet
  rationale: «Mago» mantiene el paralelo con el inglés POB y en español puede denotar un practicante de artes ocultas; no se suaviza a un término más genérico.
- source_word: ψεύδοπροφήτης
  english_pob_choice: that false prophet
  chosen_spanish: aquel falso profeta
  alternatives_spanish:
  - ese falso profeta
  - el falso profeta
  lexicon: No lexicon number supplied in source packet
  rationale: «Aquel» conserva la referencia despectiva/distanciada del pasaje y refleja bien el demostrativo del griego sin volverlo anafórico neutro.
- source_word: πνεύματος θείου
  english_pob_choice: of a divine spirit
  chosen_spanish: de un espíritu divino
  alternatives_spanish:
  - del Espíritu divino
  - de un espíritu de Dios
  lexicon: No lexicon number supplied in source packet
  rationale: Se mantiene «espíritu divino» en minúsculas para no forzar una identificación con el Espíritu Santo; el contexto habla de carencia de poder espiritual, no de una confesión trinitaria explícita.
- source_word: κατὰ τὰς ἐρωτήσεις αὐτῶν
  english_pob_choice: according to their questions
  chosen_spanish: conforme a sus preguntas
  alternatives_spanish:
  - según sus preguntas
  - de acuerdo con sus preguntas
  lexicon: No lexicon number supplied in source packet
  rationale: «Conforme a» conserva el valor regulativo del griego y suena natural en español formal.
- source_word: κατὰ τὰς ἐπιθυμίας τῆς πονηρίας αὐτῶν
  english_pob_choice: according to the desires of their wickedness
  chosen_spanish: conforme a los deseos de su maldad
  alternatives_spanish:
  - según los deseos de su maldad
  - conforme a sus deseos perversos
  lexicon: No lexicon number supplied in source packet
  rationale: 'Se respeta la construcción genitiva y la tensión moral: no se reduce a «deseos perversos» porque el griego vincula los deseos con «su maldad».'
- source_word: πληροῖ τὰς ψυχὰς αὐτῶν
  english_pob_choice: fills their souls
  chosen_spanish: llena sus almas
  alternatives_spanish:
  - sacia sus almas
  - colma sus almas
  lexicon: No lexicon number supplied in source packet
  rationale: «Almas» reproduce el alcance antropológico del griego y coincide con el inglés POB; «llena» mantiene el verbo simple y directo del original.
theological_decisions:
- issue: 'Naturaleza del hablante: el falso profeta carece de poder de un espíritu divino'
  english_pob_reading: having in himself no power of a divine spirit
  chosen_spanish_reading: al no tener en sí poder de un espíritu divino
  alternative_spanish_readings:
  - no teniendo en sí poder de un espíritu divino
  - pues no tiene en sí poder de un espíritu divino
  rationale: Se conserva la afirmación de carencia espiritual sin añadir una explicación doctrinal posterior. La formulación evita identificar automáticamente al «espíritu divino» con una persona específica cuando el texto sólo marca ausencia de poder espiritual verdadero.
  doctrine_reference: Discernimiento de espíritus; falsos profetas
- issue: 'Respuesta del falso profeta: responde según preguntas y deseos malignos'
  english_pob_reading: speaks with them according to their questions [and according to the desires of their wickedness]
  chosen_spanish_reading: les habla conforme a sus preguntas [y conforme a los deseos de su maldad]
  alternative_spanish_readings:
  - les responde según sus preguntas [y según los deseos de su maldad]
  - les habla de acuerdo con sus preguntas [y con los deseos de su maldad]
  rationale: Se mantiene la relación entre demanda humana y respuesta engañosa. La frase entre corchetes se conserva como material alternativo/expansivo tal como lo hace el inglés POB, sin borrar la tensión textual.
  doctrine_reference: Engaño profético; juicio moral por el deseo
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente ni notas léxicas previas en el inglés POB para este segmento; por ello el borrador sigue de cerca el texto griego y la redacción auditada en inglés sin introducir variantes no sustentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto sólo cuando aparezca el nombre divino; en este segmento no ocurre.
  - Se usa «Mesías/Cristo» sólo por contexto cuando corresponda; aquí no aparece ninguna de las dos formas.
  - Se conserva «espíritu» en minúscula porque el contraste es con poder espiritual, no una mención inequívoca del Espíritu Santo.
  - La puntuación y el orden siguen una sintaxis española fluida sin perder los paralelismos del original.
