    issue: «Aquel falso profeta» podría haberse simplificado a «ese» o «el» en español contemporáneo.
    rationale: No obstante, «aquel» sigue siendo inteligible y transmite bien el matiz de distanciamiento del original, por lo que no requiere cambio.
