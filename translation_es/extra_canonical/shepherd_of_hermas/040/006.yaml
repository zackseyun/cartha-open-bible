  text: 6. But the spirit that is consulted and speaks according to the desires of men is earthly and light, having no power; and it does not speak at all unless it is consulted.
translation:
  language: es
  text: 6. Pero el espíritu que es consultado y habla conforme a los deseos de los hombres es terrenal y ligero, sin fuerza; y no habla en absoluto si no se le consulta.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: πνεῦμα
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el Espíritu
  - el viento
  lexicon: πνεῦμα
  rationale: Aquí se trata de un espíritu en general, no del Espíritu Santo ni del viento. Por eso se conserva el valor común y neutro ‘espíritu’.
- source_word: ἐρωτώμενον / consulted
  english_pob_choice: is consulted
  chosen_spanish: es consultado
  alternatives_spanish:
  - se le consulta
  - es preguntado
  lexicon: ἐρωτάω
  rationale: La idea es que este espíritu responde cuando es interrogado. ‘Es consultado’ mantiene la pasiva del original y la relación con la adivinación o consulta espiritual.
- source_word: καὶ λαλοῦν
  english_pob_choice: and speaks
  chosen_spanish: y habla
  alternatives_spanish:
  - y dice
  - y se expresa
  lexicon: λαλέω
  rationale: ‘Habla’ es una equivalencia natural y precisa para el acto de hablar del espíritu.
- source_word: κατὰ τὰς ἐπιθυμίας τῶν ἀνθρώπων
  english_pob_choice: according to the desires of men
  chosen_spanish: conforme a los deseos de los hombres
  alternatives_spanish:
  - según los deseos de los hombres
  - de acuerdo con los deseos humanos
  lexicon: ἐπιθυμία
  rationale: ‘Conforme a’ reproduce bien la idea normativa/de correspondencia del griego. ‘De los hombres’ conserva el genérico humano del original, como en la versión inglesa.
- source_word: ἐπίγειον καὶ κοῦφον
  english_pob_choice: earthly and light
  chosen_spanish: terrenal y ligero
  alternatives_spanish:
  - terrestre y ligero
  - mundano y liviano
  lexicon: ἐπίγειος; κοῦφος
  rationale: ‘Terrenal’ expresa con claridad la oposición a lo celestial. ‘Ligero’ conserva la idea de falta de peso/solidez; ‘liviano’ es posible, pero ‘ligero’ suena más sobrio en este registro.
- source_word: ἀδύνατον
  english_pob_choice: having no power
  chosen_spanish: sin poder
  alternatives_spanish:
  - sin fuerza
  - incapaz
  lexicon: ἀδύνατος
  rationale: La frase inglesa indica carencia de poder/capacidad. ‘Sin poder’ es breve y fiel; ‘sin fuerza’ puede sonar más físico, e ‘incapaz’ cambia el foco hacia agencia personal.
- source_word: οὐδὲν ἐὰν μὴ ἐρωτηθῇ
  english_pob_choice: and it does not speak at all unless it is consulted
  chosen_spanish: y no habla en absoluto si no se le consulta
  alternatives_spanish:
  - y no habla nada a menos que se le consulte
  - y no habla en absoluto, salvo que se le consulte
  lexicon: οὐδέν; ἐάν μή; ἐρωτάω
  rationale: La construcción condicional negativa se vuelve de manera natural en español con ‘si no se le consulta’. ‘En absoluto’ refuerza la negación total como en el inglés POB.
theological_decisions:
- issue: Naturaleza del ‘espíritu’ descrito
  english_pob_reading: A consultable spirit that responds to human desires is earthly, light, and powerless.
  chosen_spanish_reading: Un espíritu de consulta, vinculado a deseos humanos, no es presentado como divino sino como terrenal e impotente.
  alternative_spanish_readings:
  - Un espíritu consultado en prácticas adivinatorias
  - Un espíritu cualquiera que responde cuando se le pregunta
  rationale: El contexto del mandato contrasta espiritus auténticos con otros engañosos o de bajo rango. La traducción evita elevar indebidamente este espíritu y conserva su carácter inferior y dependiente.
  doctrine_reference: Discernimiento de espíritus; contraste entre lo divino y lo engañoso.
translation_notes:
  revision_awareness: 'No hay revisiones aplicadas en el paquete inglés. La versión española sigue de cerca la lectura auditada del inglés POB, pero vuelve al griego para conservar la secuencia de ideas: ser consultado, hablar según deseos humanos, ser terrenal y ligero, y carecer de poder.'
  spanish_consistency_notes:
  - Se mantiene ‘espíritu’ sin mayúscula porque el contexto no exige una referencia al Espíritu Santo.
  - Se conserva ‘terrenal’ como contraste con lo celestial, y ‘sin poder’ para reflejar la carencia de capacidad del espíritu.
  - La estructura con dos miembros unidos por punto y coma sigue el paralelismo del original y de la traducción inglesa.
