    reason: lexical_alternative
  revision_rationale: Se ajusta «callado» a «tranquilo» para reflejar mejor ἡσύχιος como disposición serena; se reemplaza «se hace menor que todos los hombres» por «se pone por debajo de todas las personas» para mejorar naturalidad, claridad y alcance inclusivo sin alterar el sentido de humildad; y se afina la nota [a] para expresar la ambigüedad contextual sin sobreinterpretarla.
