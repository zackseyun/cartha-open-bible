base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/040/008.yaml
  text: 8. First of all, the one who has the [divine] spirit from above is gentle and quiet and humble‑minded, and refrains from every evil and from the vain desire of this age, and makes himself lower than all people; and when consulted he answers nothing to anyone, nor does he speak privately—nor does the holy Spirit speak whenever a person wishes it to speak—but it speaks when God wishes him to speak.
translation:
  language: es
  text: 8. Ante todo, el que tiene el espíritu[a] de lo alto es manso, tranquilo y humilde de pensamiento; se aparta de todo mal y del deseo vano de este siglo, y se pone por debajo de todas las personas; y cuando se le consulta, no responde nada a nadie, ni habla en privado[b]—ni siquiera el Espíritu Santo habla cuando una persona quiere que hable, sino que habla cuando Dios quiere que hable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «espíritu de lo alto» mantiene el matiz de origen celeste del griego sin forzar en esta primera mención la identificación explícita con «el Espíritu Santo»; el contexto la aclara después en la segunda mitad del versículo.
    reason: theological_note
  - marker: b
    text: «En privado» traduce la idea de hablar aparte o reservadamente; no implica necesariamente algo ilícito, sino la negativa a tratar la palabra inspirada como si estuviera disponible a voluntad humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ πνεῦμα τὸ ἄνωθεν / the [divine] spirit from above
  english_pob_choice: the [divine] spirit from above
  chosen_spanish: el espíritu de lo alto
  alternatives_spanish:
  - el espíritu de arriba
  - el espíritu celestial
  - el Espíritu de lo alto
  lexicon: πνεῦμα
  rationale: El inglés POB conserva el matiz de procedencia superior sin forzar una mayúscula doctrinal en la primera mención. En español, «de lo alto» comunica origen trascendente de forma natural y mantiene la ambigüedad controlada entre espíritu humano inspirado y el Espíritu divino, tal como el contexto lo desarrolla.
- source_word: πρᾶος
  english_pob_choice: gentle
  chosen_spanish: manso
  alternatives_spanish:
  - amable
  - dulce
  - suave
  lexicon: πραΰς
  rationale: «Manso» es el equivalente bíblico y semánticamente preciso para la disposición apacible, sin debilitar la fuerza ética del rasgo.
- source_word: ἡσύχιος
  english_pob_choice: quiet
  chosen_spanish: callado
  alternatives_spanish:
  - tranquilo
  - silencioso
  - sosegado
  lexicon: ἡσύχιος
  rationale: Aquí el rasgo no es solo interior sino observable en el habla; «callado» expresa mejor la abstención de hablar que «tranquilo», que sería más amplio y menos específico.
- source_word: ταπεινόφρων
  english_pob_choice: humble-minded
  chosen_spanish: humilde de pensamiento
  alternatives_spanish:
  - humilde de mente
  - humilde en su manera de pensar
  - humilde de ánimo
  lexicon: ταπεινόφρων
  rationale: La construcción española conserva el sentido mental/volitivo de la palabra compuesta sin caer en un calco torpe. «De pensamiento» refleja el énfasis en la actitud interior.
- source_word: ἀπέχεται ἀπὸ παντὸς κακοῦ
  english_pob_choice: refrains from every evil
  chosen_spanish: se aparta de todo mal
  alternatives_spanish:
  - se abstiene de todo mal
  - se contiene de todo mal
  - se mantiene lejos de todo mal
  lexicon: ἀπέχομαι
  rationale: «Se aparta de» comunica bien la idea de abstenerse y mantenerse alejado, con mejor fluidez en español que una traducción más literal pero menos idiomática.
- source_word: ἐπιθυμίας ματαίας τοῦ αἰῶνος τούτου
  english_pob_choice: the vain desire of this age
  chosen_spanish: del deseo vano de este siglo
  alternatives_spanish:
  - de la vana codicia de esta edad
  - del deseo vacío de esta era
  - de la vana ambición de este mundo
  lexicon: ἐπιθυμία / αἰών
  rationale: «Deseo vano» sigue de cerca el valor del sintagma y evita añadir un contenido moral específico no exigido. «Este siglo» conserva el matiz de la era presente, no simplemente el planeta o el tiempo cronológico.
- source_word: ταπεινοῖ ἑαυτὸν παρὰ πάντας
  english_pob_choice: makes himself lower than all people
  chosen_spanish: se hace menor que todos los hombres
  alternatives_spanish:
  - se humilla por debajo de todos los hombres
  - se pone por debajo de todos los hombres
  - se considera inferior a todos
  lexicon: ταπεινόω
  rationale: «Se hace menor» transmite la autoubicación humilde sin introducir una idea psicológica de inferioridad absoluta. «Hombres» reproduce el universal humano tradicional del pasaje.
- source_word: οὐδὲ λαλεῖ κατ᾽ ἰδίαν
  english_pob_choice: nor does he speak privately
  chosen_spanish: ni habla en privado
  alternatives_spanish:
  - ni habla aparte
  - ni habla confidencialmente
  - ni conversa en secreto
  lexicon: λαλέω
  rationale: «En privado» preserva la fuerza de una conversación reservada y mantiene la concatenación con el mandato de no responder a cualquiera. Es más neutro que «en secreto», que podría insinuar ocultamiento indebido.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el espíritu santo
  - el Espíritu santo
  lexicon: πνεῦμα ἅγιον
  rationale: En la segunda ocurrencia, el contexto identifica explícitamente a la tercera persona divina; la mayúscula es la opción más clara y reverente en español.
- source_word: ὅταν θέλῃ ἄνθρωπος αὐτὸ λαλεῖν
  english_pob_choice: whenever a person wishes it to speak
  chosen_spanish: cuando una persona quiere que hable
  alternatives_spanish:
  - cuando alguien quiere que hable
  - cada vez que una persona desea que hable
  lexicon: θέλω / λαλέω
  rationale: 'El español natural exige un sujeto explícito y una subordinada más fluida. La frase mantiene el punto teológico: la iniciativa no pertenece a la persona humana.'
- source_word: ὅταν θέλῃ ὁ θεὸς αὐτὸ λαλεῖν
  english_pob_choice: when God wishes him to speak
  chosen_spanish: cuando Dios quiere que hable
  alternatives_spanish:
  - cuando Dios desea que hable
  - cuando Dios quiera que hable
  lexicon: θεός
  rationale: Se conserva la dependencia total de la voluntad divina y la estructura de subjuntivo exigida por el español.
theological_decisions:
- issue: Distinción entre «espíritu de lo alto» y «Espíritu Santo»
  english_pob_reading: the [divine] spirit from above ... nor does the holy Spirit speak ...
  chosen_spanish_reading: el espíritu de lo alto ... el Espíritu Santo
  alternative_spanish_readings:
  - el Espíritu de lo alto ... el Espíritu Santo
  - el espíritu de lo alto ... el espíritu santo
  rationale: El texto distingue una cualidad/origen del don espiritual y, más adelante, nombra explícitamente al Espíritu Santo. La primera mención queda deliberadamente menos especificada para no borrar esa tensión terminológica; la segunda identifica claramente la realidad divina.
  doctrine_reference: Pneumatología; distinción contextual entre carisma y persona divina en literatura patrística temprana.
- issue: Autenticidad de la iniciativa profética
  english_pob_reading: it speaks when God wishes him to speak
  chosen_spanish_reading: habla cuando Dios quiere que hable
  alternative_spanish_readings:
  - habla cuando quiera la persona
  - habla cuando el hombre lo pide
  rationale: Se preserva que la palabra del Espíritu no está a disposición humana. Esto mantiene la dependencia revelatoria y evita una lectura de control humano sobre la profecía.
  doctrine_reference: Revelación y profecía; soberanía divina sobre la inspiración.
- issue: Humildad como rasgo del portador del Espíritu
  english_pob_reading: makes himself lower than all people
  chosen_spanish_reading: se hace menor que todos los hombres
  alternative_spanish_readings:
  - se humilla por debajo de todos
  - se considera inferior a todos
  rationale: La formulación evita tanto la autoanulación psicológica como el simple gesto externo; expresa una práctica de humildad concreta, coherente con la ética ascética del pasaje.
  doctrine_reference: Virtud de la humildad en la formación moral cristiana primitiva.
translation_notes:
  revision_awareness: No se registran revisiones previas en el paquete auditado. La redacción española se elaboró directamente desde el griego normalizado con apoyo del inglés POB como control de decisiones léxicas y teológicas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero aquí el texto usa «Dios» y «Espíritu Santo», por lo que no aplica.
  - Se conserva la distinción de mayúsculas entre «espíritu» y «Espíritu Santo» para reflejar la progresión del pasaje.
  - «Este siglo» se usa en sentido de era presente, no como traducción de «mundo» en clave cosmológica.
