  to: 8. Ante todo, el que tiene el espíritu[a] de lo alto es manso, tranquilo y humilde de pensamiento; se aparta de todo mal y del deseo vano de este siglo, y se pone por debajo de todas las personas; y cuando se le consulta, no responde nada a nadie, ni habla en privado[b]—ni siquiera el Espíritu Santo habla cuando una persona quiere que hable, sino que habla cuando Dios quiere que hable.
  rationale: Se ajusta «callado» a «tranquilo» para reflejar mejor ἡσύχιος como disposición serena; se reemplaza «se hace menor que todos los hombres» por «se pone por debajo de todas las personas» para mejorar naturalidad, claridad y alcance inclusivo sin alterar el sentido de humildad; y se afina la nota [a] para expresar la ambigüedad contextual sin sobreinterpretarla.
