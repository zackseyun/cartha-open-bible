  text: 11. “Hear now,” he says, “about the spirit that is earthly and empty and has no power, but is foolish.
translation:
  language: es
  text: 11. «Escucha ahora —dice él— acerca del espíritu que es terrenal, vacío y sin poder, y es necio.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄκουε νῦν
  english_pob_choice: Hear now
  chosen_spanish: Escucha ahora
  alternatives_spanish:
  - Oye ahora
  - Escucha, pues, ahora
  lexicon: ἀκούω
  rationale: «Escucha ahora» conserva el imperativo de atención inmediata y suena natural en español actual, sin añadir un matiz exhortativo más fuerte que el del griego.
- source_word: ἐπίγειον
  english_pob_choice: earthly
  chosen_spanish: terrenal
  alternatives_spanish:
  - de la tierra
  - mundano
  lexicon: ἐπίγειος
  rationale: «Terrenal» comunica procedencia o cualidad de lo perteneciente a la tierra con un registro digno y breve, más preciso aquí que «mundano», que introduciría una valoración no explícita por sí sola.
- source_word: κενόν
  english_pob_choice: empty
  chosen_spanish: vano
  alternatives_spanish:
  - vacío
  - hueco
  lexicon: κενός
  rationale: «Vano» preserva la idea de vaciedad inútil o carente de contenido efectivo, que en español puede abarcar mejor el tono evaluativo del original que un simple «vacío».
- source_word: ἀδύνατον
  english_pob_choice: has no power
  chosen_spanish: sin poder
  alternatives_spanish:
  - impotente
  - sin fuerza
  lexicon: ἀδύνατος
  rationale: «Sin poder» reproduce de manera clara la negación de capacidad o eficacia. «Impotente» puede sonar más abrupto en español moderno y «sin fuerza» desplaza el matiz hacia lo físico.
- source_word: μωρόν
  english_pob_choice: foolish
  chosen_spanish: necio
  alternatives_spanish:
  - insensato
  - tonto
  lexicon: μωρός
  rationale: «Necio» mantiene el valor evaluativo fuerte y sobrio del adjetivo griego, con un registro más adecuado que «tonto», que se vuelve demasiado coloquial.
theological_decisions:
- issue: Caracterización negativa del espíritu mencionado
  english_pob_reading: earthly and empty and has no power, but is foolish
  chosen_spanish_reading: terrenal, vano y sin poder, sino necio
  alternative_spanish_readings:
  - terrenal, vacío y sin poder, sino necio
  - terrenal, vano, impotente y necio
  rationale: La secuencia conserva la acumulación de rasgos negativos sin suavizarla. Se mantiene la tensión entre falta de eficacia («sin poder») y juicio moral/inteligente («necio»), sin convertirla en una sola idea genérica.
  doctrine_reference: Descripción moral y espiritual del espíritu en el texto de Hermas; no implica terminología doctrinal cristológica o trinitaria
translation_notes:
  revision_awareness: No hay revisiones registradas en el paquete; la redacción sigue de cerca el griego disponible y el breve inglés auditado, manteniendo el orden de los rasgos descriptivos.
  spanish_consistency_notes:
  - Se usa «espíritu» en minúscula porque el contexto no exige una referencia al Espíritu Santo.
  - Se evita «SEÑOR» o equivalentes porque el versículo no contiene el nombre divino ni κύριος en este segmento.
  - «Terrenal» y «vano» se eligieron por claridad y por conservar el tono de valoración moral del original sin exceso de paráfrasis.
