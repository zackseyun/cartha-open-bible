  text: 5. For no spirit given from God is consulted, but, having the power of the Deity, it speaks everything from itself, because it is from above, from the power of the divine Spirit.
translation:
  language: es
  text: 5. Porque ningún espíritu dado por Dios es consultado, sino que, teniendo el poder de la Deidad, habla todo por sí mismo, porque procede de lo alto, del poder del espíritu divino.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - Espíritu
  lexicon: πνεῦμα
  rationale: Aquí el contexto no apunta al Espíritu Santo como título fijo, sino a un ser/espíritu dado por Dios; por eso se conserva el sustantivo común 'espíritu' y no la mayúscula devocional.
- source_word: ἀπὸ θεοῦ
  english_pob_choice: from God
  chosen_spanish: dado por Dios
  alternatives_spanish:
  - de Dios
  - procedente de Dios
  lexicon: ἀπό + θεός
  rationale: La preposición expresa origen, y en español 'dado por Dios' comunica bien ese origen relacional sin perder la fuerza de procedencia que el inglés POB refleja con 'from God'.
- source_word: ἐρωτᾶται
  english_pob_choice: is consulted
  chosen_spanish: es consultado
  alternatives_spanish:
  - es interrogado
  - se le consulta
  lexicon: ἐρωτάω
  rationale: Se mantiene el matiz de consulta/pregunta hacia el espíritu. 'Es consultado' es claro y conserva la pasiva del griego y del inglés POB.
- source_word: ἔχον τὴν δύναμιν τῆς θεότητος
  english_pob_choice: having the power of the Deity
  chosen_spanish: teniendo el poder de la Deidad
  alternatives_spanish:
  - con el poder de la Deidad
  - poseyendo el poder de la Deidad
  - con el poder divino
  lexicon: δύναμις / θεότης
  rationale: Se conserva la expresión fuerte 'Deidad' para θεότης, en vez de suavizarla a 'divinidad' o 'poder divino', porque el inglés POB retiene ese relieve teológico y el griego nombra una cualidad divina marcada.
- source_word: πάντα ἐξ ἑαυτοῦ λαλεῖ
  english_pob_choice: it speaks everything from itself
  chosen_spanish: dice por sí mismo todo
  alternatives_spanish:
  - habla todo por sí mismo
  - pronuncia todo por sí mismo
  lexicon: λαλέω + ἐξ ἑαυτοῦ
  rationale: La construcción idiomática se vierte de modo natural en español sin perder la idea de espontaneidad/autosuficiencia del hablar. 'Por sí mismo' refleja ἐξ ἑαυτοῦ con transparencia.
- source_word: ἐξ ὕψους
  english_pob_choice: from above
  chosen_spanish: de lo alto
  alternatives_spanish:
  - desde arriba
  - desde lo alto
  lexicon: ἄνω / ὕψος
  rationale: '''De lo alto'' es la formulación más natural en español para origen celestial y mantiene el tono de procedencia vertical del original y del inglés POB.'
- source_word: ἀπὸ τῆς δυνάμεως τοῦ θείου πνεύματος
  english_pob_choice: from the power of the divine Spirit
  chosen_spanish: del poder del Espíritu divino
  alternatives_spanish:
  - del poder del espíritu divino
  - de la fuerza del Espíritu divino
  - del poder del Espíritu de Dios
  lexicon: θεῖος / πνεῦμα
  rationale: Se conserva la mayúscula en 'Espíritu' porque aquí la expresión es claramente reverente y puede leerse como una referencia al Espíritu de Dios; 'divino' traduce θεῖος sin reemplazarlo por un giro más eclesiástico.
theological_decisions:
- issue: El estatus de 'espíritu' en la primera cláusula
  english_pob_reading: no spirit given from God is consulted
  chosen_spanish_reading: ningún espíritu dado por Dios es consultado
  alternative_spanish_readings:
  - ningún Espíritu dado por Dios es consultado
  - no se consulta a ningún espíritu dado por Dios
  rationale: La frase puede referirse a un espíritu no humano concedido por Dios; no hay base para convertirlo directamente en una persona identificada como el Espíritu Santo. La minúscula conserva esa tensión semántica.
  doctrine_reference: Pneumatología; distinción entre espíritu creado/otorgado y el Espíritu Santo como referencia explícita
- issue: '''Deity'' versus un simple ''divine'''
  english_pob_reading: having the power of the Deity
  chosen_spanish_reading: teniendo el poder de la Deidad
  alternative_spanish_readings:
  - teniendo el poder de la divinidad
  - con poder divino
  rationale: El griego θεότης es más fuerte que un adjetivo común; 'Deidad' preserva el peso ontológico del término, conforme a la elección del inglés POB.
  doctrine_reference: Cristología / teología propia del texto; término de naturaleza divina
- issue: Identidad de 'divine Spirit'
  english_pob_reading: the divine Spirit
  chosen_spanish_reading: el Espíritu divino
  alternative_spanish_readings:
  - el espíritu divino
  - el Espíritu de Dios
  rationale: El contexto permite una lectura reverente que apunta al origen divino del impulso del espíritu. Se evita una identificación dogmática excesiva, pero se mantiene una mayúscula plausible por la gravedad teológica de la expresión.
  doctrine_reference: Pneumatología; ambigüedad deliberada del texto patrístico
translation_notes:
  revision_awareness: No se documentan revisiones aplicadas en el paquete de auditoría. La versión inglesa POB ya ofrece una lectura óptima-equivalente sin notas, y la traducción española sigue directamente el griego con las mismas tensiones semánticas preservadas.
  spanish_consistency_notes:
  - Se mantiene 'Deidad' para θεότης en coherencia con el valor fuerte del término.
  - Se usa 'espíritu' en minúscula en la primera cláusula para no sobreidentificar el referente.
  - Se usa 'Espíritu' con mayúscula en la cláusula final por la posible lectura reverencial de πνεῦμα θεῖον en un contexto teológico.
  - '''De lo alto'' conserva el origen celestial sin introducir una paráfrasis interpretativa.'
