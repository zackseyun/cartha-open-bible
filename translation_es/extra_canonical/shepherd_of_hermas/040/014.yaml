  rationale: El original inglés presenta un encabezado breve entre corchetes, no una cláusula desarrollada. En español, «el cielo» conserva esa concisión y la referencia espacial/teológica natural del término sin añadir interpretación. Se prefirió el artículo definido para una fórmula de encabezado más idiomática.
theological_decisions:
- issue: Uso de un encabezado temático mínimo en lugar de una traducción expansiva
  english_pob_reading: '[Heaven.]'
  chosen_spanish_reading: '[El cielo.]'
  alternative_spanish_readings:
  - '[Cielo.]'
  - '[Los cielos.]'
  rationale: La unidad no contiene una proposición completa sino un rótulo/encabezado. Mantenerlo breve respeta la forma del texto fuente y evita introducir contenido doctrinal o explicativo que el griego no desarrolla aquí.
  doctrine_reference: None needed; structural heading only.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de origen. Dado que el texto inglés auditado es solo un rótulo entre corchetes y no incluye notas léxicas ni variantes, la versión española sigue directamente esa función estructural.
  spanish_consistency_notes:
  - Se mantuvo el formato de encabezado entre corchetes para reflejar el segmento fuente.
  - No se añadieron notas al pie porque el texto fuente y el audit trail inglés no documentan alternativas textuales ni tensiones léxicas relevantes.
