base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/040/017.yaml
  text: 21. You see, then, that things from above, though very small when they fall upon the earth, have great power; so also the divine spirit that comes from above is powerful. Trust in this spirit, but keep away from the other.”
translation:
  language: es
  text: 21. Ves, pues, que las cosas de arriba, aunque son muy pequeñas cuando caen sobre la tierra, tienen gran poder; así también el espíritu divino que viene de arriba es poderoso. Confía en este espíritu, pero aléjate del otro.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὰ ἄνωθεν
  english_pob_choice: things from above
  chosen_spanish: las cosas de arriba
  alternatives_spanish:
  - las cosas de lo alto
  - las cosas que vienen de arriba
  lexicon: ἄνωθεν
  rationale: «Las cosas de arriba» conserva la imagen espacial del original y corresponde bien al inglés POB; «de lo alto» es posible, pero suena más interpretativo en español.
- source_word: πνεῦμα θεῖον
  english_pob_choice: the divine spirit
  chosen_spanish: el espíritu divino
  alternatives_spanish:
  - el Espíritu divino
  - el espíritu de Dios
  lexicon: πνεῦμα / θεῖον
  rationale: Se mantiene «espíritu» en minúscula porque el contexto contrasta dos espíritus; «divino» traduce θεῖον sin introducir explícitamente «de Dios», que sería más interpretativo.
- source_word: ἐκ τοῦ ἄνωθεν
  english_pob_choice: comes from above
  chosen_spanish: que viene de arriba
  alternatives_spanish:
  - que procede de arriba
  - que desciende de arriba
  lexicon: ἄνωθεν
  rationale: «Viene de arriba» conserva el movimiento vertical y el paralelismo con la primera cláusula. «Procede» sería más formal pero menos directo.
- source_word: τοῦ ἑτέρου
  english_pob_choice: the other
  chosen_spanish: del otro
  alternatives_spanish:
  - del otro espíritu
  - del segundo
  lexicon: ἕτερος
  rationale: El griego deja implícito el sustantivo; en español también puede quedar implícito. La frase «del otro» mantiene el contraste y evita añadir una glosa innecesaria.
theological_decisions:
- issue: Identidad del «espíritu divino» frente al otro espíritu
  english_pob_reading: The divine spirit that comes from above is powerful. Trust in this spirit, but keep away from the other.
  chosen_spanish_reading: El «espíritu divino» se presenta como el que viene de arriba y debe ser confiado; el contraste con «el otro» conserva la oposición espiritual sin especificar más allá del texto.
  alternative_spanish_readings:
  - el Espíritu Santo
  - el espíritu de Dios
  - el otro espíritu
  rationale: El pasaje contrasta dos realidades espirituales, pero el texto base no nombra explícitamente al Espíritu Santo. Traducir con mayúscula o identificarlo sin apoyo textual borraría la tensión documentada entre una designación genérica y una lectura teológica más específica.
  doctrine_reference: Discriminación de espíritus; pneumatología del texto patrístico temprano
translation_notes:
  revision_awareness: No se registran revisiones previas ni notas textuales en el paquete proporcionado; la traducción se apoya directamente en el griego normalizado y en la formulación auditada en inglés como control de sentido.
  spanish_consistency_notes:
  - Se conserva el contraste espacial arriba/abajo mediante «de arriba» y «de abajo» implícito en «la tierra»
  - Se mantiene «espíritu» en minúscula por la oposición interna del pasaje
  - Se evita sustituir «del otro» por una explicación interpretativa para preservar la ambigüedad controlada del original
