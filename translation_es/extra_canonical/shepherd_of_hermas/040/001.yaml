  to: '1. Me mostró a unos hombres sentados en un banco, y a otro hombre sentado en una silla. Y me dice: «¿Ves a los que están sentados en el banco?». «Los veo, señor», le digo. «Estos —dice— son fieles; y el que está sentado en la silla es un falso profeta, que destruye el entendimiento de los esclavos[a] de Dios: el de los de doble ánimo, no el de los fieles.»'
  rationale: Se mantiene el contenido del borrador, pero se ajusta la sintaxis y el diálogo para mayor naturalidad. En la cláusula final, «el de los de doble ánimo, no el de los fieles» explicita en español que el entendimiento destruido es el de los inconstantes y no el de los fieles, preservando mejor la antítesis del original y del POB inglés.
