  text: 1. He showed me men sitting on a bench, and another man sitting on a chair. And he says to me, “Do you see the ones sitting on the bench?” “I see, sir,” I say. “These,” he says, “are faithful; and the one sitting on the chair is a false prophet who destroys the understanding of the slaves of God—of the double‑minded, not of the faithful.
translation:
  language: es
  text: '1. Me mostró a unos hombres sentados en un banco, y a otro hombre sentado en una silla. Y me dice: «¿Ves a los que están sentados en el banco?». «Los veo, señor», le digo. «Estos —dice— son fieles; y el que está sentado en la silla es un falso profeta, que destruye el entendimiento de los esclavos[a] de Dios: el de los de doble ánimo, no el de los fieles.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Esclavos» reproduce la fuerza del griego δοῦλοι; «siervos» sería una atenuación más interpretativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνδρας καθήμενους ἐπὶ θέκης
  english_pob_choice: men sitting on a bench
  chosen_spanish: unos hombres sentados en un banco
  alternatives_spanish:
  - unos hombres sentados en una banca
  - unos hombres sentados en un asiento
  lexicon: ἄνδρας; θέκη
  rationale: Mantengo la escena concreta del asiento largo/banco que refleja bien la imagen del POB inglés. «Banco» es natural en español y conserva la oposición visual con «silla».
- source_word: ἄλλον ἀνδρα καθήμενον ἐπὶ καθέδρας
  english_pob_choice: another man sitting on a chair
  chosen_spanish: a otro hombre sentado en una silla
  alternatives_spanish:
  - a otro hombre sentado en una cátedra
  - a otro hombre sentado en un asiento
  lexicon: ἄλλον ἀνδρα; καθέδρα
  rationale: «Silla» comunica la contraposición con el «banco» sin introducir un matiz eclesiástico ajeno. «Cátedra» podría sonar demasiado técnica o institucional para este contexto narrativo.
- source_word: δοῦλοις τοῦ θεοῦ
  english_pob_choice: the slaves of God
  chosen_spanish: los esclavos de Dios
  alternatives_spanish:
  - los siervos de Dios
  - los servidores de Dios
  lexicon: δοῦλος
  rationale: Sigo la elección semántica fuerte del POB inglés para δοῦλος. «Esclavos» preserva la fuerza lexical y la tensión teológica del original; «siervos» suavizaría indebidamente el término.
- source_word: οἱ δίψυχοι
  english_pob_choice: the double-minded
  chosen_spanish: los de doble ánimo
  alternatives_spanish:
  - los vacilantes
  - los de mente dividida
  lexicon: δίψυχος
  rationale: «Doble ánimo» es la expresión española tradicional y transparente que preserva la idea de interior dividida sin añadir interpretación psicológica moderna.
theological_decisions:
- issue: Cómo rendir δοῦλοι τοῦ θεοῦ sin borrar la tensión social y espiritual del término
  english_pob_reading: the slaves of God
  chosen_spanish_reading: los esclavos de Dios
  alternative_spanish_readings:
  - los siervos de Dios
  - los servidores de Dios
  rationale: La lectura del POB documenta la fuerza de δοῦλος, y en este pasaje la oposición entre fidelidad y falsedad se apoya en una pertenencia radical a Dios. «Esclavos» conserva esa carga y evita domesticar el texto.
  doctrine_reference: Lexical-theological force of δοῦλος in NT and early Christian literature
- issue: Identificación de los destinatarios dañados por el falso profeta
  english_pob_reading: of the double-minded, not of the faithful
  chosen_spanish_reading: de los de doble ánimo, no los fieles
  alternative_spanish_readings:
  - de los vacilantes, no de los fieles
  - de los de mente dividida, no de los fieles
  rationale: 'Conservo la antítesis del texto: el falso profeta afecta a los inconstantes, no a los fieles. «De doble ánimo» mantiene la resonancia bíblica y la tensión moral del original.'
  doctrine_reference: Moral discernment and perseverance in early Christian catechesis
translation_notes:
  revision_awareness: No se registran revisiones previas en el paquete proporcionado. La redacción española sigue de cerca el griego normalizado y la solución inglesa POB, preservando la imaginería de banco/silla, la designación fuerte de δοῦλοι y la antítesis «de doble ánimo / fieles».
  spanish_consistency_notes:
  - Se mantiene «Y dice»/«me dice» en presente narrativo para reproducir el estilo vívido del relato.
  - Se evita «SEÑOR» o terminología litúrgica no presente en el pasaje.
  - «Banco» y «silla» se usan de modo contrastivo para conservar la escena visual.
  - «Doble ánimo» se mantiene como equivalente idiomático de δίψυχος en contexto moral.
