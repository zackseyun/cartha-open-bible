base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/040/009.yaml
  text: 9. Therefore, when the man who has the divine spirit comes into a gathering of righteous men who have faith in the divine Spirit, and an intercession is made to God by the gathering of those men, then the angel of the prophetic spirit who is assigned to him fills the man; and being filled with the holy Spirit he speaks to the multitude as the Lord wills.
translation:
  language: es
  text: 9. Por tanto, cuando el hombre que tiene el espíritu divino[a] entra en una reunión de hombres justos que tienen fe en el espíritu divino, y en la reunión de esos hombres se hace una intercesión a Dios, entonces el ángel del espíritu profético que le ha sido asignado llena al hombre; y, lleno del Espíritu Santo, habla a la multitud como el Señor quiere.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''espíritu divino'' conserva la distinción del pasaje frente a ''Espíritu Santo'' al final; no identifica automáticamente ambos términos.'
    reason: theological_note
lexical_decisions:
- source_word: πνεῦμα θεῖον / divine spirit
  english_pob_choice: divine spirit
  chosen_spanish: espíritu divino
  alternatives_spanish:
  - Espíritu divino
  - espíritu de Dios
  lexicon: πνεῦμα
  rationale: En el contexto inmediato, el inglés distingue entre el 'divine spirit' que el hombre posee y el 'holy Spirit' con mayúscula. En español, 'espíritu divino' conserva esa distinción sin sobrecargar el texto con una identificación explícita que el griego no fuerza aquí.
- source_word: πιστεύουσιν τῷ θείῳ πνεύματι / faith in the divine Spirit
  english_pob_choice: faith in the divine Spirit
  chosen_spanish: fe en el Espíritu divino
  alternatives_spanish:
  - fe en el espíritu divino
  - fe en el Espíritu Santo
  lexicon: πνεῦμα
  rationale: Se mantiene la mayúscula en 'Espíritu' porque el sintagma funciona como referente personal sacralizado en la comunidad, pero se evita igualarlo sin más con el 'Espíritu Santo' del tramo final, ya que el pasaje conserva una tensión terminológica.
- source_word: δέησις / intercession
  english_pob_choice: intercession
  chosen_spanish: intercesión
  alternatives_spanish:
  - súplica
  - rogativa
  lexicon: δέησις
  rationale: '''Intercesión'' reproduce bien la oración dirigida a Dios por el grupo y encaja con el tono eclesial del pasaje. ''Súplica'' sería posible, pero perdería la mediación comunitaria sugerida por el contexto.'
- source_word: πνεῦμα προφητικόν / prophetic spirit
  english_pob_choice: prophetic spirit
  chosen_spanish: espíritu profético
  alternatives_spanish:
  - espíritu de profecía
  - espíritu profético
  lexicon: πνεῦμα
  rationale: Se conserva la cualidad adjetival directa del original. 'Espíritu de profecía' interpretaría más libremente y podría sonar más técnico de lo que exige el texto.
- source_word: ἐπιτεταγμένος / assigned to him
  english_pob_choice: is assigned to him
  chosen_spanish: le ha sido asignado
  alternatives_spanish:
  - le fue asignado
  - está encargado de él
  lexicon: ἐπιτάσσω
  rationale: La pasiva refleja el encargo recibido por el ángel sin introducir una relación funcional más amplia que la que el texto garantiza.
- source_word: πλησθείς / being filled
  english_pob_choice: being filled
  chosen_spanish: lleno
  alternatives_spanish:
  - habiendo sido lleno
  - al ser lleno
  lexicon: πίμπλημι
  rationale: 'En español, la construcción participial funciona mejor como inciso: ''lleno del Espíritu Santo''. Conserva el resultado del llenado sin forzar una sintaxis pesada.'
- source_word: ἅγιον πνεῦμα / holy Spirit
  english_pob_choice: holy Spirit
  chosen_spanish: Espíritu Santo
  alternatives_spanish:
  - espíritu santo
  lexicon: πνεῦμα
  rationale: Aquí sí se traduce con mayúsculas por tratarse del referente consagrado del discurso cristiano. Esto mantiene la distinción con el anterior 'espíritu divino' y respeta la terminología doctrinal habitual en español.
- source_word: ὁ κύριος / the Lord
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor
  lexicon: κύριος
  rationale: Aunque el proyecto suele preferir 'Yahvé' para el nombre divino, aquí el título aparece en una fórmula cristiana final y el español 'el Señor' conserva la referencia tradicional del cierre sin introducir una decisión innecesaria sobre el nombre divino en este contexto.
theological_decisions:
- issue: Distinción entre 'espíritu divino' y 'Espíritu Santo'
  english_pob_reading: The man has the divine spirit; he is then filled with the holy Spirit.
  chosen_spanish_reading: El hombre posee 'el espíritu divino', pero después queda 'lleno del Espíritu Santo'.
  alternative_spanish_readings:
  - El hombre posee el Espíritu Santo desde el inicio.
  - El 'espíritu divino' y el 'Espíritu Santo' son exactamente el mismo referente.
  rationale: El griego y el POB inglés mantienen una diferenciación en la superficie textual. La traducción española no debe colapsar ambos términos, porque el pasaje presenta una secuencia de dotación carismática que distingue un espíritu divino de la plenitud del Espíritu Santo.
  doctrine_reference: Distinción terminológica en textos carismáticos; pneumatología del pasaje.
- issue: Naturaleza de la intervención del ángel del espíritu profético
  english_pob_reading: the angel of the prophetic spirit... fills the man
  chosen_spanish_reading: el ángel del espíritu profético... llena al hombre
  alternative_spanish_readings:
  - el ángel que preside el espíritu profético...
  - el espíritu profético llena al hombre
  rationale: La formulación conserva la mediación angélica explícita del original y evita convertir al ángel en una abstracción. También preserva la relación entre el ángel y el llenado del hombre tal como la presenta el texto.
  doctrine_reference: Angiología y carismas en literatura cristiana primitiva.
translation_notes:
  revision_awareness: No se registran revisiones previas ni correcciones textuales en el paquete. La redacción sigue el texto griego normalizado y el POB inglés como apoyo auditivo, sin depender mecánicamente de la versión inglesa.
  spanish_consistency_notes:
  - Se mantiene 'Espíritu' con mayúscula cuando el referente es sacralizado o claramente personal, y 'espíritu' en minúscula cuando funciona como cualidad o posesión descriptiva.
  - Se conserva 'el Señor' al final como fórmula cristológica/general del pasaje, sin forzar aquí la convención de 'Yahvé' usada para el nombre divino en otros contextos.
  - '''Intercesión'' y ''reunión'' reflejan el marco comunitario de oración sin añadir elementos no presentes en la fuente.'
