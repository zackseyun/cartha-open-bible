base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/040/016.yaml
  text: 20. Take now the power that comes from above. Hail is a very small pellet, and when it falls on a man’s head, how much pain it causes! Or again, take a drop that falls from the roof tile to the ground, and it bores through the stone.
translation:
  language: es
  text: 20. Toma ahora el poder que viene de arriba. El granizo es una piedra muy pequeña, y cuando cae sobre la cabeza de un hombre, ¡cuánto dolor le causa! O también, toma una gota que cae de una teja al suelo, y perfora la piedra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡ ἄνωθεν δύναμις
  english_pob_choice: the power that comes from above
  chosen_spanish: el poder que viene de arriba
  alternatives_spanish:
  - la fuerza que viene de arriba
  - el poder de arriba
  lexicon: δύναμις
  rationale: «Poder» conserva el valor de capacidad eficaz que el contexto pide. «Que viene de arriba» reproduce la procedencia sin introducir una paráfrasis teológica ajena al pasaje.
- source_word: χάλαζα
  english_pob_choice: hail
  chosen_spanish: la granizada
  alternatives_spanish:
  - el granizo
  - la piedra
  lexicon: χάλαζα
  rationale: En español, «granizo» es claro, pero «la granizada» permite mantener el sentido de un pequeño cuerpo de hielo que cae como lluvia de granizo; evita la ambigüedad de «piedra», que en español no comunica el fenómeno meteorológico.
- source_word: ψῆφος / μικρὸν σφόδρα σῶμα (imagen diminutiva según el contexto)
  english_pob_choice: a very small pellet
  chosen_spanish: un gránulo muy pequeño
  alternatives_spanish:
  - un pequeño perdigón
  - una piedrecilla muy pequeña
  lexicon: —
  rationale: El texto griego presenta una imagen diminutiva; «gránulo» conserva la idea de una partícula pequeña sin especificar un material que el pasaje no precisa. Se evita «perdigón» por implicar metal o munición, y «piedrecilla» por no corresponder con la imagen más probable del contraste.
- source_word: κεφαλή
  english_pob_choice: head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - la cabeza del hombre
  lexicon: κεφαλή
  rationale: 'Se mantiene la referencia directa y natural del original: el impacto sobre la cabeza produce dolor.'
- source_word: ὀδύνη
  english_pob_choice: pain
  chosen_spanish: dolor
  alternatives_spanish:
  - pena
  - sufrimiento
  lexicon: ὀδύνη
  rationale: «Dolor» es la equivalencia más directa y idiomática en español para el efecto físico descrito.
- source_word: σταγών
  english_pob_choice: a drop
  chosen_spanish: una gota
  alternatives_spanish:
  - una gota de agua
  lexicon: σταγών
  rationale: Se traduce literalmente la pequeña cantidad líquida; no se añade «de agua» porque el griego no lo especifica.
- source_word: ἐκ τῆς κέραμoς / techo de teja
  english_pob_choice: from the roof tile
  chosen_spanish: del tejado
  alternatives_spanish:
  - de la teja
  - del techo de teja
  lexicon: κέραμος
  rationale: «Del tejado» comunica con naturalidad la fuente de la gota en español. Aunque el griego alude a la teja, una traducción demasiado técnica podría sonar forzada; por eso se conserva la imagen general del agua que cae desde el techo.
- source_word: γῆ
  english_pob_choice: the ground
  chosen_spanish: al suelo
  alternatives_spanish:
  - a la tierra
  - al piso
  lexicon: γῆ
  rationale: «Al suelo» es claro y natural en español para el lugar de caída.
- source_word: τρυπᾷ τὴν πέτραν
  english_pob_choice: it bores through the stone
  chosen_spanish: perfora la piedra
  alternatives_spanish:
  - horada la piedra
  - la taladra
  lexicon: τρυπᾷ
  rationale: «Perfora» conserva la fuerza de la acción continua de penetrar la piedra y suena más natural que un calco como «horada» o un término demasiado técnico como «taladra».
theological_decisions:
- issue: Origen y función de la “potencia/poder de arriba”
  english_pob_reading: power that comes from above
  chosen_spanish_reading: el poder que viene de arriba
  alternative_spanish_readings:
  - el poder de lo alto
  - la fuerza que viene de arriba
  rationale: No se explicita en el texto una identificación doctrinal específica de esa «potencia»; se mantiene la formulación abierta, como en el inglés POB, dejando que el contexto simbólico funcione sin sobreinterpretación.
  doctrine_reference: No aplica; imagen exhortativa sin desarrollo doctrinal explícito.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; esta propuesta sigue directamente el sentido del griego normalizado y el valor óptimo-equivalente del inglés POB, preservando la secuencia imagética y la intensidad retórica.
  spanish_consistency_notes:
  - Se mantiene un español neutral y publicable, con registro sobrio.
  - Se evita introducir términos eclesiásticos no presentes en el original.
  - La imaginería de granizo/gota/piedra se conserva sin domesticarla en exceso.
  - No hay notas al pie porque el pasaje no presenta una variante textual o alternativa interpretativa que requiera marcación en este registro.
