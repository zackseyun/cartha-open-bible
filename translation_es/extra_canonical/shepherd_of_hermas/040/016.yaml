  to: 20. Toma ahora el poder que viene de arriba. El granizo es una piedra muy pequeña, y cuando cae sobre la cabeza de un hombre, ¡cuánto dolor le causa! O también, toma una gota que cae de una teja al suelo, y perfora la piedra.
