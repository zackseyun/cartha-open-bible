  text: 10. Thus the spirit of the Deity will be made manifest. As for the spirit of the Deity of the Lord, this is its power.
translation:
  language: es
  text: 10. Así se manifestará el espíritu de la Deidad. En cuanto al espíritu de la Deidad del Señor, ese es su poder.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεῦμα
  english_pob_choice: the spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - Espíritu
  - viento
  - aliento
  lexicon: πνεῦμα
  rationale: El contexto habla de una manifestación y luego de su poder, por lo que en español el sentido natural es «espíritu»; no hay indicio suficiente para «viento» o «aliento».
- source_word: θεότητος
  english_pob_choice: of the Deity
  chosen_spanish: de la Deidad
  alternatives_spanish:
  - de Dios
  - de la divinidad
  lexicon: θεότης
  rationale: La forma abstracta apunta a la cualidad/realidad divina más que al simple nombre «Dios»; «Deidad» conserva ese matiz y refleja la elección inglesa de POB.
- source_word: κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor Dios
  lexicon: κύριος
  rationale: En este pasaje el griego usa κύριος dentro de una construcción posesiva; el inglés de POB mantiene «Lord». En español, «Señor» conserva la referencia sin forzar una sustitución por el nombre divino donde el texto griego no lo explicita directamente.
- source_word: δύναμις
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - potencia
  lexicon: δύναμις
  rationale: «Poder» reproduce con naturalidad la idea de capacidad eficaz y mantiene la concisión del original.
theological_decisions:
- issue: Relación entre «espíritu de la Deidad» y «espíritu de la Deidad del Señor»
  english_pob_reading: Thus the spirit of the Deity will be made manifest. As for the spirit of the Deity of the Lord, this is its power.
  chosen_spanish_reading: Así se manifestará el espíritu de la Deidad. En cuanto al espíritu de la Deidad del Señor, este es su poder.
  alternative_spanish_readings:
  - Así se manifestará el Espíritu de la Deidad.
  - Así se manifestará el espíritu divino.
  rationale: La redacción conserva la distinción del audit trail inglés entre la manifestación del espíritu de la Deidad y la aclaración posterior sobre el espíritu de la Deidad «del Señor». No se nivela la tensión con una paráfrasis más fluida, porque el texto fuente presenta una construcción poco común que conviene dejar visible.
  doctrine_reference: Hermas, Mandato 11; conservación de la formulación posesiva y de la distinción semántica del pasaje.
translation_notes:
  revision_awareness: No hay revisiones aplicadas ni notas en el paquete inglés; por tanto, la versión española sigue directamente el sentido evidenciado por el griego normalizado y el inglés auditado, sin introducir glosas no sustentadas.
  spanish_consistency_notes:
  - Se mantiene «Deidad» para θεότης, en continuidad con el valor abstracto del término.
  - Se usa «Señor» para κύριος en la construcción dada, sin sustituirlo por «Yahvé» porque el pasaje no aporta una cita explícita del nombre divino.
  - Se conserva el paralelismo sintáctico de las dos oraciones para reflejar la estructura del original.
