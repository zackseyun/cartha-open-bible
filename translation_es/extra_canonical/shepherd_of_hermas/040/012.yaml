  yaml_path: translation/extra_canonical/shepherd_of_hermas/040/012.yaml
  text: 12. First, that man who seems to have a spirit exalts himself and wants to have the first seat; and immediately he is presumptuous and shameless and talkative, and lives among many luxuries and many other deceits, and he receives payment for his prophecy; and if he does not receive it, he does not prophesy. Can a divine spirit receive payment and prophesy? A prophet of God cannot do this; rather, the spirit of such prophets is earthly.
translation:
  language: es
  text: 12. Primero, ese hombre que parece tener un espíritu se enaltece y quiere ocupar el lugar principal; e inmediatamente se vuelve presuntuoso, descarado y hablador, y vive rodeado de muchos lujos y de muchos otros engaños, y recibe pago por su profecía; y, si no lo recibe, no profetiza. ¿Puede un espíritu divino recibir pago y profetizar? Un profeta de Dios no puede hacer esto; más bien, el espíritu de tales profetas es terrenal.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - Espíritu
  - aliento
  lexicon: πνεῦμα
  rationale: Aquí el texto habla de alguien que «parece tener un espíritu» y luego pregunta si un «espíritu divino» puede recibir pago. En español, «espíritu» mantiene la ambigüedad intencional entre una influencia espiritual y el don/manifestación profética, sin forzar «Espíritu» mayúsculo, que sugeriría de entrada al Espíritu Santo.
- source_word: προφήτης / προφητεύω
  english_pob_choice: prophecy / prophesy
  chosen_spanish: profecía / profetiza
  alternatives_spanish:
  - profecía / profetizar
  lexicon: προφήτης
  rationale: «Profecía» y «profetiza» reproducen de modo natural la relación nominal/verbal del griego y del inglés POB, y suenan más fluidos que un calco como «hacer profecía».
- source_word: μισθός / recibir payment
  english_pob_choice: receives payment
  chosen_spanish: recibe pago
  alternatives_spanish:
  - recibe salario
  - cobra
  lexicon: μισθός
  rationale: '«Recibe pago» conserva la fuerza comercial del pasaje: la crítica es que su actividad profética está condicionada por retribución. «Salario» suena más laboral y menos general; «cobra» es más coloquial.'
- source_word: ἐπαιρόμενος
  english_pob_choice: exalts himself
  chosen_spanish: se enaltece
  alternatives_spanish:
  - se exalta
  - se engríe
  lexicon: ἐπαίρω
  rationale: «Se enaltece» expresa el movimiento reflexivo de elevarse a sí mismo con un tono digno y comprensible en español, sin perder el matiz de autosuperioridad que tiene el contexto.
- source_word: ἀναιδής
  english_pob_choice: shameless
  chosen_spanish: descarado
  alternatives_spanish:
  - sin vergüenza
  - impúdico
  lexicon: ἀναιδής
  rationale: «Descarado» comunica bien la falta de pudor y la audacia insolente del contexto, con una resonancia idiomática más natural que «sin vergüenza».
- source_word: πολυτέλεια / πολλαὶ πολυτέλειαι
  english_pob_choice: many luxuries
  chosen_spanish: muchos lujos
  alternatives_spanish:
  - muchas comodidades
  - gran lujo
  lexicon: πολυτέλεια
  rationale: «Muchos lujos» conserva el plural enfático del griego y del inglés POB; evita suavizar el retrato moral del personaje.
- source_word: γῆ / earthly
  english_pob_choice: earthly
  chosen_spanish: terrenal
  alternatives_spanish:
  - de la tierra
  - mundano
  lexicon: γῆ
  rationale: «Terrenal» expresa el contraste con lo divino/espiritual que plantea el cierre, y es más preciso que «mundano», que añadiría una valoración interpretativa más amplia.
- source_word: τόπος πρῶτος / first seat
  english_pob_choice: first seat
  chosen_spanish: el primer asiento
  alternatives_spanish:
  - el lugar principal
  - el primer puesto
  lexicon: πρῶτος
  rationale: «El primer asiento» sigue de cerca el giro del inglés POB y conserva la imagen de precedencia/pretensión de honor sin convertirlo en una paráfrasis abstracta.
theological_decisions:
- issue: Naturaleza del espíritu mencionado en el pasaje
  english_pob_reading: A divine spirit can be tested by whether the speaker seeks money; such behavior is incompatible with a prophet of God.
  chosen_spanish_reading: Un espíritu divino no puede recibir pago por profetizar; si alguien lo hace, su «espíritu» no es de Dios sino terrenal.
  alternative_spanish_readings:
  - Un espíritu puede ser genuinamente profético pero corrompido por interés.
  - El texto se refiere a un espíritu humano, no necesariamente a una entidad espiritual.
  rationale: 'Mantengo la lectura evaluativa del inglés POB: el criterio no es meramente psicológico, sino discernimiento del origen espiritual. La pregunta retórica y la conclusión final contrastan lo divino con lo terrenal.'
  doctrine_reference: Discernimiento de espíritus; profecía verdadera frente a falsa profecía.
- issue: Valor moral de la remuneración por profecía
  english_pob_reading: Receiving payment for prophecy is incompatible with a true prophet of God.
  chosen_spanish_reading: Recibir pago por profetizar aparece como señal de falsedad profética.
  alternative_spanish_readings:
  - La remuneración descalifica siempre cualquier ministerio profético.
  - El texto solo critica la codicia, no necesariamente toda compensación.
  rationale: La redacción española sigue el juicio del texto sin absolutizar más allá de lo que la frase afirma. La condena recae en la profecía condicionada por pago, no en formular una norma financiera general para todos los ministerios.
  doctrine_reference: Integridad profética; avaricia; falsos profetas.
translation_notes:
  revision_awareness: Sin revisiones posteriores registradas en el paquete; la redacción se apoya directamente en el texto griego normalizado y en la lectura inglesa auditada, sin depender de una cadena de enmiendas.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός en coherencia con el resto del proyecto.
  - Se usa «espíritu» en minúscula porque el contexto distingue entre una disposición/impulso profético y el Espíritu Santo.
  - Se conserva el paralelismo y la acumulación de rasgos negativos con puntuación semicolonada para reflejar la cadena retórica del original.
  - No se introduce terminología eclesiástica tradicional ajena al pasaje; el lenguaje permanece descriptivo y evaluativo.
