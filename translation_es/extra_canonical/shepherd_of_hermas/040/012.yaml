review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego según la auditoría inglesa: orgullo del supuesto inspirado, búsqueda de honor, carácter insolente y charlatán, vida de lujos/engaños, profecía condicionada por pago, y contraste final entre espíritu divino y espíritu terrenal. No obstante, hay un punto de fidelidad mejorable: «el primer asiento» suena demasiado calco y menos natural que una formulación idiomática que conserve la idea de precedencia/honor. También «vive entre muchos lujos» puede afinarse a una construcción más natural sin perder fuerza.'
  spanish_quality_summary: El texto es claro y mayormente digno y legible. Sin embargo, presenta cierta rigidez por repetición excesiva de «y» y por el calco «el primer asiento». Una revisión menor mejora la naturalidad del español eclesial general sin apartarse del contenido fuente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «espíritu», «Dios», «profetiza», «pago» y «terrenal» están bien alineados con las decisiones léxicas documentadas. La revisión propuesta solo mejora la idiomaticidad de «first seat» como «el lugar principal».
  issues:
  - severity: medium
    issue: «el primer asiento» suena calco y poco idiomático
    rationale: Aunque reproduce literalmente el inglés auditado, en español general y eclesial «quiere ocupar el lugar principal» comunica mejor la pretensión de honor que expresa el pasaje, sin pérdida semántica.
  - severity: low
    issue: «vive entre muchos lujos» es algo forzado
    rationale: Una formulación como «vive rodeado de muchos lujos» o «en medio de muchos lujos» suena más natural en español y mantiene el mismo sentido.
