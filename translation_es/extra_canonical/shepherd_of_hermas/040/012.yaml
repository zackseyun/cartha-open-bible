  revision_rationale: 'La revisión es menor y no doctrinal: sustituye un calco poco natural («el primer asiento») por una expresión idiomática fiel («ocupar el lugar principal») y mejora la fluidez de «vive entre muchos lujos» a «vive rodeado de muchos lujos». Se preservan todas las decisiones léxicas y teológicas principales del borrador.'
