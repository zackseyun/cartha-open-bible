  text: 13. Then, he does not come near a gathering of righteous men at all, but avoids them. He clings to the double‑minded and the empty, and he prophesies to them in a corner, and deceives them by speaking everything according to their desires, emptily; for he also answers the empty. For an empty vessel, placed together with empty ones, is not broken, but they agree with one another.
translation:
  language: es
  text: 13. Entonces, él no se acerca en absoluto a una reunión de hombres justos, sino que los evita. Se aferra a los de doble ánimo y a los vacíos, y les profetiza en un rincón, y los engaña diciéndoles todo conforme a sus deseos, vacíamente; porque también responde a los vacíos. Pues un recipiente vacío, puesto junto con otros vacíos, no se rompe, sino que concuerdan unos con otros.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: gathering of righteous men
  english_pob_choice: a gathering of righteous men
  chosen_spanish: una reunión de hombres justos
  alternatives_spanish:
  - una asamblea de justos
  - un encuentro de hombres rectos
  lexicon: σύναξις / δίκαιοι
  rationale: ‘Reunión’ comunica el sentido de un encuentro congregado sin forzar un término eclesiástico más técnico. ‘Hombres justos’ sigue de cerca la referencia personal del griego y mantiene el paralelo moral de δικαίων; ‘justos’ solo sería también posible, pero ‘hombres justos’ preserva mejor el matiz humano del grupo.
- source_word: double-minded
  english_pob_choice: double-minded
  chosen_spanish: de doble ánimo
  alternatives_spanish:
  - de mente dividida
  - vacilantes
  lexicon: δίψυχοι
  rationale: ‘De doble ánimo’ es una solución tradicional y comprensible en español para la duplicidad interior del término. ‘Mente dividida’ explicita más el aspecto cognitivo, pero ‘ánimo’ conserva el tono moral y volitivo del griego.
- source_word: empty
  english_pob_choice: empty
  chosen_spanish: vacíos
  alternatives_spanish:
  - vacíos de verdad
  - vanos
  lexicon: κενοί
  rationale: '‘Vacíos’ reproduce la imagen literal y el juego repetido del pasaje: personas vacías, habla vacía, recipiente vacío. ‘Vanos’ sería idiomático, pero debilita la metáfora material del texto.'
- source_word: he prophesies to them in a corner
  english_pob_choice: he prophesies to them in a corner
  chosen_spanish: les profetiza en un rincón
  alternatives_spanish:
  - les profetiza a escondidas
  - les profetiza en secreto
  lexicon: ἐν γωνίᾳ προφητεύει
  rationale: ‘En un rincón’ mantiene la imagen espacial concreta del griego y del inglés POB. La alternativa ‘a escondidas’ interpreta la intención, pero el texto enfatiza primero el lugar, no solo el ocultamiento.
- source_word: according to their desires
  english_pob_choice: according to their desires
  chosen_spanish: conforme a sus deseos
  alternatives_spanish:
  - según sus deseos
  - de acuerdo con sus deseos
  lexicon: κατὰ τὰς ἐπιθυμίας αὐτῶν
  rationale: ‘Conforme a’ conserva el registro formal y la dependencia directa del patrón griego, sin perder claridad en español.
- source_word: empty vessel
  english_pob_choice: an empty vessel
  chosen_spanish: un recipiente vacío
  alternatives_spanish:
  - un vaso vacío
  - un vaso hueco
  lexicon: σκεῦος κενόν
  rationale: ‘Recipiente’ expresa el sentido general del objeto sin limitarlo a ‘vaso’, que en español puede sugerir una forma más estrecha. La repetición de ‘vacío’ mantiene la coherencia metafórica.
- source_word: agree with one another
  english_pob_choice: they agree with one another
  chosen_spanish: concuerdan unos con otros
  alternatives_spanish:
  - están de acuerdo entre sí
  - se corresponden entre sí
  lexicon: συμφωνοῦσιν
  rationale: ‘Concuerdan’ conserva la idea de armonía o coincidencia mutua y evita la banalización de ‘estar de acuerdo’, que en español puede sonar demasiado abstracto para una imagen de recipientes.
theological_decisions:
- issue: Characterization of the righteous group versus the deceptive group
  english_pob_reading: He avoids a gathering of righteous men and targets the double-minded and empty.
  chosen_spanish_reading: No se acerca a una reunión de hombres justos, sino que los evita; se aferra a los de doble ánimo y a los vacíos.
  alternative_spanish_readings:
  - No se acerca a la asamblea de los justos, sino que la rehúye
  - se pega a los inconstantes y vacíos
  rationale: 'El texto contrapone dos comunidades morales: la de los justos y la de los vacíos/dobles. La traducción conserva esa antítesis sin intensificarla ni suavizarla. ‘Se aferra’ reproduce la persistencia adhesiva del engañador, importante para la lógica moral del pasaje.'
  doctrine_reference: Discernimiento moral y oposición entre justos y engañadores en literatura cristiana primitiva.
- issue: Meaning of ‘prophets to them in a corner’ and deceptive speech
  english_pob_reading: He prophesies to them in a corner, and deceives them by speaking everything according to their desires, emptily.
  chosen_spanish_reading: Les profetiza en un rincón, y los engaña hablando todo conforme a sus deseos, vacíamente.
  alternative_spanish_readings:
  - les habla proféticamente a escondidas
  - los engaña diciendo lo que quieren oír
  rationale: 'Se mantiene la conexión entre profecía y engaño: no toda profecía es verdadera, sino que aquí funciona como vehículo de seducción. ‘Vacíamente’ conserva el énfasis en la vaciedad del contenido, no solo en el ocultamiento del acto.'
  doctrine_reference: Falsedad profética y discernimiento de espíritus en el cristianismo primitivo.
- issue: Image of the empty vessel among empty ones
  english_pob_reading: For an empty vessel, placed together with empty ones, is not broken, but they agree with one another.
  chosen_spanish_reading: Pues un recipiente vacío, puesto junto con los vacíos, no se rompe, sino que concuerdan unos con otros.
  alternative_spanish_readings:
  - un vaso vacío junto con otros vacíos no se quiebra
  - los vacíos no se dañan entre sí
  rationale: 'La imagen final explica por qué el engañador se mueve entre los vacíos: hay afinidad entre iguales. Se conserva la metáfora física sin convertirla en una glosa psicológica. ‘No se rompe’ sigue de cerca la imagen de fragilidad del recipiente.'
  doctrine_reference: Ajuste moral entre el engañador y quienes aceptan el engaño.
translation_notes:
  revision_awareness: Sin revisiones previas aplicadas en este segmento; la versión española sigue de cerca el sentido del inglés POB y del griego subyacente, preservando la imaginería de vacío, duplicidad y concordancia.
  spanish_consistency_notes:
  - Se usa ‘vacíos’ de manera consistente para κενοί y para el campo metafórico relacionado.
  - Se mantiene ‘recipiente’ para la imagen final a fin de no restringir indebidamente el griego a ‘vaso’.
  - ‘De doble ánimo’ se emplea como equivalente idiomático estable para δίψυχοι en un registro bíblico comprensible.
