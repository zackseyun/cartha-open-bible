  yaml_path: translation/extra_canonical/shepherd_of_hermas/011/002.yaml
  text: She said, "Many indeed will hear; and, having heard, some of them will rejoice, but some will weep. But even these, if they hear and repent, they too will rejoice. Therefore listen to the parables of the tower, for I will reveal everything to you. And no longer cause me trouble about revelations, for these revelations have an end, for they have been completed. But you will not stop asking for revelations, for you are shameless."
translation:
  language: es
  text: 'Ella dijo: «Muchos, en verdad, oirán; y, habiendo oído, unos de ellos se alegrarán, pero otros llorarán. Pero aun estos, si oyen y se arrepienten, también ellos se alegrarán. Por tanto, escucha las parábolas de la torre, porque te revelaré todo. Y ya no me causes más molestia por las revelaciones, porque estas revelaciones tienen fin, pues se han completado. Pero tú no dejarás de pedir revelaciones, porque eres descarado».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀκούσουσιν / ἀκούσαντες
  english_pob_choice: hear / having heard
  chosen_spanish: oirán / habiendo oído
  alternatives_spanish:
  - escucharán / después de escuchar
  - oirán / al oír
  lexicon: ἀκούω
  rationale: Conservo la base semántica de 'oír' para reflejar el simple acto de recibir el mensaje; 'escuchar' podría sugerir atención voluntaria que el griego no exige aquí. 'Habiendo oído' reproduce bien el participio temporal sin añadir matices.
- source_word: ἐπὶ τούτοις
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - éstos
  - aun ellos
  lexicon: οὗτος
  rationale: '''Estos'' mantiene la referencia cercana a los que ya oyeron pero reaccionarán después. En español es natural y evita una expansión interpretativa.'
- source_word: χαρήσονται
  english_pob_choice: will rejoice
  chosen_spanish: se alegrarán
  alternatives_spanish:
  - gozarán
  - se regocijarán
  lexicon: χαίρω
  rationale: '''Alegrarse'' transmite el sentido común y es más natural en español contemporáneo que ''regocijarse'', sin perder la idea de gozo.'
- source_word: μετανοήσωσιν
  english_pob_choice: repent
  chosen_spanish: se arrepienten
  alternatives_spanish:
  - se convierten
  - cambian de mente
  lexicon: μετανοέω
  rationale: En este contexto de respuesta moral a un mensaje escuchado, 'arrepentirse' expresa adecuadamente el giro de conducta y voluntad. 'Cambian de mente' sería más técnico pero menos idiomático para el lector general.
- source_word: παραβολὰς τοῦ πύργου
  english_pob_choice: the parables of the tower
  chosen_spanish: las parábolas de la torre
  alternatives_spanish:
  - las alegorías de la torre
  - las comparaciones de la torre
  lexicon: παραβολή
  rationale: '''Parábolas'' es la equivalencia más estable y transparente para παραβολή en este tipo de literatura simbólica, y mantiene la formulación del texto base.'
- source_word: ὑβριστής
  english_pob_choice: shameless
  chosen_spanish: descarado
  alternatives_spanish:
  - insolente
  - sin vergüenza
  lexicon: ὑβριστής
  rationale: '''Descarado'' preserva la fuerza de reproche personal y la idea de falta de pudor/inhibición. ''Sin vergüenza'' es posible, pero ''descarado'' suena más natural en diálogo directo y conserva la aspereza del original.'
theological_decisions:
- issue: 'Respuesta dual a la predicación: algunos se alegran, otros lloran, pero aun los que oyen y se arrepienten pueden alegrarse.'
  english_pob_reading: Many indeed will hear... some will rejoice, but some will weep. But even these, if they hear and repent, they too will rejoice.
  chosen_spanish_reading: Muchos, en verdad, oirán... unos de ellos se alegrarán, pero otros llorarán. Pero aun estos, si oyen y se arrepienten, también ellos se alegrarán.
  alternative_spanish_readings:
  - '...si escuchan y se arrepienten...'
  - '...si oyen y hacen penitencia...'
  rationale: 'Mantengo la tensión del texto: no todos reaccionan igual ante el mensaje, pero el arrepentimiento sigue abierto incluso para los que primero lloran. Evito ''penitencia'' por su carga confesional posterior, no presente en el griego ni en el audit trail inglés.'
  doctrine_reference: Arrepentimiento y respuesta al anuncio; no supone una soteriología posterior, sino la dinámica moral del pasaje.
- issue: Finalidad/cierre de las revelaciones
  english_pob_reading: these revelations have an end, for they have been completed.
  chosen_spanish_reading: estas revelaciones tienen un fin, pues se han cumplido.
  alternative_spanish_readings:
  - estas revelaciones terminan, pues se han completado
  - estas revelaciones han acabado, pues se han cumplido
  rationale: '''Tienen un fin'' conserva la idea de límite o término; ''se han cumplido'' expresa que ya llegaron a su plena realización. Juntas reflejan el doble aspecto del enunciado sin suavizarlo.'
  doctrine_reference: Cierre de la serie visionaria; no implica un principio canónico general fuera de este pasaje.
- issue: Reprensión por pedir más revelaciones
  english_pob_reading: for you are shameless.
  chosen_spanish_reading: porque eres descarado.
  alternative_spanish_readings:
  - porque no tienes vergüenza
  - porque eres insolente
  rationale: La reprensión directa del griego se conserva con una palabra coloquial fuerte pero comprensible. Evito atenuar el reproche para no perder el tono del diálogo.
  doctrine_reference: Tono exhortativo y correctivo del interlocutor visionario.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete; el texto sigue el estado de alta concordancia (0.95) entre el original griego normalizado y la traducción inglesa POB auditada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiere; aquí no aparece ninguna referencia al nombre divino.
  - Se usa 'revelaciones' de forma consistente para ἀποκαλύψεις, evitando 'apocalipsis' como género o título.
  - Se conserva el paralelismo sintáctico del original con coordinaciones simples para facilitar lectura pública.
  - Se emplea puntuación de diálogo española con comillas angulares y dos puntos tras el verbo de decir.
