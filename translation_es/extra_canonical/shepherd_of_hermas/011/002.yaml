review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego y del audit trail inglés: contrasta las reacciones de quienes oyen, mantiene la posibilidad de arrepentimiento para ''estos'', conserva la orden de escuchar las parábolas de la torre, el cierre de las revelaciones y la reprensión final. No hay desvíos teológicos relevantes.'
  spanish_quality_summary: El español es claro y digno, pero tiene dos puntos mejorables para naturalidad y precisión. 'Acerca de las revelaciones' suena algo menos idiomático que 'por las revelaciones' o 'sobre las revelaciones' en este contexto de importunar con peticiones. Además, 'se han cumplido' aplicado a 'revelaciones' resulta algo extraño en español; 'se han completado' expresa mejor la idea de que han llegado a su término.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Se arrepienten' para μετανοήσωσιν y 'parábolas' para παραβολὰς son adecuados. 'Descarado' para ὑβριστής es defendible y conserva el tono de reprensión.
  issues:
  - severity: medium
    issue: '''se han cumplido'' con ''revelaciones'' suena poco natural y puede sugerir cumplimiento profético más que finalización de la serie visionaria.'
    rationale: El inglés auditado dice 'have been completed'. En español, 'estas revelaciones tienen fin, pues se han completado' preserva mejor la noción de conclusión/completitud del conjunto.
  - severity: low
    issue: '''acerca de las revelaciones'' es comprensible, pero algo rígido en una reprensión conversacional.'
    rationale: Una formulación como 'por las revelaciones' o 'sobre las revelaciones' fluye mejor en español y encaja con 'no me causes más molestia'.
  revised_spanish_text: 'Ella dijo: «Muchos, en verdad, oirán; y, habiendo oído, unos de ellos se alegrarán, pero otros llorarán. Pero aun estos, si oyen y se arrepienten, también ellos se alegrarán. Por tanto, escucha las parábolas de la torre, porque te revelaré todo. Y ya no me causes más molestia por las revelaciones, porque estas revelaciones tienen fin, pues se han completado. Pero tú no dejarás de pedir revelaciones, porque eres descarado».'
  revision_rationale: 'La revisión es menor: mejora la naturalidad idiomática y ajusta mejor la idea de finalización de las revelaciones sin cambiar el sentido base del texto ni sus decisiones léxicas principales.'
