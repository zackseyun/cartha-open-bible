base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/011/004.yaml
  text: I say to her, "Lady, since once for all you considered me worthy for everything to be revealed to me, reveal it." She says to me, "Whatever can be revealed to you will be revealed. Only let your heart be toward God, and do not be double-minded in whatever you see."
translation:
  language: es
  text: 'Le digo: «Señora, puesto que de una vez por todas me has considerado digno[a] de que todo me sea revelado, revélalo».


    Ella me dice: «Todo lo que pueda serte revelado te será revelado. Solo ten tu corazón puesto en Dios, y no seas de doble ánimo[b] en nada de lo que veas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Digno» traduce el valor de aptitud/aceptación de ἄξιος; también podría entenderse como «merecedor», pero «digno» es más natural en español bíblico contemporáneo.
    reason: lexical_alternative
  - marker: b
    text: «De doble ánimo» conserva la fuerza de δίψυχος; una alternativa más llana sería «vacilante» o «de ánimo dividido».
    reason: lexical_alternative
lexical_decisions:
- source_word: Lady
  english_pob_choice: Lady
  chosen_spanish: Señora
  alternatives_spanish:
  - Dama
  - Señora mía
  lexicon: κύριε/δέσποινα (vocative de respeto)
  rationale: En español, «Señora» conserva el vocativo respetuoso y natural del griego/inglés sin introducir un matiz cortesano excesivo. «Dama» suena menos idiomático aquí.
- source_word: worthy
  english_pob_choice: worthy
  chosen_spanish: digno[a]
  alternatives_spanish:
  - merecedor[a]
  - apto/a
  lexicon: ἄξιος
  rationale: «Digno» reproduce bien la valoración de mérito/aptitud ante una revelación. Se mantiene la concordancia femenina implícita en el interlocutor griego mediante la forma de cita respetuosa en español.
- source_word: revealed
  english_pob_choice: be revealed
  chosen_spanish: serme revelado / te será revelado
  alternatives_spanish:
  - ser mostrado
  - ser dado a conocer
  lexicon: ἀποκαλύπτω
  rationale: «Revelar» es la opción más directa y sobria para ἀποκαλύπτω. La pasiva mantiene la idea de algo que Dios permite conocer, sin añadir explicación interpretativa.
- source_word: heart be toward God
  english_pob_choice: let your heart be toward God
  chosen_spanish: deja tu corazón hacia Dios
  alternatives_spanish:
  - mantén tu corazón en Dios
  - ten tu corazón puesto en Dios
  lexicon: καρδία + πρός/εἰς θεόν
  rationale: Se conserva la imagen direccional de orientación interior. «Hacia Dios» evita convertir la frase en una paráfrasis devocional más expansiva.
- source_word: double-minded
  english_pob_choice: double-minded
  chosen_spanish: de doble ánimo
  alternatives_spanish:
  - vacilante
  - indeciso/a
  lexicon: δίψυχος
  rationale: «De doble ánimo» es una expresión ya asentada y bastante fiel para la inestabilidad interior de δίψυχος. Aunque suena más tradicional, comunica mejor la tensión lexical que «indeciso».
theological_decisions:
- issue: Afirmación de revelación condicionada por disposición interior
  english_pob_reading: Whatever can be revealed to you will be revealed. Only let your heart be toward God, and do not be double-minded in whatever you see.
  chosen_spanish_reading: Todo lo que pueda serte revelado te será revelado. Solo deja tu corazón hacia Dios, y no seas de doble ánimo en nada de lo que veas.
  alternative_spanish_readings:
  - Solo mantén tu corazón en Dios
  - no vaciles en nada de lo que veas
  rationale: La formulación conserva la condición espiritual sin convertirla en una exhortación doctrinal más amplia de lo que el texto ofrece. «Deja tu corazón hacia Dios» retiene la orientación interna como requisito de recepción de la visión.
  doctrine_reference: Discernimiento/revelación; exhortación a la fidelidad interior
- issue: Tensión semántica de δίψυχος
  english_pob_reading: do not be double-minded
  chosen_spanish_reading: no seas de doble ánimo
  alternative_spanish_readings:
  - no seas vacilante
  - no seas de ánimo dividido
  rationale: El español «de doble ánimo» preserva la imagen de una interioridad partida sin diluirla en mera indecisión momentánea. Mantiene la advertencia moral y espiritual del original.
  doctrine_reference: Integridad interior; constancia en la fe
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete; la redacción sigue el texto griego normalizado y el acuerdo alto del auditor inglés, manteniendo la sintaxis breve y exhortativa del pasaje.
  spanish_consistency_notes:
  - Se usa «Dios» sin máscara litúrgica porque el contexto no contiene κύριος como sustituto del nombre divino.
  - Se mantiene el vocativo «Señora» para preservar el registro reverente del interlocutor.
  - Se conserva la pasiva «ser revelado» para no expandir el sentido de ἀποκαλύπτω.
  - No se introducen notas textuales porque el paquete no indica variantes manuscritas relevantes.
