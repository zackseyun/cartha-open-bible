base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/011/005.yaml
  text: 'I asked her, "Why has the tower been built upon the waters, lady?" She says, "I told you before also, and you inquire diligently; therefore, by inquiring, you find the truth. Why, then, the tower has been built upon the waters—listen: because your life was saved through water and will be saved. And the tower has been founded by the word of the almighty and glorious Name, and is held fast by the unseen power of the Master."'
translation:
  language: es
  text: 'Le pregunté: «¿Por qué se ha edificado la torre sobre las aguas, Señora?». Ella dice: «Ya te lo dije antes también, y preguntas con diligencia; por eso, al preguntar, encuentras la verdad. Escucha, entonces, por qué la torre ha sido edificada sobre las aguas: porque tu vida fue salvada por medio del agua y será salvada. Y la torre ha sido fundada por la palabra del Nombre todopoderoso y glorioso, y se mantiene firme por el poder invisible del Señor».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπὶ τῶν ὑδάτων
  english_pob_choice: upon the waters
  chosen_spanish: sobre las aguas
  alternatives_spanish:
  - encima de las aguas
  - sobre el agua
  lexicon: ἐπί + genitivo
  rationale: «Sobre las aguas» conserva la relación espacial del griego y la formulación de la versión inglesa, sin volverla innecesariamente rígida.
- source_word: πύργος
  english_pob_choice: tower
  chosen_spanish: torre
  alternatives_spanish:
  - torre fortificada
  - edificio
  lexicon: πύργος
  rationale: «Torre» es la correspondencia directa y transparente en español, y mantiene la imagen simbólica del texto.
- source_word: ὕδωρ
  english_pob_choice: waters / water
  chosen_spanish: aguas / agua
  alternatives_spanish:
  - las aguas
  - el agua
  lexicon: ὕδωρ
  rationale: En la primera mención, el plural «las aguas» sigue de cerca el griego y el inglés; luego, «agua» en «por medio del agua» suena más natural en español y preserva el sentido sacramental o salvífico del pasaje.
- source_word: κύριος
  english_pob_choice: Master
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: κύριος
  rationale: Aquí el inglés POB opta por «Master», pero en español «Señor» comunica mejor la relación de autoridad y evita un giro poco natural. Dado el contexto de una fórmula elevada («Nombre todopoderoso y glorioso»), se mantiene la mayúscula reverencial.
- source_word: ὄνομα
  english_pob_choice: Name
  chosen_spanish: Nombre
  alternatives_spanish:
  - nombre
  lexicon: ὄνομα
  rationale: Se conserva «Nombre» con mayúscula para reflejar el valor reverencial del griego y del inglés POB, y su vínculo con una expresión titulativa.
- source_word: παντοκράτωρ
  english_pob_choice: almighty
  chosen_spanish: todopoderoso
  alternatives_spanish:
  - omnipotente
  - todopoderoso
  lexicon: παντοκράτωρ
  rationale: «Todopoderoso» es la opción más estable y litúrgicamente comprensible en español para παντοκράτωρ, sin perder la fuerza de soberanía total.
- source_word: ἔνδοξος
  english_pob_choice: glorious
  chosen_spanish: glorioso
  alternatives_spanish:
  - lleno de gloria
  - glorioso
  lexicon: ἔνδοξος
  rationale: «Glorioso» reproduce el calificativo del nombre divino con naturalidad en español y concordancia con la tradición de traducción.
- source_word: ἡ σωτηρία σου διὰ τοῦ ὕδατος ἐσώθη καὶ σωθήσεται
  english_pob_choice: your life was saved through water and will be saved
  chosen_spanish: tu vida fue salvada por medio del agua y será salvada
  alternatives_spanish:
  - tu vida fue salvada por el agua y será salvada
  - tu vida fue preservada por medio del agua y será preservada
  lexicon: σῴζω
  rationale: El inglés POB traduce de forma dinámica «your life» para el efecto contextual. En español se mantiene «tu vida» para conservar el mismo alcance interpretativo, y «fue salvada / será salvada» reproduce σῴζω con su tensión salvífica sin diluirla en un mero «preservar».
- source_word: ἡ οἰκοδομὴ τοῦ πύργου
  english_pob_choice: the tower has been founded
  chosen_spanish: la torre ha sido fundada
  alternatives_spanish:
  - la torre ha sido edificada
  - la construcción de la torre ha sido fundada
  lexicon: θεμελιόω / οἰκοδομή
  rationale: «Fundada» sigue la idea de establecimiento firme, no solo de construcción material, y preserva la imagen de base/arraigo del pasaje, coherente con el inglés POB.
- source_word: τῷ λόγῳ
  english_pob_choice: by the word
  chosen_spanish: por la palabra
  alternatives_spanish:
  - por el Verbo
  - mediante la palabra
  lexicon: λόγος
  rationale: «Por la palabra» mantiene la formulación auditable del griego y del inglés POB sin introducir de manera innecesaria una cristologización de «el Verbo».
- source_word: τῷ ἀοράτῳ δυνάμει
  english_pob_choice: by the unseen power
  chosen_spanish: por el poder invisible
  alternatives_spanish:
  - por el poder invisible
  - por la fuerza invisible
  lexicon: ἀόρατος + δύναμις
  rationale: «Invisible» traduce con claridad ἀόρατος y mantiene el contraste con lo visible; «poder» sigue el inglés POB y conserva la resonancia de δύναμις.
theological_decisions:
- issue: “Name” as a reverential divine designation
  english_pob_reading: the tower has been founded by the word of the almighty and glorious Name
  chosen_spanish_reading: la torre ha sido fundada por la palabra del Nombre todopoderoso y glorioso
  alternative_spanish_readings:
  - la torre ha sido fundada por la palabra del nombre todopoderoso y glorioso
  - la torre ha sido fundada por la palabra del Nombre de Dios todopoderoso y glorioso
  rationale: Se conserva «Nombre» con mayúscula para reflejar el peso reverencial del original y del inglés POB, sin añadir «Dios» que el griego de esta cláusula no expresa explícitamente.
  doctrine_reference: Uso reverencial del nombre divino; no expansión innecesaria del texto
- issue: Salvation through water and future salvation
  english_pob_reading: your life was saved through water and will be saved
  chosen_spanish_reading: tu vida fue salvada por medio del agua y será salvada
  alternative_spanish_readings:
  - tu vida fue salvada por el agua y será salvada
  - tu vida fue preservada por medio del agua y será salvada
  rationale: La frase mantiene la tensión entre una salvación pasada y una futura. «Salvada» preserva el lenguaje de rescate/salvación del pasaje sin reducirlo a una mera preservación física.
  doctrine_reference: Soteriología figurativa en literatura cristiana primitiva; mantenimiento de la doble referencia temporal
- issue: “Master” rendered as Señor
  english_pob_reading: by the unseen power of the Master
  chosen_spanish_reading: por el poder invisible del Señor
  alternative_spanish_readings:
  - por el poder invisible del Maestro
  - por el poder invisible del Dueño
  rationale: Aunque el inglés POB emplea «Master», en español «Señor» es la forma más natural y reverente para una autoridad suprema. No altera la idea de dominio/autoridad y evita una lectura demasiado doméstica o pedagógica.
  doctrine_reference: Titulación reverencial de autoridad; registro eclesial en español
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; el texto inglés muestra alto acuerdo y ninguna nota textual o léxica adicional. La propuesta española sigue de cerca ese estado estable, manteniendo las tensiones de salvación, nombre reverencial y poder invisible sin resolverlas prematuramente.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverencial de «Nombre» con mayúscula.
  - Se usa «Señor» como equivalente español natural de «Master» en este contexto, sin introducir «SEÑOR» como convención de ocultamiento del nombre divino.
  - Se conserva la repetición de salvación con dos tiempos verbales («fue salvada» / «será salvada»).
  - No se añaden notas al pie porque no hay variantes textuales o alternativas críticas que requieran anclaje en el texto español.
