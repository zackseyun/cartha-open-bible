base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/011/003.yaml
  text: '"The tower that you see being built, I am the Church, the one shown to you both now and before. Whatever, therefore, you wish to ask about the tower, I will reveal to you, so that you may rejoice with the saints."'
translation:
  language: es
  text: «La torre que ves que se está edificando, yo soy la Iglesia, la misma que te fue mostrada tanto ahora como antes. Así que, cualquier cosa que quieras preguntar acerca de la torre, te la revelar{é}[a], para que te goces con los santos.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «revelaré» conserva el valor de desvelar algo que antes estaba oculto; también podría decirse «te haré saber».
    reason: lexical_alternative
lexical_decisions:
- source_word: πύργος
  english_pob_choice: the tower
  chosen_spanish: la torre
  alternatives_spanish:
  - la torre alta
  - la torre de la visión
  lexicon: πύργος
  rationale: Se mantiene el sustantivo concreto y transparente del original; no hay motivo para simbolizarlo en español más allá de la identificación visionaria ya explícita en el contexto.
- source_word: ἐκκλησία
  english_pob_choice: the Church
  chosen_spanish: la Iglesia
  alternatives_spanish:
  - la asamblea
  - la congregación
  lexicon: ἐκκλησία
  rationale: El POB inglés ya fija ‘Church’; en español ‘Iglesia’ es la correspondencia más natural y reconocible, conservando la identificación eclesiológica que el texto hace de la torre.
- source_word: δειχθεῖσα
  english_pob_choice: shown to you
  chosen_spanish: te fue mostrada
  alternatives_spanish:
  - se te mostró
  - te fue revelada
  lexicon: δείκνυμι
  rationale: ‘Fue mostrada’ conserva la pasividad del griego y evita añadir ‘revelada’ donde el verbo básico es ‘mostrar’.
- source_word: νῦν καὶ πρότερον
  english_pob_choice: both now and before
  chosen_spanish: tanto ahora como antes
  alternatives_spanish:
  - ahora y antes
  - ya ahora y previamente
  lexicon: νῦν / πρότερον
  rationale: La correlación ‘tanto... como...’ reproduce bien el paralelismo temporal sin endurecer el español.
- source_word: ἀποκαλύψω
  english_pob_choice: I will reveal
  chosen_spanish: te la revelaré
  alternatives_spanish:
  - te lo haré saber
  - te lo mostraré
  lexicon: ἀποκαλύπτω
  rationale: ‘Revelaré’ es fiel al sentido de desvelar información oculta; el pronombre ‘la’ retoma ‘la torre’ en español con naturalidad.
- source_word: συγχάρης
  english_pob_choice: you may rejoice with the saints
  chosen_spanish: te goces con los santos
  alternatives_spanish:
  - te alegres con los santos
  - participes del gozo con los santos
  lexicon: συγχαίρω
  rationale: ‘Goces’ conserva el matiz de participación gozosa con otros; ‘regocijarte’ sería posible, pero ‘te goces con’ mantiene una construcción breve y eclesial sin perder el sentido de compartir alegría.
theological_decisions:
- issue: Identificación de la torre con la Iglesia
  english_pob_reading: I am the Church, the one shown to you both now and before.
  chosen_spanish_reading: yo soy la Iglesia, la misma que te fue mostrada tanto ahora como antes.
  alternative_spanish_readings:
  - yo soy la Iglesia, la que te fue mostrada ahora y antes
  - yo soy la Iglesia, la misma que se te mostró antes y ahora
  rationale: Se conserva la autoidentificación directa y la referencia a la misma realidad visionaria mostrada en distintos momentos, sin suavizar la afirmación eclesiológica del texto.
  doctrine_reference: Eclesiología visionaria del Pastor de Hermas; no implica identificación doctrinal con una iglesia local específica.
- issue: Gozo compartido con los santos
  english_pob_reading: so that you may rejoice with the saints
  chosen_spanish_reading: para que te goces con los santos
  alternative_spanish_readings:
  - para que te alegres con los santos
  - para que compartas el gozo con los santos
  rationale: La frase mantiene el horizonte comunitario y santo del gozo, sin reemplazarlo por un matiz meramente interior o individual.
  doctrine_reference: Comunión de los santos / alegría compartida en el pueblo de Dios.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; la versión inglesa de referencia muestra alto acuerdo con la fuente griega, por lo que la redacción española sigue de cerca esa lectura sin introducir variantes textuales no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene «Iglesia» como traducción de ἐκκλησία en coherencia con el POB inglés y con el sentido eclesiológico del pasaje.
  - Se usa «Yahvé» en el proyecto como norma para el nombre divino, pero este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - La puntuación y las comillas se ajustan al uso español; se conserva el orden sintáctico natural sin perder la estructura original.
  - El pronombre enclítico en «revelaré» retoma «la torre» de manera fluida en español y no introduce contenido adicional.
