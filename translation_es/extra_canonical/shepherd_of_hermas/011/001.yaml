  to: 'Después de mostrarme estas cosas, quería irse. Yo le digo: «Señora, ¿de qué me sirve haber visto estas cosas y no saber cuáles son los asuntos?». Respondiéndome, ella dice: «Eres un hombre astuto, que quiere saber las cosas referentes a la torre». «Sí, señora —le digo—, para poder contar estas cosas a los hermanos, y para que, al ponerse más alegres y oír estas cosas, conozcan al Señor con mucha gloria».'
