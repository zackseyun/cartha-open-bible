revisions:
- from: «Ahora bien», dice él, «ustedes están oyendo; guárdenlas, para que aun las mentiras anteriores que dijeron en sus tratos, si estas llegan a comprobarse, también aquellas puedan hacerse creíbles; porque también aquellas pueden hacerse creíbles. Si guardan estas cosas y desde ahora dicen toda la verdad, podrán ganar para sí la vida. Y quienquiera que oiga este mandamiento y se abstenga de la mentira más malvada vivirá para Dios».
  to: «Ahora bien», dice él, «ustedes están oyendo esto; guarden estas cosas, para que aun las mentiras anteriores que dijeron en sus tratos, si estas resultan verdaderas, también aquellas puedan hacerse creíbles; porque también aquellas pueden hacerse creíbles. Si guardan estas cosas y desde ahora dicen toda la verdad, podrán ganar para sí la vida. Y cualquiera que oiga este mandamiento y se abstenga de la mentira más malvada vivirá para Dios».
  rationale: 'La revisión es menor y busca mayor fidelidad y legibilidad: se aclara el objeto de τηρέω con «guarden estas cosas», se conserva mejor ἀκούετε con «están oyendo esto», y se reemplaza «llegan a comprobarse» por «resultan verdaderas», que refleja mejor «are found true» sin introducir una construcción torpe ni un matiz adicional. Se mantiene la repetición sobre la credibilidad, la fuerza moral de «mentira más malvada» y el cierre «vivirá para Dios».'
