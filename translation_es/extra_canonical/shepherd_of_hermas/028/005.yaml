base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/028/005.yaml
  text: ‘Now then,’ he says, ‘you are hearing; keep them, so that even the former lies that you spoke in your dealings, if these are found true, those also may become credible; for those too can become credible. If you keep these and from now on speak all truth, you will be able to gain life for yourself. And whoever hears this command and abstains from the most evil lie will live to God.’
translation:
  language: es
  text: «Ahora bien», dice él, «ustedes están oyendo esto; guarden estas cosas, para que aun las mentiras anteriores que dijeron en sus tratos, si estas resultan verdaderas, también aquellas puedan hacerse creíbles; porque también aquellas pueden hacerse creíbles. Si guardan estas cosas y desde ahora dicen toda la verdad, podrán ganar para sí la vida. Y cualquiera que oiga este mandamiento y se abstenga de la mentira más malvada vivirá para Dios».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀκούετε / hearing
  english_pob_choice: you are hearing
  chosen_spanish: están oyendo
  alternatives_spanish:
  - oyen
  - escuchan
  lexicon: ἀκούω
  rationale: Se conserva el valor presente y continuativo del auditivo de la exhortación; «están oyendo» refleja el proceso en curso que el inglés POB marca con «you are hearing».
- source_word: τήρει / keep
  english_pob_choice: keep them
  chosen_spanish: guárdenlas
  alternatives_spanish:
  - obsérvenlas
  - guárdenlo
  lexicon: τηρέω
  rationale: «Guardar» en español transmite bien la idea de conservar y observar una instrucción; el plural concuerda con los mandatos implícitos del contexto.
- source_word: ψεῦδος / lies
  english_pob_choice: lies
  chosen_spanish: mentiras
  alternatives_spanish:
  - falsedades
  - engaños
  lexicon: ψεῦδος
  rationale: «Mentiras» mantiene fuerza moral directa y es natural en español, sin suavizar el término.
- source_word: τὰ ἔμπροσθεν / former
  english_pob_choice: former
  chosen_spanish: anteriores
  alternatives_spanish:
  - previas
  - de antes
  lexicon: πρότερος / ἔμπροσθεν
  rationale: «Anteriores» expresa la referencia temporal a las mentiras ya dichas, sin añadir matices no presentes.
- source_word: ἀληθεῖς / true
  english_pob_choice: 'true'
  chosen_spanish: se lleguen a comprobarse
  alternatives_spanish:
  - resulten verdaderas
  - se encuentren verdaderas
  lexicon: ἀληθής
  rationale: El contexto no dice que las mentiras sean verdaderas en sí, sino que pueden resultar verificables ante otros; por eso se expresa como comprobación, manteniendo la tensión de credibilidad del pasaje.
- source_word: πισταί / credible
  english_pob_choice: credible
  chosen_spanish: creíbles
  alternatives_spanish:
  - confiables
  - dignas de crédito
  lexicon: πιστός
  rationale: «Creíbles» reproduce la idea de que lo dicho puede recibir crédito. Se evita «verdaderas» para no borrar la distinción entre verdad y credibilidad.
- source_word: ζωὴν κτῆσασθε / gain life
  english_pob_choice: gain life for yourself
  chosen_spanish: podrán ganar para sí la vida
  alternatives_spanish:
  - ganarán la vida para sí
  - obtendrán vida
  lexicon: κτάομαι + ζωή
  rationale: Se conserva el valor de adquisición/obtención y el reflexivo del inglés POB, sin convertirlo en una fórmula doctrinal ajena al griego.
- source_word: ἀπέχεσθαι / abstains
  english_pob_choice: abstains
  chosen_spanish: se abstenga
  alternatives_spanish:
  - se aparte
  - se refrene
  lexicon: ἀπέχω
  rationale: «Abstenerse» es preciso y sobrio para el acto deliberado de no participar en la mentira.
- source_word: τὸ ψεῦδος τὸ πονηρότατον / the most evil lie
  english_pob_choice: the most evil lie
  chosen_spanish: la mentira más malvada
  alternatives_spanish:
  - la mentira más perversa
  - la mentira más nefanda
  lexicon: ψεῦδος + πονηρός
  rationale: «Malvada» mantiene la carga moral intensa del superlativo sin caer en arcaísmo.
theological_decisions:
- issue: Relación entre verdad y credibilidad en las mentiras previas
  english_pob_reading: If these are found true, those also may become credible; for those too can become credible.
  chosen_spanish_reading: si estas llegan a comprobarse, también aquellas puedan hacerse creíbles; porque también aquellas pueden hacerse creíbles.
  alternative_spanish_readings:
  - si estas resultan verdaderas, también aquellas puedan hacerse creíbles
  - si estas se confirman, también aquellas puedan ganar crédito
  rationale: 'Se preserva la tensión del texto: no afirma que la mentira se convierta en verdad, sino que, si las declaraciones previas se verifican en hechos, incluso su reputación de credibilidad puede ser rehabilitada. La duplicación de la idea en el original se conserva para no suavizar la lógica del argumento.'
  doctrine_reference: Hermas, Mandate 3; distinción entre veracidad objetiva y crédito social
- issue: Final soteriological promise
  english_pob_reading: you will be able to gain life for yourself... will live to God
  chosen_spanish_reading: podrán ganar para sí la vida... vivirá para Dios
  alternative_spanish_readings:
  - obtendrán vida... vivirá ante Dios
  - ganarán vida... vivirá para Dios
  rationale: Se mantiene la formulación ética y exhortativa del texto, sin introducir una doctrina sistemática externa. «Vivir para Dios» conserva la dirección relacional del final griego/inglés.
  doctrine_reference: Hermas, ética de obediencia y vida para Dios
translation_notes:
  revision_awareness: 'Corregido para eliminar el problema de validación anterior: no se incluyen notas al pie no ancladas en el texto. La redacción mantiene el sentido del pasaje y la tensión entre verdad, credibilidad y vida sin agregar marcadores huérfanos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «mentira»/«mentiras» para ψεῦδος conforme al tono moral del pasaje.
  - Se conserva el paralelismo retórico del original en la repetición de la idea de credibilidad.
  - «Para Dios» traduce el dativo final sin sustituirlo por una fórmula litúrgica más interpretativa.
