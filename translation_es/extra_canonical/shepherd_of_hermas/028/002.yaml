base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/028/002.yaml
  text: Therefore those who lie reject the Lord and become defrauders of the Lord, not handing back to him the deposit that they received. For they received from him a spirit without falsehood. If they return it false, they have defiled the command of the Lord and have become defrauders.
translation:
  language: es
  text: Por tanto, los que mienten rechazan al Señor y se convierten en defraudadores del Señor, al no devolverle el depósito que recibieron. Porque de él recibieron un espíritu sin falsedad. Si lo devuelven falsamente, han profanado el mandamiento del Señor y se han convertido en defraudadores.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ψεύδονται / lie
  english_pob_choice: lie
  chosen_spanish: mienten
  alternatives_spanish:
  - dicen mentira
  - engañan con mentira
  lexicon: ψεύδομαι
  rationale: El contexto contrasta la verdad recibida con devolverla 'falsamente'; en español 'mienten' expresa la acción básica sin sobrecargar el verso con una construcción más pesada. 'Dicen mentira' suena menos natural; 'engañan con mentira' añade matiz no explícito en el griego.
- source_word: ἀθετοῦσιν / reject
  english_pob_choice: reject
  chosen_spanish: rechazan
  alternatives_spanish:
  - anulan
  - desestiman
  lexicon: ἀθετέω
  rationale: En este contexto, la negación no es solo intelectual sino de lealtad y obediencia. 'Rechazan' comunica bien el desprecio activo por el Señor; 'anulan' sería más técnico y menos directo en español.
- source_word: κύριον / Lord
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  - Yahvé
  lexicon: κύριος
  rationale: Aquí el griego se refiere al Señor en el marco cristiano del pasaje; en español 'el Señor' preserva el título reverente y el vínculo con el audit trail inglés. No se usa 'Yahvé' porque no hay un caso claro de sustitución del nombre divino en una cita del Tanaj, sino una referencia cristológica/devocional del texto.
- source_word: ἀλλοτριοῦνται / become defrauders
  english_pob_choice: become defrauders
  chosen_spanish: se convierten en defraudadores
  alternatives_spanish:
  - se vuelven extraños
  - se hacen ajenos
  lexicon: ἀλλοτριοῦν
  rationale: La idea no es solo 'extrañarse' sino pasar a ser culpables de fraude o apropiación indebida. 'Defraudadores' conserva la fuerza moral y legal que el inglés POB quiso transmitir.
- source_word: τὴν παραθήκην / the deposit
  english_pob_choice: the deposit
  chosen_spanish: el depósito
  alternatives_spanish:
  - el encargo
  - la encomienda
  lexicon: παραθήκη
  rationale: '''Depósito'' es el equivalente directo y mantiene la imagen de algo confiado para ser devuelto intacto. ''Encargo'' pierde el matiz de custodia.'
- source_word: πνεῦμα ἀψευδές / spirit without falsehood
  english_pob_choice: a spirit without falsehood
  chosen_spanish: un espíritu sin falsedad
  alternatives_spanish:
  - un espíritu veraz
  - un espíritu sin engaño
  lexicon: ἀψευδής
  rationale: '''Sin falsedad'' sigue de cerca el sentido literal y conserva la tensión ética del pasaje. ''Veraz'' sería más idiomático, pero borra la imagen de ausencia de falsedad que el griego enfatiza.'
- source_word: ἐὰν ἀποδώσωσιν αὐτὸ ψευδῶς / If they return it false
  english_pob_choice: If they return it false
  chosen_spanish: Si lo devuelven falsamente
  alternatives_spanish:
  - Si lo restituyen con falsedad
  - Si lo entregan con engaño
  lexicon: ψευδῶς
  rationale: El adverbio puede referirse al modo de la devolución, no al objeto. 'Falsamente' mantiene la relación con 'sin falsedad' y evita interpretar demasiado.
- source_word: ἐμίαναν τὴν ἐντολὴν / have defiled the command
  english_pob_choice: have defiled the command
  chosen_spanish: han profanado el mandamiento
  alternatives_spanish:
  - han contaminado el mandamiento
  - han manchado el mandamiento
  lexicon: μιαίνω
  rationale: '''Profanado'' en español bíblico comunica bien la contaminación ritual/moral de algo santo o mandado por Dios. ''Contaminado'' es posible, pero pierde la resonancia cultual.'
- source_word: ἐντολή / command
  english_pob_choice: command
  chosen_spanish: mandamiento
  alternatives_spanish:
  - orden
  - precepto
  lexicon: ἐντολή
  rationale: '''Mandamiento'' es la forma más estable en español bíblico para un precepto divino. ''Orden'' suena demasiado administrativo.'
theological_decisions:
- issue: La relación entre mentir y traicionar al Señor mediante el 'depósito' recibido
  english_pob_reading: Those who lie reject the Lord and become defrauders of the Lord, not handing back to him the deposit that they received.
  chosen_spanish_reading: Los que mienten no solo faltan a la verdad, sino que rechazan al Señor y se vuelven culpables de defraudarlo al no devolver intacto lo que recibieron de él.
  alternative_spanish_readings:
  - Los que mienten repudian al Señor y le son infieles al no restituir lo confiado.
  - Los que mienten se apartan del Señor al no devolver el depósito recibido.
  rationale: El pasaje une el pecado verbal con una infidelidad de custodia. La formulación española conserva ese enlace sin convertirlo en una explicación doctrinal extraña al texto.
  doctrine_reference: Fidelidad/infidelidad ante Dios; custodia de lo recibido; ética de la verdad.
- issue: El sentido de 'un espíritu sin falsedad' como don recibido de Dios
  english_pob_reading: For they received from him a spirit without falsehood.
  chosen_spanish_reading: Porque de él recibieron un espíritu sin falsedad.
  alternative_spanish_readings:
  - Porque recibieron de él un espíritu veraz.
  - Pues recibieron de él un espíritu que no miente.
  rationale: 'La frase mantiene la ambigüedad controlada del original: puede aludir al don interior recibido como principio de veracidad, sin precisar más de lo que el texto dice.'
  doctrine_reference: Verdad como don y obligación moral; integridad del espíritu.
- issue: La 'profanación' del mandamiento por una devolución falsa
  english_pob_reading: If they return it false, they have defiled the command of the Lord and have become defrauders.
  chosen_spanish_reading: Si lo devuelven falsamente, han profanado el mandamiento del Señor y se han convertido en defraudadores.
  alternative_spanish_readings:
  - Si lo devuelven con engaño, han contaminado el mandamiento del Señor.
  - Si lo restituyen falsamente, han violado el mandamiento del Señor.
  rationale: '''Profanado'' preserva la gravedad sagrada y ética del acto. ''Violado'' es verdadero, pero menos rico en la dimensión de contaminación moral que la raíz griega sugiere.'
  doctrine_reference: Santificación de la obediencia; pecado como profanación de lo santo.
translation_notes:
  revision_awareness: 'No applied revisions are recorded for this unit. The Spanish draft therefore follows the current English POB audit translation closely while checking the Greek source for lexical force and maintaining the same ethical flow: mentira, rechazo del Señor, depósito, espíritu sin falsedad, devolución falsa, profanación del mandamiento, y defraudación.'
  spanish_consistency_notes:
  - Se mantiene 'el Señor' para κύριος en coherencia con el tono cristiano del pasaje.
  - Se usa 'depósito' para παραθήκη, evitando 'encargo' para no diluir la imagen de custodia.
  - '''Defraudadores'' traduce la consecuencia moral del verbo, no una mera extrañeza relacional.'
  - No se añade puntuación interpretativa ni glosas que alteren la brevedad sentenciosa del original.
