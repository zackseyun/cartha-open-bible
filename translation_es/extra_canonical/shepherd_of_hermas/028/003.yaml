  text: So when I heard these things, I wept greatly. But seeing me weeping, he says, ‘Why are you weeping?’ ‘Because, sir,’ I say, ‘I do not know whether I can be saved.’ ‘Why?’ he says. ‘For,’ I say, ‘sir, never yet in my life have I spoken a true word, but I have always lived deceitfully with everyone, and I made my lie appear true before all people; and no one ever contradicted me, but my word was believed. How then,’ I say, ‘sir, can I live, having done these things?’
translation:
  language: es
  text: 'Entonces, al oír estas cosas, lloré mucho. Pero al verme llorando, me dice: «¿Por qué lloras?». «Porque, señor —digo yo—, no sé si podré ser salvado». «¿Por qué?», dice. «Porque —digo yo—, señor, nunca en toda mi vida he dicho una palabra verdadera, sino que siempre he vivido engañosamente con todos; e hice que mi mentira pareciera verdadera ante todos, y nadie me contradijo jamás, sino que se creía mi palabra. ¿Cómo, pues —digo yo—, señor, puedo vivir, habiendo hecho estas cosas?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔκλαυσα πολὺ
  english_pob_choice: I wept greatly
  chosen_spanish: lloré mucho
  alternatives_spanish:
  - lloré grandemente
  - me eché a llorar mucho
  lexicon: κλαίω
  rationale: El griego expresa llanto abundante; «lloré mucho» conserva la intensidad de manera natural en español moderno. «Grandemente» suena más calco que publicación-readable.
- source_word: κύριε
  english_pob_choice: sir
  chosen_spanish: señor
  alternatives_spanish:
  - señor mío
  - maestro
  lexicon: κύριος
  rationale: Aquí el interlocutor es una figura respetada en diálogo directo, no una referencia al nombre divino; por eso «señor» comunica cortesía y mantiene el registro del español.
- source_word: σῴζεσθαι
  english_pob_choice: can be saved
  chosen_spanish: podré ser salvado
  alternatives_spanish:
  - podré ser salvo
  - podré obtener salvación
  lexicon: σῴζω
  rationale: «Ser salvado» conserva la pasiva y la fuerza de agencia externa del verbo. «Ser salvo» es posible, pero «salvado» suena más directo en este contexto narrativo.
- source_word: ψευδῆ λόγον
  english_pob_choice: a true word / lie appear true
  chosen_spanish: una palabra verdadera / hiciera que mi mentira pareciera verdadera
  alternatives_spanish:
  - una palabra veraz / hiciera pasar mi mentira por verdadera
  - una palabra cierta / presentara mi mentira como verdadera
  lexicon: ψεῦδος / ἀληθής
  rationale: El contraste del texto entre verdad y mentira debe mantenerse explícito. «Palabra verdadera» y «mi mentira pareciera verdadera» reproducen bien la tensión semántica sin forzar el castellano.
- source_word: μετὰ πάντων
  english_pob_choice: with everyone
  chosen_spanish: con todos
  alternatives_spanish:
  - con todo el mundo
  - con todos los demás
  lexicon: πᾶς
  rationale: «Con todos» es breve y fiel al alcance universal del griego. Evita añadir matices no presentes en el pasaje.
- source_word: ἐπιστεύετο
  english_pob_choice: my word was believed
  chosen_spanish: mi palabra era creída
  alternatives_spanish:
  - se creía mi palabra
  - mi palabra era aceptada
  lexicon: πιστεύω
  rationale: La pasiva «era creída» conserva el hecho narrado sin convertirlo en una generalización. Además mantiene el paralelismo con la anterior afirmación sobre su mentira aceptada.
theological_decisions:
- issue: Posible tensión entre confesión moral extrema y posibilidad de salvación
  english_pob_reading: I do not know whether I can be saved
  chosen_spanish_reading: no sé si podré ser salvado
  alternative_spanish_readings:
  - no sé si podré ser salvo
  - no sé si tendré salvación
  rationale: Se mantiene la incertidumbre personal expresada por el narrador sin resolverla teológicamente. El texto presenta angustia y temor, no una doctrina sistemática sobre el estado final del personaje.
  doctrine_reference: soteriología narrativa; no dogmatizar más allá del pasaje
- issue: Contraste ético entre verdad y mentira como rasgo del hablante
  english_pob_reading: never yet in my life have I spoken a true word, but I have always lived deceitfully
  chosen_spanish_reading: nunca en toda mi vida he dicho una palabra verdadera, sino que siempre he vivido con engaño
  alternative_spanish_readings:
  - nunca he dicho verdad en mi vida, sino que siempre he vivido engañosamente
  - jamás he hablado con verdad, sino que siempre he vivido engañando
  rationale: La versión española conserva la autoincriminación total del griego y del inglés POB, sin suavizarla ni exagerarla con vocabulario ajeno al registro del pasaje.
  doctrine_reference: ética del testimonio y veracidad
- issue: Relación entre mentira y credibilidad pública
  english_pob_reading: no one ever contradicted me, but my word was believed
  chosen_spanish_reading: nadie me contradijo jamás, sino que mi palabra era creída
  alternative_spanish_readings:
  - nadie me refutó jamás, sino que mi palabra era aceptada
  - nadie me llevó la contraria jamás, sino que creían mi palabra
  rationale: 'Se conserva el contraste social del relato: su falsedad no fue rebatida y aun así obtuvo aceptación. No se añade juicio sobre la culpabilidad de otros; solo se traduce la experiencia narrada.'
  doctrine_reference: responsabilidad moral y verdad pública
translation_notes:
  revision_awareness: No hay revisiones previas en el paquete. La redacción sigue de cerca el griego normalizado y el sentido del inglés POB, manteniendo el orden narrativo, la repetición de «digo yo», y el contraste verdad/mentira sin introducir elementos interpretativos ajenos al texto.
  spanish_consistency_notes:
  - Se usa «señor» como fórmula de trato, no como título divino.
  - Se evita «SEÑOR» en versificación no bíblica, porque el contexto no alude al nombre divino.
  - «Salvado» mantiene mejor la pasiva griega que una reformulación más libre.
  - El estilo conserva una cadencia sobria y legible para edición eclesial moderna.
