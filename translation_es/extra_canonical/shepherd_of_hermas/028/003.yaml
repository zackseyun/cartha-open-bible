    issue: «siempre he vivido con engaño con todos» es un giro poco natural
    rationale: Aunque comunica la idea general, repite «con» y no expresa con buena fluidez el sentido de vivir engañosamente en trato con todos. «he vivido engañosamente con todos» o «he vivido en engaño con todos» suena más natural y fiel al valor adverbial.
  - severity: low
    issue: «mi palabra era creída» suena forzado en español
    rationale: La pasiva perifrástica conserva la forma, pero en español narrativo «se creía mi palabra» transmite el mismo sentido de manera más idiomática sin pérdida semántica.
  - severity: low
    issue: «delante de toda la gente» puede mejorarse estilísticamente
    rationale: «Ante todos» o «delante de todos» es más natural y más cercano al alcance universal del contexto que «toda la gente», que suena algo redundante.
