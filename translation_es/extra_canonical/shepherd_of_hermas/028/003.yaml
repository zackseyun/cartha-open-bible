revisions:
- from: 'Entonces, al oír estas cosas, lloré mucho. Pero al verme llorando, me dice: «¿Por qué lloras?». «Porque, señor —digo yo—, no sé si podré ser salvado». «¿Por qué?», dice. «Porque —digo yo—, señor, nunca en toda mi vida he dicho una palabra verdadera, sino que siempre he vivido con engaño con todos; y hice que mi mentira pareciera verdadera delante de toda la gente, y nadie me contradijo jamás, sino que mi palabra era creída. ¿Cómo, pues —digo yo—, señor, puedo vivir, habiendo hecho estas cosas?»'
  to: 'Entonces, al oír estas cosas, lloré mucho. Pero al verme llorando, me dice: «¿Por qué lloras?». «Porque, señor —digo yo—, no sé si podré ser salvado». «¿Por qué?», dice. «Porque —digo yo—, señor, nunca en toda mi vida he dicho una palabra verdadera, sino que siempre he vivido engañosamente con todos; e hice que mi mentira pareciera verdadera ante todos, y nadie me contradijo jamás, sino que se creía mi palabra. ¿Cómo, pues —digo yo—, señor, puedo vivir, habiendo hecho estas cosas?»'
  rationale: 'Se hacen ajustes menores de estilo y naturalidad sin cambiar el contenido: «he vivido engañosamente con todos» refleja mejor el sentido del original; «ante todos» fluye mejor que «delante de toda la gente»; y «se creía mi palabra» mantiene el sentido pasivo de aceptación pública en español más idiomático.'
