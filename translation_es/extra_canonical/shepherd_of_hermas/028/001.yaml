review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego y del POB inglés: mandato de amar la verdad, verdad que sale de la boca, el espíritu que Dios hizo habitar en la carne, y la glorificación del Señor que habita en el oyente. Las decisiones clave ἀλήθεια > verdad, σάρξ > carne, κύριος > Señor y ψεύδος > mentira son fieles. La única reserva importante es la frase final «en toda palabra», que suena poco natural en español y conviene ajustar a «en cada palabra» o «en todas sus palabras» para preservar mejor el sentido distributivo.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. Sin embargo, la nota [a] es innecesaria y algo impropia, porque el texto ya usa «espíritu» en minúscula y la nota no aclara una ambigüedad real creada por el español; más bien comenta una opción editorial. También «todos los hombres» puede modernizarse sin pérdida a «todas las personas», en línea con el inglés «all people» y con mejor legibilidad general.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: κύριος se mantiene como «Señor» con razón contextual válida, sin introducir «Yahvé» indebidamente; πνεῦμα queda como «espíritu» en minúscula, lo cual es defendible aquí; σάρξ como «carne» preserva la tensión antropológica; ἀλήθεια como «verdad» y ψεύδος como «mentira» son opciones adecuadas. No hay conflicto relevante con los defaults.'
  issues:
  - severity: medium
    issue: «en toda palabra» suena poco idiomático en español
    rationale: Aunque calca aceptablemente el inglés, en español bíblico moderno «verdadero en cada palabra» o «en todas sus palabras» comunica mejor el valor distributivo sin rigidez.
  - severity: low
    issue: La nota [a] sobre «espíritu» no es necesaria
    rationale: No resuelve una ambigüedad del texto español ni preserva una alternativa documentada del POB inglés; introduce metacomentario editorial innecesario.
  - severity: low
    issue: «todos los hombres» puede leerse como genérico menos natural
    rationale: El original y el POB inglés apuntan a universalidad humana, no a varones; «todas las personas» o «todos» mantiene el sentido con español más natural y ampliamente legible.
  revised_spanish_text: 'Otra vez me dice: «Ama la verdad, y que toda verdad salga de tu boca, para que el espíritu que Dios ha hecho habitar en esta carne sea hallado verdadero delante de todas las personas, y así el Señor que habita en ti sea glorificado; porque el Señor es verdadero en cada palabra, y no hay mentira en él».'
  revision_rationale: Se elimina la nota innecesaria sobre «espíritu», se mejora la naturalidad inclusiva de «delante de todas las personas» sin alterar el sentido, y se corrige «en toda palabra» a «en cada palabra» para un español más idiomático y fiel al valor distributivo.
