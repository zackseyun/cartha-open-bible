base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/028/001.yaml
  text: 'Again he says to me: “Love truth, and let all truth go forth from your mouth, so that the spirit which God has caused to dwell in this flesh may be found true before all people, and thus the Lord who dwells in you will be glorified; for the Lord is true in every word, and there is no falsehood with him.'
translation:
  language: es
  text: 'Otra vez me dice: «Ama la verdad, y que toda verdad salga de tu boca, para que el espíritu que Dios ha hecho habitar en esta carne sea hallado verdadero delante de todas las personas, y así el Señor que habita en ti sea glorificado; porque el Señor es verdadero en cada palabra, y no hay mentira en él».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἀλήθεια / truth
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - realidad
  - veracidad
  lexicon: ἀλήθεια
  rationale: Verdad reproduce con naturalidad el valor central del término y funciona bien tanto en el mandato ético como en la afirmación final sobre el Señor. "Veracidad" sería más restrictivo; "realidad" no encaja aquí.
- source_word: πνεῦμα / spirit
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - Espíritu
  - aliento
  lexicon: πνεῦμα
  rationale: El contexto contrasta el espíritu que habita en la carne con la verdad de la boca; en español "espíritu" mantiene la referencia personal/no material sin forzar mayúscula, ya que aquí no se especifica explícitamente el Espíritu Santo.
- source_word: σάρξ / flesh
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza humana
  - cuerpo
  lexicon: σάρξ
  rationale: '"Carne" conserva la tensión antropológica del original y la oposición con el espíritu. "Naturaleza humana" explica, pero atenúa el término concreto del texto.'
- source_word: κύριος / Lord
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - el Señor
  - Yahvé
  lexicon: κύριος
  rationale: Aquí la referencia es al Señor que habita en el creyente y luego al Señor como sujeto de la verdad; la forma reverente "Señor" es la más fiel y natural en español. No se reemplaza por Yahvé porque el texto griego no cita explícitamente el nombre divino.
- source_word: ψεύδος / falsehood
  english_pob_choice: falsehood
  chosen_spanish: mentira
  alternatives_spanish:
  - falsedad
  - engaño
  lexicon: ψεύδος
  rationale: '"Mentira" es la opción más directa y clara en español para la negación absoluta del texto. "Falsedad" suena más abstracta; "engaño" desplaza el énfasis.'
theological_decisions:
- issue: Relación entre el espíritu que habita en la carne y el Señor que habita en ti
  english_pob_reading: the spirit which God has caused to dwell in this flesh ... and thus the Lord who dwells in you
  chosen_spanish_reading: el espíritu que Dios ha hecho habitar en esta carne ... y así el Señor que habita en ti
  alternative_spanish_readings:
  - el Espíritu que Dios ha hecho habitar en esta carne ...
  - el espíritu que Dios hizo morar en esta carne ...
  rationale: Se conserva la secuencia del original y la distinción entre el espíritu mencionado y el Señor que habita en el creyente. La mayúscula en "Espíritu" introduciría una identificación no asegurada por el contexto inmediato.
  doctrine_reference: Antropología bíblica; inhabitación divina
- issue: Glorificación del Señor como resultado de la verdad en la boca
  english_pob_reading: so that ... will be glorified
  chosen_spanish_reading: para que ... sea glorificado
  alternative_spanish_readings:
  - a fin de que ... sea glorificado
  - para que ... reciba gloria
  rationale: La pasiva conserva el matiz del original y deja explícita la acción divina sin añadir sujeto humano. "Reciba gloria" sería explicativo, pero menos pegado a la forma del texto.
  doctrine_reference: Doxología; integridad moral
translation_notes:
  revision_awareness: El texto inglés POB ya optó por una equivalencia óptima sin notas, con terminología estable para truth, flesh, Lord y falsehood. Esta versión española sigue esas mismas decisiones léxicas, manteniendo la estructura argumentativa y la progresión ética del original griego sin suavizar la tensión entre espíritu y carne.
  spanish_consistency_notes:
  - Se mantiene "verdad" de forma uniforme para ἀλήθεια en ambas ocurrencias.
  - Se conserva "Señor" para κύριος sin ocultar el término bajo una convención tipográfica.
  - Se usa "carne" para σάρξ, preservando la oposición antropológica del pasaje.
  - La construcción "habita en ti" traduce la segunda personación singular del original de modo natural en español.
  - No se introduce "Cristo" ni "Yahvé" porque el pasaje no lo exige por el griego ni por el audit trail inglés.
