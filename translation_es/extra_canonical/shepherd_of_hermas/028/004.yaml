review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego según el rastro inglés: aprobación de la manera de pensar, necesidad ética de andar en verdad como esclavo de Dios, no permitir convivencia entre mala conciencia y el espíritu de verdad, y no entristecer al Espíritu santo y verdadero. La estructura dialogal también se conserva. La única desviación relevante está en «Piensas» para un contexto de habla reportada donde en español resulta más natural y fiel al valor discursivo usar «Estás pensando» o «piensas»; ambas son posibles, pero hay un ajuste estilístico más claro en la última cláusula.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos detalles mejorables: «ni que causaras tristeza al Espíritu santo y verdadero» suena menos idiomático que «ni entristecieras al Espíritu Santo y verdadero» o «ni le causaras tristeza...», y «he oído claramente tales palabras» suena calcado del inglés. En español natural y fiel conviene «nunca había oído estas palabras con claridad». Además, para referencia divina la forma asentada es «Espíritu Santo», con ambas mayúsculas.'
  glossary_alignment: 'Buena alineación general con la terminología POB: «esclavo de Dios» para δοῦλος es correcta; «anduvieras en la verdad» preserva bien περιπατεῖν; «Espíritu» con mayúscula por referencia divina es adecuado. Se recomienda capitalizar también «Santo» en «Espíritu Santo», no por liturgismo arbitrario sino por convención reverencial y claridad referencial en español cristiano general.'
  issues:
  - severity: medium
    issue: «Espíritu santo» debería ser «Espíritu Santo»
    rationale: En español eclesial general, cuando se refiere a la persona divina, la capitalización normal es en ambos términos. Mantiene claridad y legibilidad.
  - severity: medium
    issue: «he oído claramente tales palabras» suena poco natural en español
    rationale: Parece un calco de «have I heard such words clearly». La idea es que nunca las había oído con claridad, no que el acto de oír fue claramente modificado de ese modo.
  - severity: low
    issue: «causaras tristeza» es correcto pero menos directo que el verbo correspondiente
    rationale: El sentido de λυπέω / bring grief upon se expresa con más naturalidad en español mediante «entristecer», sin pérdida semántica.
  revised_spanish_text: 'Él dice: «Piensas recta y verdaderamente; porque era necesario que tú, como esclavo de Dios, anduvieras en la verdad, y no dejaras que una mala conciencia habitara con el espíritu de la verdad, ni entristecieras al Espíritu Santo y verdadero». «Nunca —digo yo—, señor, había oído estas palabras con claridad».'
  revision_rationale: 'La revisión hace ajustes menores de naturalidad y convención española sin cambiar el sentido: «Espíritu Santo» para la referencia divina, «entristecieras» como formulación más idiomática y precisa, y «había oído estas palabras con claridad» para evitar un calco inglés.'
