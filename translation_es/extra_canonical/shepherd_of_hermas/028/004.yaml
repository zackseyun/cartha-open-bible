base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/028/004.yaml
  text: He says, ‘You are thinking rightly and truly; for it was necessary for you, as a slave of God, to walk in truth, and not to let an evil conscience dwell with the spirit of truth, nor to bring grief upon the holy and true Spirit.’ ‘Never,’ I say, ‘sir, have I heard such words clearly.’
translation:
  language: es
  text: 'Él dice: «Piensas recta y verdaderamente; porque era necesario que tú, como esclavo de Dios, anduvieras en la verdad, y no dejaras que una mala conciencia habitara con el espíritu de la verdad, ni entristecieras al Espíritu Santo y verdadero». «Nunca —digo yo—, señor, había oído estas palabras con claridad».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοῦλος τοῦ θεοῦ
  english_pob_choice: slave of God
  chosen_spanish: esclavo de Dios
  alternatives_spanish:
  - siervo de Dios
  - servidor de Dios
  lexicon: δοῦλος
  rationale: Mantengo la fuerza lexical de dependencia y pertenencia personal que POB expresa con “slave”; “siervo” suaviza el término y puede perder el matiz de propiedad/autoridad del original.
- source_word: περιπατεῖν ἐν ἀληθείᾳ
  english_pob_choice: to walk in truth
  chosen_spanish: anduvieras en la verdad
  alternatives_spanish:
  - caminaras en la verdad
  - vivieras en la verdad
  lexicon: περιπατέω
  rationale: “Andar en la verdad” conserva el valor idiomático de conducta continua sin sonar forzado en español. “Caminar” es posible, pero “andar” es más natural y bíblicamente reconocible sin imponer una paráfrasis.
- source_word: κακοὺς συνειδήσει
  english_pob_choice: an evil conscience
  chosen_spanish: una mala conciencia
  alternatives_spanish:
  - una conciencia malvada
  - una conciencia perversa
  lexicon: συνείδησις
  rationale: “Mala conciencia” comunica el estado moral de la conciencia con naturalidad en español. “Malvada” o “perversa” endurecen más de lo necesario el sustantivo y suenan menos idiomáticas.
- source_word: σκηνοῦν
  english_pob_choice: dwell
  chosen_spanish: habitara
  alternatives_spanish:
  - morara
  - viviera
  lexicon: σκηνόω / οἰκέω
  rationale: “Habitar” mantiene la imagen de permanencia interna que el contexto exige. En español suena elevado pero claro; “morar” sería más arcaizante.
- source_word: λύπην ἐπιφέρειν
  english_pob_choice: bring grief upon
  chosen_spanish: causaras tristeza
  alternatives_spanish:
  - ocasionaras tristeza
  - trajeras tristeza sobre
  lexicon: λυπέω
  rationale: El español pide una construcción más directa; “causar tristeza” preserva el efecto activo sin introducir una metáfora innecesaria.
- source_word: τὸ πνεῦμα τὸ ἅγιον καὶ ἀληθινόν
  english_pob_choice: the holy and true Spirit
  chosen_spanish: el Espíritu santo y verdadero
  alternatives_spanish:
  - el Espíritu Santo y verdadero
  - el espíritu santo y verdadero
  lexicon: πνεῦμα
  rationale: Conservo mayúscula en “Espíritu” por referirse al Espíritu divino; “santo y verdadero” sigue el orden y la coordinación del original. La minúscula es posible gramaticalmente, pero aquí el contexto favorece la lectura personal/divina.
theological_decisions:
- issue: Relación entre “espíritu de la verdad” y “Espíritu santo y verdadero”
  english_pob_reading: 'two coordinated references: the spirit of truth and the holy and true Spirit'
  chosen_spanish_reading: “el espíritu de la verdad” y “el Espíritu santo y verdadero”
  alternative_spanish_readings:
  - “el Espíritu de la verdad” y “el Espíritu santo y verdadero”
  - “el espíritu verdadero” y “el Espíritu santo y verdadero”
  rationale: 'Sigo la distinción del texto inglés: primero una expresión de cualidad o esfera (“espíritu de la verdad”), luego una referencia más definida al Espíritu santo y verdadero. Mantener ambas expresiones evita fusionarlas indebidamente.'
  doctrine_reference: Doctrina pneumatológica básica; distinción léxica entre una disposición/espíritu de verdad y el Espíritu santo personal.
- issue: “as a slave of God” and moral obligation
  english_pob_reading: necessary for you, as a slave of God, to walk in truth
  chosen_spanish_reading: “era necesario que tú, como esclavo de Dios, anduvieras en la verdad”
  alternative_spanish_readings:
  - “debía ser así para ti, como esclavo de Dios…”
  - “era necesario que tú, como siervo de Dios…”
  rationale: La frase expresa obligación derivada de pertenencia a Dios, no solo un consejo moral. “Esclavo” preserva la intensidad teológica y ética del original, coherente con la política POB.
  doctrine_reference: Ética de pertenencia y obediencia a Dios; fidelidad del creyente como esclavo de Dios.
translation_notes:
  revision_awareness: No se registran revisiones previas en el paquete proporcionado; la redacción se apoya directamente en el texto griego normalizado y en la traducción POB inglesa como control auditado de decisiones léxicas.
  spanish_consistency_notes:
  - Se usa “Yahvé” como forma por defecto cuando aparece el nombre divino, pero en este pasaje el texto dice “Dios”, por lo que no aplica.
  - Se mantiene “esclavo” para δοῦλος, conforme al criterio POB de conservar fuerza lexical.
  - Se conserva “Espíritu” con mayúscula por la referencia personal/divina en el contexto.
  - La cita directa se puntúa con comillas angulares para legibilidad en español y se respetan las voces dialogales del original.
