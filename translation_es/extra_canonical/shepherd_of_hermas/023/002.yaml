  yaml_path: translation/extra_canonical/shepherd_of_hermas/023/002.yaml
  text: I knew that I would escape it, if your heart becomes pure and without blemish, and if for the remaining days of your life you serve the Lord blamelessly. Cast your cares upon the Lord, and he himself will direct them.
translation:
  language: es
  text: Yo sabía que escaparías de ello, si tu corazón llega a ser puro y sin mancha, y si durante los días restantes de tu vida sirves al Señor sin reproche. Echa sobre el Señor tus preocupaciones, y él mismo se encargará de ellas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καθαρὸς / ἄμωμος
  english_pob_choice: pure and without blemish
  chosen_spanish: puro y sin mancha
  alternatives_spanish:
  - limpio y sin defecto
  - puro e intachable
  lexicon: καθαρός, ἄμωμος
  rationale: 'Conservo el doble matiz: καθαρός como pureza interior y ἄμωμος como ausencia de mancha o defecto. ‘Sin mancha’ mantiene bien la imagen moral sin sonar excesivamente técnica en español.'
- source_word: δουλεύειν τῷ κυρίῳ
  english_pob_choice: serve the Lord
  chosen_spanish: sirves al Señor
  alternatives_spanish:
  - sirves al Señor como esclavo
  - sirves al Señor
  lexicon: δουλεύω, κύριος
  rationale: El contexto pide un verbo natural en español y la formulación inglesa ya optó por ‘serve’. Aunque δουλεύω puede tener fuerza de servicio-esclavitud, aquí el giro devocional del pasaje permite ‘servir’ sin perder el sentido básico.
- source_word: ἀμέμπτως
  english_pob_choice: blamelessly
  chosen_spanish: sin reproche
  alternatives_spanish:
  - irreprensiblemente
  - sin culpa
  lexicon: ἀμέμπτως
  rationale: ‘Sin reproche’ comunica bien la idea de conducta no censurable y suena natural en registro bíblico contemporáneo. Mantiene la dimensión pública/moral del término.
- source_word: ἐπιρρίψατε ... τὰς μέριμνας
  english_pob_choice: Cast your cares upon the Lord
  chosen_spanish: Echa sobre el Señor tus preocupaciones
  alternatives_spanish:
  - Arroja sobre el Señor tus afanes
  - Entrega al Señor tus preocupaciones
  lexicon: ἐπιρρίπτω, μέριμνα
  rationale: ‘Preocupaciones’ refleja bien μέριμναι en español común y conserva el peso afectivo del término. ‘Echa’ reproduce la fuerza imperativa del verbo de arrojar/poner sobre.
- source_word: αὐτὸς μεριμνήσει
  english_pob_choice: he himself will direct them
  chosen_spanish: él mismo las dirigirá
  alternatives_spanish:
  - él mismo se encargará de ellas
  - él mismo cuidará de ellas
  lexicon: μεριμνάω
  rationale: El griego expresa que Dios se ocupará de ellas; ‘dirigirá’ sigue la línea del POB inglés (‘direct them’) y puede entenderse como tomar a cargo y encaminar. Dejo la referencia al cuidado divino implícita en el verbo final.
theological_decisions:
- issue: Relación entre pureza interior y conducta perseverante
  english_pob_reading: if your heart becomes pure and without blemish, and if for the remaining days of your life you serve the Lord blamelessly
  chosen_spanish_reading: si tu corazón llega a ser puro y sin mancha, y si durante los días restantes de tu vida sirves al Señor sin reproche
  alternative_spanish_readings:
  - si tu corazón es puro y sin mancha, y si por el resto de tu vida sirves al Señor irreprochablemente
  - si tu corazón se vuelve puro e intachable, y si sirves al Señor sin reproche durante el resto de tu vida
  rationale: 'Mantengo la doble condición moral y temporal del pasaje: pureza del corazón y perseverancia cotidiana hasta el fin de la vida. ‘Llega a ser’ preserva la idea de proceso sin afirmar un estado ya consumado.'
  doctrine_reference: santidad práctica / perseverancia moral
- issue: Destino de las preocupaciones bajo la providencia divina
  english_pob_reading: Cast your cares upon the Lord, and he himself will direct them
  chosen_spanish_reading: Echa sobre el Señor tus preocupaciones, y él mismo las dirigirá
  alternative_spanish_readings:
  - Entrega al Señor tus preocupaciones, y él mismo se encargará de ellas
  - Pon tus preocupaciones sobre el Señor, y él mismo las guiará
  rationale: La primera cláusula expresa entrega confiada; la segunda afirma que Dios toma bajo su control aquello que se le entrega. ‘Dirigirá’ sigue el audit trail inglés y conserva la imagen de dirección sin introducir una explicación ausente del texto.
  doctrine_reference: providencia divina / confianza en Dios
translation_notes:
  revision_awareness: No se registran revisiones previas ni decisiones léxicas o teológicas auditadas en el paquete inglés; el draft se apoya directamente en el griego normalizado y en la equivalencia óptima del POB inglés.
  spanish_consistency_notes:
  - Uso ‘Señor’ para κύριος en coherencia con el texto fuente y con la traducción inglesa auditada, sin introducir una convención de máscara que no aparece en este fragmento.
  - 'Conservo un estilo bíblico sobrio y moderno: ‘sin reproche’, ‘preocupaciones’, ‘él mismo’.'
  - No añado notas textuales porque el paquete no documenta variantes ni ambigüedades que requieran marcación en el texto español.
