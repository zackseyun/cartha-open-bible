revisions:
- from: Después de que la bestia pasó junto a mí, y yo había avanzado como unos treinta pies, he aquí una virgen me sale al encuentro, adornada como si saliera de un aposento nupcial, toda de blanco y con sandalias blancas; cubierta hasta la frente, y su velo estaba sujeto con una toca, y su cabello era blanco.
  to: Después de que la bestia pasó junto a mí, y yo había avanzado unos treinta pies, he aquí que una virgen me sale al encuentro, adornada como si saliera de una cámara nupcial, toda de blanco y con sandalias blancas; cubierta hasta la frente, con su cobertura en forma de turbante, y su cabello era blanco.
  rationale: Se corrige la frase del tocado para reflejar con mayor fidelidad la evidencia fuente y el inglés POB, evitando la adición interpretativa 'estaba sujeto'. También se pule 'como unos treinta pies' a 'unos treinta pies' y se ajusta levemente 'aposento/cámara nupcial' por naturalidad literaria sin cambiar el sentido. No se requieren notas.
