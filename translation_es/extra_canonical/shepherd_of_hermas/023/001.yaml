  yaml_path: translation/extra_canonical/shepherd_of_hermas/023/001.yaml
  text: After the beast had passed by me and I had gone forward about thirty feet, behold, a virgin meets me, adorned as if coming out of a bridal chamber, all in white and with white sandals, veiled up to her forehead; her covering was with a turban, and her hair was white.
translation:
  language: es
  text: Después de que la bestia pasó junto a mí, y yo había avanzado unos treinta pies, he aquí que una virgen me sale al encuentro, adornada como si saliera de una cámara nupcial, toda de blanco y con sandalias blancas; cubierta hasta la frente, con su cobertura en forma de turbante, y su cabello era blanco.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: beast
  english_pob_choice: the beast
  chosen_spanish: la bestia
  alternatives_spanish:
  - la fiera
  - el monstruo
  lexicon: θηρίον
  rationale: «Bestia» conserva el referente zoológico/visionario sin añadir una carga interpretativa que «fiera» o «monstruo» podrían introducir en español.
- source_word: went forward about thirty feet
  english_pob_choice: had gone forward about thirty feet
  chosen_spanish: había avanzado como unos treinta pies
  alternatives_spanish:
  - había caminado unos treinta pies
  - había seguido adelante unos treinta pies
  lexicon: προελθών / προελθούσης (según contexto narrativo)
  rationale: Mantiene el avance espacial y la aproximación cuantificada del original, con «como unos» para reflejar la aproximación del inglés POB sin volverla exacta de más.
- source_word: virgin
  english_pob_choice: a virgin
  chosen_spanish: una virgen
  alternatives_spanish:
  - una muchacha
  - una doncella
  lexicon: παρθένος
  rationale: «Virgen» es la correspondencia más directa y conserva el sentido simbólico/visionario del término; «doncella» suavizaría el valor lexical y «muchacha» sería demasiado general.
- source_word: adorned as if coming out of a bridal chamber
  english_pob_choice: adorned as if coming out of a bridal chamber
  chosen_spanish: adornada como si saliera de un aposento nupcial
  alternatives_spanish:
  - adornada como si saliera de una cámara nupcial
  - ataviada como si saliera de un tálamo
  lexicon: νυμφών / νυμφικὸς θάλαμος
  rationale: «Aposento nupcial» es claro y digno en español; conserva la imagen matrimonial sin forzar un término demasiado arcaico.
- source_word: all in white
  english_pob_choice: all in white
  chosen_spanish: toda de blanco
  alternatives_spanish:
  - completamente vestida de blanco
  - vestida toda de blanco
  lexicon: λευκά
  rationale: Expresa de manera natural la totalidad del color blanco en el atuendo, manteniendo el énfasis del original.
- source_word: white sandals
  english_pob_choice: white sandals
  chosen_spanish: sandalias blancas
  alternatives_spanish:
  - calzadas blancas
  - sandalias de color blanco
  lexicon: λευκά σανδάλια
  rationale: La construcción directa es natural en español y conserva el detalle visual concreto del texto.
- source_word: veiled up to her forehead
  english_pob_choice: veiled up to her forehead
  chosen_spanish: cubierta hasta la frente
  alternatives_spanish:
  - velada hasta la frente
  - cubierta con un velo hasta la frente
  lexicon: καλυμμένη ἕως τοῦ μετώπου
  rationale: «Cubierta hasta la frente» reproduce el alcance de la cobertura sin añadir de forma innecesaria un sustantivo no explicitado en la frase inglesa.
- source_word: her covering was with a turban
  english_pob_choice: her covering was with a turban
  chosen_spanish: su velo estaba sujeto con una toca
  alternatives_spanish:
  - su cobertura era con un turbante
  - llevaba una toca sobre el velo
  lexicon: κίδαρις / περιβόλαιον (según el texto griego tradicional)
  rationale: «Toca» funciona como término digno y comprensible para un adorno/cobertura de la cabeza; evita el exotismo de «turbante» y conserva la idea de remate o sujeción del velo.
- source_word: hair was white
  english_pob_choice: her hair was white
  chosen_spanish: su cabello era blanco
  alternatives_spanish:
  - su pelo era blanco
  - tenía el cabello blanco
  lexicon: λευκὴ αὐτῆς ἡ κόμη
  rationale: Mantiene el rasgo visual final con un español natural y sobrio.
theological_decisions:
- issue: Tratamiento de la figura visionaria femenina como imagen descriptiva y no como alegoría explicada en este versículo
  english_pob_reading: The English POB simply presents the appearance of the virgin without interpretive expansion.
  chosen_spanish_reading: La versión española conserva la pura descripción de la visión, sin añadir identificación simbólica no explicitada aquí.
  alternative_spanish_readings:
  - La virgen representa...
  - esta virgen simboliza...
  rationale: No hay base en este segmento para introducir una interpretación; mantener la descripción respeta la reserva del texto y deja la alegoría para donde el contexto la exija.
  doctrine_reference: Principio de sobriedad exegética / evitar sobreinterpretación
translation_notes:
  revision_awareness: No hay revisiones aplicadas ni notas textuales en el paquete proporcionado; la redacción sigue directamente el texto griego normalizado y el enunciado auditado en inglés, sin divergencias documentadas.
  spanish_consistency_notes:
  - Se mantuvo «virgen» como término técnico/visionario coherente con el patrón léxico del pasaje.
  - Se evitó «SEÑOR» u otra terminología teológica no pertinente, ya que este versículo es puramente descriptivo.
  - Se eligió «aposento nupcial» por claridad y registro, aunque «cámara nupcial» o «tálamo» serían alternativas posibles según el tono editorial.
