base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/023/003.yaml
  text: Believe in the Lord, you double-minded, because he is able to do all things and turns his anger away from you, but sends plagues upon you who are double-minded. Woe to those who have heard these words and disobeyed; it would have been better for them not to have been born.
translation:
  language: es
  text: Crean en el Señor, ustedes, los de doble ánimo, porque él es capaz de hacer todas las cosas y aparta de ustedes su ira; pero les envía plagas a los de doble ánimo. ¡Ay de los que oyeron estas palabras y desobedecieron! Para ellos habría sido mejor no haber nacido.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Believe
  english_pob_choice: Believe
  chosen_spanish: Crean
  alternatives_spanish:
  - Crean en
  - Tengan fe en
  lexicon: πιστεύω
  rationale: Se conserva el imperativo de confianza/fe en forma natural en español. 'Crean en' mantiene la construcción relacional del verbo; 'Tengan fe en' es posible, pero menos directo y más interpretativo.
- source_word: the Lord
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - Yahvé
  lexicon: κύριος
  rationale: Aquí el contexto presenta al 'Señor' como destinatario de la fe y no hay una cita explícita del Tetragrámaton en el texto fuente; por eso se mantiene 'el Señor' como equivalente reverente y natural en español.
- source_word: double-minded
  english_pob_choice: double-minded
  chosen_spanish: de doble ánimo
  alternatives_spanish:
  - de mente dividida
  - indecisos
  lexicon: δίψυχος
  rationale: '''De doble ánimo'' reproduce la expresión tradicional y el matiz de división interior sin volverla demasiado psicológica. ''De mente dividida'' aclara pero suena más explicativa; ''indecisos'' pierde fuerza lexical.'
- source_word: he is able to do all things
  english_pob_choice: he is able to do all things
  chosen_spanish: él es capaz de hacer todas las cosas
  alternatives_spanish:
  - puede hacerlo todo
  - todo lo puede hacer
  lexicon: δύναμαι
  rationale: '''Es capaz de hacer todas las cosas'' mantiene la amplitud absoluta del griego y el tono solemne del original. ''Puede hacerlo todo'' es más idiomático pero ligeramente menos formal.'
- source_word: turns his anger away from you
  english_pob_choice: turns his anger away from you
  chosen_spanish: aparta de ustedes su ira
  alternatives_spanish:
  - desvía de ustedes su ira
  - aleja de ustedes su ira
  lexicon: ὀργή
  rationale: '''Aparta de ustedes su ira'' expresa el giro de alejamiento de la ira con economía natural en español. Se conserva ''ira'' como término fuerte, sin suavizarlo a ''enojo''.'
- source_word: sends plagues upon you
  english_pob_choice: sends plagues upon you
  chosen_spanish: envía plagas sobre ustedes
  alternatives_spanish:
  - manda plagas sobre ustedes
  - les envía plagas
  lexicon: πληγή
  rationale: '''Plagas'' reproduce la carga punitiva y bíblica del sustantivo. ''Envía'' conserva el verbo de agencia divina; ''manda'' sería posible pero menos literal.'
- source_word: Woe to those
  english_pob_choice: Woe to those
  chosen_spanish: ¡Ay de los que
  alternatives_spanish:
  - ¡Ay de aquellos que
  - ¡Pobres de los que
  lexicon: οὐαί
  rationale: La fórmula profética española establecida '¡Ay de los que' comunica lamentación y juicio de manera natural y reconocible.
- source_word: it would have been better for them not to have been born
  english_pob_choice: it would have been better for them not to have been born
  chosen_spanish: Para ellos habría sido mejor no haber nacido
  alternatives_spanish:
  - les habría convenido más no haber nacido
  - habría sido mejor para ellos no nacer
  lexicon: κρεῖσσον / γεννάω
  rationale: Se conserva la comparación de conveniencia moral con una forma sobria y pública. 'No haber nacido' mantiene la dureza del dicho sin suavizarlo.
theological_decisions:
- issue: Addressing the divine speaker / object of belief
  english_pob_reading: Believe in the Lord
  chosen_spanish_reading: Crean en el Señor
  alternative_spanish_readings:
  - Crean en Yahvé
  - Tengan fe en el Señor
  rationale: El pasaje exhorta a confiar en la figura designada como 'el Señor' en el texto fuente transmitido por la tradición griega; no hay aquí una necesidad textual de forzar el nombre divino Yahvé. Se preserva la reverencia cristiana y la forma directa del mandato.
  doctrine_reference: Uso de κύριος en exhortación de fe; criterio de equivalencia funcional en el registro devocional.
- issue: Nature of the warning to the double-minded
  english_pob_reading: turns his anger away from you, but sends plagues upon you who are double-minded
  chosen_spanish_reading: aparta de ustedes su ira; pero envía plagas sobre ustedes, los de doble ánimo
  alternative_spanish_readings:
  - aleja de ustedes su ira; pero manda plagas sobre ustedes, los de doble ánimo
  rationale: 'Se mantiene la tensión teológica del texto: el mismo sujeto que aparta la ira también envía castigos sobre los de doble ánimo. No se atenúa ''ira'' ni ''plagas'', porque el contraste forma parte de la amonestación moral.'
  doctrine_reference: Juicio divino y retribución en literatura exhortativa antigua; preservación de la advertencia moral.
translation_notes:
  revision_awareness: No se registran revisiones previas ni notas textuales en el paquete proporcionado; la redacción se apoya directamente en el griego normalizado del testimonio fuente y en la solución inglesa POB como control de sentido, sin depender de un aparato adicional.
  spanish_consistency_notes:
  - Se mantiene 'de doble ánimo' de forma uniforme para δίψυχος.
  - Se conserva 'plagas' como término fuerte y bíblico, paralelo al inglés POB.
  - No se introduce 'Yahvé' porque el griego citado aquí usa κύριος sin una señal contextual suficiente para forzar el nombre divino.
  - La puntuación reproduce la articulación exhortación/amenaza del original con dos segmentos y una exclamación final.
