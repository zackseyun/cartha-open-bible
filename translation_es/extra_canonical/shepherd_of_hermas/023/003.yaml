    rationale: '"aparta de ustedes su ira; pero envía plagas sobre ustedes, los de doble ánimo" es comprensible, pero en español resulta pesado y menos idiomático que una formulación con dativo indirecto o sin repetición.'
  - severity: low
    issue: Imperativo/vocativo mejorable en fluidez
    rationale: '"Crean en el Señor, ustedes de doble ánimo" transmite el sentido, pero "ustedes, los de doble ánimo" o reordenar la frase suena más natural en español sin cambiar el significado.'
