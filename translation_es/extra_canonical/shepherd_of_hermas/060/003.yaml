  text: After all had received the rods, the angel laid aside the sickle, and that tree was sound, just as I had seen it before. I marveled within myself, saying, How is the tree sound, with so many branches cut off? The shepherd says to me, Do not marvel that the tree remained sound though so many branches were cut off. But wait until you see everything, and it will be shown to you what it is.
translation:
  language: es
  text: 'Después de que todos hubieron recibido las varas, el ángel dejó a un lado la hoz, y aquel árbol seguía sano, tal como lo había visto antes. Me maravillé dentro de mí, diciendo: «¿Cómo está sano el árbol, con tantas ramas cortadas?». El pastor me dice: «No te maravilles de que el árbol haya permanecido sano, aunque tantas ramas fueron cortadas. Pero espera hasta que veas todo, y se te mostrará lo que es».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: rods
  english_pob_choice: rods
  chosen_spanish: varas
  alternatives_spanish:
  - bastones
  - ramas
  lexicon: rhabdos
  rationale: En este pasaje las 'rods' son los objetos entregados a los que llegan; 'varas' conserva la imagen de instrumento/vara sin introducir el sentido de 'ramas', que pertenece al árbol, no al objeto recibido.
- source_word: sickle
  english_pob_choice: sickle
  chosen_spanish: hoz
  alternatives_spanish:
  - guadaña
  lexicon: drepanon
  rationale: '''Hoz'' es el equivalente más directo y sobrio en español; ''guadaña'' sugiere una herramienta más grande y sería menos precisa para la imagen breve del relato.'
- source_word: sound
  english_pob_choice: sound
  chosen_spanish: sano
  alternatives_spanish:
  - íntegro
  - intacto
  lexicon: hygiēs
  rationale: '''Sano'' reproduce la idea de un árbol no dañado o en buen estado, y mantiene la observación sorprendente del texto sin añadir matices morales ajenos.'
- source_word: branches cut off
  english_pob_choice: branches cut off
  chosen_spanish: ramas cortadas
  alternatives_spanish:
  - ramas podadas
  - ramas arrancadas
  lexicon: kladoi / apokoptein
  rationale: '''Cortadas'' refleja el hecho básico de la acción sin especificar más de lo que el griego exige. ''Podadas'' implicaría una finalidad hortícola que no está explícita.'
- source_word: marveled
  english_pob_choice: marveled
  chosen_spanish: me maravillé
  alternatives_spanish:
  - me admiré
  - me asombré
  lexicon: thaumazō
  rationale: '''Me maravillé'' conserva la reacción de extrañeza admirativa del narrador y encaja bien con el registro literario del pasaje.'
- source_word: the shepherd says to me
  english_pob_choice: the shepherd says to me
  chosen_spanish: el pastor me dice
  alternatives_spanish:
  - el pastor me dijo
  - me dice el pastor
  lexicon: ho poimēn legei moi
  rationale: Se mantiene la referencia constante al interlocutor como 'el pastor', título estable del personaje en la obra. El presente narrativo español reproduce adecuadamente el estilo directo de la visión.
theological_decisions:
- issue: El árbol permanece sano a pesar de la mutilación de ramas
  english_pob_reading: the tree remained sound though so many branches were cut off
  chosen_spanish_reading: el árbol haya permanecido sano, aunque tantas ramas fueron cortadas
  alternative_spanish_readings:
  - el árbol siguiera sano, aunque tantas ramas fueran cortadas
  - el árbol permaneció sano, aunque tantas ramas fueron cortadas
  rationale: 'Se conserva la tensión interpretativa: la integridad del árbol no queda explicada de inmediato, sino presentada como un hecho llamativo que el ángel pospone aclarar. El subjuntivo en el discurso del pastor refleja la exhortación y la indefinición del motivo.'
  doctrine_reference: No aplica doctrina cristológica o trinitaria; se trata de una alegoría explicada dentro del propio texto.
- issue: “Se te mostrará qué es” como promesa de revelación posterior
  english_pob_reading: it will be shown to you what it is
  chosen_spanish_reading: se te mostrará qué es
  alternative_spanish_readings:
  - se te hará ver qué es
  - te será mostrado qué significa
  rationale: 'La formulación mantiene la ambigüedad deliberada del original: no se explicita todavía la interpretación alegórica, sólo la promesa de revelación futura.'
  doctrine_reference: No aplica; preserva el carácter visionario y pedagógico del pasaje.
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el contexto inglés; por ello la versión española sigue de cerca el enunciado auditado sin introducir resoluciones interpretativas adicionales.
  spanish_consistency_notes:
  - Se usa 'varas' para rods y 'ramas' para branches, evitando confusión entre los dos conjuntos de imágenes.
  - Se mantiene 'el pastor' como designación fija del personaje, sin variar a 'pastor' en sentido genérico.
  - Se conserva el registro narrativo en pasado para el relato principal y presente en el diálogo directo, de acuerdo con el español literario natural.
