revisions:
- from: El ángel que había dado las varas al pueblo se las volvió a pedir; y, así como las habían recibido, así también fueron llamados a él, y cada uno devolvió las varas. El ángel del Señor las tomó y las examinó.
  to: El ángel que había dado las varas al pueblo se las volvió a pedir; y, así como las habían recibido, así también fueron llamados ante él, y cada uno devolvió las varas. El ángel de Yahvé las tomó y las examinó.
  rationale: Se ajusta la fórmula «ángel de Yahvé» para respetar la terminología base del proyecto respecto de κύριος con referencia divina, y se mejora la naturalidad de «fueron llamados a él» a «fueron llamados ante él» sin alterar el sentido del original.
