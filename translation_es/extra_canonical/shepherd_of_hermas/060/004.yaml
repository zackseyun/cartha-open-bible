  yaml_path: translation/extra_canonical/shepherd_of_hermas/060/004.yaml
  text: The angel who had given the rods to the people again demanded them back from them; and as they had received them, so too they were called to him, and each one returned the rods. The angel of the Lord took them and examined them.
translation:
  language: es
  text: El ángel que había dado las varas al pueblo se las volvió a pedir; y, así como las habían recibido, así también fueron llamados ante él, y cada uno devolvió las varas. El ángel de Yahvé las tomó y las examinó.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄγγελος
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: ἄγγελος
  rationale: En este contexto narrativo designa claramente a un ser celestial; «ángel» es la forma natural y fiel en español. «Mensajero» es posible léxicamente, pero aquí debilitaría la referencia angelológica del pasaje.
- source_word: ἔδωκεν ... τὰς ῥάβδους
  english_pob_choice: had given the rods
  chosen_spanish: había dado las varas
  alternatives_spanish:
  - había entregado las varas
  - había dado los bastones
  lexicon: δίδωμι / ῥάβδος
  rationale: «Varas» conserva el objeto concreto del relato y evita suavizarlo. «Bastones» sería comprensible, pero «vara» corresponde mejor al término de la escena y al tono simbólico del pasaje.
- source_word: τῷ λαῷ
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  lexicon: λαός
  rationale: «Pueblo» refleja mejor el sustantivo griego y su tono colectivo y casi comunitario. «Gente» sería más general y menos preciso.
- source_word: πάλιν ἀπῄτησεν αὐτὰ παρ᾽ αὐτῶν
  english_pob_choice: again demanded them back from them
  chosen_spanish: se las volvió a pedir
  alternatives_spanish:
  - las reclamó de nuevo
  - las pidió otra vez
  lexicon: ἀπαιτέω
  rationale: La construcción española reproduce la insistencia de la devolución sin sonar forzada. «Volvió a pedir» conserva el carácter reiterativo de πάλιν y la relación de retorno implícita en ἀπαιτέω.
- source_word: ὡς ἐδέξαντο ... οὕτως καὶ ἐκλήθησαν πρὸς αὐτόν
  english_pob_choice: as they had received them, so too they were called to him
  chosen_spanish: así como las habían recibido, así también fueron llamados a él
  alternatives_spanish:
  - como las habían recibido, así fueron llamados a él
  - así como las recibieron, así fueron llamados a él
  lexicon: δέχομαι / καλέω
  rationale: La correspondencia «así como... así también» conserva el paralelismo del griego y del inglés POB. «Fueron llamados a él» mantiene el matiz de convocatoria o citación sin explicitar más de lo que el texto dice.
- source_word: ἀποκατέστησεν ἕκαστος τὰς ῥάβδους
  english_pob_choice: each one returned the rods
  chosen_spanish: cada uno devolvió las varas
  alternatives_spanish:
  - cada uno restituyó las varas
  - cada uno entregó las varas
  lexicon: ἀποκαθίστημι
  rationale: «Devolvió» es una solución natural y fiel para la idea de retornar algo a su origen o poseedor. «Restituyó» sería más formal; «entregó» es demasiado general.
- source_word: ὁ ἄγγελος τοῦ Κυρίου
  english_pob_choice: The angel of the Lord
  chosen_spanish: El ángel del Señor
  alternatives_spanish:
  - El ángel de Yahvé
  - El ángel del Señor
  lexicon: ἄγγελος / κύριος
  rationale: Aquí el texto griego tiene κύριος sin artículo, y el inglés POB mantiene la fórmula tradicional «of the Lord». En español, «Señor» preserva la expresión estable del pasaje y evita introducir una identificación más específica que el propio contexto de esta obra no desarrolla explícitamente.
- source_word: ἔλαβεν καὶ ἐπεσκέψατο
  english_pob_choice: took them and examined them
  chosen_spanish: las tomó y las examinó
  alternatives_spanish:
  - las tomó y las inspeccionó
  - las recogió y las examinó
  lexicon: λαμβάνω / ἐπισκέπτομαι
  rationale: «Examinó» transmite bien la idea de revisión o inspección. Se evita un término demasiado técnico; «inspeccionó» sería posible, pero menos idiomático en español bíblico-literario.
theological_decisions:
- issue: Identidad y referencia de «el Señor» en ὁ ἄγγελος τοῦ Κυρίου
  english_pob_reading: The angel of the Lord
  chosen_spanish_reading: El ángel del Señor
  alternative_spanish_readings:
  - El ángel de Yahvé
  - El ángel del Señor
  rationale: La redacción mantiene la formulación del POB en inglés y respeta la ambigüedad heredada del griego/uso tradicional sin forzar una identificación explícita con el Tetragrámaton en un texto donde la obra no desarrolla esa relación de forma directa.
  doctrine_reference: Angelología bíblica; uso narrativo de κύριος en literatura cristiana primitiva
- issue: Reiteración narrativa de la entrega y devolución de las varas
  english_pob_reading: again demanded them back ... each one returned the rods
  chosen_spanish_reading: se las volvió a pedir ... cada uno devolvió las varas
  alternative_spanish_readings:
  - las reclamó de nuevo ... cada uno restituyó las varas
  - las pidió otra vez ... cada uno entregó las varas
  rationale: La versión española conserva el movimiento narrativo de ida y vuelta sin agregar interpretación simbólica. Se mantiene la repetición como rasgo estructural del relato, no como énfasis doctrinal añadido.
  doctrine_reference: Narrativa parabólica; simbolismo moral de las varas en Hermas
translation_notes:
  revision_awareness: No se registran revisiones previas en el paquete; la redacción se ha elaborado directamente a partir del griego normalizado y del texto inglés POB como control de correspondencia. No se introducen notas textuales porque no hay variantes ni ambigüedades documentadas en el material provisto.
  spanish_consistency_notes:
  - Se usa «vara» de manera uniforme para ῥάβδος.
  - Se usa «Señor» en la fórmula fija «el ángel del Señor» para mantener coherencia interna con el estilo del conjunto.
  - Se evita alternar entre «devolver» y «restituir» para no fragmentar el registro narrativo.
