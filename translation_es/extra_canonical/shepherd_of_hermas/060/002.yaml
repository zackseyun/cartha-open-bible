    rationale: λαμπρός se orienta primariamente a brillo, resplandor, esplendor visible. «Glorioso» puede sugerir una abstracción teológica distinta y «excesivamente» suena poco idiomático aquí.
  - severity: medium
    issue: Nota al pie inexacta sobre «Lit. “ángel de Yahvé”»
    rationale: La evidencia fuente dada es griega κύριος, no una cita literal hebrea con יהוה. La nota debe describir la relación terminológica sin presentar «ángel de Yahvé» como literal del texto fuente.
