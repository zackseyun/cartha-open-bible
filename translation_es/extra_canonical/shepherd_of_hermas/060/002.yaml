base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/060/002.yaml
  text: And an angel of the Lord—exceedingly glorious and very tall—was standing beside the willow, holding a great sickle, and he was cutting off branches from the willow and handing them to the people who were being sheltered by the willow; and he kept giving them little rods, about a cubit long.
translation:
  language: es
  text: Y un ángel del Señor[a] —sumamente resplandeciente y muy alto— estaba de pie junto al sauce, sosteniendo una gran hoz, y cortaba ramas del sauce y se las entregaba a las personas que estaban resguardadas por el sauce; y les seguía dando varitas pequeñas, de aproximadamente un codo de largo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «ángel del Señor» (ἄγγελος τοῦ κυρίου). Se conserva esta fórmula convencional del relato; «ángel de Yahvé» sería una alternativa interpretativa, no una traducción literal de la forma griega aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελος τοῦ κυρίου
  english_pob_choice: an angel of the Lord
  chosen_spanish: un ángel del Señor[a]
  alternatives_spanish:
  - un ángel de Yahvé
  - un mensajero del Señor
  lexicon: ἄγγελος; κύριος
  rationale: El griego presenta la expresión convencional «ángel del Señor». En español, aquí conviene mantener «Señor» porque la frase funciona como designación estable del mensajero divino en el relato y el contexto no exige explicitar el nombre propio Yahvé en el cuerpo principal. Se añade nota para aclarar la decisión terminológica.
- source_word: σφόδρα λαμπρὸς καὶ ὑψηλός
  english_pob_choice: exceedingly glorious and very tall
  chosen_spanish: excesivamente glorioso y muy alto
  alternatives_spanish:
  - sumamente resplandeciente y muy alto
  - muy glorioso y muy alto
  lexicon: σφόδρα; λαμπρός; ὑψηλός
  rationale: «λαμπρός» tiene connotación de brillo/gloria, no solo de belleza; por eso «glorioso» preserva la fuerza teológica/visionaria del término. «σφόδρα» intensifica de forma natural con «excesivamente» en este registro visionario. «ὑψηλός» se rinde literalmente como «alto».
- source_word: πλάτανος
  english_pob_choice: the willow
  chosen_spanish: el sauce
  alternatives_spanish:
  - el árbol
  - el álamo
  lexicon: πλάτανος
  rationale: Aunque el griego puede referirse a un tipo de árbol con cierto debate de identificación botánica, el inglés audit trail ya fijó «willow» en la tradición de esta POB. En español, «sauce» reproduce la imagen vegetal del texto recibido y es natural para el lector.
- source_word: δρέπανον μέγα
  english_pob_choice: a great sickle
  chosen_spanish: una gran hoz
  alternatives_spanish:
  - una hoz grande
  - un gran segador
  lexicon: δρέπανον
  rationale: «hoz» es el equivalente directo y tradicional en español para la herramienta de corte agrícola; «gran» conserva la amplitud/intensidad del adjetivo sin alterar el sentido.
- source_word: κλώνας
  english_pob_choice: branches
  chosen_spanish: ramas
  alternatives_spanish:
  - retoños
  - ramas tiernas
  lexicon: κλών
  rationale: «ramas» es la opción más clara y fiel en español para el material cortado del árbol, sin introducir matices no sustentados por el contexto.
- source_word: ῥάβδους μικράς
  english_pob_choice: little rods
  chosen_spanish: varitas pequeñas
  alternatives_spanish:
  - bastoncillos
  - varas pequeñas
  lexicon: ῥάβδος
  rationale: «varita» comunica bien una pieza corta y ligera de madera en español contemporáneo, mientras conserva el tamaño reducido indicado por «μικράς». Se evita «vara» por sonar más pesado o institucional en español bíblico.
theological_decisions:
- issue: Renderizado del título divino en la expresión «ángel del Señor»
  english_pob_reading: Keeps the conventional English form without explicitly masking or expanding the divine name.
  chosen_spanish_reading: «ángel del Señor» en el texto principal, con nota sobre la alternativa «Yahvé».
  alternative_spanish_readings:
  - ángel de Yahvé
  - ángel del Señor
  rationale: Aunque el proyecto español prefiere «Yahvé» para יהוה, en esta fórmula idiomática del relato visionario la expresión tradicional «ángel del Señor» es más natural y corresponde al griego transmitido. La nota mantiene auditable la tensión terminológica sin forzar una expansión innecesaria en el cuerpo principal.
  doctrine_reference: Terminología del nombre divino y mensajería angelical en literatura visionaria; cf. principios de equivalencia óptima del proyecto.
translation_notes:
  revision_awareness: Se siguió el texto griego normalizado del manuscrito OCR y el rastro inglés de POB sin introducir revisiones ulteriores. No se detectaron variantes textuales adicionales en el paquete proporcionado que obliguen a modificar el contenido.
  spanish_consistency_notes:
  - Se mantuvo «sauce» conforme al inglés auditado y a la imaginería vegetal del pasaje.
  - Se prefirió «hoz» y «varitas pequeñas» por claridad natural en español sin diluir la imaginería agrícola.
  - El registro es literario pero comprensible, adecuado para una edición bíblica pública y auditable.
