base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/060/001.yaml
  text: …with their whole heart. So then, do you suppose that the sins of those who are repenting are immediately forgiven? Not entirely. Rather, the one who repents must afflict his own soul and be humble-minded in all his conduct, resolutely, and be distressed in all kinds of tribulations; and if he bears the tribulations that come upon him, the One who created all things and strengthened them will surely be moved with compassion and will grant some healing. And this, when [God] sees the heart of the one repenting clean from everything.
translation:
  language: es
  text: …con todo su corazón. Así pues, ¿suponen que los pecados de los que se están arrepintiendo son perdonados de inmediato? No del todo. Más bien, el que se arrepiente debe afligir su propia alma y ser humilde en toda su conducta, con firmeza, y afligirse en toda clase de tribulaciones; y si soporta las tribulaciones que le sobrevienen, el que creó todas las cosas y las fortaleció sin duda se compadecerá y concederá cierta sanidad. Y esto, cuando Dios vea el corazón del que se arrepiente limpio de todo.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: repenting
  english_pob_choice: those who are repenting
  chosen_spanish: los que se están arrepintiendo
  alternatives_spanish:
  - los que se arrepienten
  - los penitentes
  lexicon: μετανοέω
  rationale: 'Mantiene el valor procesual e incompleto del participio: no se trata solo del acto ya concluido, sino de personas en curso de arrepentirse. ''Se están arrepintiendo'' comunica mejor ese matiz que una forma nominalizante.'
- source_word: afflict his own soul
  english_pob_choice: must afflict his own soul
  chosen_spanish: debe afligir su propia alma
  alternatives_spanish:
  - debe mortificar su alma
  - debe afligir su vida interior
  lexicon: ψυχή
  rationale: '''Alma'' conserva el término antropológico del original y la fuerza ascética de la exhortación. ''Mortificar'' sería más interpretativo y eclesial; ''vida interior'' suaviza demasiado el sentido.'
- source_word: be humble-minded
  english_pob_choice: be humble-minded in all his conduct
  chosen_spanish: ser humilde en toda su conducta
  alternatives_spanish:
  - tener mente humilde en toda su conducta
  - ser de humilde pensamiento en toda su conducta
  lexicon: ταπεινός / ταπεινόφρων
  rationale: La expresión inglesa apunta a una disposición interior humilde; en español, 'ser humilde' es la forma más natural y fiel, mientras que 'humilde de mente' suena forzado. 'En toda su conducta' conserva la extensión ética del original.
- source_word: distressed in all kinds of tribulations
  english_pob_choice: be distressed in all kinds of tribulations
  chosen_spanish: afligirse en toda clase de tribulaciones
  alternatives_spanish:
  - estar angustiado en toda clase de tribulaciones
  - sufrir en toda clase de tribulaciones
  lexicon: λυπέω / θλῖψις
  rationale: El inglés POB retiene la idea de aflicción activa y sufrimiento bajo pruebas. 'Afligirse' reproduce bien la carga espiritual y ascética, sin convertirla en mera emoción.
- source_word: the One who created all things and strengthened them
  english_pob_choice: the One who created all things and strengthened them
  chosen_spanish: el que creó todas las cosas y las fortaleció
  alternatives_spanish:
  - el que hizo todas las cosas y las fortaleció
  - el Creador de todas las cosas y el que las fortaleció
  lexicon: ποιέω / κτίζω; στηρίζω
  rationale: 'Se conserva la doble acción del texto: crear y fortalecer. ''El que'' mantiene el perfil descriptivo de la frase sin introducir un título más elaborado que el griego no exige.'
- source_word: grant some healing
  english_pob_choice: will grant some healing
  chosen_spanish: concederá cierta sanidad
  alternatives_spanish:
  - concederá algún remedio
  - concederá algo de sanidad
  lexicon: ἴασις
  rationale: '''Sanidad'' expresa la curación/restauración esperada; ''cierta'' refleja que el griego e inglés no prometen una plenitud absoluta sino una medida de curación. ''Algún'' sería más coloquial y menos preciso.'
- source_word: when [God] sees the heart ... clean from everything
  english_pob_choice: when [God] sees the heart of the one repenting clean from everything
  chosen_spanish: cuando vea el corazón del que se arrepiente limpio de todo
  alternatives_spanish:
  - cuando vea el corazón del que se arrepiente limpio de toda cosa
  - cuando Dios vea el corazón del penitente limpio de todo
  lexicon: καρδία; καθαρός
  rationale: Se conserva la imagen del corazón como sede moral interior y la limpieza total. El sujeto divino queda implícito como en el inglés entre corchetes; en español la subordinada funciona sin repetir 'Dios' y mantiene la relación condicional implícita.
theological_decisions:
- issue: No immediate forgiveness for repentance without testing and humility
  english_pob_reading: Not entirely. Rather, the one who repents must afflict his own soul... and if he bears the tribulations... will surely be moved with compassion
  chosen_spanish_reading: No del todo. Más bien, el que se arrepiente debe afligirse, humillarse y soportar tribulaciones antes de que Dios conceda compasión y sanidad
  alternative_spanish_readings:
  - los pecados de los arrepentidos son perdonados de inmediato
  - el arrepentimiento por sí solo asegura el perdón inmediato
  rationale: 'La redacción preserva la tensión ascética del pasaje: el arrepentimiento no se presenta como mecanismo automático de perdón, sino como un camino probado por humildad y sufrimiento. Esto sigue la lectura auditada del inglés POB.'
  doctrine_reference: Arrepentimiento, perseverancia y prueba; disciplina moral en la literatura cristiana primitiva.
- issue: Compassion of the Creator as response to endurance
  english_pob_reading: the One who created all things and strengthened them will surely be moved with compassion
  chosen_spanish_reading: el que creó todas las cosas y las fortaleció se moverá sin duda a compasión
  alternative_spanish_readings:
  - Dios tendrá misericordia
  - el Creador se compadecerá
  rationale: '''Se moverá a compasión'' conserva el dinamismo del griego y del inglés POB, evitando reducirlo a un simple enunciado estático. La formulación mantiene la iniciativa divina sin introducir una equivalencia doctrinal más tardía.'
  doctrine_reference: Misericordia divina y respuesta a la perseverancia.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el único marcador de nota, [a], aparece explícitamente en el texto español exactamente en el punto al que se refiere la nota. La redacción también mantiene la continuidad del pasaje sin añadir marcas no ancladas.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' solo cuando el texto lo exija; aquí el sujeto divino aparece como 'el que creó...' y como 'Dios' implícito en la nota textual, sin forzar un reemplazo innecesario.
  - Se prefirió 'arrepintiéndose / se arrepiente' para reproducir el participio procesual del original.
  - '''Sanidad'' se mantiene para respetar el alcance restaurador del término y la opción auditada del inglés POB.'
  - La puntuación y el estilo buscan ser publicables en español moderno sin perder la tonalidad exhortativa del texto primitivo.
