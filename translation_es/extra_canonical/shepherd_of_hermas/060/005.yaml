    rationale: ‘Mitad secas y mitad verdes’ conserva el contraste distributivo del original y mejora la idiomaticidad.
  - severity: low
    issue: La frase ‘a estos también les ordenó que se apartaran’ es algo pesada.
    rationale: Una leve simplificación mejora el flujo sin cambiar el sentido.
  - severity: low
    issue: ‘en la punta’ atenúa ligeramente el matiz de extremo enfático.
    rationale: El inglés auditado dice ‘at the very tip’; ‘en la misma punta’ refleja mejor ese énfasis.
  revised_spanish_text: De algunos recibió las varas secas y comidas como por una polilla; el ángel ordenó a los que habían entregado tales varas que se apartaran. Otros entregaron varas secas, pero no habían sido comidas por una polilla; a estos también les ordenó apartarse. Otros entregaron varas medio secas; y estos se apartaron. Otros entregaron sus varas medio secas y con grietas; y estos se apartaron. Otros entregaron sus varas verdes y con grietas; y estos se apartaron. Otros entregaron sus varas mitad secas y mitad verdes; y estos se apartaron. Otros entregaron dos partes de la vara verdes y la tercera parte seca; y estos se apartaron. Otros entregaron dos partes secas y la tercera parte verde; y estos se apartaron. Otros entregaron sus varas casi enteramente verdes, pero una muy pequeña parte de sus varas estaba seca, en la misma punta; y tenían grietas en ellas; y estos se apartaron.
