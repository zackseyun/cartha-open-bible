  text: From some he received the rods dry and eaten as if by a moth; the angel ordered those who had handed in such rods to stand apart. Others handed in dry rods, but they had not been eaten by a moth; these too he ordered to stand apart. Others handed in rods half-dry; and these stood apart. Others handed in their rods half-dry and having splits; and these stood apart. Others handed in their rods green and having splits; and these stood apart. Others handed in their rods half dry and half green; and these stood apart. Others presented their rods with two parts of the rod green and the third part dry; and these stood apart. Others handed in two parts dry and the third part green; and these stood apart. Others handed in their rods almost entirely green, but a very little of their rods was dry—at the very tip; and they had splits in them; and these stood apart.
translation:
  language: es
  text: De algunos recibió las varas secas y comidas como por una polilla; el ángel ordenó a los que habían entregado tales varas que se apartaran. Otros entregaron varas secas, pero no habían sido comidas por una polilla; a estos también les ordenó apartarse. Otros entregaron varas medio secas; y estos se apartaron. Otros entregaron sus varas medio secas y con grietas; y estos se apartaron. Otros entregaron sus varas verdes y con grietas; y estos se apartaron. Otros entregaron sus varas mitad secas y mitad verdes; y estos se apartaron. Otros entregaron dos partes de la vara verdes y la tercera parte seca; y estos se apartaron. Otros entregaron dos partes secas y la tercera parte verde; y estos se apartaron. Otros entregaron sus varas casi enteramente verdes, pero una muy pequeña parte de sus varas estaba seca, en la misma punta; y tenían grietas en ellas; y estos se apartaron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ξύλα / ῥάβδοι (rod-like sticks in context)
  english_pob_choice: rods
  chosen_spanish: varas
  alternatives_spanish:
  - bastones
  - ramas
  - palos
  lexicon: N/A
  rationale: ‘Varas’ reproduce el objeto alargado y ritual del contexto sin introducir la imagen más específica de ‘bastón’ ni la más coloquial de ‘palo’. Mantiene la repetición del original y la del inglés POB.
- source_word: ξηρά
  english_pob_choice: dry
  chosen_spanish: secas
  alternatives_spanish:
  - secas del todo
  - desecadas
  - áridas
  lexicon: N/A
  rationale: ‘Secas’ es la equivalencia natural y directa en español para el estado físico descrito.
- source_word: βεβρωμένα ὑπὸ σήτος / eaten as if by a moth
  english_pob_choice: eaten as if by a moth
  chosen_spanish: comidas como por una polilla
  alternatives_spanish:
  - comidas por una polilla
  - devoradas como por una polilla
  - mordidas como por una polilla
  lexicon: N/A
  rationale: Se conserva la comparación explícita ‘como por una polilla’, que transmite el deterioro gradual sin fijar un agente literal más fuerte que el griego y el inglés auditado.
- source_word: στάθησαν χωρὶς / stand apart
  english_pob_choice: stand apart
  chosen_spanish: se apartaran / se apartaron
  alternatives_spanish:
  - se colocaran aparte
  - quedaran aparte
  - se mantuvieran aparte
  lexicon: N/A
  rationale: La orden se expresa de forma idiomática en español con ‘se apartaran’; el resultado narrativo se da con ‘se apartaron’, manteniendo la distinción entre mandato y cumplimiento.
- source_word: ἡμίξηρα
  english_pob_choice: half-dry
  chosen_spanish: medio secas
  alternatives_spanish:
  - a medio secas
  - semisecas
  - mitad secas
  lexicon: N/A
  rationale: ‘Medio secas’ conserva el paralelismo repetitivo y resulta claro en español contemporáneo.
- source_word: ῥήγματα / splits
  english_pob_choice: splits
  chosen_spanish: grietas
  alternatives_spanish:
  - hendiduras
  - rajaduras
  - fisuras
  lexicon: N/A
  rationale: ‘Grietas’ es el término más natural y transparente para las roturas o aberturas del material.
- source_word: χλωρά
  english_pob_choice: green
  chosen_spanish: verdes
  alternatives_spanish:
  - verdosas
  - tiernas
  - frescas
  lexicon: N/A
  rationale: ‘Verdes’ mantiene el color literal y el contraste con ‘secas’ sin añadir una interpretación botánica ajena al pasaje.
- source_word: δύο μέρη ... τὸ τρίτον μέρος
  english_pob_choice: two parts ... the third part
  chosen_spanish: dos partes ... la tercera parte
  alternatives_spanish:
  - dos tercios ... un tercio
  - dos porciones ... la tercera porción
  lexicon: N/A
  rationale: Se conserva la forma distributiva del original y del inglés POB, evitando una reformulación matemática que podría sonar menos cercana al patrón descriptivo del texto.
- source_word: ἐπὶ τῇ ἄκρᾳ
  english_pob_choice: at the very tip
  chosen_spanish: en la punta
  alternatives_spanish:
  - en el extremo
  - en la misma punta
  - en la punta misma
  lexicon: N/A
  rationale: ‘En la punta’ reproduce con naturalidad la localización extrema; el contexto ya marca la rareza con ‘muy pequeña parte’.
theological_decisions:
- issue: El pasaje es descriptivo y no doctrinal, pero conserva un juicio visible del ángel mediante la acción de separar.
  english_pob_reading: the angel ordered those who had handed in such rods to stand apart ... and these stood apart
  chosen_spanish_reading: el ángel ordenó a los que habían entregado tales varas que se apartaran ... y estos se apartaron
  alternative_spanish_readings:
  - el ángel mandó que se separaran
  - el ángel dispuso que quedaran aparte
  rationale: Se mantiene la agencia del ángel y el matiz de separación visible en la escena, sin intensificar el lenguaje más allá del relato.
  doctrine_reference: No aplica; escena narrativa parabólica.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete de auditoría; la redacción española se ha alineado directamente con el texto fuente griego y con la formulación inglesa POB recibida, preservando la serie paralelística y la repetición de ‘se apartaron’.
  spanish_consistency_notes:
  - Se mantiene ‘varas’ de manera uniforme para reflejar la repetición del original y evitar alternancias innecesarias.
  - Se conserva ‘grietas’ en todos los lugares donde el texto habla de splits/ῥήγματα.
  - Se usa ‘medio secas’ de forma consistente para ἡμίξηρα.
  - Se respeta la estructura anafórica ‘Otros...; y estos se apartaron’ para mantener el ritmo enumerativo del pasaje.
