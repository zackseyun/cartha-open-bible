base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/045/002.yaml
  text: '"A person," I say, "Lord, is eager to keep the commandments of God, and there is no one who does not ask from the Lord to be strengthened in his commandments and to be subject to them; but the devil is harsh and tyrannizes them."'
translation:
  language: es
  text: «Señor», dije, «una persona desea guardar los mandamientos de Dios, y no hay nadie que no pida al Señor que lo fortalezca para sus mandamientos y para someterse a ellos; pero el diablo es duro y los tiraniza».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄνθρωπος
  english_pob_choice: A person
  chosen_spanish: Una persona
  alternatives_spanish:
  - Un hombre
  - Alguien
  lexicon: ἄνθρωπος
  rationale: El griego es genérico; «una persona» conserva la referencia no marcada mejor que «un hombre», que en español puede sonar masculina o restringida.
- source_word: ἐπιθυμεῖ
  english_pob_choice: is eager
  chosen_spanish: desea
  alternatives_spanish:
  - anhela
  - está ansiosa por
  lexicon: ἐπιθυμέω
  rationale: Aquí expresa un deseo fuerte por obedecer; «desea» es natural y fiel sin sobrerrepresentar intensidad afectiva que el contexto no obliga a marcar con «anhela».
- source_word: τὰς ἐντολὰς τοῦ θεοῦ
  english_pob_choice: the commandments of God
  chosen_spanish: los mandamientos de Dios
  alternatives_spanish:
  - los preceptos de Dios
  - los mandatos de Dios
  lexicon: ἐντολή
  rationale: «Mandamientos» refleja la fórmula bíblica y la fuerza normativa del término sin introducir un matiz más técnico que el texto no exige.
- source_word: κρατῆσαι
  english_pob_choice: to be strengthened
  chosen_spanish: ser fortalecido
  alternatives_spanish:
  - ser robustecido
  - recibir fuerzas
  lexicon: κρατέω
  rationale: El contexto pide capacidad para obedecer; «ser fortalecido» reproduce el sentido pasivo de recibir fuerza para cumplirlos.
- source_word: ὑποταγῆναι
  english_pob_choice: to be subject to them
  chosen_spanish: someterse a ellos
  alternatives_spanish:
  - estar sujetos a ellos
  - subordinarse a ellos
  lexicon: ὑποτάσσω
  rationale: El verbo indica sujeción voluntaria a los mandamientos; «someterse» conserva la relación de obediencia y dependencia.
- source_word: ὁ διάβολος
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el acusador
  - Satanás
  lexicon: διάβολος
  rationale: La identificación es directa y estable; «diablo» es la equivalencia más transparente en español.
- source_word: σκληρός
  english_pob_choice: harsh
  chosen_spanish: duro
  alternatives_spanish:
  - áspero
  - severo
  lexicon: σκληρός
  rationale: «Duro» comunica la aspereza y rigidez del adversario con naturalidad en español moderno.
- source_word: τυραννεῖ
  english_pob_choice: tyrannizes
  chosen_spanish: los tiraniza
  alternatives_spanish:
  - los oprime
  - los domina tiránicamente
  lexicon: τυραννέω
  rationale: «Tiraniza» conserva el valor verbal fuerte del griego y el mismo impacto que la elección inglesa, sin diluir la imagen política/moral.
theological_decisions:
- issue: Quién es «el Señor» en la súplica
  english_pob_reading: Lord refers to the divine Lord in the prayer-formula
  chosen_spanish_reading: «Señor» se mantiene como invocación dirigida a Dios, sin reemplazarla por un título más interpretativo.
  alternative_spanish_readings:
  - «Yahvé»
  - «Señor Dios»
  rationale: El contexto oracional y la tradición del texto apuntan a una invocación devocional; en español, conservar «Señor» respeta la forma directa de súplica sin añadir precisión que el pasaje no explicita.
  doctrine_reference: Cristología y lenguaje de invocación en literatura cristiana primitiva
- issue: Fuerza moral de los mandamientos
  english_pob_reading: commands are something believers ask grace/strength to keep and submit to
  chosen_spanish_reading: Los mandamientos aparecen como exigencias divinas a las que se pide ser fortalecido para obedecer y someterse.
  alternative_spanish_readings:
  - preceptos aconsejables
  - orientaciones espirituales
  rationale: La estructura del texto es normativa, no meramente orientativa. «Mandamientos» y «someterse» preservan ese peso moral y eclesial.
  doctrine_reference: Ética de la obediencia en la tradición cristiana temprana
- issue: Poder opresivo del diablo
  english_pob_reading: the devil is harsh and tyrannizes them
  chosen_spanish_reading: El diablo es presentado como un opresor activo que domina con dureza.
  alternative_spanish_readings:
  - el diablo los trata con severidad
  - el diablo los oprime
  rationale: «Tiraniza» explicita la dimensión de dominio abusivo ya presente en el verbo griego y evita suavizar una afirmación fuerte del texto.
  doctrine_reference: Demonología y combate espiritual en literatura cristiana primitiva
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete. La redacción española sigue directamente el griego normalizado y se mantiene alineada con la solución inglesa auditada, sin introducir variantes textuales ni notas de aparato.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y «Señor» para la invocación directa, conforme al contexto.
  - Se mantiene un registro digno y moderno, sin arcaísmos innecesarios.
  - Se conserva el plural «mandamientos» y el pronombre «ellos» para reflejar la referencia de los mandamientos en el griego.
  - No se emplean notas al pie porque no hay variantes textuales ni ambigüedades que requieran anclaje explícito en esta unidad.
