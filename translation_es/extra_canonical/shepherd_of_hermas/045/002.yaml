  revision_rationale: Se ajusta el orden del vocativo y del verbo de habla para un diálogo natural en español, y se reemplaza la pasiva rígida «ser fortalecido» por una subordinada más idiomática que conserva el mismo sentido de recibir fortaleza para obedecer los mandamientos. No se requieren notas.
