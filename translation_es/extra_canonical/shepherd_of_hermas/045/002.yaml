review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido global del griego según la auditoría inglesa: una persona desea guardar los mandamientos de Dios, pide al Señor fortaleza para ellos y el diablo ejerce dominio opresivo. Sin embargo, hay un problema de naturalidad y precisión en la secuencia dialogal y en la construcción verbal final.'
  spanish_quality_summary: 'El texto es claro y mayormente fiel, pero ««Una persona», dije, «Señor...»» suena forzado en español por la colocación del vocativo. Además, «pida al Señor ser fortalecido en sus mandamientos y someterse a ellos» es comprensible, pero mejora con una redacción más idiomática: «pida al Señor que lo fortalezca para sus mandamientos y para someterse a ellos».'
  glossary_alignment: 'La terminología clave está bien alineada: ἄνθρωπος -> «persona», ἐντολαί -> «mandamientos», διάβολος -> «diablo», τυραννεῖ -> «tiraniza». El uso de «Señor» es aceptable aquí porque no se trata de una instancia explícita de YHWH en texto bíblico, sino de una fórmula de invocación en literatura cristiana primitiva.'
  issues:
  - severity: medium
    issue: Colocación poco natural de «Señor» en el discurso directo
    rationale: En español, ««Una persona», dije, «Señor, desea...»» resulta torpe. La forma ««Señor», dije, «una persona desea...»» preserva mejor la sintaxis dialogal y la vocación directa al interlocutor.
  - severity: medium
    issue: 'Construcción pasiva algo rígida: «pida al Señor ser fortalecido»'
    rationale: 'Aunque fiel al inglés, en español suena más natural y claro expresar la petición con subordinada: «pida al Señor que lo fortalezca». Esto mantiene el sentido de recibir fortaleza sin calco innecesario.'
  - severity: low
    issue: Puntuación dialogal mejorable
    rationale: La redistribución de comas y del inciso «dije» mejora legibilidad y dignidad estilística en español eclesial moderno.
