  to: «Señor», dije, «una persona desea guardar los mandamientos de Dios, y no hay nadie que no pida al Señor que lo fortalezca para sus mandamientos y para someterse a ellos; pero el diablo es duro y los tiraniza».
  rationale: Se ajusta el orden del vocativo y del verbo de habla para un diálogo natural en español, y se reemplaza la pasiva rígida «ser fortalecido» por una subordinada más idiomática que conserva el mismo sentido de recibir fortaleza para obedecer los mandamientos. No se requieren notas.
