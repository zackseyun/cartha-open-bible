  - 'Se conserva la secuencia lógica del original: llenado, presencia de vacíos, inspección selectiva, temor al agrio, pérdida del placer.'
  - '''Jarrones de barro'' y ''vino bueno'' sostienen una imagen clara y audit-able para lectores en español.'
