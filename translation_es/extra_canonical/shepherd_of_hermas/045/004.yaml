base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/045/004.yaml
  text: '"When a man fills very many clay jars with good wine, and among those jars a few are empty, he comes to the jars and does not inspect the full ones—for he knows they are full—but he inspects the empty ones, fearing lest they have turned sour; for empty jars quickly turn sour, and the pleasure of the wine is lost.'
translation:
  language: es
  text: '"Cuando un hombre llena muchísimas vasijas de barro con vino bueno, y entre esas vasijas hay unas pocas vacías, va a las vasijas y no inspecciona las llenas —porque sabe que están llenas—, sino que inspecciona las vacías, temiendo que se hayan agriado; porque las vasijas vacías se agrian rápidamente, y se pierde el placer del vino."'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κέραμος / clay jars
  english_pob_choice: clay jars
  chosen_spanish: jarrones de barro
  alternatives_spanish:
  - vasijas de barro
  - ánforas de barro
  - tinajas de barro
  lexicon: jarrón
  rationale: El griego describe recipientes de arcilla/barro; en español, 'jarrones de barro' conserva la materialidad y la imagen doméstica sin sonar excesivamente técnica. 'Vasijas de barro' es una alternativa válida, pero 'jarrones' mantiene mejor la escena concreta del llenado y la inspección.
- source_word: οἶνος ἀγαθός / good wine
  english_pob_choice: good wine
  chosen_spanish: vino bueno
  alternatives_spanish:
  - vino excelente
  - vino de buena calidad
  lexicon: vino
  rationale: '''Vino bueno'' reproduce la valoración simple del original sin añadir intensidad no documentada. ''Excelente'' o ''de buena calidad'' interpretan más de lo necesario.'
- source_word: ἔρημος / empty
  english_pob_choice: empty
  chosen_spanish: vacíos
  alternatives_spanish:
  - vacantes
  - sin llenar
  - vacíos por dentro
  lexicon: vacío
  rationale: '''Vacíos'' es el equivalente directo y natural en español para los recipientes no llenos.'
- source_word: ἐπισκέπτεται / inspects, examines
  english_pob_choice: does not inspect / inspects
  chosen_spanish: inspecciona
  alternatives_spanish:
  - examina
  - revisa
  - mira
  lexicon: inspeccionar
  rationale: '''Inspecciona'' conserva el acto deliberado y selectivo de examinar los recipientes vacíos, tal como la imagen exige. ''Examina'' también sería posible, pero ''inspecciona'' destaca mejor la revisión cuidadosa.'
- source_word: ὀξύνεται / turned sour
  english_pob_choice: turned sour
  chosen_spanish: se hayan agriado
  alternatives_spanish:
  - se hayan vuelto agrios
  - se hayan echado a perder
  - se hayan avinagrado
  lexicon: agriar
  rationale: La metáfora de que el vino se agria/avinagra es clara en español y mantiene el efecto sensorial del original. 'Agriado' expresa bien el deterioro del vino sin desviarse hacia una explicación técnica.
- source_word: ἡδονή / pleasure
  english_pob_choice: pleasure
  chosen_spanish: el placer
  alternatives_spanish:
  - el gusto
  - la alegría
  - el deleite
  lexicon: placer
  rationale: '''Placer'' reproduce con exactitud el sustantivo abstracto del pasaje. ''Gusto'' podría sonar más coloquial y ''deleite'' más elevado de lo necesario.'
theological_decisions:
- issue: La imagen moral de los recipientes vacíos y llenos es proverbial, no doctrinal.
  english_pob_reading: The English POB presents a straightforward simile without theological embellishment.
  chosen_spanish_reading: La traducción conserva la comparación moral sin añadir interpretación doctrinal.
  alternative_spanish_readings:
  - Convertir la imagen en una alegoría explícita
  - Añadir una glosa moral sobre vigilancia espiritual
  rationale: 'El texto funciona como símil observacional: el dueño revisa los recipientes vacíos porque se agrian antes. Cualquier alegorización excedería el alcance del griego y del testimonio inglés.'
  doctrine_reference: Principio de suficiencia del texto; no aplica una doctrina específica
- issue: 'Preservación del matiz causal final: el placer del vino se pierde por el deterioro de los recipientes vacíos.'
  english_pob_reading: '''and the pleasure of the wine is lost'''
  chosen_spanish_reading: '''y se pierde el placer del vino'''
  alternative_spanish_readings:
  - '''y se pierde el deleite del vino'''
  - '''y se pierde el gusto del vino'''
  rationale: '''Placer'' mantiene la abstracción del inglés y evita introducir una valoración distinta. La construcción impersonal ''se pierde'' sigue de cerca el efecto resultante del original.'
  doctrine_reference: No aplica
- issue: El texto no requiere expansión cristológica ni referencias a YHWH/Dios.
  english_pob_reading: No explicit theological naming in the verse.
  chosen_spanish_reading: No se introducen nombres divinos ni títulos cristológicos.
  alternative_spanish_readings:
  - Añadir una referencia devocional implícita
  - Reformular para lenguaje homilético
  rationale: Fidelidad al género de parábola/ilustración sin sobrecarga teológica.
  doctrine_reference: No aplica
