  text: I say to him, "Lord, listen to a few words from me." He says, "Speak what you wish."
translation:
  language: es
  text: 'Le dije: «Señor, escucha unas pocas palabras mías». Él dice: «Habla lo que quieras».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Λέγω αὐτῷ
  english_pob_choice: I say to him
  chosen_spanish: Le dije
  alternatives_spanish:
  - Le digo
  lexicon: λέγω
  rationale: El griego presenta una narración en estilo directo; en español, el pretérito «dije» da naturalidad narrativa y mantiene la secuencia del diálogo sin añadir matices no presentes.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: κύριος
  rationale: Aquí el vocativo dirige la palabra a la figura interlocutora; «Señor» conserva la forma de tratamiento reverente que el contexto requiere sin forzar una identificación adicional.
- source_word: ἄκουσόν μου
  english_pob_choice: listen to me
  chosen_spanish: escucha ... mías
  alternatives_spanish:
  - escúchame
  - atiende a
  lexicon: ἀκούω
  rationale: «Escucha» reproduce la petición directa. Se mantiene el complemento partitivo «unas pocas palabras» como evidencia de la restricción cuantitativa del original, y «mías» expresa el posesivo implícito del griego.
- source_word: ὀλίγα λόγια
  english_pob_choice: a few words
  chosen_spanish: unas pocas palabras
  alternatives_spanish:
  - algunas palabras
  - unas breves palabras
  lexicon: ὀλίγος; λόγος
  rationale: «Pocas» conserva la limitación del contenido y «palabras» refleja λόγια sin cargarlo con un sentido técnico que el contexto no exige.
- source_word: λέγει
  english_pob_choice: He says
  chosen_spanish: Él dice
  alternatives_spanish:
  - respondió
  - me dice
  lexicon: λέγω
  rationale: Se conserva el presente histórico/escénico del diálogo, muy natural en español para la réplica inmediata.
- source_word: λάλησον ὃ θέλεις
  english_pob_choice: Speak what you wish
  chosen_spanish: Habla lo que quieras
  alternatives_spanish:
  - Di lo que quieras
  - Habla como quieras
  lexicon: λαλέω; θέλω
  rationale: «Habla» comunica la autorización para hablar y evita una construcción rígida. «Lo que quieras» mantiene la libertad otorgada sin introducir una formulación más fuerte que el original.
theological_decisions:
- issue: Tratamiento respetuoso del interlocutor
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Dueño
  rationale: El texto no desarrolla todavía una identificación doctrinal; por eso se conserva el tratamiento reverente y genérico «Señor» sin sobreinterpretarlo.
  doctrine_reference: Cristología y formas de address en literatura cristiana primitiva
- issue: Tono de autorización en la respuesta
  english_pob_reading: Speak what you wish
  chosen_spanish_reading: Habla lo que quieras
  alternative_spanish_readings:
  - Di lo que quieras
  - Habla cuanto quieras
  rationale: La respuesta expresa permiso pleno, no mandato ni censura. La redacción española debe preservar esa apertura sin intensificarla ni suavizarla.
  doctrine_reference: Pragmática del diálogo y fidelidad semántica
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas ni variantes textuales en el paquete auditado; la versión española se basa directamente en el griego normalizado y en la lectura inglesa POB como guía de segmentación y tono.
  spanish_consistency_notes:
  - Se mantiene «Señor» para el vocativo κύριε por fidelidad al tratamiento reverente del diálogo.
  - Se usa puntuación de diálogo en estilo español con comillas angulares no requeridas; se prefieren comillas dobles estándar para claridad de publicación.
  - No se introduce vocabulario eclesiástico adicional que no esté respaldado por el breve segmento griego.
