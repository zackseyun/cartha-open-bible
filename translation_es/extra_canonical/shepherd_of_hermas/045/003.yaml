base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/045/003.yaml
  text: '"He is not able," he says, "to tyrannize the slaves of God—those who hope in him with their whole heart. The devil can wrestle against them, but he cannot overcome them. If, therefore, you resist him, defeated he will flee from you, disgraced. But those who are empty," he says, "are afraid of the devil as though he had power.'
translation:
  language: es
  text: «No puede», dice, «tiranizar a los esclavos de Dios[a] —a los que esperan en él con todo su corazón. El diablo puede luchar contra ellos, pero no puede vencerlos. Si, pues, le resistes, huirá de ti derrotado y avergonzado. Pero los que están vacíos», dice, «temen al diablo como si tuviera poder».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Esclavos» conserva la fuerza del griego δοῦλοι, que el POB inglés también mantuvo para no suavizar la relación de pertenencia y obediencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλοι τοῦ θεοῦ
  english_pob_choice: the slaves of God
  chosen_spanish: los esclavos de Dios
  alternatives_spanish:
  - los siervos de Dios
  - los servidores de Dios
  lexicon: δοῦλος
  rationale: Se conserva la fuerza lexical de δοῦλος con «esclavos», como en el audit trail inglés; «siervos» suavizaría indebidamente el contraste del pasaje entre pertenencia total a Dios y la impotencia del diablo frente a ellos.
- source_word: ἐλπίζουσιν ἐν αὐτῷ
  english_pob_choice: hope in him
  chosen_spanish: esperan en él
  alternatives_spanish:
  - ponen su esperanza en él
  - confían en él
  lexicon: ἐλπίζω
  rationale: «Esperan en él» mantiene la fuerza de expectativa confiada y es natural en español; «confían en él» sería aceptable pero desplaza el matiz de esperanza perseverante.
- source_word: καθ᾿ ὅλης τῆς καρδίας
  english_pob_choice: with their whole heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - de todo corazón
  - con su corazón entero
  lexicon: καρδία
  rationale: Se elige una equivalencia idiomática clara y fiel; conserva la totalidad del compromiso interior sin volverla demasiado literal.
- source_word: παλαίειν
  english_pob_choice: wrestle against them
  chosen_spanish: luchar contra ellos
  alternatives_spanish:
  - forcejear contra ellos
  - hacerles frente
  lexicon: παλαίω
  rationale: «Luchar contra» transmite el enfrentamiento directo sin sonar forzado en español; «forcejear» es más literal pero menos natural para este contexto exhortativo.
- source_word: νικᾶν
  english_pob_choice: overcome them
  chosen_spanish: vencerlos
  alternatives_spanish:
  - derrotarlos
  - prevalecer sobre ellos
  lexicon: νικάω
  rationale: «Vencerlos» reproduce el sentido de triunfo efectivo y mantiene la relación con «derrotado» más adelante.
- source_word: ἀντιστῆτε
  english_pob_choice: you resist him
  chosen_spanish: le resistes
  alternatives_spanish:
  - te le resistes
  - te opones a él
  lexicon: ἀνθίστημι
  rationale: «Resistir» conserva el valor exhortativo de oposición firme y coincide con el paralelo de derrota/huida.
- source_word: ἡττηθείς
  english_pob_choice: defeated
  chosen_spanish: derrotado
  alternatives_spanish:
  - vencido
  - abatido
  lexicon: ἡττάομαι
  rationale: «Derrotado» mantiene el contraste explícito con el «vencer» previo y es claro en español.
- source_word: φεύξεται ἀπὸ σοῦ
  english_pob_choice: will flee from you
  chosen_spanish: huirá de ti
  alternatives_spanish:
  - escapará de ti
  - saldrá huyendo de ti
  lexicon: φεύγω
  rationale: «Huirá de ti» es directo, idiomático y conserva la imagen de retirada vergonzosa.
- source_word: κατησχυμμένος
  english_pob_choice: disgraced
  chosen_spanish: avergonzado
  alternatives_spanish:
  - cubierto de vergüenza
  - deshonrado
  lexicon: καταισχύνω
  rationale: «Avergonzado» comunica la humillación pública implicada sin añadir una interpretación demasiado amplia.
- source_word: κενῶν
  english_pob_choice: those who are empty
  chosen_spanish: los que están vacíos
  alternatives_spanish:
  - los vacíos
  - los vaciados
  lexicon: κενός
  rationale: «Los que están vacíos» preserva la imagen moral-espiritual del texto y sugiere interioridad vacante sin explicitarla más allá del griego.
- source_word: ὡς ἔχοντος δύναμιν
  english_pob_choice: as though he had power
  chosen_spanish: como si tuviera poder
  alternatives_spanish:
  - como si tuviera autoridad
  - como si contara con poder
  lexicon: δύναμις
  rationale: Se conserva la apariencia de poder atribuida al diablo en el temor de los vacíos, sin afirmar que realmente lo tenga.
theological_decisions:
- issue: La condición de los destinatarios como pertenencia total a Dios frente al diablo
  english_pob_reading: the slaves of God—those who hope in him with their whole heart
  chosen_spanish_reading: los esclavos de Dios —los que esperan en él con todo su corazón
  alternative_spanish_readings:
  - los siervos de Dios —los que confían en él con todo su corazón
  - los esclavos de Dios —los que ponen su esperanza en él con todo su corazón
  rationale: Se mantiene la tensión entre pertenencia absoluta y esperanza perseverante sin suavizar δοῦλοι; la versión española conserva el sustantivo fuerte y el perfil espiritual del grupo.
  doctrine_reference: Sant 4:7; Rom 6:16-22
- issue: El alcance real del poder del diablo
  english_pob_reading: The devil can wrestle against them, but he cannot overcome them.
  chosen_spanish_reading: El diablo puede luchar contra ellos, pero no puede vencerlos.
  alternative_spanish_readings:
  - El diablo puede forcejear contra ellos, pero no puede dominarlos
  - El diablo puede combatirlos, pero no puede derrotarlos
  rationale: La redacción preserva la resistencia activa del mal sin concederle victoria; «vencerlos» corresponde al contraste con la exhortación posterior a resistir.
  doctrine_reference: 1 Pe 5:8-9; Stg 4:7
- issue: La lógica de resistencia y huida
  english_pob_reading: If, therefore, you resist him, defeated he will flee from you, disgraced.
  chosen_spanish_reading: Si, pues, le resistes, derrotado huirá de ti, avergonzado.
  alternative_spanish_readings:
  - Si, por tanto, le resistes, huirá de ti derrotado y avergonzado
  - Así que, si le resistes, huirá de ti vencido
  rationale: Se conserva el orden enfático del original y el enlace causal-exhortativo; la derrota del diablo se presenta como resultado de la resistencia del creyente.
  doctrine_reference: Santiago 4:7; 1 Juan 4:4
- issue: La apariencia de poder en los vacíos
  english_pob_reading: those who are empty ... fear the devil as though he had power
  chosen_spanish_reading: los que están vacíos ... temen al diablo como si tuviera poder
  alternative_spanish_readings:
  - los vacíos ... temen al diablo como si tuviera autoridad
  - los que carecen de plenitud ... temen al diablo como si fuera poderoso
  rationale: 'Se mantiene la acusación moral del pasaje: el temor nace de la vaciedad interior, no de una potencia real del diablo.'
  doctrine_reference: 2 Tim 1:7; Heb 2:14-15
translation_notes:
  revision_awareness: No hay revisiones previas aplicadas en el paquete. Se trabajó directamente desde el griego normalizado del testimonio de Lightfoot & Harmer (1891), usando la traducción inglesa POB solo como pista auditada para decisiones léxicas y de énfasis.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero aquí el texto no contiene el nombre divino explícito; aparece solo «Dios».
  - Se conserva la estructura directa de cita narrativa («dice») para reflejar el tono del original.
  - «Esclavos» se usa consistentemente con el estándar POB cuando δοῦλος tiene fuerza lexical plena; no se sustituye por «siervos».
  - «Esperan en él» evita introducir una confianza más abstracta que la esperanza perseverante del griego.
