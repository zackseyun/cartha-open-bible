  to: «No puede», dice, «tiranizar a los esclavos de Dios[a] —a los que esperan en él con todo su corazón. El diablo puede luchar contra ellos, pero no puede vencerlos. Si, pues, le resistes, huirá de ti derrotado y avergonzado. Pero los que están vacíos», dice, «temen al diablo como si tuviera poder».
