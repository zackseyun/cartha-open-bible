review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego según el rastro inglés: mantiene el contraste entre los esclavos de Dios y los que terminan esclavizados al diablo, conserva la secuencia prueba–resistencia–retirada–entrada–esclavización, y refleja bien imágenes clave como ''llenos de fe'', ''sin lugar donde entrar'' y ''los vacíos''. Sin embargo, ''se presenta sobre todos'' no representa bien la idea de ''viene sobre / sobreviene a'' y suena poco natural en español.'
  spanish_quality_summary: 'La mayor parte del texto es clara y digna, pero hay un punto de español poco idiomático y semánticamente impreciso: ''se presenta sobre todos los esclavos de Dios''. En este contexto, ''viene sobre'' o ''se lanza contra'' expresa mejor tanto el sentido del original como un español natural. El resto del pasaje es legible; ''los vacíos'' es algo duro pero defendible por fidelidad al original.'
  glossary_alignment: 'La terminología del proyecto se respeta bien: δοῦλοι = ''esclavos'' y δουλοῦνται = ''quedan esclavizados''. No hay conflicto con otros términos base. La nota léxica sobre ''esclavos'' está bien justificada y correctamente anclada.'
  issues:
  - severity: medium
    issue: '''se presenta sobre todos'' para el movimiento del diablo'
    rationale: La formulación no suena natural en español y no refleja con precisión la idea de llegada/ataque del original y del inglés 'comes upon'. 'Viene sobre todos' o 'viene contra todos' preserva mejor el sentido.
  revised_spanish_text: «Así también el diablo viene sobre todos los esclavos de Dios[a], para ponerlos a prueba. Por tanto, cuantos están llenos de fe le han resistido con firmeza, y él se aparta de ellos, no teniendo lugar donde entrar. Entonces va a los vacíos; y, al tener un lugar, entra en ellos, hace en ellos lo que quiere, y quedan esclavizados por él.»
