base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/045/005.yaml
  text: '"So also the devil comes upon all the slaves of God, testing them. Therefore, as many as are full in faith have strongly resisted him, and he withdraws from them, having no place where he may enter. He comes then to the empty ones; and having a place, he enters into them, and he does in them what he wishes, and they become enslaved to him."'
translation:
  language: es
  text: «Así también el diablo viene sobre todos los esclavos de Dios[a], para ponerlos a prueba. Por tanto, cuantos están llenos de fe le han resistido con firmeza, y él se aparta de ellos, no teniendo lugar donde entrar. Entonces va a los vacíos; y, al tener un lugar, entra en ellos, hace en ellos lo que quiere, y quedan esclavizados por él.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Esclavos: el griego δοῦλοι conserva la fuerza de dependencia total; por eso no se suaviza aquí a «siervos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλοι τοῦ θεοῦ
  english_pob_choice: slaves of God
  chosen_spanish: esclavos de Dios
  alternatives_spanish:
  - siervos de Dios
  - servidores de Dios
  lexicon: δοῦλος
  rationale: El inglés POB conserva la fuerza lexical de δοῦλος con 'slaves'; en español, 'esclavos' mantiene esa dureza y la relación de pertenencia/servicio sin suavizarla a 'siervos', que perdería fuerza semántica.
- source_word: πειράζων
  english_pob_choice: testing them
  chosen_spanish: para ponerlos a prueba
  alternatives_spanish:
  - probándolos
  - tentándolos
  lexicon: πειράζω
  rationale: En este contexto la idea es de prueba/examen de fidelidad más que de mera tentación moral; 'poner a prueba' refleja bien el valor contextual y evita una restricción innecesaria a 'tentar'.
- source_word: πίστει πληρεῖς
  english_pob_choice: full in faith
  chosen_spanish: están llenos de fe
  alternatives_spanish:
  - están plenos de fe
  - son completos en fe
  lexicon: πίστις
  rationale: La imagen de plenitud se conserva con 'están llenos de fe', una formulación natural en español que mantiene el paralelo con el griego y el inglés POB.
- source_word: ἀντέστησαν αὐτῷ
  english_pob_choice: have strongly resisted him
  chosen_spanish: le han resistido con firmeza
  alternatives_spanish:
  - se le han opuesto con firmeza
  - han resistido con fuerza
  lexicon: ἀνθίστημι
  rationale: '''Con firmeza'' expresa el matiz de resistencia intensa sin añadir un adverbio más interpretativo que ''fuertemente''; mantiene el énfasis del inglés POB.'
- source_word: χωρεῖ ἀπ' αὐτῶν
  english_pob_choice: he withdraws from them
  chosen_spanish: él se aparta de ellos
  alternatives_spanish:
  - se retira de ellos
  - se aleja de ellos
  lexicon: χωρέω
  rationale: El verbo griego expresa retirada/irse; 'se aparta de ellos' es claro y conserva la idea de ceder el lugar.
- source_word: τόπον οὐκ ἔχων
  english_pob_choice: having no place where he may enter
  chosen_spanish: no teniendo lugar donde entrar
  alternatives_spanish:
  - sin tener lugar donde entrar
  - no hallando lugar para entrar
  lexicon: τόπος
  rationale: La frase mantiene la conexión con 'lugar' como espacio de acceso o hospedaje interior, tal como lo refleja el inglés POB.
- source_word: τοὺς κενοὺς
  english_pob_choice: the empty ones
  chosen_spanish: los vacíos
  alternatives_spanish:
  - los vacíos de fe
  - los vacíos por dentro
  lexicon: κενός
  rationale: '''Los vacíos'' reproduce de modo directo la caracterización del griego y del inglés POB, evitando explicar demasiado la vaciedad.'
- source_word: ἐν αὐτοῖς
  english_pob_choice: in them
  chosen_spanish: en ellos
  alternatives_spanish:
  - dentro de ellos
  - en su interior
  lexicon: ἐν
  rationale: La preposición se mantiene literal en un español natural, conservando la imagen de inhabitar/actuar dentro de la persona.
- source_word: δουλοῦνται
  english_pob_choice: they become enslaved to him
  chosen_spanish: quedan esclavizados por él
  alternatives_spanish:
  - se esclavizan a él
  - llegan a ser sus esclavos
  lexicon: δουλόω
  rationale: '''Quedan esclavizados'' preserva el pasivo/resultativo del griego y la fuerza del inglés POB, evitando suavizarlo a un mero sometimiento.'
theological_decisions:
- issue: 'Naturaleza de la relación de los fieles con Dios: ''slaves'' en vez de ''servants'''
  english_pob_reading: slaves of God
  chosen_spanish_reading: esclavos de Dios
  alternative_spanish_readings:
  - siervos de Dios
  - servidores de Dios
  rationale: Se conserva la terminología fuerte del POB para no diluir la dependencia radical y la propiedad implícita en δοῦλος; en este aforismo moral, el contraste entre esclavos de Dios y esclavizados por el diablo es deliberado.
  doctrine_reference: Lexical-theological consistency with δοῦλος / δουλόω in ascetic literature
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés; la presente versión sigue de cerca el texto griego normalizado y el giro auditado del POB en inglés, manteniendo el contraste estructural entre pertenencia a Dios y esclavitud al diablo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en el proyecto como norma general, pero este pasaje no contiene el nombre divino.
  - Se conserva la oposición léxica esclavos/esclavizados para reflejar la correspondencia interna del pasaje.
  - El tono es formal y publicable, sin arcaísmos innecesarios, y con puntuación española estándar.
