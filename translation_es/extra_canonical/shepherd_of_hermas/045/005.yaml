revisions:
- from: «Así también el diablo se presenta sobre todos los esclavos de Dios[a], para ponerlos a prueba. Por tanto, cuantos están llenos de fe le han resistido con firmeza, y él se aparta de ellos, no teniendo lugar donde entrar. Entonces se va a los vacíos; y, al tener un lugar, entra en ellos, hace en ellos lo que quiere, y quedan esclavizados por él.»
  to: «Así también el diablo viene sobre todos los esclavos de Dios[a], para ponerlos a prueba. Por tanto, cuantos están llenos de fe le han resistido con firmeza, y él se aparta de ellos, no teniendo lugar donde entrar. Entonces va a los vacíos; y, al tener un lugar, entra en ellos, hace en ellos lo que quiere, y quedan esclavizados por él.»
  rationale: Se corrige únicamente la apertura para que el español sea natural y refleje mejor el sentido de ἔρχεται / 'comes upon'. También se simplifica 'se va a los vacíos' a 'va a los vacíos', que suena más limpio en español sin cambiar el sentido.
