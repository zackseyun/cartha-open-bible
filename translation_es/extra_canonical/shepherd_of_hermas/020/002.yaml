base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/020/002.yaml
  text: “When an old man, having already given up hope for himself because of his weakness and his poverty, expects nothing else but the last day of his life; then, all at once, an inheritance is left to him. On hearing of it he is stirred up, and, becoming overjoyed, he puts on strength; he no longer lies down, but stands; his spirit—already corrupted by his former deeds—is renewed; and he no longer sits, but takes courage. So also you, when you heard the revelation that the Lord revealed to you.
translation:
  language: es
  text: “Cuando un anciano, habiendo ya perdido la esperanza respecto de sí mismo por su debilidad y su pobreza, no espera otra cosa sino el último día de su vida, entonces, de pronto, se le deja una herencia. Al enterarse, se conmueve y, llenándose de alegría, cobra fuerzas; ya no se acuesta, sino que se pone de pie; su espíritu —ya corrompido por sus obras anteriores— se renueva; y ya no se sienta, sino que cobra ánimo. Así también tú, cuando oíste la revelación que el Señor te reveló.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γέρων / old man
  english_pob_choice: old man
  chosen_spanish: anciano
  alternatives_spanish:
  - viejo
  - hombre viejo
  lexicon: γέρων
  rationale: «Anciano» conserva la referencia a edad avanzada con dignidad natural en español y evita el tono despectivo de «viejo».
- source_word: ἀπελπισθεὶς ἑαυτῷ
  english_pob_choice: having already given up hope for himself
  chosen_spanish: habiendo ya renunciado a toda esperanza para sí mismo
  alternatives_spanish:
  - habiendo perdido ya la esperanza para sí mismo
  - desesperado acerca de sí mismo
  lexicon: ἀπελπίζω
  rationale: La idea es de desesperanza respecto de su propia condición; «renunciado a toda esperanza» reproduce bien la pérdida total de expectativa sin añadir psicologismo.
- source_word: ἀσθενείᾳ καὶ πτωχείᾳ
  english_pob_choice: because of his weakness and his poverty
  chosen_spanish: por su debilidad y su pobreza
  alternatives_spanish:
  - a causa de su debilidad y su pobreza
  - por su flaqueza y su pobreza
  lexicon: ἀσθένεια / πτωχεία
  rationale: «Debilidad» y «pobreza» son los equivalentes más directos y claros en español contemporáneo, manteniendo el paralelismo causal.
- source_word: κληρονομία
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - heredad
  - patrimonio
  lexicon: κληρονομία
  rationale: «Herencia» es el equivalente normal en español y conserva la noción de algo recibido sin mérito propio.
- source_word: ἐγείρεται / stirred up
  english_pob_choice: he is stirred up
  chosen_spanish: se conmueve
  alternatives_spanish:
  - se despierta
  - se agita
  lexicon: ἐγείρω
  rationale: El griego comunica reanimación interior; «se conmueve» expresa el impacto que lo saca de su abatimiento sin sonar forzado.
- source_word: χαίρων / overjoyed
  english_pob_choice: becoming overjoyed
  chosen_spanish: llenándose de alegría
  alternatives_spanish:
  - lleno de gozo
  - regocijándose
  lexicon: χαίρω
  rationale: «Llenándose de alegría» mantiene el proceso de intensificación afectiva del participio griego y su efecto progresivo.
- source_word: ἐνδυναμοῦται / puts on strength
  english_pob_choice: puts on strength
  chosen_spanish: cobra fuerzas
  alternatives_spanish:
  - se fortalece
  - se reviste de fuerza
  lexicon: ἐνδυναμόω
  rationale: La imagen idiomática de recibir o adquirir vigor queda bien en «cobra fuerzas», fluida y fiel.
- source_word: κεῖται / lies down
  english_pob_choice: lies down
  chosen_spanish: se acuesta
  alternatives_spanish:
  - yace
  - se echa
  lexicon: κεῖμαι
  rationale: «Se acuesta» reproduce la oposición corporal con «se pone de pie» y es transparente para el lector.
- source_word: ἵσταται / stands
  english_pob_choice: stands
  chosen_spanish: se pone de pie
  alternatives_spanish:
  - está de pie
  - se levanta
  lexicon: ἵστημι
  rationale: «Se pone de pie» expresa con claridad el cambio de postura y el paso de abatimiento a vigor.
- source_word: ἀνακαινοῦται τὸ πνεῦμα αὐτοῦ
  english_pob_choice: his spirit ... is renewed
  chosen_spanish: su espíritu —ya corrompido por sus obras anteriores— se renueva
  alternatives_spanish:
  - su espíritu se renueva
  - su aliento se renueva
  lexicon: πνεῦμα
  rationale: «Espíritu» es la lectura natural aquí; se conserva la aclaración moral del POB sobre la corrupción previa, que explica el contraste con la renovación.
- source_word: παρρησιάζεται / takes courage
  english_pob_choice: takes courage
  chosen_spanish: cobra ánimo
  alternatives_spanish:
  - toma valor
  - se anima
  lexicon: παρρησιάζομαι
  rationale: El sentido es de recobrar confianza y resolución; «cobra ánimo» es idiomático y solemne.
- source_word: ἀποκάλυψιν ἣν ἀπεκάλυψεν ὁ κύριος
  english_pob_choice: the revelation that the Lord revealed to you
  chosen_spanish: la revelación que el Señor les reveló
  alternatives_spanish:
  - la revelación que el Señor les mostró
  - la revelación que el Señor les dio a conocer
  lexicon: ἀποκάλυψις / κύριος
  rationale: Se mantiene la redundancia del original («revelación... reveló») porque es retóricamente intencional; «Señor» preserva la forma del audit trail inglés para κύριος en este contexto narrativo.
theological_decisions:
- issue: Tensión entre κύριος y el nombre divino
  english_pob_reading: the Lord revealed to you
  chosen_spanish_reading: el Señor les reveló
  alternative_spanish_readings:
  - Yahvé les reveló
  - el Señor-Yahvé les reveló
  rationale: En este dicho visionario, el inglés audit trail ya fija «the Lord»; el texto griego usa κύριος sin una marca explícita de cita del Tetragrámaton. Por eso se conserva «Señor» en español para no sobreinterpretar la alusión.
  doctrine_reference: Divine-name rendering; source-bound caution
- issue: Renovación del espíritu tras obras previas
  english_pob_reading: his spirit—already corrupted by his former deeds—is renewed
  chosen_spanish_reading: su espíritu —ya corrompido por sus obras anteriores— se renueva
  alternative_spanish_readings:
  - su espíritu, ya corrompido por sus obras anteriores, se renueva
  - su espíritu, corrompido por sus antiguas obras, es renovado
  rationale: 'Se conserva la tensión moral del contraste: el espíritu está dañado por acciones previas y luego es renovado. No se suaviza la causalidad ética ni se sustituye por una lectura más abstracta.'
  doctrine_reference: Moral transformation and renewal
