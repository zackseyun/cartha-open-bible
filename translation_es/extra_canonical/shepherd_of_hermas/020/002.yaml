review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego y del audit trail inglés: describe bien el contraste entre desesperanza, súbita herencia y reanimación física y anímica, y conserva la redundancia retórica de «revelación… reveló». Sin embargo, hay dos desajustes importantes: «Al oírlo» debería referirse más claramente a la noticia de la herencia, y el cambio a segunda persona plural («ustedes… les») no concuerda con el inglés/source, que es singular («you»).'
  spanish_quality_summary: El español es claro y digno, pero «Al oírlo» suena algo impreciso, y «ustedes… les» rompe la concordancia referencial del pasaje. Además, «renunciado a toda esperanza para sí mismo» es comprensible, pero «perdido ya la esperanza respecto de sí mismo» suena más natural en español sin perder fuerza. El resto es fluido y bien construido.
  glossary_alignment: La terminología general está bien alineada. «Anciano», «herencia», «espíritu» y «Señor» son defendibles en este contexto. La decisión de conservar «Señor» para κύριος es razonable aquí por cautela fuente-dependiente, sin requerir «Yahvé». No hay conflicto con los defaults principales del proyecto.
  issues:
  - severity: medium
    issue: Cambio injustificado de singular a plural en la apelación final
    rationale: El inglés POB dice «to you» y el contexto comparativo apunta a un destinatario singular. El borrador usa «ustedes… les», lo que altera el referente sin apoyo en los datos suministrados.
  - severity: low
    issue: «Al oírlo» deja ambiguo el referente
    rationale: Puede entenderse como oír la herencia misma o la noticia. «Al enterarse» o «Al oír de ello» refleja mejor el sentido del inglés «On hearing of it».
  - severity: low
    issue: «Renunciado a toda esperanza para sí mismo» es algo pesado en español
    rationale: Aunque fiel, suena menos idiomático que «habiendo perdido ya la esperanza respecto de sí mismo» o similar. Es un ajuste de naturalidad, no de contenido.
