revisions:
- from: “Cuando un anciano, habiendo ya renunciado a toda esperanza para sí mismo por su debilidad y su pobreza, no espera otra cosa sino el último día de su vida; entonces, de pronto, se le deja una herencia. Al oírlo, se conmueve y, llenándose de alegría, cobra fuerzas; ya no se acuesta, sino que se pone de pie; su espíritu —ya corrompido por sus obras anteriores— se renueva; y ya no se sienta, sino que cobra ánimo. Así también ustedes, cuando oyeron la revelación que el Señor les reveló.”
  to: “Cuando un anciano, habiendo ya perdido la esperanza respecto de sí mismo por su debilidad y su pobreza, no espera otra cosa sino el último día de su vida, entonces, de pronto, se le deja una herencia. Al enterarse, se conmueve y, llenándose de alegría, cobra fuerzas; ya no se acuesta, sino que se pone de pie; su espíritu —ya corrompido por sus obras anteriores— se renueva; y ya no se sienta, sino que cobra ánimo. Así también tú, cuando oíste la revelación que el Señor te reveló.”
  rationale: Se corrige la persona gramatical final a singular para ajustarla al source/audit trail, se aclara «On hearing of it» con «Al enterarse», y se pule la expresión de desesperanza para que suene más natural en español sin perder el matiz del original. No hacen falta notas al pie.
