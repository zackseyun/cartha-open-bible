  revision_rationale: Se corrige la persona gramatical final a singular para ajustarla al source/audit trail, se aclara «On hearing of it» con «Al enterarse», y se pule la expresión de desesperanza para que suene más natural en español sin perder el matiz del original. No hacen falta notas al pie.
