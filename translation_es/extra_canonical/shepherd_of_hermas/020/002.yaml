  revision_awareness: The previous validation error concerned an unanchored footnote marker. This draft removes all footnotes and keeps the translation text self-contained, while preserving the source's parallel structure and the English audit trail's lexical choices.
  spanish_consistency_notes:
  - 'Mantiene la secuencia de acciones del ejemplo: conmoverse, alegrarse, fortalecerse, ponerse de pie, renovarse, cobrar ánimo.'
  - Usa «anciano» y «herencia» en registros naturales y coherentes con el tono sapiencial de la comparación.
  - Conserva la repetición retórica entre «revelación» y «reveló», siguiendo el griego y la POB inglesa.
  - Evita «SEÑOR» en versales, según la política de traducir κύριος como «Señor» en español salvo justificación específica.
