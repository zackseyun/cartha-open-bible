base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/020/003.yaml
  text: “For he had compassion on you and renewed your spirits, and you put away your softness; strength came to you and you were strengthened in faith; and when the Lord saw your strengthening, he rejoiced. For this reason he made known to you the building of the tower, and he will make other things known, if, with a whole heart, you are at peace among yourselves.”
translation:
  language: es
  text: Porque tuvo compasión de ustedes y renovó sus espíritus, y ustedes dejaron atrás su debilidad; recibieron fuerzas y fueron fortalecidos en la fe; y cuando el Señor vio su fortalecimiento, se alegró. Por esta razón les dio a conocer la construcción de la torre, y dará a conocer otras cosas, si, con todo el corazón, están en paz entre ustedes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐσπλαγχνίσθη / ἐλέησεν (compasión)
  english_pob_choice: he had compassion on you
  chosen_spanish: tuvo compasión de ustedes
  alternatives_spanish:
  - se compadeció de ustedes
  - tuvo misericordia de ustedes
  lexicon: compasión
  rationale: La POB inglesa usa 'compassion' y el contexto pide una respuesta misericordiosa de Yahvé/«el Señor»; en español 'tuvo compasión de' conserva el matiz afectivo sin volverlo demasiado técnico. Se evita 'misericordia' como primera opción porque en este pasaje la reacción divina se presenta en términos de compasión activa.
- source_word: ἀνέκαινεν τὰ πνεύματα
  english_pob_choice: renewed your spirits
  chosen_spanish: renovó sus espíritus
  alternatives_spanish:
  - renovó su espíritu
  - reavivó sus espíritus
  lexicon: espíritu
  rationale: Se mantiene el plural de la fuente y de la POB inglesa ('spirits'), que sugiere el estado interior de los destinatarios. 'Espíritus' en español puede sonar intenso, pero aquí refleja mejor el plural del original que una singularización interpretativa.
- source_word: μαλακία / softness
  english_pob_choice: you put away your softness
  chosen_spanish: ustedes dejaron de lado su blandura
  alternatives_spanish:
  - apartaron su suavidad
  - renunciaron a su flaqueza
  lexicon: blandura
  rationale: La POB inglesa opta por 'softness' con fuerza moral; 'blandura' en español conserva esa connotación de falta de firmeza mejor que 'suavidad', que sería demasiado neutra o física.
- source_word: ἰσχύς / ἐκραταιώθητε
  english_pob_choice: strength came to you and you were strengthened
  chosen_spanish: les vino la fortaleza y fueron fortalecidos
  alternatives_spanish:
  - les llegó la fuerza y fueron fortalecidos
  - vino fuerza a ustedes y se fortalecieron
  lexicon: fortaleza
  rationale: Se distingue entre la llegada de la fuerza y el resultado pasivo de ser fortalecidos, reproduciendo el doble movimiento del griego y de la POB inglesa. 'Fortaleza' comunica bien la cualidad recibida y evita un calco torpe.
- source_word: πίστις
  english_pob_choice: in faith
  chosen_spanish: en la fe
  alternatives_spanish:
  - en fe
  - por la fe
  lexicon: fe
  rationale: Se conserva la fórmula natural y eclesial 'en la fe', fiel al sentido relacional y al uso idiomático español.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dueño
  lexicon: Señor
  rationale: Aquí la tradición textual y la POB inglesa usan 'the Lord' como designación del personaje divino del relato; en español 'el Señor' mantiene esa forma sin introducir una explicitación que el texto narrativo no marca de manera directa.
- source_word: οἰκοδομή
  english_pob_choice: the building of the tower
  chosen_spanish: la edificación de la torre
  alternatives_spanish:
  - la construcción de la torre
  - el edificio de la torre
  lexicon: edificación
  rationale: '''Edificación'' preserva la ambigüedad entre el proceso y la obra resultante, como la POB inglesa con ''building''. ''Construcción'' sería posible, pero ''edificación'' encaja mejor con el registro y con el simbolismo de la torre en Hermas.'
- source_word: γνωρίσει
  english_pob_choice: he will make other things known
  chosen_spanish: dará a conocer otras cosas
  alternatives_spanish:
  - hará saber otras cosas
  - les revelará otras cosas
  lexicon: dar a conocer
  rationale: '''Dar a conocer'' sigue de cerca el verbo de revelación sin cargarlo con un tono excesivamente teológico (''revelará'') que la POB inglesa no usa. Se mantiene la apertura a nuevas instrucciones.'
- source_word: ἐὰν ἐν ὅλῃ καρδίᾳ
  english_pob_choice: if, with a whole heart
  chosen_spanish: si, con todo el corazón
  alternatives_spanish:
  - si, de todo corazón
  - si su corazón es íntegro
  lexicon: corazón
  rationale: '''Con todo el corazón'' reproduce el valor de integridad y totalidad que expresa el griego y que la POB inglesa traduce literalmente pero de forma idiomática. ''De todo corazón'' sería también posible, aunque algo más adverbial.'
- source_word: εἰρηνεύητε ἐν ἀλλήλοις
  english_pob_choice: you are at peace among yourselves
  chosen_spanish: están en paz entre ustedes
  alternatives_spanish:
  - viven en paz unos con otros
  - se mantienen en paz entre ustedes
  lexicon: paz
  rationale: La POB inglesa señala una paz recíproca; 'entre ustedes' conserva esa dimensión comunitaria de forma clara y natural en español.
theological_decisions:
- issue: Cómo referir el sujeto divino que tiene compasión, fortalece y da a conocer
  english_pob_reading: the Lord as the acting divine figure
  chosen_spanish_reading: el Señor como sujeto divino activo
  alternative_spanish_readings:
  - Yahvé como sujeto explícito
  - Dios como sujeto explícito
  rationale: La fuente y la POB inglesa mantienen 'the Lord' sin desarrollar la identificación explícita en este tramo. En español, 'el Señor' preserva la continuidad literaria y evita sobreinterpretar una identificación que el segmento no explicita directamente.
  doctrine_reference: Consistente con el tratamiento narrativo-teológico del texto y con la prudencia cristológica/patrística del pasaje.
- issue: Relación entre fortalecimiento interior y fortalecimiento en la fe
  english_pob_reading: your spirits renewed ... strengthened in faith
  chosen_spanish_reading: renovación interior y fortalecimiento en la fe
  alternative_spanish_readings:
  - renovación de sus espíritus y aumento de la fe
  - reavivamiento espiritual y fortalecimiento en la fe
  rationale: 'La redacción conserva dos movimientos: uno interior (''renovó sus espíritus'') y otro específicamente confesional (''fortalecidos en la fe''). No se fusionan, porque el texto los distingue y la POB inglesa también.'
  doctrine_reference: Antropología moral/espiritual del pasaje; distinción entre estado interior y fe.
- issue: Condición para recibir más revelación
  english_pob_reading: if, with a whole heart, you are at peace among yourselves
  chosen_spanish_reading: si, con todo el corazón, están en paz entre ustedes
  alternative_spanish_readings:
  - si de todo corazón permanecen en paz unos con otros
  - si su corazón es íntegro y viven en paz
  rationale: Se mantiene la condición comunitaria como requisito para que se 'darán a conocer otras cosas'. No se moraliza más allá de la fuente; la paz recíproca es una disposición concreta, no una abstracción.
  doctrine_reference: Tema de obediencia comunitaria y disposición interior en la literatura de Hermas.
translation_notes:
  revision_awareness: No hubo notas de revisión aplicadas en el paquete; el estado de acuerdo alto sugiere que la presente versión sigue de cerca la lectura inglesa auditada y la fuente griega, ajustando solo la idiomaticidad del español y la consistencia terminológica.
  spanish_consistency_notes:
  - Se mantiene 'el Señor' para ὁ κύριος por continuidad con la POB inglesa y porque el pasaje narra su acción sin redefinirlo aquí.
  - Se usa 'espíritus' en plural para respetar el plural del fuente/POB; no se singulariza.
  - '''Blandura'' se elige por su fuerza moral; no se reemplaza por un término más suave que diluya el contraste.'
  - '''Dar a conocer'' se prefiere a ''revelar'' para mantener el nivel semántico del inglés POB y del griego sin sobrerreligiosizar el verbo.'
