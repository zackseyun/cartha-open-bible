  text: But in the second vision you saw her standing, with a countenance younger and more cheerful than before, though her flesh and her hair were older. “Listen,” she says, “to this parable also.
translation:
  language: es
  text: Pero en la segunda visión la viste de pie, con un semblante más joven y más alegre que antes, aunque su carne y su cabello eran más viejos. «Escucha también esta parábola», dice.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: standing
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - en pie
  - estando de pie
  lexicon: ἑστηκυῖαν / ἵστημι
  rationale: «De pie» expresa con naturalidad el estado de estar parada sin forzar una construcción más pesada; conserva el contraste visual del pasaje.
- source_word: countenance younger and more cheerful than before
  english_pob_choice: a countenance younger and more cheerful than before
  chosen_spanish: con un semblante más joven y más alegre que antes
  alternatives_spanish:
  - con un rostro más joven y más alegre que antes
  - con una apariencia más joven y más alegre que antes
  lexicon: πρόσωπον / ὄψις
  rationale: «Semblante» mantiene el tono elevado y visible del griego para el aspecto del rostro, y «más alegre» recoge la idea de mayor viveza/alegría del original y de la versión inglesa.
- source_word: though her flesh and her hair were older
  english_pob_choice: though her flesh and her hair were older
  chosen_spanish: aunque su carne y su cabello eran más viejos
  alternatives_spanish:
  - aunque su carne y su cabello estaban más viejos
  - aunque su carne y su pelo eran más viejos
  lexicon: σάρξ / τρίχες
  rationale: Se conserva «carne» para σάρξ, en línea con el valor físico concreto del texto, y «cabello» como equivalente natural de «hair» en español culto sin perder el matiz corporal.
- source_word: Listen ... to this parable also
  english_pob_choice: Listen ... to this parable also
  chosen_spanish: Escucha ... también esta parábola
  alternatives_spanish:
  - Oye ... también esta parábola
  - Escuchen ... también esta parábola
  lexicon: ἀκούσατε / παραβολή
  rationale: «Escucha» transmite la llamada directa en singular; «también» preserva el adverbio del inglés y del griego, indicando continuidad con lo dicho antes. «Parábola» mantiene el término técnico narrativo.
theological_decisions:
- issue: 'Descripción física de la figura en la visión: juventud del semblante frente a vejez de carne y cabello'
  english_pob_reading: a paradoxical visual contrast is retained without resolving it
  chosen_spanish_reading: Se mantiene el contraste paradójico entre el semblante joven y la carne/cabello envejecidos
  alternative_spanish_readings:
  - Se armoniza el contraste como una simple apariencia
  - Se interpreta la diferencia como una metáfora moral
  rationale: El texto presenta deliberadamente una tensión visual que no debe suavizarse. La traducción conserva ambas descripciones sin explicarlas ni nivelarlas.
  doctrine_reference: Hermas, Visiones; principio de fidelidad a la imagen visionaria sin armonización interpretativa
- issue: Discurso directo de la figura femenina en visión
  english_pob_reading: “Listen,” she says, “to this parable also.”
  chosen_spanish_reading: Se conserva el habla directa con comillas y verbo introductorio 'dice'
  alternative_spanish_readings:
  - Se parafrasea en narración indirecta
  - Se omite el verbo de habla
  rationale: Mantener el discurso directo preserva el ritmo visionario y evita perder el efecto dramático de la instrucción.
  doctrine_reference: Hermas, estilo narrativo visionario
translation_notes:
  revision_awareness: El texto fuente y la auditoría inglesa muestran acuerdo alto, con solo observaciones menores; no hay revisiones aplicadas que obliguen a cambios textuales. La presente versión sigue de cerca la estructura del inglés POB, pero vuelve al griego mediante soluciones naturales en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general solo cuando el texto lo requiera; este pasaje no contiene el nombre divino.
  - Se prefiere «parábola» para παραβολή por consistencia terminológica en textos de enseñanza visionaria.
  - Se mantiene «carne» para σάρξ en contraste físico literal, no como paráfrasis moral.
