revisions:
- from: Pero si sobreviene un temperamento irritable, inmediatamente el Espíritu Santo[a] —siendo tierno— queda estrechado, al no tener un lugar limpio, y procura retirarse de ese lugar; porque es ahogado por el espíritu malo, al no tener espacio para ministrar al Señor como desea, por quedar contaminado por el temperamento irritable. Porque en la longanimidad habita el Señor, pero en el temperamento irritable, el diablo. Por tanto, cuando ambos espíritus habitan juntos en una misma persona, eso no le es provechoso ni le hace bien.
  to: Pero si sobreviene un enojo repentino, de inmediato el Espíritu Santo[a] —por ser tierno— se ve restringido, al no tener un lugar limpio, y procura retirarse de ese lugar; porque es ahogado por el espíritu malo, al no tener espacio para ministrar al Señor como desea, al quedar contaminado por ese enojo. Porque en la longanimidad habita el Señor, pero en el enojo repentino habita el diablo. Por tanto, cuando ambos espíritus habitan juntos en un mismo ser humano, le resulta inútil y perjudicial.
  rationale: La revisión mantiene el contenido del original y del POB inglés, pero mejora la naturalidad y precisión del español. Se reemplaza 'temperamento irritable' por 'enojo repentino' para reflejar mejor 'quick temper'; 'queda estrechado' por 'se ve restringido' para una imagen más idiomática; y la frase final se fortalece a 'le resulta inútil y perjudicial' para conservar el peso negativo del original. También se evita la especificación innecesaria 'una misma persona' y se usa 'un mismo ser humano', más amplia y cercana al sentido de la fuente.
