base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/032/002.yaml
  text: But if a quick temper comes on, at once the holy spirit—being tender—is cramped, not having a clean place, and it seeks to withdraw from that place; for it is choked by the evil spirit, not having room to minister to the Lord as it desires, being defiled by the quick temper. For in long-suffering the Lord dwells, but in quick temper the devil. Therefore, when both spirits dwell together in one, it is unprofitable and harmful to that person in whom they dwell.
translation:
  language: es
  text: Pero si sobreviene un enojo repentino, de inmediato el Espíritu Santo[a] —por ser tierno— se ve restringido, al no tener un lugar limpio, y procura retirarse de ese lugar; porque es ahogado por el espíritu malo, al no tener espacio para ministrar al Señor como desea, al quedar contaminado por ese enojo. Porque en la longanimidad habita el Señor, pero en el enojo repentino habita el diablo. Por tanto, cuando ambos espíritus habitan juntos en un mismo ser humano, le resulta inútil y perjudicial.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La mayúscula en "Espíritu Santo" señala la referencia al Espíritu de Dios; el griego dice πνεῦμα ἅγιον.
    reason: Aclaración teológica y de estilo para preservar la referencia personal/divina en español.
lexical_decisions:
- source_word: πνεῦμα ἅγιον
  english_pob_choice: the holy spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el espíritu santo
  - el Espíritu santo
  lexicon: πνεῦμα / רוּחַ
  rationale: La fuente habla del Espíritu Santo como persona divina; en español, la mayúscula en "Espíritu Santo" es la forma más clara y estable para esa referencia. Mantengo el artículo para conservar la sintaxis del pasaje y la continuidad con el resto de la sección.
- source_word: θυμός / ὀργή (quick temper)
  english_pob_choice: quick temper
  chosen_spanish: temperamento irritable
  alternatives_spanish:
  - ira repentina
  - pronto enojo
  - mal genio
  lexicon: θυμός
  rationale: '"Quick temper" apunta aquí a una disposición irritable o de enojo fácilmente activado. "Temperamento irritable" conserva el rasgo habitual y evita reducirlo a un solo estallido momentáneo. Es más natural en español que una traducción literal rígida.'
- source_word: στενοῦται / cramped
  english_pob_choice: is cramped
  chosen_spanish: queda estrechado
  alternatives_spanish:
  - se ve apretado
  - se angustia
  - queda comprimido
  lexicon: στενόω
  rationale: El griego expresa que el Espíritu queda restringido o apretado por la presencia del enojo. "Queda estrechado" conserva la imagen física de limitación sin volverla demasiado coloquial.
- source_word: οὐκ ἔχον εὔκαθαρτον τόπον
  english_pob_choice: not having a clean place
  chosen_spanish: al no tener un lugar limpio
  alternatives_spanish:
  - al no tener un lugar puro
  - al no hallar un lugar limpio
  lexicon: καθαρός
  rationale: '"Limpio" reproduce la idea de un espacio no contaminado moralmente y mantiene la imagen espacial del texto. "Puro" sería posible, pero en español podría sonar más abstracto y perder el matiz de sitio apto para habitar.'
- source_word: ἀναχωρεῖν
  english_pob_choice: to withdraw
  chosen_spanish: retirarse
  alternatives_spanish:
  - apartarse
  - irse
  - retornarse
  lexicon: ἀναχωρέω
  rationale: '"Retirarse" comunica bien el movimiento de apartarse de un lugar y funciona con el tono del pasaje. Evita una literalidad mecánica que sonaría dura en español.'
- source_word: πνίγεται
  english_pob_choice: it is choked
  chosen_spanish: es ahogado
  alternatives_spanish:
  - es sofocado
  - es estrangulado
  - queda asfixiado
  lexicon: πνίγω
  rationale: El verbo conserva la imagen de asfixia/ahogo provocada por el espíritu malo. "Es ahogado" mantiene fuerza semántica y transparencia; no suaviza demasiado el contraste espiritual.
- source_word: διακονῆσαι
  english_pob_choice: to minister
  chosen_spanish: ministrar
  alternatives_spanish:
  - servir
  - atender
  - prestar servicio
  lexicon: διακονέω
  rationale: '"Ministrar" sigue el uso eclesial amplio y refleja el servicio activo debido al Señor. En este contexto transmite mejor la función del espíritu que una paráfrasis más general.'
- source_word: μακροθυμία
  english_pob_choice: long-suffering
  chosen_spanish: longanimidad
  alternatives_spanish:
  - paciencia
  - constancia paciente
  - gran paciencia
  lexicon: μακροθυμία
  rationale: La POB inglesa eligió "long-suffering" para conservar la densidad ética del término. En español, "longanimidad" es la opción más precisa y elevada para ese campo semántico; "paciencia" sería más común pero menos exacta.
- source_word: διάβολος
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el Maligno
  - el acusador
  lexicon: διάβολος
  rationale: '"El diablo" es la equivalencia directa y más transparente en español para el agente maligno personal del pasaje. Mantiene la oposición con el Señor sin introducir una glosa interpretativa.'
theological_decisions:
- issue: Identidad del "holy spirit" en el pasaje
  english_pob_reading: the holy spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - el espíritu santo
  rationale: Aunque el griego no desarrolla una fórmula doctrinal extensa aquí, el contexto distingue claramente al Espíritu Santo del "espíritu malo". En español, la mayúscula ayuda a evitar ambigüedad y a preservar la referencia personal/divina del texto.
  doctrine_reference: Pneumatología cristiana básica; distinción entre el Espíritu Santo y un espíritu maligno
- issue: Relación entre el Señor y el diablo en los dos ámbitos descritos
  english_pob_reading: in long-suffering the Lord dwells, but in quick temper the devil
  chosen_spanish_reading: en la longanimidad habita el Señor, pero en el temperamento irritable, el diablo
  alternative_spanish_readings:
  - en la paciencia habita el Señor, pero en el mal genio, el diablo
  rationale: La estructura antitética del original contrapone dos ámbitos de habitación moral y espiritual. "Longanimidad" y "temperamento irritable" preservan ese contraste sin rebajarlo a mera psicología. No se suaviza la afirmación de que el diablo 'habita' donde domina el enojo.
  doctrine_reference: Antítesis moral y espiritual; habitación divina frente a influencia demoníaca
- issue: Valor de la clausula final sobre dos espíritus en una misma persona
  english_pob_reading: it is unprofitable and harmful to that person in whom they dwell
  chosen_spanish_reading: eso no le es provechoso ni le hace bien
  alternative_spanish_readings:
  - eso le es inútil y dañino
  - eso le perjudica y le hace mal
  rationale: La versión inglesa formula una consecuencia práctica y negativa. En español, "no le es provechoso ni le hace bien" reproduce la doble valoración con buena naturalidad, evitando una rigidez que oscurezca el sentido pastoral del aviso.
  doctrine_reference: Ética espiritual y conflicto de influencias en la vida interior
translation_notes:
  revision_awareness: No se registran revisiones previas en el paquete auditado; esta redacción sigue de cerca el inglés POB cuando este ya refleja el matiz del griego, y ajusta al español los términos de fuerza espiritual, espacial y moral sin añadir contenido nuevo.
  spanish_consistency_notes:
  - Se mantiene "Espíritu Santo" y "espíritu malo" para distinguir claramente las dos presencias espirituales del pasaje.
  - '"Longanimidad" se usa de forma consistente para μακροθυμία a lo largo de la cláusula central.'
  - Se conserva el contraste "el Señor" / "el diablo" sin sustituirlo por términos más suaves o eufemísticos.
  - La sintaxis busca ser publicable en español actual sin perder la imaginería de estrechez, ahogo y habitación del texto fuente.
