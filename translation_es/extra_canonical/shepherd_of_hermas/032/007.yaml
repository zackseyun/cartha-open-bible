base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/032/007.yaml
  text: Therefore keep away from quick temper—that most wicked spirit—but clothe yourself with long-suffering, and stand against quick temper and bitterness, and you will be found with the dignity that is beloved by the Lord. See to it, then, that you never neglect this command; for if you gain mastery over this command, you will also be able to keep the other commands that I am about to give you. Be strong in them and be empowered[—], and let all be empowered who wish to walk in them.”
translation:
  language: es
  text: Por tanto, aléjate del enojo impulsivo[a]—ese espíritu sumamente perverso—, pero vístete de longanimidad, y resiste al enojo impulsivo y a la amargura, y serás hallado con la dignidad que es amada por el Señor. Mira, pues, que nunca descuides este mandamiento; porque si logras dominar este mandamiento, también podrás guardar los demás mandamientos que estoy a punto de darte. Sé fuerte en ellos y fortalécete[—], y que todos se fortalezcan, los que desean andar en ellos.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Enojo impulsivo» traduce el griego con énfasis en la prontitud o impulsividad del enojo; no es solo ‘enojo’ en sentido amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀργή / quick temper
  english_pob_choice: quick temper
  chosen_spanish: ira rápida
  alternatives_spanish:
  - pronto enojo
  - mal genio
  - ira repentina
  lexicon: ὀργή
  rationale: La POB en inglés evita “anger” genérico y conserva la rapidez/impulsividad del término. “Ira rápida” mantiene esa fuerza y permite el paralelo con “amargura” y con la imagen de un espíritu vicioso.
- source_word: πνεῦμα πονηρότατον
  english_pob_choice: that most wicked spirit
  chosen_spanish: ese espíritu sumamente perverso
  alternatives_spanish:
  - ese espíritu malísimo
  - ese espíritu sumamente malo
  - ese espíritu extremadamente perverso
  lexicon: πνεῦμα
  rationale: Se conserva la referencia a un ‘espíritu’ real y no solo a una actitud. “Sumamente perverso” suena natural en español y reproduce el superlativo intensivo del griego y del inglés POB.
- source_word: μακροθυμία
  english_pob_choice: long-suffering
  chosen_spanish: longanimidad
  alternatives_spanish:
  - paciencia
  - constancia paciente
  - longanimidad y paciencia
  lexicon: μακροθυμία
  rationale: Aunque “paciencia” es más común, la POB eligió un término fuerte y tradicional para el rasgo moral sostenido; “longanimidad” preserva mejor la amplitud de sufrimiento/paciencia prolongada sin reducirlo a simple tolerancia.
- source_word: ἀντιστῆναι
  english_pob_choice: stand against
  chosen_spanish: ponte en contra de
  alternatives_spanish:
  - resiste
  - haz frente a
  - ponte contra
  lexicon: ἀνθίστημι / ἀντιστῆναι
  rationale: La expresión española mantiene la postura activa de oposición. “Ponerte en contra de” conserva el matiz de resistencia deliberada frente a la ira y la amargura.
- source_word: πικρία
  english_pob_choice: bitterness
  chosen_spanish: amargura
  alternatives_spanish:
  - resentimiento
  - rencor
  - amargura de corazón
  lexicon: πικρία
  rationale: “Amargura” es el equivalente estable y bíblicamente reconocible para este término, y no introduce una paráfrasis psicológica más amplia.
- source_word: ἀξίωμα
  english_pob_choice: dignity
  chosen_spanish: dignidad
  alternatives_spanish:
  - honor
  - prestancia
  - autoridad
  lexicon: ἀξίωμα
  rationale: “Dignidad” refleja bien el valor/estatus que el texto presenta como agradable a Yahvé/Señor, sin convertirlo en una idea de cargo o poder.
- source_word: ἐντολή
  english_pob_choice: command
  chosen_spanish: mandamiento
  alternatives_spanish:
  - orden
  - precepto
  - comando
  lexicon: ἐντολή
  rationale: “Mandamiento” es el término más fiel y natural para un precepto divino en este contexto exhortativo.
- source_word: κατισχύσῃς
  english_pob_choice: gain mastery over
  chosen_spanish: logras dominio sobre
  alternatives_spanish:
  - te impones sobre
  - vences por completo
  - dominas
  lexicon: κατισχύω
  rationale: La POB enfatiza el dominio efectivo, no solo la resistencia. “Logras dominio sobre” expresa esa victoria práctica sin endurecer excesivamente el registro.
- source_word: ἄλλας ἐντολάς
  english_pob_choice: the other commands
  chosen_spanish: los demás mandamientos
  alternatives_spanish:
  - los otros mandamientos
  - las demás órdenes
  - los restantes mandamientos
  lexicon: ἄλλος
  rationale: “Demás” suena natural en español y mantiene la relación de continuidad con el mandato principal y los subsiguientes.
- source_word: κραταιοῦσθε
  english_pob_choice: Be strong
  chosen_spanish: Sé fuerte
  alternatives_spanish:
  - Sed fuertes
  - Mantente fuerte
  - Fortalécete
  lexicon: κραταιόω
  rationale: Se conserva el imperativo exhortativo directo. El singular está motivado por el arranque de la frase en griego y por la fluidez de la exhortación.
- source_word: ἐνισχύεσθε
  english_pob_choice: be empowered
  chosen_spanish: sé fortalecido
  alternatives_spanish:
  - sé empoderado
  - sé vigoroso
  - recibe fuerza
  lexicon: ἐνισχύω
  rationale: “Ser fortalecido” comunica la idea pasiva de recibir fuerza, evitando un anglicismo como “empoderado” que no corresponde al tono del texto.
theological_decisions:
- issue: Referencia al ‘Señor’ en una obra extra-canónica de trasfondo cristiano primitivo
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Jesús
  rationale: El contexto del texto usa la fórmula devocional tradicional ‘el Señor’. Dado que no hay aquí un marcador directo del Tetragrámaton en el griego citado ni una identificación explícita con Jesús, se mantiene la lectura sobria del original y del inglés POB.
  doctrine_reference: Cristología y uso reverencial del título ‘Señor’ en literatura cristiana primitiva
- issue: Distinción entre ira como pasión moral y como entidad espiritual
  english_pob_reading: that most wicked spirit
  chosen_spanish_reading: ese espíritu sumamente perverso
  alternative_spanish_readings:
  - esa pasión sumamente perversa
  - esa influencia sumamente mala
  rationale: 'La formulación conserva la tensión del original: la ira no es solo una emoción, sino algo descrito con lenguaje de ‘espíritu’. No se suaviza a mero estado psicológico.'
  doctrine_reference: Antropología moral y lenguaje espiritual en literatura patrística/apos­tólica
- issue: 'Serie de imperativos: victoria sobre un mandato que habilita obediencia a los demás'
  english_pob_reading: if you gain mastery over this command, you will also be able to keep the other commands
  chosen_spanish_reading: si logras dominio sobre este mandamiento, también podrás guardar los demás mandamientos
  alternative_spanish_readings:
  - si vences este mandamiento, podrás guardar los otros
  - si dominas este mandamiento, guardarás también los demás
  rationale: 'Se conserva la lógica ética del pasaje: dominar el primer mandato funciona como umbral para la obediencia general. No se convierte en mera generalidad moral.'
  doctrine_reference: Ética de la obediencia progresiva en exhortación cristiana primitiva
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete proporcionado. La versión española sigue de cerca el sentido auditable del inglés POB y del griego normalizado, manteniendo la secuencia exhortativa, la metáfora de vestirse y la progresión desde el dominio de un mandamiento hacia la obediencia de los demás.
  spanish_consistency_notes:
  - Se mantiene ‘mandamiento’ de forma consistente para ἐντολή.
  - Se conserva ‘longanimidad’ para μακροθυμία por coherencia con el tono lexical fuerte del pasaje.
  - Se usa ‘Señor’ en vez de ‘Yahvé’ porque el texto no aporta base directa para el nombre divino.
  - La puntuación reproduce el corte enfático con guiones del original y del inglés POB.
  - El imperativo pasa al singular para mantener el tono directo del exhorto.
