revisions:
- from: Porque cuando todos estos espíritus habitan en un solo vaso, en el mismo vaso en que también habita el Espíritu Santo, ese vaso no puede contenerlos; se desborda. El espíritu tierno, al no tener costumbre de habitar con un espíritu malo ni con la dureza, se aparta de esa persona y busca habitar con la mansedumbre y la quietud. Entonces, cuando se ha apartado de aquella persona en quien habitaba, esa persona queda vacía del espíritu justo; y después, al ser llena de espíritus malos, es inestable en todos sus hechos, arrastrada aquí y allá por los espíritus malos, y queda por completo cegada respecto de su buen entendimiento. Así les sucede a todos los que son de pronto iracundos.
  to: Porque cuando todos estos espíritus habitan en un solo vaso, en el mismo vaso en que también habita el Espíritu Santo, ese vaso no puede contenerlos; se desborda. El espíritu tierno, al no tener costumbre de habitar con un espíritu malo ni con la dureza, se aparta de esa persona y busca habitar con la mansedumbre y la quietud. Entonces, cuando se ha apartado de aquella persona en quien habitaba, esa persona queda vacía del espíritu justo; y después, al ser llena de espíritus malos, se vuelve inestable en todas sus acciones, arrastrada aquí y allá por los espíritus malos, y queda por completo cegada de su buen entendimiento. Así sucede con todos los que son prontos para la ira.
  rationale: 'Se hicieron ajustes menores de español y precisión semántica sin cambiar el contenido: ''acciones'' mejora la naturalidad; ''se vuelve inestable'' fluye mejor; ''cegada de su buen entendimiento'' expresa mejor la pérdida del buen juicio; y ''prontos para la ira'' conserva el matiz de ὀξυχολία de manera idiomática y fiel.'
  reviewer_model: gpt-5.4
