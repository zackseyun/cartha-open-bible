base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/032/006.yaml
  text: For when all these spirits dwell in one vessel, the very vessel in which the holy spirit also dwells, that vessel cannot contain them; it overflows. The tender spirit, having no habit of dwelling with an evil spirit or with harshness, withdraws from such a person and seeks to dwell with gentleness and quiet. Then, when it has departed from that person in whom it dwells, that person becomes empty of the righteous spirit; and thereafter, being filled with evil spirits, he is unstable in all his deeds, dragged here and there by the evil spirits, and is altogether blinded from his good understanding. Thus it happens to all who are quick-tempered.
translation:
  language: es
  text: Porque cuando todos estos espíritus habitan en un solo vaso, en el mismo vaso en que también habita el Espíritu Santo, ese vaso no puede contenerlos; se desborda. El espíritu tierno, al no tener costumbre de habitar con un espíritu malo ni con la dureza, se aparta de esa persona y busca habitar con la mansedumbre y la quietud. Entonces, cuando se ha apartado de aquella persona en quien habitaba, esa persona queda vacía del espíritu justo; y después, al ser llena de espíritus malos, se vuelve inestable en todas sus acciones, arrastrada aquí y allá por los espíritus malos, y queda por completo cegada de su buen entendimiento. Así sucede con todos los que son prontos para la ira.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεύματα
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - alientos
  - vientos
  lexicon: πνεῦμα
  rationale: El contexto contrasta seres/impulsos espirituales en plural con el Espíritu Santo; «espíritus» conserva esa fuerza y evita borrar la tensión entre pluralidad de espíritus y el Espíritu Santo.
- source_word: σκεῦος
  english_pob_choice: vessel
  chosen_spanish: vaso
  alternatives_spanish:
  - recipiente
  - vasija
  lexicon: σκεῦος
  rationale: «Vaso» mantiene la imagen corporal/metafórica de contenedor usada por la tradición del texto y es claro en español. «Recipiente» sería más explicativo, pero menos cercano a la metáfora heredada.
- source_word: ἅγιον πνεῦμα
  english_pob_choice: holy spirit
  chosen_spanish: Espíritu Santo
  alternatives_spanish:
  - espíritu santo
  lexicon: πνεῦμα
  rationale: Se capitaliza como nombre propio teológico porque el contexto distingue explícitamente este Espíritu de otros «espíritus»; la forma habitual en español eclesial es «Espíritu Santo».
- source_word: πρᾶον πνεῦμα
  english_pob_choice: the tender spirit
  chosen_spanish: el espíritu tierno
  alternatives_spanish:
  - el espíritu manso
  - el espíritu suave
  lexicon: πνεῦμα
  rationale: «Tierno» refleja la idea de delicadeza/no dureza del espíritu en este contexto. «Manso» también es posible, pero aquí el contraste con «dureza» favorece una palabra que preserve la suavidad afectiva del término.
- source_word: σκληρότης
  english_pob_choice: harshness
  chosen_spanish: dureza
  alternatives_spanish:
  - aspereza
  - severidad
  lexicon: σκληρότης
  rationale: «Dureza» reproduce el rasgo moral y relacional opuesto a la mansedumbre/tendereza, y encaja naturalmente con el verbo «habitar con».
- source_word: πραότης
  english_pob_choice: gentleness
  chosen_spanish: mansedumbre
  alternatives_spanish:
  - amabilidad
  - gentileza
  lexicon: πραΰτης
  rationale: «Mansedumbre» es el equivalente bíblico más estable para πραΰτης y preserva el matiz moral que el pasaje contrapone a la irritación.
- source_word: ἡσυχία
  english_pob_choice: quiet
  chosen_spanish: quietud
  alternatives_spanish:
  - tranquilidad
  - reposo
  lexicon: ἡσυχία
  rationale: «Quietud» mantiene el campo semántico de calma y reposo interior sin añadir la idea de silencio absoluto.
- source_word: ἄδικος / πονηρά πνεύματα
  english_pob_choice: evil spirits
  chosen_spanish: espíritus malos
  alternatives_spanish:
  - espíritus malignos
  - espíritus perversos
  lexicon: κακός / πονηρός
  rationale: La traducción POB usa «evil spirits»; en español «espíritus malos» es directa, natural y suficientemente fuerte, sin introducir una lectura más técnica de «malignos».
- source_word: ἀπὸ τοῦ δικαίου πνεύματος
  english_pob_choice: of the righteous spirit
  chosen_spanish: del espíritu justo
  alternatives_spanish:
  - del espíritu recto
  - del espíritu de justicia
  lexicon: δίκαιος
  rationale: «Justo» conserva la correspondencia con δικαιος y sigue el paralelo ético del pasaje. «Recto» es posible, pero menos transparente como oposición a «espíritus malos».
- source_word: ἀσταθεῖς ἐν πᾶσι τοῖς ἔργοις
  english_pob_choice: unstable in all his deeds
  chosen_spanish: es inestable en todos sus hechos
  alternatives_spanish:
  - vacila en todas sus obras
  - es inconstante en todas sus acciones
  lexicon: ἀσταθής
  rationale: «Inestable» reproduce la imagen de falta de firmeza; «hechos» mantiene un registro bíblico amplio para πράξεις/ἔργα sin estrechar el sentido.
- source_word: ἑλκόμενος ὑπὸ τῶν πονηρῶν πνευμάτων
  english_pob_choice: dragged here and there by the evil spirits
  chosen_spanish: arrastrada aquí y allá por los espíritus malos
  alternatives_spanish:
  - llevada de acá para allá por los espíritus malos
  - arrastrado aquí y allá por los espíritus malos
  lexicon: ἕλκω
  rationale: «Arrastrada aquí y allá» conserva la imagen de ser movido por fuerzas externas. Se usó «arrastrada» en el texto por concordancia con «persona» implícita, aunque el sujeto gramatical del español es más general que el masculino del griego.
- source_word: ἀπὸ τῆς καλῆς συνέσεως
  english_pob_choice: from his good understanding
  chosen_spanish: respecto de su buen entendimiento
  alternatives_spanish:
  - de su buen entendimiento
  - de su buena inteligencia
  lexicon: σύνεσις
  rationale: «Entendimiento» refleja bien σύνεσις como capacidad de comprender/juzgar correctamente. «Buen» mantiene el calificativo moral e intelectual del original.
- source_word: ὀξυχολία
  english_pob_choice: quick-tempered
  chosen_spanish: de pronto iracundos
  alternatives_spanish:
  - coléricos
  - irascibles
  lexicon: ὀξύς + χολή
  rationale: La expresión griega apunta a la prontitud para la ira. «De pronto iracundos» conserva ese matiz de estallido súbito mejor que un adjetivo más técnico y menos idiomático.
theological_decisions:
- issue: Distinción entre el Espíritu Santo y otros espíritus en el mismo 'vaso'
  english_pob_reading: the very vessel in which the holy spirit also dwells
  chosen_spanish_reading: en el mismo vaso en que también habita el Espíritu Santo
  alternative_spanish_readings:
  - en el mismo vaso en que también habita el espíritu santo
  - en el mismo recipiente en que también habita el Espíritu Santo
  rationale: El pasaje distingue explícitamente al Espíritu Santo de los otros espíritus que llenan el vaso. La mayúscula en «Espíritu Santo» evita confusión con un espíritu creado o una disposición interior.
  doctrine_reference: Pneumatología básica; distinción entre el Espíritu Santo y espíritus malignos o pasionales.
- issue: Naturaleza del 'espíritu tierno' como agente moral que se aparta
  english_pob_reading: The tender spirit... withdraws from such a person
  chosen_spanish_reading: El espíritu tierno... se aparta de esa persona
  alternative_spanish_readings:
  - El espíritu manso... se retira de esa persona
  - El Espíritu tierno... se aparta de esa persona
  rationale: La lectura conserva que se trata de una fuerza/actitud espiritual moral, no necesariamente del Espíritu Santo. Por eso se mantiene en minúscula y sin identificarla con la tercera persona divina.
  doctrine_reference: Antropología moral y lenguaje de disposiciones espirituales; no confundir con la persona del Espíritu Santo.
- issue: Lenguaje sobre la ira y la inestabilidad moral
  english_pob_reading: Thus it happens to all who are quick-tempered
  chosen_spanish_reading: Así les sucede a todos los que son de pronto iracundos
  alternative_spanish_readings:
  - Así les sucede a todos los irascibles
  - Así les sucede a todos los coléricos
  rationale: La formulación remata la enseñanza sobre el carácter iracundo como condición que vuelve a la persona vulnerable a impulsos malos. «De pronto iracundos» preserva el carácter súbito de la ira, que es central en el término griego.
  doctrine_reference: Ética cristiana sobre el dominio de la ira; formación del carácter.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés. La traducción se apoya directamente en el texto griego aportado mediante el contexto auditado inglés, respetando su construcción paralela y su contraste entre espíritus buenos y malos.
  spanish_consistency_notes:
  - Se mantiene «Espíritu Santo» con mayúscula y «espíritu»/«espíritus» en minúscula cuando designa disposiciones o entidades no divinas.
  - Se usa «vaso» de manera consistente para σκῆυος/σκεῦος en la metáfora del contenedor.
  - Se conserva el contraste moral entre «mansedumbre» y «dureza», y entre «espíritu justo» y «espíritus malos».
  - Se evita introducir terminología eclesiástica tradicional no presente en la fuente, como 'Señor' para el nombre divino, ya que este pasaje no contiene el Tetragrámaton.
