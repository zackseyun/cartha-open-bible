revisions:
- from: «Sé paciente»[a], dijo, «y sensato, y dominarás todos los hechos malvados y harás toda obra de justicia. Porque si eres paciente, el Espíritu Santo que habita en ti será puro, no siendo oscurecido por otro espíritu malo; más bien, al morar en un espacio amplio se alegrará y gozará con el vaso en el cual habita, y servirá a Dios con mucho contento, teniendo prosperidad dentro de sí»[b].
  to: «Sé paciente[a]», dice, «y sensato, y dominarás todas las obras malvadas y harás toda obra de justicia. Porque si eres paciente, el Espíritu Santo que habita en ti será puro, sin ser oscurecido por otro espíritu malo; más bien, al morar en un espacio amplio se alegrará y gozará con el vaso[b] en el cual habita, y servirá a Dios con mucho contento, teniendo prosperidad en sí mismo».
  rationale: La revisión propuesta es menor y no altera la interpretación del pasaje. Mejora la fidelidad al audit trail («dice»), evita un calco sintáctico poco natural («sin ser oscurecido»), refuerza el paralelismo retórico («obras malvadas» / «obra de justicia») y suaviza el cierre sin perder el sentido original.
