base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/032/001.yaml
  text: “Be long-suffering,” he says, “and sensible, and you will gain mastery over all wicked deeds and do every work of righteousness. For if you are long-suffering, the holy spirit that dwells in you will be pure, not being darkened by another evil spirit; rather, dwelling in a wide space it will exult and rejoice with the vessel in which it dwells, and it will minister to God with much cheerfulness, having prosperity within itself.
translation:
  language: es
  text: «Sé paciente[a]», dice, «y sensato, y dominarás todas las obras malvadas y harás toda obra de justicia. Porque si eres paciente, el Espíritu Santo que habita en ti será puro, sin ser oscurecido por otro espíritu malo; más bien, al morar en un espacio amplio se alegrará y gozará con el vaso[b] en el cual habita, y servirá a Dios con mucho contento, teniendo prosperidad en sí mismo».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Paciente» traduce aquí la virtud de μακροθυμία / μακρόθυμος, es decir, la capacidad de soportar y esperar sin irritación; también podría rendirse «longánimo».
    reason: lexical_alternative
  - marker: b
    text: Se conserva «vaso» por corresponder al griego σκεῦος y al «vessel» del POB inglés; «vasija» o «recipiente» son alternativas posibles en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακρόθυμος / μακροθυμία
  english_pob_choice: long-suffering
  chosen_spanish: paciente
  alternatives_spanish:
  - longánimo
  - de larga paciencia
  lexicon: —
  rationale: En español, «paciente» comunica de forma natural la perseverancia tolerante ante ofensas o demoras. «Longánimo» es posible, pero menos común; «de larga paciencia» suena más explicativo que traducción directa. El POB inglés eligió una virtud de resistencia sufrida, no mera calma temperamental.
- source_word: φρόνιμος / σωφρωνέω
  english_pob_choice: sensible
  chosen_spanish: sensato
  alternatives_spanish:
  - prudente
  - sensato y moderado
  lexicon: —
  rationale: «Sensato» recoge bien la idea de juicio sano y equilibrado. «Prudente» sería una alternativa válida, pero puede inclinarse demasiado a cautela práctica; el contexto contrapone la sensatez a obras malvadas.
- source_word: πράξεις πονηραί
  english_pob_choice: wicked deeds
  chosen_spanish: hechos malvados
  alternatives_spanish:
  - obras malvadas
  - acciones perversas
  lexicon: —
  rationale: «Hechos malvados» conserva el paralelo con «every work of righteousness» y evita sobrecargar con vocabulario teológico posterior. «Obras malvadas» también sería viable; aquí se mantiene una correspondencia directa con la serie de acciones.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/rectitud
  lexicon: —
  rationale: «Justicia» es el equivalente más natural y fiel en este contexto de conducta correcta. «Rectitud» también es posible, pero «justicia» mantiene mejor la antítesis con «hechos malvados».
- source_word: πνεῦμα ἅγιον
  english_pob_choice: the holy spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el espíritu santo
  - el espíritu santo que habita en ti
  lexicon: —
  rationale: Aquí el contexto apunta al Espíritu divino, no simplemente a una disposición interior. Por eso se capitaliza como «Espíritu Santo», conservando además la referencia personal del POB inglés.
- source_word: ἕτερον πονηρὸν πνεῦμα
  english_pob_choice: another evil spirit
  chosen_spanish: otro espíritu malo
  alternatives_spanish:
  - otro espíritu maligno
  - otro espíritu perverso
  lexicon: —
  rationale: «Malo» reproduce el contraste simple del griego y del inglés POB sin añadir matiz demonológico no explicitado en la frase. «Maligno» sería más idiomático en español religioso, pero aquí se evita intensificar más allá del texto.
- source_word: σκηνή / σκεῦος (vessel)
  english_pob_choice: vessel
  chosen_spanish: vaso
  alternatives_spanish:
  - vasija
  - recipiente
  lexicon: —
  rationale: El POB inglés usa «vessel»; en español «vaso» es la correspondencia tradicional más directa para una persona como recipiente de habitabilidad espiritual. «Vasija» o «recipiente» sonarían posibles, pero menos cercanos al registro bíblico tradicional.
- source_word: εὐφραίνεται / χαίρει
  english_pob_choice: exult and rejoice
  chosen_spanish: se alegrará y gozará
  alternatives_spanish:
  - exultará y se alegrará
  - se regocijará y gozará
  lexicon: —
  rationale: Se conserva la duplicación de gozo con dos verbos españoles. «Se alegrará y gozará» mantiene fluidez; «exultar» resulta más solemne, pero menos natural en la sintaxis española del pasaje.
- source_word: λειτουργήσει τῷ θεῷ
  english_pob_choice: will minister to God
  chosen_spanish: servirá a Dios
  alternatives_spanish:
  - ministrará a Dios
  - hará servicio a Dios
  lexicon: —
  rationale: «Servirá a Dios» expresa el servicio cultual y obediencial sin forzar un tecnicismo. «Ministrar» existe, pero en español actual puede sonar eclesiástico o técnico; el contexto permite una formulación clara.
- source_word: μετὰ πολλῆς εὐθυμίας
  english_pob_choice: with much cheerfulness
  chosen_spanish: con mucho contento
  alternatives_spanish:
  - con mucha alegría
  - con gran buen ánimo
  lexicon: —
  rationale: «Contento» refleja la disposición alegre y benigna del término, sin sonar demasiado coloquial. «Con mucha alegría» también sería posible, pero «contento» guarda mejor el matiz de ánimo sereno.
theological_decisions:
- issue: ¿Cómo traducir la relación entre la paciencia humana y la pureza del Espíritu que habita en la persona?
  english_pob_reading: If you are long-suffering, the holy spirit that dwells in you will be pure, not being darkened by another evil spirit.
  chosen_spanish_reading: Si eres paciente, el Espíritu Santo que habita en ti será puro, no siendo oscurecido por otro espíritu malo.
  alternative_spanish_readings:
  - si eres longánimo, el espíritu santo que habita en ti será puro
  - si perseveras con paciencia, el Espíritu Santo que habita en ti quedará puro
  rationale: Se conserva la estructura causal del texto sin suavizar la afirmación. La frase presenta una conexión moral/espiritual directa entre la paciencia y la no contaminación del Espíritu que habita en la persona; no se reinterpreta como mera metáfora psicológica. La formulación respeta la tensión del original y del POB inglés.
  doctrine_reference: Pneumatología del texto patrístico; indwelling of the Holy Spirit
- issue: ¿Capitalizar «Espíritu Santo» o traducirlo como «espíritu santo»?
  english_pob_reading: the holy spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - el espíritu santo
  rationale: Aunque el griego carece de mayúsculas, el contexto en el POB inglés trata la expresión como referencia personal al Espíritu de Dios. En español, la capitalización ayuda a evitar una lectura impersonal y es coherente con el sentido del pasaje.
  doctrine_reference: Identidad del Espíritu Santo en lectura cristiana
- issue: ¿Cómo entender «vaso» en relación con la persona que recibe al Espíritu?
  english_pob_reading: the vessel in which it dwells
  chosen_spanish_reading: el vaso en el cual habita
  alternative_spanish_readings:
  - la vasija en la cual habita
  - el recipiente en el cual habita
  rationale: «Vaso» conserva el valor metafórico tradicional de la persona como recipiente, sin desplazar el lenguaje del texto. No se añade una interpretación sacramental ni se sustituye por lenguaje más abstracto.
  doctrine_reference: Antropología espiritual del texto patrístico
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete; por eso esta propuesta sigue de cerca el texto base griego y el criterio optimal-equivalence del POB inglés, sin añadir notas de crítica textual ni cambios editoriales.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto, pero este pasaje no contiene el nombre divino explícito en la forma a traducir; por ello no aparece aquí.
  - Se mantiene «Espíritu Santo» con mayúsculas por tratarse del Espíritu divino en el contexto del pasaje.
  - Se evita «señor» o equivalentes litúrgicos no atestiguados en esta unidad.
  - La duplicación de gozo se conserva con dos verbos distintos («se alegrará y gozará») para reflejar el paralelismo del original.
