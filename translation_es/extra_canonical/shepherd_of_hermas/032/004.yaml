base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/032/004.yaml
  text: You see, then, that long-suffering is sweeter than honey and is serviceable to the Lord, and he dwells in it; but quick temper is bitter and useless. If, therefore, quick temper is mixed with long-suffering, long-suffering is defiled and is no longer useful to God. Long-suffering at all times has nothing bitter within itself, remaining always gentle and quiet. This long-suffering, then, dwells with those who have the faith complete.
translation:
  language: es
  text: Ya ves, pues, que la longanimidad[a] es más dulce que la miel y es útil al Señor[b], y él habita en ella; pero la irascibilidad[c] es amarga e inútil. Si, por tanto, la irascibilidad se mezcla con la longanimidad, la longanimidad queda contaminada y ya no es útil a Dios. La longanimidad no tiene nunca nada amargo en sí misma, permaneciendo siempre apacible y tranquila. Esta longanimidad, entonces, habita con quienes tienen la fe íntegra[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'μακροθυμία: lit. ''espíritu prolongado'' (makro- + thymos). ''Longanimidad'' es el equivalente teológico establecido en español, en contraste directo con ὀξυχολία (''irascibilidad''). Alternativa más común: ''paciencia'', pero pierde la fuerza del temple sostenido ante la provocación.'
    reason: lexical_alternative
  - marker: b
    text: κύριος en el Hermas griego funciona como título cristiano para Dios (o Cristo), no como representación del Tetragrámaton hebreo (יהוה). No se aprecia cita ni alusión a la LXX en este contexto. Se traduce 'el Señor' conforme al uso patrístico; véase la distinción κύριος/'Señor' vs. θεός/'Dios' más adelante en el mismo versículo.
    reason: theological_note
  - marker: c
    text: 'ὀξυχολία: lit. ''bilis aguda'' (oxy- ''agudo/rápido'' + cholē ''bilis''), designando la disposición de ira rápida. Se vierte ''irascibilidad'' por su paralelismo morfológico con ''longanimidad''. Alternativas: ''cólera'' (etimológicamente cercana a χολή), ''ira repentina''.'
    reason: lexical_alternative
  - marker: d
    text: 'πίστιν τελείαν: τελεία deriva de τέλος (''fin/cumplimiento''), apuntando a una fe que ha alcanzado su plenitud. Se prefiere ''íntegra'' sobre ''perfecta'' (que evoca impecabilidad moral en el español religioso) y sobre ''completa'' (más neutro). Alternativa válida: ''fe madura''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μακροθυμία
  english_pob_choice: long-suffering
  chosen_spanish: longanimidad
  alternatives_spanish:
  - paciencia
  - mansedumbre
  - paciencia larga
  lexicon: 'BDAG s.v. μακροθυμία: ''patience, steadfastness, endurance''; LSJ: ''long-suffering, forbearance'''
  rationale: μακροθυμία compone makro- (largo) + thymos (ánimo/espíritu), señalando una disposición de espíritu prolongado ante la provocación. 'Longanimidad' es el equivalente teológico establecido en español y conserva el contraste estructural con ὀξυχολία ('ira aguda/precipitada'). 'Paciencia' es demasiado genérica y no recupera la dimensión de temple sostenido bajo presión. El término aparece cuatro veces en el versículo; la consistencia léxica es esencial para la coherencia del argumento de Hermas.
- source_word: ὀξυχολία
  english_pob_choice: quick temper
  chosen_spanish: irascibilidad
  alternatives_spanish:
  - ira repentina
  - cólera
  - mal genio
  - arrebato de ira
  lexicon: 'LSJ s.v. ὀξυχολία: ''irritability, irascibility''; compuesto oxy- (agudo/rápido) + cholē (bilis)'
  rationale: ὀξυχολία literalmente significa 'bilis aguda', designando la disposición habitual de ira rápida. 'Irascibilidad' es el sustantivo abstracto español más preciso para esta disposición y mantiene el paralelismo morfológico con 'longanimidad'. 'Cólera' tiene parentesco etimológico con χολή (bilis) pero en español moderno evoca más un episodio concreto que el rasgo de carácter. Se prefiere 'irascibilidad' sobre 'ira repentina' (frase descriptiva) para mantener la simetría nominal con μακροθυμία.
- source_word: εὔχρηστος / ἄχρηστος
  english_pob_choice: serviceable / useless
  chosen_spanish: útil / inútil
  alternatives_spanish:
  - provechoso/sin provecho
  - servicial/inservible
  - aprovechable/inservible
  lexicon: 'BDAG s.v. εὔχρηστος: ''useful, serviceable''; ἄχρηστος: ''useless, unprofitable'''
  rationale: El par εὔχρηστος/ἄχρηστος forma una antítesis directa. 'Útil/inútil' es la versión española más natural, clara y paralela. 'Servicial' podría sugerir 'servicial hacia personas' y desviar el sentido de 'apto para el servicio del Señor'.
- source_word: κατοικεῖ
  english_pob_choice: dwells
  chosen_spanish: habita
  alternatives_spanish:
  - mora
  - reside
  - permanece
  lexicon: 'BDAG s.v. κατοικέω: ''to dwell, live, reside (permanently)'''
  rationale: '''Habita'' reproduce con naturalidad el sentido de residencia estable que tiene κατοικέω frente a verbos de tránsito. Aparece dos veces en el versículo (Dios habita en la longanimidad; la longanimidad habita con los fieles); la consistencia léxica refuerza el paralelismo teológico.'
- source_word: μιαίνεται
  english_pob_choice: is defiled
  chosen_spanish: queda contaminada
  alternatives_spanish:
  - se contamina
  - se mancha
  - se profana
  - es mancillada
  lexicon: 'LSJ s.v. μιαίνω: ''to stain, defile, pollute'''
  rationale: '''Queda contaminada'' marca el estado resultante de la acción, lo que corresponde al perfecto lógico del argumento de Hermas: la mezcla con la ira produce una longanimidad ya defiled de modo permanente. ''Se profana'' cargaría connotaciones de espacio sagrado ajenas al contexto.'
- source_word: ἥμερος καὶ ἡσύχιος
  english_pob_choice: gentle and quiet
  chosen_spanish: apacible y tranquila
  alternatives_spanish:
  - mansa y sosegada
  - amable y reposada
  - dócil y serena
  lexicon: 'LSJ s.v. ἥμερος: ''gentle, mild, tame''; ἡσύχιος: ''quiet, still, peaceful'''
  rationale: '''Apacible'' recoge el matiz de ἥμερος (tono suave, sin brusquedad) y ''tranquila'' el de ἡσύχιος (quietud interior). El par es eufónico y natural en español; ''mansa y sosegada'' sería igualmente válido pero de registro ligeramente más elevado.'
- source_word: πίστιν τελείαν
  english_pob_choice: faith complete
  chosen_spanish: fe íntegra
  alternatives_spanish:
  - fe perfecta
  - fe completa
  - fe madura
  - fe plena
  lexicon: 'BDAG s.v. τέλειος: ''complete, perfect, mature, having attained its end/goal'''
  rationale: τελεία deriva de τέλος ('fin/cumplimiento'), apuntando a una fe que ha alcanzado su plenitud. 'Fe íntegra' captura tanto la completud como la integridad/solidez. 'Fe perfecta' en español religioso evoca frecuentemente impecabilidad moral, lo cual no es el matiz presente. 'Fe completa' es válido pero más neutro. El inglés POB conservó el orden pospuesto ('faith complete') para remarcar el adjetivo; en español 'fe íntegra' logra un énfasis semejante con buena eufonía.
theological_decisions:
- issue: κύριος en Hermas como título divino, no como transliteración de YHWH
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Dios
  rationale: El proyecto POB establece 'Yahvé' como traducción por defecto de YHWH/κύριος cuando el griego cita o alude al nombre divino hebreo. Sin embargo, en el Hermas griego (s. II d.C.) κύριος funciona como título cristiano para Dios o Cristo, sin que este pasaje cite ni aluda la LXX ni el Tetragrámaton. El uso es puramente apostólico-patrístico. Renderizar 'Yahvé' aquí impondría una asociación que el texto griego no sostiene ni requiere. Se mantiene 'el Señor' conforme al uso corriente de Hermas.
  doctrine_reference: 'Instrucciones del proyecto POB: ''Si la fuente inmediata es el griego κύριος citando o aludiendo al nombre divino, explicar la decisión.'''
- issue: Distinción κύριος / θεός en el mismo versículo
  english_pob_reading: the Lord … God
  chosen_spanish_reading: el Señor … Dios
  alternative_spanish_readings:
  - Dios … Dios
  - el Señor … el Señor
  rationale: 'El texto griego distingue explícitamente: la longanimidad es ''útil al Señor (κύριος) y él habita en ella''; cuando se contamina ''ya no es útil a Dios (θεός)''. Hermas usa estos dos términos de modo intercambiable para el Dios único, pero la distinción textual debe conservarse en la traducción para mantener transparencia con el original. La traducción española reproduce fielmente κύριος → ''el Señor'' y θεός → ''Dios''.'
  doctrine_reference: 'Principio POB: no borrar tensiones léxicas o teológicas documentadas en la fuente.'
- issue: 'Agentividad: ¿quién habita en la longanimidad?'
  english_pob_reading: he dwells in it
  chosen_spanish_reading: él habita en ella
  alternative_spanish_readings:
  - habita en ella (sin pronombre explícito)
  rationale: 'El griego tiene κατοικεῖ ἐν αὐτῇ con sujeto implícito referido al κύριος inmediatamente anterior. El inglés POB explicita ''he'' (él). El español permite omitir el pronombre por ser la desinencia verbal suficiente, pero mantener ''él'' clarifica que el sujeto es el Señor (no la longanimidad misma), lo que tiene peso teológico: Dios habita en la virtud de la longanimidad, no viceversa.'
  doctrine_reference: 'Hermas M.5.1: teología de la inhabitación divina en las virtudes.'
translation_notes:
  revision_awareness: 'No se han aplicado revisiones previas al registro fuente (applied_revisions: []); el borrador se elabora directamente del texto griego de Lightfoot y Harmer 1891 (págs. 339-341), usando la traducción inglesa del POB como contexto auditado y no como base de traducción mecánica.'
  spanish_consistency_notes:
  - Se usa 'longanimidad' de manera consistente en las cuatro apariciones de μακροθυμία en el versículo, preservando la cohesión argumentativa del texto de Hermas.
  - Se mantiene la distinción griega κύριος ('el Señor') / θεός ('Dios') que el original establece en cláusulas distintas, en lugar de uniformar ambos términos.
  - '''Irascibilidad'' se mantiene como sustantivo abstracto paralelo a ''longanimidad'' en todas sus apariciones, respetando la simetría retórica del griego.'
  - El verbo 'habita' (κατοικεῖ) se aplica consistentemente tanto a Dios habitando en la longanimidad como a la longanimidad habitando con los fieles, reproduciendo el paralelismo estructural del texto fuente.
  - No se introduce terminología de la Reina-Valera (p. ej., 'sufrimiento' o 'mansedumbre' en sentidos no respaldados por el original) sin justificación léxica.
