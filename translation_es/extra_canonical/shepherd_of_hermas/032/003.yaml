base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/032/003.yaml
  text: 'For if, after taking a little wormwood, you pour it into a jar of honey, does not all the honey perish? So much honey is ruined by the smallest amount of wormwood: it destroys the sweetness of the honey, and it no longer has the same usefulness with its master, because it has been embittered and has lost its use. But if the wormwood is not cast into the honey, the honey is found sweet and becomes serviceable to its master.'
translation:
  language: es
  text: 'Porque, si después de echar un poco de ajenjo en un cántaro de miel, ¿no se echa a perder toda la miel? Tanta miel se arruina por la más pequeña cantidad de ajenjo: destruye la dulzura de la miel, y ya no tiene la misma utilidad para su dueño, porque se ha amargado y ha perdido su utilidad. Pero si el ajenjo no es arrojado en la miel, la miel resulta dulce y llega a ser útil para su dueño.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χολή / πικρασία (ajíenjo como imagen de amargura)
  english_pob_choice: wormwood
  chosen_spanish: ajenjo
  alternatives_spanish:
  - absintio
  - hierba amarga
  lexicon: NA
  rationale: La imagen vegetal tradicional para wormwood es «ajenjo», que comunica con precisión la amargura proverbial del pasaje en español. «Absintio» sería más técnico y menos natural; «hierba amarga» pierde la referencia concreta y la fuerza de la imagen.
- source_word: μέλι
  english_pob_choice: honey
  chosen_spanish: miel
  alternatives_spanish:
  - miel pura
  - miel dulce
  lexicon: NA
  rationale: Se conserva «miel» sin añadir calificativos, porque la comparación ya desarrolla su dulzura y su corrupción por el ajenjo.
- source_word: ἀπόλλυμι / φθείρω en el sentido de deterioro completo
  english_pob_choice: perish / ruined
  chosen_spanish: se echa a perder / es arruinada
  alternatives_spanish:
  - perece
  - se destruye
  - se malogra
  lexicon: NA
  rationale: «Se echa a perder» funciona bien para el deterioro de un alimento; «es arruinada» mantiene el paralelismo y la gravedad del daño. «Perece» podría sonar demasiado absoluto o personal en español.
- source_word: χρησιμεύω / χρηστός (utilidad, aptitud para servir)
  english_pob_choice: useful / serviceable
  chosen_spanish: provecho / útil
  alternatives_spanish:
  - sirve
  - es útil
  - es provechosa
  lexicon: NA
  rationale: «Tener el mismo provecho para su dueño» y «llega a ser útil» reflejan el valor funcional del término griego sin forzar una frase más técnica o arcaica.
- source_word: δεσπότης
  english_pob_choice: master
  chosen_spanish: dueño
  alternatives_spanish:
  - amo
  - señor
  lexicon: NA
  rationale: «Dueño» evita la ambigüedad de «señor» en español y conserva la relación de pertenencia/uso que exige la comparación. «Amo» es posible, pero suena más duro en el registro general del texto.
- source_word: πικραίνω
  english_pob_choice: embittered
  chosen_spanish: ha sido amargada
  alternatives_spanish:
  - ha sido hecha amarga
  - se ha amargado
  lexicon: NA
  rationale: El pasivo «ha sido amargada» conserva la acción sufrida por la miel y el vínculo semántico con el ajenjo. «Se ha amargado» sería más natural, pero algo menos literal respecto de la forma verbal.
theological_decisions:
- issue: La metáfora de contaminación moral/espiritual por una pequeña mezcla corruptora
  english_pob_reading: A little wormwood ruins all the honey; the smallest amount destroys sweetness and usefulness.
  chosen_spanish_reading: Un poco de ajenjo basta para echar a perder y arruinar toda la miel, perdiendo dulzura y utilidad.
  alternative_spanish_readings:
  - Una pequeña corrupción arruina el conjunto.
  - Una pequeña mezcla amarga basta para perder la dulzura.
  rationale: La sección mantiene la fuerza moral de la analogía sin explicarla alegóricamente. El texto habla de deterioro de la miel; la implicación espiritual queda sugerida por el contexto de la obra, no añadida por la traducción.
  doctrine_reference: Mandate 5, section i (exhortación moral sobre pureza y obediencia)
- issue: Relación entre el objeto y su dueño/amo
  english_pob_reading: It no longer has the same usefulness with its master.
  chosen_spanish_reading: ya no tiene el mismo provecho para su dueño.
  alternative_spanish_readings:
  - ya no sirve igual a su amo.
  - ya no es útil para su señor.
  rationale: «Dueño» preserva la relación funcional y de posesión que articula la imagen, sin introducir una jerarquía social más fuerte de la necesaria. Esto mantiene la metáfora en un nivel claro y general.
  doctrine_reference: Mandate 5, section i
- issue: Valor de la dulzura frente a la amargura
  english_pob_reading: it destroys the sweetness of the honey
  chosen_spanish_reading: destruye la dulzura de la miel
  alternative_spanish_readings:
  - quita la dulzura de la miel
  - arruina el sabor dulce de la miel
  rationale: «Dulzura» traduce con precisión el contraste conceptual del pasaje y evita reducirlo solo al sabor físico, conservando el paralelismo moral del ajenjo como amargura.
  doctrine_reference: Mandate 5, section i
translation_notes:
  revision_awareness: No se registran revisiones aplicadas ni notas textuales adicionales en el paquete de trabajo. La redacción española sigue de cerca la imagen continua del griego y la solución óptima en inglés, sin introducir glosas interpretativas.
  spanish_consistency_notes:
  - Se mantiene «ajenjo» de forma uniforme para wormwood.
  - Se conserva «miel» sin ampliaciones explicativas.
  - Se usa «dueño» de manera consistente para δεσπότης en esta sección.
  - Se evita el calco de «master» como «maestro», que sería incorrecto aquí.
