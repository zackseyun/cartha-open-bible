  to: 'Porque, si después de echar un poco de ajenjo en un cántaro de miel, ¿no se echa a perder toda la miel? Tanta miel se arruina por la más pequeña cantidad de ajenjo: destruye la dulzura de la miel, y ya no tiene la misma utilidad para su dueño, porque se ha amargado y ha perdido su utilidad. Pero si el ajenjo no es arrojado en la miel, la miel resulta dulce y llega a ser útil para su dueño.'
