  yaml_path: translation/extra_canonical/shepherd_of_hermas/032/005.yaml
  text: Quick temper, for its part, is first foolish—flighty and senseless. Then from senselessness comes bitterness; from bitterness, anger; from anger, wrath; and from wrath, rage. Then rage—composed of so many evils—becomes a great and incurable sin.
translation:
  language: es
  text: 'La prontitud para la ira, por su parte, es primero necia: voluble e insensata. Luego, de la insensatez viene la amargura; de la amargura, la ira; de la ira, el furor; y del furor, la rabia. Entonces la rabia—compuesta de tantos males—se vuelve un gran pecado incurable.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Quick temper
  english_pob_choice: Quick temper
  chosen_spanish: arrebato de ira
  alternatives_spanish:
  - mal genio
  - prontitud para la ira
  - temperamento irascible
  lexicon: ὀργιλότης / related quick-temper vocabulary
  rationale: La idea no es solo enojo momentáneo, sino una disposición a responder con ira. «Arrebato de ira» comunica el rasgo moral y mantiene el tono proverbial del pasaje sin volverlo demasiado técnico.
- source_word: foolish—flighty and senseless
  english_pob_choice: foolish—flighty and senseless
  chosen_spanish: 'necio: voluble e insensato'
  alternatives_spanish:
  - 'insensato: inconstante y sin juicio'
  - 'tonto: liviano y sin entendimiento'
  lexicon: μωρία / ἄστατος / ἄφρων-type semantic cluster
  rationale: 'Se preserva la secuencia de tres rasgos: necedad, inestabilidad y falta de sentido. «Voluble» recoge bien la ligereza/inconstancia y «insensato» mantiene la ausencia de juicio.'
- source_word: bitterness
  english_pob_choice: bitterness
  chosen_spanish: amargura
  alternatives_spanish:
  - resquemor
  - aspereza
  - rencor
  lexicon: πικρία
  rationale: «Amargura» es el equivalente natural y doctrinalmente claro para πικρία, y conserva la progresión moral del texto.
- source_word: anger
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - cólera
  lexicon: ὀργή
  rationale: «Ira» mantiene la continuidad léxica y el registro más serio que «enojo».
- source_word: wrath
  english_pob_choice: wrath
  chosen_spanish: furor
  alternatives_spanish:
  - enojo intenso
  - cólera
  - ira vehemente
  lexicon: θυμός
  rationale: Se distingue de ὀργή con un término de intensidad mayor. «Furor» permite conservar el escalamiento retórico del original.
- source_word: rage
  english_pob_choice: rage
  chosen_spanish: rabia
  alternatives_spanish:
  - enfurecimiento
  - furia
  - saña
  lexicon: μανία / related extreme-rage vocabulary
  rationale: «Rabia» expresa el clímax destructivo del encadenamiento y suena natural en español contemporáneo sin perder fuerza.
- source_word: great and incurable sin
  english_pob_choice: a great and incurable sin
  chosen_spanish: un gran pecado incurable
  alternatives_spanish:
  - un pecado grande e incurable
  - un grave pecado sin remedio
  lexicon: μέγα ... ἀνίατον ἁμάρτημα
  rationale: «Gran pecado incurable» conserva tanto la magnitud como la imposibilidad de curación/remedio. «Incurable» mantiene la fuerza literal de ἀνίατον.
theological_decisions:
- issue: Escalamiento moral de la ira hasta pecado incurable
  english_pob_reading: Then rage—composed of so many evils—becomes a great and incurable sin.
  chosen_spanish_reading: Entonces la rabia—compuesta de tantos males—se vuelve un gran pecado incurable.
  alternative_spanish_readings:
  - Entonces la rabia, compuesta de tantos males, se convierte en un grave pecado sin remedio.
  - Así, la rabia, formada por tantos males, llega a ser un gran pecado incurable.
  rationale: La frase final debe dejar claro que la culminación no es solo un defecto emocional, sino una condición moral gravísima. «Se vuelve» reproduce el cambio de estado sin añadir explicaciones.
  doctrine_reference: Moral exhortation tradition; vice-catalogue progression
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete. Se traduce directamente desde el griego normalizado con apoyo del inglés POB para captar la progresión retórica y el campo semántico de las emociones.
  spanish_consistency_notes:
  - Se mantiene «ira» para ὀργή y «furor» para  θυμός a fin de conservar la escalada.
  - Se evita «SEÑOR» u otra terminología no pertinente; el pasaje no contiene referencias divinas.
  - Se conserva la estructura de cadena causal con «de... viene...» para reflejar la progresión del original.
  - El tono busca ser bíblico y legible en español latinoamericano sin caer en arcaísmos innecesarios.
