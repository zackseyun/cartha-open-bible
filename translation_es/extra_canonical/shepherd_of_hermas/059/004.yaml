review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego según la traducción auditada: contraste condicional entre el estado del jefe de la casa y el de los demás, con repetición deliberada de ''afligir''. Sin embargo, ''entristecer'' no preserva adecuadamente la fuerza de ''embitter'' en este contexto; el pasaje apunta más a provocar amargura/agravio que mera tristeza.'
  spanish_quality_summary: El español es claro y digno, con buena sintaxis. No obstante, 'si hicieron tales cosas como para entristecer' suena algo calcado y menos natural que una formulación más idiomática. También conviene mantener una expresión española fluida sin perder el paralelismo retórico.
  glossary_alignment: No hay términos del glosario mayor en juego. 'Señor' como tratamiento es aceptable aquí. 'Afligidos/aflicción' y 'cabeza de toda la casa' están bien alineados con la lógica y metáfora del texto. La principal corrección léxica necesaria es 'embitter' -> 'amargar' o equivalente más fuerte que 'entristecer'.
  issues:
  - severity: medium
    issue: '''entristecer'' debilita el valor de ''embitter'''
    rationale: La evidencia inglesa auditada distingue una reacción más fuerte que simple tristeza. 'Amargar' preserva mejor el matiz de causar amargura o agravio al ángel glorioso.
  - severity: low
    issue: Giro 'si hicieron tales cosas como para...' algo poco idiomático
    rationale: Aunque comprensible, puede mejorarse a 'si hicieron tales cosas que amargaron...' para sonar más natural en español y conservar el resultado de la acción.
  revised_spanish_text: '3. Le digo: «Señor, si hicieron tales cosas que amargaron al ángel glorioso, ¿qué hice yo?». «De otro modo —dice—, no pueden ser afligidos a menos que tú, la cabeza de toda la casa, seas afligido; porque cuando tú eres afligido, por necesidad ellos también serán afligidos; pero si te mantienes firme, no pueden tener ninguna aflicción».'
  revision_rationale: Se ajusta un punto léxico para reflejar mejor la fuerza semántica de 'embitter' y se alisa levemente la sintaxis inicial para un español más natural, sin alterar la estructura argumentativa ni la repetición retórica del pasaje.
