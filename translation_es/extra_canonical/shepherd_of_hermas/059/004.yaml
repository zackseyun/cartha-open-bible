  text: 3. I say to him, “Sir, if they did such things as to embitter the glorious angel, what did I do?” “Otherwise,” he says, “they cannot be afflicted unless you, the head of the whole household, are afflicted; for when you are afflicted, of necessity they also will be afflicted, but if you stand firm, they cannot have any affliction.”
translation:
  language: es
  text: '3. Le digo: «Señor, si hicieron tales cosas que amargaron al ángel glorioso, ¿qué hice yo?». «De otro modo —dice—, no pueden ser afligidos a menos que tú, la cabeza de toda la casa, seas afligido; porque cuando tú eres afligido, por necesidad ellos también serán afligidos; pero si te mantienes firme, no pueden tener ninguna aflicción».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Sir
  english_pob_choice: Sir
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - amigo
  lexicon: lexical decision from address form
  rationale: En el diálogo, el vocativo griego/inglés funciona como tratamiento respetuoso hacia una figura superior. «Señor» es el equivalente natural y digno en español. «Señor mío» suena más enfático de lo que exige el contexto; «amigo» rebajaría indebidamente el tono.
- source_word: embitter
  english_pob_choice: embitter
  chosen_spanish: entristecer
  alternatives_spanish:
  - amargar
  - irritar
  lexicon: lexical decision from affective causation
  rationale: El griego aquí expresa la idea de causar pesar o aflicción al ángel. En español, «amargar» puede sonar demasiado coloquial o intensificar un matiz de agravio; «entristecer» comunica con sobriedad la causa de dolor sin desviar el sentido.
- source_word: glorious angel
  english_pob_choice: glorious angel
  chosen_spanish: ángel glorioso
  alternatives_spanish:
  - ángel de gloria
  - ángel resplandeciente
  lexicon: lexical decision from descriptive epithet
  rationale: Se conserva la construcción atributiva simple del original. «Ángel glorioso» es transparente y fiel; las alternativas son más interpretativas o menos directas.
- source_word: head of the whole household
  english_pob_choice: head of the whole household
  chosen_spanish: la cabeza de toda la casa
  alternatives_spanish:
  - el jefe de toda la casa
  - el cabeza de toda la familia
  lexicon: lexical decision from household metaphor
  rationale: Mantengo la metáfora de «cabeza» porque es la imagen del texto y además conserva la relación de autoridad y representación. «Jefe» explicita la función pero debilita la metáfora; «familia» estrecha indebidamente «household».
- source_word: afflicted / affliction
  english_pob_choice: afflicted / affliction
  chosen_spanish: afligidos / aflicción
  alternatives_spanish:
  - atribulados / tribulación
  - afectados / padecimiento
  lexicon: lexical decision from suffering terminology
  rationale: «Afligir/aflicción» reproduce con precisión la familia léxica del original y mantiene la repetición retórica del pasaje. «Tribulación» sería posible, pero introduce un registro más teológico y menos literal.
- source_word: stand firm
  english_pob_choice: stand firm
  chosen_spanish: te mantienes firme
  alternatives_spanish:
  - permaneces firme
  - te sostienes firme
  lexicon: lexical decision from perseverance idiom
  rationale: «Mantenerse firme» es la forma idiomática natural en español para la perseverancia resistente del original. Conserva la idea de estabilidad moral o espiritual sin sobretraducción.
theological_decisions:
- issue: Relación entre el estado del 'cabeza de toda la casa' y el de los demás miembros
  english_pob_reading: The others cannot be afflicted unless you, the head of the whole household, are afflicted; when you are afflicted, of necessity they also will be afflicted.
  chosen_spanish_reading: Los demás no pueden ser afligidos a menos que tú, la cabeza de toda la casa, seas afligido; porque cuando tú eres afligido, por necesidad ellos también serán afligidos.
  alternative_spanish_readings:
  - '...a menos que tú, como cabeza de toda la casa, seas afligido...'
  - '...si tú eres afligido, también ellos lo serán...'
  rationale: La cláusula expresa una dependencia real entre la condición del líder de la casa y la de los demás. Mantener la estructura causal y el lenguaje de necesidad preserva el argumento del pasaje sin suavizar la lógica espiritual del texto.
  doctrine_reference: Ecclesial/household imagery; compare NT household and headship language without importing later doctrinal systems.
translation_notes:
  revision_awareness: No applied revisions are listed in the audit context. The Spanish draft therefore follows the supplied Greek source as mediated by the audited English POB reading, preserving the paragraph structure and the repeated affliction motif.
  spanish_consistency_notes:
  - Se usa «aflicción/afligido» de manera consistente para reflejar la repetición del original.
  - Se mantiene «ángel glorioso» como construcción estable y directa.
  - «La cabeza de toda la casa» conserva la metáfora de autoridad del texto.
  - El vocativo se normaliza a «Señor» por adecuación idiomática del español reverente.
