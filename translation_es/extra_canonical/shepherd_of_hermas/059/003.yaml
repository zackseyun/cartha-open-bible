  to: '2. Él dice: «Escucha: tus pecados son muchos, pero no tantos como para que seas entregado[a] a este ángel. Más bien, tu casa ha cometido grandes actos de iniquidad y pecados, y el ángel glorioso se llenó de amargura por sus obras; y por eso ordenó que sufrieras por cierto tiempo, para que también ellos se arrepientan y se purifiquen de todo deseo de este siglo. Cuando, pues, se arrepientan y sean purificados, entonces el ángel del castigo se apartará».'
