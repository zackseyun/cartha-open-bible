base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/059/003.yaml
  text: '2. He says, “Listen: your sins are many, but not so many that you should be handed over to this angel. Rather, your household has committed great lawless deeds and sins, and the glorious angel was embittered at their works; and for this reason he ordered that you be afflicted for a certain time, so that they too might repent and cleanse themselves from every desire of this age. When therefore they repent and are cleansed, then the angel of punishment will depart.”'
translation:
  language: es
  text: '2. Él dice: «Escucha: tus pecados son muchos, pero no tantos como para que seas entregado[a] a este ángel. Más bien, tu casa ha cometido grandes actos de iniquidad y pecados, y el ángel glorioso se llenó de amargura por sus obras; y por eso ordenó que sufrieras por cierto tiempo, para que también ellos se arrepientan y se purifiquen de todo deseo de este siglo. Cuando, pues, se arrepientan y sean purificados, entonces el ángel del castigo se apartará».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Entregado» conserva la pasiva del original; también puede entenderse como «puesto en manos de» este ángel.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραδοθῆναι / handed over
  english_pob_choice: be handed over
  chosen_spanish: ser entregado
  alternatives_spanish:
  - ser remitido
  - ser puesto en manos de
  lexicon: δοτέω / παραδίδωμι
  rationale: Conserva la imagen de una transferencia de autoridad o custodia, sin suavizar la fuerza del verbo. «Ser entregado» es natural en español y mantiene la pasiva del original y del audit trail inglés.
- source_word: ἄγγελος
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: ἄγγελος
  rationale: La tradición textual y el contexto personifican una figura angélica; «ángel» comunica adecuadamente la referencia sin perder el matiz sobrenatural.
- source_word: ἀνομία / lawless deeds
  english_pob_choice: lawless deeds
  chosen_spanish: actos de iniquidad
  alternatives_spanish:
  - acciones sin ley
  - obras de maldad
  lexicon: ἀνομία
  rationale: «Iniquidad» conserva el campo semántico de ausencia de ley/violación de ley con registro bíblico y fluidez en español. «Actos de iniquidad» refleja el plural de obras/actos del contexto.
- source_word: ἁμαρτίαι / sins
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - transgresiones
  lexicon: ἁμαρτία
  rationale: Es la correspondencia directa y más transparente para el lector español, sin borrar la distinción del texto entre iniquidades y pecados.
- source_word: ἐπικρανθη / was embittered
  english_pob_choice: was embittered
  chosen_spanish: se llenó de amargura
  alternatives_spanish:
  - se irritó
  - se amargó
  lexicon: πικραίνω
  rationale: La frase conserva el sentido afectivo fuerte de πικραίνω y suena idiomática en español. «Se llenó de amargura» evita una traducción demasiado psicológica o débil.
- source_word: ἔργα / works
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  lexicon: ἔργον
  rationale: «Obras» mantiene la correspondencia bíblica usual y encaja con la evaluación moral del pasaje.
- source_word: μετανοῶσιν / repent
  english_pob_choice: repent
  chosen_spanish: se arrepientan
  alternatives_spanish:
  - cambien de mente
  - vuelvan
  lexicon: μετανοέω
  rationale: En este contexto moral y penitencial, «arrepentirse» expresa con claridad el cambio de orientación requerido.
- source_word: καθαρίσωσιν / cleanse themselves
  english_pob_choice: cleanse themselves
  chosen_spanish: se purifiquen
  alternatives_spanish:
  - se limpien
  - se laven
  lexicon: καθαρίζω
  rationale: «Purificarse» conserva el sentido ritual/moral sin introducir un sujeto externo que el griego no exige.
- source_word: ἐπιθυμίας τοῦ αἰῶνος τούτου / every desire of this age
  english_pob_choice: every desire of this age
  chosen_spanish: todo deseo de este siglo
  alternatives_spanish:
  - todo deseo de esta época
  - toda codicia de este mundo
  lexicon: αἰών
  rationale: «Siglo» reproduce el registro bíblico de αἰών como orden presente/era, y evita reducirlo a tiempo cronológico solamente.
- source_word: ἀπέλθῃ / will depart
  english_pob_choice: will depart
  chosen_spanish: se apartará
  alternatives_spanish:
  - se irá
  - partirá
  lexicon: ἀπέρχομαι
  rationale: «Apartarse» comunica salida/retirada y permite un español sobrio; mantiene el valor de cesar su presencia o acción.
- source_word: κολάσεως / punishment
  english_pob_choice: punishment
  chosen_spanish: castigo
  alternatives_spanish:
  - pena
  - tormento
  lexicon: κόλασις
  rationale: «Castigo» es la equivalencia directa y suficientemente amplia para el rol judicial del ángel en el pasaje.
theological_decisions:
- issue: Relación entre los pecados del destinatario y los de su casa
  english_pob_reading: your sins are many, but not so many that you should be handed over to this angel. Rather, your household has committed great lawless deeds and sins
  chosen_spanish_reading: tus pecados son muchos, pero no tantos como para que seas entregado a este ángel. Más bien, tu casa ha cometido grandes actos de iniquidad y pecados
  alternative_spanish_readings:
  - tu familia ha cometido...
  - tu casa ha cometido grandes obras malas y pecados
  rationale: La lectura mantiene la distinción del original entre los pecados del oyente y la responsabilidad ampliada de su casa, sin suavizar la acusación. «Casa» puede abarcar familia/hogar en sentido bíblico-social; se conserva esa ambigüedad.
  doctrine_reference: Responsabilidad corporativa y lenguaje doméstico en textos tempranos cristianos
- issue: Finalidad del sufrimiento temporal
  english_pob_reading: he ordered that you be afflicted for a certain time, so that they too might repent and cleanse themselves
  chosen_spanish_reading: ordenó que sufrieras por un tiempo, para que también ellos se arrepientan y se purifiquen
  alternative_spanish_readings:
  - ordenó que fueras afligido por un tiempo
  - mandó que padecieras un tiempo
  rationale: 'Se mantiene la tensión pastoral del texto: el sufrimiento no es mero castigo retributivo sino medio para provocar arrepentimiento en otros. «Sufrieras» conserva el alcance general de la aflicción sin especificarla más allá de lo que el griego exige.'
  doctrine_reference: Disciplina divina, llamado al arrepentimiento y purificación moral
- issue: Figura del ángel glorioso y del ángel del castigo
  english_pob_reading: the glorious angel ... the angel of punishment
  chosen_spanish_reading: el ángel glorioso ... el ángel del castigo
  alternative_spanish_readings:
  - el ángel resplandeciente ... el ángel del castigo
  rationale: Se conserva la estructura del original y la distinción entre la dignidad del primero y la función del segundo. «Glorioso» y «castigo» son sobrios y transparentes para el lector español.
  doctrine_reference: Angelología narrativa en literatura cristiana temprana
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete de auditoría. La redacción española se ha elaborado directamente desde el griego fuente con apoyo del texto inglés POB como control de coherencia, sin depender mecánicamente de él.
  spanish_consistency_notes:
  - Se mantiene «ángel» para ἄγγελος y la distinción entre «glorioso» y «del castigo».
  - Se usa «casa» en sentido bíblico ampliable a hogar/familia, coherente con el contexto social del pasaje.
  - Se preserva «siglo» para αἰών por consistencia con el registro bíblico del proyecto.
  - Se evita «SEÑOR» o terminología eclesiástica no presente en el texto.
  - La puntuación con comillas angulares sigue el uso tipográfico español y mantiene el tono discursivo del original.
