  text: 4. “But look, sir,” I say, “they have repented with all their heart.” He says, “I also know that they have repented with—”
translation:
  language: es
  text: '4. «Pero mira, señor», digo, «ellos se han arrepentido con todo su corazón». Él dice: «Yo también sé que se han arrepentido con—»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: repented
  english_pob_choice: repented
  chosen_spanish: se han arrepentido
  alternatives_spanish:
  - se han cambiado de mente
  - han cambiado de pensamiento
  lexicon: μετανοέω
  rationale: El contexto exige una respuesta moral y volitiva, no meramente cognitiva. «Arrepentirse» conserva el sentido de giro interior y concuerda con el español eclesial sin volverlo más doctrinal de lo que el griego permite.
- source_word: with all their heart
  english_pob_choice: with all their heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - de todo corazón
  - con su corazón entero
  lexicon: καρδία
  rationale: La expresión es idiomática y fuerte en español; «con todo su corazón» mantiene la intensidad del original sin suavizarla.
- source_word: sir
  english_pob_choice: sir
  chosen_spanish: señor
  alternatives_spanish:
  - señor mío
  - señor,
  lexicon: κύριε
  rationale: En el diálogo directo, «señor» es la forma natural y respetuosa en español. No se introduce una mayúscula devocional porque el contexto es de tratamiento conversacional, no una fórmula litúrgica.
theological_decisions:
- issue: Valor de μετανοέω en una confesión de arrepentimiento
  english_pob_reading: they have repented
  chosen_spanish_reading: ellos se han arrepentido
  alternative_spanish_readings:
  - ellos han cambiado de mente
  - ellos han hecho un cambio de pensamiento
  rationale: La línea presenta una apelación pastoral o moral; traducirla como arrepentimiento conserva el peso ético y afectivo que el texto transmite. Las alternativas cognitivistas serían menos naturales en español y atenúan la carga de conversión interior.
  doctrine_reference: Arrepentimiento como cambio interior y retorno moral, sin añadir formulaciones doctrinales extrabíblicas.
translation_notes:
  revision_awareness: No se reportan revisiones previas en el paquete. Dado que el texto fuente llega truncado en el segmento final («with—»), la traducción conserva la interrupción con raya final para reflejar fielmente el estado textual del pasaje.
  spanish_consistency_notes:
  - Se mantiene el estilo de diálogo directo con comillas latinas españolas.
  - Se conserva la interrupción final («con—») porque el inglés auditado termina abruptamente y el griego de la unidad no se proporcionó para completar la frase con seguridad.
  - No se introducen términos técnicos o interpretativos adicionales fuera de lo que exige el fragmento.
