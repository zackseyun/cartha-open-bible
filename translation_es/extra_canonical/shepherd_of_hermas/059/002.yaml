  text: 1. After a few days I saw him in the same field where I had also seen the shepherds, and he says to me, “What are you seeking?” “I am here, sir,” I say, “that you may command the shepherd, the punisher, to go out from my house, because he afflicts me greatly.” He says, “It is necessary for you to be afflicted; for thus the glorious angel has commanded concerning you, for he wants you to be tested.” “For what, sir,” I say, “have I done that was so evil, that I should be handed over to this angel?”
translation:
  language: es
  text: '1. Después de unos pocos días lo vi en el mismo campo donde también había visto a los pastores, y me dice: «¿Qué buscas?» «Estoy aquí, señor[a]», le digo, «para que mandes al pastor, el castigador[b], que salga de mi casa, porque me aflige[c] mucho.» Él dice: «Es necesario que seas afligido[c]; pues así lo ha ordenado el ángel glorioso[d] con respecto a ti, porque quiere que seas puesto a prueba[e].» «¿Por qué, señor[a]», le digo, «he hecho algo tan malo que deba ser entregado[f] a este ángel?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gr. κύριε (vocativo). El destinatario es el Pastor, identificado en otras secciones del Hermas como el ángel del arrepentimiento, figura angélica subordinada al 'ángel glorioso'. Se traduce con minúscula ('señor') para distinguirlo del nombre divino Yahvé y de las formas 'Señor' reservadas para el Señor divino.
    reason: theological_note
  - marker: b
    text: Gr. κολαστής, 'el que castiga / castigador'. La raíz denota corrección judicial y disciplinaria. Algunas versiones antiguas vierten 'ángel del castigo'; el texto griego lo presenta como un pastor enviado específicamente para la aflicción correctiva de Hermas.
    reason: lexical_alternative
  - marker: c
    text: Gr. θλίβω / θλῖψις, raíz que designa presión, opresión y aflicción. La misma raíz aparece tanto en la queja de Hermas ('me aflige') como en la respuesta angélica ('seas afligido'), subrayando la continuidad entre la experiencia vivida y el propósito divino.
    reason: lexical_alternative
  - marker: d
    text: Gr. ὁ ἄγγελος ὁ ἔνδοξος, título fijo en las Similitudes para la autoridad celestial suprema sobre el Pastor (cf. Sim. 8.1). Numerosos intérpretes patrísticos y modernos identifican esta figura con el Hijo de Dios preexistente, pero el texto preservado no hace esa identificación explícita en este pasaje.
    reason: theological_note
  - marker: e
    text: Gr. δοκιμάζω, 'probar, examinar, poner a prueba'. El propósito de la aflicción es la δοκιμή (prueba que revela y forma), no la condena definitiva. Contrástese con πειράζω (tentar), que no es el término usado aquí.
    reason: lexical_alternative
  - marker: f
    text: Gr. παρεδόθην, aoristo pasivo de παραδίδωμι, 'ser entregado / puesto en manos de'. La voz pasiva implica que el agente de la entrega es el ángel glorioso, no Hermas mismo; la formulación refleja la estructura judicial del texto.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριε
  english_pob_choice: sir
  chosen_spanish: señor
  alternatives_spanish:
  - Señor
  - amo
  - señor mío
  lexicon: BDAG s.v. κύριος (vocative of address); Lampe, Patristic Greek Lexicon s.v. κύριος
  rationale: The addressee throughout the Shepherd of Hermas is the Shepherd figure (Angel of Repentance), a created angelic intermediary, not YHWH or Christ in his divine person. POB convention reserves 'Yahvé' for the divine name and 'Señor' (capitalized) would mislead Spanish readers into identifying this figure with the divine Lord. Lowercase 'señor' matches the English POB 'sir' and preserves the vocative address to an angelic-but-not-divine figure.
- source_word: κολαστής
  english_pob_choice: the punisher
  chosen_spanish: el castigador
  alternatives_spanish:
  - el que castiga
  - el atormentador
  - el azotador
  - el ángel del castigo
  lexicon: BDAG s.v. κολαστής ('one who punishes, punisher'); LSJ s.v. κολαστής ('chastiser, corrector')
  rationale: '''Castigador'' is the most direct and lexically precise Spanish equivalent of κολαστής, preserving both the judicial-disciplinary register and the substantive force of the Greek noun. ''Atormentador'' over-weights physical torment; ''azotador'' is too narrowly corporal; ''el que castiga'' is wordy. The disciplinary/corrective nuance present in LSJ is not lost, as ''castigo'' in Spanish covers both punishment and corrective discipline.'
- source_word: θλίβω / θλῖψις
  english_pob_choice: afflicts / be afflicted
  chosen_spanish: afligir / afligido
  alternatives_spanish:
  - oprimir / oprimido
  - atormentar / atormentado
  - angustiar / angustiado
  lexicon: BDAG s.v. θλίβω ('to cause someth. that crowds or presses hard, press upon, oppress'); s.v. θλῖψις ('trouble that inflicts distress, oppression, affliction, tribulation')
  rationale: '''Afligir'' captures the compound physical and spiritual suffering that θλίβω implies in Hermas''s penitential context. ''Oprimir'' leans too much toward social-political oppression; ''atormentar'' emphasizes torment over the corrective purpose the text intends. ''Afligir'' is idiomatic in modern Spanish spiritual/liturgical prose and conveys the intended sense without distortion.'
- source_word: ἔνδοξος (ἄγγελος ὁ ἔνδοξος)
  english_pob_choice: glorious angel
  chosen_spanish: el ángel glorioso
  alternatives_spanish:
  - el ángel de gloria
  - el venerable ángel
  - el excelso ángel
  lexicon: BDAG s.v. ἔνδοξος ('pertaining to having a high status, splendid, glorious, honorable'); LSJ s.v. ἔνδοξος ('held in honor, glorious')
  rationale: '''Glorioso'' is the standard Spanish rendering of ἔνδοξος in patristic contexts and preserves the radiant, honorific sense without importing later Christological specificity. The definite article construction ''el ángel glorioso'' mirrors ὁ ἄγγελος ὁ ἔνδοξος as a fixed title used in the Similitudes for the supreme angelic authority over Hermas.'
- source_word: δοκιμάζω / δοκιμασθῇς
  english_pob_choice: be tested
  chosen_spanish: seas puesto a prueba
  alternatives_spanish:
  - seas probado
  - seas examinado
  - seas refinado
  lexicon: BDAG s.v. δοκιμάζω ('to make a critical examination of someth., put to the test, examine'; 'to draw a conclusion about worth on the basis of testing, approve')
  rationale: '''Seas puesto a prueba'' is idiomatic in modern Spanish for this testing/proving sense and avoids the ambiguity of bare ''seas probado'' (which could suggest mere demonstration of an existing quality). It preserves the purposive force: the testing is ongoing and revelatory. ''Seas tentado'' is excluded because Spanish ''tentar'' primarily translates πειράζω (tempt/entreat), not δοκιμάζω.'
- source_word: παρεδόθην (παραδίδωμι, aor. pass.)
  english_pob_choice: be handed over
  chosen_spanish: ser entregado
  alternatives_spanish:
  - ser puesto en manos de
  - ser confiado a
  - ser sometido a
  lexicon: 'BDAG s.v. παραδίδωμι (''hand over, give (over), deliver, entrust''; passive: ''be handed over to the power of'')'
  rationale: '''Ser entregado'' is the natural, idiomatic Spanish passive of παραδίδωμι''s judicial-custody sense. It preserves the legal/transactional force (''handed over into the power of'') without the softer connotation of ''confiado a'' (entrusted to). The passive construction also retains Hermas''s implicit sense that the delivering agent is the glorious angel, not Hermas himself.'
theological_decisions:
- issue: Status of the addressee (κύριε) — angelic figure vs. divine Lord
  english_pob_reading: sir (addressing the Shepherd/Angel of Repentance)
  chosen_spanish_reading: señor (lowercase throughout)
  alternative_spanish_readings:
  - Señor (capitalized, traditional rendering conflating with divine Lord)
  rationale: In the Shepherd of Hermas, the figure addressed as κύριε in the Similitudes is the Shepherd, identified elsewhere in the text as the Angel of Repentance (Mand. 12.4–6; Sim. 9.1.3). He is a high angelic mediator subordinate to the 'glorious angel' — not YHWH or Christ in his own person, despite some patristic identifications. POB's project-wide default renders YHWH as 'Yahvé' to unmask the masking convention 'SEÑOR.' Using lowercase 'señor' here is consistent with that principle applied to an angelic — rather than divine — addressee. Capitalizing 'Señor' would falsely import a divine-name connotation not warranted by the source's own hierarchical angelology.
  doctrine_reference: Shepherd of Hermas, Mand. 12.4–6; Sim. 8.1–2; Sim. 9.1.3 — the Shepherd is the Angel of Repentance, commissioned by and subordinate to the 'glorious angel' (Son of God figure). Cf. Osiek, Shepherd of Hermas (Hermeneia, 1999), pp. 24–29.
- issue: Identity and authority of 'the glorious angel' (ὁ ἄγγελος ὁ ἔνδοξος)
  english_pob_reading: the glorious angel
  chosen_spanish_reading: el ángel glorioso
  alternative_spanish_readings:
  - el Señor glorioso
  - el ángel del Señor
  rationale: The 'glorious angel' is a fixed title in the Similitudes for the supreme celestial authority figure who commands and commissions the Shepherd (cf. Sim. 8.1.1–2). Many patristic and modern interpreters identify this figure with the pre-incarnate Christ or the Son of God, but the text does not make this identification explicit at this point. The Spanish rendering preserves the source's own language — 'el ángel glorioso' — without importing a Christological resolution the passage does not state. The disciplinary purpose ('he wants you to be tested') reflects Hermas's consistent teaching that affliction is remedial, not punitive in the ultimate sense.
  doctrine_reference: Shepherd of Hermas, Sim. 8.1.1–2; 9.1.3; 9.12.7–8. Cf. Osiek, Shepherd of Hermas (Hermeneia, 1999), pp. 177–178 on the identity of the ἔνδοξος ἄγγελος.
- issue: Remedial vs. retributive force of the affliction (θλῖψις)
  english_pob_reading: It is necessary for you to be afflicted
  chosen_spanish_reading: Es necesario que seas afligido
  alternative_spanish_readings:
  - Tienes que ser castigado
  - Debes sufrir
  rationale: The δεῖ ('it is necessary') construction frames the affliction as divinely ordained necessity, not arbitrary punishment. Hermas's theological framework consistently presents such tribulation as paideutic (disciplinary-formative). 'Es necesario que seas afligido' preserves this modal necessity without importing retributive connotation. Alternatives like 'tienes que ser castigado' risk conflating the punishing shepherd's instrument with the ultimate divine purpose, which the text distinguishes.
  doctrine_reference: 'The motif of necessary affliction as divine discipline: cf. Heb 12:5–11 (shared early Christian framework). Within Hermas specifically, Vis. 4.2–3; Sim. 6.3; 7.1–6 all frame suffering as purifying and testing, not final condemnation.'
translation_notes:
  revision_awareness: 'No applied revisions or revision passes are recorded in the source YAML (applied_revisions: [], latest_revision_pass: {}, cross_check_summary: {}). The English POB translation derives from the Lightfoot and Harmer 1891 normalized OCR edition of the Greek text (p. 374). No English lexical or theological decisions were supplied in the audit trail, so all lexical and theological decisions in this Spanish record are constructed directly from the Greek source text and standard patristic lexica (BDAG, LSJ, Lampe). This Spanish record constitutes the first layer of documented decision-making for HERM.S.7.2.'
  spanish_consistency_notes:
  - Lowercase 'señor' is used throughout for κύριε when addressing the angelic Shepherd, consistent with POB's project convention of reserving 'Yahvé' for YHWH and 'Señor' (capitalized) only where a divine-name referent is established by the source.
  - No occurrence of YHWH, κύριος as divine-name citation, or Mesías/Cristo language in this passage; the relevant project-level terminology defaults (Yahvé, Mesías, Jesús) are not triggered.
  - Dialogue is marked with Spanish guillemets (« ») rather than English quotation marks, following standard Spanish typographic convention for reported speech.
  - The historical present of the Greek narrative (λέγει, λέγω) is preserved in Spanish present-tense dialogue verbs ('me dice,' 'le digo'), matching the vividness and immediacy of the original narrative style.
  - '''Castigador'' is preferred over ''atormentador'' or ''azotador'' for κολαστής to maintain the judicial-disciplinary register without reducing the concept to purely physical torment.'
  - The verbal stem θλίβω is rendered consistently as 'afligir/afligido' across both its occurrences (Hermas's complaint and the angelic response), preserving the lexical link that is semantically significant in the source.
  - δεῖ + infinitive ('it is necessary') is rendered as 'es necesario que + subjuntivo', the standard modern Spanish equivalent for this Greek necessity construction, avoiding wooden calque while preserving the modal force.
