revisions:
- from: '«Primero de todo: fe, temor del Señor, amor, concordia, palabras de justicia, verdad, perseverancia: no hay nada mejor que estas cosas en la vida de los seres humanos. Si alguien guarda estas cosas y no se domina por medio de ellas, llega a ser bienaventurado en su vida.»'
  to: '«Primero de todo: fe, temor del Señor, amor, concordia, palabras de justicia, verdad, perseverancia; no hay nada mejor que estas virtudes en la vida de los seres humanos. Si alguien guarda estas cosas y ejerce dominio propio, llega a ser bienaventurado en su vida.»'
  rationale: Se corrige la cláusula final para reflejar de forma fiel y natural el sentido exhortativo de ἐγκρατεύεται como ejercicio de dominio propio, no como su negación. También se alisa levemente la puntuación y se sustituye 'estas cosas' por 'estas virtudes' en la valoración general para mejorar la legibilidad sin alterar el sentido.
