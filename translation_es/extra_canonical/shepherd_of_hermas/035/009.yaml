base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/035/009.yaml
  text: '“First of all: faith, fear of the Lord, love, concord, words of righteousness, truth, endurance—there is nothing better than these in the life of human beings. If someone keeps these and does not exercise self‑control from them, he becomes blessed in his life.'
translation:
  language: es
  text: '«Primero de todo: fe, temor del Señor, amor, concordia, palabras de justicia, verdad, perseverancia; no hay nada mejor que estas virtudes en la vida de los seres humanos. Si alguien guarda estas cosas y ejerce dominio propio, llega a ser bienaventurado en su vida.»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - creencia
  lexicon: N/A
  rationale: ‘Fe’ es el equivalente natural y eclesiásticamente estable para πίστις, y conserva el sentido de confianza leal sin sobreexplicar el término.
- source_word: φόβος τοῦ κυρίου
  english_pob_choice: fear of the Lord
  chosen_spanish: temor del Señor
  alternatives_spanish:
  - miedo del Señor
  - reverencia al Señor
  lexicon: N/A
  rationale: ‘Temor del Señor’ reproduce la fórmula bíblica tradicional y mantiene la fuerza respetuosa y reverente del griego sin suavizarla a ‘reverencia’.
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  - amor fraternal
  lexicon: N/A
  rationale: ‘Amor’ es la traducción más amplia y directa; ‘caridad’ sonaría más restringida y eclesialmente cargada en español moderno.
- source_word: ὁμόνοια
  english_pob_choice: concord
  chosen_spanish: concordia
  alternatives_spanish:
  - armonía
  - unidad
  lexicon: N/A
  rationale: ‘Concordia’ conserva la idea de acuerdo y unidad relacional de manera formal y clara, sin desplazar el matiz comunitario.
- source_word: λόγοι δικαιοσύνης
  english_pob_choice: words of righteousness
  chosen_spanish: palabras de justicia
  alternatives_spanish:
  - palabras de rectitud
  - palabras justas
  lexicon: N/A
  rationale: ‘Justicia’ mantiene el campo semántico moral y relacional de δικαιοσύνη; ‘rectitud’ es posible, pero ‘justicia’ resulta más transparente y acorde con el uso bíblico.
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - veracidad
  lexicon: N/A
  rationale: ‘Verdad’ es la equivalencia directa y más natural en este catálogo de virtudes.
- source_word: ὑπομονή
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - constancia
  - resistencia
  lexicon: N/A
  rationale: ‘Perseverancia’ comunica de forma idiomática la resistencia firme y sostenida que exige ὑπομονή.
- source_word: οὐδέν ... κρεῖσσον
  english_pob_choice: there is nothing better than these
  chosen_spanish: no hay nada mejor que estas cosas
  alternatives_spanish:
  - nada es mejor que estas cosas
  - no existe nada superior a estas
  lexicon: N/A
  rationale: La formulación española preserva el comparativo absoluto y el énfasis del original sin sonar artificial.
- source_word: ζωή τῶν ἀνθρώπων
  english_pob_choice: the life of human beings
  chosen_spanish: la vida de los seres humanos
  alternatives_spanish:
  - la vida de los hombres
  - la vida humana
  lexicon: N/A
  rationale: ‘Seres humanos’ evita el masculino genérico ambiguo y conserva el alcance universal del plural griego.
- source_word: ἐγκρατεύεται
  english_pob_choice: does not exercise self-control
  chosen_spanish: no se domina
  alternatives_spanish:
  - no ejerce dominio propio
  - no se contiene
  lexicon: N/A
  rationale: ‘No se domina’ expresa de forma natural la idea de falta de autocontrol; ‘dominio propio’ es posible, pero aquí la construcción verbal fluye mejor con el resto de la frase.
- source_word: μακάριος
  english_pob_choice: blessed
  chosen_spanish: bienaventurado
  alternatives_spanish:
  - bendito
  - feliz
  lexicon: N/A
  rationale: ‘Bienaventurado’ conserva el valor proclamativo y religioso de μακάριος mejor que ‘feliz’, que sería demasiado psicológico.
theological_decisions:
- issue: Lista de virtudes como ideal de vida
  english_pob_reading: there is nothing better than these in the life of human beings
  chosen_spanish_reading: no hay nada mejor que estas cosas en la vida de los seres humanos
  alternative_spanish_readings:
  - nada es mejor que estas cosas para la vida humana
  - no hay nada superior a estas en la vida de los hombres
  rationale: La versión mantiene el juicio universal del texto sin convertirlo en una paráfrasis moralizante. ‘Seres humanos’ preserva el alcance general del griego.
  doctrine_reference: Ethics/virtue formation in early Christian paraenesis
- issue: Relación entre guardar estas virtudes y recibir bienaventuranza
  english_pob_reading: If someone keeps these and does not exercise self‑control from them, he becomes blessed in his life
  chosen_spanish_reading: Si alguien guarda estas cosas y no se domina por medio de ellas, llega a ser bienaventurado en su vida
  alternative_spanish_readings:
  - si alguien las guarda y ejerce dominio propio, será bienaventurado
  - si uno las observa y no falta en dominio propio, será bendecido en su vida
  rationale: ‘Por medio de ellas’ sigue de cerca la construcción del original y deja visible la relación causal/instrumental entre las virtudes y la vida bienaventurada, sin resolverla interpretativamente más de lo necesario.
  doctrine_reference: Ascetic and moral discipline in early Christian instruction
translation_notes:
  revision_awareness: No applied revisions were supplied in the source packet; the Spanish draft therefore follows the cited English POB rendering while remaining anchored in the Greek source packet and the normalized OCR base.
  spanish_consistency_notes:
  - Se mantiene ‘Señor’ en ‘temor del Señor’ como equivalente reverente de κύριος en una fórmula estable, sin usar ‘SEÑOR’ tipográfico.
  - Se usa ‘bienaventurado’ para μακάριος de manera consistente con un registro bíblico clásico pero legible en español moderno.
  - ‘Concordia’ y ‘perseverancia’ se prefieren por claridad y por su capacidad de sostener el catálogo de virtudes sin añadir interpretación.
