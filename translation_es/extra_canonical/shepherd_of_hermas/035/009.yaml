review_pass:
  verdict: revise
  source_alignment_summary: 'La lista de virtudes está bien trasladada en general y el español es mayormente fiel al sentido del griego según la auditoría inglesa. Sin embargo, la cláusula final presenta un problema importante: el borrador traduce ἐγκρατεύεται de manera negativa e instrumental (''no se domina por medio de ellas''), lo que en español suena contrario al sentido probable de la exhortación. Dado el contexto de catálogo de virtudes, la idea es que quien las guarda y ejerce dominio propio llega a ser bienaventurado.'
  spanish_quality_summary: El texto es claro y digno, con buen registro eclesial. 'Temor del Señor' es legible, pero por política del proyecto debe preferirse 'del Señor' solo si no hay vínculo con el nombre divino; aquí no hay necesidad de cambio fuerte por falta de evidencia de cita de YHWH, aunque 'temor de Dios' también sería natural. El principal problema de calidad es la frase 'no se domina por medio de ellas', que resulta poco idiomática y semánticamente confusa.
  glossary_alignment: 'La mayoría de las decisiones léxicas concuerdan con las preferencias del proyecto: fe, amor, concordia, verdad, justicia, perseverancia, bienaventurado. La única desalineación relevante es ἐγκρατεύεται: el proyecto favorece expresar con claridad el autocontrol; ''no se domina'' no refleja bien la virtud de ἐγκράτεια ni produce un español natural en esta construcción.'
  issues:
  - severity: high
    issue: La cláusula 'y no se domina por medio de ellas' probablemente invierte u oscurece el sentido de ἐγκρατεύεται.
    rationale: En contexto parenético, ἐγκρατεύεται denota ejercer dominio propio, no carecer de él. La formulación actual además hace difícil entender a qué se refiere 'por medio de ellas' y produce una lectura extraña en español.
  - severity: medium
    issue: La decisión teológica/lexical documenta una lectura dudosa ('no se domina') como si fuera estable.
    rationale: La justificación afirma una falta de autocontrol, pero eso choca con el catálogo de virtudes y con la lógica exhortativa del pasaje. Conviene corregir también la explicación implícita mediante el texto revisado.
  - severity: low
    issue: '''Estas cosas'' es correcto pero algo pesado tras una lista breve.'
    rationale: Puede simplificarse a 'estas virtudes' o 'estas cosas' según preferencia. No es error, pero 'estas virtudes' mejora la cohesión semántica.
  revised_spanish_text: '«Primero de todo: fe, temor del Señor, amor, concordia, palabras de justicia, verdad, perseverancia; no hay nada mejor que estas virtudes en la vida de los seres humanos. Si alguien guarda estas cosas y ejerce dominio propio, llega a ser bienaventurado en su vida.»'
  revision_rationale: Se corrige la cláusula final para reflejar de forma fiel y natural el sentido exhortativo de ἐγκρατεύεται como ejercicio de dominio propio, no como su negación. También se alisa levemente la puntuación y se sustituye 'estas cosas' por 'estas virtudes' en la valoración general para mejorar la legibilidad sin alterar el sentido.
