  yaml_path: translation/extra_canonical/shepherd_of_hermas/035/007.yaml
  text: '“But the things from which you must not exercise self‑control,” he says, “but rather do them—listen: Do not exercise self‑control with regard to the good, but do it.”'
translation:
  language: es
  text: '«Pero las cosas de las que no debes abstenerte —dice él—, sino más bien hacerlas, escucha: no te abstengas de lo bueno, sino hazlo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μὴ ἐγκρατεύεσθαι
  english_pob_choice: must not exercise self-control
  chosen_spanish: no debes ejercer dominio propio
  alternatives_spanish:
  - no debes abstenerte
  - no debes dominarte
  - no debes practicar autocontrol
  lexicon: ἐγκρατεύομαι
  rationale: La idea central es la de abstenerse o contenerse de hacer algo; en español, «ejercer dominio propio» conserva el valor de control voluntario sin sonar tan técnico como «autocontrol» y sin perder el matiz del verbo medio/reflexivo.
- source_word: ἀγαθόν
  english_pob_choice: the good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - el bien
  - lo bueno y recto
  lexicon: ἀγαθός
  rationale: Aquí el sustantivado neutro requiere una formulación natural en español. «Lo bueno» mantiene la referencia amplia del original sin cargarla con un sentido moral más estrecho que el texto no exige.
- source_word: ποιεῖν
  english_pob_choice: do it
  chosen_spanish: hacerlo
  alternatives_spanish:
  - practicarlo
  - llevarlo a cabo
  lexicon: ποιέω
  rationale: El contraste retórico del pasaje pide un verbo simple e imperativo. «Hacerlo» reproduce la brevedad enfática del griego y de la POB inglesa.
theological_decisions:
- issue: 'Contraste exhortativo: no contenerse respecto de lo bueno, sino realizarlo'
  english_pob_reading: Do not exercise self-control with regard to the good, but do it.
  chosen_spanish_reading: No debes ejercer dominio propio en cuanto a lo bueno, sino hacerlo.
  alternative_spanish_readings:
  - No debes abstenerte de hacer el bien, sino hacerlo.
  - No debes contenerte respecto de lo bueno, sino practicarlo.
  rationale: 'El texto presenta una exhortación paradójica: hay ámbitos donde la “contención” no es virtud, porque el bien debe ejecutarse sin demora. La redacción española conserva ese contraste sin suavizarlo ni convertirlo en una simple orden moral general.'
  doctrine_reference: Ética exhortativa del Mandato 8 en el Pastor de Hermas; contraste literario entre contención y obediencia activa.
translation_notes:
  revision_awareness: No se documentan revisiones previas ni variantes textuales en el paquete auditado. La redacción sigue directamente el griego normalizado y la formulación inglesa POB como control de coherencia, sin depender mecánicamente de ella.
  spanish_consistency_notes:
  - Se mantiene «dominio propio» para ἐγκρατεύεσθαι por consistencia con el valor semántico de control voluntario.
  - Se usa «lo bueno» para ἀγαθόν sustantivado, evitando introducir una interpretación más específica de la que ofrece el pasaje.
  - Se conserva el ritmo exhortativo con dos cláusulas breves y un colon para reflejar la estructura retórica del original.
