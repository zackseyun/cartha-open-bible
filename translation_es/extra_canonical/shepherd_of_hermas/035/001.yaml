review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del inglés POB: se mantiene la estructura de cita, la afirmación de que lo creado por Dios es ‘twofold’, y el paralelo con la ἐγκράτεια. Sin embargo, ‘son dobles’ en español suena menos idiomático y puede sugerir duplicación más que clasificación en dos aspectos o clases. El sentido fuente queda mejor preservado con ‘son de dos clases’.'
  spanish_quality_summary: El texto es claro y digno, pero ‘las cosas creadas por Dios son dobles’ y ‘el dominio propio también es doble’ suenan algo rígidos y poco naturales en español eclesial contemporáneo. La revisión propuesta mejora la legibilidad sin alejarse del original. El resto del enunciado (‘hay que ejercer dominio propio…’) es natural y fiel.
  glossary_alignment: 'No hay términos del glosario mayor en disputa. ‘Dominio propio’ para ἐγκράτεια está bien elegido. ‘Hay que’ refleja adecuadamente δεῖ. La principal corrección es estilístico-semántica en la representación de διπλᾶ / twofold: ‘de dos clases’ comunica mejor la duplicidad conceptual que ‘dobles’.'
  issues:
  - severity: medium
    issue: ‘son dobles’ / ‘es doble’ suena poco idiomático y potencialmente ambiguo en español
    rationale: En este contexto, el griego y el inglés POB apuntan a una realidad de dos aspectos o clases, no a que algo esté duplicado. ‘Dobles’ puede malentenderse; ‘de dos clases’ o equivalente preserva mejor el sentido.
  revised_spanish_text: «Te dije», dice, «que las cosas creadas por Dios son de dos clases; porque el dominio propio también es de dos clases. Pues en cuanto a algunas cosas hay que ejercer dominio propio, y en cuanto a otras no.»
  revision_rationale: Se ajusta ‘twofold’ a una formulación española más natural y semánticamente precisa en este contexto (‘de dos clases’), manteniendo la estructura paralela del original y la claridad doctrinal del pasaje. No se requieren notas.
