  text: “I said to you,” he says, “that the things created by God are twofold; for self‑control is twofold as well. For with regard to some things one must exercise self‑control, and with regard to others one must not.
translation:
  language: es
  text: «Te dije», dice, «que las cosas creadas por Dios son de dos clases; porque el dominio propio también es de dos clases. Pues en cuanto a algunas cosas hay que ejercer dominio propio, y en cuanto a otras no.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διπλᾶ / δύο
  english_pob_choice: twofold
  chosen_spanish: dobles
  alternatives_spanish:
  - de dos clases
  - bipartitas
  - dobles en su naturaleza
  lexicon: δίπλους / διπλοῦς
  rationale: El inglés POB usa 'twofold' para expresar la idea de una realidad dividida en dos aspectos o clases. 'Dobles' comunica esa duplicidad de forma natural en español sin añadir una explicación ajena al texto.
- source_word: ἐγκράτεια
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - autocontrol
  - templanza
  - continencia
  lexicon: ἐγκράτεια
  rationale: '''Dominio propio'' conserva el matiz de control de uno mismo y es una expresión bíblica clara en español. ''Autocontrol'' sería posible, pero ''dominio propio'' suena más sobrio y más apto para registro eclesial.'
- source_word: ὑπάρχοντα / κτιστά
  english_pob_choice: the things created by God
  chosen_spanish: las cosas creadas por Dios
  alternatives_spanish:
  - las cosas que Dios creó
  - las criaturas de Dios
  lexicon: κτίζω / κτιστός
  rationale: La formulación española sigue de cerca la construcción del inglés POB y conserva el participio de resultado 'creadas', que mantiene la relación directa con Dios como Creador.
- source_word: δει
  english_pob_choice: one must / it is necessary
  chosen_spanish: hay que
  alternatives_spanish:
  - es necesario
  - se debe
  lexicon: δεῖ
  rationale: '''Hay que'' expresa necesidad normativa en español de manera breve y natural, equivalente al valor impersonal del griego y al ''one must'' del inglés POB.'
theological_decisions:
- issue: La duplicidad de las cosas creadas y del dominio propio
  english_pob_reading: the things created by God are twofold; for self-control is twofold as well
  chosen_spanish_reading: las cosas creadas por Dios son dobles; porque el dominio propio también es doble
  alternative_spanish_readings:
  - las cosas creadas por Dios son de dos clases; porque el dominio propio también lo es
  - las cosas creadas por Dios tienen dos aspectos; y el dominio propio también
  rationale: 'La frase mantiene la tensión conceptual del original: no se afirma simplemente que todo sea igualmente regulable, sino que hay una división real en el ámbito de lo creado y también en el ejercicio del dominio propio. ''Dobles'' preserva la estructura paralela del texto.'
  doctrine_reference: Mandate 8, sobre el discernimiento moral y la moderación en el uso de lo creado
translation_notes:
  revision_awareness: No se dispone de un aparato crítico adicional ni de revisiones aplicadas en el contexto provisto; la redacción española se ajusta directamente al pasaje griego normalizado y al sentido comunicado por la traducción inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός/ὁ θεός conforme al estándar del proyecto.
  - Se evita 'templanza' porque podría sonar demasiado virtuosista o técnico; 'dominio propio' preserva mejor el paralelismo con 'self-control'.
  - La puntuación reproduce el arranque con comillas y discurso directo encadenado, adecuado para un texto patrístico breve.
