base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/035/004.yaml
  text: “These deeds are the most evil of all in the life of human beings. From these works, then, the slave of God must exercise self‑control; for the one who does not exercise self‑control from these is not able to live to God. Listen, then, also to the things that follow these.”
translation:
  language: es
  text: “Estas obras son las más malas de todas en la vida de los seres humanos. De estas obras, entonces, el esclavo de Dios debe ejercer dominio propio[a]; porque el que no ejerce dominio propio a causa de estas no puede vivir para Dios. Oíd, pues, también las cosas que siguen a estas.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Dominio propio» traduce el verbo de control interior; también podría decirse «autocontrol» o «dominio de sí».
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἔργα ταῦτα / these deeds, these works
  english_pob_choice: These deeds / these works
  chosen_spanish: estas obras
  alternatives_spanish:
  - estos hechos
  - estas acciones
  lexicon: ἔργον
  rationale: «Obras» mantiene el valor general de acciones/hechos y suena natural en español bíblico sin suavizar el juicio moral del pasaje.
- source_word: πονηρότατα / most evil
  english_pob_choice: the most evil
  chosen_spanish: las más malas
  alternatives_spanish:
  - las peores
  - las más perversas
  lexicon: πονηρός
  rationale: Se conserva el superlativo absoluto con un español claro y directo. «Las más malas» refleja la fuerza evaluativa del griego y del inglés auditado, aunque es más coloquial que «perversas».
- source_word: ἐν τῇ ζωῇ τῶν ἀνθρώπων / in the life of human beings
  english_pob_choice: in the life of human beings
  chosen_spanish: en la vida de los seres humanos
  alternatives_spanish:
  - en la vida de los hombres
  - en la vida de la humanidad
  lexicon: ζωή / ἄνθρωποι
  rationale: «Seres humanos» evita un masculino genérico innecesario y preserva el alcance universal del griego.
- source_word: ὁ δοῦλος τοῦ θεοῦ / the slave of God
  english_pob_choice: the slave of God
  chosen_spanish: el esclavo de Dios
  alternatives_spanish:
  - el siervo de Dios
  lexicon: δοῦλος
  rationale: Se mantiene la fuerza léxica de δοῦλος con «esclavo», siguiendo la decisión auditada del inglés POB y evitando suavizarla a «siervo».
- source_word: ἐγκρατεύεσθαι / exercise self-control
  english_pob_choice: exercise self-control
  chosen_spanish: ejerza dominio propio
  alternatives_spanish:
  - se discipline
  - practique el autocontrol
  lexicon: ἐγκρατεύομαι
  rationale: «Dominio propio» es una expresión estable en español bíblico y conserva el sentido ético de control de sí mismo sin sonar excesivamente técnico.
- source_word: οὐ δύναται ζῆν τῷ θεῷ / is not able to live to God
  english_pob_choice: is not able to live to God
  chosen_spanish: no puede vivir para Dios
  alternatives_spanish:
  - no puede vivir para Dios
  - no puede vivir ante Dios
  lexicon: ζῆν τῷ θεῷ
  rationale: «Vivir para Dios» comunica la orientación de la vida hacia Dios con naturalidad en español y preserva la relación personal implícita en el dativo.
- source_word: ἄκουε οὖν καὶ τὰ ἑξῆς τούτοις / Listen, then, also to the things that follow these
  english_pob_choice: Listen, then, also to the things that follow these
  chosen_spanish: Oíd, pues, también las cosas que siguen a estas
  alternatives_spanish:
  - Escuchad, pues, también lo que sigue
  - Oíd, entonces, también lo que sigue
  lexicon: ἄκουε / τὰ ἑξῆς
  rationale: Se conserva el tono exhortativo y el carácter secuencial del original. «Oíd» mantiene la fuerza plural/formal del mandato en una forma literaria aceptable.
theological_decisions:
- issue: Moral evaluation of the actions as uniquely and maximally evil
  english_pob_reading: These deeds are the most evil of all in the life of human beings.
  chosen_spanish_reading: Estas obras son las más malas de todas en la vida de los seres humanos.
  alternative_spanish_readings:
  - Estas obras son las más perversas de todas en la vida de los seres humanos.
  - Estas obras son las peores de todas en la vida humana.
  rationale: La traducción conserva el juicio intensificado del texto sin atenuarlo. No se reduce a un mero «mal» genérico, porque el superlativo es parte del peso moral del pasaje.
  doctrine_reference: Ética moral; lenguaje de pecado y corrupción humana
- issue: Requirement of self-control as necessary for living toward/for God
  english_pob_reading: the slave of God must exercise self-control; for the one who does not exercise self-control from these is not able to live to God.
  chosen_spanish_reading: el esclavo de Dios debe ejercer dominio propio; porque el que no ejerce dominio propio a causa de estas no puede vivir para Dios.
  alternative_spanish_readings:
  - el esclavo de Dios debe dominarse; porque el que no se domina con respecto a estas no puede vivir para Dios.
  rationale: Se conserva la obligación moral y la consecuencia espiritual del texto. «Para Dios» expresa de modo claro la dirección teocéntrica de la vida que el original presenta.
  doctrine_reference: Ascética cristiana; santidad práctica y disciplina moral
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; la redacción española sigue directamente el texto griego y el marco auditado inglés, manteniendo sin suavizar δοῦλος, el superlativo moral de πονηρότατα y la exhortación final secuencial.
  spanish_consistency_notes:
  - Se preserva «esclavo de Dios» de acuerdo con la terminología POB para δοῦλος.
  - Se usa «Y Dios» no aparece aquí; no hay nombre divino explícito que requiera nota de Yahvé.
  - «Dominio propio» se emplea como equivalente idiomático de ἐγκράτεια/ἐγκρατεύεσθαι en un registro bíblico contemporáneo.
  - La orden final se mantiene en tono elevado con «Oíd, pues», acorde con un texto exhortativo antiguo.
