review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido general del griego y del inglés POB: identifica estas acciones como las peores, exige ἐγκράτεια al esclavo de Dios, afirma que sin ella no se puede vivir para Dios, y anuncia lo que sigue. Sin embargo, hay varios puntos de ajuste para mayor fidelidad y mejor español: «las más malas» suena poco idiomático; «a causa de estas» no refleja bien ἀπὸ τούτων, que aquí indica apartarse/dejarse de tales obras; y «Oíd» introduce un registro peninsular/plural que no encaja bien con el objetivo de español neutral, además de que el inglés auditado usa singular «Listen».'
  spanish_quality_summary: La redacción es comprensible, pero tiene giros poco naturales o menos adecuados al estilo del proyecto. «Las más malas» es gramatical pero torpe; «las peores» o «las más perversas» funciona mejor. «Ejercer dominio propio» es aceptable, pero la repetición con «a causa de estas» entorpece la frase; «debe dominarse en cuanto a estas» o «debe abstenerse de estas» expresaría mejor el verbo con complemento ἀπό. «Escucha» da un tono exhortativo claro y neutral. También conviene quitar la nota al pie, porque no añade una ambigüedad relevante ni preserva una alternativa necesaria del inglés POB.
  glossary_alignment: Se alinea bien con las decisiones base del proyecto en «Dios» y especialmente δοῦλος -> «esclavo». No hay conflicto terminológico mayor. La revisión propuesta mantiene «esclavo de Dios» y «vivir para Dios». Para ἐγκρατεύεσθαι, en español resulta más fiel y natural con este complemento decir «dominarse» / «mantenerse alejado de estas cosas» que el literal repetido «ejercer dominio propio ... a causa de estas».
  issues:
  - severity: medium
    issue: «las más malas» es poco idiomático en español bíblico/literario
    rationale: Aunque intenta reflejar el superlativo πονηρότατα, en español suena torpe y coloquial. «Las peores» conserva bien la fuerza superlativa y mejora la legibilidad.
  - severity: high
    issue: «a causa de estas» no refleja adecuadamente ἀπὸ τούτων
    rationale: 'El sentido no es causal («por causa de estas»), sino separación/restricción respecto de esas obras: controlarse apartándose de ellas o en relación con ellas. La redacción actual puede malentenderse.'
  - severity: medium
    issue: «Oíd» no encaja con el objetivo de español neutral y probablemente no refleja el singular exhortativo
    rationale: El proyecto pide español neutral latinoamericano/broadly church-readable. «Oíd» suena marcadamente peninsular/tradicional. «Escucha» o «Escuchen» sería preferible; dado el inglés POB «Listen» singular, «Escucha» encaja bien.
  - severity: low
    issue: La nota sobre «dominio propio» no es necesaria
    rationale: No preserva una ambigüedad importante del original ni una alternativa documentada del inglés POB. Añade carga sin necesidad.
  revised_spanish_text: Estas obras son las peores de todas en la vida de los seres humanos. De estas obras, entonces, el esclavo de Dios debe dominarse; porque el que no se domina de estas no puede vivir para Dios. Escucha, pues, también las cosas que siguen a estas.
  revision_rationale: 'Se revisa para mejorar fidelidad semántica y naturalidad del español: «las peores» expresa mejor el superlativo; se elimina la lectura causal de «a causa de estas» y se usa una formulación más cercana al sentido de controlarse respecto de esas obras; y «Escucha» sustituye al peninsular «Oíd» para ajustarse al registro neutral y al singular del inglés auditado. No hacen falta notas al pie.'
