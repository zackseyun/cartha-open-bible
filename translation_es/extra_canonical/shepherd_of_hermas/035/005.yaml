review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego según la auditoría inglesa: pregunta sobre si aún existen obras malas, respuesta afirmativa, y lista de vicios de los cuales el δοῦλος de Dios debe abstenerse/mostrar dominio propio. La mayoría de los términos léxicos están bien representados. Sin embargo, hay un problema de naturalidad y precisión en «mal deseo», que suena poco idiomático en español; «deseo maligno» o «deseo malo» refleja mejor ἐπιθυμία πονηρά. También conviene mejorar la construcción «debe ejercitar el dominio propio» a «debe ejercer dominio propio» o «debe tener dominio propio», porque el español actual la recibe mejor sin perder el matiz verbal.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero presenta dos detalles mejorables para una lectura más natural: 1) la colocación «mal deseo» es forzada; 2) «debe ejercitar el dominio propio» resulta algo pesada. La puntuación y el registro son adecuados. La nota al pie sobre «esclavo» es pertinente y bien anclada.'
  glossary_alignment: Alinea bien con las pautas del proyecto en δοῦλος -> «esclavo». No hay términos de glosario mayores en disputa. La elección de «Señor» refleja κύριε del diálogo y no entra en conflicto con la preferencia de «Yahvé», ya que no se trata del nombre divino hebreo en el texto fuente.
  issues:
  - severity: medium
    issue: «mal deseo» es poco idiomático en español
    rationale: Aunque intenta reflejar literalmente ἐπιθυμία πονηρά, en español neutral suena antinatural. «deseo maligno» o «deseo malo» preserva mejor el sentido moral sin calco torpe.
  - severity: low
    issue: «debe ejercitar el dominio propio» suena algo pesado
    rationale: El sentido de ἐγκρατεύεσθαι se conserva, pero «debe ejercer dominio propio» fluye mejor en español moderno y mantiene el valor de autodominio.
  revised_spanish_text: '«¿Todavía hay», digo yo, «Señor, obras malas?» «Sí, hay muchas», dice él, «de las cuales el esclavo[a] de Dios debe ejercer dominio propio: robo, mentira, fraude, falso testimonio, avaricia, deseo maligno, engaño, vanagloria, jactancia y todo lo que sea semejante a estas cosas».'
  revised_footnotes:
  - marker: a
    text: O «siervo»; el griego δοῦλος conserva una fuerza mayor que una mera relación de servicio.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y precisión del español sin alterar el sentido fuente ni las decisiones léxicas principales: «las hay muchas» se simplificó a «hay muchas»; «ejercitar el dominio propio» a «ejercer dominio propio»; y «mal deseo» a «deseo maligno». También se pulió levemente la nota al pie.'
