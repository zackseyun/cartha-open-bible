base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/035/005.yaml
  text: '“Are there still,” I say, “Lord, evil works?” “Indeed, there are many,” he says, “from which the slave of God must exercise self‑control: theft, falsehood, defrauding, false testimony, greed, evil desire, deceit, vainglory, boastfulness, and whatever things are like these.”'
translation:
  language: es
  text: '«¿Todavía hay», digo yo, «Señor, obras malas?» «Sí, hay muchas», dice él, «de las cuales el esclavo[a] de Dios debe ejercer dominio propio: robo, mentira, fraude, falso testimonio, avaricia, deseo maligno, engaño, vanagloria, jactancia y todo lo que sea semejante a estas cosas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo»; el griego δοῦλος conserva una fuerza mayor que una mera relación de servicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλος τοῦ θεοῦ
  english_pob_choice: the slave of God
  chosen_spanish: el esclavo de Dios
  alternatives_spanish:
  - el siervo de Dios
  - el servidor de Dios
  lexicon: δοῦλος
  rationale: El inglés POB preserva la fuerza lexical de δοῦλος con “slave”; en español, “esclavo” mantiene esa intensidad y evita suavizarla a “siervo”, que reduciría el peso del término.
- source_word: ἐγκρατεύεσθαι
  english_pob_choice: exercise self-control
  chosen_spanish: ejercitar el dominio propio
  alternatives_spanish:
  - ejercer autocontrol
  - practicar la templanza
  lexicon: ἐγκρατεύομαι
  rationale: “Ejercitar el dominio propio” conserva la idea verbal de una práctica activa y el matiz de autodominio, sin imponer un término técnico eclesiástico que pueda estrechar el sentido.
- source_word: κλέπτης / κλοπή
  english_pob_choice: theft
  chosen_spanish: robo
  alternatives_spanish:
  - hurto
  - latrocinio
  lexicon: κλέπτω
  rationale: “Robo” es la opción más natural y abarcadora en español contemporáneo para la lista de vicios, y comunica el acto ilícito sin tecnicismos innecesarios.
- source_word: ψεῦδος / ψεύδομαι
  english_pob_choice: falsehood
  chosen_spanish: mentira
  alternatives_spanish:
  - falsedad
  - decir falso
  lexicon: ψεῦδος
  rationale: “Mentira” transmite de forma directa el engaño verbal implicado en el contexto moral de la lista.
- source_word: ἀποστερέω
  english_pob_choice: defrauding
  chosen_spanish: fraude
  alternatives_spanish:
  - defraudación
  - estafa
  lexicon: ἀποστερέω
  rationale: El inglés POB eligió “defrauding”, que apunta a privar injustamente o estafar; “fraude” conserva la idea de trato deshonesto y es claro en español.
- source_word: ψευδομαρτυρία
  english_pob_choice: false testimony
  chosen_spanish: falso testimonio
  alternatives_spanish:
  - testimonio falso
  - perjurio
  lexicon: ψευδομαρτυρία
  rationale: La forma tradicional y precisa en español para la declaración engañosa es “falso testimonio”, que refleja bien el paralelo judicial del término.
- source_word: πλεονεξία
  english_pob_choice: greed
  chosen_spanish: avaricia
  alternatives_spanish:
  - codicia
  - ambición desordenada
  lexicon: πλεονεξία
  rationale: “Avaricia” expresa con sobriedad el deseo desmedido de poseer, cercano al valor de πλεονεξία y adecuado para una lista moral.
- source_word: ἐπιθυμία πονηρά
  english_pob_choice: evil desire
  chosen_spanish: mal deseo
  alternatives_spanish:
  - deseo malo
  - deseo perverso
  lexicon: ἐπιθυμία
  rationale: Se conserva la sencillez del original y del inglés POB; “mal deseo” evita sobreespecificar y deja abierta la amplitud moral del término.
- source_word: δόλος
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - astucia
  - fraude
  lexicon: δόλος
  rationale: “Engaño” reproduce el engaño deliberado sin añadir matices de estrategia o fraude legal que no están necesariamente presentes en el término.
- source_word: κενοδοξία
  english_pob_choice: vainglory
  chosen_spanish: vanagloria
  alternatives_spanish:
  - gloria vana
  - presunción
  lexicon: κενοδοξία
  rationale: “Vanagloria” es el equivalente español asentado y conserva la idea de gloria vacía o buscada por sí misma.
- source_word: ἀλαζονεία
  english_pob_choice: boastfulness
  chosen_spanish: jactancia
  alternatives_spanish:
  - alardear
  - presunción
  lexicon: ἀλαζονεία
  rationale: “Jactancia” comunica bien la actitud de alarde o fanfarronería de manera compacta y fiel a la lista.
theological_decisions:
- issue: La lista moral incluye “whatever things are like these”, una apertura que no limita exhaustivamente la enumeración.
  english_pob_reading: and whatever things are like these
  chosen_spanish_reading: y todo lo que sea semejante a estas cosas
  alternative_spanish_readings:
  - y todas las cosas semejantes a estas
  - y cualquier cosa parecida a estas
  rationale: La formulación mantiene el carácter abierto e inclusivo del cierre, sin convertir la lista en una enumeración cerrada ni suavizar su alcance moral.
  doctrine_reference: Principio de lista abierta moral; cf. Gálatas 5:21 y pasajes afines sobre vicios enumerativos.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete; la redacción española sigue el texto griego normalizado del testimonio de Lightfoot & Harmer 1891 y el valor auditado del inglés POB, manteniendo la lista viciosa y su clausula abierta sin añadir elementos no atestiguados.
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo con «digo yo» / «dice él» como en el inglés POB, preservando el diálogo.
  - Se conserva «Señor» para el vocativo del interlocutor, coherente con la forma del texto base y natural en español.
  - La lista de vicios se presenta en singular nominal cuando el español lo favorece, sin alterar el inventario moral.
  - Se mantiene «Dios» sin matización adicional, ya que el texto griego y el contexto no requieren otra distinción teológica en este pasaje.
