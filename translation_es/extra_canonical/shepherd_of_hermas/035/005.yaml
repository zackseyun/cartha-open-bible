revisions:
- from: '«¿Todavía hay», digo yo, «Señor, obras malas?» «Sí, las hay muchas», dice él, «de las cuales el esclavo[a] de Dios debe ejercitar el dominio propio: robo, mentira, fraude, falso testimonio, avaricia, mal deseo, engaño, vanagloria, jactancia, y todo lo que sea semejante a estas cosas».'
  to: '«¿Todavía hay», digo yo, «Señor, obras malas?» «Sí, hay muchas», dice él, «de las cuales el esclavo[a] de Dios debe ejercer dominio propio: robo, mentira, fraude, falso testimonio, avaricia, deseo maligno, engaño, vanagloria, jactancia y todo lo que sea semejante a estas cosas».'
  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y precisión del español sin alterar el sentido fuente ni las decisiones léxicas principales: «las hay muchas» se simplificó a «hay muchas»; «ejercitar el dominio propio» a «ejercer dominio propio»; y «mal deseo» a «deseo maligno». También se pulió levemente la nota al pie.'
