review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del inglés POB: pregunta sobre si estas cosas son malas, respuesta intensificada, referencia a los esclavos de Dios, llamado repetido a ἐγκρατεύεσθαι, finalidad de vivir para Dios y ser inscrito con los que practican esa continencia. Sin embargo, la formulación española repite de manera poco natural ''ejercitar dominio propio'' en lugares donde el español pide ''tener'' o ''practicar'' dominio propio, y una frase queda sintácticamente dura.'
  spanish_quality_summary: 'El texto es comprensible y bastante fiel, pero suena calcado en varios puntos: ''debe ejercitar dominio propio el que sirve a Dios'', ''ejercitan dominio propio respecto de ellas'', y la repetición de ''estas cosas'' produce pesadez. Una revisión menor mejora la naturalidad sin perder la fuerza exhortativa ni el paralelismo del original.'
  glossary_alignment: 'Alinea bien con la terminología del proyecto en ''esclavos de Dios'' para δοῦλοι τοῦ θεοῦ. No hay términos conflictivos como Yahvé/Mesías. La decisión para ἐγκρατεύομαι necesita ajuste estilístico en español: mantener ''dominio propio'' es válido, pero conviene expresarlo idiomáticamente como ''tener dominio propio'' o ''practicar el dominio propio'' según la construcción.'
  issues:
  - severity: medium
    issue: Calco poco natural de ἐγκρατεύεσθαι como 'ejercitar dominio propio' en todas las ocurrencias
    rationale: Aunque semánticamente correcto, en español eclesial y general suena más natural 'tener dominio propio' o 'practicar el dominio propio'. La repetición literal entorpece la lectura y no refleja bien la idiomaticidad del griego en español.
  - severity: low
    issue: Orden sintáctico rígido en 'De todas estas cosas debe ejercitar dominio propio el que sirve a Dios'
    rationale: La frase es entendible, pero 'el que sirve a Dios debe tener dominio propio en todas estas cosas' fluye mejor y conserva el énfasis exhortativo.
  - severity: low
    issue: '''respecto de ellas'' resulta pesado en la frase final media'
    rationale: '''En cuanto a ellas'' o ''en estas cosas'' suena más natural. Aquí ''de ellas'' también puede funcionar si se mantiene el sentido de abstención/control frente a tales vicios.'
  revised_spanish_text: «¿No te parecen malas estas cosas?» «Muy malas», digo yo, «para los esclavos de Dios». «En todas estas cosas, el que sirve a Dios debe tener dominio propio. Ten, pues, dominio propio en todas estas cosas, para que vivas para Dios y seas inscrito con los que tienen dominio propio en cuanto a ellas. Estas, pues, son las cosas en las que debes tener dominio propio»
  revision_rationale: 'La revisión conserva el contenido y la terminología clave del original, pero sustituye calcos duros por español más natural: ''tener dominio propio'' en vez de repetir ''ejercitar dominio propio'', mejor orden sintáctico, y una formulación final más fluida. No hacen falta notas adicionales porque no se introduce nueva ambigüedad ni se pierde información preservada por el inglés POB.'
