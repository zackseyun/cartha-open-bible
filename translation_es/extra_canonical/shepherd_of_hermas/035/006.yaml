revisions:
- from: «¿No les parecen estas cosas malas?» «Muy malas», digo yo, «para los esclavos de Dios». «De todas estas cosas debe ejercitar dominio propio el que sirve a Dios. Ejercita, pues, dominio propio de todas estas cosas, para que vivas para Dios y seas inscrito con los que ejercitan dominio propio respecto de ellas. Estas, pues, son las cosas de las que debes ejercitar dominio propio».
  to: «¿No te parecen malas estas cosas?» «Muy malas», digo yo, «para los esclavos de Dios». «En todas estas cosas, el que sirve a Dios debe tener dominio propio. Ten, pues, dominio propio en todas estas cosas, para que vivas para Dios y seas inscrito con los que tienen dominio propio en cuanto a ellas. Estas, pues, son las cosas en las que debes tener dominio propio»
  rationale: 'La revisión conserva el contenido y la terminología clave del original, pero sustituye calcos duros por español más natural: ''tener dominio propio'' en vez de repetir ''ejercitar dominio propio'', mejor orden sintáctico, y una formulación final más fluida. No hacen falta notas adicionales porque no se introduce nueva ambigüedad ni se pierde información preservada por el inglés POB.'
