  text: “Do these not seem to you to be evil?” “Very evil,” I say, “for the slaves of God.” “From all these the one who serves God must exercise self‑control. Exercise self‑control, then, from all these, that you may live to God and be enrolled with those who exercise self‑control from them. These, then, are the things from which you must exercise self‑control.
translation:
  language: es
  text: «¿No te parecen malas estas cosas?» «Muy malas», digo yo, «para los esclavos de Dios». «En todas estas cosas, el que sirve a Dios debe tener dominio propio. Ten, pues, dominio propio en todas estas cosas, para que vivas para Dios y seas inscrito con los que tienen dominio propio en cuanto a ellas. Estas, pues, son las cosas en las que debes tener dominio propio»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κακά
  english_pob_choice: evil
  chosen_spanish: malas
  alternatives_spanish:
  - malvadas
  - malas cosas
  lexicon: κακός
  rationale: En este contexto la pregunta evalúa conductas/realidades moralmente negativas. 'Malas' conserva la valoración moral sin introducir un tono más fuerte que el griego exige; 'malvadas' sería posible, pero en español suena más intensificado y personal.
- source_word: δοῦλοι τοῦ θεοῦ
  english_pob_choice: slaves of God
  chosen_spanish: esclavos de Dios
  alternatives_spanish:
  - siervos de Dios
  - servidores de Dios
  lexicon: δοῦλος
  rationale: Se mantiene la fuerza lexical de δοῦλος como 'esclavos', coherente con la elección auditada del inglés POB. 'Siervos' suavizaría el término y perdería la tensión social y teológica del original.
- source_word: ἐγκρατεύεσθαι
  english_pob_choice: exercise self-control
  chosen_spanish: ejercitar dominio propio
  alternatives_spanish:
  - tener dominio propio
  - practicar autocontrol
  lexicon: ἐγκρατεύομαι
  rationale: '''Ejercitar dominio propio'' conserva el carácter activo y reiterado del verbo mejor que un sustantivo abstracto. ''Autocontrol'' es claro, pero menos verbal y menos cercano al mandato repetido del pasaje.'
- source_word: ζήσεσθε τῷ θεῷ
  english_pob_choice: live to God
  chosen_spanish: vivas para Dios
  alternatives_spanish:
  - vivan para Dios
  - vivas a Dios
  lexicon: ζάω + dative
  rationale: La dative con sentido direccional/relacional se expresa naturalmente en español con 'para Dios'. Se conserva la idea de orientación de la vida sin forzar una fórmula extraña.
- source_word: ἀπογράφῃ
  english_pob_choice: be enrolled
  chosen_spanish: seas inscrito
  alternatives_spanish:
  - seas registrado
  - seas apuntado
  lexicon: ἀπογράφω
  rationale: '''Inscrito'' reproduce bien la imagen de registro oficial presente en el verbo; ''registrado'' también sería posible, pero ''inscrito'' es más solemne y idiomático en este contexto.'
theological_decisions:
- issue: Autodenominación de los creyentes como propiedad de Dios
  english_pob_reading: slaves of God
  chosen_spanish_reading: esclavos de Dios
  alternative_spanish_readings:
  - siervos de Dios
  rationale: La traducción conserva la dureza y la relación de pertenencia del término, sin sustituirlo por un eufemismo. Esto mantiene la tensión teológica del texto sobre obediencia y pertenencia.
  doctrine_reference: Doctrina de la pertenencia total al Señor; cf. lenguaje de esclavitud/servicio en pasajes paulinos
- issue: Finalidad ética del dominio propio
  english_pob_reading: that you may live to God and be enrolled with those who exercise self-control from them
  chosen_spanish_reading: para que vivas para Dios y seas inscrito con los que ejercitan dominio propio respecto de ellas
  alternative_spanish_readings:
  - para que vivas para Dios y seas contado con los que se dominan en estas cosas
  - para que vivas para Dios y quedes registrado con los que se abstienen de ellas
  rationale: Se preserva tanto la meta positiva ('vivir para Dios') como la dimensión de pertenencia/inscripción. 'Con respecto de ellas' deja claro que el dominio propio se ejerce frente a 'estas cosas', evitando ambigüedad.
  doctrine_reference: Santificación práctica y perseverancia ética
translation_notes:
  revision_awareness: No se documentan revisiones aplicadas en el paquete auditado; la redacción española sigue directamente la lectura inglesa POB y el griego subyacente, con ajustes de naturalidad propios del español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la política general del proyecto cuando aparezca el nombre divino explícito; aquí no aparece.
  - Se conserva 'esclavos' por la decisión léxica documentada para δοῦλος.
  - Se usa 'dominio propio' para mantener la repetición verbal y el registro sobrio del pasaje.
  - Se prefiere 'inscrito' como equivalente formal de un registro oficial.
  - La puntuación conserva la alternancia interrogativa-directa del diálogo, en un estilo publicable y claro.
