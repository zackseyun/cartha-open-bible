revisions:
- from: '«Hazme saber, Señor», digo, «con respecto a qué cosas uno debe ejercitar el dominio propio, y con respecto a cuáles no». «Escucha», dice: «Ejercita el dominio propio respecto de lo malo y no lo hagas; pero no ejerzas el dominio propio respecto de lo bueno; más bien, hazlo. Porque, si ejercitas el dominio propio para no hacer el bien, cometes un gran pecado; pero si ejercitas el dominio propio para no hacer lo malo, realizas una gran justicia. Por tanto, ejercita el dominio propio apartándote de toda maldad, haciendo el bien».'
  to: '«Hazme saber, Señor», digo, «con respecto a qué cosas uno debe ejercer dominio propio, y con respecto a cuáles no». «Escucha», dice: «Ejerce dominio propio en cuanto a lo malo, y no lo hagas; pero no ejerzas dominio propio en cuanto a lo bueno; más bien, hazlo. Porque, si ejerces dominio propio para no hacer el bien, cometes un gran pecado; pero si ejerces dominio propio para no hacer lo malo, realizas una gran justicia. Por tanto, ejerce dominio propio contra toda maldad, haciendo el bien».'
  rationale: 'La revisión es menor y no doctrinal: se conserva toda la terminología central del POB, pero se mejora la naturalidad del español y la cercanía a la estructura exhortativa del griego, especialmente en la frase final.'
