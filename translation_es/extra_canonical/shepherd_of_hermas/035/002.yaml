base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/035/002.yaml
  text: '“Make it known to me, Lord,” I say, “with respect to what things one must exercise self‑control, and with respect to what things one must not.” “Listen,” he says: “Exercise self‑control with regard to what is evil and do not do it; but do not exercise self‑control with regard to what is good—rather, do it. For if you exercise self‑control so as not to do the good, you commit a great sin; but if you exercise self‑control so as not to do what is evil, you accomplish great righteousness. Therefore exercise self‑control from every wickedness, doing the good.”'
translation:
  language: es
  text: '«Hazme saber, Señor», digo, «con respecto a qué cosas uno debe ejercer dominio propio, y con respecto a cuáles no». «Escucha», dice: «Ejerce dominio propio en cuanto a lo malo, y no lo hagas; pero no ejerzas dominio propio en cuanto a lo bueno; más bien, hazlo. Porque, si ejerces dominio propio para no hacer el bien, cometes un gran pecado; pero si ejerces dominio propio para no hacer lo malo, realizas una gran justicia. Por tanto, ejerce dominio propio contra toda maldad, haciendo el bien».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - Dueño
  lexicon: κύριος
  rationale: Aunque el proyecto prefiere Yahvé para el nombre divino, aquí el hablante se dirige al interlocutor celestial del relato; en español, «Señor» conserva la relación reverencial y el valor vocativo de la traducción inglesa sin forzar una decisión sobre el nombre propio divino en esta escena.
- source_word: ἐγκρατεύεσθαι
  english_pob_choice: exercise self-control
  chosen_spanish: ejercitar el dominio propio
  alternatives_spanish:
  - practicar el autocontrol
  - ejercer la continencia
  lexicon: ἐγκρατεύομαι
  rationale: «Dominio propio» comunica con precisión la disciplina moral exigida por el verbo, y «ejercitar» conserva el matiz de práctica activa repetida. Se evita «autocontrol» por ser menos estable en registro bíblico y «continencia» por sonar más restringido sexualmente en español.
- source_word: τὸ κακόν
  english_pob_choice: what is evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo perverso
  lexicon: κακός
  rationale: La forma neutra del griego pide una sustantivación amplia. «Lo malo» preserva el valor general y evita sobrecargar con una abstracción más metafísica que el contexto exige.
- source_word: τὸ καλόν
  english_pob_choice: what is good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - el bien
  - lo recto
  lexicon: καλός
  rationale: «Lo bueno» mantiene el paralelo directo con «lo malo» y refleja el contraste ético práctico del pasaje. «El bien» también sería posible, pero en español aquí sonaría más abstracto y menos paralelo a la sintaxis del griego.
- source_word: ἀμαρτίαν μεγάλην
  english_pob_choice: a great sin
  chosen_spanish: un gran pecado
  alternatives_spanish:
  - un pecado grande
  - un grave pecado
  lexicon: ἁμαρτία
  rationale: Se conserva la valoración fuerte del original. «Gran pecado» sigue de cerca la construcción y mantiene el peso moral del texto.
- source_word: δικαιοσύνην μεγάλην
  english_pob_choice: great righteousness
  chosen_spanish: una gran justicia
  alternatives_spanish:
  - una gran rectitud
  - una gran justicia/rectitud
  lexicon: δικαιοσύνη
  rationale: Se mantiene «justicia» por la fuerza legal y moral de δικαιοσύνη y para reflejar la elección inglesa de POB. En este contexto no se suaviza a «rectitud», porque el contraste con «pecado» y la fuerza evaluativa del pasaje favorecen el término jurídico-moral.
- source_word: ἀπὸ πάσης πονηρίας
  english_pob_choice: from every wickedness
  chosen_spanish: apartándote de toda maldad
  alternatives_spanish:
  - de toda perversidad
  - de toda iniquidad
  lexicon: πονηρία
  rationale: El griego expresa separación o alejamiento de la maldad. «Apartándote de» reproduce bien el movimiento implícito y «maldad» es el equivalente natural y amplio en español.
- source_word: ἀγαθουργῶν
  english_pob_choice: doing the good
  chosen_spanish: haciendo el bien
  alternatives_spanish:
  - practicando lo bueno
  - obrando el bien
  lexicon: ἀγαθοεργέω
  rationale: «Haciendo el bien» es idiomático y conserva el paralelismo con «no hacer el bien». También mantiene la continuidad entre la idea y la acción moral concreta.
theological_decisions:
- issue: Contraste entre abstenerse del mal y abstenerse del bien
  english_pob_reading: Do not exercise self-control with regard to what is good—rather, do it... if you exercise self-control so as not to do the good, you commit a great sin
  chosen_spanish_reading: No ejercer el dominio propio respecto de lo bueno, sino hacerlo; abstenerse del bien constituye un gran pecado
  alternative_spanish_readings:
  - no reprimirse ante lo bueno
  - no contenerse respecto de lo bueno
  rationale: 'Se preserva la tensión moral del texto: el mismo autocontrol que es virtuoso respecto del mal se vuelve culpable cuando frena el bien. No se atenúa la paradoja, porque es central para el mandato.'
  doctrine_reference: Ética cristiana; discernimiento moral; obediencia activa al bien
- issue: Valor de δικαιοσύνη en el final de la exhortación
  english_pob_reading: you accomplish great righteousness
  chosen_spanish_reading: realizas una gran justicia
  alternative_spanish_readings:
  - obras una gran rectitud
  - cumples una gran justicia
  rationale: Se mantiene la formulación sustantiva fuerte para reflejar que el cumplimiento del bien produce un resultado moral real, no solo una actitud interna. Esto conserva el contraste con «gran pecado».
  doctrine_reference: Justicia/rectitud como fruto de la obediencia
- issue: Destino del llamado a la autocontención
  english_pob_reading: exercise self-control from every wickedness, doing the good
  chosen_spanish_reading: ejercita el dominio propio apartándote de toda maldad, haciendo el bien
  alternative_spanish_readings:
  - domínate en toda maldad, practicando el bien
  - guarda el dominio propio contra toda maldad, obrando el bien
  rationale: La frase final combina separación del mal con práctica positiva del bien. La traducción conserva ambas mitades sin convertir el cierre en una exhortación meramente negativa.
  doctrine_reference: Santificación práctica; ética de la acción
translation_notes:
  revision_awareness: No se registran revisiones previas aplicadas en el paquete; la versión española se alinea directamente con el texto griego normalizado y el tono óptimo-equivalente del POB en inglés.
  spanish_consistency_notes:
  - Se mantiene el vocativo reverencial «Señor» para el interlocutor, sin introducir «Yahvé» en un pasaje donde el inglés POB ya opta por «Lord» y el contexto narrativo no exige el nombre divino explícito.
  - Se conserva el paralelismo léxico entre «lo malo» y «lo bueno» para reflejar el contraste del original y facilitar la lectura oral.
  - Se usa «dominio propio» de forma consistente para ἐγκράτεια/ἐγκρατεύεσθαι en este registro, evitando alternar con sinónimos que diluyan el vínculo semántico.
