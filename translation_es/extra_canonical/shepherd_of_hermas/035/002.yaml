review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB inglés: la paradoja moral de ejercer continencia respecto del mal pero no respecto del bien está preservada, así como el contraste entre gran pecado y gran justicia. Sin embargo, en la clausula final «ejercita el dominio propio apartándote de toda maldad» se aleja levemente de la construcción fuente, que mantiene ἐγκρατεύου como llamado principal y luego añade la separación del mal y la práctica del bien. Una formulación más directa en español mejora la fidelidad sintáctica y la claridad.'
  spanish_quality_summary: 'El español es claro y digno, pero «ejercitar el dominio propio» suena algo pesado por repetición. Dado que el inglés auditado usa consistentemente «exercise self-control», conviene conservarlo, pero con un pequeño ajuste final para que la exhortación suene más natural: «Ejerce dominio propio contra toda maldad, haciendo el bien». También conviene evitar la secuencia algo forzada «respecto de lo malo y no lo hagas» cambiándola a «en cuanto a lo malo, no lo hagas» en la revisión completa.'
  glossary_alignment: 'La terminología clave está mayormente alineada: «Señor» para κύριε es defendible en este contexto no canónico; «dominio propio» refleja bien ἐγκρατεύεσθαι; «lo malo / lo bueno» conserva el contraste neutro; «gran pecado» y «gran justicia» siguen el POB. No hay conflicto con las preferencias de Yahvé/Mesías relevantes aquí.'
  issues:
  - severity: medium
    issue: 'Cláusula final demasiado perifrástica: «apartándote de toda maldad»'
    rationale: Aunque capta ἀπὸ πάσης πονηρίας, la redacción desplaza el foco del imperativo principal y suena más interpretativa que el original. Una formulación como «contra toda maldad» o «de toda maldad» conserva mejor la exhortación a la continencia.
  - severity: low
    issue: Ligera pesadez estilística en repeticiones de «ejercitar el dominio propio»
    rationale: No es infiel, pero en español la repetición completa del sintagma varias veces endurece la lectura. Mantener la terminología POB es correcto, pero puede aligerarse con ajustes sintácticos sin perder precisión.
  - severity: low
    issue: «respecto de lo malo y no lo hagas» es comprensible pero poco idiomático
    rationale: La combinación del abstracto «lo malo» con el pronombre objeto «lo» resulta algo rígida. Reordenar la frase mejora la naturalidad sin alterar el sentido.
  revised_spanish_text: '«Hazme saber, Señor», digo, «con respecto a qué cosas uno debe ejercer dominio propio, y con respecto a cuáles no». «Escucha», dice: «Ejerce dominio propio en cuanto a lo malo, y no lo hagas; pero no ejerzas dominio propio en cuanto a lo bueno; más bien, hazlo. Porque, si ejerces dominio propio para no hacer el bien, cometes un gran pecado; pero si ejerces dominio propio para no hacer lo malo, realizas una gran justicia. Por tanto, ejerce dominio propio contra toda maldad, haciendo el bien».'
  revision_rationale: 'La revisión es menor y no doctrinal: se conserva toda la terminología central del POB, pero se mejora la naturalidad del español y la cercanía a la estructura exhortativa del griego, especialmente en la frase final.'
