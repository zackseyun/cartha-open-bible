revisions:
- from: “¿Te parecen estas cosas buenas?” “¿Qué hay mejor, Señor, que estas?” digo. “Ve, pues”, dice él, “camina en ellas y no te abstengas de ellas, y vivirás para Dios.”
  to: “¿Te parecen buenas estas cosas?” “¿Qué hay mejor, Señor, que estas?”, digo. “Ve, pues —dice él—, camina en ellas y no te contengas respecto de ellas, y vivirás para Dios.”
  rationale: Se ajusta levemente el orden a «¿Te parecen buenas estas cosas?» para mayor naturalidad, se normaliza la puntuación del inciso de habla, y se reemplaza «no te abstengas de ellas» por «no te contengas respecto de ellas» para reflejar mejor ἐγκρατεύου ἀπ’ αὐτῶν sin introducir una paráfrasis amplia ni una lectura doctrinal nueva.
