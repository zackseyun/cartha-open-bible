  yaml_path: translation/extra_canonical/shepherd_of_hermas/035/011.yaml
  text: “Do these seem to you to be good?” “What, Lord, is better than these?” I say. “Go, then,” he says, “walk in them and do not exercise self‑control from them, and you will live to God.
translation:
  language: es
  text: “¿Te parecen buenas estas cosas?” “¿Qué hay mejor, Señor, que estas?”, digo. “Ve, pues —dice él—, camina en ellas y no te contengas respecto de ellas, y vivirás para Dios.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καλά / ἀγαθά (implicit in English 'good')
  english_pob_choice: good
  chosen_spanish: buenas
  alternatives_spanish:
  - buenas
  - buenas cosas
  - buenas en sí
  lexicon: —
  rationale: El interrogativo valora las acciones o mandatos como ‘buenos’; en español, ‘buenas’ conserva la evaluación moral sin sobreactuar el sustantivo implícito.
- source_word: τί ... βέλτιον
  english_pob_choice: What ... is better than these?
  chosen_spanish: ¿Qué hay mejor ... que estas?
  alternatives_spanish:
  - ¿Qué es mejor que estas?
  - ¿Qué cosa es mejor que estas?
  lexicon: —
  rationale: ‘¿Qué hay mejor...?’ suena natural en español y conserva la comparación retórica del griego/inglés sin añadir una glosa explicativa.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor
  - Dueño
  - Maestro
  lexicon: —
  rationale: En este diálogo directo, ‘Señor’ mantiene la forma reverente estándar y corresponde al tratamiento del interlocutor en la versión inglesa.
- source_word: πορεύου
  english_pob_choice: Go, then
  chosen_spanish: Ve, pues
  alternatives_spanish:
  - Anda, pues
  - Ve entonces
  lexicon: —
  rationale: Imperativo breve y natural en español; ‘pues’ reproduce la inferencia exhortativa del griego y del inglés.
- source_word: περιπάτει ἐν αὐτοῖς
  english_pob_choice: walk in them
  chosen_spanish: camina en ellas
  alternatives_spanish:
  - anda en ellas
  - vive conforme a ellas
  lexicon: —
  rationale: ‘Camina en ellas’ conserva la metáfora moral de conducta continua y resulta idiomática en español bíblico contemporáneo.
- source_word: ἐγκρατεύου ἀπ’ αὐτῶν
  english_pob_choice: do not exercise self-control from them
  chosen_spanish: no te abstengas de ellas
  alternatives_spanish:
  - no te contengas de ellas
  - no ejerzas dominio propio lejos de ellas
  lexicon: —
  rationale: La frase inglesa refleja una construcción difícil; en español, ‘no te abstengas de ellas’ comunica la prohibición de apartarse/contenerse respecto de estas prácticas, manteniendo la tensión lexical sin forzar una paráfrasis extensa.
- source_word: ζήσῃ τῷ θεῷ
  english_pob_choice: you will live to God
  chosen_spanish: vivirás para Dios
  alternatives_spanish:
  - vivirás para Dios
  - vivirás a Dios
  - vivirás delante de Dios
  lexicon: —
  rationale: ‘Para Dios’ expresa de forma clara la orientación de la vida hacia Dios y conserva la idea relacional del dativo sin tecnicismos innecesarios.
theological_decisions:
- issue: Modo de dirigirse al interlocutor celestial
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor
  - Dueño
  - Maestro
  rationale: Se preserva el tratamiento reverente del diálogo visionario sin introducir una identificación explícita con un título cristológico que el pasaje no exige.
  doctrine_reference: Cristología / tratamiento reverente en literatura cristiana antigua
- issue: Expresión final de orientación vital
  english_pob_reading: you will live to God
  chosen_spanish_reading: vivirás para Dios
  alternative_spanish_readings:
  - vivirás para Dios
  - vivirás a Dios
  - vivirás delante de Dios
  rationale: La formulación española mantiene el sentido de vida orientada a Dios sin resolver en exceso la preposición del dativo, que puede abarcar dirección, pertenencia y referencia relacional.
  doctrine_reference: Vida piadosa / orientación ética hacia Dios
translation_notes:
  revision_awareness: No se informan revisiones aplicadas en el paquete de auditoría. La redacción española sigue de cerca la equivalencia óptima del inglés POB y atiende directamente al griego subyacente, especialmente en la comparación retórica y en la frase final con dativo.
  spanish_consistency_notes:
  - Se usa ‘Señor’ como vocativo reverente.
  - Se conserva la metáfora moral de ‘camina en ellas’.
  - Se evita ‘dominio propio’ porque el texto inglés aquí opta por una formulación extraña que conviene reflejar con una prohibición sencilla y fiel.
  - Se mantiene ‘Dios’ sin mayúsculas especiales adicionales fuera del uso normal en español.
  - No se añaden notas textuales porque el paquete no presenta variantes ni notas auditadas.
