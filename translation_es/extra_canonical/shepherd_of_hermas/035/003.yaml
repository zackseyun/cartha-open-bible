revisions:
- from: '«¿Qué clases, Señor —digo yo—, son las maldades de las que debemos ejercer dominio propio?» «Escucha», dice él: «De la adulterio y de la fornicación, de la embriaguez desenfrenada, del lujo disoluto, de los muchos manjares, de la extravagancia de las riquezas, y del jactarse y la altivez y la arrogancia, y de la mentira y la calumnia y la hipocresía, el resentimiento y toda blasfemia.»'
  to: '«¿Qué clases de maldades, Señor —digo yo—, son aquellas de las que debemos ejercer dominio propio?» «Escucha», dice él: «Del adulterio y de la fornicación, de la embriaguez desenfrenada, del lujo disoluto, de los muchos manjares, de la extravagancia de las riquezas, de la jactancia, de la altivez, de la arrogancia, de la mentira, de la calumnia, de la hipocresía, del resentimiento y de toda blasfemia.»'
