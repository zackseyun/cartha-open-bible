base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/035/003.yaml
  text: '“What kinds, Lord,” I say, “are the wickednesses from which we must exercise self‑control?” “Listen,” he says: “From adultery and fornication, from lawless drunkenness, from wicked luxury, from many foods and the extravagance of wealth and boasting and haughtiness and arrogance, and from lying and slander and hypocrisy, resentment, and every blasphemy.'
translation:
  language: es
  text: '«¿Qué clases de maldades, Señor —digo yo—, son aquellas de las que debemos ejercer dominio propio?» «Escucha», dice él: «Del adulterio y de la fornicación, de la embriaguez desenfrenada, del lujo disoluto, de los muchos manjares, de la extravagancia de las riquezas, de la jactancia, de la altivez, de la arrogancia, de la mentira, de la calumnia, de la hipocresía, del resentimiento y de toda blasfemia.»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ποῖαι ... κακίαι
  english_pob_choice: What kinds ... wickednesses
  chosen_spanish: ¿Qué clases ... maldades?
  alternatives_spanish:
  - ¿Qué tipos ... maldades?
  - ¿Cuáles ... maldades?
  lexicon: ποῖος; κακία
  rationale: “Clases” conserva el matiz de categorías o tipos, y “maldades” mantiene el plural moral fuerte del inglés POB sin suavizarlo a ‘pecados’.
- source_word: ἐγκρατευόμεθα
  english_pob_choice: exercise self-control
  chosen_spanish: ejercer dominio propio
  alternatives_spanish:
  - practicar la templanza
  - ejercer autocontrol
  lexicon: ἐγκρατεύομαι
  rationale: “Dominio propio” es una formulación natural en español e igualmente fiel al sentido de autocontrol moral; evita un calco pesado y preserva la acción exhortativa.
- source_word: μοιχεία
  english_pob_choice: adultery
  chosen_spanish: adulterio
  alternatives_spanish:
  - infidelidad conyugal
  - adulterio matrimonial
  lexicon: μοιχεία
  rationale: Término jurídico-moral directo y estándar en español bíblico.
- source_word: πορνεία
  english_pob_choice: fornication
  chosen_spanish: fornicación
  alternatives_spanish:
  - inmoralidad sexual
  - impureza sexual
  lexicon: πορνεία
  rationale: Se conserva ‘fornicación’ por su correspondencia histórica y lexical con el término griego, y porque el texto enumera vicios concretos sin expandirlos.
- source_word: ἀκρασία μεθύης / lawless drunkenness
  english_pob_choice: lawless drunkenness
  chosen_spanish: embriaguez desenfrenada
  alternatives_spanish:
  - embriaguez sin ley
  - borrachera desenfrenada
  lexicon: ἀκρασία; μέθη
  rationale: ‘Desenfrenada’ refleja el carácter desmedido y desordenado que el inglés POB expresa con ‘lawless’, manteniendo una formulación idiomática en español.
- source_word: τὸν τρυφὴν ἄνομον / wicked luxury
  english_pob_choice: wicked luxury
  chosen_spanish: lujo disoluto
  alternatives_spanish:
  - lujo perverso
  - lujo impío
  lexicon: τρυφή; ἄνομος
  rationale: ‘Disoluto’ expresa bien una vida de lujo moralmente corrupta, cercana al tono del inglés sin requerir una explicación perifrástica.
- source_word: πολλὰ βρώματα
  english_pob_choice: many foods
  chosen_spanish: los muchos manjares
  alternatives_spanish:
  - muchos alimentos
  - excesos en la comida
  lexicon: βρῶμα
  rationale: ‘Manjares’ transmite mejor la idea de abundancia/deleite en la comida que ‘alimentos’, y encaja con la serie de excesos ascéticos del pasaje.
- source_word: πλοῦτος καύχησις ὑπερηφανία ἀλαζονεία
  english_pob_choice: the extravagance of wealth and boasting and haughtiness and arrogance
  chosen_spanish: la extravagancia de las riquezas, y del jactarse y la altivez y la arrogancia
  alternatives_spanish:
  - el despilfarro de las riquezas, y la jactancia y la altivez y la arrogancia
  - la ostentación de las riquezas, y la jactancia, la altivez y la arrogancia
  lexicon: πλοῦτος; καύχησις; ὑπερηφανία; ἀλαζονεία
  rationale: Se conserva la estructura enumerativa y el peso moral de los sustantivos. ‘Extravagancia de las riquezas’ sigue de cerca la lectura del inglés POB y evita reducir el problema solo al ‘despilfarro’.
- source_word: ψεῦδος καὶ συκοφαντία ὑπόκρισις
  english_pob_choice: lying and slander and hypocrisy
  chosen_spanish: la mentira y la calumnia y la hipocresía
  alternatives_spanish:
  - la falsedad y la calumnia y la hipocresía
  - la mentira, la difamación y la hipocresía
  lexicon: ψεῦδος; συκοφαντία; ὑπόκρισις
  rationale: ‘Calumnia’ es la opción más natural para συκοφαντία en español eclesial y conserva el sentido de acusación falsa o dañina.
- source_word: μνησικακία
  english_pob_choice: resentment
  chosen_spanish: el resentimiento
  alternatives_spanish:
  - el rencor
  - la amargura
  lexicon: μνησικακία
  rationale: ‘Resentimiento’ es idiomático y abarca la retención de ofensa implícita en el término griego, sin introducir un matiz psicológico más fuerte que el texto no exige.
- source_word: βλασφημία
  english_pob_choice: every blasphemy
  chosen_spanish: toda blasfemia
  alternatives_spanish:
  - toda forma de blasfemia
  - toda palabra blasfema
  lexicon: βλασφημία
  rationale: Traducción directa y estable, manteniendo el cuantificador total ‘every’ como ‘toda’.
theological_decisions:
- issue: Enumerative vice list and ascetic moral force
  english_pob_reading: A list of specific wickednesses to be avoided in self-control
  chosen_spanish_reading: Una lista de maldades concretas que deben evitarse mediante el dominio propio
  alternative_spanish_readings:
  - Una lista de vicios concretos que deben evitarse mediante la templanza
  - Una lista de pecados concretos que deben evitarse mediante el autocontrol
  rationale: El pasaje funciona como una enumeración moral específica, no como una generalidad. ‘Dominio propio’ mantiene la exhortación ascética sin diluir la fuerza disciplinaria del texto.
  doctrine_reference: Ethics of sanctification / ascetic discipline in early Christian moral instruction
- issue: Whether to soften or preserve strong moral labels
  english_pob_reading: wickednesses; lawless drunkenness; wicked luxury; every blasphemy
  chosen_spanish_reading: maldades; embriaguez desenfrenada; lujo disoluto; toda blasfemia
  alternative_spanish_readings:
  - pecados; embriaguez excesiva; lujo mundano; cualquier blasfemia
  - vicios; borrachera; lujo desordenado; blasfemia
  rationale: Se preserva la intensidad moral del original y del inglés POB, evitando una neutralización estilística que disminuiría la gravedad de la exhortación.
  doctrine_reference: Moral theology / vice and virtue teaching
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; por tanto, el borrador español sigue de cerca la lectura auditada disponible y no introduce variantes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ por norma del proyecto cuando aparezca el nombre divino; aquí no hay ocurrencias.
  - Se conserva una enumeración paratáctica con repeticiones de ‘y’ para reflejar la cadencia del original y del inglés auditado.
  - Se ha preferido ‘dominio propio’ frente a ‘autocontrol’ por naturalidad eclesial en español, sin cambiar el sentido.
  - No se han añadido notas al pie porque el pasaje no exige variantes textuales ni alternativas lexemáticas obligatorias en este registro.
