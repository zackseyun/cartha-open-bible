base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/035/008.yaml
  text: “And of the good things, Lord,” I say, “declare to me their power, so that I may walk in them and serve them, that by practicing them I may be able to be saved.” “Listen,” he says, “also to the works of the good, which you must do and not exercise self‑control from.
translation:
  language: es
  text: «Y de las cosas buenas, Señor —digo yo—, declárame su poder, para que yo pueda andar en ellas y servirlas, de modo que, practicándolas, me sea posible ser salvo». «Escucha», dice él, «también las obras del bien, que debes hacer, y no abstenerte de ellas»[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «No abstenerte de ellas» sigue de cerca una lectura difícil del final del pasaje. También puede entenderse como «no contenerte de hacerlas» o «no apartarte de ellas».
    reason: alternative_reading
lexical_decisions:
- source_word: τῶν καλῶν / τὰ ἀγαθά
  english_pob_choice: good things / the good
  chosen_spanish: las cosas buenas / lo bueno
  alternatives_spanish:
  - los bienes
  - las obras buenas
  lexicon: calός / ἀγαθός
  rationale: El griego oscila entre la cualidad moral de «lo bueno» y el sustantivo concreto «las cosas buenas». En español, «las cosas buenas» mantiene el valor sustantivado inicial, mientras «lo bueno» reproduce la formulación más abstracta del segundo miembro sin forzar una sola opción.
- source_word: δύναμις
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - capacidad
  lexicon: δύναμις
  rationale: «Poder» conserva la amplitud semántica de δύναμις y encaja naturalmente con la petición de que se le declare su eficacia para vivir en ellas.
- source_word: πολιτεύεσθαι / περιπατεῖν
  english_pob_choice: walk in them
  chosen_spanish: andar en ellas
  alternatives_spanish:
  - caminar en ellas
  - vivir conforme a ellas
  lexicon: περιπατέω
  rationale: «Andar en ellas» es idiomático en español bíblico y conserva la imagen de conducta o modo de vida sin volverla demasiado explicativa.
- source_word: δουλεύειν
  english_pob_choice: serve them
  chosen_spanish: servirles
  alternatives_spanish:
  - ser esclavo de ellas
  - estar al servicio de ellas
  lexicon: δουλεύω
  rationale: Aquí el verbo expresa servicio respecto de las cosas buenas. Como el objeto son cualidades/obras, «servirles» comunica mejor la relación requerida que «esclavo», que sería demasiado chocante y menos natural en este contexto.
- source_word: ποιεῖν
  english_pob_choice: doing / practicing them
  chosen_spanish: practicándolas
  alternatives_spanish:
  - haciéndolas
  - poniéndolas por obra
  lexicon: ποιέω
  rationale: «Practicándolas» recoge el aspecto repetido y habitual de la acción; en español, sugiere ejercicio continuo de las virtudes o obras buenas.
- source_word: σωθῆναι
  english_pob_choice: be saved
  chosen_spanish: ser salvo
  alternatives_spanish:
  - ser salvado
  - alcanzar salvación
  lexicon: σῴζω
  rationale: «Ser salvo» preserva la formulación tradicional y la pasividad del infinitivo aoristo, sin añadir una explicación soteriológica no explicitada por el texto.
- source_word: τὰ ἔργα τῶν καλῶν
  english_pob_choice: the works of the good
  chosen_spanish: las obras de lo bueno
  alternatives_spanish:
  - las obras buenas
  - las obras del bien
  lexicon: ἔργον + καλός
  rationale: Conserva la construcción sustantivada del original y evita reducirla prematuramente a un adjetivo simple. «De lo bueno» mantiene la referencia al dominio o cualidad de origen.
- source_word: ἀπέχεσθαι
  english_pob_choice: not exercise self-control from
  chosen_spanish: no abstenerte de ellas
  alternatives_spanish:
  - no contenerte de ellas
  - no privarte de ellas
  lexicon: ἀπέχομαι
  rationale: La frase inglesa es un poco enigmática y parece reflejar un griego con sentido de abstenerse/contenerse. En español, «abstenerte de ellas» conserva esa tensión y se entiende como negativa a apartarse de las obras buenas.
theological_decisions:
- issue: Relación entre obrar el bien y la salvación
  english_pob_reading: by practicing them I may be able to be saved
  chosen_spanish_reading: de modo que, practicándolas, me sea posible ser salvo
  alternative_spanish_readings:
  - para que al practicarlas pueda salvarme
  - para que, al hacerlas, pueda ser salvo
  rationale: La redacción mantiene la dependencia de la salvación respecto del ejercicio de las obras buenas, tal como aparece en la fuente, sin suavizarla hacia una sola formulación doctrinal moderna.
  doctrine_reference: Soteriología; cooperación moral en el lenguaje del texto patrístico
- issue: Ambigüedad de «the good» / «the works of the good»
  english_pob_reading: the good / the works of the good
  chosen_spanish_reading: lo bueno / las obras de lo bueno
  alternative_spanish_readings:
  - el bien / las obras del bien
  - las cosas buenas / las obras buenas
  rationale: Se preserva la tensión entre lo cualitativo y lo sustantivado. Esto evita cerrar prematuramente el sentido y refleja la oscilación del original entre cualidad moral y acciones concretas.
  doctrine_reference: Ética cristiana; forma nominal del bien
- issue: Valor de «serve them» respecto de las cosas buenas
  english_pob_reading: serve them
  chosen_spanish_reading: servirles
  alternative_spanish_readings:
  - estar al servicio de ellas
  - obedecerlas
  rationale: No se introduce un objeto personal inexistente. Se conserva la idea de dedicación/servicio a las cosas buenas como práctica continua.
  doctrine_reference: Discipulado y obediencia moral
translation_notes:
  revision_awareness: El contexto inglés ya había resuelto el pasaje con una traducción de equivalencia óptima y sin notas. La redacción española sigue esa línea, pero explicita en nota la dificultad del final, donde el griego parece condensar una idea de abstención/contención que en español admite más de una lectura. No se detectaron revisiones aplicadas en el paquete.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este pasaje no contiene el nombre divino.
  - Se usa «ser salvo» para conservar la forma pasiva y la sobriedad soteriológica del original.
  - Se evita «Cristo» o terminología cristológica porque el pasaje no la contiene.
  - La nota al pie marca solo la última cláusula, donde el español necesita aclarar la ambigüedad de la expresión equivalente a ἀπέχεσθαι.
