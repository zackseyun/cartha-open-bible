  to: «Y de las cosas buenas, Señor —digo yo—, declárame su poder, para que yo pueda andar en ellas y servirlas, de modo que, practicándolas, me sea posible ser salvo». «Escucha», dice él, «también las obras del bien, que debes hacer, y no abstenerte de ellas»[a].
  rationale: Se cambia únicamente «las obras de lo bueno» por «las obras del bien» para lograr un español más natural y claro sin perder el matiz abstracto del original ni la lógica del audit trail inglés. También se ajusta «servirles» a «servirlas» para concordar mejor con «las cosas buenas» en español estándar.
