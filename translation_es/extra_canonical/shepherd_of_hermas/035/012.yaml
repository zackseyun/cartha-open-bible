review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura parenética, el paralelismo entre hacer el bien y no hacer el mal, y la repetición de «vivir para Dios». Sin embargo, en la primera cláusula condicional introduce el sentido opuesto al inglés POB y al griego auditado: «no te abstienes de hacerlo» significa que no te privas de hacer el bien, mientras que el original/POB dice «do not exercise self-control from it», es decir, no te abstengas del bien. La segunda mitad («no haces el mal y te abstienes de él») sí refleja correctamente la idea de abstenerse del mal.'
  spanish_quality_summary: El español es claro y digno, con buen ritmo y registro eclesial legible. No obstante, la formulación «no te abstienes de hacerlo» desorienta semánticamente y rompe el paralelismo conceptual con la segunda rama. Conviene reparar esa cláusula para expresar de forma natural que uno no debe abstenerse del bien. También conviene armonizar el cierre final con el singular inclusivo del inglés («whoever keeps...»), aunque el plural actual no es grave.
  glossary_alignment: '«mandamiento», «el bien», «vivir para Dios», «guardar» y «andar en» están bien alineados con las decisiones del proyecto y con la evidencia. El problema está en la decisión para ἐγκρατεύεσθαι en la primera rama: la glosa elegida en español no preserva el valor de abstenerse/restringirse respecto del bien, sino su negación práctica inversa.'
  issues:
  - severity: high
    issue: La primera condición invierte el sentido de la exhortación.
    rationale: «Si haces el bien y no te abstienes de hacerlo» afirma que uno efectivamente hace el bien; pero el texto auditado dice «If you do the good and do not exercise self-control from it», o sea, no te abstengas del bien / no te prives de hacer el bien. La redacción actual no expresa la tensión verbal del original y suaviza la lógica del mandato.
  - severity: medium
    issue: La decisión léxica documentada para ἐγκρατεύεσθαι no coincide con su ejecución contextual en la primera rama.
    rationale: 'La racionalización habla de abstinencia práctica, pero la frase española construida con negación produce el efecto contrario. Hace falta una redacción que preserve la simetría: hacer el bien sin abstenerse de él / no hacer el mal y abstenerse de él.'
  - severity: low
    issue: El cierre «los que guardan...» puede expresarse con un relativo singular inclusivo.
    rationale: El inglés POB termina con «whoever keeps these commandments and walks in them». El plural es comprensible, pero «quien guarda...» reproduce mejor la generalización individual del cierre sin afectar la naturalidad.
  revised_spanish_text: 'Por tanto, guarda este mandamiento. Si haces el bien y no te abstienes de él, vivirás para Dios; y todos los que actúan de este modo vivirán para Dios. Y de nuevo, si no haces el mal y te abstienes de él, vivirás para Dios; y todos vivirán para Dios: quien guarda estos mandamientos y anda en ellos.'
  revision_rationale: Se corrige la primera cláusula para que exprese fielmente la idea de no abstenerse del bien, en vez de sugerir simplemente que uno sigue haciéndolo. También se ajusta el cierre a «quien guarda...» para reflejar mejor el relativo inclusivo del POB sin perder naturalidad en español.
