  yaml_path: translation/extra_canonical/shepherd_of_hermas/035/012.yaml
  text: “Therefore keep this commandment. If you do the good and do not exercise self‑control from it, you will live to God—and all who act in this way will live to God. And again, if you do not do the evil and exercise self‑control from it, you will live to God; and all will live to God—whoever keeps these commandments and walks in them.”
translation:
  language: es
  text: 'Por tanto, guarda este mandamiento. Si haces el bien y no te abstienes de él, vivirás para Dios; y todos los que actúan de este modo vivirán para Dios. Y de nuevo, si no haces el mal y te abstienes de él, vivirás para Dios; y todos vivirán para Dios: quien guarda estos mandamientos y anda en ellos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐντολή / commandment
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - comando
  - precepto
  - orden
  lexicon: mandamiento
  rationale: El griego del mandato conserva fuerza normativa; «mandamiento» es la equivalencia más natural y fiel en español bíblico sin convertirlo en un tono meramente jurídico ni en una orden militarizada.
- source_word: τὸ καλόν / the good
  english_pob_choice: the good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - la bondad
  - el acto bueno
  lexicon: bien
  rationale: «El bien» mantiene la sustantivación moral del original y suena más idiomático que una paráfrasis como «lo bueno» en este contexto de conducta ética.
- source_word: ἐγκρατεύεσθαι / exercise self-control
  english_pob_choice: exercise self-control
  chosen_spanish: te abstienes de hacerlo
  alternatives_spanish:
  - te ejerces dominio propio
  - te controlas
  - practicas dominio propio
  lexicon: abstinencia / dominio propio
  rationale: Aquí el contexto inmediato no habla de autocontrol psicológico en abstracto, sino de no hacer incluso el bien para ganar mérito; por eso «te abstienes de hacerlo» refleja el matiz práctico del verbo sin introducir una formulación demasiado técnica o devocional.
- source_word: ζήσεσθε τῷ θεῷ / you will live to God
  english_pob_choice: you will live to God
  chosen_spanish: vivirás para Dios
  alternatives_spanish:
  - vivirás para Dios
  - vivirás a Dios
  - vivirás de cara a Dios
  lexicon: vivir para Dios
  rationale: «Vivir para Dios» expresa el dativo de dirección/relación con naturalidad en español y preserva la orientación ética y existencial del giro griego mejor que un calco literal.
- source_word: οἱ ἐντολὰς ταύτας τηρῶντες καὶ ἐν αὐταῖς περιπατοῦντες
  english_pob_choice: whoever keeps these commandments and walks in them
  chosen_spanish: los que guardan estos mandamientos y andan en ellos
  alternatives_spanish:
  - quien guarda estos mandamientos y anda en ellos
  - los que observan estos mandamientos y caminan en ellos
  lexicon: guardar / andar
  rationale: «Guardar» y «andar en» son equivalentes bíblicos estables para τηρέω y περιπατέω. Se conserva la imagen de una vida regulada por mandamientos sin sustituirla por una explicación abstracta.
theological_decisions:
- issue: Repetición de «vivir para Dios» como resultado de hacer el bien o no hacer el mal
  english_pob_reading: If you do the good... you will live to God... if you do not do the evil... you will live to God
  chosen_spanish_reading: Si haces el bien... vivirás para Dios... si no haces el mal... vivirás para Dios
  alternative_spanish_readings:
  - si haces el bien... vivirás para el Señor
  - si haces lo bueno... tendrás vida de Dios
  - si te abstienes del mal... vivirás para Dios
  rationale: 'Se conserva la misma promesa en ambas ramas del paralelismo, porque el texto enfatiza que tanto la práctica del bien como la renuncia al mal conducen a la misma orientación vital: vivir para Dios. No se suaviza ni se sustituye por una fórmula más interpretativa.'
  doctrine_reference: ética de obediencia y perseverancia en la literatura cristiana primitiva
- issue: Conservación del paralelismo exhortativo del pasaje
  english_pob_reading: Therefore keep this commandment... And again... whoever keeps these commandments and walks in them
  chosen_spanish_reading: Por tanto, guarda este mandamiento... Y de nuevo... los que guardan estos mandamientos y andan en ellos
  alternative_spanish_readings:
  - Así que cumple este mandamiento...
  - Por eso observa este precepto...
  rationale: El pasaje está construido como exhortación acumulativa. La traducción mantiene las repeticiones y la progresión para no diluir la fuerza retórica del original.
  doctrine_reference: parénesis cristiana primitiva
translation_notes:
  revision_awareness: No hay revisión previa registrada en el paquete. Se ha seguido el texto griego normalizado y el trasfondo de la versión inglesa POB como control de sentido, manteniendo el paralelismo y la terminología ética sin añadir explicaciones externas.
  spanish_consistency_notes:
  - Se mantuvo «Dios» en mayúscula como designación divina consistente con el proyecto.
  - Se usó «mandamiento» de manera uniforme para el singular y el plural, siguiendo el registro bíblico común y el valor normativo del pasaje.
  - Se evitó «SEÑOR» porque el texto fuente aquí no presenta κύριος ni una cita explícita del nombre divino.
