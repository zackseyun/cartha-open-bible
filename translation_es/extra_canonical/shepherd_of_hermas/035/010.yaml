base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/035/010.yaml
  text: '“Next, hear what follows these: to serve widows; to visit orphans and those in want; to redeem the slaves of God from distresses; to be hospitable (for in hospitality one sometimes finds an opportunity for doing good); to oppose no one; to be quiet; to become lower than all people; to honor the elderly; to practice righteousness; to preserve the brotherhood; to endure insult; to be long‑suffering; to have no resentment; to encourage those who are weary in soul; not to cast off those who have stumbled away from the faith, but to turn them back and make them cheerful; to admonish those who sin; not to oppress debtors and the needy; and if there is anything like these.'
translation:
  language: es
  text: '«Después, escucha lo que sigue a estas cosas: servir a las viudas; visitar a los huérfanos y a los necesitados; rescatar a los esclavos de Dios de las aflicciones; ser hospitalario[a] (porque en la hospitalidad a veces se encuentra una oportunidad para hacer el bien); no oponerse a nadie; ser apacible; hacerse menor que todos; honrar a los ancianos; practicar la justicia; preservar la hermandad; soportar el insulto; ser paciente; no guardar resentimiento; animar a los que están cansados en el alma; no rechazar a los que se han apartado de la fe, sino hacerlos regresar y animarlos; amonestar a los que pecan; no oprimir a los deudores ni a los necesitados; y si hay algo semejante a estas cosas.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘practicar la hospitalidad’. El griego puede expresar tanto la cualidad de ser hospitalario como el acto de recibir a otros con apertura.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλους τοῦ θεοῦ
  english_pob_choice: the slaves of God
  chosen_spanish: los esclavos de Dios
  alternatives_spanish:
  - los siervos de Dios
  - los servidores de Dios
  lexicon: δοῦλος
  rationale: El inglés POB eligió ‘slaves’ para conservar la fuerza léxica de δοῦλος. En español, ‘esclavos’ mantiene esa fuerza y evita suavizar el término a ‘siervos’, que perdería el peso semántico del original.
- source_word: φιλοξενεῖν
  english_pob_choice: to be hospitable
  chosen_spanish: ser hospitalario
  alternatives_spanish:
  - practicar la hospitalidad
  - acoger a los huéspedes
  lexicon: φιλοξενία / φιλοξενεῖν
  rationale: ‘Ser hospitalario’ expresa bien la cualidad ética requerida en español sin deformar el mandato. Se conserva el matiz de disposición activa, y la nota explica la conexión con la oportunidad de hacer el bien.
- source_word: μὴ ἀντιλέγειν
  english_pob_choice: to oppose no one
  chosen_spanish: no oponerse a nadie
  alternatives_spanish:
  - no contradecir a nadie
  - no replicar contra nadie
  lexicon: ἀντιλέγω
  rationale: La forma española ‘no oponerse a nadie’ reproduce el sentido práctico de no resistir ni disputar, que es el alcance que refleja el inglés POB.
- source_word: ταπεινοφρονεῖν / ταπεινούσθαι
  english_pob_choice: to become lower than all people
  chosen_spanish: hacerse menor que todos
  alternatives_spanish:
  - humillarse delante de todos
  - rebajarse por debajo de todos
  lexicon: ταπεινός / ταπεινόω
  rationale: ‘Hacerse menor que todos’ transmite la humildad relacional de manera natural en español y conserva la comparación universal del texto.
- source_word: δικαιοσύνην πράττειν
  english_pob_choice: to practice righteousness
  chosen_spanish: practicar la justicia
  alternatives_spanish:
  - hacer justicia
  - practicar la rectitud
  lexicon: δικαιοσύνη
  rationale: ‘Justicia’ es la opción más natural y fiel en español para δικαιοσύνη en una lista ética. ‘Rectitud’ es posible, pero ‘justicia’ mantiene mejor la fuerza moral y comunitaria.
- source_word: τὸν ἀδελφὸν φυλάσσειν
  english_pob_choice: to preserve the brotherhood
  chosen_spanish: preservar la hermandad
  alternatives_spanish:
  - guardar la fraternidad
  - mantener la hermandad
  lexicon: ἀδελφότης / ἀδελφός
  rationale: ‘Hermandad’ comunica la comunidad fraterna de forma idiomática y conserva el sentido colectivo que el inglés POB expresó como ‘brotherhood’.
- source_word: μακροθυμεῖν
  english_pob_choice: to be long-suffering
  chosen_spanish: ser paciente
  alternatives_spanish:
  - ser longánimo
  - tener longanimidad
  lexicon: μακροθυμέω
  rationale: En español moderno, ‘ser paciente’ es la forma más inteligible para el rasgo moral de μακροθυμέω. ‘Longánimo’ sería más técnico pero menos transparente.
- source_word: μὴ ἀπελθεῖν τοὺς πεπτωκότας ἀπὸ τῆς πίστεως
  english_pob_choice: not to cast off those who have stumbled away from the faith
  chosen_spanish: no rechazar a los que se han apartado de la fe
  alternatives_spanish:
  - no desechar a los que han caído de la fe
  - no echar fuera a los que tropezaron y se alejaron de la fe
  lexicon: πεπτωκότας / πίστις
  rationale: ‘Se han apartado de la fe’ comunica el alejamiento resultante sin fijar indebidamente el modo exacto de la caída. El inglés POB menciona ‘stumbled away’; en español se preserva el sentido de deserción o alejamiento sin exagerar el detalle.
- source_word: τοὺς παραπικραίνοντας
  english_pob_choice: those who sin
  chosen_spanish: los que pecan
  alternatives_spanish:
  - los que obran mal
  - los que faltan
  lexicon: παραπικραίνω
  rationale: El contexto del mandato moral justifica traducir esta forma en sentido amplio como ‘los que pecan’, siguiendo la lectura inglesa del POB. Se evita un tecnicismo que sería opaco para el lector general.
theological_decisions:
- issue: Tratamiento de los ‘slaves of God’ en una lista ética
  english_pob_reading: The POB keeps the strong lexical force of ‘slaves’ rather than softening to ‘servants’.
  chosen_spanish_reading: ‘los esclavos de Dios’
  alternative_spanish_readings:
  - los siervos de Dios
  - los servidores de Dios
  rationale: No se atenúa la relación de pertenencia y dependencia que expresa δοῦλος. En un texto de exhortación, conservar ‘esclavos’ protege la tensión histórica y teológica del término.
  doctrine_reference: Lexical theology of δοῦλος in New Testament and early Christian paraenesis
- issue: ‘Preserve the brotherhood’ as communal ecclesial ethic
  english_pob_reading: The POB renders the phrase as a communal obligation, not merely a private affection.
  chosen_spanish_reading: ‘preservar la hermandad’
  alternative_spanish_readings:
  - guardar la fraternidad
  - mantener la hermandad
  rationale: La lectura española mantiene el carácter comunitario eclesial de la obligación. ‘Hermandad’ es suficientemente amplio para la comunidad de creyentes sin imponer una terminología confesional más fuerte de la que el texto exige.
  doctrine_reference: Ecclesial ethics and communal fidelity
- issue: ‘Not to cast off those who have stumbled away from the faith’
  english_pob_reading: The POB preserves a restorative stance toward those who have fallen away.
  chosen_spanish_reading: ‘no rechazar a los que se han apartado de la fe’
  alternative_spanish_readings:
  - no desechar a los que han caído de la fe
  - no expulsar a los que tropezaron en la fe
  rationale: 'La formulación elegida conserva la tensión entre disciplina y restauración: no desechar, sino volver a integrar y animar. Esto coincide con el final del mandato, que ordena hacerlos volver y alegrarlos.'
  doctrine_reference: Restorative discipline and pastoral recovery
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete de auditoría; la redacción española sigue de cerca la lectura inglesa POB y la fuerza léxica del griego subyacente, especialmente en δοῦλος, φιλοξενέω, μακροθυμέω y las cláusulas restaurativas finales.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como convención del proyecto, pero este pasaje no contiene el tetragrámaton ni citas directas que lo requieran.
  - Se evitó ‘SEÑOR’ como sustituto general, dado que el pasaje es una lista ética sin nombres divinos explícitos.
  - Se prefirió un registro de lista exhortativa con infinitivos coordinados, coherente con el tono del original y con la traducción inglesa auditada.
  - Se usó ‘justicia’ en lugar de ‘rectitud’ por naturalidad y por mantener el eje moral de la lista.
  - ‘Hermandad’ se eligió por legibilidad, sin perder el sentido colectivo de la comunidad de creyentes.
