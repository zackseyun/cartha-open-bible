  to: '«Después, escucha lo que sigue a estas cosas: servir a las viudas; visitar a los huérfanos y a los necesitados; rescatar a los esclavos de Dios de las aflicciones; ser hospitalario[a] (porque en la hospitalidad a veces se encuentra una oportunidad para hacer el bien); no oponerse a nadie; ser apacible; hacerse menor que todos; honrar a los ancianos; practicar la justicia; preservar la hermandad; soportar el insulto; ser paciente; no guardar resentimiento; animar a los que están cansados en el alma; no rechazar a los que se han apartado de la fe, sino hacerlos regresar y animarlos; amonestar a los que pecan; no oprimir a los deudores ni a los necesitados; y si hay algo semejante a estas cosas.»'
