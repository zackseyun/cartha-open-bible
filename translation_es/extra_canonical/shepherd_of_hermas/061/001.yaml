  text: 'Then the angel of the Lord commanded that crowns be brought. And crowns were brought, as if made from palms, and he crowned the men who had handed in the rods that had shoots and some fruit, and he dismissed them into the tower. 2. And the others also he sent into the tower—those who had handed in their rods green and having shoots, but whose shoots did not have fruit—giving them seals. 3. And all who were going into the tower had the same clothing, white as snow. 4. And those who had handed in their rods green, just as they had received them, he dismissed, giving them clothing and seals. 5. After the angel had finished these things, he says to the shepherd: “I am going; but you are to dismiss these to the walls, as each one is worthy to dwell. Pay close attention to their rods, and so dismiss them—pay close attention. See that no one slips past you,” he says; “but if anyone does slip past you, I will test them upon the altar.” Having said these things to the shepherd, he went away.
    6. The shepherd says to me, “Let us take the rods of all and plant them, to see if any of them will be able to live.” I say to him, “Sir, how can these dry things live?” 7. Answering me he says, “This tree is a willow, and its kind loves life. If, then, the rods are planted and receive a little moisture, many of them will live; then let us also try pouring water on them. If any of them is able to live, I will rejoice over it; but if it does not live, I shall not be found negligent.” 8. Then the shepherd commanded me to call them just as each of them had been stationed. Rank by rank they came and were handing their rods to the shepherd. The shepherd took the rods and planted them according to the ranks; and after planting he provided much water for them, so that because of the water the rods could not be seen. 9. And after he had watered the rods, he says to me, “Let us go, and after a few days let us return and inspect all the rods; for the one who created this tree desires all who have
    taken branches from this tree to live. And I too hope that, these rods having received moisture and having been watered with water, the greater part of them will live.”'
translation:
  language: es
  text: 'Entonces el ángel del Señor mandó que trajeran coronas. Y trajeron coronas, como hechas de palmas, y coronó a los hombres que habían entregado las varas que tenían brotes y algo de fruto, y los envió a la torre. 2. Y a los otros también los envió a la torre: a los que habían entregado sus varas verdes y con brotes, pero cuyos brotes no tenían fruto, dándoles sellos. 3. Y todos los que entraban en la torre tenían la misma vestimenta, blanca como la nieve. 4. Y a los que habían entregado sus varas verdes, tal como las habían recibido, los despidió, dándoles vestiduras y sellos. 5. Después de que el ángel terminó estas cosas, dice al pastor: «Yo me voy; pero tú vas a enviar a estos junto a los muros, según cada uno sea digno de habitar. Presta mucha atención a sus varas, y así despídelos; presta mucha atención. Mira que nadie te pase inadvertido», dice; «pero si alguno sí pasa inadvertido, yo lo probaré sobre el altar». Habiendo dicho estas cosas al pastor, se fue.


    6. El pastor me dice: «Tomemos las varas de todos y plantémoslas, para ver si alguna de ellas podrá vivir». Yo le digo: «Señor, ¿cómo podrán vivir estas varas secas?». 7. Respondiéndome, dice: «Este árbol es un sauce, y su especie ama la vida. Si, pues, las varas son plantadas y reciben un poco de humedad, muchas de ellas vivirán; intentemos también echarles agua. Si alguna de ellas puede vivir, me alegraré por ello; pero si no vive, no se me hallará negligente». 8. Entonces el pastor me mandó llamarlos tal como a cada uno se le había asignado su lugar. Vinieron rango por rango y entregaban sus varas al pastor. El pastor tomó las varas y las plantó según los rangos; y después de plantarlas les echó mucha agua, de modo que por el agua no se podían ver las varas. 9. Y después de haber regado las varas, me dice: «Vayamos, y dentro de unos pocos días regresemos y examinemos todas las varas; porque el que creó este árbol desea que vivan todos los que han tomado ramas de este árbol. Y yo también
    espero que, habiendo recibido humedad estas varas y habiendo sido regadas con agua, viva la mayor parte de ellas».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄγγελος τοῦ κυρίου
  english_pob_choice: the angel of the Lord
  chosen_spanish: el ángel del Señor
  alternatives_spanish:
  - el ángel de Yahvé
  - el ángel del Señor
  lexicon: ἄγγελος
  rationale: Conservo la fórmula de mensajero celestial del texto; en esta locución fija, el español fluye mejor con 'del Señor' y evita introducir innecesariamente el nombre divino donde el griego usa κυρίου en la expresión tradicional.
- source_word: στέφανοι
  english_pob_choice: crowns
  chosen_spanish: coronas
  alternatives_spanish:
  - guirnaldas
  - coronas
  lexicon: στέφανος
  rationale: '''Coronas'' mantiene el valor honorífico de στέφανοι y es el equivalente natural en español; ''guirnaldas'' sería más interpretativo y menos fiel al gesto de investidura.'
- source_word: φοίνικες
  english_pob_choice: as if made from palms
  chosen_spanish: como hechas de palmas
  alternatives_spanish:
  - como de palmas
  - como hechas de palmeras
  lexicon: φοῖνιξ
  rationale: '''Palmas'' preserva la imagen vegetal de victoria/honor sin añadir detalles ajenos; ''palmeras'' sería más botánico, pero el referente simbólico es mejor conservado con ''palmas''.'
- source_word: κλάδοι
  english_pob_choice: rods
  chosen_spanish: varas
  alternatives_spanish:
  - bastones
  - varas
  lexicon: κλάδος
  rationale: Sigo la POB inglesa al usar 'varas' para mantener la forma alargada y seca que luego se planta; 'bastones' sonaría demasiado a apoyo personal y no a objeto vegetal.
- source_word: σφραγῖδες
  english_pob_choice: seals
  chosen_spanish: sellos
  alternatives_spanish:
  - sellos
  - estampas
  lexicon: σφραγίς
  rationale: '''Sellos'' conserva el acto de autenticación/identificación. ''Estampas'' no expresa tan bien el valor simbólico y forense del término.'
- source_word: ἐν λευκῷ ὡς χιών
  english_pob_choice: white as snow
  chosen_spanish: blanca como la nieve
  alternatives_spanish:
  - blanca como la nieve
  - blanca como la nieve
  lexicon: λευκός
  rationale: La imagen idiomática española más natural es 'blanca como la nieve'; mantiene el sentido de pureza y resplandor sin alterar el comparativo.
- source_word: ἱκανὸς
  english_pob_choice: worthy to dwell
  chosen_spanish: sea digno de habitar
  alternatives_spanish:
  - sea digno de habitar
  - merezca habitar
  lexicon: ἱκανός
  rationale: La noción es de idoneidad/dignidad para residir; 'sea digno de habitar' reproduce mejor el juicio de aptitud que una simple posibilidad.
theological_decisions:
- issue: Traducción de κύριος en la fórmula narrativa del ángel
  english_pob_reading: the angel of the Lord
  chosen_spanish_reading: el ángel del Señor
  alternative_spanish_readings:
  - el ángel de Yahvé
  - el ángel de Dios
  rationale: Aunque la política general usa 'Yahvé' para el nombre divino, aquí la expresión griega y la tradición narrativa permiten 'Señor' como fórmula estable. No se fuerza una identificación explícita adicional que el pasaje no desarrolla.
  doctrine_reference: Teología del nombre divino y fórmulas angélicas narrativas
- issue: Valor simbólico de coronas, sellos y vestiduras
  english_pob_reading: crowns / seals / clothing
  chosen_spanish_reading: coronas / sellos / vestiduras
  alternative_spanish_readings:
  - guirnaldas / marcas / ropa
  rationale: 'Mantengo el vocabulario simbólico y distintivo del relato: las coronas indican honor, los sellos autenticación o pertenencia, y las vestiduras blancas pureza/aceptación. No los normalizo a términos más genéricos.'
  doctrine_reference: Simbolismo de recompensa, sellado y pureza ceremonial
- issue: Referencia a la prueba 'sobre el altar'
  english_pob_reading: I will test them upon the altar
  chosen_spanish_reading: yo lo probaré sobre el altar
  alternative_spanish_readings:
  - lo pondré a prueba sobre el altar
  - lo examinaré sobre el altar
  rationale: '''Probaré'' conserva la idea de someter a examen o prueba. Mantengo ''altar'' sin aclaraciones, porque el texto conserva su propia imaginería cultual y no requiere explicitar más.'
  doctrine_reference: Lenguaje cultual de prueba y discernimiento
translation_notes:
  revision_awareness: 'Esta versión corrige el problema de validación anterior eliminando todo aparato de notas sin ancla. También ajusta la redacción para seguir de cerca el griego y la POB inglesa sin añadir marcadores footnote no utilizados. Se conservan las imágenes centrales del pasaje: coronas de palmas, sellos, vestiduras blancas, plantación de las varas y la prueba posterior del pastor.'
  spanish_consistency_notes:
  - Se mantiene 'varas' de forma uniforme para las rods/κλάδοι.
  - Se conserva 'sellos' para σφραγῖδες y 'vestiduras' para clothing en sentido ritual/simbólico.
  - Se usa 'pastor' para shepherd, siguiendo la personificación del relato.
  - Se evita alternar entre 'Señor' y 'Yahvé' dentro de este pasaje porque el griego aquí presenta κύριος en una fórmula fija.
  - La puntuación y los dos puntos respetan el tono de discurso narrativo-dialogal del original.
