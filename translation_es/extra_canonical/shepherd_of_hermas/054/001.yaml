base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/054/001.yaml
  text: 'While I was sitting in my house and glorifying the Lord for all the things I had seen, and pondering the commandments—that they are good and powerful and gladdening and glorious and able to save a person’s soul—I said within myself: “Blessed shall I be if I walk in these commandments, and whoever walks in them will be blessed.”'
translation:
  language: es
  text: 'Mientras yo estaba sentado en mi casa y glorificando al Señor por todas las cosas que había visto, y meditando en los mandamientos —que son buenos, poderosos, que alegran, gloriosos y capaces de salvar el alma de una persona—, me dije dentro de mí: “¡Bienaventurado seré si ando en estos mandamientos, y bienaventurado será quien ande en ellos!”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοξάζων
  english_pob_choice: glorifying
  chosen_spanish: glorificando
  alternatives_spanish:
  - dando gloria
  - alabando
  lexicon: δοξάζω
  rationale: Mantiene la acción de atribuir gloria a Dios/Señor sin desplazar el sentido hacia una mera alabanza litúrgica; «glorificando» sigue de cerca el valor verbal del griego y funciona bien en español bíblico contemporáneo.
- source_word: ἐντολαί
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - preceptos
  - órdenes
  lexicon: ἐντολή
  rationale: «Mandamientos» es la equivalencia más natural y fiel en español para el conjunto de normas divinas aludidas en este contexto; preserva la fuerza normativa del término.
- source_word: ἀγαθοί
  english_pob_choice: good
  chosen_spanish: buenos
  alternatives_spanish:
  - rectos
  - beneficiosos
  lexicon: ἀγαθός
  rationale: «Buenos» reproduce de modo directo la cualidad moral/aprobatoria del griego, sin añadir una especificación ética más fuerte que el texto no exige.
- source_word: ἰσχυροί
  english_pob_choice: powerful
  chosen_spanish: poderosos
  alternatives_spanish:
  - fuertes
  - eficaces
  lexicon: ἰσχυρός
  rationale: «Poderosos» conserva la idea de fuerza o eficacia inherente a los mandamientos; en este contexto, la frase describe su capacidad real de obrar, no solo su autoridad.
- source_word: χαροποιοί
  english_pob_choice: gladdening
  chosen_spanish: alegres
  alternatives_spanish:
  - gozosos
  - que alegran
  lexicon: χαροποιός
  rationale: El griego expresa cualidad causativa, pero en español una construcción adjetival fluida como «alegres» comunica el efecto de forma natural; la opción alternativa «que alegran» también sería viable, pero se eligió una serie paralela de adjetivos.
- source_word: ἔνδοξοι
  english_pob_choice: glorious
  chosen_spanish: gloriosos
  alternatives_spanish:
  - ilustres
  - magníficos
  lexicon: ἔνδοξος
  rationale: «Gloriosos» reproduce el valor de honor/esplendor del término y conserva la serie retórica del pasaje.
- source_word: δυνάμενοι σῶσαι
  english_pob_choice: able to save
  chosen_spanish: capaces de salvar
  alternatives_spanish:
  - con poder para salvar
  - aptos para salvar
  lexicon: δύναμαι + σῴζω
  rationale: La construcción «capaces de salvar» expresa adecuadamente la posibilidad/competencia inherente sin recargar el español; preserva la afirmación de eficacia salvífica que el texto atribuye a los mandamientos.
- source_word: ψυχή
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  lexicon: ψυχή
  rationale: «Alma» es la correspondencia más estable en español para este contexto religioso y conserva la referencia a la persona interior o vida personal que el pasaje quiere destacar.
- source_word: μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Dichoso
  - Bendito
  lexicon: μακάριος
  rationale: «Bienaventurado» mantiene la resonancia bíblica tradicional para una declaración de dicha/estado favorecido, sin perder inteligibilidad en español actual.
- source_word: πορεύομαι ἐν ταῖς ἐντολαῖς
  english_pob_choice: walks in them
  chosen_spanish: ande en estos mandamientos
  alternatives_spanish:
  - camine en estos mandamientos
  - viva conforme a estos mandamientos
  lexicon: πορεύομαι ἐν
  rationale: «Andar en» preserva el modismo semítico-bíblico de conducta continua y evita reducirlo a un mero desplazamiento físico; «ande» mantiene el valor exhortativo/general.
theological_decisions:
- issue: Referencia al Señor al que se glorifica
  english_pob_reading: glorifying the Lord
  chosen_spanish_reading: glorificando al Señor
  alternative_spanish_readings:
  - glorificando a Yahvé
  - glorificando al Señor Jesús
  rationale: El pasaje inglés conserva «Lord» como forma auditada; sin un indicador inmediato más amplio en este segmento para especificar el nombre divino, se mantiene «Señor» en el texto español para no sobreinterpretar la referencia. La formulación sigue siendo compatible con la identificación del Señor en el marco del escrito.
  doctrine_reference: Criterio de prudencia exegética en textos patrísticos/apócrifos; no se fuerza una equivalencia teológica no explicitada por el segmento.
- issue: Capacidad salvífica atribuida a los mandamientos
  english_pob_reading: able to save a person’s soul
  chosen_spanish_reading: capaces de salvar el alma de una persona
  alternative_spanish_readings:
  - capaces de salvar a una persona
  - aptos para salvar el alma
  rationale: Se conserva la afirmación fuerte del texto sobre los mandamientos sin suavizarla ni reinterpretarla doctrinalmente; el español mantiene la relación causal tal como aparece en la fuente y en la traducción inglesa auditada.
  doctrine_reference: Soteriología y ética de obediencia en Hermas; preservación del enunciado descriptivo del texto sin armonización doctrinal posterior.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; el borrador español sigue directamente la lectura inglesa auditada y el griego normalizado disponible, sin depender de variantes textuales adicionales.
  spanish_consistency_notes:
  - Se usó «Señor» en mayúscula como tratamiento reverente coherente con el contexto bíblico.
  - Se mantuvo la serie adjetival en paralelo («buenos, poderosos, alegres, gloriosos») para conservar el ritmo retórico del original.
  - «Bienaventurado» se repite en ambas cláusulas finales para reflejar la repetición enfática del texto fuente.
