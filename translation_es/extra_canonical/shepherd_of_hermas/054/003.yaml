lexical_decisions:
- source_word: commandments
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - preceptos
  - mandatos
  lexicon: N/A
  rationale: «Mandamientos» conserva el valor normativo y moral del término, y encaja naturalmente en español bíblico sin perder la fuerza imperativa del griego.
- source_word: beneficial
  english_pob_choice: beneficial
  chosen_spanish: provechosos
  alternatives_spanish:
  - útiles
  - beneficiosos
  lexicon: N/A
  rationale: «Provechosos» expresa adecuadamente la idea de utilidad práctica y espiritual con un tono bíblico claro en español.
- source_word: about to repent
  english_pob_choice: about to repent
  chosen_spanish: están por arrepentirse
  alternatives_spanish:
  - van a arrepentirse
  - están a punto de arrepentirse
  lexicon: N/A
  rationale: La construcción «están por arrepentirse» mantiene la inminencia del original sin volverla más fuerte de lo que requiere el texto.
- source_word: walk in them
  english_pob_choice: walk in them
  chosen_spanish: anden en ellos
  alternatives_spanish:
  - caminen en ellos
  - los practiquen
  lexicon: N/A
  rationale: «Andar en» reproduce bien la metáfora ética de conducta continua, frecuente en español bíblico y comprensible sin calco pesado.
- source_word: repentance
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - cambio de mente
  - conversión
  lexicon: N/A
  rationale: «Arrepentimiento» preserva el sentido penitencial y volitivo que el contexto exige; «cambio de mente» sería demasiado explicativo aquí.
- source_word: in vain
  english_pob_choice: in vain
  chosen_spanish: es en vano
  alternatives_spanish:
  - es inútil
  - carece de valor
  lexicon: N/A
  rationale: «Es en vano» corresponde de manera idiomática y fiel a la evaluación negativa del resultado.
theological_decisions:
- issue: Eficacia de los mandamientos para el arrepentimiento
  english_pob_reading: These commandments are beneficial for those who are about to repent; for if they do not walk in them, their repentance is in vain.
  chosen_spanish_reading: Estos mandamientos son provechosos para los que están por arrepentirse; porque si no andan en ellos, su arrepentimiento es en vano.
  alternative_spanish_readings:
  - Estos mandamientos ayudan a los que van a arrepentirse...
  - Estos mandamientos son útiles para los que se disponen a arrepentirse...
  rationale: 'La formulación mantiene la relación causal y condicional del texto: los mandamientos no sustituyen el arrepentimiento, sino que lo orientan y verifican; sin obediencia, el arrepentimiento queda vaciado de efecto.'
  doctrine_reference: Ética del arrepentimiento y obediencia
- issue: Alcance de «arrepentimiento» como acto real y no solo mental
  english_pob_reading: their repentance is in vain
  chosen_spanish_reading: su arrepentimiento es en vano
  alternative_spanish_readings:
  - su cambio de mente es en vano
  - su conversión es en vano
  rationale: 'Se conserva la tensión entre interioridad y conducta: el texto liga el arrepentimiento genuino con el andar en los mandamientos, por lo que una mera disposición interna no basta.'
  doctrine_reference: Arrepentimiento auténtico y perseverancia
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas; la redacción sigue directamente el texto fuente griego tal como se refleja en la versión inglesa auditada, sin variantes textuales relevantes en el paquete proporcionado.
  spanish_consistency_notes:
  - Se usa «mandamientos» para mantener coherencia con el tono normativo del pasaje.
  - Se conserva «arrepentimiento» por ser la opción más estable y comprensible en español para this context; no se introduce terminología técnica adicional.
  - Se mantiene el paralelismo sintáctico del inglés POB, pero adaptado a una oración natural en español.
