base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/054/006.yaml
  text: He was pasturing very many sheep, and the sheep were as if luxuriating and being very extravagant, and they were cheerful, skipping here and there. And the shepherd himself was very cheerful over his flock; and the very appearance of the shepherd was exceedingly cheerful, and he ran around among the sheep.
translation:
  language: es
  text: Él estaba pastoreando muchísimas ovejas, y las ovejas estaban como si prosperaran y rebosaran, y estaban alegres, saltando de aquí para allá. Y el mismo pastor estaba muy alegre por su rebaño; y la apariencia misma del pastor era sumamente alegre, y corría de un lado a otro entre las ovejas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ποιμαίνων
  english_pob_choice: was pasturing
  chosen_spanish: estaba pastoreando
  alternatives_spanish:
  - apacentaba
  - estaba apacentando
  lexicon: ποιμαίνω
  rationale: Conserva el sentido de acción pastoral continua. «Pastorear» es natural en español y mantiene la imagen de cuidado del rebaño sin volverla más eclesiástica de lo que exige el griego.
- source_word: πολλὰ πρόβατα
  english_pob_choice: very many sheep
  chosen_spanish: muchísimas ovejas
  alternatives_spanish:
  - muchas ovejas
  - gran cantidad de ovejas
  lexicon: πολύς + πρόβατα
  rationale: «Muchísimas» refleja la intensificación del original y del inglés («very many»), con un registro fluido en español.
- source_word: ὡς εὐθηνοῦντα καὶ περισσεύοντα
  english_pob_choice: as if luxuriating and being very extravagant
  chosen_spanish: como si estuvieran en abundancia y en exceso
  alternatives_spanish:
  - como si prosperaran y rebosaran
  - como si vivieran en abundancia y desbordamiento
  lexicon: ὡς + εὐθηνέω + περισσεύω
  rationale: El griego presenta dos ideas de plenitud/abundancia; en español, «en abundancia y en exceso» preserva la duplicación semántica sin forzar «extravagantes», que en español suena a derroche moral más que a prosperidad o desbordamiento.
- source_word: χαίροντα
  english_pob_choice: were cheerful
  chosen_spanish: estaban alegres
  alternatives_spanish:
  - estaban gozosas
  - estaban contentas
  lexicon: χαίρω
  rationale: «Alegres» comunica el estado emotivo del rebaño con naturalidad y sin introducir matices excesivos.
- source_word: σκιρτῶντα
  english_pob_choice: skipping here and there
  chosen_spanish: saltando de aquí para allá
  alternatives_spanish:
  - retozando de un lado a otro
  - brincando aquí y allá
  lexicon: σκιρτάω
  rationale: La imagen de movimiento juguetón se conserva bien con una expresión idiomática clara en español.
- source_word: ἀσμένως / χαίρων? (shepherd's joy)
  english_pob_choice: very cheerful over his flock
  chosen_spanish: muy alegre por su rebaño
  alternatives_spanish:
  - muy contento con su rebaño
  - muy gozoso por su rebaño
  lexicon: contextual joy language
  rationale: El griego y el inglés enfatizan la alegría del pastor respecto del rebaño; «por su rebaño» mantiene la relación causal/afectiva sin añadir interpretación.
- source_word: ἡ ὄψις τοῦ ποιμένος
  english_pob_choice: the very appearance of the shepherd
  chosen_spanish: la misma apariencia del pastor
  alternatives_spanish:
  - el propio aspecto del pastor
  - la apariencia misma del pastor
  lexicon: ὄψις
  rationale: «La misma apariencia» reproduce la intensificación del inglés («the very appearance») y mantiene el énfasis descriptivo del original.
- source_word: περιῄει ἐν μέσῳ τῶν προβάτων
  english_pob_choice: he ran around among the sheep
  chosen_spanish: corría de un lado a otro entre las ovejas
  alternatives_spanish:
  - andaba de un lado a otro entre las ovejas
  - se movía entre las ovejas
  lexicon: περιέρχομαι
  rationale: «Corría de un lado a otro» transmite el movimiento rápido y repetido que el griego sugiere, en español idiomático.
theological_decisions:
- issue: No explicit theological term beyond pastoral imagery
  english_pob_reading: The verse is descriptive and carries no doctrinal claim in the English audit text.
  chosen_spanish_reading: La sección se mantiene descriptiva, sin añadir interpretación doctrinal.
  alternative_spanish_readings:
  - La sección se puede leer alegóricamente, pero no se explicita aquí.
  - No se introducen términos teológicos adicionales.
  rationale: El texto narra una escena pastoral. La traducción evita sobrerinterpretar el simbolismo y conserva el tono descriptivo del pasaje.
  doctrine_reference: Hermas, Similitude 6, contexto narrativo-alegórico general
translation_notes:
  revision_awareness: No applied revisions or prior English footnotes were supplied for this unit; the Spanish draft therefore follows the source packet and the English POB rendering directly, while preserving the semantic intensification and the vivid movement imagery of the Greek.
  spanish_consistency_notes:
  - Se mantuvo «pastor» y «rebaño» de forma consistente para el campo semántico pastoral.
  - Se eligió «ovejas» en lugar de «carneros» o «corderos» porque el griego πρόβατα es genérico para ovejas.
  - No se capitalizan los términos pastor/rebaño por tratarse de lenguaje narrativo común, no de título divino.
