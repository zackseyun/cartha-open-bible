  text: And after he had spoken these things with me, he says to me, “Let us go into the country, and I will show you the shepherds of the sheep.” “Let us go, sir,” I say. And we came to a certain plain, and he shows me a shepherd, a young man, clothed in a composite garment, saffron in color.
translation:
  language: es
  text: 'Y después de decirme estas cosas, me dice: «Vayamos al campo, y yo te mostraré a los pastores de las ovejas». «Vayamos, señor», le digo. Y llegamos a cierta llanura, y me muestra a un pastor, un joven, vestido con una prenda compuesta, de color azafranado.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀγρόν / country
  english_pob_choice: country
  chosen_spanish: campo
  alternatives_spanish:
  - región rural
  - campo abierto
  lexicon: ἀγρός
  rationale: En este contexto narrativo, ‘campo’ comunica mejor el espacio rural abierto sin sonar artificial en español. ‘Región rural’ sería más explicativa de lo necesario y ‘campo abierto’ añade énfasis no presente en el griego.
- source_word: ποιμένες τῶν προβάτων / shepherds of the sheep
  english_pob_choice: the shepherds of the sheep
  chosen_spanish: los pastores de las ovejas
  alternatives_spanish:
  - los pastores del rebaño
  - los pastores de las reses
  lexicon: ποιμήν
  rationale: Se conserva la imagen literal del original. ‘Ovejas’ mantiene la concreción del texto; ‘rebaño’ suaviza la metáfora pero pierde el matiz de las ovejas particulares.
- source_word: πρὸβατον / sheep
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - corderos
  - rebaño
  lexicon: πρόβατον
  rationale: ‘Ovejas’ es el equivalente directo y claro en español. ‘Corderos’ cambiaría la imagen; ‘rebaño’ colectiviza demasiado.
- source_word: πέπλος σύνθετος / composite garment
  english_pob_choice: composite garment
  chosen_spanish: manto compuesto
  alternatives_spanish:
  - vestido compuesto
  - prenda compuesta
  - ropa combinada
  lexicon: σύνθετος
  rationale: ‘Manto compuesto’ preserva la idea de una prenda hecha de varias partes o materiales sin precisar más de lo que el griego dice. ‘Vestido’ podría sugerir una prenda femenina o una equivalencia menos exacta; ‘ropa combinada’ suena demasiado interpretativa.
- source_word: κροκωτός / saffron in color
  english_pob_choice: saffron in color
  chosen_spanish: de color azafranado
  alternatives_spanish:
  - safranado
  - amarillo azafrán
  - color de azafrán
  lexicon: κροκωτός
  rationale: ‘Azafranado’ es un adjetivo natural en español y conserva el valor cromático. ‘Color de azafrán’ es correcto pero más pesado; ‘safranado’ es menos corriente.
theological_decisions:
- issue: Tratamiento reverencial de la dirección al interlocutor
  english_pob_reading: Let us go, sir
  chosen_spanish_reading: Vayamos, señor
  alternative_spanish_readings:
  - Vayamos, señor mío
  - Vamos, señor
  rationale: ‘Señor’ reproduce el trato respetuoso sin introducir una intensificación no atestiguada. Mantener el vocativo breve conserva el diálogo directo del relato.
  doctrine_reference: none
translation_notes:
  revision_awareness: No hay revisiones registradas en el paquete de auditoría; la redacción sigue de cerca la secuencia del griego normalizado y la equivalencia óptima del inglés POB, manteniendo el orden narrativo y las imágenes concretas.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico-readable, sin arcaísmos innecesarios.
  - ‘Campo’ y ‘llanura’ distinguen dos espacios distintos del relato, como en el original.
  - ‘Pastor’ se conserva tanto para el personaje como para la imagen pastoral sin explicitar alegorías que el texto no desarrolla aquí.
