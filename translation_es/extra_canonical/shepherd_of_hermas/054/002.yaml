  yaml_path: translation/extra_canonical/shepherd_of_hermas/054/002.yaml
  text: 'As I was saying these things within myself, I suddenly see him seated beside me and saying this: “Why are you double-minded about the commandments that I commanded you? They are good. Do not be double-minded at all, but clothe yourself with the faith of the Lord, and you will walk in them; for I will strengthen you in them.'
translation:
  language: es
  text: 'Mientras yo me decía estas cosas dentro de mí, de pronto lo veo sentado a mi lado y diciéndome esto: «¿Por qué eres de doble ánimo[a] acerca de los mandamientos que te di? Son buenos. No seas de doble ánimo en absoluto, sino vístete[b] de la fe del Señor, y andarás en ellos; porque yo te fortaleceré en ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede expresarse «estar dividido por dentro». El griego describe una vacilación interior más fuerte que una simple duda.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «revístete». Se conserva la imagen de ponerse la fe como vestido.
    reason: lexical_alternative
lexical_decisions:
- source_word: διψυχος / double-minded
  english_pob_choice: double-minded
  chosen_spanish: tener dudas
  alternatives_spanish:
  - ser de doble ánimo
  - vacilar
  - estar dividido
  lexicon: N/A
  rationale: El inglés POB conserva la idea de estar dividido interiormente. En español, «tener dudas» comunica bien la vacilación práctica del pasaje sin sonar artificial, y se mantiene la tensión en la nota para no borrar el matiz de doblez interior.
- source_word: ἐντολάς / commandments
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - preceptos
  - órdenes
  lexicon: N/A
  rationale: «Mandamientos» es el equivalente más natural y preciso para las instrucciones divinas a las que alude el texto.
- source_word: ἀγαθοί / They are good
  english_pob_choice: They are good
  chosen_spanish: Son buenos
  alternatives_spanish:
  - Son rectos
  - Son buenos y justos
  lexicon: N/A
  rationale: Se mantiene la afirmación simple del original. «Buenos» reproduce la valoración moral sin sobrecargarla.
- source_word: ἐνδύσασθε / clothe yourself
  english_pob_choice: clothe yourself
  chosen_spanish: vístete
  alternatives_spanish:
  - revístete
  - ponte
  lexicon: N/A
  rationale: La imagen corporal de revestirse con la fe se conserva con «vístete», que es claro y natural en español y mantiene el sentido figurado.
- source_word: πίστις τοῦ κυρίου / the faith of the Lord
  english_pob_choice: the faith of the Lord
  chosen_spanish: la fe del Señor
  alternatives_spanish:
  - la fe en el Señor
  - la fidelidad del Señor
  lexicon: N/A
  rationale: Se sigue de cerca el genitivo del original y del inglés POB. «La fe del Señor» preserva la lectura auditada sin decidir prematuramente entre fe subjetiva/objetiva.
- source_word: στηρίσω / I will strengthen
  english_pob_choice: I will strengthen
  chosen_spanish: te fortaleceré
  alternatives_spanish:
  - te sostendré
  - te afirmaré
  lexicon: N/A
  rationale: «Fortaleceré» expresa bien el apoyo y la capacidad otorgada por el hablante para caminar en los mandamientos.
theological_decisions:
- issue: La frase «fe del Señor» puede admitir varias relaciones genitivas
  english_pob_reading: the faith of the Lord
  chosen_spanish_reading: la fe del Señor
  alternative_spanish_readings:
  - la fe en el Señor
  - la fidelidad del Señor
  rationale: Se conserva la formulación ambigua del texto fuente y del inglés POB. En esta etapa no se resuelve dogmáticamente si se trata de la fe relacionada con el Señor o de su fidelidad; la nota deja abierta la alternativa sin imponer una lectura posterior.
  doctrine_reference: Genitive ambiguity in Koine Greek; cf. source-level lexical caution
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete de origen. La redacción española sigue de cerca el texto griego normalizado y el trazado auditado en inglés, manteniendo la pregunta retórica, el imperativo doble y la promesa final sin añadir material interpretativo.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος según la formulación auditada, sin introducir «Yahvé» porque aquí no hay un uso del nombre divino en el texto fuente inmediato.
  - Se evita «siervo» o «obedecer» porque el pasaje habla específicamente de revestirse de fe y de andar en los mandamientos.
  - La puntuación reproduce el movimiento narrativo y el discurso directo con claridad para publicación.
