revisions:
- from: Tú, por tanto, que te estás arrepintiendo, desecha los males de este siglo que te agobian; y, habiéndote revestido de toda virtud de justicia, podrás guardar estos mandamientos y ya no añadir a tus pecados. Si, por tanto, no añades nada más, te apartarás de tus pecados anteriores. Camina, pues, en estos mandamientos míos, y vivirás para Dios. Todas estas cosas te han sido dichas por mí.
  to: Ustedes, por tanto, que se arrepienten, desechen los males de este siglo que los agobian; y, habiéndose revestido de toda virtud de justicia, podrán guardar estos mandamientos y ya no añadir a sus pecados. Si, por tanto, no añaden nada más, se alejarán de sus pecados anteriores. Caminen, pues, en estos mandamientos míos, y vivirán para Dios. Todas estas cosas les han sido dichas por mí.
  rationale: Se ajustó la exhortación a segunda persona plural para reflejar mejor el participio plural del griego y la fuerza general/comunitaria del pasaje, manteniendo el sentido del inglés auditado. También se mejoró ligeramente la naturalidad de «te apartarás» a «se alejarán», sin cambiar el contenido. No se requieren notas adicionales.
  reviewer_model: gpt-5.4
