review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego y del inglés auditado: exhorta a quienes se arrepienten a desechar los males de la era presente, revestirse de virtud de justicia, guardar los mandamientos, no añadir más pecados, apartarse de los pecados anteriores, caminar en los mandamientos y vivir para Dios. No obstante, hay dos ajustes de fidelidad y naturalidad: el vocativo singular inicial («Tú») no concuerda bien con el participio plural subyacente y con la exhortación general; y «te apartarás de tus pecados anteriores» suena menos natural y algo menos preciso que «te alejarás de tus pecados anteriores».'
  spanish_quality_summary: El español es claro y digno, pero presenta una mezcla incómoda entre singular («Tú», «te estás arrepintiendo», «podrás», «vivirás») y una base griega/inglesa que se entiende mejor como exhortación general a los que se arrepienten. Además, «Camina... en estos mandamientos míos» es comprensible, pero «anda conforme a estos mandamientos míos» o mantener «camina en» podría discutirse; no exige adjudicación mayor. Se propone una revisión mínima para mejorar concordancia y fluidez sin alejarse del texto auditado.
  glossary_alignment: No hay conflictos con la terminología por defecto del proyecto. «Dios», «justicia», «arrepentirse» y «mandamientos» están bien alineados. «Siglo» para αἰών es defendible aquí. «Vivirán para Dios» preserva bien ζήσεσθε τῷ θεῷ.
  issues:
  - severity: medium
    issue: Cambio innecesario a segunda persona singular en una exhortación de alcance plural/general
    rationale: El borrador comienza con «Tú» y mantiene formas singulares, pero el griego μετανοοῦντες es plural y el inglés auditado «You, therefore, who are repenting» puede leerse como plural general. En español bíblico neutro, «ustedes que se arrepienten» evita la incongruencia y suena natural para una exhortación comunitaria.
  - severity: low
    issue: «te apartarás de tus pecados anteriores» suena menos idiomático
    rationale: La idea de cesar y distanciarse de los pecados previos se expresa más naturalmente con «se alejarán de sus pecados anteriores» o «se apartarán de sus pecados pasados». Es un ajuste estilístico menor, no doctrinal.
  revised_spanish_text: Ustedes, por tanto, que se arrepienten, desechen los males de este siglo que los agobian; y, habiéndose revestido de toda virtud de justicia, podrán guardar estos mandamientos y ya no añadir a sus pecados. Si, por tanto, no añaden nada más, se alejarán de sus pecados anteriores. Caminen, pues, en estos mandamientos míos, y vivirán para Dios. Todas estas cosas les han sido dichas por mí.
  revision_rationale: Se ajustó la exhortación a segunda persona plural para reflejar mejor el participio plural del griego y la fuerza general/comunitaria del pasaje, manteniendo el sentido del inglés auditado. También se mejoró ligeramente la naturalidad de «te apartarás» a «se alejarán», sin cambiar el contenido. No se requieren notas adicionales.
