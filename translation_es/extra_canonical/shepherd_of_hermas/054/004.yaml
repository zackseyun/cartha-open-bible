  text: “You, therefore, who are repenting, cast off the evils of this age that wear you down; and having put on every virtue of righteousness, you will be able to keep these commandments and no longer add to your sins. If, therefore, you add nothing further, you will depart from your former sins. Walk, therefore, in these my commandments, and you will live to God. These things [all] have been spoken to you by me.”
translation:
  language: es
  text: Ustedes, por tanto, que se arrepienten, desechen los males de este siglo que los agobian; y, habiéndose revestido de toda virtud de justicia, podrán guardar estos mandamientos y ya no añadir a sus pecados. Si, por tanto, no añaden nada más, se alejarán de sus pecados anteriores. Caminen, pues, en estos mandamientos míos, y vivirán para Dios. Todas estas cosas les han sido dichas por mí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μετανοοῦντες / repenting
  english_pob_choice: repenting
  chosen_spanish: te estás arrepintiendo
  alternatives_spanish:
  - te arrepientes
  - estás en arrepentimiento
  lexicon: μετανοέω
  rationale: El contexto exhortativo conserva el sentido de cambio de conducta y vuelta moral; en español, el gerundio con valor progresivo expresa bien el proceso en curso sin volverlo demasiado técnico.
- source_word: τὰ κακὰ τοῦ αἰῶνος τούτου / the evils of this age
  english_pob_choice: the evils of this age
  chosen_spanish: los males de este siglo
  alternatives_spanish:
  - las maldades de esta era
  - los males de este mundo
  lexicon: αἰών
  rationale: «Siglo» mantiene la idea de una era o orden presente, sin reducirla a tiempo cronológico ni reemplazarla por una paráfrasis más amplia.
- source_word: ἀπόθεσθε / cast off
  english_pob_choice: cast off
  chosen_spanish: desecha
  alternatives_spanish:
  - despoja de ti
  - rechaza
  lexicon: ἀποτίθημι
  rationale: En español, «desecha» transmite la acción de quitarse de encima algo indeseable con fuerza imperativa y buena naturalidad.
- source_word: πᾶσαν ἀρετὴν δικαιοσύνης / every virtue of righteousness
  english_pob_choice: every virtue of righteousness
  chosen_spanish: toda virtud de justicia
  alternatives_spanish:
  - toda virtud de rectitud
  - toda virtud justa
  lexicon: ἀρετή; δικαιοσύνη
  rationale: Se conserva la relación entre virtud y justicia/rectitud. «Justicia» es la opción más directa y eclesialmente clara, aunque «rectitud» sigue siendo posible.
- source_word: ἐνδυσάμενοι / having put on
  english_pob_choice: having put on
  chosen_spanish: habiéndote revestido
  alternatives_spanish:
  - habiéndote puesto
  - vistiéndote
  lexicon: ἐνδύω
  rationale: «Revestido» mantiene la metáfora de vestirse con virtudes, más estable en español bíblico y literario que «puesto».
- source_word: ἐντολὰς ταύτας / these commandments
  english_pob_choice: these commandments
  chosen_spanish: estos mandamientos
  alternatives_spanish:
  - estos preceptos
  - estas órdenes
  lexicon: ἐντολή
  rationale: «Mandamientos» conserva el tono normativo del pasaje y sigue de cerca el campo semántico del original y de la traducción inglesa auditada.
- source_word: ζήσεσθε τῷ θεῷ / you will live to God
  english_pob_choice: you will live to God
  chosen_spanish: vivirás para Dios
  alternatives_spanish:
  - vivirás para Dios y a Dios
  - vivirás ante Dios
  lexicon: ζάω; θεός
  rationale: «Para Dios» reproduce la orientación del vivir hacia Dios sin introducir una formulación más interpretativa.
- source_word: πάντα ταῦτα λέλεκταί σοι δι’ ἐμοῦ / These things have been spoken to you by me
  english_pob_choice: These things [all] have been spoken to you by me
  chosen_spanish: Todas estas cosas te han sido dichas por mí
  alternatives_spanish:
  - Todo esto te ha sido dicho por mí
  - Estas cosas todas han sido dichas por mí
  lexicon: λέγω; πας
  rationale: La pasiva española conserva el valor de discurso concluido y la atribución explícita al hablante. «Todas estas cosas» integra el énfasis total del griego y evita una adición innecesaria al texto principal.
theological_decisions:
- issue: Relación entre arrepentimiento y obediencia
  english_pob_reading: You, therefore, who are repenting... keep these commandments and no longer add to your sins.
  chosen_spanish_reading: Tú, por tanto, que te estás arrepintiendo... podrás guardar estos mandamientos y ya no añadir a tus pecados.
  alternative_spanish_readings:
  - Tú, por tanto, que te arrepientes... podrás guardar estos mandamientos y no seguir pecando
  - Tú, por tanto, arrepentido...
  rationale: 'Se conserva la secuencia moral del pasaje: el arrepentimiento verdadero conduce a apartarse del pecado y a obedecer. No se suaviza la fuerza ética del texto con una formulación puramente interior.'
  doctrine_reference: Sant 1:22; Rom 6:1-2
- issue: «Vivirás para Dios» como orientación de vida
  english_pob_reading: you will live to God
  chosen_spanish_reading: vivirás para Dios
  alternative_spanish_readings:
  - vivirás a Dios
  - vivirás delante de Dios
  rationale: La frase se mantiene abierta sin convertirla en una fórmula doctrinal posterior. En español, «para Dios» preserva dirección, pertenencia y finalidad.
  doctrine_reference: Rom 14:8; Gál 2:19-20
- issue: Retención del carácter exhortativo directo
  english_pob_reading: Walk, therefore, in these my commandments
  chosen_spanish_reading: Camina, pues, en estos mandamientos míos
  alternative_spanish_readings:
  - Anda, pues, en estos mandamientos míos
  - Sigue, pues, estos mandamientos míos
  rationale: «Camina» conserva el imperativo moral continuo del original y la forma exhortativa de la traducción inglesa, sin convertirla en una simple instrucción puntual.
  doctrine_reference: Sal 119:1; 1 Jn 2:6
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete auditado; la presente propuesta sigue de cerca la lectura inglesa POB, cotejada con el griego normalizado proporcionado, sin introducir variantes textuales no documentadas.
  spanish_consistency_notes:
  - Se mantiene 'mandamientos' de forma uniforme para ἐντολαί.
  - Se usa 'justicia' en lugar de 'rectitud' para evitar oscilación semántica dentro del pasaje.
  - Se conserva 'Dios' sin mayúsculas reverenciales adicionales.
  - Se mantiene el tratamiento de segunda persona singular como en el español bíblico directo del exhortativo.
