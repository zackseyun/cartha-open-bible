  text: “I rejoiced, Sir,” I say, “when I heard this explanation.”
translation:
  language: es
  text: «Me alegré, señor», dije, «cuando oí esta explicación».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐχάρην
  english_pob_choice: I rejoiced
  chosen_spanish: Me alegré
  alternatives_spanish:
  - me regocijé
  - me llené de gozo
  lexicon: χαίρω
  rationale: En español, «me alegré» comunica de forma natural el gozo expresado por el aoristo griego, sin sonar mecánico. «Me regocijé» es más elevado, pero menos idiomático; «me llené de gozo» explicita más de lo que exige el texto.
- source_word: Κύριε
  english_pob_choice: Sir
  chosen_spanish: señor
  alternatives_spanish:
  - señor mío
  - maestro
  lexicon: κύριος
  rationale: Aquí el griego funciona como tratamiento respetuoso, no como designación divina. Por eso se usa «señor» en minúscula, preservando el matiz de cortesía del original y del inglés POB.
- source_word: ἐπύθόμην
  english_pob_choice: when I heard
  chosen_spanish: cuando oí
  alternatives_spanish:
  - cuando escuché
  - cuando supe
  lexicon: πυνθάνομαι
  rationale: El verbo griego implica recibir noticia o enterarse; el inglés POB opta por «heard». En español, «oí» mantiene esa recepción auditiva/informativa de manera breve y fiel.
- source_word: ταύτην τὴν ἐξήγησιν
  english_pob_choice: this explanation
  chosen_spanish: esta explicación
  alternatives_spanish:
  - esta interpretación
  - esta aclaración
  lexicon: ἐξήγησις
  rationale: «Explicación» reproduce bien el sentido de aclaración expositiva. «Interpretación» podría sugerir una lectura más técnica de la que el contexto inmediato requiere.
theological_decisions:
- issue: Tratamiento de Κύριε como fórmula de respeto
  english_pob_reading: Sir
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - Señor
  rationale: No hay aquí evidencia contextual de que el vocativo apunte al título divino. Mantener minúscula evita introducir una lectura cristológica o devocional no sustentada por el segmento.
  doctrine_reference: Distinción entre vocativo de cortesía y título divino en narración cristiana primitiva
translation_notes:
  revision_awareness: El texto fuente es una línea breve y estable; no se registran revisiones aplicadas en el paquete. La traducción sigue el sentido directo del griego y el registro del inglés POB sin añadir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene una puntuación dialogal natural en español con comillas angulares.
  - «señor» se deja en minúscula por ser un tratamiento respetuoso, no un nombre divino.
  - La frase conserva la concisión del original sin añadir explicaciones devocionales.
