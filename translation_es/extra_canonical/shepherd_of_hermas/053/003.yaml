base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/053/003.yaml
  text: “But if, Sir,” I say, “there has been some former ignorance before these words were heard, how will the man who has defiled his flesh be saved?”
translation:
  language: es
  text: «Pero si, señor, antes de oírse estas palabras había alguna ignorancia previa, ¿cómo será salvo el hombre que ha contaminado su carne?»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δέ, κύριε
  english_pob_choice: But if, Sir
  chosen_spanish: «Pero si, señor
  alternatives_spanish:
  - «Pero si, Señor
  - «Mas si, señor
  lexicon: conectivo adversativo; vocativo
  rationale: Mantengo el giro adversativo simple de la pregunta y el vocativo respetuoso. Opto por minúscula en «señor» porque aquí funciona como tratamiento humano, no como título divino.
- source_word: πρότερον ἄγνοια
  english_pob_choice: some former ignorance
  chosen_spanish: alguna ignorancia anterior
  alternatives_spanish:
  - cierta ignorancia previa
  - alguna ignorancia previa
  lexicon: ἀγνοία
  rationale: «Ignorancia» conserva la fuerza cognitiva del término; «anterior» refleja πρότερον sin volver la frase pesada. «Alguna» reproduce el matiz indefinido del inglés POB.
- source_word: πρὸ τοῦ ἀκουσθῆναι ταῦτα
  english_pob_choice: before these words were heard
  chosen_spanish: antes de oírse estas palabras
  alternatives_spanish:
  - antes de que se oyeran estas palabras
  - antes de escucharse estas palabras
  lexicon: ἀκούω
  rationale: El griego pasivo se vierte de forma natural en español con infinitivo impersonal. «Oírse» preserva la pasividad sin introducir un sujeto ajeno al texto.
- source_word: πῶς σωθήσεται
  english_pob_choice: how will ... be saved
  chosen_spanish: ¿cómo será salvo ...?
  alternatives_spanish:
  - ¿cómo se salvará ...?
  - ¿de qué modo podrá ser salvo ...?
  lexicon: σῴζω
  rationale: Conservo «será salvo» porque refleja mejor la pasiva futura y la carga soteriológica del original, evitando una formulación más interpretativa.
- source_word: ὁ τὴν σάρκα αὐτοῦ μιαίνων
  english_pob_choice: the man who has defiled his flesh
  chosen_spanish: el hombre que ha contaminado su carne
  alternatives_spanish:
  - el hombre que ha mancillado su carne
  - el hombre que ha profanado su carne
  lexicon: σάρξ
  rationale: «Carne» es la correspondencia directa de σάρξ y conserva el campo semántico corporal/moral. «Contaminado» reproduce la idea de manchar/ensuciar del participio sin forzar un tecnicismo ajeno al español.
theological_decisions:
- issue: La referencia a la salvación en una pregunta retórica
  english_pob_reading: how will the man who has defiled his flesh be saved?
  chosen_spanish_reading: ¿cómo será salvo el hombre que ha contaminado su carne?
  alternative_spanish_readings:
  - ¿cómo se salvará el hombre que ha contaminado su carne?
  - ¿cómo podrá ser salvo el hombre que ha contaminado su carne?
  rationale: Mantengo la pregunta como una apelación seria sobre la posibilidad de salvación tras la impureza moral/corporal, sin resolver el alcance doctrinal en la traducción. La pasiva conserva la ambigüedad retórica del griego y del inglés POB.
  doctrine_reference: soteriology; moral impurity and salvation language
translation_notes:
  revision_awareness: No hay revisiones aplicadas ni notas previas en el paquete; la redacción sigue de cerca el griego normalizado y el sentido auditado del inglés POB, sin añadir glosas interpretativas.
  spanish_consistency_notes:
  - Uso «señor» en minúscula para el vocativo humano.
  - Conservo «carne» para σάρξ y «salvo» para σῴζω.
  - La puntuación mantiene la estructura interrogativa directa del original.
