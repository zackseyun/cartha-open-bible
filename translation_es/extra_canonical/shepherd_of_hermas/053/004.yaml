review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego y del audit trail inglés: solo Dios puede dar curación respecto de las ignorancias pasadas; luego viene la exhortación a guardarse para que el Señor, el Todopoderoso, conceda curación. También preserva bien la relación entre carne y espíritu y la idea de contaminación mutua.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero tiene varios giros poco naturales en español general: «dar curación acerca de ellas», «de él es toda autoridad» y sobre todo «ambos están en común». Además, en «conserva puros a ambos» el singular tuteante no concuerda con «ambos» como complemento directo inanimado de manera idiomática; suena mejor «mantén puros a los dos» o reformular con sustantivos.'
  glossary_alignment: 'La terminología clave está bien encaminada: «Dios», «el Señor» para κύριος en este contexto, «el Todopoderoso» para παντοκράτωρ, «carne» para σάρξ y «espíritu» para πνεῦμα. La principal corrección necesaria es estilística-semántica en κοινά: «están en común» no refleja español natural; «están unidos» o «son compartidos» comunica mejor la inseparabilidad argumentativa del pasaje.'
  issues:
  - severity: medium
    issue: 'Expresiones no idiomáticas: «dar curación acerca de ellas» y «de él es toda autoridad».'
    rationale: Aunque comprensibles, estas formulaciones suenan calcadas. «dar curación de ellas» / «traer sanidad de ellas» y «toda autoridad le pertenece» preservan el sentido con español más natural.
  - severity: medium
    issue: «ambos están en común» no es español natural y debilita el argumento de κοινά.
    rationale: La frase no suena propia del español e introduce opacidad donde el pasaje enfatiza la condición compartida o unida de carne y espíritu. «ambos están unidos» comunica la inseparabilidad ética del contexto.
  - severity: low
    issue: «conserva puros a ambos» es torpe en español.
    rationale: La combinación verbal y pronominal resulta poco idiomática. «mantén puros a ambos» o «mantén puros a los dos» suena mejor sin alterar el sentido.
  revised_spanish_text: «En cuanto a las ignorancias pasadas», dice, «solo Dios puede dar curación de ellas, porque toda autoridad le pertenece. Pero ahora cuídate, y el Señor, el Todopoderoso, lleno de compasión, dará curación por las ignorancias pasadas, si desde ahora no contaminas tu carne ni tu espíritu; porque ambos están unidos y no pueden ser contaminados el uno sin el otro. Por tanto, mantén puros a ambos, y vivirás para Dios».
  revision_rationale: La revisión mantiene todas las decisiones exegéticas del borrador, pero corrige tres puntos de español no natural. Se reemplaza «acerca de ellas» por «de ellas» y «de él es toda autoridad» por «toda autoridad le pertenece» para mejorar fluidez sin pérdida semántica. Se cambia «están en común» por «están unidos» para expresar de forma idiomática la inseparabilidad de carne y espíritu. Finalmente, «conserva puros a ambos» se ajusta a «mantén puros a ambos» por naturalidad. No se requieren notas nuevas.
