revisions:
- from: «En cuanto a las ignorancias pasadas», dice, «solo Dios puede dar curación acerca de ellas; porque de él es toda autoridad. Pero ahora cuídate, y el Señor, el Todopoderoso, lleno de compasión, dará curación por las ignorancias pasadas, si desde ahora no contaminas tu carne ni tu espíritu; porque ambos están en común y no pueden ser contaminados el uno sin el otro. Por tanto, conserva puros a ambos, y vivirás para Dios».
  to: «En cuanto a las ignorancias pasadas», dice, «solo Dios puede dar curación de ellas, porque toda autoridad le pertenece. Pero ahora cuídate, y el Señor, el Todopoderoso, lleno de compasión, dará curación por las ignorancias pasadas, si desde ahora no contaminas tu carne ni tu espíritu; porque ambos están unidos y no pueden ser contaminados el uno sin el otro. Por tanto, mantén puros a ambos, y vivirás para Dios».
  rationale: La revisión mantiene todas las decisiones exegéticas del borrador, pero corrige tres puntos de español no natural. Se reemplaza «acerca de ellas» por «de ellas» y «de él es toda autoridad» por «toda autoridad le pertenece» para mejorar fluidez sin pérdida semántica. Se cambia «están en común» por «están unidos» para expresar de forma idiomática la inseparabilidad de carne y espíritu. Finalmente, «conserva puros a ambos» se ajusta a «mantén puros a ambos» por naturalidad. No se requieren notas nuevas.
