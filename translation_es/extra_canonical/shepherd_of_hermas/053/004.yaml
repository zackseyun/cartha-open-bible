base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/053/004.yaml
  text: “As to former ignorances,” he says, “God alone is able to give healing concerning them; for all authority is his. But now guard yourself, and the Lord, the Almighty—being full of compassion—will give healing for former ignorances, if from now on you do not defile your flesh or the spirit; for both are shared and cannot be defiled apart from one another. Therefore keep both pure, and you will live to God.”
translation:
  language: es
  text: «En cuanto a las ignorancias pasadas», dice, «solo Dios puede dar curación de ellas, porque toda autoridad le pertenece. Pero ahora cuídate, y el Señor, el Todopoderoso, lleno de compasión, dará curación por las ignorancias pasadas, si desde ahora no contaminas tu carne ni tu espíritu; porque ambos están unidos y no pueden ser contaminados el uno sin el otro. Por tanto, mantén puros a ambos, y vivirás para Dios».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀγνοήματα / ignorant matters
  english_pob_choice: former ignorances
  chosen_spanish: ignorancias pasadas
  alternatives_spanish:
  - faltas pasadas de conocimiento
  - desconocimientos anteriores
  lexicon: ἀγνόημα
  rationale: La expresión griega apunta a pecados o faltas vinculadas con ignorancia; «ignorancias pasadas» conserva la forma auditada del inglés POB y mantiene la ambigüedad entre desconocimiento y culpa sin volverla interpretativa de más.
- source_word: ἰᾶσθαι / healing
  english_pob_choice: give healing
  chosen_spanish: dar curación
  alternatives_spanish:
  - sanar
  - dar sanidad
  lexicon: ἰάομαι
  rationale: «Curación» mantiene el sustantivo concreto del texto y evita una expansión doctrinal. «Sanidad» sería posible, pero «curación» suena más cercano al valor literal del verbo y del sustantivo en este contexto.
- source_word: ἐξουσία
  english_pob_choice: all authority is his
  chosen_spanish: de él es toda autoridad
  alternatives_spanish:
  - toda autoridad le pertenece
  - todo poder es suyo
  lexicon: ἐξουσία
  rationale: Se conserva el matiz de autoridad soberana; «poder» desplaza el término hacia fuerza, mientras que «autoridad» sigue de cerca el sentido del griego y el audit trail inglés.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Amo
  lexicon: κύριος
  rationale: Aquí el texto griego usa κύριος sin un marcador explícito del nombre divino en la cláusula citada; por ello se mantiene «el Señor» como en la tradición cristiana del pasaje, sin forzar una sustitución por Yahvé en un eco no explícito.
- source_word: ὁ παντοκράτωρ
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - el Soberano de todo
  lexicon: παντοκράτωρ
  rationale: «Todopoderoso» es la equivalencia española natural y tradicional para παντοκράτωρ, conservando el título divino sin sobreexplicarlo.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  - naturaleza humana
  lexicon: σάρξ
  rationale: «Carne» conserva el término antropológico-teológico del original y la tensión entre lo corporal y lo moral; «cuerpo» sería demasiado estrecho y «naturaleza humana» demasiado interpretativo.
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - Espíritu
  - aliento
  lexicon: πνεῦμα
  rationale: Se traduce en minúscula como «espíritu» porque el contexto contrasta las dimensiones de la persona; no hay aquí un marcador inequívoco del Espíritu Santo.
- source_word: κοινά
  english_pob_choice: are shared
  chosen_spanish: están en común
  alternatives_spanish:
  - son comunes
  - pertenecen juntos
  lexicon: κοινός
  rationale: La frase intenta conservar la idea de pertenencia compartida/unidad de las dos esferas; «están en común» resulta algo literal pero claro en español, y mantiene el argumento del texto sobre la inseparabilidad.
- source_word: μίαν ... χωρὶς τοῦ ἄλλου
  english_pob_choice: cannot be defiled apart from one another
  chosen_spanish: no pueden ser contaminados el uno sin el otro
  alternatives_spanish:
  - no puede contaminarse uno sin el otro
  - no pueden ser profanados separados
  lexicon: χωρίς
  rationale: La estructura refleja la reciprocidad de la cláusula griega. «Contaminados» reproduce el campo semántico moral/ritual del contexto mejor que un mero «dañados».
- source_word: ζήσεσθε τῷ θεῷ
  english_pob_choice: you will live to God
  chosen_spanish: vivirás para Dios
  alternatives_spanish:
  - vivirás para Dios
  - vivirás ante Dios
  lexicon: ζάω + dative
  rationale: «Vivirás para Dios» conserva la orientación teleológica del dativo; «ante Dios» matizaría la relación pero no expresa tan bien el sentido de dedicación o pertenencia implícito.
theological_decisions:
- issue: ¿La curación de las ignorancias pasadas la da solo Dios, o también el Señor el Todopoderoso en la segunda cláusula?
  english_pob_reading: Only God is able to give healing concerning former ignorances; later, the Lord, the Almighty, will give healing if the addressee keeps pure.
  chosen_spanish_reading: Solo Dios puede dar curación acerca de las ignorancias pasadas; más adelante, el Señor, el Todopoderoso, dará curación si el destinatario se guarda puro.
  alternative_spanish_readings:
  - Solo Dios puede sanar las ignorancias pasadas; después, el Señor, el Todopoderoso, sanará si el destinatario se guarda puro.
  - Dios y el Señor, el Todopoderoso, se refieren al mismo agente de curación en ambas cláusulas.
  rationale: 'Se mantiene la tensión auditada por el inglés POB: una primera afirmación de la capacidad exclusiva de Dios y una segunda promesa formulada con «el Señor, el Todopoderoso». No se armonizan ambas cláusulas en una sola lectura para no borrar la textura del pasaje.'
  doctrine_reference: Distinción funcional entre la prerrogativa divina y la mediación del Señor; no se fuerza una resolución trinitaria o cristológica no explicitada por el texto.
- issue: ¿'flesh and spirit' debe entenderse como dos aspectos inseparables de la persona o como una referencia más amplia al ser humano?
  english_pob_reading: Both are shared and cannot be defiled apart from one another.
  chosen_spanish_reading: Carne y espíritu son ámbitos unidos e inseparables en la ética del pasaje.
  alternative_spanish_readings:
  - Carne y espíritu son simplemente el cuerpo y el interior de la persona.
  - Carne y espíritu designan dos esferas que se contaminan mutuamente.
  rationale: La traducción conserva la dualidad del original sin reducirla a una antropología moderna ni espiritualizarla en exceso. El argumento del texto depende de que ambos términos permanezcan distintos y vinculados.
  doctrine_reference: Antropología moral en literatura cristiana primitiva; relación inseparable entre conducta corporal y vida espiritual.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; la versión española sigue de cerca la lectura inglesa óptima y el griego subyacente sin introducir notas textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene 'ignorancias pasadas' para conservar la huella auditada del inglés POB y el tono del griego.
  - Se usa 'carne' y 'espíritu' de forma consistente para preservar la pareja antropológica del pasaje.
  - Se mantiene 'Señor' en la cláusula citada porque el griego presenta κύριος sin un explicitador adicional del nombre divino en ese punto.
  - Se evita 'sanidad' en favor de 'curación' para no cargar el texto con un registro eclesial posterior no necesario aquí.
