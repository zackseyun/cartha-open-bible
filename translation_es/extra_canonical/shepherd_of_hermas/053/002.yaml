review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego según el rastro inglés: exhortación a mantener pura la carne, relación entre carne y espíritu, advertencia contra pensar que la carne es perecedera y usarla para impureza, y la consecuencia de contaminar también al Espíritu Santo. Sin embargo, hay un problema importante de referencia pronominal en «le dé testimonio», que en español queda ambiguo y no expresa bien «bear witness to it», donde el antecedente es la carne. También «se levante en tu corazón que...» suena forzado; conviene una formulación más natural sin perder la imagen de surgimiento interior.'
  spanish_quality_summary: El español es en general claro y digno, con buena preservación de «carne», «justificada» y «contaminar». No obstante, «le dé testimonio» resulta poco idiomático y ambiguo, y «la uses mal» suena algo coloquial para el registro. Una leve revisión mejora legibilidad y precisión sin apartarse del original.
  glossary_alignment: 'Buena alineación con las pautas del proyecto: σάρξ -> «carne», πνεῦμα -> «espíritu» inicialmente y «Espíritu Santo» después, δικαιόω -> «justificada». No aparecen términos del glosario mayor que requieran ajuste. La revisión propuesta mantiene esta alineación.'
  issues:
  - severity: medium
    issue: Ambigüedad en «para que el espíritu que habita en ella le dé testimonio»
    rationale: En español, «le» no deja claro a qué se da testimonio. El inglés y el sentido del pasaje apuntan a que el espíritu da testimonio de la carne; conviene explicitarlo con «dé testimonio de ella».
  - severity: low
    issue: «se levante en tu corazón que...» es poco natural
    rationale: Aunque calca la estructura de surgimiento interior, en español suena rígido. «surja en tu corazón la idea de que...» conserva el sentido exhortativo con mayor naturalidad.
  - severity: low
    issue: «la uses mal en alguna impureza» puede sonar coloquial
    rationale: La idea es de mal uso con finalidad o en ámbito de impureza moral. «la uses indebidamente en alguna impureza» suena más digno y preciso, sin añadir contenido.
