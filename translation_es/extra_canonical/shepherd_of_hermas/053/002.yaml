revisions:
- from: '«Escucha ahora», dice: «Mantén esta carne tuya pura e incontaminada, para que el espíritu que habita en ella le dé testimonio, y tu carne sea justificada. Cuídate, no sea que alguna vez se levante en tu corazón que esta carne tuya es perecedera, y la uses mal en alguna impureza. Porque si contaminas tu carne, también contaminarás al Espíritu Santo; y si contaminas la carne, no vivirás».'
  to: '«Escucha ahora», dice: «Mantén esta carne tuya pura e incontaminada, para que el espíritu que habita en ella dé testimonio de ella, y tu carne sea justificada. Cuídate, no sea que alguna vez surja en tu corazón la idea de que esta carne tuya es perecedera, y la uses indebidamente en alguna impureza. Porque si contaminas tu carne, también contaminarás al Espíritu Santo; y si contaminas la carne, no vivirás».'
  rationale: 'Se corrigen dos puntos principales: la referencia de «bear witness to it» se vuelve clara e idiomática con «dé testimonio de ella», y la advertencia interior se formula con español más natural mediante «surja en tu corazón la idea de que». Además, «uses indebidamente» eleva ligeramente el registro y evita coloquialidad, preservando el mismo sentido moral del original.'
