base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/053/002.yaml
  text: '“Listen now,” he says: “Keep this flesh of yours pure and undefiled, so that the spirit that dwells in it may bear witness to it, and your flesh may be justified. Watch lest it ever rise up in your heart that this flesh of yours is perishable, and you misuse it in some defilement. For if you defile your flesh, you will also defile the Holy Spirit; and if you defile the flesh, you will not live.”'
translation:
  language: es
  text: '«Escucha ahora», dice: «Mantén esta carne tuya pura e incontaminada, para que el espíritu que habita en ella dé testimonio de ella, y tu carne sea justificada. Cuídate, no sea que alguna vez surja en tu corazón la idea de que esta carne tuya es perecedera, y la uses indebidamente en alguna impureza. Porque si contaminas tu carne, también contaminarás al Espíritu Santo; y si contaminas la carne, no vivirás».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Listen now
  english_pob_choice: Listen now
  chosen_spanish: Escucha ahora
  alternatives_spanish:
  - Oye ahora
  - Escucha
  lexicon: ἀκούω
  rationale: Imperative directivo breve y natural en español; 'Escucha ahora' conserva el arranque exhortativo sin sonar arcaico.
- source_word: Keep this flesh of yours pure and undefiled
  english_pob_choice: Keep this flesh of yours pure and undefiled
  chosen_spanish: Mantén esta carne tuya pura e incontaminada
  alternatives_spanish:
  - Guarda este cuerpo tuyo puro y sin mancha
  - Conserva esta carne tuya limpia e incontaminada
  lexicon: σάρξ
  rationale: Se preserva 'carne' por el valor antropológico y moral del término; 'incontaminada' refuerza el paralelo con el verbo 'contaminar' del final del pasaje.
- source_word: the spirit that dwells in it
  english_pob_choice: the spirit that dwells in it
  chosen_spanish: el espíritu que habita en ella
  alternatives_spanish:
  - el Espíritu que mora en ella
  - el espíritu que reside en ella
  lexicon: πνεῦμα
  rationale: '''espíritu'' en minúscula refleja el griego sin forzar aquí una referencia explícita al Espíritu Santo; se mantiene la indeterminación del original antes de la clausula final.'
- source_word: may bear witness to it
  english_pob_choice: may bear witness to it
  chosen_spanish: le dé testimonio
  alternatives_spanish:
  - le dé testimonio a ella
  - testifique de ella
  lexicon: μαρτυρέω
  rationale: '''Dar testimonio'' es idiomático y conserva la idea forense/confirmatoria del verbo.'
- source_word: your flesh may be justified
  english_pob_choice: your flesh may be justified
  chosen_spanish: tu carne sea justificada
  alternatives_spanish:
  - tu carne sea declarada justa
  - tu carne sea vindicada
  lexicon: δικαιόω
  rationale: '''Justificada'' conserva la conexión léxica con justicia/justificación y el eco jurídico del término; se evita ''vindicada'' por ser menos transparente aquí.'
- source_word: Watch lest it ever rise up in your heart
  english_pob_choice: Watch lest it ever rise up in your heart
  chosen_spanish: Cuídate, no sea que alguna vez se levante en tu corazón
  alternatives_spanish:
  - Vigila, no sea que llegue a surgir en tu corazón
  - Mira que no se levante nunca en tu corazón
  lexicon: βλέπω / ἐγείρω
  rationale: '''Cuídate, no sea que'' reproduce la advertencia preventiva; ''se levante en tu corazón'' conserva la imagen de una idea que se alza o surge interiormente.'
- source_word: this flesh of yours is perishable
  english_pob_choice: this flesh of yours is perishable
  chosen_spanish: esta carne tuya es perecedera
  alternatives_spanish:
  - esta carne tuya es corruptible
  - esta carne tuya pasa y muere
  lexicon: φθαρτός
  rationale: '''Perecedera'' comunica con claridad la condición temporal y mortal del cuerpo/carne sin añadir matices que no están explicitados.'
- source_word: and you misuse it in some defilement
  english_pob_choice: and you misuse it in some defilement
  chosen_spanish: y la uses mal en alguna impureza
  alternatives_spanish:
  - y la profanes con alguna inmundicia
  - y la emplees mal en alguna contaminación
  lexicon: μιαίνω / ἀκαθαρσία
  rationale: '''Usar mal'' recoge el abuso práctico; ''impureza'' mantiene el campo semántico de contaminación moral y sexual sin especificar más de lo que el texto dice.'
- source_word: if you defile your flesh, you will also defile the Holy Spirit
  english_pob_choice: if you defile your flesh, you will also defile the Holy Spirit
  chosen_spanish: si contaminas tu carne, también contaminarás al Espíritu Santo
  alternatives_spanish:
  - si profanas tu carne, también profanarás al Espíritu Santo
  - si manchas tu carne, también mancharás al Espíritu Santo
  lexicon: μιαίνω
  rationale: '''Contaminar'' preserva la repetición verbal y la fuerza de contaminación ritual/moral; se aplica también al Espíritu Santo porque así lo formula el original y el audit trail inglés.'
- source_word: and if you defile the flesh, you will not live
  english_pob_choice: and if you defile the flesh, you will not live
  chosen_spanish: y si contaminas la carne, no vivirás
  alternatives_spanish:
  - y si profanas la carne, no vivirás
  - y si manchas la carne, no vivirás
  lexicon: ζάω
  rationale: Se mantiene la consecuencia directa y sobria del griego; 'no vivirás' conserva ambigüedad entre vida presente y escatológica sin explicitarla.
theological_decisions:
- issue: Relación entre 'espíritu que habita en ella' y 'Espíritu Santo'
  english_pob_reading: The text first speaks of 'the spirit that dwells in it' and later of 'the Holy Spirit' as distinct referents in the English form, while maintaining close association.
  chosen_spanish_reading: Se conserva la distinción inicial entre 'espíritu' y 'Espíritu Santo', sin capitalizar el primero.
  alternative_spanish_readings:
  - el Espíritu que habita en ella
  - el espíritu/ Espíritu Santo como referencia única desde el inicio
  rationale: 'El griego permite mantener la ambigüedad o distinción del texto: primero un ''espíritu'' residente en la carne, y luego la mención explícita del ''Espíritu Santo''. La minúscula evita imponer una identificación no señalada por el contexto inmediato.'
  doctrine_reference: Pneumatología y distinción contextual entre πνεῦμα y τὸ πνεῦμα τὸ ἅγιον
- issue: '''Tu carne sea justificada'' en un texto exhortativo-moral'
  english_pob_reading: your flesh may be justified
  chosen_spanish_reading: tu carne sea justificada
  alternative_spanish_readings:
  - tu carne sea declarada justa
  - tu carne sea vindicada
  rationale: Aunque 'justificada' es una expresión fuerte para 'carne', el texto la usa deliberadamente y conviene conservarla para no suavizar la tensión teológica/moral del pasaje. En español, 'justificada' mantiene el eco forense y la rareza expresiva.
  doctrine_reference: Justificación y lenguaje forense aplicado a la carne en literatura cristiana primitiva
- issue: La advertencia de que al contaminar la carne se contamina al Espíritu Santo
  english_pob_reading: if you defile your flesh, you will also defile the Holy Spirit
  chosen_spanish_reading: si contaminas tu carne, también contaminarás al Espíritu Santo
  alternative_spanish_readings:
  - si profanas tu carne, también profanarás al Espíritu Santo
  - si mancillas tu carne, también mancillarás al Espíritu Santo
  rationale: Se conserva la dureza del enunciado sin atenuarlo; el texto vincula moralidad corporal con afectación al Espíritu Santo, y la traducción no debe suavizar esa conexión.
  doctrine_reference: Santidad del cuerpo y del Espíritu Santo en exhortación moral cristiana
translation_notes:
  revision_awareness: No hay notas críticas, revisiones ni variantes registradas en el paquete inglés; por ello la traducción se apoya directamente en el texto griego normalizado y en la formulación auditada de la POB inglesa, conservando sus repeticiones y tensiones léxicas.
  spanish_consistency_notes:
  - Se usa 'carne' de manera uniforme para σάρξ, sin sustituirla por 'cuerpo', porque el pasaje trabaja la moralidad de la carne como tal.
  - Se mantiene 'contaminar' para el mismo verbo en ambas ocurrencias finales para preservar la repetición enfática.
  - Se reserva 'Espíritu Santo' con mayúsculas para la mención explícita final, mientras que 'espíritu' aparece en minúscula en la frase inicial.
  - Se conserva la cadencia exhortativa y la estructura condicional del original sin añadir explicaciones interpretativas.
