  revision_rationale: 'Se corrigen dos puntos principales: la referencia de «bear witness to it» se vuelve clara e idiomática con «dé testimonio de ella», y la advertencia interior se formula con español más natural mediante «surja en tu corazón la idea de que». Además, «uses indebidamente» eleva ligeramente el registro y evita coloquialidad, preservando el mismo sentido moral del original.'
