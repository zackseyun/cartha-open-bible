review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general la estructura dialogal y el sentido del griego según la auditoría inglesa: pregunta por cuáles obras del mal deseo entregan a la muerte, seguida por la respuesta introductoria. Sin embargo, dos giros españoles no preservan bien el sentido idiomático: «Háztelos conocer» es antinatural y no corresponde al valor de ‘make them known to me’, y «por qué hechos» cambia el sentido de ‘by what deeds’ hacia causal-interrogativo en vez de medio/instrumento. También conviene ajustar «mal deseo» a «deseo malo» o reformular para mejor naturalidad sin perder el vínculo léxico.'
  spanish_quality_summary: La legibilidad es aceptable, pero hay calcos poco naturales. «Hechos de mal deseo» suena rígido; «obras del deseo malo» o «acciones del deseo malo» es más claro y digno. «Háztelos conocer» debe reemplazarse por «dámelos a conocer» o «dámelos a conocer». Además, el texto final necesita «por medio de qué obras» o «mediante qué obras» para expresar correctamente el instrumental. La nota [a] es innecesaria si se adopta «da muerte» en el texto, pues «mata» no añade una ambigüedad significativa que requiera nota.
  glossary_alignment: Se alinea bien con la terminología del proyecto en «los esclavos de Dios», preservando la fuerza de slave/slaves. «Dios» está correcto. No hay términos mesiánicos o del nombre divino en juego. La elección de «da muerte» es aceptable para ‘puts ... to death’, aunque «mata» también sería válida; no requiere nota obligatoria.
  issues:
  - severity: medium
    issue: «Háztelos conocer» es español poco natural y semánticamente deficiente.
    rationale: La petición del hablante es ‘dámelos a conocer’/‘hazme saber cuáles son’, no una construcción reflexiva con pronombre objeto que suena forzada y distrae del sentido.
  - severity: high
    issue: «por qué hechos» traduce mal el valor de ‘by what deeds’.
    rationale: 'En español, «por qué» suele entenderse como ‘why’; aquí el sentido es instrumental: ‘por medio de qué obras/acciones’.'
  - severity: medium
    issue: «hechos de mal deseo» es demasiado calcado y poco idiomático.
    rationale: Aunque comprensible, la frase resulta dura en español. «Obras del deseo malo» conserva el vínculo entre obras y deseo sin sonar torpe.
  - severity: low
    issue: La nota textual [a] no es necesaria.
    rationale: «Da muerte» y «mata» son alternativas léxicas cercanas; la nota no preserva una variante fuente ni resuelve una ambigüedad española real.
  revised_spanish_text: 3. «¿Qué obras del deseo malo», digo, «entregan a las personas a la muerte, señor? Dámelas a conocer, para que pueda apartarme de ellas». «Escucha», [dice], «por medio de qué obras el deseo malo da muerte a los esclavos de Dios».
  revision_rationale: 'Se corrigen dos problemas de fidelidad e idiomaticidad: «Dámelas a conocer» expresa naturalmente ‘make them known to me’, y «por medio de qué obras» conserva el valor instrumental del original. También se suaviza el calco «hechos de mal deseo» a «obras del deseo malo», manteniendo la relación léxica sin perder claridad. Se elimina la nota por no ser necesaria.'
