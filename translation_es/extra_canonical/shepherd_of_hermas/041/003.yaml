  text: 3. “What deeds of evil desire,” I say, “hand people over to death, sir? Make them known to me, so that I may keep away from them.” “Listen,” [he says,] “by what deeds evil desire puts the slaves of God to death.”
translation:
  language: es
  text: 3. «¿Qué obras del deseo malo», digo, «entregan a las personas a la muerte, señor? Dámelas a conocer, para que pueda apartarme de ellas». «Escucha», [dice], «por medio de qué obras el deseo malo da muerte a los esclavos de Dios».
