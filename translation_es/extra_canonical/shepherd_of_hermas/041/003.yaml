  footnotes: []
lexical_decisions:
- source_word: deeds of evil desire
  english_pob_choice: deeds of evil desire
  chosen_spanish: hechos de mal deseo
  alternatives_spanish:
  - obras del mal deseo
  - acciones del mal deseo
  lexicon: deeds; evil desire
  rationale: Conservo la relación estrecha entre las ‘obras/hechos’ y el ‘mal deseo’ sin suavizarla; ‘hechos’ mantiene la concretez del griego y ‘mal deseo’ refleja el impulso desordenado sin introducir una psicologización no explicitada.
- source_word: people
  english_pob_choice: people
  chosen_spanish: las personas
  alternatives_spanish:
  - los hombres
  - la gente
  lexicon: people
  rationale: ‘Las personas’ es neutro y claro en español actual; evita masculinizar innecesariamente y mantiene el sentido general del original.
- source_word: slaves of God
  english_pob_choice: slaves of God
  chosen_spanish: los esclavos de Dios
  alternatives_spanish:
  - los siervos de Dios
  - los servidores de Dios
  lexicon: slaves; God
  rationale: Mantengo ‘esclavos’ porque la POB inglesa eligió ‘slaves’ por fuerza lexical; ‘siervos’ suavizaría indebidamente la tensión de pertenencia y dependencia absoluta.
- source_word: put ... to death
  english_pob_choice: puts ... to death
  chosen_spanish: da muerte
  alternatives_spanish:
  - mata
  - hace morir
  lexicon: kill; put to death
  rationale: ‘Da muerte’ conserva la formulación directa pero no excesivamente cruda del original y funciona bien en español bíblico contemporáneo.
theological_decisions:
- issue: Identificación del mal deseo como agente de muerte espiritual/moral
  english_pob_reading: evil desire puts the slaves of God to death
  chosen_spanish_reading: el mal deseo da muerte a los esclavos de Dios
  alternative_spanish_readings:
  - el mal deseo mata a los esclavos de Dios
  - el deseo malo da muerte a los esclavos de Dios
  rationale: 'La versión española conserva la causalidad atribuida al deseo desordenado sin convertirla en mera metáfora moral. Mantiene la tensión del texto: el deseo actúa como poder mortal contra los pertenecientes a Dios.'
  doctrine_reference: Antropología moral; ascética cristiana primitiva
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cualquier nota al pie esté anclada explícitamente en el texto. No se introduce material ajeno al breve pasaje, y se mantiene la estructura dialogal y la fuerza lexical de ‘esclavos’.
  spanish_consistency_notes:
  - Se conserva el tratamiento directo «señor» para el vocativo del diálogo.
  - Se mantiene la alternancia de primera persona («digo», «escucha») propia del intercambio del texto fuente.
  - La nota al pie está anclada únicamente en la frase correspondiente, sin marcadores sueltos.
