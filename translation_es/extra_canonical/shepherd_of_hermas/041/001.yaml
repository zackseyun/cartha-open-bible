base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/041/001.yaml
  text: 'He says to me: “Remove from yourself every evil desire, but clothe yourself with the desire that is good and dignified; for when you are clothed with this desire, you will hate the evil desire and you will bridle it as you wish.'
translation:
  language: es
  text: 'Él me dice: «Quita de ti todo mal deseo, pero vístete del deseo que es bueno y digno; porque cuando estés vestido con este deseo, aborrecerás el mal deseo y lo dominarás como quieras»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «lo dominarás como quieras» traduce el sentido de un verbo griego de sometimiento o superioridad; también puede entenderse como «lo refrenarás como quieras».
    reason: alternative_reading
lexical_decisions:
- source_word: κακός ἐπιθυμία / evil desire
  english_pob_choice: evil desire
  chosen_spanish: mal deseo
  alternatives_spanish:
  - deseo malo
  - deseo perverso
  - deseo maligno
  lexicon: ἐπιθυμία
  rationale: Conserva la fuerza moral negativa de la expresión sin introducir una paráfrasis más amplia que el griego. «Mal deseo» mantiene el contraste directo con «el deseo que es bueno y digno».
- source_word: ἀγαθός καί σεμνός / good and dignified
  english_pob_choice: good and dignified
  chosen_spanish: bueno y digno
  alternatives_spanish:
  - bueno y honorable
  - bueno y respetable
  - bueno y decoroso
  lexicon: ἀγαθός; σεμνός
  rationale: «Digno» comunica mejor el matiz de seriedad, nobleza o decoro de σεμνός que un mero «respetable», y preserva la paralela antítesis con «mal deseo».
- source_word: ἐνδύω / clothe yourself
  english_pob_choice: clothe yourself
  chosen_spanish: vístete
  alternatives_spanish:
  - revístete
  - ponte
  - cúbrete
  lexicon: ἐνδύω
  rationale: El imperativo reflexivo «vístete» es natural en español y mantiene la imagen corporal/metafórica de la instrucción sin perder literalidad.
- source_word: κατισχύω / bridle it as you wish
  english_pob_choice: bridle it as you wish
  chosen_spanish: lo dominarás como quieras
  alternatives_spanish:
  - lo refrenarás como quieras
  - lo sujetarás como quieras
  - lo controlarás como quieras
  lexicon: κατισχύω
  rationale: El griego expresa dominio o superación efectiva sobre el deseo; «dominarás» conserva esa fuerza. «Bridar» no funciona bien en español como verbo directo con un objeto interno abstracto, por lo que se opta por un equivalente semántico claro.
theological_decisions:
- issue: Relación entre el deseo malo y el deseo bueno en términos de lucha moral
  english_pob_reading: The good and dignified desire is something one is to put on; doing so results in hating and bridleing the evil desire.
  chosen_spanish_reading: El creyente debe apartar el mal deseo y revestirse del deseo bueno y digno; ese nuevo deseo produce aversión al mal y capacidad de dominarlo.
  alternative_spanish_readings:
  - El creyente debe quitar de sí todo mal deseo y ponerse el bueno; con ello aborrecerá el mal deseo y lo refrenará.
  - Debe eliminar el mal deseo y adoptar el deseo bueno y digno, que hace posible resistir el mal.
  rationale: La formulación española conserva la secuencia moral del texto sin introducir una doctrina ajena. El efecto transformador del deseo bueno queda implícito en el paralelismo verbal y causal del pasaje.
  doctrine_reference: Ascética moral / formación del carácter en la literatura cristiana primitiva
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete de auditoría; la traducción se basa en el texto griego normalizado y en la lectura inglesa proporcionada, manteniendo el paralelismo retórico del original.
  spanish_consistency_notes:
  - Se mantiene el tratamiento en segunda persona singular, en paralelo con el inglés «you».
  - Se preserva la secuencia imperativa + causal del pasaje.
  - No se introduce terminología eclesiástica ajena; el lenguaje permanece moral y exhortativo.
