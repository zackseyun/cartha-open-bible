review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB inglés: quitar el deseo malo, vestirse del deseo bueno y digno, y como resultado odiar el deseo malo y someterlo. Sin embargo, la cláusula final del inglés POB usa explícitamente la imagen de ‘bridle it’, mientras que «lo dominarás» desplaza la metáfora hacia dominio general. Dado que el propio material de apoyo reconoce «lo refrenarás» como alternativa más cercana, conviene ajustar la redacción principal para preservar mejor el matiz del original sin perder naturalidad en español.'
  spanish_quality_summary: El español es claro, natural y de registro digno. «Quita de ti», «vístete» y «bueno y digno» funcionan bien. La única mejora necesaria es reemplazar «lo dominarás» por «lo refrenarás», que suena idiomático y además refleja mejor la idea de contener o poner freno al deseo. Con ese cambio, la nota al pie ya no hace falta.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones «deseo», «vístete», «bueno y digno» están bien alineadas con el contexto. La revisión propuesta mejora la correspondencia semántica de κατισχύω según el audit trail inglés (‘bridle it’) sin introducir terminología ajena.
  issues:
  - severity: medium
    issue: La frase «lo dominarás como quieras» atenúa o altera la imagen de ‘bridle it’.
    rationale: Aunque comunica control, «dominar» enfatiza superioridad o sometimiento más que freno o contención. «Lo refrenarás como quieras» conserva mejor la fuerza ascética y la imagen conceptual reflejada en el POB inglés.
  - severity: low
    issue: La nota al pie se vuelve innecesaria si se adopta la formulación más fiel en el texto principal.
    rationale: Actualmente la nota corrige implícitamente una limitación de la redacción principal. Si el texto principal dice «lo refrenarás», no hace falta mantener una nota de alternativa.
  revised_spanish_text: 'Él me dice: «Quita de ti todo mal deseo, pero vístete del deseo que es bueno y digno; porque cuando estés vestido con este deseo, aborrecerás el mal deseo y lo refrenarás como quieras».

    '
  revision_rationale: Se revisa únicamente la cláusula final para alinear mejor el español con el sentido del original y con la auditoría inglesa, preservando la imagen de frenar o refrenar el deseo malo. El resto del versículo es fiel y natural, por lo que no requiere cambios.
