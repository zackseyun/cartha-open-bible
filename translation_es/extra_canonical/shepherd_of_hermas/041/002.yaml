review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego tal como lo refleja el POB inglés: el deseo malo es presentado como una fuerza salvaje, temible y destructora; consume especialmente al esclavo de Dios que cae en él y carece de sensatez; destruye a quienes no tienen la vestidura del buen deseo y están enredados con esta era; y finalmente los entrega a la muerte. Las decisiones clave —«esclavo», «vestidura», «esta era», «entrega a la muerte»— son fieles al marco léxico y teológico dado.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero tiene dos puntos que conviene reparar para un español más natural y exacto: «consume mucho a las personas» suena poco idiomático y además desdibuja que el objeto implícito es ‘muchos’; y «es consumido gravemente» es una construcción torpe en español, mejor como «queda gravemente consumido» o equivalente. También conviene evitar la repetición pesada de «a las personas»/«tales personas».'
  glossary_alignment: Buena alineación con la terminología del proyecto. «Esclavo» para δοῦλος está correctamente mantenido y justificado con nota. No hay conflictos con las demás pautas terminológicas principales.
  issues:
  - severity: medium
    issue: «consume mucho a las personas» es poco natural en español
    rationale: Aunque intenta seguir el inglés auditado, en español esa colocación suena forzada. «Consume a muchos» preserva mejor el valor cuantitativo de πολλούς y mejora la legibilidad.
  - severity: medium
    issue: «es consumido gravemente» es una formulación rígida
    rationale: La construcción pasiva con «gravemente» no fluye bien en español. «queda gravemente consumido» o «es consumido severamente» comunica mejor la intensidad sin alterar el sentido.
  - severity: low
    issue: Repetición de «personas»
    rationale: 'No es error de fidelidad, pero «Consume a tales personas: a los que...» puede simplificarse a «Consume a tales personas: los que...» o reestructurarse levemente para mayor naturalidad.'
