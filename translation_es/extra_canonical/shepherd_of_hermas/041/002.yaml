base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/041/002.yaml
  text: '2. “For evil desire is wild and is hard to tame; for it is fearsome, and by its savagery it greatly consumes people—especially if a slave of God falls into it and is not sensible, he is grievously consumed by it. It consumes such people: those who do not have the garment of good desire, but are entangled with this age. These, therefore, it hands over to death.”'
translation:
  language: es
  text: '2. «Porque el deseo malo es salvaje y difícil de domar; pues es temible, y por su ferocidad consume a muchos—especialmente si un esclavo[a] de Dios cae en él y no es sensato, queda gravemente consumido por él. Consume a tales personas: los que no tienen la vestidura del buen deseo, sino que están enredados con esta era. A estos, pues, los entrega a la muerte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Esclavo» traduce aquí δοῦλος con su fuerza de pertenencia y sujeción; se mantiene el término fuerte por coherencia con el valor léxico del texto.
    reason: lexical_alternative
lexical_decisions:
- source_word: κακὴ ἐπιθυμία
  english_pob_choice: evil desire
  chosen_spanish: deseo malo
  alternatives_spanish:
  - mal deseo
  - deseo perverso
  lexicon: ἐπιθυμία
  rationale: Conservo la idea de un deseo orientado al mal sin cargarlo innecesariamente con una lectura técnica moral más fuerte que la del griego y la del POB inglés.
- source_word: ἄγριόν ἐστιν καὶ δυσδάμαστον
  english_pob_choice: is wild and is hard to tame
  chosen_spanish: es salvaje y difícil de domar
  alternatives_spanish:
  - es feroz y difícil de dominar
  - es indómito y difícil de domar
  lexicon: ἄγριος / δυσδάμαστος
  rationale: «Salvaje» y «difícil de domar» preservan la imaginería animal y la fuerza descriptiva del texto.
- source_word: φοβερὸν γάρ ἐστιν
  english_pob_choice: for it is fearsome
  chosen_spanish: pues es temible
  alternatives_spanish:
  - porque es temible
  - pues es terrible
  lexicon: φοβερός
  rationale: «Temible» mantiene el matiz de algo que inspira temor; «terrible» en español puede sonar más coloquial o ambiguo.
- source_word: καὶ τῇ ἀγριότητι αὐτοῦ πολλοὺς κατατρώγει
  english_pob_choice: and by its savagery it greatly consumes people
  chosen_spanish: y por su ferocidad consume mucho a las personas
  alternatives_spanish:
  - y por su fiereza devora a muchas personas
  - y con su salvajismo consume a muchos
  lexicon: ἀγριότης / κατατρώγω
  rationale: «Ferocidad» conserva el rasgo de violencia bestial; «consume mucho» reproduce el POB y evita exagerar a «devora» cuando el verbo puede abarcar destrucción intensa más general.
- source_word: δοῦλος θεοῦ
  english_pob_choice: a slave of God
  chosen_spanish: un esclavo de Dios
  alternatives_spanish:
  - un siervo de Dios
  - un servidor de Dios
  lexicon: δοῦλος
  rationale: Mantengo «esclavo» por fuerza léxica y por coherencia con la política del POB cuando el término subraya pertenencia y sometimiento, no mera cortesía religiosa.
- source_word: ἀνόητος
  english_pob_choice: is not sensible
  chosen_spanish: no es sensato
  alternatives_spanish:
  - no tiene juicio
  - no es prudente
  lexicon: ἀνόητος
  rationale: «Sensato» comunica la falta de discernimiento práctico que el contexto exige sin convertirlo en una mera falta de inteligencia.
- source_word: ἔνδυμα καλῆς ἐπιθυμίας
  english_pob_choice: the garment of good desire
  chosen_spanish: la vestidura del buen deseo
  alternatives_spanish:
  - el vestido del buen deseo
  - la ropa del buen deseo
  lexicon: ἔνδυμα
  rationale: «Vestidura» conserva el registro figurado y ligeramente solemne del texto, y mantiene la imagen de cobertura moral.
- source_word: συμπεπλεγμένοι τῷ αἰῶνι τούτῳ
  english_pob_choice: entangled with this age
  chosen_spanish: están enredados con esta era
  alternatives_spanish:
  - están entrelazados con este mundo
  - están enmarañados con esta edad
  lexicon: συμπλέκω / αἰών
  rationale: «Enredados» hace visible la imagen de trabazón; «era» evita reducir αἰών a «mundo» y conserva el matiz temporal-ordenado del presente siglo.
- source_word: τούτους οὖν τῷ θανάτῳ παραδίδωσιν
  english_pob_choice: These, therefore, it hands over to death
  chosen_spanish: A estos, pues, los entrega a la muerte
  alternatives_spanish:
  - Por tanto, a estos los entrega a la muerte
  - Así que entrega a estos a la muerte
  lexicon: παραδίδωμι
  rationale: «Entrega a la muerte» sigue la forma verbal del POB y preserva la personificación implícita del deseo malo como agente que conduce al fin mortal.
theological_decisions:
- issue: Naturaleza del agente que consume y entrega a la muerte
  english_pob_reading: Evil desire is portrayed as an active destructive force that consumes people and hands them over to death.
  chosen_spanish_reading: El deseo malo se presenta como una fuerza activa y destructiva que consume a las personas y las entrega a la muerte.
  alternative_spanish_readings:
  - El deseo malo aparece como una pasión destructiva que domina a las personas y las conduce a la muerte.
  - El mal deseo es descrito como algo personificado que consume y entrega a la muerte.
  rationale: La personificación está presente en el griego y en el inglés POB; la redacción española la conserva sin convertirla en una alegoría más fuerte de lo que el texto dice.
  doctrine_reference: Antropología moral / tentación y pecado
- issue: Relación entre 'esclavo de Dios' y vulnerabilidad moral
  english_pob_reading: A slave of God who falls into evil desire and lacks sense is grievously consumed.
  chosen_spanish_reading: Un esclavo de Dios que cae en él y no es sensato queda gravemente consumido.
  alternative_spanish_readings:
  - Un siervo de Dios que cae en él y no tiene juicio queda gravemente consumido.
  - Un esclavo de Dios que cae en él y actúa sin prudencia es consumido de manera grave.
  rationale: Se conserva la tensión de pertenencia a Dios junto con la advertencia moral; no suavizo el término doctrinalmente cargado en favor de una fórmula eclesial más común.
  doctrine_reference: Santificación / perseverancia
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría. La traducción se elaboró directamente desde el griego normalizado y se alineó con la redacción inglesa POB solo como control de lectura, no como base mecánica.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino cuando aparezca en otros registros del proyecto; aquí el texto usa θεός y por eso se traduce «Dios».
  - Se conservó la metáfora de vestidura y el campo semántico de encierro/enredo para no diluir la imagen moral del pasaje.
  - Se usó «era» para αἰών por coherencia con el valor temporal-ordenado del término en español bíblico contemporáneo.
