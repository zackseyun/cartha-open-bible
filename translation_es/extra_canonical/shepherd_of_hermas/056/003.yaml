base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/056/003.yaml
  text: “When, then, they are afflicted with every affliction, then they are handed over to me for good discipline, and they are strengthened in the faith of the Lord; and the rest of the days of their life they serve the Lord with a pure heart. And if they repent, then the evil works that they did rise up into their heart; and then they glorify God, saying that he is a righteous judge and that each one suffered justly according to his deeds. Thereafter they serve the Lord with a pure heart, and they prosper in every work of theirs, receiving from the Lord whatever they ask for; and then they glorify the Lord because they were handed over to me, and they no longer suffer any of the evils.”
translation:
  language: es
  text: «Cuando, pues, son afligidos con toda aflicción, entonces son entregados a mí para buena disciplina, y son fortalecidos en la fe del Señor; y el resto de los días de su vida sirven al Señor con corazón puro. Y si se arrepienten, entonces las malas obras que hicieron vuelven a su corazón; y entonces glorifican a Dios, diciendo que él es un juez justo y que cada uno padeció justamente según sus obras. Después sirven al Señor con corazón puro, y prosperan en toda obra suya, recibiendo del Señor todo lo que piden; y entonces glorifican al Señor porque fueron entregados a mí, y ya no padecen ninguno de los males.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θλίψις / θλίβω (afligidos con toda aflicción)
  english_pob_choice: afflicted with every affliction
  chosen_spanish: afligidos con toda aflicción
  alternatives_spanish:
  - atribulados con toda tribulación
  - afligidos con cada aflicción
  lexicon: θλίψις
  rationale: La repetición intensiva del griego se conserva con una expresión igualmente enfática en español. 'Afligidos' comunica el estado pasivo; 'toda aflicción' mantiene la fuerza de 'every affliction' sin suavizarla.
- source_word: παραδίδωμι (me son entregados)
  english_pob_choice: are handed over to me
  chosen_spanish: me son entregados
  alternatives_spanish:
  - son entregados a mí
  - son puestos en mis manos
  lexicon: παραδίδωμι
  rationale: '''Entregados'' conserva el valor de ser puestos bajo la disposición de otro, sin añadir matiz interpretativo. La pasiva en español refleja bien la pasiva del original y del inglés POB.'
- source_word: εἰς παιδείαν (para buena disciplina)
  english_pob_choice: for good discipline
  chosen_spanish: para buena disciplina
  alternatives_spanish:
  - para una disciplina buena
  - para corrección provechosa
  lexicon: παιδεία
  rationale: Se mantiene 'disciplina' por su fuerza formativa y correctiva. 'Buena' reproduce el adjetivo del texto y evita cargar el término con una lectura exclusivamente punitiva.
- source_word: πίστις (fe)
  english_pob_choice: faith of the Lord
  chosen_spanish: fe del Señor
  alternatives_spanish:
  - fe en el Señor
  - fidelidad del Señor
  lexicon: πίστις
  rationale: 'El inglés POB entiende aquí la relación como genitiva de pertenencia o referencia: ''faith of the Lord''. En español, ''fe del Señor'' reproduce ese vínculo sin resolverlo de modo más interpretativo que el texto base.'
- source_word: καρδία καθαρά (pure heart)
  english_pob_choice: pure heart
  chosen_spanish: corazón puro
  alternatives_spanish:
  - corazón limpio
  - corazón puro y limpio
  lexicon: καρδία καθαρά
  rationale: '''Corazón puro'' es la equivalencia más directa y digna en español. ''Puro'' conserva tanto la idea moral como la de integridad interior.'
- source_word: μετανοέω / μεταμέλομαι (repent)
  english_pob_choice: if they repent
  chosen_spanish: si se arrepienten
  alternatives_spanish:
  - si cambian de mente
  - si hacen penitencia
  lexicon: μετανοέω
  rationale: En este contexto de retorno moral, 'arrepentirse' es la opción natural y fiel. 'Cambian de mente' sería demasiado abstracto para el flujo narrativo de la sección.
- source_word: ἔργα πονηρά (evil works)
  english_pob_choice: the evil works
  chosen_spanish: las malas obras
  alternatives_spanish:
  - las obras malas
  - las obras perversas
  lexicon: ἔργον / πονηρός
  rationale: '''Malas obras'' suena natural en español y mantiene el juicio moral del original. Se evita un lenguaje más técnico que no aporta claridad adicional aquí.'
- source_word: ἀναβαίνω εἰς καρδίαν (rise up into their heart)
  english_pob_choice: rise up into their heart
  chosen_spanish: suben a su corazón
  alternatives_spanish:
  - suben hasta su corazón
  - vuelven a su corazón
  lexicon: ἀναβαίνω
  rationale: La imagen de ascenso se conserva con 'suben'. 'A su corazón' sigue la dirección del original sin forzar una metáfora extraña en español.
- source_word: δικαίος κριτής (righteous judge)
  english_pob_choice: a righteous judge
  chosen_spanish: un juez justo
  alternatives_spanish:
  - un juez recto
  - un juez de justicia
  lexicon: δίκαιος
  rationale: '''Justo'' es la correspondencia más natural y fiel en español moderno. ''Recto'' es posible, pero ''justo'' mantiene mejor el campo semántico jurídico y moral.'
- source_word: ἕκαστος ... κατὰ τὰ ἔργα αὐτοῦ (each one suffered justly according to his deeds)
  english_pob_choice: each one suffered justly according to his deeds
  chosen_spanish: cada uno padeció justamente según sus obras
  alternatives_spanish:
  - cada uno sufrió justamente conforme a sus obras
  - cada uno fue tratado justamente según sus obras
  lexicon: κατά + ἔργα
  rationale: '''Padeció'' refleja el foco en la experiencia sufrida, y ''justamente según sus obras'' conserva la relación causal-moral del original. Se evita una formulación demasiado explicativa.'
- source_word: εὐοδόω (prosper in every work)
  english_pob_choice: they prosper in every work of theirs
  chosen_spanish: prosperan en toda obra suya
  alternatives_spanish:
  - les va bien en toda obra
  - tienen éxito en toda obra suya
  lexicon: εὐοδόω
  rationale: '''Prosperan'' reproduce el tono positivo y general del verbo en este contexto. ''En toda obra suya'' preserva el alcance total sin introducir una connotación exclusivamente económica.'
- source_word: ὅ,τι ἐὰν αἰτήσωνται (whatever they ask for)
  english_pob_choice: whatever they ask for
  chosen_spanish: todo lo que piden
  alternatives_spanish:
  - lo que sea que pidan
  - cuanto pidan
  lexicon: αἰτέω
  rationale: '''Todo lo que piden'' es idiomático y claro en español, y mantiene la amplitud del indefinido griego sin sobreinterpretarlo.'
- source_word: οὐκέτι ... κακά (they no longer suffer any of the evils)
  english_pob_choice: they no longer suffer any of the evils
  chosen_spanish: ya no padecen ninguno de los males
  alternatives_spanish:
  - ya no sufren ninguno de los males
  - ya no padecen ningún mal
  lexicon: κακά
  rationale: '''Males'' mantiene el sustantivo plural del original y del inglés POB, evitando reducirlo a un singular abstracto. ''Padecen'' conserva el tono de sufrimiento, coherente con la sección.'
theological_decisions:
- issue: Relación entre disciplina, aflicción y providencia divina
  english_pob_reading: They are handed over to me for good discipline; affliction is disciplinary rather than merely punitive.
  chosen_spanish_reading: me son entregados para buena disciplina; la aflicción tiene un propósito formativo y correctivo
  alternative_spanish_readings:
  - me son entregados para corrección
  - me son confiados para instrucción
  rationale: La sección presenta la aflicción como medio de disciplina beneficiosa, no solo castigo. 'Buena disciplina' preserva esa tensión sin domesticarla en un lenguaje más doctrinal que el texto.
  doctrine_reference: Disciplina providencial; sufrimiento formativo
- issue: Genitivo en 'fe del Señor'
  english_pob_reading: faith of the Lord
  chosen_spanish_reading: fe del Señor
  alternative_spanish_readings:
  - fe en el Señor
  - fidelidad del Señor
  rationale: Se conserva la ambigüedad sintáctica del original y del inglés POB. No se resuelve a 'fe en' porque eso cambiaría la relación gramatical y podría borrar la tensión del texto auditado.
  doctrine_reference: Ambigüedad genitiva / fidelidad vs. fe
- issue: Recompensa y justicia retributiva
  english_pob_reading: each one suffered justly according to his deeds
  chosen_spanish_reading: cada uno padeció justamente según sus obras
  alternative_spanish_readings:
  - cada uno sufrió justamente conforme a sus obras
  - cada uno recibió justamente según sus obras
  rationale: La formulación mantiene el principio de correspondencia entre obras y sufrimiento tal como aparece en el texto, sin convertirlo en una declaración sistemática más amplia.
  doctrine_reference: Justicia retributiva; juicio según las obras
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando las notas al pie no ancladas; esta versión no incluye marcadores de nota porque el texto no requiere alternativas textuales explícitas en el cuerpo. Se mantuvo la estructura y el contenido del inglés POB, con atención al griego subyacente en los puntos léxicos y teológicos principales.
  spanish_consistency_notes:
  - Se mantiene 'Señor' en correspondencia con el inglés POB para κύριος en esta sección, sin introducir 'Yahvé' porque el contexto del escrito patrístico usa el título cristológico/devocional del Señor.
  - Se conserva la repetición de 'corazón puro' en ambas ocurrencias para reflejar la cohesión del pasaje.
  - '''Males'' y ''obras'' se mantienen en plural para respetar el alcance distributivo del original.'
