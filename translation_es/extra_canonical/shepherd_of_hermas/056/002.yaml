base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/056/002.yaml
  text: '“I wished, Sir,” I said, “to know what these various punishments are.” He said, “Listen. The various punishments and torments are torments of this present life: for some are punished with losses, some with deprivations, some with various sicknesses, some with every kind of disorder; some are insulted by the unworthy, and suffer in many other ways. For many, being unsettled in their plans, undertake many things, and nothing at all advances for them. They say of themselves that they do not prosper in their undertakings, and it does not rise up into their heart that they have done evil, but they blame the Lord.'
translation:
  language: es
  text: '«Deseaba saber, Señor», dije, «cuáles son estos diversos castigos». Él dijo: «Escucha. Los diversos castigos y tormentos[a] son tormentos de esta vida presente: pues unos son castigados con pérdidas, otros con privaciones, otros con diversas enfermedades, otros con todo tipo de perturbación[b]; algunos son ultrajados[c] por personas indignas[d] y padecen de muchas otras maneras. Pues muchos, al volverse inestables en sus planes, emprenden muchas cosas, y nada en absoluto les prospera. Dicen de sí mismos que no tienen éxito en sus obras, y no sube a su corazón[e] que han hecho el mal, sino que culpan al Señor[f]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego κολάσεις καὶ τιμωρίαι: dos términos distintos. κόλασις connota castigo disciplinario o correctivo; τιμωρία connota retribución y sufrimiento infligido. El Español emplea «castigos y tormentos» para mantener la dualidad.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego ἀκαταστασίᾳ: «inestabilidad», «desorden» o «perturbación»; la misma raíz reaparece en el versículo siguiente aplicada a las personas («inestables en sus planes», ἀκατάστατοι).'
    reason: lexical_alternative
  - marker: c
    text: 'Griego ὑβριζόμενοι: tratados con ultraje o desprecio. El verbo ὑβρίζω implica abuso público degradante, más allá de una simple ofensa verbal.'
    reason: lexical_alternative
  - marker: d
    text: 'Griego ἀναξίων: «los indignos» o personas que carecen de mérito o posición para actuar así; puede aludir tanto a inferioridad moral como social.'
    reason: lexical_alternative
  - marker: e
    text: '«No sube a su corazón»: calco de un modismo semítico (cf. LXX Jer 7:31; Is 65:17; 1 Co 2:9) que equivale a «nunca se les ocurre» o «nunca les viene a la mente». Se conserva la imagen literal por su deliberada resonancia bíblica.'
    reason: cultural_note
  - marker: f
    text: Griego τὸν κύριον. En el Pastor de Hermas, κύριος designa a Dios en sentido amplio y no cita explícitamente el Tetragrama (YHWH). El proyecto POB reserva «Yahvé» para textos con clara alusión al nombre divino hebreo; aquí se usa «Señor» conforme al uso autónomo del griego posapostólico.
    reason: theological_note
lexical_decisions:
- source_word: κολάσεις
  english_pob_choice: punishments
  chosen_spanish: castigos
  alternatives_spanish:
  - penas
  - penalidades
  - suplicios
  lexicon: 'BDAG κόλασις: corrective punishment, chastisement'
  rationale: κόλασις carries a disciplinary/corrective connotation in Koine Greek. 'Castigos' reproduces this naturally in Spanish without over-specifying physical torment ('suplicios') or over-abstracting ('penas'). The term appears in both the narrator's question and the Shepherd's answer; the note is anchored at the first substantive occurrence in the Shepherd's speech.
- source_word: τιμωρίαι
  english_pob_choice: torments
  chosen_spanish: tormentos
  alternatives_spanish:
  - suplicios
  - represalias
  - venganzas
  lexicon: 'BDAG τιμωρία: punishment, retribution, suffering inflicted'
  rationale: τιμωρία emphasizes the retributive dimension more than κόλασις. The two terms appear in tandem ('κολάσεις καὶ τιμωρίαι'), and the Shepherd then immediately explains both as 'torments of the present life.' 'Tormentos' captures the suffering/affliction sense and pairs naturally with 'castigos' without redundancy.
- source_word: ἀκαταστασίᾳ
  english_pob_choice: disorder
  chosen_spanish: perturbación
  alternatives_spanish:
  - desorden
  - inestabilidad
  - trastorno
  lexicon: 'BDAG ἀκαταστασία: instability, disorder, disturbance, upheaval'
  rationale: ἀκαταστασία denotes disruption at multiple levels—social, personal, circumstantial. 'Perturbación' covers this range and reads as dignified modern Spanish. 'Desorden' is too casual; 'inestabilidad' leans too narrowly on the psychological sense the word takes later in the same passage (ἀκατάστατοι, 'inestables').
- source_word: ὑβριζόμενοι
  english_pob_choice: insulted
  chosen_spanish: ultrajados
  alternatives_spanish:
  - insultados
  - humillados
  - vejados
  - afrentados
  lexicon: 'BDAG ὑβρίζω: to treat with hubris, to outrage, to abuse, to insult with contempt'
  rationale: ὑβρίζω carries the full weight of public shaming and degrading treatment, beyond mere verbal insult. 'Ultrajados' preserves this stronger valence in Spanish; 'insultados' tends to imply only verbal offense in modern usage and would understate the Greek.
- source_word: ἀναξίων
  english_pob_choice: the unworthy
  chosen_spanish: personas indignas
  alternatives_spanish:
  - los indignos
  - gente sin mérito
  - personas de baja condición
  lexicon: 'LSJ ἀνάξιος: unworthy, undeserving; of persons: without merit or standing'
  rationale: ἀνάξιος signifies those who lack worth or standing to do what they do—whether moral, social, or both. 'Personas indignas' is clearer in contemporary Spanish than 'los indignos' alone, which in religious registers can sound exclusively theological (as in liturgical unworthiness). The expanded noun phrase avoids that narrowing.
- source_word: οὐκ ἀναβαίνει εἰς τὴν καρδίαν αὐτῶν
  english_pob_choice: it does not rise up into their heart
  chosen_spanish: no sube a su corazón
  alternatives_spanish:
  - no se les ocurre
  - no llega a su mente
  - no entra en su corazón
  lexicon: 'ἀναβαίνω + εἰς + καρδίαν: Semitic idiom also in LXX Jer 7:31; Isa 65:17 (LXX); 1 Cor 2:9'
  rationale: This idiom—'it does not ascend/rise into the heart'—is a Semitic calque for 'it does not occur to them / it never enters their mind.' Smoothing to 'no se les ocurre' would erase an intentional literary texture. 'No sube a su corazón' is idiomatic enough in Spanish (paralleling the biblical tradition of 'no subió al corazón') while preserving the Semitic color the author deliberately used.
- source_word: πράξεσιν
  english_pob_choice: undertakings
  chosen_spanish: obras
  alternatives_spanish:
  - proyectos
  - empresas
  - gestiones
  - acciones
  lexicon: 'BDAG πρᾶξις: deed, act, practice; also transaction, business'
  rationale: 'πρᾶξις covers both the practical/business sense (undertakings, transactions) and the moral sense (deeds, acts). The English POB chose ''undertakings,'' which highlights the practical dimension. ''Obras'' in Spanish preserves the moral register since the very next clause speaks of ''having done evil'' (πεποιήκασι τὰ πονηρά). This bidirectionality serves the passage''s point: their failed activities are the same ''works'' in which evil was done.'
- source_word: μέμφονται
  english_pob_choice: they blame
  chosen_spanish: culpan
  alternatives_spanish:
  - reprochan a
  - acusan a
  - echan la culpa a
  lexicon: 'LSJ μέμφομαι: to blame, find fault with, censure'
  rationale: '''Culpan'' is direct and colloquially natural in Spanish (''culpar a alguien''). ''Reprochan'' is possible but softer. ''Echan la culpa a'' is idiomatic but too colloquial for the publication register.'
theological_decisions:
- issue: κύριε as address to the Shepherd-figure
  english_pob_reading: Sir
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Amo
  rationale: Throughout the Shepherd of Hermas, the narrator addresses the angelic Shepherd-figure as κύριε. The English POB renders this 'Sir' to mark it as a respectful address, not a divine title. In Spanish, 'Señor' is the standard equivalent for this polite-honorific use of κύριε and is the appropriate rendering of vocative address to the Shepherd. This is distinct from using 'Yahvé' for the divine name—no YHWH/יהוה is in view here.
  doctrine_reference: 'Hermas Sim. 6.i–vi: κύριε used consistently as honorific address to the Shepherd-angel, not as a claim to divine identity'
- issue: 'τὸν κύριον — ''they blame the Lord'': which Lord?'
  english_pob_reading: they blame the Lord
  chosen_spanish_reading: culpan al Señor
  alternative_spanish_readings:
  - culpan a Yahvé
  - culpan a Dios
  - culpan al amo
  rationale: μέμφονται τὸν κύριον here refers to the God whom the punished persons hold responsible for their failures. The POB project default reserves 'Yahvé' for YHWH/יהוה or clear allusions to the divine name. In Hermas—a second-century Greek text—κύριος is used broadly for God/the Lord without explicit citation of the Tetragrammaton. 'Señor' is used rather than 'Yahvé' because no OT text is being quoted, no explicit Tetragrammaton allusion is traceable, and Hermas's own usage is ambiguous between God the Father and a more generic 'Lord' (master/sovereign). A reader note is provided.
  doctrine_reference: Shepherd of Hermas Sim. 6.iii.2; POB project default on κύριος in non-LXX-quotation Greek contexts
translation_notes:
  revision_awareness: No se registran revisiones aplicadas ni datos de pasada de revisión en el paquete fuente de este versículo. El POB en inglés no documenta notas al pie, decisiones léxicas ni decisiones teológicas propias; este borrador español se construye íntegramente a partir del griego (Lightfoot y Harmer, 1891) y de los parámetros terminológicos del proyecto.
  spanish_consistency_notes:
  - En el corpus del Pastor de Hermas, κύριε (vocativo dirigido al Ángel-Pastor) debe renderizarse consistentemente como «Señor» y distinguirse del uso teológico de κύριος para Dios; ambos aparecen en la misma sección.
  - ἀκαταστασία y ἀκατάστατος comparten raíz en este mismo pasaje (vv. 2–3); «perturbación» / «inestable» mantienen la relación etimológica en español y deberían adoptarse como valores por defecto en todo el corpus de Hermas salvo contexto que exija variación.
  - El modismo ἀναβαίνει εἰς τὴν καρδίαν (y su negación) debe renderizarse literalmente («sube a su corazón») en todos los textos del corpus POB donde aparezca, para preservar la resonancia semítica que el autor cultivó conscientemente.
  - La distinción κολάσεις / τιμωρίαι → «castigos» / «tormentos» debe ser estable en Hermas; invertirlos o fusionarlos en pasajes posteriores requeriría justificación léxica explícita.
