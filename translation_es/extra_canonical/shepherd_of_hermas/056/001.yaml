base_translation:
  language: en
  yaml_path: translation/extra_canonical/shepherd_of_hermas/056/001.yaml
  text: Therefore, seeing them being scourged and afflicted like this, I was grieved for them, because they were being tormented in this way and had no respite at all. I said to the shepherd who was speaking with me, “Sir, who is this shepherd, so pitiless and harsh, showing no compassion at all for these sheep?” He said, “This is the angel of punishment; he is one of the righteous angels, appointed over punishment. Therefore he takes charge of those who have wandered away from God and have gone after the desires and deceits of this age, and he punishes them, as they deserve, with dreadful and various punishments.”
translation:
  language: es
  text: 'Por eso, al verlos azotados y afligidos así, me entristecí por ellos, porque eran atormentados de ese modo y no tenían ningún respiro. Y dije al pastor que hablaba conmigo: «Señor, ¿quién es este pastor, tan despiadado y severo, que no muestra ninguna compasión por estas ovejas?». Él dijo: «Este es el ángel del castigo; es uno de los ángeles justos, encargado del castigo. Por eso se encarga de los que se han desviado de Dios y han ido tras los deseos y los engaños de este siglo, y los castiga, como merecen, con castigos terribles y de muchas clases».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐμαρτυρόμην / εἶδον ... μαστιζομένους καὶ θλιβομένους
  english_pob_choice: seeing them being scourged and afflicted
  chosen_spanish: al verlos azotados y afligidos
  alternatives_spanish:
  - viendo que eran azotados y afligidos
  - al verlos siendo azotados y oprimidos
  lexicon: μαστιζω; θλίβω
  rationale: Conservo el paralelismo de castigo físico y opresión sufrida. «Azotados» reproduce el golpe de mασία/μαστιγ- con fuerza directa; «afligidos» mantiene el segundo término sin volverlo demasiado abstracto.
- source_word: ἐλυπήθην
  english_pob_choice: I was grieved
  chosen_spanish: me dolí
  alternatives_spanish:
  - me entristecí
  - me afligí
  lexicon: λυπέω
  rationale: «Me dolí» expresa una reacción interior real y cercana al griego sin añadir una formulación excesivamente solemne. Mantiene la intensidad afectiva mejor que un simple «me entristecí».
- source_word: οὐκ ἐγίνετο ἀνάπαυσις αὐτοῖς οὐδὲ ὅλως
  english_pob_choice: had no respite at all
  chosen_spanish: no tenían ningún respiro
  alternatives_spanish:
  - no tenían descanso alguno
  - no les quedaba ningún alivio
  lexicon: ἀνάπαυσις
  rationale: «Respiro» funciona naturalmente en español para ausencia total de alivio o pausa, y conserva la idea de descanso interrumpido sin sobretraducir.
- source_word: ποιμήν
  english_pob_choice: shepherd
  chosen_spanish: pastor
  alternatives_spanish:
  - pastor/guía
  - pastor
  lexicon: ποιμήν
  rationale: En español eclesial, «pastor» es la equivalencia natural de ποιμήν. Aquí además es coherente con el diálogo narrativo y la imagen del rebaño.
- source_word: ἀγγέλου τῆς κολάσεως
  english_pob_choice: the angel of punishment
  chosen_spanish: el ángel del castigo
  alternatives_spanish:
  - el ángel del castigo
  - el ángel del tormento
  lexicon: ἄγγελος; κόλασις
  rationale: «Castigo» preserva el sentido retributivo y jurídico de κόλασις en este contexto. «Tormento» es posible, pero desplaza el énfasis hacia el sufrimiento más que hacia la retribución.
- source_word: δίκαιων ἀγγέλων
  english_pob_choice: one of the righteous angels
  chosen_spanish: uno de los ángeles justos
  alternatives_spanish:
  - uno de los ángeles rectos
  - uno de los ángeles justos
  lexicon: δίκαιος
  rationale: «Justos» conserva tanto la rectitud moral como el carácter aprobado por Dios. Evita convertirlo en un título técnico que el texto no exige.
- source_word: τεταγμένος ἐπὶ τῇ κολάσει
  english_pob_choice: appointed over punishment
  chosen_spanish: nombrado sobre el castigo
  alternatives_spanish:
  - puesto sobre el castigo
  - designado para el castigo
  lexicon: τάσσω
  rationale: «Nombrado sobre» conserva la idea de comisión/encargo con autoridad sobre una esfera concreta. Es más fiel al griego que una mera finalidad impersonal.
- source_word: ἀποπεπλανημένους ἀπὸ τοῦ θεοῦ
  english_pob_choice: those who have wandered away from God
  chosen_spanish: los que se han desviado de Dios
  alternatives_spanish:
  - los que se han apartado de Dios
  - los que han vagado lejos de Dios
  lexicon: ἀποπλανάω
  rationale: «Desviado» comunica el alejamiento culpable y el extravío sin volverlo demasiado geográfico. Mantiene la fuerza moral del término.
- source_word: ἐπιθυμίας καὶ ἀπάτας τοῦ αἰῶνος τούτου
  english_pob_choice: the desires and deceits of this age
  chosen_spanish: los deseos y los engaños de este siglo
  alternatives_spanish:
  - los deseos y los engaños de esta época
  - las pasiones y los engaños de este mundo
  lexicon: ἐπιθυμία; ἀπάτη; αἰών
  rationale: «Siglo» conserva el valor de αἰών como era presente ordenada en oposición a Dios, una elección clásica pero todavía comprensible. Mantiene mejor la tensión escatológica que «época» o «mundo».
- source_word: κολάσει πλείοσιν καὶ δειναῖς
  english_pob_choice: with dreadful and various punishments
  chosen_spanish: con castigos terribles y de muchas clases
  alternatives_spanish:
  - con castigos terribles y diversos
  - con castigos espantosos y variados
  lexicon: πολύς; δεινός
  rationale: «De muchas clases» conserva la multiplicidad concreta de πλείοσιν sin sonar literario en exceso. «Terribles» mantiene el tono de gravedad y temor.
theological_decisions:
- issue: Naturaleza del agente punitivo
  english_pob_reading: This is the angel of punishment; he is one of the righteous angels, appointed over punishment.
  chosen_spanish_reading: Este es el ángel del castigo; es uno de los ángeles justos, nombrado sobre el castigo.
  alternative_spanish_readings:
  - Este es el ángel del castigo; es uno de los ángeles rectos, designado para castigar.
  - Este es el ángel del tormento; es uno de los ángeles justos, puesto sobre el tormento.
  rationale: El texto presenta un ser angélico subordinado que administra castigo bajo mandato, no una personificación abstracta. Conservo esa distinción sin suavizar la dureza del juicio.
  doctrine_reference: angelología; juicio retributivo
- issue: Relación entre extravío moral y castigo
  english_pob_reading: those who have wandered away from God and have gone after the desires and deceits of this age
  chosen_spanish_reading: los que se han desviado de Dios y han ido tras los deseos y los engaños de este siglo
  alternative_spanish_readings:
  - los que se han apartado de Dios y siguieron las pasiones y los engaños de esta época
  - los que vagaron lejos de Dios y persiguieron los deseos y engaños de este mundo
  rationale: 'Mantengo la secuencia causal: alejamiento de Dios, seguimiento de deseos engañosos y castigo correspondiente. No atenúo la imputación moral implícita en el griego.'
  doctrine_reference: pecado; retribución; juicio
- issue: Sentido de κoλασις
  english_pob_reading: punishment
  chosen_spanish_reading: castigo
  alternative_spanish_readings:
  - tormento
  - pena
  rationale: «Castigo» conserva la dimensión judicial y retributiva más claramente que «tormento», que podría sugerir solo sufrimiento. El pasaje enfatiza ejecución de justicia, no mera crueldad.
  doctrine_reference: juicio divino
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete de fuente. La presente redacción sigue directamente el griego normalizado de Lightfoot & Harmer (1891) y usa el audit trail inglés solo como contexto confirmatorio, no como base mecánica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando el pasaje lo requiera; aquí no aparece.
  - Se usa «Mesías/Cristo» no aplicable en este versículo.
  - Se conserva «ángel» y «castigo» de forma consistente con el registro teológico del pasaje.
  - «Siglo» se emplea para αἰών con sentido de era presente, no como siglo cronológico.
