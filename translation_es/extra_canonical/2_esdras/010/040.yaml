lexical_decisions:
- source_word: lectus uisionis
  english_pob_choice: the interpretation of the vision
  chosen_spanish: la interpretación de la visión
  alternatives_spanish:
  - el significado de la visión
  - la explicación de la visión
  lexicon: interpretación
  rationale: La lectura latina 'lectus uisionis' apoya el valor de explicación/interpretación más que una mera paráfrasis. 'Interpretación' conserva bien la relación técnica con la visión y sigue de cerca la revisión inglesa.
- source_word: mulier
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la señora
  lexicon: mujer
  rationale: El sustantivo latino es directo y concreto; 'mujer' es la equivalencia natural y transparente en español.
- source_word: tibi apparuit
  english_pob_choice: appeared to you
  chosen_spanish: se te apareció
  alternatives_spanish:
  - apareció ante ti
  - te apareció
  lexicon: aparecer
  rationale: '''Se te apareció'' comunica con naturalidad la relación indirecta del verbo latino y mantiene el sentido de aparición visionaria.'
- source_word: ante paululum
  english_pob_choice: a little while ago
  chosen_spanish: hace un poco de tiempo
  alternatives_spanish:
  - hace poco
  - hace un momento
  lexicon: tiempo reciente
  rationale: La expresión latina indica reciente anterioridad; 'hace un poco de tiempo' es clara y suficientemente fiel en español moderno.
theological_decisions:
- issue: Tratamiento de la visión como revelación interpretada
  english_pob_reading: This, then, is the interpretation of the vision
  chosen_spanish_reading: Esta, pues, es la interpretación de la visión
  alternative_spanish_readings:
  - Este, pues, es el significado de la visión
  - Esta es, pues, la explicación de la visión
  rationale: No hay una tensión doctrinal específica, pero la formulación conserva el tono revelatorio del texto y evita suavizar 'interpretación' a un simple resumen.
  doctrine_reference: none
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa que corrigió 'meaning' por 'interpretation' y añadió el segmento ausente sobre la mujer. Dado que el versículo en el paquete fuente termina en 'Quam', la frase española se deja abierta con 'a quien' para reflejar el corte del testimonio latino sin inventar continuación.
  spanish_consistency_notes:
  - Se usa 'visión' y 'interpretación' de manera consistente con el registro profético-apocalíptico.
  - Se evita introducir terminología eclesiástica no apoyada por el latín.
  - La oración queda abierta porque el texto fuente preservado está truncado en 'Quam'.
