    changes_summary: Completed the quotation by supplying the opening words implied by the Latin ("My lament is not like the earth’s") and added the closing quotation mark. Kept the rest essentially unchanged.
translation:
  language: es
  text: 'Pero si me dices: «Mi lamento no es como el de la tierra, porque he perdido el fruto de mi vientre»,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: planctus
  english_pob_choice: lament
  chosen_spanish: lamento
  alternatives_spanish:
  - planto
  - llanto
  - duelo
  lexicon: Latin planctus
  rationale: En este contexto, el latín expresa una queja o duelo doliente; «lamento» reproduce bien el tono y es natural en español. «Llanto» enfatiza la acción de llorar, y «duelo» puede sonar más funerario que el sentido general aquí.
- source_word: terrae
  english_pob_choice: the earth’s
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - de la tierra misma
  - de la tierra de la tierra
  lexicon: Latin terra
  rationale: La expresión compara el lamento humano con el de la tierra/personificación de la tierra. «De la tierra» mantiene la imagen sin añadir explicación interpretativa.
- source_word: fructum uentris mei
  english_pob_choice: the fruit of my womb
  chosen_spanish: el fruto de mi vientre
  alternatives_spanish:
  - el fruto de mi vientre
  - el hijo de mi vientre
  - el fruto de mis entrañas
  lexicon: Latin fructus + venter
  rationale: «El fruto de mi vientre» sigue de cerca la imagen bíblica y conserva el paralelismo tradicional del original. «Hijo de mi vientre» explicita el referente, pero reduce la metáfora.
theological_decisions:
- issue: Lamento humano comparado con el de la tierra
  english_pob_reading: My lament is not like the earth’s
  chosen_spanish_reading: Mi lamento no es como el de la tierra
  alternative_spanish_readings:
  - Mi lamento no es como el de la tierra
  - Mi duelo no es como el de la tierra
  rationale: El texto presenta una comparación retórica entre dos lamentos; no hay necesidad de suavizar la personificación de la tierra. Se conserva la tensión poética sin interpretarla más allá de lo que dice el latín y el inglés POB.
  doctrine_reference: Imaginario poético y personificación en literatura bíblica/apócrifa; no implica una afirmación doctrinal directa.
translation_notes:
  revision_awareness: El texto inglés revisado completó la cita añadiendo las palabras iniciales implícitas («My lament is not like the earth’s») y cerró la comilla final. La versión española refleja esa cita completa con la misma estructura condicional y la cita cerrada.
  spanish_consistency_notes:
  - Se usa «vientre» para mantener la imagen del latín fructum ventris mei y del inglés POB, en lugar de sustituirlo por un término más explicativo.
  - Se conserva el tono condicional con «Pero si me dices:» para corresponder al arranque latino Si autem dices mihi.
  - Se mantiene una puntuación de cita directa natural en español con comillas angulares.
  - No se introduce terminología eclesial ni doctrinal ajena al pasaje.
