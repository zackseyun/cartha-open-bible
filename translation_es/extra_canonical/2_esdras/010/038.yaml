  text: 'dixit: audi me, et doceam te et dicam tibi de quibus times, quoniam altissimus reuelauit tibi mysteria multa. Vidit enim'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/038.yaml
  text: And he said, “Listen to me, and I will teach you, and I will tell you about the things you fear, because the Most High has revealed many mysteries to you.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:49:22Z'
    unchanged: false
    changes_summary: Changed 'answered me and said' to 'said' to match the Latin dixit, which does not include 'answered me.'
translation:
  language: es
  text: 'Y dijo: «Escúchame, y yo te enseñaré y te diré sobre lo que temes, porque el Altísimo te ha revelado muchos misterios.»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: dixit
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Y respondió
  - Y habló
  lexicon: dixit = dijo
  rationale: El latín solo trae dixit, sin el matiz de “respondió” añadido en una versión anterior del inglés. Por eso el español mantiene simplemente «dijo».
- source_word: audi me
  english_pob_choice: Listen to me
  chosen_spanish: Escúchame
  alternatives_spanish:
  - Oye mi voz
  - Escucha lo que te digo
  lexicon: audi = escucha/oye
  rationale: «Escúchame» comunica de forma natural e inmediata el imperativo latino y conserva la relación directa entre el hablante y el oyente.
- source_word: doceam te
  english_pob_choice: I will teach you
  chosen_spanish: yo te enseñaré
  alternatives_spanish:
  - yo te instruiré
  - yo te adoctrinaré
  lexicon: doceam = enseñar/instruir
  rationale: «Enseñar» es la correspondencia más directa y clara en español bíblico contemporáneo; «instruiré» sería posible, pero menos natural aquí.
- source_word: et dicam tibi
  english_pob_choice: and I will tell you
  chosen_spanish: y te diré
  alternatives_spanish:
  - y te hablaré
  - y te comunicaré
  lexicon: dicam = decir
  rationale: La forma verbal simple «te diré» conserva la secuencia de promesa del latín sin sobrecargar el estilo.
- source_word: de quibus times
  english_pob_choice: about the things you fear
  chosen_spanish: acerca de las cosas que temes
  alternatives_spanish:
  - sobre aquello que temes
  - acerca de lo que temes
  lexicon: de quibus = acerca de las cuales / sobre las cosas que
  rationale: El relativo latino es amplio; «las cosas que temes» preserva el alcance concreto de la frase y suena fluido en español.
- source_word: altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Supremo
  lexicon: altissimus = Altísimo
  rationale: «El Altísimo» es la equivalencia estable y reverente para el título divino, sin introducir explicaciones que el latín no da.
- source_word: reuelauit
  english_pob_choice: has revealed
  chosen_spanish: ha revelado
  alternatives_spanish:
  - ha descubierto
  - te ha dado a conocer
  lexicon: revelare = revelar
  rationale: «Ha revelado» reproduce bien el perfecto latino y mantiene el sentido de desvelamiento de misterios.
- source_word: mysteria multa
  english_pob_choice: many mysteries
  chosen_spanish: muchos misterios
  alternatives_spanish:
  - numerosos misterios
  - grandes misterios
  lexicon: mysteria = misterios
  rationale: «Misterios» conserva el término tradicional y técnico del texto; «muchos» refleja multa sin intensificar innecesariamente.
theological_decisions:
- issue: Título divino "altissimus"
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Dios Altísimo
  - el Supremo
  rationale: El latín nombra a Dios por su título de supremacía sin perífrasis. «El Altísimo» conserva esa designación reverente y común en el registro bíblico.
  doctrine_reference: Lenguaje bíblico del nombre/título divino
- issue: '"mysteria" como revelación divina'
  english_pob_reading: many mysteries
  chosen_spanish_reading: muchos misterios
  alternative_spanish_readings:
  - muchos secretos
  - muchas cosas ocultas
  rationale: «Misterios» mantiene la tensión de algo antes oculto y ahora revelado por Dios, sin reducirlo a mero enigma intelectual.
  doctrine_reference: Revelación divina y sabiduría oculta
translation_notes:
  revision_awareness: La revisión más reciente corrigió el inglés de 'answered me and said' a 'said' para ajustarlo al latín dixit. La versión española sigue esa corrección y no introduce 'respondió'.
  spanish_consistency_notes:
  - Se mantiene «el Altísimo» como título divino, coherente con el uso bíblico español y con el latín altissimus.
  - Se conserva «misterios» para mysteria, en continuidad con el lenguaje de revelación del pasaje.
  - El tono es formal pero natural, evitando calcos innecesarios como «las cuales» donde el español fluye mejor con «las cosas que».
