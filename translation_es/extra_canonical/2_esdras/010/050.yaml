  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/050.yaml
  text: For because you were grieved from your soul, and because you suffer for her from your whole heart, he showed you the splendor of her glory and the beauty of her majesty. Therefore I told you to remain in
  revision_pass:
