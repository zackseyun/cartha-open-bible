  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el latín y la revisión inglesa aprobada: mantiene las dos cláusulas causales, el sufrimiento interior, la distinción entre ''el esplendor de su gloria'' y ''la hermosura de su majestad'', y conserva correctamente la frase final truncada. Sin embargo, el sujeto de ''ostendit tibi'' en la fuente y en el inglés POB es tercera persona (''él te mostró''), mientras que el español draft dice ''te mostró'', que en este contexto se entiende naturalmente como segunda persona singular de ''mostrar'' (''tú mostraste''). Eso altera el sentido y la referencia.'
  spanish_quality_summary: El español es claro y digno, con buen registro bíblico moderno. 'Padeces por ella con todo tu corazón' y 'permanecieras en' son naturales. La principal dificultad de legibilidad es la ambigüedad grave de 'te mostró', que debe explicitar el sujeto con 'él'. Además, 'desde tu alma' es comprensible, pero 'en tu alma' suena más idiomático en español sin perder la fuerza interior del latín.
  glossary_alignment: 'No hay conflictos con la terminología de proyecto. Las decisiones léxicas principales son adecuadas: ''gloria'', ''majestad'', ''corazón''. La única corrección necesaria es sintáctico-semántica en el verbo ''mostró''; y por naturalidad bíblica conviene ajustar ''desde tu alma'' a ''en tu alma''.'
  issues:
  - severity: high
    issue: Ambigüedad/alteración del sujeto en 'te mostró'
    rationale: La fuente dice 'ostendit tibi' y el inglés POB 'he showed you'. En español, 'te mostró' sin sujeto expreso se lee de forma natural como 'tú mostraste', no 'él te mostró'. Eso cambia quién realiza la acción.
  - severity: medium
    issue: '''desde tu alma'' es poco idiomático en español'
    rationale: Aunque intenta calcar 'from your soul', en español bíblico y natural 'en tu alma' o 'desde lo profundo de tu alma' comunica mejor la interioridad sin sonar forzado. Dado el objetivo de legibilidad, conviene suavizar el calco.
  revised_spanish_text: Porque te contristaste en tu alma, y porque padeces por ella con todo tu corazón, él te mostró el esplendor de su gloria y la hermosura de su majestad. Por eso te dije que permanecieras en
