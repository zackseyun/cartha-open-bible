    changes_summary: Removed unsupported additions ('And now,' 'the Most High has seen that,' 'that you are'), kept both causal clauses closer to the Latin, changed 'brightness' to 'splendor' for claritatem, and rendered decoris as 'majesty' rather than repeating 'splendor.'
translation:
  language: es
  text: Porque te contristaste en tu alma, y porque padeces por ella con todo tu corazón, él te mostró el esplendor de su gloria y la hermosura de su majestad. Por eso te dije que permanecieras en
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ex animo contristatus es
  english_pob_choice: you were grieved from your soul
  chosen_spanish: te contristaste desde tu alma
  alternatives_spanish:
  - te doliste desde lo más profundo de tu ser
  - te afligiste en tu alma
  lexicon: contristatus es -> contristaste; ex animo -> desde tu alma
  rationale: El latín expresa una aflicción interior intensa; ‘desde tu alma’ conserva la fuerza de ‘from your soul’ y suena natural en español bíblico sin suavizar el alcance afectivo.
- source_word: ex toto corde pateris pro ea
  english_pob_choice: you suffer for her from your whole heart
  chosen_spanish: padeces por ella con todo tu corazón
  alternatives_spanish:
  - sufres por ella con todo tu corazón
  - padeces por ella de todo corazón
  lexicon: pateris -> padeces; ex toto corde -> con todo tu corazón
  rationale: ‘Padeces’ mantiene la carga de sufrimiento real que ya aparece en el inglés POB; ‘con todo tu corazón’ reproduce el énfasis total de ex toto corde con una fórmula clara en español.
- source_word: ostendit tibi
  english_pob_choice: he showed you
  chosen_spanish: te mostró
  alternatives_spanish:
  - te ha mostrado
  lexicon: ostendit -> mostró
  rationale: El perfecto latino se vierte de forma narrativa simple en español para seguir el valor de relato del pasaje y concordar con la revisión inglesa aprobada.
- source_word: claritatem gloriae eius
  english_pob_choice: the splendor of her glory
  chosen_spanish: el esplendor de su gloria
  alternatives_spanish:
  - la claridad de su gloria
  - el resplandor de su gloria
  lexicon: claritatem -> esplendor; gloriae -> gloria
  rationale: La revisión inglesa cambió ‘brightness’ a ‘splendor’; ‘esplendor’ es la opción más natural y fiel en español para claritatem sin perder la intensificación semántica.
- source_word: pulchritudinem decoris eius
  english_pob_choice: the beauty of her majesty
  chosen_spanish: la hermosura de su majestad
  alternatives_spanish:
  - la belleza de su hermosura
  - la hermosura de su adorno
  lexicon: pulchritudinem -> hermosura; decoris -> majestad
  rationale: Se evita repetir ‘esplendor’ y se refleja la distinción de la revisión inglesa entre gloria y decus. ‘Majestad’ comunica dignidad y ornato elevado mejor que una repetición de ‘hermosura’.
- source_word: Propterea enim dixi tibi ut maneres in
  english_pob_choice: Therefore I told you to remain in
  chosen_spanish: Por eso te dije que permanecieras en
  alternatives_spanish:
  - Por tanto te dije que te quedaras en
  - Así que te dije que permanecieras en
  lexicon: dixi tibi ut maneres -> te dije que permanecieras
  rationale: La cláusula queda abierta en el fragmento; se conserva literalmente la incompletitud con una construcción española natural que deja la suspensión final igual que el texto fuente.
theological_decisions:
- issue: Relación entre gloria y majestad en la descripción de la visión
  english_pob_reading: the splendor of her glory and the beauty of her majesty
  chosen_spanish_reading: el esplendor de su gloria y la hermosura de su majestad
  alternative_spanish_readings:
  - el esplendor de su gloria y la belleza de su majestad
  - el resplandor de su gloria y la hermosura de su majestad
  rationale: Se preserva la duplicidad del original sin fusionar los términos. ‘Gloria’ y ‘majestad’ quedan diferenciadas para no borrar el matiz de claritas / decoris del latín y de la revisión inglesa.
  doctrine_reference: 2 Esdras 10:50; distinción léxica entre manifestación gloriosa y dignidad/majestad
- issue: Intensidad afectiva del dolor del destinatario
  english_pob_reading: grieved from your soul ... suffer for her from your whole heart
  chosen_spanish_reading: te contristaste desde tu alma ... padeces por ella con todo tu corazón
  alternative_spanish_readings:
  - te afligiste desde tu alma ... sufres por ella con todo tu corazón
  - te doliste en tu alma ... sufres por ella de todo corazón
  rationale: No se atenúa el dolor a una mera tristeza; el español mantiene la interioridad y totalidad afectiva que el texto subraya como causa de la revelación.
  doctrine_reference: 2 Esdras 10:50; correspondencia entre aflicción interior y respuesta reveladora
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente aprobada: se eliminaron añadidos no sustentados (‘And now,’ y ‘the Most High has seen that’), se conservaron ambas cláusulas causales cercanas al latín, se eligió ‘esplendor’ para claritatem y una traducción distinta para decoris (‘majestad’) para evitar repetición semántica.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y moderno, evitando calcos duros donde el español natural ofrece una equivalencia precisa.
  - No se introdujeron notas al pie porque el fragmento dado no presenta una ambigüedad textual o traductológica que requiera anclaje visible en el verso.
  - Se respetó la cláusula final truncada del testimonio latino, por lo que la traducción termina abierta en ‘en’.
