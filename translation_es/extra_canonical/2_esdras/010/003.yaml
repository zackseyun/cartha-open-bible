translation:
  language: es
  text: Y aconteció que, cuando todos dejaron de consolarme para que yo descansara, me levanté de noche y huí y vine, como ves, a este campo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et factum est
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: Latin factum est
  rationale: Acontecimiento narrativo introductorio natural en español; mantiene el tono bíblico sin sonar calcado.
- source_word: cum omnes quievissent
  english_pob_choice: when all had stopped comforting me
  chosen_spanish: cuando todos dejaron de consolarme
  alternatives_spanish:
  - cuando todos habían cesado de consolarme
  - cuando todos se aquietaron
  lexicon: Latin quievissent
  rationale: El contexto muestra que el descanso se relaciona con que los demás terminaron el consuelo; por eso se expresa la interrupción de la acción de consolar, preservando la relación causal implícita.
- source_word: ut me consolarentur ut quiescerem
  english_pob_choice: so that I might rest
  chosen_spanish: para que pudiera descansar
  alternatives_spanish:
  - a fin de que descansara
  - para que descansase
  lexicon: Latin consolarentur / quiescerem
  rationale: 'Se conserva la finalidad: los otros buscaban consolarlo con el propósito de que él descansara. ''Descansar'' comunica bien quiescere en español moderno.'
- source_word: surrexi nocte
  english_pob_choice: I rose by night
  chosen_spanish: me levanté de noche
  alternatives_spanish:
  - me alzé de noche
  - me levanté durante la noche
  lexicon: Latin surrexi nocte
  rationale: Verbo simple y natural; mantiene la acción concreta y la indicación temporal nocturna.
- source_word: fugi
  english_pob_choice: fled
  chosen_spanish: huí
  alternatives_spanish:
  - escapé
  - me fui huyendo
  lexicon: Latin fugere
  rationale: '''Huí'' es la correspondencia directa y conserva la fuerza de escape.'
- source_word: veni... in hoc campo
  english_pob_choice: came ... into this field
  chosen_spanish: vine, como ves, a este campo
  alternatives_spanish:
  - llegué, como ves, a este campo
  - vine a este campo
  lexicon: Latin veni / in hoc campo
  rationale: '''Vine'' reproduce el movimiento de llegada; ''como ves'' refleja el gesto deíctico del texto inglés y la presencia inmediata del hablante ante el lector.'
theological_decisions:
- issue: Relación entre consuelo, descanso y huida
  english_pob_reading: when all had stopped comforting me so that I might rest
  chosen_spanish_reading: cuando todos dejaron de consolarme para que pudiera descansar
  alternative_spanish_readings:
  - cuando todos me consolaban para que descansara
  - cuando todos cesaron de consolarme para que descansara
  rationale: No se introduce una interpretación doctrinal nueva; se conserva la secuencia narrativa y la finalidad humana del consuelo hacia el descanso, sin suavizar el cambio de situación que precede a la huida.
  doctrine_reference: None; narrative sense only
translation_notes:
  revision_awareness: The English POB was revised from 'ceased from comforting me' to 'stopped comforting me' for naturalness while preserving meaning. The Spanish draft follows that same naturalness by using 'dejaron de consolarme' rather than a more literal but stiffer 'cesaron de consolarme'.
  spanish_consistency_notes:
  - Se mantiene un estilo narrativo sobrio y bíblico sin arcaísmos innecesarios.
  - '''Descansar'' se usa para quiescere por claridad en español contemporáneo.'
  - No se introduce 'SEÑOR' ni terminología confesional ajena al texto.
