base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/003.yaml
  text: And it happened, when all had stopped comforting me so that I might rest, that I rose by night and fled and came, as you see, into this field.
  revision_pass:
    model: gpt-5.4
