translation:
  language: es
  text: 'Te lo recordaré.” Y dije[a]: “Habla, mi señor; solo no me…'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, según una lectura/traducción anterior basada en un límite de versículo distinto: «Y él me dijo: “Levántate como un hombre, y yo te instruiré.”».'
    reason: previous_rendering
lexical_decisions:
- source_word: commonebo te
  english_pob_choice: I will remind you
  chosen_spanish: Te lo recordaré
  alternatives_spanish:
  - Te lo recordaré de nuevo
  - Te lo haré recordar
  lexicon: commoneo
  rationale: El latín commonebo expresa la idea de recordar o traer de nuevo a la memoria; por eso «recordaré» comunica mejor el matiz que «instruiré». Se evita una paráfrasis más fuerte que el origen.
- source_word: domine meus
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - señor mío
  - mi soberano
  lexicon: dominus
  rationale: «Mi señor» reproduce de manera natural y reverente el vocativo latino, sin introducir un registro demasiado arcaico ni cambiar el valor relacional del apelativo.
- source_word: tantum me noli
  english_pob_choice: only do not
  chosen_spanish: solamente no me…
  alternatives_spanish:
  - solo no me…
  - tan solo no me…
  lexicon: noli + tantum
  rationale: El fragmento latino está incompleto; se conserva la clausula abierta con puntos suspensivos para respetar la evidencia textual y no completar artificialmente el sentido.
theological_decisions:
- issue: Tratamiento del hablante y del tono reverente en la súplica
  english_pob_reading: And I said, “Speak, my lord; only do not
  chosen_spanish_reading: 'Y dije: “Habla, mi señor; solamente no me…'
  alternative_spanish_readings:
  - 'Y dije: “Habla, señor mío; solamente no me…”'
  - 'Y dije: “Habla, mi señor; solo no me…”'
  rationale: No hay contenido doctrinal desarrollado en este fragmento, pero sí un tono de deferencia personal. Se preserva la forma reverente sin convertirla en terminología eclesiástica fija.
  doctrine_reference: Pragmatics of address / reverence in dialogue
translation_notes:
  revision_awareness: 'El texto inglés auditado fue corregido por desalineación versal: «I will instruct you» pasó a «I will remind you» para ajustarse al latín commonebo te. También se señaló que el cierre del verso es incompleto en el testimonio latino; por eso la traducción española mantiene la incompletud con suspensión.'
  spanish_consistency_notes:
  - Se usa «mi señor» como fórmula reverente de dirección personal, no como título dogmático.
  - Se evita completar el último sintagma porque el testimonio latino proporcionado termina abruptamente.
  - La nota a preserva la variante inglesa anterior relevante para la historia textual y de traducción.
