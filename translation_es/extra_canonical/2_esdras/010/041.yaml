  rationale: Se elimina la expansión «a la mujer», que pertenece al verso anterior según la corrección de frontera versal ya documentada. Se ajusta lugentem a «se lamentaba» para reflejar mejor el sentido de duelo/lamento. Se conserva una nota breve para el matiz de iam en «Nunc autem iam».
