translation:
  language: es
  text: 'Entonces dejé de lado las palabras en las que aún estaba ocupado, y respondí con ira y dije:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et dereliqui
  english_pob_choice: Then I left off
  chosen_spanish: Entonces dejé de lado
  alternatives_spanish:
  - Entonces abandoné
  - Entonces interrumpí
  lexicon: Latin derelinquo
  rationale: «Dereliqui» expresa dejar, soltar o abandonar una acción en curso. «Dejé de lado» comunica con naturalidad en español que interrumpió lo que venía haciendo, sin añadir más abandono del que el latín exige.
- source_word: sermones
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - el discurso
  - las expresiones
  lexicon: Latin sermo
  rationale: En este contexto, «sermones» se refiere al hablar o a las palabras pronunciadas. «Las palabras» es la opción más directa y transparente para español bíblico moderno.
- source_word: in quibus adhuc eram
  english_pob_choice: in which I had still been engaged
  chosen_spanish: en las que aún estaba ocupado
  alternatives_spanish:
  - en las que todavía estaba ocupado
  - con las que aún me ocupaba
  lexicon: Latin in + relativum; eram
  rationale: La frase latina indica una actividad en curso. «Aún estaba ocupado» conserva la idea de estar aún inmerso en ese hablar, sin sobrecargarla con una construcción más pesada.
- source_word: respondi
  english_pob_choice: I answered
  chosen_spanish: respondí
  alternatives_spanish:
  - contesté
  - repuse
  lexicon: Latin respondeo
  rationale: «Respondí» es el equivalente normal y fiel de «respondi».
- source_word: cum ira
  english_pob_choice: in anger
  chosen_spanish: con ira
  alternatives_spanish:
  - airadamente
  - enojado
  lexicon: Latin ira
  rationale: La preposición latina «cum» con ablativo aquí señala el modo o acompañamiento de la respuesta. «Con ira» mantiene el sustantivo y conserva la fuerza emocional del original.
- source_word: dixi
  english_pob_choice: and said
  chosen_spanish: y dije
  alternatives_spanish:
  - y hablé
  - y exclamé
  lexicon: Latin dico
  rationale: «Y dije» reproduce de manera simple y exacta la secuencia narrativa del latín.
theological_decisions:
- issue: Subject/object ambiguity in the English audit trail
  english_pob_reading: Then I left off ... and I answered in anger and said,
  chosen_spanish_reading: 'Entonces dejé de lado las palabras en las que aún estaba ocupado, y respondí con ira y dije:'
  alternative_spanish_readings:
  - 'Entonces dejé de lado las palabras en las que aún estaba ocupado, y le respondí con ira y dije:'
  - 'Entonces dejé de lado las palabras en las que aún estaba ocupado, y respondí airadamente y dije:'
  rationale: El latín dado no incluye un objeto indirecto femenino; por eso la traducción evita introducirlo. La lectura elegida mantiene la narración sobria y exacta, y conserva la ira como rasgo del modo de responder.
  doctrine_reference: Fidelidad textual y control de añadidos; no se introduce referente ausente del latín base.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante: se eliminó «her» porque no está en el latín fuente. La versión española sigue esa corrección y evita cualquier complemento femenino no atestado, manteniendo la economía del original.'
  spanish_consistency_notes:
  - He mantenido un estilo sobrio y narrativo, con puntuación que prepara la cita directa final.
  - No se han usado convenciones de enmascaramiento para el nombre divino porque no aparece en este versículo.
  - «Con ira» preserva el matiz emocional sin convertirlo en adverbio interpretativo.
