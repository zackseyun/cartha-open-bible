    unchanged: false
    changes_summary: Removed the duplicated phrase, revised 'was about to show' to 'was beginning to show' to match incipiebat, and restored the omitted final clause 'Therefore I said' from Propterea dixi.
translation:
  language: es
  text: Pues yo sabía que el Altísimo estaba comenzando a mostrarte estas cosas[a]. Por eso dije
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pues yo sabía que el Altísimo estaba a punto de mostrarte estas cosas».'
    reason: alternative_reading
lexical_decisions:
- source_word: altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Supremo
  - el Dios Altísimo
  lexicon: teológico / título divino
  rationale: «Altísimo» comunica el título divino del latino altissimus de manera natural y reverente en español. Mantiene el valor titular sin sustituirlo por una formulación más explicativa que no exige el texto.
- source_word: incipiebat ostendere
  english_pob_choice: was beginning to show you these things
  chosen_spanish: estaba comenzando a mostrarte estas cosas
  alternatives_spanish:
  - iba a mostrarte estas cosas
  - empezaba a mostrarte estas cosas
  lexicon: aspectual / verbal
  rationale: El latino incipiebat marca un inicio en progreso; «estaba comenzando a» conserva esa progresividad mejor que una simple inminencia. Se evita «iba a» porque desplaza el matiz hacia cercanía temporal más que a proceso iniciado.
- source_word: Propterea dixi
  english_pob_choice: Therefore I said
  chosen_spanish: Por eso dije
  alternatives_spanish:
  - Por tanto dije
  - Así que dije
  lexicon: conector discursivo
  rationale: «Propterea» es causal-consecutivo; «Por eso» mantiene la relación con la cláusula anterior en español claro y natural. Se deja el verbo final sin complemento porque el contexto textual inmediato en este fragmento no lo desarrolla.
theological_decisions:
- issue: Título divino para altissimus
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Supremo
  - el Dios Altísimo
  rationale: No hay necesidad de introducir una forma más interpretativa. «El Altísimo» es la equivalencia directa y conserva el registro bíblico del título divino sin añadir explicaciones no presentes en el latino.
  doctrine_reference: Título divino en tradición bíblica; mantiene la referencia a Dios como el Altísimo.
- issue: Valor prospectivo de incipiebat
  english_pob_reading: was beginning to show you these things
  chosen_spanish_reading: estaba comenzando a mostrarte estas cosas
  alternative_spanish_readings:
  - estaba a punto de mostrarte estas cosas
  - comenzaba a mostrarte estas cosas
  rationale: La revisión inglesa fue inestable entre «was about to» y «was beginning to». El latino incipiebat favorece la lectura progresiva, no meramente inminente; por eso la frase española conserva el inicio del proceso, sin intensificarlo doctrinalmente.
  doctrine_reference: Aspecto verbal / secuencia narrativa, sin implicación doctrinal adicional.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: se rechazó la lectura inglesa «was about to» como traducción principal porque el latino incipiebat favorece «estaba comenzando». También se preservó el conector final «Por eso dije», restituido en la revisión, y se evitó añadir énfasis innecesario a ego.'
  spanish_consistency_notes:
  - Se mantuvo «Altísimo» para el título divino, coherente con el patrón POB.
  - Se evitó «SEÑOR» o una sustitución litúrgica, porque el testimonio fuente aquí es latino y no exige ocultar el nombre divino.
  - El cierre «Por eso dije» queda intencionalmente abierto, porque el fragmento latino termina en Propterea dixi y el contexto inmediato no añade el contenido de la cita.
