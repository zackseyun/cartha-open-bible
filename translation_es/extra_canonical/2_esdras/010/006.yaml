translation:
  language: es
  text: 'Encendido de ira contra ella, le dije: «[a]¡Necia sobre todas las mujeres! ¿No ves nuestro duelo y lo que nos ha sucedido?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «¡La más necia de todas las mujeres!»; se conserva «Necia sobre todas las mujeres» para reflejar con más cercanía la dureza y el giro superlativo del latín.'
    reason: lexical_alternative
lexical_decisions:
- source_word: iracundia ad eam et dixi
  english_pob_choice: In anger at her, I said
  chosen_spanish: Encendido de ira contra ella, le dije
  alternatives_spanish:
  - Enojado con ella, le dije
  - En mi ira, le dije
  lexicon: iracundia -> ira/enojo; ad eam -> contra ella / hacia ella; dixi -> le dije
  rationale: El latín abre con la causa/emoción antes del verbo; en español se conserva ese orden causal con una construcción natural y digna. 'Encendido de ira' mantiene la fuerza afectiva de iracundia sin sonar demasiado literal.
- source_word: Stulta
  english_pob_choice: Most foolish
  chosen_spanish: ¡Necia sobre todas las mujeres!
  alternatives_spanish:
  - ¡La más necia de todas las mujeres!
  - ¡Necia entre todas las mujeres!
  lexicon: stulta -> necia/insensata; comparativo intensivo -> 'sobre todas' / 'de todas'
  rationale: El latín aquí expresa una invectiva superlativa dirigida a una mujer. 'Necia sobre todas las mujeres' reproduce la intensidad sin introducir un adverbio ajeno al registro del texto.
- source_word: mulieres
  english_pob_choice: women
  chosen_spanish: mujeres
  alternatives_spanish:
  - mujeres
  lexicon: mulieres -> mujeres
  rationale: Se mantiene el sustantivo directo y general del original; no hay motivo textual para especificarlo más.
- source_word: non vides
  english_pob_choice: do you not see
  chosen_spanish: ¿No ves
  alternatives_spanish:
  - ¿Acaso no ves?
  - ¿No estás viendo?
  lexicon: non vides -> no ves
  rationale: La pregunta retórica del latín se vuelve en español una interrogación directa breve y natural, conservando el reproche.
- source_word: luctum nostrum
  english_pob_choice: our mourning
  chosen_spanish: nuestro duelo
  alternatives_spanish:
  - nuestro luto
  - nuestra aflicción
  lexicon: luctus -> duelo/luto; nostrum -> nuestro
  rationale: '''Duelo'' comunica el lamento por una pérdida y evita una posible lectura excesivamente ceremonial de ''luto''.'
- source_word: et quod factum est nobis
  english_pob_choice: and what has happened to us
  chosen_spanish: y lo que nos ha sucedido
  alternatives_spanish:
  - y lo que nos ha acontecido
  - y lo que nos ha pasado
  lexicon: quod factum est nobis -> lo que nos ha sucedido / acontecido
  rationale: La formulación mantiene la pasiva impersonal del latín en una forma idiomática española, sin suavizar el hecho sufrido.
theological_decisions:
- issue: Tono injurioso del reproche
  english_pob_reading: Most foolish of all women
  chosen_spanish_reading: ¡Necia sobre todas las mujeres!
  alternative_spanish_readings:
  - ¡La más necia de todas las mujeres!
  - ¡Insensata entre todas las mujeres!
  rationale: El pasaje conserva un reproche fuerte; no se atenúa a un mero desacuerdo. La elección retiene la dureza verbal del latín y del English POB.
  doctrine_reference: Respeto al sentido literal y al registro del texto narrativo; no aplica una formulación doctrinal específica.
translation_notes:
  revision_awareness: La revisión inglesa restauró el arranque causal 'In anger at her, I said,' a partir del latín iracundia ad eam et dixi. Esta traducción española lo incorpora explícitamente al inicio. También sigue la intensificación de la reprensión con un superlativo fiel al latín.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; no aplica en este versículo.
  - '''duelo'' se reserva aquí para luctum, sin cargarlo de sentido litúrgico.'
  - La cita se cierra con comillas españolas y signos de interrogación invertidos conforme a la norma del español.
  - Se evita 'siervo' u otra terminología no presente en el pasaje.
