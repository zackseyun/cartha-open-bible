lexical_decisions:
- source_word: ingredere
  english_pob_choice: Therefore go into
  chosen_spanish: Por tanto, entra
  alternatives_spanish:
  - Así que entra
  - Por eso, entra
  lexicon: Latin ingredere
  rationale: El imperativo expresa movimiento hacia el interior; en español natural y fiel, 'entra' reproduce el mandato con mayor claridad que un calco más pesado. 'Por tanto' conserva la relación inferencial de ergo.
- source_word: in civitatem
  english_pob_choice: into the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - a la ciudad
  - dentro de la ciudad
  lexicon: Latin civitas
  rationale: '''Entra en la ciudad'' es la construcción más natural en español para el movimiento de ingreso; mantiene el sentido espacial de ''into the city'' sin sobrecargar la frase.'
- source_word: ad virum tuum
  english_pob_choice: to your husband
  chosen_spanish: con tu esposo
  alternatives_spanish:
  - a tu esposo
  - junto a tu esposo
  lexicon: Latin vir / spouse relation
  rationale: En este contexto relacional, 'esposo' comunica mejor la referencia matrimonial que 'hombre' o 'varón'. Se elige 'con' para reflejar el destino relacional implícito en el contexto narrativo, evitando una repetición torpe de 'a' tras 'entra'.
theological_decisions:
- issue: Identidad del hablante en 'Et dixit ad me'
  english_pob_reading: 'And he said to me:'
  chosen_spanish_reading: 'Y él me dijo:'
  alternative_spanish_readings:
  - 'Y ella me dijo:'
  - 'Y me dijo:'
  rationale: Se sigue la revisión más reciente del expediente auditado, que corrigió la lectura anterior. Mantener 'él' respeta el texto latino recibido en esta fase del proyecto y evita introducir una solución interpretativa no sustentada por el dato textual proporcionado.
  doctrine_reference: Fidelidad textual al testimonio latino base; no hay afirmación doctrinal adicional.
translation_notes:
  revision_awareness: 'El expediente muestra una corrección reciente del segmento final: la frase introducida debe ser ''Y él me dijo:'' y no ''Y ella me dijo:''. También se ajustó la puntuación para reflejar una introducción directa de discurso. La versión española incorpora esa revisión y coloca la nota alternativa solo sobre la primera proposición, siguiendo el antiguo pie de nota inglés pero anclándolo correctamente en el texto.'
  spanish_consistency_notes:
  - Se mantiene 'Y él me dijo:' como reflejo del estado revisado del texto fuente auditado.
  - Se conserva 'Por tanto' para ergo, en registro bíblico claro.
  - No se introduce 'SEÑOR' ni terminología teológica ajena al pasaje.
  - La nota [a] está anclada exactamente en la frase con variante posible, evitando notas sueltas.
