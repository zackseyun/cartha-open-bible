translation:
  language: es
  text: Por tanto, ve a la ciudad, adonde está tu esposo. Y él me dijo:[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por tanto, ve a la ciudad, adonde está tu esposo».'
