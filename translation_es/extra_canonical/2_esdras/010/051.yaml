- from: Por esta razón te dije que permanecieras en el campo, donde no hay casa edificada[a].
  to: Por esta razón te dije que permanecieras en el campo, donde no se ha edificado una casa[a].
  rationale: Se ajusta la cláusula final a un español más natural y más fiel al valor verbal del latín y a la revisión inglesa aprobada («has been built»). Se conserva en nota la alternativa previa con matiz pluscuamperfecto, pero presentada como alternativa de traducción, no como variante textual. No se requiere adjudicación adicional.
