translation:
  language: es
  text: Por esta razón te dije que permanecieras en el campo, donde no se ha edificado una casa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «donde no había sido edificada una casa».'
    reason: alternative_previous_rendering
lexical_decisions:
- source_word: propterea enim
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por eso
  - Por este motivo
  lexicon: propterea
  rationale: La frase causal introduce la razón de la instrucción previa; «Por esta razón» conserva el nexo explicativo de modo claro y solemne sin añadir matiz no sustentado por el latín.
- source_word: dixi tibi
  english_pob_choice: I told you
  chosen_spanish: te dije
  alternatives_spanish:
  - te he dicho
  - te ordené
  lexicon: dico
  rationale: El latín dice literalmente «dije a ti». «Te dije» reproduce la forma simple del original y mantiene la relación directa sin convertirla en mandato explícito.
- source_word: ut maneres
  english_pob_choice: to remain
  chosen_spanish: que permanecieras
  alternatives_spanish:
  - que te quedaras
  - que permanecieras allí
  lexicon: maneo
  rationale: «Maneres» expresa permanencia/continuidad; «permanecieras» conserva ese valor más formal que «te quedaras», y encaja con la cláusula final de ubicación.
- source_word: in campo
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el llano
  - en la llanura
  lexicon: campus
  rationale: «Campo» es el equivalente más directo y natural para el espacio abierto del latín, manteniendo la imagen geográfica sin interpretarla.
- source_word: ubi domus non est aedificata
  english_pob_choice: where no house has been built
  chosen_spanish: donde no hay casa edificada
  alternatives_spanish:
  - donde no se ha edificado una casa
  - donde no había casa edificada
  lexicon: domus / aedificata
  rationale: El latino «non est aedificata» expresa un estado presente de no estar construida; «no hay casa edificada» conserva ese estado resultante y evita el retroceso temporal que implicaría «había/habían sido». «Casa edificada» mantiene el participio pasivo sin sobreexplicar.
theological_decisions:
- issue: Valor temporal de «ubi domus non est aedificata»
  english_pob_reading: where no house has been built
  chosen_spanish_reading: donde no hay casa edificada
  alternative_spanish_readings:
  - donde no ha sido edificada una casa
  - donde no había casa edificada
  rationale: La revisión del audit trail aclara que el latín es presente perfectivo de estado, no pluscuamperfecto. El español refleja ese estado actual sin desplazamiento temporal innecesario.
  doctrine_reference: Precisión aspectual del texto base; no implica doctrina particular.
translation_notes:
  revision_awareness: El audit trail confirma una revisión previa desde «had been built» a «has been built» por el valor aspectual del latín «est aedificata». La versión española adopta ese estado presente con «no hay casa edificada», evitando el pretérito pluscuamperfecto.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, sin arcaísmos innecesarios.
  - «Casa edificada» preserva la pasiva del participio latino sin introducir perífrasis más interpretativas.
  - La puntuación sigue la norma española y conserva la fluidez de una sola oración causal y relativa.
