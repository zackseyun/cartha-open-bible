review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la estructura y el sentido general del latín: «propterea enim» = «Por esta razón», «dixi tibi» = «te dije», «ut maneres in campo» = «que permanecieras en el campo». Sin embargo, «ubi domus non est aedificata» queda mejor reflejado en español con una forma verbal explícita de construcción pasiva/perifrástica («donde no se ha edificado una casa») que con «donde no hay casa edificada», porque esta última suena más estática y algo menos natural, y puede sugerir mera ausencia visible más que el hecho de no haber sido construida.'
  spanish_quality_summary: El español es claro y comprensible, pero «no hay casa edificada» resulta algo rígido y menos idiomático que «no se ha edificado una casa» o «no ha sido edificada una casa». Además, la nota al pie actual usa una formulación algo torpe («no había sido edificada una casa») y su reason debería reflejar que es una alternativa de traducción previa/aspectual, no una variante textual.
  glossary_alignment: 'No hay terminología teológica sensible en este versículo. El léxico escogido es en general adecuado. La principal mejora es estilístico-semántica: representar mejor «non est aedificata» con una construcción española más natural y alineada con el English POB revisado («has been built»).'
  issues:
  - severity: medium
    issue: «donde no hay casa edificada» suena poco natural y ligeramente menos preciso que una forma verbal explícita.
    rationale: El latín «ubi domus non est aedificata» expresa que no se ha construido una casa allí. En español bíblico natural, «donde no se ha edificado una casa» conserva mejor el valor verbal/aspectual y evita una frase nominal algo forzada.
  - severity: low
    issue: La nota al pie está formulada de manera poco elegante y su clasificación no corresponde bien.
    rationale: 'El English POB conserva una alternativa de traducción previa («had been built»), no una variante textual. En español conviene: «O: “donde no había sido edificada una casa”» o mejor una formulación más natural, manteniendo la alternativa aspectual.'
  revised_spanish_text: Por esta razón te dije que permanecieras en el campo, donde no se ha edificado una casa[a].
  revised_footnotes:
  - marker: a
    text: 'O: «donde no había sido edificada una casa».'
    reason: alternative_previous_rendering
  revision_rationale: Se ajusta la cláusula final a un español más natural y más fiel al valor verbal del latín y a la revisión inglesa aprobada («has been built»). Se conserva en nota la alternativa previa con matiz pluscuamperfecto, pero presentada como alternativa de traducción, no como variante textual. No se requiere adjudicación adicional.
