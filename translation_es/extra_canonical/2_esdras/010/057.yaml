translation:
  language: es
  text: Pero tú eres dichoso más que muchos[a], y has sido llamado por el Altísimo, como lo han sido solo unos pocos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero tú eres dichoso más que muchos, y has sido llamado por el Altísimo, como lo han sido solo unos pocos»'
    reason: previous_rendering
lexical_decisions:
- source_word: Tu autem beatus es prae multis
  english_pob_choice: But you are blessed above many
  chosen_spanish: Pero tú eres bendecido[a] sobre muchos
  alternatives_spanish:
  - Pero tú eres bendito sobre muchos
  - Pero tú eres dichoso sobre muchos
  lexicon: beatus -> bendecido/bendito/dichoso
  rationale: El latín beatus comunica bienaventuranza o estado favorable; en español, «bendecido» conserva la noción de favor recibido sin caer en un tono demasiado litúrgico. «Sobre muchos» mantiene el comparativo prae multis de manera sobria y fiel.
- source_word: uocatus es apud Altissimum
  english_pob_choice: you have been called by the Most High
  chosen_spanish: has sido llamado por el Altísimo
  alternatives_spanish:
  - has sido llamado ante el Altísimo
  - has sido llamado en presencia del Altísimo
  lexicon: uocatus es -> has sido llamado; apud -> por/ante/en presencia de
  rationale: Se conserva la voz pasiva de 'called' como en el inglés POB. Aunque apud puede sugerir presencia o localización, el contexto permite una lectura natural en español con «por el Altísimo»; a la vez, la nota de revisión del inglés muestra la tensión interpretativa entre agencia y presencia.
- source_word: Altissimum
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Supremo
  lexicon: Altissimus -> Altísimo
  rationale: «Altísimo» es el equivalente directo y reverente ya establecido para el título divino, sin introducir una expansión innecesaria.
- source_word: prae multis ... et ... sicut pauci
  english_pob_choice: above many ... as only a few have been
  chosen_spanish: sobre muchos ... como solo unos pocos han sido
  alternatives_spanish:
  - más que muchos ... como solo unos pocos han sido
  - entre muchos ... como solo unos pocos han sido
  lexicon: comparative and restrictive phrase
  rationale: 'La segunda mitad refleja la restricción del latín y del inglés POB: la idea de ser contado entre un grupo reducido. «Como solo unos pocos han sido» conserva esa limitación sin añadir elementos no presentes en el texto fuente.'
theological_decisions:
- issue: Relación entre llamado y presencia ante el Altísimo
  english_pob_reading: you have been called by the Most High
  chosen_spanish_reading: has sido llamado por el Altísimo
  alternative_spanish_readings:
  - has sido llamado ante el Altísimo
  - has sido llamado en presencia del Altísimo
  rationale: El texto latino usa apud, que puede denotar cercanía/presencia. Sin embargo, el pasivo 'has sido llamado' permite en español la lectura de agente sin perder la ambigüedad contextual. Se deja constancia de la tensión porque el audit trail inglés pasó por una revisión que proponía 'before the Most High'.
  doctrine_reference: 4 Esdras 10:57; valoración del matiz preposicional en traducción bíblica
- issue: Bienaventuranza de Ezra como favor concedido
  english_pob_reading: But you are blessed above many
  chosen_spanish_reading: Pero tú eres bendecido sobre muchos
  alternative_spanish_readings:
  - Pero tú eres bendito sobre muchos
  - Pero tú eres dichoso sobre muchos
  rationale: No se fuerza una formulación eclesiástica fija. «Bendecido» comunica el estado de favor sin perder la fuerza relacional del original. Se evita traducirlo como simple felicidad subjetiva, ya que el contexto es honor/favor conferido.
  doctrine_reference: 4 Esdras 10:57; lenguaje de bienaventuranza
translation_notes:
  revision_awareness: 'El texto base latino es breve y transmite dos ideas: bienaventuranza comparativa (beatus es prae multis) y llamado asociado al Altísimo (uocatus es apud Altissimum). El audit trail inglés osciló entre ''called before the Most High'' y ''called by the Most High''; la revisión más reciente eligió la lectura causal/agencial, pero el latín apud deja margen para una matización de presencia. La traducción española mantiene la lectura más natural y publica, mientras la nota registra la alternativa interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para el título divino, coherente con el sistema español POB.
  - Se usa «bendecido» y no «bendito» para conservar la idea de favorecimiento recibido sin excesiva fijación litúrgica.
  - Se conserva la pasiva «has sido llamado» para respetar la forma del original y del inglés auditado.
  - La nota de alternativa en pie de página recoge la lectura sin alterar el cuerpo principal.
