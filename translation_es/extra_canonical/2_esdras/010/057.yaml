review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue de cerca el latín y el texto inglés POB en su estructura básica, pero no preserva bien la naturalidad ni del comparativo latino prae multis ni del predicado beatus. Además, el anclaje de nota en «bendecido[a]» introduce una forma editorial impropia del texto bíblico final. La elección «por el Altísimo» para apud es defendible dado el audit trail final en inglés, así que no requiere cambio aquí.
  spanish_quality_summary: 'El español actual suena poco natural en varios puntos: «bendecido sobre muchos» es torpe; «como solo unos pocos han sido» queda elíptico de manera innecesariamente dura en español; y «bendecido[a]» no es una redacción publicable. Una formulación más idiomática y fiel sería «dichoso más que muchos» y «como lo han sido solo unos pocos».'
  glossary_alignment: «el Altísimo» está bien alineado con la terminología del proyecto. No hay conflicto con términos doctrinales principales. La revisión propuesta mantiene la decisión inglesa final «called by the Most High» como «llamado por el Altísimo», aunque se reconoce en la justificación que apud tiene tensión semántica.
  issues:
  - severity: high
    issue: Uso de «bendecido[a]» en el texto principal
    rationale: El corchete de género es impropio de una edición bíblica final y no corresponde al referente masculino del contexto.
  - severity: medium
    issue: «bendecido sobre muchos» no refleja bien un español natural para beatus prae multis
    rationale: Aunque es literalmente cercano, en español suena forzado. «Dichoso más que muchos» o «bienaventurado más que muchos» expresa mejor el sentido comparativo y la cualidad de beatus.
  - severity: medium
    issue: «como solo unos pocos han sido» resulta demasiado elíptico
    rationale: La frase puede entenderse, pero en español fluye mejor «como lo han sido solo unos pocos», que conserva la elipsis sin volverla áspera.
  revised_spanish_text: Pero tú eres dichoso más que muchos[a], y has sido llamado por el Altísimo, como lo han sido solo unos pocos.
  revised_footnotes:
