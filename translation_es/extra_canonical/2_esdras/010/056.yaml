translation:
  language: es
  text: Y después de esto oirás tanto como tus oídos sean capaces de oír.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et post haec
  english_pob_choice: And after this
  chosen_spanish: Y después de esto
  alternatives_spanish:
  - Y tras esto
  - Y luego de esto
  lexicon: post + haec
  rationale: La secuencia temporal se expresa de forma directa y natural en español con «después de esto», manteniendo el orden y el valor consecutivo del latín sin añadir matices interpretativos.
- source_word: audies
  english_pob_choice: you will hear
  chosen_spanish: oirás
  alternatives_spanish:
  - escucharás
  lexicon: audio
  rationale: «Oír» reproduce con fidelidad la percepción auditiva simple del latín; «escuchar» podría sugerir atención deliberada que el texto no exige.
- source_word: quantum capit
  english_pob_choice: as much as
  chosen_spanish: tanto como
  alternatives_spanish:
  - cuanto
  - todo lo que
  lexicon: quantum + capio
  rationale: «Tanto como» conserva la medida comparativa y evita endurecer la frase en una construcción más explicativa de lo necesario.
- source_word: auditus aurium tuarum
  english_pob_choice: your ears are able to hear
  chosen_spanish: tus oídos sean capaces de oír
  alternatives_spanish:
  - tus oídos puedan oír
  - lo que puedan oír tus oídos
  lexicon: auditus, aurium, tuarum
  rationale: La redundancia latina («auditus aurium») se refleja con una fórmula igualmente explícita en español. «Sean capaces de oír» preserva la idea de capacidad, no solo de posibilidad, sin exagerar el sentido.
theological_decisions:
- issue: Capacidad limitada de la audición como imagen de medida/revelación
  english_pob_reading: you will hear as much as your ears are able to hear
  chosen_spanish_reading: oirás tanto como tus oídos sean capaces de oír
  alternative_spanish_readings:
  - oirás todo lo que tus oídos puedan oír
  - oirás según la capacidad de tus oídos
  rationale: El latín no desarrolla una doctrina, sino una limitación cuantitativa o receptiva. La traducción conserva esa tensión de medida y capacidad sin convertirla en una paráfrasis más abstracta.
  doctrine_reference: Sin referencia doctrinal específica; corresponde a una afirmación de capacidad/percepción en el contexto del pasaje.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con la traducción inglesa POB y con la revisión más reciente: no se requerían cambios. La versión española sigue esa misma lectura con ajuste idiomático mínimo y sin introducir glosas.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - No se sustituye la imagen de capacidad auditiva por una formulación más interpretativa.
  - «Oír» se conserva para respetar la percepción simple del latín y la traducción inglesa auditada.
