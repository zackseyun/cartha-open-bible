review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del latín y del inglés POB: exhortación a desechar la tristeza y los dolores, con la finalidad de que Dios vuelva a mostrarse favorable y conceda descanso. Los títulos divinos y la estructura final de descanso/alivio están bien conservados. La única desviación significativa es léxica y estilística en «el Fuerte», que suena poco natural en español bíblico y no comunica tan claramente como el latín fortis ni como el inglés «the Mighty One».'
  spanish_quality_summary: El español es claro y mayormente natural. «Sacude de ti» y «aparta de ti» funcionan, aunque juntos repiten la misma estructura. La frase fluye bien. Sin embargo, «el Fuerte» resulta rígido y extraño como título divino en español; «el Poderoso» es mucho más idiomático y digno sin perder el sentido. El resto del versículo es plenamente legible.
  glossary_alignment: 'No hay conflicto con los términos por defecto del proyecto. «Altísimo» está bien. No aparece Yahvé ni Mesías/Cristo. La decisión clave es fortis: aunque «el Fuerte» es formalmente cercano, en español bíblico neutral conviene «el Poderoso» para reflejar mejor un título divino inteligible y reverente.'
  issues:
  - severity: medium
    issue: «el Fuerte» como título divino suena poco idiomático en español
    rationale: Fortis aquí funciona como título de Dios («the Mighty One»). En español eclesial general, «el Poderoso» transmite mejor la fuerza titular y evita una formulación extraña o potencialmente ambigua.
  revised_spanish_text: Por tanto, sacude de ti tu gran tristeza y aparta de ti la multitud de dolores, para que el Poderoso vuelva a serte propicio y el Altísimo te dé descanso, alivio de tus trabajos.
  revision_rationale: 'Se hace una sola corrección: «el Fuerte» → «el Poderoso». El cambio mejora la naturalidad y la inteligibilidad del título divino en español, manteniendo fielmente el sentido de fortis y del inglés POB «the Mighty One». No se requieren notas.'
