translation:
  language: es
  text: Por tanto, sacude de ti tu gran tristeza y aparta de ti la multitud de dolores, para que el Poderoso vuelva a serte propicio y el Altísimo te dé descanso, alivio de tus trabajos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Tu ergo excute
  english_pob_choice: Therefore shake off
  chosen_spanish: Por tanto, sacude de ti
  alternatives_spanish:
  - Así que, sacude
  - Por eso, sacude de ti
  lexicon: excute -> sacudir; ergo -> por tanto
  rationale: El latín usa un imperativo con valor exhortativo; 'sacude de ti' conserva la imagen de quitarse algo encima y suena natural en español.
- source_word: tuam multam tristitiam
  english_pob_choice: your great sadness
  chosen_spanish: tu gran tristeza
  alternatives_spanish:
  - tu mucha tristeza
  - tu profunda tristeza
  lexicon: tristitia -> tristeza; multam -> gran
  rationale: '''Gran tristeza'' expresa bien la intensidad sin sobrecargar el español con una construcción poco idiomática.'
- source_word: depone abs te multitudinem dolorum
  english_pob_choice: put away from yourself the multitude of sorrows
  chosen_spanish: aparta de ti la multitud de dolores
  alternatives_spanish:
  - deja lejos de ti la multitud de dolores
  - aleja de ti la multitud de dolores
  lexicon: depone -> apartar/poner aparte; multitudo -> multitud; dolores -> dolores
  rationale: Se conserva la metáfora de 'multitud' aplicada a los dolores, que el latín presenta con fuerza acumulativa.
- source_word: fortis
  english_pob_choice: the Mighty One
  chosen_spanish: el Fuerte
  alternatives_spanish:
  - el Poderoso
  - el Fuerte Poderoso
  lexicon: fortis -> fuerte/poderoso
  rationale: El inglés POB eligió 'the Mighty One'. En español, 'el Fuerte' mantiene el valor titular sin introducir una paráfrasis más interpretativa.
- source_word: repropitietur
  english_pob_choice: may again be gracious to you
  chosen_spanish: vuelva a serte propicio
  alternatives_spanish:
  - te vuelva a mostrar favor
  - vuelva a tener misericordia de ti
  lexicon: repropitio -> propiciar de nuevo / mostrarse propicio
  rationale: '''Vuelva a serte propicio'' conserva el matiz relacional de favor/restablecimiento y evita reemplazarlo por un término teológicamente más cargado que el latín no exige.'
- source_word: altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  - el Altísimo Dios
  lexicon: altissimus -> Altísimo
  rationale: Es la equivalencia directa y estable en español bíblico para el título divino.
- source_word: requiem faciat tibi
  english_pob_choice: may give you rest
  chosen_spanish: te dé descanso
  alternatives_spanish:
  - te conceda reposo
  - te haga descansar
  lexicon: requies -> descanso/reposo
  rationale: '''Te dé descanso'' reproduce con sencillez el deseo de reposo que expresa el latín.'
- source_word: requietionem laborum
  english_pob_choice: relief from your labors
  chosen_spanish: alivio de tus trabajos
  alternatives_spanish:
  - reposo de tus trabajos
  - alivio de tus fatigas
  lexicon: requietio -> alivio/reposo; labores -> trabajos/fatigas
  rationale: '''Alivio de tus trabajos'' mantiene la relación entre la fatiga y el descanso concedido, con una dicción natural en español.'
theological_decisions:
- issue: 'Divine titles: fortis and altissimus'
  english_pob_reading: the Mighty One ... the Most High
  chosen_spanish_reading: el Fuerte ... el Altísimo
  alternative_spanish_readings:
  - el Poderoso ... el Altísimo
  - el Fuerte ... el Más Alto
  rationale: La frase latina usa títulos divinos sin expansión doctrinal. 'El Fuerte' y 'el Altísimo' conservan la forma breve y reverente sin introducir un nombre distinto ni suavizar el tono.
  doctrine_reference: Títulos divinos en lenguaje bíblico; preservación del registro reverente sin expansión interpretativa.
translation_notes:
  revision_awareness: El texto base inglés no llevaba notas y la revisión más reciente indica que no hubo cambios necesarios; por eso esta versión española sigue de cerca el contenido del latín y la solución ya validada en inglés, ajustándola a un español natural y fiel.
  spanish_consistency_notes:
  - 'Se mantiene el orden lógico de exhortación y propósito: imperativo seguido de cláusula final.'
  - Se conserva la repetición de imágenes de peso y abatimiento ('tristeza', 'dolores', 'trabajos') para reflejar la acumulación del latín.
  - Se usa 'propicio' para repropitietur, evitando sustituirlo por 'misericordioso' o 'benigno' sin necesidad.
  - No se introducen mayúsculas reverenciales en los títulos porque el estilo del proyecto usa español moderno y claro, con la reverencia expresada por el léxico mismo.
