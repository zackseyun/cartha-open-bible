  yaml_path: translation/extra_canonical/2_esdras/010/024.yaml
  text: Therefore shake off your great sadness, and put away from yourself the multitude of sorrows, so that the Mighty One may again be gracious to you, and the Most High may give you rest, relief from your labors.”
