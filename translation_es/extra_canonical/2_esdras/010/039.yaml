review_pass:
  verdict: revise
  source_alignment_summary: El latín dice rectam uiam tuam ... quoniam sine intermissione contristabaris pro populo tuo et ualde lugebas propter Sion. La draft refleja bien la estructura causal y el lamento continuo/intenso. Sin embargo, «camino recto» en español sigue sonando más físico que moral en este contexto, mientras que la revisión inglesa ya fijó el sentido ético de rectam uiam como «upright way».
  spanish_quality_summary: El español es claro y natural en general. No obstante, la combinación «camino recto» más una nota que menciona el sentido literal introduce una ambigüedad innecesaria justamente donde el expediente inglés la resolvió. «Conducta recta» o «camino recto» con nota de sentido moral serían posibles, pero la opción más legible y fiel aquí es explicitar el valor ético en el texto principal.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. La principal cuestión léxica es rectam uiam: conviene alinearla con el razonamiento documentado de «upright way» mediante «conducta recta» en vez de «camino recto». «Sion» está bien.'
  issues:
  - severity: medium
    issue: «camino recto» deja demasiado abierta una lectura espacial/literal
    rationale: Aunque conserva la metáfora, en español contemporáneo bíblico la frase puede entenderse como trayectoria o dirección. El expediente inglés documenta que aquí se elogia la rectitud moral de Esdras.
  - severity: low
    issue: La nota al pie actual refuerza una alternativa literal poco útil
    rationale: 'La nota «También: “camino recto” en sentido literal de la metáfora» no aclara el sentido principal; más bien reintroduce la ambigüedad que la revisión buscó evitar.'
  revised_spanish_text: Pues ha visto tu conducta recta,[a] porque sin cesar te afligías por tu pueblo y te lamentabas mucho por Sion.
  revised_footnotes:
  - marker: a
    text: Lit. «tu camino recto». La expresión funciona aquí como metáfora de conducta moral, no de una ruta física.
    reason: lexical_alternative
