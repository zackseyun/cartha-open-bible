base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/039.yaml
  text: For he has seen your upright way[a], because you were grieving without ceasing for your people and mourning greatly for Zion.
  footnotes:
  - marker: a
    text: Or 'straight way'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:49:22Z'
    unchanged: false
    changes_summary: Replaced 'that' with 'because' to better reflect quoniam as causal rather than explanatory; otherwise retained the draft's accurate wording.
translation:
  language: es
  text: Pues ha visto tu conducta recta,[a] porque sin cesar te afligías por tu pueblo y te lamentabas mucho por Sion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «tu camino recto». La expresión funciona aquí como metáfora de conducta moral, no de una ruta física.
    reason: lexical_alternative
lexical_decisions:
- source_word: rectam uiam
  english_pob_choice: upright way
  chosen_spanish: camino recto
  alternatives_spanish:
  - camino justo
  - conducta recta
  - sendero recto
  lexicon: rectam uiam
  rationale: El latín conserva la metáfora de «camino», pero el contexto moral, confirmado por la revisión del inglés de «straight way» a «upright way», muestra que no se trata de una ruta física sino de conducta aprobada. En español, «camino recto» mantiene la imagen y puede leerse moralmente sin sobreexplicar.
- source_word: sine intermissione contristabaris
  english_pob_choice: you were grieving without ceasing
  chosen_spanish: sin cesar te afligías
  alternatives_spanish:
  - te entristecías sin cesar
  - sin interrupción estabas afligido
  - te dolías constantemente
  lexicon: sine intermissione contristabaris
  rationale: «Sine intermissione» pide una expresión continua, y «contristabaris» apunta a aflicción o tristeza real. «Te afligías sin cesar» conserva la duración y el matiz afectivo sin sonar arcaico.
- source_word: pro populo tuo
  english_pob_choice: for your people
  chosen_spanish: por tu pueblo
  alternatives_spanish:
  - a favor de tu pueblo
  - por causa de tu pueblo
  lexicon: pro populo tuo
  rationale: La preposición latina expresa motivo o relación con el sufrimiento; en español, «por tu pueblo» reproduce naturalmente la causa afectiva del lamento y evita añadir interpretación.
- source_word: ualde lugebas
  english_pob_choice: mourning greatly
  chosen_spanish: te lamentabas mucho
  alternatives_spanish:
  - llorabas mucho
  - guardabas gran duelo
  - te dolías grandemente
  lexicon: ualde lugebas
  rationale: «Lugebas» pertenece al campo de duelo/lamento. «Te lamentabas mucho» conserva el lamento intenso y es natural en español contemporáneo; «mucho» refleja «ualde».
- source_word: propter Sion
  english_pob_choice: for Zion
  chosen_spanish: por Sion
  alternatives_spanish:
  - a causa de Sion
  - por causa de Sion
  lexicon: propter Sion
  rationale: Se mantiene la referencia nominal a Sion sin expansión. «Por Sion» sigue de cerca el latín y funciona bien en español bíblico.
theological_decisions:
- issue: Sentido moral de «camino recto» frente a ruta física
  english_pob_reading: upright way
  chosen_spanish_reading: camino recto en sentido moral
  alternative_spanish_readings:
  - camino justo
  - conducta recta
  - sendero recto
  rationale: 'La revisión inglesa ya resolvió la tensión entre literalidad y sentido: el texto alaba el comportamiento de Esdras, no una trayectoria geográfica. El español conserva la metáfora sin perder el valor ético.'
  doctrine_reference: Sabiduría ética bíblica; lenguaje metafórico de conducta
- issue: Causalidad de quoniam
  english_pob_reading: because
  chosen_spanish_reading: porque
  alternative_spanish_readings:
  - ya que
  - pues que
  rationale: «Quoniam» introduce la razón por la que se reconoce el camino recto. «Porque» es la equivalencia causal más directa y clara en español.
  doctrine_reference: Relación causal del discurso
- issue: Intensidad del duelo por Sion y por el pueblo
  english_pob_reading: you were grieving without ceasing for your people and mourning greatly for Zion
  chosen_spanish_reading: sin cesar te afligías por tu pueblo y te lamentabas mucho por Sion
  alternative_spanish_readings:
  - te dolías continuamente por tu pueblo y guardabas gran duelo por Sion
  - sin interrupción estabas afligido por tu pueblo y llorabas mucho por Sion
  rationale: El latín distingue entre aflicción continua y lamento intenso. El español mantiene ambas capas sin fusionarlas del todo, preservando la carga afectiva y la referencia comunitaria y sionita.
  doctrine_reference: Lamento piadoso; solidaridad con el pueblo y Sion
translation_notes:
  revision_awareness: 'La revisión inglesa cambió «straight way» por «upright way» para evitar una lectura física y reflejar mejor el sentido moral de rectam uiam; también ajustó «that» a «because» para quoniam. La presente redacción española sigue esa adjudicación: conserva la metáfora de «camino», la orienta éticamente con «recto» y expresa la causalidad con «porque».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como preferencia del proyecto cuando aparezca el tetragrámaton; aquí no aparece.
  - «Sion» se conserva con la grafía habitual en español bíblico para este topónimo.
  - El registro es sobrio y bíblico sin recurrir a fórmulas eclesiásticas no apoyadas por la fuente.
