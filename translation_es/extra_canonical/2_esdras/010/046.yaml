translation:
  language: es
  text: Tres edificó Salomón en la ciudad[a] y ofreció ofrendas; entonces fue cuando la mujer estéril dio a luz un hijo. Y lo que ella te dijo, que
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El latín dice solo «tres» antes de «edificó ... la ciudad». La construcción es abrupta y probablemente refleja un texto difícil o dañado; se conserva sin añadir «cosas» al texto principal.
    reason: Evitar agregar un sustantivo no atestiguado mientras se ayuda al lector español con la rareza sintáctica.
lexical_decisions:
- source_word: tres
  english_pob_choice: Three things
  chosen_spanish: Tres cosas
  alternatives_spanish:
  - Tres
  - Tres asuntos
  lexicon: tres
  rationale: El latín tres es numérico y no temporal; en español, «Tres cosas» conserva el valor cuantitativo que la revisión inglesa corrigió frente a una lectura temporal errónea.
- source_word: aedificauit
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - edificó
  lexicon: aedificare
  rationale: «Edificó» mantiene un registro elevado y refleja bien el verbo latino de construcción sin introducir matices innecesarios.
- source_word: ciuitatem
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - la ciudad
  - en la ciudad
  lexicon: ciuitas
  rationale: 'El latín usa un complemento locativo: «en la ciudad» reproduce con claridad la relación espacial.'
- source_word: obtulit oblationes
  english_pob_choice: offered offerings
  chosen_spanish: ofreció ofrendas
  alternatives_spanish:
  - presentó ofrendas
  - ofreció sacrificios
  lexicon: offertorium / oblatio
  rationale: «Ofrendas» sigue el sustantivo latino oblationes y evita sustituirlo por un término más interpretativo como «sacrificios».
- source_word: fuit quando
  english_pob_choice: then it was that
  chosen_spanish: entonces fue cuando
  alternatives_spanish:
  - entonces fue que
  - fue entonces cuando
  lexicon: fuit + quando
  rationale: La secuencia latina marca un giro enfático de tiempo; «entonces fue cuando» reproduce esa construcción con español natural.
- source_word: sterilis
  english_pob_choice: the barren woman
  chosen_spanish: la mujer estéril
  alternatives_spanish:
  - la estéril
  - la mujer infecunda
  lexicon: sterilis
  rationale: «Mujer estéril» mantiene la referencia humana explícita y el término corriente en español, sin perder la fuerza léxica de sterilis.
- source_word: peperit filium
  english_pob_choice: bore a son
  chosen_spanish: dio a luz un hijo
  alternatives_spanish:
  - engendró un hijo
  - parió un hijo
  lexicon: parere
  rationale: «Dar a luz» es idiomático y fiel al hecho del nacimiento; «hijo» preserva el sentido general de filium sin forzar especificidad masculina más allá del latín.
- source_word: Et quod tibi dixit quoniam
  english_pob_choice: And what it told you, that
  chosen_spanish: Y lo que te dijo, que
  alternatives_spanish:
  - Y lo que te dijo, que
  - 'Y lo que te dijo: que'
  lexicon: quod ... dixit quoniam
  rationale: La cola latina queda incompleta en este versículo; la traducción conserva la frase suspendida tal como la fuente la presenta, sin cerrar el sintagma más allá de lo atestiguado.
theological_decisions:
- issue: Conservar la enumeración inicial como cantidad, no como tiempo
  english_pob_reading: Three things Solomon built in the city and offered offerings
  chosen_spanish_reading: Tres cosas edificó Salomón en la ciudad y ofreció ofrendas
  alternative_spanish_readings:
  - Tras tres mil años edificó Salomón...
  - Tres mil años después edificó Salomón...
  rationale: La revisión inglesa corrige una lectura temporal errónea y fija una enumeración cuantitativa; la versión española sigue esa corrección para no introducir cronología inexistente.
  doctrine_reference: fidelidad textual / crítica de lecturas
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde una lectura temporal errónea a «Three things». La presente propuesta sigue esa corrección y también conserva la cláusula final abierta «Y lo que te dijo, que», porque el latín transmitido termina en quoniam y no completa la oración en este segmento.
  spanish_consistency_notes:
  - Mantengo un español sobrio y publicable, con orden natural pero sin suavizar la secuencia latina.
  - No empleo «SEÑOR» ni «Cristo» porque el segmento no contiene ni YHWH ni Χριστός.
  - La frase final queda intencionalmente suspensiva, conforme al texto fuente incompleto.
