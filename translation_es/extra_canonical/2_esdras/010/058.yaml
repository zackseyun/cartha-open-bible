lexical_decisions:
- source_word: Nocte autem quae in crastinum
  english_pob_choice: But tomorrow night you shall remain here
  chosen_spanish: Pero mañana por la noche permanecerás aquí
  alternatives_spanish:
  - Pero en la noche de mañana permanecerás aquí
  - Pero la noche que viene mañana permanecerás aquí
  lexicon: nocte / crastinum
  rationale: El latín indica literalmente 'la noche que será mañana'. La opción 'mañana por la noche' conserva el sentido temporal sin la redundancia de una traducción más literal, y sigue la revisión inglesa que ya corrigió la expresión a una forma más natural.
translation_notes:
  revision_awareness: Se siguió el ajuste del audit trail inglés que simplificó la frase a 'tomorrow night', evitando una versión española torpe pero manteniendo el valor temporal del latín.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento directo en segunda persona singular, conforme al verbo latino.
  - Se prefirió 'por la noche' para reflejar con naturalidad el valor de nocte y crastinum sin introducir matices no presentes en el fuente.
