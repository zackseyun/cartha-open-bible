- from: De ella todos han tenido su origen, y otros vienen; y, he aquí, casi todos andan hacia la perdición y hacia la destrucción.
  to: De ella todos han tenido su origen, y otros vienen; y, he aquí, casi todos andan hacia la perdición y hacia el exterminio.
