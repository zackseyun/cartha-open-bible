base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/010.yaml
  text: From her all have had their beginnings, and others come; and behold, nearly all walk to destruction and to extermination.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:49:56Z'
    unchanged: false
    changes_summary: Removed the unsupported addition 'their multitude comes' and rendered the final phrase more directly as 'walk to destruction and to extermination,' which better matches the Latin and avoids unnecessary expansion.
translation:
  language: es
  text: De ella todos han tenido su origen, y otros vienen; y, he aquí, casi todos andan hacia la perdición y hacia el exterminio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ex ipsa
  english_pob_choice: From her
  chosen_spanish: De ella
  alternatives_spanish:
  - De ella misma
  - De esa misma
  lexicon: Latin ipsa
  rationale: El latín usa un pronombre enfático femenino singular; 'de ella' conserva la referencia femenina a la fuente de la humanidad sin añadir una expansión innecesaria.
- source_word: initia omnes nacti
  english_pob_choice: all have had their beginnings
  chosen_spanish: todos han tenido su origen
  alternatives_spanish:
  - todos han tenido sus comienzos
  - todos proceden
  lexicon: Latin initia / nacti
  rationale: '''Origen'' comunica el sentido de procedencia inicial con naturalidad en español y evita un calco duro de ''beginnings''.'
- source_word: alii ueniunt
  english_pob_choice: others come
  chosen_spanish: otros vienen
  alternatives_spanish:
  - otros llegan
  - otros vienen después
  lexicon: Latin alii veniunt
  rationale: Se mantiene la brevedad del original; 'vienen' reproduce el movimiento simple del latín sin interpretar más de lo que dice.
- source_word: perditionem
  english_pob_choice: destruction
  chosen_spanish: la perdición
  alternatives_spanish:
  - la destrucción
  - la ruina
  lexicon: Latin perditio
  rationale: '''Perdición'' conserva el matiz de ruina/pérdida total que puede incluir tanto destrucción como perdición moral o final, y permite diferenciarlo del término siguiente.'
- source_word: exterminium
  english_pob_choice: extermination
  chosen_spanish: la destrucción
  alternatives_spanish:
  - el exterminio
  - la extinción
  lexicon: Latin exterminium
  rationale: En español, 'exterminio' es posible pero muy fuerte y puede sonar redundante junto a 'perdición'; 'destrucción' comunica bien la culminación ruinosa sin forzar un tecnicismo que el contexto no exige.
theological_decisions:
- issue: Destino final de la mayoría
  english_pob_reading: nearly all walk to destruction and to extermination
  chosen_spanish_reading: casi todos andan hacia la perdición y hacia la destrucción
  alternative_spanish_readings:
  - casi todos caminan hacia la destrucción y hacia el exterminio
  - casi todos van a la perdición y al exterminio
  rationale: El texto latino presenta dos resultados negativos coordinados. En español se conserva la doble dirección y la tensión semántica entre 'perdición' y 'destrucción' sin suavizarla ni unificarla artificialmente.
  doctrine_reference: 2 Esdras 10:10; lectura escatológica del destino humano en el pasaje
translation_notes:
  revision_awareness: La edición inglesa revisada eliminó una expansión no respaldada ('their multitude comes') y ajustó el final a una coordinación más directa. La versión española sigue esa línea de concisión y no añade sujeto, verbo o matiz ausente en el latín.
  spanish_consistency_notes:
  - Se mantiene un español sobrio y bíblico, pero sin recurrir a fórmulas eclesiásticas no exigidas por el latín.
  - Se evitó 'exterminio' en el texto principal por claridad y fluidez, aunque queda registrado como alternativa lexical válida.
  - No se añadieron notas textuales porque el testimonio fuente proporcionado es único y la traducción inglesa no trae variantes registradas.
