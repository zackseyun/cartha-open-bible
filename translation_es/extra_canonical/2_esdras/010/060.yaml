translation:
  language: es
  text: Y dormí aquella noche y otra, como me había dicho.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et dormivi
  english_pob_choice: And I slept
  chosen_spanish: Y dormí
  alternatives_spanish:
  - Y me acosté
  - Y reposé
  lexicon: dormire
  rationale: El latín dormivi expresa de manera directa que la acción fue dormir; en español, «dormí» conserva la sencillez y la correspondencia inmediata sin añadir matices no presentes en el original.
- source_word: illam noctem
  english_pob_choice: that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - esa noche
  - esa noche misma
  lexicon: nox
  rationale: «Illam» señala una noche específica ya identificada en el contexto; «aquella noche» reproduce bien la distancia demostrativa y mantiene naturalidad en español.
- source_word: et aliam
  english_pob_choice: and another
  chosen_spanish: y otra más
  alternatives_spanish:
  - y otra
  - y una más
  lexicon: alius
  rationale: La revisión inglesa evitó «the next» para reflejar mejor aliam. En español, «otra más» conserva la idea de una noche adicional sin forzar «la siguiente», que introduciría una secuencia temporal más fuerte que el latín no exige.
- source_word: sicut dixerat mihi
  english_pob_choice: as he had told me
  chosen_spanish: como me lo había dicho
  alternatives_spanish:
  - como me había dicho
  - tal como me lo había dicho
  lexicon: dicere
  rationale: La construcción «me lo había dicho» expresa de forma clara la referencia implícita del pronombre latino y conserva el sentido de conformidad con una instrucción previa.
theological_decisions:
- issue: Relación entre el latín aliam y la secuencia temporal en español
  english_pob_reading: another
  chosen_spanish_reading: otra más
  alternative_spanish_readings:
  - la siguiente
  - al día siguiente
  rationale: El texto latino solo dice «otra», no «la siguiente». Mantener una formulación abierta evita añadir una precisión cronológica no garantizada por la fuente.
  doctrine_reference: No aplica; decisión de fidelidad semántica y temporal al texto fuente.
translation_notes:
  revision_awareness: La traducción inglesa auditada fue revisada de «the next» a «another» para ajustarse mejor a aliam. La versión española sigue esa misma corrección y evita cualquier formulación que convierta «otra» en «la siguiente».
  spanish_consistency_notes:
  - Se mantiene un español sobrio y publicable, con léxico transparente y sin arcaísmos innecesarios.
  - No se introducen notas porque el versículo no presenta variantes textuales ni tensiones doctrinales significativas en el paquete fuente.
  - Se conserva el paralelismo simple de dos noches, tal como lo permite el latín limpio de Bensly.
