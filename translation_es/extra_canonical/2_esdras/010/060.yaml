  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del latín: ''et dormivi'' = ''Y dormí'', ''illam noctem'' = ''aquella noche'', y ''sicut dixerat mihi'' = ''como me había dicho''. Sin embargo, ''y otra más'' añade un matiz enfático/aditivo (''más'') que no está en ''et aliam''. El inglés auditado corrigió precisamente hacia ''another'' para evitar una secuenciación o matiz excesivo; en español, ''y otra'' reproduce mejor esa sobriedad.'
