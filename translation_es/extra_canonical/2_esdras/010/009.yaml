    unchanged: false
    changes_summary: Removed the interpretive addition 'who spring up' because it is not present in the Latin; retained the rest with natural formal English.
translation:
  language: es
  text: Pero tú estás afligido por un solo hijo. Pues pregunta a la tierra[a], y ella te dirá que es ella quien debe lamentarse por tantos sobre ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Pregunta a la tierra».
    reason: alternative_reading
lexical_decisions:
- source_word: autem contristaris
  english_pob_choice: But you are grieving
  chosen_spanish: Pero tú estás afligido
  alternatives_spanish:
  - Pero tú estás entristecido
  - Mas tú estás afligido
  lexicon: contristari
  rationale: El latín expresa un estado de tristeza o aflicción. «Afligido» comunica bien la carga emocional sin sonar excesivamente técnica; «estás» conserva el valor progresivo/contextual del presente.
- source_word: in uno filio
  english_pob_choice: over one son
  chosen_spanish: por un solo hijo
  alternatives_spanish:
  - por uno solo de tus hijos
  - por un hijo
  lexicon: unus + filius
  rationale: La construcción latina indica singularidad enfática. «Un solo hijo» preserva esa fuerza y suena natural en español. «Por» refleja la causa o motivo de la aflicción.
- source_word: Interroga enim terram
  english_pob_choice: For ask the earth
  chosen_spanish: Porque pregunta a la tierra
  alternatives_spanish:
  - Pues pregunta a la tierra
  - Pregunta, pues, a la tierra
  lexicon: interrogare + enim + terra
  rationale: «Porque» traduce bien el valor explicativo de enim en este contexto. «Pregunta a la tierra» conserva el imperativo. «Tierra» mantiene el objeto personificado del latín.
- source_word: haec est quae debeat lugere
  english_pob_choice: it is she who ought to mourn
  chosen_spanish: es ella quien debe lamentar
  alternatives_spanish:
  - es ella quien debe llorar
  - es ella la que debe hacer duelo
  lexicon: haec ... quae ... debeat lugere
  rationale: El latín personifica a la tierra y usa un valor de obligación. «Debe lamentar» conserva la obligación; «ella quien» reproduce la personificación. «Llorar» o «hacer duelo» serían posibles, pero «lamentar» funciona bien en español elevado y evita una repetición excesiva con «afligido».
- source_word: tantorum super eam
  english_pob_choice: for so many upon her
  chosen_spanish: a tantos sobre ella
  alternatives_spanish:
  - por tantos sobre ella
  - de tantos sobre ella
  lexicon: tantorum + super eam
  rationale: 'La expresión latina es dura y espacial: muchos «sobre ella». «A tantos sobre ella» mantiene la idea de multitud que pesa sobre la tierra sin añadir interpretación. No se expande a «que brotan» ni a otro desarrollo no presente en el latín.'
theological_decisions:
- issue: Personificación de la tierra como testigo del dolor humano
  english_pob_reading: it is she who ought to mourn
  chosen_spanish_reading: es ella quien debe lamentar
  alternative_spanish_readings:
  - es ella quien debe llorar
  - es ella la que debe hacer duelo
  rationale: El latín trata a la tierra como sujeto femenino capaz de lamentarse. La traducción conserva esa personificación sin suavizarla en una mera metáfora impersonal.
  doctrine_reference: Personificación literaria; creación como testigo del juicio y del sufrimiento humano (cf. lenguaje sapiencial y profético).
- issue: Restitución del contraste entre el dolor particular y la multitud
  english_pob_reading: But you are grieving over one son. For ask the earth
  chosen_spanish_reading: Pero tú estás afligido por un solo hijo. Porque pregunta a la tierra
  alternative_spanish_readings:
  - Mas tú estás afligido por un solo hijo. Pues pregunta a la tierra
  rationale: 'La revisión inglesa restauró la cláusula inicial omitida en un borrador anterior. La versión española la conserva para respetar la secuencia argumentativa del latín: dolor por un hijo frente a la realidad de muchos sobre la tierra.'
  doctrine_reference: Fidelidad textual y retórica del pasaje; no doctrina sistemática específica.
translation_notes:
  revision_awareness: La base inglesa fue revisada para restaurar la cláusula inicial 'But you are grieving over one son' y corregir la omisión de 'enim'; también se eliminó la adición interpretativa 'who spring up', que no está en el latín. La versión española sigue esa lectura revisada y evita expandir 'super eam' más allá de 'sobre ella'.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque el texto fuente no lo contiene.
  - Se usa «lamentar» para lugere como opción natural y digna; no se reemplaza por vocabulario eclesiástico más fijo sin necesidad.
  - Se conserva la personificación femenina de la tierra con «ella», coherente con el latín haec/ eam.
