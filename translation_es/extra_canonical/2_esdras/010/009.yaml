base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/009.yaml
  text: But you are grieving over one son. For ask the earth[a], and it will tell you that it is she who ought to mourn for so many upon her.
  footnotes:
  - marker: a
    text: Or 'Ask the earth'.
    reason: previous_rendering
  revision_pass:
