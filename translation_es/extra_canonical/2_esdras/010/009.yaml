review_pass:
  verdict: revise
  source_alignment_summary: El borrador español conserva correctamente la cláusula restaurada del latín ('autem contristaris in uno filio') y el flujo principal del argumento. Sin embargo, 'Porque pregunta a la tierra' suena poco natural en español con imperativo después de 'porque'; 'Pues pregunta a la tierra' o 'Pregunta, pues, a la tierra' refleja mejor el valor explicativo de enim. Además, 'a tantos sobre ella' no encaja bien con 'lamentar' en español; el latín tantorum super eam se representa con más naturalidad como 'por tantos sobre ella'.
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero presenta dos roces de naturalidad: ''Porque pregunta...'' y ''lamentar a tantos''. La personificación de la tierra está bien preservada. Una leve revisión mejora mucho la legibilidad sin apartarse del latín ni del inglés auditado.'
  glossary_alignment: No hay términos de glosario mayor implicados. La personificación de 'tierra' está bien mantenida. La elección de 'hijo' y 'lamentar' es aceptable; el ajuste principal es sintáctico y preposicional.
  issues:
  - severity: medium
    issue: Uso de 'Porque' seguido de imperativo
    rationale: Aunque busca reflejar enim, 'Porque pregunta a la tierra' resulta forzado en español bíblico natural. 'Pues pregunta a la tierra' o 'Pregunta, pues, a la tierra' conserva la conexión explicativa con mejor fluidez.
  - severity: medium
    issue: Construcción 'debe lamentar a tantos sobre ella'
    rationale: En español, 'lamentar a tantos' sugiere objeto directo humano, pero con 'sobre ella' el giro suena trabado. 'Debe lamentarse por tantos sobre ella' o 'debe llorar por tantos sobre ella' expresa mejor la idea de duelo por la multitud que está sobre la tierra.
  revised_spanish_text: Pero tú estás afligido por un solo hijo. Pues pregunta a la tierra[a], y ella te dirá que es ella quien debe lamentarse por tantos sobre ella.
  revised_footnotes:
  - marker: a
    text: O «Pregunta a la tierra».
    reason: alternative_reading
