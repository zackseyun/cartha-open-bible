revisions:
- from: Pero tú estás afligido por un solo hijo. Porque pregunta a la tierra[a], y ella te dirá que es ella quien debe lamentar a tantos sobre ella.
  to: Pero tú estás afligido por un solo hijo. Pues pregunta a la tierra[a], y ella te dirá que es ella quien debe lamentarse por tantos sobre ella.
  rationale: Se ajusta la conjunción para un español más natural ('Pues' por 'Porque') y se cambia 'debe lamentar a tantos' por 'debe lamentarse por tantos' para expresar con claridad el sentido de duelo del latín lugere, manteniendo la personificación de la tierra y la referencia espacial 'sobre ella'.
