translation:
  language: es
  text: Y mientras yo hablaba estas cosas, he aquí, vino a mí el ángel que al principio había venido a mí, y me vio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et cum essem loquens ego haec
  english_pob_choice: And while I was speaking these things
  chosen_spanish: Y mientras yo estaba diciendo estas cosas
  alternatives_spanish:
  - Y mientras hablaba estas cosas
  - Y mientras yo decía estas cosas
  lexicon: cum + imperfecto; loquens
  rationale: El latín expresa una acción en curso en el pasado; en español, «mientras yo estaba diciendo» mantiene con naturalidad esa simultaneidad sin perder el matiz aspectual. «Estas cosas» reproduce haec de forma directa y pública.
- source_word: ecce
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: ecce
  rationale: «He aquí» conserva el valor de llamada a la atención del texto original y el tono solemne de la forma bíblica, sin agregar contenido.
- source_word: angelus
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - un ángel
  lexicon: angelus
  rationale: Se mantiene el referente definido del inglés POB y del latín, que señala al mismo mensajero ya introducido antes en la narración.
- source_word: qui in principio venerat ad me
  english_pob_choice: who had come to me at the beginning
  chosen_spanish: que al principio había venido a mí
  alternatives_spanish:
  - que me había venido al principio
  - que había venido a mí al principio
  lexicon: qui; in principio; venerat ad me
  rationale: El pluscuamperfecto latino venerat exige un pasado anterior al marco narrativo; «había venido» lo expresa con precisión. «Al principio» sigue el orden y la simplicidad del latín y del POB inglés.
- source_word: et vidit me
  english_pob_choice: and saw me
  chosen_spanish: y me vio
  alternatives_spanish:
  - y me observó
  - y me miró
  lexicon: vidit
  rationale: «Ver» es la correspondencia más directa para vidit. No se introduce una interpretación adicional como «observó» o «miró».
theological_decisions:
- issue: Identidad y repetición del ángel que vuelve a aparecer
  english_pob_reading: the angel who had come to me at the beginning came to me
  chosen_spanish_reading: el ángel que al principio había venido a mí vino a mí
  alternative_spanish_readings:
  - el ángel que había venido a mí al principio volvió a mí
  - el ángel que al principio vino a mí volvió a mí
  rationale: El pasaje subraya la reaparición del mismo ángel, no la llegada de uno nuevo. La redacción española conserva esa repetición y el orden temporal del latín, manteniendo el énfasis narrativo sin suavizarlo.
  doctrine_reference: Narrativa apocalíptica; coherencia interna del relato
- issue: Marcador de atención revelatoria
  english_pob_reading: behold
  chosen_spanish_reading: he aquí
  alternative_spanish_readings:
  - mira
  - y he aquí
  rationale: «He aquí» preserva el valor revelatorio y solemne de ecce, frecuente en el registro bíblico, sin convertirlo en una simple muletilla narrativa.
  doctrine_reference: Estilo bíblico y retórico
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto fuente latino y la traducción inglesa auditada están en alto acuerdo, por lo que se ha mantenido una equivalencia estrecha con ajuste idiomático español mínimo.
  spanish_consistency_notes:
  - Se mantiene «ángel» como término estable para angelus.
  - Se conserva la deixis temporal del original con una secuencia pasada progresiva en español.
  - No se usa «SEÑOR» ni terminología teológica ajena, porque el pasaje no contiene divino nombre ni títulos cristológicos.
