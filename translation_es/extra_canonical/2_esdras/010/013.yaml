  yaml_path: translation/extra_canonical/2_esdras/010/013.yaml
  text: whom I bore with sorrows and brought forth with pains; but the earth, according to the way of the earth, goes away, as does the multitude now present in it’—
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:48:56Z'
    unchanged: false
    changes_summary: Replaced the awkward clause order with more natural English, rendering autem as “but” and making the subject of “goes away” the earth rather than “the multitude.” Also adjusted “in her” to “in it” for natural English with “earth.”
translation:
  language: es
  text: a quien yo llevé con dolores y di a luz con padecimientos; pero la tierra, conforme al modo de la tierra, se va, así como la multitud ahora presente en ella[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El latín puede leerse con ‘la tierra’ como sujeto de ‘abiit’; por eso se traduce ‘se va’ referido a la tierra, en coherencia con la revisión inglesa.
    reason: source_note
lexical_decisions:
- source_word: quem
  english_pob_choice: whom
  chosen_spanish: a quien
  alternatives_spanish:
  - al que
  - a la que
  lexicon: relativo personal
  rationale: El latino quem introduce un objeto personal; ‘a quien’ preserva la referencia relacional sin sobrefijar género en español.
- source_word: meroribus
  english_pob_choice: with sorrows
  chosen_spanish: con dolores
  alternatives_spanish:
  - con tristezas
  - con aflicciones
  lexicon: meroribus
  rationale: ‘Dolores’ refleja el sufrimiento físico/emocional del contexto y mantiene un paralelismo natural con ‘cum doloribus’.
- source_word: peperi
  english_pob_choice: I bore
  chosen_spanish: llevé
  alternatives_spanish:
  - di a luz
  - parí
  lexicon: peperi
  rationale: El contexto materno permite ‘llevé’ como verbo amplio y sobrio; se evita ‘parí’ por registro más brusco, aunque ‘di a luz’ aparece para el segundo miembro.
- source_word: cum doloribus
  english_pob_choice: with pains
  chosen_spanish: con padecimientos
  alternatives_spanish:
  - con dolores
  - con sufrimientos
  lexicon: doloribus
  rationale: Se evita repetir exactamente ‘dolores’ para conservar el paralelismo y dar variedad estilística sin perder el valor de dolor físico y aflicción.
- source_word: genui
  english_pob_choice: brought forth
  chosen_spanish: di a luz
  alternatives_spanish:
  - engendré
  - alumbré
  lexicon: genui
  rationale: ‘Di a luz’ es la forma más transparente en español para el acto de dar a luz en este pasaje.
- source_word: Terra
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: terra
  rationale: Se mantiene ‘la tierra’ como equivalente directo y concreto de terra.
- source_word: secundum uiam terrae
  english_pob_choice: according to the way of the earth
  chosen_spanish: conforme al modo de la tierra
  alternatives_spanish:
  - según el camino de la tierra
  - según la manera de la tierra
  lexicon: uia terrae
  rationale: ‘Modo’ evita una traducción demasiado literal de ‘camino’ y conserva la idea de orden o condición propia de lo terrenal.
- source_word: abiit
  english_pob_choice: goes away
  chosen_spanish: se va
  alternatives_spanish:
  - pasa
  - desaparece
  lexicon: abire
  rationale: El presente dinámico del inglés se refleja con ‘se va’, que suena natural y mantiene la imagen de transitoriedad.
- source_word: quae in ea multitudo praesens
  english_pob_choice: as does the multitude now present in it
  chosen_spanish: así como la multitud ahora presente en ella
  alternatives_spanish:
  - como la multitud que ahora está en ella
  - igual que la multitud presente en ella
  lexicon: multitudo praesens
  rationale: Se conserva la estructura comparativa y el adjetivo temporal ‘ahora presente’; ‘ella’ retoma ‘la tierra’ con concordancia española.
theological_decisions:
- issue: La tierra y la multitud están sometidas a transitoriedad
  english_pob_reading: the earth ... goes away, as does the multitude now present in it
  chosen_spanish_reading: la tierra ... se va, así como la multitud ahora presente en ella
  alternative_spanish_readings:
  - la tierra ... desaparece, igual que la multitud ahora presente en ella
  - la tierra ... pasa, como pasa la multitud presente en ella
  rationale: El texto contrasta el nacimiento doloroso con la desaparición ordinaria de la creación y sus habitantes; ‘se va’ preserva la idea de caducidad sin forzar una afirmación más fuerte que el latín.
  doctrine_reference: Tema bíblico de la fragilidad humana y la transitoriedad de la creación
translation_notes:
  revision_awareness: La versión inglesa revisada aclaró que ‘but’ corresponde a autem y que el sujeto de ‘goes away’ es la tierra, no la multitud; la traducción española sigue esa lectura revisada y evita invertir la relación sintáctica.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y legible.
  - Se conserva el paralelismo entre ‘con dolores’ y ‘con padecimientos’.
  - La referencia de ‘ella’ se deja anclada en ‘la tierra’ para evitar ambigüedad.
  - Se usa ‘Yahvé’ solo cuando el texto fuente lo requiera; aquí no aplica.
