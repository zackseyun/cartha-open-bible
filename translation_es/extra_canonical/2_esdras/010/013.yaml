review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido latino y la revisión inglesa: la madre habla del hijo que dio a luz con dolor, y luego contrasta eso con la tierra, que sigue su curso y se va, igual que la multitud presente en ella. Sin embargo, ‘llevé’ para peperi no preserva bien el sentido de ‘I bore’ en contexto materno; sugiere más bien cargar o transportar. También ‘conforme al modo de la tierra’ es comprensible, pero ‘según la condición de la tierra’ o ‘según el curso de la tierra’ expresa mejor secundum uiam terrae sin sonar tan artificial.'
  spanish_quality_summary: 'El español es legible, pero tiene dos puntos mejorables: ‘a quien yo llevé’ suena poco idiomático para embarazo/maternidad, y la nota no es necesaria si el texto ya adopta con claridad la lectura revisada. Conviene usar una formulación más natural y fiel, como ‘a quien llevé en mi seno’ o ‘a quien concebí/llevé’. Además, ‘ella’ por ‘la tierra’ es natural en español y no requiere explicación especial.'
  glossary_alignment: No hay términos teológicos del glosario principal en juego. La revisión propuesta mantiene neutralidad eclesial y dignidad de registro. Se conserva ‘la tierra’ para terra y se evita una paráfrasis excesiva.
  issues:
  - severity: medium
    issue: ‘llevé’ para peperi es insuficientemente preciso
    rationale: Peperi en contexto de parto/maternidad no significa simplemente ‘llevé’; en español eso pierde la imagen de gestación o maternidad. ‘Llevé en mi seno’ preserva mejor el valor de ‘I bore’.
  - severity: low
    issue: ‘conforme al modo de la tierra’ suena algo calcado
    rationale: Aunque entendible, no es la opción más natural ni la más clara para secundum uiam terrae. ‘según la condición de la tierra’ comunica mejor el orden o curso propio de lo terrenal.
  - severity: low
    issue: La nota al pie no es necesaria en esta redacción
    rationale: El texto español puede expresar la lectura adoptada sin requerir explicación adicional; no hay nueva ambigüedad creada en español que obligue a nota.
  revised_spanish_text: a quien llevé en mi seno con dolores y di a luz con padecimientos; pero la tierra, según la condición de la tierra, se va, así como la multitud ahora presente en ella—
  revision_rationale: Se reemplaza ‘llevé’ por ‘llevé en mi seno’ para reflejar con mayor fidelidad el sentido maternal de peperi. Se ajusta ‘conforme al modo de la tierra’ a ‘según la condición de la tierra’ para un español más natural que aún preserve la idea del curso o condición propia de lo terrenal. Se elimina la nota porque la decisión sintáctica ya queda clara en el texto y no introduce ambigüedad nueva.
