translation:
  language: es
  text: ¿Quién, pues, debe lamentarse más, sino ella, que ha perdido tan gran multitud, más que tú, que te lamentas por uno?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Quis ergo debet lugere magis
  english_pob_choice: Who then ought to mourn more
  chosen_spanish: ¿Quién, pues, debe lamentarse más
  alternatives_spanish:
  - ¿Quién, pues, debe llorar más
  - ¿Quién, entonces, debe dolerse más
  lexicon: quis; debere; lugere
  rationale: «Lamentarse» comunica el duelo o la aflicción implícita en lugere sin caer en un calco demasiado duro. Mantiene la pregunta retórica y el comparativo «más» de la tradición latina y del inglés auditado.
- source_word: haec quae tam magnam multitudinem perdidit
  english_pob_choice: she who has lost so great a multitude
  chosen_spanish: ella, que ha perdido tan gran multitud
  alternatives_spanish:
  - ella, que ha perdido una multitud tan grande
  - ésta, que ha perdido tan gran multitud
  lexicon: haec; perdere; multitudo
  rationale: «Ella» conserva la referencia femenina de haec en el contexto retórico, y «tan gran multitud» refleja la intensidad de tam magnam multitudinem con estilo bíblico natural en español.
- source_word: quam tu quae pro uno
  english_pob_choice: rather than you, who grieve for one
  chosen_spanish: y no tú, que te lamentas por uno
  alternatives_spanish:
  - más que tú, que te lamentas por uno
  - en vez de ti, que te lamentas por uno
  lexicon: quam; tu; pro uno
  rationale: El inglés toma quam como contraste comparativo («rather than»). En español, «y no tú» expresa con claridad el contraste sin perder la fuerza retórica. «Por uno» conserva la referencia a una sola persona en duelo.
theological_decisions:
- issue: Contraste retórico entre el duelo por la multitud perdida y el duelo por uno
  english_pob_reading: Who then ought to mourn more, if not she who has lost so great a multitude, rather than you, who grieve for one?
  chosen_spanish_reading: ¿Quién, pues, debe lamentarse más, sino ella, que ha perdido tan gran multitud, y no tú, que te lamentas por uno?
  alternative_spanish_readings:
  - ¿Quién, pues, debe lamentarse más, sino ella, que ha perdido tan gran multitud, más que tú, que te lamentas por uno?
  - ¿Quién, pues, debe lamentarse más, sino ella, que ha perdido tan gran multitud, en vez de tú, que te lamentas por uno?
  rationale: 'La línea mantiene el argumento moral del original: el lamento por una pérdida colectiva excede el lamento por una sola persona. La redacción española preserva la pregunta retórica y el contraste sin introducir doctrina ajena.'
  doctrine_reference: No aplica; texto sapiencial/retórico del contexto apocalíptico de Esdras.
translation_notes:
  revision_awareness: El texto fuente latino y la traducción inglesa auditada muestran alto acuerdo; no se documentan revisiones relevantes ni tensiones textuales adicionales para esta unidad.
  spanish_consistency_notes:
  - Se mantiene «lamentarse» de forma consistente para lugere en esta unidad, evitando variar a «llorar» o «afligirse» sin necesidad.
  - Se conserva el contraste cuantitativo entre «tan gran multitud» y «uno» para reflejar el argumento del pasaje.
  - No se introduce terminología eclesiástica posterior ni nombres doctrinales no presentes en la fuente.
