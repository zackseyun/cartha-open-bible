base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/048.yaml
  text: And as for her saying to you[a], ‘My son, when he entered his bridal chamber, died, and disaster befell him,’ this was the ruin that came upon Jerusalem.
