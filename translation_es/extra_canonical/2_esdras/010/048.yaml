translation:
  language: es
  text: 'Y porque te dijo[a]: «Mi hijo, cuando entró en su cámara nupcial, murió, y le sobrevino un desastre», esta fue la ruina que sobrevino a Jerusalén.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Y en cuanto a lo que te dijo: “Mi hijo, cuando entró en su cámara nupcial, murió, y le sobrevino un desastre”».'
    reason: Preserva como alternativa el giro explicativo más cercano al audit trail inglés, mientras el texto principal usa una formulación española más natural.
lexical_decisions:
- source_word: filius meus
  english_pob_choice: My son
  chosen_spanish: Mi hijo
  alternatives_spanish:
  - mi hijo
  - hijo mío
  lexicon: filius
  rationale: La frase es discurso directo dentro del relato; en español, «Mi hijo» conserva la relación posesiva y el tono natural del habla directa sin crear ambigüedad sobre el hablante.
- source_word: ueniens / contigisset ei casus
  english_pob_choice: when he entered his bridal chamber, died, and disaster befell him
  chosen_spanish: cuando entró en su cámara nupcial, murió, y le sobrevino un desastre
  alternatives_spanish:
  - cuando llegó a su cámara nupcial, murió, y le aconteció un desastre
  - cuando entró en su aposento nupcial, murió, y le sobrevino un percance
  lexicon: thalamus / casus
  rationale: «cámara nupcial» mantiene el valor específico de thalamus como recinto nupcial; «le sobrevino un desastre» refleja el peso de casus como infortunio grave, no solo un accidente leve.
- source_word: ruina Hierusalem
  english_pob_choice: this was the ruin that came upon Jerusalem
  chosen_spanish: esta fue la ruina que vino sobre Jerusalén
  alternatives_spanish:
  - esta fue la ruina que cayó sobre Jerusalén
  - esta fue la destrucción que vino sobre Jerusalén
  lexicon: ruina / Ierusalem
  rationale: «ruina» reproduce el sustantivo latino y conserva la imagen de colapso histórico; «vino sobre Jerusalén» sigue de cerca la construcción del inglés auditado y mantiene el movimiento del juicio hacia la ciudad.
theological_decisions:
- issue: Relación entre la cita introducida y la explicación del desastre de Jerusalén
  english_pob_reading: And as for her saying to you… this was the ruin that came upon Jerusalem.
  chosen_spanish_reading: Y en cuanto a que te dijo… esta fue la ruina que vino sobre Jerusalén.
  alternative_spanish_readings:
  - Y cuando te dijo…
  - Y porque te dijo…
  rationale: La cláusula introductoria no es causal simplificada sino una explicación retrospectiva del símbolo visionario; «en cuanto a que te dijo» conserva ese matiz explicativo sin forzar una causalidad que el texto no explicita.
  doctrine_reference: Lectura narrativa e histórica del juicio sobre Jerusalén en 2 Esdras 10:48.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés, que reinstala el discurso directo con «My son…» dentro de la frase citada. En español se reflejó esa estructura con dos puntos y comillas, evitando una subordinación que oscurecería el habla directa.
  spanish_consistency_notes:
  - Se mantuvo «Jerusalén» como forma estándar castellana para el topónimo.
  - Se evitó «SEÑOR» u otras sustituciones porque el versículo no contiene el nombre divino.
  - Se eligió «cámara nupcial» para preservar la especificidad semántica de thalamus sin modernizarlo a un término más genérico.
