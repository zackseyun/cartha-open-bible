  text: 'nutriuit eum cum labore, haec erat habitatio Hierusalem : Et quoniam dixit tibi quod filius meus ueniens in suo thalamo mortuus esset et contigisset ei casus, haec erat quae facta est ruina Hierusalem. Et ecce uidisti similitudinem eius, quomodo'
