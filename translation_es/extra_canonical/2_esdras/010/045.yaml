  yaml_path: translation/extra_canonical/2_esdras/010/045.yaml
  text: And as for her saying to you that she had been barren for thirty years[a][45], this is because there were three thousand years in the world when no offering had yet been offered in her.
  footnotes:
  - marker: '45'
    text: The wording behind 'three thousand years' is compressed and difficult in Latin. The interpretation follows the chapter's symbolic chronology, where the woman's thirty years correspond to a much larger epoch before offerings were made in Zion.
    reason: textual_variant
  - marker: a
    text: Or 'in the age'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:50:27Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y en cuanto a que te dijo que había sido estéril durante treinta años[a][45], esto es porque en el mundo había tres mil años, cuando todavía no se había ofrecido ninguna ofrenda en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en la era”.
    reason: previous_rendering
  - marker: '45'
    text: El latín es comprimido y difícil en este punto. La interpretación sigue la cronología simbólica del capítulo, donde los treinta años de la mujer corresponden a un período mucho mayor antes de que se ofrecieran ofrendas en Sion.
    reason: textual_variant
lexical_decisions:
- source_word: fuit annis triginta
  english_pob_choice: she had been barren for thirty years
  chosen_spanish: había sido estéril durante treinta años
  alternatives_spanish:
  - había sido infecunda durante treinta años
  - no había dado a luz durante treinta años
  lexicon: estéril / infecunda
  rationale: El latín describe el estado de esterilidad de la mujer; en español bíblico y moderno, 'estéril' comunica mejor ese estado que una paráfrasis más libre. Mantiene la fuerza léxica de la imagen sin volverla mecánica.
- source_word: erant anni saeculo tres
  english_pob_choice: there were three thousand years in the world
  chosen_spanish: en el mundo había ya tres mil años
  alternatives_spanish:
  - en la era había ya tres mil años
  - en la edad había ya tres mil años
  lexicon: saeculum
  rationale: La revisión auditada favorece 'in the world' porque aquí saeculum señala el marco cronológico de la historia creada, no el contraste técnico 'era/edad' de dos edades. 'En el mundo' conserva ese sentido histórico y evita oscurecer el contexto.
- source_word: quando non erat in ea adhuc oblatio oblata
  english_pob_choice: when no offering had yet been offered in her
  chosen_spanish: cuando todavía no se había presentado ninguna ofrenda
  alternatives_spanish:
  - cuando aún no se había ofrecido ninguna ofrenda
  - cuando todavía no se había hecho ninguna oblación en ella
  lexicon: oblatio / offerre
  rationale: '''Ofrenda'' es el equivalente natural en español para la acción cultual indicada por oblatio/oblatum. Se evita ''oblación'' por su tono más arcaico, pero se mantiene la referencia sacrificial. La referencia locativa ''in ea'' queda implícita en la imagen del mundo/templo según el contexto del versículo.'
theological_decisions:
- issue: Valor simbólico de 'treinta años' frente a 'tres mil años'
  english_pob_reading: the woman's thirty years correspond to a much larger epoch before offerings were made in Zion
  chosen_spanish_reading: los treinta años de la mujer corresponden a un período mucho mayor anterior a las ofrendas en Sion
  alternative_spanish_readings:
  - los treinta años de la mujer son literalmente treinta años
  - los treinta años aluden a una época histórica más amplia
  rationale: 'Se conserva la tensión simbólica del pasaje: el dato de la esterilidad de la mujer funciona tipológicamente para una cronología mayor. Aunque el latín es comprimido y difícil, la traducción no debe reducirlo a literalidad plana ni eliminar el carácter interpretativo del contexto.'
  doctrine_reference: Lectura simbólica/apocalíptica de 4 Esdras 10:45; cronología de la historia sagrada en relación con Sion.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para leer 'in the world' en lugar de 'in the age', porque saeculum aquí apunta al lapso histórico de la creación, no al tecnicismo de las dos edades. La redacción española sigue esa decisión y conserva la interpretación simbólica de la nota crítica.
  spanish_consistency_notes:
  - Se usa 'ofrenda' para mantener un registro bíblico claro y moderno, evitando 'oblación' salvo necesidad técnica.
  - Se evita 'SEÑOR' porque no aparece aquí ningún nombre divino ni cita directa del Tetragrámaton.
  - '''En el mundo'' refleja el valor histórico de saeculum según la revisión, no una equivalencia automática con ''edad''.'
