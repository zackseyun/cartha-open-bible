base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/020.yaml
  text: Do not say this[a], but consent to be persuaded—for how great is Zion’s downfall!—and be comforted because of Jerusalem’s sorrow.
  footnotes:
  - marker: a
    text: Or 'because of Zion’s calamities'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:49:32Z'
    unchanged: false
    changes_summary: Removed duplicated text and punctuation corruption; retained the sense of the Latin with natural formal English.
translation:
  language: es
  text: No digas esto, sino consiente en ser persuadido[a]—¡pues qué caída la de Sion!—y consuélate por el dolor de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «déjate persuadir».
    reason: lexical_alternative
lexical_decisions:
- source_word: noli facere sermonem hunc
  english_pob_choice: Do not say this
  chosen_spanish: No digas esto
  alternatives_spanish:
  - No hables así
  - No digas tal cosa
  lexicon: noli + facere sermonem
  rationale: El latín prohíbe emitir esta declaración; «No digas esto» reproduce de modo natural y directo el valor pragmático sin añadir matices ajenos.
- source_word: sed consenti persuaderi
  english_pob_choice: but consent to be persuaded
  chosen_spanish: sino consiente en ser persuadido
  alternatives_spanish:
  - sino déjate persuadir
  - sino accede a dejarte convencer
  lexicon: consentire + persuaderi
  rationale: Se mantiene la pasividad de persuaderi con una forma natural en español. «Consiente en ser persuadido» conserva la fuerza formal del original y la tensión de aceptar el ser convencido.
- source_word: quid enim casus Sion
  english_pob_choice: for how great is Zion’s downfall!
  chosen_spanish: ¡pues qué caída la de Sion!
  alternatives_spanish:
  - ¡pues cuán grande es la caída de Sion!
  - ¡pues qué desastre el de Sion!
  lexicon: quid enim + casus + Sion
  rationale: El latín no expresa una causalidad simple, sino una exclamación/interjección enfática. «Qué caída» conserva el asombro retórico y evita convertir la frase en una causalidad que el texto no tiene.
- source_word: et consolare propter dolorem Hierusalem
  english_pob_choice: and be comforted because of Jerusalem’s sorrow
  chosen_spanish: y consuélate por el dolor de Jerusalén
  alternatives_spanish:
  - y consuélate a causa del dolor de Jerusalén
  - y recibe consuelo por el dolor de Jerusalén
  lexicon: consolare + propter dolorem Hierusalem
  rationale: «Propter» sí introduce causa; «por el dolor de Jerusalén» reproduce fielmente esa relación causal y mantiene la personificación exhortativa del imperativo.
theological_decisions:
- issue: Personificación de Sion y Jerusalén como sujetos de caída y dolor
  english_pob_reading: Zion’s downfall / Jerusalem’s sorrow
  chosen_spanish_reading: la caída de Sion / el dolor de Jerusalén
  alternative_spanish_readings:
  - la ruina de Sion / la aflicción de Jerusalén
  - el desplome de Sion / la pena de Jerusalén
  rationale: Se conserva la personificación del lamento sin reinterpretar las ciudades como meras abstracciones. «Caída» y «dolor» reflejan el tono elegíaco del latín.
  doctrine_reference: Lamento histórico-literario; no requiere ajuste doctrinal.
translation_notes:
  revision_awareness: La revisión reciente corrigió una lectura errónea que hacía causal 'because of Zion’s calamities'. El latín presenta 'quid enim casus Sion' como exclamación abrupta, no como causa. La versión española evita esa tergiversación y mantiene el giro retórico con una exclamación natural.
  spanish_consistency_notes:
  - Se usa «Sion» y «Jerusalén» como en la tradición bíblica y el paquete fuente; no se normaliza a formas modernas distintas.
  - Se preserva el imperativo exhortativo del cierre con «consuélate», evitando un pasivo impersonal que diluya la apelación directa.
  - El español mantiene la tensión entre exhortación y lamentación, acorde con el latín limpio y la corrección auditada.
