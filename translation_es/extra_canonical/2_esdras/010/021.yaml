base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/021.yaml
  text: For you see that our sanctuary has been laid waste, our altar has been torn down, and our temple has been destroyed.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:49:03Z'
    unchanged: false
    changes_summary: Added repeated 'has been' for the second and third clauses to more closely reflect the source and maintain parallel structure.
translation:
  language: es
  text: Porque ves que nuestro santuario ha sido devastado, nuestro altar ha sido derribado y nuestro templo ha sido destruido.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: sanctificatio nostra
  english_pob_choice: our sanctuary
  chosen_spanish: nuestro santuario
  alternatives_spanish:
  - nuestra santificación
  - nuestro lugar santo
  - nuestro santuario sagrado
  lexicon: Latin sanctificatio
  rationale: Aunque el latín dice literalmente «nuestra santificación», el contexto y la traducción inglesa POB muestran que aquí la referencia es al lugar santo del culto. En español, «santuario» comunica de manera natural ese sentido sin borrar la relación con lo sagrado.
- source_word: deserta effecta est
  english_pob_choice: has been laid waste
  chosen_spanish: ha sido devastado
  alternatives_spanish:
  - ha quedado desolado
  - ha sido arrasado
  - ha sido dejado en ruinas
  lexicon: Latin deserta effecta est
  rationale: La construcción pasiva expresa una ruina consumada. «Ha sido devastado» conserva el valor de desolación/ruina con un registro bíblico claro y paralelo al resto de la cláusula.
- source_word: demolitum est
  english_pob_choice: has been torn down
  chosen_spanish: ha sido derribado
  alternatives_spanish:
  - ha sido demolido
  - ha sido destruido
  - ha sido abatido
  lexicon: Latin demolitum est
  rationale: «Derribado» reproduce la imagen física de desmantelar o echar abajo una estructura, con menos tecnicismo que «demolido» y más precisión que un genérico «destruido», que ya aparece en la última cláusula.
- source_word: destructum est
  english_pob_choice: has been destroyed
  chosen_spanish: ha sido destruido
  alternatives_spanish:
  - ha sido arruinado
  - ha sido devastado
  - ha sido destruido por completo
  lexicon: Latin destructum est
  rationale: «Destruido» corresponde de modo directo al perfecto pasivo latino y mantiene el paralelismo sintáctico reforzado en la revisión inglesa.
theological_decisions:
- issue: Cómo verter sanctificatio en un contexto de templo
  english_pob_reading: our sanctuary
  chosen_spanish_reading: nuestro santuario
  alternative_spanish_readings:
  - nuestra santificación
  - nuestro lugar santo
  rationale: El latín puede sugerir literalmente «santificación», pero el contexto del versículo y la auditoría inglesa indican un referente espacial/cultual. Traducir «santuario» evita una lectura abstracta que el pasaje no exige.
  doctrine_reference: Lenguaje cultual del templo; no se trata aquí de santificación moral sino del lugar santo.
- issue: Paralelismo de las tres cláusulas pasivas
  english_pob_reading: has been laid waste / has been torn down / has been destroyed
  chosen_spanish_reading: ha sido devastado / ha sido derribado / ha sido destruido
  alternative_spanish_readings:
  - ha quedado devastado / ha quedado derribado / ha quedado destruido
  - ha sido arrasado / ha sido demolido / ha sido arruinado
  rationale: La revisión inglesa añadió la repetición de «has been» para reflejar mejor el paralelismo del original. El español conserva esa estructura con «ha sido» en las tres cláusulas para mantener el ritmo y la correspondencia formal.
  doctrine_reference: Paralelismo retórico en lamentación sobre la ruina del culto.
translation_notes:
  revision_awareness: La versión inglesa revisada restauró la repetición de «has been» en las dos últimas cláusulas para reflejar con mayor fidelidad la estructura paralela del latín. La redacción española conserva ese paralelismo con tres pasivas coordinadas de forma uniforme.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de nuestro/nuestra en primera persona plural, coherente con la voz comunitaria del pasaje.
  - Se evita «SEÑOR» u otra convención de sustitución porque no aparece el tetragrámaton ni κύριος en el texto fuente.
  - Se prefiere un registro bíblico moderno y claro, sin arcaísmos innecesarios.
