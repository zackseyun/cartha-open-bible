translation:
  language: es
  text: Porque si reconoces la justicia del decreto de Dios, recibirás a tu hijo a su debido tiempo y serás alabada entre las mujeres.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: iustificaveris terminum Dei
  english_pob_choice: acknowledge the justice of God’s decree
  chosen_spanish: reconoces la justicia del decreto de Dios
  alternatives_spanish:
  - reconoces la justicia de la sentencia de Dios
  - justificas el decreto de Dios
  lexicon: iustificaveris
  rationale: El latín admite la idea de “declarar justo” o “reconocer como justo”; el inglés POB entendió aquí la noción de reconocer la justicia de la decisión/decreto divino. En español, “reconoces la justicia” conserva esa fuerza sin forzar una formulación técnica ajena al contexto.
- source_word: terminum Dei
  english_pob_choice: God’s decree
  chosen_spanish: el decreto de Dios
  alternatives_spanish:
  - la sentencia de Dios
  - el límite fijado por Dios
  lexicon: terminum
  rationale: terminus puede expresar límite, decisión o resolución; el contexto pide una determinación divina más que un simple borde espacial. “Decreto” sigue de cerca la lectura del inglés POB y su valor jurídico-declarativo.
- source_word: filium tuum recipies in tempore
  english_pob_choice: you will receive your son in due time
  chosen_spanish: recibirás a tu hijo a su debido tiempo
  alternatives_spanish:
  - volverás a recibir a tu hijo en su tiempo
  - obtendrás a tu hijo en el tiempo debido
  lexicon: recipies in tempore
  rationale: “Recibirás” preserva el verbo concreto del latín y el sentido de recuperar/recibir al hijo, mientras que “a su debido tiempo” expresa con naturalidad el dativo temporal de tempore.
- source_word: in mulieribus conlaudaberis
  english_pob_choice: will be praised among women
  chosen_spanish: serás alabada entre las mujeres
  alternatives_spanish:
  - serás celebrada entre las mujeres
  - serás loada entre las mujeres
  lexicon: conlaudaberis
  rationale: El pasivo latino indica ser objeto de alabanza. “Alabada entre las mujeres” conserva el contraste social y el matiz público del enunciado, con español natural y directo.
theological_decisions:
- issue: Naturaleza de terminum Dei
  english_pob_reading: God’s decree
  chosen_spanish_reading: decreto de Dios
  alternative_spanish_readings:
  - sentencia de Dios
  - voluntad de Dios
  rationale: La frase latina no obliga a una sola etiqueta doctrinal, pero el contexto del pasaje favorece una resolución divina determinada. “Decreto” mantiene la idea de decisión soberana sin añadir una carga confessional que el texto no explicita.
  doctrine_reference: Providencia y soberanía divina
- issue: Recompensa y vindicación pública de la mujer
  english_pob_reading: will be praised among women
  chosen_spanish_reading: serás alabada entre las mujeres
  alternative_spanish_readings:
  - serás reconocida entre las mujeres
  - serás celebrada entre las mujeres
  rationale: El latín presenta una alabanza pública dirigida a la mujer; la traducción conserva esa vindicación social sin suavizarla ni convertirla en una mera felicitación privada.
  doctrine_reference: Honra/vindicación en el relato
translation_notes:
  revision_awareness: La versión sigue el acuerdo alto del control cruzado y no introduce cambios respecto del sentido reconocido en el audit trail inglés; se mantiene la equivalencia óptima con vocabulario español transparente y dignificado.
  spanish_consistency_notes:
  - Se usa el tratamiento de segunda persona singular para concordar con el latín singular.
  - Se mantiene 'Dios' en lugar de 'Yahvé' porque el texto latino no contiene el nombre divino tetragramático sino una referencia genérica a Dios.
  - '''Alabada'' concuerda con el sujeto femenino implícito del contexto narrativo.'
