translation:
  language: es
  text: esta mujer que viste es Sión, la cual ahora ves como una ciudad que se está edificando.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ut ciuitatem aedificatam
  english_pob_choice: as a city being built
  chosen_spanish: como una ciudad que se está edificando
  alternatives_spanish:
  - como una ciudad en construcción
  - como una ciudad que está siendo edificada
  lexicon: aedificare
  rationale: 'La imagen es pasiva/progresiva: no solo una ciudad ya hecha, sino en proceso de edificación. «Se está edificando» conserva ese valor sin sonar demasiado rígido en español.'
- source_word: Zion
  english_pob_choice: Zion
  chosen_spanish: Sión
  alternatives_spanish:
  - Zión
  - Sion
  lexicon: Sion
  rationale: Se usa la forma española establecida «Sión» para el nombre bíblico, sin cambiar el referente simbólico del inglés POB.
- source_word: hanc mulierem / this woman
  english_pob_choice: this woman whom you saw
  chosen_spanish: esta mujer que viste
  alternatives_spanish:
  - esta mujer que has visto
  - esa mujer que viste
  lexicon: mulier
  rationale: «Esta mujer» mantiene la deixis cercana del texto inglés y el participio relativo se simplifica naturalmente a «que viste», que expresa la visión pasada sin añadir matices no presentes.
theological_decisions:
- issue: Identificación simbólica de la mujer con Sión
  english_pob_reading: this woman whom you saw is Zion
  chosen_spanish_reading: esta mujer que viste es Sión
  alternative_spanish_readings:
  - esta mujer que viste representa a Sión
  - esta mujer que viste es la Sión
  rationale: 'Se mantiene la identificación directa del POB inglés: la mujer no solo simboliza de manera vaga, sino que es presentada como Sión. El español sigue esa equivalencia sin explicitar más de lo que el texto base warrants.'
  doctrine_reference: Lectura simbólica de Sión en literatura apocalíptica/judaica
- issue: Estado de la ciudad
  english_pob_reading: whom you now see as a city being built
  chosen_spanish_reading: la cual ahora ves como una ciudad que se está edificando
  alternative_spanish_readings:
  - la cual ahora ves como una ciudad edificada
  - la cual ahora ves como una ciudad en construcción
  rationale: El inglés POB conserva el proceso de construcción; el español refleja ese aspecto progresivo para no borrar la tensión entre la visión actual y la ciudad todavía en formación.
  doctrine_reference: Imágenes de restauración y reconstrucción de Sión
translation_notes:
  revision_awareness: El pasaje es breve y el inglés POB no trae notas. La revisión más reciente indicó que no se necesitaban cambios, por lo que el español sigue de cerca la identificación simbólica y la imagen progresiva de construcción sin añadir explicaciones extra.
  spanish_consistency_notes:
  - Se mantiene «Sión» como forma española estándar del nombre.
  - Se evita «SEÑOR» o cualquier sustitución teológica ajena, porque el versículo no contiene el Tetragrámaton.
  - «Se está edificando» conserva el proceso expresado por el inglés POB y por el latín 'aedificatam' en contexto visional.
