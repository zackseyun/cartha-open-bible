translation:
  language: es
  text: Por tanto, no temas, y no dejes que tu corazón se aterrorice; más bien, entra y mira el esplendor o la grandeza del edificio, hasta donde tus ojos puedan ver.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: tu ergo noli timere
  english_pob_choice: Therefore do not fear
  chosen_spanish: Por tanto, no temas
  alternatives_spanish:
  - Así que no temas
  - Por eso no temas
  lexicon: noli timere -> no temas; ergo -> por tanto
  rationale: Conserva la relación inferencial de ergo con «por tanto» y usa el imperativo natural en español para la prohibición.
- source_word: neque expavescat cor tuum
  english_pob_choice: do not let your heart be terrified
  chosen_spanish: no dejes que tu corazón se aterrorice
  alternatives_spanish:
  - no permitas que tu corazón se espante
  - que tu corazón no se turbe
  lexicon: expavescat -> se aterrorice; cor tuum -> tu corazón
  rationale: «Aterrorizado» mantiene la fuerza intensa de expavescat; «corazón» conserva el hebraísmo/latín antropológico sin suavizarlo.
- source_word: sed ingredere
  english_pob_choice: but go in
  chosen_spanish: sino entra
  alternatives_spanish:
  - pero entra
  - más bien entra
  lexicon: ingredere -> entra
  rationale: «Sino» encaja mejor después de una prohibición y refleja el contraste correctivo de sed.
- source_word: vide splendorem vel magnitudinem aedificii
  english_pob_choice: see the splendor or the greatness of the building
  chosen_spanish: mira el esplendor o la grandeza del edificio
  alternatives_spanish:
  - ve el esplendor o la grandeza del edificio
  - mira el resplandor o la magnitud del edificio
  lexicon: splendor -> esplendor; vel -> o; magnitudinem -> grandeza; aedificii -> del edificio
  rationale: Se mantiene la variante disyuntiva vel como «o», tal como corrigió el POB inglés; «grandeza» comunica magnitudinem de forma natural en español.
- source_word: quantum capax est tibi visu oculorum videre
  english_pob_choice: as much as your eyes are able to see
  chosen_spanish: tanto como tus ojos puedan ver
  alternatives_spanish:
  - todo lo que tus ojos puedan ver
  - hasta donde tus ojos alcancen a ver
  lexicon: quantum -> tanto como; capax est -> pueda; visu oculorum videre -> ver con los ojos
  rationale: «Tanto como» reproduce la limitación de medida; se evita una paráfrasis explicativa excesiva y se conserva la imagen de la capacidad visual.
theological_decisions:
- issue: Consolation and exhortation in the face of overwhelming sacred grandeur
  english_pob_reading: Therefore do not fear, and do not let your heart be terrified, but go in and see the splendor or the greatness of the building, as much as your eyes are able to see.
  chosen_spanish_reading: Por tanto, no temas, y no dejes que tu corazón se aterrorice; sino entra y mira el esplendor o la grandeza del edificio, tanto como tus ojos puedan ver.
  alternative_spanish_readings:
  - Así que no temas y que tu corazón no se turbe; entra y contempla la belleza del edificio, hasta donde te sea posible verlo.
  - Por eso no temas ni se espante tu corazón; entra y observa el esplendor o la magnitud del edificio, cuanto puedas ver.
  rationale: El texto presenta una exhortación pastoral frente a una visión abrumadora. La traducción conserva el doble mandato negativo y el giro de contraste que invita a entrar y ver la realidad del edificio sin suavizar la intensidad emocional ni la limitación perceptiva.
  doctrine_reference: No aplica una doctrina específica; se preserva el sentido exhortativo y antropológico del pasaje sin añadir interpretación teológica externa.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés que cambió ‘and the greatness’ a ‘or the greatness’ para reflejar con mayor precisión el latino vel. La versión española adopta explícitamente ‘o’ para mantener esa disyunción.
  spanish_consistency_notes:
  - Se usó 'Por tanto' para ergo, manteniendo el enlace lógico del texto.
  - Se prefirió 'mira' sobre 'contempla' para un registro claro y directo, aunque 'contempla' queda como alternativa válida.
  - Se evitó 'SEÑOR' o terminología de tradición litúrgica porque el pasaje no contiene el nombre divino ni un título que requiera esa decisión.
  - Se mantuvo 'edificio' para aedificii, que en este contexto es el referente más directo y comprensible en español.
