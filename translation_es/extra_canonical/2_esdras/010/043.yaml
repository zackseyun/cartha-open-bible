translation:
  language: es
  text: Esta mujer que viste es Sion[a], a la que ahora ves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y en cuanto a que te hablaba de la desgracia de su hijo, esta es la explicación».'
    reason: alternative_reading
lexical_decisions:
- source_word: Haec mulier
  english_pob_choice: This woman
  chosen_spanish: Esta mujer
  alternatives_spanish:
  - Esa mujer
  - La mujer esta
  lexicon: haec + mulier
  rationale: El latín identifica de manera directa a la figura vista por Esdras con una mujer; «esta mujer» conserva la deixis inmediata sin añadir interpretación.
- source_word: quam uidisti
  english_pob_choice: whom you saw
  chosen_spanish: que viste
  alternatives_spanish:
  - a quien viste
  - que has visto
  lexicon: quam + uidisti
  rationale: En español, «que viste» reproduce la relación relativa de forma natural y fiel; el objeto humano ya queda claro por el antecedente «mujer», por lo que no hace falta marcar la preposición «a» en el flujo principal.
- source_word: haec est Sion
  english_pob_choice: is Zion
  chosen_spanish: es Sion
  alternatives_spanish:
  - es la Sion
  - es la ciudad de Sion
  lexicon: haec est + Sion
  rationale: Se conserva el nombre propio «Sion» como en el contexto apocalíptico del pasaje; no se sustituye por una glosa porque el texto latino presenta una identificación directa.
- source_word: quam nunc conspicis
  english_pob_choice: whom you now see
  chosen_spanish: a la que ahora ves
  alternatives_spanish:
  - que ahora ves
  - que contemplas ahora
  lexicon: quam + nunc conspicis
  rationale: «conspicis» tiene un matiz de ver/percibir atentamente; «ves» comunica el sentido sin volverlo demasiado literario. Se añadió «a la que» para mantener la referencia personal femenina y la fluidez del español.
theological_decisions:
- issue: Identificación simbólica de la mujer con Sion
  english_pob_reading: This woman whom you saw is Zion, whom you now see
  chosen_spanish_reading: Esta mujer que viste es Sion, a la que ahora ves
  alternative_spanish_readings:
  - Esta mujer que viste es Sion, que ahora ves
  - La mujer que viste es Sion, a quien ahora ves
  rationale: El latín hace una identificación explícita entre la mujer vista y Sion. El español debe conservar esa ecuación simbólica sin suavizarla ni convertirla en mera alegoría indeterminada.
  doctrine_reference: Lectura simbólica apocalíptica de Sion en 2 Esdras
translation_notes:
  revision_awareness: 'El texto inglés auditado fue corregido por desalineación de división versicular: primero se descartó una traducción perteneciente al final del versículo anterior y luego se afinó la redacción para eliminar la repetición innecesaria de «this». La versión española sigue la lectura revisada del latín: identificación directa de la mujer vista con Sion.'
  spanish_consistency_notes:
  - Se mantiene «Sion» como nombre propio, siguiendo la identificación del latín.
  - Se preserva la deixis doble («esta... ahora») para reflejar la progresión visual del original.
  - La nota alternativa se ancla en la frase completa porque el audit trail inglés conserva una lectura previa desplazada al versículo anterior.
