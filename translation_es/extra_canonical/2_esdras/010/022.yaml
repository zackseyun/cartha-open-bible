  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: et psalterium nostrum humiliatum est et hymnus noster conticuit et exultatio nostra dissoluta est, et lumen candelabri nostri extinctum est et arca testamenti nostri direpta est et sancta nostra contaminata sunt, et nomen quod nominatumest super nos paene profanatum est, et liberi nostri contumeliam passi sunt, et sacerdotes nostri succensi sunt et Levitae nostri in captivitate abierunt, et virgines nostrae coinquinatae sunt et mulieres nostrae vim passae sunt, et iusti nostri rapti sunt et parvuli nostri proditisunt, et iuvenes nostri servierunt et fortes nostri invalidi facti sunt.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/022.yaml
  text: Our harp has been brought low[a], our hymn has fallen silent, our rejoicing has been dissolved, the light of our lampstand has been extinguished, the ark of our covenant has been plundered, our holy things have been defiled, and the name that was called over us has been almost profaned. Our children have suffered insult, our priests have been burned, our Levites have gone into captivity, our virgins have been defiled, our women have suffered violence, our righteous men have been carried off, our little ones have been betrayed, our young men have been enslaved[b], and our strong men have become weak.
  footnotes:
  - marker: a
    text: Or 'Our harp-song'.
    reason: previous_rendering
  - marker: b
    text: Or 'have been betrayed'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:49:07Z'
    unchanged: false
    changes_summary: Changed 'handed over' to 'betrayed' for proditi sunt, which more directly reflects the Latin. Also smoothed 'have been made weak' to 'have become weak' for more natural English while preserving sense.
translation:
  language: es
  text: Nuestro arpa[a] ha sido humillada, nuestro himno ha callado, nuestro júbilo se ha deshecho, la luz de nuestro candelabro se ha apagado, el arca de nuestro pacto ha sido saqueada, nuestras cosas santas han sido contaminadas, y el nombre que fue invocado sobre nosotros casi ha sido profanado. Nuestros hijos han sufrido insulto, nuestros sacerdotes han sido quemados, nuestros levitas han ido al cautiverio, nuestras vírgenes han sido contaminadas, nuestras mujeres han sufrido violencia, nuestros justos han sido arrebatados, nuestros pequeños han sido traicionados[b], nuestros jóvenes han sido esclavizados y nuestros fuertes se han debilitado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Nuestro salterio». El latín psalterium nombra el instrumento de cuerdas; la imagen no se refiere a un canto.
    reason: lexical_alternative
  - marker: b
    text: O «han sido entregados». El latín proditi sunt también puede significar «entregados» en un contexto de asedio.
    reason: lexical_alternative
lexical_decisions:
- source_word: psalterium
  english_pob_choice: harp
  chosen_spanish: arpa
  alternatives_spanish:
  - salterio
  - arpa-cítara
  lexicon: psalterium
  rationale: El latín designa el instrumento de cuerdas, no un canto. «Arpa» mantiene el objeto musical y conserva el paralelismo con «ha sido humillada».
- source_word: humiliatum est
  english_pob_choice: has been brought low
  chosen_spanish: ha sido humillada
  alternatives_spanish:
  - ha sido abatida
  - ha sido rebajada
  lexicon: humilio
  rationale: «Humillada» reproduce bien la idea de ser rebajada o abatida y permite concordar naturalmente con el sustantivo femenino implícito en «arpa».
- source_word: conticuit
  english_pob_choice: has fallen silent
  chosen_spanish: ha callado
  alternatives_spanish:
  - se ha silenciado
  - ha enmudecido
  lexicon: conticesco
  rationale: El verbo latino expresa cesación de sonido; «ha callado» es natural en español y conserva el valor de silencio.
- source_word: dissoluta est
  english_pob_choice: has been dissolved
  chosen_spanish: se ha deshecho
  alternatives_spanish:
  - se ha desvanecido
  - se ha disipado
  lexicon: dissolvo
  rationale: El júbilo no se «disuelve» de manera idiomática en español; «se ha deshecho» comunica la desintegración o desaparición del gozo sin añadir interpretación.
- source_word: extinctum est
  english_pob_choice: has been extinguished
  chosen_spanish: se ha apagado
  alternatives_spanish:
  - se ha extinguido
  - se ha consumido
  lexicon: extinguo
  rationale: Para una luz, «apagado» es la forma más natural y fiel al sentido de extinción.
- source_word: arca testamenti nostri
  english_pob_choice: ark of our covenant
  chosen_spanish: arca de nuestro pacto
  alternatives_spanish:
  - arca de nuestra alianza
  - arca de nuestro testamento
  lexicon: arca / testamentum
  rationale: «Pacto» traduce el valor bíblico de testamentum en este contexto; se conserva la relación de alianza/covenio del texto sin introducir un término más eclesiástico.
- source_word: sancta nostra
  english_pob_choice: our holy things
  chosen_spanish: nuestras cosas santas
  alternatives_spanish:
  - nuestros objetos santos
  - nuestros santuarios
  lexicon: sanctus
  rationale: El plural neutro latino abarca objetos o realidades consagradas. «Cosas santas» preserva amplitud semántica sin forzar un referente único.
- source_word: nomen quod nominatum est super nos
  english_pob_choice: the name that was called over us
  chosen_spanish: el nombre que fue invocado sobre nosotros
  alternatives_spanish:
  - el nombre llamado sobre nosotros
  - el nombre puesto sobre nosotros
  lexicon: nomen + nominare + super
  rationale: «Invocado sobre nosotros» expresa la fórmula de pertenencia/consagración que el griego o hebreo subyacente sugiere mejor que una simple denominación.
- source_word: paene profanatum est
  english_pob_choice: has been almost profaned
  chosen_spanish: casi ha sido profanado
  alternatives_spanish:
  - estuvo a punto de ser profanado
  - se ha profanado casi por completo
  lexicon: profanare
  rationale: '«Casi ha sido profanado» conserva la tensión del latín: la profanación no se consuma por completo, pero está muy cerca.'
- source_word: proditi sunt
  english_pob_choice: have been betrayed
  chosen_spanish: han sido traicionados
  alternatives_spanish:
  - han sido entregados
  - han sido entregados traidoramente
  lexicon: prodo
  rationale: 'El audit trail inglés permitió dos opciones: «handed over» y luego «betrayed». En español, «traicionados» mantiene la lectura final del POB y la fuerza del participio latino, aunque el verbo también puede significar «entregados» en contexto bélico.'
- source_word: servierunt
  english_pob_choice: have been enslaved
  chosen_spanish: han sido esclavizados
  alternatives_spanish:
  - han servido
  - han estado en servidumbre
  lexicon: servio
  rationale: Aquí el sentido no es meramente «servir» sino quedar sometidos. «Esclavizados» sigue la decisión léxica del POB para la fuerza del pasivo.
- source_word: fortes nostri invalidi facti sunt
  english_pob_choice: have become weak
  chosen_spanish: nuestros fuertes se han debilitado
  alternatives_spanish:
  - nuestros valientes han quedado débiles
  - nuestros fuertes se han vuelto débiles
  lexicon: invalido / fortis
  rationale: La frase contrasta la fuerza anterior con la debilidad resultante. «Se han debilitado» es natural y conserva el cambio de estado.
theological_decisions:
- issue: «nomen quod nominatum est super nos» como fórmula de pertenencia/consagración
  english_pob_reading: the name that was called over us
  chosen_spanish_reading: el nombre que fue invocado sobre nosotros
  alternative_spanish_readings:
  - el nombre puesto sobre nosotros
  - el nombre llamado sobre nosotros
  rationale: La expresión bíblica suele indicar que el pueblo pertenece al nombre divino o está bajo él. «Invocado sobre nosotros» mantiene esa carga sin reducirla a mera etiqueta.
  doctrine_reference: Nombre divino y pertenencia pactual
- issue: «paene profanatum est» como profanación no consumada del nombre
  english_pob_reading: has been almost profaned
  chosen_spanish_reading: casi ha sido profanado
  alternative_spanish_readings:
  - estuvo a punto de ser profanado
  - se ha profanado casi por completo
  rationale: El texto no afirma una profanación total, sino una amenaza casi consumada. La traducción debe preservar esa tensión.
  doctrine_reference: Santidad del nombre de Dios
- issue: «servierunt» en el contexto de derrota y cautiverio
  english_pob_reading: have been enslaved
  chosen_spanish_reading: han sido esclavizados
  alternative_spanish_readings:
  - han servido
  - han quedado en servidumbre
  rationale: En este lamento bélico, el verbo describe sometimiento forzoso. «Esclavizados» explicita el resultado sin suavizar la humillación.
  doctrine_reference: Oprobio y cautiverio del pueblo
- issue: «proditi sunt» como traición o entrega en contexto de asedio
  english_pob_reading: have been betrayed
  chosen_spanish_reading: han sido traicionados
  alternative_spanish_readings:
  - han sido entregados
  - han sido abandonados
  rationale: El latín admite la noción de entregar a alguien al enemigo. El POB final prefirió «betrayed»; en español, «traicionados» conserva esa decisión, aunque se mantiene la alternativa de entrega por el trasfondo de sitio.
  doctrine_reference: Sufrimiento de los vulnerables en juicio histórico
translation_notes:
  revision_awareness: El inglés POB revisó «Our harp-song» a «Our harp» para reflejar que psalterium es el instrumento. También revisó «have been handed over» a «have been betrayed» para proditi sunt. La versión española sigue esas dos decisiones finales, pero mantiene en nota la alternativa de «entregados» por la ambigüedad inherente del latín en contexto bélico.
  spanish_consistency_notes:
  - He mantenido «Yahvé» solo donde el texto no lo exige explícitamente; aquí la unidad no contiene el nombre divino como forma directa, sino la fórmula «el nombre que fue invocado sobre nosotros».
  - Usé «casi ha sido profanado» para conservar la cercanía temporal/aspectual del latín paene profanatum est.
  - Preferí «esclavizados» en lugar de «hechos esclavos» por fluidez y fuerza pasiva, sin suavizar el impacto semántico.
  - «Cosas santas» preserva el plural amplio de sancta nostra sin estrecharlo a objetos litúrgicos específicos.
