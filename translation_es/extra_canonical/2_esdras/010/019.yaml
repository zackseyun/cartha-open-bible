  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et adposui adhuc loqui
  english_pob_choice: Then I continued to speak
  chosen_spanish: Entonces continué a hablar
  alternatives_spanish:
  - Entonces seguí hablando
  - Entonces continué hablando
  lexicon: adposui + loqui
  rationale: El latín expresa una continuación de la acción de hablar; en español, «continué a hablar» conserva la estructura aspectual del POB inglés y refleja con suficiente literalidad la continuación indicada por adposui adhuc loqui, sin volverlo demasiado idiomático ni perder el valor progresivo.
- source_word: ad eam
  english_pob_choice: to her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  - a la mujer
  lexicon: eam
  rationale: El pronombre latino femenino singular se traduce de forma natural con el dativo de objeto indirecto «le», que evita redundancia en español y mantiene la referencia femenina implícita en el contexto.
- source_word: dixi
  english_pob_choice: said
  chosen_spanish: dije
  alternatives_spanish:
  - le dije
  - y dije
  lexicon: dixi
  rationale: «Dije» reproduce directamente el verbo de habla en primera persona del singular. La forma completa con dos puntos conserva el ritmo narrativo y la transición a cita directa en español.
theological_decisions:
- issue: Continuidad narrativa de la acción de hablar
  english_pob_reading: Then I continued to speak to her and said,
  chosen_spanish_reading: Entonces continué a hablarle y dije,
  alternative_spanish_readings:
  - Entonces seguí hablándole y dije,
  - Entonces continué hablando con ella y dije,
  rationale: No hay carga doctrinal especial en este versículo; la decisión principal es mantener la simple continuidad narrativa que el latín expresa. Se evita introducir matices interpretativos ajenos al texto.
  doctrine_reference: Ninguno; texto narrativo sin afirmación doctrinal explícita.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó «continued speaking» a «continued to speak» para mayor naturalidad formal; la presente versión española sigue esa misma preferencia por una formulación directa y sobria, sin desplazar el sentido aspectual del latín.
  spanish_consistency_notes:
  - Se mantiene el tono narrativo sobrio y formal.
  - No se introducen notas porque no hay variante textual o lexical significativa que requiera anclaje.
  - La puntuación con dos puntos prepara la cita directa implícita del contexto inmediato.
