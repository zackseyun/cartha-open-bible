translation:
  language: es
  text: Y aconteció[25] que, mientras yo le hablaba, he aquí, su rostro resplandeció súbitamente en gran manera, y el aspecto de su rostro se volvió centelleante[a], de modo que incluso [yo tuve mucho temor de ella].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «que de repente su rostro resplandeció en gran manera, y su aspecto centelleó, volviéndose radiante su semblante».'
    reason: alternative_reading
  - marker: '25'
    text: El latín se interrumpe en ut etiam («de modo que incluso») al final de este versículo. La traducción restituye la cláusula final a partir de los testigos secundarios, preservando a la vez la sensación de interrupción repentina en la transformación.
    reason: textual_variant
lexical_decisions:
- source_word: Et factum est
  english_pob_choice: And it happened[25]
  chosen_spanish: Y aconteció[25]
  alternatives_spanish:
  - Y sucedió[25]
  - Y pasó[25]
  lexicon: Lat. factum est
  rationale: Conservo la fórmula narrativa de apertura con valor de transición apocalíptica. «Aconteció» es natural en español bíblico sin sonar arcaico en exceso y mantiene la cadencia del original.
- source_word: cum loquebar ad eam
  english_pob_choice: while I was speaking to her
  chosen_spanish: mientras yo le hablaba
  alternatives_spanish:
  - cuando yo le hablaba
  - mientras le hablaba
  lexicon: Lat. loquebar ad eam
  rationale: La frase indica simultaneidad directa; «mientras yo le hablaba» refleja con claridad el imperfecto y evita ambigüedad de destinatario en español.
- source_word: ecce
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - vean
  lexicon: Lat. ecce
  rationale: «He aquí» preserva el marcador de irrupción visual/apocalíptica. Es la equivalencia más estable en español bíblico para este énfasis de sorpresa.
- source_word: facies eius fulgebat ualde subito
  english_pob_choice: her face suddenly shone exceedingly
  chosen_spanish: su rostro resplandeció súbitamente en gran manera
  alternatives_spanish:
  - su rostro brilló de pronto muchísimo
  - su faz resplandeció de repente grandemente
  lexicon: Lat. facies / fulgebat / ualde subito
  rationale: «Rostro» evita el arcaísmo de «faz» pero conserva el referente facial. «Resplandeció súbitamente en gran manera» sigue de cerca el intensificador latino sin exagerar más allá del texto.
- source_word: species coruscus fiebat vultus eius
  english_pob_choice: the appearance of her face became flashing
  chosen_spanish: el aspecto de su rostro se volvió fulgurante[a]
  alternatives_spanish:
  - el semblante de su rostro se volvió resplandeciente[a]
  - su rostro comenzó a centellear[a]
  lexicon: Lat. species / coruscus / vultus
  rationale: El latín presenta una construcción irregular y probablemente corrupta; el sentido base es que el aspecto facial pasó a una cualidad de fulgor. «Se volvió fulgurante» mantiene el cambio de estado sin duplicar sujeto ni desarticular la imagen. Se evita traducir mecánicamente «appearance» como un segundo sujeto independiente.
- source_word: ut etiam
  english_pob_choice: so that even [I was greatly afraid of her]
  chosen_spanish: de modo que incluso [yo tuve muchísimo temor de ella]
  alternatives_spanish:
  - de tal manera que incluso [yo tuve mucho miedo de ella]
  - hasta el punto de que [yo tuve muchísimo temor de ella]
  lexicon: Lat. ut etiam
  rationale: El latín se rompe al final de la frase, pero la tradición secundaria y el audit trail inglés justifican restaurar la cláusula resultante de temor en lugar de omitirla. «Tuve muchísimo temor de ella» conserva la fuerza afectiva y el objeto femenino del pasaje.
theological_decisions:
- issue: Restoring the broken final clause from secondary witnesses rather than leaving the sentence truncated
  english_pob_reading: so that even [I was greatly afraid of her]
  chosen_spanish_reading: de modo que incluso [yo tuve muchísimo temor de ella]
  alternative_spanish_readings:
  - de modo que incluso [tuve gran miedo de ella]
  - de tal manera que incluso [me llené de temor ante ella]
  rationale: La fuente latina termina abruptamente en ut etiam, pero el audit trail inglés indica que la lectura restaurada procede de versiones hijas y de la corrección textual reciente. En español conviene reflejar esa restauración, manteniendo la tensión entre ruptura del testimonio latino y continuidad narrativa.
  doctrine_reference: 'Principio de crítica textual: restauración prudente a partir de testimonios convergentes; preservación del sentido transmitido sin ocultar la ruptura del testimonio base.'
translation_notes:
  revision_awareness: 'Se ha seguido la revisión más reciente del expediente: el texto inglés corregido restaura ecce y la cláusula final de temor, evita la doble traducción de species/vultus y no suaviza la interrupción del latín sin evidencia. La redacción española refleja esas correcciones y conserva la fractura textual señalada por la nota 25.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de uso aquí porque el versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se prefirió «rostro» y «aspecto/semblante» solo donde el latín lo justificaba; se evitó duplicar sujetos para no introducir una segunda entidad facial inexistente en el texto.
  - «Fulgurante» se usó para conservar la idea de brillo súbito e intenso sin convertirla en paráfrasis amplia.
  - La cláusula final entre corchetes indica restauración textual, siguiendo el modelo editorial del proyecto y la práctica del audit trail inglés.
