source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: et evertimus omnes lumina, et surrexerunt omnes cives mei ad consolandam me, et quievi usque in alium diem usque noctem.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/002.yaml
  text: Then we all put out the lamps[a], and all my fellow citizens rose up to comfort me, and I rested until the next day, until night.
  footnotes:
  - marker: a
    text: Or 'we put out all the lamps'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:48:42Z'
    unchanged: false
    changes_summary: Changed 'I was quiet' to 'I rested' for better lexical accuracy and more natural English for Latin 'quievi.'
translation:
  language: es
  text: Entonces todos apagamos las lámparas[a], y todos mis conciudadanos se levantaron para consolarme, y descansé hasta el día siguiente, hasta la noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «apagamos todas las lámparas».'
    reason: alternative_reading
lexical_decisions:
- source_word: evertimus omnes lumina
  english_pob_choice: Then we all put out the lamps
  chosen_spanish: Entonces todos apagamos las lámparas
  alternatives_spanish:
  - Entonces apagamos todas las lámparas
  - Entonces todos apagamos todas las lámparas
  lexicon: Latin evertimus + lumina
  rationale: 'Se conserva el sujeto inclusivo de primera persona plural que quedó confirmado en la revisión del inglés: ''we all''. ''Apagamos'' expresa con naturalidad la acción de extinguir luces o lámparas; ''lámparas'' mantiene el referente concreto de lumina sin forzar un calco.'
- source_word: omnes cives mei
  english_pob_choice: all my fellow citizens
  chosen_spanish: todos mis conciudadanos
  alternatives_spanish:
  - todos mis ciudadanos
  - todos mis paisanos
  lexicon: Latin cives mei
  rationale: '''Conciudadanos'' reproduce la relación comunitaria implícita en ''cives mei'' y suena más preciso que el genérico ''ciudadanos'' para este contexto de pertenencia y cercanía.'
- source_word: consolandam me
  english_pob_choice: to comfort me
  chosen_spanish: para consolarme
  alternatives_spanish:
  - para animarme
  - para darme consuelo
  lexicon: Latin consolari
  rationale: '''Consolar'' es el equivalente directo y transparente en español para ''consolandam me''.'
- source_word: quievi
  english_pob_choice: I rested
  chosen_spanish: descansé
  alternatives_spanish:
  - reposé
  - me quedé en descanso
  lexicon: Latin quiescere
  rationale: La revisión inglesa corrigió 'I was quiet' a 'I rested'; 'descansé' transmite mejor el valor de quievi y es idiomático en español.
- source_word: usque in alium diem usque noctem
  english_pob_choice: until the next day, until night
  chosen_spanish: hasta el día siguiente, hasta la noche
  alternatives_spanish:
  - hasta el día siguiente, hasta la noche
  - hasta el día siguiente, incluso hasta la noche
  lexicon: Latin temporal phrase
  rationale: Se conserva la repetición enfática de 'usque... usque' con una estructura española paralela y clara. 'Hasta la noche' mantiene la literalidad del cierre temporal sin ampliar el sentido.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que corrigió 'we put out all the lamps' a 'we all put out the lamps', mostrando que 'omnes' modifica al sujeto y no a 'lumina'. También se tomó en cuenta la revisión de 'I was quiet' a 'I rested' para reflejar con más precisión 'quievi'.
  spanish_consistency_notes:
  - Se mantuvo el sujeto inclusivo de primera persona plural ('todos apagamos').
  - Se conservó el paralelismo temporal final ('hasta el día siguiente, hasta la noche') para reflejar la repetición latina.
  - La nota alternativa se ancló solo en 'las lámparas' porque ahí nace la ambigüedad sobre si 'todas' modifica al sustantivo.
