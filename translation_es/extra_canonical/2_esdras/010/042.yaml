translation:
  language: es
  text: 'Ahora ya no ves la apariencia de una mujer[a], sino que se te apareció una ciudad que estaba siendo edificada. Y en cuanto a que te contaba la desgracia de su hijo, esta es la interpretación:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ahora ya no ves la apariencia de una mujer, sino que se te apareció una ciudad que estaba siendo edificada».'
    reason: alternative_reading
lexical_decisions:
- source_word: non speciem mulieris uides
  english_pob_choice: Now you no longer see the form of a woman
  chosen_spanish: Ahora ya no ves la figura de una mujer
  alternatives_spanish:
  - Ahora ya no ves el aspecto de una mujer
  - Ya no ves la apariencia de una mujer
  lexicon: species -> figura / aspecto / apariencia
  rationale: Latin species aquí describe la apariencia visible; "figura" conserva la referencia concreta sin sonar demasiado técnica, y mantiene la fuerza del contraste con la visión posterior de la ciudad.
- source_word: sed apparuit tibi ciuitas aedificari
  english_pob_choice: but a city appeared to you being built
  chosen_spanish: sino que se te apareció una ciudad que estaba siendo edificada
  alternatives_spanish:
  - pero se te apareció una ciudad siendo edificada
  - sino que apareció ante ti una ciudad en construcción
  lexicon: ciuitas -> ciudad; aedificari -> ser edificada / estar siendo edificada
  rationale: '"Se te apareció" refleja el dato perceptivo del texto, y "estaba siendo edificada" conserva el sentido pasivo/progresivo de aedificari sin simplificarlo a un estado demasiado estático.'
- source_word: Et quoniam enarrabat tibi de casu filii sui
  english_pob_choice: And as for her telling you about the misfortune of her son
  chosen_spanish: Y en cuanto a que te hablaba de la desgracia de su hijo
  alternatives_spanish:
  - Y puesto que te contaba la caída de su hijo
  - Y porque te relataba la desgracia de su hijo
  lexicon: enarrabat -> hablaba / contaba / relataba; casus -> desgracia / caída / percance
  rationale: '"Te hablaba de" mantiene el acto de comunicación sin forzar un verbo más literario; "desgracia" expresa bien casus en contexto narrativo y evita sobrerreducirlo a una sola acepción técnica.'
- source_word: haec absolutio est
  english_pob_choice: this is the interpretation
  chosen_spanish: esta es la interpretación
  alternatives_spanish:
  - esta es la explicación
  - esto es la interpretación
  lexicon: absolutio -> interpretación / explicación / solución
  rationale: '"Interpretación" sigue de cerca el valor exegético que el inglés POB ya fijó, y en español resulta claro y eclesialmente comprensible.'
theological_decisions:
- issue: 'Reproducción del sentido visionario: mujer versus ciudad'
  english_pob_reading: the woman is no longer seen; the vision is interpreted as a city being built
  chosen_spanish_reading: la mujer ya no se ve como tal y la visión se identifica con una ciudad en edificación
  alternative_spanish_readings:
  - la forma de mujer ya no se ve, sino una ciudad que aparece en construcción
  - ya no ves a la mujer, sino una ciudad
  rationale: 'El texto latino presenta una corrección interpretativa de la visión: la apariencia femenina da paso a la identificación de una ciudad. La traducción conserva esa tensión sin suavizarla ni convertirla en mera alegoría abstracta.'
  doctrine_reference: Lectura visionaria/apocalíptica del pasaje; fidelidad al desdoblamiento simbólico del texto.
- issue: Restauración de la cláusula omitida por desalineación versicular
  english_pob_reading: the clause about her telling you about the misfortune of her son belongs in this verse and leads into the interpretation
  chosen_spanish_reading: la cláusula sobre que te hablaba de la desgracia de su hijo se mantiene aquí y conduce a la interpretación
  alternative_spanish_readings:
  - esa referencia al hijo se deja para el versículo siguiente
  - se omite la cláusula por fluidez
  rationale: La evidencia de revisión muestra que la segunda mitad del latín fue omitida por error de partición; por tanto debe restituirse aquí para respetar el testimonio textual completo.
  doctrine_reference: Principio de integridad textual y restauración de cláusulas omitidas por desalineación editorial.
translation_notes:
  revision_awareness: 'El expediente inglés muestra una corrección mayor: se restauró al versículo la segunda mitad del latín (''Et quoniam enarrabat tibi de casu filii sui, haec absolutio est:''), que había quedado omitida por desalineación. La versión española integra esa cláusula completa y conserva la estructura interpretativa final.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando aparezca el nombre divino, pero en este versículo no interviene.
  - «Interpretación» se mantiene como equivalente de absolutio en este contexto exegético.
  - Se evita introducir vocabulario tradicional ajeno al latín inmediato; la imagen de la ciudad en construcción se conserva de manera directa.
