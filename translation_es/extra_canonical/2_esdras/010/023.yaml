base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/023.yaml
  text: And what is greatest of all[a][23], the seal of Zion—for now she has been unsealed from her glory and handed over into the hands of those who hate us.
  footnotes:
  - marker: '23'
    text: The phrase 'the seal of Zion' is difficult. It may refer to Zion's distinctive glory, authenticated status, or some emblematic mark of honor; the Latin image is preserved rather than paraphrased away.
    reason: lexical_alternative
  - marker: a
    text: Or 'for now it has been stripped of her glory'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:49:06Z'
    unchanged: false
    changes_summary: Revised “stripped of her glory” to “unsealed from her glory” to reflect the Latin resignata and preserve the seal imagery from signaculum; retained the rest with minor consistency in imagery.
translation:
  language: es
  text: Y lo que es más grande que todo[a][23], el sello de Sión—pues ahora ella ha sido desellada de su gloria y entregada en manos de los que nos odian.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pues ahora ella ha sido despojada de su gloria».'
    reason: previous_rendering
  - marker: '23'
    text: La frase «el sello de Sión» es difícil. Puede referirse a la gloria distintiva de Sión, a su condición autenticada o a alguna marca emblemática de honor; se conserva la imagen latina en vez de parafrasearla.
    reason: lexical_alternative
lexical_decisions:
- source_word: omnium maius
  english_pob_choice: what is greatest of all
  chosen_spanish: lo que es mayor que todo
  alternatives_spanish:
  - lo más grande de todo
  - lo que supera a todo
  lexicon: maior / magnitudo
  rationale: Conserva el comparativo absoluto del latín sin añadir contenido interpretativo. 'Lo que es mayor que todo' reproduce el énfasis superlativo de manera natural en español.
- source_word: signaculum
  english_pob_choice: the seal of Zion
  chosen_spanish: el sello de Sión
  alternatives_spanish:
  - la marca de Sión
  - el distintivo de Sión
  lexicon: signaculum
  rationale: '''Sello'' preserva la imagen concreta y la ambigüedad del latín, como hizo el texto inglés. No se explicita si es emblema, autenticación o signo de honor, porque el pasaje no lo determina.'
- source_word: resignata est
  english_pob_choice: has been unsealed
  chosen_spanish: ha sido desellada
  alternatives_spanish:
  - ha sido abierta
  - ha sido levantado su sello
  lexicon: resignare
  rationale: Se mantiene el campo semántico del sello. 'Desellada' refleja mejor que una paráfrasis la idea de pérdida del sello/precinto, y conserva la tensión imagética que el inglés preservó con 'unsealed'.
- source_word: tradita est in manibus eorum qui nos oderunt
  english_pob_choice: handed over into the hands of those who hate us
  chosen_spanish: entregada en manos de los que nos odian
  alternatives_spanish:
  - puesta en manos de los que nos odian
  - entregada a los que nos odian
  lexicon: tradere
  rationale: '''Entregada en manos de'' sigue de cerca el latín y el español bíblico común sin volverlo mecánico. ''Nos odian'' mantiene el sujeto plural del original.'
theological_decisions:
- issue: La imagen de Sión como sujeto femenino y objeto de deshonra/cautiverio
  english_pob_reading: for now she has been unsealed from her glory and handed over into the hands of those who hate us
  chosen_spanish_reading: pues ahora ella ha sido desellada de su gloria y entregada en manos de los que nos odian
  alternative_spanish_readings:
  - pues ahora ha perdido su gloria
  - pues ahora se ha visto privada de su gloria
  rationale: El latín usa verbos femeninos singulares que concuerdan con Sión, por lo que conviene conservar el referente femenino explícito. 'Desellada' además preserva la tensión simbólica entre sello/gloria sin reducirla a una mera pérdida abstracta.
  doctrine_reference: Gramática latina del pasaje; coherencia referencial del sujeto Sión
- issue: El valor de 'el sello de Sión'
  english_pob_reading: The phrase 'the seal of Zion' is difficult. It may refer to Zion's distinctive glory, authenticated status, or some emblematic mark of honor; the Latin image is preserved rather than paraphrased away.
  chosen_spanish_reading: el sello de Sión
  alternative_spanish_readings:
  - la gloria distintiva de Sión
  - la señal de honra de Sión
  rationale: Se preserva la indeterminación léxica documentada. No se resuelve la frase con una explicación doctrinal o litúrgica, porque el testimonio disponible recomienda mantener la imagen del texto.
  doctrine_reference: Ambigüedad léxica del sintagma signaculum Sion
translation_notes:
  revision_awareness: 'La revisión auditada corrigió la referencia pronominal en inglés para que concordara con Sión como sujeto femenino y luego ajustó ''stripped of her glory'' a ''unsealed from her glory'' para reflejar resignata y preservar la imagen del sello. La versión española sigue esa decisión: mantiene Sión como sujeto femenino explícito y traduce resignata con un verbo que conserva el campo imagístico del sello.'
  spanish_consistency_notes:
  - Se usa 'Sión' de forma consistente para Zion.
  - Se mantiene 'Yahvé' fuera del versículo porque el latín no contiene el nombre divino aquí.
  - '''Desellada'' es una formación transparente en español para conservar el paralelismo con ''sello''.'
  - Se conserva la primera persona plural 'nos odian' porque el latín dice 'nos oderunt'.
