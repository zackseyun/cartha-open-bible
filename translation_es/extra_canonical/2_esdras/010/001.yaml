translation:
  language: es
  text: Y aconteció que, cuando mi hijo entró en su alcoba nupcial, cayó y murió.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: factum est
  english_pob_choice: And it happened that
  chosen_spanish: Y aconteció que
  alternatives_spanish:
  - Y sucedió que
  - Y pasó que
  lexicon: Latin factum est
  rationale: La fórmula narrativa latina se vierte con un giro natural en español que conserva el valor de acontecimiento sin sonar rígido. «Aconteció que» reproduce el tono bíblico y el inicio de una escena.
- source_word: cum introisset
  english_pob_choice: when ... had entered
  chosen_spanish: cuando ... entró
  alternatives_spanish:
  - cuando hubo entrado
  - al entrar
  lexicon: Latin cum + pluscuamperfecto
  rationale: El latín expresa anterioridad respecto a la acción principal. En español, «cuando ... entró» comunica con claridad la secuencia narrativa sin sobrecargar la frase; el pluscuamperfecto sería posible, pero menos natural aquí.
- source_word: filius meus
  english_pob_choice: my son
  chosen_spanish: mi hijo
  alternatives_spanish:
  - mi hijo varón
  lexicon: Latin filius meus
  rationale: «Mi hijo» corresponde de forma directa y suficiente al posesivo + sustantivo latino, sin añadir matices no presentes.
- source_word: in thalamo suo
  english_pob_choice: in his bridal chamber
  chosen_spanish: en su alcoba nupcial
  alternatives_spanish:
  - en su cámara nupcial
  - en su aposento nupcial
  lexicon: Latin thalamus
  rationale: «Thalamus» en este contexto designa el lecho o cámara matrimonial. «Alcoba nupcial» conserva el sentido específico de recinto matrimonial y suena claro en español actual.
- source_word: cecidit
  english_pob_choice: fell down
  chosen_spanish: cayó
  alternatives_spanish:
  - se desplomó
  - se precipitó
  lexicon: Latin cadere
  rationale: El verbo simple «cayó» corresponde fielmente al latín y mantiene la sobriedad del relato. «Se desplomó» sería más expresivo, pero introduce un matiz no requerido.
- source_word: mortuus est
  english_pob_choice: and died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  lexicon: Latin mori
  rationale: «Murió» es la equivalencia más directa y transparente del latín, adecuada para un registro bíblico sobrio.
theological_decisions:
- issue: None beyond the plain narrative of sudden death after entering the bridal chamber
  english_pob_reading: The English POB treats the verse as a straightforward narrative without added interpretation.
  chosen_spanish_reading: La versión española mantiene el mismo tono narrativo llano, sin intensificar la escena ni sugerir causalidad no expresada.
  alternative_spanish_readings:
  - añadir una nota causal o dramática
  - interpretar la muerte como juicio explícito
  rationale: El latín sólo afirma la secuencia de entrada, caída y muerte. La traducción debe preservar esa neutralidad y no introducir una explicación teológica no presente en el texto.
  doctrine_reference: Principio de fidelidad al enunciado narrativo; no añade interpretación doctrinal.
translation_notes:
  revision_awareness: La revisión más reciente indica agreement alto y ningún cambio necesario; por ello se conserva la línea de la POB inglesa sin introducir variantes textuales ni notas.
  spanish_consistency_notes:
  - Se mantiene «Y aconteció que» como fórmula narrativa solemne y consistente con el registro bíblico.
  - Se usa «alcoba nupcial» para thalamo suo por claridad y fidelidad contextual.
  - No se añaden notas al pie porque el texto latino y la POB inglesa no muestran variantes ni ambigüedades que exijan aclaración adicional.
