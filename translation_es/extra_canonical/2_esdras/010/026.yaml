translation:
  language: es
  text: Y he aquí[a], de repente soltó un gran grito, lleno de terror, de modo que la tierra fue sacudida por el sonido. Y vi,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede verterse: «Y de repente soltó un gran grito, lleno de terror, de modo que la tierra fue sacudida por el sonido».'
    reason: alternative_reading
lexical_decisions:
- source_word: ecce
  english_pob_choice: and behold
  chosen_spanish: Y he aquí[a]
  alternatives_spanish:
  - Y he aquí
  - Y mira
  - Y sucedió que
  lexicon: ecce
  rationale: ‘Ecce’ introduce una atención súbita; ‘he aquí’ conserva ese valor de deíxis y mantiene el tono bíblico sin volverlo arcaizante en exceso. Se conserva con ‘Y’ para reflejar la coordinación del texto latino.
- source_word: emisit sonum vocis magnum timore plenum
  english_pob_choice: she let out a great cry, full of terror
  chosen_spanish: soltó un gran grito, lleno de terror
  alternatives_spanish:
  - emitió un gran grito, lleno de terror
  - prorrumpió en un gran grito, lleno de terror
  lexicon: emittere sonum vocis; timore plenum
  rationale: ‘Soltó un gran grito’ reproduce con naturalidad el acto de emitir un clamor fuerte. ‘Gran’ y ‘lleno de terror’ conservan la intensidad y la cualidad afectiva del latino sin añadir explicación.
- source_word: ut commoveretur terra a sono
  english_pob_choice: so that the earth was shaken by the sound
  chosen_spanish: de modo que la tierra fue sacudida por el sonido
  alternatives_spanish:
  - de modo que la tierra tembló por el sonido
  - de manera que la tierra fue conmovida por el sonido
  lexicon: commovere; terra; sonus
  rationale: ‘Fue sacudida’ mantiene el pasivo y el efecto físico directo de ‘commoveretur’. ‘Por el sonido’ sigue la causa expresada por ‘a sono’ sin convertirla en una paráfrasis más interpretativa.
- source_word: et vidi
  english_pob_choice: And I saw
  chosen_spanish: Y vi,
  alternatives_spanish:
  - Y vi
  - Y miré
  - Y observé
  lexicon: video
  rationale: ‘Vidi’ se rinde de forma directa con ‘vi’. Se conserva la coma final porque el latín continúa la narración hacia el siguiente versículo, y el tramo pertenece al cierre de esta unidad textual.
theological_decisions:
- issue: Tratamiento de la irrupción visionaria y del énfasis deíctico
  english_pob_reading: and behold ... And I saw
  chosen_spanish_reading: Y he aquí ... Y vi,
  alternative_spanish_readings:
  - Y mira ... Y vi,
  - Y sucedió que ... Y vi,
  rationale: No hay aquí una afirmación doctrinal, pero sí una forma visionaria marcada. ‘He aquí’ conserva la función literaria y retórica de ‘ecce’ mejor que una omisión o una narración suavizada.
  doctrine_reference: Ninguna; decisión de retórica y registro visionario.
translation_notes:
  revision_awareness: 'La versión inglesa de trabajo pasó por una corrección importante: primero se omitió ‘ecce’ y el cierre ‘et vidi’, y luego se ajustó ‘And I looked’ a ‘And I saw’. La presente propuesta toma como base el texto latino limpio y refleja ambos elementos, manteniendo el final abierto con ‘Y vi,’ porque el versículo continúa en la unidad siguiente.'
  spanish_consistency_notes:
  - Se mantiene ‘he aquí’ para ecce, coherente con un registro bíblico claro y no masking.
  - Se usa ‘Dios’/‘Yahvé’ según corresponda en otros pasajes; aquí no aparece ningún nombre divino.
  - Se conserva ‘vi’ para vidi, evitando ampliar a ‘observé’ o ‘miré’ que debilitarían la correspondencia léxica.
