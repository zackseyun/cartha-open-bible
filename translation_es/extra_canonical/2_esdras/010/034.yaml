  source_alignment_summary: 'El borrador español conserva fielmente el sentido del latín atestiguado en el tramo traducido por la auditoría inglesa: una petición directa y deferente seguida de una súplica para no ser abandonada, con la finalidad negativa de no morir en vano. «Habla, señor mío; solo no me abandones, para que no muera en vano» refleja bien derelinquere y ut non frustra moriar. El fragmento latino posterior («Quoniam uidi quae non») no aparece en el texto inglés de este registro y por tanto no debía añadirse al texto principal español; la omisión en el borrador coincide con el alcance de la traducción inglesa auditada.'
