translation:
  language: es
  text: 'Y yo dije: «Habla, señor mío; solo no me abandones, para que no muera en vano».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: derelinquere
  english_pob_choice: forsake me
  chosen_spanish: me abandones
  alternatives_spanish:
  - me dejes
  - me desampares
  lexicon: derelinquere
  rationale: El latín expresa la idea de dejar o abandonar a alguien. «Abandones» comunica de forma natural y fiel la fuerza relacional de la petición; «desampares» es posible, pero más tradicional y menos neutral en español moderno.
- source_word: ut non frustra moriar
  english_pob_choice: lest I die for nothing
  chosen_spanish: para que no muera en vano
  alternatives_spanish:
  - no sea que muera en vano
  - para no morir inútilmente
  lexicon: ut + non frustra + moriar
  rationale: 'La construcción final expresa finalidad negativa: evitar una muerte sin fruto. «Para que no muera en vano» conserva el sentido y suena natural; «inútilmente» sería correcto pero menos idiomático aquí.'
- source_word: Quoniam uidi quae non
  english_pob_choice: For I have seen what I have not...
  chosen_spanish: porque he visto lo que no…
  alternatives_spanish:
  - pues he visto lo que no…
  - ya que he visto lo que no…
  lexicon: quoniam + uidi
  rationale: El fragmento latino conservado queda truncado. No se completa en español más allá de lo atestiguado; se mantiene la interrupción implícita del texto fuente sin añadir contenido inexistente.
theological_decisions:
- issue: Renderización de la petición respetuosa dirigida a la figura autoritativa
  english_pob_reading: Speak, my lord
  chosen_spanish_reading: Habla, señor mío
  alternative_spanish_readings:
  - Habla, mi señor
  - Dime, señor mío
  rationale: El latín solo sugiere una dirección reverente; «señor mío» preserva el respeto sin añadir una mayúscula doctrinal ni convertirlo en título teológico específico. «Habla» mantiene la urgencia directa del ruego.
  doctrine_reference: Respeto deferencial en el diálogo; no hay afirmación doctrinal adicional en el verso.
translation_notes:
  revision_awareness: El texto base está marcado como high_agreement y la revisión más reciente indicó que no se necesitaban cambios; por eso la versión española sigue de cerca el sentido del latín y del POB inglés, sin expansión interpretativa.
  spanish_consistency_notes:
  - Se usa «señor» en minúscula para el interlocutor humano o angélico/autoridad del contexto, sin confundirlo con el tratamiento reservado para Yahvé.
  - Se mantiene la cadencia breve y directa del original, evitando añadir clausulado o completaciones no presentes en el fragmento latino conservado.
