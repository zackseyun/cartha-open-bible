  glossary_alignment: No hay términos del glosario principal en disputa aquí. «Señor mío» funciona como tratamiento humano/deferente, no como enmascaramiento del nombre divino. «Abandones» es una buena elección para derelinquere y está bien justificada frente a «desampares».
