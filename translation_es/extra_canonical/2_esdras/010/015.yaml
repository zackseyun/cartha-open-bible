translation:
  language: es
  text: Ahora pues, retén en ti tu dolor y soporta con valentía las desgracias que te han ocurrido.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: nunc ergo
  english_pob_choice: Now therefore
  chosen_spanish: Ahora, por tanto
  alternatives_spanish:
  - Ahora pues
  - Así que ahora
  lexicon: nunc ergo
  rationale: El giro latino marca transición exhortativa y conclusión lógica; «Ahora, por tanto» conserva el valor de enlace formal sin sonar arcaico. «Por tanto» refleja bien el matiz inferencial de ergo.
- source_word: retine ... dolorem tuum
  english_pob_choice: keep your grief within yourself
  chosen_spanish: guarda dentro de ti tu dolor
  alternatives_spanish:
  - retén tu dolor dentro de ti
  - mantén tu tristeza para ti
  lexicon: retine ... dolorem tuum
  rationale: retine expresa ‘retener/guardar’; «guarda dentro de ti» suena natural en español y preserva la interiorización. «Dolorem» se traduce aquí como «dolor», manteniendo el registro afectivo del lamento.
- source_word: apud temet ipsam
  english_pob_choice: within yourself
  chosen_spanish: dentro de ti
  alternatives_spanish:
  - en ti misma
  - en tu interior
  lexicon: apud temet ipsam
  rationale: La secuencia enfatiza a la persona misma como ámbito del dolor. «Dentro de ti» comunica la interioridad de forma clara y evita una literalidad pesada. El femenino latino («ipsam») puede reflejar que el interlocutor es femenina; el español neutro conserva la claridad sin forzar el género en el verbo.
- source_word: fortiter fer
  english_pob_choice: bravely bear
  chosen_spanish: soporta con valentía
  alternatives_spanish:
  - llévalo con fortaleza
  - aguántalo con valentía
  lexicon: fortiter fer
  rationale: fer implica ‘soportar/llevar’; «soporta» conserva esa carga de resistencia. «Con valentía» reproduce fortiter de modo idiomático y digno; no se traduce como mera intensidad emocional sino como firmeza ante la adversidad.
- source_word: casus
  english_pob_choice: misfortunes
  chosen_spanish: las desgracias
  alternatives_spanish:
  - los infortunios
  - los golpes de la vida
  lexicon: casus
  rationale: En contexto, casus son acontecimientos adversos o calamidades. «Desgracias» es una equivalencia natural y suficientemente fuerte en español; «infortunios» es posible pero más literario y menos directo.
theological_decisions:
- issue: Tono exhortativo ante el sufrimiento sin introducir consuelo doctrinal adicional
  english_pob_reading: keep your grief within yourself, and bravely bear the misfortunes that have happened to you
  chosen_spanish_reading: guarda dentro de ti tu dolor y soporta con valentía las desgracias que te han ocurrido
  alternative_spanish_readings:
  - consuela tu dolor
  - acepta resignadamente las desgracias
  rationale: El texto latino solo exhorta a contener el dolor y a soportar las desgracias; no añade explicaciones teológicas ni promesas. La redacción española mantiene ese tono sobrio y evita expandir el sentido hacia consuelo o resignación, que no están explícitos en el source.
  doctrine_reference: Sufrimiento y paciencia; exhortación moral sin ampliación doctrinal
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «Now then» a «Now therefore» y ajustó el orden a «bravely bear» para mayor naturalidad formal. La versión española sigue esa lectura más concluyente con «Ahora, por tanto» y mantiene el verbo de carga/soportar antes del adverbio de modo, sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y moderno, sin calcos innecesarios.
  - Se evita «SEÑOR» u այլ terminología eclesiástica no presente en el latín.
  - «Dolor» y «desgracias» conservan el campo semántico afectivo y adversativo del original.
