base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/054.yaml
  text: For no work of human building could endure in the place where the city of the Most High was beginning to be shown.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:49:32Z'
    unchanged: false
    changes_summary: Changed “man’s building” to “human building” for more natural and formal English while preserving the Latin sense.
translation:
  language: es
  text: porque ninguna obra de edificación humana podría mantenerse en pie en el lugar donde comenzaba a mostrarse la ciudad del Altísimo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: opus aedificii hominis
  english_pob_choice: human building
  chosen_spanish: obra de construcción humana
  alternatives_spanish:
  - obra humana de construcción
  - edificación humana
  - obra hecha por el hombre
  lexicon: opus; aedificium; hominis
  rationale: La frase latina expresa la idea de una obra de edificación producida por seres humanos. «Construcción humana» conserva la fuerza genitiva de hominis sin reducirla a un masculino genérico, y evita un giro demasiado literal que sonaría extraño en español.
- source_word: sustinere
  english_pob_choice: could endure
  chosen_spanish: pudiera sostenerse
  alternatives_spanish:
  - pudiera mantenerse
  - pudiera durar
  - pudiera resistir
  lexicon: sustinere
  rationale: En contexto, el verbo comunica que la obra no podía permanecer firme o mantenerse en ese lugar. «Sostenerse» refleja bien la idea de estabilidad estructural implícita en el latín.
- source_word: altissimi ciuitas
  english_pob_choice: the city of the Most High
  chosen_spanish: la ciudad del Altísimo
  alternatives_spanish:
  - la ciudad del Dios Altísimo
  - la ciudad del Excelso
  lexicon: ciuitas; altissimi
  rationale: «Altísimo» reproduce el título reverencial del original y coincide con el sentido del POB inglés. «Ciudad del Altísimo» mantiene la relación posesiva sin añadir formulaciones no requeridas.
- source_word: incipiebat ostendi
  english_pob_choice: was beginning to be shown
  chosen_spanish: comenzaba a mostrarse
  alternatives_spanish:
  - empezaba a mostrarse
  - estaba empezando a ser mostrada
  - se empezaba a revelar
  lexicon: incipere; ostendere
  rationale: La pasiva latina sugiere una manifestación en curso. «Comenzaba a mostrarse» conserva esa progresión y evita una traducción excesivamente técnica o pesada.
theological_decisions:
- issue: Referencia al título divino «altissimi»
  english_pob_reading: the city of the Most High
  chosen_spanish_reading: la ciudad del Altísimo
  alternative_spanish_readings:
  - la ciudad del Dios Altísimo
  - la ciudad del Más Alto
  rationale: Se preserva el título teológico tradicional sin sustituirlo por un eufemismo. «Altísimo» es claro, reverente y fiel al valor honorífico del latín.
  doctrine_reference: Títulos divinos en la tradición bíblica; cf. uso de «Altísimo» para el Dios supremo.
- issue: Forma de expresar la imposibilidad de la obra humana
  english_pob_reading: no work of human building could endure
  chosen_spanish_reading: ninguna obra de construcción humana podría sostenerse
  alternative_spanish_readings:
  - ninguna obra humana podría sostenerse
  - ninguna construcción hecha por el hombre podría perdurar
  rationale: 'La redacción conserva la limitación radical del texto: la obra humana no puede mantenerse ante la manifestación de la ciudad de Dios. «Sostenerse» mantiene el matiz de firmeza física y arquitectónica.'
  doctrine_reference: Contraste entre lo humano y lo divino en la manifestación de la ciudad celestial.
translation_notes:
  revision_awareness: 'El texto latino fuente dice: «Nec enim poterat opus aedificii hominis sustinere in loco ubi incipiebat altissimi ciuitas ostendi». La traducción inglesa auditada fue ajustada de «man’s building» a «human building» para reflejar con más naturalidad el genitivo latino; la versión española adopta la misma interpretación sin añadir contenido.'
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para coherencia con el título divino en otros pasajes.
  - Se evita «SEÑOR» porque aquí el latín no usa un reemplazo litúrgico sino un título explícito.
  - «Construcción humana» preserva el contraste con la ciudad divina sin sonoridad arcaica.
  - No se añaden notas textuales porque el packet no reporta variantes relevantes en este versículo.
