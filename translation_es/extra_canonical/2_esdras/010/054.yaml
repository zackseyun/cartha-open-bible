  text: tibi ut uenires in agrum, ubi non est fundamentum aedificii. Nec enim poterat opus aedificii hominis sustinere in loco ubi incipiebat altissimi ciuitas ostendi. Tu ergo noli timere, neque expauescat cor tuum, sed ingredere et uide splendorem et magnitudinem aedificii, quantum capax est tibi uisus oculorum uidere.
