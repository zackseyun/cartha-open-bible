review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del sentido está preservada: el borrador refleja correctamente el llamado a observar el lamento, lo sucedido al pueblo, y la personificación de Sion como madre de todos. Sin embargo, hay dos problemas de fidelidad textual importantes: falta el signo inicial de interrogación en español, y «está en dolor» no representa tan bien el latín «in tristitia contristatur» ni la auditoría inglesa como una formulación con «tristeza».'
  spanish_quality_summary: El español es generalmente claro y digno, pero presenta una puntuación incorrecta («?», sin apertura) y una expresión algo poco natural/menos precisa («está en dolor»). «Sion» es legible, aunque la puntuación y la cláusula final se benefician de una leve mejora para sonar más natural sin alejarse de la fuente.
  glossary_alignment: 'No hay conflictos mayores con la terminología del proyecto. «Sion» es aceptable para Zion. La nota alternativa conserva la opción previa auditada. La principal desviación está en el campo semántico de «tristitia»: conviene «tristeza» en vez de «dolor» para alinearse mejor con la fuente latina y la POB inglesa.'
  issues:
  - severity: medium
    issue: Puntuación interrogativa española incompleta
    rationale: 'El texto español debe llevar signo de apertura: «¿Mira...?» o, mejor según el contexto, «¿Ves...?» / «¿Miras...?» si se mantiene valor interrogativo de «uides». El borrador solo tiene signo de cierre.'
  - severity: medium
    issue: «está en dolor» debilita/altera el matiz de «in tristitia contristatur»
    rationale: El latín enfatiza la tristeza; la auditoría inglesa fijó «is grieving in sorrow». «Dolor» desplaza el sentido hacia pena o sufrimiento general. «está en tristeza» o «se entristece en tristeza» conserva mejor el campo léxico, y la primera es más natural.
  - severity: low
    issue: Elección de «Mira» frente a valor más literal de «uides»
    rationale: «Mira» puede funcionar como apelación, pero «uides» es formalmente ‘ves/¿ves?’. Dado que la POB inglesa mantiene «see» y el latín lleva interrogación, «¿Ves...?» refleja mejor la forma sin perder naturalidad.
  revised_spanish_text: ¿Ves nuestro lamento y lo que nos ha acontecido? Porque Sion[a], la madre de todos nosotros, está en tristeza y humillación.
  revised_footnotes:
  - marker: a
    text: 'O: «Porque Sion, nuestra madre, la madre de todos nosotros, está en tristeza y ha sido humillada».'
    reason: Se preserva la alternativa previa documentada en la auditoría inglesa, adaptada al español.
  revision_rationale: Se corrigen la puntuación española y el valor interrogativo de «uides» con «¿Ves...?»; además, «está en tristeza» alinea mejor el español con «in tristitia contristatur» y con la POB inglesa revisada («is grieving in sorrow»), evitando el desplazamiento semántico de «dolor». Se mantiene la nota alternativa ya sustentada por el historial auditado.
