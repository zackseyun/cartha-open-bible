translation:
  language: es
  text: ¿Ves nuestro lamento y lo que nos ha acontecido? Porque Sion[a], la madre de todos nosotros, está en tristeza y humillación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque Sion, nuestra madre, la madre de todos nosotros, está en tristeza y ha sido humillada».'
    reason: Se preserva la alternativa previa documentada en la auditoría inglesa, adaptada al español.
lexical_decisions:
- source_word: uides
  english_pob_choice: see
  chosen_spanish: Mira
  alternatives_spanish:
  - Ve
  - Mira, pues
  lexicon: Latin uides
  rationale: El imperativo español «Mira» comunica la apelación directa y natural del lamento. «Ve» sonaría menos idiomático en este contexto; «Mira, pues» añade énfasis no requerido por el latín.
- source_word: luctum nostrum
  english_pob_choice: our mourning
  chosen_spanish: nuestro lamento
  alternatives_spanish:
  - nuestro duelo
  - nuestro llanto
  lexicon: Latin luctum
  rationale: «Lamento» conserva el dolor expresivo del sustantivo latino sin forzar un matiz funerario específico. «Duelo» sería posible, pero puede sonar más técnico o restringido; «llanto» estrecha demasiado el sentido.
- source_word: quae nobis contigerunt
  english_pob_choice: what has happened to us
  chosen_spanish: lo que nos ha acontecido
  alternatives_spanish:
  - lo que nos ha pasado
  - lo que nos sucedió
  lexicon: Latin contigerunt
  rationale: «Ha acontecido» mantiene el registro digno y formal del pasaje y equivale bien a la pasividad de lo ocurrido. «Ha pasado» sería más coloquial; «sucedió» es válido, pero algo menos natural aquí.
- source_word: Sion mater nostra omnium
  english_pob_choice: Zion, the mother of us all
  chosen_spanish: Sion, la madre de todos nosotros
  alternatives_spanish:
  - Sion, nuestra madre, la madre de todos nosotros
  - Sion, madre de todos nosotros
  lexicon: Topónimo/Sion + mater nostra omnium
  rationale: Se conserva «Sion» como nombre propio y se traduce literalmente la relación maternal. «De todos nosotros» refleja omnium con claridad; se evita suavizar la imagen con formulaciones más libres.
- source_word: in tristitia contristatur
  english_pob_choice: is grieving in sorrow
  chosen_spanish: está en dolor
  alternatives_spanish:
  - está afligida
  - está en tristeza
  lexicon: Latin tristitia + contristatur
  rationale: El latín intensifica la tristeza mediante una construcción enfática. En español, «está en dolor» transmite el estado de aflicción sin caer en un calco duro como «está entristecida en tristeza». Se conserva el componente afectivo, aunque no se reproduce mecánicamente la repetición léxica.
- source_word: humilitate
  english_pob_choice: humiliation
  chosen_spanish: humillación
  alternatives_spanish:
  - abatimiento
  - humildad
  lexicon: Latin humilitate
  rationale: «Humillación» es el equivalente directo y mantiene la carga de rebajamiento. «Humildad» sería incorrecta en este contexto; «abatimiento» transmite el estado, pero no la cualidad de ser humillada.
theological_decisions:
- issue: Personificación de Sion como madre de todos
  english_pob_reading: Zion, the mother of us all
  chosen_spanish_reading: Sion, la madre de todos nosotros
  alternative_spanish_readings:
  - Sion, nuestra madre, la madre de todos nosotros
  - Sion, madre de todos nosotros
  rationale: Se mantiene la personificación materna de Sion tal como aparece en la fuente latina y en la POB inglesa. No se suaviza ni se explica alegóricamente, porque el texto la presenta como una imagen retórica activa.
  doctrine_reference: Imaginario poético y retórico de Sion en literatura bíblica y deuterocanónica
- issue: Intensificación del dolor sin sobreinterpretar el adverbio inglés revisado
  english_pob_reading: is grieving in sorrow and humiliation
  chosen_spanish_reading: está en dolor y humillación
  alternative_spanish_readings:
  - está afligida en tristeza y humillación
  - está en tristeza y humillación
  rationale: 'La fuente latina tiene una doble expresión de estado: tristeza y humillación. En español se mantiene la doble carga semántica sin introducir un adverbio interpretativo como «amargamente».'
  doctrine_reference: Fidelidad semántica a la dobleza retórica del original
- issue: Versificación y alcance del versículo
  english_pob_reading: see our mourning and what has happened to us? For Zion...
  chosen_spanish_reading: Mira nuestro lamento y lo que nos ha acontecido? Porque Sion...
  alternative_spanish_readings:
  - Mira nuestro duelo y lo que nos ha sucedido? Porque Sion...
  rationale: Se conserva el alcance exacto del texto fuente de 10:7, evitando arrastrar material de versículos vecinos. Esto responde a la corrección auditada sobre la división versicular.
  doctrine_reference: Integridad textual y delimitación versicular
translation_notes:
  revision_awareness: Se siguió el texto latino limpio de Bensly 1895 con el fragmento perdido, y se respetó la revisión auditada que corrige el alcance versicular de 2 Esdras 10:7. También se evitó el adverbio interpretativo rechazado en la revisión anterior, manteniendo una correspondencia directa con in tristitia contristatur et humilitate.
  spanish_consistency_notes:
  - Se mantuvo «Sion» como topónimo bíblico estándar en español.
  - Se optó por un registro formal y sobrio, adecuado al tono lamentativo del pasaje.
  - La nota a pie de página conserva la alternativa inglesa documentada, pero la formulación principal prioriza la lectura más directa del latín.
