revisions:
- from: Mira nuestro lamento y lo que nos ha acontecido? Porque Sion[a], la madre de todos nosotros, está en dolor y humillación.
  to: ¿Ves nuestro lamento y lo que nos ha acontecido? Porque Sion[a], la madre de todos nosotros, está en tristeza y humillación.
  rationale: Se corrigen la puntuación española y el valor interrogativo de «uides» con «¿Ves...?»; además, «está en tristeza» alinea mejor el español con «in tristitia contristatur» y con la POB inglesa revisada («is grieving in sorrow»), evitando el desplazamiento semántico de «dolor». Se mantiene la nota alternativa ya sustentada por el historial auditado.
  reviewer_model: gpt-5.4
