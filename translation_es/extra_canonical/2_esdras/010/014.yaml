source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'quomodo et uenit ; et ego tibi dico: Sicut tu cum dolore peperisti, sic et terra dedit fructum suum hominem ab initio ei qui fecit eam. Nunc ergo retine apud temetipsam dolorem tuum, et fortiter fer qui tibi contigerunt casus. Si enim iustificaueris terminum dei, et filium tuum recipies in tempore et in mulieribus conlaudaberis. Ingredere ergo in ciuitatem ad uirum tuum. et dixit ad me: Non faciam neque ingrediar ciuitatem, sed hic moriar. Et adposui adhuc loqui ad eam et dixi: Noli facere sermonem hunc, sed consenti persuaderi propter casus Sion et consolare propter dolorem Hierusalem. Vides enim quoniam sanctificatio nostra deserta effecta est, et altare nostrum demolitum est, et templum nostrum destructum est, Et psalterium nostrum humiliatum est, et hymnus noster conticuit, et exultatio nostra dissoluta est, et lumen candelabri nostri extinctum est, et arca testamenti nostri direpta est, et sancta nostra contaminata sunt, et nomen quod nominatum est super nos profanatum est,
    et liberi nostri contumeliam passi sunt, et sacerdotes nostri succensi sunt, et Leuitae nostri in captiuitate abierunt, et uirgines nostrae coinquinatae sunt, et mulieres nostrae uim passae sunt, et iusti nostri rapti sunt, et paruuli nostri proditi sunt, et iuuenes nostri seruierunt, et fortes nostri invalidi facti sunt. Et quod omnium maius, signaculum Sion, quoniam resignata est de gloria sua nunc, et tradita est in manibus eorum qui nos oderunt.'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/014.yaml
  text: 'Then I say to you: just as you gave birth in pain, so also the earth has given its fruit, man, from the beginning, to him who made her.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:50:27Z'
    unchanged: false
    changes_summary: Capitalized the opening word for standard sentence form; otherwise no substantive changes were needed.
translation:
  language: es
  text: 'Entonces te digo: así como tú diste a luz con dolor, así también la tierra ha dado su fruto al hombre desde el principio, a aquel que la hizo.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: quomodo ... sic etiam
  english_pob_choice: just as ... so also
  chosen_spanish: así como ... así también
  alternatives_spanish:
  - del mismo modo que ... también así
  - tal como ... así también
  lexicon: comparative correlative
  rationale: La correlación comparativa se expresa de forma natural en español con «así como ... así también», manteniendo la simetría retórica del latín y del inglés POB sin añadir explicaciones.
- source_word: etu / peperisti
  english_pob_choice: you gave birth in pain
  chosen_spanish: diste a luz con dolor
  alternatives_spanish:
  - pariste con dolor
  - tuviste parto doloroso
  lexicon: parere / parto
  rationale: «Diste a luz» comunica el acto de dar a luz en español corriente; «con dolor» conserva el dativo/ablativo de modo y la tensión del texto. Se evita suavizar a una formulación más genérica.
- source_word: terra dedit fructum suum
  english_pob_choice: the earth has given its fruit
  chosen_spanish: la tierra ha dado su fruto
  alternatives_spanish:
  - la tierra ha producido su fruto
  - la tierra dio su fruto
  lexicon: terra / fructus
  rationale: «Ha dado su fruto» sigue de cerca la imagen agrícola y conserva el aspecto perfecto del latín con una forma española natural. No se reemplaza por una explicación interpretativa.
- source_word: hominem
  english_pob_choice: man
  chosen_spanish: al hombre
  alternatives_spanish:
  - al ser humano
  - al hombre
  lexicon: homo
  rationale: Se conserva «hombre» porque el texto contrapone la tierra que da su fruto con la criatura humana, y el inglés POB mantiene la misma forma. En español, «al hombre» es idiomático y suficientemente amplio en este contexto.
- source_word: ab initio
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el inicio
  lexicon: initium
  rationale: «Desde el principio» es la equivalencia más estable y clara en español bíblico para la expresión temporal, sin forzar un matiz técnico.
- source_word: ei qui fecit eam
  english_pob_choice: to him who made her
  chosen_spanish: a aquel que la hizo
  alternatives_spanish:
  - al que la hizo
  - a quien la hizo
  lexicon: facere
  rationale: Se mantiene la referencia a la tierra como femenina en español con el pronombre «la», siguiendo la personificación del latín y del inglés POB. «A aquel que la hizo» preserva la relativa sin introducir ambigüedad.
theological_decisions:
- issue: Personificación de la tierra y relación criatura-Creador
  english_pob_reading: the earth has given its fruit ... to him who made her
  chosen_spanish_reading: la tierra ha dado su fruto ... a aquel que la hizo
  alternative_spanish_readings:
  - la tierra ha dado su fruto ... al que la hizo
  - la tierra ha producido su fruto ... a quien la hizo
  rationale: Se conserva la personificación de la tierra con pronombre femenino, porque forma parte de la imagen del texto y del latín. No se neutraliza a «ello» o «la creó», ya que el original mantiene la referencia personalizada.
  doctrine_reference: Creación y providencia; lenguaje figurado de la creación
- issue: Ambigüedad de 'homo' en el contexto
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - ser humano
  - humanidad
  rationale: Aunque «ser humano» podría aclarar el alcance genérico, el texto presenta un paralelismo con valor representativo y el POB inglés eligió «man». Se retiene «hombre» para no diluir la forma tradicional del contraste poético.
  doctrine_reference: Antropología bíblica; uso genérico de 'hombre'
translation_notes:
  revision_awareness: El texto inglés auditado recibió solo una corrección de capitalización inicial; no hubo cambios sustantivos de sentido. La redacción española sigue directamente el latín limpio y mantiene la misma lectura óptima-equivalente del verso sin introducir glosas adicionales.
  spanish_consistency_notes:
  - Se mantiene «tierra» en femenino y el pronombre correspondiente «la» para reflejar la personificación del latín.
  - Se conserva la estructura comparativa doble para reproducir el paralelismo del pasaje.
  - No se añade puntuación interpretativa más allá de la necesaria para una lectura española clara y publicable.
