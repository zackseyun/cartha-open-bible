    changes_summary: Replaced the inaccurate 'She mourns' with 'She has been humbled' to reflect humiliata est, restored the imperative 'mourn most bitterly,' and removed the interpretive expansion 'are grieving over one son,' which is not present in the provided source. Kept the verse ending abrupt with 'but you' to match the source fragment.
translation:
  language: es
  text: Ha sido humillada; llora con gran amargura. Y ahora[a], como todos lamentamos y estamos tristes, como todos estamos afligidos, pero tú
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y ahora, puesto que todos lamentamos y estás triste, porque todos estamos afligidos, pero tú te afliges por un solo hijo».

      '
    reason: Conserva en español la alternativa documentada por el rastro de auditoría inglés, aunque la lectura principal sigue el texto latino revisado y deja el final abrupto.
lexical_decisions:
- source_word: humiliata est
  english_pob_choice: She has been humbled
  chosen_spanish: Ha sido humillada
  alternatives_spanish:
  - Ha sido abatida
  - Ha sido humillada hasta el polvo
  lexicon: humiliar → humillar
  rationale: El latín pasivo indica un estado/resulta-do ya sufrido; en español, «ha sido humillada» conserva el perfecto resultativo sin añadir interpretaciones no presentes. «Abatida» sería posible, pero atenúa el vínculo léxico con humiliata.
- source_word: lugete ualidissime
  english_pob_choice: mourn most bitterly
  chosen_spanish: lamenta con toda intensidad
  alternatives_spanish:
  - llora amargamente
  - plañe con gran amargura
  - lamenta muy amargamente
  lexicon: lugeō → lamentar/llorar
  rationale: El mandato expresa duelo intenso. «Lamenta con toda intensidad» comunica el superlativo/énfasis de ualidissime sin forzar una fórmula demasiado arcaica; se evita «mourn» literal en inglés porque en español «lamentar» es más natural y suficientemente fuerte.
- source_word: lugemus
  english_pob_choice: we all mourn
  chosen_spanish: todos lamentamos
  alternatives_spanish:
  - todos lloramos
  - todos estamos de luto
  lexicon: lugēre → lamentar/estar de duelo
  rationale: Mantiene el plural inclusivo del latín y el tono de duelo colectivo. «Estamos de luto» añade una imagen más específica de la que el texto no obliga; «lamentamos» preserva amplitud semántica.
- source_word: tristes sumus / contristati sumus
  english_pob_choice: we are sad / we are grieved
  chosen_spanish: estamos tristes / estamos afligidos
  alternatives_spanish:
  - estamos apenados / estamos entristecidos
  - somos tristes / hemos sido entristecidos
  lexicon: tristis / contristare
  rationale: Se conserva la progresión afectiva del latín con dos verbos/adjetivos distintos. «Afligidos» recoge mejor contristati sumus que un simple «tristes», mientras «tristes» sigue siendo el equivalente más directo de tristis.
- source_word: tu
  english_pob_choice: but you
  chosen_spanish: pero tú
  alternatives_spanish:
  - y tú
  - sin embargo, tú
  lexicon: tu
  rationale: El latín conserva un giro abrupto que contrasta con el plural precedente. «Pero tú» reproduce bien la ruptura sintáctica y deja intencionalmente el verso abierto, como en el fragmento fuente.
theological_decisions:
- issue: El fragmento termina abruptamente con un contraste dirigido a un interlocutor singular, sin completar la frase en la fuente dada.
  english_pob_reading: but you
  chosen_spanish_reading: pero tú
  alternative_spanish_readings:
  - y tú
  - sin embargo, tú
  rationale: Se conserva la incompletitud textual sin suplir palabras ausentes. Esto respeta el estado del testimonio latino limpiado y la revisión inglesa que dejó el verso en suspensión.
  doctrine_reference: Textual criticism / source fidelity
- issue: El texto habla del lamento y la humillación de una figura femenina colectiva o personificada, sin identificarla explícitamente en este fragmento.
  english_pob_reading: She has been humbled; mourn most bitterly
  chosen_spanish_reading: Ha sido humillada; lamenta con toda intensidad
  alternative_spanish_readings:
  - Ella ha sido humillada; llora amargamente
  - Ha sido abatida; plañe con toda amargura
  rationale: No se introduce identificación doctrinal o histórica adicional. La personificación femenina queda implícita, como en el latín y en la corrección inglesa revisada.
  doctrine_reference: Source-context / personification
translation_notes:
  revision_awareness: La versión española sigue la última revisión inglesa y evita la lectura errónea anterior que convertía el mandato en plural dirigido a una sola persona o expandía el cierre con contenido no atestiguado. También conserva el final abrupto del fragmento, sin completar la frase.
  spanish_consistency_notes:
  - Se mantiene un registro digno y bíblico sin arcaísmos innecesarios.
  - Se prefirió «lamenta»/«lamentamos» para unificar el campo semántico de duelo en español, sin perder el énfasis del latín.
  - No se usó «SEÑOR» ni terminología cristológica ajena, ya que este versículo no contiene esos términos.
  - La puntuación reproduce el contraste y la interrupción del original, terminando en «pero tú» para reflejar el fragmento incompleto.
