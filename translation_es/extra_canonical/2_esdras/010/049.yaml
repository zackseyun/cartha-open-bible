    timestamp: '2026-04-23T19:52:00Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Y he aquí, viste su semejanza: cómo llora por su hijo, y comenzaste a consolarla por lo que había sucedido. Estas cosas te tenían que ser reveladas[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «abiertas».'
    reason: alternative_reading
lexical_decisions:
- source_word: filium luget
  english_pob_choice: how she mourns for her son
  chosen_spanish: cómo llora por su hijo
  alternatives_spanish:
  - cómo está de duelo por su hijo
  - cómo se lamenta por su hijo
  lexicon: filium = 'su hijo'; luget = 'llora', 'está de duelo', 'se lamenta'
  rationale: En este contexto narrativo y afectivo, 'llora' comunica de forma natural el lamento maternal sin perder el peso de duelo del latín luget. 'Está de duelo' es más explícito, pero menos fluido en español; 'se lamenta' es posible, pero algo más abstracto.
- source_word: inchoasti consolare eam
  english_pob_choice: you began to comfort her
  chosen_spanish: comenzaste a consolarla
  alternatives_spanish:
  - empezaste a consolarla
  - iniciaste a consolarla
  lexicon: inchoasti = 'comenzaste'; consolare = 'consolar'
  rationale: Se conserva el inicio de la acción con 'comenzaste'. 'Consolarla' mantiene el objeto femenino directo de eam y reproduce bien el valor afectivo de consolare.
- source_word: his quae contigerunt
  english_pob_choice: concerning what had happened
  chosen_spanish: por lo que había sucedido
  alternatives_spanish:
  - acerca de lo que había ocurrido
  - sobre lo que había acontecido
  lexicon: contigerunt = 'sucedió / ocurrió / aconteció'
  rationale: '''Por lo que había sucedido'' refleja la causa o motivo del consuelo de manera idiomática en español, sin perder el referente a hechos ya acaecidos.'
- source_word: haec erant tibi aperienda
  english_pob_choice: These things had to be revealed to you
  chosen_spanish: Estas cosas tenían que ser reveladas a ti
  alternatives_spanish:
  - Estas cosas debían abrirse ante ti
  - Estas cosas habían de ser reveladas a ti
  lexicon: aperienda (from aperio) = 'reveladas', 'abiertas'
  rationale: Se sigue la revisión auditada que favorece 'reveladas' sobre 'abiertas', porque en este contexto apocalíptico aperienda implica disclosure/divine revelation más que una apertura física. Se mantiene la estructura pasiva con necesidad ('tenían que') para conservar el matiz de obligación/inevitabilidad.
theological_decisions:
- issue: Naturaleza de 'aperienda' en contexto apocalíptico
  english_pob_reading: These things had to be revealed to you.
  chosen_spanish_reading: Estas cosas tenían que ser reveladas a ti.
  alternative_spanish_readings:
  - Estas cosas tenían que abrirse para ti.
  - Estas cosas debían ser abiertas para ti.
  rationale: La revisión del POB ya resolvió que el latín aquí funciona como lenguaje de revelación. En español, 'reveladas' preserva mejor ese sentido teológico de desocultamiento divino que 'abiertas', que suena más literal y menos técnico.
  doctrine_reference: Revelación divina / apocalíptica
translation_notes:
  revision_awareness: La nota de revisión del POB cambió explícitamente la traducción inglesa de 'opened' a 'revealed' por la fuerza apocalíptica de aperienda; la versión española sigue esa decisión auditada. No se introducen cambios adicionales respecto al sentido confirmado por el control de concordancia alta.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto en contextos donde aparezca el nombre divino; aquí no aparece ningún teónimo.
  - '''he aquí'' conserva el tono discursivo del inglés ''behold'' y admite una variante breve en nota.'
  - '''reveladas'' se usa en femenino plural para concordar con ''Estas cosas''.'
