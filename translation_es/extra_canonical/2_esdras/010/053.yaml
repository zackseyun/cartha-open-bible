base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/053.yaml
  text: Therefore I told you to come into the field[a], where there is no foundation of a building.
  footnotes:
  - marker: a
    text: Or 'into the countryside'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:49:32Z'
    unchanged: false
    changes_summary: Changed 'any building' to 'a building' for closer alignment with the singular Latin 'aedificii' and more natural formal English.
translation:
  language: es
  text: Por eso te dije que vinieras al campo[a], donde no hay cimiento de un edificio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a la campiña'.
    reason: Preserva la alternativa documentada en inglés, 'into the countryside', sin introducir el matiz no atestiguado de 'campo abierto'.
lexical_decisions:
- source_word: propterea
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por lo tanto
  - Por consiguiente
  lexicon: Latin propterea
  rationale: Expresa consecuencia directa y natural en español sin sobrecargar el registro; mantiene la relación lógica del pasaje.
- source_word: dixi tibi
  english_pob_choice: I told you
  chosen_spanish: te dije
  alternatives_spanish:
  - te había dicho
  - te indiqué
  lexicon: Latin dicere
  rationale: La forma simple comunica la declaración previa de manera directa y fiel al latín, sin introducir matices de anterioridad no requeridos por el texto.
- source_word: ut venires
  english_pob_choice: to come
  chosen_spanish: que vinieras
  alternatives_spanish:
  - a venir
  - para que vinieras
  lexicon: Latin ut + subjunctive
  rationale: En español, 'que vinieras' reproduce de manera natural la subordinación final/instructiva del latín, evitando un calco duro.
- source_word: in agrum
  english_pob_choice: into the field
  chosen_spanish: al campo
  alternatives_spanish:
  - al campo abierto
  - a la tierra
  lexicon: Latin ager
  rationale: El contexto inmediato y la revisión auditada favorecen 'campo' frente a 'countryside'; 'al campo' conserva la ubicación concreta del relato y la conexión con el lugar ya mencionado.
- source_word: ubi non est fundamentum
  english_pob_choice: where there is no foundation
  chosen_spanish: donde no hay fundamento
  alternatives_spanish:
  - donde no existe cimiento
  - donde no hay cimiento
  lexicon: Latin fundamentum
  rationale: '''Fundamento'' conserva la fuerza de base o soporte literal del latín; ''cimiento'' sería posible, pero ''fundamento'' resulta más cercano al término latino y más amplio en español.'
- source_word: aedificii
  english_pob_choice: of a building
  chosen_spanish: de edificio
  alternatives_spanish:
  - de una construcción
  - de una casa
  lexicon: Latin aedificium
  rationale: '''Edificio'' mantiene el singular del latín y la imagen de una estructura construida; en español, la ausencia de artículo indefinido después de ''fundamento'' suena más natural y sigue la cadencia del texto.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrigió la expansión 'countryside' por 'field' y la lectura singular de 'aedificii' como 'a building'; el español sigue esas decisiones y evita ampliar el alcance geográfico del pasaje.
  spanish_consistency_notes:
  - Se conservó 'campo' para mantener la correspondencia con el latín agrum y con la ubicación concreta del contexto inmediato.
  - Se mantuvo 'fundamento' en singular para reflejar 'fundamentum aedificii' sin añadir elementos no presentes en el texto.
  - La nota al pie ofrece una alternativa natural ('al campo abierto') sin desplazar el sentido principal.
