    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y he venido[a], como ves, a este campo. Tengo intención de no volver más a la ciudad, sino quedarme aquí; y no comeré ni beberé, sino que lloraré y ayunaré sin cesar hasta morir.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y estoy pensando ahora que no volveré más a la ciudad, sino que me quedaré aquí».'
    reason: alternative_reading
lexical_decisions:
- source_word: ueni / veni
  english_pob_choice: And I have come
  chosen_spanish: Y he venido
  alternatives_spanish:
  - Y vengo
  - Y he llegado
  lexicon: venir
  rationale: El latín perfecto expresa una llegada ya realizada; «he venido» conserva ese valor con naturalidad en español. «He llegado» sería posible, pero desplaza el foco desde el movimiento hacia la llegada como estado.
- source_word: cogito iam non reuerti ... sed hic consistere
  english_pob_choice: I intend to return to the city no more, but to stay here
  chosen_spanish: Tengo intención de no volver más a la ciudad, sino quedarme aquí
  alternatives_spanish:
  - Ya no pienso volver a la ciudad, sino quedarme aquí
  - He resuelto no volver más a la ciudad, sino quedarme aquí
  lexicon: cogito + infinitivo
  rationale: El contexto y la revisión auditada indican que `cogito` con infinitivo expresa resolución o propósito, no simple reflexión. «Tengo intención» comunica bien esa fuerza volitiva sin sobrerrepresentarla. «No volver más» refleja `iam non reuerti` con el sentido de 'no volver ya/no volver más'.
- source_word: manducabo
  english_pob_choice: I will neither eat
  chosen_spanish: no comeré
  alternatives_spanish:
  - no he de comer
  - no voy a comer
  lexicon: manduco
  rationale: '`manducabo` es comer en sentido ordinario; «no comeré» es directo y fiel. Se evita una perífrasis innecesaria.'
- source_word: bibam
  english_pob_choice: nor drink
  chosen_spanish: ni beberé
  alternatives_spanish:
  - ni he de beber
  - ni voy a beber
  lexicon: bibo
  rationale: Correspondencia simple con el futuro latino. La coordinación negativa en español reproduce el paralelismo del original.
- source_word: sine intermissione lugere et ieiunare
  english_pob_choice: without ceasing I will mourn and fast
  chosen_spanish: lloraré y ayunaré sin cesar
  alternatives_spanish:
  - guardar luto y ayunaré sin cesar
  - me lamentaré y ayunaré sin cesar
  lexicon: lugere / ieiunare
  rationale: '`lugere` puede ser ''llorar'', ''lamentarse'' o ''guardar luto''. En este contexto penitencial y de duelo, «lloraré» mantiene sencillez y fuerza emocional, y la frase «sin cesar» conserva `sine intermissione`.'
theological_decisions:
- issue: Forma de expresar la resolución de no volver a la ciudad
  english_pob_reading: I intend to return to the city no more, but to stay here
  chosen_spanish_reading: Tengo intención de no volver más a la ciudad, sino quedarme aquí
  alternative_spanish_readings:
  - He resuelto no volver más a la ciudad, sino quedarme aquí
  - No pienso volver más a la ciudad, sino quedarme aquí
  rationale: La elección evita debilitar la determinación del hablante. El latín presenta una decisión firme; en español se comunica como propósito decidido, sin convertirlo en mera suposición.
  doctrine_reference: none
- issue: Sentido de ayuno y duelo continuo
  english_pob_reading: but without ceasing I will mourn and fast until I die
  chosen_spanish_reading: sino que lloraré y ayunaré sin cesar hasta morir
  alternative_spanish_readings:
  - sino que me lamentaré y ayunaré sin cesar hasta morir
  - sino que guardaré luto y ayunaré sin cesar hasta morir
  rationale: No se introduce una interpretación doctrinal adicional; se preserva el acto de duelo-ascetismo tal como está en el texto. «Hasta morir» refleja con sobriedad `usque dum moriar`.
  doctrine_reference: none
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que corrigió la fuerza de `cogito iam non reuerti` de una lectura tentativa ('estoy pensando') a una lectura decisiva ('tengo intención / he resuelto'). La versión española refleja esa resolución firme y conserva el valor de `iam non` como 'no volver más'.
  spanish_consistency_notes:
  - Se mantiene «Y he venido» para el perfecto latino `ueni`, sin forzar presente narrativo.
  - Se usa «ciudad» para `ciuitate` de manera consistente y no se espiritualiza el lugar.
  - La negación coordinada («no comeré ni beberé») reproduce el paralelismo del original.
  - «Sin cesar» conserva la idea de continuidad ininterrumpida del latín `sine intermissione`.
