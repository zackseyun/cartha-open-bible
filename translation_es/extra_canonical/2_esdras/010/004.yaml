base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/004.yaml
  text: And I have come[a], as you see, into this field. I intend to return to the city no more, but to stay here; and I will neither eat nor drink, but without ceasing I will mourn and fast until I die.”
  footnotes:
  - marker: a
    text: Or 'I am thinking now that I will not return to the city, but will stay here'.
    reason: previous_rendering
  revision_pass:
