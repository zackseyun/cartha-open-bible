translation:
  language: es
  text: Y he aquí, yacía allí como un hombre muerto, y mi entendimiento me había sido quitado; y él tomó mi mano derecha, me fortaleció y me puso de pie.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et ecce
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mirad
  - Y ved
  lexicon: Interjección narrativa de atención
  rationale: Conserva el valor de sorpresa y transición del latin/ecclesiástico, sin volverlo demasiado arcaico; «he aquí» es natural en registro bíblico español y corresponde bien al énfasis de la fórmula.
- source_word: positus ut mortuus
  english_pob_choice: I was lying there like a dead man
  chosen_spanish: yacía allí como un hombre muerto
  alternatives_spanish:
  - estaba tendido allí como muerto
  - estaba allí como un muerto
  lexicon: estado corporal comparativo
  rationale: «Yacía» reproduce con más naturalidad que «estaba puesto» la imagen de estar echado/inmóvil, y «como un hombre muerto» mantiene el símil explícito del texto y del inglés POB.
- source_word: intellectus meus alienatus erat
  english_pob_choice: my understanding had been taken away
  chosen_spanish: mi entendimiento me había sido quitado
  alternatives_spanish:
  - mi entendimiento se había apartado de mí
  - mi comprensión me había sido arrebatada
  lexicon: intelecto/entendimiento
  rationale: «Entendimiento» conserva el alcance cognitivo del latino intellectus. «Me había sido quitado» sigue de cerca la pasiva con sentido de privación que refleja el inglés POB «had been taken away».
- source_word: tenuit dexteram meam
  english_pob_choice: he took my right hand
  chosen_spanish: él tomó mi mano derecha
  alternatives_spanish:
  - él asió mi mano derecha
  - él tomó mi diestra
  lexicon: gesto de sostén
  rationale: «Tomó mi mano derecha» es claro y fiel. «Diestra» sería posible, pero «mano derecha» es más transparente para lectura pública moderna sin perder el sentido.
- source_word: confortauit me
  english_pob_choice: and strengthened me
  chosen_spanish: me fortaleció
  alternatives_spanish:
  - me confortó
  - me dio fuerzas
  lexicon: fortalecimiento
  rationale: «Fortaleció» corresponde directamente al verbo latino y mantiene la fuerza física y anímica del contexto. «Confortó» en español puede sonar a consuelo más que a vigor.
- source_word: statuit me super
  english_pob_choice: and set me on my feet
  chosen_spanish: y me puso de pie
  alternatives_spanish:
  - y me colocó en pie
  - y me levantó
  lexicon: erección/restauración
  rationale: El latino está truncado al final, pero el sentido evidente es colocar/restablecer de pie; «me puso de pie» refleja bien la restauración corporal que da el inglés POB.
theological_decisions:
- issue: Restauración física frente a simple ánimo interior
  english_pob_reading: he took my right hand and strengthened me and set me on my feet
  chosen_spanish_reading: él tomó mi mano derecha, me fortaleció y me puso de pie
  alternative_spanish_readings:
  - él me consoló y me levantó
  - él me sostuvo y me rehabilitó
  rationale: La secuencia del original presenta una recuperación corporal y funcional, no solo consuelo emocional. Por eso se mantiene un lenguaje concreto de sostén, fortalecimiento y puesta en pie.
  doctrine_reference: Narrativa de restauración/recuperación en contexto visionario; no se asigna doctrina sistemática específica.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el texto latino limpio y la traducción inglesa POB; no se observan revisiones aplicadas ni tensiones textuales adicionales en el expediente. Se preservó la estructura narrativa y la progresión de la recuperación corporal.
  spanish_consistency_notes:
  - Se usó «Y he aquí» para mantener el tono bíblico sin caer en un arcaísmo excesivo.
  - «Entendimiento» se mantuvo uniforme para intellectus, evitando alternar con «comprensión» sin necesidad.
  - Se prefirió «mano derecha» sobre «diestra» por claridad pública en español contemporáneo.
