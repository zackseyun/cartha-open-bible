translation:
  language: es
  text: «¿Dónde está Uriel, el ángel, que vino a mí al principio? Pues fue él quien me hizo entrar en este gran desconcierto mental[a], y mi fin se volvió corrupción, y mi oración, un reproche». Y, mientras yo hablaba estas cosas, he aquí que vino a mí
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El latín «esta abundancia de este éxtasis de la mente» es torpe pero enérgico. El sentido es que Esdras fue llevado a un estado visionario y abrumador de la mente, no solo a una confusión ordinaria. O: «me hizo entrar en esta abundancia de este éxtasis de la mente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Vbi est
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está
  alternatives_spanish:
  - ¿Dónde se halla
  - ¿Dónde está él
  lexicon: ubi
  rationale: Interrogación locativa directa y natural en español; conserva la inmediatez del lamento sin añadir matiz extra.
- source_word: Uriel angelus
  english_pob_choice: Uriel the angel
  chosen_spanish: Uriel, el ángel[a]
  alternatives_spanish:
  - Uriel, el ángel
  - el ángel Uriel
  lexicon: angelus
  rationale: Mantiene el nombre propio y el sustantivo con artículo; se conserva la relación appositiva del latín. El marcador nota la posible lectura alternativa de énfasis en el oficio angélico.
- source_word: qui a principio uenit ad me
  english_pob_choice: who came to me at the beginning
  chosen_spanish: que vino a mí al principio
  alternatives_spanish:
  - que vino a mí desde el principio
  - que al principio vino a mí
  lexicon: venio
  rationale: «Al principio» reproduce el inicio temporal sin forzar una precisión mayor que la del latín; «vino a mí» sigue el movimiento directo del original.
- source_word: quoniam ipse me fecit uenire
  english_pob_choice: For it was he who brought me
  chosen_spanish: Pues fue él quien me hizo entrar
  alternatives_spanish:
  - Pues fue él quien me trajo
  - Porque fue él quien me hizo venir
  lexicon: facere + venire
  rationale: 'El latín es causativo: no solo «vino», sino que me hizo venir/entrar en cierto estado. «Me hizo entrar» conserva la fuerza causativa sin sonar artificial en español.'
- source_word: in multitudinem excessus mentis huius
  english_pob_choice: into this great bewilderment of mind
  chosen_spanish: en esta gran turbación de la mente
  alternatives_spanish:
  - en esta gran exaltación de la mente
  - en este gran éxtasis de la mente
  lexicon: multitudo + excessus mentis
  rationale: Se evita «éxtasis» por su asociación positiva en español moderno, aunque el trasfondo de ἔκστασις/excessus permanece. «Turbación de la mente» comunica la alteración intensa y el sentido de descolocación.
- source_word: et factus est finis meus in corruptione
  english_pob_choice: and my end has become corruption
  chosen_spanish: y mi fin se volvió corrupción
  alternatives_spanish:
  - y mi final se convirtió en corrupción
  - y mi término ha quedado en corrupción
  lexicon: finis + corruptio
  rationale: Conserva la fuerza escatológica de «finis» y el resultado negativo de «corruptio» con un español claro y fiel.
- source_word: et oratio mea in inproperium
  english_pob_choice: and my prayer a reproach
  chosen_spanish: y mi oración, un reproche
  alternatives_spanish:
  - y mi oración, un oprobio
  - y mi oración, una vergüenza
  lexicon: oratio + improperium
  rationale: «Reproche» expresa la humillación/afrenta implícita sin suavizar el término; se mantiene la asimetría nominal del latín.
- source_word: Et cum essem loquens ego haec
  english_pob_choice: And while I was speaking these things
  chosen_spanish: Y, mientras yo hablaba estas cosas
  alternatives_spanish:
  - Y, mientras hablaba yo estas cosas
  - Y, mientras yo decía estas cosas
  lexicon: cum essem loquens
  rationale: Estructura temporal fluida y fiel; «estas cosas» preserva la referencia deíctica del original.
- source_word: ecce uenit ad me
  english_pob_choice: behold, there came to me
  chosen_spanish: he aquí que vino a mí
  alternatives_spanish:
  - y he aquí que vino a mí
  - he aquí, vino a mí
  lexicon: ecce + venio
  rationale: Fórmula tradicional y comprensible que conserva el golpe narrativo del latín.
theological_decisions:
- issue: Naturaleza de «excessus mentis huius» / estado visionario
  english_pob_reading: great bewilderment of mind; not merely ordinary confusion, but an overwhelming visionary state
  chosen_spanish_reading: gran turbación de la mente; no simple confusión ordinaria, sino una alteración intensa de la conciencia
  alternative_spanish_readings:
  - gran éxtasis de la mente
  - gran exaltación de la mente
  - gran confusión de la mente
  rationale: La nota inglesa advierte que el término es fuerte y apunta a un estado visionario perturbador. En español, «turbación de la mente» comunica alteración intensa sin cargarlo de la connotación positiva de «éxtasis».
  doctrine_reference: No doctrinal claim beyond preserving the visionary/psychological force of the text.
- issue: Causalidad atribuida a Uriel en el estado de Ezra
  english_pob_reading: it was he who brought me
  chosen_spanish_reading: fue él quien me hizo entrar
  alternative_spanish_readings:
  - fue él quien me trajo
  - fue él quien me hizo venir
  rationale: El latín expresa causación directa. Mantenerla evita desplazar el sentido hacia una mera llegada voluntaria de Ezra.
  doctrine_reference: Preserva la agencia narrativa del ángel según el relato.
- issue: Sentido de «oratio mea in inproperium»
  english_pob_reading: my prayer a reproach
  chosen_spanish_reading: mi oración, un reproche
  alternative_spanish_readings:
  - mi oración, un oprobio
  - mi oración, una afrenta
  rationale: El latín señala que la oración queda expuesta a deshonra o censura. «Reproche» retiene la idea de vergüenza pública y juicio negativo sin añadir una carga doctrinal ajena.
  doctrine_reference: No doctrinal claim; maintains the semantic range of the reproach/shame motif.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que corrigió el pasaje previo desde una lectura demasiado literal de «excessus mentis» hacia «great bewilderment of mind». La versión española evita tanto el calco de «éxtasis» con sentido alegre como una traducción que suavice el fuerte impacto visionario. También se preservó la estructura causativa de «fecit uenire» y el cierre narrativo abrupto de «ecce uenit ad me».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando no aparece el Tetragrámaton en este versículo; por tanto no se usa aquí.
  - «Ángel» se conserva como sustantivo común, sin mayúscula técnica, siguiendo el latín y la economía del pasaje.
  - Se usó puntuación española con comillas angulares para la cita principal y coma de inciso en «mi oración, un reproche».
  - «Turbación de la mente» se eligió para evitar la falsa equivalencia de «éxtasis» con experiencia gozosa en español moderno.
