  yaml_path: translation/extra_canonical/2_esdras/010/031.yaml
  text: and said to me, “What is the matter with you? And why are you troubled? And why are your understanding and the perception of your heart troubled?”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:49:14Z'
    unchanged: false
    changes_summary: Smoothed the final clause to avoid awkward repetition and better reflect the coordinated Latin subjects ('your understanding and the perception of your heart') with a plural verb.
translation:
  language: es
  text: 'y me dijo: «¿Qué te pasa? ¿Y por qué estás turbado? ¿Y por qué están turbados tu entendimiento y la percepción de tu corazón?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Quid tibi est
  english_pob_choice: What is the matter with you?
  chosen_spanish: ¿Qué te pasa?
  alternatives_spanish:
  - ¿Qué te ocurre?
  - ¿Qué tienes?
  lexicon: quid tibi est
  rationale: La pregunta latina expresa estado o condición, no mera posesión. «¿Qué te pasa?» comunica de manera natural la inquietud o alteración personal sin añadir interpretación.
- source_word: conturbaris
  english_pob_choice: you are troubled
  chosen_spanish: estás turbado
  alternatives_spanish:
  - estás perturbado
  - estás inquieto
  lexicon: conturbare
  rationale: «Turbado» conserva la idea de desorden interior y mantiene la cercanía formal con el latín. «Perturbado» es posible, pero suena más psicológico; «inquieto» suaviza demasiado la fuerza del verbo.
- source_word: intellectus
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - inteligencia
  - mente
  lexicon: intellectus
  rationale: «Entendimiento» es el equivalente más directo y bíblicamente reconocible para intellectus, y conserva el matiz de facultad cognitiva sin reducirlo a capacidad académica.
- source_word: sensus cordis tui
  english_pob_choice: the perception of your heart
  chosen_spanish: la percepción de tu corazón
  alternatives_spanish:
  - el sentir de tu corazón
  - la sensación de tu corazón
  lexicon: sensus + cor
  rationale: 'Se mantiene la combinación poco común del latín para no borrar la tensión semántica: no es solo emoción, sino la percepción o aprehensión interior vinculada al corazón. «Percepción» refleja bien sensus sin reemplazarlo por un término más devocional.'
theological_decisions:
- issue: Coordinación final con sujetos plurales
  english_pob_reading: your understanding and the perception of your heart are troubled
  chosen_spanish_reading: están turbados tu entendimiento y la percepción de tu corazón
  alternative_spanish_readings:
  - están turbados tu entendimiento y el sentir de tu corazón
  - se turban tu entendimiento y la percepción de tu corazón
  rationale: La revisión inglesa corrigió la cláusula final para reflejar que el latín coordina dos sujetos. El español conserva esa coordinación y usa plural verbal para no perder el ajuste sintáctico del texto fuente.
  doctrine_reference: No aplica; decisión sintáctica y semántica del pasaje.
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada para pasar de una construcción con repetición pesada a una coordinación más fiel al latín: «your understanding and the perception of your heart». El español sigue esa lectura revisada y evita singularizar indebidamente el segundo miembro.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y actual, evitando calcos innecesarios.
  - «Turbado» se usó de forma consistente para conturbaris, preservando el tono del latín.
  - No se introdujo «Señor» ni otra terminología no presente en el segmento.
  - La pregunta inicial se traduce de modo idiomático, pero sin añadir contenido inexistente en el original.
