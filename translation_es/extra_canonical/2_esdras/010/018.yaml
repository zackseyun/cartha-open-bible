  source_alignment_summary: 'El borrador español preserva fielmente el sentido del latín: ''non faciam'' = ''No lo haré'', ''neque ingrediar civitatem'' = ''ni entraré en la ciudad'', y ''sed hic moriar'' = ''aquí moriré''. También refleja bien la estructura del inglés auditado, incluida la resolución enfática de la mujer.'
