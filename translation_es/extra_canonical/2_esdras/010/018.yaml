translation:
  language: es
  text: 'Pero ella me dijo: «No lo haré, ni entraré en la ciudad; aquí moriré».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: non faciam
  english_pob_choice: I will not do it
  chosen_spanish: No lo haré
  alternatives_spanish:
  - No lo haré así
  - No lo haré de ese modo
  lexicon: Lat. facere
  rationale: El latín usa facere de manera general para una acción ya implícita en el contexto; el inglés POB la expresa con un objeto neutro ('it'). En español, 'lo' conserva esa referencia implícita sin añadir contenido.
- source_word: neque ingrediar civitatem
  english_pob_choice: nor will I go into the city
  chosen_spanish: ni entraré en la ciudad
  alternatives_spanish:
  - ni iré a la ciudad
  - ni ingresaré en la ciudad
  lexicon: Lat. ingredi + civitas
  rationale: '''Ingrediar'' indica entrar/ingresar; ''entraré en la ciudad'' es natural y directo en español. Se evita ''iré a la ciudad'' porque debilita el matiz de entrada física que trae el latín.'
- source_word: hic moriar
  english_pob_choice: here I will die
  chosen_spanish: aquí moriré
  alternatives_spanish:
  - moriré aquí
  - aquí será donde muera
  lexicon: Lat. hic + mori
  rationale: La construcción latina es breve y enfática; 'aquí moriré' preserva esa concisión y el orden natural del español.
theological_decisions:
- issue: Ninguna tensión doctrinal explícita; declaración de determinación final
  english_pob_reading: I will not do it, nor will I go into the city, but here I will die.
  chosen_spanish_reading: No lo haré, ni entraré en la ciudad; aquí moriré.
  alternative_spanish_readings:
  - No lo haré, ni iré a la ciudad; aquí moriré.
  rationale: El versículo es una afirmación narrativa de voluntad y resolución, sin carga doctrinal adicional. Se mantiene el tono directo del testimonio sin suavizarlo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente informó que no hubo cambios necesarios y el cotejo interlingüístico mostró alta concordancia; por ello se mantiene una traducción breve, literal en lo necesario y idiomática en español.
  spanish_consistency_notes:
  - Se conserva el registro narrativo directo con comillas españolas y dos puntos tras el verbo introductorio.
  - Se mantiene la referencia implícita de 'it' con el pronombre neutro 'lo' para evitar sobreexplicación.
  - No se introducen términos teológicos ajenos al texto latino breve.
