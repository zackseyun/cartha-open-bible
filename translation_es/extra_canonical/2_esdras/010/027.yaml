base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/027.yaml
  text: And behold[a], the woman no longer appeared to me, but a city was being built, and a place with great foundations was being revealed. Then I was afraid and cried out with a loud voice and said,
  footnotes:
  - marker: a
    text: Or 'and a place was being revealed from great foundations.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:49:11Z'
    unchanged: false
    changes_summary: Removed 'And I looked' since it is not in the Latin, and revised 'a place of great foundations' to 'a place with great foundations' for more natural English while preserving the sense.
translation:
  language: es
  text: 'Y he aquí, la mujer ya no se me aparecía, sino que se edificaba una ciudad, y se revelaba un lugar con grandes cimientos. Entonces tuve miedo y clamé a gran voz y dije:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: mulier
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  - la mujer [a]
  lexicon: mulier
  rationale: El latín dice simplemente 'mulier', que en este contexto visionario se corresponde de forma directa con 'mujer'. No hay base en el texto para especificar 'esposa'.
- source_word: conparebat mihi
  english_pob_choice: no longer appeared to me
  chosen_spanish: ya no aparecía ante mí
  alternatives_spanish:
  - ya no se me aparecía
  - ya no aparecía para mí
  lexicon: apparere
  rationale: La idea es de cesación de visibilidad/aparición en la visión; 'ante mí' conserva la relación perceptiva sin volverlo demasiado idiomático en exceso.
- source_word: civitas aedificabatur
  english_pob_choice: a city was being built
  chosen_spanish: se estaba edificando una ciudad
  alternatives_spanish:
  - una ciudad estaba siendo construida
  - se construía una ciudad
  lexicon: aedificare
  rationale: '''Edificar'' mantiene el matiz de construir una ciudad, con un registro digno y natural en español bíblico contemporáneo.'
- source_word: locus demonstrabatur
  english_pob_choice: a place ... was being revealed
  chosen_spanish: se estaba revelando un lugar
  alternatives_spanish:
  - se mostraba un lugar
  - un lugar era revelado
  lexicon: demonstrare
  rationale: '''Demostrar'' en latín aquí tiene el sentido de ''mostrar/hacer visible''; ''revelar'' preserva mejor la acción de hacer aparecer algo en la visión.'
- source_word: de fundamentis magnis
  english_pob_choice: with great foundations
  chosen_spanish: con grandes cimientos
  alternatives_spanish:
  - de grandes cimientos
  - con fundamentos grandes
  lexicon: fundamentum
  rationale: Sigo la revisión auditada que entiende 'de' como rasgo descriptivo del lugar, no como origen. 'Con grandes cimientos' reproduce esa cualidad de modo natural en español.
- source_word: timui
  english_pob_choice: I was afraid
  chosen_spanish: tuve miedo
  alternatives_spanish:
  - temí
  - me asusté
  lexicon: timere
  rationale: '''Tuve miedo'' expresa claramente el estado emocional narrado, sin sobrecargar el registro.'
- source_word: clamavi voce magna
  english_pob_choice: cried out with a loud voice
  chosen_spanish: clamé con voz grande
  alternatives_spanish:
  - grité con voz fuerte
  - clamé en alta voz
  lexicon: clamare
  rationale: '''Clamé'' conserva la fuerza solemne de ''clamavi''; ''voz grande'' sigue de cerca el latín y mantiene el carácter bíblico del giro.'
theological_decisions:
- issue: La frase 'de fundamentis magnis' puede leerse como origen ('desde grandes cimientos') o descripción ('con/de grandes cimientos').
  english_pob_reading: a place with great foundations was being revealed
  chosen_spanish_reading: un lugar con grandes cimientos
  alternative_spanish_readings:
  - un lugar de grandes cimientos
  - un lugar desde grandes cimientos
  rationale: La revisión más reciente del audit trail concluye que 'de' aquí funciona como genitivo descriptivo/relacional en el latín de traducción. Por eso el español debe describir la cualidad del lugar, no el origen de la revelación.
  doctrine_reference: Principio de precisión semántica en textos apocalípticos; fidelidad a la forma de la visión sin añadir relaciones espaciales no atestiguadas.
translation_notes:
  revision_awareness: He seguido la última revisión auditada que eliminó el inglés 'And I looked' por no estar en el latín y que reinterpretó 'de fundamentis magnis' como rasgo descriptivo del lugar. En español no se introduce esa cláusula omitida ni se reproduce una lectura separativa de 'de'.
  spanish_consistency_notes:
  - He mantenido el tono narrativo visionario y la secuencia de acciones del latín.
  - He usado 'Y he aquí' para reproducir el arranque enfático equivalente a 'ecce'.
  - No he introducido una nota al pie porque el texto español ya incorpora la lectura preferida y no requiere marcador textual.
