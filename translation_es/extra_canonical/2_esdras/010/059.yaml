  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: futura est manebis hic, Et ostendet tibi altissimus eas uisiones somniorum quae faciet altissimus his qui habitant super terram in nouissimis diebus. Et dormiui illam noctem et aliam sicut praecepit mihi.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/059.yaml
  text: and the Most High will show you those dream-visions that the Most High will bring about for those who dwell on the earth in the last days.”[a]
  footnotes:
  - marker: a
    text: Or 'that the Most High will do for those who dwell'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:49:36Z'
    unchanged: false
    changes_summary: Revised 'of what ... will do to those' to 'that ... will bring about for those' to better reflect the Latin construction and avoid implying hostile action toward the earth-dwellers. Kept the repeated 'the Most High' and 'dream-visions.'
translation:
  language: es
  text: el Altísimo te mostrará aquellas visiones de sueño[a] que el Altísimo hará realidad para los que habitan sobre la tierra en los últimos días. Y dormí aquella noche y otra, tal como me lo mandó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Visiones de sueño» traduce de modo bastante literal el latín uisiones somniorum; también puede entenderse como «visiones en sueños».
    reason: alternative_reading
lexical_decisions:
- source_word: Altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Altísimo Dios
  lexicon: theological title
  rationale: La fórmula española «el Altísimo» es natural, reverente y conserva el título divino sin sustituirlo por un término más explicativo que el latín no exige.
- source_word: uisiones somniorum
  english_pob_choice: those dream-visions
  chosen_spanish: aquellas visiones de sueño
  alternatives_spanish:
  - aquellas visiones de los sueños
  - esas visiones soñadas
  lexicon: vision / dream
  rationale: «Visiones de sueño» mantiene la relación genitiva del latín entre visiones y sueños, sin forzar un giro idiomático que borre el matiz visionario.
- source_word: faciet
  english_pob_choice: will bring about
  chosen_spanish: hará acontecer
  alternatives_spanish:
  - realizará
  - llevará a cabo
  lexicon: do / bring about
  rationale: En este contexto apocalíptico, el verbo debe expresar que Dios ejecutará o hará suceder eventos, no solo que «hará» algo en sentido genérico. «Hará acontecer» conserva esa fuerza de producción de hechos.
- source_word: his qui habitant super terram
  english_pob_choice: for those who dwell on the earth
  chosen_spanish: para los que habitan sobre la tierra
  alternatives_spanish:
  - para los que viven sobre la tierra
  - a los que habitan en la tierra
  lexicon: dative of reference / apocalyptic formula
  rationale: Se conserva la fórmula apocalíptica con «habitan sobre la tierra», que refleja bien el latín y evita interpretar indebidamente el dativo como si indicara mero beneficio.
theological_decisions:
- issue: Repetición de «el Altísimo»
  english_pob_reading: the Most High ... the Most High
  chosen_spanish_reading: el Altísimo ... el Altísimo
  alternative_spanish_readings:
  - Dios ... el Altísimo
  - el Altísimo ... Dios
  rationale: Se mantiene la repetición del original y del POB inglés, porque la reiteración subraya al mismo agente divino en ambas cláusulas y evita suavizar el paralelismo.
  doctrine_reference: Divine agency in apocalyptic revelation
- issue: Relación entre las visiones y lo que Dios hará
  english_pob_reading: those dream-visions that the Most High will bring about for those who dwell on the earth in the last days
  chosen_spanish_reading: aquellas visiones de sueño que el Altísimo hará acontecer para los que habitan sobre la tierra en los últimos días
  alternative_spanish_readings:
  - aquellas visiones de sueño que el Altísimo realizará para los que habitan sobre la tierra en los últimos días
  - aquellas visiones de sueño acerca de lo que el Altísimo hará
  rationale: La redacción evita convertir las visiones en el objeto de la acción divina; más bien, Dios hace acontecer los hechos mostrados en ellas. Esto sigue la revisión auditada del inglés POB y respeta la construcción del latín.
  doctrine_reference: Apocalyptic revelation and divine sovereignty
translation_notes:
  revision_awareness: Esta versión sigue la revisión más reciente del inglés POB, que corrigió la lectura anterior para entender que el Altísimo hará acontecer los hechos mostrados en las visiones, no que las visiones sean el objeto de una acción mal formulada. Se mantuvo la repetición de «el Altísimo» y la referencia apocalíptica a «los últimos días».
  spanish_consistency_notes:
  - Se usa «Altísimo» como título divino coherente con el latín y con el estándar del proyecto para אלֹהִים/θεός cuando aparece como nombre/título de Dios.
  - Se preserva la fórmula apocalíptica «los que habitan sobre la tierra» para mantener el registro y el alcance universal del pasaje.
  - «Visiones de sueño» evita introducir una interpretación más fuerte de la necesaria y permite la alternativa semántica indicada en la nota.
