base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/010/047.yaml
  text: And as for what she said to you[a], ‘I nourished him with toil,’ this was the dwelling of Jerusalem.
  footnotes:
  - marker: a
    text: Or 'the dwelling of Jerusalem'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:49:27Z'
    unchanged: false
    changes_summary: Adjusted 'her saying' to the more natural and literal 'what she said,' and changed 'dwelling in Jerusalem' to 'dwelling of Jerusalem' to reflect the source more closely.
translation:
  language: es
  text: 'Y en cuanto a lo que te dijo: «Yo lo crié con trabajo», esta era la habitación[a] de Jerusalén.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, 'la condición de estar habitada Jerusalén'; aquí 'habitación' no se refiere a un edificio, sino al hecho o estado de habitar/residir.
    reason: Aclaración semántica de 'habitatio' para evitar que el español sugiera una estructura física.
lexical_decisions:
- source_word: nutrivi eum
  english_pob_choice: I nourished him
  chosen_spanish: yo lo crié
  alternatives_spanish:
  - yo lo alimenté
  - yo lo mantuve
  lexicon: nutrir / criar
  rationale: El latín `nutrivi` expresa dar sustento y crianza; en español, «crié» conserva la idea de cuidado prolongado con sustento, sin reducirlo solo a alimento puntual.
- source_word: cum labore
  english_pob_choice: with toil
  chosen_spanish: con trabajo
  alternatives_spanish:
  - con fatiga
  - con esfuerzo
  lexicon: labor / trabajo
  rationale: '`labore` tiene fuerza de esfuerzo penoso. «Con trabajo» es natural en español y mantiene la idea de esfuerzo duro sin añadir una interpretación más fuerte que el texto.'
- source_word: haec erat habitatio Hierusalem
  english_pob_choice: this was the dwelling of Jerusalem
  chosen_spanish: esta era la morada de Jerusalén
  alternatives_spanish:
  - esta era la habitación de Jerusalén
  - esta era la residencia de Jerusalén
  lexicon: habitatio
  rationale: '`habitatio` refiere al estado o condición de habitar, no a un edificio. «Morada» es más natural que una traducción mecánica y conserva la referencia a residencia/inhabitación de Jerusalén.'
- source_word: Hierusalem
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Sión
  lexicon: topónimo
  rationale: Se conserva el topónimo usual en español sin alterar el referente geográfico e histórico del texto.
theological_decisions:
- issue: Sentido de `habitatio` como estado de habitar, no como construcción
  english_pob_reading: this was the dwelling of Jerusalem
  chosen_spanish_reading: esta era la morada de Jerusalén
  alternative_spanish_readings:
  - esta era la residencia de Jerusalén
  - esta era la inhabitación de Jerusalén
  rationale: La frase describe la condición de Jerusalén como lugar habitado. «Morada» evita la confusión de entender un edificio propiedad de Jerusalén y mantiene el sentido de residencia/estado de habitar.
  doctrine_reference: No doctrinal issue; lexical/semantic clarification
- issue: Atribución de la frase introducida por 'what she said to you'
  english_pob_reading: what she said to you
  chosen_spanish_reading: lo que te dijo
  alternative_spanish_readings:
  - lo que ella te dijo
  - su dicho para ti
  rationale: La lectura inglesa ya resuelve el sentido impersonal de la construcción; en español, «lo que te dijo» es natural, literal y evita recargar el pasaje con un pronombre explícito innecesario.
  doctrine_reference: No doctrinal issue; syntactic clarity
translation_notes:
  revision_awareness: La revisión inglesa osciló entre 'the dwelling in Jerusalem' y 'the dwelling of Jerusalem'. Para el español se eligió una forma que preserve el valor de `habitatio` como residencia/estado de habitar, siguiendo la aclaración de la revisión más reciente sin perder la precisión semántica del latín.
  spanish_consistency_notes:
  - Se mantiene 'Jerusalén' de forma consistente como topónimo.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes porque el verso no contiene el Tetragrámaton ni un título divino.
  - '''Morada'' se usa aquí por el contexto de residencia, no como término litúrgico.'
  - No se introduce terminología doctrinal ajena al texto; el pasaje es descriptivo.
