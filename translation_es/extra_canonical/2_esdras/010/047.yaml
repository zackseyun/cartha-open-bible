    issue: '''morada de Jerusalén'' puede malinterpretarse como edificio o casa'
    rationale: El latín 'habitatio' aquí apunta al hecho/estado de habitar o residencia de Jerusalén, no a una construcción concreta. 'Morada' en español tiende a concretarse más de lo deseable.
  - severity: medium
    issue: La nota [a] no ofrece una alternativa real
    rationale: El texto principal ya dice 'la morada de Jerusalén', y la nota repite exactamente 'O «la morada de Jerusalén»'. Esto no añade información ni preserva una variante significativa.
  revised_spanish_text: 'Y en cuanto a lo que te dijo: «Yo lo crié con trabajo», esta era la habitación[a] de Jerusalén.'
  revised_footnotes:
