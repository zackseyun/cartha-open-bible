    reason: previous_rendering
lexical_decisions:
- source_word: spiramentum
  english_pob_choice: the breath
  chosen_spanish: el aliento
  alternatives_spanish:
  - el soplo
  - el hálito
  lexicon: spiramentum
  rationale: En este contexto, el sustantivo latino designa el aliento o soplo vital procedente de Dios; «aliento» conserva bien la imagen física y teológica en español sin sonar mecánico. «Soplo» y «hálito» son posibles, pero «aliento» resulta más natural y clara en lectura bíblica.
- source_word: dei omnipotentis
  english_pob_choice: of God Almighty
  chosen_spanish: de Dios Todopoderoso
  alternatives_spanish:
  - del Dios Todopoderoso
  - de Dios omnipotente
  lexicon: dei omnipotentis
  rationale: «Todopoderoso» es la equivalencia española más asentada para omnipotencia divina y preserva el tono reverente del original. Se evita introducir un nombre propio distinto o una paráfrasis más larga.
- source_word: qui fecit omnia
  english_pob_choice: who made all things
  chosen_spanish: que hizo todas las cosas
  alternatives_spanish:
  - que creó todas las cosas
  - que hizo todo
  lexicon: qui fecit omnia
  rationale: «Hizo todas las cosas» sigue de cerca el latín y mantiene la amplitud de la creación sin forzar un término técnico adicional. «Creó» sería posible, pero el texto fuente usa fecit.
- source_word: scrutatur absconsa in absconsis
  english_pob_choice: searches out hidden things in hidden places
  chosen_spanish: escudriña las cosas ocultas en lugares ocultos
  alternatives_spanish:
  - sondea lo oculto en lo oculto
  - investiga las cosas escondidas en lugares escondidos
  lexicon: scrutatur absconsa in absconsis
  rationale: La repetición latina de lo oculto se conserva con «cosas ocultas en lugares ocultos», y «escudriña» refleja bien el verbo intensivo de buscar a fondo. Se evita simplificar la duplicación retórica del original.
- source_word: adinuentionem uestram
  english_pob_choice: your devising
  chosen_spanish: tu designio
  alternatives_spanish:
  - tu manera de pensar
  - tu proyecto
  lexicon: adinuentionem
  rationale: El singular latino fue corregido en la revisión del auditorio; por eso se traduce en singular. «Designio» capta la idea de lo planeado o maquinado sin cargar el pasaje con un matiz excesivamente negativo que el latín por sí solo no obliga.
theological_decisions:
- issue: Alcance de la presciencia divina sobre lo escondido
  english_pob_reading: the breath of God Almighty, who made all things and searches out hidden things in hidden places. Surely he knows your devising.
  chosen_spanish_reading: el aliento de Dios Todopoderoso, que hizo todas las cosas y escudriña las cosas ocultas en lugares ocultos. Ciertamente él conoce tu designio.
  alternative_spanish_readings:
  - el aliento de Dios Todopoderoso... Ciertamente conoce vuestro designio
  - '...y escudriña los secretos en lugares secretos'
  rationale: La formulación conserva la afirmación teológica de que Dios conoce lo escondido y lo pensado sin añadir el elemento de «corazones» que pertenece a la línea siguiente en el contexto textual revisado. Se mantiene el singular de «designio» conforme a la corrección del texto fuente.
  doctrine_reference: Presciencia y omnisciencia divina
translation_notes:
  revision_awareness: 'Ajusté la versificación según la revisión más reciente: este versículo no lleva la cláusula inicial «y» ni la expansión «y lo que pensáis en vuestros corazones», porque esos elementos pertenecen al contexto textual anterior o siguiente. También seguí la corrección de adinuentionem como singular («designio»), no plural.'
  spanish_consistency_notes:
  - Mantengo «Dios Todopoderoso» para omnia potence/omnipotente en un registro bíblico natural.
  - Conservo la imagen repetida de lo oculto para respetar la retórica latina.
  - No empleo «SEÑOR» ni sustitutos de nombre divino, porque el latín aquí dice «Dios».
  - Uso «aliento» para spiramentum por su claridad y su cercanía semántica al soplo vital.
