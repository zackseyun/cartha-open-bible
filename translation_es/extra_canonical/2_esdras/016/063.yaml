translation:
  language: es
  text: el aliento de Dios Todopoderoso[a], que hizo todas las cosas y escudriña las cosas ocultas en lugares ocultos. Ciertamente él conoce vuestro designio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
