translation:
  language: es
  text: Tronará, y ¿quién no temblará? El Señor amenazará, y ¿quién
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: tonabit
  english_pob_choice: He will thunder
  chosen_spanish: Él tronará
  alternatives_spanish:
  - Él hará tronar
  - Él resonará con trueno
  lexicon: Latin tonare
  rationale: El latín expresa la acción del trueno de forma directa. En español, 'tronará' reproduce bien el verbo verbal y mantiene el impacto sin añadir elementos interpretativos.
- source_word: quis non horrebit?
  english_pob_choice: who will not tremble?
  chosen_spanish: ¿quién no temblará?
  alternatives_spanish:
  - ¿quién no se estremecerá?
  - ¿quién no horrorecerá?
  lexicon: Latin horrēre
  rationale: El verbo latino comunica estremecimiento o temblor ante temor; 'temblará' es natural en español y conserva el sentido básico sin intensificarlo más de lo debido.
- source_word: Dominus
  english_pob_choice: The Lord
  chosen_spanish: El Señor
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: Latin Dominus
  rationale: Aquí el texto latino dice Dominus, y el equivalente idiomático más directo en español es 'El Señor'. No hay en este verso una señal explícita del tetragrámaton en el texto fuente latino, por lo que se mantiene la forma de tratamiento heredada del propio latín y del audit trail inglés.
- source_word: comminabitur
  english_pob_choice: will threaten
  chosen_spanish: amenazará
  alternatives_spanish:
  - reprenderá
  - proferirá amenazas
  lexicon: Latin comminari
  rationale: '''Amenazará'' reproduce la fuerza directa del verbo latino y coincide con la lectura inglesa auditada. ''Reprenderá'' sería demasiado débil; ''proferirá amenazas'' suena más perifrástico de lo que permite el original.'
theological_decisions:
- issue: La secuencia se conserva como pregunta retórica con sujeto divino implícito en la segunda cláusula.
  english_pob_reading: He will thunder, and who will not tremble? The Lord will threaten, and who
  chosen_spanish_reading: Él tronará, y ¿quién no temblará? El Señor amenazará, y ¿quién
  alternative_spanish_readings:
  - Tronará, y ¿quién no temblará? El Señor amenazará, y ¿quién
  - Él tronará, y ¿quién no temblará? Yahvé amenazará, y ¿quién
  rationale: La fuente latina presenta dos acciones divinas y una pregunta retórica abierta. La traducción conserva la incompletud del final como en el original y evita completar el miembro final con material no atestiguado.
  doctrine_reference: None
translation_notes:
  revision_awareness: La revisión reciente del audit trail corrigió una expansión no sustentada y restituyó el primer miembro ('He will thunder, and who will not tremble?'). Esta versión española sigue esa corrección y conserva el corte abrupto final del texto latino, sin añadir conclusión.
  spanish_consistency_notes:
  - Se mantiene el verbo enfático 'tronará' para tonabit, en consonancia con el audit trail inglés.
  - Se conserva la pregunta final incompleta, porque el texto fuente termina truncado.
  - Se usa 'El Señor' para Dominus, sin introducir 'Yahvé' donde el latín no lo explicita.
