revisions:
- from: ¿Ha lanzado un arquero fuerte una flecha; quién la hará volver? El Señor Dios envía males, ¿y quién los apartará?
  to: Un arquero fuerte ha lanzado una flecha; ¿quién la hará volver? El Señor Dios envía males, ¿y quién los apartará?
  rationale: 'Se corrige la primera cláusula para reflejar la estructura del original: afirmación seguida de pregunta retórica. Se mantiene "El Señor Dios" como excepción contextual basada en la fuente latina inmediata y el audit trail inglés, y se conservan "males" y "apartará" por su fidelidad y naturalidad en español.'
  reviewer_model: gpt-5.4
