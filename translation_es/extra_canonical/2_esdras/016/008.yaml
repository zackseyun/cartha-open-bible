translation:
  language: es
  text: Un arquero fuerte ha lanzado una flecha; ¿quién la hará volver? El Señor Dios envía males, ¿y quién los apartará?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: sagittam a sagittario forti missam
  english_pob_choice: A strong archer has shot an arrow
  chosen_spanish: ¿Ha lanzado un arquero fuerte una flecha?
  alternatives_spanish:
  - Un arquero fuerte ha disparado una flecha
  - Un arquero poderoso ha lanzado una flecha
  lexicon: Latin sagitta / sagittarius fortis
  rationale: Conservo la imagen completa del texto latino y la causalidad implícita de una flecha ya lanzada. 'Arquero fuerte' refleja el adjetivo forti sin suavizarlo; 'lanzado' comunica bien el perfectivo missam en español natural.
- source_word: quid eam convertet
  english_pob_choice: who will turn it back?
  chosen_spanish: ¿quién la hará volver?
  alternatives_spanish:
  - ¿quién la devolverá?
  - ¿quién la volverá atrás?
  lexicon: Latin convertet
  rationale: '''Hará volver'' transmite la idea de revertir o desviar de regreso una acción ya realizada, evitando un calco torpe y preservando el sentido retórico de imposibilidad.'
- source_word: Dominus deus
  english_pob_choice: The Lord God
  chosen_spanish: El Señor Dios
  alternatives_spanish:
  - El Señor Yahvé
  - Yahvé Dios
  lexicon: Latin Dominus deus
  rationale: Aunque el proyecto prefiere 'Yahvé' para יהוה, aquí el latín de base usa Dominus deus y la formulación inglesa fija 'The Lord God'. Por fidelidad al audit trail y a la cadencia bíblica tradicional, mantengo 'El Señor Dios' en este verso.
- source_word: mittit
  english_pob_choice: sends
  chosen_spanish: envía
  alternatives_spanish:
  - manda
  - manda enviar
  lexicon: Latin mittere
  rationale: '''Envía'' reproduce el verbo simple y directo del latín y mantiene el paralelismo con la pregunta retórica final.'
- source_word: evils
  english_pob_choice: evils
  chosen_spanish: males
  alternatives_spanish:
  - desastres
  - calamidades
  - maldades
  lexicon: Latin mala
  rationale: '''Males'' conserva la amplitud semántica de mala en latín: adversidades, desgracias o juicios. Es más abarcador que ''maldades'' y más literal que una paráfrasis.'
theological_decisions:
- issue: Agencia divina en juicios o calamidades
  english_pob_reading: The Lord God sends evils, and who will drive them away?
  chosen_spanish_reading: El Señor Dios envía males, ¿y quién los apartará?
  alternative_spanish_readings:
  - El Señor Dios envía calamidades, ¿y quién las apartará?
  - El Señor Dios manda males, ¿y quién los alejará?
  rationale: '''Males'' preserva la dureza teológica del pasaje sin domesticarla. ''Apartará'' conserva la imagen de remover o hacer retroceder esos males, coherente con la pregunta retórica sobre la irreversibilidad del decreto divino.'
  doctrine_reference: Providencia y juicio divino en la literatura apocalíptica
- issue: Retórica de inevitabilidad
  english_pob_reading: who will drive them away?
  chosen_spanish_reading: ¿y quién los apartará?
  alternative_spanish_readings:
  - ¿y quién los expulsará?
  - ¿y quién los hará huir?
  rationale: '''Apartará'' es suficientemente fuerte y natural en español para expresar la imposibilidad de deshacer la acción divina, manteniendo el paralelismo con ''quién la hará volver'' en la primera cláusula.'
  doctrine_reference: Soberanía divina y juicio inevitable
translation_notes:
  revision_awareness: La revisión inglesa más reciente restauró la primera cláusula ausente del latín. El español la incorpora de forma completa y paralela, sin depender de la versión abreviada previa. No se añadieron notas al pie porque no hay una variante textual o léxica que deba anclarse explícitamente en el verso.
  spanish_consistency_notes:
  - Se evitó 'Señor' a secas para mantener la unidad con 'El Señor Dios' del texto base.
  - Se eligió 'males' en lugar de 'calamidades' para no atenuar el alcance del latín mala.
  - La sintaxis conserva dos preguntas retóricas coordinadas, como en la estructura latina y en la revisión inglesa auditada.
