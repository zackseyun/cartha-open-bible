translation_notes:
  revision_awareness: La versión inglesa revisada eliminó la expansión no atestiguada «the more they adorn» y retuvo la serie de objetos más la frase comparativa final. La versión española sigue ese mismo estado textual, sin introducir verbo ausente ni completar la cláusula.
  spanish_consistency_notes:
  - Se mantiene «posesiones» para possessiones por coherencia con el léxico patrimonial directo.
  - Se preserva «personas» en vez de suavizar a «vidas» o «cuerpos», porque el latín usa personae y la audit trail en inglés lo traduce literalmente.
  - Se conserva la minúscula en «tanto más» porque funciona como remate fragmentario del testimonio transmitido.
