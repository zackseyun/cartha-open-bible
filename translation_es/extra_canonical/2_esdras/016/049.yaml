lexical_decisions:
- source_word: ciuitates
  english_pob_choice: their cities
  chosen_spanish: sus ciudades
  alternatives_spanish:
  - sus poblaciones
  - sus villas
  lexicon: ciuitas
  rationale: El latín nombra las ciudades de forma directa; «ciudades» conserva el referente urbano sin añadir matices no presentes.
- source_word: domus
  english_pob_choice: their houses
  chosen_spanish: sus casas
  alternatives_spanish:
  - sus hogares
  - sus viviendas
  lexicon: domus
  rationale: «Casas» reproduce el término concreto del latín y mantiene el paralelismo nominal del texto.
- source_word: possessiones
  english_pob_choice: their possessions
  chosen_spanish: sus posesiones
  alternatives_spanish:
  - sus bienes
  - sus propiedades
  lexicon: possessio
  rationale: «Posesiones» es la correspondencia más directa y conserva el alcance general de bienes poseídos.
- source_word: personas suas
  english_pob_choice: their own persons
  chosen_spanish: sus propias personas
  alternatives_spanish:
  - a sus propias personas
  - sus mismos cuerpos
  lexicon: persona
  rationale: El latín enfatiza que incluso sus propias personas están incluidas; «sus propias personas» mantiene ese énfasis literal sin desplazarlo a «cuerpos».
- source_word: Tanto
  english_pob_choice: so much the more
  chosen_spanish: tanto más
  alternatives_spanish:
  - mucho más
  - con mayor razón
  lexicon: tantus
  rationale: «Tanto más» refleja con naturalidad el comparativo intensivo del latín «Tanto» y conserva el valor de incremento enfático.
theological_decisions:
- issue: Comparativo final incompleto en el fragmento latino
  english_pob_reading: so much the more
  chosen_spanish_reading: tanto más
  alternative_spanish_readings:
  - mucho más
  - con mayor razón
  rationale: El testimonio suministrado termina en una forma comparativa aislada; la traducción debe reflejar esa incompletitud sin suplir material ausente.
