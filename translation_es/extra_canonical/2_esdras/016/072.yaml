base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/016/072.yaml
  text: They will be like madmen[a], sparing no one, plundering and ravaging those who still fear the Lord.
  footnotes:
  - marker: a
    text: Or 'They will be like madmen, sparing no one, still plundering and ravaging those who fear the Lord.'.
