    timestamp: '2026-04-23T20:30:23Z'
    unchanged: false
    changes_summary: Clarified the object of plundering and ravaging by supplying 'those who' to reflect the Latin phrase referring to people who still fear the Lord.
translation:
  language: es
  text: Estarán como locos[a], sin perdonar a nadie, saqueando y devastando a los que aún temen a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Estarán como locos, sin perdonar a nadie, todavía saqueando y devastando a los que temen al Señor».
    reason: alternative_reading
lexical_decisions:
- source_word: Erint quasi insani
  english_pob_choice: They will be like madmen
  chosen_spanish: Estarán como locos
  alternatives_spanish:
  - Estarán como dementes
  - Estarán como insensatos
  lexicon: quasi insani
  rationale: El latín compara a los agresores con personas fuera de juicio. «Como locos» conserva la fuerza comparativa y resulta natural en español; «dementes» suena más clínico y «insensatos» debilita la imagen.
- source_word: neminem parcentes
  english_pob_choice: sparing no one
  chosen_spanish: sin perdonar a nadie
  alternatives_spanish:
  - sin tener compasión de nadie
  - no perdonando a nadie
  lexicon: neminem parcentes
  rationale: «Parcere» aquí tiene el sentido de dejar con vida o tratar con clemencia. «Sin perdonar a nadie» refleja bien la extensión absoluta de la negación y mantiene el tono violento del original.
- source_word: diripiendum et deuastandum
  english_pob_choice: plundering and ravaging
  chosen_spanish: saqueando y devastando
  alternatives_spanish:
  - despojando y devastando
  - robando y arrasando
  lexicon: diripere / devastare
  rationale: «Saqueando» conserva el sentido de despojar violentamente; «devastando» reproduce la idea de arrasar/desolar. La pareja mantiene el paralelismo y la intensidad del latín.
- source_word: adhuc timentes dominum
  english_pob_choice: those who still fear the Lord
  chosen_spanish: a los que aún temen a Yahvé
  alternatives_spanish:
  - a los que todavía temen al Señor
  - a quienes siguen temiendo a Yahvé
  lexicon: adhuc + timentes dominum
  rationale: La revisión indicada por el audit trail muestra que «adhuc» modifica «timentes», no las acciones de saqueo. Por eso el español debe unir «aún» con «temen» y no con «saqueando y devastando». «Yahvé» sigue el estándar terminológico del proyecto para dominus cuando remite al nombre divino.
theological_decisions:
- issue: Referencia a dominus en un contexto de temor reverente
  english_pob_reading: those who still fear the Lord
  chosen_spanish_reading: los que aún temen a Yahvé
  alternative_spanish_readings:
  - los que aún temen al Señor
  - los que todavía reverencian a Yahvé
  rationale: El texto no habla de un señor humano sino del referente divino del latín dominum. Se mantiene «temen» porque el contexto es de temor reverente y leal, no solo respeto genérico. El audit trail confirma que el sujeto de la agresión son precisamente los fieles que siguen temiendo a Dios.
  doctrine_reference: Tetragrámaton / nombre divino en traducción; temor de Dios como reverencia y lealtad
translation_notes:
  revision_awareness: La versión española sigue la corrección del audit trail que asigna «adhuc» a «timentes», de modo que la frase final identifica a las víctimas como personas que aún temen a Yahvé. Se preserva la imagen violenta del latín y la comparación con personas fuera de juicio.
  spanish_consistency_notes:
  - Se usa «Yahvé» para dominum en coherencia con la norma del proyecto cuando el contexto remite al nombre divino.
  - «Como locos» mantiene la comparación idiomática de quasi insani sin introducir una explicación interpretativa adicional.
  - La nota alternativa conserva la lectura previa del inglés, pero la línea principal sigue la revisión gramatical más reciente.
