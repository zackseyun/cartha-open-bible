    rationale: Aunque defendible, en contexto de arquería el latín non deficient apunta a no quedarse cortas / no perder eficacia. «No errarán» o «no fallarán su blanco» transmite mejor la imagen física.
  - severity: low
    issue: La nota [a] sobre «agudas» es poco útil y parcialmente redundante
    rationale: Dice «O “afiladas”; el latín también puede leerse simplemente como “agudas”», pero el texto principal ya tiene «agudas». Es mejor reformular la nota para presentar «afiladas» como alternativa española natural.
  revised_spanish_text: Porque poderosa es su mano derecha que tensa el arco; sus flechas, disparadas por él, son agudas[a], y no errarán cuando empiecen a ser disparadas.
