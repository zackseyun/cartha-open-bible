base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/016/013.yaml
  text: For mighty is his right hand that bends the bow; his arrows that are shot by him are sharp[a], and they will not fail when they begin to be shot.
  footnotes:
  - marker: a
    text: Or 'are sent by him are sharp, and they will not fail'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:29:49Z'
    unchanged: false
    changes_summary: Removed the added phrase 'to the ends of the earth,' which is not present in the Latin, and changed 'will not miss' to 'will not fail' to more closely reflect non deficient.
translation:
  language: es
  text: Porque poderosa es su mano derecha que tensa el arco; sus flechas, disparadas por él, son agudas[a], y no errarán cuando empiecen a ser disparadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «afiladas».
    reason: lexical_alternative
lexical_decisions:
- source_word: fortis
  english_pob_choice: mighty
  chosen_spanish: poderosa
  alternatives_spanish:
  - fuerte
  - poderoso
  lexicon: fortis
  rationale: En este contexto describe la fuerza eficaz de la mano derecha de Yahvé; "poderosa" conserva la idea de vigor activo y suena natural en español bíblico sin introducir una abstracción excesiva.
- source_word: dextera eius
  english_pob_choice: his right hand
  chosen_spanish: su mano derecha
  alternatives_spanish:
  - su diestra
  - su mano diestra
  lexicon: dextera
  rationale: '"Mano derecha" comunica con claridad la imagen corporal del latín y mantiene la transparencia para lectores modernos; "diestra" sería más tradicional, pero menos directo.'
- source_word: arcum tendit
  english_pob_choice: that bends the bow
  chosen_spanish: que tensa el arco
  alternatives_spanish:
  - que dobla el arco
  - que arma el arco
  lexicon: arcum tendit
  rationale: '"Tensar" es la acción natural del arco en español y preserva la imagen técnica del disparo con arco mejor que "doblar".'
- source_word: sagittae eius
  english_pob_choice: his arrows
  chosen_spanish: sus flechas
  alternatives_spanish:
  - sus saetas
  - sus dardos
  lexicon: sagittae
  rationale: '"Flechas" es el término más claro y común en español para mantener la imaginería bélica del texto.'
- source_word: ab ipso mittuntur
  english_pob_choice: that are shot by him
  chosen_spanish: disparadas por él
  alternatives_spanish:
  - enviadas por él
  - lanzadas por él
  lexicon: mittuntur
  rationale: El contexto es de arquería; por eso "disparadas" refleja mejor la acción concreta que "enviadas", siguiendo la revisión inglesa que prefirió el campo semántico de tiro.
- source_word: acutae
  english_pob_choice: sharp
  chosen_spanish: agudas
  alternatives_spanish:
  - afiladas
  - punzantes
  lexicon: acutus
  rationale: '"Agudas" conserva la cualidad de punta afilada y permite una relación más directa con flechas; "afiladas" también sería posible, pero suena algo menos sintético en esta línea.'
- source_word: non deficient
  english_pob_choice: will not fail
  chosen_spanish: no fallarán
  alternatives_spanish:
  - no desfallecerán
  - no fallarán de su objetivo
  lexicon: deficio
  rationale: La revisión inglesa aclaró que el latín aquí expresa no quedarse corto / fallar el blanco. "No fallarán" reproduce ese valor con naturalidad y evita el sentido demasiado general de "fallar" como fracasar.
- source_word: cum coeperint mitti
  english_pob_choice: when they begin to be shot
  chosen_spanish: cuando empiecen a ser disparadas
  alternatives_spanish:
  - cuando comiencen a ser lanzadas
  - cuando empiecen a ser enviadas
  lexicon: mitti
  rationale: Mantiene la pasiva del latín y la coherencia con "disparadas"; la elección preserva la imagen de archería y la progresión temporal del verso.
theological_decisions:
- issue: Referencia implícita al sujeto divino sin nombrarlo con título litúrgico
  english_pob_reading: his right hand... his arrows
  chosen_spanish_reading: su mano derecha... sus flechas
  alternative_spanish_readings:
  - la mano derecha de Dios... las flechas de Dios
  - su diestra... sus saetas
  rationale: El texto latino usa posesivos de tercera persona y el contexto de 2 Esdras atribuye la acción a Dios sin necesidad de añadir un título no presente. Se mantiene la referencia implícita para no sobreinterpretar el verso.
  doctrine_reference: No aplica una variante doctrinal; se preserva la deixis del texto fuente.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al conservar la imagen de arquería y reflejar non deficient como «no fallarán», evitando añadir material no presente en el latín y manteniendo la coherencia con mittuntur/mitti como «disparadas».
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el texto fuente aquí no contiene el tetragrámaton ni una cita directa del nombre divino; se conserva el posesivo implícito del latín.
  - Se prefirió un español moderno y claro («tensan», «disparadas», «no fallarán») sin perder la imaginería bélica del original.
  - La nota de pie de página se limita a la alternativa léxica de acutae, ya que el resto de las decisiones no crea una ambigüedad adicional útil para el lector.
