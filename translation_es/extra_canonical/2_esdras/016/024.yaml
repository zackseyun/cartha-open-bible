translation:
  language: es
  text: Y los muertos serán arrojados como estiércol, y no tendrán quien los consuele, y la tierra quedará desolada, y sus ciudades serán demolidas.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: et mortui
  english_pob_choice: And the dead
  chosen_spanish: Y los muertos
  alternatives_spanish:
  - Y los difuntos
  - Y los muertos humanos
  lexicon: mortui > muertos
  rationale: El latín habla de los muertos en general; «los muertos» es la forma más directa y natural en español, sin añadir matiz litúrgico ni suavizar el término.
- source_word: quasi stercora
  english_pob_choice: like dung
  chosen_spanish: como estiércol
  alternatives_spanish:
  - como abono
  - como basura
  - como excremento
  lexicon: quasi stercora > como estiércol
  rationale: «Stercora» corresponde a excremento/estiércol con fuerza degradante. «Estiércol» conserva el desprecio corporal de la imagen y es comprensible en español bíblico contemporáneo.
- source_word: proicientur
  english_pob_choice: will be cast out
  chosen_spanish: serán arrojados
  alternatives_spanish:
  - serán echados
  - serán lanzados
  lexicon: proicio > arrojar
  rationale: El verbo pasivo expresa expulsión violenta. «Arrojados» mantiene la imagen física fuerte del latín y se ajusta al valor de «proicientur».
- source_word: non habent qui consolentur eos
  english_pob_choice: they will have no one to comfort them
  chosen_spanish: no tendrán quien los consuele
  alternatives_spanish:
  - no tienen quien los consuele
  - no habrá quien los consuele
  lexicon: non habere + qui consolentur > no tener quien consuele
  rationale: La construcción latina se entiende naturalmente en español como falta de persona consoladora. Se conserva la relación personal («quien los consuele») y la temporalidad futura del contexto profético, siguiendo el ajuste del audit trail inglés.
- source_word: derelinquetur deserta terra
  english_pob_choice: the earth will be left desolate
  chosen_spanish: la tierra quedará desolada
  alternatives_spanish:
  - la tierra será abandonada, desierta
  - la tierra será dejada desolada
  lexicon: derelinquetur + deserta terra > quedará desolada
  rationale: «Quedará desolada» reproduce el resultado pasivo sin forzar una estructura extraña en español. «Deserta» es adjetivo de desolación, no de desierto geográfico, por eso se traduce como «desolada».
- source_word: civitates eius demolientur
  english_pob_choice: and its cities will be demolished
  chosen_spanish: y sus ciudades serán demolidas
  alternatives_spanish:
  - y sus ciudades serán destruidas
  - y sus ciudades serán arrasadas
  lexicon: demolior > demoler/demolir
  rationale: «Demolientur» pide un verbo que conserve la idea de derribo/destrucción de estructuras. «Demolidas» sigue de cerca el latín y mantiene la fuerza material del pasaje.
theological_decisions:
- issue: Imagen de deshonra para los muertos
  english_pob_reading: cast out like dung
  chosen_spanish_reading: arrojados como estiércol
  alternative_spanish_readings:
  - echados como estiércol
  - arrojados como excremento
  rationale: No se atenúa la dureza de la imagen, porque el latín presenta una humillación corporal explícita. «Estiércol» conserva la repulsión sin volverse clínico o eufemístico.
  doctrine_reference: No aplica; imagen profética de juicio y deshonra corporal.
- issue: Falta de consolación para los muertos
  english_pob_reading: they will have no one to comfort them
  chosen_spanish_reading: no tendrán quien los consuele
  alternative_spanish_readings:
  - no tienen quien los consuele
  - no habrá quien los consuele
  rationale: Se conserva la ausencia de consolador como dato del juicio. La forma futura encaja con el marco profético del versículo y con la revisión inglesa que corrigió la sintaxis para reflejar el latín.
  doctrine_reference: Tema profético de desolación y abandono, sin doctrina sistemática específica.
- issue: Desolación de la tierra y destrucción de ciudades
  english_pob_reading: the earth will be left desolate, and its cities will be demolished
  chosen_spanish_reading: la tierra quedará desolada, y sus ciudades serán demolidas
  alternative_spanish_readings:
  - la tierra será dejada desolada, y sus ciudades serán destruidas
  - la tierra quedará desierta, y sus ciudades serán arrasadas
  rationale: La secuencia mantiene dos predicados coordinados como en el latín, sin introducir una causalidad inexistente. «Demolidas» sigue de cerca la revisión inglesa aprobada y la precisión de demolientur.
  doctrine_reference: Juicio escatológico/profético en 2 Esdras; no se introduce interpretación adicional.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión latina que corrigió la sintaxis de non habent como presente («no tienen/no tendrán» en el marco profético) y evitó introducir una relación causal inexistente entre la falta de consolación y la tierra. También se siguió la revisión inglesa que prefirió «demolished» para demolientur, preservando el carácter material de la destrucción.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» reservado para el nombre divino; este versículo no lo contiene.
  - Se conservó un tono profético elevado pero claro, evitando arcaísmos innecesarios.
  - «Estiércol» se eligió por su fuerza lexical y por corresponder al desprecio corporal del latín.
  - La puntuación separa las tres cláusulas coordinadas sin añadir nexos causales o explicativos no presentes en el texto.
