translation:
  language: es
  text: o como en una viña vendimiada, queda un racimo expuesto después que la vendimia ha sido cuidadosamente rebuscada,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «como en una viña después de la vendimia quedan algunos racimos, dejados por quienes examinan cuidadosamente la viña».

