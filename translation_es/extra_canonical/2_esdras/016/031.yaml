    reason: previous_rendering
lexical_decisions:
- source_word: aut sicut
  english_pob_choice: or as
  chosen_spanish: o como
  alternatives_spanish:
  - o así como
  - o tal como
  lexicon: aut / sicut
  rationale: La comparación requiere una conjunción disyuntiva seguida de un giro comparativo natural en español. «O como» conserva la estructura breve del latín sin forzar un calco.
- source_word: in vinea vindemiata
  english_pob_choice: in a harvested vineyard
  chosen_spanish: en una viña vendimiada
  alternatives_spanish:
  - en una viña cosechada
  - en una viña ya vendimiada
  lexicon: vinea / vindemiata
  rationale: «Viña» es el equivalente más directo y bíblico de vinea; «vendimiada» conserva el matiz de la vendimia, no solo de una cosecha genérica. Se evita «cosechada» por perder el campo semántico vitícola.
- source_word: subremanet
  english_pob_choice: remains
  chosen_spanish: queda
  alternatives_spanish:
  - permanece
  - subsiste
  lexicon: subremaneo
  rationale: El verbo latino indica que algo queda o permanece después de la acción principal. «Queda» es natural y fiel, y mantiene la idea de residuo visible.
- source_word: racemus patens
  english_pob_choice: an exposed cluster
  chosen_spanish: un racimo al descubierto
  alternatives_spanish:
  - un racimo expuesto
  - un racimo abierto a la vista
  lexicon: racemus / patens
  rationale: «Racimo» traduce directamente racemus. «Al descubierto» expresa bien patens como abierto/visible/expuesto sin sonar rígido. Se preserva la imagen de una porción visible entre lo ya vendimiado.
- source_word: ab scrutantibus
  english_pob_choice: from those who carefully search
  chosen_spanish: de parte de quienes buscan cuidadosamente
  alternatives_spanish:
  - por parte de los que examinan con cuidado
  - ante quienes registran cuidadosamente
  lexicon: scrutor
  rationale: El verbo scrutari implica buscar/examinar con diligencia. «Buscan cuidadosamente» conserva la idea de una búsqueda atenta sin añadir un objeto explícito que el latín no exige.
- source_word: vindemiam diligenter
  english_pob_choice: the vintage carefully
  chosen_spanish: la vendimia cuidadosamente
  alternatives_spanish:
  - la cosecha con cuidado
  - la vendimia con diligencia
  lexicon: vindemia / diligenter
  rationale: Se mantiene «vendimia» para respetar el ámbito agrícola específico del texto. «Cuidadosamente» reproduce diligenter con un adverbio claro y sobrio.
theological_decisions:
- issue: Imagen comparativa de residuo visible tras la vendimia
  english_pob_reading: a harvested vineyard an exposed cluster remains from those who carefully search the vintage
  chosen_spanish_reading: una viña vendimiada en la que queda un racimo al descubierto
  alternative_spanish_readings:
  - una viña después de la vendimia en la que quedan algunos racimos
  - una viña vendimiada con un racimo expuesto
  rationale: La frase no plantea doctrina explícita, sino una imagen de lo que queda tras una vendimia cuidadosa. La traducción conserva la tensión entre lo ya vendimiado y el racimo visible que todavía permanece, sin diluir el singular del latín ni convertirlo en plural genérico.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'El texto latino revisado corrige una lectura anterior que confundía «vindemiata» con «después de la vendimia» y pluralizaba indebidamente «racemus». La versión española sigue la revisión más cercana al latín: viña vendimiada, un racimo singular y la idea de que queda/al descubierto.'
  spanish_consistency_notes:
  - Se usa «viña» y «vendimia» de manera consistente para mantener el campo agrícola del latín.
  - Se prefirió «al descubierto» para patens por ser idiomático en español y conservar el sentido de exposición visible.
  - Se mantuvo el singular «racimo» para reflejar racemus, evitando una pluralización no sustentada por el texto.
