base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/016/036.yaml
  text: But hear these things and know them, slaves of the Lord. Behold, the word of the Lord; receive it; do not disbelieve the things he speaks.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:29:52Z'
    unchanged: false
    changes_summary: Completed the omitted second half of the verse from the Latin, changed 'understand' to 'know' for cognoscite, rendered serui as 'slaves' per policy, and added the remaining clauses with formal, natural English.
translation:
  language: es
  text: Pero oigan estas cosas y conózcanlas, esclavos de Yahvé. He aquí la palabra de Yahvé; recíbanla; no dejen de creer lo que él dice.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Audite
  english_pob_choice: hear
  chosen_spanish: oíd
  alternatives_spanish:
  - escuchad
  - oigan
  lexicon: Latin audire
  rationale: El imperativo pide atención auditiva directa; en español bíblico moderno, «oíd» conserva el mandato breve y solemne sin volverlo arcaico en exceso.
- source_word: cognoscite
  english_pob_choice: know
  chosen_spanish: conocedlas
  alternatives_spanish:
  - conoced
  - entended
  - comprended
  lexicon: Latin cognoscere
  rationale: El inglés POB eligió «know» en vez de «understand» para reflejar el valor más pleno de cognoscite; en español, «conocedlas» mantiene esa fuerza relacional/cognitiva y se enlaza naturalmente con «estas cosas».
- source_word: serui domini
  english_pob_choice: slaves of the Lord
  chosen_spanish: esclavos del Señor
  alternatives_spanish:
  - siervos del Señor
  lexicon: Latin servus
  rationale: Se conserva «esclavos» por la decisión lexical documentada del POB en inglés para no suavizar la fuerza del término; «Señor» traduce domini de forma idiomática y reverente en español.
- source_word: uerbum domini
  english_pob_choice: the word of the Lord
  chosen_spanish: la palabra del Señor
  alternatives_spanish:
  - la palabra del Señor Yahvé
  - la palabra del Señor Dios
  lexicon: Latin verbum + domini
  rationale: En este contexto dominus reproduce el título divino en la formulación bíblica usual; el español mantiene «palabra» en singular, con valor de proclamación autorizada.
- source_word: excipite eum
  english_pob_choice: receive it
  chosen_spanish: recibidla
  alternatives_spanish:
  - recibidlo
  - acedlo
  lexicon: Latin excipere
  rationale: Aunque el antecedente latino formal es neutro singular, en español el referente inmediato es «la palabra»; por concordancia natural y fidelidad referencial, se usa «recibidla».
- source_word: ne discredatis
  english_pob_choice: do not disbelieve
  chosen_spanish: no descreáis
  alternatives_spanish:
  - no incrédulos seáis
  - no dudéis
  lexicon: Latin discredere
  rationale: «Descreer» conserva mejor la negación del acto de creer que «dudar» y evita cargar el verso con una lectura meramente intelectual que el latín no exige.
- source_word: de quibus dicit
  english_pob_choice: the things he speaks
  chosen_spanish: de las cosas que él dice
  alternatives_spanish:
  - de lo que él dice
  - de las cosas que pronuncia
  lexicon: Latin dicere
  rationale: «Dice» sigue el verbo simple del latín sin embellecerlo; «cosas» mantiene la referencia abierta y concreta, como en la traducción inglesa auditada.
theological_decisions:
- issue: Tratamiento del título divino dominus en la frase final
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Dios
  rationale: Aquí dominus funciona como título reverencial en la clausula exhortativa. En español, «el Señor» conserva la fórmula bíblica natural y no introduce innecesariamente una expansión del referente, dado que el texto ya repite «domini».
  doctrine_reference: Uso reverencial del título divino en exhortación profética; consistencia con el contexto inmediato.
- issue: Fuerza del imperativo respecto de la recepción de la revelación
  english_pob_reading: receive it; do not disbelieve the things he speaks
  chosen_spanish_reading: recibidla; no descreáis de las cosas que él dice
  alternative_spanish_readings:
  - recibidla; no dudéis de las cosas que él dice
  - recibidla; no rechacéis las cosas que él dice
  rationale: El latín opone recepción y falta de incredulidad; «no descreáis» preserva la dimensión de fe/confianza, no solo de opinión. Se evita «rechacéis» porque el texto no dice rechazo activo.
  doctrine_reference: Autoridad de la palabra divina y respuesta de fe obediente.
translation_notes:
  revision_awareness: 'El texto se ajusta a la revisión más reciente que completó el segundo hemistiquio del versículo a partir del latín y corrigió cognoscite a un valor de conocimiento más que mera comprensión. La traducción española incorpora ambas decisiones: añade la exhortación completa sobre la palabra del Señor y usa un equivalente que refleja conocimiento además de atención.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para domini porque el contexto no exige explicitar Yahvé en esta línea y la fórmula es idiomática en español bíblico.
  - Se conserva «esclavos» conforme a la política lexical auditada del POB para servus/serui, evitando el suavizamiento a «siervos».
  - El objeto de «recibidla» se feminizó por concordancia con «la palabra», aunque el latín emplea eum; esta decisión se toma por claridad sintáctica en español.
  - «Descreáis» conserva una negación de la fe más cercana al latín discredatis que «dudéis», que sería más débil semánticamente.
