translation:
  language: es
  text: Los que se casan[a], como quienes no tendrán hijos; y los que no se casan, como viudos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como si no fueran a tener hijos».'
    reason: alternative_reading
lexical_decisions:
- source_word: qui nubunt
  english_pob_choice: Those who marry
  chosen_spanish: Los que se casan
  alternatives_spanish:
  - Los que contraen matrimonio
  - Los que se casan en matrimonio
  lexicon: nubunt = casar(se), tomar esposa/marido
  rationale: En este contexto latino, el verbo describe a quienes entran en matrimonio. «Se casan» es natural y fiel en español, sin añadir matices pastorales que el texto no exige.
- source_word: quasi filios non facturi
  english_pob_choice: as though they will have no children
  chosen_spanish: como quienes no tendrán hijos
  alternatives_spanish:
  - como si no fueran a tener hijos
  - como si no tuvieran hijos
  lexicon: quasi + participio/futuro perifrástico
  rationale: El latín usa una comparación elíptica con sentido de apariencia o actitud. «Como quienes no tendrán hijos» conserva la fuerza de quasi y mantiene la construcción paralela sin forzar un giro más explicativo.
- source_word: qui non nubunt
  english_pob_choice: those who do not marry
  chosen_spanish: los que no se casan
  alternatives_spanish:
  - los que no contraen matrimonio
  - los que permanecen solteros
  lexicon: non nubunt = no se casan
  rationale: «No se casan» es la equivalencia más directa y sobria para el contraste del texto.
- source_word: quasi vidui
  english_pob_choice: as widowers
  chosen_spanish: como viudos
  alternatives_spanish:
  - como si fueran viudos
  - cual viudos
  lexicon: quasi vidui = como viudos
  rationale: El comparativo latino es breve y retórico. «Como viudos» reproduce la comparación sin agregar un verbo innecesario.
theological_decisions:
- issue: Estructura exhortativa/elíptica del paralelismo
  english_pob_reading: Those who marry[a], as though they will have no children; and those who do not marry, as widowers.
  chosen_spanish_reading: Los que se casan[a], como quienes no tendrán hijos; y los que no se casan, como viudos.
  alternative_spanish_readings:
  - Los que se casan, como si no fueran a tener hijos; y los que no se casan, como viudos.
  rationale: La revisión inglesa reciente corrigió la tendencia a expandir la elipsis. En español conviene conservar la sintaxis breve y repetitiva del latín, evitando introducir un mandato o explicación no presente en el versículo.
  doctrine_reference: Retórica apocalíptica/parenética; no implica una doctrina sobre el matrimonio o la viudez en sí, sino un símil de aflicción y despojo.
translation_notes:
  revision_awareness: La versión inglesa de auditoría pasó de una expansión explicativa («let them be as though...») a una forma más fiel a la estructura elíptica («as though...») para reflejar el latín coordinado por la serie de cláusulas con quasi. La traducción española sigue esa revisión y evita añadir un mandato implícito.
  spanish_consistency_notes:
  - Se mantiene «se casan» para nubunt y «no se casan» para non nubunt, con registro neutro y eclesiásticamente legible.
  - Se conserva la comparación con «como» para reproducir quasi sin intensificar el sentido más allá del símil.
  - «Viudos» se mantiene literal, sin sustituirlo por «solteros» ni «descasados», porque el latín no usa ese léxico.
