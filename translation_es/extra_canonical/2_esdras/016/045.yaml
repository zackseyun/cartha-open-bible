review_pass:
  verdict: revise
  source_alignment_summary: 'El latín dice: «qui nubunt, sic quasi filios non facturi; et qui non nubunt, sic quasi vidui». La idea central está bien preservada en el borrador: contraste entre quienes se casan y quienes no, ambos bajo un símil de privación. Sin embargo, «como quienes no tendrán hijos» suena menos natural en español y debilita el valor comparativo de quasi. Una formulación con «como si» refleja mejor la fuerza del latín y coincide con la alternativa ya reconocida en la nota inglesa.'
  spanish_quality_summary: El borrador es claro, pero «como quienes no tendrán hijos» resulta algo forzado y poco idiomático en español eclesial general. «Como si no fueran a tener hijos» fluye mejor y mantiene el paralelismo con «como viudos».
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. «Se casan» para nubunt y «viudos» para vidui son adecuados. La principal decisión léxica es quasi, que en español aquí se expresa mejor con «como si» que con «como quienes».
  issues:
  - severity: medium
    issue: Giro poco natural en «como quienes no tendrán hijos»
    rationale: Aunque semánticamente cercano, este giro suena calcado y menos idiomático que «como si no fueran a tener hijos», que transmite mejor el matiz comparativo/aparente de quasi.
  - severity: low
    issue: La nota al pie preserva la mejor opción como alternativa en vez de texto principal
    rationale: La alternativa marcada en la nota representa mejor tanto el latín como la naturalidad del español; conviene promoverla al texto principal.
  revised_spanish_text: Los que se casan, como si no fueran a tener hijos; y los que no se casan, como viudos.
  revision_rationale: Se ajusta la primera comparación para reflejar más naturalmente en español el valor de quasi, sin expandir la elipsis ni alterar el paralelismo retórico del versículo. La nota deja de ser necesaria porque la mejor lectura pasa al texto principal.
