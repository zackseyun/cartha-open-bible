review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del latín: relinquentur = «quedarán», de civitate / ex agro = «de una ciudad ... del campo», absconderint se = «se han escondido», in silva = «en el bosque», in fissuras petrarum = «en las hendiduras de las peñas/rocas». La única desviación relevante está en la nota: el inglés auditado conserva la alternativa «in thick groves» solo como previous_rendering, pero el latín silva no justifica una alternativa española «en los bosques» como variante léxica real del versículo.'
  spanish_quality_summary: 'El español es claro, natural y digno. Sin embargo, «Porque» al inicio suena algo más causal de lo necesario para un versículo aislado; «Pues» encaja mejor con enim en registro bíblico fluido. También conviene mantener coherencia entre texto y nota: si el texto dice «bosque» en singular, la nota alternativa debe corresponder a una opción válida y documentada, no a un plural no motivado.'
  glossary_alignment: 'No hay términos teológicos del glosario mayor en juego. Las decisiones léxicas principales están bien encaminadas: «bosque» para silva y «campo» para ager son adecuadas. La nota alternativa actual no sigue bien la racionalidad documentada del POB inglés, que solo registra una traducción previa menos precisa, no un sentido plural del original.'
  issues:
  - severity: medium
    issue: La nota al pie «O «en los bosques»» no está bien justificada por el latín ni por la auditoría inglesa.
    rationale: El original tiene silva en singular. La tradición auditada menciona como renderizado previo «in thick groves», luego revisado a «forest/woods» por falta de base textual. Convertir eso en «los bosques» introduce un plural no respaldado y no preserva fielmente la razón documentada.
  - severity: low
    issue: «Porque» puede mejorarse a «Pues» para reflejar enim con más naturalidad en español bíblico.
    rationale: No es un error grave, pero «Pues» suele sonar más idiomático y menos rígidamente causal al inicio de una oración de explicación o continuación.
  revised_spanish_text: Pues de una ciudad quedarán diez, y dos del campo, los cuales se han escondido en el bosque[a] y en las hendiduras de las peñas.
  revised_footnotes:
  - marker: a
    text: O «en la espesura» o, menos literalmente, «en los bosques».
    reason: Preserva la existencia de una alternativa de traducción tradicional/previa para silva sin presentar el plural como el sentido principal del latín.
  revision_rationale: Se ajusta la conjunción inicial a un español más natural («Pues») y se corrige la nota al pie para que no introduzca un plural no apoyado por silva. El texto principal permanece sustancialmente igual porque ya era fiel y claro.
