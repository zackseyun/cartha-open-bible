    timestamp: '2026-04-23T20:29:51Z'
    unchanged: false
    changes_summary: Changed 'woods' to 'forest' for a more formal and natural rendering of silva; otherwise left the draft intact.
translation:
  language: es
  text: Pues de una ciudad quedarán diez, y dos del campo, los cuales se han escondido en el bosque[a] y en las hendiduras de las peñas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la espesura» o, menos literalmente, «en los bosques».
    reason: Preserva la existencia de una alternativa de traducción tradicional/previa para silva sin presentar el plural como el sentido principal del latín.
lexical_decisions:
- source_word: relinquentur
  english_pob_choice: will be left
  chosen_spanish: quedarán
  alternatives_spanish:
  - serán dejados
  - quedarán con vida
  lexicon: Latin relinquo
  rationale: El latín pasivo expresa remanencia o supervivencia del grupo. «Quedarán» comunica bien la idea sin sobrecargar con pasiva inglesa ni añadir más de lo que dice el texto.
- source_word: de civitate
  english_pob_choice: from a city
  chosen_spanish: de una ciudad
  alternatives_spanish:
  - de la ciudad
  - de alguna ciudad
  lexicon: Latin civitas
  rationale: El artículo indefinido mantiene el valor distributivo del latín y coincide con la lectura del POB inglés; no se específica una ciudad concreta.
- source_word: de agro
  english_pob_choice: from the countryside
  chosen_spanish: del campo
  alternatives_spanish:
  - del campo abierto
  - del agro
  lexicon: Latin ager
  rationale: «Ager» aquí apunta al campo rural, no a un término técnico agrícola. «Del campo» es natural en español y conserva el contraste ciudad/campo.
- source_word: absconderint se
  english_pob_choice: have hidden themselves
  chosen_spanish: se han escondido
  alternatives_spanish:
  - se escondieron
  - se ocultaron
  lexicon: Latin abscondo
  rationale: 'El perfecto latino describe una acción resultante: ya están escondidos. «Se han escondido» preserva ese valor mejor que un simple pretérito narrativo.'
- source_word: silva
  english_pob_choice: forest / woods
  chosen_spanish: bosque
  alternatives_spanish:
  - selva
  - arboleda
  lexicon: Latin silva
  rationale: La revisión inglesa descartó «thick groves» y fijó el sentido básico de silva como forest/woods. En español, «bosque» es el equivalente más natural y fiel; «selva» sería demasiado específico y «arboleda» demasiado débil.
- source_word: fissuras petrarum
  english_pob_choice: clefts of the rocks
  chosen_spanish: las hendiduras de las peñas
  alternatives_spanish:
  - las grietas de las rocas
  - las hendiduras de las rocas
  lexicon: Latin fissura + petra
  rationale: «Fissura» es abertura o hendidura; «petrae» puede ser «peñas» o «rocas». «Hendiduras de las peñas» conserva el registro bíblico y la imagen literal sin forzar una expresión moderna excesivamente técnica.
translation_notes:
  revision_awareness: El texto español sigue de cerca la edición latina limpia de Bensly, y toma en cuenta la revisión inglesa que eliminó la expansión interpretativa «thick groves» para mantener el valor simple de silva. Por eso se opta por «bosque»/«bosques» como alternativa, pero el texto principal permanece singular y literal con «bosque».
  spanish_consistency_notes:
  - Se conserva el paralelismo numérico «diez... y dos...» del original latino y del POB inglés.
  - «Bosque» mantiene la imagen concreta sin introducir el matiz no atestado de «espeso» o «denso».
  - «Peñas» da un tono bíblico natural en español y traduce adecuadamente petrae sin perder claridad.
