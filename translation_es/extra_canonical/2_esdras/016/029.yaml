- from: Porque de una ciudad quedarán diez[a], y dos del campo, los cuales se han escondido en el bosque y en las hendiduras de las peñas.
  to: Pues de una ciudad quedarán diez, y dos del campo, los cuales se han escondido en el bosque[a] y en las hendiduras de las peñas.
  rationale: Se ajusta la conjunción inicial a un español más natural («Pues») y se corrige la nota al pie para que no introduzca un plural no apoyado por silva. El texto principal permanece sustancialmente igual porque ya era fiel y claro.
