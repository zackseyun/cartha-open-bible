base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/016/029.yaml
  text: For ten will be left from a city[a], and two from the countryside, who have hidden themselves in the forest and in clefts of the rocks.
  footnotes:
  - marker: a
    text: Or 'in thick groves'.
    reason: previous_rendering
  revision_pass:
