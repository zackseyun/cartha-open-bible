    issue: Construcción poco natural en «dos o tres horas antes la rodean dolores de parto en su vientre»
    rationale: 'Aunque semánticamente entendible, el orden y la combinación «la rodean ... en su vientre» suenan forzados en español. Una forma más fluida mantiene la imagen: «dolores de parto rodean su vientre».'
  - severity: medium
    issue: La nota al pie no refleja la alternativa textual relevante
    rationale: El audit trail inglés conserva como nota la lectura previa «for two or three hours». La nota española actual («con dos o tres horas de anticipación») no presenta una alternativa distinta, sino casi el mismo sentido del texto principal.
  - severity: low
    issue: Puntuación algo pesada con punto y coma antes de «y cuando»
    rationale: Una coma mantiene mejor el flujo comparativo del versículo en español.
  revised_spanish_text: Como cuando una mujer embarazada está en el noveno mes, cuando se acerca la hora de su parto, dos o tres horas antes[a] dolores de parto rodean su vientre, y cuando el niño sale del vientre, no se demora ni un solo instante,
  revised_footnotes:
  - marker: a
    text: 'O: «por dos o tres horas».'
    reason: Preserva la alternativa previa documentada en el historial inglés, aunque el sentido preferible por el latín es «dos o tres horas antes».
  revision_rationale: 'Se ajusta la sintaxis para un español más natural sin perder la imagen corporal del latín, se simplifica la puntuación, y se corrige la nota para que conserve la alternativa verdaderamente relevante del historial de revisión: duración frente a anterioridad.'
