  text: quemadmodum praegnans in nono mense filium suum inadpropinquante hora partus eius, ante horas duas vel tres gementes dolores circum ventrem eius, et prodiente infante de ventre non tardabit uno puncto,
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/016/039.yaml
  text: As when a pregnant woman in the ninth month[a], when the hour of her delivery draws near, two or three hours beforehand labor pains surround her womb, and when the child comes forth from the womb, it does not delay a single moment,
  footnotes:
  - marker: a
    text: Or 'for two or three hours'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:29:52Z'
    unchanged: false
    changes_summary: 'Improved natural English and lexical precision: changed ''a woman with child'' to ''a pregnant woman,'' ''great pains'' to ''labor pains,'' and added a comma after ''womb'' for clarity. Kept the verse structure and all source elements.'
translation:
  language: es
  text: Como cuando una mujer embarazada está en el noveno mes, cuando se acerca la hora de su parto, dos o tres horas antes[a] dolores de parto rodean su vientre, y cuando el niño sale del vientre, no se demora ni un solo instante,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por dos o tres horas».'
    reason: Preserva la alternativa previa documentada en el historial inglés, aunque el sentido preferible por el latín es «dos o tres horas antes».
lexical_decisions:
- source_word: praegnans
  english_pob_choice: pregnant woman
  chosen_spanish: una mujer embarazada
  alternatives_spanish:
  - una mujer preñada
  - una mujer encinta
  lexicon: praegnans
  rationale: Embarazada es la forma más natural y digna en español actual; conserva el sentido físico sin el matiz potencialmente marcado de preñada, y evita encinta por sonar más literario o arcaizante.
- source_word: in nono mense
  english_pob_choice: in the ninth month
  chosen_spanish: en el noveno mes
  alternatives_spanish:
  - del noveno mes
  - al noveno mes
  lexicon: nono mense
  rationale: La expresión temporal se mantiene de forma directa y transparente, sin añadir ni quitar contenido.
- source_word: ante horas duas vel tres
  english_pob_choice: two or three hours beforehand
  chosen_spanish: dos o tres horas antes
  alternatives_spanish:
  - con dos o tres horas de anticipación
  - dos o tres horas previamente
  lexicon: ante horas duas vel tres
  rationale: ante exige anterioridad, no duración; antes comunica con claridad que los dolores empiezan antes del parto, siguiendo la corrección del audit trail inglés.
- source_word: gementes dolores
  english_pob_choice: labor pains
  chosen_spanish: dolores de parto
  alternatives_spanish:
  - dolores de labor
  - dolores de alumbramiento
  lexicon: gementes dolores
  rationale: La combinación latina describe dolores del trabajo de parto; 'dolores de parto' es idiomático, claro y fiel. 'Dolores de labor' sería menos natural en español.
- source_word: circum ventrem eius
  english_pob_choice: surround her womb
  chosen_spanish: la rodean en su vientre
  alternatives_spanish:
  - rodean su vientre
  - la cercan en su vientre
  lexicon: circum ventrem eius
  rationale: '''Vientre'' conserva el órgano/lugar corporal del texto latino y evita sustituirlo por una explicación más amplia. La construcción española mantiene la imagen de los dolores que cercan la matriz/vientre.'
- source_word: prodiente infante de ventre
  english_pob_choice: when the child comes forth from the womb
  chosen_spanish: cuando el niño sale del vientre
  alternatives_spanish:
  - cuando sale el niño del vientre
  - cuando el infante sale del vientre
  lexicon: prodiente infante de ventre
  rationale: '''Niño'' es natural y suficientemente exacto; ''infante'' puede sonar técnico o ambiguo en español. ''Sale del vientre'' reproduce la salida del nacimiento sin añadir interpretaciones.'
- source_word: non tardabit uno puncto
  english_pob_choice: it does not delay a single moment
  chosen_spanish: no se demora ni un solo instante
  alternatives_spanish:
  - no tarda ni un instante
  - no se detiene ni un momento
  lexicon: non tardabit uno puncto
  rationale: La idea es de ausencia total de demora; 'ni un solo instante' transmite con fuerza el 'uno puncto' latino y mantiene el paralelismo estilístico del versículo.
theological_decisions:
- issue: Imagen del parto como comparación profética de rapidez y certeza
  english_pob_reading: As when a pregnant woman ... it does not delay a single moment
  chosen_spanish_reading: Como cuando una mujer embarazada ... no se demora ni un solo instante
  alternative_spanish_readings:
  - Así como una mujer embarazada ... no tarda nada
  - Como una mujer embarazada ... no se detiene ni un momento
  rationale: El pasaje usa una comparación concreta de parto para comunicar inmediatez. La traducción conserva la imagen sin suavizarla ni espiritualizarla, porque el texto fuente es físico y directo.
  doctrine_reference: No aplica una doctrina específica; mantiene la imaginería corporal del texto apocalíptico.
translation_notes:
  revision_awareness: 'Se corrigió la lectura temporal según el audit trail inglés: ante horas duas vel tres significa anterioridad, no duración. Por eso se tradujo como ''dos o tres horas antes'' y se ancló la nota solo en el texto donde aparece la expresión temporal.'
  spanish_consistency_notes:
  - Se mantuvo 'vientre' para conservar el campo corporal del original latino.
  - Se evitó 'SEÑOR', 'Cristo' y otras terminologías no presentes en este versículo.
  - El registro es bíblico y sobrio, con puntuación española estándar y cadencia de una sola oración larga, fiel al original.
