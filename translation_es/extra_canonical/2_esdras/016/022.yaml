  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: ecce erit annonae vilitas in brevi super terram, ut putent sibi esse directam pacem. tunc superflorescent mala super terram, gladius et famis.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/016/022.yaml
  text: 'Behold[16:22], grain will soon be cheap upon the earth, so that they will think peace has been secured for them[a]. Then evils will spring up upon the earth: sword and famine.'
  footnotes:
  - marker: '16:22'
    text: The chapter's Latin tradition contains a duplicated block of material around verses 22–35. The present translation follows the fuller sequence once, rather than repeating the same judgments twice in English.
    reason: compositional_layer
  - marker: a
    text: 'Or ''there will be cheapness of grain upon the earth, so that they will think peace has been set straight for them; and then evils will spring up upon the earth: sword, famine, and great confusion.''.'
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:29:49Z'
    unchanged: false
    changes_summary: Changed 'has been established' to 'has been secured' for a closer, more natural rendering of directam pacem, and adjusted punctuation/capitalization for smoother English flow.
translation:
  language: es
  text: 'He aquí que pronto el grano estará barato en la tierra, de modo que pensarán que la paz ha sido asegurada para ellos. Entonces surgirán males en la tierra: espada y hambre.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ecce
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - He aquí
  lexicon: interjección de atención
  rationale: He aquí reproduce la llamada de atención profética con registro digno y bíblico en español, sin forzar un coloquialismo moderno.
- source_word: erit annonae vilitas
  english_pob_choice: grain will soon be cheap
  chosen_spanish: habrá baratura de grano
  alternatives_spanish:
  - el grano estará barato
  - habrá abundancia de grano con precios bajos
  lexicon: annona / vilitas
  rationale: Baratura conserva el sentido económico de vilitas sin añadir exceso interpretativo; 'de grano' mantiene el objeto del sustantivo latino.
- source_word: in brevi
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - en breve
  - dentro de poco
  lexicon: temporal adverbial
  rationale: Pronto es natural y fiel al valor temporal explícito de in brevi.
- source_word: directam pacem
  english_pob_choice: peace has been secured
  chosen_spanish: la paz ha sido asegurada
  alternatives_spanish:
  - la paz ha sido establecida
  - la paz les ha sido asegurada
  lexicon: pacem + directam
  rationale: '''Asegurada'' expresa bien la idea de una paz fijada o garantizada; evita una calca demasiado rígida de ''directam'' y conserva la relación con la confianza errónea del versículo.'
- source_word: superflorescent mala
  english_pob_choice: evils will spring up
  chosen_spanish: surgirán males
  alternatives_spanish:
  - brotarán males
  - aparecerán males
  lexicon: superfloresco
  rationale: '''Surgirán'' comunica la imagen de algo que brota o aparece repentinamente sin sonar forzado en español.'
- source_word: gladius et famis
  english_pob_choice: sword and famine
  chosen_spanish: espada y hambre
  alternatives_spanish:
  - guerra y hambre
  - espada y escasez
  lexicon: formula de juicios
  rationale: '''Espada y hambre'' sigue de cerca el binomio latino y preserva el lenguaje profético tradicional, con la contundencia literal del original.'
theological_decisions:
- issue: Paz aparente antes de los juicios
  english_pob_reading: so that they will think peace has been secured for them
  chosen_spanish_reading: de modo que pensarán que la paz ha sido asegurada para ellos
  alternative_spanish_readings:
  - para que crean que su paz está asegurada
  - de modo que pensarán que ya se les ha asegurado la paz
  rationale: 'La redacción conserva la ironía del texto: la paz percibida es ilusoria y precede a nuevos males. No se suaviza esa tensión.'
  doctrine_reference: escatología profética; juicio súbito tras falsa seguridad
- issue: Ausencia de adición interpretativa en la lista final
  english_pob_reading: 'Then evils will spring up upon the earth: sword and famine.'
  chosen_spanish_reading: 'Entonces surgirán males sobre la tierra: espada y hambre.'
  alternative_spanish_readings:
  - 'entonces brotarán males sobre la tierra: espada y hambre'
  - 'luego vendrán males sobre la tierra: espada y hambre'
  rationale: Se evita añadir 'gran confusión' porque no está en el testimonio latino base suministrado. Esto preserva la integridad textual y la distinción entre el texto base y tradiciones duplicadas.
  doctrine_reference: crítica textual; fidelidad al testimonio base
translation_notes:
  revision_awareness: La versión inglesa auditada corrigió una omisión temporal ('soon') y eliminó una adición no atestiguada ('great confusion'). La presente redacción española incorpora 'pronto' y mantiene solo 'espada y hambre', sin reproducir la adición descartada. También evita depender de la formulación inglesa anterior y sigue directamente el latín limpio proporcionado.
  spanish_consistency_notes:
  - Se mantiene 'paz' sin sustituciones litúrgicas innecesarias.
  - '''Baratura'' se usa en sentido económico, no moral.'
  - No se introducen notas al pie porque no hay lectura alternativa necesaria que deba anclarse en el texto español.
