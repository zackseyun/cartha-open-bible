translation:
  language: es
  text: la justicia reinará sobre nosotros[a]. No diga el pecador que no ha pecado,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque, mira, dentro de muy poco la iniquidad será quitada de la tierra, y la justicia reinará sobre nosotros».'
    reason: alternative_reading
lexical_decisions:
- source_word: iusticia
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  lexicon: δικαιοσύνη / iustitia
  rationale: En este contexto escatológico-jurídico, la forma natural y fiel en español es «justicia». Mantiene el sentido de orden recto y gobierno justo sin introducir una paráfrasis moral excesiva.
- source_word: regnabit in nos
  english_pob_choice: will reign over us
  chosen_spanish: reinará sobre nosotros
  alternatives_spanish:
  - reinará en nosotros
  - se enseñoreará de nosotros
  lexicon: regnare
  rationale: «Reinará sobre nosotros» reproduce con claridad el valor de dominio/gobierno del verbo latino y conserva la relación preposicional de la frase.
- source_word: Non dicat peccator non se peccasse
  english_pob_choice: Let not the sinner say that he has not sinned
  chosen_spanish: No diga el pecador que no ha pecado
  alternatives_spanish:
  - Que el pecador no diga que no ha pecado
  - 'No diga el pecador: No he pecado'
  lexicon: dicere / peccator / peccare
  rationale: La construcción exhortativa se vierte de modo idiomático en español con «No diga...». «Ha pecado» preserva el perfectivo del latín sin volverlo mecánico.
theological_decisions:
- issue: Tono escatológico de «reinará sobre nosotros»
  english_pob_reading: righteousness will reign over us
  chosen_spanish_reading: la justicia reinará sobre nosotros
  alternative_spanish_readings:
  - la justicia gobernará sobre nosotros
  - la rectitud reinará sobre nosotros
  rationale: Se conserva la expectativa de un dominio futuro de la justicia, sin suavizarlo a una mera influencia moral. No se introduce lenguaje doctrinal ajeno al enunciado.
  doctrine_reference: escatología / justicia divina
- issue: Exhortación contra la negación del pecado
  english_pob_reading: Let not the sinner say that he has not sinned
  chosen_spanish_reading: No diga el pecador que no ha pecado
  alternative_spanish_readings:
  - Que el pecador no diga que no ha pecado
  - Ningún pecador diga que no ha pecado
  rationale: La formulación mantiene la advertencia moral directa del texto y evita diluir la afirmación en un consejo genérico. No se añade confesionalidad explícita que el latín no requiere.
  doctrine_reference: pecado humano / confesión de pecado
translation_notes:
  revision_awareness: 'La nota de revisión del inglés indica que el viejo draft mezclaba la versificación y traducía un tramo distinto del latín. Este español sigue únicamente el segmento latino proporcionado: «iusticia regnabit in nos. Non dicat peccator non se peccasse,» y no incorpora la cláusula de ‘dentro de muy poco’ salvo como lectura alternativa heredada de la nota inglesa.'
  spanish_consistency_notes:
  - Se mantuvo «justicia» como equivalente principal de iusticia, coherente con el uso bíblico y más natural en español que «rectitud» en una frase de realeza escatológica.
  - Se conservó la exhortación en segunda parte con estructura imperativa negativa, que en español transmite bien el valor exhortativo del latín.
  - No se usó «SEÑOR» ni terminología cristológica, porque el pasaje latino no contiene esos elementos.
