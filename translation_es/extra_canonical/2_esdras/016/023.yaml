  glossary_alignment: 'No hay términos del glosario principal en juego que entren en conflicto. Las decisiones léxicas registradas son coherentes con el proyecto: «la espada» y «hambre» son adecuadas, y «dispersará» preserva correctamente el valor de dispersión en vez de sustituirlo por «destruirá».'
