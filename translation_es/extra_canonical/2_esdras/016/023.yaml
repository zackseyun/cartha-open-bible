translation:
  language: es
  text: Y perderán la vida sobre la tierra[a], y la espada dispersará a los que sobrevivan al hambre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque muchos de los que habitan la tierra morirán de hambre, y la espada destruirá a los que sobrevivan al hambre».'
    reason: previous_rendering
lexical_decisions:
- source_word: et aporiant vitam
  english_pob_choice: they will lose their lives
  chosen_spanish: perderán la vida
  alternatives_spanish:
  - carecerán de vida
  - perderán la existencia
  lexicon: aporio
  rationale: El latín transmitido sugiere carencia o pérdida de vida; en español, «perderán la vida» expresa con naturalidad el resultado mortal sin introducir una causa distinta.
- source_word: super terram
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la faz de la tierra
  lexicon: super + terra
  rationale: «Sobre la tierra» conserva el valor locativo del latín y coincide con el registro bíblico sin volverlo más interpretativo.
- source_word: gladius
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - el espada
  lexicon: gladius
  rationale: La equivalencia directa y estable en español bíblico es «la espada».
- source_word: dispersit quae superaverint a fame
  english_pob_choice: will scatter those who survive the famine
  chosen_spanish: dispersará a los que sobrevivan al hambre
  alternatives_spanish:
  - dispersará a los que hayan sobrevivido al hambre
  - dispersará a los que queden del hambre
  lexicon: dispergo + supero + fames
  rationale: El latín testimoniado usa un verbo de dispersión; en español, «dispersará» mantiene ese valor. «Los que sobrevivan al hambre» preserva el participio relativo y la relación con «hambre» sin añadir destrucción no presente en el texto fuente.
theological_decisions:
- issue: Relación entre muerte por hambre y acción de la espada
  english_pob_reading: And they will lose their lives upon the earth, and the sword will scatter those who survive the famine.
  chosen_spanish_reading: Y perderán la vida sobre la tierra, y la espada dispersará a los que sobrevivan al hambre.
  alternative_spanish_readings:
  - Y muchos perderán la vida sobre la tierra, y la espada destruirá a los que sobrevivan al hambre.
  - Y morirán sobre la tierra, y la espada hará huir a los que escapen del hambre.
  rationale: La revisión auditada corrigió una versión basada en otra variante latina. El texto recibido no dice que la espada destruya ni que haga huir; dice que dispersa. Mantener «dispersará» evita borrar la tensión semántica del testimonio latino.
  doctrine_reference: No aplica; decisión textual y lexical, no doctrinal.
translation_notes:
  revision_awareness: Se revisó el pasaje a partir del texto latino crítico suministrado (et aporiant vitam super terram, et gladius dispersit quae superaverint a fame), corrigiendo una lectura previa basada en otra variante latina que hablaba de muchos que mueren por hambre y de la espada que destruye a los sobrevivientes. La redacción española sigue la forma auditada y conserva la fuerza de «dispersar» para gladius dispersit.
  spanish_consistency_notes:
  - Se conservó «hambre» para fames, en lugar de «famine», por naturalidad bíblica en español.
  - Se usó el futuro simple en ambas proposiciones para reflejar la lectura futura de la traducción inglesa POB y mantener paralelismo.
  - Se evitó «destruirá» porque el latín recibido dice «dispersit» y no exige ese matiz.
