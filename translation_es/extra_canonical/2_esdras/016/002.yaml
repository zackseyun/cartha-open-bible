review_pass:
  verdict: revise
  source_alignment_summary: 'El latín dice: «dolete eos, quoniam adpropinquauit contritio uestra» = «Lamenten/duélanse por ellos, porque vuestra destrucción/ruina se ha acercado». El borrador acierta en dolete, eos, contritio y adpropinquavit en líneas generales, pero cambia indebidamente el posesivo de segunda persona plural «uestra» a tercera persona «su», lo que altera el destinatario del oráculo.'
  spanish_quality_summary: 'El español es claro y natural, pero «Lloren» puede quedarse algo estrecho frente a dolete, que expresa lamento/duelo más que mero llanto. Además, la combinación «Lloren por ellos» funciona, aunque «Laméntense por ellos» refleja mejor el registro solemne. La nota actual también desplaza el problema léxico: la variante más importante no es «ruina» frente a «destrucción», sino el posesivo «vuestra».'
  glossary_alignment: 'No hay términos del glosario mayor en juego. «Destrucción» concuerda con la decisión auditada para contritio. Debe preservarse el posesivo de segunda persona plural: «vuestra destrucción».'
  issues:
  - severity: high
    issue: 'Cambio de persona gramatical: «su destrucción» en lugar de «vuestra destrucción».'
    rationale: El latín «uestra» es inequívocamente de segunda persona plural. Pasar a tercera persona cambia quién está siendo advertido y debilita la fuerza profética directa del texto.
  - severity: medium
    issue: «Lloren» reduce el campo semántico de dolete.
    rationale: Dolete en este contexto profético expresa lamento/duelo, no solo derramar lágrimas. «Laméntense» o «Hágan duelo» conserva mejor el sentido y el tono.
  - severity: low
    issue: La nota al pie no prioriza la alternativa más relevante del texto.
    rationale: Si se conserva una nota, debe apoyar una alternativa semántica real como «ruina» para contritio, pero el borrador deja sin corregir el problema mayor del posesivo.
  revised_spanish_text: Laméntense por ellos[a], porque vuestra destrucción se ha acercado.
  revised_footnotes:
  - marker: a
    text: O «por ellos hagan duelo».
    reason: alternative_rendering_of_dolete
