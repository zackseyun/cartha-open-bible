lexical_decisions:
- source_word: dolete
  english_pob_choice: Mourn
  chosen_spanish: Lloren
  alternatives_spanish:
  - Hagan duelo
  - Lloren de duelo
  lexicon: doleo
  rationale: El imperativo latino pide una respuesta de lamento o duelo. En español, «Lloren» comunica el peso emocional y el tono profético sin añadir una perífrasis más larga que el breve original.
- source_word: eos
  english_pob_choice: them
  chosen_spanish: por ellos
  alternatives_spanish:
  - por ellos
  - por estos
  lexicon: is, ea, id
  rationale: El pronombre latino se refiere a personas previamente implícitas en el contexto. «Por ellos» mantiene la referencia natural en español y preserva el objeto del duelo.
- source_word: contritio
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - quebrantamiento
  lexicon: contritio
  rationale: La revisión inglesa documenta que aquí contritio funciona como «destruction» o «ruin» en registro profético/apocalíptico. «Destrucción» conserva ese sentido solemne y evita el calco etimológico demasiado literal de «aplastamiento».
- source_word: adpropinquauit
  english_pob_choice: has drawn near
  chosen_spanish: se ha acercado
  alternatives_spanish:
  - está cerca
  - se ha aproximado
  lexicon: appropinquo
  rationale: El perfecto latino expresa proximidad ya efectiva. «Se ha acercado» reproduce esa cercanía consumada con un giro natural en español bíblico contemporáneo.
theological_decisions:
- issue: Alcance de la catástrofe anunciada
  english_pob_reading: your destruction
  chosen_spanish_reading: su destrucción
  alternative_spanish_readings:
  - vuestra destrucción
  - su ruina
  rationale: Se mantiene la advertencia directa de juicio/calamidad sin suavizarla. «Su» permite un español natural y abarca tanto un destinatario singular colectivo como plural según el contexto de la sección.
  doctrine_reference: Juicio profético y calamidad inminente en literatura apocalíptica
translation_notes:
  revision_awareness: La revisión inglesa eliminó material no atestiguado por el latín proporcionado y fijó el sentido de contritio como «destruction» en vez de «crushing». La versión española sigue ese estado revisado, sin introducir elementos ausentes del texto fuente.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o «Cristo» porque no aparecen en este versículo.
  - «Destrucción» sigue la decisión auditada del inglés; no se usa un equivalente demasiado etimológico como «aplastamiento».
  - El imperativo breve «Lloren» conserva la concisión del latín y el tono exhortativo profético.
