  to: Laméntense por ellos[a], porque vuestra destrucción se ha acercado.
  rationale: Se corrige «su» por «vuestra» para reflejar fielmente el latín «uestra». Se ajusta «Lloren» a «Laméntense» para representar mejor dolete en registro profético solemne. Se mantiene «destrucción» conforme a la decisión auditada sobre contritio. La nota se reasigna al verbo, donde existe una alternativa española natural relevante.
