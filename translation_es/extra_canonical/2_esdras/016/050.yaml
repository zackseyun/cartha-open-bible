review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el latín y la auditoría inglesa en casi todo: conserva la progresión comparativa de magis, refleja adzelabor con un sentido de celo adversativo, mantiene la causa por sus pecados y preserva el Quomodo final como frase suspendida. Sin embargo, la puntuación final no refleja bien el fragmento incompleto: el inglés auditado deja ''How'' sin cerrar, y el latín solo aporta Quomodo como arranque del siguiente pensamiento, no una pregunta completa independiente.'
  spanish_quality_summary: El español es claro y digno, pero '¿Cómo?' suena como una pregunta autónoma completa, más marcada de lo que sugiere el fragmento. También 'me mostraré celoso contra ellos' es comprensible, aunque algo tieso; 'tendré celo contra ellos' sería menos idiomático. La redacción actual es aceptable salvo por la puntuación del cierre.
  glossary_alignment: No hay conflicto grave con la terminología del proyecto. 'Señor' es defendible porque la fuente inmediata latina tiene dominus, no el tetragrámaton; no hace falta forzar 'Yahvé' aquí. 'Pecados' y el valor de celo/zeal están bien preservados.
  issues:
  - severity: medium
    issue: La puntuación de '¿Cómo?' convierte Quomodo en una pregunta completa.
    rationale: La evidencia fuente y la auditoría inglesa muestran un fragmento truncado ('How'), no una interrogación autosuficiente. En español conviene dejar 'Cómo' sin signo de cierre interrogativo para reflejar que continúa en el siguiente segmento.
  revised_spanish_text: Cuanto más me mostraré celoso contra ellos por sus pecados, dice el Señor. Cómo
  revision_rationale: Se elimina la interrogación para reflejar con mayor fidelidad que Quomodo inicia una continuación fragmentaria del siguiente enunciado, tal como en el latín y en la auditoría inglesa.
