    timestamp: '2026-04-23T20:30:24Z'
    unchanged: false
    changes_summary: Revised 'be angry with' to 'be zealous against' to reflect Latin adzelabor more closely, and added the omitted final 'How' (Quomodo).
translation:
  language: es
  text: Cuanto más me mostraré celoso contra ellos por sus pecados, dice el Señor. Cómo
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: magis
  english_pob_choice: the more
  chosen_spanish: Cuanto más
  alternatives_spanish:
  - más
  - cuanto mayor
  lexicon: more/comparative degree
  rationale: El comparativo latino magis se conserva de forma natural con «Cuanto más», que mantiene la progresión intensiva del enunciado.
- source_word: adzelabor
  english_pob_choice: I will be zealous against them
  chosen_spanish: me mostraré celoso contra ellos
  alternatives_spanish:
  - seré celoso contra ellos
  - me entregaré con celo contra ellos
  lexicon: be zealous / zeal against
  rationale: La revisión inglesa corrigió de «angry with» a «zealous against» para reflejar adzelabor. En español, «me mostraré celoso contra ellos» comunica el celo activo y adversativo sin perder el tono bíblico.
- source_word: eos
  english_pob_choice: them
  chosen_spanish: ellos
  alternatives_spanish:
  - a ellos
  - los
  lexicon: them
  rationale: Pronombre de tercera persona plural mantenido de manera directa y clara.
- source_word: super
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - sobre
  lexicon: over/about/because of
  rationale: En este contexto de culpa y reprensión, «por» expresa la causa o motivo ligado a los pecados, coherente con la lectura inglesa revisada.
- source_word: peccata
  english_pob_choice: their sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - sus faltas
  - sus delitos
  lexicon: sins
  rationale: «Pecados» es el equivalente más directo y teológicamente fiel al latín peccata.
- source_word: dicit dominus
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - declara el Señor
  - dice Yahvé
  lexicon: says the Lord
  rationale: Se conserva la fórmula profética breve de cierre. Aunque el proyecto normalmente usa «Yahvé» para el nombre divino, aquí el texto fuente latino tiene dominus y la fórmula inglesa auditada usa «the Lord»; se mantiene la cita profética tradicional en español para reflejar el registro del original y del auditor.
- source_word: Quomodo
  english_pob_choice: How
  chosen_spanish: ¿Cómo?
  alternatives_spanish:
  - ¿De qué manera?
  - ¿Cómo será esto?
  lexicon: How
  rationale: Se traduce la partícula interrogativa final de forma literal y breve, respetando que el fragmento queda suspendido en el verso.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: se corrigió la idea de ira por «celo» para reflejar adzelabor y se incluyó el final interrogativo «Quomodo» como «¿Cómo?». No se añadieron notas porque no había alternativas textuales o doctrinales que requirieran marcadores en el verso.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» en mayúsculas como convención de máscara editorial; aquí «el Señor» reproduce la fórmula profética tradicional del audit trail sin ocultar el título del latín dominus.
  - Se mantuvo «celoso/celo» en lugar de «airado» porque la revisión inglesa adjudicó esa preferencia lexical a partir de adzelabor.
  - La interrogativa final se dejó abierta con signo de apertura y cierre para reflejar el quiebro del fragmento latino.
