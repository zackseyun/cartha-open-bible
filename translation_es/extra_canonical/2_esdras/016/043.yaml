translation:
  language: es
  text: y el que compra, como quien está a punto de perder; y el que comercia, como quien no sacará ganancia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: emit
  english_pob_choice: buys
  chosen_spanish: compra
  alternatives_spanish:
  - adquiere
  - compra para sí
  lexicon: Latin emit
  rationale: El latín emit significa ‘compra’; en español, ‘compra’ es la forma más directa y natural, y preserva el paralelismo de la cláusula.
- source_word: perditurus
  english_pob_choice: about to lose
  chosen_spanish: está por perder
  alternatives_spanish:
  - va a perder
  - está a punto de perder
  lexicon: Latin perditurus
  rationale: perditurus expresa una pérdida inminente; ‘está por perder’ reproduce bien esa inminencia sin añadir matices extra.
- source_word: mercatur
  english_pob_choice: trades
  chosen_spanish: comercia
  alternatives_spanish:
  - negocia
  - trafica
  lexicon: Latin mercatur
  rationale: mercatur se refiere a la acción de comerciar o hacer negocios; ‘comercia’ conserva el sentido económico y el paralelismo con la primera cláusula.
- source_word: quasi
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - cual
  - igual que
  lexicon: Latin quasi
  rationale: quasi introduce comparación; ‘como’ es la equivalencia natural en español y mantiene la fuerza comparativa del texto.
- source_word: lucratur
  english_pob_choice: gain no profit
  chosen_spanish: no ganará provecho
  alternatives_spanish:
  - no obtendrá ganancia
  - no sacará provecho
  lexicon: Latin lucratur
  rationale: Aunque lucratur normalmente implica ‘ganar/obtener ganancia’, aquí el contexto del paralelo negativo en inglés POB justifica expresar la idea de no tener provecho. ‘No ganará provecho’ comunica la ausencia de ganancia con un español claro y digno.
translation_notes:
  revision_awareness: La base latina disponible en este versículo es breve y ya fue corregida en la revisión inglesa para ajustar emit = ‘buys’ y perditurus = ‘about to lose’; la versión española sigue esa adjudicación y no reintroduce la cláusula ajena sobre construir y habitar, ausente del testimonio latino proporcionado.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, sin archaismos innecesarios.
  - Se conserva el paralelismo sintáctico de dos miembros coordinados con ‘y’.
  - No se introduce ‘Cristo’, ‘SEÑOR’ ni otra terminología doctrinal porque el versículo no lo requiere.
