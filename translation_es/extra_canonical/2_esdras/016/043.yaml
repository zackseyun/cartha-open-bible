review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el latín conservado y la corrección del English POB: emit = «compra», perditurus = pérdida inminente, mercatur = «comercia». Sin embargo, la segunda cláusula introduce un futuro explícito («no ganará») que no está exigido por el segmento inglés «will gain no profit» ni por el estilo más condensado del pasaje; en español suena más natural y más paralelo expresar la falta de ganancia como estado/resultando esperado.'
  spanish_quality_summary: El texto es claro y legible, pero «como uno que» resulta algo calcado y pesado en ambas cláusulas. «Como quien» suena más idiomático y digno en español bíblico moderno. Además, «está por perder» es comprensible, pero «está a punto de perder» expresa la inminencia con mayor naturalidad panhispánica.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son correctas: «compra» para emit y «comercia» para mercatur. Conviene ajustar la expresión de perditurus a un español más natural y la ausencia de ganancia a «sin sacar ganancia» para reflejar mejor el sentido económico.'
  issues:
  - severity: medium
    issue: «como uno que» suena rígido y poco natural
    rationale: Aunque comprensible, es una estructura más calcada del inglés; «como quien» mantiene el paralelismo y mejora la fluidez en español.
  - severity: low
    issue: «está por perder» es menos natural que alternativas disponibles
    rationale: La frase transmite inminencia, pero «está a punto de perder» es más idiomática en español general sin alterar el sentido.
  - severity: medium
    issue: «no ganará provecho» suena algo abstracto y menos preciso para mercatur
    rationale: En contexto comercial, «sin sacar ganancia» o «sin obtener ganancia» representa mejor la idea de falta de provecho económico y evita una formulación futurizada menos natural.
  revised_spanish_text: y el que compra, como quien está a punto de perder; y el que comercia, como quien no sacará ganancia.
  revision_rationale: 'Se hicieron ajustes de estilo y precisión semántica sin cambiar el sentido: «como quien» mejora la naturalidad; «está a punto de perder» expresa con más claridad la inminencia de perditurus; y «no sacará ganancia» refleja mejor el ámbito comercial de mercatur/lucrum que «no ganará provecho».'
