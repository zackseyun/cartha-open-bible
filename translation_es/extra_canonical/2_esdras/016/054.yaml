review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del latín y el cierre «Ecce dominus cognoscit». Sin embargo, falla en el punto central ya documentado en la auditoría inglesa: «conburet» es futuro singular transitivo, no un plural intransitivo con «carbones/brasas» como sujeto. Por eso «brasas de fuego quemarán sobre la cabeza» no refleja fielmente la sintaxis ni el sentido más probable del original. La frase debe repararse para expresar que alguien implícito quema o hace caer brasas sobre la cabeza del que niega su pecado.'
  spanish_quality_summary: El español es legible, pero «brasas de fuego quemarán sobre la cabeza» suena poco natural y gramaticalmente forzado. También el pie de nota actual preserva precisamente esa lectura problemática. El resto del versículo es claro y digno; «No he pecado delante de Dios y de su gloria» y «He aquí, el Señor sabe» son aceptables.
  glossary_alignment: No hay conflicto grave de glosario salvo la decisión contextual de «el Señor» para dominus en un texto latino, que es defendible. «Brasas de fuego» es buena opción léxica para carbones ignis. El problema no es terminológico sino sintáctico-semántico en la representación de conburet.
  issues:
  - severity: high
    issue: El verbo principal está mal representado como plural con «brasas» como sujeto.
    rationale: El latín «conburet» es futuro singular activo y transitivo. La auditoría inglesa ya señaló que «carbones ignis» funciona como objeto directo, no como sujeto nominativo. El español «quemarán» altera el sentido fuente.
  - severity: medium
    issue: La construcción «quemarán sobre la cabeza» es poco natural en español.
    rationale: Aun si se mantuviera la imagen, en español esta combinación verbal-preposicional suena extraña. Una formulación como «hará arder brasas de fuego sobre la cabeza» o «quemará brasas de fuego sobre la cabeza» comunica mejor la transitividad.
  - severity: medium
    issue: La nota [a] conserva una alternativa basada en la lectura errónea.
    rationale: El pie de nota debe ajustarse para no seguir respaldando la sintaxis incorrecta ya descartada por la evidencia fuente.
  revised_spanish_text: 'Porque hará arder brasas de fuego sobre la cabeza del que dice[a]: «No he pecado delante de Dios y de su gloria». He aquí, el Señor sabe.'
  revised_footnotes:
  - marker: a
    text: O «pues hará arder brasas de fuego sobre la cabeza».
    reason: previous_rendering
  revision_rationale: 'Se corrige el error principal de alineación con el latín: el verbo debe expresarse como singular transitivo, no con «brasas» como sujeto plural. «Hará arder brasas de fuego» mantiene la imagen de juicio y produce un español natural sin introducir una paráfrasis extensa. Se conserva el resto del versículo, incluida la formulación «el Señor», que es aceptable para dominus en esta fuente latina.'
