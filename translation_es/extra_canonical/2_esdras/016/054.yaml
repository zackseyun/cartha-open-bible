source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'quoniam carbones ignis conburet super caput eius qui dicit: non peccaui coram deo et gloria ipsius. Ecce dominus cognoscit'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/016/054.yaml
  text: For coals of fire will burn upon the head of the one who says[a], “I have not sinned before God and his glory.” Behold, the Lord knows.
  footnotes:
  - marker: a
    text: Or 'for coals of fire will burn upon the head'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:30:25Z'
    unchanged: false
    changes_summary: Replaced the interpretive opening ('Let not the sinner say...') with a direct rendering of the Latin quoniam clause, preserved the future verb, and restored the omitted final words 'Behold, the Lord knows.'
translation:
  language: es
  text: 'Porque hará arder brasas de fuego sobre la cabeza del que dice[a]: «No he pecado delante de Dios y de su gloria». He aquí, el Señor sabe.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pues hará arder brasas de fuego sobre la cabeza».
    reason: previous_rendering
lexical_decisions:
- source_word: quoniam
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: conjunción causal
  rationale: El latín introduce la afirmación como causa o explicación; «Porque» conserva el enlace lógico sin volver la frase más interpretativa de lo necesario.
- source_word: carbones ignis
  english_pob_choice: coals of fire
  chosen_spanish: brasas de fuego
  alternatives_spanish:
  - carbones de fuego
  - ascuas de fuego
  lexicon: sustantivo compuesto
  rationale: «Brasas» comunica de modo natural la imagen de carbón encendido o brasa ardiente en español bíblico contemporáneo. Mantiene la fuerza figurativa del latín sin sonar arcaico.
- source_word: conburet
  english_pob_choice: will burn
  chosen_spanish: quemarán
  alternatives_spanish:
  - quemará
  - consumirá
  lexicon: verbo futuro activo
  rationale: El latín tiene un verbo futuro singular con sujeto implícito. En español, el verbo debe concordar con el sujeto plural implícito «brasas de fuego» si se expresa así; aun así, la imagen admite que el agente real es el Señor. «Quemarán» conserva la imagen directa del fuego sin forzar el sujeto agente.
- source_word: super caput eius
  english_pob_choice: upon the head of the one
  chosen_spanish: sobre la cabeza del que
  alternatives_spanish:
  - encima de la cabeza de quien
  - sobre la cabeza del hombre que
  lexicon: locución preposicional
  rationale: «Sobre la cabeza» reproduce la imagen idiomática de juicio o castigo localizado en la cabeza, sin explicitar más de lo que el latín dice.
- source_word: qui dicit
  english_pob_choice: of the one who says
  chosen_spanish: del que dice
  alternatives_spanish:
  - de quien dice
  - del que afirma
  lexicon: pronombre relativo + verbo
  rationale: «Del que dice» es natural en español y mantiene el valor general del participio relativo latino, sin añadir especificación doctrinal.
- source_word: non peccaui
  english_pob_choice: I have not sinned
  chosen_spanish: No he pecado
  alternatives_spanish:
  - No he cometido pecado
  - No he faltado
  lexicon: verbo perfectivo
  rationale: «Pecado» es la equivalencia más directa y transparente de peccaui en este contexto de confesión moral ante Dios.
- source_word: coram deo et gloria ipsius
  english_pob_choice: before God and his glory
  chosen_spanish: delante de Dios y de su gloria
  alternatives_spanish:
  - ante Dios y su gloria
  - en presencia de Dios y de su gloria
  lexicon: locución adverbial + genitivo posesivo
  rationale: «Delante de» expresa presencia/comparecencia y sigue siendo idiomático en español. Se conserva «y de su gloria» para reflejar el doble objeto del latín sin suavizar la tensión de la expresión.
- source_word: Ecce
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - He aquí
  lexicon: interjección deíctica
  rationale: «He aquí» es una fórmula bíblica reconocible que conserva la fuerza deíctica de Ecce y su tono solemne.
- source_word: dominus
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: título divino
  rationale: Aunque la pauta general prefiere «Yahvé» para el Tetragrámaton, aquí el texto latino presenta dominus en una forma convencional de título divino. Dado el carácter de la frase breve y la tradición receptiva del eco bíblico, «el Señor» comunica con claridad el referente divino sin sobrecargar la línea final.
- source_word: cognoscit
  english_pob_choice: knows
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - sabe bien
  lexicon: verbo cognitivo
  rationale: «Sabe» reproduce el valor simple y afirmativo de cognoscit en un cierre sentencioso. «Conoce» sería posible, pero «sabe» suena más directo en español para esta sentencia breve.
theological_decisions:
- issue: Retribución figurada de juicio mediante fuego sobre la cabeza
  english_pob_reading: For coals of fire will burn upon the head of the one who says...
  chosen_spanish_reading: Porque brasas de fuego quemarán sobre la cabeza del que dice...
  alternative_spanish_readings:
  - Pues brasas de fuego quemarán sobre la cabeza del que dice...
  - Porque el Señor hará quemar brasas de fuego sobre la cabeza del que dice...
  rationale: Se conserva la imagen judicial sin convertirla en explicación moralizante. La versión revisada del inglés restauró la transitividad del verbo; el español mantiene la imagen de combustión sobre la cabeza sin añadir un sujeto explícito que no esté en el cierre de la cláusula.
  doctrine_reference: Juicio retributivo figurado; cf. sabiduría/poesía bíblica sobre retribución simbólica
- issue: Afirmación de inocencia ante Dios y su gloria
  english_pob_reading: I have not sinned before God and his glory.
  chosen_spanish_reading: No he pecado delante de Dios y de su gloria.
  alternative_spanish_readings:
  - No he pecado ante Dios y ante su gloria.
  - No he pecado en presencia de Dios y de su gloria.
  rationale: Se conserva la dureza de la frase sin armonizarla artificialmente. La combinación «Dios y de su gloria» refleja el doble complemento del latín, aun cuando resulte densa, porque esa densidad forma parte del testimonio textual.
  doctrine_reference: Confesión de pecado / negación culpable ante Dios
- issue: Cierre oracular sobre el conocimiento divino
  english_pob_reading: Behold, the Lord knows.
  chosen_spanish_reading: He aquí, el Señor sabe.
  alternative_spanish_readings:
  - He aquí, el Señor conoce.
  - Mira, el Señor sabe.
  rationale: Se restaura el cierre breve y solemne del texto latino, que funciona como remate profético. No se expande en explicación para preservar el tono sentencia/oráculo.
  doctrine_reference: Omnisciencia divina
translation_notes:
  revision_awareness: 'La versión inglesa revisada corrigió dos puntos clave: (1) el verbo latino conburet es singular y transitivo, por lo que la imagen no debe leerse como «las brasas quemarán» en sentido intransitivo; y (2) el texto termina con «Behold, the Lord knows», que debe mantenerse. El español sigue esa revisión y evita la apertura interpretativa anterior.'
  spanish_consistency_notes:
  - Se mantuvo «Señor» en el cierre porque el latín usa dominus como título divino; no se introdujo «Yahvé» en esta línea breve.
  - Se conservó la secuencia «delante de Dios y de su gloria» para no borrar la densidad del complemento final.
  - Se usó una nota textual para reflejar la alternativa de lectura preservada por el inglés POB, sin duplicar el significado en el cuerpo principal.
