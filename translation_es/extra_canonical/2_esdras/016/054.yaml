revisions:
- from: 'Porque brasas de fuego quemarán sobre la cabeza del que dice[a]: «No he pecado delante de Dios y de su gloria». He aquí, el Señor sabe.'
  to: 'Porque hará arder brasas de fuego sobre la cabeza del que dice[a]: «No he pecado delante de Dios y de su gloria». He aquí, el Señor sabe.'
  rationale: 'Se corrige el error principal de alineación con el latín: el verbo debe expresarse como singular transitivo, no con «brasas» como sujeto plural. «Hará arder brasas de fuego» mantiene la imagen de juicio y produce un español natural sin introducir una paráfrasis extensa. Se conserva el resto del versículo, incluida la formulación «el Señor», que es aceptable para dominus en esta fuente latina.'
