revisions:
- from: Y quedaréis avergonzados cuando vuestros pecados salgan a la luz delante de los hombres[a], y vuestras iniquidades serán las que se presenten como acusadoras en aquel día.
  to: Y quedaréis avergonzados cuando vuestros pecados salgan ante los hombres[a], y vuestras iniquidades se alzarán como acusadoras en aquel día.
  rationale: Se ajusta el verso para reflejar más de cerca processerint con 'salgan ante los hombres' y la imagen forense de stabunt con 'se alzarán como acusadoras'. La nota alternativa mantiene una opción cercana y natural en español, alineada con el matiz del original y del audit trail inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:54:41Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del latín: vergüenza pública, manifestación de los pecados ante la gente y personificación de las iniquidades como acusadoras en el día señalado. Sin embargo, dos elecciones debilitan la correspondencia directa con el texto y con el rastro POB en inglés: ''salgan a la luz'' añade un matiz idiomático no explícito en processerint, y ''serán las que se presenten como acusadoras'' atenúa la imagen más simple y forense de ''stand as accusers''.'
  spanish_quality_summary: El español es claro y digno, pero puede hacerse más natural y fiel a la vez con una formulación menos explicativa. 'Ante los hombres' suena ligeramente más bíblico-natural que 'delante de los hombres' aquí, y 'se alzarán como acusadoras' o 'estarán como acusadoras' expresa mejor la personificación judicial que 'se presenten como acusadoras'.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Iniquidades' está bien preservado. La revisión propuesta busca alinear más estrechamente el registro solemne y el valor forense documentado en el POB audit trail.
  issues:
  - severity: medium
    issue: '''salgan a la luz'' amplifica processerint'
    rationale: El latín dice que los pecados 'saldrán/comparecerán/irán adelante' ante los hombres; 'salgan a la luz' es comprensible, pero introduce un giro interpretativo más libre que la manifestación simple del original y del inglés 'come forth'.
  - severity: medium
    issue: '''serán las que se presenten como acusadoras'' debilita ''stabunt'''
    rationale: La construcción latina y la revisión inglesa finalmente fijada enfatizan que las iniquidades 'estarán/se alzarán' como acusadoras. 'Se presenten' desplaza la imagen desde estar en pie como acusadoras hacia comparecer, que no es la misma figura.
  - severity: low
    issue: La nota al pie replica la misma expansión interpretativa
    rationale: La nota alternativa conserva 'salgan delante de los hombres' pero mantiene 'serán las que se presenten como acusadoras', de modo que no ayuda a preservar la alternativa más cercana a 'stand as accusers'.
  revised_spanish_text: Y quedaréis avergonzados cuando vuestros pecados salgan ante los hombres[a], y vuestras iniquidades se alzarán como acusadoras en aquel día.
  revised_footnotes:
  - marker: a
    text: 'O: «salgan delante de los hombres, y vuestras iniquidades estarán como acusadoras».'
    reason: Preserva la alternativa de formulación registrada en el rastro inglés sin introducir una expansión innecesaria.
  revision_rationale: Se ajusta el verso para reflejar más de cerca processerint con 'salgan ante los hombres' y la imagen forense de stabunt con 'se alzarán como acusadoras'. La nota alternativa mantiene una opción cercana y natural en español, alineada con el matiz del original y del audit trail inglés.
