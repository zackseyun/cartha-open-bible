source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: confusi eritis, cum processerint peccata uestra coram hominibus, et iniquitates erint quae accusatores stabunt in die illo. Quid
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/016/066.yaml
  text: And you will be put to shame when your sins come forth before men[a], and your iniquities will stand as accusers on that day.
  footnotes:
  - marker: a
    text: Or 'come out before men, and your iniquities will stand as accusers'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:30:09Z'
    unchanged: false
    changes_summary: Removed the duplicated phrase 'in that day' and revised 'will be those that stand as accusers' to the more natural and accurate 'will stand as accusers,' while preserving the source sense.
translation:
  language: es
  text: Y quedaréis avergonzados cuando vuestros pecados salgan ante los hombres[a], y vuestras iniquidades se alzarán como acusadoras en aquel día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «salgan delante de los hombres, y vuestras iniquidades estarán como acusadoras».'
    reason: Preserva la alternativa de formulación registrada en el rastro inglés sin introducir una expansión innecesaria.
lexical_decisions:
- source_word: confusi eritis
  english_pob_choice: you will be put to shame
  chosen_spanish: quedaréis avergonzados
  alternatives_spanish:
  - seréis avergonzados
  - quedaréis en vergüenza
  lexicon: confundō / confūsus
  rationale: El latín expresa vergüenza pública o deshonra; 'quedaréis avergonzados' conserva el resultado pasivo y el tono solemne mejor que una paráfrasis más libre.
- source_word: cum processerint
  english_pob_choice: when your sins come forth
  chosen_spanish: cuando vuestros pecados salgan a la luz
  alternatives_spanish:
  - cuando vuestros pecados aparezcan
  - cuando vuestros pecados salgan
  lexicon: prodeō / processerint
  rationale: '''Processerint'' sugiere salir adelante, hacerse visibles o salir a escena; en español, ''salgan a la luz'' comunica exposición pública sin perder la imagen de manifestación.'
- source_word: coram hominibus
  english_pob_choice: before men
  chosen_spanish: delante de los hombres
  alternatives_spanish:
  - ante los hombres
  - en presencia de los hombres
  lexicon: coram + hominibus
  rationale: '''Delante de los hombres'' refleja bien la publicidad del acto y mantiene la sencillez del original.'
- source_word: iniquitates
  english_pob_choice: your iniquities
  chosen_spanish: vuestras iniquidades
  alternatives_spanish:
  - vuestras maldades
  - vuestras injusticias
  lexicon: iniquitas
  rationale: '''Iniquidades'' es el cognado más preciso y conserva el peso moral/jurídico del término latino.'
- source_word: erint quae accusatores stabunt
  english_pob_choice: will stand as accusers
  chosen_spanish: serán las que se presenten como acusadoras
  alternatives_spanish:
  - serán las que estarán como acusadoras
  - se alzarán como acusadoras
  lexicon: stare / accusator
  rationale: La construcción latina identifica a las iniquidades mismas como acusadoras; en español, 'se presenten como acusadoras' preserva esa identificación sin sonar forzado.
- source_word: in die illo
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese día
  - en ese día
  lexicon: dies ille
  rationale: '''Aquel día'' es la fórmula más natural y solemne para el día escatológico señalado por el texto.'
theological_decisions:
- issue: Publicidad del juicio y personificación de las iniquidades como acusadoras
  english_pob_reading: your iniquities will stand as accusers on that day
  chosen_spanish_reading: vuestras iniquidades serán las que se presenten como acusadoras en aquel día
  alternative_spanish_readings:
  - vuestras iniquidades estarán como acusadoras en aquel día
  - vuestras iniquidades serán acusadoras en aquel día
  rationale: 'La redacción española mantiene la personificación judicial: no solo aparecen las iniquidades, sino que ellas mismas actúan como testigos de cargo. Se evita suavizar el efecto forense del latín.'
  doctrine_reference: Escatología judicial; conciencia y exposición de obras ante el juicio divino
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail, que corrigió la repetición de 'in that day' y reforzó la lectura de las iniquidades como acusadoras directas; la versión española conserva esa intensificación sin duplicación ni atenuación.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como término habitual del proyecto solo cuando el texto lo exija; aquí no aparece.
  - '''Iniquidades'' se mantiene por fidelidad al tono jurídico-moral del latín.'
  - Se conserva el registro solemne y apocalíptico con 'aquel día' y 'delante de los hombres'.
