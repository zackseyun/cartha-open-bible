translation:
  language: es
  text: Se enciende el fuego, y no se apagará,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ignis succenditur
  english_pob_choice: Fire is kindled
  chosen_spanish: Se enciende el fuego
  alternatives_spanish:
  - El fuego se prende
  - Se prende el fuego
  lexicon: ignis = fuego; succenditur = se enciende / se prende
  rationale: La voz latina pasiva expresa que el fuego queda encendido; en español, la pasiva refleja transmite con naturalidad la acción iniciada sin perder la imagen concreta de fuego.
- source_word: non extinguetur
  english_pob_choice: it will not be quenched
  chosen_spanish: no se apagará
  alternatives_spanish:
  - no será apagado
  - no se extinguirá
  lexicon: extinguere = apagar, extinguir
  rationale: ‘Apagar’ es el verbo más natural en español para un fuego y mantiene el sentido de no poder ser sofocado. ‘Extinguirse’ es posible, pero suena más abstracto; ‘ser apagado’ es más literal pero menos idiomático.
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó una ampliación interpretativa inexistente en el latín (‘until it consumes the foundations of the earth’). Por eso el español se limita también al enunciado breve del texto fuente: encendido del fuego y su imposibilidad de ser apagado.'
  spanish_consistency_notes:
  - Se conserva el paralelismo breve de dos miembros coordinados, como en el latín y en la versión inglesa revisada.
  - No se introduce material explicativo ni duración adicional, para respetar la limpieza del texto fuente.
