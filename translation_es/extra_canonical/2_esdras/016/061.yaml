review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura principal del latín: ubicación de los lacus en lo alto de los montes, finalidad de que salgan ríos desde las alturas, y la imagen poética de la tierra como sujeto que bebe. Sin embargo, la nota al pie introduce una alternativa que contradice la revisión auditada del inglés y el sentido sintáctico de ut potaret terra, porque convierte a la tierra en objeto regado en vez de sujeto del verbo.'
  spanish_quality_summary: El español es claro, natural y digno. «Sobre las cimas de los montes» y «de modo que la tierra bebiera» funcionan bien. «Estanques» es aceptable, aunque algo más artificial que «pozas» o «lagunas» en contexto poético; no requiere cambio. La única reparación necesaria es eliminar la nota alternativa errónea.
  glossary_alignment: No hay términos del glosario maestro especialmente implicados aquí. La decisión clave auditada —preservar la imagen de la tierra que bebe— está bien en el texto principal, pero queda socavada por la nota actual. El resto de las decisiones léxicas son compatibles con el proyecto.
  issues:
  - severity: medium
    issue: La nota [a] ofrece «para dar de beber a la tierra» como alternativa.
    rationale: Esa alternativa no preserva el sujeto de ut potaret terra. La auditoría inglesa ya determinó que «the earth» es sujeto nominativo de «might drink», no objeto de «water/give drink to». Mantener esa nota reintroduce una lectura descartada por infidelidad sintáctica y poética.
  revised_spanish_text: Él puso estanques sobre las cimas de los montes, para hacer brotar ríos desde las alturas, de modo que la tierra bebiera.
  revision_rationale: 'Se aprueba el texto principal con una corrección menor: se elimina la nota al pie porque propone una alternativa contraria al latín y a la revisión auditada. No hace falta añadir otra nota, ya que el español principal ya expresa fielmente la imagen de la tierra como sujeto que bebe.'
