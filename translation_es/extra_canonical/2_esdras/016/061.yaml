translation:
  language: es
  text: Él puso estanques sobre las cimas de los montes, para hacer brotar ríos desde las alturas, de modo que la tierra bebiera.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: super uertices montium
  english_pob_choice: upon the mountain tops
  chosen_spanish: sobre las cimas de los montes
  alternatives_spanish:
  - en las cimas de los montes
  - sobre las cumbres de los montes
  lexicon: super + vertices montium
  rationale: La imagen espacial es de ubicación sobre lo alto de los montes; «cimas» comunica bien el plural y evita un calco pesado. «Montes» mantiene el tono bíblico y la referencia geográfica literal.
- source_word: lacus
  english_pob_choice: pools
  chosen_spanish: estanques
  alternatives_spanish:
  - pozas
  - lagos
  lexicon: lacus
  rationale: «Estanques» es una opción natural en español para cuerpos de agua retenida y conserva la idea de receptáculos de agua; «lagos» podría sonar demasiado grande, y «pozas» demasiado coloquial o pequeña.
- source_word: ad emittendum flumina ab eminenti
  english_pob_choice: to send forth rivers from the heights
  chosen_spanish: para hacer brotar ríos desde las alturas
  alternatives_spanish:
  - para emitir ríos desde las alturas
  - para enviar ríos desde lo alto
  lexicon: ad + emittendum; flumina; ab eminenti
  rationale: «Hacer brotar» transmite la salida activa y poética del agua sin endurecer el giro latino. «Desde las alturas» conserva el valor de eminenti como altura elevada; «enviar» o «emitir» son posibles pero menos idiomáticos en español bíblico-poético.
- source_word: ut potaret terra
  english_pob_choice: so that the earth might drink
  chosen_spanish: de modo que la tierra bebiera
  alternatives_spanish:
  - para que la tierra bebiera
  - a fin de que la tierra bebiera
  lexicon: ut + imperfect subjunctive; terra; potaret
  rationale: 'Se conserva la imagen audaz del texto latino: la tierra como sujeto que bebe. «Bebiera» reproduce el subjuntivo imperfecto de finalidad y sugiere el sentido poético mejor que «regar la tierra», que invertiría el sujeto.'
theological_decisions:
- issue: Imagen poética de la tierra como sujeto que bebe
  english_pob_reading: so that the earth might drink
  chosen_spanish_reading: de modo que la tierra bebiera
  alternative_spanish_readings:
  - para que la tierra bebiera
  - para regar la tierra
  rationale: La revisión auditada confirmó que el latín tiene a «terra» como sujeto de «potaret». Por eso se preserva la metáfora de la tierra bebiendo, en vez de convertirla en un objeto regado.
  doctrine_reference: Cuidado con la preservación de la imagen de la creación como receptora del don de Dios; no hay cambio doctrinal, pero sí una fidelidad figurativa relevante.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que eliminó material no atestiguado y corrigió la cláusula final para reflejar que el latín dice que la tierra bebe, no que las aguas riegan la tierra.
  spanish_consistency_notes:
  - Se mantuvo un registro poético y bíblico sin introducir elementos no atestiguados como «desierto» o «fuentes de aguas».
  - Se evitó «Señor»/«Cristo» porque no aparecen en este versículo; el texto se limita a la imagen de la creación y el agua.
  - La puntuación reproduce una sola oración con dos miembros finales, acorde con el latín y la traducción inglesa auditada.
