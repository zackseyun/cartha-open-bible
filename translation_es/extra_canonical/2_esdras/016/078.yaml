translation:
  language: es
  text: No permitan que sus pecados[a] ni que sus iniquidades prevalezcan sobre ustedes. ¡Ay de los que están aprisionados por sus pecados y cubiertos por sus iniquidades, así como un campo es cercado por un bosque y su semilla es cubierta por espinos, por donde no pasa ningún hombre; queda cerrado y es entregado para ser devorado por el fuego!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Ay de los que están aprisionados por sus pecados y cubiertos por sus iniquidades, así como un campo es cercado por un bosque y sus semillas están cubiertas por espinos, de modo que ningún hombre puede pasar por allí; queda cerrado y es entregado para ser devorado por el fuego!»'
    reason: previous_rendering
lexical_decisions:
- source_word: peccata uestra
  english_pob_choice: your sins
  chosen_spanish: Tus pecados
  alternatives_spanish:
  - vuestros pecados
  - sus pecados
  lexicon: peccatum
  rationale: El latín completa aquí la frase exhortativa iniciada en el versículo anterior; en español, ‘Tus pecados’ conserva el sentido directo de segunda persona singular y mantiene la continuidad retórica del aviso.
- source_word: nec supereleuent iniquitates uestrae
  english_pob_choice: nor let your iniquities prevail over you
  chosen_spanish: ni dejes que tus iniquidades se enseñoreen de ti
  alternatives_spanish:
  - ni permitas que tus iniquidades prevalezcan sobre ti
  - ni dejes que tus injusticias prevalezcan sobre ti
  lexicon: iniquitas / supereleuo
  rationale: ‘Se enseñoreen de ti’ transmite con fuerza la idea de dominio o elevación abusiva presente en supereleuent, sin suavizarla a un simple ‘prevalecer’.
- source_word: constringuntur a peccatis suis
  english_pob_choice: are bound fast by their sins
  chosen_spanish: están aprisionados por sus pecados
  alternatives_spanish:
  - están atados por sus pecados
  - están fuertemente sujetos por sus pecados
  lexicon: constringo
  rationale: ‘Aprisionados’ comunica la imagen de estar estrechamente sujeto o restringido, de forma natural en español y suficientemente fuerte para el matiz de constringuntur.
- source_word: obteguntur ab iniquitatibus suis
  english_pob_choice: covered over by their iniquities
  chosen_spanish: cubiertos por sus iniquidades
  alternatives_spanish:
  - ocultos por sus iniquidades
  - tapados por sus iniquidades
  lexicon: obtego
  rationale: ‘Cubiertos’ sigue de cerca el latín y conserva la imagen de quedar sepultados o velados por la propia culpa.
- source_word: quemadmodum ager constringitur a silua et spinis tegitur semina eius
  english_pob_choice: just as a field is hemmed in by a forest and its seed is covered by thorns
  chosen_spanish: así como un campo es cercado por un bosque y su semilla cubierta por espinos
  alternatives_spanish:
  - así como un campo está cercado por un bosque y su semilla está cubierta por espinos
  - tal como un campo es rodeado por un bosque y su semilla es cubierta por espinos
  lexicon: ager / silua / spinis / semina
  rationale: Se conserva la comparación agrícola con ‘campo’, ‘bosque’ y ‘espinos’. ‘Cercado’ refleja la idea de quedar encerrado o rodeado; ‘espinos’ reproduce el plural latino spinis.
- source_word: per quem non transit homo
  english_pob_choice: through which no man passes
  chosen_spanish: por el cual no pasa ningún hombre
  alternatives_spanish:
  - por donde no pasa ningún hombre
  - por el que no pasa nadie
  lexicon: per / transit homo
  rationale: La cláusula es relativa e indicativa, no final; ‘por el cual no pasa ningún hombre’ reproduce la estructura y mantiene el tono solemne del texto.
- source_word: excluditur et mittitur ad deuorationem ignis
  english_pob_choice: it is shut off and given over to be devoured by fire
  chosen_spanish: queda cerrado y es entregado para ser devorado por el fuego
  alternatives_spanish:
  - queda excluido y es entregado para ser devorado por el fuego
  - se cierra y se entrega para ser devorado por el fuego
  lexicon: excludo / mitto / deuoratio
  rationale: ‘Queda cerrado’ traduce la clausura del campo en una forma natural; ‘es entregado para ser devorado por el fuego’ mantiene la pasiva y la imagen de destrucción del latín.
theological_decisions:
- issue: Relación entre el llamado exhortativo y el oráculo de ay
  english_pob_reading: your sins, nor let your iniquities prevail over you. Woe to those...
  chosen_spanish_reading: Tus pecados, ni dejes que tus iniquidades se enseñoreen de ti. ¡Ay de los que...
  alternative_spanish_readings:
  - Tus pecados, ni permitas que tus iniquidades prevalezcan sobre ti. ¡Ay de los que...
  rationale: El testimonio latino conserva la apertura exhortativa antes del ‘¡Ay!’. La versión española mantiene esa tensión textual sin fusionar indebidamente las dos secciones.
  doctrine_reference: Exhortación profética y advertencia moral; no implica un cambio doctrinal, sino fidelidad a la sintaxis del latín.
- issue: Fuerza de la imagen de dominio del pecado
  english_pob_reading: bound fast by their sins... iniquities
  chosen_spanish_reading: están aprisionados por sus pecados... cubiertos por sus iniquidades
  alternative_spanish_readings:
  - están atados por sus pecados... cubiertos por sus iniquidades
  - están esclavizados por sus pecados...
  rationale: Se evita suavizar la dureza de la imagen. ‘Aprisionados’ y ‘cubiertos’ mantienen la sensación de cautiverio y ocultamiento moral sin introducir un término más interpretativo que el latín no exige.
  doctrine_reference: Lenguaje profético sobre esclavitud y culpa del pecado; mantiene el peso moral del pasaje.
translation_notes:
  revision_awareness: Se tomó en cuenta la corrección textual que ubica la cláusula inicial ‘peccata uestra, nec supereleuent iniquitates uestrae’ dentro de este versículo, y la revisión que precisa la comparación como ‘así como/just as’ y la cláusula relativa ‘por el cual no pasa ningún hombre’.
  spanish_consistency_notes:
  - Se emplea ‘Yahvé’ solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se conserva ‘iniquidades’ para mantener la correspondencia con el audit trail en inglés y con el latín iniquitates, sin sustituirlo por un sinónimo más genérico.
  - Se usa ‘espinos’ como plural natural para spinis, aunque el inglés revisado singulariza ‘seed’.
