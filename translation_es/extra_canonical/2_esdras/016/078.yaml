review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva en general el sentido del latín y del POB inglés: mantiene la continuación exhortativa inicial, el ay profético, la imagen del campo cercado y la cláusula relativa indicativa. Sin embargo, la apertura ''Tus pecados'' queda truncada en español y no forma una exhortación inteligible por sí sola, porque el latín depende del versículo anterior; además, ''su semilla cubierta'' omite el verbo finito presente en el original y en el POB auditado.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero tiene dos tropiezos de legibilidad: la frase inicial suena incompleta, y ''su semilla cubierta por espinos'' carece de verbo. ''Se enseñoreen de ti'' es defendible, pero suena más marcado y menos natural que ''prevalezcan sobre ti'' en este contexto. También conviene ajustar ''por el cual'' a ''por donde'' para referirse naturalmente al campo/bosque en español.'
  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos aquí. 'Iniquidades' está bien alineado con iniquitates. La decisión 'se enseñoreen de ti' no contradice el glosario, pero no está requerida por la evidencia y puede reemplazarse por una forma más natural. El resto de la terminología moral y agrícola es fiel.
  issues:
  - severity: high
    issue: La apertura 'Tus pecados[a], ni dejes...' no constituye una exhortación completa en español.
    rationale: El latín 'peccata uestra, nec supereleuent...' continúa la oración del versículo previo. En un archivo por versículo, el español debe sonar comprensible. Repetir literalmente 'Tus pecados' deja un fragmento sin verbo ni sentido autónomo.
  - severity: medium
    issue: Falta verbo finito en 'su semilla cubierta por espinos'.
    rationale: El original dice 'spinis tegitur semina eius' y el POB revisado lo expresa con verbo completo. En español debe decirse 'su semilla es/está cubierta'.
  - severity: low
    issue: La nota al pie no refleja la alternativa preservada por el POB inglés.
    rationale: La nota inglesa conserva una traducción previa mucho más amplia de toda la comparación. La nota española actual solo ofrece una alternativa para 'prevalezcan', que no corresponde al rastro de auditoría principal.
  - severity: low
    issue: '''Por el cual no pasa ningún hombre'' es literal pero menos natural en español para esta imagen.'
    rationale: '''Por donde no pasa ningún hombre'' conserva el sentido de la relativa latina con mejor fluidez.'
