  to: No permitan que sus pecados[a] ni que sus iniquidades prevalezcan sobre ustedes. ¡Ay de los que están aprisionados por sus pecados y cubiertos por sus iniquidades, así como un campo es cercado por un bosque y su semilla es cubierta por espinos, por donde no pasa ningún hombre; queda cerrado y es entregado para ser devorado por el fuego!
