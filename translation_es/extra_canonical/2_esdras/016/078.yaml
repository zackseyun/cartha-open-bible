    reason: previous_rendering
  revision_rationale: Se repara la frase inicial para que la exhortación sea inteligible en español dentro del versículo aislado, sin perder el vínculo con el latín y el POB auditado. Se sustituye la nota actual por la alternativa documentada en inglés. También se completa el verbo en la imagen agrícola y se mejora la fluidez de la relativa.
