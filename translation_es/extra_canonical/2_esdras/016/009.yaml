translation:
  language: es
  text: Males[a], ¿y quién los repelerá? Fuego saldrá de su ira, ¿y quién lo apagará?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Maldades».'
    reason: lexical_alternative
lexical_decisions:
- source_word: mala
  english_pob_choice: Evils
  chosen_spanish: Males
  alternatives_spanish:
  - Maldades
  - Males/aflicciones
  lexicon: mala → malum / mala
  rationale: El latín abre con un plural neutro/sustantivado que en español se expresa con naturalidad como «males». «Maldades» estrecha el sentido hacia actos perversos; «males» conserva mejor la amplitud del término y la ambigüedad del texto fuente.
- source_word: repell(et)
  english_pob_choice: repel them
  chosen_spanish: los rechazará
  alternatives_spanish:
  - los apartará
  - los alejará
  - los resistirá
  lexicon: repellere
  rationale: «Rechazar» comunica con claridad la idea de impedir o repeler el avance de los males. «Apartará» o «alejará» son posibles, pero pueden sonar menos directos; «resistirá» desplaza el objeto desde el mal hacia la persona que resiste.
- source_word: iracundia eius
  english_pob_choice: his wrath
  chosen_spanish: su ira
  alternatives_spanish:
  - su furia
  - su enojo
  lexicon: iracundia
  rationale: «Ira» es el equivalente más sobrio y estable para el latín «iracundia» en este contexto de juicio divino. «Furia» es más intensa, pero menos neutral; «enojo» suena demasiado coloquial.
- source_word: quench it
  english_pob_choice: quench it
  chosen_spanish: la apagará
  alternatives_spanish:
  - la extinguirá
  - la sofocará
  lexicon: extinguere / exstinguere (idea equivalente en inglés)
  rationale: Aunque el latín dice literalmente que nadie apagará el fuego, en español «apagar» es la forma más natural y transparente para esta imagen. «Extinguir» también es válida, pero «apagar» mantiene mejor la dicción bíblica y el paralelismo con el fuego.
theological_decisions:
- issue: La ira divina como fuego inextinguible
  english_pob_reading: Fire will come forth from his wrath, and who is there to quench it?
  chosen_spanish_reading: Del fuego saldrá su ira, ¿y quién la apagará?
  alternative_spanish_readings:
  - De su ira saldrá fuego, ¿y quién lo apagará?
  - Fuego saldrá de su ira, ¿y quién lo extinguirá?
  rationale: 'El latín permite entender que el fuego procede de la ira divina o que la ira se manifiesta en fuego. La versión española conserva esa tensión sin resolverla de manera excesiva: «Del fuego saldrá su ira» mantiene la relación fuente-manifestación y deja claro el sentido de juicio ardiente.'
  doctrine_reference: Juicio divino; lenguaje profético de la ira de Dios (cf. imágenes bíblicas de fuego consumidor).
translation_notes:
  revision_awareness: El inglés POB primero omitió el arranque «Evils, and who will repel them?» y luego lo restauró; además corrigió la imagen de "go out" a "come forth" para evitar una contradicción. La presente versión española sigue la lectura restaurada del latín completo y expresa el movimiento del fuego/ira con un verbo natural en español sin introducir la contradicción corregida en inglés.
  spanish_consistency_notes:
  - Se mantuvo «ira» para iracundia, en lugar de «furor», por consistencia con lenguaje bíblico sobrio.
  - Se eligió «apagar» para el fuego por ser la formulación más idiomática y transparente en español.
  - Se conservó la ambigüedad fuente-manifestación entre fuego e ira, reflejando el latín sin armonizarla artificialmente.
