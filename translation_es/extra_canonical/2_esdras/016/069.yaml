base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/016/069.yaml
  text: For behold[16:69], a burning wrath is kindled against you, a great multitude[a], and they will seize some of you and feed them with meat sacrificed to idols.
  footnotes:
  - marker: 16:69
    text: The phrase may mean that some are seized and slaughtered in connection with idol worship, or that they are handed over as food after being killed. The Latin is harsh and somewhat compressed.
    reason: lexical_alternative
  - marker: a
    text: Or 'and feed you, after killing you, to idols.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:30:15Z'
    unchanged: false
    changes_summary: Changed 'over you' to 'against you' for more natural and accurate English with the hostile sense of the Latin 'super vos.'
translation:
  language: es
  text: Porque, miren, se enciende contra ustedes un ardor de ira, una gran multitud, y se apoderarán de algunos de ustedes y les harán comer carne sacrificada a los ídolos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase latina es dura y algo condensada. Puede describir que algunos son apresados y forzados a participar en comida idolátrica; el sentido principal aquí es que los obligan a comer carne sacrificada a los ídolos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ecce
  english_pob_choice: For behold
  chosen_spanish: Porque, mirad
  alternatives_spanish:
  - Mirad
  - Porque he aquí
  lexicon: interjección de atención
  rationale: La partícula introduce una exhortación de atención y sorpresa; en español, «Porque, mirad» conserva el tono enfático sin sonar tan arcaico como «he aquí».
- source_word: incenditur ardor
  english_pob_choice: a burning wrath is kindled
  chosen_spanish: se enciende ... un ardor de ira
  alternatives_spanish:
  - se inflama una ira ardiente
  - arde una ira
  lexicon: ardor / ira
  rationale: El latín mezcla imagen de fuego y cólera. «Ardor de ira» mantiene la intensidad sin duplicar innecesariamente la metáfora; «se enciende» reproduce el pasivo de inicio.
- source_word: super uos
  english_pob_choice: against you
  chosen_spanish: contra vosotros
  alternatives_spanish:
  - sobre vosotros
  - en contra de vosotros
  lexicon: preposición de hostilidad
  rationale: Se prefiere «contra» porque expresa con naturalidad el matiz hostil de la construcción latina y sigue la revisión auditada del inglés.
- source_word: turba copiosae
  english_pob_choice: a great multitude
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una muchedumbre numerosa
  - una multitud abundante
  lexicon: turba / copiosae
  rationale: La expresión latina designa cantidad y masa; «gran multitud» es fiel, clara y suficientemente solemne.
- source_word: rapient
  english_pob_choice: they will seize
  chosen_spanish: se apoderarán de
  alternatives_spanish:
  - arrebatarán
  - capturarán
  lexicon: rapio
  rationale: «Se apoderarán de» transmite el asalto violento e invasivo del verbo latino mejor que un simple «tomarán».
- source_word: cibabunt ... occisam
  english_pob_choice: feed them with meat sacrificed to idols
  chosen_spanish: los alimentarán con carne ofrecida a los ídolos
  alternatives_spanish:
  - los harán comer carne sacrificada a los ídolos
  - los darán a comer carne ofrecida a los ídolos
  lexicon: cibare / idolis occisam
  rationale: La revisión auditada corrige la comprensión a comida sacrificada a ídolos, no personas dadas como alimento. En español, «carne ofrecida a los ídolos» preserva el referente cultual de εἰδωλόθυτα sin suavizarlo.
theological_decisions:
- issue: Naturaleza de la violencia y del sacrificio idolátrico
  english_pob_reading: The phrase may mean that some are seized and slaughtered in connection with idol worship, or that they are handed over as food after being killed. The Latin is harsh and somewhat compressed.
  chosen_spanish_reading: se apoderarán de algunos de vosotros y los alimentarán con carne ofrecida a los ídolos
  alternative_spanish_readings:
  - se apoderarán de algunos de vosotros y os alimentarán, después de mataros, a los ídolos
  - se apoderarán de algunos de vosotros y los sacrificarán para los ídolos
  rationale: 'La nota inglesa anterior contenía una opción hoy revisada; el pasaje debe reflejar la lectura corregida: la violencia se orienta a forzar el consumo de carne idolátrica. Se conserva la dureza del texto sin introducir una muerte de los creyentes que la revisión considera incorrecta.'
  doctrine_reference: crisis de fidelidad cultual / idolatría
translation_notes:
  revision_awareness: 'La traducción sigue la última revisión auditada que corrige la lectura anterior: no se trata de que los creyentes sean dados como alimento a los ídolos, sino de que sean forzados a comer carne ofrecida a los ídolos. También se ajusta super vos a un español hostil natural («contra vosotros»).'
  spanish_consistency_notes:
  - He mantenido «Yahvé» solo cuando el testimonio fuente lo requiera; aquí no aparece.
  - He conservado «ídolos» y no «dioses falsos» para respetar el lenguaje cultual concreto del pasaje.
  - «Ardor de ira» intenta sostener la imaginería de fuego e indignación sin sobrecargar el verso.
  - El marcador de nota a está anclado en «multitud» para preservar la alternativa interpretativa principal del miembro final de la cláusula.
