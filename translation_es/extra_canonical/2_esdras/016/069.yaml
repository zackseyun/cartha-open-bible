revisions:
- from: Porque, mirad, se enciende contra vosotros un ardor de ira, una gran multitud[a], y se apoderarán de algunos de vosotros y los alimentarán con carne ofrecida a los ídolos.
  to: Porque, miren, se enciende contra ustedes un ardor de ira, una gran multitud, y se apoderarán de algunos de ustedes y les harán comer carne sacrificada a los ídolos.[a]
  rationale: Se elimina la nota que reintroducía una interpretación ya descartada por la auditoría. Se ajusta la redacción para reflejar mejor la coerción de comer carne idolátrica, se mejora la naturalidad del español para un registro neutral latinoamericano, y se conserva la aspereza del latín mediante una nota cautelosa que no contradice la decisión principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:37:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido principal del latín y sigue la corrección auditada del inglés: la violencia consiste en apoderarse de algunos y forzarlos a comer carne sacrificada a los ídolos, no en matar a los creyentes para alimentar a los ídolos. Sin embargo, la nota al pie española reintroduce precisamente la lectura descartada por la revisión aplicada, y por eso ya no refleja fielmente el estado auditado del pasaje. Además, el latín conservado es abrupto y comprimido; conviene no fijar en nota una alternativa desautorizada como si siguiera siendo opción válida del texto principal.'
  spanish_quality_summary: El español es claro y digno, pero hay dos ajustes recomendables. Primero, «Porque, mirad» suena algo forzado al inicio; «Porque miren» tampoco sería ideal. «Porque, miren» o mejor «Porque miren» sigue raro; la opción más natural y bíblica en español moderno es «Porque, miren» o «Porque he aquí», pero para legibilidad amplia conviene «Porque, miren» menos que «Porque, mirad» en neutral latinoamericano. Aun así, el mayor problema no es el inicio sino la nota. Segundo, para neutralidad latinoamericana y claridad eclesial más amplia, «ustedes» suele preferirse frente a «vosotros», aunque no es error grave. También «los harán comer» expresa mejor la coerción cultual que «los alimentarán», que puede sonar demasiado ordinario.
  glossary_alignment: 'No hay términos del glosario mayor en conflicto. «carne ofrecida a los ídolos» es aceptable y fiel al valor de carne idolátrica/eidolóthuta. La decisión principal correcta es no volver a la lectura previa de creyentes muertos. Se recomienda alinear la formulación española con esa decisión usando una construcción de coerción: «les harán comer carne sacrificada a los ídolos».'
  issues:
  - severity: high
    issue: La nota al pie contradice la revisión auditada y reintroduce una lectura descartada.
    rationale: El historial aplicado especifica que la interpretación de matar a los creyentes y alimentarlos a/para los ídolos es incorrecta. Mantener esa opción como nota de alternativa desinforma sobre la decisión textual ya adjudicada.
  - severity: medium
    issue: «los alimentarán con carne ofrecida a los ídolos» atenúa la idea de coerción cultual.
    rationale: Aunque semánticamente posible, en contexto de persecución religiosa el español natural y más preciso es «les harán comer» o «los obligarán a comer», que comunica mejor el sentido de forzar el consumo de carne sacrificial.
  - severity: low
    issue: El uso de «vosotros» se aparta del objetivo de español neutral latinoamericano.
    rationale: No es infiel al sentido, pero «ustedes» mejora la naturalidad para el público objetivo del proyecto.
  - severity: low
    issue: «Porque, mirad» suena algo rígido en español moderno neutral.
    rationale: La función exhortativa de Ecce puede conservarse con una apertura más natural sin perder solemnidad.
  revised_spanish_text: Porque, miren, se enciende contra ustedes un ardor de ira, una gran multitud, y se apoderarán de algunos de ustedes y les harán comer carne sacrificada a los ídolos.[a]
  revised_footnotes:
