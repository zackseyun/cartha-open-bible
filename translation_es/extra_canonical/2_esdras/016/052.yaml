translation:
  language: es
  text: Porque, miren[a], dentro de muy poco la iniquidad será quitada de la tierra, y
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por tanto, no se hagan como ella ni como sus obras».
    reason: Conservar la nota del English POB sobre la traducción previa perteneciente al desajuste de límites de versículo.
lexical_decisions:
- source_word: Quoniam ecce
  english_pob_choice: For behold
  chosen_spanish: Porque, mira
  alternatives_spanish:
  - Pues, mira
  - Porque, he aquí
  lexicon: Latin quoniam + ecce
  rationale: Quoniam introduce la explicación o motivo, y ecce aporta una llamada de atención. En español, «Porque, mira» conserva ambas fuerzas de manera natural y digna; «he aquí» sería más formal, pero aquí suena menos idiomático.
- source_word: adhuc pusillum
  english_pob_choice: yet a little while
  chosen_spanish: todavía dentro de poco
  alternatives_spanish:
  - aún un poco más
  - todavía un poco
  lexicon: Latin adhuc + pusillum
  rationale: La combinación latina expresa una breve espera futura. «Todavía dentro de poco» mantiene la idea temporal sin endurecerla en un calco; «aún un poco más» podría sonar más cuantitativo que temporal.
- source_word: tolletur
  english_pob_choice: will be taken away
  chosen_spanish: será quitada
  alternatives_spanish:
  - será removida
  - será apartada
  lexicon: Latin tollo (passive future)
  rationale: El pasivo futuro pide una acción sobre la iniquidad. «Será quitada» es claro, sobrio y suficientemente directo; «será removida» o «será apartada» también son posibles, pero menos naturales en este contexto.
- source_word: iniquitas
  english_pob_choice: iniquity
  chosen_spanish: la iniquidad
  alternatives_spanish:
  - la injusticia
  - el mal
  lexicon: Latin iniquitas
  rationale: «Iniquidad» preserva el término moral-jurídico tradicional y la densidad del original. «Injusticia» reduciría demasiado el campo semántico; «el mal» sería más amplio y menos preciso.
- source_word: a terra
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - de la faz de la tierra
  lexicon: Latin terra
  rationale: La preposición simple «de la tierra» reproduce el movimiento de alejamiento del texto sin añadir una expansión interpretativa. «De la faz de la tierra» intensifica el sentido, pero va más allá del latín dado.
theological_decisions:
- issue: El alcance de la eliminación de la iniquidad
  english_pob_reading: For behold, yet a little while, and iniquity will be taken away from the earth, and
  chosen_spanish_reading: Porque, mira, todavía dentro de poco la iniquidad será quitada de la tierra, y
  alternative_spanish_readings:
  - Porque, mira, en breve la iniquidad será quitada de la tierra, y
  - Pues he aquí, todavía un poco, y la iniquidad será quitada de la tierra, y
  rationale: La lectura mantiene el futuro de eliminación de la iniquidad tal como lo exige el latín. No se suaviza a una esperanza genérica ni se añade una agencia no presente en el fragmento.
  doctrine_reference: Escatología bíblica; juicio y purificación final del orden creado
translation_notes:
  revision_awareness: 'El audit trail indica que la corrección principal fue de límites de versículo: el inglés anterior estaba alineado con el tramo latino de 16:51, mientras que este fragmento latino de 16:52 exige una traducción que corresponda a ''Quoniam ecce adhuc pusillum et tolletur iniquitas a terra, et''. Por ello el español sigue de cerca este tramo y no incorpora la advertencia de 16:51.'
  spanish_consistency_notes:
  - Se mantiene 'iniquidad' para conservar consistencia terminológica con el campo moral-jurídico del texto.
  - Se evita 'SEÑOR' o cualquier sustitución teológica no presente en el latín.
  - La conjunción final 'y' se conserva porque el fragmento latino termina en continuidad abierta.
