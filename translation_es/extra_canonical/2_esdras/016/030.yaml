translation:
  language: es
  text: Así como en un olivar quedan tres o cuatro olivas,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «Así como en un olivar quedan tres o cuatro olivas en cada árbol». Esta lectura fue descartada porque el latín no dice «en cada árbol».'
    reason: textual_variant
lexical_decisions:
- source_word: quemadmodum
  english_pob_choice: As
  chosen_spanish: Así como
  alternatives_spanish:
  - Como
  - Tal como
  lexicon: comparative marker
  rationale: El latinismo introduce una comparación; «Así como» conserva el valor comparativo con buena naturalidad en español y mantiene el tono proverbial/apocalíptico del contexto.
- source_word: in oliveto
  english_pob_choice: in an olive orchard
  chosen_spanish: en un olivar
  alternatives_spanish:
  - en un huerto de olivos
  - en una plantación de olivos
  lexicon: noun phrase
  rationale: «Olivar» es la correspondencia más directa, natural y digna para un lugar sembrado de olivos; evita añadir la especificación incorrecta «en cada árbol», que no está en el latín.
- source_word: relinquentur
  english_pob_choice: are left
  chosen_spanish: quedan
  alternatives_spanish:
  - son dejadas
  - son las que quedan
  lexicon: passive/resultative
  rationale: El pasivo latino expresa el resultado de que solo permanezcan unas pocas olivas; «quedan» comunica ese estado de supervivencia de forma idiomática sin introducir agentes.
- source_word: olivae
  english_pob_choice: olives
  chosen_spanish: olivas
  alternatives_spanish:
  - aceitunas
  lexicon: noun
  rationale: «Olivas» conserva la forma más cercana al latín y suena sobria en un registro bíblico; «aceitunas» sería más coloquial y menos acorde al tono del pasaje.
theological_decisions:
- issue: Alcance de la escasez en la imagen
  english_pob_reading: three or four olives are left
  chosen_spanish_reading: quedan tres o cuatro olivas
  alternative_spanish_readings:
  - quedan tres o cuatro olivas en cada árbol
  - quedan tres o cuatro olivas en todo el olivar
  rationale: El latín solo dice «in oliveto», es decir, dentro de un olivar; no añade «en cada árbol». Por eso la versión española mantiene la escasez general sin especificar una distribución que el texto no da.
  doctrine_reference: Fidelidad textual y control de sobrerinterpretación
translation_notes:
  revision_awareness: El audit trail inglés fue corregido para eliminar la adición no sustentada «on each tree». La presente versión española sigue esa revisión y evita ampliar el alcance del dato más allá de «in oliveto».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; aquí no aparece.
  - Se prefirió «olivar» y «olivas» por claridad y cercanía al latín, sin introducir una paráfrasis explicativa.
  - La puntuación con coma antes de la nota reproduce el ritmo breve y comparativo del fragmento.
