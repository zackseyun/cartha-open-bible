    unchanged: false
    changes_summary: Removed the unnecessary intensifier 'surely' since it is not in the Latin, and added the omitted words 'And you' to account for the final 'Et uos' in the source.
translation:
  language: es
  text: Por tanto, el Señor examinará todas sus obras y los expondrá a todos. Y ustedes
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: scrutinabit
  english_pob_choice: will search out
  chosen_spanish: examinará
  alternatives_spanish:
  - buscará
  - inquirirá
  - escrutará
  lexicon: scrutinari / examinare
  rationale: En latín, scrutinabit expresa una indagación minuciosa; 'examinará' comunica bien la idea sin sonar arcaico. 'Escrutará' es posible, pero en español bíblico moderno puede resultar más duro o menos natural.
- source_word: omnia opera eorum
  english_pob_choice: all their works
  chosen_spanish: todas sus obras
  alternatives_spanish:
  - todas sus acciones
  - todas sus obras y hechos
  lexicon: omnia opera
  rationale: '''Opera'' abarca obras/acciones. ''Obras'' mantiene la amplitud moral y judicial del juicio divino, y coincide con el registro bíblico del pasaje.'
- source_word: traducet uos omnes
  english_pob_choice: will expose you all
  chosen_spanish: los pondrá a ustedes todos al descubierto
  alternatives_spanish:
  - los denunciará a todos
  - los expondrá a todos
  lexicon: traducere
  rationale: El verbo latino puede significar sacar a la luz, exponer o poner en evidencia. 'Pondrá a ustedes todos al descubierto' conserva la idea de exposición pública y evita una lectura demasiado mecánica de 'trasladará'.
theological_decisions:
- issue: El tratamiento de 'Lord' frente al nombre divino en el latín del contexto
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Yahvé
  rationale: Aunque el lema del proyecto prefiere 'Yahvé' para יהוה, aquí el fragmento latino ofrece 'Dominus' y el contexto inglés auditado mantiene 'the Lord'. Para este versículo, 'el Señor' respeta la fuente inmediata latina sin afirmar con certeza una reconstrucción nominal que no está explicitada en el texto dado.
  doctrine_reference: Naming convention / source-bound divine title handling
- issue: La frase final truncada 'Et uos'
  english_pob_reading: And you
  chosen_spanish_reading: Y ustedes
  alternative_spanish_readings:
  - Y vosotros
  - Y también ustedes
  rationale: La revisión inglesa recuperó el segmento omitido 'And you' para reflejar el final latino 'Et uos'. En español, 'Y ustedes' conserva la apertura sintáctica y deja visible que el enunciado continúa, sin cerrar artificialmente el corte del manuscrito/edición.
  doctrine_reference: Source integrity / fragment continuity
translation_notes:
  revision_awareness: 'La revisión más reciente eliminó el intensificador ''surely'' y restituyó el tramo final omitido ''And you'' a partir de ''Et uos''. La redacción española sigue esa lectura revisada: no añade intensificación inexistente y conserva la cláusula final abierta con ''Y ustedes''.'
  spanish_consistency_notes:
  - Se mantuvo 'el Señor' por la forma latina inmediata del testimonio aportado; no se sustituyó por 'Yahvé' sin evidencia directa del nombre.
  - '''Ustedes'' se usa como plural neutral latinoamericano; el corte final se conserva deliberadamente incompleto, en paralelo con el latín ''Et uos''.'
