  glossary_alignment: No hay conflictos mayores con la terminología del proyecto. 'el Señor' es aceptable aquí por tratarse de fuente latina inmediata 'Dominus' y por no haber base textual aquí para imponer 'Yahvé'. No se activan otros términos sensibles del glosario.
