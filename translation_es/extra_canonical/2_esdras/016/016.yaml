translation:
  language: es
  text: Como una flecha disparada por un arquero fuerte no vuelve, así tampoco volverán los males que han sido enviados sobre la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: donec consumat fundamenta terrae
  english_pob_choice: As an arrow shot by a strong archer...
  chosen_spanish: Hasta que consuma los fundamentos de la tierra.
  alternatives_spanish:
  - Hasta que destruya los cimientos de la tierra.
  - Hasta que acabe con los fundamentos de la tierra.
  lexicon: consumere; fundamenta; terra
  rationale: Conservo la idea de consumación/destrucción total en una fórmula breve y solemne. "Fundamentos" mantiene la imagen estructural del latín sin desplazarla hacia una paráfrasis más libre.
- source_word: sagitta missa
  english_pob_choice: an arrow shot
  chosen_spanish: una flecha disparada
  alternatives_spanish:
  - una flecha lanzada
  - una saeta disparada
  lexicon: sagitta; mittere
  rationale: '"Flecha" es claro y natural en español; "disparada" refleja el acto de ser enviada con fuerza, equivalente al participio latino y al inglés POB.'
- source_word: a sagittario ualido
  english_pob_choice: by a strong archer
  chosen_spanish: por un arquero fuerte
  alternatives_spanish:
  - por un arquero poderoso
  - por un tirador fuerte
  lexicon: sagittarius; validus
  rationale: '"Arquero" es la correspondencia directa y transparente; "fuerte" conserva la fuerza física o efectiva del adjetivo latino validus sin sobreteologizarlo.'
- source_word: sic non reuertentur mala
  english_pob_choice: so the evils ... will not return
  chosen_spanish: así tampoco volverán los males
  alternatives_spanish:
  - así no volverán los males
  - así no regresarán los males
  lexicon: sic; mala; revertere
  rationale: '"Males" mantiene el plural concreto del latín y del inglés POB. "Volverán" reproduce el movimiento de retorno de reuertentur con español idiomático.'
- source_word: quae ... in terram / super terram
  english_pob_choice: that have been sent upon the earth
  chosen_spanish: que han sido enviados sobre la tierra
  alternatives_spanish:
  - que han sido enviados a la tierra
  - que han sido enviados sobre la tierra
  lexicon: mala; mitti; terra
  rationale: '"Han sido enviados" sigue la pasiva del sentido latino y del inglés. "Sobre la tierra" preserva la extensión amplia del juicio sin reducirla a un destinatario individual.'
theological_decisions:
- issue: El alcance de los "males" enviados sobre la tierra
  english_pob_reading: the evils that have been sent upon the earth will not return
  chosen_spanish_reading: los males que han sido enviados sobre la tierra no volverán
  alternative_spanish_readings:
  - los males enviados sobre la tierra no volverán
  - los males que han sido enviados a la tierra no volverán
  rationale: Mantengo el lenguaje directo de juicio/aflicción sin suavizarlo a "calamidades" o "desastres", porque el latín mala y el inglés POB conservan una carga moral y judicial amplia.
  doctrine_reference: Juicio divino; retribución y sentencia sobre la tierra
translation_notes:
  revision_awareness: El texto fuente latino y el inglés POB están en alta concordancia, sin notas de revisión ni variantes textuales relevantes para este versículo; por eso no introduzco aparato adicional.
  spanish_consistency_notes:
  - Uso "tierra" para terra de modo constante y público.
  - Evito "SEÑOR" u otra convención de ocultamiento porque aquí no aparece el nombre divino.
  - 'Conservo la repetición estructural de la comparación: "Como... así tampoco..." para reflejar el paralelismo del latín y del inglés POB.'
