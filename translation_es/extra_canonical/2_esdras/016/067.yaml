    issue: La coordinación interrogativa podría también presentarse en una sola secuencia
    rationale: El latín tiene «facietis? aut quomodo...», por lo que la forma actual con dos preguntas es aceptable; una puntuación alternativa no mejoraría lo suficiente como para requerir revisión.
