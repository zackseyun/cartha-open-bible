translation:
  language: es
  text: ¿Qué harán? ¿O cómo esconderán sus pecados delante de Dios?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: facietis
  english_pob_choice: What will you do?
  chosen_spanish: ¿Qué harán?
  alternatives_spanish:
  - ¿Qué haréis?
  - ¿Qué van a hacer?
  lexicon: facere
  rationale: El futuro interrogativo expresa el sentido de acción requerida o posible; en español, «harán» mantiene el alcance plural y un registro natural y digno. «Haréis» sería más marcado regionalmente o arcaizante; «van a hacer» añade perífrasis no presente en el latín.
- source_word: quomodo abscondetis
  english_pob_choice: how will you hide
  chosen_spanish: ¿cómo esconderán?
  alternatives_spanish:
  - ¿cómo ocultarán?
  - ¿cómo encubrirán?
  lexicon: abscondere
  rationale: «Esconder» comunica bien el verbo de ocultar sin sobrecarga técnica. «Ocultar» también es válido, pero «esconder» conserva mejor la imagen directa del texto. «Encubrir» suena más jurídico o moralizante de lo que exige el latín.
- source_word: peccata uestra
  english_pob_choice: your sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - sus culpas
  - vuestros pecados
  lexicon: peccata
  rationale: «Pecados» es la correspondencia más directa y fiel al valor moral/religioso del latín. Se emplea «sus» para un español neutral de alcance amplio; «vuestros» sería más estrechamente peninsular.
- source_word: coram deo
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - en presencia de Dios
  lexicon: coram
  rationale: «Delante de Dios» reproduce la noción de comparecencia/presencia pública o judicial implícita en coram. «Ante Dios» es igualmente correcto, pero «delante de Dios» resulta más idiomático y transparente.
theological_decisions:
- issue: Presencia de Dios como tribunal moral implícito
  english_pob_reading: before God
  chosen_spanish_reading: delante de Dios
  alternative_spanish_readings:
  - ante Dios
  - en presencia de Dios
  rationale: El latín coram deo no requiere explicitación doctrinal adicional, pero sí sugiere una comparecencia real ante Dios. «Delante de Dios» conserva esa fuerza sin convertirla en una formulación más técnica de juicio.
  doctrine_reference: Conciencia de juicio/divina presencia; sin añadir elementos ausentes del texto.
translation_notes:
  revision_awareness: La revisión inglesa eliminó «and his angels» porque no está presente en el latín proporcionado. El español sigue exactamente el texto latino auditado y no introduce ese añadido.
  spanish_consistency_notes:
  - Se mantiene un español sobrio y publicable, sin arcaísmos innecesarios.
  - No se introduce «Señor» ni otra sustitución devocional, porque el latín dice deus.
  - Se preserva el plural con valor general de segunda persona mediante «harán» y «esconderán»/«sus».
