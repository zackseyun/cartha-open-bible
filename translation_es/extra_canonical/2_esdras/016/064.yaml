translation:
  language: es
  text: ¡Ay de los que pecan y quieren ocultar sus pecados!
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: uae
  english_pob_choice: Woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de...!
  - ¡Ay de los...!
  - ¡Ay de quienes...!
  lexicon: interjección de lamento/proclamación profética
  rationale: El latín uae expresa una exclamación de amenaza o lamento profético. En español, «¡Ay de...!» conserva ese tono mejor que una simple traducción descriptiva.
- source_word: peccantibus
  english_pob_choice: those who sin
  chosen_spanish: los que pecan
  alternatives_spanish:
  - los pecadores
  - quienes pecan
  - los que cometen pecado
  lexicon: participio sustantivado de acción moral
  rationale: El latín presenta a los sujetos como los que están en la acción de pecar. «Los que pecan» reproduce bien la fuerza verbal sin convertirlo en un sustantivo más interpretativo como «pecadores».
- source_word: uolentibus occultare
  english_pob_choice: want to hide
  chosen_spanish: quieren ocultar
  alternatives_spanish:
  - quieren esconder
  - desean ocultar
  - pretenden ocultar
  lexicon: voluntad + ocultar
  rationale: El verbo latino uolentibus indica voluntad, no mera posibilidad. «Quieren» sigue de cerca el valor de querer/pretender del original y mantiene la naturalidad del español.
- source_word: peccata sua
  english_pob_choice: their sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - sus faltas
  - sus culpas
  - sus pecados propios
  lexicon: objeto moral del pecado
  rationale: «Pecados» es la correspondencia directa de peccata y preserva el vínculo interno con «pecan». «Sus pecados» resulta natural y exacto en español.
theological_decisions:
- issue: Amenaza profética de juicio
  english_pob_reading: Woe to those who sin and want to hide their sins!
  chosen_spanish_reading: ¡Ay de los que pecan y quieren ocultar sus pecados!
  alternative_spanish_readings:
  - ¡Ay de los que pecan y desean ocultar sus pecados!
  - ¡Ay de los que pecan y pretenden esconder sus pecados!
  rationale: El latín conserva una advertencia profética directa; la traducción mantiene ese tono de denuncia sin suavizarlo ni explicarlo más allá de lo que el texto dice.
  doctrine_reference: registro profético de juicio
translation_notes:
  revision_awareness: El inglés POB revisó 'wish' a 'want' para una naturalidad leve sin cambiar el sentido. La versión española sigue ese mismo principio al usar «quieren», que expresa voluntad directa y evita una formulación más débil o literaria que el latín no exige.
  spanish_consistency_notes:
  - Se mantiene el tono profético con «¡Ay de...!»; no se reemplaza por un simple «¡ay!» exclamativo sin complemento porque el original dirige el lamento a un grupo específico.
  - Se conserva «pecados» para peccata, en concordancia con el paralelismo interno del texto.
  - «Ocultar» se eligió como equivalente amplio y natural de occultare; «esconder» queda como alternativa válida pero menos cercana al registro habitual de juicio moral.
