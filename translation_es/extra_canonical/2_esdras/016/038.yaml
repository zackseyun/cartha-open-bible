source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'dominus: Ecce adpropinquant mala et non tardantur. Quemadmodum praegnans in nono mense filium suum, adpropinquante hora partus eius, ante horas duas uel tres gementes dolores circum uentrem eius, et prodiente infante de uentre non tardabit'
