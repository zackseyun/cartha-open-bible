base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/016/038.yaml
  text: Behold, evils are drawing near and are not delayed, just as a pregnant woman in the ninth month with her child, when the hour of her delivery draws near, for two or three hours great pains surround her womb, and when the child comes forth from the womb, it will not delay.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:29:52Z'
    unchanged: false
    changes_summary: Completed the verse by translating the omitted comparison about the pregnant woman, preserving the source's imagery and sequence while smoothing the English slightly.
translation:
  language: es
  text: He aquí, los males se están acercando y no tardan, así como una mujer embarazada en el noveno mes con su hijo, cuando se acerca la hora de su parto, durante dos o tres horas grandes dolores rodean su vientre, y cuando el niño sale del vientre, no tardará.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ecce
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: interjección de atención
  rationale: Se usa una llamada natural y solemne en español para reproducir la función de advertencia/énfasis de la partícula latina y del inglés POB, sin caer en un calco rígido.
- source_word: mala
  english_pob_choice: evils
  chosen_spanish: los males
  alternatives_spanish:
  - los males
  - las calamidades
  - los desastres
  lexicon: mala (neutro plural sustantivado en sentido de desgracias)
  rationale: El latino 'mala' tiene aquí sentido de desgracias o calamidades que se aproximan; 'males' conserva la fuerza amplia y el paralelismo con el inglés POB sin restringir demasiado el alcance.
- source_word: adpropinquant
  english_pob_choice: are drawing near
  chosen_spanish: se están acercando
  alternatives_spanish:
  - se acercan
  - están por acercarse
  lexicon: adpropinquare
  rationale: El presente progresivo español expresa bien la inminencia y el movimiento en curso que el contexto requiere.
- source_word: non tardantur
  english_pob_choice: are not delayed
  chosen_spanish: no se retrasan
  alternatives_spanish:
  - no tardan
  - no se demoran
  lexicon: tardare
  rationale: '''Retrasarse'' comunica de forma natural que no hay aplazamiento; se conserva la negación y la idea de inminencia del original.'
- source_word: praegnans
  english_pob_choice: pregnant woman
  chosen_spanish: una mujer embarazada
  alternatives_spanish:
  - una embarazada
  - una mujer preñada
  lexicon: praegnans
  rationale: '''Embarazada'' es el equivalente más claro y digno en español moderno; evita un término más literal pero menos idiomático o menos apropiado para registro bíblico.'
- source_word: in nono mense
  english_pob_choice: in the ninth month
  chosen_spanish: en el noveno mes
  alternatives_spanish:
  - en el mes noveno
  - a los nueve meses
  lexicon: nono mense
  rationale: Se mantiene la referencia temporal literal del original, que forma parte de la imagen comparativa.
- source_word: filium suum
  english_pob_choice: with her child
  chosen_spanish: con su hijo
  alternatives_spanish:
  - con su niño
  - con su criatura
  lexicon: filius
  rationale: '''Hijo'' sigue de cerca el latino y el inglés POB, aunque el referente sea general en la imagen; se conserva la relación de posesión del texto base.'
- source_word: adpropinquante hora partus eius
  english_pob_choice: when the hour of her delivery draws near
  chosen_spanish: cuando se acerca la hora de su parto
  alternatives_spanish:
  - cuando se aproxima la hora de su alumbramiento
  - cuando llega la hora de dar a luz
  lexicon: partus
  rationale: '''Parto'' comunica con precisión y naturalidad la idea del alumbramiento, manteniendo el sentido sin elevar el registro innecesariamente.'
- source_word: ante horas duas uel tres
  english_pob_choice: for two or three hours
  chosen_spanish: durante dos o tres horas
  alternatives_spanish:
  - por dos o tres horas
  - en dos o tres horas
  lexicon: ante horas duas uel tres
  rationale: El latino literalmente marca una duración previa al parto; 'durante' ofrece la relación temporal más natural en español para la escena descrita.
- source_word: gementes dolores
  english_pob_choice: great pains
  chosen_spanish: grandes dolores
  alternatives_spanish:
  - fuertes dolores
  - dolores intensos
  lexicon: gementes dolores
  rationale: Se conserva la imagen de dolores muy agudos; 'grandes' sigue el inglés POB y mantiene una correspondencia directa con el latín.
- source_word: circum uentrem eius
  english_pob_choice: surround her womb
  chosen_spanish: rodean su vientre
  alternatives_spanish:
  - rodean su seno
  - la rodean por el vientre
  lexicon: venter
  rationale: '''Vientre'' es la correspondencia más directa para ''venter'' en este contexto y mantiene la imagen corporal del original; ''vientre'' también evita una paráfrasis interpretativa.'
- source_word: prodiente infante de uentre
  english_pob_choice: when the child comes forth from the womb
  chosen_spanish: y cuando el niño sale del vientre
  alternatives_spanish:
  - y cuando el niño sale del seno
  - y cuando el infante sale del vientre
  lexicon: infans
  rationale: '''Niño'' es la forma más natural en español para ''infans'' en esta comparación; conserva el contraste entre el periodo de gestación y la salida del vientre.'
- source_word: non tardabit
  english_pob_choice: it will not delay
  chosen_spanish: no se demorará
  alternatives_spanish:
  - no tardará
  - no se retrasará
  lexicon: tardare
  rationale: La frase mantiene la idea de ausencia de demora con un verbo idiomático en español; el sujeto implícito se entiende por el contexto del niño que sale.
theological_decisions:
- issue: Imagen comparativa de calamidades inminentes con el parto
  english_pob_reading: Behold, evils are drawing near and are not delayed, just as ...
  chosen_spanish_reading: Mira, los males se están acercando y no se retrasan, así como ...
  alternative_spanish_readings:
  - Mira, los males se acercan y no tardan, así como ...
  - He aquí, los males se aproximan y no se demoran, así como ...
  rationale: El texto presenta una comparación explícita entre la inminencia de los males y el proceso del parto; se conserva la imagen completa sin suavizar su fuerza apocalíptica.
  doctrine_reference: Sabiduría/apocalíptica de 2 Esdras; énfasis en inminencia del juicio o calamidad.
translation_notes:
  revision_awareness: The English POB revision completed the previously omitted pregnant-woman comparison. The Spanish draft likewise includes the full comparison in sequence, preserving the source imagery and the urgency of the final clause.
  spanish_consistency_notes:
  - Se mantuvo 'males' para la carga amplia de calamidades, coherente con el inglés POB y el latín 'mala'.
  - Se evitó 'SEÑOR' porque este versículo no contiene el nombre divino; la única invocación inicial es 'dominus' en el encabezado latino, sin impacto necesario en la línea española del versículo.
  - Se optó por un registro bíblico claro y contemporáneo, sin sustituir la comparación del parto por una paráfrasis más abstracta.
