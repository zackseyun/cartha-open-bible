  to: He aquí, los males se están acercando y no tardan, así como una mujer embarazada en el noveno mes con su hijo, cuando se acerca la hora de su parto, durante dos o tres horas grandes dolores rodean su vientre, y cuando el niño sale del vientre, no tardará.
  rationale: Se revisa para reflejar mejor el tono profético de Ecce con 'He aquí', simplificar la puntuación para una lectura más natural y acercar 'tardan' al verbo latino tardare, sin alterar la imagen ni la secuencia del original.
