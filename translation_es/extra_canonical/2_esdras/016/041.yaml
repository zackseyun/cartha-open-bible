translation:
  language: es
  text: 'Oigan la palabra, mi pueblo: prepárense para la batalla, y en medio de los males sean como extranjeros en la tierra.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Audite uerbum
  english_pob_choice: Hear the word
  chosen_spanish: Oigan la palabra
  alternatives_spanish:
  - Escuchen la palabra
  - Oíd la palabra
  lexicon: audire > oír/escuchar; verbum > palabra
  rationale: En español, 'oigan' comunica una exhortación directa y natural en registro bíblico contemporáneo. 'Palabra' mantiene el valor general de verbum sin añadir un objeto específico que el texto no da.
- source_word: plebs mea
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo, ustedes
  lexicon: plebs > pueblo
  rationale: '''Pueblo'' reproduce mejor la colectividad del latín que una expresión más coloquial. El posesivo ''mi'' conserva la relación de pertenencia.'
- source_word: parate uos in pugnam
  english_pob_choice: prepare yourselves for battle
  chosen_spanish: prepárense para la batalla
  alternatives_spanish:
  - alístense para el combate
  - prepárense para el combate
  lexicon: parare > preparar; pugna > batalla/combate
  rationale: '''Prepárense'' expresa el imperativo reflexivo esperado en español. ''Batalla'' mantiene la concreción bélica de pugna; ''combate'' sería viable, pero ''batalla'' conserva mejor el tono del enunciado.'
- source_word: in malis
  english_pob_choice: in the midst of evils
  chosen_spanish: en medio de los males
  alternatives_spanish:
  - entre los males
  - en medio de las calamidades
  lexicon: malum > mal / maldad / desgracia
  rationale: Se conserva el plural 'males' para reflejar la forma latina y su amplitud semántica. 'En medio de' corresponde al valor locativo de in en este contexto.
- source_word: parate uos ... et in malis ... alieni
  english_pob_choice: prepare yourselves ... and ... be like strangers on the earth
  chosen_spanish: prepárense ... y ... sean como extranjeros en la tierra
  alternatives_spanish:
  - vivan como forasteros en la tierra
  - séanse como extraños en la tierra
  lexicon: alieni/alieni esse > ser extraño, forastero, extranjero
  rationale: Aunque el latín aquí conserva la idea de extrañeza/pertenencia ajena, 'extranjeros' es la opción más clara y sobria en español bíblico. 'Forasteros' o 'extraños' son posibles, pero 'extranjeros' comunica mejor la alteridad existencial sin sonar demasiado moderna.
theological_decisions:
- issue: La imagen de vivir como 'extranjeros en la tierra' en medio de males
  english_pob_reading: be like strangers on the earth
  chosen_spanish_reading: sean como extranjeros en la tierra
  alternative_spanish_readings:
  - vivan como forasteros en la tierra
  - sean como extraños en la tierra
  rationale: La frase conserva una exhortación de desapego y provisionalidad terrenal sin convertirla en una doctrina explícita adicional. El texto latino no desarrolla aquí una metáfora más específica, por lo que la traducción debe mantenerse sobria.
  doctrine_reference: 1 Pedro 2:11; Hebreos 11:13
- issue: El sustantivo plural 'males'
  english_pob_reading: in the midst of evils
  chosen_spanish_reading: en medio de los males
  alternative_spanish_readings:
  - en medio de las desgracias
  - en medio de los peligros
  rationale: '''Males'' preserva la amplitud moral y circunstancial del latín malis. No se estrecha a ''desgracias'' o ''peligros'', porque el texto puede abarcar aflicciones, amenazas y condiciones adversas en general.'
  doctrine_reference: Romanos 12:21; Juan 16:33
translation_notes:
  revision_awareness: La versión inglesa POB leída como contexto se mantiene sin cambios y no introdujo notas; el latín limpio coincide sustancialmente con esa traducción. La revisión más reciente indicó acuerdo alto y sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se usa 'batalla' en coherencia con el sustantivo bélico del latín, sin reemplazarlo por una fórmula eclesiástica más abstracta.
  - Se conserva el plural 'males' para no neutralizar la fuerza del original.
