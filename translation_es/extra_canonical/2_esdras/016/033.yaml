review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el latín en la mayor parte: terra/deserta, agri/inveteraverunt, viae/semitae y la causal final están bien representados. Sin embargo, «brotarán espinos» desplaza ligeramente el sentido de spinas, que en latín es más directamente «espinas» o «zarzas/espinos» según contexto; aquí la traducción inglesa auditada fijó «thorns», no plantas específicas. En español, «brotarán espinas» resulta menos natural para caminos y veredas; «se llenarán de espinas» sería más idiomático pero se aleja de germinabunt. La mejor reparación mínima y fiel es «brotará maleza espinosa» o «brotarán espinas», pero para conservar el verbo fuente y la imagen profética conviene una formulación que mantenga el crecimiento vegetal.'
  spanish_quality_summary: 'El español es claro y de buen registro bíblico. No obstante, hay dos detalles mejorables: 1) «brotarán espinos» suena algo concreto y botánico, como si los caminos produjeran arbustos de espino, mientras el latín habla más ampliamente de espinas/vegetación espinosa; 2) el pie de nota alternativo usa «zarzas», que sí funciona como alternativa, pero la nota debería corresponder a una traducción principal mejor ajustada. El resto es natural y legible.'
  glossary_alignment: No hay términos del glosario principal en juego salvo vocabulario común. Las decisiones sobre «tierra», «desolada», «campos», «veredas» y la cláusula final son coherentes con el proyecto. La única desalineación relevante es léxica respecto a spinas.
  issues:
  - severity: medium
    issue: «Brotarán espinos» especifica demasiado spinas
    rationale: El latín spinas significa «espinas» y por extensión vegetación espinosa. «Espinos» en español nombra arbustos o árboles concretos, lo que puede estrechar indebidamente la imagen.
  - severity: low
    issue: La nota alternativa queda algo condicionada por la elección principal
    rationale: Si el texto principal se corrige para evitar «espinos», conviene ajustar la nota para que siga reflejando la alternativa histórica sin crear tensión léxica innecesaria.
  revised_spanish_text: Y la tierra quedará desolada[a], y sus campos envejecerán, y sus caminos y todas sus veredas brotarán espinas, porque las ovejas no pasarán por ellos.
  revised_footnotes:
  - marker: a
    text: O «y sus campos se cubrirán de espinos, y sus caminos y todas sus veredas brotarán zarzas».
    reason: alternative_reading / previous_rendering
  revision_rationale: Se hace una reparación mínima para ajustar mejor spinas al latín y al inglés auditado («thorns»), evitando la especificación botánica de «espinos». Se conserva el resto del verso, que ya reflejaba fielmente inveteraverunt como «envejecerán» y mantenía una buena legibilidad en español. La nota se conserva como alternativa histórica documentada.
