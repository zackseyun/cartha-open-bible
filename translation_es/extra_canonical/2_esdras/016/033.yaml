    changes_summary: Changed 'earth' to 'land' for closer lexical fit with terra, and 'will waste away' to 'will grow old' to reflect inveteraverunt more directly. Left the final plural pronoun as 'them' to match the roads and paths.
translation:
  language: es
  text: Y la tierra quedará desolada[a], y sus campos envejecerán, y sus caminos y todas sus veredas brotarán espinas, porque las ovejas no pasarán por ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y sus campos se cubrirán de espinos, y sus caminos y todas sus veredas brotarán zarzas».
    reason: alternative_reading / previous_rendering
lexical_decisions:
- source_word: terra
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: terra
  rationale: El latín terra corresponde de manera directa a «tierra»; mantiene el alcance geográfico general sin introducir una especificación no sustentada como «país».
- source_word: deserta
  english_pob_choice: left desolate
  chosen_spanish: desolada
  alternatives_spanish:
  - desierta
  - abandonada
  lexicon: desertus
  rationale: «Desolada» conserva la idea de quedar vacía y devastada, alineada con el valor de deserta en el contexto de juicio; «desierta» podría sonar más a falta de habitantes, y «abandonada» añade un matiz no explicitado.
- source_word: agri
  english_pob_choice: fields
  chosen_spanish: campos
  alternatives_spanish:
  - tierras
  - labranzas
  lexicon: ager
  rationale: «Campos» reproduce el sentido agrícola básico de agri en español natural y bíblicamente inteligible.
- source_word: inveteraverunt
  english_pob_choice: will grow old
  chosen_spanish: envejecerán
  alternatives_spanish:
  - se volverán viejos
  - decadrán
  lexicon: invetero
  rationale: El inglés auditado ya corrigió la lectura errónea hacia «grow old»; en español, «envejecerán» refleja ese envejecimiento/decadencia de forma idiomática y directa.
- source_word: viae ... et omnes semitae
  english_pob_choice: roads and all its paths
  chosen_spanish: caminos y todas sus veredas
  alternatives_spanish:
  - caminos y todas sus sendas
  - vías y todas sus veredas
  lexicon: via / semita
  rationale: «Caminos» y «veredas» distinguen bien las dos palabras latinas sin volver el verso artificioso; «veredas» mantiene el valor de senda menor de semita.
- source_word: germinabunt spinas
  english_pob_choice: will sprout thorns
  chosen_spanish: brotarán espinos
  alternatives_spanish:
  - echarán espinas
  - producirán espinos
  lexicon: germino / spina
  rationale: «Brotarán espinos» conserva el verbo de germinación y el objeto vegetal con naturalidad en español; «espinos» evita perder la imagen de plantas espinosas y no solo espinas aisladas.
- source_word: eo quod non transient oves per eam
  english_pob_choice: because sheep will not pass through them
  chosen_spanish: porque las ovejas no pasarán por ellos
  alternatives_spanish:
  - porque ovejas no pasarán por allí
  - porque las ovejas no transitarán por ellos
  lexicon: transire / oves
  rationale: Se mantiene la causalidad de eo quod y la imagen literal de ovejas que no pasan por los caminos; «por ellos» concuerda con el plural de «caminos y veredas».
theological_decisions:
- issue: Imagen de desolación como juicio sobre la tierra
  english_pob_reading: And the land will be left desolate
  chosen_spanish_reading: Y la tierra quedará desolada
  alternative_spanish_readings:
  - Y la tierra será dejada desolada
  - Y la tierra quedará desierta
  rationale: Se conserva la fuerza profética de un estado resultante de juicio, sin suavizarlo ni explicarlo alegóricamente.
  doctrine_reference: Juicio divino y devastación del orden creado en literatura apocalíptica
- issue: Pluralidad final de los referentes de tránsito
  english_pob_reading: because sheep will not pass through them
  chosen_spanish_reading: porque las ovejas no pasarán por ellos
  alternative_spanish_readings:
  - porque las ovejas no pasarán por allí
  - porque las ovejas no pasarán por estas
  rationale: Se preserva el plural de los caminos y sendas como referentes de «ellos», siguiendo la revisión inglesa que mantuvo el plural para concordar con roads and all its paths.
  doctrine_reference: Precisión referencial en lenguaje apocalíptico
translation_notes:
  revision_awareness: 'La versión inglesa auditada corrigió una mala lectura previa de inveteraverunt: no significa que los campos se cubran de espinos, sino que «envejecen» o «se echan a perder». También ajustó el referente final al plural «them» para concordar con «roads and all its paths». La presente propuesta sigue esas decisiones y conserva la imagen de espinos para spinas sin trasladarla indebidamente a agri.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo exija; aquí no aparece el tetragrámaton.
  - Se usa «espinos» en el texto principal y «zarzas» solo como alternativa posible en la nota, respetando la imagen vegetal sin imponer una equivalencia única.
  - Se evita «SEÑOR» porque no hay base en este verso para una sustitución del nombre divino.
