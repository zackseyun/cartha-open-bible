base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/016/033.yaml
  text: And the land will be left desolate[a], and its fields will grow old, and its roads and all its paths will sprout thorns, because sheep will not pass through them.
  footnotes:
  - marker: a
    text: Or 'and its fields will grow over with thorns, and its roads and all its paths will sprout brambles'.
    reason: previous_rendering
  revision_pass:
