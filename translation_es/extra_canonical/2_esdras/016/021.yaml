source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: et angustia missa sunt flagella in emendatione. Et in his omnibus se non conuertent ab iniquitatibus suis, neque flagellorum memores erunt semper. Ecce erit annonae uilitas super terram sic ut putent sibi esse directam pacem, et tunc germinabunt mala super terram, gladius, fames et magna confusio. A fame enim plurimi qui inhabitant terram interient, et gladius perdet ceteros qui superauerint a fame; Et mortui tanquam stercora proicientur, et non erit qui consoletur eos; derelinquetur enim terra deserta, et ciuitates eius deicientur. Non derelinquetur qui colat terram et qui seminet eam. Ligna dabunt fructus, et quis uindemiabit illa? Vua matura fiet, et quis calcabit illam? erit enim in locis magna desertio; Cupiet enim homo hominem uidere uel uocem eius audire; Relinquentur enim de ciuitate decem, et duo de agro qui absconderint se in densis nemoribus et fissuris petrarum. Quemadmodum relinquentur in oliueto in singulis arboribus tres aut quattuor oliuae, Aut sicut in uinea uindemiata
    racemi relinquentur ab his qui diligenter uineam scrutantur; Sic relinquentur in diebus illis tres aut quattuor ab scrutantibus domus eorum in rumpheam. Et relinquetur deserta terra, et agri eius in uepres erunt, et uiae eius et omnes semitae germinabunt spinas, eo quod non transient oues per eam. Lugebunt uirgines non habentes sponsos, lugebunt mulieres non habentes uiros, lugebunt filiae
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/016/021.yaml
  text: Yet in all these things they will not turn from their iniquities, nor will they always remember the scourges.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:29:49Z'
    unchanged: false
    changes_summary: Changed 'for all these things' to 'in all these things' to more closely reflect the source phrase 'in his omnibus' and improve lexical accuracy.
translation:
  language: es
  text: Pero en todo esto no se convertirán de sus iniquidades, ni recordarán siempre los azotes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: in his omnibus
  english_pob_choice: in all these things
  chosen_spanish: en medio de todo esto
  alternatives_spanish:
  - en todas estas cosas
  - en todo esto
  lexicon: in + ablative of circumstance
  rationale: La frase latina señala el conjunto de calamidades o juicios mencionados antes; en español, 'en medio de todo esto' conserva el valor circunstancial y suena natural, sin perder el sentido de abarcamiento que el ajuste inglés ya fijó con 'in all these things'.
- source_word: se non conuertent
  english_pob_choice: they will not turn
  chosen_spanish: no se convertirán
  alternatives_spanish:
  - no se volverán
  - no se apartarán
  lexicon: convertere
  rationale: El verbo latino expresa un cambio de dirección moral. 'Convertirse' mantiene ese valor y, en contexto bíblico, comunica bien la idea de volverse de la maldad sin forzar una paráfrasis.
- source_word: ab iniquitatibus suis
  english_pob_choice: from their iniquities
  chosen_spanish: de sus iniquidades
  alternatives_spanish:
  - de sus maldades
  - de sus injusticias
  lexicon: iniquitas
  rationale: '''Iniquidades'' es el equivalente más directo y conserva el matiz moral y legal del latín. ''Maldades'' sería más general y ''injusticias'' desplaza demasiado el término.'
- source_word: flagellorum memores erunt semper
  english_pob_choice: will always remember the scourges
  chosen_spanish: recordarán siempre los azotes
  alternatives_spanish:
  - siempre se acordarán de los azotes
  - mantendrán siempre presente los azotes
  lexicon: flagella
  rationale: '''Azotes'' conserva la imagen de castigo disciplinario/judicial del latín ''flagella''. ''Escarmientos'' interpretaría demasiado; ''castigos'' sería posible, pero pierde la concreción corporal de la metáfora.'
theological_decisions:
- issue: Función de los juicios como disciplina que debería producir arrepentimiento
  english_pob_reading: the scourges are not remembered in a way that leads to turning from iniquities
  chosen_spanish_reading: los juicios no logran que el pueblo se convierta de sus iniquidades
  alternative_spanish_readings:
  - los castigos no son recordados de modo que se aparten de sus pecados
  - no aprenden de los azotes
  rationale: 'El contexto inmediato presenta azotes/flagelos como corrección. La traducción conserva la tensión: los castigos están presentes, pero no producen el cambio moral esperado.'
  doctrine_reference: Sabiduría bíblica sobre disciplina y arrepentimiento; cf. llamadas proféticas al retorno a Dios.
translation_notes:
  revision_awareness: This verse/section reflects the latest English audit change from 'for all these things' to 'in all these things.' The Spanish draft follows the revised circumstantial force with 'en medio de todo esto,' avoiding a causal sense and matching the Latin 'in his omnibus.'
  spanish_consistency_notes:
  - Se conserva un registro bíblico claro y sobrio, compatible con el estilo del proyecto.
  - '''Convertirse'' se usa en sentido moral, no meramente religioso-formal.'
  - No se introducen términos eclesiásticos que atenúen la fuerza de 'flagella' ni de 'iniquities'.
