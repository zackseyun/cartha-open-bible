translation:
  language: es
  text: No quedará ningún agricultor[a] para labrar la tierra y sembrarla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No quedará nadie para labrar la tierra y sembrarla»'
