lexical_decisions:
- source_word: agricola
  english_pob_choice: farmer
  chosen_spanish: agricultor
  alternatives_spanish:
  - campesino
  - labrador
  - labrador de la tierra
  lexicon: agricola
  rationale: 'El latín es específico: no dice simplemente ''nadie'', sino ''agricola'', es decir, una persona dedicada al cultivo. ''Agricultor'' conserva esa precisión semántica y funciona de manera natural en español.'
- source_word: colit terram
  english_pob_choice: to till the earth
  chosen_spanish: labrar la tierra
  alternatives_spanish:
  - cultivar la tierra
  - trabajar la tierra
  lexicon: colere + terra
  rationale: '''Labrar la tierra'' expresa con claridad la acción agrícola del original y mantiene un registro digno y bíblico sin depender de una calca pesada.'
- source_word: seminat eam
  english_pob_choice: to sow it
  chosen_spanish: sembrarla
  alternatives_spanish:
  - sembrarla a ella
  - sembrar en ella
  lexicon: seminare
  rationale: El infinitivo con pronombre enclítico 'sembrarla' transmite con naturalidad el objeto directo femenino referido a 'la tierra' y evita redundancia innecesaria.
translation_notes:
  revision_awareness: La versión inglesa POB fue revisada desde una formulación indefinida ('There will be no one left') a una más precisa ('No farmer will be left') para reflejar el sujeto explícito del latín 'agricola'. La redacción española sigue esa revisión y conserva la especificidad léxica del original.
  spanish_consistency_notes:
  - Se mantuvo 'agricultor' para 'agricola', en línea con la revisión auditada que rechaza la generalización a 'nadie'.
  - Se prefirió 'labrar la tierra' frente a una paráfrasis más amplia para conservar la imagen agrícola concreta del latín.
  - El pronombre enclítico en 'sembrarla' es una solución idiomática en español para referir nuevamente a 'la tierra' sin alterar el sentido.
