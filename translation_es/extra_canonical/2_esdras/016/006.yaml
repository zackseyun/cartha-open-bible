translation:
  language: es
  text: ¿Puede alguien hacer retroceder a un león hambriento en el bosque, o apagar un fuego cuando se ha prendido la paja?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: numquid recutiet aliquis leonem esurientem
  english_pob_choice: Can anyone beat back a hungry lion
  chosen_spanish: ¿Puede alguien rechazar a un león hambriento
  alternatives_spanish:
  - ¿Puede alguien hacer retroceder a un león hambriento
  - ¿Puede alguien ahuyentar a un león hambriento
  lexicon: recutiet
  rationale: El latín plantea una acción de hacer retroceder o repeler; en español, "rechazar" comunica bien la idea de intentar contener o hacer retroceder al león sin añadir una imagen distinta.
- source_word: in silva
  english_pob_choice: in the forest
  chosen_spanish: en el bosque
  alternatives_spanish:
  - en la selva
  - en el monte
  lexicon: silva
  rationale: '"Bosque" es la equivalencia natural y clara en español para silva, y conserva el escenario sin sobredeterminación regional.'
- source_word: extinguet ignem
  english_pob_choice: quench a fire
  chosen_spanish: apagar un fuego
  alternatives_spanish:
  - extinguir un fuego
  - apagar el incendio
  lexicon: extinguet
  rationale: '"Apagar" es la forma más idiomática en español para un fuego; mantiene la fuerza de extinguere sin sonar excesivamente técnica.'
- source_word: cum stramen incensum fuerit
  english_pob_choice: when straw has been set ablaze
  chosen_spanish: cuando la paja ya ha sido encendida
  alternatives_spanish:
  - cuando la paja haya sido prendida
  - cuando la paja ya esté ardiendo
  lexicon: stramen
  rationale: La pasiva latina indica que la paja ha sido prendida/fogoneada; "ya ha sido encendida" conserva el valor perfecto y la anterioridad del acto.
theological_decisions:
- issue: Retórica de imposibilidad ante fuerzas destructivas
  english_pob_reading: Can anyone beat back a hungry lion in the forest, or quench a fire when straw has been set ablaze?
  chosen_spanish_reading: ¿Puede alguien rechazar a un león hambriento en el bosque, o apagar un fuego cuando la paja ya ha sido encendida?
  alternative_spanish_readings:
  - ¿Quién puede hacer retroceder a un león hambriento en el bosque, o extinguir un fuego cuando la paja ya ha sido prendida?
  rationale: El verso es una pregunta retórica sobre la imposibilidad de contener un peligro ya desatado; la traducción española conserva esa imposibilidad sin intensificarla ni suavizarla.
  doctrine_reference: Retórica sapiencial/apocalíptica; no introduce afirmaciones doctrinales adicionales.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo externo mostró alta concordancia; por eso la versión española sigue de cerca el sentido ya validado del inglés POB y del latín limpio.
  spanish_consistency_notes:
  - Se mantiene un español neutro y publicable, con verbos naturales para imágenes de violencia y fuego.
  - No se introduce terminología eclesiástica innecesaria ni glosas interpretativas ajenas al texto.
