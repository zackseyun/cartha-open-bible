translation:
  language: es
  text: Porque devastarán y saquearán sus bienes y sus casas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: deuastabunt
  english_pob_choice: ravage
  chosen_spanish: devastarán
  alternatives_spanish:
  - asolarán
  - arrasarán
  lexicon: Lac. deuastare / Lat. devastare
  rationale: Devastarán conserva la violencia y amplitud del verbo latino sin añadir un matiz interpretativo ajeno al texto.
- source_word: diripient
  english_pob_choice: plunder
  chosen_spanish: saquearán
  alternatives_spanish:
  - despojarán
  - robarán
  lexicon: Lat. diripere
  rationale: Saq uear expresa bien la acción de tomar por la fuerza el contenido de una casa o posesiones, manteniendo la fuerza del verbo latino.
- source_word: substantias eorum
  english_pob_choice: their goods
  chosen_spanish: sus bienes
  alternatives_spanish:
  - sus posesiones
  - sus pertenencias
  lexicon: Lat. substantiae
  rationale: Bienes es la opción más natural y amplia en español para bienes materiales o propiedades, sin reducir indebidamente el alcance del latino substantiae.
- source_word: de domos
  english_pob_choice: their houses
  chosen_spanish: sus casas
  alternatives_spanish:
  - sus hogares
  - de sus casas
  lexicon: Lat. domus
  rationale: Casas reproduce de manera directa domos; se evita ‘hogares’ para no introducir un tono más interpretativo o afectivo que el latino no exige.
theological_decisions:
- issue: Alcance de la violencia y la pérdida material
  english_pob_reading: For they will ravage and plunder their goods and their houses.
  chosen_spanish_reading: Porque devastarán y saquearán sus bienes y sus casas.
  alternative_spanish_readings:
  - Pues devastarán y saquearán sus bienes y sus casas.
  - Porque asolarán y despojarán sus bienes y sus casas.
  rationale: El texto describe destrucción y expolio materiales; no se añade ningún elemento explicativo como expulsión, porque la revisión inglesa eliminó esa ampliación interpretativa para ceñirse más al latín.
  doctrine_reference: Fidelidad al sentido literal del pasaje; sin implicación doctrinal adicional
translation_notes:
  revision_awareness: The English audit trail records a revision that removed the interpretive addition ‘drive them out of’ and restored a more direct rendering of the Latin phrase ‘and their houses.’ The Spanish draft follows that directness by naming both ‘sus bienes’ and ‘sus casas’ without adding expulsión or relocation.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y bíblico con vocabulario transparente para lectura eclesial.
  - 'Se conserva la coordinación simple del original: devastarán y saquearán ... y ...'
  - No se introduce mayúscula devocional ni eufemismos que atenúen el saqueo y la devastación.
