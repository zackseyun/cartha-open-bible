  yaml_path: translation/extra_canonical/2_esdras/016/028.yaml
  text: For a man will long to see another man[a], or at least to hear his voice.
  footnotes:
  - marker: a
    text: Or 'or even'.
    reason: previous_rendering
  revision_pass:
