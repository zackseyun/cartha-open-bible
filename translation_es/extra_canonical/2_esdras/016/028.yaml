    changes_summary: Added 'another' to reflect the distinction in the Latin between one man and another, improving clarity and natural English.
translation:
  language: es
  text: Porque un hombre deseará ver a otro hombre[a], o al menos oír su voz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «o siquiera».
    reason: alternative_reading
lexical_decisions:
- source_word: concupiscet
  english_pob_choice: will long
  chosen_spanish: deseará
  alternatives_spanish:
  - anhelará
  - tendrá deseo de
  lexicon: Latin concupiscere
  rationale: El latín expresa deseo intenso; en español, «deseará» comunica bien ese anhelo sin cargar el texto con un matiz excesivamente arcaico o moroso.
- source_word: homo hominem
  english_pob_choice: a man ... another man
  chosen_spanish: un hombre ... a otro hombre
  alternatives_spanish:
  - un hombre ... a un hombre
  - un ser humano ... a otro ser humano
  lexicon: Latin homo
  rationale: La repetición contrasta a una persona con otra; «otro hombre» sigue la revisión inglesa y hace explícita la distinción entre uno y otro individuo.
- source_word: vel certe
  english_pob_choice: or at least
  chosen_spanish: o al menos
  alternatives_spanish:
  - o siquiera
  - o por lo menos
  lexicon: Latin vel certe
  rationale: La secuencia latina introduce una alternativa de menor alcance, no una intensificación; «al menos» reproduce esa fuerza de respaldo o mínimo deseado.
- source_word: vocem eius audire
  english_pob_choice: to hear his voice
  chosen_spanish: oír su voz
  alternatives_spanish:
  - escuchar su voz
  - oír la voz de él
  lexicon: Latin vox / audire
  rationale: «Oír su voz» conserva la sencillez y la relación directa del latín sin necesidad de añadir énfasis interpretativo.
theological_decisions:
- issue: Descripción de la escasez humana implícita en el contexto
  english_pob_reading: For a man will long to see another man, or at least to hear his voice.
  chosen_spanish_reading: Porque un hombre deseará ver a otro hombre, o al menos oír su voz.
  alternative_spanish_readings:
  - Pues un hombre anhelará ver a otro hombre, o siquiera oír su voz.
  - Porque un hombre querrá ver a otro hombre, o por lo menos oír su voz.
  rationale: No hay un término doctrinal especializado aquí; la cuestión es conservar la imagen de soledad extrema y la alternativa mínima de oír una voz. «Al menos» mantiene la tensión de supervivencia social del contexto apocalíptico sin exagerarla.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'La revisión inglesa ajustó dos puntos: añadió «another» para reflejar la distinción de una persona frente a otra, y corrigió «or even» a «or at least» para expresar mejor la fuerza menor de vel certe. La versión española sigue ambas decisiones con «otro hombre» y «al menos».'
  spanish_consistency_notes:
  - Se mantiene un español sobrio y publicable, sin calco innecesario del latín.
  - No se usa «escuchar» como equivalente principal, porque el foco es simplemente percibir la voz, no prestar atención activa.
  - La nota conserva una alternativa plausible en español («o siquiera») para reflejar la leve variación semántica posible del latín.
