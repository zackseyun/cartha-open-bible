translation:
  language: es
  text: He aquí, hambre, plaga y tribulación han sido enviadas como azotes de corrección.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ecce
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - He aquí que
  lexicon: interjection/deictic particle
  rationale: «He aquí» reproduce el carácter de llamada de atención del latín «Ecce» y del inglés POB «Behold» sin añadir contenido nuevo.
- source_word: fames
  english_pob_choice: famine
  chosen_spanish: el hambre
  alternatives_spanish:
  - la hambruna
  - la escasez de alimentos
  lexicon: noun
  rationale: En este contexto apocalíptico, «hambre» comunica el castigo de inanición con naturalidad en español. «Hambruna» sería más explícito, pero el latín solo ofrece el sustantivo simple.
- source_word: plaga
  english_pob_choice: plague
  chosen_spanish: la plaga
  alternatives_spanish:
  - la peste
  - la epidemia
  lexicon: noun
  rationale: Se conserva «plaga» porque corresponde directamente al latín y mantiene la amplitud de sentido de una calamidad enviada por Dios, no limitada solo a enfermedad biológica.
- source_word: tribulatio
  english_pob_choice: tribulation
  chosen_spanish: la tribulación
  alternatives_spanish:
  - la aflicción
  - la angustia
  lexicon: noun
  rationale: «Tribulación» es el equivalente más estable y fiel al latín y al inglés auditado, preservando el tono bíblico del término.
- source_word: facient ... mala
  english_pob_choice: have been sent
  chosen_spanish: han sido enviadas
  alternatives_spanish:
  - vendrán
  - se impondrán
  lexicon: verbal phrase
  rationale: El texto latino transmitido es conciso y el inglés POB entiende la frase como pasiva divina implícita. En español, «han sido enviadas» expresa claramente que estos males proceden de una acción superior, como en el sentido del POB.
- source_word: cum uenerint mala
  english_pob_choice: for correction
  chosen_spanish: para corrección
  alternatives_spanish:
  - para reprensión
  - para enmienda
  lexicon: noun phrase
  rationale: «Corrección» sigue de cerca el inglés POB y mantiene el sentido disciplinario del castigo. «Enmienda» o «reprensión» serían posibles, pero menos directas aquí.
theological_decisions:
- issue: Los males como castigos enviados por Dios
  english_pob_reading: famine and plague and tribulation have been sent as scourges for correction
  chosen_spanish_reading: el hambre, la plaga y la tribulación han sido enviadas como azotes para corrección
  alternative_spanish_readings:
  - han venido como azotes para corrección
  - han sido enviadas para corregir
  rationale: 'La formulación conserva la lectura teológica del POB: estos males no son meramente accidentales, sino instrumentos de disciplina divina. «Azotes» mantiene el valor punitivo del inglés «scourges» sin suavizarlo.'
  doctrine_reference: Disciplina/castigo divino en lenguaje profético-apocalíptico
translation_notes:
  revision_awareness: El texto latino proporcionado dice «facient, cum uenerint mala? Ecce fames et plaga et tribulatio». La versión inglesa auditada fue ajustada para eliminar «and distress» porque no aparece en el latino. La propuesta española sigue esa revisión y no añade ningún elemento ausente del origen.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico y apocalíptico sin recurrir a «SEÑOR» u այլ sustitutos, porque este verso no contiene el nombre divino.
  - Se conserva el paralelismo nominal («el hambre, la plaga y la tribulación») para reflejar la enumeración del original.
  - No se introduce una nota a pie de página porque no hay variante textual relevante en el material aportado.
