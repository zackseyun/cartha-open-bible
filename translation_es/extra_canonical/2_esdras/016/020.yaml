  rationale: Se ajusta el español para mayor naturalidad y dignidad («hambre, plaga y tribulación»), y se mejora el sintagma final a «azotes de corrección», que suena menos forzado que «para corrección» mientras conserva la fuerza disciplinaria del POB auditado. No se requieren notas al pie.
