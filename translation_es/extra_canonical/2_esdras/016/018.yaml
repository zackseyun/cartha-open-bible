    changes_summary: Added the omitted opening phrase 'In those days' from the Latin. Revised 'many groanings' to 'much groaning' for more natural English. Removed 'the rulers' since the Latin only says 'they will be afraid.' Adjusted punctuation for smoother formal flow while preserving the source structure.
translation:
  language: es
  text: 'En aquellos días: el comienzo de los dolores y mucho gemir, el comienzo del hambre y muchos perecerán, el comienzo de las guerras y tendrán miedo, el comienzo de los males y todos temblarán.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: in illis diebus
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En tales días
  lexicon: Latin in + illis diebus
  rationale: Conserva la apertura temporal enfática del latín y reproduce de manera natural la fórmula bíblica sin añadir ni omitir contenido.
- source_word: Initium dolorum
  english_pob_choice: the beginning of pains
  chosen_spanish: el comienzo de los dolores
  alternatives_spanish:
  - el principio de los dolores
  - el inicio de dolores
  lexicon: Latin initium + dolorum
  rationale: «Comienzo» mantiene bien initium y suena más natural en español que un calco rígido; «dolores» conserva el sentido físico de sufrimientos/penas sin suavizarlo.
- source_word: multi gemitus
  english_pob_choice: much groaning
  chosen_spanish: mucho gemido
  alternatives_spanish:
  - muchos gemidos
  - gran gemido
  lexicon: Latin multi + gemitus
  rationale: El latín presenta una idea de abundancia/intensidad ligada al gemido; «mucho gemido» refleja esa masa o abundancia de gemir, como en la revisión inglesa, sin forzar pluralidad si el sustantivo funciona colectivamente.
- source_word: Initium famis
  english_pob_choice: the beginning of famine
  chosen_spanish: el comienzo del hambre
  alternatives_spanish:
  - el principio del hambre
  - el comienzo de la hambruna
  lexicon: Latin famis
  rationale: «Hambre» conserva la fuerza básica del latín y evita especificar «hambruna» si el texto no exige una crisis técnica; mantiene el paralelismo con la estructura repetida.
- source_word: multi interient
  english_pob_choice: many will perish
  chosen_spanish: muchos perecerán
  alternatives_spanish:
  - muchos morirán
  - muchos sucumbirán
  lexicon: Latin interient
  rationale: «Perecerán» transmite la idea de morir o ser destruidos, con una intensidad acorde al contexto apocalíptico.
- source_word: Initium bellorum
  english_pob_choice: the beginning of wars
  chosen_spanish: el comienzo de las guerras
  alternatives_spanish:
  - el principio de las guerras
  - el inicio de guerras
  lexicon: Latin bellorum
  rationale: Se conserva el plural del latín y la estructura repetitiva de la serie de anuncios.
- source_word: formidabunt
  english_pob_choice: they will be afraid
  chosen_spanish: tendrán miedo
  alternatives_spanish:
  - temerán
  - se asustarán
  lexicon: Latin formidabunt
  rationale: El verbo latino expresa temor; «tendrán miedo» es claro en español y no añade un sujeto específico que el latín no da.
- source_word: Initium malorum
  english_pob_choice: the beginning of evils
  chosen_spanish: el comienzo de los males
  alternatives_spanish:
  - el principio de los males
  - el comienzo de los males
  lexicon: Latin malorum
  rationale: «Males» mantiene el valor amplio de calamidades/evils y evita moralizar el término más allá del latín.
- source_word: omnes tremescent
  english_pob_choice: all will tremble
  chosen_spanish: todos temblarán
  alternatives_spanish:
  - todos se estremecerán
  - todos quedarán temblando
  lexicon: Latin tremescent
  rationale: «Temblarán» reproduce el efecto corporal y global del verbo latino con naturalidad en español.
theological_decisions:
- issue: Secuencia apocalíptica de juicios y aflicciones
  english_pob_reading: 'A list of escalating calamities: pains, groaning, famine, death, wars, fear, evils, trembling.'
  chosen_spanish_reading: 'Una serie escalonada de calamidades: dolores, gemido, hambre, muerte, guerras, miedo, males y temblor.'
  alternative_spanish_readings:
  - Una serie de males crecientes
  - Una cadena de aflicciones
  rationale: La redacción española conserva el paralelismo acumulativo del texto y la intensidad escalonada sin convertir la lista en paráfrasis explicativa.
  doctrine_reference: Apocalíptica bíblica; no se introduce interpretación doctrinal adicional.
translation_notes:
  revision_awareness: La versión inglesa revisada añadió la apertura temporal «In those days», ajustó «many groanings» a «much groaning», eliminó «the rulers» por no estar en el latín y mantuvo la estructura enumerativa. La versión española sigue de cerca esa revisión y evita añadir sujetos o precisiones no presentes en el texto fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - Se usa «comienzo» para mantener la serie repetida de initium con tono claro y formal.
  - Se preserva el paralelismo sintáctico de la enumeración apocalíptica para facilitar la lectura pública.
