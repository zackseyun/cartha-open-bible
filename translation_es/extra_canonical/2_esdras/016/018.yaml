    issue: «mucho gemido» suena poco natural en español
    rationale: Aunque puede defenderse como sustantivo colectivo, en español corriente y eclesial «muchos gemidos» o «mucho gemir» transmiten mejor la abundancia/intensidad de multi gemitus. Dado que el English POB fijó «much groaning», la mejor equivalencia española es una expresión de acción continua más natural.
  revised_spanish_text: 'En aquellos días: el comienzo de los dolores y mucho gemir, el comienzo del hambre y muchos perecerán, el comienzo de las guerras y tendrán miedo, el comienzo de los males y todos temblarán.'
  revision_rationale: Se ajusta únicamente «mucho gemido» a «mucho gemir» para reflejar mejor en español la abundancia/intensidad de multi gemitus y alinearse con la revisión inglesa «much groaning», sin alterar el sentido ni la estructura del versículo.
