review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura del latín: sujetos comerciales, actividad hecha ''in rapina'', y la cláusula temporal final ''quamdiu exornant''. Sin embargo, ''para saqueo'' suena menos idiomático en español en este contexto y puede leerse como finalidad activa. Una formulación más natural puede preservar mejor el matiz de ''for plunder/as spoil'' sin sobreinterpretar.'
  spanish_quality_summary: El español es claro, pero 'lo hacen para saqueo' resulta algo forzado. 'Para despojo' o 'para ser despojados' serían opciones, pero la segunda añade explicitación no presente. 'Para despojo' mantiene la concisión y el tono solemne con mejor naturalidad. El resto del versículo es legible y digno.
  glossary_alignment: No hay términos del glosario mayor en juego. 'Negocian' está bien para negociantur; 'se adornan' refleja adecuadamente exornant. La nota alternativa debe seguir reflejando el rango semántico de rapina sin introducir una lectura demasiado libre.
  issues:
  - severity: medium
    issue: 'Expresión española poco idiomática: ''lo hacen para saqueo'''
    rationale: Aunque semánticamente cercana al inglés auditado, en español 'saqueo' suele nombrar el acto de saquear más que el estado/resultado de quedar como botín o despojo. Esto puede sugerir más intención activa de la que el latín exige.
  - severity: low
    issue: Nota al pie mejorable
    rationale: La nota actual es útil, pero conviene alinear la alternativa con una formulación más natural en el texto principal y explicar que el latín admite el sentido de botín/despojo sin fijar con precisión el agente.
  revised_spanish_text: Y los que negocian, lo hacen para despojo[a], mientras se adornan.
