- from: Y los que negocian, lo hacen para saqueo[a], mientras se adornan.
  to: Y los que negocian, lo hacen para despojo[a], mientras se adornan.
  rationale: 'Se ajusta ''para saqueo'' a ''para despojo'' por mayor naturalidad y mejor correspondencia con el valor contextual de *in rapina* según la auditoría inglesa: la actividad comercial termina bajo la lógica del despojo, sin necesidad de explicitar una intención activa ni una pasiva desarrollada. Se conserva ''mientras se adornan'' como buena representación de *quamdiu exornant*.'
