    changes_summary: Added the final clause 'as long as they adorn themselves' to account for the omitted Latin words 'quamdiu exornant.'
translation:
  language: es
  text: Y los que negocian, lo hacen para despojo[a], mientras se adornan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo hacen para botín»; el latín *in rapina* puede expresar la idea de despojo, botín o presa, sin precisar aquí más el matiz.
    reason: alternative_reading
lexical_decisions:
- source_word: Et qui negociantur
  english_pob_choice: And those who conduct business
  chosen_spanish: Y los que negocian
  alternatives_spanish:
  - Y los que hacen negocios
  - Y los comerciantes
  lexicon: nego-
  rationale: El latín describe a quienes participan en actividad mercantil o de comercio. «Los que negocian» conserva la referencia amplia a actividad comercial sin reducirla a una sola figura profesional y suena natural en español bíblico contemporáneo.
- source_word: negociantur ... in rapina
  english_pob_choice: do so for plunder
  chosen_spanish: lo hacen para saqueo
  alternatives_spanish:
  - lo hacen para botín
  - lo hacen para pillaje
  lexicon: rapina
  rationale: «Rapina» expresa despojo, saqueo o botín según el contexto. Dado el marco de pérdida y violencia del pasaje, «saqueo» comunica bien el resultado o destino de esa actividad sin sugerir una intención interna que el latín no exige.
- source_word: quamdiu exornant
  english_pob_choice: as long as they adorn themselves
  chosen_spanish: mientras se adornan
  alternatives_spanish:
  - mientras se engalanan
  - en tanto se adornan
  lexicon: exornare
  rationale: «Exornant» puede significar adornar, embellecer o engalanar. «Mientras se adornan» preserva la imagen externa de ostentación en un español claro y neutro, sin añadir un matiz moral que no está explícito en el verbo.
theological_decisions:
- issue: Relación entre actividad económica y despojo
  english_pob_reading: do so for plunder
  chosen_spanish_reading: lo hacen para saqueo
  alternative_spanish_readings:
  - lo hacen para botín
  - lo hacen para pillaje
  rationale: El texto no condena simplemente el comercio como tal, sino que lo presenta bajo la lógica del despojo dentro del juicio descrito en el contexto inmediato. «Saqueo» mantiene esa tensión sin suavizarla.
  doctrine_reference: Juicio divino y reversión de las seguridades humanas en 2 Esdras 16:41-48
translation_notes:
  revision_awareness: 'La versión inglesa revisada corrigió dos puntos del borrador anterior: evitó la lectura activa indebida de ''conduct business for plunder'' y añadió la cláusula final omitida ''as long as they adorn themselves''. La presente versión sigue esa revisión y conserva ambos elementos del latín: *in rapina* y *quamdiu exornant*.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - «Negocian» se usa en sentido comercial general, no como 'tratan con Dios' ni con sentido negativo automático.
  - La cláusula final se traduce de forma adverbial con «mientras» para conservar la simultaneidad de *quamdiu*.
