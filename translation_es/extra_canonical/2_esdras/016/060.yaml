revisions:
- from: Extendió el cielo como una cámara abovedada, y lo fundó sobre las aguas; quien puso fuentes de aguas en el desierto.
  to: Extendió el cielo como una cámara abovedada, y lo fundó sobre las aguas; quien puso manantiales de agua en el desierto.
  rationale: Se hace una reparación menor para mejorar la naturalidad del español en «fontes aquarum». «Manantiales de agua» comunica con fidelidad la idea de surgimientos de agua en plural y evita el calco duro «fuentes de aguas». El resto del versículo puede mantenerse tal como está, pues refleja adecuadamente la imagen cosmológica del latín y del POB inglés.
