translation:
  language: es
  text: Extendió el cielo como una cámara abovedada, y lo fundó sobre las aguas; quien puso manantiales de agua en el desierto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: super aquas fundauit eum
  english_pob_choice: He stretched out heaven like a vaulted chamber, and founded it upon the waters
  chosen_spanish: Extendió el cielo como una cámara abovedada, y lo fundó sobre las aguas
  alternatives_spanish:
  - Extendió el cielo como un techo abovedado, y lo asentó sobre las aguas
  - Extendió el cielo como una bóveda, y lo fundó sobre las aguas
  lexicon: extendo; caelum; fundare; aquae
  rationale: El latín presenta una imagen de expansión y de fundación sobre las aguas. «Extendió» conserva la acción de despliegue; «cielo» sigue el sentido de caelum; «cámara abovedada» refleja la imagen de una estructura curva sin forzar una terminología litúrgica más estrecha; «lo fundó sobre las aguas» mantiene el paralelismo con el latín y con la versión inglesa auditada.
- source_word: Qui posuit in deserto fontes aquarum
  english_pob_choice: who placed springs of waters in the desert
  chosen_spanish: quien puso fuentes de aguas en el desierto
  alternatives_spanish:
  - quien colocó fuentes de agua en el desierto
  - el que puso manantiales de aguas en el desierto
  lexicon: qui; ponere; desertum; fontes aquarum
  rationale: «Quien» conserva la cláusula relativa del latín. «Puso» corresponde bien a posuit y suena más natural que «colocó» en español bíblico moderno. «Fuentes de aguas» mantiene el plural del original latino y la imagen abundante; aunque «fuentes de agua» sería más idiomático, aquí se preserva la forma del texto fuente.
theological_decisions:
- issue: Imagen de la creación del cielo sobre las aguas
  english_pob_reading: He stretched out heaven like a vaulted chamber, and founded it upon the waters
  chosen_spanish_reading: Extendió el cielo como una cámara abovedada, y lo fundó sobre las aguas
  alternative_spanish_readings:
  - Extendió el cielo como una bóveda, y lo fundó sobre las aguas
  - Extendió el cielo como un techo abovedado, y lo fundó sobre las aguas
  rationale: No se suaviza la imagen cosmológica del texto. La formulación conserva la idea de un cielo estructurado y sustentado sobre las aguas, sin convertirla en una paráfrasis explicativa que diluya la fuerza poética y cosmológica del pasaje.
  doctrine_reference: Génesis 1:6-8; Salmo 104:2-3
translation_notes:
  revision_awareness: La revisión inglesa añadió la cláusula final «who placed springs of waters in the desert» para restaurar la completitud del latín. La traducción española la incorpora íntegramente y mantiene la unión semicolonial de las dos acciones divinas.
  spanish_consistency_notes:
  - Se mantiene «Dios» solo cuando el texto lo exija explícitamente; aquí el sujeto implícito queda como relativa en continuidad con el latín.
  - Se conserva el tono elevado y poético sin introducir lenguaje eclesiástico ajeno al original.
  - «Aguas» se repite en ambas cláusulas para reflejar la reiteración del latín, aun cuando el español moderno podría reducirla a «agua» en la segunda ocurrencia.
