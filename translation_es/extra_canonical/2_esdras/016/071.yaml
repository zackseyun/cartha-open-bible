  spanish_quality_summary: El español es natural, claro y digno. «Porque habrá mucha revuelta en un lugar tras otro y en las ciudades vecinas» suena idiomático y conserva bien la progresión espacial del original. «Revuelta» es una opción legible y adecuada para «exsurrectio multa».
