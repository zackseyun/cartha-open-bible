    unchanged: false
    changes_summary: Removed the unsupported addition 'against those who fear the Lord' and revised word order for closer alignment with the Latin while keeping natural English.
translation:
  language: es
  text: Porque habrá mucha revuelta en un lugar tras otro y en las ciudades vecinas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Erit enim
  english_pob_choice: For there will be
  chosen_spanish: Porque habrá
  alternatives_spanish:
  - Pues habrá
  - Porque tendrá lugar
  lexicon: Latin erit + enim
  rationale: El latín introduce una afirmación explicativa con valor causal o consecutivo; «Porque habrá» reproduce bien ese enlace en español sin añadir contenido ajeno.
- source_word: locis locus
  english_pob_choice: in place after place
  chosen_spanish: en un lugar tras otro
  alternatives_spanish:
  - en lugar tras lugar
  - de lugar en lugar
  lexicon: Latin locus / locis
  rationale: La repetición intensiva del sustantivo latino comunica sucesión y extensión. «En un lugar tras otro» conserva ese efecto en español natural.
- source_word: exsurrectio multa
  english_pob_choice: much uprising
  chosen_spanish: mucha revuelta
  alternatives_spanish:
  - mucho levantamiento
  - gran alzamiento
  - mucha insurrección
  lexicon: Latin exsurrectio
  rationale: El sustantivo latino alude a un levantarse o sublevación. «Revuelta» comunica con claridad la idea de disturbio o alzamiento sin forzar un tecnicismo político excesivo.
- source_word: in uicinas ciuitates
  english_pob_choice: in the neighboring cities
  chosen_spanish: en las ciudades vecinas
  alternatives_spanish:
  - en las ciudades cercanas
  - en las ciudades de alrededor
  lexicon: Latin vicinus + civitas
  rationale: «Vecinas» sigue de cerca el valor de vicinus y mantiene una expresión idiomática clara en español.
theological_decisions:
- issue: Ausencia de sujeto religioso explícito en el texto
  english_pob_reading: For there will be much uprising in place after place and in the neighboring cities.
  chosen_spanish_reading: Porque habrá mucha revuelta en un lugar tras otro y en las ciudades vecinas.
  alternative_spanish_readings:
  - Porque habrá mucha revuelta contra los que temen al Señor.
  - Porque habrá mucha revuelta entre los pueblos cercanos.
  rationale: El texto latino no menciona como objeto a «los que temen al Señor»; la revisión inglesa eliminó esa ampliación no respaldada. La traducción española conserva esa restricción y no introduce un destinatario religioso implícito.
  doctrine_reference: Fidelidad textual y no ampliación interpretativa; principio de no añadir contenido no atestiguado por la fuente.
translation_notes:
  revision_awareness: La versión inglesa fue revisada desde una ampliación interpretativa no respaldada ('against those who fear the Lord') hacia una redacción más cercana al latín. La redacción española sigue la versión revisada y mantiene la misma restricción de contenido.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no hay nombre divino en el latín de este versículo.
  - Se eligió «revuelta» para mantener un registro bíblico claro y reflejar el valor de exsurrectio sin introducir una especificidad política que el contexto no exige.
  - Se mantuvo un español fluido y sobrio, sin calcos innecesarios de la sintaxis latina.
