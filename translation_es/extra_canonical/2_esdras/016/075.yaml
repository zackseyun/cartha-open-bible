  text: Audite, electi mei, dicit dominus, ecce adsunt dies tribulationis, et de his liberabo uos. Ne timeatis nec haesitemini,
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/016/075.yaml
  text: 'Hear, my chosen ones, says the Lord: behold, days of tribulation are here, and from them I will deliver you. Do not fear or hesitate,'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:30:26Z'
    unchanged: false
    changes_summary: Added the final clause 'Do not fear or hesitate,' from the Latin 'Ne timeatis nec haesitemini,' and revised 'are near' to 'are here' to better reflect 'adsunt' ('are present/are here').
translation:
  language: es
  text: 'Escuchen, mis escogidos, dice el Señor: miren, ya están aquí los días de tribulación, y de ellos los libraré. No teman ni vacilen,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Audite
  english_pob_choice: Hear
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Escuchen, ustedes
  lexicon: audire
  rationale: El imperativo plural pide una llamada directa en español. «Escuchen» conserva el matiz de atención obediente y funciona bien en un registro bíblico moderno.
- source_word: electi mei
  english_pob_choice: my chosen ones
  chosen_spanish: mis escogidos
  alternatives_spanish:
  - mis elegidos
  - mis seleccionados
  lexicon: electus
  rationale: «Escogidos» es natural en español bíblico y conserva la relación posesiva de pertenencia a Dios sin introducir un matiz más técnico que el de la fuente.
- source_word: dicit dominus
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - dice Yahvé
  - afirma el Señor
  lexicon: dico / dominus
  rationale: Se mantiene la fórmula directa del discurso. Aunque el proyecto prefiere «Yahvé» para el Tetragrámaton, aquí la fuente latina dice dominus; por eso «Señor» refleja el título en el texto base y el habla oracular.
- source_word: ecce adsunt dies tribulationis
  english_pob_choice: behold, days of tribulation are here
  chosen_spanish: miren, ya están aquí los días de tribulación
  alternatives_spanish:
  - miren, los días de tribulación han llegado
  - he aquí que ya están aquí los días de tribulación
  lexicon: ecce / adsum / tribulatio
  rationale: «Miren» reproduce la función exhortativa de «ecce» en un español natural. «Ya están aquí» refleja mejor «adsunt» que «están cerca», y preserva la inmediatez del anuncio. «Tribulación» conserva el término tradicional y el peso de aflicción pública del sustantivo.
- source_word: de his liberabo uos
  english_pob_choice: from them I will deliver you
  chosen_spanish: de ellos los libraré
  alternatives_spanish:
  - de ellas los libraré
  - de estos los libraré
  lexicon: liberare
  rationale: «Libraré» conserva el valor de rescate/liberación de la fuente y corresponde bien al inglés POB «deliver». Se mantiene el referente plural con «de ellos».
- source_word: Ne timeatis nec haesitemini
  english_pob_choice: Do not fear or hesitate
  chosen_spanish: No teman ni vacilen
  alternatives_spanish:
  - No teman ni duden
  - No tengan miedo ni vacilen
  lexicon: timere / haesitare
  rationale: «No teman» conserva el imperativo negativo. Para «haesitemini», «vacilen» transmite la idea de titubeo o indecisión sin reducirla solo a «dudar», y mantiene el paralelismo con el primer mandato.
theological_decisions:
- issue: Tratamiento del discurso divino y del título dominical
  english_pob_reading: says the Lord
  chosen_spanish_reading: dice el Señor
  alternative_spanish_readings:
  - dice Yahvé
  - afirma el Señor
  rationale: La fuente latina usa dominus; por tanto, la traducción refleja el título verbalizado del oráculo sin introducir un nombre divino ausente del texto base. Esto evita forzar el Tetragrámaton donde el testimonio disponible no lo explicita.
  doctrine_reference: Transparencia textual y distinción entre Tetragrámaton y título divino
translation_notes:
  revision_awareness: The Spanish draft follows the latest English revision that restored the final clause from Latin ('Do not fear or hesitate') and corrected the temporal phrase from 'are near' to 'are here' based on 'adsunt'. The Spanish accordingly uses 'ya están aquí' and includes the closing negative exhortation.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y contemporáneo, sin arcaísmos innecesarios.
  - Se prefirió «Escuchen» sobre «Oigan» por su tono exhortativo más amplio en español litúrgico.
  - Se evitó «SEÑOR» en mayúsculas como máscara editorial; se conservó «Señor» porque el latín dice dominus y el contexto no exige explicitar Yahvé.
