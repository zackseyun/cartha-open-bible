translation:
  language: es
  text: hasta los confines de la tierra. He aquí, se envían males, y no volverán hasta
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: in fines terrae
  english_pob_choice: to the ends of the earth
  chosen_spanish: hasta los confines de la tierra
  alternatives_spanish:
  - hasta los extremos de la tierra
  - hasta los fines de la tierra
  lexicon: fines / terra
  rationale: La imagen espacial de 'fines' se conserva mejor en español con 'confines', que comunica límites o extremos territoriales sin sonar artificial. 'Extremos' es posible, pero menos natural en registro bíblico; 'fines' puede sonar menos idiomático.
- source_word: Ecce
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: ecce
  rationale: '''He aquí'' es la fórmula bíblica más fiel y solemne para introducir una proclamación o advertencia. Mantiene el énfasis exhortativo del original sin volverlo demasiado coloquial.'
- source_word: mittuntur
  english_pob_choice: are sent out
  chosen_spanish: se envían
  alternatives_spanish:
  - son enviados
  - se mandan
  lexicon: mitto
  rationale: El pasivo latino expresa acción que procede de una fuente implícita; en español, 'se envían' conserva esa pasividad funcional con naturalidad. 'Son enviados' es igualmente posible, pero 'se envían' fluye mejor en este enunciado breve.
- source_word: mala
  english_pob_choice: evils
  chosen_spanish: males
  alternatives_spanish:
  - desastres
  - calamidades
  - males/penas
  lexicon: malum
  rationale: '''Males'' reproduce el valor amplio de ''mala'' sin especificar de más. ''Calamidades'' o ''desastres'' interpretan más estrechamente; ''males'' mantiene la apertura del término latino.'
- source_word: non reuertentur
  english_pob_choice: they will not return
  chosen_spanish: no volverán
  alternatives_spanish:
  - no regresarán
  - no se volverán atrás
  lexicon: revertor
  rationale: '''No volverán'' es la equivalencia más directa y sobria. El español no necesita explicitar el sujeto, ya implícito en el contexto del plural neutro/impersonal latino.'
- source_word: donec
  english_pob_choice: until
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta que
  lexicon: donec
  rationale: Como el texto fuente termina en 'donec' y queda incompleto, el español debe reflejar igualmente la apertura sintáctica con 'hasta', sin completar indebidamente la cláusula.
theological_decisions:
- issue: Alcance universal del juicio o calamidad
  english_pob_reading: to the ends of the earth. Behold, evils are sent out, and they will not return until
  chosen_spanish_reading: hasta los confines de la tierra. He aquí, se envían males, y no volverán hasta
  alternative_spanish_readings:
  - hasta los extremos de la tierra. He aquí, se envían males, y no volverán hasta
  - hasta los fines de la tierra. He aquí, se envían males, y no volverán hasta
  rationale: 'No se atenúa ni se amplía el alcance del juicio: la frase conserva la extensión universal marcada por ''in fines terrae'' y el carácter inacabado del versículo en ''donec''.'
  doctrine_reference: Juicio divino de alcance universal en literatura apocalíptica
translation_notes:
  revision_awareness: La versión inglesa revisada restauró 'to the ends of the earth' desde el latín y eliminó la expansión no sustentada 'they come upon the earth'; la versión española sigue esa corrección, conserva la apertura de 'donec' con 'hasta' y no añade contenido más allá del texto fuente.
  spanish_consistency_notes:
  - Se mantiene 'males' para respetar la amplitud semántica de 'mala'.
  - Se evita completar la oración después de 'hasta' para no sobretraducir un texto latino incompleto.
  - '''Confines de la tierra'' sostiene el tono bíblico sin imponer una paráfrasis interpretativa.'
