  verdict: revise
  source_alignment_summary: 'El latín conservado dice: «In his quid ... [facient], cum venerint mala/malorum?»; el sentido coincide con la versión inglesa: «What will they do in these things, when evils come?». El borrador español transmite bien la estructura interrogativa y el plural de «males», pero introduce un artículo definido («los males») que añade una leve especificidad que la revisión inglesa quitó deliberadamente.'
  spanish_quality_summary: El español es natural y claro. Sin embargo, «¿Qué harán en estas cosas?» suena algo calcado; «en estas circunstancias» sería más idiomático, pero el inglés auditado preserva la literalidad de «in these things», así que puede mantenerse «en estas cosas». El ajuste principal necesario es quitar el artículo en «males» para reflejar mejor la indefinición del latín y del inglés POB.
  glossary_alignment: 'No hay términos del glosario maestro especialmente implicados. «Males» es una buena opción para malorum/mala en este contexto; conviene usarlo sin artículo: «males».'
  issues:
  - severity: medium
    issue: Artículo definido en «los males»
    rationale: La pista de auditoría inglesa eliminó «the» para no introducir especificidad ausente en el latín. En español, «los males» también suena más definido que el original; «males» preserva mejor la generalidad.
  - severity: low
    issue: Ligera rigidez en «en estas cosas»
    rationale: Es comprensible y cercano al original, aunque menos idiomático que «en estas circunstancias». No exige cambio porque conserva la deixis del latín y sigue siendo legible.
  revised_spanish_text: ¿Qué harán en estas cosas, cuando vengan males?
