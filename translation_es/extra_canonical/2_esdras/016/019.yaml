translation:
  language: es
  text: ¿Qué harán en estas cosas, cuando vengan males?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: quid
  english_pob_choice: What will they do
  chosen_spanish: ¿Qué harán
  alternatives_spanish:
  - ¿Qué harán ellos
  - ¿Qué podrán hacer
  lexicon: quid = qué
  rationale: El interrogativo latino pide una pregunta directa en español. «Harán» refleja la idea de acción o respuesta que no podrán sostener ante la situación.
- source_word: In his
  english_pob_choice: in these things
  chosen_spanish: en estas cosas
  alternatives_spanish:
  - en esto
  - en estas circunstancias
  lexicon: in + is = en + ablativo demostrativo
  rationale: «In his» apunta de manera general a la situación descrita; «en estas cosas» conserva la deixis cercana del original sin precisar más de lo que el texto permite.
- source_word: malorum
  english_pob_choice: evils
  chosen_spanish: los males
  alternatives_spanish:
  - los males
  - las desgracias
  - los males que vendrán
  lexicon: malum = mal, maldad, desgracia
  rationale: El plural latino requiere plural en español. «Males» mantiene la generalidad y evita introducir la concreción de «desgracias» o añadir una cláusula explicativa no presente en el latín.
theological_decisions:
- issue: Alcance de «malorum»
  english_pob_reading: evils
  chosen_spanish_reading: los males
  alternative_spanish_readings:
  - los males
  - las calamidades
  rationale: El texto latino usa un plural abstracto y general. «Los males» preserva esa amplitud sin convertirlo en un término técnico ni limitarlo a desastres específicos.
  doctrine_reference: No doctrinal; decisión semántica y textual basada en el latín.
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó el artículo antes de «evils» para reflejar mejor el plural latino malorum. El español mantiene igualmente un plural sin especificación adicional: «los males».'
  spanish_consistency_notes:
  - Se conservó el tono interrogativo y la indeterminación del original.
  - No se introdujo una referencia explícita a futuros acontecimientos más allá de «cuando vengan», que corresponde al valor contextual de la frase latina.
  - Se prefirió «males» sobre alternativas más interpretativas para mantener la amplitud semántica del plural latino.
