    unchanged: false
    changes_summary: Removed the unsupported first clause about the earth, which is not in the provided Latin, and added the final clause to reflect 'Et in uerbo illius stellae fundatae' as 'and by his word the stars were founded.'
translation:
  language: es
  text: 'El que dijo: «Hágase el cielo», y fue hecho; y por su palabra fueron fundadas las estrellas.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: fiat
  english_pob_choice: Let heaven be made
  chosen_spanish: Sea hecho el cielo
  alternatives_spanish:
  - Hágase el cielo
  - Sea creado el cielo
  lexicon: fio
  rationale: El latín usa un jussivo impersonal/mandato creador; en español, «Sea hecho» reproduce bien la fuerza performativa sin forzar una formulación más litúrgica de lo que exige el texto.
- source_word: caelum
  english_pob_choice: heaven
  chosen_spanish: cielo
  alternatives_spanish:
  - cielos
  lexicon: caelum
  rationale: El singular «cielo» corresponde al singular del latín y mantiene la referencia cosmológica del acto creador.
- source_word: factum est
  english_pob_choice: it was made
  chosen_spanish: fue hecho
  alternatives_spanish:
  - fue creado
  - llegó a ser
  lexicon: fio
  rationale: La pasiva de resultado conserva el énfasis en la ejecución efectiva del decreto creador.
- source_word: in uerbo illius
  english_pob_choice: by his word
  chosen_spanish: por su palabra
  alternatives_spanish:
  - con su palabra
  - mediante su palabra
  lexicon: verbum
  rationale: «Por su palabra» expresa de forma natural el medio o instrumento causal indicado por el latín.
- source_word: stellae fundatae
  english_pob_choice: the stars were founded
  chosen_spanish: fueron fundadas las estrellas
  alternatives_spanish:
  - las estrellas fueron establecidas
  - las estrellas quedaron fundadas
  lexicon: stella / fundo
  rationale: «Fundadas» preserva la imagen de establecimiento sólido que el latín atribuye a las estrellas; «establecidas» sería más explicativo, pero menos cercano a la metáfora de fundación.
theological_decisions:
- issue: Formulación creativa del decreto divino
  english_pob_reading: He who said, “Let heaven be made,” and it was made; and by his word the stars were founded.
  chosen_spanish_reading: 'El que dijo: «Sea hecho el cielo», y fue hecho; y por su palabra fueron fundadas las estrellas.'
  alternative_spanish_readings:
  - 'El que dijo: «Hágase el cielo», y se hizo; y por su palabra fueron establecidas las estrellas.'
  rationale: Se mantiene la presentación de Dios como sujeto implícito del acto creador mediante su palabra eficaz, sin añadir elementos no presentes en el latín.
  doctrine_reference: Creación por la palabra divina (cf. Génesis 1; Salmo 33:6)
translation_notes:
  revision_awareness: La revisión eliminó una cláusula no sustentada por el latín dado sobre la tierra y retuvo únicamente la creación del cielo, añadiendo la cláusula final sobre las estrellas; la traducción española sigue exactamente ese estado revisado.
  spanish_consistency_notes:
  - Se evita introducir «Cristo» o títulos cristológicos, porque el texto latino no los contiene.
  - 'Se conserva la secuencia de acciones creadoras del original revisado: decreto, cumplimiento y establecimiento de las estrellas.'
  - La pasiva «fueron fundadas» mantiene el tono solemne y la imagen arquitectónica del latín.
