revisions:
- from: 'todas las obras de los hombres y sus designios y sus pensamientos y sus corazones. Él, que dijo[a]: «Sea hecha la tierra», y fue hecha;'
  to: 'todas las obras de los hombres y sus designios y sus pensamientos y sus corazones. El que dijo[a]: «Hágase la tierra», y se hizo;'
  rationale: Se ajusta el relativo a un español más natural («El que dijo»), se suaviza el calco latino en la fórmula creadora («Hágase... y se hizo») sin perder fidelidad, y se reemplaza la nota por la alternativa histórica realmente documentada en el audit trail inglés.
