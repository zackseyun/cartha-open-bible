translation:
  language: es
  text: 'todas las obras de los hombres y sus designios y sus pensamientos y sus corazones. El que dijo[a]: «Hágase la tierra», y se hizo;'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mira, el Señor conoce todas las obras de los hombres y sus designios y sus pensamientos y sus corazones».'
    reason: previous_rendering
lexical_decisions:
- source_word: omnia opera hominis
  english_pob_choice: all the works of men
  chosen_spanish: todas las obras de los hombres
  alternatives_spanish:
  - todas las obras humanas
  - todas las obras de la humanidad
  lexicon: opera -> obras; hominis -> de los hombres
  rationale: Mantiene el alcance total de omnia y el sustantivo concreto 'obras' para opera; 'de los hombres' sigue de cerca el genitivo latino y conserva el referente humano sin suavizarlo.
- source_word: adinuentiones illorum
  english_pob_choice: their devices
  chosen_spanish: sus designios
  alternatives_spanish:
  - sus inventos
  - sus maquinaciones
  lexicon: adinuentiones -> designios / inventos
  rationale: En este contexto, 'adinuentiones' expresa lo ideado o tramado; 'designios' comunica bien la intención mental sin cargar un matiz demasiado técnico o malicioso.
- source_word: cogitatum illorum
  english_pob_choice: their thoughts
  chosen_spanish: sus pensamientos
  alternatives_spanish:
  - sus ideas
  - sus reflexiones
  lexicon: cogitatum/cogitatus -> pensamientos
  rationale: '''Pensamientos'' es la equivalencia natural y transparente para el campo cognitivo de cogitatum.'
- source_word: corda illorum
  english_pob_choice: their hearts
  chosen_spanish: sus corazones
  alternatives_spanish:
  - sus corazones y afectos
  - su interior
  lexicon: corda -> corazones
  rationale: Conserva la antropología bíblica literal del latín y el vínculo entre el centro interior y la voluntad/afecto.
- source_word: 'Qui dixit: fiat terra, et facta est'
  english_pob_choice: He who said, “Let the earth be made,” and it was made
  chosen_spanish: 'Él, que dijo: «Sea hecha la tierra», y fue hecha'
  alternatives_spanish:
  - 'El que dijo: «Hágase la tierra», y se hizo'
  - 'Aquel que dijo: «Sea hecha la tierra», y así fue'
  lexicon: fiat terra -> sea hecha la tierra
  rationale: '''Sea hecha'' reproduce el valor jussivo pasivo del latín y evita introducir un sujeto humano; ''fue hecha'' mantiene la correspondencia de facta est.'
theological_decisions:
- issue: Alcance del conocimiento divino implícito en el versículo
  english_pob_reading: He who said...
  chosen_spanish_reading: Él, que dijo...
  alternative_spanish_readings:
  - El que dijo...
  - Aquel que dijo...
  rationale: El latín transmitido en este versículo se centra en el poder creador de Dios y no en una formulación explícita de omnisciencia; por eso la traducción no incorpora la nota de 'El Señor sabe...' que el audit trail identifica como lectura anterior errada y ubicada en otro segmento.
  doctrine_reference: Creación por la palabra divina (cf. Génesis 1:3, 1:9)
translation_notes:
  revision_awareness: 'La revisión aplicada corrigió una desalineación previa: la lectura antigua sobre el conocimiento del Señor pertenecía a otro tramo del contexto y no a este versículo. Por eso el texto español sigue el latín recibido de 2 Esdras 16:55 y conserva la cláusula creadora completa.'
  spanish_consistency_notes:
  - He mantenido 'Yahvé' fuera del texto porque el latín aquí usa Qui/terra sin mención explícita del nombre divino; la referencia es funcional y no requiere sustitución por nombre propio.
  - Se conserva el paralelismo enumerativo 'obras / designios / pensamientos / corazones' para reflejar la acumulación retórica del original.
  - La puntuación con comas y dos puntos busca reproducir la cadencia del latín y separar la cláusula citada de la afirmación narrativa final.
