base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/016/051.yaml
  text: As a respectable and very beautiful woman is indignant toward a prostitute[16:51], so righteousness will be indignant toward iniquity when it adorns itself, and will accuse it to its face when he comes who defends the one who searches out every sin upon the earth[a]. Therefore do not be like it or its works.
  footnotes:
  - marker: '16:51'
    text: The Latin here is difficult and compressed. The imagery appears to compare righteousness and iniquity under the figure of a respectable woman and a prostitute, with righteousness exposing iniquity openly when the divine investigator comes.
    reason: textual_variant
  - marker: a
    text: Or 'As a respectable and very beautiful woman hates a prostitute, so righteousness will hate iniquity when she adorns herself, and will accuse her to her face when he comes who defends the one who searches out every sin upon the earth.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:30:25Z'
    unchanged: false
    changes_summary: Adjusted feminine pronouns to neuter for 'iniquity' to better match the Latin object and improve referential clarity in English; retained the rest substantially unchanged.
translation:
  language: es
  text: Así como una mujer honorable y muy hermosa se indigna contra una prostituta, así la justicia[a] se indignará contra la iniquidad cuando se adorne, y la acusará a la cara cuando venga quien defiende al que investiga todo pecado sobre la tierra[b]. Por tanto, no se asemejen a ella ni a sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí 'justicia' traduce el latín iusticia en sentido moral-jurídico, cercano al inglés POB 'righteousness'.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''Así como una mujer honorable y muy hermosa se indigna contra una prostituta, así la justicia se indignará contra la iniquidad cuando se adorne, y la acusará a la cara cuando venga quien defiende al que busca todo pecado sobre la tierra''. El latín aquí es difícil y comprimido, y la imagen parece comparar a la justicia y la iniquidad bajo la figura de una mujer respetable y una prostituta, con la justicia exponiendo abiertamente a la iniquidad cuando llega el investigador divino.'
    reason: textual_variant
lexical_decisions:
- source_word: zelatur / zela bitur
  english_pob_choice: is indignant toward / will be indignant toward
  chosen_spanish: se indigna / se indignará contra
  alternatives_spanish:
  - aborrece / aborrecerá
  - toma indignación / tomará indignación
  lexicon: zelare / indignarse
  rationale: El latín y la revisión inglesa favorecen una reacción de indignación, no solo odio. En español, 'indignarse contra' conserva la fuerza afectiva y la dirección contra el objeto.
- source_word: fornicariam mulierem
  english_pob_choice: a prostitute
  chosen_spanish: una prostituta
  alternatives_spanish:
  - una mujer fornicaria
  - una ramera
  lexicon: fornicaria / prostituta
  rationale: '''Prostituta'' comunica mejor en español contemporáneo la figura social concreta del contraste, sin introducir un registro arcaico o eclesiástico. ''Mujer fornicaria'' sería más literal pero menos natural.'
- source_word: idonea et bona ualde
  english_pob_choice: respectable and very beautiful
  chosen_spanish: una mujer honorable y muy hermosa
  alternatives_spanish:
  - una mujer digna y muy bella
  - una mujer decente y muy hermosa
  lexicon: idoneus / bonus / pulcher
  rationale: '''Honorable'' preserva la idea de respetabilidad moral/social; ''muy hermosa'' recoge el valor de ''bona ualde'' en este contexto comparativo, según el audit trail inglés, sin reducirlo a solo belleza externa de forma mecánica.'
- source_word: iusticia
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: iustitia
  rationale: El POB inglés eligió 'righteousness'; en español, 'justicia' mantiene mejor la fuerza bíblico-jurídica del término y encaja con el contraste frente a 'iniquidad'. Por contexto, aquí no se trató de 'justificación' ni de una virtud meramente subjetiva.
- source_word: iniquitatem
  english_pob_choice: iniquity
  chosen_spanish: la iniquidad
  alternatives_spanish:
  - la maldad
  - la injusticia
  lexicon: iniquitas
  rationale: '''Iniquidad'' conserva el peso moral y jurídico del latín y corresponde bien al paralelo con ''justicia''. ''Maldad'' o ''injusticia'' suavizarían o desplazarían el matiz.'
- source_word: cum exornat se
  english_pob_choice: when it adorns itself
  chosen_spanish: cuando se adorne
  alternatives_spanish:
  - cuando se adorna
  - cuando se engalana
  lexicon: exornare
  rationale: Se mantiene la imagen de adorno/exornación. El subjuntivo 'se adorne' refleja mejor la cláusula temporal con valor prospectivo de la construcción latina y la revisión inglesa.
- source_word: accusat eam in faciem
  english_pob_choice: will accuse it to its face
  chosen_spanish: la acusará en su misma cara
  alternatives_spanish:
  - la acusará en su rostro
  - la denunciará cara a cara
  lexicon: accusare in faciem
  rationale: '''En su misma cara'' reproduce de modo idiomático y fuerte el sentido de confrontación pública. Se evita suavizar a ''cara a cara'' porque el latín enfatiza la reprensión directa.'
- source_word: qui defendat exquirentem omnem peccatum super terram
  english_pob_choice: who defends the one who searches out every sin upon the earth
  chosen_spanish: quien defiende al que investiga todo pecado sobre la tierra
  alternatives_spanish:
  - quien defiende al que busca todo pecado sobre la tierra
  - quien defiende al que examina todo pecado sobre la tierra
  lexicon: defendere / exquirere
  rationale: '''Investiga'' preserva el sentido de búsqueda/examen exhaustivo de ''exquirentem'' en un español claro. ''Defiende al que...'' refleja mejor la relación sintáctica del latín que una paráfrasis más libre.'
- source_word: Propterea nolite similari eam nec operibus eius
  english_pob_choice: Therefore do not be like it or its works
  chosen_spanish: Por tanto, no se le parezcan ni en sus obras
  alternatives_spanish:
  - Por tanto, no sean como ella ni hagan sus obras
  - Por tanto, no se asemejen a ella ni a sus obras
  lexicon: similari / operibus eius
  rationale: La forma impersonal/reflexiva española permite traducir el infinitivo pasivo/deponente con naturalidad. 'Ni en sus obras' reproduce el alcance de la prohibición sin añadir un verbo inexistente en el latín.
theological_decisions:
- issue: El sujeto de 'iniquidad' como antecedente neutral y el ajuste pronominal
  english_pob_reading: it / its
  chosen_spanish_reading: la iniquidad ... se adorne ... la acusará ... no se le parezcan ni en sus obras
  alternative_spanish_readings:
  - ella / sus
  - lo / sus
  rationale: El latín presenta 'iniquitatem' como objeto femenino gramatical; en español 'iniquidad' es femenino, por lo que la concordancia natural es 'la'. Se evita personificarla excesivamente más allá de la figura retórica ya presente.
  doctrine_reference: Imaginería moral y personificación retórica; fidelidad al referente gramatical del latín.
- issue: Justicia e iniquidad como figuras personificadas en confrontación pública
  english_pob_reading: righteousness will be indignant toward iniquity ... will accuse it to its face
  chosen_spanish_reading: la justicia se indignará contra la iniquidad ... la acusará en su misma cara
  alternative_spanish_readings:
  - la justicia odiará la iniquidad
  - la rectitud se indignará contra la injusticia
  rationale: La escena es de personificación judicial-moral. 'Se indignará' y 'la acusará' preservan la tensión entre juicio moral y exposición pública sin convertir el pasaje en una mera abstracción ética.
  doctrine_reference: Lenguaje profético de personificación moral y juicio.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la omisión final del verso en la versión inglesa, por lo que el cierre exhortativo 'Por tanto, no se le parezcan ni en sus obras' se incluye aquí. También se respetó la decisión revisada de usar un referente neutro para 'iniquidad' en la progresión inglesa, pero en español se mantuvo la concordancia femenina natural con 'iniquidad'.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino en el texto base.
  - '''Cristo/Mesías'' no aparece en este versículo.'
  - '''Esclavo/siervo'' no es pertinente aquí.'
  - La puntuación reproduce la larga estructura latina con dos cláusulas comparativas y una exhortación final clara.
