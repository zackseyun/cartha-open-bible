revisions:
- from: Así como una mujer honorable y muy hermosa se indigna contra una prostituta[a], así la justicia[b] se indignará contra la iniquidad cuando se adorne, y la acusará en su misma cara cuando venga quien defiende al que investiga todo pecado sobre la tierra. Por tanto, no se le parezcan ni en sus obras.
  to: Así como una mujer honorable y muy hermosa se indigna contra una prostituta, así la justicia[a] se indignará contra la iniquidad cuando se adorne, y la acusará a la cara cuando venga quien defiende al que investiga todo pecado sobre la tierra[b]. Por tanto, no se asemejen a ella ni a sus obras.
  rationale: Se ajustó la frase final para reflejar con mayor fidelidad la coordinación latina ('a ella ni a sus obras'), se elevó ligeramente el registro de 'en su misma cara' a 'a la cara', y se reemplazó la nota menos sólida sobre 'idonea et bona ualde' por una nota que sí refleja la dificultad textual documentada en el audit trail inglés.
