translation:
  language: es
  text: Formó al hombre, y puso un corazón en medio del cuerpo, y le dio espíritu, vida y entendimiento,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: medio corporis
  english_pob_choice: put a heart in the midst of the body
  chosen_spanish: puso un corazón en medio del cuerpo
  alternatives_spanish:
  - puso un corazón en el centro del cuerpo
  - puso un corazón dentro del cuerpo
  lexicon: corazón
  rationale: El latín sitúa el corazón ‘en medio del cuerpo’; ‘en medio del cuerpo’ conserva la ubicación sin añadir una interpretación anatómica más precisa de la que el texto ofrece. ‘Corazón’ mantiene la imagen antropológica del pasaje, tal como en el audit trail inglés.
- source_word: spiritum
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - espíritu
  lexicon: espíritu
  rationale: El contexto enumera dones vitales y cognitivos junto con ‘vida’ y ‘entendimiento’; ‘espíritu’ es la mejor correspondencia directa y conserva la amplitud semántica del latín, sin forzar ‘aliento’.
- source_word: uitam
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida
  lexicon: vida
  rationale: Coincide de manera directa y transparente con el latín y con la lectura inglesa.
- source_word: intellectum
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - comprensión
  - inteligencia
  lexicon: entendimiento
  rationale: ‘Entendimiento’ reproduce bien la facultad cognitiva expresada por el latín y evita reducirla a mera información o capacidad intelectual técnica.
theological_decisions:
- issue: Enumeración de dones dados al ser humano
  english_pob_reading: and gave him spirit and life and understanding
  chosen_spanish_reading: y le dio espíritu, vida y entendimiento
  alternative_spanish_readings:
  - y le dio un espíritu, vida y entendimiento
  - y le dio el Espíritu, vida y entendimiento
  rationale: El texto latino no marca artículo; la secuencia enumera dones constitutivos. ‘Espíritu’ sin artículo evita identificar de forma impropia el término con el Espíritu Santo, aunque el pasaje conserve una tensión antropológica abierta.
  doctrine_reference: Antropología bíblica; distinción entre espíritu humano y Espíritu divino
translation_notes:
  revision_awareness: La revisión más reciente indica que el texto quedó sin cambios adicionales y con acuerdo alto; por tanto, esta propuesta sigue de cerca la lectura base sin introducir variantes no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene el orden simple de la enumeración para reflejar la cadencia del latín y del audit trail inglés.
  - Se usa puntuación mínima, acorde con una cláusula narrativa breve y acumulativa.
  - ‘Yahvé’ no aparece porque el versículo no contiene el nombre divino en el texto fuente.
