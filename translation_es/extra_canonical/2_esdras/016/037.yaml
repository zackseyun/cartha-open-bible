review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del latín: «ecce» = «He aquí», «verbum Domini» = «la palabra del Señor», «excipite eum» = mandato de recibirla, y «ne discredatis ...» = no rechazar por incredulidad lo dicho por el Señor. Sin embargo, la construcción española «no descrean de lo que el Señor dice» no es idiomática; con «descreer» lo natural es objeto directo o una formulación como «no dejen de creer».'
  spanish_quality_summary: El texto es casi fiel, pero «descrean de» suena forzado en español general y reduce la legibilidad eclesial amplia. «No descrean lo que el Señor dice» mejora algo, pero sigue siendo menos natural que «no dejen de creer lo que el Señor dice», que preserva mejor la fuerza de discredatis sin sonar extraño. El resto del versículo es claro y digno.
  glossary_alignment: No hay conflicto grave con la terminología del proyecto. «Señor» para Dominus es defendible dado que la fuente inmediata es latina y no documenta directamente el Tetragrámaton. No hay términos de glosario mayores comprometidos. La principal cuestión es idiomática-lexical con «descreer».
  issues:
  - severity: medium
    issue: Uso no idiomático de «descrean de»
    rationale: En español estándar, «descreer de» no funciona bien en este contexto proposicional; suena torpe y poco natural. La traducción debe conservar la fuerza de incredulidad sin sacrificar claridad.
  - severity: low
    issue: Nota al pie innecesaria si se corrige la expresión principal
    rationale: La nota actual defiende una opción léxica discutible. Con una redacción más natural y fiel, la nota deja de ser necesaria.
  revised_spanish_text: 'He aquí la palabra del Señor: recíbanla; no dejen de creer lo que el Señor dice.'
  revision_rationale: Se ajusta solo la cláusula negativa para lograr español natural y mantener la fuerza de discredatis como incredulidad o falta de fe, evitando el giro poco idiomático «descrean de».
