translation:
  language: es
  text: 'He aquí la palabra del Señor: recíbanla; no dejen de creer lo que el Señor dice.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ecce
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - He aquí
  lexicon: ecce
  rationale: La fórmula «He aquí» conserva el valor de atención e introducción solemne del latín, y es idiomática en español bíblico sin sonar artificial.
- source_word: verbum Domini
  english_pob_choice: the word of the Lord
  chosen_spanish: la palabra del Señor
  alternatives_spanish:
  - la palabra de Yahvé
  - la palabra del Señor
  lexicon: verbum
  rationale: «Palabra» es la equivalencia directa y natural de verbum en este contexto exhortativo. Se mantiene «Señor» porque el texto fuente latino usa Dominus; el equivalente litúrgico tradicional en español comunica adecuadamente el título sin forzar la forma divina explícita aquí.
- source_word: excipite eum
  english_pob_choice: receive it
  chosen_spanish: recíbanla
  alternatives_spanish:
  - recíbanlo
  - acéptenla
  lexicon: excipere
  rationale: El latín exige un imperativo plural de recepción/aceptación. En español, «recíbanla» sigue el mandato y concuerda con «la palabra», evitando una paráfrasis excesiva.
- source_word: ne discredatis
  english_pob_choice: do not disbelieve
  chosen_spanish: no descrean
  alternatives_spanish:
  - no duden
  - no crean en contra
  lexicon: discredere
  rationale: «Descreer» preserva el sentido lexical de negación de creencia, más cerca de discredatis que un mero «dudar». Se adapta la forma verbal al plural exhortativo.
- source_word: de quibus dicit Dominus
  english_pob_choice: what the Lord says
  chosen_spanish: de lo que el Señor dice
  alternatives_spanish:
  - de lo que dice el Señor
  - de lo que el Señor habla
  lexicon: dicere
  rationale: La revisión inglesa simplificó correctamente la clausula final; en español, «de lo que el Señor dice» es natural y fiel al valor proposicional del latín. Se evita una construcción más pesada como «las cosas de las que habla el Señor».
theological_decisions:
- issue: Título divino Dominus en un dicho exhortativo
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: El latín transmite Dominus sin un indicio textual directo del Tetragrámaton. Aunque el proyecto usa «Yahvé» cuando el hebreo lo sustenta, aquí el testimonio inmediato es latino y la forma «el Señor» preserva la referencia reverente sin introducir una identificación no documentada.
  doctrine_reference: Respeto por la forma textual y por la distinción entre tradición de cita y reconstrucción del nombre divino
translation_notes:
  revision_awareness: La revisión inglesa reciente simplificó la última cláusula de una forma más pesada («the things of which the Lord speaks») a «what the Lord says». La versión española sigue esa simplificación y evita una construcción nominalizada innecesaria. No se introdujeron notas textuales porque el paquete fuente presenta alto acuerdo y no ofrece variantes relevantes en este versículo.
  spanish_consistency_notes:
  - Se mantuvo una sintaxis exhortativa breve y solemne, adecuada para una cita profética.
  - Se evitó «SEÑOR» en mayúsculas porque no hay base textual aquí para el masking convencional; se conservó «Señor» como título reverente estándar.
  - El pronombre objeto de «palabra» se resolvió con concordancia femenina en «recíbanla», que es lo natural en español.
  - La nota al pie se ancló directamente en «descrean» para evitar marcadores huérfanos.
