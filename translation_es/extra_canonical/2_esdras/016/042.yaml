    changes_summary: Revised the opening to reflect sic estote quasi aduenae terrae more accurately and naturally as 'So be as strangers in the land.' Removed the unsupported clause about the buyer, since it is not present in the provided Latin. Kept the seller clause close to the source.
translation:
  language: es
  text: Así pues, estén como extranjeros en la tierra; el que vende, como el que huirá.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: sic estote
  english_pob_choice: So be
  chosen_spanish: Así pues, estén
  alternatives_spanish:
  - Sean así
  - Por tanto, estén
  lexicon: sic / estote
  rationale: El latín introduce una exhortación directa; «Así pues» conserva la inferencia exhortativa, y «estén» refleja el imperativo plural de manera natural en español.
- source_word: quasi aduenae terrae
  english_pob_choice: as strangers in the land
  chosen_spanish: como extranjeros en la tierra
  alternatives_spanish:
  - como forasteros en la tierra
  - como advenedizos en la tierra
  lexicon: aduenae
  rationale: «Extranjeros» comunica bien la idea de ser ajenos o no pertenecientes al lugar. «Forasteros» es posible, pero menos solemne; «advenedizos» suena demasiado peyorativo en español.
- source_word: Qui uendit
  english_pob_choice: the one who sells
  chosen_spanish: el que vende
  alternatives_spanish:
  - quien vende
  - el vendedor
  lexicon: qui vendit
  rationale: La construcción participial se vierte de forma directa y bíblica con «el que vende», manteniendo el paralelismo con la cláusula siguiente.
- source_word: quasi qui fugiet
  english_pob_choice: as one who will flee
  chosen_spanish: como el que huirá
  alternatives_spanish:
  - como quien huirá
  - como el que va a huir
  lexicon: quasi / fugiet
  rationale: El futuro latino fugiet se conserva con un futuro simple español. «Como el que huirá» respeta la comparación breve y el tono proverbial del texto.
theological_decisions:
- issue: Imagen de extrañeza/inhabitar sin arraigo
  english_pob_reading: So be as strangers in the land
  chosen_spanish_reading: Así pues, estén como extranjeros en la tierra
  alternative_spanish_readings:
  - Así pues, estén como forasteros en la tierra
  - Así pues, vivan como extranjeros en la tierra
  rationale: La frase funciona como exhortación escatológica o de desapego social. «Extranjeros en la tierra» preserva la fuerza de no pertenencia sin añadir explicaciones ajenas al latín.
  doctrine_reference: Tema bíblico de peregrinación y desarraigo del creyente; cf. lenguaje de peregrinos/extranjeros en la Escritura.
translation_notes:
  revision_awareness: Se corrigió la versión anterior para eliminar la cláusula del comprador, que no está presente en el latín proporcionado. La redacción actual sigue de cerca el texto latino limpio y coincide con la revisión inglesa que dejó solo la exhortación inicial y la comparación del vendedor.
  spanish_consistency_notes:
  - Se mantiene «extranjeros» para aduenae, evitando términos más interpretativos.
  - No se añade una cláusula sobre comprar, porque el texto fuente latino no la contiene.
  - El futuro «huirá» refleja fugiet sin suavizar el matiz de fuga o salida rápida.
