translation:
  language: es
  text: La uva se entregará para la vendimia[a], ¿y quién la recogerá? Porque habrá gran desolación en muchos lugares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se madurará, y ¿quién la pisará? Porque habrá gran desolación en los lugares».'
    reason: alternative_reading
lexical_decisions:
- source_word: uva
  english_pob_choice: The grape
  chosen_spanish: la uva
  alternatives_spanish:
  - el racimo
  - la vid
  lexicon: uva
  rationale: El latino uva designa la uva como fruto; en español 'la uva' conserva la imagen concreta del texto y evita ampliar indebidamente a la vid o al racimo.
- source_word: tradet se ad vindemiam
  english_pob_choice: will yield itself for the vintage
  chosen_spanish: se entregará para la vendimia
  alternatives_spanish:
  - se dará para la vendimia
  - se ofrecerá para la vendimia
  lexicon: tradere
  rationale: La construcción latina es personificadora y literalmente expresa que la uva 'se entregará'. 'Vendimia' mantiene el campo semántico de la cosecha de la uva, y 'para' reproduce de modo natural el valor final de ad vindemiam sin perder la imagen audaz del original.
- source_word: adligabit
  english_pob_choice: will gather it
  chosen_spanish: la recogerá
  alternatives_spanish:
  - la atará
  - la juntará
  lexicon: adligare
  rationale: 'El audit trail inglés corrigió un error anterior: el verbo latino es adligo/adligabit, no calcabit. En español, el verbo más natural para la acción de la vendimia es ''recoger''; aunque el latín sugiere literalmente ''atar'', aquí el contexto de la uva y la vendimia favorece ''recogerla'' como el sentido funcional que el texto transmite en la pregunta retórica.'
- source_word: et... desertio multa
  english_pob_choice: For there will be great desolation in places
  chosen_spanish: Porque habrá gran desolación en los lugares
  alternatives_spanish:
  - Porque habrá mucha desolación en los lugares
  - Pues habrá gran desolación en muchos lugares
  lexicon: desertio
  rationale: '''Desolación'' corresponde bien a desertio y conserva la gravedad del latín. Se mantiene ''en los lugares'' para reflejar locis sin suavizarlo a una generalización más libre como ''por todas partes''.'
theological_decisions:
- issue: Personificación de la uva y fuerza retórica de la imagen agrícola
  english_pob_reading: The grape will yield itself for the vintage, and who will gather it?
  chosen_spanish_reading: La uva se entregará para la vendimia, ¿y quién la recogerá?
  alternative_spanish_readings:
  - La uva se dará para la vendimia, ¿y quién la recogerá?
  - La uva se ofrecerá para la vendimia, ¿y quién la recogerá?
  rationale: El latín preserva una personificación vigorosa; no conviene neutralizarla. 'Se entregará' mantiene mejor la tensión retórica que una paráfrasis puramente agrícola.
  doctrine_reference: No aplica una doctrina específica; se trata de preservar la imaginería profética del texto.
translation_notes:
  revision_awareness: Tomé como base el texto latino limpio de Bensly 1895 junto con el fragmento faltante de 1875 y la revisión inglesa que corrigió la lectura anterior de adligabit. La decisión española intenta reflejar el sentido auditado del latín, especialmente la personificación de uva y el valor de adligo como 'recoger/atar', no 'pisar'.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se evita el calco 'pisará', porque el inglés auditado descartó esa lectura como error respecto de adligabit.
  - '''Vendimia'' se usa como término técnico y bíblico natural en español para el momento de recoger la uva.'
  - '''En los lugares'' mantiene la aspereza del latín locis sin convertirla en una locución idiomática más interpretativa.'
