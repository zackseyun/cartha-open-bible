translation:
  language: es
  text: Se casan, como si fueran viudos; por lo cual los que trabajan, trabajan sin causa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: nubunt
  english_pob_choice: they marry
  chosen_spanish: se casan
  alternatives_spanish:
  - contraen matrimonio
  - se unen en matrimonio
  lexicon: Latin nubunt
  rationale: El latín indica casarse; «se casan» es natural en español y conserva el hecho matrimonial sin añadir matices eclesiásticos o legales ajenos al texto.
- source_word: sic quasi uidui
  english_pob_choice: as though widowed
  chosen_spanish: como si fueran viudos
  alternatives_spanish:
  - como si estuvieran viudos
  - cual si fueran viudos
  lexicon: Latin quasi uidui
  rationale: «quasi» introduce comparación aparente; «como si fueran viudos» mantiene la hipótesis o apariencia, y «viudos» refleja directamente uidui.
- source_word: Propter quod
  english_pob_choice: therefore
  chosen_spanish: por lo cual
  alternatives_spanish:
  - por eso
  - por tanto
  lexicon: Latin propter quod
  rationale: La frase enlaza causalmente con lo anterior; «por lo cual» conserva el valor conclusivo sin sobreinterpretar el alcance lógico.
- source_word: qui laborant
  english_pob_choice: those who labor
  chosen_spanish: los que trabajan
  alternatives_spanish:
  - los que laboran
  - quienes trabajan
  lexicon: Latin laborant
  rationale: «los que trabajan» es claro y idiomático; conserva el grupo humano general del original sin cargar el verbo con un registro excesivamente literal.
- source_word: sine causa
  english_pob_choice: without cause
  chosen_spanish: sin causa
  alternatives_spanish:
  - sin motivo
  - en vano
  lexicon: Latin sine causa
  rationale: La revisión inglesa restauró «without cause» para reflejar con más precisión sine causa. En español, «sin causa» mantiene la correspondencia directa y deja intacta la tensión semántica frente a «en vano».
theological_decisions:
- issue: Valor de la comparación «como si fueran viudos»
  english_pob_reading: as though widowed
  chosen_spanish_reading: como si fueran viudos
  alternative_spanish_readings:
  - como si estuvieran viudos
  - cual si fueran viudos
  rationale: No se introduce una lectura doctrinal adicional; se conserva la imagen comparativa de apariencia o condición asumida. Esto evita suavizar el contraste que el latín expresa.
  doctrine_reference: Sin referencia doctrinal específica; decisión de fidelidad retórica al texto.
- issue: Relación entre la causa y la vanidad del trabajo
  english_pob_reading: those who labor labor without cause
  chosen_spanish_reading: los que trabajan, trabajan sin causa
  alternative_spanish_readings:
  - los que trabajan trabajan en vano
  - los que laboran, laboran sin motivo
  rationale: La auditoría inglesa corrigió una posible reducción a «in vain» para reflejar sine causa. Se conserva la causalidad/ausencia de motivo más que una simple evaluación de inutilidad.
  doctrine_reference: Sin referencia doctrinal específica; decisión semántica basada en el latín.
translation_notes:
  revision_awareness: La revisión inglesa más reciente restauró la cláusula inicial omitida («they marry, as though widowed») y afinó la segunda mitad desde «in vain» a «without cause» para reflejar mejor sine causa. La versión española incorpora ambas correcciones explícitamente.
  spanish_consistency_notes:
  - Se mantuvo un español moderno y sobrio, evitando formas arcaizantes.
  - Se preservó la repetición verbal («trabajan, trabajan») porque corresponde al paralelismo del latín y al énfasis del texto.
  - No se introdujeron términos eclesiásticos como «viudas»/«viudos» con sentido técnico; aquí es comparación figurada literal.
