translation:
  language: es
  text: Entonces aparecerá la prueba[a] de mis escogidos, como el oro que es probado por el fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces aparecerá el carácter probado de mis escogidos, como el oro que es probado por el fuego».'
    reason: alternative_reading
lexical_decisions:
- source_word: probatio
  english_pob_choice: testing / test
  chosen_spanish: prueba
  alternatives_spanish:
  - testing
  - examen
  - probanza
  lexicon: probatio
  rationale: En latín, probatio denota ante todo la acción de probar o someter a prueba, no solo el resultado final. «Prueba» conserva en español la idea de proceso y encaja con el paralelo inmediato del oro probado por fuego.
- source_word: electorum meorum
  english_pob_choice: my chosen ones
  chosen_spanish: mis escogidos
  alternatives_spanish:
  - mis elegidos
  - mis seleccionados
  lexicon: electus
  rationale: «Escogidos» refleja bien el sentido de elección divina y mantiene un tono bíblico claro en español. «Elegidos» también sería posible, pero «escogidos» suena más directo y menos interpretativo en este contexto.
- source_word: ut aurum quod probatur ab igne
  english_pob_choice: like gold that is tested by fire
  chosen_spanish: como el oro que es probado por el fuego
  alternatives_spanish:
  - como oro probado por fuego
  - como el oro que se prueba en el fuego
  lexicon: aurum / probatur / ignis
  rationale: La comparación literal se conserva con claridad. «Probado por el fuego» mantiene el vínculo verbal con «prueba» y comunica la imagen de refinamiento sin añadir glosas.
theological_decisions:
- issue: ¿Traducir probatio como proceso de prueba o como cualidad ya comprobada?
  english_pob_reading: Then the testing of my chosen ones will appear, like gold that is tested by fire.
  chosen_spanish_reading: Entonces aparecerá la prueba de mis escogidos, como el oro que es probado por el fuego.
  alternative_spanish_readings:
  - Entonces aparecerá el carácter probado de mis escogidos
  - Entonces aparecerá la condición probada de mis escogidos
  rationale: 'La revisión auditada favorece el valor de proceso: la persecución/tribulación es la prueba que se manifiesta. Mantener «prueba» evita desplazar el foco hacia una cualidad interna abstracta y conserva la correspondencia cognada con «es probado».'
  doctrine_reference: Perseverancia y prueba de los fieles; lenguaje de tribulación como refinamiento.
translation_notes:
  revision_awareness: He seguido la revisión auditada que corrigió una lectura centrada en «carácter probado» para restituir el sentido primario de probatio como «prueba» o «testing». La comparación con el oro probado por fuego refuerza esta decisión y conserva la relación directa entre ambos miembros del paralelismo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton ni una cita explícita del nombre divino.
  - «Escogidos» se mantiene como término bíblico claro y consistente con el valor electivo de electorum.
  - No se introdujo lenguaje doctrinal ajeno al latín; la imagen del fuego se conserva sin expansión interpretativa.
