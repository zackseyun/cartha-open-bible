review_pass:
  verdict: revise
  source_alignment_summary: El latín dice literalmente «[a/vosotros] males, y ¿quién es el que los rechace/ahuyente?». El borrador capta bien «males» y la pregunta retórica, pero «Se os han enviado» introduce un pasivo perifrástico no presente explícitamente en el fragmento latino conservado, mientras que el inglés auditado interpreta el sentido como «have been sent upon you». Además, «¿quién hay que...?» suena menos natural y algo calcado. Conviene una formulación española más idiomática que preserve el mismo sentido de juicio sobrevenido y la imposibilidad de repelerlo.
  spanish_quality_summary: El texto es comprensible, pero «Se os han enviado males» suena algo forzado en español actual, y «¿quién hay que los ahuyente?» es gramaticalmente torpe. Una leve revisión mejora naturalidad y dignidad sin alejarse del sentido.
  glossary_alignment: No hay términos del glosario principal especialmente implicados. «males» alinea bien con mala. No se detectan conflictos terminológicos teológicos.
  issues:
  - severity: medium
    issue: «Se os han enviado males» resulta poco natural y sobreexplicita el verbo de envío
    rationale: El fragmento latino conservado es elíptico («uobis mala»), y aunque el inglés auditado resuelve «have been sent upon you», en español una opción como «Han venido males sobre vosotros» o «Os han sobrevenido males» suena más natural y mantiene la idea.
  - severity: medium
    issue: «¿quién hay que los ahuyente?» es una construcción poco idiomática
    rationale: Para quis est qui repellat ea, el español natural pide «¿quién podrá ahuyentarlos?» o «¿quién hay que pueda ahuyentarlos?». La forma actual dificulta la lectura.
  - severity: low
    issue: Registro pronominal mixto potencial
    rationale: El borrador usa «os», lo cual es válido, pero una redacción con «vosotros» en la misma línea mantiene coherencia estilística si se emplea una fórmula más plena como «sobre vosotros».
  revised_spanish_text: Han venido males sobre vosotros, ¿y quién podrá ahuyentarlos?
  revision_rationale: La revisión conserva el sentido del inglés auditado y del latín elíptico, pero usa español más natural y claro. «Han venido males sobre vosotros» expresa la irrupción de los males sobre los destinatarios sin imponer una construcción pasiva dura, y «¿quién podrá ahuyentarlos?» reproduce con fluidez la pregunta retórica de imposibilidad contenida en quis est qui repellat ea.
