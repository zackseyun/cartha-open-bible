translation:
  language: es
  text: Han venido males sobre vosotros, ¿y quién podrá ahuyentarlos?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: uobis
  english_pob_choice: you
  chosen_spanish: os
  alternatives_spanish:
  - a vosotros
  - a ustedes
  lexicon: Latin uobis (dativo/ablativo plural de 2.ª persona)
  rationale: El destinatario plural se expresa de modo natural con «os» en español, conservando la referencia directa y cercana del plural latino sin añadir explicitez innecesaria.
- source_word: mala
  english_pob_choice: evils
  chosen_spanish: males
  alternatives_spanish:
  - malas cosas
  - calamidades
  - desgracias
  lexicon: Latin mala (acusativo plural neutro de malum)
  rationale: «Males» reproduce con sobriedad el valor general de desgracias, aflicciones o calamidades que el contexto apocalíptico sugiere, sin estrechar el sentido a «malas cosas» ni intensificarlo demasiado con una paráfrasis.
- source_word: quis est qui repellat ea
  english_pob_choice: who is there to drive them away?
  chosen_spanish: ¿quién hay que los ahuyente?
  alternatives_spanish:
  - ¿quién es el que los apartará?
  - ¿quién puede rechazarlos?
  lexicon: Latin quis est qui repellat ea
  rationale: «Ahuyente» conserva la fuerza de repeler/expulsar del verbo latino repellere y mantiene la pregunta retórica de imposibilidad; «los» remite naturalmente a «males».
theological_decisions:
- issue: La frase presenta males enviados sobre el pueblo y pregunta por su reversión
  english_pob_reading: Evils have been sent upon you, and who is there to drive them away?
  chosen_spanish_reading: Se declara que los males han sido enviados sobre vosotros y se subraya que no hay quien los ahuyente.
  alternative_spanish_readings:
  - Se os han venido males, ¿y quién los apartará?
  - Males os han sobrevenido, ¿y quién los retirará?
  rationale: La traducción mantiene el matiz de acción sufrida por el destinatario y la pregunta retórica sobre la imposibilidad de remover el juicio. No se suaviza a una mera desgracia genérica, porque el texto latino usa un sustantivo fuerte y una formulación directa de envío y expulsión.
  doctrine_reference: Tema del juicio divino y de la incapacidad humana para revertirlo sin intervención de Dios
translation_notes:
  revision_awareness: La versión inglesa del POB se mantuvo sin notas y el control de revisión indica alto acuerdo; por eso el español sigue de cerca la sintaxis y la fuerza semántica del latín, sin introducir variantes textuales ni notas adicionales.
  spanish_consistency_notes:
  - Se mantiene un registro reverente y claro, apto para lectura eclesial.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se conserva la pregunta retórica con el verbo «ahuyentar» para reflejar el valor de repellere sin sobreexplicar.
