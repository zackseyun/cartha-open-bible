translation:
  language: es
  text: Fuego ha sido enviado sobre ustedes, ¿y quién podrá apagarlo?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: uobis
  english_pob_choice: upon you
  chosen_spanish: contra vosotros
  alternatives_spanish:
  - sobre vosotros
  - a vosotros
  lexicon: Latin uobis
  rationale: El dativo latino con sentido de destinatario o afectado se traduce aquí de modo natural como una acción dirigida contra los destinatarios del juicio. «Contra vosotros» conserva el tono de amenaza y el impacto del pasaje, mientras que «sobre vosotros» sería más neutral y «a vosotros» menos preciso en español.
- source_word: ignis
  english_pob_choice: Fire
  chosen_spanish: Fuego
  alternatives_spanish:
  - Un fuego
  - Incendio
  lexicon: Latin ignis
  rationale: La revisión inglesa eliminó el artículo indefinido para reflejar mejor el latín; por eso en español se mantiene «Fuego» sin artículo. «Incendio» sería interpretativo y más específico de lo que el texto da.
- source_word: extinguat
  english_pob_choice: quench
  chosen_spanish: apagar
  alternatives_spanish:
  - extinguir
  - sofocar
  lexicon: Latin extinguere
  rationale: «Apagar» es la equivalencia española más natural para una imagen de fuego y conserva el valor verbal del latín. «Extinguir» también es posible, pero en español común suena algo más técnico; «sofocar» introduce una matiz distinto.
theological_decisions:
- issue: Objeto del juicio divino implícito en el envío del fuego
  english_pob_reading: Fire has been sent upon you, and who is there to quench it?
  chosen_spanish_reading: Fuego ha sido enviado contra vosotros, ¿y quién lo apagará?
  alternative_spanish_readings:
  - Se ha enviado fuego sobre vosotros, ¿y quién lo apagará?
  - Fuego os ha sido enviado, ¿y quién lo apagará?
  rationale: El latín no nombra explícitamente al agente, pero el contexto apocalíptico sugiere un juicio procedente de Dios. El español conserva la pasiva impersonal sin añadir sujeto inexistente, y mantiene la gravedad del anuncio sin suavizarla.
  doctrine_reference: Juicio divino en contexto profético/apocalíptico
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa que eliminó el artículo indefinido en 'Fire', de modo que el español también presenta la frase sin artículo para reflejar mejor el latín y mantener un registro más formal.
  spanish_consistency_notes:
  - Se mantiene el trato plural de segunda persona («vosotros») por fidelidad al dativo latino uobis y al tono colectivo del anuncio.
  - Se evita introducir un sujeto explícito para el agente del envío, porque el latín no lo expresa de forma directa.
