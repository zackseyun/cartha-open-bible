review_pass:
  verdict: revise
  source_alignment_summary: El latín dice literalmente «Fuego ha sido enviado sobre/a vosotros, y ¿quién es el que lo extinga?». La idea central del juicio y la pasiva están bien preservadas, y «apagar» representa adecuadamente extinguat. Sin embargo, «contra vosotros» sobreinterpreta el dativo uobis; el inglés auditado usa «upon you», no «against you». Además, «quién lo apagará» cambia ligeramente el matiz de «quién hay que lo apague», aunque sigue siendo aceptable; puede mejorarse con una formulación más cercana y natural.
  spanish_quality_summary: El borrador es claro y legible, pero «contra vosotros» suena más interpretativo y combativo de lo que exige la fuente. También conviene evitar el cambio de interlocución a «vosotros» si se busca español neutral latinoamericano; «ustedes» o una construcción impersonal mejora la amplitud eclesial. La frase revisada suena más natural y digna.
  glossary_alignment: No hay términos del glosario mayor en juego. La principal cuestión léxica es uobis, que se alinea mejor con «sobre ustedes» que con «contra vosotros». «Fuego» sin artículo sigue correctamente la revisión inglesa y el latín ignis.
  issues:
  - severity: medium
    issue: «contra vosotros» sobretraduce uobis
    rationale: El dativo latino aquí marca a los afectados/destinatarios del fuego enviado, no necesariamente una preposición adversativa explícita. «Sobre ustedes» o «a ustedes» conserva mejor la fuente y el inglés POB «upon you».
  - severity: low
    issue: Registro pronominal menos neutral para el español meta
    rationale: «Vosotros» es correcto, pero el proyecto pide español neutral latinoamericano / ampliamente legible en iglesia. «Ustedes» encaja mejor sin pérdida de sentido.
  - severity: low
    issue: La segunda cláusula puede acercarse más al giro fuente
    rationale: «¿Quién lo apagará?» es comprensible, pero «¿y quién podrá apagarlo?» mantiene bien la fuerza retórica de imposibilidad implícita y suena natural en español.
  revised_spanish_text: Fuego ha sido enviado sobre ustedes, ¿y quién podrá apagarlo?
  revision_rationale: Se reemplaza «contra vosotros» por «sobre ustedes» para reflejar mejor el valor de uobis y ajustarse al inglés auditado «upon you», evitando una intensificación no exigida por la fuente. También se adopta un registro más neutral latinoamericano y una formulación final más natural y retóricamente fuerte en español.
