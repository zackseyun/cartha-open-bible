- from: Fuego ha sido enviado contra vosotros, ¿y quién lo apagará?
  to: Fuego ha sido enviado sobre ustedes, ¿y quién podrá apagarlo?
  rationale: Se reemplaza «contra vosotros» por «sobre ustedes» para reflejar mejor el valor de uobis y ajustarse al inglés auditado «upon you», evitando una intensificación no exigida por la fuente. También se adopta un registro más neutral latinoamericano y una formulación final más natural y retóricamente fuerte en español.
