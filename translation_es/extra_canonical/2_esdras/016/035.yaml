    unchanged: false
    changes_summary: Added the omitted opening phrase corresponding to 'earum non habentes adiutorium' ('Not having help'). Kept the rest essentially unchanged, with formal wording matching the Latin.
translation:
  language: es
  text: Sin tener ayuda, sus prometidos serán consumidos en la guerra, y sus maridos perecerán de hambre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: earum non habentes adiutorium
  english_pob_choice: Not having help
  chosen_spanish: Sin tener ayuda
  alternatives_spanish:
  - Sin auxilio
  - No teniendo ayuda
  lexicon: adiutorium
  rationale: El latín expresa una condición de carencia previa; «Sin tener ayuda» conserva el sentido participial y la relación causal con lo que sigue, en un español natural y formal. «Auxilio» sería posible, pero «ayuda» reproduce con claridad la falta de asistencia sin elevar innecesariamente el registro.
- source_word: Sponsi earum
  english_pob_choice: their bridegrooms
  chosen_spanish: sus novios
  alternatives_spanish:
  - sus prometidos
  - sus esposos
  lexicon: sponsus
  rationale: En este contexto narrativo, sponsi puede referirse a varones comprometidos o recién casados. La forma «novios» mantiene la relación prematrimonial/comprometida sin imponer «esposos», que el latín distingue luego con uiri earum. «Prometidos» es más explicativo, pero menos natural en el flujo del versículo.
- source_word: in bello consumentur
  english_pob_choice: will be consumed in war
  chosen_spanish: serán consumidos en la guerra
  alternatives_spanish:
  - serán destruidos en la guerra
  - perecerán en la guerra
  lexicon: consumere
  rationale: «Consumidos» sigue de cerca el verbo latino y preserva la intensidad de destrucción total. «En la guerra» mantiene el ámbito instrumental/local del latín sin añadir interpretaciones.
- source_word: uiri earum
  english_pob_choice: their husbands
  chosen_spanish: sus maridos
  alternatives_spanish:
  - sus esposos
  - sus hombres
  lexicon: vir
  rationale: Aquí uiri contrasta con sponsi; por eso «maridos» refleja la relación conyugal establecida en la segunda cláusula. «Esposos» también es válido, pero «maridos» conserva mejor el contraste léxico del latín frente a «novios».
- source_word: in fame exterentur
  english_pob_choice: will perish by famine
  chosen_spanish: perecerán de hambre
  alternatives_spanish:
  - morirán de hambre
  - serán consumidos por el hambre
  lexicon: famēs / exterere
  rationale: La expresión latina liga la destrucción con la falta de alimento; «perecerán de hambre» comunica el resultado con sobriedad. «De hambre» mantiene la fuerza causal sin convertirla en una formulación demasiado explicativa.
theological_decisions:
- issue: Doble destino de los varones en guerra y hambre
  english_pob_reading: their bridegrooms will be consumed in war, and their husbands will perish by famine
  chosen_spanish_reading: sus novios serán consumidos en la guerra, y sus maridos perecerán de hambre
  alternative_spanish_readings:
  - sus prometidos serán destruidos en la guerra, y sus maridos morirán de hambre
  - sus novios perecerán en la guerra, y sus maridos fallecerán de hambre
  rationale: No hay ajuste doctrinal especial más allá de preservar el paralelismo de dos grupos masculinos distintos y dos modos distintos de muerte. Se mantiene la dureza del juicio sin suavizarla.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa reciente añadió la cláusula inicial equivalente a 'Not having help'. La versión española la incorpora explícitamente con 'Sin tener ayuda' y mantiene el resto del versículo en correspondencia estrecha con el latín limpio y con la traducción inglesa revisada.
  spanish_consistency_notes:
  - 'Se mantiene el contraste sponsi/uiri con dos soluciones distintas: «novios» y «maridos».'
  - Se evita sustituir el par por un término único como «esposos» para no borrar la distinción lexical del original.
  - El tono es formal y publicable, sin añadir elementos ausentes del latín.
