  source_alignment_summary: 'El borrador español refleja bien la estructura del latín y recupera correctamente la frase inicial omitida en una versión anterior: «earum non habentes adiutorium» = «Sin tener ayuda». También mantiene la distinción entre «Sponsi earum» y «uiri earum». Sin embargo, «sus novios» para sponsi rebaja el registro y puede sonar demasiado moderno o informal para un contexto profético; «sus prometidos» preserva mejor la diferencia frente a «sus maridos» sin perder naturalidad eclesial.'
