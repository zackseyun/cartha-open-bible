translation:
  language: es
  text: porque los extranjeros segarán sus frutos y saquearán sus bienes, y derribarán sus casas y llevarán cautivos a sus hijos[a], porque en cautiverio y hambre engendran a sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «volcarán sus casas».
    reason: alternative_rendering_from_english_audit_trail
lexical_decisions:
- source_word: Fructus
  english_pob_choice: their fruits
  chosen_spanish: sus frutos
  alternatives_spanish:
  - sus cosechas
  - sus frutos de la tierra
  lexicon: fructus
  rationale: En este contexto, fructus se refiere a lo que producen o cosechan; «sus frutos» conserva la correspondencia literal y es natural en español bíblico.
- source_word: alienigenae
  english_pob_choice: foreigners
  chosen_spanish: los extranjeros
  alternatives_spanish:
  - los forasteros
  - los de fuera
  lexicon: alienigenae
  rationale: «Extranjeros» reproduce bien el sentido de personas ajenas a la comunidad; es claro y estándar en español.
- source_word: substantiam
  english_pob_choice: their goods
  chosen_spanish: sus bienes
  alternatives_spanish:
  - su hacienda
  - sus posesiones
  lexicon: substantia
  rationale: La sustancia aquí designa bienes o patrimonio; «bienes» comunica esa idea sin exagerar el matiz económico.
- source_word: domus euertent
  english_pob_choice: overturn their houses
  chosen_spanish: derribarán sus casas
  alternatives_spanish:
  - derrumbarán sus casas
  - destruirán sus casas
  lexicon: everto
  rationale: Con un objeto como domus, everto expresa tumbar o arruinar una casa; «derribarán» es más idiomático que un calco como «volcarán» y conserva la fuerza material del verbo.
- source_word: filios eorum captiuabunt
  english_pob_choice: take their children captive
  chosen_spanish: llevarán cautivos a sus hijos
  alternatives_spanish:
  - apresarán a sus hijos
  - capturarán a sus hijos
  lexicon: captivare
  rationale: «Llevarán cautivos» preserva el matiz de cautiverio impuesto, no solo de captura momentánea.
- source_word: in captiuitate et fame
  english_pob_choice: in captivity and famine
  chosen_spanish: en cautiverio y hambre
  alternatives_spanish:
  - entre cautiverio y hambre
  - en cautiverio y en hambre
  lexicon: captivitas
  rationale: La construcción mantiene la paridad de las dos condiciones de aflicción presentes en el latín.
translation_notes:
  revision_awareness: La edición latina base muestra una oscilación en la versión inglesa previa entre «destroy their houses» y «overturn their houses». El latín «domus euertent» permite ambas ideas, pero en español «derribarán sus casas» refleja mejor el sentido concreto de derribar/arruinar edificios sin introducir un calco incómodo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «cautivos» y no «prisioneros» para conservar el lenguaje de cautiverio del latín.
  - 'Se conserva una sintaxis cercana al original para respetar la acumulación de acciones: segarán, saquearán, derribarán, llevarán cautivos.'
