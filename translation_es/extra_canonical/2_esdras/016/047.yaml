review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del latín: extranjeros cosechan los frutos, saquean los bienes, derriban las casas y se llevan cautivos a los hijos, porque estos son engendrados en cautiverio y hambre. Sin embargo, la nota al pie no preserva correctamente la alternativa documentada en el rastro inglés, ya que repite la lectura principal en vez de ofrecer una alternativa real.'
  spanish_quality_summary: El español es natural, claro y digno. «Derribarán sus casas» es una buena solución para domus euertent y suena más idiomática que un calco literal. «Llevarán cautivos a sus hijos» también está bien formulado. El único problema de calidad editorial es la nota, que resulta redundante e inútil.
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. Las decisiones léxicas principales («extranjeros», «bienes», «derribarán», «cautivos», «cautiverio») son apropiadas y fieles al latín.
  issues:
  - severity: medium
    issue: La nota al pie [a] no presenta una alternativa distinta
    rationale: El texto principal ya dice «derribarán sus casas», pero la nota dice «O «derribarán sus casas»». Una nota alternativa debe aportar una variante real; de lo contrario, es un error editorial y no preserva adecuadamente el historial auditado.
  revised_spanish_text: porque los extranjeros segarán sus frutos y saquearán sus bienes, y derribarán sus casas y llevarán cautivos a sus hijos[a], porque en cautiverio y hambre engendran a sus hijos.
