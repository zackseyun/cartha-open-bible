revisions:
- from: ¿No será la tierra totalmente aplastada delante de él? La tierra tiembla[a] y sus cimientos; el mar se agita desde lo profundo, y sus olas y sus peces serán turbados delante del Señor y delante de la gloria de su poder.
  to: ¿No será la tierra totalmente aplastada ante él? La tierra tiembla y sus cimientos; el mar se agita desde lo profundo, y sus olas y sus peces se turbarán[a] ante el Señor y ante la gloria de su poder.
  rationale: Se corrige el anclaje de la nota para alinearlo con la evidencia inglesa auditada y con el verbo latino «disturbabuntur». Se sustituye «serán turbados» por «se turbarán» para un español más natural manteniendo el valor futuro. Se pule «delante de» a «ante» por fluidez, sin afectar el significado.
  reviewer_model: gpt-5.4
