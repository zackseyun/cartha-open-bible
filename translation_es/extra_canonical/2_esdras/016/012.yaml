base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/016/012.yaml
  text: Will not the earth be utterly crushed before him? The earth quakes[a], and its foundations; the sea surges from the deep, and its waves and its fish will be troubled before the Lord and before the glory of his power.
  footnotes:
  - marker: a
    text: Or 'are troubled'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:29:49Z'
    unchanged: false
    changes_summary: Restored the opening clause omitted from the Latin, added 'will be' for the passive future, and joined 'its waves and its fish' as both governed by 'will be troubled' before the Lord.
translation:
  language: es
  text: ¿No será la tierra totalmente aplastada ante él? La tierra tiembla y sus cimientos; el mar se agita desde lo profundo, y sus olas y sus peces se turbarán[a] ante el Señor y ante la gloria de su poder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «están turbados».
    reason: Alternativa documentada por el POB inglés para el verbo latino «disturbabuntur», anclada ahora en la frase correcta.
lexical_decisions:
- source_word: non funditus conteretur a facie ipsius?
  english_pob_choice: Will not the earth be utterly crushed before him?
  chosen_spanish: ¿No será la tierra totalmente aplastada delante de él?
  alternatives_spanish:
  - ¿No será la tierra completamente destruida delante de él?
  - ¿No será la tierra totalmente quebrantada delante de él?
  lexicon: contero
  rationale: Conteretur expresa una destrucción violenta y total; «aplastada» conserva la fuerza física de «utterly crushed» sin introducir una abstracción excesiva. «Delante de él» reproduce a facie ipsius como presencia/comparecencia, en vez de una lectura más libre.
- source_word: Terra tremuit et fundamenta eius
  english_pob_choice: The earth quakes, and its foundations;
  chosen_spanish: La tierra tiembla[a] y sus cimientos;
  alternatives_spanish:
  - La tierra tembló y sus cimientos;
  - La tierra tiembla y sus fundamentos;
  lexicon: tremo / fundamenta
  rationale: El latín usa perfecto frente a futuros posteriores del contexto apocalíptico; el POB inglés conserva el presente en el primer miembro para dar inmediatez. En español, «tiembla» mantiene esa vividez, y «cimientos» es el equivalente natural de fundamenta en este contexto.
- source_word: mare fluctuatur de profundo
  english_pob_choice: the sea surges from the deep
  chosen_spanish: el mar se agita desde lo profundo
  alternatives_spanish:
  - el mar se encrespa desde el abismo
  - el mar se agita desde las profundidades
  lexicon: fluctuor / profundum
  rationale: «Se agita» comunica el movimiento convulso de fluctuatur y evita suavizarlo a una mera ondulación. «Desde lo profundo» conserva el valor de profundo como abismo o profundidad primordial sin forzar una sola interpretación técnica.
- source_word: fluctus eius disturbabuntur
  english_pob_choice: its waves will be troubled
  chosen_spanish: sus olas ... serán turbados
  alternatives_spanish:
  - sus olas ... serán perturbadas
  - sus olas ... se verán sacudidas
  lexicon: disturbo
  rationale: El verbo latino es futuro pasivo; en español se mantiene con «serán turbadas». Aunque el sustantivo es femenino, la secuencia coordinada con «sus peces» permite una referencia al conjunto del mar y sus criaturas; para transparencia sintáctica se deja el paralelismo con el sujeto compuesto.
- source_word: pisces eius
  english_pob_choice: and its fish
  chosen_spanish: y sus peces
  alternatives_spanish:
  - y sus peces del mar
  - y los peces de él
  lexicon: pisces
  rationale: La forma simple «sus peces» es la más fiel y natural; mantiene el campo semántico concreto del pasaje sin explicitar más de lo que el latín dice.
- source_word: a facie domini et a gloria uirtutis eius
  english_pob_choice: before the Lord and before the glory of his power
  chosen_spanish: delante del Señor y delante de la gloria de su poder
  alternatives_spanish:
  - ante el Señor y ante la gloria de su poder
  - en presencia del Señor y de la gloria de su poder
  lexicon: dominus / gloria virtutis
  rationale: Se conserva «Señor» aquí porque el latín dominus funciona como título reverencial del Dios que juzga en la escena, y el POB inglés ya lo traduce así. «Gloria de su poder» reproduce la construcción genitiva sin convertirla en una paráfrasis interpretativa.
theological_decisions:
- issue: Naturaleza del sujeto devastado en la pregunta retórica inicial
  english_pob_reading: Will not the earth be utterly crushed before him?
  chosen_spanish_reading: ¿No será la tierra totalmente aplastada delante de él?
  alternative_spanish_readings:
  - ¿No será la tierra completamente destruida delante de él?
  - ¿No será la tierra enteramente quebrantada delante de él?
  rationale: La pregunta retórica presenta el poder judicial/cósmico de Dios sobre la creación. «Aplastada» mantiene la imagen de violencia total sin convertirla en una destrucción genérica que diluya el impacto apocalíptico.
  doctrine_reference: Juicio divino cósmico en literatura apocalíptica; no doctrinal sistemático, sino imaginería escatológica.
- issue: Tensión verbal entre presente y futuro en la serie de acciones cósmicas
  english_pob_reading: The earth quakes[a], and its foundations; the sea surges from the deep, and its waves and its fish will be troubled
  chosen_spanish_reading: La tierra tiembla[a] y sus cimientos; el mar se agita desde lo profundo, y sus olas y sus peces serán turbados
  alternative_spanish_readings:
  - La tierra tiembla y sus cimientos; el mar se agita desde lo profundo, y sus olas y sus peces se turbarán
  - La tierra tiembla y sus cimientos; el mar se agita desde lo profundo, y sus olas y sus peces están turbados
  rationale: El latín mezcla un perfectivo/actualización en Terra tremuit con futuros claros en disturbabuntur. El español conserva el efecto de inmediatez con «tiembla» y respeta el futuro de «serán turbados», evitando nivelar toda la escena a pasado o presente uniforme.
  doctrine_reference: Consistencia aspectual en traducción bíblica; respeto al valor temporal del texto fuente.
- issue: Referencia de dominus en un contexto que alude al nombre divino
  english_pob_reading: before the Lord and before the glory of his power
  chosen_spanish_reading: delante del Señor y delante de la gloria de su poder
  alternative_spanish_readings:
  - delante de Yahvé y delante de la gloria de su poder
  - delante del Señor Dios y delante de la gloria de su poder
  rationale: Aunque el proyecto prefiere «Yahvé» para יהוה, aquí el texto latino usa dominus y la tradición auditada del POB inglés mantiene «Lord». Sin una señal textual directa en este versículo que obligue a sustituirlo por el nombre, se conserva «Señor» para no forzar una identificación que el propio latín no explicita.
  doctrine_reference: Tratamiento del nombre divino y títulos reverenciales en traducción bíblica; fidelidad al testimonio textual disponible.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del POB inglés que restauró la cláusula inicial de destrucción total, mantuvo el futuro pasivo en «will be troubled», y coordinó «its waves and its fish» bajo ese mismo verbo. La redacción española preserva esas tres decisiones: reintroduce la pregunta retórica inicial, distingue el presente vívido de «tiembla» del futuro pasivo «serán turbados», y mantiene la coordinación natural de olas y peces.'
  spanish_consistency_notes:
  - Se mantiene la preferencia POB por una traducción fuente-auditable, sin suavizar el tono apocalíptico.
  - «Señor» se conserva únicamente por fidelidad al dominus latino y al audit trail inglés; no pretende aquí reemplazar la política general del proyecto sobre יהוה.
  - La nota textual «O están turbados» refleja la alternativa verbal que el español podría sugerir, aunque el principal sigue el futuro del original latino.
