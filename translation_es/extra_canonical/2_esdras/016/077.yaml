review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la cláusula inicial latina («quoniam deus dux uester est») y mantiene la doble advertencia final según el audit trail inglés. Sin embargo, hay un problema importante de alineación: el latín citado en el source payload solo contiene «ne praeponderent uos» después de «dicit dominus deus», mientras que la traducción inglesa auditada añade explícitamente «your sins» y «your iniquities» como complemento de una exhortación doble. Dado que el proyecto pide usar el audit trail inglés como contexto auditado, la línea española debe seguir esa forma completa, pero conviene reparar la formulación para que sea más natural y más fiel a la imaginería de ‘pesar/abatir’ en la primera mitad.'
  spanish_quality_summary: El español es claro y digno, pero mezcla voseo reverencial peninsular («vuestro / guardáis / dejéis») con la pauta de español neutral latinoamericano solicitada. Además, «os opriman» comunica opresión más que peso, y «permitáis» rompe el paralelismo con «no dejéis». Una redacción con «ustedes» o una forma impersonal/plural neutra mejora la legibilidad panhispánica.
  glossary_alignment: «Dios» está bien. «Señor Dios» se tolera aquí porque la fuente inmediata es latina («dominus deus»), aunque el proyecto normalmente prefiera «Yahvé» para el nombre divino hebreo; no hace falta forzar «Yahvé» sin evidencia hebrea inmediata. «Mandamientos» y «preceptos» preservan adecuadamente la distinción de la fuente.
  issues:
  - severity: medium
    issue: Registro pronominal no acorde con el objetivo de español neutral latinoamericano
    rationale: «vuestro / guardáis / dejéis / os» suena marcadamente peninsular y no coincide con la guía de estilo del proyecto.
  - severity: medium
    issue: «os opriman» debilita la imagen de peso de praeponderent
    rationale: El verbo latino y el inglés auditado apuntan a algo que pesa o abruma; «oprimir» desplaza el sentido hacia opresión general.
  - severity: low
    issue: Paralelismo verbal mejorable en la doble prohibición
    rationale: «no dejéis... ni permitáis...» es entendible, pero «no dejen... ni permitan...» mantiene mejor la estructura paralela del original/inglés.
  revised_spanish_text: Porque Dios es su guía. Y ustedes, que guardan mis mandamientos y mis preceptos, dice el Señor Dios, no dejen que sus pecados los abrumen, ni permitan que sus iniquidades prevalezcan sobre ustedes.
  revision_rationale: Se ajustó el registro al español neutral latinoamericano mediante «su / ustedes / los». También se cambió «os opriman» por «los abrumen» para conservar mejor la idea de peso que recae sobre la persona sin caer en un calco torpe. Se mantuvo «Señor Dios» por corresponder a la fuente latina inmediata «dominus deus».
