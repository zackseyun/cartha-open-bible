translation:
  language: es
  text: Porque Dios es su guía. Y ustedes, que guardan mis mandamientos y mis preceptos, dice el Señor Dios, no dejen que sus pecados los abrumen, ni permitan que sus iniquidades prevalezcan sobre ustedes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: quoniam deus dux uester est
  english_pob_choice: For God is your guide.
  chosen_spanish: Porque Dios es vuestro guía.
  alternatives_spanish:
  - Pues Dios es vuestro guía.
  - Porque Dios os guía.
  lexicon: deus -> Dios; dux -> guía
  rationale: La cláusula inicial del latín fue restituida siguiendo el texto fuente y el repaso inglés. «Guía» conserva la imagen directiva de dux sin recargarla con un matiz interpretativo adicional.
- source_word: seruatis mandata et praecepta mea
  english_pob_choice: you who keep my commandments and my ordinances
  chosen_spanish: vosotros que guardáis mis mandamientos y mis preceptos
  alternatives_spanish:
  - los que guardáis mis mandamientos y mis preceptos
  - vosotros que obedecéis mis mandamientos y mis preceptos
  lexicon: seruatis -> guardáis; mandata -> mandamientos; praecepta -> preceptos
  rationale: «Guardáis» comunica la observancia continua que pide el latín. Se mantiene la distinción entre «mandamientos» y «preceptos» para reflejar dos términos coordinados en la fuente.
- source_word: dicit dominus deus
  english_pob_choice: says the Lord God
  chosen_spanish: dice el Señor Dios
  alternatives_spanish:
  - dice el Señor, Dios
  - dice Yahvé Dios
  lexicon: dominus deus -> Señor Dios
  rationale: Se conserva la fórmula profética de habla directa. Aunque el proyecto español prefiere «Yahvé» para יהוה, aquí el latín presenta la expresión compuesta dominus deus; por eso se mantiene «Señor Dios» para reflejar la forma transmitida por la fuente y el audit trail inglés.
- source_word: ne praeponderent uos
  english_pob_choice: do not let your sins weigh you down, nor let your iniquities prevail over you.
  chosen_spanish: no dejéis que vuestros pecados os opriman, ni permitáis que vuestras iniquidades prevalezcan sobre vosotros.
  alternatives_spanish:
  - no dejéis que vuestros pecados os pesen, ni que vuestras iniquidades os dominen.
  - no permitáis que vuestros pecados os sobrecarguen, ni que vuestras iniquidades os venzan.
  lexicon: praeponderent -> opriman / prevalezcan
  rationale: El latín praeponderent sugiere el peso de algo que se impone o aplasta. La primera mitad se vierte con «opriman» para conservar la imagen de peso opresivo; la segunda, con «prevalezcan», reproduce la idea de dominio indicada por el inglés POB.
theological_decisions:
- issue: Relación entre la guía de Dios y la exhortación moral
  english_pob_reading: For God is your guide. And you who keep my commandments and my ordinances...
  chosen_spanish_reading: Porque Dios es vuestro guía. Y vosotros que guardáis mis mandamientos y mis preceptos...
  alternative_spanish_readings:
  - Pues Dios es vuestro guía. Y los que guardáis mis mandamientos y mis preceptos...
  rationale: 'Se conserva la estructura exhortativa: primero la afirmación de que Dios guía, luego la amonestación dirigida a quienes ya viven bajo la obediencia. No se suaviza la responsabilidad moral ni se convierte en una promesa genérica.'
  doctrine_reference: Obediencia del pacto y responsabilidad moral
- issue: Preservación de la doble advertencia negativa
  english_pob_reading: do not let your sins weigh you down, nor let your iniquities prevail over you
  chosen_spanish_reading: no dejéis que vuestros pecados os opriman, ni permitáis que vuestras iniquidades prevalezcan sobre vosotros
  alternative_spanish_readings:
  - no dejéis que vuestros pecados os pesen, ni que vuestras iniquidades os dominen
  rationale: La fuente y el POB inglés presentan dos advertencias paralelas, una sobre la carga del pecado y otra sobre su dominio. Se preserva la duplicación para no borrar la tensión textual entre peso y poder dominante.
  doctrine_reference: Pecado como carga y como poder dominante
translation_notes:
  revision_awareness: The final Spanish draft reflects the latest revision pass by restoring the opening clause equivalent to Latin quoniam deus dux uester est, which had been omitted in the earlier English audit text. No additional textual variants are introduced beyond the audited source and revision history.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» en mayúsculas como máscara; se mantuvo la fórmula «Señor Dios» porque el inmediato precedente latino es dominus deus y el audit trail inglés también la usa.
  - Se usó «mandamientos» y «preceptos» como pareja coordinada, siguiendo la distinción léxica del latín y del inglés POB.
  - No se añadieron notas al pie porque el verso no presenta variantes textuales ni ambigüedades que requirieran marcador anclado en el texto.
