translation:
  language: es
  text: Los árboles darán fruto, ¿y quién lo recogerá?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ligna
  english_pob_choice: trees
  chosen_spanish: árboles
  alternatives_spanish:
  - los árboles
  - maderos
  - árbol
  lexicon: Latin ligna (plural)
  rationale: El latín plural ligna se refiere de manera natural a árboles en este contexto de fructificación; «árboles» conserva el sujeto plural y la imagen agrícola sin añadir matiz ajeno.
- source_word: fructiferabunt
  english_pob_choice: will bear fruit
  chosen_spanish: darán fruto
  alternatives_spanish:
  - fructificarán
  - producirán fruto
  lexicon: Latin fructiferabunt
  rationale: «Darán fruto» reproduce con naturalidad el valor verbal de producir fruto y suena idiomático en español, manteniendo la imagen bíblica sin endurecer el estilo.
- source_word: vindemiet
  english_pob_choice: gather
  chosen_spanish: recogerá
  alternatives_spanish:
  - vendimiará
  - juntará
  - cosechará
  lexicon: Latin vindemiet
  rationale: El verbo latino apunta a la acción de recoger la cosecha, especialmente uvas; en español «recogerá» conserva la acción de recolección sin restringirla demasiado a la vendimia literal, que podría ser más específica de lo que el contexto español requiere.
theological_decisions:
- issue: Imagen de cosecha y pregunta retórica
  english_pob_reading: The trees will bear fruit, and who will gather it?
  chosen_spanish_reading: Los árboles darán fruto, ¿y quién lo recogerá?
  alternative_spanish_readings:
  - Los árboles darán fruto, ¿y quién lo cosechará?
  - Los árboles fructificarán, ¿y quién lo recogerá?
  rationale: No hay una tensión doctrinal explícita; la decisión principal es preservar la pregunta retórica y la imagen de abundancia/cosecha del texto latino con un español claro y fiel.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, marcado como sin cambios necesarios, y el texto español se alineó con el consenso alto entre la fuente latina limpia y la traducción inglesa auditada.
  spanish_consistency_notes:
  - Se mantuvo el sujeto plural «Los árboles» para corresponder al latín ligna.
  - Se evitó «SEÑOR» u otra terminología no presente; el verso no contiene vocabulario divino.
  - Se prefirió un español bíblico claro y moderno, sin arcaísmos innecesarios.
