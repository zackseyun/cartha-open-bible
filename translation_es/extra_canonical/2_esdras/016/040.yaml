translation:
  language: es
  text: así también los males no tardarán en venir sobre la tierra, y la era[a] gemirá, y dolores la rodearán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el siglo'. El latín saeculum puede referirse a una era, edad o mundo según el contexto; aquí conserva una personificación escatológica.
    reason: Preservar la amplitud semántica de saeculum y explicar el cambio desde la opción más literal del borrador.
lexical_decisions:
- source_word: uno puncto
  english_pob_choice: so also
  chosen_spanish: así también
  alternatives_spanish:
  - de igual manera
  - también así
  lexicon: adverbial comparison
  rationale: El latín introduce una comparación de modo/consecuencia; "así también" comunica la correspondencia sin forzar una causalidad ajena al texto.
- source_word: mala
  english_pob_choice: the evils
  chosen_spanish: los males
  alternatives_spanish:
  - las desgracias
  - los males
  lexicon: malum
  rationale: '"Males" conserva el valor amplio de calamidades o males concretos y mantiene el paralelo con la pluralidad del latín, sin reducirlo a una sola esfera moral.'
- source_word: ad prodiendum
  english_pob_choice: to come forth
  chosen_spanish: salir
  alternatives_spanish:
  - aparecer
  - salir
  lexicon: prodeo
  rationale: '"Salir" es una forma natural y fiel para expresar la irrupción o aparición de los males; evita una construcción demasiado técnica en español.'
- source_word: saeculum
  english_pob_choice: the age
  chosen_spanish: el siglo
  alternatives_spanish:
  - la era
  - el mundo
  lexicon: saeculum
  rationale: '"Siglo" reproduce con precisión la elección del latín y conserva la ambigüedad temporal/era que el texto sugiere; "era" sería más interpretativa.'
- source_word: gemet
  english_pob_choice: will groan
  chosen_spanish: gemirá
  alternatives_spanish:
  - se lamentará
  - gemirá
  lexicon: gemo
  rationale: '"Gemirá" mantiene la imagen verbal del lamento del texto fuente y es completamente inteligible en español bíblico contemporáneo.'
- source_word: dolores circumtenent illum
  english_pob_choice: pains will surround it
  chosen_spanish: dolores lo rodearán
  alternatives_spanish:
  - dolores lo cercarán
  - dolores lo rodearán
  lexicon: circumteneo
  rationale: '"Rodearán" sigue de cerca el valor de "circumtenent" y coincide con la revisión inglesa que prefirió "surround it" por cercanía léxica y naturalidad.'
theological_decisions:
- issue: Personificación del siglo / age
  english_pob_reading: the age will groan, and pains will surround it
  chosen_spanish_reading: el siglo gemirá, y dolores lo rodearán
  alternative_spanish_readings:
  - la era gemirá, y dolores la rodearán
  - el mundo gemirá, y dolores lo rodearán
  rationale: Se conserva la personificación sin suavizarla. El sustantivo "siglo" mantiene el alcance escatológico/época de la imagen y respeta el paralelismo del latín.
  doctrine_reference: Escatología poética del texto apocalíptico; personificación literaria sin implicación doctrinal adicional
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la última cláusula de una imagen de captura a una de envolvimiento ('surround it') para reflejar mejor 'circumtenent'. La versión española adopta directamente 'rodearán' para mantener esa alineación léxica y la naturalidad formal del español.
  spanish_consistency_notes:
  - Se usó 'siglo' para saeculum, en coherencia con un registro bíblico tradicional pero sin sustituirlo por 'mundo' o 'era'.
  - Se evitó 'SEÑOR' o vocabulario litúrgico no presente en el fuente; este versículo no contiene nombres divinos explícitos.
  - La pluralidad de 'los males' se conservó para no diluir el latín 'mala'.
  - No se añadió puntuación interpretativa más allá de la coordinación del original.
