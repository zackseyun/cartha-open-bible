translation:
  language: es
  text: y el que siembra, como quien no segará; así también el que poda las vides, como quien no recogerá las uvas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Qui seminat
  english_pob_choice: the one who sows
  chosen_spanish: el que siembra
  alternatives_spanish:
  - el que cosecha
  - el sembrador
  lexicon: sembrar
  rationale: El latín dice claramente "Qui seminat"; en español, "el que siembra" conserva la acción agrícola y el valor participial sin añadir énfasis interpretativo.
- source_word: quasi non metat
  english_pob_choice: like one who will not reap
  chosen_spanish: como quien no segará
  alternatives_spanish:
  - como uno que no cosechará
  - como quien no recogerá
  lexicon: segar / cosechar
  rationale: '"Metat" remite a segar o cosechar el resultado de la siembra. "Segará" mantiene la imagen agrícola y la relación con "siembra" de manera natural en español. Se eligió futuro para reflejar la expectativa negada del original y de la versión inglesa.'
- source_word: Qui putat
  english_pob_choice: the one who prunes the vines
  chosen_spanish: el que poda las vides
  alternatives_spanish:
  - el que recorta las vides
  - el que limpia las vides
  lexicon: podar
  rationale: '"Putat" aquí corresponde a podar. "Podar las vides" es la forma española más directa y precisa, y conserva la imagen vitícola del texto latino.'
- source_word: quasi non uindemiaturus
  english_pob_choice: like one who will not gather the grapes
  chosen_spanish: como quien no recogerá las uvas
  alternatives_spanish:
  - como quien no vendimiará
  - como quien no cosechará las uvas
  lexicon: vendimiar / recoger
  rationale: El latín indica la falta de vendimia. "Recogerá las uvas" es claro y accesible en español, y mantiene la idea de no obtener el fruto de la poda. Se evita "vendimiará" por ser menos transparente para lectores generales.
