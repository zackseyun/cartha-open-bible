base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/016/070.yaml
  text: some of you[a], and they will feed you food sacrificed to idols. And those who consent to them will be for them an object of derision and reproach and trampling underfoot.
  footnotes:
  - marker: a
    text: Or 'And those who consent to them will be had in derision and reproach and trampled underfoot.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:30:18Z'
    unchanged: false
    changes_summary: Revised 'things sacrificed to idols' to the more natural 'food sacrificed to idols.' Adjusted the second clause to more closely reflect the Latin erint illis ('will be for them') and retained the threefold sequence 'derision and reproach and trampling underfoot' without adding 'held' or changing the final noun into a passive verb.
translation:
  language: es
  text: algunos de ustedes, y los alimentarán con comida sacrificada a los ídolos. Y los que consientan con ellos[a] serán para ellos objeto de burla, oprobio y pisoteo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Y los que consientan con ellos serán tenidos por ellos en burla, oprobio y pisoteo”.'
    reason: alternative_reading
lexical_decisions:
- source_word: quosdam ex uobis
  english_pob_choice: some of you
  chosen_spanish: algunos de ustedes
  alternatives_spanish:
  - algunos de vosotros
  - algunos de ustedes mismos
  lexicon: quosdam / ex uobis
  rationale: El latín indica una parte indeterminada del grupo destinatario. En español neutro de alcance amplio, 'de ustedes' mantiene el valor inclusivo y actual, sin introducir un matiz regional demasiado estrecho.
- source_word: cibabunt idolis occisam
  english_pob_choice: they will feed you food sacrificed to idols
  chosen_spanish: los alimentarán con comida sacrificada a los ídolos
  alternatives_spanish:
  - los alimentarán con cosas sacrificadas a los ídolos
  - les darán a comer alimento sacrificado a los ídolos
  lexicon: cibabunt / idolis occisam
  rationale: 'La revisión inglesa corrigió el punto clave: no es una acción homicida, sino la imposición de alimento vinculado a ídolos. ''Comida sacrificada a los ídolos'' conserva el sentido cultual y la naturalidad en español.'
- source_word: erint illis
  english_pob_choice: will be for them
  chosen_spanish: serán para ellos
  alternatives_spanish:
  - serán tenidos por ellos
  - les resultarán
  lexicon: erint illis
  rationale: La estructura latina expresa relación o estado respecto de 'ellos'. 'Serán para ellos' reproduce esa relación sin añadir una voz pasiva que el texto no exige.
- source_word: in derisum et inproperium et in conculcationem
  english_pob_choice: an object of derision and reproach and trampling underfoot
  chosen_spanish: objeto de burla, oprobio y pisoteo
  alternatives_spanish:
  - objeto de escarnio, reproche y pisoteo
  - motivo de burla, oprobio y pisoteo
  lexicon: derisum / inproperium / conculcationem
  rationale: '''Burla'' y ''oprobio'' recogen con claridad la triple degradación; ''pisoteo'' conserva la imagen física de ''conculcationem'' con un español idiomático.'
- source_word: consenserint eis
  english_pob_choice: those who consent to them
  chosen_spanish: los que consientan con ellos
  alternatives_spanish:
  - los que acepten lo que ellos hacen
  - los que estén de acuerdo con ellos
  lexicon: consentire
  rationale: El verbo latino puede implicar asentir/ponerse de acuerdo con una práctica ilícita. 'Consentir con ellos' mantiene la conexión moral con el acto referido y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: La prueba de comer alimento sacrificado a los ídolos como señal de fidelidad
  english_pob_reading: food sacrificed to idols
  chosen_spanish_reading: comida sacrificada a los ídolos
  alternative_spanish_readings:
  - alimento sacrificado a los ídolos
  - carne sacrificada a los ídolos
  rationale: La corrección textual indica que el problema es la ingestión de alimento idolátrico, no una violencia contra las personas. 'Comida' es comprensible y amplia; 'alimento' sería igualmente válido y más formal.
  doctrine_reference: 1 Corintios 8–10; Apocalipsis 2:14, 20
- issue: El destino de quienes consienten
  english_pob_reading: will be for them an object of derision and reproach and trampling underfoot
  chosen_spanish_reading: serán para ellos objeto de burla, oprobio y pisoteo
  alternative_spanish_readings:
  - serán tenidos por ellos en burla, oprobio y pisoteo
  - serán motivo de burla, oprobio y pisoteo para ellos
  rationale: La revisión inglesa evita añadir un pasivo no explícito y preserva la secuencia nominal. El español mantiene esa relación sin suavizar el juicio ni convertirlo en una simple metáfora.
  doctrine_reference: Tema profético de vergüenza pública y humillación en el juicio
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que restituye la primera cláusula omitida y corrige el sentido de 'idolis occisam' como alimento sacrificado a los ídolos. También se reflejó la segunda cláusula sin añadir 'held' ni transformar 'erint illis' en una pasiva ajena al latín.
  spanish_consistency_notes:
  - Se usó 'ídolos' para mantener la referencia cultual explícita y evitar una generalización.
  - Se evitó 'siervo' porque el pasaje no contiene δοῦλος ni un matiz servil; aquí el foco es la complicidad en una práctica idolátrica.
  - La puntuación conserva la coordinación triple de 'derision and reproach and trampling underfoot' con equivalente natural en español.
