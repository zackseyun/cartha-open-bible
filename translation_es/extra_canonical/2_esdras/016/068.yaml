translation:
  language: es
  text: Miren, Dios es juez; témanle. Dejen sus pecados y olvídense de sus iniquidades, para no volver a practicarlas jamás[a]. Y Dios los sacará y los librará de toda tribulación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para no practicarlas más para siempre».'
    reason: Preserva en español la alternativa más literal documentada en la nota del audit trail inglés sobre el alcance perpetuo de la frase latina.
lexical_decisions:
- source_word: Ecce
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - He aquí
  - Miren, pues
  lexicon: Latin ecce
  rationale: «Miren» conserva el valor de llamada atencional del original y suena natural en español bíblico moderno; «He aquí» es posible, pero algo más solemne y menos directo.
- source_word: iudex
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - juez soberano
  - juez
  lexicon: Latin iudex
  rationale: «Juez» reproduce de forma directa el sustantivo forense y preserva la afirmación judicial sobre Dios sin añadir matices no presentes en el texto.
- source_word: desinite a peccatis uestris
  english_pob_choice: Cease from your sins
  chosen_spanish: Dejen sus pecados
  alternatives_spanish:
  - Cesen de sus pecados
  - Dejen de pecar
  lexicon: Latin desinere + ab + peccata
  rationale: El latín manda abandonar la práctica del pecado. «Dejen sus pecados» mantiene el sentido de abandonar una conducta; «Dejen de pecar» explicita la idea, pero añade una formulación más interpretativa.
- source_word: obliuiscimini iniquitates uestras
  english_pob_choice: forget your iniquities
  chosen_spanish: olvídense de sus iniquidades
  alternatives_spanish:
  - olviden sus iniquidades
  - dejen atrás sus iniquidades
  lexicon: Latin oblivisci + iniquitates
  rationale: Se conserva el verbo «olvidarse» porque el texto une olvido y abandono moral. «Iniquidades» mantiene el campo de injusticia/culpa del latín, más fuerte que un simple «pecados».
- source_word: iam agere eas sempiterno
  english_pob_choice: never to practice them again
  chosen_spanish: no volver a practicarlas jamás
  alternatives_spanish:
  - para no practicarlas nunca más
  - nunca más hacerlas
  lexicon: Latin agere + sempiterno
  rationale: La revisión inglesa aclaró que la fuerza es «no volver a hacerlas» con alcance perpetuo. En español, «no volver a practicarlas jamás» preserva el valor de acción repetida/prolongada y la duración indefinida de «sempiterno».
- source_word: educabit uos et liberabit
  english_pob_choice: will lead you out and deliver you
  chosen_spanish: los sacará y los librará
  alternatives_spanish:
  - los conducirá y los librará
  - los hará salir y los librará
  lexicon: Latin educare / liberare
  rationale: «Sacar» refleja bien «educere» en este contexto de salida/liberación; «conducirá» también es posible, pero «sacará» conserva mejor la imagen de extraer de la aflicción.
theological_decisions:
- issue: Llamado a temer a Dios como juez
  english_pob_reading: God is judge; fear him.
  chosen_spanish_reading: Dios es juez; témanle.
  alternative_spanish_readings:
  - Dios es juez; teman a él.
  - Dios es el juez; témanle.
  rationale: Se mantiene la afirmación de juicio divino y el imperativo de reverencia/temor. «Témanle» conserva la relación directa del mandato con el objeto personal.
  doctrine_reference: Divine judgment / reverence
- issue: Alcance temporal de la renuncia al pecado
  english_pob_reading: never to practice them again
  chosen_spanish_reading: no volver a practicarlas jamás
  alternative_spanish_readings:
  - para no practicarlas nunca más
  - nunca más hacerlas
  rationale: La frase latina une abandono y permanencia. La opción elegida evita suavizar el alcance perpetuo, sin sonar torpe en español.
  doctrine_reference: Repentance / perseverance in turning from sin
- issue: Libración de tribulación
  english_pob_reading: deliver you from every tribulation
  chosen_spanish_reading: los librará de toda tribulación
  alternative_spanish_readings:
  - los librará de toda aflicción
  - los rescatará de toda tribulación
  rationale: «Tribulación» preserva el término bíblico común y el carácter amplio de la promesa. «Aflicción» sería válida, pero menos cercana al audit trail inglés.
  doctrine_reference: Divine deliverance
- issue: Relación entre 'pecados' e 'iniquidades'
  english_pob_reading: sins / iniquities
  chosen_spanish_reading: pecados / iniquidades
  alternative_spanish_readings:
  - pecados / maldades
  - faltas / iniquidades
  rationale: Se conserva la distinción léxica del original y del inglés POB, evitando reducir ambos términos a un solo campo semántico.
  doctrine_reference: Moral culpability / sin terminology
translation_notes:
  revision_awareness: La revisión inglesa reciente aclaró que la secuencia latina 'iam agere eas sempiterno' se entiende mejor como una prohibición de volver a practicarlas con alcance perpetuo. La redacción española sigue esa decisión y evita una calca torpe como «hacerlas ya para siempre».
  spanish_consistency_notes:
  - Se conserva «Dios» para 'deus' y «juez» para 'iudex' sin introducir terminología eclesiástica adicional.
  - «Témanle» mantiene el tono directo del imperativo singular/plural de segunda persona en un registro bíblico natural en español.
  - «Iniquidades» se conserva como término diferenciado de «pecados» para no borrar la distinción presente en la fuente.
  - No se usa «SEÑOR» porque el latín fuente dice 'deus', no un sustituto del nombre divino.
  - La puntuación sigue el tono exhortativo del texto fuente con frases cortas y paralelas.
