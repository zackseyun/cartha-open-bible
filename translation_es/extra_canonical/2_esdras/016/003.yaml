review_pass:
  verdict: revise
  source_alignment_summary: 'El latín dice literalmente: ''hay para vosotros/contra vosotros una espada; y ¿quién es el que la aparte/desvíe? Ha sido enviada''. La traducción inglesa auditada lo resuelve con mejor orden idiomático: ''A sword has been sent upon you, and who is there to turn it back?''. El borrador español conserva bien la imagen de juicio y la imposibilidad de detenerla, pero ''desvíe'' no refleja tan bien ''turn it back'', y la construcción ''quién hay que'' suena menos natural que ''quién podrá'' o ''quién hay que pueda''.'
  spanish_quality_summary: 'El borrador es comprensible y digno, pero presenta dos puntos mejorables: 1) ''desvíe'' sugiere cambiar la trayectoria más que hacerla retroceder o apartarla; 2) ''¿y quién hay que la desvíe?'' es una estructura algo forzada en español general. Una formulación más natural y fiel sería ''¿y quién podrá hacerla volver atrás?'''
  glossary_alignment: No hay términos de glosario sensibles en este versículo. 'Espada' es correcto para gladius. No hay conflicto con Yahvé, Mesías/Cristo, Espíritu, esclavo, etc.
  issues:
  - severity: medium
    issue: La expresión '¿quién hay que la desvíe?' suena poco idiomática en español.
    rationale: Aunque calca parcialmente el latín/inglés, en español general la construcción 'quién hay que...' resulta forzada. '¿Quién podrá...?' o '¿quién hay que pueda...?' comunica con más claridad y naturalidad.
  - severity: medium
    issue: '''desvíe'' no transmite con suficiente precisión la idea de ''turn it back''.'
    rationale: Auertere puede ser apartar, desviar, alejar; pero la auditoría inglesa fijó explícitamente 'turn it back'. En contexto apocalíptico, 'hacerla volver atrás' preserva mejor la idea de detener y revertir el avance del juicio.
  revised_spanish_text: Se os ha enviado una espada, ¿y quién podrá hacerla volver atrás?
  revision_rationale: Se mantiene la pasiva de juicio ('Se os ha enviado una espada') y se mejora la segunda cláusula para que el español sea más natural y refleje mejor la decisión auditada 'turn it back'. 'Hacerla volver atrás' conserva la fuerza de inevitabilidad del juicio mejor que 'desviarla'.
