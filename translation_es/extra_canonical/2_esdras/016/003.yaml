  text: Se os ha enviado una espada, ¿y quién podrá hacerla volver atrás?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: est uobis gladius
  english_pob_choice: A sword has been sent upon you
  chosen_spanish: Se os ha enviado una espada
  alternatives_spanish:
  - Una espada ha sido enviada sobre vosotros
  - Una espada os ha sido enviada
  lexicon: gladius
  rationale: La forma latina expresa una acción pasiva con sentido de juicio o ataque ya dirigido contra los destinatarios; en español, «se os ha enviado» conserva la pasividad y el impacto directo sin añadir elementos no presentes. «Espada» mantiene el valor concreto e imagético del sustantivo latino.
- source_word: uobis
  english_pob_choice: upon you
  chosen_spanish: os
  alternatives_spanish:
  - a vosotros
  - sobre vosotros
  lexicon: uobis
  rationale: El dativo latino se vierte naturalmente con pronombre átono en español. «Os» reproduce la dirección del daño/jucio de manera breve y literaria.
- source_word: quis est qui auertat illum
  english_pob_choice: and who is there to turn it back?
  chosen_spanish: ¿y quién hay que la desvíe?
  alternatives_spanish:
  - ¿y quién hay que la aparte?
  - ¿y quién hay para volverla atrás?
  lexicon: auerto
  rationale: «Auertat» puede significar apartar, desviar o volver atrás. «Desvíe» conserva la idea de apartar de su curso y mantiene el tono idiomático del español. «La» retoma «espada».
theological_decisions:
- issue: Sentido de juicio inminente expresado con imagen de espada
  english_pob_reading: A sword has been sent upon you, and who is there to turn it back?
  chosen_spanish_reading: Se os ha enviado una espada, ¿y quién hay que la desvíe?
  alternative_spanish_readings:
  - Se os ha enviado una espada, ¿y quién hay que la aparte?
  - Se os ha enviado una espada, ¿y quién puede volverla atrás?
  rationale: La línea latina presenta una amenaza/jucio ya 'enviado' contra los destinatarios y remarca su inevitabilidad. La traducción conserva esa fuerza sin suavizarla ni convertirla en una mera advertencia abstracta.
  doctrine_reference: Juicio divino e inevitabilidad del decreto de castigo en el marco apocalíptico de 2 Esdras.
translation_notes:
  revision_awareness: 'El texto fuente latino y la traducción inglesa de POB muestran pleno acuerdo semántico: una espada enviada contra los destinatarios y la imposibilidad de revertirla. No se observaron revisiones aplicadas ni variantes textuales relevantes para esta línea.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico solemne y directo.
  - Se evita «SEÑOR» u otras sustituciones teológicas no presentes en el texto fuente.
  - «Espada» se conserva literal por tratarse de una imagen de juicio común y clara en español.
