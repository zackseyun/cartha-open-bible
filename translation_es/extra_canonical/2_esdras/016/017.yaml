translation:
  language: es
  text: ¡Ay de mí, ay de mí! ¿Quién me librará en aquellos días?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Vae mihi, vae mihi!
  english_pob_choice: Woe is me, woe is me!
  chosen_spanish: ¡Ay de mí, ay de mí!
  alternatives_spanish:
  - ¡Ay de mí, ay de mí!
  - ¡Ay, ay de mí!
  lexicon: Latin vae
  rationale: El lamento exclamativo se expresa de manera natural en español con «¡Ay de mí!», que conserva la fuerza de dolor y duelo del original y del inglés auditado sin introducir un registro excesivamente arcaico.
- source_word: quis me liberabit
  english_pob_choice: Who will deliver me
  chosen_spanish: ¿Quién me librará
  alternatives_spanish:
  - ¿Quién me salvará?
  - ¿Quién me rescatará?
  lexicon: Latin liberare
  rationale: «Librará» mantiene el valor de liberación/rescate de liberabit y sigue de cerca la elección inglesa «deliver», evitando reducir el sentido a mera salvación espiritual o a una sola imagen.
- source_word: in those days
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en tal día
  lexicon: Latin dies
  rationale: «En aquellos días» reproduce el deíctico remoto del original y del inglés auditado, con un tono bíblico claro y natural en español.
theological_decisions:
- issue: El alcance de «deliver me» en un contexto de juicio futuro
  english_pob_reading: Who will deliver me in those days?
  chosen_spanish_reading: ¿Quién me librará en aquellos días?
  alternative_spanish_readings:
  - ¿Quién me salvará en aquellos días?
  - ¿Quién me rescatará en aquellos días?
  rationale: El versículo formula una angustia ante días venideros de juicio; «librará» conserva la amplitud de una liberación o rescate sin imponer una precisión doctrinal que el texto no explicita.
  doctrine_reference: Tema de liberación/jucio escatológico; sin glosa doctrinal añadida
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; por eso se mantiene una traducción breve y directa, alineada con el texto latino limpiado y con la concordancia alta del control cruzado.
  spanish_consistency_notes:
  - Se mantiene «ay de mí» como lamento bíblico idiomático y no se sustituye por una paráfrasis más interpretativa.
  - «Librará» conserva la neutralidad semántica adecuada para un texto de juicio sin forzar «salvará» o «rescatará».
  - «Aquellos días» sigue el valor temporal remoto del original y la audición inglesa, con estilo publicable en español bíblico.
