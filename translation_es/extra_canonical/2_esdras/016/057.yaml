translation:
  language: es
  text: Por su palabra fueron establecidas las estrellas, y conoce el número de las estrellas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: sunt
  english_pob_choice: By his word the stars were established
  chosen_spanish: fueron establecidos
  alternatives_spanish:
  - quedaron establecidos
  - fueron firmados
  lexicon: establecer
  rationale: El latín pasivo expresa que los astros llegaron a quedar fijados/establecidos; «fueron establecidos» conserva la pasiva y la idea de fijación con registro bíblico claro en español.
- source_word: et novit numerum stellarum
  english_pob_choice: and he knows the number of the stars
  chosen_spanish: y conoce el número de las estrellas
  alternatives_spanish:
  - y sabe el número de las estrellas
  - y conoce cuántas estrellas hay
  lexicon: conocer
  rationale: «Novit» indica conocimiento real y completo; «conoce» mantiene esa fuerza con estilo sobrio. «Número de las estrellas» reproduce la construcción concreta del latín sin amplificarla innecesariamente.
- source_word: verbum eius
  english_pob_choice: By his word
  chosen_spanish: Por su palabra
  alternatives_spanish:
  - Con su palabra
  - Mediante su palabra
  lexicon: palabra
  rationale: «Por su palabra» comunica causa/instrumento de manera natural en español y conserva el sentido creador del original latino.
theological_decisions:
- issue: La acción creadora de Dios por su palabra
  english_pob_reading: By his word the stars were established
  chosen_spanish_reading: Por su palabra fueron establecidos los astros
  alternative_spanish_readings:
  - Con su palabra fueron establecidos los astros
  - Mediante su palabra fueron establecidos los astros
  rationale: 'La redacción mantiene la agencia divina explícita: la palabra de Dios es el medio eficaz por el cual los astros quedan establecidos. No se atenúa ni se parafrasea esa relación causal.'
  doctrine_reference: Creación por la palabra divina (cf. Génesis 1; Salmo 33:6)
