- from: Así, en aquellos días, quedarán tres o cuatro de los que [a] registran sus casas con la espada.
  to: Así, en aquellos días, quedarán tres o cuatro después de que registren[a] sus casas con la espada.
  rationale: Se ajusta la sintaxis para eliminar la lectura equívoca de que los sobrevivientes son parte del grupo invasor. «Después de que registren sus casas con la espada» conserva la secuencia de devastación implícita en el latín y mantiene la fuerza léxica de scrutari.
