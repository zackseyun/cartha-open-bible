review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del latín: en esos días solo quedará un pequeño número, y la frase final conserva el valor instrumental de in romphea como «con la espada». Sin embargo, «de los que registran sus casas» en español sugiere más naturalmente que los sobrevivientes pertenecen al grupo de los que registran, mientras que el latín ab scrutantibus domos eorum expresa mejor que quedan pocos a causa de, o tras, los que registran las casas de ellos. Conviene reformular para evitar esa ambigüedad sintáctica.'
  spanish_quality_summary: El español es claro y digno, pero la construcción actual suena algo forzada y semánticamente ambigua. Una leve reparación mejora la legibilidad y refleja mejor la relación entre los sobrevivientes y los invasores. La puntuación es correcta.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Quedarán» y «con la espada» son buenas elecciones. «Registrar» es defendible para scrutantibus, pero debe ubicarse en una construcción más clara en español.
  issues:
  - severity: medium
    issue: Ambigüedad en «quedarán tres o cuatro de los que registran sus casas»
    rationale: La preposición «de» hace pensar que los tres o cuatro pertenecen al grupo de los que registran las casas, en vez de ser los pocos que quedan después de esa acción violenta. El latín con ab scrutantibus se refleja mejor con una construcción causal/separativa como «después de que» o «tras».
  revised_spanish_text: Así, en aquellos días, quedarán tres o cuatro después de que registren[a] sus casas con la espada.
  revised_footnotes:
  - marker: a
    text: «Registren» traduce scrutari con un matiz de examen invasivo; también podría expresarse como «busquen», pero esa opción suaviza la fuerza del latín.
    reason: lexical_alternative
  revision_rationale: Se ajusta la sintaxis para eliminar la lectura equívoca de que los sobrevivientes son parte del grupo invasor. «Después de que registren sus casas con la espada» conserva la secuencia de devastación implícita en el latín y mantiene la fuerza léxica de scrutari.
