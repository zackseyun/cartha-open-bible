base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/016/032.yaml
  text: So in those days, three or four will remain from those who search their houses with the sword.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:29:51Z'
    unchanged: false
    changes_summary: 'Adjusted wording for more natural English and closer alignment with the Latin: changed ''will be left by'' to ''will remain from,'' added a comma after the introductory phrase, and retained ''with the sword'' for in romphea.'
translation:
  language: es
  text: Así, en aquellos días, quedarán tres o cuatro después de que registren[a] sus casas con la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Registren» traduce scrutari con un matiz de examen invasivo; también podría expresarse como «busquen», pero esa opción suaviza la fuerza del latín.
    reason: lexical_alternative
lexical_decisions:
- source_word: sic remanebunt
  english_pob_choice: will remain
  chosen_spanish: quedarán
  alternatives_spanish:
  - permanecerán
  - quedarán con vida
  lexicon: remanere
  rationale: El latín remanebunt expresa que solo subsistirá un pequeño resto. «Quedarán» comunica con naturalidad ese resto sobreviviente sin añadir la idea de selección activa que tendría una paráfrasis más amplia.
- source_word: diebus illis
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquellos tiempos
  lexicon: dies
  rationale: La fórmula temporal se conserva de manera directa y solemne, como corresponde al registro profético.
- source_word: tres vel quattuor
  english_pob_choice: three or four
  chosen_spanish: tres o cuatro
  alternatives_spanish:
  - tres o quizás cuatro
  - tres o cuatro personas
  lexicon: numeralia
  rationale: Se mantiene la incertidumbre numérica exacta del latín, sin precisar más de lo que el texto dice.
- source_word: ab scrutantibus domos eorum
  english_pob_choice: from those who search their houses
  chosen_spanish: de los que registran sus casas
  alternatives_spanish:
  - de los que buscan sus casas
  - de los que inspeccionan sus casas
  lexicon: scrutari
  rationale: scrutari implica registrar, examinar o husmear con búsqueda invasiva. «Registrar» en español conserva mejor esa fuerza que «buscar», y evita suavizar la acción.
- source_word: in romphea
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - a espada
  lexicon: romphea
  rationale: Aunque el inglés adoptó «with the sword» siguiendo la función instrumental del latín, en español la forma más natural y fiel es «con la espada», que mantiene el valor instrumental sin endurecer innecesariamente la sintaxis.
theological_decisions:
- issue: Sobrevivencia mínima de un resto en juicio
  english_pob_reading: three or four will remain
  chosen_spanish_reading: quedarán tres o cuatro
  alternative_spanish_readings:
  - sobrevivirán tres o cuatro
  - restarán tres o cuatro
  rationale: 'El versículo describe el resultado devastador de un juicio: apenas un pequeño resto subsiste. «Quedarán» conserva esa tensión sin convertirla en una explicación teológica más desarrollada que el texto mismo.'
  doctrine_reference: juicio y remanente
- issue: Violencia instrumental en el ataque a las casas
  english_pob_reading: those who search their houses with the sword
  chosen_spanish_reading: los que registran sus casas con la espada
  alternative_spanish_readings:
  - los que inspeccionan sus casas con la espada
  - los que buscan sus casas con la espada
  rationale: La frase no habla de una búsqueda inocente, sino de una acción de saqueo o represión acompañada por violencia. «Con la espada» preserva el carácter de instrumento de coerción sin sustituirlo por una interpretación más elaborada.
  doctrine_reference: violencia del juicio / invasión
translation_notes:
  revision_awareness: La redacción sigue de cerca el latín limpio proporcionado y coincide con la revisión inglesa más reciente, que prefirió «will remain» y conservó «with the sword». No se añadieron notas textuales porque el paquete fuente presenta alta concordancia y no incluye variantes adicionales relevantes para este versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiere; aquí no aparece el nombre divino.
  - Se usa «espada» en sentido instrumental, no como título ni metáfora adicional.
  - Se conserva el tono profético sobrio y la cuantificación indefinida del original.
