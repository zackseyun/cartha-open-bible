translation:
  language: es
  text: El que colgó la tierra sobre el agua por su palabra[a], y extendió el cielo como una bóveda;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El que cerró el mar en medio de las aguas, y por su palabra colgó la tierra sobre las aguas».'
    reason: alternative_reading
lexical_decisions:
- source_word: super aquam
  english_pob_choice: upon the water
  chosen_spanish: sobre el agua
  alternatives_spanish:
  - sobre las aguas
  - encima del agua
  lexicon: super + aqua
  rationale: El latín está en singular, así que mantengo «el agua» en singular. «Sobre» conserva bien la relación espacial sin añadir pluralización interpretativa.
- source_word: uerbo suo
  english_pob_choice: by his word
  chosen_spanish: por su palabra
  alternatives_spanish:
  - mediante su palabra
  - con su palabra
  lexicon: verbum
  rationale: «Por su palabra» refleja el instrumento causal del latín y es natural en español bíblico contemporáneo. «Mediante» es posible, pero suena más técnico.
- source_word: extendit caelum quasi cameram
  english_pob_choice: stretched out the heaven like a vault
  chosen_spanish: extendió el cielo como una bóveda
  alternatives_spanish:
  - extendió el cielo como una cámara
  - extendió el cielo como una cúpula
  lexicon: caelum; camera
  rationale: La comparación latina «quasi cameram» apunta a una estructura abovedada; en español «bóveda» transmite esa imagen con claridad y dignidad. Evito «cámara» porque hoy puede sonar opaco o falsear el sentido.
- source_word: Qui
  english_pob_choice: He who
  chosen_spanish: El que
  alternatives_spanish:
  - Aquel que
  - Quien
  lexicon: relative pronoun in hymnic syntax
  rationale: Conserva el valor relativo y la cadencia doxológica del original sin convertirlo en una cláusula independiente.
theological_decisions:
- issue: Referencia implícita al Creador en una cadena de cláusulas relativas
  english_pob_reading: He who hung the earth upon the water by his word, and stretched out the heaven like a vault;
  chosen_spanish_reading: El que colgó la tierra sobre el agua por su palabra, y extendió el cielo como una bóveda;
  alternative_spanish_readings:
  - Él colgó la tierra sobre el agua por su palabra, y extendió el cielo como una bóveda;
  - El que suspendió la tierra sobre el agua por su palabra, y extendió el cielo como una bóveda;
  rationale: Mantengo la cláusula relativa porque el contexto litúrgico del pasaje funciona como alabanza continua. «Colgó» preserva la imagen verbal del latín sin suavizarla excesivamente; «suspendió» sería válido, pero menos directo.
  doctrine_reference: Doxología creadora; lenguaje poético sobre la obra de Dios en la creación
- issue: Relación entre tierra y agua en singular
  english_pob_reading: the earth upon the water
  chosen_spanish_reading: la tierra sobre el agua
  alternative_spanish_readings:
  - la tierra sobre las aguas
  - la tierra encima del agua
  rationale: El singular del latín se conserva para no introducir una generalización no atestiguada por el texto base. Esto también evita fundir el verso con la variante explicativa de la nota inglesa.
  doctrine_reference: Fidelidad al número gramatical del texto fuente
translation_notes:
  revision_awareness: La revisión inglesa corrigió una mala alineación previa que introducía una cláusula sobre el mar no sostenida por el latín de este verso. También completó el fragmento con «extendió el cielo como una bóveda». La versión española sigue esa lectura revisada y conserva el singular de «aquam»/«agua».
  spanish_consistency_notes:
  - Uso «Yahvé» solo cuando aparezca el nombre divino explícito; aquí el verso presenta una perífrasis relativa del Creador, así que no lo inserto.
  - Mantengo un registro poético y bíblico, pero con español actual y no arcaizante.
  - No empleo «SEÑOR» porque no hay aquí una sustitución del nombre divino en el texto fuente.
