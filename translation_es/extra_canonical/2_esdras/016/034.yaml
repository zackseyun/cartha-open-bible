translation:
  language: es
  text: Llorarán las vírgenes, al no tener prometidos; llorarán las mujeres, al no tener maridos; llorarán sus hijas, al no tener ayuda.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: virgines
  english_pob_choice: Virgins
  chosen_spanish: las vírgenes
  alternatives_spanish:
  - las doncellas
  - las jóvenes vírgenes
  lexicon: virgo, virginis
  rationale: Conservo el valor básico de mujeres no casadas y sexualmente vírgenes; en español bíblico 'vírgenes' es claro y directo, y mantiene el paralelismo del latín con 'mulieres' y 'filiae'. Las alternativas añaden matiz de edad o estilo, pero no son necesarias aquí.
- source_word: sponsos
  english_pob_choice: bridegrooms
  chosen_spanish: novios
  alternatives_spanish:
  - esposos
  - prometidos
  lexicon: sponsus, -i
  rationale: El latín indica el hombre comprometido o esposo esperado; en español moderno 'novios' comunica mejor la relación de compromiso matrimonial que 'esposos', que podría sonar ya consumado. 'Prometidos' también es posible, pero es menos idiomático en esta triple lamentación.
- source_word: mulieres
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  lexicon: mulier, mulieris
  rationale: Mantengo el sustantivo genérico 'mujeres' porque el latín no especifica aquí condición conyugal; el paralelo con la primera y la tercera cola exige conservar el contraste de grupos.
- source_word: viros
  english_pob_choice: husbands
  chosen_spanish: maridos
  alternatives_spanish:
  - esposos
  lexicon: vir, viri
  rationale: En este contexto 'viros' funciona como 'husbands'; 'maridos' es la forma española más natural y tradicionalmente clara para la relación conyugal. 'Esposos' es viable, pero menos marcado en contraste con 'novios'.
- source_word: filiae earum
  english_pob_choice: their daughters
  chosen_spanish: sus hijas
  alternatives_spanish:
  - las hijas de ellas
  lexicon: filia, filiae
  rationale: Traducción literal y natural del posesivo; 'sus hijas' preserva el vínculo familiar sin recargar la sintaxis.
- source_word: adiutorium
  english_pob_choice: help
  chosen_spanish: ayuda
  alternatives_spanish:
  - auxilio
  - apoyo
  lexicon: adiutorium
  rationale: El sustantivo latino es amplio y no obliga a una especificación más fuerte. 'Ayuda' reproduce el sentido general con el menor grado de interpretación; 'auxilio' intensifica el tono, y 'apoyo' desplaza el matiz hacia sostén relacional.
theological_decisions:
- issue: Lamento triple por carencia matrimonial y de sostén
  english_pob_reading: Virgins will mourn... women will mourn... their daughters will mourn...
  chosen_spanish_reading: Llorarán... llorarán... llorarán...
  alternative_spanish_readings:
  - Se lamentarán...
  - Gemirán...
  rationale: El latín usa 'lugebunt', que expresa duelo o luto. 'Llorarán' conserva el paralelismo directo y la intensidad visible del lamento sin añadir interpretación. 'Lamentarán' o 'gemirán' son posibles, pero desplazan el registro o la imagen.
  doctrine_reference: None
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; por eso la redacción española sigue de cerca el latín limpio y el acuerdo alto del control cruzado.
  spanish_consistency_notes:
  - 'He mantenido el paralelismo ternario del original: vírgenes / mujeres / hijas.'
  - '''Ayuda'' se conserva por amplitud semántica, sin forzar una lectura doctrinal o social específica.'
  - Se evita 'SEÑOR' u otra terminología no presente, pues el texto no contiene el nombre divino ni un título cristológico.
