translation:
  language: es
  text: No teman ni vacilen, porque Dios es su guía.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ne timeatis
  english_pob_choice: Do not fear
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No temáis
  lexicon: timeo
  rationale: El latín expresa una prohibición directa de temer; «No teman» conserva el imperativo plural y suena natural en español bíblico moderno.
- source_word: nec haesitemini
  english_pob_choice: hesitate
  chosen_spanish: ni vacilen
  alternatives_spanish:
  - ni duden
  - ni titubeen
  lexicon: haesito
  rationale: La revisión inglesa corrigió «doubt» a «hesitate» para reflejar mejor haesitemini; «vacilen» transmite la idea de indecisión o titubeo sin introducir un matiz de incredulidad no requerido por el latín.
- source_word: quoniam Deus dux vester est
  english_pob_choice: for God is your guide
  chosen_spanish: porque Dios es su guía
  alternatives_spanish:
  - pues Dios es su guía
  - porque Dios los guía
  lexicon: dux
  rationale: «dux» se rinde con «guía» para conservar la imagen de conducción y dirección; se evita expandir a «los guía» porque el texto afirma una identidad/función, no solo una acción.
theological_decisions:
- issue: Imagen de Dios como guía y no como título eclesial tradicional
  english_pob_reading: God is your guide.
  chosen_spanish_reading: Dios es su guía.
  alternative_spanish_readings:
  - Dios los guía
  - Dios es su conductor
  rationale: Se preserva la metáfora de dirección personal y comunitaria sin sustituirla por un término eclesiástico menos preciso como «pastor» o «señor».
  doctrine_reference: Providencia y dirección divina
translation_notes:
  revision_awareness: La versión inglesa vigente cambió «doubt» por «hesitate» para ajustarse mejor al latín haesitemini; la presente redacción refleja esa decisión con «vacilen» y no con un término de duda intelectual.
  spanish_consistency_notes:
  - 'Se mantiene el plural de exhortación: «No teman ni vacilen».'
  - «Dios» se conserva sin sustitución por «el Señor», siguiendo el texto fuente latino.
  - «guía» reproduce la metáfora de dux de forma clara y sobria.
