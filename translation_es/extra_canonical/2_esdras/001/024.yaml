translation:
  language: es
  text: ¿Qué haré contigo, Jacob? No quisiste obedecerme, Judá. Me dirigiré a otras naciones, y les daré mi nombre, para que guarden mis estatutos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Quid tibi faciam
  english_pob_choice: What shall I do to you
  chosen_spanish: ¿Qué haré contigo?
  alternatives_spanish:
  - ¿Qué te haré?
  - ¿Qué haré de ti?
  lexicon: Latin tibi / facere
  rationale: El latín expresa destino o trato dirigido a la persona; en español, «¿Qué haré contigo?» conserva ese valor interrogativo y la cercanía natural del giro, sin añadir matiz punitivo que el contexto no exige directamente.
- source_word: noluisti me obaudire
  english_pob_choice: You would not obey me
  chosen_spanish: No quisiste obedecerme
  alternatives_spanish:
  - No me quisiste obedecer
  - No quisiste oírme
  lexicon: Latin noluisti + obaudire
  rationale: «Obaudire» es obedecer/escuchar con obediencia; «No quisiste obedecerme» reproduce con claridad la negativa de voluntad y mantiene la fuerza relacional del original.
- source_word: transferam me ad alias gentes
  english_pob_choice: I will turn to other nations
  chosen_spanish: Me volveré a otras naciones
  alternatives_spanish:
  - Me apartaré hacia otras naciones
  - Me dirigiré a otras naciones
  lexicon: Latin transferam me ad
  rationale: El POB inglés interpreta el movimiento como un volverse/dirigirse. En español, «me volveré a otras naciones» comunica ese cambio de orientación de manera idiomática y fiel, sin forzar una imagen más abstracta.
- source_word: dabo eis nomen meum
  english_pob_choice: I will give them my name
  chosen_spanish: les daré mi nombre
  alternatives_spanish:
  - les entregaré mi nombre
  - les pondré mi nombre
  lexicon: Latin nomen meum
  rationale: Se conserva literalmente el don del nombre. «Les daré mi nombre» es la forma más transparente y sobria en español, manteniendo la fuerza de pertenencia y alianza implícita en el texto.
- source_word: ut custodiant legitima mea
  english_pob_choice: that they may keep my statutes
  chosen_spanish: para que guarden mis estatutos
  alternatives_spanish:
  - para que observen mis estatutos
  - para que mantengan mis preceptos
  lexicon: Latin legitima mea
  rationale: «Legitima» en este contexto son mandatos/estatutos legales y pactuales. «Guarden mis estatutos» conserva ese campo semántico bíblico-jurídico en español y sigue de cerca la elección del POB.
theological_decisions:
- issue: Cambio de destinatario del favor divino hacia otras naciones
  english_pob_reading: I will turn to other nations, and I will give them my name
  chosen_spanish_reading: Me volveré a otras naciones, y les daré mi nombre
  alternative_spanish_readings:
  - Me dirigiré a otras naciones, y les daré mi nombre
  - Me apartaré hacia otras naciones, y les daré mi nombre
  rationale: 'La frase conserva la tensión teológica del texto: Yahvé no abandona la santidad de sus estatutos, pero desplaza su acción a otras naciones en respuesta a la desobediencia de Jacob y Judá. No se suaviza el contraste.'
  doctrine_reference: Teología bíblica de elección, juicio y extensión del pueblo de Dios
translation_notes:
  revision_awareness: La redacción sigue el ajuste de la revisión inglesa desde «with you» a «to you» mediante «contigo», que refleja mejor el latín tibi faciam. No hay otros cambios textuales relevantes en la capa de auditoría inglesa.
  spanish_consistency_notes:
  - Se mantiene el trato directo singular en «Jacob» y «Judá» como en el original.
  - «Estatutos» conserva el registro legal-covenantal del latín legitima mea.
  - No se introduce «SEÑOR»; el pasaje latino no contiene el nombre divino explícito, aunque el sujeto implícito es Dios en el contexto.
