base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/001/021.yaml
  text: I covered you with the leaves of trees[1:21]. I divided fertile lands for you; I drove out the Canaanites and Perizzites and Philistines from before you. What shall I do for you? says the Lord.
  footnotes:
  - marker: '1:21'
    text: The Latin says, 'I divided fertile lands for you,' a compressed expression that may refer to apportioning the land among Israel's tribes.
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:25Z'
    unchanged: false
    changes_summary: Restored the omitted opening clause 'I covered you with the leaves of trees,' translated folia arborum vos texi. Simplified 'What more shall I do for you?' to 'What shall I do for you?' to match quid faciam more closely. Kept the rest substantially unchanged.
translation:
  language: es
  text: Los cubrí con hojas de árboles. Repartí para ustedes tierras fértiles[a]; expulsé de delante de ustedes a los cananeos, a los perizitas y a los filisteos. ¿Qué he de hacer por ustedes? dice el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El latín dice «repartí para ustedes tierras fértiles», una expresión condensada que puede referirse a la distribución de la tierra entre las tribus de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: folia arborum uos texi
  english_pob_choice: I covered you with the leaves of trees
  chosen_spanish: Te cubrí con hojas de árboles
  alternatives_spanish:
  - Los cubrí con las hojas de los árboles
  - Les cubrí con hojas de árboles
  lexicon: folia / texi
  rationale: El latín expresa cobertura física con hojas de árboles; en español, «cubrí con hojas de árboles» conserva la imagen sin añadir elementos ajenos. Se usa «te» como forma directa y natural del discurso divino en singular colectivo, sin forzar una paráfrasis.
- source_word: Diuisi uobis terras pingues
  english_pob_choice: I divided fertile lands for you
  chosen_spanish: Repartí para ustedes tierras fértiles
  alternatives_spanish:
  - Dividí para ustedes tierras fértiles
  - Les repartí tierras fértiles
  lexicon: diuisi / terras pingues
  rationale: «Diuisi» admite la idea de repartir o distribuir; «repartí» comunica mejor en español la asignación de porciones de tierra. «Tierras fértiles» refleja bien «terras pingues» y evita una literalidad extraña como «tierras gordas».
- source_word: Chananeos et Ferezeos et Philistinos
  english_pob_choice: the Canaanites and Perizzites and Philistines
  chosen_spanish: a los cananeos, a los perizitas y a los filisteos
  alternatives_spanish:
  - a los cananeos, a los ferezeos y a los filisteos
  - a los cananeos, perizitas y filisteos
  lexicon: Chananeos / Ferezeos / Philistinos
  rationale: Se preservan los etnónimos históricos con la forma española más reconocible y auditable. «Perizitas» sigue la equivalencia habitual para Ferezeos/Perizzites en español bíblico, y «cananeos»/«filisteos» mantienen el sentido tradicional y preciso.
- source_word: quid faciam
  english_pob_choice: What shall I do for you?
  chosen_spanish: ¿Qué he de hacer por ustedes?
  alternatives_spanish:
  - ¿Qué haré por ustedes?
  - ¿Qué debo hacer por ustedes?
  lexicon: quid faciam
  rationale: El latín interrogativo expresa una pregunta abierta sobre la acción apropiada; «¿Qué he de hacer por ustedes?» conserva el matiz de deliberación y la formulación solemne del original sin añadir «más», que no está en el texto latino restaurado.
- source_word: dixit Dominus
  english_pob_choice: says the Lord
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - dice el Señor
  - dice el Señor Yahvé
  lexicon: Dominus / divine name
  rationale: Dado que el proyecto español usa «Yahvé» como representación principal del nombre divino, se mantiene esa convención en la fórmula final. Aunque el latín dice «Dominus», aquí funciona como habla divina y la decisión sigue la pauta del proyecto, con equivalencia funcional al cierre profético.
theological_decisions:
- issue: Cobertura con hojas y recuerdo de provisión inicial
  english_pob_reading: I covered you with the leaves of trees
  chosen_spanish_reading: Te cubrí con hojas de árboles
  alternative_spanish_readings:
  - Los cubrí con hojas de árboles
  - Los cubrí con las hojas de los árboles
  rationale: 'La cláusula debe conservar su imagen concreta: Dios cubre/protege al pueblo con hojas. No se espiritualiza ni se explica más allá de lo que el texto da; se mantiene la sencillez del acto de provisión inicial.'
  doctrine_reference: Providencia divina y memoria del cuidado de Yahvé sobre Israel
- issue: Reparto de la tierra fértil como don divino
  english_pob_reading: I divided fertile lands for you
  chosen_spanish_reading: Repartí para ustedes tierras fértiles
  alternative_spanish_readings:
  - Dividí para ustedes tierras fértiles
  - Les repartí tierras fértiles
  rationale: La frase conserva el acto soberano de asignación territorial. «Tierras fértiles» mantiene la valoración positiva del don, y «repartí» sugiere distribución hereditaria sin convertir el texto en explicación histórica.
  doctrine_reference: Donación de la tierra y cumplimiento de la promesa
- issue: Expulsión de pueblos para delante del pueblo elegido
  english_pob_reading: I drove out the Canaanites and Perizzites and Philistines from before you
  chosen_spanish_reading: expulsé de delante de ustedes a los cananeos, a los perizitas y a los filisteos
  alternative_spanish_readings:
  - eché de delante de ustedes a los cananeos, a los perizitas y a los filisteos
  - expulsé de su presencia a los cananeos, a los perizitas y a los filisteos
  rationale: Se preserva la fuerza de exclusión territorial del verbo latino y la preposición de posición. «De delante de ustedes» reproduce bien el «from before you» sin suavizar la acción.
  doctrine_reference: Juicio histórico y establecimiento de Israel en la tierra
translation_notes:
  revision_awareness: La redacción sigue la última revisión del texto inglés, que restituyó la cláusula inicial sobre las hojas de árboles y simplificó la pregunta final a «What shall I do for you?». También se incorporó la fórmula de cierre con Yahvé para alinearla con la convención española del proyecto y con el habla divina del pasaje.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como traducción del nombre divino según la convención del proyecto.
  - Se evitó «Señor» como máscara en el texto principal, salvo que el cierre pudiera interpretarse como fórmula profética; aun así se preservó la convención interna de «Yahvé».
  - «Perizitas» se eligió por coherencia con el léxico bíblico en español y para evitar una transliteración menos reconocible.
  - No se añadió «más» a la pregunta final, porque el latín restaurado dice simplemente «quid faciam».
