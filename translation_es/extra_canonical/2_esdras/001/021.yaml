revisions:
- from: Te cubrí con hojas de árboles[a]. Repartí para ustedes tierras fértiles; expulsé de delante de ustedes a los cananeos, a los perizitas y a los filisteos. ¿Qué he de hacer por ustedes?, dice Yahvé.
  to: Los cubrí con hojas de árboles. Repartí para ustedes tierras fértiles[a]; expulsé de delante de ustedes a los cananeos, a los perizitas y a los filisteos. ¿Qué he de hacer por ustedes? dice el Señor.
  rationale: Se uniformó la segunda persona plural para reflejar el latín «uos / uobis / uestra». Se eliminó la coma incorrecta antes de la fórmula final. Se reemplazó «Yahvé» por «el Señor» porque el testigo fuente disponible dice «Dominus» y no hay base suficiente aquí para imponer el nombre divino. Se trasladó la única nota útil al segmento «tierras fértiles», en línea con la nota del POB inglés sobre la expresión condensada.
