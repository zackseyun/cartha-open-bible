base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/001/017.yaml
  text: Until now you have kept murmuring. Where are the benefits that I bestowed on you? Did you not cry out in the wilderness when you were hungry and thirsty,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:40:53Z'
    unchanged: false
    changes_summary: Added the omitted opening clause ('Until now you have kept murmuring') for completeness; revised 'gave' to 'bestowed' to better reflect praestiti; removed 'to me' since it is not in the Latin.
translation:
  language: es
  text: Hasta ahora han estado murmurando. ¿Dónde están los beneficios que les otorgué? ¿No clamaron en el desierto cuando tenían hambre y sed,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: nunc usque
  english_pob_choice: Until now
  chosen_spanish: Hasta ahora
  alternatives_spanish:
  - Hasta este momento
  - Hasta hoy
  lexicon: n/a
  rationale: Expresa la idea temporal de continuidad hasta el presente con naturalidad en español y sin añadir énfasis no requerido.
- source_word: murmuratis
  english_pob_choice: you have kept murmuring
  chosen_spanish: habéis estado murmurando
  alternatives_spanish:
  - habéis murmurado
  - seguís murmurando
  lexicon: n/a
  rationale: Conserva el matiz durativo de la queja continua; «murmurar» reproduce bien el reproche del original sin suavizarlo.
- source_word: beneficia
  english_pob_choice: benefits
  chosen_spanish: los beneficios
  alternatives_spanish:
  - los favores
  - los bienes
  lexicon: n/a
  rationale: «Beneficios» sigue de cerca el latín beneficia y mantiene el sentido de actos favorables concedidos por Dios.
- source_word: praestiti uobis
  english_pob_choice: I bestowed on you
  chosen_spanish: os concedí
  alternatives_spanish:
  - os otorgué
  - os dispensé
  lexicon: n/a
  rationale: «Concedí» comunica la acción generosa de dar o otorgar; «bestowed» fue la elección inglesa revisada para reflejar el valor de praestiti, y el español debe preservar esa noción de concesión benévola.
- source_word: nonne... proclamastis
  english_pob_choice: Did you not cry out
  chosen_spanish: ¿No clamasteis?
  alternatives_spanish:
  - ¿No gritasteis?
  - ¿No alzasteis el clamor?
  lexicon: n/a
  rationale: «Clamar» es más solemne y bíblico que «gritar», y corresponde al sentido de invocación/apelación en el desierto.
- source_word: in deserto
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en la región desértica
  - en el yermo
  lexicon: n/a
  rationale: La imagen geográfica y teológica del éxodo se conserva mejor con «desierto», término claro y tradicional en español bíblico.
- source_word: cum esuriretis et sitiretis
  english_pob_choice: when you were hungry and thirsty
  chosen_spanish: cuando teníais hambre y sed
  alternatives_spanish:
  - cuando estabais hambrientos y sedientos
  - cuando pasabais hambre y sed
  lexicon: n/a
  rationale: La construcción con sustantivos es idiomática en español y mantiene el paralelismo del latín sin sobreexplicar.
theological_decisions:
- issue: Reproche divino por la murmuración continua
  english_pob_reading: Until now you have kept murmuring.
  chosen_spanish_reading: Hasta ahora habéis estado murmurando.
  alternative_spanish_readings:
  - Hasta ahora seguís murmurando.
  - Hasta ahora habéis murmurado.
  rationale: La formulación conserva el reproche y el aspecto continuo del acto de quejarse, importante para el tono de admonición del pasaje.
  doctrine_reference: N/A
- issue: Ausencia explícita de objeto personal en «clamasteis»
  english_pob_reading: Did you not cry out in the wilderness when you were hungry and thirsty,
  chosen_spanish_reading: ¿No clamasteis en el desierto cuando teníais hambre y sed?
  alternative_spanish_readings:
  - ¿No clamasteis a mí en el desierto cuando teníais hambre y sed?
  rationale: El texto latino no incluye un complemento equivalente a «a mí»; se evita introducirlo para mantener la correspondencia auditada con la fuente.
  doctrine_reference: Textual fidelity / source control
translation_notes:
  revision_awareness: 'This Spanish draft follows the latest revision pass in the English audit trail: it includes the opening clause ''Until now you have kept murmuring,'' renders praestiti with a stronger bestowal/concession nuance than simple ''gave,'' and does not add ''to me,'' since the Latin source lacks it. No additional textual variants were indicated in the source packet.'
  spanish_consistency_notes:
  - Use «Yahvé» elsewhere in the project for the divine name, but this verse does not contain יהוה/YHWH.
  - Maintain the durable distinction between «murmurar» (complaining/reproaching) and «clamar» (cry out/invoke) here.
  - Avoid introducing an indirect object like «a mí» unless supported by the source text.
