revisions:
- from: Hasta ahora habéis estado murmurando. ¿Dónde están los beneficios que os concedí? ¿No clamasteis en el desierto cuando teníais hambre y sed?
  to: Hasta ahora han estado murmurando. ¿Dónde están los beneficios que les otorgué? ¿No clamaron en el desierto cuando tenían hambre y sed,
  rationale: Se corrige la puntuación final para reflejar que el versículo queda abierto hacia la continuación inmediata, conforme a la fuente latina y al texto inglés auditado. Además, se ajustan las formas verbales y pronominales a un español más neutral latinoamericano y se cambia «concedí» por «otorgué» para expresar con un poco más de fuerza el matiz de praestiti.
