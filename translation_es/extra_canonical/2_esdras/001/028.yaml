review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del latín: fórmula introductoria solemne, pregunta retórica, fuerza de ruego en rogaui, y las tres comparaciones parentales. Sin embargo, ''les he suplicado'' con complemento directo humano suena menos natural en español bíblico general que ''les he rogado'' o ''he rogado a ustedes''; además, la nota alternativa queda demasiado cercana al texto principal y no refleja bien la diferencia de matiz entre ruego intenso y simple alternativa histórica.'
  spanish_quality_summary: La redacción es clara y digna, pero '¿No les he suplicado?' resulta algo forzada por régimen verbal; 'rogar' encaja mejor con la construcción comparativa y mantiene buen registro. El resto del verso fluye bien. 'Nodriza' es adecuado y formal. La puntuación y la sintaxis son naturales.
  glossary_alignment: Correcto en no introducir 'Yahvé' porque el latín dice dominus omnipotens, no el nombre divino. 'Señor Todopoderoso' está bien. No hay conflictos con otras directrices terminológicas del proyecto.
  issues:
  - severity: medium
    issue: Régimen verbal poco natural en '¿No les he suplicado?'
    rationale: Aunque 'suplicar' puede intensificar rogaui, en español es más natural 'suplicarles que...' o 'suplicar a alguien por algo'. Sin complemento de contenido, 'rogar' transmite mejor el ruego directo y conserva dignidad bíblica.
  - severity: low
    issue: La nota alternativa no distingue bien matiz y tradición de redacción
    rationale: Si el texto principal pasa a 'rogado', la nota debe preservar la opción más intensa ('suplicado') o explicar la alternativa previa; la forma actual solo repite una opción muy cercana sin aportar claridad.
  revised_spanish_text: 'Así dice el Señor Todopoderoso: ¿No les he rogado[a], como un padre a sus hijos, y como una madre a sus hijas, y como una nodriza a sus pequeños,'
  revised_footnotes:
  - marker: a
    text: 'O: “¿No les he suplicado, como un padre a sus hijos?”'
    reason: alternative_rendering_preserving_entreaty_intensity
  revision_rationale: Se ajusta el verbo principal a 'rogado' para un español más natural con destinatario personal plural, sin perder el sentido de entreaty de rogaui. Se conserva 'suplicado' en nota como alternativa más intensa y cercana a la revisión inglesa previa. El resto del texto ya representa fielmente el latín y mantiene buen registro litúrgico.
