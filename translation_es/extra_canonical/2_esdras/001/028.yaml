base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/001/028.yaml
  text: 'Thus says the Lord Almighty: Have I not entreated you[a], as a father his sons, and as a mother her daughters, and a nurse her little children,'
  footnotes:
  - marker: a
    text: Or 'Have I not asked you, as a father asks his sons'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:40:56Z'
    unchanged: false
    changes_summary: Replaced 'pleaded with you' with 'entreated you' for a more formal and accurate register; removed repeated 'pleads with' and 'her' before 'daughters' to stay closer to the Latin's concise comparisons while preserving natural English.
translation:
  language: es
  text: 'Así dice el Señor Todopoderoso: ¿No les he rogado[a], como un padre a sus hijos, y como una madre a sus hijas, y como una nodriza a sus pequeños,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “¿No les he suplicado, como un padre a sus hijos?”'
    reason: alternative_rendering_preserving_entreaty_intensity
lexical_decisions:
- source_word: dominus omnipotens
  english_pob_choice: the Lord Almighty
  chosen_spanish: el Señor Todopoderoso
  alternatives_spanish:
  - el Señor Omnipotente
  - Yahvé Todopoderoso
  lexicon: dominus -> Señor; omnipotens -> Todopoderoso
  rationale: La fórmula latina fija un título solemne para Dios. En español, 'Señor Todopoderoso' mantiene la dignidad y la cadencia litúrgica sin introducir una paráfrasis innecesaria. No se usa 'Yahvé' porque el texto fuente aquí no contiene el nombre divino, sino un título.
- source_word: rogaui
  english_pob_choice: Have I not entreated you
  chosen_spanish: ¿No les he suplicado
  alternatives_spanish:
  - ¿No les he rogado
  - ¿No les he implorado
  lexicon: rogo -> suplicar / rogar / implorar
  rationale: La revisión inglesa corrigió 'asked' a un sentido de ruego intenso. En español, 'suplicado' transmite mejor la entreaty insistente del latín 'rogaui' que una simple pregunta o solicitud.
- source_word: uos
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - los
  - a ustedes
  lexicon: vos -> ustedes
  rationale: El pronombre latino es plural y de objeto directo/indirecto según el sentido. 'Les' funciona de manera natural en español para el destinatario plural y conserva la relación personal del discurso divino.
- source_word: pater filios
  english_pob_choice: as a father his sons
  chosen_spanish: como un padre a sus hijos
  alternatives_spanish:
  - como un padre con sus hijos
  - como un padre de sus hijos
  lexicon: pater -> padre; filii -> hijos
  rationale: '''A sus hijos'' expresa la comparación relacional de manera fluida en español y evita una construcción forzada. Aunque el latín omite el verbo repetido, el sentido comparativo queda claro.'
- source_word: mater filias
  english_pob_choice: as a mother her daughters
  chosen_spanish: como una madre a sus hijas
  alternatives_spanish:
  - como una madre con sus hijas
  - como madre de sus hijas
  lexicon: mater -> madre; filiae -> hijas
  rationale: Se conserva la simetría con la cláusula anterior y el contraste padre/madre del original latino.
- source_word: nutrix paruulos suos
  english_pob_choice: a nurse her little children
  chosen_spanish: como una nodriza a sus pequeños
  alternatives_spanish:
  - como una ama de cría a sus niños pequeños
  - como una cuidadora a sus pequeños
  lexicon: nutrix -> nodriza; parvuli -> pequeños / niños pequeños
  rationale: '''Nodriza'' es el equivalente más preciso para ''nutrix'' en español formal y refleja la figura de crianza del latín. ''Sus pequeños'' conserva la afectividad y la brevedad del original.'
theological_decisions:
- issue: Forma del sujeto divino
  english_pob_reading: the Lord Almighty
  chosen_spanish_reading: el Señor Todopoderoso
  alternative_spanish_readings:
  - Yahvé Todopoderoso
  - el Dios Todopoderoso
  rationale: El latín dice 'dominus omnipotens', un título, no el Tetragrámaton. Por eso se mantiene 'Señor Todopoderoso' en lugar de introducir 'Yahvé' sin base textual directa.
  doctrine_reference: N/A
- issue: Fuerza emotiva del verbo de ruego
  english_pob_reading: Have I not entreated you
  chosen_spanish_reading: ¿No les he suplicado
  alternative_spanish_readings:
  - ¿No les he pedido
  - ¿No les he rogado
  rationale: La revisión inglesa destacó que 'rogaui' implica un ruego intenso. 'Suplicado' preserva esa tensión emocional y la imagen de un Dios que apela con insistencia paternal, sin suavizarla a una simple petición.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que corrige el inglés de 'asked' a 'entreated'. En español se reflejó con 'suplicado', manteniendo el tono más intenso del latín 'rogaui' y la simetría de las comparaciones familiares sin añadir material no atestiguado.
  spanish_consistency_notes:
  - Se mantuvo el registro solemne y bíblico sin usar mayúsculas reverenciales innecesarias.
  - Se conservó la serie comparativa padre/madre/nodriza de forma paralela.
  - '''Nodriza'' se eligió por precisión léxica; no se sustituyó por ''sierva'' o ''cuidadora'' porque el latín apunta a una figura concreta de crianza.'
  - La frase queda abierta al encabalgamiento del verso siguiente, por lo que termina con coma, conforme al texto fuente.
