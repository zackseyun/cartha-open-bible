translation:
  language: es
  text: Porque me han abandonado, también yo los abandonaré; cuando me pidan misericordia, no tendré misericordia de ustedes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Quoniam me dereliquistis
  english_pob_choice: Because you have forsaken me
  chosen_spanish: Porque me han abandonado
  alternatives_spanish:
  - Porque me han dejado
  - Ya que me han abandonado
  lexicon: Latin derelinquere
  rationale: «Dereliquistis» expresa abandono/abandono relacional y pactual; «abandonado» conserva mejor esa fuerza que un simple «dejar». El presente perfecto en español comunica una acción ya realizada con efecto vigente, en línea con el valor del perfecto latino en este contexto.
- source_word: et ego uos derelinquam
  english_pob_choice: I also will forsake you
  chosen_spanish: también yo los abandonaré
  alternatives_spanish:
  - yo también los dejaré
  - también yo los abandonaré a ustedes
  lexicon: Latin derelinquere
  rationale: Se mantiene el paralelismo verbal con «abandonaré» para reflejar la repetición enfática del latín y la reciprocidad del juicio. «Los» es suficiente en español peninsular y latinoamericano para el objeto plural; no hace falta duplicación con «ustedes» en el texto principal.
- source_word: petentibus uobis a me misericordiam
  english_pob_choice: When you ask me for mercy
  chosen_spanish: cuando me pidan misericordia
  alternatives_spanish:
  - cuando me pidan compasión
  - cuando me soliciten misericordia
  lexicon: Latin misericordia
  rationale: «Misericordia» es la equivalencia directa y mantiene el lenguaje bíblico del ruego dirigido a Dios. «Pedir misericordia» suena natural en español y conserva el matiz de súplica sin añadir explicaciones ajenas al texto.
- source_word: non miserebor uestri
  english_pob_choice: I will not have mercy on you
  chosen_spanish: no tendré misericordia de ustedes
  alternatives_spanish:
  - no me compadeceré de ustedes
  - no me apiadaré de ustedes
  lexicon: Latin misereri
  rationale: «No tendré misericordia de ustedes» reproduce el valor negativo del futuro latino y el objeto personal con una formulación clara y litúrgicamente comprensible. Se evita «compadecerme/apiadarme» porque desplaza el énfasis desde misericordia divina al sentimiento humano.
theological_decisions:
- issue: Reciprocidad del juicio por abandono del pacto
  english_pob_reading: Because you have forsaken me, I also will forsake you.
  chosen_spanish_reading: Porque me han abandonado, también yo los abandonaré.
  alternative_spanish_readings:
  - Porque me dejaron, yo también los dejaré
  - Puesto que me han abandonado, también yo los abandonaré
  rationale: 'La cláusula expresa retribución pactual: el abandono de Dios por parte del pueblo provoca el abandono judicial de Dios. «Abandonado/abandonaré» conserva la solemnidad y la tensión teológica sin suavizarla.'
  doctrine_reference: Deuteronomio 31:17-18; 2 Crónicas 15:2; Romanos 1:24-28
- issue: Negativa de misericordia ante la súplica
  english_pob_reading: When you ask me for mercy, I will not have mercy on you.
  chosen_spanish_reading: cuando me pidan misericordia, no tendré misericordia de ustedes.
  alternative_spanish_readings:
  - cuando me rueguen misericordia, no me apiadaré de ustedes
  - cuando busquen misericordia de mí, no la tendré para ustedes
  rationale: La frase mantiene la tensión entre la petición humana y la respuesta divina negativa. No se atenúa con un lenguaje más general de ayuda o favor, porque el latín especifica precisamente misericordia.
  doctrine_reference: Isaías 1:15; Jeremías 14:12; Oseas 5:6
translation_notes:
  revision_awareness: The latest revision pass reported no changes needed (high-agreement, agree). The Spanish draft follows the unrevised source sense and the English POB reading without introducing new interpretive expansions.
