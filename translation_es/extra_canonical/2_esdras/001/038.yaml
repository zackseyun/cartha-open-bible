translation:
  language: es
  text: desde el oriente, a quienes daré a Abraham, Isaac y Jacob por guías
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ab oriente
  english_pob_choice: from the east
  chosen_spanish: desde el oriente
  alternatives_spanish:
  - del oriente
  - desde el este
  lexicon: oriente
  rationale: El latín señala un origen direccional. «Desde el oriente» conserva ese valor de procedencia con español natural y solemne; «oriente» mantiene el matiz geográfico tradicional, mientras que «este» sería más moderno pero menos literario en este contexto.
- source_word: quibus
  english_pob_choice: to whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - a los cuales
  - a quienes les
  lexicon: quibus
  rationale: Se trata de un dativo de destinatario. «A quienes» reproduce la relación de dirección sin introducir redundancia innecesaria.
- source_word: dabo
  english_pob_choice: I will give
  chosen_spanish: yo daré
  alternatives_spanish:
  - daré
  - yo les daré
  lexicon: do/dare
  rationale: El futuro simple expresa la promesa del hablante de manera directa. Se mantiene el sujeto explícito «yo» para conservar el énfasis personal del latín.
- source_word: ducattum
  english_pob_choice: as leaders
  chosen_spanish: como jefes
  alternatives_spanish:
  - como líderes
  - como gobernantes
  - como jefes de tribu
  lexicon: ducattum
  rationale: El término latino, tal como lo reflejó la auditoría inglesa, apunta a una función de conducción o mando. «Jefes» comunica ese valor con sobriedad; «líderes» sería comprensible pero menos preciso en registro bíblico, y «gobernantes» añadiría una carga política no asegurada por el texto.
- source_word: Abraham, Isaac et Iacob
  english_pob_choice: Abraham, Isaac, and Jacob
  chosen_spanish: a Abraham, Isaac y Jacob
  alternatives_spanish:
  - Abraham, Isaac y Jacob
  - a Abraham, Isaac y Jacob
  lexicon: nombres propios
  rationale: Se conservan los nombres propios sin adaptación. La preposición se integra al sintagma para que la oración resulte natural en español sin perder la dependencia del dativo anterior.
theological_decisions:
- issue: Sentido de ducattum aplicado a Abraham, Isaac y Jacob
  english_pob_reading: leaders
  chosen_spanish_reading: como jefes
  alternative_spanish_readings:
  - como líderes
  - como gobernantes
  rationale: La lectura inglesa evita identificar el término con el patriarca mismo como sujeto, y lo toma como función o cargo. En español, «como jefes» preserva la idea de conducción sin forzar una equivalencia doctrinal ni suavizar la fuerza lexical del latín.
  doctrine_reference: Función de liderazgo patriarcal en lenguaje histórico-bíblico, sin implicación doctrinal adicional
translation_notes:
  revision_awareness: 'La revisión reciente sustituyó un borrador no relacionado por una frase que sigue de cerca el latín: conserva el origen «desde el oriente», el dativo de destinatario «a quienes yo daré» y el valor funcional de «ducattum» como cargo de liderazgo. El español propuesto mantiene esa estructura y evita añadir contenido inexistente.'
  spanish_consistency_notes:
  - Se usa «oriente» y no «este» para mantener un tono bíblico y el paralelismo con la fuente latina.
  - Se eligió «jefes» para reflejar una función de mando sin importar un título eclesiástico posterior.
  - No se añadieron notas al pie porque el texto no presenta una variante textual o ambigüedad que requiera anclaje explícito en español.
