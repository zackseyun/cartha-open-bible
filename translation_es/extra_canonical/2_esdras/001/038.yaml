review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el latín: «ab oriente» = «desde/del oriente», «quibus dabo» = «a quienes daré», y mantiene correctamente a Abraham, Isaac y Jacob como lo dado a ese grupo. La principal cuestión es el valor de «ducattum», que en contexto apunta a conducción o jefatura; el español debe reflejarlo con naturalidad y dignidad.'
  spanish_quality_summary: El texto es claro, pero «como jefes» suena algo brusco y menos bíblico en español eclesial general. «Como líderes» sería más natural hoy, pero algo moderno; «como caudillos» suena demasiado cargado. «Por guías» expresa bien la función de conducción y lee con mayor dignidad. También conviene omitir «yo» por innecesario en español.
  glossary_alignment: No hay términos del glosario mayor comprometidos aquí. Los nombres patriarcales están bien. La revisión propuesta mejora el registro sin apartarse de la decisión inglesa auditada sobre «leaders».
  issues:
  - severity: medium
    issue: «como jefes» es poco idiomático para el registro bíblico buscado
    rationale: Aunque transmite mando, «jefes» puede sonar administrativo o brusco en español neutro. Un término como «guías» preserva mejor la idea de conducción con tono digno.
  - severity: low
    issue: El sujeto explícito «yo» es innecesario
    rationale: «Daré» ya codifica la primera persona; quitar «yo» hace la frase más natural sin pérdida semántica.
