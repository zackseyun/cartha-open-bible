base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/001/011.yaml
  text: I destroyed all the nations before them, and in the east I scattered the people of the two provinces, Tyre and Sidon, and killed all their enemies.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:40:50Z'
