translation:
  language: es
  text: Destruí a todas las naciones delante de ellos, y en el oriente dispersé al pueblo de las dos provincias, Tiro y Sidón, y maté a todos sus enemigos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Omnes gentes
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todas las gentes
  - todas las naciones
  lexicon: gentes
  rationale: El latín gentes, en este contexto, se refiere a los pueblos o naciones en conjunto; 'naciones' reproduce bien el alcance colectivo y mantiene el tono bíblico sin forzar un término más étnico que el contexto no exige.
- source_word: a facie eorum
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - frente a ellos
  lexicon: a facie
  rationale: La expresión latina indica presencia/posición frente a ellos; 'delante de ellos' es natural en español y conserva el sentido espacial y narrativo de avance victorioso.
- source_word: dissipaui
  english_pob_choice: I scattered
  chosen_spanish: esparcí
  alternatives_spanish:
  - dispersé
  - desparramé
  lexicon: dissipaui
  rationale: '''Esparcí'' comunica la dispersión de personas con registro bíblico claro y evita un matiz demasiado técnico; mantiene el valor de dispersión del verbo latino.'
- source_word: populum
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo
  - a la gente
  lexicon: populus
  rationale: '''Pueblo'' conserva la referencia colectiva y concreta del latín; ''gente'' sería más general y menos fiel a la unidad política/territorial sugerida por el contexto.'
- source_word: prouinciarum duarum
  english_pob_choice: of the two provinces
  chosen_spanish: de las dos provincias
  alternatives_spanish:
  - de las dos provincias
  - de ambas provincias
  lexicon: duae provinciae
  rationale: Se mantiene la estructura posesiva explícita del latín y el número dual en español ordinario; 'de ambas provincias' sería correcto pero menos transparente para el audit trail.
- source_word: Tyri et Sidonis
  english_pob_choice: Tyre and Sidon
  chosen_spanish: de Tiro y de Sidón
  alternatives_spanish:
  - de Tiro y de Sidón
  - Tiro y Sidón
  lexicon: Tyri et Sidonis
  rationale: Se conserva el par geográfico nombrado en el texto latino. La repetición de 'de' refleja con claridad la relación sintáctica con 'provincias' y no introduce ambigüedad.
- source_word: interfeci
  english_pob_choice: killed
  chosen_spanish: maté
  alternatives_spanish:
  - maté
  - eliminé
  - dije muerte a
  lexicon: interficio
  rationale: '''Maté'' es la equivalencia directa y natural para el verbo latino, sin suavizar la violencia ni introducir un giro interpretativo.'
theological_decisions:
- issue: Causalidad divina implícita en la voz narrativa
  english_pob_reading: I destroyed ... I scattered ... I killed ...
  chosen_spanish_reading: Destruí ... esparcí ... maté ...
  alternative_spanish_readings:
  - Yo destruí ... yo esparcí ... yo maté ...
  - Destruyó ... esparció ... mató ...
  rationale: Se conserva la primera persona singular sin añadir el pronombre 'yo', porque el español verbal ya la expresa con claridad. No se cambia a tercera persona, ya que el texto latino presenta una voz narrativa en primera persona con acción directa.
  doctrine_reference: Narración profética en primera persona; fidelidad al hablante del texto sin explicitar sujeto teológico externo.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo cruzado mostró alta concordancia; por eso se mantuvo una traducción muy cercana al sentido ya aprobado en inglés, ajustada solo a la sintaxis natural del español.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' sin necesidad de usarlo aquí, porque el versículo no contiene el nombre divino explícito.
  - Se evitó 'siervo'/'esclavo' porque no aparece δοῦλος ni equivalente pertinente en este versículo.
  - '''Tiro'' y ''Sidón'' se conservaron como topónimos bíblicos estándar en español.'
  - El tono es sobrio y narrativo, sin añadir glosas interpretativas ni alusiones doctrinales ajenas al texto.
