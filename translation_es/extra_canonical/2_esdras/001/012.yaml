lexical_decisions:
- source_word: Tu uero
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Ahora tú
  lexicon: Latin tu + vero
  rationale: El latín uero aquí funciona como adversativo/enfático, no causal; por eso se vierte con «pero» y no con «por tanto». «Tú» conserva el énfasis directo del mandato profético.
- source_word: loquere ad eos dicens
  english_pob_choice: speak to them, saying
  chosen_spanish: habla a ellos, diciendo
  alternatives_spanish:
  - háblales, diciendo
  - habla con ellos, diciendo
  lexicon: Latin loquere ad eos dicens
  rationale: Se mantiene la secuencia imperativa + participial del latín. «Habla a ellos» es más literal y conserva el destinatario explícito; «diciendo» reproduce el gerundio de introducción del discurso.
- source_word: haec dicit dominus
  english_pob_choice: Thus says the Lord
  chosen_spanish: Así dice el Señor
  alternatives_spanish:
  - Esto dice el Señor
  - Así habla el Señor
  lexicon: Latin haec dicit dominus
  rationale: La fórmula profética se preserva con su valor solemne y bíblico. «Señor» corresponde al dominus del latín; aquí no hay marcador explícito del tetragrámaton en el texto fuente, así que no se introduce «Yahvé».
theological_decisions:
- issue: Fórmula profética de autoridad divina
  english_pob_reading: Thus says the Lord
  chosen_spanish_reading: Así dice el Señor
  alternative_spanish_readings:
  - Esto dice el Señor
  - Así habla el Señor
  rationale: La frase funciona como fórmula de mensajería profética y debe conservar su fuerza declarativa. La traducción no suaviza ni parafrasea la autoridad del oráculo.
  doctrine_reference: Profecía y autoridad revelada del mensaje divino
translation_notes:
  revision_awareness: Se corrigió la omisión de la fórmula profética y se evitó traducir uero como causa/resultado. La puntuación sigue la lectura del texto latino limpio y la revisión inglesa posterior que retuvo la fórmula completa.
  spanish_consistency_notes:
  - Se preserva el orden retórico del mandato y la cita profética.
  - No se usa «Yahvé» porque el fuente latino dice dominus sin equivalente explícito del tetragrámaton.
  - La comilla de apertura y cierre se usa para delimitar el discurso citado en español.
  - El marcador [a] aparece exactamente en la palabra «tú» y la nota ofrece la alternativa reconocida por la POB en inglés.
