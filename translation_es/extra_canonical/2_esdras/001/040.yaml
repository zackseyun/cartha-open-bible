translation:
  language: es
  text: Nahúm y Habacuc, Sofonías, Ageo, Zacarías y Malaquías[a], a quien también llaman el ángel de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y Malaquías, a quien también llaman el mensajero de Yahvé». Esta opción refleja el sentido lexical del nombre, pero no el vocablo latino angelus. La frase tampoco necesariamente identifica al profeta con la figura distinta frecuentemente llamada «el ángel de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Naum et Abacuc
  english_pob_choice: Nahum and Habakkuk
  chosen_spanish: Nahúm y Habacuc
  alternatives_spanish:
  - Nahum y Habacuc
  lexicon: Nombres propios proféticos
  rationale: Se conservan los nombres bíblicos usuales en español, con la adaptación ortográfica estándar de Nahúm para el primer profeta.
- source_word: Sophoniae
  english_pob_choice: Zephaniah
  chosen_spanish: Sofonías
  alternatives_spanish:
  - Sefonías
  lexicon: Nombre propio profético
  rationale: Sofonías es la forma bíblica y eclesial más reconocible en español para el profeta Zephaniah.
- source_word: Aggei
  english_pob_choice: Haggai
  chosen_spanish: Ageo
  alternatives_spanish:
  - Hageo
  lexicon: Nombre propio profético
  rationale: Ageo refleja la forma española tradicional y ampliamente inteligible del nombre del profeta Haggai.
- source_word: Zachariae
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zacarías
  lexicon: Nombre propio profético
  rationale: Se mantiene la forma española común y establecida para el profeta Zechariah.
- source_word: Malachiae
  english_pob_choice: Malachi
  chosen_spanish: Malaquías
  alternatives_spanish:
  - Malquías
  lexicon: Nombre propio profético
  rationale: Malaquías es la forma normal en español para el profeta Malachi, y conserva la relación con el nombre del libro.
- source_word: angelus domini
  english_pob_choice: angel of the Lord
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el ángel del Señor
  - el mensajero de Yahvé
  lexicon: angelus / domini
  rationale: El latín fuente dice angelus, por lo que 'ángel' debe conservarse. Se traduce domini como Yahvé según la norma del proyecto, manteniendo la referencia al nombre divino en lugar de la sustitución litúrgica 'Señor'.
theological_decisions:
- issue: Identidad de 'el ángel de Yahvé' aplicado a Malaquías
  english_pob_reading: The phrase need not identify the prophet with the distinct figure often called 'the angel of the Lord.'
  chosen_spanish_reading: La frase no obliga a identificar al profeta con la figura distinta llamada el ángel de Yahvé.
  alternative_spanish_readings:
  - La frase no necesariamente identifica al profeta con el ángel de Yahvé.
  - La frase puede leerse como un simple juego etimológico sobre el nombre de Malaquías.
  rationale: 'Se preserva la cautela interpretativa del POB inglés: el texto latino permite una lectura tradicional sobre el nombre/función de Malaquías, pero no fuerza una identificación ontológica con la figura distintiva del ángel de Yahvé. La nota en inglés indica precisamente esa reserva.'
  doctrine_reference: Distinción entre el profeta Malaquías y la teofanía/figura del ángel de Yahvé en la lectura bíblica tradicional.
translation_notes:
  revision_awareness: La revisión reciente del inglés eligió mantener 'angel of the Lord' para reflejar fielmente el latín angelus, y la nota antigua conserva la alternativa etimológica 'messenger'. La presente versión española sigue esa decisión textual y evita suavizar angelus a 'mensajero', pero mantiene una nota alternativa por la ambigüedad lexical del nombre Malaquías.
  spanish_consistency_notes:
  - Se usa Yahvé de forma consistente para domini cuando el texto remite al nombre divino.
  - Se conserva 'ángel' en la frase principal para seguir el latín angelus, no una etimología explicativa.
  - La puntuación y el orden de nombres siguen la sintaxis natural del español sin alterar la lista profética.
