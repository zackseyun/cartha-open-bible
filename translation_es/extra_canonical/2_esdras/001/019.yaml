lexical_decisions:
- source_word: deserto hoc
  english_pob_choice: in this wilderness
  chosen_spanish: en este desierto
  alternatives_spanish:
  - en este yermo
  - en esta tierra desierta
  lexicon: desertum/deserto
  rationale: El latín presenta una indicación locativa inmediata, sin artículo enfático ni expansión interpretativa. «Desierto» comunica bien el lugar inhóspito y mantiene la concisión del original.
- source_word: Ego dolui
  english_pob_choice: I grieved
  chosen_spanish: Yo me dolí
  alternatives_spanish:
  - Yo me entristecí
  - Yo sentí dolor
  lexicon: doleo
  rationale: «Dolui» expresa dolor, pena o aflicción real. En español, «me dolí» conserva el matiz de sufrir interiormente mejor que «tuve piedad», que desplazaría el sentido hacia misericordia y no hacia dolor/aflicción.
- source_word: gemitos uestros
  english_pob_choice: your groanings
  chosen_spanish: sus gemidos
  alternatives_spanish:
  - sus lamentos
  - sus quejas
  lexicon: gemitus
  rationale: «Gemitos» se rinde de forma directa como «gemidos», preservando el eco físico y emocional del latín. Se usa «sus» por concordancia natural en español, reflejando el posesivo plural del contexto.
- source_word: dedi mannam uobis
  english_pob_choice: gave you manna
  chosen_spanish: les di maná
  alternatives_spanish:
  - les di el maná
  - os di maná
  lexicon: manna
  rationale: «Maná» es el préstamo establecido en español bíblico y nombra con precisión el alimento milagroso. Se prefiere «les» por neutralidad latinoamericana y porque el contexto plural ya está claro.
theological_decisions:
- issue: La fuerza de Ego dolui frente a una lectura de compasión
  english_pob_reading: I grieved over your groanings
  chosen_spanish_reading: Yo me dolí por sus gemidos
  alternative_spanish_readings:
  - Tuve compasión de sus gemidos
  - Me compadecí de sus gemidos
  rationale: El pasaje no usa un verbo típico de compasión o misericordia, sino de dolor/aflicción. La traducción debe conservar esa tensión semántica y no suavizarla hacia un término más devocional.
  doctrine_reference: Precisión léxica; no se introduce una afirmación doctrinal adicional
translation_notes:
  revision_awareness: 'La revisión reciente corrigió una expansión no atestiguada y restableció la frase inicial del latín. Esta versión sigue el latín limpio dado en el expediente: mantiene la localización («en este desierto»), el verbo fuerte de dolor («me dolí») y elimina cualquier material no presente en la fuente.'
  spanish_consistency_notes:
  - Se mantiene «maná» como término bíblico estable en español.
  - Se evita «Señor» o cualquier sustitución reverencial, porque aquí no aparece el nombre divino.
  - Se preserva el tono sobrio y breve del latín, sin añadir alimento extra ni glosas narrativas.
