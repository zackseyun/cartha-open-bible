translation:
  language: es
  text: No les di fuego por sus blasfemias, sino que, al echar madera en el agua, hice dulce la corriente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Non... dedi
  english_pob_choice: I did not give you
  chosen_spanish: No les di
  alternatives_spanish:
  - No os di
  - No les concedí
  lexicon: Latín non... dedi
  rationale: Reproduce la negación y el verbo de dádiva en forma natural en español; "les" mantiene el destinatario plural sin forzar una equivalencia arcaica.
- source_word: ignem
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  - incendio
  lexicon: Latín ignis
  rationale: '"Fuego" es la correspondencia directa y más natural en este contexto de castigo o juicio.'
- source_word: uobis
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - os
  - a ustedes
  lexicon: Latín vobis
  rationale: Se usa "les" para un español amplio y digno, con referencia plural de segunda persona implícita por contexto.
- source_word: pro blasphemiis
  english_pob_choice: for your blasphemies
  chosen_spanish: por sus blasfemias
  alternatives_spanish:
  - a causa de sus blasfemias
  - por sus sacrilegios
  lexicon: Latín blasphemiis
  rationale: '"Blasfemias" conserva el término religioso fuerte del original; "por" expresa la relación causal sin añadir matices no presentes.'
- source_word: sed mittens lignum in aqua
  english_pob_choice: but by casting wood into the water
  chosen_spanish: sino que, al echar madera en el agua
  alternatives_spanish:
  - sino que, arrojando madera al agua
  - sino que, al poner madera en el agua
  lexicon: Latín mittens lignum in aqua
  rationale: El participio de acción se rinde mejor con una construcción gerundivo-temporal "al echar", siguiendo la revisión inglesa que destacó el valor participial.
- source_word: dulce feci flumen
  english_pob_choice: I made the stream sweet
  chosen_spanish: hice dulce el arroyo
  alternatives_spanish:
  - hice dulce el río
  - volví dulce el arroyo
  lexicon: Latín dulce feci flumen
  rationale: '"Hice dulce" reproduce la causa y el cambio de estado; "arroyo" refleja de manera cercana "stream" en español bíblico claro y natural.'
theological_decisions:
- issue: Acto divino de juicio y misericordia en la misma frase
  english_pob_reading: I did not give you fire for your blasphemies, but by casting wood into the water I made the stream sweet.
  chosen_spanish_reading: No les di fuego por sus blasfemias, sino que, al echar madera en el agua, hice dulce el arroyo.
  alternative_spanish_readings:
  - No les di fuego por sus blasfemias, sino que eché madera en el agua y volví dulce el arroyo.
  - No les di fuego por sus blasfemias, sino que, echando madera en el agua, hice dulce el arroyo.
  rationale: La frase mantiene la oposición entre castigo y beneficio sin suavizar la referencia al juicio implícito en "blasfemias" ni el acto de gracia o poder en hacer dulce el agua.
  doctrine_reference: Narrativa de juicio y misericordia en el contexto de las señales divinas; no introduce doctrina nueva, solo conserva la tensión del texto.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al expresar explícitamente la construcción participial con "al echar", en lugar de una coordinación simple. No se añadieron notas porque no hay variantes textuales ni ambigüedades doctrinales que requieran marcado en esta cláusula breve.
  spanish_consistency_notes:
  - Se mantiene "blasfemias" para conservar el campo semántico religioso fuerte del latín.
  - Se evita "SEÑOR" o terminología de sustitución innecesaria porque el versículo no contiene el nombre divino.
  - '"Fuego" y "agua" conservan la imaginería elemental del texto sin glosa interpretativa.'
