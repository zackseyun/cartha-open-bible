translation_notes:
  revision_awareness: 'Se siguió el límite revisado del versículo 1:39: el griego/latín de este tramo enumera solo a los profetas, no la frase de liderazgo de Abraham, Isaac y Jacob, que pertenece al versículo anterior. La nota conserva la alternativa histórica registrada en la POB inglesa, pero el texto principal se restringe al tramo fuente de este versículo.'
  spanish_consistency_notes:
  - Se usaron formas proféticas españolas estándar y reconocibles, sin forzar una transliteración latina.
  - La puntuación con coma serial y punto final respeta la lectura enumerativa del fragmento latino.
  - La nota al pie marca la alternativa histórica sin incorporar indebidamente material del versículo precedente al texto principal.
