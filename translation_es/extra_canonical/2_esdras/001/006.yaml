translation:
  language: es
  text: Porque los pecados de sus padres se han multiplicado en ellos; porque me olvidaron y sacrificaron a dioses extraños.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: peccata parentum illorum
  english_pob_choice: the sins of their fathers
  chosen_spanish: los pecados de sus padres
  alternatives_spanish:
  - los pecados de los padres de ellos
  - las culpas de sus padres
  lexicon: peccata -> pecados; parentum illorum -> sus padres
  rationale: El latín habla de los 'pecados' de sus padres, y el posesivo simple 'sus padres' reproduce de forma natural la relación sin añadir matices inexistentes. 'Culpas' sería posible, pero 'pecados' conserva mejor la correspondencia léxica con peccata.
- source_word: in illis creuerunt
  english_pob_choice: have increased in them
  chosen_spanish: se han multiplicado en ellos
  alternatives_spanish:
  - han crecido en ellos
  - han aumentado en ellos
  lexicon: creuerunt -> se han multiplicado / han aumentado
  rationale: '''Crecer'' aquí comunica aumento, pero ''se han multiplicado'' refleja con más fuerza la idea de incremento acumulativo presente en el latín y mantiene el peso de la frase inglesa.'
- source_word: obliti enim me
  english_pob_choice: for they forgot me
  chosen_spanish: pues me olvidaron
  alternatives_spanish:
  - porque me olvidaron
  - ya que se olvidaron de mí
  lexicon: obliti ... me -> olvidaron a mí / me olvidaron
  rationale: Se mantiene la relación causal con 'pues' y el objeto directo 'me' del latín. 'Se olvidaron de mí' es idiomático, pero 'me olvidaron' conserva mejor la sobriedad del original y el paralelo con la primera cláusula.
- source_word: sacrificauerunt diis alienis
  english_pob_choice: and sacrificed to foreign gods
  chosen_spanish: ofrecieron sacrificios a dioses extraños
  alternatives_spanish:
  - sacrificaron a dioses extraños
  - ofrecieron sacrificios a dioses ajenos
  lexicon: sacrificauerunt -> ofrecieron sacrificios; diis alienis -> a dioses extraños
  rationale: '''Ofrecieron sacrificios'' expresa el acto cultual de modo claro en español y evita una lectura demasiado técnica. ''Dioses extraños'' sigue de cerca alienis y conserva el contraste religioso; ''ajenos'' sería posible, pero ''extraños'' comunica mejor la alteridad cultual.'
theological_decisions:
- issue: Causalidad moral entre los pecados de los padres y la situación del pueblo
  english_pob_reading: For the sins of their fathers have increased in them
  chosen_spanish_reading: Porque los pecados de sus padres se han multiplicado en ellos
  alternative_spanish_readings:
  - Porque los pecados de sus padres han crecido en ellos
  - Porque los pecados de sus padres han aumentado en ellos
  rationale: El latín presenta una afirmación fuerte sobre la propagación o incremento de los pecados paternos 'en ellos'. La redacción española conserva esa tensión sin suavizarla, evitando interpretarla como mera herencia cultural o simple imitación.
  doctrine_reference: Responsabilidad generacional / continuidad del pecado en la historia del pueblo, sin resolver aquí la tensión teológica
translation_notes:
  revision_awareness: La revisión más reciente marcó el pasaje como sin cambios y con alta concordancia entre el latín limpio de Bensly y la traducción inglesa POB; por ello, la propuesta española sigue de cerca la estructura semántica confirmada por el audit trail, sin introducir variantes textuales.
  spanish_consistency_notes:
  - Se usa 'dioses extraños' para mantener el contraste religioso del latín alienis y la traducción inglesa 'foreign gods'.
  - Se prefiere 'pecados' frente a alternativas moralmente suavizadas porque el original latino usa peccata.
  - 'La puntuación reproduce la división causal del texto: una primera cláusula explicativa seguida de la razón introducida por ''pues''.'
