translation:
  language: es
  text: Os di para protección[a], y allí murmurasteis. No os gozasteis en mi nombre por la destrucción de vuestros enemigos, sino que aún
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'triunfasteis en mi nombre por la destrucción'.
    reason: alternative_rendering
lexical_decisions:
- source_word: ad tutelam dedi
  english_pob_choice: I gave for protection
  chosen_spanish: Te di para protección
  alternatives_spanish:
  - Te lo di para protección
  - Os di para protección
  lexicon: Latin tutelam; dedi
  rationale: 'El latín expresa una finalidad concreta con ad + acusativo: “para protección”. En español, “te di para protección” conserva la brevedad y la intención del original. Se usa singular según el contexto textual inmediato del pasaje, sin añadir elementos no presentes.'
- source_word: murmurastis
  english_pob_choice: you grumbled
  chosen_spanish: murmurasteis
  alternatives_spanish:
  - os quejasteis
  - refunfuñasteis
  lexicon: Latin murmurare
  rationale: ‘Murmurar’ reproduce bien el sentido de queja/reproche del latín y mantiene el eco bíblico de descontento contra Dios. ‘Quejarse’ o ‘refunfuñar’ serían posibles, pero ‘murmurar’ es más cercano al verbo fuente.
- source_word: triumphastis ... de perditione
  english_pob_choice: you did not exult ... over the destruction
  chosen_spanish: no os gozasteis ... por la destrucción
  alternatives_spanish:
  - no triunfasteis ... por la destrucción
  - no exultasteis ... sobre la destrucción
  lexicon: Latin triumphare + de + ablative
  rationale: El audit trail inglés corrigió ‘triumph’ a ‘exult’ por el valor de triumphare en este contexto. En español, ‘gozar(se)’ expresa mejor la alegría por una desgracia ajena sin implicar victoria militar sobre la destrucción misma. Se evita ‘triunfar’, que sugeriría vencer a la destrucción, no alegrarse por ella.
- source_word: in nomine meo
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - por mi nombre
  - en el nombre mío
  lexicon: Latin in nomine meo
  rationale: La fórmula normal y fiel en español es ‘en mi nombre’. Conserva la relación instrumental o representativa del latín y la resonancia bíblica.
- source_word: sed adhuc
  english_pob_choice: but still
  chosen_spanish: sino que aún
  alternatives_spanish:
  - pero todavía
  - mas aún
  lexicon: Latin sed + adhuc
  rationale: 'El latín remata la cláusula con una oposición incompleta: ‘sed adhuc’. ‘Sino que aún’ mantiene la adversativa abierta y refleja que el texto conservado termina en suspensión, sin completar la idea.'
theological_decisions:
- issue: Referencia al nombre de Dios y la reacción debida ante la derrota del enemigo
  english_pob_reading: You did not exult in my name over the destruction of your enemies
  chosen_spanish_reading: No os gozasteis en mi nombre por la destrucción de vuestros enemigos
  alternative_spanish_readings:
  - No os alegrasteis en mi nombre por la destrucción de vuestros enemigos
  - No triunfasteis en mi nombre por la destrucción de vuestros enemigos
  rationale: 'Se mantiene la tensión del texto: el pueblo no respondió con gozo reverente en el nombre de Dios ante la caída del enemigo. ‘Gozarse’ conserva la carga afectiva y doxológica mejor que una simple ‘alegría’ neutral, y evita la sugerencia errónea de ‘triunfar’ sobre la destrucción.'
  doctrine_reference: Reverencia debida al nombre de Dios; juicio contra la alegría por la ruina del enemigo.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que restauró ‘I gave for protection’ desde ad tutelam dedi, corrigió triumphastis a ‘exult’ en el inglés auditado, y eliminó la expansión no atestiguada que seguía después de ‘but still’. La versión española refleja ese estado textual incompleto al terminar en suspensión con ‘sino que aún’.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento de segunda persona plural (‘murmurasteis’, ‘os gozasteis’) porque el pasaje se dirige al pueblo en plural.
  - No se introdujo ‘Señor’ ni ‘Cristo’ porque el texto latino aquí usa ‘meo’ y no contiene esos términos.
  - La nota al pie se ancló en ‘gozasteis’ para preservar la alternativa de sentido del inglés auditado sin sobretraducir el latín.
