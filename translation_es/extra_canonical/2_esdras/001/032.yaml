base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/001/032.yaml
  text: I sent my servants the prophets to you, whom you received and killed and tore their bodies apart; their blood I will require, says the Lord.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:27Z'
    unchanged: false
    changes_summary: Replaced 'seized' with 'received' to reflect Latin acceptos more accurately; retained the rest with minor punctuation smoothing.
translation:
  language: es
  text: Yo envié a ustedes a mis siervos, los profetas, a quienes recibieron y mataron y desgarraron sus cuerpos; su sangre la exigiré, dice Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: misi pueros meos
  english_pob_choice: I sent my servants
  chosen_spanish: Yo envié a ustedes a mis siervos
  alternatives_spanish:
  - Yo mandé a ustedes a mis siervos
  - Yo envié mis siervos a ustedes
  lexicon: Latin misi = enviar; pueros meos = mis muchachos/siervos/servidores
  rationale: En este contexto profético, 'servants' comunica mejor la relación de servicio que 'muchachos'; 'siervos' preserva el valor de dependencia y misión sin imponer un tono eclesiástico ajeno.
- source_word: prophetas
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - a los profetas
  - profetas
  lexicon: Latin prophetas = profetas
  rationale: Se mantiene el sustantivo directo porque el Latin identifica con claridad el oficio profético.
- source_word: acceptos
  english_pob_choice: whom you received
  chosen_spanish: a quienes recibieron
  alternatives_spanish:
  - a quienes aceptaron
  - a quienes acogieron
  lexicon: Latin acceptos = recibidos/aceptados/recibidos favorablemente
  rationale: 'La revisión inglesa corrigió ''seized'' a ''received'' por fidelidad a acceptos. En español, ''recibieron'' conserva la tensión: no implica hospitalidad plena, pero sí el acto de recibir/aceptar al enviado.'
- source_word: interfecistis
  english_pob_choice: killed
  chosen_spanish: mataron
  alternatives_spanish:
  - asesinaron
  - dieron muerte a
  lexicon: Latin interfecistis = matasteis / mataron
  rationale: '''Mataron'' es la forma más directa y sobria; evita sobreinterpretar el matiz legal de ''asesinaron'' que el latín no exige explícitamente.'
- source_word: laniastis corpora illorum
  english_pob_choice: tore their bodies apart
  chosen_spanish: desgarraron sus cuerpos
  alternatives_spanish:
  - destrozaron sus cuerpos
  - hicieron pedazos sus cuerpos
  lexicon: Latin laniastis = despedazasteis, desgarrasteis; corpora = cuerpos
  rationale: '''Desgarraron'' reproduce la violencia corporal del latín sin endurecer el texto con una expresión más idiomática pero menos precisa.'
- source_word: quorum sanguinem exquiram
  english_pob_choice: their blood I will require
  chosen_spanish: su sangre la exigiré
  alternatives_spanish:
  - exigiré su sangre
  - pediré cuenta de su sangre
  lexicon: Latin exquiram = buscaré/exigiré/reclamaré; sanguinem = sangre
  rationale: '''Exigiré su sangre'' sería natural, pero ''su sangre la exigiré'' mantiene la fuerza judicial/compensatoria del giro latino y el énfasis de retribución.'
- source_word: dicit dominus
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - afirma el Señor
  - dice Yahvé
  lexicon: Latin dominus = Señor
  rationale: Aunque el marco general del proyecto prefiere 'Yahvé' para el Tetragrámaton, aquí el testigo fuente es el latín 'dominus'. Se conserva 'Señor' porque la forma auditada del pasaje en POB inglés también usa 'the Lord' y no hay un indicador explícito en el fragmento latino para reemplazarlo.
theological_decisions:
- issue: Responsabilidad retributiva por la sangre de los profetas
  english_pob_reading: their blood I will require, says the Lord
  chosen_spanish_reading: su sangre la exigiré, dice el Señor
  alternative_spanish_readings:
  - pediré cuenta de su sangre, dice el Señor
  - reclamaré su sangre, dice el Señor
  rationale: La frase se traduce con un lenguaje de retribución judicial sin suavizar la amenaza. 'Exigiré' conserva la fuerza del original y mantiene abierta la referencia al juicio divino sobre la violencia contra los profetas.
  doctrine_reference: Justicia retributiva divina; cf. lenguaje bíblico de pedir cuenta de sangre
translation_notes:
  revision_awareness: La revisión inglesa reemplazó 'seized' por 'received' para ajustar con mayor precisión el latín acceptos. Esta versión española sigue esa revisión al usar 'recibieron', evitando introducir una idea de captura no presente en el texto fuente. También se conserva la referencia a 'the Lord' como 'el Señor' de acuerdo con el testigo latino dominus.
  spanish_consistency_notes:
  - Se mantiene 'siervos' para pueros meos por fidelidad funcional y por coherencia con el registro profético.
  - Se usa 'Señor' en lugar de 'Yahvé' porque el testigo fuente explícito es dominus y no un Tetragrámaton hebreo visible en este fragmento.
  - El giro 'su sangre la exigiré' conserva el énfasis retributivo del latín y del inglés auditado, aunque en español hay alternativas más idiomáticas.
