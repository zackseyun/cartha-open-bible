translation:
  language: es
  text: Cuando me traigan ofrendas[a], apartaré mi rostro de ustedes; porque he rechazado sus días de fiesta, sus lunas nuevas y las circuncisiones de la carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este capítulo pertenece a la capa cristiana posterior, a menudo llamada 5 Esdras. Su rechazo de «los días de fiesta», «las lunas nuevas» y «las circuncisiones de la carne» refleja esa voz polémica y no debe confundirse con la teología del apocalipsis judío de los capítulos 3-14.
    reason: source_note
lexical_decisions:
- source_word: obtulleritis
  english_pob_choice: When you bring offerings to me
  chosen_spanish: Cuando me traigan ofrendas
  alternatives_spanish:
  - Cuando me presenten ofrendas
  - Cuando me lleven ofrendas
  lexicon: Latin obtuleritis → ofrecer / presentar ofrendas
  rationale: El latín expresa la idea de presentar u ofrecer dones sacrificiales; en español, «traigan ofrendas» conserva la dirección cultual sin sonar rígido. «Me» se mantiene por el destinatario explícito del verbo.
- source_word: auertam faciem meam a uobis
  english_pob_choice: I will turn my face from you
  chosen_spanish: apartaré mi rostro de ustedes
  alternatives_spanish:
  - volveré mi rostro de ustedes
  - retiraré mi rostro de ustedes
  lexicon: Latin averto + facies → apartar / volver el rostro
  rationale: «Apartaré mi rostro» reproduce la imagen relacional del texto latino con una fórmula natural en español. «De ustedes» evita el calco preposicional y preserva el movimiento de separación.
- source_word: dies enim festos uestros et neomenias
  english_pob_choice: your feast days and new moons
  chosen_spanish: sus días de fiesta y sus lunas nuevas
  alternatives_spanish:
  - sus fiestas y novilunios
  - sus días festivos y sus lunas nuevas
  lexicon: Latin dies festos / neomenias → días de fiesta / lunas nuevas
  rationale: Se mantiene la pareja ritual del original. «Lunas nuevas» conserva la referencia calendárica cultual y es más transparente que un término técnico como «novilunios».
- source_word: circumcisiones carnis
  english_pob_choice: circumcisions of the flesh
  chosen_spanish: las circuncisiones de la carne
  alternatives_spanish:
  - las circuncisiones carnales
  - las circuncisiones del cuerpo
  lexicon: Latin circumcisiones carnis → circuncisiones de la carne
  rationale: Se conserva la formulación concreta y polémica del latín. «De la carne» retiene la ambigüedad teológica y corporal sin suavizarla hacia un sentido menos incisivo.
theological_decisions:
- issue: Layer composition and polemical tone
  english_pob_reading: This chapter belongs to the later Christian layer often called 5 Ezra. Its rejection of 'feast days ... new moons and circumcisions of the flesh' reflects that layer's polemical voice and should not be conflated with the theology of the Jewish apocalypse in chapters 3-14.
  chosen_spanish_reading: Este capítulo pertenece a la capa cristiana posterior, a menudo llamada 5 Esdras. Su rechazo de «los días de fiesta... las lunas nuevas y las circuncisiones de la carne» refleja esa voz polémica y no debe confundirse con la teología del apocalipsis judío de los capítulos 3-14.
  alternative_spanish_readings:
  - Este capítulo forma parte de una adición cristiana posterior...
  - Este pasaje refleja una postura polémica posterior...
  rationale: Se conserva la advertencia composicional del auditor inglés para evitar que el lector atribuya este tono a todo el libro. La nota distingue la capa textual sin alterar el sentido del versículo.
  doctrine_reference: Crítica textual y estratificación composicional de 2 Esdras / 5 Ezra
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y mantuvo la concordancia alta con el texto fuente; por eso el borrador español sigue de cerca el latín limpiado y el foco auditado de la versión inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando aparezca el nombre divino; aquí no aparece.
  - Se usa «ofrendas» en sentido cultual general, sin introducir especificaciones sacrificiales que el latín no desarrolla.
  - Se conserva la repetición posesiva («sus días... sus lunas...») para reflejar el paralelismo del original.
