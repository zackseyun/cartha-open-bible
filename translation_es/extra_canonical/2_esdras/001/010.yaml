revisions:
- from: Por amor de ellos derribé a muchos reyes; herí al Faraón con sus servidores y a todo su ejército.
  to: Por causa de ellos derribé a muchos reyes; herí al Faraón con sus siervos y a todo su ejército.
  rationale: Se ajusta «propter eos» a «Por causa de ellos» para evitar el matiz afectivo añadido por «por amor de ellos», y se cambia «servidores» por «siervos» para reflejar mejor el contexto bíblico-histórico y la elección auditada «servants». El resto del versículo ya preservaba bien el sentido del latín y la agencia divina.
