translation:
  language: es
  text: Por causa de ellos derribé a muchos reyes; herí al Faraón con sus siervos y a todo su ejército.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Reges multos
  english_pob_choice: many kings
  chosen_spanish: muchos reyes
  alternatives_spanish:
  - numerosos reyes
  - gran número de reyes
  lexicon: reges -> reyes
  rationale: El plural latino reges se vierte de manera directa y natural como «reyes». «Muchos» conserva el alcance cuantitativo del inglés POB sin añadir intensidad excesiva.
- source_word: propter eos
  english_pob_choice: for their sake
  chosen_spanish: por amor de ellos
  alternatives_spanish:
  - por causa de ellos
  - por ellos
  lexicon: propter + accusative
  rationale: La frase latina expresa causalidad o beneficio. «Por amor de ellos» comunica bien el valor benefactivo en español y evita la ambigüedad de un mero «por ellos», que podría sonar demasiado seco o instrumental.
- source_word: subuerti
  english_pob_choice: I overthrew
  chosen_spanish: derribé
  alternatives_spanish:
  - derroqué
  - subvertí
  - arranqué
  lexicon: subverto
  rationale: El verbo latino subverti apunta a derribar o destruir el poder establecido. «Derribé» es claro, idiomático y conserva la imagen de caída/ruina sin imponer un matiz político más específico que el latino no exige.
- source_word: Pharaonem
  english_pob_choice: Pharaoh
  chosen_spanish: al Faraón
  alternatives_spanish:
  - Faraón
  lexicon: Pharao
  rationale: Se mantiene el nombre/título bíblico convencional en español. La preposición «al» corresponde al objeto directo personal en español.
- source_word: cum pueris suis
  english_pob_choice: with his servants
  chosen_spanish: con sus servidores
  alternatives_spanish:
  - con sus siervos
  - con sus criados
  lexicon: pueri
  rationale: El latino pueris, en este contexto histórico, puede referir a servidores o asistentes del Faraón. «Servidores» preserva la relación de subordinación sin cargar innecesariamente la palabra con un sentido de esclavitud que el contexto no precisa aquí.
- source_word: omnem exercitum eius
  english_pob_choice: all his army
  chosen_spanish: a todo su ejército
  alternatives_spanish:
  - a todo su ejército entero
  - a toda su hueste
  lexicon: exercitus
  rationale: «Ejército» es la equivalencia directa y normal en español. «Todo» reproduce el alcance total de omnem sin añadir solemnidad arcaica.
theological_decisions:
- issue: Divine agency in historical judgment
  english_pob_reading: For their sake I overthrew... I struck Pharaoh...
  chosen_spanish_reading: Por amor de ellos derribé... herí...
  alternative_spanish_readings:
  - Por ellos hice caer...
  - A causa de ellos destruí...
  rationale: Se conserva la atribución directa de la acción a Dios, como en el latín y en el inglés POB. No se atenúa la agencia divina mediante perífrasis impersonalizadas.
  doctrine_reference: Providencia divina y juicio histórico en la narrativa bíblica
translation_notes:
  revision_awareness: La versión en inglés POB permanece sin cambios en la última revisión; no hay revisiones aplicadas ni variantes textuales que requieran nota en español. La formulación española sigue de cerca el latín limpio y el criterio óptimo-equivalente del inglés auditado.
  spanish_consistency_notes:
  - Se conserva «Faraón» como título propio bíblico habitual en español.
  - Se evita «SEÑOR» porque el texto fuente no contiene el tetragrámaton ni κύριος, sino una primera persona divina implícita en el discurso.
  - «Servidores» se usa aquí como solución contextual para pueris, sin introducir la terminología más fuerte de «esclavos» que sería excesiva en este pasaje.
