    changes_summary: 'Adjusted word order to reflect the Latin more closely: ''plateas ... munitas'' is better rendered ''made roads secure'' than ''made secure roads,'' while keeping the sense natural and formal.'
translation:
  language: es
  text: Ciertamente los hice pasar a través del mar[a], y en lugares sin camino aseguré caminos para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ciertamente los hice pasar por el mar, y en lugares sin camino hice firmes caminos para ustedes».'
    reason: alternative_rendering
lexical_decisions:
- source_word: Nempe
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sin duda
  - En verdad
  lexicon: Latin adverb of affirmation
  rationale: Nempe afirma con énfasis y confirma lo dicho; «Ciertamente» comunica esa seguridad sin añadir contenido inexistente.
- source_word: ego uos mare traieci
  english_pob_choice: I brought you through the sea
  chosen_spanish: los hice pasar por el mar
  alternatives_spanish:
  - los conduje por el mar
  - os atravesé el mar
  lexicon: Latin verbal clause with direct object and motion through water
  rationale: El latino expresa un acto causal de hacer atravesar; «los hice pasar por el mar» mantiene la fuerza verbal y evita una paráfrasis excesiva.
- source_word: plateas
  english_pob_choice: roads
  chosen_spanish: las calzadas
  alternatives_spanish:
  - los caminos
  - las vías
  lexicon: Latin plateae / viae in context of routes
  rationale: «Plateas» aquí apunta a vías o caminos abiertos; «calzadas» es formal y natural en español, y conserva la imagen de una vía preparada.
- source_word: in inuia
  english_pob_choice: in trackless places
  chosen_spanish: en lugares sin camino
  alternatives_spanish:
  - en parajes sin senda
  - en despoblados sin camino
  lexicon: Latin in inuia
  rationale: La expresión denota terrenos sin huellas ni rutas; «lugares sin camino» transmite la imagen con claridad y sin sobreinterpretar.
- source_word: munitas
  english_pob_choice: made roads secure
  chosen_spanish: les hice seguras las calzadas
  alternatives_spanish:
  - les fortifiqué las calzadas
  - hice firmes las calzadas para ustedes
  lexicon: Latin participle from munire
  rationale: «Munire» significa asegurar, fortificar, poner en estado seguro. «Hice seguras las calzadas» refleja la idea de caminos preparados y protegidos, siguiendo de cerca la revisión inglesa que prefiere el orden y el sentido de la construcción.
theological_decisions:
- issue: Ausencia del nombre divino o de una fórmula explícita de cita divina en este versículo
  english_pob_reading: The English audit trail revised away an intrusive “Thus says the Lord” that belonged to the previous verse.
  chosen_spanish_reading: No introducir una fórmula como «dice Yahvé» ni «así dice el Señor» en este versículo.
  alternative_spanish_readings:
  - Así dice Yahvé
  - Dice el Señor
  rationale: El latín de este versículo comienza directamente con «Nempe ego…»; por tanto, no debe añadirse un marco profético que no está en el texto fuente de este versículo.
  doctrine_reference: Fidelidad textual y delimitación del enunciado
- issue: Fuerza retórica de la afirmación inicial
  english_pob_reading: Surely
  chosen_spanish_reading: Ciertamente
  alternative_spanish_readings:
  - Sin duda
  - En verdad
  rationale: La partícula afirma con énfasis la acción divina; no expresa duda ni mera posibilidad, sino confirmación solemne.
  doctrine_reference: Retórica afirmativa del texto
- issue: Imagen de guía/provisión en el éxodo
  english_pob_reading: I brought you through the sea... I made roads secure for you
  chosen_spanish_reading: los hice pasar por el mar... les hice seguras las calzadas
  alternative_spanish_readings:
  - los conduje por el mar... aseguré sus caminos
  - los pasé por el mar... fortifiqué sus vías
  rationale: La imagen conserva el motivo de liberación y provisión divina sin convertirlo en una alegoría distinta.
  doctrine_reference: Motivos del éxodo y providencia divina
translation_notes:
  revision_awareness: 'Se siguió el latín limpio de Bensly 1895/Bensly 1875 como texto base. La revisión inglesa más reciente corrigió una intrusión de v. 12 («Thus says the Lord») y ajustó la cláusula final para reflejar mejor «plateas ... munitas». La versión española evita esa intrusión y conserva el orden semántico: afirmación inicial, cruce del mar, y preparación/seguridad de las vías en lugares sin camino.'
  spanish_consistency_notes:
  - Se mantuvo «Ciertamente» para Nempe, coherente con la revisión inglesa.
  - Se evitó «SEÑOR» como sustituto del nombre divino porque este versículo no contiene un vocativo divino explícito en el latín base.
  - «Calzadas» se usa como término formal para plateas, sin imponer una lectura técnica moderna.
  - La nota a pie de página ofrece una alternativa legítima con «firmes» para reflejar el rango de munire.
