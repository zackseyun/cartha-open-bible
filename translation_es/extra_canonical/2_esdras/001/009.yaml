translation:
  language: es
  text: ¿Hasta cuándo los soportaré, a quienes he dado tan grandes beneficios?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Vsquequo
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Por cuánto tiempo
  - ¿Hasta qué punto
  lexicon: Interrogative temporal idiomático
  rationale: El latín introduce una pregunta de duración con ‘Vsquequo’; en español, ‘¿Hasta cuándo?’ reproduce con naturalidad la misma fuerza temporal sin sobretraducir.
- source_word: eos sustinebo
  english_pob_choice: shall I endure them
  chosen_spanish: los soportaré
  alternatives_spanish:
  - los aguantaré
  - los toleraré
  lexicon: sustinere
  rationale: ‘Sustinere’ aquí comunica soportar o tolerar; ‘los soportaré’ conserva el peso de la queja divina y suena digno en español, más cercano al registro de la pregunta original que ‘aguantaré’.
- source_word: quibus
  english_pob_choice: to whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - a los cuales
  - a quienes les
  lexicon: dativo relacional
  rationale: El dativo latino marca los beneficiarios de los dones; ‘a quienes’ mantiene esa relación personal y evita una construcción menos natural.
- source_word: tanta beneficia
  english_pob_choice: such great benefits
  chosen_spanish: tan grandes beneficios
  alternatives_spanish:
  - tantos grandes beneficios
  - beneficios tan grandes
  lexicon: beneficium
  rationale: ‘Beneficia’ se traduce de modo directo como ‘beneficios’; ‘tan grandes’ conserva la intensificación de ‘tanta’ sin forzar una formulación más abstracta.
theological_decisions:
- issue: Tono de reproche divino implícito en la pregunta
  english_pob_reading: How long shall I endure them, to whom I have given such great benefits?
  chosen_spanish_reading: ¿Hasta cuándo los soportaré, a quienes he dado tan grandes beneficios?
  alternative_spanish_readings:
  - ¿Hasta cuándo los toleraré...?
  - ¿Hasta cuándo tendré paciencia con ellos...?
  rationale: El latín presenta una queja o impaciencia en primera persona; se preserva el matiz de reproche sin suavizarlo en una mera observación neutral.
  doctrine_reference: Consistencia con el lenguaje bíblico de la paciencia/divina longanimidad cuando el texto la pone en tensión con el juicio o la queja
- issue: Identidad del sujeto implícito como hablante divino
  english_pob_reading: I have given
  chosen_spanish_reading: he dado
  alternative_spanish_readings:
  - les he dado
  - yo he dado
  rationale: El sujeto de primera persona se conserva implícito en español por la propia conjugación verbal, manteniendo la voz directa del hablante sin añadir énfasis innecesario.
  doctrine_reference: Primera persona divina en discurso directo
translation_notes:
  revision_awareness: La versión inglesa POB ofrecida (‘How long shall I endure them, to whom I have given such great benefits?’) coincide plenamente con el sentido del latín limpio de Bensly (‘Vsquequo eos sustinebo, quibus tanta beneficia contuli?’). No se registran revisiones aplicadas ni variantes textuales relevantes en el paquete de fuente; por tanto, la redacción española sigue de cerca el valor semántico y retórico del original sin introducir notas textuales.
  spanish_consistency_notes:
  - Se preserva ‘beneficios’ como equivalente de ‘beneficia’ para mantener la correspondencia léxica directa.
  - Se usa ‘soportaré’ en lugar de ‘aguantaré’ para conservar un registro más elevado y bíblico sin caer en calco rígido.
  - No se introduce ‘Señor’ ni otras expansiones, porque el texto fuente solo contiene una voz en primera persona sin identificación nominal del hablante en este versículo.
