review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del latín y del inglés POB: la invocación rechazada, la causa expresada por la sangre en las manos, y la prontitud para cometer homicidio. Sin embargo, «no los escucharé» suena menos preciso que la negativa judicial de atender la súplica; «no los oiré» o «no los escucharé» ambos son posibles, pero la primera se alinea mejor con «I will not hear you» y con el registro bíblico. Además, «han manchado» es comprensible, pero «han contaminado» preserva mejor el matiz moral/ritual de maculastis.'
  spanish_quality_summary: El español es claro y natural, pero una ligera revisión mejora la dignidad bíblica y la precisión semántica. «Cuando me invoquen» funciona bien. «No los oiré» resulta más sobrio y más cercano al uso bíblico que «no los escucharé». «Sus pies se apresuran a cometer homicidios» es inteligible y natural.
  glossary_alignment: No hay términos del glosario mayor en disputa. «Invocar» está bien elegido. «Homicidios» refleja adecuadamente homicidia. La revisión propuesta refuerza el matiz de impureza moral en maculastis con «contaminado».
  issues:
  - severity: medium
    issue: «no los escucharé» atenúa la fórmula judicial de rechazo
    rationale: El latín exaudiam y el inglés POB «I will not hear you» apuntan a no oír/atender la súplica. «Escuchar» en español puede sugerir proceso auditivo o disposición a prestar atención, pero «no los oiré» suena más bíblico y más estrechamente alineado con la formulación fuente.
  - severity: low
    issue: «han manchado sus manos con sangre» podría expresar menos claramente la contaminación moral/ritual
    rationale: Maculastis tiene un matiz más fuerte que mera suciedad física. «Han contaminado sus manos con sangre» preserva mejor la dimensión ética/ritual sin volverse antinatural en español bíblico.
  revised_spanish_text: Cuando me invoquen, no los oiré, porque han contaminado sus manos con sangre, y sus pies se apresuran a cometer homicidios.
  revision_rationale: Se ajusta «no los escucharé» a «no los oiré» para reflejar con mayor fidelidad el latín y el inglés POB en registro bíblico sobrio. Se cambia «han manchado» por «han contaminado» para conservar mejor el matiz de impureza moral/ritual de maculastis. No se requieren notas al pie.
