translation:
  language: es
  text: Cuando me invoquen, no los oiré, porque han contaminado sus manos con sangre, y sus pies se apresuran a cometer homicidios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Quando inuocabitis me
  english_pob_choice: When you call upon me
  chosen_spanish: Cuando me invoquen
  alternatives_spanish:
  - Cuando me llamen
  - Cuando me invoquen a mí
  lexicon: invocare
  rationale: '«Invocar» conserva el matiz religioso del latín y del inglés POB: no es solo llamar, sino dirigirse a Dios en súplica. «Me invoquen» suena natural en español y mantiene el objeto explícito.'
- source_word: non exaudiam uos
  english_pob_choice: I will not hear you
  chosen_spanish: no los escucharé
  alternatives_spanish:
  - no les oiré
  - no responderé a ustedes
  lexicon: exaudire
  rationale: «Escuchar» reproduce bien la negación divina de atender la súplica. «Oír» sería posible, pero en español puede sonar más débil; «no responderé» explicita la consecuencia, pero añade interpretación.
- source_word: maculastis enim manus uestras sanguine
  english_pob_choice: for you have defiled your hands with blood
  chosen_spanish: porque han manchado sus manos con sangre
  alternatives_spanish:
  - porque han contaminado sus manos con sangre
  - porque han ensangrentado sus manos
  lexicon: maculare
  rationale: «Manchado» conserva el sentido moral y ritual de impurificación sin forzar un tecnicismo. «Contaminado» es posible, pero menos idiomático aquí; «ensangrentado» enfatiza el resultado físico más que la culpa.
- source_word: pedes uestri inpigri sunt ad committenda homicidia
  english_pob_choice: and your feet are swift to commit murder
  chosen_spanish: y sus pies se apresuran a cometer homicidios
  alternatives_spanish:
  - y sus pies son veloces para cometer homicidios
  - y sus pies corren a cometer asesinatos
  lexicon: inpigri sunt ad committenda homicidia
  rationale: «Se apresuran» comunica la prontitud activa del latín. «Homicidios» sigue el valor más literal y general de homicidia; «asesinatos» sería más específico, pero estrecha el término.
theological_decisions:
- issue: Respuesta divina negada a causa de violencia culpable
  english_pob_reading: When you call upon me, I will not hear you, for you have defiled your hands with blood, and your feet are swift to commit murder.
  chosen_spanish_reading: Cuando me invoquen, no los escucharé, porque han manchado sus manos con sangre, y sus pies se apresuran a cometer homicidios.
  alternative_spanish_readings:
  - Cuando me invoquen, no los oiré...
  - Cuando me llamen, no los escucharé...
  rationale: El versículo presenta una negativa judicial de Dios ante manos manchadas de sangre y disposición activa a la violencia. La traducción mantiene esa conexión causal sin suavizarla ni convertirla en mera falta de atención.
  doctrine_reference: Responsabilidad moral; juicio divino ante derramamiento de sangre
- issue: Pluralidad de culpabilidad y generalización dirigida
  english_pob_reading: you have defiled your hands... your feet...
  chosen_spanish_reading: han manchado sus manos... sus pies se apresuran...
  alternative_spanish_readings:
  - han manchado vuestras manos...
  - han manchado las manos...
  rationale: Se conserva el plural directo del destinatario y la imputación colectiva. El español neutro moderno favorece «sus» como trato plural amplio y bíblicamente serio.
  doctrine_reference: Culpabilidad comunitaria; lenguaje profético de acusación
translation_notes:
  revision_awareness: La versión inglesa POB y la revisión más reciente permanecen sin cambios; el texto latino limpio coincide estrechamente con la traducción inglesa auditada, sin variantes textuales que exijan nota en español.
  spanish_consistency_notes:
  - Se mantiene «invoquen» para conservar el registro cultual y la relación con la llamada a Dios.
  - Se usa «homicidios» para reflejar la generalidad del latín homicidia sin introducir una especificación no atestiguada.
  - No se emplea «SEÑOR» ni «Cristo» porque el versículo no contiene esos términos en la fuente latina.
