review_pass:
  verdict: revise
  source_alignment_summary: 'El latín conservado dice: ''... proiciam uos sicut uentus stipulam. Et filii pro-''. La cláusula visible respalda con claridad ''I will cast you out like stubble before/by the wind''. La primera oración española (''Vuestra casa está desolada'') sigue el audit trail inglés, aunque el segmento latino mostrado parece truncado y no exhibe explícitamente ''domus''. La segunda oración necesita ajuste menor porque el latín compara a los destinatarios con ''stipulam'' movida por el viento, no simplemente ''ante el viento''.'
  spanish_quality_summary: El borrador es legible y digno, pero mezcla registro peninsular ('vuestra', 'os') con el objetivo neutral latinoamericano. Además, 'como paja ante el viento' es comprensible, pero 'como paja que se lleva el viento' expresa mejor la fuerza de la imagen en español natural.
  glossary_alignment: 'Hay una desviación del estándar del proyecto: para el título divino, el proyecto prefiere ''Yahvé'' donde corresponda a יהוה/YHWH. Aquí, sin embargo, la evidencia inmediata es latín ''Dominus'' y el audit trail inglés da ''the Lord Almighty''; dada la falta de evidencia hebrea/griega directa en el paquete, no conviene forzar ''Yahvé'' en esta revisión. ''Señor Todopoderoso'' es aceptable en este caso. No hay otros términos glosariales clave involucrados.'
  issues:
  - severity: medium
    issue: Registro pronominal no ideal para español meta neutral
    rationale: '''Vuestra ... Os arrojaré'' suena más peninsular que neutral latinoamericano. ''Su casa ... los arrojaré'' o ''la casa de ustedes ... los arrojaré'' sería más acorde con la guía de estilo amplia y eclesial.'
  - severity: medium
    issue: La imagen de 'sicut uentus stipulam' puede expresarse con más fidelidad idiomática
    rationale: '''Como paja ante el viento'' no es incorrecto, pero en español natural la idea de ser barridos por el viento se transmite mejor con ''como paja que se lleva el viento'' o ''como rastrojo que el viento arrastra''.'
  revised_spanish_text: 'Así dice el Señor Todopoderoso: Su casa está desolada. Los arrojaré como paja que se lleva el viento.'
  revision_rationale: Se hizo una reparación menor para adecuar el registro al español neutral latinoamericano y para reflejar con más naturalidad y precisión la imagen latina de paja/rastrojo arrastrada por el viento. Se conserva 'Señor Todopoderoso' por falta de evidencia inmediata suficiente para imponer 'Yahvé' desde el latín dado.
