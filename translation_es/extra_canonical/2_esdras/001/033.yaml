translation:
  language: es
  text: 'Así dice el Señor Todopoderoso: Su casa está desolada. Los arrojaré como paja que se lleva el viento.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: serta est
  english_pob_choice: Your house is desolate.
  chosen_spanish: Vuestra casa está desolada.
  alternatives_spanish:
  - Vuestra casa ha quedado desierta.
  - Vuestra casa está abandonada.
  lexicon: desolare / desolatus
  rationale: El latín apoya una condición de desolación o ruina, no solo una casa vacía. «Está desolada» conserva el estado resultante y es natural en español bíblico contemporáneo.
- source_word: proiciam uos
  english_pob_choice: I will cast you out
  chosen_spanish: Os arrojaré
  alternatives_spanish:
  - Os echaré fuera
  - Os expulsaré
  lexicon: proicere
  rationale: El verbo latino expresa arrojar o echar lejos. «Arrojaré» mantiene la fuerza de expulsión y el movimiento violento implícito en la imagen.
- source_word: sicut uentus stipulam
  english_pob_choice: like stubble before the wind
  chosen_spanish: como paja ante el viento
  alternatives_spanish:
  - como rastrojo ante el viento
  - como hojarasca ante el viento
  lexicon: stipula
  rationale: «Stipula» es rastrojo/paja seca. En español, «paja» transmite bien la imagen de algo liviano e indefenso; «ante el viento» conserva la comparación de ser barridos por él.
theological_decisions:
- issue: Título divino para Dominus/κύριος en la fórmula profética
  english_pob_reading: Thus says the Lord Almighty
  chosen_spanish_reading: Así dice el Señor Todopoderoso
  alternative_spanish_readings:
  - Así dice Yahvé Todopoderoso
  - Así dice el Señor de los ejércitos
  rationale: La fórmula profética del contexto inglés fija «Lord Almighty» como título divino. En esta línea, «Señor Todopoderoso» reproduce la solemnidad y mantiene coherencia con el habla bíblica española sin introducir una reconstrucción distinta del nombre divino que no aparece explícita en el latín dado.
  doctrine_reference: Tetragrámaton / título divino profético
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el pasaje. La concordancia entre el texto latino limpio y la versión inglesa auditada es alta; por eso la traducción española sigue de cerca la imagen del original sin introducir notas textuales.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y directo.
  - «Vuestra» y «os» conservan la segunda persona plural del texto inglés.
  - La imagen de expulsión se expresa con un verbo fuerte («arrojaré») para conservar la violencia retórica del latín.
