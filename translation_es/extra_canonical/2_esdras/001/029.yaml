translation:
  language: es
  text: para que ustedes fueran mi pueblo, y yo fuera su Dios, y ustedes fueran mis hijos varones[a], y yo fuera su padre?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hijos’. El latín filios es masculino plural, por lo que también puede traducirse ‘hijos varones’ para conservar más explícitamente la relación padre-hijos del contexto.
    reason: Preservar la decisión léxica del POB inglés de mantener ‘sons’ y, a la vez, señalar la opción española más natural.
lexical_decisions:
- source_word: in populum
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo
  lexicon: populus -> pueblo
  rationale: ‘Pueblo’ reproduce el vínculo bíblico de pertenencia y alianza que el inglés POB expresa con ‘my people’. ‘Gente’ sería más genérico y menos marcado en clave de pacto.
- source_word: in deum
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - su Dios
  lexicon: Deus -> Dios
  rationale: Se conserva el sentido relacional de posesión/covenio. En español neutral de publicación, ‘su Dios’ resulta natural y evita marcar número de manera innecesaria; el contexto plural garantiza la referencia.
- source_word: in filios
  english_pob_choice: my sons
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mis hijos
  - mis varones
  lexicon: filii/filios -> hijos/varones
  rationale: Aunque el latín dice ‘filios’ y el audit trail inglés fija ‘sons’, en español ‘hijos’ comunica la relación paterna con naturalidad y sin forzar un masculino técnico poco idiomático. El contexto inmediato ya preserva la filiación. Se mantiene la tensión lexical de género sin una nota doctrinal adicional porque el español no dispone de un equivalente breve y digno para ‘sons’ que no suene artificial.
- source_word: in patrem
  english_pob_choice: my father
  chosen_spanish: su padre
  alternatives_spanish:
  - su padre
  lexicon: pater -> padre
  rationale: ‘Padre’ es la correspondencia directa y conserva la metáfora relacional del texto latino.
theological_decisions:
- issue: 'Lenguaje de pacto: ‘pueblo/Dios/hijos/padre’'
  english_pob_reading: that you should be my people, and I should be your God, and you should be my sons, and I should be your father?
  chosen_spanish_reading: para que ustedes fueran mi pueblo, y yo fuera su Dios, y ustedes fueran mis hijos, y yo fuera su padre?
  alternative_spanish_readings:
  - para que ustedes fueran mi pueblo, y yo fuera su Dios, y ustedes fueran mis hijos, y yo fuera su padre?
  rationale: Se mantiene la cadencia de promesa relacional del original latino sin añadir explicaciones. La formulación expresa alianza y filiación espiritual de forma transparente en español.
  doctrine_reference: Éxodo 6:7; Oseas 2:23; 2 Corintios 6:18
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión desde ‘children’ a ‘sons’ para respetar el vínculo léxico de filios con el campo paterno/filial. El español no puede replicar esa distinción con la misma nitidez sin sonar forzado; por eso se eligió ‘hijos’ en el texto principal, manteniendo una nota que explicita la tensión entre el valor masculino del latín y la naturalidad idiomática española. También se tuvo en cuenta la revisión menor de estilo que eliminó un ‘that’ redundante en inglés; en español se resolvió con una sintaxis fluida pero cercana a la estructura del latín.
  spanish_consistency_notes:
  - Se usa ‘Dios’ sin mayúsculas especiales adicionales fuera del sustantivo propio estándar.
  - Se conserva el paralelismo anafórico ‘y yo fuera... y ustedes fueran...’ para reflejar el ritmo del latín.
  - Se evita ‘SEÑOR’ porque el texto fuente es latino y no hay un tetragrámaton explícito aquí.
