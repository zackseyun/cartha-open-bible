translation:
  language: es
  text: Pero tú, sacude el cabello de tu cabeza y arroja todos los males sobre ellos, porque no han obedecido mi ley; son un pueblo indisciplinado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un pueblo sin disciplina».
    reason: alternative_nuance
lexical_decisions:
- source_word: Tu autem
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Mas tú
  - Y tú
  lexicon: Latin tu + autem
  rationale: Conservo el contraste adversativo de autem con «pero» y mantengo el énfasis directo en la segunda persona con «tú».
- source_word: excute comam capitis tui
  english_pob_choice: shake out the hair of your head
  chosen_spanish: sacude el cabello de tu cabeza
  alternatives_spanish:
  - sacude el pelo de tu cabeza
  - desenreda y sacude el cabello de tu cabeza
  lexicon: Latin excutere + coma capitis
  rationale: «Sacude» reproduce la acción física de excutere. «Cabello» es más digno y natural en español bíblico que «pelo», sin perder el sentido literal de la frase.
- source_word: proice omnia mala super illos
  english_pob_choice: cast all evils upon them
  chosen_spanish: arroja todos los males sobre ellos
  alternatives_spanish:
  - echa todos los males sobre ellos
  - arroja todo mal sobre ellos
  lexicon: Latin proicere + omnia mala super illos
  rationale: Mantengo el plural «males» porque el latín dice omnia mala; «arroja» conserva la fuerza imperativa y el valor figurado de lanzar encima de otros.
- source_word: non obaudierunt legi meae
  english_pob_choice: they have not obeyed my law
  chosen_spanish: no han obedecido mi ley
  alternatives_spanish:
  - no han escuchado mi ley
  - no han obedecido a mi ley
  lexicon: Latin obaudire + lex
  rationale: «Obedecido» expresa bien la desobediencia a la ley. «Ley» traduce lex de forma directa; no la suavizo como «instrucción» porque aquí el texto presenta una norma vinculante.
- source_word: populus ... indisciplinatus
  english_pob_choice: they are an undisciplined people
  chosen_spanish: son un pueblo indisciplinado
  alternatives_spanish:
  - son un pueblo indócil
  - son un pueblo rebelde
  lexicon: Late Latin indisciplinatus
  rationale: Sigo la revisión más reciente y el valor léxico de indisciplinatus como «sin disciplina, no instruido/indisciplinado». «Rebelde» sería demasiado fuerte y desplace el matiz concreto de falta de disciplina o formación.
theological_decisions:
- issue: Cómo reflejar la calificación del pueblo al final de la frase
  english_pob_reading: they are an undisciplined people
  chosen_spanish_reading: son un pueblo indisciplinado
  alternative_spanish_readings:
  - son un pueblo rebelde
  - son un pueblo sin instrucción
  rationale: La revisión auditada corrigió «rebellious» a «undisciplined» por fidelidad al latín indisciplinatus. En español, «indisciplinado» mantiene esa tensión entre falta de obediencia y falta de formación, sin convertirla en una acusación doctrinal distinta.
  doctrine_reference: Fidelidad lexical al latín tardío; disciplina/obediencia al mandamiento
- issue: Arrojar los males sobre ellos como acto profético
  english_pob_reading: cast all evils upon them
  chosen_spanish_reading: arroja todos los males sobre ellos
  alternative_spanish_readings:
  - echa todos los males sobre ellos
  - derrama todos los males sobre ellos
  rationale: Conservo la imagen profética de transferencia o imposición de males sin reinterpretarla. «Arroja» es suficientemente vívida y no atenúa el imperativo.
  doctrine_reference: Lenguaje profético de juicio
translation_notes:
  revision_awareness: La versión inglesa fue revisada a partir de una lectura del latín tardío, corrigiendo una alternativa previa «rebellious people» a «undisciplined people». La propuesta española sigue esa revisión y evita reintroducir «rebelde» en el texto principal, aunque la conserva como alternativa anotada.
  spanish_consistency_notes:
  - He usado «ley» para lex y no «instrucción», porque el contexto inmediato habla de obediencia a una norma vinculante.
  - He preferido «indisciplinado» para reflejar la revisión auditada del latín indisciplinatus.
  - He mantenido la segunda persona singular y el imperativo en paralelo con el latín.
  - No he capitalizado «ley» ni «males», en coherencia con el español bíblico moderno y el texto fuente.
