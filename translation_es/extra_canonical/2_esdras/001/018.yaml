translation:
  language: es
  text: 'diciendo: «¿Por qué nos has traído a este desierto, para matarnos? Mejor nos hubiera sido servir a los egipcios que morir en este desierto».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: adduxisti
  english_pob_choice: you have brought us
  chosen_spanish: nos has traído
  alternatives_spanish:
  - nos trajiste
  - nos has conducido
  lexicon: adduco
  rationale: «Traído» reproduce bien la acción de llevar a un lugar con la carga causal del contexto; el presente perfecto español comunica el resultado actual del acto, como en el inglés POB.
- source_word: desertum istud
  english_pob_choice: this wilderness
  chosen_spanish: este desierto
  alternatives_spanish:
  - este yermo
  - esta soledad
  lexicon: desertum
  rationale: «Desierto» es el equivalente natural y transparente en español para el espacio inhóspito del relato; conserva el valor geográfico y de privación del latino.
- source_word: interficere
  english_pob_choice: to kill us
  chosen_spanish: para matarnos
  alternatives_spanish:
  - para darnos muerte
  - para asesinarnos
  lexicon: interficio
  rationale: «Matar» es la forma más directa y fiel al latín; evita intensificar indebidamente con «asesinar».
- source_word: seruire Aegyptiis
  english_pob_choice: to serve the Egyptians
  chosen_spanish: servir a los egipcios
  alternatives_spanish:
  - ser esclavos de los egipcios
  - servirles a los egipcios
  lexicon: servio
  rationale: El latín usa el infinitivo simple «seruire», que en este contexto puede abarcar servicio sometido; mantengo «servir» porque el texto latino no explicita aquí la palabra para esclavitud, aunque el sentido narrativo implica sujeción.
- source_word: melius nobis fuerat
  english_pob_choice: It would have been better for us
  chosen_spanish: Mejor nos hubiera sido
  alternatives_spanish:
  - Nos habría sido mejor
  - Mejor nos habría convenido
  lexicon: melior
  rationale: La construcción española conserva la comparación hipotética del latín y el tono proverbial/quejoso del pasaje.
- source_word: mori in desertum
  english_pob_choice: to die in this wilderness
  chosen_spanish: morir en este desierto
  alternatives_spanish:
  - perecer en este desierto
  - morir en este yermo
  lexicon: morior
  rationale: «Morir» refleja sin añadido interpretativo el verbo latino; mantiene el paralelismo con «este desierto».
theological_decisions:
- issue: Sujeción a Egipto vs. esclavitud explícita
  english_pob_reading: serve the Egyptians
  chosen_spanish_reading: servir a los egipcios
  alternative_spanish_readings:
  - ser esclavos de los egipcios
  - quedar sometidos a los egipcios
  rationale: El latín preservado dice simplemente «seruire»; aunque el contexto histórico supone esclavitud, en esta línea no se añade la explicitación para no sobrecargar el verso más allá del texto base.
  doctrine_reference: Éxodo 14:12; 2 Esdras 1:18
- issue: Reproche del pueblo en forma de pregunta retórica
  english_pob_reading: Why have you brought us into this wilderness, to kill us?
  chosen_spanish_reading: ¿Por qué nos has traído a este desierto, para matarnos?
  alternative_spanish_readings:
  - ¿Por qué nos trajiste a este desierto para matarnos?
  - ¿Para qué nos has traído a este desierto, a fin de matarnos?
  rationale: Se conserva el carácter de queja y acusación directa del inglés POB y del latín, sin suavizar la fuerza retórica de la pregunta.
  doctrine_reference: Éxodo 16:3; Números 14:2-3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el chequeo cruzado reportó alta concordancia (1.0). Por ello, el español se ajusta estrechamente al sentido del latín limpio de Bensly, sin introducir notas textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene el trato directo en segunda persona singular («has traído») conforme al reproche del pasaje.
  - «Desierto» se usa de manera uniforme para desertum y conserva la imaginería bíblica estándar en español.
  - No se introducen términos confesionales ajenos al latín de base; la formulación permanece sobria y literal donde corresponde.
