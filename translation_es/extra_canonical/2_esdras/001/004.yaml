lexical_decisions:
- source_word: Et factum est uerbum domini ad me dicens
  english_pob_choice: And the word of the Lord came to me, saying,
  chosen_spanish: 'Y vino a mí la palabra del Señor, diciendo:'
  alternatives_spanish:
  - 'Y aconteció la palabra del Señor a mí, diciendo:'
  - 'Y la palabra del Señor llegó a mí, diciendo:'
  lexicon: verbum; dominus; dicens
  rationale: La construcción latina expresa la irrupción de una palabra profética dirigida al hablante. En español, «vino a mí la palabra» reproduce con naturalidad esa llegada/iniciativa divina sin cargar el texto con un calco innecesario. «Señor» corresponde aquí al latín dominus del texto fuente; no hay indicio en este versículo de una sustitución que obligue a usar otra forma.
theological_decisions:
- issue: Autoridad y origen divino de la revelación profética
  english_pob_reading: And the word of the Lord came to me, saying,
  chosen_spanish_reading: 'Y vino a mí la palabra del Señor, diciendo:'
  alternative_spanish_readings:
  - 'Y llegó a mí la palabra del Señor, diciendo:'
  - 'Y la palabra del Señor vino a mí, diciendo:'
  rationale: La frase mantiene que la iniciativa de la comunicación es de Dios y que el contenido que sigue es palabra recibida, no inventada por el profeta. No se introduce interpretación doctrinal adicional; solo se conserva el marco revelatorio del enunciado.
  doctrine_reference: Revelación profética
translation_notes:
  revision_awareness: El veredicto de revisión indica alta concordancia y ningún cambio necesario; por tanto, la redacción sigue de cerca el sentido ya asentado en el audit trail inglés y el latín limpio fuente.
  spanish_consistency_notes:
  - Se usa «Señor» para dominus en este versículo, conforme al texto latino fuente y sin evidencia contextual de un nombre divino escrito de otra forma.
  - Se mantiene una puntuación introductoria con dos puntos al final, reflejando el «saying,» del inglés y el latín dicens.
