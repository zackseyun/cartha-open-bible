translation:
  language: es
  text: No han visto, y recordarán su antigüedad[a]. Pongo por testigo
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus tiempos antiguos». El latín *antiquitatum eorum* puede entenderse como «su antigüedad», «sus tiempos antiguos» o, de modo más amplio, «las cosas antiguas de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: non uiderunt
  english_pob_choice: They have not seen
  chosen_spanish: No han visto
  alternatives_spanish:
  - No vieron
  - No han contemplado
  lexicon: Latín non + videre
  rationale: El latín niega la acción de ver; «No han visto» conserva el tiempo verbal abierto del perfecto y su fuerza resultativa sin añadir un objeto no atestiguado. Se evita introducir «profetas», que no está en el texto fuente.
- source_word: memorabuntur
  english_pob_choice: they will remember
  chosen_spanish: recordarán
  alternatives_spanish:
  - se acordarán
  - recordarán en su memoria
  lexicon: Latín memorari / memorabuntur
  rationale: El futuro pasivo latino en este contexto expresa que algo llegará a ser recordado. «Recordarán» comunica bien en español la acción memorial sin sobrecargar la frase.
- source_word: antiquitatum eorum
  english_pob_choice: their antiquity
  chosen_spanish: su antigüedad
  alternatives_spanish:
  - sus tiempos antiguos
  - las cosas antiguas de ellos
  - sus antigüedades
  lexicon: Latín antiquitas
  rationale: La forma latina es ambigua entre «antigüedad», «tiempos antiguos» o incluso «cosas antiguas». «Su antigüedad» mantiene esa amplitud y sigue de cerca la revisión inglesa más reciente, sin fijar indebidamente el sentido en un solo aspecto.
- source_word: Testor
  english_pob_choice: I call to witness
  chosen_spanish: Yo llamo a testigo
  alternatives_spanish:
  - Doy testimonio
  - Yo testifico
  - Pongo por testigo
  lexicon: Latín testor
  rationale: «Testor» admite un valor solemne de invocación testimonial. «Yo llamo a testigo» reproduce ese matiz mejor que un simple «testifico», y preserva el arranque de la siguiente cláusula.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que eliminó la repetición accidental, descartó «profetas» por no estar en el latín dado y prefirió una traducción más natural de *memorabuntur antiquitatum eorum* como «they will remember their antiquity». La versión española sigue esa decisión y conserva la ambigüedad legítima con una nota.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento neutral y público de la línea, evitando arcaísmos innecesarios.
  - Se evitó traducir mecánicamente desde la versión inglesa anterior cuando ésta había sido corregida por la revisión del latín.
  - La nota textual en español preserva la ambigüedad semántica del sintagma latino sin expandir el contenido más allá de la evidencia.
