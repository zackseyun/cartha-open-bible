  text: El segundo libro de Esdras, el profeta, hijo de Seraías, hijo de Azarías, hijo de Hilquías, hijo de Salum, hijo de Sadoc, hijo de Ahitub,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Liber Ezrae prophetae secundus
  english_pob_choice: The second book of Ezra the prophet
  chosen_spanish: El segundo libro de Esdras el profeta
  alternatives_spanish:
  - El segundo libro de Ezra el profeta
  - El segundo libro de Esdras, profeta
  lexicon: Liber -> libro; secundus -> segundo; prophetae -> el profeta / del profeta
  rationale: Se conserva la estructura nominal del latín y la identificación de la obra como un ‘libro’. Se usa ‘Esdras’ como forma española establecida, con ‘el profeta’ para reflejar el genitivo latino sin añadir explicación inexistente.
- source_word: filii Sarei
  english_pob_choice: son of Seraiah
  chosen_spanish: hijo de Seraías
  alternatives_spanish:
  - hijo de Seraíah
  - hijo de Seraía
  lexicon: filii -> hijo de; Sarei -> Seraías
  rationale: Se vierte la cadena genealógica con la fórmula natural en español. ‘Seraías’ es la forma castellana habitual del nombre hebreo.
- source_word: filii Azarei
  english_pob_choice: son of Azariah
  chosen_spanish: hijo de Azarías
  alternatives_spanish:
  - hijo de Azaríah
  lexicon: filii -> hijo de; Azarei -> Azarías
  rationale: Se mantiene la sucesión genealógica y la forma española normal del nombre propio.
- source_word: filii Helchiae
  english_pob_choice: son of Hilkiah
  chosen_spanish: hijo de Hilquías
  alternatives_spanish:
  - hijo de Hiquías
  lexicon: filii -> hijo de; Helchiae -> Hilquías
  rationale: Se conserva el nombre tradicional en español y la repetición genealógica sin expansión interpretativa.
- source_word: filii Salame
  english_pob_choice: son of Shallum
  chosen_spanish: hijo de Salum
  alternatives_spanish:
  - hijo de Sallum
  - hijo de Shallum
  lexicon: filii -> hijo de; Salame -> Salum
  rationale: El latín presenta una forma latinizada del nombre; ‘Salum’ refleja la forma española breve y evita una transliteración innecesariamente pesada.
- source_word: filii Sadoch
  english_pob_choice: son of Zadok
  chosen_spanish: hijo de Sadoq
  alternatives_spanish:
  - hijo de Sadoc
  - hijo de Zadoq
  lexicon: filii -> hijo de; Sadoch -> Sadoq
  rationale: Se conserva el valor consonántico del nombre semítico mediante ‘q’, que es una transliteración más cercana al original que ‘c’. La forma ‘Sadoq’ es transparente y auditable, aunque ‘Sadoc’ es una alternativa española tradicional.
- source_word: filii Acitob
  english_pob_choice: son of Ahitub
  chosen_spanish: hijo de Ahitub
  alternatives_spanish:
  - hijo de Ajitub
  - hijo de Akitub
  lexicon: filii -> hijo de; Acitob -> Ahitub
  rationale: Se mantiene la cadena genealógica con la forma española habitual del nombre. El latín ‘Acitob’ se normaliza a la forma semítica más reconocible en español.
theological_decisions:
- issue: Uso del título ‘el profeta’ en una apertura genealógica
  english_pob_reading: The second book of Ezra the prophet
  chosen_spanish_reading: El segundo libro de Esdras el profeta
  alternative_spanish_readings:
  - El segundo libro de Esdras, el profeta
  - El segundo libro del profeta Esdras
  rationale: Se sigue la lectura inglesa sin convertirla en una aposición editorial distinta. La frase conserva el valor identificador del texto fuente, sin introducir una estructura más interpretativa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios y la verificación cruzada mostró alto acuerdo; por tanto, se preserva la lectura estable sin añadir notas textuales.
  spanish_consistency_notes:
  - Se usa ‘Esdras’ en lugar de ‘Ezra’ para coherencia con el español bíblico.
  - Se conserva la serie genealógica con ‘hijo de’ repetido, como en el original y en la POB inglesa.
  - Se opta por transliteraciones bíblicas españolas estables cuando existen; cuando la forma latina es muy cercana al hebreo, se refleja una transliteración auditable sin forzar modernizaciones ajenas al texto.
