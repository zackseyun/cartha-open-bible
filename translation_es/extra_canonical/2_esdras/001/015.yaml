    changes_summary: Removed the unsupported addition 'I gave you' and the interpretive expansion 'for protection.' Revised 'a camp' to 'camps' to reflect the plural castra and preserve completeness more literally.
translation:
  language: es
  text: 'Pero ustedes me han olvidado, dice Yahvé. Así dice Yahvé Todopoderoso: La codorniz fue para ustedes una señal; el campamento fue para ustedes.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: uos autem mei obliti estis
  english_pob_choice: But you have forgotten me
  chosen_spanish: Pero ustedes me han olvidado
  alternatives_spanish:
  - Pero ustedes se han olvidado de mí
  - Pero ustedes me olvidaron
  lexicon: oblivisci / olvidar
  rationale: El latín expresa olvido de una persona con el pronombre en acusativo/mei; en español la forma más natural y fiel es «me han olvidado», que conserva la relación personal y el contraste con la fidelidad debida a Yahvé.
- source_word: dicit dominus
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - dice Yahvé
  - declara el Señor
  lexicon: dico / decir
  rationale: Se mantiene la fórmula profética breve y directa. En este segmento el texto latino usa dominus; en español se conserva «el Señor» como equivalente heredado de la cita, sin forzar una expansión que el contexto inmediato no exige.
- source_word: dominus omnipotens
  english_pob_choice: the Lord Almighty
  chosen_spanish: el Señor Todopoderoso
  alternatives_spanish:
  - el Señor omnipotente
  - el Señor, el Todopoderoso
  lexicon: omnipotens
  rationale: «Todopoderoso» reproduce con naturalidad el título divino y mantiene el carácter solemne de la fórmula latina.
- source_word: coturnix uobis in signo fuit
  english_pob_choice: Quail were a sign for you
  chosen_spanish: La codorniz fue para ustedes una señal
  alternatives_spanish:
  - Las codornices fueron una señal para ustedes
  - La codorniz les sirvió de señal
  lexicon: coturnix
  rationale: Aunque el sustantivo latino puede entenderse colectivamente, en español la singular colectiva «la codorniz» suena más natural y permite conservar el valor de signo. Se evita añadir información no presente en el latín.
- source_word: castra uobis
  english_pob_choice: camps were for you
  chosen_spanish: los campamentos fueron para ustedes
  alternatives_spanish:
  - el campamento fue para ustedes
  - los campamentos estaban para ustedes
  lexicon: castra
  rationale: Se opta por el plural «los campamentos» para reflejar el plural latino castra y seguir la revisión inglesa más literal. En español es una traducción válida y auditable del plural latino, aunque el término puede funcionar colectivamente.
theological_decisions:
- issue: La referencia al pueblo olvidando a Dios y el uso del título divino
  english_pob_reading: But you have forgotten me, says the Lord. Thus says the Lord Almighty
  chosen_spanish_reading: Pero ustedes me han olvidado, dice el Señor. Así dice el Señor Todopoderoso
  alternative_spanish_readings:
  - Pero ustedes me han olvidado, dice Yahvé
  - Pero ustedes se han olvidado de mí, dice el Señor
  rationale: El texto acusa una infidelidad relacional directa. Se conserva el contraste entre el recuerdo debido a Dios y el olvido humano, sin suavizar la censura ni ampliar la frase.
  doctrine_reference: Fidelidad del pacto; memoria del pueblo hacia Dios
- issue: El valor de 'señal' en el episodio de la codorniz y el campamento
  english_pob_reading: Quail were a sign for you; camps were for you
  chosen_spanish_reading: La codorniz fue para ustedes una señal; los campamentos fueron para ustedes
  alternative_spanish_readings:
  - Las codornices fueron una señal para ustedes; el campamento fue para ustedes
  - La codorniz fue una señal para ustedes; el campamento fue para ustedes
  rationale: 'Se preserva la tensión del enunciado: la codorniz funciona explícitamente como señal, y castra se deja como un dato literal sin convertirlo en explicación teológica adicional. La forma plural mantiene la huella del latín y de la revisión inglesa.'
  doctrine_reference: Señales en la historia del éxodo / provisión divina
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: se eliminó cualquier expansión como «para protección» y no se añadió «yo les di». También se reflejó la decisión revisada sobre castra con un plural literal en español, en lugar de una ampliación interpretativa. La nota al pie se ancla en el olvido del versículo y no introduce ninguna lectura no atestiguada.'
  spanish_consistency_notes:
  - Se mantuvo un registro solemne y bíblico, pero con español natural.
  - No se sustituyó 'Señor' por 'Yahvé' en el cuerpo porque el latín fuente usa dominus; se dejó constancia de la decisión en las notas.
  - Se evitó traducir mecánicamente el plural latino con una construcción artificial; 'los campamentos' preserva la literalidad sin sonar extraño.
  - La única nota al pie está anclada en el verbo 'han olvidado', donde existe una leve alternativa semántica de formulación.
