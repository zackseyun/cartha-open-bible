translation:
  language: es
  text: hijos de Aarón[a], de la tribu de Leví, que fueron cautivos en la región de los medos, en el reinado de Artajerjes, rey de los persas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que eran cautivos». El latín captiuus con fuit expresa estado de cautiverio, no necesariamente la acción de ser apresados.'
    reason: alternative_reading
lexical_decisions:
- source_word: Filii Aaron
  english_pob_choice: sons of Aaron
  chosen_spanish: hijos de Aarón
  alternatives_spanish:
  - descendientes de Aarón
  - hijos de Aarón
  lexicon: filii = hijos; Aaron = Aarón
  rationale: El latín plural Filii Aaron exige plural en español. 'Hijos de Aarón' reproduce el parentesco/linaje de manera natural y fiel, sin convertirlo en una paráfrasis más amplia como 'descendientes'.
- source_word: tribu Leui
  english_pob_choice: of the tribe of Levi
  chosen_spanish: de la tribu de Leví
  alternatives_spanish:
  - de la tribu de Leví
  - pertenecientes a la tribu de Leví
  lexicon: tribus = tribu; Leui = Leví
  rationale: La construcción posesiva simple es la más directa y clara en español bíblico contemporáneo. 'De la tribu de Leví' conserva el sentido genealógico sin añadir matices no presentes en el latín.
- source_word: qui fuit captiuus
  english_pob_choice: who were captives
  chosen_spanish: que eran cautivos
  alternatives_spanish:
  - que fueron cautivos
  - que estaban cautivos
  lexicon: captiuus = cautivo; fuit = era/fue
  rationale: El audit trail inglés corrigió la lectura a una condición de cautiverio, no a la acción de ser capturado. En español, 'eran cautivos' comunica el estado resultante y preserva el valor adjetival de captiuus.
- source_word: in regione Medorum
  english_pob_choice: in the region of the Medes
  chosen_spanish: en la región de los medos
  alternatives_spanish:
  - en la región de los medos
  - en la tierra de los medos
  lexicon: regio = región; Medi = medos
  rationale: '''Región'' refleja bien el latín regio y evita sobrerrepresentar una terminología territorial más específica de la que el texto ofrece.'
- source_word: in regno Artaxersis regis Persarum
  english_pob_choice: in the reign of Artaxerxes king of the Persians
  chosen_spanish: en el reinado de Artajerjes, rey de los persas
  alternatives_spanish:
  - en el reinado de Artajerjes, rey de los persas
  - durante el reinado de Artajerjes, rey de los persas
  lexicon: regnum = reinado; rex = rey; Persae = persas
  rationale: '''Reinado'' conserva el valor temporal-político de regno. ''Artajerjes'' y ''persas'' son las formas estándar en español, y la coma evita ambigüedad sintáctica.'
theological_decisions:
- issue: Identidad y estado de los cautivos
  english_pob_reading: who were captives
  chosen_spanish_reading: que eran cautivos
  alternative_spanish_readings:
  - que fueron cautivos
  - que estaban cautivos
  rationale: 'No hay tensión doctrinal, pero sí una decisión textual relevante: el latín describe una condición (''captiuus'') más que un evento. La traducción española mantiene ese estado para no ocultar la gramática del original.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que corrigió el singular al plural y la que pasó de 'was taken captive' a 'was a captive'. Por eso la versión española usa plural ('hijos', 'eran cautivos') y refleja el estado de cautiverio del latín, no el acto de captura.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del texto porque no aparece en este versículo.
  - 'Se conservaron nombres propios bíblicos en formas españolas estándar: Aarón, Leví, Artajerjes, persas.'
  - La puntuación sigue el orden latino e inglés auditado, con una lectura fluida en español.
