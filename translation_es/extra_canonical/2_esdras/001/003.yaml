  to: hijos de Aarón[a], de la tribu de Leví, que fueron cautivos en la región de los medos, en el reinado de Artajerjes, rey de los persas.
  rationale: Se ajusta «eran» a «fueron» para reflejar mejor el valor de fuit en el latín y alinearse con la auditoría inglesa, manteniendo en nota la aclaración de que el original describe condición de cautiverio más que el acto de captura.
