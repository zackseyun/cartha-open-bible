translation:
  language: es
  text: Les daré sus casas a un pueblo que viene[a], que, sin oírme, cree; al cual no he mostrado señales, y aun así hará lo que he mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que, aunque no me han oído, creerán». La forma latina conservada aquí usa presente («credunt») y participio presente («audientes»), no futuro ni pasado; por eso el texto principal dice «sin oírme, cree».
    reason: alternative_reading
lexical_decisions:
- source_word: domus uestras
  english_pob_choice: your houses
  chosen_spanish: sus casas
  alternatives_spanish:
  - vuestras casas
  - sus hogares
  lexicon: domus
  rationale: «domus» se refiere a casas como posesión; «sus casas» comunica el traslado de propiedad sin forzar una construcción más técnica. «Vuestras» sería más literal al tú/vosotros implícito, pero el español bíblico moderno aquí suena más natural con un destinatario colectivo de tercera persona en el contexto profético.
- source_word: populo uenienti
  english_pob_choice: to a people that is coming
  chosen_spanish: a un pueblo que viene
  alternatives_spanish:
  - a un pueblo venidero
  - a un pueblo que está viniendo
  lexicon: populus
  rationale: «pueblo» conserva el colectivo; «que viene» sigue el participio presente latino «uenienti» sin convertirlo en futuro. Se evita «venidero», que suena más abstracto y menos verbal.
- source_word: me non audientes
  english_pob_choice: without hearing me
  chosen_spanish: sin oírme
  alternatives_spanish:
  - que no me oyen
  - sin haberme oído
  lexicon: audio
  rationale: La revisión latina remarca una acción presente, no pasada. «Sin oírme» expresa la simultaneidad del no escuchar con el creer, y mantiene la tensión entre oír y creer.
- source_word: credunt
  english_pob_choice: believe
  chosen_spanish: cree
  alternatives_spanish:
  - creen
  - creerán
  lexicon: credo
  rationale: El latín está en presente indicativo. En español, el verbo puede funcionar con valor genérico; «cree» conserva la forma verbal simple y la idea de una fe actual, aunque el sujeto colectivo favorece también «creen». Se deja el matiz abierto sin imponer futuro.
- source_word: quibus signa non ostendi
  english_pob_choice: to whom I have shown no signs
  chosen_spanish: a quienes no he mostrado señales
  alternatives_spanish:
  - a quienes no les he mostrado señales
  - a los cuales no he mostrado señales
  lexicon: signum
  rationale: «señales» traduce «signa» en el registro bíblico. «No he mostrado» sigue el perfecto latino y expresa la ausencia de signos dados por Dios.
- source_word: facient quae praecepi
  english_pob_choice: yet they will do what I have commanded
  chosen_spanish: y aun así harán lo que he mandado
  alternatives_spanish:
  - y harán lo que he mandado
  - y harán lo que ordené
  lexicon: facio / praecipio
  rationale: El latín usa futuro («facient») y un mandato previo («praecepi»). «Y aun así harán» preserva el contraste con la falta de señales y mantiene la futuridad del verbo principal.
theological_decisions:
- issue: Fe que surge sin señales previas
  english_pob_reading: who, without hearing me, believe; to whom I have shown no signs, yet they will do what I have commanded
  chosen_spanish_reading: que, sin oírme, cree; a quienes no he mostrado señales, y aun así harán lo que he mandado
  alternative_spanish_readings:
  - que, aunque no me oían, creen
  - que, sin haberme oído, creerán
  rationale: 'La frase conserva la paradoja teológica: creer sin haber recibido señales explícitas y obedecer de todos modos. No se suaviza el contraste entre creer y obedecer, porque el latín distingue presente («credunt») y futuro («facient»).'
  doctrine_reference: Fe y obediencia en respuesta a la palabra divina; tensión entre revelación, señal y confianza.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió la vieja lectura inglesa «who, though they have not heard me, will believe» por la gramática latina presente: «me non audientes credunt». La redacción española evita tanto el futuro de creer como un pasado implícito, y mantiene el contraste presente/futuro del original.'
  spanish_consistency_notes:
  - Se mantiene «señales» para signa, en línea con el registro bíblico del proyecto.
  - Se usa «Yahvé» implícitamente como hablante divino en primera persona, sin introducir una máscara de «SEÑOR».
  - El sujeto colectivo se conserva como «un pueblo»; el verbo «cree» mantiene la tensión gramatical del latín, aunque su concordancia pueda leerse de forma genérica en español.
