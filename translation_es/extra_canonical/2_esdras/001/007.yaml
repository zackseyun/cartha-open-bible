translation:
  language: es
  text: ¿No fui yo quien los saqué de la tierra de Egipto, de la casa de esclavitud? Pero ellos me provocaron y despreciaron mis consejos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: de terra Aegypti
  english_pob_choice: out of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra egipcia
  - de Egipto
  lexicon: terra
  rationale: La construcción española más directa y natural para el latín es «de la tierra de Egipto», conservando tanto el lugar como la formulación solemne del original.
- source_word: de domo seruitutis
  english_pob_choice: out of the house of slavery
  chosen_spanish: de la casa de esclavitud
  alternatives_spanish:
  - de la casa de servidumbre
  - de la casa de servidumbre esclava
  lexicon: domus / servitus
  rationale: Se mantiene la imagen de «casa» y el sustantivo fuerte «esclavitud», siguiendo la fuerza lexical del texto y la decisión inglesa de conservar la dureza de la expresión.
- source_word: irritauerunt me
  english_pob_choice: they provoked me
  chosen_spanish: me provocaron
  alternatives_spanish:
  - me irritaron
  - me exasperaron
  lexicon: irritare
  rationale: «Provocar» reproduce bien la idea de incitar u ofender deliberadamente, y funciona con naturalidad en español bíblico sin suavizar el tono.
- source_word: consilia mea spreuerunt
  english_pob_choice: despised my counsels
  chosen_spanish: despreciaron mis consejos
  alternatives_spanish:
  - menospreciaron mis consejos
  - despreciaron mis designios
  lexicon: consilium / spernere
  rationale: «Consejos» traduce de forma transparente consilia en este contexto; «despreciaron» mantiene el desprecio activo de spreuerunt. Se evita «designios» porque el latino y el inglés auditado apuntan aquí a consejos/instrucciones, no necesariamente a decretos.
theological_decisions:
- issue: La referencia al éxodo y la identidad de quien libera a Israel
  english_pob_reading: Was it not I who brought them out of the land of Egypt...
  chosen_spanish_reading: ¿No fui yo quien los saqué de la tierra de Egipto...?
  alternative_spanish_readings:
  - ¿Acaso no fui yo quien los saqué de la tierra de Egipto...?
  - ¿No fui yo quien los sacó de la tierra de Egipto...?
  rationale: Se conserva la primera persona enfática del original, con «los saqué» para reflejar el agente divino explícito del latino y el sentido retórico de la pregunta.
  doctrine_reference: Éxodo 20:2; 1 Samuel 8:7
- issue: La expresión «casa de esclavitud» frente a formas eclesiásticas más tradicionales
  english_pob_reading: house of slavery
  chosen_spanish_reading: casa de esclavitud
  alternative_spanish_readings:
  - casa de servidumbre
  - casa de esclavitud/servidumbre
  rationale: Se preserva la dureza conceptual de la esclavitud, coherente con la lectura POB y con el peso histórico-teológico del éxodo. «Servidumbre» es posible, pero atenúa el impacto lexical.
  doctrine_reference: Éxodo 13:3; Deuteronomio 5:6
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el texto latino base, la traducción inglesa auditada y la revisión más reciente, que no requirió cambios. Por ello, la versión española sigue de cerca la estructura y el contenido, sin introducir notas textuales ni variantes relevantes.
  spanish_consistency_notes:
  - Se usa «despreciaron mis consejos» para mantener la correspondencia con el audit trail inglés y con consilia mea.
  - Se evita «SEÑOR» u otra sustitución reverencial porque el texto latino aquí usa primera persona divina directamente.
  - Se mantiene un registro sobrio y bíblico, con español moderno pero no coloquial.
