translation:
  language: es
  text: No es como si me hubierais[a] abandonado, sino a vosotros mismos, dice el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No es como si me hubierais abandonado, sino a vosotros mismos, dice el Señor».'
    reason: alternative_reading
lexical_decisions:
- source_word: Non quasi me dereliquistis, sed uos ipsos
  english_pob_choice: It is not as though you have forsaken me, but yourselves
  chosen_spanish: No es como si me hubierais abandonado, sino a vosotros mismos
  alternatives_spanish:
  - No es como si me hubierais dejado, sino a vosotros mismos
  - No es como si me hubierais desamparado, sino a vosotros mismos
  lexicon: non quasi... sed...; derelinquo
  rationale: 'La estructura latina contrasta una negación de apariencia con una corrección enfática: no se trata de haber abandonado a Yahvé, sino de haberse perdido a sí mismos. «Abandonado» comunica con claridad la fuerza de dereliquistis y mantiene el paralelismo con el inglés POB; «dejado» o «desamparado» son posibles, pero el primero es más neutro y el segundo más solemne, aunque menos directo en español moderno.'
- source_word: dicit dominus
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - dice el Señor Yahvé
  - dice Yahvé
  lexicon: dico; dominus
  rationale: El latino tiene dominus, y en el marco POB el término divino se expresa normalmente como «Yahvé»; sin embargo, en esta frase breve la forma tradicional «el Señor» preserva el tono oracular de la fórmula y evita sobrecargar la sintaxis, sin borrar el referente divino ya implícito en el discurso profético.
- source_word: me
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: pronombre de objeto directo
  rationale: Se conserva el objeto directo simple porque es la forma natural y más fiel en español; «a mí» introduciría énfasis innecesario.
theological_decisions:
- issue: Relación entre el abandono de Dios y el autoabandono humano
  english_pob_reading: It is not as though you have forsaken me, but yourselves, says the Lord.
  chosen_spanish_reading: No es como si me hubierais abandonado, sino a vosotros mismos, dice el Señor.
  alternative_spanish_readings:
  - No es como si me hubierais abandonado, sino que os habéis abandonado a vosotros mismos, dice el Señor.
  - No es como si me hubierais abandonado; más bien, os habéis abandonado vosotros mismos, dice el Señor.
  rationale: 'La frase latina contrapone el objeto real del abandono: no Dios, sino las propias personas. La redacción española conserva esa tensión sin añadir un verbo reflexivo que el texto no explicita. La lectura mantiene el golpe retórico y la responsabilidad moral del auditorio.'
  doctrine_reference: Teología bíblica de la apostasía y del juicio profético; cf. el uso retórico del abandono del pacto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que corrigió el tiempo verbal inglés de pluperfecto a presente perfecto, reflejando mejor el perfecto latino dereliquistis. En español, el pluscuamperfecto resultaría igualmente desajustado; por eso se usa el perfecto compuesto «hubierais abandonado» dentro de la construcción condicional irreal «No es como si...», que reproduce la relación aspectual y retórica del original sin forzar un pasado anterior.
  spanish_consistency_notes:
  - 'Se mantiene la puntuación directa y breve del latino: negación + contraste + fórmula profética.'
  - «Señor» se conserva como equivalente estilístico de dominus en esta clausula fija, aunque el proyecto normalmente usa «Yahvé» para el nombre divino; aquí la decisión se justifica por fórmula oracular y economía expresiva.
  - El pronombre plural de segunda persona se traduce con «hubierais» por concordancia natural del español rioplatense/latinoamericano culto, evitando un registro excesivamente peninsular o arcaizante.
