review_pass:
  verdict: revise
  source_alignment_summary: 'El latín dice: «Non quasi me dereliquistis, sed uos ipsos, dicit dominus». La estructura se refleja bien en español, pero el borrador usa «me hubierais abandonado», que introduce pluscuamperfecto/subjuntivo compuesto donde el POB inglés auditado corrigió a «have forsaken» para mantener el perfecto latino y el vínculo con 1:25. La nota al pie además repite exactamente el mismo texto en vez de preservar una alternativa real.'
  spanish_quality_summary: 'El borrador es claro y legible, pero «No es como si me hubierais abandonado» suena menos directo y desplaza el tiempo verbal. «No es como si me han abandonado» sería incorrecto en español; la forma idiomática y fiel es reestructurar: «No es que me hayan abandonado a mí, sino a ustedes mismos». Esto conserva el contraste y mejora la naturalidad. También conviene evitar una nota redundante.'
  glossary_alignment: Hay un desajuste con la preferencia del proyecto para יהוה/YHWH -> «Yahvé», pero aquí la fuente inmediata es latín «dominus», no el tetragrámaton. Por tanto «el Señor» es aceptable en este contexto. No hay otros términos del glosario en disputa.
  issues:
  - severity: high
    issue: Tiempo verbal español no refleja bien la decisión auditada del perfecto latino
    rationale: El borrador usa «me hubierais abandonado», que sugiere una relación temporal más remota/hipotética y no corresponde bien a la corrección del inglés POB de «had forsaken» a «have forsaken».
  - severity: medium
    issue: La nota al pie no aporta una alternativa real
    rationale: La nota [a] repite sustancialmente el mismo texto del cuerpo y está marcada como lectura alternativa sin diferencia significativa. Debe eliminarse si no hay verdadera variante o alternativa útil.
  - severity: low
    issue: Puede mejorarse la naturalidad del español con reestructuración sintáctica
    rationale: La construcción literal con «como si» fuerza el verbo a un tiempo que complica la fidelidad al perfecto latino. «No es que...» transmite mejor el sentido en español natural sin añadir contenido.
  revised_spanish_text: No es que me hayan abandonado a mí, sino a ustedes mismos, dice el Señor.
  revision_rationale: Se ajusta el español para reflejar con mayor fidelidad el perfecto latino «dereliquistis» y la revisión inglesa auditada, evitando el pluscuamperfecto/subjuntivo compuesto del borrador. Se elimina la nota redundante porque no preservaba una alternativa significativa. «A mí» ayuda a marcar el contraste con «a ustedes mismos» de manera natural en español.
