translation:
  language: es
  text: Ve y declara a mi pueblo sus malas obras, y a sus hijos las iniquidades que han cometido contra mí, para que las cuenten a los hijos de sus hijos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Vade
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Vete
  - Anda
  lexicon: Latin imperative of ire
  rationale: ‘Ve’ reproduce con naturalidad el imperativo breve del original y mantiene el tono directo de envío. ‘Vete’ añade un matiz reflexivo no exigido; ‘anda’ es posible, pero menos preciso aquí.
- source_word: nuntia
  english_pob_choice: declare
  chosen_spanish: declara
  alternatives_spanish:
  - anuncia
  - proclama
  lexicon: Latin imperative of nuntiare
  rationale: ‘Declara’ conserva el valor de hacer público o dar a conocer con autoridad. ‘Anuncia’ y ‘proclama’ son viables, pero ‘declara’ se ajusta bien al paralelo con el acto formal de comunicar el mensaje.
- source_word: populo meo
  english_pob_choice: my people
  chosen_spanish: a mi pueblo
  alternatives_spanish:
  - a mi gente
  - a mi pueblo, mi pueblo
  lexicon: Latin dative phrase
  rationale: ‘Mi pueblo’ es la correspondencia más directa y natural; el dativo se expresa con ‘a’ por claridad en español.
- source_word: facinora ipsorum
  english_pob_choice: their evil deeds
  chosen_spanish: sus malas obras
  alternatives_spanish:
  - sus maldades
  - sus delitos
  lexicon: Latin facinora
  rationale: ‘Facinora’ puede cargar la idea de actos graves o perversos. ‘Malas obras’ preserva el valor moral sin sobreespecificar judicialmente. ‘Maldades’ es más libre; ‘delitos’ añade una connotación legal no garantizada por el latín.
- source_word: iniquitates
  english_pob_choice: the iniquities
  chosen_spanish: las iniquidades
  alternatives_spanish:
  - las injusticias
  - los pecados
  lexicon: Latin iniquitates
  rationale: Se conserva ‘iniquidades’ porque está directamente asentado en español bíblico y mantiene el peso moral del término. ‘Injusticias’ reduce el matiz; ‘pecados’ interpreta más ampliamente.
- source_word: in me admiserunt
  english_pob_choice: they have committed against me
  chosen_spanish: han cometido contra mí
  alternatives_spanish:
  - han hecho contra mí
  - han perpetrado contra mí
  lexicon: Latin admittere in + accusative of person
  rationale: La construcción latina implica cometer o perpetrar algo contra alguien. ‘Han cometido contra mí’ reproduce el sentido sin añadir elementos ajenos. ‘Han hecho’ es más general; ‘han perpetrado’ es más intenso, pero menos sobrio.
- source_word: ut nuntient
  english_pob_choice: so that they may tell
  chosen_spanish: para que las cuenten
  alternatives_spanish:
  - para que las anuncien
  - para que las declaren
  lexicon: Latin purpose clause with subjunctive
  rationale: 'El latín expresa finalidad: que transmitan el relato. ‘Las cuenten’ conserva la idea de relatar o transmitir a otros de forma idiomática en español. ‘Anuncien’ y ‘declaren’ serían posibles, pero aquí el foco está en pasar la memoria a la siguiente generación.'
- source_word: filiis filiorum suorum
  english_pob_choice: their children's children
  chosen_spanish: a los hijos de sus hijos
  alternatives_spanish:
  - a sus nietos
  - a los descendientes de sus hijos
  lexicon: Latin genitive chain
  rationale: ‘Hijos de sus hijos’ sigue de cerca la cadena genitiva del latín y conserva la expresión tradicional. ‘Nietos’ es más idiomático pero menos literal; ‘descendientes de sus hijos’ es más explicativo que el original.
theological_decisions:
- issue: Transmisión intergeneracional del juicio/culpa
  english_pob_reading: so that they may tell their children's children
  chosen_spanish_reading: para que las cuenten a los hijos de sus hijos
  alternative_spanish_readings:
  - para que lo narren a los hijos de sus hijos
  - para que se lo cuenten a sus nietos
  rationale: La frase mantiene el encargo de preservar y transmitir el recuerdo de las acciones culpables a la siguiente y a la tercera generación, sin suavizar la dimensión de juicio implícita en el contexto. Se evita sustituir la estructura por un término más interpretativo que borre el encadenamiento generacional.
  doctrine_reference: Éxodo 34:7; Deuteronomio 4:9
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y que no se requerían cambios; por tanto, el español se mantiene estrechamente alineado con el latín limpio y con la lectura inglesa auditada, sin introducir notas textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y directo.
  - ‘Iniquidades’ se conserva por su peso técnico y su continuidad con el español bíblico.
  - No se emplea ‘Señor’ ni otras fórmulas de sustitución, porque este versículo no contiene el nombre divino explícito.
  - La frase final respeta la referencia generacional del latín sin reemplazarla por una paráfrasis más libre.
