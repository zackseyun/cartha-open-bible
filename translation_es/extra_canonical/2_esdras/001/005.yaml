  glossary_alignment: No hay conflictos con la terminología por defecto del proyecto. «Iniquidades» preserva bien el peso moral del latín iniquitates. «Malas obras» para facinora es una elección aceptable y legible. No aparecen términos teológicos de la lista de control que requieran ajuste.
