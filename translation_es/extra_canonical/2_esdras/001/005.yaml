  source_alignment_summary: 'El borrador español refleja fielmente el latín: Vade et nuntia = «Ve y declara»; populo meo = «a mi pueblo»; facinora ipsorum = «sus malas obras»; filiis eorum iniquitates = «y a sus hijos las iniquidades»; quas in me admiserunt = «que han cometido contra mí»; ut nuntient filiis filiorum suorum = «para que las cuenten a los hijos de sus hijos». No se detecta pérdida material de sentido ni inversión sintáctica problemática.'
