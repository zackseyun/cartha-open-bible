    rationale: 'El latín «ut gallina pullos suos sub alas suas» permite en español una formulación comparativa más natural: «como una gallina recoge a sus polluelos bajo sus alas». Esto preserva la imagen protectora sin rigidez innecesaria.'
  - severity: low
    issue: 'La nota al pie «O: “los reuní”» aporta poco valor en español tal como está redactada.'
    rationale: La nota inglesa preserva una formulación anterior («Or 'I gathered you'») por historial de revisión. En español conviene reflejar esa misma lógica con una alternativa completa y útil, no solo repetir parcialmente el verbo.
