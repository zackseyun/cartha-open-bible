translation:
  language: es
  text: Así los reuní, como una gallina recoge a sus polluelos bajo sus alas[a]. Pero ahora, ¿qué haré con ustedes? Los arrojaré de delante de mi rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así los reuní».'
    reason: previous_rendering
lexical_decisions:
- source_word: collegi
  english_pob_choice: I gathered you / Thus I gathered you
  chosen_spanish: Así los reuní
  alternatives_spanish:
  - Así los junté
  - Así los congregué
  lexicon: colligo
  rationale: El latín expresa una acción de reunir o juntar; "reuní" comunica bien la imagen de agrupamiento sin sonar mecánico. Se conserva "Así" para reflejar el nexo sintáctico restaurado por la revisión crítica, que une este verso con la cláusula previa.
- source_word: gallina
  english_pob_choice: hen
  chosen_spanish: una gallina
  alternatives_spanish:
  - una clueca
  - una gallina madre
  lexicon: gallina
  rationale: '"Gallina" es el equivalente directo y natural en español; mantiene la imagen doméstica y maternal del original.'
- source_word: pullos
  english_pob_choice: chicks
  chosen_spanish: sus polluelos
  alternatives_spanish:
  - sus pollitos
  - sus crías
  lexicon: pullus
  rationale: '"Polluelos" reproduce la referencia a crías de ave con un registro claro y bíblico; conserva el diminutivo afectivo implícito en el latín.'
- source_word: sub alas suas
  english_pob_choice: under her wings
  chosen_spanish: bajo sus alas
  alternatives_spanish:
  - debajo de sus alas
  - bajo sus plumas
  lexicon: ala
  rationale: La imagen corporal se mantiene literalmente. "Bajo sus alas" es la formulación más natural y estable en español para esta metáfora de protección.
- source_word: proiciam
  english_pob_choice: I will cast you out
  chosen_spanish: Los arrojaré
  alternatives_spanish:
  - Los echaré
  - Los expulsaré
  lexicon: proicio
  rationale: El latín tiene fuerza de expulsión violenta. "Arrojaré" conserva esa energía y evita suavizar indebidamente el juicio. Se mantiene el objeto explícito "los" para claridad en español.
- source_word: a facie mea
  english_pob_choice: from before my face
  chosen_spanish: de delante de mi rostro
  alternatives_spanish:
  - de delante de mí
  - de mi presencia
  lexicon: facies
  rationale: '"Rostro" sigue de cerca el latín y preserva el lenguaje relacional del texto. "De delante de" refleja mejor el valor locativo de "a facie" que una simple "de mi presencia", aunque esta sea una alternativa idiomática.'
theological_decisions:
- issue: Imagen maternal de protección y luego expulsión judicial
  english_pob_reading: Thus I gathered you as a hen gathers her chicks under her wings. But now what shall I do with you? I will cast you out from before my face.
  chosen_spanish_reading: Así los reuní como una gallina reúne a sus polluelos bajo sus alas. Pero ahora, ¿qué haré con ustedes? Los arrojaré de delante de mi rostro.
  alternative_spanish_readings:
  - Así los reuní... Los expulsaré de mi presencia.
  - Así los congregué... Los echaré de delante de mí.
  rationale: 'La frase combina ternura protectora con rechazo judicial. La traducción conserva ambas tensiones: la imagen tierna de la gallina y la severidad del acto de arrojar fuera. "De delante de mi rostro" mantiene la solemnidad relacional del original sin convertirlo en una fórmula más interpretativa.'
  doctrine_reference: Imágenes de juicio y rechazo divino en lenguaje profético; cf. la tensión entre acogida y expulsión en la literatura bíblica de juicio.
translation_notes:
  revision_awareness: 'La revisión auditada restauró el nexo sintáctico entre el final del verso anterior y el inicio de este verso: el latín subyacente equivale a «Así los reuní». La redacción española conserva ese «Así» para reflejar el encadenamiento del texto y no perder la relación lógica documentada en el aparato de revisión.'
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como terminología por defecto del proyecto, pero este verso no contiene el nombre divino explícito en el latín transmitido.
  - Se evitó "SEÑOR" como sustitución automática porque el texto aquí trabaja con "mi rostro" / "mi presencia" y no con un título divino.
  - Se prefirió "polluelos" por coherencia imagética y para no endurecer innecesariamente la metáfora.
  - Se usó un registro solemne pero natural en español latinoamericano, con puntuación que conserva la cadencia retórica del original.
