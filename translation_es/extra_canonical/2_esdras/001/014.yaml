  text: exhibui; ducem uobis dedi Moysen et Aaron sacerdotem; Lucem uobis per columnam ignis praestiti et magna mirabilia feci in
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/001/014.yaml
  text: I gave you Moses as a leader and Aaron as a priest. I provided you light by a pillar of fire, and I did great wonders among you.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:40:53Z'
    unchanged: false
    changes_summary: Changed 'gave' to 'provided' in the second clause to better reflect praestiti ('provided/furnished') and avoid repetition, while preserving the sense and formal register. No other changes needed.
translation:
  language: es
  text: Yo les di a Moisés como líder y a Aarón como sacerdote. Les proporcioné luz por medio de una columna de fuego, e hice grandes prodigios entre ustedes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ducem
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - guía
  - caudillo
  lexicon: dux
  rationale: ducem designa a Moisés como conductor o cabeza del pueblo; «líder» comunica bien la función sin cargar con matices modernos innecesarios, y evita «guía» por su posible ambigüedad excesiva en español.
- source_word: sacerdotem
  english_pob_choice: priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - sacerdocio
  lexicon: sacerdos
  rationale: El latín nombra a Aarón como individuo en su oficio; «sacerdote» conserva esa referencia personal directa.
- source_word: Lucem ... praestiti
  english_pob_choice: I provided you light
  chosen_spanish: les proporcioné luz
  alternatives_spanish:
  - les di luz
  - les abastecí de luz
  lexicon: praestare
  rationale: praestiti sugiere proveer o suministrar; «proporcioné» reproduce mejor esa idea que un simple «di», y mantiene el registro formal indicado por la revisión inglesa.
- source_word: columnam ignis
  english_pob_choice: pillar of fire
  chosen_spanish: una columna de fuego
  alternatives_spanish:
  - un pilar de fuego
  lexicon: columna ignis
  rationale: «columna de fuego» es la manera más natural y fiel en español para la imagen bíblica establecida por el latín y el contexto del éxodo.
- source_word: magna mirabilia
  english_pob_choice: great wonders
  chosen_spanish: grandes prodigios
  alternatives_spanish:
  - grandes maravillas
  - grandes señales
  lexicon: mirabilia
  rationale: «prodigios» conserva la fuerza de actos extraordinarios y solemnes mejor que una simple «maravillas», sin perder inteligibilidad.
theological_decisions:
- issue: Presentación de Yahvé/Dios como agente implícito en las acciones recordadas
  english_pob_reading: I gave/provided you... I did great wonders among you.
  chosen_spanish_reading: Yo les di... Les proporcioné... e hice grandes prodigios entre ustedes.
  alternative_spanish_readings:
  - Yo les di... Yo les proporcioné...
  rationale: El texto latino habla en primera persona divina sin nombrar explícitamente a Yahvé en este versículo; por fidelidad al enunciado, la traducción mantiene la primera persona sin introducir un nombre que el pasaje no contiene.
  doctrine_reference: Éxodo 13:21-22; 14:24-31; 16:1-15
translation_notes:
  revision_awareness: La revisión inglesa cambió el segundo 'gave' por 'provided' para reflejar mejor praestiti ('provided/furnished') y evitar repetición. La versión española recoge esa distinción con 'proporcioné' en la segunda cláusula, manteniendo 'di' en la primera por la naturalidad del paralelismo y sin perder la variedad semántica.
  spanish_consistency_notes:
  - Se usa el voseo de tercera persona plural neutro 'les/ustedes' según el español bíblico panregional, evitando regionalismos.
  - Se conserva el paralelismo de los dos miembros principales del versículo y el orden progresivo del texto fuente.
  - No se introduce 'SEÑOR' ni 'Mesías' porque el versículo no contiene esos términos.
