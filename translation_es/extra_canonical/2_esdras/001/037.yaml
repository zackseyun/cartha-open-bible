base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/001/037.yaml
  text: the favor of the people that is coming[a], whose little ones rejoice with gladness, not seeing me with bodily eyes, but in spirit believing what I have said. And now, Father, look with glory and see the people that is coming
  footnotes:
  - marker: a
    text: Or 'I call to witness the favor'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:01Z'
    unchanged: false
    changes_summary: Removed 'I bear witness to' because it is not in the provided Latin, restored the final clause 'And now, Father, look with glory and see the people that is coming,' and adjusted wording to more closely reflect the Latin while keeping formal natural English.
translation:
  language: es
  text: el favor del pueblo que viene, cuyos pequeños se regocijan con alegría, sin verme con ojos carnales, sino creyendo en espíritu lo que he dicho. Y ahora, Padre, mira con gloria y ve al pueblo que viene
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: populi uenientis gratiam
  english_pob_choice: the favor of the people that is coming
  chosen_spanish: la benevolencia del pueblo que viene
  alternatives_spanish:
  - el favor del pueblo que viene
  - la gracia del pueblo que viene
  lexicon: gratia
  rationale: En este contexto, gratiam expresa favor/benevolencia más que 'gracia' en sentido técnico teológico. 'Benevolencia' conserva el matiz relacional y evita imponer una lectura doctrinal ajena al latín. Mantengo 'que viene' para traducir el participio uenientis aplicado al pueblo.
- source_word: parvuli
  english_pob_choice: whose little ones
  chosen_spanish: cuyos pequeños
  alternatives_spanish:
  - cuyos niños pequeños
  - sus pequeñitos
  lexicon: parvulus
  rationale: '''Pequeños'' es natural en español, suficientemente cercano a parvuli y menos infantilizante que una forma diminutiva más marcada. Preserva la referencia a los miembros menores del pueblo.'
- source_word: exultant cum laetitia
  english_pob_choice: rejoice with gladness
  chosen_spanish: se regocijan con alegría
  alternatives_spanish:
  - saltan de gozo con alegría
  - exultan con alegría
  lexicon: exulto + laetitia
  rationale: La combinación latina intensifica el gozo. 'Se regocijan con alegría' transmite el paralelismo sin sonar forzado; 'exultan' sería más literal pero menos natural en español corriente.
- source_word: me non uidentes oculis carnalibus
  english_pob_choice: not seeing me with bodily eyes
  chosen_spanish: no viéndome con ojos carnales
  alternatives_spanish:
  - no viéndome con ojos corporales
  - no me ven con ojos carnales
  lexicon: oculi carnales
  rationale: '''Ojos carnales'' mantiene la oposición fuente entre la visión física y la percepción espiritual. Aunque ''corporales'' sería posible, ''carnales'' preserva mejor la fuerza del contraste con ''en espíritu''.'
- source_word: sed spiritu credent quae dixi
  english_pob_choice: but in spirit believing what I have said
  chosen_spanish: sino creyendo en espíritu lo que he dicho
  alternatives_spanish:
  - sino que creerán en espíritu lo que he dicho
  - sino creyendo por el espíritu lo que he dicho
  lexicon: spiritu credent
  rationale: 'El latín permite una lectura adverbial: creer ''en espíritu''. Esa redacción mantiene el contraste con la visión carnal sin introducir una parafrasis excesiva. Evité ''por el Espíritu'' porque el texto no explicita el artículo ni una referencia inequívoca al Espíritu Santo.'
- source_word: aspice cum gloria
  english_pob_choice: look with glory
  chosen_spanish: mira con gloria
  alternatives_spanish:
  - mira en gloria
  - mira gloriosamente
  lexicon: aspicio + gloria
  rationale: '''Con gloria'' sigue de cerca el latín cum gloria. ''Gloriosamente'' suaviza la expresión, pero elimina la preposición relevante; ''en gloria'' cambia la estructura.'
- source_word: populum uenientem
  english_pob_choice: the people that is coming
  chosen_spanish: al pueblo que viene
  alternatives_spanish:
  - al pueblo venidero
  - al pueblo que está viniendo
  lexicon: populus + venio
  rationale: '''Que viene'' conserva la literalidad básica y la continuidad con la primera cláusula. ''Venidero'' suena más abstracto y ''está viniendo'' agrega aspecto no requerido por el latín.'
theological_decisions:
- issue: La relación entre gratiam y el favor/gracia de Dios
  english_pob_reading: the favor of the people that is coming
  chosen_spanish_reading: la benevolencia del pueblo que viene
  alternative_spanish_readings:
  - la gracia del pueblo que viene
  - el favor del pueblo que viene
  rationale: El latín no exige una formulación técnica de 'gracia' y el contexto habla de la acogida positiva del pueblo. 'Benevolencia' permite conservar el peso relacional sin sugerir de inmediato la gracia salvífica paulina.
  doctrine_reference: lexical theology; semantic range of gratia
- issue: La oposición entre visión carnal y creencia espiritual
  english_pob_reading: not seeing me with bodily eyes, but in spirit believing what I have said
  chosen_spanish_reading: no viéndome con ojos carnales, sino creyendo en espíritu lo que he dicho
  alternative_spanish_readings:
  - no viéndome con ojos corporales, sino creyendo por el Espíritu lo que he dicho
  - sin verme con ojos carnales, sino creyendo en espíritu lo que he dicho
  rationale: El texto contrapone dos modos de percepción. Mantener 'en espíritu' deja abierta la lectura espiritual sin forzar una identificación explícita con el Espíritu Santo, que el latín no nombra aquí.
  doctrine_reference: pneumatology; epistemology of faith
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto latino limpio suministrado, pero también toma en cuenta la historia de revisión inglesa: se evitó la lectura previa ''I bear witness to'' porque no pertenece al latín limpio transmitido; a la vez, se conservó la clausula final «Y ahora, Padre, mira con gloria y ve al pueblo que viene», que la revisión restauró tras haber sido omitida en una versión intermedia.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca en este versículo, sino para mantener la consistencia del proyecto cuando el texto lo requiera; aquí no es necesario.
  - Se evitó 'gracia' como término teológico automático para gratiam porque el contexto favorece 'benevolencia/favor'.
  - Se mantuvo 'carnales' para oculis carnales, en paralelo con el contraste espiritual explícito del versículo.
  - La puntuación reproduce la estructura oracional del latín con dos segmentos principales unidos por 'Y ahora'.
