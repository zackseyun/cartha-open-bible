revisions:
- from: 'Así dice el Señor Todopoderoso: En el desierto, cuando tenían sed junto al arroyo amargo y blasfemaron mi nombre,'
  to: 'Así dice el Señor Todopoderoso: En el desierto, cuando tenían sed en la corriente amarga y blasfemaron mi nombre,'
  rationale: Se reemplaza «junto al arroyo amargo» por «en la corriente amarga» para reflejar con mayor fidelidad el latín «in flumine amaro» sin volver el español torpe. Se conserva el resto del texto porque comunica bien el sentido fuente y mantiene la dignidad del registro.
