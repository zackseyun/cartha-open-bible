base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/001/022.yaml
  text: 'Thus says the Lord Almighty: In the wilderness, when you were thirsty at the bitter stream and blasphemed my name,'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:25Z'
    unchanged: false
    changes_summary: Reordered the clause to more closely reflect the Latin word order and removed the unnecessary second 'were' before 'thirsty' for smoother, more formal English while preserving all source elements.
translation:
  language: es
  text: 'Así dice el Señor Todopoderoso: En el desierto, cuando tenían sed en la corriente amarga y blasfemaron mi nombre,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: dominus omnipotens
  english_pob_choice: the Lord Almighty
  chosen_spanish: el Señor Todopoderoso
  alternatives_spanish:
  - el Yahvé Todopoderoso
  - el Señor omnipotente
  lexicon: dominus -> Señor; omnipotens -> Todopoderoso
  rationale: El latín usa el título divino estándar; en español, «Señor Todopoderoso» conserva la solemnidad y el valor titular del original. No se introduce «Yahvé» aquí porque el texto fuente latino dice dominus, y el audit trail inglés también conserva «Lord» como título.
- source_word: in deserto
  english_pob_choice: In the wilderness
  chosen_spanish: En el desierto
  alternatives_spanish:
  - En la soledad del desierto
  - En el yermo
  lexicon: in + ablativo locativo -> en; desertum -> desierto
  rationale: «Desierto» es el equivalente natural y fiel de «wilderness» en este contexto de peregrinación e inanición de agua; «yermo» sería posible, pero menos transparente para lectura pública.
- source_word: flumine amaro
  english_pob_choice: the bitter stream
  chosen_spanish: el arroyo amargo
  alternatives_spanish:
  - el torrente amargo
  - la corriente amarga
  lexicon: flumen -> arroyo/río/corriente; amarus -> amargo
  rationale: El latín no especifica un gran río; «arroyo» preserva la imagen de un curso de agua concreto y pequeño, coherente con la escena de sed. «Amargo» mantiene la cualidad literal del agua o de la experiencia.
- source_word: sitientes
  english_pob_choice: when you were thirsty
  chosen_spanish: cuando tenían sed
  alternatives_spanish:
  - cuando estaban sedientos
  - mientras tenían sed
  lexicon: sitire -> tener sed
  rationale: Se evita una traducción demasiado literal y rígida. «Tenían sed» comunica con claridad el estado descrito sin añadir matices que el latín no exige.
- source_word: blasphemantes nomen meum
  english_pob_choice: blasphemed my name
  chosen_spanish: blasfemaron mi nombre
  alternatives_spanish:
  - maldijeron mi nombre
  - blasfemaban mi nombre
  lexicon: blasphemare -> blasfemar; nomen meum -> mi nombre
  rationale: «Blasfemaron» reproduce el verbo fuerte del latín y mantiene la carga teológica de ofensa verbal contra Dios. Se conserva el posesivo directo «mi nombre» como en el original.
theological_decisions:
- issue: Título divino en dominus omnipotens
  english_pob_reading: the Lord Almighty
  chosen_spanish_reading: el Señor Todopoderoso
  alternative_spanish_readings:
  - el Yahvé Todopoderoso
  - el Señor omnipotente
  rationale: El latín aquí no usa el tetragrámaton sino dominus; por eso se conserva «Señor» como título reverencial, junto con «Todopoderoso» para omnipotens. Esto evita introducir una forma no sustentada por la fuente inmediata.
  doctrine_reference: reverencia al nombre divino; fidelidad al título según la fuente latina
- issue: Intensidad de la ofensa verbal contra Dios
  english_pob_reading: blasphemed my name
  chosen_spanish_reading: blasfemaron mi nombre
  alternative_spanish_readings:
  - injuriaron mi nombre
  - maldijeron mi nombre
  rationale: «Blasfemar» mantiene la gravedad religiosa del acto en el texto fuente y en la lectura inglesa. No se suaviza a «insultaron», porque perdería la dimensión teológica de profanación del nombre.
  doctrine_reference: santidad del nombre de Dios; blasfemia
- issue: Relación espacial y temporal de la sed
  english_pob_reading: In the wilderness, when you were thirsty at the bitter stream
  chosen_spanish_reading: En el desierto, cuando tenían sed junto al arroyo amargo
  alternative_spanish_readings:
  - En el desierto, sedientos junto al arroyo amargo
  - En el desierto, cuando estaban sedientos junto al arroyo amargo
  rationale: 'La reordenación del inglés revisado refleja mejor el orden latino: primero el lugar («en el desierto»), luego la condición («cuando tenían sed»), y después la referencia al agua amarga. «Junto a» expresa la proximidad implícita de «in flumine» sin forzar un sentido locativo más técnico.'
  doctrine_reference: memoria de la prueba y la murmuración del pueblo en el desierto
translation_notes:
  revision_awareness: El inglés POB fue revisado desde «When you were thirsty in the wilderness at the bitter stream, and blasphemed my name,» a «In the wilderness, when you were thirsty at the bitter stream and blasphemed my name,» para acercarse más al orden latino y eliminar una repetición innecesaria de «were». La versión española sigue esa misma disposición, colocando primero el marco espacial y luego la condición de sed, sin añadir elementos ausentes del texto fuente.
  spanish_consistency_notes:
  - Se mantiene «Señor Todopoderoso» como título divino coherente con el latín dominus omnipotens.
  - «Desierto» se usa en sentido bíblico amplio, equivalente a wilderness.
  - «Arroyo amargo» conserva el contraste de agua ofrecida pero amarga, sin interpretar más allá del latín.
  - No se introduce «Cristo» ni «Mesías», ya que el verso no contiene lenguaje mesiánico.
  - El posesivo de primera persona singular en «mi nombre» refleja fielmente nomen meum.
