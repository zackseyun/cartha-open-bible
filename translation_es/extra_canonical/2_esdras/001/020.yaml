translation:
  language: es
  text: Comisteis el pan de los ángeles como alimento. Cuando tuvisteis sed[a], ¿no partí la roca, y las aguas fluyeron en abundancia? Por el calor, os cubrí con las hojas de los árboles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando tuvisteis sed, ¿no partí la roca, y las aguas fluyeron en abundancia?»'
    reason: alternative_reading
lexical_decisions:
- source_word: in escam, panem angelorum manducastis
  english_pob_choice: You ate the bread of angels for food.
  chosen_spanish: Comiste el pan de los ángeles como alimento.
  alternatives_spanish:
  - Comiste el pan de los ángeles para comer.
  - Comiste como alimento el pan de los ángeles.
  lexicon: panem -> pan; angelorum -> de los ángeles; manducastis -> comiste
  rationale: El latín expresa literalmente que el pan de los ángeles fue comido 'en alimento / como comida'. En español, 'como alimento' conserva esa función sin repetir de forma pesada la idea de comer. Se mantiene 'ángeles' en genitivo objetivo, como en el inglés POB.
- source_word: Nonne cum sitiretis
  english_pob_choice: When you were thirsty
  chosen_spanish: Cuando tuvisteis sed
  alternatives_spanish:
  - Cuando teníais sed
  - Cuando estuvistéis sedientos
  lexicon: sitiretis -> tuvisteis sed
  rationale: El imperfecto subjuntivo latino en una pregunta retórica se rinde naturalmente con una referencia temporal en pasado. 'Tuvisteis sed' mantiene la acción concreta sin forzar un giro más explicativo.
- source_word: petram excidi
  english_pob_choice: did I not split the rock
  chosen_spanish: ¿no partí la roca?
  alternatives_spanish:
  - ¿no quebré la roca?
  - ¿no hendid la roca?
  lexicon: petram -> la roca; excidi -> partí
  rationale: '''Partí'' comunica el corte o apertura de la roca con naturalidad en español y conserva la fuerza del verbo latino. Se evita suavizarlo con un término menos físico.'
- source_word: fluxerunt aquae in satietate
  english_pob_choice: waters flowed in abundance
  chosen_spanish: las aguas fluyeron en abundancia
  alternatives_spanish:
  - las aguas corrieron en abundancia
  - las aguas fluyeron hasta saciar
  lexicon: aquae -> aguas; in satietate -> en abundancia
  rationale: '''In satietate'' apunta a plenitud/suficiencia, y la versión inglesa ya optó por ''in abundance''. En español, ''en abundancia'' preserva ese sentido idiomático y claro.'
- source_word: propter aestus
  english_pob_choice: Because of the heat
  chosen_spanish: Por el calor
  alternatives_spanish:
  - A causa del calor
  - Por el ardor
  lexicon: aestus -> calor/ardor
  rationale: '''Aestus'' puede sugerir calor intenso, sofocación o ardor. ''Por el calor'' es natural y suficientemente fuerte en español; ''ardor'' sería posible, pero menos inmediato para lectura pública.'
- source_word: text implicit covering with leaves
  english_pob_choice: I covered you with the leaves of trees
  chosen_spanish: te cubrí con las hojas de los árboles
  alternatives_spanish:
  - te cubrí con hojas de árboles
  - te oculté bajo las hojas de los árboles
  lexicon: cover with leaves -> cubrir con hojas
  rationale: La cláusula no aparece completa en el fragmento latino conservado, pero está atestiguada por la tradición textual usada en el contexto inglés. Se conserva la formulación auditada de la POB en español sin añadir expansión interpretativa.
theological_decisions:
- issue: Pregunta retórica con memoria del éxodo/providencia divina
  english_pob_reading: did I not split the rock, and waters flowed in abundance?
  chosen_spanish_reading: ¿no partí la roca, y las aguas fluyeron en abundancia?
  alternative_spanish_readings:
  - ¿no partí la roca, de modo que las aguas fluyeron en abundancia?
  - ¿no partí la roca, y fluyeron las aguas en abundancia?
  rationale: El pasaje recuerda acciones salvadoras de Dios. Se mantiene el tono de reproche benevolente y pregunta retórica sin convertirlo en afirmación plana. La coordinación 'y' conserva la secuencia de actos divinos tal como lo hace el texto auditado final en inglés.
  doctrine_reference: memoria del éxodo y provisión divina; retórica profética
translation_notes:
  revision_awareness: 'El inglés auditado pasó por una corrección importante: se restauró la cláusula inicial sobre el pan de los ángeles y se ajustó la segunda oración para resolver la relación entre la pregunta retórica y la consecuencia de las aguas. La versión española refleja esa forma final auditada y conserva el carácter retórico del latín.'
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' implícito en la voz divina del texto sin introducirlo explícitamente, porque el latín usa primera persona.
  - Se eligió 'ángeles' y no una paráfrasis litúrgica para conservar la imaginería concreta del original.
  - Se tradujo 'aestus' como 'calor' por claridad, sin perder la referencia a una causa física de cobertura.
