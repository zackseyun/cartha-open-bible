base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/001/034.yaml
  text: And your sons will not produce offspring, because they neglected my commandment among you and did what is evil before me.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:40:58Z'
    unchanged: false
    changes_summary: Changed 'beget offspring' to 'produce offspring' for more natural formal English, and revised 'with you' to 'among you' to better reflect Latin 'vobiscum' in context.
translation:
  language: es
  text: Y tus hijos no tendrán descendencia, porque descuidaron mi mandamiento en medio de ustedes y hicieron lo malo delante de mí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: creationem / offspring
  english_pob_choice: produce offspring
  chosen_spanish: producirán descendencia
  alternatives_spanish:
  - engendrarán descendencia
  - tendrán hijos
  lexicon: descendencia
  rationale: El latín creationem, en este contexto, se refiere al resultado de la procreación; el inglés POB optó por una formulación más natural y formal, 'produce offspring'. En español, 'producirán descendencia' conserva esa fuerza biológica y formal sin recurrir a una perífrasis más interpretativa.
- source_word: mandatum meum
  english_pob_choice: my commandment
  chosen_spanish: mi mandamiento
  alternatives_spanish:
  - mi mandato
  - mi precepto
  lexicon: mandamiento
  rationale: Mandatum se corresponde de manera directa con 'mandamiento'. Mantiene el tono normativo del pasaje y sigue de cerca la elección auditada del inglés POB.
- source_word: vobiscum
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - con ustedes
  - en medio de ustedes
  lexicon: entre
  rationale: El pasaje no expresa solo compañía, sino una situación dentro del pueblo; el inglés POB revisó 'with you' a 'among you' para reflejar mejor el valor contextual de vobiscum. 'Entre ustedes' conserva esa relación comunitaria.
- source_word: quod malum est coram me
  english_pob_choice: what is evil before me
  chosen_spanish: lo malo delante de mí
  alternatives_spanish:
  - lo que es malo ante mí
  - lo malvado ante mí
  lexicon: malo
  rationale: 'La construcción latina es literal: ''lo malo'' / ''lo que es malo'' delante de Dios. ''Delante de mí'' conserva el valor relacional y judicial de coram me sin sobrecargar el español.'
theological_decisions:
- issue: Consecuencia de juicio por desobediencia dentro del pueblo
  english_pob_reading: because they neglected my commandment among you and did what is evil before me
  chosen_spanish_reading: porque descuidaron mi mandamiento entre ustedes y hicieron lo malo delante de mí
  alternative_spanish_readings:
  - porque despreciaron mi mandamiento entre ustedes y hicieron lo malo delante de mí
  - porque desobedecieron mi mandamiento entre ustedes y hicieron lo malo delante de mí
  rationale: El latín usa neglexerunt, que indica descuido/omisión más que una rebelión explícita; por eso se mantiene 'descuidaron'. La consecuencia de esterilidad o falta de descendencia se presenta como juicio por esa desatención y por la maldad cometida ante Dios.
  doctrine_reference: Covenantal judgment for disobedience; cf. Deuteronomio 28 (principio general de bendición/juicio)
- issue: Marco espacial de la culpa
  english_pob_reading: among you
  chosen_spanish_reading: entre ustedes
  alternative_spanish_readings:
  - con ustedes
  - en medio de ustedes
  rationale: La revisión inglesa señaló que vobiscum se entiende mejor como presencia en el ámbito comunitario, no mera compañía. 'Entre ustedes' preserva esa dimensión corporativa y evita hacer del texto una expresión exclusivamente relacional o individual.
  doctrine_reference: Corporate responsibility in covenant community
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del inglés POB que cambió ''beget offspring'' por ''produce offspring'' y ''with you'' por ''among you''. La versión española sigue esa estabilización: evita un verbo más arcaico o marcadamente bíblico y conserva el matiz comunitario de vobiscum sin traducirlo mecánicamente como compañía individual.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma por defecto en el proyecto, pero este versículo, según el fuente latino provisto, no contiene el tetragrámaton ni una forma explícita equivalente; por eso no se introduce aquí.
  - '''Descendencia'' se usa como equivalente formal de offspring para conservar el registro y la referencia a procreación.'
  - '''Delante de mí'' se prefiere a ''ante mí'' por claridad y fluidez en español, sin perder el valor reverencial/judicial del latín coram me.'
