translation:
  language: es
  text: 'De nuevo, otro ejemplo: una ciudad está edificada y situada en una llanura, y está llena de todo bien.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: item aliud
  english_pob_choice: Again, another example
  chosen_spanish: De nuevo, otro ejemplo
  alternatives_spanish:
  - Además, otro ejemplo
  - 'Otra vez: otro ejemplo'
  lexicon: item = 'de nuevo/además'; aliud = 'otro'
  rationale: La secuencia latina introduce un nuevo caso ilustrativo; 'De nuevo' conserva el valor aditivo y 'otro ejemplo' refleja el carácter ejemplar señalado por la versión inglesa, sin sobretraducir.
- source_word: civitas
  english_pob_choice: a city
  chosen_spanish: una ciudad
  alternatives_spanish:
  - una urbe
  lexicon: civitas = ciudad
  rationale: '''Ciudad'' es el equivalente natural y fiel en español para civitas en este contexto descriptivo.'
- source_word: aedificata est
  english_pob_choice: is built
  chosen_spanish: está edificada
  alternatives_spanish:
  - está construida
  - ha sido edificada
  lexicon: aedificata est = edificada/construida
  rationale: El participio pasivo expresa el estado resultante de una ciudad ya levantada; 'está edificada' conserva esa idea sin forzar un perfecto perifrástico.
- source_word: posita in loco campestri
  english_pob_choice: set in a plain
  chosen_spanish: puesta en una llanura
  alternatives_spanish:
  - situada en una llanura
  - colocada en un llano
  lexicon: posita in loco campestri = puesta/situada en un lugar llano
  rationale: '''Puesta en una llanura'' reproduce la imagen espacial del latín y sigue de cerca la formulación inglesa, manteniendo claridad idiomática en español.'
- source_word: plena omnium bonorum
  english_pob_choice: full of every good thing
  chosen_spanish: llena de toda clase de bienes
  alternatives_spanish:
  - llena de todos los bienes
  - llena de todo bien
  lexicon: plena = llena; omnium bonorum = de todos los bienes / de toda clase de bienes
  rationale: '''Toda clase de bienes'' evita una lectura excesivamente abstracta y mantiene el sentido de abundancia total presente en el latín y la versión inglesa.'
