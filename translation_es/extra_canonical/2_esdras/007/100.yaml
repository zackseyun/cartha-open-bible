base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/100.yaml
  text: And I answered and said, “Then will time be given to the souls, after they have been separated from the bodies, to see that of which you told me?”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:19Z'
    unchanged: false
    changes_summary: Revised the final clause from 'to see what you have told me' to 'to see that of which you told me' for closer alignment with the Latin de quo mihi and a more formal register.
translation:
  language: es
  text: 'Y respondí y dije: «¿Entonces se dará tiempo a las almas, después de que hayan sido separadas de los cuerpos, para ver aquello de lo que me hablaste?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: patientur amodo qui neglexerint
  english_pob_choice: Then will time be given
  chosen_spanish: Entonces se dará tiempo
  alternatives_spanish:
  - Entonces se les dará tiempo
  - Entonces habrá tiempo
  lexicon: Latin patientur amodo; dative/impersonal future in context
  rationale: El latín expresa una concesión o asignación de tiempo; en español, «se dará tiempo» conserva la pasiva impersonal y el sentido de asignación sin sobrecargar el verso.
- source_word: animabus
  english_pob_choice: to the souls
  chosen_spanish: a las almas
  alternatives_spanish:
  - a las almas humanas
  lexicon: Latin animae
  rationale: «Almas» es la equivalencia directa y natural en español, manteniendo el contraste con «los cuerpos» del texto.
- source_word: postquam separatae fuerint de corporibus
  english_pob_choice: after they have been separated from the bodies
  chosen_spanish: después de que hayan sido separadas de los cuerpos
  alternatives_spanish:
  - después de haberse separado de los cuerpos
  - tras ser separadas de los cuerpos
  lexicon: Latin separatae fuerint de corporibus
  rationale: La forma pasiva latina pide una pasiva perifrástica en español; «separadas de los cuerpos» conserva la imagen de separación corporal sin añadir interpretación.
- source_word: ut uideant
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - a fin de ver
  - para contemplar
  lexicon: Latin ut videant
  rationale: «Para ver» reproduce con claridad la finalidad del infinitivo de propósito en español contemporáneo.
- source_word: de quo mihi
  english_pob_choice: that of which you told me
  chosen_spanish: aquello de lo que me hablaste
  alternatives_spanish:
  - aquello de lo cual me hablaste
  - lo que me dijiste
  lexicon: Latin de quo mihi
  rationale: La revisión inglesa privilegia la relación formal con de quo; en español, «aquello de lo que me hablaste» preserva el valor relativo de tema/objeto de discurso sin volverlo demasiado literal.
theological_decisions:
- issue: Persistencia del binomio almas/cuerpos
  english_pob_reading: souls ... after they have been separated from the bodies
  chosen_spanish_reading: almas ... después de que hayan sido separadas de los cuerpos
  alternative_spanish_readings:
  - espíritus ... después de ser separados del cuerpo
  - personas ... tras la separación del cuerpo
  rationale: El texto distingue las almas de los cuerpos; mantener ambos términos evita suavizar la antropología del pasaje.
  doctrine_reference: Antropología bíblica en literatura extra-canonical; no se resuelve la relación alma-cuerpo más allá del texto.
- issue: Final clause with relative reference
  english_pob_reading: that of which you told me
  chosen_spanish_reading: aquello de lo que me hablaste
  alternative_spanish_readings:
  - eso que me dijiste
  - lo que me anunciabas
  rationale: La redacción española conserva el referente indirecto del latín de quo sin introducir un objeto nuevo ni una paráfrasis explicativa.
  doctrine_reference: Fidelidad semántica al latín; no hay implicación doctrinal adicional.
translation_notes:
  revision_awareness: Alineado con la revisión inglesa más reciente, que corrigió el final de 'what you have told me' a 'that of which you told me' para reflejar mejor de quo mihi y un registro más formal. La versión española sigue esa misma orientación con una cláusula relativa explícita.
  spanish_consistency_notes:
  - Usa «almas» y «cuerpos» de forma consistente para reflejar el contraste antropológico del original.
  - Mantiene un tono formal y sobrio, apto para publicación, sin introducir lenguaje eclesiástico no atestiguado en el texto fuente.
