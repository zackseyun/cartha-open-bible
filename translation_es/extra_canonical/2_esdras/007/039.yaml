translation:
  language: es
  text: Este es un día tal[a], que no tiene ni sol ni luna ni estrellas,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Este día es tal que no tiene ni sol ni luna ni estrellas».'
    reason: alternative_reading
lexical_decisions:
- source_word: Hic talis
  english_pob_choice: This is such a day
  chosen_spanish: Este es tal día
  alternatives_spanish:
  - Este es un día así
  - Tal es este día
  lexicon: hic; talis
  rationale: El demostrativo latino 'hic' es proximal y, según el cierre de revisión, debe leerse como 'this'/'este', no como 'that'. 'Tal' conserva el valor de 'talis' sin añadir interpretaciones ajenas; la inversión 'Este es tal día' respeta el tono presentativo del latín y la revisión inglesa final.
- source_word: neque solem neque lunam neque stellas
  english_pob_choice: neither sun nor moon nor stars
  chosen_spanish: ni sol ni luna ni estrellas
  alternatives_spanish:
  - ni el sol ni la luna ni las estrellas
  - sin sol, luna ni estrellas
  lexicon: neque...neque...neque...
  rationale: Se conserva la enumeración negativa triple del latín. Se omiten artículos para seguir la concisión del original y mantener el efecto solemne y apocalíptico del enunciado.
theological_decisions:
- issue: Día del juicio como marco implícito
  english_pob_reading: This is such a day, which has neither sun nor moon nor stars,
  chosen_spanish_reading: Este es tal día[a], que no tiene ni sol ni luna ni estrellas,
  alternative_spanish_readings:
  - Este es tal día del juicio, que no tiene ni sol ni luna ni estrellas,
  - Este es tal día, el del juicio, que no tiene ni sol ni luna ni estrellas,
  rationale: El encabezado latino 'die iudicii' sitúa la frase en el día del juicio. En español se deja implícito, como en la línea inglesa auditada, para no ampliar el texto más allá del sintagma latino conservado en la edición limpia.
  doctrine_reference: Escatología / juicio final
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que corrigió 'that' por 'this' y reordenó la cláusula inicial para reflejar mejor 'Hic talis'. En español se refleja esa proximidad con 'Este' y se mantiene la estructura presentativa breve.
  spanish_consistency_notes:
  - Se usa 'Este' para reproducir el valor proximal de 'hic'.
  - Se conserva el paralelismo negativo triple del original latino.
  - No se introduce 'juicio' en el cuerpo principal porque el latín disponible lo presenta como encabezado separado ('die iudicii').
