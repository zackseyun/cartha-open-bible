    unchanged: false
    changes_summary: 'Reordered the clause to reflect the Latin more closely and retained both reflexive and passive elements: ''considerabunt sibi in nouissimis'' and the torment ''laid up for them.'''
translation:
  language: es
  text: 'La cuarta manera: considerarán para sí en los últimos tiempos el tormento reservado para ellos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Quarta uia
  english_pob_choice: The fourth way
  chosen_spanish: La cuarta manera
  alternatives_spanish:
  - El cuarto camino
  - La cuarta vía
  lexicon: via
  rationale: El latín uia puede significar literalmente «camino/vía», pero en este contexto enumerativo la POB inglesa opta por «way» en sentido de modo o secuencia. «Manera» mantiene el valor idiomático sin cargar la expresión con una imagen más concreta de la que el texto garantiza.
- source_word: considerabunt sibi
  english_pob_choice: they consider for themselves
  chosen_spanish: consideran para sí
  alternatives_spanish:
  - se consideran
  - considerarán para sí
  lexicon: considerabunt; sibi
  rationale: La construcción reflexiva/su beneficio de sibi se conserva con «para sí». Se usa presente gnómico en español para una formulación sentenciosa y readable, sin introducir futuración explícita que el español no exige aquí.
- source_word: in nouissimis
  english_pob_choice: in the last times
  chosen_spanish: en los últimos tiempos
  alternatives_spanish:
  - en los postreros tiempos
  - al final de los tiempos
  lexicon: nouissimis
  rationale: «Últimos tiempos» reproduce el valor temporal escatológico de nouissimis de manera natural y ampliamente inteligible en español bíblico contemporáneo.
- source_word: repositem / repo-
  english_pob_choice: the torment laid up for them
  chosen_spanish: el tormento guardado para ellos
  alternatives_spanish:
  - el tormento reservado para ellos
  - el tormento depositado para ellos
  lexicon: repositum / reponere
  rationale: El participio pasivo sugiere algo «puesto en reserva» o «guardado». «Guardado» transmite la idea de algo almacenado/previsto para ellos sin endurecer el español con una calca de «laid up». Se mantiene el destino personal con «para ellos».
theological_decisions:
- issue: La sección presenta juicio escatológico como cosa preparada para los impíos.
  english_pob_reading: they consider for themselves in the last times the torment laid up for them
  chosen_spanish_reading: consideran para sí en los últimos tiempos el tormento guardado para ellos
  alternative_spanish_readings:
  - se darán cuenta de para sí el tormento guardado para ellos
  - considerarán el tormento reservado para ellos
  rationale: Se preserva la relación entre la auto-reflexión («para sí») y el tormento futuro ya preparado. No se suaviza el lenguaje de retribución, porque el latín y la POB inglesa lo presentan de forma directa.
  doctrine_reference: Escatología del juicio retributivo
translation_notes:
  revision_awareness: La revisión inglesa más reciente reordenó la cláusula para reflejar mejor el latín y retuvo tanto el matiz reflexivo de sibi como el pasivo implícito de un castigo «laid up for them». La versión española conserva ambos rasgos con «para sí» y «guardado para ellos».
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología eclesiástica añadida porque no aparece ningún divino nombre en este segmento.
  - Se mantiene un registro sobrio y bíblico, con sintaxis breve acorde al género.
  - No se introduce nota textual porque el texto base latino está estable y la auditoría inglesa no registra variantes relevantes.
