    unchanged: false
    changes_summary: Removed the duplicated opening phrase "The third order:". Retained the rest as an accurate and natural rendering of the Latin fragment.
translation:
  language: es
  text: 'El tercer orden: viendo el testimonio que el que los formó dio testimonio acerca de ellos, que mientras vivían guardaron la ley que les fue encomendada.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: uagantur / uidentes
  english_pob_choice: seeing
  chosen_spanish: viendo
  alternatives_spanish:
  - al ver
  - porque ven
  lexicon: Participle present active
  rationale: El latín usa uidentes, que describe una acción simultánea de percepción, no una causa explícita; por eso 'viendo' conserva la estructura participial mejor que 'porque ven'.
- source_word: testimonium
  english_pob_choice: the testimony
  chosen_spanish: el testimonio
  alternatives_spanish:
  - el testimonio dado
  - el testimonio prestado
  lexicon: testimonium
  rationale: '''Testimonio'' reproduce directamente el sustantivo latino y mantiene el sentido forense/atestiguador del pasaje.'
- source_word: testificatus est
  english_pob_choice: bore concerning them
  chosen_spanish: dio acerca de ellos
  alternatives_spanish:
  - atestiguó acerca de ellos
  - dio testimonio de ellos
  lexicon: testificor
  rationale: La forma latina expresa una acción testimonial realizada por el sujeto; 'dio acerca de ellos' preserva la relación con 'testimonio' y evita sobrecargar el español, aunque 'atestiguó' es una alternativa válida.
- source_word: plasmauit eas
  english_pob_choice: he who formed them
  chosen_spanish: el que los formó
  alternatives_spanish:
  - el que las formó
  - el que las plasmó
  lexicon: plasmare
  rationale: '''Formó'' sigue el valor básico de plasmauit y resulta natural en español; ''plasmó'' sería más literal pero menos sobrio. Se usa ''los'' para concordar con ''ellos'' en el referente humano implícito de la sección, según la lectura del contexto latino/inglés.'
- source_word: quoniam uiuentes
  english_pob_choice: while they lived
  chosen_spanish: que mientras vivían
  alternatives_spanish:
  - pues mientras vivían
  - mientras vivían
  lexicon: quoniam + participial clause
  rationale: El inglés POB toma quoniam aquí como cláusula subordinada que introduce el contenido del testimonio; 'que mientras vivían' mantiene esa subordinación y la relación temporal sin convertirla en causalidad.
- source_word: seruauerunt legem
  english_pob_choice: they kept the law
  chosen_spanish: guardaron la ley
  alternatives_spanish:
  - observaron la ley
  - cumplieron la ley
  lexicon: servare + lex
  rationale: '''Guardar la ley'' es una equivalencia estable y fiel al valor de servare en este contexto; ''observaron'' y ''cumplieron'' son posibles, pero ''guardaron'' conserva mejor la idea de custodia fiel.'
- source_word: mandata / entrusted to them
  english_pob_choice: that was entrusted to them
  chosen_spanish: que les fue encomendada
  alternatives_spanish:
  - que les fue confiada
  - que les fue dada
  lexicon: entrust / commit
  rationale: Aunque el latín conservado aquí es fragmentario, el audit trail inglés indica 'entrusted to them'; 'encomendada' transmite bien la idea de depósito confiado y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Cómo rendir la relación entre el testimonio y el cumplimiento de la ley
  english_pob_reading: seeing the testimony that he who formed them bore concerning them, that while they lived they kept the law that was entrusted to them.
  chosen_spanish_reading: viendo el testimonio que el que los formó dio acerca de ellos, que mientras vivían guardaron la ley que les fue encomendada.
  alternative_spanish_readings:
  - viendo el testimonio que el que los formó atestiguó acerca de ellos, que mientras vivían observaron la ley que les fue confiada.
  - al ver el testimonio dado por el que los formó acerca de ellos, mientras vivían guardaron la ley que se les entregó.
  rationale: 'La frase preserva la secuencia de dos elementos: testimonio y obediencia legal. No se suaviza la tensión entre un testimonio externo y una fidelidad histórica a la ley; se mantiene explícita para respetar el argumento del pasaje.'
  doctrine_reference: 4 Esdras 7:94; testimonio divino y obediencia a la ley
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente, que corrigió la duplicación de 'The third order:' y prefirió 'seeing' sobre 'because they see', además de recuperar 'concerning them'. La traducción española sigue esa lectura revisada y no introduce la duplicación previa.
  spanish_consistency_notes:
  - Se mantiene 'ley' para lex/legem en consonancia con el registro bíblico y con la auditable tradición del proyecto.
  - No se usa 'Señor' ni 'Cristo' porque no aparecen en el fragmento latino.
  - Se conservó el orden de ideas del inglés auditado, pero el español adapta la sintaxis para que suene natural y fiel al participio latino.
