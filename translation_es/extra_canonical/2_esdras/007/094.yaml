revisions:
- from: 'La tercera orden: viendo el testimonio que el que los formó dio acerca de ellos, que mientras vivían guardaron la ley que les fue encomendada.'
  to: 'El tercer orden: viendo el testimonio que el que los formó dio testimonio acerca de ellos, que mientras vivían guardaron la ley que les fue encomendada.'
  rationale: Se corrige el encabezado enumerativo a un español natural y se hace explícito el valor testimonial de testificatus est. Se mantiene la estructura participial 'viendo', el contenido del testimonio y la idea de ley encomendada, en línea con el audit trail inglés y el latín disponible. Aunque aún podría pulirse a 'dio acerca de ellos testimonio' o 'atestiguó acerca de ellos', la revisión propuesta corrige los problemas principales sin alejarse del borrador.
