  text: Et quoniam incipiet gloria Altissimi protegere eos qui caste conversati sunt, nos autem pessimis viis ambulavimus?
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/122.yaml
  text: And since the glory of the Most High will begin to protect those who have conducted themselves chastely[a], but we have walked in the most evil ways?
  footnotes:
  - marker: a
    text: Or 'lived chastely'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:25Z'
    unchanged: false
    changes_summary: Replaced 'if' with 'since' for quoniam, 'shelter' with 'protect' for protegere, and 'lived purely' with 'conducted themselves chastely' to reflect caste conversati sunt more closely.
translation:
  language: es
  text: Y puesto que la gloria del Altísimo comenzará a proteger a los que se han conducido con pureza[a] pero nosotros hemos andado por los peores caminos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «han vivido en pureza».'
    reason: alternative_reading
lexical_decisions:
- source_word: quoniam
  english_pob_choice: since
  chosen_spanish: y puesto que
  alternatives_spanish:
  - pues que
  - ya que
  - porque
  lexicon: conjunción causal/consecutiva
  rationale: El latín quoniam introduce la razón o el fundamento de la afirmación; «y puesto que» conserva el valor explicativo sin volverlo demasiado coloquial. Mantiene además el enlace discursivo con la pregunta anterior.
- source_word: gloria Altissimi
  english_pob_choice: the glory of the Most High
  chosen_spanish: la gloria del Altísimo
  alternatives_spanish:
  - la gloria del Dios Altísimo
  - la gloria del Altísimo Dios
  lexicon: gloria / Altissimus
  rationale: «Altísimo» reproduce el título divino del latín y mantiene un registro reverente y bíblico. «Dios» no aparece explícitamente en el texto latino, así que se evita añadirlo al cuerpo principal.
- source_word: protegere
  english_pob_choice: protect
  chosen_spanish: proteger
  alternatives_spanish:
  - cubrir
  - amparar
  - resguardar
  lexicon: protegere
  rationale: El verbo latino significa proteger, resguardar o amparar; «proteger» es la equivalencia más directa y clara en español contemporáneo.
- source_word: eos qui caste conversati sunt
  english_pob_choice: those who have conducted themselves chastely
  chosen_spanish: a los que se han conducido con pureza
  alternatives_spanish:
  - a los que han vivido castamente
  - a los que se han comportado puramente
  - a los que han vivido en pureza
  lexicon: caste / conversati sunt
  rationale: Se evita limitar caste a castidad sexual. «Con pureza» preserva la amplitud moral y religiosa del adverbio latino, en línea con la revisión auditada que rechazó la restricción moderna de «castamente».
- source_word: nos autem
  english_pob_choice: but we
  chosen_spanish: pero nosotros
  alternatives_spanish:
  - mas nosotros
  - en cambio nosotros
  lexicon: nos autem
  rationale: La contraposición se mantiene de forma natural en español con «pero nosotros». El pronombre explícito conserva el contraste enfático del latín.
- source_word: pessimis viis
  english_pob_choice: the most evil ways
  chosen_spanish: los caminos más perversos
  alternatives_spanish:
  - las vías más perversas
  - los peores caminos
  - los caminos más malos
  lexicon: pessimus / viae
  rationale: «Caminos» traduce viae en sentido moral/metafórico, y «perversos» comunica con más naturalidad la intensidad superlativa de pessimis que un calco como «más malos».
theological_decisions:
- issue: Alcance moral de caste
  english_pob_reading: conducted themselves chastely / lived chastely (earlier rendering)
  chosen_spanish_reading: se han conducido con pureza
  alternative_spanish_readings:
  - han vivido castamente
  - se han comportado con castidad
  rationale: La decisión evita reducir el texto a una sola dimensión sexual. En este pasaje, el contraste con «los caminos más perversos» muestra un sentido amplio de conducta pura o íntegra ante Dios.
  doctrine_reference: Santificación / pureza moral
- issue: Título divino Altissimi
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Dios Altísimo
  - el Altísimo Dios
  rationale: Se conserva el título reverente sin añadir una glosa que el latín no expresa. En una obra que privilegia la transparencia textual, el título por sí solo basta y es reconocible en español bíblico.
  doctrine_reference: Teología del nombre y títulos divinos
translation_notes:
  revision_awareness: La redacción sigue la última revisión auditada que prefirió «since/quoniam» como valor causal-explicativo y «protect/protegere»; además, toma en cuenta la corrección posterior que rechazó una lectura demasiado estrecha de caste («castamente» en sentido sexual) y la amplió a una pureza moral general.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para Altissimi como título divino, coherente con la práctica POB de no enmascarar el nombre/título con fórmulas eclesiales ajenas al texto.
  - Se conserva «proteger» para protegere y «caminos» para viae, respetando la imaginería moral del pasaje.
  - La nota[a] ofrece una alternativa española natural sin crear una segunda lectura doctrinal distinta.
