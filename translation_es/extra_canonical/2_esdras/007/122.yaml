- from: Y puesto que la gloria del Altísimo comenzará a proteger a los que se han conducido con pureza[a], pero nosotros hemos andado por los caminos más perversos?
  to: Y puesto que la gloria del Altísimo comenzará a proteger a los que se han conducido con pureza[a] pero nosotros hemos andado por los peores caminos?
  rationale: Se conserva la buena decisión principal de traducir caste en sentido amplio como 'con pureza', con su nota alternativa. Se ajusta únicamente pessimis viis a 'los peores caminos' por mayor fidelidad al superlativo latino, y se simplifica la puntuación para una lectura más natural en español.
