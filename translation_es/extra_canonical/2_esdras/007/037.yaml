revisions:
- from: 'Y entonces el Altísimo dirá a las naciones despertadas[a]: «Mirad y entended a quién negasteis, o a quién no servisteis, o cuyos caminos despreciasteis».'
  to: 'Y entonces el Altísimo dirá a las naciones que han despertado[a]: «Mirad y entended a quién negasteis, o a quién no servisteis, o cuyos caminos despreciasteis».'
  rationale: Se hace una reparación menor para mejorar la naturalidad del español sin perder la imagen de despertar exigida por excitatas y por el contexto inmediato. También se corrige la nota para que conserve una alternativa real y auditada, no una simple paráfrasis de la lectura principal.
