    timestamp: '2026-04-23T11:42:05Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Y entonces el Altísimo dirá a las naciones que han despertado[a]: «Mirad y entended a quién negasteis, o a quién no servisteis, o cuyos caminos despreciasteis».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «naciones que han sido levantadas».
    reason: Preserva la alternativa documentada en la auditoría inglesa previa a la revisión a «awakened nations».
lexical_decisions:
- source_word: Altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Supremo
  lexicon: Altísimo
  rationale: El latín nombra a Dios con un título absoluto; en español bíblico contemporáneo, «el Altísimo» conserva el tono reverente y el valor nominal del título sin añadir una perífrasis innecesaria.
- source_word: excitatas
  english_pob_choice: awakened nations
  chosen_spanish: las naciones despertadas
  alternatives_spanish:
  - las naciones resucitadas
  - las naciones levantadas
  lexicon: despertar
  rationale: La revisión inglesa corrigió «raised» a «awakened» por el campo semántico del latín y el contexto de sueño/despertar. «Despertadas» preserva esa imagen con naturalidad en español.
- source_word: negastis
  english_pob_choice: you denied
  chosen_spanish: negasteis
  alternatives_spanish:
  - rechazasteis
  - renegasteis
  lexicon: negar
  rationale: El latín «negastis» corresponde directamente a «negar». Mantiene la fuerza de repudio o negativa personal sin ampliar el sentido a un rechazo más interpretativo.
- source_word: non servire
  english_pob_choice: did not serve
  chosen_spanish: no servisteis
  alternatives_spanish:
  - no os sirvieron
  - no les disteis servicio
  lexicon: servire
  rationale: «Servisteis» conserva el paralelo verbal del texto fuente y la relación de obediencia/lealtad implícita en el latín, sin convertirlo en una frase más explicativa.
- source_word: uias despicere
  english_pob_choice: despised ways
  chosen_spanish: cuyos caminos despreciasteis
  alternatives_spanish:
  - cuyas sendas menospreciasteis
  - cuyas vías despreciasteis
  lexicon: despreciar
  rationale: «Caminos» reproduce el plural concreto del latín y su uso moral. «Despreciasteis» mantiene la evaluación negativa fuerte del verbo latino.
theological_decisions:
- issue: Identidad y título de Dios
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Dios Altísimo
  - el Supremo
  rationale: El pasaje personifica al juez final con el título divino tradicional. «Altísimo» es suficiente y fiel al latín, evitando añadir formulaciones que no están en el texto.
  doctrine_reference: Teología del juicio divino; título bíblico de Dios como el Altísimo
- issue: Imagen de la resurrección/despertar
  english_pob_reading: awakened nations
  chosen_spanish_reading: naciones despertadas
  alternative_spanish_readings:
  - naciones resucitadas
  - naciones levantadas
  rationale: La revisión inglesa destaca la metáfora de sueño y despertar en el contexto inmediato. En español, «despertadas» preserva esa tensión imagética sin cerrar prematuramente el pasaje a una lectura puramente literalista o puramente metafórica.
  doctrine_reference: Imagen bíblica de despertar/resurrección y juicio
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «nations that have been raised» por «awakened nations» para reflejar mejor excitatas y la metáfora de sueño/despertar del contexto inmediato. La redacción española sigue esa revisión y evita volver a una imagen meramente de elevación física.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» como título divino coherente con el uso bíblico español.
  - Se conserva el paralelismo verbal de negasteis / no servisteis / despreciasteis.
  - El marcador de nota [a] está anclado en «despertadas» para reflejar la alternativa semántica del participio latino.
