base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/037.yaml
  text: And then the Most High will say to the awakened nations[a], “Look and understand whom you denied, or whom you did not serve, or whose ways you despised.
  footnotes:
  - marker: a
    text: Or 'nations that have been raised'.
    reason: previous_rendering
  revision_pass:
