review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el latín conservado y la revisión inglesa: «el Altísimo» refleja correctamente Altissimus; «negasteis», «no servisteis» y «cuyos caminos despreciasteis» reproducen fielmente negastis / non servire / uias despicere. El punto principal a ajustar es «naciones despertadas», que aunque semánticamente posible, suena menos natural en español que «naciones que han despertado» para excitatas en este contexto de despertar/juicio. Además, la nota alternativa actual repite casi la misma idea y no preserva la alternativa inglesa documentada «nations that have been raised».'
  spanish_quality_summary: El texto es claro y digno, pero «las naciones despertadas» resulta algo tieso y participial en español eclesial corriente. «Las naciones que han despertado» mantiene la imagen de despertar con mejor fluidez. También conviene alinear la nota con la alternativa documentada por el historial inglés, usando «naciones que han sido levantadas» o equivalente, no otra reformulación de «despertadas».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «el Altísimo» está bien. No aparecen términos sensibles como Yahvé/Mesías/espíritu. La decisión de evitar «resucitadas» también es correcta, porque cerraría demasiado el matiz de excitatas, que la auditoría inglesa quiso preservar como «awakened».
  issues:
  - severity: medium
    issue: «las naciones despertadas» suena poco natural en español
    rationale: Aunque fiel al campo semántico, el participio adjetival «despertadas» aplicado a «naciones» se percibe más rígido que una construcción verbal como «que han despertado», que conserva mejor la imagen contextual de sueño y despertar.
  - severity: medium
    issue: La nota al pie no refleja la alternativa documentada en la auditoría inglesa
    rationale: La nota inglesa conserva la alternativa previa «nations that have been raised». La nota española actual («que han sido despertadas») solo repite la lectura principal con otra forma verbal, en vez de preservar la alternativa significativa «levantadas»/«alzadas».
  revised_spanish_text: 'Y entonces el Altísimo dirá a las naciones que han despertado[a]: «Mirad y entended a quién negasteis, o a quién no servisteis, o cuyos caminos despreciasteis».'
  revised_footnotes:
  - marker: a
    text: O «naciones que han sido levantadas».
    reason: Preserva la alternativa documentada en la auditoría inglesa previa a la revisión a «awakened nations».
  revision_rationale: Se hace una reparación menor para mejorar la naturalidad del español sin perder la imagen de despertar exigida por excitatas y por el contexto inmediato. También se corrige la nota para que conserve una alternativa real y auditada, no una simple paráfrasis de la lectura principal.
