  revision_rationale: Se revisa ‘estaba haciendo la era’ a ‘formaba el siglo’ para lograr un español más natural y formal, manteniendo el sentido de ‘saeculum’ y el carácter procesual del latín. Se conserva ‘las cosas del juicio’ por fidelidad a la formulación fuente y al audit trail inglés.
