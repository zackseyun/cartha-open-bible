source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'Et respondit ad me et dixit: et quando Altissimus faciens faciebat saeculum, Adam et omnes qui cum eo uenerunt, primum praeparauit iudicium et quae sunt iudicii.'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/070.yaml
  text: And he answered me and said[a], “When the Most High was making the age, he first prepared judgment and the things of judgment for Adam and all who came with him.”
  footnotes:
  - marker: a
    text: Or 'from him'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:13Z'
    unchanged: false
    changes_summary: Reordered the sentence to reflect the Latin more clearly, making 'for Adam and all who came with him' modify 'prepared' rather than 'was making.' Also adjusted 'the things that belong to judgment' to the more literal and formal 'the things of judgment.'
translation:
  language: es
  text: 'Y él me respondió y dijo: «Cuando el Altísimo formaba el siglo, primero preparó el juicio y las cosas del juicio para Adán y todos los que vinieron con él».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Altissimus
  english_pob_choice: Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Supremo
  - el Altísimo Dios
  lexicon: Altissimus
  rationale: ‘Altísimo’ es la forma natural y reverente en español para este título divino, y conserva el valor superlativo del latín sin convertirlo en una paráfrasis.
- source_word: faciens faciebat saeculum
  english_pob_choice: was making the age
  chosen_spanish: estaba haciendo la era
  alternatives_spanish:
  - estaba creando la era
  - estaba haciendo el mundo
  lexicon: saeculum
  rationale: ‘saeculum’ puede abarcar ‘era’ o ‘mundo’; aquí mantengo ‘era’ como en el inglés POB y porque evita sobreespecificar cosmológicamente lo que el latín deja amplio.
- source_word: primum praeparauit iudicium
  english_pob_choice: he first prepared judgment
  chosen_spanish: primero preparó el juicio
  alternatives_spanish:
  - primero dispuso el juicio
  - primero preparó el juicio final
  lexicon: iudicium
  rationale: ‘Juicio’ preserva la sustantivación legal del latín. ‘Preparó’ sigue de cerca ‘praeparauit’ y evita introducir una interpretación más explicativa.
- source_word: quae sunt iudicii
  english_pob_choice: the things of judgment
  chosen_spanish: las cosas del juicio
  alternatives_spanish:
  - las cosas que pertenecen al juicio
  - lo que corresponde al juicio
  lexicon: iudicii
  rationale: La construcción genitiva se conserva de modo formal. ‘Las cosas del juicio’ suena algo duro, pero refleja la formulación del latín y el giro del inglés POB sin suavizar la tensión semántica.
- source_word: cum eo
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - de él
  lexicon: cum
  rationale: El texto latino leído es ‘cum eo’, por lo que ‘con él’ es la traducción directa. Se evita ‘de él’, que correspondería a otra lectura o conjetura distinta.
theological_decisions:
- issue: Relación entre Adán y los que vinieron con él
  english_pob_reading: for Adam and all who came with him
  chosen_spanish_reading: para Adán y todos los que vinieron con él
  alternative_spanish_readings:
  - para Adán y todos los que procedieron de él
  - para Adán y todos los que estaban con él
  rationale: Se mantiene la relación colectiva sin forzar la frase hacia descendencia explícita. El latín base dice ‘cum eo’ (‘con él’), y la traducción española sigue esa lectura mientras conserva la amplitud del contexto apocalíptico.
  doctrine_reference: Texto latino base; revisión textual del pasaje
- issue: Orden sintáctico de 'for Adam and all who came with him'
  english_pob_reading: for Adam and all who came with him
  chosen_spanish_reading: para Adán y todos los que vinieron con él
  alternative_spanish_readings:
  - y para Adán y todos los que vinieron con él
  rationale: Se coloca el complemento final con ‘para’ sobre ‘preparó’ para reflejar la revisión más reciente del inglés POB y evitar que modifique indebidamente ‘estaba haciendo’.
  doctrine_reference: Revisión auditada del inglés POB
translation_notes:
  revision_awareness: This draft follows the latest audited English revision that reattached ‘for Adam and all who came with him’ to ‘prepared’ rather than to ‘was making,’ and it also follows the corrected Latin-based reading ‘with him’ for cum eo instead of the earlier mistaken ‘from him.’
  spanish_consistency_notes:
  - Se usa ‘Altísimo’ para Altissimus, coherente con un registro reverente pero no eclesiásticamente marcado.
  - Se conserva ‘juicio’ de forma consistente para iudicium/iudicii, sin introducir ‘condenación’ ni ‘sentencia’ que estrecharían el campo semántico.
  - No se emplea ‘SEÑOR’ porque el texto fuente no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se mantiene ‘era’ para saeculum conforme al contexto y a la amplitud semántica del término.
