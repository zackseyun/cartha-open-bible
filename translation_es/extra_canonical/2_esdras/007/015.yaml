  source_alignment_summary: 'El borrador sigue bien el latín: ''nunc ergo'' = ''Ahora pues'', ''conturbaris'' = ''te turbas'', ''corruptibilis'' = ''corruptible'', ''mortalis'' = ''mortal''. Sin embargo, para ''moveris'' el texto español principal ''te agitas'' capta razonablemente la idea de inestabilidad, pero la nota ''O te mueves'' reintroduce precisamente la opción que la auditoría inglesa descartó por ambigua y menos fiel en este contexto.'
  spanish_quality_summary: El español es claro y legible. 'Ahora pues' suena digno y natural. La pareja 'te turbas / te agitas' funciona, aunque la nota actual perjudica la claridad semántica. Conviene alinear la nota con el matiz contextual de agitación o sacudimiento, no de simple movimiento.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los términos clave 'corruptible' y 'mortal' están bien preservados. La principal cuestión léxica es mantener para 'moveris' un equivalente español que exprese perturbación o sacudimiento, no movimiento físico neutro.
  issues:
  - severity: medium
    issue: La nota al pie para 'turbas[a]' dice 'O “te mueves”'.
    rationale: La evidencia latina y la revisión auditada en inglés indican que 'moveris' aquí significa 'ser sacudido/agitado', no 'moverse'. Además, la nota está anclada en 'turbas' aunque el alternativo corresponde a la segunda cláusula, lo que crea desalineación entre texto y nota.
  - severity: low
    issue: El anclaje de la nota está en la primera cláusula en vez de en la segunda.
    rationale: Si se conserva una nota léxica, debe aparecer junto a 'te agitas' o el verbo revisado correspondiente, porque el alternativo se refiere a 'moveris', no a 'conturbaris'.
  revised_spanish_text: Ahora pues, ¿por qué te turbas, siendo corruptible? ¿Y por qué te agitas[a], siendo mortal?
  revised_footnotes:
