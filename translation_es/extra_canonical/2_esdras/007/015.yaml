translation:
  language: es
  text: Ahora pues, ¿por qué te turbas, siendo corruptible? ¿Y por qué te agitas[a], siendo mortal?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'eres sacudido'.
    reason: lexical_alternative
lexical_decisions:
- source_word: nunc ergo
  english_pob_choice: So now
  chosen_spanish: Ahora pues
  alternatives_spanish:
  - Pues ahora
  - Así que ahora
  lexicon: n/a
  rationale: Conserva la función inferencial y exhortativa de la partícula latina, con un giro natural en español que mantiene el tono de amonestación.
- source_word: conturbaris
  english_pob_choice: are you disturbed
  chosen_spanish: te turbas
  alternatives_spanish:
  - te perturbaras
  - te inquietas
  - te angustias
  lexicon: n/a
  rationale: El latín expresa turbación/perturbación interior; 'turbas' es breve, idiomático y refleja la idea de alteración del ánimo sin endurecer el sentido.
- source_word: corruptibilis
  english_pob_choice: corruptible
  chosen_spanish: corruptible
  alternatives_spanish:
  - perecedero
  - sujeto a corrupción
  - mortal
  lexicon: n/a
  rationale: Se mantiene el cognado por fidelidad léxica y porque en español comunica bien la cualidad de lo que está sujeto a corrupción o descomposición.
- source_word: moveris
  english_pob_choice: are you shaken
  chosen_spanish: te agitas
  alternatives_spanish:
  - te conmueves
  - te mueves
  - te sacudes
  lexicon: n/a
  rationale: La revisión inglesa aclaró que aquí no es 'moved' en sentido emotivo, sino agitado o sacudido; 'te agitas' comunica mejor esa inestabilidad junto con 'te turbas'.
- source_word: mortalis
  english_pob_choice: mortal
  chosen_spanish: mortal
  alternatives_spanish:
  - destinado a morir
  - perecedero
  lexicon: n/a
  rationale: Se conserva el adjetivo directo del latín, paralelo a 'corruptible', sin añadir interpretación más amplia que la requerida por el texto.
theological_decisions:
- issue: Paralelismo entre corrupción y mortalidad como fundamento de la exhortación
  english_pob_reading: why are you disturbed... And why are you shaken, seeing that you are corruptible / mortal?
  chosen_spanish_reading: ¿por qué te turbas... ¿Y por qué te agitas, siendo corruptible / mortal?
  alternative_spanish_readings:
  - ¿por qué te inquietas...
  - ¿por qué te perturba esto...
  rationale: 'El versículo pone dos razones antropológicas que rebajan la inquietud humana: la condición corruptible y la mortalidad. La traducción conserva ese paralelismo sin explicitar una doctrina ajena al texto.'
  doctrine_reference: Antropología bíblica / condición humana finita
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió 'moved' por 'shaken' para reflejar mejor moveris como agitación o sacudida mental, en paralelo con conturbaris. La versión española sigue esa decisión al usar 'te agitas' y no un calco emotivo como 'te conmueves'.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o términos no presentes porque el texto latino no contiene el nombre divino ni títulos cristológicos.
  - Se mantiene el paralelismo sintáctico de las dos preguntas retóricas para reflejar la estructura del latín.
  - '''Corruptible'' y ''mortal'' se dejan en forma directa y reconocible en español, coherente con el nivel léxico del original.'
