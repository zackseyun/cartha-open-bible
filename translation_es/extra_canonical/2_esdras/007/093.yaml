translation:
  language: es
  text: 'El segundo orden: porque ven la maraña[a] en la que vagan las almas de los impíos, y el castigo que les espera.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entrelazamiento».
    reason: lexical_alternative
lexical_decisions:
- source_word: complicationem
  english_pob_choice: entanglement
  chosen_spanish: maraña
  alternatives_spanish:
  - entrelazamiento
  - enredo
  - complicación
  lexicon: complico / complicatio
  rationale: El latín sugiere algo “doblado/juntado” o enredado; «maraña» conserva la imagen de una situación enredada y evita el matiz demasiado psicológico de «perplejidad». También funciona naturalmente con el verbo siguiente «vagan».
- source_word: uagantur
  english_pob_choice: wander
  chosen_spanish: vagan
  alternatives_spanish:
  - deambulan
  - andan errantes
  lexicon: vagor
  rationale: «Vagan» expresa bien el movimiento sin rumbo del latín y mantiene la idea de errancia de las almas impías.
- source_word: animae impiorum
  english_pob_choice: the souls of the ungodly
  chosen_spanish: las almas de los impíos
  alternatives_spanish:
  - las almas de los malvados
  - las almas de los injustos
  lexicon: anima / impius
  rationale: «Impíos» corresponde de forma directa y tradicional al valor moral-religioso de *impii*; «almas» conserva el sujeto espiritual del texto.
- source_word: poena
  english_pob_choice: punishment
  chosen_spanish: el castigo
  alternatives_spanish:
  - la pena
  - el suplicio
  lexicon: poena
  rationale: «Castigo» es el equivalente más claro y amplio en español para *poena* en este contexto escatológico.
theological_decisions:
- issue: Descripción del estado de las almas impías tras la muerte
  english_pob_reading: the entanglement in which the souls of the ungodly wander, and the punishment that awaits them
  chosen_spanish_reading: la maraña en la que vagan las almas de los impíos, y el castigo que les espera
  alternative_spanish_readings:
  - la confusión en la que vagan las almas de los impíos
  - la perplejidad en que vagan las almas de los impíos
  rationale: Se conserva la tensión entre un estado de desorden/atrapamiento y el castigo futuro. «Maraña» sigue la revisión inglesa hacia *entanglement* y no suaviza el juicio final.
  doctrine_reference: 2 Esdras 7:93; estado postmortem y retribución escatológica
translation_notes:
  revision_awareness: La revisión inglesa cambió la opción previa de «perplexity» a «entanglement» por el valor de *complicationem* y el contexto de *vagantur*. La versión española adopta esa revisión y evita una lectura meramente psicológica.
  spanish_consistency_notes:
  - Se mantiene «segunda orden» para *Secundus ordo* siguiendo la estructura del texto fuente.
  - Se usa «Yahvé» por norma del proyecto solo cuando el texto fuente lo justifica; aquí no aparece el nombre divino.
  - «Impíos» conserva el registro bíblico y la carga moral del latín *impii*.
