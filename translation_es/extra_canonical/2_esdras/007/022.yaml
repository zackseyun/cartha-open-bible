translation:
  language: es
  text: Pero ellos no fueron persuadidos y le contradijeron[a], y formaron para sí pensamientos vanos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se opusieron a él'.
    reason: alternative_reading
  - marker: b
    text: O 'pensamientos de vanidad'.
    reason: alternative_reading
lexical_decisions:
- source_word: hii autem non sunt persuasi
  english_pob_choice: But they were not persuaded
  chosen_spanish: Pero ellos no fueron persuadidos
  alternatives_spanish:
  - Pero no quedaron persuadidos
  - Pero no se dejaron convencer
  lexicon: persuadeo / persuadere
  rationale: El latín expresa falta de persuasión en voz pasiva; en español, 'no fueron persuadidos' conserva esa pasividad y el valor de negativa resistente sin intensificar innecesariamente el sentido.
- source_word: contradixerunt ei
  english_pob_choice: contradicted him
  chosen_spanish: le contradijeron
  alternatives_spanish:
  - se opusieron a él
  - le replicaron
  lexicon: contradico / contradicere
  rationale: Se mantiene la cercanía léxica con el latín y con el audit trail inglés, evitando 'oponerse' en el texto principal, aunque en este contexto la contradicción implica resistencia a la orden divina.
- source_word: constituerunt sibi cogitamenta vanitatis
  english_pob_choice: formed for themselves vain thoughts
  chosen_spanish: se formaron para sí pensamientos vanos
  alternatives_spanish:
  - se forjaron para sí pensamientos vanos
  - idearon para sí pensamientos vacíos
  lexicon: constituo / constituere; cogitamenta vanitatis
  rationale: '''Se formaron'' sigue de cerca ''constituerunt'' según la revisión inglesa, y ''pensamientos vanos'' reproduce la cualidad genitiva de ''vanitatis'' sin calcar torpemente ''pensamientos de vanidad''.'
theological_decisions:
- issue: La resistencia humana frente al mandato divino implícito en el contexto
  english_pob_reading: they were not persuaded and contradicted him
  chosen_spanish_reading: no fueron persuadidos y le contradijeron
  alternative_spanish_readings:
  - no se dejaron convencer y se opusieron a él
  - no aceptaron y se rebelaron contra él
  rationale: El pasaje describe rechazo deliberado, no mera discrepancia intelectual. 'Le contradijeron' mantiene la tensión de oposición al mandato, sin borrar el matiz de resistencia verbal y moral.
  doctrine_reference: Responsabilidad humana y desobediencia frente a la voluntad divina (contexto de 4 Esdras 7:21-22).
- issue: '''Thoughts of vanity'' como expresión idiomática de vaciedad moral/mental'
  english_pob_reading: vain thoughts
  chosen_spanish_reading: pensamientos vanos
  alternative_spanish_readings:
  - pensamientos vacíos
  - pensamientos de vanidad
  rationale: '''Pensamientos vanos'' comunica la cualidad de vaciedad, inutilidad o falsedad del genitivo semítico reflejado en el latín, y preserva mejor el valor idiomático que una construcción más literal.'
  doctrine_reference: Lenguaje sapiencial sobre la necedad/vacuidad interior.
translation_notes:
  revision_awareness: El inglés POB pasó de 'opposed him' a 'contradicted him' para acercarse más a contradixerunt, y de 'devised/established' a 'formed' para constituere. La versión española refleja esa última decisión con 'le contradijeron' y 'se formaron para sí', manteniendo el vínculo léxico directo con el latín y la revisión más reciente.
  spanish_consistency_notes:
  - Se usa 'le' con 'contradijeron' para mantener la referencia personal directa en español y evitar una formulación más abstracta.
  - '''Pensamientos vanos'' se conserva en plural y sin artículo para reproducir el paralelo nominal breve del latín.'
  - No se usa 'SEÑOR' ni otro eufemismo porque el versículo depende del contexto inmediato y no contiene el tetragrámaton en este segmento.
