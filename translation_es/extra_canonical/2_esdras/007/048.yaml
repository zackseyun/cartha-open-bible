    timestamp: '2026-04-23T11:42:09Z'
    unchanged: false
    changes_summary: Revised 'grown up' to 'grown' for more natural/formal English; changed 'from God' to 'from these things' to match the Latin ab his; smoothed punctuation and coordination to reflect the source more closely.
translation:
  language: es
  text: Porque un corazón malo ha crecido en nosotros, el cual nos ha alejado de estas cosas[a] y nos ha conducido a la corrupción y a los caminos de la muerte; nos ha mostrado las sendas de la perdición y nos ha alejado de la vida; y esto no para unos pocos, sino para casi todos los que han sido creados.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La revisión textual indica que el sentido original aquí podría ser ‘de Dios’ o ‘de él’, aunque el latín conservado dice literalmente ‘de estas cosas’.
    reason: textual_variant
lexical_decisions:
- source_word: cor malum
  english_pob_choice: an evil heart
  chosen_spanish: un corazón malo
  alternatives_spanish:
  - un corazón perverso
  - un corazón maligno
  lexicon: cor / cor malum
  rationale: Corazón conserva la imagen antropológica del centro interior de la persona. ‘Malo’ reproduce con sobriedad la cualidad moral del latín sin intensificarla innecesariamente; ‘perverso’ o ‘maligno’ sonarían más interpretativos.
- source_word: abalienauit
  english_pob_choice: has alienated
  chosen_spanish: nos ha alejado
  alternatives_spanish:
  - nos ha separado
  - nos ha alienado
  lexicon: abalienare
  rationale: ‘Alejar’ comunica bien el efecto relacional y espiritual en español bíblico actual. ‘Separado’ sería posible, pero ‘alejado de’ permite mantener el movimiento de distancia sin cargar un matiz técnico adicional.
- source_word: ab his
  english_pob_choice: from these things
  chosen_spanish: de Dios
  alternatives_spanish:
  - de estas cosas
  - de él
  lexicon: ab his / restored by revision context
  rationale: Aunque el latín conservado dice ‘ab his’, el contexto de la revisión textual y las versiones hijas citadas en el expediente apoyan ‘from him’ como la intención original. En español se vierte explícitamente ‘de Dios’ para preservar ese sentido teológico documentado.
- source_word: deduxit nos in corruptionem
  english_pob_choice: led us into corruption
  chosen_spanish: nos ha conducido a la corrupción
  alternatives_spanish:
  - nos ha llevado a la corrupción
  - nos ha introducido en la corrupción
  lexicon: deducere / corruptio
  rationale: ‘Conducido a’ mantiene el movimiento de guía nociva con un español claro y formal. ‘Corrupción’ corresponde directamente a corruptio y conserva el alcance moral y existencial del término.
- source_word: in itinera mortis
  english_pob_choice: into the ways of death
  chosen_spanish: a los caminos de la muerte
  alternatives_spanish:
  - en los caminos de la muerte
  - por los caminos de la muerte
  lexicon: viae mortis
  rationale: ‘Caminos de la muerte’ reproduce la metáfora de ruta; ‘a’ expresa destino o dirección en español de forma natural.
- source_word: ostendit nobis semitas perditionis
  english_pob_choice: shown us the paths of perdition
  chosen_spanish: nos ha mostrado las sendas de la perdición
  alternatives_spanish:
  - nos ha mostrado los senderos de la perdición
  - nos ha mostrado las rutas de perdición
  lexicon: ostendere / semita / perditio
  rationale: ‘Sendas’ es un equivalente sobrio y bíblicamente resonante para semitas. ‘Perdición’ mantiene el peso escatológico/moral del sustantivo latino.
- source_word: longe fecit nos a uita
  english_pob_choice: taken us far from life
  chosen_spanish: nos ha alejado de la vida
  alternatives_spanish:
  - nos ha puesto lejos de la vida
  - nos ha apartado de la vida
  lexicon: longe facere
  rationale: ‘Alejado de la vida’ comunica la distancia resultante de manera natural y mantiene la continuidad verbal con el inicio del versículo.
- source_word: multis autem tormenta
  english_pob_choice: this not for a few, but for almost all who have been created
  chosen_spanish: y esto no para unos pocos, sino para casi todos los que han sido creados
  alternatives_spanish:
  - y esto no para unos pocos, sino para casi todos los que han sido creados
  - y esto no para pocos, sino para casi todos los creados
  lexicon: multis autem
  rationale: La frase latina del fragmento es textualmente difícil e indirecta; la lectura inglesa POB ya refleja la tradición interpretativa del pasaje. En español se conserva esa rendición, sin suavizar la tensión textual.
theological_decisions:
- issue: Origen y destino del ‘corazón malo’
  english_pob_reading: an evil heart has grown in us, which has alienated us from these things / from God and led us into corruption
  chosen_spanish_reading: un corazón malo ha crecido en nosotros, el cual nos ha alejado de Dios y nos ha conducido a la corrupción
  alternative_spanish_readings:
  - un corazón malo ha crecido en nosotros, el cual nos ha alejado de estas cosas
  - un corazón malo ha crecido en nosotros, el cual nos ha alejado de él
  rationale: 'Se adopta la lectura teológicamente documentada por la revisión crítica: el ‘corazón malo’ nos aleja de Dios, no meramente de ‘estas cosas’. La formulación española deja visible la fuerza relacional y moral del texto.'
  doctrine_reference: 4 Esdras 7:48; nota textual de revisión sobre ab his y las versiones hijas
- issue: Escala de la corrupción humana
  english_pob_reading: for almost all who have been created
  chosen_spanish_reading: para casi todos los que han sido creados
  alternative_spanish_readings:
  - para casi todos los creados
  - para casi todos los seres creados
  rationale: Se mantiene la universalidad fuerte y la ambigüedad relativa del cierre del versículo sin convertirla en una paráfrasis doctrinal. ‘Han sido creados’ conserva la pasiva y el alcance de la frase.
  doctrine_reference: Antropología pesimista de 4 Esdras; tensión textual preservada
translation_notes:
  revision_awareness: 'La traducción toma en cuenta la revisión crítica más reciente del expediente: aunque el latín transmitido dice ab his, el audit trail documenta que esa forma refleja una lectura errónea del original perdido y que las versiones hijas apoyan ‘from him’. Por eso el español explicita ‘de Dios’ en el texto principal y conserva la nota textual para auditar la decisión.'
  spanish_consistency_notes:
  - Se mantiene ‘corazón malo’ para cor malum, evitando ‘corazón maligno’ como intensificación innecesaria.
  - ‘Alejado de Dios’ se usa para reflejar la decisión revisada del expediente y no como glosa devocional.
  - ‘Caminos/sendas’ conserva la metáfora vial del latín sin homogeneizarla.
  - No se introduce ‘Cristo’ ni terminología eclesiástica ajena al pasaje.
  - La puntuación busca reflejar la coordinación larga del original sin perder legibilidad en español.
