base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/048.yaml
  text: For an evil heart has grown in us[a], which has alienated us from these things and led us into corruption and into the ways of death, shown us the paths of perdition, and taken us far from life; and this not for a few, but for almost all who have been created.”
  footnotes:
