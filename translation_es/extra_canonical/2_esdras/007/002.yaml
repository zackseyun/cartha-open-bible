lexical_decisions:
- source_word: surge
  english_pob_choice: Rise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Alzate
  lexicon: surge
  rationale: El latín surge pide un mandato claro de ponerse en pie. «Levántate» es natural en español bíblico y conserva el valor imperativo sin volverlo explicativo.
- source_word: Ezra
  english_pob_choice: Ezra
  chosen_spanish: Esdras
  alternatives_spanish:
  - Ezra
  lexicon: Ezra
  rationale: En español bíblico, el nombre tradicional y reconocido es «Esdras». Mantiene inteligibilidad sin perder la referencia propia del personaje.
- source_word: audi
  english_pob_choice: hear
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - escucha atentamente
  lexicon: audi
  rationale: «Audi» expresa atención obediente a unas palabras pronunciadas. «Escucha» conserva mejor esa fuerza que un simple «oye».
- source_word: sermones
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los dichos
  - las declaraciones
  lexicon: sermones
  rationale: El latín sermones aquí significa las palabras o expresiones que se van a comunicar. «Palabras» es la equivalencia más directa y sobria.
- source_word: veni loqui ad te
  english_pob_choice: I have come to speak to you
  chosen_spanish: he venido a decirte
  alternatives_spanish:
  - he venido a hablarte
  - he venido para hablar contigo
  lexicon: veni
  rationale: El sentido es la llegada con intención de hablar; en español «decirte» mantiene la inmediatez de un mensaje dirigido a Ezra y suena natural en una orden divina.
theological_decisions:
- issue: Imperativo y autoridad de la voz que habla
  english_pob_reading: Rise, Ezra, and hear the words that I have come to speak to you.
  chosen_spanish_reading: Levántate, Esdras, y escucha las palabras que he venido a decirte.
  alternative_spanish_readings:
  - Levántate, Esdras, y oye las palabras que he venido a decirte
  - Ponte de pie, Esdras, y escucha las palabras que he venido a decirte
  rationale: El texto presenta una llamada autoritativa a responder. «Escucha» mantiene mejor la dimensión de obediencia que simplemente «oye», sin añadir contenido doctrinal no presente.
  doctrine_reference: Narrative imperative; no doctrinal expansion
