    rationale: «Barro» puede sugerir lodo o mezcla ya humedecida; «arcilla» corresponde más estrechamente al material de la lista.
  - severity: low
    issue: «Produces» en español suena algo menos natural
    rationale: «Producir» es comprensible, pero «sacas» o «produces» no mejoran claramente; «produces» puede mantenerse para cercanía al audit trail. No requiere cambio forzoso.
