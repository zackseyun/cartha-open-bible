translation:
  language: es
  text: 'Dile: «Tú produces oro, plata, bronce, y también hierro, plomo y arcilla».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: aurum
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  lexicon: Latín aurum → español oro
  rationale: «Oro» es la equivalencia directa, natural y transparente para aurum. «Oro fino» añadiría precisión no presente en el texto fuente.
- source_word: argentum
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - argento
  - plata refinada
  lexicon: Latín argentum → español plata
  rationale: La pareja metalúrgica del listado se expresa de forma natural en español con «plata». «Argento» suena marcado o arcaizante, y «plata refinada» añade información.
- source_word: aes
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - metal
  lexicon: Latín aes → español bronce
  rationale: «Bronce» mantiene el valor tradicional de la serie de metales del pasaje en español y corresponde bien al sentido de metal trabajado que la POB inglesa resolvió como bronze.
- source_word: ferrum
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - acero
  lexicon: Latín ferrum → español hierro
  rationale: «Hierro» es la correspondencia básica y más fiel; «acero» sería una especificación no sustentada por el latín.
- source_word: plumbum
  english_pob_choice: lead
  chosen_spanish: plomo
  alternatives_spanish:
  - estaño
  lexicon: Latín plumbum → español plomo
  rationale: El latín plumbum se traduce de manera directa por «plomo». Mantiene el inventario de materiales sin reinterpretación.
- source_word: limum / clay
  english_pob_choice: clay
  chosen_spanish: barro
  alternatives_spanish:
  - arcilla
  lexicon: Latín limum / material terroso → español barro
  rationale: Aunque «arcilla» sería posible, «barro» conserva mejor en español la textura terrosa y maleable que el contexto de la lista sugiere. También es una palabra muy natural en una enumeración de materiales.
- source_word: Dices ei
  english_pob_choice: Say to it
  chosen_spanish: Dile
  alternatives_spanish:
  - Di a ello
  - Háblale
  lexicon: Latín dic / dices ei → español decir + clítico
  rationale: La forma imperativa breve «Dile» reproduce con naturalidad el mandato del texto y evita una construcción más pesada. En español el clítico se integra bien aun con un referente inanimado personificado por el contexto.
theological_decisions:
- issue: Personificación de la tierra/materiales
  english_pob_reading: Say to it
  chosen_spanish_reading: Dile
  alternative_spanish_readings:
  - Díselo
  - Háblale
  rationale: El texto trata el objeto como interlocutor, una personificación retórica del material o de la tierra. «Dile» conserva esa fuerza sin introducir explicación adicional.
  doctrine_reference: Figura retórica; sin carga doctrinal específica
translation_notes:
  revision_awareness: 'La fuente latina limpia y la auditoría inglesa coinciden en el núcleo semántico: una orden dirigida a la tierra/material para que produzca una serie de metales y barro. La versión inglesa aprobada no presenta notas ni revisiones sustantivas, y el fragmento latino dado está parcialmente corrupto; por eso la redacción española sigue de cerca el enunciado ya estabilizado en inglés, sin sobreinterpretar las formas latinas fragmentarias.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y publicable.
  - Se evita «SEÑOR» o vocabulario teológico ajeno porque el versículo no contiene lenguaje divino explícito.
  - Se conserva la enumeración de materiales sin añadir artículos innecesarios para respetar el ritmo del original.
  - «Dile» usa personificación retórica, coherente con el inglés «Say to it».
