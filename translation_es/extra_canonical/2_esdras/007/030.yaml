source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: et convertetur saeculum in antiquum silentium diebus septem sicut in prioribus initiis, ita ut nemo derelinquatur.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/030.yaml
  text: And the age will return to the ancient silence for seven days, as in the former beginnings, so that no one is left behind.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:34Z'
    unchanged: false
    changes_summary: Changed 'will be turned back into' to 'will return to' for more natural rendering of convertetur; changed 'is left' to 'is left behind' to better reflect derelinquatur.
translation:
  language: es
  text: Y la era volverá al antiguo silencio por siete días, como en los comienzos anteriores, de modo que no quede nadie atrás.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et convertetur
  english_pob_choice: And the age will return
  chosen_spanish: Y la era volverá
  alternatives_spanish:
  - Y el siglo volverá
  - Y la edad volverá
  - Y la era será devuelta
  lexicon: convertetur -> volverá; saeculum -> era
  rationale: El latín pasivo/futuro de convertetur se expresa con naturalidad en español como «volverá»; «volverá al» conserva la idea de retorno sin forzar una pasiva. «Era» refleja el valor de saeculum como período/edad del mundo mejor que «siglo» en este contexto apocalíptico.
- source_word: saeculum
  english_pob_choice: the age
  chosen_spanish: la era
  alternatives_spanish:
  - el siglo
  - la edad
  - el mundo
  lexicon: saeculum -> era/edad del mundo
  rationale: «Era» mantiene el sentido de un orden temporal amplio y es comprensible en español. Evita «siglo», que sugeriría un lapso de cien años, y «mundo», que añade una concreción no exigida por el latín.
- source_word: in antiquum silentium
  english_pob_choice: to the ancient silence
  chosen_spanish: al antiguo silencio
  alternatives_spanish:
  - al silencio antiguo
  - a la antigua quietud
  - al silencio primordial
  lexicon: antiquus + silentium -> antiguo silencio
  rationale: Se conserva la imagen literal de un «silencio antiguo». «Al antiguo silencio» suena natural y mantiene el paralelismo con la fuente; «primordial» o «quietud» interpretan más de lo que el texto dice.
- source_word: diebus septem
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - en siete días
  lexicon: diebus septem -> por siete días
  rationale: «Por siete días» expresa duración continua y corresponde bien al ablativo temporal del latín. «Durante» también sería posible, pero «por» resulta más sobrio y cercano al ritmo del inglés POB.
- source_word: sicut in prioribus initiis
  english_pob_choice: as in the former beginnings
  chosen_spanish: como en los comienzos anteriores
  alternatives_spanish:
  - como en los comienzos primeros
  - como en los primeros principios
  - según en los comienzos anteriores
  lexicon: sicut -> como; prioribus initiis -> comienzos anteriores
  rationale: «Comienzos anteriores» reproduce el sentido de prioribus initiis sin redundancia excesiva. «Primeros principios» sería más idiomático en algunos registros, pero añade una abstracción no explícita.
- source_word: ita ut nemo derelinquatur
  english_pob_choice: so that no one is left behind
  chosen_spanish: de modo que no quede nadie atrás
  alternatives_spanish:
  - para que nadie sea dejado atrás
  - de manera que no se abandone a nadie
  - así que nadie quede atrás
  lexicon: ita ut + subjunctive; derelinquatur -> no quede atrás
  rationale: La revisión inglesa prefirió «is left behind» por reflejar mejor derelinquatur. En español, «no quede nadie atrás» conserva la pasiva de sentido sin recurrir a una construcción más pesada; «sea dejado atrás» sería más literal, pero menos fluido.
theological_decisions:
- issue: Naturaleza de saeculum como realidad escatológica temporal
  english_pob_reading: the age
  chosen_spanish_reading: la era
  alternative_spanish_readings:
  - el siglo
  - el mundo
  rationale: No se interpreta saeculum como un período técnico moderno ni como la totalidad cosmológica de forma explícita. «La era» conserva la amplitud escatológica del término sin imponer una lectura doctrinal adicional.
  doctrine_reference: escatología y lenguaje apocalíptico
- issue: Sentido de derelinquatur
  english_pob_reading: so that no one is left behind
  chosen_spanish_reading: de modo que no quede nadie atrás
  alternative_spanish_readings:
  - para que nadie sea dejado atrás
  - para que nadie quede abandonado
  rationale: La frase evita suavizar derelinquatur hasta un mero «no se quede», porque el texto implica ser dejado fuera o atrás. «Quede atrás» mantiene la tensión de exclusión sin añadir la idea de abandono personal que el latín no explicita.
  doctrine_reference: escatología de preservación/exclusión
- issue: Imagen del silencio antiguo
  english_pob_reading: the ancient silence
  chosen_spanish_reading: el antiguo silencio
  alternative_spanish_readings:
  - la antigua quietud
  - el silencio primordial
  rationale: Se conserva la imagen apocalíptica de silencio y antigüedad sin moralizarla ni convertirla en una idea distinta de paz o reposo. Esto respeta el carácter imagético del pasaje.
  doctrine_reference: literatura apocalíptica
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que corrigió 'will be turned back into' a 'will return to' por mayor naturalidad de convertetur y ajustó 'is left' a 'is left behind' para reflejar mejor derelinquatur. La versión española adopta esas decisiones semánticas con 'volverá' y 'quede nadie atrás'.
  spanish_consistency_notes:
  - Se usa «era» para saeculum en lugar de «siglo», por coherencia con un marco apocalíptico y para evitar una lectura cronológica moderna.
  - Se mantiene «silencio» como sustantivo central para conservar la imagen del original latino.
  - No se introducen términos eclesiásticos tradicionales ajenos al texto, y se evita paraphrasear más allá de la evidencia del latín y del POB inglés.
