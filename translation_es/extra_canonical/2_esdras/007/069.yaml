- from: Y si después de la muerte no entráramos en juicio, tal vez habría sido mejor para nosotros.”
  to: Y si después de la muerte no compareciéramos a juicio, tal vez habría sido mejor para nosotros.”
  rationale: Se reemplaza «no entráramos en juicio» por «no compareciéramos a juicio» para reflejar de manera más natural y precisa la idea del latín uenientes in iudicio y del inglés POB «were not coming into judgment», sin añadir interpretación doctrinal.
