translation:
  language: es
  text: 'Dije: «Señor, ¿cómo podrá ser?» Y me dijo: «No solamente esto, sino pregunta…»[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio anterior del POB desarrollaba esta frase como: «Y me dijo: “No solamente esto, sino pregunta a la tierra, y ella te dirá; córtjala, y ella te declarará.”». Ese contenido no pertenece al latín base de este versículo, que aquí termina de forma truncada en «pregunta…».'
    reason: previous_rendering_clarification
lexical_decisions:
- source_word: dixi
  english_pob_choice: I said
  chosen_spanish: Yo dije
  alternatives_spanish:
  - Dije
  - Yo le dije
  lexicon: dico
  rationale: El latín expresa una primera persona simple de habla directa. En español, «Yo dije» conserva la apertura narrativa y mantiene el paralelo con la respuesta inmediata sin añadir elementos no presentes en el texto base.
- source_word: domine
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Yahvé
  lexicon: dominus
  rationale: Aquí el hablante se dirige al interlocutor del relato, no al nombre divino explicitado en el latín. «Señor» es la forma natural y reverente para este vocativo en español.
- source_word: quomodo poterit?
  english_pob_choice: how can it be?
  chosen_spanish: ¿cómo podrá ser?
  alternatives_spanish:
  - ¿cómo puede ser?
  - ¿cómo será posible?
  lexicon: posse
  rationale: La pregunta latina usa una posibilidad/facultad futura. «Podrá ser» preserva mejor esa apertura modal que una mera posibilidad presente, y evita sobreinterpretar el contenido exacto de la duda.
- source_word: non hoc solummodo
  english_pob_choice: Not only this
  chosen_spanish: No solo esto
  alternatives_spanish:
  - No solamente esto
  - No solo eso
  lexicon: solum
  rationale: La negación restrictiva del latín se vierte de modo idiomático y claro en español. «Esto» mantiene la referencia cercana y deja abierta la continuación truncada por la tradición textual del verso.
- source_word: interroga
  english_pob_choice: ask—
  chosen_spanish: pregunta…
  alternatives_spanish:
  - interroga…
  - pregunta—
  lexicon: interrogo
  rationale: El imperativo latino admite «pregunta» en español moderno, más natural y legible que «interroga» en registro bíblico. Los puntos suspensivos señalan que la cita queda incompleta en el testimonio latino proporcionado, como en el audit trail inglés.
theological_decisions:
- issue: Tratamiento del vocativo en segunda persona
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor mío
  - Yahvé
  rationale: El texto latino solo ofrece un vocativo reverente. No hay base en este verso para convertirlo en un reemplazo del nombre divino. Mantener «Señor» respeta el alcance inmediato del testimonio sin forzar una identificación teológica adicional.
  doctrine_reference: Protocolo POB sobre el uso de Yahvé solo cuando el texto fuente lo sostenga claramente.
- issue: Verso truncado y cita abierta
  english_pob_reading: And he said to me, “Not only this, but ask—
  chosen_spanish_reading: «No solo esto, sino pregunta…»
  alternative_spanish_readings:
  - «No solo esto, sino pregunta—»
  - «No solo esto, sino interroga…»
  rationale: El latín recibido termina en imperativo abierto, y el audit trail inglés conserva esa incompletitud. En español, los puntos suspensivos preservan la suspensión retórica sin añadir contenido del siguiente segmento textual.
  doctrine_reference: Crítica textual y delimitación del versículo según el testimonio latino base.
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue corregida recientemente para eliminar material que pertenecía al versículo siguiente y para restaurar el inicio real del verso. Esta propuesta sigue esa revisión: traduce solo el latín dado (dixi: domine, quomodo poterit? Et dixit ad me: non hoc solummodo, sed interroga) y conserva la apertura final sin importar contenido externo.'
  spanish_consistency_notes:
  - Se mantiene «Señor» como vocativo reverente, sin sustituirlo por Yahvé, porque el texto fuente aquí no contiene el nombre divino.
  - Se eligió un español natural y sobrio, con puntuación que refleje la cita incompleta del texto latino.
  - La nota al pie recoge la variante previa del POB para preservar la transparencia textual sin mezclarla con el texto principal.
