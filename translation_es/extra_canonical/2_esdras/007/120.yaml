source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: Et quoniam praedicta est nobis perennis spes, nos vero pessime vani facti sumus?
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/120.yaml
  text: And if everlasting hope has been foretold to us[a], but we have become utterly vain?
  footnotes:
  - marker: a
    text: Or 'utterly vain'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:23Z'
    unchanged: false
    changes_summary: Removed the duplicated phrase, corrected the malformed ending, and revised 'utterly futile' to 'utterly vain' to reflect Latin pessime vani more closely in formal English.
translation:
  language: es
  text: ¿Y si nos ha sido anunciada una esperanza eterna, pero nosotros nos hemos vuelto del todo vanos?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: perennis spes
  english_pob_choice: everlasting hope
  chosen_spanish: esperanza eterna
  alternatives_spanish:
  - esperanza perdurable
  - esperanza duradera
  lexicon: spes -> esperanza; perennis -> eterna/perpetua/perdurable
  rationale: «Esperanza eterna» reproduce con naturalidad la fuerza de perennis spes y conserva el valor escatológico de una esperanza que no termina, sin endurecerlo con un giro más técnico que el latino no exige.
- source_word: praedicta est nobis
  english_pob_choice: has been foretold to us
  chosen_spanish: nos ha sido anunciada
  alternatives_spanish:
  - nos ha sido profetizada
  - nos fue anunciada
  lexicon: praedicere -> anunciar, proclamar, predecir
  rationale: «Anunciada» mantiene la idea de algo dado de antemano a nosotros y evita forzar un matiz profético explícito que el contexto latino no obliga a marcar en español.
- source_word: pessime vani facti sumus
  english_pob_choice: we have become utterly vain
  chosen_spanish: nos hemos vuelto del todo vanos
  alternatives_spanish:
  - nos hemos vuelto completamente vacíos
  - nos hemos vuelto del todo fútiles
  lexicon: vanus -> vano, vacío, fútil, inútil
  rationale: '«Vanos» conserva la ambigüedad bíblico-apocalíptica de vanus: vacío, sin provecho, fútil. Se evita «vanidosos», que sugeriría presunción moral, y «fútiles», que es más interpretativo.'
theological_decisions:
- issue: Sentido de la esperanza eterna frente a la condición humana descrita como vanidad/vacío
  english_pob_reading: And if everlasting hope has been foretold to us, but we have become utterly vain?
  chosen_spanish_reading: ¿Y si nos ha sido anunciada una esperanza eterna, pero nosotros nos hemos vuelto del todo vanos?
  alternative_spanish_readings:
  - ¿Y si se nos ha anunciado una esperanza eterna, pero hemos quedado completamente vacíos?
  - ¿Y si se nos ha profetizado una esperanza eterna, pero nos hemos hecho del todo fútiles?
  rationale: La línea latina contrapone la promesa de esperanza perenne con la confesión de estar hechos vani. La versión española conserva esa tensión sin resolverla, dejando al lector oír tanto el sentido de vacío como el de inutilidad moral-existencial.
  doctrine_reference: Vanidad humana frente a la esperanza escatológica; lenguaje sapiencial y apocalíptico sobre la fragilidad humana.
translation_notes:
  revision_awareness: La revisión reciente corrigió una lectura inglesa excesivamente fuerte o imprecisa de pessime vani hacia 'utterly vain'; por eso el español evita 'fútiles' como única opción y usa 'vanos', que preserva mejor la amplitud semántica del latino sin introducir presunción de orgullo.
  spanish_consistency_notes:
  - Se conserva el orden lógico de la frase condicional con «¿Y si... pero...?» para reflejar el latín Et quoniam... nos vero...
  - Se evita el término 'Señor' u otra adaptación devocional porque el verso no contiene el nombre divino ni un título cristológico.
  - Se usa puntuación interrogativa completa en español para reflejar la forma retórica del original.
