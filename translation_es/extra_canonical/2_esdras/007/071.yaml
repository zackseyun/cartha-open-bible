translation:
  language: es
  text: Y ahora, comprende a partir de tus propias palabras, porque dijiste que el entendimiento crece con nosotros.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: de sermonibus tuis
  english_pob_choice: from your own words
  chosen_spanish: a partir de tus propias palabras
  alternatives_spanish:
  - de tus palabras
  - según tus propias palabras
  lexicon: sermo
  rationale: El latín sermonibus alude aquí a lo dicho o expresado verbalmente; «tus propias palabras» conserva la referencia al discurso del interlocutor y evita una literalidad dura como «sermones», que en español sería engañosa.
- source_word: intellege
  english_pob_choice: understand
  chosen_spanish: comprende
  alternatives_spanish:
  - entiende
  lexicon: intellego
  rationale: «Comprende» reproduce bien el imperativo de intellegere con un tono claro y digno en español moderno, manteniendo el sentido cognitivo de captar o entender.
- source_word: quoniam dixisti
  english_pob_choice: because you said
  chosen_spanish: porque dijiste
  alternatives_spanish:
  - puesto que dijiste
  - ya que dijiste
  lexicon: dico
  rationale: La causalidad explícita de quoniam se rinde naturalmente con «porque»; «dijiste» conserva la referencia a una afirmación previa del destinatario.
- source_word: nobiscum crescit
  english_pob_choice: grows with us
  chosen_spanish: crece con nosotros
  alternatives_spanish:
  - va creciendo con nosotros
  - crece en nosotros
  lexicon: cresco
  rationale: La imagen de crecimiento compartido se mantiene de forma directa. «Con nosotros» reproduce la preposición relacional del latín sin añadir interpretaciones sobre interioridad que el texto no exige.
- source_word: sensus
  english_pob_choice: understanding
  chosen_spanish: el entendimiento
  alternatives_spanish:
  - la comprensión
  - el sentido
  lexicon: sensus
  rationale: En este contexto, sensus apunta a la capacidad de entender o discernir. «Entendimiento» es la opción más natural y precisa en español bíblico contemporáneo.
theological_decisions:
- issue: Naturaleza del «entendimiento» que crece
  english_pob_reading: that understanding grows with us
  chosen_spanish_reading: que el entendimiento crece con nosotros
  alternative_spanish_readings:
  - que la comprensión crece con nosotros
  - que el sentido crece con nosotros
  rationale: 'Se conserva la afirmación tal como aparece en el texto: el entendimiento no se define aquí como doctrina desarrollada, sino como una facultad que crece junto con la comunidad o la persona. No se suaviza ni se explica más allá de lo que la línea latina dice.'
  doctrine_reference: Sabiduría/crecimiento en comprensión en el marco de la revelación; sin referencia dogmática específica
translation_notes:
  revision_awareness: El pasaje coincide plenamente con la revisión más reciente marcada como unchanged y con el control cruzado de alta concordancia; no se detectaron cambios textuales ni decisiones de revisión que afecten esta línea.
  spanish_consistency_notes:
  - Se mantiene el pronombre de segunda persona singular implícito en «dijiste», coherente con el discurso directo del pasaje.
  - Se evita «sermones» por su carga eclesial en español, ya que el latín sermonibus aquí significa simplemente «palabras» o «dichos».
  - La estructura causal y el orden de la frase buscan transparencia sin forzar una construcción demasiado latina.
