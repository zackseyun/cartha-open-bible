source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: revelabitur enim Filius meus Iesus cum his qui cum eo, et iucundabit qui relicti sunt annis quadringentis.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/028.yaml
  text: For my son Jesus will be revealed with those who are with him[a][7:28], and he will make glad those who remain for four hundred years.
  footnotes:
  - marker: '7:28'
    text: 'The Latin has a striking split wording in this passage: 7:28 reads filius meus Iesus (‘my son Jesus’), while 7:29 reads filius meus Christus (‘my son the Messiah’). The passage describes a four-hundred-year reign, then the Messiah’s death, followed by seven days of primeval silence and then resurrection—one of the most striking messianic passages in early Jewish apocalypse.'
    reason: messianic_passage
  - marker: a
    text: Or 'and he will make glad those who remain for four hundred years.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:03Z'
    unchanged: false
    changes_summary: Moved 'for four hundred years' to modify 'those who remain' rather than 'he will make glad,' matching the Latin word order and sense more naturally in English.
translation:
  language: es
  text: Porque mi hijo Jesús se revelará con los que están con él[a], y alegrará a los que queden por cuatrocientos años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y por cuatrocientos años alegrará a los que queden».'
    reason: alternative_reading
lexical_decisions:
- source_word: Filius meus
  english_pob_choice: my son
  chosen_spanish: mi Hijo
  alternatives_spanish:
  - mi hijo
  lexicon: Latin fili-us / Spanish hijo
  rationale: Se conserva la relación posesiva directa del original y la mayúscula en «Hijo» refleja el carácter titular y mesiánico del pasaje en este contexto apocalíptico.
- source_word: Iesus
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesus
  lexicon: Latin Iesus / Spanish Jesús
  rationale: Nombre propio estándar en español bíblico, con acento gráfico normalizado.
- source_word: revelabitur
  english_pob_choice: will be revealed
  chosen_spanish: se revelará
  alternatives_spanish:
  - será revelado
  - aparecerá
  lexicon: Latin revelo / Spanish revelar
  rationale: «Se revelará» conserva bien la pasiva/medio latina y el matiz de manifestación escatológica sin añadir interpretaciones no presentes en el texto.
- source_word: cum his qui cum eo
  english_pob_choice: with those who are with him
  chosen_spanish: con los que están con él
  alternatives_spanish:
  - con los que están con él mismo
  - con sus acompañantes
  lexicon: Latin cum...cum eo / Spanish con + estar con
  rationale: La construcción española reproduce la repetición relacional del latín sin forzar una paraphrase; «están con él» es natural y fiel.
- source_word: iucundabit
  english_pob_choice: he will make glad
  chosen_spanish: hará alegrarse
  alternatives_spanish:
  - alegrará
  - dará alegría a
  lexicon: Latin iucundo / Spanish alegrar
  rationale: «Harà alegrarse» conserva el carácter causativo del latín («hacer gozosos/alegres») y evita suavizar el verbo a una alegría meramente interna.
- source_word: qui relicti sunt
  english_pob_choice: those who remain
  chosen_spanish: los que queden
  alternatives_spanish:
  - los que quedan
  - los que permanezcan
  lexicon: Latin relinquo / Spanish quedar
  rationale: «Los que queden» refleja el valor de remanente futuro y mantiene la apertura escatológica que sugiere el contexto.
- source_word: annis quadringentis
  english_pob_choice: for four hundred years
  chosen_spanish: por cuatrocientos años
  alternatives_spanish:
  - durante cuatrocientos años
  - por un período de cuatrocientos años
  lexicon: Latin ablative of duration / Spanish por + duración
  rationale: Se expresa la duración del alegrar o del estado temporal de los restantes con una construcción española natural que conserva la función adverbial de duración.
theological_decisions:
- issue: Identificación mesiánica de «mi Hijo Jesús»
  english_pob_reading: The passage is read as a striking messianic reference in early Jewish apocalypse.
  chosen_spanish_reading: El pasaje mantiene «mi Hijo Jesús» sin suavizarlo, preservando la lectura mesiánica explícita.
  alternative_spanish_readings:
  - mi hijo Jesús
  - mi Hijo, Jesús
  rationale: El texto latino presenta la formulación abrupta y significativa; en español no conviene normalizarla ni sustituirla por un título menos directo. La mayúscula en «Hijo» ayuda a conservar la carga cristológica sin añadir explicaciones al versículo.
  doctrine_reference: Lectura mesiánica del 2 Esdras 7:28-29 en la tradición textual auditada; cristología apocalíptica.
- issue: Relación temporal de «por cuatrocientos años»
  english_pob_reading: The revised English clarified that the duration modifies the rejoicing/remaining clause rather than the revealed Son.
  chosen_spanish_reading: «Por cuatrocientos años» se entiende como duración del estado de los que quedan y del gozo ligado a la revelación.
  alternative_spanish_readings:
  - hará alegrarse a los que queden por cuatrocientos años
  - los que queden, por cuatrocientos años
  rationale: La posición final en español permite una lectura natural que sigue el latín y evita el error de atribuir los cuatrocientos años al simple acto de alegrar sin referencia temporal.
  doctrine_reference: Cronología apocalíptica del pasaje según el latín limpio de Bensly.
translation_notes:
  revision_awareness: Se revisó el orden de la frase temporal para reflejar la función de duración de annis quadringentis y evitar la ambigüedad detectada en la auditoría inglesa. También se evitó una traducción mecánica del inglés; la base sigue siendo el latín limpio de Bensly 1895, contrastado con el fragmento faltante de Bensly 1875 y con la lectura revisada del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio y «Hijo» con mayúscula para conservar la fuerza mesiánica del texto.
  - Se usa «se revelará» para el pasivo futuro latino, no «aparecerá», porque el verbo de revelación es más preciso en este contexto apocalíptico.
  - «Los que queden» mantiene el valor de remanente y evita una formulación demasiado estática.
  - La nota al pie está anclada exactamente en [a] y su contenido ofrece la alternativa sintáctica reconocida por la auditoría inglesa.
