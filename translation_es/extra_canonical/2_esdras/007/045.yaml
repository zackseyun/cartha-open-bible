translation:
  language: es
  text: 'Pero a ti solo te mostré estas cosas. Entonces respondí y dije[a]: «Señor, entonces dije, y ahora digo:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Entonces respondí y dije: “Señor, y ahora digo:”».'
    reason: Preserva la alternativa textual/sintáctica documentada en la auditoría inglesa sobre la ubicación de «tunc/then» y evita perder una ambigüedad relevante del testimonio latino.
lexical_decisions:
- source_word: tibi autem soli
  english_pob_choice: But to you alone
  chosen_spanish: Pero solo a ti
  alternatives_spanish:
  - Mas a ti solamente
  - Pero únicamente a ti
  lexicon: Latin tibi ... soli
  rationale: Mantiene la exclusividad del destinatario con un español natural y directo; 'solo' conserva el énfasis de 'soli' sin volver la frase pesada.
- source_word: ostendi haec
  english_pob_choice: I showed these things
  chosen_spanish: te mostré estas cosas
  alternatives_spanish:
  - te mostré esto
  - te hice ver estas cosas
  lexicon: Latin ostendere + haec
  rationale: '''Mostré'' comunica bien el acto de hacer ver/revelar; ''estas cosas'' sigue de cerca el deíctico plural ''haec'' y evita reducir indebidamente el alcance.'
- source_word: respondi tunc et dixi
  english_pob_choice: Then I answered and said
  chosen_spanish: Entonces respondí y dije
  alternatives_spanish:
  - Y respondí y dije entonces
  - Luego respondí y dije
  lexicon: Latin respondi ... et dixi
  rationale: Conserva la secuencia narrativa del latín en una forma idiomática en español. 'Entonces' reproduce 'tunc' como marcador temporal del discurso.
- source_word: domine
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  lexicon: Latin domine
  rationale: '''Señor'' es la equivalencia directa y digna para el vocativo; en este contexto mantiene el tono de súplica sin añadir una matización que el latín no exige.'
- source_word: et nunc dico
  english_pob_choice: and now I say
  chosen_spanish: y ahora digo
  alternatives_spanish:
  - y ahora lo digo
  - y ahora te digo
  lexicon: Latin et nunc dico
  rationale: Se preserva el contraste entre 'entonces' y 'ahora'. El verbo queda en presente para reflejar el contraste retórico señalado por la revisión auditada.
theological_decisions:
- issue: Contraste temporal retórico entre 'tunc' y 'nunc'
  english_pob_reading: 'Then I answered and said[a], “Lord, then I said, and now I say:'
  chosen_spanish_reading: 'Entonces respondí y dije: «Señor, entonces dije, y ahora digo:»'
  alternative_spanish_readings:
  - 'Entonces respondí y dije: «Señor, y ahora digo:»'
  - 'Respondí y dije: «Señor, entonces dije y ahora digo:»'
  rationale: La revisión del POB destacó que el punto no es solo una secuencia narrativa, sino la oposición retórica entre 'entonces' y 'ahora'. La versión española mantiene ambos términos para no borrar esa tensión temporal presente en la evidencia secundaria asociada al texto latino.
  doctrine_reference: none
translation_notes:
  revision_awareness: La redacción refleja la corrección auditada que recupera tanto el inicio ('Pero solo a ti te mostré estas cosas') como el contraste entre 'entonces' y 'ahora'. Se evita añadir contenido ajeno al tramo latino proporcionado y se conserva el matiz retórico indicado por la revisión del testimonio secundario.
  spanish_consistency_notes:
  - Se usa 'Señor' como vocativo por ser la forma directa y estable para domine en este contexto.
  - No se introduce 'Cristo', 'Yahvé' ni terminología doctrinal ajena al segmento.
  - La puntuación con comillas mantiene separado el discurso directo del narrador sin alterar el orden del texto fuente.
