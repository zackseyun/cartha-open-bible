review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura causal-retórica de quoniam y el contraste entre los dos grupos, pero no preserva de la mejor manera el valor comparativo paralelo de super stellas ... super tenebras. En este contexto latino de 2 Esdras, super + acusativo funciona comparativamente; por eso el primer miembro debe alinearse con «más negros que la oscuridad» del segundo. Además, abstinentiam habuerunt se acerca más a «practicaron el dominio propio / la continencia» que a «la disciplina».
  spanish_quality_summary: El español es claro, pero «por encima de las estrellas» suena espacial y rompe el paralelismo comparativo; la nota «más que las estrellas» también queda imprecisa. «Disciplina» es entendible, pero es más vago de lo que pide abstinentia. Conviene una formulación más natural y precisa, manteniendo el signo de interrogación de cierre tal como está en la tradición de este pasaje en el expediente.
  glossary_alignment: No hay términos del glosario mayor en juego. La principal decisión léxica relevante es abstinentia, mejor como «dominio propio» o «continencia» que «disciplina», y super + acusativo, mejor comparativo en ambos miembros. «Oscuridad» es aceptable para tenebras en español moderno.
  issues:
  - severity: high
    issue: «por encima de las estrellas» traduce super stellas de modo espacial en vez de comparativo
    rationale: 'El mismo versículo usa un paralelismo claro: super stellas fulgebunt ... super tenebras nigrae. Si la segunda mitad se traduce «más negros que la oscuridad», la primera debe reflejar «más que / más brillantes que las estrellas», no ubicación espacial.'
  - severity: medium
    issue: «practicaron la disciplina» es demasiado general para abstinentiam habuerunt
    rationale: abstinentia aquí apunta a dominio propio, continencia o autocontrol ascético; «disciplina» puede referirse a muchas formas de orden o entrenamiento y diluye el matiz moral/ascético.
  - severity: low
    issue: La nota al pie «O “más que las estrellas”» es poco precisa
    rationale: Si se conserva nota, debería expresar la alternativa exacta de traducción. Pero como el texto principal debe ya llevar el sentido comparativo, la nota deja de ser necesaria.
  revised_spanish_text: Y porque los rostros de los que practicaron el dominio propio brillarán más que las estrellas, pero nuestros rostros serán más negros que la oscuridad?
  revision_rationale: Se corrige super stellas al valor comparativo exigido por el paralelismo del versículo y por la evidencia latina de 2 Esdras. Se ajusta abstinentiam habuerunt a «practicaron el dominio propio», que preserva mejor la idea de continencia/autocontrol que «disciplina». No hace falta nota al pie una vez que el texto principal refleja la mejor lectura.
