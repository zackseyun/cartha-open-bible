lexical_decisions:
- source_word: propter hoc
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así pues
  lexicon: propter hoc
  rationale: La locución latina introduce una consecuencia lógica; «Por tanto» conserva el valor inferencial de manera natural y solemne en español.
- source_word: vacua
  english_pob_choice: empty things
  chosen_spanish: las cosas vacías
  alternatives_spanish:
  - lo vacío
  - las vacías
  lexicon: vacuus, -a, -um
  rationale: «Vacua» es neutro plural en latín y aquí funciona como sustantivado; «las cosas vacías» mantiene el paralelismo con «plena plenis» y suena claro en español.
- source_word: vacuis
  english_pob_choice: the empty
  chosen_spanish: los vacíos
  alternatives_spanish:
  - los vaciados
  - los que están vacíos
  lexicon: vacuus, -a, -um
  rationale: El dativo plural sustantivado se refleja con un grupo nominal abreviado; «los vacíos» preserva la forma gnómica y el contraste simétrico del dicho.
- source_word: plena
  english_pob_choice: full things
  chosen_spanish: las cosas llenas
  alternatives_spanish:
  - lo lleno
  - las llenas
  lexicon: plenus, -a, -um
  rationale: Como con «vacua», el neutro plural se traduce con un sustantivo explícito para evitar ambigüedad y mantener el equilibrio sintáctico.
- source_word: plenis
  english_pob_choice: the full
  chosen_spanish: los llenos
  alternatives_spanish:
  - los que están llenos
  - los colmados
  lexicon: plenus, -a, -um
  rationale: «Los llenos» reproduce el dativo plural sustantivado y el paralelismo con «los vacíos» sin añadir interpretación ajena al texto.
theological_decisions:
- issue: Sentido proverbial/gnómico de la frase
  english_pob_reading: A concise contrast between empty and full things/persons, with no added doctrinal expansion.
  chosen_spanish_reading: Un contraste proverbial entre lo vacío y lo lleno, sin ampliar el sentido más allá de la sentencia del texto.
  alternative_spanish_readings:
  - Una afirmación moral sobre personas vacías y personas llenas
  - Una declaración simbólica de aptitud o capacidad
  rationale: El latín presenta una formulación sentenciosa y equilibrada; la traducción debe conservar su carácter proverbial sin cargarla con una aplicación doctrinal específica que el texto no expresa.
  doctrine_reference: Principio de contención semántica; no se infiere doctrina adicional fuera del enunciado.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo externo mostró acuerdo alto; por ello se mantiene una traducción directa y estable, sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se mantuvo «Ezra» como nombre propio del destinatario, siguiendo el testimonio latino y el contexto de 2 Esdras.
  - Se evitó «SEÑOR» u otra adaptación teológica porque el versículo no contiene el nombre divino.
  - Se preservó la estructura paralela del dicho para reflejar el latín limpio de Bensly sin sobre-interpretación.
