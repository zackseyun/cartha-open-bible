translation:
  language: es
  text: si es derrotado, sufrirá lo que has dicho; pero si vence, recibirá lo que digo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: victus fuerit
  english_pob_choice: if he is defeated
  chosen_spanish: si es derrotado
  alternatives_spanish:
  - si es vencido
  - si resulta vencido
  lexicon: Latin victus (de vinco)
  rationale: El participio pasivo expresa quedar vencido/derrotado en una contienda; «es derrotado» conserva la voz pasiva y el sentido de derrota de forma natural en español.
- source_word: patiatur
  english_pob_choice: he will suffer
  chosen_spanish: sufrirá
  alternatives_spanish:
  - padecerá
  - soportará
  lexicon: Latin patior
  rationale: El verbo latino aquí indica experimentar una consecuencia dolorosa o adversa; «sufrirá» comunica bien esa fuerza en español contemporáneo y mantiene el futuro del original.
- source_word: quod dixisti
  english_pob_choice: what you have said
  chosen_spanish: lo que has dicho
  alternatives_spanish:
  - lo que dijiste
  - lo que has hablado
  lexicon: Latin dicere
  rationale: «Has dicho» refleja la referencia al enunciado previo sin añadir matices ajenos; «lo que» conserva el objeto indirecto neutro del latín.
- source_word: vicerit
  english_pob_choice: if he conquers
  chosen_spanish: si vence
  alternatives_spanish:
  - si vence él
  - si resulta vencedor
  lexicon: Latin vincere
  rationale: El futuro perfecto latino en condición mantiene un valor prospectivo; en español, el presente en prótasis condicional transmite de modo idiomático la eventualidad de victoria.
- source_word: recipiet
  english_pob_choice: he will receive
  chosen_spanish: recibirá
  alternatives_spanish:
  - obtendrá
  - recogerá
  lexicon: Latin recipere
  rationale: «Recibirá» conserva la idea de obtener o recibir como resultado de la victoria sin forzar un equivalente más interpretativo.
- source_word: quod dico
  english_pob_choice: what I say
  chosen_spanish: lo que digo
  alternatives_spanish:
  - lo que estoy diciendo
  - lo que yo digo
  lexicon: Latin dicere
  rationale: La frase reproduce de manera directa el contraste entre el dicho anterior y el presente; «lo que digo» es la opción más transparente y fiel.
theological_decisions:
- issue: Contraste entre derrota y victoria como retribución en el diálogo
  english_pob_reading: if he is defeated, he will suffer what you have said; but if he conquers, he will receive what I say.
  chosen_spanish_reading: si es derrotado, sufrirá lo que has dicho; pero si vence, recibirá lo que digo.
  alternative_spanish_readings:
  - si es vencido, padecerá lo que has dicho; pero si vence, obtendrá lo que digo.
  rationale: El versículo presenta un contraste simétrico entre dos destinos opuestos según el resultado de la contienda. La traducción mantiene esa estructura sin ampliar el sentido más allá del latín.
  doctrine_reference: None
- issue: Tensión entre «lo que has dicho» y «lo que digo»
  english_pob_reading: what you have said / what I say
  chosen_spanish_reading: lo que has dicho / lo que digo
  alternative_spanish_readings:
  - lo que has hablado / lo que hablo
  rationale: Se conserva la oposición verbal entre la palabra del interlocutor y la del hablante, porque el texto depende del contraste retórico entre ambas voces.
  doctrine_reference: None
translation_notes:
  revision_awareness: The English POB text and the cleaned Latin source are in high agreement, and the latest revision pass reported no changes needed. No textual or interpretive variants were introduced beyond normal Spanish syntactic adjustment.
  spanish_consistency_notes:
  - Se mantiene un español sobrio y moderno, con futuro simple para las consecuencias y presente en la prótasis condicional, conforme al valor idiomático de la construcción latina.
  - Se evita introducir terminología eclesiástica no presente en el texto; el contraste permanece estrictamente entre derrota/victoria y entre lo dicho por cada interlocutor.
