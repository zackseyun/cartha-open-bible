review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien el latín y el audit trail inglés en la segunda cláusula, y no reintroduce el material omitido por la revisión inglesa. Sin embargo, la elección de «siglo» para saeculum en «unum saeculum, sed duo» suena demasiado especializada a una centuria en español moderno y no preserva bien la ambigüedad temporal más amplia del latín ni la naturalidad del inglés «age».
  spanish_quality_summary: La redacción es clara y digna, pero «Un siglo, pero dos» resulta poco natural y puede inducir una lectura de cien años. «Una era, pero dos» suena más idiomático y mantiene el contraste lapidario. El resto de la oración («Porque has dicho que los justos no son muchos, sino pocos») es fiel y legible.
  glossary_alignment: No hay conflictos con la terminología por defecto del proyecto. «Los justos» corresponde bien a iusti. No hay nombres divinos ni términos teológicos sensibles aquí. La única decisión léxica a corregir es saeculum > «era» en vez de «siglo» para mejor fidelidad semántica en español bíblico moderno.
  issues:
  - severity: medium
    issue: «siglo» para saeculum en la frase inicial
    rationale: Aunque «siglo» puede ser una posibilidad léxica, en español contemporáneo tiende a entenderse como un período de cien años y suena menos natural en este contexto. «Era» preserva mejor el sentido amplio de edad/época y encaja mejor con el audit trail inglés «One age, but two». No es un problema doctrinal, sino de fidelidad semántica y legibilidad.
  revised_spanish_text: Una era, pero dos. Porque has dicho que los justos no son muchos, sino pocos,
  revision_rationale: Se sustituye «siglo» por «era» para reflejar mejor el alcance de saeculum y evitar una lectura demasiado concreta de cien años en español. Se mantiene el resto del texto porque es fiel al latín y al audit trail inglés, incluyendo la coma final que indica continuidad con la frase siguiente.
