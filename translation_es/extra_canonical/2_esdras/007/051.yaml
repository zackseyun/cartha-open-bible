  to: Una era, pero dos. Porque has dicho que los justos no son muchos, sino pocos,
  rationale: Se sustituye «siglo» por «era» para reflejar mejor el alcance de saeculum y evitar una lectura demasiado concreta de cien años en español. Se mantiene el resto del texto porque es fiel al latín y al audit trail inglés, incluyendo la coma final que indica continuidad con la frase siguiente.
