base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/051.yaml
  text: One age, but two. For you have said that the righteous are not many, but few,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:08Z'
    unchanged: false
    changes_summary: Replaced the draft with a rendering that includes the omitted opening clause 'unum saeculum, sed duo' ('One age, but two') and removes the added material 'while the ungodly are many, hear this,' which is not present in the provided Latin. Also adjusted 'because' to 'for' for a more direct formal rendering of 'enim.'
translation:
  language: es
  text: Una era, pero dos. Porque has dicho que los justos no son muchos, sino pocos,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: unum saeculum, sed duo
  english_pob_choice: One age, but two.
  chosen_spanish: Un siglo, pero dos.
  alternatives_spanish:
  - Una era, pero dos.
  - Un tiempo, pero dos.
  lexicon: saeculum
  rationale: ‘Saeculum’ puede referirse a una edad/era o a un período extenso; ‘siglo’ preserva la concisión y el contraste numerado del latín, aunque en español admite una lectura temporal más natural que ‘era’. Se evita expandir el sentido más allá del texto fuente.
- source_word: Tu enim
  english_pob_choice: For you
  chosen_spanish: Porque has
  alternatives_spanish:
  - Pues tú
  - Ya que has
  lexicon: enim
  rationale: ‘Enim’ introduce explicación o fundamentación; ‘porque’ comunica bien ese valor causal/explicativo en español moderno y mantiene el tono directo del audit trail inglés 'For you have said'.
- source_word: dixisti
  english_pob_choice: have said
  chosen_spanish: has dicho
  alternatives_spanish:
  - has afirmado
  - has declarado
  lexicon: dico
  rationale: ‘Has dicho’ es la correspondencia más sobria y fiel para el perfecto latino; no añade solemnidad que el texto no exige.
- source_word: non esse multos iustos, sed paucos
  english_pob_choice: the righteous are not many, but few
  chosen_spanish: que los justos no son muchos, sino pocos
  alternatives_spanish:
  - que los justos no son numerosos, sino pocos
  - que los justos no son muchos, sino escasos
  lexicon: iustus
  rationale: ‘Justos’ conserva el valor moral/legal del latín. ‘No son muchos, sino pocos’ refleja la estructura de contraste sin suavizarla.
theological_decisions:
- issue: Alcance de saeculum
  english_pob_reading: One age, but two.
  chosen_spanish_reading: Un siglo, pero dos.
  alternative_spanish_readings:
  - Una era, pero dos.
  - Un tiempo, pero dos.
  rationale: No se amplía el sentido a ‘mundo’ ni a una expresión doctrinalmente cargada; se mantiene la ambigüedad temporal del latín. ‘Siglo’ es una solución breve y auditable para el contraste singular/plural del fragmento.
  doctrine_reference: None; lexical/temporal ambiguity only
- issue: Causa explicativa de enim
  english_pob_reading: For you have said ...
  chosen_spanish_reading: Porque has dicho ...
  alternative_spanish_readings:
  - Pues has dicho ...
  - Ya que has dicho ...
  rationale: El latín presenta una explicación retórica, no una causalidad doctrinal. ‘Porque’ reproduce la relación de fundamento que el inglés audit trail marcó con ‘For’.
  doctrine_reference: None
- issue: ‘Justos’ como categoría ética
  english_pob_reading: the righteous
  chosen_spanish_reading: los justos
  alternative_spanish_readings:
  - los rectos
  - los inocentes
  rationale: Se conserva el término jurídico-moral estándar sin introducir matices exegéticos no documentados por el texto fuente.
  doctrine_reference: Justicia/rectitud bíblica en uso general
translation_notes:
  revision_awareness: Se incorporó el segmento inicial omitido en una versión previa ('unum saeculum, sed duo') y se evitó añadir material no presente en el latín. La redacción sigue el texto fuente limpio proporcionado y el ajuste de la revisión más reciente.
  spanish_consistency_notes:
  - Se mantiene ‘justos’ para iustos, en coherencia con el tono bíblico-moral del pasaje.
  - Se preserva la brevedad y el paralelismo del latín sin añadir explicaciones interpretativas.
  - No se usan mayúsculas devocionales ni sustituciones tradicionales ajenas al fuente, dado que el versículo no contiene el Tetragrámaton ni términos cristológicos.
