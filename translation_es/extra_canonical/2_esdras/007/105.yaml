base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/105.yaml
  text: or a friend who is most dear[a], that he may understand, or sleep, or eat, or be healed for him; so no one will ever pray for another, for all will then bear, each one, his own unrighteousnesses or righteousnesses.”
  footnotes:
  - marker: a
    text: Or 'so no one will ever then pray for another, but each will bear his own unrighteousnesses or righteousnesses.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:21Z'
    unchanged: false
    changes_summary: 'Adjusted word order for natural English and closer alignment with the Latin: added ''who is'' with ''most dear,'' moved ''for him'' to modify the series more clearly, and punctuated the sentence for readability while preserving all source elements.'
translation:
  language: es
  text: o un amigo que le es muy querido[a], para que él comprenda, o duerma, o coma, o sea sanado por él; así nadie jamás orará por otro, porque todos entonces llevarán, cada uno, sus propias injusticias o justicias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tan amado», según el matiz de *most dear*; el español «muy querido» conserva bien la relación afectiva sin sonar forzado.
    reason: lexical_alternative
lexical_decisions:
- source_word: eo intellegat
  english_pob_choice: that he may understand
  chosen_spanish: para que él comprenda
  alternatives_spanish:
  - para que entienda
  - a fin de que comprenda
  lexicon: intellegere
  rationale: «Comprenda» conserva el sentido cognitivo de percibir/entender con un matiz un poco más formal que «entienda», y encaja bien con el registro del pasaje.
- source_word: dormiat
  english_pob_choice: sleep
  chosen_spanish: duerma
  alternatives_spanish:
  - descanse
  - duerma
  lexicon: dormire
  rationale: Se conserva el verbo literal «dormir», que es claro en español y corresponde directamente al latín.
- source_word: manducet
  english_pob_choice: eat
  chosen_spanish: coma
  alternatives_spanish:
  - coma
  - aliméntese
  lexicon: manducare
  rationale: «Coma» reproduce el valor básico de comer sin introducir una paráfrasis innecesaria.
- source_word: curetur
  english_pob_choice: be healed
  chosen_spanish: sea sanado
  alternatives_spanish:
  - sea curado
  - sea sanado
  lexicon: curare
  rationale: «Sea sanado» mantiene el pasivo y el sentido de restauración física, con un registro bíblico sobrio; «curado» sería posible, pero «sanado» suena más natural y digno en este contexto.
- source_word: rogabit
  english_pob_choice: pray
  chosen_spanish: orará
  alternatives_spanish:
  - pedirá
  - intercederá
  lexicon: rogare
  rationale: El latín admite el sentido de pedir/interceder; «orará» sigue la tradición del POB inglés en este versículo y mantiene la referencia religiosa de intercesión.
- source_word: iniustitias suas aut iustitias
  english_pob_choice: his own unrighteousnesses or righteousnesses
  chosen_spanish: sus propias injusticias o justicias
  alternatives_spanish:
  - sus injusticias o justicias
  - su injusticia o justicia
  lexicon: iniustitia / iustitia
  rationale: Se conserva la tensión del plural del latín y del inglés POB («unrighteousnesses or righteousnesses»). Aunque suena marcado en español, evita aplanar el número y mantiene la individualización del juicio.
theological_decisions:
- issue: Imposibilidad de la intercesión después del juicio
  english_pob_reading: so no one will ever pray for another, for all will then bear, each one, his own unrighteousnesses or righteousnesses.
  chosen_spanish_reading: así nadie jamás orará por otro, porque todos entonces llevarán, cada uno, sus propias injusticias o justicias.
  alternative_spanish_readings:
  - así nadie jamás intercederá por otro
  - así nadie jamás pedirá por otro
  rationale: La cláusula explicativa «porque» refleja el latín `enim` y evita una falsa oposición. Se mantiene la idea teológica de que el momento final del juicio excluye la mediación intercesora entre personas.
  doctrine_reference: Juicio individual y responsabilidad personal ante Dios
translation_notes:
  revision_awareness: 'La revisión inglesa corrigió la relación de `enim` como explicativa («for») y movió `tunc` para que modifique «bear» («then bear»), no «pray». La frase española sigue esa sintaxis: «porque todos entonces llevarán...», preservando el orden lógico y la universalidad de `omnes`/`unusquisque`.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aparece el tetragrámaton.
  - Se conserva «justicias/injusticias» en plural para reflejar el latín plural y la carga individualizada del juicio.
  - «Orará» se mantiene como verbo de intercesión, en continuidad con el audit trail inglés.
