base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/121.yaml
  text: And if dwellings of health and safety have been laid up, but we have conducted ourselves wickedly?
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:24Z'
    unchanged: false
    changes_summary: Replaced 'habitations' with the more natural 'dwellings' and 'have lived wickedly' with 'have conducted ourselves wickedly' to reflect male conversati sumus more closely while keeping a formal register.
translation:
  language: es
  text: ¿Y si han sido reservadas moradas de salud y seguridad, pero nosotros nos hemos conducido mal?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: reposita sunt
  english_pob_choice: have been laid up
  chosen_spanish: han sido reservadas
  alternatives_spanish:
  - han sido depositadas
  - han sido guardadas
  - están reservadas
  lexicon: reponere / repositus
  rationale: El latín sugiere algo puesto en reserva o guardado para su uso futuro. «Han sido reservadas» conserva la pasiva y el matiz de almacenamiento, sin forzar una imagen más concreta de la que el texto ofrece.
- source_word: habitacula
  english_pob_choice: dwellings
  chosen_spanish: moradas
  alternatives_spanish:
  - habitaciones
  - viviendas
  - domicilios
  lexicon: habitaculum
  rationale: «Moradas» transmite naturalmente la idea de lugares para habitar en español y mantiene un tono digno. «Habitaciones» sonaría más restringido o moderno en un sentido doméstico; «viviendas» es correcto, pero menos solemne.
- source_word: sanitatis
  english_pob_choice: health
  chosen_spanish: salud
  alternatives_spanish:
  - sanidad
  - bienestar
  lexicon: sanitas
  rationale: «Salud» es la equivalencia directa y más clara para sanitas. «Sanidad» puede sonar técnico o institucional en español actual, y «bienestar» diluye el campo semántico físico de la palabra.
- source_word: securitatis
  english_pob_choice: safety
  chosen_spanish: seguridad
  alternatives_spanish:
  - protección
  - certeza
  lexicon: securitas
  rationale: «Seguridad» es el equivalente estándar y mantiene el doblete con «salud», reproduciendo la amplitud de paz/seguridad del latín sin introducir una interpretación doctrinal adicional.
- source_word: male conversati sumus
  english_pob_choice: have conducted ourselves wickedly
  chosen_spanish: nos hemos conducido mal
  alternatives_spanish:
  - hemos obrado mal
  - nos hemos portado mal
  - hemos vivido perversamente
  lexicon: malo conversari
  rationale: La construcción latina apunta al modo de conducta, no solo a un acto puntual. «Nos hemos conducido mal» sigue de cerca el sentido reflexivo y conserva el tono formal de la revisión inglesa, sin intensificar innecesariamente a «perversamente».
theological_decisions:
- issue: Contraste entre los bienes preparados por Dios y la conducta humana culpable
  english_pob_reading: And if dwellings of health and safety have been laid up, but we have conducted ourselves wickedly?
  chosen_spanish_reading: ¿Y si han sido reservadas moradas de salud y seguridad, pero nosotros nos hemos conducido mal?
  alternative_spanish_readings:
  - ¿Y si han sido reservadas moradas de salud y seguridad, pero nosotros hemos obrado mal?
  - ¿Y si se han guardado moradas de salud y seguridad, pero nosotros nos hemos comportado perversamente?
  rationale: El versículo presenta una tensión retórica entre lo preparado para bien y la culpabilidad humana. La redacción española mantiene ese contraste sin suavizar la acusación ni convertirla en una paráfrasis moral más amplia.
  doctrine_reference: Antítesis juicio/gracia en literatura apocalíptica; responsabilidad humana ante bienes preparados por Dios.
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó 'habitations' por 'dwellings' y 'have lived wickedly' por 'have conducted ourselves wickedly'. La versión española procura reflejar ese ajuste con «moradas» y una construcción reflexiva de conducta ('nos hemos conducido mal'), manteniendo registro formal y cercanía al latín.
  spanish_consistency_notes:
  - Se usó «salud» y no «sanidad» para conservar el paralelismo con «seguridad» en un registro bíblico claro.
  - Se evitó «SEÑOR» u otra sustitución devocional porque el texto latino no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - Se mantuvo la primera persona plural para reflejar el latín nos y el carácter confesional del versículo.
