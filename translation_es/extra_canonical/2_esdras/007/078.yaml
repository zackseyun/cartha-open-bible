id: 2ES.7.78
reference: 2 Esdras 7:78
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'temporibus. Nam de morte sermo est: quando profectus fuerit terminus sententiae ab Altissimo ut homo moriatur, recedente inspiratione de corpore ut dimittatur iterum'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/078.yaml
  text: 'Now concerning death, the matter is this: when the decree has gone forth from the Most High that a man should die, as the breath departs from the body so that it may be sent back again,'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:15Z'
    unchanged: false
    changes_summary: 'Revised for closer alignment with the Latin: changed ''the teaching is this'' to ''the matter is this'' for sermo est; rendered inspiratione as ''breath'' rather than ''spirit''; preserved the purpose clause ''so that it may be sent back again'' from ut dimittatur iterum; removed the added material about worshiping the glory of the Most High, which is not present in the provided Latin.'
translation:
  language: es
  text: 'Ahora, acerca de la muerte, el asunto es este: cuando haya salido el decreto del Altísimo de que un hombre muera, al apartarse el aliento del cuerpo para que sea enviado de nuevo,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: temporibus / sermo est
  english_pob_choice: Now concerning death, the matter is this
  chosen_spanish: Ahora, acerca de la muerte, el asunto es este
  alternatives_spanish:
  - Ahora, respecto de la muerte, el tema es este
  - Ahora, acerca de la muerte, la cuestión es esta
  lexicon: sermo
  rationale: sermo est introduce el tema o asunto del que se habla; 'asunto' conserva el tono sobrio y discursivo sin sobrecargarlo con 'enseñanza'.
- source_word: morte
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - el morir
  - el deceso
  lexicon: mors
  rationale: El sustantivo directo 'muerte' corresponde de manera natural y fiel al tema del pasaje.
- source_word: profectus fuerit terminus sententiae
  english_pob_choice: when the decree has gone forth
  chosen_spanish: cuando ha salido el decreto
  alternatives_spanish:
  - cuando se ha promulgado el decreto
  - cuando se ha emitido la sentencia
  lexicon: terminus sententiae
  rationale: La frase latina expresa la salida/publicación de una resolución del Altísimo; 'decreto' conserva el carácter judicial y solemne, y 'ha salido' refleja profectus fuerit.
- source_word: ab Altissimo
  english_pob_choice: from the Most High
  chosen_spanish: del Altísimo
  alternatives_spanish:
  - del Dios Altísimo
  - del Altísimo Dios
  lexicon: Altissimus
  rationale: '''Altísimo'' es una designación reverente y precisa para Dios en este contexto.'
- source_word: homo
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - el ser humano
  lexicon: homo
  rationale: El latino homo aquí tiene valor genérico humano; 'un hombre' mantiene la forma sencilla de la tradición textual sin excluir el sentido general.
- source_word: recedente inspiratione
  english_pob_choice: as the breath departs from the body
  chosen_spanish: así como el aliento se aparta del cuerpo
  alternatives_spanish:
  - así como el espíritu se aparta del cuerpo
  - así como la respiración se aparta del cuerpo
  lexicon: inspiratio
  rationale: La revisión inglesa asentó 'breath' y no 'spirit'; 'aliento' preserva el sentido físico de respiración/soplo, evitando introducir una lectura pneumatológica no apoyada por el texto latino revisado.
- source_word: de corpore
  english_pob_choice: from the body
  chosen_spanish: del cuerpo
  alternatives_spanish:
  - del cuerpo humano
  lexicon: corpus
  rationale: '''del cuerpo'' es la equivalencia directa y sobria para corpus.'
- source_word: ut dimittatur iterum
  english_pob_choice: so that it may be sent back again
  chosen_spanish: para ser enviado de nuevo
  alternatives_spanish:
  - a fin de que sea devuelto otra vez
  - para que vuelva a ser enviado
  lexicon: dimittere
  rationale: La cláusula final expresa propósito de retorno; 'ser enviado de nuevo' sigue de cerca el latino y evita añadir una destinatario implícito que el texto no explicita.
theological_decisions:
- issue: 'Alcance de inspiratione: ''espíritu'' o ''aliento'''
  english_pob_reading: breath departs from the body
  chosen_spanish_reading: el aliento se aparta del cuerpo
  alternative_spanish_readings:
  - el espíritu se aparta del cuerpo
  rationale: La revisión auditada corrigió la lectura a 'breath'; por fidelidad al latino y a la revisión, se evita espiritualizar el término.
  doctrine_reference: Anthropology / textual accuracy
- issue: Naturaleza del decreto del Altísimo
  english_pob_reading: the decree has gone forth from the Most High
  chosen_spanish_reading: ha salido el decreto del Altísimo
  alternative_spanish_readings:
  - se ha emitido la sentencia del Altísimo
  - ha sido promulgado el decreto del Altísimo
  rationale: '''Decreto'' y ''del Altísimo'' conservan el carácter soberano y judicial del pasaje sin introducir lenguaje dogmático externo.'
  doctrine_reference: Divine sovereignty
translation_notes:
  revision_awareness: This draft follows the latest revision pass, which corrected the English POB away from 'the teaching is this' and 'spirit departs' toward 'the matter is this' and 'breath departs,' and removed an added clause about worshiping the glory of the Most High that is absent from the provided Latin. The Spanish likewise reflects only the supplied Latin plus the audited English revision.
  spanish_consistency_notes:
  - Se mantiene 'Altísimo' para ab Altissimo, coherente con el uso reverente del POB.
  - Se usa 'aliento' para inspiratione, consistente con la revisión auditada que rechazó 'espíritu'.
  - Se conserva el tono discursivo de 'el asunto es este' para sermo est sin endurecerlo en lenguaje técnico.
