revisions:
- from: 'Ahora, acerca de la muerte, el asunto es este: cuando ha salido el decreto del Altísimo de que un hombre muera, así como el aliento se aparta del cuerpo para ser enviado de nuevo,'
  to: 'Ahora, acerca de la muerte, el asunto es este: cuando haya salido el decreto del Altísimo de que un hombre muera, al apartarse el aliento del cuerpo para que sea enviado de nuevo,'
