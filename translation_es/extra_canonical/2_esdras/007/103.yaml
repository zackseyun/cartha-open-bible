translation:
  language: es
  text: ¿Podrán excusar a los impíos en el juicio justo[a], o suplicar por ellos al Altísimo, como padres por hijos, o hijos por padres, hermanos por hermanos, parientes por vecinos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el justo juicio»; el latín permite tanto un juicio caracterizado por justicia como un juicio que es justo.
    reason: lexical_alternative
lexical_decisions:
- source_word: iudicii iusti
  english_pob_choice: the righteous judgment
  chosen_spanish: el justo juicio
  alternatives_spanish:
  - el juicio justo
  - el juicio de justicia
  lexicon: iudicium, iustus
  rationale: Conservo la relación adjetival directa del latín. «Justo juicio» mantiene la fuerza judicial y la cualidad ética sin añadir una formulación interpretativa más amplia.
- source_word: impios
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los irreligiosos
  lexicon: impius
  rationale: «Impíos» es el equivalente natural y tradicional en español para impius, y preserva el contraste moral/religioso del pasaje.
- source_word: excusare poterint
  english_pob_choice: will they be able to excuse
  chosen_spanish: podrán excusar
  alternatives_spanish:
  - podrán disculpar
  - serán capaces de excusar
  lexicon: excusare + possum
  rationale: «Podrán excusar» reproduce la posibilidad/aptitud expresada por poterint y el verbo causal de exculpación del latín.
- source_word: deprecari pro eis
  english_pob_choice: to entreat the Most High for them
  chosen_spanish: suplicar por ellos al Altísimo
  alternatives_spanish:
  - interceder por ellos ante el Altísimo
  - rogar por ellos al Altísimo
  lexicon: deprecari + pro
  rationale: «Suplicar» conserva el tono de ruego intenso de deprecari. «Al Altísimo» refleja la referencia reverente a Deus sin introducir «Dios» donde el texto latino usa el título.
- source_word: Altissimum
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Altísimo Dios
  - el Supremo
  lexicon: Altissimus
  rationale: Mantengo el título reverencial con artículo definido, siguiendo el valor nominal del latín y la tradición bíblica española inteligible.
- source_word: Si patres pro filiis, uel filii pro parentibus, si fratres pro fratribus, si adfines pro proximis
  english_pob_choice: as fathers for children, or children for parents, brothers for brothers, relatives for neighbors
  chosen_spanish: como padres por hijos, o hijos por padres, hermanos por hermanos, parientes por vecinos
  alternatives_spanish:
  - como padres por sus hijos, o hijos por sus padres, hermanos por hermanos, parientes por los cercanos
  lexicon: si + relational list
  rationale: La serie relacional se mantiene literal y paralela. «Parientes por vecinos» sigue el valor de proximi como personas cercanas/proximas dentro del círculo social, evitando una expansión interpretativa.
theological_decisions:
- issue: Who can intercede or excuse the ungodly at the judgment
  english_pob_reading: will they be able to excuse the ungodly at the righteous judgment, or to entreat the Most High for them
  chosen_spanish_reading: ¿Podrán excusar a los impíos en el justo juicio, o suplicar por ellos al Altísimo?
  alternative_spanish_readings:
  - ¿Podrán justificar a los impíos en el justo juicio, o interceder por ellos ante el Altísimo?
  - ¿Podrán excusar a los impíos ante el justo juicio, o rogar al Altísimo por ellos?
  rationale: Conservo la imposibilidad retórica del texto como pregunta dirigida a la capacidad humana de defensa/intercesión. «Excusar» evita cargar el verso con una doctrina explícita de justificación que el latín no dice aquí.
  doctrine_reference: 4 Esdras / 2 Esdras 7:103; retórica sobre incapacidad humana de mediación en el juicio
- issue: Rendering of Altissimus as a divine title
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Altísimo Dios
  - el Supremo
  rationale: «El Altísimo» preserva el título divino sin sustituirlo por una explicación. En esta sección el texto no usa YHWH, sino un título reverencial, por lo que no corresponde introducir «Yahvé».
  doctrine_reference: Uso bíblico de títulos divinos; distinción entre nombre divino y epíteto
- issue: Relational list ending with proximi
  english_pob_reading: relatives for neighbors
  chosen_spanish_reading: parientes por vecinos
  alternative_spanish_readings:
  - parientes por los cercanos
  - familiares por los próximos
  rationale: Mantengo la secuencia social concreta del latín. «Vecinos» conserva la idea de cercanía comunitaria de proximi sin convertirla en una abstracción teológica.
  doctrine_reference: Estructura retórica de listas de parentesco y cercanía social
translation_notes:
  revision_awareness: La revisión más reciente restauró el clamor inicial sobre excusar a los impíos y suplicar al Altísimo, y descartó una expansión no sustentada sobre «amigos leales» o «los más queridos». Esta versión sigue el texto latino limpio y conserva la lista relacional sin añadidos.
  spanish_consistency_notes:
  - He usado «Altísimo» como título divino, no como sustituto de YHWH, porque el latín aquí dice Altissimum.
  - He mantenido «impíos» y no «incrédulos» para conservar el léxico moral del latín impios.
  - He preservado el paralelismo de la serie relacional con una sintaxis breve y coordinada.
  - No introduje «Cristo», «Señor» ni otras fórmulas no presentes en el latín fuente.
