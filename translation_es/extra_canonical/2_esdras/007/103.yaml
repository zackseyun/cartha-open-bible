    rationale: Para el contexto forense, «en el juicio justo» funciona bien; «ante el juicio justo» también sería posible, pero no es necesario cambiar tanto. La corrección mínima mejora fluidez sin apartarse del latín.
  revised_spanish_text: ¿Podrán excusar a los impíos en el juicio justo[a], o suplicar por ellos al Altísimo, como padres por hijos, o hijos por padres, hermanos por hermanos, parientes por vecinos?
