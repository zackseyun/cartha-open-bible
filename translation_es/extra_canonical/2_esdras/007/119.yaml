revisions:
- from: ¿Pues de qué nos aprovecha, si se nos ha prometido un tiempo inmortal, pero nosotros hemos hecho obras mortales?
  to: Porque ¿de qué nos sirve, si se nos ha prometido una edad inmortal, pero hemos hecho obras mortales?
  rationale: Se hace una reparación menor para mejorar la naturalidad y reflejar mejor el sentido de «age»/«edad» presente en el inglés POB y probable en el contexto escatológico del latín, sin alterar el contraste central del versículo.
