translation:
  language: es
  text: Porque ¿de qué nos sirve, si se nos ha prometido una edad inmortal, pero hemos hecho obras mortales?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Quid enim nobis prodest
  english_pob_choice: For what does it profit us
  chosen_spanish: ¿Pues de qué nos aprovecha?
  alternatives_spanish:
  - ¿Qué nos aprovecha?
  - ¿De qué nos sirve?
  lexicon: Latin prodest
  rationale: Prodest expresa utilidad o provecho. «Nos aprovecha» conserva el valor de beneficio/ganancia sin endurecer innecesariamente la pregunta. «Pues» reproduce bien el tono inferencial de enim.
- source_word: promissum est nobis inmortale tempus
  english_pob_choice: an immortal age has been promised to us
  chosen_spanish: se nos ha prometido un tiempo inmortal
  alternatives_spanish:
  - se nos ha prometido una era inmortal
  - se nos ha prometido un siglo inmortal
  lexicon: Latin promissum est ... tempus
  rationale: Tempus aquí puede rendirse como «tiempo» o «edad/era». Se eligió «tiempo» por cercanía formal al latín y porque evita introducir un matiz cronológico más específico de lo que el texto garantiza. «Inmortal» conserva la cualidad de inmortalis.
- source_word: nos vero mortalia opera egimus
  english_pob_choice: but we have done mortal works
  chosen_spanish: pero nosotros hemos hecho obras mortales
  alternatives_spanish:
  - pero hemos hecho obras mortales
  - pero nosotros hemos realizado obras mortales
  lexicon: Latin mortalia opera egimus
  rationale: Opera se traduce de modo directo como «obras», manteniendo el contraste con «tiempo inmortal». «Mortales» conserva la tensión lexical del original, aunque en español puede sonar adjetivalmente más natural aplicado a obras que a tiempo.
theological_decisions:
- issue: Contraste entre el don prometido y la conducta humana
  english_pob_reading: an immortal age has been promised to us, but we have done mortal works
  chosen_spanish_reading: se nos ha prometido un tiempo inmortal, pero nosotros hemos hecho obras mortales
  alternative_spanish_readings:
  - se nos ha prometido una era inmortal, pero nosotros hemos hecho obras mortales
  - se nos ha prometido un tiempo inmortal, pero nosotros hemos realizado obras mortales
  rationale: 'La frase mantiene el contraste teológico del texto: la promesa divina de un orden inmortal frente a las obras de condición mortal realizadas por los humanos. No se suaviza la oposición, porque forma parte del argumento de lamentación/autoacusación del pasaje.'
  doctrine_reference: Antítesis escatológica entre la promesa de vida inmortal y la condición moral y temporal del ser humano
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto fue confirmado como de alto acuerdo con la fuente latina limpia y la traducción inglesa auditada.
  spanish_consistency_notes:
  - Se mantuvo «tiempo» para tempus por fidelidad al latín y por coherencia con el contraste temporal del versículo.
  - Se conservó el paralelismo «inmortal / mortales» para reflejar la oposición retórica del original.
  - No se introdujo terminología eclesiástica añadida; el texto permanece en registro bíblico sobrio y directo.
