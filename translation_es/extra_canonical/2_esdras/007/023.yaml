translation:
  language: es
  text: y se propusieron tramas de pecado, e incluso dijeron que el Altísimo no existe, y no conocieron sus caminos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et proposuerunt sibi circumventiones delictorum
  english_pob_choice: and set before themselves schemes of sins
  chosen_spanish: y se pusieron delante maquinaciones de pecado
  alternatives_spanish:
  - y se propusieron artimañas de pecado
  - y se trazaron planes de pecado
  lexicon: proponere; circumventiones; delictum
  rationale: 'La imagen es volitiva y deliberada: no solo cometieron pecados, sino que los colocaron ante sí como plan o estrategia. ''Maquinaciones'' conserva la idea de tramas o planes ideados; ''de pecado'' mantiene el genitivo de relación sin suavizarlo.'
- source_word: Altissimum non esse
  english_pob_choice: the Most High does not exist
  chosen_spanish: el Altísimo no existe
  alternatives_spanish:
  - el Altísimo no es
  - el Altísimo no existe en absoluto
  lexicon: Altissimus
  rationale: '''Altísimo'' reproduce el título divino latino con naturalidad en español. ''No existe'' sigue de cerca la afirmación negadora sobre la existencia de Dios, sin introducir una paráfrasis doctrinal más amplia.'
- source_word: vias eius non cognoverunt
  english_pob_choice: they did not know his ways
  chosen_spanish: no conocieron sus caminos
  alternatives_spanish:
  - no conocieron sus sendas
  - no entendieron sus caminos
  lexicon: via; cognoscere
  rationale: '''Caminos'' es la correspondencia bíblica más clara para ''vias'' y mantiene el lenguaje relacional sobre la conducta o el proceder de Dios. ''Conocieron'' conserva el valor de cognoscere como conocer/reconocer, más que solo comprender intelectualmente.'
theological_decisions:
- issue: Negación de la existencia del Altísimo
  english_pob_reading: the Most High does not exist
  chosen_spanish_reading: el Altísimo no existe
  alternative_spanish_readings:
  - el Altísimo no es
  - el Altísimo no existe en absoluto
  rationale: 'Se mantiene la fuerza fuerte de la frase: no es una mera duda o ignorancia, sino una negación explícita de la existencia de Dios. El español conserva el filo teológico y retórico del latin.'
  doctrine_reference: Ateísmo práctico/negación impía de Dios en el contexto del juicio moral del pasaje
translation_notes:
  revision_awareness: Texto alineado con la lectura inglesa auditada y con el latín limpio de Bensly; no hubo revisiones posteriores que alteren el sentido. La agreement score fue alta y el pass final indicó que no se requerían cambios.
  spanish_consistency_notes:
  - Se usa 'Altísimo' para el título divino, consistente con el registro bíblico y con el latín 'Altissimum'.
  - Se mantiene 'caminos' en plural para 'vias eius', evitando singularizar el proceder divino.
  - Se conserva un tono sobrio y jurídico-moral, sin agregar explicaciones ausentes del original.
