revisions:
- from: 'Y dije[a]: «Oh Señor, gobernante, lo que es más abundante vale menos[b], porque lo que es más raro es más precioso».'
  to: 'Y dije: «Oh Señor, soberano, lo que es más abundante vale menos[a], porque lo que es más raro es más precioso».'
  rationale: Se sustituye 'gobernante' por 'soberano' para reflejar mejor el doble título solemne del latín en un español más natural y eclesial. Se elimina la nota que proponía 'que gobiernas' porque contradice la decisión fuente de que no se trata de una cláusula relativa. Se conserva 'vale menos' con nota para 'más barato', ya que esa alternativa sí representa un matiz léxico real de vilius aunque no sea la mejor opción principal en este contexto.
