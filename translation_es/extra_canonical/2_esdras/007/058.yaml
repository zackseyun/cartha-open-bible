source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'Et dixi : dominator domine, quod abundat uilius, quod enim rarius pretiosius est.'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/058.yaml
  text: And I said[a], “O Lord, ruler, what is more abundant is of less value[b], for what is rarer is more precious.”
  footnotes:
  - marker: a
    text: Or 'O Lord who rules'.
    reason: previous_rendering
  - marker: b
    text: Or 'cheaper'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:09Z'
    unchanged: false
    changes_summary: Adjusted the address to reflect both dominator and domine more directly as 'O Lord, ruler,' and rendered abundat comparatively as 'is more abundant' for closer lexical correspondence.
translation:
  language: es
  text: 'Y dije: «Oh Señor, soberano, lo que es más abundante vale menos[a], porque lo que es más raro es más precioso».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es más barato».'
    reason: lexical_alternative
lexical_decisions:
- source_word: dominator domine
  english_pob_choice: O Lord, ruler
  chosen_spanish: Oh Señor, gobernante
  alternatives_spanish:
  - Oh Soberano Señor
  - Oh Señor, que gobiernas
  - Oh Señor, ruler
  lexicon: dominator / domine
  rationale: El latín presenta un doble vocativo, no una cláusula relativa. En español, «Señor» mantiene el registro bíblico de dirección a Dios, y «gobernante» conserva el matiz titular de dominator sin convertirlo en una paráfrasis explicativa.
- source_word: abundat
  english_pob_choice: what is more abundant
  chosen_spanish: lo que es más abundante
  alternatives_spanish:
  - lo abundante
  - lo que abunda más
  - lo que es abundante
  lexicon: abundo
  rationale: Se conserva el valor comparativo del latín y el ajuste revisado del inglés POB, evitando suavizar la idea en una abstracción general.
- source_word: vilius
  english_pob_choice: of less value
  chosen_spanish: vale menos
  alternatives_spanish:
  - es de menor valor
  - es más barato
  - vale menos
  lexicon: vilis
  rationale: El contexto contrasta valor con lo raro y precioso, por lo que «vale menos» comunica mejor el registro evaluativo que «más barato», que en español puede sonar demasiado comercial.
- source_word: pretiosius
  english_pob_choice: more precious
  chosen_spanish: más precioso
  alternatives_spanish:
  - más valioso
  - de mayor precio
  - más apreciado
  lexicon: pretiosus
  rationale: «Más precioso» conserva la correspondencia léxica con el latín y mantiene el paralelismo con «vale menos», aunque «más valioso» sería una alternativa idiomática posible.
theological_decisions:
- issue: Forma del título divino en el vocativo
  english_pob_reading: O Lord, ruler
  chosen_spanish_reading: Oh Señor, gobernante
  alternative_spanish_readings:
  - Oh Soberano Señor
  - Oh Señor que gobiernas
  rationale: El latín no desarrolla una oración explicativa, sino una invocación solemne. «Señor» y «gobernante» reproducen el doble apelativo con dignidad y sin perder la tensión de título y función.
  doctrine_reference: Título divino y vocativo reverente en oración
- issue: Valor comparativo como principio sapiencial
  english_pob_reading: what is more abundant is of less value, for what is rarer is more precious
  chosen_spanish_reading: lo que es más abundante vale menos, porque lo que es más raro es más precioso
  alternative_spanish_readings:
  - lo que abunda más tiene menor valor, porque lo más raro es más precioso
  - lo abundante vale menos, pues lo raro es más precioso
  rationale: La frase transmite una máxima general sobre valor y rareza. La versión española preserva el contraste sin introducir una lectura doctrinal ajena al aforismo.
  doctrine_reference: Sabiduría proverbial / aforismo comparativo
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se conservó la estructura vocativa doble («O Lord, ruler») en lugar de una cláusula relativa, y se mantuvo el comparativo de abundancia/rareza con un español natural y fiel al latín.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» en mayúsculas como máscara editorial y se usó «Señor» por ser un vocativo directo en español.
  - Se mantuvo el paralelismo semántico entre abundancia/menos valor y rareza/más precioso.
  - Las notas al pie están ancladas exactamente en los marcadores presentes en el texto español.
