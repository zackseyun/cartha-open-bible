review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del latín: el quinto orden se alegra por haber escapado de lo corruptible, por la herencia futura, y por ver aún el camino angosto y penoso del que fueron librados. Sin embargo, la segunda cláusula con `quomodo` queda menos fiel al valor y paralelismo del original al usar `de que heredarán`; el latín repite `quomodo ... et ... quomodo ...`, y en español conviene mantener mejor ese paralelismo con `cómo` en ambas cláusulas o una solución equivalente. También la nota actual no reproduce bien la alternativa inglesa, que distingue entre una lectura donde ambos contenidos dependen de `escapado` y otra donde son dos contenidos coordinados de gozo.'
  spanish_quality_summary: El texto es claro, digno y natural en español. `Lo corruptible`, `lo que ha de venir`, y `camino angosto y lleno de fatiga` son comprensibles y adecuados. No obstante, `se alegran de haber escapado ahora..., y de que heredarán...` suena algo asimétrico frente al doble `quomodo` latino; `se alegran de cómo... y cómo...` resulta más equilibrado y sigue siendo legible. La nota al pie necesita ajustarse para corresponder exactamente al punto de variación.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas principales son sólidas: `lo corruptible` para `corruptibile`, `heredarán` para `hereditatem possidebunt`, `librados` para `liberati sunt`. El único ajuste recomendado es sintáctico-semántico en `quomodo`, para preservar mejor la estructura paralela del original.'
  issues:
  - severity: medium
    issue: '`quomodo` no está representado de forma paralela en ambas cláusulas'
    rationale: El latín usa `quomodo` dos veces en estructura paralela. `de haber escapado... y de que heredarán...` transmite el contenido, pero atenúa esa simetría y desplaza el matiz hacia una subordinación distinta. `de cómo han escapado ahora... y cómo heredarán...` preserva mejor la forma y el efecto del original.
  - severity: low
