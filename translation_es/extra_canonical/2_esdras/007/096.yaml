  revision_rationale: Se ajusta `quomodo` a `cómo` en ambas cláusulas para conservar mejor el paralelismo del latín y la lógica del original, sin perder naturalidad en español. También se corrige la nota para que represente de forma más exacta la alternativa sintáctica preservada en el expediente inglés.
