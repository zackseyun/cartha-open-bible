base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/096.yaml
  text: 'The fifth order: they rejoice that they have now escaped what is corruptible[a], and how they will inherit what is to come, while still seeing the narrow and toil-filled way, because they have been delivered.'
  footnotes:
  - marker: a
    text: Or 'that they have now escaped what is corruptible, and how they will inherit'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:19Z'
    unchanged: false
    changes_summary: Removed material not present in the provided Latin about the broad place and delight and immortality; adjusted the second clause to reflect 'how they will inherit what is to come'; retained the narrow, toil-filled way and the causal clause 'because they have been delivered' more closely to the source.
translation:
  language: es
  text: 'El quinto orden: se alegran de cómo han escapado ahora de lo corruptible[a], y cómo heredarán lo que ha de venir, mientras aún ven el camino angosto y lleno de fatiga, porque han sido librados.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se alegran de cómo han escapado ahora de lo corruptible y heredarán lo que ha de venir»'
    reason: Reflejar la alternativa documentada sobre cómo se agrupan las dos cláusulas introducidas por `quomodo`.
lexical_decisions:
- source_word: quomodo
  english_pob_choice: that / how (indirect discourse and parallel clause structure)
  chosen_spanish: de que
  alternatives_spanish:
  - cómo
  - que
  lexicon: quomodo
  rationale: En este contexto latino, quomodo introduce contenido indirecto en cláusulas paralelas. En español, «de que» conserva de manera natural esa subordinación y mantiene el paralelismo sintáctico sin forzar un «cómo» interrogativo.
- source_word: corruptibile
  english_pob_choice: what is corruptible
  chosen_spanish: lo corruptible
  alternatives_spanish:
  - lo corruptible y perecedero
  - lo perecedero
  lexicon: corruptibilis
  rationale: «Lo corruptible» reproduce bien la abstracción latina y preserva el contraste conceptual con «lo que ha de venir» sin añadir matices no presentes en el texto.
- source_word: hereditatem possidebunt
  english_pob_choice: they will inherit
  chosen_spanish: heredarán
  alternatives_spanish:
  - poseerán como herencia
  - obtendrán la herencia
  lexicon: hereditas / possidere
  rationale: «Heredarán» es el equivalente más natural y fiel en español para la idea de poseer por herencia; conserva el valor escatológico del verbo sin sobreexplicar.
- source_word: angustum
  english_pob_choice: the narrow
  chosen_spanish: el camino angosto
  alternatives_spanish:
  - el sendero estrecho
  - la senda angosta
  lexicon: angustus
  rationale: El sustantivo implícito en el latino se explicita como «camino» para que la frase sea idiomática en español, conservando el adjetivo «angosto».
- source_word: labore plenum
  english_pob_choice: toil-filled
  chosen_spanish: lleno de fatiga
  alternatives_spanish:
  - lleno de trabajo
  - colmado de esfuerzo
  lexicon: labor
  rationale: «Fatiga» comunica bien la carga y dificultad del término latino en un español digno y claro; mantiene el tono de dificultad del camino sin sonar mecánico.
- source_word: quoniam liberati sunt
  english_pob_choice: because they have been delivered
  chosen_spanish: porque han sido librados
  alternatives_spanish:
  - porque han sido liberados
  - ya que fueron rescatados
  lexicon: liberare
  rationale: «Librados» conserva el sentido de liberación/rescate con resonancia bíblica y evita confundirlo con mera emancipación social; además respeta la voz pasiva del latino.
theological_decisions:
- issue: Escatological inheritance of the future
  english_pob_reading: they will inherit what is to come
  chosen_spanish_reading: heredarán lo que ha de venir
  alternative_spanish_readings:
  - heredarán lo venidero
  - poseerán la herencia futura
  rationale: La construcción española mantiene el valor futuro y escatológico del texto sin introducir contenidos ajenos. «Lo que ha de venir» conserva la apertura del latino futurum sin especificarlo más de lo debido.
  doctrine_reference: Eschatology / future inheritance
- issue: Causal link between deliverance and joy
  english_pob_reading: because they have been delivered
  chosen_spanish_reading: porque han sido librados
  alternative_spanish_readings:
  - porque fueron liberados
  - ya que han sido rescatados
  rationale: El causal latino se mantiene como explicación de la alegría. «Han sido librados» preserva el tono pasivo y la consecuencia espiritual del rescate, sin alterar el foco del pasaje.
  doctrine_reference: Deliverance / salvation language
translation_notes:
  revision_awareness: La revisión reciente en inglés corrigió una ruptura de paralelismo en quomodo y eliminó material no presente en el latino (como la llanura amplia, deleite e inmortalidad). La presente versión española sigue esa lectura revisada, conserva el paralelismo de las dos cláusulas y no añade elementos ausentes del fuente latina.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece ningún nombre divino.
  - Se prefirió «librados» sobre «liberados» para conservar la resonancia bíblica de rescate y la voz pasiva latina.
  - Se explicitó «camino» por claridad española, ya que el latino usa un adjetivo sustantivado implícito.
