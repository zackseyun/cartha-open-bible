    rationale: La nota actual (`de haber escapado ahora de lo corruptible, y de que heredarán`) no explica claramente la alternativa de agrupación/clausulación reflejada en el historial inglés. Conviene reformularla para que el lector vea la otra posibilidad de dependencia sintáctica.
