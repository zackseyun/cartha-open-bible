translation:
  language: es
  text: ni nube, ni trueno, ni relámpago[a], ni viento, ni agua,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ni nube ni trueno ni relámpago, ni viento ni agua ni aire», si se sigue una lectura ampliada que incluye el final del versículo siguiente; aquí se conserva el límite del latín suministrado.
    reason: textual_variant
lexical_decisions:
- source_word: neque nubem
  english_pob_choice: neither cloud
  chosen_spanish: ni nube
  alternatives_spanish:
  - ni nube alguna
  - ni una nube
  lexicon: nube
  rationale: El latín nublam/nubem nombra directamente una nube visible; el español simple «ni nube» conserva la enumeración breve y negativa sin añadir matices no presentes en el texto.
- source_word: neque tonitruum
  english_pob_choice: nor thunder
  chosen_spanish: ni trueno
  alternatives_spanish:
  - ni tronar
  - ni trueno alguno
  lexicon: trueno
  rationale: «Tonitruum» corresponde de manera natural a «trueno»; es la forma más clara y directa en español para mantener el paralelismo enumerativo.
- source_word: neque coruscationationem
  english_pob_choice: nor lightning
  chosen_spanish: ni relámpago
  alternatives_spanish:
  - ni centella
  - ni fulgor
  lexicon: relámpago
  rationale: «Coruscationem» designa un destello o relámpago; «relámpago» es el equivalente estándar y más transparente en español bíblico contemporáneo.
- source_word: neque uentum
  english_pob_choice: neither wind
  chosen_spanish: ni viento
  alternatives_spanish:
  - ni aire
  - ni brisa
  lexicon: viento
  rationale: El latín ofrece «ventum», que significa viento. Se conserva esa lectura. No se traslada «aire» porque el texto fuente de este versículo no lo contiene; ese posible matiz pertenece al versículo siguiente en el testimonio latino citado.
- source_word: neque aquam
  english_pob_choice: nor water
  chosen_spanish: ni agua
  alternatives_spanish:
  - ni agua alguna
  lexicon: agua
  rationale: «Aquam» significa literalmente «agua». Se mantiene la secuencia simple y exacta del latín, sin expandir a «aire» ni introducir una glosa.
translation_notes:
  revision_awareness: La revisión más reciente confirmó que el texto latino de 2 Esdras 7:40 termina en «neque aquam» y que «neque aerem» pertenece al versículo 41; por eso se excluye «aire» del texto principal y se deja solo una nota opcional para la lectura ampliada.
  spanish_consistency_notes:
  - Se mantiene una enumeración negativa compacta y paralela, fiel al latín.
  - Se evita cualquier traslape entre los límites de los versículos 40 y 41.
  - La puntuación reproduce la cadencia enumerativa del original con comas coordinadas por «ni».
