base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/137.yaml
  text: For if he does not multiply them[a], the age will not be given life with those who dwell in it.
  footnotes:
  - marker: a
    text: Or 'did not multiply them, the age would not be made alive'.
    reason: previous_rendering
  revision_pass:
