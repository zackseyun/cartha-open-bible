revisions:
- from: Porque si él no los multiplica[a], el siglo no recibirá vida junto con los que habitan en él.
  to: Porque si no los multiplica[a], la era no recibirá vida con los que habitan en ella.
  rationale: Se cambia 'el siglo' por 'la era' para transmitir mejor el sentido apocalíptico de saeculum y alinearlo con el inglés POB 'the age'. Se elimina 'él' por innecesario en español. Se simplifica 'junto con' a 'con' para mayor naturalidad. Se ajusta la nota para que corresponda a la alternativa histórica auditada, no a una reformulación distinta.
