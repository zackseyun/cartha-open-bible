    unchanged: false
    changes_summary: Revised 'will not be made alive' to the more natural formal rendering 'will not be given life' for Latin vivificabitur; retained 'age' and the rest of the structure.
translation:
  language: es
  text: Porque si no los multiplica[a], la era no recibirá vida con los que habitan en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si no los multiplicó, la era no sería vivificada».'
    reason: Refleja la formulación alternativa previamente usada en inglés y conserva la diferencia gramatical documentada en la auditoría.
lexical_decisions:
- source_word: Si enim non multiplicaverit
  english_pob_choice: For if he does not multiply them
  chosen_spanish: Porque si él no los multiplica
  alternatives_spanish:
  - Porque si no los multiplica
  - Pues si él no los multiplica
  lexicon: multiplicaverit -> multiplicar
  rationale: El latín expresa una condición futura general; en español conviene conservar la fuerza condicional con 'si' y el sujeto explícito 'él'. 'Multiplica' mantiene el valor verbal simple sin añadir una causalidad que el texto no exige.
- source_word: non vivificabitur
  english_pob_choice: will not be given life
  chosen_spanish: no recibirá vida
  alternatives_spanish:
  - no será vivificado
  - no se le dará vida
  lexicon: vivificabitur -> recibir vida / ser vivificado
  rationale: '''Recibirá vida'' comunica la pasiva latina de modo natural en español y preserva la idea de impartición de vida sin volver mecánico el giro pasivo.'
- source_word: saeculum
  english_pob_choice: the age
  chosen_spanish: el siglo
  alternatives_spanish:
  - la edad
  - el mundo
  lexicon: saeculum -> siglo
  rationale: En este contexto apocalíptico, 'siglo' es la forma más directa y estable para saeculum en español bíblico y conserva la referencia al orden presente/era.
- source_word: cum his qui habitant in eo
  english_pob_choice: with those who dwell in it
  chosen_spanish: junto con los que habitan en él
  alternatives_spanish:
  - con los que habitan en él
  - con quienes habitan en él
  lexicon: cum -> junto con; habitant -> habitan
  rationale: '''Junto con'' refleja mejor la asociación acompañante del latín que un simple ''con'', sin alterar el sentido.'
theological_decisions:
- issue: Relación entre la multiplicación y la vivificación del siglo
  english_pob_reading: if he does not multiply them, the age will not be given life with those who dwell in it
  chosen_spanish_reading: si él no los multiplica, el siglo no recibirá vida junto con los que habitan en él
  alternative_spanish_readings:
  - si él no los multiplica, el siglo no será vivificado junto con los que habitan en él
  rationale: La frase mantiene la dependencia causal entre la multiplicación y la vida del siglo, sin suavizarla ni convertirla en una afirmación meramente figurada. Se conserva la tensión entre agencia divina y resultado cósmico implícita en el latín.
  doctrine_reference: 2 Esdras 7:137; continuidad del argumento apocalíptico sobre la vida del siglo
translation_notes:
  revision_awareness: La revisión más reciente corrigió la fuerza gramatical del latín desde una condición contrafactual a una condición futura/general y prefirió 'will not be given life' como traducción más natural de vivificabitur. La versión española sigue esa corrección al usar una condición con 'si' y un futuro simple en la apódosis.
  spanish_consistency_notes:
  - Se conservó 'siglo' para saeculum por coherencia con el registro apocalíptico y para evitar un desplazamiento innecesario hacia 'edad'.
  - Se evitó 'será vivificado' como texto principal porque 'recibirá vida' suena más natural en español, pero la nota conserva la alternativa formal.
  - La nota [a] está anclada exactamente en 'multiplica[a]' y coincide con la alternativa gramatical documentada.
