base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/138.yaml
  text: And he is generous[a], because if he did not give from his goodness, so that those who have committed iniquities might be relieved of their iniquities, not even a ten-thousandth part of mankind could be made alive,
  footnotes:
