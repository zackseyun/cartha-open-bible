revisions:
- from: Y él es generoso[a], porque si no diera de su bondad, para que sean aliviados[b] los que han cometido iniquidades de sus iniquidades, ni siquiera la diezmilésima parte de la humanidad podría ser vivificada,
  to: Y él es generoso[a], porque si no diera de su bondad, para que los que han cometido iniquidades sean aliviados[b] de sus iniquidades, ni siquiera la diezmilésima parte de los seres humanos podría ser vivificada,
  rationale: Se reordenó la cláusula para que «de sus iniquidades» modifique claramente a «sean aliviados», evitando una lectura torpe o ambigua. También se cambió «la humanidad» por «los seres humanos» para reflejar mejor hominum con español más concreto y natural, sin apartarse de la fuente ni del expediente inglés.
