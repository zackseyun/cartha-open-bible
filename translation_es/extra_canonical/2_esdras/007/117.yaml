  text: Quid enim prodest omnibus in praesenti vivere in tristitia et mortuos sperare punitionem?
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/117.yaml
  text: For what does it profit all to live in sorrow in the present and[a], when dead, to expect punishment?
  footnotes:
  - marker: a
    text: Or 'all men to live now'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:24Z'
    unchanged: false
    changes_summary: Reordered 'in the present' for more natural English and revised 'after death' to 'when dead' to reflect the Latin mortuos more directly.
translation:
  language: es
  text: ¿Pues de qué sirve a todos vivir en tristeza en el presente[a] y, estando ya muertos, esperar castigo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a todos vivir ahora».
    reason: alternative_reading
lexical_decisions:
- source_word: Quid enim prodest
  english_pob_choice: For what does it profit
  chosen_spanish: ¿Pues de qué aprovecha
  alternatives_spanish:
  - ¿Pues de qué sirve
  - ¿Qué gana
  lexicon: prodesse
  rationale: «Aprovecha» conserva el valor de utilidad/beneficio de prodest y suena natural en español sin perder el matiz retórico de la pregunta.
- source_word: omnibus
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos los hombres
  - a todos en general
  lexicon: omnibus
  rationale: «Omnibus» es simplemente «a todos»; evita expandir sin base explícita el alcance a «todos los hombres».
- source_word: in praesenti
  english_pob_choice: in the present
  chosen_spanish: en el presente
  alternatives_spanish:
  - ahora
  - en este tiempo
  lexicon: praesens
  rationale: Se preserva la resonancia escatológica de «el presente» como edad/orden actual, en contraste con el futuro, sin reducirlo a un mero «ahora».
- source_word: vivere in tristitia
  english_pob_choice: to live in sorrow
  chosen_spanish: vivir en tristeza
  alternatives_spanish:
  - vivir en dolor
  - vivir en aflicción
  lexicon: tristitia
  rationale: «Tristeza» reproduce el campo semántico de tristitia de manera clara y sobria; «aflicción» sería posible, pero aquí el sustantivo simple refleja bien el estado descrito.
- source_word: mortuos sperare punitionem
  english_pob_choice: when dead, to expect punishment
  chosen_spanish: y, cuando estén muertos, esperar castigo
  alternatives_spanish:
  - y, al morir, esperar castigo
  - y, después de muertos, esperar castigo
  lexicon: punire / mortuos
  rationale: «Cuando estén muertos» sigue de cerca mortuos y mantiene la referencia al estado de los muertos; «esperar castigo» conserva el infinitivo directo del latín.
theological_decisions:
- issue: Contraste entre el presente y el juicio futuro
  english_pob_reading: in the present ... when dead, to expect punishment
  chosen_spanish_reading: en el presente ... cuando estén muertos, esperar castigo
  alternative_spanish_readings:
  - ahora ... después de morir, esperar castigo
  - en este tiempo ... al morir, esperar castigo
  rationale: La frase latina presenta una oposición apocalíptica entre la era presente y la expectativa de castigo tras la muerte. «En el presente» retiene mejor ese marco que un simple «ahora».
  doctrine_reference: '4 Ezra / 2 Esdras 7: esquema presente-futuro de juicio y retribución'
translation_notes:
  revision_awareness: This draft follows the latest revision pass by keeping 'in the present' as the eschatological contrast to the future and by rendering mortuos directly as 'when dead', while preserving the prior audit note that 'all' is direct for omnibus.
  spanish_consistency_notes:
  - Usa «Yahvé» solo cuando el texto base lo requiera; aquí no aparece ningún tetragrama ni κύριος.
  - Se evita «Cristo»/«Mesías» porque el pasaje no contiene ese léxico.
  - Se mantiene un registro sobrio y bíblico sin arcaísmos innecesarios.
  - La nota [a] está anclada explícitamente en «en el presente[a]» para cumplir la consistencia de marcadores.
