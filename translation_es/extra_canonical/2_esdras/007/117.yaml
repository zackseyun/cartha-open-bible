revisions:
- from: ¿Pues de qué aprovecha a todos vivir en tristeza en el presente[a] y, cuando estén muertos, esperar castigo?
  to: ¿Pues de qué sirve a todos vivir en tristeza en el presente[a] y, estando ya muertos, esperar castigo?
  rationale: Se ajusta la redacción para un español más natural sin perder el sentido del latín ni la decisión auditada sobre «en el presente». «Sirve» mejora la idiomaticidad de la pregunta retórica, y «estando ya muertos» expresa mejor el estado indicado por mortuos que «cuando estén muertos».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:13:43Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el latín: mantiene la pregunta retórica de utilidad (Quid enim prodest), conserva omnibus como «a todos», retiene la resonancia de in praesenti con «en el presente», y expresa mortuos ... sperare punitionem como expectativa de castigo en estado de muerte. Sin embargo, «cuando estén muertos» suena algo menos natural y más perifrástico que una formulación española más directa.'
  spanish_quality_summary: El español es claro y fiel, pero puede pulirse para mayor naturalidad y dignidad. «¿Pues de qué aprovecha...?» es comprensible, aunque «¿de qué sirve...?» suena más idiomático en una pregunta retórica de este tipo. Asimismo, «cuando estén muertos» puede mejorarse a «estando ya muertos» para reflejar mejor el participio/adjetivo mortuos sin introducir el matiz puntual de «al morir».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «En el presente» está bien elegido frente a «ahora» para preservar el contraste escatológico documentado. «Castigo» corresponde adecuadamente a punitionem.
  issues:
  - severity: medium
    issue: «¿Pues de qué aprovecha...?» suena algo forzado en español bíblico-natural
    rationale: Aunque «aprovecha» puede traducir prodest, en esta construcción interrogativa general «¿de qué sirve...?» resulta más idiomático y conserva igual sentido de provecho/utilidad.
  - severity: low
    issue: «cuando estén muertos» es menos natural que una formulación adjetival o estativa
    rationale: El latín mortuos apunta al estado de estar muertos, no al momento de morir. «Estando ya muertos» preserva esa idea con mejor fluidez que la perífrasis futura-subjuntiva.
  revised_spanish_text: ¿Pues de qué sirve a todos vivir en tristeza en el presente[a] y, estando ya muertos, esperar castigo?
  revised_footnotes:
  - marker: a
    text: O «a todos vivir ahora».
    reason: alternative_reading
  revision_rationale: Se ajusta la redacción para un español más natural sin perder el sentido del latín ni la decisión auditada sobre «en el presente». «Sirve» mejora la idiomaticidad de la pregunta retórica, y «estando ya muertos» expresa mejor el estado indicado por mortuos que «cuando estén muertos».
