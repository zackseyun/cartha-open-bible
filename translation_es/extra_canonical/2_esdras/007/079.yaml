base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/079.yaml
  text: to him who gave it[a], to worship the glory of the Most High first of all. And if indeed it is one of those who have spurned and have not kept the way of the Most High, and of those who have despised the law,
  footnotes:
  - marker: a
