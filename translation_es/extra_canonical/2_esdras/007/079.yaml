    changes_summary: Changed 'adore' to 'worship' for more natural formal English, and 'have shown contempt' to 'have spurned' to more directly reflect spreuerunt while keeping the formal register.
translation:
  language: es
  text: a aquel que la dio, para adorar la gloria del Altísimo ante todo. Y si en verdad[a] es uno de los que han despreciado y no han guardado el camino del Altísimo, y de los que han despreciado la ley,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y si en verdad es uno de los que han mostrado desprecio y no han guardado el camino del Altísimo, y de los que han despreciado su ley, y de los que odian a los que le temen».'
    reason: La nota preserva la lectura previa documentada en el audit trail inglés y se reubica en la cláusula a la que realmente corresponde.
lexical_decisions:
- source_word: ad eum qui dedit adorare gloriam Altissimi primum
  english_pob_choice: to him who gave it, to worship the glory of the Most High first of all
  chosen_spanish: a aquel que la dio, para adorar la gloria del Altísimo primero que todo
  alternatives_spanish:
  - al que la dio, para rendir culto a la gloria del Altísimo ante todo
  - a quien la dio, para venerar la gloria del Altísimo en primer lugar
  lexicon: ad eum qui dedit -> a aquel que la dio; adorare -> adorar; gloriam Altissimi -> la gloria del Altísimo
  rationale: El latín conserva una construcción elíptica con pronombre neutro implícito ('la'), por lo que en español conviene explicitarlo sin añadir contenido. 'Adorar' mantiene el valor fuerte de adorare y encaja mejor que 'rendir culto' en un registro bíblico, mientras que 'primero que todo' reproduce el orden prioritario de primum de modo natural en español.
- source_word: spreuerunt
  english_pob_choice: have spurned
  chosen_spanish: han despreciado
  alternatives_spanish:
  - han rechazado con desprecio
  - han desechado
  lexicon: spreuerunt -> han despreciado / han rechazado con desprecio
  rationale: Aunque 'spurned' sugiere rechazo despectivo, en español 'despreciar' recoge bien la fuerza de desdén del verbo latino y preserva el paralelo con 'han despreciado la ley' sin volverlo demasiado idiomático o interpretativo.
- source_word: seruauerunt uiam Altissimi
  english_pob_choice: have not kept the way of the Most High
  chosen_spanish: no han guardado el camino del Altísimo
  alternatives_spanish:
  - no han seguido el camino del Altísimo
  - no han observado el camino del Altísimo
  lexicon: seruauerunt uiam -> han guardado el camino
  rationale: '''Guardar el camino'' conserva la imagen semítica y ética de la expresión, además de corresponder bien al inglés auditado. ''Seguir'' sería más fluido, pero debilitaría el eco de observancia/fidelidad que el latín sugiere.'
- source_word: legem
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - su ley
  - la ley de Dios
  lexicon: legem -> la ley
  rationale: El latín no especifica un posesivo en esta cláusula final; por eso 'la ley' es la opción más fiel y deja abierta la referencia ya entendida al marco del Altísimo. No se añadió 'su' para no sobreespecificar.
theological_decisions:
- issue: Referencia a la gloria del Altísimo como objeto de adoración
  english_pob_reading: to worship the glory of the Most High first of all
  chosen_spanish_reading: para adorar la gloria del Altísimo primero que todo
  alternative_spanish_readings:
  - para adorar primero la gloria del Altísimo
  - para rendir culto a la gloria del Altísimo ante todo
  rationale: 'Se mantiene la orientación doxológica del texto: la gloria del Altísimo es el objeto verbal de ''adorar'', no una cualidad abstracta secundaria. ''Primero que todo'' preserva la prioridad moral/ritual expresada por primum sin convertirla en una glosa doctrinal.'
  doctrine_reference: Doxología y prioridad de la adoración al Dios Altísimo
- issue: Alcance de la cláusula condicional que describe a los desobedientes
  english_pob_reading: if indeed it is one of those who have spurned and have not kept the way of the Most High, and of those who have despised the law
  chosen_spanish_reading: si en verdad es uno de los que han despreciado y no han guardado el camino del Altísimo, y de los que han despreciado la ley
  alternative_spanish_readings:
  - si es, en verdad, uno de los que han rechazado y no han guardado el camino del Altísimo, y de los que han menospreciado la ley
  - si ciertamente pertenece a los que han despreciado y no han guardado el camino del Altísimo, y de los que han despreciado la ley
  rationale: La redacción conserva la estructura acumulativa del latín y del inglés auditado sin cerrar prematuramente la lista, ya que el texto fuente está truncado al final de esta unidad. 'En verdad' refleja quidem con sobriedad, y 'si' mantiene la condicional abierta.
  doctrine_reference: Responsabilidad moral ante el camino y la ley del Altísimo
translation_notes:
  revision_awareness: Este borrador sigue el texto latino provisto, que parece comenzar con el final de 2 Esdras 7:78 ('ad eum qui dedit adorare...') y cortar antes del cierre completo de 7:79. Por eso la traducción conserva la cláusula inicial y deja la enumeración condicional abierta, en lugar de armonizarla con la división estándar del versículo. Se ha tenido en cuenta la revisión inglesa más reciente, pero aquí se privilegia la correspondencia exacta con el paquete fuente suministrado.
  spanish_consistency_notes:
  - Se usa 'Altísimo' de modo uniforme para 'Altissimi'.
  - Se mantiene 'la gloria' como objeto directo explícito para evitar ambigüedad en español.
  - '''La ley'' se deja sin posesivo porque el latín fuente no lo expresa en esta porción.'
  - Se evita 'SEÑOR' por la política POB de traducir el nombre divino como 'Yahvé' cuando aparece; aquí no aparece יהוה sino 'Altissimi', por lo que 'Altísimo' es la forma adecuada.
