base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/021.yaml
  text: For the Lord indeed commanded those who came, when they came, what they should do to live, and what they should observe so as not to be punished.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:03Z'
    unchanged: false
    changes_summary: Replaced 'strictly commanded' with 'indeed commanded' to reflect the emphatic enim mandavit without adding interpretation; changed 'must do' to 'should do' for a more direct rendering of quid facientes viverent; changed 'must keep' to 'should observe' to better match observantes; added commas around 'when they came' for clarity.
translation:
  language: es
  text: Porque, en verdad, el Señor mandó a los que vinieron, cuando vinieron, qué debían hacer para vivir y qué debían observar para no ser castigados.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: mandans enim mandavit
  english_pob_choice: For the Lord indeed commanded
  chosen_spanish: Porque, en verdad, el Señor mandó
  alternatives_spanish:
  - Pues el Señor ciertamente ordenó
  - Porque el Señor efectivamente mandó
  lexicon: mandare -> mandar/ordenar
  rationale: El latín intensifica con enim mandavit; en español, «en verdad» comunica bien la fuerza enfática sin añadir una interpretación como «estrictamente». «Mandó» conserva el verbo de ordenación con naturalidad y fidelidad.
- source_word: venientibus quando venerunt
  english_pob_choice: those who came, when they came
  chosen_spanish: a los que venían, cuando vinieron
  alternatives_spanish:
  - a los que llegaron, cuando llegaron
  - a los que venían, al venir
  lexicon: venire -> venir/llegar
  rationale: El participio y la subordinada temporal expresan llegada/venida sin especificar más. «Venían» y «vinieron» mantienen la repetición temporal del latín y suenan naturales en español.
- source_word: quid facientes viverent
  english_pob_choice: what they should do to live
  chosen_spanish: qué debían hacer para vivir
  alternatives_spanish:
  - qué tenían que hacer para vivir
  - qué debían hacer para poder vivir
  lexicon: quid facere -> qué hacer; vivere -> vivir
  rationale: La revisión inglesa optó por «should do» para no cargar el mandato; en español «debían hacer» refleja esa obligación indirecta sin endurecerla como un mandato absoluto en la formulación.
- source_word: quid observantes
  english_pob_choice: what they should observe
  chosen_spanish: qué debían observar
  alternatives_spanish:
  - qué debían guardar
  - qué debían cumplir
  lexicon: observare -> observar/guardar/cumplir
  rationale: «Observar» sigue de cerca el latín observantes y evita sustituirlo por un término eclesiástico más interpretativo como «guardar» o «cumplir», aunque esas opciones existen en español.
- source_word: non punirentur
  english_pob_choice: so as not to be punished
  chosen_spanish: para no ser castigados
  alternatives_spanish:
  - para no ser penalizados
  - a fin de no ser castigados
  lexicon: punire -> castigar/punir
  rationale: «Castigados» es el equivalente más transparente y bíblicamente comprensible en español contemporáneo; conserva el sentido de evitar pena o sanción sin introducir tecnicismos.
theological_decisions:
- issue: Alcance del mandato divino y su finalidad
  english_pob_reading: the Lord indeed commanded those who came ... what they should do to live, and what they should observe so as not to be punished
  chosen_spanish_reading: el Señor mandó a los que venían ... qué debían hacer para vivir, y qué debían observar para no ser castigados
  alternative_spanish_readings:
  - el Señor les ordenó ... qué hacer para vivir, y qué guardar para no ser castigados
  - el Señor mandó ... cómo debían vivir y qué debían observar
  rationale: El latín presenta una instrucción concreta dada a quienes se acercaban. La versión española conserva esa estructura sin convertirla en una explicación doctrinal más amplia sobre ley o salvación; mantiene el énfasis en instrucción y obediencia.
  doctrine_reference: No aplica; decisión de segmentación y fuerza modal del mandato.
translation_notes:
  revision_awareness: 'La versión sigue la revisión más reciente del audit trail: se evitó intensificar el verbo de mandato con adverbios como «estrictamente», se mantuvo una modalización suave con «debían» para representar quid facientes viverent, y se preservó la idea de observancia con «observar» en lugar de «guardar».'
  spanish_consistency_notes:
  - Se mantiene un español neutro y readable para lectura eclesial latinoamericana.
  - No se introdujo terminología litúrgica adicional; el enunciado se dejó cercano al latín fuente.
  - La coma después de «en verdad» y la segunda coma temporal ayudan a reproducir la claridad sintáctica del original y de la revisión inglesa.
