base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/132.yaml
  text: And I answered and said[a], “I know, Lord, that the Most High is now called merciful because he has mercy on those who have not yet come into the age,”
  footnotes:
  - marker: a
    text: Or 'into the age'.
    reason: previous_rendering
  revision_pass:
