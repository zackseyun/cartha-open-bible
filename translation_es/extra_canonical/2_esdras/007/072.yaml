source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: Qui ergo commorantes sunt in terra, hinc cruciabuntur, quoniam sensum habentes iniquitatem fecerunt, et mandata accipientes non seruauerunt ea, et legem consecuti
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/072.yaml
  text: Therefore those who dwell on the earth will be tormented for this reason, because though they had understanding they committed iniquity, and though they received commandments they did not keep them, and though they obtained the law they dealt deceitfully with it.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:13Z'
    unchanged: false
    changes_summary: Simplified the final clause from 'dealt deceitfully with what they received' to 'dealt deceitfully with it' for closer alignment with the Latin and more natural, concise English.
translation:
  language: es
  text: 'Por tanto, los que habitan en la tierra serán atormentados por esto: porque, teniendo entendimiento, cometieron iniquidad; y, habiendo recibido mandamientos, no los guardaron; y, habiendo obtenido la ley, obraron engañosamente con ella.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Qui ergo commorantes sunt in terra
  english_pob_choice: those who dwell on the earth
  chosen_spanish: los que habitan en la tierra
  alternatives_spanish:
  - los que moran en la tierra
  - los que viven en la tierra
  lexicon: commorantes → habitar/morar; terra → tierra
  rationale: «Habitan» expresa residencia estable y suena natural en español bíblico sin cargar la frase con un registro arcaico excesivo. Conserva la fuerza de un grupo definido por su permanencia en la tierra.
- source_word: hinc cruciabuntur
  english_pob_choice: will be tormented for this reason
  chosen_spanish: serán atormentados por esto
  alternatives_spanish:
  - serán torturados por esto
  - por eso serán atormentados
  lexicon: cruciabuntur → atormentar/tormentar
  rationale: «Atormentados» mantiene el sentido de sufrimiento intenso del latinismo, y «por esto» conserva la referencia causal sin añadir explicación interpretativa.
- source_word: quoniam sensum habentes iniquitatem fecerunt
  english_pob_choice: because though they had understanding they committed iniquity
  chosen_spanish: porque, teniendo entendimiento, cometieron iniquidad
  alternatives_spanish:
  - porque, aunque tenían entendimiento, hicieron iniquidad
  - porque, con entendimiento, practicaron iniquidad
  lexicon: sensum habentes → tener entendimiento; iniquitatem fecerunt → cometer iniquidad
  rationale: «Entendimiento» comunica la capacidad moral e intelectual implícita en sensum. «Cometieron iniquidad» preserva la gravedad jurídica y ética de iniquitatem sin suavizarla.
- source_word: et mandata accipientes non seruauerunt ea
  english_pob_choice: and though they received commandments they did not keep them
  chosen_spanish: y, habiendo recibido mandamientos, no los guardaron
  alternatives_spanish:
  - y, aunque recibieron mandamientos, no los observaron
  - y, habiendo recibido mandamientos, no los cumplieron
  lexicon: mandata → mandamientos; accipientes → recibir; seruauerunt → guardar/observar/cumplir
  rationale: «Guardar» es la opción más fiel y bíblicamente transparente para seruauerunt, conservando la idea de preservar y obedecer lo recibido. El pronombre «los» retoma naturalmente «mandamientos».
- source_word: et legem consecuti
  english_pob_choice: and though they obtained the law they dealt deceitfully with it
  chosen_spanish: y, habiendo obtenido la ley, la trataron con engaño
  alternatives_spanish:
  - y, habiendo recibido la ley, la trataron con engaño
  - y, habiendo alcanzado la ley, obraron engañosamente con ella
  lexicon: legem consecuti → obtener/alcanzar la ley
  rationale: «Obtuvieron la ley» sigue de cerca consecuti y conserva la idea de haber llegado a poseerla. «La trataron con engaño» intenta reproducir el valor de dealt deceitfully with it sin perder la referencia al objeto recibido.
theological_decisions:
- issue: Destino y causa del castigo
  english_pob_reading: those who dwell on the earth will be tormented for this reason
  chosen_spanish_reading: los que habitan en la tierra serán atormentados por esto
  alternative_spanish_readings:
  - los que habitan en la tierra serán castigados por esto
  - los que habitan en la tierra sufrirán tormento por esto
  rationale: El versículo vincula el tormento con la conducta culpable, no con una abstracción. «Atormentados» conserva el carácter retributivo y la intensidad del juicio sin convertirlo en un término más genérico como «castigados».
  doctrine_reference: Juicio retributivo; responsabilidad moral ante la ley recibida.
- issue: Relación entre conocimiento recibido y culpa
  english_pob_reading: though they had understanding ... though they received commandments ... though they obtained the law
  chosen_spanish_reading: teniendo entendimiento ... habiendo recibido mandamientos ... habiendo obtenido la ley
  alternative_spanish_readings:
  - aunque tenían entendimiento ... aunque recibieron mandamientos ... aunque obtuvieron la ley
  - con entendimiento ... tras recibir mandamientos ... tras obtener la ley
  rationale: 'La triple estructura resalta agravación de culpa: no pecan por ignorancia, sino con conocimiento y con dones recibidos. La formulación con gerundios/participios mantiene esa acumulación sin introducir una concesión explícita que el latinismo no marca de forma uniforme.'
  doctrine_reference: Mayor responsabilidad según la luz recibida; desobediencia culpable.
translation_notes:
  revision_awareness: La fuente latina limpia dice «et legem consecuti» sin complemento explícito al final; la revisión inglesa aclaró que el objeto tácito es «it» para acercarse al latín y sonar natural. En español se resolvió con «la» para referir claramente a «la ley», preservando la referencia implícita del original sin expandir el sentido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca, pero este versículo no contiene una ocurrencia directa.
  - Se usa «mandamientos» y «ley» de forma consistente con el plural y singular del original latino.
  - «Iniquidad» se conserva como término jurídico-moral fuerte, coherente con el registro de juicio del contexto.
