translation:
  language: es
  text: y Ezequías por el pueblo en los días de Senaquerib, y muchos por muchos?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ezechias
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías
  - Ezequias
  lexicon: nombre propio bíblico
  rationale: El latín Ezechias corresponde al rey bíblico Hezekiah; en español bíblico estándar, la forma natural y reconocible es Ezequías.
- source_word: pro populo
  english_pob_choice: for the people
  chosen_spanish: por el pueblo
  alternatives_spanish:
  - en favor del pueblo
  - por el pueblo
  lexicon: preposición + sustantivo común
  rationale: La preposición pro expresa aquí sustitución o representación a favor de otros; 'por el pueblo' conserva bien esa relación sin sobreinterpretar el matiz.
- source_word: in diebus Sennacherib
  english_pob_choice: in the days of Sennacherib
  chosen_spanish: en los días de Senaquerib
  alternatives_spanish:
  - en tiempos de Senaquerib
  - en los días de Senaquerib
  lexicon: expresión temporal + nombre propio
  rationale: '''En los días de'' reproduce de cerca la construcción temporal del latín y mantiene el paralelismo bíblico. ''Senaquerib'' es la forma española usual del nombre.'
- source_word: multi pro multis
  english_pob_choice: many for many
  chosen_spanish: muchos por muchos
  alternatives_spanish:
  - muchos por muchos
  - muchos en lugar de muchos
  lexicon: cantidad + preposición
  rationale: Se conserva la literalidad y la tensión sintáctica del cierre, que parece formular una correspondencia o sustitución resumida. No se suaviza porque el texto fuente es elíptico y quizá proverbial.
theological_decisions:
- issue: sentido elíptico de 'multi pro multis'
  english_pob_reading: many for many?
  chosen_spanish_reading: muchos por muchos?
  alternative_spanish_readings:
  - muchos por muchos?
  - muchos en favor de muchos?
  rationale: El contexto del fragmento es enumerativo y la frase final queda abierta; por eso se mantiene la ambigüedad con interrogación. No se fuerza una interpretación doctrinal específica que el latín no explicita.
  doctrine_reference: Principio de prudencia exegética ante texto fragmentario; evitar añadir precisión doctrinal no sustentada por la fuente.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el presente borrador mantiene el acuerdo alto con la fuente latina y la traducción inglesa auditada.
  spanish_consistency_notes:
  - Se usa 'Ezequías' como forma española estándar del nombre bíblico.
  - Se mantiene 'por' para pro, en coherencia con el valor de sustitución/representación sugerido por el latín y reflejado en la traducción inglesa.
  - Se conserva la interrogación final para reflejar la incertidumbre del fragmento fuente.
