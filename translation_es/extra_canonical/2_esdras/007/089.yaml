review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del latín y del POB inglés: ''Este es el orden del Altísimo'', la referencia al ''vaso corruptible'', la permanencia en él, el servicio al Altísimo, el peligro continuo y la finalidad de guardar la ley. Sin embargo, ''ser guardados lejos del vaso corruptible'' no representa bien ''seruari a uaso corruptibili''; en español suena espacial y torpe, mientras que el sentido auditado es más bien ''ser preservados del/después del vaso corruptible''.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero 'guardados lejos del vaso corruptible' resulta poco natural en español y puede confundir. 'Con esfuerzo' es aceptable, aunque 'con fatiga' o 'con arduo trabajo' serían más cercanos a 'cum labore'; no obstante, no exige corrección obligatoria. El resto tiene buena legibilidad y tono bíblico moderno.
  glossary_alignment: '''el Altísimo'' está bien alineado con la terminología del proyecto. No hay conflictos con Yahvé/Mesías/Espíritu/etc. ''el Legislador'' es fiel al audit trail y suficientemente inteligible en español.'
  issues:
  - severity: medium
    issue: La expresión 'ser guardados lejos del vaso corruptible' es poco idiomática y puede distorsionar el sentido.
    rationale: El latín 'seruari a uaso corruptibili' y el inglés auditado apuntan a preservación respecto del 'vaso corruptible', no a una mera localización 'lejos de'. En español 'preservados del vaso corruptible' o 'guardados del vaso corruptible' transmite mejor la idea sin calco forzado.
  revised_spanish_text: Este es el orden del Altísimo, cuando comenzaron a ser preservados del vaso corruptible. En ese tiempo habitaron en él, sirvieron al Altísimo con esfuerzo y, a cada hora, soportaron peligro, para que pudieran guardar perfectamente la ley del Legislador.
  revision_rationale: Se reemplaza 'guardados lejos del' por 'preservados del' para expresar de forma más natural y fiel la pasiva de conservación/protección del latín y del POB inglés, evitando un calco espacial poco claro. No se requieren notas adicionales.
