revisions:
- from: Este es el orden del Altísimo, cuando comenzaron a ser guardados lejos del vaso corruptible. En ese tiempo habitaron en él, sirvieron al Altísimo con esfuerzo y, a cada hora, soportaron peligro, para que pudieran guardar perfectamente la ley del Legislador.
  to: Este es el orden del Altísimo, cuando comenzaron a ser preservados del vaso corruptible. En ese tiempo habitaron en él, sirvieron al Altísimo con esfuerzo y, a cada hora, soportaron peligro, para que pudieran guardar perfectamente la ley del Legislador.
  rationale: Se reemplaza 'guardados lejos del' por 'preservados del' para expresar de forma más natural y fiel la pasiva de conservación/protección del latín y del POB inglés, evitando un calco espacial poco claro. No se requieren notas adicionales.
  reviewer_model: gpt-5.4
