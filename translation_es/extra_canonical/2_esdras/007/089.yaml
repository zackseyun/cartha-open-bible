id: 2ES.7.89
reference: 2 Esdras 7:89
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: runt Altissimi ordo est hic, quando incipient seruari a uaso corruptibili. In eo tempore commoratae seruierunt cum labore Altissimo, et omni hora sustinuerunt
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/089.yaml
  text: This is the order of the Most High, when they began to be kept from the corruptible vessel. In that time they dwelt in it, they served the Most High with labor, and every hour they endured danger, so that they might perfectly keep the law of the Lawgiver.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:17Z'
    unchanged: false
    changes_summary: Restored the opening clause present in the Latin ('This is the order of the Most High, when they began to be kept from the corruptible vessel') and retained the remainder with minor adjustment for completeness and flow.
translation:
  language: es
  text: Este es el orden del Altísimo, cuando comenzaron a ser preservados del vaso corruptible. En ese tiempo habitaron en él, sirvieron al Altísimo con esfuerzo y, a cada hora, soportaron peligro, para que pudieran guardar perfectamente la ley del Legislador.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Altissimi
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Supremo
  - el Altísimo Dios
  lexicon: altissimus
  rationale: Conserva el título reverencial habitual para Deus sin añadir un sustantivo que el latín no expresa aquí.
- source_word: ordo est hic
  english_pob_choice: This is the order
  chosen_spanish: Este es el orden
  alternatives_spanish:
  - Así es el orden
  - Este es el modo
  lexicon: ordo
  rationale: Orden mantiene la idea de disposición o secuencia establecida, fiel al latín y al inglés auditado.
- source_word: quando incipient seruari a uaso corruptibili
  english_pob_choice: when they began to be kept from the corruptible vessel
  chosen_spanish: cuando comenzaron a ser guardados lejos del vaso corruptible
  alternatives_spanish:
  - cuando comenzaron a ser preservados del vaso corruptible
  - cuando empezaron a ser apartados del vaso corruptible
  lexicon: seruari
  rationale: Se conserva la pasiva de conservación/guardia del latín; 'lejos de' refleja la preposición a y evita sobreinterpretar como destrucción o simple separación.
- source_word: uaso corruptibili
  english_pob_choice: corruptible vessel
  chosen_spanish: vaso corruptible
  alternatives_spanish:
  - recipiente corruptible
  - vasija corruptible
  lexicon: vasum
  rationale: '''Vaso'' reproduce el término latino y mantiene la imagen corporal/metafórica del inglés POB; ''vasija'' o ''recipiente'' suavizarían la imagen.'
- source_word: commoratae
  english_pob_choice: they dwelt in it
  chosen_spanish: habitaron en él
  alternatives_spanish:
  - moraron en él
  - permanecieron en él
  lexicon: commoror
  rationale: '''Habitar'' expresa residencia continuada y es natural en español para la imagen de estar en el cuerpo/vaso.'
- source_word: seruierunt cum labore
  english_pob_choice: they served the Most High with labor
  chosen_spanish: sirvieron al Altísimo con esfuerzo
  alternatives_spanish:
  - sirvieron al Altísimo con trabajo
  - sirvieron al Altísimo con fatiga
  lexicon: servio
  rationale: '''Esfuerzo'' comunica labor costosa sin restringir excesivamente a trabajo físico; mantiene el matiz de servicio arduo.'
- source_word: omni hora sustinuerunt
  english_pob_choice: every hour they endured danger
  chosen_spanish: a cada hora, soportaron peligro
  alternatives_spanish:
  - en toda hora soportaron peligro
  - cada hora afrontaron peligro
  lexicon: sustineo
  rationale: El latín da la idea de aguante continuo; 'a cada hora' conserva la distribución temporal del inglés POB y 'soportaron' mantiene el peso del verbo.
- source_word: ut ... perfecte ... legem
  english_pob_choice: so that they might perfectly keep the law
  chosen_spanish: para que pudieran guardar perfectamente la ley
  alternatives_spanish:
  - para que pudieran observar perfectamente la ley
  - a fin de que guardaran perfectamente la ley
  lexicon: lex
  rationale: '''Guardar la ley'' mantiene el lenguaje bíblico de observancia normativa sin sustituirlo por una explicación más libre.'
- source_word: Legislator
  english_pob_choice: the Lawgiver
  chosen_spanish: el Legislador
  alternatives_spanish:
  - el Dador de la ley
  - el Dador de la Ley
  lexicon: legislator
  rationale: '''Legislador'' es el equivalente directo y preserva la personificación del dador de la ley; en español es inteligible y solemne.'
theological_decisions:
- issue: El 'vaso corruptible' como imagen antropológica
  english_pob_reading: the corruptible vessel
  chosen_spanish_reading: el vaso corruptible
  alternative_spanish_readings:
  - la vasija corruptible
  - el cuerpo corruptible
  rationale: Se mantiene la imagen literal del latín y del POB inglés, sin resolverla explícitamente como 'cuerpo', porque el texto recibido habla de 'vaso' y la ambigüedad forma parte de su fuerza imagética.
  doctrine_reference: 2 Esdras 7:89; antropología figurativa del cuerpo como recipiente
- issue: Relación entre servicio, peligro y observancia de la ley
  english_pob_reading: they served the Most High with labor, and every hour they endured danger, so that they might perfectly keep the law of the Lawgiver
  chosen_spanish_reading: sirvieron al Altísimo con esfuerzo y, a cada hora, soportaron peligro, para que pudieran guardar perfectamente la ley del Legislador
  alternative_spanish_readings:
  - sirvieron al Altísimo con trabajo y soportaron peligro a toda hora, para guardar perfectamente la ley del Legislador
  - sirvieron al Altísimo con fatiga y cada hora enfrentaron peligro, para guardar perfectamente la ley
  rationale: 'La cláusula final expresa finalidad: el sufrimiento continuo está orientado a la fidelidad a la ley. Se conserva esa finalidad sin convertirla en una explicación doctrinal distinta.'
  doctrine_reference: 2 Esdras 7:89; perseverancia y obediencia
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que restauró la cláusula inicial completa ('This is the order of the Most High, when they began to be kept from the corruptible vessel') y mantuvo el resto con ajustes de fluidez. La versión española refleja esa cláusula restaurada y conserva la progresión completa del versículo.
  spanish_consistency_notes:
  - Se usa 'Altísimo' para 'Most High' y no 'Señor' para respetar la titulatura explícita del latín.
  - Se mantiene 'vaso' por fidelidad imagética al latín 'uaso', aunque en español eclesial moderno podría sonar menos habitual que 'vasija' o 'cuerpo'.
  - '''Ley del Legislador'' preserva la personificación del dador de la ley sin sustituirla por una formulación explicativa.'
  - La puntuación separa con comas las acciones sucesivas para reflejar la acumulación del latín y del inglés auditado.
