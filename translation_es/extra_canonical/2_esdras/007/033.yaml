translation:
  language: es
  text: Y se revelará el Altísimo sobre el asiento[a] del juicio, y las misericordias pasarán, y la longanimidad será retirada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre el trono del juicio».
    reason: lexical_alternative
lexical_decisions:
- source_word: Altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Supremo
  - el Altísimo Dios
  lexicon: Dios / Altísimo
  rationale: «Altísimo» es el equivalente natural y reverente para el título divino latino, sin introducir un nombre distinto ni una explicación no presente en la fuente.
- source_word: sedem iudicii
  english_pob_choice: upon the seat of judgment
  chosen_spanish: sobre el trono[a] del juicio
  alternatives_spanish:
  - sobre la silla del juicio
  - sobre el asiento del juicio
  lexicon: trono / juicio
  rationale: «Sedem» permite «trono» en un registro bíblico más idiomático en español que «silla» o «asiento», y el genitivo «iudicii» se conserva como «del juicio».
- source_word: misericordiae
  english_pob_choice: mercies
  chosen_spanish: las misericordias
  alternatives_spanish:
  - las compasiones
  - las clemencias
  lexicon: misericordia
  rationale: Se mantiene el plural de la fuente y de la versión inglesa auditada, porque el texto presenta «misericordiae» como plural concreto, no como una abstracción singular.
- source_word: pertransibunt
  english_pob_choice: will pass away
  chosen_spanish: pasarán
  alternatives_spanish:
  - desaparecerán
  - cesarán
  lexicon: pertransire
  rationale: «Pasarán» reproduce con sobriedad el movimiento de desaparición o tránsito final ya asumido por la lectura inglesa.
- source_word: longanimitas
  english_pob_choice: long-suffering
  chosen_spanish: la longanimidad
  alternatives_spanish:
  - la paciencia
  - la paciencia larga
  lexicon: longanimidad
  rationale: Se conserva «longanimidad» porque es el término castellano más preciso y formal para la paciencia perseverante/longánime de la fuente, manteniendo la tensión lexical sin diluirla en «paciencia».
- source_word: congregabitur
  english_pob_choice: will be gathered up
  chosen_spanish: será recogida
  alternatives_spanish:
  - será reunida
  - será retirada
  lexicon: congregare
  rationale: En español, «será recogida» mantiene la imagen de reunión/recolección del latín y deja abierta la tensión interpretativa documentada en la tradición auditada, sin imponer una paráfrasis más interpretativa que la fuente.
theological_decisions:
- issue: Manifestación del Altísimo en el juicio final
  english_pob_reading: And the Most High will be revealed upon the seat of judgment
  chosen_spanish_reading: Y se revelará el Altísimo sobre el trono del juicio
  alternative_spanish_readings:
  - Y el Altísimo será revelado sobre el trono del juicio
  - Y se manifestará el Altísimo sobre el trono del juicio
  rationale: La pasiva con «se revelará» comunica bien la revelación divina escatológica de la fuente y evita añadir un sujeto agente no explícito. «Trono del juicio» preserva el escenario judicial solemne.
  doctrine_reference: Escatología / juicio divino
- issue: Desaparición de las misericordias y retirada de la longanimidad
  english_pob_reading: and mercies will pass away, and long-suffering will be gathered up
  chosen_spanish_reading: y las misericordias pasarán, y la longanimidad será recogida
  alternative_spanish_readings:
  - y las misericordias desaparecerán, y la longanimidad será reunida
  - y las misericordias cesarán, y la longanimidad será retirada
  rationale: La construcción mantiene la doble afirmación de fin o retiro de la misericordia y de la longanimidad sin suavizarla. «Será recogida» conserva el valor literal de congregabitur y no fuerza una interpretación doctrinal única más allá del contexto apocalíptico.
  doctrine_reference: Juicio escatológico / fin de la paciencia divina
- issue: Tensión semántica de congregabitur
  english_pob_reading: long-suffering will be gathered up
  chosen_spanish_reading: longanimidad será recogida
  alternative_spanish_readings:
  - longanimidad será reunida
  - longanimidad será retirada
  rationale: Se preserva la tensión entre el sentido literal de ‘reunir/recoger’ y el matiz contextual de cese o retiro que la tradición auditada debatió. Como el texto latino permite la imagen de ‘recogida’, se evita resolverla totalmente en una paráfrasis interpretativa.
  doctrine_reference: Lectura semítica / idiomática
translation_notes:
  revision_awareness: El contexto inglés auditado pasó por una revisión que osciló entre «gathered up» y «withdrawn» para congregabitur. Aquí se optó por «será recogida», que sigue más de cerca el latín y conserva la ambigüedad documentada, sin imponer la lectura interpretativa más fuerte.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para el título divino, coherente con el estándar español del proyecto.
  - Se usa «longanimidad» para preservar el valor técnico de long-suffering sin reducirlo a «paciencia».
  - No se introduce «SEÑOR» ni «Cristo», porque la fuente no los exige aquí.
  - La nota textual queda limitada al sintagma nominal «trono/sede/asiento del juicio», donde el español admite alternativas legítimas.
