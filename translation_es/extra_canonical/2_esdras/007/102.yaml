    timestamp: '2026-04-23T11:42:21Z'
    unchanged: false
    changes_summary: Trimmed the draft to match the extant Latin for this verse segment. Removed material not present in the provided source, restored 'me also, your servant,' and rendered 'si in die' literally as 'whether on the day' without supplying omitted continuation.
translation:
  language: es
  text: 'Y respondí y dije: «Si he hallado favor delante de tus ojos, muéstrame también a mí, tu siervo, si en el día…»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: si inueni gratiam ante oculos tuos
  english_pob_choice: If I have found favor before your eyes
  chosen_spanish: Si he hallado favor delante de tus ojos
  alternatives_spanish:
  - Si he hallado gracia delante de tus ojos
  - Si he encontrado favor ante tus ojos
  lexicon: gratiam -> gracia/favor; ante oculos tuos -> delante de tus ojos
  rationale: En latín gratiam admite tanto ‘gracia’ como ‘favor’; aquí el auditable English POB optó por ‘favor’, y en español ‘favor’ comunica con naturalidad la petición relacional sin perder el sentido del favor concedido por Dios. ‘Delante de tus ojos’ se mantiene como imagen literal del latín ante oculos tuos.
- source_word: seruo tuo
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: seruo -> siervo/esclavo/servidor
  rationale: El latín seruo aquí funciona como autodesignación reverente. En español ‘siervo’ es la forma más natural y digna para este registro bíblico; ‘esclavo’ sería demasiado fuerte para este contexto relacional, y ‘servidor’ debilita la carga reverencial.
- source_word: demonstra mihi adhuc
  english_pob_choice: show me also
  chosen_spanish: muéstrame también a mí
  alternatives_spanish:
  - muéstrame además
  - enséñame también
  lexicon: demonstrare -> mostrar/enseñar; adhuc -> también/aún
  rationale: ‘Muéstrame’ reproduce mejor el valor de demonstrare en este contexto que ‘enséñame’. Se añadió ‘a mí’ para reflejar el pronombre explícito del latín mihi y conservar el énfasis de la petición personal. ‘También’ corresponde a adhuc en la lectura del POB inglés.
theological_decisions:
- issue: Truncation of the verse at the surviving Latin phrase 'si in die'
  english_pob_reading: whether on the day
  chosen_spanish_reading: si en el día…
  alternative_spanish_readings:
  - si en aquel día…
  - si el día…
  rationale: El testimonio latino proporcionado se corta en ‘si in die’ y el POB inglés revisado decidió no suplir la continuación. Por fidelidad textual, el español debe quedar igualmente abierto e incompleto, sin completar la cláusula ni resolver su sentido.
  doctrine_reference: Principio de suficiencia textual / no suplir materia ausente del testigo base
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que recortó el texto para ajustarse al latín disponible y eliminó el material no atestiguado sobre el juicio y la intercesión de los justos. Por eso la versión española se limita al segmento conservado y conserva la apertura final.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico reverente con ‘tu siervo’ en lugar de ‘tu esclavo’, aunque en otros contextos POB puede preferir ‘esclavo’ cuando el término griego o hebreo lo exige lexicalmente.
  - No se introdujo ‘SEÑOR’ ni otras convenciones de ocultamiento del nombre divino, porque este segmento no contiene el Tetragrámaton.
  - Se respetó la incompletitud final con puntos suspensivos para señalar que el versículo continúa fuera del testigo latino dado.
