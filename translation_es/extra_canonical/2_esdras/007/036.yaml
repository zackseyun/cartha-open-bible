base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/036.yaml
  text: And the pit of torment will appear[7:36], and opposite it will be the place of rest; and the furnace of Gehenna will be shown[a], and opposite it the paradise of delight.
  footnotes:
  - marker: '7:36'
    text: Verses 7:36-105 are Bensly's 'Missing Fragment.' Cut from most medieval Latin manuscripts -- almost certainly because this section teaches that intercession for the damned is refused, which later Christian piety found difficult -- and therefore absent from the Vulgate and from the KJV 1611, where verse 7:35 was followed directly by what older editions numbered as verse 7:36 some seventy verses later. Robert Bensly recovered the fragment from a Spanish manuscript in 1875 and it is now restored in all modern critical editions.
    reason: recovered_fragment
  - marker: a
    text: Or 'Then the pit of torment will appear'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:04Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y aparecerá la fosa del tormento[a], y frente a ella estará el lugar de descanso; y se mostrará el horno de Gehena, y frente a él el paraíso del deleite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces aparecerá la fosa del tormento».'
    reason: alternative_reading
lexical_decisions:
- source_word: Et apparebit
  english_pob_choice: And the pit of torment will appear
  chosen_spanish: Y aparecerá
  alternatives_spanish:
  - Entonces aparecerá
  - Y se mostrará
  lexicon: appear / mostrarse
  rationale: El latín conserva la coordinación repetida con 'Et'; por eso se mantiene 'Y' en lugar de 'Entonces'. 'Aparecerá' reproduce bien el valor de manifestación pública del verbo y permite conservar el paralelismo del pasaje.
- source_word: lacus tormenti
  english_pob_choice: the pit of torment
  chosen_spanish: el lago del tormento
  alternatives_spanish:
  - el pozo del tormento
  - la fosa del tormento
  lexicon: lacus / tormentum
  rationale: '''Lacus'' es literalmente ''lago'', pero en este contexto escatológico puede funcionar como imagen de un lugar o abismo de castigo. Mantengo ''lago'' por fidelidad al latín y porque preserva la fuerza imaginal del texto; ''del tormento'' expresa el genitivo de pertenencia o caracterización.'
- source_word: locus requietionis
  english_pob_choice: the place of rest
  chosen_spanish: el lugar de descanso
  alternatives_spanish:
  - el lugar de reposo
  - el sitio de descanso
  lexicon: locus / requies
  rationale: '''Lugar de descanso'' es claro y natural en español, y mantiene la oposición semántica con el lugar de tormento. ''Descanso'' transmite bien ''requietio'' sin perder dignidad literaria.'
- source_word: clibanus
  english_pob_choice: the furnace of Gehenna will be shown
  chosen_spanish: el horno de Gehena
  alternatives_spanish:
  - el horno
  - el horno de la Gehena
  lexicon: clibanus / Gehenna
  rationale: El sustantivo latino designa un horno o brasa/fogón. Como el texto inglés ya identifica el referente escatológico como Gehena, en español se conserva 'horno de Gehena' para reflejar la imagen y el trasfondo bíblico. La ausencia del verbo en la porción latina conservada obliga a una formulación cauta en el texto principal.
- source_word: paradisus voluptatis
  english_pob_choice: the paradise of delight
  chosen_spanish: el paraíso del deleite
  alternatives_spanish:
  - el paraíso del gozo
  - el paraíso de placer
  lexicon: paradisus / voluptas
  rationale: '''Delite'' traduce con precisión la cualidad de placer agradable del latín sin caer en un registro demasiado moderno o sensual. ''Paraíso'' mantiene el término tradicional y el contraste con Gehena.'
theological_decisions:
- issue: Presentación del juicio final en pares antitéticos
  english_pob_reading: And opposite it will be the place of rest; ... and opposite it the paradise of delight.
  chosen_spanish_reading: y frente a él estará el lugar de descanso; ... y frente a él el paraíso del deleite.
  alternative_spanish_readings:
  - y en contraste con él estará el lugar de descanso; ... y en contraste con él el paraíso del deleite
  rationale: '''Frente a él'' preserva la disposición espacial de oposición explícita del texto y evita suavizar la antítesis escatológica. La estructura doble se mantiene para que el lector perciba el contraste moral y destino final.'
  doctrine_reference: Escatología retributiva; contraposición entre castigo y descanso final
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió 'Then' por 'And' en el inglés auditado, de modo que el español conserva la coordinación inicial con 'Y' y no introduce una inferencia temporal no obligada por el latín. También se respetó la ausencia del verbo explícito en la porción conservada de 'clibanus', evitando completar más allá del testimonio recibido.
  spanish_consistency_notes:
  - Se emplea 'Gehena' como transliteración estable del término escatológico, en línea con el valor del inglés POB.
  - Se evitó 'SEÑOR' o terminología eclesial no pertinente; el verso es descriptivo y no contiene nombres divinos explícitos.
  - La puntuación con punto y coma mantiene las dos parejas antitéticas del latín.
