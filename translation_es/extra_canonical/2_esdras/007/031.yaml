- from: Y sucederá que, después de siete días, será despertada la era[a] que aún no despierta, y morirá lo que es corrupto.
  to: Y sucederá que, después de siete días, la era[a] que aún no está despierta será despertada, y morirá lo que es corrupto.
  rationale: Se ajusta «aún no despierta» a «aún no está despierta» para reflejar mejor el valor estativo de nondum vigilat / «is not yet awake» y mejorar la naturalidad en español. También se reordena la cláusula pasiva para una sintaxis más fluida sin cambiar el sentido.
