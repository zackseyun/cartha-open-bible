source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: et erit post dies septem, et excitabitur qui nondum vigilat saeculum et morietur corruptum.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/031.yaml
  text: And after seven days, the age that is not yet awake will be awakened, and what is corrupt will die.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:04Z'
    unchanged: false
    changes_summary: Changed 'corruptible' to 'corrupt' to more directly reflect Latin corruptum. Kept the rest, which accurately and naturally represents the source.
translation:
  language: es
  text: Y sucederá que, después de siete días, la era[a] que aún no está despierta será despertada, y morirá lo que es corrupto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Era» traduce aquí saeculum, término latino amplio que también puede significar «siglo» o «edad»; se eligió «era» por su tono escatológico y por la imagen de un orden histórico que despierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: post dies septem
  english_pob_choice: after seven days
  chosen_spanish: después de siete días
  alternatives_spanish:
  - tras siete días
  - al cabo de siete días
  lexicon: post + accusative temporal
  rationale: La construcción latina indica un intervalo temporal inmediato; «después de siete días» reproduce con naturalidad y fidelidad ese valor.
- source_word: excitabitur
  english_pob_choice: will be awakened
  chosen_spanish: será despertada
  alternatives_spanish:
  - será despertada
  - despertará
  lexicon: excito
  rationale: El pasivo futuro exige una forma pasiva en español. «Será despertada» conserva el matiz de activación/despertar del original y la lectura auditada del inglés.
- source_word: saeculum
  english_pob_choice: the age
  chosen_spanish: la era
  alternatives_spanish:
  - el siglo
  - el mundo
  - la edad
  lexicon: saeculum
  rationale: «Saeculum» puede abarcar época, era o siglo; en este contexto escatológico, «era» comunica mejor el sentido de un orden/tiempo histórico que todavía no está plenamente despierto.
- source_word: nondum vigilat
  english_pob_choice: is not yet awake
  chosen_spanish: aún no despierta
  alternatives_spanish:
  - todavía no está despierta
  - aún no vela
  lexicon: nondum + vigilare
  rationale: Mantiene la imagen de vigilia/despertar del latín sin volverla extraña en español. «Aún no despierta» corresponde bien al participio/estado expresado por el inglés POB.
- source_word: corruptum
  english_pob_choice: what is corrupt
  chosen_spanish: lo que es corrupto
  alternatives_spanish:
  - lo corrupto
  - lo corrompido
  - lo que es corruptible
  lexicon: corruptus
  rationale: Se sigue la revisión auditada del inglés, que corrigió «corruptible» a «corrupt». «Lo que es corrupto» conserva la tensión entre estado moral/ontológico y evita introducir la idea de mera posibilidad de corrupción.
theological_decisions:
- issue: Sentido escatológico de la «era» que despierta
  english_pob_reading: the age that is not yet awake will be awakened
  chosen_spanish_reading: la era que aún no despierta será despertada
  alternative_spanish_readings:
  - el siglo que aún no despierta será despertado
  - la edad que aún no está despierta será despertada
  rationale: El texto apunta a una intervención futura sobre un orden de tiempo/edad; «era» evita reducirlo a un «siglo» cronológico y preserva la expectativa escatológica del pasaje.
  doctrine_reference: Escatología / renovación final
- issue: Destino de «lo corrupto»
  english_pob_reading: what is corrupt will die
  chosen_spanish_reading: morirá lo que es corrupto
  alternative_spanish_readings:
  - morirá lo corrupto
  - morirá lo corrompido
  rationale: La revisión inglesa prefirió «corrupt» sobre «corruptible». En español, «lo que es corrupto» evita desplazar el sentido hacia mera capacidad de corrupción y mantiene el contraste entre lo que perece y lo que permanece.
  doctrine_reference: Corrupción y mortalidad
- issue: Voz pasiva en el futuro
  english_pob_reading: will be awakened
  chosen_spanish_reading: será despertada
  alternative_spanish_readings:
  - se despertará
  rationale: El pasivo refleja mejor el latín «excitabitur» y evita sugerir espontaneidad; el texto presenta una acción sufrida/recibida.
  doctrine_reference: Agencia divina y pasividad del sujeto
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «what is corruptible will die» a «what is corrupt will die» para ajustarse más directamente al latín corruptum. La traducción española sigue esa revisión y evita introducir la noción de mera potencialidad.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» según corresponda al contexto, pero en este versículo no aparecen.
  - Se prefiere una sintaxis sobria y directa, acorde con una cláusula profética breve.
  - No se introduce terminología eclesiástica ajena al latín; «era» se usa como decisión contextual, no como equivalente automático de saeculum.
