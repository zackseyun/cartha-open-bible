revisions:
- from: Si entonces ahora[a], cuando la corrupción ha aumentado y la injusticia se ha multiplicado, los justos oraron por los impíos, ¿por qué no será también así entonces?
  to: Si, pues, ahora, cuando la corrupción ha aumentado y la injusticia se ha multiplicado, los justos oraron por los impíos, ¿por qué no será también así entonces?[a]
  rationale: Se corrige la apertura para reflejar fielmente «Si ergo modo» en un español natural («Si, pues, ahora»). Se conserva el resto de las decisiones léxicas, incluida la fuerza aditiva de «et» con «también». La nota se reubica al final de la cláusula pertinente y se ajusta para representar la alternativa documentada en el rastro de auditoría inglés, que omite «también».
