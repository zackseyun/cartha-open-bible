translation:
  language: es
  text: Si, pues, ahora, cuando la corrupción ha aumentado y la injusticia se ha multiplicado, los justos oraron por los impíos, ¿por qué no será también así entonces?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿por qué no será así entonces?»'
    reason: previous_rendering
lexical_decisions:
- source_word: corruptibile increvit
  english_pob_choice: when corruption has increased
  chosen_spanish: cuando la corrupción ha aumentado
  alternatives_spanish:
  - cuando lo corruptible ha crecido
  - cuando la corrupción se ha incrementado
  lexicon: corruptio -> corrupción; increvit -> ha aumentado
  rationale: El latín habla de la expansión de la corrupción como realidad moral; en español, «corrupción» comunica mejor el sustantivo abstracto que «lo corruptible», y «ha aumentado» conserva el valor verbal de incremento sin volverlo mecánico.
- source_word: iniustitia multiplicata est
  english_pob_choice: and unrighteousness has multiplied
  chosen_spanish: y la injusticia se ha multiplicado
  alternatives_spanish:
  - y la iniquidad se ha multiplicado
  - y la injusticia ha crecido
  lexicon: iniustitia -> injusticia; multiplicata est -> se ha multiplicado
  rationale: «Injusticia» mantiene el término jurídico-moral de iniustitia y encaja con el paralelo de «corrupción». «Se ha multiplicado» reproduce bien la intensificación del latín.
- source_word: iusti
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos de Dios
  lexicon: iustus -> justo
  rationale: «Los justos» es la equivalencia directa y natural en español bíblico, sin introducir matices no presentes en el latín.
- source_word: pro impiis
  english_pob_choice: for the ungodly
  chosen_spanish: por los impíos
  alternatives_spanish:
  - por los malvados
  - a favor de los impíos
  lexicon: impius -> impío
  rationale: «Impíos» conserva la fuerza religiosa del término latino y la relación antitética con «justos». «Por» mantiene la idea de intercesión contenida en exoraverunt.
- source_word: quare et tunc sic non erit?
  english_pob_choice: why will it not also be so then?
  chosen_spanish: ¿por qué no será también así entonces?
  alternatives_spanish:
  - ¿por qué entonces no será así también?
  - ¿por qué no ocurrirá también así entonces?
  lexicon: quare -> por qué; et -> también; tunc -> entonces; sic non erit -> no será así
  rationale: La revisión auditada muestra que «et» tiene fuerza aditiva («también/even»), por lo que la versión española incluye «también» para no perder el paralelo con el tiempo presente. «Así» conserva el demonstrativo adverbial de sic.
theological_decisions:
- issue: Intercesión de los justos en favor de los impíos como argumento comparativo
  english_pob_reading: the righteous prayed for the ungodly
  chosen_spanish_reading: los justos oraron por los impíos
  alternative_spanish_readings:
  - los justos intercedieron por los impíos
  - los justos oraron a favor de los impíos
  rationale: 'El texto presenta un hecho ejemplar: la oración de los justos por quienes son impíos. «Oraron» es suficientemente amplio para abarcar intercesión sin sobreespecificar el acto, y evita añadir un término técnico que el latín no exige.'
  doctrine_reference: Intercesión y justicia divina en el juicio; cf. 2 Esdras 7:111 como argumento retórico dentro de la sección apocalíptica.
translation_notes:
  revision_awareness: La revisión más reciente mantuvo el texto sin cambios; la única corrección auditada relevante fue la recuperación de la fuerza adverbial de «et» en quare et tunc, por lo que la traducción española incorpora explícitamente «también».
  spanish_consistency_notes:
  - Se conservó el registro bíblico formal, pero con sintaxis natural para el español moderno.
  - 'Se evitó traducir mecanicamente el latín: «corruptio» se rindió como «corrupción» y no como un calco adjetival.'
  - Se mantuvo la tensión comparativa del verso entre el presente y el tiempo del juicio mediante «también» y «entonces».
