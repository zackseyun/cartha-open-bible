id: 2ES.7.26
reference: 2 Esdras 7:26
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: ecce enim tempus veniet, et erit quando venient signa quae praedixi tibi, et apparebit sponsa et apparescens civitas et ostendetur quae nunc subducitur terra.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/026.yaml
  text: For behold[7:26], the time will come, and it will be when the signs that I foretold to you will come, and the bride will appear, and the city that is appearing[a], and what is now withdrawn from the earth will be shown.
  footnotes:
  - marker: '7:26'
    text: The paired images of the appearing bride and the city now hidden likely compress Zion/Jerusalem restoration imagery into apocalyptic symbolism. The Latin is terse and does not explain the relationship between bride and city.
    reason: compositional_layer
  - marker: a
    text: Or 'the city now hidden will appear'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:03Z'
    unchanged: false
    changes_summary: Revised 'it will happen' to the more literal 'it will be'; changed 'the appearing city' to 'the city that is appearing' to reflect the participial Latin more clearly and naturally while preserving the source wording.
translation:
  language: es
  text: Pues he aquí, vendrá el tiempo, y será cuando vengan las señales que te predije, y aparecerá la novia, y la ciudad que aparece[a], y se mostrará lo que ahora está escondido bajo la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la ciudad que está apareciendo». El latín apparescens civitas es participial; la revisión auditada corrige una lectura que entendía la ciudad como «oculta» en vez de «apareciendo».'
    reason: alternative_reading
lexical_decisions:
- source_word: ecce enim
  english_pob_choice: For behold
  chosen_spanish: Porque he aquí
  alternatives_spanish:
  - Pues he aquí
  - He aquí
  lexicon: ecce
  rationale: Conserva el valor de énfasis y anuncio solemne del latín. 'Porque he aquí' reproduce bien la conexión causal/explicativa de enim sin perder el tono profético.
- source_word: tempus veniet
  english_pob_choice: the time will come
  chosen_spanish: vendrá el tiempo
  alternatives_spanish:
  - el tiempo vendrá
  - llegará el tiempo
  lexicon: tempus
  rationale: '''Vendrá el tiempo'' es natural en español y mantiene la personificación temporal del latín, sin añadir matices no presentes.'
- source_word: quando venient signa quae praedixi tibi
  english_pob_choice: when the signs that I foretold to you will come
  chosen_spanish: cuando vengan las señales que te predije
  alternatives_spanish:
  - cuando vengan las señales que te anuncié
  - cuando lleguen las señales que te predije
  lexicon: signa / praedixi
  rationale: '''Señales'' refleja signa; ''predije'' conserva el sentido de anticipar/profetizar del latín praedixi. Se evita ''anuncié'' porque debilita la fuerza profética explícita.'
- source_word: sponsa
  english_pob_choice: the bride
  chosen_spanish: la novia
  alternatives_spanish:
  - la esposa
  - la desposada
  lexicon: sponsa
  rationale: '''Novia'' es la equivalencia más directa y comprensible en español moderno para la imagen nupcial; ''esposa'' o ''desposada'' introducirían un sesgo interpretativo mayor.'
- source_word: apparescens civitas
  english_pob_choice: the city that is appearing
  chosen_spanish: la ciudad que está apareciendo
  alternatives_spanish:
  - la ciudad que aparece
  - la ciudad que se está manifestando
  lexicon: apparescens
  rationale: 'Se sigue la corrección auditada del latín: no ''la ciudad ocultada'' sino ''la ciudad que está apareciendo''. El gerundio perifrástico expresa el participio presente de modo claro y fiel.'
- source_word: ostendetur
  english_pob_choice: will be shown
  chosen_spanish: será mostrado
  alternatives_spanish:
  - será manifestado
  - se mostrará
  lexicon: ostendo
  rationale: '''Será mostrado'' conserva la pasiva del latín. ''Se mostrará'' sería más idiomático, pero atenúa la correspondencia formal con la voz pasiva.'
- source_word: quae nunc subducitur terra
  english_pob_choice: what is now withdrawn from the earth
  chosen_spanish: lo que ahora está retirado de la tierra
  alternatives_spanish:
  - lo que ahora se retira de la tierra
  - lo que ahora está oculto bajo la tierra
  lexicon: subducitur
  rationale: '''Está retirado'' mantiene la idea de algo sacado/retirado de debajo o fuera de la tierra sin forzar una interpretación cosmológica adicional. ''Oculto'' sería una explicación, no una traducción estricta.'
theological_decisions:
- issue: Imagen de la novia y la ciudad
  english_pob_reading: The paired images of the appearing bride and the city now hidden likely compress Zion/Jerusalem restoration imagery into apocalyptic symbolism.
  chosen_spanish_reading: Las imágenes de la novia y la ciudad que aparece se conservan sin explicarlas, como simbolismo apocalíptico condensado.
  alternative_spanish_readings:
  - la novia y la ciudad representan explícitamente a Sion/Jerusalén
  - la novia es una metáfora de la ciudad
  rationale: El latín no desarrolla la relación entre ambas imágenes; por eso el español debe preservar la tensión interpretativa en lugar de resolverla. La nota evita sobreinterpretar y conserva la ambigüedad documentada.
  doctrine_reference: Apocalíptica simbólica; restauración de Sion/Jerusalén
translation_notes:
  revision_awareness: 'La redacción sigue la revisión auditada más reciente: refleja apparescens civitas como «la ciudad que está apareciendo» y no importa la reconstrucción griega de «la ciudad oculta»; además conserva la secuencia latina con pasivos y participios presentes.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «novia» para sponsa siguiendo la imagen nupcial directa, sin convertirla en terminología eclesial.
  - Se preserva la pasiva «será mostrado» para ostendetur por fidelidad al latín.
  - La elección de «lo que ahora está retirado de la tierra» intenta respetar la vaguedad del original y no precisar más de lo que el texto dice.
