revisions:
- from: Porque he aquí, vendrá el tiempo, y será cuando vengan las señales que te predije, y aparecerá la novia, y la ciudad que está apareciendo[a], y será mostrado lo que ahora está retirado de la tierra.
  to: Pues he aquí, vendrá el tiempo, y será cuando vengan las señales que te predije, y aparecerá la novia, y la ciudad que aparece[a], y se mostrará lo que ahora está escondido bajo la tierra.
  rationale: Se ajusta el inicio para sonar natural y solemne en español, se mejora la expresión participial de 'apparescens civitas' sin perder la nota explicativa, y se corrige la cláusula final para reflejar mejor la idea de algo ahora escondido bajo la tierra, que luego será revelado. También se sustituye la pasiva calcada por una formulación española más fluida.
