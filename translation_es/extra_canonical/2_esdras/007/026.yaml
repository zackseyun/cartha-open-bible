review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el latín base y la corrección auditada clave: conserva ''sponsa'' como ''la novia'' y ''apparescens civitas'' como una ciudad que aparece, no como ciudad oculta. También mantiene la ambigüedad entre novia y ciudad, y refleja ''ostendetur'' como pasiva. Sin embargo, hay dos puntos a reparar: ''Porque he aquí'' sobrerrepresenta ''enim'' y suena poco natural; y ''subducitur terra'' está mal vertido como ''retirado de la tierra'', cuando el latín con ablativo sin preposición apunta mejor a algo retirado/quitado de la vista ''por la tierra'' o ''bajo tierra'', es decir, oculto/escondido bajo la tierra, no simplemente apartado de la tierra.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero tiene giros algo forzados: ''Porque he aquí'' y ''la ciudad que está apareciendo'' suenan pesados en español bíblico natural. ''La ciudad que aparece'' conserva mejor el participio con buena legibilidad, apoyado por nota. ''Será mostrado'' es aceptable pero concuerda mejor ''se mostrará'' o ''será mostrado'' con un referente neutro; aquí ''se mostrará'' mejora naturalidad sin pérdida de sentido. La frase final requiere reparación para sonar natural y fiel.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Las decisiones sobre 'novia' y la ambigüedad simbólica son correctas. La nota alternativa sobre 'apparescens civitas' está bien orientada y debe conservarse, quizá con formulación más breve. No se activan términos sensibles como Yahvé, Mesías, δοῦλος, etc.
  issues:
  - severity: medium
    issue: Inicio 'Porque he aquí'
    rationale: '''ecce enim'' justifica énfasis y enlace discursivo, pero ''Porque he aquí'' en español suena innecesariamente rígido y causal. ''Pues he aquí'' o simplemente ''He aquí'' refleja mejor el tono profético y la fluidez.'
  - severity: medium
    issue: '''la ciudad que está apareciendo'' es poco natural'
    rationale: Aunque intenta reflejar el participio presente, en español resulta torpe. 'La ciudad que aparece' preserva el sentido participial con mejor idiomaticidad. La nota puede retener el matiz gramatical.
  - severity: high
    issue: Traducción inexacta de 'quae nunc subducitur terra'
    rationale: '''lo que ahora está retirado de la tierra'' sugiere separación desde la tierra, pero ''subducitur'' con ''terra'' apunta mejor a algo sustraído de la vista por la tierra, es decir, escondido/oculto bajo tierra. La traducción actual no preserva bien la imagen del original.'
  - severity: low
    issue: '''será mostrado'' suena calcado'
    rationale: La pasiva formal es posible, pero 'se mostrará' es más natural en español y mantiene el valor futuro pasivo/impersonal del original en este contexto.
  revised_spanish_text: Pues he aquí, vendrá el tiempo, y será cuando vengan las señales que te predije, y aparecerá la novia, y la ciudad que aparece[a], y se mostrará lo que ahora está escondido bajo la tierra.
  revised_footnotes:
  - marker: a
    text: 'O: «la ciudad que está apareciendo». El latín apparescens civitas es participial; la revisión auditada corrige una lectura que entendía la ciudad como «oculta» en vez de «apareciendo».'
    reason: alternative_reading
  revision_rationale: Se ajusta el inicio para sonar natural y solemne en español, se mejora la expresión participial de 'apparescens civitas' sin perder la nota explicativa, y se corrige la cláusula final para reflejar mejor la idea de algo ahora escondido bajo la tierra, que luego será revelado. También se sustituye la pasiva calcada por una formulación española más fluida.
