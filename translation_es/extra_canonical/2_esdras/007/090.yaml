source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: periculum, uti perfecte custodirent legislatoris legem. Propter quod hic de his
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/090.yaml
  text: 'the danger, that they might perfectly keep the law of the Lawgiver. Therefore this is concerning them:'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:18Z'
    unchanged: false
    changes_summary: 'Replaced the draft, which omitted the preceding clause entirely. Restored the sense of the Latin: ''periculum'' as ''the danger,'' ''uti ... custodirent'' as purpose/result ''that they might ... keep,'' ''perfecte'' as ''perfectly,'' and ''legislatoris legem'' as ''the law of the Lawgiver.'' Kept the final clause close to the source.'
translation:
  language: es
  text: 'el peligro, para que guardaran perfectamente la ley del Legislador. Por eso, esto se refiere a ellos:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: periculum
  english_pob_choice: the danger
  chosen_spanish: el peligro
  alternatives_spanish:
  - el riesgo
  - la amenaza
  lexicon: Latin periculum
  rationale: «Peligro» conserva el valor básico y concreto del latín, y encaja bien con la lectura del POB en inglés. «Riesgo» sería más abstracto; «amenaza» introduce una agente amenazante que no está en el texto.
- source_word: uti ... custodirent
  english_pob_choice: that they might perfectly keep
  chosen_spanish: para que guardaran
  alternatives_spanish:
  - para que observaran
  - a fin de que cumplieran
  lexicon: Latin uti + imperfect subjunctive of custodire
  rationale: La cláusula expresa finalidad. «Para que guardaran» comunica bien el propósito sin endurecer el español. «Observaran» o «cumplieran» podrían funcionar, pero «guardar» mantiene la fuerza de custodire con una cadencia natural.
- source_word: perfecte
  english_pob_choice: perfectly
  chosen_spanish: perfectamente
  alternatives_spanish:
  - de manera perfecta
  - plenamente
  lexicon: Latin perfecte
  rationale: Se conserva el adverbio intensivo del latín. «Perfectamente» es la correspondencia directa y mantiene la tensión de una obediencia completa, como en el audit trail inglés.
- source_word: legislatoris legem
  english_pob_choice: the law of the Lawgiver
  chosen_spanish: la ley del Legislador
  alternatives_spanish:
  - la ley del dador de la ley
  - la ley del que da la ley
  lexicon: Latin legislatoris legem
  rationale: «Legislador» traduce con precisión legislatoris y preserva el nombre de función. «Dador de la ley» explicita el sentido, pero suena más perifrástico; aquí la forma más directa es más fiel y clara.
theological_decisions:
- issue: 'Alcance de la relación final: ''Therefore this is concerning them'''
  english_pob_reading: 'Therefore this is concerning them:'
  chosen_spanish_reading: 'Por eso, esto es acerca de ellos:'
  alternative_spanish_readings:
  - 'Por tanto, esto concierne a ellos:'
  - 'Así pues, esto se refiere a ellos:'
  rationale: El final latino 'Propter quod hic de his' es resumitivo y algo elíptico. «Esto es acerca de ellos» mantiene la referencia abierta y la leve aspereza del original sin interpretarla más de lo debido.
  doctrine_reference: 2 Esdras 7:90; audit trail English revision pass
- issue: Valor de 'legislatoris' como título funcional
  english_pob_reading: the Lawgiver
  chosen_spanish_reading: el Legislador
  alternative_spanish_readings:
  - el Dador de la ley
  - el que da la ley
  rationale: «Legislador» mantiene el título funcional sin convertirlo en una expresión devocional ajena al latín. En español, además, es suficientemente claro y no borra la relación jurídica del pasaje.
  doctrine_reference: Lexical/theological consistency with Latin source
translation_notes:
  revision_awareness: Esta versión sigue la corrección reciente del audit trail inglés, que restauró la cláusula omitida sobre 'el peligro' y el propósito de 'guardar perfectamente la ley del Legislador'. Evita repetir el error anterior de convertir todo el tramo en una mera fórmula doctrinal sin el contenido de periculum + uti ... custodirent.
  spanish_consistency_notes:
  - Se mantuvo una sintaxis sobria y cercana al latín, pero con orden natural en español.
  - No se introdujo léxico eclesiástico no motivado por la fuente.
  - Se preservó la clausula final elíptica como en el latín y el inglés auditado.
