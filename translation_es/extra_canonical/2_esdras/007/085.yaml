    issue: La nota al pie duplica exactamente el texto principal.
    rationale: La nota «O “la morada”» no preserva una alternativa significativa ni corresponde a la nota inglesa, que ofrecía una alternativa plural previa ya descartada por la adjudicación. Mantenerla crea ruido editorial y no cumple una función útil.
  revised_spanish_text: 'La quinta vía: ven que la morada de los otros es guardada por ángeles.'
  revision_rationale: Se elimina la nota al pie porque no ofrece una alternativa real y contradice la disciplina editorial de conservar solo notas significativas. El texto principal puede mantenerse tal como está, pues es fiel al latín, natural en español y preserva correctamente el singular de «habitaculum».
