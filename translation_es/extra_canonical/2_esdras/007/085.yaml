  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el latín: «Quinta uia» = «La quinta vía», «uidentes» = «ven», «aliorum habitaculum» se mantiene correctamente en singular, y «ab angelis conseruari» se refleja adecuadamente como custodia angélica. No hay omisiones relevantes ni adiciones indebidas.'
  spanish_quality_summary: 'El español es claro y digno. Sin embargo, la nota al pie no aporta una alternativa real: dice «O “la morada”» cuando el texto principal ya usa exactamente «la morada». Debe eliminarse o sustituirse por una alternativa verdadera. El resto del texto suena natural.'
  glossary_alignment: No hay términos del glosario base especialmente implicados aquí. «Vía» para uia y «morada» para habitaculum concuerdan con la racionalidad documentada. La preservación del singular es especialmente correcta según la revisión inglesa auditada.
  issues:
