translation:
  language: es
  text: El séptimo camino es mayor que todos los caminos mencionados arriba[a], porque se desgastarán en confusión y serán consumidos por horrores, y se marchitarán en temores, viendo la gloria del Altísimo, delante de quien pecaron mientras vivían, y delante de quien comenzarán a ser juzgados en los últimos tiempos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El latín de este versículo es textualmente áspero en varios puntos. Sin embargo, el sentido general es claro: los impíos sufren la angustia más severa al ser confrontados con la gloria del Altísimo delante de quien pecaron.'
    reason: textual_variant
lexical_decisions:
- source_word: Septima uia est omnium quae supradictae sunt uiarum maior
  english_pob_choice: The seventh way is greater than all the ways mentioned above
  chosen_spanish: La séptima senda es mayor que todas las sendas mencionadas arriba
  alternatives_spanish:
  - La séptima vía es mayor que todas las vías mencionadas arriba
  - La séptima senda es mayor que todas las sendas ya dichas
  lexicon: uia > senda / vía
  rationale: Conservo la comparación superlativa y el orden natural del latín. «Senda» evita el matiz demasiado técnico de «vía» y mantiene la imagen de itinerarios o caminos de juicio del contexto.
- source_word: detabescent
  english_pob_choice: they will waste away
  chosen_spanish: se desgastarán
  alternatives_spanish:
  - se consumarán
  - se desharán
  lexicon: detabesco > desgastarse / consumirse
  rationale: El verbo expresa desmoronamiento o desgaste progresivo; «se desgastarán» conserva la idea de deterioro sin añadir un sentido no atestiguado.
- source_word: in confusione
  english_pob_choice: in confusion
  chosen_spanish: en confusión
  alternatives_spanish:
  - en confusión y vergüenza
  - en desconcierto
  lexicon: confusio > confusión
  rationale: «Confusión» sigue de cerca el latín y mantiene la fuerza de desorden interior y consternación sin convertirla en «vergüenza», que no está en el texto latino recibido.
- source_word: consumentur in horróribus
  english_pob_choice: be consumed in horrors
  chosen_spanish: serán consumidos por horrores
  alternatives_spanish:
  - serán consumidos en terrores
  - serán devorados por horrores
  lexicon: consumere + horror > ser consumidos por horrores
  rationale: «Horrores» refleja el plural latino horróribus y evita rebajar el término a «vergüenza». «Consumidos por» comunica bien la pasividad del futuro pasivo.
- source_word: maereescent in timoribus
  english_pob_choice: wither in fears
  chosen_spanish: se marchitarán en temores
  alternatives_spanish:
  - se mustiarán en temores
  - se secarán de miedo
  lexicon: marcesco > marchitarse; timores > temores
  rationale: «Marchitarse» reproduce la imagen de languidecer o perder vigor; «temores» mantiene el plural concreto del latín mejor que un singular generalizado.
- source_word: uidentes gloriam Altissimi
  english_pob_choice: seeing the glory of the Most High
  chosen_spanish: viendo la gloria del Altísimo
  alternatives_spanish:
  - al ver la gloria del Altísimo
  - cuando vean la gloria del Altísimo
  lexicon: videre > ver; Altissimus > Altísimo
  rationale: El participio presente funciona como circunstancia acompañante. «Viendo» mantiene la relación sintáctica sin añadir una causalidad distinta.
- source_word: coram quem uiuentes peccauerunt
  english_pob_choice: before whom they sinned while they lived
  chosen_spanish: delante de quien pecaron mientras vivían
  alternatives_spanish:
  - ante quien pecaron mientras vivían
  - delante de quien habían pecado mientras vivían
  lexicon: coram + relativum > delante de quien
  rationale: «Delante de quien» conserva la preposición relacional y el juicio de presencia. «Mientras vivían» refleja el valor temporal del participio latino con naturalidad en español.
- source_word: incipient... iudicari in nouissimis temporibus
  english_pob_choice: they will begin to be judged in the last times
  chosen_spanish: comenzarán a ser juzgados en los últimos tiempos
  alternatives_spanish:
  - empezarán a ser juzgados en los últimos tiempos
  - serán juzgados en los últimos tiempos
  lexicon: incipere + iudicari > comenzar a ser juzgados
  rationale: Incluyo «comenzarán» para no omitir el valor verbal del latino y para conservar el matiz de inicio del juicio. «Últimos tiempos» traduce bien nouissimis temporibus en registro bíblico español.
theological_decisions:
- issue: Naturaleza del castigo de los impíos ante la gloria del Altísimo
  english_pob_reading: The wicked undergo the most severe anguish when confronted with the glory of the Most High before whom they sinned.
  chosen_spanish_reading: Los impíos se consumen y se marchitan al enfrentarse con la gloria del Altísimo, delante de quien pecaron.
  alternative_spanish_readings:
  - Los impíos sienten vergüenza al enfrentarse con la gloria del Altísimo
  - Los impíos sufren terror al ver la gloria del Altísimo
  rationale: 'El latín enfatiza una serie de padecimientos corporales y afectivos: desgaste, consumo, horrores, temores. No sustituyo ese campo por «vergüenza»; mantengo el peso de terror y desintegración que el audit trail corrigió en la versión inglesa.'
  doctrine_reference: 2 Esdras 7:87; juicio final de los impíos ante la gloria divina
- issue: Inicio del juicio en los últimos tiempos
  english_pob_reading: before whom they will begin to be judged in the last times
  chosen_spanish_reading: delante de quien comenzarán a ser juzgados en los últimos tiempos
  alternative_spanish_readings:
  - ante quien serán juzgados en los últimos tiempos
  - delante de quien empezarán a ser juzgados al final
  rationale: Conservo el verbo de inicio («comenzarán») porque el latín incipient no debe omitirse. El pasaje no dice simplemente que ya están juzgados, sino que el proceso de juicio se inicia en los últimos tiempos.
  doctrine_reference: 2 Esdras 7:87; escatología del juicio
translation_notes:
  revision_awareness: 'La versión inglesa fue corregida para evitar tres errores mayores: convertir horróribus en «shame», hacer presentes verbos que son futuros, y mover indebidamente el valor causal. La propuesta española sigue la lectura revisada y también conserva incipient, que no debe perderse en español.'
  spanish_consistency_notes:
  - Uso «Altísimo» para Altissimi, en continuidad con la convención bíblica española.
  - Mantengo «delante de quien» para coram quem, evitando una paráfrasis que debilite la relación judicial.
  - «Senda» se usa con valor poético-bíblico para uia, pero podría alternar con «vía» si se buscara mayor literalidad; aquí prefiero la cadencia y claridad de «senda».
  - No introduzco «vergüenza» porque el latino limpiado y la revisión inglesa se inclinan claramente hacia horrores/terrores, no hacia pudor o shame.
