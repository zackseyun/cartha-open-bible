base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/129.yaml
  text: For this is the way that Moses spoke of to the people while he lived, saying, ‘Choose life for yourself, that you may live.’
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:26Z'
    unchanged: false
    changes_summary: Adjusted 'of which Moses spoke' to the more natural English 'that Moses spoke of' while preserving the sense of the Latin. No other changes needed.
translation:
  language: es
  text: 'Porque este es el camino del que habló Moisés al pueblo mientras vivía, diciendo: «Elige para ti la vida, para que vivas».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: quoniam
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: Latin quoniam
  rationale: Introduce la razón o explicación del enunciado anterior de manera natural en español; «porque» mantiene la relación explicativa sin sonar forzado.
- source_word: haec est via
  english_pob_choice: this is the way
  chosen_spanish: este es el camino
  alternatives_spanish:
  - esta es la vía
  - este es el sendero
  lexicon: Latin via
  rationale: «Camino» es la opción más clara y bíblica en español; conserva la metáfora de dirección o modo de vida que el contexto sugiere.
- source_word: quam Moyses dixit ... ad populum
  english_pob_choice: that Moses spoke of to the people
  chosen_spanish: del que habló Moisés al pueblo
  alternatives_spanish:
  - que Moisés dijo al pueblo
  - del cual Moisés habló al pueblo
  lexicon: Latin dicere + ad populum
  rationale: La construcción española «hablar de» expresa con naturalidad el valor del relativo latino con sentido de referencia temática; «al pueblo» conserva el complemento destinatario.
- source_word: cum viveret
  english_pob_choice: while he lived
  chosen_spanish: mientras vivía
  alternatives_spanish:
  - cuando vivía
  - en vida
  lexicon: Latin cum + imperfecto
  rationale: «Mientras vivía» reproduce el marco temporal continuo del imperfecto latino y mantiene la fluidez del español.
- source_word: elige tibi vitam
  english_pob_choice: Choose life for yourself
  chosen_spanish: Elige para ti la vida
  alternatives_spanish:
  - Escoge para ti la vida
  - Elige la vida para ti
  lexicon: Latin imperativo + dativo tibi
  rationale: Conserva el imperativo y el dativo reflexivo/dativo de interés con una formulación natural en español. «La vida» retiene el objeto directo explícito del texto latino.
- source_word: ut vivas
  english_pob_choice: that you may live
  chosen_spanish: para que vivas
  alternatives_spanish:
  - para que tengas vida
  - a fin de que vivas
  lexicon: Latin ut + subjunctive
  rationale: «Para que vivas» expresa bien la finalidad del ut latino sin añadir matices no presentes en la fuente.
theological_decisions:
- issue: La expresión «elige... la vida» como opción moral y vital
  english_pob_reading: Choose life for yourself, that you may live.
  chosen_spanish_reading: Elige para ti la vida, para que vivas
  alternative_spanish_readings:
  - Escoge la vida para que vivas
  - Elige la vida para ti, para que vivas
  rationale: Se preserva el imperativo con fuerza exhortativa y la relación finalidad-resultado entre escoger la vida y vivir. La formulación mantiene la tensión ética sin interpretarla más allá del texto.
  doctrine_reference: Deuteronomio 30:19; marco sapiencial y de alianza implícito en la alusión mosaica
translation_notes:
  revision_awareness: La revisión inglesa ajustó únicamente la construcción «of which Moses spoke» a «that Moses spoke of» por naturalidad, sin alterar el contenido. La versión española adopta directamente una solución idiomática equivalente («del que habló Moisés»), por lo que no requiere nota adicional.
  spanish_consistency_notes:
  - Se mantuvo «Moisés» como nombre propio estándar.
  - Se prefirió «camino» por su amplitud semántica y adecuación al registro bíblico.
  - No se introdujo «SEÑOR» ni otras normalizaciones teológicas porque el versículo no contiene el nombre divino.
  - La puntuación con comillas angulares mantiene un estilo bíblico legible en español.
