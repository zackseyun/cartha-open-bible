translation:
  language: es
  text: Por esta razón el Altísimo no hizo una sola edad, sino dos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Propter hoc
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por esto
  - Por tal motivo
  lexicon: Latin propter + hoc
  rationale: Expresa con naturalidad en español la relación causal que el texto latino introduce; mantiene el valor explicativo del inglés POB sin añadir matices ajenos.
- source_word: Altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Muy Alto
  - Dios Altísimo
  lexicon: Latin Altissimus
  rationale: Conserva el título reverencial tradicional y fiel al superlativo latino; 'el Altísimo' es el equivalente más natural y transparente en español bíblico.
- source_word: non fecit ... unam aetatem, sed duas
  english_pob_choice: did not make one age, but two
  chosen_spanish: no hizo una sola edad, sino dos
  alternatives_spanish:
  - no hizo una edad, sino dos
  - no creó una sola era, sino dos
  lexicon: Latin facere + aetatem
  rationale: '''Hizo'' refleja bien el verbo latino fecit, y ''edad'' mantiene la idea de período/era temporal que el inglés POB resolvió con ''age''; se preserva la oposición numérica ''una ... sino dos''.'
theological_decisions:
- issue: La división de la historia en dos 'edades'
  english_pob_reading: the Most High did not make one age, but two
  chosen_spanish_reading: el Altísimo no hizo una sola edad, sino dos
  alternative_spanish_readings:
  - el Altísimo no hizo una sola era, sino dos
  - el Altísimo no estableció una sola época, sino dos
  rationale: El texto expresa una partición temporal total atribuida al Altísimo; 'edad' conserva la tensión apocalíptica del término sin concretarla más de lo que permite el latín. Se evita 'época' por sonar más moderno y menos técnico en este contexto.
  doctrine_reference: Eschatology / apocalyptic periodization
translation_notes:
  revision_awareness: 'El cierre latino del verso en el testimonio suministrado está abreviado o incompleto, pero la traducción inglesa auditada fija el sentido resultante: la razón por la cual el Altísimo no hizo una sola edad, sino dos. No se introducen elementos no atestiguados por el paquete de fuente y auditoría.'
  spanish_consistency_notes:
  - Se mantiene 'Altísimo' como traducción reverencial de Altissimus, consistente con el registro bíblico.
  - Se usa 'edad' en sentido de período histórico/escatológico, no como edad biológica.
  - La estructura causal 'Por esta razón' corresponde al latín 'Propter hoc' y al sentido resumido por la traducción inglesa auditada.
