translation:
  language: es
  text: Porque, mientras vivíamos y cometíamos iniquidad, no considerábamos lo que comenzaríamos a padecer[a] después de la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «empezaríamos a sufrir».
    reason: alternative_rendering
lexical_decisions:
- source_word: Non enim cogitavimus
  english_pob_choice: For while we lived ... we did not consider
  chosen_spanish: Porque, mientras vivíamos ... no considerábamos
  alternatives_spanish:
  - Pues, mientras vivíamos ... no pensábamos
  - Porque, al vivir ... no reflexionábamos
  lexicon: cogitare
  rationale: cogitavimus expresa aquí un acto mental de consideración o reflexión; «considerábamos» mantiene el paralelismo con el inglés auditado sin endurecerlo en exceso.
- source_word: viventes
  english_pob_choice: we lived
  chosen_spanish: vivíamos
  alternatives_spanish:
  - vivimos
  - estábamos vivos
  lexicon: vivere
  rationale: El participio latino señala la condición de estar viviendo; «vivíamos» suena natural en español y conserva el valor temporal del marco narrativo.
- source_word: iniquitatem faciebamus
  english_pob_choice: committed iniquity
  chosen_spanish: cometíamos iniquidad
  alternatives_spanish:
  - hacíamos iniquidad
  - practicábamos la iniquidad
  lexicon: iniquitas / facere
  rationale: «Cometer iniquidad» transmite mejor la fuerza moral y jurídica de iniquitas que una paráfrasis más débil.
- source_word: quidincipientes / incipientes
  english_pob_choice: would begin to suffer
  chosen_spanish: comenzaríamos a padecer
  alternatives_spanish:
  - empezaríamos a sufrir
  - íbamos a padecer
  lexicon: incipere
  rationale: La revisión inglesa destaca el valor incoativo/inceptivo de incipere; «comenzaríamos a padecer» preserva ese inicio del padecimiento sin convertirlo en obligación.
- source_word: post mortem pati
  english_pob_choice: after death
  chosen_spanish: después de la muerte
  alternatives_spanish:
  - tras la muerte
  - después de morir
  lexicon: post mortem
  rationale: La preposición y el sustantivo conservan la referencia temporal directa al estado posterior a la muerte, con estilo claro y reverente.
theological_decisions:
- issue: Valor inceptivo del sufrimiento post mortem
  english_pob_reading: would begin to suffer after death
  chosen_spanish_reading: comenzaríamos a padecer después de la muerte
  alternative_spanish_readings:
  - tendríamos que padecer después de la muerte
  - empezaríamos a sufrir después de la muerte
  rationale: Se conserva la idea de inicio del padecimiento, importante en la lógica escatológica del pasaje, y se evita traducirlo como obligación modal.
  doctrine_reference: escatología / estado posterior a la muerte
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió la antigua lectura modal «would have to suffer» a la inceptiva «would begin to suffer» por fidelidad al latín transmitido (incipientes / incipiemus). La versión española refleja esa corrección con «comenzaríamos a padecer», manteniendo el matiz de inicio.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología estándar del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - Se usa «iniquidad» como término moral/jurídico formal, coherente con el registro bíblico del pasaje.
  - «Padecer» se prefirió a «sufrir» para conservar tono bíblico sobrio y evitar redundancia con «cometíamos iniquidad».
