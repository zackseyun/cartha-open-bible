revisions:
- from: Porque, mientras vivíamos y cometíamos iniquidad, no considerábamos qué[a] comenzaríamos a padecer después de la muerte.
  to: Porque, mientras vivíamos y cometíamos iniquidad, no considerábamos lo que comenzaríamos a padecer[a] después de la muerte.
  rationale: Se reemplaza «qué» por «lo que» para producir una construcción española natural y fiel al sentido del original latino y del inglés auditado. Se conserva «comenzaríamos a padecer» para mantener el valor incoativo de incipere; la nota alternativa sigue siendo válida como variante estilística cercana.
  reviewer_model: gpt-5.4
