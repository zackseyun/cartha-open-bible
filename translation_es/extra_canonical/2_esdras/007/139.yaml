base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/139.yaml
  text: And if the Judge did not forgive those who were created by his word and blot out the multitude of acts of contempt[b][a], perhaps only a very few would be left from an innumerable multitude.
  footnotes:
  - marker: a
    text: Or 'because if he did not forgive'.
    reason: previous_rendering
  - marker: b
    text: Or 'multitude of offenses'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:29Z'
    unchanged: false
    changes_summary: Removed the unnecessary initial 'he is a judge' and rendered iudex as 'the Judge' in the conditional clause; added 'were' for natural English; changed 'left out of' to 'left from' to reflect the sense that only a few remain out of an innumerable multitude.
translation:
  language: es
  text: Y si el Juez no perdonara a los que fueron creados por su palabra y borrara la multitud de actos de desprecio[a], quizá sólo quedarían unos muy pocos de entre una multitud innumerable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «multitud de ofensas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: iudex
  english_pob_choice: the Judge
  chosen_spanish: el Juez
  alternatives_spanish:
  - el juez
  - el árbitro
  lexicon: iudex
  rationale: El latín presenta iudex con valor titular y escatológico; «el Juez» conserva la función definida y el peso solemne del pasaje. Se evita «árbitro», que suavizaría indebidamente el perfil judicial.
- source_word: ignoverit
  english_pob_choice: forgive
  chosen_spanish: perdonara
  alternatives_spanish:
  - hubiera perdonado
  - absolviera
  lexicon: ignosco
  rationale: El contexto pide una acción de remisión del juicio; «perdonara» es natural en español y conserva la relación con el perdón divino sin cargar el texto con una terminología jurídica excesiva.
- source_word: his qui creati sunt verbo eius
  english_pob_choice: those who were created by his word
  chosen_spanish: a los que fueron creados por su palabra
  alternatives_spanish:
  - a los que él creó por su palabra
  - a quienes fueron hechos por su palabra
  lexicon: creo + verbum
  rationale: La construcción pasiva del latín queda bien reflejada con «fueron creados». «Por su palabra» mantiene la mediación instrumental de verbo eius sin introducir una paráfrasis teológica ajena.
- source_word: contemptionum
  english_pob_choice: acts of contempt
  chosen_spanish: actos de desprecio
  alternatives_spanish:
  - actos de contempto
  - multitud de desprecios
  - actos de escarnio
  lexicon: contemptio
  rationale: El término latino apunta a desprecio, desdén o rechazo deliberado. «Actos de desprecio» conserva la fuerza moral del sustantivo y evita el rebajamiento genérico de «ofensas».
- source_word: derelinquentur ... pauci valde
  english_pob_choice: perhaps only a very few would be left from an innumerable multitude
  chosen_spanish: quizá sólo quedaría un muy pequeño número de una multitud innumerable
  alternatives_spanish:
  - quizá sólo quedarían unos pocos de una multitud innumerable
  - tal vez apenas restaría un número muy pequeño de una multitud innumerable
  lexicon: relinquo
  rationale: El latín comunica remanencia o supervivencia de un resto. «Quedaría» y «un muy pequeño número» reproducen ese sentido sin forzar una expresión poco natural en español.
theological_decisions:
- issue: Condicionalidad sin causal explícita
  english_pob_reading: And if the Judge did not forgive...
  chosen_spanish_reading: Y si el Juez no perdonara...
  alternative_spanish_readings:
  - Y porque si el Juez no perdonara...
  - Y si el Juez no hubiera perdonado...
  rationale: El latín no añade una conjunción causal equivalente a «because». Por eso se conserva la subordinación condicional directa, tal como indica la revisión inglesa.
  doctrine_reference: sintaxis del latín; fidelidad al argumento hipotético del pasaje
- issue: Alcance de contemptionum
  english_pob_reading: the multitude of acts of contempt
  chosen_spanish_reading: la multitud de actos de desprecio
  alternative_spanish_readings:
  - la multitud de ofensas
  - la multitud de desprecios
  rationale: La revisión inglesa señaló que el latín especifica contempt of scorn/defiance, no un pecado genérico. Se mantiene esa tensión semántica con «desprecio», que preserva el matiz de rechazo voluntario a Dios.
  doctrine_reference: uso contextual de contemptio en 4 Esdras 7
- issue: Resto mínimo frente a multitud innumerable
  english_pob_reading: perhaps only a very few would be left from an innumerable multitude
  chosen_spanish_reading: quizá sólo quedaría un muy pequeño número de una multitud innumerable
  alternative_spanish_readings:
  - quizá sólo quedarían unos pocos de una multitud innumerable
  - quizá apenas sobreviviría un pequeño número de una multitud innumerable
  rationale: El final del verso contrasta la multitud innumerable con el resto mínimo. La versión española conserva ese contraste sin añadir una idea de ‘expulsión’ que no está en el latín.
  doctrine_reference: teología del remanente en 4 Esdras
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión inglesa en dos puntos clave: elimina cualquier causal implícita al inicio y mantiene el valor específico de contemptionum como desprecio/contempto, no como ofensas genéricas. Además, evita introducir interpretaciones no presentes en el latín.'
  spanish_consistency_notes:
  - Se usa «Yahvé» sólo cuando el texto fuente lo exige; aquí no aparece el Tetragrámaton.
  - Se conserva «Juez» como título definido por el contexto.
  - Se mantiene «perdonara» para la hipótesis irrealis del pasaje.
  - Se evita «Cristo» u otra terminología no presente en el versículo.
  - La puntuación refleja la relación condicional sin suavizarla con causalidad explícita.
