source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: beati praesentes et obseruantes quae a te constituta sunt; Sed et [de] quibus erat oratio mea, quis enim est de praesentibus, qui non peccauit, uel quis natus,
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/046.yaml
  text: Blessed are those who are present and keep what has been established by you. But as for those about whom my prayer was made, who indeed is there among those now present who has not sinned, or what one born has not transgressed your covenant?
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:07Z'
    unchanged: false
    changes_summary: Restored the opening clause present in the Latin ('Blessed are those who are present and keep what has been established by you'), which was omitted in the draft. Kept the second clause but adjusted wording for closer alignment with the source and more formal register.
translation:
  language: es
  text: Bienaventurados los que están presentes y guardan lo que ha sido establecido por ti. Pero en cuanto a aquellos por quienes fue hecha mi súplica, ¿quién hay, en verdad, entre los presentes que no haya pecado, o qué persona nacida no ha transgredido tu pacto?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: beati
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Benditos
  - Dichosos
  lexicon: lexical semantic field of beatitude/blessing
  rationale: ‘Bienaventurados’ comunica con naturalidad una declaración de felicidad/bendición solemne en registro bíblico, sin reducirla a una simple felicitación o a una bendición pasiva.
- source_word: praesentes
  english_pob_choice: those who are present
  chosen_spanish: los que están presentes
  alternatives_spanish:
  - los presentes
  - los que se hallan presentes
  lexicon: Latin praesent- participial adjective
  rationale: Se conserva el sentido locativo y participial de ‘praesentes’ con una forma natural en español; ‘los presentes’ sería más breve, pero puede perder algo de la acción de estar allí.
- source_word: obseruantes quae a te constituta sunt
  english_pob_choice: keep what has been established by you
  chosen_spanish: guardan lo que ha sido establecido por ti
  alternatives_spanish:
  - observan lo que has establecido
  - cumplen lo que has establecido por ti
  lexicon: obseruare / constituere
  rationale: ‘Guardan’ transmite obediencia fiel sin convertir el verbo en mera observancia ceremonial; ‘ha sido establecido por ti’ mantiene el pasivo con referencia directa a Dios.
- source_word: oratio mea
  english_pob_choice: my prayer was made
  chosen_spanish: fue hecha mi oración
  alternatives_spanish:
  - mi oración fue ofrecida
  - presenté mi oración
  lexicon: oratio
  rationale: Se conserva la construcción pasiva del latín y su tono formal; en español suena algo más literal, pero refleja bien el foco en la oración ya pronunciada/ofrecida.
- source_word: quis enim est de praesentibus, qui non peccauit
  english_pob_choice: who indeed is there among those now present who has not sinned
  chosen_spanish: ¿quién hay, en verdad, entre los presentes que no haya pecado?
  alternatives_spanish:
  - ¿quién entre los presentes no ha pecado?
  - ¿quién hay entre los presentes que no haya pecado?
  lexicon: quis ... qui non peccauit
  rationale: La interrogación retórica se conserva con ‘¿quién hay…?’, y el subjuntivo perfecto ‘no haya pecado’ refleja la negación de una acción pasada con vigencia hasta el presente.
- source_word: uel quis natus
  english_pob_choice: or what one born
  chosen_spanish: o qué nacido
  alternatives_spanish:
  - o qué hombre nacido
  - o qué persona nacida
  lexicon: natus
  rationale: ‘Qué nacido’ mantiene la austeridad y la sintaxis fragmentaria del latín. Aunque es poco usual, refleja el paralelismo con ‘who is there’ y evita introducir un término más interpretativo como ‘hombre’.
- source_word: transgressed your covenant
  english_pob_choice: has transgressed your covenant
  chosen_spanish: ha transgredido tu pacto
  alternatives_spanish:
  - ha quebrantado tu pacto
  - ha violado tu pacto
  lexicon: transgredi / pactum
  rationale: ‘Transgredido’ mantiene la raíz formal del latín y la conexión con el lenguaje bíblico de traspasar un límite; ‘pacto’ corresponde a pactum en su carga relacional y covenantal.
theological_decisions:
- issue: Universal sinfulness of those born into human life
  english_pob_reading: what one born has not transgressed your covenant
  chosen_spanish_reading: qué nacido no ha transgredido tu pacto
  alternative_spanish_readings:
  - qué hombre nacido no ha transgredido tu pacto
  - qué persona nacida no ha transgredido tu pacto
  rationale: El latín pregunta retóricamente por cualquier nacido, reforzando la universalidad del pecado. Se mantiene la aspereza del sintagma para no suavizar la afirmación antropológica del texto.
  doctrine_reference: Universal human sinfulness; covenant transgression in wisdom/apocalyptic lament
- issue: Presence versus obedience
  english_pob_reading: those who are present and keep what has been established by you
  chosen_spanish_reading: los que están presentes y guardan lo que ha sido establecido por ti
  alternative_spanish_readings:
  - los presentes y los que guardan lo que has establecido
  - los que están presentes y observan lo establecido por ti
  rationale: La primera cláusula presenta una bienaventuranza ligada no solo a la presencia, sino también a la obediencia. Se preservan ambas ideas sin fusionarlas.
  doctrine_reference: Blessing associated with faithful obedience
translation_notes:
  revision_awareness: The English POB revision restored the opening blessing clause from the Latin and retained the second interrogative clause with a more formal register. The Spanish draft follows that restored structure closely and keeps the two-clause balance intact without omitting the initial beatitude.
  spanish_consistency_notes:
  - Se usa ‘Bienaventurados’ como término bíblico estable para beatitud.
  - Se mantiene ‘pacto’ para pactum, evitando ‘alianza’ por falta de respaldo en el audit trail.
  - Se conserva el tono interrogativo retórico con ‘¿quién hay…?’.
  - No se introducen notas al pie porque el texto no requiere alternativas ancladas adicionales.
