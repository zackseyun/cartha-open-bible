translation:
  language: es
  text: Pero solo quedará el juicio, y la verdad permanecerá, y la fe se fortalecerá.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: iudicium
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - juicio divino
  lexicon: iudicium
  rationale: El latín iudicium corresponde de manera natural a «juicio». Mantiene la amplitud de la POB en inglés y evita estrecharlo solo a «sentencia».
- source_word: remanebit
  english_pob_choice: will remain
  chosen_spanish: quedará
  alternatives_spanish:
  - permanecerá
  - seguirá existiendo
  lexicon: remanere
  rationale: «Quedará» transmite bien la idea de lo que subsiste o permanece como único remanente en español natural, sin añadir matices no presentes en el latín.
- source_word: veritas
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la verdad verdadera
  - la rectitud
  lexicon: veritas
  rationale: Se conserva «la verdad» como equivalencia directa y transparente del latín veritas.
- source_word: stabit
  english_pob_choice: will stand
  chosen_spanish: permanecerá
  alternatives_spanish:
  - se mantendrá
  - se alzará
  lexicon: stare
  rationale: En español, «permanecerá» comunica mejor la estabilidad duradera que el giro más literal «estará en pie», sin perder la imagen de firmeza de stabit.
- source_word: fides
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fidelidad
  - la confianza
  lexicon: fides
  rationale: Aunque fides puede abarcar fe, fidelidad o lealtad, el paralelo con la traducción inglesa de la POB y el uso bíblico aquí favorecen «la fe»; se conserva la posible amplitud semántica en la nota de decisión léxica.
- source_word: convalescet
  english_pob_choice: will grow strong
  chosen_spanish: se fortalecerá
  alternatives_spanish:
  - cobrará fuerza
  - se robustecerá
  lexicon: convalescere
  rationale: «Se fortalecerá» refleja con claridad el valor de crecer en vigor o fuerza de convalescet, con un registro bíblico moderno y comprensible.
theological_decisions:
- issue: Sentido de fides en el cierre del versículo
  english_pob_reading: faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - la fidelidad
  - la confianza
  rationale: El latín fides puede tener una zona semántica más amplia que la sola creencia interior; sin embargo, la lectura más directa y la que sigue el audit trail inglés de la POB es «la fe». No se fuerza una reinterpretación moralizante como «fidelidad» porque el texto no la exige de forma explícita.
  doctrine_reference: Semántica bíblica de fides en contexto escatológico
- issue: Relación entre juicio, verdad y fe en la clausura del pasaje
  english_pob_reading: But judgment alone will remain, and truth will stand, and faith will grow strong.
  chosen_spanish_reading: Pero solo quedará el juicio, y la verdad permanecerá, y la fe se fortalecerá.
  alternative_spanish_readings:
  - Pero quedará solamente el juicio, y la verdad se mantendrá, y la fe cobrará fuerza.
  rationale: Se preserva la secuencia y la gravedad escatológica del latín sin expandir el contenido con explicaciones. «Solo» corresponde a solum y mantiene el énfasis restrictivo del original.
  doctrine_reference: Escatología judicial y perseverancia de la verdad
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado revisado final: la fuente latina limpia y la traducción inglesa auditada permanecen sin cambios, y no hay notas ni revisiones pendientes que requieran matizar el español. Se mantiene una equivalencia óptima cercana al latín, apoyada por el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y directo.
  - No se introduce «SEÑOR» ni otra sustitución teológica no presente en el texto fuente.
  - El verbo inicial «quedará» conserva el valor de remanencia de remanebit sin sonar artificial en español.
  - La coordinación final con comas reproduce la cadencia del latín y de la versión inglesa auditada.
