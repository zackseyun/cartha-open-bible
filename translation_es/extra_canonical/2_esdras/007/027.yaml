    changes_summary: Improved natural English by removing the awkward resumptive 'he' and rendering the future more smoothly as 'will see.' Kept 'evils foretold' for fidelity to praedictis malis.
translation:
  language: es
  text: Y todo el que haya sido librado de los males anunciados, él verá mis maravillas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: omnis qui liberatus est
  english_pob_choice: everyone who is delivered
  chosen_spanish: todo el que sea librado
  alternatives_spanish:
  - todo el que es librado
  - todo el que haya sido librado
  lexicon: omnis / liberatus est
  rationale: «Todo el que» conserva el valor distributivo de omnis qui; «sea librado» mantiene el matiz pasivo de liberatus est sin añadir una formulación demasiado técnica. El futuro perfecto español habría pesado más de lo necesario en un dicho profético.
- source_word: praedictis malis
  english_pob_choice: the evils foretold
  chosen_spanish: los males anunciados
  alternatives_spanish:
  - los males predichos
  - los males profetizados
  lexicon: praedictis / malis
  rationale: «Anunciados» expresa bien el sentido de algo dicho de antemano y suena natural en español. «Predichos» sería más literal, pero en español puede sonar más marcado; «profetizados» añadiría un matiz que el latín no exige.
- source_word: ipse
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - mismo
  - él mismo
  lexicon: ipse
  rationale: Se conserva el pronombre resumptivo enfático del latín con «él», evitando borrar la sintaxis semítica/grecolatina señalada en el expediente de revisión. «Él mismo» sería más enfático, pero aquí puede sonar excesivo en español.
- source_word: mirabilia mea
  english_pob_choice: my wonders
  chosen_spanish: mis maravillas
  alternatives_spanish:
  - mis prodigios
  - mis obras maravillosas
  lexicon: mirabilia
  rationale: «Maravillas» reproduce con fidelidad la idea de actos portentosos sin interpretar el término. «Prodigios» es posible, pero «maravillas» es la equivalencia más directa y transparente para esta frase.
theological_decisions:
- issue: Reproducción del énfasis resumptivo de ipse
  english_pob_reading: will see my wonders
  chosen_spanish_reading: él verá mis maravillas
  alternative_spanish_readings:
  - verá mis maravillas
  - él mismo verá mis maravillas
  rationale: 'El latín incluye ipse, que no es meramente redundante: refuerza al sujeto complejo («todo el que...») y conserva el giro semítico/translationese. Por eso se mantiene «él» en español, aunque sin sobrecargarlo con «él mismo».'
  doctrine_reference: No doctrinal; decisión sintáctica y retórica basada en el texto fuente y la revisión del pasaje.
translation_notes:
  revision_awareness: La revisión más reciente ajustó el inglés para quitar un resumptivo artificial y volvió a una lectura más natural, pero el expediente posterior de adjudicación destacó que el latín ipse sí funciona como pronombre resumptivo enfático. Por eso el español conserva ese matiz con «él» dentro de la misma cláusula, sin añadir nota al pie porque la opción no introduce una ambigüedad textual adicional en español.
  spanish_consistency_notes:
  - 'Se evita «SEÑOR» o equivalentes no presentes: el versículo no contiene el nombre divino.'
  - Se mantiene un registro sobrio y bíblico sin caer en arcaísmos fuertes.
  - «Males anunciados» se usa como solución natural para praedictis malis, preservando el sentido de males predichos sin exagerar el matiz profético.
