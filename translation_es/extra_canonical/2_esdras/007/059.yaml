translation:
  language: es
  text: 'Y él me respondió y dijo[a]: «Los pesos de lo que has pensado están en ti, porque el que tiene…»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El latín transmitido aquí es difícil y probablemente corrupto. La traducción sigue el sentido general de la frase conservada sin forzar el pasaje dañado.
