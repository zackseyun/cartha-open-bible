lexical_decisions:
- source_word: In te ... pondera
  english_pob_choice: The weights of what you have thought are in you
  chosen_spanish: Los pesos de lo que has pensado están en ti
  alternatives_spanish:
  - El peso de lo que has pensado está en ti
  - Las ponderaciones de lo que has pensado están en ti
  lexicon: pondera / pondus
  rationale: El latín conservado es fragmentario y difícil; «pesos» mantiene la imagen física de peso/ponderación sin suavizarla demasiado. «Lo que has pensado» refleja cogitasti con naturalidad en español y conserva el objeto interno de la reflexión.
- source_word: Et respondit ad me et dixit
  english_pob_choice: And he answered me and said
  chosen_spanish: Y él me respondió y dijo
  alternatives_spanish:
  - Y me respondió y dijo
  - Y él respondió y dijo
  lexicon: respondere / dicere
  rationale: Es una fórmula narrativa directa y sobria; se conserva el sujeto explícito «él» para claridad en español, aunque podría omitirse estilísticamente.
theological_decisions:
- issue: Texto truncado tras quia/quoniam
  english_pob_reading: because the one who has…
  chosen_spanish_reading: porque el que tiene…
  alternative_spanish_readings:
  - porque quien tiene…
  - porque el que posee…
  rationale: El texto fuente se corta después de qui habet; no se completa la cláusula en español para no inventar contenido. Los puntos suspensivos señalan fielmente la interrupción del testimonio textual.
  doctrine_reference: No aplica; decisión textual y de cautela filológica.
translation_notes:
  revision_awareness: La versión previa introducía una paráfrasis no respaldada por el latín («weigh within yourself...») y completaba indebidamente la cláusula final. Esta redacción vuelve al contenido explícito del texto fuente y deja visible la ruptura del manuscrito con puntos suspensivos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí no aparece el nombre divino.
  - Se evita «Mesías/Cristo» porque el versículo no contiene esa terminología.
  - Se conserva el registro sobrio y bíblico sin arcaísmos innecesarios.
