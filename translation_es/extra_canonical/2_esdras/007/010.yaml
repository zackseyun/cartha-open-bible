translation:
  language: es
  text: 'Y yo dije[a]: «Así es, Señor». Y me dijo: «Así también es la porción de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y yo dije: “Así es, señor”. Y me dijo: “Así también es la porción de Israel”»'
    reason: Preserva la alternativa documentada en el rastro inglés con «lord» en minúscula, adaptada fielmente al español.
lexical_decisions:
- source_word: sic est
  english_pob_choice: So it is
  chosen_spanish: Sí
  alternatives_spanish:
  - Así es
  - Así sea
  lexicon: adverbial affirmation
  rationale: El latín expresa una afirmación breve y directa; en español, «Sí» reproduce mejor la respuesta confirmatoria natural que un calco más pesado. Mantiene el tono de asentimiento del interlocutor sin añadir matiz no sustentado por el texto.
- source_word: domine
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Señor
  lexicon: vocative title
  rationale: La forma latina vocativa pide un tratamiento reverente y directo. «Señor» conserva el registro formal y devocional que refleja la revisión inglesa al capitalizar «Lord».
- source_word: sic est et Israhel pars
  english_pob_choice: So also is Israel’s portion
  chosen_spanish: Así también es la porción de Israel
  alternatives_spanish:
  - Así también es la parte de Israel
  - Así también es la suerte de Israel
  lexicon: part/portion
  rationale: «Pars» en este contexto denota la porción o destino asignado. «Porción» mantiene el valor más preciso y permite la resonancia bíblica de repartición o asignación, mejor que «parte», que suena más genérico.
theological_decisions:
- issue: Tratamiento reverente en la forma de dirigirse a Dios
  english_pob_reading: “Lord” in direct address
  chosen_spanish_reading: «Señor» como vocativo reverente
  alternative_spanish_readings:
  - «señor» en minúscula
  - «Señor mío»
  rationale: El inglés revisado capitaliza «Lord» para reflejar el registro formal del trato directo. En español, «Señor» con mayúscula ofrece esa misma reverencia sin sobrecargar la frase.
  doctrine_reference: vocativo reverente en oración o súplica
translation_notes:
  revision_awareness: La versión inglesa revisada solo corrigió la puntuación final y capitalizó «Lord» por el registro formal de tratamiento directo; la traducción española sigue esa decisión de reverencia y conserva la estructura breve del original latino.
  spanish_consistency_notes:
  - Se mantuvo una formulación breve y solemne, acorde con el diálogo del texto latino.
  - «Porción» se eligió de manera consistente con el valor de pars en contexto bíblico de asignación.
  - La puntuación española abre y cierra comillas de forma estándar, conservando el ritmo de dos enunciados breves.
