  glossary_alignment: No hay conflictos con la terminología principal del proyecto. Las decisiones léxicas de «orden», «reposo», «ángeles» y el futuro verbal están bien encaminadas. La principal corrección es afinar promptuariis a «depósitos» y suavizar la construcción de manentem gloriam para español natural sin perder la permanencia.
