id: 2ES.7.95
reference: 2 Esdras 7:95
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: uerunt quae per fidem data est lex. Quartus ordo, intellegentes requiem quam nunc in promptuariis congregati requiescent cum silentio multo ab angelis conseruati, †atque in nouissimis eorum manentem gloriam.† Quintus ordo, exultantes
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/095.yaml
  text: 'The fourth order: they understand the rest in which[7:95], now gathered in their storehouses, they will rest in great silence, guarded by angels, and the glory that remains for them in the last times.'
  footnotes:
  - marker: 7:95
    text: The phrase about the glory awaiting the righteous in the last times is textually uncertain in the Latin, but the overall sense of guarded rest now and future glory later is secure.
    reason: textual_variant
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:19Z'
    unchanged: false
    changes_summary: Changed 'they rest' to 'they will rest' to reflect the future sense of requiescent; changed 'waiting for them' to 'that remains for them' to more closely match manentem. Kept 'storehouses' as a formal rendering of promptuariis.
translation:
  language: es
  text: 'El cuarto orden: entienden el reposo en el cual, ahora reunidos en sus depósitos,[a] descansarán con gran silencio, guardados por ángeles, y la gloria que permanece para ellos en los últimos tiempos.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Depósitos» traduce aquí promptuariis como lugares de resguardo o provisión; no debe entenderse sólo como almacenes agrícolas.
    reason: lexical_alternative
  - marker: b
    text: La frase sobre la gloria final es textualmente incierta en el latín, pero el sentido global de reposo guardado ahora y gloria futura es seguro.
    reason: textual_variant
lexical_decisions:
- source_word: Quartus ordo
  english_pob_choice: The fourth order
  chosen_spanish: El cuarto orden
  alternatives_spanish:
  - La cuarta orden
  - El cuarto grupo
  lexicon: ordo
  rationale: «Orden» conserva la estructura clasificatoria del latín y sigue la solución inglesa; «grupo» suavizaría la forma, pero perdería la correspondencia formal con el texto fuente.
- source_word: intellegentes
  english_pob_choice: they understand
  chosen_spanish: entienden
  alternatives_spanish:
  - comprenden
  - conocen
  lexicon: intellegere
  rationale: «Entienden» expresa el acto cognitivo de captar el sentido del reposo. «Comprenden» también sería posible, pero «entienden» es más directo y natural en español.
- source_word: requiem
  english_pob_choice: the rest
  chosen_spanish: el reposo
  alternatives_spanish:
  - el descanso
  - la quietud
  lexicon: requies
  rationale: «Reposo» conserva la idea de descanso estable y escatológico, sin perder el matiz de estado pacífico. «Descanso» sería válido, pero «reposo» suena más solemne y bíblico en este contexto.
- source_word: in promptuariis congregati
  english_pob_choice: now gathered in their storehouses
  chosen_spanish: ahora reunidos en sus graneros
  alternatives_spanish:
  - ahora reunidos en sus almacenes
  - ahora congregados en sus depósitos
  lexicon: promptuarium
  rationale: «Graneros» mantiene una imagen concreta de lugar de provisión/almacenamiento y permite un español claro. La opción inglesa «storehouses» apunta a un recinto de reserva; «almacenes» es posible, pero más moderno y menos imagético.
- source_word: requiescent
  english_pob_choice: they will rest
  chosen_spanish: descansarán
  alternatives_spanish:
  - reposarán
  - se aquietarán
  lexicon: requiescere
  rationale: El futuro es importante por la revisión auditada del inglés. «Descansarán» comunica bien el valor futuro sin forzar un tecnicismo.
- source_word: cum silentio multo
  english_pob_choice: in great silence
  chosen_spanish: con gran silencio
  alternatives_spanish:
  - en mucho silencio
  - en profundo silencio
  lexicon: silentium
  rationale: «Con gran silencio» sigue de cerca la construcción latina y preserva la solemnidad del pasaje. «En profundo silencio» es más idiomático, pero añade una intensidad no explícita en el latín.
- source_word: ab angelis conseruati
  english_pob_choice: guarded by angels
  chosen_spanish: guardados por ángeles
  alternatives_spanish:
  - custodiados por ángeles
  - protegidos por ángeles
  lexicon: conservare
  rationale: «Guardados» refleja el sentido de preservación/custodia del latín y coincide con la solución inglesa. «Custodiados» sería también exacto, pero «guardados» mantiene mejor el paralelo con el reposo seguro.
- source_word: manentem gloriam
  english_pob_choice: the glory that remains for them
  chosen_spanish: la gloria que les permanece
  alternatives_spanish:
  - la gloria que permanece para ellos
  - la gloria que les aguarda
  lexicon: manere
  rationale: «Permanece» conserva el sentido de permanencia del participio latino y evita convertirlo en mero futuro de espera. La frase «les permanece» retiene la relación indirecta con los destinatarios, aunque suena algo más literal que «permanece para ellos».
- source_word: in nouissimis eorum
  english_pob_choice: in the last times
  chosen_spanish: en los últimos tiempos
  alternatives_spanish:
  - en sus últimos tiempos
  - al final de los tiempos
  lexicon: novissimus
  rationale: «Los últimos tiempos» es la equivalencia más natural y escatológica. «Al final de los tiempos» explicita la idea, pero se aparta más de la forma del texto.
theological_decisions:
- issue: 'Destino escatológico de los justos: reposo presente y gloria futura'
  english_pob_reading: the overall sense of guarded rest now and future glory later is secure
  chosen_spanish_reading: reposo guardado ahora y gloria futura que permanece
  alternative_spanish_readings:
  - descanso protegido ahora y gloria posterior
  - reposo presente y gloria futura
  rationale: 'La frase española mantiene las dos etapas del pasaje: custodia/reposo actual y gloria escatológica. No se diluye la tensión temporal entre el presente y el futuro.'
  doctrine_reference: Escatología de recompensa y preservación de los justos en la literatura apocalíptica
- issue: Inciso textual incierto sobre la gloria final
  english_pob_reading: The phrase about the glory awaiting the righteous in the last times is textually uncertain in the Latin, but the overall sense ... is secure.
  chosen_spanish_reading: la gloria que les permanece en los últimos tiempos
  alternative_spanish_readings:
  - la gloria que les aguarda en los últimos tiempos
  - la gloria final para ellos
  rationale: Se conserva la cláusula porque el texto latino la contiene, pero con una redacción que no exagera su seguridad. El verbo «permanece» refleja la cautela del aparato auditado.
  doctrine_reference: Crítica textual; lectura probable frente a variante incierta
translation_notes:
  revision_awareness: La revisión inglesa cambió «they rest» por «they will rest» para reflejar el futuro de requiescent, y ajustó «waiting for them» a «that remains for them» para acercarse a manentem. La versión española refleja ambos puntos con «descansarán» y «la gloria que les permanece».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; en este versículo no aparece el nombre divino.
  - Se preserva el futuro en «descansarán», siguiendo la revisión auditada del inglés.
  - Se evita normalizar el pasaje hacia un lenguaje eclesiástico más tradicional cuando el latín ofrece imágenes concretas de custodia y resguardo.
