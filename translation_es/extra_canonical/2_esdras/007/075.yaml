  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Señor» para domine y «siervo» para servus son adecuados en contexto. La familia léxica de conservare puede representarse mejor con «preservar» en español eclesial general, manteniendo el paralelismo verbal. No se requieren decisiones sobre Yahvé/Mesías u otros términos de la guía.
