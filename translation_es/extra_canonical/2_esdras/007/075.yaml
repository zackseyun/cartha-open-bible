translation:
  language: es
  text: Ante ti, Señor, muestra a tu siervo, Señor, si, después de la muerte, o ahora, cuando cada uno de nosotros entrega su alma, si, si somos preservados[a], seremos ciertamente preservados en reposo hasta
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «somos guardados».
    reason: alternative_rendering_of_initial_passive
lexical_decisions:
- source_word: coram te
  english_pob_choice: Before you
  chosen_spanish: Delante de ti
  alternatives_spanish:
  - Ante ti
  - En tu presencia
  lexicon: coram
  rationale: «Delante de ti» reproduce la relación espacial/relacional de presencia inmediata sin sonar arcaico en español, y mantiene el paralelismo con la súplica directa del latín.
- source_word: domine
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Soberano
  lexicon: domine
  rationale: Aquí el vocativo latino se traduce de forma natural como «Señor»; el contexto no exige una expansión adicional.
- source_word: seruo tuo
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: servus
  rationale: El latín puede ser «siervo» o «esclavo» según el registro; en esta súplica dirigida a Dios, «siervo» conserva la relación reverente y es idiomático en español culto, aunque el término latino pueda ser más fuerte.
- source_word: si post mortem uel nunc
  english_pob_choice: whether after death, or now
  chosen_spanish: si, después de la muerte, o ahora
  alternatives_spanish:
  - si, después de morir, o ahora
  - si, tras la muerte, o ahora
  lexicon: si + post mortem + vel nunc
  rationale: Se conserva la disyuntiva temporal del latín sin introducir interpretación adicional; «después de la muerte» mantiene el sustantivo abstracto del original.
- source_word: quando reddimus unusquisque animam suam
  english_pob_choice: when each of us gives up his soul
  chosen_spanish: cuando cada uno de nosotros entrega su alma
  alternatives_spanish:
  - cuando cada uno de nosotros devuelve su alma
  - cuando cada uno de nosotros rinde su alma
  lexicon: reddere animam
  rationale: «Entrega su alma» es la forma española más clara y digna para expresar la idea de ceder la vida/aliento al morir, sin sustituirla por una paráfrasis teológica ajena al latín.
- source_word: si conseruati conseruabimur
  english_pob_choice: if we are kept, we will be kept
  chosen_spanish: si somos conservados, seremos seguramente conservados
  alternatives_spanish:
  - si somos guardados, seremos seguramente guardados
  - si somos preservados, seremos seguramente preservados
  lexicon: conservare
  rationale: 'Se mantiene la familia léxica con un español transparente: «conservados» reproduce el verbo de preservación. El adverbio «seguramente» refleja la fuerza enfática del participio + futuro del latín, según la revisión aplicada.'
- source_word: in requie
  english_pob_choice: in rest
  chosen_spanish: en reposo
  alternatives_spanish:
  - en descanso
  - en quietud
  lexicon: requies
  rationale: «Reposo» conserva el sentido de descanso tranquilo y solemne de requies, con un tono más bíblico pero sin depender de una fórmula eclesiástica fija.
theological_decisions:
- issue: Repetición de «domine» en la oración
  english_pob_reading: Lord, ... Lord
  chosen_spanish_reading: Señor, ... Señor
  alternative_spanish_readings:
  - Señor, ... mi Señor
  - Señor, ... oh Señor
  rationale: Se conserva la repetición del vocativo como rasgo retórico del texto fuente; no se simplifica porque la duplicación forma parte de la súplica latina y del audit trail inglés.
  doctrine_reference: Vocativo reverencial y estilo de oración directiva
- issue: Valor enfático de conseruati conseruabimur
  english_pob_reading: will we surely be kept
  chosen_spanish_reading: seremos seguramente conservados
  alternative_spanish_readings:
  - seremos conservados ciertamente
  - seremos preservados con seguridad
  rationale: La revisión textual indica que el participio + futuro no es una simple pasiva presente, sino una afirmación enfática de futuro. «Seguramente» intenta preservar esa fuerza sin añadir contenido doctrinal nuevo.
  doctrine_reference: Lectura verbal y aspecto en latín tardío / construcción enfática
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión aplicada: se elimina cualquier material narrativo o conclusivo no presente en este segmento latino, se conserva la duplicación de «Señor», y se refleja el carácter futurista/enfático de «conseruabimur». También se respeta que el versículo queda truncado en «hasta», por lo que la frase española se deja igualmente incompleta.'
  spanish_consistency_notes:
  - Se mantuvo «Señor» para el vocativo divino, coherente con el español bíblico actual y con el latín domine.
  - Se prefirió «siervo» en vez de «esclavo» por tratarse de un vocativo de súplica a Dios y porque el POB inglés no fijó una opción léxica alternativa aquí.
  - «Reposo» se usa de manera consistente para requies, evitando alternar con «descanso» dentro del mismo segmento.
  - La nota de pie marca la ambigüedad residual de conservados/guardados sin alterar el texto principal.
