review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el latín y el audit trail inglés: conserva la estructura del ''séptimo orden'', la secuencia de gozo/confianza/ausencia de temor, y la corrección clave de que ''glorificados'' modifica a los justos y no a la recompensa. Sin embargo, la nota alternativa ''la séptima orden'' no está justificada para este contexto y el giro ''mencionados arriba'' suena menos natural que una formulación española más fluida sin pérdida de sentido.'
  spanish_quality_summary: El texto es en general claro y fiel, pero puede pulirse para una lectura más natural y digna en español eclesial amplio. 'Mencionados anteriormente' suena mejor que 'mencionados arriba', y conviene eliminar la nota alternativa sobre 'orden', que introduce una opción menos adecuada aquí.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Orden', 'rostro', 'glorificados' y 'recompensa' están bien elegidos. La excepción necesaria es retirar la nota que propone 'la séptima orden', porque debilita la consistencia léxica y la naturalidad en este uso.
  issues:
  - severity: medium
    issue: Nota al pie innecesaria y potencialmente engañosa en 'orden'
    rationale: El texto principal 'El séptimo orden' es correcto y natural para 'Septimus ordo'. La alternativa 'la séptima orden' no aporta una variante contextual preferible y puede confundir al lector, además de sonar menos adecuada en esta serie clasificatoria.
  - severity: low
    issue: '''mencionados arriba'' es poco idiomático en registro bíblico cuidado'
    rationale: Aunque comprensible, 'arriba' calca el inglés de forma algo rígida. 'Mencionados anteriormente' o 'ya mencionados' preserva el sentido de 'supradictis' con mejor fluidez en español.
  revised_spanish_text: 'El séptimo orden, que es mayor que todos los órdenes mencionados anteriormente: exultarán con confianza, confiarán sin ser avergonzados, y se alegrarán sin temor, porque se apresuran a ver el rostro de aquel a quien sirvieron mientras vivían, y de quien, glorificados, han de recibir su recompensa.'
  revision_rationale: Se mantiene la traducción sustancialmente fiel al latín y al audit trail, pero se elimina una nota alternativa injustificada y se mejora levemente la naturalidad de la referencia a los órdenes previos con 'mencionados anteriormente'. No se requieren cambios doctrinales ni de fondo.
