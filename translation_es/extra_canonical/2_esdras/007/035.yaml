base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/035.yaml
  text: And the deed will follow, and the reward will be shown, and acts of righteousness will keep watch, and acts of unrighteousness will not sleep.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:05Z'
    unchanged: false
    changes_summary: Revised 'righteous acts will awake' to 'acts of righteousness will keep watch' to reflect vigilabunt more accurately; adjusted parallel phrase to 'acts of unrighteousness' for consistency with iniustitiae.
translation:
  language: es
  text: Y la obra seguirá, y la recompensa será mostrada; y las obras de justicia velarán, y las obras de injusticia no dormirán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: opus
  english_pob_choice: the deed
  chosen_spanish: la obra
  alternatives_spanish:
  - el acto
  - la acción
  lexicon: opus
  rationale: En este contexto la imagen es una obra o hecho consumado que ‘sigue’ al final de la vida o al juicio; ‘la obra’ mantiene la concreción y el paralelo con ‘merces’ mejor que un término más abstracto.
- source_word: subsequetur
  english_pob_choice: will follow
  chosen_spanish: seguirá
  alternatives_spanish:
  - vendrá después
  - se sucederá
  lexicon: subsequor
  rationale: ‘Seguirá’ reproduce de manera natural la idea de posterioridad y acompañamiento implícita en el latín sin añadir matices innecesarios.
- source_word: merces
  english_pob_choice: the reward
  chosen_spanish: la recompensa
  alternatives_spanish:
  - el salario
  - la paga
  lexicon: merces
  rationale: ‘Recompensa’ conserva el valor retributivo general del término latino y es más neutral y legible en español bíblico que ‘salario’ o ‘paga’.
- source_word: ostendetur
  english_pob_choice: will be shown
  chosen_spanish: será mostrada
  alternatives_spanish:
  - será manifestada
  - será exhibida
  lexicon: ostendo
  rationale: La pasiva ‘será mostrada’ sigue de cerca el latín y mantiene la imagen de que la recompensa queda hecha visible o revelada.
- source_word: iustitiae vigilabunt
  english_pob_choice: acts of righteousness will keep watch
  chosen_spanish: las obras de justicia velarán
  alternatives_spanish:
  - los actos de justicia vigilarán
  - las obras justas velarán
  lexicon: iustitia
  rationale: ‘Obras de justicia’ mantiene el sustantivo abstracto del latín y el paralelo formal con ‘iniustitiae’; ‘velarán’ conserva la metáfora de vigilancia establecida por vigilabunt.
- source_word: iniustitiae non dormibunt
  english_pob_choice: acts of unrighteousness will not sleep
  chosen_spanish: las obras de injusticia no dormirán
  alternatives_spanish:
  - los actos de injusticia no dormirán
  - las obras injustas no dormirán
  lexicon: iniustitia
  rationale: Se preserva el paralelismo con ‘iustitiae’ mediante ‘obras de injusticia’; ‘no dormirán’ retiene la personificación del latín y el contraste antitético con ‘velarán’.
theological_decisions:
- issue: Paralelo entre ‘iustitiae’ e ‘iniustitiae’ como sujetos personificados
  english_pob_reading: acts of righteousness ... acts of unrighteousness
  chosen_spanish_reading: las obras de justicia ... las obras de injusticia
  alternative_spanish_readings:
  - las obras justas ... las obras injustas
  - los actos de justicia ... los actos de injusticia
  rationale: El latín usa sustantivos abstractos en plural como sujetos; ‘obras de justicia/injusticia’ conserva esa forma y evita diluir el contraste moral en adjetivos más genéricos.
  doctrine_reference: Retribución moral y contraste escatológico entre justicia e injusticia
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que corrigió ‘will awake’ a ‘will keep watch’ para reflejar mejor vigilabunt; por eso se eligió ‘velarán’ en español. También se mantuvo el paralelismo entre iustitiae e iniustitiae con sustantivos abstractos en plural.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando el texto fuente lo exige; aquí no aparece ningún tetragrama ni equivalente directo.
  - Se evita ‘Cristo’/‘Mesías’ porque el versículo no contiene cristología.
  - Se conserva el tono bíblico sin arcaísmos innecesarios, con sintaxis española fluida y fiel al paralelismo latino.
  - ‘Obras de justicia’ y ‘obras de injusticia’ siguen la decisión inglesa revisada de ‘acts of righteousness/acts of unrighteousness’.
