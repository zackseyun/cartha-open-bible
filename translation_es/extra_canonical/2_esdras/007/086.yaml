translation:
  language: es
  text: 'El sexto camino: ven cómo algunos de ellos pasarán al tormento[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ellos mismos pasarán a los tormentos’. La lectura auditada corregida favorece ‘algunos de ellos pasarán al tormento’.
    reason: alternative_reading
lexical_decisions:
- source_word: cum silentio magno
  english_pob_choice: The sixth way
  chosen_spanish: El sexto camino
  alternatives_spanish:
  - La sexta vía
  - El sexto sendero
  lexicon: Latin cum silentio magno is not represented in the English audit line and the extant clause begins with Sexta uia; the Spanish follows the audited English/Latin sense for the section heading.
  rationale: Para esta línea se conserva la numeración y el valor de uia como 'camino'. Aunque el fragmento latino previo menciona 'con gran silencio', el texto auditado inglés inicia la cláusula con 'The sixth way', y aquí se traduce la parte efectivamente transmitida por la unidad de sentido.
- source_word: uidentes
  english_pob_choice: they see
  chosen_spanish: ven
  alternatives_spanish:
  - ellos ven
  - están viendo
  lexicon: Latin uidentes is present participle, used here in a vivid narrative way; the English POB keeps simple present 'they see'.
  rationale: '''Ven'' da una forma natural y directa en español, acorde con la observación narrativa del pasaje, sin añadir progresión aspectual que no está en el original.'
- source_word: de eis
  english_pob_choice: some of them
  chosen_spanish: algunos de ellos
  alternatives_spanish:
  - unos de ellos
  - parte de ellos
  lexicon: The revised English audit reads 'some of them' after correcting the partitive force of de eis.
  rationale: Se refleja el valor partitivo de de eis, evitando la lectura incorrecta 'ellos mismos'. 'Algunos de ellos' reproduce con claridad la restricción semántica del latín.
- source_word: pertransient
  english_pob_choice: will pass over
  chosen_spanish: pasarán
  alternatives_spanish:
  - atravesarán
  - cruzarán
  lexicon: Latin pertransient is future tense; in context it denotes passing over into the next state, here paired with tormentum.
  rationale: '''Pasarán'' es la opción más natural y fiel para el futuro de pertransient. Se evita forzar una imagen más concreta que el latín no exige.'
- source_word: in cruciamentum / tormentum
  english_pob_choice: into torment
  chosen_spanish: al tormento
  alternatives_spanish:
  - al sufrimiento
  - a los tormentos
  lexicon: The English revision corrected the singular 'torment' and the Latin noun is singular in this unit.
  rationale: Se mantiene el singular 'tormento', conforme a la revisión textual y al sustantivo singular del latín. 'Al' expresa el movimiento de entrada del original.
theological_decisions:
- issue: Destino de 'algunos de ellos' en vez de una lectura reflexiva o totalizante
  english_pob_reading: some of them will pass over into torment
  chosen_spanish_reading: algunos de ellos pasarán al tormento
  alternative_spanish_readings:
  - ellos mismos pasarán al tormento
  - pasarán todos al tormento
  rationale: La revisión auditada corrige expresamente la lectura reflexiva. El español conserva la cuantificación parcial, evitando universalizar el juicio o convertirlo en autorreferencial.
  doctrine_reference: Coherence with the source-based reading of divine judgment imagery; no doctrinal expansion beyond the text.
translation_notes:
  revision_awareness: 'La plantilla inglesa fue revisada para corregir una mala lectura del latín: de eis es partitivo (''algunos de ellos''), no reflexivo (''ellos mismos''), y cruciamentum/tormentum queda en singular. La versión española sigue la lectura corregida y conserva el singular.'
  spanish_consistency_notes:
  - Se mantiene 'tormento' en singular para seguir la revisión textual y evitar pluralizar sin base.
  - '''Camino'' traduce uia de forma consistente con el encabezado de la serie.'
  - No se introduce terminología eclesiástica adicional; el tono es sobrio y descriptivo.
