translation:
  language: es
  text: la intemperancia ha terminado, la incredulidad ha sido cortada, pero la justicia ha crecido y la verdad ha surgido.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: intemperantia
  english_pob_choice: self-indulgence
  chosen_spanish: autosatisfacción
  alternatives_spanish:
  - indulgencia desordenada
  - desenfreno
  lexicon: intemperantia
  rationale: El latín apunta a falta de dominio propio o abandono a los propios apetitos; en español, "autosatisfacción" conserva la idea de vivir para la propia gratificación sin cargar demasiado con un matiz moral ajeno al texto.
- source_word: soluta est
  english_pob_choice: has been ended
  chosen_spanish: ha sido eliminada
  alternatives_spanish:
  - ha sido terminada
  - ha sido acabada
  lexicon: solvere
  rationale: La pasiva expresa que la autosatisfacción queda removida o disuelta; "eliminada" comunica bien la cesación efectiva sin sugerir necesariamente destrucción física.
- source_word: incredulitas
  english_pob_choice: unbelief
  chosen_spanish: incredulidad
  alternatives_spanish:
  - falta de fe
  - descreimiento
  lexicon: incredulitas
  rationale: '"Incredulidad" es el equivalente directo y mantiene el contraste con "verdad" y "justicia".'
- source_word: abscisa est
  english_pob_choice: has been cut off
  chosen_spanish: ha sido cortada
  alternatives_spanish:
  - ha sido arrancada
  - ha sido cercenada
  lexicon: abscindo
  rationale: El verbo latino expresa corte severo o separación; "cortada" conserva la imagen fuerte y paralela al inglés POB.
- source_word: iustitia
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  lexicon: iustitia
  rationale: En este contexto escatológico-moral, "justicia" funciona de manera natural en español y preserva el valor ético/legal de la palabra latina.
- source_word: veritas
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la veracidad
  lexicon: veritas
  rationale: '"Verdad" es la equivalencia directa y más idiomática; no requiere matización adicional aquí.'
- source_word: orta est
  english_pob_choice: has arisen
  chosen_spanish: ha surgido
  alternatives_spanish:
  - ha brotado
  - ha aparecido
  lexicon: orior
  rationale: La imagen de levantarse o salir a la luz se refleja bien con "ha surgido", que es natural en español y conserva el dinamismo del verbo latino.
theological_decisions:
- issue: Secuencia de transformación final en paralelismo
  english_pob_reading: self-indulgence has been ended, unbelief has been cut off, but righteousness has grown and truth has arisen.
  chosen_spanish_reading: la autosatisfacción ha sido eliminada, la incredulidad ha sido cortada, pero la justicia ha crecido y la verdad ha surgido.
  alternative_spanish_readings:
  - la indulgencia propia ha terminado...
  - la incredulidad ha sido arrancada...
  rationale: Se mantiene el paralelismo antitético entre lo que cesa y lo que crece, sin suavizar el contraste moral ni introducir una interpretación más amplia que el latín no exige.
  doctrine_reference: Eschatological restoration; moral reversal
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y el cotejo fue de alta concordancia; por tanto, se conserva la lectura directa del latín con equivalencia española idiomática mínima.
  spanish_consistency_notes:
  - Se conserva el tono solemne y sentencioso de una afirmación escatológica.
  - No se introduce terminología eclesiástica añadida; 'justicia' y 'verdad' mantienen el paralelismo del original.
  - Se evita 'SEÑOR' u otra sustitución reverencial porque el versículo no contiene el nombre divino.
