review_pass:
  verdict: revise
  source_alignment_summary: 'El latín presenta una serie de pasivos/resultativos y verbos de crecimiento/aparición: ''soluta est intemperantia, abscisa est incredulitas, crevit autem iustitia, orta est veritas''. El borrador español conserva bien la estructura y el contraste, pero ''autosatisfacción'' no refleja con suficiente fidelidad ''intemperantia'', que apunta más a falta de dominio propio, desenfreno o intemperancia que a complacencia consigo mismo. ''Eliminada'' también es algo más interpretativo que la idea de quedar disuelta/terminada.'
  spanish_quality_summary: El español es claro y legible, pero 'autosatisfacción' suena semánticamente desviado en contexto moral-bíblico, porque suele indicar satisfacción con uno mismo más que indulgencia desordenada. Una leve revisión mejora la naturalidad y precisión sin perder el paralelismo solemne.
  glossary_alignment: No hay términos de glosario mayor en conflicto. 'Justicia' para 'iustitia' y 'verdad' para 'veritas' están bien. La principal cuestión léxica es 'intemperantia', para la que conviene 'intemperancia' o una opción afín; aquí 'la intemperancia' preserva mejor el término fuente y el registro.
  issues:
  - severity: medium
    issue: '''autosatisfacción'' no corresponde bien a ''intemperantia'''
    rationale: En español, 'autosatisfacción' normalmente significa complacencia con uno mismo, no falta de dominio propio o entrega a los apetitos. El latín y el inglés POB ('self-indulgence') apuntan a intemperancia/desenfreno.
  - severity: low
    issue: '''ha sido eliminada'' es menos ceñido que ''soluta est'''
    rationale: Aunque comunica cese, 'eliminada' puede sonar más fuerte o más mecánico. 'Ha terminado' o 'ha sido deshecha' se acerca más a la idea de haber sido desatada/disuelta/puesta fin.
  revised_spanish_text: la intemperancia ha terminado, la incredulidad ha sido cortada, pero la justicia ha crecido y la verdad ha surgido.
  revision_rationale: Se reemplaza 'autosatisfacción' por 'intemperancia' para reflejar con mayor fidelidad el sentido moral de 'intemperantia' y el inglés auditado 'self-indulgence'. También se ajusta 'ha sido eliminada' a 'ha terminado', que expresa mejor el cese sin añadir una imagen ajena. El resto del versículo está bien alineado con el latín y su paralelismo.
