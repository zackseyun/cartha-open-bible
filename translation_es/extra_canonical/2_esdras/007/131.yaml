review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el latín en lo principal: quoniam = «porque», non esset = valor modal con «habría», y la segunda mitad refleja correctamente el giro revisado del POB inglés «a quienes la salvación ha sido prometida». Sin embargo, «sobre aquellos» calca el inglés/latín de forma poco natural en español en este contexto; «por» o «por aquellos» expresa mejor el sentido de gozo respecto de personas. Además, la nota alternativa cambia indebidamente el tiempo de «habrá» a «habría» en la segunda cláusula, cuando futurum est pide futuro.'
  spanish_quality_summary: 'El texto es claro y digno, pero contiene un calco preposicional poco idiomático: «habrá gozo sobre aquellos» suena antinatural en español bíblico actual. «Habrá gozo por aquellos» o «respecto de aquellos» sería más natural; «por aquellos» es la solución más limpia. También conviene alinear la nota con esa mejora y con el futuro de la segunda cláusula.'
  glossary_alignment: No hay términos del glosario mayor en juego. «Perdición» es defendible para perditio, aunque «destrucción» también sería posible; no requiere cambio. «Salvación» y «gozo» están bien. No hay conflicto con terminología POB.
  issues:
  - severity: medium
    issue: Calco poco natural en «habrá gozo sobre aquellos»
    rationale: Aunque «super eos» / el inglés «over those» pueden reflejarse literalmente, en español esa preposición resulta forzada con «gozo». «Habrá gozo por aquellos» preserva el sentido y mejora la legibilidad.
  - severity: low
    issue: La nota alternativa altera el tiempo verbal de la segunda cláusula
    rationale: 'La nota propone «habría gozo», pero el latín futurum est y el POB inglés tienen futuro: «there will be joy». La alternativa no debe debilitar ese valor temporal.'
