base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/131.yaml
  text: For there should be no grief over their destruction[a], just as there will be joy over those to whom salvation has been promised.”
  footnotes:
  - marker: a
    text: Or 'Therefore there will be no grief over their destruction, just as there will be joy over those to whom salvation has been persuaded.”'.
