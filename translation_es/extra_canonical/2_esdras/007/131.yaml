    unchanged: false
    changes_summary: Changed 'is assured' to 'has been promised' to more closely reflect Latin persuasa est salus without adding interpretive certainty beyond the source.
translation:
  language: es
  text: porque no habría tristeza por su perdición[a], así como habrá gozo por aquellos a quienes la salvación ha sido prometida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «no habría tristeza por su destrucción, así como habrá gozo por aquellos a quienes la salvación ha sido prometida»'
    reason: alternative_reading
lexical_decisions:
- source_word: quoniam
  english_pob_choice: For
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: Latin quoniam
  rationale: El latín introduce la razón con quoniam; en español, 'porque' expresa de manera natural esa relación causal. 'Pues' y 'ya que' también serían posibles, pero 'porque' resulta más directo y transparente en este contexto.
- source_word: non esset tristitia
  english_pob_choice: there should be no grief
  chosen_spanish: no habría tristeza
  alternatives_spanish:
  - no habrá tristeza
  - no existiría tristeza
  - no habría duelo
  lexicon: Latin tristitia
  rationale: Tristitia se refiere a tristeza, aflicción o dolor interior; 'tristeza' conserva bien el valor lexical sin forzar una formulación más interpretativa como 'duelo'. Se mantiene el sentido modal del imperfecto subjuntivo con 'habría'.
- source_word: in perditione eorum
  english_pob_choice: over their destruction
  chosen_spanish: por su perdición
  alternatives_spanish:
  - por su destrucción
  - a causa de su ruina
  - por su ruina
  lexicon: Latin perditio
  rationale: Perditio puede significar destrucción, ruina o perdición. 'Perdición' conserva la carga de ruina final y funciona bien en español eclesial; 'destrucción' es más literal pero menos matizada, y 'ruina' pierde el eco moral del término.
- source_word: sicut et futurum est gaudium
  english_pob_choice: just as there will be joy
  chosen_spanish: así como habrá gozo
  alternatives_spanish:
  - tal como habrá gozo
  - de la misma manera habrá gozo
  lexicon: Latin gaudium
  rationale: Gaudium se traduce con 'gozo', que es el equivalente más fiel y tradicional en registro bíblico. 'Así como' reproduce la comparación del latín con claridad y sin añadir interpretación.
- source_word: quibus persuasa est salus
  english_pob_choice: those to whom salvation has been promised
  chosen_spanish: aquellos a quienes la salvación ha sido prometida
  alternatives_spanish:
  - aquellos a quienes la salvación les ha sido asegurada
  - aquellos a quienes la salvación ha sido persuadida
  lexicon: Latin persuasa est
  rationale: La construcción latina con dativo ('quibus') y persuasa est no se vierte de forma idiomática como 'persuadida' en español. Siguiendo el audit trail inglés, 'ha sido prometida' expresa mejor la intención sin introducir una certeza mayor que la que permite el latín, y preserva el contraste con la perdición anterior.
theological_decisions:
- issue: Relación entre perdición y salvación en la frase paralela
  english_pob_reading: no grief over their destruction ... joy over those to whom salvation has been promised
  chosen_spanish_reading: no habría tristeza por su perdición ... gozo sobre aquellos a quienes la salvación ha sido prometida
  alternative_spanish_readings:
  - no habría tristeza por su destrucción ... gozo sobre aquellos a quienes la salvación les ha sido asegurada
  - no habría duelo por su ruina ... gozo sobre aquellos a quienes se les prometió la salvación
  rationale: 'La línea contrapone la perdición de unos con el gozo de otros. En español se conserva esa tensión sin suavizarla: ''perdición'' mantiene la gravedad del destino negativo, y ''ha sido prometida'' sigue el ajuste del audit trail inglés para no exagerar la fuerza de persuasión/certidumbre más allá del latín recibido.'
  doctrine_reference: 2 Esdras 7:131; contraste escatológico entre juicio y salvación
translation_notes:
  revision_awareness: 'La redacción inglesa pasó de ''therefore'' a ''for/because'' tras la revisión del latín quoniam, y luego ajustó ''is assured'' a ''has been promised'' para reflejar mejor persuasa est sin sobreinterpretar. La versión española sigue ese estado más reciente: causal con ''porque'', modal con ''habría'', y el pasivo ''ha sido prometida'' para la salvación.'
  spanish_consistency_notes:
  - Se usó 'gozo' en lugar de 'alegría' para mantener el registro bíblico del latín gaudium.
  - Se prefirió 'perdición' frente a 'destrucción' por su valor más cargado y por la simetría semántica con la salvación.
  - No se empleó 'Mesías', 'Yahvé' ni otras terminologías del proyecto porque el versículo no las contiene.
