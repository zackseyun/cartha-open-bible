translation:
  language: es
  text: 'Miren de este lado y de aquel: aquí hay deleite y reposo, y allí hay fuego y tormentos. Estas son las palabras que él les dirá en el día del juicio.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Uidete contra et in contra
  english_pob_choice: Look on this side and on that
  chosen_spanish: Mira de este lado y de aquel
  alternatives_spanish:
  - Mira a un lado y al otro
  - Mira de un lado y del otro
  lexicon: contras / in contra
  rationale: El latín pide una oposición espacial marcada; en español, «de este lado y de aquel» conserva la deixis contrastiva de forma natural y solemne. «Mira» mantiene el imperativo directo del texto.
- source_word: iocunditas
  english_pob_choice: delight
  chosen_spanish: deleite
  alternatives_spanish:
  - alegría
  - gozo
  lexicon: iocunditas
  rationale: «Deleite» expresa bien el matiz de placer gozoso y es suficientemente elevado para el registro apocalíptico. «Gozo» sería posible, pero puede sonar más devocional que descriptivo; «alegría» es más general.
- source_word: requies
  english_pob_choice: rest
  chosen_spanish: reposo
  alternatives_spanish:
  - descanso
  - quietud
  lexicon: requies
  rationale: «Reposo» conserva la idea de descanso estable y sereno, con un tono más literario y bíblico que «descanso». Evita reducir el término a mera pausa física.
- source_word: ignis et tormenta
  english_pob_choice: fire and torments
  chosen_spanish: fuego y tormentos
  alternatives_spanish:
  - fuego y castigos
  - fuego y sufrimientos
  lexicon: ignis / tormenta
  rationale: La combinación mantiene la fuerza punitiva del latín. «Tormentos» reproduce directamente el plural intensivo y el efecto judicial/escatológico del original.
- source_word: ad eos in
  english_pob_choice: he will speak to them on the day of judgment
  chosen_spanish: les dirá en el día del juicio
  alternatives_spanish:
  - hablará con ellos en el día del juicio
  - les hablará en el día del juicio
  lexicon: loquere ad eos
  rationale: El final latino está truncado en el testimonio, pero el inglés POB audita la continuación como referencia de traducción. «Les dirá» sigue la decisión inglesa de un acto de discurso dirigido; «en el día del juicio» mantiene el sentido escatológico sin añadir más contenido que el sustentado por el contexto auditado.
theological_decisions:
- issue: Contraste escatológico entre bienaventuranza y castigo
  english_pob_reading: here are delight and rest, and there are fire and torments
  chosen_spanish_reading: aquí hay deleite y reposo, y allí hay fuego y tormentos
  alternative_spanish_readings:
  - aquí están el deleite y el reposo, y allí el fuego y los tormentos
  - aquí hay gozo y descanso, y allí fuego y tormentos
  rationale: 'Se conserva el paralelismo tajante del juicio final: dos destinos contrapuestos, sin suavizar el castigo ni intensificar indebidamente la recompensa. La estructura con «aquí… y allí…» reproduce la deixis moral del pasaje.'
  doctrine_reference: Juicio final y retribución escatológica
translation_notes:
  revision_awareness: La revisión inglesa eliminó una comilla final no sustentada por el contexto, pero no alteró el contenido semántico. La versión española sigue esa lectura limpia y no introduce marcas de cita innecesarias.
  spanish_consistency_notes:
  - Se mantiene «día del juicio» para alinear el registro escatológico con el POB inglés.
  - Se evita «SEÑOR» u այլ sustitución teológica porque el pasaje latino no contiene el nombre divino.
  - No se introduce puntuación o comillas no apoyadas por el texto fuente o la revisión auditada.
