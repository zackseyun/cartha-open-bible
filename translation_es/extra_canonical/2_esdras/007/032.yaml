translation:
  language: es
  text: Y la tierra devolverá a los que duermen en ella[a], y el polvo a los que habitan en él en silencio, y los depósitos devolverán las almas que les fueron confiadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que habitan en ella en silencio».'
    reason: alternative_reading heredada de la auditoría inglesa sobre la posible agrupación distinta de la frase
lexical_decisions:
- source_word: terra
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: terra
  rationale: ‘Tierra’ reproduce el sustantivo concreto del latino y mantiene el paralelo con ‘polvo’. ‘El mundo’ sería más interpretativo y menos exacto aquí.
- source_word: reddet
  english_pob_choice: will give back
  chosen_spanish: devolverá
  alternatives_spanish:
  - dará de vuelta
  - restituirá
  lexicon: reddere
  rationale: ‘Devolverá’ comunica restitución de lo que pertenece a otro, que encaja bien con el movimiento del pasaje. ‘Restituirá’ sería posible, pero más marcado y menos natural.
- source_word: qui in eam dormiunt
  english_pob_choice: those who sleep in it
  chosen_spanish: los que duermen en ella
  alternatives_spanish:
  - los que duermen en ella
  - quienes yacen en ella
  lexicon: qui ... dormiunt
  rationale: ‘Duermen’ sigue de cerca el latín y conserva la imagen de la muerte como sueño. ‘Yacen’ explicaría el sentido, pero perdería la formulación heredada del texto.
- source_word: pulvis
  english_pob_choice: the dust
  chosen_spanish: el polvo
  alternatives_spanish:
  - el polvo
  - el polvo de la tierra
  lexicon: pulvis
  rationale: ‘Polvo’ es la correspondencia directa y mantiene la contraposición con ‘tierra’. No conviene ampliar el sintagma sin necesidad.
- source_word: qui in eo silentio habitant
  english_pob_choice: those who dwell in it in silence
  chosen_spanish: los que habitan en ella en silencio
  alternatives_spanish:
  - los que habitan en ella en silencio
  - los que moran allí en silencio
  lexicon: habitare + silentio
  rationale: La colocación de ‘en silencio’ al final conserva el paralelismo señalado en la revisión inglesa y refleja el latino ‘in eo silentio’. ‘Moran’ sería aceptable, pero menos neutral y más bíblico-tradicional.
- source_word: promptuaria
  english_pob_choice: the storehouses
  chosen_spanish: los depósitos
  alternatives_spanish:
  - los depósitos
  - los almacenes
  - los graneros
  lexicon: promptuarium
  rationale: ‘Depósitos’ traduce la idea de receptáculos o lugares de guarda sin añadir una imagen rural específica. ‘Almacenes’ es posible, pero más moderno; ‘graneros’ sería demasiado concreto.
- source_word: quae eis commendatae sunt animae
  english_pob_choice: the souls entrusted to them
  chosen_spanish: las almas que les fueron confiadas
  alternatives_spanish:
  - las almas que les fueron confiadas
  - las almas encomendadas a ellos
  lexicon: commendo
  rationale: ‘Fueron confiadas’ preserva la voz pasiva y la idea de encomienda. ‘Encomendadas’ es correcto, pero en español puede sonar más abstracto y menos fluido.
theological_decisions:
- issue: Reversión de la muerte y custodia de las almas
  english_pob_reading: The earth, dust, and storehouses return the dead/souls entrusted to them.
  chosen_spanish_reading: 'La creación material aparece como devolviendo lo que recibió: los cuerpos/los muertos reposan en tierra y polvo, y los depósitos devuelven las almas confiadas.'
  alternative_spanish_readings:
  - La tierra, el polvo y los depósitos devuelven literalmente a las personas muertas y sus almas.
  - La imagen es puramente poética y no debe leerse como una doctrina literal del destino de las almas.
  rationale: El pasaje mantiene una imaginería de restitución y custodia. La redacción española conserva esa tensión sin resolverla en exceso ni convertirla en una paráfrasis doctrinal.
  doctrine_reference: Anthropology / intermediate state imagery in extra-canonical apocalyptic literature
translation_notes:
  revision_awareness: La revisión inglesa reciente solo ajustó la colocación de la frase ‘in it in silence’ para reflejar mejor el paralelismo latino; por eso el español coloca ‘en ella’ inmediatamente con cada verbo y deja ‘en silencio’ al final de la segunda cola.
  spanish_consistency_notes:
  - Se mantiene ‘tierra’ y ‘polvo’ para conservar el paralelismo material del latín.
  - Se usa ‘almas’ sin suavizarlo a ‘vidas’ porque el texto latino dice animae.
  - La puntuación con comas reproduce la cadencia ternaria del original.
