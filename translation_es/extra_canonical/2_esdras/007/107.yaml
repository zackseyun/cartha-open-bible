translation:
  language: es
  text: y Josué después de él, para Israel, en los días de Achar[a], y Samuel en los días de Saúl,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El latín Iesus usa la misma forma para Josué y para Jesús; aquí se refiere a Josué hijo de Nun.
    reason: lexical_alternative
lexical_decisions:
- source_word: Iesus
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Jesús
  lexicon: N/A
  rationale: El latín Iesus conserva la misma forma gráfica que luego se usa para Jesús, pero aquí el propio contexto del listado histórico de Israel y la nota auditada en inglés identifican a Josué hijo de Nun. En español, "Josué" comunica esa identificación bíblica con claridad y evita confusión cristológica.
- source_word: post eum
  english_pob_choice: after him
  chosen_spanish: después de él
  alternatives_spanish:
  - tras él
  lexicon: N/A
  rationale: '"Después de él" reproduce de manera natural la relación temporal y sucesoria del latín sin añadir matices no presentes en el texto.'
- source_word: pro Israhel
  english_pob_choice: for Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - en favor de Israel
  - por Israel
  lexicon: N/A
  rationale: '"Para Israel" mantiene la función de servicio o representación expresada por pro + acusativo en este contexto enumerativo, con una construcción natural en español.'
- source_word: in diebus Achar
  english_pob_choice: in the days of Achar
  chosen_spanish: en los días de Acar
  alternatives_spanish:
  - en tiempos de Acar
  - en los días de Achar
  lexicon: N/A
  rationale: Se sigue el nombre que quedó fijado en la revisión más reciente del POB inglés, "Achar", pero en español se adapta la grafía a la forma más inteligible y corriente "Acar". La relación con Acán/Achar se preserva en la nota para no ocultar la tensión lexical del nombre.
- source_word: Iesus
  english_pob_choice: Joshua ... footnoted as the same form used for Joshua and Jesus
  chosen_spanish: Josué
  alternatives_spanish:
  - Jesús
  lexicon: N/A
  rationale: Aunque el latín comparte la forma Iesus para Josué y Jesús, el español debe distinguir los referentes. El texto principal usa Josué y la nota conserva la observación filológica sobre la forma latina compartida.
- source_word: Samuhel
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  lexicon: N/A
  rationale: Nombre propio bíblico asentado en español; no requiere adaptación adicional.
- source_word: Saul
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saul
  lexicon: N/A
  rationale: Se usa la forma española normalizada con tilde, Saúl, sin alterar la identidad del referente bíblico.
theological_decisions:
- issue: Distinción entre Josué y Jesús a partir de la forma latina Iesus
  english_pob_reading: The English POB notes that the Latin form is the same for Joshua and Jesus, but the Old Testament reference is Joshua son of Nun.
  chosen_spanish_reading: El texto principal dice Josué, y la nota explica que el latín Iesus es la misma forma que luego se usa para Jesús, pero aquí se trata de Josué hijo de Nun.
  alternative_spanish_readings:
  - Jesús
  rationale: La equivalencia formal del latín no debe borrar la referencia histórica del pasaje. La solución española mantiene la identificación correcta y preserva la observación textual en nota.
  doctrine_reference: Distinción canónica entre Josué hijo de Nun y Jesús de Nazaret; fidelidad referencial del nombre propio en traducción bíblica.
- issue: Nombre Achar/Acar en la tradición textual
  english_pob_reading: The English revision changed Achan to Achar to match the Latin source text exactly.
  chosen_spanish_reading: Se conserva la lectura de Acar en el cuerpo del texto, con nota que explica la variante textual y la relación con Achar/Acán.
  alternative_spanish_readings:
  - Achar
  - Acán
  rationale: El audit trail muestra una revisión para ajustarse exactamente al latín "Achar". En español, "Acar" permite una transliteración funcional y natural, mientras la nota conserva la tensión entre forma fuente y formas tradicionales.
  doctrine_reference: Crítica textual y transmisión onomástica; no implica una afirmación doctrinal.
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió "Achan" a "Achar" para ajustarse exactamente al latín. La traducción española respeta ese ajuste, pero adapta el nombre a la grafía española "Acar" en el texto principal y conserva la identificación con Josué en la nota.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y publicable, sin calco excesivo del latín.
  - Los nombres propios siguen las formas españolas comunes cuando existen; se preserva la variante textual relevante en nota.
  - La puntuación reproduce una coordinación simple en estilo enumerativo, adecuada al breve fragmento.
  - La nota usa un solo marcador y queda anclada al nombre Josué para explicar la forma latina compartida.
