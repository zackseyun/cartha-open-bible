base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/106.yaml
  text: And I answered and said[a], “How then do we now find that first Abraham prayed for the Sodomites, and Moses for the fathers who sinned in the wilderness,
  footnotes:
  - marker: a
    text: Or 'Abraham prayed first for the people of Sodom'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:21Z'
    unchanged: false
    changes_summary: Changed 'the people of Sodom' to 'the Sodomites' for closer lexical accuracy to the Latin 'propter Sodomitas.'
translation:
  language: es
  text: 'Y respondí y dije: «¿Cómo hallamos entonces que Abraham fue el primero en interceder por los sodomitas[a], y Moisés por los padres que pecaron en el desierto,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cómo hallamos entonces que Abraham intercedió primero por la gente de Sodoma...?»'
    reason: Preserva la alternativa documentada en el rastro inglés anterior, donde «primero» se entendía adverbialmente con el verbo, aunque el texto principal aclara mejor el sentido del latín.
lexical_decisions:
- source_word: Et respondi et dixi
  english_pob_choice: And I answered and said
  chosen_spanish: Y respondí y dije
  alternatives_spanish:
  - Y contesté y dije
  - Y respondí, diciendo
  lexicon: respondere; dicere
  rationale: Conserva la fórmula narrativa directa del latín sin añadir interpretación. «Respondí y dije» es natural en español bíblico y mantiene el paralelismo del original.
- source_word: quomodo invenimus modo
  english_pob_choice: How then do we now find
  chosen_spanish: ¿Cómo hallamos entonces
  alternatives_spanish:
  - ¿Cómo encontramos ahora
  - ¿Cómo es que hallamos ahora
  lexicon: quomodo; invenire; modo
  rationale: «Hallamos» reproduce el tono de razonamiento/investigación del latín; «entonces» comunica el valor discursivo de modo sin mecanizarlo como mera referencia temporal.
- source_word: primus Abraham
  english_pob_choice: first Abraham
  chosen_spanish: primero Abraham
  alternatives_spanish:
  - Abraham primero
  - Abraham, el primero
  lexicon: primus
  rationale: El latín presenta primus en concordancia nominal con Abraham, introduciéndolo como el primero de una serie de intercesores. En español, «primero Abraham» conserva esa función de encabezamiento de lista mejor que un adverbio ligado a «intercedió».
- source_word: rogavit ... propter Sodomitas
  english_pob_choice: prayed ... for the Sodomites
  chosen_spanish: intercedió ... por los sodomitas
  alternatives_spanish:
  - oró ... por los sodomitas
  - rogó ... por los sodomitas
  lexicon: rogare; Sodomitae
  rationale: «Intercedió» expresa con precisión la oración en favor de otros, que es el sentido más claro en este contexto de intercesores. «Sodomitas» sigue de cerca el latín propter Sodomitas y evita una expansión interpretativa.
- source_word: Moyses ... pro patribus
  english_pob_choice: Moses for the fathers
  chosen_spanish: Moisés por los padres
  alternatives_spanish:
  - Moisés por los patriarcas
  - Moisés por los antepasados
  lexicon: patres
  rationale: «Padres» conserva el término heredado del latín y la ambigüedad reverente del referente colectivo. Otras opciones aclaran demasiado y pueden perder la amplitud del original.
- source_word: qui in deserto peccaverunt
  english_pob_choice: who sinned in the wilderness
  chosen_spanish: que pecaron en el desierto
  alternatives_spanish:
  - que pecaron en el desierto
  - que cometieron pecado en el desierto
  lexicon: peccare; desertum
  rationale: La construcción es directa y fiel al latín. «Pecaron» mantiene la formulación breve y narrativa del original.
theological_decisions:
- issue: Orden de Abraham como primero en una lista de intercesores
  english_pob_reading: first Abraham prayed for the Sodomites
  chosen_spanish_reading: primero Abraham intercedió por los sodomitas
  alternative_spanish_readings:
  - Abraham intercedió primero por los sodomitas
  - Abraham fue el primero en interceder por los sodomitas
  rationale: El latín primus concuerda con Abraham y funciona como marca de prioridad cronológica dentro de una enumeración de intercesores, no como adverbio que modifique la acción de orar. La redacción española refleja esa estructura sin borrar la tensión gramatical documentada.
  doctrine_reference: Intercesión de los justos en la historia bíblica; orden retórico del catálogo de ejemplos
translation_notes:
  revision_awareness: La versión inglesa reciente corrigió «prayed first» a «first Abraham prayed» para reflejar que primus depende de Abraham en el latín. La presente redacción española sigue esa revisión y mantiene visible la función enumerativa de «primero». También conserva «sodomitas» como ajuste léxico más cercano a propter Sodomitas.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto cuando corresponda; aquí no aparece el nombre divino.
  - «Intercedió» se emplea por el valor de rogavit en contexto de oración en favor de otros, sin forzar un tecnicismo excesivo.
  - Se mantiene el tono bíblico y sintácticamente claro en español, evitando un calco pesado del latín.
