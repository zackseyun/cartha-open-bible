  glossary_alignment: No hay conflictos con la terminología del proyecto. «Intercedió» es una buena elección contextual para rogavit en este catálogo de intercesores; «sodomitas», «Moisés», «padres», «desierto» están alineados con el sentido fuente y con el rastro de auditoría inglés.
