    changes_summary: Revised 'prevail' to 'more dominant' to more closely reflect dominatiorem. Kept the rest substantially unchanged as a formal rendering of the Latin.
translation:
  language: es
  text: 'Así también con la creación prometida por mí: me alegraré por los pocos que serán salvos[a], porque ellos son los que ahora han hecho más dominante mi gloria, y por quienes ahora mi nombre es nombrado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que serán salvados».
    reason: Alternativa léxica válida para el futuro pasivo de saluabuntur; el texto principal conserva «serán salvos» por su registro bíblico natural.
lexical_decisions:
- source_word: saluabuntur
  english_pob_choice: who will be saved
  chosen_spanish: que serán salvos
  alternatives_spanish:
  - que serán salvados
  - que se salvarán
  lexicon: salvar / salvarse
  rationale: El latín futuro pasivo indica una acción futura, no un estado presente. En español, «serán salvos» conserva el valor pasivo y el matiz escatológico del futuro; «serán salvados» es posible pero algo menos tradicional en este registro, y «se salvarán» atenúa la pasividad explícita.
- source_word: repromissa creatura
  english_pob_choice: the creation promised by me
  chosen_spanish: la creación prometida por mí
  alternatives_spanish:
  - la criatura prometida por mí
  - la creación que yo prometí
  lexicon: creación / criatura
  rationale: El contexto latino permite una referencia al orden creado o a una realidad creada prometida. «Creación» sigue la elección inglesa de POB y es más clara en español bíblico; «criatura» podría sonar a un ser individual y no al conjunto creado, aunque mantiene una posible ambigüedad del latín.
- source_word: gaudet super eum, qui uabet abundantiam
  english_pob_choice: I will rejoice over the few
  chosen_spanish: me alegraré por los pocos
  alternatives_spanish:
  - me regocijaré por los pocos
  - me alegraré sobre los pocos
  lexicon: alegrarse / regocijarse
  rationale: El latín expresa gozo sobre un grupo escaso. «Me alegraré por los pocos» comunica bien el sentido y suena natural; «regocijaré» es más solemne, pero menos común. No se añadió un equivalente explícito de «super» porque en español «alegrarse por» cubre la relación sin forzar la sintaxis.
- source_word: gloriam meam nunc dominatiorem fecerunt
  english_pob_choice: they are the ones who have now made my glory more dominant
  chosen_spanish: ellos son los que ahora han hecho más dominante mi gloria
  alternatives_spanish:
  - ellos son los que ahora han hecho prevalecer mi gloria
  - ellos son los que ahora han hecho mi gloria más dominante
  lexicon: dominantior / dominatiorem
  rationale: 'Se conserva la rareza del comparativo latino con una forma igualmente marcada: «más dominante». Aunque suena menos idiomático que «ha prevalecido», preserva la tensión léxica documentada por la revisión inglesa, que rechazó suavizarla.'
- source_word: nomen meum ... nominado
  english_pob_choice: through whom my name is now named
  chosen_spanish: y por medio de quienes ahora es nombrado mi nombre
  alternatives_spanish:
  - y por medio de quienes ahora se nombra mi nombre
  - y por quienes ahora lleva mi nombre
  lexicon: nombrar / ser nombrado
  rationale: Se mantiene la pasiva para reflejar el latín «nomen meum ...» en construcción impersonal/pasiva. «Es nombrado mi nombre» suena algo solemne pero fiel; «lleva mi nombre» sería interpretativo y menos transparente respecto al original.
theological_decisions:
- issue: Futuro de la salvación en la escatología del texto
  english_pob_reading: who will be saved
  chosen_spanish_reading: que serán salvos
  alternative_spanish_readings:
  - que están salvos
  - que son salvos
  rationale: El texto latino usa futuro pasivo y el contexto de 4 Esdras apunta a una salvación futura vinculada al juicio final. Por eso se evita un presente de estado, que debilitaría la temporalidad escatológica del pasaje.
  doctrine_reference: Escatología de 4 Esdras 7; forma verbal futura en saluabuntur
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto latino limpiado de Bensly 1895 con el Fragmento Perdido de 1875, y toma en cuenta la revisión auditada que corrigió el inglés de un presente («who are saved») a un futuro («who will be saved») por el valor futuro de saluabuntur. También conserva el giro inglés revisado «more dominant» mediante una solución española igualmente marcada («más dominante») para no suavizar la tensión léxica del comparativo latino dominatiorem.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino explícito; por tanto no aplica.
  - Se conserva el registro bíblico formal sin arcaísmos innecesarios, pero se deja la rareza sintáctica donde el latín lo exige.
  - «Creación» se usa en sentido colectivo/general; no se optó por «criatura» para evitar una restricción semántica indebida.
