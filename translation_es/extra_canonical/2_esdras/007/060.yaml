  yaml_path: translation/extra_canonical/2_esdras/007/060.yaml
  text: 'So also with the creation promised by me: I will rejoice over the few who will be saved[a], because they are the ones who have now made my glory more dominant, and through whom my name is now named.'
  footnotes:
  - marker: a
    text: Or 'who are saved'.
    reason: previous_rendering
  revision_pass:
