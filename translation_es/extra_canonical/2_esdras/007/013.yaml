- from: Porque las entradas de la edad futura[a] son anchas y seguras, y producen el fruto de la inmortalidad.
  to: Porque las entradas de la era mayor[a] son anchas y seguras, y producen el fruto de la inmortalidad.
  rationale: Se ajusta el texto principal para reflejar de manera más directa el latín maioris y la decisión final del inglés POB, manteniendo en nota la alternativa «futura» por la discusión textual documentada. También se mejora la naturalidad del español con «era» en lugar de «edad».
  reviewer_model: gpt-5.4
