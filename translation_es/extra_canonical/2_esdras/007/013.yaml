translation:
  language: es
  text: Porque las entradas de la era mayor[a] son anchas y seguras, y producen el fruto de la inmortalidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la era futura».'
    reason: alternative_reading
lexical_decisions:
- source_word: nam
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: Latin nam
  rationale: nam es explicativo, no adversativo; en español «Porque» conserva la relación causal/explanatoria que introduce la afirmación sin forzar contraste.
- source_word: maioris saeculi
  english_pob_choice: the greater age / the future age
  chosen_spanish: la edad futura
  alternatives_spanish:
  - la edad mayor
  - la era futura
  - el siglo venidero
  lexicon: Latin maioris saeculi
  rationale: La tradición textual latina refleja maioris, pero el trasfondo crítico señalado por la revisión indica que el sentido original técnico es «future age». En español, «edad futura» comunica mejor la contraposición apocalíptica con «esta edad» y evita «siglo» por ambigüedad moderna.
- source_word: introitus
  english_pob_choice: entrances
  chosen_spanish: las entradas
  alternatives_spanish:
  - los accesos
  - los umbrales
  lexicon: Latin introitus
  rationale: «Entradas» reproduce el plural concreto del latín y mantiene la imagen de acceso a un ámbito/edad futura. «Umbrales» sería más interpretativo; «accesos» es menos natural en este contexto.
- source_word: spatiosi
  english_pob_choice: broad
  chosen_spanish: anchas
  alternatives_spanish:
  - amplias
  - espaciosas
  lexicon: Latin spatiosi
  rationale: «Anchas» es la equivalencia más directa y idiomática para la amplitud física/metafórica del paso de entrada. «Amplias» también sería válida, pero «anchas» mantiene la imagen concreta del texto.
- source_word: securi
  english_pob_choice: secure
  chosen_spanish: seguras
  alternatives_spanish:
  - firmes
  - sin peligro
  lexicon: Latin securi
  rationale: «Seguras» conserva la idea de ausencia de riesgo o amenaza sin introducir una paráfrasis. «Firmes» cambia el matiz hacia estabilidad material.
- source_word: facientes inmortalitatis fructum
  english_pob_choice: they produce the fruit of immortality
  chosen_spanish: producen el fruto de la inmortalidad
  alternatives_spanish:
  - dan el fruto de la inmortalidad
  - procuran el fruto de la inmortalidad
  lexicon: Latin facientes / fructum
  rationale: «Producen» refleja bien facientes como causativo/efectivo y sigue la revisión inglesa aprobada; «fruto de la inmortalidad» conserva el genitivo sin suavizarlo a una idea más abstracta.
theological_decisions:
- issue: Contraste escatológico entre «esta edad» y «la edad futura»
  english_pob_reading: future age
  chosen_spanish_reading: edad futura
  alternative_spanish_readings:
  - edad mayor
  - edad venidera
  rationale: La nota de revisión identifica que el testimonio más sólido apunta a una edad escatológica futura. En el contexto de 4 Esdras, esto mantiene el contraste técnico con la era presente y evita normalizar la expresión como «mayor», que en español sería menos transparente.
  doctrine_reference: Escatología de 4 Esdras 7; contraste entre el presente siglo y el mundo venidero
- issue: Relación lógica introducida por nam
  english_pob_reading: For
  chosen_spanish_reading: Porque
  alternative_spanish_readings:
  - Pues
  - Ya que
  rationale: El latín usa nam con valor explicativo. «Porque» preserva esa función y evita una lectura adversativa que alteraría el flujo del argumento.
  doctrine_reference: Coherencia discursiva del pasaje apocalíptico
translation_notes:
  revision_awareness: La historia de revisión muestra una corrección importante desde «future age» a «greater age» y luego una nueva revisión que prioriza la forma latina maioris. Dado que el paquete crítico también señala la tradición siriaca y etiópica con «future», la traducción española conserva «edad futura» por fidelidad al sentido escatológico restaurado, pero añade una nota alternativa que deja visible la lectura latina literal.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton ni un equivalente directo en este versículo.
  - «Edad» se usa para saeculum en sentido escatológico, no como «siglo» cronológico.
  - Se mantiene el plural «las entradas» para introitus, aunque el español pudiera leerse colectivamente.
  - «Inmortalidad» se conserva como sustantivo abstracto sin glosa doctrinal adicional.
