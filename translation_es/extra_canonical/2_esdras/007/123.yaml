source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: Et quoniam ostendetur paradisus, cuius fructus incorruptus perseverat, in quo est saturitas et medella,
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/123.yaml
  text: And because paradise will be shown, whose fruit remains incorruptible, in which there is fullness and healing,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:24Z'
    unchanged: false
    changes_summary: Changed 'if' to 'because' to reflect Latin 'quoniam' more accurately. Retained the rest as faithful and natural.
translation:
  language: es
  text: Y porque se mostrará el paraíso, cuyo fruto permanece incorruptible, en el cual hay plenitud y sanidad,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: paradisus
  english_pob_choice: paradise
  chosen_spanish: paraíso
  alternatives_spanish:
  - jardín del paraíso
  - paraíso celestial
  lexicon: paradisus > paraíso
  rationale: «Paraíso» es el equivalente natural y reconocido en español para el término latino y mantiene el matiz escatológico del texto sin añadir explicación no presente en la fuente.
- source_word: fructus incorruptus
  english_pob_choice: whose fruit remains incorruptible
  chosen_spanish: cuyo fruto permanece incorruptible
  alternatives_spanish:
  - cuyo fruto es incorruptible
  - cuyo fruto permanece sin corrupción
  lexicon: fructus > fruto; incorruptus > incorruptible
  rationale: «Permanece incorruptible» conserva tanto la cualidad del fruto como la idea de permanencia continua que expresa el participio/estado latino y la redacción inglesa auditada.
- source_word: saturitas
  english_pob_choice: fullness
  chosen_spanish: plenitud
  alternatives_spanish:
  - satisfacción
  - abundancia
  - hartura
  lexicon: saturitas > plenitud
  rationale: «Plenitud» comunica de manera digna y amplia la idea de saciedad o plenitud total sin restringir el sentido a una sola matización física de hambre.
- source_word: medella
  english_pob_choice: healing
  chosen_spanish: sanidad
  alternatives_spanish:
  - curación
  - medicina
  - remedio
  lexicon: medella > sanidad
  rationale: «Sanidad» mantiene el campo semántico de curación/restauración y funciona bien en registro bíblico; «curación» sería posible, pero «sanidad» preserva mejor la amplitud restaurativa del término.
theological_decisions:
- issue: Causal connector from quoniam
  english_pob_reading: And because paradise will be shown
  chosen_spanish_reading: Y porque se mostrará el paraíso
  alternative_spanish_readings:
  - Y ya que se mostrará el paraíso
  - Y pues se mostrará el paraíso
  rationale: La fuente latina usa «quoniam», que expresa causalidad; por eso se eligió «porque» en español, en línea con la corrección del audit trail inglés de «if» a «because».
  doctrine_reference: Gramática y semántica del conector causal; sin implicación doctrinal adicional.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que corrigió el valor de «quoniam» de condicional a causal («because»), manteniendo el resto de la frase inglesa como guía auditable y traduciendo directamente desde el latín limpiado.
  spanish_consistency_notes:
  - Se conservó el tono escatológico y formal sin introducir artículos o explicaciones ausentes en el latín.
  - «Sanidad» se usó como equivalente bíblico amplio de medella, evitando una restricción excesiva a «curación».
  - No se añadieron notas textuales porque el expediente fuente y la revisión muestran alta concordancia y no registran variantes relevantes.
