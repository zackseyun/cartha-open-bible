  yaml_path: translation/extra_canonical/2_esdras/007/066.yaml
  text: For it is much better for them than for us, for they do not expect judgment, nor do they know torments or the salvation promised after death.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:11Z'
    unchanged: false
    changes_summary: Replaced the second 'because' with 'for' for smoother, more formal English while preserving the meaning. No lexical changes beyond style.
translation:
  language: es
  text: Porque es mucho mejor para ellos que para nosotros, pues no esperan el juicio, ni conocen los tormentos ni la salvación prometida después de la muerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Multum enim melius est illis quam nobis
  english_pob_choice: For it is much better for them than for us
  chosen_spanish: Porque es mucho mejor para ellos que para nosotros
  alternatives_spanish:
  - Pues es mucho mejor para ellos que para nosotros
  - Porque les va mucho mejor a ellos que a nosotros
  lexicon: multum melius / comparative of advantage
  rationale: Conservo el comparativo de ventaja con una formulación natural en español. "Es mucho mejor para ellos que para nosotros" refleja el valor comparativo sin añadir matices ajenos al latín.
- source_word: non enim sperant iudicium
  english_pob_choice: for they do not expect judgment
  chosen_spanish: pues no esperan el juicio
  alternatives_spanish:
  - porque no esperan el juicio
  - pues no aguardan el juicio
  lexicon: sperant iudicium
  rationale: '"Esperan" mantiene el valor de expectativa futura de sperant. "El juicio" conserva la referencia escatológica sin añadir determinantes interpretativos.'
- source_word: nec sciunt torments or the salvation promised after death
  english_pob_choice: nor do they know torments or the salvation promised after death
  chosen_spanish: ni conocen los tormentos ni la salvación prometida después de la muerte
  alternatives_spanish:
  - ni conocen tormentos ni la salvación prometida después de la muerte
  - ni saben de tormentos ni de la salvación prometida tras la muerte
  lexicon: nec sciunt ... torments ... salutem promissam post mortem
  rationale: '"Conocen" reproduce bien sciunt en sentido de experiencia o conocimiento efectivo. "Los tormentos" mantiene el plural concreto del texto. "La salvación prometida después de la muerte" sigue de cerca la estructura latina sin forzar una paráfrasis doctrinal.'
theological_decisions:
- issue: Destino escatológico contrastado con el juicio
  english_pob_reading: they do not expect judgment, nor do they know torments or the salvation promised after death
  chosen_spanish_reading: no esperan el juicio, ni conocen los tormentos ni la salvación prometida después de la muerte
  alternative_spanish_readings:
  - no esperan el juicio, ni conocen tormentos ni la salvación prometida después de la muerte
  - no esperan el juicio, ni conocen los tormentos ni la salvación prometida tras la muerte
  rationale: El latín presenta un contraste entre quienes no esperan el juicio y, por eso, no conocen ni tormentos ni salvación futura. Mantengo esa tensión sin armonizarla ni suavizarla. No se introduce una glosa doctrinal inexistente en el texto.
  doctrine_reference: Escatología de juicio y retribución futura; fidelidad al contraste del texto apocalíptico
translation_notes:
  revision_awareness: 'El inglés auditado recibió solo un ajuste estilístico menor: sustituyó una segunda repetición de ''because'' por ''for'' sin cambiar el sentido. La versión española conserva ese mismo valor causal simple con ''porque/pues'' y no requiere nota textual adicional.'
  spanish_consistency_notes:
  - Se mantiene un español formal y comprensible, sin depender de fórmulas eclesiásticas tradicionales no presentes en el latín.
  - Se conserva 'el juicio' sin añadir mayúsculas ni explicaciones que excedan el texto.
  - '''Después de la muerte'' traduce post mortem de manera directa y natural; no se introduce ''vida eterna'' ni otras explicitaciones.'
