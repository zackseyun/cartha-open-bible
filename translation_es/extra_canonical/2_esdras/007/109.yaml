translation:
  language: es
  text: y Elías por los que recibieron lluvia y por el hombre muerto, para que viviera,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Helias
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elía
  lexicon: nombre propio bíblico
  rationale: El latín Helias corresponde al profeta bíblico Elías; en español, la forma estable y reconocible es «Elías».
- source_word: pro his qui pluviam acceperunt
  english_pob_choice: for those who received rain
  chosen_spanish: por los que recibieron la lluvia
  alternatives_spanish:
  - por los que recibieron lluvia
  - por aquellos que recibieron la lluvia
  lexicon: preposición + relativo + verbo recibir + lluvia
  rationale: Conservo la relación de beneficio introducida por pro con «por», y traduzco literalmente la imagen de «recibir la lluvia» sin suavizarla a una explicación interpretativa.
- source_word: pro mortuo
  english_pob_choice: for the dead man
  chosen_spanish: por el hombre muerto
  alternatives_spanish:
  - por el muerto
  - por el difunto
  lexicon: preposición + participio/adjetivo
  rationale: «Mortuo» es un referente masculino singular ya muerto; «el hombre muerto» mantiene claridad narrativa sin introducir una categoría más teológica de la necesaria.
- source_word: ut viveret
  english_pob_choice: that he might live
  chosen_spanish: para que viviera
  alternatives_spanish:
  - para que viviese
  - a fin de que viviera
  lexicon: cláusula de propósito + subjuntivo imperfecto
  rationale: «Ut» expresa propósito; en español, «para que viviera» reproduce bien la finalidad y el matiz de resultado deseado.
theological_decisions:
- issue: Relación de intercesión o beneficio en una lista breve
  english_pob_reading: and Elijah for those who received rain and for the dead man, that he might live
  chosen_spanish_reading: y Elías por los que recibieron la lluvia y por el hombre muerto, para que viviera
  alternative_spanish_readings:
  - y Elías por los que recibieron lluvia y por el hombre muerto, para que viviera
  - y Elías por quienes recibieron la lluvia y por el muerto, para que viviera
  rationale: El texto latino presenta una enumeración de intercesión/beneficio sin explicitar más. Mantengo la estructura abierta sin añadir sujetos o causas que el original no da.
  doctrine_reference: No aplica; se trata de una notación narrativa de intercesión en un contexto apocalíptico.
translation_notes:
  revision_awareness: 'La versión inglesa auditada añadió una coma antes de la cláusula de propósito: «..., that he might live». La traducción española conserva esa misma separación sintáctica con coma antes de «para que viviera», manteniendo el valor final sin sobreinterpretarlo.'
  spanish_consistency_notes:
  - Se mantiene «Elías» como forma bíblica estándar en español.
  - Se conserva «lluvia» de modo literal, sin convertirlo en una paráfrasis meteorológica o simbólica.
  - La puntuación refleja la revisión inglesa más reciente con coma antes de la finalidad.
