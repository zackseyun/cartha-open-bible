    issue: Repetición de «resplandor» para dos términos latinos distintos (nitorem y splendorem)
    rationale: Aunque ambos pertenecen al campo semántico de la luz, el texto acumula matices y la POB inglesa también distingue «brightness» de la radiancia final. En español conviene reservar otro término para el cierre, por ejemplo «fulgor», para mantener la progresión y evitar eco innecesario.
  revised_spanish_text: ni lluvia ni rocío, ni mediodía ni noche ni alba, ni resplandor ni esplendor ni luz, sino solo el fulgor de la gloria del Altísimo, por el cual todos comenzarán a ver lo que está puesto delante de ellos.
  revision_rationale: Se reemplaza el segundo «resplandor» por «fulgor» para distinguir el listado previo de fenómenos luminosos del clímax final, en línea con la diferenciación semántica del latín y la auditoría inglesa, sin alterar el sentido teológico ni la fluidez del español.
