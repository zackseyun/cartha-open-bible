translation:
  language: es
  text: ni lluvia ni rocío, ni mediodía ni noche ni alba, ni resplandor ni esplendor ni luz, sino solo el fulgor de la gloria del Altísimo, por el cual todos comenzarán a ver lo que está puesto delante de ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: pluuiam
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - agua de lluvia
  - aguacero
  lexicon: pluuiam = lluvia
  rationale: El latín incluye explícitamente lluvia; en español, «lluvia» es la correspondencia directa y natural. «Agua de lluvia» sería explicativo en exceso y «aguacero» estrecha indebidamente el sentido.
- source_word: rorem
  english_pob_choice: dew
  chosen_spanish: rocío
  alternatives_spanish:
  - rocío de la mañana
  - humedad
  lexicon: rorem = rocío
  rationale: «Rocío» conserva el valor léxico básico del latín y funciona bien en registro bíblico. No se amplía a «rocío de la mañana» porque el texto no lo especifica.
- source_word: meridiem
  english_pob_choice: noon
  chosen_spanish: mediodía
  alternatives_spanish:
  - el mediodía
  - mediodía pleno
  lexicon: meridiem = mediodía
  rationale: «Mediodía» expresa de manera natural el punto del día indicado por el latín. Mantiene el paralelismo con «noche» y «alba».
- source_word: ante lucem
  english_pob_choice: dawn
  chosen_spanish: alba
  alternatives_spanish:
  - amanecer
  - antes de la luz
  lexicon: ante lucem = antes de la luz / alba
  rationale: Aunque la forma latina dice literalmente «antes de la luz», el contexto cronológico pide una referencia al comienzo del día. «Alba» recoge esa idea con buena fluidez en español y evita la torpeza de un calco literal.
- source_word: nitorem
  english_pob_choice: brightness
  chosen_spanish: resplandor
  alternatives_spanish:
  - brillo
  - luminosidad
  lexicon: nitor = brillo, resplandor
  rationale: «Resplandor» transmite bien la cualidad de luz intensa o brillo visible. En español suena más bíblico y menos técnico que «brillo».
- source_word: claritatem
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - claridad
  - magnificencia
  lexicon: claritas = claridad, brillo, esplendor
  rationale: «Esplendor» conserva la elevación estilística del latín y distingue esta palabra de «resplandor» sin borrar la cercanía semántica entre ambas.
- source_word: lucem
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - lumbre
  - claridad
  lexicon: lux = luz
  rationale: «Luz» es la equivalencia directa y más transparente en español. Se evita sustituirla por «claridad» para no diluir la secuencia acumulativa del texto.
- source_word: splendorem
  english_pob_choice: radiance of the glory of the Most High
  chosen_spanish: resplandor de la gloria del Altísimo
  alternatives_spanish:
  - brillo de la gloria del Altísimo
  - fulgor de la gloria del Altísimo
  lexicon: splendor = resplandor / fulgor
  rationale: El latín concluye con solo «splendorem», pero la POB inglesa aclara que se trata del resplandor de la gloria del Altísimo. En español se mantiene esa aclaración para no perder el referente teológico explícito, usando «resplandor» porque enlaza con las luminosidades previas y suena natural en contexto bíblico.
theological_decisions:
- issue: Identidad del referente de la luz final
  english_pob_reading: the radiance of the glory of the Most High
  chosen_spanish_reading: el resplandor de la gloria del Altísimo
  alternative_spanish_readings:
  - la radiación de la gloria del Altísimo
  - el fulgor de la gloria del Altísimo
  rationale: El cierre no presenta una luz impersonal, sino la manifestación luminosa asociada a la gloria del Altísimo. «Altísimo» conserva el título reverente y evita una paráfrasis doctrinalmente más amplia que el latín no exige.
  doctrine_reference: Reverencia al Altísimo / manifestación de su gloria
translation_notes:
  revision_awareness: La revisión inglesa más reciente restauró «rain» y «dew» desde el latín y prefirió «but only» frente a «except only» por naturalidad. El español incorpora ambos elementos explícitos con «ni lluvia ni rocío» y usa «sino solo» para conservar el contraste restrictivo sin sonar forzado.
  spanish_consistency_notes:
  - Se mantuvo una cadena de términos luminosos diferenciados —«resplandor», «esplendor», «luz», «resplandor»— para respetar la acumulación del original y la clarificación final de la POB inglesa.
  - Se optó por «Altísimo» como traducción estable del título divino presente en la fuente inglesa, en un registro bíblico natural para el español.
  - No se añadió puntuación interpretativa extra ni se introdujeron notas textuales porque el pasaje y el audit trail no señalan variantes relevantes adicionales.
