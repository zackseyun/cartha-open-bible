review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del latín: la cláusula sobre quienes despreciaron, la exhortación a no contarse entre los atormentados, y la reserva de un tesoro de obras con el Altísimo hasta el tiempo final. Sin embargo, «junto al Altísimo» suena menos fiel para apud Altissimum que «con el Altísimo», y «los últimos tiempos» puede mejorarse a «los tiempos postreros» o similar para un registro más natural y digno. Además, el anclaje de la nota [a] sobre «han mostrado desprecio» no es necesario y la alternativa no añade suficiente valor.'
  spanish_quality_summary: El español es claro y legible, pero la apertura en minúscula depende del contexto de versificación; dentro de una cita independiente conviene mayúscula inicial. «Han mostrado desprecio» es comprensible, aunque «han despreciado» es más directo y natural en español sin perder el sentido. «Junto al Altísimo» suena espacial de forma algo rígida; «con el Altísimo» es más idiomático en este contexto.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Altísimo» es adecuado. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión para speruerunt puede expresarse con más naturalidad en español como «han despreciado», manteniendo el matiz léxico documentado.
  issues:
  - severity: medium
    issue: «junto al Altísimo» para apud Altissimum
    rationale: En este contexto de tesoro reservado ante/con el Altísimo, «junto al» suena demasiado espacial y menos idiomático. «Con el Altísimo» conserva mejor la relación de custodia o depósito implícita en apud.
  - severity: low
    issue: Nota [a] innecesaria y poco útil
    rationale: El texto principal ya usa una perífrasis aceptable; la nota alternativa «los que han despreciado» no preserva una ambigüedad relevante del original ni resuelve una dificultad nueva en español. Puede eliminarse para evitar ruido editorial.
  - severity: low
    issue: Mejora de naturalidad en «han mostrado desprecio»
    rationale: Aunque fiel, la expresión es algo pesada. «Han despreciado» transmite speruerunt de forma más natural y directa en español bíblico moderno.
  revised_spanish_text: Los que han despreciado, y no te cuentes entre los que son atormentados. Porque para ti está guardado un tesoro de obras con el Altísimo, pero no te será mostrado hasta los tiempos postreros.
  revision_rationale: Se simplifica «han mostrado desprecio» a «han despreciado» por mayor naturalidad sin pérdida semántica; se cambia «junto al Altísimo» por «con el Altísimo» para reflejar mejor apud en este contexto; y se elimina la nota innecesaria. «Tiempos postreros» da un registro escatológico más natural y digno en español eclesial amplio.
