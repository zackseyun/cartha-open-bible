translation:
  language: es
  text: los que han mostrado desprecio[a], y no te cuentes entre los que son atormentados. Porque para ti está guardado un tesoro de obras junto al Altísimo, pero no te será mostrado hasta los últimos tiempos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que han despreciado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: qui speruerunt
  english_pob_choice: who have shown contempt
  chosen_spanish: los que han mostrado desprecio
  alternatives_spanish:
  - los que despreciaron
  - los que han despreciado
  lexicon: spernere / spernō
  rationale: El latín aquí expresa la idea de despreciar, rechazar con desdén; en español, «han mostrado desprecio» conserva el valor relacional del acto y evita una paráfrasis excesiva. Se mantiene el matiz de desprecio más que una simple incredulidad.
- source_word: neque connumeres te cum his qui cruciantur
  english_pob_choice: and do not count yourself among those who are tormented
  chosen_spanish: y no te cuentes entre los que son atormentados
  alternatives_spanish:
  - y no te cuentes entre los atormentados
  - y no te consideres entre los que padecen tormento
  lexicon: connumerare
  rationale: «Contarse entre» reproduce bien la idea de incluirse en un grupo. «Son atormentados» mantiene el carácter pasivo del latín cruciantur y el sentido de sufrimiento intenso sin suavizarlo.
- source_word: thesaurus operum repositus
  english_pob_choice: a treasury of works is laid up
  chosen_spanish: un tesoro de obras está guardado
  alternatives_spanish:
  - un tesoro de obras está reservado
  - un depósito de obras está guardado
  lexicon: thesaurus / repositus
  rationale: «Tesoro» y «guardado» reflejan con naturalidad thesaurus repositus. «Obras» conserva la referencia a hechos/acciones acumulados, evitando convertirlo en una abstracción doctrinal ajena al latín.
- source_word: apud Altissimum
  english_pob_choice: with the Most High
  chosen_spanish: junto al Altísimo
  alternatives_spanish:
  - con el Altísimo
  - ante el Altísimo
  lexicon: Altissimus
  rationale: «Junto al» reproduce la localización relacional de apud sin forzar un sentido posesivo. «Altísimo» es la forma natural y reverente para designar a Dios en español.
- source_word: sed non tibi demonstrabitur usque in nouissimis
  english_pob_choice: but it will not be shown to you until the last times
  chosen_spanish: pero no te será mostrado hasta los últimos tiempos
  alternatives_spanish:
  - pero no te será revelado hasta el fin
  - pero no se te mostrará hasta los últimos tiempos
  lexicon: demonstrabitur / nouissimis
  rationale: «Será mostrado» sigue de cerca el pasivo latino y evita introducir «revelado» si no está explícito en el texto. «Los últimos tiempos» traduce nouissimis con una forma escatológica clara y sobria.
theological_decisions:
- issue: 'Sentido de la primera cláusula: condena moral vs. desprecio/rechazo'
  english_pob_reading: who have shown contempt
  chosen_spanish_reading: los que han mostrado desprecio
  alternative_spanish_readings:
  - los que han sido despectivos
  - los que han despreciado
  rationale: El latín speruerunt apunta a desprecio o rechazo, no a una acusación doctrinal específica. Se evita intensificarlo hacia una fórmula teológica más fuerte de lo que el texto prueba.
  doctrine_reference: lexical_semantics; no doctrinal specification beyond the source
- issue: Destino de las obras reservadas y la temporalidad escatológica
  english_pob_reading: a treasury of works is laid up for you ... until the last times
  chosen_spanish_reading: para ti está guardado un tesoro de obras ... hasta los últimos tiempos
  alternative_spanish_readings:
  - hay para ti un tesoro de obras reservado
  - tienes guardado un tesoro de obras
  rationale: 'La redacción conserva la tensión del texto: hay una reserva real de obras, pero su manifestación está diferida. No se explica ni se armoniza con otras doctrinas; se mantiene el lenguaje escatológico explícito del latín.'
  doctrine_reference: eschatology; reward according to works in 2 Esdras
translation_notes:
  revision_awareness: 'La alineación del inglés POB se corrigió respecto de la división latina de este versículo: la cláusula inicial («qui speruerunt, neque connumeres te cum his qui cruciantur») pertenece a 2 Esdras 7:77 y debía aparecer en esta unidad. La versión española sigue esa división y conserva el contraste entre desprecio, sufrimiento y el tesoro de obras reservado para el futuro.'
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para apud Altissimum, coherente con el tratamiento reverente del latín.
  - Se conserva «obras» en sentido de acciones/méritos acumulados, sin cambiarlo por términos eclesiásticos más interpretativos.
  - La pasiva «será mostrado» preserva la forma del latín demonstrabitur y evita una ampliación interpretativa.
