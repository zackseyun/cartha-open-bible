translation:
  language: es
  text: Pero ellos no le creyeron, ni a los profetas después de él, ni siquiera a mí, que les hablé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Non crediderunt
  english_pob_choice: But they did not believe
  chosen_spanish: Pero ellos no le creyeron
  alternatives_spanish:
  - Pero no creyeron en él
  - Pero ellos no creyeron
  lexicon: credere -> creer
  rationale: El latino crediderunt exige el sentido básico de creer/tener fe en el testimonio recibido. En español, «no le creyeron» conserva el objeto personal indirecto y suena natural, sin añadir un objeto preposicional que el texto no requiere.
- source_word: ei
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a ese hombre
  lexicon: pronombre dativo
  rationale: El dativo ei se refleja bien con «le» en español, manteniendo la referencia personal directa a la figura previa sin sobrecargar la frase.
- source_word: sed nec post eum prophetis
  english_pob_choice: nor the prophets after him
  chosen_spanish: ni a los profetas después de él
  alternatives_spanish:
  - ni tampoco a los profetas que vinieron después de él
  - ni a los profetas posteriores a él
  lexicon: post + pronombre
  rationale: «Después de él» reproduce con sobriedad post eum y evita interpretar más allá de la secuencia temporal expresada por el latín.
- source_word: nec mihi
  english_pob_choice: nor even me
  chosen_spanish: ni siquiera a mí
  alternatives_spanish:
  - ni a mí tampoco
  - ni aún a mí
  lexicon: ego pronombre
  rationale: «Ni siquiera a mí» conserva el énfasis adversativo de nec mihi y mantiene el orden natural del español.
- source_word: qui locutus sum ad eos
  english_pob_choice: who spoke to them
  chosen_spanish: que les hablé
  alternatives_spanish:
  - que les he hablado
  - quien les habló
  lexicon: loqui -> hablar
  rationale: El participio latino locutus sum pide un verbo de habla en pasado; «les hablé» es la forma más directa y fiel. Se evita «he hablado» porque el latín no exige matiz resultativo perfecto.
theological_decisions:
- issue: Identidad del hablante en «mihi qui locutus sum ad eos»
  english_pob_reading: nor even me, who spoke to them
  chosen_spanish_reading: ni siquiera a mí, que les hablé
  alternative_spanish_readings:
  - ni siquiera a mí, que les había hablado
  - ni siquiera a mí, quien les habló
  rationale: El texto latino presenta al hablante como sujeto de locutus sum sin desarrollar explícitamente su identidad. La traducción conserva esa ambigüedad referencial sin identificarlo, y mantiene el énfasis en la incredulidad humana ante la cadena profética y la palabra divina.
  doctrine_reference: Respeto a la ambigüedad del discurso directo y a la progresión profética del pasaje; no se añade identificación doctrinal no presente en el latín.
translation_notes:
  revision_awareness: La versión inglesa POB y el control cruzado coinciden plenamente con el texto latino, sin notas ni revisiones aplicadas; por eso la versión española sigue de cerca la estructura del original sin introducir variantes textuales.
  spanish_consistency_notes:
  - Se mantiene el paralelismo negativo repetido de non... sed nec... sed nec... con «pero... ni... ni siquiera...», reflejando el énfasis acumulativo del latín.
  - Se usa «creyeron» en sentido relacional de confiar/aceptar el testimonio, coherente con crediderunt.
  - No se introduce puntuación interpretativa adicional más allá de las comas necesarias para la lectura en español.
