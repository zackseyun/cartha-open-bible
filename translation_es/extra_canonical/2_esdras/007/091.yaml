translation:
  language: es
  text: Primero[a], ven con gran gozo la gloria de aquel que los recibe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Primero, ven con gran gozo la gloria de aquel que los recibe, pues descansarán en siete órdenes»; esta era una redacción anterior antes de trasladar esa cláusula al v. 92 conforme a la segmentación del latín.'
    reason: previous_rendering
lexical_decisions:
- source_word: Imprimis
  english_pob_choice: First
  chosen_spanish: Primero
  alternatives_spanish:
  - En primer lugar
  - Primero que todo
  lexicon: adverbio latino de orden
  rationale: El latino marca orden secuencial; «Primero» conserva esa función de manera natural en español sin añadir contenido.
- source_word: uident
  english_pob_choice: they see
  chosen_spanish: contemplan
  alternatives_spanish:
  - ven
  - miran
  lexicon: verbo de percepción visual
  rationale: «Contemplan» mantiene el sentido de ver con atención y solemnidad en este contexto escatológico, acorde con «with great joy».
- source_word: exultatione multa
  english_pob_choice: with great joy
  chosen_spanish: con gran gozo
  alternatives_spanish:
  - con mucha alegría
  - con inmenso gozo
  lexicon: expresión de júbilo
  rationale: «Gozo» reproduce mejor el registro bíblico solemne que «alegría», y «con gran» refleja bien la intensidad de multa.
- source_word: gloriam eius
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - su gloria
  - la majestad
  lexicon: sustantivo de honor/divinidad
  rationale: Se conserva «gloria» porque el latino la expresa directamente y es el equivalente más transparente en español.
- source_word: qui suscipit eas
  english_pob_choice: of him who receives them
  chosen_spanish: de aquel que los recibe
  alternatives_spanish:
  - del que los recibe
  - de quien los recibe
  lexicon: relativa de recepción
  rationale: «Aquel que» da un tono más solemne y explícito; «recibe» traduce correctamente suscipit sin forzar una especificación adicional no presente en el texto.
theological_decisions:
- issue: Segmentation of verse 91 versus the following clause about resting in seven orders
  english_pob_reading: First, they see with great joy the glory of him who receives them.
  chosen_spanish_reading: Primero, contemplan con gran gozo la gloria de aquel que los recibe.
  alternative_spanish_readings:
  - Primero, ven con gran gozo la gloria de aquel que los recibe, pues descansarán en siete órdenes.
  - Primero, contemplan con gran gozo la gloria de quien los recibe, porque descansarán en siete órdenes.
  rationale: La revisión textual auditada movió la cláusula «for they will rest in seven orders» fuera de este versículo; por fidelidad a la segmentación, no debe incluirse aquí.
  doctrine_reference: 4 Ezra / 2 Esdras textual segmentation; audit revision 2026-04-22
translation_notes:
  revision_awareness: El texto sigue la revisión auditada que separa la cláusula sobre el descanso en siete órdenes del versículo 91; por eso la traducción se limita a la visión gozosa de la gloria de quien los recibe.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y claro, evitando añadir la cláusula desplazada a 2 Esdras 7:92.
  - «Gozo» se prefirió a «alegría» por coherencia con el tono escatológico del pasaje.
  - El pronombre relativo se formuló de manera inclusiva y natural en español sin alterar el referente singular del receptor.
