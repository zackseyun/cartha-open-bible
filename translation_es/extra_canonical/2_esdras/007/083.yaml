- from: 'El tercer camino: ven el galardón[a] reservado para los que han confiado en los pactos del Altísimo.'
  to: 'El tercer camino: ven el galardón[a] reservado para los que han puesto su confianza en los pactos del Altísimo.'
  rationale: Se mantiene el sentido del inglés POB y la terminología principal, pero se ajusta «han confiado en» a «han puesto su confianza en» para lograr un español más natural y claramente relacional, sin introducir una paráfrasis nueva ni alterar el número «pactos».
  reviewer_model: gpt-5.4
