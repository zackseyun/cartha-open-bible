translation:
  language: es
  text: 'El tercer camino: ven el galardón[a] reservado para los que han puesto su confianza en los pactos del Altísimo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recompensa».
    reason: lexical_alternative
lexical_decisions:
- source_word: uersionem bonam facere ut uiuant
  english_pob_choice: they see the reward laid up for those who have trusted the covenants of the Most High
  chosen_spanish: han confiado en los pactos del Altísimo
  alternatives_spanish:
  - han guardado los pactos del Altísimo
  - han creído en los pactos del Altísimo
  - han sido fieles a los pactos del Altísimo
  lexicon: confiar / pacto / Altísimo
  rationale: El latino transmitido en el contexto apunta a una relación de fidelidad/confianza vinculada a los pactos; por eso se conserva «confiado» para reflejar el matiz de dependencia fiel, y «pactos» para el lenguaje bíblico de covenants. «Altísimo» traduce de manera estable al superlativo divino sin introducir una fórmula eclesiástica ajena al texto.
- source_word: repositam mercedem
  english_pob_choice: the reward laid up
  chosen_spanish: el galardón reservado
  alternatives_spanish:
  - la recompensa guardada
  - la paga almacenada
  - el premio preparado
  lexicon: merced / galardón / reservar
  rationale: «Mercedem» puede ser «recompensa» o «galardón»; se eligió «galardón» por su tono bíblico y porque conserva la idea de retribución debida sin banalizarla. «Reservado» expresa con naturalidad la pasiva de «repositam» y la imagen de algo guardado para un tiempo futuro.
- source_word: Tertia uia
  english_pob_choice: The third way
  chosen_spanish: El tercer camino
  alternatives_spanish:
  - La tercera vía
  - El tercer modo
  - La tercera manera
  lexicon: uia / camino / vía
  rationale: «Via» se puede verter como «vía», «camino» o «manera». Se prefirió «camino» por ser claro y bíblicamente transparente en español, manteniendo el sentido de una opción o ruta de vida. El inglés POB usa «way»; «camino» conserva ese valor sin sonar técnico.
theological_decisions:
- issue: 'Nature of the final clause: trusting the covenants of the Most High versus simply observing them'
  english_pob_reading: those who have trusted the covenants of the Most High
  chosen_spanish_reading: los que han confiado en los pactos del Altísimo
  alternative_spanish_readings:
  - los que han guardado los pactos del Altísimo
  - los que han obedecido los pactos del Altísimo
  rationale: El testimonio latino disponible no obliga a reducir la frase a mera observancia externa; la traducción inglesa ya entendió el pasaje en clave de confianza en los pactos. En español se preserva esa lectura para no borrar la dimensión relacional y de fe implícita en el contexto.
  doctrine_reference: fidelidad del pacto / confianza en las promesas divinas
- issue: Rendering of 'reward' in an eschatological context
  english_pob_reading: the reward laid up
  chosen_spanish_reading: el galardón reservado
  alternative_spanish_readings:
  - la recompensa reservada
  - la retribución guardada
  rationale: En un contexto escatológico, «galardón» comunica mejor la recompensa futura prometida sin volverla meramente contractual. «Reservado» mantiene la idea de depósito/almacenamiento futuro que está en el latín y en el inglés auditado.
  doctrine_reference: retribución final / esperanza escatológica
translation_notes:
  revision_awareness: La versión en inglés auditada ya fue revisada y quedó sin cambios; esta propuesta española sigue esa lectura estable y no introduce reajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» como traducción regular de Most High.
  - Se usa «pactos» para covenant en plural, conforme al inglés auditado y al plural del contexto latino.
  - Se evita «SEÑOR» como sustituto de Yahvé, ya que aquí el referente es 'Most High' y no aparece el nombre divino tetragramático.
