translation:
  language: es
  text: Porque el día del juicio será el fin de este tiempo y el comienzo del tiempo inmortal que ha de venir[a], en el cual la corrupción ha pasado,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «el tiempo inmortal futuro».'
    reason: alternative_reading
lexical_decisions:
- source_word: Dies enim iudicii
  english_pob_choice: the day of judgment
  chosen_spanish: el día del juicio
  alternatives_spanish:
  - el día del juicio final
  - el día del juicio divino
  lexicon: dies / iudicium
  rationale: ‘Dies iudicii’ es una fórmula escatológica directa; ‘el día del juicio’ conserva la concisión y el registro bíblico sin añadir ‘final’ ni ‘divino’, que no están en el latín.
- source_word: erit finis temporis huius
  english_pob_choice: will be the end of this time
  chosen_spanish: será el fin de este tiempo
  alternatives_spanish:
  - será el término de este tiempo
  - será el final de este tiempo
  lexicon: finis / tempus
  rationale: ‘Finis’ se rinde naturalmente como ‘fin’; ‘este tiempo’ mantiene el contraste de las dos edades sin forzar una ampliación interpretativa.
- source_word: initium futuri inmortalistemporis
  english_pob_choice: the beginning of the immortal time to come
  chosen_spanish: el comienzo del tiempo inmortal que ha de venir
  alternatives_spanish:
  - el inicio del tiempo inmortal venidero
  - el comienzo del tiempo inmortal futuro
  lexicon: initium / futurus / immortalis / tempus
  rationale: ‘Futuri’ en este contexto apocalíptico expresa ‘que ha de venir’, una forma natural en español para el tiempo venidero, y preserva el matiz escatológico observado en el audit trail; ‘inmortal’ traduce directamente ‘inmortalis’.
- source_word: in quo pertransivit corruptela
  english_pob_choice: in which corruption has passed away
  chosen_spanish: en el cual la corrupción habrá pasado
  alternatives_spanish:
  - en el cual la corrupción habrá desaparecido
  - en el que la corrupción habrá pasado
  lexicon: in quo / pertransivit / corruptela
  rationale: ‘Pertransivit’ admite la idea de ‘haber pasado’ o ‘haber desaparecido’; ‘habrá pasado’ mantiene el movimiento consumado sin añadir un sujeto implícito. ‘Corrupción’ refleja bien ‘corruptela’ en un registro bíblico claro.
theological_decisions:
- issue: 'Las dos edades: este tiempo frente al tiempo inmortal venidero'
  english_pob_reading: the end of this time and the beginning of the immortal time to come
  chosen_spanish_reading: el fin de este tiempo y el comienzo del tiempo inmortal que ha de venir
  alternative_spanish_readings:
  - el fin de esta era y el comienzo de la era inmortal venidera
  - el fin de este tiempo presente y el comienzo del tiempo inmortal futuro
  rationale: El latín contrapone dos fases escatológicas; ‘este tiempo’ / ‘tiempo inmortal que ha de venir’ conserva la antítesis sin introducir ‘era’ donde el texto base dice ‘tempus’.
  doctrine_reference: Escatología apocalíptica de las dos edades; 4 Esdras 7:113 en su marco literario.
- issue: La corrupción que cesa en el orden venidero
  english_pob_reading: in which corruption has passed away
  chosen_spanish_reading: en el cual la corrupción habrá pasado
  alternative_spanish_readings:
  - en el cual la corrupción habrá desaparecido
  - en donde la corrupción ya no estará
  rationale: El latín indica que la corrupción ha quedado atrás en el tiempo venidero; la redacción española conserva esa cesación sin convertirla en una paráfrasis doctrinal más amplia.
  doctrine_reference: Imagen apocalíptica de la renovación final y el cese de la corrupción.
translation_notes:
  revision_awareness: El audit trail inglés revisó ‘the future immortal time’ a ‘the immortal time to come’ para ajustar el registro apocalíptico de la expresión; la traducción española sigue ese ajuste con ‘el tiempo inmortal que ha de venir’.
  spanish_consistency_notes:
  - Se mantiene ‘tiempo’ para traducir ‘tempus’, evitando introducir ‘era’ sin necesidad textual.
  - Se usa ‘corrupción’ para ‘corruptela’, que es natural en español bíblico y conserva el sentido de deterioro/caducidad.
  - No se sustituye ‘Yahvé’ ni ‘Mesías’ porque este versículo no contiene esos términos.
