    changes_summary: Changed 'show mercy to' to 'have mercy on' for more natural formal English, and revised 'has been condemned' to 'has been defeated' to reflect Latin victus more directly.
translation:
  language: es
  text: Por tanto, nadie podrá entonces tener misericordia de quien haya sido vencido[a] en el juicio, ni derribar a quien haya prevalecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «derrotado».
    reason: previous_rendering
lexical_decisions:
- source_word: misereri
  english_pob_choice: have mercy on
  chosen_spanish: tener misericordia de
  alternatives_spanish:
  - mostrar misericordia a
  - compadecerse de
  lexicon: misericordia
  rationale: El latín misereri expresa compasión activa; en español, «tener misericordia de» conserva bien el registro bíblico y no añade matices ajenos. «Mostrar misericordia a» es más explicativo, pero menos directo.
- source_word: in iudicio
  english_pob_choice: in the judgment
  chosen_spanish: en el juicio
  alternatives_spanish:
  - en el juicio final
  - ante el juicio
  lexicon: juicio
  rationale: La preposición y el sustantivo latinos son forenses; «en el juicio» mantiene la referencia judicial sin ampliar innecesariamente a «final». El contexto ya sugiere el ámbito del juicio escatológico.
- source_word: victus fuerit / vicerit
  english_pob_choice: has been defeated / has prevailed
  chosen_spanish: haya sido vencido / haya prevalecido
  alternatives_spanish:
  - haya sido derrotado / haya vencido
  - haya perdido / haya ganado
  lexicon: vincere
  rationale: 'Se conserva la antítesis forense del latín: victus como «vencido» y vicerit como «ha prevalecido». «Prevalecido» sigue la revisión inglesa que corrigió «conquered» a «prevailed» por el contexto judicial.'
- source_word: demergere
  english_pob_choice: cast down
  chosen_spanish: derribar
  alternatives_spanish:
  - abatir
  - hacer caer
  lexicon: demergere
  rationale: «Derribar» comunica la idea de hacer caer o precipitar sin introducir una imagen demasiado técnica. Mantiene el paralelo verbal con la primera cláusula y funciona bien en español bíblico.
theological_decisions:
- issue: Sentido forense del juicio frente a un sentido meramente punitivo
  english_pob_reading: in the judgment; has been defeated / has prevailed
  chosen_spanish_reading: en el juicio; haya sido vencido / haya prevalecido
  alternative_spanish_readings:
  - en el juicio final; haya sido condenado / haya vencido
  - ante el tribunal; haya perdido / haya ganado
  rationale: La pareja victus/vicerit se entiende mejor como un proceso judicial en el que una parte resulta vencida o queda vindicada. La redacción española preserva ese alcance forense sin forzar una lectura militar.
  doctrine_reference: Justicia/juicio escatológico; vindicación en contexto judicial
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que corrigió el sentido de victus/vicerit para reflejar mejor el marco forense de la cláusula y reemplazó la opción anterior «conquered» por «prevailed».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el texto no contiene el nombre divino.
  - Se conservó el paralelismo antitético entre la cláusula negativa y la afirmativa.
  - «Juicio» se usa con valor forense, coherente con la lectura auditada del latín.
