revisions:
- from: Por tanto, entonces nadie podrá tener misericordia de quien haya sido vencido[a] en el juicio, ni derribar a quien haya prevalecido.
  to: Por tanto, nadie podrá entonces tener misericordia de quien haya sido vencido[a] en el juicio, ni derribar a quien haya prevalecido.
  rationale: Se mantiene el sentido del original y del inglés auditado, pero se corrige la nota para que la alternativa sea idiomática en español y coherente con la observación de un renderizado previo menos forense. También se reordena levemente «entonces» para mejorar la fluidez sin alterar el significado.
