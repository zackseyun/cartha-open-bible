    changes_summary: Adjusted 'though it was you who sinned' to the more direct 'if you sinned' to reflect si enim tu peccasti more closely; revised the final clause to 'but also ours, we who have come from you' for a more natural and complete rendering of sed et nostrum qui ex te advenimus.
translation:
  language: es
  text: ¡Oh, Adán[a]! ¿Qué has hecho? Porque, aunque tú pecaste, tu caída no fue solo tuya, sino también la nuestra, la de los que hemos venido de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Porque si pecaste,».'
    reason: Conservar la alternativa más literal del latín si, mientras el texto principal usa una formulación más natural en español para evitar una duda no pretendida.
lexical_decisions:
- source_word: O tu quid fecisti, Adam?
  english_pob_choice: O Adam, what have you done?
  chosen_spanish: ¡Oh, Adán, qué has hecho!
  alternatives_spanish:
  - ¡Oh, Adán, qué hiciste!
  - Adán, ¿qué has hecho?
  lexicon: Latin interjección o; quid fecisti
  rationale: Conserva la invocación retórica directa y el reproche del original. «Qué has hecho» mantiene la vivacidad de la pregunta sin rebajar el registro; «¡Oh!» reproduce el valor exclamativo de «O».
- source_word: si enim tu peccasti
  english_pob_choice: For if you sinned,
  chosen_spanish: Porque si pecaste,
  alternatives_spanish:
  - Pues si pecaste,
  - Porque aunque pecaste,
  lexicon: si; peccasti
  rationale: La cláusula latina introduce la razón del reproche. «Si» se mantiene como condicional explícito en el texto principal, acorde con la revisión auditada del inglés POB; «pecaste» traduce el perfecto simple latino con un pretérito natural en español.
- source_word: non est factum solius tuus casus
  english_pob_choice: your fall was not yours alone
  chosen_spanish: tu caída no fue solo tuya
  alternatives_spanish:
  - tu caída no fue únicamente tuya
  - tu ruina no fue solo tuya
  lexicon: casus; solius
  rationale: '«Casus» se rinde con «caída» para preservar la imagen de caída/ruina sin añadir interpretación excesiva. «Solius» exige exclusividad: «solo tuya» conserva el contraste con el alcance colectivo del efecto.'
- source_word: sed et nostrum qui ex te advenimus
  english_pob_choice: but also ours, we who have come from you
  chosen_spanish: sino también nuestra, los que hemos venido de ti
  alternatives_spanish:
  - sino también nuestra, nosotros que hemos venido de ti
  - sino también de nosotros, los que hemos venido de ti
  lexicon: sed et; nostrum; qui ex te advenimus
  rationale: «Sed et» se expresa mejor como «sino también» en español por la contraposición enfática. «Ex te advenimus» se vierte con «hemos venido de ti» para mantener la procedencia personal del linaje, sin suavizar la idea de derivación desde Adán.
theological_decisions:
- issue: Alcance del pecado de Adán y su consecuencia colectiva
  english_pob_reading: your fall was not yours alone, but also ours, we who have come from you
  chosen_spanish_reading: tu caída no fue solo tuya, sino también nuestra, los que hemos venido de ti
  alternative_spanish_readings:
  - tu caída no fue únicamente tuya, sino también nuestra
  - tu ruina no fue solo tuya, sino también nuestra
  rationale: El versículo afirma tanto la singularidad del pecado de Adán como la participación de la humanidad en su consecuencia. La redacción española conserva esa tensión sin convertirla en una explicación doctrinal añadida ni diluir la responsabilidad personal de Adán.
  doctrine_reference: pecado original / solidaridad adámica
translation_notes:
  revision_awareness: La versión final del inglés auditado volvió de una lectura concesiva («though») a una condicional más directa («if»). Por eso el español principal conserva «si pecaste» y no adopta una concesión explícita, aunque el valor argumentativo del pasaje sigue siendo enfático.
  spanish_consistency_notes:
  - Se mantiene «Adán» como forma estable del nombre propio.
  - Se usa «caída» para reproducir casus sin cargar el verso con terminología doctrinal posterior.
  - «Hemos venido de ti» conserva la relación de procedencia del latín ex te advenimus.
  - El registro es solemne pero claro, apto para lectura pública.
