base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/118.yaml
  text: O Adam[a], what have you done? For if you sinned, your fall was not yours alone, but also ours, we who have come from you.
  footnotes:
  - marker: a
    text: Or 'For if you sinned,'.
