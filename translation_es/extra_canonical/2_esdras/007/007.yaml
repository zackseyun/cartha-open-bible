base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/007.yaml
  text: But its entrance is narrow and set on a precipice, so that on the right there is fire and on the left deep water.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:58Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Pero su entrada es estrecha y está sobre un precipicio, de modo que a la derecha hay fuego y a la izquierda agua profunda.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: introitus
  english_pob_choice: entrance
  chosen_spanish: entrada
  alternatives_spanish:
  - ingreso
  - acceso
  lexicon: entrada
  rationale: El latín introitus designa el punto de ingreso; 'entrada' es la forma natural y transparente en español, conservando el sentido espacial del original sin elevar el registro de manera innecesaria.
- source_word: angustus
  english_pob_choice: narrow
  chosen_spanish: estrecha
  alternatives_spanish:
  - angosta
  - reducida
  lexicon: estrecho
  rationale: Angustus expresa poca amplitud; 'estrecha' comunica con claridad la restricción física. 'Angosta' también sería posible, pero 'estrecha' suena más fluida en este contexto.
- source_word: in praecipiti positus
  english_pob_choice: set on a precipice
  chosen_spanish: está sobre un precipicio
  alternatives_spanish:
  - está puesta en un precipicio
  - está al borde de un precipicio
  lexicon: precipicio
  rationale: La construcción latina indica una ubicación peligrosa y expuesta. 'Está sobre un precipicio' preserva la imagen de riesgo y declive sin forzar una estructura demasiado literal en español.
- source_word: a dextris ... a sinistris
  english_pob_choice: on the right ... on the left
  chosen_spanish: a la derecha ... a la izquierda
  alternatives_spanish:
  - del lado derecho ... del lado izquierdo
  - a diestra ... a siniestra
  lexicon: derecha/izquierda
  rationale: La oposición espacial es directa; 'a la derecha' y 'a la izquierda' son las equivalencias más naturales y transparentes en español contemporáneo.
- source_word: ignis
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llamas
  - incendio
  lexicon: fuego
  rationale: '''Fuego'' mantiene la imagen elemental y puede abarcar tanto fuego físico como amenaza destructiva, como en el latín y en la versión inglesa auditada.'
- source_word: aqua alta
  english_pob_choice: deep water
  chosen_spanish: agua profunda
  alternatives_spanish:
  - agua honda
  - aguas profundas
  lexicon: agua profunda
  rationale: El latín aqua alta señala agua de gran profundidad. 'Agua profunda' conserva la sustantivación singular del original y la imagen de peligro acuático.
theological_decisions:
- issue: Imaginería de peligro a ambos lados de la entrada
  english_pob_reading: on the right there is fire and on the left deep water
  chosen_spanish_reading: a la derecha hay fuego y a la izquierda agua profunda
  alternative_spanish_readings:
  - a la derecha hay fuego y a la izquierda aguas profundas
  - a la derecha hay fuego y a la izquierda un agua profunda
  rationale: No hay una tensión doctrinal particular aquí, pero sí una imagen deliberadamente simétrica de amenaza. Se conserva la estructura de contraste espacial y el carácter peligroso de ambos lados sin suavizarla.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo externo mostró alto acuerdo; por tanto, este borrador sigue de cerca la lectura inglesa auditada y el latín limpio, sin introducir ajustes críticos adicionales.
  spanish_consistency_notes:
  - Se mantiene el tratamiento impersonal y descriptivo propio del pasaje.
  - No se introducen términos eclesiásticos ajenos al latín fuente.
  - '''agua profunda'' conserva el paralelismo con ''fuego'' y evita una paráfrasis interpretativa.'
