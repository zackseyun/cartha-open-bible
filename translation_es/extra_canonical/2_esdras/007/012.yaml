translation:
  language: es
  text: Y las entradas de este siglo llegaron a ser angostas y dolorosas[a] y laboriosas, pocas y malas, llenas de peligros y cargadas de grandes trabajos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aflictivas».
    reason: Preserva la alternativa previa del audit trail inglés («sorrowful») con una opción española distinta de la lectura principal.
lexical_decisions:
- source_word: introitus
  english_pob_choice: entrances
  chosen_spanish: entradas
  alternatives_spanish:
  - accesos
  - entradas de acceso
  - portales
  lexicon: Latin introitus
  rationale: «Entradas» conserva la imagen espacial de acceso/ingreso y sigue de cerca el sustantivo plural del latín sin volverlo más interpretativo que el original.
- source_word: huius saeculi
  english_pob_choice: this age
  chosen_spanish: de este siglo
  alternatives_spanish:
  - de este tiempo
  - de esta era
  lexicon: Latin saeculum
  rationale: «Siglo» puede expresar aquí el orden o era presente, en un registro bíblico natural en español, y mantiene la tensión temporal/escatológica del latín.
- source_word: angusti
  english_pob_choice: narrow
  chosen_spanish: angostas
  alternatives_spanish:
  - estrechas
  - reducidas
  lexicon: Latin angustus
  rationale: «Angostas» conserva la imagen física de estrechez y combina bien con «entradas» en español.
- source_word: dolentes
  english_pob_choice: painful
  chosen_spanish: dolorosas
  alternatives_spanish:
  - penosas
  - aflictivas
  - sorrowful
  lexicon: Latin dolens
  rationale: El latín describe algo que causa dolor; «dolorosas» refleja mejor ese valor que «dolientes», que en español suele aplicarse a quien padece, no a un acceso o camino.
- source_word: laboriosi
  english_pob_choice: laborious
  chosen_spanish: laboriosas
  alternatives_spanish:
  - fatigosas
  - trabajosas
  lexicon: Latin laboriosus
  rationale: «Laboriosas» reproduce la cualidad de trabajo y esfuerzo del latín con un término transparente y fiel al paralelismo de la serie adjetival.
- source_word: paucae
  english_pob_choice: few
  chosen_spanish: pocas
  alternatives_spanish:
  - escasas
  - raras
  lexicon: Latin paucus
  rationale: «Pocas» es la correspondencia directa y más natural en español.
- source_word: malae
  english_pob_choice: evil
  chosen_spanish: malas
  alternatives_spanish:
  - perversas
  - nocivas
  lexicon: Latin malus
  rationale: «Malas» mantiene el juicio moral general del latín sin sobreespecificar; «malvadas» sería más fuerte de lo que exige el texto.
- source_word: periculorum plenae
  english_pob_choice: full of dangers
  chosen_spanish: llenas de peligros
  alternatives_spanish:
  - colmadas de peligros
  - repletas de peligros
  lexicon: Latin periculum + plenus
  rationale: La imagen de plenitud se conserva con «llenas de peligros», una fórmula directa y clara en español.
- source_word: laborum magnorum fultae
  english_pob_choice: burdened with great hardships
  chosen_spanish: cargadas de grandes trabajos
  alternatives_spanish:
  - sostenidas por grandes trabajos
  - apoyadas en grandes fatigas
  - cargadas de grandes fatigas
  lexicon: Latin labor + fulcio
  rationale: «Fultae» sugiere estar sostenidas o cargadas; «cargadas de grandes trabajos» reproduce la carga opresiva del original y conserva «trabajos» como equivalente bíblico de penalidad/esfuerzo.
theological_decisions:
- issue: Descripción de la condición presente del mundo/edad
  english_pob_reading: this age
  chosen_spanish_reading: este siglo
  alternative_spanish_readings:
  - este tiempo
  - esta era
  rationale: «Siglo» preserva el sentido de orden presente del mundo tal como aparece en la tradición bíblica latina, sin introducir una interpretación doctrinal adicional.
  doctrine_reference: Eschatological age / present age contrast
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió «sorrowful» por «painful» para evitar personificar las entradas; por eso el español usa «dolorosas», que expresa el valor causativo del latín dolentes y mantiene la serie adjetival del texto.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo adjetival de seis miembros con una puntuación coordinada simple, acorde con el latín.
  - «Este siglo» se usó en sentido de era presente, no de cien años, siguiendo el uso bíblico tradicional de saeculum.
  - La nota a marca la alternativa lexical preservada por el audit trail inglés, pero la redacción principal sigue la revisión más reciente.
