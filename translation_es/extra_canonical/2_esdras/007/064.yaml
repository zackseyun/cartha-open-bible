translation:
  language: es
  text: Pero ahora el entendimiento crece con nosotros, y por esto somos atormentados, porque perecemos sabiéndolo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque aunque lo sabemos, perecemos».'
    reason: previous_rendering
lexical_decisions:
- source_word: Nunc autem
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Mas ahora
  - Ahora bien
  lexicon: Latin adverbial contrastive frame
  rationale: Conserva el giro adversativo-temporal del original sin cargarlo con un matiz más arcaico de lo necesario. «Pero ahora» mantiene la progresión argumentativa.
- source_word: nobiscum crescit sensus
  english_pob_choice: understanding grows with us
  chosen_spanish: el entendimiento crece con nosotros
  alternatives_spanish:
  - el sentido crece con nosotros
  - la conciencia crece con nosotros
  lexicon: sensus
  rationale: «Sensus» aquí apunta a la capacidad de percibir, comprender y tomar conciencia del estado propio. «Entendimiento» comunica mejor esa función en español contemporáneo que «sentido», que podría sonar demasiado ambiguo, y evita aplanarlo a mero «conocimiento».
- source_word: ind e fieret / non esse natum, ut non sensus inde fieret
  english_pob_choice: because of this we are tormented
  chosen_spanish: y por esto somos atormentados
  alternatives_spanish:
  - y por eso somos afligidos
  - y por esto sufrimos
  lexicon: tormentari
  rationale: La imagen de ser «atormentados» refleja con fuerza el padecimiento interior causado por la conciencia, y corresponde bien al tono del pasaje. «Afligidos» sería más débil; «sufrimos» perdería la intensidad.
- source_word: scientes
  english_pob_choice: knowing it
  chosen_spanish: con plena conciencia
  alternatives_spanish:
  - sabiéndolo
  - sabiendo esto
  lexicon: scientes
  rationale: 'La revisión inglesa corrigió el valor de la frase: no es una concesión («aunque sabemos»), sino un circunstancial de modo: perecemos mientras sabemos. «Con plena conciencia» reproduce esa fuerza sin introducir una concesión ajena al latín.'
theological_decisions:
- issue: La relación entre conciencia y perdición humana
  english_pob_reading: because we perish knowing it
  chosen_spanish_reading: porque perecemos con plena conciencia
  alternative_spanish_readings:
  - porque perecemos sabiéndolo
  - porque perecemos sabiendo esto
  rationale: 'El pasaje contrasta la ausencia de sensus con la condición humana actual: la conciencia del propio destino agrava el sufrimiento. La traducción evita convertir la frase en una concesión teológica ajena al argumento y preserva la idea de que el conocimiento de la perdición intensifica el tormento.'
  doctrine_reference: Antropología de 4 Esdras / 2 Esdras 7:64; observación exegética sobre el valor circunstancial de scientes
translation_notes:
  revision_awareness: 'La revisión latina-audit trail corrigió una lectura anterior de scientes como concesiva («aunque sabemos»). La redacción española sigue la adjudicación revisada: el tormento proviene de perecer con conciencia plena, no de una concesión frustrada.'
  spanish_consistency_notes:
  - Se mantiene «entendimiento» para sensus, en lugar de «sentido», por claridad semántica en español.
  - Se conserva «atormentados» para el valor intensivo de tormentari, acorde con el tono de lamento del pasaje.
  - No se introduce «Cristo», «SEÑOR» ni otras terminologías ajenas al latín de esta línea.
