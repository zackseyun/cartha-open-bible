translation:
  language: es
  text: Porque para su bien hice el mundo[a], y cuando Adán transgredió mis ordenanzas, fue juzgado lo que había sido hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque por ellos hice el mundo»; antes, «Porque por causa de ellos hice el mundo».'
    reason: Preserva una alternativa más literal para 'propter eos' y documenta la formulación causal previa conforme a la auditoría inglesa.
lexical_decisions:
- source_word: propter eos
  english_pob_choice: For their sake
  chosen_spanish: por causa de ellos
  alternatives_spanish:
  - por su bien
  - por causa de ellos
  - por ellos
  lexicon: propter + acusativo
  rationale: En este contexto, la preposición latina expresa finalidad o beneficio, no mera causalidad; por eso elegí una fórmula española que conserve el valor benefactivo sin sonar pesada. Dejo 'por causa de ellos' como opción muy cercana al valor contextual y a la nota inglesa de beneficio.
- source_word: feci
  english_pob_choice: I made
  chosen_spanish: hice
  alternatives_spanish:
  - hice
  - creé
  lexicon: facere
  rationale: El verbo latino es amplio; en combinación con 'saeculum' y el contexto de creación, 'hice' mantiene la literalidad sin imponer un tecnicismo más fuerte que el texto no exige. 'Creé' sería posible, pero estrecha más la interpretación.
- source_word: saeculum
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el siglo
  - la edad
  - la era
  - el mundo
  lexicon: saeculum
  rationale: Sigo la revisión inglesa que entendió aquí 'saeculum' como la creación/orden del mundo, no como 'edad'. En español 'mundo' comunica mejor esa referencia a la creación física y evita confundir al lector con un temporalismo que el contexto no favorece.
- source_word: constitutiones meas
  english_pob_choice: my ordinances
  chosen_spanish: mis ordenanzas
  alternatives_spanish:
  - mis preceptos
  - mis mandamientos
  - mis ordenanzas
  lexicon: constitutio
  rationale: '''Ordenanzas'' refleja bien el valor normativo/jurídico del latín y coincide con el registro bíblico en español. ''Mandamientos'' sería más interpretativo y ''preceptos'' menos natural en este pasaje.'
- source_word: iudicatum est quod factum est
  english_pob_choice: what had been made was judged
  chosen_spanish: fue juzgado lo que había sido hecho
  alternatives_spanish:
  - fue juzgado lo que había sido hecho
  - lo que había sido hecho fue juzgado
  lexicon: iudicare
  rationale: Conservo la pasiva y la secuencia temporal del original. 'Lo que había sido hecho' reproduce el participio con anterioridad al juicio; 'fue juzgado' mantiene la tensión judicial sin suavizarla.
theological_decisions:
- issue: Finalidad de la creación en favor de ellos
  english_pob_reading: For their sake I made the world
  chosen_spanish_reading: Porque por causa de ellos hice el mundo
  alternative_spanish_readings:
  - Porque los tenía en cuenta al hacer el mundo
  - Porque para su bien hice el mundo
  rationale: 'La revisión inglesa entiende ''propter eos'' como benefactivo/teleológico: la creación fue hecha en función de ellos. Mantengo esa lectura en español para no reducirla a mera causalidad ni borrar la intención teológica del pasaje.'
  doctrine_reference: 4 Esdras 6:55; 7:11
- issue: Juicio sobre lo que había sido hecho tras la transgresión de Adán
  english_pob_reading: and when Adam transgressed my ordinances, what had been made was judged
  chosen_spanish_reading: y cuando Adán transgredió mis ordenanzas, fue juzgado lo que había sido hecho
  alternative_spanish_readings:
  - y cuando Adán quebrantó mis ordenanzas, fue juzgado lo que había sido hecho
  - y cuando Adán transgredió mis mandamientos, lo creado fue juzgado
  rationale: Conservo la relación entre la transgresión de Adán y el juicio sobre la creación. 'Ordenanzas' preserva el carácter normativo del mandato divino sin imponer una formulación doctrinal más específica de la necesaria.
  doctrine_reference: Génesis 3; 4 Esdras 7:11
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió la antigua lectura 'For because of them I made the age' a 'For their sake I made the world', justificando 'saeculum' aquí como 'world' en vez de 'age' y 'propter eos' como finalidad/beneficio. La versión española sigue esa adjudicación y no revive la opción temporal como sentido principal, aunque la nota deja abierta una formulación benéfica cercana.
  spanish_consistency_notes:
  - He mantenido 'mundo' para saeculum conforme al contexto de creación y a la revisión auditada.
  - He usado 'ordenanzas' para traducir constitutiones meas con tono bíblico-jurídico natural en español.
  - He conservado la pasiva 'fue juzgado' para no perder la estructura del latín.
  - El pie de nota marca la alternativa benefactiva, no una lectura puramente causal.
