base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/057.yaml
  text: 'So judge for yourself which things are precious and desirable: what is abundant, or what is born rare?'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:09Z'
    unchanged: false
    changes_summary: Revised the final clause to more closely reflect the Latin 'quod multiplicatur aut quod rarum nascitur' by rendering it as 'what is abundant, or what is born rare?' instead of the less literal 'what is rare in coming to be.'
translation:
  language: es
  text: 'Juzga, pues, por ti mismo qué cosas son preciosas y deseables: lo que es abundante, o lo que nace raro.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Aestima et tu
  english_pob_choice: So judge for yourself
  chosen_spanish: Así que juzga tú mismo
  alternatives_spanish:
  - Así que considera tú mismo
  - Así que decide tú mismo
  lexicon: aestimare
  rationale: El latín pide discernimiento/valoración personal; «juzga tú mismo» conserva el imperativo directo y la fuerza evaluativa sin añadir contenido ajeno.
- source_word: quæ sint pretiosa et desiderabilia
  english_pob_choice: which things are precious and desirable
  chosen_spanish: qué cosas son preciosas y deseables
  alternatives_spanish:
  - qué cosas son valiosas y deseables
  - cuáles son preciosas y deseables
  lexicon: pretiosus / desiderabilis
  rationale: «Preciosas» y «deseables» reproducen el doble juicio de valor del latín con un registro natural en español y cercano al de la POB inglesa.
- source_word: quod multiplicatur
  english_pob_choice: what is abundant
  chosen_spanish: las que abundan
  alternatives_spanish:
  - lo que es abundante
  - lo que se multiplica
  lexicon: multiplicare
  rationale: El sentido es de abundancia o multiplicación. «Abundan» comunica bien la idea en español sin perder el contraste con lo raro.
- source_word: quod rarum nascitur
  english_pob_choice: what is born rare
  chosen_spanish: las que nacen raras
  alternatives_spanish:
  - lo que nace raro
  - lo que es raro al nacer
  lexicon: rarus + nasci
  rationale: La revisión inglesa destacó la literalidad de «born rare». «Nacen raras» conserva la imagen del origen y la rareza, evitando suavizarla a una simple rareza estática.
theological_decisions:
- issue: Valor relativo de lo abundante y lo raro
  english_pob_reading: 'which things are precious and desirable: what is abundant, or what is born rare?'
  chosen_spanish_reading: 'qué cosas son preciosas y deseables: las que abundan, o las que nacen raras'
  alternative_spanish_readings:
  - 'qué cosas son preciosas y deseables: lo abundante, o lo que nace raro'
  rationale: No hay carga doctrinal explícita en el verso; el punto es sapiencial y comparativo. Se mantiene el contraste tal como lo formula el latín, sin interpretarlo más allá de la pregunta retórica.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó el final para reflejar con más precisión el latín 'quod multiplicatur aut quod rarum nascitur'. La frase española sigue esa revisión al mantener una oposición entre abundancia y rareza de origen, con una formulación natural en español.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, sin recurrir a arcaísmos innecesarios.
  - «Juzga tú mismo» conserva la apelación directa del latín y el tono exhortativo del pasaje.
  - No se introduce terminología eclesiástica ni doctrinal ajena al texto sapiencial.
