  rationale: Se elimina «Así que» por no estar explícito en la evidencia fuente y se reformula el contraste final con «lo que ... / lo que ...» para reflejar mejor el neutro latino y la redacción inglesa auditada «what is abundant, or what is born rare?». «Pues» reproduce de manera ligera el matiz discursivo de «et tu» sin sobreinterpretar.
