lexical_decisions:
- source_word: ingredientur
  english_pob_choice: enter
  chosen_spanish: entrarán
  alternatives_spanish:
  - entrarán
  - ingresarán
  - pasarán
  lexicon: Latin ingredior
  rationale: El latín expresa entrada/ingreso; en español, 'entrarán' conserva el movimiento de entrar sin añadir matices interpretativos.
- source_word: sed
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - pero
  - sino
  lexicon: Latin sed
  rationale: '''Pero'' reproduce la oposición directa del contraste latino de forma natural en español.'
- source_word: uagantes erunt
  english_pob_choice: they will wander
  chosen_spanish: andarán errantes
  alternatives_spanish:
  - vagarán
  - andarán errantes
  - irán errantes
  lexicon: Latin vagor
  rationale: '''Andarán errantes'' comunica el estado de vagar con un matiz más idiomático y fluido en español que un calco rígido.'
- source_word: amodo
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - de ahora en adelante
  - desde ahora
  - a partir de ahora
  lexicon: Latin a modo / amodo
  rationale: '''Desde ahora'' refleja la idea temporal inmediata del latín y encaja bien con la secuencia verbal española.'
- source_word: in cruciamentis
  english_pob_choice: in torments
  chosen_spanish: en tormentos
  alternatives_spanish:
  - en tormentos
  - en suplicios
  - en dolores
  lexicon: Latin cruciamentum
  rationale: '''Tormentos'' conserva la fuerza de sufrimiento castigador del sustantivo latino sin suavizarlo.'
- source_word: dolentes
  english_pob_choice: grieving
  chosen_spanish: afligidos
  alternatives_spanish:
  - dolidos
  - afligidos
  - lamentándose
  lexicon: Latin doleo
  rationale: '''Dolentes'' aquí describe un estado de pesar continuo; ''afligidos'' transmite ese dolor persistente en un español claro y sobrio.'
- source_word: tristes
  english_pob_choice: sad
  chosen_spanish: tristes
  alternatives_spanish:
  - tristes
  - apenados
  - melancólicos
  lexicon: Latin tristis
  rationale: '''Tristes'' es la correspondencia directa y transparente al adjetivo latino, manteniendo la doble caracterización del estado emocional.'
theological_decisions:
- issue: Descripción del destino de los condenados tras la entrada
  english_pob_reading: enter, but from now on they will wander in torments, always grieving and sad.
  chosen_spanish_reading: entrarán, pero desde ahora andarán errantes en tormentos, siempre afligidos y tristes.
  alternative_spanish_readings:
  - entrarán, pero desde ahora vagarán en tormentos, siempre afligidos y tristes.
  - entrarán, pero desde ahora estarán errantes en tormentos, siempre afligidos y tristes.
  rationale: La versión española mantiene el contraste entre una entrada y un estado posterior de vagar en castigo, sin añadir elementos doctrinales ajenos al latín. Se preserva la repetición del sufrimiento continuo ('siempre') y la doble cualificación afectiva ('afligidos y tristes').
  doctrine_reference: Escatología retributiva en 2 Esdras / Esdras apocalíptico, sin desarrollo dogmático adicional.
translation_notes:
  revision_awareness: 'La revisión previa corrigió un error grave de alineación: el texto latino de este versículo no decía lo mismo que la nota anterior sobre ''el primer camino''. Ahora la traducción sigue el span latino exacto: ingredientur, sed uagantes erunt amodo in cruciamentis, dolentes semper et tristes.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no aparece el tetragrámaton ni κύριος en este versículo.
  - Se mantiene el registro sobrio y literal-sintético propio de una sección apocalíptica.
  - No se añadió nota al pie porque no hay una variante textual o ambigüedad que requiera marcador anclado en el versículo.
