base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/116.yaml
  text: 'And I answered and said[a], “This is my first and last word: it would have been better not to give the earth to Adam, or else, when it had already been given, to restrain him so that he would not sin.”'
  footnotes:
  - marker: a
    text: Or 'not to give the earth to Adam, or else, once it had been given'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:24Z'
    unchanged: false
    changes_summary: 'Revised to reflect the Latin more closely: changed ''for the earth not to have produced Adam'' to ''not to give the earth to Adam,'' since the source says ''dare terram Adam''; adjusted the second clause accordingly to match the passive sense and retained formal, natural English.'
translation:
  language: es
  text: 'Y respondí y dije[a]: «Esta es mi primera y última palabra: habría sido mejor no dar la tierra a Adán, o bien, cuando ya se le hubiera dado, retenerlo para que no pecara».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no dar la tierra a Adán, o bien, una vez que ya se le hubiera dado».'
    reason: alternative_reading
lexical_decisions:
- source_word: Et respondi et dixi
  english_pob_choice: And I answered and said
  chosen_spanish: Y respondí y dije
  alternatives_spanish:
  - Y respondí y hablé
  - Respondí y dije
  lexicon: respondi / dixi
  rationale: Conservo la coordinación simple del latín y la fórmula narrativa solemne sin añadir contenido. «Dije» mantiene el paralelismo tradicional, pero en español natural.
- source_word: hic sermo meus primus et novissimus
  english_pob_choice: This is my first and last word
  chosen_spanish: Esta es mi primera y última palabra
  alternatives_spanish:
  - Ésta es mi primera y última palabra
  - Esta es mi primer y última palabra
  lexicon: hic sermo / primus et novissimus
  rationale: La expresión idiomática se vuelve una frase natural en español, manteniendo el matiz enfático de «primero y último» como declaración final y total.
- source_word: melius erat
  english_pob_choice: it would have been better
  chosen_spanish: habría sido mejor
  alternatives_spanish:
  - sería mejor
  - mejor habría sido
  lexicon: melius erat
  rationale: El condicional compuesto expresa adecuadamente la valoración contrafactual del latín y suena natural en español.
- source_word: non dare terram Adam
  english_pob_choice: not to give the earth to Adam
  chosen_spanish: no dar la tierra a Adán
  alternatives_spanish:
  - que la tierra no diera a Adán
  - no haber dado la tierra a Adán
  lexicon: non dare / terram / Adam
  rationale: 'Sigo la revisión de la fuente: el latín presenta a la tierra como elemento que se da/produce en relación con Adán. En español, «dar la tierra a Adán» preserva la construcción fuente sin forzar una paráfrasis interpretativa, aunque resulta algo idiomática y por eso se mantiene como opción fuente-cercana.'
- source_word: vel, cum iam dedisset
  english_pob_choice: or else, when it had already been given
  chosen_spanish: o bien, cuando ya se le hubiera dado
  alternatives_spanish:
  - o bien, cuando ya hubiera sido dada
  - o si ya se le hubiera concedido
  lexicon: vel / cum iam dedisset
  rationale: La pasiva latina se refleja con un impersonal en español («se le hubiera dado») para mantener la ambigüedad del agente y el valor temporal-contrafactual.
- source_word: coercere eum ut non peccaret
  english_pob_choice: to restrain him so that he would not sin
  chosen_spanish: retenerlo para que no pecara
  alternatives_spanish:
  - refrenarlo para que no pecara
  - coaccionarlo para que no pecara
  lexicon: coercere / ut non peccaret
  rationale: «Retenerlo» comunica el sentido de contener o sujetar con claridad y sin sobrecargar el español. «Para que no pecara» reproduce el propósito negativo del ut. «Refrenarlo» es posible, pero suena más moralizante que el latín.
theological_decisions:
- issue: Relación entre la tierra y Adán en la primera cláusula
  english_pob_reading: It would have been better not to give the earth to Adam
  chosen_spanish_reading: Habría sido mejor no dar la tierra a Adán
  alternative_spanish_readings:
  - Habría sido mejor que la tierra no diera a Adán
  - Habría sido mejor no haber dado la tierra a Adán
  rationale: 'Se conserva la tensión textual que el revisión reciente destacó: el latín no habla de una ‘entrega de la tierra’ a Adán en sentido teológico simple, sino de una formulación donde la tierra y Adán están vinculados de modo activo/causal. En español mantengo una versión cercana al audit trail, sin resolver la ambigüedad con una paráfrasis explicativa.'
  doctrine_reference: 4 Esdras 3:5; 7:116 (motivo de la tierra que produce/da a Adán)
- issue: Agencia y pasividad en la segunda cláusula
  english_pob_reading: when it had already been given, to restrain him so that he would not sin
  chosen_spanish_reading: cuando ya se le hubiera dado, retenerlo para que no pecara
  alternative_spanish_readings:
  - cuando ya hubiera sido dada, refrenarlo para que no pecara
  - cuando ya se le hubiera concedido, retenerlo para que no pecara
  rationale: La pasiva impersonal española permite conservar la falta de especificación del agente en el latín. No se explicita quién da o produce, para no borrar la ambigüedad documentada.
  doctrine_reference: Análisis sintáctico del pasivo latino y del propósito con ut
translation_notes:
  revision_awareness: La redacción se ajusta a la revisión más reciente que corrigió la lectura errónea de una ‘entrega de la tierra’ como si fuera un simple dativo teológico. El español conserva, en la medida posible, la ambigüedad y la relación tierra/Adán del latín limpio, sin seguir la versión inglesa previa que había sido señalada como problemática.
  spanish_consistency_notes:
  - Se usa «Adán» como nombre propio, conforme al flujo bíblico estándar en español.
  - Se mantiene «tierra» para terram y no «suelo» o «polvo», porque el audit trail distingue esta formulación de otros pasajes de 4 Esdras.
  - «Pecara» conserva el subjuntivo de finalidad negativa.
  - La nota al pie refleja la alternativa textual/interpretativa preservada por el POB inglés.
