source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'Et respondi et dixi: hic sermo meus primus et novissimus, quoniam melius erat non dare terramAdam vel, cum iam dedisset, coercereeum ut non peccaret.'
