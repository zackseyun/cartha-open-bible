translation:
  language: es
  text: y de gran misericordia[a], porque multiplica misericordias para los que están presentes, para los que han pasado y para los que han de venir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y rico en misericordia, porque multiplica misericordias más y más».'
    reason: alternative_reading
lexical_decisions:
- source_word: et multae misericordiae
  english_pob_choice: and of great mercy
  chosen_spanish: y de gran misericordia
  alternatives_spanish:
  - y rico en misericordia
  - y de muchas misericordias
  lexicon: multae + misericordiae
  rationale: El latín expresa cualidad abundante, no una metáfora extraña; en español, «de gran misericordia» comunica bien la fuerza de multae misericordiae sin convertirla en una paráfrasis más interpretativa.
- source_word: quoniam
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: quoniam
  rationale: «Porque» mantiene la relación causal directa y resulta natural en español bíblico contemporáneo.
- source_word: multiplicat magis misericordias
  english_pob_choice: he multiplies mercies
  chosen_spanish: multiplica misericordias
  alternatives_spanish:
  - multiplica más misericordias
  - multiplica cada vez más misericordias
  lexicon: multiplicat + magis + misericordias
  rationale: El latín indica multiplicación intensiva/comparativa. En español, «multiplica misericordias» preserva el sentido sin forzar un adverbio explícito que suena redundante; la idea de abundancia ya está reforzada por la frase inicial.
- source_word: his qui praesentes sunt et qui praeterierunt et qui futuri sunt
  english_pob_choice: for those who are present and those who have passed away and those who are to come
  chosen_spanish: para los que están presentes, para los que han pasado y para los que han de venir
  alternatives_spanish:
  - para los presentes, para los que han fallecido y para los que vendrán
  - para los que viven, los que han pasado y los que vendrán
  lexicon: praesentes / praeterierunt / futuri sunt
  rationale: 'La secuencia abarca tres grupos temporales: presentes, pasados y futuros. «Han pasado» conserva el alcance temporal del latín sin introducir explícitamente una interpretación doctrinal adicional como «fallecidos».'
theological_decisions:
- issue: Alcance de la misericordia divina hacia presentes, pasados y futuros
  english_pob_reading: he multiplies mercies for those who are present and those who have passed away and those who are to come
  chosen_spanish_reading: multiplica misericordias para los que están presentes, para los que han pasado y para los que han de venir
  alternative_spanish_readings:
  - multiplica misericordias para los presentes, los que han pasado y los que han de venir
  - multiplica misericordias para los que viven, los que han muerto y los que vendrán
  rationale: La formulación española conserva la amplitud temporal del original sin cerrar el sentido con una explicación más específica de la necesaria. El texto afirma la universalidad temporal de la misericordia divina, no una doctrina adicional sobre el estado de los muertos.
  doctrine_reference: Divine mercy; temporal universality of God's gracious action
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió una duplicación en inglés y estabilizó la idea central: «of great mercy» y la multiplicación de misericordias para los tres tiempos. La versión española sigue ese estado revisado y evita tanto la duplicación como una expansión innecesaria de «magis».'
  spanish_consistency_notes:
  - Se mantiene «misericordia» en singular para la cualidad y en plural para las acciones/muestras de misericordia, reflejando la diferencia del latín.
  - Se conserva una sintaxis clara y litúrgicamente sobria, sin traducir mecánicamente el orden latino.
  - El marcador [a] está anclado en «misericordia» porque allí se sitúa la alternativa lexical relevante.
