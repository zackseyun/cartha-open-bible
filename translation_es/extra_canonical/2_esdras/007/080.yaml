translation:
  language: es
  text: Estos espíritus no entrarán en moradas[a], sino que desde ahora vagarán en tormentos, siempre afligidos y tristes, de siete maneras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tales espíritus no entrarán en moradas, sino que andarán desde ahora en tormentos, siempre afligidos y tristes».'
    reason: alternative_reading
lexical_decisions:
- source_word: eius, et eorum qui oderunt eos qui timent eum
  english_pob_choice: these spirits
  chosen_spanish: Estos espíritus
  alternatives_spanish:
  - tales espíritus
  - estos seres espirituales
  lexicon: spiritus
  rationale: La base latina del contexto apunta a espíritus ya identificados en el pasaje inmediato; el demostrativo plural «estos» sigue el ajuste revisado del inglés POB («these»). «Espíritus» conserva el referente espiritual sin añadir especificación inexistente en el texto.
- source_word: habitationes non
  english_pob_choice: will not enter habitations
  chosen_spanish: no entrarán en moradas
  alternatives_spanish:
  - no entrarán en habitaciones
  - no entrarán en casas
  lexicon: habitatio
  rationale: «Moradas» reproduce con dignidad y amplitud semántica la idea de lugares de residencia o estancia. «Habitaciones» sería demasiado concreto y moderno; «casas» estrecha indebidamente el sentido.
- source_word: per septem vias
  english_pob_choice: in seven ways
  chosen_spanish: por siete caminos
  alternatives_spanish:
  - en siete maneras
  - a través de siete vías
  lexicon: via
  rationale: La revisión auditada exige conservar la estructura septenaria que prepara la enumeración siguiente. «Caminos» mantiene la imagen espacial de latín «vias» mejor que un abstracto «maneras», y «por» refleja el valor distributivo/recorrido de la expresión.
- source_word: in torments, always grieving and sad
  english_pob_choice: in torments, always grieving and sad
  chosen_spanish: en tormentos, siempre afligidos y tristes
  alternatives_spanish:
  - en tormentos, siempre gimiendo y tristes
  - en tormentos, siempre dolidos y tristes
  lexicon: tormenta / dolere / tristis
  rationale: «Tormentos» conserva la intensidad punitiva del latín y del inglés POB. «Afligidos y tristes» traduce el estado continuo de sufrimiento y lamento sin introducir un verbo no atestiguado; mantiene el paralelismo de participios/adjetivos.
theological_decisions:
- issue: Destino postmortem de los espíritus impíos y su exclusión de las moradas
  english_pob_reading: these spirits will not enter habitations, but will wander from now on in torments
  chosen_spanish_reading: Estos espíritus no entrarán en moradas, sino que desde ahora andarán errantes en tormentos
  alternative_spanish_readings:
  - estos espíritus no entrarán en casas, sino que andarán en tormentos
  - estos espíritus no serán recibidos en moradas, sino que vagarán en tormentos
  rationale: La formulación mantiene la exclusión futura y el carácter itinerante del castigo sin suavizarlo. «Andarán errantes» preserva la idea de vagar sin reposo; no se introduce una teología adicional sobre recepción, solo la negación de acceso presente/futuro del texto.
  doctrine_reference: 4 Esdras 7:80-81; tradición apocalíptica sobre el castigo de los impíos
translation_notes:
  revision_awareness: La revisión más reciente confirmó que debe conservarse la frase estructural equivalente a «in seven ways» y que el demostrativo debe ser plural cercano («these»). La presente redacción incorpora ambos ajustes frente a un borrador que omitía el marcador septenario y usaba un demostrativo menos preciso.
  spanish_consistency_notes:
  - Se mantiene «moradas» para el término de residencia, evitando la reducción a «casas» o «habitaciones».
  - Se conserva la fuerza de castigo con «tormentos» y el matiz de movimiento continuo con «andarán errantes».
  - La nota a presenta la alternativa de orden sintáctico heredada del inglés POB sin alterar el texto principal.
  - La frase final «por siete caminos» se deja explícita para enlazar con la enumeración del versículo siguiente.
