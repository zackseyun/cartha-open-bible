review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien el sentido principal del latín auditado: exclusión de las moradas, deambular en tormentos, tristeza continua, y la cláusula estructural que introduce la serie septenaria. Sin embargo, «andarán errantes» suena algo redundante y menos natural que una formulación simple como «vagarán». Además, para «per septem vias», «de siete maneras» o «en siete maneras» refleja mejor la función estructural de la frase en el contexto inmediato que «por siete caminos», que puede sonar demasiado espacial en español.'
  spanish_quality_summary: El texto es claro y digno, pero puede mejorarse en naturalidad y precisión idiomática. «Moradas» está bien. «Desde ahora» funciona. La principal mejora es evitar la combinación pesada «andarán errantes» y ajustar «por siete caminos» a una expresión más idiomática que prepare la enumeración posterior.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Espíritus», «moradas» y «tormentos» están alineados. La revisión propuesta solo afina estilo y correspondencia contextual de «vias».
  issues:
  - severity: medium
    issue: «andarán errantes» es redundante y poco natural
    rationale: El sentido de vagar ya está contenido en el verbo; la combinación suena calcada. «Vagarán» o «andarán vagando» preserva mejor el significado con mejor español.
  - severity: medium
    issue: «por siete caminos» puede malinterpretarse como imagen espacial literal
    rationale: Aunque «via» puede ser ‘camino’, aquí la función contextual es introducir siete modos o formas de tormento, como confirma la revisión inglesa y el v. siguiente («La primera manera...»). En español, «de siete maneras» comunica mejor esa estructura.
  revised_spanish_text: Estos espíritus no entrarán en moradas[a], sino que desde ahora vagarán en tormentos, siempre afligidos y tristes, de siete maneras.
  revised_footnotes:
  - marker: a
    text: 'O: «tales espíritus no entrarán en moradas, sino que andarán desde ahora en tormentos, siempre afligidos y tristes».'
    reason: alternative_reading
  revision_rationale: Se conserva el contenido del borrador, pero se mejora la naturalidad de «andarán errantes» a «vagarán» y se ajusta «por siete caminos» a «de siete maneras» para reflejar mejor la función estructural de «per septem vias» en este contexto apocalíptico, preparando la enumeración de las siete formas del tormento.
