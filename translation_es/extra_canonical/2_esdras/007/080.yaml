revisions:
- from: Estos espíritus no entrarán en moradas[a], sino que desde ahora andarán errantes en tormentos, siempre afligidos y tristes, por siete caminos.
  to: Estos espíritus no entrarán en moradas[a], sino que desde ahora vagarán en tormentos, siempre afligidos y tristes, de siete maneras.
  rationale: Se conserva el contenido del borrador, pero se mejora la naturalidad de «andarán errantes» a «vagarán» y se ajusta «por siete caminos» a «de siete maneras» para reflejar mejor la función estructural de «per septem vias» en este contexto apocalíptico, preparando la enumeración de las siete formas del tormento.
