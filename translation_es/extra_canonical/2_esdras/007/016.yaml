  glossary_alignment: 'No hay términos del glosario principal en juego. La revisión propuesta mantiene fidelidad semántica: futurum -> «lo que ha de venir»; in praesenti -> «lo presente»; accepisti in corde tuo -> «tomaste a pecho».'
