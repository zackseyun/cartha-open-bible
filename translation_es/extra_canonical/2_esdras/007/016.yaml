translation:
  language: es
  text: ¿Y por qué no tomaste a pecho lo que ha de venir, en lugar de lo presente?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: quod futurum
  english_pob_choice: what is to come
  chosen_spanish: lo que ha de venir
  alternatives_spanish:
  - lo que vendrá
  - lo futuro
  lexicon: futurum
  rationale: El latín apunta a lo venidero en contraste con lo presente. «Lo que ha de venir» conserva la orientación prospectiva y el tono sobrio de la pregunta sin volverla más libre de lo que permite la fuente.
- source_word: quod in praesenti
  english_pob_choice: what is present
  chosen_spanish: lo que está presente
  alternatives_spanish:
  - lo presente
  - lo que ahora está
  lexicon: praesens
  rationale: «In praesenti» expresa lo que está delante de uno, en el presente actual. «Lo que está presente» mantiene la oposición con «lo que ha de venir» y refleja bien el paralelismo latino.
- source_word: accepisti in corde tuo
  english_pob_choice: taken to heart
  chosen_spanish: tomaste en tu corazón
  alternatives_spanish:
  - acogiste en tu corazón
  - recibiste en tu corazón
  lexicon: cor / cordis
  rationale: La imagen idiomática del latín es interiorizar o considerar profundamente. En español, «tomar en el corazón» conserva la metáfora y la fuerza exhortativa, sin reducirla a una mera comprensión intelectual.
theological_decisions:
- issue: Contraste entre lo venidero y lo presente
  english_pob_reading: what is to come, rather than what is present
  chosen_spanish_reading: lo que ha de venir, en lugar de lo que está presente
  alternative_spanish_readings:
  - lo que vendrá, en vez de lo presente
  - lo futuro, más que lo presente
  rationale: 'No hay una tensión doctrinal especial, pero sí un contraste moral/escatológico: el texto reprende no haber dado prioridad a lo futuro frente a lo presente. La redacción española preserva ese contraste sin suavizarlo.'
  doctrine_reference: Exhortación sapiencial/escatológica del contexto de 2 Esdras
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; se mantiene la lectura inglesa auditada y el texto latino limpio como base directa para una versión española fiel y natural.
  spanish_consistency_notes:
  - Se usó «Dios» solo cuando corresponde en otros textos; aquí no aparece ningún término divino.
  - Se evitó traducir mecánicamente desde el inglés cuando el latín permitía una formulación española más natural, manteniendo el paralelismo del original.
  - Se conservó el registro interrogativo y exhortativo del texto fuente sin añadir explicación interpretativa.
