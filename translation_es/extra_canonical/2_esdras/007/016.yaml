  source_alignment_summary: 'El latín dice literalmente: «¿y por qué no recibiste/tomaste en tu corazón lo que será/futuro, sino lo que está en el presente?». La traducción inglesa auditada lo expresa idiomáticamente como «taken to heart ... what is to come, rather than what is present». El borrador español preserva bien el contraste temporal, pero «tomaste en tu corazón» no suena idiomático en español y no comunica con naturalidad el sentido de interiorizar o tomar en serio de accepisti in corde tuo.'
