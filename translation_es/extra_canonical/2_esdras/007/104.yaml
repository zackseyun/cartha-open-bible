source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'si fideles pro carissimis. [Et respondit ad me et dixit: quoniam inueniisti gratiam ante oculos meos, et hoc demonstrabo tibi: dies iudicii dies decretorius est, et omnibus signaculum ueritatis ostendet; quemadmodum enim non mittit pater filium, uel filius patrem, uel dominus seruum], uel fidus carissimum, ut pro'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/104.yaml
  text: 'And he answered me and said[7:104], “Because you have found favor before my eyes, I will show you this also: the day of judgment is a decisive day and will display to all the seal of truth. For just as a father does not send a son, or a son a father, or a master a slave, or a friend a beloved one[a], to speak on his behalf in the judgment'
  footnotes:
  - marker: 7:104
    text: Part of this verse belongs to the restored fragment absent from most medieval Latin manuscripts. The examples stress personal non-transferability in ordinary life as an analogy for the final judgment.
    reason: recovered_fragment
  - marker: a
    text: Or 'and displays to all the seal of truth. For just as now a father'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:21Z'
    unchanged: false
    changes_summary: Completed the verse by adding the omitted phrase corresponding to 'uel fidus carissimum, ut pro...' as 'or a friend a beloved one, to speak on his behalf in the judgment.'
translation:
  language: es
  text: 'Y él me respondió y dijo: «Porque has hallado gracia[a] ante mis ojos, te mostraré también esto: el día del juicio es un día decisivo y mostrará a todos el sello de la verdad. Porque así como un padre no envía a un hijo, ni un hijo a un padre, ni un amo a un esclavo, ni un amigo a un ser querido, para hablar en su favor en el juicio»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «favor»; el latín gratia aquí expresa aceptación benévola ante Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: quoniam inueniisti gratiam ante oculos meos
  english_pob_choice: Because you have found favor before my eyes
  chosen_spanish: Porque has hallado gracia[a] ante mis ojos
  alternatives_spanish:
  - Porque has encontrado favor ante mis ojos
  - Porque has hallado favor ante mis ojos
  lexicon: gratia
  rationale: Se conserva el valor relacional de aceptación/favor recibido ante Dios. En español, «gracia» mantiene mejor la resonancia bíblica que «favor», aunque la nota deja abierta la equivalencia semántica.
- source_word: dies iudicii dies decretorius est
  english_pob_choice: the day of judgment is a decisive day
  chosen_spanish: el día del juicio es un día decisivo
  alternatives_spanish:
  - el día del juicio es un día decisorio
  - el día del juicio es un día de decreto
  lexicon: iudicium / decretorius
  rationale: «Decisivo» comunica bien la fuerza de un día fijado para sentencia final sin forzar un tecnicismo español. «Decisorio» sería posible, pero suena más jurídico y menos natural.
- source_word: omnibus signaculum ueritatis ostendet
  english_pob_choice: will display to all the seal of truth
  chosen_spanish: mostrará a todos el sello de la verdad
  alternatives_spanish:
  - manifestará a todos el sello de la verdad
  - mostrará a todos el sello de la veracidad
  lexicon: signaculum / ueritas / ostendet
  rationale: «Sello de la verdad» sigue de cerca la imagen latina y conserva el carácter simbólico y verificatorio del «signaculum». «Veracidad» reduciría el alcance conceptual de ueritas.
- source_word: uel dominus seruum
  english_pob_choice: or a master a slave
  chosen_spanish: ni un amo a un esclavo
  alternatives_spanish:
  - ni un señor a un esclavo
  - ni un dueño a un esclavo
  lexicon: dominus / seruus
  rationale: Se mantiene «esclavo» por la fuerza léxica de seruus y se elige «amo» como equivalente natural de dominus en este contexto de relaciones asimétricas.
- source_word: uel fidus carissimum
  english_pob_choice: or a friend a beloved one
  chosen_spanish: ni un amigo a un amado[b]
  alternatives_spanish:
  - ni un amigo a un querido
  - ni un amigo a un ser querido
  lexicon: fidus / carissimus
  rationale: La secuencia latina es algo elíptica; «amado» conserva la intensidad afectiva de carissimus sin suavizarla demasiado. La nota permite la alternativa «ser querido» para claridad idiomática.
theological_decisions:
- issue: La analogía sobre la no-transferibilidad personal en el juicio final
  english_pob_reading: The examples stress personal non-transferability in ordinary life as an analogy for the final judgment.
  chosen_spanish_reading: Los ejemplos subrayan que, en el juicio final, nadie puede ser enviado en lugar de otro para responder por él.
  alternative_spanish_readings:
  - Los ejemplos subrayan la imposibilidad de delegar la comparecencia en el juicio final.
  - Los ejemplos subrayan la responsabilidad personal irreemplazable ante el juicio final.
  rationale: 'La formulación sigue la función de la comparación en el texto: padres, hijos, amos y amigos no actúan como sustitutos judiciales de otros. Se evita ampliar más allá de la analogía latina.'
  doctrine_reference: Responsabilidad personal ante el juicio; no sustitución vicaria humana en la comparecencia judicial final
translation_notes:
  revision_awareness: La revisión más reciente completó la cláusula omitida sobre «un amigo a un amado» y corrigió el verbo latino a futuro («mostrará»). Esta versión española sigue ese pasaje restaurado y conserva el valor futurativo de ostendet.
  spanish_consistency_notes:
  - Se mantuvo «Y él me respondió y dijo» para reflejar la fórmula narrativa del texto base.
  - Se prefirió «amo» sobre «señor» para evitar confusión con el uso reverencial de dominus en contextos teológicos.
  - Se mantuvo «esclavo» conforme a la fuerza semántica de seruus y a la terminología POB.
  - Se usó comillas angulares españolas para la cita directa.
  - No se añadió material explicativo fuera de la analogía explícita del latín.
