  to: 'Y él me respondió y dijo: «Porque has hallado gracia[a] ante mis ojos, te mostraré también esto: el día del juicio es un día decisivo y mostrará a todos el sello de la verdad. Porque así como un padre no envía a un hijo, ni un hijo a un padre, ni un amo a un esclavo, ni un amigo a un ser querido, para hablar en su favor en el juicio»'
