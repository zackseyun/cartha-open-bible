translation:
  language: es
  text: 'Porque descansarán en siete órdenes. El primer orden: porque, con mucha lucha, combatieron para vencer el mal pensamiento formado junto con ellos, para que no los desviara de la vida hacia la muerte.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: requiescent
  english_pob_choice: they shall rest
  chosen_spanish: descansarán
  alternatives_spanish:
  - reposarán
  - hallarán descanso
  lexicon: requiero/descansar
  rationale: El latín indica un futuro de reposo; «descansarán» conserva la idea de reposo final en español natural y digno.
- source_word: ordo primus
  english_pob_choice: The first order
  chosen_spanish: La primera orden
  alternatives_spanish:
  - El primer orden
  - La primera categoría
  lexicon: ordo/orden
  rationale: «Orden» refleja de manera directa el latín ordo y mantiene el sentido clasificatorio/jerárquico del pasaje.
- source_word: cum labore multo
  english_pob_choice: with much struggle
  chosen_spanish: con mucha lucha
  alternatives_spanish:
  - con gran esfuerzo
  - con mucho combate
  lexicon: labor/ lucha
  rationale: El latín habla de trabajo duro o aflicción; en este contexto, «lucha» comunica bien el carácter de combate espiritual sin exceder el original.
- source_word: uincerent
  english_pob_choice: they have fought to overcome
  chosen_spanish: combatieron para vencer
  alternatives_spanish:
  - lucharon para vencer
  - pelearon para vencer
  lexicon: vinco/vencer
  rationale: «Combatieron para vencer» conserva la idea de esfuerzo activo y el propósito de superar algo adverso.
- source_word: plasmatum cogitamentum malum
  english_pob_choice: the evil thought formed with them
  chosen_spanish: el mal pensamiento formado junto con ellos
  alternatives_spanish:
  - el mal pensamiento plasmado con ellos
  - el pensamiento malo formado con ellos
  lexicon: plasma/cogitamentum/malum
  rationale: «Formado junto con ellos» preserva la tensión del latín plasmatum y la idea de algo modelado en su compañía/origen compartido, sin resolver en exceso una frase difícil.
- source_word: ut non eas
  english_pob_choice: so that it might not lead them astray from life into death
  chosen_spanish: para que no los desviara de la vida a la muerte
  alternatives_spanish:
  - para que no los apartara de la vida hacia la muerte
  - para que no los llevara de la vida a la muerte
  lexicon: eas/eo
  rationale: El fragmento latino apunta a un movimiento de desviación; «desviara» mantiene esa fuerza direccional y evita añadir un sujeto no expresado.
theological_decisions:
- issue: Identidad y función del «mal pensamiento»
  english_pob_reading: evil thought formed with them
  chosen_spanish_reading: mal pensamiento formado junto con ellos
  alternative_spanish_readings:
  - mal pensamiento formado en ellos
  - pensamiento malo formado con ellos
  rationale: Se conserva la tensión del texto entre algo interior y algo concomitante/“formado con” ellos, sin suavizarlo a una simple idea psicológica moderna.
  doctrine_reference: Antropología moral y lucha interior contra el pecado
- issue: Movimiento de vida a muerte
  english_pob_reading: from life into death
  chosen_spanish_reading: de la vida a la muerte
  alternative_spanish_readings:
  - fuera de la vida hacia la muerte
  - desde la vida hasta la muerte
  rationale: La formulación mantiene el contraste escatológico/moral explícito del latín y de la POB inglesa, sin expandirlo interpretativamente.
  doctrine_reference: Consecuencia del mal y oposición vida/muerte
translation_notes:
  revision_awareness: La versión inglesa POB fue revisada y se mantuvo sin cambios en el pase más reciente; el veredicto de revisión fue de alta concordancia, por lo que esta redacción española sigue de cerca la lectura estable del pasaje, atendiendo directamente al latín limpio de Bensly.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «orden» para ordo por coherencia con la estructura enumerativa del pasaje.
  - Se conserva la ambigüedad del latín en «formado junto con ellos» en vez de reinterpretarlo de modo más doctrinal o psicológico.
