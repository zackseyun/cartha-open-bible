source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: nominatum est; Et non contristabor super multitudinem eorum qui perierunt, ipsi enim sunt qui uapori assimilati sunt et flammae, fumo adaequati sunt et exarserunt,
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/061.yaml
  text: And I will not grieve over the multitude of those who have perished[a], for they are the ones who have been made like vapor and likened to flame, compared to smoke, and have burned up.
  footnotes:
  - marker: a
    text: Or 'for they are like vapor, and are compared to flame and smoke;'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:11Z'
    unchanged: false
    changes_summary: Adjusted tense to reflect the Latin perfects ('have perished,' 'have been made,' 'have burned up'), removed the added interpretive sequence 'burned hot, and were extinguished,' and tightened the final clause to match the source more closely and naturally.
translation:
  language: es
  text: Y no me entristeceré por la multitud de los que han perecido[a], porque ellos son los que han sido hechos semejantes al vapor y asemejados a la llama, comparados con el humo, y han ardido hasta consumirse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque son como vapor, y son asemejados a la llama, y comparados con el humo».'
    reason: Preserva la alternativa histórica sin reintroducir el agrupamiento sintáctico incorrecto de «llama y humo» bajo una sola comparación.
lexical_decisions:
- source_word: non contristabor
  english_pob_choice: I will not grieve
  chosen_spanish: no me doleré
  alternatives_spanish:
  - no me entristeceré
  - no lamentaré
  lexicon: contristabor
  rationale: El latín expresa no solo tristeza interior sino aflicción/dolor por la pérdida; «no me doleré» conserva ese matiz afectivo y suena natural en español. «No me entristeceré» es posible, pero atenúa el registro de duelo.
- source_word: multitudine eorum qui perierunt
  english_pob_choice: the multitude of those who have perished
  chosen_spanish: la multitud de los que han perecido
  alternatives_spanish:
  - la muchedumbre de los que han perecido
  - la multitud de los que murieron
  lexicon: multitudo / pereo
  rationale: «Multitud» corresponde bien a multitus y mantiene el sustantivo colectivo del original. El perfecto latino se refleja mejor con «han perecido» que con un presente, siguiendo la revisión auditada.
- source_word: ipsi enim sunt qui
  english_pob_choice: for they are the ones who
  chosen_spanish: porque ellos son los que
  alternatives_spanish:
  - pues ellos son quienes
  - porque son los que
  lexicon: ipsi enim sunt qui
  rationale: 'La estructura enfática del latín pide explicitar el sujeto: «ellos son los que». Esto sigue el ajuste revisado en el audit trail y evita diluir la focalización.'
- source_word: uapori assimilati sunt
  english_pob_choice: have been made like vapor
  chosen_spanish: han sido hechos semejantes al vapor
  alternatives_spanish:
  - han sido hechos como vapor
  - han sido asemejados al vapor
  lexicon: assimilare / vapor
  rationale: «Hechos semejantes» conserva la pasiva y la comparación formal. «Vapor» es la equivalencia directa de uapor; no se sustituye por «humo» ni por una imagen más interpretativa.
- source_word: flammae
  english_pob_choice: likened to flame
  chosen_spanish: y asemejados a la llama
  alternatives_spanish:
  - y comparados con la llama
  - y hechos semejantes a la llama
  lexicon: flamma
  rationale: 'El dativo con assimilati se entiende junto con «vapor» y por eso se vierte con una segunda comparación coordinada: «a la llama». «Llama» es la opción más natural y fiel en español para flamma.'
- source_word: fumo adaequati sunt
  english_pob_choice: compared to smoke
  chosen_spanish: comparados con el humo
  alternatives_spanish:
  - igualados al humo
  - equiparados al humo
  lexicon: adaequare / fumus
  rationale: «Comparados con el humo» refleja adecuati sunt y mantiene la relación semántica de equivalencia/comparación. Se evita «igualados» por sonar menos idiomático aquí, aunque es viable.
- source_word: exarserunt
  english_pob_choice: have burned up
  chosen_spanish: se han consumido
  alternatives_spanish:
  - han ardido
  - se han quemado
  lexicon: exardescere
  rationale: El perfecto latino indica un estado ya consumado; «se han consumido» comunica la idea de arder hasta el final sin añadir una imagen extra de extinción. «Han ardido» sería más literal pero menos preciso para el resultado final.
theological_decisions:
- issue: Tense and completed destruction of the perished multitude
  english_pob_reading: those who have perished ... have burned up
  chosen_spanish_reading: los que han perecido ... se han consumido
  alternative_spanish_readings:
  - los que perecen ... se consumen
  - los que murieron ... ardieron
  rationale: El latín usa perfectos, no presentes; por eso el español debe expresar acción completada. La versión elegida conserva el carácter consumado del juicio sin intensificarlo con detalles no presentes en el texto.
  doctrine_reference: none required; literary-grammatical fidelity
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente: respeta los perfectos latinos («han perecido», «han sido hechos», «se han consumido»), evita la secuencia interpretativa añadida en una versión anterior («ardieron intensamente, y fueron extinguidos») y conserva la separación sintáctica entre vapor/llama y humo que el audit trail corrigió.'
  spanish_consistency_notes:
  - Se mantuvo «vapor», «llama» y «humo» como trío imagético, sin fusionarlos.
  - Se prefirió la pasiva compuesta en español («han sido hechos», «se han consumido») para reflejar los perfectos latinos.
  - «Doleré» se usó para conservar el matiz de aflicción personal de contristabor en un registro bíblico natural.
