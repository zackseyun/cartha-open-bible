  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la sintaxis latina revisada en el audit trail: mantiene el perfecto consumado, preserva el énfasis de ipsi enim sunt qui con «ellos son los que», y distingue correctamente vapor/llama bajo assimilati y humo bajo adaequati. Sin embargo, «se han consumido» para exarserunt suaviza y desplaza la imagen básica de arder; una forma como «han ardido hasta consumirse» o «se han quemado por completo» preserva mejor el campo semántico de exardescere/exarserunt. Además, la nota alternativa española reintroduce el agrupamiento incorrecto «la llama y el humo» como si ambos dependieran por igual de un mismo verbo de comparación, contradiciendo la revisión auditada.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «no me doleré» suena menos natural y algo marcado en registro reflexivo; «no me entristeceré» o «no me afligiré» sería más idiomático. También conviene ajustar la nota para que sea natural en español y fiel a la separación sintáctica del latín. El resto del verso es legible y mantiene un tono bíblico moderno.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. Las decisiones léxicas son en general adecuadas. La principal corrección es semántico-estilística: exarserunt debe conservar explícitamente la idea de arder, y la nota alternativa no debe mezclar llama y humo bajo una misma construcción.'
  issues:
  - severity: medium
    issue: «se han consumido» atenúa la imagen de exarserunt
    rationale: El latín exarserunt expresa que ardieron/se encendieron intensamente; «consumirse» destaca el resultado y puede perder la imagen verbal principal de arder. Una formulación que incluya «ardido» conserva mejor el original.
  - severity: high
    issue: La nota al pie alternativa contradice la sintaxis latina revisada
    rationale: La nota dice «se comparan con la llama y el humo», pero el audit trail estableció que vapor y llama corresponden al primer verbo, mientras humo corresponde al segundo. La nota debe reflejar esa separación.
  - severity: low
    issue: «no me doleré» suena menos idiomático que otras opciones
    rationale: Aunque comprensible, en español bíblico moderno neutro resulta algo forzado. «No me entristeceré» comunica bien contristabor y mejora la naturalidad sin apartarse del sentido.
  revised_spanish_text: Y no me entristeceré por la multitud de los que han perecido[a], porque ellos son los que han sido hechos semejantes al vapor y asemejados a la llama, comparados con el humo, y han ardido hasta consumirse.
  revised_footnotes:
  - marker: a
    text: 'O: «porque son como vapor, y son asemejados a la llama, y comparados con el humo».'
    reason: Preserva la alternativa histórica sin reintroducir el agrupamiento sintáctico incorrecto de «llama y humo» bajo una sola comparación.
  revision_rationale: Se corrige la naturalidad de contristabor con «no me entristeceré», se ajusta exarserunt para conservar explícitamente la idea de arder («han ardido hasta consumirse»), y se reescribe la nota alternativa para alinearla con la sintaxis latina documentada en el audit trail.
