review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el latín: mantiene el atributo divino «longanimis», la explicación causal «quoniam», el objeto «his qui peccaverunt» y la comparación final «quasi suis operibus». Sin embargo, en español bíblico general «longánimo» suena más marcado y menos natural que una formulación verbal; además, «praestat» se refleja mejor con un verbo de trato o ejercicio que con «muestra».'
  spanish_quality_summary: 'El texto es comprensible, pero «y longánimo» resulta algo nominal y poco idiomático en una serie descriptiva si se lee aislado. «y paciente» sería demasiado débil, pero «y es longánimo» introduce un verbo ausente. La mejor reparación mínima es conservar el adjetivo, pero mejorar la frase verbal siguiente para mayor naturalidad: «tiene longanimidad para con». También conviene usar «para con» en vez de «con» para reflejar mejor la orientación de la acción.'
  glossary_alignment: No hay conflicto con la glosa del proyecto. «Longanimidad/longánimo» preserva la decisión léxica del inglés «long-suffering» mejor que «paciencia». No intervienen términos sensibles del glosario principal.
  issues:
  - severity: medium
    issue: «muestra longanimidad con» suena algo calco y menos preciso para «longanimitatem praestat his».
    rationale: El latín expresa dispensar/ejercer longanimidad hacia alguien. En español eclesial claro, «tiene longanimidad para con» o «es longánimo para con» transmite mejor la relación.
  - severity: low
    issue: La preposición «con» en ambos complementos debilita el matiz direccional del original.
    rationale: El inglés auditado usa «toward», y el latín dativo/comparación favorecen en español «para con» o «hacia».
  revised_spanish_text: y longánimo, porque tiene longanimidad para con los que han pecado, como para con sus propias obras,
  revision_rationale: Se conserva «longánimo/longanimidad» por fidelidad léxica al latín y al inglés POB, pero se ajusta la construcción verbal y preposicional para que el español suene más natural y refleje mejor la orientación del trato divino hacia los pecadores y la comparación final.
