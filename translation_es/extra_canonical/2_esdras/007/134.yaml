translation:
  language: es
  text: y longánimo, porque tiene longanimidad para con los que han pecado, como para con sus propias obras,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et longanimis
  english_pob_choice: and long-suffering
  chosen_spanish: y longánimo
  alternatives_spanish:
  - y paciente
  - y de larga paciencia
  - y sufridor
  lexicon: longanimis
  rationale: El latín describe un atributo divino de paciencia prolongada; «longánimo» conserva la fuerza lexical y evita reducirlo a mera paciencia genérica. Se mantiene el enlace copulativo inicial para reflejar la continuidad con el contexto.
- source_word: longanimitatem praestat
  english_pob_choice: he shows long-suffering
  chosen_spanish: muestra longanimidad
  alternatives_spanish:
  - ejerce longanimidad
  - da muestra de longanimidad
  - se muestra longánimo
  lexicon: longanimitatem praestat
  rationale: La construcción latina enfatiza que Dios ejerce o presenta esta cualidad hacia otros. «Muestra longanimidad» comunica bien la acción sin sobretraducir ni perder el matiz de manifestación.
- source_word: his qui peccaverunt
  english_pob_choice: toward those who have sinned
  chosen_spanish: con los que han pecado
  alternatives_spanish:
  - hacia los que han pecado
  - a los que han pecado
  - para con los que han pecado
  lexicon: his qui peccaverunt
  rationale: «Con» reproduce la relación de trato personal implícita en el latín y suena natural en español; el sentido direccional queda suficientemente preservado por el contexto del verbo 'mostrar'.
- source_word: quasi suis operibus
  english_pob_choice: as toward his own works
  chosen_spanish: como con sus propias obras
  alternatives_spanish:
  - como si fueran sus propias obras
  - casi como a sus propias obras
  - como a sus propias obras
  lexicon: quasi suis operibus
  rationale: El quasi latino introduce una comparación atenuada; «como con sus propias obras» conserva la comparación sin volverla demasiado interpretativa. Se evita eliminar la tensión entre la comparación y la pertenencia implícita.
theological_decisions:
- issue: La paciencia divina hacia el pecador comparada con sus propias obras
  english_pob_reading: he shows long-suffering toward those who have sinned, as toward his own works
  chosen_spanish_reading: muestra longanimidad con los que han pecado, como con sus propias obras
  alternative_spanish_readings:
  - muestra paciencia con los que han pecado, como con sus propias obras
  - muestra longanimidad hacia los que han pecado, como hacia sus propias obras
  rationale: 'La comparación «como con sus propias obras» se conserva sin suavizarla, porque expresa una tensión teológica importante: el trato paciente de Dios a los pecadores se presenta bajo el símil de su relación con aquello que ha hecho. No se interpreta más allá del latín.'
  doctrine_reference: Providencia y paciencia divina
translation_notes:
  revision_awareness: La redacción inglesa fue ajustada por una coma después de 'long-suffering' para reflejar mejor la estructura latina; el español reproduce esa pausa con una coma después de «longánimo».
  spanish_consistency_notes:
  - Se mantiene «longanimidad/longánimo» para alinearse con la decisión inglesa de 'long-suffering' y preservar el campo semántico de paciencia prolongada.
  - No se introduce «SEÑOR» ni otro masking por no aparecer en el fragmento fuente.
  - La comparación final se deja abierta con «como», sin explicitar 'si fueran', para no exceder el latín.
  - La puntuación conserva una coma principal tras el primer predicado, en consonancia con la revisión inglesa.
