base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/044.yaml
  text: For it will last like a week of years. This is my judgment and its ordinance,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:06Z'
    unchanged: false
    changes_summary: Replaced the draft with a rendering that includes the omitted first clause ('For it will last like a week of years') and matches the Latin word order and content more closely. Removed the added material ('and I have shown these things to you alone') since it is not present in this source segment.
translation:
  language: es
  text: Porque durará como una semana de años. Este es mi juicio y su ordenanza,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: enim
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: conjunction causal/explicativa
  rationale: El latino enim introduce la explicación de la afirmación anterior; «porque» conserva bien la relación causal/explicativa en español y suena natural en un registro bíblico sobrio.
- source_word: habebit
  english_pob_choice: it will last
  chosen_spanish: durará
  alternatives_spanish:
  - tendrá duración
  - perdurará
  lexicon: verbo de duración/futuro
  rationale: El POB inglés opta por una noción de duración, no por posesión literal. «Durará» expresa la idea de continuidad temporal de manera clara y fiel sin sobrecargar el español.
- source_word: sicut ebdomada annorum
  english_pob_choice: like a week of years
  chosen_spanish: como una semana de años
  alternatives_spanish:
  - como una semana de años
  - cual una semana de años
  lexicon: comparación temporal
  rationale: La frase latina compara el periodo con una ‘semana de años’. Se mantiene de forma directa para preservar la imagen profética y la tensión interpretativa sin suavizarla.
- source_word: Hoc est iudicium meum
  english_pob_choice: This is my judgment
  chosen_spanish: Este es mi juicio
  alternatives_spanish:
  - Éste es mi juicio
  - Esta es mi sentencia
  lexicon: iudicium = judgment/sentence
  rationale: «Iudicium» puede abarcar juicio o sentencia. Se eligió «juicio» porque corresponde al audit trail inglés y permite conservar el peso judicial del término sin forzar una concreción adicional.
- source_word: constitutio eius
  english_pob_choice: and its ordinance
  chosen_spanish: y su ordenanza
  alternatives_spanish:
  - y su decreto
  - y su disposición
  lexicon: constitutio = ordinance/decree
  rationale: «Ordenanza» refleja el carácter establecido y normativo de constitutio, y coincide con la equivalencia ya fijada por el POB en inglés. Se evita una paráfrasis más interpretativa como «decreto».
theological_decisions:
- issue: Naturaleza del ‘juicio’ en la frase final
  english_pob_reading: This is my judgment and its ordinance
  chosen_spanish_reading: Este es mi juicio y su ordenanza
  alternative_spanish_readings:
  - Esta es mi sentencia y su ordenanza
  - Este es mi juicio y su decreto
  rationale: El latín presenta una formulación judicial/normativa compacta. «Juicio» preserva la ambigüedad entre acto de juzgar y decisión judicial, mientras «ordenanza» mantiene el componente prescriptivo sin cerrar excesivamente el sentido.
  doctrine_reference: Sabiduría bíblica / juicio divino en literatura apocalíptica
translation_notes:
  revision_awareness: La revisión más reciente corrigió el texto inglés para restaurar la primera cláusula omitida ('For it will last like a week of years') y eliminar material añadido que no estaba en el segmento latino. La presente versión española sigue esa forma revisada y mantiene el orden y contenido del latín limpiado, sin incorporar ampliaciones externas.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y legible para lectores generales.
  - No se introduce 'SEÑOR' ni otros sustitutos no presentes en este segmento.
  - La comparación temporal se conserva literal para no perder la imagen profética.
  - La puntuación final queda abierta con coma porque el segmento fuente termina así.
