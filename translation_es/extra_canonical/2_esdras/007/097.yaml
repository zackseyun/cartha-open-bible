  text: et spatiosum, [quod incipient] recipere fruniscentes et immortales. Sextus ordo, quando eis ostendetur, quomodo incipiet uultus eorum fulgere sicut sol, et quomodo
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/097.yaml
  text: 'The sixth order: when it will be shown to them how their face will begin to shine like the sun, and how they will begin to be made like the light of the stars, being from then on incorruptible.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:19Z'
    unchanged: false
    changes_summary: Changed 'it is shown' to 'it will be shown' to match the future sense of the Latin ostendetur. Retained the rest as a natural rendering of the extant source fragment.
translation:
  language: es
  text: 'El sexto orden: cuando se les muestre cómo su rostro comenzará a resplandecer como el sol, y cómo comenzarán a ser hechos semejantes a la luz de las estrellas, siendo desde entonces incorruptibles.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Sextus ordo
  english_pob_choice: The sixth order
  chosen_spanish: El sexto orden
  alternatives_spanish:
  - La sexta orden
  - El sexto rango
  lexicon: ordo
  rationale: Ordo se mantiene como «orden» porque el contexto enumera una serie de estados o grados. «Orden» conserva el valor clasificatorio sin forzar una lectura institucional.
- source_word: quando eis ostendetur
  english_pob_choice: when it will be shown to them
  chosen_spanish: cuando se les mostrará
  alternatives_spanish:
  - cuando les será mostrado
  - cuando se les muestre
  lexicon: ostendere
  rationale: El latino futuro pasivo ostendetur pide un futuro en español. «Se les mostrará» conserva la pasiva impersonal y el destinatario indirecto; «cuando se les mostrará» refleja de modo directo el futuro indicado por la revisión inglesa.
- source_word: vultus eorum
  english_pob_choice: their face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - sus rostros
  lexicon: vultus
  rationale: Vultus en este contexto apunta al semblante o rostro. «Rostro» es más digno y natural en español bíblico contemporáneo que «cara».
- source_word: fulgere sicut sol
  english_pob_choice: shine like the sun
  chosen_spanish: resplandecer como el sol
  alternatives_spanish:
  - brillar como el sol
  - fulgurar como el sol
  lexicon: fulgere
  rationale: «Resplandecer» expresa bien el brillo intenso de fulgere y suena más natural y solemne que un calco excesivo. Se mantiene la comparación explícita «como el sol».
- source_word: quomodo incipiet ... et quomodo
  english_pob_choice: how ... and how
  chosen_spanish: cómo ... y cómo
  alternatives_spanish:
  - de qué manera ... y de qué manera
  lexicon: quomodo
  rationale: Se conserva la repetición interrogativo-explicativa del original, que estructura la visión futura de transformación.
- source_word: incipiet ... fulgere ... et quomodo
  english_pob_choice: their face will begin to shine ... and how they will begin to be made like the light of the stars
  chosen_spanish: su rostro comenzará a resplandecer ... y cómo comenzarán a ser hechos como la luz de las estrellas
  alternatives_spanish:
  - su rostro empezará a resplandecer ... y cómo empezarán a ser hechos como la luz de las estrellas
  - su rostro comenzará a brillar ... y cómo comenzarán a ser hechos como la luz de las estrellas
  lexicon: incipere + passive transformation
  rationale: «Comenzará»/«comenzarán» reproduce incipiet y el inicio del proceso. «Ser hechos como la luz de las estrellas» sigue de cerca la forma pasiva y preserva la imagen comparativa sin convertirla en una simple metáfora devocional.
- source_word: fruniscentes et immortales
  english_pob_choice: being from then on incorruptible
  chosen_spanish: siendo desde entonces incorruptibles
  alternatives_spanish:
  - siendo desde entonces incorruptibles e inmortales
  - siendo de ahí en adelante incorruptibles
  lexicon: fruniscentes
  rationale: El fragmento latino conservado muestra una lectura difícil, pero la tradición auditada en inglés ya resuelve la idea hacia «incorruptible». «Desde entonces» sigue la idea temporal de continuación. No se introduce «inmortales» en el texto principal porque el inglés POB no la asumió como parte establecida del sentido.
theological_decisions:
- issue: 'Naturaleza de la transformación final: brillo, semejanza y incorruptibilidad'
  english_pob_reading: their face will begin to shine like the sun ... made like the light of the stars, being from then on incorruptible
  chosen_spanish_reading: su rostro comenzará a resplandecer como el sol ... comenzarán a ser hechos como la luz de las estrellas, siendo desde entonces incorruptibles
  alternative_spanish_readings:
  - su rostro comenzará a brillar como el sol ... serán hechos como la luz de las estrellas, siendo desde entonces incorruptibles
  - su rostro empezará a resplandecer como el sol ... empezarán a ser hechos semejantes a la luz de las estrellas, siendo desde entonces incorruptibles
  rationale: El pasaje describe una transformación gloriosa y progresiva, no una identidad ontológica nueva expresada con terminología doctrinal posterior. Por eso se conserva el lenguaje imagético y el resultado final de incorruptibilidad sin expandirlo más allá del fragmento.
  doctrine_reference: Resurrección/glorificación final; preservación del lenguaje figurado del texto apocalíptico
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del audit trail: el futuro de ostendetur pasó de una lectura presente a una futura en inglés; por eso la traducción española usa futuro en la cláusula correspondiente. No se añadieron notas porque el fragmento latino y la versión inglesa convergen en una sola línea de sentido suficientemente estable.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable aquí porque el fragmento no contiene el nombre divino.
  - Se usa «rostro» y «resplandecer» para un registro bíblico sobrio y natural.
  - Se conserva la estructura repetitiva del pasaje («cuando... y cómo... y cómo...») para reflejar el carácter enumerativo del original.
