revisions:
- from: 'El sexto orden: cuando se les mostrará cómo su rostro comenzará a resplandecer como el sol, y cómo comenzarán a ser hechos como la luz de las estrellas, siendo desde entonces incorruptibles.'
  to: 'El sexto orden: cuando se les muestre cómo su rostro comenzará a resplandecer como el sol, y cómo comenzarán a ser hechos semejantes a la luz de las estrellas, siendo desde entonces incorruptibles.'
  rationale: Se corrige la subordinada temporal a un español natural («cuando se les muestre») sin perder la referencia futura del latín. También se alisa la expresión de transformación con «ser hechos semejantes a», que preserva la pasiva conceptual del POB inglés y suena más idiomática en español que el calco más rígido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:44:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido general del latín y del POB en inglés: el sexto orden, la revelación futura, el rostro que resplandece como el sol, la transformación semejante a la luz de las estrellas y la incorruptibilidad subsiguiente. Sin embargo, la cláusula temporal española «cuando se les mostrará» es poco natural y gramaticalmente deficiente en español estándar; debe ajustarse para expresar el futuro del latín ostendetur sin sacrificar legibilidad.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, con buenas elecciones como «rostro» y «resplandecer». El principal problema de calidad es sintáctico: tras «cuando», el futuro simple «se les mostrará» suena forzado; en español bíblico natural conviene «cuando se les muestre». También mejora la fluidez «sean hechos» frente a «ser hechos» después de «comenzarán a».'
  glossary_alignment: No hay términos del glosario maestro especialmente disputados en este versículo. «Orden», «rostro», «resplandecer» e «incorruptibles» son compatibles con la línea del proyecto. No se detectan conflictos con Yahvé/Mesías/etc.
  issues:
  - severity: medium
    issue: 'Uso de futuro simple tras «cuando»: «cuando se les mostrará»'
    rationale: Aunque intenta reflejar el futuro pasivo latino ostendetur, en español esta construcción resulta poco natural y suena incorrecta. «Cuando se les muestre» expresa adecuadamente la referencia futura en una subordinada temporal.
  - severity: low
    issue: «Comenzarán a ser hechos» suena más pesado de lo necesario
    rationale: La idea pasiva del inglés auditado puede mantenerse con mejor español como «comenzarán a ser hechos» o, más idiomáticamente, «comenzarán a ser hechos semejantes...». Aquí basta una leve reparación a «sean hechos» dentro de la construcción subordinada para mayor fluidez.
  revised_spanish_text: 'El sexto orden: cuando se les muestre cómo su rostro comenzará a resplandecer como el sol, y cómo comenzarán a ser hechos semejantes a la luz de las estrellas, siendo desde entonces incorruptibles.'
  revision_rationale: Se corrige la subordinada temporal a un español natural («cuando se les muestre») sin perder la referencia futura del latín. También se alisa la expresión de transformación con «ser hechos semejantes a», que preserva la pasiva conceptual del POB inglés y suena más idiomática en español que el calco más rígido.
