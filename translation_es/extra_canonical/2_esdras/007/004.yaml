translation:
  language: es
  text: Pero su entrada será colocada en un lugar angosto[a], de modo que fuera como un río.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'será puesta'.
    reason: previous_rendering
  - marker: b
    text: O 'sería como un río'.
    reason: previous_rendering
lexical_decisions:
- source_word: erit ... positus
  english_pob_choice: will be set
  chosen_spanish: será puesta
  alternatives_spanish:
  - será colocada
  - quedará puesta
  lexicon: sum + positus (futuro pasivo perifrástico)
  rationale: El latín usa una construcción futura con valor pasivo; en español, 'será puesta' conserva el futuro y la pasividad sin sonar artificial. 'Colocada' es posible, pero 'puesta' sigue más de cerca la sencillez del original.
- source_word: angusto loco
  english_pob_choice: in a narrow place
  chosen_spanish: en un lugar angosto
  alternatives_spanish:
  - en un sitio estrecho
  - en un lugar estrecho
  lexicon: angustus + locus
  rationale: '''Angosto'' reproduce bien la idea de estrechez física y mantiene un registro claro y bíblico. ''Lugar'' evita sobreinterpretar el espacio concreto.'
- source_word: ut esset similis
  english_pob_choice: so that it would be like
  chosen_spanish: de modo que sería como
  alternatives_spanish:
  - para que fuera como
  - de manera que fuera como
  lexicon: ut + subjuntivo imperfecto; similis
  rationale: La cláusula final/resultativa con 'ut esset' admite en español una expresión natural de resultado. 'Sería como' conserva el valor prospectivo/resultativo que el POB inglés fijó como 'would be'.
- source_word: fluminis
  english_pob_choice: a river
  chosen_spanish: un río
  alternatives_spanish:
  - corriente
  - arroyo
  lexicon: flumen
  rationale: '''Río'' es el equivalente directo y no añade matices ajenos. ''Corriente'' sería más interpretativa y ''arroyo'' demasiado específico.'
translation_notes:
  revision_awareness: La revisión más reciente corrige el tiempo verbal del latín 'erit' a futuro en inglés ('will be set') y mantiene la fuerza resultativa de 'ut esset' como 'would be'. La traducción española refleja ambos ajustes con futuro ('será puesta') y con una cláusula de resultado natural ('de modo que sería').
  spanish_consistency_notes:
  - Se preserva el futuro del verbo principal para no borrar la corrección aprobada del latín.
  - No se usa 'SEÑOR' ni terminología teológica especial porque el versículo no contiene vocabulario divino explícito.
  - Se mantiene 'río' como imagen literal, evitando ampliar el sentido de la comparación.
