review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del latín: futuro pasivo en `erit ... positus`, ubicación `in angusto loco`, y comparación/result ado en `ut esset similis fluminis`. Sin embargo, la cláusula final `de modo que sería como un río` suena menos idiomática y menos directamente subordinada al `ut esset` latino que `de modo que fuera como un río` o `para que fuera como un río`.'
  spanish_quality_summary: El español es mayormente claro, pero `será puesta` aplicado a `entrada` resulta algo tosco en español natural; `será colocada` lee mejor sin apartarse del sentido. Además, las notas heredadas del inglés están mal clasificadas y una de ellas transmite una alternativa menos natural en español (`es puesta`).
  glossary_alignment: No hay términos teológicos o del glosario mayor implicados aquí. Las decisiones léxicas principales son correctas en general, pero conviene ajustar la formulación española para mayor naturalidad y precisión sintáctica.
  issues:
  - severity: medium
    issue: '`será puesta` es fiel pero suena rígido con `entrada` en español.'
    rationale: Aunque calca de cerca `positus`, en español bíblico legible `será colocada` o `estará situada` resulta más natural. `Puesta` no es incorrecto, pero sí menos fluido.
  - severity: medium
    issue: '`de modo que sería como un río` no es la mejor subordinación para `ut esset`.'
    rationale: En español, tras `de modo que`, el imperfecto de subjuntivo (`fuera`) expresa mejor el matiz de propósito/resultado del latín. `Sería` suena más independiente y menos integrado sintácticamente.
  - severity: low
    issue: Las razones de las notas no siguen bien el historial auditado en inglés.
    rationale: Las notas inglesas son `previous_rendering`, no `textual_variant` ni `alternative_reading`. Además, `es puesta` no es una alternativa particularmente recomendable en español, aunque puede conservarse como nota histórica si se reetiqueta adecuadamente.
  revised_spanish_text: Pero su entrada será colocada en un lugar angosto[a], de modo que fuera como un río.[b]
