base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/024.yaml
  text: They despised his law and denied his promises[a], and they did not keep faith with his statutes and did not perform his works.
  footnotes:
  - marker: a
    text: Or 'denied his covenants'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:02Z'
    unchanged: false
    changes_summary: Revised 'were not faithful to his statutes' to 'did not keep faith with his statutes' to more closely reflect fidem non habuerunt while preserving formal register and natural English.
translation:
  language: es
  text: Despreciaron su ley y negaron sus promesas[a], y no guardaron fidelidad a sus estatutos ni cumplieron sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rechazaron sus alianzas».
    reason: Alternativa heredada del POB inglés para la lectura previa «denied his covenants», expresada en español natural y en plural concordante.
lexical_decisions:
- source_word: legem eius
  english_pob_choice: his law
  chosen_spanish: su ley
  alternatives_spanish:
  - su instrucción
  - su Torá
  lexicon: lexical
  rationale: Lexema directo y natural en español para legem, manteniendo la relación posesiva con Dios sin introducir una glosa más interpretativa que la fuente no exige.
- source_word: spreverunt
  english_pob_choice: They despised
  chosen_spanish: Despreciaron
  alternatives_spanish:
  - Menospreciaron
  - Desoyeron
  lexicon: lexical
  rationale: '''Despreciar'' conserva la fuerza volitiva y evaluativa de spreverunt en un registro bíblico claro y actual.'
- source_word: sponsiones eius
  english_pob_choice: his promises
  chosen_spanish: sus promesas
  alternatives_spanish:
  - sus pactos
  - sus compromisos
  lexicon: lexical
  rationale: La evidencia latina muestra sponsiones, no un término de alianza/covenio; por eso 'promesas' refleja mejor la carga de obligación pledged assurance sin borrar la distinción textual documentada.
- source_word: fidem non habuerunt
  english_pob_choice: they did not keep faith
  chosen_spanish: no guardaron fidelidad
  alternatives_spanish:
  - no tuvieron fe
  - no mantuvieron la fe
  lexicon: lexical
  rationale: '''Fidelidad'' expresa bien la idea de fidem en contexto relacional y legal; ''guardar fidelidad'' conserva el matiz de lealtad/fiabilidad más que una mera creencia interior.'
- source_word: legitimis eius
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus preceptos
  - sus leyes
  lexicon: lexical
  rationale: '''Estatutos'' es la equivalencia estable para legitima en este contexto normativo; mantiene la pluralidad concreta del latín.'
- source_word: opera eius non perfecerunt
  english_pob_choice: did not perform his works
  chosen_spanish: ni cumplieron sus obras
  alternatives_spanish:
  - ni realizaron sus obras
  - ni llevaron a cabo sus obras
  lexicon: lexical
  rationale: '''Cumplieron'' funciona para perfecerunt en un marco de obediencia/ejecución de mandatos y evita una lectura meramente productiva de ''obras''.'
theological_decisions:
- issue: Distinción entre 'promesas' y lenguaje de alianza/covenio
  english_pob_reading: 'denied his promises; alternative footnote: ''Or denied his covenants'''
  chosen_spanish_reading: negó sus promesas
  alternative_spanish_readings:
  - negó sus pactos
  - negó sus alianzas
  rationale: El audit trail revisó explícitamente 'covenants' a 'promises' porque sponsiones en el latín corresponde a promesas juradas o aseguradas, no a pacto; la traducción española debe preservar esa distinción y no retroceder a lenguaje de alianza sin base textual.
  doctrine_reference: 4 Esdras 7:24; decisión lexical documentada en el audit trail sobre sponsio / ἐπαγγελία frente a διαθήκη.
- issue: Relación entre ley, estatutos y obras como ámbitos distintos de desobediencia
  english_pob_reading: They despised his law ... and did not keep faith with his statutes and did not perform his works.
  chosen_spanish_reading: Despreciaron su ley ... no guardaron fidelidad a sus estatutos ni cumplieron sus obras.
  alternative_spanish_readings:
  - Despreciaron su ley ... no fueron fieles a sus estatutos ni realizaron sus obras
  rationale: 'Conviene mantener los tres miembros coordinados y diferenciados para no diluir la acumulación retórica del latín: ley, estatutos y obras señalan aspectos distintos de la respuesta debida a Dios.'
  doctrine_reference: 2 Esdras 7:24; estructura paralela del texto latino.
translation_notes:
  revision_awareness: 'La base inglesa pasó por una revisión importante en la cláusula de sponsiones: de ''covenants'' a ''promises'', apoyada por el latín sponsio/sponsiones. También se ajustó ''were not faithful to his statutes'' a ''did not keep faith with his statutes'' para reflejar fidem non habuerunt con mayor precisión. La versión española sigue esas decisiones y evita reintroducir ''pactos'' como lectura principal.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en otros contextos del proyecto, pero aquí el pronombre posesivo 'su' corresponde al texto latino y no requiere nombrar explícitamente a Dios.
  - 'Se conserva el paralelismo de tres miembros: ley / promesas / estatutos- obras, sin fusionarlos.'
  - '''Promesas'' se usa como término principal por fidelidad al latín; la nota alternativa preserva la posible lectura histórica ''pactos'' sin imponerla.'
