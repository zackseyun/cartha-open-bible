    issue: La nota al pie alternativa dice «O 'negó sus pactos'».
    rationale: Debe reflejar la alternativa del POB inglés («denied his covenants») de manera idiomática y formalmente paralela. «Negó» está en singular y no concuerda con el sujeto plural; además «pactos» no es la opción más estable aquí frente a «alianzas» o «convenios». Conviene usar «O 'rechazaron sus alianzas'» o similar.
  - severity: low
    issue: Puntuación con punto y coma antes de «y».
    rationale: 'En español esta coordinación fluye mejor sin punto y coma: «... promesas[a], y no guardaron...». El cambio mejora naturalidad sin alterar sentido.'
