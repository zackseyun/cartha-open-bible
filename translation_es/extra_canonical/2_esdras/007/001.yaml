translation:
  language: es
  text: Y aconteció que, cuando hube terminado de hablar estas palabras, me fue enviado otra vez el ángel que me había sido enviado en las primeras noches.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et factum est
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y fue así
  lexicon: et factum est
  rationale: La fórmula narrativa latina introduce el giro de la escena; «aconteció» conserva el tono bíblico sin sonar demasiado arcaico, y refleja bien el valor consecutivo y narrativo que el inglés POB verte con «And it happened».
- source_word: cum finissem loqui verba haec
  english_pob_choice: when I had finished speaking these words
  chosen_spanish: cuando hube terminado de hablar estas palabras
  alternatives_spanish:
  - cuando terminé de hablar estas palabras
  - al terminar de hablar estas palabras
  lexicon: cum + pluscuamperfecto subjuntivo; finissem; loqui verba haec
  rationale: El pluscuamperfecto subjuntivo latino marca anterioridad respecto a la acción siguiente. «Hube terminado» mantiene ese valor temporal con dignidad estilística y evita aplanarlo a un simple pretérito.
- source_word: missus est ad me
  english_pob_choice: was sent to me
  chosen_spanish: me fue enviado
  alternatives_spanish:
  - fue enviado a mí
  - fue mandado a mí
  lexicon: mittō / missus est
  rationale: «Me fue enviado» expresa con naturalidad la pasiva latina con complemento de destinatario y mantiene la dirección relacional del movimiento hacia el hablante.
- source_word: angelus
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: angelus
  rationale: En este contexto visionario, el referente es claramente un ser celestial; «ángel» es el equivalente español directo y más transparente.
- source_word: qui missus fuerat ad me primis noctibus
  english_pob_choice: who had been sent to me in the first nights
  chosen_spanish: que me había sido enviado en las primeras noches
  alternatives_spanish:
  - que había sido enviado a mí en las primeras noches
  - que me había sido enviado en las primeras vigilias
  lexicon: qui; missus fuerat; primis noctibus
  rationale: La relativa retoma al mismo ángel y conserva la pasiva pluscuamperfecta. «Las primeras noches» sigue de cerca el latín; aunque la expresión puede aludir a las primeras vigilias, no se introduce esa especificación sin apoyo explícito en el texto fuente.
theological_decisions:
- issue: Identidad del mensajero celestial
  english_pob_reading: the angel who had been sent to me
  chosen_spanish_reading: el ángel que me había sido enviado
  alternative_spanish_readings:
  - el ángel que había sido enviado a mí
  - el mensajero celestial que me había sido enviado
  rationale: El texto latino no da motivo para atenuar «ángel» ni para expandirlo; se conserva el valor angelológico explícito del pasaje.
  doctrine_reference: Uso descriptivo narrativo; no requiere una toma doctrinal adicional.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el texto latino limpio, la traducción inglesa POB y la revisión más reciente, que lo dejó sin cambios; por eso la redacción española sigue de cerca la sintaxis y los tiempos del original sin añadir notas.
  spanish_consistency_notes:
  - Se mantiene «ángel» de forma consistente para angelus.
  - Se conserva la secuencia temporal con pluscuamperfecto en español para reflejar la anterioridad de finissem y missus fuerat.
  - No se introduce terminología eclesiástica adicional ni se suaviza el doble envío del mensajero.
