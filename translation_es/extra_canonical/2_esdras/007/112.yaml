translation:
  language: es
  text: 'Y él me respondió y dijo: «El presente siglo no es el fin; la gloria en él no permanece continuamente[a]. Por eso oraron los que pudieron por los débiles».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «la gloria en él no permanece a menudo». La revisión auditada favorece «continuamente» para expresar mejor la idea de permanencia no estable en el presente siglo.'
    reason: alternative_reading
lexical_decisions:
- source_word: praesens saeculum
  english_pob_choice: the present age
  chosen_spanish: el presente siglo
  alternatives_spanish:
  - el presente tiempo
  - la era presente
  - el mundo presente
  lexicon: saeculum
  rationale: «Siglo» comunica bien una edad o etapa del mundo en español bíblico y mantiene la fuerza escatológica de contraste con el siglo venidero. «Edad» también sería posible, pero «siglo» es más idiomático en registros eclesiales y no suaviza el contraste temporal.
- source_word: finis
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - el término
  - la consumación
  - el final
  lexicon: finis
  rationale: La frase afirma que el presente siglo no constituye la meta conclusiva. «El fin» reproduce con sobriedad la oposición del latín sin añadir matices interpretativos extra.
- source_word: gloria in eo non frequens manet
  english_pob_choice: glory does not remain in it continually
  chosen_spanish: la gloria en él no permanece continuamente
  alternatives_spanish:
  - la gloria en él no permanece a menudo
  - la gloria en él no permanece por mucho tiempo
  lexicon: gloria / frequens / manet
  rationale: Se conserva «gloria» como término teológico y se traduce «frequens» según la revisión auditada como idea de continuidad o permanencia habitual, no meramente frecuencia ocasional. «Permanece continuamente» refleja esa lectura sin volverla más explicativa de lo que permite el texto.
- source_word: oraverunt qui potuerunt pro invalidis
  english_pob_choice: those who were able prayed for the weak
  chosen_spanish: oraron los que pudieron hacerlo por los débiles
  alternatives_spanish:
  - oraron los que pudieron por los débiles
  - los que pudieron oraban por los débiles
  - oraron los que eran capaces por los débiles
  lexicon: oraverunt / potuerunt / invalidis
  rationale: «Los débiles» sigue de cerca «invalidis» y conserva el contraste entre los capaces y los incapaces. Se añade «hacerlo» para evitar una repetición áspera en español y aclarar que el verbo elidido es «orar», sin alterar el sentido.
- source_word: dixit
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió y dijo
  - contestó y dijo
  lexicon: dico
  rationale: Se mantiene la fórmula narrativa directa del latín. En español, «respondió y dijo» resulta natural y conserva el encadenamiento del original.
theological_decisions:
- issue: Contraste escatológico entre el siglo presente y el fin verdadero
  english_pob_reading: The present age is not the end; glory does not remain in it continually.
  chosen_spanish_reading: El presente siglo no es el fin; la gloria en él no permanece continuamente.
  alternative_spanish_readings:
  - El siglo presente no es el fin; la gloria en él no permanece continuamente.
  - La era presente no es el fin; la gloria en ella no permanece continuamente.
  rationale: 'La formulación mantiene el contraste escatológico central: el orden presente es transitorio y no debe confundirse con la consumación. «Continualmente»/«continuamente» en español expresa adecuadamente la falta de permanencia duradera de la gloria en esta edad.'
  doctrine_reference: Eschatology / transience of the present age
- issue: Intercesión por los débiles
  english_pob_reading: Therefore those who were able prayed for the weak.
  chosen_spanish_reading: Por eso oraron los que pudieron hacerlo por los débiles.
  alternative_spanish_readings:
  - Por eso los que pudieron oraron por los débiles.
  - Por eso los capaces oraron por los débiles.
  rationale: 'El texto conserva la lógica moral: la debilidad humana suscita la oración de quienes sí tienen capacidad. «Débiles» preserva la ambigüedad del latín sin especificar si es física, moral o espiritual.'
  doctrine_reference: Intercession / human weakness
translation_notes:
  revision_awareness: La revisión auditada corrigió la antigua lectura inglesa «often» a «continually» para reflejar mejor freuqens como falta de permanencia constante en contraste escatológico. La traducción española sigue esa decisión y conserva una nota alternativa breve para no ocultar la ambigüedad histórica de la versión previa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el nombre divino aparece explícitamente; aquí no ocurre.
  - Se conserva el registro bíblico sobrio con sintaxis española natural, evitando calcos latinizantes innecesarios.
  - «Débiles» traduce invalidis de forma amplia y no se restringe a un ámbito físico.
  - La puntuación con comillas angulares respeta el estilo editorial español para el discurso directo.
