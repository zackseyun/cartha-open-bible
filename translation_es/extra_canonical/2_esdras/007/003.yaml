translation:
  language: es
  text: 'Y dije: «Habla, mi señor». Y él me dijo: «El mar está puesto en un lugar espacioso, para que fuera profundo e inmenso».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et dixi / And I said
  english_pob_choice: And I said
  chosen_spanish: Y dije
  alternatives_spanish:
  - Y yo dije
  - Entonces dije
  lexicon: Latin dixi
  rationale: El verbo simple en primera persona mantiene la narración directa sin añadir énfasis innecesario. En español, la elipsis del sujeto es natural y fiel al ritmo del latín.
- source_word: loquere, dominus meus / Speak, my lord
  english_pob_choice: Speak, my lord
  chosen_spanish: Habla, mi señor
  alternatives_spanish:
  - Hable mi señor
  - Habla, señor mío
  lexicon: Latin loquere; dominus meus
  rationale: «Habla» conserva el imperativo singular familiar del latín. «Mi señor» reproduce el valor relacional de dominus meus sin convertirlo en un título eclesiástico más cargado como «Señor mío».
- source_word: mare / the sea
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  lexicon: Latin mare
  rationale: «Mar» es la correspondencia directa y natural en español para mare.
- source_word: positum est / is set
  english_pob_choice: is set
  chosen_spanish: fue puesto
  alternatives_spanish:
  - está puesto
  - ha sido puesto
  lexicon: Latin positum est
  rationale: El pasivo perfecto latino se vierte con un pasivo de resultado en español. «Fue puesto» conserva la acción de establecer o colocar sin convertirla en un simple estado estático.
- source_word: in spatioso loco / in a broad place
  english_pob_choice: in a broad place
  chosen_spanish: en un lugar espacioso
  alternatives_spanish:
  - en un lugar amplio
  - en un espacio amplio
  lexicon: Latin spatioso loco
  rationale: «Lugar espacioso» sigue de cerca el adjetivo latino spatiosus y mantiene la imagen de amplitud. «Espacioso» evita reducir la frase a una mera ubicación física sin la idea de extensión.
- source_word: ut esset / so that it might be
  english_pob_choice: so that it might be
  chosen_spanish: para que fuera
  alternatives_spanish:
  - a fin de que fuera
  - para ser
  lexicon: Latin ut esset
  rationale: «Para que fuera» expresa finalidad y conserva el subjuntivo de propósito del latín.
- source_word: altum / deep
  english_pob_choice: deep
  chosen_spanish: profundo
  alternatives_spanish:
  - hondo
  lexicon: Latin altum
  rationale: «Profundo» es la opción más estándar y solemne en español para la profundidad del mar.
- source_word: inmensum / immense
  english_pob_choice: immense
  chosen_spanish: inmenso
  alternatives_spanish:
  - inmensurable
  - sin medida
  lexicon: Latin inmensum
  rationale: «Inmenso» reproduce con precisión el sentido de inmensidad del latín y conserva el paralelismo con «profundo».
theological_decisions:
- issue: Tratamiento reverencial de dominus meus
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - Señor mío
  - mi maestro
  rationale: El latín usa una fórmula de respeto dirigida al interlocutor. En español, «mi señor» mantiene la reverencia sin forzar una lectura divina que el contexto inmediato no exige.
  doctrine_reference: Cortesía reverencial y discurso directo; no se añade identificación teológica del interlocutor.
- issue: Imagen del mar como realidad creada y delimitada
  english_pob_reading: The sea is set in a broad place, so that it might be deep and immense
  chosen_spanish_reading: El mar fue puesto en un lugar espacioso, para que fuera profundo e inmenso
  alternative_spanish_readings:
  - El mar está puesto en un lugar amplio, para ser profundo e inmenso
  - El mar ha sido puesto en un lugar espacioso, de modo que sea profundo e inmenso
  rationale: La frase conserva la idea de una disposición intencional del mar dentro de un espacio amplio, sin desarrollar más implicaciones cosmológicas de las que el texto aporta.
  doctrine_reference: Creación y ordenamiento del mundo; lectura descriptiva sin ampliación doctrinal.
translation_notes:
  revision_awareness: El texto base y la revisión más reciente indican que no hubo cambios necesarios; la traducción respeta esa estabilidad y sigue de cerca el latín limpio y la POB inglesa sin introducir variantes no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene «mi señor» para el latín dominus meus por consistencia con un trato respetuoso directo.
  - Se usa «fue puesto» para conservar el matiz de establecimiento/colocación del pasivo latino.
  - Se conserva el paralelismo adjetival «profundo e inmenso» para reflejar altum et inmensum.
