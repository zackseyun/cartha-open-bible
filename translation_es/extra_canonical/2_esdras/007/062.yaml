translation:
  language: es
  text: 'Y respondí y dije: «Oh tierra, ¿qué has producido, si el entendimiento ha sido hecho de polvo, como el resto de la creación?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et respondit et dixi
  english_pob_choice: And I answered and said
  chosen_spanish: Y yo respondí y dije
  alternatives_spanish:
  - Y respondí y dije
  - Y contesté y dije
  lexicon: respondere / dicere
  rationale: Conserva la secuencia enfática de dos verbos del original latino y refleja el tono narrativo directo del testimonio en primera persona.
- source_word: O tu terra
  english_pob_choice: O earth
  chosen_spanish: Oh tierra
  alternatives_spanish:
  - Oh, tierra
  - Tierra
  lexicon: terra
  rationale: «Oh» reproduce la interjección vocativa con naturalidad en español; «tierra» mantiene el sentido literal del destinatario interpelado.
- source_word: quid peperisti
  english_pob_choice: what have you brought forth
  chosen_spanish: ¿qué has producido?
  alternatives_spanish:
  - ¿qué has engendrado?
  - ¿qué has dado a luz?
  lexicon: parere / peperi
  rationale: El latino sugiere ‘dar a luz’ / ‘producir’; en este contexto, «producido» mantiene la pregunta retórica amplia sin sexualizar innecesariamente el verbo, aunque «engendrado» y «dado a luz» quedan como alternativas posibles.
- source_word: si sensus
  english_pob_choice: if understanding
  chosen_spanish: si el entendimiento
  alternatives_spanish:
  - si la inteligencia
  - si la razón
  lexicon: sensus
  rationale: «Entendimiento» es el equivalente más sobrio y fiel para la capacidad de comprender que el contexto contrasta con el polvo.
- source_word: de pulvere factus est
  english_pob_choice: has been made from dust
  chosen_spanish: ha sido hecho del polvo
  alternatives_spanish:
  - ha sido formado del polvo
  - ha sido hecho de polvo
  lexicon: pulvis / facere
  rationale: «Hecho del polvo» sigue de cerca la construcción latina y preserva la imagen de origen material.
- source_word: sicut reliqua creatura
  english_pob_choice: like the rest of creation
  chosen_spanish: como el resto de la creación
  alternatives_spanish:
  - como el resto de lo creado
  - igual que el resto de la creación
  lexicon: reliqua creatura
  rationale: «Creación» es la opción más clara y natural en español para el conjunto de lo creado, manteniendo la comparación general del texto.
theological_decisions:
- issue: Origen del entendimiento humano desde el polvo frente a la creación restante
  english_pob_reading: understanding has been made from dust, like the rest of creation
  chosen_spanish_reading: el entendimiento ha sido hecho del polvo, como el resto de la creación
  alternative_spanish_readings:
  - la inteligencia ha sido hecha del polvo, como el resto de la creación
  - el entendimiento procede del polvo, como el resto de la creación
  rationale: 'La frase conserva la paradoja teológica del texto: la facultad de comprender, asociada al ser humano, aparece derivada de la misma materia perecedera que lo demás creado. No se atenúa la tensión entre capacidad intelectual y origen terrenal.'
  doctrine_reference: Anthropology / human mortality
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; por tanto, la redacción española sigue de cerca el texto latino limpiado y el sentido ya validado en el rastreo inglés.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo narrativo en primera persona ('respondí y dije').
  - Se conservó 'entendimiento' para evitar un desplazamiento semántico hacia 'sabiduría' o 'inteligencia' no requerido por el latín.
  - No se introdujeron términos eclesiásticos ajenos al registro del pasaje.
