    issue: La nota al pie usa la alternativa «Y dijo a mí».
    rationale: Aunque pretende reflejar una lectura posible del destinatario, esa redacción no es español natural; la forma idiomática sería «Y me dijo». Además, la nota debe dejar claro que esa adición no está explícita en el latín aquí.
  - severity: low
    issue: «lo que había sido anunciado» suena algo pesado.
    rationale: El pasivo perifrástico con pluscuamperfecto no añade precisión necesaria. «Lo que fue anunciado» o «las cosas que fueron anunciadas» comunica mejor el sentido pasivo de praedicti en español bíblico claro.
  revised_spanish_text: 'Y dijo[a]: «Durante siete días tendrán libertad, para que vean lo que fue anunciado».

