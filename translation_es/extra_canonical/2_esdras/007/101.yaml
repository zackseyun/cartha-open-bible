translation:
  language: es
  text: 'Y dijo[a]: «Durante siete días tendrán libertad, para que vean lo que fue anunciado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y me dijo». El latín aquí solo dice «Et dixit» y no explicita el destinatario.'
    reason: alternative_reading
lexical_decisions:
- source_word: Et dixit
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Y él dijo
  - Y respondió
  lexicon: dixit > decir
  rationale: El latín solo trae un sujeto implícito con verbo de habla; el contexto identifica al hablante, pero no justifica añadir «a mí». «Y dijo» conserva la sobriedad del original y evita introducir un complemento no atestiguado.
- source_word: septem diebus
  english_pob_choice: for seven days
  chosen_spanish: Durante siete días
  alternatives_spanish:
  - Por siete días
  - Siete días
  lexicon: septem + dies
  rationale: 'La idea es durativa: un período completo de siete días. «Durante siete días» expresa mejor esa duración en español que un mero conteo aislado.'
- source_word: erit libertas earum
  english_pob_choice: they will have freedom
  chosen_spanish: tendrán libertad
  alternatives_spanish:
  - habrá libertad para ellas
  - será libertad de ellas
  lexicon: libertas
  rationale: «Libertad» es la equivalencia directa de libertas. «Tendrán libertad» suena natural en español y conserva el valor de estado concedido, sin forzar una perífrasis más pesada.
- source_word: ut uideant
  english_pob_choice: so that they may see
  chosen_spanish: para que vean
  alternatives_spanish:
  - a fin de que vean
  - para ver
  lexicon: ut + videant
  rationale: La construcción final en español se expresa con «para que» + subjuntivo. Se mantiene el matiz de propósito del latín.
- source_word: qui praedicti
  english_pob_choice: the things that were foretold
  chosen_spanish: lo que había sido anunciado
  alternatives_spanish:
  - las cosas que habían sido anunciadas
  - lo que fue predicho
  lexicon: praedictus
  rationale: La forma latina es sintética y algo fragmentaria en el testimonio dado; la revisión inglesa dejó claro que el sentido es pasivo y profético. «Lo que había sido anunciado» mantiene el carácter previo de la predicción sin añadir detalles ausentes del fragmento.
theological_decisions:
- issue: Valor de la libertad concedida por siete días
  english_pob_reading: They will have freedom for seven days
  chosen_spanish_reading: Durante siete días tendrán libertad
  alternative_spanish_readings:
  - Por siete días tendrán libertad
  - Tendrán libertad por siete días
  rationale: No se trata de una libertad abstracta sino de una concesión temporal. La redacción española conserva ese límite temporal sin cargarla con implicaciones doctrinales ajenas al versículo.
  doctrine_reference: none
translation_notes:
  revision_awareness: El inglés auditado fue revisado para eliminar «to me» porque el latín fuente solo dice «Et dixit». También se retiró material no presente en el testimonio latino («and afterward they will be gathered into their habitations»). La versión española sigue esa lectura más sobria y se mantiene alineada con el texto latino limpio proporcionado.
  spanish_consistency_notes:
  - Se usó «libertad» para libertas, en coherencia con un valor temporal concedido.
  - Se evitó «Cristo», «SEÑOR» y otros términos no presentes en el fragmento.
  - 'La nota textual se limitó al único punto de ambigüedad relevante: el destinatario del habla.'
