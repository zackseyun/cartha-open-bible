translation:
  language: es
  text: Ahora bien, si a un hombre se le da[a] una ciudad como herencia, si el heredero no atraviesa el peligro puesto delante de él, ¿cómo recibirá su herencia?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le es dada».
    reason: alternative_rendering
lexical_decisions:
- source_word: si autem data dabitur
  english_pob_choice: Now if ... is given
  chosen_spanish: si ... es dada
  alternatives_spanish:
  - si ... se le da
  - si ... le es dada
  lexicon: dare → dar; passive periphrasis
  rationale: La construcción latina con participio y futuro pasivo reproduce un giro enfático semítico, pero el español natural exige una pasiva sencilla. «Es dada» conserva la pasiva sin introducir énfasis adicional no sostenido por el texto revisado en inglés.
- source_word: civitas
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - ciudadela
  - población
  lexicon: civitas → ciudad
  rationale: El sustantivo latino aquí corresponde claramente a «city»; «ciudad» es el equivalente directo y claro en español.
- source_word: homini
  english_pob_choice: to a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - a alguien
  lexicon: homo → hombre
  rationale: El dativo singular se vierte de manera directa. «A un hombre» mantiene la concreción del original y del inglés POB.
- source_word: in hereditatem
  english_pob_choice: for an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - para herencia
  - en herencia
  lexicon: hereditas → herencia
  rationale: «Como herencia» expresa con naturalidad la función de destino o asignación del término en español, sin añadir matices ajenos. Conserva la relación posesiva del original.
- source_word: heres
  english_pob_choice: heir
  chosen_spanish: heredero
  alternatives_spanish:
  - heredero legítimo
  - sucesor
  lexicon: heres → heredero
  rationale: «Heredero» es el equivalente directo y transparente; evita sustituir por un término más interpretativo.
- source_word: antepositum periculum
  english_pob_choice: the danger set before him
  chosen_spanish: el peligro puesto delante de él
  alternatives_spanish:
  - el peligro establecido ante él
  - el peligro preparado delante de él
  lexicon: anteponere / periculum → poner delante / peligro
  rationale: La imagen espacial de algo «puesto delante» sigue de cerca el latino y comunica el obstáculo previo sin suavizarlo ni convertirlo en abstracción.
- source_word: quomodo accipiet hereditatem suam
  english_pob_choice: how will he receive his inheritance?
  chosen_spanish: ¿cómo recibirá su herencia?
  alternatives_spanish:
  - ¿cómo obtendrá su herencia?
  - ¿cómo recibirá la herencia que le corresponde?
  lexicon: accipere / hereditas → recibir / herencia
  rationale: «Recibirá su herencia» reproduce el paralelismo de recibir una herencia ya destinada, sin cambiar el verbo por uno más jurídico o más moderno.
theological_decisions:
- issue: La relación entre la ciudad dada en herencia y el heredero que debe pasar por el peligro
  english_pob_reading: A city is given as an inheritance, and the heir must pass through the danger before receiving it.
  chosen_spanish_reading: Una ciudad es dada como herencia, y el heredero debe atravesar el peligro antes de recibirla.
  alternative_spanish_readings:
  - Una ciudad le es dada como herencia, y el heredero debe pasar por el peligro antes de recibirla.
  - Una ciudad es entregada como herencia, y el heredero debe pasar por el peligro antes de recibirla.
  rationale: El versículo presenta una analogía de herencia condicionada por prueba o peligro previo. La redacción española conserva la secuencia lógica y la exigencia de atravesar el peligro sin introducir explicaciones doctrinales adicionales.
  doctrine_reference: Motivo sapiencial/apocalíptico de prueba previa a la herencia; no se formula doctrina sistemática en el versículo.
translation_notes:
  revision_awareness: La versión inglesa más reciente retiró 'indeed' por no estar sustentado por el latín; por eso la versión española evita cualquier intensificador equivalente. También sigue la lectura revisada sin comillas finales añadidas al texto.
  spanish_consistency_notes:
  - Se mantiene «herencia» de forma consistente para hereditas.
  - Se conserva «heredero» para heres y «peligro» para periculum, con una imagen espacial fiel a antepositum.
  - El tono es sobrio y bíblico, sin recurrir a terminología eclesiástica no respaldada por el texto.
