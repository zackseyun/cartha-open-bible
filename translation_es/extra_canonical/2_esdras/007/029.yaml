  text: et erit post annos hos, et morietur Filius meus Christus et omnes qui spiramentum habent hominis.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/029.yaml
  text: And after these years, my Son the Messiah will die, and all who have human breath.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:04Z'
    unchanged: false
    changes_summary: Capitalized 'Son' for the divine speaker, and revised 'all who have the breath of man' to the more natural and faithful 'all who have human breath,' preserving the sense of omnes qui spiramentum habent hominis.
translation:
  language: es
  text: Y después de estos años, mi Hijo, el Mesías, morirá, y todos los que tienen aliento humano.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Filius meus
  english_pob_choice: my Son
  chosen_spanish: mi Hijo
  alternatives_spanish:
  - mi hijo
  lexicon: filius = hijo
  rationale: Conservo la relación filial directa del latín y la capitalización de 'Hijo' cuando habla la voz divina, en paralelo con la revisión inglesa que capitalizó 'Son' para el hablante divino.
- source_word: Christus
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: Christus = Mesías/Cristo
  rationale: El audit trail inglés ya fija 'the Messiah'; en español, 'Mesías' comunica mejor el título sin convertirlo automáticamente en nombre litúrgico.
- source_word: morietur
  english_pob_choice: will die
  chosen_spanish: morirá
  alternatives_spanish:
  - va a morir
  lexicon: morior = morir
  rationale: Es la equivalencia verbal directa y natural para el futuro simple del latín.
- source_word: spiramentum habent hominis
  english_pob_choice: have human breath
  chosen_spanish: tienen aliento humano
  alternatives_spanish:
  - tienen el aliento del hombre
  - tienen respiración humana
  lexicon: spiramentum = aliento/respiración; homo = hombre/humano
  rationale: '''Aliento humano'' refleja con claridad el sentido de ''human breath'' del inglés revisado y evita la dureza de una construcción posesiva literal como ''del hombre''.'
theological_decisions:
- issue: Título mesiánico y capitalización filial
  english_pob_reading: my Son the Messiah
  chosen_spanish_reading: mi Hijo, el Mesías
  alternative_spanish_readings:
  - mi hijo, el Mesías
  - mi Hijo el Mesías
  rationale: 'Mantengo la doble designación del sujeto: filiación y mesianidad. La capitalización de ''Hijo'' sigue la revisión inglesa para la voz divina, sin forzar un título menos explícito.'
  doctrine_reference: Cristología y lenguaje filial divino
- issue: Universalidad de la muerte humana
  english_pob_reading: all who have human breath
  chosen_spanish_reading: todos los que tienen aliento humano
  alternative_spanish_readings:
  - todos los que tienen respiración humana
  - todos los que tienen el aliento del hombre
  rationale: La frase conserva el alcance universal del latín 'omnes qui...' y evita restringirlo o espiritualizarlo; 'aliento humano' expresa la condición mortal compartida.
  doctrine_reference: Antropología bíblica y mortalidad humana
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'the breath of man' por 'human breath' para hacer más natural y fiel 'omnes qui spiramentum habent hominis'. La propuesta española sigue esa misma dirección con 'aliento humano', manteniendo el sentido sin literalismo pesado.
  spanish_consistency_notes:
  - Usé 'Mesías' conforme al criterio del proyecto para Χριστός/Messian language cuando funciona como título.
  - No apliqué 'SEÑOR' ni otras sustituciones devocionales porque el texto fuente no las exige aquí.
  - Mantuve el tono solemne y la sintaxis simple para que la cláusula profética siga siendo clara y auditable.
