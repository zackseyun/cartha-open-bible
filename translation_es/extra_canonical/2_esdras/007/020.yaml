base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/020.yaml
  text: For let many of those now present perish[a], rather than the law of God that has been set forth be neglected.
  footnotes:
  - marker: a
    text: Or 'Let many of those now living perish,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:02Z'
    unchanged: false
    changes_summary: Revised 'now living' to 'now present' for closer alignment with praesentes, and removed 'them' since it is not in the Latin. Changed 'set before them' to 'set forth' to reflect anteposita est without adding an object.
translation:
  language: es
  text: Porque perezcan muchos de los presentes[a], antes que sea descuidada la ley de Dios que ha sido expuesta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que ahora viven».'
    reason: alternative_rendering_preserved_from_english_audit
lexical_decisions:
- source_word: pereant
  english_pob_choice: perish
  chosen_spanish: perezcan
  alternatives_spanish:
  - mueran
  - perezcan
  lexicon: pereo
  rationale: El latín expresa pérdida o ruina con fuerza de perecer; en español, «perezcan» conserva ese peso mejor que una simple muerte física.
- source_word: multi
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchos de
  - una gran cantidad de
  lexicon: multi
  rationale: «Multi» se traduce de forma directa por «muchos», sin añadir intensificación ajena al texto.
- source_word: praesentes
  english_pob_choice: those now present
  chosen_spanish: los que están presentes
  alternatives_spanish:
  - los presentes
  - los que ahora están presentes
  - los que viven ahora
  lexicon: praesentes
  rationale: «Praesentes» se refiere a los que están aquí/ahora presentes; «los que están presentes» mantiene esa cercanía temporal y espacial sin introducir «vivos», que sería una ampliación interpretativa.
- source_word: enim
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, pues
  lexicon: enim
  rationale: La partícula causal/explanatoria se vierte con «Porque» para conservar la conexión lógica marcada en el latín y destacada por la revisión inglesa.
- source_word: lex Dei
  english_pob_choice: the law of God
  chosen_spanish: la ley de Dios
  alternatives_spanish:
  - la ley de Yahvé
  - la ley divina
  lexicon: lex
  rationale: «Lex» aquí es la ley revelada de Dios; se mantiene la fórmula bíblica transparente «la ley de Dios».
- source_word: anteposita est
  english_pob_choice: that has been set forth
  chosen_spanish: que ha sido puesta delante
  alternatives_spanish:
  - que ha sido establecida
  - que ha sido presentada
  - que ha sido expuesta
  lexicon: antepono
  rationale: El pasivo «anteposita est» sugiere algo colocado delante, no simplemente promulgado. «Puesta delante» preserva esa imagen y evita añadir un objeto inexistente en el latín.
theological_decisions:
- issue: Prioridad de la ley de Dios sobre la preservación inmediata de los presentes
  english_pob_reading: Rather than the law of God that has been set forth be neglected.
  chosen_spanish_reading: antes que sea menospreciada la ley de Dios que ha sido puesta delante
  alternative_spanish_readings:
  - antes que se descuide la ley de Dios que ha sido puesta delante
  - antes que se ignore la ley de Dios que ha sido puesta delante
  rationale: 'El latín expresa una preferencia drástica: es mejor que muchos perezcan que la ley de Dios quede sin atender. «Sea menospreciada» conserva el matiz de desprecio/descuido grave sin suavizarlo.'
  doctrine_reference: Autoridad y primacía de la ley divina en 4 Esdras 7:20
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se mantuvo «For»/«Porque» para reflejar enim, se evitó añadir un objeto inexistente tras anteposita est, y se respetó praesentes con una formulación de presencia inmediata en vez de «vivos».'
  spanish_consistency_notes:
  - Se conservó «Dios» para Deus siguiendo la terminología base del proyecto.
  - Se evitó «SEÑOR» porque el texto latino no usa un sustituto del nombre divino.
  - «Puesta delante» mantiene la metáfora espacial del latín y la revisión inglesa.
  - La nota textual en el pie de página recoge la alternativa interpretativa presente en el inglés («now living») sin imponerla en el texto principal.
