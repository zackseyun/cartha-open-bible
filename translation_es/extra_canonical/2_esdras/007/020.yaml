revisions:
- from: Porque perezcan muchos de los que están presentes[a], antes que sea menospreciada la ley de Dios que ha sido puesta delante.
  to: Porque perezcan muchos de los presentes[a], antes que sea descuidada la ley de Dios que ha sido expuesta.
  rationale: Se corrige neglegatur a «sea descuidada» para reflejar mejor el sentido de desatención del latín; se reemplaza «puesta delante» por «expuesta» para evitar un calco poco natural de anteposita est; y se simplifica «los que están presentes» a «los presentes» por mejor fluidez en español, manteniendo la alternativa documentada en nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:03:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del latín: conserva el valor explicativo de enim con «Porque», mantiene el optativo/jusivo de pereant con «perezcan», y respeta la comparación drástica «antes que». También reproduce adecuadamente praesentes frente a la antigua opción «ahora viven». Sin embargo, «menospreciada» no corresponde bien a neglegatur, que aquí significa «sea descuidada / desatendida / se la deje de lado», no tanto «despreciada». Además, «puesta delante» suena poco natural en español bíblico actual para anteposita est; «ha sido expuesta» o «ha sido presentada» preserva mejor la idea de algo puesto delante públicamente sin calco rígido.'
  spanish_quality_summary: El texto es mayormente claro, pero «que ha sido puesta delante» resulta algo calcado y poco idiomático. «Porque perezcan muchos de los presentes» suena más natural que «de los que están presentes» y sigue siendo fiel. La revisión propuesta mejora naturalidad sin perder dignidad ni precisión.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «la ley de Dios» está bien. No aparece el nombre divino Yahvé en el origen, así que no aplica ajuste. La nota alternativa sobre praesentes debe mantenerse, pero conviene formularla con mayor naturalidad en español.
  issues:
  - severity: medium
    issue: «menospreciada» traduce de forma imprecisa neglegatur
    rationale: El latín neglegatur se refiere principalmente a descuidar, desatender o no hacer caso, no necesariamente a despreciar activamente. «Menospreciada» introduce un matiz más fuerte de desdén que el texto no exige.
  - severity: medium
    issue: «ha sido puesta delante» es un calco poco natural de anteposita est
    rationale: Aunque intenta conservar la imagen espacial, en español suena forzado. «ha sido expuesta» o «ha sido presentada» comunica mejor la idea de la ley puesta delante de la gente / propuesta públicamente, sin añadir objeto.
  - severity: low
    issue: «de los que están presentes» puede simplificarse
    rationale: «de los presentes» es más natural y sigue representando praesentes con suficiente fidelidad. La nota ya preserva la alternativa «los que ahora viven».
  revised_spanish_text: Porque perezcan muchos de los presentes[a], antes que sea descuidada la ley de Dios que ha sido expuesta.
  revised_footnotes:
  - marker: a
    text: 'O: «los que ahora viven».'
    reason: alternative_rendering_preserved_from_english_audit
  revision_rationale: Se corrige neglegatur a «sea descuidada» para reflejar mejor el sentido de desatención del latín; se reemplaza «puesta delante» por «expuesta» para evitar un calco poco natural de anteposita est; y se simplifica «los que están presentes» a «los presentes» por mejor fluidez en español, manteniendo la alternativa documentada en nota.
