  yaml_path: translation/extra_canonical/2_esdras/007/019.yaml
  text: And he said to me[a], “You are not a judge over the Lord, nor one who understands over the Most High.”
  footnotes:
  - marker: a
    text: Or 'a judge over the Lord, nor one wiser than'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:32Z'
    unchanged: false
    changes_summary: 'Removed the duplicated text and revised the wording to reflect the Latin more closely: ''iudex super Dominum'' as ''a judge over the Lord'' and ''intellegens super Altissimum'' as ''one who understands over the Most High,'' avoiding the interpretive addition ''better'' and ''more.'''
translation:
  language: es
  text: 'Y me dijo[a]: «No eres juez sobre Yahvé, ni entiendes por encima del Altísimo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No eres mejor juez que Yahvé, ni más entendido que el Altísimo».'
    reason: alternative_rendering_preserving_comparative_possibility
lexical_decisions:
- source_word: non es iudex super Dominum
  english_pob_choice: You are not a judge over the Lord
  chosen_spanish: No eres un juez sobre Yahvé
  alternatives_spanish:
  - No eres un juez sobre el Señor
  - No eres un juez por encima de Yahvé
  lexicon: iudex -> juez; super + accusative in this Latin context -> sobre / por encima de
  rationale: Conservo la imagen de superioridad implícita en super con 'sobre', que refleja mejor la relación jerárquica del latín que una paráfrasis explicativa. Uso 'Yahvé' según la norma del proyecto para יהוה/divine-name language, en vez de 'Señor' como máscara.
- source_word: neque intellegens super Altissimum
  english_pob_choice: nor one who understands over the Most High
  chosen_spanish: ni uno que entiende sobre el Altísimo
  alternatives_spanish:
  - ni uno más entendido que el Altísimo
  - ni uno más sabio que el Altísimo
  lexicon: intellegens -> que entiende; super + accusative -> sobre / más que
  rationale: '''intellegens'' expresa capacidad de entender, no necesariamente ''sabio''; por eso traduzco con ''uno que entiende''. Mantengo ''sobre'' para conservar la misma construcción relacional que en la primera cláusula, evitando introducir el comparativo ''más'' que el último pasaje revisado del audit trail descartó.'
- source_word: Altissimum
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  - el Altísimo Dios
  lexicon: Altissimus -> Altísimo
  rationale: '''Altísimo'' es el equivalente español más natural y reverente para el título divino, y preserva el paralelismo con el latín. No añado ''Dios'' porque el texto no lo explicita aquí.'
theological_decisions:
- issue: Relación de superioridad humana frente a Dios
  english_pob_reading: You are not a judge over the Lord, nor one who understands over the Most High.
  chosen_spanish_reading: No eres un juez sobre Yahvé, ni uno que entiende sobre el Altísimo.
  alternative_spanish_readings:
  - No eres un juez por encima de Yahvé, ni uno más entendido que el Altísimo.
  - No puedes juzgar a Yahvé, ni comprenderlo mejor que él.
  rationale: El punto del versículo es negar cualquier posición humana de juicio o comprensión superior respecto de Dios. Conservo la estructura doble y la tensión semántica de super/intellegens sin suavizarla en una formulación más interpretativa.
  doctrine_reference: Sabiduría divina; limitación humana ante Dios (cf. Romanos 11:33-36; Isaías 55:8-9)
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión desde una formulación comparativa ('better judge', 'more understanding') hacia una más cercana al latín ('judge over', 'one who understands over'). La versión española sigue esa última decisión, preservando la construcción relacional de super y evitando introducir un comparativo explícito que el texto base no requiere.
  spanish_consistency_notes:
  - Uso 'Yahvé' para el nombre divino conforme al estándar del proyecto.
  - Mantengo 'Altísimo' como título divino fijo y 'entender' para intellegens, sin convertirlo en 'sabio' salvo en la nota de alternativa.
  - Conservo el orden y el paralelismo de las dos cláusulas para reflejar la sintaxis breve del latín.
