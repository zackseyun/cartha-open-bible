review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el latín: «non es iudex super Dominum neque intellegens super Altissimum». Conserva bien la doble negación y el paralelismo. Sin embargo, en español «uno que entiende sobre el Altísimo» suena forzado y poco inteligible; además, la nota alternativa ya preserva la posibilidad comparativa documentada en el historial inglés.'
  spanish_quality_summary: La primera cláusula («No eres un juez sobre Yahvé») es dura pero aceptable como reflejo literal. La segunda («ni uno que entiende sobre el Altísimo») resulta poco natural en español y afecta la legibilidad e inteligibilidad eclesial. Conviene ajustar a una formulación más idiomática sin perder el sentido relacional.
  glossary_alignment: Se alinea bien con la terminología del proyecto al usar «Yahvé» y «el Altísimo». No hay conflicto doctrinal. El problema principal es estilístico-semántico en la expresión de «intellegens super».
  issues:
  - severity: medium
    issue: Expresión española poco natural en la segunda cláusula
    rationale: «ni uno que entiende sobre el Altísimo» no es español idiomático y puede resultar confuso para el lector. Aunque refleja mecánicamente el latín, no preserva bien la inteligibilidad requerida.
  - severity: low
    issue: La nota puede expresar mejor la alternativa comparativa ya documentada
    rationale: El historial inglés conserva una alternativa del tipo «wiser than / más entendido que». Conviene mantener esa posibilidad como nota, pero con una redacción española más limpia.
  revised_spanish_text: 'Y me dijo[a]: «No eres juez sobre Yahvé, ni entiendes por encima del Altísimo».'
