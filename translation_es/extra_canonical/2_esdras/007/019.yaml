  rationale: Se mantiene la cercanía al latín y al texto principal inglés revisado, pero se corrige la segunda cláusula para que el español sea natural y claro. «Ni entiendes por encima del Altísimo» conserva la idea de pretensión de superioridad en comprensión sin la torpeza de «uno que entiende sobre». También se simplifica «un juez» a «juez» por idiomaticidad española. La nota preserva la alternativa comparativa documentada en el audit trail.
