translation:
  language: es
  text: '¿Hasta cuándo ha tenido paciencia el Altísimo con los que viven en esta era[a], no por causa de ellos, sino por causa de los tiempos que él ha previsto? Y respondí y dije: «Si he hallado gracia'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «era» traduce aquí saeculum en sentido de la edad presente, no de «mundo» como espacio físico.
    reason: lexical_alternative
lexical_decisions:
- source_word: modo respondebunt in nouissimis temporibus
  english_pob_choice: For how long has ... shown long-suffering
  chosen_spanish: ¿Por cuánto tiempo ha mostrado ... longanimidad
  alternatives_spanish:
  - ¿Hasta cuándo ha mostrado ... paciencia
  - ¿Por cuánto ha soportado ... con paciencia
  lexicon: longanimidad / paciencia
  rationale: El latín expresa duración e indulgencia paciente; «longanimidad» conserva mejor el matiz de paciencia perseverante que una simple «paciencia», y corresponde bien al tono de la POB en inglés.
- source_word: Altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Altísimo Dios
  lexicon: título divino
  rationale: «Altísimo» es el equivalente natural y reverente del título divino, sin necesidad de introducir una perífrasis más pesada.
- source_word: his qui inhabitant saeculum
  english_pob_choice: those who inhabit the age
  chosen_spanish: los que habitan el siglo
  alternatives_spanish:
  - los que habitan este mundo
  - los que habitan la era
  lexicon: saeculum
  rationale: Se preserva el valor de «saeculum» como «siglo/edad» en sentido temporal-histórico, evitando reducirlo a «mundo» y manteniendo la tensión conceptual del texto.
- source_word: non propter eos
  english_pob_choice: not for their sake
  chosen_spanish: no por causa de ellos
  alternatives_spanish:
  - no por ellos mismos
  - no en atención a ellos
  lexicon: propter
  rationale: La construcción causal mantiene el matiz explicativo del latín y su contraste con la cláusula siguiente.
- source_word: sed propter ea quae prouidit tempora
  english_pob_choice: but because of the times that he has foreseen
  chosen_spanish: sino por causa de los tiempos que él ha previsto
  alternatives_spanish:
  - sino a causa de los tiempos que ha previsto
  - sino por los tiempos que había previsto
  lexicon: prouidit / tempora
  rationale: «Ha previsto» refleja la anticipación divina sin forzar el tiempo verbal; «por causa de» conserva la relación causal explícita del latín.
- source_word: Et respondi et dixi
  english_pob_choice: And I answered and said
  chosen_spanish: Y respondí y dije
  alternatives_spanish:
  - Y respondí diciendo
  - Y contesté y dije
  lexicon: respuesta formularia
  rationale: Se conserva la fórmula narrativa semítica/solene de respuesta directa sin suavizarla en exceso.
- source_word: si inueni gratiam
  english_pob_choice: If I have found favor
  chosen_spanish: Si he hallado gracia
  alternatives_spanish:
  - Si he hallado favor
  - Si he encontrado gracia
  lexicon: gratia
  rationale: «Gracia» es la opción preferida de la POB para χάρις/gratia cuando el contexto es receptividad ante Dios; se mantiene la resonancia bíblica y la apertura de la frase queda en suspenso como en la fuente.
theological_decisions:
- issue: Duración de la longanimidad divina respecto a la historia
  english_pob_reading: For how long has the Most High shown long-suffering to those who inhabit the age—not for their sake, but because of the times that he has foreseen!
  chosen_spanish_reading: ¿Por cuánto tiempo ha mostrado el Altísimo longanimidad con los que habitan el siglo —no por causa de ellos, sino por causa de los tiempos que él ha previsto!
  alternative_spanish_readings:
  - ¿Hasta cuándo ha tenido paciencia el Altísimo con los que habitan el siglo...
  - ¿Por cuánto tiempo el Altísimo ha soportado con paciencia a los que habitan el siglo...
  rationale: La formulación conserva el énfasis teológico en la paciencia divina orientada por el plan previo de Dios, no por mérito de los habitantes del siglo.
  doctrine_reference: Providencia divina; paciencia de Dios; historia bajo conocimiento previo de Dios
translation_notes:
  revision_awareness: La revisión inglesa reciente restauró la cláusula final «And I answered and said, ‘If I have found favor’» y suavizó la frase inicial para evitar «a time». La presente versión española sigue esa forma revisada, manteniendo la apertura incompleta de la cita final, tal como queda en el fragmento latino disponible.
  spanish_consistency_notes:
  - Se preserva «Altísimo» para el título divino.
  - Se usa «longanimidad» para reflejar el carácter de la paciencia divina sin banalizarlo.
  - Se mantiene «gracia» en la apertura de la respuesta para conservar la resonancia bíblica y la inacabada suspensión del texto.
