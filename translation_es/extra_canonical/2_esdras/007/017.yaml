translation:
  language: es
  text: 'Entonces respondí y dije: «Oh, Señor soberano, he aquí, has ordenado[a] en tu ley que los justos heredarán estas cosas, pero los impíos perecerán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «has dispuesto».'
    reason: alternative_reading
lexical_decisions:
- source_word: dominator domine
  english_pob_choice: O sovereign Lord
  chosen_spanish: Oh, soberano Señor
  alternatives_spanish:
  - Oh, Señor que gobiernas
  - Oh, Señor soberano
  lexicon: Latin dominator domine; background Greek δέσποτα κύριε
  rationale: Conserva el doble vocativo solemne del original sin convertirlo en una cláusula descriptiva. «Soberano Señor» reproduce la majestad titular que la revisión inglesa defendió frente a «O Lord who rules».
- source_word: ecce
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira, pues
  lexicon: Latin ecce
  rationale: «Mira» comunica el marcador discursivo de atención y énfasis en un español natural y reverente. Mantiene el valor retórico de ecce que la revisión inglesa restauró.
- source_word: disposuisti in lege tua
  english_pob_choice: you have ordained in your law
  chosen_spanish: has ordenado en tu ley
  alternatives_spanish:
  - has dispuesto en tu ley
  - has establecido en tu ley
  lexicon: Latin disponere
  rationale: «Ordenado» sigue la decisión inglesa y refleja adecuadamente la fuerza normativa/legal del verbo en este contexto. «En tu ley» conserva el marco de autoridad jurídica divina.
- source_word: iusti hereditabunt haec
  english_pob_choice: the righteous will inherit these things
  chosen_spanish: los justos heredarán estas cosas
  alternatives_spanish:
  - los justos recibirán estas cosas en herencia
  - los justos poseerán estas cosas
  lexicon: Latin iusti / hereditabunt / haec
  rationale: «Heredarán» mantiene la metáfora de herencia y el peso covenantal del verbo latino. «Estas cosas» reproduce el demostrativo neutro plural con la misma amplitud referencial del texto.
- source_word: impii autem peribunt
  english_pob_choice: but the ungodly will perish
  chosen_spanish: pero los impíos perecerán
  alternatives_spanish:
  - pero los malvados perecerán
  - pero los sin Dios perecerán
  lexicon: Latin impii / peribunt
  rationale: «Impíos» conserva la categoría religiosa-moral del original mejor que «malvados» en este contexto judicial. «Perecerán» mantiene el paralelismo directo con la cláusula anterior.
theological_decisions:
- issue: Titular address to God
  english_pob_reading: O sovereign Lord
  chosen_spanish_reading: Oh, soberano Señor
  alternative_spanish_readings:
  - Oh, Señor que gobiernas
  - Oh, Señor soberano
  rationale: La forma elegida preserva la invocación apocalíptica solemne y evita reducirla a una explicación narrativa. No suaviza la doble designación vocativa presente en la tradición latina/grecolatina del pasaje.
  doctrine_reference: Apocalyptic divine address; reverent vocative style
- issue: Legal-covenantal promise of inheritance
  english_pob_reading: you have ordained in your law that the righteous will inherit these things
  chosen_spanish_reading: has ordenado en tu ley que los justos heredarán estas cosas
  alternative_spanish_readings:
  - has dispuesto en tu ley que los justos heredarán estas cosas
  - has establecido en tu ley que los justos heredarán estas cosas
  rationale: 'Se mantiene la fuerza jurídica del enunciado: Dios ha fijado en su ley una promesa normativa. «Heredarán» conserva la herencia como categoría de promesa pactal, no meramente posesión material.'
  doctrine_reference: Covenant promise; eschatological inheritance
- issue: Contrastive judgment on the ungodly
  english_pob_reading: but the ungodly will perish
  chosen_spanish_reading: pero los impíos perecerán
  alternative_spanish_readings:
  - pero los malvados perecerán
  - pero los sin Dios perecerán
  rationale: La antítesis es directa y judicial. «Impíos» mantiene el contraste teológico con «justos» sin introducir una paráfrasis moralizante más amplia.
  doctrine_reference: Divine judgment; righteousness vs. impiety
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que restituyó ecce («mira») y que prefirió «O sovereign Lord» como vocativo titular. La versión española refleja ambas decisiones y conserva la tensión legal-covenantal de «ordained in your law» sin diluirla.
  spanish_consistency_notes:
  - Se usó «Yahvé» como estándar del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se mantuvo «justos» / «impíos» para sostener el contraste judicial del texto.
  - «Heredarán estas cosas» conserva la referencia amplia del demostrativo latino sin especificar indebidamente el contenido.
