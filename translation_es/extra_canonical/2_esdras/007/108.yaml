revisions:
- from: y David para la destrucción[a], y Salomón para los que están en la santificación.
  to: y David por la destrucción[a], y Salomón por los que están en la santificación.
  rationale: Se cambia 'para' por 'por' para reflejar mejor el valor de pro en una lista de intercesores y mantener un español más natural en contexto. Se conserva 'están en la santificación' en el texto principal pese a su aspereza porque el latín es elíptico y la auditoría inglesa optó por una formulación igualmente cercana; la revisión se limita a mejorar la preposición y a alinear la nota con ella. No se requiere adjudicación adicional porque el ajuste es menor y no cambia la decisión léxica central ya documentada.
