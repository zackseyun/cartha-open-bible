lexical_decisions:
- source_word: confractione
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - quebranto
  lexicon: Latin confractione
  rationale: La forma latina apunta a un quebrantamiento o ruina; 'destrucción' conserva ese valor con un español natural y transparente. 'Plaga' o 'castigo' introducirían una especificación no presente en el latín.
- source_word: in sanctificationem
  english_pob_choice: in sanctification
  chosen_spanish: en la santificación
  alternatives_spanish:
  - en la dedicación
  - para la santificación
  lexicon: Latin sanctificationem
  rationale: Se conserva de cerca la frase latina sin expandirla interpretativamente. 'Dedicación' refleja una posible comprensión histórica, pero aquí el texto base preserva el sustantivo 'sanctificaciónem', por lo que 'santificación' mantiene mejor la evidencia textual.
- source_word: pro eis qui
  english_pob_choice: for those
  chosen_spanish: para los que
  alternatives_spanish:
  - por los que
  - para aquellos que
  lexicon: Latin pro + relative clause
  rationale: '''Para los que'' reproduce el valor distributivo de ''pro eis qui'' con fluidez natural en español. ''Por los que'' puede sonar más causal o intercesorio, pero aquí la estructura nominal del latín permite ''para''.'
theological_decisions:
- issue: Alcance de 'sanctificationem'
  english_pob_reading: for those in sanctification
  chosen_spanish_reading: para los que están en la santificación
  alternative_spanish_readings:
  - para los que están en la dedicación
  - para los que vienen al santuario
  rationale: La historia de revisión en inglés muestra que una expansión a 'dedication' o a 'sanctuary' era interpretativa. Para evitar sobreinterpretación, la versión española conserva el término más cercano al latín y deja abierta la tensión semántica asociada al contexto del templo.
  doctrine_reference: Contexto del templo y su dedicación en la tradición de Esdras/2 Esdras; no se fuerza una lectura litúrgica específica.
translation_notes:
  revision_awareness: 'El inglés POB pasó por una corrección importante: primero se había expandido ''sanctificationem'' a ''at the dedication'' y antes incluso a ''for those who would come to the sanctuary''; la revisión más reciente volvió al contenido más literal del latín. La propuesta española sigue esa última decisión y evita introducir ''santuario'' o ''dedicación'' en el cuerpo principal.'
  spanish_consistency_notes:
  - Se mantiene 'David' y 'Salomón' como nombres propios sin transliteración adicional.
  - Se usa 'destrucción' para 'confractione' según el valor semántico de quebrantamiento/ruina documentado por la revisión inglesa.
  - La nota de pie conserva la alternativa interpretativa sin convertirla en texto principal.
  - La sintaxis busca ser publicable y clara, sin añadir sujetos o verbos ausentes en el latín.
