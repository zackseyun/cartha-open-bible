base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/047.yaml
  text: And now I see that the age to come will bring joy to few[a], but torments to many.
  footnotes:
  - marker: a
    text: Or 'And now I see that the joy of the age to come will benefit few, but torments many.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:47:35Z'
    unchanged: false
    changes_summary: Removed 'the joy of' and supplied 'will bring' to better reflect the Latin sense of the age to come being for few, while preserving the contrast with torments for many.
translation:
  language: es
  text: Y ahora veo que el tiempo venidero traerá gozo a pocos[a], pero tormentos a muchos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y ahora veo que el gozo del tiempo venidero será para pocos, pero tormentos para muchos».'
    reason: alternative_reading
lexical_decisions:
- source_word: ad paucos ... iocunditatem
  english_pob_choice: the age to come will bring joy to few
  chosen_spanish: el tiempo venidero traerá gozo a pocos
  alternatives_spanish:
  - la edad venidera traerá alegría a pocos
  - el siglo venidero traerá gozo a pocos
  lexicon: ad + accusative; iocunditas
  rationale: El latín expresa que el gozo queda/está destinado a pocos; en español, «traerá gozo a pocos» conserva esa relación sin hacer del gozo el sujeto que actúa. «Tiempo venidero» evita el calco rígido de «edad» y sigue la idea escatológica del contexto.
- source_word: tormenta / tormenta multis
  english_pob_choice: torments to many
  chosen_spanish: tormentos a muchos
  alternatives_spanish:
  - tormentos para muchos
  - aflicciones para muchos
  lexicon: tormentum
  rationale: «Tormentos» reproduce la fuerza léxica de tormenta/tormentum. Se mantiene la preposición «a» para paralelismo con «a pocos» y para conservar la distribución de destinatarios implícita en el latín.
theological_decisions:
- issue: Destino desigual del gozo y los tormentos en el tiempo venidero
  english_pob_reading: the age to come will bring joy to few, but torments to many
  chosen_spanish_reading: el tiempo venidero traerá gozo a pocos, pero tormentos a muchos
  alternative_spanish_readings:
  - la edad venidera traerá gozo a pocos, pero tormentos a muchos
  - el siglo venidero traerá gozo a pocos, pero tormentos a muchos
  rationale: 'La frase latina contrasta una distribución escatológica desigual: el gozo pertenece a pocos y los tormentos a muchos. La redacción española conserva ese contraste sin suavizarlo ni convertirlo en una valoración subjetiva.'
  doctrine_reference: escatología; retribución final
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que corrigió la ambigüedad de la versión inglesa anterior y restableció el contraste entre el gozo destinado a pocos y los tormentos destinados a muchos. La traducción española refleja esa misma relación distributiva del latín.
  spanish_consistency_notes:
  - Se prefirió «tiempo venidero» como solución natural en español para el latín escatológico, sin perder la referencia al futuro final.
  - Se conservó «gozo» en lugar de «alegría» para mantener el registro bíblico y la correspondencia con iocunditas.
  - Se mantuvo «tormentos» en plural para respetar el plural latino y el contraste con «a pocos / a muchos».
