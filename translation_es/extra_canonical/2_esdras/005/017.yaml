translation:
  language: es
  text: ¿O no sabes que Israel te ha sido confiado en la tierra de su destierro?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La nota inglesa anterior incluía por error la exhortación del versículo siguiente; la revisión del texto deja este versículo terminado aquí.
    reason: textual_variant
lexical_decisions:
- source_word: Aut nescis quoniam
  english_pob_choice: Or do you not know that
  chosen_spanish: ¿O no sabes que
  alternatives_spanish:
  - ¿Acaso no sabes que
  - ¿O no conoces que
  lexicon: Latin aut + nescis + quoniam
  rationale: Conservo la pregunta retórica introducida por 'Aut' y el verbo de conocimiento 'nescis' con un español natural y directo; '¿O no sabes que' reproduce bien el tono exhortativo sin añadir contenido.
- source_word: tibi creditus est
  english_pob_choice: has been entrusted to you
  chosen_spanish: te ha sido confiado
  alternatives_spanish:
  - te ha sido entregado
  - te ha sido encomendado
  lexicon: Latin credere (passive)
  rationale: '''Creditus est'' aquí implica un encargo o depósito de responsabilidad. ''Confiado'' mantiene la idea de algo puesto bajo cuidado de alguien, con mejor naturalidad que un calco literal.'
- source_word: Israel
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: Nombre propio / sujeto colectivo
  rationale: Se conserva 'Israel' como sujeto colectivo del mandato, tal como en el latín y la POB inglesa.
- source_word: in regione trans migrationis eorum
  english_pob_choice: in the land of their exile
  chosen_spanish: en la tierra de su destierro
  alternatives_spanish:
  - en la región de su emigración
  - en la tierra de su migración
  lexicon: Latin trans migrationis eorum
  rationale: La revisión textual confirma que el verso termina aquí y no continúa con la exhortación del verso siguiente. 'Destierro' expresa bien la condición de exilio implícita en 'trans migrationis' y suena más idiomático en español bíblico actual que 'emigración'.
theological_decisions:
- issue: Alcance del versículo y separación de 5:18
  english_pob_reading: The English POB footnote had included wording from the next verse, but the revision trail corrects 5:17 to end at 'the land of their exile.'
  chosen_spanish_reading: El texto español termina en la pregunta sobre Israel en la tierra de su destierro, sin incorporar la exhortación del verso siguiente.
  alternative_spanish_readings:
  - Incluir 'Levántate, pues, y come algo de pan...'
  - Fusionar 5:17 y 5:18 en una sola línea
  rationale: La revisión aplicada indica un error mayor de versificación en el borrador previo. Para ser auditable y fiel al testimonio latino limpiado, el versículo debe cerrarse con 'destierro' y no absorber material de 5:18.
  doctrine_reference: Principio textual de delimitación versicular y fidelidad al testimonio manuscrito/literario.
translation_notes:
  revision_awareness: 'La revisión más reciente corrige un desbordamiento de versículo: 2 Esdras 5:17 termina en la cláusula sobre Israel en la tierra de su destierro. Se ha eliminado toda continuación procedente de 5:18 y se ha ajustado la nota para reflejar el límite correcto del versículo.'
  spanish_consistency_notes:
  - Se mantiene el trato reverente e impersonal del interrogativo retórico sin añadir formas explicativas.
  - '''Confiado'' se usa como término de depósito/responsabilidad, coherente con el pasivo de ''creditus est''.'
  - '''Destierro'' se elige como equivalente bíblico natural de ''exile'' y para evitar la ambigüedad de ''migración''.'
