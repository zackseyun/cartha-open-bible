source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'Aut nescis quoniam tibi creditus est Israel in regione trans migrationis eorum? Exsurge ergo et gusta panem alicuius ut non derelinquas nos, sicut pastor gregem suum in manibus luporum malignorum. Et dixi ei: uade a me et non ad me accedas usque ad dies septem et tunc uenies ad me. et audiuit ut dixi et recessit a me. Et ego ieiunaui diebus septem ululans et plorans sicut mihi mandauit Vriel angelus. Et factum est post dies septem et iterum cogitationes cordis mei molestiae erant mihi ualde. Et resumpsit anima mea spiritum intellectus et iterum coepi loqui coram altissimo sermones, Et dixi: dominator domine, ex omni silua terrae et ex omnium arborum eius elegisti uineam unam, Et ex omnium terrarum orbis elegisti tibi foueam unam, et ex omnibus floribus orbis elegisti tibi lilium unum, Et ex omnibus abyssis maris replesti tibi riuum unum, et ex omnibus aedificatis ciuitatibus sanctificasti tibimetipsi Sion, Et ex omnibus creatis uolatilibus nominasti tibi columbam unam, et ex omnibus
    plasmatis pecoribus prouidisti tibi ouem unam, Et ex omnibus multiplicatis populis adquisisti tibi populum unum et ab omnibus probatam legem donasti huic quem desiderasti populo. Et nunc, domine, utquid dedisti unum pluribus et praeparasti unam radicem super alias et disparsisti unicum tuum in multis? Et conculcauerunt qui contradicebant sponsionibus tuis eos qui tuis testamentis credebant. Et si odiens odisti populum tuum, tuis manibus debet castigari.'
  language: Latin
