source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: nem facient. Et mare Sodomiticum pisces reiciet, et dabit uocem noctu, quam non nouerunt multi, omnes autem audient
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/007.yaml
  text: And the Sea of Sodom will cast out fish[5:7], and by night it will utter a sound that many have not known[a], but all will hear it.
  footnotes:
  - marker: '5:7'
    text: The phrase 'the Sodomitic sea' likely refers to the Dead Sea, but the translation keeps the Latin's allusive wording rather than substituting the later conventional name.
    reason: cultural_note
  - marker: a
    text: Or 'And the Sodomitic sea will cast out fish, and by night it will give a voice that many have not known, but all will hear its voice.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:37Z'
    unchanged: false
    changes_summary: Revised 'give a voice' to the more natural 'utter a sound' for Latin dabit vocem; changed 'do not know' to 'have not known' to better reflect the perfect tense nouerunt; removed the added final 'its voice' and rendered simply 'it' for a more natural and sufficiently complete translation.
translation:
  language: es
  text: Y el mar de Sodoma[a] arrojará peces, y de noche emitirá un sonido[b] que muchos no han conocido, pero todos lo oirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión probablemente se refiere al Mar Muerto, pero la traducción conserva la formulación alusiva del latín en vez de sustituirla por ese nombre posterior más convencional.
    reason: cultural_note
  - marker: b
    text: 'O: «dará una voz». El latín vocem también permite una traducción más literal como «voz», pero en español «emitirá un sonido» expresa mejor el sentido natural del pasaje.'
    reason: lexical_alternative
lexical_decisions:
- source_word: mare Sodomiticum
  english_pob_choice: the Sea of Sodom
  chosen_spanish: el mar de Sodoma
  alternatives_spanish:
  - el mar sodomítico
  - el mar de Sodom
  lexicon: mare; Sodomiticum
  rationale: Conservo el valor geográfico y alusivo del latín sin introducir la carga moderna de 'sodomítico' en español, que suena más moral que topográfica. 'Mar de Sodoma' sigue la decisión inglesa de preservar la alusión y resulta natural en español.
- source_word: pisces reiciet
  english_pob_choice: will cast out fish
  chosen_spanish: arrojará peces
  alternatives_spanish:
  - expulsará peces
  - despedirá peces
  lexicon: reicio; pisces
  rationale: '''Arrojará'' comunica el gesto de expulsión o echar fuera con un verbo claro y bíblico en español. ''Peces'' mantiene el objeto directo simple del latín y no añade explicaciones que el texto no da.'
- source_word: dabit uocem
  english_pob_choice: will utter a sound
  chosen_spanish: emitirá un sonido
  alternatives_spanish:
  - dará una voz
  - alzará una voz
  - pronunciará un sonido
  lexicon: do; vox
  rationale: El latín 'vocem' puede referir a voz o sonido; la revisión inglesa optó por 'utter a sound' para evitar una expresión forzada. En español, 'emitirá un sonido' preserva esa amplitud sin personificar indebidamente el mar.
- source_word: quam non nouerunt multi
  english_pob_choice: that many have not known
  chosen_spanish: que muchos no han conocido
  alternatives_spanish:
  - que muchos no conocen
  - que muchos no conocieron
  lexicon: noscere; multi
  rationale: 'Sigo el perfecto latino como experiencia ya no conocida: ''no han conocido''. Esto mantiene la relación con la revisión inglesa y evita convertirlo en una simple descripción presente.'
theological_decisions:
- issue: Alusión geográfica del 'mar de Sodoma' sin sustituir el nombre por el topónimo posterior
  english_pob_reading: The phrase 'the Sodomitic sea' likely refers to the Dead Sea, but the translation keeps the Latin's allusive wording rather than substituting the later conventional name.
  chosen_spanish_reading: el mar de Sodoma
  alternative_spanish_readings:
  - el Mar Muerto
  - el mar sodomítico
  rationale: La traducción conserva la forma alusiva del latín y del inglés auditado. 'Mar Muerto' aclararía la referencia histórica, pero borraría el efecto retórico del texto fuente.
  doctrine_reference: Transparencia textual y preservación del allusivo original; no se aplica una identificación explicativa no presente en el texto.
translation_notes:
  revision_awareness: 'El texto inglés pasó por una revisión que suavizó ''Sodomitic sea'' a ''Sea of Sodom'', corrigió el tiempo verbal de ''do not know'' a ''have not known'', y simplificó ''give a voice'' a ''utter a sound''. La versión española sigue esas decisiones: mantiene la alusión geográfica, refleja el perfecto con ''no han conocido'' y usa ''emitirá un sonido'' para evitar una calca incómoda.'
  spanish_consistency_notes:
  - '''Sodoma'' se usa como topónimo alusivo en todo el registro para mantener la coherencia con el latín y con la solución inglesa revisada.'
  - '''emitirá un sonido'' evita personificar el mar con ''voz'' en el cuerpo principal, pero la nota preserva la alternativa literal.'
  - Se mantiene un español sobrio y publicable, sin explicitar 'Mar Muerto' dentro del texto principal para no alterar el alcance del original.
