translation:
  language: es
  text: Y aconteció, después de siete días, que los pensamientos de mi corazón me eran de nuevo muy penosos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y mi alma retomó el espíritu de entendimiento, y de nuevo comencé a hablar palabras delante del Altísimo».'
    reason: Se preserva la variante de traducción previa documentada por el inglés POB.
lexical_decisions:
- source_word: factum est post dies septem
  english_pob_choice: And it happened after seven days
  chosen_spanish: Y aconteció, después de siete días
  alternatives_spanish:
  - Y sucedió, al cabo de siete días
  - Y ocurrió después de siete días
  lexicon: factum est / post dies septem
  rationale: El latín impersonal factum est se vierte naturalmente con una fórmula narrativa como «aconteció»; «después de siete días» reproduce post dies septem con precisión y sin añadir matices temporales no presentes.
- source_word: cogitationes cordis mei
  english_pob_choice: the thoughts of my heart
  chosen_spanish: los pensamientos de mi corazón
  alternatives_spanish:
  - las reflexiones de mi corazón
  - los pensamientos de mi interior
  lexicon: cogitationes / cor
  rationale: «Pensamientos de mi corazón» sigue de cerca la imagen semítica y mantiene el vínculo entre cogitationes y cor sin sustituirlo por un equivalente más interpretativo como «interior».
- source_word: molestae erant mihi valde
  english_pob_choice: were again very grievous to me
  chosen_spanish: me volvían a ser muy penosos
  alternatives_spanish:
  - me resultaban otra vez muy penosos
  - me eran de nuevo muy dolorosos
  lexicon: molestus / valde
  rationale: El latín expresa un estado de aflicción o gravamen; «penosos» comunica esa carga en español. Se conservó la reaparición implícita con «volvían a ser» para reflejar el contexto del inglés POB «again very grievous» sin forzar una repetición inexistente en la forma verbal latina.
theological_decisions:
- issue: Intensidad de la aflicción interior
  english_pob_reading: the thoughts of my heart were again very grievous to me
  chosen_spanish_reading: los pensamientos de mi corazón me volvían a ser muy penosos
  alternative_spanish_readings:
  - los pensamientos de mi corazón me eran otra vez muy penosos
  - los pensamientos de mi corazón me causaban de nuevo gran pena
  rationale: No hay un término doctrinalmente cargado aquí; la decisión busca conservar la tensión afectiva del latín y del inglés POB sin convertirla en una explicación psicológica más amplia de la que el texto ofrece.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión auditada mostró que el inglés previo era erróneo para este versículo y correspondía al siguiente; por eso la redacción española se basó directamente en el latín de 2 Esdras 5:21 («et factum est post dies septem, et iterum cogitationes cordis mei molestae erant mihi valde») y no en la lectura anterior desplazada.
  spanish_consistency_notes:
  - Se mantuvo un registro narrativo sobrio y bíblico, con español moderno pero digno.
  - Se evitó «SEÑOR» u otras sustituciones porque no aparece el Tetragrama ni κύριος en este versículo.
  - No se añadieron notas al pie porque el versículo no presenta una variante significativa de traducción dentro de este registro.
