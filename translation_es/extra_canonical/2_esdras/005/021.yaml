    issue: 'Frase verbal poco natural en español: «me volvían a ser»'
    rationale: 'Aunque intenta reflejar el valor de repetición adoptado por el inglés POB, esta construcción suena menos idiomática y menos estable que el latín «molestae erant mihi valde», que expresa un estado: ‘me eran...’. «De nuevo» o «otra vez» integra mejor la repetición en español.'
  revised_spanish_text: Y aconteció, después de siete días, que los pensamientos de mi corazón me eran de nuevo muy penosos.[a]
