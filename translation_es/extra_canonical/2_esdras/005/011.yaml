source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'multiplicabitur iniustitia et incontinentia super terram. Et interrogabit regio proximam suam et dicet: numquid per te'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/011.yaml
  text: Injustice and lack of self-control will be multiplied upon the earth. And one region will ask its neighbor and say, 'Has righteousness passed through you?'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:37Z'
    unchanged: false
    changes_summary: Restored the omitted first clause from the Latin, rendered regio as 'region' rather than 'land' for consistency with proximam suam, translated incontinentia more accurately as 'lack of self-control,' and removed the interpretive expansion not present in the source.
translation:
  language: es
  text: 'La injusticia y la falta de dominio propio se multiplicarán sobre la tierra. Y una región preguntará a su vecina y dirá: «¿Ha pasado la justicia por ti?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: multiplicabitur
  english_pob_choice: will be multiplied
  chosen_spanish: se multiplicarán
  alternatives_spanish:
  - se aumentarán
  - abundarán
  lexicon: multiplicar
  rationale: Conserva la imagen de incremento masivo y el futuro pasivo del latín con una construcción natural en español.
- source_word: iniustitia
  english_pob_choice: Injustice
  chosen_spanish: la injusticia
  alternatives_spanish:
  - la iniquidad
  - la falta de justicia
  lexicon: injustitia
  rationale: «Injusticia» reproduce el valor jurídico-moral del término latino sin introducir una carga interpretativa mayor.
- source_word: incontinentia
  english_pob_choice: lack of self-control
  chosen_spanish: la falta de dominio propio
  alternatives_spanish:
  - la intemperancia
  - la falta de continencia
  lexicon: incontinentia
  rationale: En español, «falta de dominio propio» comunica con claridad la idea moral de falta de continencia; evita el falso amigo moderno de «incontinencia» con sentido físico.
- source_word: super terram
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - por toda la tierra
  lexicon: terra
  rationale: «Sobre la tierra» mantiene el matiz de extensión espacial del latín y coincide con el tono del versículo.
- source_word: regio
  english_pob_choice: region
  chosen_spanish: una región
  alternatives_spanish:
  - una tierra
  - un país
  - un territorio
  lexicon: regio
  rationale: Se conserva «región» conforme a la revisión inglesa, que descartó «land» por consistencia con el contexto inmediato.
- source_word: proximam suam
  english_pob_choice: its neighbor
  chosen_spanish: a su vecina
  alternatives_spanish:
  - a su próxima
  - a su región vecina
  - a la región vecina
  lexicon: proximus
  rationale: «Vecina» expresa de forma idiomática la relación de proximidad entre regiones y evita una traducción mecánica de «próxima suya».
- source_word: numquid
  english_pob_choice: Has ... ?
  chosen_spanish: ¿Ha ... ?
  alternatives_spanish:
  - ¿Acaso ha ... ?
  - ¿Será que ha ... ?
  lexicon: numquid
  rationale: La partícula interrogativa latina se refleja con una pregunta directa en español, como en la lectura inglesa revisada.
- source_word: iustitia
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia divina
  lexicon: iustitia
  rationale: Aunque la versión inglesa usa «righteousness», en español «justicia» conserva mejor el alcance moral y legal del sustantivo latino, y evita forzar una construcción abstracta poco natural.
theological_decisions:
- issue: Valor moral de iustitia en la pregunta final
  english_pob_reading: Has righteousness passed through you?
  chosen_spanish_reading: ¿Ha pasado la justicia por ti?
  alternative_spanish_readings:
  - ¿Ha pasado la rectitud por ti?
  - ¿Ha pasado la justicia divina por ti?
  rationale: El latín solo requiere la idea de iustitia; «justicia» es la forma más fiel y suficientemente amplia en español. «Rectitud» estrecha el campo semántico y «justicia divina» añade contenido no explicitado.
  doctrine_reference: Justicia/rectitud en sentido moral general, no atribución doctrinal explícita
translation_notes:
  revision_awareness: La revisión inglesa restauró la primera cláusula omitida, optó por 'region' para regio, tradujo incontinentia como 'lack of self-control' y eliminó una expansión interpretativa sobre 'the one that makes a man righteous'. El español sigue esa línea revisada y evita añadir cualquier glosa no sustentada por el latín.
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre las dos cláusulas del versículo.
  - Se evita el calco de 'incontinencia' por su ambigüedad moderna en español.
  - '''Región'' y ''vecina'' preservan la relación recíproca del latín regio/proximam suam sin volverla demasiado literal.'
