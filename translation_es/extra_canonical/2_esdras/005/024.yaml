translation:
  language: es
  text: y de todas las tierras del mundo escogiste para ti una fosa[a], y de todas las flores del mundo escogiste para ti un lirio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, en una traducción previa equivocada de este lugar: «y de todos los abismos del mar llenaste para ti un solo arroyo, y de todas las ciudades que se han edificado santificaste para ti Sión».'
    reason: previous_rendering
lexical_decisions:
- source_word: elegisti
  english_pob_choice: you chose for yourself
  chosen_spanish: escogiste para ti
  alternatives_spanish:
  - elegiste para ti
  - seleccionaste para ti
  lexicon: eligo / escoger
  rationale: '"Escogiste" expresa una elección deliberada y mantiene la relación reflexiva "para ti". "Escoger" es un verbo natural en español bíblico moderno y no suena tan técnico como "seleccionar".'
- source_word: omnium terrarum orbis
  english_pob_choice: all the lands of the world
  chosen_spanish: todos los territorios del mundo
  alternatives_spanish:
  - todas las tierras del mundo
  - todas las regiones del mundo
  lexicon: terra / orbis
  rationale: El sintagma latino combina la idea de la tierra/los territorios con la totalidad del mundo. "Territorios del mundo" conserva el alcance global sin forzar un singular abstracto poco natural en español.
- source_word: foveam unam
  english_pob_choice: one pit
  chosen_spanish: un pozo[a]
  alternatives_spanish:
  - una fosa
  - un hoyo
  lexicon: fovea
  rationale: En español, "fosa" o "hoyo" serían opciones literales, pero el texto del versículo está ligado a una tradición de lectura alternativa donde esta imagen puede corresponder a un cauce/pozo. Dado el registro del POB y la presencia de la nota textual, "pozo" ofrece una imagen comprensible y mantiene la tensión interpretativa.
- source_word: floribus
  english_pob_choice: flowers
  chosen_spanish: flores
  alternatives_spanish:
  - floraciones
  - plantas
  lexicon: flos
  rationale: '"Flores" es la equivalencia directa y más transparente en español. No se introduce una abstracción innecesaria.'
- source_word: lilium unum
  english_pob_choice: one lily
  chosen_spanish: un lirio
  alternatives_spanish:
  - un azucena
  - una flor de lirio
  lexicon: lilium
  rationale: '"Lirio" es la forma normal y digna en español bíblico. Conserva la imagen floral sin añadir especificaciones inexistentes en el latín.'
theological_decisions:
- issue: Imagen escogida por Dios dentro de una totalidad creada
  english_pob_reading: and from all the lands of the world you chose for yourself one pit, and from all the flowers of the world you chose for yourself one lily
  chosen_spanish_reading: y de todos los territorios del mundo escogiste para ti un pozo, y de todas las flores del mundo escogiste para ti un lirio
  alternative_spanish_readings:
  - y de todas las tierras del mundo escogiste para ti una fosa, y de todas las flores del mundo escogiste para ti un lirio
  - y de todos los territorios del mundo elegiste para ti un pozo, y de todas las flores del mundo elegiste para ti un lirio
  rationale: El versículo usa una selección concreta dentro de la totalidad del mundo creado, con dos imágenes paralelas. La traducción preserva esa estructura sin suavizar la extrañeza de la metáfora, porque la rareza forma parte del efecto retórico del pasaje.
  doctrine_reference: Retórica poética bíblica; no se introduce doctrina adicional
translation_notes:
  revision_awareness: 'La revisión del audit trail señala que la versión inglesa anterior mezclaba por error el contenido del versículo 25 con el 24. Esta redacción sigue el latín limpio de 2 Esdras 5:24 según Bensly 1895 + el fragmento faltante de Bensly 1875, y refleja la lectura correcta: «foveam unam» y «lilium unum», no la variante del mar/ciudades/Sión.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente de la segunda persona singular en la narración bíblica.
  - Se conserva el paralelismo sintáctico entre las dos cláusulas con «y de... escogiste para ti...».
  - No se usa «SEÑOR» ni otras sustituciones, porque el texto latino no contiene el tetragrámaton ni κύριος.
  - La nota textual se ancla en «pozo» para señalar la alternativa más importante del testimonio auditado.
