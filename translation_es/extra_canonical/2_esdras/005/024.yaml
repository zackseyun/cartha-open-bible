revisions:
- from: y de todos los territorios del mundo escogiste para ti un pozo[a], y de todas las flores del mundo escogiste para ti un lirio.
  to: y de todas las tierras del mundo escogiste para ti una fosa[a], y de todas las flores del mundo escogiste para ti un lirio.
  rationale: Se ajusta `foveam` a «fosa» para reflejar con más fidelidad el latín y la decisión inglesa «pit»; se cambia «territorios» por «tierras» para mejorar naturalidad y cercanía al original; y se corrige la nota para que describa correctamente una traducción previa errónea, no una variante textual.
