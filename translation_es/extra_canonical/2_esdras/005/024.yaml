review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja correctamente la estructura general del latín y coincide con la revisión inglesa en que este versículo habla de la elección de una sola cosa entre la totalidad. Sin embargo, `foveam unam` corresponde mejor a «una fosa» o «un hoyo» que a «un pozo». Además, la nota no es una variante textual del mismo lugar, sino una nota de traducción previa heredada del audit trail inglés sobre la lectura equivocada del versículo siguiente.
  spanish_quality_summary: El español es claro y legible, pero «territorios» suena más administrativo que el latín `terrarum`; «tierras» es más natural y más cercano. «Pozo» introduce una imagen más específica y distinta de `fovea`. El resto fluye bien y mantiene el paralelismo retórico.
  glossary_alignment: 'No hay términos del glosario principal en juego. La decisión clave es léxica: `fovea` debe mantenerse con una imagen de cavidad simple («fosa»/«hoyo») y no desplazarse hacia «pozo».'
  issues:
  - severity: medium
    issue: '`foveam unam` fue traducido como «un pozo».'
    rationale: El latín `fovea` significa primariamente fosa, hoyo o cavidad excavada. «Pozo» sugiere un pozo de agua, más estrecho y específico, y no preserva con suficiente fidelidad la imagen fuente ni la elección inglesa «one pit».
  - severity: low
    issue: '`omnium terrarum orbis` fue traducido como «todos los territorios del mundo».'
    rationale: «Territorios» es comprensible, pero suena moderno-administrativo. «Tierras del mundo» reproduce mejor el tenor del latín y el inglés auditado sin perder naturalidad en español bíblico moderno.
  - severity: medium
    issue: La nota al pie está clasificada y formulada como si fuera una variante textual del versículo.
    rationale: Según el audit trail inglés, esa nota preserva una traducción previa correspondiente al versículo siguiente, no una variante textual del latín citado aquí. Debe mantenerse solo como nota explicativa tipo «O»/«Otra traducción previa» si el proyecto desea conservar el historial.
