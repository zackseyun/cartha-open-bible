lexical_decisions:
- source_word: Et factum est
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: fórmula narrativa
  rationale: La locución latina introduce una transición narrativa solemne; «aconteció» conserva el registro bíblico sin forzar un calco pesado.
- source_word: cum locutus essem
  english_pob_choice: when I had spoken
  chosen_spanish: cuando había hablado
  alternatives_spanish:
  - cuando hube hablado
  - al haber hablado
  lexicon: subordinación temporal perfecta
  rationale: El pluscuamperfecto español comunica la anterioridad de la acción respecto del envío, manteniendo la relación temporal del latín.
- source_word: sermones istos
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estos dichos
  - estas expresiones
  lexicon: sermo
  rationale: En este contexto, sermones se refiere a palabras concretas pronunciadas; «palabras» es la opción más natural y fiel.
- source_word: missus
  english_pob_choice: was sent
  chosen_spanish: fue enviado
  alternatives_spanish:
  - fui enviado
  - me fue enviado
  lexicon: pasivo verbal
  rationale: El fragmento latino queda incompleto y exige un pasivo en español. «Fue enviado» conserva la pasividad y el suspenso del texto fuente.
theological_decisions:
- issue: Fragmento incompleto al final del verso
  english_pob_reading: And it happened, when I had spoken these words, and was sent
  chosen_spanish_reading: Y aconteció, cuando había hablado estas palabras, y fue enviado
  alternative_spanish_readings:
  - Y aconteció, cuando había hablado estas palabras, fue enviado
  - Y aconteció, cuando había hablado estas palabras, y fui enviado
  rationale: El testimonio latino termina en una forma verbal que continúa en el siguiente verso; por eso la traducción debe dejar la frase abierta sin suplir un sujeto inexistente en el fragmento dado.
  doctrine_reference: Crítica textual y continuidad sintáctica del pasaje, no una decisión doctrinal
translation_notes:
  revision_awareness: La revisión reciente corrigió un error grave en el inglés previo, que había trasladado contenido del verso siguiente. La presente versión sigue el latín de 2 Esdras 5:31 y preserva el carácter fragmentario del cierre («et missus»), sin completar indebidamente la cláusula.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto para el nombre divino, pero este verso no contiene el Tetragrámaton.
  - Se conserva un registro bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - No se añade sujeto explícito a «fue enviado», porque el latín del verso no lo proporciona en este punto.
