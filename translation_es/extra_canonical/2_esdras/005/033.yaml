  text: 'coram te. Et dixi: loquere, dominus meus. et dixit ad me: ualde in excessu mentis factus es in Israel; aut plus dilexisti'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/033.yaml
  text: '...before you.'' And I said[a], ''Speak, my lord.'' And he said to me, ''You have become greatly beside yourself in mind over Israel; or have you loved him more...'
  footnotes:
  - marker: a
    text: Or "And I said, 'No, lord, but I have spoken in grief, for my inward parts torment me every hour as I seek to grasp the way of the Most High and to search out part of his judgment.'".
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:42Z'
    unchanged: false
    changes_summary: Revised 'greatly distressed in mind' to 'greatly beside yourself in mind' to more closely reflect valde in excessu mentis factus es. Changed the punctuation before the final clause from a period to a semicolon for smoother continuity with the unfinished alternative question.
translation:
  language: es
  text: '...delante de ti." Y yo dije: "Habla, señor mío." Y me dijo: "Te has vuelto muy fuera de sí respecto de Israel; o lo has amado más..."'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: coram te
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: Latin coram + preposition phrase
  rationale: Expresa presencia inmediata y personal sin introducir una formulación demasiado litúrgica. "Delante de ti" conserva bien el valor espacial-relacional del latín en español natural.
- source_word: loquere, dominus meus
  english_pob_choice: Speak, my lord
  chosen_spanish: Habla, señor mío
  alternatives_spanish:
  - Di, señor mío
  - Habla, mi señor
  lexicon: Latin loquere + dominus meus
  rationale: '"Habla" reproduce el imperativo simple; "señor mío" mantiene el vocativo respetuoso y el orden natural del español. Se evita "mi señor" para no sonar excesivamente formular.'
- source_word: ualde in excessu mentis factus es
  english_pob_choice: You have become greatly beside yourself in mind
  chosen_spanish: Te has vuelto muy fuera de juicio
  alternatives_spanish:
  - Te has salido mucho de juicio
  - Te has desatinado mucho
  lexicon: Latin excessus mentis
  rationale: La imagen latina apunta a un estado de desarreglo mental o de quedar fuera de juicio. "Fuera de juicio" comunica mejor en español actual esa pérdida de equilibrio mental que un calco como "en exceso de mente".
- source_word: in Israel
  english_pob_choice: over Israel
  chosen_spanish: en cuanto a Israel
  alternatives_spanish:
  - por Israel
  - respecto de Israel
  lexicon: Latin in + accusative of topic/concern as reflected in English POB
  rationale: El latín y la versión inglesa muestran que Israel es el ámbito o asunto de la preocupación. "En cuanto a" preserva esa relación temática sin convertirla en un simple objeto físico.
- source_word: aut plus dilexisti
  english_pob_choice: or have you loved him more...
  chosen_spanish: o ¿lo has amado más...
  alternatives_spanish:
  - o ¿has amado más a Israel...
  - o ¿lo has querido más...
  lexicon: Latin plus diligere
  rationale: Se conserva la pregunta alternativa inacabada del texto. "Amado" sigue de cerca el valor de diligere, y el pronombre átono "lo" refleja el objeto implícito del latín y de la traducción inglesa.
theological_decisions:
- issue: La pregunta queda interrumpida al final del verso
  english_pob_reading: Or have you loved him more...
  chosen_spanish_reading: o ¿lo has amado más...
  alternative_spanish_readings:
  - o ¿lo has amado más que...
  - o ¿lo has amado más todavía...
  rationale: El texto fuente termina en una comparación inacabada; la traducción española debe mantener esa suspensión sin completarla artificialmente.
  doctrine_reference: Fidelidad al estado textual; no aplica una conclusión interpretativa donde el testimonio termina abierto.
translation_notes:
  revision_awareness: La revisión reciente corrigió un desajuste previo con el verso 34 y fijó que el verso 33 debe traducir el latín 'coram te... ualde in excessu mentis factus es in Israel; aut plus dilexisti'. La redacción española sigue esa base y conserva el cierre incompleto con puntos suspensivos.
  spanish_consistency_notes:
  - Se usa "señor mío" para el vocativo latino dominus meus, en línea con el tono respetuoso del pasaje.
  - Se evita 'SEÑOR' en mayúsculas porque aquí no se trata del nombre divino sino de un tratamiento directo.
  - La puntuación con punto y coma antes de la cláusula final ayuda a reflejar la continuidad del discurso y la pregunta truncada.
