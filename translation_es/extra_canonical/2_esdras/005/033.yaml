revisions:
- from: '...delante de ti." Y yo dije: "Habla, señor mío." Y me dijo: "Te has vuelto muy fuera de juicio en cuanto a Israel; o ¿lo has amado más..."'
  to: '...delante de ti." Y yo dije: "Habla, señor mío." Y me dijo: "Te has vuelto muy fuera de sí respecto de Israel; o lo has amado más..."'
  rationale: Se ajusta «muy fuera de juicio» a «muy fuera de sí» para expresar de manera más idiomática el sentido de perturbación mental de excessu mentis, y se cambia «en cuanto a Israel» por «respecto de Israel» para una relación temática más natural. También se suaviza la cláusula final eliminando el signo de interrogación interno, sin perder la alternativa abierta del original.
