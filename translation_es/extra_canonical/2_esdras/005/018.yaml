    timestamp: '2026-04-23T11:41:38Z'
    unchanged: false
    changes_summary: Changed 'in the hands of evil wolves' to 'into the hands of evil wolves' to better reflect the sense of being left over to them in the Latin.
translation:
  language: es
  text: Levántate, pues, y come un poco de pan[a], y no nos abandones como un pastor a su rebaño en manos de lobos malignos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Un poco de pan» traduce el latín de manera más transparente que una paráfrasis; el pronombre implícito del original no se explicita en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: exsurge ergo
  english_pob_choice: Rise therefore
  chosen_spanish: Levántate, pues
  alternatives_spanish:
  - Por tanto, levántate
  - Levántate, entonces
  lexicon: exsurgo -> levantarse; ergo -> pues / por tanto
  rationale: En español, «Levántate, pues» conserva el imperativo y la inferencia lógica de ergo con naturalidad y sin endurecer el estilo. «Levántate» refleja el movimiento exhortativo del latín.
- source_word: gusta panem alicuius
  english_pob_choice: eat some bread
  chosen_spanish: come un poco de pan
  alternatives_spanish:
  - prueba pan
  - come pan de alguien
  lexicon: gusto -> probar / gustar; panis -> pan
  rationale: El latín expresa una invitación concreta a comer pan; «come un poco de pan» transmite la cantidad indefinida de alicuius sin forzar una interpretación possessiva rara en español. «Un poco de» preserva el sentido de una porción no especificada.
- source_word: et non derelinquas nos
  english_pob_choice: and do not abandon us
  chosen_spanish: y no nos abandones
  alternatives_spanish:
  - y no nos dejes
  - y no nos desampares
  lexicon: derelinquere -> abandonar / dejar
  rationale: «Abandonar» reproduce bien la fuerza relacional de derelinquas. «No nos abandones» es claro y natural en español contemporáneo, sin perder la urgencia de la súplica.
- source_word: sicut pastor gregem suum
  english_pob_choice: like a shepherd his flock
  chosen_spanish: como un pastor a su rebaño
  alternatives_spanish:
  - como pastor a su rebaño
  - como un pastor con su rebaño
  lexicon: sicut -> como; pastor -> pastor; grex -> rebaño
  rationale: La comparación se conserva de manera directa. La preposición «a» ayuda a expresar la relación de cuidado entre el pastor y el rebaño en español natural.
- source_word: in manibus luporum malignorum
  english_pob_choice: into the hands of evil wolves
  chosen_spanish: en manos de lobos malignos
  alternatives_spanish:
  - en poder de lobos malignos
  - a merced de lobos malignos
  lexicon: manus -> manos / poder; lupus -> lobo; malignus -> maligno
  rationale: Aunque la revisión inglesa prefirió «into the hands of evil wolves», el español idiomático y fiel al latín es «en manos de», que comunica la entrega a la violencia de los lobos. «Lobos malignos» mantiene la calificación moral del adjetivo latín.
theological_decisions:
- issue: Imagen pastoral de abandono y peligro
  english_pob_reading: do not abandon us like a shepherd his flock into the hands of evil wolves
  chosen_spanish_reading: no nos abandones como un pastor a su rebaño en manos de lobos malignos
  alternative_spanish_readings:
  - no nos dejes como un pastor a su rebaño en manos de lobos malignos
  - no nos abandones como pastor que deja su rebaño
  rationale: 'La metáfora es de desamparo extremo: el rebaño queda expuesto a depredadores. «En manos de» conserva la imagen de entrega/indefensión sin añadir elementos doctrinales ajenos al texto.'
  doctrine_reference: Imagen bíblica del pastor y el rebaño; cuidado pastoral y protección divina
translation_notes:
  revision_awareness: El texto inglés auditado fue corregido de una lectura totalmente desalineada (procedente del versículo siguiente) a la traducción correcta del latín de 2 Esdras 5:18. La presente versión española sigue el latín limpio de Bensly 1895/Bensly 1875, y refleja la última revisión que afinó la imagen final a «into the hands of evil wolves», aunque en español se opta por la formulación idiomática «en manos de».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se preserva el tono exhortativo y suplicante sin introducir terminología eclesiástica posterior.
  - «Lobos malignos» conserva la fuerza negativa del latín malignorum sin suavizarla a «malvados», que sería menos literal en esta imagen.
