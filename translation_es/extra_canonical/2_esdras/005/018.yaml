base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/018.yaml
  text: Rise therefore and eat some bread[a], and do not abandon us like a shepherd his flock into the hands of evil wolves.
  footnotes:
  - marker: a
    text: Or "And I said to him, 'Go away from me, and do not come near me for seven days; then you may come to me.' And he heard what I said and withdrew from me.".
    reason: previous_rendering
  revision_pass:
