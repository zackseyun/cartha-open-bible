  yaml_path: translation/extra_canonical/2_esdras/005/037.yaml
  text: Restore to me the dried flowers[a], and open for me the storehouses that are shut, and bring out for me the winds enclosed in them, or show me the image of a voice; then I will show you that labor which you ask.
  footnotes:
