    changes_summary: Added the opening clause about restoring the dried flowers, which was omitted from the draft; retained the storehouses/winds/image wording; changed 'trouble' to 'labor' to reflect laborem more closely; removed 'to see,' which is not in the Latin.
translation:
  language: es
  text: Devuélveme las flores secas, y ábreme los almacenes que están cerrados, y saca para mí los vientos encerrados en ellos, o muéstrame la imagen de una voz; entonces te mostraré esa aflicción[a] que preguntas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El latín «laborem» retoma el «laborem Iacob» del versículo anterior; aquí se entiende mejor como aflicción o sufrimiento que como trabajo en sentido de labor.
    reason: contextual_lexical_clarification
lexical_decisions:
- source_word: reuirida mihi aridos flores
  english_pob_choice: Restore to me the dried flowers
  chosen_spanish: Devuélveme las flores secas
  alternatives_spanish:
  - Restáurame las flores secas
  - Hazme volver las flores secas
  lexicon: restore -> devolver/restaurar; aridos flores -> flores secas
  rationale: El latín pide una acción de restitución sobre 'flores secas'. En español, 'devuélveme' comunica con naturalidad la idea de hacerlas volver a su estado/posesión; 'restáurame' sería más abstracto y menos idiomático aquí.
- source_word: prumptuaria
  english_pob_choice: storehouses
  chosen_spanish: almacenes
  alternatives_spanish:
  - graneros
  - depósitos
  - bodegas
  lexicon: prumptuaria -> storehouses
  rationale: '''Prumptuaria'' designa lugares de provisión o almacenamiento. ''Almacenes'' es claro, amplio y fiel al sentido sin cargar una imagen agrícola específica que el latín no exige.'
- source_word: inclusos in eis flatos
  english_pob_choice: the winds enclosed in them
  chosen_spanish: los vientos encerrados en ellos
  alternatives_spanish:
  - los aires encerrados en ellos
  - los soplos encerrados en ellos
  lexicon: flatus -> winds / breaths / winds
  rationale: Se conserva 'vientos' porque el pasaje habla de elementos encerrados en los almacenes; 'soplos' o 'aires' serían posibles, pero 'vientos' mantiene mejor la imagen física que la POB inglesa también preserva.
- source_word: monstra mihi uocis imaginem
  english_pob_choice: show me the image of a voice
  chosen_spanish: muéstrame la imagen de una voz
  alternatives_spanish:
  - muéstrame la forma de una voz
  - muéstrame la figura de una voz
  lexicon: imago -> imagen; vox -> voz
  rationale: La expresión latina es deliberadamente extraña. 'Imagen de una voz' mantiene esa tensión sin explicarla ni suavizarla, como hace el texto fuente y la POB inglesa.
- source_word: eum laborem
  english_pob_choice: that labor
  chosen_spanish: ese trabajo
  alternatives_spanish:
  - esa labor
  - ese esfuerzo
  - esa aflicción
  lexicon: labor -> trabajo/labor/trabajo duro
  rationale: En este contexto, el latín 'labor' remite al asunto consultado por Ezra en el versículo anterior, no a 'trabajo' en sentido neutro. 'Ese trabajo' conserva la referencia anafórica de 'ese' y permite el vínculo con la pregunta previa; 'labor' en español sería válido, pero menos natural para lectores amplios.
theological_decisions:
- issue: La secuencia imposible/retórica de flores secas, almacenes cerrados, vientos encerrados y la imagen de una voz
  english_pob_reading: The English POB keeps the paradoxical series without explanation.
  chosen_spanish_reading: La traducción conserva la serie paradójica sin explicarla, como recurso retórico del diálogo.
  alternative_spanish_readings:
  - La traducción podría aclarar el sentido metafórico
  - La traducción podría armonizar las imágenes
  rationale: El latín presenta una cadena de imágenes imposibles o enigmáticas. Explicarlas debilitaría el efecto literario y excedería el margen del texto.
  doctrine_reference: Poética profética/apocalíptica; fidelidad a la imaginería del texto
- issue: Referencia de 'eum laborem' al asunto anterior de 5:35
  english_pob_reading: English revision notes show that 'that trouble' was corrected to 'that labor' to preserve anaphora to 'Jacob's trouble' in the previous verse.
  chosen_spanish_reading: Se mantiene una forma anafórica con 'ese' para enlazar con la pregunta previa sobre el 'trabajo/labor' de Jacob.
  alternative_spanish_readings:
  - aquel trabajo
  - esa aflicción
  - ese tormento
  rationale: El verso no introduce un tema nuevo sino que responde a una referencia previa. 'Ese trabajo' conserva la deixis y evita perder el vínculo textual que la revisión inglesa quiso proteger.
  doctrine_reference: Coherencia intratextual / anáfora del discurso
translation_notes:
  revision_awareness: La revisión más reciente del inglés restauró la cláusula inicial sobre devolver las flores secas y corrigió 'that trouble' a 'that labor' para reflejar mejor el latín 'eum laborem' y su enlace con 5:35. Esta versión española incorpora ambos ajustes y preserva la secuencia completa de imágenes sin añadir 'para ver', que no está en el latín.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - '''labor'' se resuelve en español como ''trabajo'' por naturalidad, pero la nota preserva la alternativa ''labor'' para reflejar el enlace anafórico.'
  - Se mantiene 'imagen de una voz' como calco controlado porque la fuente exige esa rareza expresiva.
  - La puntuación reproduce la estructura coordinada extensa del latín y de la POB inglesa.
