  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Altísimo', 'juicio', 'entrañas' y 'Jacob' son adecuados. 'Señor' aquí no representa el Tetragrámaton, sino vocativo de trato, por lo que no entra en conflicto con la política de 'Yahvé'. No aparecen términos cristológicos ni otros lemas sensibles del glosario.
