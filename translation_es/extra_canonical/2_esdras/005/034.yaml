translation:
  language: es
  text: '«¿A él más que al que lo hizo?» Y dije[a]: «No, señor, sino que hablé con dolor, porque mis entrañas me atormentan a toda hora mientras busco comprender el camino del Altísimo y escudriñar una parte de su juicio». Y me dijo: «No puedes». Y dije: «¿Por qué, señor? ¿O por qué nací? ¿O por qué el vientre de mi madre no se volvió mi sepulcro, para que no viera la angustia de Jacob?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y me dijo: “No puedes”. Y dije: “¿Por qué, señor? ¿Por qué, entonces, nací? ¿O por qué el vientre de mi madre no se volvió mi sepulcro, para que no viera la angustia de Jacob?”».'
    reason: Preserva la alternativa de puntuación/segmentación documentada en el English POB como traducción previa.
lexical_decisions:
- source_word: illum super eum qui fecit illum
  english_pob_choice: him more than he who made him?
  chosen_spanish: ¿a él más que a quien lo hizo?
  alternatives_spanish:
  - ¿a él más que al que lo hizo?
  - ¿a él más que a quien lo creó?
  lexicon: illum / eum / qui fecit
  rationale: La pregunta inicial es comparativa y dependiente del contexto previo; en español conviene conservar la elipsis de la comparación con una formulación breve y natural. 'Hizo' reproduce de forma directa el verbo de creación/fabricación del latín sin añadir interpretación.
- source_word: dolens locutus sum
  english_pob_choice: I have spoken in grief
  chosen_spanish: hablé con dolor
  alternatives_spanish:
  - he hablado con dolor
  - hablé dolido
  lexicon: dolens / locutus sum
  rationale: El latín expresa un acto ya realizado con cualidad de aflicción; 'hablé con dolor' mantiene el sentido sin forzar un perfecto compuesto que suena menos natural en español bíblico.
- source_word: renes mei
  english_pob_choice: my inward parts
  chosen_spanish: mis entrañas
  alternatives_spanish:
  - mis partes internas
  - mis riñones
  lexicon: renes
  rationale: '''Renes'' en este contexto no son órganos anatómicos en sentido moderno sino la sede interior de la emoción y la angustia; ''entrañas'' conserva el valor bíblico y literario de interioridad afligida.'
- source_word: querentem adprehendere semitam altissimi
  english_pob_choice: as I seek to grasp the path of the Most High
  chosen_spanish: mientras busco comprender el camino del Altísimo
  alternatives_spanish:
  - mientras procuro asir el sendero del Altísimo
  - mientras intento abarcar el camino del Altísimo
  lexicon: querentem adprehendere semitam altissimi
  rationale: '''Adprehendere'' aquí expresa más que un acto físico: intenta captar o comprender lo que excede al hablante. ''Comprender el camino'' comunica la limitación epistémica sin perder el movimiento de búsqueda.'
- source_word: partem iudicii eius
  english_pob_choice: part of his judgment
  chosen_spanish: una parte de su juicio
  alternatives_spanish:
  - parte de su juicio
  - un aspecto de su juicio
  lexicon: partem iudicii
  rationale: Se conserva la idea de una porción parcial y no total del juicio divino. 'Una parte' refleja mejor la concreción de 'partem' que una paráfrasis más abstracta.
- source_word: non potes
  english_pob_choice: You cannot
  chosen_spanish: No puedes
  alternatives_spanish:
  - No es posible
  - Tú no puedes
  lexicon: non potes
  rationale: La respuesta divina es breve y directa; 'No puedes' mantiene la fuerza y la asimetría del diálogo.
- source_word: quid nascebar
  english_pob_choice: Why was I born?
  chosen_spanish: ¿por qué nací?
  alternatives_spanish:
  - ¿por qué fui nacido?
  - ¿por qué vine al mundo?
  lexicon: quid nascebar
  rationale: Aunque el latín usa una forma pasiva/mediopasiva, en español la construcción natural y fiel es 'nací'. La pregunta retórica debe sonar inmediata y lamentativa.
- source_word: matrix matris meae ... sepulchrum
  english_pob_choice: my mother's womb ... my grave
  chosen_spanish: el vientre de mi madre ... mi sepulcro
  alternatives_spanish:
  - el seno de mi madre ... mi tumba
  - el vientre de mi madre ... mi tumba
  lexicon: matrix / sepulchrum
  rationale: '''Matrix'' aquí es el vientre materno; ''sepulcro'' conserva el contraste poético del texto. Se mantiene la fuerza funeraria sin suavizarla.'
- source_word: laborem Iacob
  english_pob_choice: Jacob's trouble
  chosen_spanish: la angustia de Jacob
  alternatives_spanish:
  - el sufrimiento de Jacob
  - la tribulación de Jacob
  lexicon: laborem Iacob
  rationale: '''Laborem'' puede abarcar aflicción, fatiga o tribulación. En este contexto, ''angustia'' comunica bien el peso de la calamidad y evita una lectura demasiado técnica.'
theological_decisions:
- issue: Limitación humana ante el juicio del Altísimo
  english_pob_reading: You cannot.
  chosen_spanish_reading: No puedes.
  alternative_spanish_readings:
  - No es posible.
  - No puedes comprenderlo.
  rationale: La frase responde a la pretensión de abarcar el camino y el juicio de Dios. Mantenerla breve preserva la doctrina de la trascendencia divina y el límite de la criatura.
  doctrine_reference: Job 38–42; Isaías 55:8–9
- issue: Lamento existencial por el sufrimiento de Israel/Jacob
  english_pob_reading: so that I might not see Jacob's trouble
  chosen_spanish_reading: para que no viera la angustia de Jacob
  alternative_spanish_readings:
  - para no ver la tribulación de Jacob
  - para no presenciar la calamidad de Jacob
  rationale: '''Jacob'' se conserva como nombre corporativo para el pueblo; ''angustia'' mantiene el tono de lamento profético y la carga histórica de la aflicción.'
  doctrine_reference: Jeremías 30:7
- issue: Búsqueda humana de comprender el misterio divino
  english_pob_reading: as I seek to grasp the path of the Most High and to search out part of his judgment
  chosen_spanish_reading: mientras busco comprender el camino del Altísimo y escudriñar una parte de su juicio
  alternative_spanish_readings:
  - mientras intento abarcar el camino del Altísimo y examinar una parte de su juicio
  - mientras procuro entender el camino del Altísimo y averiguar parte de su juicio
  rationale: Se conserva la tensión entre búsqueda legítima y límite indebido. 'Escudriñar' preserva el matiz de investigación intensa sin resolver el misterio.
  doctrine_reference: Deuteronomio 29:29; Romanos 11:33
translation_notes:
  revision_awareness: La traducción se ajusta al texto latino proporcionado en el source_payload y corrige el error previo que omitía la primera mitad de la cláusula inicial; también preserva la secuencia completa de preguntas y la puntuación final. No se añadió ninguna nota al pie porque no hay marcador anclado en el texto español.
  spanish_consistency_notes:
  - Se usa 'Altísimo' para 'altissimi' con mayúscula reverente.
  - Se traduce 'renes mei' por 'mis entrañas' para conservar el valor bíblico de interioridad afectiva.
  - Se mantiene 'Jacob' sin reinterpretarlo, conforme al uso corporativo en el texto fuente y en la POB inglesa.
  - Se evita 'SEÑOR' y se emplea 'señor' en minúscula porque el interlocutor inmediato es el ángel/hablante del pasaje, no una sustitución del Tetragrámaton.
