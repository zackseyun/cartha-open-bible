translation:
  language: es
  text: Y ahora[a], Señor, ¿por qué has entregado al uno a los muchos, y has preparado una raíz por encima de las demás, y has dispersado a tu único entre muchos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien, en una traducción previa: «Y los que se oponían a tus promesas han pisoteado a los que creían en tus pactos»'
    reason: previous_rendering
lexical_decisions:
- source_word: Domine
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Yahvé
  lexicon: Latin Domine (vocative of Dominus)
  rationale: Aquí el vocativo latino se dirige a Dios con una forma de tratamiento reverente. En español, «Señor» comunica directamente esa apelación vocativa y mantiene la fluidez de la oración interrogativa. Aunque el programa general prefiere «Yahvé» para el Tetragrámaton, aquí el caso es vocativo en latín, no una forma escrita del nombre divino.
- source_word: tradidisti
  english_pob_choice: have handed over
  chosen_spanish: has entregado
  alternatives_spanish:
  - has entregado en manos de
  - has abandonado
  lexicon: Latin tradere
  rationale: «Entregar» conserva el sentido de ceder, poner en manos de otro o dejar a merced de otros. Es más natural en español que un calco como «has traicionado», y evita sobrecargar el verbo con una lectura moral que el contexto no exige de forma explícita.
- source_word: unum plurimis
  english_pob_choice: the one to the many
  chosen_spanish: al uno a los muchos
  alternatives_spanish:
  - a uno a muchos
  - al único a muchos
  lexicon: Latin unus / plurimi
  rationale: La construcción latina contrasta «uno» con «muchos». «Al uno a los muchos» sigue de cerca la oposición del original y conserva la tensión retórica. «Al único» sería posible, pero aquí «unum» por sí solo no obliga todavía a «único»; ese matiz aparece con más claridad después en «unicum tuum».
- source_word: praeparasti unam radicem super alias
  english_pob_choice: have prepared one root above the others
  chosen_spanish: has preparado una raíz sobre las demás
  alternatives_spanish:
  - has preparado una raíz sobre las otras
  - has dispuesto una sola raíz por encima de las demás
  lexicon: Latin praeparare; radix
  rationale: «Preparado» reproduce de cerca el verbo latino y mantiene el sentido de disposición previa. «Una raíz sobre las demás» conserva la imagen comparativa sin introducir interpretaciones ajenas. «Raíz» se mantiene literal porque la metáfora parece deliberada y no debe suavizarse en una paráfrasis abstracta.
- source_word: dispersisti unicum tuum in multis
  english_pob_choice: have scattered your only one among the many
  chosen_spanish: has dispersado a tu único entre muchos
  alternatives_spanish:
  - has esparcido a tu único entre muchos
  - has dispersado a tu único entre las multitudes
  lexicon: Latin dispergere; unicus
  rationale: '«Dispersado» refleja bien el latín dispergere y sostiene la imagen de dispersión. «Tu único» conserva la dureza y rareza de unicus sin reemplazarlo de entrada por una interpretación más explicativa como «tu hijo único». En español, el artículo y el posesivo hacen natural la elipsis nominal: «tu único».'
theological_decisions:
- issue: Referencia del vocativo 'Domine' y uso del nombre divino
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: El texto latino usa una apelación vocativa genérica a Dios. No hay aquí una cita explícita del Tetragrámaton que obligue a insertar «Yahvé» en el texto principal. Mantener «Señor» preserva la forma de oración y evita atribuir una decisión onomástica que el latín no marca de manera directa.
  doctrine_reference: Tratamiento del nombre divino y vocativo en traducción bíblica
- issue: Ambigüedad de 'unicum tuum'
  english_pob_reading: your only one
  chosen_spanish_reading: tu único
  alternative_spanish_readings:
  - tu hijo único
  - tu único ser
  rationale: El latín permite una expresión fuerte y algo abierta. Como la fuente no especifica 'hijo', añadirlo sería una interpretación no garantizada por este versículo aislado. «Tu único» conserva la ambigüedad y la intensidad del original.
  doctrine_reference: Cristología y lenguaje relacional en textos apocalípticos/pseudo-epigráficos
- issue: Alcance de 'uno' frente a 'muchos'
  english_pob_reading: the one to the many
  chosen_spanish_reading: al uno a los muchos
  alternative_spanish_readings:
  - a uno entre muchos
  - al uno entre muchos
  rationale: La frase parece construir un contraste retórico, quizá incluso de representación o fidelidad, pero el versículo no explica la relación. La traducción conserva el contraste sin resolverlo, para no borrar la tensión interpretativa del original.
  doctrine_reference: Principio de conservación de ambigüedad textual
translation_notes:
  revision_awareness: 'Se siguió la revisión crítica que corrige el desajuste de versículo: el latín suministrado para 2 Esdras 5:28 corresponde a «tradidisti unum plurimis...», no al contenido previo erróneamente asociado a 5:29. Por eso el español se basa directamente en el latín de la fuente y no en la versión inglesa anterior que ya había sido identificada como incorrecta para este versículo.'
  spanish_consistency_notes:
  - Se mantuvo el tratamiento reverente «Señor» para el vocativo latino Domine.
  - Se preservó la metáfora concreta de «raíz» sin explicitarla.
  - Se conservó «tu único» como forma breve y ambigua que refleja unicus.
  - La sintaxis intenta seguir el paralelismo del latín sin sonar forzada en español.
