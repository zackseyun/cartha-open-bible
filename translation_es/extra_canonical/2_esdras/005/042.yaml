    changes_summary: Changed 'compare' to 'liken' for a more formal and direct rendering of adsimilabo; otherwise retained the draft as accurate and complete.
translation:
  language: es
  text: 'Y él me dijo: «Asemejaré mi juicio a una corona[a]: así como no hay demora para los últimos, así tampoco hay prisa para los primeros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Corona» también puede entenderse como «círculo» o «anillo», lo que haría que la comparación resaltara la simetría entre los primeros y los últimos.
    reason: lexical_alternative
lexical_decisions:
- source_word: adsimilabo
  english_pob_choice: I will liken
  chosen_spanish: Compararé
  alternatives_spanish:
  - Lo asemejaré
  - Lo compararé
  lexicon: asimilar/compare/liken
  rationale: El latín adsimilabo expresa una comparación figurativa directa. En español, «compararé» mantiene la imagen sin sonar forzado, y conserva la equivalencia óptima con el giro revisado en inglés «I will liken».
- source_word: coronae
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - círculo
  - anillo
  lexicon: corona/circle/ring
  rationale: «Corona» es la opción más natural y digna en español para la metáfora principal. Se conserva la alternativa semántica documentada en inglés mediante nota, porque «círculo» o «anillo» podrían enfatizar la simetría entre primero y último.
- source_word: iudicium meum
  english_pob_choice: my judgment
  chosen_spanish: mi juicio
  alternatives_spanish:
  - mi sentencia
  - mi decisión
  lexicon: judgment/decision/judgment
  rationale: «Juicio» reproduce el término jurídico y evaluativo del latín iudicium, y encaja con el lenguaje solemne del pasaje. «Sentencia» sería más estrecho y «decisión» perdería el peso forense.
- source_word: non nouissimorum tarditas
  english_pob_choice: there is no delay for the last
  chosen_spanish: no hay demora para los últimos
  alternatives_spanish:
  - no hay tardanza para los últimos
  - los últimos no tardan
  lexicon: delay/delay/tardiness
  rationale: «Demora» comunica con claridad el valor temporal de tarditas en español contemporáneo, sin perder el paralelismo con la segunda cláusula. «Tardanza» es posible, pero algo más marcada y menos fluida aquí.
- source_word: priorum uelocitas
  english_pob_choice: there is no haste for the first
  chosen_spanish: no hay prisa para los primeros
  alternatives_spanish:
  - no hay rapidez para los primeros
  - los primeros no se apresuran
  lexicon: haste/speed/swiftness
  rationale: «Prisa» refleja bien la ausencia de aceleración o premura implicada por uelocitas en este contraste poético. «Rapidez» sería más física y menos idiomática en esta construcción.
theological_decisions:
- issue: Simetría entre primeros y últimos
  english_pob_reading: as there is no delay for the last, so there is no haste for the first
  chosen_spanish_reading: así como no hay demora para los últimos, así tampoco hay prisa para los primeros
  alternative_spanish_readings:
  - no hay tardanza para los últimos, ni prisa para los primeros
  - así como los últimos no se retrasan, así los primeros no se apresuran
  rationale: La formulación conserva el paralelismo y la igualdad de trato implícita en el dicho. No se añade interpretación doctrinal; se mantiene la tensión literaria de una comparación de orden y medida.
  doctrine_reference: Equidad divina y paralelismo sapiencial en el texto apocalíptico
- issue: Metáfora de la corona
  english_pob_reading: I will liken my judgment to a crown
  chosen_spanish_reading: Compararé mi juicio con una corona
  alternative_spanish_readings:
  - Asimilaré mi juicio a una corona
  - Haré semejante mi juicio a una corona
  rationale: Se preserva la metáfora sin resolverla hacia una lectura exclusivamente ornamental o geométrica. La nota mantiene abierta la alternativa lexical documentada por la edición inglesa.
  doctrine_reference: Imagen comparativa no doctrinal; metáfora retórica del juicio
translation_notes:
  revision_awareness: La revisión inglesa cambió «compare» por «liken» para reflejar con mayor precisión formal el valor de adsimilabo; la versión española adopta desde el inicio un verbo comparativo directo («Compararé») que conserva esa relación figurativa sin depender de un calco rígido.
  spanish_consistency_notes:
  - Se mantiene «Y él me dijo» para reflejar la introducción narrativa del latín.
  - Se usa «últimos» y «primeros» como sustantivos adjetivales, en paralelo con el inglés.
  - No se introduce «SEÑOR» ni terminología no presente en el pasaje.
  - La puntuación reproduce el discurso directo de manera publicable en español.
