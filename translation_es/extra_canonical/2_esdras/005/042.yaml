  yaml_path: translation/extra_canonical/2_esdras/005/042.yaml
  text: 'And he said to me[5:42], ''I will liken my judgment to a crown: as there is no delay for the last, so there is no haste for the first.'''
  footnotes:
  - marker: '5:42'
    text: '''Crown'' may also be understood as ''circle'' or ''ring,'' which would make the comparison emphasize symmetry between first and last.'
    reason: lexical_alternative
  revision_pass:
