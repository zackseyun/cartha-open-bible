review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente el latín: «et dixi» = «Y dije», «Dominator Domine» = «Soberano Señor», «ex omni silva terrae et ex omnium arborum eius» = «de todos los bosques de la tierra y de todos sus árboles», y «elegisti vineam unam» = «has escogido una sola vid». Sin embargo, la nota al pie conserva una lectura previa errónea del inglés como si fuera variante textual, cuando el historial auditado la identifica como una traducción anterior desalineada, no como evidencia de fuente para este versículo.'
  spanish_quality_summary: El español es claro, digno y natural. La única reparación necesaria es eliminar la nota que introduce confusión textual innecesaria. También conviene quitar el marcador [a] del texto, ya que no corresponde a una nota legítima para este registro.
  glossary_alignment: 'La terminología está bien alineada con el proyecto: no hay nombres divinos especiales aquí; «Soberano Señor» transmite bien «Dominator Domine»; «vid» es preferible a «viña» para «vineam unam». No hay conflictos con los glosarios base.'
  issues:
  - severity: medium
    issue: La nota al pie presenta una traducción inglesa previa desalineada como si fuera una lectura alternativa textual.
    rationale: El expediente inglés dice explícitamente que esa redacción provenía de un error de alineación de versículos («previous_rendering» / off-by-one verse alignment), no de una variante del latín de 5:23. Mantenerla como nota española de variante textual desinforma al lector sobre la evidencia fuente.
  - severity: low
    issue: El marcador [a] en «dije[a]» queda sin justificación una vez corregida la nota.
    rationale: Las notas deben conservarse solo cuando aportan una alternativa significativa de fuente o una aclaración necesaria. Aquí no corresponde ninguna.
  revised_spanish_text: 'Y dije: «Soberano Señor, de todos los bosques de la tierra y de todos sus árboles has escogido una sola vid,»'
  revision_rationale: Se elimina la nota y su marcador porque no documentan una variante textual real del versículo, sino una traducción inglesa previa desalineada. El texto principal ya es fiel al latín y suena natural en español.
