translation:
  language: es
  text: 'Y dije[a]: «Soberano Señor, de todos los bosques de la tierra y de todos sus árboles has escogido una sola vid,»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y de todas las tierras del mundo escogiste para ti un pozo, y de todas las flores del mundo escogiste para ti un lirio»; corresponde a la lectura alternativa transmitida en el aparato inglés previo, pero no al latín de este versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: Dominator Domine
  english_pob_choice: Sovereign Lord
  chosen_spanish: Soberano Señor
  alternatives_spanish:
  - Señor soberano
  - Señor soberano y dominador
  lexicon: dominator/domine
  rationale: La doble apelación latina concentra autoridad suprema y reverencia. «Soberano Señor» conserva el tono de dominio y oración sin introducir un giro eclesiástico ajeno al texto.
- source_word: ex omni silva terrae
  english_pob_choice: from every forest of the earth
  chosen_spanish: de todos los bosques de la tierra
  alternatives_spanish:
  - de cada bosque de la tierra
  - de todos los montes arbolados de la tierra
  lexicon: silva
  rationale: «silva» significa bosque; «bosques» es la equivalencia natural en español y mantiene el alcance universal de «omni».},{
- source_word: et ex omnium arborum eius
  english_pob_choice: and from all its trees
  chosen_spanish: y de todos sus árboles
  alternatives_spanish:
  - y de cada uno de sus árboles
  - y de todos los árboles de ese bosque
  lexicon: arbor
  rationale: La posesión implícita en «eius» se expresa con «sus». Se conserva el plural totalizador del latín.
- source_word: vineam unam
  english_pob_choice: one vine
  chosen_spanish: una sola vid
  alternatives_spanish:
  - una vid
  - una viña
  lexicon: vinea
  rationale: El latino singular «vineam» apunta a una vid, no a un viñedo. «Una sola vid» refuerza el contraste numérico del original y evita confundirla con «viña» como plantación.
theological_decisions:
- issue: Tratamiento del título de respeto divino
  english_pob_reading: Sovereign Lord
  chosen_spanish_reading: Soberano Señor
  alternative_spanish_readings:
  - Señor soberano
  - Señor y Soberano
  rationale: La frase no oculta el contenido de autoridad absoluta ni sustituye el vocativo por un término litúrgico más débil. En español, «Soberano Señor» comunica mejor la mezcla de majestad y súplica.
  doctrine_reference: Divine sovereignty / direct address in prayer
translation_notes:
  revision_awareness: El contexto inglés previo contenía un desajuste de versículo y fue corregido por revisión posterior; aquí se sigue el latín de 2 Esdras 5:23, que habla de un bosque, sus árboles y una vid única. La nota[a] preserva la lectura alternativa documentada en el aparato inglés para el pasaje asociado, sin convertirla en base textual del versículo presente.
  spanish_consistency_notes:
  - Se mantiene «Soberano Señor» para el vocativo divino.
  - Se traduce «vineam» como «vid» por precisión botánica y lexical.
  - La nota textual queda anclada en la llamada [a] dentro del texto, cumpliendo la consistencia de marcadores.
