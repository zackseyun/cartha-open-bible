  text: et mulieres parient menstruata monstra. Et in dulcibus aquis salsae inuenientur, et amici omnes semetipsos expugnabunt, et abscondetur tunc sensus, et intellectus separabitur in promptuarium suum, Et queretur a multis et non inuenietur, et
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/009.yaml
  text: and women will give birth to monstrous things in menstruation. And in sweet waters salty waters will be found[5:9], and all friends will make war on one another, and then understanding will be hidden, and insight will withdraw into its storehouse.
  footnotes:
  - marker: '5:9'
    text: Latin 'menstruata monstra' is obscure. The main text renders the phrase broadly as monstrous births; a more wooden rendering would be difficult English and may overstate precision the surviving Latin does not securely provide.
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:37Z'
    unchanged: false
    changes_summary: Added the omitted sense of menstruata with 'in menstruation'; restored the omitted clause 'and then understanding will be hidden' more closely to abscondetur tunc sensus; kept the rest largely intact with minor punctuation/flow adjustments.
translation:
  language: es
  text: y las mujeres darán a luz monstruos[a] en la menstruación. Y en aguas dulces se hallarán aguas saladas, y todos los amigos harán guerra unos contra otros, y entonces el entendimiento se ocultará, y la inteligencia se retirará a su depósito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El latín «menstruata monstra» es oscuro. El texto principal lo vierte de manera amplia como partos o seres monstruosos vinculados con la menstruación; una traducción más rígida sería difícil en español y podría aparentar una precisión que el latín conservado no asegura.
    reason: lexical_alternative
lexical_decisions:
- source_word: mulieres parient
  english_pob_choice: women will give birth
  chosen_spanish: las mujeres darán a luz
  alternatives_spanish:
  - las mujeres parirán
  - las mujeres tendrán hijos
  lexicon: mulieres; parient
  rationale: «Dar a luz» es natural en español bíblico y mantiene el sentido de parto sin endurecer la frase con una literalidad innecesaria.
- source_word: menstruata monstra
  english_pob_choice: monstrous things in menstruation
  chosen_spanish: monstruos en la menstruación
  alternatives_spanish:
  - monstruos menstruales
  - monstruos en estado de menstruación
  lexicon: menstruata; monstra
  rationale: El latín es oscuro y la auditoría inglesa preserva la referencia a la menstruación. «Monstruos en la menstruación» mantiene la tensión sin exagerar la precisión del original.
- source_word: in dulcibus aquis salsae inuenientur
  english_pob_choice: in sweet waters salty waters will be found
  chosen_spanish: en aguas dulces se hallarán aguas saladas
  alternatives_spanish:
  - en aguas dulces se encontrarán aguas saladas
  - en aguas dulces serán halladas aguas saladas
  lexicon: dulcibus aquis; salsae inuenientur
  rationale: Conserva el contraste entre aguas dulces y saladas, y la pasiva del latín con un español claro y publicable.
- source_word: amici omnes semetipsos expugnabunt
  english_pob_choice: all friends will make war on one another
  chosen_spanish: todos los amigos harán guerra unos contra otros
  alternatives_spanish:
  - todos los amigos pelearán entre sí
  - todos los amigos se combatirán unos a otros
  lexicon: amici; expugnabunt
  rationale: «Hacer guerra unos contra otros» reproduce la fuerza beligerante del latín y la decisión inglesa sin suavizarla a un simple pleito.
- source_word: abscondetur tunc sensus
  english_pob_choice: then understanding will be hidden
  chosen_spanish: entonces el entendimiento será ocultado
  alternatives_spanish:
  - entonces el entendimiento se esconderá
  - entonces se ocultará el entendimiento
  lexicon: abscondetur; sensus
  rationale: La pasiva impersonal mantiene el matiz de pérdida/ocultamiento de la facultad de entender.
- source_word: intellectus separabitur in promptuarium suum
  english_pob_choice: insight will withdraw into its storehouse
  chosen_spanish: la inteligencia se retirará a su granero
  alternatives_spanish:
  - la inteligencia se apartará a su depósito
  - el entendimiento se retirará a su almacén
  lexicon: intellectus; promptuarium
  rationale: «Promptuarium» puede ser depósito, despensa o granero. Dado el ecosistema de la imagen y la versión inglesa, «granero» conserva una reserva material concreta sin domesticar demasiado el término.
theological_decisions:
- issue: Imagen apocalíptica de corrupción del orden natural y social
  english_pob_reading: The verse strings together signs of inversion and social conflict without smoothing the Latin's strangeness.
  chosen_spanish_reading: 'La traducción conserva la extrañeza del latín y la serie de inversiones: parto monstruoso, aguas mezcladas, amigos enemistados, entendimiento oculto.'
  alternative_spanish_readings:
  - Una versión más interpretativa podría normalizar la imagen y decir que todo se trastornará.
  - Podría suavizarse 'monstruos' por 'seres monstruosos', pero eso diluye la dureza del texto.
  rationale: El pasaje es deliberadamente ominoso; conviene no domesticarlo con explicaciones que no están en la fuente.
  doctrine_reference: Sabiduría apocalíptica / literatura de crisis en 2 Esdras
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando notas al pie no ancladas en el texto. La redacción sigue de cerca la revisión inglesa más reciente, especialmente la inclusión de 'en la menstruación' y de la cláusula correspondiente a 'abscondetur tunc sensus'.
  spanish_consistency_notes:
  - Se mantuvo 'inteligencia' para intellectus para diferenciarlo de 'entendimiento' en sensus, siguiendo la distinción semántica del latín y la auditoría inglesa.
  - Se evitó 'SEÑOR' o terminología cristológica ajena al pasaje, ya que no hay vocabulario divino directo en este versículo.
  - No se añadieron notas al pie porque no había una ambigüedad hispana que requiriera marcador anclado en el texto.
