translation:
  language: es
  text: Entonces me desperté, y mi cuerpo se estremeció mucho, y mi alma
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: euigilaui
  english_pob_choice: Then I awoke
  chosen_spanish: Entonces me desperté
  alternatives_spanish:
  - Y desperté
  - Entonces desperté
  lexicon: despertar(se)
  rationale: El latín indica el inicio del despertar; 'me desperté' comunica el evento con naturalidad en español y conserva el valor temporal de 'Then' con 'Entonces'.
- source_word: corpus meum horruit ualde
  english_pob_choice: my body shuddered greatly
  chosen_spanish: mi cuerpo se estremeció mucho
  alternatives_spanish:
  - mi cuerpo tembló mucho
  - mi cuerpo se horrorizó mucho
  lexicon: cuerpo
  rationale: '''horruit'' expresa un estremecimiento físico intenso; ''se estremeció'' es más preciso y natural que un calco literal, y ''mucho'' reproduce ''valde'' sin exceso interpretativo.'
- source_word: anima mea
  english_pob_choice: and my soul
  chosen_spanish: y mi alma
  alternatives_spanish:
  - y mi espíritu
  - y mi vida
  lexicon: alma
  rationale: '''anima'' en este contexto se refiere a la interioridad personal y continúa la frase truncada en el texto fuente; ''alma'' es la correspondencia más directa y mantiene la tensión antropológica sin resolverla en ''espíritu''.'
theological_decisions:
- issue: Alcance de 'anima' al final de la cláusula
  english_pob_reading: and my soul
  chosen_spanish_reading: y mi alma
  alternative_spanish_readings:
  - y mi espíritu
  - y mi vida
  rationale: La transmisión latina termina en 'et anima mea' sin desarrollo adicional en el fragmento proporcionado. Se conserva la apertura semántica con 'alma', evitando cerrar el sentido con una paráfrasis más interpretativa.
  doctrine_reference: Antropología bíblica / alma-espíritu
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente, que añadió 'and my soul' para reflejar 'et anima mea'. La redacción española incorpora ese segmento final de forma directa.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, pero con español contemporáneo.
  - No se introducen términos eclesiásticos no presentes en el fuente.
  - La cláusula queda abierta porque el fragmento latino recibido también queda en suspenso con 'et anima mea'.
