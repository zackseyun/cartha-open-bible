translation:
  language: es
  text: 'El ángel que vino a mí la noche anterior estaba conmigo, y me dijo: «Escúchame, y yo te instruiré; préstame atención, y añadiré más».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: est angelus ad me qui ante uenerat ad me praeterita nocte
  english_pob_choice: the angel who had come to me on the previous night was with me
  chosen_spanish: El ángel que había venido a mí la noche anterior estaba conmigo
  alternatives_spanish:
  - El ángel que había venido a mí la noche anterior estaba junto a mí
  - El ángel que había venido a mí la noche anterior estaba presente conmigo
  lexicon: ángel; venir a mí; la noche anterior; estar conmigo
  rationale: El latín afirma que el ángel que ya había venido la noche anterior ahora estaba con el hablante. «Estaba conmigo» conserva la relación de presencia sin añadir matices no presentes en el texto. «La noche anterior» expresa bien praeterita nocte con español natural.
- source_word: 'Et dixit mihi: audi me'
  english_pob_choice: and he said to me, 'Hear me'
  chosen_spanish: 'y me dijo: «Escúchame'
  alternatives_spanish:
  - 'y me dijo: «Oye me'
  - 'y me dijo: «Escúchame a mí'
  lexicon: decir; audi me; escuchar
  rationale: «Escúchame» es una orden natural en español y comunica adecuadamente audi me. Se evita «oírme», que en español suena menos idiomático como mandato directo.
- source_word: et instruam te
  english_pob_choice: and I will instruct you
  chosen_spanish: y yo te instruiré
  alternatives_spanish:
  - y te instruiré
  - y yo te enseñaré
  lexicon: instruir; enseñar
  rationale: «Instruiré» mantiene el sentido de orientar/enseñar con un tono más formal y cercano al latín instruam. Se conserva el futuro para reflejar la secuencia promesa-respuesta.
- source_word: et intende mihi
  english_pob_choice: pay attention to me
  chosen_spanish: préstame atención
  alternatives_spanish:
  - atiéndeme
  - pon atención a mí
  lexicon: intendere; prestar atención
  rationale: «Préstame atención» reproduce bien la apelación directa y suena natural en español. «Atiéndeme» puede sugerir asistencia o cuidado, por eso es menos preciso aquí.
- source_word: et adiciam
  english_pob_choice: and I will add further
  chosen_spanish: y añadiré más
  alternatives_spanish:
  - y añadiré algo más
  - y agregaré más
  lexicon: adicere; añadir
  rationale: El latín queda truncado al final del versículo, así que «añadiré más» reproduce de forma abierta la idea de continuar añadiendo sin completar indebidamente el objeto. «Agregaré» es posible, pero «añadir» es más cercano al registro bíblico y al latín.
theological_decisions:
- issue: La frase final queda incompleta en el latín del versículo
  english_pob_reading: and I will add further
  chosen_spanish_reading: y añadiré más
  alternative_spanish_readings:
  - y añadiré algo más
  - y seguiré añadiendo
  rationale: El texto base termina en adiciam, sin objeto expreso. La traducción no debe suplir lo que falta. «Añadiré más» conserva la apertura sintáctica y refleja que el versículo continúa en la siguiente unidad textual.
  doctrine_reference: Principio de fidelidad textual y segmentación versicular
translation_notes:
  revision_awareness: 'El audio crítico en inglés mostró que el versículo debía realinearse con el latín de 5:32, no con el contenido desplazado de 5:33–34a. La versión española sigue esa segmentación revisada y traduce únicamente el tramo latino presente: la llegada previa del ángel, su presencia actual y su exhortación a escuchar e instrucción futura.'
  spanish_consistency_notes:
  - Se mantiene «ángel» para angelus, sin introducir mayúsculas innecesarias.
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se conserva un registro bíblico sobrio y moderno, sin calcos pesados ni añadidos explicativos no presentes en el latín.
