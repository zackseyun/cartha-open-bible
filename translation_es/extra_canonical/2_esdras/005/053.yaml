revisions:
- from: 'Y ella misma te dirá[a]: «Diferentes son los que nacen en la fuerza de la juventud, y diferentes los que nacen hacia el tiempo de la vejez, cuando el vientre está fallando».'
  to: 'Y ella misma te dirá[a]: «Diferentes son los nacidos en la fuerza de la juventud, y diferentes son los nacidos hacia el tiempo de la vejez, cuando el vientre desfallece».'
  rationale: 'La revisión hace un ajuste menor pero importante: «los nacidos» refleja mejor nati sunt que «los que nacen»; «desfallece» eleva el registro y representa bien deficiente; y se restaura un paralelismo más completo con «son» en ambos miembros. El sentido fuente y la decisión inglesa sobre sub tempus quedan intactos.'
