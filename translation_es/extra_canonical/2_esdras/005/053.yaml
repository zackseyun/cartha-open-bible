translation:
  language: es
  text: 'Y ella misma te dirá[a]: «Diferentes son los nacidos en la fuerza de la juventud, y diferentes son los nacidos hacia el tiempo de la vejez, cuando el vientre desfallece».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y ella misma te dirá: “Diferentes son los nacidos en la fuerza de la juventud,”».'
    reason: Se conserva la nota de auditoría sobre la segmentación/traducción anterior.
lexical_decisions:
- source_word: nati sunt
  english_pob_choice: Different are those born in the strength of youth
  chosen_spanish: los que nacen en la fuerza de la juventud
  alternatives_spanish:
  - los nacidos en la fuerza de la juventud
  - los que son nacidos en la fuerza de la juventud
  lexicon: nati sunt -> nacer
  rationale: El latín expresa el estado de haber nacido; en español, el participio sustantivado o la relativa con presente resultan naturales. «En la fuerza de la juventud» conserva la idea de vigor de edad temprana sin añadir contenido no presente en el texto.
- source_word: alii qui sub tempus senectutis
  english_pob_choice: those born toward the time of old age
  chosen_spanish: los que nacen hacia el tiempo de la vejez
  alternatives_spanish:
  - los nacidos hacia el tiempo de la vejez
  - los que nacen cerca del tiempo de la vejez
  lexicon: alii qui sub tempus senectutis -> otros que bajo / hacia el tiempo de la vejez
  rationale: Se conserva la oposición entre dos grupos de nacidos. «Sub tempus» se rinde como «hacia el tiempo» para mantener la noción de proximidad temporal indicada por la revisión inglesa, sin volverlo una localización estática.
- source_word: deficiente matrice
  english_pob_choice: when the womb is failing
  chosen_spanish: cuando el vientre está fallando
  alternatives_spanish:
  - cuando el vientre desfallece
  - cuando el útero está fallando
  lexicon: matrix -> vientre / útero
  rationale: «Matrix» en latín aquí designa el seno materno. Se eligió «vientre» porque es claro y bíblicamente reconocible en español, sin perder la referencia corporal; «útero» sería más técnico, pero menos idiomático en este contexto poético.
- source_word: et ipsa
  english_pob_choice: And she herself will say to you
  chosen_spanish: Y ella misma te dirá
  alternatives_spanish:
  - Y ella misma te dirá a ti
  - Y ella misma os dirá
  lexicon: et ipsa -> y ella misma
  rationale: Se conserva el énfasis de «ipsa» con «ella misma». El dativo «te» reproduce el destinatario del discurso en forma natural y directa.
theological_decisions:
- issue: Duality between birth in youth and birth in old age
  english_pob_reading: Different are those born in the strength of youth, and different are those born toward the time of old age, when the womb is failing.
  chosen_spanish_reading: Diferentes son los que nacen en la fuerza de la juventud, y diferentes los que nacen hacia el tiempo de la vejez, cuando el vientre está fallando.
  alternative_spanish_readings:
  - Distintos son los nacidos en la fuerza de la juventud, y distintos los nacidos hacia el tiempo de la vejez, cuando el vientre desfallece.
  rationale: 'La formulación mantiene la comparación paralela del texto y la tensión antropológica implícita: dos nacimientos situados en etapas distintas de la vida. No se suaviza la referencia al vientre que falla, porque forma parte del argumento textual sobre fecundidad y edad.'
  doctrine_reference: No aplica como doctrina definida; se trata de una observación antropológica y retórica del pasaje.
translation_notes:
  revision_awareness: 'La revisión inglesa detectó un error grave de alineación: el verso completo incluye tanto el primer hemistiquio sobre los nacidos en la juventud como el segundo sobre los nacidos hacia la vejez y el vientre que falla. La versión española integra ambos miembros del paralelismo y refleja la corrección establecida en el audit trail.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni equivalentes.
  - Se usa «vientre» para matrix por claridad y por su resonancia bíblica en español; no se sustituye por un tecnicismo innecesario.
  - Se preserva el paralelismo repetido con «Diferentes son... y diferentes...», evitando una paráfrasis que debilitaría la estructura del latín.
