translation:
  language: es
  text: Y habrá caos[a] en muchos lugares, y el fuego brotará con frecuencia, y las bestias salvajes abandonarán su propia región.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y se abrirá una hendidura en muchos lugares». La tradición textual revisada sugiere aquí una imagen física de abertura o grieta en la tierra.'
    reason: alternative_reading
lexical_decisions:
- source_word: uocem eius. Et chaos fiet per loca multa
  english_pob_choice: And chaos will come in many places
  chosen_spanish: Y caos vendrá en muchos lugares
  alternatives_spanish:
  - Y un abismo vendrá en muchos lugares
  - Y una hendidura se abrirá en muchos lugares
  - Y desorden vendrá en muchos lugares
  lexicon: chaos / χάος
  rationale: El latín conservado dice 'chaos fiet', y el audit trail inglés volvió a 'chaos' tras una revisión. En español, 'caos' mantiene la lectura heredada y la ambigüedad apocalíptica del término, aunque la historia textual sugiere una imagen física de ruptura. Por fidelidad al estado textual recibido, se conserva 'caos' en el texto principal y se documenta la alternativa física en nota.
- source_word: ignis frequenter emittetur
  english_pob_choice: and fire will often break out
  chosen_spanish: y el fuego brotará con frecuencia
  alternatives_spanish:
  - y el fuego se encenderá con frecuencia
  - y el fuego estallará con frecuencia
  lexicon: ignis / fuego
  rationale: '''Brotará'' expresa bien la idea de surgir o estallar sin añadir un sujeto agente que el latín no da. ''Con frecuencia'' corresponde de manera natural a ''frequenter''.'
- source_word: bestiae agrestes transmigrabunt regionem suam
  english_pob_choice: and wild beasts will leave their own region
  chosen_spanish: y las bestias salvajes abandonarán su propia región
  alternatives_spanish:
  - y las bestias salvajes migrarán fuera de su región
  - y los animales salvajes dejarán su propia región
  lexicon: bestiae agrestes / bestias salvajes
  rationale: '''Bestias salvajes'' reproduce el valor de animales feroces o no domesticados. ''Abandonarán su propia región'' sigue de cerca ''transmigrabunt regionem suam'' y preserva el matiz de salida/desplazamiento territorial.'
theological_decisions:
- issue: Naturaleza de 'chaos' en un contexto apocalíptico
  english_pob_reading: And chaos will come in many places
  chosen_spanish_reading: Y caos vendrá en muchos lugares
  alternative_spanish_readings:
  - Y un abismo vendrá en muchos lugares
  - Y una ruptura de la tierra vendrá en muchos lugares
  rationale: El contexto y la revisión textual apuntan a un posible trasfondo físico de fisura o apertura de la tierra, pero el texto latino final recibido y la última revisión inglesa conservan 'chaos'. Para no borrar esa tensión documentada, el texto español mantiene 'caos' y la nota ofrece la lectura alternativa más física.
  doctrine_reference: Apocalíptica/escatología; fidelidad al estado textual y a la tensión léxica documentada
translation_notes:
  revision_awareness: El texto latino fuente conserva 'chaos fiet'; el audit trail inglés pasó por una revisión a 'a chasm will open' y luego volvió a 'chaos will come' para reflejar con más precisión la lección latina. La versión española sigue la lectura final del audit trail ('caos') sin perder la tensión interpretativa documentada.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no aplica en este versículo.
  - Se mantuvo un registro bíblico formal y transparente, evitando reemplazar el término técnico 'caos' por una paráfrasis interpretativa en el cuerpo principal.
  - La nota a preserva la alternativa física discutida en el audit trail sin convertirla en lectura principal.
