translation:
  language: es
  text: 'Y él le dijo: «Si das a luz diez, ¿por qué con el tiempo? Pídele, pues, que dé a luz diez a la vez». Y yo dije: «Ciertamente no puede, pero—»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: dices ad eam
  english_pob_choice: And he said to it
  chosen_spanish: Y él le dijo
  alternatives_spanish:
  - Y dijo a ella
  - Y le dijo
  lexicon: Latin ad eam
  rationale: El dativo femenino del latín permite un referente femenino implícito sin exigir añadir en español una explicación interpretativa como “el vientre de la mujer”. Mantengo el pronombre átono y la referencia directa, como en el audit trail inglés revisado.
- source_word: decem si paris
  english_pob_choice: If you bear ten
  chosen_spanish: Si das a luz diez
  alternatives_spanish:
  - Si llevas diez
  - Si concibes diez
  lexicon: Latin pario
  rationale: paris en este contexto expresa dar a luz; “das a luz” conserva el valor reproductivo concreto y evita una generalización como “llevas” o una paráfrasis más amplia.
- source_word: quare per tempus ?
  english_pob_choice: why over time?
  chosen_spanish: ¿por qué a lo largo del tiempo?
  alternatives_spanish:
  - ¿por qué por tiempo?
  - ¿por qué en etapas?
  lexicon: Latin per + tempus
  rationale: La revisión inglesa optó por “over time” frente a la interpretación anterior “by stages”. En español, “a lo largo del tiempo” transmite progresión temporal sin introducir la idea de etapas que el fragmento latino no exige.
- source_word: roga ergo eam ut det decem in unum
  english_pob_choice: Ask it therefore to give birth to ten at one time
  chosen_spanish: Pídele, pues, que dé a luz diez a la vez
  alternatives_spanish:
  - Pídele, pues, que dé diez de una vez
  - Ruégale, por tanto, que dé a luz diez en un solo momento
  lexicon: Latin roga...ut det...in unum
  rationale: “Pídele” mantiene el imperativo de ruego/solicitud del latín roga. “que dé a luz diez a la vez” conserva el resultado en unum como simultaneidad inmediata, acorde con la revisión inglesa “at one time”.
- source_word: 'Et dixi : non utique poterit, sed'
  english_pob_choice: And I said, “Certainly it cannot, but—”
  chosen_spanish: 'Y yo dije: «Ciertamente no puede, pero—»'
  alternatives_spanish:
  - 'Y dije: «De ninguna manera podrá, sino—»'
  - 'Y respondí: «Sin duda no podrá, pero—»'
  lexicon: Latin non utique poterit, sed
  rationale: “Ciertamente no puede” conserva la fuerza negativa de non utique poterit sin volverlo más idiomático de lo que permite el fragmento. Mantengo la suspensión final con raya para reflejar que el texto queda cortado.
theological_decisions:
- issue: Referencia implícita del objeto femenino en el diálogo
  english_pob_reading: And he said to it
  chosen_spanish_reading: Y él le dijo
  alternative_spanish_readings:
  - Y él le dijo a ella
  - Y él dijo al vientre
  rationale: El texto fuente no desarrolla el objeto como “vientre” ni como “mujer”; por eso no se añade una identificación teológica o antropológica que el fragmento latino no contiene. La ambigüedad se preserva de manera auditable.
  doctrine_reference: Prinicipio de suficiencia textual y no-ocultación de ambigüedades
- issue: Naturaleza de la imposibilidad expresada por non utique poterit
  english_pob_reading: Certainly it cannot, but—
  chosen_spanish_reading: Ciertamente no puede, pero—
  alternative_spanish_readings:
  - De ninguna manera podrá, pero—
  - Sin duda no podrá, pero—
  rationale: No se resuelve el matiz lógico del fragmento truncado; se mantiene una negación fuerte pero no absolutizada más allá de lo que la fuente permite.
  doctrine_reference: Respeto por el alcance semántico del fragmento y por su final abierto
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó la adición interpretativa “a woman's womb”, corrigió “by stages” a “over time”, y restauró la clausula final truncada. La propuesta española sigue esa revisión y evita reintroducir la glosa descartada.
  spanish_consistency_notes:
  - Se usa un español neutro y literario, sin arcaísmos innecesarios.
  - Se preserva la interrupción final con raya para reflejar el corte del fragmento.
  - No se añade “vientre” ni “mujer”, porque el latín proporcionado no los explicita.
