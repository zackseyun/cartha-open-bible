revisions:
- from: Y el territorio que ahora ves reinando será un [a] desierto sin senderos, y lo verán desolado.
  to: Y la región que ahora ves reinando será un desierto sin senderos[a], y la verán desolada.
  rationale: Se cambia «territorio» por «región» para alinearse mejor con regionem y con la auditoría inglesa; se corrige la referencia final a «la verán desolada» para concordancia y claridad; y se recoloca la nota al sintagma léxico pertinente sin alterar el sentido básico del borrador.
  reviewer_model: gpt-5.4
