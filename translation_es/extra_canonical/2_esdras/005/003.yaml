base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/003.yaml
  text: And the region that you now see ruling will be a trackless waste, and they will see it desolate.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:36Z'
    unchanged: false
    changes_summary: Changed 'land' to 'region' for closer alignment with regionem; removed 'laid' to avoid adding beyond the source; adjusted word order slightly for more natural formal English while retaining 'ruling' and 'trackless waste' for vestigio/inconposita.
translation:
  language: es
  text: Y la región que ahora ves reinando será un desierto sin senderos[a], y la verán desolada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «desierto sin senderos» intenta reproducir la fuerza de inconposita vestigio; otras opciones posibles son «yermo sin huellas» o «desolación sin caminos».
    reason: lexical_alternative
lexical_decisions:
- source_word: regionem
  english_pob_choice: region
  chosen_spanish: territorio
  alternatives_spanish:
  - región
  - tierra
  - comarca
  lexicon: N/A
  rationale: «Territorio» comunica de forma natural y formal la extensión geográfica implicada por regionem sin forzar una calco rígido; «región» también sería posible, pero en español puede sonar más abstracto o técnico, mientras que aquí el contraste con la desolación pide una referencia concreta a la tierra habitada.
- source_word: regnare
  english_pob_choice: ruling
  chosen_spanish: reinando
  alternatives_spanish:
  - gobernando
  - dominando
  lexicon: N/A
  rationale: Se conserva la imagen verbal del presente participial con «reinando», que corresponde bien a la idea de ejercer dominio sobre la tierra/territorio. «Gobernando» sería más neutro, pero pierde parte del matiz real de regnare.
- source_word: inconposita vestigio
  english_pob_choice: trackless waste
  chosen_spanish: desierto sin senderos
  alternatives_spanish:
  - desolación sin caminos
  - yermo sin huellas
  - desierto sin huellas
  lexicon: N/A
  rationale: La construcción latina sugiere una zona no trazada ni recorrible; «desierto sin senderos» preserva la fuerza imagética de un lugar sin caminos marcados y resulta idiomático en español. «Sin huellas» sería una alternativa cercana, pero puede sonar más literaria que descriptiva.
- source_word: videbunt eam desertam
  english_pob_choice: they will see it desolate
  chosen_spanish: lo verán desolado
  alternatives_spanish:
  - la verán desolada
  - la verán convertida en desolación
  lexicon: N/A
  rationale: Se mantiene el futuro y la idea de percepción directa. «Desolado» funciona como adjetivo predicativo que recoge el estado resultante sin añadir una pasiva perifrástica que no está explícita en el latín.
theological_decisions:
- issue: Cómo expresar el juicio de ruina territorial sin introducir más detalle que el fuente
  english_pob_reading: And the region that you now see ruling will be a trackless waste, and they will see it desolate.
  chosen_spanish_reading: Y el territorio que ahora ves reinando será un desierto sin senderos, y lo verán desolado.
  alternative_spanish_readings:
  - Y la región que ahora ves gobernando será un yermo sin caminos, y la verán desolada.
  - Y la tierra que ahora ves dominando quedará desierta, y la verán en desolación.
  rationale: 'El texto anuncia un juicio histórico de inversión: el lugar que domina ahora quedará arrasado y sin transitar. La traducción conserva esa tensión sin añadir interpretaciones escatológicas o morales ajenas al texto.'
  doctrine_reference: Juicio histórico y reversión de estados; no se añade doctrina sistemática fuera del sentido literal.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés auditado: mantiene «region» como «territorio/región» en sentido geográfico concreto, evita añadir «laid», y conserva la idea de «trackless waste» sin sobreexplicarla. El latín cleaned también respalda una formulación sobria y directa.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras sustituciones no motivadas, porque el verso no contiene el Tetragrama ni κύριος.
  - Se mantiene el tiempo futuro («será», «lo verán») para reflejar la profecía directa del latín.
  - El adjetivo «desolado» se usa sin añadir pasiva explícita, en coherencia con videbunt eam desertam.
