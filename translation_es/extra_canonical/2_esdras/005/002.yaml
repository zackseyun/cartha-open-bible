base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/002.yaml
  text: And unrighteousness will be multiplied beyond what you yourself see, and beyond what you heard long ago.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:35Z'
    unchanged: false
    changes_summary: Removed 'now' and 'of' for closer alignment with the Latin and more natural formal English; retained the comparative sense of 'super' as 'beyond.'
translation:
  language: es
  text: Y la injusticia se multiplicará más allá de lo que tú mismo ves, y más allá de lo que oíste hace mucho.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: iniustitia
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - maldad
  - iniquidad
  - impiedad
  lexicon: iniustitia
  rationale: El latín apunta a falta de rectitud/justicia; en español, «injusticia» conserva el valor moral y relacional sin forzar un tecnicismo más arcaico. «Iniquidad» sería posible, pero suena más tradicional y menos inmediato.
- source_word: super
  english_pob_choice: beyond
  chosen_spanish: más allá de
  alternatives_spanish:
  - sobre
  - por encima de
  - más que
  lexicon: super
  rationale: La construcción comparativa del latín se refleja mejor con «más allá de», que comunica excedencia y mantiene el sentido del audit trail en inglés («beyond»), sin volverlo una simple localización espacial.
- source_word: ipse tu
  english_pob_choice: you yourself
  chosen_spanish: tú mismo
  alternatives_spanish:
  - tú mismo, en persona
  - tú mismo precisamente
  - tú
  lexicon: ipse
  rationale: «Ipse» intensifica el pronombre; «tú mismo» conserva esa énfasis de manera natural en español. Se evita añadir matices como «ahora» que no están en el latín revisado.
- source_word: audisti olim
  english_pob_choice: what you heard long ago
  chosen_spanish: oíste hace mucho
  alternatives_spanish:
  - oíste antiguamente
  - escuchaste hace mucho tiempo
  - oíste hace tiempo
  lexicon: olim
  rationale: «Olim» expresa anterioridad indefinida o remota; «hace mucho» reproduce bien la distancia temporal sin introducir una precisión inexistente. «Hace mucho tiempo» también sería válido, pero algo más pesado.
theological_decisions:
- issue: Conservación del contraste entre visión presente y tradición recibida
  english_pob_reading: beyond what you yourself see, and beyond what you heard long ago
  chosen_spanish_reading: más allá de lo que tú mismo ves, y más allá de lo que oíste hace mucho
  alternative_spanish_readings:
  - más allá de lo que tú mismo ves ahora, y más allá de lo que oíste hace mucho
  - más allá de lo que tú mismo observas, y más allá de lo que oíste antiguamente
  rationale: El texto contrapone lo que el destinatario percibe directamente con lo que recibió por tradición oral o previa. La versión española conserva esa tensión sin añadir elementos temporales que el latín no trae en esta línea.
  doctrine_reference: No doctrinal claim; faithful retention of comparative prophetic rhetoric
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó «now» y «of» para alinearse más estrechamente con el latín y con la comparación de super como «beyond». La versión española sigue esa decisión: no añade «ahora» y conserva el comparativo con «más allá de».'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico claro y sobrio.
  - Se evita «SEÑOR» u otra sustitución litúrgica porque aquí no aparece el nombre divino.
  - No se introduce puntuación o paralelismos ajenos al latín; la coordinación con coma refleja la estructura simple del original.
