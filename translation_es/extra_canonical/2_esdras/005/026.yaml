translation:
  language: es
  text: y de entre todas las aves que han sido creadas escogiste para ti una paloma, y de entre todo el ganado que ha sido formado te procuraste una oveja.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: volatilibus
  english_pob_choice: birds
  chosen_spanish: seres alados
  alternatives_spanish:
  - aves
  - pájaros
  lexicon: volatilia / volatiles
  rationale: El latín habla de seres voladores/alados, y el contexto del audit trail inglés usa 'birds'. 'Seres alados' conserva el rasgo semántico sin estrecharlo innecesariamente a un registro demasiado zoológico; 'aves' también sería posible, pero 'seres alados' refleja mejor la amplitud del latinismo en un texto de estilo elevado.
- source_word: nominasti tibi
  english_pob_choice: you named for yourself
  chosen_spanish: te nombraste
  alternatives_spanish:
  - te llamaste
  - te diste el nombre de
  lexicon: nominare
  rationale: '''Nombraste para ti'' suena poco natural en español. ''Te nombraste'' preserva la idea de designación en sentido reflexivo y mantiene la relación con la formulación inglesa, aunque en español puede sonar algo más compacta; se evita añadir una glosa interpretativa más larga que el fuente no exige.'
- source_word: columbam unam
  english_pob_choice: one dove
  chosen_spanish: una paloma
  alternatives_spanish:
  - una dove
  - una paloma única
  lexicon: columba
  rationale: '''Paloma'' es el equivalente natural y claro en español. Se mantiene el numeral ''una'' para conservar la individuación explícita del original y del inglés.'
- source_word: pecoribus
  english_pob_choice: cattle
  chosen_spanish: el ganado
  alternatives_spanish:
  - el ganado vacuno
  - los animales del rebaño
  lexicon: pecora
  rationale: '''Pecoribus'' designa ganado o reses en conjunto. ''El ganado'' conserva el sentido colectivo y la amplitud del latín mejor que restringirlo a una sola especie.'
- source_word: providisti tibi
  english_pob_choice: you provided for yourself
  chosen_spanish: te procuraste
  alternatives_spanish:
  - te proveyiste
  - te preparaste
  lexicon: providere
  rationale: '''Proveer para ti'' es correcto, pero en español bíblico moderno puede sonar algo abstracto. ''Te procuraste'' expresa adquisición o disposición cuidadosa y conserva la iniciativa del sujeto sin introducir un objeto ajeno al texto.'
- source_word: ovem unam
  english_pob_choice: one sheep
  chosen_spanish: una oveja
  alternatives_spanish:
  - un cordero
  - una res
  lexicon: ovis
  rationale: '''Oveja'' es el equivalente directo de ''ovis'' y mantiene la imagen del texto. ''Cordero'' implicaría una edad específica no indicada por el latín.'
theological_decisions:
- issue: El versículo usa una imagen de elección y apropiación simbólica, no una afirmación doctrinal explícita.
  english_pob_reading: you named for yourself one dove, and from all the cattle that have been formed you provided for yourself one sheep
  chosen_spanish_reading: te nombraste una paloma, y ... te procuraste una oveja
  alternative_spanish_readings:
  - te elegiste una paloma
  - te apartaste una paloma
  rationale: La línea debe mantenerse imagética y no convertir la selección de animales en una paráfrasis doctrinal sobre Israel o la Iglesia en este versículo aislado. Se conserva la literalidad simbólica del latín y del inglés revisado.
  doctrine_reference: Principio de no sobreinterpretación; mantener el alcance del texto base.
translation_notes:
  revision_awareness: 'El inglés auditado fue corregido por desalineación de versículo: la redacción anterior correspondía al v. 27, mientras que el latín de este registro es el del v. 26 (''et ex omnibus creatis volatilibus... et ex omnibus plasmatis pecoribus...''). La versión española sigue el texto latino del v. 26 y no arrastra la antigua lectura de ''pueblos'' ni ''ley''.'
  spanish_consistency_notes:
  - 'Se preserva el paralelismo de dos miembros: aves/paloma y ganado/oveja.'
  - Se evita 'SEÑOR' u otras convenciones de ocultamiento porque no aparecen en este texto.
  - La elección de 'te procuraste' mantiene la acción reflexiva sin forzar una teología ajena al verso.
