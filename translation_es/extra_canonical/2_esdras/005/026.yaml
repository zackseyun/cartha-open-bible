revisions:
- from: y de todos los seres alados que han sido creados te nombraste una paloma, y de todo el ganado que ha sido formado te procuraste una oveja.
  to: y de entre todas las aves que han sido creadas escogiste para ti una paloma, y de entre todo el ganado que ha sido formado te procuraste una oveja.
  rationale: Se reemplaza «seres alados» por «aves» para reflejar mejor volatilibus en contexto y en español natural. Se cambia «te nombraste una paloma» por «escogiste para ti una paloma» para evitar la lectura errónea de autonombramiento y preservar la idea de selección/apropiación para sí. Se mantiene «te procuraste una oveja» como equivalente suficiente de providisti tibi.
