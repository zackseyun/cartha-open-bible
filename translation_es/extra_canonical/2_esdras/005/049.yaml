translation:
  language: es
  text: Pues así como un niño no engendra hijos, ni tampoco uno que ya ha envejecido[a], así dispuse yo la era que creé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ni uno que ya ha envejecido tampoco».'
    reason: Preserva la alternativa documentada por la POB inglesa, donde el segundo miembro aparece de forma más elíptica.
lexical_decisions:
- source_word: infans
  english_pob_choice: infant
  chosen_spanish: niño
  alternatives_spanish:
  - infante
  - bebé
  lexicon: Latin infans
  rationale: En este contexto, el contraste es con quien ha envejecido y ya no puede engendrar; en español, «niño» comunica la incapacidad reproductiva de forma natural y pública, sin forzar un tecnicismo que suene más clínico de lo que exige el latín.
- source_word: parit
  english_pob_choice: bear children
  chosen_spanish: engendra hijos
  alternatives_spanish:
  - da a luz hijos
  - procrea hijos
  lexicon: Latin pario
  rationale: El latín habla de engendrar/traer al mundo hijos; «engendra hijos» mantiene el sentido reproductivo con dignidad y evita la ambigüedad de «parir», que en español suele aplicarse más estrechamente al acto de dar a luz.
- source_word: senuit
  english_pob_choice: grown old
  chosen_spanish: ha envejecido
  alternatives_spanish:
  - se ha hecho viejo
  - ha llegado a viejo
  lexicon: Latin senesco
  rationale: La elección conserva el participio de estado y su contraste temporal con «infans». «Ha envejecido» es claro, neutro y fiel al cambio de condición señalado por el texto.
- source_word: adhuc
  english_pob_choice: any longer
  chosen_spanish: más
  alternatives_spanish:
  - ya
  - todavía
  lexicon: Latin adhuc
  rationale: 'Aquí «adhuc» introduce continuación temporal negativa: ya no. En español, «engendra más» expresa naturalmente la idea de que la acción no continúa; el adverbio se integra sin repetir una perífrasis pesada.'
- source_word: saeculum
  english_pob_choice: the age
  chosen_spanish: la era
  alternatives_spanish:
  - el siglo
  - el mundo
  lexicon: Latin saeculum
  rationale: La POB inglesa opta por «the age», que en este contexto designa el orden/disposición de la creación más que una unidad cronológica. «La era» conserva ese valor amplio y no estrecha indebidamente el término a «siglo».
- source_word: disposui
  english_pob_choice: I ordered
  chosen_spanish: dispuse
  alternatives_spanish:
  - ordené
  - establecí
  lexicon: Latin dispono
  rationale: «Dispuse» reproduce la idea de ordenar/arranjar con autoridad soberana y suena natural en español bíblico contemporáneo. Mantiene la fuerza del acto divino de establecer el orden del mundo creado.
- source_word: creatum
  english_pob_choice: I created
  chosen_spanish: creé
  alternatives_spanish:
  - he creado
  - formé
  lexicon: Latin creo
  rationale: 'El perfecto latino se vierte de manera directa como pasado simple: «creé». Mantiene la afirmación de agencia divina sobre la era sin desplazarla a un presente durativo.'
theological_decisions:
- issue: El orden soberano de la creación frente a la incapacidad natural de engendrar
  english_pob_reading: For just as an infant does not bear children, nor does one who has grown old bear any longer, so I ordered the age that I created.
  chosen_spanish_reading: Pues así como un niño no engendra hijos, ni tampoco uno que ya ha envejecido engendra más, así dispuse yo la era que creé.
  alternative_spanish_readings:
  - Pues así como un infante no da a luz, ni uno que ha envejecido ya no engendra, así ordené la edad que creé.
  - Pues como un niño no puede procrear, ni el anciano lo hace ya, así establecí la era que formé.
  rationale: La sentencia compara límites naturales de la generación humana con la soberanía del Creador sobre la era creada. La versión española conserva ese paralelismo sin introducir explicaciones doctrinales ajenas al texto y mantiene el foco en el poder ordenante de Dios.
  doctrine_reference: Providencia y soberanía creadora; no se añade un desarrollo doctrinal externo al pasaje.
translation_notes:
  revision_awareness: 'El contexto inglés recibió una revisión menor: se aclaró ''nor one who has grown old any longer'' a ''nor does one who has grown old bear any longer'' para evitar una elipsis incómoda. La versión española sigue esa línea clara con ''ni tampoco uno que ya ha envejecido engendra más'', manteniendo el valor de continuidad negativa de adhuc sin sobrecargar la frase.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' en el proyecto cuando aparezca el nombre divino, pero en este versículo no está presente.
  - Se mantiene 'era' para saeculum en coherencia con la decisión POB de 'the age', evitando 'siglo' por su restricción cronológica.
  - Se usa registro bíblico claro y moderno, sin calcar la sintaxis latina más allá de lo necesario.
