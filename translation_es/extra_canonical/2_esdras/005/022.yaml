base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/022.yaml
  text: And my soul recovered the spirit of understanding[a], and again I began to speak before the Most High.
  footnotes:
  - marker: a
    text: Or "And I said, 'Lord, Master, from every forest of the earth and from all its trees you chose for yourself one vine,".
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:39Z'
    unchanged: false
    changes_summary: Removed the redundant object 'words,' since the Latin sermones here is naturally represented by 'speak' in English without requiring 'words.'
translation:
  language: es
  text: Y mi alma recobró el espíritu de entendimiento[a], y de nuevo comencé a hablar delante del Altísimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y mi alma recobró un espíritu de entendimiento».'
    reason: alternative_reading
lexical_decisions:
- source_word: anima mea
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida interior
  - mi ser
  lexicon: anima
  rationale: Alma reproduce con naturalidad el sujeto interior de la frase latina y conserva el paralelismo bíblico habitual sin añadir matiz ajeno.
- source_word: resumpsit
  english_pob_choice: recovered
  chosen_spanish: recobró
  alternatives_spanish:
  - volvió a recibir
  - retomó
  lexicon: resumere
  rationale: Recobró expresa bien la idea de recuperar algo perdido o debilitado, y mantiene el movimiento aspectual del verbo latino sin volverlo demasiado interpretativo.
- source_word: spiritum intellectus
  english_pob_choice: the spirit of understanding
  chosen_spanish: el espíritu de entendimiento
  alternatives_spanish:
  - el espíritu de inteligencia
  - el espíritu de comprensión
  lexicon: spiritus / intellectus
  rationale: Entendimiento conserva el sustantivo abstracto del latino intellectus y encaja con el lenguaje bíblico en español; 'inteligencia' podría sonar más técnico y 'comprensión' más explicativo.
- source_word: iterum coepi
  english_pob_choice: again I began
  chosen_spanish: de nuevo comencé
  alternatives_spanish:
  - otra vez empecé
  - y nuevamente comencé
  lexicon: iterum / coepi
  rationale: De nuevo comencé reproduce la repetición y el inicio de la acción con un castellano natural y sobrio.
- source_word: loqui
  english_pob_choice: to speak
  chosen_spanish: hablar
  alternatives_spanish:
  - decir
  - pronunciar
  lexicon: loqui
  rationale: Hablar es el equivalente más directo y no obliga a introducir contenido adicional; evita la impresión de que se trata de una cita específica o de un discurso formulado.
- source_word: coram Altissimo
  english_pob_choice: before the Most High
  chosen_spanish: delante del Altísimo
  alternatives_spanish:
  - en presencia del Altísimo
  - ante el Altísimo
  lexicon: coram / Altissimus
  rationale: Delante del Altísimo preserva la relación espacial/relacional de coram y mantiene el título reverente 'Altísimo' como equivalente de la mayúscula inglesa.
theological_decisions:
- issue: Título divino 'Altissimus'
  english_pob_reading: Most High
  chosen_spanish_reading: Altísimo
  alternative_spanish_readings:
  - el Altísimo
  - el Más Alto
  rationale: Se conserva el título bíblico tradicional en español y no se sustituye por una paráfrasis que debilite su carácter reverente y nominal.
  doctrine_reference: Título divino reverencial en la tradición bíblica; cf. uso litúrgico y sapiencial de 'el Altísimo'.
- issue: '''spirit of understanding'' como don interior'
  english_pob_reading: the spirit of understanding
  chosen_spanish_reading: el espíritu de entendimiento
  alternative_spanish_readings:
  - un espíritu de entendimiento
  - el espíritu de inteligencia
  rationale: La frase se mantiene como cualidad o don interior recibido por el alma, sin convertirla en una explicación psicológica ajena al texto.
  doctrine_reference: Lenguaje bíblico de dotación interior para discernimiento y sabiduría; cf. literatura sapiencial.
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió una desalineación grave en el inglés: el verso no habla de un discurso previo ni de la imagen de una vid, sino de que el alma recobró el espíritu de entendimiento y volvió a hablar delante del Altísimo. La versión española sigue el texto latino de 2 Esdras 5:22 y evita incorporar material del verso siguiente.'
  spanish_consistency_notes:
  - Se mantuvo 'Altísimo' para coram Altissimo, en coherencia con el uso bíblico reverencial del título.
  - No se añadió 'palabras' ni otro objeto directo, porque el latino loqui ya se expresa naturalmente como 'hablar' en español.
  - Se eligió 'entendimiento' como equivalente principal de intellectus para conservar el registro bíblico y la abstracción del original.
