base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/013.yaml
  text: They will labor[a], but their ways will not be directed. I have been permitted to tell you these signs; and if you pray again and weep as you do now, and fast for seven days, you will hear again things greater than these.
  footnotes:
  - marker: a
    text: Or 'I have been permitted to tell you these signs; and if you pray again and weep as now, and fast for seven days, you will hear again things greater than these.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:37Z'
    unchanged: false
    changes_summary: Changed 'will not prosper' to 'will not be directed' to more closely reflect Latin dirigentur. Kept the rest unchanged as accurate and natural.
translation:
  language: es
  text: Ellos trabajarán, pero sus caminos no serán dirigidos[a]. Se me ha permitido decirte estas señales; y si oras otra vez y lloras como lo haces ahora, y ayunas durante siete días, volverás a oír cosas aún mayores que estas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “no prosperarán”, si se toma la expresión latina como semitismo de éxito o fracaso del camino.'
    reason: alternative_reading
lexical_decisions:
- source_word: laborabunt
  english_pob_choice: They will labor
  chosen_spanish: Ellos trabajarán
  alternatives_spanish:
  - Ellos se fatigarán
  - Ellos laborarán
  lexicon: laborare
  rationale: El latín expresa trabajo o esfuerzo; en español moderno 'trabajarán' comunica bien la acción sin sonar arcaico. 'Laborarán' sería más literal, pero menos natural.
- source_word: non dirigentur uiae eorum
  english_pob_choice: their ways will not be directed
  chosen_spanish: sus caminos no serán dirigidos
  alternatives_spanish:
  - sus caminos no prosperarán
  - sus caminos no serán enderezados
  lexicon: dirigere
  rationale: Se conserva la metáfora del latín 'dirigi' con una forma transparente en español. Aunque el giro puede implicar éxito o prosperidad en uso semítico, aquí se mantiene la tensión lexical sin resolverla interpretativamente.
- source_word: Haec signa dicere tibi permissum est mihi
  english_pob_choice: I have been permitted to tell you these signs
  chosen_spanish: Se me ha permitido decirte estas señales
  alternatives_spanish:
  - Me ha sido permitido decirte estas señales
  - Se me permitió decirte estas señales
  lexicon: permittere
  rationale: La pasiva impersonal española reproduce bien el permiso concedido. 'Señales' mantiene la correspondencia con 'signa' y con el registro profético del pasaje.
- source_word: oraueris iterum
  english_pob_choice: if you pray again
  chosen_spanish: si oras otra vez
  alternatives_spanish:
  - si vuelves a orar
  - si orares de nuevo
  lexicon: orare
  rationale: '''Oras otra vez'' es claro y fiel al valor exhortativo-condicional del latín; ''vuelves a orar'' es una alternativa natural, pero menos directa.'
- source_word: ploraueris sicut et nunc
  english_pob_choice: weep as you do now
  chosen_spanish: lloras como ahora
  alternatives_spanish:
  - lloras como lo haces ahora
  - lloras así como ahora
  lexicon: plorare
  rationale: Se conserva el presente comparativo del latín y el tono emocional de 'ploraueris'. En español, 'lloras como ahora' resulta breve y entendible.
- source_word: ieiunaueris septem diebus
  english_pob_choice: fast for seven days
  chosen_spanish: ayunas durante siete días
  alternatives_spanish:
  - ayunas siete días
  - ayunas por siete días
  lexicon: ieiunare
  rationale: '''Ayunas durante siete días'' expresa duración con naturalidad en español y mantiene el sentido temporal del latín.'
- source_word: audies iterato horum maiora
  english_pob_choice: you will hear again things greater than these
  chosen_spanish: volverás a oír cosas aún mayores que estas
  alternatives_spanish:
  - oirás otra vez cosas mayores que estas
  - escucharás de nuevo cosas más grandes que estas
  lexicon: audire
  rationale: '''Volverás a oír'' conserva la idea de repetición de ''iterato''. ''Aún mayores que estas'' refleja ''maiora horum'' sin intensificar innecesariamente con ''más grandes''.'
theological_decisions:
- issue: Naturaleza del 'dirigirse' de los caminos
  english_pob_reading: their ways will not be directed
  chosen_spanish_reading: sus caminos no serán dirigidos
  alternative_spanish_readings:
  - sus caminos no prosperarán
  - sus caminos no serán enderezados
  rationale: El auditorio latino puede entender un sentido de guía, orden o éxito. La versión española conserva la ambigüedad del original en vez de fijarla en prosperidad, para no borrar la tensión semántica documentada por el propio texto.
  doctrine_reference: Sapiential/idiomatic success-language; no doctrinal claim beyond the source's wording
- issue: Alcance de la promesa final tras oración, llanto y ayuno
  english_pob_reading: you will hear again things greater than these
  chosen_spanish_reading: volverás a oír cosas aún mayores que estas
  alternative_spanish_readings:
  - oírás de nuevo cosas mayores que estas
  - volverás a escuchar cosas mayores que estas
  rationale: Se mantiene la promesa de revelación adicional en forma futura, sin expandir qué serán esas cosas ni convertirlas en interpretación teológica externa.
  doctrine_reference: Revelation/disclosure context in 2 Esdras; no extra-textual expansion
translation_notes:
  revision_awareness: La revisión reciente detectó y corrigió una omisión de cláusula inicial en el inglés. Esta traducción incorpora desde el inicio el contenido de 'laborabunt et non dirigentur uiae eorum' y sigue la revisión más reciente al conservar 'no serán dirigidos', evitando una paráfrasis de prosperidad no reflejada en la última decisión editorial.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el tetragrámaton; aquí no aparece, por lo que no se usa.
  - '''Señales'' traduce ''signa'' de manera consistente con un registro profético y no como ''milagros''.'
  - Se conserva la repetición verbal y condicional del latín sin elevar el tono a una formulación litúrgica distinta.
