base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/044.yaml
  text: And he answered me and said[a], 'The creature cannot hasten faster than the Creator, nor can the age sustain those who were created in it all at once.'
  footnotes:
  - marker: a
    text: Or 'The creature cannot hasten beyond the Creator'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:44Z'
    unchanged: false
    changes_summary: Changed 'creation' to 'creature' for lexical accuracy with creatura, and 'hold at once' to 'sustain ... all at once' to better reflect sustinere ... in unum in natural formal English.
translation:
  language: es
  text: 'Y él me respondió y dijo[a]: «La criatura no puede apresurarse más rápido que el Creador, ni el siglo puede sostener a los que fueron creados en él todos a la vez».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La creación no puede apresurarse más rápido que el Creador».'
    reason: alternative_rendering
lexical_decisions:
- source_word: spondit ad me et dixit
  english_pob_choice: And he answered me and said
  chosen_spanish: Y él me respondió y dijo
  alternatives_spanish:
  - Y me contestó y dijo
  - Y respondió y dijo
  lexicon: Lat. spondere/respondere + dicere
  rationale: Conservo la doble fórmula narrativa del latino con un español natural; «respondió» mantiene el valor de contestación, y «dijo» preserva la cadencia del texto.
- source_word: creatura
  english_pob_choice: the creature / creation
  chosen_spanish: la creación
  alternatives_spanish:
  - la criatura
  - la creatura
  lexicon: Lat. creatura
  rationale: Sigo la revisión auditada que entiende creatura colectivamente como el orden creado, no como un ser individual. En español, «la creación» comunica mejor ese valor colectivo y evita restringir el sentido a una sola criatura.
- source_word: festinare
  english_pob_choice: hasten faster
  chosen_spanish: apresurarse más
  alternatives_spanish:
  - irse más rápido
  - darse prisa más que
  lexicon: Lat. festinare
  rationale: «Apresurarse» conserva el matiz de prisa/precipitación. Añadí «más» para reflejar la comparación implícita con el Creador sin forzar una imagen espacial.
- source_word: super creatorem
  english_pob_choice: faster than the Creator
  chosen_spanish: más que el Creador
  alternatives_spanish:
  - por encima del Creador
  - más rápido que el Creador
  lexicon: Lat. super + comparativo implícito
  rationale: La revisión inglesa descartó «beyond» por ser demasiado espacial; en español, «más que» expresa la comparación de manera directa y fiel. Mantengo «Creador» como título sustantivado.
- source_word: saeculum
  english_pob_choice: the age
  chosen_spanish: el siglo
  alternatives_spanish:
  - la era
  - el tiempo presente
  lexicon: Lat. saeculum
  rationale: «Siglo» es el equivalente tradicional y suficientemente amplio para saeculum en este tipo de texto, conservando la referencia al orden/tiempo presente sin modernizarla en exceso.
- source_word: sustinere ... in unum
  english_pob_choice: sustain ... all at once
  chosen_spanish: sostener de una vez
  alternatives_spanish:
  - contener de una vez
  - soportar a la vez
  lexicon: Lat. sustinere + in unum
  rationale: «Sostener» reproduce el sentido de contener/soportar; «de una vez» traduce «in unum» con naturalidad y mantiene la idea de totalidad simultánea.
- source_word: qui in eo creati sunt
  english_pob_choice: those who were created in it
  chosen_spanish: a los que fueron creados en él
  alternatives_spanish:
  - a los que fueron creados en eso
  - a quienes en él fueron creados
  lexicon: Lat. qui ... creati sunt
  rationale: Mantengo la referencia relacional de «en él», que liga a los creados con el siglo mencionado. El pasivo conserva el tono formal del original.
theological_decisions:
- issue: Distinción entre creador y creación
  english_pob_reading: The creature cannot hasten faster than the Creator
  chosen_spanish_reading: La creación no puede apresurarse más que el Creador
  alternative_spanish_readings:
  - La criatura no puede apresurarse más que el Creador
  - Lo creado no puede apresurarse más que el Creador
  rationale: 'El texto establece una asimetría ontológica básica: lo creado no supera al Creador. «La creación» expresa mejor el conjunto creado, que es lo que la revisión auditada considera aquí, sin perder la tensión con el singular latino.'
  doctrine_reference: Relación Creador-criatura; providencia y orden de la creación
- issue: Sentido de saeculum como ámbito/edad presente
  english_pob_reading: nor can the age sustain those who were created in it all at once
  chosen_spanish_reading: ni el siglo puede sostener de una vez a los que fueron creados en él
  alternative_spanish_readings:
  - ni la era puede sostener de una vez a los que fueron creados en ella
  - ni el tiempo presente puede sostener de una vez a los que fueron creados en él
  rationale: «Siglo» mantiene la ambigüedad teológica del término latino, que puede abarcar edad, era o mundo presente. No lo reduzco a una sola acepción, porque el texto parece hablar del orden temporal creado que no puede contener simultáneamente a todos sus habitantes.
  doctrine_reference: Eschatología del tiempo presente; orden creado y limitación temporal
translation_notes:
  revision_awareness: 'Seguí la revisión auditada más reciente sobre creatura y super, pero no adopté «creación» por mero calco del inglés: la base latina permite una lectura colectiva que en español se vuelve más clara como «la creación». También preservé la idea de simultaneidad de in unum con una expresión idiomática española.'
  spanish_consistency_notes:
  - Usé «Creador» con mayúscula como título divino sustantivado, coherente con el registro reverente del pasaje.
  - Conservé «siglo» para saeculum por consistencia con el valor técnico del término en textos apocalípticos, evitando equivalerlo sin más a «mundo» o «era».
  - Mantuve la estructura paralela entre ambas cláusulas para reflejar la simetría argumentativa del latino.
