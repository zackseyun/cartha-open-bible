    issue: «sobre la tierra» es una formulación algo más literal que idiomática
    rationale: Aunque en español moderno «habitan en la tierra» podría sonar más natural, «habitan sobre la tierra» sigue siendo plenamente inteligible, mantiene el tono bíblico y reproduce bien el matiz del original/inglés auditado.
