source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: et regnabit quem non sperant qui inhabitant super terram; et volatilia conmigrationem facient.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/006.yaml
  text: And one whom those who dwell on the earth do not expect will reign, and the birds will migrate.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:36Z'
    unchanged: false
    changes_summary: Removed 'together' because the Latin conmigrationem facient indicates migration but does not require an explicit adverb here; otherwise retained the draft's accurate and natural rendering.
translation:
  language: es
  text: Y reinará uno a quien los que habitan sobre la tierra no esperan, y las aves migrarán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: regnabit
  english_pob_choice: will reign
  chosen_spanish: reinará
  alternatives_spanish:
  - gobernará
  - ejercerá el reino
  lexicon: regnare
  rationale: El latín expresa el ejercicio real del poder; «reinará» es la forma natural y fiel en español, sin introducir matices no presentes en el texto.
- source_word: quem non sperant
  english_pob_choice: one whom those who dwell on the earth do not expect
  chosen_spanish: uno a quien los que habitan sobre la tierra no esperan
  alternatives_spanish:
  - uno que los que habitan sobre la tierra no esperan
  - al que los habitantes de la tierra no esperan
  lexicon: sperare
  rationale: Se conserva la estructura de expectativa frustrada del original. «No esperan» reproduce bien la negación de esperanza/expectativa sin añadir un objeto explícito o una paráfrasis interpretativa.
- source_word: qui inhabitant super terram
  english_pob_choice: those who dwell on the earth
  chosen_spanish: los que habitan sobre la tierra
  alternatives_spanish:
  - los moradores de la tierra
  - quienes habitan la tierra
  lexicon: inhabitare
  rationale: «Habitan sobre la tierra» sigue de cerca el latín y mantiene el alcance universal de quienes viven en el mundo terrenal.
- source_word: volatilia
  english_pob_choice: the birds
  chosen_spanish: las aves
  alternatives_spanish:
  - los pájaros
  - las aves del cielo
  lexicon: volatilia
  rationale: «Aves» es un equivalente claro y elevado en español, apto para un registro bíblico sin perder sentido.
- source_word: conmigrationem facient
  english_pob_choice: will migrate
  chosen_spanish: migrarán
  alternatives_spanish:
  - harán migración
  - se moverán de lugar
  lexicon: conmigrationem facere
  rationale: El latín señala migración/cambio estacional o desplazamiento; «migrarán» captura el sentido directamente y evita un calco extraño como «harán migración».
theological_decisions:
- issue: Referencia al sujeto futuro inesperado
  english_pob_reading: And one whom those who dwell on the earth do not expect will reign
  chosen_spanish_reading: Y reinará uno a quien los que habitan sobre la tierra no esperan
  alternative_spanish_readings:
  - Y reinará uno que los que habitan sobre la tierra no esperan
  - Y reinará uno a quien no esperan los que habitan sobre la tierra
  rationale: No hay necesidad de explicitar identificación mesiánica o política; el texto solo afirma la irrupción inesperada de un gobernante. La sintaxis elegida mantiene esa tensión sin resolverla.
  doctrine_reference: 2 Esdras 5:6, lectura literal del anuncio profético
- issue: Imagen de las aves
  english_pob_reading: and the birds will migrate
  chosen_spanish_reading: y las aves migrarán
  alternative_spanish_readings:
  - y las aves se migrarán
  - y las aves se trasladarán
  rationale: Se conserva el dato observacional/profético sin convertirlo en símbolo. El texto no fuerza una lectura alegórica en este versículo.
  doctrine_reference: 2 Esdras 5:6, preservación del signo natural
translation_notes:
  revision_awareness: La revisión más reciente eliminó «together» del inglés porque el latín conmigrationem facient exige solo la idea de migración. La versión española sigue esa decisión y evita añadir un adverbio equivalente no sustentado por el source.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y contemporáneo.
  - No se introducen términos eclesiásticos no requeridos por el latín.
  - «Migrarán» evita sobreinterpretar la imagen de volatilia conmigrationem facient.
  - La construcción «uno a quien» conserva la relación sintáctica sin forzar una paráfrasis doctrinal.
