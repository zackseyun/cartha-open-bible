  to: 'Y yo dije[a]: «¿Cómo, pues, dijiste a tu siervo que darías ciertamente vida a la creación creada por ti toda de una vez? Si entonces los vivientes vivirán todos juntos y la creación[b] perdurará, también ahora puede llevar a los presentes todos juntos».'
  rationale: 'Se corrige «lo soportará» a «perdurará» para reflejar con fidelidad sustinebit creatura según la auditoría inglesa revisada: la creación es la que resiste o permanece, no la que soporta un objeto explícito. También se ajusta «toda junta» a «toda de una vez» para un español más natural con «creación», manteniendo el sentido de in unum.'
