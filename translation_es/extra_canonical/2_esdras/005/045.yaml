base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/045.yaml
  text: And I said[a], “How then did you say to your servant that you will surely give life to the creation created by you all at once? If then the living will live all at once and the creation will endure, it can also now bear those who are present all at once.”
  footnotes:
  - marker: a
    text: Or 'the creature created by you'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:45Z'
    unchanged: false
    changes_summary: Changed 'will hold them' to 'will endure' to reflect sustinebit creatura more accurately, with creation as the subject enduring rather than holding others. Changed 'it could also now bear' to 'it can also now bear' for a more natural rendering of poterit.
translation:
  language: es
  text: 'Y yo dije[a]: «¿Cómo, pues, dijiste a tu siervo que darías ciertamente vida a la creación creada por ti toda de una vez? Si entonces los vivientes vivirán todos juntos y la creación[b] perdurará, también ahora puede llevar a los presentes todos juntos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y dije».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la criatura»; el latín creatura aquí puede leerse colectivamente como «la creación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: creatam creaturam / creatura
  english_pob_choice: the creation created by you / the creation
  chosen_spanish: la creación creada por ti
  alternatives_spanish:
  - la criatura creada por ti
  - la creación hecha por ti
  lexicon: creatura
  rationale: El latín usa creatura en sentido colectivo y no meramente como un ser individual; el contexto inmediato habla de 'los vivientes' en plural y de la capacidad de la creación para sostener a los presentes. 'Creación' conserva mejor ese valor colectivo que 'criatura' en español actual, aunque se mantiene como alternativa posible por la cercanía etimológica.
- source_word: sustinebit
  english_pob_choice: will endure
  chosen_spanish: lo soportará
  alternatives_spanish:
  - permanecerá
  - subsistirá
  - lo sostendrá
  lexicon: sustinere
  rationale: La revisión inglesa corrigió la idea de 'hold them' hacia 'endure' para reflejar que el sujeto es la creación que persevera. En español, 'lo soportará' recoge esa idea de resistencia o carga en una forma natural; se deja constancia de que también puede entenderse como 'permanecerá' o 'subsistirá', pero 'soportará' mantiene la relación con el paralelo de 'llevar' en la cláusula siguiente.
- source_word: poterit
  english_pob_choice: can
  chosen_spanish: puede
  alternatives_spanish:
  - podrá
  - será capaz de
  lexicon: posse
  rationale: El latín poterit expresa capacidad futura; 'puede' en español funciona aquí como presente de posibilidad con valor idiomático natural y fiel, sin forzar un condicional. 'Podrá' también sería posible, pero 'puede' sigue de cerca la revisión inglesa más reciente.
- source_word: praesentes
  english_pob_choice: those who are present
  chosen_spanish: a los presentes
  alternatives_spanish:
  - a los que están presentes
  - a los asistentes
  lexicon: praesens
  rationale: '''Presentes'' es la forma más directa y transparente en español para praesentes. ''Asistentes'' sería más interpretativo; se evita para no suavizar la sencillez del latín.'
theological_decisions:
- issue: Sentido colectivo de 'creatura/creación' frente a un singular individualista
  english_pob_reading: the creation created by you / the creation will endure
  chosen_spanish_reading: la creación creada por ti / la creación lo soportará
  alternative_spanish_readings:
  - la criatura creada por ti
  - la creación creada por ti lo sostendrá
  rationale: 'El tramo latino y la auditoría inglesa favorecen un sentido colectivo: toda la creación como ámbito creado por Dios, no un solo ser. Por eso se evita ''criatura'' en el cuerpo principal, que en español moderno suele sonar individual y puede oscurecer el argumento.'
  doctrine_reference: creación y providencia divina; continuidad del orden creado
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que corrigió en inglés la idea de 'will hold them' a 'will endure' y 'could also now bear' a 'can also now bear'. En español se reflejó esa lectura con 'lo soportará' y 'puede llevar', manteniendo el sujeto colectivo 'la creación'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se usa 'creación' como término principal para creatura por la evidencia contextual del plural 'los vivientes'.
  - Se conserva el paralelismo de repetición 'toda junta / todos juntos' para reflejar in unum del latín.
  - La puntuación reproduce la estructura interrogativa y la cita directa de forma fluida en español actual.
