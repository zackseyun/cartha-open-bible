base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/038.yaml
  text: And I said, 'Lord, Master, who indeed can know these things, except one who does not dwell among men?'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:42Z'
    unchanged: false
    changes_summary: Revised 'does not have his dwelling with men' to the more natural and formal 'does not dwell among men,' while preserving the sense of habitation with humans.
translation:
  language: es
  text: 'Y dije: «Señor, Maestro, ¿quién, en efecto, puede saber estas cosas, sino el que no habita entre los hombres?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: dominator domine
  english_pob_choice: Lord, Master
  chosen_spanish: Señor, Maestro
  alternatives_spanish:
  - Soberano, Señor
  - Dueño, Maestro
  - Señor, Dueño
  lexicon: dominus / dominator
  rationale: El doble vocativo latino expresa autoridad y señorío; en español, «Señor, Maestro» comunica con naturalidad la relación de autoridad sin perder el matiz de reconocimiento reverente. «Maestro» mantiene el paralelo del inglés POB y evita reducir el segundo vocativo a un simple sinónimo de «Señor».
- source_word: quis enim est qui potest haec scire
  english_pob_choice: who indeed can know these things
  chosen_spanish: ¿quién, en efecto, puede saber estas cosas?
  alternatives_spanish:
  - ¿quién puede saber estas cosas?
  - ¿quién, pues, puede conocer estas cosas?
  lexicon: quis / potest / scire / haec
  rationale: «En efecto» refleja la partícula enfática del inglés POB («indeed») y del latín «enim», manteniendo el tono retórico. «Saber» reproduce bien el alcance cognitivo general de «scire» en este contexto, sin sobrecargar con un término técnico.
- source_word: nisi qui cum hominibus habitationem non habet
  english_pob_choice: except one who does not dwell among men
  chosen_spanish: sino el que no habita entre los hombres
  alternatives_spanish:
  - sino uno que no habita entre los hombres
  - excepto el que no mora entre los hombres
  - sino el que no tiene su morada entre los hombres
  lexicon: habitatio / habet
  rationale: La revisión inglesa preferida por el audit trail pasó de una frase posesiva («does not have his dwelling with men») a la más natural «does not dwell among men». En español, «no habita entre los hombres» conserva el sentido de residencia o convivencia sin introducir una perífrasis posesiva innecesaria. «Habitar» mantiene la fuerza de residencia estable y la construcción responde bien al latín.
theological_decisions:
- issue: Designación reverencial para el interlocutor
  english_pob_reading: Lord, Master
  chosen_spanish_reading: Señor, Maestro
  alternative_spanish_readings:
  - Señor, Dueño
  - Soberano, Maestro
  rationale: No se trata aquí de una identificación explícita del nombre divino, sino de un vocativo reverente dirigido a un superior. Por eso se conserva una fórmula de respeto y autoridad, sin trasladarla automáticamente a «Yahvé» ni a una sustitución litúrgica que el texto no exige.
  doctrine_reference: Vocativo de respeto; no hay afirmación doctrinal adicional en el versículo.
translation_notes:
  revision_awareness: El texto inglés revisó «does not have his dwelling with men» a «does not dwell among men» para lograr una formulación más natural y formal. La versión española sigue esa revisión con «no habita entre los hombres», preservando el sentido de residencia y la sobriedad del registro.
  spanish_consistency_notes:
  - Se mantiene «Señor» como vocativo reverencial, coherente con el POB inglés, sin forzar una sustitución por «Yahvé» porque el latín aquí no contiene el Tetragrámaton ni una cita explícita del nombre divino.
  - «Hombres» traduce el colectivo humano del latín «hominibus» en un registro bíblico estándar y comprensible; no se especifica «seres humanos» porque la forma tradicional aquí es suficientemente clara.
  - No se añadió puntuación interpretativa extra más allá de la interrogación retórica y las comillas de cita directiva.
