base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/030.yaml
  text: And if you indeed hate your people[a], they ought to be chastised by your own hands.
  footnotes:
  - marker: a
    text: Or 'And it happened, when I had spoken these words, that the angel who had come to me on the former night was sent to me,'.
