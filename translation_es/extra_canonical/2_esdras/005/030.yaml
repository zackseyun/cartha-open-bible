    unchanged: false
    changes_summary: Replaced 'utterly hate' with 'indeed hate' to reflect the emphatic Latin construction without overstatement, and changed 'punished' to 'chastised' to better match castigari.
translation:
  language: es
  text: Y si de veras odias a tu pueblo, deben ser castigados por tus propias manos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: odiens odisti
  english_pob_choice: indeed hate
  chosen_spanish: de veras aborreces
  alternatives_spanish:
  - si realmente aborreces
  - si en verdad aborreces
  - si de verdad aborreces
  lexicon: 'odiens odisti: construcción enfática que intensifica el verbo mediante repetición/calco semítico'
  rationale: La doble forma latina expresa énfasis, no necesariamente absolutidad; por eso ‘de veras’ conserva la fuerza intensiva sin volverlo más extremo que el testimonio fuente ni perder el matiz condicional.
- source_word: populum tuum
  english_pob_choice: your people
  chosen_spanish: a tu pueblo
  alternatives_spanish:
  - a tu gente
  - a tu pueblo
  lexicon: 'populus: pueblo, gente, nación'
  rationale: ‘Pueblo’ mantiene el valor colectivo y covenantal del latín, y es el equivalente más transparente en español bíblico para el grupo perteneciente a Dios o al interlocutor.
- source_word: debet castigari
  english_pob_choice: they ought to be chastised
  chosen_spanish: debe ser castigado
  alternatives_spanish:
  - debe ser castigado
  - debe ser corregido
  - debe ser disciplinado
  lexicon: 'castigari: ser castigado / ser corregido / ser disciplinado'
  rationale: ‘Castigado’ preserva el peso punitivo del latín y el audit trail inglés (‘chastised’), sin suavizarlo hacia mera instrucción moral. El singular impersonal en español funciona como pasiva/impersonal normativa.
- source_word: tuis manibus
  english_pob_choice: by your own hands
  chosen_spanish: por tus propias manos
  alternatives_spanish:
  - por tus propias manos
  - a manos tuyas
  lexicon: 'manus: manos; por extensión, agencia/ejecución'
  rationale: ‘Por tus propias manos’ conserva la idea de agencia directa y subraya la responsabilidad inmediata, con una forma natural en español.
theological_decisions:
- issue: Intensificación de la enemistad divina/humana en la cláusula condicional
  english_pob_reading: And if you indeed hate your people
  chosen_spanish_reading: Y si de veras aborreces a tu pueblo
  alternative_spanish_readings:
  - Y si de verdad aborreces a tu pueblo
  - Y si realmente aborreces a tu pueblo
  rationale: El latín presenta una intensificación enfática; ‘aborrecer’ expresa mejor la carga relacional fuerte que ‘odiar’ en español contemporáneo, sin atenuar el conflicto del texto.
  doctrine_reference: Ps 139:21-22; Jer 15:17 (lenguaje de rechazo/aborrecimiento en contexto de juicio y queja profética)
- issue: Relación entre castigo y mediación divina en la forma verbal
  english_pob_reading: they ought to be chastised by your own hands
  chosen_spanish_reading: debe ser castigado por tus propias manos
  alternative_spanish_readings:
  - deben ser castigados por tus propias manos
  - deberían ser castigados por tus propias manos
  rationale: La fuente no especifica plural explícito en esta línea latina; la formulación impersonal singular en español reproduce la generalidad normativa sin añadir sujetos no marcados. ‘Castigado’ preserva la dimensión judicial/disciplinaria del pasaje.
  doctrine_reference: 2 Esdras 5:30 en contexto de intercesión y juicio divino; cf. Heb 12:6 para el valor disciplinario del castigo
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió una desalineación de versículo: el inglés previo traducía por error el contenido del versículo 31; el texto fuente de 2 Esdras 5:30 es ‘et si odiens odisti populum tuum tuis manibus debet castigari’. La presente versión sigue esa línea latina y conserva el énfasis intensivo de ‘odiens odisti’ sin sobrerrepresentarlo.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando el nombre divino aparece explícitamente; aquí no aparece, por lo que no se usa.
  - Se evitó ‘SEÑOR’ porque el versículo no contiene el Tetragrámaton ni un κύριος griego relevante.
  - Se prefirió ‘castigado’ sobre ‘disciplinado’ para conservar la dureza del latín castigari.
  - No se introdujeron notas al pie porque no había una variante alternativa textual o lexical que requiriera anclaje en el verso mismo.
