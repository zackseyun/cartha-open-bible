base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/019.yaml
  text: And I said to him[a], 'Go away from me, and do not come near me until seven days have passed, and then you may come to me.' And he did as I said and withdrew from me.
  footnotes:
  - marker: a
    text: Or 'And I fasted seven days, wailing and weeping, as Uriel the angel had commanded me.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:39Z'
    unchanged: false
    changes_summary: Revised 'for seven days' to 'until seven days have passed' to reflect usque diebus septem more precisely, and changed 'he heard what I said' to 'he did as I said' to convey audivit idiomatically in context.
translation:
  language: es
  text: 'Y le dije: «Apártate de mí y no te acerques a mí hasta que hayan pasado siete días, y entonces podrás venir a mí». Y hizo como le dije y se retiró de mí.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et dixi ei
  english_pob_choice: And I said to him
  chosen_spanish: Y le dije
  alternatives_spanish:
  - Y le hablé
  - Y le respondí
  lexicon: Latin dixi + ei
  rationale: Dixi es un verbo de habla directo y simple; ‘le dije’ conserva el sujeto explícito y el destinatario personal sin añadir matices no presentes en el latín.
- source_word: vade a me
  english_pob_choice: Go away from me
  chosen_spanish: Apártate de mí
  alternatives_spanish:
  - Vete de mí
  - Aléjate de mí
  lexicon: Latin vade + a me
  rationale: El latín expresa separación física inmediata; ‘apártate de mí’ suena natural en español y mantiene la orden de retirarse, sin suavizarla.
- source_word: non ad me accedas
  english_pob_choice: do not come near me
  chosen_spanish: no te acerques a mí
  alternatives_spanish:
  - no vengas cerca de mí
  - no te llegues a mí
  lexicon: Latin non ... accedas
  rationale: Accedas implica acercamiento; ‘no te acerques a mí’ reproduce bien esa proximidad prohibida en español moderno.
- source_word: usque diebus septem
  english_pob_choice: until seven days have passed
  chosen_spanish: hasta que hayan pasado siete días
  alternatives_spanish:
  - durante siete días
  - por siete días
  lexicon: Latin usque + diebus septem
  rationale: La revisión inglesa entendió correctamente una duración límite, no solo una extensión temporal. ‘Hasta que hayan pasado siete días’ conserva esa idea de espera concluida por el paso del tiempo.
- source_word: tunc venies ad me
  english_pob_choice: then you may come to me
  chosen_spanish: y entonces vendrás a mí
  alternatives_spanish:
  - y después podrás venir a mí
  - y luego podrás acercarte a mí
  lexicon: Latin tunc venies ad me
  rationale: El futuro simple comunica la autorización implícita del contexto sin agregar una modalización ajena al latín.
- source_word: audivit ut dixi
  english_pob_choice: he did as I said
  chosen_spanish: hizo como le dije
  alternatives_spanish:
  - obedeció lo que le dije
  - actuó como le indiqué
  lexicon: Latin audivit ut dixi
  rationale: El giro latino puede sonar literalmente como ‘oyó’, pero la revisión audit trail señala que aquí es idiomático. ‘Hizo como le dije’ transmite la obediencia/resultante sin perder naturalidad.
- source_word: recessit a me
  english_pob_choice: withdrew from me
  chosen_spanish: se retiró de mí
  alternatives_spanish:
  - se apartó de mí
  - se alejó de mí
  lexicon: Latin recessit a me
  rationale: ‘Se retiró de mí’ mantiene el movimiento de apartarse desde la presencia del hablante con un registro digno y sobrio.
translation_notes:
  revision_awareness: 'La versión inglesa fue corregida porque una traducción anterior seguía por error el contenido del versículo siguiente. La presente redacción española sigue el texto latino de 2 Esdras 5:19 tal como queda restituido en la revisión más reciente: rechazo de acercamiento por siete días y retirada del interlocutor.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, sin recurrir a fórmulas arcaizantes innecesarias.
  - No se usó nota al pie porque la única nota heredada del inglés correspondía a la lectura anterior errónea y no debe anclarse en este versículo restituido.
