translation:
  language: es
  text: y de todos los abismos del mar llenaste para ti un solo cauce, y de todas las ciudades edificadas santificaste para ti Sion.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: abyssis maris
  english_pob_choice: from all the depths of the sea
  chosen_spanish: de todos los abismos del mar
  alternatives_spanish:
  - de las profundidades del mar
  - de todos los hondos del mar
  lexicon: abyssus
  rationale: «Abismos» conserva la imagen de gran profundidad y el tono elevado del latín; «profundidades» sería más suave, pero menos marcado.
- source_word: replesti tibi rivum unum
  english_pob_choice: you filled for yourself one stream
  chosen_spanish: llenaste para ti un solo río
  alternatives_spanish:
  - llenaste para ti un arroyo
  - colmaste para ti un solo cauce
  lexicon: repleo
  rationale: El latino usa «rivum», literalmente un río pequeño o corriente; en español «río» mantiene el paralelismo con la imagen de una sola corriente elegida, aunque «arroyo» también es posible.
- source_word: aedificatis civitatibus
  english_pob_choice: from all the cities that have been built
  chosen_spanish: de todas las ciudades edificadas
  alternatives_spanish:
  - de todas las ciudades construidas
  - de todas las ciudades levantadas
  lexicon: aedifico
  rationale: «Edificadas» reproduce de cerca el participio latino y conserva el eco formal de la construcción humana.
- source_word: sanctificasti tibimet ipsi Sion
  english_pob_choice: you sanctified Zion for yourself
  chosen_spanish: santificaste para ti a Sion
  alternatives_spanish:
  - consagraste para ti a Sion
  - apartaste para ti a Sion
  lexicon: sanctifico
  rationale: «Santificaste» es la equivalencia directa de sanctificasti. Mantiene el sentido cultual de dedicar o apartar para Dios; se conserva «para ti» por el reflejo de tibimet ipsi.
theological_decisions:
- issue: Tratamiento de Sion como objeto apartado para Dios
  english_pob_reading: you sanctified Zion for yourself
  chosen_spanish_reading: santificaste para ti a Sion
  alternative_spanish_readings:
  - consagraste para ti a Sion
  - apartaste para ti a Sion
  rationale: El texto presenta a Sion como algo reservado por Dios para sí mismo. «Santificaste» preserva la carga bíblica de consagración sin desplazar el sentido al de mera admiración.
  doctrine_reference: Teología bíblica de la elección y consagración de Sion.
translation_notes:
  revision_awareness: La revisión más reciente corrigió un desajuste de versículo en la tradición inglesa; esta versión española sigue el latín de 2 Esdras 5:25 tal como está en el paquete fuente, sin incorporar la línea anterior sobre aves y ganado.
  spanish_consistency_notes:
  - Se mantiene «Sion» con ortografía tradicional española usada en contextos bíblicos.
  - No se usa mayúscula especial para «abismos» porque funciona como sustantivo común en el paralelismo poético.
  - «Para ti» conserva el dativo reflexivo latino y evita una paráfrasis más libre.
