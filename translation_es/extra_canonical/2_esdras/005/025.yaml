- from: y de todos los abismos del mar llenaste para ti un solo río, y de todas las ciudades edificadas santificaste para ti a Sion.
  to: y de todos los abismos del mar llenaste para ti un solo cauce, y de todas las ciudades edificadas santificaste para ti Sion.
  rationale: Se ajusta «río» a «cauce» para una imagen más natural y más cercana al valor de rivus en este contexto, y se elimina la preposición personal ante «Sion» para mejorar la sintaxis española sin cambiar el sentido.
