lexical_decisions:
- source_word: insipiens
  english_pob_choice: foolish
  chosen_spanish: insensato
  alternatives_spanish:
  - necio
  - tonto
  lexicon: insipiens
  rationale: '''Insensato'' reproduce bien la idea de falta de juicio o sensatez sin caer en un registro demasiado coloquial; mantiene la fuerza autocrítica del latín y la lectura inglesa ''foolish''.'
- source_word: quomodo potero dicere
  english_pob_choice: how then can I speak
  chosen_spanish: ¿cómo, entonces, podré hablar?
  alternatives_spanish:
  - ¿cómo podré decir?
  - ¿de qué modo podré hablar?
  lexicon: quomodo + potero + dicere
  rationale: '''Hablar'' funciona naturalmente en español para el acto de expresarse sobre un asunto; conserva la pregunta retórica y el valor futuro/potencial de ''potero''.'
- source_word: de his
  english_pob_choice: about these things
  chosen_spanish: acerca de estas cosas
  alternatives_spanish:
  - sobre estas cosas
  - de estas cosas
  lexicon: de + haec
  rationale: '''Acerca de'' evita el literalismo duro de ''de'' y expresa con claridad el referente parcial del complemento en español.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente, que eliminó la cláusula añadida 'you have questioned me' porque no está presente en el latín provisto; por eso el español refleja solo el material atestiguado y deja la frase final abierta.
  spanish_consistency_notes:
  - Se evitó 'preguntarme' o 'de quienes me has preguntado', porque el contexto de revisión indica que esas palabras no están en el texto latino dado.
  - Se usó 'Yahvé' no aplica aquí; no hay nombres divinos en este versículo.
  - La puntuación reproduce el carácter interrogativo y la incompletitud del fragmento.
