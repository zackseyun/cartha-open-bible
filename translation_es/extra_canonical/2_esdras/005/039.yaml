translation:
  language: es
  text: Pero yo soy insensato; ¿cómo, entonces, podré hablar acerca de estas cosas sobre las cuales[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El latín conservado queda incompleto después de ‘de his quibus’ (‘acerca de estas cosas sobre las cuales…’); por eso la traducción deja la frase abierta y no añade un complemento final que el testimonio no preserva.
