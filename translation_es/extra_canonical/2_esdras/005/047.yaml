lexical_decisions:
- source_word: secundum tempus
  english_pob_choice: according to its time
  chosen_spanish: según su tiempo
  alternatives_spanish:
  - conforme a su tiempo
  - de acuerdo con su tiempo
  lexicon: secundum + tempus
  rationale: La frase latina expresa ajuste o correspondencia temporal. “Según su tiempo” conserva la relación temporal de manera natural en español y mantiene la brevedad del fragmento.
- source_word: matricem
  english_pob_choice: the womb
  chosen_spanish: el vientre
  alternatives_spanish:
  - el útero
  - la matriz
  lexicon: matrix / matricem
  rationale: El latín matricem puede referirse al útero o al vientre materno. En español, “vientre” reproduce bien el sentido corporal y es más transparente para lectura pública; “útero” es más técnico y “matriz” puede sonar más arcaico o ambiguo.
theological_decisions:
- issue: Referencia al acto divino de dar el vientre
  english_pob_reading: And I gave the womb
  chosen_spanish_reading: Y yo di el vientre
  alternative_spanish_readings:
  - Y yo di el útero
  - Y yo concedí el vientre
  rationale: El sujeto implícito es Dios según el contexto del fragmento. Se mantiene la primera persona y la literalidad del don divino sin suavizar la afirmación. “Di” conserva la fuerza del latín dedi; “concedí” explicitaría el aspecto de concesión, pero es menos directo.
  doctrine_reference: Providencia y don de Dios en la generación humana
translation_notes:
