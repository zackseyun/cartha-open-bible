  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el texto fuente lo requiere explícitamente; aquí no aparece el tetragrámaton.
  - Se preserva un tono sobrio y público, con comillas angulares para el discurso directo.
  - No se introduce ‘Cristo’, ‘Señor’ ni otra terminología no presente en el fragmento latino.
