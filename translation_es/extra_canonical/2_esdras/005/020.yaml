translation:
  language: es
  text: Y ayuné durante siete días[a], lamentándome y llorando, como me lo había mandado el ángel Uriel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Una antigua traducción asociaba erróneamente este versículo con la lectura: «Y sucedió después de siete días que los pensamientos de mi corazón volvieron a angustiarme mucho». El texto latino aquí dice que Esdras ayunó durante siete días.'
    reason: previous_rendering_clarified
lexical_decisions:
- source_word: ieiunavi / ieiunavi diebus septem
  english_pob_choice: I fasted for seven days
  chosen_spanish: ayuné durante siete días
  alternatives_spanish:
  - ayuné por siete días
  - estuve ayunando siete días
  lexicon: ieiunare -> ayunar; diebus septem -> durante siete días
  rationale: El latín expresa una duración completa de siete días. En español, «durante siete días» reproduce con naturalidad esa extensión temporal sin añadir matiz causal. «Ayuné» conserva el acto concreto de abstenerse de comer.
- source_word: ululans
  english_pob_choice: wailing
  chosen_spanish: aullando
  alternatives_spanish:
  - lamentando
  - gimiendo
  - clamando
  lexicon: ululare -> aullar / lamentarse con gemidos
  rationale: El verbo latino tiene fuerza sonora y de lamento intenso. «Aullando» mantiene mejor esa crudeza y la imagen auditiva que «lamentando» o «gimiendo», aunque suene fuerte en español.
- source_word: plorans
  english_pob_choice: weeping
  chosen_spanish: llorando
  alternatives_spanish:
  - sollozando
  - derramando lágrimas
  lexicon: plorare -> llorar, lamentarse
  rationale: «Llorando» es la correspondencia directa y natural de plorans. «Sollozando» sería más específico de llanto entrecortado, pero el latín no lo exige.
- source_word: sicut mihi mandavit Urihel angelus
  english_pob_choice: as Uriel the angel had commanded me
  chosen_spanish: como me lo había mandado el ángel Uriel
  alternatives_spanish:
  - según me había mandado el ángel Uriel
  - tal como me había mandado el ángel Uriel
  lexicon: mandare -> mandar / ordenar; Urihel angelus -> el ángel Uriel
  rationale: «Me lo había mandado» refleja con precisión la relación de mandato personal del latín. Se mantiene «ángel Uriel» porque el nombre propio y el sustantivo están explícitos en la fuente.
theological_decisions:
- issue: Duración del ayuno y posible ambigüedad temporal
  english_pob_reading: And I fasted for seven days
  chosen_spanish_reading: Y ayuné durante siete días
  alternative_spanish_readings:
  - Y ayuné por siete días
  - Y estuve ayunando siete días
  rationale: No hay base en este verso para la lectura alternativa del pie inglés previa, que pertenecía a una alineación errónea de otro versículo. Se sigue el latín del verso 20 sin arrastrar la variante equivocada.
  doctrine_reference: 'Texto base y crítica textual: corrección de desalineación versicular; fidelidad al testimonio latino recibido.'
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una corrección importante: la redacción anterior pertenecía por error al versículo 21. Para el versículo 20, el latín confirmado dice que el hablante ayunó siete días, gimiendo y llorando, conforme al mandato del ángel Uriel. La traducción española sigue esa base latina y no conserva la variante errónea, aunque sí registra en nota que el pie inglés previo fue una desalineación de versículo.'
  spanish_consistency_notes:
  - Se usa «ángel Uriel» de manera directa, sin introducir títulos alternativos no presentes en el latín.
  - Se mantiene el tono sobrio y literal del relato, con una sintaxis natural en español.
  - No se usa «SEÑOR» ni vocabulario litúrgico ajeno al texto; el versículo no contiene el nombre divino.
  - El pie de nota [a] se ancla en «siete días» para advertir la corrección textual respecto del audit trail inglés.
