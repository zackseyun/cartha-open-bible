  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del latín: un objeto implícito será buscado por muchos y no será encontrado, y la injusticia junto con la incontinentia aumentarán sobre la tierra. Sin embargo, el femenino explícito en «buscada / hallada» introduce en español un referente no nombrado en este versículo. El latín usa pasivos impersonales sin expresar aquí el antecedente; por fidelidad local conviene evitar fijarlo gramaticalmente.'
