translation:
  language: es
  text: Y muchos la buscarán y no la encontrarán, y la injusticia[a] y la falta de dominio propio[b] se multiplicarán sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Injusticia» traduce el latín iniustitia; otras opciones posibles son «iniquidad» o «falta de justicia».
    reason: lexical_alternative
  - marker: b
    text: «Falta de dominio propio» expresa el sentido moral de incontinentia; «incontinencia» es etimológica, pero en español actual puede entenderse de modo físico.
    reason: lexical_alternative
lexical_decisions:
- source_word: quaeretur
  english_pob_choice: it will be sought
  chosen_spanish: será buscada
  alternatives_spanish:
  - será buscado
  - será procurada
  lexicon: quaerere
  rationale: El latino pasivo impersonal indica que el referente será objeto de búsqueda. En español, el femenino singular concuerda naturalmente con la idea implícita de «sabiduría» del contexto inmediato, aunque el texto de este versículo no la nombre explícitamente.
- source_word: invenietur
  english_pob_choice: will not be found
  chosen_spanish: no será hallada
  alternatives_spanish:
  - no se encontrará
  - no será encontrada
  lexicon: invenire
  rationale: Conserva la fuerza pasiva del original y mantiene una construcción sobria y clara en español. «Hallada» suena más natural que un pasivo más rígido, sin perder el sentido.
- source_word: iniustitia
  english_pob_choice: unrighteousness
  chosen_spanish: la injusticia
  alternatives_spanish:
  - la iniquidad
  - la falta de justicia
  lexicon: iniustitia
  rationale: «Injusticia» reproduce de forma directa el valor moral/jurídico del latín. Se evita «iniquidad» porque en español puede sonar más arcaico o más interpretativo que el sustantivo latino.
- source_word: incontinentia
  english_pob_choice: lack of self-control
  chosen_spanish: la falta de dominio propio
  alternatives_spanish:
  - la intemperancia
  - la incontinencia
  lexicon: incontinentia
  rationale: Aunque «incontinencia» sería un equivalente etimológico, en español contemporáneo suele referirse sobre todo a una condición física. «Falta de dominio propio» conserva el sentido moral del latín y comunica mejor al lector moderno.
theological_decisions:
- issue: Expresión moral totalizante sobre la tierra
  english_pob_reading: unrighteousness and lack of self-control will be multiplied on the earth
  chosen_spanish_reading: la injusticia y la falta de dominio propio se multiplicarán sobre la tierra
  alternative_spanish_readings:
  - la iniquidad y la intemperancia se multiplicarán sobre la tierra
  - la injusticia y la incontinencia se multiplicarán sobre la tierra
  rationale: Se mantiene el paralelismo del latín y la gravedad escatológica del enunciado sin añadir elementos no presentes. «Sobre la tierra» conserva el alcance universal del juicio moral.
  doctrine_reference: No aplica; observación lexical y de tono profético apocalíptico.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que existe alto acuerdo con el testimonio latino; por eso se mantiene una traducción muy cercana al texto fuente, ajustando solo la naturalidad del español donde el latín sería ambiguo o poco idiomático.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y directo.
  - Se evita el reemplazo mecánico por formulaciones eclesiásticas tradicionales cuando el latín admite una expresión más transparente.
  - Los sustantivos morales se presentan con artículos definidos para conservar la fuerza sentenciosa del original.
