  glossary_alignment: No hay términos de glosario mayor en juego. «Injusticia» para iniustitia y «falta de dominio propio» para incontinentia concuerdan bien con la filosofía del proyecto y con el sentido del latín. La nota sobre incontinentia es útil; la de «injusticia» es opcional pero aceptable.
