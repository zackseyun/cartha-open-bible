review_pass:
  verdict: revise
  source_alignment_summary: 'El latín dice literalmente: «y han pisoteado los que se oponían a tus promesas y los que creían en tus pactos/covenants». El borrador español invierte la relación sintáctica y hace que los pisoteados sean «los que se oponían... y los que creían...», cuando el sujeto de «conculcaverunt» en la fuente son «quienes se oponían a tus promesas», y el objeto son «quienes creían en tus pactos».'
  spanish_quality_summary: 'El español es fluido, pero la construcción actual cambia sustancialmente el sentido. Con una reparación mínima, el verso queda natural y fiel: «Y los que se oponían a tus promesas pisotearon a los que creían en tus pactos».'
  glossary_alignment: «promesas» para sponsionibus y «pactos» para testamentis son defendibles y preservan el paralelismo semántico. No hay conflicto con la terminología base del proyecto. «Pisotearon» representa bien conculcaverunt.
  issues:
  - severity: high
    issue: Inversión de sujeto y objeto
    rationale: La fuente latina tiene como sujeto «qui contradicebant sponsionibus tuis» y como objeto «quique tuis testamentis credebant». El borrador español presenta ambos grupos como objeto de «pisotearon», alterando el evento descrito.
  - severity: low
    issue: Falta de correspondencia con la nota histórica del inglés
    rationale: La nota inglesa documenta una lectura previa desalineada con el versículo siguiente. No es obligatorio reproducirla en español, pero podría conservarse como nota editorial si la política del proyecto exige arrastrar notas históricas del audit trail. Dado que esa nota no explica el sentido del verso actual, puede omitirse sin problema.
  revised_spanish_text: Y los que se oponían a tus promesas pisotearon a los que creían en tus pactos.
  revision_rationale: Se corrige la sintaxis para que el sujeto y el objeto coincidan con el latín y con la traducción inglesa corregida, manteniendo las elecciones léxicas ya bien justificadas en español.
