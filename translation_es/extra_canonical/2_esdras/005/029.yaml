translation:
  language: es
  text: Y los que se oponían a tus promesas pisotearon a los que creían en tus pactos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: conculcaverunt
  english_pob_choice: have trampled
  chosen_spanish: pisotearon
  alternatives_spanish:
  - aplastaron
  - pisaron
  lexicon: conculcare
  rationale: El latín expresa una acción violenta de pisar o aplastar. «Pisotearon» conserva la imagen corporal y la fuerza agresiva del verbo mejor que una paráfrasis más abstracta.
- source_word: contradicebant
  english_pob_choice: opposed
  chosen_spanish: se oponían
  alternatives_spanish:
  - contradecían
  - resistían
  lexicon: contradicere
  rationale: En español «se oponían» comunica bien la oposición activa sin forzar un tecnicismo. «Contradecían» sería posible, pero suena más verbal y menos bélico que el latín en este contexto.
- source_word: sponsionibus
  english_pob_choice: promises
  chosen_spanish: promesas
  alternatives_spanish:
  - pactos
  - compromisos
  lexicon: sponsio
  rationale: El latín puede apuntar a promesas solemnes; por eso «promesas» refleja el valor básico. Mantener «promesas» también evita sobrecargar el verso con lenguaje jurídico no explícito en la palabra misma.
- source_word: testamentis
  english_pob_choice: covenants
  chosen_spanish: pactos
  alternatives_spanish:
  - alianzas
  - testamentos
  lexicon: testamentum
  rationale: En este contexto bíblico latino, «testamentis» remite a pactos o alianzas. Elegí «pactos» porque comunica la relación vinculante de forma natural en español y evita la ambigüedad moderna de «testamentos».
- source_word: credebant
  english_pob_choice: believed
  chosen_spanish: creían
  alternatives_spanish:
  - confiaban
  - creían firmemente
  lexicon: credere
  rationale: '«Creían» corresponde directamente al latín y preserva la sencillez del contraste: unos se oponen, otros creen/confían en tus pactos. «Confiaban» sería interpretativo y más teológico que el verbo base.'
theological_decisions:
- issue: Relación entre «promesas» y «pactos» en el paralelismo
  english_pob_reading: those who opposed your promises ... those who believed your covenants
  chosen_spanish_reading: los que se oponían a tus promesas ... los que creían en tus pactos
  alternative_spanish_readings:
  - los que se oponían a tus promesas ... los que creían en tus alianzas
  - los que resistían tus promesas ... los que confiaban en tus pactos
  rationale: 'El verso mantiene un paralelismo entre dos objetos relacionados pero no idénticos: promesas y pactos. En español conviene conservar ambas palabras distintas para no aplanar la tensión semántica del latín ni fusionar indebidamente la promesa con la alianza.'
  doctrine_reference: Paralelismo semántico en texto bíblico; fidelidad pactal
- issue: Valor de «credebant» en un contexto de fidelidad al pacto
  english_pob_reading: those who believed your covenants
  chosen_spanish_reading: los que creían en tus pactos
  alternative_spanish_readings:
  - los que confiaban en tus pactos
  - los que se mantenían fieles a tus pactos
  rationale: «Creer» conserva el valor de asentimiento y confianza textual sin convertir el verbo en una explicación doctrinal más amplia. En un contexto de pacto, la fe incluye confianza, pero el latín no requiere explicitar más que eso.
  doctrine_reference: Fe/confianza en el marco del pacto
- issue: Ausencia de la nota de la traducción inglesa anterior por desalineación de versículo
  english_pob_reading: Older English note referred to a different verse
  chosen_spanish_reading: No se incorpora la antigua lectura de odio y castigo porque corresponde al verso siguiente, no a este.
  alternative_spanish_readings:
  - Incluir una nota sobre el verso siguiente
  - Mantener una referencia cruzada al texto anterior
  rationale: La revisión del inglés dejó claro que el texto antiguo pertenecía al versículo 30. Para 5:29 no debe importarse esa lectura, porque introduciría una confusión textual y exegética ajena al latín recibido.
  doctrine_reference: Crítica textual y delimitación de versículos
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una corrección importante: la versión antigua estaba desalineada y pertenecía al versículo siguiente. Para 2 Esdras 5:29, el latín limpio dice que los que se oponían a tus promesas pisotearon a los que creían en tus pactos; por eso la redacción española sigue ese latín y no la lectura antigua desplazada.'
  spanish_consistency_notes:
  - Se mantiene «tus» para ambas frases, respetando el paralelo del latín.
  - Se usa «pactos» para testamentis en sentido bíblico de alianza, no «testamentos» en sentido moderno.
  - Se preserva la imagen violenta de conculcaverunt con «pisotearon».
  - No se añaden notas al pie porque el verso corregido no presenta una variante textual útil para este registro.
