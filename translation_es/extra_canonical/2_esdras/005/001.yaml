translation:
  language: es
  text: 'Pero en cuanto a las señales: he aquí[a], vienen días en que los que habitan sobre la tierra serán sobrecogidos por gran terror, y el camino de la verdad quedará oculto, y la tierra quedará estéril de fe.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en gran desconcierto».
    reason: Alternativa previa preservada para el sentido de «in excessu multo», aunque el contexto apocalíptico favorece «gran terror».
lexical_decisions:
- source_word: de signis autem
  english_pob_choice: But concerning the signs
  chosen_spanish: Pero en cuanto a las señales
  alternatives_spanish:
  - Pero acerca de las señales
  - Y en cuanto a las señales
  lexicon: de + signis; autem
  rationale: El latin introduce una transición temática, no una oposición fuerte. «En cuanto a» comunica bien el cambio de tema en español y mantiene la relación discursiva de autem sin sobrerreformular.
- source_word: ecce
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - vean
  lexicon: ecce
  rationale: «He aquí» conserva el tono exhortativo/profético y es natural en registro bíblico sin caer en arcaísmo excesivo.
- source_word: in excessu multo
  english_pob_choice: with great terror
  chosen_spanish: presa de gran terror
  alternatives_spanish:
  - en gran terror
  - en gran consternación
  - en gran desconcierto
  lexicon: in excessu; excessus
  rationale: La revisión inglesa favorece «great terror» frente a «bewilderment», y el contexto apocalíptico respalda una reacción de pánico. «Presa de» expresa adecuadamente la idea pasiva de quedar dominados por ese estado.
- source_word: adprehendentur
  english_pob_choice: will be seized
  chosen_spanish: serán presa de
  alternatives_spanish:
  - serán apresados
  - serán asaltados
  lexicon: adprehendo
  rationale: En español, el verbo literal «serán apresados» puede sonar demasiado físico o judicial. «Serán presa de» transmite mejor el sentido de quedar invadidos o dominados por el terror.
- source_word: veritatis via
  english_pob_choice: the way of truth
  chosen_spanish: el camino de la verdad
  alternatives_spanish:
  - la vía de la verdad
  - el sendero de la verdad
  lexicon: via; veritas
  rationale: «Camino» es el equivalente más claro y estable para via en este contexto. Mantiene la imagen moral y religiosa de una senda de verdad.
- source_word: sterilis erit a fide regio
  english_pob_choice: the land will be barren of faith
  chosen_spanish: la tierra será estéril de fe
  alternatives_spanish:
  - el país será estéril de fe
  - el reino será estéril de fe
  lexicon: sterilis; regio; fides
  rationale: El latín regio puede referirse a región, tierra o reino. «La tierra» sigue la lectura inglesa y conserva amplitud geográfica; «estéril de fe» mantiene la metáfora de carencia espiritual sin suavizarla.
theological_decisions:
- issue: 'El alcance de in excessu multo: terror vs. bewilderment'
  english_pob_reading: with great terror
  chosen_spanish_reading: con gran terror / presa de gran terror
  alternative_spanish_readings:
  - en gran desconcierto
  - en gran turbación
  rationale: La revisión más reciente del audit trail interpreta el giro según el trasfondo apocalíptico como terror o pánico, no solo confusión mental. Por eso se evita una solución meramente cognitiva.
  doctrine_reference: Apocalíptica de 4 Esdras; lenguaje de juicio y angustia escatológica
- issue: Naturaleza de la 'tierra' o 'región' en regio
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - la región
  - el reino
  rationale: El texto latino admite más de una extensión semántica. Se sigue la decisión inglesa auditada, porque en español «la tierra» reproduce bien la amplitud del juicio y es comprensible sin pérdida importante.
  doctrine_reference: Uso apocalíptico de regio en 4 Esdras
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que mantiene la decisión de traducir in excessu multo como un estado de terror intenso y no como simple desconcierto. No se introdujeron cambios respecto del consenso final inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el nombre divino en el texto fuente.
  - 'Se preservó el paralelismo de tres miembros: terror, ocultamiento del camino de la verdad y esterilidad de fe.'
  - Se evitó «Cristo/Mesías» por no estar presentes en este versículo.
  - La puntuación con dos puntos después de «las señales» refleja el corte temático del latín y del inglés auditado.
