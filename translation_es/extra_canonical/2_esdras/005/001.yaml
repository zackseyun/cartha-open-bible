  revision_rationale: 'La revisión es menor y estilística, no sustantiva. Se conserva plenamente el sentido auditado del latín y del POB inglés, pero se reemplazan calcos menos naturales por formulaciones españolas más fluidas: «serán sobrecogidos por gran terror» por «serán presa de gran terror», y «quedará oculto / quedará estéril» por «será ocultado / será estéril».'
