review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del latín y el audit trail inglés: transición temática («de signis autem»), anuncio profético («ecce»), pánico escatológico para «in excessu multo», ocultamiento del «camino de la verdad» y esterilidad de fe en la tierra/región. La nota alternativa sobre «desconcierto» preserva la opción previa documentada. La única desviación relevante es estilística/idiomática en español: «serán presa de gran terror» y sobre todo «será ocultado»/«estéril de fe» suenan algo forzados frente a opciones más naturales que preservan exactamente el sentido.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero necesita un ajuste menor para mayor naturalidad bíblica en español. «He aquí» funciona. «Serán presa de gran terror» es aceptable, pero «serán sobrecogidos por gran terror» fluye mejor y conserva el valor pasivo de adprehendentur. «Será ocultado» suena mecánico; «quedará oculto» es más idiomático. «La tierra será estéril de fe» comunica la metáfora, pero «quedará estéril de fe» mejora el paralelismo verbal y la naturalidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Cristo, esclavo, etc. La decisión de mantener «la verdad», «fe» y «tierra»/«camino» es coherente con el POB. La nota con alternativa «desconcierto» está bien como preservación histórica, aunque la lectura principal correcta sigue siendo «terror».
  issues:
  - severity: medium
    issue: «será ocultado» es un calco poco natural en español
    rationale: El latín «abscondetur» pide un pasivo/futuro, pero en español bíblico natural «quedará oculto» o «será escondido» suena mejor. «Será ocultado» resulta mecánico sin aportar más fidelidad.
  - severity: medium
    issue: La construcción global puede sonar rígida por acumulación de calcos
    rationale: «serán presa de gran terror ... será ocultado ... será estéril de fe» conserva el sentido, pero una leve revisión mejora la legibilidad sin alterar el contenido fuente.
  - severity: low
    issue: «serán presa de gran terror» es aceptable, pero hay una opción más idiomática
    rationale: La frase transmite bien el sentido de pánico, pero «serán sobrecogidos por gran terror» refleja mejor el pasivo de adprehendentur y suena más natural en español general.
