    timestamp: '2026-04-23T11:41:37Z'
    unchanged: false
    changes_summary: Added the auxiliary 'Has' to reflect the Latin interrogative sense more naturally in English; otherwise retained the draft's wording and structure.
translation:
  language: es
  text: '¿Ha pasado la justicia, o el que hace justicia?[a] Y dirá: No. Y sucederá en aquel tiempo que los hombres esperarán y no obtendrán;'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y ese dirá: “No”. Y en aquel tiempo los hombres esperarán y no obtendrán;».'
    reason: previous_rendering
lexical_decisions:
- source_word: pertransiit iustitia
  english_pob_choice: Has righteousness passed through
  chosen_spanish: ¿Ha pasado la justicia?
  alternatives_spanish:
  - ¿Ha atravesado la justicia?
  - ¿Ha pasado la rectitud?
  lexicon: iustitia -> justicia / rectitud
  rationale: El latín pregunta por el paso o tránsito de la justicia; en español, «ha pasado» conserva el valor perfectivo e interrogativo. «Justicia» es la opción más natural y fiel; «rectitud» sería posible, pero suena más interpretativo en este contexto.
- source_word: iustum faciens
  english_pob_choice: one who does righteousness
  chosen_spanish: uno que hace justicia
  alternatives_spanish:
  - uno que practica la justicia
  - uno que obra rectitud
  lexicon: iustum faciens -> el que hace/obra justicia
  rationale: La construcción latina refleja un giro semítico de agencia ética, no una idea de «hacer justo» a otro. En español, «uno que hace justicia» reproduce la fuerza verbal y mantiene la ambigüedad ética del original. «Practica la justicia» es una alternativa más idiomática, pero menos literal.
- source_word: Et erit in illo tempore
  english_pob_choice: And it will be at that time
  chosen_spanish: Y sucederá en aquel tiempo
  alternatives_spanish:
  - Y será en aquel tiempo
  - Y acontecerá en aquel tiempo
  lexicon: Et erit in illo tempore -> fórmula temporal profética
  rationale: «Sucederá» comunica el valor futuro/eventual del latín con buena naturalidad en español, preservando el tono profético sin sonar arcaico.
- source_word: sperabunt homines et non impetrabunt
  english_pob_choice: men will hope and not obtain
  chosen_spanish: los hombres esperarán y no obtendrán
  alternatives_spanish:
  - los hombres tendrán esperanza y no lograrán
  - los hombres esperarán y no alcanzarán
  lexicon: sperare / impetrare -> esperar / obtener, conseguir
  rationale: «Esperarán y no obtendrán» sigue de cerca el paralelismo del latín y la solución inglesa, manteniendo la tensión entre expectativa y frustración. «Obtener» conserva la idea de lograr lo pedido.
theological_decisions:
- issue: Alcance de iustitia como virtud o estado divino-humano
  english_pob_reading: Has righteousness passed through?
  chosen_spanish_reading: ¿Ha pasado la justicia?
  alternative_spanish_readings:
  - ¿Ha pasado la rectitud?
  - ¿Ha pasado la justicia divina?
  rationale: El texto plantea la ausencia o el tránsito fallido de la justicia en sentido ético; no hay base suficiente para restringirlo a «justicia divina» en la traducción principal. «Justicia» mantiene la amplitud del latín y del audit trail inglés.
  doctrine_reference: Uso contextual de δικαιοσύνη / iustitia como justicia ética y relacional
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección de frontera versal: el texto de 2 Esdras 5:12 comienza con la pregunta sobre iustitia / iustum faciens y no debe incluir la cláusula posterior de 5:13 sobre el trabajo y la dirección de los caminos. La redacción española se limita al contenido atestiguado para este versículo y conserva la estructura interrogativa + respuesta + cláusula temporal.'
  spanish_consistency_notes:
  - Se usa «justicia» para iustitia, conforme al criterio general del proyecto, y no «SEÑOR» ni otras sustituciones no motivadas.
  - Se mantiene «los hombres» para homines, en concordancia con el registro bíblico formal y la referencia humana general.
  - La nota [a] está anclada exactamente en «justicia», único lugar donde se introduce una alternativa lexical relevante.
