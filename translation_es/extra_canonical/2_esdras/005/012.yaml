base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/012.yaml
  text: Has righteousness passed through[a], or one who does righteousness? And it will say no. And it will be at that time that men will hope and not obtain;
  footnotes:
  - marker: a
    text: Or 'And that one will say no. And at that time men will hope and not obtain; they will labor, and their ways will not be directed.'.
    reason: previous_rendering
  revision_pass:
