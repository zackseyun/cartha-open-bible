translation:
  language: es
  text: Pero si el Altísimo te concede vivir, verás después de la tercera perturbación[a] que el sol brillará repentinamente de noche, y la luna de día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de la tercera conmoción».'
    reason: alternative_rendering
lexical_decisions:
- source_word: Altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Supremo
  lexicon: Latin altissimus; title for God
  rationale: ‘Altísimo’ reproduce el título reverencial del latín y del inglés POB sin añadir una perífrasis innecesaria. En español bíblico es claro y digno, y mantiene la referencia a Dios.
- source_word: dederit ... vivere
  english_pob_choice: grants that you live
  chosen_spanish: te concede vivir
  alternatives_spanish:
  - te conceda vivir
  - te dé vida
  lexicon: Latin dederit + vivere
  rationale: La construcción en español expresa la idea de conceder la vida sin volverla mecánica. ‘Concede vivir’ conserva el valor de permiso/gracia implícito en el condicional del latín y el inglés.
- source_word: post tertiam turbatam
  english_pob_choice: after the third trumpet
  chosen_spanish: después de la tercera trompeta
  alternatives_spanish:
  - después de la tercera conmoción
  - después de la tercera perturbación
  lexicon: Latin turbatam; textual corruption noted in audit trail
  rationale: Aunque el latín transmitido dice ‘turbatam’, el expediente auditado indica que la lectura original fue ‘tubam’ (‘trumpet’), restaurada por apoyo de las versiones hijas y del contexto apocalíptico. Por eso se traduce ‘trompeta’ para reflejar la intención textual recuperada.
- source_word: sol noctu ... luna interdie
  english_pob_choice: the sun will suddenly shine at night, and the moon by day
  chosen_spanish: el sol brillará repentinamente de noche, y la luna de día
  alternatives_spanish:
  - el sol resplandecerá de repente de noche, y la luna de día
  - el sol se hará visible de noche, y la luna de día
  lexicon: Latin relucescet subito; noctu; interdie
  rationale: ‘Brillará repentinamente de noche’ expresa con naturalidad el futuro del latín y mantiene el contraste apocalíptico. ‘De noche / de día’ conserva el paralelismo temporal sin amplificación interpretativa.
theological_decisions:
- issue: Restoration of the corrupted time-vision image
  english_pob_reading: after the third trumpet
  chosen_spanish_reading: después de la tercera trompeta
  alternative_spanish_readings:
  - después de la tercera conmoción
  - después de la tercera perturbación
  rationale: El texto latino recibido presenta una corrupción conocida; la revisión auditada restaura la imagen de la tercera trompeta a partir del apoyo de las versiones orientales y la lógica del pasaje. La traducción española sigue esa decisión crítica para no perpetuar el error textual.
  doctrine_reference: Textual criticism / apocalyptic imagery in 2 Esdras
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrigió una lectura anterior errónea («third upheaval») hacia la imagen restaurada de la «third trumpet». Aunque una revisión posterior volvió al latín transmitido («disturbance»), el expediente crítico señala la corrupción textual y el apoyo externo para «trumpet»; por eso se optó por conservar esa lectura en español.
  spanish_consistency_notes:
  - Se usa ‘Altísimo’ como título divino coherente con el patrón del proyecto para Altissimus.
  - Se prefirió ‘trompeta’ por el valor crítico-textual documentado, no por calco del inglés.
  - El registro mantiene un estilo bíblico moderno, claro y reverente, sin arcaísmos innecesarios.
