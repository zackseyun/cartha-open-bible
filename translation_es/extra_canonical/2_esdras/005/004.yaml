  glossary_alignment: 'No hay conflicto con la terminología doctrinal principal del proyecto. ''El Altísimo'' es adecuado. La cuestión clave es crítica textual/lexical: ''turbatam'' debe representarse como ''perturbación'' o ''conmoción'' en el texto principal, no ''trompeta'', porque esa restauración no es la decisión final del expediente auditado. ''Brillará repentinamente'' y ''de noche / de día'' están bien.'
