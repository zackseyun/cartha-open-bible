translation:
  language: es
  text: 'Y me dijo[a]: «No puedes». Y dije: «¿Por qué, Señor? ¿O por qué nací? ¿O por qué el vientre de mi madre no se hizo mi sepulcro, para que no viera la aflicción de Jacob y el cansancio de la descendencia de Israel?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Y él me dijo: “No puedes”» como traducción más explícita del sujeto implícito.'
    reason: alternative_translation
lexical_decisions:
- source_word: non potes
  english_pob_choice: You cannot.
  chosen_spanish: No puedes.
  alternatives_spanish:
  - No puedes hacerlo.
  - No te es posible.
  lexicon: poder
  rationale: El latín expresa una imposibilidad directa y breve; «No puedes» conserva la fuerza inmediata del rechazo sin añadir matices que el texto no exige.
- source_word: domine
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Soberano
  lexicon: dominus
  rationale: Aquí se trata de una invocación reverente y natural en español dirigido a Dios; «Señor» reproduce el vocativo sin forzar una paráfrasis.
- source_word: quare
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Para qué?
  - ¿Por qué razón?
  lexicon: quare
  rationale: La partícula introduce una queja y una pregunta causal; «¿Por qué?» es la forma más directa y fiel en español.
- source_word: matrix matris meae mihi sepulchrum
  english_pob_choice: my mother's womb ... my grave
  chosen_spanish: el vientre de mi madre ... mi sepulcro
  alternatives_spanish:
  - las entrañas de mi madre ... mi tumba
  - el seno de mi madre ... mi sepulcro
  lexicon: matrix
  rationale: «matrix» en este contexto es el vientre materno. «Vientre» mantiene el sentido corporal y literario mejor que una expresión más abstracta.
- source_word: laborem Iacob
  english_pob_choice: the trouble of Jacob
  chosen_spanish: el afán de Jacob
  alternatives_spanish:
  - la aflicción de Jacob
  - el trabajo de Jacob
  lexicon: labor
  rationale: El latín «labor» aquí designa penuria, carga o fatiga existencial. «Afán» conserva esa carga de esfuerzo doloroso sin reducirla sólo a trabajo físico.
- source_word: defatigationem generis Israhel
  english_pob_choice: the weariness of the stock of Israel
  chosen_spanish: el cansancio de la descendencia de Israel
  alternatives_spanish:
  - el agotamiento del linaje de Israel
  - la fatiga de la estirpe de Israel
  lexicon: defatigatio
  rationale: «defatigationem» apunta a desgaste/cansancio. «Descendencia» traduce bien «genus» en un registro bíblico comprensible y no reescribe la imagen con un término más técnico de genealogía.
theological_decisions:
- issue: 'Dirección de la lamentación: el hablante suplica no ver la aflicción del pueblo'
  english_pob_reading: so that I might not see the trouble of Jacob and the weariness of the stock of Israel
  chosen_spanish_reading: para que no viera el afán de Jacob y el cansancio de la descendencia de Israel
  alternative_spanish_readings:
  - para no ver el afán de Jacob y el cansancio de la descendencia de Israel
  - para no contemplar el afán de Jacob y el cansancio de la descendencia de Israel
  rationale: La cláusula final expresa propósito negativo, no simple consecuencia. «Para que no viera» mantiene el matiz desiderativo y lamentativo del original.
  doctrine_reference: Lamento profético / sufrimiento del pueblo de Israel
translation_notes:
  revision_awareness: El contexto auditado indica que la versión inglesa anterior omitía el inicio de este versículo y que la corrección exige incluir tanto la respuesta del ángel como la lamentación completa de Esdras. La redacción española refleja esa extensión completa y mantiene la nota alternativa ligada al vocativo narrativo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el texto lo exija explícitamente; aquí el vocativo es «Señor» porque el latín dice domine y la escena es una súplica directa.
  - Se evita «Cristo» porque no aparece en el pasaje.
  - Se mantiene un tono bíblico claro y sobrio, con vocabulario comprensible para lector general de iglesia.
