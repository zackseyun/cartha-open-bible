    issue: «laborem Iacob» traducido como «el afán de Jacob»
    rationale: En este contexto de lamento, labor denota sufrimiento, penuria o carga; «afán» en español suele inclinarse hacia esfuerzo, diligencia o anhelo. «La aflicción de Jacob» preserva mejor el sentido del original y armoniza con «defatigationem» como desgaste/fatiga.
  - severity: low
    issue: La nota [a] ofrece una alternativa poco útil
    rationale: '«O “Y él me dijo: ‘No puedes’”» no preserva una variante textual o semántica relevante; sólo hace explícito el sujeto. Dado que el inglés conserva esta nota por historial de redacción previa, en español conviene reformularla como alternativa de traducción completa del inciso inicial.'
