revisions:
- from: 'Y me dijo[a]: «No puedes». Y dije: «¿Por qué, Señor? ¿O por qué nací? ¿O por qué el vientre de mi madre no se hizo mi sepulcro, para que no viera el afán de Jacob y el cansancio de la descendencia de Israel?»'
  to: 'Y me dijo[a]: «No puedes». Y dije: «¿Por qué, Señor? ¿O por qué nací? ¿O por qué el vientre de mi madre no se hizo mi sepulcro, para que no viera la aflicción de Jacob y el cansancio de la descendencia de Israel?»'
  rationale: Se corrige «afán» por «aflicción» para reflejar con mayor fidelidad el valor de labor en un contexto de lamento. Se mantiene el resto de la redacción por ser fiel y natural. La nota [a] se conserva sólo como alternativa de traducción más explícita del sujeto, en lugar de presentarla como una supuesta lectura distinta.
