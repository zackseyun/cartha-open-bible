translation:
  language: es
  text: Y de la madera goteará sangre, y la piedra dará su voz, y los pueblos serán sacudidos, y los pasos serán cambiados.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: et de ligno sanguis stillabit
  english_pob_choice: And blood will drip from wood
  chosen_spanish: Y de la madera goteará sangre
  alternatives_spanish:
  - Y sangre goteará de la madera
  - Y de la madera sangrará sangre
  lexicon: lignum > madera; stillabit > goteará; sanguis > sangre
  rationale: Conservo la imagen concreta del latín con una construcción natural en español. «Goteará sangre» comunica el valor de stillabit sin endurecer el orden de palabras, y «madera» mantiene la referencia material de ligno.
- source_word: et lapis dabit vocem suam
  english_pob_choice: and the stone will give its voice
  chosen_spanish: y la piedra dará su voz
  alternatives_spanish:
  - y la piedra dará su voz
  - y la piedra alzará su voz
  - y la piedra pronunciará su voz
  lexicon: lapis > piedra; dabit vocem suam > dará su voz
  rationale: Sigo la decisión inglesa de mantener la personificación literal. «Dará su voz» conserva el giro semítico/latinizante sin reemplazarlo por una paráfrasis interpretativa como «alzará su voz».
- source_word: et populi commovebuntur
  english_pob_choice: and peoples will be shaken
  chosen_spanish: y los pueblos serán sacudidos
  alternatives_spanish:
  - y los pueblos serán conmovidos
  - y los pueblos se estremecerán
  lexicon: populi > pueblos; commovebuntur > serán sacudidos
  rationale: «Sacudidos» refleja el pasivo de commovebuntur y mantiene la fuerza física/apocalíptica del verbo mejor que una sola opción más abstracta.
- source_word: et gressus commutabuntur
  english_pob_choice: and steps will be changed
  chosen_spanish: y los pasos serán cambiados
  alternatives_spanish:
  - y los pasos serán transformados
  - y los caminos serán cambiados
  - y los pasos serán alterados
  lexicon: gressus > pasos; commutabuntur > serán cambiados
  rationale: «Pasos» sigue de cerca gressus, como movimiento/andadura, y «serán cambiados» preserva el valor pasivo de commutabuntur sin introducir un sentido más amplio que el latino no exige.
theological_decisions:
- issue: Personificación apocalíptica de la piedra que da voz
  english_pob_reading: the stone will give its voice
  chosen_spanish_reading: la piedra dará su voz
  alternative_spanish_readings:
  - la piedra hablará
  - la piedra clamará
  rationale: Mantengo la formulación literal porque el texto presenta una imagen profética extraña y deliberada. No la normalizo a «hablará» para no borrar la tensión retórica del original.
  doctrine_reference: No doctrinal clarification required; literary-apocalyptic personification.
- issue: Imagen de sangre que gotea de la madera
  english_pob_reading: blood will drip from wood
  chosen_spanish_reading: de la madera goteará sangre
  alternative_spanish_readings:
  - la madera goteará sangre
  - sangre goteará de la madera
  rationale: Conservo la imagen inusual sin interpretarla alegóricamente. El texto latino usa una construcción de presagio apocalíptico que debe permanecer extraña en español.
  doctrine_reference: No doctrinal clarification required; apocalyptic imagery.
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa que prefirió «give its voice», «will be shaken» y «steps», pero la reexpresa de manera natural en español sin perder la literalidad controlada del latín. Evita trasladar mecánicamente el calco inglés cuando el español requiere una estructura distinta, especialmente en «de la madera goteará sangre».
  spanish_consistency_notes:
  - Se mantiene «voz» para vocem suam y no «clamor», porque el audit trail inglés preservó la personificación de «voice».
  - «Pueblos» conserva el plural colectivo de populi.
  - No se introduce terminología eclesiástica ajena al pasaje; el registro es profético/apocalíptico.
  - La nota textual se ancla en «dará su voz» porque el propio audit trail inglés preserva esa alternativa de lectura/formulación.
