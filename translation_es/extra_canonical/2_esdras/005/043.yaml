translation:
  language: es
  text: 'Y yo respondí y dije[a]: «Pues, ¿no podrías hacer a todos a la vez a los que han sido hechos, y a los que son, y a los que serán, para que muestres más pronto tu juicio?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿no podrías hacer?».'
    reason: alternative_reading
lexical_decisions:
- source_word: nec enim
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: conector lógico explicativo
  rationale: El latín añade una relación explicativa con enim; «Porque» comunica esa conexión de manera natural en español y mantiene el valor causal/explanatorio que el inglés POB recuperó con «For».
- source_word: poteras facere
  english_pob_choice: could you not make
  chosen_spanish: ¿no podrías hacer
  alternatives_spanish:
  - ¿no podías hacer
  - ¿no podrías crear
  lexicon: poder + facere
  rationale: La forma verbal expresa capacidad hipotética en una pregunta retórica. «Hacer» conserva el valor amplio de facere sin sobretraducir a «crear», que sería más específico que el latín aquí.
- source_word: qui facti sunt et qui sunt et qui futuri sunt
  english_pob_choice: those who have been made, and those who are, and those who will be
  chosen_spanish: a los que han sido hechos, y a los que son, y a los que serán
  alternatives_spanish:
  - a los que fueron hechos, y a los que son, y a los que serán
  - a los hechos, los que son, y los que serán
  lexicon: participios/relativas de existencia temporal
  rationale: Se mantiene la tríada temporal del latín con un español claro y sobrio. «Han sido hechos» preserva el pasivo y la referencia a seres ya producidos sin forzar una especificación no presente en el original.
- source_word: in unum
  english_pob_choice: all at once
  chosen_spanish: de una vez
  alternatives_spanish:
  - en uno
  - al mismo tiempo
  lexicon: locución adverbial de unidad/instantaneidad
  rationale: La expresión latina significa literalmente «en uno», pero aquí el sentido es de simultaneidad o acción concentrada. «De una vez» comunica esa idea en español sin perder la fuerza temporal del pedido.
- source_word: ut celerius iudicium tuum ostendas
  english_pob_choice: so that you might show your judgment more quickly
  chosen_spanish: para que muestres más pronto tu juicio
  alternatives_spanish:
  - para que manifiestes más rápidamente tu juicio
  - para que exhibas antes tu juicio
  lexicon: finalidad + iudicium
  rationale: «Mostrar» conserva el valor de ostendere y evita una interpretación demasiado técnica. «Tu juicio» mantiene iudicium como acto/veredicto divino, y «más pronto» reproduce el comparativo de rapidez con buen español.
theological_decisions:
- issue: Naturaleza de iudicium tuum
  english_pob_reading: your judgment
  chosen_spanish_reading: tu juicio
  alternative_spanish_readings:
  - tu sentencia
  - tu veredicto
  rationale: El contexto habla de la manifestación del juicio divino; «juicio» mantiene la amplitud semántica de iudicium sin limitarlo solo a una sentencia individual.
  doctrine_reference: juicio divino / escatología
- issue: Capacidad divina en pregunta retórica
  english_pob_reading: Could you not make
  chosen_spanish_reading: ¿no podrías hacer
  alternative_spanish_readings:
  - ¿no habrías podido hacer
  - ¿no podrías haber hecho
  rationale: La formulación conserva la pregunta retórica y la posibilidad implícita, sin introducir un perfecto compuesto no exigido por el latín. Se refleja la misma tensión auditable que el inglés POB decidió no intensificar a «have made».
  doctrine_reference: omnipotencia divina
translation_notes:
  revision_awareness: La revisión más reciente favorece añadir el conector explicativo de nec enim, que aquí se refleja con «Porque». También se tuvo en cuenta que la observación sobre «Could you not make» no exigía endurecer la línea a un perfecto compuesto; por eso se mantuvo una pregunta retórica simple y cercana al latín.
  spanish_consistency_notes:
  - Se evita «SEÑOR» para YHWH porque este versículo no contiene el tetragrámaton ni un sustituto griego equivalente.
  - «Juicio» se mantiene consistente con el valor judicial-divino de iudicium.
  - La sintaxis intenta conservar la secuencia enumerativa del latín sin añadir elementos interpretativos ajenos.
