    rationale: 'El texto fuente solo conserva «quare» (‘por qué’), no una pregunta completa. La forma «“¿Por qué…?”» introduce un cierre interrogativo y una clausura de cita más completa de lo que el latín permite. En español es preferible mostrar la interrupción real: «“¿Por qué...».'
