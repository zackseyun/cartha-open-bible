translation:
  language: es
  text: 'Y dijo[a]: «Pregunta a una mujer que da a luz, y ella te dirá. Porque le dirás: “¿Por qué...»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y me respondió y dijo: “Pregunta a una mujer que da a luz, y ella te dirá...”».'
    reason: alternative_reading
lexical_decisions:
- source_word: dixit
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Y respondió
  - Y le dijo
  lexicon: Latin dixit
  rationale: El latín solo tiene un verbo de decir, sin el matiz explícito de “responder”. En español, “Y dijo” reproduce con fidelidad esa forma simple y evita añadir información ausente en el texto fuente.
- source_word: quae parit
  english_pob_choice: a woman who bears
  chosen_spanish: una mujer que da a luz
  alternatives_spanish:
  - una mujer que pare
  - una mujer parturienta
  lexicon: Latin parit
  rationale: 'La forma relativa general pide un sustantivo indefinido: “una mujer”, no “la mujer”. Para el verbo, “da a luz” es claro y natural en español contemporáneo; conserva el sentido de parir sin sonar excesivamente técnico o arcaico.'
- source_word: Dices enim ei
  english_pob_choice: For you will say to her
  chosen_spanish: Porque le dirás
  alternatives_spanish:
  - Pues le dirás
  - Ya que le dirás
  lexicon: Latin dices enim ei
  rationale: En este contexto, enim introduce la continuación de la argumentación, y “Porque” transmite bien la relación explicativa. “Le dirás” mantiene el futuro y el destinatario indirecto del latín.
- source_word: quare
  english_pob_choice: Why
  chosen_spanish: ¿Por qué…?
  alternatives_spanish:
  - ¿Por qué?
  - ¿A qué…?
  lexicon: Latin quare
  rationale: El fragmento termina en una pregunta introducida pero no completada en el versículo conservado. Los puntos suspensivos reflejan que el texto se corta en esta unidad y preservan la alineación con el fragmento latino extenso.
theological_decisions:
- issue: Fragmento incompleto y cierre de discurso
  english_pob_reading: The English audit trail keeps the final clause in verse 51 rather than shifting it to verse 52.
  chosen_spanish_reading: Conservé la cláusula final en el versículo 51 y marqué la pregunta como incompleta.
  alternative_spanish_readings:
  - Cerrar la cita con una pregunta completa
  - Mover la pregunta al versículo siguiente
  rationale: La fuente latina preservada termina con quare, de modo que la traducción española debe mostrar esa incompletitud en este versículo. Así se respeta la segmentación del testimonio fuente y la corrección auditada del inglés.
  doctrine_reference: Fidelidad textual y delimitación versicular
translation_notes:
  revision_awareness: La revisión más reciente corrigió la fórmula de habla para ajustarla al latín dixit, eliminando “answered me and said” y manteniendo solo “said”. También confirmó que la cláusula final pertenece a este versículo, por lo que la traducción española conserva la pregunta incompleta aquí.
  spanish_consistency_notes:
  - Se mantiene “Y dijo” para dixit, en coherencia con la revisión auditada.
  - Se evita “SEÑOR” u otras convenciones no presentes en el fragmento.
  - No se usa “Cristo” ni terminología teológica ajena al pasaje; la unidad es puramente narrativa.
  - La puntuación española refleja la cita abierta y el corte del fragmento, sin completar el contenido que falta en el texto fuente.
