  yaml_path: translation/extra_canonical/2_esdras/005/048.yaml
  text: And he said to me, 'So I also gave the womb of the earth to those who were sown upon it in their time.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:45Z'
    unchanged: false
    changes_summary: Adjusted 'have been sown' to the simpler past 'were sown' for more natural formal English, and revised 'each in its time' to 'in their time' to better reflect the Latin phrase and agree with 'those.'
translation:
  language: es
  text: 'Y me dijo: «Así también yo di el seno de la tierra a los que fueron sembrados en ella en su tiempo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: terrae
  english_pob_choice: the womb of the earth
  chosen_spanish: el seno de la tierra
  alternatives_spanish:
  - el vientre de la tierra
  - las entrañas de la tierra
  lexicon: terra
  rationale: El latín usa una imagen materna para la tierra; «seno» conserva bien la metáfora de acogida y gestación en un español natural y solemne. «Vientre» es posible, pero en español suena más corporal y directo; «entrañas» desplaza la imagen hacia interioridad o profundidad, perdiendo el matiz materno.
- source_word: seminati sunt
  english_pob_choice: were sown
  chosen_spanish: fueron sembrados
  alternatives_spanish:
  - fueron plantados
  - fueron sembrados sobre ella
  lexicon: semino
  rationale: «Sembrados» reproduce de manera directa la metáfora agrícola del latín y del inglés POB. «Plantados» suaviza demasiado la imagen; añadir «sobre ella» sería redundante en español y no aporta precisión necesaria.
- source_word: per tempus
  english_pob_choice: in their time
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su debido tiempo
  - en su momento
  lexicon: tempus
  rationale: La frase latina indica temporalidad asignada; «en su tiempo» sigue de cerca el valor del texto y conserva el paralelo con la revisión inglesa que ajustó hacia una formulación más simple y concordante. «A su debido tiempo» introduce una interpretación más explícita de conveniencia.
theological_decisions:
- issue: Metáfora de la tierra como matriz o seno fecundo
  english_pob_reading: the womb of the earth
  chosen_spanish_reading: el seno de la tierra
  alternative_spanish_readings:
  - el vientre de la tierra
  - la matriz de la tierra
  rationale: La imagen no se literaliza ni se espiritualiza; se mantiene como metáfora de la tierra que recibe y gesta. «Seno» permite esa fuerza figurada sin sonar excesivamente anatómico o técnico.
  doctrine_reference: Metáfora poética de la creación y providencia en el lenguaje bíblico
- issue: Valor temporal de per tempus
  english_pob_reading: in their time
  chosen_spanish_reading: en su tiempo
  alternative_spanish_readings:
  - a su tiempo
  - en el tiempo que les correspondía
  rationale: Se conserva la idea de una asignación temporal sin añadir matices doctrinales ausentes del latín. El singular posesivo español puede funcionar colectivamente para «los que fueron sembrados».
  doctrine_reference: No aplica; decisión de concordancia y temporalidad textual
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó «have been sown» a «were sown» y «each in its time» a «in their time». La redacción española sigue ese ajuste con un pretérito simple y un plural colectivo natural («fueron sembrados en su tiempo»), manteniendo la imagen del latín sin introducir un desarrollo interpretativo adicional.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o vocabulario de sustitución cultual porque el texto fuente aquí es una línea latina sin tetragrámaton ni κύριος.
  - «Seno de la tierra» mantiene coherencia con el registro elevado y la metáfora corporal del pasaje.
  - No se añaden notas de variantes textuales porque el paquete fuente no documenta una alternativa relevante para este verso.
