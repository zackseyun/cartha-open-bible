source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: et ex omnibus multiplicatis populis adquisisti tibi populum unum, et ab omnibus probatam legem donasti huic quem desiderasti populo.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/027.yaml
  text: and from all the multiplied peoples you acquired for yourself one people[a], and to this people whom you desired you gave the law approved by all.
  footnotes:
  - marker: a
    text: Or 'And now, Lord, why have you handed over the one to the many, and prepared the one root above the others, yet scattered your only one among the many?'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:39Z'
    unchanged: false
    changes_summary: Adjusted 'the peoples that have multiplied' to 'the multiplied peoples' for a more natural and direct rendering of multiplicatis populis; otherwise retained the draft.
translation:
  language: es
  text: y de todos los pueblos multiplicados adquiriste para ti un solo pueblo, y a este pueblo que deseaste le diste la ley aprobada por todos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ex omnibus multiplicatis populis
  english_pob_choice: from all the multiplied peoples
  chosen_spanish: de todos los pueblos multiplicados
  alternatives_spanish:
  - de entre todos los pueblos multiplicados
  - de todos los pueblos que se multiplicaron
  lexicon: populus / populi
  rationale: ‘multiplicatis’ califica a ‘populis’ de manera directa; ‘pueblos multiplicados’ conserva la imagen colectiva sin introducir una explicación no presente en el latín.
- source_word: adquisisti tibi
  english_pob_choice: you acquired for yourself
  chosen_spanish: adquiriste para ti
  alternatives_spanish:
  - ganaste para ti
  - te adquiriste
  lexicon: acquiro
  rationale: ‘adquiriste para ti’ mantiene el valor de posesión/intención del dativo reflexivo tibi y evita suavizar el verbo.
- source_word: populum unum
  english_pob_choice: one people
  chosen_spanish: un solo pueblo
  alternatives_spanish:
  - un pueblo
  - un pueblo único
  lexicon: populus
  rationale: ‘un solo pueblo’ comunica la unidad exclusiva que el latín enfatiza, sin sobrecargar el texto.
- source_word: ab omnibus probatam legem
  english_pob_choice: the law approved by all
  chosen_spanish: la ley aprobada por todos
  alternatives_spanish:
  - la ley reconocida por todos
  - la ley aprobada por todos
  lexicon: lex
  rationale: ‘aprobada por todos’ sigue de cerca el participio pasivo probatam y conserva la lectura recibida del texto latino.
- source_word: huic quem desiderasti populo
  english_pob_choice: to this people whom you desired
  chosen_spanish: a este pueblo que deseaste
  alternatives_spanish:
  - a este pueblo que amaste
  - a este pueblo al que deseaste
  lexicon: populus / desidero
  rationale: ‘que deseaste’ traduce desiderasti de forma directa; el español no necesita explicitar más para conservar la relación afectiva/volitiva del verbo.
theological_decisions:
- issue: Elección de un pueblo entre muchos
  english_pob_reading: you acquired for yourself one people
  chosen_spanish_reading: adquiriste para ti un solo pueblo
  alternative_spanish_readings:
  - te adquiriste un solo pueblo
  - adquiriste para ti un pueblo único
  rationale: 'La formulación mantiene la tensión de elección exclusiva: de muchos pueblos, uno es adquirido para Dios. No se suaviza a un sentido meramente administrativo.'
  doctrine_reference: elección/pueblo de Dios
translation_notes:
  revision_awareness: La revisión previa corrigió un desajuste grave con el versículo 28; esta traducción sigue estrictamente el latín provisto para 2 Esdras 5:27 y evita trasladar contenido ajeno al versículo.
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ porque el texto fuente latino aquí no contiene el Tetragrámaton ni un sustituto directo que lo exija.
  - Se conservó ‘ley’ como traducción de legem sin añadir artículos doctrinales implícitos.
  - 'El orden de la frase sigue de cerca el latín para preservar la progresión: de muchos pueblos → un pueblo → ley dada a ese pueblo.'
