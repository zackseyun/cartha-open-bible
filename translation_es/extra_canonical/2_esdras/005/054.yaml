revisions:
- from: Considera, pues, también tú, que sois más pequeños de estatura que los que fueron antes que vosotros.
  to: Considera, pues, también tú, que eres de menor estatura que los que fueron antes que ti.
  rationale: Se unifica la segunda persona en singular para corresponder con 'también tú' y mejorar la legibilidad en español neutro. Se ajusta 'más pequeños de estatura' a 'de menor estatura' por mayor naturalidad, sin alterar el sentido físico del latín. No hacen falta notas, porque no hay ambigüedad nueva ni la nota inglesa refleja una alternativa pertinente para este versículo tras la corrección de desalineación.
