translation:
  language: es
  text: Considera, pues, también tú, que eres de menor estatura que los que fueron antes que ti.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Considera ergo et tu
  english_pob_choice: Therefore consider also for yourself
  chosen_spanish: Considera, pues, también tú
  alternatives_spanish:
  - Por tanto, considera también tú
  - Así que considera también tú
  lexicon: considera / pues / también / tú
  rationale: El latín exhorta directamente con Considera ergo et tu; en español conviene mantener el imperativo y el refuerzo de inclusión personal. 'Pues' conserva el valor inferencial de ergo sin sobrecargar la frase.
- source_word: minores statu
  english_pob_choice: smaller in stature
  chosen_spanish: más pequeños de estatura
  alternatives_spanish:
  - de menor estatura
  - más bajos de estatura
  lexicon: pequeño / estatura
  rationale: statu apunta a talla/estatura corporal; 'más pequeños de estatura' mantiene la comparación física sin introducir una abstracción ajena al texto.
- source_word: prae his qui ante vos
  english_pob_choice: than those before you
  chosen_spanish: que los que fueron antes que vosotros
  alternatives_spanish:
  - que los de antes que vosotros
  - que vuestros antepasados
  lexicon: antes que vosotros
  rationale: La comparación latina prae his qui ante vos se refiere a los que vinieron antes. 'Los que fueron antes que vosotros' conserva la referencia temporal y el tono comparativo.
theological_decisions:
- issue: Lectura antropométrica del contraste
  english_pob_reading: smaller in stature than those before you
  chosen_spanish_reading: más pequeños de estatura que los que fueron antes que vosotros
  alternative_spanish_readings:
  - más pequeños que los que fueron antes que vosotros
  - de menor estatura que los que fueron antes que vosotros
  rationale: No se espiritualiza el contraste ni se lo convierte en inferioridad moral; el latín describe una diferencia de tamaño/estatura. La traducción conserva esa tensión literal.
  doctrine_reference: No aplica; decisión de sentido léxico, no doctrinal.
translation_notes:
  revision_awareness: 'El audit trail muestra que el inglés fue corregido por desalineación versicular: 5:54 corresponde a ''Considera ergo et tu, quoniam minores statu estis prae his qui ante vos''. La presente versión sigue ese latín y no el material desplazado del versículo anterior.'
  spanish_consistency_notes:
  - Se mantiene 'vosotros' para reflejar el plural del latín 'vos' y conservar el registro bíblico solemne.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes porque el verso no contiene nombres divinos.
  - La puntuación sigue un castellano claro y publicable, sin añadir explicaciones al cuerpo del versículo.
