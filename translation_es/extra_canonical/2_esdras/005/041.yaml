base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/005/041.yaml
  text: And I said[a], 'But behold, Lord, you preside over those who are at the end. And what will those do who were before us, or we ourselves, or those who will be after us?'
  footnotes:
  - marker: a
    text: Or 'lord, you preside over those who are at the end. But what'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:43Z'
    unchanged: false
    changes_summary: Capitalized 'Lord' for appropriate formal register in direct address; otherwise retained the draft as accurate and natural.
translation:
  language: es
  text: 'Y dije[a]: «Pero mira, Señor, tú presides sobre los que están al final. ¿Y qué harán los que fueron antes de nosotros, o nosotros mismos, o los que vendrán después de nosotros?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Señor, tú presides sobre los que están al final. ¿Y qué harán los que fueron antes de nosotros, o nosotros mismos, o los que vendrán después de nosotros?».'
    reason: Preserva la nota del POB inglés sobre la alternativa que omite «Pero mira», ajustada al español revisado.
lexical_decisions:
- source_word: domine
  english_pob_choice: Lord / lord
  chosen_spanish: Señor
  alternatives_spanish:
  - señor
  lexicon: domine
  rationale: El vocativo latino pide un tratamiento reverente directo. En español, 'Señor' mantiene el registro formal y devocional sin perder la relación de address del texto.
- source_word: tu praees
  english_pob_choice: you preside over
  chosen_spanish: tú presides sobre
  alternatives_spanish:
  - tú estás al frente de
  - tú gobiernas sobre
  lexicon: praees
  rationale: '''Presides over'' expresa dirección/autoridad; ''presides sobre'' conserva la imagen formal y evita reducirlo a solo ''gobiernas'', que sería más interpretativo.'
- source_word: his qui in fine sunt
  english_pob_choice: those who are at the end
  chosen_spanish: los que están al final
  alternatives_spanish:
  - los que están al fin
  - los que están al término
  lexicon: qui in fine sunt
  rationale: La frase latina es temporal o escatológica; 'al final' es natural en español y mantiene la referencia a un grupo situado en el término de la secuencia.
- source_word: quid facient
  english_pob_choice: what will [they] do
  chosen_spanish: ¿qué harán?
  alternatives_spanish:
  - ¿qué harán ellos?
  - ¿qué van a hacer?
  lexicon: quid facient
  rationale: Se conserva la pregunta directa y el valor futuro del latín sin añadir explicaciones. El sujeto queda implícito como en el original.
- source_word: qui ante nos sunt / qui post nos
  english_pob_choice: those who were before us / those who will be after us
  chosen_spanish: los que estaban antes de nosotros / los que vendrán después de nosotros
  alternatives_spanish:
  - los que fueron antes de nosotros / los que serán después de nosotros
  lexicon: qui ante nos sunt / qui post nos
  rationale: En español, 'estaban antes' y 'vendrán después' comunican con claridad la anterioridad y posteridad en relación con 'nosotros'. Se evita forzar un tiempo verbal idéntico al latín si suena menos natural.
theological_decisions:
- issue: Tratamiento reverente de 'domine' sin oscurecer si es un vocativo humano o divino en el contexto inmediato
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - señor
  rationale: La POB inglesa capitaliza 'Lord' por registro formal. En español, la mayúscula en 'Señor' transmite la misma reverencia sin imponer una decisión adicional sobre la identidad del interlocutor más allá del vocativo del texto.
  doctrine_reference: Tratamiento honorífico del vocativo; no se añade identificación doctrinal no explicitada por el contexto inmediato.
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa que cambió la secuencia a 'And what' por fidelidad al latín 'et quid facient'; por eso el español usa '¿Y qué harán?' y no introduce un segundo contraste adversativo. También se respetó el vocativo 'Señor' con mayúscula, coherente con el registro formal de la POB revisada.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para el vocativo directo, en armonía con el tratamiento reverente del auditrastro inglés.
  - '''Los que están al final'' conserva la referencia temporal/escatológica sin añadir lectura interpretativa.'
  - La pregunta inicia con '¿Y qué harán?' para reflejar el latín 'et quid facient' y la revisión inglesa que corrigió 'But what' a 'And what'.
