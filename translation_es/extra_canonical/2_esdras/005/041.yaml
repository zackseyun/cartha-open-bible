revisions:
- from: 'Y dije[a]: «Pero mira, Señor, tú presides sobre los que están al final. ¿Y qué harán los que estaban antes de nosotros, o nosotros mismos, o los que vendrán después de nosotros?»'
  to: 'Y dije[a]: «Pero mira, Señor, tú presides sobre los que están al final. ¿Y qué harán los que fueron antes de nosotros, o nosotros mismos, o los que vendrán después de nosotros?»'
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad y precisión de «qui ante nos sunt»: «los que fueron antes de nosotros» funciona mejor que «los que estaban antes de nosotros» en español general y en registro bíblico legible. Se mantuvo el resto porque refleja fielmente el latín y el audit trail inglés, incluyendo «¿Y qué harán...?» con conjunción copulativa.'
  reviewer_model: gpt-5.4
