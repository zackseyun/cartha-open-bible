    reason: Preserva la nota del POB inglés sobre la alternativa que omite «Pero mira», ajustada al español revisado.
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad y precisión de «qui ante nos sunt»: «los que fueron antes de nosotros» funciona mejor que «los que estaban antes de nosotros» en español general y en registro bíblico legible. Se mantuvo el resto porque refleja fielmente el latín y el audit trail inglés, incluyendo «¿Y qué harán...?» con conjunción copulativa.'
