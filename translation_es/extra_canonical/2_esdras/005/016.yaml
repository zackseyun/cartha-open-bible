translation:
  language: es
  text: 'Y sucedió en la segunda noche que Phaltiel, jefe del pueblo, vino a mí y me dijo: «¿Dónde estabas, y por qué está triste tu rostro?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et factum est
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y ocurrió
  lexicon: —
  rationale: La construcción latina formula una transición narrativa estándar; «Y sucedió» reproduce bien el carácter introductorio sin sonar mecánico en español.
- source_word: in nocte secunda
  english_pob_choice: on the second night
  chosen_spanish: en la segunda noche
  alternatives_spanish:
  - la segunda noche
  - durante la segunda noche
  lexicon: —
  rationale: «En la segunda noche» mantiene el valor temporal directo del original y concuerda con el tono narrativo de la sección.
- source_word: Phalthiel dux populi
  english_pob_choice: Phaltiel, leader of the people
  chosen_spanish: Phaltiel, jefe del pueblo
  alternatives_spanish:
  - Phaltiel, líder del pueblo
  - Phaltiel, caudillo del pueblo
  lexicon: —
  rationale: «dux» puede ser «líder» o «jefe»; aquí «jefe del pueblo» conserva una designación funcional y sobria, compatible con el registro bíblico.
- source_word: vultus tuus tristis
  english_pob_choice: your face sad
  chosen_spanish: está triste tu rostro
  alternatives_spanish:
  - tu rostro está triste
  - tu semblante está triste
  - está triste tu semblante
  lexicon: —
  rationale: La frase latina usa «vultus» como rostro/semblante. Se eligió «rostro» por claridad y fidelidad; el orden invertido conserva algo del énfasis interrogativo del original.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hubo cambios necesarios y el control cruzado reportó alto acuerdo; por eso se mantiene una traducción directa, sin notas textuales adicionales.
  spanish_consistency_notes:
  - Se conserva el nombre propio Phaltiel tal como aparece en el testimonio latino y en la POB inglesa.
  - No se introduce puntuación doctrinal ni expansión interpretativa; la línea es un simple pasaje narrativo con interrogación directa.
