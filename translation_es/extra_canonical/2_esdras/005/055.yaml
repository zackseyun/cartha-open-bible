  to: 'Por tanto, considere también esto usted: es de menor estatura que los que vinieron antes de usted, y los que vendrán después de usted serán de menor estatura que usted, como de una creación que ya envejece y va dejando atrás la fuerza de la juventud.'
  rationale: Se ajusta la exhortación inicial a un español más natural y se corrige la imagen final para reflejar con más fidelidad que la creación envejecida ha ido dejando atrás la fuerza de la juventud, no que se queda rezagada respecto de ella. También se hace explícito el paralelo completo «serán de menor estatura que usted» para mantener la simetría comparativa.
