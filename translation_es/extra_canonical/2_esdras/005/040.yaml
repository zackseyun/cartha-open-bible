translation:
  language: es
  text: 'Y él me dijo: «Así como no puedes hacer una de estas cosas de las que se han dicho, tampoco podrás descubrir el juicio».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: dixit ad me
  english_pob_choice: And he said to me
  chosen_spanish: Y él me dijo
  alternatives_spanish:
  - Y me dijo
  - 'Y respondió: «...»."'
  lexicon: dico > decir
  rationale: Se mantiene la simpleza narrativa del latín sin añadir matices inexistentes; «él» explicita el sujeto para fluidez en español, ya que el contexto inmediato no lo repite en la cláusula citada.
- source_word: quomodo non potes facere unum de his quae dicta sunt
  english_pob_choice: Just as you cannot do one of these things that have been spoken
  chosen_spanish: Así como no puedes hacer una de esas cosas que han sido dichas
  alternatives_spanish:
  - Así como no puedes hacer una de estas cosas que han sido dichas
  - De la misma manera que no puedes hacer una de esas cosas que se han dicho
  lexicon: quomodo... sic > así como... tampoco; facere > hacer; dicta sunt > han sido dichas
  rationale: Se conserva la comparación correlativa del latín. «Han sido dichas» refleja el pasivo perfecto y evita introducir contenido interpretativo adicional. «Esas» conserva la referencia a las cosas ya mencionadas en el contexto.
- source_word: sic non poteris inuenire iudicium
  english_pob_choice: so you cannot find out the judgment
  chosen_spanish: tampoco podrás descubrir el juicio
  alternatives_spanish:
  - así tampoco podrás hallar el juicio
  - tampoco podrás encontrar el juicio
  lexicon: invenire > descubrir/hallar/encontrar; iudicium > juicio
  rationale: «Descubrir» expresa bien la idea de llegar a conocer algo oculto o inalcanzable, como en el sentido de la imposibilidad epistémica del contexto. Se evita suavizar iudicium a simple «decisión» porque el latín conserva el peso de juicio/veredicto.
theological_decisions:
- issue: alcance de iudicium
  english_pob_reading: the judgment
  chosen_spanish_reading: el juicio
  alternative_spanish_readings:
  - la sentencia
  - el veredicto
  rationale: El latín iudicium puede abarcar juicio, sentencia o veredicto. Se elige «juicio» por ser más amplio y más fiel al término base, sin cerrar el sentido a una sola formulación legal.
  doctrine_reference: no doctrinal claim; lexical/theological ambiguity preserved
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó material no presente en el latín y dejó el final en una simple referencia al 'judgment'; por eso el español sigue el latín limpio sin añadir cláusulas sobre 'el fin del amor' ni formas posesivas.
  spanish_consistency_notes:
  - Se mantiene «juicio» para iudicium en lugar de alternativas más restrictivas.
  - No se introducen elementos ausentes en el latín limpio.
  - El registro es sobrio y bíblico sin depender de calcos arcaizantes.
