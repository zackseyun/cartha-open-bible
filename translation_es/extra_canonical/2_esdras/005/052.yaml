translation:
  language: es
  text: 'Porque le dirás: «¿Por qué los que ahora has dado a luz no son como los que vinieron antes, sino de menor estatura?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: quos peperisti
  english_pob_choice: those whom you have now borne
  chosen_spanish: los que ahora has dado a luz
  alternatives_spanish:
  - los que ahora has parido
  - los hijos que ahora has dado a luz
  lexicon: peperisti → dar a luz / parir
  rationale: El latín usa el verbo de parto con sentido directo de maternidad; en español, «dar a luz» comunica bien el hecho sin cargar innecesariamente el registro. «Parir» es más literal pero más áspero; «hijos» explicita más de lo que el latín exige.
- source_word: non sunt similes his qui ante
  english_pob_choice: are not like those who came before
  chosen_spanish: no son como los que vinieron antes
  alternatives_spanish:
  - no se parecen a los de antes
  - no son semejantes a los que estuvieron antes
  lexicon: similis → como / semejante
  rationale: «Como» conserva la comparación simple y natural. «Semejantes» sería más formal, pero menos fluido en esta pregunta retórica. «Los que vinieron antes» sigue de cerca el referente temporal del latín y del inglés POB.
- source_word: sed minores statu
  english_pob_choice: but smaller in stature
  chosen_spanish: sino de menor estatura
  alternatives_spanish:
  - sino más pequeños de estatura
  - sino de menor tamaño
  lexicon: minor / status → menor estatura
  rationale: El latín contrasta por tamaño/estatura, no por valor. «De menor estatura» reproduce la medida física con un sustantivo claro en español. «Menor tamaño» amplía demasiado el campo semántico; «más pequeños» es correcto pero menos preciso.
theological_decisions:
- issue: Lectura del sujeto implícito y del discurso directo
  english_pob_reading: For you will say to her, ...
  chosen_spanish_reading: 'Porque dirás a ella: ...'
  alternative_spanish_readings:
  - 'Pues le dirás: ...'
  - 'Y le dirás: ...'
  rationale: Se conserva la advertencia dirigida al interlocutor femenino implícito en el latín y en el inglés POB. «A ella» mantiene el dativo explícito del texto fuente, aunque en español puede sonar ligeramente marcado; aquí es preferible por fidelidad auditiva al original.
  doctrine_reference: Ninguna; decisión sintáctica y de deíxis textual.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que el acuerdo con el control cruzado fue alto (1.0). Por eso no se introducen notas textuales ni alternativas doctrinales adicionales; la redacción sigue de cerca el latín limpiado y coincide sustancialmente con el inglés POB.
  spanish_consistency_notes:
  - Se mantiene el tono de pregunta retórica y el contraste físico del verso.
  - Se usa un registro bíblico moderno y claro, evitando calcos innecesarios.
  - No se añade léxico teológico ajeno al pasaje; el foco permanece en comparación de estatura.
  - La fórmula «dar a luz» equilibra fidelidad y legibilidad en español neutro.
