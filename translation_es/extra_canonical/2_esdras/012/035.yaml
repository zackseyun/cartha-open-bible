  philosophy: optimal-equivalence
lexical_decisions:
- source_word: quod
  english_pob_choice: What
  chosen_spanish: Lo que
  alternatives_spanish:
  - Aquello que
  - Lo cual
  lexicon: quod
  rationale: El latín introduce el elemento visto con valor relativo/neutro; en español, «Lo que» transmite de forma natural y fiel ese antecedente sin añadir «sueño», que la revisión inglesa eliminó por no estar en el texto base.
- source_word: uidisti
  english_pob_choice: you saw
  chosen_spanish: viste
  alternatives_spanish:
  - has visto
  - veías
  lexicon: uidisti
  rationale: El perfecto latino se rinde con pasado simple en español para una referencia puntual y directa a la visión ya ocurrida.
- source_word: haec interpretatio eius
  english_pob_choice: this is its interpretation
  chosen_spanish: esta es su interpretación
  alternatives_spanish:
  - ésta es su interpretación
  - esta es la interpretación de eso
  lexicon: haec interpretatio eius
  rationale: «Interpretación» reproduce interpretatio con el valor explicativo del contexto; «su» conserva la referencia al objeto visto sin sobredeterminarlo.
theological_decisions:
- issue: Ausencia de «sueño» en la fórmula introductoria
  english_pob_reading: 'What you saw, and this is its interpretation:'
  chosen_spanish_reading: 'Lo que viste, y esta es su interpretación:'
  alternative_spanish_readings:
  - 'El sueño que viste, y esta es su interpretación:'
  - 'Lo que soñaste, y esta es su interpretación:'
  rationale: La revisión inglesa ya señaló que el latín no dice «dream»; por fidelidad al fuente, el español no lo añade.
  doctrine_reference: Fidelidad textual al testimonio base; no hay decisión doctrinal específica.
translation_notes:
  revision_awareness: La versión inglesa pasó de «This is the dream that you saw» a «What you saw» para ajustarse más estrechamente al latín quod uidisti. El español sigue esa revisión y evita introducir contenido no presente en el original.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, pero sin calco arcaizante innecesario.
  - Se usa puntuación introductoria con dos puntos finales para preparar la interpretación, en línea con la función del enunciado en el contexto inmediato.
