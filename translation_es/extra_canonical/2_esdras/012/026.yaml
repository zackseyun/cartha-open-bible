translation:
  language: es
  text: y los que completarán sus actos finales. Y porque viste desaparecer la cabeza más grande[a], significa que uno de ellos morirá en su lecho, y aun con tormentos. Porque los dos que sobrevivieron,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y completar sus últimos actos».
    reason: Alternativa más cercana al previous_rendering inglés «and complete its last acts» y al latín nouissima eius.
lexical_decisions:
- source_word: perficient nouissima eius
  english_pob_choice: and complete its final acts
  chosen_spanish: completarán sus actos finales
  alternatives_spanish:
  - cumplirán sus últimas cosas
  - llevarán a cabo sus últimas acciones
  lexicon: perficio; novissimus
  rationale: El latín expresa la culminación de lo último/perteneciente al final de ‘eso’; ‘actos finales’ conserva el sentido de завершación sin forzar una lectura más interpretativa que el original.
- source_word: caput maius non apparescens
  english_pob_choice: the larger head disappearing
  chosen_spanish: la cabeza más grande desaparecía
  alternatives_spanish:
  - la cabeza mayor se desvanecía
  - la cabeza más grande no aparecía
  lexicon: caput; maior; apparescens
  rationale: ‘Non apparescens’ sugiere la no-aparición o desaparición de la cabeza mayor. ‘Desaparecía’ recoge bien esa imagen en español y mantiene el carácter visionario.
- source_word: unus ex eis super lectum suum morietur, et tamen cum tormentis
  english_pob_choice: one of them will die on his bed, yet with torments
  chosen_spanish: uno de ellos morirá en su lecho, pero con tormentos
  alternatives_spanish:
  - uno de ellos morirá en su cama, aunque con tormentos
  - uno de ellos morirá sobre su lecho, y sin embargo con tormentos
  lexicon: unus ex eis; lectus; morietur; tormenta
  rationale: ‘En su lecho’ mantiene la imagen literal del latín y el registro bíblico natural en español. ‘Pero con tormentos’ conserva la tensión entre muerte aparentemente ordinaria y sufrimiento final.
- source_word: duo qui superauerunt
  english_pob_choice: For the two who survived
  chosen_spanish: Porque los dos que sobrevivieron,
  alternatives_spanish:
  - Pues los dos que quedaron con vida,
  - Porque los dos que sobrevivieron,
  lexicon: duo; superare
  rationale: ‘Que sobrevivieron’ es la correspondencia más directa y clara para ‘superauerunt’. Se conserva la frase incompleta porque el texto latino de esta unidad también continúa hacia la siguiente cláusula.
theological_decisions:
- issue: Imagen visionaria de la cabeza mayor desapareciendo
  english_pob_reading: the larger head disappearing
  chosen_spanish_reading: la cabeza más grande desaparecía
  alternative_spanish_readings:
  - la cabeza mayor se desvanecía
  - la cabeza más grande no aparecía
  rationale: No se espiritualiza ni se explica la imagen; se mantiene como símbolo visionario con ambigüedad textual respetada. La traducción evita convertirla en una interpretación doctrinal no explicitada en el pasaje.
  doctrine_reference: Apocalíptica/visión simbólica; principio de no añadir interpretación más allá del texto.
- issue: Muerte en el lecho con tormentos
  english_pob_reading: one of them will die on his bed, yet with torments
  chosen_spanish_reading: uno de ellos morirá en su lecho, pero con tormentos
  alternative_spanish_readings:
  - uno de ellos morirá en su cama, aunque con tormentos
  - uno de ellos morirá sobre su lecho, y sin embargo con tormentos
  rationale: Se preserva la tensión teológica entre una muerte aparentemente doméstica o natural y la afirmación explícita de tormento final. No se suaviza ni se moraliza la dureza del texto.
  doctrine_reference: Juicio y retribución en literatura apocalíptica; fidelidad al sufrimiento descrito.
translation_notes:
  revision_awareness: La revisión inglesa reciente corrige una omisión importante y amplía la cláusula para incluir la secuencia completa del latín asignado a esta unidad. La versión española sigue esa expansión y conserva el paralelismo de las cláusulas, sin truncar el texto en ‘actos finales’.
  spanish_consistency_notes:
  - Se usa ‘lecho’ para mantener el registro bíblico y la imagen literal del latín.
  - Se mantiene ‘tormentos’ para conservar la dureza del término latino y la tensión del pasaje.
  - La frase final queda abierta con coma porque el latín continúa en la unidad siguiente, según el paquete fuente proporcionado.
