translation:
  language: es
  text: 'las dos pequeñas alas que pasan sobre la cabeza que está a la derecha—esta es la interpretación: estos son los que el Altísimo ha preservado en'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: duas subalares
  english_pob_choice: the two little wings
  chosen_spanish: las dos pequeñas alas
  alternatives_spanish:
  - las dos alitas
  - las dos pequeñas alas laterales
  lexicon: subalaris
  rationale: subalares designa alas pequeñas o secundarias; «pequeñas alas» conserva el valor diminutivo sin introducir un tecnicismo ajeno al español bíblico.
- source_word: treicentes super caput
  english_pob_choice: crossing over to the head
  chosen_spanish: que cruzan sobre la cabeza
  alternatives_spanish:
  - que pasan sobre la cabeza
  - cruzando sobre la cabeza
  lexicon: transire/super
  rationale: La imagen es de cruce o paso sobre la cabeza; «cruzan sobre» sigue de cerca el movimiento descrito y suena natural en español.
- source_word: quod est a dextera parte
  english_pob_choice: that is on the right side
  chosen_spanish: que está a la derecha
  alternatives_spanish:
  - que está del lado derecho
  - que está en el lado derecho
  lexicon: dextera pars
  rationale: «A la derecha» expresa la localización lateral sin sobrecargar la frase; mantiene la referencia espacial del original.
- source_word: Haec est interpretatio
  english_pob_choice: this is the interpretation
  chosen_spanish: esta es la interpretación
  alternatives_spanish:
  - esta es la explicación
  - ésta es la interpretación
  lexicon: interpretatio
  rationale: «Interpretación» reproduce el lenguaje hermenéutico del texto latino y del registro del POB.
- source_word: hii sunt quos conseruauit altissimus in
  english_pob_choice: these are the ones whom the Most High has preserved in
  chosen_spanish: estos son los que el Altísimo ha preservado en
  alternatives_spanish:
  - estos son a quienes el Altísimo ha preservado en
  - estos son los que el Altísimo guardó en
  lexicon: conservare
  rationale: «Preservado» mantiene el valor de conservación/guardar con un matiz más formal que «guardado», y sigue el inglés POB. Se conserva la preposición final «en» porque el testimonio latino queda fragmentario.
theological_decisions:
- issue: 'Título divino: Altissimus'
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Dios Altísimo
  - el Altísimo Dios
  rationale: El latino usa un título divino reverencial; «el Altísimo» es la forma natural y fiel en español bíblico, sin introducir reemplazos de nombre divino no presentes aquí.
  doctrine_reference: Daniel 4; Lucas 1:32, 35; uso bíblico del título del Altísimo
translation_notes:
  revision_awareness: 'Se corrigió el desajuste previo de versículo: el texto latino de 2 Esdras 12:29 describe las dos pequeñas alas sobre la cabeza a la derecha y no la frase sobre caer por la espada. Por eso el español sigue la escena de las alas y deja el final abierto, reflejando el fragmento latino incompleto (''in'').'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el texto no contiene el tetragrámaton ni κύριος; corresponde mantener «Altísimo».
  - Se mantuvo un registro bíblico claro y sobrio, sin añadir explicaciones ajenas al fragmento.
  - No se añadieron notas al pie porque no había marcadores anclados necesarios en el texto español.
