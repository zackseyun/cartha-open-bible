translation:
  language: es
  text: Pero tú, quédate todavía aquí siete días más, para que se te muestre todo lo que al Altísimo le haya parecido bien.” Y se fue de mi lado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Tu autem adhuc sustine hic alios dies septem
  english_pob_choice: remain here still for seven more days
  chosen_spanish: quédate todavía aquí por siete días más
  alternatives_spanish:
  - permanece todavía aquí por siete días más
  - quédate aquí aún siete días más
  lexicon: sustine -> quedar(se) / permanecer
  rationale: El latín exhorta a mantenerse en el lugar por un plazo adicional; «quédate» suena natural en español y conserva la idea de permanencia temporal. «Todavía» y «por siete días más» reflejan el valor de adhuc + alios dies septem sin forzar un calco.
- source_word: ut tibi ostendatur
  english_pob_choice: so that ... may be shown to you
  chosen_spanish: para que te sea mostrado
  alternatives_spanish:
  - para que se te muestre
  - a fin de que te sea revelado
  lexicon: ostendere -> mostrar / revelar
  rationale: «Mostrar» sigue de cerca el verbo latino y evita introducir de manera innecesaria el matiz interpretativo de «revelar». La pasiva refleja «te sea mostrado» conserva la pasividad del original.
- source_word: quicquid uisum fuerit altissimo
  english_pob_choice: whatever it may please the Most High to show you
  chosen_spanish: todo lo que haya querido mostrarte el Altísimo
  alternatives_spanish:
  - lo que el Altísimo haya decidido mostrarte
  - cuanto al Altísimo le haya parecido bien mostrarte
  lexicon: uisum fuerit -> parecer bien / querer; altissimo -> Altísimo
  rationale: La construcción latina expresa lo que le ha parecido bien o ha querido al Altísimo. «Haya querido mostrarte» preserva esa libertad soberana sin añadir contenido ajeno; «Altísimo» traduce altissimo con el título reverente más natural en español.
- source_word: Et discessit a me
  english_pob_choice: And he departed from me
  chosen_spanish: Y se apartó de mí
  alternatives_spanish:
  - Y se fue de mí
  - Y se retiró de mí
  lexicon: discedere -> apartarse / retirarse
  rationale: «Se apartó de mí» reproduce el movimiento de separación de manera sobria y idiomática. Es fiel al sentido sin cargarlo con matices que el latín no exige.
theological_decisions:
- issue: Título divino "Altísimo" para altissimo
  english_pob_reading: Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Más Alto
  - el Altísimo Dios
  rationale: El latín usa un superlativo sustantivado como título reverente; «el Altísimo» es la forma española más estable y digna. Mantiene el valor teológico de soberanía divina que la POB inglesa expresa con «Most High».
  doctrine_reference: Dn 4:17; Lc 1:32, 35
translation_notes:
  revision_awareness: La versión inglesa POB final no requirió cambios y el control cruzado informó alta concordancia; por eso la redacción española sigue de cerca el latín limpio y la opción inglesa ya estabilizada, sin añadir notas textuales.
  spanish_consistency_notes:
  - Se mantiene la distinción entre el mandato temporal («quédate») y la finalidad pasiva («te sea mostrado»).
  - Se usa «Altísimo» como título divino consistente con el registro bíblico en español.
  - No se introduce puntuación explicativa adicional que altere el flujo narrativo breve del versículo.
