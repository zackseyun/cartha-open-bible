revisions:
- from: Pero tú, quédate todavía aquí por siete días más, para que te sea mostrado todo lo que haya querido mostrarte el Altísimo.” Y se apartó de mí.
  to: Pero tú, quédate todavía aquí siete días más, para que se te muestre todo lo que al Altísimo le haya parecido bien.” Y se fue de mi lado.
  rationale: Se ajusta quicquid uisum fuerit altissimo a su sentido más directo («lo que al Altísimo le haya parecido bien») y se evita repetir «mostrar» en dos lugares distintos. También se mejora la naturalidad narrativa de discessit a me con «se fue de mi lado». No hacen falta notas.
