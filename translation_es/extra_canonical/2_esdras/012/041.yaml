lexical_decisions:
- source_word: Quid peccauimus tibi
  english_pob_choice: How have we sinned against you
  chosen_spanish: ¿Cómo hemos pecado contra ti?
  alternatives_spanish:
  - ¿Qué pecado hemos cometido contra ti?
  - ¿En qué hemos pecado contra ti?
  lexicon: pecco / pecar
  rationale: El latín expresa una acusación directa de pecado contra la persona ofendida; en español, «¿Cómo hemos pecado contra ti?» mantiene la fuerza idiomática adoptada por la POB inglesa y suena natural sin suavizar la responsabilidad.
- source_word: quid iniuste egimus in te
  english_pob_choice: what wrong have we done to you
  chosen_spanish: ¿qué mal hemos hecho en ti?
  alternatives_spanish:
  - ¿qué injusticia hemos hecho contra ti?
  - ¿qué hemos obrado injustamente en ti?
  lexicon: iniuste ago
  rationale: La POB inglesa eligió «wrong» para conservar el sentido de daño/injusticia sin volverlo demasiado técnico; «mal hemos hecho» preserva esa amplitud semántica en español y evita forzar un legalismo que el latín no exige aquí.
- source_word: derelinquens dereliquisti nos
  english_pob_choice: you have utterly forsaken us
  chosen_spanish: nos has abandonado del todo
  alternatives_spanish:
  - nos has dejado completamente
  - nos has desamparado por completo
  lexicon: derelinquo
  rationale: La duplicación latina intensifica el abandono; «abandonado del todo» reproduce esa intensificación de manera clara y sobria, sin introducir un matiz doctrinal no presente en el texto.
theological_decisions:
- issue: Intensidad del abandono expresada por la duplicación verbal latina
  english_pob_reading: you have utterly forsaken us
  chosen_spanish_reading: nos has abandonado del todo
  alternative_spanish_readings:
  - nos has dejado completamente
  - nos has desamparado por completo
  rationale: La forma repetida del latín refuerza el carácter total del abandono. La traducción conserva esa fuerza con una intensificación adverbial natural en español.
  doctrine_reference: Énfasis retórico del texto; no implica por sí solo una afirmación doctrinal adicional sobre la permanencia o no del abandono.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «How have we sinned» por naturalidad, pero aquí se mantuvo una solución española equivalente y literal-idiomática. El anclaje de nota se incorporó en el lugar correcto del discurso directo.
  spanish_consistency_notes:
  - Se mantuvo «pecado» para peccauimus, en coherencia con el vocabulario bíblico estándar y la lectura de la POB.
  - Se evitó «SEÑOR» o terminología cultual no presente; el pasaje solo contiene segunda persona directa y lenguaje de queja.
  - La frase queda abierta al final porque el tramo latino y el recorte fuente continúan con «et», por lo que la traducción refleja el corte documental.
