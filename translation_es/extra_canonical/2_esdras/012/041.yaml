review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el latín en la primera pregunta y en la intensificación de derelinquens dereliquisti nos. Sin embargo, «¿qué mal hemos hecho en ti?» no preserva fielmente el sentido de quid iniuste egimus in te, que en contexto significa «qué mal/injusticia te hemos hecho» o «contra ti», no «en ti», que suena impropio en español y oscurece la relación de agravio personal del latín.
  spanish_quality_summary: El español es mayormente claro, pero «hemos hecho en ti» resulta poco natural y confuso para lectura eclesial general. También conviene mantener la nota alternativa ajustada a la formulación inglesa auditada, sin introducir un giro demasiado interpretativo. El resto del segmento funciona bien y conserva el tono.
  glossary_alignment: 'No hay términos del glosario principal especialmente implicados aquí. «pecado» y «abandonado del todo» son adecuados. La corrección necesaria es preposicional/idiomática: para iniuste egimus in te debe usarse «contra ti» o «te hemos hecho» en español natural.'
  issues:
  - severity: medium
    issue: Uso de «en ti» en «qué mal hemos hecho en ti»
    rationale: El latín iniuste egimus in te expresa agravio cometido contra la persona, y el español «hacer en ti» no es idiomático aquí; puede sonar anatómico o ambiguo, no relacional.
  - severity: low
    issue: La nota alternativa puede alinearse mejor con la auditoría inglesa
    rationale: La POB inglesa conserva la alternativa literal «What have we sinned against you». En español conviene reflejar esa posibilidad como «¿En qué hemos pecado contra ti?» más que como «¿Qué pecado hemos cometido contra ti?», aunque esta última no es errónea.
  revised_spanish_text: 'me. Y me dijeron[a]: «¿Cómo hemos pecado contra ti, y qué mal te hemos hecho, que nos has abandonado del todo y'
  revised_footnotes:
  - marker: a
    text: 'O: «¿En qué hemos pecado contra ti?»'
    reason: alternative_reading
  revision_rationale: Se corrige «en ti» a «te hemos hecho» para expresar de manera natural y fiel el agravio personal indicado por el latín. Se ajusta la nota para reflejar mejor la alternativa más literal preservada en la auditoría inglesa. No se requieren cambios doctrinales ni estructurales adicionales.
