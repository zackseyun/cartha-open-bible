translation:
  language: es
  text: él librará a mi pueblo con misericordia[a], a los que han sido preservados dentro de mis fronteras, y los hará regocijarse hasta que venga el fin, el día del juicio, del cual te hablé desde el principio. Este es el sueño,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y cuando los haya reprendido, entonces los destruirá. Pero librará al remanente de mi pueblo con misericordia, a los que han sido preservados dentro de mis fronteras, y los hará regocijarse hasta que venga el fin, el día del juicio, del cual te hablé desde el principio».

      '
    reason: previous_rendering
lexical_decisions:
- source_word: populum meum
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  lexicon: pueblo
  rationale: «Populum meum» designa al pueblo perteneciente a Dios; en español, «mi pueblo» conserva la relación de posesión y el valor colectivo sin introducir una nota de tono étnico o sociológico que «gente» podría sugerir.
- source_word: liberabit
  english_pob_choice: he will deliver
  chosen_spanish: él librará
  alternatives_spanish:
  - él liberará
  - él rescatará
  lexicon: librar
  rationale: El latín «liberabit» permite la idea de liberar/deliver/rescue. «Librará» conserva bien la fuerza de liberación eficaz y suena natural en español bíblico sin desplazar el sentido hacia una simple emancipación abstracta.
- source_word: cum misericordia
  english_pob_choice: with mercy
  chosen_spanish: con misericordia
  alternatives_spanish:
  - por misericordia
  - con compasión
  lexicon: misericordia
  rationale: La preposición y el sustantivo se traducen de manera directa y transparente; «misericordia» mantiene la nota de favor compasivo sin suavizarla a un término más genérico.
- source_word: qui saluati sunt super fines meos
  english_pob_choice: those who have been preserved within my borders
  chosen_spanish: a los que han sido preservados dentro de mis fronteras
  alternatives_spanish:
  - a los que han sido salvados dentro de mis límites
  - a los que han sido conservados en mis confines
  lexicon: salvatus / fines
  rationale: «Saluati sunt» aquí se entiende como preservados/salvados, y la POB inglesa optó por «preserved» para reflejar la conservación de un remanente. «Preservados» mantiene esa idea y evita imponer un matiz soteriológico que el contexto inmediato no exige. «Fines meos» se rinde como «mis fronteras», una forma natural en español para expresar límites territoriales o jurisdiccionales.
- source_word: iocundabit eos
  english_pob_choice: he will make them rejoice
  chosen_spanish: los hará regocijarse
  alternatives_spanish:
  - los alegrará
  - hará que se regocijen
  lexicon: iocundare
  rationale: «Iocundabit» expresa causar gozo. «Los hará regocijarse» conserva la causalidad y el registro elevado, aproximándose al giro verbal de la fuente y del inglés POB sin perder claridad en español.
- source_word: quoadusque ueniat finis
  english_pob_choice: until the end comes
  chosen_spanish: hasta que venga el fin
  alternatives_spanish:
  - hasta que llegue el fin
  - hasta que el fin venga
  lexicon: finis
  rationale: La construcción temporal se vierte de manera idiomática en español con «hasta que venga el fin», que preserva la secuencia y el carácter escatológico del latín.
- source_word: dies iudicii
  english_pob_choice: the day of judgment
  chosen_spanish: el día del juicio
  alternatives_spanish:
  - el día del juicio final
  - el día del juzgamiento
  lexicon: iudicium
  rationale: «Día del juicio» es la expresión más natural y fiel al latín, sin añadir «final» que no aparece en la fuente.
- source_word: de quo locutus sum tibi ab initio
  english_pob_choice: of which I spoke to you from the beginning
  chosen_spanish: del cual te hablé desde el principio
  alternatives_spanish:
  - de lo cual te hablé desde el principio
  - del que te hablé desde el principio
  lexicon: loqui
  rationale: La frase sigue de cerca el latín y mantiene la referencia anticipada a esta visión/escenario desde el comienzo, como en el texto inglés auditado.
- source_word: Hoc est somnium
  english_pob_choice: This is the dream
  chosen_spanish: Esto es el sueño
  alternatives_spanish:
  - Este es el sueño
  - Este era el sueño
  lexicon: somnium
  rationale: El cierre identificatorio se conserva de forma directa. «Esto es el sueño» sigue el latín y marca el fin de la unidad sin añadir interpretación.
theological_decisions:
- issue: ¿«misericordia» modifica solo el modo de la liberación o también el trato del remanente?
  english_pob_reading: he will deliver my people with mercy, those who have been preserved within my borders
  chosen_spanish_reading: él librará a mi pueblo con misericordia, a los que han sido preservados dentro de mis fronteras
  alternative_spanish_readings:
  - él librará a mi pueblo por misericordia, a los que han sido preservados dentro de mis fronteras
  - él librará a mi pueblo con compasión, a los que han sido preservados dentro de mis fronteras
  rationale: 'La secuencia latina une «cum misericordia» a la liberación, no como un segundo sujeto. La traducción mantiene la ambigüedad funcional: la liberación acontece de manera misericordiosa y el remanente es el objeto de esa acción benévola.'
  doctrine_reference: Misericordia divina y preservación del remanente (tema escatológico; cf. tradición profética de preservación de un pueblo remanente)
- issue: ¿«saluati sunt» debe sonar como salvación redentora o como preservación providencial?
  english_pob_reading: those who have been preserved within my borders
  chosen_spanish_reading: los que han sido preservados dentro de mis fronteras
  alternative_spanish_readings:
  - los que han sido salvados dentro de mis fronteras
  - los que fueron guardados dentro de mis fronteras
  rationale: 'El inglés POB ya decidió por «preserved», evitando forzar una lectura soteriológica plena. El español sigue esa decisión para respetar la tensión documental: el latín permite preservación/protección además de salvación, y el contexto inmediato favorece la idea de remanente guardado.'
  doctrine_reference: Providencia y remanente escatológico; no se explicita aquí una formulación de soteriología plena
translation_notes:
  revision_awareness: 'La revisión aplicada corrigió un desfase de versificación en el inglés POB: este versículo corresponde solo al tramo de 2 Esdras 12:34 y debe incluir la cláusula final «This is the dream». La versión española sigue estrictamente ese span, sin incorporar el contenido de 12:33.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva «misericordia» y no se sustituye por «favor» para no debilitar el valor compasivo de la acción divina.
  - «Fronteras» traduce «fines» con un matiz territorial/jurisdiccional coherente con el latín.
  - El cierre «Esto es el sueño» reproduce la clausura identificatoria del texto base y evita amalgamarla con el versículo siguiente.
