base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/012/030.yaml
  text: '“And because you saw two little wings passing over to the head on the right side, this is the interpretation: these are the ones whom the Most High has preserved for its end. This was a brief kingdom and full of turmoil,”'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:50:45Z'
    unchanged: false
    changes_summary: Changed 'its end' to 'the end' for more natural English and to avoid an awkward pronoun not clearly present in the Latin; retained the rest as accurate to the draft context.
translation:
  language: es
  text: '«Y porque viste dos pequeñas alas que pasaban sobre la cabeza del lado derecho, esta es la interpretación: estos son aquellos a quienes el Altísimo ha preservado para el fin[a]. Este fue un reino breve y lleno de turbación,»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El latín aquí es breve y no exige un posesivo explícito; por eso se traduce simplemente «para el fin», en línea con la revisión inglesa que evitó «its end».
    reason: textual_variant
lexical_decisions:
- source_word: finem suam
  english_pob_choice: for its end / for the end
  chosen_spanish: para el fin
  alternatives_spanish:
  - para su fin
  - para el fin de él
  lexicon: finis
  rationale: El latino ofrece finem con un posesivo problemático/escaso en el testimonio, y la revisión inglesa prefirió ‘the end’ para evitar un pronombre forzado. En español, ‘para el fin’ conserva la referencia temporal/teleológica sin añadir un posesivo no asegurado por el texto.
- source_word: regnum
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - monarquía
  lexicon: regnum
  rationale: ‘Reino’ es la equivalencia directa y natural en español para regnum en este contexto histórico-profético.
- source_word: exile
  english_pob_choice: brief
  chosen_spanish: breve
  alternatives_spanish:
  - pequeño
  - corto
  lexicon: exilis / exiguus (valor contextual de brevedad)
  rationale: La frase inglesa fijó ‘brief kingdom’; en español ‘breve’ transmite duración limitada sin introducir una idea distinta de tamaño o importancia.
- source_word: turbationis plenum
  english_pob_choice: full of turmoil
  chosen_spanish: lleno de turbación
  alternatives_spanish:
  - lleno de tumulto
  - lleno de perturbación
  lexicon: turbatio
  rationale: ‘Turbación’ conserva el sustantivo latino con un registro sobrio; ‘lleno de turbación’ reproduce fielmente la idea de plenitud de disturbio/alteración que la traducción inglesa captó como turmoil.
theological_decisions:
- issue: Identidad de ‘el Altísimo’ y referencia del pronombre posesivo
  english_pob_reading: whom the Most High has preserved for the end
  chosen_spanish_reading: los que el Altísimo ha preservado para el fin
  alternative_spanish_readings:
  - los que el Altísimo ha preservado para su fin
  - los que el Altísimo ha guardado para el fin
  rationale: Se mantiene ‘Altísimo’ como título divino y se evita un posesivo (‘su’) que el latino limpio no exige de forma segura, preservando la ambigüedad textual ya resuelta por la revisión inglesa hacia ‘the end’.
  doctrine_reference: Dios como preservador soberano del término de los reinos humanos; cf. Daniel 2 y 7 en la tradición apocalíptica.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió ‘its end’ por ‘the end’ para evitar un posesivo no claramente presente en el latino. La versión española sigue esa decisión, usando ‘para el fin’ sin añadir posesivo y conservando el ritmo de la frase apocalíptica.
  spanish_consistency_notes:
  - Se conserva ‘Altísimo’ para el título divino, coherente con el uso español de la POB cuando el fuente remite al Deus supremus.
  - ‘Turbación’ se mantiene para reflejar la carga de turbatio sin domesticarla a ‘problemas’ o ‘confusión’.
  - No se introduce ‘Mesías’ ni otra terminología cristológica, pues el pasaje no lo exige.
