  spanish_consistency_notes:
  - Se mantiene el tono sobrio y literal acorde con una sección breve de registro apocalíptico.
  - «voz» y «cuerpo» siguen el léxico básico y no introducen términos eclesiásticos o doctrinales no presentes en el fuente.
  - No se capitalizan palabras por razón teológica, porque el pasaje no las exige.
