translation:
  language: es
  text: Y porque oíste una voz que hablaba, no de sus cabezas sino de en medio de su cuerpo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: uocem quae locuta est
  english_pob_choice: a voice speaking
  chosen_spanish: una voz que hablaba
  alternatives_spanish:
  - una voz hablando
  - una voz que se había puesto a hablar
  lexicon: vox
  rationale: «voz» es la correspondencia natural para uocem; «que hablaba» reproduce el participio/relativo de modo claro y fluido en español, sin añadir contenido ajeno al latín.
- source_word: non de ... sed de medio corporis
  english_pob_choice: not from its heads but from the midst of its body
  chosen_spanish: no de sus cabezas sino del medio de su cuerpo
  alternatives_spanish:
  - no de sus cabezas, sino del centro de su cuerpo
  - no desde sus cabezas, sino desde el medio de su cuerpo
  lexicon: capita / medium corporis
  rationale: «cabezas» conserva el plural del original y de la versión inglesa; «del medio de su cuerpo» sigue de cerca medio corporis sin reinterpretarlo como «centro» o «interior».
theological_decisions:
- issue: Imagen corporal inusual aplicada a una voz
  english_pob_reading: not from its heads but from the midst of its body
  chosen_spanish_reading: no de sus cabezas sino del medio de su cuerpo
  alternative_spanish_readings:
  - no de sus cabezas, sino del centro de su cuerpo
  rationale: La frase mantiene la imagen extraña del texto sin suavizarla ni explicarla, porque el latín y la lectura inglesa también la conservan. No se introduce una interpretación alegórica adicional.
  doctrine_reference: No aplica; decisión de fidelidad imagética y literaria al texto apocalíptico.
translation_notes:
