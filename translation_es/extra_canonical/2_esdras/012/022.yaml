  philosophy: optimal-equivalence
lexical_decisions:
- source_word: duo
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - ambos
  lexicon: duo
  rationale: Número cardinal directo y natural en español; «ambos» sería más idiomático solo si el contexto subrayara un par definido, pero el latín aquí simplemente cuantifica.
- source_word: uero
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - mas
  - sin embargo
  lexicon: vero
  rationale: La conjunción adversativa «pero» comunica con claridad la oposición implícita en el latín y sigue el ajuste del POB inglés al añadir la conexión omitida.
- source_word: seruabuntur
  english_pob_choice: will be preserved
  chosen_spanish: serán preservados
  alternatives_spanish:
  - serán guardados
  - serán conservados
  lexicon: servo
  rationale: «Preservar» refleja bien la idea de mantener a salvo o conservar hasta un punto final, siguiendo la revisión inglesa de «kept» a «preserved». «Serán guardados» es posible, pero menos preciso para el matiz de permanencia.
- source_word: in finem
  english_pob_choice: until the end
  chosen_spanish: hasta el fin
  alternatives_spanish:
  - hasta el final
  lexicon: finis
  rationale: «Hasta el fin» mantiene la formulación breve y solemne del latín; «hasta el final» también sería válido, pero «fin» deja mejor la resonancia escatológica posible del contexto.
- source_word: uidisti
  english_pob_choice: you saw
  chosen_spanish: viste
  alternatives_spanish:
  - has visto
  - vio
  lexicon: video
  rationale: Segunda persona singular pasada, directa y fiel al latín. En español actual, «viste» es la forma más simple y natural.
- source_word: tria capita
  english_pob_choice: three heads
  chosen_spanish: tres cabezas
  alternatives_spanish:
  - tres jefes
  - tres cimas
  lexicon: caput
  rationale: «Cabezas» reproduce de forma literal el sustantivo latino. No se suaviza a «jefes» o «cimas» porque el texto conservado no justifica una interpretación figurada explícita en este versículo aislado.
theological_decisions:
- issue: Alcance de la preservación hasta el fin
  english_pob_reading: but two will be preserved until the end.
  chosen_spanish_reading: pero dos serán preservados hasta el fin.
  alternative_spanish_readings:
  - pero dos serán guardados hasta el fin
  - pero dos permanecerán hasta el fin
  rationale: La opción mantiene la lectura escatológica y la pasiva del latín sin introducir explicaciones doctrinales adicionales. «Preservados» conserva mejor la idea de ser mantenidos a salvo o retenidos con propósito.
  doctrine_reference: Providencia divina y preservación escatológica en lectura apocalíptica.
- issue: Tratamiento de «cabezas» sin reinterpretación alegórica
  english_pob_reading: And because you saw three heads
  chosen_spanish_reading: Y porque viste tres cabezas
  alternative_spanish_readings:
  - Y porque viste tres jefes
  - Y porque viste tres montes
  rationale: El texto fuente latino dice literalmente «cabezas»; sin el contexto inmediato completo, no se debe sustituir por una glosa interpretativa. La versión española conserva la tensión semántica para que el lector vea el mismo dato imagístico que el original.
  doctrine_reference: Fidelidad textual frente a armonización interpretativa.
translation_notes:
  revision_awareness: La revisión inglesa añadió la conjunción inicial omitida y la cláusula final («And because you saw three heads»), y afinó «kept» a «preserved» para alinearse mejor con el latín. La redacción española refleja esa forma revisada, conservando tanto la conexión adversativa como el inicio de la cláusula siguiente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se conserva un registro sobrio y bíblico sin recurrir a formulaciones eclesiásticas tradicionales que el latín no exige.
  - No se añaden notas al texto porque no hay ambigüedad textual adicional documentada en el paquete fuente.
