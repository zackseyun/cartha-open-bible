revisions:
- from: 'Y porque viste tres cabezas en reposo[a], esta es la interpretación: en sus últimos días el Altísimo levantará tres reinos y renovará muchas cosas en él, y ellos gobernarán.'
  to: 'Y porque viste tres cabezas en reposo[a], esta es la interpretación: en sus últimos días el Altísimo levantará tres reinos y renovará muchas cosas en ella[b], y ellos gobernarán.'
  rationale: Se corrige «en él» a «en ella» para respetar el femenino singular del latín («in ea»), tal como ya quedó establecido en la auditoría inglesa. Se añade una nota breve para conservar la cautela referencial sin sacrificar la fidelidad gramatical del original. No se requieren más cambios.
