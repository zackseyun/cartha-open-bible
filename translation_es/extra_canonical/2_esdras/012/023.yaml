  yaml_path: translation/extra_canonical/2_esdras/012/023.yaml
  text: 'And because you saw three heads at rest[a], this is the interpretation: in its last days the Most High will raise up three kingdoms and renew many things in it, and they will rule.'
  footnotes:
  - marker: a
    text: Or 'renew many things in them'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:50:38Z'
    unchanged: false
    changes_summary: Added the missing final period for completeness and formal readability. The draft otherwise accurately reflects the Latin.
translation:
  language: es
  text: 'Y porque viste tres cabezas en reposo[a], esta es la interpretación: en sus últimos días el Altísimo levantará tres reinos y renovará muchas cosas en ella[b], y ellos gobernarán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tres cabezas quietas».
    reason: alternative_reading
  - marker: b
    text: El latín tiene singular femenino («en ella»); el antecedente puede entenderse según el contexto como la figura de la visión, no «en ellos».
    reason: source_grammar_clarification
lexical_decisions:
- source_word: quiescentia / three heads at rest
  english_pob_choice: three heads at rest
  chosen_spanish: tres cabezas en reposo
  alternatives_spanish:
  - tres cabezas descansando
  - tres cabezas quietas
  lexicon: quiescere
  rationale: «En reposo» conserva el sentido de quietud/resto del latín sin introducir una imagen más interpretativa que «descansando». Mantiene la referencia visible a las cabezas como imagen del texto fuente.
- source_word: Haec est interpretatio
  english_pob_choice: this is the interpretation
  chosen_spanish: esta es la interpretación
  alternatives_spanish:
  - ésta es la interpretación
  - esta es la explicación
  lexicon: interpretatio
  rationale: «Interpretación» reproduce directamente el sustantivo latino y mantiene el tono técnico-profético del pasaje.
- source_word: in nouissimis eius
  english_pob_choice: in its last days
  chosen_spanish: en sus últimos días
  alternatives_spanish:
  - en sus días postreros
  - en el tiempo final de ello
  lexicon: novissimus
  rationale: «Últimos días» es natural en español y refleja bien la referencia temporal escatológica del latín.
- source_word: suscitabit altissimus
  english_pob_choice: the Most High will raise up
  chosen_spanish: el Altísimo levantará
  alternatives_spanish:
  - el Altísimo suscitará
  - el Altísimo alzará
  lexicon: suscitare
  rationale: «Levantar» comunica la acción de suscitar/erigir con claridad en español bíblico contemporáneo, sin perder la agencia divina del sujeto «el Altísimo».
- source_word: tria regna
  english_pob_choice: three kingdoms
  chosen_spanish: tres reinos
  alternatives_spanish:
  - tres reinos
  - tres gobiernos
  lexicon: regnum
  rationale: «Reinos» es la equivalencia más directa y conserva la carga política e histórica del latín.
- source_word: renouabit in ea multa
  english_pob_choice: renew many things in it
  chosen_spanish: renovará muchas cosas en él
  alternatives_spanish:
  - renovará muchas cosas en ella
  - renovará mucho en ello
  lexicon: renovare
  rationale: La revisión auditada muestra que el referente de «in ea» es femenino singular; en español, «él» puede referirse a «el águila» implícita por contexto del capítulo, mientras que «ella» podría sonar más cercano a «la tierra» si se lee así. Dado que el texto inmediato habla de la visión del águila, «él» se mantiene como opción prudente para no fijar erróneamente el antecedente, pero conservando la singularidad exigida por el latín.
- source_word: dominabunt
  english_pob_choice: they will rule
  chosen_spanish: ellos gobernarán
  alternatives_spanish:
  - ellos dominarán
  - ellos reinarán
  lexicon: dominari
  rationale: «Gobernarán» transmite la idea de ejercer dominio sin cargar el español con una fuerza opresiva que no está obligatoriamente explícita en este contexto. «Reinarán» sería posible, pero «gobernarán» resulta más amplio y fiel al matiz político.
theological_decisions:
- issue: Sujeto divino como «el Altísimo»
  english_pob_reading: the Most High will raise up
  chosen_spanish_reading: el Altísimo levantará
  alternative_spanish_readings:
  - el Altísimo suscitará
  - el Altísimo alzará
  rationale: Se preserva el título divino explícito sin sustituirlo por una circunlocución litúrgica. El verbo mantiene la acción soberana de Dios sobre los reinos.
  doctrine_reference: Soberanía divina en literatura apocalíptica; continuidad del título «Altísimo».
- issue: Referente singular de «in ea»
  english_pob_reading: renew many things in it
  chosen_spanish_reading: renovará muchas cosas en él
  alternative_spanish_readings:
  - renovará muchas cosas en ella
  rationale: La revisión textual indica que el latín exige un singular femenino. En español, la referencia exacta del antecedente sigue algo abierta; por eso se conserva el singular con pronombre de tercera persona, evitando la pluralización indebida que el latín no permite.
  doctrine_reference: Coherencia gramatical con el testimonio latino; no implica una decisión doctrinal.
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente que corrigió la relación de «in ea» a un singular femenino y confirmó el punto final final. Por eso el español evita el plural «en ellos» y mantiene la referencia singular con «en él», en consonancia con el latín revisado.
  spanish_consistency_notes:
  - Se usa «Altísimo» para consistentemente reflejar el latín «altissimus» y el registro bíblico del pasaje.
  - Se evita «SEÑOR» como máscara, porque el texto fuente no contiene el Tetragrámaton sino un título divino.
  - Se conserva «reinos» y no «reinados» para mantener la correspondencia léxica con regna.
  - La nota textual se ancla solo al sintagma con ambigüedad lexical visible («en reposo»).
