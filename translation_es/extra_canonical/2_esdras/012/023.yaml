review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura general del latín y sigue la revisión inglesa clave de mantener singular en «in ea» frente al plural anterior. También conserva correctamente «el Altísimo» y «tres reinos». Sin embargo, el español actual introduce un problema de alineación gramatical y referencial al decir «en él», cuando el latín tiene femenino singular («ea»).
  spanish_quality_summary: El texto es generalmente claro y legible, pero «renovará muchas cosas en él» suena forzado e injustificado en español, especialmente porque el expediente auditado documenta explícitamente un referente femenino singular. Además, si se quiere mantener la ambigüedad del antecedente, el español puede hacerlo mejor con «en ella», acompañado de nota, en vez de cambiar el género al masculino.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «El Altísimo», «reinos» y «gobernarán» son aceptables. La principal corrección necesaria es respetar en español el femenino singular exigido por «in ea».
  issues:
  - severity: high
    issue: El borrador traduce «in ea» como «en él».
    rationale: El latín fuente usa femenino singular («ea»). La auditoría inglesa ya documentó que no puede ser plural. Pasarlo a masculino en español altera una señal gramatical relevante del original sin apoyo textual.
  - severity: medium
    issue: La justificación lexical intenta preservar ambigüedad mediante un pronombre masculino.
    rationale: Esa estrategia no preserva la ambigüedad del latín; la desplaza a otro género. En español, la mejor forma de conservar la fidelidad es usar el femenino singular y, si hace falta, explicar en nota que el antecedente puede entenderse como el águila o la tierra según el contexto.
  revised_spanish_text: 'Y porque viste tres cabezas en reposo[a], esta es la interpretación: en sus últimos días el Altísimo levantará tres reinos y renovará muchas cosas en ella[b], y ellos gobernarán.'
  revised_footnotes:
  - marker: a
    text: O «tres cabezas quietas».
    reason: alternative_reading
  - marker: b
    text: El latín tiene singular femenino («en ella»); el antecedente puede entenderse según el contexto como la figura de la visión, no «en ellos».
    reason: source_grammar_clarification
  revision_rationale: Se corrige «en él» a «en ella» para respetar el femenino singular del latín («in ea»), tal como ya quedó establecido en la auditoría inglesa. Se añade una nota breve para conservar la cautela referencial sin sacrificar la fidelidad gramatical del original. No se requieren más cambios.
