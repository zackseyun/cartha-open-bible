    text: 'O: «después del tiempo de aquel reino».'
    reason: alternative_rendering_more_literal
  revision_rationale: Se ajusta post tempus a «después de un tiempo de aquel reino» para evitar que el español implique el fin del reino, a la vez que se conserva en nota la alternativa más literal documentada en el rastro inglés.
