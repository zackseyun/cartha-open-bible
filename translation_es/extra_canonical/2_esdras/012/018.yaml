  text: 'capitibus eius exientem sed de medio corpore eius, Haec est interpretatio: quoniam post tempus regni illius nascentur contentiones non modicae, et periclitabitur ut cadat, et non cadet'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/012/018.yaml
  text: 'This is the interpretation: after the time of that kingdom[a], no small contentions will arise, and it will be in danger of falling; but it will not fall.'
  footnotes:
  - marker: a
    text: Or 'after the time of that kingdom'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:50:33Z'
    unchanged: false
    changes_summary: Capitalized the opening for formal style, revised 'after a period of that kingdom' to the more literal 'after the time of that kingdom,' and simplified 'yet it will not then fall' to 'but it will not fall' for accuracy and natural English.
translation:
  language: es
  text: 'Esta es la interpretación: después de un tiempo de aquel reino,[a] surgirán no pocas contiendas, y estará en peligro de caer; pero no caerá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después del tiempo de aquel reino».'
    reason: alternative_rendering_more_literal
lexical_decisions:
- source_word: post tempus
  english_pob_choice: after the time of that kingdom
  chosen_spanish: después del tiempo de aquel reino
  alternatives_spanish:
  - después de un tiempo de aquel reino
  - tras un período de aquel reino
  lexicon: post + tempus
  rationale: La frase latina es idiomática y, según la revisión, no debe entenderse como que el reino ya terminó, sino como que las contiendas vendrán después de un lapso dentro de su curso. Por eso «después del tiempo» conserva la relación temporal con fidelidad y suena natural en español.
- source_word: contentiones non modicae
  english_pob_choice: no small contentions
  chosen_spanish: no pocas contiendas
  alternatives_spanish:
  - grandes contiendas
  - contiendas no pequeñas
  lexicon: contentiones non modicae
  rationale: «No pocas» reproduce con naturalidad el intensificador negativo latino sin convertirlo en una paráfrasis interpretativa. «Contiendas» mantiene el sentido de disputas/conflictos sin añadir especificaciones que el texto no da.
- source_word: periclitabitur ut cadat
  english_pob_choice: it will be in danger of falling
  chosen_spanish: estará en peligro de caer
  alternatives_spanish:
  - peligrará de caer
  - estará amenazado de caer
  lexicon: periclitabitur ut cadat
  rationale: El verbo latino expresa estar en riesgo, no la caída misma. «Estará en peligro de caer» conserva la imagen y es idiomático en español.
- source_word: et non cadet
  english_pob_choice: but it will not fall
  chosen_spanish: pero no caerá
  alternatives_spanish:
  - mas no caerá
  - y no caerá
  lexicon: et non cadet
  rationale: «Pero» refleja bien el contraste final que el latín establece. «No caerá» es la formulación más directa y fiel, evitando reforzar innecesariamente el matiz de inminencia ya expresado antes.
theological_decisions:
- issue: Persistencia del reino pese a la amenaza
  english_pob_reading: it will be in danger of falling; but it will not fall
  chosen_spanish_reading: estará en peligro de caer; pero no caerá
  alternative_spanish_readings:
  - peligrará de caer; pero no caerá
  - estará a punto de caer; pero no caerá
  rationale: El texto sostiene simultáneamente amenaza real y preservación final. La traducción mantiene esa tensión sin suavizarla ni resolverla prematuramente.
  doctrine_reference: Providencia divina / preservación del reino en la visión apocalíptica
- issue: Valor temporal de post tempus
  english_pob_reading: after the time of that kingdom
  chosen_spanish_reading: después del tiempo de aquel reino
  alternative_spanish_readings:
  - después de un tiempo de aquel reino
  - tras un tiempo de aquel reino
  rationale: La revisión del auditor indica que la expresión no debe sugerir que el reino ya ha terminado. En español, «después del tiempo de aquel reino» conserva la ambigüedad temporal compatible con el contexto y evita una lectura errónea.
  doctrine_reference: Coherencia contextual del pasaje apocalíptico
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «after a period of that kingdom» a «after the time of that kingdom» para recuperar mayor literalidad, pero la nota de revisión advierte que post tempus es idiomático y no implica necesariamente el fin del reino. La traducción española conserva esa tensión con «después del tiempo de aquel reino» y mantiene el contraste final entre peligro y no caída.
  spanish_consistency_notes:
  - Se mantiene «reino» para regnum, sin sustituirlo por una paráfrasis como «imperio».
  - Se usa «contiendas» para contentiones, en lugar de «disputas» o «conflictos», porque conserva mejor el tono solemne/apocalíptico.
  - Se evita cualquier explicitación de agente en «caer»; el latín no lo requiere y el contexto ya marca la metáfora política.
  - 'La apertura «Esta es la interpretación» refleja el formato explicativo del original: Haec est interpretatio.'
