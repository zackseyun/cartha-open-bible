translation:
  language: es
  text: Porque el recuerdo de ustedes está delante del Altísimo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque su recuerdo está delante del Altísimo». El latín ''memoria uestri'' admite un matiz objetivo: el recuerdo que Dios tiene de ustedes.'
    reason: alternative_reading
lexical_decisions:
- source_word: memoria uestri
  english_pob_choice: the memory of you
  chosen_spanish: el recuerdo de ustedes
  alternatives_spanish:
  - la memoria de ustedes
  - el recuerdo de vosotros
  lexicon: memoria
  rationale: El latín usa memoria con genitivo objetivo (uestri), por lo que la idea es el recuerdo que Dios tiene de ellos, no el acto humano de recordar. En español, 'el recuerdo de ustedes' comunica con naturalidad ese valor objetivo; 'memoria' es posible, pero suena más abstracta y menos idiomática en esta frase.
- source_word: coram altissimo
  english_pob_choice: before the Most High
  chosen_spanish: delante del Altísimo
  alternatives_spanish:
  - ante el Altísimo
  - en presencia del Altísimo
  lexicon: coram
  rationale: '''Coram'' expresa presencia/comparecencia delante de alguien. ''Delante del Altísimo'' conserva la imagen relacional y es claro en español bíblico moderno. ''Altísimo'' mantiene el título reverencial sin necesidad de sustituirlo por una perífrasis.'
theological_decisions:
- issue: Referencia al Altísimo como receptor del recuerdo divino
  english_pob_reading: For the memory of you is before the Most High
  chosen_spanish_reading: Porque el recuerdo de ustedes está delante del Altísimo
  alternative_spanish_readings:
  - Pues el recuerdo de ustedes está ante el Altísimo
  - Porque su memoria está delante del Altísimo
  rationale: La cláusula afirma que el pueblo está presente en la memoria divina; no introduce todavía explicaciones adicionales que no están en el latín recibido. Mantener la frase breve evita añadir el material del antiguo renglón inglés que fue retirado por no estar en el texto latino.
  doctrine_reference: Providencia y memoria divina en lenguaje bíblico; fidelidad al alcance del verso sin expansión interpretativa.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que eliminó toda cláusula añadida no presente en el latín y dejó el verso en el límite exacto de 'coram altissimo'. También corrige el posible equívoco de traducir 'memoria uestri' como posesivo subjetivo.
  spanish_consistency_notes:
  - Se usa 'Altísimo' para 'Most High', conforme al registro bíblico reverente.
  - Se emplea 'ustedes' por neutralidad latinoamericana; no se usa 'vosotros'.
  - No se añadió ninguna cláusula sobre combate o abandono, porque no está en el latín fuente.
  - '''recuerdo'' se eligió por claridad natural; ''memoria'' queda como alternativa en nota para preservar la posible lectura literal.'
