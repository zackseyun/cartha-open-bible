lexical_decisions:
- source_word: Et factum est
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció que
  alternatives_spanish:
  - Y sucedió que
  - Y ocurrió que
  lexicon: Latin factum est
  rationale: La fórmula narrativa latina pide una apertura idiomática en español que conserve el giro de relato sin sonar rígida. «Aconteció que» es una equivalencia natural y tradicional en español bíblico, pero sigue siendo moderna y clara.
- source_word: dum loqueretur
  english_pob_choice: while ... was speaking
  chosen_spanish: mientras ... hablaba
  alternatives_spanish:
  - cuando ... hablaba
  - al hablar
  lexicon: Latin dum + imperfecto
  rationale: «Dum» con imperfecto expresa acción simultánea y prolongada; «mientras» reproduce bien esa simultaneidad en español y conserva el aspecto durativo.
- source_word: leo
  english_pob_choice: lion
  chosen_spanish: el león
  alternatives_spanish:
  - el león
  lexicon: Latin leo
  rationale: Se mantiene el referente zoológico literal del texto latino, sin alegorizar ni reinterpretar el símbolo.
- source_word: uerba haec
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  lexicon: Latin verba haec
  rationale: «Palabras» es el equivalente directo y más natural para verba en este contexto discursivo.
- source_word: ad
  english_pob_choice: to
  chosen_spanish: al
  alternatives_spanish:
  - a
  lexicon: Latin ad + acusativo
  rationale: «Al» fluye mejor en español frente a un complemento de destinatario animado y conserva la dirección del discurso.
- source_word: eagle
  english_pob_choice: eagle
  chosen_spanish: águila
  alternatives_spanish:
  - águila
  lexicon: Latin aquila implied by English audit context
  rationale: Aunque el fragmento latino visible termina en «ad», el contexto auditado del inglés POB confirma que el destinatario del discurso es el águila; se conserva el término literal estándar «águila».
theological_decisions:
- issue: Implied addressee in a fragmentary source line
  english_pob_reading: while the lion was speaking these words to the eagle
  chosen_spanish_reading: mientras el león hablaba estas palabras al águila
