translation:
  language: es
  text: pero este también caerá por la espada en los últimos días[a]. Y porque viste
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero los dos que quedaron, la espada los devorará. Porque la espada del uno devorará al que está con él».'
    reason: previous_rendering
lexical_decisions:
- source_word: sed tamen et hic
  english_pob_choice: but this one also
  chosen_spanish: pero este también
  alternatives_spanish:
  - pero este asimismo
  - sin embargo, este también
  lexicon: Latin sed tamen et hic
  rationale: El latín introduce una concesión adversativa con énfasis en que este sujeto no queda exento; en español, "pero este también" conserva la oposición y la adición sin redundancia innecesaria.
- source_word: gladio
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - mediante la espada
  lexicon: Latin gladius
  rationale: '"A espada" reproduce de forma natural la idea instrumental del latín y mantiene el registro bíblico sin volverla una construcción rígida.'
- source_word: in nouissimis
  english_pob_choice: in the last days
  chosen_spanish: en los últimos días
  alternatives_spanish:
  - al final de los tiempos
  - en los postreros días
  lexicon: Latin novissimis
  rationale: La expresión temporal del latín se vierte con la fórmula española más clara y fiel, "en los últimos días", sin cargarla con un tono arcaizante.
- source_word: cadet
  english_pob_choice: will fall
  chosen_spanish: caerá
  alternatives_spanish:
  - perecerá
  - será derribado
  lexicon: Latin cadere
  rationale: '"Caerá" conserva la imagen verbal básica de cadere y evita introducir una interpretación más específica que el texto no exige.'
- source_word: Et quoniam uidisti
  english_pob_choice: And because you saw
  chosen_spanish: Y porque viste
  alternatives_spanish:
  - Y como viste
  - Y puesto que viste
  lexicon: Latin quoniam + vidisti
  rationale: La cláusula queda abierta como en el latín; "porque viste" mantiene la relación causal y el inicio de la explicación sin anticipar contenido no presente en este segmento.
theological_decisions:
- issue: Referencia al juicio futuro implícita en "in novissimis"
  english_pob_reading: in the last days
  chosen_spanish_reading: en los últimos días
  alternative_spanish_readings:
  - al final de los tiempos
  - en los postreros días
  rationale: Se mantiene la referencia escatológica sin ampliar el alcance doctrinal más allá de la formulación latina disponible.
  doctrine_reference: escatología bíblica
- issue: Alcance del sujeto de "hic"
  english_pob_reading: this one also
  chosen_spanish_reading: este también
  alternative_spanish_readings:
  - este mismo también
  - este a su vez también
  rationale: El latín señala a un individuo concreto dentro del contexto narrativo; el español conserva esa deixis sin precisar más de lo que el verso dado permite.
  doctrine_reference: lectura contextual del referente
translation_notes:
  revision_awareness: 'La traducción inglesa auditada contenía una desalineación importante con el latín de esta unidad; aquí se sigue directamente el texto latino limpio del testimonio Bensly 1895/1875, que dice que este también caerá a espada en los últimos días, y luego inicia la cláusula siguiente: «Y porque viste…».'
  spanish_consistency_notes:
  - Se usa "espada" para gladio, no "sword" transliterado ni un equivalente más interpretativo.
  - Se conserva "últimos días" como fórmula escatológica estable y reconocible en español.
  - La cláusula final queda incompleta porque el segmento latino fuente también se corta en "Et quoniam uidisti".
