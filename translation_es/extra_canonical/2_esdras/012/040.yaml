    issue: «se reunió todo» es poco natural para referirse al pueblo
    rationale: En español general y bíblico, «todo» como sujeto humano colectivo aquí suena impersonal o elíptico. El latín indica que la totalidad del pueblo se reunió; «todos se reunieron» o «todo el pueblo se reunió» lo expresa mejor.
  revised_spanish_text: Y aconteció que, cuando todo el pueblo oyó que habían pasado siete días y que yo no había vuelto a la ciudad, todos se reunieron, desde el menor hasta el mayor, y vinieron a
