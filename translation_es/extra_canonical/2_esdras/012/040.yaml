lexical_decisions:
- source_word: Et factum est
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: Latin factum est
  rationale: Reproduce la fórmula narrativa impersonal con una opción natural y solemne en español, sin añadir interpretación.
- source_word: omnis populus
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todo el pueblo reunido
  lexicon: Latin populus
  rationale: ‘Pueblo’ conserva el tono colectivo y bíblico mejor que ‘gente’, manteniendo la referencia a la comunidad entera.
- source_word: quoniam pertransierunt septem dies
  english_pob_choice: that seven days had passed
  chosen_spanish: que habían pasado siete días
  alternatives_spanish:
  - que habían transcurrido siete días
  - que se cumplieron siete días
  lexicon: Latin pertransierunt septem dies
  rationale: ‘Habían pasado’ transmite el resultado temporal de modo claro y natural, con el valor perfectivo del latín.
- source_word: ego non fuissem reuersus in ciuitatem
  english_pob_choice: I had not returned to the city
  chosen_spanish: yo no había vuelto a la ciudad
  alternatives_spanish:
  - yo no había regresado a la ciudad
  - yo no me había vuelto a la ciudad
  lexicon: Latin non fuissem reversus in civitatem
  rationale: ‘Había vuelto’ es idiomático en español para ‘return’; conserva la primera persona y el matiz de no haber regresado.
- source_word: congregauit se omnis a minimo usque ad maximum
  english_pob_choice: all of them gathered together, from the least to the greatest
  chosen_spanish: se reunió todo, desde el menor hasta el mayor
  alternatives_spanish:
  - se congregó todo, desde el más pequeño hasta el más grande
  - se reunió cada uno, del menor al mayor
  lexicon: Latin congregavit se ... a minimo usque ad maximum
  rationale: ‘Se reunió’ expresa bien el sujeto colectivo; ‘desde el menor hasta el mayor’ conserva la escala inclusiva y el orden del original.
- source_word: uenit ad
  english_pob_choice: and came to
  chosen_spanish: y vino a
  alternatives_spanish:
  - y llegó a
  - y se acercó a
  lexicon: Latin venit ad
  rationale: Se mantiene incompleta la cláusula final porque el segmento latino y el inglés audit trail terminan en ‘to’; no conviene completar el destino sin base textual.
theological_decisions:
