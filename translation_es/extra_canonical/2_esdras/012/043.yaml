  text: y como un puerto para una nave salvada de la tempestad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: portus
  english_pob_choice: harbor
  chosen_spanish: puerto
  alternatives_spanish:
  - refugio
  - abrigo
  lexicon: Latin portus
  rationale: El latín portus designa el puerto como lugar de arribo y resguardo para embarcaciones; «puerto» conserva esa imagen marítima de manera natural en español. «Refugio» o «abrigo» explican la función, pero diluyen la metáfora concreta del texto.
- source_word: naui
  english_pob_choice: ship
  chosen_spanish: nave
  alternatives_spanish:
  - barco
  - embarcación
  lexicon: Latin navis
  rationale: Navis puede renderizarse como «nave», «barco» o «embarcación». «Nave» mantiene un registro digno y amplio, adecuado a un texto literario-bíblico, sin estrechar innecesariamente el término.
- source_word: saluatae
  english_pob_choice: saved
  chosen_spanish: salvada
  alternatives_spanish:
  - rescatada
  - librada
  lexicon: Latin salvus
  rationale: El participio salvata/saluatae expresa haber sido puesta a salvo. «Salvada» reproduce esa idea con fidelidad directa. «Rescatada» y «librada» son posibles, pero introducen matices no requeridos por el latín.
- source_word: tempestate
  english_pob_choice: storm
  chosen_spanish: tempestad
  alternatives_spanish:
  - tormenta
  - borrasca
  lexicon: Latin tempestas
  rationale: Tempestas puede abarcar tempestad/tormenta. «Tempestad» es la correspondencia más clásica y elevada en español, conservando el contraste entre peligro y salvación que sugiere la imagen.
theological_decisions:
- issue: La frase es una comparación metafórica de seguridad tras el peligro, sin contenido doctrinal explícito.
  english_pob_reading: and like a harbor for a ship saved from the storm.
  chosen_spanish_reading: y como un puerto para una nave salvada de la tempestad.
  alternative_spanish_readings:
  - y como un refugio para una nave rescatada de la tempestad.
  - y como un puerto para un barco librado de la tormenta.
  rationale: Se mantiene la imagen marítima literal del original latino y de la traducción inglesa POB, sin añadir interpretaciones espirituales que el texto no exige. La construcción comparativa «como» preserva el carácter figurado.
  doctrine_reference: None
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requerían cambios y el cotejo cruzado muestra alto acuerdo; por ello se mantiene la lectura directa del latín limpio sin añadir variantes textuales ni notas de aparato.
  spanish_consistency_notes:
  - Se conserva el registro sobrio y bíblico con vocabulario transparente para lectores hispanos.
  - No se introduce puntuación o expansión innecesaria, dado que el texto fuente es una sola comparación breve.
  - «Nave» y «puerto» mantienen la imagen marítima sin cambiar el sentido del inglés POB.
