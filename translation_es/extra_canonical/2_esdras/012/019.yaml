lexical_decisions:
- source_word: tunc, sed iterum constituetur in suum initium
  english_pob_choice: but will again be restored to its beginning
  chosen_spanish: pero será restaurado otra vez a su comienzo
  alternatives_spanish:
  - pero será devuelto otra vez a su principio
  - pero será restablecido otra vez a su inicio
  lexicon: constitui → restaurar/restablecer; initium → comienzo/principio/inicio
  rationale: El latín pasivo 'constituetur' sugiere ser restituido o restablecido; 'restaurado' conserva esa fuerza en español natural. 'in suum initium' se traduce mejor como 'a su comienzo', siguiendo el sentido revisado del POB inglés y evitando la redundancia de 'primer comienzo' o 'comienzo anterior'.
- source_word: Et quoniam
  english_pob_choice: And because
  chosen_spanish: Y porque
  alternatives_spanish:
  - Y ya que
  - Y puesto que
  lexicon: quoniam → porque/ya que/puesto que
  rationale: Se mantiene el fragmento causal abierto del latín. 'Y porque' reproduce con sobriedad la conjunción causal sin añadir contenido interpretativo que el segmento fuente no desarrolla.
theological_decisions:
- issue: Incomplete causal clause at the end of the verse
  english_pob_reading: And because
  chosen_spanish_reading: Y porque
  alternative_spanish_readings:
  - Y ya que
  - Puesto que
  rationale: El texto fuente conserva solo un inicio de cláusula causal. En español conviene dejarla igualmente abierta para no resolver artificialmente la frase ni suplir material inexistente.
  doctrine_reference: Respeto del testimonio textual tal como se preserva en el fragmento latino
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió el inglés de ''former beginning'' a ''beginning'' y la adición de ''And because'' para reflejar ''Et quoniam''. La versión española sigue esas dos decisiones: evita redundancias y conserva el fragmento causal final sin desarrollarlo.'
  spanish_consistency_notes:
  - Se usa 'restaurado' para mantener el matiz de restitución del latín pasivo.
  - '''comienzo'' fue elegido como equivalente natural y fiel de ''initium'' en este contexto.'
  - Se deja 'Y porque' sin completar, en coherencia con el carácter fragmentario del testimonio fuente.
