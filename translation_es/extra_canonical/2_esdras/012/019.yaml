- from: pero será restaurado otra vez a su comienzo[a]. Y porque
  to: pero será restaurado de nuevo a su principio[a]. Y porque
  rationale: Se ajusta la frase principal para que suene natural en español sin perder el matiz de retorno implícito en 'in suum initium'. 'De nuevo' es más fluido que 'otra vez' en este registro. La nota se rehace para evitar el calco torpe 'comienzo anterior' y aclarar el sentido de estado original preservado por la alternativa inglesa.
