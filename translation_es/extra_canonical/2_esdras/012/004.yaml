lexical_decisions:
- source_word: scrutas
  english_pob_choice: you search out
  chosen_spanish: escudriñas
  alternatives_spanish:
  - buscas
  - investigas
  lexicon: Latin scrutari
  rationale: «Escudriñar» conserva la intensidad de buscar con examen minucioso, más cercana al matiz de scrutari que un simple «buscar».
- source_word: uias
  english_pob_choice: the ways
  chosen_spanish: los caminos
  alternatives_spanish:
  - las sendas
  - las vías
  lexicon: Latin via
  rationale: «Caminos» es natural en español y mantiene la imagen de las vías o cursos de acción de Dios sin introducir tecnicismos innecesarios.
- source_word: altissimi
  english_pob_choice: of the Most High
  chosen_spanish: del Altísimo
  alternatives_spanish:
  - del Dios Altísimo
  - del Altísimo Dios
  lexicon: Latin Altissimus
  rationale: «El Altísimo» es la forma más fiel y reconocible para el título divino en español, preservando el carácter reverencial del original.
- source_word: fatigatus sum
  english_pob_choice: I am still weary
  chosen_spanish: todavía estoy cansado
  alternatives_spanish:
  - todavía estoy fatigado
  - aún estoy cansado
  lexicon: Latin fatigatus sum
  rationale: «Cansado» comunica bien el estado de agotamiento y resulta más natural en español actual que un calco rígido como «fatigado».
- source_word: animo
  english_pob_choice: in my spirit
  chosen_spanish: en mi espíritu
  alternatives_spanish:
  - en mi ánimo
  - en mi alma
  lexicon: Latin animus
  rationale: Se conserva «espíritu» siguiendo el audit trail inglés y la amplitud semántica de animus, que puede abarcar interioridad, disposición y aliento vital.
theological_decisions:
- issue: Resultado de buscar los caminos divinos
  english_pob_reading: because you search out the ways of the Most High
  chosen_spanish_reading: porque escudriñas los caminos del Altísimo
  alternative_spanish_readings:
  - porque buscas los caminos del Altísimo
  - porque investigas los caminos del Altísimo
  rationale: La frase presenta la acción de indagar profundamente los designios o caminos de Dios; «escudriñar» mantiene esa fuerza sin añadir una interpretación doctrinal extra.
  doctrine_reference: 'Sabiduría/apocalíptica: la búsqueda humana de los caminos de Dios'
- issue: animo / spiritus
  english_pob_reading: weary in my spirit
  chosen_spanish_reading: cansado en mi espíritu
  alternative_spanish_readings:
  - cansado en mi ánimo
  - cansado en mi alma
  rationale: «Espíritu» sigue el inglés POB revisado y evita resolver de antemano una tensión semántica que en el latín queda abierta entre interioridad, ánimo y espíritu.
  doctrine_reference: 'Antropología bíblica: espíritu/ánimo como interioridad humana'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que cambió «worn out in my soul» por «weary in my spirit» y conservó la cláusula final abierta. Por eso el español mantiene «en mi espíritu» y termina con una coma y «y», reflejando que el segmento fuente continúa.
  spanish_consistency_notes:
  - Se usó «Altísimo» para altissimi, coherente con terminología bíblica española reverente.
  - Se evitó «SEÑOR» porque el texto latino no usa el tetragrámaton; el título divino aquí es Altísimo.
  - Se mantuvo la cláusula incompleta con coma final y «y», conforme al estado del texto fuente y a la decisión revisada del inglés POB.
