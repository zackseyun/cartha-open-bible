translation:
  language: es
  text: del águila. Porque estos son los que llevarán sus impiedades a su punto culminante[a], y
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las resumirán». El latín recapitulabunt puede sugerir tanto la idea de resumir o recapitular como la de llevar algo a su culminación; aquí se eligió la segunda por el contexto apocalíptico y por el posible eco de «cabezas» en el versículo anterior.
    reason: alternative_reading
lexical_decisions:
- source_word: aquilae
  english_pob_choice: of the eagle
  chosen_spanish: del águila
  alternatives_spanish:
  - del águila imperial
  - del ave
  lexicon: Latin aquilae
  rationale: El genitivo latino se refiere al símbolo/figura del águila ya presentado en el contexto; «del águila» reproduce con naturalidad la relación posesiva sin añadir interpretación extra.
- source_word: recapitulabunt
  english_pob_choice: will bring its impieties to a head
  chosen_spanish: llevarán sus impiedades a su colmo
  alternatives_spanish:
  - resumirán sus impiedades
  - concentrarán sus impiedades en un solo punto
  - llevarán sus impiedades a su culminación
  lexicon: Latin recapitulabunt
  rationale: La revisión inglesa ya descartó «sum up» por ser demasiado verbal y adoptó una idea de culminación. En español, «llevar a su colmo» conserva la idea de consumación o plenitud del mal y evita reducir el verbo a un simple resumen.
- source_word: impietates
  english_pob_choice: impieties
  chosen_spanish: impiedades
  alternatives_spanish:
  - injusticias
  - maldades
  - actos impíos
  lexicon: Latin impietates
  rationale: «Impiedades» mantiene la correspondencia léxica directa con el latín y preserva el registro moral/religioso del término, sin suavizarlo hacia un vocablo más general.
theological_decisions:
- issue: Consumación del mal en un contexto apocalíptico
  english_pob_reading: will bring its impieties to a head
  chosen_spanish_reading: llevarán sus impiedades a su colmo
  alternative_spanish_readings:
  - llevarán sus impiedades a su culminación
  - harán que sus impiedades lleguen a su pleno punto
  rationale: La frase apunta no solo a acumulación, sino a la maduración plena del mal. «A su colmo» conserva esa fuerza teleológica y es idiomática en español sin perder el matiz de culminación apocalíptica.
  doctrine_reference: 4 Esdras / 2 Esdras 12:25, continuación del simbolismo del águila y su juicio
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente del POB inglés, que prefirió «bring its impieties to a head» frente a «sum up its impieties» para captar mejor el valor de recapitulabunt y su relación contextual con las «cabezas» del versículo previo. También se incorpora la conjunción final «y» para reflejar el et latino.
  spanish_consistency_notes:
  - Se mantiene «águila» en minúscula porque funciona como símbolo narrativo dentro del pasaje y no como nombre propio.
  - Se conserva el paralelismo sintáctico con el inglés auditado, incluyendo la conjunción final «y», para respetar la continuidad del enunciado latino.
  - No se introducen equivalentes doctrinales tradicionales ajenos al audit trail; se prioriza la correspondencia semántica con el latín y la lectura inglesa revisada.
