reference: 2 Esdras 12:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: aquilam, et uidi Et ecce quod superauerat caput non conparuit. et surrexerunt alae duae quae ad eum transierunt et erectae sunt ut regnarent, et erat regnum eorum exile et tumulti plenum. Et uidi et ecce ipsa non apparesebant, et omne corpus aquilae incendebatur, et expauescebat terra ualde.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/012/002.yaml
  text: that I looked[a], and behold, the head that had remained did not appear. And the two wings that had gone over to it arose and were set up to reign, and their reign was brief and full of turmoil. And I looked, and behold, they too did not appear, and the whole body of the eagle was burning[b], and the earth was greatly terrified.
  footnotes:
  - marker: a
    text: Or 'And the two wings that had gone over to it rose up to reign,'.
    reason: previous_rendering
  - marker: b
    text: Or 'was burned up'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:50:24Z'
    unchanged: false
    changes_summary: Adjusted 'was no longer visible' and 'disappeared' to 'did not appear' for closer lexical alignment with non conparuit / non apparesebant; otherwise retained the draft.
translation:
  language: es
  text: que miré[a], y he aquí, la cabeza que había quedado no apareció. Y las dos alas que habían pasado sobre ella se levantaron y fueron establecidas para reinar, y su reinado fue breve y lleno de tumulto. Y miré, y he aquí, ellas tampoco aparecieron, y todo el cuerpo del águila estaba ardiendo[b], y la tierra estaba muy aterrada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y vi».'
    reason: alternative_reading
  - marker: b
    text: 'O: «era quemado», es decir, «estaba siendo quemado».'
    reason: alternative_reading
lexical_decisions:
- source_word: aquilam
  english_pob_choice: the eagle
  chosen_spanish: el águila
  alternatives_spanish:
  - el ave rapaz
  - el águila imperial
  lexicon: N/A
  rationale: El latín identifica la figura simbólica como aquila; en español, «águila» conserva el referente apocalíptico sin añadir interpretación extra.
- source_word: vidi
  english_pob_choice: I looked
  chosen_spanish: miré
  alternatives_spanish:
  - vi
  - observé
  lexicon: N/A
  rationale: «Miré» reproduce bien el gesto visionario del narrador y mantiene el estilo de la POB inglesa «I looked».
- source_word: non conparuit
  english_pob_choice: did not appear
  chosen_spanish: no apareció
  alternatives_spanish:
  - no se mostró
  - no fue visto
  lexicon: N/A
  rationale: Se preserva el valor de presencia/aparición del latín sin intensificarlo a «desapareció», que sería más fuerte que el texto.
- source_word: surrexerunt
  english_pob_choice: arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron en pie
  lexicon: N/A
  rationale: El verbo expresa el ascenso o elevación de las alas; «se levantaron» es natural y mantiene la secuencia verbal distinguible.
- source_word: erectae sunt ut regnarent
  english_pob_choice: and were set up to reign
  chosen_spanish: y fueron puestas para reinar
  alternatives_spanish:
  - y fueron establecidas para reinar
  - y quedaron levantadas para reinar
  lexicon: N/A
  rationale: La pasiva latina indica que recibieron una posición/instalación para ejercer dominio; «fueron puestas para reinar» conserva la pasiva y la finalidad de reinar.
- source_word: regnum eorum exile et tumulti plenum
  english_pob_choice: their reign was brief and full of turmoil
  chosen_spanish: su reinado fue breve y lleno de tumulto
  alternatives_spanish:
  - su reino fue breve y lleno de tumulto
  - su reinado fue corto y lleno de disturbios
  lexicon: N/A
  rationale: «Reinado» traduce regnum en sentido de ejercicio real, y «tumulto» recoge tumulti sin suavizar el desorden político.
- source_word: non apparesebant
  english_pob_choice: they too did not appear
  chosen_spanish: ellas tampoco aparecieron
  alternatives_spanish:
  - tampoco se mostraron
  - tampoco fueron vistas
  lexicon: N/A
  rationale: Se mantiene el paralelismo con non conparuit y la pluralidad femenina del latín con «ellas» para referirse a las alas.
- source_word: incendebatur
  english_pob_choice: was burning
  chosen_spanish: estaba ardiendo
  alternatives_spanish:
  - ardía
  - estaba siendo quemado
  lexicon: N/A
  rationale: El imperfecto latino describe un proceso en curso; «estaba ardiendo» conserva esa duración mejor que una forma completiva.
- source_word: expauescebat terra ualde
  english_pob_choice: the earth was greatly terrified
  chosen_spanish: la tierra temblaba mucho
  alternatives_spanish:
  - la tierra estaba muy aterrada
  - la tierra se estremecía grandemente
  lexicon: N/A
  rationale: El latín combina espanto con una reacción cósmica. «Temblaba mucho» preserva el efecto visible y evita atribuirle una psicología demasiado literal a la tierra.
theological_decisions:
- issue: La figura del águila y sus alas funciona como símbolo apocalíptico-político, no como animal literal.
  english_pob_reading: the eagle
  chosen_spanish_reading: el águila
  alternative_spanish_readings:
  - el ave rapaz
  - el símbolo del águila
  rationale: Se conserva el símbolo tal como aparece en la tradición textual, sin explicitar su interpretación histórica dentro del versículo.
  doctrine_reference: Lectura simbólica apocalíptica del pasaje
- issue: 'La secuencia verbal distingue dos acciones: levantarse y ser puestas/establecidas para reinar.'
  english_pob_reading: arose, and were set up to reign
  chosen_spanish_reading: se levantaron y fueron puestas para reinar
  alternative_spanish_readings:
  - se alzaron y quedaron establecidas para reinar
  - se levantaron para reinar
  rationale: El latín coordinado evita fusionar ambos verbos; la traducción conserva la progresión para no perder el matiz de investidura.
  doctrine_reference: Precisión narrativa del texto visionario
- issue: «La tierra» no se traduce como sujeto humano que siente miedo, sino como personificación cósmica.
  english_pob_reading: the earth was greatly terrified
  chosen_spanish_reading: la tierra temblaba mucho
  alternative_spanish_readings:
  - la tierra estaba muy aterrada
  - la tierra se estremecía mucho
  rationale: El texto presenta una reacción cósmica. «Temblaba» comunica el estremecimiento visible sin convertir la personificación en un estado psicológico demasiado literal.
  doctrine_reference: Personificación poética/apocalíptica
translation_notes:
  revision_awareness: 'He seguido la revisión más reciente que ajustó non conparuit / non apparesebant a «did not appear» y conservé la distinción verbal entre surrexerunt y erectae sunt, además del imperfecto de incendebatur. La versión española mantiene esas precisiones: «no apareció», «se levantaron y fueron puestas para reinar», y «estaba ardiendo».'
  spanish_consistency_notes:
  - Mantengo «águila» para aquila, sin sustituirlo por términos explicativos que debiliten el símbolo.
  - Uso «reinado» para regnum, porque en este contexto funciona mejor que «reino» como esfera política.
  - Conservo el paralelismo «no apareció / tampoco aparecieron» para reflejar non conparuit / non apparesebant.
  - «La tierra temblaba mucho» intenta respetar el carácter visionario y cósmico de expauescebat terra ualde.
