  to: que miré[a], y he aquí, la cabeza que había quedado no apareció. Y las dos alas que habían pasado sobre ella se levantaron y fueron establecidas para reinar, y su reinado fue breve y lleno de tumulto. Y miré, y he aquí, ellas tampoco aparecieron, y todo el cuerpo del águila estaba ardiendo[b], y la tierra estaba muy aterrada.
