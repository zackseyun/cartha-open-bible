  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, esclavo, etc. La elección ‘opresión’ para labore sigue la decisión lexical auditada del POB y es defendible en español.
