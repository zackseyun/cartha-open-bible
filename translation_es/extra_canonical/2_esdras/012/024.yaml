  source_alignment_summary: 'El borrador sigue de cerca el latín y el rastro inglés: ‘la tierra y los que habitan en ella’ refleja bien terram, et qui habitant in ea; ‘con mucha opresión’ concuerda con la decisión auditada para cum labore multo; y la relación lógica de propter hoc queda bien con ‘por eso’. Sin embargo, ‘más que todos los que fueron antes de estos’ suena poco natural y puede oscurecer la referencia; el sentido comparativo se expresa mejor en español con ‘antes que ellos’, sin perder el valor de ante hos en contexto.'
