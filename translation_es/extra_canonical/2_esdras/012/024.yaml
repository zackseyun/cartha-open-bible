translation:
  language: es
  text: la tierra y los que habitan en ella, con mucha opresión, más que todos los que fueron antes que ellos; por eso se los llama las cabezas
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: terram
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - la tierra habitada
  lexicon: terra
  rationale: ‘Tierra’ mantiene el sustantivo concreto del latino y corresponde de manera directa al inglés auditado. ‘Mundo’ introduciría una abstracción no presente en el texto; ‘tierra habitada’ explicita de más.
- source_word: Et qui habitant in ea
  english_pob_choice: those who dwell in it
  chosen_spanish: los que habitan en ella
  alternatives_spanish:
  - los que viven en ella
  - los habitantes de ella
  lexicon: habitare
  rationale: ‘Habitan’ conserva el verbo de residencia del original; ‘en ella’ reproduce el referente inmediato de ‘in ea’. ‘Los habitantes de ella’ es posible, pero menos fluido en español moderno.
- source_word: cum labore multo
  english_pob_choice: with much oppression
  chosen_spanish: con mucha opresión
  alternatives_spanish:
  - con mucho trabajo
  - con gran aflicción
  - con mucha fatiga
  lexicon: labor
  rationale: El latino ‘labore’ puede abarcar trabajo, fatiga, penuria o opresión según contexto. El inglés POB eligió ‘oppression’, y en este contexto el español ‘opresión’ preserva esa dureza social sin suavizarla a mero esfuerzo físico.
- source_word: super omnes qui fuerunt ante hos
  english_pob_choice: more than all who were before them
  chosen_spanish: más que todos los que fueron antes de estos
  alternatives_spanish:
  - más que todos los que fueron antes de ellos
  - más que todos los anteriores
  lexicon: super...ante
  rationale: La estructura comparativa se conserva de forma transparente. ‘De estos’ refleja el demonstrativo latino ‘hos’; aunque suena ligeramente más formal, mantiene la referencia textual sin reinterpretarla.
- source_word: capita
  english_pob_choice: the heads
  chosen_spanish: las cabezas
  alternatives_spanish:
  - los jefes
  - los principales
  - los líderes
  lexicon: caput
  rationale: Se mantiene la metáfora nominal literal del texto. ‘Jefes’ o ‘líderes’ interpretarían el término hacia un rango social específico que el latino no explicita.
theological_decisions:
- issue: Sentido de ‘labore multo’ en una frase de carga social/política
  english_pob_reading: with much oppression
  chosen_spanish_reading: con mucha opresión
  alternative_spanish_readings:
  - con mucho trabajo
  - con mucha aflicción
  - con gran fatiga
  rationale: La lectura auditada del inglés entiende ‘labor’ no como trabajo neutral sino como opresión. El español debe conservar esa tensión, porque el contexto describe una condición gravosa de los habitantes. ‘Opresión’ es la opción que mejor preserva el peso social del pasaje.
  doctrine_reference: No doctrinal issue; lexical-contextual decision only.
translation_notes:
  revision_awareness: 'La edición inglesa revisó la puntuación para unir mejor la segunda cláusula con ‘therefore’ (propter hoc) mediante punto y coma. El español sigue esa conexión con punto y coma: ‘... antes de estos; por eso...’.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, pero sin arcaísmos innecesarios.
  - Se conserva la imagen de ‘las cabezas’ porque el texto latino no desarrolla la metáfora en ‘gobernantes’ o ‘jefes’.
  - No se capitaliza ‘tierra’ porque el contexto no exige un referente cosmológico solemne distinto del sustantivo común.
