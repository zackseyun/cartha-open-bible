translation:
  language: es
  text: Y ahora vayan, cada uno a su casa, y yo vendré a ustedes después de estos días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ite
  english_pob_choice: go
  chosen_spanish: id
  alternatives_spanish:
  - vayan
  - marchen
  lexicon: Latin ite
  rationale: El imperativo plural latino pide una forma breve y natural en español. "Id" conserva el valor directo del mandato sin añadir matices inexistentes.
- source_word: unusquisque uestrum
  english_pob_choice: each of you
  chosen_spanish: cada uno de vosotros
  alternatives_spanish:
  - cada uno de ustedes
  - cada cual
  lexicon: Latin unusquisque vestrum
  rationale: El original enfatiza la individualidad dentro del plural. "Cada uno" reproduce ese valor distributivo; "de vosotros" mantiene la referencia plural inmediata del texto.
- source_word: in domum suam
  english_pob_choice: to his own house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a la casa de él
  - a su propia casa
  lexicon: Latin domus
  rationale: La expresión es idiomática en español como destino de regreso al hogar. "A su casa" comunica la posesión reflexiva sin sobrerregularizar con una paráfrasis pesada.
- source_word: ego ueniam ad uos
  english_pob_choice: I will come to you
  chosen_spanish: yo vendré a vosotros
  alternatives_spanish:
  - yo iré a vosotros
  - vendré a ustedes
  lexicon: Latin veniam ad vos
  rationale: '"Vendré" expresa el futuro simple del latín y conserva la promesa de retorno. "A vosotros" mantiene la segunda persona plural explícita del texto base.'
- source_word: post dies istos
  english_pob_choice: after these days
  chosen_spanish: después de estos días
  alternatives_spanish:
  - tras estos días
  - al cabo de estos días
  lexicon: Latin post dies istos
  rationale: La construcción temporal se traduce de forma directa y natural. "Después de estos días" es clara y fiel al valor secuencial del original.
theological_decisions:
- issue: Ausencia de términos teológicamente cargados; mandato de despedida y promesa de regreso
  english_pob_reading: And now go... and I will come to you after these days.
  chosen_spanish_reading: Y ahora id... y yo vendré a vosotros después de estos días.
  alternative_spanish_readings:
  - Y ahora vayan... y yo iré a ustedes después de estos días.
  - Y ahora marchen... y volveré a ustedes después de estos días.
  rationale: No hay tensión doctrinal específica en el versículo; la decisión principal es mantener el tono de despedida y la promesa futura sin introducir explicaciones. Se conserva la relación directa entre mandato y promesa.
  doctrine_reference: No doctrinal issue specific to this verse
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; el acuerdo cruzado fue alto (1.0). La redacción española sigue de cerca el latín limpio y el sentido ya estabilizado por la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene "vosotros" para reflejar el plural explícito del original y la dirección plural de la frase.
  - Se evita "SEÑOR" u otros equivalentes teológicos porque el versículo no contiene vocabulario divino.
  - '"Casa" se usa en sentido doméstico común, no como término técnico.'
