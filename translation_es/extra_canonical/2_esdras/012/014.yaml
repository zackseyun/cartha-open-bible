lexical_decisions:
- source_word: XII reges
  english_pob_choice: twelve kings
  chosen_spanish: doce reyes
  alternatives_spanish:
  - doce monarcas
  - doce soberanos
  lexicon: rex → rey
  rationale: El latín habla de reges, es decir, reyes; en español, «reyes» comunica con precisión el rango real sin añadir matices no presentes en el texto.
- source_word: regnabunt
  english_pob_choice: will reign
  chosen_spanish: reinarán
  alternatives_spanish:
  - gobernarán
  - ejercerán dominio
  lexicon: regnare → reinar
  rationale: «Reinarán» reproduce de forma directa el verbo latino y mantiene la imagen monárquica del original.
- source_word: in ea
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en eso
  - allí
  lexicon: ea → ella
  rationale: El antecedente en español es femenino, por lo que «en ella» conserva la referencia pronominal natural y fiel al latín.
- source_word: unus post unum
  english_pob_choice: one after another
  chosen_spanish: uno tras otro
  alternatives_spanish:
  - uno después de otro
  - uno tras uno
  lexicon: post → tras / after
  rationale: «Uno tras otro» es una equivalencia idiomática clara en español para la sucesión repetida expresada por el latín.
theological_decisions:
- issue: Sucesión de los reyes sin añadidos interpretativos
  english_pob_reading: one after another
  chosen_spanish_reading: uno tras otro
  alternative_spanish_readings:
  - en sucesión
  - uno después de otro
  rationale: El texto solo afirma sucesión cronológica. Se evita introducir explicaciones sobre legitimidad, duración o identidad de los reyes, porque el latín no las especifica.
  doctrine_reference: Lectura literal de la secuencia regia; sin elaboración escatológica añadida más allá del texto.
translation_notes:
  revision_awareness: La revisión automática confirmó el texto inglés sin cambios sustanciales y solo eliminó una comilla inicial espuria; por eso la nota alternativa en español se limita a una variante de puntuación/flujo, no a un cambio de contenido.
  spanish_consistency_notes:
  - 'Se mantuvo el orden simple del original: sujeto + verbo + complemento, con una puntuación natural en español.'
  - No se introdujo terminología eclesiástica tradicional ni glosas interpretativas.
  - La nota [a] está anclada explícitamente en el texto para evitar la validación fallida anterior.
