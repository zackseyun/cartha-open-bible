base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/012/003.yaml
  text: Then I awoke from great bewilderment of mind and from great fear[a], and I said to my spirit, “See, you have brought these things upon me, because
  footnotes:
  - marker: a
    text: Or 'the great excess of my mind'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:50:24Z'
    unchanged: false
    changes_summary: Revised 'a deep trance' to 'great bewilderment of mind' for closer lexical accuracy to Latin excessu mentis; changed 'this' to 'these things' to reflect haec; completed the unfinished clause with 'because' to represent in eo quod.
translation:
  language: es
  text: 'Entonces desperté de una gran confusión de la mente[a] y de un gran temor, y dije a mi espíritu: «Mira, tú me has ocasionado estas cosas, porque…»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la gran confusión de mi mente».
    reason: Alternativa más literal para excessu mentis, preservando la variante documentada en el rastro inglés.
lexical_decisions:
- source_word: excessu mentis
  english_pob_choice: great bewilderment of mind
  chosen_spanish: una gran confusión de espíritu
  alternatives_spanish:
  - un gran desvarío de la mente
  - un gran éxtasis de la mente
  - un profundo trance
  lexicon: excessus mentis
  rationale: La locución latina describe un estado de alteración mental/visionaria. En español, «confusión de espíritu» conserva la idea de desorientación interior sin sonar tan técnico como «éxtasis» ni tan literal como «exceso de la mente». La revisión inglesa osciló entre «deep trance» y «great bewilderment of mind»; aquí se privilegia una formulación natural que sigue la tensión semántica del original.
- source_word: a magno timore
  english_pob_choice: from great fear
  chosen_spanish: de un gran temor
  alternatives_spanish:
  - del gran miedo
  - de mucho temor
  lexicon: timor
  rationale: «Temor» conserva el matiz más solemne y bíblico del latín timor, evitando reducirlo a simple miedo psicológico. La repetición con la cláusula anterior mantiene dos causas distintas del despertar.
- source_word: spiritui meo
  english_pob_choice: to my spirit
  chosen_spanish: a mi espíritu
  alternatives_spanish:
  - a mi alma
  - a mi ser interior
  lexicon: spiritus
  rationale: Se conserva «espíritu» porque el texto distingue el interlocutor interior de Ezra; traducirlo por «alma» o «ser interior» suavizaría esa distinción y añadiría interpretación.
- source_word: haec
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas circunstancias
  lexicon: haec
  rationale: Se refleja el plural del demostrativo latino y la corrección del audit trail inglés («these things»). «Estas cosas» es claro y mantiene la referencia a múltiples eventos o revelaciones.
- source_word: in eo quod
  english_pob_choice: because
  chosen_spanish: porque…
  alternatives_spanish:
  - puesto que…
  - en cuanto a que…
  lexicon: in eo quod
  rationale: La cláusula queda abierta en el versículo proporcionado, así que se traduce con una subordinación causal natural en español y puntos suspensivos para indicar que el segmento latino continúa en la fuente completa. No se fuerza una clausura inexistente en el testimonio citado.
theological_decisions:
- issue: Estado visionario o psicológico de Ezra al despertar
  english_pob_reading: great bewilderment of mind
  chosen_spanish_reading: una gran confusión de espíritu
  alternative_spanish_readings:
  - un gran desvarío de la mente
  - un profundo trance
  rationale: El texto no exige decidir entre un estado extático y una perturbación mental ordinaria; el latín excessu mentis permite ambas lecturas. La formulación elegida preserva esa tensión sin desactivarla, en consonancia con la revisión inglesa que abandonó «deep trance» por una expresión más cercana al latín.
  doctrine_reference: 2 Esdras 12:3; uso narrativo de visiones y despertar
- issue: Relación entre el despertar y el temor
  english_pob_reading: from great fear
  chosen_spanish_reading: de un gran temor
  alternative_spanish_readings:
  - de un gran miedo
  rationale: Se mantiene el temor como respuesta reverente/intensa ante la experiencia visionaria, sin convertirlo en mero susto. Esto preserva el tono apocalíptico del pasaje.
  doctrine_reference: Literatura apocalíptica; reacciones humanas ante revelación
- issue: Dirección de la frase a su propio espíritu
  english_pob_reading: I said to my spirit
  chosen_spanish_reading: dije a mi espíritu
  alternative_spanish_readings:
  - dije a mi alma
  rationale: Se conserva la antropología implícita del texto, donde Ezra habla con su propio espíritu. Cambiarlo por «alma» introduciría una equivalencia no atestiguada por el latín.
  doctrine_reference: Antropología bíblica; distinción alma/espíritu en traducción
translation_notes:
  revision_awareness: 'El borrador sigue la revisión inglesa más reciente en dos puntos: refleja la idea de «great bewilderment of mind» en vez de «deep trance», y traduce haec como plural («estas cosas»). También deja abierta la cláusula final porque el latín citado termina en in eo quod y el pasaje continúa en la fuente mayor.'
  spanish_consistency_notes:
  - Uso «Yahvé» solo cuando corresponda al tetragrámaton; aquí no aparece.
  - Conservo «espíritu» en sentido interno, coherente con el uso POB de πνεῦμα/רוּחַ cuando el contexto es antropológico.
  - No introduzco «Cristo/Mesías» ni terminología doctrinal ajena al versículo.
  - El estilo intenta ser culto pero legible en español latinoamericano, sin calcos innecesarios.
