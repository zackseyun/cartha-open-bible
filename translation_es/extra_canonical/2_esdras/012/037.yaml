  alternatives_spanish:
  - todo esto
  - estas cosas
  lexicon: Latin omnis + iste
  rationale: «Omnia ista» conserva el valor de totalidad cercano con demostrativo; «todas estas cosas» refleja ese alcance sin sobretraducción.
- source_word: in libro
  english_pob_choice: in a book
  chosen_spanish: en un libro
  alternatives_spanish:
  - en el libro
  - por escrito
  lexicon: Latin liber
  rationale: El latín usa el complemento locativo/instrumental con «libro»; en español, «en un libro» mantiene la imagen concreta y la dirección del mandato.
theological_decisions:
- issue: Alcance del mandato y materialidad del registro
  english_pob_reading: Therefore write all these things in a book.
  chosen_spanish_reading: Por tanto, escribe todas estas cosas en un libro.
