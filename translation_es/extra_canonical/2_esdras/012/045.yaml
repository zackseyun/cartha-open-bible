translation:
  language: es
  text: de Sion. Porque no somos mejores que aquellos que murieron allí.” Y lloraron en alta voz.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Sion
  english_pob_choice: of Zion.
  chosen_spanish: de Sion.
  alternatives_spanish:
  - de Sión
  - desde Sion
  lexicon: Sion / Sión
  rationale: El latín conserva el topónimo Sion; en español bíblico puede escribirse sin tilde o con tilde. Se eligió «Sion» para mantener la forma simple y uniforme, sin alterar el referente.
- source_word: nec enim nos meliores sumus
  english_pob_choice: For we are no better
  chosen_spanish: Porque no somos mejores
  alternatives_spanish:
  - Pues no somos mejores
  - Porque no somos superiores
  lexicon: non melior
  rationale: «Meliores» expresa comparación moral o de condición; «mejores» lo comunica de forma natural y directa. «Superiores» sería más interpretativo y menos fiel al paralelismo del latín.
- source_word: eorum, qui ibi mortui sunt
  english_pob_choice: than those who died there
  chosen_spanish: que aquellos que murieron allí
  alternatives_spanish:
  - que los que murieron allí
  - que quienes murieron allí
  lexicon: qui ibi mortui sunt
  rationale: La cláusula relativa latina se vierte de manera llana por «aquellos que murieron allí», conservando el referente humano y el lugar sin añadir matices ajenos.
- source_word: et plorauerunt uoce magna
  english_pob_choice: And they wept with a loud voice
  chosen_spanish: Y lloraron con voz fuerte
  alternatives_spanish:
  - Y lloraron en alta voz
  - Y lloraron con gran voz
  lexicon: plorare / vox magna
  rationale: «Voz fuerte» refleja el carácter audible e intenso de «voce magna» sin forzar un giro más idiomático pero menos literal que «en alta voz». «Lloraron» conserva el verbo de duelo del latín.
theological_decisions:
- issue: Tono de lamento comunitario ante la muerte en Sion
  english_pob_reading: And they wept with a loud voice.
  chosen_spanish_reading: Y lloraron con voz fuerte.
  alternative_spanish_readings:
  - Y lloraron en alta voz.
  - Y clamaron llorando con voz fuerte.
  rationale: El latín describe un llanto público y sonoro; la versión española conserva el lamento sin convertirlo en una exclamación distinta ni introducir una interpretación adicional.
  doctrine_reference: Lamento bíblico / duelo comunitario
translation_notes:
  revision_awareness: El pasaje coincide con el texto latino limpio de Bensly 1895 y el fragmento faltante de Bensly 1875. La auditoría inglesa no registró notas ni revisiones; la traducción española sigue de cerca el sentido confirmado por el control cruzado de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Sion» como topónimo consistente con el source latino.
  - Se traduce el comparativo de manera directa con «no somos mejores» para preservar la humildad implícita del pasaje.
  - Se conserva «lloraron» para reproducir el lamento del original sin ampliar el contenido emocional.
