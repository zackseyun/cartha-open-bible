base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/012/021.yaml
  text: whose times will be brief and whose years swift. Two of them will perish when the middle time draws near[a], but four will be preserved for the time when its end begins to draw near,
  footnotes:
  - marker: a
    text: Or 'whose times will be light and whose years swift.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:50:36Z'
    unchanged: false
    changes_summary: Changed 'kept' to 'preserved' for a more formal register and closer match to Latin seruabuntur; otherwise left the draft intact.
translation:
  language: es
  text: cuyos tiempos serán breves y cuyos años veloces. Dos de ellos perecerán cuando se acerque el tiempo medio[a], pero cuatro serán preservados para el tiempo en que comience a acercarse su fin,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘cuyos tiempos serán ligeros y cuyos años veloces’.
    reason: alternative_reading
lexical_decisions:
- source_word: leuia
  english_pob_choice: whose times will be brief
  chosen_spanish: cuyos tiempos serán breves
  alternatives_spanish:
  - cuyos tiempos serán ligeros
  - cuyos tiempos serán cortos
  lexicon: levis -> breve / corto
  rationale: En este contexto temporal, la revisión inglesa corrige la idea de 'light' hacia 'brief'. En español, 'breves' reproduce bien la fugacidad de los períodos descritos sin introducir una imagen física extraña.
- source_word: anni citati
  english_pob_choice: and whose years swift
  chosen_spanish: y cuyos años rápidos
  alternatives_spanish:
  - y cuyos años veloces
  - y cuyos años apresurados
  lexicon: citatus -> rápido, apresurado
  rationale: '''Citati'' expresa rapidez o prisa; ''rápidos'' es natural en español y conserva la sencillez del paralelo con ''tiempos breves''.'
- source_word: duo quidem ex ipsis perient
  english_pob_choice: Two of them will perish
  chosen_spanish: Dos de ellos perecerán
  alternatives_spanish:
  - Dos de ellos morirán
  - Dos de ellos desaparecerán
  lexicon: pereo -> perecer
  rationale: '''Perecerán'' mantiene el matiz de destrucción o ruina que puede ser más fuerte que simplemente ''morirán'', y sigue la fuerza del latín.'
- source_word: Adpropinquante tempore medio
  english_pob_choice: when the middle time draws near
  chosen_spanish: cuando se acerque el tiempo medio
  alternatives_spanish:
  - cuando se acerque el tiempo central
  - al acercarse el tiempo medio
  lexicon: adpropinquare -> acercarse
  rationale: Se conserva la estructura temporal del original. 'Tiempo medio' traduce literalmente 'tempore medio' y mantiene la tensión profética del pasaje.
- source_word: seruabuntur
  english_pob_choice: will be preserved
  chosen_spanish: serán preservados
  alternatives_spanish:
  - serán guardados
  - serán conservados
  lexicon: servo -> preservar / guardar
  rationale: La revisión inglesa prefirió 'preserved' frente a 'kept'. 'Preservados' es formal, fiel a 'seruabuntur' y evita una reducción semántica.
- source_word: in tempore cum incipiet adpropinquare tempus eius ut finiatur
  english_pob_choice: for the time when its end begins to draw near
  chosen_spanish: para el tiempo en que comience a acercarse su fin
  alternatives_spanish:
  - para el tiempo en que su fin empiece a acercarse
  - hasta el tiempo en que comience a acercarse su fin
  lexicon: finiri -> terminarse / llegar a su fin
  rationale: La versión española sigue la sintaxis de la revisión inglesa y conserva la relación entre 'su fin' y el acercamiento del final, sin añadir explicaciones no presentes en el texto.
translation_notes:
  revision_awareness: Se siguió la revisión auditada que corrigió la lectura inglesa de 'light' a 'brief' para leuia, y también la revisión que prefirió 'preserved' frente a 'kept' para seruabuntur. La redacción española refleja esas decisiones y evita volver a la lectura anterior.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre 'tiempos' y 'años' para reflejar la estructura del latín.
  - '''Preservados'' se usó para seruabuntur por concordar con la revisión auditada y con un registro formal.'
  - La nota al pie marca la alternativa histórica de 'ligeros' para leuia, pero el texto principal adopta 'breves' por la revisión más reciente.
