translation:
  language: es
  text: 'Y me dijo: «Esta es la interpretación de la visión que viste: el águila que viste subir desde el mar—esto es»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: uidisti
  english_pob_choice: you saw
  chosen_spanish: viste
  alternatives_spanish:
  - has visto
  lexicon: ver
  rationale: El perfecto latino con sentido de visión ya realizada se expresa con naturalidad en español como «viste», manteniendo la referencia directa a la experiencia profética.
- source_word: Aquilam
  english_pob_choice: the eagle
  chosen_spanish: el águila
  alternatives_spanish:
  - la águila
  lexicon: aquila
  rationale: Aunque «águila» es femenino en el uso estándar, el artículo masculino «el» es la forma culta y tradicional antes de palabras tónicas iniciales en /a/; conserva la referencia exacta al ave sin afectar el sentido.
- source_word: ascendentem de mari
  english_pob_choice: coming up from the sea
  chosen_spanish: subir del mar
  alternatives_spanish:
  - subiendo del mar
  - que subía del mar
  - ascendiendo del mar
  lexicon: ascendere
  rationale: El participio latino expresa movimiento ascendente, no necesariamente un proceso prolongado; «subir del mar» reproduce la imagen con concisión y evita una perífrasis excesivamente interpretativa.
theological_decisions:
- issue: Introducción de la interpretación de la visión
  english_pob_reading: This is the interpretation of the vision that you saw
  chosen_spanish_reading: Esta es la interpretación de la visión que viste
  alternative_spanish_readings:
  - Ésta es la interpretación de la visión que viste
  - Esta es la explicación de la visión que viste
  rationale: Se mantiene «interpretación» porque el latín hoc est introduce una explicación/identificación del símbolo, no una simple paráfrasis. «Visión» preserva el marco profético del pasaje.
  doctrine_reference: Hermenéutica profética en el contexto de 2 Esdras 12
translation_notes:
  revision_awareness: La revisión inglesa eliminó el demostrativo innecesario antes de «vision» para ajustarse mejor al latín y sonar más natural. El español sigue esa misma línea al usar simplemente «la visión», sin añadir un equivalente de «this».
  spanish_consistency_notes:
  - Se mantiene «águila» como símbolo identificado por el texto sin introducir interpretaciones extra.
  - Se conserva el inciso final «—esto es» porque el latín hoc est queda abierto y la cláusula continúa en el versículo siguiente.
