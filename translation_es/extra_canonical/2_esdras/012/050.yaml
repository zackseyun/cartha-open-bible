    unchanged: false
    changes_summary: 'Revised for closer lexical accuracy: rendered profectus est as ''departed'' rather than ''went away,'' preserved the singular object of ei as ''him'' rather than ''them,'' and kept the sentence formal and natural.'
translation:
  language: es
  text: Y el pueblo partió a la ciudad, como le dije a él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: profectus est
  english_pob_choice: departed
  chosen_spanish: partió
  alternatives_spanish:
  - departió
  - se fue
  lexicon: Latin proficisci
  rationale: Partió expresa con naturalidad el movimiento de salida/departida sin añadir matices innecesarios; conserva el valor verbal formal de la fuente y la decisión inglesa de ''departed''.
- source_word: populus
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo
  lexicon: Latin populus
  rationale: '''''El pueblo'''' mantiene el sustantivo colectivo bíblico y es más fiel al registro del latín que ''''la gente'''', que sería más coloquial.'
- source_word: in ciuitatem
  english_pob_choice: into the city
  chosen_spanish: hacia la ciudad
  alternatives_spanish:
  - a la ciudad
  - en la ciudad
  lexicon: Latin in + accusative
  rationale: La preposición latina indica movimiento hacia el interior de la ciudad; en español, ''hacia la ciudad'' conserva el dinamismo de entrada sin forzar un calco duro.
- source_word: sicut dixi ei
  english_pob_choice: as I told him
  chosen_spanish: como le dije a él
  alternatives_spanish:
  - como le dije
  - tal como le dije
  lexicon: Latin sicut + dixi + ei
  rationale: Se conserva el destinatario singular de ''ei'' con ''le dije a él'' para reflejar la precisión de la revisión inglesa que corrigió ''them'' por ''him''. La duplicación pronominal es natural en español y evita ambigüedad.
theological_decisions:
- issue: Referencia singular de ei
  english_pob_reading: as I told him
  chosen_spanish_reading: como le dije a él
  alternative_spanish_readings:
  - como les dije
  - como le dije
  rationale: No hay base en la fuente para pluralizar el destinatario. Mantener el singular preserva la correspondencia con el latino ''ei'' y evita perder una distinción textual importante.
  doctrine_reference: Fidelidad textual; precisión pronominal
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió ''them'' a ''him'' y ''went away'' a ''departed''. La versión española refleja esas decisiones con ''partió'' y el singular ''le dije a él'', manteniendo un registro formal y directo.
  spanish_consistency_notes:
  - Se mantuvo ''el pueblo'' para populus por coherencia bíblica y por su neutralidad de registro.
  - Se evitó ''SEÑOR'' u otras convenciones de ocultación porque el versículo no contiene el tetragrámaton ni κύριος.
  - No se añadieron notas textuales porque el testimonio fuente y la tradición auditada coinciden plenamente.
