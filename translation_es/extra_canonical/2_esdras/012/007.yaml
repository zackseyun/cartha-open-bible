source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: nator domine, si inueni gratiam ante oculos tuos, et si iustificatus sum apud te prae multis, et si certum ascendit deprecatio mea ante faciem tuam, Conforta me et ostende seruo tuo mihi
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/012/007.yaml
  text: And I said[a], “O Sovereign Lord, if I have found favor before your eyes, and if I have been justified before you more than many, and if my petition has surely gone up before your face, strengthen me and show yourself to me, your slave.”
  footnotes:
  - marker: a
    text: Or 'And I said, “Lord, Master, if I have found favor before your eyes, and if I have been justified before you more than many, and if my petition has truly gone up before your face, strengthen me'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:51:00Z'
    unchanged: false
    changes_summary: Completed the final clause by rendering ostende ... mihi as 'show yourself to me,' and adjusted 'truly' to 'surely' for a more natural match to certum. Also rendered servo as 'slave' per POB policy.
translation:
  language: es
  text: 'Y dije[a]: «Oh Señor soberano, si he hallado favor ante tus ojos, y si he sido justificado delante de ti más que muchos, y si mi súplica ciertamente ha subido ante tu presencia, fortaléceme y muéstrate a mí, tu esclavo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y dije: “Señor, Maestro, si he hallado favor ante tus ojos, y si he sido justificado delante de ti más que muchos, y si mi súplica verdaderamente ha subido ante tu presencia, fortaléceme”».'
    reason: Preservar la alternativa documentada en la auditoría inglesa como historial de traducción previa.
lexical_decisions:
- source_word: dominator domine
  english_pob_choice: O Sovereign Lord
  chosen_spanish: Oh Señor soberano
  alternatives_spanish:
  - Oh Soberano Señor
  - Oh Señor, Soberano
  lexicon: dominator / domine
  rationale: El latín une un vocativo de soberanía con el nombre divino/título de señorío. En español, «Señor soberano» conserva la dignidad apocalíptica sin caer en una fórmula eclesiástica más interpretativa como «Señor y Maestro».
- source_word: gratiam
  english_pob_choice: found favor
  chosen_spanish: he hallado gracia
  alternatives_spanish:
  - he hallado favor
  - he encontrado gracia
  lexicon: gratia
  rationale: «Gracia» mantiene la correspondencia con el latín gratiam y con el uso bíblico de favor inmerecido. «Favor» sería posible, pero debilita la resonancia lexical del texto fuente.
- source_word: iustificatus sum
  english_pob_choice: I have been justified
  chosen_spanish: he sido justificado
  alternatives_spanish:
  - he sido declarado justo
  - he sido vindicado
  lexicon: iustificare
  rationale: Se conserva la fuerza forense/legal del verbo. «Declarado justo» explicita el sentido, pero «justificado» es más directo y fiel al registro del original.
- source_word: prae multis
  english_pob_choice: more than many
  chosen_spanish: más que muchos
  alternatives_spanish:
  - por encima de muchos
  - más que a muchos
  lexicon: prae + multus
  rationale: La comparación directa refleja el latín sin añadir matices ajenos. «Más que muchos» es natural en español y conserva la relación comparativa.
- source_word: deprecatio mea
  english_pob_choice: my petition
  chosen_spanish: mi súplica
  alternatives_spanish:
  - mi petición
  - mi ruego
  lexicon: deprecatio
  rationale: «Súplica» conserva el tono reverente y la intensidad orante del sustantivo latino mejor que «petición», que suena más neutral.
- source_word: certum ascendit
  english_pob_choice: has surely gone up
  chosen_spanish: ha subido ciertamente
  alternatives_spanish:
  - ha subido seguramente
  - ha ascendido con certeza
  lexicon: certum / ascendit
  rationale: '«Ciertamente» traduce la certeza de certum sin forzar un adverbio demasiado coloquial. El orden invertido en español mantiene la fluidez: «ha subido ciertamente».'
- source_word: ostende ... mihi
  english_pob_choice: show yourself to me
  chosen_spanish: muéstrate a mí
  alternatives_spanish:
  - muéstrame
  - reveálate a mí
  lexicon: ostendere
  rationale: 'La revisión auditada concluye que el objeto implícito es reflexivo en la formulación española: «muéstrate a mí». Esto evita perder el énfasis de aparición personal que el inglés POB también quiso preservar.'
- source_word: servo tuo
  english_pob_choice: your slave
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  lexicon: servus
  rationale: Se conserva la fuerza léxica de servus/servo conforme a la política POB. «Esclavo» mantiene la rudeza y dependencia total del término, mientras que «siervo» suavizaría indebidamente el original.
theological_decisions:
- issue: Tratamiento del título divino apocalíptico
  english_pob_reading: O Sovereign Lord
  chosen_spanish_reading: Oh Señor soberano
  alternative_spanish_readings:
  - Oh Soberano Señor
  - Oh Señor y Maestro
  rationale: El latín dominator domine refleja una invocación solemne de autoridad. «Señor soberano» expresa reverencia y supremacía sin sustituir el título por una fórmula litúrgica tradicional que no está exigida por el texto.
  doctrine_reference: Apocalíptica / invocación a la soberanía divina
- issue: Valor forense de 'iustificatus sum'
  english_pob_reading: I have been justified before you
  chosen_spanish_reading: he sido justificado delante de ti
  alternative_spanish_readings:
  - he sido declarado justo delante de ti
  - he sido vindicado delante de ti
  rationale: La traducción mantiene el sentido jurídico o de vindicación que la forma pasiva sugiere. «Justificado» conserva la ambigüedad productiva entre declaración y vindicación sin reducirla a una sola explicación.
  doctrine_reference: Justificación / vindicación
- issue: Final clause about divine self-disclosure
  english_pob_reading: show yourself to me, your slave
  chosen_spanish_reading: muéstrate a mí, tu esclavo
  alternative_spanish_readings:
  - muéstrame, tu esclavo
  - revélate a mí, tu esclavo
  rationale: La revisión del texto fuente exige restaurar la cláusula final en este versículo. «Muéstrate» preserva el acto de manifestación personal de ostende, mientras que «revelarte» sería más interpretativo.
  doctrine_reference: Teofanía / manifestación divina
translation_notes:
  revision_awareness: Se tuvo en cuenta la corrección auditada que restituye la cláusula final «et ostende seruo tuo mihi» en este versículo y la revisión posterior que afinó la relación entre 'certum' y 'surely'. También se respetó la decisión POB de traducir servo como 'slave' y de leer 'ostende ... mihi' como una petición de manifestación personal.
  spanish_consistency_notes:
  - Se mantuvo un registro solemne y directo, sin suavizar 'esclavo' a 'siervo'.
  - Se evitó 'SEÑOR' como máscara tipográfica; el vocativo se expresa con el título completo en español.
  - Se conservaron las repeticiones de primera persona y de vocativo para reflejar la acumulación retórica del original.
  - La puntuación reproduce una sola oración extensa con incisos condicionales, conforme al latín y al inglés auditado.
