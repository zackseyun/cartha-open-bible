base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/012/032.yaml
  text: This is the Anointed One[12:32], whom the Most High has reserved for the end against them and their impieties[a]. He will rebuke them for their injustices and will set their contempt before them.
  footnotes:
  - marker: '12:32'
    text: Latin 'unctus' is literally 'anointed.' In this vision the figure functions as the end-time deliverer who rebukes the eagle-kingdom and rescues the remnant, so the messianic force should be heard even where the main text keeps the literal title.
    reason: messianic_passage
  - marker: a
    text: Or '“And the lion that you saw rousing itself from the forest, roaring and speaking to the eagle and reproving it for its injustices and all its words, as you heard—'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:50:47Z'
    unchanged: false
    changes_summary: Changed 'has kept' to 'has reserved' to more closely match reservavit. No other changes needed.
translation:
  language: es
  text: Este es el Ungido[a], a quien el Altísimo ha reservado para el fin contra ellos y sus impiedades. Él los reprenderá por sus injusticias y les pondrá delante su menosprecio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Mesías». El latín unctus significa literalmente «ungido»; en esta visión la figura actúa como el libertador del tiempo final, de modo que debe oírse la fuerza mesiánica aunque el texto principal conserve el título literal.
    reason: messianic_passage
lexical_decisions:
- source_word: unctus
  english_pob_choice: This is the Anointed One
  chosen_spanish: Este es el Ungido
  alternatives_spanish:
  - Este es el Mesías
  - Este es el Cristo
  lexicon: unctus
  rationale: El latín unctus significa literalmente «ungido». Dado que el texto de auditorio POB conserva el valor literal para no ocultar la imagen, «Ungido» reproduce con fidelidad el título y deja oír la fuerza mesiánica sin imponer una forma litúrgica tradicional.
- source_word: reservavit Altissimus
  english_pob_choice: whom the Most High has reserved for the end
  chosen_spanish: a quien el Altísimo ha reservado para el fin
  alternatives_spanish:
  - a quien el Altísimo ha guardado para el fin
  - a quien el Altísimo ha destinado para el fin
  lexicon: reservare
  rationale: «Reservar» comunica mejor la idea de apartar y conservar para un momento determinado. «Guardar» y «destinar» son posibles, pero «reservado» mantiene la correspondencia directa con el latín y el matiz de designación para un momento final.
- source_word: in finem
  english_pob_choice: for the end
  chosen_spanish: para el fin
  alternatives_spanish:
  - hasta el fin
  - para el final
  lexicon: finis
  rationale: La frase latina apunta al tiempo escatológico, no simplemente al final de una secuencia. «Para el fin» conserva la sobriedad del original y el valor de término final/escatológico.
- source_word: impietates ipsorum
  english_pob_choice: their impieties
  chosen_spanish: sus impiedades
  alternatives_spanish:
  - sus impiedades y maldades
  - su impiedad
  lexicon: impietas
  rationale: «Impiedades» es el equivalente más directo y conserva el plural del latín. En español puede sonar algo elevado, pero aquí es adecuado para un registro bíblico y evita diluir la acusación moral.
- source_word: arguet illos
  english_pob_choice: He will rebuke them
  chosen_spanish: Él los reprenderá
  alternatives_spanish:
  - Él los acusará
  - Él los corregirá
  lexicon: arguere
  rationale: «Reprender» mantiene el valor de confrontación judicial/moral del verbo latino sin intensificarlo más de lo debido. «Acusará» desplaza el sentido hacia un tribunal formal; «corregirá» suena más pedagógico que confrontativo.
- source_word: iniustitiis ipsorum
  english_pob_choice: their injustices
  chosen_spanish: sus injusticias
  alternatives_spanish:
  - sus injusticias y errores
  - sus faltas
  lexicon: iniustitia
  rationale: «Injusticias» reproduce el sustantivo plural y conserva la acusación ética/legal del texto. «Faltas» sería demasiado general y perdería fuerza.
- source_word: infulciet coram ipsis spretiones eorum
  english_pob_choice: will set their contempt before them
  chosen_spanish: pondrá delante de ellos sus desprecios
  alternatives_spanish:
  - pondrá delante de ellos su desprecio
  - les pondrá delante sus ultrajes
  lexicon: infulcire
  rationale: 'El latín es difícil: infulciet literalmente sugiere «clavar/introducir con fuerza», y el POB inglés opta por una imagen de exposición pública. «Pondrá delante de ellos» conserva esa puesta en evidencia sin sobreinterpretar el mecanismo. «Desprecios» sigue de cerca spretiones, aunque en español también puede oírse como «actos de desprecio»; se conserva así la ambigüedad del original entre el desprecio cometido y el desprecio experimentado.'
theological_decisions:
- issue: Título mesiánico en un texto apocalíptico
  english_pob_reading: This is the Anointed One
  chosen_spanish_reading: Este es el Ungido
  alternative_spanish_readings:
  - Este es el Mesías
  - Este es el Cristo
  rationale: El contexto identifica a la figura como agente escatológico. Traducir con «Ungido» preserva la base léxica del latín y permite que la carga mesiánica se entienda sin sustituirla por una formulación eclesiástica más interpretativa.
  doctrine_reference: Cristología mesiánica en literatura apocalíptica; lenguaje del Ungido/Mesías
- issue: Alcance escatológico de 'in finem'
  english_pob_reading: for the end
  chosen_spanish_reading: para el fin
  alternative_spanish_readings:
  - hasta el fin
  - para el final
  rationale: El texto no habla de una meta abstracta sino del momento final de intervención divina. Mantener «el fin» conserva la resonancia escatológica y evita suavizar el horizonte de juicio y liberación.
  doctrine_reference: Escatología bíblica y juicio final
- issue: Exposición pública del desprecio/injuria
  english_pob_reading: will set their contempt before them
  chosen_spanish_reading: pondrá delante de ellos sus desprecios
  alternative_spanish_readings:
  - pondrá delante de ellos su desprecio
  - les pondrá delante sus ultrajes
  rationale: La imagen no sólo acusa acciones, sino que las hace visibles ante los propios culpables. La redacción española conserva esa exposición pública y la ambigüedad del sustantivo latino sin resolverla artificialmente.
  doctrine_reference: Juicio retributivo y manifestación pública de las obras
translation_notes:
  revision_awareness: El texto fuente latino de 2 Esdras 12:32 es hic est unctus, quem reservavit Altissimus in finem ad eos et impietates ipsorum. arguet illos de iniustitiis ipsorum et infulciet coram ipsis spretiones eorum. La revisión reciente corrigió una desalineación importante en el inglés POB, que antes reflejaba el contenido del verso previo sobre el león. Esta propuesta española sigue el texto latino real de 12:32 y no reproduce la lectura errónea del fragmento anterior.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para Altissimus en coherencia con el registro bíblico.
  - Se evita «SEÑOR» para no ocultar el término del original.
  - «Ungido» conserva la tensión entre traducción literal y lectura mesiánica indicada por el audit trail inglés.
  - Se preserva el plural «impiedades» y «injusticias» porque el latín está en plural.
