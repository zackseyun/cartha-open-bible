revisions:
- from: Este es el Ungido[a], a quien el Altísimo ha reservado para el fin contra ellos y sus impiedades. Él los reprenderá por sus injusticias y pondrá delante de ellos sus desprecios.
  to: Este es el Ungido[a], a quien el Altísimo ha reservado para el fin contra ellos y sus impiedades. Él los reprenderá por sus injusticias y les pondrá delante su menosprecio.
  rationale: Se conserva la fidelidad básica del borrador, pero se mejora la legibilidad y precisión semántica de la cláusula final sustituyendo «sus desprecios» por «su menosprecio», que expresa mejor la idea de exponer ante ellos su actitud despreciativa. También se ajusta la nota para reflejar con mayor exactitud la racionalidad documentada del POB sobre unctus.
