translation:
  language: es
  text: el cuarto reino que fue visto en una visión por Daniel, tu hermano. Pero no se le interpretó como ahora te lo interpreto yo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: regnum quartum
  english_pob_choice: the fourth kingdom
  chosen_spanish: el cuarto reino
  alternatives_spanish:
  - el cuarto dominio
  - el cuarto imperio
  lexicon: regnum -> reino
  rationale: '"Reino" es el equivalente directo y más natural en español para regnum en este contexto apocalíptico. "Imperio" o "dominio" introducirían matices más específicos que el latín no obliga aquí.'
- source_word: quod uisum est in uisu
  english_pob_choice: that was seen in a vision
  chosen_spanish: que fue visto en visión
  alternatives_spanish:
  - que se vio en una visión
  - que fue contemplado en una visión
  lexicon: uisum est / in uisu -> videor / visio
  rationale: Mantengo la relación entre el verbo pasivo y el sustantivo "visión". La forma "en visión" conserva la estructura del original sin añadir artículos innecesarios.
- source_word: Danihelo fratri tuo
  english_pob_choice: by Daniel your brother
  chosen_spanish: por Daniel, tu hermano
  alternatives_spanish:
  - por tu hermano Daniel
  - por Daniel, tu hermano
  lexicon: frater -> hermano
  rationale: El latín usa un dativo/frase referida a Daniel como hermano del destinatario; en español la formulación más clara y fiel es "tu hermano". Conserva el vínculo familiar y evita explicitar una relación que el texto no desarrolla.
- source_word: Sed non est illi interpretatum
  english_pob_choice: But it was not interpreted to him
  chosen_spanish: Pero no le fue interpretado
  alternatives_spanish:
  - Pero no se le interpretó
  - Mas no le fue interpretado
  lexicon: interpretor -> interpretar
  rationale: '"Le fue interpretado" mantiene el pasivo y el destinatario indirecto del latín. La pasiva refleja es posible, pero aquí la pasiva perifrástica conserva mejor el paralelismo con el original.'
- source_word: quomodo ego nunc tibi interpretor
  english_pob_choice: as I now interpret it to you
  chosen_spanish: como ahora te lo interpreto yo
  alternatives_spanish:
  - como ahora te lo interpreto
  - tal como ahora yo te lo interpreto
  lexicon: quomodo ... interpretor -> como ... interpreto
  rationale: '"Como" reproduce la subordinación comparativa/explicativa del latín. El pronombre "lo" explicita el objeto entendido en el contexto y "yo" preserva el contraste enfático de "ego".'
theological_decisions:
- issue: Referencia a Daniel como "tu hermano"
  english_pob_reading: Daniel your brother
  chosen_spanish_reading: Daniel, tu hermano
  alternative_spanish_readings:
  - tu hermano Daniel
  - Daniel tu hermano
  rationale: No se suaviza ni se reinterpreta la designación familiar; se conserva tal como funciona en el latín, como parte de la identificación del profeta Daniel dentro de la visión.
  doctrine_reference: Relación intertextual y designación profética, sin implicación doctrinal adicional
translation_notes:
  revision_awareness: Se siguió el texto latino limpiado de Bensly 1895/1875 y el audit trail inglés sin cambios de revisión relevantes; la versión inglesa ya mostraba alto acuerdo y no requería correcciones.
  spanish_consistency_notes:
  - Se mantuvo "visión" para visio y no se sustituyó por "sueño" o "revelación", porque el latín usa visus/visio.
  - 'Se preservó el orden retórico del original: identificación del reino, comparación con la visión de Daniel, y contraste entre la interpretación anterior y la actual.'
  - No se capitalizó "hermano" como título; se usa en sentido relacional ordinario.
