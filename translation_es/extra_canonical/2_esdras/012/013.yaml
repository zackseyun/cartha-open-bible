translation:
  language: es
  text: sobre la tierra, y será el terror de todos los reinos que fueron antes de ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: super terram
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - por toda la tierra
  lexicon: super + accusative/ablative
  rationale: La preposición latina indica localización/alcance espacial; «sobre la tierra» conserva la relación espacial directa y suena natural en español bíblico. Se evita omitir la frase, dado el ajuste textual del audit trail.
- source_word: erit
  english_pob_choice: it will be
  chosen_spanish: será
  alternatives_spanish:
  - va a ser
  - estará
  lexicon: sum, futurum
  rationale: Futuro simple natural en español para expresar el estado/declaración futura del texto sin añadir matiz aspectual no contenido en el latín.
- source_word: timoratio
  english_pob_choice: the terror of
  chosen_spanish: el terror de
  alternatives_spanish:
  - el miedo de
  - causará terror a
  lexicon: timoratio (noun of effect/fear)
  rationale: El sustantivo latino nombra el efecto de temor/terror; «el terror de» reproduce esa fuerza nominal mejor que una paráfrasis verbal. Se evita convertirlo en comparativo, conforme a la revisión del POB inglés.
- source_word: omnium regnorum
  english_pob_choice: of all the kingdoms
  chosen_spanish: de todos los reinos
  alternatives_spanish:
  - entre todos los reinos
  - para todos los reinos
  lexicon: omnis + regnum
  rationale: Traducción directa y auditable del genitivo partitivo/relacional; «reinos» conserva el ámbito político del latín.
- source_word: quae fuerunt ante eam
  english_pob_choice: that were before it
  chosen_spanish: que fueron antes de ella
  alternatives_spanish:
  - que existieron antes de ella
  - que habían sido antes de ella
  lexicon: qui + sum + ante
  rationale: Mantiene la referencia anafórica del neutro/estado político en español con «ella», siguiendo el valor de «regna» y la redacción inglesa. No se añade una comparación inexistente en el fuente.
theological_decisions:
- issue: Ausencia de una comparación explícita en el latín revisado
  english_pob_reading: the terror of all the kingdoms that were before it
  chosen_spanish_reading: el terror de todos los reinos que fueron antes de ella
  alternative_spanish_readings:
  - más terrible que todos los reinos que fueron antes de ella
  - más aterrador que todos los reinos anteriores
  rationale: La revisión del POB inglés corrigió una comparación no sustentada; el español sigue esa decisión y conserva la formulación nominal sin introducir «más» ni un comparativo.
  doctrine_reference: Principio de fidelidad textual y no-expansión semántica
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del audit trail: no introduce el comparativo anterior («más terrible que»), y conserva la cláusula inicial «sobre la tierra», que la revisión señaló como omitida indebidamente en el borrador anterior.'
  spanish_consistency_notes:
  - Se mantiene «reinos» para regna y el pronombre femenino «ella» por concordancia con «reinos» en el marco del texto latino y la tradición de traducción bíblica.
  - No se usa «SEÑOR» ni terminología doctrinal no presente en el versículo.
  - 'La puntuación refleja dos cláusulas coordinadas, como en el latín: ubicación inicial y predicado futuro.'
