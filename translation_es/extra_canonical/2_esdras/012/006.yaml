translation:
  language: es
  text: Ahora, pues, oraré al Altísimo, para que me fortalezca hasta el fin.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: altissimum
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Altísimo Dios
  lexicon: Latin altissimus; divine title
  rationale: El latín usa un título divino sustantivado. En español, «el Altísimo» conserva el valor reverencial y nominal sin añadir explícitamente «Dios», que no está en el texto fuente.
- source_word: confortet
  english_pob_choice: may strengthen me
  chosen_spanish: me fortalezca
  alternatives_spanish:
  - me dé fuerzas
  - me sostenga
  lexicon: Latin confortare; strengthen/fortify
  rationale: En este contexto el verbo pide la idea de dar vigor para perseverar hasta el final. «Fortalezca» expresa mejor la fuerza sostenedora que un simple «consolar» o «animar».
- source_word: usque in finem
  english_pob_choice: to the end
  chosen_spanish: hasta el fin
  alternatives_spanish:
  - hasta el final
  - hasta el término
  lexicon: Latin usque in finem
  rationale: La fórmula latina es directa y se traduce con naturalidad por «hasta el fin», que mantiene la amplitud temporal y la solemnidad del cierre.
theological_decisions:
- issue: Referencia a Dios como Altísimo
  english_pob_reading: Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - Dios Altísimo
  - el Altísimo Dios
  rationale: La frase remite a un título divino clásico sin necesidad de explicitar más. Mantenerlo como título nominal conserva la densidad teológica del original y evita sobreinterpretación.
  doctrine_reference: Nombre/título divino en la literatura bíblica; cf. uso veterotestamentario de Elyon/Altísimo
translation_notes:
  revision_awareness: 'El testimonio latino recibido es breve y no muestra variantes textuales relevantes en el tramo traducido. La frase inglesa de auditoría coincide de cerca con el sentido del texto latino: oración al Altísimo pidiendo fortaleza hasta el final.'
  spanish_consistency_notes:
  - 'Se mantiene el tratamiento reverente de los títulos divinos con artículo: «el Altísimo».'
  - Se usa «fortalezca» para conservar la idea de apoyo eficaz y perseverante que exige el contexto.
  - No se añade contenido ausente en el latín; la cláusula queda en estilo sobrio y publicable.
