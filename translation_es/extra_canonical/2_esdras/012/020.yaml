  text: '“Y porque viste ocho pequeñas alas pegadas a sus alas, esta es la interpretación: ocho reyes se levantarán en él,”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: uidisti
  english_pob_choice: And because you saw
  chosen_spanish: Y porque viste
  alternatives_spanish:
  - Y como viste
  - Y por cuanto viste
  lexicon: Latin uidisti
  rationale: El perfecto latino de segunda persona singular se rinde naturalmente con ‘viste’. Se conserva el vínculo causal/interprétativo con ‘porque’, siguiendo el sentido de la frase introductoria en el contexto inglés.
- source_word: subalares octo
  english_pob_choice: eight little wings
  chosen_spanish: ocho alitas
  alternatives_spanish:
  - ocho pequeñas alas
  - ocho alitas pequeñas
  lexicon: Latin subalares octo
  rationale: ‘subalares’ literalmente apunta a algo menor o subordinado a las alas principales; el inglés POB eligió ‘little wings’. En español, ‘alitas’ comunica esa reducción de tamaño sin volverlo demasiado técnico.
- source_word: coherentes alis eius
  english_pob_choice: clinging to its wings
  chosen_spanish: adheridas a sus alas
  alternatives_spanish:
  - pegadas a sus alas
  - aferradas a sus alas
  lexicon: Latin coherentes alis eius
  rationale: ‘coherentes’ expresa estar unidas o pegadas a algo. ‘Adheridas’ mantiene la relación física sin introducir una imagen más fuerte que la del latino.
- source_word: interpretatio
  english_pob_choice: this is the interpretation
  chosen_spanish: esta es la interpretación
  alternatives_spanish:
  - esta es la explicación
  - ésta es la interpretación
  lexicon: Latin interpretatio
  rationale: ‘interpretatio’ se traduce de manera directa y sobria por ‘interpretación’, en concordancia con el registro de la sección apocalíptica.
- source_word: exsurgent enim in ipso octo reges
  english_pob_choice: eight kings will arise in it
  chosen_spanish: ocho reyes se levantarán en él
  alternatives_spanish:
  - surgirán ocho reyes en él
  - aparecerán ocho reyes en él
  lexicon: Latin exsurgent ... octo reges
  rationale: ‘exsurgent’ tiene fuerza de surgir/levantarse. ‘Se levantarán’ conserva la imagen de aparición y ascenso político, como en el inglés POB, sin suavizarla a ‘aparecerán’.
- source_word: in ipso
  english_pob_choice: in it
  chosen_spanish: en él
  alternatives_spanish:
  - dentro de él
  - en eso
  lexicon: Latin in ipso
  rationale: El antecedente implícito es un reino o figura masculina en el contexto. ‘En él’ preserva la referencia y la concordancia natural en español.
theological_decisions:
- issue: Interpretación de una visión simbólica con reyes sucesivos
  english_pob_reading: eight kings will arise in it
  chosen_spanish_reading: ocho reyes se levantarán en él
  alternative_spanish_readings:
  - surgirán ocho reyes en él
  - aparecerán ocho reyes en él
  rationale: No se introduce una explicación adicional sobre la identidad de los reyes; la formulación española mantiene la apertura interpretativa del texto fuente y la lectura inglesa.
  doctrine_reference: Apocalíptica simbólica; mantener la ambigüedad del símbolo según el texto
- issue: Imagen de alas pequeñas adheridas a alas mayores
  english_pob_reading: eight little wings clinging to its wings
  chosen_spanish_reading: ocho alitas adheridas a sus alas
  alternative_spanish_readings:
  - ocho pequeñas alas pegadas a sus alas
  - ocho alitas aferradas a sus alas
  rationale: 'Se conserva la tensión imagética del original: diminutivo + adhesión. No se la interpreta alegóricamente en el texto principal, para no exceder la evidencia disponible.'
  doctrine_reference: Respeto a la imaginería profética sin glosa doctrinal añadida
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el control cruzado reporta alto acuerdo; por eso la propuesta sigue de cerca la lectura inglesa auditada y el latín limpio de Bensly sin innovaciones textuales.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y apocalíptico, apto para lectura eclesial.
  - Se conserva ‘interpretación’ en lugar de ‘explicación’ para reflejar el vocabulario de la sección.
  - No se usa ‘SEÑOR’ ni terminología ajena al pasaje, porque el texto no contiene el nombre divino ni cristología explícita.
  - El diminutivo ‘alitas’ comunica el valor de subalares sin perder naturalidad en español.
