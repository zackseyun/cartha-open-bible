translation:
  language: es
  text: o como lo he interpretado. He aquí, vienen días, y se levantará un reino,
  philosophy: formal
lexical_decisions:
- source_word: uel interpretatus sum
  english_pob_choice: or as I have interpreted it
  chosen_spanish: o como lo he interpretado
  alternatives_spanish:
  - o como lo he interpretado yo
  - o según mi interpretación
  lexicon: interpreto / interpretar
  rationale: El latín expresa una glosa en primera persona ligada a la interpretación previa; en español, 'como lo he interpretado' conserva la referencia interpretativa sin añadir contenido ajeno ni suavizar la autoconciencia del hablante.
- source_word: Ecce
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: ecce
  rationale: '''He aquí'' mantiene el valor de anuncio solemne y bíblico del demostrativo latino, con registro digno y claro para lectura eclesial.'
- source_word: dies ueniunt
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - se acercan días
  - están llegando días
  lexicon: dies / veniunt
  rationale: El presente latino 'veniunt' se vuelve naturalmente 'vienen' en español; 'vienen días' preserva la inmediatez profética sin introducir una perífrasis innecesaria.
- source_word: exsurget
  english_pob_choice: will arise
  chosen_spanish: se levantará
  alternatives_spanish:
  - surgirá
  - aparecerá
  lexicon: exsurgo
  rationale: '''Se levantará'' reproduce el movimiento ascendente/irruptivo de ''exsurget'' y conserva un matiz profético tradicional sin depender de una calca rígida.'
- source_word: regnum
  english_pob_choice: a kingdom
  chosen_spanish: un reino
  alternatives_spanish:
  - un reinado
  - un dominio
  lexicon: regnum
  rationale: '''Reino'' es la correspondencia directa y más transparente para ''regnum'' en este contexto; ''reinado'' o ''dominio'' serían interpretaciones más específicas no exigidas por el fragmento.'
translation_notes:
  revision_awareness: La revisión del texto inglés eliminó 'upon the earth' por no estar en el latín proporcionado y ajustó la conexión cláusular con 'and'. El español sigue ese estado revisado y no añade localización geográfica ni otros expansivos ausentes en la fuente.
  spanish_consistency_notes:
  - Se mantuvo la estructura breve y paratáctica del fragmento latino.
  - No se usó 'Cristo', 'Yahvé' ni otras terminologías no presentes en el pasaje.
  - La puntuación reproduce una pausa clara entre la glosa interpretativa y el anuncio profético.
