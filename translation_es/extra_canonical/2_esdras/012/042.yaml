review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el latín en las imágenes principales: «racimo de la vendimia» por botrus de uindemia y «lámpara en un lugar oscuro» por lucerna in loco obscuro. También intenta reflejar el perfecto de sedisti. Sin embargo, la cláusula «tú nos superas a todos los profetas» no representa bien la sintaxis de Tu enim nobis superasti ex omnibus prophetis. En español, «nos superas a todos los profetas» hace de «nos» objeto directo y resulta semántica y gramaticalmente confuso. El sentido comparativo es más bien «superas, para nosotros, a todos los profetas» o, con español más natural, «superas a todos los profetas para nosotros».'
  spanish_quality_summary: La lectura general es comprensible y digna, pero hay un problema importante de naturalidad y corrección en «nos superas a todos los profetas». Además, «Has estado sentado» es defendible por el valor resultativo del perfecto latino, pero en español suena algo pesado; «Te has sentado» sería más idiomático aunque algo más ingresivo. Dado el rastro de auditoría inglés, puede conservarse «Has estado sentado» si se prioriza la cercanía aspectual. Con el ajuste de la cláusula comparativa, el verso queda claro y legible.
  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones léxicas sobre «racimo», «vendimia» y «lámpara» están alineadas con el proyecto. La única desalineación relevante es sintáctico-semántica en la representación de nobis con «nos», que debe repararse para no falsear la relación expresada en el latín.
  issues:
  - severity: high
    issue: Construcción española defectuosa en «tú nos superas a todos los profetas»
    rationale: Esta frase sugiere que «nos» es objeto de «superas» y luego añade «a todos los profetas» como segundo objeto/comparativo, lo cual no refleja bien nobis ... ex omnibus prophetis. El latín expresa la valoración/comparación desde la perspectiva de «nosotros», no que el destinatario supere simultáneamente a «nosotros» y a «todos los profetas».
  - severity: low
    issue: «Has estado sentado» es algo poco idiomático en español bíblico corriente
    rationale: Aunque intenta conservar el perfecto resultativo de sedisti y sigue la auditoría inglesa, en español suena más pesado que alternativas como «te has sentado». No obstante, no es incorrecto y puede mantenerse si se prioriza la correspondencia aspectual.
  revised_spanish_text: ¿Has estado sentado en este lugar? Pues tú superas a todos los profetas para nosotros, como un racimo de la vendimia y como una lámpara en un lugar oscuro,
  revision_rationale: Se corrige la cláusula central para representar con español natural la relación de nobis ... ex omnibus prophetis, evitando la construcción defectuosa «nos superas a todos los profetas». Se mantienen las imágenes y el tratamiento del perfecto latino ya documentados en la auditoría inglesa.
