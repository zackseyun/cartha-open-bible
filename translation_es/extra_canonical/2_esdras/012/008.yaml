translation:
  language: es
  text: la interpretación y la distinción de esta visión terrible[a], para que consueles plenamente mi alma. Porque me has tenido por digno
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y muestres la interpretación a tu siervo». Esa redacción refleja una traducción alternativa previa; en el latín editado aquí, este versículo comienza con los objetos directos «la interpretación y la distinción».'
    reason: previous_rendering
lexical_decisions:
- source_word: interpretationem
  english_pob_choice: the interpretation
  chosen_spanish: la interpretación
  alternatives_spanish:
  - la explicación
  - el sentido
  lexicon: interpretatio
  rationale: El latino pide un sustantivo de comprensión del significado; «interpretación» conserva el valor directo y transparente en español.
- source_word: distinctionem
  english_pob_choice: the distinction
  chosen_spanish: la distinción
  alternatives_spanish:
  - la aclaración
  - la diferencia
  lexicon: distinctio
  rationale: «Distinción» refleja la segunda coordinación latina sin borrar la posible idea de diferenciación o aclaración del sueño/visión.
- source_word: uisus horribilis huius
  english_pob_choice: this dreadful vision
  chosen_spanish: esta visión terrible
  alternatives_spanish:
  - esta visión espantosa
  - esta visión horrible
  lexicon: visus
  rationale: «Visión» es el término más natural y fiel; «terrible» mantiene la fuerza afectiva de horribilis sin cargar excesivamente el registro.
- source_word: plenissime consoles animam meam
  english_pob_choice: so that you may fully comfort my soul
  chosen_spanish: para que así consueles plenamente mi alma
  alternatives_spanish:
  - para que me consueles completamente
  - para que confortes del todo mi alma
  lexicon: consolor
  rationale: Se conserva el valor de consolar/confortar y el adverbio intensivo plenissime con «plenamente»; «mi alma» sigue el objeto latino sin sustituirlo por una paráfrasis.
- source_word: Dignum enim me habuisti
  english_pob_choice: For you have counted me worthy
  chosen_spanish: Porque me has tenido por digno
  alternatives_spanish:
  - Pues me has considerado digno
  - Porque me juzgaste digno
  lexicon: dignus / habeo
  rationale: «Tener por digno» es una equivalencia idiomática clara para el juicio de mérito o dignidad expresado por el verbo latino con dignum.
theological_decisions:
- issue: Relación causal-final entre la petición y el consuelo
  english_pob_reading: so that you may fully comfort my soul
  chosen_spanish_reading: para que así consueles plenamente mi alma
  alternative_spanish_readings:
  - para que consueles plenamente mi alma
  - a fin de que consueles plenamente mi alma
  rationale: La revisión inglesa corrigió 'that' a 'so that' para expresar finalidad; el español debe conservar ese matiz teleológico sin convertirlo en mera subordinación declarativa.
  doctrine_reference: Nada doctrinal específico; fidelidad al valor final del ruego.
translation_notes:
  revision_awareness: 'La tradición inglesa de trabajo pasó por una corrección importante: se eliminó la duplicación indebida ''and show your servant'' en el comienzo del versículo, porque ese material pertenece al final del versículo 7. Luego se afinó la relación final de ''that'' a ''so that''. El español sigue esa lectura revisada y no reintroduce la frase descartada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto solo cuando el nombre divino aparece en el texto; en este versículo no aparece, así que no se introduce.
  - «Digno» conserva la valoración personal sin añadir tonos litúrgicos ajenos al latino.
  - La puntuación con coma antes de «para que» sigue el flujo del ruego y ayuda a marcar la finalidad.
