translation:
  language: es
  text: Esta es la interpretación de las doce alas que viste.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Haec est interpretatio
  english_pob_choice: This is the interpretation
  chosen_spanish: Esta es la interpretación
  alternatives_spanish:
  - Ésta es la interpretación
  - Esta es la explicación
  lexicon: haec / interpretatio
  rationale: «Interpretación» reproduce con precisión el sentido de explicar o descifrar un significado revelado, y mantiene la cercanía al texto latino y al inglés auditado sin añadir matices ajenos. «Explicación» sería posible, pero debilita el carácter interpretativo-profético del término.
- source_word: xii alarum
  english_pob_choice: the twelve wings
  chosen_spanish: las doce alas
  alternatives_spanish:
  - las doce plumas
  - los doce aleteos
  lexicon: xii / alae
  rationale: «Alas» es la correspondencia directa y natural en español para alae. El número se mantiene en forma cardinal concordante con el sustantivo femenino plural.
- source_word: quas ... vidisti
  english_pob_choice: that you saw
  chosen_spanish: que viste
  alternatives_spanish:
  - que has visto
  - que miraste
  lexicon: quas / vidisti
  rationale: «Que viste» conserva la referencia visual simple del perfecto latino en un castellano natural y sobrio. No se introduce un aspecto compuesto que el texto no requiere.
theological_decisions:
- issue: Naturaleza del enunciado como interpretación revelada, no simple comentario
  english_pob_reading: This is the interpretation of the twelve wings that you saw.
  chosen_spanish_reading: Esta es la interpretación de las doce alas que viste.
  alternative_spanish_readings:
  - Esta es la explicación de las doce alas que viste.
  - Ésta es la interpretación de las doce alas que viste.
  rationale: El verso presenta una fórmula interpretativa autoritativa. «Interpretación» conserva mejor ese valor que una paráfrasis más libre y mantiene la estructura breve del original.
  doctrine_reference: 2 Esdras 12:16; fórmula interpretativa profética
translation_notes:
  revision_awareness: El texto latino transmitido es breve y coincide estrechamente con la traducción inglesa auditada; no se documentaron revisiones ni tensiones textuales que requieran nota adicional. La versión española sigue de cerca el sentido directo del latín limpio.
  spanish_consistency_notes:
  - Se usa «interpretación» de manera consistente con el valor técnico de interpretatio.
  - No se introducen términos teológicos no presentes en el verso.
  - El pronombre relativo implícito se resuelve de forma natural en español sin alterar el contenido.
