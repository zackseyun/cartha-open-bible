translation:
  language: es
  text: como viste[a]. Y el león que viste despertándose del bosque, rugiendo y hablándole al águila, y reprochándole sus injusticias y todas sus palabras, como oíste—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘como viste’.
    reason: alternative_reading
lexical_decisions:
- source_word: uidisti
  english_pob_choice: as you saw.
  chosen_spanish: como viste.
  alternatives_spanish:
  - así como viste
  - según viste
  lexicon: videre
  rationale: El latín final uidisti cierra la unidad anterior con un simple “viste”; en español, “como viste” reproduce la función conclusiva sin añadir contenido. Se evita convertirlo en una fórmula más interpretativa.
- source_word: leonem
  english_pob_choice: the lion
  chosen_spanish: el león
  alternatives_spanish:
  - el león salvaje
  - el león
  lexicon: leo
  rationale: Renderización directa y estable del sustantivo concreto. No hay razón textual para intensificarlo con adjetivos.
- source_word: de silua
  english_pob_choice: from the forest
  chosen_spanish: del bosque
  alternatives_spanish:
  - de la selva
  - del bosque
  lexicon: silva
  rationale: silva en este contexto latino puede ser “bosque” o “selva”. “Bosque” es más natural en español bíblico moderno y conserva el valor de lugar silvestre sin sobrecargar la escena.
- source_word: euigilantem
  english_pob_choice: rousing itself
  chosen_spanish: despertándose
  alternatives_spanish:
  - despertándose
  - al despertarse
  - levantándose
  lexicon: evigilo
  rationale: El participio sugiere el acto de salir del reposo o despertar; “despertándose” es claro y fluido en español. “Levantándose” podría desplazar el matiz de despertar.
- source_word: mugientem
  english_pob_choice: roaring
  chosen_spanish: rugiendo
  alternatives_spanish:
  - rugiendo
  - bramando
  lexicon: mugio
  rationale: Para un león, “rugiendo” es la equivalencia más natural y precisa en español. “Bramando” es posible, pero menos directo para esta imagen.
- source_word: loquentem ad aquilam
  english_pob_choice: speaking to the eagle
  chosen_spanish: hablando al águila
  alternatives_spanish:
  - hablando al águila
  - hablándole al águila
  lexicon: loquor
  rationale: Se conserva la dirección del habla con una construcción española sencilla. “Hablándole” sería más idiomático, pero “hablando al águila” mantiene la forma narrativa del original.
- source_word: arguentem eam iniustitias ipsius et omnes sermones eius
  english_pob_choice: reproving it for its injustices and all its words
  chosen_spanish: y reprochándole sus injusticias y todas sus palabras
  alternatives_spanish:
  - y reprendiéndola por sus injusticias y todas sus palabras
  - y reprochándole sus injusticias y todas sus palabras
  lexicon: arguo
  rationale: arguere aquí implica censurar o reprender con exposición de culpa. “Reprocharle” conserva esa fuerza sin sonar excesivamente técnico. Se mantiene “sus injusticias y todas sus palabras” siguiendo de cerca el latín, aun cuando la segunda coordinación resulta algo áspera en español; la tensión viene del texto fuente y no debe suavizarse sin base.
- source_word: sicut audisti
  english_pob_choice: as you heard—
  chosen_spanish: como oíste—
  alternatives_spanish:
  - como oíste—
  - tal como oíste—
  lexicon: sicut audire
  rationale: Cierra la cláusula con la equivalencia directa de “as you heard”, manteniendo el corte discursivo del guion largo. No se amplía a “según oíste” porque el latín sólo remite a la audición previa.
translation_notes:
  revision_awareness: 'El contexto auditado muestra una corrección mayor: el inglés anterior había perdido casi todo el contenido de esta línea por un error de división de versículo; el latín recuperado incluye desde “et leonem quem uidisti...” hasta “sicut audisti”. La traducción española incorpora esa restauración completa y no sigue la versión abreviada previa.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’/‘Mesías’/otros términos de proyecto sólo cuando aparezcan; en este versículo no hay uso directo de esos lemas.
  - Se conservó el paralelismo y la acumulación sintáctica del latín, porque el verso depende de una cadena de participios y complementos que conviene no domesticar en exceso.
  - La nota al pie se ancla en ‘como viste’ porque el arrastre inicial del segmento latino puede leerse como cierre del segmento anterior o como inicio del presente; la ambigüedad ya estaba presente en el auditor inglés.
