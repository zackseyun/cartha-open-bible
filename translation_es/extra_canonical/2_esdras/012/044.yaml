translation:
  language: es
  text: ¿O no bastan para nosotros los males que nos han sobrevenido? Si, entonces, tú nos abandonas, cuánto mejor nos habría sido si también hubiéramos sido quemados en el fuego[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'quemados en el incendio'.
    reason: Preserva la alternativa más literal documentada en la auditoría inglesa para succensi... in incendio.
lexical_decisions:
- source_word: mala / evils
  english_pob_choice: the evils that have happened to us
  chosen_spanish: los males que nos han sobrevenido
  alternatives_spanish:
  - las desgracias que nos han ocurrido
  - los males que nos han acontecido
  lexicon: mal / maldad / desgracia
  rationale: El latín habla de los males que “han ocurrido” o “han venido sobre” a los hablantes; “males” conserva el alcance general y “han sobrevenido” refleja el matiz de evento adverso sufrido, sin añadir interpretación.
- source_word: dereliqueris
  english_pob_choice: forsake
  chosen_spanish: abandonas
  alternatives_spanish:
  - desamparas
  - nos dejas
  lexicon: abandonar / desamparar
  rationale: La idea es de dejar o abandonar al pueblo en su aflicción. “Abandonas” es claro y natural en español, y mantiene la fuerza relacional del latín sin introducir un matiz más teológico de “desamparar” que no está explícito en el texto.
- source_word: succensi essemus ... in incendio
  english_pob_choice: we too had been burned in the fire
  chosen_spanish: hubiéramos sido quemados en el fuego
  alternatives_spanish:
  - hubiéramos sido consumidos en el fuego
  - hubiéramos ardido en el incendio
  lexicon: quemar / fuego / incendio
  rationale: El latín usa imagery de incendio. “Quemados en el fuego” sigue de cerca la construcción y preserva la imagen, mientras que “consumidos” explicaría más el resultado y “ardido” sería menos idiomático en este contexto.
theological_decisions:
- issue: Desamparo divino en forma de pregunta retórica
  english_pob_reading: If then you forsake us, how much better it would have been for us...
  chosen_spanish_reading: Si entonces tú nos abandonas, cuánto mejor nos habría sido...
  alternative_spanish_readings:
  - si entonces nos desamparas, cuánto mejor nos habría sido...
  - si entonces tú nos dejas, cuánto mejor nos habría sido...
  rationale: 'No se suaviza la queja: el texto presenta una lamentación retórica que confronta a Dios con el sufrimiento del pueblo. “Abandonas” conserva la acusación sin cargarla con una formulación doctrinal extra.'
  doctrine_reference: Lamentación bíblica; fidelidad pactual de Dios en el lenguaje de súplica
translation_notes:
  revision_awareness: La revisión inglesa eliminó una formulación torpe (“burned in the burning”) en favor de una más natural (“burned in the fire”); la versión española sigue directamente el latín con una imagen equivalente y no necesita nota alternativa específica.
  spanish_consistency_notes:
  - Se mantiene un tono formal y bíblico sin arcaísmos innecesarios.
  - Se conserva la pregunta retórica inicial con “¿O no...?”, acorde con el latín “nobis mala quae contigerunt?”.
  - No se introduce “SEÑOR” ni otros sustitutos; el pasaje usa segunda persona directa.
  - Se usa “fuego” en lugar de “incendio” para reflejar la revisión auditada en inglés y la simplicidad del latín “incendio”, sin perder la imagen original.
