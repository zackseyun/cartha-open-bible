  source_alignment_summary: 'El borrador español refleja bien el sentido del latín: una pregunta retórica sobre los males sufridos, seguida de la queja condicional de que, si Dios los abandona, habría sido mejor haber sido quemados. Sin embargo, omite la nota de alternativa preservada en la auditoría inglesa sobre la formulación final (''burned in the burning''), derivada de succensi... in incendio.'
