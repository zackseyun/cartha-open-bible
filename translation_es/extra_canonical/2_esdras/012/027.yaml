    unchanged: false
    changes_summary: 'Revised the second clause for lexical accuracy and natural English: changed ''the sword of the one'' to ''one sword'' to reflect Latin ''Vnius enim gladius,'' and adjusted ''with him'' to ''with it'' to match the sword as the referent.'
translation:
  language: es
  text: La espada los devorará[a]. Porque una espada devorará al que está con ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y porque viste que desapareció la cabeza más grande, esto significa que uno de ellos morirá en su cama, pero todavía con tormentos».'
    reason: alternative_reading
lexical_decisions:
- source_word: gladius
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - la cuchilla
  - el arma
  lexicon: gladius
  rationale: El latín usa gladius de modo literal; 'espada' es la equivalencia natural y fiel en español. Se mantiene el referente singular concreto que luego continúa con 'una espada' en la segunda cláusula.
- source_word: eos
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los destruirá
  lexicon: eos
  rationale: El acusativo plural pide un objeto directo plural. 'Los devorará' conserva el sentido violento de 'comedet' sin sobrecargar con explicaciones ajenas al texto.
- source_word: comedet
  english_pob_choice: will devour
  chosen_spanish: devorará
  alternatives_spanish:
  - comerá
  - consumirá
  lexicon: comedet
  rationale: '''Devorar'' reproduce el valor fuerte de ''comerá'' en español bíblico actual y evita la ambigüedad de ''comer'' aplicada a una espada, que en español sonaría demasiado literal o extraña.'
- source_word: Vnius enim gladius
  english_pob_choice: For one sword
  chosen_spanish: Porque una espada
  alternatives_spanish:
  - Pues una espada
  - Porque la espada de uno
  lexicon: Vnius
  rationale: '''Vnius'' aquí se entiende como ''de uno / una'', pero la revisión inglesa ya optó por hacer explícita la idea de ''one sword'' para reflejar el latín y evitar una lectura posesiva forzada. En español, ''una espada'' preserva la economía y la ambigüedad del original sin introducir un posesivo no garantizado.'
- source_word: qui cum eo
  english_pob_choice: who is with it
  chosen_spanish: al que está con ella
  alternatives_spanish:
  - al que está con él
  - a quien está con ella
  lexicon: qui cum eo
  rationale: El contexto exige que el pronombre retome a 'espada', no a una persona. Por eso se usa 'con ella' para mantener el referente femenino de 'espada' y respetar la revisión inglesa que corrigió el antecedente.
translation_notes:
  revision_awareness: La fuente latina de este versículo es 'gladius eos comedet. Vnius enim gladius comedet qui cum eo,'; el audit trail inglés indica que una versión previa estaba alineada por error con 2 Esdras 12:26. La presente traducción sigue el texto latino real de 12:27 y conserva la referencia violenta literal del pasaje.
  spanish_consistency_notes:
  - Se mantiene 'espada' en ambos miembros para reflejar la repetición del latín y la corrección de la revisión inglesa.
  - Se evita 'SEÑOR' o fórmulas litúrgicas porque no aparecen en este versículo.
  - El pronombre 'ella' sigue el género gramatical de 'espada' y hace explícita la corrección del antecedente en el segundo miembro.
