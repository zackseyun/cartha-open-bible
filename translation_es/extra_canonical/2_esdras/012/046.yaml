translation:
  language: es
  text: 'Y respondí a ellos y dije: «Cobra ánimo, Israel, y no te entristezcas».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otra traducción antigua incorpora aquí: «y no te entristezcas, casa de Jacob». Pero en la fuente latina proporcionada, «casa de Jacob» pertenece al comienzo del versículo siguiente.'
    reason: Preservar en español la alternativa documentada en la nota inglesa y aclarar la división correcta según la fuente de este versículo.
lexical_decisions:
- source_word: Confide
  english_pob_choice: Take courage
  chosen_spanish: Tened ánimo
  alternatives_spanish:
  - Cobrad ánimo
  - Ten confianza
  lexicon: Latin confide
  rationale: El latino 'Confide' expresa confianza/valor exhortativo. 'Tened ánimo' transmite de forma natural el imperativo plural y conserva el tono de ánimo sin volverlo demasiado interpretativo.
- source_word: Israel
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - pueblo de Israel
  lexicon: Latin Israel
  rationale: Se conserva el vocativo directo del texto fuente.
- source_word: noli tristari
  english_pob_choice: do not grieve
  chosen_spanish: no os entristezcáis
  alternatives_spanish:
  - no os aflijáis
  - no os lamentéis
  lexicon: Latin noli tristari
  rationale: '''Tristari'' apunta a la tristeza/aflicción; ''entristecerse'' reproduce bien el sentido afectivo en español y mantiene el paralelismo con la exhortación anterior.'
theological_decisions:
- issue: 'Alcance de la exhortación: consuelo a Israel como colectivo'
  english_pob_reading: Take courage, Israel, and do not grieve.
  chosen_spanish_reading: Tened ánimo, Israel, y no os entristezcáis.
  alternative_spanish_readings:
  - Cobrad ánimo, Israel, y no os lamentéis.
  - Tened valor, Israel, y no os aflijáis.
  rationale: El versículo es una exhortación consoladora al Israel colectivo; el español debe mantener el plural exhortativo y el tono pastoral sin introducir matices doctrinales ajenos al latín.
  doctrine_reference: Exhortación y consuelo comunitario
translation_notes:
  revision_awareness: 'La revisión más reciente solo ajustó la puntuación inglesa; el latín de 2 Esdras 12:46 sigue siendo ''et respondi ad eos et dixi: Confide Israel, et noli tristari'', sin ''house of Jacob''. Por eso no se incluye nota textual ni se incorpora esa frase al versículo.'
  spanish_consistency_notes:
  - Se usa 'Tened ánimo' para reflejar el imperativo de aliento del latín.
  - Se evita añadir 'casa de Jacob' porque no está en el texto latino de este versículo según el paquete fuente.
  - La puntuación española sigue el discurso directo con comillas angulares, adecuada para publicación.
