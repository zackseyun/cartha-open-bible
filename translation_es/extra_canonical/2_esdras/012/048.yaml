source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: et fortis non est oblitus uestri in contentione. Ego enim non dereliqui uos neque excessi a uobis, sed ueni in hunc locum ut deprecarer pro desolatione Sion, et ut quererem misericordiam pro humilitate sanctificationis uestrae. Et nunc ite unusquisque uestrum in domum suam et ego ueniam ad uos post dies istos. Et profectus est populus sicut dixi ei in ciuitatem. Ego autem sedi in campo vii diebus, sicut mihi mandauit, et manducabam de floribus solummodo agri, de herbis facta est mihi esca in diebus illis.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/012/048.yaml
  text: For I have not forsaken you, nor have I departed from you, but I came to this place to pray for the desolation of Zion and to seek mercy for the humiliation of your sanctuary.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:51:31Z'
    unchanged: false
    changes_summary: Changed 'withdrawn from you' to 'departed from you' for closer lexical alignment with excessi a vobis and more natural formal English. No other changes needed.
translation:
  language: es
  text: Porque no los he abandonado, ni me he alejado de ustedes, sino que vine a este lugar para rogar por la desolación de Sión y para pedir misericordia por la humillación de su santuario.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: non dereliqui uos
  english_pob_choice: I have not forsaken you
  chosen_spanish: no os he abandonado
  alternatives_spanish:
  - no os he dejado
  - no os he desamparado
  lexicon: derelinquere
  rationale: Abandonado comunica bien el valor relacional de forsaken/dereliqui en español contemporáneo sin introducir una connotación más técnica o eclesiástica que la del latín.
- source_word: excessi a vobis
  english_pob_choice: I have not departed from you
  chosen_spanish: ni me he apartado de vosotros
  alternatives_spanish:
  - ni me he alejado de vosotros
  - ni me he ido de vosotros
  lexicon: excedere / excedo
  rationale: Apartarme reproduce la idea de separación física o de alejamiento expresada por excessi a vobis, manteniendo la distinción respecto de no os he abandonado.
- source_word: ut deprecarer pro desolatione Sion
  english_pob_choice: to pray for the desolation of Zion
  chosen_spanish: para rogar por la desolación de Sión
  alternatives_spanish:
  - para suplicar por la desolación de Sión
  - para orar por la desolación de Sión
  lexicon: deprecari
  rationale: Rogar conserva la fuerza de súplica de deprecarer y evita suavizarlo a un mero 'orar'. 'Desolación de Sión' sigue de cerca el sustantivo latino y el nombre propio tradicional.
- source_word: misericordiam
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - clemencia
  lexicon: misericordia
  rationale: Misericordia es el equivalente directo y tradicional, y en español mantiene la amplitud del latín sin perder claridad.
- source_word: humilitate sanctificationis uestrae
  english_pob_choice: the humiliation of your sanctuary
  chosen_spanish: la humillación de vuestro santuario
  alternatives_spanish:
  - la humillación de vuestra santificación
  - la humillación de vuestra consagración
  lexicon: humilitas / sanctificatio
  rationale: La lectura de la POB en inglés entiende sanctificationis como referente al santuario; en español se conserva esa decisión para no borrar la tensión textual entre 'santidad/santificación' y 'santuario'. 'Humillación' sigue de cerca humilitate y mantiene el contraste con la santidad del lugar.
theological_decisions:
- issue: Relación entre 'Sión' y 'vuestro santuario'
  english_pob_reading: pray for the desolation of Zion ... the humiliation of your sanctuary
  chosen_spanish_reading: rogar por la desolación de Sión ... por la humillación de vuestro santuario
  alternative_spanish_readings:
  - rogar por la ruina de Sión ... por la profanación de vuestro santuario
  - rogar por la desolación de Sión ... por la humillación de vuestra santidad
  rationale: 'Se conserva la formulación de la POB porque el texto latino vincula dos realidades distintas: Sión como ciudad/pueblo y el santuario como objeto de humillación. No se sustituye ''santuario'' por una paráfrasis más teológica que aplane la referencia concreta.'
  doctrine_reference: Templo/santuario en la teología del Antiguo Testamento; Sión como centro del pueblo y culto.
- issue: Negación doble de ruptura con el pueblo
  english_pob_reading: I have not forsaken you, nor have I departed from you
  chosen_spanish_reading: no os he abandonado, ni me he apartado de vosotros
  alternative_spanish_readings:
  - no os he dejado, ni me he ido de vosotros
  - no os he desamparado, ni he salido de vosotros
  rationale: 'Se mantiene la doble negación para reflejar las dos cláusulas latinas con matices distintos: abandono relacional y apartamiento espacial. Esto preserva la intensidad pastoral del enunciado.'
  doctrine_reference: Fidelidad divina / intercesión del mediador en el relato.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de 'withdrawn from you' a 'departed from you' para alinearse mejor con excessi a vobis. La propuesta española sigue esa revisión con 'me he apartado de vosotros' y no introduce cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el tetragrámaton solo cuando aparece; aquí no aparece en el fragmento seleccionado.
  - Se mantiene el trato plural 'vosotros'/'os' para seguir la segunda persona plural del latín y la traducción inglesa auditada.
  - '''Santuario'' se conserva como término concreto; no se reemplaza por ''santidad'' para no perder la referencia cultual explícita.'
