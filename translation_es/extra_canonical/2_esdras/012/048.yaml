review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite fielmente el segmento traducido en la POB inglesa y se alinea bien con el latín: non dereliqui uos → «no os he abandonado»; excessi a vobis → «ni me he apartado de vosotros»; deprecarer → «rogar»; desolatione Sion → «desolación de Sión»; misericordiam → «misericordia». La única reserva significativa es «vuestro santuario», que mantiene la decisión inglesa pero suena menos natural en español bíblico que «su santuario» en referencia a Sión/pueblo.'
  spanish_quality_summary: El español es claro, digno y legible. Sin embargo, mezcla voseo reverencial peninsular («vosotros», «vuestro») con el objetivo de español neutral latinoamericano del proyecto. Conviene regularizar a «ustedes / su». Además, «apartado de ustedes» suena algo menos natural que «alejado de ustedes» en este contexto, aunque «apartado» es aceptable.
  glossary_alignment: 'No hay términos del glosario mayor en conflicto. «Sión» está bien. No aparecen Yahvé/Mesías/Cristo. La revisión principal es estilística y de registro regional: evitar «vosotros/vuestro» para cumplir el estándar de español neutral latinoamericano.'
  issues:
  - severity: medium
    issue: Uso de «vosotros/vuestro» en un proyecto de español neutral latinoamericano
    rationale: Aunque gramaticalmente correcto, rompe la pauta de registro objetivo del proyecto. «Ustedes / su» es más ampliamente legible en América Latina y mantiene dignidad sin arcaísmo regional.
  - severity: low
    issue: «me he apartado de ustedes» es menos idiomático que «me he alejado de ustedes»
    rationale: «Apartarse de» es válido y cercano al latín, pero «alejarse de» suena más natural en español contemporáneo sin perder el matiz de separación.
  - severity: low
    issue: «vuestro santuario»/«su santuario» sigue una decisión interpretativa no obvia
    rationale: El latín tiene humilitate sanctificationis uestrae, literalmente más cercano a «su santificación/santidad consagrada». La POB inglesa ya resolvió hacia «your sanctuary»; el español puede conservar esa línea, pero conviene reconocer que es una decisión interpretativa heredada.
  revised_spanish_text: Porque no los he abandonado, ni me he alejado de ustedes, sino que vine a este lugar para rogar por la desolación de Sión y para pedir misericordia por la humillación de su santuario.
  revision_rationale: Se ajusta el registro a español neutral latinoamericano reemplazando «vosotros/vuestro» por «ustedes/su». También se cambia «me he apartado» por «me he alejado» para mayor naturalidad contemporánea, manteniendo el contraste con «no los he abandonado». Se conserva «su santuario» siguiendo la decisión documentada de la POB inglesa, aunque el latín permita debate.
