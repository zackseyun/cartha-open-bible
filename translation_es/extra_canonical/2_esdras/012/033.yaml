translation:
  language: es
  text: Y sucederá que, cuando los reprenda, entonces los destruirá. Pues el resto[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El latín termina aquí en residuum («el resto» o «el remanente») y la frase continúa en el versículo siguiente. Una traducción anterior desalineada vertía aquí material del versículo previo: «Este es el Ungido, a quien el Altísimo ha guardado para el fin…».'
    reason: previous_rendering
lexical_decisions:
- source_word: arguerit eos
  english_pob_choice: when he has reproved them
  chosen_spanish: cuando los reprenda
  alternatives_spanish:
  - cuando los reprueba
  - cuando los corrija
  - cuando los amoneste
  lexicon: arguo
  rationale: El latín expresa reprensión o reprobación judicial/moral. En español, «reprenda» conserva la fuerza de una confrontación correctiva sin volverlo demasiado suave o meramente pedagógico.
- source_word: corrumpet eos
  english_pob_choice: then he will destroy them
  chosen_spanish: entonces los destruirá
  alternatives_spanish:
  - entonces los corromperá
  - entonces los arruinará
  - entonces los echará a perder
  lexicon: corrumpo
  rationale: Aquí el contexto muestra resultado punitivo; «destruirá» comunica bien la fuerza final de corrumpet en este pasaje, mientras que «corromperá» en español podría sonar principalmente moral y no reflejaría tan claramente el juicio anunciado.
- source_word: Nam residuum
  english_pob_choice: For the remnant
  chosen_spanish: Porque el resto[a]
  alternatives_spanish:
  - Porque el remanente[a]
  - Pues el resto[a]
  - Porque el remanente restante[a]
  lexicon: residuum
  rationale: residuum significa lo que queda, el resto o remanente. «Resto» es natural en español y mantiene la referencia incompleta del segmento, que continúa en el siguiente versículo.
theological_decisions:
- issue: Alcance del juicio anunciado en el fragmento
  english_pob_reading: And it will be, when he has reproved them, then he will destroy them. For the remnant
  chosen_spanish_reading: Y sucederá que, cuando los reprenda, entonces los destruirá. Porque el resto
  alternative_spanish_readings:
  - Y sucederá que, cuando los reprenda, entonces los arruinará. Porque el remanente
  - Y será que, cuando los reprenda, entonces los destruirá. Pues el resto
  rationale: El pasaje latino de 2 Esdras 12:33, según el archivo fuente, contiene una secuencia de reprensión seguida de destrucción; no introduce aquí la expansión cristológica que aparecía por desalineación en el borrador inglés previo. La traducción española sigue ese juicio inmediato y deja abierto el complemento del versículo siguiente.
  doctrine_reference: 2 Esdras 12:33; revisión aplicada por desalineación textual en el borrador inglés
translation_notes:
  revision_awareness: 'El borrador inglés previo estaba desalineado: atribuía a 12:33 una lectura cristológica que pertenece a 12:32. La base latina de este versículo es et erit cum arguerit eos, tunc corrumpet eos. Nam residuum, por lo que la versión española sigue la secuencia correcta de reprensión y destrucción, dejando el final incompleto como en la fuente.'
  spanish_consistency_notes:
  - Se mantiene «Y sucederá que» para et erit, fórmula sobria y fiel al latín.
  - Se evita «Mesías» o «Cristo» porque el latín de este versículo no contiene el título unctus; esa cuestión pertenece al versículo anterior.
  - «Resto» se usa como equivalente de residuum; «remanente» queda como alternativa posible si el contexto inmediato favorece un registro más bíblico.
  - La nota al pie marca el corte textual real del versículo y explica por qué la frase queda truncada.
