translation:
  language: es
  text: 'Pero ellos formaron este plan entre sí: que dejarían la multitud de las naciones e irían a una región más lejana, donde nunca había vivido ningún ser humano, para que allí guardaran sus estatutos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: consilium hoc
  english_pob_choice: they formed this plan among themselves
  chosen_spanish: trazaron este plan entre sí
  alternatives_spanish:
  - formaron este plan entre sí
  - acordaron este plan entre sí
  lexicon: consilium
  rationale: En el contexto, consilium expresa una resolución o plan deliberado; «trazaron» conserva la idea de elaborar o concebir el plan con intención, y «entre sí» refleja el sentido recíproco de intersección interna del latín y del inglés POB.
- source_word: derelinquerent multitudinem gentium
  english_pob_choice: they would leave the multitude of the nations
  chosen_spanish: dejarían la multitud de las naciones
  alternatives_spanish:
  - abandonarían la multitud de las naciones
  - dejarían a la multitud de las naciones
  lexicon: derelinquere; multitudo gentium
  rationale: «Dejarían» reproduce el valor de abandono/marcha sin añadir dureza excesiva; «multitud de las naciones» conserva la expresión colectiva del original, que no se reduce simplemente a «las naciones».
- source_word: proficiscerentur in ulteriorem regionem
  english_pob_choice: go on into a more distant region
  chosen_spanish: avanzarían hacia una región más lejana
  alternatives_spanish:
  - irían a una región más lejana
  - proseguirían hacia una región más lejana
  lexicon: proficisci; ulterior region
  rationale: «Avanzarían» comunica movimiento decidido y sostenido; «más lejana» corresponde a ulteriorem sin cargar el texto con un matiz geográfico más específico de lo que el latín da.
- source_word: ubi nunquam inhabitauit genus humanum
  english_pob_choice: where no human race had ever lived
  chosen_spanish: donde nunca había habitado raza humana
  alternatives_spanish:
  - donde nunca había vivido ningún ser humano
  - donde la raza humana nunca había habitado
  lexicon: inhabitare; genus humanum
  rationale: «Raza humana» conserva el alcance colectivo de genus humanum y sigue de cerca la formulación del inglés POB. «Habitado» mantiene el imperfecto pluscuamperfecto requerido por el latín y el inglés.
- source_word: Vt uel ibi obseruarent legitima sua
  english_pob_choice: so that there they might keep their statutes
  chosen_spanish: para que allí guardaran sus estatutos
  alternatives_spanish:
  - para que allí observaran sus estatutos
  - a fin de que allí cumplieran sus estatutos
  lexicon: ut; observare; legitima
  rationale: «Para que» expresa finalidad; «guardaran» preserva el valor de observancia fiel y es natural en español bíblico contemporáneo. «Estatutos» mantiene la referencia a legitima sua sin sustituirla por una explicación más interpretativa.
theological_decisions:
- issue: Finalidad de la huida o separación
  english_pob_reading: so that there they might keep their statutes
  chosen_spanish_reading: para que allí guardaran sus estatutos
  alternative_spanish_readings:
  - a fin de que allí observaran sus estatutos
  - para que allí cumplieran sus estatutos
  rationale: 'La cláusula final debe conservarse porque completa la lógica del pasaje: la separación geográfica se orienta a la observancia de una ley propia. La formulación elegida mantiene la finalidad sin intensificar el contenido legal más allá del latín.'
  doctrine_reference: Ley/observancia comunitaria en contexto narrativo apocalíptico
translation_notes:
  revision_awareness: The English audit trail shows a revision that restored the omitted final clause 'so that there they might keep their statutes.' The Spanish draft likewise includes this clause for completeness and follows the full Latin sense of 'Vt uel ibi obseruarent legitima sua.'
  spanish_consistency_notes:
  - Se mantiene «estatutos» para legitima sua, en coherencia con el lenguaje jurídico-cultual del pasaje.
  - Se evita «Señor» u otra terminología de masking, porque el versículo no contiene el nombre divino.
  - Se conserva un registro formal y narrativo, con sintaxis clara y sin paráfrasis expansiva.
