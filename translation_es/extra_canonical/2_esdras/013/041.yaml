revisions:
- from: 'Pero ellos trazaron este plan entre sí: que dejarían la multitud de las naciones y avanzarían hacia una región más lejana, donde nunca había habitado raza humana, para que allí guardaran sus estatutos.'
  to: 'Pero ellos formaron este plan entre sí: que dejarían la multitud de las naciones e irían a una región más lejana, donde nunca había vivido ningún ser humano, para que allí guardaran sus estatutos.'
  rationale: Se ajustó el verbo principal a una expresión más idiomática («formaron este plan»), se reemplazó «avanzarían hacia» por «irían a» para reflejar mejor proficiscerentur, y se mejoró la naturalidad de «donde nunca había habitado raza humana» a «donde nunca había vivido ningún ser humano», manteniendo intacto el sentido del original y del English POB.
