translation:
  language: es
  text: Y sucedió que después de siete días soñé un sueño durante la noche.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: post dies septem
  english_pob_choice: after seven days
  chosen_spanish: después de siete días
  alternatives_spanish:
  - al cabo de siete días
  - tras siete días
  lexicon: post + dies
  rationale: Conserva la referencia temporal directa del latín sin añadir matices no presentes; «después de siete días» es natural y fiel al orden temporal.
- source_word: somniavi somnium
  english_pob_choice: I dreamed a dream
  chosen_spanish: soñé un sueño
  alternatives_spanish:
  - tuve un sueño
  - soñé un sueño [a]
  lexicon: somniare / somnium
  rationale: Mantiene la repetición intensiva del original, que el inglés POB también preserva. En español, «soñé un sueño» reproduce mejor la forma enfática que una paráfrasis más libre.
- source_word: nocte
  english_pob_choice: in the night
  chosen_spanish: en la noche
  alternatives_spanish:
  - de noche
  - durante la noche
  lexicon: nox / nocte
  rationale: La frase latina señala el marco temporal nocturno; «en la noche» refleja el valor locativo-temporal de manera clara y digna en español.
theological_decisions:
- issue: Repetición enfática en «soñé un sueño»
  english_pob_reading: I dreamed a dream
  chosen_spanish_reading: soñé un sueño
  alternative_spanish_readings:
  - tuve un sueño
  - soñé
  rationale: No hay carga doctrinal particular, pero la repetición sí es parte del estilo del testimonio. Se conserva para no diluir la intensidad narrativa del pasaje.
  doctrine_reference: Estilo narrativo bíblico; sin implicación doctrinal específica.
translation_notes:
  revision_awareness: La versión inglesa revisada solo eliminó una coma innecesaria después de «days»; no afecta el contenido. La traducción española mantiene la estructura temporal y la repetición enfática del texto latino.
  spanish_consistency_notes:
  - Se mantiene un español moderno y eclesialmente legible.
  - No se introducen términos técnicos innecesarios ni equivalentes tradicionales que no estén motivados por el latín.
  - La secuencia temporal («Y sucedió que... después de siete días...») refleja el arranque narrativo del original sin sobreexplicación.
