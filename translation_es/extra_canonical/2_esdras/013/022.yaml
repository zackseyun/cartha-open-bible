  text: 'Porque dijiste acerca de los que fueron dejados, y de los que no fueron dejados, esta es la interpretación:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: quoniam
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: Latin conjunction introducing the reason or explanation for the following statement
  rationale: «Porque» comunica de manera natural la relación explicativa causal que el latín introduce aquí, y mantiene la cercanía al arranque directo del texto base sin añadir énfasis interpretativo extra.
- source_word: dixisti
  english_pob_choice: you said
  chosen_spanish: dijiste
  alternatives_spanish:
  - has dicho
  - decías
  lexicon: Latin perfect of dicere, second person singular
  rationale: El perfecto español «dijiste» refleja de forma simple y directa el pasado puntual del latín, y conserva la segunda persona singular del destinatario.
- source_word: de his qui derelicti sunt
  english_pob_choice: about those who are left
  chosen_spanish: acerca de los que quedaron
  alternatives_spanish:
  - de los que quedaron
  - sobre los que quedaron
  - acerca de los que han quedado
  lexicon: Latin de + pronoun + relative clause; derelicti sunt = those who have been left behind/remaining
  rationale: «Los que quedaron» expresa el grupo remanente con naturalidad en español y evita una formulación más pesada como «los que han quedado», sin perder el sentido de residualidad del latín.
- source_word: et de his qui non derelicti sunt
  english_pob_choice: and about those who are not left
  chosen_spanish: y de los que no quedaron
  alternatives_spanish:
  - y de los que no han quedado
  - y de los que no fueron dejados
  - y de los no restantes
  lexicon: Latin et + de his qui non derelicti sunt; negated passive perfect participle
  rationale: La negativa se mantiene con «no quedaron», que en español comunica de manera clara la idea de quienes no forman parte del grupo dejado/restante, sin forzar una pasiva poco natural.
- source_word: haec interpretatio
  english_pob_choice: this is the interpretation
  chosen_spanish: esta es la interpretación
  alternatives_spanish:
  - esta es la explicación
  - esto es la interpretación
  lexicon: Latin haec interpretatio, demonstrative + noun phrase
  rationale: «Esta es la interpretación» sigue de cerca la estructura del latín y reproduce el valor técnico de una explicación interpretativa, que es el sentido del pasaje.
theological_decisions:
- issue: 'Distinción entre los dos grupos mencionados: los que quedaron y los que no quedaron'
  english_pob_reading: those who are left / those who are not left
  chosen_spanish_reading: los que quedaron / los que no quedaron
  alternative_spanish_readings:
  - los restantes / los no restantes
  - los que han quedado / los que no han quedado
  rationale: No hay carga doctrinal añadida en este versículo; la decisión principal es conservar la distinción binaria del texto sin expandirla con explicaciones que el latín no ofrece.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción inglesa fue revisada desde una forma más perifrástica («As for what you said about») a una más directa («For you said about»). El español sigue la lectura más directa del latín quoniam dixisti, sin necesidad de introducir una preposición concesiva o una perífrasis explicativa adicional.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico sin caer en arcaísmos innecesarios.
  - «Quedaron» se usa como equivalente idiomático de los participios latinos de remanencia, preservando claridad para lectura pública.
  - No se introduce terminología eclesiástica ajena al texto; «interpretación» conserva el valor técnico del latín haec interpretatio.
