review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del latín y la revisión inglesa: quoniam = «Porque», dixisti = «dijiste», y haec interpretatio = «esta es la interpretación». Sin embargo, «los que quedaron / los que no quedaron» puede sonar más como un simple resultado narrativo que como el estado pasivo-resultativo de derelicti sunt («los que fueron dejados / los que no fueron dejados» o «los que quedaron / no quedaron»). Dado que el inglés auditado preserva deliberadamente «those who are left / are not left», conviene ajustar para conservar mejor la simetría semántica del original.'
  spanish_quality_summary: 'El español es claro y legible, pero la repetición de «quedaron» en ambos miembros introduce una leve ambigüedad idiomática: «los que no quedaron» puede entenderse como «los que no permanecieron» más que «los que no fueron dejados». Una formulación más explícita mejora la fidelidad sin perder naturalidad.'
  glossary_alignment: No hay términos del glosario mayor implicados. La revisión propuesta mantiene el registro moderno y digno del proyecto y sigue de cerca la formulación fuente sin calco excesivamente rígido.
  issues:
  - severity: medium
    issue: «los que no quedaron» es semánticamente ambiguo frente a derelicti sunt
    rationale: 'En español, «no quedaron» suele leerse como un intransitivo de permanencia o resultado, mientras que el latín usa una forma pasiva/resultativa: «fueron dejados» o «han sido dejados». La oposición binaria del texto merece una formulación más transparente.'
  - severity: low
    issue: Desajuste leve con la decisión inglesa auditada «those who are left / are not left»
    rationale: La auditoría inglesa se movió hacia una expresión más directa y cercana al original; en español, una formulación con «fueron dejados» preserva mejor ese matiz que «quedaron».
  revised_spanish_text: 'Porque dijiste acerca de los que fueron dejados, y de los que no fueron dejados, esta es la interpretación:'
  revision_rationale: Se sustituye «quedaron / no quedaron» por «fueron dejados / no fueron dejados» para reflejar con mayor precisión el valor pasivo-resultativo de derelicti sunt y evitar la ambigüedad idiomática de «no quedaron». El resto del versículo ya es fiel y natural.
