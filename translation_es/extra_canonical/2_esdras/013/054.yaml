translation:
  language: es
  text: Porque has dejado lo tuyo y te has dedicado a lo que me pertenece, y has escudriñado mi ley.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: dereliquisti enim tua
  english_pob_choice: for you have forsaken what belongs to you
  chosen_spanish: Porque has dejado lo tuyo
  alternatives_spanish:
  - Porque has abandonado lo tuyo
  - Pues has dejado lo que es tuyo
  lexicon: derelinquere > dejar/abandonar; tua > lo tuyo
  rationale: El latín expresa abandono de lo propio con un posesivo neutro. «Dejado lo tuyo» conserva la brevedad y el contraste sin añadir carga interpretativa más fuerte que la del original.
- source_word: circa mea vacasti
  english_pob_choice: and have devoted yourself to what belongs to me
  chosen_spanish: y te has dedicado a lo que me pertenece
  alternatives_spanish:
  - y has estado atento a lo que es mío
  - y te has ocupado de mis asuntos
  lexicon: vacare circa > dedicarse a, ocuparse de; mea > lo que me pertenece / lo mío
  rationale: «Vacasti circa mea» sugiere ocuparse con atención de lo que pertenece a Dios. En español, «te has dedicado a lo que me pertenece» preserva el sentido de entrega o aplicación sin forzar una idiomática más eclesiástica que el latín no exige.
- source_word: legem meam exquisisti
  english_pob_choice: and have searched out my law
  chosen_spanish: y has escudriñado mi ley
  alternatives_spanish:
  - y has buscado con cuidado mi ley
  - y has investigado mi ley
  lexicon: exquisisti > buscar con diligencia, indagar; lex > ley
  rationale: «Escudriñado» reproduce bien la búsqueda diligente e intensa del verbo latino y mantiene el tono bíblico adecuado. «Ley» traduce directamente legem sin desplazar el término a una formulación más general.
theological_decisions:
- issue: Referencia a la posesión divina en «mea»
  english_pob_reading: what belongs to me
  chosen_spanish_reading: lo que me pertenece
  alternative_spanish_readings:
  - lo mío
  - mis cosas
  rationale: La frase no trata de propiedad material en sentido estrecho, sino de pertenencia a Dios. «Lo que me pertenece» preserva esa relación de pertenencia sin introducir explicaciones ausentes del texto.
  doctrine_reference: Propiedad y señorío divinos; lenguaje de pertenencia en el contexto de exhortación y llamado.
translation_notes:
  revision_awareness: El texto latino limpio coincide sustancialmente con la traducción inglesa POB ya auditada. No se detectan revisiones aplicadas ni discrepancias textuales que requieran nota variante.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de tres miembros presente en el latín y en el inglés auditado.
  - Se evitó «SEÑOR» u այլ sustitutos porque el texto latino usa un posesivo de primera persona, no un nombre divino ni κύριος.
  - Se prefirió un registro bíblico claro pero no arcaizante, adecuado para lectura pública.
