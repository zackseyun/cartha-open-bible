lexical_decisions:
- source_word: uidisti eum
  english_pob_choice: your seeing him
  chosen_spanish: al verlo
  alternatives_spanish:
  - al ver a él
  - al verlo a él
  lexicon: uidere
  rationale: El latín expresa la percepción directa del destinatario; en español natural, «al verlo» comunica esa relación sin sobrecargar el texto.
- source_word: colligentem ad se
  english_pob_choice: gathering to himself
  chosen_spanish: reunir junto a sí
  alternatives_spanish:
  - juntando a sí
  - reuniendo para sí
  lexicon: colligere
  rationale: «Colligentem» describe la acción de reunir; «junto a sí» preserva el matiz reflexivo/de atracción del latín y del inglés POB.
- source_word: aliam multitudinem pacificam
  english_pob_choice: another peaceful multitude
  chosen_spanish: otra multitud pacífica
  alternatives_spanish:
  - otra muchedumbre pacífica
  - otro pueblo pacífico
  lexicon: multitudo
  rationale: «Multitud» reproduce bien el colectivo amplio del latín; «pacífica» mantiene el adjetivo sin añadir interpretaciones teológicas.
- source_word: Haec sunt decem tribus
  english_pob_choice: these are the ten tribes
  chosen_spanish: estos son las diez tribus
  alternatives_spanish:
  - estas son las diez tribus
  - éste es el caso de las diez tribus
  lexicon: decem tribus
  rationale: Se conserva la identificación explícita del grupo con las diez tribus. Aunque «tribus» es femenino, el antecedente de referencia implícita en el latín puede justificar «estos» por concordancia con el referente colectivo; aun así, se reconoce que «estas» sería la alternativa española más llana.
- source_word: quae captiuae factae sunt
  english_pob_choice: that were taken captive
  chosen_spanish: que fueron llevadas cautivas
  alternatives_spanish:
  - que fueron hechas cautivas
  - que fueron capturadas
  lexicon: captivus
  rationale: «Llevadas cautivas» conserva la pasividad y el estado de cautiverio con una formulación idiomática en español.
- source_word: de
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - a partir de
  lexicon: de
  rationale: El latín queda truncado en el testimonio recibido; se mantiene la preposición abierta como en el texto fuente y en la auditoría inglesa, sin completar el lugar de origen no conservado.
theological_decisions:
- issue: Identificación de las diez tribus
  english_pob_reading: these are the ten tribes that were taken captive from
  chosen_spanish_reading: estos son las diez tribus que fueron llevadas cautivas de
  alternative_spanish_readings:
  - estas son las diez tribus que fueron llevadas cautivas de
  - éstas son las diez tribus que fueron llevadas cautivas de
  rationale: Se mantiene la identificación histórica/escaratológica de las diez tribus sin suavizarla ni reemplazarla por una generalización. El texto fuente está truncado al final, por lo que no se completa el destino.
  doctrine_reference: 2 Esdras 13:39-40 (continuidad del pasaje en el testimonio textual)
translation_notes:
  revision_awareness: La revisión automática señaló que la mitad final del versículo estaba ausente del borrador inglés previo; este draft incorpora la cláusula restante del latín fuente («Haec sunt decem tribus, quae captiuae factae sunt de») y la deja abierta al final, conforme al fragmento recibido.
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el pasaje lo requiera; aquí no aparece el tetragrámaton.
  - Se evita traducir mecánicamente por la versión inglesa cuando el latín permite un orden más natural en español.
  - Se mantiene el final truncado con «de» porque el testimonio fuente también está incompleto en este versículo.
