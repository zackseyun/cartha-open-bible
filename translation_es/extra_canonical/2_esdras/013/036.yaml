translation:
  language: es
  text: Pero él estará sobre la cumbre del monte Sion. Y Sion vendrá y se mostrará a todos, preparada y edificada, tal como viste el monte tallado sin manos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: cacumen montis Sion
  english_pob_choice: the summit of Mount Zion
  chosen_spanish: la cumbre del monte Sion
  alternatives_spanish:
  - la cima del monte Sion
  - la altura del monte Sion
  lexicon: cacumen -> cumbre/cima; mons -> monte
  rationale: «Cumbre» comunica con naturalidad el punto más alto y conserva la imagen topográfica del latín. «Monte Sion» mantiene el nombre propio geográfico sin reformularlo.
- source_word: ueniet
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - vendrá a aparecer
  - aparecerá
  lexicon: uenio -> venir
  rationale: El latín presenta movimiento/venida. «Vendrá» reproduce el desplazamiento sin añadir interpretación excesiva.
- source_word: ostendetur omnibus
  english_pob_choice: will be shown to all
  chosen_spanish: será mostrada a todos
  alternatives_spanish:
  - se mostrará a todos
  - será vista por todos
  lexicon: ostendo -> mostrar; omnibus -> a todos
  rationale: La pasiva conserva el énfasis del latín en la manifestación pública de Sion. «A todos» refleja omnibus de modo inclusivo y directo.
- source_word: parata et aedificata
  english_pob_choice: prepared and built
  chosen_spanish: preparada y edificada
  alternatives_spanish:
  - preparada y construida
  - lista y edificada
  lexicon: paro -> preparar; aedifico -> edificar
  rationale: «Edificada» mantiene el registro bíblico y arquitectónico de aedificata; «preparada» conserva la preparación previa sin reducirla a mera disposición emocional.
- source_word: sicut uidisti montem sculpi sine manibus
  english_pob_choice: just as you saw the mountain carved out without hands
  chosen_spanish: tal como viste el monte tallado sin manos
  alternatives_spanish:
  - tal como viste el monte esculpido sin manos
  - como viste el monte labrado sin manos
  lexicon: sicut -> tal como; uidisti -> viste; sculpi -> tallado/esculpido; sine manibus -> sin manos
  rationale: «Tal como» es una equivalencia natural para sicut. «Tallado» mantiene la imagen de trabajo sobre la piedra sin suavizarla; «sin manos» conserva la expresión literal y su valor de agente ausente.
theological_decisions:
- issue: Manifestación futura y pública de Sion
  english_pob_reading: Zion will come and be shown to all, prepared and built
  chosen_spanish_reading: Sion vendrá y será mostrada a todos, preparada y edificada
  alternative_spanish_readings:
  - Sion vendrá y se manifestará a todos, preparada y edificada
  - Sion vendrá y aparecerá ante todos, preparada y edificada
  rationale: El latín no solo habla de llegada, sino de exposición pública. «Será mostrada a todos» conserva esa manifestación abierta sin introducir una teología más específica de la que el texto exige.
  doctrine_reference: Esperanza escatológica / visión de la restauración de Sion
- issue: «Sin manos» como rasgo de origen no humano
  english_pob_reading: the mountain carved out without hands
  chosen_spanish_reading: el monte tallado sin manos
  alternative_spanish_readings:
  - el monte esculpido sin manos
  - el monte labrado sin manos
  rationale: La fórmula debe mantener la tensión de una obra que no procede de manos humanas. «Sin manos» es literal y resguarda la alusión a una acción no humana sin explicitar más de lo que el verso dice.
  doctrine_reference: Origen divino de la obra visionaria
translation_notes:
  revision_awareness: La versión sigue de cerca el latino limpio de Bensly y coincide con el sentido ya asentado en la traducción inglesa POB, sin introducir cambios textuales ni notas de variante, ya que el expediente indica alta concordancia y ausencia de revisiones sustantivas.
  spanish_consistency_notes:
  - Se conserva «Sion» como nombre propio, en continuidad con el texto fuente y la tradición POB del pasaje.
  - Se usa «monte» y no «montaña» para mantener la correspondencia con mons/montem y la imaginería bíblica.
  - Se mantiene la pasiva «será mostrada» para no diluir el énfasis de ostendetur.
