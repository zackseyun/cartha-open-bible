review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el latín y el inglés POB en la mayor parte: «la cumbre del monte Sion», «vendrá», «preparada y edificada» y «sin manos» preservan el sentido básico. Sin embargo, «se pondrá sobre» es menos fiel que «estará/se mantendrá sobre» para el futuro de stative sense reflected in the English «will stand», y «será mostrada a todos» suena algo forzado en español frente a una pasiva refleja más natural que sigue comunicando manifestación pública.'
  spanish_quality_summary: El texto es claro y legible, pero necesita un pequeño ajuste de naturalidad y precisión verbal. «Se pondrá» puede sugerir una acción de colocarse más que una postura estable; «se mostrará a todos» fluye mejor en español bíblico moderno que «será mostrada a todos» sin perder el valor pasivo. El resto del verso está bien y mantiene un registro digno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Sion» concuerda con el material dado. No aparecen términos sensibles como Yahvé, Mesías o Espíritu. «Edificada» es una buena elección para aedificata y «sin manos» preserva adecuadamente la fórmula tradicional.
  issues:
  - severity: medium
    issue: «se pondrá sobre» para la acción principal
    rationale: El inglés auditado tiene «he will stand upon», y el contexto latino previo al fragmento apunta a una postura estable, no a un mero acto de colocarse. «Estará sobre» o «se mantendrá sobre» representa mejor el sentido.
  - severity: low
    issue: «será mostrada a todos» suena poco natural
    rationale: Aunque es comprensible y formalmente cercana al latín ostendetur, en español «se mostrará a todos» comunica la misma manifestación pública con mejor fluidez.
  revised_spanish_text: Pero él estará sobre la cumbre del monte Sion. Y Sion vendrá y se mostrará a todos, preparada y edificada, tal como viste el monte tallado sin manos.
  revision_rationale: Se ajusta «se pondrá sobre» a «estará sobre» para reflejar mejor el valor de postura estable representado por el inglés POB «will stand». Se cambia «será mostrada a todos» por «se mostrará a todos» para una expresión más natural en español, sin alterar el sentido pasivo de manifestación pública. No se requieren notas.
