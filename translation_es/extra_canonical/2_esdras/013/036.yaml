revisions:
- from: Pero él se pondrá sobre la cumbre del monte Sion. Y Sion vendrá y será mostrada a todos, preparada y edificada, tal como viste el monte tallado sin manos.
  to: Pero él estará sobre la cumbre del monte Sion. Y Sion vendrá y se mostrará a todos, preparada y edificada, tal como viste el monte tallado sin manos.
  rationale: Se ajusta «se pondrá sobre» a «estará sobre» para reflejar mejor el valor de postura estable representado por el inglés POB «will stand». Se cambia «será mostrada a todos» por «se mostrará a todos» para una expresión más natural en español, sin alterar el sentido pasivo de manifestación pública. No se requieren notas.
