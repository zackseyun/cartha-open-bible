translation:
  language: es
  text: el Altísimo comenzará a librar a los que están sobre la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Altísimo Dios
  - el Dios Altísimo
  lexicon: altissimus -> Altísimo / el Altísimo
  rationale: La forma latina absoluta se traduce de manera natural y reverente como un título divino en español. ‘El Altísimo’ reproduce la referencia teológica sin añadir ‘Dios’, que no está en el texto base.
- source_word: liberare
  english_pob_choice: to deliver
  chosen_spanish: librar
  alternatives_spanish:
  - liberar
  - rescatar
  lexicon: liberare -> librar / liberar
  rationale: En español bíblico, ‘librar’ conserva bien la idea de sacar de peligro o opresión que expresa el inglés ‘deliver’. ‘Liberar’ también es válido, pero ‘librar’ suena más cercano al valor salvífico del verbo latino en este contexto.
- source_word: qui super terram sunt
  english_pob_choice: those who are upon the earth
  chosen_spanish: los que están sobre la tierra
  alternatives_spanish:
  - los que están en la tierra
  - los habitantes de la tierra
  lexicon: qui ... sunt -> los que ... están
  rationale: La construcción relativa se mantiene con claridad y sin sobreinterpretar ‘super terram’. ‘Sobre la tierra’ conserva la preposición del latín; ‘en la tierra’ sería una naturalización posible, pero menos literal.
theological_decisions:
- issue: Identidad del sujeto divino
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Altísimo Dios
  - Dios Altísimo
  rationale: El texto latino solo dice ‘altissimus’; la traducción mantiene el título divino sin expandirlo. Esto evita introducir una glosa no atestiguada y conserva la austeridad del original.
  doctrine_reference: Título divino en uso bíblico; cf. Gn 14:18-20; Sal 91:1
- issue: Sentido de deliver/liberare
  english_pob_reading: will begin to deliver
  chosen_spanish_reading: comenzará a librar
  alternative_spanish_readings:
  - comenzará a liberar
  - empezará a rescatar
  rationale: ‘Librar’ comunica tanto rescate como liberación sin restringir el matiz a una sola esfera semántica. El futuro perifrástico ‘comenzará a’ conserva el valor incoativo del latín ‘incipiet’.
  doctrine_reference: Esperanza escatológica de liberación; cf. 2 Esd 13:30-31
translation_notes:
  revision_awareness: The English POB text and audit trail are minimal and stable; no applied revisions were recorded, and the cross-check shows high agreement with no issues. The Spanish draft follows the Latin source directly and preserves the same simple, declarative sense as the English POB rendering.
  spanish_consistency_notes:
  - Mantener ‘Altísimo’ como título divino en 2 Esdras salvo que el contexto inmediato exija expansión.
  - Usar ‘librar’ cuando el contexto enfatice rescate o intervención salvadora, reservando ‘liberar’ para contextos más abstractos o políticos.
  - Conservar ‘sobre la tierra’ para reflejar el latín ‘super terram’ cuando no genere ambigüedad en español.
