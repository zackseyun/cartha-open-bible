translation:
  language: es
  text: Y una multitud innumerable se reunirá en uno[a], como viste,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «en una sola unidad» o, más literalmente, «en uno», conservando el latín in unum.
