lexical_decisions:
- source_word: colligetur in unum
  english_pob_choice: will be gathered into one
  chosen_spanish: se reunirá en un solo
  alternatives_spanish:
  - será reunida en uno
  - será congregada en uno
  - se reunirá en una sola unidad
  lexicon: colligo + in unum
  rationale: La revisión inglesa corrigió 'gathered together' a 'gathered into one' para reflejar mejor in unum. En español, 'reunirá' conserva el sentido de juntarse y 'en un solo' mantiene la idea de unidad sin añadir una formulación doctrinal ajena al latín.
- source_word: multitudo innumerabilis
  english_pob_choice: an innumerable multitude
  chosen_spanish: una multitud innumerable
  alternatives_spanish:
  - una muchedumbre innumerable
  - una multitud sin número
  - una incontable multitud
  lexicon: multitudo + innumerabilis
  rationale: '''Multitud innumerable'' sigue de cerca el orden y fuerza del latín, con un registro natural en español bíblico contemporáneo. ''Muchedumbre'' es posible, pero ''multitud'' preserva mejor la correspondencia léxica con el texto fuente.'
theological_decisions:
- issue: Unidad del grupo reunido
  english_pob_reading: gathered into one
  chosen_spanish_reading: reunida en un solo
  alternative_spanish_readings:
  - reunida en uno
  - reunida como una sola
  - congregada en uno
  rationale: No se explicita aquí una identidad eclesial o escatológica específica; el latín solo afirma la reunificación en una unidad. Por eso la traducción mantiene la tensión mínima del texto sin interpretarla más allá de lo que dice.
  doctrine_reference: No aplica; versículo descriptivo sin formulación doctrinal explícita.
translation_notes:
  revision_awareness: La revisión más reciente de la base inglesa cambió 'gathered together' por 'gathered into one' para reflejar con mayor precisión el latín 'colligetur in unum'. La versión española sigue esa revisión y evita retroceder a una formulación meramente adverbial de reunión.
  spanish_consistency_notes:
  - Se mantiene 'multitud innumerable' para preservar la correspondencia con multitudo innumerabilis.
  - Se evita 'SEÑOR' u otra terminología teológica ajena porque el texto no contiene vocabulario divino explícito.
  - El artículo y la preposición se ajustan al español para que la frase sea publicable sin perder la cercanía al latín.
