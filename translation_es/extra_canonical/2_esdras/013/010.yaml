translation:
  language: es
  text: pero yo solo vi cómo salía de su boca como una ola de fuego, y de sus labios un aliento de llama, y de su lengua lanzaba chispas de tormenta.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: emittit de ore suo sicut fluctum ignis
  english_pob_choice: he sent out from his mouth like a wave of fire
  chosen_spanish: emitía de su boca como una ola de fuego
  alternatives_spanish:
  - salía de su boca como una ola de fuego
  - arrojaba de su boca como una ola de fuego
  lexicon: emitir / boca / ola / fuego
  rationale: El latín describe una salida continua desde la boca; «emitía» conserva el movimiento verbal sin volverlo demasiado mecánico. «Como una ola de fuego» sigue de cerca el símil de POB y el latín fluctum ignis.
- source_word: et de labiis eius spiritum flammae
  english_pob_choice: from his lips a breath of flame
  chosen_spanish: de sus labios un aliento de llama
  alternatives_spanish:
  - de sus labios un soplo de llama
  - de sus labios un espíritu de llama
  lexicon: labios / spiritus / aliento / llama
  rationale: En este contexto spiritum no exige «Espíritu» mayúsculo, sino un soplo o aliento físico/imagético. «Aliento de llama» mantiene la fuerza poética del original y evita una paráfrasis interpretativa.
- source_word: et de lingua eius emittebat scintillas tempestatis
  english_pob_choice: and from his tongue he shot out sparks of storm
  chosen_spanish: y de su lengua lanzaba chispas de tormenta
  alternatives_spanish:
  - y de su lengua disparaba chispas de tormenta
  - y de su lengua arrojaba chispas de tempestad
  lexicon: lingua / scintillae / tempestas
  rationale: «Lanzaba chispas de tormenta» conserva el verbo de emisión y el genitivo poético del latín. «Tormenta» comunica bien tempestas en español; «tempestad» sería una alternativa válida, algo más solemne.
theological_decisions:
- issue: Imagen concentrada de fuego, aliento y chispas como manifestación de poder
  english_pob_reading: metaphorical description with no added theological gloss
  chosen_spanish_reading: descripción metafórica sin glosa añadida
  alternative_spanish_readings:
  - imagen de juicio divino explícito
  - manifestación del Espíritu
  rationale: El texto no explicita la interpretación; la traducción debe preservar la imagen sin cargarla con una lectura doctrinal que no está en el latín ni en el POB inglés.
  doctrine_reference: Principio de no sobreglosar imágenes apocalípticas
translation_notes:
  revision_awareness: Se siguió la revisión inglesa que eliminó el innecesario 'something'; por eso la formulación española evita añadir cualquier equivalente de 'algo' o 'una cosa', manteniéndose cercana al latín y más natural en español.
  spanish_consistency_notes:
  - Se mantuvo el registro apocalíptico y elevado sin arcaísmos innecesarios.
  - Se prefirió 'tormenta' para tempestas por fluidez, sin perder la imagen violenta del original.
  - No se capitalizó 'aliento' ni 'llama' porque el contexto no indica referencia nominal divina o personal.
