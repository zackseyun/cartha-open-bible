  to: Desde el principio has mostrado estas maravillas a tu siervo, y me has considerado digno de que recibieras mi súplica[a].
  rationale: Se corrige la subordinación final para que el sujeto de «recibir» sea Dios, conforme al latín ut susciperes deprecationem meam y a la auditoría inglesa. También se reubica la nota al pie al término correcto, ya que la alternativa afecta «súplica/oración», no «siervo».
