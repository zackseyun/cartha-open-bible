    changes_summary: Changed 'that you should receive' to 'to receive' for more natural English while preserving the Latin sense.
translation:
  language: es
  text: Desde el principio has mostrado estas maravillas a tu siervo, y me has considerado digno de que recibieras mi súplica[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi oración».'
    reason: alternative_reading
lexical_decisions:
- source_word: tu ab initio
  english_pob_choice: From the beginning
  chosen_spanish: Desde el principio
  alternatives_spanish:
  - Al principio
  - Desde el comienzo
  lexicon: ab initio
  rationale: Mantiene el punto de partida temporal del latín sin sobreinterpretar un matiz más técnico que el texto no exige. «Desde el principio» es natural en español y conserva la idea de continuidad desde el origen.
- source_word: demonstrasti
  english_pob_choice: you have shown
  chosen_spanish: has mostrado
  alternatives_spanish:
  - has manifestado
  - has dado a conocer
  lexicon: demonstrasti
  rationale: «Mostrar» reproduce bien el acto de hacer visibles o patentes las maravillas. «Manifestar» o «dar a conocer» son posibles, pero «mostrar» es más directo y fiel al nivel de estilo del latín.
- source_word: servo tuo
  english_pob_choice: to your servant
  chosen_spanish: a tu siervo
  alternatives_spanish:
  - a tu esclavo
  - a tu servidor
  lexicon: servus
  rationale: El inglés POB usa «servant»; en español, «siervo» preserva la relación de pertenencia y subordinación sin endurecer innecesariamente el término como «esclavo». «Servidor» suaviza demasiado el vínculo del latín.
- source_word: mirabilia haec
  english_pob_choice: these wonders
  chosen_spanish: estas maravillas
  alternatives_spanish:
  - estos prodigios
  - estas cosas maravillosas
  lexicon: mirabilia
  rationale: «Maravillas» es la correspondencia más natural para mirabilia y mantiene el registro bíblico sin volverlo arcaizante. «Prodigios» también sería posible, pero introduce un matiz más técnico de señales o portentos.
- source_word: dignum me habuisti
  english_pob_choice: you have counted me worthy
  chosen_spanish: me has considerado digno
  alternatives_spanish:
  - me has juzgado digno
  - me has tenido por digno
  lexicon: dignum me habuisti
  rationale: La construcción «considerar digno» transmite con claridad el valor adjudicado al sujeto y sigue de cerca el sentido del latín. «Juzgar digno» sería más forense; «tener por digno» también es válida, pero menos directa en español moderno.
- source_word: ut susciperes deprecationem meam
  english_pob_choice: to receive my supplication
  chosen_spanish: de recibir mi súplica
  alternatives_spanish:
  - para recibir mi súplica
  - para aceptar mi súplica
  lexicon: susciperes deprecationem meam
  rationale: La revisión inglesa prioriza «supplication» por la relación léxica con el verbo previo de rogar; en español, «súplica» mantiene esa cohesión semántica. «Recibir» conserva el valor de aceptar/atender la petición sin expandir el sentido.
theological_decisions:
- issue: Relación entre la visión de las maravillas y la dignificación del profeta para que su súplica sea recibida
  english_pob_reading: you have counted me worthy to receive my supplication
  chosen_spanish_reading: me has considerado digno de recibir mi súplica
  alternative_spanish_readings:
  - me has considerado digno para recibir mi súplica
  - me has hecho digno de que recibas mi súplica
  rationale: El latín expresa una valoración previa del sujeto que lo habilita para la recepción de su petición. La traducción elegida conserva esa tensión sin convertirla en un mero «aceptar mi oración» ni en una formulación excesivamente interpretativa.
  doctrine_reference: No doctrinal expansion; preserves the supplicatory posture of the speaker and divine initiative in granting access.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «that you should receive my prayer» a «to receive my supplication» para conservar la cohesión léxica con el verbo cognado del versículo anterior. La traducción española sigue esa decisión con «súplica» y mantiene «recibir» para no diluir el vínculo semántico del latín deprecationem / deprecatus sum.
  spanish_consistency_notes:
  - He conservado «siervo» para servo tuо, en línea con la fuerza relacional del latín y sin introducir «esclavo», que sería más fuerte de lo que exige este contexto.
  - He usado «súplica» en lugar de «oración» para alinearme con la elección inglesa revisada y con la familia léxica deprec- presente en el contexto inmediato.
  - «Maravillas» evita tanto la trivialización como una lectura demasiado técnica de «prodigios»; resulta fiel y publicable en español bíblico contemporáneo.
