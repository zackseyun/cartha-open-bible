    timestamp: '2026-04-23T19:51:47Z'
    unchanged: false
    changes_summary: Revised “Sovereign Lord” to “Lord Master” to more directly reflect the double address Dominator Domine in the Latin while keeping the rest unchanged.
translation:
  language: es
  text: 'Y yo dije[a]: «Señor, Maestro, muéstrame esto: ¿por qué vi al varón que subía del corazón del mar?» Y me dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Y yo dije: “Señor Maestro, muéstrame esto…”», si se toma la doble invocación como una expresión compacta en vez de dos apelativos.'
    reason: Preservar la alternativa formal para el doble vocativo Dominator Domine, ahora que la lectura principal usa la puntuación vocativa más natural en español.
lexical_decisions:
- source_word: Dominator Domine
  english_pob_choice: Lord Master
  chosen_spanish: Señor Maestro
  alternatives_spanish:
  - Señor, Maestro
  - Soberano Señor
  lexicon: vocative doublet
  rationale: La doble invocación latina expresa un trato solemne y enfático. «Señor Maestro» conserva el doble apelativo sin introducir una paráfrasis más interpretativa que el latín.
- source_word: hoc mihi ostende
  english_pob_choice: show me this
  chosen_spanish: muéstrame esto
  alternatives_spanish:
  - enséñame esto
  - muéstrame esto mismo
  lexicon: ostendere
  rationale: «Muéstrame esto» reproduce la petición directa y breve del latín con español natural y sobrio.
- source_word: virum
  english_pob_choice: the man
  chosen_spanish: el varón
  alternatives_spanish:
  - el hombre
  - el varón
  lexicon: vir
  rationale: «Varón» mantiene el registro más formal y un poco más marcado del latín vir, y evita perder la posible resonancia solemne del pasaje apocalíptico.
- source_word: ascendentem de corde maris
  english_pob_choice: coming up from the heart of the sea
  chosen_spanish: que subía del corazón del mar
  alternatives_spanish:
  - que ascendía del corazón del mar
  - que salía del corazón del mar
  lexicon: ascendere / cor maris
  rationale: «Subía» conserva el movimiento ascendente de ascendere en un español claro; «corazón del mar» sigue de cerca corde maris sin suavizar la imagen.
theological_decisions:
- issue: Rendering of the divine-style vocative Dominator Domine
  english_pob_reading: Lord Master
  chosen_spanish_reading: Señor Maestro
  alternative_spanish_readings:
  - Señor, Maestro
  - Soberano Señor
  rationale: La combinación latina no se reduce a un solo título; la forma escogida retiene la duplicación y el tono reverente sin sustituirla por un único título tradicional que borre la tensión lexical.
  doctrine_reference: Apocalyptic address / vocative register
- issue: Verse alignment includes the closing speech tag et dixit mihi
  english_pob_reading: 'And he said to me:'
  chosen_spanish_reading: 'Y me dijo:'
  alternative_spanish_readings:
  - Y me dijo
  - 'Y me respondió:'
  rationale: Se conserva explícitamente la cláusula final presente en el latín para mantener la alineación versicular y no desplazarla al verso siguiente.
  doctrine_reference: Textual integrity / verse segmentation
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que restituye la cláusula final et dixit mihi: y la decisión revisada de reflejar Dominator Domine con un doble vocativo solemne. No se siguió la formulación previa que omite la clausula final; se preservó la alineación completa del latín.'
  spanish_consistency_notes:
  - Se mantuvo «Señor» para Domine y «Maestro» para Dominator, evitando fusionarlos en un solo título.
  - Se prefirió «corazón del mar» por consistencia con la imagen literal del latín y la traducción auditada en inglés.
  - La nota a pie de página está anclada exactamente en el verbo inicial para reflejar la alternativa sintáctica registrada en el inglés POB.
