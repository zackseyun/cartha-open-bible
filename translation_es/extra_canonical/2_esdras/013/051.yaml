  yaml_path: translation/extra_canonical/2_esdras/013/051.yaml
  text: 'And I said[a], “Lord Master, show me this: why did I see the man coming up from the heart of the sea?” And he said to me:'
  footnotes:
  - marker: a
    text: 'Or ''And I said, “Lord, Master, show me this: why did I see the man coming up from the heart of the sea?”''.'
