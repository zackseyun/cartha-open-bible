    issue: Doble vocativo poco natural en «Señor Maestro»
    rationale: Aunque calca de cerca Lord Master, en español suena rígido y ambiguo como si fuera un solo título. La evidencia y la nota inglesa permiten tratarlo como doble apelativo; «Señor, Maestro» conserva mejor la forma y la legibilidad.
  - severity: low
    issue: La nota al pie queda desajustada si la mejor lectura principal es la alternativa actual
    rationale: La nota actualmente presenta «Señor, Maestro» como lectura alternativa, pero esa es la forma española más fiel y natural; por tanto la nota debe reformularse o eliminarse.
