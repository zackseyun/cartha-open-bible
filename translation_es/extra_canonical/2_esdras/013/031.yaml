translation:
  language: es
  text: Y vendrá desconcierto mental sobre los que habitan la tierra. Y se propondrán hacer guerra unos contra otros, ciudad contra ciudad, lugar contra lugar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ueniet excessus mentis
  english_pob_choice: bewilderment of mind will come
  chosen_spanish: vendrá confusión de la mente
  alternatives_spanish:
  - vendrá desconcierto de la mente
  - vendrá turbación del entendimiento
  lexicon: Latin excessus mentis
  rationale: Excessus mentis expresa una salida o desajuste de la mente; en español, «confusión de la mente» conserva el efecto de desorden interior sin añadir una interpretación más fuerte de la que el latín permite. «Desconcierto» también es posible, pero «confusión» es más natural y comunica bien el colapso mental.
- source_word: super eos qui inhabitant terram
  english_pob_choice: upon those who inhabit the earth
  chosen_spanish: sobre los que habitan la tierra
  alternatives_spanish:
  - sobre los que moran en la tierra
  - sobre los habitantes de la tierra
  lexicon: Latin inhabitant terram
  rationale: «Habitan la tierra» sigue de cerca el latín y mantiene el alcance universal del juicio. «Moran» es igualmente viable, pero «habitan» conserva un registro claro y bíblico sin sonar arcaico.
- source_word: in alios alii cogitabunt bellare
  english_pob_choice: they will plan to make war, one against another
  chosen_spanish: se propondrán hacer guerra unos contra otros
  alternatives_spanish:
  - pensarán hacer guerra unos contra otros
  - tramarán hacer guerra unos contra otros
  lexicon: Latin cogitabunt bellare
  rationale: Cogitare aquí apunta a deliberar o proponerse algo. «Se propondrán» comunica una decisión intencional sin cargar el texto con una connotación conspirativa que el latín no exige necesariamente. La expresión «hacer guerra» mantiene la sencillez del original.
- source_word: ciuitates ciuitatem
  english_pob_choice: city against city
  chosen_spanish: ciudad contra ciudad
  alternatives_spanish:
  - ciudades contra ciudad
  - ciudad contra ciudades
  lexicon: Latin ciuitates ciuitatem
  rationale: La repetición singular/plural del latín, con valor distributivo, se refleja naturalmente en español con «ciudad contra ciudad». Mantiene el paralelismo enfático del texto.
- source_word: locus locum
  english_pob_choice: place against place
  chosen_spanish: lugar contra lugar
  alternatives_spanish:
  - sitio contra sitio
  - región contra región
  lexicon: Latin locus locum
  rationale: «Lugar contra lugar» preserva la simetría formal y el alcance general del latín. «Sitio» o «región» serían más interpretativos y menos fieles al término amplio locus.
theological_decisions:
- issue: Naturaleza de la aflicción mental sobre la tierra
  english_pob_reading: bewilderment of mind will come upon those who inhabit the earth
  chosen_spanish_reading: vendrá confusión de la mente sobre los que habitan la tierra
  alternative_spanish_readings:
  - vendrá desconcierto de la mente sobre los que habitan la tierra
  - vendrá turbación mental sobre los que habitan la tierra
  rationale: El latín habla de un «excessus mentis», no de un juicio moral explícito ni de posesión. «Confusión de la mente» mantiene abierta la posibilidad de un colapso cognitivo general sin ampliar el significado más allá del texto.
  doctrine_reference: 2 Esdras 13:31; cf. lenguaje profético de perturbación mental en contextos de juicio
- issue: Carácter recíproco del conflicto
  english_pob_reading: they will plan to make war, one against another, city against city, place against place
  chosen_spanish_reading: se propondrán hacer guerra unos contra otros, ciudad contra ciudad, lugar contra lugar
  alternative_spanish_readings:
  - harán guerra unos contra otros, ciudad contra ciudad, lugar contra lugar
  - tramarán guerra unos contra otros, ciudad contra ciudad, lugar contra lugar
  rationale: La secuencia latina presenta intención mutua y conflicto recíproco. «Se propondrán» conserva la dimensión deliberada de cogitabunt sin convertirla necesariamente en ejecución inmediata. El paralelismo repetitivo refuerza la desunión total.
  doctrine_reference: 2 Esdras 13:31
translation_notes:
  revision_awareness: The latest revision pass reports the verse unchanged with high agreement (1.0) against the cleaned Latin source and the English POB audit trail; no additional corrective revision is indicated.
  spanish_consistency_notes:
  - Se mantiene «tierra» como traducción de terram para conservar el horizonte universal del pasaje.
  - Se conserva un registro bíblico moderno y claro, evitando tanto arcaísmos innecesarios como interpretaciones expansivas.
  - No se introducen notas porque el pasaje no presenta variantes textuales ni ambigüedades que el español obligue a explicitar con marcador.
