translation:
  language: es
  text: Y entonces les mostrará muchísimas maravillas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et tunc
  english_pob_choice: And then
  chosen_spanish: Y entonces
  alternatives_spanish:
  - Entonces
  - Y luego
  lexicon: —
  rationale: La combinación conserva la secuencia temporal directa del latín y su valor narrativo simple sin añadir matices ausentes.
- source_word: ostendet
  english_pob_choice: he will show
  chosen_spanish: les mostrará
  alternatives_spanish:
  - les enseñará
  - les hará ver
  lexicon: —
  rationale: «Mostrará» reproduce de forma natural el verbo de exhibición/manifestación del latín ostendere. Se eligió el dativo implícito con «les» por la referencia contextual a un grupo previo.
- source_word: multa plurima
  english_pob_choice: very many
  chosen_spanish: muchísimas
  alternatives_spanish:
  - muchas y muchísimas
  - muchísimas cosas
  lexicon: —
  rationale: El latín intensifica «muchaísimos» con doble cuantificación. «Muchísimas» comunica la superabundancia en un español fluido y digno, sin mecanizar la repetición.
- source_word: portenta
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - prodigios
  - señales maravillosas
  lexicon: —
  rationale: «Maravillas» es el equivalente más natural y amplio para portenta en este contexto apocalíptico. «Prodigios» sería posible, pero suena más técnico y menos directo para lectura pública.
theological_decisions:
- issue: Carácter extraordinario de los portenta
  english_pob_reading: wonders
  chosen_spanish_reading: maravillas
  alternative_spanish_readings:
  - prodigios
  - señales portentosas
  rationale: No hay indicio en el texto de una precisión doctrinal adicional; la traducción mantiene el sentido de obras extraordinarias sin cargarlo con una interpretación específica.
  doctrine_reference: No doctrinal tightening beyond the Latin phrase.
translation_notes:
  revision_awareness: La revisión inglesa eliminó únicamente una comilla final errante; el contenido semántico se mantuvo estable. La versión española sigue directamente el latín limpio y el acuerdo alto del control cruzado.
  spanish_consistency_notes:
  - Se mantiene un español sobrio y publicable, con orden temporal simple («Y entonces»).
  - No se introducen tecnicismos innecesarios ni se suaviza la intensidad de «multa plurima».
  - «Maravillas» conserva una resonancia bíblica amplia sin imponer una terminología confesional específica.
