translation:
  language: es
  text: 'Pues esta es la interpretación de la visión: porque viste a un hombre que subía del corazón del mar.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y esta es la interpretación».'
    reason: alternative_previous_rendering
lexical_decisions:
- source_word: interpretatio
  english_pob_choice: this is the interpretation
  chosen_spanish: esta es la interpretación
  alternatives_spanish:
  - ésta es la interpretación
  - esta es la explicación
  lexicon: interpretatio
  rationale: «Interpretación» conserva el valor explicativo del sustantivo latino y mantiene el tono técnico del pasaje apocalíptico. «Explicación» sería posible, pero debilita la correspondencia directa con el original y con la formulación auditada en inglés.
- source_word: enim
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Así que
  lexicon: enim
  rationale: El latín «enim» introduce una explicación causal/explanatoria. «Porque» comunica bien esa relación en español y sigue la corrección auditada del inglés, evitando convertir la frase en una mera coordinación.
- source_word: quia vidisti
  english_pob_choice: because you saw
  chosen_spanish: porque viste
  alternatives_spanish:
  - puesto que viste
  - ya que viste
  lexicon: quia + video
  rationale: «Porque viste» reproduce con naturalidad el valor causal de «quia» y el perfecto narrativo de «vidisti», sin paraphrasear hacia una construcción más abstracta.
- source_word: virum
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a un varón
  - a un ser humano
  lexicon: vir
  rationale: «Hombre» es la correspondencia más directa y natural en español para el latín «virum» en este contexto visionario. «Varón» sería posible, pero suena más marcado y menos idiomático aquí.
- source_word: ascendentem
  english_pob_choice: coming up
  chosen_spanish: que subía
  alternatives_spanish:
  - que ascendía
  - que iba subiendo
  lexicon: ascendere
  rationale: El participio latino expresa movimiento ascendente continuo. «Que subía» mantiene esa dinámica de forma clara y fluida en español, sin sobrecargar el texto con un tecnicismo.
- source_word: de corde maris
  english_pob_choice: from the heart of the sea
  chosen_spanish: del corazón del mar
  alternatives_spanish:
  - desde el corazón del mar
  - del centro del mar
  lexicon: cor / mare
  rationale: «Corazón del mar» conserva la metáfora espacial y poética del latín. «Centro del mar» suavizaría la imagen, pero perdería la fuerza figurativa presente en la fuente.
theological_decisions:
- issue: La naturaleza metafórica de «del corazón del mar»
  english_pob_reading: from the heart of the sea
  chosen_spanish_reading: del corazón del mar
  alternative_spanish_readings:
  - desde el corazón del mar
  - del centro del mar
  rationale: Se conserva la imagen literal-metafórica del original, que probablemente tiene función simbólica en la visión. No se la explica ni se la sustituye por una expresión más interpretativa, para no borrar la tensión poética del pasaje.
  doctrine_reference: Apocalíptica simbólica; mantener imaginería visionaria sin racionalizarla
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés auditado, que prefirió «because you saw» frente a una paráfrasis más larga. También respeta la corrección anterior de «For» para «enim», reflejándola en español con «Porque».
  spanish_consistency_notes:
  - Se mantiene «interpretación» como término técnico constante.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el texto fuente.
  - 'Se conserva el orden lógico explicativo del original: afirmación interpretativa + causa de la visión.'
  - La nota a pie de página recoge la variante de lectura documentada en el inglés POB.
