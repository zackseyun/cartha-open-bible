    changes_summary: Revised 'without number' to 'whose number was beyond counting' for more natural English while preserving the Latin sense of innumerability.
translation:
  language: es
  text: Y después de esto miré, y he aquí, se estaba reuniendo una multitud de hombres, cuyo número era imposible de contar, de los cuatro vientos del cielo, para combatir contra el hombre que había subido del mar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et vidi post haec
  english_pob_choice: And after this I looked
  chosen_spanish: Y después de esto miré
  alternatives_spanish:
  - Y después de esto vi
  - Y luego de esto observé
  lexicon: Latin videre
  rationale: «Miré» conserva el gesto narrativo de observación activa del contexto apocalíptico sin añadir matices no presentes; es natural en español y corresponde bien al inglés auditado.
- source_word: congregabatur multitudo hominum
  english_pob_choice: a multitude of men was gathering
  chosen_spanish: se estaba reuniendo una multitud de hombres
  alternatives_spanish:
  - se reunía una multitud de hombres
  - se congregaba una multitud de hombres
  lexicon: Latin congregari + multitudo hominum
  rationale: «Se estaba reuniendo» refleja el proceso en curso del imperfecto latino y mantiene la idea de reunión progresiva. «Multitud de hombres» sigue de cerca el genitivo latino sin convertirlo en una generalización más libre.
- source_word: quorum non erat numerus
  english_pob_choice: whose number was beyond counting
  chosen_spanish: cuyo número era imposible de contar
  alternatives_spanish:
  - cuyo número era innumerable
  - sin que se pudiera contar su número
  lexicon: Latin numerus
  rationale: La frase latina expresa innumerabilidad. «Imposible de contar» comunica esa fuerza en español con claridad y sin sonar arcaico; preserva el valor semántico que la revisión inglesa quiso aclarar.
- source_word: de quattuor ventis caeli
  english_pob_choice: from the four winds of heaven
  chosen_spanish: de los cuatro vientos del cielo
  alternatives_spanish:
  - de los cuatro vientos del cielo y de la tierra
  - desde los cuatro vientos del cielo
  lexicon: Latin quattuor venti caeli
  rationale: Se mantiene la imagen cosmológica literal. «Del cielo» corresponde al genitivo latino y evita sustituir la expresión por un equivalente interpretativo más libre.
- source_word: ut debellarent
  english_pob_choice: to make war against
  chosen_spanish: para hacer guerra contra
  alternatives_spanish:
  - para guerrear contra
  - para combatir contra
  lexicon: Latin debellare
  rationale: «Hacer guerra contra» reproduce bien el sentido bélico fuerte del verbo latino. Se evita «combatir» por ser más genérico y menos enfático.
- source_word: hominem qui ascenderat de mari
  english_pob_choice: the man who had come up from the sea
  chosen_spanish: el hombre que había subido del mar
  alternatives_spanish:
  - el hombre que había salido del mar
  - el hombre que había ascendido del mar
  lexicon: Latin ascendere + mare
  rationale: «Había subido del mar» conserva la imagen verbal de ascenso desde el mar. «Salir» sería más idiomático, pero perdería la correspondencia imagística con el latino.
theological_decisions:
- issue: Imagen apocalíptica del origen del adversario
  english_pob_reading: the man who had come up from the sea
  chosen_spanish_reading: el hombre que había subido del mar
  alternative_spanish_readings:
  - el hombre que había salido del mar
  - el hombre que había ascendido del mar
  rationale: Se mantiene la formulación concreta del texto latino sin explicar ni identificar teológicamente al personaje más allá de lo que el versículo dice. La traducción conserva la tensión imagética y evita armonizaciones con otras tradiciones textuales.
  doctrine_reference: Apocalíptica judía / 2 Esdras 13
- issue: Innumerabilidad de la multitud
  english_pob_reading: whose number was beyond counting
  chosen_spanish_reading: cuyo número era imposible de contar
  alternative_spanish_readings:
  - innumerable
  - sin número
  rationale: La revisión inglesa aclaró que el sentido es de número incalculable, no simplemente una expresión idiomática vaga. El español elegido conserva ese valor sin diluirlo.
  doctrine_reference: No doctrinal; precisión semántica del texto apocalíptico
translation_notes:
  revision_awareness: The English audit trail revised 'without number' to 'whose number was beyond counting' to better preserve the Latin sense of innumerability. The Spanish draft follows that clarified meaning with 'cuyo número era imposible de contar.' No English lexical decisions were recorded; the Spanish choices therefore derive directly from the Latin source, checked against the revised English for sense and register.
  spanish_consistency_notes:
  - Se usa «mar» y no una glosa interpretativa para preservar la imaginería del original.
  - Se mantiene el imperfecto perifrástico «se estaba reuniendo» para la acción en desarrollo.
  - No se introduce la convención de mayúsculas litúrgicas en términos no requeridos por el texto.
  - El registro es sobrio y publicable, sin intensificar más allá de la evidencia latina.
