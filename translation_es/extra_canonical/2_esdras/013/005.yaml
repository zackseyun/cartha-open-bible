  yaml_path: translation/extra_canonical/2_esdras/013/005.yaml
  text: And after this I looked, and behold, a multitude of men was gathering, whose number was beyond counting, from the four winds of heaven, to make war against the man who had come up from the sea.
  revision_pass:
    model: gpt-5.4
