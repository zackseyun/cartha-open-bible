  glossary_alignment: No aparecen términos del glosario mayor como Yahvé, Mesías, Cristo, etc. «Hombres» para hominum es aceptable aquí, y «del cielo» preserva bien caeli frente a interpretaciones más libres como «de los cuatro puntos». «Había subido del mar» refleja adecuadamente ascenderat de mari.
