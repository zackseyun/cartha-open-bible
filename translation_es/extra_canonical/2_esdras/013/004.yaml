base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/013/004.yaml
  text: And wherever a voice went out from his mouth[a], all who heard his voice burned[b], just as wax melts when it senses the fire.
  footnotes:
  - marker: a
    text: Or 'a voice'.
    reason: previous_rendering
  - marker: b
    text: Or 'were set ablaze'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:51:04Z'
    unchanged: false
    changes_summary: Changed 'the voice' to 'a voice' for more natural correspondence to the Latin, and replaced 'caught fire' with 'burned' for a more direct rendering of ardescebant.
translation:
  language: es
  text: Y dondequiera que salía la voz de su boca[a], todos los que oían su voz ardían, así como la cera se derrite cuando siente el fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una voz».
    reason: lexical_alternative
lexical_decisions:
- source_word: ubicumque
  english_pob_choice: wherever
  chosen_spanish: por dondequiera que
  alternatives_spanish:
  - dondequiera que
  - por donde sea que
  lexicon: ubicumque
  rationale: Conviene un correlativo que exprese extensión indefinida de lugar. "Por dondequiera que" conserva el alcance distributivo del latín sin sonar demasiado moderno ni demasiado rígido.
- source_word: vox
  english_pob_choice: a voice / the voice
  chosen_spanish: una voz
  alternatives_spanish:
  - la voz
  - voz
  lexicon: vox
  rationale: El latín no lleva artículo y el audit trail inglés conservó "a voice" en la revisión final. En español, "una voz" reproduce esa apertura formal sin perder que se trata de la voz que sale de su boca.
- source_word: ardescebant
  english_pob_choice: burned
  chosen_spanish: se encendían
  alternatives_spanish:
  - ardían
  - se quemaban
  - se prendían
  lexicon: ardesco
  rationale: El verbo latino es incoativo e indica que comenzaron a arder. "Se encendían" comunica el inicio del ardor y evita sugerir una acción externa explícita como "fueron incendiados".
- source_word: sicut liquescit cera
  english_pob_choice: just as wax melts
  chosen_spanish: así como la cera se derrite
  alternatives_spanish:
  - como la cera se derrite
  - tal como la cera se funde
  lexicon: liquesco
  rationale: '"Se derrite" es la correspondencia natural y clara en español para el deshacerse de la cera por calor. "Se funde" también sería posible, pero "se derrite" mantiene el paralelo más transparente con el inglés auditado y el latín.'
- source_word: quando senserit ignem
  english_pob_choice: when it senses the fire
  chosen_spanish: cuando siente el fuego
  alternatives_spanish:
  - cuando percibe el fuego
  - cuando nota el fuego
  lexicon: sentio
  rationale: El latín atribuye a la cera una percepción figurada del fuego. "Siente" conserva esa personificación sin explicarla ni suavizarla indebidamente.
theological_decisions:
- issue: Efecto de la voz sobre los oyentes
  english_pob_reading: all who heard his voice burned
  chosen_spanish_reading: todos los que oían su voz se encendían
  alternative_spanish_readings:
  - todos los que oían su voz ardían
  - todos los que oían su voz se quemaban
  rationale: No hay una doctrina específica en disputa, pero sí una imagen apocalíptica de juicio/poder. "Se encendían" mantiene la fuerza figurativa y el valor incoativo de ardescebant, sin convertir la imagen en una explicación literalista.
  doctrine_reference: imaginería apocalíptica de juicio y poder
translation_notes:
  revision_awareness: La revisión más reciente corrigió el inglés POB de "the voice" a "a voice" y de "caught fire" a "burned". La versión española refleja esa revisión con "una voz" y un verbo de combustión incoativa, evitando tanto la definitud excesiva como una pasiva ajena al latín.
  spanish_consistency_notes:
  - Mantengo "voz" de forma literal y no lo amplío a "palabra" o "proclamación", porque el latín usa vox.
  - '"Se encendían" intenta conservar el matiz incoativo del latín sin recurrir a una pasiva inexistente.'
  - La comparación final conserva la personificación de la cera, que es parte del paralelismo del texto.
