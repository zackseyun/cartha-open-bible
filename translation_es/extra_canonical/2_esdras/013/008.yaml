translation:
  language: es
  text: Y después de esto miré, y he aquí, todos los que se habían reunido contra él para atacarlo tenían mucho miedo, pero aun así se atrevían a luchar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: post haec vidi
  english_pob_choice: And after this I looked
  chosen_spanish: Y después de esto miré
  alternatives_spanish:
  - Y después de esto vi
  - Y luego de esto miré
  lexicon: post haec; videre
  rationale: Mantengo la secuencia narrativa simple y directa. «Miré» conserva el acto de observar del narrador con naturalidad en español, como en la versión inglesa auditable; «vi» sería posible, pero «miré» refleja mejor la perspectiva de atención visual del contexto.
- source_word: ecce
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: ecce
  rationale: «He aquí» reproduce el valor de atención y solemnidad de ecce en un registro bíblico claro y reconocible, sin volverlo arcaico en exceso.
- source_word: omnes, qui congregati sunt ad eum
  english_pob_choice: all those who had gathered against him
  chosen_spanish: todos los que se habían reunido contra él
  alternatives_spanish:
  - todos los que se habían congregado contra él
  - todos los que se juntaron contra él
  lexicon: omnes; congregari; ad eum
  rationale: El latín dice literalmente «se habían reunido hacia/contra él» en contexto hostil. En español, «contra él» explicita correctamente la dirección adversativa ya presente en el contexto, y «se habían reunido» conserva el valor perfectivo.
- source_word: ut expugnarent eum
  english_pob_choice: to attack him
  chosen_spanish: para atacarlo
  alternatives_spanish:
  - para asaltarlo
  - para combatirlo
  lexicon: ut expugnare
  rationale: Expugnare tiene el matiz de atacar con el fin de tomar por fuerza. «Atacarlo» es la opción más natural y fiel en español; «asaltarlo» sería más marcado militarmente.
- source_word: timebant valde
  english_pob_choice: were greatly afraid
  chosen_spanish: tenían mucho miedo
  alternatives_spanish:
  - estaban muy atemorizados
  - les daba mucho miedo
  lexicon: timere; valde
  rationale: Conserva el grado intensivo de valde y expresa el temor de forma idiomática. «Tenían mucho miedo» es transparente y suficientemente solemne para el texto bíblico.
- source_word: tamen audebant pugnare
  english_pob_choice: yet they still dared to fight
  chosen_spanish: pero aun así se atrevían a luchar
  alternatives_spanish:
  - sin embargo, se atrevían a pelear
  - pero seguían atreviéndose a combatir
  lexicon: tamen; audere; pugnare
  rationale: «Aun así» reproduce bien el contraste de tamen, y «se atrevían a luchar» conserva audere con fuerza verbal directa. «Luchar» suena natural y suficientemente amplio para pugnare.
theological_decisions:
- issue: Valor narrativo y hostil del grupo que se reúne contra la figura central
  english_pob_reading: all those who had gathered against him to attack him
  chosen_spanish_reading: todos los que se habían reunido contra él para atacarlo
  alternative_spanish_readings:
  - todos los que se habían congregado contra él para atacarlo
  - todos los que se habían reunido para atacarlo
  rationale: No hay una decisión doctrinal explícita en el verso, pero sí una lectura narrativa de oposición hostil. Mantengo el carácter adversativo sin añadir intensificación interpretativa que no esté en el latín.
  doctrine_reference: N/A
