    changes_summary: Changed 'spear' to 'sword' for lexical accuracy, since Latin frameam refers to a sword here. Kept the rest substantially unchanged.
translation:
  language: es
  text: 'y, puesto que no llevaba ni espada ni arma de guerra, destruyó el asalto de la multitud que había venido a atacarlo; esta es la interpretación:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: frameam
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - lanza
  - dardo
  lexicon: framea
  rationale: Sigo la revisión auditada del inglés POB, que corrigió 'spear' a 'sword' por precisión léxica. En español, 'espada' es la correspondencia más natural y fiel para ese ajuste.
- source_word: vas bellicosum
  english_pob_choice: weapon of war
  chosen_spanish: arma de guerra
  alternatives_spanish:
  - arma bélica
  - arma militar
  lexicon: vas
  rationale: '''Arma de guerra'' conserva el sentido genérico de instrumento bélico sin introducir una especificación no sustentada por el latín.'
- source_word: impetum
  english_pob_choice: the assault
  chosen_spanish: el ímpetu
  alternatives_spanish:
  - el asalto
  - el embate
  lexicon: impetus
  rationale: El latín puede abarcar la idea de embate, ataque o impulso; 'ímpetu' reproduce bien la fuerza dinámica del término, y el contexto de la multitud en ataque queda explícito en la relativa que sigue.
- source_word: multitudinis quae venerat ad expugnare eum
  english_pob_choice: of the multitude that had come to attack him
  chosen_spanish: de la multitud que había venido a atacarlo
  alternatives_spanish:
  - de la multitud que había venido para vencerlo
  - de la multitud que había venido a tomarlo por asalto
  lexicon: multitudo / expugnare
  rationale: '''Atacarlo'' comunica el valor contextual de ''expugnare'' sin sobredeterminar el tipo de agresión. ''Multitud'' mantiene la fuerza colectiva del latín.'
- source_word: haec interpretatio
  english_pob_choice: this is the interpretation
  chosen_spanish: esta es la interpretación
  alternatives_spanish:
  - ésta es la interpretación
  - esta es la explicación
  lexicon: interpretatio
  rationale: '''Interpretación'' sigue de cerca el sustantivo latino y preserva el marco interpretativo del pasaje.'
theological_decisions:
- issue: Naturaleza de la escena de violencia y poder
  english_pob_reading: yet destroyed the assault of the multitude that had come to attack him
  chosen_spanish_reading: destruyó el ímpetu de la multitud que había venido a atacarlo
  alternative_spanish_readings:
  - derribó el ataque de la multitud que había venido a atacarlo
  - venció el embate de la multitud que había venido a atacarlo
  rationale: No hay una carga doctrinal explícita en el versículo; la decisión principal es mantener el tono apocalíptico y la imagen de poder sin ampliar el sentido más allá del latín.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La traducción sigue la revisión auditada del inglés POB que cambió 'spear' por 'sword' para ajustarse con mayor precisión a frameam; por eso se eligió 'espada' en español. El resto del enunciado se mantiene sustancialmente alineado con el texto inglés revisado y el latín limpiado.
  spanish_consistency_notes:
  - Se mantiene 'arma de guerra' en vez de una paráfrasis más libre para conservar la transparencia léxica.
  - Se usa 'interpretación' como cierre formulaico, coherente con la función explicativa del latín.
  - Se evitó 'señaló' o 'explicó' porque debilitarían el paralelismo con haec interpretatio.
