translation:
  language: es
  text: y porque gobierna los tiempos y las cosas que son realizadas en los tiempos. Y me senté allí durante tres días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: gubernat
  english_pob_choice: he governs
  chosen_spanish: gobierna
  alternatives_spanish:
  - rige
  - gobierna
  lexicon: guberno
  rationale: El latín expresa autoridad activa sobre los tiempos; «gobierna» conserva ese sentido con naturalidad en español. «Rige» sería posible, pero aquí suena más jurídico y menos directo.
- source_word: tempora
  english_pob_choice: the times
  chosen_spanish: los tiempos
  alternatives_spanish:
  - los tiempos
  - los momentos
  lexicon: tempus
  rationale: «Tempora» es plural y conserva la idea de períodos o estaciones determinadas; «los tiempos» mantiene esa amplitud sin reducirlo a simples instantes.
- source_word: quae sunt in temporibus inlata
  english_pob_choice: the things that are brought about in the times
  chosen_spanish: las cosas que son traídas en los tiempos
  alternatives_spanish:
  - las cosas que suceden en los tiempos
  - las cosas que son llevadas a cabo en los tiempos
  lexicon: inlata
  rationale: La forma pasiva pide una expresión igualmente pasiva en español. «Son traídas» retiene la pasividad y evita convertir la frase en una paráfrasis más libre; «suceden» o «son llevadas a cabo» suavizarían la tensión del original.
- source_word: et sedi ibi tribus diebus
  english_pob_choice: And I sat there for three days
  chosen_spanish: Y me senté allí durante tres días
  alternatives_spanish:
  - Y estuve sentado allí por tres días
  - Y me senté allí por tres días
  lexicon: sedi
  rationale: El perfecto latino indica acción concluida; «me senté» reproduce el hecho simple. «Estuve sentado» explicita estado continuo, pero añade una matización no exigida por el texto.
theological_decisions:
- issue: Soberanía divina sobre los tiempos
  english_pob_reading: he governs the times and the things that are brought about in the times
  chosen_spanish_reading: gobierna los tiempos y las cosas que son traídas en los tiempos
  alternative_spanish_readings:
  - rige los tiempos y las cosas que ocurren en los tiempos
  - gobierna los tiempos y los acontecimientos que en ellos se producen
  rationale: El texto atribuye a Dios control sobre el tiempo y sobre lo que ocurre dentro de él. La traducción conserva esa afirmación sin suavizarla a una mera observación providencial general.
  doctrine_reference: Providencia y soberanía divina
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió un corrimiento de versículos en el inglés: este versículo contiene solo la afirmación sobre que Dios gobierna los tiempos y las cosas que acontecen en ellos, seguida de la nota de que el hablante se sentó allí tres días. No se conserva la expansión anterior de 2 Esdras 13:57, y por eso la traducción española sigue estrictamente el límite del verso 58.'
  spanish_consistency_notes:
  - Se mantiene «tiempos» en plural para reflejar tempora.
  - Se evita «SEÑOR» y se traduce la acción divina de manera directa, sin alterar el sujeto implícito del contexto.
  - No se introduce ningún marcador de nota porque el texto español no requiere pie de página para esta unidad versicular.
