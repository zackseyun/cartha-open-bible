translation:
  language: es
  text: Pero aquellos de tu pueblo que queden, los que se hallen dentro de mi territorio santo[a], serán salvados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero aquellos de tu pueblo que queden, los que se hallen dentro de mi territorio santo—».'
    reason: Refleja la alternativa previa que dejaba la oración suspendida por la deficiencia del latín transmitido.
lexical_decisions:
- source_word: derelicti sunt de populo tuo
  english_pob_choice: those of your people who are left
  chosen_spanish: los que queden de tu pueblo
  alternatives_spanish:
  - los que quedan de tu pueblo
  - los sobrevivientes de tu pueblo
  - los que permanecen de tu pueblo
  lexicon: derelinquere / relinquere
  rationale: El participio pasivo latino expresa un resto dejado o remanente; en español, 'los que queden' conserva la idea de remanente sin añadir matices no presentes. 'De tu pueblo' mantiene la relación posesiva del original.
- source_word: qui inueniuntur
  english_pob_choice: who are found
  chosen_spanish: los que se hallen
  alternatives_spanish:
  - los que son encontrados
  - los que se encuentran
  lexicon: invenire
  rationale: '''Se hallen'' transmite la pasiva/resultado del hallazgo de manera natural en español bíblico contemporáneo y preserva el sentido de ser localizados dentro del límite.'
- source_word: intra terminum meum Sanctum
  english_pob_choice: within my holy border
  chosen_spanish: dentro de mi santo límite
  alternatives_spanish:
  - dentro de mi límite santo
  - dentro de mi frontera santa
  - dentro de mi santo territorio
  lexicon: terminus
  rationale: '''Terminum'' no obliga a ''frontera''; ''límite'' reproduce con más precisión el valor delimitador del latín. ''Santo'' se conserva como calificativo del espacio consagrado.'
- source_word: erit ergo ... salvabuntur / preserved implied from daughter versions
  english_pob_choice: shall be saved
  chosen_spanish: serán salvados
  alternatives_spanish:
  - serán rescatados
  - vivirán
  - serán librados
  lexicon: salvare
  rationale: Aunque el latín transmitido queda defectuoso y no conserva aquí un verbo completo, el audit trail inglés y las versiones hijas apoyan 'serán salvados'. 'Salvados' es la forma más directa y fiel en español.
theological_decisions:
- issue: Completar el miembro verbal ausente en la transmisión latina
  english_pob_reading: shall be saved
  chosen_spanish_reading: serán salvados
  alternative_spanish_readings:
  - vivirán
  - serán librados
  rationale: El testimonio latino está truncado en este punto; sin embargo, el propio audit trail inglés y las versiones dependientes preservan un verbo de salvación/supervivencia. Por eso se incorpora explícitamente el verbo implícito en la traducción española, en vez de dejar la oración suspendida.
  doctrine_reference: 'Textual criticism: transmission defect / daughter-version support'
translation_notes:
  revision_awareness: La versión latina base está defectuosa al final del verso y carece de un verbo principal para el sujeto; el audit trail inglés revisó una suspensión con raya hacia una cláusula completa basada en el apoyo de siriaco, etiópico y árabe. La traducción española sigue la lectura completada y evita copiar el quiebre textual como si fuera intencional.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no aplicable aquí; el hablante es la primera persona divina del texto.
  - '''santo límite'' conserva la imagen espacial del latín sin introducir un término eclesiástico ajeno.'
  - '''serán salvados'' corresponde al soporte de las versiones hijas y a la revisión del texto latino truncado.'
