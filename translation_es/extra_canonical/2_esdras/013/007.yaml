base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/013/007.yaml
  text: But I sought to see the region or place from which the mountain had been carved, and I could not.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:51:07Z'
    unchanged: false
    changes_summary: Removed the unnecessary particle 'out' after 'carved' to more closely match the Latin sculptus esset while keeping natural English.
translation:
  language: es
  text: Pero yo procuré ver la región o el lugar de dónde había sido tallado el monte, y no pude.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ego autem quaesivi
  english_pob_choice: But I sought
  chosen_spanish: Pero yo traté de ver
  alternatives_spanish:
  - Pero busqué
  - Pero procuré ver
  lexicon: quaerere
  rationale: El latín expresa el intento de buscar/ver; en español, «traté de ver» comunica con naturalidad la intención y el esfuerzo implícitos, manteniendo el matiz de acción frustrada que sigue con «y no pude».
- source_word: regionem vel locum
  english_pob_choice: the region or place
  chosen_spanish: la región o el lugar
  alternatives_spanish:
  - la comarca o el lugar
  - el territorio o el lugar
  lexicon: regio / locus
  rationale: Se conserva la doble posibilidad del original, sin resolverla indebidamente. «Región o lugar» reproduce el paralelismo del latín y del inglés auditado.
- source_word: unde
  english_pob_choice: from which
  chosen_spanish: de donde
  alternatives_spanish:
  - desde donde
  - del cual
  lexicon: unde
  rationale: «De donde» es la construcción más natural en español para expresar procedencia. Mantiene la relación espacial de origen sin añadir precisión no presente en el texto.
- source_word: sculptus esset
  english_pob_choice: had been carved
  chosen_spanish: había sido tallado
  alternatives_spanish:
  - había sido esculpido
  - había sido labrado
  lexicon: sculpere
  rationale: El participio latino indica una acción pasiva ya realizada. «Tallado» es claro y fiel; «esculpido» también sería posible, pero «tallado» puede sonar menos artístico y más literal al trabajo sobre una montaña.
- source_word: mons
  english_pob_choice: the mountain
  chosen_spanish: el monte
  alternatives_spanish:
  - la montaña
  lexicon: mons
  rationale: Aunque en español «montaña» es común, «monte» conserva mejor el registro bíblico y la referencia a una elevación rocosa, además de concordar con el uso tradicional en textos bíblicos hispánicos cuando el contexto lo favorece.
- source_word: et non potui
  english_pob_choice: and I could not
  chosen_spanish: y no pude
  alternatives_spanish:
  - y no lo pude hacer
  - y no fui capaz
  lexicon: posse
  rationale: La forma breve «y no pude» reproduce la negación de capacidad o logro, sin sobreexplicar el objeto omitido por el latín.
translation_notes:
  revision_awareness: El inglés auditado fue revisado para eliminar el innecesario «out» tras «carved», quedando más cerca de sculptus esset. La versión española sigue esa lectura más cercana al latín, usando un pasivo perfecto simple («había sido tallado») sin añadir partículas equivalentes a «out».
  spanish_consistency_notes:
  - He mantenido un estilo bíblico sobrio y claro, con sintaxis moderna.
  - He conservado la ambigüedad deliberada entre «región» y «lugar» porque el original ofrece ambas opciones.
  - No se añadieron notas teológicas porque el versículo es descriptivo y no introduce un debate doctrinal explícito.
