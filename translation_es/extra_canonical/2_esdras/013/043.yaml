    timestamp: '2026-04-23T19:51:40Z'
    unchanged: false
    changes_summary: Added "into" to more naturally and fully reflect the motion expressed by introierunt with the accusative object.
translation:
  language: es
  text: Y entraron en los angostos pasos del río Éufrates.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: angustos
  english_pob_choice: narrow passages
  chosen_spanish: los angostos pasos
  alternatives_spanish:
  - los angostos pasajes
  - los estrechos pasos
  - los angostos estrechos
  lexicon: angustus > angosto; passus/iter contextually > paso
  rationale: El latín describe un pasaje estrecho; en español, «pasos» comunica mejor una vía transitable que «pasajes», y «angostos» conserva la idea de estrechez sin sonar excesivamente literario.
- source_word: fluminis Eufratis
  english_pob_choice: river Euphrates
  chosen_spanish: del río Éufrates
  alternatives_spanish:
  - del río Eufrates
  - del Éufrates
  lexicon: flumen > río; Euphrates > Éufrates
  rationale: Se mantiene el nombre propio bíblico con acento español estándar («Éufrates») y la referencia explícita al río, como en el inglés POB.
- source_word: introierunt
  english_pob_choice: they entered into
  chosen_spanish: entraron en
  alternatives_spanish:
  - entraron dentro de
  - ingresaron en
  lexicon: introire > entrar en
  rationale: El movimiento de entrada del verbo latino se refleja naturalmente en español con «entraron en»; evita un calco rígido y conserva el valor direccional que el POB inglés reforzó con «into».
theological_decisions:
- issue: Direccionalidad del movimiento
  english_pob_reading: they entered into the narrow passages
  chosen_spanish_reading: y entraron en los angostos pasos
  alternative_spanish_readings:
  - y entraron por los angostos pasos
  - y se metieron en los angostos pasos
  rationale: No hay tensión doctrinal; la decisión es de precisión aspectual. «En» reproduce la entrada a un espacio delimitado, manteniendo la dirección que la revisión inglesa quiso hacer explícita.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa cambió «by the narrow passages» a «into the narrow passages» para reflejar mejor el movimiento de introierunt. La versión española sigue esa revisión con «entraron en», sin añadir elementos no sustentados por el latín.
  spanish_consistency_notes:
  - Se emplea «Éufrates» con acento, conforme al uso bíblico en español.
  - Se evita «SEÑOR» u այլ terminología no presente en el texto; el versículo no contiene el nombre divino.
  - La puntuación y la sintaxis buscan ser publicables y sobrias, sin expandir el contenido del fragmento latino.
