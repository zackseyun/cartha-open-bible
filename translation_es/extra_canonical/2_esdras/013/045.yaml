translation:
  language: es
  text: Porque había un largo trayecto por recorrer por esa región, de un año y medio; y esa región se llama Arzareth.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: dimidii
  english_pob_choice: of a year and a half
  chosen_spanish: de un año y medio
  alternatives_spanish:
  - por un año y medio
  - de año y medio
  lexicon: dimidii
  rationale: El latín expresa una duración de “un año y medio”, y la versión inglesa auditada mantiene ese sentido temporal. En español, “de un año y medio” comunica naturalmente la duración del viaje sin añadir especificaciones no presentes en el texto.
- source_word: nam regio illa uocatur Arzareth
  english_pob_choice: and that region is called Arzareth
  chosen_spanish: y esa región se llama Arzareth
  alternatives_spanish:
  - y aquella región se llama Arzareth
  - y esa región es llamada Arzareth
  lexicon: vocatur
  rationale: Vocatur indica el nombre por el que es conocida la región. “Se llama” es la forma más natural y fiel en español; conserva el valor nominal del pasivo sin forzar una pasiva más rígida.
- source_word: regio illa
  english_pob_choice: that region
  chosen_spanish: esa región
  alternatives_spanish:
  - aquella región
  - la región aquella
  lexicon: regio
  rationale: “Esa región” reproduce el deíctico del original con naturalidad en español y mantiene la referencia mostrada en el contexto inmediato.
theological_decisions:
- issue: Topónimo Arzareth y su tratamiento
  english_pob_reading: that region is called Arzareth
  chosen_spanish_reading: esa región se llama Arzareth
  alternative_spanish_readings:
  - esa región es conocida como Arzareth
  - esa región recibe el nombre de Arzareth
  rationale: No hay indicio en el texto de una glosa teológica o explicativa adicional; el nombre propio debe conservarse tal como aparece. La formulación española evita sobreinterpretar el topónimo y preserva el dato narrativo.
  doctrine_reference: No doctrinal issue; proper-name preservation
translation_notes:
  revision_awareness: La versión inglesa auditada no tiene notas ni revisiones aplicadas, y el chequeo cruzado reporta alta concordancia; por ello no se introducen variantes textuales ni notas críticas adicionales.
  spanish_consistency_notes:
  - Se mantiene “Arzareth” como nombre propio sin transliteración alternativa.
  - Se usa “región” de manera consistente con el inglés auditado y el latín regio.
  - La duración se expresa con una construcción temporal idiomática en español, sin alterar el contenido del original.
