  source_alignment_summary: 'El borrador español conserva en general el sentido del tramo latino auditado por el POB: una larga travesía de un año y medio y el nombre de la región, Arzareth. Sin embargo, la construcción inicial «Pues por esa región había un largo camino que recorrer» no refleja con suficiente naturalidad ni precisión la idea de ‘había un largo trayecto por recorrer a través de esa región’.'
