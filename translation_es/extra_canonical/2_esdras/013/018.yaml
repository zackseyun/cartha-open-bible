review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el latín: intellegentes = ''entendiendo'', quae sunt reposita = ''lo que está reservado'', y mantiene el referente plural de eis. Sin embargo, ''para los últimos días'' debilita la locación temporal de in novissimis diebus, que se refleja mejor como ''en los últimos días''. Además, el inglés POB conserva una nota de alternativa para occurrentes, y conviene preservarla en español.'
  spanish_quality_summary: El español es claro y legible, pero 'reservado para los últimos días' suena más interpretativo que el original. 'No encontrándolos' es natural, aunque en español el antecedente de 'los' puede quedar algo difuso; aun así, el contexto inmediato lo sostiene. 'Pero también los que quedan atrás' es comprensible y digno.
  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones léxicas principales son adecuadas. Se recomienda ajustar la preposición temporal a 'en' para mayor fidelidad al latín.
  issues:
  - severity: medium
    issue: '''para los últimos días'' en vez de ''en los últimos días'''
    rationale: El latín in novissimis diebus es locativo/temporal ('en los últimos días'), no primariamente final ('para'). 'Para' introduce una interpretación de destino que no está marcada en esa frase concreta.
  - severity: low
    issue: Falta la nota de alternativa para occurrentes
    rationale: El rastro de auditoría inglés preserva una alternativa significativa ('meeting it' previamente; ahora el contraste relevante es 'encontrar' frente a 'alcanzar/toparse con'). Dado que el verbo latino admite matiz debatido y ya hubo revisión, conviene mantener una nota breve en español.
