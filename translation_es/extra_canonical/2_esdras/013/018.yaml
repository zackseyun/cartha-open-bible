translation:
  language: es
  text: entendiendo lo que está reservado en los últimos días y no encontrándolos[a]. Pero también los que quedan atrás
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'y sin alcanzarlos'.
    reason: Preserva la alternativa léxica debatida para occurrentes/eis sin perder la elección principal 'encontrándolos'.
lexical_decisions:
- source_word: intellegentes
  english_pob_choice: understanding
  chosen_spanish: entendiendo
  alternatives_spanish:
  - comprendiendo
  - entendiendo
  lexicon: intellego
  rationale: El participio latino expresa la idea de comprender o entender; ‘entendiendo’ conserva ese valor de manera natural en español y mantiene el participio funcional del original.
- source_word: quae sunt reposita
  english_pob_choice: what is stored up
  chosen_spanish: lo que está reservado
  alternatives_spanish:
  - lo que está almacenado
  - lo que está guardado
  lexicon: repono
  rationale: ‘Reposita’ sugiere algo puesto aparte o reservado. ‘Reservado’ comunica bien el sentido de estar dispuesto de antemano para un tiempo futuro, sin reducirlo a un mero almacenamiento físico.
- source_word: in novissimis diebus
  english_pob_choice: in the last days
  chosen_spanish: para los últimos días
  alternatives_spanish:
  - en los últimos días
  - para los días finales
  lexicon: novissimus
  rationale: La expresión temporal apunta al período escatológico; ‘para los últimos días’ refleja la idea de lo reservado con destino a ese tiempo.
- source_word: et non occurrentes eis
  english_pob_choice: and not encountering them
  chosen_spanish: y no encontrándolos
  alternatives_spanish:
  - y no hallándolos
  - y no topándose con ellos
  lexicon: occurrere
  rationale: La revisión inglesa entendió ‘occurrentes’ como ‘encountering’ más que ‘meeting’ o ‘attaining’. En español, ‘encontrándolos’ conserva esa noción de llegar a tropezar o dar con ellos, con el antecedente plural ‘las cosas’.
- source_word: sed et qui derelicti sunt
  english_pob_choice: But also those who are left behind
  chosen_spanish: Pero también los que quedan atrás
  alternatives_spanish:
  - Pero también los que han quedado
  - Y también los que quedan rezagados
  lexicon: derelinquo
  rationale: ‘Derelicti sunt’ significa literalmente ‘han sido dejados’. ‘Quedan atrás’ mantiene la imagen de los abandonados o rezagados sin introducir un matiz ajeno.
theological_decisions:
- issue: Referente plural de 'eis' y de 'quae sunt reposita'
  english_pob_reading: and not encountering them
  chosen_spanish_reading: y no encontrándolos
  alternative_spanish_readings:
  - y no encontrándolo
  - y no alcanzándolos
  rationale: El objeto es plural, refiriéndose a ‘las cosas’ reservadas para los últimos días. Se conserva ese plural en español para no borrar la referencia del texto fuente.
  doctrine_reference: None
translation_notes:
  revision_awareness: 'Se atendió la corrección más reciente del audit trail: se restauró el cierre del miembro final ''sed et qui derelicti sunt'' y se evitó la lectura ''attaining'' en favor de un equivalente más cercano a ''occurrentes''. También se corrigió el número plural del referente implícito.'
  spanish_consistency_notes:
  - Se mantiene un español sobrio y publicable, sin calcos excesivos del latín.
  - Se preserva el contraste entre lo reservado para el futuro y la imposibilidad de ‘encontrarlo’ en el momento aludido.
  - No se introducen notas al pie porque el verso no requiere una variante anclada en el texto español.
