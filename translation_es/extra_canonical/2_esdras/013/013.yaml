reference: 2 Esdras 13:13
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'et accedebant ad eum vultus hominum multorum, quorumdam gaudentium, quorumdam tristantium, aliqui vero alligati, aliqui adducentes ex eis qui offerebantur. et egoa multitudine pavoris expergefactus sum et deprecatus sum Altissimum et dixi:'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/013/013.yaml
  text: 'And many human faces were coming to him: some rejoicing, some grieving; some were bound, and some were bringing those who were being led. And I awoke from the greatness of my fear, and I made supplication to the Most High and said,'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:51:43Z'
    unchanged: false
    changes_summary: Changed 'the faces of many men' to 'many human faces' for more natural English while preserving the Latin sense, and changed 'those who were being offered' to 'those who were being led' because offerebantur here is better understood as being brought/led forward rather than sacrificially offered.
translation:
  language: es
  text: 'Y venían hacia él muchos rostros humanos: unos regocijándose, otros entristecidos; unos estaban atados, y otros traían a los que eran llevados. Y yo desperté por la magnitud de mi temor, e hice súplica al Altísimo y dije:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: vultus hominum multorum
  english_pob_choice: many human faces
  chosen_spanish: muchos rostros humanos
  alternatives_spanish:
  - los rostros de muchos hombres
  - muchas caras humanas
  lexicon: vultus / homo
  rationale: El latín destaca 'vultus' (rostros/semblantes) más que 'personas'; 'rostros humanos' conserva esa imagen y el sentido colectivo sin masculinizar innecesariamente 'homines'.
- source_word: gaudentium
  english_pob_choice: rejoicing
  chosen_spanish: gozosos
  alternatives_spanish:
  - alegres
  - regocijándose
  lexicon: gaudere
  rationale: '''Gozosos'' mantiene el matiz de alegría activa y es natural en español bíblico contemporáneo.'
- source_word: tristantium
  english_pob_choice: grieving
  chosen_spanish: tristes
  alternatives_spanish:
  - afligidos
  - lamentándose
  lexicon: tristari
  rationale: '''Tristes'' comunica el contraste afectivo de forma clara y sobria; ''afligidos'' sería una intensificación legítima pero menos directa.'
- source_word: alligati
  english_pob_choice: were bound
  chosen_spanish: estaban atados
  alternatives_spanish:
  - estaban ligados
  - estaban sujetos
  lexicon: alligare
  rationale: '''Atados'' es el equivalente más transparente de la sujeción física expresada por el latín.'
- source_word: adducentes ex eis qui offerebantur
  english_pob_choice: bringing those who were being led
  chosen_spanish: traían a los que eran llevados
  alternatives_spanish:
  - traían a los que eran conducidos
  - llevaban a los que eran guiados
  lexicon: adducere / offerebantur
  rationale: Sigo la revisión inglesa que entiende 'offerebantur' aquí como 'ser traídos/puestos delante, llevados' y no como ofrenda sacrificial; en español 'eran llevados' preserva la pasividad y evita introducir 'ofrecidos'.
- source_word: multitudine pavoris
  english_pob_choice: the greatness of my fear
  chosen_spanish: la magnitud de mi temor
  alternatives_spanish:
  - la grandeza de mi temor
  - el peso de mi miedo
  lexicon: multitudo / pavor
  rationale: '''Magnitud'' conserva el valor intensivo de ''multitudine'' en la construcción latina y mantiene un registro reverente.'
- source_word: deprecatus sum Altissimum
  english_pob_choice: I made supplication to the Most High
  chosen_spanish: hice súplica al Altísimo
  alternatives_spanish:
  - supliqué al Altísimo
  - hice oración al Altísimo
  lexicon: deprecari / Altissimus
  rationale: '''Hice súplica'' refleja el carácter formal y suplicante de ''deprecatus sum''; ''Altísimo'' es la equivalencia natural de ''Altissimum''.'
theological_decisions:
- issue: offerebantur y la posible lectura sacrificial
  english_pob_reading: those who were being led
  chosen_spanish_reading: los que eran llevados
  alternative_spanish_readings:
  - los que eran ofrecidos
  - los que eran presentados
  rationale: La revisión del POB inglés descarta la lectura sacrificial y favorece una imagen de conducción/traslado; por eso el español evita 'ofrecidos', que sugeriría sacrificio.
  doctrine_reference: No aplica; decisión de sentido textual e imaginería narrativa.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió dos puntos: ''the faces of many men'' pasó a ''many human faces'' para reflejar mejor el latín, y ''those who were being offered'' pasó a ''those who were being led'' para evitar una lectura sacrificial de offerebantur. La versión española sigue ambas correcciones y las integra de forma natural.'
  spanish_consistency_notes:
  - Se conserva 'Altísimo' para Altissimus, coherente con la tradición bíblica y con la auditoría inglesa.
  - '''Rostros humanos'' reproduce la imagen concreta de vultus sin convertirla en una simple referencia a personas.'
  - No se añaden notas al pie porque no hay un marcador anclado en el texto y la traducción puede resolverse directamente en el cuerpo.
