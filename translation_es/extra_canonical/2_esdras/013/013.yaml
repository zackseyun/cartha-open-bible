revisions:
- from: 'Y se acercaban a él muchos rostros humanos: unos gozosos, otros tristes; unos estaban atados, y otros traían a los que eran llevados. Y yo desperté por la magnitud de mi temor, e hice súplica al Altísimo y dije:'
  to: 'Y venían hacia él muchos rostros humanos: unos regocijándose, otros entristecidos; unos estaban atados, y otros traían a los que eran llevados. Y yo desperté por la magnitud de mi temor, e hice súplica al Altísimo y dije:'
  rationale: Se ajusta la primera cláusula para que la imagen de 'rostros humanos' siga siendo fiel al latín pero suene natural en español. También se da más fuerza verbal a la serie participial con 'regocijándose', mientras se conserva el sentido del original y la decisión auditada sobre 'offerebantur' como 'eran llevados'.
  reviewer_model: gpt-5.4
