    unchanged: false
    changes_summary: Removed 'up' before 'upon it' for closer alignment with the Latin volavit super eum and more natural phrasing.
translation:
  language: es
  text: Y vi, y he aquí, talló para sí mismo un gran monte y voló sobre él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et vidi
  english_pob_choice: And I looked
  chosen_spanish: Y miré
  alternatives_spanish:
  - Y vi
  - Y contemplé
  lexicon: ver / mirar
  rationale: El latín vidi permite tanto ‘vi’ como ‘miré’; ‘miré’ conserva el tono narrativo de observación atenta que refleja el inglés POB y suena natural en español bíblico contemporáneo sin volverse mecánico.
- source_word: sibimet ipso
  english_pob_choice: for himself
  chosen_spanish: para sí mismo
  alternatives_spanish:
  - para él mismo
  - por sí mismo
  lexicon: sí mismo
  rationale: La forma reflexiva expresa con claridad que la acción recae sobre el mismo sujeto; ‘para sí mismo’ reproduce el matiz de beneficio/posesión implícito en el latín sin añadir interpretación.
- source_word: sculpsit
  english_pob_choice: he carved out
  chosen_spanish: talló
  alternatives_spanish:
  - esculpió
  - cortó
  lexicon: tallar / esculpir
  rationale: ‘Talló’ mantiene la fuerza concreta de sculpsit y funciona bien con el objeto ‘monte’; ‘esculpió’ suena más artístico en español, mientras que ‘cortó’ debilita la imagen.
- source_word: montem magnum
  english_pob_choice: a great mountain
  chosen_spanish: un gran monte
  alternatives_spanish:
  - una gran montaña
  - un monte grande
  lexicon: monte / montaña
  rationale: Se conserva ‘monte’ porque el latín dice montem y la imagen puede abarcar una elevación prominente sin forzar la equivalencia moderna de ‘montaña’; ‘gran’ reproduce magnus de forma idiomática.
- source_word: volavit super eum
  english_pob_choice: flew upon it
  chosen_spanish: voló sobre él
  alternatives_spanish:
  - voló encima de él
  - voló por encima de él
  lexicon: volar + sobre
  rationale: ‘Sobre él’ corresponde directamente a super eum y mantiene la sencillez del latín. El antecedente en español es ‘monte’, un sustantivo masculino, por lo que el pronombre ‘él’ es gramatical y referencialmente claro.
theological_decisions:
- issue: Imagen simbólica del monte
  english_pob_reading: a great mountain
  chosen_spanish_reading: un gran monte
  alternative_spanish_readings:
  - una gran montaña
  - un monte grande
  rationale: No se explicita el símbolo ni se alegoriza el monte; la traducción preserva la imagen visual tal como aparece en el texto fuente y en el POB inglés.
  doctrine_reference: 'Principio de contención exegética: no ampliar la figura más allá de la evidencia textual.'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que eliminó ‘up’ antes de ‘upon it’ para alinearse mejor con volavit super eum; por eso el español usa simplemente ‘voló sobre él’, sin añadir una idea direccional extra.
  spanish_consistency_notes:
  - Se mantiene ‘Y miré’ como fórmula narrativa sencilla y reverente.
  - Se evita ‘SEÑOR’ u otra sustitución teológica porque el versículo no contiene el nombre divino.
  - El pronombre ‘él’ se usa para referirse al monte, coherente con su género gramatical en español.
  - No se añadieron notas al pie porque el pasaje no presenta variantes textuales ni ambigüedades relevantes que requieran anclaje.
