    timestamp: '2026-04-23T19:51:40Z'
    unchanged: false
    changes_summary: Removed 'for them,' which is not present in the Latin. Kept the rest of the wording as a natural and accurate rendering of the extant clause.
translation:
  language: es
  text: Entonces el Altísimo hizo señales y detuvo los cauces del río hasta que cruzaron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Supremo
  lexicon: Latin altissimus > Spanish Altísimo
  rationale: El latín nombra a Dios con un superlativo absoluto; «el Altísimo» es la equivalencia española natural y reverente, y mantiene el valor titular del original sin añadir explicación no presente.
- source_word: signa
  english_pob_choice: performed signs
  chosen_spanish: hizo señales
  alternatives_spanish:
  - realizó señales
  - obró señales
  - hizo prodigios
  lexicon: Latin signa > Spanish señales
  rationale: «Signa» señala actos visibles extraordinarios; «hizo señales» conserva la brevedad del latín y del inglés POB, sin cargar el texto con una interpretación más específica que la atestiguada.
- source_word: statuit uenas fluminis
  english_pob_choice: held back the channels of the river
  chosen_spanish: detuvo los cauces del río
  alternatives_spanish:
  - retuvo los cauces del río
  - detuvo las corrientes del río
  - contuvo los cauces del río
  lexicon: Latin venae fluminis > Spanish cauces del río
  rationale: «Venas del río» en latín puede referirse a sus corrientes o cauces; en español «cauces del río» comunica bien la imagen de los conductos del agua y evita una metáfora demasiado literal que sonaría extraña.
theological_decisions:
- issue: Referencia al poder divino en la acción milagrosa
  english_pob_reading: For then the Most High performed signs, and held back the channels of the river until they had crossed.
  chosen_spanish_reading: Entonces el Altísimo hizo señales y detuvo los cauces del río hasta que cruzaron.
  alternative_spanish_readings:
  - Entonces el Altísimo obró señales y contuvo los cauces del río hasta que cruzaron.
  - Entonces el Altísimo hizo prodigios y detuvo las corrientes del río hasta que cruzaron.
  rationale: El versículo atribuye la intervención milagrosa directamente al Altísimo. La traducción conserva esa agencia divina sin suavizarla ni convertirla en mera ayuda providencial.
  doctrine_reference: Providencia y milagro divino en la narrativa bíblica
translation_notes:
  revision_awareness: La revisión inglesa eliminó «for them» por no estar en el latín; la versión española también omite cualquier equivalente añadido y se ajusta solo al contenido atestiguado por el texto latino conservado.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» como título divino reverente y consistente con el latín.
  - Se evita introducir un sujeto adicional o una finalidad que el latín no expresa.
  - «Señales» conserva la neutralidad semántica del latín signa sin sobreinterpretar el tipo exacto de milagro.
