translation:
  language: es
  text: Y porque viste salir de su boca algo como aliento, fuego y tempestad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «espíritu y fuego y tempestad».'
    reason: alternative_reading
lexical_decisions:
- source_word: quoniam
  english_pob_choice: because
  chosen_spanish: Y porque
  alternatives_spanish:
  - Y ya que
  - Y puesto que
  lexicon: quoniam
  rationale: El latín introduce la explicación causal; 'porque' comunica bien la relación sin forzar un matiz más técnico. Se conserva el enlace discursivo con 'Y' para mantener la continuidad de la frase en español.
- source_word: ut spiritum
  english_pob_choice: breath
  chosen_spanish: como ... salían aliento
  alternatives_spanish:
  - como ... salía espíritu
  - como ... salía viento
  lexicon: ut + spiritum
  rationale: El audit trail inglés reconoce la lectura comparativa de ut ('like/as it were') y corrige 'spirit' a 'breath'. En español, 'como' reproduce la comparación, y 'aliento' expresa mejor la fuerza emanada desde la boca que 'espíritu' o 'viento' sin perder la imagen física.
- source_word: ignem
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llamas
  lexicon: ignis
  rationale: '''Fuego'' es la equivalencia directa y natural en español; mantiene la imagen apocalíptica sin añadir especificación no presente en el latín.'
- source_word: tempestatem
  english_pob_choice: storm
  chosen_spanish: tempestad
  alternatives_spanish:
  - tormenta
  - huracán
  lexicon: tempestas
  rationale: '''Tempestad'' conserva el registro elevado y el sentido de violencia atmosférica o devastadora que pide el contexto visionario. ''Tormenta'' también sería posible, pero ''tempestad'' suena más amplio y solemne.'
theological_decisions:
- issue: 'Naturaleza de lo que sale de la boca: comparación visionaria o afirmación literal'
  english_pob_reading: something like breath and fire and storm coming out from his mouth
  chosen_spanish_reading: como ... salían aliento, fuego y tempestad
  alternative_spanish_readings:
  - salían aliento, fuego y tempestad
  - salía algo como aliento, fuego y tempestad
  rationale: Se preserva el valor de ut como comparación ('como'), evitando presentar la imagen como una descripción literal sin matiz. Esto respeta la forma apocalíptica del pasaje y la revisión inglesa que corrigió la omisión de la comparación.
  doctrine_reference: Apocalíptica visionaria; no se formula una doctrina, sino una imagen simbólica del poder que procede del personaje visionado.
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente del audit trail inglés, que corrigió la omisión de la comparación introducida por ut y prefirió una lectura natural de quoniam como 'because'. La versión española conserva esa comparación con 'como' y evita endurecer la imagen a una afirmación literal.
  spanish_consistency_notes:
  - Se mantiene 'Dios'/'Yahvé' sin aplicar aquí porque el versículo no contiene esos términos.
  - Se usa un registro bíblico sobrio y contemporáneo, evitando arcaísmos innecesarios.
  - '''Aliento'' se eligió para evitar la ambigüedad de ''espíritu'' en español, pero se documenta la alternativa tradicional en nota porque el latín permite esa lectura léxica.'
