  text: et post haec vidi ipsum hominem descendentem de monte et advocantem ad se multitudinem aliam pacificam.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/013/012.yaml
  text: And after this I saw that man coming down from the mountain and calling to himself another peaceful multitude[a].
  footnotes:
  - marker: a
    text: Or 'After this I saw'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:51:12Z'
    unchanged: false
    changes_summary: Removed 'same' since ipsum here is adequately represented by 'that' rather than 'that same'; smoothed the final phrase from 'another multitude, a peaceful one' to the more natural and still accurate 'another peaceful multitude.'
translation:
  language: es
  text: Y después de esto vi a aquel hombre descender del monte y llamar hacia sí a otra multitud pacífica.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y luego
  - Y después
  lexicon: conjunción coordinante
  rationale: Se conserva la parataxis del latín con una conjunción simple; en español, 'Y' reproduce mejor el enlace directo que una paráfrasis más interpretativa.
- source_word: post haec
  english_pob_choice: after this
  chosen_spanish: después de esto
  alternatives_spanish:
  - tras esto
  - luego de esto
  lexicon: adverbial de secuencia
  rationale: Mantiene la referencia secuencial inmediata del original sin añadir contenido no presente.
- source_word: vidi
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré
  - observé
  lexicon: ver
  rationale: '''Vi'' es la correspondencia más directa y transparente del perfecto latino, sin desplazar el sentido hacia una acción más libre como ''miré''.'
- source_word: ipsum hominem
  english_pob_choice: that man
  chosen_spanish: aquel hombre
  alternatives_spanish:
  - ese hombre
  - ese varón
  lexicon: hombre
  rationale: '''Aquel'' refleja la deixis del demostrativo con distancia narrativa; ''hombre'' mantiene la referencia personal sin imponer un término más técnico o doctrinal.'
- source_word: descendentem de monte
  english_pob_choice: coming down from the mountain
  chosen_spanish: que descendía del monte
  alternatives_spanish:
  - que bajaba del monte
  - que venía descendiendo del monte
  lexicon: descender
  rationale: '''Descendía del monte'' preserva el aspecto verbal progresivo del participio latino y conserva el matiz de descenso formal del original.'
- source_word: advocantem ad se
  english_pob_choice: calling to himself
  chosen_spanish: que llamaba a sí
  alternatives_spanish:
  - que llamaba para sí
  - que convocaba a sí
  lexicon: llamar a sí
  rationale: La construcción 'llamar a sí' mantiene la fuerza reflexiva y convocante del latín sin suavizarla demasiado; 'convocaba' sería más interpretativo.
- source_word: multitudinem aliam
  english_pob_choice: another multitude
  chosen_spanish: otra multitud
  alternatives_spanish:
  - una multitud distinta
  - una multitud nueva
  lexicon: multitud
  rationale: '''Otra multitud'' reproduce con sencillez el valor de alteram/aliam sin añadir matices no explícitos.'
- source_word: pacificam
  english_pob_choice: peaceful
  chosen_spanish: pacífica
  alternatives_spanish:
  - de paz
  - apacible
  lexicon: pacificus
  rationale: '''Pacífica'' es la forma más natural y fiel del adjetivo latino; conserva el matiz de paz/quietud sin expandirlo a una cualidad psicológica adicional.'
theological_decisions:
- issue: Si 'multitudinem aliam pacificam' debe entenderse como una multitud 'pacífica' o como una multitud 'de paz'.
  english_pob_reading: another peaceful multitude
  chosen_spanish_reading: otra multitud pacífica
  alternative_spanish_readings:
  - otra multitud de paz
  - otra multitud apacible
  rationale: El latín presenta un adjetivo directo ('pacificam'), por lo que la traducción adjetival es la opción más sobria y auditable; no se introducen perífrasis que interpreten más allá del texto.
  doctrine_reference: Ninguna; decisión de estilo y semántica léxica.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente eliminó ''same'' por no estar apoyado por ipsum y prefirió ''another peaceful multitude''. La versión española sigue esa línea: usa ''aquel hombre'' para ipsum y ''otra multitud pacífica'' para multitiudinem aliam pacificam, sin añadir equivalentes de ''mismo'' ni glosar ''pacífica'' de forma redundante.'
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y narrativo propio del POB.
  - No se usa 'Señor' ni terminología eclesiástica no presente en el versículo.
  - La secuencia 'Y después de esto' conserva el arranque paratáctico del latín.
