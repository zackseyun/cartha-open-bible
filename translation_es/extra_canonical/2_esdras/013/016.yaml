translation:
  language: es
  text: Porque, en mi entendimiento, ¡ay de los que queden en aquellos días, y mucho más ¡ay de los que no queden!!
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: in sensu meo
  english_pob_choice: in my understanding
  chosen_spanish: en mi entendimiento
  alternatives_spanish:
  - según mi entendimiento
  - a mi entender
  lexicon: sensus
  rationale: El latín expresa la esfera cognitiva de la afirmación, no un simple acto de opinión. «En mi entendimiento» conserva esa referencia interna y suena natural en español bíblico contemporáneo.
- source_word: uae
  english_pob_choice: woe
  chosen_spanish: ¡ay!
  alternatives_spanish:
  - ¡ay de!
  - ¡ay, desgracia de!
  lexicon: vae
  rationale: «Vae» en este contexto es exclamación de lamento y juicio. En español, «¡ay!» reproduce bien la interjección profética; se mantiene el matiz de maldición/lamento sin añadir explicación ajena al texto.
- source_word: derelicti fuerint
  english_pob_choice: those who are left
  chosen_spanish: los que queden
  alternatives_spanish:
  - los que sean dejados
  - los abandonados
  lexicon: derelinquo
  rationale: La construcción pasiva indica quienes permanezcan o resulten dejados atrás. «Los que queden» es idiomático en español y conserva la pasividad/resultado sin forzar una lectura más interpretativa.
- source_word: non sunt derelicti
  english_pob_choice: those who are not left
  chosen_spanish: los que no queden
  alternatives_spanish:
  - los que no sean dejados
  - los que no permanezcan
  lexicon: derelinquo
  rationale: Se conserva la simetría con la primera cláusula. Aunque el latín dice literalmente «no son dejados», en español la negación en subjuntivo mantiene la relación semántica y el paralelismo.
theological_decisions:
- issue: Valor del lamento profético en una frase introductoria
  english_pob_reading: For in my understanding, woe to those who are left in those days, and much more woe to those who are not left!
  chosen_spanish_reading: Porque, en mi entendimiento, ¡ay de los que queden en aquellos días, y mucho más ay de los que no queden!
  alternative_spanish_readings:
  - Pues, en mi entendimiento, ¡ay de los que queden...!
  - Porque, según entiendo, ¡ay de los que queden...!
  rationale: La frase funciona como entrada interpretativa a una visión apocalíptica; no se suaviza el tono de juicio. Se mantiene «¡ay!» para conservar la fuerza profética del original.
  doctrine_reference: Lamento profético y juicio escatológico en literatura apocalíptica.
translation_notes:
  revision_awareness: La redacción inglesa auditada fue ajustada de «For as I think in my understanding» a «For in my understanding» para reflejar con mayor naturalidad el latín. La versión española sigue esa forma más directa, evitando añadir un equivalente a «as I think» que no está en la revisión final.
  spanish_consistency_notes:
  - Se emplea «en mi entendimiento» para seguir el valor cognitivo del latín sensu meo sin reducirlo a mera opinión.
  - Se conserva la estructura paralelística «los que queden / los que no queden» para reflejar el contraste de derelicti y non sunt derelicti.
  - No se introduce «Señor» ni otros términos no presentes en este fragmento; la traducción permanece estrictamente anclada al texto dado.
