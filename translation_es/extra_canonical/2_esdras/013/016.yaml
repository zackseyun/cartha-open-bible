source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'in sensu meo, uae qui derelicti fuerint in diebus illis, et multo plus uuae his qui non sunt derelicti : Qui enim non sunt derelicti, tristos erunt, Intelligentes quae sunt reposita in nouissimis diebus et non occurrentes eis ; sed et qui derelicti sunt Propter hoc uuae ! uidebunt enim pericula magna et necessitates multas, sicut ostendunt somnia haec. Adtamen facilius est periclitantem uenire in haec quam pertransire sicut nubem a saeculo et non uidere quae contingent in nouissimo. Et respondit ad me et dixit : et uisionis interpretationem dicam tibi, sed et de quibus locutus es adaperiam tibi. Quoniam de his dixisti qui derelicti sunt, haec est interpretatio. Qui adferet periculum in illo tempore, ipse custodibit qui in periculo inciderint, qui habent operas et fidem ad fortissimum. Scito ergo quoniam magis beatificati sunt qui derelicti super eos qui mortui sunt. Interpretationes uisionis haec : quia uidisti uirum ascendentem de corde maris, Ipse est quem conseruat altissimus
    multis temporibus, qui per semetipsum liberabit creaturam suam, et ipse disponet qui derelicti sunt. Et quoniam uidisti de ore eius exire spiritum et ignem et tempestatem, Et quoniam non tenebat frameam neque uas bellicosum, corrumpit enim impetum eius multitudinis quae uenerat ad'
