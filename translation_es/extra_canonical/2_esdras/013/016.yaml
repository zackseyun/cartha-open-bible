  source_alignment_summary: 'El borrador español capta bien la estructura básica del latín y del English POB: una introducción interpretativa seguida de un doble «ay» contrastando a los que quedan y a los que no quedan. «En mi entendimiento» reproduce adecuadamente in sensu meo, y «los que queden» es una forma idiomática válida para derelicti fuerint. Sin embargo, la segunda interjección pierde la apertura exclamativa y conviene reforzar el paralelismo completo con «¡ay de...!» para reflejar mejor uae ... et multo plus uuae his...'
