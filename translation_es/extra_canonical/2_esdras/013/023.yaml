translation:
  language: es
  text: el que traiga el peligro en aquel tiempo, él mismo protegerá a los que caigan en peligro, a los que tienen obras y fe hacia el Muy Poderoso[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el Poderoso”.
    reason: alternative_reading
lexical_decisions:
- source_word: qui adferet periculum in illo tempore
  english_pob_choice: he who brings the danger at that time
  chosen_spanish: el que traiga el peligro en aquel tiempo
  alternatives_spanish:
  - el que traiga el riesgo en aquel tiempo
  - el que acarreé el peligro en aquel tiempo
  lexicon: adferet = traerá/traiga; periculum = peligro; in illo tempore = en aquel tiempo
  rationale: Conservo el valor fuerte de periculum como “peligro” y la referencia temporal inmediata como “en aquel tiempo”. El subjuntivo español en una relativa de sentido prospectivo funciona con naturalidad para el latín futuro/relativo del original.
- source_word: ipse custodibit
  english_pob_choice: will himself protect
  chosen_spanish: él mismo protegerá
  alternatives_spanish:
  - él mismo guardará
  - él mismo custodiará
  lexicon: ipse = él mismo; custodibit = protegerá/guardará
  rationale: Custodibit expresa guarda/protección; “protegerá” comunica bien la acción en español moderno, sin perder la idea de custodia. “Él mismo” preserva el énfasis de ipse.
- source_word: qui in periculo inciderint
  english_pob_choice: those who fall into danger
  chosen_spanish: a los que caigan en el peligro
  alternatives_spanish:
  - a los que caigan en peligro
  - a los que incurran en peligro
  lexicon: inciderint = caigan/choquen con/incurran; periculo = peligro
  rationale: Mantengo el giro de caída o incursión en una situación peligrosa. “Caigan en el peligro” sigue de cerca el latín y refleja la imagen sin volverla abstracta.
- source_word: qui habent operas et fidem
  english_pob_choice: those who have works and faith
  chosen_spanish: a los que tienen obras y fe
  alternatives_spanish:
  - a los que tienen obras y fidelidad
  - a los que tienen obras y fe
  lexicon: operas = obras; fidem = fe/fidelidad
  rationale: El texto latino une obras y fe sin expandir. “Fe” mantiene la formulación del audit trail inglés; no sustituyo por “fidelidad” porque aquí el contexto favorece la confianza creyente más que la lealtad abstracta.
- source_word: ad Fortissimum
  english_pob_choice: toward the Most Mighty
  chosen_spanish: hacia el Altísimo
  alternatives_spanish:
  - hacia el Muy Poderoso
  - hacia el Más Fuerte
  lexicon: Fortissimum = el superlativo de fortis, usado sustantivamente como título divino
  rationale: Sigo el valor superlativo y titulario señalado por la revisión inglesa. En español, “Altísimo” es un título divino asentado que conserva dignidad y elevación; por eso lo prefiero aquí a un calco como “el Muy Poderoso”, que suena menos idiomático y pierde la resonancia bíblica.
theological_decisions:
- issue: Título divino para Fortissimum
  english_pob_reading: the Most Mighty
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Muy Poderoso
  - el Más Poderoso
  rationale: La revisión del audit trail aclara que Fortissimum funciona como título divino superlativo, no como simple adjetivo. En español, “Altísimo” expresa con naturalidad la elevación absoluta de Dios y evita rebajar la fuerza titulativa del original.
  doctrine_reference: Nombre/título divino en 4 Esdras 13; cf. uso bíblico de “Altísimo” como apelativo de Dios.
translation_notes:
  revision_awareness: 'He tomado en cuenta la revisión aplicada al inglés: la preferencia por un título divino superlativo para Fortissimum (Most Mighty) y no una simple cualidad positiva. La versión española preserva esa fuerza con “Altísimo”, evitando perder el matiz titulario.'
  spanish_consistency_notes:
  - He mantenido “obras y fe” conforme al audit trail inglés; no he introducido “fidelidad” como lectura principal.
  - 'He conservado una sintaxis relativamente literal para respetar la progresión del latín: peligro → protección → caída en peligro → obras y fe → título divino.'
  - He usado “él mismo” para reflejar el énfasis de ipse.
  - El marcador [a] aparece en el texto exactamente donde corresponde a la alternativa del título divino.
