review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del latín: quien trae el peligro, él mismo protege a los que caen en peligro, y describe a esos protegidos como los que tienen obras y fe hacia Dios. Sin embargo, falla en el punto clave ya adjudicado del título divino: Latin ''ad Fortissimum'' corresponde a un superlativo de poder/fuerza (''the Most Mighty''), no a ''el Altísimo'', que cambia el campo semántico a altura/exaltación y además invade otro título distinto (''Altissimus'').'
  spanish_quality_summary: El español es claro y digno. 'Él mismo protegerá' y 'obras y fe' funcionan bien. Puede mejorarse ligeramente 'caigan en el peligro' a 'caigan en peligro' para mayor naturalidad sin pérdida de sentido. El problema principal es léxico-teológico, no de fluidez general.
  glossary_alignment: No hay conflicto con términos troncales del glosario salvo el tratamiento de 'Fortissimum'. Debe preservarse como un título superlativo relacionado con poder/fuerza, por lo que 'el Muy Poderoso' o 'el Más Poderoso' alinean mejor que 'el Altísimo'. La nota alternativa puede conservar la opción previa inglesa 'el Poderoso', pero el texto principal debe reflejar el superlativo.
  issues:
  - severity: high
    issue: '''Fortissimum'' se tradujo como ''el Altísimo'''
    rationale: El audit trail inglés ya adjudicó que el latín usa un superlativo de fortis como título divino ('the Most Mighty'). 'Altísimo' traduce otra idea y otro título latino/griego distinto, por lo que altera el significado fuente.
  - severity: medium
    issue: La nota al pie actual queda invertida respecto del sentido preferido
    rationale: Si el texto principal usa 'Altísimo' y la nota dice 'el Muy Poderoso', la nota contiene la lectura más fiel y el texto la menos fiel. Debe pasar al cuerpo del texto y, si se desea, dejar una nota con una alternativa más débil o previa.
  - severity: low
    issue: '''caigan en el peligro'' suena algo rígido en español'
    rationale: El latín 'in periculo inciderint' se expresa naturalmente como 'caigan en peligro'. El artículo no es necesario y la frase suena más idiomática.
  revised_spanish_text: el que traiga el peligro en aquel tiempo, él mismo protegerá a los que caigan en peligro, a los que tienen obras y fe hacia el Muy Poderoso[a].
  revised_footnotes:
