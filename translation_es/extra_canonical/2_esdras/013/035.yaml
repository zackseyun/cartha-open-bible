lexical_decisions:
- source_word: uolentes
  english_pob_choice: wanting
  chosen_spanish: queriendo
  alternatives_spanish:
  - deseando
  - queriendo venir
  lexicon: volo / velle
  rationale: El participio expresa intención o propósito inmediato; en español, «queriendo» conserva la construcción participial natural sin sobrecargar el verso.
- source_word: uenire
  english_pob_choice: to come
  chosen_spanish: venir
  alternatives_spanish:
  - llegar
  - acercarse
  lexicon: venio / venire
  rationale: «Venir» mantiene el movimiento hacia el sujeto implícito del contexto y sigue de cerca el valor del infinitivo latino.
- source_word: expugnare
  english_pob_choice: attack
  chosen_spanish: asaltar
  alternatives_spanish:
  - atacar
  - conquistar
  - tomar por asalto
  lexicon: expugno / expugnare
  rationale: Aunque la auditoría inglesa volvió de «conquer» a «attack», el latín específico expugnare sugiere atacar con asalto o intentar tomar por la fuerza; «asaltar» conserva esa fuerza más exactamente que un simple «atacar».
translation_notes:
  revision_awareness: La auditoría inglesa muestra una ida y vuelta entre «conquer» y «attack» para reflejar expugnare. La versión española evita debilitar el verbo a un genérico «atacar» y tampoco lo intensifica indebidamente a «conquistar»; «asaltar» recoge mejor la idea de un ataque con intención de tomar por la fuerza.
  spanish_consistency_notes:
  - Se mantiene un español sobrio y bíblico sin recurrir a formulaciones eclesiásticas ajenas al latín.
  - No hay nombres divinos ni títulos cristológicos en este versículo, por lo que no se aplican las convenciones de Yahvé/Mesías.
  - El pronombre clítico «-lo» se ajusta al objeto implícito del contexto inmediato, siguiendo la economía del original.
