  spanish_quality_summary: El español es natural, claro y digno. «queriendo venir y asaltarlo» suena idiomático en contexto bíblico y no cae en calco torpe. La elección de «asaltarlo» es más precisa que «atacarlo» para este verbo latino, mientras que la nota evita pérdida de comprensibilidad.
