    issue: «serán afligidos» no refleja con precisión «tristes erunt»
    rationale: El latín usa un adjetivo de estado («tristes») con futuro de «ser/estar», no una idea de ser afligidos por otro agente. La draft introduce una matización de pasividad/causación ausente del original.
  - severity: low
    issue: Ligero ajuste estilístico recomendable en la cláusula nominal
    rationale: «Los que no quedan» es comprensible y natural; no requiere cambio forzoso. La reparación necesaria está en el predicado final.
