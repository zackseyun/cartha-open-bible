translation:
  language: es
  text: Porque los que no quedan estarán tristes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: qui enim non sunt derelicti
  english_pob_choice: For those who are not left
  chosen_spanish: Porque los que no quedan
  alternatives_spanish:
  - Porque los que no han quedado
  - Pues los que no quedan
  lexicon: derelinquo / derelicti
  rationale: 'El latín presenta una pasiva/participialidad de sentido: «los que no son dejados» o «los que no quedan». En español, «los que no quedan» reproduce con naturalidad la idea de remanente/no supervivientes sin forzar una construcción pasiva poco idiomática.'
- source_word: tristes erunt
  english_pob_choice: will be sorrowful
  chosen_spanish: serán afligidos
  alternatives_spanish:
  - estarán tristes
  - tendrán dolor
  - estarán afligidos
  lexicon: tristis
  rationale: «tristes» describe un estado de pena o aflicción. «Serán afligidos» conserva el peso afectivo y suena más digno y bíblico en español que «estarán tristes», que puede sonar demasiado leve o coloquial.
theological_decisions:
- issue: Alcance de la tristeza/aflicción como resultado de juicio o desastre
  english_pob_reading: For those who are not left will be sorrowful,
  chosen_spanish_reading: Porque los que no quedan serán afligidos.
  alternative_spanish_readings:
  - Porque los que no quedan estarán tristes.
  - Porque los que no quedan tendrán dolor.
  rationale: 'El versículo no introduce doctrina explícita, sino una afirmación de resultado: los que no queden experimentarán aflicción. Se evita intensificar el texto hacia una interpretación más específica de juicio final o castigo que el latín no formula aquí.'
  doctrine_reference: lamentación / juicio implícito, sin desarrollo doctrinal explícito
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo entre el texto latino limpio y la traducción inglesa POB; no se documentaron revisiones aplicadas ni variantes textuales relevantes en el paquete provisto. Por ello, la redacción española sigue de cerca el sentido directo del latín con ajuste idiomático mínimo.
  spanish_consistency_notes:
  - Se preservó un registro bíblico sobrio y contemporáneo.
  - Se evitó «SEÑOR» u այլ sustitución teológica porque el versículo no contiene el nombre divino.
  - Se mantuvo la estructura causal de «For ... will ...» con «Porque ... serán ...» para reflejar el latín y la lectura inglesa.
  - No se introdujeron notas al pie porque el texto no presenta una ambigüedad textual o léxica que requiera alternativa documentada.
