  verdict: revise
  source_alignment_summary: 'El latín dice literalmente: «porque/ya que los que no son dejados/los no dejados estarán tristes». La cláusula principal de la draft capta bien el sentido de remanencia o de los no preservados con «los que no quedan», pero «serán afligidos» desplaza el estado interno de tristeza hacia una pasiva de sufrimiento infligido, que no está en «tristes erunt».'
  spanish_quality_summary: El borrador es legible, pero «serán afligidos» suena menos natural aquí y cambia el predicado adjetival latino por una construcción verbal pasiva. «Estarán tristes» o «estarán afligidos» preserva mejor el sentido. También conviene mantener «Porque» solo si se desea seguir el valor de «enim»; es aceptable en contexto.
