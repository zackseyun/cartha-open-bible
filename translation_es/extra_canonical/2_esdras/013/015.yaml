lexical_decisions:
- source_word: adhuc
  english_pob_choice: Now also
  chosen_spanish: Ahora también
  alternatives_spanish:
  - también ahora
  - y ahora también
  lexicon: adhuc
  rationale: El adverbio añade continuidad o insistencia; «ahora también» reproduce esa suma sin endurecer el orden del español.
- source_word: demonstra mihi / interpretaionem somnii huius
  english_pob_choice: show me the interpretation of this dream
  chosen_spanish: muéstrame la interpretación de este sueño
  alternatives_spanish:
  - enséñame la interpretación de este sueño
  - muéstrame la explicación de este sueño
  lexicon: demonstrare; interpretatio; somnium
  rationale: «Muéstrame» conserva el ruego directo y concreto del latín; «interpretación» es el equivalente natural de interpretatio, y «sueño» mantiene el sentido literal de somnium.
- source_word: Sicut enim existimo
  english_pob_choice: For as I think
  chosen_spanish: Porque, según pienso
  alternatives_spanish:
  - Porque pienso
  - Pues, como pienso
  lexicon: sicut; existimare
  rationale: La cláusula final expresa una justificación o transición de pensamiento; «porque, según pienso» conserva el valor causal y la cautela personal de existimo sin sobrerrepresentar certeza.
theological_decisions:
- issue: Valor de la cláusula final incompleta en el testimonio latino
  english_pob_reading: For as I think
  chosen_spanish_reading: Porque, según pienso
  alternative_spanish_readings:
  - Pues, como pienso
  - Porque pienso
  rationale: No hay una afirmación doctrinal nueva; el ajuste principal es de delimitación versal y de tono. La frase queda en español como una cláusula abierta, fiel al latín transmitido.
  doctrine_reference: No aplica; decisión de crítica textual y segmentación.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió el cierre del versículo: la cláusula latina final «Sicut enim existimo» pertenece a 2 Esdras 13:15 y no debe trasladarse a 13:16. Por eso la versión española conserva esa frase al final del versículo, reflejando también la continuidad sintáctica del original.'
  spanish_consistency_notes:
  - Se mantiene el trato directo en segunda persona singular («muéstrame»).
  - «Ahora también» conserva la fuerza aditiva de adhuc sin añadir interpretación extra.
  - «Sueño» se usa de forma literal para somnium, sin sustituirlo por «visión», porque el latín aquí dice sueño.
  - La cláusula final queda abierta porque el testimonio fuente termina con «Sicut enim existimo».
