translation:
  language: es
  text: Pero en cuanto a los que quedan—¡ay de ellos por esta razón! Pues verán grandes peligros y muchas angustias[a], como muestran estos sueños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pero aun los que quedan—¡ay por esta razón!».'
    reason: alternative_reading
lexical_decisions:
- source_word: propter hoc
  english_pob_choice: for this reason
  chosen_spanish: por esta razón
  alternatives_spanish:
  - por esto
  - a causa de esto
  lexicon: propter hoc
  rationale: La locución latina expresa causalidad directa; «por esta razón» mantiene el valor explicativo sin volverse mecánica ni demasiado interpretativa.
- source_word: vae
  english_pob_choice: woe
  chosen_spanish: ¡ay!
  alternatives_spanish:
  - ¡ay de ellos!
  - ¡ay!
  lexicon: vae
  rationale: «Vae» es una exclamación de lamentación/juicio. En español, «¡ay!» conserva el tono profético; se completa con «de ellos» en la construcción para hacer natural la frase.
- source_word: qui derelicti sunt
  english_pob_choice: those who are left
  chosen_spanish: los que quedan
  alternatives_spanish:
  - los que han quedado
  - los que han sido dejados
  lexicon: derelinquo
  rationale: La idea es de los sobrevivientes/restantes. «Los que quedan» suena natural en español y preserva la lectura de remanente; «han sido dejados» sería más literal pero más pesado.
- source_word: pericula magna
  english_pob_choice: great dangers
  chosen_spanish: grandes peligros
  alternatives_spanish:
  - peligros grandes
  - graves peligros
  lexicon: periculum
  rationale: Se mantiene el sustantivo concreto «peligros» con el adjetivo «grandes», correspondiente al texto latino y al inglés auditado.
- source_word: necessitates multas
  english_pob_choice: many distresses
  chosen_spanish: muchas angustias
  alternatives_spanish:
  - muchas necesidades
  - muchas dificultades
  - muchas aflicciones
  lexicon: necessitas
  rationale: Aquí «necessitates» no es simplemente «necesidades» en sentido moderno, sino presiones, apuros o aflicciones. «Angustias» comunica bien la carga de amenaza y opresión sin perder el tono de calamidad.
- source_word: sicut ostendunt somnia haec
  english_pob_choice: as these dreams show
  chosen_spanish: como lo muestran estos sueños
  alternatives_spanish:
  - como muestran estos sueños
  - tal como lo muestran estos sueños
  lexicon: ostendo
  rationale: «Muestran» conserva la relación demostrativa del latino; «lo» hace explícito el objeto implícito en español y suena idiomático.
theological_decisions:
- issue: El sentido de juicio/aflicción en la exclamación «vae»
  english_pob_reading: woe to them for this reason
  chosen_spanish_reading: ¡ay de ellos por esta razón!
  alternative_spanish_readings:
  - ¡ay de los que quedan por esta razón!
  - ¡ay por esta razón!
  rationale: La frase funciona como anuncio de aflicción o condena para el remanente. Se mantiene la dirección del juicio sobre «ellos» sin suavizarla en una simple advertencia.
  doctrine_reference: Lenguaje profético de ayes; cf. uso bíblico de «ay de...» en oráculos de juicio.
- issue: Referente de «los que quedan» como remanente
  english_pob_reading: those who are left
  chosen_spanish_reading: los que quedan
  alternative_spanish_readings:
  - los sobrevivientes
  - los restantes
  rationale: El texto describe a un grupo remanente expuesto a peligros y angustias. «Los que quedan» conserva la idea de resto sin introducir matices no presentes.
  doctrine_reference: Tema bíblico del remanente/restante en contextos de juicio y preservación.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «but even those who are left—woe because of this!» a «But as for those who are left—woe to them for this reason!», para reflejar mejor el casus pendens de qui derelicti sunt y suavizar la torpeza de la primera versión. La traducción española sigue esa lectura más natural de apertura contrastiva («Pero en cuanto a...»), conservando la fuerza de juicio y la causalidad de propter hoc.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque el texto no contiene el nombre divino ni κύριος.
  - Se eligió «angustias» para necessitates según el contexto de calamidad, no «necesidades» en sentido cotidiano.
  - El marcador [a] se colocó en «angustias» para señalar la alternativa de estructura del inciso inicial, no para alterar el contenido principal.
