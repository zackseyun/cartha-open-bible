base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/013/003.yaml
  text: And I looked[a], and behold, that man was flying with the clouds of heaven; and wherever he turned his face to look, everything seen beneath him trembled.
  footnotes:
  - marker: a
    text: Or 'seen beneath him'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:51:03Z'
    unchanged: false
    changes_summary: Revised the final clause from 'seen by him' to 'seen beneath him' to reflect Latin sub eo more accurately and avoid implying his act of seeing caused the trembling.
translation:
  language: es
  text: Y miré, y he aquí que aquel hombre volaba con las nubes del cielo; y dondequiera que volvía su rostro para mirar, todo lo que se veía debajo de él[a] temblaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo lo que era visto por él».'
    reason: english_audit_trail_alternative
lexical_decisions:
- source_word: et vidi, et ecce
  english_pob_choice: And I looked, and behold
  chosen_spanish: Y miré, y he aquí
  alternatives_spanish:
  - Y vi, y he aquí
  - Miré, y he aquí
  lexicon: vidi -> mirar/ ver
  rationale: “Miré” conserva el valor narrativo de atención visual del contexto apocalíptico y mantiene naturalidad en español; “he aquí” reproduce la fórmula de sorpresa/énfasis del original y del inglés POB.
- source_word: ipse homo
  english_pob_choice: that man
  chosen_spanish: aquel hombre
  alternatives_spanish:
  - ese hombre
  - aquel varón
  lexicon: homo -> hombre
  rationale: “Aquel hombre” mantiene distancia deíctica y evita sobreinterpretar el referente; “varón” sería posible, pero aquí “hombre” es más directo y legible en español.
- source_word: convolabat ... cum nubibus caeli
  english_pob_choice: was flying with the clouds of heaven
  chosen_spanish: volaba con las nubes del cielo
  alternatives_spanish:
  - iba volando con las nubes del cielo
  - volaba entre las nubes del cielo
  lexicon: convolabat -> volaba
  rationale: Se conserva la imagen de movimiento aéreo junto a las nubes del cielo sin añadir matices no exigidos por el latín.
- source_word: ubi vultum suum convertebat ut consideraret
  english_pob_choice: wherever he turned his face to look
  chosen_spanish: dondequiera que volvía su rostro para mirar
  alternatives_spanish:
  - adondequiera que volvía su rostro para mirar
  - dondequiera que dirigía su rostro para mirar
  lexicon: convertebat vultum -> volvía su rostro
  rationale: La expresión conserva la construcción concreta del original (“volver el rostro”) y la finalidad de observar (“para mirar”), sin convertirla en una explicación abstracta.
- source_word: tremebant omnia quae sub eo videbantur
  english_pob_choice: everything seen beneath him trembled
  chosen_spanish: todo lo que se veía debajo de él temblaba
  alternatives_spanish:
  - todo cuanto se veía debajo de él temblaba
  - todo lo que era visto debajo de él temblaba
  lexicon: videbantur -> se veía
  rationale: La pasiva impersonal “se veía” refleja con fidelidad el carácter impersonal del latín y deja intacta la tensión textual sobre ‘sub eo’; se evita reinterpretar el pasaje como si el énfasis fuera la agencia visual del hombre.
theological_decisions:
- issue: Identidad y referencia del personaje
  english_pob_reading: that man
  chosen_spanish_reading: aquel hombre
  alternative_spanish_readings:
  - ese hombre
  - aquel varón
  rationale: El texto no exige una identificación explícita adicional en esta cláusula; se mantiene la referencia sobria y deíctica del relato sin harmonizarla con otros pasajes.
  doctrine_reference: Cristología/apocalíptica narrativa
- issue: Relación entre la mirada y el temblor
  english_pob_reading: everything seen beneath him trembled
  chosen_spanish_reading: todo lo que se veía debajo de él temblaba
  alternative_spanish_readings:
  - todo lo que se veía por él temblaba
  - todo lo que se veía bajo él temblaba
  rationale: Se preserva la ambigüedad heredada de la tradición latina y del audit trail inglés, sin borrar el dato ‘debajo de él’ ni convertirlo en una explicación causal no explicitada por el texto base.
  doctrine_reference: Ninguna doctrina directa; cuestión de lectura textual
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión inglés: la cláusula final pasó por una discusión sobre si debía entenderse como ‘seen by him’ o ‘seen beneath him’. Dado que el texto fuente latino conservado dice sub eo y el contexto auditado final volvió a ‘beneath him’, la traducción española preserva esa localización espacial mediante «debajo de él», sin introducir la lectura causal de la agencia visual.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé»/«Mesías» fuera del texto porque este versículo no contiene esos términos.
  - Se evitó «SEÑOR» como máscara divina, ya que el pasaje no lo requiere.
  - La sintaxis busca ser bíblica pero no arcaizante, con «he aquí» como fórmula tradicional plenamente inteligible.
  - La nota [a] se ancla en «miré» para reflejar la alternativa simple de traducción del verbo latino vidi.
