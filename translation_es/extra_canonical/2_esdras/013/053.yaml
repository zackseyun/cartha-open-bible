base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/013/053.yaml
  text: This is the interpretation of the dream that you saw[53], and why you alone have been enlightened concerning these things.
  footnotes:
  - marker: '53'
    text: '''At the time of his day'' is a close rendering of a compressed Latin phrase. The sense is an appointed time of revelation, not ordinary visibility before then.'
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:51:47Z'
    unchanged: false
    changes_summary: Removed the unnecessary repeated 'this is' for closer alignment with the Latin, and revised 'in these things' to the more natural 'concerning these things.'
translation:
  language: es
  text: Esta es la interpretación del sueño que viste, y por qué tú solo has sido iluminado[a] acerca de estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Iluminado» refleja el latín inluminatus es y conserva el sentido de haber recibido revelación; no describe mera visibilidad física.
    reason: lexical_alternative
lexical_decisions:
- source_word: haec est interpretatio
  english_pob_choice: This is the interpretation
  chosen_spanish: Esta es la interpretación
  alternatives_spanish:
  - Ésta es la interpretación
  - Ésta es la explicación
  lexicon: interpretatio
  rationale: «Interpretación» conserva el valor de explicación de un sueño/visión sin debilitar el vínculo con el lenguaje profético del texto fuente. «Explicación» sería posible, pero pierde la correspondencia más directa con el latín y con el español bíblico habitual.
- source_word: somnii
  english_pob_choice: dream
  chosen_spanish: sueño
  alternatives_spanish:
  - sueño profético
  - visión
  lexicon: somnium
  rationale: El latín dice literalmente «sueño». Mantener «sueño» evita introducir una aclaración que no está en el texto. «Visión» sería una interpretación más amplia que el contexto no exige aquí.
- source_word: et propter quod
  english_pob_choice: and why
  chosen_spanish: y por lo cual
  alternatives_spanish:
  - y por eso
  - y por lo que
  lexicon: propter quod
  rationale: La frase latina une causalidad y consecuencia. «Y por lo cual» reproduce esa relación sin volverla demasiado explicativa. «Y por eso» es idiomático, pero algo más libre; «y por lo que» puede sonar menos solemne.
- source_word: inluminatus es
  english_pob_choice: you have been enlightened
  chosen_spanish: has sido iluminado
  alternatives_spanish:
  - has sido alumbrado
  - has recibido iluminación
  lexicon: inluminare
  rationale: «Iluminado» mantiene el pasivo y el campo semántico de revelación del texto. «Alumbrado» es posible, pero en español actual puede sonar más coloquial; «has recibido iluminación» explicita demasiado el resultado.
- source_word: haec solus
  english_pob_choice: you alone ... concerning these things
  chosen_spanish: solo tú ... en cuanto a estas cosas
  alternatives_spanish:
  - tú solo ... acerca de estas cosas
  - tú solo ... sobre estas cosas
  lexicon: solus
  rationale: El latín enfatiza la exclusividad de la revelación a una sola persona. «Solo tú» preserva ese énfasis. «En cuanto a estas cosas» sigue la revisión inglesa «concerning these things» y evita repetir la idea de «estas cosas» de manera más torpe.
theological_decisions:
- issue: Naturaleza de la iluminación/revelación
  english_pob_reading: you alone have been enlightened concerning these things
  chosen_spanish_reading: solo tú has sido iluminado en cuanto a estas cosas
  alternative_spanish_readings:
  - solo tú has recibido luz sobre estas cosas
  - solo tú has sido alumbrado acerca de estas cosas
  rationale: El texto presenta una revelación concedida de manera exclusiva, no una capacidad natural de ver o entender por sí mismo. «Has sido iluminado» preserva el matiz pasivo de recepción de revelación sin convertirlo en una formulación doctrinal ajena al pasaje.
  doctrine_reference: Revelación divina particular; cf. uso bíblico de iluminación como concesión de entendimiento revelado.
translation_notes:
  revision_awareness: La versión inglesa fue revisada desde una repetición innecesaria de «this is» hacia una construcción más cercana al latín y cambió «in these things» por «concerning these things». La redacción española sigue esa revisión con «y por lo cual» y «en cuanto a estas cosas», manteniendo la relación causal y el alcance temático sin añadir elementos no presentes en la fuente.
  spanish_consistency_notes:
  - Se usó «Dios»/«Yahvé» de acuerdo con las reglas generales del proyecto, aunque este versículo no contiene ninguno de esos términos.
  - Se evitó «Cristo»/«Mesías» porque el pasaje no los contiene.
  - Se mantuvo un registro bíblico sobrio y moderno, sin arcaísmos innecesarios.
