revisions:
- from: Esta es la interpretación del sueño que viste, y por lo cual solo tú has sido iluminado[a] en cuanto a estas cosas.
  to: Esta es la interpretación del sueño que viste, y por qué tú solo has sido iluminado[a] acerca de estas cosas.
  rationale: Se ajusta «y por lo cual» a «y por qué» para reflejar con más fidelidad y naturalidad el sentido de propter quod según la auditoría inglesa. También se mejora la fluidez con «tú solo» y «acerca de estas cosas», sin perder el matiz de revelación exclusiva. La nota sobre «iluminado» se conserva porque explica bien una decisión léxica relevante en español.
