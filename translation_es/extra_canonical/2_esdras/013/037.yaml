base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/013/037.yaml
  text: But he[37], my Son, will rebuke the impieties of the nations that have come, these things that have drawn near like a storm; and he will reproach them to their faces with their evil thoughts and torments[a],
  footnotes:
  - marker: '37'
    text: '''Mount Zion'' and the mountain ''carved out without hands'' are brought together in the interpretation. The imagery intentionally echoes divinely made or revealed holy space rather than an ordinary mountain formed by human labor.'
    reason: cross_reference
  - marker: a
    text: Or 'he will set before them'.
    reason: previous_rendering
  revision_pass:
