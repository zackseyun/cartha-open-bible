    timestamp: '2026-04-23T19:51:34Z'
    unchanged: false
    changes_summary: Removed the second 'their' before 'torments' for closer alignment with the Latin and smoother English; retained the rest of the draft.
translation:
  language: es
  text: Pero él, mi Hijo, reprenderá las impiedades de las naciones que han llegado, esas cosas que se han acercado como una tormenta; y les echará en cara[a], en su propia cara, sus malos pensamientos y tormentos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les reprochará».'
    reason: alternative_reading
lexical_decisions:
- source_word: filius meus
  english_pob_choice: my Son
  chosen_spanish: mi Hijo
  alternatives_spanish:
  - mi Hijo amado
  - mi propio Hijo
  lexicon: filius
  rationale: Conservo la relación posesiva y filial sin añadir matices no presentes en el latín. «Mi Hijo» es natural en español y mantiene la solemnidad del original y de la tradición apocalíptica del pasaje.
- source_word: arguet
  english_pob_choice: will rebuke
  chosen_spanish: reprenderá
  alternatives_spanish:
  - reprochará
  - reprenderá duramente
  lexicon: arguo
  rationale: El latín exige una acción de reprensión pública. «Reprenderá» comunica corrección y denuncia sin perder la fuerza judicial/profética del verbo.
- source_word: impietates
  english_pob_choice: the impieties
  chosen_spanish: las impiedades
  alternatives_spanish:
  - las impiedades
  - las irreverencias
  - sus impiedades
  lexicon: impietas
  rationale: «Impiedades» es el equivalente más directo y conserva el campo semántico de irreligiosidad/impiedad del latín.
- source_word: gentes
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: gens
  rationale: «Naciones» preserva el alcance colectivo y transnacional del término, como en la versión inglesa POB.
- source_word: aduenerunt
  english_pob_choice: that have come
  chosen_spanish: que han llegado
  alternatives_spanish:
  - que han venido
  - que han aparecido
  lexicon: advenio
  rationale: La idea es de llegada efectiva, no solo de presencia. «Han llegado» mantiene el aspecto perfecto y la concreción del movimiento.
- source_word: tempestati adpropiauerunt
  english_pob_choice: that have drawn near like a storm
  chosen_spanish: que se han acercado como una tormenta
  alternatives_spanish:
  - que se han acercado como un temporal
  - que se han aproximado como una tormenta
  lexicon: tempestas / appropiare
  rationale: La comparación con una tormenta debe conservarse como imagen de inminencia y desastre. «Se han acercado» refleja adpropiauerunt sin suavizar la metáfora.
- source_word: coram eis
  english_pob_choice: to their faces
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en su presencia
  lexicon: coram
  rationale: El inglés POB optó por una expresión idiomática de confrontación. En español, «delante de ellos» conserva la confrontación pública sin forzar una traducción demasiado coloquial.
- source_word: inproperabit
  english_pob_choice: will reproach
  chosen_spanish: los reprochará
  alternatives_spanish:
  - los echará en cara
  - les reprochará
  lexicon: impropero
  rationale: Se preserva la fuerza de reproche hostil señalada por la revisión del audit trail. «Los reprochará» mantiene el tono acusatorio y evita diluir el verbo en una mera exposición.
- source_word: mala cogitamenta eorum
  english_pob_choice: their evil thoughts
  chosen_spanish: sus malos pensamientos
  alternatives_spanish:
  - sus pensamientos malos
  - sus pensamientos perversos
  lexicon: malus + cogitamentum
  rationale: El latín describe pensamientos moralmente torcidos. «Malos pensamientos» es claro en español y suficientemente fiel al juicio moral del texto.
- source_word: cruciamenta
  english_pob_choice: torments
  chosen_spanish: tormentos
  alternatives_spanish:
  - torturas
  - sufrimientos
  lexicon: cruciamentum
  rationale: «Tormentos» conserva el sentido de aflicción punitiva y responde bien al paralelo con la reprensión pública del pasaje.
theological_decisions:
- issue: Identidad y función de «mi Hijo» en un contexto apocalíptico
  english_pob_reading: my Son
  chosen_spanish_reading: mi Hijo
  alternative_spanish_readings:
  - mi Hijo amado
  - mi propio Hijo
  rationale: No se explicita una cristología desarrollada en el latín de esta línea; por eso la traducción mantiene la formulación directa sin añadir títulos interpretativos. «Mi Hijo» deja abierta la lectura apocalíptica propia del contexto sin sobredeterminarla.
  doctrine_reference: Cristología implícita en literatura apocalíptica; respeto al nivel de explicitud del texto fuente.
- issue: Naturaleza de la reprensión contra las naciones
  english_pob_reading: will rebuke the impieties of the nations
  chosen_spanish_reading: reprenderá las impiedades de las naciones
  alternative_spanish_readings:
  - reprenderá a las naciones por sus impiedades
  - reprenderá la impiedad de las naciones
  rationale: El latín pone el foco en las 'impiedades' como objeto de reprensión. La redacción española conserva ese centro de gravedad y no lo reduce solo a una censura genérica de personas.
  doctrine_reference: Juicio profético contra la impiedad de las naciones; lenguaje de juicio moral.
- issue: Fuerza acusatoria de inproperabit
  english_pob_reading: he will reproach them to their faces
  chosen_spanish_reading: los reprochará delante de ellos
  alternative_spanish_readings:
  - les echará en cara delante de ellos
  - los reprenderá en su propia cara
  rationale: La revisión del audit trail corrige una lectura débil. Se mantiene un español que exprese confrontación pública y reproche directo, sin normalizar el verbo a un simple 'mostrar'.
  doctrine_reference: Lenguaje profético de acusación y exposición pública del pecado.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente que corrigió la lectura débil de inproperabit y reforzó el sentido de reproche/acusación. También preservé la comparación de inminencia de tempestati adpropiauerunt y mantuve el cierre con 'tormentos' sin añadir material ajeno al latín.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando no aparece en este versículo; aquí no hay necesidad de introducirlo.
  - Mantuve «mi Hijo» como forma directa y no litúrgicamente recargada, para respetar el nivel de explicitud del latín.
  - Conservé el paralelismo entre reprensión moral ('impiedades') y exposición pública ('delante de ellos').
  - La nota al pie recoge la alternativa semántica válida de 'echar en cara', porque el verbo latino admite una gama de reproche intenso.
