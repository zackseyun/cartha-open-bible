translation:
  language: es
  text: nación contra nación[a], y reino contra reino. Y sucederá que, cuando estas cosas acontezcan y aparezcan las señales que te mostré antes, entonces
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «pueblo contra pueblo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: gens
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  lexicon: gens
  rationale: El latín apocalíptico 'gens ad gentem' corresponde al giro profético 'nación contra nación'. 'Pueblo' existe como alternativa, pero la revisión auditada del POB inglés fijó 'nation' para preservar el registro idiomático y la consistencia con el versículo siguiente.
- source_word: regnum
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - dominio
  lexicon: regnum
  rationale: '''Regnum adversus regnum'' se traduce de manera directa y natural como ''reino contra reino''. ''Reinado'' o ''dominio'' suavizarían el paralelismo y se alejarían del sentido político-apocalíptico del texto.'
- source_word: contingent
  english_pob_choice: happen / occur
  chosen_spanish: acontezcan
  alternatives_spanish:
  - sucedan
  - ocurran
  lexicon: contingere
  rationale: El verbo latino indica que los hechos llegan a producirse; 'acontecer' conserva un tono digno y bíblico sin volver el español arcaizante. 'Sucedan' u 'ocurran' serían aceptables, pero 'acontezcan' mantiene mejor el registro solemne.
- source_word: signa
  english_pob_choice: signs
  chosen_spanish: las señales
  alternatives_spanish:
  - los signos
  - las marcas
  lexicon: signum
  rationale: '''Signa'' en este contexto es claramente portentoso/profético. ''Señales'' es la opción más clara en español bíblico contemporáneo y evita la ambigüedad de ''signos''.'
- source_word: ostendi
  english_pob_choice: I showed you before
  chosen_spanish: te mostré antes
  alternatives_spanish:
  - te había mostrado antes
  - te mostré previamente
  lexicon: ostendere
  rationale: La forma simple 'te mostré antes' reproduce con fidelidad el valor retrospectivo del latín y coincide con el inglés auditado. 'Te había mostrado antes' añade una marcación aspectual no necesaria.
translation_notes:
  revision_awareness: La base auditada en inglés pasó de 'people against people' a 'nation against nation' por la revisión de 4 Ezra 13:32, y el español sigue esa decisión para reflejar mejor 'gens ad gentem' y mantener la coherencia con el mismo campo semántico en el pasaje inmediato.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo breve y enfático del latín: ''nación contra nación, y reino contra reino''.'
  - Se conservó el orden de la cláusula final para dejar abierta la continuación del versículo en la siguiente unidad textual.
  - No se introdujeron términos eclesiásticos ajenos al registro apocalíptico del pasaje.
