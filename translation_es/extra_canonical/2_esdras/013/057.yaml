source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: et profectus sum et transii in campum, multum glorificans et laudans Altissimum de mirabilibus, quae per tempus faciebat,
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/013/057.yaml
  text: And I departed and went into the field[a], greatly glorifying and praising the Most High for the wonders that he did in their times,
  footnotes:
  - marker: a
    text: Or 'Therefore I have shown you these things; for there is a reward with the Most High. For after three more days I will speak further with you and explain to you weighty and wondrous things.”'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:51:51Z'
    unchanged: false
    changes_summary: Revised the final phrase from 'from time to time' to 'in their times' to more closely reflect the Latin 'per tempus' without suggesting intermittent action beyond the source.
translation:
  language: es
  text: Y partí y fui al campo, glorificando mucho y alabando al Altísimo por las maravillas que hacía en sus tiempos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et profectus sum
  english_pob_choice: And I departed
  chosen_spanish: Y partí
  alternatives_spanish:
  - Y me fui
  - Y salí
  lexicon: proficisci
  rationale: Partí conserva el sentido de salida/partida con un registro natural y solemne en español bíblico, sin añadir matices no presentes en el latín.
- source_word: transii in campum
  english_pob_choice: went into the field
  chosen_spanish: pasé al campo
  alternatives_spanish:
  - fui al campo
  - entré al campo
  lexicon: transire
  rationale: Pasé al campo refleja el movimiento hacia ese lugar con menos rigidez que una traducción literal de 'went into the field', y mantiene la escena concreta del latín.
- source_word: multum glorificans et laudans
  english_pob_choice: greatly glorifying and praising
  chosen_spanish: glorificando y alabando mucho
  alternatives_spanish:
  - glorificando grandemente y alabando
  - glorificándolo mucho y alabándolo
  lexicon: glorificare / laudare
  rationale: Se conserva la doble serie verbal del latín. 'Mucho' expresa el intensificador multum sin introducir una adverbialidad ajena al español bíblico.
- source_word: Altissimum
  english_pob_choice: the Most High
  chosen_spanish: al Altísimo
  alternatives_spanish:
  - al Dios Altísimo
  - al Supremo
  lexicon: Altissimus
  rationale: Altísimo es el equivalente natural y reverente de Altissimum en español bíblico, y mantiene el título divino sin sustituirlo por una paráfrasis más interpretativa.
- source_word: de mirabilibus
  english_pob_choice: for the wonders
  chosen_spanish: por las maravillas
  alternatives_spanish:
  - a causa de las maravillas
  - por los prodigios
  lexicon: mirabile
  rationale: Maravillas es el correlato más estable en español para las cosas maravillosas o portentosas que motivan la alabanza.
- source_word: quae per tempus faciebat
  english_pob_choice: that he did in their times
  chosen_spanish: que hacía en sus tiempos
  alternatives_spanish:
  - que hacía en aquellos tiempos
  - que realizaba en su tiempo
  lexicon: facere + per tempus
  rationale: La frase latina es temporal y resulta ambigua en detalle. 'En sus tiempos' conserva el plural y la referencia temporal sin convertirla en 'de vez en cuando' ni borrar la tensión semántica.
theological_decisions:
- issue: Título divino Altissimum
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - Dios Altísimo
  - el Supremo
  rationale: El texto presenta un título de exaltación para Dios; 'Altísimo' reproduce fielmente el registro bíblico sin introducir una denominación distinta.
  doctrine_reference: Teología bíblica del nombre/título divino; reverencia y trascendencia de Dios.
- issue: Referencia temporal final 'per tempus'
  english_pob_reading: in their times
  chosen_spanish_reading: en sus tiempos
  alternative_spanish_readings:
  - en aquellos tiempos
  - de tiempo en tiempo
  rationale: La revisión inglesa corrigió una lectura mecánica hacia 'from time to time'. El español mantiene el valor temporal plural del latín y evita convertir la frase en una expresión distributiva que el original no exige.
  doctrine_reference: Fidelidad temporal al testimonio textual; cuidado contra sobreinterpretación.
translation_notes:
  revision_awareness: Este borrador sigue la corrección crítica del audit trail que sustituye la duplicación errónea de 13:56 por el latín propio de 13:57 ('et profectus sum et transii in campum...'). También sigue la revisión posterior que ajusta la última cláusula desde una lectura distributiva tipo 'from time to time' a 'in their times', evitando una expansión no sostenida por el latín.
  spanish_consistency_notes:
  - Se usa 'Altísimo' de forma consistente como título divino.
  - Se mantiene 'maravillas' para mirabilibus, en lugar de un tecnicismo más rígido como 'prodigios', porque el contexto es doxológico.
  - No se añadió nota al pie porque el texto latino y el audit trail no preservan una variante textual que requiera anclaje en el versículo español.
