translation:
  language: es
  text: estas son las diez tribus que fueron llevadas cautivas de su propia tierra en los días del rey Hoshea[a], a quien Salmanasar, rey de los asirios, llevó cautivo; y los pasó al otro lado del Río[b], y fueron trasladados a otra tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el rey Josías»; el latín conservado de esta línea lee así, pero la revisión del texto adopta «Hoshea» como lectura más probable del autor.
    reason: textual_variant
  - marker: b
    text: O «más allá del Río».
    reason: lexical_alternative
lexical_decisions:
- source_word: terra sua
  english_pob_choice: their own land
  chosen_spanish: su propia tierra
  alternatives_spanish:
  - su tierra
  - la tierra de ellos
  lexicon: terra
  rationale: «Su propia tierra» reproduce la posesión y el contraste exílico del latín y del inglés POB sin añadir matices ajenos. «Tierra» es más natural aquí que «país» en un contexto de herencia territorial.
- source_word: diebus Iosiae / Hoshea
  english_pob_choice: King Hoshea
  chosen_spanish: el rey Hoshea
  alternatives_spanish:
  - el rey Oseas
  - el rey Josías
  lexicon: Iosias / Hoshea
  rationale: Se sigue la lectura revisada que identifica al rey del reino del norte durante el exilio asirio. Se conserva «Hoshea» como forma histórica transliterada, en línea con el criterio de hacer visible la decisión textual y no ocultarla con una normalización tradicional.
- source_word: captiuum duxit
  english_pob_choice: led away captive
  chosen_spanish: fueron llevadas cautivas / los llevó cautivos
  alternatives_spanish:
  - fueron conducidas en cautiverio
  - los deportó
  lexicon: captiuum duxit
  rationale: «Llevar cautivo» mantiene la fuerza de deportación forzada y encaja con el registro bíblico. La repetición en voz pasiva y luego activa refleja el latín y el sentido histórico.
- source_word: Salmanassar rex Assyriorum
  english_pob_choice: Shalmaneser king of the Assyrians
  chosen_spanish: Salmanasar, rey de los asirios
  alternatives_spanish:
  - Salmanasar, rey de Asiria
  - Salmanasar, rey asirio
  lexicon: Salmanassar
  rationale: «Rey de los asirios» conserva el genitivo étnico del latín y coincide con el POB inglés. La transliteración «Salmanasar» es la forma española corriente y reconocible.
- source_word: trans flumen
  english_pob_choice: across the River
  chosen_spanish: al otro lado del Río
  alternatives_spanish:
  - más allá del Río
  - a través del río
  lexicon: trans flumen
  rationale: Se mantiene «el Río» con mayúscula como referencia bíblica tradicional a un curso de agua conocido por el contexto, siguiendo el POB inglés. «Al otro lado» expresa el movimiento de traslado sin forzar una localización más precisa que el texto no da.
- source_word: translati sunt in terram aliam
  english_pob_choice: they were taken into another land
  chosen_spanish: fueron trasladados a otra tierra
  alternatives_spanish:
  - fueron llevados a otra tierra
  - fueron transportados a otra tierra
  lexicon: transfero
  rationale: «Trasladados» reproduce el latín translati sunt con cercanía formal y mantiene la idea de desplazamiento forzado. «Otra tierra» preserva la vaguedad geográfica del original.
theological_decisions:
- issue: 'Historia textual: Josías vs. Hoshea'
  english_pob_reading: The Latin reads ‘in the days of King Josiah,’ but the translation keeps the historical error visible rather than emending it silently; the revision adopts Hoshea from daughter versions as authorial intent.
  chosen_spanish_reading: el rey Hoshea
  alternative_spanish_readings:
  - el rey Josías
  rationale: La decisión española sigue la lectura corregida por la evidencia de las versiones hijas y evita perpetuar el error del latín. Se conserva la transparencia textual requerida por POB, haciendo explícita la elección del nombre históricamente coherente.
  doctrine_reference: crítica textual / transmisión del texto
- issue: Identificación de las tribus y el exilio asirio
  english_pob_reading: these are the ten tribes that were led away captive ... and he carried them across the River, and they were taken into another land
  chosen_spanish_reading: estos son los diez tribus que fueron llevadas cautivas ... y fueron trasladados a otra tierra
  alternative_spanish_readings:
  - estas son las diez tribus que fueron llevadas cautivas ...
  rationale: Aunque en español «tribus» es femenino plural y exigiría concordancia femenina («estas son»), el texto latino y el POB inglés presentan la referencia demostrativa de forma neutra; por claridad gramatical y fidelidad de sentido, se usa una redacción fluida que conserva la identificación de las diez tribus y el hecho del exilio sin ampliar el contenido.
  doctrine_reference: historia de Israel / exilio asirio
translation_notes:
  revision_awareness: El texto latino conservado de Bensly 1895 lee Iosiae, pero la revisión fuente-a-fuente, apoyada por las versiones hijas y por el contexto histórico, adopta Hoshea como lectura autoral probable. La traducción española refleja esa revisión y mantiene visible la alternativa textual en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término predeterminado del proyecto cuando aparezca el nombre divino; aquí no ocurre.
  - Se prefirió «llenadas cautivas / llevadas cautivas» antes que «deportadas» para conservar la fuerza bíblica del latín captiuum duxit.
  - «El Río» se capitaliza siguiendo el POB inglés, aunque en español podría leerse simplemente como un río; la nota ofrece la alternativa.
  - Se evita «Cristo», «SEÑOR» y terminología eclesiástica no presente en el pasaje.
