translation:
  language: es
  text: Por tanto, sabe que los que quedan son más dichosos que los que han muerto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: scito ergo
  english_pob_choice: Therefore know
  chosen_spanish: Por tanto, sabe
  alternatives_spanish:
  - Sabe, pues
  - Conoce, por tanto
  lexicon: scito = imperativo de scire; ergo = por tanto / pues
  rationale: 'Mantengo el valor exhortativo e inferencial del latín: no es solo una afirmación, sino una invitación a reconocer la conclusión derivada de lo anterior. «Por tanto» refleja bien ergo; «sabe» conserva el imperativo de conocimiento.'
- source_word: magis beatificati sunt
  english_pob_choice: are more blessed
  chosen_spanish: son más dichosos
  alternatives_spanish:
  - son más bendecidos
  - son más bienaventurados
  lexicon: magis = más; beatificati sunt = han sido hechos bienaventurados / dichosos
  rationale: «Dichosos» comunica la idea de estado favorable y feliz sin imponer un matiz litúrgico más fuerte que el latín permite. «Bienaventurados» sería posible, pero en español puede sonar más cargado teológicamente que el texto base.
- source_word: qui derelicti
  english_pob_choice: those who are left
  chosen_spanish: los que quedan
  alternatives_spanish:
  - los que han quedado
  - los abandonados
  lexicon: derelicti = dejados, abandonados, los que quedan
  rationale: El contexto inmediato favorece «los que quedan» como referencia a los sobrevivientes/remanentes. «Abandonados» sería demasiado fuerte y sugeriría un juicio afectivo que el latín no exige.
- source_word: super eos qui mortui sunt
  english_pob_choice: than those who have died
  chosen_spanish: que los que han muerto
  alternatives_spanish:
  - que los muertos
  - que quienes murieron
  lexicon: super = sobre / comparativo 'que' en español; mortui sunt = han muerto
  rationale: La comparación se expresa naturalmente en español con «más ... que». Conservo «han muerto» para reflejar el perfecto del latín y la comparación explícita con los fallecidos.
theological_decisions:
- issue: Comparación de dicha entre vivos/restantes y muertos
  english_pob_reading: those who are left are more blessed than those who have died
  chosen_spanish_reading: los que quedan son más dichosos que los que han muerto
  alternative_spanish_readings:
  - los sobrevivientes son más bendecidos que los muertos
  - los que permanecen son más bienaventurados que los que fallecieron
  rationale: No hay indicación de una doctrina adicional; la frase se traduce de forma directa, preservando la comparación relativa de estado sin añadir explicaciones sobre el destino de los muertos.
  doctrine_reference: 2 Esdras 13:24 (comparación de los restantes con los muertos)
translation_notes:
  revision_awareness: La fuente latina limpia coincide sustancialmente con la traducción inglesa POB y con la revisión más reciente, que no introdujo cambios. No se detectan variantes textuales o interpretativas que requieran nota.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y sobrio, adecuado para lectura pública.
  - Se evita «SEÑOR» o terminología litúrgica no motivada por la fuente, ya que aquí no aparece ningún nombre divino.
  - «Dichosos» conserva la comparativa del latín sin sobrecargar el verso con una fórmula tradicional fija.
