lexical_decisions:
- source_word: quae non fuerant seruantes
  english_pob_choice: which they had not kept
  chosen_spanish: los que no habían guardado
  alternatives_spanish:
  - los cuales no habían observado
  - los que no habían cumplido
  lexicon: guardar
  rationale: El latín expresa una falta de cumplimiento/observancia respecto de algo debido; en español, «guardar» mantiene ese valor de observar o mantener fielmente, sin añadir una explicación inexistente. Se evita «observar» si puede sonar más técnico que el latín simple.
- source_word: in regione sua
  english_pob_choice: in their own land
  chosen_spanish: en su propia tierra
  alternatives_spanish:
  - en su propia región
  - en su propia tierra natal
  lexicon: tierra
  rationale: «Regione» puede referirse a territorio o país en sentido amplio. «Tierra» es la opción más natural y fiel en español, conservando el contraste entre su tierra y el lugar al que son llevados.
- source_word: Per introitus autem
  english_pob_choice: But through the entrances
  chosen_spanish: Pero por las entradas
  alternatives_spanish:
  - Pero por los accesos
  - Mas por las entradas
  lexicon: entradas
  rationale: «Introitus» denota entradas o accesos. Se mantiene «entradas» porque es directo y transparente; «accesos» sería una posible aclaración, pero menos literal. Se conserva «Pero» para reflejar el valor adversativo de «autem».
theological_decisions:
- issue: Alcance del miembro final conservado
  english_pob_reading: But through the entrances
  chosen_spanish_reading: Pero por las entradas
  alternative_spanish_readings:
  - Pero por los accesos
  - Y por las entradas
  rationale: El texto latino transmitido termina abruptamente con «Per introitus autem». No se añade el resto de la frase ni se suaviza la incompletitud. En español se conserva la apertura de la construcción y su carácter fragmentario.
  doctrine_reference: No aplica; decisión textual y de fidelidad al fragmento
