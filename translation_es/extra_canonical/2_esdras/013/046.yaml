    timestamp: '2026-04-23T19:51:43Z'
    unchanged: false
    changes_summary: Completed the omitted second clause about the Most High stopping up the river channels so they can cross; revised tense for the Latin perfects ('have begun,' 'has stopped up'); rendered 'nouissimo tempore' more literally as 'the last time.'
translation:
  language: es
  text: Luego habitaron allí hasta el tiempo final[46]; y ahora han comenzado a venir otra vez; otra vez el Altísimo ha tapado los canales del río[a], para que puedan cruzar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '46'
    text: Arzareth es un nombre de lugar conservado en la tradición latina; su identificación geográfica exacta es incierta.
    reason: cultural_note
  - marker: a
    text: 'O: “Entonces habitaron allí hasta el tiempo final; y ahora están comenzando a venir otra vez”.'
    reason: alternative_reading
lexical_decisions:
- source_word: usque in nouissimo tempore
  english_pob_choice: Then they lived there until the last time
  chosen_spanish: Luego habitaron allí hasta el último tiempo
  alternatives_spanish:
  - Luego habitaron allí hasta el fin de los tiempos
  - Luego habitaron allí hasta el tiempo final
  lexicon: nouissimus -> último; tempus -> tiempo
  rationale: El latín singular apunta a un tiempo final/escatológico, no a “la última vez” en sentido temporal ordinario. “Último tiempo” conserva la literalidad y la carga escatológica sin introducir una explicación añadida.
- source_word: coeperunt uenire
  english_pob_choice: they have begun to come again
  chosen_spanish: han comenzado a venir otra vez
  alternatives_spanish:
  - han empezado a venir otra vez
  - comenzaron a venir de nuevo
  lexicon: coepio + venire -> comenzar a venir
  rationale: 'El perfecto latino exige un valor completivo presente: “han comenzado”. “Otra vez” reproduce el iterum del texto y mantiene el carácter de retorno.'
- source_word: Iterum altissimus statuit uenas fluminis
  english_pob_choice: again the Most High has stopped up the channels of the river
  chosen_spanish: otra vez el Altísimo ha tapado los canales del río
  alternatives_spanish:
  - de nuevo el Altísimo ha cerrado los cauces del río
  - otra vez el Altísimo ha obstruido las corrientes del río
  lexicon: Altissimus -> Altísimo; statuo + venae fluminis -> tapar los canales del río
  rationale: La expresión divina se vierte como “Altísimo” para mantener el título reverencial. Para uenas fluminis, “canales del río” sigue de cerca la imagen física del texto latino; “tapar” conserva la idea de obstruir o clausurar el paso.
- source_word: ut possint transire
  english_pob_choice: so that they can cross
  chosen_spanish: para que puedan cruzar
  alternatives_spanish:
  - para que puedan pasar
  - a fin de que puedan cruzar
  lexicon: possum + transire -> poder cruzar
  rationale: “Cruzar” comunica de manera natural el tránsito por el río y preserva la finalidad del cierre de los cauces.
theological_decisions:
- issue: Título divino 'Altissimus'
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Supremo
  - el Dios Altísimo
  rationale: Se conserva el título reverencial y bíblico de forma idiomática en español. No se requiere una expansión interpretativa adicional.
  doctrine_reference: Divine titles / biblical reverence
- issue: Eschatological force of 'nouissimo tempore'
  english_pob_reading: until the last time
  chosen_spanish_reading: hasta el último tiempo
  alternative_spanish_readings:
  - hasta el tiempo final
  - hasta el fin de los tiempos
  rationale: El contexto de 4 Esdras sugiere un horizonte escatológico. “Último tiempo” deja visible la singularidad del latín y evita convertirlo automáticamente en plural.
  doctrine_reference: Eschatology / last things
translation_notes:
  revision_awareness: La revisión más reciente completó la cláusula omitida sobre el Altísimo y los canales del río, y ajustó el tiempo verbal del latín perfecto (“han comenzado”, “ha tapado”). La traducción española sigue esa lectura completa y conserva el matiz escatológico singular de 'nouissimo tempore'.
  spanish_consistency_notes:
  - Se mantiene 'Altísimo' para 'Altissimus', conforme al registro bíblico reverencial.
  - Se traduce 'iterum' de forma consistente como 'otra vez' para conservar la repetición.
  - La nota [46] conserva la explicación de nombre de lugar según el audit trail en inglés.
  - No se introduce 'SEÑOR' ni otras sustituciones devocionales no sustentadas por el latín.
  - La voz verbal compuesta en español refleja el perfecto latino donde el audit trail lo corrigió.
