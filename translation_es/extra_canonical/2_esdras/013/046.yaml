    reason: alternative_reading
  revision_rationale: Se ajusta 'último tiempo' a 'tiempo final' para un español más natural que conserve la fuerza escatológica singular del latín. Se mantiene el resto de la redacción, que refleja bien el sentido del original y la auditoría inglesa. La nota alternativa se actualiza para concordar con la revisión principal.
