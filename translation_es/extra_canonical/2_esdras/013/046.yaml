- from: Luego habitaron allí hasta el último tiempo[46]; y ahora han comenzado a venir otra vez; otra vez el Altísimo ha tapado los canales del río[a], para que puedan cruzar.
  to: Luego habitaron allí hasta el tiempo final[46]; y ahora han comenzado a venir otra vez; otra vez el Altísimo ha tapado los canales del río[a], para que puedan cruzar.
  rationale: Se ajusta 'último tiempo' a 'tiempo final' para un español más natural que conserve la fuerza escatológica singular del latín. Se mantiene el resto de la redacción, que refleja bien el sentido del original y la auditoría inglesa. La nota alternativa se actualiza para concordar con la revisión principal.
