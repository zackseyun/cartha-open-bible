base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/013/046.yaml
  text: Then they lived there until the last time[46]; and now they have begun to come again; again the Most High has stopped up the channels of the river[a], so that they can cross.
  footnotes:
  - marker: '46'
    text: Arzareth is a place-name preserved in the Latin tradition; its exact geographical identification is uncertain.
    reason: cultural_note
  - marker: a
    text: Or 'Then they lived there until the last time; and now they are beginning to come again.'.
    reason: previous_rendering
  revision_pass:
