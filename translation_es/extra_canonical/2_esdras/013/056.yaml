translation:
  language: es
  text: Por eso te he mostrado estas cosas; porque hay recompensa ante el Altísimo. Porque después de tres días más te hablaré más y te explicaré cosas graves y maravillosas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: propter hoc / therefore
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: conector causal-consecutivo
  rationale: «Por eso» comunica de manera natural la relación conclusiva del latín sin elevar el registro ni volverlo más rígido de lo necesario.
- source_word: ostendi tibi haec
  english_pob_choice: I have shown you these things
  chosen_spanish: te he mostrado estas cosas
  alternatives_spanish:
  - te he enseñado estas cosas
  - te he señalado estas cosas
  lexicon: mostrar / enseñar
  rationale: «Mostrar» sigue de cerca el latín ostendere y mantiene el sentido de hacer ver o presentar, sin introducir la carga didáctica de «enseñar».
- source_word: merces apud Altissimum
  english_pob_choice: there is a reward with the Most High
  chosen_spanish: hay recompensa con el Altísimo
  alternatives_spanish:
  - hay galardón junto al Altísimo
  - hay paga con el Altísimo
  lexicon: merces
  rationale: «Recompensa» expresa bien la idea de merces en este contexto. Se conserva «Altísimo» como título divino tradicional y fiel al original.
- source_word: post alios tres dies
  english_pob_choice: after three more days
  chosen_spanish: después de tres días más
  alternatives_spanish:
  - tras tres días más
  - al cabo de tres días más
  lexicon: temporal phrase
  rationale: La construcción española mantiene el valor aditivo de alios tres dies sin sobretraducirlo.
- source_word: ad te alia loquar
  english_pob_choice: I will speak further with you
  chosen_spanish: hablaré contigo de nuevo
  alternatives_spanish:
  - te hablaré además
  - te hablaré otra vez
  lexicon: loqui
  rationale: «Hablaré contigo de nuevo» refleja la continuación del discurso y conserva la cercanía personal de ad te.
- source_word: exponam tibi
  english_pob_choice: and explain to you
  chosen_spanish: y te explicaré
  alternatives_spanish:
  - y te expondré
  - y te aclararé
  lexicon: explicare / exponere
  rationale: «Explicar» es la equivalencia natural en español para el sentido de desplegar o aclarar el contenido.
- source_word: gravia et mirabilia
  english_pob_choice: weighty and wondrous things
  chosen_spanish: cosas graves y maravillosas
  alternatives_spanish:
  - cosas serias y maravillosas
  - cosas pesadas y maravillosas
  lexicon: gravis / mirabilis
  rationale: «Graves» conserva la densidad de gravia y evita debilitarlo a mero «importantes»; «maravillosas» reproduce mirabilia con buen equilibrio de dignidad y legibilidad.
theological_decisions:
- issue: Altísimo as divine title
  english_pob_reading: Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Más Alto
  - el Supremo
  rationale: Se preserva el título reverencial tradicional y transparente, sin sustituirlo por una paráfrasis abstracta.
  doctrine_reference: Divine title usage in biblical Spanish
- issue: Reward language
  english_pob_reading: there is a reward with the Most High
  chosen_spanish_reading: hay recompensa con el Altísimo
  alternative_spanish_readings:
  - hay galardón con el Altísimo
  - está la recompensa junto al Altísimo
  rationale: La formulación conserva la afirmación de retribución divina sin resolverla hacia una lectura más estrecha de mérito o salario.
  doctrine_reference: Reward/retribution language in apocalyptic discourse
translation_notes:
  revision_awareness: El texto latino y la traducción inglesa concuerdan estrechamente; no se observan revisiones aplicadas ni variantes textuales que obliguen a una nota de aparato. La redacción española sigue esa línea de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» como título divino consistente con el inglés POB y con el latín.
  - Se evita «Señor» porque el texto fuente no usa aquí dominus/kyrios sino Altissimus.
  - «Recompensa» conserva la noción de merces sin introducir una connotación meramente económica.
  - El registro busca ser digno y publicable, con sintaxis española natural y sin expandir el contenido más allá del latín.
