  yaml_path: translation/extra_canonical/2_esdras/013/009.yaml
  text: And behold, when he saw the assault of the coming multitude, he did not lift his hand, nor did he hold a spear, nor any weapon of war;
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:51:09Z'
    unchanged: false
    changes_summary: 'Adjusted word order to reflect the Latin more closely: ''multitudinis uenientis'' as ''the coming multitude'' rather than ''the multitude coming.'''
translation:
  language: es
  text: Y he aquí, cuando vio el asalto de la multitud que venía, no alzó su mano, ni sostenía una lanza, ni arma de guerra alguna;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: impetum
  english_pob_choice: the assault
  chosen_spanish: el asalto
  alternatives_spanish:
  - el ataque
  - el embate
  lexicon: Latin impetum
  rationale: «Asalto» conserva la idea de un acometimiento o irrupción violenta y encaja bien con el tono narrativo del pasaje. «Ataque» sería posible, pero menos marcado; «embate» es más literario y menos transparente para lectura pública.
- source_word: multitudinis uenientis
  english_pob_choice: the coming multitude
  chosen_spanish: la multitud que venía
  alternatives_spanish:
  - la multitud que se acercaba
  - la multitud venidera
  lexicon: Latin multitudinis uenientis
  rationale: Se preserva la relación de participio con una relativa natural en español. «Que venía» sigue de cerca el valor del latín y mantiene la idea de movimiento hacia el personaje sin forzar una construcción calcada.
- source_word: non leuauit manum suam
  english_pob_choice: he did not lift his hand
  chosen_spanish: no alzó su mano
  alternatives_spanish:
  - no levantó su mano
  - no alzó la mano
  lexicon: Latin non leuauit manum suam
  rationale: «Alzó» reproduce bien la acción sin exceso de literalidad mecánica. «Levantó» también sería posible; se conserva el posesivo para reflejar el latín y el énfasis corporal del gesto negado.
- source_word: neque frameam tenebat
  english_pob_choice: nor did he hold a spear
  chosen_spanish: ni llevaba una lanza
  alternatives_spanish:
  - ni tenía una lanza
  - ni sostenía una lanza
  lexicon: Latin neque frameam tenebat
  rationale: El latín indica que no tenía/portaba una lanza. En español, «llevaba una lanza» comunica de forma natural la ausencia de portar un arma en ese momento. «Sostenía» sería más rígido; «tenía» pierde el matiz de porte.
- source_word: neque ... weapon of war
  english_pob_choice: nor any weapon of war
  chosen_spanish: ni ninguna arma de guerra
  alternatives_spanish:
  - ni arma de guerra alguna
  - ni ninguna arma para la guerra
  lexicon: 'English audit trail: weapon of war; Latin continuation implied by the clause structure'
  rationale: Se conserva la amplitud de la fórmula y su carácter general. «Arma de guerra» es transparente en español y mantiene el paralelismo con la lanza sin añadir especificación no atestiguada.
theological_decisions:
- issue: Referencia al sujeto y su pasividad frente a la multitud
  english_pob_reading: He did not lift his hand, nor did he hold a spear, nor any weapon of war;
  chosen_spanish_reading: no alzó su mano, ni llevaba una lanza, ni ninguna arma de guerra;
  alternative_spanish_readings:
  - no alzó su mano, ni sostuvo una lanza, ni ninguna arma de guerra;
  - no levantó su mano, ni tenía una lanza, ni ninguna arma de guerra;
  rationale: No se introduce interpretación moral o militar adicional. La redacción española mantiene la simple constatación de que no presentó resistencia armada, tal como exige el latín y el texto inglés auditado.
  doctrine_reference: Narrative description; no doctrinal claim added
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés auditado, especialmente la colocación de «the coming multitude» como «la multitud que venía». Se evitó traducir mecánicamente con un gerundio pospuesto y se mantuvo la secuencia negativa completa del latín: mano, lanza y arma de guerra.'
  spanish_consistency_notes:
  - Se usó «Y he aquí» para reproducir la apertura narrativa enfática del latín/inglés auditado.
  - Se mantuvo un registro sobrio y público, sin arcaísmos innecesarios.
  - Se preservó la triple negación con paralelismo claro en español.
