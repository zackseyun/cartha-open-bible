translation:
  language: es
  text: Y he aquí[a], un viento se levantó del mar para agitar todas sus olas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y he aquí, un viento se levantó del mar, para agitar todas sus olas».'
    reason: alternative_reading
lexical_decisions:
- source_word: et ecce
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y he aquí, mira
  lexicon: interjección narrativa de atención
  rationale: «Y he aquí» conserva el tono de sorpresa y señalamiento del original y del inglés POB sin volverlo coloquial.
- source_word: ventus
  english_pob_choice: a wind
  chosen_spanish: un viento
  alternatives_spanish:
  - un aire
  - una ráfaga
  lexicon: viento
  rationale: El latín nombra simplemente un viento; «viento» es la opción natural y fiel en español.
- source_word: exsurgebat
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - surgió
  - se alzó
  lexicon: levantarse / surgir
  rationale: «Se levantó» reproduce bien el movimiento repentino del verbo latino y suena natural en español bíblico moderno.
- source_word: de mari
  english_pob_choice: from the sea
  chosen_spanish: del mar
  alternatives_spanish:
  - desde el mar
  lexicon: mar
  rationale: «Del mar» sigue de cerca la preposición latina y mantiene la escena visual.
- source_word: ut conturbaret omnes fluctus eius
  english_pob_choice: to stir up all its waves
  chosen_spanish: para agitar todas sus olas
  alternatives_spanish:
  - para alborotar todas sus olas
  - para conmover todas sus olas
  lexicon: agitar / olas
  rationale: «Conturbaret» expresa perturbación o agitación; «agitar» comunica bien el efecto sobre las olas sin sobrecargar el verso. «Olas» es la equivalencia natural de «fluctus» en español.
theological_decisions:
- issue: Posible ampliación desde una lectura corrupta del pasaje
  english_pob_reading: And behold, a wind arose from the sea, to stir up all its waves.
  chosen_spanish_reading: Y he aquí, un viento se levantó del mar para agitar todas sus olas.
  alternative_spanish_readings:
  - Y he aquí, un viento se levantó del mar para agitar todas sus olas. Y miré, y he aquí...
  rationale: Se mantiene solo lo atestiguado por el latín limpio de esta sección. No se incorpora material restaurado de otros testigos, porque la tarea pide este versículo/segmento con base en el texto fuente proporcionado y el pasaje dado en la revisión final.
  doctrine_reference: Principio textual de no añadir lectura no presente en el texto fuente de trabajo
translation_notes:
  revision_awareness: La revisión automática de 2026-04-22 añadió material ajeno a este versículo; la revisión posterior de 2026-04-23 lo retiró por no estar presente en el latín fuente. La traducción española sigue la forma final revisada y no incorpora la expansión restaurativa.
  spanish_consistency_notes:
  - Conservo «Y he aquí» para mantener la cadencia narrativa del POB y del original latino.
  - Uso «olas» para «fluctus» por claridad idiomática en español.
  - No empleo «SEÑOR», «Cristo» ni otros términos no pertinentes al versículo.
  - La nota [a] refleja únicamente una alternativa de puntuación/relación sintáctica, no una variante textual.
