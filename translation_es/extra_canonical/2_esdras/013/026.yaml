base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/013/026.yaml
  text: This is he whom the Most High has kept for many ages, who will by himself deliver his creation, and he himself will direct those who are left.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:51:24Z'
    unchanged: false
    changes_summary: Capitalized the opening for formal register, changed 'has been keeping' to 'has kept' for a more natural and accurate rendering of the Latin perfect, and removed the semicolon in favor of a comma for smoother English clause flow.
translation:
  language: es
  text: Este es aquel a quien el Altísimo ha guardado por muchos siglos, que por sí mismo liberará su creación, y él mismo dirigirá a los que han quedado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Altísimo Dios
  lexicon: altissimus → Altísimo
  rationale: El latín usa un superlativo sustantivado con valor reverente para Dios; «el Altísimo» conserva la forma sobria y bíblica sin introducir una paráfrasis más interpretativa.
- source_word: conservat
  english_pob_choice: has kept
  chosen_spanish: ha reservado
  alternatives_spanish:
  - ha guardado
  - ha conservado
  lexicon: conservat → reservar / guardar
  rationale: «Ha reservado» comunica bien la idea de tener a alguien designado o preservado para un propósito futuro, y evita sugerir solo una conservación pasiva. Mantiene la fuerza del perfecto latino que el audit trail inglés ya fijó como acción completada con continuidad de resultado.
- source_word: multis temporibus
  english_pob_choice: for many ages
  chosen_spanish: por muchos siglos
  alternatives_spanish:
  - por muchos tiempos
  - desde hace muchos siglos
  lexicon: multis temporibus → por muchos siglos
  rationale: «Siglos» transmite con naturalidad en español la gran extensión temporal del plural latino. «Tiempos» sería más literal pero menos claro y más ambigua en español.
- source_word: per semet ipsum
  english_pob_choice: by himself
  chosen_spanish: por sí mismo
  alternatives_spanish:
  - él mismo
  - por sí
  lexicon: per semet ipsum → por sí mismo
  rationale: 'La construcción refleja el valor enfático e independiente del latín: la liberación no depende de intermediarios. «Por sí mismo» conserva mejor esa autosuficiencia que solo «él mismo».'
- source_word: liberabit creaturam suam
  english_pob_choice: will deliver his creation
  chosen_spanish: liberará su creación
  alternatives_spanish:
  - rescatará su creación
  - libertará su creación
  lexicon: liberabit → liberará; creaturam suam → su creación
  rationale: «Liberará» mantiene el verbo cognado y el sentido de liberar/deliver del texto fuente. «Creación» reproduce literalmente creaturam en este contexto cósmico; «rescatará» añadiría una carga más explícitamente soteriológica que el latín no exige por sí solo.
- source_word: disponet
  english_pob_choice: will direct
  chosen_spanish: dirigirá
  alternatives_spanish:
  - dispondrá
  - ordenará
  lexicon: disponet → dirigir / disponer
  rationale: En español, «dirigirá» comunica bien la idea de guiar y ordenar el curso de quienes permanecen. «Disponer» sería más literal pero menos transparente aquí; «ordenará» podría sonar más autoritativo que el latín en este contexto.
- source_word: qui derelicti sunt
  english_pob_choice: those who are left
  chosen_spanish: a los que queden
  alternatives_spanish:
  - a los que han quedado
  - a los que fueron dejados
  lexicon: derelicti sunt → los que quedan / los que han quedado
  rationale: «Los que queden» preserva la referencia a los sobrevivientes o remanentes sin fijar innecesariamente el aspecto. También suena natural en español y mantiene la ambigüedad textual del participio pasivo latino.
theological_decisions:
- issue: Identidad reverente del sujeto divino
  english_pob_reading: This is he whom the Most High has kept for many ages
  chosen_spanish_reading: Este es aquel a quien el Altísimo ha reservado por muchos siglos
  alternative_spanish_readings:
  - Este es el que el Altísimo ha guardado por muchos siglos
  rationale: Se conserva la presentación solemne e identificadora del personaje sin añadir títulos no presentes en el latín. La elección de «aquel» refuerza la deixis enfática del pasaje.
  doctrine_reference: Christological/messianic identification in 2 Esdras 13 context
- issue: Agencia exclusiva en la liberación
  english_pob_reading: who will by himself deliver his creation
  chosen_spanish_reading: que por sí mismo liberará su creación
  alternative_spanish_readings:
  - que él mismo liberará su creación
  rationale: La frase enfatiza que la acción liberadora se realiza sin mediadores. «Por sí mismo» preserva mejor esa exclusividad que una simple repetición pronominal.
  doctrine_reference: Divine or messianic self-sufficiency in salvation
- issue: Dirección del remanente
  english_pob_reading: and he himself will direct those who are left
  chosen_spanish_reading: y él mismo dirigirá a los que queden
  alternative_spanish_readings:
  - y él mismo guiará a los que queden
  - y él mismo ordenará a los que queden
  rationale: El latín dispone una función de gobierno/guía sobre el remanente; «dirigirá» equilibra dirección y conducción sin exagerar la noción de mando.
  doctrine_reference: Remnant guidance and restoration
translation_notes:
  revision_awareness: The English audit trail revised the opening from a progressive to a simple perfect and smoothed clause punctuation. The Spanish draft follows that stable sense by using perfective present («ha reservado») and two coordinated clauses with commas, without adding interpretive punctuation or tense shifts beyond what the Latin warrants.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» como término reverente para Altissimus, en línea con el estándar del proyecto para lo divino.
  - Se evita introducir «Cristo» o «Mesías» porque el latín fuente no lo explicita en este versículo; la identificación queda implícita por el contexto sin sobretraducción.
  - «Liberará» y «dirigirá» conservan el paralelismo verbal del original y la claridad lectora en español.
  - No se añadieron notas a pie porque el texto latino y el audit trail inglés no requieren variantes textuales explícitas para este verso.
