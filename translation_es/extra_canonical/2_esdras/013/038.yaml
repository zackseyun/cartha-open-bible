review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran medida el sentido latino: conserva el relativo instrumental, la inminencia/inicio de cruciari, la comparación con llama/fuego, y la coordinación no instrumental de «y la ley». Sin embargo, «las cuales» introduce un desacuerdo de género/número con el antecedente implícito «cosas», y la sintaxis española queda más pesada de lo necesario.'
  spanish_quality_summary: La redacción es comprensible, pero «con lo cual … las cuales» suena forzada e inconsistente en español. Conviene explicitar el antecedente con «esas cosas» para dar cohesión, y usar una formulación más natural como «se asemejan». También mejora la fluidez repetir «a» en «comparada con el fuego» o mantener «fuego» sin artículo de manera equilibrada; la mejor solución aquí es una frase limpia y directa.
  glossary_alignment: No hay términos del glosario principal especialmente controvertidos en este versículo. «ley» para legem, «llama/fuego» para flamma/igni, y «destruirá» para perdet están alineados con el proyecto. La decisión de mantener «y la ley» en vez de un instrumental está bien documentada y debe preservarse.
  issues:
  - severity: medium
    issue: Desacuerdo y referencia poco natural en «con lo cual … las cuales»
    rationale: «Lo cual» es neutro singular, mientras que «las cuales» exige un antecedente femenino plural expreso. Aunque puede inferirse «cosas», el español queda torpe y poco idiomático.
  - severity: low
    issue: «son comparadas» resulta más rígido de lo necesario
    rationale: El latín adsimilatae sunt expresa semejanza; en español bíblico natural «se asemejan» o «son semejantes» comunica mejor sin perder fidelidad.
  revised_spanish_text: con esas cosas comenzarán a ser atormentados, las cuales se asemejan a una llama; y los destruirá sin esfuerzo, y la ley, que es comparada con fuego.
  revision_rationale: Se reemplaza «con lo cual» por «con esas cosas» para dar un antecedente claro y concordante a «las cuales». Se cambia «son comparadas» por «se asemejan» en la primera cláusula para un español más natural sin alterar el sentido de semejanza. Se conserva «y la ley» como coordinación no instrumental, en línea con el latín y la auditoría inglesa.
