revisions:
- from: con lo cual comenzarán a ser atormentados, las cuales son comparadas con una llama; y los destruirá sin esfuerzo, y la ley, que es comparada con fuego.
  to: con esas cosas comenzarán a ser atormentados, las cuales se asemejan a una llama; y los destruirá sin esfuerzo, y la ley, que es comparada con fuego.
  rationale: Se reemplaza «con lo cual» por «con esas cosas» para dar un antecedente claro y concordante a «las cuales». Se cambia «son comparadas» por «se asemejan» en la primera cláusula para un español más natural sin alterar el sentido de semejanza. Se conserva «y la ley» como coordinación no instrumental, en línea con el latín y la auditoría inglesa.
