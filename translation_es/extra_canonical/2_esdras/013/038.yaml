base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/013/038.yaml
  text: with which they are about to be tormented, which are likened to a flame; and he will destroy them without effort, and the law, which is likened to fire.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:51:34Z'
