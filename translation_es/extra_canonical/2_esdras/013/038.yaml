    changes_summary: Removed 'by' before 'the law' because the Latin coordinates 'and the law' with 'he will destroy them' rather than making it an instrumental phrase. Kept the rest substantially unchanged.
translation:
  language: es
  text: con esas cosas comenzarán a ser atormentados, las cuales se asemejan a una llama; y los destruirá sin esfuerzo, y la ley, que es comparada con fuego.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: quibus incipient cruciari
  english_pob_choice: with which they are about to be tormented
  chosen_spanish: con lo cual comenzarán a ser atormentados
  alternatives_spanish:
  - con lo que van a ser atormentados
  - por lo cual empezarán a ser atormentados
  lexicon: cruciari -> atormentados; incipient -> comenzarán
  rationale: El latín indica inicio de un proceso de tormento; «comenzarán a ser atormentados» conserva la inminencia y la pasiva. «Con lo cual» reproduce el relativo instrumental sin introducir una causalidad más fuerte de la que exige el texto.
- source_word: quae adsimilatae sunt flammae
  english_pob_choice: which are likened to a flame
  chosen_spanish: las cuales son comparadas con una llama
  alternatives_spanish:
  - las cuales se asemejan a una llama
  - las cuales son semejantes a una llama
  lexicon: adsimilatae sunt -> son comparadas/semejadas; flammae -> llama
  rationale: «Adsimilatae» expresa semejanza explícita; «son comparadas» mantiene esa relación sin suavizarla. Se eligió «llama» por ser el equivalente natural de flamma en español bíblico contemporáneo.
- source_word: perdet eos sine labore
  english_pob_choice: he will destroy them without effort
  chosen_spanish: los destruirá sin esfuerzo
  alternatives_spanish:
  - los destruirá sin trabajo
  - los aniquilará sin esfuerzo
  lexicon: perdet -> destruirá; sine labore -> sin esfuerzo
  rationale: «Perdet» puede cubrir destrucción total; «destruirá» sigue de cerca la fuerza del verbo en español. «Sin esfuerzo» conserva la idea de facilidad sin añadir matices no presentes en el latín.
- source_word: legem quae igni adsimilata est
  english_pob_choice: the law, which is likened to fire
  chosen_spanish: y la ley, que es comparada con fuego
  alternatives_spanish:
  - y la ley, que se asemeja al fuego
  - y la ley, que es comparada con una llama
  lexicon: lexem -> ley; igni adsimilata est -> es comparada con fuego
  rationale: 'Se mantiene la coordinación del texto revisado en inglés: «y la ley» no como instrumento de destrucción, sino como miembro coordinado de la frase. «Fuego» respeta igni con más fidelidad que «llama» en este segundo miembro.'
theological_decisions:
- issue: Relación entre el agente de destrucción y la ley en la clausula final
  english_pob_reading: and the law, which is likened to fire
  chosen_spanish_reading: y la ley, que es comparada con fuego
  alternative_spanish_readings:
  - por la ley, que es comparada con fuego
  - mediante la ley, que es comparada con fuego
  rationale: La revisión inglesa eliminó «by» porque el latín coordina «et legem» con la cláusula anterior, en vez de hacer de la ley un instrumento. El español conserva esa coordinación con «y», evitando una lectura instrumental no respaldada por el texto fuente.
  doctrine_reference: Coordinación sintáctica y lectura no instrumental del latín revisado
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del inglés POB, que suprimió «by» antes de «the law» por razones sintácticas del latín. La versión española conserva esa coordinación con «y la ley» y no introduce una relación instrumental.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo de dos comparaciones: una con llama y otra con fuego.'
  - Se mantiene el tono sobrio y judicial del latín sin añadir intensificación interpretativa.
  - Se usa «comenzarán a ser atormentados» para reflejar inicio y pasiva, en lugar de una paraprástasis más libre.
