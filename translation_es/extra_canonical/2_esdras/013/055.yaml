translation:
  language: es
  text: Porque has ordenado tu vida con sabiduría, y has llamado al entendimiento tu madre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: vitam tuam disposuisti
  english_pob_choice: you have ordered your life
  chosen_spanish: has ordenado tu vida
  alternatives_spanish:
  - has dispuesto tu vida
  - has regulado tu vida
  lexicon: disponere
  rationale: La construcción latina expresa haber dispuesto u ordenado la vida con intención y forma. «Has ordenado tu vida» comunica bien ese sentido en español sin añadir ideas ajenas; «has dispuesto» es posible, pero «ordenado» resulta más natural y mantiene el valor de dirección sabia.
- source_word: in sapientiam
  english_pob_choice: in wisdom
  chosen_spanish: en la sabiduría
  alternatives_spanish:
  - con sabiduría
  - para la sabiduría
  lexicon: sapientia
  rationale: El latín usa una relación preposicional breve que el inglés vierte «in wisdom». En español, «en la sabiduría» conserva la imagen de esfera o marco de vida dentro de la sabiduría. «Con sabiduría» sería más interpretativo.
- source_word: sensum tuum
  english_pob_choice: understanding
  chosen_spanish: la inteligencia
  alternatives_spanish:
  - el entendimiento
  - el sentido
  lexicon: sensus
  rationale: «Sensus» puede abarcar entendimiento, percepción o sentido. En este contexto, «inteligencia» transmite con claridad la facultad de comprender, y evita una posible ambigüedad de «sentido» en español. «Entendimiento» también es válido; se mantiene «inteligencia» por fluidez y registro.
- source_word: matrem
  english_pob_choice: mother
  chosen_spanish: tu madre
  alternatives_spanish:
  - madre
  - madre tuya
  lexicon: mater
  rationale: 'Se conserva la relación posesiva explícita del latín y del inglés POB: «tu madre». Esto mantiene el tono directo del apóstrofe y la metáfora filial sin suavizarla.'
translation_notes:
  revision_awareness: El texto latino limpiado coincide estrechamente con la traducción inglesa POB y con la revisión más reciente, que no requirió cambios. La versión española sigue de cerca esa línea de lectura, sin introducir notas textuales porque no hay variantes auditadas relevantes en el paquete.
  spanish_consistency_notes:
  - Se mantiene el tono directo de segunda persona singular, coherente con el inglés POB y con el latín.
  - Se evita «Cristo», «SEÑOR» u այլ terminología no pertinente, ya que el verso no contiene vocabulario teológico de ese tipo.
  - El registro es bíblico pero en español moderno, procurando claridad sin arcaísmo excesivo.
