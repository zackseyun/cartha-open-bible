source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'dinem earum quae collectae sunt gentes, proteget qui superauerit populum, Et tunc ostendet eis multa plurima portenta. Et dixi ego : dominator domine, hoc mihi ostende, propter quod uidi uirum ascendentem de corde maris. et dixit mihi : Sicut non potest hoc uel scrutinare uel scire quis, quid sit in profundo maris, sic non poterit quisquam super terram uidere filium meum uel eos qui cum eo sunt nisi in tempore diei. Haec est interpretatio somnii quod uidisti, et propter hoc inluminatus es haec solus. Dereliquisti enim tua, et circa mea uacasti, et legem meam exquisisti ; Vitam enim tuam disposuisti in sapientiam, et sensum tuum uocasti matrem. Et propter hoc ostendi tibi haec, merces enim apud altissimum. erit enim post alios tres dies ad te alia loquar, et exponam tibi grauia et mirabilia. Et profectus sum et transii in campum, multum glorificans et laudans altissimum de mirabilibus quae per tempus faciebat, Et quoniam gubernat tempora et quae sunt in temporibus inlata : et sedi
    ibi tribus diebus.'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/013/049.yaml
  text: Then it will be, when he begins to destroy the gathered multitude of the nations, that he will protect the people who survive.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:51:45Z'
    unchanged: false
    changes_summary: Adjusted capitalization and smoothed the clause structure by adding 'that' for more natural formal English; retained the draft's meaning.
translation:
  language: es
  text: Entonces acontecerá que, cuando comience a destruir la muchedumbre reunida de las naciones, protegerá al pueblo que sobreviva.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: dinem earum quae collectae sunt gentes
  english_pob_choice: the gathered multitude of the nations
  chosen_spanish: la muchedumbre reunida de las naciones
  alternatives_spanish:
  - la multitud congregada de las naciones
  - el pueblo reunido de las naciones
  lexicon: gentes → naciones; collectae sunt → reunidas; dinem/multitudo → muchedumbre
  rationale: La base latina apunta a una multitud o conjunto reunido, no simplemente a un grupo abstracto. «Muchedumbre reunida» conserva el sentido colectivo y la idea de reunión, y «naciones» refleja gentes en un registro bíblico natural en español.
- source_word: proteget
  english_pob_choice: he will protect
  chosen_spanish: protegerá
  alternatives_spanish:
  - guardará
  - amparará
  lexicon: protego → proteger, defender, resguardar
  rationale: «Protegerá» sigue de cerca el verbo latino y mantiene claridad contemporánea sin añadir matices devocionales no expresados explícitamente en el texto.
- source_word: populum
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo
  - a la gente
  lexicon: populus → pueblo
  rationale: «Pueblo» es el equivalente más directo y conserva el contraste con las naciones.
- source_word: superauerit
  english_pob_choice: who survive
  chosen_spanish: que sobreviva
  alternatives_spanish:
  - que quede en pie
  - que quede con vida
  lexicon: supero → sobrevivir, quedar; relativo con matiz resultativo
  rationale: La frase inglesa «who survive» refleja el remanente que queda después del juicio. «Que sobreviva» comunica bien ese valor sin expandir el texto.
theological_decisions:
- issue: Destruction of the nations and protection of the surviving people
  english_pob_reading: when he begins to destroy the gathered multitude of the nations, that he will protect the people who survive
  chosen_spanish_reading: cuando comience a destruir la muchedumbre reunida de las naciones, protegerá al pueblo que sobreviva
  alternative_spanish_readings:
  - cuando empiece a destruir la multitud reunida de las naciones
  - cuando comience a destruir a la multitud reunida de las naciones
  rationale: 'Se mantiene la secuencia de juicio y preservación tal como aparece en la fuente y en la traducción inglesa auditada. No se explicita más de lo que el texto afirma: una destrucción iniciada sobre las naciones reunidas y una protección concedida al pueblo que sobreviva.'
  doctrine_reference: 2 Esdras 13:49 (lectura apocalíptica de juicio y remanente)
translation_notes:
  revision_awareness: La traducción inglesa revisada solo ajustó la puntuación y añadió 'that' para suavizar la sintaxis; no cambió el contenido. La versión española sigue directamente ese sentido estable y no necesita nota textual adicional.
  spanish_consistency_notes:
  - Se mantiene «naciones» para gentes, en línea con el registro apocalíptico y con el contraste pueblo/naciones.
  - Se evita introducir términos eclesiásticos no presentes en la fuente.
  - El verbo principal queda en futuro simple («protegerá») para reflejar la consecuencia futura expresada por la construcción latina y la inglesa auditada.
