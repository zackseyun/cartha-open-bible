  text: reuelabitur filius meus quem uidisti uirum ascendentem. Et erit, quando audierint omnes gentes uocem eius, et derelinquet unusquisque regionem suam et bellum quod habent in alterutro,
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/013/033.yaml
  text: my Son will be revealed, whom you saw as a man ascending. And it shall be, when all the nations hear his voice, each will leave his own land and the war that they have against one another,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:52:01Z'
    unchanged: false
    changes_summary: Changed 'coming up' to 'ascending' for closer lexical match to ascendentem, and simplified 'each man' to 'each' for more natural formal English while preserving sense.
translation:
  language: es
  text: se revelará mi Hijo, a quien viste como un hombre que ascendía. Y sucederá que, cuando todas las naciones oigan su voz, cada cual dejará su propia tierra y la guerra que tienen entre sí,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: reuelabitur / will be revealed
  english_pob_choice: will be revealed
  chosen_spanish: se revelará
  alternatives_spanish:
  - será revelado
  - se manifestará
  lexicon: revelar
  rationale: El latín pasivo futuro expresa una revelación divina; en español, la forma pronominal “se revelará” conserva bien la pasividad sin sonar forzada y mantiene el sentido de desvelamiento.
- source_word: filius meus
  english_pob_choice: my Son
  chosen_spanish: mi Hijo
  alternatives_spanish:
  - mi Hijo querido
  - el Hijo mío
  lexicon: hijo
  rationale: Se traduce de forma directa y sobria, preservando la relación filial explícita del latín.
- source_word: quem uidisti uirum ascendentem
  english_pob_choice: whom you saw as a man ascending
  chosen_spanish: a quien viste como un hombre que ascendía
  alternatives_spanish:
  - a quien viste como un hombre subiendo
  - a quien viste ascender como hombre
  lexicon: ascender
  rationale: “Ascendentem” apunta con claridad a la idea de ascender; “que ascendía” reproduce mejor la acción continua que “subiendo” y evita ambigüedad innecesaria.
- source_word: uocem eius
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - la voz de él
  lexicon: voz
  rationale: Correspondencia directa y natural en español; el posesivo conserva la referencia al sujeto del verso anterior.
- source_word: derelinquet unusquisque regionem suam
  english_pob_choice: each will leave his own land
  chosen_spanish: cada una dejará su propia tierra
  alternatives_spanish:
  - cada uno dejará su propia tierra
  - cada cual dejará su propia tierra
  lexicon: dejar / tierra
  rationale: El latín usa un distributivo general. En español, “cada una” puede concordar con “naciones” y expresa bien el sentido colectivo sin introducir el masculino genérico innecesariamente.
- source_word: bellum quod habent in alterutro
  english_pob_choice: the war that they have against one another
  chosen_spanish: la guerra que tienen entre sí
  alternatives_spanish:
  - la guerra que tienen unos contra otros
  - la guerra que mantienen unos con otros
  lexicon: guerra
  rationale: “In alterutro” expresa reciprocidad; “entre sí” es la forma española más natural y fiel al matiz mutuo del latín.
theological_decisions:
- issue: Identidad mesiánica del “Hijo”
  english_pob_reading: my Son
  chosen_spanish_reading: mi Hijo
  alternative_spanish_readings:
  - el Hijo mío
  rationale: Se mantiene la formulación filial directa sin suavizarla hacia un título más interpretativo. El texto latino no introduce “Mesías” aquí, por lo que no se sustituye el sustantivo por una glosa cristológica.
  doctrine_reference: Cristología; lectura canónica de la filiación
- issue: “Ascendiendo” como descripción del varón visto
  english_pob_reading: whom you saw as a man ascending
  chosen_spanish_reading: a quien viste como un hombre que ascendía
  alternative_spanish_readings:
  - a quien viste como un hombre subiendo
  rationale: 'Se conserva la tensión visual del original: el personaje es visto “como un hombre” en el acto de ascender. No se convierte en una formulación más doctrinal o más explícita de la ascensión.'
  doctrine_reference: Cristología; ascensión
- issue: Reciprocidad de la guerra entre las naciones
  english_pob_reading: the war that they have against one another
  chosen_spanish_reading: la guerra que tienen entre sí
  alternative_spanish_readings:
  - la guerra que tienen unos contra otros
  rationale: La expresión latina subraya conflicto mutuo; la opción elegida preserva la reciprocidad sin intensificarla con una frase más combativa que la fuente.
  doctrine_reference: Paz entre las naciones; ética narrativa
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente del contexto inglés auditado: ''ascending'' para ascendentem y ''each'' en lugar de ''each man''. No hay notas textuales en el POB inglés, así que no se añadieron pies de nota obligatorios.'
  spanish_consistency_notes:
  - Se mantiene 'Hijo' con mayúscula por referencia al sujeto divino del contexto.
  - Se usa 'ascendía' para reflejar el latín ascendentem sin sobretraducir.
  - No se introduce 'Cristo' ni 'SEÑOR' porque no aparecen en el latín dado.
  - La puntuación conserva la estructura coordinada del latín con una sola coma final abierta al verso siguiente si la edición la continúa.
