review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del latín y del English POB: revelación del Hijo, identificación con el hombre visto ascendiendo, y abandono de la tierra y de la guerra al oír su voz. Sin embargo, "cada una dejará" introduce una concordancia femenina con "naciones" que no reproduce bien el distributivo unusquisque del original ni el inglés "each"; conviene una forma distributiva más natural y exacta en español.'
  spanish_quality_summary: El español es claro y digno, pero "cada una" suena algo forzado porque deja implícito un antecedente femenino plural y puede desviar el foco desde el distributivo individual/general del original. "Cada cual" resuelve mejor la naturalidad y evita el masculino genérico sin perder precisión.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. "mi Hijo" es correcto; no corresponde introducir "Mesías". "se revelará" y "ascendía" son adecuados. No se requieren notas.
  issues:
  - severity: medium
    issue: '"cada una dejará su propia tierra" no refleja óptimamente unusquisque'
    rationale: El latín distributivo unusquisque significa "cada uno/cada cual". La elección "cada una" fuerza una concordancia con "naciones" ausente en la forma latina y puede sonar menos natural en español bíblico moderno.
  revised_spanish_text: se revelará mi Hijo, a quien viste como un hombre que ascendía. Y sucederá que, cuando todas las naciones oigan su voz, cada cual dejará su propia tierra y la guerra que tienen entre sí,
  revision_rationale: Se reemplaza "cada una" por "cada cual" para reflejar mejor el distributivo latino unusquisque, mantener un español más natural y evitar una concordancia femenina inferida de "naciones" que no está explícita en la fuente.
