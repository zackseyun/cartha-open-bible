  to: se revelará mi Hijo, a quien viste como un hombre que ascendía. Y sucederá que, cuando todas las naciones oigan su voz, cada cual dejará su propia tierra y la guerra que tienen entre sí,
  rationale: Se reemplaza "cada una" por "cada cual" para reflejar mejor el distributivo latino unusquisque, mantener un español más natural y evitar una concordancia femenina inferida de "naciones" que no está explícita en la fuente.
