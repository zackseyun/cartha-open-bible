- from: Y he aquí[a], es costumbre que, cuando la tierra recibe semilla, o el mar una nave, o cualquier otro recipiente comida o bebida[b],
  to: Y he aquí[a], es costumbre que, cuando la tierra recibe semilla, o el mar una nave, o otro recipiente para comida o bebida[b],
  rationale: Se elimina «cualquier» porque no está respaldado por «uas aliud», y se añade «para» para que el español suene natural manteniendo la idea de un recipiente destinado a comida o bebida. El resto del borrador es fiel al sentido y al tono del pasaje.
