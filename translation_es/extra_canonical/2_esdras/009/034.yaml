translation:
  language: es
  text: Y he aquí[a], es costumbre que, cuando la tierra recibe semilla, o el mar una nave, o otro recipiente para comida o bebida[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Y mira».'
    reason: lexical_alternative
  - marker: b
    text: El latín dice «uas aliud», literalmente «otro recipiente»; por eso se mantiene «otro» en la traducción.
    reason: source_note
lexical_decisions:
- source_word: uel nauem mare
  english_pob_choice: the sea a ship
  chosen_spanish: el mar una nave
  alternatives_spanish:
  - el mar un barco
  - el mar una embarcación
  lexicon: nauem → nave
  rationale: En el latino, mare y nauem aparecen en paralelismo directo. «Nave» conserva el sustantivo concreto y el tono formal del pasaje mejor que alternativas más coloquiales.
- source_word: uas aliud
  english_pob_choice: or any other vessel food or drink
  chosen_spanish: cualquier otro recipiente comida o bebida
  alternatives_spanish:
  - cualquier otro vaso comida o bebida
  - cualquier otro utensilio comida o bebida
  lexicon: uas aliud → recipiente / otro
  rationale: El texto latino dice literalmente «vaso/recipiente» y el adjetivo aliud añade la idea de «otro». Se eligió «recipiente» para evitar la ambigüedad de «vaso» en español moderno y para conservar explícitamente «otro».
- source_word: escas uel potus
  english_pob_choice: food or drink
  chosen_spanish: comida o bebida
  alternatives_spanish:
  - alimentos o bebida
  - alimento o bebida
  lexicon: escas / potus → comida / bebida
  rationale: «Comida o bebida» es natural en español y mantiene la oposición básica del latín sin cargar el sustantivo con un registro más técnico de lo que el contexto exige.
theological_decisions:
- issue: Apertura enfática con "And behold"
  english_pob_reading: And behold[a],
  chosen_spanish_reading: Y he aquí[a],
  alternative_spanish_readings:
  - Y mira[a],
  - Y he aquí que[a],
  rationale: La fórmula latina no está completa en el fragmento, pero el inglés POB preserva la apertura enfática. «Y he aquí» es la correspondencia idiomática más estable en español y conserva el tono exhortativo/retórico.
  doctrine_reference: None
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión aplicada en el audit trail que corrige la omisión de aliud: la traducción española conserva explícitamente «otro» en «cualquier otro recipiente». No se introdujeron cambios adicionales porque el latest_revision_pass indica que no hacían falta más ajustes.'
  spanish_consistency_notes:
  - Se mantuvo «nave» para uel nauem siguiendo el registro literario del pasaje.
  - Se evitó «vaso» por su polisemia moderna en español; «recipiente» expresa mejor el sentido general del latín.
  - La sintaxis reproduce la enumeración del original sin completar el fragmento más allá de lo atestiguado.
