lexical_decisions:
- source_word: et
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y entonces
  lexicon: conjunción coordinante
  rationale: Se conserva la parataxis del latino 'et' con una conjunción simple y natural en español, sin suavizar la secuencia narrativa.
- source_word: dixi ei
  english_pob_choice: I said to her
  chosen_spanish: le dije
  alternatives_spanish:
  - le dije a ella
  - yo le dije
  lexicon: verbo dicendi + pronombre átono
  rationale: '''Ei'' se expresa de forma idiomática con ''le'' en español; el género femenino del referente se mantiene en el contexto con ''ella'' más adelante, pero aquí no se fuerza en la forma verbal.'
- source_word: quid passa es
  english_pob_choice: What has happened to you?
  chosen_spanish: ¿Qué te ha pasado?
  alternatives_spanish:
  - ¿Qué te sucedió?
  - ¿Qué te ha ocurrido?
  lexicon: interrogativo + perfecto
  rationale: '''Passa es'' se traduce con un perfecto compuesto natural en español, manteniendo la idea de un suceso que la ha afectado.'
- source_word: dic mihi
  english_pob_choice: Tell me
  chosen_spanish: Dímelo
  alternatives_spanish:
  - Dime
  - Cuéntamelo
  lexicon: imperativo + clítico
  rationale: Se intensifica la petición con el objeto directo implícito del contexto; 'Dímelo' conserva la urgencia y la referencia al asunto ya preguntado.
- source_word: Et dixit ad me
  english_pob_choice: And she said to me
  chosen_spanish: Y ella me dijo
  alternatives_spanish:
  - Y me dijo
  - Y respondió a mí
  lexicon: verbo dicendi + pronombre explícito
  rationale: Se restaura la cláusula final presente en el latino, y se explicita 'ella' para reflejar el referente femenino señalado en el contexto inmediato.
translation_notes:
  revision_awareness: Se sigue la revisión que corrigió la omisión de la cláusula final 'Et dixit ad me:'; por eso la traducción conserva tanto la apertura narrativa ('Y') como el remate de habla ('Y ella me dijo:').
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, pero con sintaxis española natural.
  - La puntuación conserva la transición narrativa y el cierre de cita sin inventar contenido adicional.
  - No se traduce mecánicamente desde el inglés; la cláusula final se rinde directamente desde el latino base.
