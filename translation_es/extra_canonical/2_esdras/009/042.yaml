translation:
  language: es
  text: 'Y le dije[a]: «¿Qué te ha pasado? Dime». Y ella me dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y le dije: “¿Qué te ha pasado? Dime”»'
