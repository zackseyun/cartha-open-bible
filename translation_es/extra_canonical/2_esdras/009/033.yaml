translation:
  language: es
  text: Porque los que lo recibieron perecieron[a], pues no guardaron lo que había sido sembrado en ellos. Y he aquí, es costumbre que, cuando la tierra recibe semilla,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero los que lo recibieron perecieron».'
    reason: alternative_reading
lexical_decisions:
- source_word: acceperunt
  english_pob_choice: received it
  chosen_spanish: lo recibieron
  alternatives_spanish:
  - lo aceptaron
  - lo acogieron
  lexicon: Latin accipere
  rationale: El contexto inmediato habla de algo recibido y luego perdido; «recibieron» conserva el valor básico de accipere sin añadir una connotación de adhesión voluntaria que «aceptaron» podría sugerir.
- source_word: perierunt
  english_pob_choice: perished
  chosen_spanish: perecieron
  alternatives_spanish:
  - se perdieron
  - murieron
  lexicon: Latin perire
  rationale: «Perecieron» mantiene la fuerza de ruina o desaparición del verbo latino y corresponde bien al tono grave del pasaje.
- source_word: non custodientes
  english_pob_choice: because they did not keep
  chosen_spanish: pues no guardaron
  alternatives_spanish:
  - porque no conservaron
  - ya que no preservaron
  lexicon: Latin custodire
  rationale: «Guardar» en español comunica bien la idea de custodiar, conservar y observar fielmente lo recibido.
- source_word: quod in eis seminatum fuerat
  english_pob_choice: what had been sown in them
  chosen_spanish: lo que había sido sembrado en ellos
  alternatives_spanish:
  - lo que había sido sembrado dentro de ellos
  - lo que se había sembrado en ellos
  lexicon: Latin seminare
  rationale: La forma pasiva perfecta pide una traducción que mantenga la pasividad; «había sido sembrado» es natural y fiel, y «en ellos» conserva la localización interior del texto.
- source_word: Et ecce consuetudo est
  english_pob_choice: And behold, it is the custom
  chosen_spanish: Y he aquí, es costumbre
  alternatives_spanish:
  - Y he aquí, es la costumbre
  - Y mira, es costumbre
  lexicon: Latin ecce; consuetudo
  rationale: «Y he aquí» conserva el valor de ecce como llamada de atención; «es costumbre» transmite consuetudo sin sobrecargar la frase.
- source_word: cum acceperit terra semen
  english_pob_choice: when the earth has received seed
  chosen_spanish: cuando la tierra ha recibido semilla
  alternatives_spanish:
  - cuando la tierra recibe semilla
  - cuando la tierra ha recibido semilla/siembra
  lexicon: Latin terra; semen; accipere
  rationale: «Ha recibido semilla» sigue el tiempo perfecto latino y el paralelismo con la cláusula anterior; «semilla» es el equivalente directo de semen en este contexto agrícola.
theological_decisions:
- issue: Relación lógica introducida por Nam
  english_pob_reading: For those who received it perished
  chosen_spanish_reading: Porque los que lo recibieron perecieron
  alternative_spanish_readings:
  - Y los que lo recibieron perecieron
  - Pero los que lo recibieron perecieron
  rationale: La revisión auditada corrigió el valor de Nam como explicativo. En español, «Porque» preserva esa conexión causal/explicativa sin introducir contraste.
  doctrine_reference: No doctrinal issue; discourse-level logic only.
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que corrigió el inicio de la cláusula de «Pero» a una conexión explicativa («Porque»), y se completó el fragmento con la cláusula final sobre la tierra que recibe semilla.
  spanish_consistency_notes:
  - Se mantiene «Y he aquí» para ecce como fórmula de atención.
  - Se conserva «perecieron» para perierunt, sin suavizar la ruina implícita.
  - «Semilla» se usa de manera concreta y agrícola, sin espiritualizarla en exceso.
  - La nota al pie preserva la alternativa testimoniada por el historial inglés, pero la lectura principal sigue la revisión más reciente.
