base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/009/029.yaml
  text: O Lord[a], you showed yourself among us to our fathers in the wilderness, when they were coming out of Egypt and were entering the untrodden and fruitless desert,
  footnotes:
  - marker: a
    text: Or 'you showed yourself among us to our fathers'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:48:20Z'
    unchanged: false
    changes_summary: Removed the adverbial expansion 'manifestly,' which is not required by the Latin, and simplified 'showed yourself' for more natural and accurate English while preserving the verse's sense.
translation:
  language: es
  text: Oh Señor[a], te mostraste entre nosotros a nuestros padres en el desierto, cuando salían de Egipto y entraban en el desierto no hollado y sin fruto,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «te mostraste entre nosotros, a nuestros padres».'
    reason: alternative_reading
lexical_decisions:
- source_word: domine
  english_pob_choice: O Lord
  chosen_spanish: ¡Oh Señor!
  alternatives_spanish:
  - ¡Oh Yahvé!
  - ¡Oh Dios!
  lexicon: domine → Señor
  rationale: El vocativo latino dirige la oración a Dios con una forma reverencial; en español litúrgico y bíblico, «Señor» comunica esa apelación directa con naturalidad. Aunque el proyecto usa «Yahvé» para el Tetragrámaton, aquí el texto fuente es latino y no identifica explícitamente el nombre divino, por lo que «Señor» evita sobreespecificar el referente.
- source_word: ostendens ostensus es
  english_pob_choice: you showed yourself
  chosen_spanish: te mostraste
  alternatives_spanish:
  - te manifestaste
  - te mostraste claramente
  lexicon: ostendere / ostensus es → mostrar(se), manifestar(se)
  rationale: La construcción latina reproduce un calco semítico enfático; el inglés revisado descartó añadir «manifestly», así que en español se mantiene el sentido simple de aparición/revelación con «te mostraste», sin intensificar más allá de lo que la revisión final permite.
- source_word: patribus nostris
  english_pob_choice: to our fathers
  chosen_spanish: a nuestros padres
  alternatives_spanish:
  - a nuestros antepasados
  - a nuestros padres ancestrales
  lexicon: patres → padres / antepasados
  rationale: «Padres» conserva el lenguaje bíblico heredado para los antepasados de Israel y corresponde de modo directo al latinismo de la fuente; «antepasados» sería más explicativo pero menos tradicional y menos cercano al eco bíblico.
- source_word: in deserto
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el yermo
  - en la estepa
  lexicon: desertum → desierto / yermo
  rationale: La fuente latina usa dos veces desierto/desertum; en español «desierto» es la equivalencia directa y comunica el ámbito de prueba y peregrinación sin necesidad de sustituirlo por un término más literario.
- source_word: quando erant exientes de Aegypto
  english_pob_choice: when they were coming out of Egypt
  chosen_spanish: cuando salían de Egipto
  alternatives_spanish:
  - cuando estaban saliendo de Egipto
  - cuando iban saliendo de Egipto
  lexicon: exire → salir
  rationale: La forma progresiva del inglés refleja una acción en curso; en español, «salían» reproduce bien ese aspecto durativo sin recargar la frase. Mantiene el movimiento histórico de la salida de Egipto.
- source_word: quando ueniebant in deserto
  english_pob_choice: when they were entering the untrodden and fruitless desert
  chosen_spanish: y entraban en el desierto no hollado y sin fruto
  alternatives_spanish:
  - y entraban en el desierto no pisado y estéril
  - y se adentraban en el desierto no transitado y sin fruto
  lexicon: uenire in → entrar / adentrarse; non calcatur → no hollado; sine fructu → sin fruto
  rationale: «Entraban» conserva la continuidad verbal del inglés. «No hollado» reproduce con bastante fidelidad «untrodden» y el participio latino implícito por «quod non calcatur», manteniendo el registro bíblico. «Sin fruto» conserva la fuerza concreta de la imagen mejor que «estéril», aunque esta sea una alternativa válida.
theological_decisions:
- issue: Referencia del vocativo divino
  english_pob_reading: O Lord
  chosen_spanish_reading: ¡Oh Señor!
  alternative_spanish_readings:
  - ¡Oh Yahvé!
  - ¡Oh Dios!
  rationale: La evidencia latina ofrece un vocativo genérico de Señor sin el Tetragrámaton explícito. Traducirlo como «Señor» respeta la forma del texto base y evita introducir una identificación nominal no presente en esta línea, aunque el contexto bíblico siga siendo dirigido al Dios de Israel.
  doctrine_reference: Uso reverencial del vocativo divino en oración bíblica; distinción entre nombre divino explícito y apelación titulada.
- issue: Énfasis semítico de la construcción duplicada
  english_pob_reading: you showed yourself
  chosen_spanish_reading: te mostraste
  alternative_spanish_readings:
  - te manifestaste
  rationale: La revisión inglesa eliminó una expansión adverbial («manifestly») por no ser requerida. En español se evita recrear una intensificación no atestiguada de manera obligatoria, pero se conserva el valor solemne de la autodonación divina mediante una forma verbal directa.
  doctrine_reference: Respeto al matiz retórico sin sobreinterpretarlo; principio de no añadir contenido no exigido por el texto.
translation_notes:
  revision_awareness: La decisión sigue la última revisión inglesa, que retiró «manifestly» por no estar exigido por el latín, pero sigue reconociendo la construcción semítica enfática de ostendens ostensus es. La versión española evita una expansión interpretativa y conserva un tono solemne y directo acorde con el texto latino limpio.
  spanish_consistency_notes:
  - Se mantuvo «Señor» en vez de «Yahvé» porque el texto fuente no contiene el nombre divino explícito.
  - Se conservó «desierto» en ambas ocurrencias para reflejar la repetición latina de desertum.
  - «No hollado» reproduce la imagen de terreno no pisado sin sustituirla por una paráfrasis explicativa.
  - La nota alternativa se ancla en el vocativo inicial para señalar la posible reordenación sintáctica en español sin alterar el sentido.
