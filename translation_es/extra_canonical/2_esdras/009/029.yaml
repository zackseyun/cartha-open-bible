    issue: Falta 'sin fruto' en el texto principal.
    rationale: La traducción inglesa auditada dice 'untrodden and fruitless desert', y las decisiones léxicas españolas también justifican 'sin fruto'. Omitirlo pierde contenido fuente.
  - severity: low
    issue: Uso de signos de exclamación en la invocación.
    rationale: 'El original latino y la traducción inglesa no requieren exclamación; en español bíblico aquí suena más fiel y sobrio con coma vocativa: ''Oh Señor''.'
  - severity: low
    issue: Puntuación final incorrecta para un versículo incompleto.
    rationale: La fuente termina con 'et', por lo que debe cerrarse con coma, no con signo de exclamación final.
  revised_spanish_text: Oh Señor[a], te mostraste entre nosotros a nuestros padres en el desierto, cuando salían de Egipto y entraban en el desierto no hollado y sin fruto,
