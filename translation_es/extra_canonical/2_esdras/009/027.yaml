translation:
  language: es
  text: Y después de siete días yacía sobre la hierba, y mi corazón de nuevo como antes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: septem et ego discumbebam
  english_pob_choice: And after seven days I was lying
  chosen_spanish: Y después de siete días yo estaba tendido
  alternatives_spanish:
  - Y después de siete días yacía
  - Y después de siete días estaba recostado
  lexicon: discumbebam = imperfecto de discumbere, ‘estar tendido/recostado’
  rationale: El latín expresa una acción en curso en imperfecto; en español, ‘estaba tendido’ conserva la duratividad sin añadir matices ajenos. ‘Yacía’ también sería posible, pero ‘estaba tendido’ suena más natural y claro en español moderno.
- source_word: supra fenum
  english_pob_choice: on the grass
  chosen_spanish: sobre la hierba
  alternatives_spanish:
  - sobre el pasto
  - sobre el césped
  lexicon: fenum aquí se entiende como hierba/pasto en sentido de superficie vegetal
  rationale: La imagen es locativa y simple. ‘Hierba’ preserva el registro sobrio y amplio del latín sin imponer un campo demasiado específico como ‘césped’.
- source_word: cor meum iterum
  english_pob_choice: and my heart again as before
  chosen_spanish: y mi corazón de nuevo como antes
  alternatives_spanish:
  - y mi corazón otra vez como antes
  - y mi corazón nuevamente como antes
  lexicon: cor = ‘corazón’; iterum = ‘de nuevo/otra vez’
  rationale: ‘Corazón’ conserva la referencia directa al centro interior de la persona. ‘De nuevo’ es una opción natural y fiel para iterum; mantiene la repetición indicada por el latín sin añadir el adjetivo ‘turbado’, que no está en el texto fuente proporcionado.
theological_decisions:
- issue: Frase final incompleta en el latín fuente
  english_pob_reading: And after seven days I was lying on the grass, and my heart again as before
  chosen_spanish_reading: Y después de siete días yo estaba tendido sobre la hierba, y mi corazón de nuevo como antes.
  alternative_spanish_readings:
  - Y después de siete días yo estaba tendido sobre la hierba, y mi corazón otra vez como antes.
  - Y después de siete días yo estaba tendido sobre la hierba, y mi corazón nuevamente como antes.
  rationale: El testimonio latino provisto termina de forma abrupta en ‘cor meum iterum’. La versión española conserva esa incompletud sin suplir contenido no atestiguado, siguiendo la revisión inglesa que eliminó añadidos no sustentados.
  doctrine_reference: Fidelidad textual y prudencia ante un testimonio incompleto
translation_notes:
  revision_awareness: 'La revisión inglesa posterior eliminó dos adiciones no sustentadas por el latín proporcionado: ‘And it happened’ y ‘was troubled’. La traducción española sigue esa decisión y evita introducir cualquier desarrollo interpretativo que el texto fuente no contiene.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se usa español neutral y sobrio, evitando fórmulas eclesiásticas añadidas al texto fuente.
  - La construcción ‘mi corazón de nuevo como antes’ refleja la truncación del latín y no intenta completarla con una cláusula inferida.
