review_pass:
  verdict: revise
  source_alignment_summary: El latín 'et nutrivi eum cum labore multo' significa 'y lo crié/alimenté/hice crecer con mucho esfuerzo'. La draft española transmite bien la idea principal y coincide con la revisión inglesa 'And I raised him with much labor'. Sin embargo, la nota al pie introduce una alternativa menos adecuada ('lo levanté') que se aleja del sentido de nutrivi en este contexto.
  spanish_quality_summary: '''Y lo crié con mucho trabajo'' es natural, claro y digno en español. La frase funciona bien sin nota; si se mantiene una nota, debe limitarse a alternativas semánticamente cercanas. ''Con mucho trabajo'' es idiomático y fiel a ''cum labore multo''.'
  glossary_alignment: No hay términos del glosario teológico principal en juego. La decisión léxica 'crié' para nutrivi está bien alineada con la evidencia fuente y con la auditoría inglesa. Debe evitarse 'levanté', que en español sugiere alzar físicamente o levantar del suelo, no criar.
  issues:
  - severity: medium
    issue: La nota al pie ofrece 'lo levanté' como alternativa para nutrivi.
    rationale: Aunque el inglés previo usó 'brought him up' y luego 'raised him', el latín nutrivi no apoya naturalmente 'levantar' en español. Esa alternativa puede confundir al lector y no preserva bien el sentido de criar/alimentar/hacer crecer.
  revised_spanish_text: Y lo crié con mucho trabajo.
  revision_rationale: 'Se aprueba el texto base con una pequeña reparación: eliminar la nota lexical, porque la redacción principal ya es fiel y natural, y la alternativa ''lo levanté'' es engañosa para nutrivi. Sin nota, el versículo queda más claro y mejor alineado con el latín y con la intención de la auditoría inglesa.'
