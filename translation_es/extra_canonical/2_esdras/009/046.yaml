translation:
  language: es
  text: Y lo crié[a] con mucho trabajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “lo sustenté” o “lo levanté”. El latín nutrivi puede abarcar criar, alimentar y hacer crecer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: et nutrivi eum
  english_pob_choice: And I raised him
  chosen_spanish: Y lo crié
  alternatives_spanish:
  - Y lo levanté
  - Y lo sustenté
  - Y lo crié y lo hice crecer
  lexicon: nutrire
  rationale: El latín nutrivi admite la idea de criar, alimentar y hacer crecer. La revisión inglesa prefirió 'raised him' como equivalente más directo; en español, 'crié' comunica de manera natural la acción de criar y hacer crecer a una persona sin forzar un calco de 'raised' que podría sonar ambiguo.
- source_word: cum labore multo
  english_pob_choice: with much labor
  chosen_spanish: con mucho trabajo
  alternatives_spanish:
  - con mucho esfuerzo
  - con gran fatiga
  - con mucha labor
  lexicon: labor
  rationale: '''Labore'' puede expresar trabajo, esfuerzo o fatiga. ''Con mucho trabajo'' mantiene la fuerza de dificultad y esfuerzo del original, es idiomático en español y conserva la correspondencia con el inglés auditado ''with much labor''.'
theological_decisions:
- issue: Ninguna tensión doctrinal específica; la frase describe una acción de crianza/sustento en un contexto narrativo.
  english_pob_reading: And I raised him with much labor.
  chosen_spanish_reading: Y lo crié con mucho trabajo.
  alternative_spanish_readings:
  - Y lo levanté con mucho trabajo.
  - Y lo sustenté con mucho trabajo.
  rationale: 'No hay una carga doctrinal especial en este versículo. La decisión principal es léxica: expresar el latín de manera fiel y natural sin introducir un matiz más técnico o teológico del que el texto requiere.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El auditorio inglés revisó 'brought him up' a 'raised him' para acercarse mejor a nutri-. La versión española sigue esa revisión en sentido semántico, pero opta por 'crié' porque en español transmite mejor la noción de criar/educar/sustentar implícita en nutrivi sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, adecuado para la serie POB.
  - Se usó 'lo' como objeto directo masculino singular, coherente con 'eum'.
  - No se introdujeron términos eclesiásticos tradicionales que alteren el sentido del latín.
