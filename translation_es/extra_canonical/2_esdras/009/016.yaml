lexical_decisions:
- source_word: sicut
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - igual que
  lexicon: comparative conjunction
  rationale: ‘Tal como’ expresa una comparación directa y fluida en español sin endurecer el paralelismo del latín.
- source_word: multiplicat
  english_pob_choice: are multiplied
  chosen_spanish: se multiplican
  alternatives_spanish:
  - multiplican
  - se aumentan
  lexicon: multiplicare
  rationale: El latín usa un verbo de multiplicación; ‘se multiplican’ conserva esa fuerza y evita traducir solo como ‘son más’.
- source_word: fluctus
  english_pob_choice: waves
  chosen_spanish: las olas
  alternatives_spanish:
  - las ondas
  - las aguas
  lexicon: fluctus
  rationale: ‘Olas’ es el equivalente natural en español para el sentido literal de la imagen, manteniendo el contraste visual con ‘una gota’.
- source_word: guttam
  english_pob_choice: a drop
  chosen_spanish: una gota
  alternatives_spanish:
  - una gota de agua
  - una gota sola
  lexicon: gutta
  rationale: ‘Una gota’ reproduce la imagen mínima del original con naturalidad y precisión.
- source_word: et respondit ad me et dixit
  english_pob_choice: And he answered me and said,
  chosen_spanish: 'Y me respondió y me dijo:'
  alternatives_spanish:
  - 'Y me respondió diciendo:'
  - 'Y él me respondió y dijo:'
  lexicon: respondeo / dico
  rationale: Se conserva la secuencia narrativa y el diálogo explícito del latín, que el informe de revisión indicó que faltaba en un borrador previo.
theological_decisions:
- issue: Boundary of the dialogue tag within the verse
  english_pob_reading: And he answered me and said,
  chosen_spanish_reading: 'Y me respondió y me dijo:'
  alternative_spanish_readings:
  - 'Y me respondió diciendo:'
  - 'Y me contestó y dijo:'
  rationale: Se mantiene el marcador de discurso dentro de este versículo porque el latín lo incluye explícitamente al final de la línea, y el auditor corrigió su omisión como error de delimitación versicular.
  doctrine_reference: n/a
translation_notes:
  revision_awareness: El texto español sigue la corrección más reciente del audit trail al conservar ‘se multiplican’ para reflejar multiplicat; además, restituye el cierre dialogal ‘Y me respondió y me dijo:’ dentro del versículo 9:16, evitando desplazarlo al versículo siguiente.
  spanish_consistency_notes:
  - Se usa registro bíblico claro y moderno, sin sustituir la imagen concreta de ‘gota’ por una abstracción.
  - Se conserva la sintaxis de diálogo para respetar el límite versicular indicado por la revisión.
  - No se introducen términos doctrinales ajenos al pasaje.
