id: 2ES.9.35
reference: 2 Esdras 9:35
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'quae suscepta sunt, Exterminentur haec, susceptoria uero manent: apud nos enim non sic factum est. Nos quidem qui legem accepimus peccantes peribimus et cor nostrum quod'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/009/035.yaml
  text: and when what was received is destroyed[a], these are destroyed, but the receptacles remain. For with us it has not happened so.
  footnotes:
  - marker: a
    text: Or 'then, if what was sown or sent or received is destroyed, these are destroyed, but the things that received them remain. Yet with us it has not happened so.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:49:24Z'
    unchanged: false
    changes_summary: Simplified the opening to reflect suscepta as 'what was received' rather than the unsupported 'sown or sent or received,' and rendered susceptoria more accurately as 'receptacles.'
translation:
  language: es
  text: y cuando lo recibido es destruido[a], estos son destruidos, pero los receptáculos permanecen. Porque entre nosotros no ha sucedido así.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse, según la nota heredada del POB inglés, como: «cuando lo sembrado, enviado o recibido es destruido, estos son destruidos, pero las cosas que los recibieron permanecen». Aquí se sigue la revisión posterior, más ajustada al latín.'
    reason: previous_rendering
lexical_decisions:
- source_word: quae suscepta sunt
  english_pob_choice: what was received
  chosen_spanish: lo que fue recibido
  alternatives_spanish:
  - lo recibido
  - aquello que fue recibido
  lexicon: suscipio / suscepta
  rationale: El participio pasivo latino suscepta apunta de manera directa a 'lo que fue recibido', como en el ajuste revisado del POB inglés. 'Lo recibido' es posible, pero 'lo que fue recibido' conserva mejor el carácter procesual y evita introducir 'sown' o 'sent', que no están sustentados por el latín.
- source_word: Exterminentur haec
  english_pob_choice: these are destroyed
  chosen_spanish: estas cosas se destruyen
  alternatives_spanish:
  - estas son destruidas
  - se destruyen estas cosas
  lexicon: exterminentur
  rationale: La voz pasiva latina admite una traducción natural y sobria en español con pasiva refleja. 'Estas cosas se destruyen' mantiene el sentido sin forzar una construcción más pesada.
- source_word: susceptoria
  english_pob_choice: receptacles
  chosen_spanish: los receptáculos
  alternatives_spanish:
  - los que recibieron
  - los recipientes
  - las cosas que recibieron
  lexicon: susceptoria
  rationale: '''Receptáculos'' sigue de cerca el valor nominal latino de susceptoria y preserva el contraste conceptual con ''lo que fue recibido''. Aunque suena algo técnico, es la opción más auditable y fiel al texto.'
- source_word: apud nos enim non sic factum est
  english_pob_choice: For with us it has not happened so
  chosen_spanish: Porque entre nosotros no ha sucedido así
  alternatives_spanish:
  - Pues entre nosotros no ha sido así
  - Porque con nosotros no ha ocurrido así
  lexicon: apud nos ... non sic factum est
  rationale: '''Entre nosotros'' comunica el valor relacional de apud nos de manera idiomática en español. ''Porque'' refleja el valor explicativo de enim, tal como indicó la revisión, y evita la falsa oposición de ''Yet''.'
theological_decisions:
- issue: Relación entre destrucción de lo recibido y permanencia de los receptáculos
  english_pob_reading: when what was received is destroyed, these are destroyed, but the receptacles remain
  chosen_spanish_reading: cuando lo recibido se destruye, las cosas receptoras permanecen
  alternative_spanish_readings:
  - cuando lo recibido se destruye, aquello que lo recibió permanece
  - cuando lo recibido se destruye, permanecen los receptáculos
  rationale: El latín conserva una tensión entre lo recibido y los receptáculos que lo contienen o reciben. La traducción mantiene esa distinción sin resolverla interpretativamente, respetando la ambigüedad documentada por el POB inglés.
  doctrine_reference: No doctrinal resolution imposed; preserves lexical tension in the Latin argument.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del expediente inglés: se eliminó la expansión no sustentada ''sown or sent or received'' y se prefirió ''receptacles'' para susceptoria. También se respetó el cambio de ''Yet'' a ''For'', porque enim es explicativo y encadena con el razonamiento del pasaje.'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico en español, sin calco excesivo del inglés.
  - '''Receptáculos'' se usó de forma consistente para susceptoria, preservando la simetría con ''lo que fue recibido''.'
  - La puntuación separa la cláusula temporal principal del resultado, reflejando el flujo argumental del latín.
  - No se introdujo terminología eclesiástica ajena al texto; se privilegió la correspondencia semántica con el latín.
