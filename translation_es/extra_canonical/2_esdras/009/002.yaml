- from: entonces entenderás que este es el tiempo en que el Altísimo comenzará a visitar el mundo[a] que fue hecho por él. Y cuando se vea un estremecimiento de los lugares en el mundo,
  to: entonces entenderás que este es el tiempo en que el Altísimo comenzará a intervenir en el mundo[a] que fue hecho por él. Y cuando se vea un estremecimiento de los lugares en el mundo,
  rationale: Se revisa uisitare a «intervenir en el mundo» para comunicar en español el sentido apocalíptico de acción divina decisiva, evitando la ambigüedad de «visitar». Se preserva la opción más literal en nota, en continuidad con el expediente inglés. El resto del versículo se mantiene por fidelidad al latín y buena legibilidad.
