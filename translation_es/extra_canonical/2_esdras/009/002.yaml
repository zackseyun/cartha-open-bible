review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del latín: tempus / incipiet / altissimus / saeculum / qui ab eo factus est / motio locorum están representados de manera básicamente fiel. Sin embargo, en español bíblico natural, «visitar el mundo» suena demasiado neutral y social; dado que el propio expediente inglés documenta el matiz apocalíptico de uisitare como intervención divina, conviene llevar ese sentido al texto principal en español, no solo a nota. La cláusula final queda correctamente conservada.'
  spanish_quality_summary: El español es claro y digno, pero «visitar el mundo» resulta poco idiomático para el sentido escatológico y puede inducir una lectura equivocada. Además, «un estremecimiento de los lugares» es fiel pero algo rígido; aun así, se puede conservar por cercanía al original. El resto del versículo fluye bien.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «el Altísimo» y «mundo» están bien. La principal decisión léxica requiere ajuste contextual: para uisitare, el español principal debería reflejar mejor la intervención/juicio divino documentados en el audit trail; «intervenir en el mundo» funciona mejor en español que «visitar el mundo», mientras una nota puede preservar la alternativa más literal.'
  issues:
  - severity: medium
    issue: «comenzará a visitar el mundo» suena demasiado literal y débil en español
    rationale: Aunque el latín usa uisitare, en contexto apocalíptico el sentido es de intervención divina decisiva. El propio historial inglés reconoce ese peso semántico. En español moderno, «visitar» puede sonar como una visita social y desfigurar el tono del pasaje.
  - severity: low
    issue: La nota actual invierte la prioridad semántica
    rationale: Si el texto principal mantiene «visitar», la nota con «intervenir» corrige implícitamente el sentido real. Es preferible poner la opción contextual fuerte en el texto y dejar la alternativa más literal en la nota.
  revised_spanish_text: entonces entenderás que este es el tiempo en que el Altísimo comenzará a intervenir en el mundo[a] que fue hecho por él. Y cuando se vea un estremecimiento de los lugares en el mundo,
  revised_footnotes:
