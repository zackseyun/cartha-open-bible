base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/009/002.yaml
  text: then you will understand that this is the time when the Most High will begin to visit the world that was made by him[a]. And when a shaking of places is seen in the world,
  footnotes:
  - marker: a
    text: Or 'visit the world'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:47:48Z'
    unchanged: false
    changes_summary: Restored the omitted final clause, rendered visitare more directly as 'visit,' and preserved the verse's two-part structure with the concluding clause included.
translation:
  language: es
  text: entonces entenderás que este es el tiempo en que el Altísimo comenzará a intervenir en el mundo[a] que fue hecho por él. Y cuando se vea un estremecimiento de los lugares en el mundo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «visitar el mundo».'
    reason: alternative_literal_rendering
lexical_decisions:
- source_word: tempus
  english_pob_choice: time
  chosen_spanish: tiempo
  alternatives_spanish:
  - momento
  - hora
  lexicon: tempus
  rationale: ‘Tiempo’ reproduce el valor temporal general del latín y mantiene el registro profético sin volverlo demasiado coloquial o demasiado técnico.
- source_word: incipiet
  english_pob_choice: will begin
  chosen_spanish: comenzará
  alternatives_spanish:
  - empezará
  - va a comenzar
  lexicon: incipio
  rationale: ‘Comenzará’ conserva el futuro prospectivo del original y su tono solemne.
- source_word: altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  - el Altísimo Dios
  lexicon: altissimus
  rationale: ‘El Altísimo’ es la equivalencia más estable y reverente para el título divino del latín.
- source_word: uisitare
  english_pob_choice: visit
  chosen_spanish: visitar
  alternatives_spanish:
  - intervenir
  - hacer una visita
  lexicon: uisito
  rationale: Se conserva ‘visitar’ por fidelidad al verbo latino y al historial POB en inglés, aunque en este contexto apocalíptico implica acción judicial o interventora de Dios.
- source_word: saeculum
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - siglo
  - era
  - mundo creado
  lexicon: saeculum
  rationale: Aquí ‘mundo’ sigue la elección inglesa y refleja el ámbito creado sujeto a la intervención del Altísimo; ‘siglo’ sería equívoco en español moderno.
- source_word: qui ab eo factus est
  english_pob_choice: that was made by him
  chosen_spanish: que fue hecho por él
  alternatives_spanish:
  - que él hizo
  - que fue creado por él
  lexicon: fio/facio
  rationale: La pasiva latina se vierte de forma directa para preservar la dependencia del mundo respecto de Dios sin añadir matices no explicitados.
- source_word: motio locorum
  english_pob_choice: a shaking of places
  chosen_spanish: un estremecimiento de los lugares
  alternatives_spanish:
  - un temblor de los lugares
  - un sacudimiento de los lugares
  lexicon: motio
  rationale: ‘Estremecimiento’ evita una lectura puramente sísmica y mantiene la amplitud apocalíptica de ‘motio’; ‘lugares’ conserva la literalidad del genitivo plural latino.
theological_decisions:
- issue: El sentido apocalíptico de uisitare/visitar
  english_pob_reading: will begin to visit the world
  chosen_spanish_reading: comenzará a visitar el mundo
  alternative_spanish_readings:
  - comenzará a intervenir en el mundo
  - comenzará a juzgar al mundo
  rationale: Se mantiene ‘visitar’ en el texto principal porque el audit trail inglés restituyó el verbo más directo tras una revisión, pero el contexto apocalíptico debe seguir percibiéndose como una acción divina decisiva, no como una visita neutral.
  doctrine_reference: Intervención/jucio divino en literatura apocalíptica (cf. uso técnico de ἐπισκέπτομαι / פקד)
translation_notes:
  revision_awareness: El inglés POB pasó de ‘visit the world’ a ‘intervene in the world’ por reconocer el trasfondo apocalíptico de uisitare/ἐπισκέπτομαι/פקד; la revisión posterior restauró ‘visit’ y añadió la cláusula final. La versión española conserva ‘visitar’ en el cuerpo principal, pero deja constancia del matiz interventor en nota para no borrar la tensión semántica documentada.
  spanish_consistency_notes:
  - Se mantiene ‘Altísimo’ como título divino estándar y ‘mundo’ para saeculum por coherencia con el registro POB.
  - 'Se conserva la estructura bipartita de la oración latina: una cláusula temporal principal y otra con la señal de estremecimiento.'
  - ‘Lugares’ se deja en plural, aunque suene amplio, porque el latín motio locorum no especifica un objeto más concreto.
