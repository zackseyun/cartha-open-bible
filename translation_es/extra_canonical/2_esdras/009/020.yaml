lexical_decisions:
- source_word: Et uidi
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y consideré
  - Y miré
  lexicon: video
  rationale: El latín conservado dice simplemente «Et uidi»; la lectura más directa es «Y vi». No se introduce «consideré» porque el fragmento revisionado del contexto inglés fue revertido y no pertenece a este corte textual.
- source_word: peperci eis uix
  english_pob_choice: and I spared them with difficulty
  chosen_spanish: apenas los perdoné
  alternatives_spanish:
  - los perdoné con dificultad
  - los perdoné apenas
  lexicon: parco
  rationale: «peperci» expresa el acto de perdonar/ahorrar/indultar; en español «perdoné» comunica bien la misericordia implícita. «vix» se vierte naturalmente como «apenas», que conserva la idea de dificultad sin forzar una perífrasis menos fluida.
theological_decisions:
- issue: Objeto implícito de la misericordia
  english_pob_reading: And I saw, and I spared them with difficulty.
  chosen_spanish_reading: Y vi, y apenas los perdoné.
  alternative_spanish_readings:
  - Y vi, y apenas los preservé.
  - Y vi, y apenas les tuve misericordia.
  rationale: El latín finaliza con «eis», que pide un objeto personal plural. «Los» mantiene esa referencia explícita sin añadir contenido doctrinal ajeno al fragmento. «Perdoné» preserva el tenor compasivo del verbo latino y evita elevar el pasaje a una formulación más interpretativa.
  doctrine_reference: Compasión y juicio divino en narrativa apocalíptica; no se añade formulación doctrinal extra
translation_notes:
  revision_awareness: 'El contexto auditado mostró una oscilación previa entre dos segmentos: una versión ampliada con «mi mundo»/«mi tierra habitada» fue luego corregida por revisión para ajustarse al latín conservado aquí, que solo contiene «Et uidi et peperci eis uix». La presente línea sigue esa revisión y omite material no atestiguado en el fragmento proporcionado.'
  spanish_consistency_notes:
  - Se mantiene un español sobrio y bíblico, evitando ampliar el sujeto o añadir sustantivos no presentes en el latín.
  - «apenas» se usa como equivalente idiomático de «vix» y se ancla con nota para transparencia textual.
  - No se emplea «SEÑOR» ni terminología cristológica porque este verso no contiene esos lemas.
