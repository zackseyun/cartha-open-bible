translation:
  language: es
  text: Pues he aquí, siembro mi ley en ustedes, y dará fruto en ustedes, y por ella serán glorificados para siempre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por él», si se toma el antecedente implícito como el acto o el medio de siembra; el latín inmediato favorece «por ella» por «ley» (lex).'
    reason: alternative_reading
lexical_decisions:
- source_word: Ecce
  english_pob_choice: For behold
  chosen_spanish: Pues he aquí
  alternatives_spanish:
  - He aquí
  - Pues miren
  lexicon: Latin ecce
  rationale: «Ecce» introduce una atención solemne; «Pues he aquí» conserva el valor de llamada enfática sin sonar rígido en español.
- source_word: semino in uobis legem meam
  english_pob_choice: I sow my law in you
  chosen_spanish: siembro mi ley en ustedes
  alternatives_spanish:
  - siembro mi ley en vosotros
  - planto mi ley en ustedes
  lexicon: Latin semino + lexem lex
  rationale: «Semino» pide una imagen agrícola de siembra, no una mera comunicación abstracta. «Ley» mantiene el término jurídico-covenantal del latín y del POB inglés; «ustedes» ofrece registro neutral latinoamericano.
- source_word: et faciet in uobis fructum
  english_pob_choice: and it will bear fruit in you
  chosen_spanish: y dará fruto en ustedes
  alternatives_spanish:
  - y producirá fruto en ustedes
  - y llevará fruto en ustedes
  lexicon: Latin fructus
  rationale: El latín usa una imagen de fecundidad/resultado. En español, «dar fruto» es la forma más natural y fiel a la metáfora agrícola.
- source_word: et glorificabimini in eo per saeculum
  english_pob_choice: and by it you will be glorified forever
  chosen_spanish: y por ella serán glorificados para siempre
  alternatives_spanish:
  - y en ella serán glorificados por los siglos
  - y por ella recibirán gloria para siempre
  lexicon: Latin glorificabimini + in eo
  rationale: «Glorificabimini» se vierte pasivamente como en el inglés POB. «Por ella» conserva la referencia instrumental de «in eo» y el antecedente femenino de «ley».
theological_decisions:
- issue: Ley sembrada interiormente como don divino
  english_pob_reading: I sow my law in you
  chosen_spanish_reading: siembro mi ley en ustedes
  alternative_spanish_readings:
  - pongo mi ley en ustedes
  - siembro mi instrucción en ustedes
  rationale: La frase mantiene la tensión de una ley dada por Dios que actúa internamente con efecto de vida, sin reducirla a mero consejo moral. La imagen de siembra refuerza la transformación prometida.
  doctrine_reference: Renovación del pacto / internalización de la ley
- issue: Glorificación futura mediante la ley
  english_pob_reading: and by it you will be glorified forever
  chosen_spanish_reading: y por ella serán glorificados para siempre
  alternative_spanish_readings:
  - y en ella serán glorificados para siempre
  - y mediante ella serán honrados para siempre
  rationale: Se conserva la causalidad instrumental de la ley sin suavizarla a simple honor humano. «Glorificados» refleja el pasivo del latín y mantiene la elevación escatológica.
  doctrine_reference: Glorificación escatológica
translation_notes:
  revision_awareness: 'El latín limpio y el POB inglés concuerdan de forma estrecha: la cláusula principal es estable, sin notas textuales necesarias. Se mantuvo la metáfora agrícola y el pasivo de glorificación, respetando el antecedente femenino de lex en español.'
  spanish_consistency_notes:
  - Se usa «ley» para lex conforme al contexto jurídico-pactual, no «instrucción», porque el texto enfatiza el contenido normativo sembrado por Dios.
  - Se prefiere «ustedes» por registro neutral latinoamericano y coherencia con un texto público contemporáneo.
  - La puntuación en una sola oración conserva el flujo del latín y del POB inglés sin dividir el enunciado.
