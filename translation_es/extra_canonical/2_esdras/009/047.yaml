translation:
  language: es
  text: Y sucedió que, cuando ya había crecido y yo había venido a buscarle esposa, celebré un día de banquete.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et factum est
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: Lat. factum est
  rationale: La fórmula narrativa latina se vierte con una expresión idiomática natural en español; «sucedió» mantiene el tono de encadenamiento histórico sin sonar arcaico.
- source_word: cum crevisset
  english_pob_choice: when he had grown up
  chosen_spanish: cuando ya había crecido
  alternatives_spanish:
  - cuando hubo crecido
  - cuando fue crecido
  lexicon: Lat. crevisset
  rationale: El pluscuamperfecto español expresa con claridad la anterioridad respecto a la acción principal y conserva el sentido de madurez alcanzada.
- source_word: venissem
  english_pob_choice: I had come
  chosen_spanish: yo había venido
  alternatives_spanish:
  - había ido
  - había llegado
  lexicon: Lat. venissem
  rationale: «Venir» preserva el movimiento de llegada del hablante tal como lo muestra el latín; se explicita «yo» para evitar ambigüedad en español.
- source_word: accipere illi uxorem
  english_pob_choice: to take a wife for him
  chosen_spanish: a tomarle esposa
  alternatives_spanish:
  - a buscarle esposa
  - a conseguirle esposa
  lexicon: Lat. accipere illi uxorem
  rationale: 'La construcción refleja literalmente el objeto de la acción: traer/tomar esposa para él. «Tomarle esposa» mantiene la relación beneficiaria del dativo y la concisión del original, aunque suena más formal que una paráfrasis como «buscarle esposa».'
- source_word: feci diem epuli
  english_pob_choice: I made a day of feasting
  chosen_spanish: preparé un día de banquete
  alternatives_spanish:
  - hice un día de banquete
  - celebré un día de banquete
  lexicon: Lat. feci diem epuli
  rationale: «Preparé» comunica con naturalidad la acción de disponer una celebración; «banquete» conserva el sustantivo festivo del latín epulum sin reducirlo a mera comida.
theological_decisions:
- issue: Ninguna tensión doctrinal especial; el versículo narra una preparación familiar y festiva.
  english_pob_reading: And it happened, when he had grown up and I had come to take a wife for him, that I made a day of feasting.
  chosen_spanish_reading: Y sucedió que, cuando ya había crecido y yo había venido a tomarle esposa, preparé un día de banquete.
  alternative_spanish_readings:
  - Y aconteció que, cuando ya había crecido y yo había venido a tomarle esposa, hice un día de banquete.
  - Y sucedió que, cuando ya había crecido y yo había venido a buscarle esposa, celebré un día de banquete.
  rationale: No hay un tema doctrinal controvertido en este enunciado; la decisión principal es de fidelidad narrativa y de registro. Se conserva el sentido de arreglo matrimonial y fiesta, sin introducir interpretaciones adicionales.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La traducción sigue de cerca la lectura latina limpia proporcionada y es plenamente coherente con la revisión inglesa más reciente, que solo eliminó una comilla sobrante sin cambiar el sentido.
  spanish_consistency_notes:
  - Se evita el calco rígido «hice un día de banquete» en favor de una formulación española natural.
  - «Esposa» se mantiene como complemento de «tomar» para reflejar la relación del dativo latino sin expandir el texto.
  - No se añaden notas textuales porque el paquete de fuente y la auditoría inglesa no presentan variantes relevantes para este versículo.
