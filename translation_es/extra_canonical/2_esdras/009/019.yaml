base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/009/019.yaml
  text: But those created in this prepared world[9:19], with an unfailing table and an unsearchable law, have been corrupted in their ways. And I considered my age, and behold,
  footnotes:
  - marker: '9:19'
    text: The phrase 'an unfailing table and an unsearchable law' is difficult in Latin. The sense appears to be that full provision and divine instruction had already been set before humanity, yet they were corrupted in their ways.
    reason: textual_variant
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:48:11Z'
    unchanged: false
    changes_summary: Removed 'now' since it is not in the Latin, restored the final clause 'And I considered my age, and behold,' from the source, and kept the rest with minor punctuation adjustment.
translation:
  language: es
  text: Pero los creados en este mundo preparado, con una mesa que no falla[a] y una ley inescrutable, han sido corrompidos en sus caminos. Y consideré mi época, y he aquí,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión latina 'mensa indeficienti et lege inuestigabili' es difícil; el sentido parece ser que una provisión plena y una instrucción divina ya habían sido puestas delante de la humanidad, y aun así ellos fueron corrompidos en sus caminos.
    reason: textual_variant
lexical_decisions:
- source_word: hoc parato
  english_pob_choice: this prepared world
  chosen_spanish: este mundo preparado
  alternatives_spanish:
  - este mundo dispuesto
  - este mundo ordenado
  lexicon: hoc = este; parato = preparado/dispuesto/ordenado
  rationale: Conservo el sentido de un mundo ya preparado o dispuesto por Dios, sin cargar el verso con una paráfrasis más amplia que la evidencia latina.
- source_word: mensa indeficienti
  english_pob_choice: an unfailing table
  chosen_spanish: una mesa que no falla
  alternatives_spanish:
  - una mesa inagotable
  - una mesa que no se agota
  lexicon: mensa = mesa; indeficiens/indeficienti = que no falla, que no se agota
  rationale: La imagen de mensa es literalmente 'mesa'; en español 'mesa que no falla' mantiene la idea de provisión continua sin introducir un sustantivo abstracto que el latín no exige.
- source_word: lege inuestigabili
  english_pob_choice: an unsearchable law
  chosen_spanish: una ley inescrutable
  alternatives_spanish:
  - una ley insondable
  - una ley inescrutableda
  lexicon: lex = ley; inuestigabilis = no investigable, inescrutable, insondable
  rationale: '''Inescrutable'' expresa bien la idea de una ley imposible de sondear o agotar, conservando la fuerza semántica del latín y el tono teológico del original.'
- source_word: corrupti sunt moribus eorum
  english_pob_choice: have been corrupted in their ways
  chosen_spanish: han sido corrompidos en sus caminos
  alternatives_spanish:
  - se han corrompido en sus caminos
  - han sido corrompidos en su conducta
  lexicon: corrumpere = corromper; mores = costumbres, conducta, caminos
  rationale: Mantengo la pasiva y la expresión 'en sus caminos' para reflejar el latín y la formulación heredada por la POB inglesa.
- source_word: saeculum meum
  english_pob_choice: my age
  chosen_spanish: mi siglo
  alternatives_spanish:
  - mi tiempo
  - mi época
  lexicon: saeculum = siglo, edad, época, generación
  rationale: '''Siglo'' conserva la ambigüedad del latín entre era, edad y época; además refleja la decisión inglesa de ''my age'' sin deshistorizarla.'
theological_decisions:
- issue: Providencia y revelación previa a la corrupción humana
  english_pob_reading: full provision and divine instruction had already been set before humanity, yet they were corrupted in their ways
  chosen_spanish_reading: plena provisión y ley divina ya habían sido puestas delante de la humanidad, pero ésta se corrompió en sus caminos
  alternative_spanish_readings:
  - plena provisión y enseñanza divina
  - mesa abundante y ley insondable
  rationale: La frase latina une provisión ('mesa') y norma ('ley') como dones previos a la corrupción; la traducción preserva esa tensión sin resolverla en términos doctrinales ajenos al texto.
  doctrine_reference: Providencia divina; corrupción humana (antropología bíblica)
- issue: Interpretación de 'saeculum meum'
  english_pob_reading: my age
  chosen_spanish_reading: mi siglo
  alternative_spanish_readings:
  - mi tiempo
  - mi época
  rationale: No se debe normalizar demasiado la frase porque el latín permite un alcance más amplio que la simple edad biográfica; 'siglo' preserva esa amplitud y la resonancia sapiencial/apocalíptica.
  doctrine_reference: Tiempo histórico y juicio divino
translation_notes:
  revision_awareness: Se incorporó la cláusula final 'Y consideré mi siglo, y he aquí,' que estaba ausente en una revisión previa y fue restaurada por el pase de revisión más reciente. También se evitó añadir 'ahora', porque no aparece en el latín limpiado.
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' por norma general, pero este versículo no contiene el tetragrámaton ni κύριος.
  - '''Mesa'' se mantuvo por fidelidad literal; no se sustituyó por ''banquete'' o ''provisión'' para no borrar la imagen concreta del latín.'
  - '''Inescrutable'' se usó para ''legem inuestigabilem'' porque comunica mejor la imposibilidad de investigación que un mero ''ininvestigable'' en español contemporáneo.'
