base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/009/036.yaml
  text: For we indeed[9:36], who received the law, will perish because we sinned, and also our heart, which received it[a];
  footnotes:
  - marker: '9:36'
    text: The Latin around this verse is textually rough. The main sense is that those who received the law perish, even though the law itself does not perish but remains honored.
    reason: textual_variant
  - marker: a
    text: Or 'For we who received the law will perish in sin, and also the heart that received it;'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:48:54Z'
    unchanged: false
    changes_summary: Adjusted word order from 'and our heart also' to 'and also our heart' for more natural formal English while preserving the source sense and completeness.
translation:
  language: es
  text: Y nosotros, que en verdad recibimos la ley, pereceremos por haber pecado, y también nuestro corazón, que la recibió.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nosotros, que recibimos la ley, pereceremos en pecado, y también nuestro corazón, que la recibió»'
    reason: previous_rendering
lexical_decisions:
- source_word: nos quidem
  english_pob_choice: For we indeed
  chosen_spanish: Porque nosotros, en verdad
  alternatives_spanish:
  - Pues nosotros, en verdad
  - Y nosotros, en verdad
  lexicon: nos quidem
  rationale: El latín usa una partícula enfática/adversativa, no causal estricta. En español, "en verdad" conserva el énfasis; "porque" introduce bien la continuación del razonamiento sin forzar una causalidad ajena al contexto.
- source_word: qui legem accepimus
  english_pob_choice: who received the law
  chosen_spanish: los que recibimos la ley
  alternatives_spanish:
  - quienes recibimos la ley
  - los que hemos recibido la ley
  lexicon: qui legem accepimus
  rationale: '"Recibimos" refleja el aoristo/perfecto contextual del latín sin sobrecargar con una perfectividad extra que el español no exige. "La ley" es la forma natural y fiel para lexema jurídico-religioso.'
- source_word: peccantes peribimus
  english_pob_choice: will perish because we sinned
  chosen_spanish: pereceremos por haber pecado
  alternatives_spanish:
  - pereceremos porque pecamos
  - pereceremos, pecando
  - pereceremos por pecar
  lexicon: peccantes peribimus
  rationale: El participio presente "peccantes" expresa la razón concomitante del perecer. "Por haber pecado" preserva la relación causal sin convertirla en una mera descripción temporal. "Pecado" mantiene el sustantivo teológico de la culpa.
- source_word: cor nostrum
  english_pob_choice: our heart
  chosen_spanish: nuestro corazón
  alternatives_spanish:
  - nuestro corazón mismo
  - el corazón nuestro
  lexicon: cor nostrum
  rationale: La posesión explícita exige "nuestro corazón". Se mantiene el singular, porque el texto no habla de una colectividad abstracta separada del órgano interior, sino del corazón como sede interior humana.
- source_word: quod suscepit eam
  english_pob_choice: which received it
  chosen_spanish: que la recibió
  alternatives_spanish:
  - que la había recibido
  - que la acogió
  lexicon: quod suscepit eam
  rationale: '"La" retoma la ley de manera natural en español. "Recibió" es la correspondencia más directa para "suscepit"; "acogió" sería posible, pero añade una matización menos segura. Mantengo el referente femenino implícito en "ley".'
theological_decisions:
- issue: Relación entre la ley recibida y la perdición de quienes la recibieron
  english_pob_reading: those who received the law perish, even though the law itself does not perish but remains honored
  chosen_spanish_reading: los que recibieron la ley perecen por su pecado; la ley no es la que perece
  alternative_spanish_readings:
  - los que recibieron la ley perecerán en pecado
  - la ley perece con ellos
  rationale: El latín transmitido es textualmente áspero, pero el sentido auditado por la POB inglesa afirma que el sujeto que perece son los receptores, no la ley. El español deja esa tensión sin suavizarla hacia una interpretación distinta.
  doctrine_reference: 2 Esdras 9:36; nota textual POB
- issue: Tensión del participio 'peccantes' en relación con 'peribimus'
  english_pob_reading: will perish because we sinned
  chosen_spanish_reading: pereceremos por haber pecado
  alternative_spanish_readings:
  - pereceremos mientras pecamos
  - pereceremos siendo pecadores
  rationale: La lectura inglesa revisada corrige un error previo y toma 'peccantes' como base causal. El español conserva la causalidad y evita una traducción demasiado general que diluya la relación entre pecado y perdición.
  doctrine_reference: 2 Esdras 9:36; revisión textual POB
translation_notes:
  revision_awareness: 'He seguido la revisión más reciente del audit trail inglés, que corrige la formulación anterior y exige reflejar: (1) el valor enfático de ''nos quidem'' sin convertirlo en causalidad estricta, (2) la posesión explícita de ''cor nostrum'' como ''nuestro corazón'', y (3) la causalidad de ''peccantes'' con respecto a ''peribimus''. También he conservado la aspereza textual del pasaje sin intentar armonizarlo con una lectura más fluida que el latín base no garantiza.'
  spanish_consistency_notes:
  - He mantenido 'ley' para lexema jurídico-religioso, no 'Torá', porque el texto latino y la audiencia POB requieren un equivalente general y directo.
  - He usado 'perecer' en sentido fuerte y final, coherente con la gravedad del pasaje.
  - El pronombre 'la' en 'que la recibió' remite a 'ley'; aunque el antecedente es claro en español, lo he dejado implícito como en el latín.
  - La nota a pie de página ofrece la alternativa auditada por la POB inglesa sin introducir otra interpretación doctrinal.
