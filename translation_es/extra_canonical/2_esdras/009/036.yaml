revisions:
- from: Porque nosotros, en verdad, los que recibimos la ley, pereceremos por haber pecado, y también nuestro corazón, que la recibió.[a]
  to: Y nosotros, que en verdad recibimos la ley, pereceremos por haber pecado, y también nuestro corazón, que la recibió.[a]
  rationale: 'Se elimina «Porque» para no introducir una causalidad ajena a «nos quidem», y se rehace la nota para reflejar la alternativa documentada en la auditoría inglesa: una lectura con «pereceremos en pecado» en vez de la explicación causal principal. El resto del verso se mantiene porque es fiel al latín y buen español.'
