translation:
  language: es
  text: Porque cada hora y cada día, a lo largo de esos treinta años, seguí orando al Altísimo de noche y de día.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: per singulas horas et per singulos dies
  english_pob_choice: For every hour and every day
  chosen_spanish: durante cada hora y cada día
  alternatives_spanish:
  - por cada hora y por cada día
  - a cada hora y a cada día
  lexicon: Latin per + distributive singulas/singulos
  rationale: El latín expresa distribución continua e iterativa; «durante cada hora y cada día» conserva la idea de constancia prolongada sin volverla demasiado literal ni redundante en español.
- source_word: in annistriginta his
  english_pob_choice: throughout those thirty years
  chosen_spanish: por esos treinta años
  alternatives_spanish:
  - durante esos treinta años
  - a lo largo de esos treinta años
  lexicon: Latin in + annis triginta his
  rationale: La preposición latina, con ablativo temporal, señala el periodo completo. «Por esos treinta años» mantiene naturalidad en español y conserva la extensión temporal del acto.
- source_word: deprecabar
  english_pob_choice: I kept praying
  chosen_spanish: estuve orando
  alternatives_spanish:
  - seguí orando
  - estaba orando
  lexicon: Latin deprecabar
  rationale: En este contexto, el verbo latino indica suplicar/orar insistentemente. «Estuve orando» refleja continuidad y esfuerzo persistente, acorde con el auditable English POB «I kept praying».
- source_word: Altissimum
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Altísimo Dios
  - el Dios Altísimo
  lexicon: Latin Altissimus
  rationale: «Altísimo» es la forma española estable y digna para el título divino; conserva el carácter reverente del original sin introducir una paráfrasis explicativa.
- source_word: nocte ac die
  english_pob_choice: night and day
  chosen_spanish: de noche y de día
  alternatives_spanish:
  - noche y día
  - por la noche y el día
  lexicon: Latin nocte ac die
  rationale: La fórmula idiomática española «de noche y de día» reproduce la pareja temporal fija del latín y sugiere continuidad total, como en el texto de referencia inglés.
theological_decisions:
- issue: Duración e insistencia de la oración
  english_pob_reading: I kept praying to the Most High night and day.
  chosen_spanish_reading: estuve orando al Altísimo de noche y de día
  alternative_spanish_readings:
  - seguí orando al Altísimo de noche y de día
  - me mantuve orando al Altísimo de noche y de día
  rationale: El texto presenta perseverancia prolongada, no solo un acto puntual de oración. «Estuve orando» comunica continuidad sin añadir contenido doctrinal ajeno.
  doctrine_reference: Perseverancia en la oración; continuidad de la súplica.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el latín limpio y la traducción inglesa auditada; no se registran revisiones aplicadas ni tensiones textuales relevantes en esta unidad.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para el título divino, coherente con el registro reverente y con el inglés «Most High».
  - Se eligió una perífrasis verbal de aspecto progresivo («estuve orando») para reflejar la duración repetida del latín y el inglés POB.
  - No se introducen notas textuales porque el testimonio disponible es estable y no presenta variantes significativas en este versículo.
