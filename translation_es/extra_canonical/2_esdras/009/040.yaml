lexical_decisions:
- source_word: ut quid fles
  english_pob_choice: Why are you weeping
  chosen_spanish: ¿Por qué lloras
  alternatives_spanish:
  - ¿Por qué estás llorando
  - ¿Por qué lloras tú
  lexicon: flere
  rationale: El latín usa fles, de flēre, “llorar”. En español, “lloras” es natural, claro y suficientemente literal; mantiene el aspecto de una acción visible de duelo sin añadir matices no presentes en el texto.
- source_word: quid doles animo
  english_pob_choice: why are you grieved in spirit
  chosen_spanish: por qué estás afligida en el espíritu
  alternatives_spanish:
  - por qué tu espíritu está afligido
  - por qué estás triste en tu espíritu
  lexicon: doleo + animus
  rationale: doles animo expresa dolor/pena interior, con animus como el ámbito interior de la persona. “Afligida en el espíritu” conserva el paralelismo con la versión inglesa y refleja el sentido interior sin reducirlo a mera emoción pasajera.
- source_word: et dixit ad me
  english_pob_choice: And she said to me
  chosen_spanish: Y ella me dijo
  alternatives_spanish:
  - Y me dijo
  - Y ella respondió
  lexicon: dico + ad me
  rationale: La cláusula narrativa final del latín debe quedar explícita en español. “Y ella me dijo” reproduce con fidelidad el movimiento directo hacia el hablante que expresa ad me.
translation_notes:
  revision_awareness: La revisión auditada indicó una omisión previa de la cláusula final et dixit ad me; esta versión la incluye explícitamente en el texto español, alineándose con el latín proporcionado para 2 Esdras 9:40.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y actual, sin depender de fórmulas tradicionales que oculten el sentido del latín.
  - Se eligió el femenino en afligida porque el contexto inmediato presenta a una mujer hablando en la cláusula final del versículo.
  - No se introduce terminología doctrinal adicional; el verso es narrativo y exhortativo, no confesional.
