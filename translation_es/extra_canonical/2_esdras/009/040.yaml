  source_alignment_summary: 'El borrador sigue bien el latín: ut quid fles = «¿Por qué lloras?», quid doles animo = dolor interior, y et dixit ad me = «Y ella me dijo». Sin embargo, «en el espíritu» suena algo calcado para animo y menos natural en español en este contexto; además, el artículo puede sugerir una referencia técnica no presente en el latín.'
  spanish_quality_summary: El texto es claro y digno, pero «estás afligida en el espíritu» resulta algo rígido. En español bíblico natural y fiel, «afligida de espíritu» comunica mejor el dolor interior de animo. El resto del verso lee bien.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. La decisión relevante es animo, que aquí conviene verter como «de espíritu» más que «en el espíritu» para evitar un calco poco idiomático y una posible sobrelectura teológica.
