  text: Y se abrió mi boca, y comencé
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et apertum est os meum
  english_pob_choice: And my mouth was opened
  chosen_spanish: Y se abrió mi boca
  alternatives_spanish:
  - Y fue abierta mi boca
  - Y mi boca se abrió
  lexicon: os = boca; apertum est = se abrió / fue abierta
  rationale: El latín presenta una pasiva sencilla; en español, la forma natural y fiel es reflexiva/medio-pasiva «se abrió». Mantiene el hecho narrativo sin añadir agente.
- source_word: inchoaui
  english_pob_choice: I began to speak
  chosen_spanish: comencé a hablar
  alternatives_spanish:
  - empecé a hablar
  - comencé a decir
  lexicon: inchoare = comenzar, iniciar
  rationale: El verbo latino expresa inicio de la acción. «Comencé a hablar» conserva el comienzo de la locución y suena natural en español bíblico moderno.
- source_word: coram Altissimo
  english_pob_choice: before the Most High
  chosen_spanish: delante del Altísimo
  alternatives_spanish:
  - ante el Altísimo
  - en presencia del Altísimo
  lexicon: coram = delante de, en presencia de; Altissimus = el Altísimo
  rationale: «Delante del Altísimo» refleja con claridad la preposición relacional del latín y preserva el título reverencial sin convertirlo en una perífrasis más interpretativa.
theological_decisions:
- issue: Título divino Altissimo
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Más Alto
  - el Altísimo Dios
  rationale: El latín usa un título divino de reverencia. «El Altísimo» es la forma española más estable y sobria, sin perder el sentido teológico del superlativo.
