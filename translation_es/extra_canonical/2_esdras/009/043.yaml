base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/009/043.yaml
  text: She said to me, “I, your female slave, was barren and did not bear a child, though I had a husband for thirty years.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:48:35Z'
    unchanged: false
    changes_summary: Changed 'servant' to 'female slave' to reflect Latin famula more precisely; retained the rest as accurate and natural.
translation:
  language: es
  text: 'Me dijo: «Yo, tu esclava, era estéril y no di a luz, aunque tuve marido durante treinta años».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: famula
  english_pob_choice: female slave
  chosen_spanish: esclava
  alternatives_spanish:
  - sierva
  - criada
  - fámula
  lexicon: famula = female slave / female servant
  rationale: El latín famula fue entendido por la POB en inglés como 'female slave' para conservar su fuerza lexical. En español, 'esclava' comunica mejor esa misma relación de sujeción que 'sierva' o 'criada', y evita debilitar el término.
- source_word: sterilis
  english_pob_choice: barren
  chosen_spanish: estéril
  alternatives_spanish:
  - infértil
  - barrena
  lexicon: sterilis = barren, sterile
  rationale: '''Estéril'' reproduce con naturalidad el sentido de ausencia de fecundidad y es el equivalente más transparente en español bíblico actual.'
- source_word: non peperi
  english_pob_choice: did not bear a child
  chosen_spanish: no di a luz
  alternatives_spanish:
  - no tuve hijos
  - no alumbré un hijo
  lexicon: parere / peperi = bear, give birth
  rationale: '''No di a luz'' expresa el hecho de dar a luz sin añadir un objeto que el latín no especifica. Mantiene la referencia al parto sin sobretraducción.'
- source_word: habens maritum annis triginta
  english_pob_choice: though I had a husband for thirty years
  chosen_spanish: aunque tuve marido durante treinta años
  alternatives_spanish:
  - aunque tuve esposo por treinta años
  - a pesar de tener marido por treinta años
  lexicon: habere maritum = have a husband; annis triginta = thirty years
  rationale: '''Tuve marido'' sigue de cerca el latín y conserva el matiz relacional del verbo ''habere''. ''Aunque'' refleja la concesión implícita del contexto: pese a tener marido por treinta años, permaneció estéril.'
theological_decisions:
- issue: Fuerza social de famula / relación de dependencia
  english_pob_reading: female slave
  chosen_spanish_reading: esclava
  alternative_spanish_readings:
  - sierva
  - criada
  rationale: No se suaviza el término hacia una categoría más devocional o doméstica, porque el audit trail inglés corrigió expresamente 'servant' a 'female slave' para reflejar mejor famula. 'Esclava' preserva esa tensión social.
  doctrine_reference: Lexical/theological precision in translation; no doctrinal claim
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail, que corrigió 'servant' a 'female slave' para reflejar con mayor precisión famula. Por eso se eligió 'esclava' y no un equivalente más suave. No hubo notas en la POB inglesa que exigieran conservar variantes adicionales.
  spanish_consistency_notes:
  - 'Se mantuvo el orden y la estructura narrativa del original: introducción con diálogo directo, autoidentificación, estado de esterilidad y concesiva temporal.'
  - Se evitó 'sierva' porque en español puede sonar más religioso o atenuado que el valor lexical indicado por la revisión auditada.
  - '''No di a luz'' se prefiere a ''no parí'' por ser más natural y claro en español contemporáneo, sin perder fidelidad al contenido del latín.'
