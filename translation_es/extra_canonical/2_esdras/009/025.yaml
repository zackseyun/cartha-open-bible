base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/009/025.yaml
  text: I will come and speak with you. And I went out, as he told me, into the field that is called
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:48:16Z'
    unchanged: false
    changes_summary: 'Replaced the draft with the actual Latin content of this verse: removed material from the previous verse, restored both clauses (''I will come and speak with you'' and ''And I went out... into the field that is called''), and adjusted wording for accuracy and natural English.'
translation:
  language: es
  text: Vendré y hablaré contigo. Y salí, como me lo dijo, al campo que se llama
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ueniam
  english_pob_choice: I will come
  chosen_spanish: Vendré
  alternatives_spanish:
  - Iré
  - Vengo
  lexicon: venio
  rationale: El futuro español expresa bien la promesa/intención futura del latín ueniam. 'Vendré' mantiene la dirección hacia el interlocutor y suena natural en español.
- source_word: loquar tecum
  english_pob_choice: speak with you
  chosen_spanish: hablaré contigo
  alternatives_spanish:
  - te hablaré
  - conversaré contigo
  lexicon: loquor
  rationale: '''Hablaré contigo'' conserva el sentido de conversación directa sin sobreformalizarlo. ''Conversaré contigo'' sería más interpretativo; ''te hablaré'' puede sonar menos recíproco en español.'
- source_word: profectus sum
  english_pob_choice: I went out
  chosen_spanish: salí
  alternatives_spanish:
  - partí
  - me fui
  lexicon: proficiscor
  rationale: El latín describe la salida hacia un lugar; 'salí' es la forma más natural y precisa en este contexto, sin añadir matices de viaje que el texto no exige.
- source_word: sicut dixit mihi
  english_pob_choice: as he told me
  chosen_spanish: como me lo dijo
  alternatives_spanish:
  - según me dijo
  - tal como me lo dijo
  lexicon: dico
  rationale: '''Como me lo dijo'' reproduce la relación de conformidad con una referencia personal directa. El pronombre ''lo'' ayuda a captar el contenido dicho sin cambiar el sentido.'
- source_word: in campum
  english_pob_choice: into the field
  chosen_spanish: al campo
  alternatives_spanish:
  - hacia el campo
  - en el campo
  lexicon: campus
  rationale: El movimiento hacia el lugar queda bien expresado con 'al campo'. 'Hacia el campo' es posible, pero menos directo; 'en el campo' perdería la idea de desplazamiento.
- source_word: quod uocatur
  english_pob_choice: that is called
  chosen_spanish: que se llama
  alternatives_spanish:
  - llamado
  - que recibe el nombre de
  lexicon: uoco
  rationale: '''Que se llama'' es la equivalencia española más transparente y fiel para una denominación de lugar. ''Llamado'' resultaría más compacto, pero menos explícito.'
translation_notes:
  revision_awareness: 'La revisión inglesa restauró el contenido real de este versículo: una promesa de venir y hablar, seguida por la narración de la salida al campo. La versión española refleja solo ese material, sin arrastrar frases del versículo anterior ni completar el final nominal que queda cortado en el segmento latino.'
  spanish_consistency_notes:
  - Se conserva un tono sobrio y narrativo, adecuado para literatura apocalíptica/visionaria.
  - No se introdujo 'SEÑOR' ni terminología teológica ajena, porque este versículo no contiene referencias divinas explícitas en el tramo dado.
  - '''Campo'' se mantiene como término simple y literal para ''campus'' en este contexto narrativo.'
