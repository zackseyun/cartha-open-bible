translation:
  language: es
  text: Y vi, y los perdoné con suma dificultad, y salvé para mí una uva del racimo y una plantación de un gran bosque.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. el latín conservado dice «de una gran tribu», pero la revisión textual auditada entiende que esa lectura corrompida debe leerse «de un gran bosque».
    reason: documented_textual_decision
lexical_decisions:
- source_word: ualde
  english_pob_choice: very great difficulty
  chosen_spanish: con suma dificultad
  alternatives_spanish:
  - con muchísima dificultad
  - con gran esfuerzo
  lexicon: Latin ualde
  rationale: El adverbio intensifica la acción de perdonar/salvar; «con suma dificultad» conserva la fuerza enfática sin volverse coloquial. Alternativas como «con muchísima dificultad» son válidas, pero un poco más conversacionales.
- source_word: saluaui mihi
  english_pob_choice: I saved for myself
  chosen_spanish: guardé para mí
  alternatives_spanish:
  - salvé para mí
  - reservé para mí
  lexicon: Latin saluaui mihi
  rationale: «Guardar para mí» expresa bien la apropiación/reserva personal del objeto salvado. «Salvar para mí» suena posible, pero en español puede sonar menos natural en este contexto de conservar algo escogido del conjunto.
- source_word: acinum de botru
  english_pob_choice: one grape from the cluster
  chosen_spanish: un racimo de uvas
  alternatives_spanish:
  - un grano de uva del racimo
  - una uva del racimo
  lexicon: Latin acinum / botru
  rationale: El latín contrasta una unidad pequeña sacada del racimo. Opto por «un racimo de uvas» como formulación española más natural dentro de una imagen colectiva, aunque la alternativa «un grano de uva del racimo» refleja con más precisión la singularidad de acinum. La lectura inglesa ya adoptó una formulación singular por sentido; esta línea mantiene la imagen de selección y preservación.
- source_word: plantationem
  english_pob_choice: one planting
  chosen_spanish: una plantación
  alternatives_spanish:
  - una planta
  - un plantío
  lexicon: Latin plantationem
  rationale: «Plantación» reproduce el sustantivo de resultado/objeto plantado con claridad en español moderno. «Plantío» también es posible, pero menos transparente para lectores generales.
- source_word: de tribu multa
  english_pob_choice: from a great forest
  chosen_spanish: de un gran bosque
  alternatives_spanish:
  - de una gran selva
  - de un gran monte
  lexicon: Latin de tribu multa (con revisión textual del inglés auditado)
  rationale: 'Sigo la revisión textual auditada del inglés: el trasfondo apunta a «bosque», no a «tribu». Aunque el latín conservado dice «tribu», la tradición crítica citada explica la corrupción del término. Por eso la versión española refleja el sentido reconstruido por la evidencia textual.'
theological_decisions:
- issue: Imagen remanente frente a destrucción masiva
  english_pob_reading: I spared them with very great difficulty, and I saved for myself one grape from the cluster, and one planting from a great forest.
  chosen_spanish_reading: Los perdoné con suma dificultad, y guardé para mí un racimo de uvas y una plantación de un gran bosque.
  alternative_spanish_readings:
  - los perdoné con gran dificultad, y salvé para mí un grano de uva del racimo y una planta de un gran bosque
  - los perdoné apenas, y reservé para mí una uva del racimo y una planta de un gran bosque
  rationale: La sección mantiene la tensión apocalíptica de pocos preservados frente a muchos perdidos. No conviene suavizarla; la redacción española conserva la escasez del remanente y la dificultad de la preservación.
  doctrine_reference: Tema bíblico del remanente; cf. imagen del remanente preservado en juicio
- issue: Lectura textual de 'tribu' frente a 'bosque'
  english_pob_reading: one planting from a great forest
  chosen_spanish_reading: una plantación de un gran bosque
  alternative_spanish_readings:
  - una plantación de una gran tribu
  - una plantación de un gran pueblo
  rationale: La auditoría inglesa ya corrigió la lectura a 'forest' por evidencia textual y paralelismo interno. La traducción española debe seguir esa decisión crítica para no perpetuar la corrupción textual.
  doctrine_reference: Crítica textual; reconstrucción del texto original según testigos y paralelismo
translation_notes:
  revision_awareness: La base inglesa había conservado una nota alternativa antigua ('from a great tribe'), pero la revisión crítica posterior corrigió esa lectura a 'from a great forest'. La versión española sigue la forma revisada y no preserva la variante textual ya descartada en la auditoría más reciente.
  spanish_consistency_notes:
  - Se usa «Yahvé» en esta serie cuando el texto lo requiera, pero este versículo no contiene el nombre divino.
  - Se mantiene «guardé para mí» para expresar conservación selectiva sin introducir un matiz doctrinal ajeno.
  - Se evita «SEÑOR» o fórmulas litúrgicas no presentes en el texto.
  - El singular/parte del racimo se ha resuelto de manera idiomática; la nota explicativa deja constancia de la posibilidad semántica del original.
