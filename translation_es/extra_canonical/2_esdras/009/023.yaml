    text: 'O: «Pero tú, si esperas siete días más—aunque no ayunarás durante ese tiempo—».'
    reason: Alinear la nota con la alternativa documentada en el expediente inglés y mejorar la naturalidad temporal en español.
  revision_rationale: Se conserva el sentido del latín y de la revisión inglesa final, pero se corrige la nota alternativa para eliminar el matiz no respaldado de «vuelves» y se mejora la naturalidad de la referencia temporal en el texto principal con «durante ese tiempo».
