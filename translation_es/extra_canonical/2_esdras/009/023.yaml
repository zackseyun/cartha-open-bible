translation:
  language: es
  text: Pero no ayunarás durante ese tiempo[a], sino que irás a un campo de flores, donde
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero tú, si esperas siete días más—aunque no ayunarás durante ese tiempo—».'
