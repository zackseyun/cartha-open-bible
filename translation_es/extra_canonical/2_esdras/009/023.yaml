lexical_decisions:
- source_word: sed non ieiunabis in eis
  english_pob_choice: But you shall not fast during them
  chosen_spanish: Pero no ayunarás durante ellos
  alternatives_spanish:
  - Pero no ayunarás en ellos
  - Pero no guardarás ayuno durante ellos
  lexicon: ieiunabis -> ayunarás
  rationale: El latín prohíbe el ayuno durante el período referido; "ayunar" es la equivalencia natural y fiel en español. "Durante ellos" conserva el sentido temporal del inglés POB y evita introducir un objeto distinto.
- source_word: Ibis autem in campum florum
  english_pob_choice: but you shall go into a field of flowers
  chosen_spanish: sino que irás a un campo de flores
  alternatives_spanish:
  - pero irás a un campo de flores
  - sino que entrarás en un campo de flores
  lexicon: ibis -> irás; campum florum -> campo de flores
  rationale: '"Irás" mantiene el futuro directo del latín; "campo de flores" sigue de cerca la imagen concreta. "Sino que" enlaza mejor la corrección contrastiva después de la prohibición.'
theological_decisions:
- issue: Temporal command versus spatial movement
  english_pob_reading: But you shall not fast during them, but you shall go into a field of flowers, where
  chosen_spanish_reading: Pero no ayunarás durante ellos[a], sino que irás a un campo de flores, donde
  alternative_spanish_readings:
  - Pero no ayunarás durante ellos, sino que irás a un campo de flores, donde
  rationale: La revisión inglesa eliminó la lectura espacial previa de "withdraw" y dejó el foco temporal del ayuno, seguido por el movimiento hacia el campo de flores. El español refleja esa secuencia sin añadir contenido no presente en el segmento latino.
  doctrine_reference: No doctrinal issue; narrative/imperative sequencing in 4 Ezra 9:23.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés POB, que ajustó el segmento para ceñirse al latín: se conservó la prohibición de ayunar y se tradujo ''Ibis autem in campum florum, ubi'' como una cláusula de movimiento hacia un campo de flores. Se evitó introducir la idea descartada de ''withdraw'' o de ''siete días más''.'
  spanish_consistency_notes:
  - Se prefirió 'ayunar' para ieiunabis, en consonancia con el valor lexical directo del latín.
  - '''Campo de flores'' mantiene la imagen concreta del texto sin suavizarla.'
  - Se usó puntuación española con coma antes de 'sino que' para marcar el contraste.
  - La nota [a] queda anclada explícitamente en el texto mediante el marcador visible en 'durante ellos[a]'.
