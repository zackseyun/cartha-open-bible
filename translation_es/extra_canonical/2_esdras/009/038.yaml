source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'Et cum loquerer haec in corde meo, respexi oculis meis et uidi mulierem in dextera parte, et ecce haec lugebat et plorabat cum uoce magna, et animo dolebat ualde, et uestimenta eius discissa, et cinis super caput eius. Et dimisi cogitatus in quibus eram cogitans et conuersus sum ad eam et dixi ei: Vtquid fles? et quid doles animo? Et dixit ad me: dimitte me, dominus meus, ut defleam me et adiciam dolorem, quoniam ualde amara sum animo et humiliata sum ualde. Et dixi ei: quid passa es? dic mihi. et dixit ad me: Sterilis fui ego famula tua et non peperi habens maritum annis triginta. Ego enim per singulas horas et per singulos dies in annis triginta his deprecabar altissimum nocte ac die. Et factum est post triginta annos exaudiuit me deus ancillae tuae et peruidit humilitatem meam et adtendit tribulationi meae et dedit mihi filium. et iocundata sum super eum ualde ego et uir meus et omnes ciues mei, et honorificauimus ualde fortem. Et nutriui eum cum labore multo: Et factum est cum
    creuisset et uenissem accipere illi uxorem, et feci diem epuli.'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/009/038.yaml
  text: While I was speaking these things in my heart, I looked up with my eyes, and I saw a woman on the right side. And behold, she was mourning and weeping with a loud voice, and was deeply grieved in spirit. Her garments were torn, and ashes were on her head.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:29:42Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Mientras yo decía estas cosas en mi corazón, alcé mis ojos y vi a una mujer a la derecha. Y he aquí, se lamentaba y lloraba con voz fuerte, y estaba profundamente afligida en su espíritu. Sus vestidos estaban rasgados, y había ceniza sobre su cabeza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: in corde meo
  english_pob_choice: in my heart
  chosen_spanish: en mi corazón
  alternatives_spanish:
  - en mi interior
  - dentro de mí
  lexicon: cor cordis
  rationale: Se conserva la imagen interior del pensamiento o la reflexión, tal como la POB inglesa la vierte de manera directa y natural.
- source_word: respexi oculis meis
  english_pob_choice: I looked up with my eyes
  chosen_spanish: alcé mis ojos
  alternatives_spanish:
  - levanté mis ojos
  - miré
  lexicon: respicere / oculi
  rationale: El latín combina el acto de mirar con la referencia explícita a los ojos. En español, 'alcé mis ojos' comunica fielmente la acción sin una redundancia extraña.
- source_word: mulierem in dextera parte
  english_pob_choice: a woman on the right side
  chosen_spanish: una mujer a la derecha
  alternatives_spanish:
  - una mujer del lado derecho
  - una mujer a mi derecha
  lexicon: mulier / dextera pars
  rationale: '''A la derecha'' reproduce de forma sobria el valor espacial de ''in dextera parte'' sin añadir elementos no presentes en el texto.'
- source_word: lugebat et plorabat
  english_pob_choice: was mourning and weeping
  chosen_spanish: lloraba y se lamentaba
  alternatives_spanish:
  - estaba de duelo y lloraba
  - gemía y lloraba
  lexicon: lugere / plorare
  rationale: '''Lloraba'' y ''se lamentaba'' mantienen el doble matiz de aflicción y llanto; ''se lamentaba'' evita reducir el segundo verbo solo a llanto.'
- source_word: cum voce magna
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - en alta voz
  - con gran voz
  lexicon: vox magna
  rationale: '''Con voz fuerte'' es claro y natural en español, y preserva el énfasis de intensidad vocal.'
- source_word: animo dolebat ualde
  english_pob_choice: was deeply grieved in spirit
  chosen_spanish: estaba profundamente afligida en su espíritu
  alternatives_spanish:
  - tenía el ánimo muy dolido
  - sentía gran dolor en su espíritu
  lexicon: animus / dolere
  rationale: La POB inglesa distingue la aflicción interior; 'afligida en su espíritu' conserva el ámbito interior sin convertirlo en una simple emoción pasajera.
- source_word: vestimenta eius discissa
  english_pob_choice: Her garments were torn
  chosen_spanish: Sus vestidos estaban rasgados
  alternatives_spanish:
  - Sus ropas estaban rotas
  - Su vestido estaba rasgado
  lexicon: vestimenta / discindere
  rationale: '''Vestidos'' es un plural natural para vestimenta y ''rasgados'' transmite la ruptura material del texto con dignidad literaria.'
- source_word: cinis super caput eius
  english_pob_choice: ashes were on her head
  chosen_spanish: ceniza sobre su cabeza
  alternatives_spanish:
  - cenizas sobre su cabeza
  - tenía ceniza sobre la cabeza
  lexicon: cinis / caput
  rationale: Se conserva la imagen ceremonial o de duelo sin forzar una explicación que el versículo no da.
theological_decisions:
- issue: Representación del dolor interior como ámbito espiritual
  english_pob_reading: deeply grieved in spirit
  chosen_spanish_reading: profundamente afligida en su espíritu
  alternative_spanish_readings:
  - muy dolida en su ánimo
  - profundamente dolida interiormente
  rationale: El texto describe una aflicción interior, no un juicio doctrinal. 'En su espíritu' mantiene la amplitud antropológica del latín 'animo' en continuidad con la POB inglesa.
  doctrine_reference: Anthropology / inner affliction
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios según el último pase; por eso la traducción española sigue de cerca su lectura óptima-equivalente y no introduce variantes textuales o notas críticas adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Y he aquí' para conservar el giro narrativo enfático del original.
  - No se introduce 'Señor' ni 'Mesías', porque este versículo no contiene ni requiere esos términos.
  - '''Espíritu'' se reserva aquí para reflejar el ámbito interior de ''animo'' en el contexto de dolor intenso.'
