    changes_summary: Changed 'will survive' to 'will be left from' to more closely reflect relinquetur, and 'dangers foretold' to 'foretold dangers' for a more direct rendering of praedictis periculis.
translation:
  language: es
  text: quedará libre de los peligros anunciados[a] y verá mi salvación en mi tierra y dentro de mis límites, la cual santifiqué para mí desde la antigüedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quedará libre de los anunciados peligros».
    reason: Preserva la alternativa de orden/fraseo reflejada en la nota inglesa sobre la agrupación de «praedictis periculis».
lexical_decisions:
- source_word: relinquetur
  english_pob_choice: will be left from the foretold dangers
  chosen_spanish: quedará alguno libre de los peligros anunciados
  alternatives_spanish:
  - será dejado de los peligros anunciados
  - quedará de los peligros anunciados
  lexicon: relinquo
  rationale: El pasivo latino expresa quedar o permanecer tras la amenaza; en español, «quedará alguno libre» comunica de forma natural la idea de haber sido preservado, sin perder el matiz de supervivencia/escapatoria implícito en el contexto.
- source_word: praedictis periculis
  english_pob_choice: foretold dangers
  chosen_spanish: los peligros anunciados
  alternatives_spanish:
  - los peligros predichos
  - los peligros profetizados
  lexicon: praedico + periculum
  rationale: «Praedictis» remite a lo dicho de antemano; «anunciados» es claro y natural en español, y mantiene el valor de anticipación sin introducir una carga profética más fuerte de la que exige el latín.
- source_word: salutare meum
  english_pob_choice: my salvation
  chosen_spanish: mi salvación
  alternatives_spanish:
  - mi liberación
  - mi rescate
  lexicon: salutare
  rationale: El sustantivo neutro latino admite salvación o rescate; «mi salvación» conserva la amplitud teológica y la conexión bíblica habitual, sin restringir indebidamente el sentido.
- source_word: in terra mea et in finibus meis
  english_pob_choice: in my land and within my borders
  chosen_spanish: en mi tierra y dentro de mis límites
  alternatives_spanish:
  - en mi tierra y dentro de mis fronteras
  - en mi país y dentro de mis fronteras
  lexicon: terra + fines
  rationale: «Terra» se vierte mejor como «tierra» en este contexto sagrado; «fines» puede ser «límites» o «fronteras». «Límites» evita un matiz político moderno excesivo y conserva la idea de contorno o demarcación.
- source_word: quae sanctificavi mihi a saeculo
  english_pob_choice: which I sanctified for myself from of old
  chosen_spanish: la cual santifiqué para mí desde la antigüedad
  alternatives_spanish:
  - la cual santifiqué para mí desde antiguo
  - la cual consagré para mí desde la antigüedad
  lexicon: sanctifico + a saeculo
  rationale: «Santifiqué» reproduce bien el valor de apartar para uso propio de Dios; «desde la antigüedad» expresa la duración remota de «a saeculo» en un español digno y comprensible.
theological_decisions:
- issue: Preservación divina frente a los peligros anunciados
  english_pob_reading: will be left from the foretold dangers
  chosen_spanish_reading: quedará alguno libre de los peligros anunciados
  alternative_spanish_readings:
  - será preservado de los peligros anunciados
  - saldrá con vida de los peligros anunciados
  rationale: El latín no dice simplemente ausencia de daño abstracta, sino remanente/superviviente tras los peligros. La formulación elegida mantiene la tensión entre quedar y ser librado, sin convertirla en una paráfrasis demasiado explicativa.
  doctrine_reference: Providencia y preservación divina
- issue: Santificación previa de la tierra
  english_pob_reading: which I sanctified for myself from of old
  chosen_spanish_reading: la cual santifiqué para mí desde la antigüedad
  alternative_spanish_readings:
  - la cual aparté para mí desde antiguo
  - la cual consagré para mí desde la antigüedad
  rationale: «Santifiqué para mí» conserva la idea de pertenencia exclusiva a Dios y su separación previa. «Desde la antigüedad» mantiene la preexistencia del designio divino sin suavizarlo.
  doctrine_reference: Elección divina y consagración
- issue: Mi tierra / mis límites como lenguaje de posesión divina
  english_pob_reading: my land and within my borders
  chosen_spanish_reading: mi tierra y dentro de mis límites
  alternative_spanish_readings:
  - mi tierra y dentro de mis fronteras
  - mi tierra y dentro de mi territorio
  rationale: El posesivo en primera persona debe mantenerse para no borrar la afirmación teológica de soberanía divina sobre el espacio señalado.
  doctrine_reference: Soberanía de Dios
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una corrección para volver de «will survive the dangers foretold» a una forma más pegada a relinquetur y praedictis periculis («will be left from the foretold dangers»). La versión española sigue esa lectura revisada, pero evita el calco de «ser dejado de» y conserva la idea de quedar libre/preservado tras los peligros.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplicable aquí; el pasaje usa primera persona divina («mi»).
  - «Salvación» se conservó por amplitud teológica, sin reducirlo a «liberación».
  - «Límites» se prefirió a «fronteras» por neutralidad y por evitar un matiz moderno excesivo.
  - La nota a refleja la ambigüedad entre «peligros anunciados» y una construcción más literal del adjetivo participial latino.
