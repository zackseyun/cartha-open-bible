  yaml_path: translation/extra_canonical/2_esdras/009/017.yaml
  text: He answered me and said[a], “As the field is, so also are the seeds; and as the flowers are, so also are the colors; and as the work is, so also is the creation; and as the farmer is, so also is the threshing floor. For there was a time of the age,”
  footnotes:
  - marker: a
    text: Or 'For such was the time of the age:'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:48:09Z'
    unchanged: false
    changes_summary: Added the closing quotation mark to complete the direct speech. No wording changes otherwise.
translation:
  language: es
  text: 'Él me respondió y dijo: «Así como es el campo, así también son las semillas; y así como son las flores, así también son los colores; y así como es la obra, así también es la creación; y así como es el agricultor, así también es la era. Porque había un tiempo de la edad[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque era tiempo de la edad»; el latín admite una cláusula causal-temporal breve, pero no añade «tal» ni otra calificación.'
    reason: alternative_reading
lexical_decisions:
- source_word: qualis ager, talia et semina
  english_pob_choice: As the field is, so also are the seeds
  chosen_spanish: Así como es el campo, así también son las semillas
  alternatives_spanish:
  - Como es el campo, así son también las semillas
  - Así como es el terreno, así también son las semillas
  lexicon: ager
  rationale: Campo conserva la imagen agrícola general y la relación comparativa del latín; ‘terreno’ es posible, pero menos vívido para el paralelismo.
- source_word: quales flores, tales et tincturae
  english_pob_choice: as the flowers are, so also are the colors
  chosen_spanish: así como son las flores, así también son los colores
  alternatives_spanish:
  - así como son las flores, así también son los tintes
  - así como son las flores, así también los colores
  lexicon: flores / tincturae
  rationale: ‘Colores’ sigue de cerca la elección de la POB inglesa y mantiene la imagen visible; ‘tintes’ sería más literal para tincturae, pero en español suena más técnico y menos natural en la comparación.
- source_word: qualis opera, talis et creatio
  english_pob_choice: as the work is, so also is the creation
  chosen_spanish: así como es la obra, así también es la creación
  alternatives_spanish:
  - así como es el trabajo, así también es la creación
  - así como es la obra, así también la creación
  lexicon: opera / creatio
  rationale: ‘Obra’ preserva mejor el alcance de opera como producto o labor realizada; ‘trabajo’ desplaza el énfasis hacia la actividad humana.
- source_word: qualis agricola, talis et area
  english_pob_choice: as the farmer is, so also is the threshing floor
  chosen_spanish: así como es el agricultor, así también es la era
  alternatives_spanish:
  - así como es el labrador, así también es la era
  - así como es el agricultor, así también es la trilla
  lexicon: agricola / area
  rationale: ‘Agricultor’ es una equivalencia transparente y comprensible. Para area, ‘era’ conserva el sentido de la superficie de trilla; ‘trilla’ sería más interpretativo y menos exacto.
- source_word: quoniam tempus erat saeculi
  english_pob_choice: For there was a time of the age
  chosen_spanish: Porque era tiempo del siglo
  alternatives_spanish:
  - Porque había tiempo para el siglo
  - Pues era el tiempo de la era
  lexicon: quoniam / tempus / saeculi
  rationale: ‘Porque’ reproduce la función causal de quoniam. ‘Tiempo del siglo’ mantiene la ambigüedad de saeculi como ‘edad/siglo/era’ sin imponer una paráfrasis; ‘siglo’ es menos usual en español bíblico, pero conserva el matiz temporal del texto.
theological_decisions:
- issue: Valor de saeculi en una clausula temporal
  english_pob_reading: For there was a time of the age
  chosen_spanish_reading: Porque era tiempo del siglo
  alternative_spanish_readings:
  - Porque era tiempo de la era
  - Porque era tiempo de la edad
  rationale: El latín no dice ‘tal era el tiempo’, sino simplemente que existía/era un tiempo perteneciente al saeculum. La traducción mantiene esa afirmación temporal sin cargarla con una valoración del carácter de la edad, conforme a la revisión auditada.
  doctrine_reference: cronología/apocalíptica literaria, no doctrina definida
- issue: Paralelismo comparativo con series de correspondencias
  english_pob_reading: As the field is... as the farmer is...
  chosen_spanish_reading: Así como es el campo... así también es la era
  alternative_spanish_readings:
  - Como es el campo... como es la era
  - Tal como es el campo... tal como es la era
  rationale: Se conserva el paralelismo estructural del original latino y de la POB inglesa, sin suavizar la repetición que sostiene la argumentación figurativa.
  doctrine_reference: retórica bíblica / imaginería sapiencial
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: la cláusula final se entendió como una afirmación temporal simple (‘For there was a time of the age’), no como ‘For such was the time of the age’. También se respetó el cierre de la cita directa en la redacción española.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ no aplicable aquí porque el versículo no contiene el tetragrámaton ni κύριος divino.
  - Se conserva ‘creación’ para creatio y ‘obra’ para opera, evitando aplanar ambos términos en un solo equivalente.
  - ‘Era’ para area busca preservar el referente agrícola específico sin convertirlo en una explicación.
