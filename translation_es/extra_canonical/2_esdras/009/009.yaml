translation:
  language: es
  text: Entonces se asombrarán los que ahora han abusado de mis caminos, y en tormentos permanecerán aquellos que los desecharon con desprecio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: abusi sunt vias meas
  english_pob_choice: have abused my ways
  chosen_spanish: han abusado de mis caminos
  alternatives_spanish:
  - han maltratado mis caminos
  - han menospreciado mis caminos
  - han usado mal mis caminos
  lexicon: abuso / abusar; viae = caminos
  rationale: El latín abusi sunt expresa uso indebido, no solo rechazo intelectual. "Han abusado de" conserva la fuerza moral y la relación con "mis caminos" sin suavizarla hacia una mera desobediencia.
- source_word: vias meas
  english_pob_choice: my ways
  chosen_spanish: mis caminos
  alternatives_spanish:
  - mis vías
  - mis sendas
  - mis caminos de vida
  lexicon: via = camino
  rationale: '"Caminos" es el equivalente más natural en español bíblico para viae y mantiene la imagen de conducta o manera de vivir sin introducir una explicación adicional.'
- source_word: mirabuntur
  english_pob_choice: will be astonished
  chosen_spanish: se asombrarán
  alternatives_spanish:
  - se maravillarán
  - quedarán asombrados
  lexicon: mirari = asombrarse, maravillarse
  rationale: '"Se asombrarán" refleja el futuro pasivo/deponente con claridad y suena natural en español contemporáneo, manteniendo el impacto del verbo latino.'
- source_word: in cruciamentis commorabuntur
  english_pob_choice: will remain in torments
  chosen_spanish: en tormentos permanecerán
  alternatives_spanish:
  - permanecerán en tormentos
  - seguirán en tormentos
  - quedarán en tormentos
  lexicon: cruciamenta = tormentos; commorari = permanecer, demorarse
  rationale: El latín une la idea de permanencia con un estado de sufrimiento. "En tormentos permanecerán" preserva el orden y la gravedad del original, sin convertirlo en una interpretación más explícita que el texto.
- source_word: hii qui eos proiecerunt in contemptu
  english_pob_choice: those who cast them aside in contempt
  chosen_spanish: aquellos que los desecharon con desprecio
  alternatives_spanish:
  - los que los arrojaron con desprecio
  - los que los apartaron con desprecio
  - aquellos que los descartaron con desprecio
  lexicon: proicere = arrojar, desechar, echar fuera; in contemptu = con desprecio
  rationale: '"Desecharon" recoge bien la fuerza de proiecerunt en este contexto de rechazo hostil. "Con desprecio" traduce in contemptu de forma directa y idiomática, sin perder el matiz de desprecio activo.'
theological_decisions:
- issue: Retribución escatológica y permanencia en tormentos
  english_pob_reading: those who cast them aside in contempt will remain in torments
  chosen_spanish_reading: aquellos que los desecharon con desprecio permanecerán en tormentos
  alternative_spanish_readings:
  - aquellos que los rechazaron con desprecio quedarán en tormentos
  - aquellos que los arrojaron lejos con desprecio seguirán en tormentos
  rationale: El latín presenta una retribución futura y duradera. Se mantiene la dureza del juicio sin añadir detalles doctrinales no presentes en el verso.
  doctrine_reference: escatología del juicio; retribución final
translation_notes:
  revision_awareness: 'No se aplicaron revisiones al pasaje: el estado más reciente indica que no hubo cambios necesarios y el cotejo cruzado mostró alta concordancia.'
  spanish_consistency_notes:
  - 'Se conserva el paralelismo de dos grupos: quienes abusaron de los caminos de Dios y quienes los desecharon con desprecio.'
  - Se mantiene el futuro en ambos miembros ('se asombrarán' / 'permanecerán') para reflejar el tono profético del latín.
  - Se eligió 'caminos' para viae por ser la opción más natural y coherente con el registro bíblico en español.
  - No se introdujo 'SEÑOR' ni otros sustitutos teológicos porque el texto fuente no contiene el nombre divino ni una cita directa del hebreo/greigo que lo requiera.
