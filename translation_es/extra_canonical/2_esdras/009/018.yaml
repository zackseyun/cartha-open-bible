translation:
  language: es
  text: Y entonces[a], cuando estaba preparando para ellos —para los que ahora existen—, antes de que se hiciera para ellos la era en la que habitarían, nadie me contradijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando estaba preparando para los que ahora son, antes de que se hiciera para ellos la era en la que habitarían, nadie me contradijo entonces»; una lectura alternativa histórica añade «porque no había nadie», pero eso no aparece en el latín base aquí.'
    reason: Conservar la alternativa documentada por el English POB sin tratar la expansión final como parte del texto latino principal.
lexical_decisions:
- source_word: et tunc
  english_pob_choice: And then
  chosen_spanish: Y entonces
  alternatives_spanish:
  - Y luego
  - Entonces
  lexicon: et; tunc
  rationale: Conservo el enlace temporal explícito del latín y el valor de secuencia con una coordinación natural en español.
- source_word: cum essem parans eis
  english_pob_choice: when I was preparing for them
  chosen_spanish: mientras estaba preparándolos
  alternatives_spanish:
  - cuando los estaba preparando
  - al estar preparándolos
  lexicon: cum; parans; eis
  rationale: El latín expresa una acción en curso; en español, 'mientras estaba preparándolos' comunica mejor la simultaneidad sin perder el sentido dirigido 'para ellos' que ya queda implícito por el dativo y el contexto.
- source_word: his qui nunc
  english_pob_choice: those who now exist
  chosen_spanish: a aquellos que ahora existen
  alternatives_spanish:
  - a los que ahora son
  - a quienes ahora existen
  lexicon: his qui nunc
  rationale: Mantengo la referencia a los seres que 'ahora existen' como el audit trail inglés, con una formulación natural en español y el matiz de entidad presente.
- source_word: antequam fieret illis saeculum
  english_pob_choice: before the age was made for them
  chosen_spanish: antes de que se hiciera para ellos la era
  alternatives_spanish:
  - antes de que se formara para ellos el siglo
  - antes de que existiera para ellos la era
  lexicon: antequam; fieret; saeculum
  rationale: '''Saeculum'' aquí conserva mejor ''era'' que ''siglo''; ''se hiciera'' refleja el pasivo del verbo ''fieri'' y su carácter de evento de constitución.'
- source_word: in quo inhabitarent
  english_pob_choice: in which they would dwell
  chosen_spanish: en la que habitarían
  alternatives_spanish:
  - en la cual vivirían
  - donde morarían
  lexicon: in quo; inhabitarent
  rationale: '''Habitarían'' mantiene el futuro en relación con el pasado y conserva el registro bíblico sin arcaísmo excesivo.'
- source_word: et nemo contradixit mihi
  english_pob_choice: no one contradicted me
  chosen_spanish: nadie me contradijo
  alternatives_spanish:
  - nadie se opuso a mí
  - ninguno me contradijo
  lexicon: et nemo; contradixit mihi
  rationale: La forma breve y directa reproduce fielmente la negación simple del latín, sin añadir explicaciones ausentes del texto base.
theological_decisions:
- issue: Preexistence/temporal sequence of divine preparation
  english_pob_reading: And then, when I was preparing for them—for those who now exist—before the age was made for them in which they would dwell, no one contradicted me.
  chosen_spanish_reading: Y entonces, mientras estaba preparándolos —a aquellos que ahora existen—, antes de que se hiciera para ellos la era en la que habitarían, nadie me contradijo.
  alternative_spanish_readings:
  - Y entonces, cuando los estaba preparando...
  - Y entonces, al prepararlos...
  rationale: La traducción conserva la secuencia temporal y la distinción entre la preparación previa y la existencia actual de los destinatarios, sin agregar el explicativo 'porque no había nadie' que no está en el latín principal.
  doctrine_reference: 2 Esdras 9:18; compare the Latin witness against the Syriac explanatory expansion noted in audit context.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente que corrige dos problemas del borrador inglés: la omisión de ''et tunc'' y ''eis'', y la adición no atestiguada de ''for there was no one''. La redacción española refleja solo el latín base y deja constancia de la alternativa expandida en una nota anclada.'
  spanish_consistency_notes:
  - Se tradujo 'saeculum' como 'era' en coherencia con el valor temporal amplio del latín.
  - Se evitó introducir 'Señor' o vocabulario doctrinal no presente en el versículo.
  - La nota al pie está anclada en '[a]' y no introduce elementos fuera del alcance del testimonio latino principal.
