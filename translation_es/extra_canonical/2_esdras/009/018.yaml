    reason: Conservar la alternativa documentada por el English POB sin tratar la expansión final como parte del texto latino principal.
  revision_rationale: Se corrige la relación sintáctica de «parans eis» para reflejar el dativo latino («para ellos») en vez de un objeto directo («preparándolos»). También se revisa la nota para preservar la alternativa documentada, pero aclarando que la expansión «porque no había nadie» no pertenece al latín base usado en este pasaje.
