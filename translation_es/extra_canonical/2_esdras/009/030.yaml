  text: 'y dijiste, diciendo[a]: «Escúchame, oh Israel, y da oído a mis palabras, oh descendencia de Jacob».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «y dijiste: “Escúchame, oh Israel, y da oído a mis palabras, oh descendencia de Jacob”».

