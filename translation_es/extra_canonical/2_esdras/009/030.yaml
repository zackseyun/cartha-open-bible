    reason: La fuente latina «dicens dixisti» conserva una duplicación verbal de estilo semítico; el texto principal la refleja, mientras esta alternativa la suaviza en español.
lexical_decisions:
- source_word: dicens dixisti
  english_pob_choice: and you said, saying
  chosen_spanish: y dijiste
  alternatives_spanish:
  - y dijiste, diciendo
  - y dijiste, al decir
  lexicon: Latin dicere
  rationale: 'El latín conserva una pleonasma semítica con valor estilístico: dicens dixisti. En español, la duplicación puede mantenerse de forma natural con una nota, pero en el texto principal basta «y dijiste» para no sonar forzado; el complemento «diciendo» queda reflejado en la decisión textual y la nota.'
- source_word: audi me
  english_pob_choice: Hear me
  chosen_spanish: Escúchame
  alternatives_spanish:
  - Óyeme
  - Escúchame, por favor
  lexicon: Latin audire
  rationale: «Escúchame» comunica el imperativo directo y solemne de una invocación profética, más natural que un calco rígido en español actual.
- source_word: et semen
  english_pob_choice: and give ear to my words, O seed of Jacob
  chosen_spanish: oh descendencia de Jacob
  alternatives_spanish:
  - oh semilla de Jacob
  - oh linaje de Jacob
  lexicon: Latin semen
  rationale: El latín fuente está fragmentario en este punto, pero el contexto del pasaje y la versión inglesa auditable preservan el vocativo. «Descendencia» evita la literalidad ambigua de «semilla» en español, manteniendo la referencia genealógica.
theological_decisions:
- issue: Tratamiento del nombre divino en un contexto de apelación profética indirecta
  english_pob_reading: O seed of Jacob
  chosen_spanish_reading: oh descendencia de Jacob
  alternative_spanish_readings:
  - oh semilla de Jacob
  - oh linaje de Jacob
  rationale: No aparece el Tetragrámaton ni κύριος en este segmento, así que no se introduce ninguna convención de reemplazo divino. La decisión teológica relevante es preservar la forma vocativa del llamado al pueblo del pacto sin añadir explicaciones doctrinales ajenas al texto.
  doctrine_reference: No aplica; apelación a Israel como pueblo de Jacob
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la omisión de la duplicación verbal latina («dicens dixisti») y la observación de que no debe alterarse el orden del saludo sin apoyo en el fragmento. Por ello, el español conserva el valor de discurso directo con una construcción natural, sin forzar una segunda repetición verbal en el cuerpo del texto.
  spanish_consistency_notes:
  - Se usa comillas angulares para el discurso directo, en estilo editorial español.
  - «oh» se mantiene como marcador vocativo solemne, acorde con el registro bíblico y sin convertirlo en una mera exclamación moderna.
  - «descendencia de Jacob» se prefiere por claridad semántica frente a «semilla de Jacob», aunque esta última queda recogida en la nota como alternativa literal.
