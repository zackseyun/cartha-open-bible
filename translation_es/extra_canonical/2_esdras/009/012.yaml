  - severity: low
    issue: '''estos deben conocerlo'' suena menos natural que una formulación personal'
    rationale: El valor sintáctico de 'hos oportet ... cognoscere' está bien entendido, pero en español continuo 'ellos tendrán que conocerlo' o 'estos han de conocerlo' suele leerse mejor que 'estos deben conocerlo'.
