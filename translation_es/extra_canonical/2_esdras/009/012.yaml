  to: y mientras todavía seguía abierto para ellos un camino[a] de arrepentimiento, no entendieron, sino que lo despreciaron; ellos tendrán que conocerlo después de la muerte, en tormento.
  rationale: Se ajusta una expresión demasiado literal para lograr un español más natural y eclesialmente legible, sin perder la imagen de una vía aún abierta al arrepentimiento. También se suaviza el deíctico 'estos' en favor de una formulación más fluida, manteniendo intacto el sentido de necesidad futura tras la muerte en tormento.
