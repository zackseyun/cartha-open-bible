translation:
  language: es
  text: y mientras todavía seguía abierto para ellos un camino[a] de arrepentimiento, no entendieron, sino que lo despreciaron; ellos tendrán que conocerlo después de la muerte, en tormento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un lugar de arrepentimiento'. El latín dice literalmente 'lugar', pero 'camino' se usa aquí para conservar la idea de una vía aún abierta de volver atrás en un español más natural.
    reason: Preservar la alternativa más literal del original y justificar la mejora idiomática en español.
lexical_decisions:
- source_word: paenitentiae locus
  english_pob_choice: a place of repentance
  chosen_spanish: un lugar de arrepentimiento
  alternatives_spanish:
  - un espacio de arrepentimiento
  - una oportunidad de arrepentirse
  lexicon: paenitentia
  rationale: El latín expresa un “lugar” o ámbito disponible para paenitentia; en español, “lugar de arrepentimiento” conserva la imagen espacial sin convertirla en una mera paráfrasis. “Oportunidad de arrepentirse” es posible, pero pierde la concreción de locus.
- source_word: apertum esset / apertum
  english_pob_choice: was still open
  chosen_spanish: todavía les estaba abierto
  alternatives_spanish:
  - seguía abierto
  - aún estaba abierto
  lexicon: apertus
  rationale: “Todavía les estaba abierto” mantiene el sentido de disponibilidad continua y conserva el matiz de estado abierto hacia ellos.
- source_word: non intellexerunt
  english_pob_choice: they did not understand
  chosen_spanish: no entendieron
  alternatives_spanish:
  - no comprendieron
  - no lo entendieron
  lexicon: intellegere
  rationale: Se traduce con el verbo natural y directo “entender”, que reproduce bien el alcance cognitivo de intellexerunt. Se omite un objeto explícito porque el latín no lo expresa aquí.
- source_word: spreverunt
  english_pob_choice: scorned it
  chosen_spanish: lo despreciaron
  alternatives_spanish:
  - lo menospreciaron
  - lo desestimaron
  lexicon: spernere
  rationale: “Despreciar” conserva con buena fuerza el rechazo activo de spreverunt; el pronombre “lo” retoma el “lugar de arrepentimiento” implícitamente referido.
- source_word: hos oportet ... cognoscere
  english_pob_choice: these must know it after death in torment
  chosen_spanish: estos deben conocerlo después de la muerte en tormento
  alternatives_spanish:
  - estos han de conocerlo después de la muerte en tormento
  - a estos les toca conocerlo después de la muerte en tormento
  lexicon: oportet; cognoscere
  rationale: El latín presenta a hos como sujeto del infinitivo dependiente de oportet; por eso se traduce “estos deben...”, no “para estos es necesario”. “Conocerlo” conserva el complemento implícito de cognoscere, entendido por contexto como la realidad rechazada y su consecuencia.
theological_decisions:
- issue: Relación entre el “lugar de arrepentimiento” abierto y el juicio posterior
  english_pob_reading: while a place of repentance was still open to them ... these must know it after death in torment
  chosen_spanish_reading: mientras todavía les estaba abierto un lugar de arrepentimiento ... estos deben conocerlo después de la muerte en tormento
  alternative_spanish_readings:
  - mientras todavía tenían abierta una oportunidad de arrepentirse ... estos deben conocerlo después de la muerte en tormento
  - mientras seguía abierto para ellos un lugar de penitencia ...
  rationale: La cláusula mantiene la tensión entre una oferta real rechazada y la retribución posterior. No se suaviza “tormento” ni se espiritualiza “conocerlo”; el texto vincula rechazo presente y conocimiento penal futuro.
  doctrine_reference: juicio retributivo; persistencia de la oportunidad de arrepentimiento antes del juicio
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés auditado, que corrigió la sintaxis para hacer a 'these' sujeto de 'must know' y añadió el objeto implícito 'it'. En español se reflejó esa estructura con 'estos deben conocerlo', manteniendo la conexión causal y temporal del final del versículo sin introducir una nota al pie no anclada.
  spanish_consistency_notes:
  - Se mantiene 'arrepentimiento' para paenitentia, conforme al uso project-level salvo indicación contraria.
  - Se traduce 'tormentum' por 'tormento' para conservar la dureza del término.
  - No se introducen mayúsculas teológicas innecesarias; 'muerte' y 'tormento' permanecen en minúscula conforme al estilo español.
