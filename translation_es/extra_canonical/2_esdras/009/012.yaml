  yaml_path: translation/extra_canonical/2_esdras/009/012.yaml
  text: and while a place of repentance was still open to them[a], they did not understand but scorned it; these must know it after death in torment.
  footnotes:
  - marker: a
    text: Or 'and while a place of repentance was still open to them did not understand but scorned it—for these it is necessary to know after death in torment.'.
