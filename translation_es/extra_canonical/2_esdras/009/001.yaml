lexical_decisions:
- source_word: metiens metire
  english_pob_choice: Measure carefully within yourself
  chosen_spanish: Mide cuidadosamente dentro de ti mismo
  alternatives_spanish:
  - Mide dentro de ti mismo
  - Mide con cuidado dentro de ti mismo
  lexicon: medir
  rationale: La forma latina duplicada intensifica la orden; por eso «cuidadosamente» comunica mejor la fuerza enfática que un imperativo simple. «Dentro de ti mismo» conserva el sentido reflexivo de la evaluación interior.
- source_word: respondit ad me et dixit
  english_pob_choice: He answered me and said
  chosen_spanish: Él me respondió y dijo
  alternatives_spanish:
  - Me respondió y dijo
  - Respondió y dijo
  lexicon: responder / decir
  rationale: Mantiene la construcción narrativa directa del original latino sin añadir interpretación. Se explicita el sujeto para una lectura fluida en español.
- source_word: quoniam transiuit pars quaedam signorum quae praedicta sunt
  english_pob_choice: when you see that some part of the signs foretold has passed by
  chosen_spanish: cuando veas que ha pasado una parte de las señales que fueron anunciadas
  alternatives_spanish:
  - cuando veas que ha pasado parte de las señales anunciadas
  - cuando veas que se ha cumplido una parte de las señales predichas
  lexicon: signa / praedicta
  rationale: «Señales» traduce mejor signa en este contexto escatológico que «señales prodigiosas» u otro añadido. «Fueron anunciadas» conserva el valor de praedicta sin cargar el texto con un calco rígido de «predichas».
theological_decisions:
- issue: Intensificación semítica detrás de la construcción latina
  english_pob_reading: Measure carefully within yourself
  chosen_spanish_reading: Mide cuidadosamente dentro de ti mismo
  alternative_spanish_readings:
  - Mide dentro de ti mismo
  - Mide exactamente dentro de ti mismo
  rationale: La revisión auditada explica que el latinismo refleja una construcción semítica enfática; en español, «cuidadosamente» recupera esa exactitud sin sobreinterpretar el mandato.
  doctrine_reference: No doctrinal claim; textual/philological emphasis only.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «Measure within yourself» a «Measure carefully within yourself» para reflejar la intensidad del giro semítico subyacente; la redacción española incorpora esa intensificación con «cuidadosamente».
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y moderno, evitando fórmulas eclesiásticas innecesarias.
  - «Señales» conserva la referencia apocalíptica del pasaje sin introducir términos técnicos no presentes en la fuente.
  - El versículo queda abierto al corte del flujo textual del original, que continúa después de la cláusula traducida.
