  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones para «señales» y el matiz enfático de «cuidadosamente» están bien justificadas. La nota alternativa del inglés debe mantenerse, pero conviene adaptarla al español revisado para que siga siendo idiomática.
