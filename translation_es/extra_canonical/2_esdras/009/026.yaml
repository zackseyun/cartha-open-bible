reference: 2 Esdras 9:26
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: Ardat, et sedi ibi in floribus et de herbis agri manducaui et facta est esca earum in saturitatem. Et factum est post dies
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/009/026.yaml
  text: So I went[a], as he told me, into the field called Ardat, and I sat there among the flowers. I ate the herbs of the field, and their food satisfied me.
  footnotes:
  - marker: a
    text: Or 'their food became enough to satisfy me.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:48:18Z'
    unchanged: false
    changes_summary: 'Tightened wording for natural English and closer alignment with the Latin: removed the unnecessary expansion ''that is,'' rendered ''called Ardat'' more directly, and simplified the final clause to ''their food satisfied me'' for a more natural equivalent of ''facta est esca earum in saturitatem.'''
translation:
  language: es
  text: Así que fui, como me había dicho, al campo llamado Ardat, y me senté allí entre las flores. Comí las hierbas del campo, y el alimento procedente de ellas[a] me sació.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «y su alimento me satisfizo» o «y el alimento procedente de ellas me bastó para saciarme».'
    reason: Preservar la formulación más literal y la alternativa de sentido más explícito para esca earum ... in saturitatem.
lexical_decisions:
- source_word: Ardat
  english_pob_choice: field called Ardat
  chosen_spanish: el campo llamado Ardat
  alternatives_spanish:
  - el campo que se llama Ardat
  - el campo conocido como Ardat
  lexicon: toponym
  rationale: Conservo el nombre propio sin adaptar, y traduzco el participio con una fórmula natural en español que mantiene la designación del lugar.
- source_word: manducaui
  english_pob_choice: I ate
  chosen_spanish: Comí
  alternatives_spanish:
  - Yo comí
  - He comido
  lexicon: edo
  rationale: El perfecto latino se vierte de forma simple y directa en español, sin sobrecargar el estilo.
- source_word: herbis agri
  english_pob_choice: the herbs of the field
  chosen_spanish: las hierbas del campo
  alternatives_spanish:
  - las hierbas del campo cultivado
  - las hierbas del llano
  lexicon: herba
  rationale: «Hierbas» refleja el sentido vegetal básico de herbae; «del campo» conserva la relación con agri sin introducir especificaciones no atestiguadas.
- source_word: esca earum
  english_pob_choice: their food
  chosen_spanish: su alimento
  alternatives_spanish:
  - el alimento de ellas
  - el alimento procedente de ellas
  lexicon: esca
  rationale: El latín expresa una comida/alimento derivado de ellas o perteneciente a ellas. «Su alimento» es la forma más natural en español y conserva la relación de origen sin decidir en exceso la sintaxis latina.
- source_word: in saturitatem
  english_pob_choice: satisfied me
  chosen_spanish: me satisfizo
  alternatives_spanish:
  - me dejó satisfecho
  - me sació
  lexicon: saturitas
  rationale: «Satisfizo» comunica el efecto de saciedad con sobriedad. «Sació» sería también posible, pero el contexto español de esta línea queda más equilibrado con «satisfizo».
translation_notes:
  revision_awareness: 'Tomé como base la revisión más reciente del inglés POB, que simplificó la cláusula final a una formulación natural: «their food satisfied me». En español, «su alimento me satisfizo» mantiene esa naturalidad y también deja abierta la relación de fuente implícita en el latín esca earum.'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico sin recurrir a un castellano arcaizante.
  - No se introdujo puntuación o expansión que altere la secuencia breve del latín.
  - La nota textual evita la ambigüedad entre posesión y procedencia que puede surgir de esca earum en español.
