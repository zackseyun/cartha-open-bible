  rationale: Se ajusta una sola frase para evitar una ambigüedad española que el inglés ya había señalado en su historial de revisión. 'El alimento procedente de ellas' transmite mejor esca earum, y 'me sació' expresa con mayor naturalidad in saturitatem. La nota conserva la opción más literal documentada en el rastro inglés.
