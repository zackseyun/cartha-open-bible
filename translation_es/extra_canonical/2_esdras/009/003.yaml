translation:
  language: es
  text: y confusión entre los pueblos, pensamientos entre las naciones, inestabilidad entre los gobernantes, tumulto entre los príncipes. Entonces entenderás que era acerca de estas cosas que hablaba el Altísimo[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase queda abierta porque el texto latino conservado se interrumpe en 'altis-', y el sentido continúa en el versículo siguiente.
    reason: Aclara la elipsis y justifica la formulación española más natural sin ocultar que la fuente está truncada.
lexical_decisions:
- source_word: populorum turbatio
  english_pob_choice: confusion among peoples
  chosen_spanish: confusión entre los pueblos
  alternatives_spanish:
  - turbación entre los pueblos
  - confusión de los pueblos
  lexicon: turbatio -> confusión / turbación
  rationale: ‘Confusión’ refleja bien la perturbación colectiva y es natural en español; ‘turbación’ conserva la familia léxica latina, pero suena más marcada. Se mantiene el plural ‘pueblos’ para corresponder a populorum.
- source_word: gentium cogitationes
  english_pob_choice: thoughts among nations
  chosen_spanish: pensamientos entre las naciones
  alternatives_spanish:
  - cavilaciones entre las naciones
  - planes entre las naciones
  lexicon: cogitationes -> pensamientos
  rationale: La revisión inglesa prefirió ‘thoughts’ frente a una interpretación más activa como ‘scheming’. En español, ‘pensamientos’ conserva esa literalidad sin introducir intención maliciosa no explícita en el latín.
- source_word: ducum inconstantia
  english_pob_choice: instability among leaders
  chosen_spanish: inestabilidad entre los gobernantes
  alternatives_spanish:
  - inconstancia entre los líderes
  - inestabilidad de los líderes
  lexicon: inconstantia -> inestabilidad / inconstancia
  rationale: ‘Inestabilidad’ comunica el estado de falta de firmeza con mayor claridad en español actual; ‘inconstancia’ es posible, pero sugiere más una falla moral individual que una condición general de gobierno.
- source_word: principum turbatio
  english_pob_choice: turmoil among rulers
  chosen_spanish: tumulto entre los príncipes
  alternatives_spanish:
  - confusión entre los príncipes
  - turbación entre los príncipes
  lexicon: turbatio -> tumulto / turbación
  rationale: ‘Tumulto’ conserva la idea de agitación pública y se ajusta bien al paralelismo con los otros sustantivos. ‘Príncipes’ sigue el valor político de principes sin modernizarlo indebidamente.
- source_word: Tunc intelleges
  english_pob_choice: Then you will understand
  chosen_spanish: Entonces entenderás
  alternatives_spanish:
  - Entonces comprenderás
  - Y entonces entenderás
  lexicon: intelleges -> entenderás
  rationale: Se conserva la segunda persona singular futura y el valor directo de intelleges. ‘Entenderás’ es claro y suficientemente literal.
- source_word: de his erat
  english_pob_choice: it was about these things
  chosen_spanish: de estas cosas era
  alternatives_spanish:
  - se trataba de estas cosas
  - era acerca de estas cosas
  lexicon: de his erat -> era de estas cosas / se trataba de estas cosas
  rationale: Se mantiene la construcción cercana al latín y al flujo de la POB inglesa, dejando implícito el complemento que continúa en el versículo siguiente. ‘Se trataba de’ sería más idiomático, pero añade una reescritura mayor.
- source_word: altis-
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Altísimo
  lexicon: altissimus -> Altísimo
  rationale: ‘Altísimo’ es el equivalente estándar y fiel para el título divino latino. La frase queda abierta porque el texto fuente está cortado en ‘altis-’, y la POB inglesa también conserva el inicio truncado del enunciado.
theological_decisions:
- issue: Título divino implícito en 'altis-'
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - Dios Altísimo
  - el Altísimo
  rationale: El fragmento latino termina truncado antes de completar el título; se traduce el inicio identificable sin expandir más allá de la evidencia. ‘El Altísimo’ mantiene la referencia reverente sin añadir terminología no presente.
  doctrine_reference: Divine title / incomplete-source handling
- issue: Serie de perturbaciones políticas y sociales
  english_pob_reading: confusion among peoples, thoughts among nations, instability among leaders, turmoil among rulers
  chosen_spanish_reading: confusión entre los pueblos, pensamientos entre las naciones, inestabilidad entre los gobernantes, tumulto entre los príncipes
  alternative_spanish_readings:
  - turbación entre los pueblos, pensamientos entre las naciones, inestabilidad entre los líderes, tumulto entre los gobernantes
  rationale: Se preserva el paralelismo enumerativo del latín sin convertirlo en una interpretación escatológica más amplia que la que el verso mismo expresa. ‘Pensamientos’ evita cargar cogitationes con una connotación de conspiración que no está en el texto.
  doctrine_reference: Textual restraint / eschatological description
translation_notes:
  revision_awareness: 'La POB inglesa revisada eliminó una frase inicial no sustentada sobre una sacudida del mundo/lugares, conservó cogitationes como ‘thoughts’ en vez de ‘scheming’, y añadió el arranque de la cláusula conclusiva ‘Then you will understand...’. La versión española sigue esa revisión: no introduce la frase no atestiguada, mantiene ‘pensamientos’, y conserva el inicio truncado de la conclusión conforme al texto fuente.'
  spanish_consistency_notes:
  - Se usa ‘Altísimo’ para el título divino, coherente con el estándar POB para lat. altissimus.
  - Se evita ‘SEÑOR’ porque aquí no hay un reemplazo de Yahvé en el texto latino, sino un título divino distinto.
  - ‘Príncipes’ se mantiene por paralelismo con el latín principes; no se sustituye por ‘gobernantes’ en esa posición para no borrar la distinción retórica entre ducum y principum.
