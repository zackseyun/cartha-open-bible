base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/009/022.yaml
  text: Let my grape and my planting be preserved, because I completed these with much labor. But if you still delay another seven days—
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:48:14Z'
    unchanged: false
    changes_summary: Replaced the unrelated opening clause with the Latin-based sense of preservation; rendered servuietur as 'be preserved,' perfeci as 'completed' rather than 'perfected,' and included the final clause about delaying another seven days.
translation:
  language: es
  text: Que sean preservadas mi uva y mi plantación, porque con mucho trabajo completé esto. Pero si todavía demoras otros siete días—
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: seruietur
  english_pob_choice: be preserved
  chosen_spanish: Sea preservada
  alternatives_spanish:
  - Sea guardada
  - Sea conservada
  lexicon: servo
  rationale: El latín pasivo indica preservación/protección más que servidumbre; 'sea preservada' reproduce ese valor y mantiene el tono de súplica/voluntad del original.
- source_word: acinus meus
  english_pob_choice: my grape
  chosen_spanish: mi uva
  alternatives_spanish:
  - mi racimo
  - mi vid
  lexicon: acinus
  rationale: POB eligió 'grape'; en español 'uva' es la correspondencia más directa y natural para conservar la imagen agrícola sin sobredeterminarla.
- source_word: plantatio mea
  english_pob_choice: my planting
  chosen_spanish: mi plantación
  alternatives_spanish:
  - mi siembra
  - mi plantío
  lexicon: plantatio
  rationale: '''Plantación'' conserva el sustantivo concreto de actividad/resultante de plantar, alineado con el paralelo de ''my planting'' en inglés.'
- source_word: cum multo labore
  english_pob_choice: with much labor
  chosen_spanish: con mucho trabajo
  alternatives_spanish:
  - con mucho esfuerzo
  - con gran fatiga
  lexicon: labor
  rationale: '''Trabajo'' expresa bien la carga y el esfuerzo implicados en ''labor'' sin perder claridad en español moderno.'
- source_word: perfeci haec
  english_pob_choice: I completed these
  chosen_spanish: completé estas cosas
  alternatives_spanish:
  - terminé estas cosas
  - llevé esto a cabo
  lexicon: perficio
  rationale: POB corrigió 'perfected' a 'completed'; 'completé' preserva el sentido de llevar a término sin añadir perfeccionismo ajeno al latín.
- source_word: Tu autem si adhuc intermittas septem dies alios
  english_pob_choice: But if you still delay another seven days
  chosen_spanish: Pero si todavía dilatas otros siete días—
  alternatives_spanish:
  - Pero si todavía te detienes otros siete días—
  - Pero si aún demoras otros siete días—
  lexicon: intermitto
  rationale: '''Dilatas'' comunica la idea de aplazar o posponer que el inglés audit trail fijó como ''delay'', manteniendo la suspensión final con raya.'
theological_decisions:
- issue: Preservation versus destruction in the opening clause
  english_pob_reading: Let my grape and my planting be preserved
  chosen_spanish_reading: Sea preservada mi uva y mi plantación
  alternative_spanish_readings:
  - Que se conserve mi uva y mi plantación
  - Que mi uva y mi plantación sean preservadas
  rationale: Sigo la revisión que descartó una lectura de destrucción ajena al latín y adopto una forma pasiva desiderativa compatible con el contexto.
  doctrine_reference: Textual criticism / source fidelity
translation_notes:
  revision_awareness: Esta redacción sigue la revisión más reciente que sustituyó la cláusula inicial errónea por el sentido latino de preservación, tradujo perfeci como 'completed' y conservó la cláusula final sobre retrasar siete días más.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' y no aplica terminología divina en este versículo.
  - '''Uva'' y ''plantación'' conservan la imaginería agrícola del latín y del audit trail inglés.'
  - La raya final refleja que el verso queda truncado en la fuente proporcionada.
