source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: et factum est post triginta annos, exaudivit me Deus ancillae tuae et pervidit humilitatem meam et adtendit tribulationi meae et dedit mihi filium. et iucundata sum super eum valde ego et vir meus et omnes cives mei, et honorificabamus valde Fortem.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/009/045.yaml
  text: And it happened after thirty years that God heard me[a], your female slave, and saw my humiliation, and paid attention to my distress, and gave me a son. And I rejoiced over him greatly, I and my husband and all my fellow citizens, and we greatly honored the Mighty One.
  footnotes:
  - marker: a
    text: Or 'the God of your servant heard me'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:48:37Z'
    unchanged: false
    changes_summary: Changed 'your servant' to 'your female slave' to reflect Latin ancillae more accurately and removed the extra comma after 'servant'.
translation:
  language: es
  text: Y sucedió que, después de treinta años, Dios me escuchó, tu esclava,[a] y vio mi humillación, y atendió a mi tribulación, y me dio un hijo. Y me alegré mucho por él, yo y mi marido y todos mis conciudadanos, y honrábamos mucho al Poderoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Dios de tu esclava me oyó».'
    reason: previous_rendering
lexical_decisions:
- source_word: exaudivit me
  english_pob_choice: heard me
  chosen_spanish: me escuchó
  alternatives_spanish:
  - me oyó
  - me atendió
  lexicon: audio/hear
  rationale: El latín refleja simplemente que Dios respondió al clamor de la hablante; «me escuchó» comunica recepción efectiva sin añadir interpretaciones. «Oír» sería posible, pero «escuchar» suena más natural en español bíblico contemporáneo para una respuesta atenta.
- source_word: ancillae tuae
  english_pob_choice: your female slave
  chosen_spanish: tu esclava
  alternatives_spanish:
  - tu sierva
  - tu criada
  lexicon: δοῦλος / ancilla
  rationale: El audit trail inglés corrigió a «female slave» para reflejar ancillae. En español, «esclava» conserva esa fuerza léxica. «Sierva» suavizaría indebidamente el término y perdería la carga de dependencia servil.
- source_word: humilitatem meam
  english_pob_choice: my humiliation
  chosen_spanish: mi humillación
  alternatives_spanish:
  - mi abatimiento
  - mi bajeza
  lexicon: humilitas
  rationale: «Humillación» sigue de cerca el latín y mantiene el sentido de aflicción o condición rebajada sin convertirlo en una abstracción excesiva.
- source_word: tribulationi meae
  english_pob_choice: my distress
  chosen_spanish: mi tribulación
  alternatives_spanish:
  - mi angustia
  - mi aflicción
  lexicon: tribulatio
  rationale: «Tribulación» conserva el registro bíblico y la intensidad de una aflicción real. «Angustia» es viable, pero menos cercana al campo semántico del latín.
- source_word: dedit mihi filium
  english_pob_choice: gave me a son
  chosen_spanish: me dio un hijo
  alternatives_spanish:
  - me concedió un hijo
  lexicon: give/child
  rationale: La construcción directa reproduce fielmente el hecho narrativo sin amplificación. «Concedió» añadiría matiz de favor que el texto no exige explícitamente.
- source_word: iucundata sum super eum valde
  english_pob_choice: I rejoiced over him greatly
  chosen_spanish: me alegré muchísimo por él
  alternatives_spanish:
  - me llené de gozo por él
  - me regocijé mucho por él
  lexicon: rejoice
  rationale: «Me alegré muchísimo» es natural y conserva la intensidad de valde. «Por él» expresa el referente del gozo; no se fuerza un giro más solemne de lo que el latín requiere.
- source_word: vir meus
  english_pob_choice: my husband
  chosen_spanish: mi marido
  alternatives_spanish:
  - mi esposo
  lexicon: husband
  rationale: «Marido» es una equivalencia clara y sobria en español bíblico. «Esposo» sería también posible, pero «marido» suena más directo y menos formalizado.
- source_word: cives mei
  english_pob_choice: my fellow citizens
  chosen_spanish: mis conciudadanos
  alternatives_spanish:
  - mis compatriotas
  - mis vecinos
  lexicon: citizen
  rationale: «Conciudadanos» traduce con precisión cives mei y mantiene la referencia cívica del plural latino.
- source_word: honorificabamus valde Fortem
  english_pob_choice: we greatly honored the Mighty One
  chosen_spanish: honrábamos mucho al Poderoso
  alternatives_spanish:
  - honrábamos grandemente al Poderoso
  - dábamos gran honor al Poderoso
  lexicon: Fortis / honor
  rationale: Se conserva «el Poderoso» para Fortem, título reverente que el inglés POB ya fijó. «Honrábamos mucho» reproduce la acción comunitaria sin sobreexplicar el objeto del honor.
theological_decisions:
- issue: Identidad de Dios frente a 'Fortem'
  english_pob_reading: the Mighty One
  chosen_spanish_reading: el Poderoso
  alternative_spanish_readings:
  - el Fuerte
  - el Poderoso
  rationale: El latín Fortem funciona como título divino; «el Poderoso» mantiene la lectura reverente y evita homogeneizarlo con un simple adjetivo físico. Se preserva la tensión titulativa sin sustituirla por una fórmula eclesiástica no documentada aquí.
  doctrine_reference: Divine title / reverential naming
- issue: Valor de 'ancillae tuae' como autoidentificación
  english_pob_reading: your female slave
  chosen_spanish_reading: tu esclava
  alternative_spanish_readings:
  - tu sierva
  rationale: La revisión inglesa insiste en el valor fuerte de ancillae. En español se conserva «esclava» para no atenuar la autodesignación humilde de la hablante. No se suaviza a «sierva» porque eso borraría la decisión auditada del POB.
  doctrine_reference: Humility / servanthood
- issue: Posible ambigüedad de 'me heard' con la frase genitiva
  english_pob_reading: God heard me, your female slave
  chosen_spanish_reading: Dios me escuchó, a mí, tu esclava
  alternative_spanish_readings:
  - Dios oyó mi oración, tu esclava
  - el Dios de tu esclava me escuchó
  rationale: La revisión textual señala que el latín no significa 'el Dios de tu esclava', sino que 'me' es el objeto directo y la frase genitiva conserva la autoidentificación. En español se refleja esa sintaxis con una aposición marcada por comas.
  doctrine_reference: Textual/grammatical clarity
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail, que corrige la antigua interpretación ''the God of your servant'' y fija ''your female slave'' para ancillae tuae. También conserva la estructura acumulativa del latín: escuchó / vio / atendió / dio, sin fusionar esos verbos.'
  spanish_consistency_notes:
  - Se usa 'Dios' para Deus y 'el Poderoso' para Fortem, manteniendo el título distintivo sin domesticarlo.
  - Se mantiene 'esclava' en lugar de 'sierva' por coherencia con la revisión inglesa y con la fuerza de ancillae.
  - El tono es solemne pero no arcaizante; se evita 'oyó' como forma exclusiva porque 'escuchó' refleja mejor atención efectiva.
  - La puntuación separa las acciones en serie, siguiendo la acumulación latina y facilitando la lectura litúrgica.
