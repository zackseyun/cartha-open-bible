review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el latín y la auditoría inglesa: conserva la distinción léxica entre locutus sum (''he hablado'') y dico/dicam (''digo/diré''), y mantiene el contraste cuantitativo de que perecen más de los que serán salvados. Sin embargo, la nota al pie no refleja fielmente la alternativa inglesa documentada, porque omite el matiz de ''speak'' frente a ''say'' en la variante previa.'
  spanish_quality_summary: El español es claro, natural y digno. 'Antes he hablado' es comprensible, pero 'He hablado antes' suena algo más natural; aun así, no exige cambio. La única reparación necesaria es la nota al pie, para que represente correctamente la alternativa auditada en inglés y no repita básicamente el mismo sentido del texto principal.
  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos en este versículo. 'Salvados' es adecuado para salvabuntur, y 'perecen' preserva bien pereunt. La distinción hablar/decir está bien manejada en el texto principal.
  issues:
  - severity: medium
    issue: La nota al pie española no corresponde a la alternativa preservada en el POB inglés.
    rationale: 'La nota inglesa dice: "Or ''and now I speak, and I will speak afterward''". La nota española actual, "O ‘y ahora digo, y diré después’", no ofrece una variante real frente al texto principal; solo reordena levemente ''después''. Debe reflejar la alternativa con ''hablo/hablaré'' para preservar el historial de revisión léxica.'
  revised_spanish_text: '«Antes he hablado[a], y ahora digo, y después diré: muchos más perecen que los que serán salvados,»'
  revised_footnotes:
  - marker: a
    text: O ‘y ahora hablo, y hablaré después’.
    reason: previous_rendering
  revision_rationale: 'Se mantiene el texto principal porque es fiel al latín y al POB inglés. Solo se corrige la nota al pie para que preserve la alternativa histórica relevante: una redacción con ''hablo/hablaré'' en lugar de ''digo/diré''.'
