translation:
  language: es
  text: '«Antes he hablado[a], y ahora digo, y después diré: muchos más perecen que los que serán salvados,»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘y ahora digo, y diré después’.
    reason: alternative_reading
lexical_decisions:
- source_word: olim locutus sum
  english_pob_choice: I have spoken before
  chosen_spanish: Antes he hablado
  alternatives_spanish:
  - He hablado antes
  - Ya he hablado antes
  lexicon: loquor / locutus sum
  rationale: El latín usa el perfecto de 'hablar' con valor de acción ya realizada; 'antes' conserva el adverbio temporal de olim y 'he hablado' mantiene el perfecto español sin añadir contenido innecesario.
- source_word: nunc dico
  english_pob_choice: and now I say
  chosen_spanish: y ahora digo
  alternatives_spanish:
  - y ahora hablo
  - y ahora expreso
  lexicon: dico
  rationale: 'Se conserva la distinción revisada en el POB inglés entre ''speak'' y ''say'': aquí dico introduce el contenido declarado, por eso ''digo'' es más preciso que ''hablo''.'
- source_word: postea dicam
  english_pob_choice: and I will say afterward
  chosen_spanish: y después diré
  alternatives_spanish:
  - y luego diré
  - y diré después
  lexicon: dicam
  rationale: El futuro simple español reproduce bien el valor prospectivo de dicam; 'después' refleja postea con naturalidad en español.
- source_word: plures sunt qui pereunt quam qui salvabuntur
  english_pob_choice: many more perish than will be saved
  chosen_spanish: muchos más perecen que los que serán salvados
  alternatives_spanish:
  - muchos más perecen que los que se salvarán
  - son muchos más los que perecen que los que serán salvados
  lexicon: plures... quam... / pereo / salvo
  rationale: Se mantiene la comparación cuantitativa y la pasiva futura del latín. 'Serán salvados' preserva la forma pasiva y evita borrar la tensión entre perderse y salvarse.
theological_decisions:
- issue: Relación entre perecer y ser salvados en una afirmación de contraste cuantitativo
  english_pob_reading: many more perish than will be saved
  chosen_spanish_reading: muchos más perecen que los que serán salvados
  alternative_spanish_readings:
  - muchos más se pierden que los que serán salvados
  - muchos más perecen que los que se salvarán
  rationale: La frase latina es una comparación sobria de cantidad, no una expansión doctrinal. 'Perecen' conserva el peso de pereunt, y 'serán salvados' mantiene la pasiva futura sin convertirla en una formulación más interpretativa.
  doctrine_reference: Soteriología general; contraste escatológico del texto sin desarrollar más allá del enunciado.
translation_notes:
  revision_awareness: La revisión reciente confirmó que en el segmento latino conviene distinguir locutus sum de dico/dicam; por eso el español evita unificar todo como 'hablar'. La lectura final quedó sin cambios ulteriores tras el pass de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, aunque este versículo no lo contiene.
  - Se usa 'salvados' y no 'rescatados' para conservar el campo semántico de salvo/salvación del latín.
  - La puntuación reproduce el cierre con dos puntos antes de la sentencia explicativa, acorde con el latín y el POB inglés.
