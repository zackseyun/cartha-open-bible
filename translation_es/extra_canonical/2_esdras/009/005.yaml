source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'omne quod factum est in saeculo, initium per consummationem et consummatio manifesta, Sic et altissimi tempora : initia'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/009/005.yaml
  text: For just as everything that has come to be in the age has a beginning through an end[a], and the end is manifest,
  footnotes:
  - marker: a
    text: Or 'has a beginning through an ending, and the ending is made manifest,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:48:53Z'
    unchanged: false
    changes_summary: 'Revised to reflect the Latin more closely: rendered saeculo as ''age'' rather than ''world,'' preserved initium per consummationem more literally as ''a beginning through an end,'' and kept ''manifest'' for manifesta. Removed ''evident'' because it is not in the source.'
translation:
  language: es
  text: 'Porque, así como todo lo que ha llegado a ser en la era tiene un comienzo por medio de un fin[a], y el fin es manifiesto; así también los tiempos del Altísimo: los comienzos'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «consumación»; el latín transmite aquí una relación difícil, y la tradición textual auditada favorece leer el sentido como un comienzo ligado al fin y un fin manifiesto.
    reason: textual_variant
lexical_decisions:
- source_word: saeculo
  english_pob_choice: the age
  chosen_spanish: la era
  alternatives_spanish:
  - el siglo
  - el mundo
  - la edad
  lexicon: saeculum
  rationale: «Saeculo» aquí se refiere al orden temporal presente; «la era» conserva el valor de época/edad sin reducirlo a «mundo», y evita un tono demasiado técnico de «siglo».
- source_word: initium
  english_pob_choice: a beginning
  chosen_spanish: un comienzo
  alternatives_spanish:
  - un principio
  - un inicio
  lexicon: initium
  rationale: «Comienzo» es natural en español y mantiene la idea de inicio concreto y visible.
- source_word: per consummationem
  english_pob_choice: through an end
  chosen_spanish: a través de un fin
  alternatives_spanish:
  - por una consumación
  - mediante un fin
  lexicon: per + consummatio
  rationale: La lectura auditada del latín conserva la relación preposicional; «a través de un fin» reproduce la estructura de manera legible en español sin imponer una interpretación doctrinal adicional.
- source_word: consummatio manifesta
  english_pob_choice: the end is manifest
  chosen_spanish: el fin es manifiesto
  alternatives_spanish:
  - el fin es evidente
  - la consumación es manifiesta
  lexicon: consummatio
  rationale: «Manifiesto» sigue de cerca la forma latina y preserva el matiz de algo puesto a la vista. «Fin» es más idiomático que «consumación» en este contexto, aunque ambas opciones son posibles.
- source_word: altissimi
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Altísimo Dios
  lexicon: Altissimus
  rationale: «El Altísimo» es la forma reverente y directa ya establecida en español para el título divino.
theological_decisions:
- issue: Paralelismo entre el orden presente y los tiempos del Altísimo
  english_pob_reading: everything that has come to be in the age has a beginning through an end, and the end is manifest; so also the times of the Most High
  chosen_spanish_reading: 'todo lo que ha llegado a ser en la era tiene un comienzo a través de un fin, y el fin es manifiesto; así también los tiempos del Altísimo: los comienzos'
  alternative_spanish_readings:
  - los tiempos del Altísimo son así
  - así son también los tiempos del Altísimo
  rationale: El latín muestra una comparación entre la visibilidad del comienzo y del fin en el orden temporal y los tiempos del Altísimo. La construcción española mantiene el paralelismo sin suavizar la tensión del texto base.
  doctrine_reference: No doctrinal inference beyond the textual contraste between temporal order and divine times.
translation_notes:
  revision_awareness: Se ha corregido el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español. La redacción sigue el latín limpiado y la nota refleja la tensión textual auditada entre las lecturas 'per consummationem' y la tradición que entiende el pasaje como comienzo y fin manifiestos.
  spanish_consistency_notes:
  - Se usa «Altísimo» para evitar una sustitución devocional no requerida por el texto.
  - Se conserva «manifiesto» para seguir el latín y la revisión auditada.
  - La nota [a] está anclada en «los comienzos [a]» para no dejar ningún marcador suelto.
