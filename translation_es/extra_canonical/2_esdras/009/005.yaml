- from: 'Porque, así como todo lo que ha llegado a ser en la era tiene un comienzo a través de un fin, y el fin es manifiesto, así también los tiempos del Altísimo: los comienzos [a]'
  to: 'Porque, así como todo lo que ha llegado a ser en la era tiene un comienzo por medio de un fin[a], y el fin es manifiesto; así también los tiempos del Altísimo: los comienzos'
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español sin apartarse del latín auditado: «por medio de un fin» conserva la relación preposicional de per consummationem mejor que el calco «a través de un fin». También se movió la nota al punto exacto de dificultad textual y se ajustó la puntuación para mayor claridad.'
