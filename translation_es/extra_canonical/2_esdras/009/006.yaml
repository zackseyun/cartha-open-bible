    issue: La nota al pie 'O "los finales"' es inadecuada y poco natural.
    rationale: El latín tiene consummatio en singular, y la auditoría inglesa corrigió explícitamente 'endings' a 'the end' en el texto principal por fidelidad gramatical. Aunque el English POB conserva una nota histórica 'Or "endings"', trasladarla literalmente a 'los finales' produce un español torpe y sugiere una alternativa menos fiel al original.
  - severity: low
    issue: La razón de la nota como 'textual_variant' no describe bien el caso.
    rationale: No se trata de una variante textual documentada en la evidencia dada, sino de una alternativa de traducción heredada ('previous_rendering').
  revised_spanish_text: 'Así también son los tiempos del Altísimo: los comienzos se manifiestan en prodigios y obras poderosas, y el fin[a] en hechos y señales.'
  revised_footnotes:
  - marker: a
    text: O posiblemente, según una traducción anterior, «los fines».
    reason: Traducción alternativa heredada; el texto principal conserva el singular del latín consummatio.
  revision_rationale: Se conserva el texto principal casi intacto porque es fiel y natural, pero se corrige la nota para no promover la forma poco idiomática 'los finales' y para reflejar mejor que el singular del original gobierna la traducción principal. También se ancla la nota directamente en 'fin' para mayor claridad.
