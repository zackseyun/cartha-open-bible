translation:
  language: es
  text: 'Así también son los tiempos del Altísimo: los comienzos se manifiestan en prodigios y obras poderosas, y el fin[a] en hechos y señales.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, según una traducción anterior, «los fines».
    reason: Traducción alternativa heredada; el texto principal conserva el singular del latín consummatio.
lexical_decisions:
- source_word: Altissimi
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  - el Supremo
  lexicon: altissimus
  rationale: Es el título bíblico usual para Dios en español y conserva la elevación del original sin sustituirlo por una paráfrasis.
- source_word: initia
  english_pob_choice: beginnings
  chosen_spanish: los comienzos
  alternatives_spanish:
  - los inicios
  - los principios
  lexicon: initium
  rationale: En español, 'los comienzos' comunica bien el plural del latín y mantiene el contraste con 'el fin'.
- source_word: prodigiis et uirtutibus
  english_pob_choice: wonders and mighty works
  chosen_spanish: prodigios y obras poderosas
  alternatives_spanish:
  - maravillas y obras poderosas
  - señales y portentos
  lexicon: prodigium / virtus
  rationale: '''Prodigios'' recoge el valor de portento o maravilla; ''obras poderosas'' conserva el matiz de obras de poder del latín y del inglés auditado.'
- source_word: consummatio
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - la consumación
  - el término
  lexicon: consummatio
  rationale: La revisión inglesa confirma el singular 'the end'; 'el fin' es la forma española más natural y fiel al contraste con 'los comienzos'.
- source_word: actu et in signis
  english_pob_choice: deeds and signs
  chosen_spanish: hechos y señales
  alternatives_spanish:
  - obras y señales
  - acciones y señales
  lexicon: actus / signum
  rationale: '''Hechos'' es un equivalente sobrio para actus y ''señales'' reproduce signa con claridad bíblica en español.'
theological_decisions:
- issue: Describir el patrón temporal del Altísimo con contraste entre inicio y fin
  english_pob_reading: 'so also are the times of the Most High: beginnings made manifest in wonders and mighty works, and the end in deeds and signs.'
  chosen_spanish_reading: 'Así también son los tiempos del Altísimo: los comienzos se manifiestan en prodigios y obras poderosas, y el fin en hechos y señales.'
  alternative_spanish_readings:
  - 'Así también son los tiempos del Altísimo: los comienzos se muestran en prodigios y obras poderosas, y el fin en hechos y señales.'
  - 'Así también son los tiempos del Altísimo: los inicios se manifiestan en prodigios y obras poderosas, y el fin en obras y señales.'
  rationale: La redacción mantiene el paralelismo fuente entre 'comienzos' y 'fin', sin introducir explicaciones teológicas ajenas. 'Se manifiestan' conserva la idea de hacerse visible/patente que está en el latín y en el inglés auditado.
  doctrine_reference: Sabiduría y providencia divina en el orden de los tiempos; sin formulación doctrinal añadida
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente cambió ''the ending'' por ''the end'' para reflejar mejor el singular de consummatio; por eso la forma española elegida es ''el fin'', no un plural ni una construcción nominalizada. También se respetó el contraste singular/plural del latín: ''initia'' frente a ''consummatio''.'
  spanish_consistency_notes:
  - Se conservó 'Altísimo' como título divino estándar en español.
  - 'Se mantuvo el paralelismo semántico con el inglés auditado y el latín: comienzos/prodigios/hechos/señales.'
  - No se introdujo vocabulario eclesiástico no sustentado por el texto fuente.
