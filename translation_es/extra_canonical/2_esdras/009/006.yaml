source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'manifesta in prodigiis et uirtutibus, et consummatio in actu et in signis. Et erit omnis qui saluus factus fuerit, et qui poterit effugere per opera sua uel per fidem in qua credidit, Is relinquetur de praedictis periculis et uidebit salutare meum in terra mea et in finibus meis quae sanctificaui mihi a saeculo. Et tunc mirabuntur qui nunc abusi sunt uias meas, et in cruciamentis commorabuntur hii qui eas proiecerunt in contemptu. Quodquod enim non cognouerunt me uiuentes beneficia consecuti, Et quodquod fastidierunt legem meam, cum adhuc erant habentes libertatem, Et cum adhuc esset eis apertum paenitentiae locus non intellexerunt sed spreuerunt, hos oportet post mortem in cruciamento cognoscere. Tu ergo adhuc noli curiosus esse quomodo impii cruciabuntur, sed inquire quomodo iusti saluabuntur, et quorum saeculum et propter quos saeculum et quando. Respondi et dixi : Olim locutus sum et nunc dico et postea dicam, quoniam plures sunt qui pereunt quam ii qui saluabuntur, Sicut multiplicat
    fluctus super guttam. Et respondit ad me et dixit : qualis ager, talia et semina ; et quales flores, tales et tincturae ; et qualis opera, talis et creatio ; et qualis agricola, talis et area. Quoniam tempus erat saeculi, et tunc cum essem parans eis, his qui nunc, antequam fieret illis saeculum, in quo inhabitarent; et nemo contradixit mihi tunc, nec enim erat quisquam: Et nunc creati in mundo'
  language: Latin
base_translation:
