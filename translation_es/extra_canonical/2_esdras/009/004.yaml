lexical_decisions:
- source_word: simus locutus
  english_pob_choice: it was ... spoke
  chosen_spanish: habló
  alternatives_spanish:
  - ha hablado
  - había hablado
  lexicon: hablar
  rationale: El latino presenta un perfecto de habla en una construcción que, en contexto, señala una acción de comunicación ya dada. El inglés POB lo vierte con un pasado simple ('spoke'); en español, 'habló' conserva la referencia al acto de hablar sin forzar una perífrasis más pesada.
- source_word: a diebus qui fuerunt ante ab initio
  english_pob_choice: from the days that were before, from the beginning
  chosen_spanish: desde los días que fueron antes, desde el principio
  alternatives_spanish:
  - desde los días que existieron antes, desde el principio
  - desde los días de antes, desde el principio
  lexicon: días ... antes ... principio
  rationale: 'Se mantiene la doble ubicación temporal del latín y del inglés POB: una referencia a ''los días'' anteriores y luego una intensificación con ''el principio''. ''Fueron antes'' conserva la sintaxis temporal antigua sin borrar la estructura acumulativa del original.'
- source_word: Sicut enim
  english_pob_choice: then you will understand that
  chosen_spanish: entonces comprenderás que
  alternatives_spanish:
  - pues comprenderás que
  - así comprenderás que
  lexicon: entonces / comprenderás
  rationale: Aunque el fragmento latino recibido está corrupto o incompleto, el contexto auditado en inglés da una conclusión inferencial. 'Entonces comprenderás que' comunica la consecuencia prevista sin añadir contenido doctrinal nuevo.
- source_word: Most High
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Altísimo Dios
  lexicon: Altísimo
  rationale: '''El Altísimo'' es la forma natural y reverente en español para el título divino del texto, conservando el valor de título sin sustituirlo por un nombre distinto.'
theological_decisions:
- issue: Identidad del hablante divino
  english_pob_reading: the Most High spoke
  chosen_spanish_reading: el Altísimo habló
  alternative_spanish_readings:
  - Dios habló
  - el Altísimo dijo
  rationale: El inglés POB identifica al hablante como 'the Most High'. El español mantiene ese título para no perder la elevación teológica ni desplazarla a una paráfrasis más general.
  doctrine_reference: Título divino de soberanía y trascendencia
- issue: Relación entre el anuncio y el tiempo primordial
  english_pob_reading: from the days that were before, from the beginning
  chosen_spanish_reading: desde los días que fueron antes, desde el principio
  alternative_spanish_readings:
  - desde tiempos antiguos, desde el principio
  - desde antes del principio
  rationale: La frase conserva la afirmación de una palabra divina anterior y originaria. No se suaviza a una simple antigüedad indefinida, porque el texto insiste en la prioridad temporal absoluta.
  doctrine_reference: Preexistencia del designio/divina presciencia
translation_notes:
  revision_awareness: Se siguió el texto latino limpio proporcionado y se verificó la concordancia con el audit trail inglés, que en esta revisión quedó sin cambios. No se añadieron notas textuales porque el paquete no ofrece variantes significativas ni decisiones léxicas adicionales en el inglés POB.
  spanish_consistency_notes:
