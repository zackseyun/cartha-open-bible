translation:
  language: es
  text: Porque la ley no perece[a], sino que permanece en su honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no desaparece, sino que permanece»; el latín contrasta directamente dos verbos en la misma estructura.'
    reason: alternative_reading
lexical_decisions:
- source_word: lex
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: lex
  rationale: El sustantivo latino lex corresponde de manera directa a «ley». En español, mayúscula o minúscula depende del matiz; aquí la forma común y más natural es minúscula, sin perder el sentido normativo del texto.
- source_word: non perit
  english_pob_choice: does not perish
  chosen_spanish: no perece
  alternatives_spanish:
  - no desaparece
  - no se pierde
  lexicon: perire
  rationale: '«Perece» reproduce con fidelidad el valor de perit y conserva la fuerza de la afirmación: la ley no llega a su fin ni se extingue.'
- source_word: sed permanet
  english_pob_choice: but remains
  chosen_spanish: sino que permanece
  alternatives_spanish:
  - pero permanece
  - mas permanece
  lexicon: manere
  rationale: «Sino que» refleja bien la contraposición latina con sed después de una negación previa en español. «Permanece» conserva el sentido de permanet sin añadir matices ajenos.
- source_word: in suo honore
  english_pob_choice: in its honor
  chosen_spanish: en su honor
  alternatives_spanish:
  - en su honra
  - en su dignidad
  lexicon: honor
  rationale: «Honor» es la correspondencia más directa para honore. «Honra» sería posible, pero «honor» mantiene mejor la formulación lexical del latín y su tono formal.
theological_decisions:
- issue: Durabilidad y estatus de la ley
  english_pob_reading: For the law does not perish, but remains in its honor.
  chosen_spanish_reading: Porque la ley no perece, sino que permanece en su honor.
  alternative_spanish_readings:
  - Porque la ley no desaparece, sino que permanece.
  - Porque la ley no perece y permanece.
  rationale: 'La estructura del latín presenta una afirmación explicativa con contraste real entre dos verbos: no perece / permanece. La traducción conserva ese paralelismo y no suaviza la tensión lógica. «En su honor» mantiene la idea de que la ley conserva su estado de honor o dignidad.'
  doctrine_reference: 4 Esdras 9:37; continuidad y honra de la ley en el argumento del pasaje
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente que corrigió una redacción más débil («but the law does not perish, and remains») hacia la estructura exacta del latín («For the law does not perish, but remains»). La versión española sigue esa corrección, preservando el «Porque… sino que…» y evitando una coordinación que diluiría el contraste.
  spanish_consistency_notes:
  - Se mantiene «ley» en minúscula para el sustantivo común, sin convertirlo en un título teológico.
  - Se conserva un registro formal y bíblico, pero con español natural.
  - La nota[a] se ancla en «perece» para ofrecer la alternativa traducible que refleja la discusión del audit trail.
