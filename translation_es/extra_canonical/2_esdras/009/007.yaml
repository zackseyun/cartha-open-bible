base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/009/007.yaml
  text: And it shall be that everyone who is saved[a], and who is able to escape by his works or by the faith in which he believed,
  footnotes:
  - marker: a
    text: Or 'And everyone who is saved,'.
    reason: previous_rendering
  revision_pass:
