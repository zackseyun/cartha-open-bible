    timestamp: '2026-04-23T19:49:58Z'
    unchanged: false
    changes_summary: Changed 'is saved' to 'is able to escape' to reflect the future perfect/passive sense of salvus factus fuerit more naturally in context; retained the rest as accurate and complete.
translation:
  language: es
  text: Y será que todo el que haya sido salvado[a], y que pueda escapar por sus obras o por la fe en la que creyó, ese
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y será que todo el que haya sido salvado».'
    reason: textual_variant
lexical_decisions:
- source_word: et erit
  english_pob_choice: And it shall be
  chosen_spanish: Y será que
  alternatives_spanish:
  - Y acontecerá que
  - Y sucederá que
  lexicon: N/A
  rationale: Mantiene el giro profético/apocalíptico del latín con una fórmula natural en español, sin omitir el valor aspectual de inicio de enunciado que el POB inglés recuperó con 'And it shall be'.
- source_word: omnis qui salvus factus fuerit
  english_pob_choice: everyone who is saved
  chosen_spanish: todo el que haya sido salvado
  alternatives_spanish:
  - todo el que se salve
  - toda persona que haya sido salvada
  lexicon: N/A
  rationale: '''salvus factus fuerit'' expresa un estado resultante en futuro perfecto/subjuntivo perfecto; ''haya sido salvado'' preserva esa forma y evita reducirlo a un presente simple.'
- source_word: per opera sua
  english_pob_choice: by his works
  chosen_spanish: por sus obras
  alternatives_spanish:
  - mediante sus obras
  - a través de sus obras
  lexicon: N/A
  rationale: '''per'' con valor instrumental se traduce de manera directa y clara como ''por''. ''Obras'' conserva el paralelismo soteriológico del texto.'
- source_word: per fidem in qua credidit
  english_pob_choice: by the faith in which he believed
  chosen_spanish: por la fe en la que creyó
  alternatives_spanish:
  - mediante la fe en la que creyó
  - por la fe en que creyó
  lexicon: N/A
  rationale: Se conserva la repetición de 'fe' y 'creyó' para reflejar la construcción latina, aunque resulte tautológica; no se suaviza la tensión entre fe como medio y acto de creer.
theological_decisions:
- issue: Relación entre salvación y escape mediante obras o fe
  english_pob_reading: everyone who is saved, and who is able to escape by his works or by the faith in which he believed
  chosen_spanish_reading: todo el que haya sido salvado, y que pueda escapar por sus obras o por la fe en la que creyó
  alternative_spanish_readings:
  - todo el que sea salvado y pueda escapar por sus obras o por la fe en la que creyó
  - todo el que haya sido salvado y pueda librarse por sus obras o por la fe en la que creyó
  rationale: El latín presenta una formulación abierta y no resuelve la tensión entre salvación, escape y los dos medios mencionados. La traducción mantiene esa tensión sin armonizarla doctrinalmente.
  doctrine_reference: Soteriología en 4 Esdras / 2 Esdras, con énfasis en juicio, salvación y medios de escape; no se normaliza hacia formulaciones sistemáticas posteriores.
translation_notes:
  revision_awareness: 'La revisión reciente del inglés recuperó ''And it shall be'' para reflejar et erit y afinó ''is able to escape'' para salvus factus fuerit. El español incorpora ambas decisiones: conserva la apertura profética y usa una perífrasis perfecta que refleja un estado de salvación previo al posible escape.'
  spanish_consistency_notes:
  - Se usa 'salvado' como participio pasivo en vez de 'salvo' para reflejar mejor 'salvus factus'.
  - Se conserva 'fe' sin expandir a 'creencia' porque el latín dice 'fidem' y el POB inglés mantuvo 'faith'.
  - La frase final queda en suspensión con 'ese' porque el versículo latino continúa con 'is', y no se debe cerrar artificialmente la cláusula.
