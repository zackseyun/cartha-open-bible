review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del latín: contrasta la curiosidad indebida por el tormento de los impíos con la indagación legítima sobre la salvación de los justos, y conserva la triple secuencia final sobre saeculum y cuándo. Sin embargo, hay un desajuste de número en ''propter quos saeculum'': el latín tiene plural (''por causa de quiénes/de cuáles''), mientras que el español dice singular (''por causa de quién'').'
  spanish_quality_summary: 'El español es claro y digno, pero ''no sigas indagando'' desplaza un poco el matiz de ''noli curiosus esse'' desde ''no seas curioso'' hacia una acción investigativa más concreta; aun así funciona aceptablemente en contexto. La corrección principal necesaria es ajustar el plural en la segunda cláusula sobre saeculum. También conviene mantener una formulación natural y precisa: ''por causa de quiénes es el siglo'' suena mejor que el singular actual.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Impíos', 'justos' y 'salvos' son adecuados. La conservación de 'siglo' para saeculum está justificada por la nota, aunque sea un término tenso en español; la nota ayuda correctamente a preservar la amplitud semántica.
  issues:
  - severity: medium
    issue: Desajuste de número en 'por causa de quién es el siglo'
    rationale: El latín 'propter quos saeculum' usa plural ('quos'). El borrador lo convierte en singular, perdiendo un rasgo gramatical y semántico del original.
  - severity: low
    issue: '''No sigas indagando'' intensifica la acción respecto de ''noli curiosus esse'''
    rationale: La frase latina se centra más directamente en no ser curioso que en dejar de investigar. No es una infidelidad grave, pero una formulación como 'no seas curioso' sería más literal; aun así, puede mantenerse si se prioriza naturalidad contextual.
  revised_spanish_text: Por tanto, no sigas indagando cómo serán atormentados los impíos, sino indaga cómo serán salvos los justos, y de quién es el siglo[a], y por causa de quiénes es el siglo, y cuándo.
  revised_footnotes:
  - marker: a
    text: '''Siglo'' traduce literalmente saeculum. Aquí puede referirse al tiempo presente, la era o el orden del mundo; se conserva el término por fidelidad al latín.'
    reason: lexical_alternative
  revision_rationale: Se corrige el singular 'quién' a plural 'quiénes' para reflejar fielmente el latín 'propter quos'. Se conserva el resto del texto porque comunica bien el sentido y mantiene la repetición retórica de saeculum. Se normaliza levemente la puntuación interna de la nota.
