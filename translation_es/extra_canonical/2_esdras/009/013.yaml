base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/009/013.yaml
  text: Therefore do not be curious any longer about how the ungodly will be tormented, but inquire how the righteous will be saved, and whose the age is, and for whose sake the age is, and when.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:48:05Z'
    unchanged: false
    changes_summary: Removed the stray closing quotation mark. The wording otherwise accurately reflects the Latin and is natural enough for a formal translation.
translation:
  language: es
  text: Por tanto, no sigas indagando cómo serán atormentados los impíos, sino indaga cómo serán salvos los justos, y de quién es el siglo[a], y por causa de quiénes es el siglo, y cuándo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Siglo'' traduce literalmente saeculum. Aquí puede referirse al tiempo presente, la era o el orden del mundo; se conserva el término por fidelidad al latín.'
    reason: lexical_alternative
lexical_decisions:
- source_word: noli curiosus esse
  english_pob_choice: do not be curious any longer
  chosen_spanish: no sigas indagando
  alternatives_spanish:
  - no seas curioso
  - no sigas siendo curioso
  - no preguntes más
  lexicon: curiosus / curiosus esse
  rationale: En español, 'curioso' puede sonar a mera inquietud mental, pero aquí el sentido es de insistir investigando un asunto que no corresponde. 'No sigas indagando' conserva la fuerza exhortativa y evita una calca extraña.
- source_word: quomodo impii cruciabuntur
  english_pob_choice: how the ungodly will be tormented
  chosen_spanish: cómo serán atormentados los impíos
  alternatives_spanish:
  - cómo serán torturados los impíos
  - de qué manera serán castigados los impíos
  lexicon: impii / cruciabuntur
  rationale: '''Atormentados'' refleja el sufrimiento intenso del pasivo latino cruciabuntur sin reducirlo solo a castigo jurídico. ''Impíos'' mantiene el valor moral-religioso de impii.'
- source_word: quomodo iusti salvabuntur
  english_pob_choice: how the righteous will be saved
  chosen_spanish: cómo serán salvos los justos
  alternatives_spanish:
  - cómo serán salvados los justos
  - cómo alcanzarán salvación los justos
  lexicon: iusti / salvabuntur
  rationale: '''Salvos'' conserva el resultado de salvación con naturalidad bíblica en español. ''Justos'' mantiene la equivalencia habitual de iusti en este contexto escatológico.'
- source_word: quorum saeculum
  english_pob_choice: whose the age is
  chosen_spanish: de quién es el siglo[a]
  alternatives_spanish:
  - de quién es la era
  - a quién pertenece el siglo
  lexicon: saeculum
  rationale: '''Siglo'' es la opción más literal para saeculum y preserva la tensión del texto. En español puede sonar arcaizante, pero evita suavizar el término con ''era'' y conserva la amplitud temporal/orden de mundo del latín.'
- source_word: propter quos saeculum
  english_pob_choice: for whose sake the age is
  chosen_spanish: por causa de quién es el siglo
  alternatives_spanish:
  - por quienes existe el siglo
  - para quién es el siglo
  lexicon: propter quos / saeculum
  rationale: '''Por causa de quién'' mantiene la causalidad explícita del latín propter quos. Se conserva ''siglo'' para no perder la repetición retórica y conceptual del original.'
- source_word: et quando
  english_pob_choice: and when
  chosen_spanish: y cuándo
  alternatives_spanish:
  - y en qué tiempo
  - y para cuándo
  lexicon: quando
  rationale: Traducción directa y natural; mantiene el cierre interrogativo abierto del latín sin agregar precisión inexistente.
theological_decisions:
- issue: Destino de los impíos y de los justos
  english_pob_reading: asks about how the ungodly will be tormented and how the righteous will be saved
  chosen_spanish_reading: pregunta por cómo serán atormentados los impíos y cómo serán salvos los justos
  alternative_spanish_readings:
  - pregunta por el castigo de los impíos y la salvación de los justos
  - pregunta por el tormento de los impíos y la salvación de los justos
  rationale: 'La versión española conserva la asimetría del pasaje: primero el juicio sobre los impíos, luego la salvación de los justos. ''Atormentados'' retiene el componente de sufrimiento que el latín expresa de forma fuerte.'
  doctrine_reference: Eschatology; final judgment
- issue: Saeculum como orden temporal y pertenencia
  english_pob_reading: whose the age is, and for whose sake the age is
  chosen_spanish_reading: de quién es el siglo, y por causa de quién es el siglo
  alternative_spanish_readings:
  - de quién es la era, y para quién es la era
  - a quién pertenece el mundo, y por quién existe
  rationale: No se resuelve saeculum de modo interpretativo hacia 'mundo' o 'era' en el texto principal, porque el latín deja una tensión entre tiempo, orden presente y pertenencia. Se mantiene la repetición para conservar el énfasis retórico-teológico.
  doctrine_reference: Apocalyptic time; providence
- issue: Interrogación abierta sobre el cuándo
  english_pob_reading: and when
  chosen_spanish_reading: y cuándo
  alternative_spanish_readings:
  - y en qué momento
  - y cuándo será
  rationale: El final queda abierto, como en el latín, sosteniendo el límite del conocimiento humano frente a los tiempos establecidos por Dios.
  doctrine_reference: Divine timetable; human limitation
translation_notes:
  revision_awareness: El texto latino limpio y el audit trail inglés coinciden en la estructura retórica y en el contenido; la única revisión registrada fue la eliminación de una comilla final errante, sin impacto en el sentido. La versión española sigue esa lectura estable y conserva la tensión de saeculum sin domesticarla.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y bíblico sin recurrir a 'SEÑOR' ni a equivalentes interpretativos no presentes en el latín.
  - '''Justos'' y ''impíos'' se conservaron como términos de contraste moral/escatológico consistentes con el contexto.'
  - Se preservó la repetición de 'siglo' para reflejar la repetición de saeculum en el texto fuente.
  - La puntuación reproduce la secuencia interrogativa acumulativa del original.
