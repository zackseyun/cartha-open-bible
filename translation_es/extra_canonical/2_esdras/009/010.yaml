translation:
  language: es
  text: Porque todos los que no me conocieron mientras vivían, aunque habían recibido beneficios,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: quotquot
  english_pob_choice: For all
  chosen_spanish: Porque todos los que
  alternatives_spanish:
  - Pues todos los que
  - Porque cuantos
  lexicon: N/A
  rationale: El latín quotquot introduce una generalización distributiva; en español, «todos los que» comunica de forma natural el alcance total sin volver el texto áspero. Se mantiene la relación causal/inferencial que el inglés POB resuelve con «For» mediante «Porque».
- source_word: non cognoverunt me
  english_pob_choice: did not know me
  chosen_spanish: no me conocieron
  alternatives_spanish:
  - no me conocían
  - no me supieron
  lexicon: N/A
  rationale: cognoverunt expresa conocimiento logrado/reconocido en perfecto; «me conocieron» conserva el aspecto de una relación que no llegó a darse durante la vida. «Conocer» es la correspondencia más directa y natural en español.
- source_word: viventes
  english_pob_choice: while they were alive
  chosen_spanish: mientras vivían
  alternatives_spanish:
  - cuando vivían
  - en vida
  lexicon: N/A
  rationale: viventes señala el estado de estar vivos; «mientras vivían» reproduce la simultaneidad temporal sin añadir matices interpretativos. «En vida» sería idiomático, pero menos transparente para la estructura del verso.
- source_word: beneficia consecuti
  english_pob_choice: had received benefits
  chosen_spanish: habían recibido beneficios
  alternatives_spanish:
  - habían obtenido beneficios
  - habían gozado de beneficios
  lexicon: N/A
  rationale: consecuti indica haber obtenido/recibido algo favorable. «Habían recibido beneficios» sigue de cerca el sentido y preserva la forma pasiva/resultativa del participio perfecto.
theological_decisions:
- issue: Sentido de la frase sobre los que no conocieron al hablante divino en vida, pese a haber recibido beneficios
  english_pob_reading: The verse states the condition plainly without added doctrinal expansion.
  chosen_spanish_reading: 'La versión española mantiene la afirmación llana: no conocieron al hablante mientras vivían, aunque sí recibieron beneficios.'
  alternative_spanish_readings:
  - aunque habían recibido favores
  - aunque habían recibido bienes
  rationale: No hay base en el texto para desarrollar más allá de la simple contraposición entre desconocimiento y beneficio recibido. «Beneficios» conserva la amplitud del latín y evita restringir el alcance a favores meramente materiales o jurídicos.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto fuente latino es breve y coincide estrechamente con la auditoría inglesa; no hay revisiones aplicadas ni variantes textuales relevantes que requieran nota. Se conserva el orden y la tensión de la frase: desconocimiento en vida, pese a beneficios recibidos.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo, en este tramo, no contiene el tetragrámaton ni una cita griega de κύριος.
  - «Beneficios» se mantiene por su amplitud semántica y por la cercanía al latín beneficia.
  - Se usa pretérito perfecto simple/pluscuamperfecto según la relación temporal del latín y del inglés POB.
