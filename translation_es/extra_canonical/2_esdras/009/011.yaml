lexical_decisions:
- source_word: fastidierunt
  english_pob_choice: despised
  chosen_spanish: despreciaron
  alternatives_spanish:
  - menospreciaron
  - desdeñaron
  lexicon: fastidio / fastidire
  rationale: El latín fastidierunt expresa aversión, rechazo o desprecio; «despreciaron» reproduce bien la fuerza negativa sin sobrecargar con matices emocionales ajenos al contexto.
- source_word: legem meam
  english_pob_choice: my law
  chosen_spanish: mi ley
  alternatives_spanish:
  - mi instrucción
  - mi Torá
  lexicon: lex / lex, legis
  rationale: La referencia directa a la ley divina se vierte de forma simple y transparente como «mi ley», manteniendo el posesivo de primera persona del original.
- source_word: cum adhuc erant habentes libertatem
  english_pob_choice: while they still had freedom
  chosen_spanish: mientras aún tenían libertad
  alternatives_spanish:
  - cuando todavía gozaban de libertad
  - mientras aún eran libres
  lexicon: libertas
  rationale: El latín usa una construcción temporal con libertas en sentido de libertad disponible o estado no restringido; «mientras aún tenían libertad» conserva esa temporalidad y no fuerza un sentido más filosófico que el del texto.
theological_decisions:
- issue: Libertad como tiempo de responsabilidad moral
  english_pob_reading: while they still had freedom
  chosen_spanish_reading: mientras aún tenían libertad
  alternative_spanish_readings:
  - cuando todavía gozaban de libertad
  - mientras aún eran libres
  rationale: La frase no solo indica capacidad externa, sino el período en que existía responsabilidad de responder a la ley. «Tenían libertad» mantiene la ambigüedad útil entre condición y oportunidad, sin añadir interpretación no explicitada por el latín.
  doctrine_reference: Responsabilidad humana ante la revelación divina; juicio conforme a la respuesta dada en vida.
translation_notes:
  revision_awareness: El texto latino limpio y la POB inglesa concuerdan estrechamente; no se registran revisiones textuales ni notas en el audit trail, y el presente borrador sigue esa lectura directa sin introducir variantes.
  spanish_consistency_notes:
  - Se mantiene «ley» para legem, coherente con el registro bíblico y con la POB inglesa.
  - Se usa minúscula en «libertad» por tratarse de un sustantivo común, no de un nombre técnico.
  - La puntuación reproduce la pausa temporal del original con una coma final que enlaza con el contexto inmediato de la frase en español.
