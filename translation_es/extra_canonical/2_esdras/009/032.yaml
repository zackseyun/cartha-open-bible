base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/009/032.yaml
  text: Yet our fathers, after receiving the law, did not keep it and did not observe my statutes. And the fruit of the law did not perish, for it could not, because it was yours.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:48:53Z'
    unchanged: false
    changes_summary: Added 'my' before 'statutes' to reflect legitima mea; adjusted punctuation and capitalization for smoother, more natural English while preserving the sense.
translation:
  language: es
  text: Nuestros padres, después de recibir la ley, no la guardaron ni observaron mis estatutos. Y el fruto de la ley no pereció, porque no podía, pues era tuyo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: accipientes legem
  english_pob_choice: after receiving the law
  chosen_spanish: después de recibir la ley
  alternatives_spanish:
  - habiendo recibido la ley
  - tras recibir la ley
  lexicon: accipio -> recibir; lexicon entry not specified in source packet
  rationale: La construcción latina participial expresa una acción previa; en español, 'después de recibir' conserva la relación temporal sin sonar forzado. 'Ley' es la equivalencia directa de legem.
- source_word: legem
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: lexical equivalent in context; no entry number provided
  rationale: '''La ley'' es la forma natural y fiel para legem en este contexto. Se evita la mayúscula salvo que el contexto exigiera un uso técnico específico no documentado aquí.'
- source_word: legitima mea
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis preceptos
  - mis leyes
  lexicon: lexical equivalent in context; no entry number provided
  rationale: '''Legitima'' en este pasaje corresponde a disposiciones u ordenanzas; ''estatutos'' preserva el registro jurídico y la relación posesiva ''mea'' se refleja con ''mis''.'
- source_word: fructum legis non periens
  english_pob_choice: the fruit of the law did not perish
  chosen_spanish: el fruto de la ley no pereció
  alternatives_spanish:
  - el fruto de la ley no se perdió
  - el fruto de la ley no desapareció
  lexicon: fructus + perire; no entry number provided
  rationale: Se conserva la metáfora de 'fruto' y el verbo 'perecer' para mantener la fuerza formal del latín y la lectura del POB inglés.
- source_word: quoniam tuus erat
  english_pob_choice: because it could not, because it was yours
  chosen_spanish: porque no podía, pues era tuya
  alternatives_spanish:
  - porque no podía, porque era tuya
  - ya que era tuya
  lexicon: quoniam -> porque/pues; tuus -> tuya (acuerdo con 'la ley')
  rationale: '''Tuya'' concuerda con ''la ley'' implícita/antecedente y mantiene la explicación causal. Se conserva la doble causalidad del inglés con ''porque'' y ''pues''.'
theological_decisions:
- issue: Referencia posesiva a la ley y a los estatutos
  english_pob_reading: my statutes ... because it was yours
  chosen_spanish_reading: mis estatutos ... pues era tuya
  alternative_spanish_readings:
  - mis estatutos ... porque eran tuyos
  - mis estatutos ... pues era tuyo
  rationale: La posesión alterna entre 'mis' y 'tuya' refleja fielmente el texto latino ('mea' y 'tuus') y preserva la tensión retórica entre la ley dada por Dios y perteneciente a Dios.
  doctrine_reference: Divine ownership of the law; covenantal authority in wisdom/prayer literature
translation_notes:
  revision_awareness: The English POB revision added 'my' before 'statutes' to reflect legitima mea and adjusted punctuation for smoother English. The Spanish draft mirrors that clarification with 'mis estatutos' and keeps the sentence flow natural while preserving the source's causal structure.
  spanish_consistency_notes:
  - '''Yahvé'' no aparece en este versículo; no se introduce una sustitución innecesaria por ''SEÑOR''.'
  - Se mantiene 'ley' y 'estatutos' como términos distintos para evitar borrar la doble referencia del latín.
  - Se conserva 'fruto' literalmente para respetar la imagen del texto y la correspondencia con el inglés POB.
