  rationale: Se corrigió 'era tuya' a 'era tuyo' para reflejar la concordancia masculina de 'tuus' en el latín y mantener como antecedente más probable 'el fruto de la ley'. No se requieren notas, porque la frase revisada ya comunica con claridad el sentido fuente.
