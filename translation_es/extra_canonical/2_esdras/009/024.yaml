translation:
  language: es
  text: Ve a un campo donde no se ha construido ninguna casa, y come solo las flores del campo. No pruebes carne ni bebas vino, sino solo flores. Y ora al Altísimo sin cesar, y
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: domus non est aedificata
  english_pob_choice: where no house has been built
  chosen_spanish: donde no ha sido construida ninguna casa
  alternatives_spanish:
  - en el que no se ha edificado ninguna casa
  - donde no se ha levantado ninguna casa
  lexicon: domus / aedificata
  rationale: La construcción latina niega la existencia de una casa edificada; en español, una pasiva natural comunica bien esa ausencia sin añadir matices. 'Construida' mantiene la idea de edificación física y evita la sobreinterpretación de 'habitada'.
- source_word: manduca solummodo de floribus campi
  english_pob_choice: eat only the flowers of the field
  chosen_spanish: come solo las flores del campo
  alternatives_spanish:
  - come únicamente las flores del campo
  - come solamente las flores del campo
  lexicon: manduca / flores campi
  rationale: '''Manduca'' es un imperativo directo de comer. Se conserva ''las flores del campo'' porque el latín especifica el origen y la revisión inglesa retiró cualquier añadido no sustentado como ''of flowers'' después de ''field''.'
- source_word: carnem non gustabis
  english_pob_choice: You shall not taste meat
  chosen_spanish: No gustarás carne
  alternatives_spanish:
  - No probarás carne
  - No degustarás carne
  lexicon: carnem / gustabis
  rationale: '''Gustabis'' admite ''gustar'' en sentido de probar/tomar alimento. ''Gustarás carne'' reproduce la fuerza verbal sin introducir una paráfrasis excesiva; ''carne'' mantiene el sentido literal de alimento animal.'
- source_word: vinum non bibes
  english_pob_choice: you shall not drink wine
  chosen_spanish: ni beberás vino
  alternatives_spanish:
  - ni tomarás vino
  - ni has de beber vino
  lexicon: vinum / bibes
  rationale: La negación coordinada en español se expresa naturalmente con 'ni'; 'beberás vino' corresponde de forma directa al latín.
- source_word: sed solummodo flores
  english_pob_choice: but only flowers
  chosen_spanish: sino solo flores
  alternatives_spanish:
  - sino únicamente flores
  - sino solamente flores
  lexicon: sed / solummodo
  rationale: La secuencia mantiene la oposición restrictiva y la repetición de 'flores' que aparece en el latín. 'Sino' es la correlación natural tras una negación previa.
- source_word: deprecare altissimum sine intermissione
  english_pob_choice: pray to the Most High without ceasing
  chosen_spanish: ora al Altísimo sin cesar
  alternatives_spanish:
  - ruega al Altísimo sin cesar
  - ora al Altísimo continuamente
  lexicon: deprecare / altissimum / sine intermissione
  rationale: '''Deprecare'' aquí es una exhortación a orar; ''ora'' es idiomático y suficientemente literal. ''Altísimo'' traduce la referencia reverente a Dios sin reemplazarla por un título eclesiástico. ''Sin cesar'' reproduce la idea de continuidad.'
theological_decisions:
- issue: Título divino en 'altissimum'
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Dios Altísimo
  - el Supremo
  rationale: El latín usa un superlativo sustantivado con sentido divino. 'El Altísimo' es la forma bíblica natural en español y preserva la referencia a Dios sin introducir una denominación distinta.
  doctrine_reference: Uso bíblico del título divino 'Altísimo' (cf. Sal 91:1; Lc 1:32, 35)
translation_notes:
  revision_awareness: 'La revisión inglesa reciente corrigió una ampliación indebida (''of flowers'' after ''field'') y restauró el final ''And pray to the Most High without ceasing, and''. La versión española sigue esa línea: no añade ''de flores'' al campo, mantiene la secuencia final de oración continua y conserva el cierre incompleto con ''y'' para reflejar que el versículo continúa.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el fuente latino dice 'altissimum' y la tradición POB pide no ocultar el nombre/título con una convención de máscara innecesaria.
  - Se mantiene la repetición de 'flores' porque está en el latín y fue conservada en la auditoría inglesa.
  - El registro es bíblico y sobrio, con sintaxis clara para lectura pública en español latinoamericano.
