base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/009/024.yaml
  text: Go into a field where no house has been built, and eat only the flowers of the field. You shall not taste meat, and you shall not drink wine, but only flowers. And pray to the Most High without ceasing, and
  revision_pass:
