review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del latín: petición de que la deje, propósito de llorar por sí misma, intensificación del dolor, y descripción de su estado interior como muy amargo y muy humillado. Sin embargo, hay dos ajustes recomendables para mayor fidelidad y mejor español: «amarga de espíritu» suena menos natural que «amarga en espíritu», y «para que» aquí puede mejorarse a «para poder» para expresar la finalidad tras una petición directa sin rigidez innecesaria.'
  spanish_quality_summary: El texto es claro y digno, pero «estoy muy amarga de espíritu» resulta algo forzado en español general. «Amarga en espíritu» es más idiomático y mantiene el matiz interior. También conviene simplificar eliminando la nota, porque la alternativa propuesta como preferida no mejora la legibilidad ni está exigida por el latín.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «señor mío» es aceptable para dominus meus en este contexto no divino. «espíritu» preserva bien el valor interior de animo. No hay términos teológicos sensibles que requieran adjudicación adicional.
  issues:
  - severity: medium
    issue: «muy amarga de espíritu» es poco natural en español
    rationale: El latín animo expresa el ámbito interior o anímico. En español, «amarga en espíritu» comunica ese valor con mayor naturalidad que «de espíritu», que suena más calcado.
  - severity: low
    issue: La nota al pie defiende una opción menos idiomática
    rationale: La nota presenta «amarga en espíritu» como alternativa, pero esa forma en realidad es la más natural y suficientemente fiel; la nota no aporta una ambigüedad real que deba preservarse.
  revised_spanish_text: 'Ella me dijo: «Déjame, señor mío, para poder llorar por mí misma y añadir a mi dolor, porque estoy muy amarga en espíritu y muy humillada».'
  revised_footnotes: []
  revision_rationale: Se ajusta «de espíritu» a «en espíritu» por mejor español y fidelidad al sentido interior de animo, y se elimina la nota innecesaria. También se usa «para poder llorar» para una finalidad más natural tras «Déjame», sin alterar el sentido del original.
