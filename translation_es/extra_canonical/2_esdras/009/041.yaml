translation:
  language: es
  text: 'Ella me dijo: «Déjame, señor mío, para poder llorar por mí misma y añadir a mi dolor, porque estoy muy amarga en espíritu y muy humillada».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: dimitte me
  english_pob_choice: Leave me
  chosen_spanish: Déjame
  alternatives_spanish:
  - Déjame sola
  - Permíteme irme
  lexicon: dimitto
  rationale: El latín pide una petición directa de ser dejada/soltada. «Déjame» mantiene la brevedad y la súplica sin añadir la idea de abandono total que tendría «déjame sola».
- source_word: dominus meus
  english_pob_choice: my lord
  chosen_spanish: señor mío
  alternatives_spanish:
  - mi señor
  - mi señor mío
  lexicon: dominus
  rationale: «Señor mío» es una forma natural y reverente en español, fiel al vocativo del original y al registro del inglés POB.
- source_word: defleam me
  english_pob_choice: weep for myself
  chosen_spanish: llore por mí misma
  alternatives_spanish:
  - llore por mí
  - llore sobre mí misma
  lexicon: defleo
  rationale: «Defleam» expresa llanto o lamentación. «Llore por mí misma» conserva la reflexividad del latín y la lectura revisada del inglés POB («weep for myself»), sin caer en una paráfrasis excesiva.
- source_word: adiciam dolorem
  english_pob_choice: add to my sorrow
  chosen_spanish: añada a mi dolor
  alternatives_spanish:
  - aumente mi dolor
  - sume dolor a mi dolor
  lexicon: addo + dolor
  rationale: La construcción latina indica intensificar el dolor ya presente. «Añada a mi dolor» sigue de cerca la estructura y respeta la acumulación retórica.
- source_word: valde amara sum animo
  english_pob_choice: I am very bitter in spirit
  chosen_spanish: estoy muy amarga de espíritu
  alternatives_spanish:
  - estoy muy amarga en espíritu
  - estoy profundamente amargada de espíritu
  lexicon: amarus + animus
  rationale: «Animo» se entiende aquí como el interior anímico/espiritual. Se conserva «amarga» para reflejar la metáfora del original y la versión inglesa, con «de espíritu» para no perder el matiz interior.
- source_word: humiliata sum valde
  english_pob_choice: greatly humbled
  chosen_spanish: muy humillada
  alternatives_spanish:
  - grandemente humillada
  - muy abajada
  lexicon: humilio
  rationale: El latín pasivo indica haber sido rebajada/humillada. «Muy humillada» es la forma más natural en español y sigue la revisión inglesa que prefirió «greatly humbled».
theological_decisions:
- issue: Interioridad del dolor y la amargura
  english_pob_reading: I am very bitter in spirit and greatly humbled.
  chosen_spanish_reading: estoy muy amarga de espíritu y muy humillada
  alternative_spanish_readings:
  - estoy muy amarga en espíritu
  - estoy profundamente abatida
  rationale: 'El texto describe el estado interior de la mujer con dos rasgos paralelos: amargura de espíritu y humillación. Se evita suavizar el tono o convertirlo en mera tristeza emocional.'
  doctrine_reference: Antropología bíblica / lenguaje del sufrimiento interior
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa, que ajustó «Leave me alone» a «Leave me», «mourn» a «weep» y «greatly brought low» a «greatly humbled». Por eso se eligieron formas españolas breves y directas: «Déjame», «llore» y «muy humillada», manteniendo la cercanía al latín cleaned source y al audit trail más reciente.'
  spanish_consistency_notes:
  - Se mantiene «señor mío» como vocativo reverente, coherente con el español bíblico contemporáneo sin volver al calco rígido.
  - Se conserva la imagen de amargura «de espíritu» para respetar el paralelismo interior del original.
  - No se introduce terminología eclesiástica adicional que el texto no requiera.
