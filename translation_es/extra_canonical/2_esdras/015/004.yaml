translation:
  language: es
  text: Porque todo incrédulo morirá en su incredulidad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: omnis
  english_pob_choice: every
  chosen_spanish: todo
  alternatives_spanish:
  - cada
  lexicon: omnis
  rationale: «Todo» reproduce bien el alcance universal de «omnis» en una afirmación general. «Cada» sería posible, pero aquí suena menos natural en español y no añade precisión contextual.
- source_word: incredulus
  english_pob_choice: unbeliever
  chosen_spanish: incrédulo
  alternatives_spanish:
  - no creyente
  - incrédulo
  lexicon: incredulus
  rationale: Se mantiene el valor lexical de incredulidad/ falta de fe con «incrédulo», que es directo y fiel al latín. «No creyente» suaviza el matiz, y «incrédulo» conserva mejor la correspondencia con la forma de la fuente.
- source_word: incredulitate sua
  english_pob_choice: in his unbelief
  chosen_spanish: en su incredulidad
  alternatives_spanish:
  - por su incredulidad
  - en su falta de fe
  lexicon: incredulitas
  rationale: «En su incredulidad» sigue de cerca la construcción latina y conserva la idea de una condición en la cual ocurre la muerte. «Por su incredulidad» introduce un matiz causal más fuerte que el texto no exige necesariamente.
theological_decisions:
- issue: Relación entre incredulidad y muerte
  english_pob_reading: For every unbeliever will die in his unbelief.
  chosen_spanish_reading: Porque todo incrédulo morirá en su incredulidad.
  alternative_spanish_readings:
  - Porque todo incrédulo morirá por su incredulidad.
  - Porque todo el que no cree morirá en su incredulidad.
  rationale: 'La lectura inglesa deja la relación de manera simple y directa: el incrédulo muere dentro de su incredulidad. La versión española conserva esa formulación sin ampliar la causalidad ni moralizar el enunciado.'
  doctrine_reference: Juicio/divino retribución en contexto apocalíptico
translation_notes:
  revision_awareness: El texto latino transmitido y la traducción inglesa auditada concuerdan plenamente; no hay revisiones aplicadas ni variantes que obliguen a anotar una lectura alternativa.
  spanish_consistency_notes:
  - Se mantiene «incrédulo/incredulidad» para conservar la correspondencia léxica interna.
  - No se introduce vocabulario eclesiástico tradicional ajeno al latín fuente.
  - La construcción es breve y sentenciosa, acorde con el tono del versículo.
