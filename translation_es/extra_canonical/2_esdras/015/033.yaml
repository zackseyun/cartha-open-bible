translation:
  language: es
  text: Y desde el territorio de los asirios un emboscador se apostará contra ellos y consumirá a uno de ellos; y habrá temor y temblor en su ejército, e inestabilidad en su reino.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Assyriorum
  english_pob_choice: the Assyrians
  chosen_spanish: los asirios
  alternatives_spanish:
  - asiria
  - de Asiria
  lexicon: topónimo/etnónimo
  rationale: El latín presenta un genitivo plural étnico; en español, el equivalente natural y fiel es el etnónimo plural «los asirios».
- source_word: subsessor
  english_pob_choice: an ambusher
  chosen_spanish: un emboscador
  alternatives_spanish:
  - un acechador
  - un emboscado
  lexicon: agente nominal de subsideo/subsidere
  rationale: El término latino describe a alguien que se coloca al acecho o en emboscada. «Emboscador» conserva la función activa y resulta claro en español moderno.
- source_word: consumet
  english_pob_choice: will ... consume
  chosen_spanish: consumirá
  alternatives_spanish:
  - destruirá
  - devorará
  lexicon: consumere
  rationale: «Consumirá» mantiene la imagen verbal del latín y la elección inglesa, sin añadir una especificación de destrucción que el texto no exige.
- source_word: timor et tremor
  english_pob_choice: fear and trembling
  chosen_spanish: temor y temblor
  alternatives_spanish:
  - miedo y temblor
  - temor y estremecimiento
  lexicon: par binomial
  rationale: La pareja nominal se puede reproducir de forma directa en español. «Temor y temblor» conserva la sobriedad y la resonancia del original.
- source_word: inconstabilitio
  english_pob_choice: instability
  chosen_spanish: inestabilidad
  alternatives_spanish:
  - falta de estabilidad
  - desorden
  lexicon: abstracto de in- + stabilitas
  rationale: El sustantivo latino apunta a falta de firmeza o estabilidad; «inestabilidad» es el equivalente más transparente y preciso en español.
theological_decisions:
- issue: Referencia del sujeto territorial y político
  english_pob_reading: from the territory of the Assyrians ... in their army ... in their kingdom
  chosen_spanish_reading: desde el territorio de los asirios ... en su ejército ... en su reino
  alternative_spanish_readings:
  - desde el territorio asirio ... en su ejército ... en su reino
  - desde el país de Asiria ... en su ejército ... en su reino
  rationale: El versículo describe un ámbito geográfico-político asociado a los asirios y luego pasa a posesivos plurales para ejército y reino. Mantener «los asirios» preserva esa relación sin forzar una teología adicional.
  doctrine_reference: No doctrinal issue; historical/geographical reference
translation_notes:
  revision_awareness: La revisión más reciente indica que el texto fuente y la traducción inglesa POB quedaron sin cambios, con acuerdo alto y sin observaciones; por tanto, el español se apoya directamente en ese estado estable del expediente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca; aquí no figura ningún Tetragrámaton ni κύριος correspondiente.
  - Se usa «temor y temblor» como binomio idiomático claro y fiel.
  - No se introduce vocabulario eclesiástico no atestiguado por el latín fuente.
