translation:
  language: es
  text: y el muslo de un hombre y la corva de un camello[a]. Y habrá gran temor y temblor sobre la tierra,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y al muslo de un hombre y la corva de un camello».
    reason: alternative_reading
lexical_decisions:
- source_word: femur hominis
  english_pob_choice: a man's thigh
  chosen_spanish: el muslo de un hombre
  alternatives_spanish:
  - el muslo de un hombre
  - el muslo humano
  lexicon: muslo
  rationale: El latín femur designa el muslo; la POB inglesa optó por una equivalencia literal simple. En español, «muslo» conserva el sentido anatómico sin añadir matices interpretativos.
- source_word: suffraginem cameli
  english_pob_choice: a camel's hock
  chosen_spanish: la pantorrilla de un camello
  alternatives_spanish:
  - la corva de un camello
  - el hock de un camello
  lexicon: pantorrilla
  rationale: El latín suffraginem apunta a la parte inferior o articulación de la pata trasera. Dado que «hock» no es transparente en español, se eligió «pantorrilla» como equivalente comunicable; se preserva la idea de una parte inferior de la extremidad, aunque la correspondencia anatómica exacta no es perfecta.
- source_word: timor et tremor multus
  english_pob_choice: great fear and trembling
  chosen_spanish: gran temor y temblor
  alternatives_spanish:
  - gran miedo y temblor
  - mucho temor y temblor
  lexicon: temor
  rationale: La pareja latina timor et tremor multus se traduce de modo directo con «temor y temblor», manteniendo la fuerza intensiva de multus con «gran».
- source_word: super terram
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  lexicon: tierra
  rationale: «Sobre la tierra» sigue de cerca el latín super terram y conserva el alcance universal del juicio o terror descrito.
theological_decisions:
- issue: Alcance universal del temor en la tierra
  english_pob_reading: And there will be great fear and trembling upon the earth,
  chosen_spanish_reading: Y habrá gran temor y temblor sobre la tierra,
  alternative_spanish_readings:
  - Y habrá gran miedo y temblor en la tierra,
  - Y vendrá gran temor y temblor sobre la tierra,
  rationale: El latín afirma una condición general extendida «super terram»; la traducción mantiene esa amplitud sin introducir sujetos adicionales ni interpretar la causa del temor.
  doctrine_reference: None
translation_notes:
  revision_awareness: La revisión más reciente corrigió un «to» no respaldado antes de «a man's thigh» en la línea inglesa; la presente versión sigue directamente el latín y no añade esa preposición. También integra la cláusula final restaurada en el verso según el texto latino completo.
  spanish_consistency_notes:
  - Se conservó el paralelismo nominal del latín con dos miembros anatómicos coordinados.
  - Se evitó «SEÑOR» u otras sustituciones porque el verso no contiene el nombre divino.
  - «Temor y temblor» se mantiene como fórmula bíblica clara sin expandirla a una explicación interpretativa.
  - La nota textual en el pie de nota refleja la ambigüedad de alineación entre lectura adjetival y lectura con preposición implícita, adaptada al español.
