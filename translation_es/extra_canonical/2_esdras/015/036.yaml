review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva la estructura básica del latín: «et femur hominis et suffraginem cameli. et erit timor et tremor multus super terram» = «y el muslo de un hombre y la … de un camello. Y habrá gran temor y temblor sobre la tierra». También incluye correctamente la cláusula final restaurada por la auditoría inglesa. Sin embargo, «pantorrilla» no representa bien lat. suffraginem / ingl. hock, que apunta más a la articulación corvejona o corva que a la pantorrilla.'
  spanish_quality_summary: El español es legible y digno, pero «la pantorrilla de un camello» suena anatómicamente inexacto y algo antropomórfico. «La corva de un camello» o «el corvejón de un camello» comunican mejor la referencia a la articulación de la pata trasera; «corva» es más ampliamente comprensible. Además, la nota al pie actual no refleja bien la variante inglesa documentada, porque repite sustancialmente el mismo texto en vez de preservar la alternativa de construcción.
  glossary_alignment: 'No hay términos teológicos del glosario principal en juego. La revisión necesaria es léxica: ajustar suffraginem a «corva» y conservar en nota la alternativa sintáctica heredada del inglés («O “y a…”»).'
  issues:
  - severity: medium
    issue: «pantorrilla» para suffraginem cameli
    rationale: Suffraginem y el inglés auditado «hock» se refieren a la articulación o corvejón de la pata trasera, no a la pantorrilla. «Pantorrilla» introduce una imagen anatómica menos fiel al latín.
  - severity: low
    issue: Nota al pie alternativa mal enfocada
    rationale: La nota inglesa preserva una alternativa sintáctica («Or 'and to a man's thigh and a camel's hock.'»). La nota española actual no refleja esa diferencia y repite prácticamente la lectura principal.
  revised_spanish_text: y el muslo de un hombre y la corva de un camello[a]. Y habrá gran temor y temblor sobre la tierra,
