base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/060.yaml
  text: They will strike the idle city and lay waste some portion of your land, and they will destroy part of your glory, returning again from devastated Babylon. And you will be broken down by them like stubble, and they will be to you like fire.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:29:47Z'
    unchanged: false
    changes_summary: 'Restored the first clause from the Latin, which was omitted in the draft: the attack on the idle city, the wasting of part of the land, the destruction of part of the glory, and the return from devastated Babylon. Kept the final sentence with slight adjustment only by preserving it as part of the full verse.'
translation:
  language: es
  text: Golpearán la ciudad indolente y devastarán alguna porción de tu tierra, y destruirán parte de tu gloria, regresando de nuevo desde Babilonia arrasada. Y serás derribada por ellos como paja, y ellos te serán como fuego.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: allident ciuitatem otiosam
  english_pob_choice: They will strike the idle city
  chosen_spanish: Golpearán la ciudad ociosa
  alternatives_spanish:
  - Herirán la ciudad ociosa
  - Acosarán la ciudad ociosa
  lexicon: allident → allido; ciuitatem → civitas; otiosam → otiosa
  rationale: allido tiene el sentido de golpear/abatir; «golpearán» conserva la acción concreta sin añadir interpretación. «ciudad ociosa» sigue otiosam de forma directa y respeta la caracterización de la ciudad como improductiva o inactiva.
- source_word: exterent aliquam portionem terrae tuae
  english_pob_choice: lay waste some portion of your land
  chosen_spanish: devastarán alguna porción de tu tierra
  alternatives_spanish:
  - desolarán alguna parte de tu tierra
  - arruinarán una porción de tu tierra
  lexicon: exterent → extero; aliquam portionem → alguna porción; terrae tuae → de tu tierra
  rationale: «Devastarán» expresa bien la fuerza de exterere/exterent y coincide con el campo semántico de arrasar o dejar en ruinas. «Porción» mantiene el matiz parcial del latín, sin convertirlo en una generalización total.
- source_word: et partem gloriae tuae exterminabunt
  english_pob_choice: they will destroy part of your glory
  chosen_spanish: y destruirán parte de tu gloria
  alternatives_spanish:
  - y exterminarán parte de tu gloria
  - y aniquilarán parte de tu gloria
  lexicon: partem → parte; gloriae tuae → de tu gloria; exterminabunt → exterminare
  rationale: La POB inglesa ya suaviza exterminabunt a «destroy»; en español «destruirán» comunica la pérdida sin sobrerreproducir una redundancia dura que podría sonar menos natural. Se conserva «parte de tu gloria» para mantener la medida parcial del original.
- source_word: rursum reuertentes a Babylonia subuersa
  english_pob_choice: returning again from devastated Babylon
  chosen_spanish: volviendo otra vez desde Babilonia arrasada
  alternatives_spanish:
  - regresando otra vez desde Babilonia devastada
  - volviendo de nuevo desde Babilonia destruida
  lexicon: rursum reuertentes → volviendo otra vez; a Babylonia subuersa → desde Babilonia arrasada
  rationale: «Volviendo otra vez» refleja la redundancia adverbial del latín sin eliminarla. «Arrasada» reproduce subuersa con una imagen de ruina fuerte y natural en español.
- source_word: Et demolita eris illis pro stipula
  english_pob_choice: And you will be broken down by them like stubble
  chosen_spanish: Y serás derribada por ellos como paja
  alternatives_spanish:
  - Y serás demolida por ellos como paja
  - Y quedarás reducida por ellos como paja
  lexicon: demolita eris → serás demolida/derribada; pro stipula → como paja
  rationale: «Derribada» conserva la idea de ser abatida o deshecha por otros con buen español bíblico. «Paja» es el equivalente idiomático más transparente de stipula, y evita una palabra menos común como «rastrojo» si no es necesaria.
- source_word: et ipsi
  english_pob_choice: and they will be to you like fire
  chosen_spanish: y ellos te serán como fuego
  alternatives_spanish:
  - y ellos serán para ti como fuego
  - y te serán como fuego
  lexicon: et ipsi → y ellos; (implied comparison) → como fuego
  rationale: El segmento latino está incompleto en el paquete fuente, pero la POB inglesa preserva el cierre comparativo. «Te serán como fuego» mantiene el valor de amenaza y juicio de la imagen sin añadir elementos no atestiguados.
theological_decisions:
- issue: Imagen de juicio contra la ciudad y la tierra
  english_pob_reading: They will strike the idle city and lay waste some portion of your land, and they will destroy part of your glory
  chosen_spanish_reading: Golpearán la ciudad ociosa y devastarán alguna porción de tu tierra, y destruirán parte de tu gloria
  alternative_spanish_readings:
  - Herirán la ciudad ociosa y arrasarán una parte de tu tierra, y destruirán parte de tu gloria
  - Golpearán la ciudad inútil y destruirán parte de tu tierra
  rationale: Se mantiene la secuencia de acciones punitivas sobre ciudad, tierra y gloria, sin moralizar la frase «ciudad ociosa». La opción «ociosa» conserva la tensión del latín y la POB inglesa; no se sustituye por un juicio más interpretativo como «inútil».
  doctrine_reference: Juicio profético/apocalíptico; preservación del lenguaje de devastación literal y simbólica.
- issue: Comparación final con paja/fuego
  english_pob_reading: you will be broken down by them like stubble, and they will be to you like fire
  chosen_spanish_reading: Y serás derribada por ellos como paja, y ellos te serán como fuego
  alternative_spanish_readings:
  - Y serás deshecha por ellos como paja, y ellos serán para ti como fuego
  - Y quedarás como paja ante ellos, y ellos serán como fuego para ti
  rationale: La imagen de paja/fuego comunica fragilidad y consumo total. «Derribada» y «como fuego» mantienen el paralelismo sin convertir la metáfora en explicación doctrinal.
  doctrine_reference: Lenguaje figurado de juicio; no se alegoriza ni se espiritualiza más allá del texto.
translation_notes:
  revision_awareness: 'La revisión reciente restauró en la línea inglesa el primer bloque del latín: el golpe a la ciudad ociosa, la devastación de parte de la tierra, la destrucción de parte de la gloria y el retorno desde Babilonia arrasada. La versión española sigue esa restauración íntegra y conserva también el cierre comparativo final de la POB inglesa, ajustándolo a un español más natural sin borrar la tensión del latín.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiera; este versículo no contiene el nombre divino explícito.
  - Se mantiene «gloria» como equivalente de gloriae, sin reinterpretarla como honor o esplendor, para conservar la concreción del texto.
  - No se introduce puntuación exegética adicional; la segmentación sigue la progresión del latín y de la revisión inglesa.
