review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el latín y la traducción POB inglesa: conserva el ataque a la ciudad, la devastación parcial de la tierra, la destrucción de parte de la gloria, el regreso desde Babilonia devastada y la imagen final de paja/fuego. La única reserva significativa es de estilo/sentido en «ociosa», que en español aplicado a una ciudad suena algo calcado y menos claro que una opción más natural que preserve la idea de inactividad o complacencia.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «ciudad ociosa» suena poco idiomático en español bíblico actual. También «volviendo otra vez» puede simplificarse a «regresando de nuevo» o «volviendo de nuevo» sin perder la repetición enfática. El resto fluye bien y mantiene el tono profético.
  glossary_alignment: No hay términos del glosario maestro en juego de forma conflictiva. Las decisiones léxicas principales son aceptables. Conviene ajustar «otiosam» a una formulación más natural en español, como «la ciudad indolente», que preserva mejor el matiz de dejadez/inactividad que «ociosa».
  issues:
  - severity: medium
    issue: «la ciudad ociosa» suena calcado y menos natural en español
    rationale: Aunque reproduce formalmente otiosam, en español moderno «ociosa» aplicado a una ciudad puede sonar extraño o ambiguo. «Indolente» conserva la idea de inactividad/complacencia con mejor legibilidad e igual fuerza profética.
  - severity: low
    issue: «volviendo otra vez» resulta algo tosco
    rationale: Refleja bien la redundancia de rursum reuertentes, pero «regresando de nuevo» mantiene el énfasis con español más fluido.
  revised_spanish_text: Golpearán la ciudad indolente y devastarán alguna porción de tu tierra, y destruirán parte de tu gloria, regresando de nuevo desde Babilonia arrasada. Y serás derribada por ellos como paja, y ellos te serán como fuego.
  revision_rationale: 'Se revisa únicamente para mejorar la naturalidad y precisión del español sin apartarse del sentido fuente: «ciudad indolente» comunica mejor otiosam que «ciudad ociosa», y «regresando de nuevo» suena más natural que «volviendo otra vez» mientras conserva la repetición enfática del latín.'
