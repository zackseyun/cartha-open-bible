revisions:
- from: Golpearán la ciudad ociosa y devastarán alguna porción de tu tierra, y destruirán parte de tu gloria; volviendo otra vez desde Babilonia arrasada. Y serás derribada por ellos como paja, y ellos te serán como fuego.
  to: Golpearán la ciudad indolente y devastarán alguna porción de tu tierra, y destruirán parte de tu gloria, regresando de nuevo desde Babilonia arrasada. Y serás derribada por ellos como paja, y ellos te serán como fuego.
  rationale: 'Se revisa únicamente para mejorar la naturalidad y precisión del español sin apartarse del sentido fuente: «ciudad indolente» comunica mejor otiosam que «ciudad ociosa», y «regresando de nuevo» suena más natural que «volviendo otra vez» mientras conserva la repetición enfática del latín.'
