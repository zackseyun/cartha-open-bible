translation:
  language: es
  text: Vendrás como jefe, y nuevamente recibirás males. Y al pasar
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: primaria
  english_pob_choice: As chief
  chosen_spanish: Como principal
  alternatives_spanish:
  - Como jefe
  - Como primero
  - Como principal dirigente
  lexicon: primaria
  rationale: El latín primaria aquí funciona como adjetivo de prioridad o preeminencia; 'principal' conserva la idea de primacía sin añadir una imagen eclesiástica ajena al contexto.
- source_word: uenies
  english_pob_choice: you will come
  chosen_spanish: vendrás
  alternatives_spanish:
  - vendrás aquí
  - llegarás
  lexicon: uenies
  rationale: '''Vendrás'' expresa el movimiento de llegada de forma natural en español y mantiene la simpleza del original.'
- source_word: accipies mala
  english_pob_choice: you will receive evils
  chosen_spanish: recibirás males
  alternatives_spanish:
  - recibirás males/daños
  - sufrirás males
  lexicon: accipies mala
  rationale: '''Males'' refleja el plural neutro del latín y preserva el tono amplio de calamidades o daños, sin convertirlo en una interpretación demasiado específica.'
- source_word: et in transitu
  english_pob_choice: And in passing
  chosen_spanish: Y al pasar
  alternatives_spanish:
  - Y en el paso
  - Y mientras pases
  lexicon: et in transitu
  rationale: La frase latina queda abierta y fragmentaria en el testimonio; 'al pasar' conserva esa incompletitud y el valor de transición sin sobreexplicar el complemento.
theological_decisions:
- issue: Tratamiento de primaria como estatus o prioridad
  english_pob_reading: As chief
  chosen_spanish_reading: Como principal
  alternative_spanish_readings:
  - Como jefe
  - Como primero
  rationale: El texto no ofrece una categoría teológica precisa; por eso se evita cargar 'principal' con un matiz doctrinal. Se mantiene la neutralidad de preeminencia que el audit trail inglés ya adoptó.
  doctrine_reference: No aplica; decisión léxica de rango/precedencia.
translation_notes:
  revision_awareness: La revisión más reciente corrigió una desalineación versicular y dejó este segmento como traducción de 'primaria uenies, et rursum accipies mala. Et in transitu'. Se evitó añadir 'infeliz' porque no está en el testimonio textual suministrado.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo simple del latín: llegada de preeminencia, recepción de males y cláusula final incompleta de transición.'
  - No se introdujo puntuación interpretativa que cierre la frase, porque el testimonio termina en 'et in transitu'.
  - Se prefirió 'males' en plural para conservar el alcance genérico del latín mala.
