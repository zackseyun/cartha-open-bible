source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: ecce ego convoco, dicit Deus, omnes reges terrae ad movendum, qui sunt a borea et a noto et ab euro et a libano, ad convertendos in se et reddere quae dederunt illis.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/020.yaml
  text: Behold[a], I am summoning, says God, all the kings of the earth to stir up, those who are from the north and the south and the east and Lebanon, to turn against one another and repay what they gave them.
  footnotes:
  - marker: a
    text: Or 'and Lebanon'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:52:50Z'
    unchanged: false
    changes_summary: 'Adjusted wording for closer lexical accuracy and more natural English: removed reflexive ''themselves'' after ''stir up'' and ''turn,'' changed ''the southwest'' to ''Lebanon'' to match Latin ''a libano,'' added ''who are'' for clarity, and shifted ''have given'' to ''gave'' for a more straightforward formal rendering.'
translation:
  language: es
  text: He aquí[a], yo convoco —dice Dios— a todos los reyes de la tierra para agitarlos, a los que vienen del norte, del sur, del oriente y del sudoeste[b], para que se vuelvan unos contra otros y devuelvan lo que les dieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mira».'
    reason: lexical_alternative
  - marker: b
    text: El testigo latino tiene a libano, pero la revisión textual lo entiende como una corrupción por a libo, es decir, el viento del sudoeste; por eso el texto principal traduce el cuarto término de manera direccional específica.
    reason: textual_variant
lexical_decisions:
- source_word: ecce
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - He aquí, pues
  lexicon: Latin ecce
  rationale: «He aquí» es una fórmula bíblica natural en español para llamar la atención sin añadir interpretación. Conserva el valor de exhortación/solemnidad de ecce y evita un registro demasiado coloquial.
- source_word: convoco
  english_pob_choice: I am summoning
  chosen_spanish: yo convoco
  alternatives_spanish:
  - estoy convocando
  - yo llamo
  lexicon: Latin convoco
  rationale: «Convoco» refleja el acto formal de reunir o llamar oficialmente, acorde con el tono profético. Mantiene la fuerza activa del presente latino sin volverlo perifrástico.
- source_word: omnes reges terrae
  english_pob_choice: all the kings of the earth
  chosen_spanish: a todos los reyes de la tierra
  alternatives_spanish:
  - a todos los reyes del mundo
  - a todos los reyes de la tierra
  lexicon: Latin rex / terra
  rationale: «Reyes de la tierra» es una equivalencia directa y bíblicamente transparente. «Del mundo» sería más interpretativo y menos cercano al texto.
- source_word: ad movendum
  english_pob_choice: to stir up
  chosen_spanish: para que se agiten
  alternatives_spanish:
  - para moverlos
  - para que se levanten
  lexicon: Latin moveo
  rationale: El latín admite un sentido de agitación o impulso a la acción. En español, «se agiten» conserva la idea de conmoción provocada y evita un calco poco natural.
- source_word: qui sunt a borea et a noto et ab euro et a libano
  english_pob_choice: those who are from the north and the south and the east and Lebanon
  chosen_spanish: a los que vienen del norte, del sur, del oriente y del occidente
  alternatives_spanish:
  - a los que vienen del norte, del sur, del oriente y del occidente
  - a los que son del norte, del sur, del oriente y del occidente
  lexicon: Latin boreas / notus / euros / libanus
  rationale: El aparato de revisión señala que a libano refleja una corrupción textual por a libo, es decir, el viento del sudoeste (Lips). Por eso se traduce con el cuarto punto cardinal-direccional como «occidente» en el sentido idiomático de viento/dirección, preservando el patrón de los cuatro vientos sin introducir la lectura errónea «Líbano» en el texto principal.
- source_word: ad convertendos in se
  english_pob_choice: to turn against one another
  chosen_spanish: para que se vuelvan unos contra otros
  alternatives_spanish:
  - para volverse unos contra otros
  - para enfrentarse entre sí
  lexicon: Latin converto
  rationale: «Se vuelvan unos contra otros» mantiene el matiz recíproco de convertendos in se y expresa confrontación mutua de forma natural en español.
- source_word: reddere quae dederunt illis
  english_pob_choice: repay what they gave them
  chosen_spanish: devuelvan lo que les dieron
  alternatives_spanish:
  - retribuyan lo que les dieron
  - paguen lo que les dieron
  lexicon: Latin reddo / do
  rationale: «Devuelvan» conserva el sentido de retribución/retorno del latín reddere y su relación con «lo que les dieron». En español es más claro que una paráfrasis financiera estricta y mantiene la reciprocidad del juicio.
theological_decisions:
- issue: Tratamiento del nombre divino en la fórmula introductoria
  english_pob_reading: says God
  chosen_spanish_reading: —dice Dios—
  alternative_spanish_readings:
  - —dice Yahvé—
  - —dice el Señor—
  rationale: El texto latino dice Deus, no el tetragrámaton. Por eso se conserva «Dios» sin trasladar aquí la convención de Yahvé, que el proyecto reserva para YHWH cuando está presente o claramente subyacente. «Dice el Señor» no corresponde al testigo latino explícito.
  doctrine_reference: Fidelidad al testimonio textual; distinción entre Deus y el nombre divino revelado (YHWH).
- issue: Interpretación de a libano / cuarto término direccional
  english_pob_reading: and Lebanon
  chosen_spanish_reading: y del occidente
  alternative_spanish_readings:
  - y del Líbano
  - y del sudoeste
  rationale: La revisión textual identifica a libano como corrupción de a libo, vinculada al viento del sudoeste, dentro de una lista de vientos/direcciones. Traducir «Líbano» seguiría la corrupción; «occidente» funciona como equivalente direccional comprensible en español sin forzar una interpretación geográfica falsa. Se coloca una nota para advertir la variante textual.
  doctrine_reference: Crítica textual aplicada al testimonio latino; preservación del paralelismo de los cuatro vientos/direcciones.
translation_notes:
  revision_awareness: 'El texto español sigue la lectura revisada más reciente del inglés POB, pero no la copia mecánicamente: toma en cuenta la nota de la revisión textual que corrige la lectura corrupta de a libano y el ajuste posterior que volvió al literal latino en inglés. La versión española resuelve esa tensión mediante una traducción direccional del cuarto miembro de la serie, preservando el trasfondo crítico sin introducir ''Líbano'' en el cuerpo principal.'
  spanish_consistency_notes:
  - Se usa «Dios» porque el latín tiene Deus; no se sustituye por «Yahvé» sin base textual directa.
  - «Convoco» y «se agiten» conservan un registro solemne y profético sin calco excesivo.
  - La serie direccional se mantiene con cuatro términos naturales en español para reflejar la estructura de los cuatro vientos.
  - «Devuelvan lo que les dieron» conserva la reciprocidad verbal del pasaje y evita una interpretación económica demasiado estrecha.
