translation:
  language: es
  text: entonces estos se llenarán de confusión y callarán[a] a causa de su fuerza, y volverán sus pies hacia la huida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quedarán en silencio por su fuerza».
    reason: Preserva la alternativa histórica documentada, distinguiéndola del texto principal sin introducir la pasiva explícita rechazada en la revisión inglesa.
lexical_decisions:
- source_word: turbabuntur
  english_pob_choice: will be thrown into confusion
  chosen_spanish: se llenarán de confusión
  alternatives_spanish:
  - serán confundidos
  - se turbarán
  lexicon: turbare
  rationale: El latín indica una acción futura pasiva/reflexiva de quedar perturbados o desordenados; «se llenarán de confusión» transmite el efecto sin introducir una pasiva demasiado rígida en español.
- source_word: silebunt
  english_pob_choice: fall silent
  chosen_spanish: callarán
  alternatives_spanish:
  - quedarán en silencio
  - enmudecerán
  lexicon: sileo
  rationale: 'El verbo es activo e intransitivo, por lo que conviene un español igualmente activo: «callarán» o «quedarán en silencio». Se evita «serán silenciados», que no corresponde al latín.'
- source_word: in virtute illorum
  english_pob_choice: because of their strength
  chosen_spanish: a causa de su fuerza
  alternatives_spanish:
  - por su fuerza
  - debido a su fuerza
  lexicon: virtus
  rationale: La revisión textual favorece una lectura causal; «a causa de» preserva el sentido de causa de manera clara y natural en español.
- source_word: convertent pedes suos in fugam
  english_pob_choice: they will turn their feet to flight
  chosen_spanish: volverán sus pies a la huida
  alternatives_spanish:
  - pondrán sus pies en fuga
  - huirán
  lexicon: convertere + pedes + fuga
  rationale: La imagen literal del latín es conservar el giro de los pies hacia la huida. «Volverán sus pies a la huida» mantiene la metáfora con suficiente naturalidad; «huirán» sería más idiomático pero menos pegado a la forma del texto.
translation_notes:
  revision_awareness: The latest revision corrected the earlier passive reading of silebunt and preferred a causal rendering of in virtute illorum; the Spanish follows that revised audit trail and keeps the active intransitive force of the Latin.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y directo, sin introducir terminología eclesiástica ajena al latín.
  - «Fuerza» conserva la ambigüedad de virtus en este contexto, donde el audit trail favorece la causalidad sobre una lectura instrumental.
