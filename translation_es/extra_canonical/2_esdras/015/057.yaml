  to: Tus ciudades serán destruidas[a], y todo tu pueblo en el campo caerá a espada. Y los que están en las montañas perecerán de hambre y comerán carne.
  rationale: Se reemplaza `todos los tuyos` por `todo tu pueblo` para expresar con español natural la elipsis latina `omnes tui` según la aclaración ya adoptada en el inglés POB. Se añade una nota para preservar la alternativa editorial previa sobre `su propia carne`, pero se mantiene `comerán carne` en el texto principal porque eso es lo que respalda el tramo latino asignado a este versículo.
