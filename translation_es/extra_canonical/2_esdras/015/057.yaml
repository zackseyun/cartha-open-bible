    reason: Conservar la alternativa previa documentada en el rastro inglés, sin introducirla en el texto principal porque el latín de este verso aquí termina en `carnes` sin el posesivo reflexivo.
  revision_rationale: Se reemplaza `todos los tuyos` por `todo tu pueblo` para expresar con español natural la elipsis latina `omnes tui` según la aclaración ya adoptada en el inglés POB. Se añade una nota para preservar la alternativa editorial previa sobre `su propia carne`, pero se mantiene `comerán carne` en el texto principal porque eso es lo que respalda el tramo latino asignado a este versículo.
