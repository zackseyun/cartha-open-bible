base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/057.yaml
  text: Your cities will be shattered[a], and all your people in the field will fall by the sword. And those in the mountains will perish by famine and will eat flesh.
  footnotes:
  - marker: a
    text: Or 'And those in the mountains will perish by famine and will eat their own flesh'.
    reason: previous_rendering
  revision_pass:
