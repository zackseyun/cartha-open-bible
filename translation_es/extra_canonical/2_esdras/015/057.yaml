    timestamp: '2026-04-23T20:29:46Z'
    unchanged: false
    changes_summary: Clarified the elliptical 'all yours' to 'all your people' for natural English while preserving the sense of the Latin; added final punctuation.
translation:
  language: es
  text: Tus ciudades serán destruidas[a], y todo tu pueblo en el campo caerá a espada. Y los que están en las montañas perecerán de hambre y comerán carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Y los que están en las montañas perecerán de hambre y comerán su propia carne".'
    reason: Conservar la alternativa previa documentada en el rastro inglés, sin introducirla en el texto principal porque el latín de este verso aquí termina en `carnes` sin el posesivo reflexivo.
lexical_decisions:
- source_word: ciuitates tuae conterentur
  english_pob_choice: Your cities will be shattered
  chosen_spanish: Tus ciudades serán destruidas
  alternatives_spanish:
  - Tus ciudades serán deshechas
  - Tus ciudades serán quebrantadas
  lexicon: Latin contero
  rationale: Conterentur expresa ruina violenta; en español, "destruidas" comunica bien el golpe devastador sin introducir una metáfora menos clara. "Shattered" en inglés POB también favorece una imagen de destrucción completa.
- source_word: omnes tui in campo gladio cadent
  english_pob_choice: all your people in the field will fall by the sword
  chosen_spanish: todos los tuyos en el campo caerán a espada
  alternatives_spanish:
  - todo tu pueblo en el campo caerá a espada
  - todos los tuyos en el campo morirán a espada
  lexicon: Latin tui; gladio cadent
  rationale: El latín usa un posesivo sustantivado, equivalente a "all yours"/"your people". Mantengo "los tuyos" para preservar esa densidad y el tono colectivo; "caerán a espada" conserva el giro bíblico literal.
- source_word: Et qui sunt in montibus fame peribunt
  english_pob_choice: And those in the mountains will perish by famine
  chosen_spanish: Y los que están en las montañas perecerán de hambre
  alternatives_spanish:
  - Y los que están en los montes morirán de hambre
  - Y los que estén en las montañas perecerán por hambre
  lexicon: Latin qui sunt in montibus; fame peribunt
  rationale: '"Los que están en las montañas" refleja el relativo presente del latín; "perecerán de hambre" reproduce la causa de muerte con naturalidad en español.'
- source_word: et manducabunt carnes
  english_pob_choice: and will eat flesh
  chosen_spanish: y comerán carne
  alternatives_spanish:
  - y comerán carne humana
  - y comerán sus carnes
  lexicon: Latin manducabunt carnes
  rationale: El latín dice simplemente "carne(s)" sin el posesivo reflexivo que aparece en la lectura alternativa documentada para el verso siguiente. Por eso el español debe quedarse en "carne" sin añadir "propia" ni "humana" en el texto principal.
theological_decisions:
- issue: La escena de juicio y devastación no requiere atenuar el lenguaje corporal de guerra y hambre
  english_pob_reading: Your cities will be shattered, and all your people in the field will fall by the sword. And those in the mountains will perish by famine and will eat flesh.
  chosen_spanish_reading: Tus ciudades serán destruidas, y todos los tuyos en el campo caerán a espada. Y los que están en las montañas perecerán de hambre y comerán carne.
  alternative_spanish_readings:
  - Tus ciudades serán arrasadas...
  - '...y comerán su propia carne'
  rationale: El texto latino presenta juicio histórico y extremo; no conviene suavizarlo ni trasladar aquí la lectura de autodestrucción corporal que el aparato inglés reserva como alternativa para otra frontera textual.
  doctrine_reference: No aplica; pasaje profético de juicio.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que movió la primera mitad del versículo a este lugar y la que corrigió el cierre a 'eat flesh' sin añadir 'their own'. Por eso la versión española incluye ambas cláusulas iniciales y termina de forma estrictamente no reflexiva.
  spanish_consistency_notes:
  - Usé "Yahvé" solo cuando el fuente lo requiera; aquí no aparece.
  - Conservé el registro bíblico sobrio sin introducir explicaciones ajenas al verso.
  - Mantuve la distinción entre plural colectivo ('los tuyos') y el grupo en las montañas.
  - No añadí nota al pie porque no hay ambigüedad textual que requiera anclaje explícito en español.
