  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del latín en las cuatro cláusulas principales: ciudades destruidas, gente cayendo a espada, los de los montes pereciendo de hambre y comiendo carne. Sin embargo, en `omnes tui` el inglés auditado ya aclaró la elipsis como ''all your people'', y en español `todos los tuyos` suena más ambiguo y menos natural que una explicitación equivalente. También conviene reflejar la nota heredada del rastro POB sobre la alternativa textual previa respecto de ''su propia carne'', sin meterla en el texto principal.'
  spanish_quality_summary: El español es claro y digno, pero `todos los tuyos` resulta algo opaco en registro neutral moderno y puede entenderse como posesión afectiva más que como colectivo poblacional. `Todo tu pueblo` o `toda tu gente` mejora la legibilidad. El resto del verso fluye bien; `caerán a espada`, `perecerán de hambre` y `comerán carne` son naturales y fieles.
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión de mantener `carne` sin añadir `propia` ni `humana` está bien alineada con el latín `carnes` y con la revisión inglesa que reservó `their own` para la frontera textual siguiente. `Destruidas` es aceptable para `conterentur`, aunque `hechas pedazos`/`quebrantadas` reflejarían más literalmente la imagen; no es un problema suficiente para rechazar.
  issues:
  - severity: medium
    issue: '`todos los tuyos` traduce demasiado literalmente `omnes tui`'
    rationale: Aunque formalmente posible, en español bíblico legible suena ambiguo y menos natural que `todo tu pueblo`, especialmente porque el inglés POB ya documentó la aclaración de la elipsis como 'all your people'.
  - severity: low
    issue: Falta la nota alternativa heredada sobre `eat flesh`
    rationale: El texto principal correctamente no añade `su propia`, pero el rastro inglés conserva una alternativa previa que puede mantenerse como nota en español para preservar transparencia editorial.
