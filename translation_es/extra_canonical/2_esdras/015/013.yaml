base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/013.yaml
  text: Let those who cultivate the land mourn, because their seed will fail, and their trees will be laid waste by blight and hail and by a dreadful star.
  revision_pass:
