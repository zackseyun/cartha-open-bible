    changes_summary: Replaced 'the farmers who work the ground' with 'those who cultivate the land' to more closely reflect cultores operantes terram while keeping formal, natural English. The rest of the draft is accurate and complete.
translation:
  language: es
  text: Lloren los que cultivan la tierra, porque su semilla fallará, y sus árboles serán devastados por el tizón y el granizo y por una estrella terrible.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: cultores operantes terram
  english_pob_choice: those who cultivate the land
  chosen_spanish: los que cultivan la tierra
  alternatives_spanish:
  - los que labran la tierra
  - los agricultores
  - quienes trabajan la tierra
  lexicon: cultores
  rationale: Cultores expresa la idea de quienes cultivan o labran; en español, 'los que cultivan la tierra' conserva el sujeto general sin restringirlo a una profesión moderna ni endurecer el estilo.
- source_word: lugeant
  english_pob_choice: mourn
  chosen_spanish: lloren
  alternatives_spanish:
  - lamenten
  - hagan duelo
  lexicon: lugeo
  rationale: El latín pide un lamento visible y solemne; 'lloren' comunica ese duelo en español bíblico contemporáneo con naturalidad. 'Lamenten' sería posible, pero menos directo.
- source_word: deficient semina eorum
  english_pob_choice: their seed will fail
  chosen_spanish: su semilla fallará
  alternatives_spanish:
  - su semilla se agotará
  - les faltará la semilla
  lexicon: deficio
  rationale: '''Fallará'' conserva la idea de fracaso o falta de rendimiento del cultivo sin añadir una interpretación técnica que el latín no exige.'
- source_word: vastabuntur ligna eorum
  english_pob_choice: their trees will be laid waste
  chosen_spanish: sus árboles serán devastados
  alternatives_spanish:
  - sus árboles serán arrasados
  - sus árboles serán destruidos
  lexicon: vasto
  rationale: '''Serán devastados'' refleja bien el pasivo de vastabuntur y mantiene el paralelismo fuerte con el juicio sobre la tierra y los árboles.'
- source_word: ab uredine et grandine
  english_pob_choice: by blight and hail
  chosen_spanish: por la tizón y el granizo
  alternatives_spanish:
  - por el tizón y el granizo
  - por la plaga y el granizo
  lexicon: uredo; grando
  rationale: '''Uredo'' puede referirse a tizón o roya; aquí ''tizón'' es una equivalencia natural y suficientemente amplia. Mantengo ''granizo'' para grandine sin cambio.'
- source_word: a sidus terribile
  english_pob_choice: by a dreadful star
  chosen_spanish: por una estrella terrible
  alternatives_spanish:
  - por una estrella espantosa
  - por un astro terrible
  lexicon: sidus
  rationale: '''Sidus'' se traduce literalmente como ''estrella'' o ''astro''; ''estrella terrible'' sigue de cerca el texto y preserva el tono ominoso del presagio.'
theological_decisions:
- issue: Naturaleza del castigo agrícola como juicio apocalíptico
  english_pob_reading: The verse describes calamity on cultivation, seed, and trees, ending with a dreadful star.
  chosen_spanish_reading: El versículo presenta un juicio catastrófico sobre la agricultura, la semilla y los árboles, culminando en una estrella terrible.
  alternative_spanish_readings:
  - El versículo describe solo una desgracia meteorológica
  - El versículo alude a señales apocalípticas además del daño agrícola
  rationale: 'La secuencia del latín va más allá de un mal tiempo común: une fallos agrícolas con imágenes de devastación y un astro temible. La traducción debe dejar abierta esa tensión sin explicarla en exceso.'
  doctrine_reference: Lectura apocalíptica de 2 Esdras / Esdras apocalíptico
translation_notes:
  revision_awareness: This draft follows the latest English revision that changed 'the farmers who work the ground' to 'those who cultivate the land.' The Spanish rendering mirrors that broader, more literal subject rather than narrowing it to a modern occupational label.
  spanish_consistency_notes:
  - Se mantiene 'tierra' para terram en el sentido de suelo cultivable, coherente con 'cultivan'.
  - '''Estrella terrible'' conserva el posible valor ominoso/apocalíptico de sidus sin precisar si se trata de un fenómeno astronómico o de una señal simbólica.'
  - No se introduce 'SEÑOR' ni terminología eclesiástica ajena al texto.
  - Se evita 'campesinos' por su carga sociocultural moderna y por ser más restrictivo que cultores.
