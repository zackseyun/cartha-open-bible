review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura retórica y el sentido judicial de Numquid ego sic zelabo te ... dice el Señor. Sin embargo, «celoso» en español moderno tiende demasiado a la idea posesiva o emocional, y aun con nota no preserva con suficiente claridad la decisión inglesa revisada de 'zealous against you' en contexto de juicio.
  spanish_quality_summary: La redacción es comprensible y digna, pero «tan celoso contra ustedes» suena poco natural y semánticamente equívoco. «Tan lleno de celo contra ustedes» mantiene el campo léxico de celo, evita el falso sentido de envidia/celos posesivos y suena mejor en español eclesial general.
  glossary_alignment: No hay términos del glosario principal directamente implicados salvo «Señor», que aquí es aceptable porque el testimonio inmediato dado es latino con 'dice el Señor' y no una ocurrencia explícita de YHWH en hebreo. La revisión propuesta sigue la rationale documentada para ζηλώσω/zelabo como celo judicial, no 'jealous'.
  issues:
  - severity: medium
    issue: «celoso» como texto principal es ambiguo en español
    rationale: Aunque etimológicamente se relaciona con 'celo', en uso común 'celoso' sugiere posesividad o envidia. En un contexto de juicio divino, eso puede desviar el sentido que el audit trail inglés corrigió expresamente.
  - severity: low
    issue: La nota actual repite casi el mismo texto principal como alternativa
    rationale: La footnote inglesa preserva una alternativa histórica ('jealous'); en español conviene reflejar esa posibilidad con una formulación realmente alternativa y claramente secundaria, no duplicar casi exacto el texto base.
