translation:
  language: es
  text: ¿Sería yo tan lleno de celo contra ustedes?, dice el Señor.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Sería yo tan celoso contra ustedes?, dice el Señor». Aquí «lleno de celo» expresa ardor o indignación divina en juicio, no celos en sentido posesivo.'
    reason: previous_rendering / lexical_clarification
lexical_decisions:
- source_word: Numquid ego sic zelabo te
  english_pob_choice: Would I be so zealous against you, says the Lord,
  chosen_spanish: ¿Sería yo tan celoso contra ustedes[a]?, dice el Señor.
  alternatives_spanish:
  - ¿Estaría yo tan airado contra ustedes?
  - ¿Tendría yo tal celo contra ustedes?
  lexicon: zelabo -> celoso / celo
  rationale: El latín zelabo refleja el griego ζηλώσω en un marco de juicio divino. En español, «celoso» conserva la raíz léxica de «celo», pero puede sonar ambiguo; por eso se usa en la pregunta retórica y se apoya con la nota para dejar abierta la lectura de celo ardiente o indignación. Se evita «celoso» en sentido romántico y también una paráfrasis demasiado fuerte como «airado» como texto principal.
- source_word: Numquid ego sic zelabo te
  english_pob_choice: Would I be so zealous against you, says the Lord,
  chosen_spanish: ¿Sería yo tan celoso contra ustedes[a]?, dice el Señor.
  alternatives_spanish:
  - ¿Sería yo tan celoso de ustedes?
  - ¿Sería yo tan celoso por ustedes?
  lexicon: te -> contra ustedes
  rationale: El contexto de castigo y venganza en el versículo siguiente muestra que la preposición expresa oposición, no afecto posesivo. Por eso se traduce «contra», manteniendo el sentido polémico/judicial que el POB inglés fijó con «against you».
- source_word: says the Lord
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - —dice el Señor—
  - —afirma el Señor—
  lexicon: dicit Dominus -> dice el Señor
  rationale: Se mantiene la fórmula profética sobria y directa, sin sustituirla por un giro más explicativo. «Señor» reproduce el audit trail inglés y es idiomático en español.
theological_decisions:
- issue: Sentido de ζηλώσω/zelabo en juicio divino
  english_pob_reading: Would I be so zealous against you, says the Lord,
  chosen_spanish_reading: ¿Sería yo tan celoso contra ustedes[a]?, dice el Señor.
  alternative_spanish_readings:
  - ¿Sería yo tan airado contra ustedes?
  - ¿Sería yo tan celoso en mi contra de ustedes?
  rationale: El pasaje no habla de envidia ni de celos posesivos, sino de celo divino en contexto de retribución. En español, «celoso» conserva la relación con el campo semántico de celo; la nota permite entender que la fuerza es la de una indignación vengadora o ardor judicial.
  doctrine_reference: juicio divino; retribución por la sangre derramada (contexto inmediato de 2 Esdras 15:53)
- issue: Valor temporal de la forma verbal
  english_pob_reading: Would I be so zealous against you, says the Lord,
  chosen_spanish_reading: ¿Sería yo tan celoso contra ustedes[a]?, dice el Señor.
  alternative_spanish_readings:
  - ¿Habría sido yo tan celoso contra ustedes?
  - ¿Sería yo tan celoso contra ustedes si...?
  rationale: La revisión inglesa prefirió «Would I be» para reflejar mejor la forma futura del latín zelabo dentro de una pregunta retórica condicional. En español, el condicional simple «sería» reproduce esa apertura hipotética sin forzar un pretérito perfecto ajeno al valor del original.
  doctrine_reference: sintaxis condicional-retórica; correspondencia verbal con futuro latino empleado apodóticamente
translation_notes:
  revision_awareness: 'La base inglesa pasó de «Would I have been so jealous against you» a «Would I be so zealous against you» para ajustar el valor de zelabo como celo/ira judicial y no como «jealousy» moderna. La versión española sigue esa revisión: evita el pretérito perfecto y mantiene el contraste retórico con una pregunta condicional en presente hipotético.'
  spanish_consistency_notes:
  - Se conserva «Señor» en la fórmula final, como equivalente directo del audit trail inglés.
  - Se usa «contra ustedes» para reflejar la oposición judicial del contexto, no un sentimiento de posesión.
  - La nota a pie de página resuelve la ambigüedad de «celoso» en español sin suavizar el vigor del original.
