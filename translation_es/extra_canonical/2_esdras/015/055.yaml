revisions:
- from: Las ganancias de una prostituta están en tu seno[a]; por tanto, recibirás retribución.
  to: El pago de una prostituta está en tu regazo[a]; por eso recibirás retribución.
  rationale: Se ajusta merces a «pago» para reflejar con más precisión el latín y el inglés auditado («wages»). Se cambia «seno» por «regazo» por mayor claridad natural en español sin perder fidelidad a sinus. Se reemplaza la nota léxica menor por la nota de historial textual ya documentada en el POB inglés, que debe preservarse como parte del rastro de revisión.
