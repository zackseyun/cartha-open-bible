  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Prostituta» está bien elegido. La principal mejora es léxica: preferir «pago» sobre «ganancias» para merces en este contexto. También conviene conservar en nota la lectura anterior documentada por el POB inglés, no solo una alternativa léxica española.'
