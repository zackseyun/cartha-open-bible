translation:
  language: es
  text: El pago de una prostituta está en tu regazo[a]; por eso recibirás retribución.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como haces con mis escogidos, dice el Señor, así Dios hará contigo y te entregará a males. Y tus hijos morirán de hambre, y tú caerás a espada ancha»; esta fue una lectura anterior debida a una desalineación de versículos.'
    reason: previous_rendering
lexical_decisions:
- source_word: merces
  english_pob_choice: wages
  chosen_spanish: ganancias
  alternatives_spanish:
  - salario
  - paga
  - recompensa
  lexicon: merces
  rationale: En este contexto la palabra latina designa el pago obtenido por una actividad ilícita; «ganancias» conserva la idea de lo recibido como fruto de una práctica sin sugerir un salario legítimo.
- source_word: fornicariae
  english_pob_choice: prostitute
  chosen_spanish: prostituta
  alternatives_spanish:
  - fornicaria
  - ramera
  lexicon: fornicaria
  rationale: El genitivo latino fornicariae especifica a una mujer prostituta; «prostituta» es la equivalencia española más clara y directa, mientras que «ramera» sería más marcada y menos neutral.
- source_word: in sinus tuos
  english_pob_choice: in your bosom
  chosen_spanish: en tu seno
  alternatives_spanish:
  - en tu regazo
  - en tu pecho
  lexicon: sinus
  rationale: «Seno» conserva el valor corporal/figurativo de sinus como receptáculo cercano al cuerpo. «Regazo» es posible, pero «seno» resulta más amplio y más fiel al latín.
- source_word: redditionem percipies
  english_pob_choice: you will receive repayment
  chosen_spanish: recibirás retribución
  alternatives_spanish:
  - recibirás pago
  - recibirás retribución completa
  - percibirás restitución
  lexicon: redditionem / percipies
  rationale: La frase expresa retribución o devolución merecida. «Retribución» mantiene el sentido de pago retributivo y evita introducir la noción de restitución estrictamente legal sin apoyo explícito.
theological_decisions:
- issue: Sentido retributivo de la frase
  english_pob_reading: therefore you will receive repayment
  chosen_spanish_reading: por tanto, recibirás retribución
  alternative_spanish_readings:
  - por tanto, recibirás pago
  - por eso se te pagará
  rationale: 'La cláusula latina presenta una sentencia de retribución: a la presencia de esas ganancias en el seno sigue el recibimiento de una contrapartida. «Retribución» preserva el tono judicial/moral del juicio.'
  doctrine_reference: Principio bíblico de retribución; no se expande más allá de lo que el texto afirma.
translation_notes:
  revision_awareness: 'La base inglesa auditada muestra una corrección importante de desalineación versicular: la traducción previa había arrastrado contenido de otro versículo. Aquí se sigue el latín limpio de 2 Esdras 15:55: merces fornicariae in sinus tuos, propterea redditionem percipies.'
  spanish_consistency_notes:
  - Se mantiene «prostituta» para fornicariae, en línea con el valor léxico concreto y sin suavizar el término.
  - «Seno» se usa para sinus por su amplitud semántica y su adecuación al registro bíblico; se ofrece «regazo» en nota como alternativa natural en español.
  - «Retribución» evita convertir redditionem en simple «pago» comercial y conserva el matiz de devolución merecida.
