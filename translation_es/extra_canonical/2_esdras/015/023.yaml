translation:
  language: es
  text: Y salió fuego de su ira y devoró los cimientos de la tierra[a] y devoró a los pecadores como paja encendida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y salió fuego de su ira y devoró los cimientos de la tierra, y devoró a los pecadores como paja encendida».

      '
    reason: Preservar en español la alternativa documentada de puntuación/sintaxis, aclarando que la diferencia está en la pausa y no en el contenido léxico esencial.
lexical_decisions:
- source_word: et exiit ignis ab ira eius
  english_pob_choice: And fire went out from his wrath
  chosen_spanish: Y salió fuego de su ira
  alternatives_spanish:
  - Y salió fuego de su ira ardiente
  - Y salió fuego por su ira
  lexicon: ignis; exiit; ira
  rationale: El latín presenta fuego que ‘sale’ de la ira de Dios; ‘salió fuego de su ira’ conserva la imagen causal y el movimiento verbal sin añadir explicaciones. ‘Ira’ mantiene el sustantivo directo del texto fuente.
- source_word: devoravit fundamenta terrae
  english_pob_choice: devoured the foundations of the earth
  chosen_spanish: devoró los cimientos de la tierra
  alternatives_spanish:
  - consumió los cimientos de la tierra
  - devoró los fundamentos de la tierra
  lexicon: devoravit; fundamenta; terrae
  rationale: ‘Devorar’ reproduce bien el verbo fuerte del latín y el paralelismo apocalíptico. ‘Cimientos’ es más natural en español que ‘fundamentos’ para una base material de la tierra, sin perder el sentido de destrucción total.
- source_word: peccatores quasi stramen incensum
  english_pob_choice: sinners like straw set ablaze
  chosen_spanish: a los pecadores como paja encendida
  alternatives_spanish:
  - y a los pecadores como paja encendida
  - a los pecadores como paja quemada
  lexicon: peccatores; quasi; stramen; incensum
  rationale: ‘Como paja encendida’ conserva la comparación y el participio pasivo del latín de forma idiomática. ‘Encendida’ mantiene la imagen de combustión activa mejor que ‘quemada’, que sonaría más concluida y menos visual.
theological_decisions:
- issue: La ira divina como agente de juicio destructivo
  english_pob_reading: And fire went out from his wrath
  chosen_spanish_reading: Y salió fuego de su ira
  alternative_spanish_readings:
  - Y salió fuego por su ira
  - Y de su ira salió fuego
  rationale: Se mantiene la relación directa entre la ira de Dios y el fuego como juicio. No se suaviza la tensión teológica ni se sustituye por una formulación más abstracta; el texto describe acción judicial, no solo emoción.
  doctrine_reference: Juicio divino en literatura apocalíptica; cf. imágenes de fuego de juicio en el AT y literatura profética.
- issue: Ambigüedad sintáctica sobre si la cláusula final depende de la anterior
  english_pob_reading: '...devoured the foundations of the earth[a], and sinners like straw set ablaze.'
  chosen_spanish_reading: '...devoró los cimientos de la tierra[a], y a los pecadores como paja encendida.'
  alternative_spanish_readings:
  - '...devoró los cimientos de la tierra y a los pecadores como paja encendida.'
  - '...devoró los cimientos de la tierra, y a los pecadores como paja encendida.'
  rationale: Se conserva la separación con coma, siguiendo la revisión inglesa que aclaró la sintaxis. El español también puede leer la última comparación como una acción coordinada independiente, evitando unirla de forma ambigua con ‘cimientos de la tierra’.
  doctrine_reference: Estilo sintáctico apocalíptico; preservación de la imagen de juicio doble sobre creación y pecadores.
translation_notes:
  revision_awareness: La versión inglesa reciente solo ajustó la puntuación para aclarar la sintaxis; no cambió el contenido. La redacción española sigue esa misma lectura, manteniendo el paralelismo entre el juicio sobre la tierra y el juicio sobre los pecadores.
  spanish_consistency_notes:
  - Se mantiene ‘Y’ inicial para reflejar la coordinación narrativa del latín.
  - ‘Cimientos de la tierra’ traduce de modo más natural fundamenta terrae en español sin convertirlo en una paráfrasis.
  - Se conserva ‘pecadores’ en lenguaje directo, sin atenuar el término.
  - La comparación ‘como paja encendida’ queda breve y visual, en línea con el latín y con el audit trail inglés.
