  rationale: Se corrige la ortografía, se separan adecuadamente las notas con marcadores únicos, se restaura la nota de cautela textual sobre la frase difícil del latín, y se ajusta el cierre a «temerán y temblarán» para reflejar mejor timeant et trepidentur. También se mejora la fluidez y cercanía al valor de fertur con «se lleva sobre la tierra».
