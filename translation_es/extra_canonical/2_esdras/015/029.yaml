review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el latín en la secuencia principal: ''saldrán naciones'', ''dragones árabes'', ''con muchos carros'', y el efecto de terror en los oyentes. También recoge correctamente la revisión auditada de a die itineris como distancia, no tiempo. Sin embargo, no preserva bien el matiz de et exient ... in curris multis / cum curris multis en español natural, y pierde parcialmente la fuerza de timeant al reemplazar ''temerán'' por ''temblarán''.'
  spanish_quality_summary: 'La redacción es comprensible, pero necesita ajustes menores para mejor fidelidad y legibilidad: falta tilde en ''árabes''; el marcador [a] está reutilizado de forma inválida en dos lugares para una sola nota; ''será oído'' es menos natural y menos cercano a ''es llevado/se lleva'' que ''se lleva'' o ''se oye''; y ''temblarán y se estremecerán'' duplica dos reacciones físicas en vez de conservar miedo + temblor.'
  glossary_alignment: No hay términos teológicos de proyecto especialmente implicados aquí. La conservación de la frase difícil 'naciones de dragones árabes' es correcta y coherente con la nota inglesa. Conviene mantener la ambigüedad sin resolverla, idealmente con una nota separada para la expresión difícil, como en el rastro de auditoría inglés.
  issues:
  - severity: medium
    issue: El marcador de nota [a] se usa dos veces en el texto para una sola nota.
    rationale: Las instrucciones exigen marcadores únicos y no reutilizados para notas distintas; además solo una de las dos anclas corresponde al contenido de la nota sobre a die itineris.
  - severity: medium
    issue: Falta la nota sobre la frase difícil 'naciones de dragones árabes'.
    rationale: El inglés preserva esta dificultad textual con una nota específica; la revisión española debería conservar esa cautela interpretativa porque la construcción latina sigue siendo opaca.
  - severity: medium
    issue: '''temblarán y se estremecerán'' no refleja bien timeant et trepidentur.'
    rationale: El latín distingue miedo y temblor; en español 'temerán y temblarán' conserva mejor el paralelismo semántico.
  - severity: low
    issue: '''será oído sobre la tierra'' es menos idiomático y menos preciso que una formulación activa o media.'
    rationale: Fertur expresa que el sonido se lleva/se extiende sobre la tierra; 'se lleva sobre la tierra' o 'se oye por toda la tierra' suenan más naturales.
  - severity: low
    issue: 'Ortografía: ''arabes'' debe llevar tilde.'
    rationale: En español estándar corresponde 'árabes'.
  revised_spanish_text: Y saldrán naciones de dragones árabes[a] con muchos carros, y su silbido se lleva sobre la tierra desde una jornada de camino[b], de modo que todos los que los oigan temerán y temblarán.
  revised_footnotes:
