id: 2ES.15.29
reference: 2 Esdras 15:29
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: et exient nationes draconum Arabum in curris multis, et sibilatus eorum a die itinerisfertur super terram, ut etiam timeant et trepidentur omnes qui illos audient.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/029.yaml
  text: And nations of Arabian dragons will come out with many chariots[15:29], and their hissing is carried over the earth from a day's journey away[a], so that all who hear them will fear and tremble.
  footnotes:
  - marker: '15:29'
    text: The phrase 'nations of Arabian dragons' follows the difficult Latin nationes draconum Arabum closely. The imagery may be symbolic, monstrous, or ethnographic in a way no longer fully recoverable from the Latin alone.
    reason: textual_variant
  - marker: a
    text: Or 'from the day of their march'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:52:57Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y saldrán naciones de dragones árabes[a] con muchos carros, y su silbido se lleva sobre la tierra desde una jornada de camino[b], de modo que todos los que los oigan temerán y temblarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «naciones de dragones árabes» sigue de cerca el difícil latín nationes draconum Arabum. La imagen puede ser simbólica, monstruosa o etnográfica de una manera que ya no puede recuperarse por completo solo a partir del latín.
    reason: textual_variant
  - marker: b
    text: 'O: «a una jornada de camino»; el latín a die itineris es una expresión de distancia, no de tiempo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: nationes
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - naciones y pueblos
  lexicon: nationes
  rationale: Conserva el plural colectivo de la fuente latina y la opción inglesa, sin reducirlo a una lectura étnica más estrecha de la que el texto permite.
- source_word: draconum Arabum
  english_pob_choice: Arabian dragons
  chosen_spanish: dragones arabes
  alternatives_spanish:
  - dragones de Arabia
  - dragones árabes
  lexicon: draconum Arabum
  rationale: Mantiene la secuencia difícil del latín y la imaginería monstruosa/ambiguamente simbólica del texto; se usa 'arabes' para reproducir el adjetivo de procedencia sin resolver la ambigüedad interpretativa.
- source_word: curris multis
  english_pob_choice: with many chariots
  chosen_spanish: con muchos carros
  alternatives_spanish:
  - con numerosos carros
  - en muchos carros
  lexicon: currus
  rationale: '''Carros'' es el equivalente natural y preciso en español para el latín currus, conservando el sentido bélico o de desplazamiento multitudinario.'
- source_word: sibilatus eorum
  english_pob_choice: their hissing
  chosen_spanish: su silbido
  alternatives_spanish:
  - su siseo
  - su silbar
  lexicon: sibilatus
  rationale: '''Silbido'' recoge bien el sonido agudo y amenazante del latín; ''siseo'' sería posible, pero ''silbido'' es más transparente en español bíblico moderno.'
- source_word: a die itineris
  english_pob_choice: from a day's journey away
  chosen_spanish: desde una jornada de camino
  alternatives_spanish:
  - a una jornada de camino
  - desde un día de camino
  lexicon: dies itineris
  rationale: 'Sigue la revisión auditable del inglés: se trata de distancia, no de tiempo. ''Jornada de camino'' expresa el valor idiomático de medida de distancia sin forzar un calco demasiado técnico.'
- source_word: timeant et trepidentur
  english_pob_choice: will fear and tremble
  chosen_spanish: temblarán y se estremecerán
  alternatives_spanish:
  - temerán y temblarán
  - tendrán miedo y se estremecerán
  lexicon: timeo / trepido
  rationale: Se conserva el paralelismo de miedo y reacción corporal; 'se estremecerán' añade la dimensión de sobresalto y pánico implícita en trepidare.
theological_decisions:
- issue: Imagen apocalíptica de 'dragones arabes'
  english_pob_reading: The phrase 'nations of Arabian dragons' follows the difficult Latin closely. The imagery may be symbolic, monstrous, or ethnographic in a way no longer fully recoverable from the Latin alone.
  chosen_spanish_reading: La traducción conserva 'dragones arabes' sin aclararla, porque la fuente no permite fijar con seguridad si la imagen es literal, simbólica o etnográfica.
  alternative_spanish_readings:
  - pueblos de dragones arabes
  - naciones de dragones de Arabia
  rationale: Evita domesticar la imagen o imponer una explicación no respaldada por el testimonio latino y el audit trail inglés.
  doctrine_reference: Principio de cautela textual y preservación de ambigüedad recuperable
- issue: Valor de 'a die itineris'
  english_pob_reading: Or 'from the day of their march.' revision corrected to 'from a day's journey away'.
  chosen_spanish_reading: 'Se entiende como distancia: ''desde una jornada de camino''.'
  alternative_spanish_readings:
  - desde el día de su marcha
  - a una jornada de camino
  rationale: La revisión documentada corrige una lectura temporal errónea. El español debe reflejar la medida espacial, no el inicio de una marcha.
  doctrine_reference: Fidelidad semántica al latín y a la revisión crítica
- issue: Efecto resultante en los oyentes
  english_pob_reading: so that all who hear them will fear and tremble.
  chosen_spanish_reading: '''de modo que todos los que los oigan temblarán y se estremecerán''.'
  alternative_spanish_readings:
  - para que todos los que los oigan teman y tiemblen
  - así que todos los que los oigan temerán y temblarán
  rationale: Conserva el resultado causal y la duplicación enfática del original, sin suavizar la respuesta de terror.
  doctrine_reference: Retención de intensificación retórica apocalíptica
translation_notes:
  revision_awareness: 'La versión inglesa fue revisada para corregir una mala lectura de a die itineris: no significa ''from the day of their march'', sino una distancia equivalente a ''from a day''s journey away''. La redacción española refleja esa corrección y evita una interpretación temporal.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparece el nombre divino; en este versículo no aplica.
  - Se conserva la imaginería difícil sin sustituirla por un término más explicativo, en línea con el audit trail inglés.
  - '''Carros'' y ''jornada de camino'' siguen el registro bíblico digno pero claro, evitando arcaísmos innecesarios.'
