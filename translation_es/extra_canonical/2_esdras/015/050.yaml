translation:
  language: es
  text: y muerte. Y la gloria de tu fuerza se marchitará como una flor cuando
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: et mortem
  english_pob_choice: and death
  chosen_spanish: y muerte
  alternatives_spanish:
  - y la muerte
  - y la muerte vendrá
  lexicon: mors → muerte
  rationale: El latín ofrece una cláusula nominal breve y abrupta; en español conviene conservar esa concisión. Se omite el artículo para reproducir el golpe retórico del original y la POB inglesa.
- source_word: gloria uirtutis tuae
  english_pob_choice: the glory of your strength
  chosen_spanish: la gloria de tu fuerza
  alternatives_spanish:
  - la gloria de tu poder
  - la gloria de tu vigor
  lexicon: gloria / virtus
  rationale: uirtus en este contexto apunta a fuerza, vigor o poder; ‘fuerza’ mantiene la imagen física y el paralelismo con ‘flor’ y ‘marchitará’. ‘Poder’ sería posible, pero algo más abstracto.
- source_word: sicut flos siccabitur
  english_pob_choice: will wither like a flower
  chosen_spanish: se marchitará como una flor
  alternatives_spanish:
  - se secará como una flor
  - se desvanecerá como una flor
  lexicon: sicut / siccabitur / flos
  rationale: La revisión inglesa prefirió ‘wither’ para ajustar la imagen floral. En español, ‘marchitará’ comunica mejor el efecto de una flor que pierde vitalidad que un seco ‘se secará’.
- source_word: cum
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al
  - cuando llegue
  lexicon: cum
  rationale: El latín conservado termina en cum, por lo que la traducción debe quedar abierta. ‘Cuando’ reproduce fielmente esa apertura sin añadir el contenido eliminado por la revisión inglesa.
theological_decisions:
- issue: Imagen de juicio incompleta por truncamiento textual
  english_pob_reading: and death. And the glory of your strength will wither like a flower when
  chosen_spanish_reading: y muerte. Y la gloria de tu fuerza se marchitará como una flor cuando
  alternative_spanish_readings:
  - y muerte. Y la gloria de tu fuerza se marchitará como una flor al
  - y muerte. Y la gloria de tu fuerza se marchitará como una flor cuando llegue
  rationale: El testimonio latino termina en cum, así que el verso queda sintácticamente abierto. Se preserva esa incompletitud en español sin completar el sentido con contenido no atestiguado.
  doctrine_reference: Principio de fidelidad textual y respeto al estado del testimonio
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que eliminó la expansión no sustentada y dejó solo cum (‘when’). La traducción española sigue ese estado revisado y evita reintroducir el contenido descartado.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto solo cuando el texto la exija; aquí no aparece el nombre divino.
  - ‘fuerza’ se usa para uirtutis en lugar de ‘virtud’ porque el contexto es físico e imagístico, no moral.
  - Se conservó la apertura sintáctica final con ‘cuando’ para reflejar el truncamiento del testimonio latino.
