review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el latín conservado: «et mortem. Et gloria uirtutis tuae sicut flos siccabitur, cum». Conserva la brusquedad de «y muerte», traduce con acierto la imagen «se marchitará como una flor» y respeta la apertura truncada de «cuando». Sin embargo, mantiene una nota alternativa heredada de una lectura inglesa previa ya retirada y no sustentada por el testimonio latino de este registro, que aquí termina en «cum».'
  spanish_quality_summary: El español principal es claro, natural y digno. «la gloria de tu fuerza» y «se marchitará como una flor» suenan bien en español eclesial amplio. El único problema de calidad editorial es la nota [a], que introduce material ausente del texto fuente y crea confusión innecesaria.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas «muerte», «fuerza», «marchitará» y «cuando» son adecuadas y fieles. La omisión del artículo en «y muerte» es defendible por el tono abrupto del latín.
  issues:
  - severity: high
    issue: La nota al pie [a] conserva una alternativa («cuando se eleve el calor enviado sobre ti») que no está respaldada por el texto latino de este versículo en el estado auditado.
    rationale: La revisión inglesa más reciente eliminó explícitamente esa expansión por no estar apoyada aquí; el latín proporcionado termina en «cum». Mantener la nota contradice la evidencia fuente y el rastro de auditoría POB.
  revised_spanish_text: y muerte. Y la gloria de tu fuerza se marchitará como una flor cuando
  revised_footnotes: []
