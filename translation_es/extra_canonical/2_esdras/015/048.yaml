    issue: Sintaxis poco natural en 'Has imitado en todo las obras y los artificios...'.
    rationale: 'En español, ''imitar en todo'' suele introducir persona o conducta global; aquí el complemento directo enumerado pide una redacción más directa: ''Has imitado todas sus obras y sus artificios'' o ''Has imitado a esa... en todas sus obras y sus artificios''. Esto refleja mejor in omnibus operibus eius et adinuentionibus eius.'
  - severity: low
    issue: Leve desajuste entre el borrador y su propia decisión léxica documentada.
    rationale: La decisión léxica propone 'Has imitado en todo sus obras y sus artificios', mientras el borrador dice 'las obras y los artificios de esa prostituta'. No es grave, pero muestra inconsistencia interna; la revisión puede unificar redacción y justificación.
