translation:
  language: es
  text: 'Has imitado a esa prostituta odiosa en todas sus obras y sus artificios; por eso dice Dios:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Fornicarian odibilem
  english_pob_choice: that hateful prostitute
  chosen_spanish: esa prostituta odiosa
  alternatives_spanish:
  - esa ramera aborrecible
  - esa prostituta detestable
  lexicon: fornicaria / odibilis
  rationale: El latín presenta una figura femenina marcada por inmoralidad sexual y repulsión moral. "Prostituta" conserva el peso lexical y la dureza de la imagen, mientras "odiosa" refleja con naturalidad el valor de odibilem sin sonar excesivamente arcaico. Se evita suavizarla como "mujer infiel" porque el texto fuente es más fuerte.
- source_word: imitata es in omnibus operibus eius et adinuentionibus eius
  english_pob_choice: You have imitated ... in all her works and devices
  chosen_spanish: Has imitado en todo sus obras y sus artificios
  alternatives_spanish:
  - Has seguido en todo sus obras y sus maquinaciones
  - Has copiado en todo sus obras y sus inventos
  lexicon: imitata es / opera / adinventiones
  rationale: '"Has imitado" reproduce el sentido directo de imitación moral o conductual. "Obras" conserva el valor amplio de opera. Para adinuentionibus, "artificios" comunica mejor la idea de recursos, estratagemas o invenciones astutas que "inventos" en español moderno, sin introducir una interpretación más específica de la necesaria.'
- source_word: propterea dicit
  english_pob_choice: 'therefore God says:'
  chosen_spanish: 'por eso dice Dios:'
  alternatives_spanish:
  - 'por tanto dice Dios:'
  - 'por eso dice el Señor:'
  lexicon: propterea dicit
  rationale: La fuente latina solo dice "dice"; el contexto del POB inglés explicita "God says". En español se mantiene esa aclaración porque está respaldada por la lectura auditada y hace inteligible la cita. Se evita "el Señor" para no sustituir indebidamente el referente explícito dado en el audit trail.
theological_decisions:
- issue: Identificación del hablante en la fórmula final
  english_pob_reading: 'therefore God says:'
  chosen_spanish_reading: 'por eso dice Dios:'
  alternative_spanish_readings:
  - 'por eso dice el Señor:'
  - 'por eso dice:'
  rationale: El paquete de auditoría inglés fija a Dios como hablante implícito. Aunque el latín preservado solo tiene "dicit", la adición en español se alinea con el POB inglés y evita ambigüedad en la cita profética. No se traduce como "Señor" porque el testimonio fuente proporcionado no exige esa sustitución.
  doctrine_reference: cita profética / habla divina implícita
translation_notes:
  revision_awareness: La versión inglesa más reciente fue marcada como sin cambios tras revisión de alta concordancia. No hay revisiones aplicadas que afecten el sentido; el español sigue de cerca el audit trail inglés y el latín limpiado.
  spanish_consistency_notes:
  - Se conserva un registro léxico fuerte para la figura sexual despectiva, coherente con la dureza del latín y con la traducción inglesa auditada.
  - '"Artificios" se usa como equivalente amplio de adinuentionibus para mantener la carga de maquinación sin forzar una precisión técnica inexistente en la fuente.'
  - Se evita "Cristo", "Señor" o terminología eclesiástica no apoyada por el pasaje; el texto solo necesita la referencia explícita a Dios dada por el POB inglés.
