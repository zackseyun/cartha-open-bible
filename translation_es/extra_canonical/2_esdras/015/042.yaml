- from: Y derribarán las ciudades y los muros, las montañas y los collados, los árboles de los bosques y la hierba de los prados.
  to: Y derribarán ciudades y muros, montañas y colinas, los árboles de los bosques y la hierba de los prados.
  rationale: Se ajusta 'collados' a 'colinas' por claridad y neutralidad panhispánica, y se suaviza la enumeración quitando el artículo inicial para un ritmo más natural en español bíblico moderno. Se mantiene 'hierba de los prados' por fidelidad suficiente al latín y porque no introduce la lectura errónea de 'grano' previamente eliminada del inglés auditado.
