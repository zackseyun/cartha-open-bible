translation:
  language: es
  text: Y derribarán ciudades y muros, montañas y colinas, los árboles de los bosques y la hierba de los prados.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ciuitates
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - pueblos
  - urbes
  lexicon: Latin ciuitas
  rationale: '"Ciudades" reproduce con naturalidad el término latino y conserva el alcance urbano del texto sin añadir matices no presentes.'
- source_word: muros
  english_pob_choice: walls
  chosen_spanish: muros
  alternatives_spanish:
  - paredes
  - murallas
  lexicon: Latin murus
  rationale: '"Muros" es el equivalente directo y mantiene el paralelismo con "ciudades" en una lista de destrucción.'
- source_word: montes
  english_pob_choice: mountains
  chosen_spanish: montañas
  alternatives_spanish:
  - montes
  - cerros
  lexicon: Latin mons
  rationale: '"Montañas" es la forma más clara en español moderno para el referente geográfico del latín.'
- source_word: colles
  english_pob_choice: hills
  chosen_spanish: collados
  alternatives_spanish:
  - colinas
  - cerros
  lexicon: Latin collis
  rationale: '"Collados" conserva un registro bíblico digno y corresponde bien al latín; "colinas" sería una alternativa más común pero menos cercana al paralelismo del original.'
- source_word: ligna siluarum
  english_pob_choice: trees of the forests
  chosen_spanish: árboles de los bosques
  alternatives_spanish:
  - árboles del bosque
  - madera de los bosques
  lexicon: Latin ligna silvarum
  rationale: El latín presenta literalmente "madera/árboles de los bosques"; dado el uso poético y la versión inglesa auditada, "árboles de los bosques" preserva la imagen sin forzar "madera" en español.
- source_word: fena
  english_pob_choice: grass of the meadows
  chosen_spanish: hierba de los prados
  alternatives_spanish:
  - pasto de los prados
  - hierba de los campos
  lexicon: Latin faenum
  rationale: '"Hierba de los prados" refleja el sentido vegetal y el escenario abierto del latín, y evita introducir "grano", que fue retirado del texto inglés por no estar atestiguado en la fuente.'
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó "and their grain" porque no aparece en el latín proporcionado. La presente redacción española sigue esa decisión y no introduce ningún equivalente de grano/semilla/cereal.
  spanish_consistency_notes:
  - 'Se mantuvo la serie coordinada de destrucción con un solo verbo inicial en futuro: "derribarán".'
  - Se conservó el paralelismo enumerativo del original latino sin añadir elementos ajenos.
  - Se evitó traducir "ligna" como "madera" para no oscurecer el cuadro poético de elementos naturales derribados.
