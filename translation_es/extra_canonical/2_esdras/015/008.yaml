    text: O «obran irreligiosamente».
    reason: alternative_rendering_of_inreligiose_agunt
  revision_rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y la fidelidad funcional del español sin cambiar el sentido: se sustituyó el calco «las cosas que ejecutan injustamente» por «lo que hacen injustamente»; se cambió «clama a mí» por «clama ante mí» para un español más idiomático con matiz judicial; y se refinó la nota alternativa para reflejar mejor el rango de inreligiose agunt.'
