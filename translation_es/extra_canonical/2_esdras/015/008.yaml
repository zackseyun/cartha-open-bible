source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: iam non silebo impietates eorum quae inreligiose agunt, nec sustinebo in his quae inique exercent. ecce sanguis innoxius et iustus clamat ad me, et animae iustorum clamant perseveranter.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/008.yaml
  text: I will no longer keep silent about their impieties[a], which they commit irreligiously, nor will I endure the things they carry out unjustly. Behold, innocent and righteous blood cries out to me, and the souls of the righteous cry out continually.
  footnotes:
  - marker: a
    text: Or 'practice irreligiously'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:53:07Z'
    unchanged: false
    changes_summary: Removed duplicated text caused by a drafting error and adjusted 'commit impiously' to the more natural 'commit irreligiously' to reflect inreligiose agunt while keeping the formal tone.
translation:
  language: es
  text: Ya no guardaré silencio acerca de sus impiedades[a], que cometen impíamente, ni soportaré lo que hacen injustamente. He aquí, la sangre inocente y justa clama ante mí, y las almas de los justos claman continuamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obran irreligiosamente».
    reason: alternative_rendering_of_inreligiose_agunt
lexical_decisions:
- source_word: iam non silebo
  english_pob_choice: I will no longer keep silent
  chosen_spanish: Ya no guardaré silencio
  alternatives_spanish:
  - No callaré más
  - No guardaré más silencio
  lexicon: silebo
  rationale: La forma española preserva el futuro con valor volitivo y la negación temporal de continuidad, con un registro natural y solemne.
- source_word: impietates
  english_pob_choice: impieties
  chosen_spanish: impiedades
  alternatives_spanish:
  - maldades
  - impiedades religiosas
  lexicon: impietas
  rationale: «Impiedades» mantiene la fuerza religiosa-moral del latín y evita suavizar el término hacia una mera maldad genérica.
- source_word: inreligiose agunt
  english_pob_choice: which they commit irreligiously
  chosen_spanish: que cometen impíamente
  alternatives_spanish:
  - que obran irreligiosamente
  - que las practican irreligiosamente
  lexicon: inreligiose agere
  rationale: En español, «impíamente» comunica mejor la carga moral de inreligiose que «irreligiosamente», que puede sonar solo a falta de práctica religiosa. «Cometen» conserva el carácter activo de agunt.
- source_word: nec sustinebo
  english_pob_choice: nor will I endure
  chosen_spanish: ni soportaré
  alternatives_spanish:
  - ni toleraré
  - ni resistiré
  lexicon: sustinere
  rationale: «Soportaré» conserva la idea de aguantar o tolerar sin introducir una lectura más técnica o idiomática que el latín no exige.
- source_word: in his quae inique exercent
  english_pob_choice: the things they carry out unjustly
  chosen_spanish: las cosas que ejecutan injustamente
  alternatives_spanish:
  - lo que hacen injustamente
  - las obras que realizan injustamente
  lexicon: exercere inique
  rationale: «Ejecutan» mantiene la idea de llevar a cabo/realizar; «injustamente» reproduce el adverbio y deja intacta la valoración ética.
- source_word: sanguis innoxius et iustus
  english_pob_choice: innocent and righteous blood
  chosen_spanish: la sangre inocente y justa
  alternatives_spanish:
  - la sangre inocente y recta
  - la sangre sin culpa y justa
  lexicon: sanguis innoxius et iustus
  rationale: Se mantiene «sangre» con los dos calificativos, sin resolver la posible tensión entre inocencia moral y justicia en términos más interpretativos.
- source_word: animae iustorum
  english_pob_choice: the souls of the righteous
  chosen_spanish: las almas de los justos
  alternatives_spanish:
  - las vidas de los justos
  - los espíritus de los justos
  lexicon: animae iustorum
  rationale: «Almas» es la correspondencia más directa y mantiene la personificación del clamor.
theological_decisions:
- issue: El clamor de la sangre y de las almas delante de Dios
  english_pob_reading: Behold, innocent and righteous blood cries out to me, and the souls of the righteous cry out continually.
  chosen_spanish_reading: He aquí, la sangre inocente y justa clama a mí, y las almas de los justos claman continuamente.
  alternative_spanish_readings:
  - He aquí, la sangre inocente y justa clama ante mí
  - Mira, la sangre inocente y justa clama a mí
  rationale: 'Se conserva el antropomorfismo judicial del texto: la sangre y las almas claman directamente a Dios, sin suavizar el testimonio moral del pasaje.'
  doctrine_reference: Gn 4:10; Ap 6:9-10
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que corrigió la formulación inglesa hacia una equivalencia más natural de inreligiose agunt; por eso se prefirió «cometen impíamente» en vez de un calco con «irreligiosamente». También se evitó cualquier duplicación accidental del contenido del verso.
  spanish_consistency_notes:
  - Se usa «impiedades» para impietates, coherente con el registro moral-religioso del pasaje.
  - Se mantuvo «Yahvé» solo cuando el texto lo requiriera; aquí el verso no contiene el nombre divino explícito en la fuente latina, por lo que no aparece.
  - «Justos» se conserva para iustorum e iustus, manteniendo la misma familia léxica en español.
