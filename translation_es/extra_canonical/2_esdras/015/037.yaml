  revision_rationale: Se mantiene la estructura y el tono del borrador, pero se corrige «nubes abundantes» a «abundantes nubes de tormenta» para reflejar con mayor fidelidad nimbi copiosi y el inglés POB «abundant storm-clouds». No se requieren notas al pie.
