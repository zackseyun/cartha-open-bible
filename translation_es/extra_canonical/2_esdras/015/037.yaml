translation:
  language: es
  text: Y los que vean esa ira temblarán, y el temblor los asirá. Y después de esto se levantarán abundantes nubes de tormenta.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: iram illam / that wrath
  english_pob_choice: that wrath
  chosen_spanish: esa ira
  alternatives_spanish:
  - esa cólera
  - esa furia
  lexicon: ira
  rationale: La imagen apunta a la manifestación de un juicio divino ya descrito en el contexto; «ira» conserva la fuerza bíblica y evita suavizar el término. «Esa» refleja el demostrativo del latín y el énfasis del inglés.
- source_word: horrebunt / will shudder
  english_pob_choice: will shudder
  chosen_spanish: temblarán
  alternatives_spanish:
  - se estremecerán
  - se horrorizarán
  lexicon: horreo
  rationale: El latín expresa un estremecimiento ante el terror. «Temblarán» es natural en español y mantiene la reacción física/afectiva sin interpretar más allá del texto.
- source_word: tremor adprehendet illos / trembling will seize them
  english_pob_choice: trembling will seize them
  chosen_spanish: el temblor los asirá
  alternatives_spanish:
  - el temblor se apoderará de ellos
  - los agarrará el temblor
  lexicon: adprehendo
  rationale: «Asirá» conserva la imagen de captura o aprehensión del latín y del inglés POB. Se evita diluirlo en una formulación más abstracta.
- source_word: movebuntur / will be stirred up
  english_pob_choice: will be stirred up
  chosen_spanish: se levantarán
  alternatives_spanish:
  - serán agitadas
  - se moverán
  lexicon: moveo
  rationale: Para nubes, «se levantarán» comunica el movimiento atmosférico en español con naturalidad. Mantiene la idea de agitación sin introducir un agente no explícito.
- source_word: nimbi copiosi / abundant storm-clouds
  english_pob_choice: abundant storm-clouds
  chosen_spanish: nubes abundantes
  alternatives_spanish:
  - nubarrones abundantes
  - nubes de tormenta abundantes
  lexicon: nimbus
  rationale: «Nubes» traduce «nimbi» como nubes de tormenta sin necesidad de un compuesto pesado. «Abundantes» distingue correctamente copiosi de otros intensificadores como «validae» en el contexto cercano.
theological_decisions:
- issue: Naturaleza de la ira vista por los observadores
  english_pob_reading: those who see that wrath
  chosen_spanish_reading: los que vean esa ira
  alternative_spanish_readings:
  - los que vean esa cólera
  - los que contemplen esa ira
  rationale: Se conserva el carácter de juicio manifiesto sin añadir glosa interpretativa. El futuro mantiene la secuencia profética del pasaje.
  doctrine_reference: juicio divino escatológico
translation_notes:
  revision_awareness: Se siguió la revisión fuente-crítica que eliminó de este versículo la cláusula de «gran temor y temblor sobre la tierra», por pertenecer al versículo anterior en el latín base. También se preservó la idea de «abundantes» para distinguir copiosi de otros intensificadores vecinos en el mismo contexto.
  spanish_consistency_notes:
  - Se usa «ira» para iram, en coherencia con el registro bíblico y con el contraste profético del pasaje.
  - Se evita «SEÑOR» porque aquí no aparece el tetragrámaton ni κύριος; el texto trata de la ira manifestada y de las nubes de tormenta.
  - La frase final se vierte en plural («nubes abundantes») para reflejar nimbi como plural latino.
