base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/030.yaml
  text: The Carmonians[a], raging in wrath, will come out from the forest, and they will come with great force and stand for battle against them, and they will lay waste the portion of the land of the Assyrians with their teeth.
  footnotes:
  - marker: a
    text: Or 'The Carmonians'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:53:00Z'
    unchanged: false
    changes_summary: Corrected the people name from 'Carmanians' to 'Carmonians' to match the Latin 'Carmonii.'
translation:
  language: es
  text: Los carmonios saldrán del bosque, enfurecidos de ira, vendrán con gran fuerza, se dispondrán para el combate contra ellos, y devastarán con sus dientes la porción de la tierra de los asirios.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Carmonii
  english_pob_choice: The Carmonians
  chosen_spanish: los carmonios
  alternatives_spanish:
  - los carmanios
  - los carmonianos
  lexicon: ethnonym
  rationale: El latín 'Carmonii' apunta a un nombre de pueblo. En español, 'carmonios' conserva la referencia étnica sin forzar una forma más interpretativa. Se evita 'carmonianos' por sonar menos directo y 'carmanians' no es natural en español.
- source_word: insanientes in ira
  english_pob_choice: raging in wrath
  chosen_spanish: enfurecidos de ira
  alternatives_spanish:
  - rabiosos de ira
  - ardiendo en ira
  lexicon: participial phrase
  rationale: La frase latina intensifica el estado emocional con valor de furor. 'Enfurecidos de ira' comunica bien la redundancia enfática sin suavizarla ni volverla demasiado idiomática.
- source_word: exient de silva
  english_pob_choice: will come out from the forest
  chosen_spanish: saldrán del bosque
  alternatives_spanish:
  - saldrán de la selva
  - saldrán del monte
  lexicon: motion phrase
  rationale: '''De silva'' se rinde de manera literal y clara como ''del bosque''. ''Bosque'' es suficientemente amplio y neutro para español moderno.'
- source_word: in virtute magna
  english_pob_choice: with great force
  chosen_spanish: con gran fuerza
  alternatives_spanish:
  - con gran poder
  - con gran vigor
  lexicon: military force idiom
  rationale: '''Virtute'' aquí expresa capacidad/fuerza efectiva en contexto bélico. ''Con gran fuerza'' mantiene el sentido militar sin introducir una abstracción innecesaria.'
- source_word: constabunt in pugnam cum illis
  english_pob_choice: will stand for battle against them
  chosen_spanish: se apostarán para el combate contra ellos
  alternatives_spanish:
  - se pondrán en pie para la batalla contra ellos
  - se presentarán para el combate contra ellos
  lexicon: battle stance
  rationale: '''Constabunt'' puede sugerir ponerse firme o tomar posición. ''Se apostarán para el combate'' transmite preparación y confrontación, manteniendo el tono bélico del latín.'
- source_word: vastabunt portionem terrae Assyriorum
  english_pob_choice: they will lay waste the portion of the land of the Assyrians
  chosen_spanish: devastarán la porción de la tierra de los asirios
  alternatives_spanish:
  - devastarán la parte de la tierra de los asirios
  - arrasarán la porción de la tierra de los asirios
  lexicon: destruction phrase
  rationale: '''Vastabunt'' exige un verbo fuerte como ''devastarán''. ''Porción'' conserva ''portionem'' de modo más literal que ''parte'', aunque suena algo más solemne.'
- source_word: in dentibus suis
  english_pob_choice: with their teeth
  chosen_spanish: con sus dientes
  alternatives_spanish:
  - en sus dientes
  - por sus dientes
  lexicon: instrument phrase
  rationale: La expresión latina presenta un instrumento o medio figurado. 'Con sus dientes' es la opción natural y fiel en español, manteniendo el carácter extraño/imaginativo de la imagen.
theological_decisions:
- issue: Identificación étnica histórica de 'Carmonii'
  english_pob_reading: The Carmonians
  chosen_spanish_reading: los carmonios
  alternative_spanish_readings:
  - los carmanios
  - los carmonianos
  rationale: No hay motivo para espiritualizar o generalizar el etnónimo. La lectura debe conservar el referente histórico-geográfico de un pueblo concreto, como en la revisión del POB inglés.
  doctrine_reference: No doctrinal issue; historical ethnography
translation_notes:
  revision_awareness: Se siguió la revisión auditada que corrigió el etnónimo desde una forma inglesa más oscura a la referencia histórica estándar a los Carmonii/Carmanii. La redacción española conserva ese ajuste y no introduce una interpretación doctrinal adicional.
  spanish_consistency_notes:
  - Se mantiene el registro apocalíptico y bélico sin domesticar la imagen final de 'con sus dientes'.
  - '''Asirios'' se conserva como etnónimo histórico conforme al latín.'
  - La puntuación coordina las acciones sucesivas con una cadencia próxima al latín y al inglés auditado.
