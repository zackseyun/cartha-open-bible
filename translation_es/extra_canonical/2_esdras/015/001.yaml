translation:
  language: es
  text: He aquí, habla de modo que mi pueblo oiga las palabras de profecía.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ecce
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: deixis/exhortation
  rationale: He aquí mantiene el tono solemne e introductorio del latino Ecce sin volverlo innecesariamente arcaico; en español bíblico suena natural y conserva la función de llamado a la atención.
- source_word: loquere
  english_pob_choice: speak
  chosen_spanish: habla
  alternatives_spanish:
  - hablad
  lexicon: verb imperative
  rationale: El imperativo singular refleja directamente el mandato del texto latino. 'Habla' es la forma natural y clara en español contemporáneo para este encargo profético.
- source_word: in aures plebi meae
  english_pob_choice: in the hearing of my people
  chosen_spanish: al oído de mi pueblo
  alternatives_spanish:
  - en la presencia de mi pueblo
  - en el oído de mi pueblo
  lexicon: idiom/recipient phrase
  rationale: El latín literal 'en los oídos' se entiende mejor en español como una frase auditiva concreta. 'Al oído de mi pueblo' conserva la imagen de audición y evita la construcción menos natural 'en el oído', mientras sigue siendo compatible con la revisión inglesa que optó por 'in the hearing of'.
- source_word: sermones prophetiae
  english_pob_choice: the words of prophecy
  chosen_spanish: las palabras de profecía
  alternatives_spanish:
  - las palabras proféticas
  - los dichos de profecía
  lexicon: noun phrase
  rationale: '''Sermones'' se vierte de forma literal y digna como ''palabras'', y ''prophetiae'' como ''profecía'' conserva el genitivo objetivo sin añadir interpretación. Esta opción sigue de cerca el latín y coincide con la lectura inglesa auditada.'
theological_decisions:
- issue: Alcance de la orden profética
  english_pob_reading: speak in the hearing of my people the words of prophecy
  chosen_spanish_reading: habla al oído de mi pueblo las palabras de profecía
  alternative_spanish_readings:
  - habla en presencia de mi pueblo las palabras de profecía
  - habla para que mi pueblo oiga las palabras de profecía
  rationale: El versículo no desarrolla contenido doctrinal, pero sí el acto de transmisión profética. La versión elegida preserva la comisión directa de proclamar un mensaje recibido, sin suavizar el carácter oral y público del encargo.
  doctrine_reference: Profecía y proclamación oral en contexto escritural
translation_notes:
  revision_awareness: La revisión inglesa corrigió 'in the ears of' a 'in the hearing of' por naturalidad y precisión formal. La versión española evita el calco 'en los oídos' y opta por 'al oído', que mantiene la imagen auditiva del latín sin perder fluidez.
  spanish_consistency_notes:
  - Se mantiene 'profecía' para sermones prophetiae, en línea con el campo semántico del mensaje revelado.
  - No se introduce mayúscula devocional innecesaria porque el texto no contiene un referente nominal divino directo.
  - La puntuación con coma después de 'He aquí' conserva el arranque exhortativo solemne.
