- from: He aquí, habla al oído de mi pueblo las palabras de profecía.
  to: He aquí, habla de modo que mi pueblo oiga las palabras de profecía.
  rationale: Se reemplaza 'al oído de mi pueblo' por 'de modo que mi pueblo oiga' para expresar con claridad y naturalidad el sentido público-auditivo del latín según la revisión inglesa auditada, evitando la connotación de susurro o confidencialidad.
