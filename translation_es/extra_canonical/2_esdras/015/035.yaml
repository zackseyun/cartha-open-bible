base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/035.yaml
  text: And they will strike one another and pour out an abundant storm upon the earth[15:35], their storm[a]; and there will be blood from the sword up to the horse's belly.
  footnotes:
  - marker: '15:35'
    text: Latin sidus is singular here and throughout this section. It can mean 'star,' but in apocalyptic context it may also function as a celestial portent. The translation keeps 'star' to preserve the imagery.
    reason: lexical_alternative
  - marker: a
    text: Or 'pour out a heavy star upon the earth, even their star'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:29:45Z'
    unchanged: false
    changes_summary: Revised 'heavy tempest' to 'an abundant storm' for closer lexical alignment with Latin sidus copiosum, removed the redundant second 'and' before 'their tempest,' and adjusted punctuation for clearer English while preserving the source structure.
translation:
  language: es
  text: Y se golpearán unos a otros, y derramarán sobre la tierra una abundante tempestad[a], su tempestad; y habrá sangre desde la espada hasta el vientre del caballo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estrella»; el latín sidus está en singular y puede significar «astro» o «estrella», pero en este contexto apocalíptico el sentido más probable es «tempestad».
    reason: lexical_alternative
lexical_decisions:
- source_word: conlident se invicem
  english_pob_choice: And they will strike one another
  chosen_spanish: Y se golpearán unos a otros
  alternatives_spanish:
  - Y se herirán unos a otros
  - Y se atacarán mutuamente
  lexicon: conlident -> golpear / herir; se invicem -> unos a otros
  rationale: 'El latín expresa acción recíproca e हिं? no, recíproca: ''se invicem''. ''Golpearse'' conserva la imagen física directa sin introducir un matiz más técnico que el texto no exige. ''Herirse'' sería posible, pero sugiere con más fuerza lesión que el simple choque violento.'
- source_word: effundent sidus copiosum super terram
  english_pob_choice: pour out an abundant storm upon the earth
  chosen_spanish: derramarán sobre la tierra una tempestad abundante
  alternatives_spanish:
  - derramarán sobre la tierra un abundante temporal
  - verterán sobre la tierra una tormenta abundante
  lexicon: effundent -> derramar; sidus -> tempestad / tormenta; copiosum -> abundante; super terram -> sobre la tierra
  rationale: Sigo la revisión inglesa que adjudica a 'sidus' el sentido de 'storm/tempest' en este contexto apocalíptico, no 'estrella'. 'Tempestad' comunica con naturalidad en español una irrupción atmosférica violenta y mantiene la dificultad del término. 'Derramar' reproduce 'effundent' sin suavizar la imagen.
- source_word: sidus illorum
  english_pob_choice: their storm
  chosen_spanish: su tempestad
  alternatives_spanish:
  - la tempestad de ellos
  - su tormenta
  lexicon: sidus illorum -> su tempestad
  rationale: Conserva la repetición del sustantivo y el posesivo, como en el latín y en la revisión inglesa. 'Su tempestad' es breve y publicable en español; 'la tempestad de ellos' sería más analítico pero más pesado.
- source_word: erit sanguis a gladio usque ad ventrem equi
  english_pob_choice: there will be blood from the sword up to the horse's belly
  chosen_spanish: habrá sangre desde la espada hasta el vientre del caballo
  alternatives_spanish:
  - habrá sangre desde la espada hasta el vientre del caballo
  - la sangre llegará desde la espada hasta el vientre del caballo
  lexicon: erit -> habrá; sanguis -> sangre; a gladio usque ad ventrem equi -> desde la espada hasta el vientre del caballo
  rationale: La imagen de medida extrema se mantiene de modo directo. 'Desde... hasta...' reproduce la extensión espacial del latín. 'Vientre' conserva el cuerpo del caballo con más literalidad que 'abdomen' o 'panza'.
theological_decisions:
- issue: sentido de sidus en contexto apocalíptico
  english_pob_reading: abundant storm / their storm, while noting a possible star meaning in a footnote
  chosen_spanish_reading: tempestad abundante / su tempestad, con nota sobre la alternativa 'estrella'
  alternative_spanish_readings:
  - estrella abundante
  - astros abundantes
  rationale: El audit trail inglés revisa 'star' hacia 'storm/tempest' por el contexto y el verbo 'effundent'. En español, 'tempestad' conserva el campo semántico de fenómeno violento derramado sobre la tierra y evita una imagen incoherente. La nota mantiene visible la tensión lexical entre 'estrella' y 'tempestad' sin resolverla artificialmente.
  doctrine_reference: Apocalíptica bíblica y criterio de coherencia contextual del lenguaje figurado
translation_notes:
  revision_awareness: La base inglesa fue revisada desde 'heavy tempest' a 'abundant storm' para alinear mejor 'sidus copiosum' con el latín. La traducción española sigue esa última decisión, pero conserva una solución idiomática natural ('tempestad abundante') y mantiene visible la ambigüedad heredada de 'sidus' mediante nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' reservado para el tetragrámaton; aquí no aparece ningún equivalente divino.
  - '''Tempestad'' fue preferida sobre ''estrella'' por la revisión textual y el contexto; se deja constancia de la alternativa en nota.'
  - Se conserva el orden sintáctico cercano al latín sin forzar un calco impropio en español.
