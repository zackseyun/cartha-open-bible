review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido fuente latino y sigue correctamente la revisión auditada del POB: «saeculo» aquí se entiende mejor como «mundo» por el apoyo de «habitant in eum». «¡Ay del mundo y de los que habitan en él!» preserva con fidelidad el juicio profético y la referencia espacial/habitada.'
  spanish_quality_summary: 'El texto principal es claro, natural y de registro bíblico adecuado. La única reparación necesaria está en la nota: «edad» no es una alternativa española natural para «saeculum» en este contexto y además desajusta la alternativa inglesa documentada («age»), que en español se expresa mejor como «era» o «siglo».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La elección «mundo» para «saeculo» concuerda con la decisión léxica auditada. «Habitan en él» es buen español y conserva el referente pronominal.
  issues:
  - severity: medium
    issue: La nota al pie usa «edad» como alternativa para «saeculo».
    rationale: Aunque intenta reflejar el inglés «age», en español bíblico general «edad» suele referirse a la edad de una persona o etapa de vida, no a un «age» histórico/cósmico. «Era» o «siglo» serían alternativas más fieles y legibles.
  - severity: low
    issue: La formulación de la nota puede alinearse mejor con el estilo del POB.
    rationale: 'Conviene mantener una alternativa breve y directa: «O: “¡Ay de la era!”».'
  revised_spanish_text: ¡Ay del mundo y de los que habitan en él![a]
  revised_footnotes:
  - marker: a
    text: 'O: «¡Ay de la era!»'
    reason: alternative_rendering
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al latín y al audit trail inglés. Solo se corrige la nota para que la alternativa española represente mejor «age» sin introducir un uso poco natural como «edad».
