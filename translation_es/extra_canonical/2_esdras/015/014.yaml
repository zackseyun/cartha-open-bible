translation:
  language: es
  text: ¡Ay del mundo y de los que habitan en él![a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Ay de la edad!»'
    reason: alternative_reading
lexical_decisions:
- source_word: vae
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de...!
  alternatives_spanish:
  - ¡Ay...!
  - ¡Ay de...
  lexicon: interjección profética de lamento y juicio
  rationale: El latín vae expresa una exclamación de desgracia o juicio. En español, «¡Ay de...!» comunica bien ese tono profético sin añadir paráfrasis.
- source_word: saeculo
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - edad
  - siglo
  - era
  lexicon: sustantivo de ámbito cósmico/social
  rationale: Sigo la revisión auditada del inglés POB que entiende aquí saeculum con sentido espacial de «world», reforzado por habitant in eum. En español, «mundo» conserva mejor esa referencia a la esfera habitada que «edad».
- source_word: habitant in eum
  english_pob_choice: those who dwell in it
  chosen_spanish: los que habitan en él
  alternatives_spanish:
  - los que viven en él
  - los moradores de él
  lexicon: verbo de residencia/inhabitación
  rationale: «Habitan» reproduce el valor de habitar/dwelling y mantiene el paralelismo con el sustantivo «mundo». «En él» evita perder el referente pronominal del latín.
theological_decisions:
- issue: saeculum como «mundo» frente a «edad»
  english_pob_reading: Woe to the world and to those who dwell in it
  chosen_spanish_reading: ¡Ay del mundo y de los que habitan en él!
  alternative_spanish_readings:
  - ¡Ay de la edad y de los que habitan en ella!
  - ¡Ay de este siglo y de los que viven en él!
  rationale: La nota de revisión del POB en inglés documenta la decisión de leer saeculum aquí como «world» por el contexto de habitant in eum. La versión española sigue esa lectura para no reintroducir una tensión ya resuelta por el audit trail.
  doctrine_reference: Apocalíptica de juicio; uso contextual de saeculum en 6 Esdras
translation_notes:
  revision_awareness: La revisión auditada cambió la traducción inglesa de «Woe to the age» a «Woe to the world» por razones contextuales; la redacción española adopta esa decisión y conserva como nota la alternativa literal «edad».
  spanish_consistency_notes:
  - Se mantiene «mundo» para saeculum en esta unidad según el contexto inmediato.
  - «habitan» preserva el matiz de residencia estable y el paralelismo con el latín.
  - Se evita «siglo» porque en español suena más abstracto o eclesiástico y no refleja tan naturalmente el referente espacial del texto.
