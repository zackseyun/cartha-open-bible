lexical_decisions:
- source_word: propter quod
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - por lo cual
  lexicon: Latin propter quod
  rationale: Introduce la causa de manera natural en español, manteniendo el valor causal del latín y del inglés POB sin añadir matices explicativos no presentes en el texto.
- source_word: iniquitas
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - maldad
  - injusticia
  lexicon: Latin iniquitas
  rationale: «Iniquidad» conserva el peso moral y jurídico del término latino y sigue de cerca la elección inglesa; «maldad» sería más general y «injusticia» desplazaría el foco hacia un matiz social que aquí no está explicitado.
- source_word: superposuit omnem terram
  english_pob_choice: has spread over the whole earth
  chosen_spanish: se ha extendido por toda la tierra
  alternatives_spanish:
  - ha cubierto toda la tierra
  - ha sido puesta sobre toda la tierra
  lexicon: Latin superponere / superpositum
  rationale: El latín sugiere una realidad puesta/extendida sobre la tierra. «Se ha extendido» es idiomático en español y preserva la imagen de cobertura general, coherente con la lectura inglesa auditada.
- source_word: operationes eorum
  english_pob_choice: their deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: Latin operationes
  rationale: «Obras» es la opción más cercana al sustantivo latino y mantiene la posibilidad de una carga moral sin añadir el adjetivo «malas», que la revisión auditada explícitamente descartó.
theological_decisions:
- issue: Universal alcance de la iniquidad
  english_pob_reading: iniquity has spread over the whole earth
  chosen_spanish_reading: la iniquidad se ha extendido por toda la tierra
  alternative_spanish_readings:
  - la maldad ha cubierto toda la tierra
  - la injusticia se ha extendido por toda la tierra
  rationale: 'La formulación conserva el alcance total del juicio: no solo una suma de actos, sino una condición extendida sobre la tierra. «Iniquidad» preserva la gravedad moral sin forzar una interpretación más específica que el latín no exige.'
  doctrine_reference: Juicio universal y corrupción moral general (tema apocalíptico de 2 Esdras).
- issue: Cierre de la acción humana
  english_pob_reading: their deeds have been filled up
  chosen_spanish_reading: sus obras se han colmado
  alternative_spanish_readings:
  - sus obras han llegado a plenitud
  - sus hechos se han completado
  rationale: '«Se han colmado» conserva la idea de plenitud/llenura del latín adimpletae sunt sin introducir un sentido de perfección positiva. La expresión mantiene la tensión escatológica: los actos humanos han alcanzado su medida plena.'
  doctrine_reference: Plenitud de la medida de las obras y consumación del juicio.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrigió la segunda cláusula desde una paráfrasis más interpretativa a «their deeds have been filled up». Por eso se evitó cualquier adición como «malas» o «perniciosas» y se eligió una fórmula que refleje adimpletae sunt con neutralidad semántica.
  spanish_consistency_notes:
  - Se usa «iniquidad» para conservar continuidad con el registro bíblico-jurídico del pasaje.
  - «Obras» mantiene la ambigüedad moral del latín operationes eorum sin sobreinterpretar.
  - 'La puntuación reproduce la coordinación del original: causa + primera cláusula + segunda cláusula.'
  - Se evita «SEÑOR» u otra terminología no pertinente porque este versículo no contiene el nombre divino.
