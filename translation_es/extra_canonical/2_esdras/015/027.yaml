translation:
  language: es
  text: Porque ya han venido males sobre la tierra, y permaneceréis en ellos; porque Dios no os librará, puesto que habéis pecado contra él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: iam enim
  english_pob_choice: For already
  chosen_spanish: Porque ya
  alternatives_spanish:
  - Pues ya
  - Porque ya mismo
  lexicon: iam -> ya; enim -> porque / pues
  rationale: Mantiene el valor aspectual de inmediatez y la conexión causal sin forzar un calco. «Porque ya» reproduce bien el arranque explicativo del latín en español bíblico contemporáneo.
- source_word: venerunt super orbem terrarum mala
  english_pob_choice: evils have come upon the world
  chosen_spanish: han venido males sobre la tierra
  alternatives_spanish:
  - han venido males sobre el mundo
  - males han caído sobre la tierra
  lexicon: mala -> males; orbis terrarum -> tierra / mundo
  rationale: «Males» conserva el plural sustantivado del latín. «Sobre la tierra» es una equivalencia natural y amplia de «super orbem terrarum», con tono bíblico y sin perder el alcance global.
- source_word: manebitis in illis
  english_pob_choice: you will remain in them
  chosen_spanish: permaneceréis en ellos
  alternatives_spanish:
  - quedaréis en ellos
  - seguiréis en ellos
  lexicon: manere -> permanecer / quedar; in illis -> en ellos
  rationale: «Permaneceréis» conserva la fuerza durativa y la idea de continuar dentro de esas calamidades. El pronombre «en ellos» refleja el plural neutro/masculino del latín sin añadir interpretación.
- source_word: non enim liberabit vos Deus
  english_pob_choice: for God will not deliver you
  chosen_spanish: porque Dios no os librará
  alternatives_spanish:
  - pues Dios no os salvará
  - porque Dios no os rescatará
  lexicon: liberare -> librar / salvar / rescatar; Deus -> Dios
  rationale: «Librará» es la opción más directa y sobria en español bíblico para liberare. Se conserva el sentido judicial/salvífico del verbo sin intensificarlo a «salvará» salvo necesidad contextual.
- source_word: propter quod peccastis in eum
  english_pob_choice: because you have sinned against him
  chosen_spanish: puesto que habéis pecado contra él
  alternatives_spanish:
  - porque habéis pecado contra él
  - ya que habéis pecado contra él
  lexicon: propter quod -> puesto que / porque / ya que; peccare in -> pecar contra
  rationale: «Puesto que» expresa de forma clara la causalidad resultante. «Pecado contra él» conserva el régimen relacional del latín «in eum» con la preposición española más natural en este contexto.
theological_decisions:
- issue: Alcance del castigo y de la inminente calamidad
  english_pob_reading: evils have come upon the world, and you will remain in them
  chosen_spanish_reading: han venido males sobre la tierra, y permaneceréis en ellos
  alternative_spanish_readings:
  - han venido males sobre el mundo, y quedaréis en ellos
  - han venido males sobre la tierra, y seguiréis en ellos
  rationale: Se conserva la afirmación de que el juicio ya ha comenzado y que los destinatarios no serán apartados de la experiencia de esos males. No se suaviza la dureza del anuncio.
  doctrine_reference: juicio divino; advertencia profética
- issue: Negación del auxilio divino por causa del pecado
  english_pob_reading: for God will not deliver you, because you have sinned against him
  chosen_spanish_reading: porque Dios no os librará, puesto que habéis pecado contra él
  alternative_spanish_readings:
  - porque Dios no os salvará, porque habéis pecado contra él
  - porque Dios no os rescatará, ya que habéis pecado contra él
  rationale: La frase conserva la relación causal entre pecado y falta de liberación sin introducir matices doctrinales ajenos. «Contra él» mantiene la orientación personal del pecado, no meramente una infracción abstracta.
  doctrine_reference: pecado y retribución; responsabilidad moral ante Dios
translation_notes:
  revision_awareness: La revisión más reciente marcó el versículo como sin cambios necesarios y el control cruzado mostró alto acuerdo (1.0). No se requieren notas textuales adicionales; la redacción sigue de cerca el latín limpio y coincide sustancialmente con la traducción inglesa POB.
  spanish_consistency_notes:
  - Se usa «Dios» de forma consistente para Deus.
  - Se mantiene el plural «males» para mala.
  - Se prefiere «librará» como equivalente sobrio de liberabit.
  - No se introduce terminología eclesiástica no sustentada por el latín fuente.
