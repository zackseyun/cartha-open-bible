translation:
  language: es
  text: Serán fuego para ti. Y te devorarán, a ti y a tus ciudades, tu tierra y tus montes; todos tus bosques y tus árboles frutales los quemarán con fuego.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: erunt tibi ignis
  english_pob_choice: They will be fire to you.
  chosen_spanish: Serán fuego para ti.
  alternatives_spanish:
  - Serán como fuego para ti.
  - Te serán fuego.
  lexicon: erunt = serán; ignis = fuego
  rationale: Mantiene la imagen directa del latín sin suavizarla. 'Serán fuego para ti' conserva la fuerza predicativa de 'erunt tibi ignis' y refleja la revisión inglesa que restauró esta cláusula inicial.
- source_word: deuorabunt te
  english_pob_choice: they will devour you
  chosen_spanish: te devorarán a ti
  alternatives_spanish:
  - te devorarán
  - te consumirán
  lexicon: deuorabunt = devorarán; te = a ti
  rationale: '''Devorar'' corresponde de manera inmediata al latín y preserva el matiz destructivo y violento del pasaje. Añadir ''a ti'' refuerza la referencia directa del objeto personal sin alterar el sentido.'
- source_word: ciuitates tuas
  english_pob_choice: your cities
  chosen_spanish: tus ciudades
  alternatives_spanish:
  - las ciudades tuyas
  lexicon: ciuitates = ciudades; tuas = tus
  rationale: Traducción directa y natural en español, manteniendo el paralelo con los demás objetos de destrucción.
- source_word: terram
  english_pob_choice: your land
  chosen_spanish: tu tierra
  alternatives_spanish:
  - el país tuyo
  - tu país
  lexicon: terram = tierra
  rationale: '''Tierra'' preserva el alcance territorial amplio del latín y encaja con el inventario de lugares devastados.'
- source_word: montes
  english_pob_choice: your mountains
  chosen_spanish: tus montes
  alternatives_spanish:
  - tus montañas
  lexicon: montes = montes / montañas
  rationale: Se prefiere 'montes' para seguir de cerca la forma del original y mantener el registro bíblico, aunque 'montañas' sería una equivalencia válida y más común en español.
- source_word: silvas
  english_pob_choice: your forests
  chosen_spanish: tus bosques
  alternatives_spanish:
  - tus selvas
  lexicon: silvas = bosques
  rationale: '''Bosques'' es el equivalente más transparente para ''silvas'' en español contemporáneo; ''selvas'' podría sugerir un ecosistema demasiado específico.'
- source_word: arbores fructiferas
  english_pob_choice: your fruitful trees
  chosen_spanish: tus árboles frutales
  alternatives_spanish:
  - tus árboles fecundos
  - tus árboles que dan fruto
  lexicon: arbores fructiferas = árboles frutales
  rationale: '''Árboles frutales'' transmite naturalmente el sentido de árboles que producen fruto sin perder el contenido del latín.'
- source_word: igni
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - por fuego
  - en fuego
  lexicon: igni = fuego
  rationale: La repetición de 'fuego' en español reproduce el énfasis del final latino y coincide con la versión inglesa revisada.
theological_decisions:
- issue: Fuerza imagética de juicio devastador
  english_pob_reading: They will be fire to you... they will burn with fire.
  chosen_spanish_reading: Serán fuego para ti... los quemarán con fuego.
  alternative_spanish_readings:
  - Serán como fuego para ti... los consumirán con fuego.
  - Te destruirán...
  rationale: El pasaje describe destrucción total mediante imagen de fuego. Se conserva la literalidad de la metáfora y la repetición de 'fuego' para no diluir la severidad del juicio.
  doctrine_reference: Juicio divino y destrucción profética en literatura apocalíptica
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada para restaurar la cláusula inicial omitida de la fuente latina: ''erunt tibi ignis'' -> ''They will be fire to you.'' La traducción española incorpora esa cláusula desde el inicio y mantiene el resto del versículo alineado con la revisión más reciente.'
  spanish_consistency_notes:
  - Se mantiene el tuteo reverencial no aplicable; el texto usa segunda persona singular directa conforme al latín.
  - Se conserva la repetición de 'fuego' porque forma parte de la intensificación retórica del versículo.
  - Se prefieren sustantivos concretos ('ciudades', 'tierra', 'montes', 'bosques', 'árboles frutales') sin explicaciones añadidas para respetar el carácter acumulativo del original.
