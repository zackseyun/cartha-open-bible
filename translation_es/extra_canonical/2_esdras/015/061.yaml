  yaml_path: translation/extra_canonical/2_esdras/015/061.yaml
  text: They will be fire to you. And they will devour you and your cities, your land and your mountains; all your forests and your fruitful trees they will burn with fire.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:29:47Z'
