translation:
  language: es
  text: fuego y granizo y espadas voladoras[a] y muchas aguas, de modo que aun[b] todos los campos y todos los ríos se llenen con la abundancia de aquellas aguas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Espadas voladoras» sigue el sentido general de *romphaea* en este contexto apocalíptico; la alternativa «espadas de ancha hoja» o «broadswords» sería demasiado técnica para el español bíblico aquí.
    reason: lexical_alternative
  - marker: b
    text: «Aun» refleja el énfasis de *etiam* («incluso»), subrayando que no solo los ríos, sino también los campos, quedan llenos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ignem
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  lexicon: Latin ignis
  rationale: «Fuego» es el equivalente directo y natural en español para el sustantivo latino; mantiene el paralelismo apocalíptico con los demás elementos de juicio sin añadir matices no presentes en el texto.
- source_word: grandinem
  english_pob_choice: hail
  chosen_spanish: granizo
  alternatives_spanish:
  - pedrisco
  lexicon: Latin grando
  rationale: «Granizo» reproduce con claridad el fenómeno meteorológico de juicio; «pedrisco» es posible, pero su registro es más regional y menos neutral.
- source_word: rompheas volantes
  english_pob_choice: flying swords
  chosen_spanish: espadas voladoras
  alternatives_spanish:
  - espadas volantes
  - espadas al vuelo
  lexicon: Latin romphaea
  rationale: La revisión inglesa descartó «broadswords» por demasiado técnico y conservó el valor general de espada de juicio. En español, «espadas voladoras» sigue ese valor general y refleja el participio latino volantes sin sobre-especificar el arma.
- source_word: aquas multas
  english_pob_choice: many waters
  chosen_spanish: muchas aguas
  alternatives_spanish:
  - grandes aguas
  lexicon: Latin aquas multas
  rationale: «Muchas aguas» conserva la estructura del original y la imagen de abundancia. «Grandes aguas» suavizaría el cuantificador explícito del texto latino.
- source_word: ut etiam impleantur omnes campi et omnes rivi a plenitudine aquarum illarum
  english_pob_choice: so that even all the fields and all the rivers will be filled from the abundance of those waters
  chosen_spanish: de modo que aun todos los campos y todos los ríos queden llenos por la abundancia de aquellas aguas
  alternatives_spanish:
  - para que aun todos los campos y todos los ríos se llenen con la abundancia de aquellas aguas
  - de modo que incluso todos los campos y todos los ríos queden llenos por la abundancia de aquellas aguas
  lexicon: Latin ut etiam impleantur ... a plenitudine aquarum illarum
  rationale: «De modo que» expresa la finalidad/resultante del ut. «Aun» conserva el énfasis de etiam, entendido como «even». «Queden llenos» traduce el pasivo/subjuntivo latino con naturalidad; «por la abundancia» mantiene el a de origen instrumental/causal sin convertirlo en una mera equivalencia libre.
theological_decisions:
- issue: Imagen apocalíptica de juicio mediante elementos devastadores
  english_pob_reading: fire and hail and flying swords and many waters
  chosen_spanish_reading: fuego y granizo y espadas voladoras y muchas aguas
  alternative_spanish_readings:
  - fuego y granizo y espadas al vuelo y muchas aguas
  - fuego y granizo y espadas volantes y muchas aguas
  rationale: El texto no requiere una explicación doctrinal adicional; la decisión principal es conservar la imaginería de juicio en una forma española clara. «Espadas voladoras» evita un tecnicismo histórico excesivo y mantiene la fuerza simbólica apocalíptica.
  doctrine_reference: Apocalipsis bíblica; lenguaje de juicio divino
translation_notes:
  revision_awareness: 'El audit trail inglés registra una revisión que cambió «flying broadswords» por «flying swords» y otra que reforzó el valor enfático de «even». La versión española sigue esas revisiones: evita el tecnicismo de «broadswords» y conserva el énfasis con «aun».'
  spanish_consistency_notes:
  - Se mantuvo «aguas» en plural, como en el original latino y la traducción inglesa auditada.
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton ni κύριος.
  - El orden acumulativo con repetición de «y» conserva el paralelismo del original apocalíptico.
  - «Aun» se prefirió sobre «incluso» para sostener el ritmo de la cláusula sin perder el énfasis.
