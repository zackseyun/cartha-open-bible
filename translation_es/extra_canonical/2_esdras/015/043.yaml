- source_word: Et transibunt constanter usque
  english_pob_choice: And they will pass steadily on as far as
  chosen_spanish: Y pasarán con constancia hasta
  alternatives_spanish:
  - Y avanzarán firmemente hasta
  - Y seguirán adelante con firmeza hasta
  lexicon: Latin transibunt + constanter + usque
  rationale: «Pasarán» conserva el movimiento de tránsito; «con constancia» refleja el adverbio constanter con un tono sobrio y continuo; «hasta» deja abierto el complemento que el fragmento latino no conserva en este tramo.
theological_decisions:
- issue: Fragmento incompleto y límite sintáctico abierto
  english_pob_reading: And they will pass steadily on as far as
  chosen_spanish_reading: Y pasarán con constancia hasta
  alternative_spanish_readings:
  - Y pasarán firmemente hasta
  - Y continuarán con constancia hasta
  rationale: El texto latino suministrado termina en usque, por lo que la traducción española debe conservar la apertura y no completar el destino con material no atestiguado. Se mantiene una frase final abierta.
  doctrine_reference: Principio de no añadir contenido no presente en el testimonio fuente.
translation_notes:
  revision_awareness: La revisión del texto inglés corrigió una lectura previa que añadía «to Babylon and destroy her»; la presente versión española sigue el fragmento latino limpio y evita cualquier destino o acción no presente en la fuente.
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y directo adecuado para un fragmento textual.
  - No se introduce puntuación de cierre que sugiera conclusión del sintagma final.
  - «Pastos» y «grano» conservan el paralelismo nominal del latín.
