review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el latín: «non parcet dextera mea» = «Mi mano derecha no perdonará», «peccantes» = «los pecadores», y «effundentes sanguinem innocuum super terram» = «los que derraman sangre inocente sobre la tierra». La cláusula «ni cesará la espada contra...» comunica adecuadamente el sentido judicial de «nec cessabit romphea super...», en línea con la revisión inglesa final.'
  spanish_quality_summary: 'El español es claro, natural y digno. La única reparación necesaria es la nota al pie: la alternativa actual no preserva fielmente la alternativa inglesa documentada, porque omite «sangre inocente» y además cambia el valor preposicional de la variante previa de manera innecesaria. Conviene ajustar la nota para que conserve la alternativa histórica sin introducir ambigüedad.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «espada» para «romphea» está bien justificado; «pecadores» y «sangre inocente» son naturales y fieles. No intervienen términos sensibles como Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: La nota al pie no reproduce con suficiente fidelidad la alternativa documentada en el English POB.
    rationale: La nota dice «O “y la espada no cesará contra los que derraman”», pero la nota inglesa preserva una alternativa previa equivalente a «and the broadsword will not cease from those who pour out». En español, si se conserva esa alternativa histórica, debe mantenerse al menos «sangre inocente» para no truncar el sentido del complemento objeto presente en el texto principal y en la traducción inglesa auditada.
  revised_spanish_text: Mi mano derecha no perdonará a los pecadores[a], ni cesará la espada contra los que derraman sangre inocente sobre la tierra.
  revised_footnotes:
  - marker: a
    text: O «y la espada no cesará de los que derraman sangre inocente». El latín romphea corresponde a una espada de juicio; «espada» evita el anacronismo de «broadsword» y mantiene el sentido apocalíptico.
    reason: alternative_reading
  revision_rationale: Se conserva intacto el texto principal, que ya es fiel y natural. Solo se corrige la nota para reflejar mejor la alternativa histórica preservada en el rastro de auditoría inglés, incluyendo «sangre inocente» y evitando que la nota quede truncada.
