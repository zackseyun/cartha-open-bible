translation:
  language: es
  text: Mi mano derecha no perdonará a los pecadores[a], ni cesará la espada contra los que derraman sangre inocente sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y la espada no cesará contra los que derraman». El latín romphea corresponde a una espada de juicio; «espada» evita el anacronismo de «broadsword» y mantiene el sentido apocalíptico.
    reason: alternative_reading
lexical_decisions:
- source_word: non parcet dextera mea
  english_pob_choice: My right hand will not spare
  chosen_spanish: Mi mano derecha no perdonará
  alternatives_spanish:
  - Mi mano derecha no tendrá misericordia
  - Mi diestra no perdonará
  lexicon: dextera -> mano derecha / diestra
  rationale: La imagen latina es corporal y judicial; «mano derecha» conserva la literalidad y el valor de poder/acción. «Perdonará» sigue el inglés POB y expresa bien non parcet, sin suavizar la negación.
- source_word: peccantes
  english_pob_choice: the sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los que pecan
  - los culpables
  lexicon: peccans -> pecador, el que peca
  rationale: El participio sustantivado en latín designa a quienes pecan; «pecadores» es natural en español y mantiene la carga moral sin añadir interpretación.
- source_word: romphea
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - la espada de juicio
  - la broadsword
  lexicon: ῥομφαία / romphea -> espada
  rationale: La tradición textual latina usa romphea, término heredado del griego para una espada de juicio. En español, «espada» es el equivalente claro y no introduce el anacronismo de «broadsword»; la nota puede preservar la alternativa si se requiere.
- source_word: effundentes sanguinem innocuum
  english_pob_choice: those who shed innocent blood
  chosen_spanish: los que derraman sangre inocente
  alternatives_spanish:
  - los que derraman sangre inocente sobre la tierra
  - los que hacen correr sangre inocente
  lexicon: effundere sanguinem -> derramar sangre
  rationale: El latín usa el modismo bíblico de derramar sangre. «Derraman sangre inocente» reproduce el giro natural y la referencia moral sin volverlo demasiado literal con «vierten» o «sangre derramada».
- source_word: super terram
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - por la tierra
  lexicon: super + terra -> sobre la tierra
  rationale: «Sobre la tierra» conserva la preposición espacial del latín y coincide con el inglés POB, evitando una reducción más abstracta que debilite la imagen.
theological_decisions:
- issue: Juicio divino sobre pecadores y derramadores de sangre inocente
  english_pob_reading: My right hand will not spare the sinners, nor will the sword cease against those who shed innocent blood upon the earth.
  chosen_spanish_reading: Mi mano derecha no perdonará a los pecadores, ni cesará la espada contra los que derraman sangre inocente sobre la tierra.
  alternative_spanish_readings:
  - Mi mano derecha no tendrá misericordia de los pecadores, ni cesará la espada contra los que derraman sangre inocente sobre la tierra.
  - Mi diestra no perdonará a los pecadores, ni cesará la espada contra los que derraman sangre inocente sobre la tierra.
  rationale: 'La línea conserva el paralelismo judicial del latín: una acción divina directa y la espada como agente de juicio. No se suaviza «pecadores» ni «sangre inocente», porque el texto presenta un juicio moral explícito.'
  doctrine_reference: Juicio divino; retribución contra la violencia injusta
translation_notes:
  revision_awareness: 'El texto inglés revisado corrigió la nota previa, alejándola de «broadsword» y de «from those who pour out», para alinearla mejor con el latín: la espada no cesa «against those who shed innocent blood upon the earth». La versión española sigue esa revisión y refleja tanto el juicio como el modismo bíblico de derramar sangre.'
  spanish_consistency_notes:
  - Se mantiene «mano derecha» en lugar de «diestra» para máxima claridad, aunque ambas son válidas.
  - Se usa «espada» como equivalente de romphea; no se adopta un arcaísmo litúrgico que obscurecería el registro.
  - La preposición «contra» en el segundo miembro expresa mejor la fuerza de super en este contexto de juicio, en línea con la revisión inglesa.
  - La nota al pie conserva la alternativa textual/lexical sin duplicar innecesariamente la traducción principal.
