  text: 'He aquí, yo traigo males sobre el mundo, dice el Señor: espada, hambre, muerte y destrucción,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ecce
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Mira
  lexicon: Latin ecce
  rationale: «He aquí» conserva el tono de anuncio solemne y observación inmediata que el inglés POB expresa con «Behold», sin sonar demasiado coloquial en español.
- source_word: induco
  english_pob_choice: I am bringing
  chosen_spanish: traigo
  alternatives_spanish:
  - estoy trayendo
  - introduzco
  lexicon: Latin induco
  rationale: El presente «traigo» comunica acción inminente y en curso de manera natural en español, manteniendo la fuerza verbal del latín sin forzar una perífrasis.
- source_word: mala
  english_pob_choice: evils
  chosen_spanish: males
  alternatives_spanish:
  - desastres
  - calamidades
  - malas cosas
  lexicon: Latin malum
  rationale: «Males» preserva la amplitud semántica de mala/evils y mantiene el paralelismo con la serie de juicios que sigue. «Desastres» o «calamidades» estrecharían el sentido.
- source_word: super orbem terrarum
  english_pob_choice: upon the world
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el mundo
  - sobre la tierra habitada
  lexicon: Latin orbis terrarum
  rationale: «Sobre la tierra» reproduce de forma natural el alcance global de orbis terrarum y evita una expresión demasiado técnica; en español bíblico transmite bien la totalidad del ámbito afectado.
- source_word: gladium et famem et mortem et interitum
  english_pob_choice: sword and famine and death and destruction
  chosen_spanish: espada, hambre, muerte y destrucción
  alternatives_spanish:
  - espada, hambre, peste y destrucción
  - espada, hambre, muerte y ruina
  lexicon: Latin gladius / fames / mors / interitus
  rationale: La enumeración se conserva casi literalmente. «Destrucción» corresponde bien a interitus y retiene el final enfático de la cadena de juicios; «ruina» sería posible, pero menos directo aquí.
theological_decisions:
- issue: Naturaleza de los males anunciados como juicio divino
  english_pob_reading: I am bringing evils upon the world, says the Lord
  chosen_spanish_reading: yo traigo males sobre la tierra, dice el Señor
  alternative_spanish_readings:
  - yo traigo calamidades sobre el mundo, dice el Señor
  - yo envío males sobre la tierra, dice el Señor
  rationale: La formulación española mantiene que el sujeto divino es el agente del juicio, como en el inglés POB y el latín. «Traigo» conserva la agencia sin añadir causalidad secundaria no presente explícitamente en el texto.
  doctrine_reference: Juicio divino soberano; cf. la lógica profética de calamidades enviadas por Dios
- issue: Alcance universal del castigo
  english_pob_reading: upon the world
  chosen_spanish_reading: sobre la tierra
  alternative_spanish_readings:
  - sobre el mundo
  - sobre el mundo habitado
  rationale: «La tierra» conserva el matiz bíblico de totalidad del ámbito humano afectado y suena más natural que «el mundo» en este contexto oracular; no cambia el alcance universal del anuncio.
  doctrine_reference: Universalidad del juicio sobre la humanidad
- issue: Título divino en la cita profética
  english_pob_reading: says the Lord
  chosen_spanish_reading: dice el Señor
  alternative_spanish_readings:
  - dice Yahvé
  rationale: Aunque el proyecto suele preferir «Yahvé» para יהוה, el texto aquí depende de la tradición latina «Dominus» y la formulación auditada en inglés usa «the Lord». «Dice el Señor» conserva la lectura heredada del documento base sin introducir una decisión que el latín no distingue de forma segura.
  doctrine_reference: Uso reverente del título divino en cita oracular
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el latín limpio y la traducción inglesa auditada; no se registran revisiones aplicadas ni notas textuales, por lo que la redacción española sigue de cerca la secuencia léxica del original sin introducir variantes no atestiguadas.
  spanish_consistency_notes:
  - Se mantuvo «Señor» en la cita oracular porque el texto fuente es latino y el contexto auditado no exige explicitar el nombre divino YHWH.
  - Se eligió «males» para conservar la amplitud de mala y el tono de juicio general.
  - La serie final conserva cuatro sustantivos coordinados para reflejar la cadencia enumerativa del original.
