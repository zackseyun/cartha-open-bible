id: 2ES.15.31
reference: 2 Esdras 15:31
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: et post haec supervalescet draco nativitatis memoria suae, et si converterint se conspirantes in virtute magna ad persequendos eos,
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/031.yaml
  text: And after this the dragon[15:31], mindful of its origin, will prevail; and if they turn, conspiring in great force to pursue them[a],
  footnotes:
  - marker: '15:31'
    text: The clause about 'the dragon, mindful of its birth' is textually obscure. The translation preserves the strange image rather than replacing it with a smoother conjecture.
    reason: textual_variant
  - marker: a
    text: Or 'turn themselves, conspiring'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:53:00Z'
    unchanged: false
    changes_summary: Changed 'birth' to 'origin' for more natural and accurate sense of nativitatis here, and 'uniting' to 'conspiring' to reflect conspirantes more precisely.
translation:
  language: es
  text: Y después de esto el dragón, recordando su origen, prevalecerá; y si se vuelven, conspirando[a] con gran fuerza para perseguirlos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «uniéndose». En este contexto bélico, el participio latino conspirantes puede entenderse como acción concertada o agrupación en fuerza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: draco
  english_pob_choice: the dragon
  chosen_spanish: el dragón
  alternatives_spanish:
  - el monstruo
  - el serpiente
  lexicon: draco
  rationale: Se mantiene el sustantivo literal y apocalíptico “dragón”, que reproduce el valor imagético del latín y coincide con la decisión inglesa de no suavizar la figura.
- source_word: nativitatis memoria suae
  english_pob_choice: mindful of its origin
  chosen_spanish: consciente de su origen
  alternatives_spanish:
  - memorial de su nacimiento
  - recordando su nacimiento
  - acordándose de su origen
  lexicon: nativitas
  rationale: El latín es oscuro y la revisión inglesa prefirió un sentido natural de procedencia/origen más que una glosa forzada de “birth”. En español “consciente de su origen” conserva esa idea sin endurecerla en una frase extraña.
- source_word: supervalescet
  english_pob_choice: will prevail
  chosen_spanish: prevalecerá
  alternatives_spanish:
  - será más fuerte
  - dominará
  - triunfará
  lexicon: supervalesco
  rationale: “Prevalecerá” expresa bien el sentido de superioridad o predominio del verbo latino, con tono bíblico claro y sin añadir matices que el texto no exige.
- source_word: converterint se
  english_pob_choice: turn
  chosen_spanish: se vuelven
  alternatives_spanish:
  - se convierten
  - se apartan
  - se giran
  lexicon: convertere
  rationale: El reflexivo latino se vierte de modo natural con “se vuelven”; conserva la idea básica de volverse/volver sin introducir una interpretación moral o espiritual no explicitada aquí.
- source_word: conspirantes
  english_pob_choice: conspiring
  chosen_spanish: uniéndose
  alternatives_spanish:
  - conspirando
  - confabulándose
  - uniéndose en conspiración
  lexicon: conspiro
  rationale: La revisión inglesa señaló que en este contexto militar/apocalíptico “conspiring” podía sonar a intriga secreta. En español, “uniéndose” transmite mejor la acción colectiva y evita cargar el término con una connotación policíaca o clandestina que el pasaje no necesariamente tiene.
- source_word: in virtute magna
  english_pob_choice: in great force
  chosen_spanish: con gran fuerza
  alternatives_spanish:
  - con gran poder
  - en gran fuerza
  - con gran poderío
  lexicon: virtus
  rationale: “Virtus” aquí puede denotar fuerza/potencia militar. “Con gran fuerza” conserva la amplitud del latín y es idiomático en español bíblico.
- source_word: persequendos eos
  english_pob_choice: to pursue them
  chosen_spanish: para perseguirlos
  alternatives_spanish:
  - para ir tras ellos
  - para acosarlos
  - para perseguirlos y darles alcance
  lexicon: persequor
  rationale: Se mantiene el verbo directo “perseguir” porque expresa con claridad la persecución activa del texto y no requiere expansión.
theological_decisions:
- issue: Imagen oscura del dragón y de su “origen/nacimiento”
  english_pob_reading: The clause about 'the dragon, mindful of its birth' is textually obscure. The translation preserves the strange image rather than replacing it with a smoother conjecture.
  chosen_spanish_reading: 'La frase se conserva oscura: “consciente de su origen”'
  alternative_spanish_readings:
  - memoria de su nacimiento
  - recordando su nacimiento
  - por acuerdo con su linaje
  rationale: No se resuelve la oscuridad textual con una paráfrasis interpretativa. Se mantiene la rareza de la imagen y se opta por una equivalencia que suena natural en español sin borrar la ambigüedad heredada del latín.
  doctrine_reference: Principio de fidelidad textual en lecturas apocalípticas; evitar conjeturas no apoyadas por el testimonio base.
- issue: Sentido de conspirantes en contexto bélico
  english_pob_reading: Or 'turn themselves, conspiring'.
  chosen_spanish_reading: “se vuelven, uniéndose” como lectura principal; la unión puede ser colectiva, no necesariamente secreta.
  alternative_spanish_readings:
  - se vuelven, conspirando
  - se vuelven, confabulándose
  rationale: La revisión textual favorece entender el participio en un contexto de movimiento militar como “unirse/bandearse”. Se evita imponer la idea moderna de conspiración secreta, aunque la nota mantiene la alternativa formal.
  doctrine_reference: Ninguna doctrina específica; criterio de semántica contextual y precisión léxica.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se mantuvo ‘origin’ como ‘origen’ y se recogió el ajuste de ‘conspiring’ hacia un sentido de unión colectiva en contexto militar, sin forzar una conspiración secreta. También se respetó la decisión inglesa de conservar la imagen extraña del dragón en vez de suavizarla.'
  spanish_consistency_notes:
  - Se mantiene ‘dragón’ como imagen apocalíptica literal, coherente con la POB inglesa.
  - Se usa ‘Y después de esto’ para reproducir la secuencia narrativa simple del latín.
  - Se prefiere ‘prevalecerá’ como equivalente sobrio de supervalescet.
  - Se evita ‘SEÑOR’ u այլ sustituciones teológicas ajenas, pues no aparecen en este versículo.
