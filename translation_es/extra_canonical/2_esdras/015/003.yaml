translation:
  language: es
  text: porque son fieles y verdaderos. No temas[a] los pensamientos contra ti, ni te turbe la incredulidad de los que hablan contra ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Temas» traduce el latín ne timeas con una forma breve y solemne; «no tengas miedo» sería una alternativa más coloquial.
    reason: lexical_alternative
lexical_decisions:
- source_word: fideles et ueri sunt
  english_pob_choice: they are faithful and true
  chosen_spanish: son fieles y verdaderos
  alternatives_spanish:
  - son leales y verdaderos
  - son fieles y veraces
  lexicon: fideles; ueri
  rationale: «Fieles» conserva la idea de confiabilidad/constancia, y «verdaderos» reproduce el valor de ueri sin forzar un tecnicismo. «Veraces» sería posible, pero en español suena más a veracidad de personas que a la cualidad declarada aquí.
- source_word: Ne timeas
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas tú
  lexicon: timeas
  rationale: Imperativo breve y natural en español; mantiene la fuerza exhortativa directa del latín.
- source_word: cogitationibus aduersum te
  english_pob_choice: the thoughts against you
  chosen_spanish: los pensamientos contra ti
  alternatives_spanish:
  - los pensamientos en tu contra
  - las intenciones contra ti
  lexicon: cogitationibus; aduersum
  rationale: «Pensamientos» sigue de cerca cogitationibus y preserva la decisión revisada en el POB inglés frente a «schemes». «Contra ti» expresa aduersum con claridad y sin añadir la noción de plan.
- source_word: incredulitates, contra dicentium
  english_pob_choice: the unbelief of those who speak against you
  chosen_spanish: la incredulidad de los que hablan contra ti
  alternatives_spanish:
  - la falta de fe de los que hablan contra ti
  - la incredulidad de quienes se oponen con palabras
  lexicon: incredulitates; contra dicentium
  rationale: «Incredulidad» conserva el campo semántico de incredulitas y mantiene la tensión con la fe/fidelidad del inicio. «Los que hablan contra ti» traduce de modo directo contra dicentium sin cargarlo innecesariamente con una lectura más específica que el latín no exige.
theological_decisions:
- issue: Relación entre «fideles et ueri» y la exhortación a no temer
  english_pob_reading: because they are faithful and true. Do not fear the thoughts against you, nor let the unbelief of those who speak against you trouble you.
  chosen_spanish_reading: porque son fieles y verdaderos. No temas los pensamientos contra ti, ni turbe tu incredulidad la de los que hablan contra ti.
  alternative_spanish_readings:
  - porque son fieles y verdaderos; no temas los pensamientos contra ti, ni la incredulidad de los que hablan contra ti te turbe
  - porque ellos son fieles y verdaderos. No temas los pensamientos en tu contra, ni te turbe la incredulidad de quienes se oponen a ti
  rationale: 'La versión española conserva la estructura breve y la tensión del original: primero la afirmación de fidelidad/verdad, luego la prohibición de temer pensamientos hostiles y de dejarse perturbar por la incredulidad. Se evita suavizar «incredulidad», porque el texto la pone como realidad opuesta a la fidelidad.'
  doctrine_reference: Confianza en la fidelidad de Dios y advertencia contra la incredulidad; cf. tema bíblico de fe frente a incredulidad.
translation_notes:
  revision_awareness: El inglés POB revisó «schemes» a «thoughts» para acercarse a cogitationibus. La presente versión sigue esa revisión con «pensamientos» y evita introducir la idea de complot. También conserva el tono formal de la línea inglesa final mediante una sintaxis española breve y directa.
  spanish_consistency_notes:
  - Se usa «fieles y verdaderos» para mantener la pareja adjetival del latín sin traducirla por un giro devocional más libre.
  - Se conserva «incredulidad» en vez de atenuarla a «duda» o «desconfianza», porque el latín ofrece una oposición teológica más fuerte.
  - «Contra ti» se mantiene como equivalente general de aduersum te para no sobreespecificar el tipo de oposición.
  - El orden español coloca la exhortación negativa en una sola frase fluida y apta para lectura litúrgica o devocional.
