review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el latín en la mayor parte del versículo: ''beberán su propia sangre'', ''por hambre de pan y sed de agua'', ''¡Infeliz!'' y ''de nuevo recibirás males'' preservan adecuadamente el sentido. El punto principal es primaria: el latín indica primacía/rango (''principal, primera, de primer rango''), no necesariamente un matiz comparativo moderno como ''la más prominente''.'
  spanish_quality_summary: El español es claro y legible, pero 'como la más prominente vendrás' suena algo calcado y poco natural en contexto profético. 'Prominente' además puede sugerir notoriedad más que rango. Conviene una formulación más directa y digna, como 'como la principal vendrás' o 'vendrás como la principal'.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. La decisión documentada en inglés de evitar añadir 'entre las mujeres' debe mantenerse, y la nota española debe reflejar la dificultad léxica de primaria sin reintroducir esa interpolación en el texto principal.
  issues:
  - severity: medium
    issue: '''la más prominente'' para primaria'
    rationale: Aunque intenta reflejar prominencia, no expresa tan bien la idea de primacía o rango del latín primarius/primaria y suena menos natural en español bíblico contemporáneo.
  - severity: low
    issue: Redacción de la nota alternativa
    rationale: La nota actual ofrece alternativas útiles, pero conviene priorizar 'la principal' o 'la primera en rango' como explicación de primaria, en línea más estrecha con la auditoría inglesa y el matiz de rango.
  revised_spanish_text: y beberán su propia sangre por hambre de pan y sed de agua. ¡Infeliz[a], como la principal vendrás, y de nuevo recibirás males!
