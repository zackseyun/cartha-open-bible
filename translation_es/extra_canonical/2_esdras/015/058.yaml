translation:
  language: es
  text: y beberán su propia sangre por hambre de pan y sed de agua. ¡Infeliz[a], como la principal vendrás, y de nuevo recibirás males!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como la primera en rango' o 'como la de mayor rango'.
    reason: alternative_reading
lexical_decisions:
- source_word: suas et sanguinem bibent
  english_pob_choice: and drink their own blood
  chosen_spanish: beberán su propia sangre
  alternatives_spanish:
  - tomarán su propia sangre para beber
  - beberán sangre propia
  lexicon: bibere
  rationale: Conservo el sentido literal de beber sangre, con posesivo explícito para reflejar suas et sanguinem. 'Su propia sangre' evita ambigüedad y sigue el valor trágico del latín sin suavizarlo.
- source_word: a fame panis et siti aquae
  english_pob_choice: because of hunger for bread and thirst for water
  chosen_spanish: por hambre de pan y sed de agua
  alternatives_spanish:
  - a causa del hambre de pan y de la sed de agua
  - por el hambre de pan y la sed de agua
  lexicon: fames / sitis
  rationale: Mantengo la construcción causal y el paralelismo 'hambre de pan / sed de agua'. 'Por' es natural en español y conserva la fuerza de causa y consecuencia del latín.
- source_word: Infelix
  english_pob_choice: Unhappy one
  chosen_spanish: ¡Infeliz!
  alternatives_spanish:
  - ¡Desdichada!
  - ¡Miserable!
  lexicon: infelix
  rationale: '''Infeliz'' reproduce el tono de lamentación y reproche del vocativo latino sin introducir una paráfrasis más fuerte de lo que permite el texto.'
- source_word: primaria
  english_pob_choice: as the foremost
  chosen_spanish: como la más prominente
  alternatives_spanish:
  - como la principal
  - como la primera en rango
  - como la más alta
  lexicon: primarius
  rationale: Sigo la revisión que evita añadir 'entre las mujeres' y vierto primaria con un comparativo natural en español. 'Más prominente' conserva la idea de primacía/rango sin sobreespecificar el contexto.
- source_word: et iterum mala accipies
  english_pob_choice: and again you will receive evils
  chosen_spanish: y de nuevo recibirás males
  alternatives_spanish:
  - y otra vez recibirás males
  - y de nuevo padecerás males
  lexicon: accipere / mala
  rationale: '''Recibirás males'' mantiene la literalidad de accipies mala y el sentido de sufrir calamidades. ''De nuevo'' refleja iterum con estilo fluido en español.'
theological_decisions:
- issue: Tratamiento de la personificación y el estatus de 'primaria'
  english_pob_reading: '''as the foremost'' preserves the mockery of former prominence without adding ''among women'''
  chosen_spanish_reading: '''como la más prominente'' sin añadir ''entre las mujeres'''
  alternative_spanish_readings:
  - como la principal
  - como la primera en rango
  rationale: La revisión inglesa decide no restringir primaria a 'entre las mujeres'. En español, mantener solo la idea de primacía respeta la personificación de Asia y conserva la ironía del pasaje sin una interpolación no atestiguada.
  doctrine_reference: Principio de adherencia al sentido del testimonio fuente y evitación de interpolaciones no presentes en el texto base
translation_notes:
  revision_awareness: He seguido la revisión más reciente que corrige el anterior 'as chief among women' a 'as the foremost', porque el latín primaria solo expresa primacía/rango. La redacción española evita añadir 'entre las mujeres' y conserva la burla por el antiguo predominio de la figura personificada.
  spanish_consistency_notes:
  - Uso 'Yahvé' no aplica aquí porque el verso no contiene el nombre divino.
  - Conservo 'males' para mala en sentido de calamidades/evils, no 'mal' abstracto.
  - La puntuación exclamativa acompaña el vocativo 'Infelix' y la carga retórica del cierre.
