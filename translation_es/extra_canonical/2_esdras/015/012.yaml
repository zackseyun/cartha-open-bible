translation:
  language: es
  text: Que Egipto[a] se lamente, y sus cimientos, por la plaga de golpes y azotes que el Señor traerá sobre Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra de Egipto».
    reason: alternative_reading
lexical_decisions:
- source_word: lugeat
  english_pob_choice: Let Egypt mourn
  chosen_spanish: Que Egipto se lamente
  alternatives_spanish:
  - Que Egipto llore
  - Que Egipto gima
  lexicon: Latin lugere
  rationale: El latín expresa duelo o lamento público; «lamentarse» conserva el tono de aflicción oracular sin cargar el texto con una formulación más interpretativa que «llore».
- source_word: Aegyptus
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: Latin Aegyptus
  rationale: Nombre propio geográfico directo; se mantiene la referencia histórica y profética sin expansión.
- source_word: fundamenta eius
  english_pob_choice: its foundations
  chosen_spanish: sus cimientos
  alternatives_spanish:
  - sus fundamentos
  - su base
  lexicon: Latin fundamenta
  rationale: «Cimientos» conserva la imagen arquitectónica concreta y sugiere la idea de una devastación que alcanza hasta la estructura misma del país.
- source_word: plaga
  english_pob_choice: plague
  chosen_spanish: plaga
  alternatives_spanish:
  - golpe
  - azote
  - castigo
  lexicon: Latin plaga
  rationale: La palabra puede abarcar golpe, herida o calamidad; aquí se conserva «plaga» porque el contexto apocalíptico y la acumulación con los términos de azote físico la hacen natural en español bíblico.
- source_word: verberati
  english_pob_choice: blows
  chosen_spanish: golpes
  alternatives_spanish:
  - azotes
  - latigazos
  lexicon: Latin verberati
  rationale: «Verberati» remite a golpes dados con fuerza; «golpes» refleja el sentido básico sin introducir necesariamente instrumento de flagelación.
- source_word: mastigati
  english_pob_choice: scourging
  chosen_spanish: azotes
  alternatives_spanish:
  - flagelación
  - látigo
  lexicon: Latin mastigati
  rationale: El préstamo latino/greco-latino apunta a azote físico y violento. «Azotes» conserva la imagen de castigo corporal sin suavizarla, y encaja bien con «golpes».
- source_word: Dominus
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: Latin Dominus
  rationale: Aquí el latín usa Dominus sin marca explícita del tetragrama. Dado el flujo apocalíptico heredado y la formulación tradicional de la fuente latina, se conserva «el Señor» en vez de introducir «Yahvé» sin señal textual directa.
theological_decisions:
- issue: Agencia divina en el juicio sobre Egipto
  english_pob_reading: the Lord will bring upon it
  chosen_spanish_reading: el Señor traerá sobre él
  alternative_spanish_readings:
  - Yahvé traerá sobre él
  - Dios traerá sobre él
  rationale: La acción viene atribuida al Señor como sujeto del juicio. En esta línea latina no hay necesidad de explicitar el nombre divino como Yahvé, porque el texto fuente usa Dominus y la fuerza teológica es la del agente judicial divino.
  doctrine_reference: Juicio divino en literatura apocalíptica; fidelidad al sujeto verbal del texto fuente.
translation_notes:
  revision_awareness: La base inglesa había pasado de «chastisement» a «scourging» para evitar suavizar mastigati. En español se ha seguido esa revisión conservando el componente físico y violento con «azotes», y se ha mantenido el primer término como «golpes» para reflejar verberati de forma natural. No se ha introducido una lectura devocional o eufemística que atenúe la doble descripción del castigo.
  spanish_consistency_notes:
  - Se conserva el paralelismo entre «golpes» y «azotes» para reproducir la acumulación retórica del latín.
  - «El Señor» se mantiene por consistencia con Dominus en el texto fuente latino, sin desplazarlo por la convención editorial de usar Yahvé cuando el original no lo marca directamente.
  - El marcador de nota [l] se aplica a «Egipto» para permitir la alternativa geográfica sin alterar la línea principal.
