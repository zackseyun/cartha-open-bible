revisions:
- from: Que Egipto[l] se lamente, y sus cimientos, por la plaga de golpes y azotes que el Señor traerá sobre él.
  to: Que Egipto[a] se lamente, y sus cimientos, por la plaga de golpes y azotes que el Señor traerá sobre Egipto.
  rationale: Se corrige el marcador de nota para cumplir el formato requerido y se reemplaza «sobre él» por «sobre Egipto» para evitar ambigüedad referencial en español, sin alterar el sentido del original latino ni la línea léxica del POB.
