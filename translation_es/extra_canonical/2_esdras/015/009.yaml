source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: vindicans vindicabo illos, dicit Dominus, et accipiam omnem sanguinem innocuum ex illis ad me.
