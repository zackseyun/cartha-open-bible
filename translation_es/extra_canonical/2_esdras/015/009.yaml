base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/009.yaml
  text: I will surely avenge them[a], says the Lord, and I will require from them all innocent blood for myself.
  footnotes:
  - marker: a
    text: Or 'In avenging I will avenge them'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:52:37Z'
    unchanged: false
    changes_summary: 'Revised the second clause for more natural and precise English: changed ''take to myself from them all innocent blood'' to ''require from them all innocent blood for myself,'' which better reflects the sense of exacting bloodguilt.'
translation:
  language: es
  text: Ciertamente los vengaré[a], dice el Señor, y les exigiré cuentas por toda sangre inocente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «Vengando, los vengaré»; es una construcción enfática.
    reason: Preserva la alternativa formal documentada en el audit trail inglés para la duplicación enfática del original.
lexical_decisions:
- source_word: vindicans vindicabo
  english_pob_choice: I will surely avenge them
  chosen_spanish: Ciertamente los vengaré
  alternatives_spanish:
  - Los vengaré con certeza
  - Seguro los vengaré
  lexicon: vindico -> vengar / hacer justicia
  rationale: La duplicación latina expresa énfasis, no una acción distinta. 'Ciertamente' comunica bien ese valor intensivo en español sin volver la frase un calco rígido; 'vengar' conserva la fuerza retributiva del verbo.
- source_word: Dominus
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Yahvé
  lexicon: Dominus -> Señor
  rationale: Aunque el proyecto suele usar 'Yahvé' para el nombre divino, aquí el texto fuente latino usa 'Dominus' y la tradición auditada en inglés conserva 'the Lord'. En esta cláusula breve, 'el Señor' preserva la formulación establecida del audit trail sin perder inteligibilidad.
- source_word: omnem sanguinem innocuum
  english_pob_choice: all innocent blood
  chosen_spanish: toda sangre inocente
  alternatives_spanish:
  - toda sangre inocente derramada
  - toda sangre sin culpa
  lexicon: sanguis innocuus -> sangre inocente / sangre sin culpa
  rationale: '''Sangre inocente'' reproduce con fidelidad la expresión de culpa de sangre presente en el original. ''Toda'' mantiene el alcance total de ''omnem''.'
- source_word: ad me
  english_pob_choice: for myself
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - en mi presencia
  lexicon: ad me -> para mí
  rationale: La frase indica apropiación/exacción en favor del sujeto, no movimiento físico. 'Para mí' comunica bien la relación de reclamación o exigencia de la sangre.
theological_decisions:
- issue: Retribución divina y sangre inocente
  english_pob_reading: I will require from them all innocent blood for myself
  chosen_spanish_reading: reclamaré para mí toda sangre inocente de entre ellos
  alternative_spanish_readings:
  - exigiré de ellos toda sangre inocente para mí
  - pediré cuentas por toda sangre inocente
  rationale: El latín 'accipiam... ad me' sugiere exigir o reclamar la sangre como deuda de culpa, no simplemente recibirla. 'Reclamaré para mí' conserva esa tensión jurídica y retributiva sin suavizarla.
  doctrine_reference: Justicia retributiva / responsabilidad por sangre inocente
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión que corrigió el inglés de una calca («In avenging I will avenge») a una expresión de énfasis natural («I will surely avenge»), y la revisión posterior que precisó la segunda cláusula como exigencia de sangre inocente. La versión española refleja ambos ajustes: énfasis adverbial y sentido jurídico de reclamación.'
  spanish_consistency_notes:
  - Se mantuvo 'Señor' porque el audit trail inglés fija 'the Lord' y el latín 'Dominus', aunque en otros contextos del proyecto el nombre divino pueda renderizarse como 'Yahvé'.
  - '''Vengar'' se eligió por la fuerza retributiva del duplicado latino; ''reclamar'' evita diluir el sentido de exacta retribución en la segunda cláusula.'
  - La nota alternativa se ancla solo en la primera cláusula, donde la duplicación admite una traducción intensiva distinta.
