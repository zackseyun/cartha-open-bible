translation:
  language: es
  text: Y los que queden[a] servirán a los que la aterroraron[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que permanezcan». El latín subremanserint subraya que quedan o permanecen, sin implicar necesariamente «sobrevivir».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «amedrentaron» o «espantaron». El latín exteruerunt expresa causar terror; la revisión inglesa prefirió «terrified».'
    reason: lexical_alternative
lexical_decisions:
- source_word: subremanserint
  english_pob_choice: remain
  chosen_spanish: queden
  alternatives_spanish:
  - permanezcan
  - queden los que sobrevivan
  lexicon: subremanere
  rationale: El latín subremanserint indica los que quedan o permanecen; «queden» conserva esa idea de residuo/persistencia sin añadir explícitamente la noción de supervivencia que la revisión inglesa descartó.
- source_word: seruient
  english_pob_choice: will serve
  chosen_spanish: servirán
  alternatives_spanish:
  - serán esclavos de
  - estarán al servicio de
  lexicon: servire
  rationale: servient traduce naturalmente con «servirán»; es fiel al verbo latino y suficientemente neutro para el contexto sin forzar un matiz más fuerte que el texto no exige.
- source_word: exteruerunt
  english_pob_choice: terrified
  chosen_spanish: aterroraron
  alternatives_spanish:
  - amedrentaron
  - espantaron
  lexicon: exterrere
  rationale: La revisión inglesa corrigió «destroyed» a «terrified»; «aterroraron» refleja con precisión el valor causativo de exteru- y mantiene la fuerza semántica de intimidación/terror.
theological_decisions:
- issue: Destino de los que quedan frente a los que oprimieron/atemorizaron a la mujer personificada
  english_pob_reading: those who remain will serve those who terrified her
  chosen_spanish_reading: los que queden servirán a los que la aterroraron
  alternative_spanish_readings:
  - los sobrevivientes servirán a los que la aterrorizaron
  - los que permanezcan serán siervos de los que la aterrorizaron
  rationale: 'La línea conserva la retribución invertida del pasaje: los restantes quedan sometidos a quienes ejercieron terror sobre ella. No se introduce destrucción ni esclavitud explícita, porque el latín solo dice servir.'
  doctrine_reference: Apocalíptica de retribución / inversión de roles
translation_notes:
  revision_awareness: 'La revisión inglesa reciente corrigió dos puntos clave: subremanserint pasó de «survive» a «remain», y exteruerunt de «destroyed» a «terrified». La versión española sigue esa adjudicación y evita introducir nociones de destrucción no presentes en el latín.'
  spanish_consistency_notes:
  - Se mantiene «servirán» para servient, sin sustituirlo por «serán esclavos» porque el texto latino no lo exige.
  - Se traduce el sujeto implícito de forma natural en español con «los que queden», preservando el sentido de resto o remanente.
  - Se usa un verbo causativo de temor para exteruerunt, en armonía con la lectura revisada del POB inglés.
