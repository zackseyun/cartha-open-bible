translation:
  language: es
  text: No tendrá piedad el hombre de su prójimo, sino que irrumpirá en sus casas con la espada, saqueando sus bienes[a], a causa del hambre de pan y de una gran tribulación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «bienes» traduce de manera amplia substantias eorum; también puede entenderse como «posesiones».
    reason: lexical_alternative
lexical_decisions:
- source_word: non miserebitur
  english_pob_choice: will have no pity
  chosen_spanish: no tendrá piedad
  alternatives_spanish:
  - no se compadecerá
  - no mostrará misericordia
  lexicon: misereri -> tener piedad / compadecerse
  rationale: «Tener piedad» reproduce con naturalidad la falta de compasión sin imponer un matiz más técnico o eclesiástico que el latín no exige.
- source_word: homo proximo suo
  english_pob_choice: a man will have no pity on his neighbor
  chosen_spanish: el hombre de su prójimo
  alternatives_spanish:
  - un hombre hacia su prójimo
  - el hombre hacia su vecino
  lexicon: homo / proximus -> hombre / prójimo
  rationale: «Prójimo» conserva la relación cercana del latín, y evita reducirlo a «vecino» en un sentido meramente espacial.
- source_word: in domos eorum in gladium
  english_pob_choice: will rush upon their houses with the sword
  chosen_spanish: correrá contra sus casas con la espada
  alternatives_spanish:
  - irrumpirá en sus casas con la espada
  - se lanzará sobre sus casas con la espada
  lexicon: in ... gladium -> contra ... con la espada
  rationale: La imagen de asalto violento queda clara en español con «correrá contra»; mantiene el movimiento agresivo del latín sin forzar una paráfrasis.
- source_word: ad diripiendas substantias eorum
  english_pob_choice: plundering their possessions
  chosen_spanish: saqueando sus bienes
  alternatives_spanish:
  - despojando sus posesiones
  - robando sus pertenencias
  lexicon: diripere / substantiae -> saquear / bienes
  rationale: «Saqueando» conserva el valor de pillaje militar; «bienes» es una equivalencia amplia y natural para substantiae en este contexto.
- source_word: propter famem panis
  english_pob_choice: because of hunger for bread
  chosen_spanish: a causa del hambre de pan
  alternatives_spanish:
  - por el hambre de pan
  - a causa del hambre de comida
  lexicon: fames panis -> hambre de pan
  rationale: Se mantiene la expresión concreta y casi literal «hambre de pan», porque el latín enfatiza la escasez básica del alimento.
- source_word: tribulationem multam
  english_pob_choice: great distress
  chosen_spanish: una gran tribulación
  alternatives_spanish:
  - mucha tribulación
  - una angustia grande
  lexicon: tribulatio -> tribulación / distress
  rationale: «Tribulación» conserva el peso intensivo y el registro elevado del latín; además armoniza bien con el tono profético del pasaje.
theological_decisions:
- issue: Violencia social causada por hambre y aflicción
  english_pob_reading: A man will have no pity ... because of hunger for bread and great distress.
  chosen_spanish_reading: No tendrá piedad ... a causa del hambre de pan y de una gran tribulación.
  alternative_spanish_readings:
  - No mostrará misericordia ... por el hambre de pan y la gran angustia.
  rationale: 'La formulación deja intacta la relación causal del texto: la violencia brota de una crisis extrema, no de un mandato divino ni de un juicio explícitamente explicado aquí.'
  doctrine_reference: Contexto profético de catástrofe social; cf. descripciones de juicio y calamidad en literatura apocalíptica.
translation_notes:
  revision_awareness: El inglés POB ya había estabilizado la lectura sin notas; esta versión sigue de cerca esa solución y solo explicita en español la amplitud de substantiae eorum como «bienes», con una alternativa idiomática en nota.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o lenguaje de nombre divino porque el verso no contiene el tetragrámaton ni una referencia a κύριος.
  - Se mantiene un registro sobrio y profético, evitando modernizar «tribulación» a «angustia» en el cuerpo principal.
  - «Prójimo» se usa para preservar la relación interpersonal del latín, coherente con el español bíblico sin recurrir a una paráfrasis explicativa.
