translation:
  language: es
  text: Dios conoce a los que pecan contra él[a]; por eso los entregará a la muerte y a la matanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios conoce a los que pecan contra él;».'
    reason: alternative_reading
lexical_decisions:
- source_word: novit Deus
  english_pob_choice: God knows
  chosen_spanish: Dios conoce
  alternatives_spanish:
  - Dios sabe
  - Dios conoce bien
  lexicon: novit -> conoce / sabe
  rationale: El latín expresa conocimiento real y directo; «conoce» conserva la fuerza relacional y personal del verbo sin añadir matices no presentes. «Sabe» sería posible, pero «conoce» suena más natural en este contexto bíblico y mantiene el vínculo con el objeto personal del verbo.
- source_word: qui peccant in eum
  english_pob_choice: those who sin against him
  chosen_spanish: a los que pecan contra él
  alternatives_spanish:
  - a quienes pecan contra él
  - a los que pecan contra él mismo
  lexicon: peccant in eum -> pecan contra él
  rationale: «Peccan in eum» indica pecado dirigido contra Dios; «pecan contra él» reproduce esa dirección ofensiva en español. Se evita suavizarlo con una formulación menos concreta, porque el texto latino no solo describe pecado general sino pecado contra Dios.
- source_word: tradet eos
  english_pob_choice: he will hand them over
  chosen_spanish: los entregará
  alternatives_spanish:
  - los pondrá en manos de
  - los entregará en
  lexicon: tradet eos -> entregará
  rationale: «Entregar» comunica bien la acción judicial de poner a alguien bajo el poder de otro. Es más natural en español que una traducción literal rígida y conserva la idea de abandono punitivo presente en el verbo.
- source_word: in mortem et in occisionem
  english_pob_choice: to death and slaughter
  chosen_spanish: a la muerte y a la matanza
  alternatives_spanish:
  - a muerte y matanza
  - a la muerte y al degüello
  lexicon: in mortem et in occisionem -> a la muerte y a la matanza
  rationale: 'Se mantiene la dobleza del latín: «muerte» y «matanza». «Matanza» conserva el carácter violento y masivo de occisio sin introducir un tecnicismo innecesario. «Degüello» sería demasiado específico y más fuerte de lo que exige el fuente.'
theological_decisions:
- issue: Relación causal implícita entre la primera y la segunda cláusula
  english_pob_reading: God knows those who sin against him; therefore he will hand them over to death and slaughter.
  chosen_spanish_reading: Dios conoce a los que pecan contra él; por eso los entregará a la muerte y a la matanza.
  alternative_spanish_readings:
  - Dios conoce a los que pecan contra él, y por eso los entregará a la muerte y a la matanza.
  - Dios conoce a los que pecan contra él; por tanto, los entregará a la muerte y a la matanza.
  rationale: El latín contiene «propterea», que sí introduce consecuencia. Se evita añadir «porque» o «for», pero se conserva la relación inferida con «por eso», que expresa adecuadamente la consecuencia sin sobreinterpretar.
  doctrine_reference: Consecuencia judicial divina basada en el conocimiento de Dios; no añade una doctrina ajena al texto, sino que preserva la secuencia lógica del original.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del inglés POB que eliminó el «For» inicial por no estar en el latín, y la depuración posterior que dejó «death and slaughter» sin una segunda preposición. En español se sigue el mismo ajuste: no se añade una causalidad inicial inexistente y se conserva la coordinación directa del final.'
  spanish_consistency_notes:
  - Se usó «Dios» para novit Deus, conforme al estándar del proyecto.
  - Se mantuvo la secuencia judicial con «los entregará», evitando una paráfrasis más interpretativa.
  - «Matanza» conserva la violencia de occisio sin desplazar el sentido hacia un término más técnico o eufemístico.
