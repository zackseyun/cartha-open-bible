base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/015.yaml
  text: For the sword and their destruction have drawn near[a], and nation will rise against nation for battle, and broadswords will be in their hands.
  footnotes:
  - marker: a
    text: Or 'their sword and crushing are near'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:52:45Z'
    unchanged: false
    changes_summary: Replaced the final prepositional phrase with a finite clause to more directly reflect the Latin 'et romphea in manibus eorum' and improve natural English while preserving the sense.
translation:
  language: es
  text: Porque la espada y la destrucción de ellos se han acercado[a], y nación se levantará contra nación para la batalla, y espadas anchas[b] estarán en sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su espada y su destrucción están cerca»; lectura anterior menos probable.'
    reason: preservar la alternativa histórica documentada en el rastro de auditoría inglés
  - marker: b
    text: El término latino puede referirse a una espada grande o ancha; también podría traducirse más generalmente como «espadas».
    reason: aclarar la elección léxica española para un arma específica sin dejar un anglicismo en el texto principal
lexical_decisions:
- source_word: quia adpropinquavit
  english_pob_choice: have drawn near
  chosen_spanish: se han acercado
  alternatives_spanish:
  - han llegado
  - están cerca
  lexicon: adpropinquare
  rationale: El perfecto latino expresa una cercanía ya efectiva; en español, 'se han acercado' conserva ese valor sin volverlo demasiado literal o áspero.
- source_word: gladius
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - la espada de juicio
  - la espada
  lexicon: gladius
  rationale: '''Espada'' es la equivalencia directa y natural en español; el contexto apocalíptico ya comunica su sentido judicial sin añadir glosa en el texto principal.'
- source_word: extritio illorum
  english_pob_choice: their destruction
  chosen_spanish: su destrucción
  alternatives_spanish:
  - su ruina
  - la destrucción de ellos
  lexicon: exritio
  rationale: La revisión inglesa corrigió el sentido a 'destruction/ruin' y aclaró que el genitivo es objetivo; en español 'su destrucción' mantiene esa relación sin introducir posesión equivocada de la espada.
- source_word: exsurget gens contra gentem
  english_pob_choice: nation will rise against nation
  chosen_spanish: nación se levantará contra nación
  alternatives_spanish:
  - un pueblo se levantará contra otro pueblo
  - nación se alzará contra nación
  lexicon: exsurgo
  rationale: '''Se levantará contra'' reproduce bien el movimiento conflictivo del latín y es idiomático en español bíblico contemporáneo.'
- source_word: romphea
  english_pob_choice: broadswords
  chosen_spanish: las broadswords
  alternatives_spanish:
  - las espadas largas
  - las espadas anchas
  lexicon: romphea
  rationale: El término latino apunta a un arma cortante específica; como no hay una decisión inglesa plenamente vernácula aquí, se conserva el préstamo 'broadswords' en la línea principal para no inventar una equivalencia no documentada.
theological_decisions:
- issue: Genitivo de 'illorum' en 'extritio illorum'
  english_pob_reading: their destruction
  chosen_spanish_reading: su destrucción
  alternative_spanish_readings:
  - la destrucción de ellos
  - su ruina
  rationale: La revisión auditada corrigió la lectura posesiva errónea aplicada a 'gladius'. En español, 'su destrucción' conserva el genitivo objetivo y evita atribuir la espada a 'ellos'.
  doctrine_reference: none
- issue: Naturaleza del lenguaje apocalíptico de juicio
  english_pob_reading: the sword and their destruction have drawn near
  chosen_spanish_reading: la espada y su destrucción se han acercado
  alternative_spanish_readings:
  - la espada y su ruina se han acercado
  rationale: La formulación mantiene el tono profético de juicio sin suavizar 'destrucción' a un término menos fuerte.
  doctrine_reference: Apocalíptica de juicio en 2 Esdras
- issue: Término de arma final 'romphea'
  english_pob_reading: broadswords will be in their hands
  chosen_spanish_reading: las broadswords estarán en sus manos
  alternative_spanish_readings:
  - las espadas anchas estarán en sus manos
  - las espadas largas estarán en sus manos
  rationale: Dado que la evidencia auditada en inglés conserva el préstamo 'broadswords' en vez de imponer un equivalente, el texto español lo preserva también para evitar una equivalencia especulativa no sustentada por el paquete fuente.
  doctrine_reference: none
translation_notes:
  revision_awareness: La traducción incorpora la corrección auditada que entiende 'extritio illorum' como 'su destrucción' y no como posesivo de 'espada'; también refleja el ajuste de la revisión inglesa que convirtió la frase final en una cláusula finita. El texto español mantiene esa estructura y conserva el registro apocalíptico del latín limpio.
  spanish_consistency_notes:
  - Se usa 'espada' para gladius y no 'SEÑOR' ni perífrasis devocional, porque el texto no contiene el Tetragrámaton ni κύριος.
  - '''destrucción'' se conserva como sustantivo fuerte, en línea con la revisión inglesa y el latín ''extritio''.'
  - Se mantiene 'nación' en singular para reproducir la repetición enfática 'gens contra gentem'.
  - '''broadswords'' se deja sin domesticar por falta de una decisión documentada equivalente en el audit trail; si el proyecto exige vernáculo, la mejor alternativa sería ''espadas anchas'', pero aquí se preserva el rastro auditado.'
