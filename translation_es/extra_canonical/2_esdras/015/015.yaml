- from: Porque la espada y su destrucción se han acercado[a], y nación se levantará contra nación para la batalla, y las broadswords estarán en sus manos.
  to: Porque la espada y la destrucción de ellos se han acercado[a], y nación se levantará contra nación para la batalla, y espadas anchas[b] estarán en sus manos.
  rationale: Se revisa 'su destrucción' a 'la destrucción de ellos' para expresar con mayor claridad el genitivo objetivo latino. Se sustituye el anglicismo 'broadswords' por 'espadas anchas', una solución española natural y suficientemente cercana, y se añade una nota para conservar la incertidumbre léxica del término. La nota [a] se mantiene como alternativa histórica del expediente inglés, pero ajustada al español.
