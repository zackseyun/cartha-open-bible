    issue: Ambigüedad de 'su destrucción'
    rationale: Aunque intenta reflejar el genitivo objetivo de 'extritio illorum', en español 'su destrucción' puede sonar posesivo o menos claro. 'La destrucción de ellos' comunica mejor que la destrucción recae sobre ellos.
  - severity: high
    issue: Uso de 'broadswords' en inglés dentro del texto español
    rationale: Es un anglicismo no natural y no acorde con el estilo meta. El hecho de que el inglés haya usado 'broadswords' no obliga a conservar el préstamo; en español debe darse una forma comprensible como 'espadas anchas' con nota léxica.
  - severity: low
    issue: La nota [a] ya no coincide con la mejor formulación española
    rationale: Si se corrige la frase principal para aclarar el genitivo, la nota alternativa debe actualizarse para seguir siendo útil y precisa.
