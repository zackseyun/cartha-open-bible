    reason: aclarar la elección léxica española para un arma específica sin dejar un anglicismo en el texto principal
  revision_rationale: Se revisa 'su destrucción' a 'la destrucción de ellos' para expresar con mayor claridad el genitivo objetivo latino. Se sustituye el anglicismo 'broadswords' por 'espadas anchas', una solución española natural y suficientemente cercana, y se añade una nota para conservar la incertidumbre léxica del término. La nota [a] se mantiene como alternativa histórica del expediente inglés, pero ajustada al español.
