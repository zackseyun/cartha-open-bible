source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: quia adpropinquavit gladius et extritio illorum, et exsurget gens contra gentem ad pugnam, et romphea in manibus eorum.
