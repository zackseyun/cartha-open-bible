revisions:
- from: 'Enviaré males sobre ti: viudez, pobreza, hambre, espada y peste[a], para devastar tus casas, para violación.'
  to: 'Enviaré males sobre ti: viudez, pobreza, hambre, espada y peste[a], para devastar tus casas, para ultraje[b].'
  rationale: Se conserva el sentido y el paralelismo de las dos frases con 'ad', pero se reemplaza la formulación española poco natural 'para violación' por 'para ultraje', que sigue representando la dureza de 'uiolationem' de manera más legible. La nota nueva preserva explícitamente la correspondencia literal con 'violación' y su campo semántico, en línea con la justificación del POB inglés.
