review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del latín: anuncio divino de males, lista de calamidades y dos frases finales de propósito/resultado con paralelismo de ''ad''. Sin embargo, la última frase española ''para violación'' no es suficientemente legible ni idiomática en español, y puede inducir casi exclusivamente a una lectura sexual moderna demasiado estrecha. El latín ''ad uiolationem'' debe seguir viéndose como ''violación/ultraje/profanación'', pero el español necesita una formulación más natural que preserve esa aspereza semántica sin volverse opaca.'
  spanish_quality_summary: 'La mayor parte del verso es clara y fiel: ''Enviaré males sobre ti'', ''viudez, pobreza, hambre, espada y peste'', y ''para devastar tus casas'' funcionan bien. El problema principal es la naturalidad final: ''para violación'' suena gramaticalmente truncado y poco natural en español bíblico actual. Una reparación mínima mejora la legibilidad sin perder el vínculo léxico con ''uiolationem''.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Dios' no aparece en el texto hablado; 'males', 'peste' y demás términos son adecuados. La revisión propuesta mantiene la decisión documentada de no neutralizar 'uiolationem', pero la expresa como 'para ultraje' en el texto principal y conserva 'violación' en nota para preservar la justificación lexical del audit trail inglés.
  issues:
  - severity: medium
    issue: La frase final 'para violación' es poco idiomática en español.
    rationale: Aunque sigue de cerca el latín 'ad uiolationem', en español suena incompleta y extraña; además, puede estrecharse indebidamente a un sentido sexual moderno, cuando el latín puede abarcar violación, ultraje o profanación.
  - severity: low
    issue: La nota actual solo conserva la alternativa sintáctica antigua, no la ambigüedad léxica relevante para el español.
    rationale: Dado que el inglés auditado mantuvo 'violation' por cercanía al latín, conviene preservar esa opción en nota si el texto principal adopta una formulación española más natural como 'ultraje'.
  revised_spanish_text: 'Enviaré males sobre ti: viudez, pobreza, hambre, espada y peste[a], para devastar tus casas, para ultraje[b].'
  revised_footnotes:
  - marker: a
    text: 'O: «para devastar tus casas con violación».'
    reason: alternative_reading
  - marker: b
    text: Lit. «para violación»; el latín puede expresar violación, ultraje o profanación.
    reason: lexical_clarity
  revision_rationale: Se conserva el sentido y el paralelismo de las dos frases con 'ad', pero se reemplaza la formulación española poco natural 'para violación' por 'para ultraje', que sigue representando la dureza de 'uiolationem' de manera más legible. La nota nueva preserva explícitamente la correspondencia literal con 'violación' y su campo semántico, en línea con la justificación del POB inglés.
