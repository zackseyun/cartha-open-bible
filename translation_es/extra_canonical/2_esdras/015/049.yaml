base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/049.yaml
  text: 'I will send evils upon you: widowhood and poverty and famine and sword and pestilence[a], to lay waste your houses, for violation'
  footnotes:
  - marker: a
    text: Or 'to lay waste your houses with violation'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:53:14Z'
    unchanged: false
    changes_summary: Changed 'ruin' to 'violation' to more closely reflect the Latin 'ad uiolationem'; retained the rest as accurate and natural.
translation:
  language: es
  text: 'Enviaré males sobre ti: viudez, pobreza, hambre, espada y peste[a], para devastar tus casas, para ultraje[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para devastar tus casas con violación».'
    reason: alternative_reading
  - marker: b
    text: Lit. «para violación»; el latín puede expresar violación, ultraje o profanación.
    reason: lexical_clarity
lexical_decisions:
- source_word: deus / mala
  english_pob_choice: I will send evils upon you
  chosen_spanish: Enviaré males sobre ti
  alternatives_spanish:
  - Mandaré males sobre ti
  - Enviaré desgracias sobre ti
  lexicon: mala -> males
  rationale: El latín usa 'mala' en plural; 'males' conserva el sentido de calamidades enviadas activamente y evita suavizarlo a una simple desgracia genérica. 'Enviaré' refleja 'Inmittam' con buena naturalidad en español.
- source_word: uiduitatem
  english_pob_choice: widowhood
  chosen_spanish: viudez
  alternatives_spanish:
  - viudedad
  lexicon: uiduitas -> viudez
  rationale: '''Viudez'' es el equivalente más directo y natural en español bíblico contemporáneo; conserva el estado de quedar sin cónyuge, sin introducir un tono demasiado abstracto.'
- source_word: paupertatem
  english_pob_choice: poverty
  chosen_spanish: pobreza
  alternatives_spanish:
  - miseria
  - indigencia
  lexicon: paupertas -> pobreza
  rationale: '''Pobreza'' reproduce con claridad la carencia material del latín y mantiene la serie de males enumerados.'
- source_word: famem
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - hambruna
  lexicon: fames -> hambre
  rationale: Aunque 'hambruna' sería más específico, 'hambre' conserva el término básico del latín y permite abarcar tanto hambre extrema como escasez de alimentos, como en el patrón bíblico de calamidades.
- source_word: gladium
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - guerra
  lexicon: gladius -> espada
  rationale: '''Espada'' mantiene la imaginería bíblica tradicional y la correspondencia léxica directa del latín.'
- source_word: pestem
  english_pob_choice: pestilence
  chosen_spanish: peste
  alternatives_spanish:
  - pestilencia
  - epidemia
  lexicon: pestis -> peste
  rationale: '''Peste'' es la opción más transparente y fiel; en español puede abarcar una plaga devastadora sin perder la fuerza del original.'
- source_word: ad deuastandas domus tuas
  english_pob_choice: to lay waste your houses
  chosen_spanish: para devastar tus casas
  alternatives_spanish:
  - para arrasar tus casas
  - para dejar tus casas en ruinas
  lexicon: deuastare -> devastar
  rationale: Se conserva la finalidad expresada por 'ad' con un infinitivo de propósito natural en español. 'Devastar' refleja el verbo latino con fuerza adecuada y sin añadir matices no presentes.
- source_word: ad uiolationem
  english_pob_choice: for violation
  chosen_spanish: para violación
  alternatives_spanish:
  - para profanación
  - para ruin
  lexicon: uiolatio -> violación
  rationale: La revisión del testimonio latino favorece mantener la terminología 'violación' para no perder la correspondencia con 'uiolationem'. Aunque en español puede sonar jurídico o fuerte, preserva el alcance de profanación/violación del texto fuente y deja visible la tensión semántica.
theological_decisions:
- issue: Naturaleza de los males enviados como juicio
  english_pob_reading: I will send evils upon you
  chosen_spanish_reading: Enviaré males sobre ti
  alternative_spanish_readings:
  - Mandaré desgracias sobre ti
  - Enviaré calamidades sobre ti
  rationale: 'El texto presenta una acción judicial divina: Yahvé/ Dios no solo permite, sino que envía calamidades. ''Males'' y ''enviaré'' mantienen esa agency sin interpretar más allá del latín.'
  doctrine_reference: Juicio divino en literatura apocalíptica; soberanía de Dios en castigo histórico.
- issue: Sentido de 'ad uiolationem'
  english_pob_reading: for violation
  chosen_spanish_reading: para violación
  alternative_spanish_readings:
  - para profanación
  - para devastación
  rationale: La tradición inglesa ya registró una oscilación textual/semántica. La lectura latina revisada retiene 'ad uiolationem', por lo que conviene no neutralizarla en español. 'Violación' mantiene la aspereza del original y su posible campo de profanación o ultraje.
  doctrine_reference: Respeto a la forma textual y a la ambigüedad lexical del testimonio latino.
translation_notes:
  revision_awareness: La versión inglesa POB pasó de interpretar 'ad uiolationem' como 'with violation' a restaurar la estructura de propósito independiente ('for violation'). La redacción española sigue la revisión más reciente y mantiene la ambigüedad fuerte de 'uiolationem' sin convertirla en un complemento de modo.
  spanish_consistency_notes:
  - Se conservó el paralelismo de la lista de calamidades con sustantivos simples.
  - No se introdujo 'SEÑOR' ni 'Cristo' porque el texto latino de esta unidad no los contiene.
  - '''Para violación'' se mantiene deliberadamente áspero para reflejar el latín y la revisión textual; la nota ofrece la alternativa sintáctica antigua del inglés.'
