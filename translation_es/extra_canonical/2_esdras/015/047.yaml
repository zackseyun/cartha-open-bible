    changes_summary: Capitalized the opening for formal register and removed 'who always desired you,' which is not present in the provided Latin source.
translation:
  language: es
  text: ¡Ay de ti, miserable, porque te hiciste semejante a ella y adornaste a tus hijas para la prostitución, para agradar y gloriarte en tus amantes!
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Vae tibi
  english_pob_choice: Woe to you
  chosen_spanish: ¡Ay de ti!
  alternatives_spanish:
  - ¡Ay de vosotros!
  - ¡Ay para ti!
  lexicon: interjección de lamento/amenaza
  rationale: «¡Ay de ti!» reproduce de modo natural el lamento profético y el tono de juicio del latín/Vulgata, sin volverlo una mera exclamación sentimental.
- source_word: misera
  english_pob_choice: miserable one
  chosen_spanish: miserable
  alternatives_spanish:
  - desdichada
  - infeliz
  lexicon: adjetivo de lamentación
  rationale: «miserable» conserva la fuerza de condena o compasión amarga presente en el original y coincide con el valor del inglés auditado.
- source_word: adsimilasti ei
  english_pob_choice: you made yourself like her
  chosen_spanish: te hiciste semejante a ella
  alternatives_spanish:
  - te volviste como ella
  - te asemejaste a ella
  lexicon: verbo de semejanza
  rationale: «te hiciste semejante a ella» expresa la comparación activa del sujeto con claridad y evita un calco duro; mantiene la idea de auto-conformación.
- source_word: ornasti filias tuas
  english_pob_choice: adorned your daughters
  chosen_spanish: adornaste a tus hijas
  alternatives_spanish:
  - engalanaste a tus hijas
  - vistes a tus hijas
  lexicon: verbo de adorno
  rationale: «adornaste» sigue de cerca el latín «ornasti» y conserva el matiz de preparación/embellecimiento culpable que antecede a la conducta sexual mencionada.
- source_word: in fornicatione
  english_pob_choice: for prostitution
  chosen_spanish: para la prostitución
  alternatives_spanish:
  - para fornicación
  - con prostitución
  lexicon: sustantivo de inmoralidad sexual
  rationale: En español, «prostitución» comunica mejor la finalidad y el contexto social del pasaje que un abstracto «fornicación», y corresponde al sentido funcional del inglés POB.
- source_word: ad placendum et gloriandum
  english_pob_choice: to please and glory in
  chosen_spanish: para agradar y gloriarte
  alternatives_spanish:
  - para complacer y gloriarte
  - para agradar y jactarte
  lexicon: infinitivos de finalidad
  rationale: '«agradar» y «gloriarte» reproducen la doble finalidad del latín: buscar aceptación y vanagloria. «Gloriarte» mantiene la autoexaltación implicada en el original.'
- source_word: amatoribus
  english_pob_choice: your lovers
  chosen_spanish: tus amantes
  alternatives_spanish:
  - tus amadores
  - los que te aman
  lexicon: sustantivo relacional
  rationale: «amantes» es el equivalente español más directo y preserva la relación ilícita/erótica sugerida por el contexto, sin suavizarla.
theological_decisions:
- issue: Tono profético de lamento y juicio
  english_pob_reading: Woe to you, miserable one
  chosen_spanish_reading: ¡Ay de ti, miserable!
  alternative_spanish_readings:
  - ¡Ay de ti, desdichada!
  - ¡Ay de ti, infeliz!
  rationale: La exclamación mantiene el género profético-judicial del texto y no lo reduce a una mera pena humana; «miserable» conserva el registro condenatorio del inglés auditado.
  doctrine_reference: tono profético de juicio en literatura bíblica
- issue: Finalidad sexual y social del adorno de las hijas
  english_pob_reading: adorned your daughters for prostitution, to please and glory in your lovers
  chosen_spanish_reading: adornaste a tus hijas para la prostitución, para agradar y gloriarte en tus amantes
  alternative_spanish_readings:
  - adornaste a tus hijas para fornicación, para complacer y jactarte en tus amantes
  - adornaste a tus hijas para la prostitución, para complacer y gloriarte en tus amantes
  rationale: 'La formulación conserva la finalidad doble: complacencia y ostentación ante los amantes. No suaviza el reproche moral ni introduce categorías doctrinales ajenas al texto.'
  doctrine_reference: ética bíblica sobre inmoralidad sexual y juicio
- issue: Ausencia de adiciones interpretativas
  english_pob_reading: Woe to you, miserable one, because you made yourself like her and adorned your daughters for prostitution, to please and glory in your lovers.
  chosen_spanish_reading: ¡Ay de ti, miserable, porque te hiciste semejante a ella y adornaste a tus hijas para la prostitución, para agradar y gloriarte en tus amantes!
  alternative_spanish_readings:
  - ¡Ay de ti, miserable, porque te hiciste como ella y engalanaste a tus hijas para la prostitución, para complacer y gloriarte en tus amantes!
  rationale: Se omiten ampliaciones no atestiguadas en el latín recibido, manteniendo el alcance exacto del pasaje y su dureza retórica.
  doctrine_reference: principio de suficiencia textual
translation_notes:
  revision_awareness: La redacción sigue el texto latino limpio de Bensly (1895) con el Fragmento Perdido de Bensly (1875) y se alinea con la revisión del inglés POB que capitalizó el inicio y eliminó la expansión no atestiguada «who always desired you». No se introducen contenidos ausentes del latín base.
  spanish_consistency_notes:
  - Se mantiene el tuteo singular, coherente con el «tibi» latino y con el inglés «you».
  - Se conserva el registro solemne y acusatorio, evitando un español excesivamente ornamental o eufemístico.
  - «Lovers» se vierte como «amantes» para mantener la carga relacional y moral del pasaje.
