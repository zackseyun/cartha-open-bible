base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/047.yaml
  text: Woe to you, miserable one, because you made yourself like her and adorned your daughters for prostitution, to please and glory in your lovers.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:53:12Z'
