translation:
  language: es
  text: del sur y del norte, y otra parte del occidente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: a meridiano
  english_pob_choice: from the south
  chosen_spanish: del sur
  alternatives_spanish:
  - desde el sur
  - de la parte del sur
  lexicon: meridiano > sur
  rationale: El latín meridiano designa la zona del mediodía y, por extensión geográfica, el sur. La frase española natural y fiel es 'del sur', que conserva la dirección sin calco innecesario.
- source_word: et septentrione
  english_pob_choice: from the north
  chosen_spanish: y del norte
  alternatives_spanish:
  - y desde el norte
  - y de la parte del norte
  lexicon: septentrio > norte
  rationale: Septentrione corresponde a 'norte'. Mantengo la coordinación simple y paralela con la primera mitad de la línea para reflejar el ritmo del original.
- source_word: portio alia
  english_pob_choice: another part
  chosen_spanish: otra parte
  alternatives_spanish:
  - una parte más
  - otra porción
  lexicon: portio alia > otra parte
  rationale: Portio alia significa literalmente 'otra porción/parte'. 'Otra parte' es la opción más clara y sobria en español, sin añadir matices interpretativos.
- source_word: ab occidente
  english_pob_choice: from the west
  chosen_spanish: del occidente
  alternatives_spanish:
  - desde el occidente
  - del oeste
  lexicon: occidens > occidente/oeste
  rationale: El latín usa occidente, y el español lo conserva bien como 'occidente'. Aunque 'oeste' es igualmente válido, 'occidente' mantiene más de cerca el registro léxico del original latino.
translation_notes:
  revision_awareness: 'La revisión más reciente indica ''unchanged: true'' y acuerdo alto con la traducción inglesa POB; por ello no se introdujeron variantes textuales ni notas críticas adicionales.'
  spanish_consistency_notes:
  - 'Se conservó la estructura coordinada del latín: tres miembros unidos por ''y''.'
  - No se usó una traducción eclesiástica o parafrástica; el verso es puramente geográfico y no presenta tensión doctrinal que requiera aclaración.
  - Se prefirió 'occidente' para mantener la correspondencia con el latín, aunque 'oeste' sería idiomático en español moderno.
