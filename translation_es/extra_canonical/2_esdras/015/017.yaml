translation:
  language: es
  text: Porque un hombre deseará ir a una ciudad y no podrá[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Un hombre deseará ir a una ciudad y no podrá».'
