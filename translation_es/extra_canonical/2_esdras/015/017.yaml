lexical_decisions:
- source_word: concupiscet enim
  english_pob_choice: For a man will desire
  chosen_spanish: Porque un hombre deseará
  alternatives_spanish:
  - Pues un hombre deseará
  - Porque el hombre deseará
  lexicon: Latin concupiscet; enim
  rationale: Conservo la fuerza explicativa de enim con «Porque», siguiendo la revisión que restituyó el enlace lógico con el versículo anterior. «Deseará» representa concupiscet sin intensificarlo innecesariamente; «un hombre» mantiene el valor indefinido del sujeto.
- source_word: homo
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - el hombre
  - una persona
  lexicon: Latin homo
  rationale: El latín usa un sustantivo indefinido y genérico. «Un hombre» reproduce ese carácter general sin convertirlo en un sujeto colectivo ni neutro excesivo.
- source_word: in civitatem ire
  english_pob_choice: to go into a city
  chosen_spanish: entrar en una ciudad
  alternatives_spanish:
  - ir a una ciudad
  - ir dentro de una ciudad
  lexicon: Latin in + civitatem + ire
  rationale: «Entrar en una ciudad» expresa con naturalidad el movimiento de ingreso que comunica in...ire en español bíblico moderno, mejor que un calco menos idiomático.
- source_word: non poterit
  english_pob_choice: will not be able
  chosen_spanish: no podrá
  alternatives_spanish:
  - no será capaz
  - no podrá hacerlo
  lexicon: Latin posse
  rationale: «No podrá» es la correspondencia más directa y sobria para non poterit, manteniendo la generalidad de la imposibilidad sin añadir objeto explícito.
translation_notes:
  revision_awareness: La revisión más reciente corrigió la omisión de «for/porque» en el inglés; por eso la traducción española también la conserva para mantener la conexión argumentativa del latín enim. No se introducen otros cambios respecto del sentido del texto latino limpio.
  spanish_consistency_notes:
  - Se mantiene «ciudad» para civitatem, sin capitalización ni especificación histórica añadida.
  - No se usa «SEÑOR» ni terminología confesional ajena porque el versículo no contiene léxico divino.
  - La nota alternativa refleja la ambigüedad del sujeto en el latín y coincide con el rastro auditado del inglés.
