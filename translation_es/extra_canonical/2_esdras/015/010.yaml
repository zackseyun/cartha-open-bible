revisions:
- from: He aquí, mi pueblo es llevado como un rebaño al degüello. Ya no permitiré que habite en la tierra de Egipto,
  to: He aquí, mi pueblo está siendo llevado como un rebaño a la matanza. Ya no permitiré que habite en la tierra de Egipto,
  rationale: Se hace una reparación menor para mejorar la naturalidad verbal de «ducitur» y mantener coherencia con el singular colectivo «mi pueblo ... habite». También se opta por «a la matanza» como formulación más natural y ampliamente inteligible en español bíblico contemporáneo, sin pérdida de fuerza semántica frente a «ad occisionem».
