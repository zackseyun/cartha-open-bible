translation:
  language: es
  text: He aquí, mi pueblo está siendo llevado como un rebaño a la matanza. Ya no permitiré que habite en la tierra de Egipto,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ecce
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mirad
  - Miren
  lexicon: --
  rationale: «ecce» introduce una llamada de atención solemne; «He aquí» conserva ese valor bíblico y resulta natural en español culto.
- source_word: populus meus
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi nación
  lexicon: --
  rationale: «populus meus» es la expresión directa de pertenencia pactual; «mi pueblo» la reproduce con fidelidad y claridad.
- source_word: quasi grex
  english_pob_choice: like a flock
  chosen_spanish: como un rebaño
  alternatives_spanish:
  - como un hato
  - como un grey
  lexicon: --
  rationale: «grex» designa un rebaño de animales; «rebaño» es el equivalente español más natural y preciso.
- source_word: ad occisionem
  english_pob_choice: to the slaughter
  chosen_spanish: al degüello
  alternatives_spanish:
  - a la matanza
  - al sacrificio
  lexicon: --
  rationale: La frase latina apunta a matanza violenta; «degüello» conserva la fuerza imagética y el carácter crudo del original mejor que un término más general.
- source_word: iam non patiar
  english_pob_choice: I will no longer allow
  chosen_spanish: Ya no permitiré
  alternatives_spanish:
  - No volveré a permitir
  - Ya no sufriré
  lexicon: --
  rationale: «patiar» aquí tiene el sentido de tolerar/permitir; «Ya no permitiré» expresa adecuadamente la negativa futura sin añadir matiz ajeno.
- source_word: illum
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - a ese pueblo
  lexicon: --
  rationale: El latino singular colectivo se vierte naturalmente al plural en español por concordancia con «mi pueblo».
- source_word: habitare
  english_pob_choice: dwell
  chosen_spanish: habite
  alternatives_spanish:
  - more
  - permanezca
  lexicon: --
  rationale: «habitare» significa residir o habitar; «habite» conserva la relación verbal directa con el original y el registro bíblico.
- source_word: terra Aegypti
  english_pob_choice: land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - el país de Egipto
  - la tierra egipcia
  lexicon: --
  rationale: La fórmula territorial se mantiene literalmente porque el texto usa una designación geográfica-teológica estable.
theological_decisions:
- issue: Imagen de juicio mediante conducción al sacrificio
  english_pob_reading: being led like a flock to the slaughter
  chosen_spanish_reading: es llevado como un rebaño al degüello
  alternative_spanish_readings:
  - es conducido como un rebaño a la matanza
  - va como un rebaño al sacrificio
  rationale: La imagen comunica vulnerabilidad y juicio. «Degüello» conserva la violencia concreta sugerida por el latín «occisionem» sin suavizarla ni convertirla en una metáfora menos intensa.
  doctrine_reference: Juicio divino sobre el pueblo; lenguaje profético de condena.
- issue: Negación divina de permanencia en Egipto
  english_pob_reading: I will no longer allow them to dwell in the land of Egypt
  chosen_spanish_reading: Ya no permitiré que habite en la tierra de Egipto
  alternative_spanish_readings:
  - Ya no los dejaré habitar en la tierra de Egipto
  - No permitiré más que permanezcan en la tierra de Egipto
  rationale: El latín usa «non patiar» con sentido de no tolerar/no permitir. Se conserva la decisión divina de expulsar o impedir residencia; se mantiene el singular colectivo del latino con sujeto implícito de pueblo.
  doctrine_reference: Soberanía divina en el juicio y en la delimitación del lugar de residencia del pueblo.
translation_notes:
  revision_awareness: La revisión más reciente indicó 'No changes needed' y el cotejo cruzado fue de alta concordancia; por eso se conserva la estructura semántica del testimonio latino y la lectura inglesa auditada, sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto solo cuando el texto fuente lo requiere explícitamente; en este versículo no aparece el nombre divino, por lo que no se usa.
  - Se preserva el tono profético solemne con «He aquí» y el futuro negativo «Ya no permitiré».
  - «Rebaño» y «degüello» sostienen la crudeza de la imagen sin añadir interpretación doctrinal extra.
  - La cláusula final queda abierta con coma, siguiendo el texto fuente incompleto y la puntuación del inglés auditado.
