translation:
  language: es
  text: Y tú[a], Asia, compañera en el esplendor de Babilonia y en la gloria de su persona—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La invocación a Asia como compañera de Babilonia refleja un estrato composicional distinto del núcleo judío de 4 Esdras. La retórica aquí pertenece al apéndice latino cristiano posterior comúnmente llamado 6 Esdras.
    reason: compositional_layer
lexical_decisions:
- source_word: Et tu Asia
  english_pob_choice: And you, Asia
  chosen_spanish: Y tú, Asia
  alternatives_spanish:
  - Y tú, Asia región
  - Y tú, Asia provincia
  lexicon: 'Latín: et / tu / Asia'
  rationale: Conservo la vocación directa del latín con «Y tú»; «Asia» se mantiene como nombre geográfico propio, sin añadir glosa que el texto no ofrece.
- source_word: consors
  english_pob_choice: partner
  chosen_spanish: compañera
  alternatives_spanish:
  - partícipe
  - soc ia
  - copartícipe
  lexicon: 'Latín: consors'
  rationale: «Compañera» transmite la idea de participación compartida y relación asociada con tono natural en español. Evita «socia» por su registro comercial moderno y «partícipe» por sonar más abstracto que el latín en esta invocación.
- source_word: in specie Babylonis
  english_pob_choice: in the splendor of Babylon
  chosen_spanish: en el esplendor de Babilonia
  alternatives_spanish:
  - en la apariencia de Babilonia
  - en la belleza de Babilonia
  lexicon: 'Latín: in specie Babylonis'
  rationale: Sigo la decisión inglesa de tomar «specie» en sentido de esplendor/majestad visible, no de mera «apariencia» engañosa. «Esplendor» mantiene la fuerza retórica y la naturalidad española.
- source_word: gloria personae
  english_pob_choice: the glory of her person
  chosen_spanish: la gloria de su persona
  alternatives_spanish:
  - el esplendor de su persona
  - la gloria de su figura
  lexicon: 'Latín: gloria personae'
  rationale: «Persona» conserva la referencia al carácter o presencia personal del texto latino y sigue de cerca la formulación auditada en inglés. Mantengo «gloria» para no diluir la intensidad laudatoria.
theological_decisions:
- issue: Address to Asia as a symbolic partner of Babylon
  english_pob_reading: The address to Asia as Babylon's partner reflects a compositional layer distinct from the Jewish core of 4 Ezra. The rhetoric here belongs to the later Latin Christian appendix commonly called 6 Ezra.
  chosen_spanish_reading: La invocación a Asia como compañera de Babilonia se entiende como un estrato composicional distinto del núcleo judío de 4 Esdras; la retórica pertenece al apéndice latino cristiano posterior comúnmente llamado 6 Esdras.
  alternative_spanish_readings:
  - Asia como colaboradora de Babilonia
  - Asia en complicidad con Babilonia
  rationale: Conservo la lectura de estrato composicional sin volverla doctrinalmente más precisa de lo que el contexto permite. «Compañera» mantiene la relación de alianza o asociación sin fijar demasiado el matiz moral.
  doctrine_reference: Historia textual y crítica de la composición de 4 Esdras / 6 Esdras
translation_notes:
  revision_awareness: 'Esta versión sigue la revisión aplicada que movió la relación de posesión a una construcción más natural: «in the splendor of Babylon» pasó a leerse directamente como «en el esplendor de Babilonia». No se añaden notas sin anclaje textual.'
  spanish_consistency_notes:
  - Se mantiene «Babilonia» como nombre propio, no como símbolo explicado dentro del versículo.
  - Se usa puntuación y orden natural del español sin perder la correspondencia con el latín.
  - No se introduce «Mesías», «Yahvé» ni otros términos terminológicos que no aparecen en el verso.
