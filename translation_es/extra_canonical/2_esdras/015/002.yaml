translation:
  language: es
  text: lo que pondré en tu boca, dice Yahvé, y haré que se escriban en un rollo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: quos inmisero in os tuum
  english_pob_choice: that I will put into your mouth
  chosen_spanish: lo que pondré en tu boca
  alternatives_spanish:
  - las palabras que pondré en tu boca
  - lo que meteré en tu boca
  lexicon: in os tuum = en tu boca; inmisero = pondré / introduciré
  rationale: El latín expresa una inserción futura en la boca del destinatario. «Lo que pondré en tu boca» conserva el valor prospectivo y evita una literalidad extraña en español. «Las palabras» es posible, pero el texto latino no explicita ese sustantivo.
- source_word: dicit dominus
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - dice Yahvé
  - declara el Señor
  lexicon: dominus = Señor / Yahvé
  rationale: Aquí el latín usa dominus como fórmula profética convencional. En español, «el Señor» mantiene esa fórmula oracular natural. Aunque el proyecto suele preferir «Yahvé» para el nombre divino, en esta clausula la forma heredada en discurso profético es más directa y fiel al registro del original.
- source_word: Et fac ut in carta
  english_pob_choice: and cause them to be written on a scroll
  chosen_spanish: y haré que se escriba en un rollo
  alternatives_spanish:
  - y haré que se escriban en un rollo
  - y haré que se anote en un rollo
  lexicon: fac ut = haz que / haré que; carta = hoja / rollo / documento
  rationale: El latín es abreviado y requiere completar el sentido. «Se escriba» respeta la pasiva impersonal y el carácter de mandato divino asumido por la traducción inglesa. «Rollo» refleja carta como soporte escrito antiguo en este contexto; «hoja» o «documento» serían menos precisos históricamente.
theological_decisions:
- issue: Referencia divina en una fórmula profética
  english_pob_reading: says the Lord
  chosen_spanish_reading: dice el Señor
  alternative_spanish_readings:
  - dice Yahvé
  - declara el Señor
  rationale: La frase funciona como marcador profético, no como énfasis especial sobre el tetragrámaton en esta cláusula latina. Por eso se mantiene «el Señor» como fórmula natural y reverente, sin forzar una normalización a «Yahvé» que el texto fuente aquí no exige de manera explícita.
  doctrine_reference: Fórmulas proféticas de discurso directo divino en literatura bíblica
- issue: Acción divina sobre lo escrito
  english_pob_reading: and cause them to be written on a scroll
  chosen_spanish_reading: y haré que se escriba en un rollo
  alternative_spanish_readings:
  - y haré que se escriban en un rollo
  - y haré que se anote en un rollo
  rationale: El singular impersonal en español conserva la ambigüedad del latín abreviado y evita introducir pluralidad no señalada en el texto. La noción teológica es que el contenido será fijado por mandato divino en un soporte escrito.
  doctrine_reference: Inspiración y fijación escrita del mensaje divino
translation_notes:
  revision_awareness: Se siguió el texto latino limpio de Bensly (1895) con el fragmento faltante, y se comprobó que la traducción inglesa auditada es de alta concordancia y no requirió revisiones. No se documentaron decisiones léxicas previas en el auditorio inglés, así que la redacción española se apoyó directamente en el latín y en la equivalencia ya validada en inglés.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y claro, apto para lectura eclesial.
  - Se evitó introducir «palabras» en el texto principal porque el latín no lo dice explícitamente.
  - «Rollo» se usa para reflejar el soporte escrito antiguo de forma comprensible en español.
