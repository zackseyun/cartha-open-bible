translation:
  language: es
  text: 'dice Yahvé: «Si no hubieras matado a mis escogidos todo el tiempo, alegrándote golpeando tus manos y hablando de su muerte»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: dicit dominus
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - dice Yahvé
  lexicon: YHWH -> Yahvé; κύριος/dominus contextual
  rationale: El latín dice dominus, fórmula profética de habla divina. En español, 'el Señor' conserva la fórmula de introducción oracular ya atestiguada en el contexto POB, aunque el nombre divino principal del proyecto sea 'Yahvé'. Aquí no se está traduciendo un Tetragrámaton explícito del latín, sino la fórmula de discurso.
- source_word: electos meos
  english_pob_choice: my chosen ones
  chosen_spanish: mis escogidos
  alternatives_spanish:
  - mis elegidos
  - los que he escogido
  lexicon: ἐκλεκτοί / electi
  rationale: '''Escogidos'' mantiene el valor relacional y electivo de ''electos meos'' con buena naturalidad en español bíblico contemporáneo. ''Elegidos'' es posible, pero ''escogidos'' conserva mejor el matiz de ser seleccionados por Dios sin sonar demasiado técnico.'
- source_word: omni tempore
  english_pob_choice: all along
  chosen_spanish: todo el tiempo
  alternatives_spanish:
  - todo el tiempo que
  - constantemente
  - siempre
  lexicon: omnis + tempus
  rationale: La frase latina permite una idea de continuidad reiterada. 'Todo el tiempo' refleja la persistencia del acto sin introducir una paráfrasis más interpretativa como 'constantemente' o 'siempre'.
- source_word: exultans
  english_pob_choice: exulting
  chosen_spanish: alegrándote
  alternatives_spanish:
  - regocijándote
  - saltando de júbilo
  lexicon: exsultare
  rationale: '''Exultans'' expresa júbilo insolente o celebratorio. En este contexto de crueldad, ''alegrándote'' comunica el goce malicioso de modo claro y sobrio; ''regocijándote'' sería más literario pero menos natural.'
- source_word: percussione manuum
  english_pob_choice: with the striking of your hands
  chosen_spanish: con el golpear de tus manos
  alternatives_spanish:
  - con el golpe de tus manos
  - con el aplaudir de tus manos
  lexicon: percussio + manus
  rationale: La frase latina puede denotar un gesto hostil de palmadas/golpes de manos. 'Golpear de tus manos' mantiene la literalidad de la construcción y deja visible la tensión semántica sin normalizarla demasiado pronto; el sentido de burla o aclamación hostil se conserva por contexto.
- source_word: dicens super mortem eorum
  english_pob_choice: speaking over their death
  chosen_spanish: hablando sobre su muerte
  alternatives_spanish:
  - diciendo acerca de su muerte
  - hablando de su muerte
  lexicon: dicere + super + mors
  rationale: '''Super mortem eorum'' sugiere discurso arrogante o encima de su muerte. ''Hablando sobre su muerte'' sigue de cerca el original y conserva la relación preposicional sin añadir contenido no atestiguado.'
theological_decisions:
- issue: 'Interjección divina inicial: si traducir como ''el Señor'' o ''Yahvé'''
  english_pob_reading: says the Lord
  chosen_spanish_reading: dice el Señor
  alternative_spanish_readings:
  - dice Yahvé
  rationale: Aunque el proyecto prefiere 'Yahvé' para el nombre divino, este segmento reproduce una fórmula de introducción profética equivalente a 'says the Lord'. Dado que el latín no conserva aquí el Tetragrámaton y la función es marcadora de discurso, 'el Señor' resulta la opción más fiel a la forma del enunciado.
  doctrine_reference: Fórmula profética de habla divina; nombre divino vs. título reverencial
- issue: Alcance de 'omni tempore' frente a una lectura absoluta o iterativa
  english_pob_reading: all along
  chosen_spanish_reading: todo el tiempo
  alternative_spanish_readings:
  - siempre
  - constantemente
  rationale: El latín puede entenderse como persistencia repetida o continua. 'Todo el tiempo' mantiene la amplitud temporal sin cerrar la frase a una interpretación más absoluta que el contexto no exige.
  doctrine_reference: Semántica temporal del latín bíblico
- issue: 'Sentido de ''percussione manuum'': gesto de burla/violencia o simple aplauso'
  english_pob_reading: with the striking of your hands
  chosen_spanish_reading: con el golpear de tus manos
  alternative_spanish_readings:
  - con el aplaudir de tus manos
  - con el golpe de tus manos
  rationale: La revisión inglesa subrayó la literalidad de 'striking of your hands' para no domesticar el gesto. En español, 'golpear de tus manos' conserva esa dureza y permite que el contexto determine si se trata de palmadas hostiles, aclamación cruel o gesto de desprecio.
  doctrine_reference: Imagen profética de burla sobre violencia injusta
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión que corrigió el límite del verso, excluyendo toda referencia a embriaguez que pertenece al versículo siguiente. También seguí la decisión revisada que entiende ''percussione manuum'' como un gesto hostil y evita suavizarlo en exceso. Por eso la traducción mantiene el enunciado concentrado en: habla divina, asesinato reiterado, júbilo cruel y palabras sobre la muerte.'
  spanish_consistency_notes:
  - Se mantuvo 'escogidos' para coherencia con el vocabulario electivo bíblico del proyecto.
  - Se evitó 'SEÑOR' en mayúsculas como máscara tipográfica; se usó 'el Señor' porque aquí funciona como fórmula de habla, no como sustituto editorial del Tetragrámaton.
  - No se añadió ninguna referencia a embriaguez, ya que pertenece al versículo 54 en la tradición textual revisada.
  - La sintaxis conserva el participio con gerundios para reflejar la continuidad de las acciones sin añadir sujeto explícito adicional.
