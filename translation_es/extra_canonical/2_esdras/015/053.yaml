review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva correctamente la estructura básica del latín: ''dicit dominus'', la condición contrafactual con ''Nisi occidisses'', ''electos meos'', ''omni tempore'', ''exultans'', ''percussione manuum'' y ''dicens super mortem eorum''. Sin embargo, dos elecciones no preservan bien ni la terminología del proyecto ni la mejor lectura contextual: ''el Señor'' choca con la preferencia del proyecto por ''Yahvé'', y ''hablando sobre su muerte'' suena poco idiomático en español para ''dicens super mortem eorum''.'
  spanish_quality_summary: El español es mayormente claro, pero 'con el golpear de tus manos' resulta algo tosco y 'hablando sobre su muerte' suena calcado. Una reparación menor puede mejorar la legibilidad sin alejarse del latín. 'golpeando tus manos' o 'batiendo palmas' serían más naturales, pero para conservar la cautela de la auditoría inglesa conviene una formulación literal pero fluida. También conviene usar 'Yahvé' según la política general del proyecto, ya que no hay evidencia aquí que exija mantener la mascarilla reverencial.
  glossary_alignment: Debe alinearse mejor con la norma del proyecto de usar 'Yahvé' para el nombre divino en el texto principal. 'mis escogidos' es aceptable. 'todo el tiempo' representa bien 'omni tempore'. 'alegrándote' comunica bien 'exultans'. Para 'percussione manuum', una forma más natural en español es 'golpeando tus manos', que mantiene la imagen física sin fijarla como simple aplauso. Para 'dicens super mortem eorum', 'hablando de su muerte' preserva el sentido sin calco innecesario.
  issues:
  - severity: medium
    issue: Uso de 'el Señor' en vez de 'Yahvé'
    rationale: La guía del proyecto establece 'Yahvé' en el texto principal para יהוה/YHWH. Aunque el latín tenga 'dominus', en literatura bíblica latina esto suele representar el nombre divino en fórmulas proféticas. La justificación dada no basta para apartarse de la norma aquí.
  - severity: medium
    issue: '''hablando sobre su muerte'' es un calco poco natural'
    rationale: Aunque refleja 'super', en español bíblico y natural suena forzado. 'Hablando de su muerte' comunica fielmente el sentido sin añadir interpretación.
  - severity: low
    issue: '''con el golpear de tus manos'' suena rígido'
    rationale: No es erróneo, pero resulta menos idiomático. Una ligera mejora puede conservar la literalidad contextual de 'percussione manuum' con mejor fluidez.
  revised_spanish_text: 'dice Yahvé: «Si no hubieras matado a mis escogidos todo el tiempo, alegrándote golpeando tus manos y hablando de su muerte»'
  revision_rationale: Se corrige 'el Señor' a 'Yahvé' para ajustarse a la terminología base del proyecto en el texto principal. Se mejora la naturalidad de 'percussione manuum' con 'golpeando tus manos', que sigue siendo físicamente literal y conserva el matiz hostil sin domesticarlo como mero aplauso. Se reemplaza 'hablando sobre su muerte' por 'hablando de su muerte' para evitar un calco poco idiomático, manteniendo el sentido del latín.
