  to: 'dice Yahvé: «Si no hubieras matado a mis escogidos todo el tiempo, alegrándote golpeando tus manos y hablando de su muerte»'
  rationale: Se corrige 'el Señor' a 'Yahvé' para ajustarse a la terminología base del proyecto en el texto principal. Se mejora la naturalidad de 'percussione manuum' con 'golpeando tus manos', que sigue siendo físicamente literal y conserva el matiz hostil sin domesticarlo como mero aplauso. Se reemplaza 'hablando sobre su muerte' por 'hablando de su muerte' para evitar un calco poco idiomático, manteniendo el sentido del latín.
