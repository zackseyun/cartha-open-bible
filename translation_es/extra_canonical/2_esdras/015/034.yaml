translation:
  language: es
  text: He aquí, nubes desde el oriente y desde el norte hasta el sur, y su apariencia es muy terrible, llena de ira y de tempestad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ecce
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - He aquí que
  lexicon: interjección deíctica
  rationale: Conserva la fuerza exhortativa y de señalamiento del original sin sobrerrecrear el tono; 'He aquí' es natural en español bíblico y mantiene el valor de anuncio del latín y del inglés POB.
- source_word: nubs
  english_pob_choice: clouds
  chosen_spanish: nubes
  alternatives_spanish:
  - nubarrones
  - nubes de tormenta
  lexicon: sustantivo común
  rationale: '''Nubes'' traduce directamente el plural latino y preserva la imagen meteorológica amplia. No se especifica ''de tormenta'' en el texto base, aunque el contexto posterior añade ''tempestad''.'
- source_word: ab oriente et a septentrione usque ad meridianum
  english_pob_choice: from the east and from the north as far as the south
  chosen_spanish: desde el oriente y desde el norte hasta el sur
  alternatives_spanish:
  - desde el este y desde el norte hasta el sur
  - del oriente y del norte hasta el mediodía
  lexicon: expresión direccional
  rationale: '''Oriente'' reproduce el registro bíblico y espacial del latín. ''Hasta el sur'' mantiene la extensión de la serie direccional; ''mediodía'' sería posible, pero ''sur'' es más claro en español actual.'
- source_word: facies illorum horrida valde
  english_pob_choice: their appearance is very dreadful
  chosen_spanish: su apariencia es muy terrible
  alternatives_spanish:
  - su semblante es muy horrible
  - su aspecto es sumamente espantoso
  lexicon: sustantivo + adjetivo
  rationale: '''Apariencia'' corresponde bien a ''facies'' en un contexto de visión; ''muy terrible'' conserva la intensidad de ''horrida valde'' sin introducir matices no presentes.'
- source_word: plena irae et procellae
  english_pob_choice: full of wrath and storm
  chosen_spanish: llena de ira y de tempestad
  alternatives_spanish:
  - llena de furia y de tempestad
  - llena de ira y de tormenta
  lexicon: participio/adjetivos de plenitud
  rationale: '''Llena de'' sigue la construcción latina y la elección de ''ira'' conserva la fuerza afectiva/judicial del sustantivo. ''Tempestad'' comunica mejor que ''tormenta'' el registro bíblico y la impresión de juicio, aunque ambas son posibles.'
theological_decisions:
- issue: Imagen apocalíptica de juicio manifestada en fenómenos meteorológicos
  english_pob_reading: full of wrath and storm
  chosen_spanish_reading: llena de ira y de tempestad
  alternative_spanish_readings:
  - llena de furia y de tempestad
  - llena de ira y de tormenta
  rationale: El versículo describe una visión simbólica de juicio; la traducción mantiene la ambigüedad controlada entre fenómeno físico y carga teológica, sin explicitar más de lo que el texto dice.
  doctrine_reference: Imaginería profética/apocalíptica de juicio divino
translation_notes:
  revision_awareness: El contexto de revisión indica acuerdo alto y sin cambios necesarios; por eso se conserva la lectura inglesa POB con una formulación española directa y sobria, sin añadir notas textuales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando aparezca; aquí no hay forma divina explícita.
  - Se usa 'tempestad' para conservar el tono de juicio sin domesticar la imagen.
  - No se introduce léxico eclesiástico ajeno al texto; la frase sigue el registro visionario del pasaje.
