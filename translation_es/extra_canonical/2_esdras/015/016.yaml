base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/016.yaml
  text: For there will be instability among men; overpowering one another[a], they will pay no attention to their king or to the chief of their nobles, in their power.
  footnotes:
  - marker: a
    text: Or 'the chief men among them'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:52:46Z'
    unchanged: false
    changes_summary: Removed the unnecessary second 'nor' for smoother, more natural English while preserving the sense and completeness of the Latin.
translation:
  language: es
  text: Porque habrá inestabilidad entre los hombres; dominándose unos a otros[a], no prestarán atención a su rey ni al jefe de sus nobles, en su poder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «venciéndose unos a otros».
    reason: lexical_alternative
lexical_decisions:
- source_word: erit enim constabilitio hominibus
  english_pob_choice: For there will be instability among men
  chosen_spanish: Porque habrá inestabilidad entre los hombres
  alternatives_spanish:
  - Porque habrá desorden entre los hombres
  - Porque habrá inestabilidad para los hombres
  lexicon: constabilitio
  rationale: El latín expresa la idea de falta de estabilidad o firmeza; «inestabilidad» conserva bien el sentido y suena natural en español. «Entre los hombres» sigue el dativo/locativo general de la frase sin añadir matices no presentes.
- source_word: alisalios supervalescentes
  english_pob_choice: overpowering one another
  chosen_spanish: al sobreponerse unos a otros
  alternatives_spanish:
  - venciéndose unos a otros
  - dominándose unos a otros
  lexicon: supervalesco
  rationale: La forma compuesta sugiere prevalecer o imponerse sobre otros. «Sobreponerse» comunica la reciprocidad y el matiz de superar o imponerse mutuamente sin cargar demasiado el texto con una metáfora más fuerte que la del latín.
- source_word: non curabunt
  english_pob_choice: they will pay no attention to
  chosen_spanish: no prestarán atención a
  alternatives_spanish:
  - no cuidarán de
  - no harán caso de
  lexicon: curo
  rationale: «No prestarán atención a» reproduce adecuadamente la idea de desatender o no hacer caso, que es la fuerza idiomática del verbo aquí.
- source_word: regem suum
  english_pob_choice: their king
  chosen_spanish: su rey
  alternatives_spanish:
  - a su rey
  - el rey de ellos
  lexicon: rex
  rationale: Se mantiene el posesivo directo del latín. «Su rey» es claro y fiel al vínculo de pertenencia política.
- source_word: principem megestanorum suorum
  english_pob_choice: the chief of their nobles
  chosen_spanish: el jefe de sus nobles
  alternatives_spanish:
  - el príncipe de sus nobles
  - el principal de sus nobles
  lexicon: princeps; megestani
  rationale: La revisión inglesa ya corrigió la lectura plural errónea y dejó claro que `principem` es singular, gobernando un genitivo plural que remite a los magnates o nobles. «Jefe» evita la ambigüedad de «príncipe» en español moderno, aunque «príncipe» sigue siendo una alternativa válida más literal.
- source_word: in potentia sua
  english_pob_choice: in their power
  chosen_spanish: en su poder
  alternatives_spanish:
  - por su poder
  - dentro de su poder
  lexicon: potentia
  rationale: La expresión conserva el valor de estado o esfera de poder. «En su poder» es la forma más natural y directa en español.
theological_decisions:
- issue: Desorden social y político como rasgo del juicio o decadencia
  english_pob_reading: For there will be instability among men; overpowering one another...
  chosen_spanish_reading: Porque habrá inestabilidad entre los hombres; al sobreponerse unos a otros...
  alternative_spanish_readings:
  - Porque habrá desorden entre los hombres; ...
  - Porque habrá inestabilidad entre los hombres; dominándose unos a otros...
  rationale: El texto describe una situación de descomposición civil y jerárquica, no una doctrina abstracta. La traducción mantiene esa tensión histórica sin moralizarla ni suavizarla.
  doctrine_reference: '2 Esdras / 4 Ezra: juicio histórico y colapso del orden humano'
translation_notes:
  revision_awareness: La versión inglesa reciente ajustó la relación entre `principem` y `megestanorum` para reflejar correctamente un singular ('chief') con genitivo plural ('of their nobles'). La propuesta española sigue esa revisión y evita la antigua nivelación plural.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; aquí no hay mención directa, así que no aplica.
  - Se mantuvo «nobles» para `megestanorum` en consonancia con la revisión inglesa y con el valor de magnates/aristócratas del término latino.
  - No se introdujo puntuación interpretativa que altere la progresión causal y descriptiva del versículo.
