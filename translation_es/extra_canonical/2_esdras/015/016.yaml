review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del latín y la corrección inglesa clave de `principem megestanorum suorum` como singular: «al jefe de sus nobles». También conserva adecuadamente `non curabunt` como desatención y `in potentia sua` como «en su poder». Sin embargo, la colocación del marcador de nota en «hombres;[a]» no corresponde al elemento comentado; la nota explica `alisalios supervalescentes`, por lo que debe anclarse en esa frase. Además, «al sobreponerse unos a otros» es posible, pero suena algo reflexivo/medio en español; «dominándose unos a otros» o «venciéndose unos a otros» comunica con más claridad la acción recíproca de imponerse mutuamente. Dado que el propio borrador ya reconoce esas alternativas, conviene una reparación menor.'
  spanish_quality_summary: El español es claro y digno, pero el anclaje de la nota está mal ubicado y afecta la usabilidad editorial. La frase principal fluye bien. «Porque habrá inestabilidad entre los hombres» es natural. El segmento medio mejora con una formulación más directa para la rivalidad mutua. El resto del verso es legible y fiel.
  glossary_alignment: No hay términos del glosario mayor implicados aquí. La elección de «jefe» para `principem` frente a «príncipe» está bien justificada y es adecuada en español moderno. No hay conflictos con terminología teológica del proyecto.
  issues:
  - severity: medium
    issue: Marcador de nota mal anclado
    rationale: La nota [a] explica «al sobreponerse unos a otros», pero el marcador aparece tras «los hombres;». Según las instrucciones, el marcador exacto debe aparecer en la palabra o frase pertinente.
  - severity: low
    issue: «Al sobreponerse unos a otros» es menos natural/preciso que otras opciones ya identificadas
    rationale: En español, «sobreponerse» suele sugerir recuperarse o prevalecer, a veces sin objeto humano explícito. Para una lucha social recíproca, «dominándose unos a otros» expresa mejor `supervalescentes` sin apartarse del sentido fuente.
  revised_spanish_text: Porque habrá inestabilidad entre los hombres; dominándose unos a otros[a], no prestarán atención a su rey ni al jefe de sus nobles, en su poder.
  revised_footnotes:
  - marker: a
    text: O «venciéndose unos a otros».
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al sintagma que realmente comenta y se afina la expresión recíproca para sonar más natural y precisa en español, manteniendo el sentido del latín y la intención del inglés auditado. El resto del verso puede conservarse tal como está.
