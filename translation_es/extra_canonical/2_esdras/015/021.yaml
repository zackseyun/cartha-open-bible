base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/021.yaml
  text: 'As they have done to my chosen ones to this day[a], so I will do and repay into their lap. Thus says the Lord God:'
  footnotes:
  - marker: a
    text: Or 'so I also will do and repay into their bosom'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:52:50Z'
    unchanged: false
    changes_summary: Changed 'do' to 'have done' for more natural and accurate English with 'to this day'; otherwise retained the formal structure and wording.
translation:
  language: es
  text: 'Así como han hecho contra mis escogidos hasta hoy, así haré y les devolveré en su regazo. Así dice Yahvé Dios:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: sicut faciunt usque hodie
  english_pob_choice: As they have done to my chosen ones to this day
  chosen_spanish: Así como han hecho a mis escogidos hasta hoy
  alternatives_spanish:
  - Así como han hecho a mis elegidos hasta hoy
  - Así como han obrado contra mis escogidos hasta hoy
  lexicon: sicut / faciunt / usque hodie
  rationale: 'El latín expresa una comparación temporal continua: ''así como... hasta hoy''. ''Han hecho'' conserva el perfecto con valor actual hasta el presente; ''escogidos'' mantiene el término bíblico directo para electi sin introducir matices adicionales.'
- source_word: electis meis
  english_pob_choice: my chosen ones
  chosen_spanish: mis escogidos
  alternatives_spanish:
  - mis elegidos
  - mis seleccionados
  lexicon: electus
  rationale: '''Escogidos'' es la forma natural en español para electi y mantiene la carga bíblica sin perder claridad. ''Elegidos'' también sería posible, pero ''escogidos'' suena un poco más estable para un sustantivo plural de grupo.'
- source_word: sic faciam et reddam
  english_pob_choice: so I will do and repay
  chosen_spanish: así haré yo y les pagaré
  alternatives_spanish:
  - así haré y recompensaré
  - así actuaré y les devolveré
  lexicon: sic / faciam / reddam
  rationale: '''Haré yo'' conserva la fuerza enfática del latín sin añadir ''también'', que no está en el texto. ''Pagaré'' transmite bien la idea retributiva de reddam en este contexto; ''recompensaré'' es posible, pero menos literal al imagen de devolución.'
- source_word: in sinum ipsorum
  english_pob_choice: into their lap
  chosen_spanish: en su regazo
  alternatives_spanish:
  - en su falda
  - en su seno
  lexicon: sinus
  rationale: '''Sinus'' aquí designa el pliegue del vestido o el lugar donde se recoge algo, no ''bosom'' en sentido moderno. ''Regazo'' preserva la imagen de una medida recibida en el propio pliegue/recipiente corporal; ''seno'' podría sonar más abstracto o afectivo en español actual.'
- source_word: haec dicit Dominus Deus
  english_pob_choice: Thus says the Lord God
  chosen_spanish: Así dice Yahvé Dios
  alternatives_spanish:
  - Así dice el Señor Dios
  - Estas cosas dice Yahvé Dios
  lexicon: Dominus Deus
  rationale: Siguiendo el criterio del proyecto, 'Dominus' que traduce el nombre divino se vierte como 'Yahvé'. 'Dios' conserva la combinación solemne del latín 'Dominus Deus' sin sustituirla por una fórmula litúrgica distinta.
theological_decisions:
- issue: Uso del nombre divino en la fórmula profética
  english_pob_reading: Thus says the Lord God
  chosen_spanish_reading: Así dice Yahvé Dios
  alternative_spanish_readings:
  - Así dice el Señor Dios
  - Así dice Yahvé, Dios
  rationale: El texto latino presenta 'Dominus Deus' como fórmula de autoridad profética. Conforme al criterio del proyecto, el nombre divino no debe enmascararse como 'SEÑOR'; por eso se usa 'Yahvé' en lugar de una sustitución convencional.
  doctrine_reference: Éxodo 3:15; convención textual del POB para el Tetragrámaton
- issue: Imagen retributiva de 'in sinum ipsorum'
  english_pob_reading: repay into their lap
  chosen_spanish_reading: les pagaré en su regazo
  alternative_spanish_readings:
  - les pagaré en su seno
  - les devolveré en su regazo
  rationale: La metáfora conserva la retribución medida y tangible. 'Regazo' permite entender la imagen física sin perder la referencia al recipiente del vestido; no se espiritualiza ni se vuelve una simple idea de interioridad.
  doctrine_reference: Principio de retribución poética/profética; cf. Lucas 6:38 como paralelismo conceptual
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que corrigió 'bosom' a 'lap' por fidelidad a 'sinus' como imagen concreta. En español se siguió esa misma solución con 'regazo', evitando tanto el calco literal como una abstracción que borre la metáfora física. También se evitó añadir equivalentes no atestiguados como 'también'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según el estándar del proyecto para el nombre divino.
  - '''Escogidos'' conserva la terminología bíblica del grupo elegido.'
  - No se añadió nota al pie porque la versión española no requiere una alternativa textual anclada adicional.
