- from: He aquí una visión terrible, y su faz es desde el oriente.
  to: He aquí una visión terrible, y su faz viene del oriente.
  rationale: Se mantiene la correspondencia léxica principal con el latín y con la revisión inglesa que prefirió «face/facies», pero se reemplaza «es desde» por «viene del» para lograr un español natural y claro sin añadir interpretación. «Oriente» y «faz» se conservan por fidelidad formal y registro bíblico.
