review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el latín: ecce = «He aquí», visio horribilis = «una visión terrible», facies = «faz», ab oriente = procedencia desde el oriente. Sin embargo, «su faz es desde el oriente» suena poco natural en español y no refleja tan bien una construcción de procedencia como podría hacerlo «viene del oriente».'
  spanish_quality_summary: 'El texto es mayormente fiel y de buen registro bíblico. La principal dificultad es la naturalidad sintáctica: «es desde» resulta forzado en español moderno, incluso en registro elevado. «Faz» es defendible por cercanía léxica y tono, pero conviene ajustar el verbo para legibilidad sin perder literalidad.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «He aquí», «visión», «terrible», «faz» y «oriente» son compatibles con el estilo requerido. La revisión propuesta mantiene la decisión documentada de conservar «face/facies» mediante «faz».
  issues:
  - severity: medium
    issue: Construcción «su faz es desde el oriente» poco natural en español
    rationale: Aunque calca de cerca el inglés y el latín, en español la combinación de «ser» + «desde» suena rígida y poco idiomática. «Su faz viene del oriente» conserva la idea de procedencia y mejora notablemente la legibilidad.
  revised_spanish_text: He aquí una visión terrible, y su faz viene del oriente.
  revision_rationale: Se mantiene la correspondencia léxica principal con el latín y con la revisión inglesa que prefirió «face/facies», pero se reemplaza «es desde» por «viene del» para lograr un español natural y claro sin añadir interpretación. «Oriente» y «faz» se conservan por fidelidad formal y registro bíblico.
