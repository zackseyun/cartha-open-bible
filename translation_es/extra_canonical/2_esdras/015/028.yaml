  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece en el texto fuente.
  - Se prefirió 'faz' para conservar el registro formal y la correspondencia léxica con facies.
  - No se añadieron notas de pie porque el segmento es breve y no presenta variantes textuales o ambigüedades que requieran anclaje explícito en español.
