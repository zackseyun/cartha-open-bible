lexical_decisions:
- source_word: ecce
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - He aquí
  lexicon: ecce
  rationale: He aquí mantiene la fuerza de deíxis y llamado de atención del original y del inglés POB, con un registro bíblico natural en español.
- source_word: visio horribilis
  english_pob_choice: a dreadful vision
  chosen_spanish: una visión terrible
  alternatives_spanish:
  - una visión espantosa
  - una visión horrible
  lexicon: visio
  rationale: Visión corresponde de manera directa a visio; terrible conserva el valor intensivo de horribilis sin cargar demasiado con el matiz moral de 'horrible' en español actual.
- source_word: facies
  english_pob_choice: face
  chosen_spanish: faz
  alternatives_spanish:
  - rostro
  - cara
  - faz
  lexicon: facies
  rationale: Faz preserva la correspondencia formal y el registro bíblico elevado para facies, tal como el POB inglés ajustó appearance a face para acercarse al latín.
- source_word: ab oriente
  english_pob_choice: from the east
  chosen_spanish: desde el oriente
  alternatives_spanish:
  - del oriente
  - desde el este
  lexicon: oriens
  rationale: Oriente reproduce el término direccional con tono más literario y bíblico que 'este'; 'desde' conserva el sentido de procedencia espacial del latín.
theological_decisions:
- issue: Tono profético/apocalíptico de la visión
  english_pob_reading: a dreadful vision
  chosen_spanish_reading: una visión terrible
  alternative_spanish_readings:
  - una visión espantosa
  - una visión horrible
  rationale: No se introduce interpretación adicional; se mantiene el impacto ominoso del enunciado profético sin explicitar más de lo que el latín dice.
  doctrine_reference: Apocalíptica/visión profética; sin afirmación doctrinal añadida
- issue: Dirección simbólica de 'oriente'
  english_pob_reading: its face is from the east
  chosen_spanish_reading: su faz es desde el oriente
  alternative_spanish_readings:
  - su faz viene del oriente
  - su faz está en el oriente
  rationale: Se conserva la ambigüedad espacial del latín y del inglés POB sin convertir el oriente en símbolo teológico explícito, ya que el texto no lo desarrolla.
  doctrine_reference: Lectura literal del indicador direccional; sin alegorización
translation_notes:
