translation:
  language: es
  text: A tus hijos los llevarán cautivos, y tu riqueza la tomarán como botín.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Filios tuos
  english_pob_choice: Your children
  chosen_spanish: A tus hijos
  alternatives_spanish:
  - Tus hijos
  - A tus hijos,
  lexicon: filius
  rationale: El latín presenta el objeto directo como destino de la acción; en español, la preposición 'a' mantiene la referencia personal y el valor de víctima/captura sin añadir interpretación.
- source_word: captiuos ducent
  english_pob_choice: they will carry away captive
  chosen_spanish: los llevarán cautivos
  alternatives_spanish:
  - los llevarán presos
  - los harán cautivos
  lexicon: captivus / duco
  rationale: '''Llevarán cautivos'' conserva la idea de deportación forzada y cautiverio, equivalente al giro inglés y más natural que un calco rígido.'
- source_word: censum tuum
  english_pob_choice: your wealth
  chosen_spanish: tu riqueza
  alternatives_spanish:
  - tus bienes
  - tu hacienda
  - tu patrimonio
  lexicon: census
  rationale: Aunque 'census' puede sugerir 'censo', el contexto de saqueo exige el sentido de bienes/riqueza; 'riqueza' refleja bien la pérdida material anunciada.
- source_word: censum tuum ... take as spoil
  english_pob_choice: they will take as spoil
  chosen_spanish: la tomarán como botín
  alternatives_spanish:
  - la saquearán
  - se la llevarán como botín
  lexicon: spolium / praeda
  rationale: '''Tomar como botín'' preserva el matiz de saqueo militar y mantiene la relación con el sustantivo implícito ''botín'' del contexto.'
theological_decisions:
- issue: Violencia de juicio y deportación
  english_pob_reading: Your children they will carry away captive, and your wealth they will take as spoil
  chosen_spanish_reading: A tus hijos los llevarán cautivos, y tu riqueza la tomarán como botín.
  alternative_spanish_readings:
  - Tus hijos serán llevados cautivos, y tu riqueza será tomada como botín.
  - Llevarán cautivos a tus hijos, y saquearán tu riqueza.
  rationale: Se conserva la profecía de juicio en voz activa impersonal, cercana al inglés POB y al latín, sin atenuar la dureza del anuncio.
  doctrine_reference: Profecía de juicio; deportación y saqueo como consecuencias del castigo divino en 2 Esdras.
translation_notes:
  revision_awareness: La traducción sigue de cerca el latín limpio proporcionado y concuerda con la auditoría inglesa de alta concordancia; no se registran revisiones aplicadas ni variantes textuales relevantes en este versículo.
  spanish_consistency_notes:
  - Se mantiene el tono profético y directo.
  - '''Cautivos'' conserva el sentido de captura/deportación, no solo de prisión temporal.'
  - '''Riqueza'' evita el falso amigo ''censo'' y expresa el valor material saqueado.'
