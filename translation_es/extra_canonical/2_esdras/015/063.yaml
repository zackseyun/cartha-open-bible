translation:
  language: es
  text: y tendrán botín y destruirán la gloria de tu rostro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: praeda habebunt
  english_pob_choice: they will have plunder
  chosen_spanish: tendrán botín
  alternatives_spanish:
  - obtendrán botín
  - tendrán saqueo
  lexicon: praeda -> botín; habebunt -> tendrán
  rationale: El latín expresa posesión/resultadо con habebunt y el sustantivo praeda con el campo semántico de botín o presa. «Tendrán botín» conserva la fuerza breve del original y evita añadir matices no presentes.
- source_word: exterminabunt
  english_pob_choice: wipe out
  chosen_spanish: destruirán
  alternatives_spanish:
  - arrasarán
  - aniquilarán
  - borrarán
  lexicon: extermino, exterminare -> destruir, arrasar, aniquilar
  rationale: El verbo latino puede sugerir devastación total. «Destruirán» es claro en español y mantiene la intensidad sin forzar un matiz más técnico que el contexto no exige.
- source_word: gloriam faciei tuae
  english_pob_choice: the glory of your face
  chosen_spanish: la gloria de tu rostro
  alternatives_spanish:
  - el resplandor de tu rostro
  - la gloria de tu faz
  lexicon: gloria -> gloria; facies -> rostro/faz
  rationale: Se conserva la metáfora literal del latín. «Rostro» es más natural en español actual que «faz», y mantiene la relación directa entre gloria y rostro sin suavizarla.
theological_decisions:
- issue: Imagen de 'la gloria de tu rostro'
  english_pob_reading: the glory of your face
  chosen_spanish_reading: la gloria de tu rostro
  alternative_spanish_readings:
  - el resplandor de tu rostro
  - la gloria de tu faz
  rationale: No se interpreta alegóricamente la expresión. La traducción preserva la imagen corporal/metafórica tal como aparece en el latín, evitando explicitar una equivalencia teológica no expresada en el texto.
  doctrine_reference: Imaginería antropomórfica bíblica; no se añade glosa doctrinal.
translation_notes:
  revision_awareness: El contexto inglés fue revisado para recuperar la cláusula omitida de 'praeda habebunt' como 'they will have plunder'. La versión española incorpora esa corrección con 'tendrán botín' y mantiene la segunda cláusula con un equivalente directo de 'wipe out'.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y bíblico, pero con español natural.
  - No se introdujo 'SEÑOR' ni otras convenciones no presentes en el texto fuente.
  - Se preservó la metáfora literal 'rostro' porque el latín la emplea explícitamente.
