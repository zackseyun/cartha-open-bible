source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: exsurget ardor qui emissus est super te. Et infirmaberis et paupera a plaga et mastigata a uulneribus, ut non possis tuos
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/051.yaml
  text: The burning that has been sent out against you will rise up[a], and you will be weakened and made poor by the blow, and scourged by wounds, so that you will not be able to receive your own.
  footnotes:
  - marker: a
    text: Or 'poor from the plague'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:53:18Z'
    unchanged: false
    changes_summary: Restored the omitted opening clause ('The burning that has been sent out against you will rise up'), replaced interpretive 'wretched' with the more literal 'made poor,' rendered plaga more accurately as 'blow,' and removed the unsupported addition 'your mighty ones and your lovers,' leaving the final phrase as the incomplete but faithful 'receive your own.'
translation:
  language: es
  text: El ardor que ha sido enviado contra ti se levantará[a], y quedarás debilitada y empobrecida por el golpe, y azotada con heridas, de modo que no podrás recibir lo tuyo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la llama que ha sido enviada contra ti se levantará».
    reason: alternative_reading
lexical_decisions:
- source_word: exsurget ardor
  english_pob_choice: The burning that has been sent out against you will rise up
  chosen_spanish: El ardor que ha sido enviado contra ti se levantará
  alternatives_spanish:
  - La llama que ha sido enviada contra ti se levantará
  - El incendio que ha sido enviado contra ti se levantará
  lexicon: ardor
  rationale: ‘Ardor’ conserva la idea de fuego/ardor enviada como juicio sin imponer una especificación no atestiguada como ‘llama’ o ‘incendio’. ‘Se levantará’ sigue el valor de exsurget en español natural.
- source_word: emissus est super te
  english_pob_choice: has been sent out against you
  chosen_spanish: ha sido enviado contra ti
  alternatives_spanish:
  - ha sido lanzado sobre ti
  - ha sido enviado sobre ti
  lexicon: emitto
  rationale: La imagen es de algo emitido o enviado hacia la persona. ‘Contra ti’ comunica mejor la hostilidad explícita del contexto que un simple ‘sobre ti’.
- source_word: infirmaberis
  english_pob_choice: you will be weakened
  chosen_spanish: quedarás debilitada
  alternatives_spanish:
  - serás debilitada
  - te debilitarás
  lexicon: infirmo
  rationale: ‘Quedarás debilitada’ suena natural en español y preserva el matiz pasivo de estar reducida a debilidad.
- source_word: paupera a plaga
  english_pob_choice: made poor by the blow
  chosen_spanish: empobrecida por el golpe
  alternatives_spanish:
  - hecha pobre por el golpe
  - miserable por el golpe
  lexicon: pauper
  rationale: Se conserva el sentido de pérdida/empobrecimiento sin transformar ‘paupera’ en pobreza económica literal moderna. ‘Por el golpe’ refleja mejor plaga como ‘golpe’ o ‘azote’ que como ‘plaga’ en sentido de enfermedad.
- source_word: mastigata a uulneribus
  english_pob_choice: scourged by wounds
  chosen_spanish: azotada con heridas
  alternatives_spanish:
  - azotada por heridas
  - castigada con heridas
  lexicon: mastigo
  rationale: ‘Azotada’ reproduce la fuerza de la flagelación; ‘con heridas’ mantiene el vínculo con uulneribus sin suavizar la imagen. ‘Con’ evita una causalidad extraña en español si se tradujera literalmente ‘por’.
- source_word: ut non possis tuos
  english_pob_choice: so that you will not be able to receive your own
  chosen_spanish: de modo que no podrás recibir lo tuyo
  alternatives_spanish:
  - de modo que no podrás recibir a los tuyos
  - de modo que no podrás recibir los tuyos
  lexicon: tuus
  rationale: El latín termina de forma incompleta. ‘Lo tuyo’ respeta la literalidad mínima del miembro final sin añadir un objeto personal no explícito. Se evita interpretar como ‘los tuyos’ porque el texto transmitido no lo especifica.
theological_decisions:
- issue: Naturaleza del castigo descrito como ardor, golpe, azotes y heridas
  english_pob_reading: The burning ... will rise up, and you will be weakened and made poor by the blow, and scourged by wounds
  chosen_spanish_reading: El castigo se conserva como una secuencia de imágenes de juicio físico y aflicción, sin convertirlas en metáfora moral abstracta
  alternative_spanish_readings:
  - El fuego del juicio vendrá sobre ti
  - Serás afligida por enfermedad
  rationale: El texto latino presenta imaginería concreta de juicio corporal/aflictivo. Mantener ardor, golpe, azotada y heridas preserva la tensión textual y evita espiritualizar el pasaje.
  doctrine_reference: Juicio divino; castigo corporal en literatura apocalíptica
- issue: Traducción del cierre incompleto 'tuos'
  english_pob_reading: so that you will not be able to receive your own
  chosen_spanish_reading: de modo que no podrás recibir lo tuyo
  alternative_spanish_readings:
  - de modo que no podrás recibir a los tuyos
  - de modo que no podrás recibir tus bienes
  rationale: El cierre es sintácticamente elíptico en la tradición latina conservada. ‘Lo tuyo’ mantiene la ambigüedad y no cierra artificialmente una frase incompleta.
  doctrine_reference: Crítica textual y cautela ante pasajes transmitidos de forma fragmentaria
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente que restituye el miembro inicial omitido ('The burning that has been sent out against you will rise up'), corrige 'plaga' hacia 'blow'/'golpe' y elimina expansiones no sustentadas al final. Por eso el español conserva el arranque con ardor, usa 'golpe' para plaga y deja el cierre breve e incompleto como en el testimonio latino.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa ‘ardor’ para conservar la imaginería de fuego/juicio sin introducir 'fuego' donde el latín dice 'ardor'.
  - Se evita 'plaga' en español porque aquí la revisión crítica favorece el sentido de 'golpe/azote'.
