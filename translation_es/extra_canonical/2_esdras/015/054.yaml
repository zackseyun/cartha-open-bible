review_pass:
  verdict: revise
  source_alignment_summary: 'La base latina está en general bien representada: la pregunta inicial, el imperativo de adorno, la imagen del salario de una ramera en el seno y la consecuencia de recibir retribución. Sin embargo, «¿Cuándo te embriagaste?» debilita el matiz pasivo de inebriata es («fuiste embriagada / quedaste embriagada») presente en la fuente y conservado en el inglés auditado («were you made drunk»). Además, «recibirás el pago» suena menos preciso que una retribución/devolución, dado redditionem recipies.'
  spanish_quality_summary: El borrador es legible y digno, con buen registro bíblico. «Adorna la hermosura de tu rostro» funciona bien. «Ramera» y «seno» son adecuados al contexto. No obstante, conviene ajustar la primera cláusula para reflejar mejor la pasividad del latín y afinar la última para expresar retribución más claramente en español.
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. La personificación femenina se preserva correctamente. La decisión de traducir fornicariae como persona («ramera») en lugar de abstracción es acertada y coherente con la auditoría inglesa.
  issues:
  - severity: medium
    issue: La voz de «cum inebriata es?» quedó demasiado activa en español.
    rationale: El latín usa participio pasivo/perfecto con «es», y el inglés POB lo reflejó con «were you made drunk». «¿Cuándo te embriagaste?» es natural, pero desplaza el foco hacia una acción reflexiva/activa no explicitada en la fuente.
  - severity: low
    issue: «Recibirás el pago» atenúa el valor de retribución en «redditionem recipies».
    rationale: «Pago» no es erróneo, pero «retribución» o «repago» comunica mejor la idea de devolución o compensación debida, en paralelo con la acusación profética.
  - severity: low
    issue: La nota al pie alternativa reproduce una segmentación inglesa previa poco clara en español.
    rationale: La alternativa puede conservarse, pero conviene presentarla como variante de formulación más natural y con puntuación española consistente.
  revised_spanish_text: ¿Cuándo fuiste embriagada? ¡Adorna la hermosura de tu rostro! Las ganancias de una ramera están en tu seno[a]; por tanto, recibirás retribución.
  revised_footnotes:
