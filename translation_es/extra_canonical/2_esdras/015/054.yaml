translation:
  language: es
  text: ¿Cuándo fuiste embriagada? ¡Adorna la hermosura de tu rostro! Las ganancias de una ramera están en tu seno[a]; por tanto, recibirás retribución.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Adorna la hermosura de tu rostro. Las ganancias de una ramera».'
    reason: previous_rendering
lexical_decisions:
- source_word: cum inebriata es?
  english_pob_choice: When were you made drunk?
  chosen_spanish: ¿Cuándo te embriagaste?
  alternatives_spanish:
  - ¿Cuándo fuiste embriagada?
  - ¿Cuándo te hicieron beber hasta embriagarte?
  lexicon: inebriari
  rationale: 'El latino presenta una pregunta en segunda persona femenina: la idea central es que la destinataria ha quedado embriagada. En español, una forma natural y fiel es «¿Cuándo te embriagaste?», que conserva el sentido de estado alcanzado sin introducir un agente no explícito.'
- source_word: Exorna speciem uultus tui
  english_pob_choice: Adorn the beauty of your face!
  chosen_spanish: ¡Adorna la hermosura de tu rostro!
  alternatives_spanish:
  - ¡Engalana la belleza de tu rostro!
  - ¡Adorna la belleza de tu cara!
  lexicon: exornare; species; vultus
  rationale: «Exorna» pide un imperativo; «speciem vultus tui» combina apariencia/hermosura con rostro. «Hermosura de tu rostro» conserva el paralelismo y evita un calco demasiado duro. «Rostro» es más elevado que «cara» en este registro.
- source_word: Merces fornicariae
  english_pob_choice: The wages of a harlot
  chosen_spanish: Las ganancias de una ramera
  alternatives_spanish:
  - El salario de una ramera
  - Las paga de una prostituta
  lexicon: merces; fornicaria
  rationale: El genitivo singular de «fornicaria» es persona, no abstracción; por eso conviene traducirlo como «una ramera» y no como «prostitución». «Ganancias» reproduce el valor de retribución/pago sin forzar un tecnicismo laboral extraño en español bíblico.
- source_word: sinus tuos
  english_pob_choice: in your bosom
  chosen_spanish: en tu seno
  alternatives_spanish:
  - en tu pecho
  - en tu regazo
  lexicon: sinus
  rationale: «Seno» es el equivalente bíblico natural para «bosom» y conserva la imagen de lo que se lleva junto al cuerpo. «Pecho» y «regazo» serían posibles, pero menos ajustados al registro tradicional de la escena.
- source_word: redditionem recipies
  english_pob_choice: you will receive repayment
  chosen_spanish: recibirás el pago
  alternatives_spanish:
  - recibirás retribución
  - recibirás la paga
  lexicon: redditionem recipies
  rationale: El sintagma expresa restitución o retribución. «Recibirás el pago» mantiene la idea de devolución justa y encaja con el campo semántico de merces/repayment sin sonar excesivamente interpretativo.
theological_decisions:
- issue: Feminine address and personification of the condemned city/woman
  english_pob_reading: 'The text addresses a female figure directly: When were you made drunk?... The wages of a harlot are in your bosom'
  chosen_spanish_reading: El texto conserva el tratamiento femenino directo («te embriagaste», «tu rostro», «tu seno») para mantener la personificación apocalíptica.
  alternative_spanish_readings:
  - 'Neutrarizar el sujeto: «¿Cuándo fuiste embriagado?»'
  - 'Reformular en tercera persona: «¿Cuándo fue embriagada ella?»'
  rationale: La fuente y la lectura inglesa mantienen una figura femenina personificada. En español debe preservarse esa coherencia gramatical y simbólica para no perder la acusación profética dirigida a la figura representada.
  doctrine_reference: Personificación profética/apocalíptica; coherencia del discurso figurado
- issue: merces fornicariae as concrete person, not abstract vice
  english_pob_reading: The wages of a harlot
  chosen_spanish_reading: «Las ganancias de una ramera» en lugar de una abstracción como «las ganancias de la prostitución».
  alternative_spanish_readings:
  - «Las ganancias de prostitución»
  - «La paga de la prostitución»
  rationale: El latín usa un sustantivo personal en genitivo, lo que favorece la imagen de una ramera/prostituta concreta. Mantener la persona preserva el tono profético y la fuerza moral del reproche.
  doctrine_reference: Lectura literal del símil/prototipo profético
translation_notes:
  revision_awareness: La revisión más reciente restauró la cláusula inicial omisa («When were you made drunk?») y confirmó la lectura de «the wages of a harlot are in your bosom» frente a la paráfrasis anterior. La draft española sigue esa revisión, conserva la apertura interrogativa y mantiene la referencia concreta a una ramera, no a la prostitución como abstracción.
  spanish_consistency_notes:
  - Se mantiene el tratamiento femenino singular a lo largo del versículo.
  - «Y tu» no aparece porque el latín del segmento final solo llega hasta «recibirás el pago» en el texto dado; no se amplía más allá de la porción fuente.
  - Se evita «SEÑOR» y no aplica aquí ningún término divino explícito en el tramo conservado.
