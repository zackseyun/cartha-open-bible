    text: 'O: «Adorna la hermosura de tu rostro. Las ganancias de una ramera».'
    reason: previous_rendering
  revision_rationale: Se ajustó la primera cláusula para reflejar mejor la voz pasiva del latín («fuiste embriagada») y se reemplazó «el pago» por «retribución» para conservar con más precisión el sentido de redditionem. Se mantuvo la imagen personificada de «una ramera» y el término bíblico «seno». La nota alternativa se normalizó levemente en español sin cambiar su función.
