  - el Señor Yahvé
  rationale: Aunque el proyecto prefiere «Yahvé» para יהוה, el fragmento proviene del latín Dominus y funciona como fórmula introductoria estándar. Sin un marcador explícito del nombre divino en el texto fuente disponible, «el Señor» preserva la textura del original y evita una atribución no demostrada.
  doctrine_reference: No aplica; decisión de título divino y forma textual.
