  - Por eso
  - Así que
  lexicon: Latin propterea
  rationale: La partícula causal-consecutiva introduce una conclusión; «Por tanto» mantiene el valor inferencial y suena natural en español bíblico sin volverse arcaico.
- source_word: dicit
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - declara
  - afirma
  lexicon: Latin dicit
  rationale: «Dice» reproduce de forma directa el verbo de habla del original. Evita intensificar el tono más allá del latín breve y formulaico.
- source_word: Dominus
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Yahvé
  lexicon: Latin Dominus
  rationale: Aquí el texto latino usa Dominus como título reverencial; en español, el equivalente directo y publicación-readable es «el Señor». En este fragmento no hay base interna suficiente para sustituirlo por «Yahvé» en el texto principal.
theological_decisions:
- issue: Título divino en una fórmula profética breve
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
