base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/025.yaml
  text: I will not spare them. Depart[15:25], you apostate children; do not defile my sanctification.
  footnotes:
  - marker: '15:25'
    text: Latin sanctificationem meam is literally 'my sanctification' or 'my holy thing.' The rendering 'my sanctuary' takes it concretely in this context of defilement, but the phrase may more broadly denote what belongs to God's holiness.
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:52:54Z'
    unchanged: false
    changes_summary: Changed 'sanctuary' to 'sanctification' to reflect the Latin sanctificationem more directly; retained the rest as accurate and natural.
translation:
  language: es
  text: No tendré compasión de ellos. Apártense[a], hijos apóstatas; no contaminen mi santificación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Apártense» traduce el imperativo de separación; también podría entenderse como «váyanse» o «retírense».
    reason: lexical_alternative
  - marker: b
    text: «Santificación» sigue de cerca el latín sanctificationem meam. También puede entenderse como «mi santidad» o «mi cosa santa»; se mantiene la forma abstracta para preservar esa amplitud semántica.
    reason: lexical_alternative
lexical_decisions:
- source_word: non parcam illis
  english_pob_choice: I will not spare them.
  chosen_spanish: No los perdonaré.
  alternatives_spanish:
  - No tendré misericordia de ellos.
  - No los ahorraré.
  lexicon: parco
  rationale: El latín expresa una negativa directa de perdón/indulgencia; en español, «perdonar» comunica con claridad esa falta de clemencia sin volverla más fuerte de lo que el texto exige.
- source_word: discedite
  english_pob_choice: Depart
  chosen_spanish: Apartaos
  alternatives_spanish:
  - Idos
  - Retiraos
  lexicon: discedo
  rationale: El imperativo pide que se vayan/se separen. «Apartaos» conserva el mandato breve y solemne, y suena natural en español bíblico sin introducir un matiz ajeno.
- source_word: filii apostatae
  english_pob_choice: you apostate children
  chosen_spanish: hijos apóstatas
  alternatives_spanish:
  - hijos rebeldes
  - hijos infieles
  lexicon: apostata
  rationale: «Apóstatas» reproduce el término de abandono/rebelión religiosa con la misma fuerza que el inglés POB; «hijos» mantiene la vocación retórica del vocativo latino.
- source_word: nolite contaminare
  english_pob_choice: do not defile
  chosen_spanish: no profanéis
  alternatives_spanish:
  - no contaminéis
  - no mancilléis
  lexicon: contamino
  rationale: Aunque el latín usa un verbo de contaminar, el contexto sacramental/holy-property del siguiente sintagma favorece «profanéis» en español para expresar la violación de lo sagrado con naturalidad y fidelidad funcional.
- source_word: sanctificationem meam
  english_pob_choice: my sanctification
  chosen_spanish: mi santificación
  alternatives_spanish:
  - mi santidad
  - mi lugar santo
  lexicon: sanctificatio
  rationale: Se conserva la elección revisada del POB inglés «sanctification» para reflejar con mayor literalidad el latín sanctificationem. En español, «santificación» mantiene la relación verbal con lo santo y preserva la tensión léxica señalada por el aparato.
theological_decisions:
- issue: Alcance de sanctificationem meam
  english_pob_reading: my sanctification
  chosen_spanish_reading: mi santificación
  alternative_spanish_readings:
  - mi santidad
  - mi santuario
  rationale: El audit trail inglés corrigió «sanctuary» por «sanctification» para seguir de cerca el latín. En español se mantiene «santificación» para no borrar la ambigüedad entre lo santo como realidad y lo santo como cosa consagrada, dejando la interpretación abierta sin desatender el texto fuente.
  doctrine_reference: Santidad de Dios y de lo consagrado a Dios; distinción entre cualidad santa y objeto santo.
translation_notes:
  revision_awareness: El inglés POB revisó este versículo de «my sanctuary» a «my sanctification» para reflejar con mayor precisión el latín sanctificationem. La presente versión española sigue esa revisión y evita reintroducir «santuario».
  spanish_consistency_notes:
  - Se mantiene el registro exhortativo y profético, sin suavizar la dureza del juicio.
  - «Apóstatas» conserva el peso teológico del apartamiento de la fe.
  - «Santificación» se usa de manera consistente con la revisión inglesa y con el latín, aunque suene menos común que «santuario».
