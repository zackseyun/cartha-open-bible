  source_alignment_summary: 'El borrador español refleja bien la secuencia del latín: Babilonia, destrucción, reunión hostil, cerco, derramamiento de tormenta e ira, ascenso de polvo y humo, y lamento de los de alrededor. Sin embargo, el marcador de nota [a] quedó anclado a «Babilonia» cuando la nota corresponde a la cláusula alternativa «Se reunirán contra ella», siguiendo el audit trail inglés. También conviene explicitar mejor «sobre ella» con «toda la ira» para representar con más fidelidad omnem iram super eam y mejorar la naturalidad española.'
  spanish_quality_summary: El español es generalmente claro y digno. «La cercarán», «subirán hasta el cielo» y «se lamentarán» son naturales. La frase «y toda ira» suena algo elíptica y menos idiomática en español; «y toda la ira sobre ella» mantiene el tono bíblico y suena más completo. La puntuación funciona mejor con comas en serie que con punto y coma en este contexto.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Babilonia», «ira» y la personificación femenina están bien. La decisión de traducir sidus como «tormenta» sigue correctamente la resolución documentada en inglés.
