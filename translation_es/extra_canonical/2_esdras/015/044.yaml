  - severity: medium
    issue: «y toda ira» es poco natural e incompleto
    rationale: Aunque inteligible, no representa tan bien omnem iram super eam como «y toda la ira sobre ella», y en español suena truncado.
  - severity: low
    issue: Punto y coma innecesario tras «toda ira»
    rationale: La serie verbal coordinada fluye mejor con comas, en línea con el original y con el estilo del resto del versículo.
