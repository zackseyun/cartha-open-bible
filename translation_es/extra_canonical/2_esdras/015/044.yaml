source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: Babylonem et exterent eam. Conuenient ad ipsam et circuibunt eam et effundent sidus et omnem iram super eam, et subibit puluis et fumus usque ad caelum, et omnes in circuitu lugebunt
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/044.yaml
  text: Babylon[a], and they will destroy her. They will gather against her and surround her and pour out a storm and all wrath upon her, and dust and smoke will rise up to heaven, and all around her will mourn.
  footnotes:
  - marker: a
    text: Or 'They will gather against her'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:53:10Z'
    unchanged: false
    changes_summary: Supplied the missing finite verb at the start ('they will destroy her'), corrected 'star' to 'a storm' for Latin sidus in context, smoothed verb sequence ('rise up'), and removed the final redundant 'her' after 'mourn' since it is not in the source.
translation:
  language: es
  text: Babilonia, y la destruirán. Se reunirán contra ella[a] y la cercarán, y derramarán sobre ella una tormenta y toda la ira sobre ella, y polvo y humo subirán hasta el cielo, y todos los de alrededor se lamentarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Se juntarán contra ella».
    reason: alternative_rendering_of_conuenient_ad_ipsam
lexical_decisions:
- source_word: Babylonem
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babilón
  lexicon: topónimo
  rationale: Se mantiene el nombre propio histórico y bíblico en su forma española más reconocible. ‘Babilonia’ conserva mejor la referencia geográfica y simbólica que una transliteración menos natural.
- source_word: exterent
  english_pob_choice: they will destroy her
  chosen_spanish: la destruirán
  alternatives_spanish:
  - la asolarán
  - la arrasarán
  lexicon: verbo de destrucción
  rationale: El latín expresa una acción de destrucción directa sobre la ciudad/personificación femenina. ‘Destruir’ es claro y fiel; ‘asolar’ o ‘arrasar’ serían posibles, pero menos directos en español general.
- source_word: conuenient ad ipsam et circuibunt eam
  english_pob_choice: They will gather against her and surround her
  chosen_spanish: Se reunirán contra ella y la cercarán
  alternatives_spanish:
  - Se congregarán contra ella y la rodearán
  - Se juntarán contra ella y la cercarán
  lexicon: movimiento hostil y cerco
  rationale: ‘Convenir ad’ aquí es reunir(se) con intención hostil; por eso ‘se reunirán contra ella’ reproduce el valor de congregarse contra un objetivo. ‘Circumire’ pide ‘cercar’ o ‘rodear’; se elige ‘cercarán’ por su fuerza militar y su naturalidad en español.
- source_word: effundent sidus
  english_pob_choice: pour out a storm
  chosen_spanish: derramarán sobre ella una tormenta
  alternatives_spanish:
  - desatarán sobre ella una tormenta
  - vertirán sobre ella una tempestad
  lexicon: sidus en contexto de juicio
  rationale: El audit trail inglés ya resolvió ‘sidus’ como ‘a storm’, evitando la lectura literal ‘estrella’. En español, ‘derramarán una tormenta’ conserva la imagen de algo que cae o se vierte sobre la ciudad, coherente con el verbo de derramar y con el juicio devastador.
- source_word: omnem iram super eam
  english_pob_choice: and all wrath upon her
  chosen_spanish: y toda ira
  alternatives_spanish:
  - y toda la ira sobre ella
  - y toda furia sobre ella
  lexicon: ira de juicio
  rationale: La frase latina completa el objeto de la acción ya expresada; en español puede mantenerse elipsis con ‘toda ira’ dentro del flujo, pero la opción más explícita sería ‘toda la ira sobre ella’. Se conserva ‘ira’ para seguir el registro bíblico y porque ya está gobernada por ‘sobre ella’ inmediatamente antes.
- source_word: puluis et fumus usque ad caelum
  english_pob_choice: dust and smoke will rise up to heaven
  chosen_spanish: polvo y humo subirán hasta el cielo
  alternatives_spanish:
  - polvo y humo ascenderán hasta el cielo
  - polvo y humo llegarán hasta el cielo
  lexicon: imagen de ascenso
  rationale: ‘Subirán hasta el cielo’ es idiomático, claro y fiel a la imagen de elevación total. ‘Ascenderán’ sería más formal; ‘llegarán’ debilita la metáfora del ascenso.
- source_word: omnes in circuitu lugebunt
  english_pob_choice: all around her will mourn
  chosen_spanish: todos los de alrededor se lamentarán
  alternatives_spanish:
  - todos los alrededor se lamentarán
  - todos los que estén alrededor harán duelo
  lexicon: verbo de duelo
  rationale: ‘Lugebunt’ implica lamento/duelo por calamidad. ‘Lamentarse’ funciona bien en español bíblico contemporáneo y evita un giro demasiado técnico; ‘harán duelo’ sería más literal pero menos natural para lectores generales.
theological_decisions:
- issue: Personificación femenina de Babilonia
  english_pob_reading: her
  chosen_spanish_reading: ella
  alternative_spanish_readings:
  - la
  - Babilonia
  rationale: Se conserva la personificación femenina del texto, importante para la continuidad referencial y para no reducir la imagen profética a un mero lugar abstracto.
  doctrine_reference: Apocalíptica bíblica; personificación de ciudades/jueces en literatura profética
- issue: sidus interpretado como fenómeno destructivo
  english_pob_reading: a storm
  chosen_spanish_reading: una tormenta
  alternative_spanish_readings:
  - una tempestad
  - una estrella
  rationale: La revisión inglesa ya documenta que ‘star’ era incorrecto y que el contexto pide un fenómeno de violencia atmosférica o devastación. En español se adopta ‘tormenta’ para reflejar el juicio abrupto sin introducir una lectura astral ajena al pasaje.
  doctrine_reference: Crítica textual y semántica contextual de vocabulario latino apocalíptico
- issue: omnem iram rendered as wrath rather than generic anger
  english_pob_reading: all wrath
  chosen_spanish_reading: toda ira
  alternative_spanish_readings:
  - toda la ira
  - toda furia
  rationale: ‘Ira’ mantiene el tono bíblico de juicio divino/cósmico y evita suavizar la intensidad del castigo. Aunque el español requiere a veces artículo explícito, la construcción elegida conserva la carga totalizante del original.
  doctrine_reference: Lenguaje de juicio en literatura apocalíptica
translation_notes:
  revision_awareness: 'La versión inglesa revisada corrigió una omisión inicial (‘Babylon… they will destroy her’), resolvió correctamente ‘sidus’ como ‘a storm’ en vez de ‘star’, y eliminó un pronombre final redundante. La traducción española incorpora esas correcciones: mantiene ‘Babilonia’ al inicio, explicita la destrucción, usa ‘tormenta’ y omite cualquier añadido final no presente en el latín.'
  spanish_consistency_notes:
  - Se conserva el referente femenino singular (‘ella’) para Babilonia en todo el versículo.
  - ‘Tormenta’ traduce el elemento destructivo de sidus conforme al contexto revisado, no una lectura literal astral.
  - Se mantiene un registro bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - La puntuación respeta la secuencia acumulativa del latín, con cláusulas coordinadas que intensifican el juicio.
