base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/040.yaml
  text: And great and mighty clouds full of wrath[a], and a star, will be lifted up to destroy all the earth and those who dwell in it, and they will pour out a dreadful star upon every high and lofty place.
  footnotes:
  - marker: a
    text: Or 'will be lifted up, full of wrath and star, to destroy'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:29:45Z'
    unchanged: false
    changes_summary: Adjusted punctuation for clarity, removed the unnecessary repeated 'and' before 'a star,' and smoothed the final clause by placing 'a dreadful star' after 'pour out' for more natural English while preserving the source sense.
translation:
  language: es
  text: Y se levantarán grandes y poderosas nubes, llenas de ira,[a] y un astro, para destruir toda la tierra y a los que habitan en ella; y derramarán un astro terrible sobre todo lugar alto y eminente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El latín coordina 'un astro' con 'nubes' como sujeto de 'se levantarán'; no debe leerse como si 'astro' formara parte de 'llenas de ira'.
    reason: source_grammar_clarification
lexical_decisions:
- source_word: et exaltabuntur
  english_pob_choice: will be lifted up
  chosen_spanish: se levantarán
  alternatives_spanish:
  - serán levantadas
  - se alzarán
  lexicon: Latin exaltabuntur
  rationale: El pasivo latino expresa elevación o levantamiento; en español, ‘se levantarán’ comunica bien la imagen sin forzar una pasiva pesada.
- source_word: nubes magnae et validae
  english_pob_choice: great and mighty clouds
  chosen_spanish: grandes y poderosas nubes
  alternatives_spanish:
  - nubes grandes y fuertes
  - nubes inmensas y poderosas
  lexicon: Latin nubes magnae et validae
  rationale: ‘Poderosas’ rinde mejor la fuerza de validae que ‘fuertes’ en un registro bíblico solemne; el orden español fluye naturalmente.
- source_word: plenae irae
  english_pob_choice: full of wrath
  chosen_spanish: llenas de ira
  alternatives_spanish:
  - colmadas de ira
  - llenas de furor
  lexicon: Latin plenae irae
  rationale: Se mantiene la imagen de plenitud y el sustantivo ‘ira’ como equivalente directo del latín, sin suavizar el tono.
- source_word: sidus
  english_pob_choice: a star
  chosen_spanish: un astro
  alternatives_spanish:
  - una estrella
  - un lucero
  lexicon: Latin sidus
  rationale: ‘Astro’ conserva el alcance más amplio y literario de sidus, y evita restringir innecesariamente la referencia a una estrella ordinaria.
- source_word: ut exterant omnem terram et inhabitantes eam
  english_pob_choice: to destroy all the earth and those who dwell in it
  chosen_spanish: para destruir toda la tierra y a los que habitan en ella
  alternatives_spanish:
  - para devastar toda la tierra y a los que la habitan
  - para destruir la tierra entera y a sus habitantes
  lexicon: Latin exterant ... inhabitantes eam
  rationale: ‘Destruir’ reproduce la finalidad destructiva del latín; ‘los que habitan en ella’ sigue de cerca inhabitantes eam sin perder claridad.
- source_word: fundent ... sidus terribile
  english_pob_choice: they will pour out a dreadful star
  chosen_spanish: derramarán un astro terrible
  alternatives_spanish:
  - vertirán un astro terrible
  - harán llover un astro terrible
  lexicon: Latin fundent ... sidus terribile
  rationale: El latín ‘fundent’ admite una imagen de derramamiento/verter. ‘Derramarán’ preserva esa fuerza figurada en español; ‘astro terrible’ mantiene la cohesión con sidus y el carácter ominoso.
- source_word: omnem altum et eminentem
  english_pob_choice: every high and lofty place
  chosen_spanish: todo lugar alto y eminente
  alternatives_spanish:
  - todo lugar alto y elevado
  - cada sitio alto y prominente
  lexicon: Latin omnem altum et eminentem
  rationale: ‘Lugar alto y eminente’ conserva la duplicación descriptiva del latín y el tono elevado del pasaje.
theological_decisions:
- issue: Naturaleza de las imágenes celestes y el astro terrible
  english_pob_reading: A dreadful star will be lifted up / poured out as an instrument of judgment.
  chosen_spanish_reading: Un astro terrible es levantado y derramado como instrumento de juicio sobre la tierra y sus alturas.
  alternative_spanish_readings:
  - Una estrella terrible será levantada y derramada como instrumento de juicio.
  - Las nubes y el astro son imágenes simultáneas del juicio.
  rationale: El latín presenta nubes y sidus como realidades coordinadas de juicio; la traducción española conserva esa coordinación sin resolverla de manera alegórica. ‘Astro’ ayuda a mantener la ambigüedad cósmica del texto.
  doctrine_reference: Apocalíptica de juicio; mantener la imaginería sin alegorizarla
translation_notes:
  revision_awareness: 'La redacción sigue la revisión del latín que corrige la lectura anterior: ‘sidus’ funciona como sujeto nominativo coordinado con ‘nubes’, no como complemento de ‘plenae irae’. Por eso el español separa claramente ‘llenas de ira’ y ‘un astro’ con puntuación y sintaxis acordes al original. También conserva el segundo verbo de derramamiento en forma activa plural, conforme a la secuencia del texto latino.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparece el nombre divino; aquí no aplica.
  - Se eligió ‘astro’ en vez de ‘estrella’ para respetar el valor amplio de sidus y evitar una restricción innecesaria.
  - ‘Ira’ se mantiene literal para plenae irae, sin suavizarla a ‘furor’.
  - 'La puntuación refleja la lectura revisada del pasaje: nubes y sidus quedan coordinados como elementos del juicio.'
