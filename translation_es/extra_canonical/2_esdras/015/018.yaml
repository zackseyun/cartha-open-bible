review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del latín: causa por la soberbia, ciudades en desorden, casas destruidas y personas con miedo. Sin embargo, «serán turbadas» suena calcado e inusual en español moderno; el latín turbabuntur aquí se expresa mejor como confusión o trastorno de las ciudades. Además, «los hombres tendrán miedo» es comprensible, pero «la gente tendrá miedo» comunica mejor el valor genérico de homines en español actual sin pérdida de sentido.'
  spanish_quality_summary: El texto es fiel pero algo rígido. «Porque a causa de» es acumulativo pero aceptable; «serán turbadas» baja la naturalidad y dignidad del español bíblico legible. «La gente tendrá miedo» mejora la lectura y evita un genérico masculino potencialmente equívoco. La coordinación final queda fluida sin necesidad de cambios mayores.
  glossary_alignment: No hay términos del glosario mayor implicados de forma especial. «Soberbia» está bien para superbia. «Casas» para domus y «destruidas» para exterentur son adecuados. Se recomienda apartarse del calco «turbadas» por claridad idiomática, y ajustar homines a un genérico español más natural.
  issues:
  - severity: medium
    issue: «las ciudades serán turbadas» es un calco poco natural
    rationale: Aunque sigue de cerca turbabuntur, en español moderno suena extraño aplicado a ciudades. El sentido contextual es de confusión, conmoción o trastorno urbano; «serán sumidas en confusión» o similar preserva mejor el significado y la legibilidad.
  - severity: medium
    issue: «los hombres tendrán miedo» suena menos natural para homines genérico
    rationale: En latín homines es genérico. En español actual «los hombres» puede leerse como varones. «La gente tendrá miedo» preserva el sentido general y mejora la claridad sin carga doctrinal.
  - severity: low
    issue: Inicio con «Porque a causa de» algo redundante
    rationale: No es incorrecto, pues refleja propter... enim, pero puede suavizarse manteniendo el vínculo causal. Aun así, no exige una reestructuración mayor.
  revised_spanish_text: Porque a causa de su soberbia las ciudades serán sumidas en confusión, las casas serán destruidas, y la gente tendrá miedo.
  revision_rationale: Se reemplaza «serán turbadas» por «serán sumidas en confusión» para expresar de manera idiomática el valor de turbabuntur en español bíblico legible. Se cambia «los hombres» por «la gente» para reflejar mejor el sentido genérico de homines en español actual. Se conserva «Porque a causa de su soberbia» por fidelidad al énfasis causal del latín.
