translation:
  language: es
  text: Porque a causa de su soberbia las ciudades serán sumidas en confusión, las casas serán destruidas, y la gente tendrá miedo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: propter superbiam enim eorum
  english_pob_choice: For because of their pride
  chosen_spanish: Porque a causa de su soberbia
  alternatives_spanish:
  - Porque por su orgullo
  - Pues a causa de su arrogancia
  lexicon: propter + accusative; superbia
  rationale: «Propter» expresa causa; «a causa de» conserva el valor causal de la frase latina. «Superbia» se rinde mejor por «soberbia» en este contexto, porque mantiene la fuerza moral negativa y evita suavizarla demasiado con un «orgullo» más neutro.
- source_word: civitates turbabuntur
  english_pob_choice: the cities will be thrown into confusion
  chosen_spanish: las ciudades serán turbadas
  alternatives_spanish:
  - las ciudades serán confundidas
  - las ciudades se conmocionarán
  lexicon: civitates; turbabuntur
  rationale: «Turbabuntur» significa ser perturbadas o agitadas. «Ser turbadas» sigue de cerca el verbo latino y conserva la imagen de desorden o conmoción; la opción inglesa «thrown into confusion» también apunta a ese campo semántico.
- source_word: domus exterentur
  english_pob_choice: the houses will be destroyed
  chosen_spanish: las casas serán destruidas
  alternatives_spanish:
  - las casas serán arrasadas
  - las casas serán demolidas
  lexicon: domus; exterentur
  rationale: El latino «exterentur» transmite la idea de ser barridas, derribadas o destruidas. «Ser destruidas» es el equivalente español más directo y publicable; «arrasadas» sería una alternativa posible pero algo más interpretativa.
- source_word: homines metuent
  english_pob_choice: men will be afraid
  chosen_spanish: los hombres tendrán miedo
  alternatives_spanish:
  - la gente tendrá miedo
  - los hombres temerán
  lexicon: homines; metuent
  rationale: «Homines» puede significar «hombres» o, de modo más general, «personas». Se mantiene «los hombres» para seguir de cerca el latino y la versión inglesa POB; «tendrán miedo» expresa bien «metuent» en español natural.
theological_decisions:
- issue: Alcance de «homines»
  english_pob_reading: men will be afraid
  chosen_spanish_reading: los hombres tendrán miedo
  alternative_spanish_readings:
  - la gente tendrá miedo
  - las personas tendrán miedo
  rationale: El texto latino usa el plural general «homines», que puede tener sentido genérico. Se conserva «los hombres» porque coincide con el audit trail inglés y mantiene la cercanía formal al original, aunque en español moderno el sentido inclusivo genérico puede requerir nota o contextualización.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios, con acuerdo alto entre el control cruzado y el texto inglés POB. Por eso la redacción española sigue de cerca el sentido ya asentado, sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - 'Se mantiene el orden causal simple del latín: causa → ciudades → casas → hombres.'
  - Se conserva una dicción digna y transparente, evitando paraphraseo adicional.
  - No se introduce laudos ni términos eclesiásticos ajenos al latín de base.
