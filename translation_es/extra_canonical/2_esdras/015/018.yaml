- from: Porque a causa de su soberbia las ciudades serán turbadas, las casas serán destruidas, y los hombres tendrán miedo.
  to: Porque a causa de su soberbia las ciudades serán sumidas en confusión, las casas serán destruidas, y la gente tendrá miedo.
  rationale: Se reemplaza «serán turbadas» por «serán sumidas en confusión» para expresar de manera idiomática el valor de turbabuntur en español bíblico legible. Se cambia «los hombres» por «la gente» para reflejar mejor el sentido genérico de homines en español actual. Se conserva «Porque a causa de su soberbia» por fidelidad al énfasis causal del latín.
