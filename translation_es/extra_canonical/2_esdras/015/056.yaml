revisions:
- from: Así como haces a mis escogidos[a], dice el Señor, así hará contigo Dios y te entregará a males.
  to: Así como haces a mis escogidos[a], dice el Señor, así Dios hará contigo y te entregará a calamidades.
  rationale: 'Se realizan solo ajustes menores de estilo y naturalidad: se mejora el orden de palabras en la cláusula con «Dios» y se sustituye «males» por «calamidades» para un español más claro y eclesial, manteniendo el plural genérico del latín. La nota léxica sobre «escogidos/elegidos» se conserva porque refleja una alternativa válida ya documentada.'
