translation:
  language: es
  text: Así como haces a mis escogidos[a], dice el Señor, así Dios hará contigo y te entregará a calamidades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis elegidos».
    reason: lexical_alternative
lexical_decisions:
- source_word: sicut facies
  english_pob_choice: As you do
  chosen_spanish: Así como haces
  alternatives_spanish:
  - Como haces
  - Así como tú haces
  lexicon: Latin sicut + facies
  rationale: El latín expresa una comparación directa de acción; «Así como haces» conserva la correspondencia sin volverla más interpretativa de lo que permite el texto.
- source_word: electis meis
  english_pob_choice: my chosen ones
  chosen_spanish: mis escogidos
  alternatives_spanish:
  - mis elegidos
  - mis seleccionados
  lexicon: Latin electis meis
  rationale: «Escogidos» mantiene la idea de elección divina con registro bíblico natural en español y evita una carga excesivamente técnica de «elegidos» si se lee como sustantivo abstracto.
- source_word: dicit Dominus
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - dice Yahvé
  - afirma el Señor
  lexicon: Latin Dominus
  rationale: Aunque el proyecto suele usar «Yahvé» para יהוה, aquí el testimonio fuente es el latín Dominus y la fórmula profética establecida en la tradición latina es «el Señor»; además, el audio textual inglés auditado también conserva esa forma.
- source_word: sic faciet tibi Deus
  english_pob_choice: so God will do to you
  chosen_spanish: así hará contigo Dios
  alternatives_spanish:
  - así te hará Dios
  - así Dios te hará
  lexicon: Latin faciet tibi Deus
  rationale: La inversión de orden es natural en español y conserva el paralelismo. «Hará contigo» refleja el dativo tibi sin añadir contenido.
- source_word: tradet te in malis
  english_pob_choice: will hand you over to evils
  chosen_spanish: te entregará a males
  alternatives_spanish:
  - te entregará a calamidades
  - te pondrá en males
  lexicon: Latin tradet te in malis
  rationale: «Entregará» reproduce el valor de tradere; «males» conserva la pluralidad genérica del latín, que puede abarcar desgracias o males concretos sin especificarlos.
theological_decisions:
- issue: Identidad del sujeto divino en Dominus / Deus
  english_pob_reading: the Lord ... God
  chosen_spanish_reading: el Señor ... Dios
  alternative_spanish_readings:
  - Yahvé ... Dios
  - el Señor ... el Dios
  rationale: No hay base en este versículo para sustituir la forma heredada por el nombre propio «Yahvé», porque el texto fuente llega por la vía latina con la fórmula fija Dominus. Mantener «el Señor» conserva la tensión entre la fórmula tradicional y la mención explícita de Dios como agente posterior.
  doctrine_reference: Uso reverente del nombre divino en tradición bíblica latina; fidelidad al testimonio textual recibido.
translation_notes:
  revision_awareness: 'El inglés auditado de la edición anterior estaba desplazado al contenido del versículo 57; para este registro se ha corregido el verso conforme al latín de 2 Esdras 15:56: comparación con los escogidos, fórmula profética «dice el Señor», y retribución divina expresada con «entregará a males».'
  spanish_consistency_notes:
  - Se evitó el calco «como haces a» porque en español la comparación directa fluye mejor con «Así como haces a».
  - Se mantuvo la pluralidad de «males» para respetar el latín malis sin concretarlo indebidamente.
  - La nota de pie de página está anclada en «escogidos[a]» para que la alternativa «elegidos» quede auditable y visible.
