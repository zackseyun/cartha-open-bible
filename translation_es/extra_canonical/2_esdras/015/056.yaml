review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue correctamente el latín: «sicut facies ... sic faciet» se refleja con un paralelismo adecuado; «electis meis» se traduce fielmente; «dicit Dominus ... Deus» preserva la distinción formal del texto; y «tradet te in malis» mantiene la idea de ser entregado a males/calamidades. Sin embargo, hay una mejora necesaria de naturalidad y precisión idiomática en español en la segunda mitad.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero «así hará contigo Dios» suena forzado en español bíblico actual y «te entregará a males» resulta algo poco idiomático. Una leve revisión puede mantener la fidelidad y mejorar la lectura: «así Dios hará contigo y te entregará a calamidades».'
  glossary_alignment: No hay conflicto mayor con la terminología del proyecto. «Dios» está bien. «El Señor» para Dominus es defendible dado que la fuente inmediata es latina y no hay evidencia directa aquí para imponer «Yahvé». «Escogidos» es aceptable, con nota alternativa a «elegidos».
  issues:
  - severity: medium
    issue: Orden marcado en «así hará contigo Dios»
    rationale: Aunque comprensible, el orden final de «Dios» suena menos natural en español contemporáneo culto. «Así Dios hará contigo» o «así hará Dios contigo» conserva mejor la solemnidad sin afectar el sentido.
  - severity: low
    issue: «Te entregará a males» es literal pero poco idiomático
    rationale: El latín plural «in malis» puede mantenerse semánticamente con una opción más natural en español, como «a calamidades» o «a desgracias», sin perder la idea de males múltiples.
  revised_spanish_text: Así como haces a mis escogidos[a], dice el Señor, así Dios hará contigo y te entregará a calamidades.
  revised_footnotes:
