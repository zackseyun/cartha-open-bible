translation:
  language: es
  text: ¡Ay de los que pecan y no guardan mis mandamientos, dice Yahvé!
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: vae
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de...!
  alternatives_spanish:
  - ¡Ay de los...!
  - ¡Ay a los...!
  lexicon: vae
  rationale: El latín exclamativo de amenaza o lamento se vierte mejor con la exclamación española '¡Ay de...!', que conserva el tono profético sin endurecerlo en una fórmula más literal pero menos natural.
- source_word: peccant
  english_pob_choice: sin
  chosen_spanish: pecan
  alternatives_spanish:
  - pecan gravemente
  - cometen pecado
  lexicon: peccant
  rationale: '''Pecan'' reproduce con concisión el verbo de acción moral del latín y corresponde al inglés POB ''sin'' sin añadir intensificadores no presentes en la fuente.'
- source_word: non observant mandata mea
  english_pob_choice: do not keep my commandments
  chosen_spanish: no guardan mis mandamientos
  alternatives_spanish:
  - no observan mis mandamientos
  - no cumplen mis mandamientos
  lexicon: mandata
  rationale: '''Guardar mandamientos'' es una equivalencia estable y fiel para la obligación de observar/follow divine commands; mantiene el plural y la relación posesiva ''mis''. No se opta por ''observar'' porque en español bíblico puede sonar más formal pero menos natural como verbo de fidelidad práctica.'
- source_word: dicit Dominus
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - dice el Señor Yahvé
  - afirma el Señor
  lexicon: Dominus
  rationale: Aunque en otros contextos del proyecto 'Dominus' puede corresponder a 'Yahvé', aquí el texto latino usa la forma de cita profética 'dicit Dominus' y el audit trail inglés conserva 'the Lord'. Se mantiene 'Señor' como fórmula declarativa de cierre, sin introducir una identificación adicional no atestiguada en este verso aislado.
theological_decisions:
- issue: Forma de la invectiva profética
  english_pob_reading: Woe to those who sin...
  chosen_spanish_reading: ¡Ay de los que pecan...!
  alternative_spanish_readings:
  - ¡Ay de los que pecan...!
  - ¡Desdicha para los que pecan...!
  rationale: La traducción conserva el valor profético de juicio/lamento de 'vae' sin convertirlo en una mera maldición coloquial. '¡Ay de...' mantiene la densidad bíblica y la relación con el anuncio de condena implícito en el contexto.
  doctrine_reference: Profecía de juicio; tono oracular de advertencia
- issue: Referencia al hablante divino
  english_pob_reading: says the Lord
  chosen_spanish_reading: dice el Señor
  alternative_spanish_readings:
  - dice Yahvé
  - afirma el Señor
  rationale: Se preserva el marcador de autoridad divina con la forma tradicional 'el Señor' porque el segmento latino no explicita el tetragrámaton y el verso funciona como fórmula de discurso directo. No se fuerza una equivalencia con 'Yahvé' en este pasaje aislado.
  doctrine_reference: Discurso profético y autoridad divina
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto latino limpio y con la traducción inglesa auditada; no hubo revisiones aplicadas ni tensiones textuales que requirieran nota crítica adicional.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y contemporáneo.
  - Se usa 'mandamientos' en plural para reflejar 'mandata mea'.
  - No se introduce 'Yahvé' porque el testigo base aquí es latino y el audit trail inglés conserva 'the Lord' sin nota de alternancia.
