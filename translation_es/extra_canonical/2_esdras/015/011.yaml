base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/015/011.yaml
  text: but I will lead them out with a mighty hand and an uplifted arm, and I will strike Egypt with plagues as before, and I will destroy all its land.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:52:41Z'
    unchanged: false
    changes_summary: Changed 'a plague' to 'plagues' to better reflect the sense of the Latin in context, and changed 'ruin' to 'destroy' for a more formal and direct rendering of corrumpam.
translation:
  language: es
  text: pero yo los sacaré con mano poderosa y brazo levantado, y heriré a Egipto con plagas como antes, y destruiré toda su tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: educam eum
  english_pob_choice: I will lead them out
  chosen_spanish: los sacaré
  alternatives_spanish:
  - los sacaré fuera
  - los conduciré fuera
  lexicon: educam
  rationale: El latín expresa un sacar/extraer con dirección de salida; en español, «los sacaré» comunica de forma natural el movimiento de salida sin añadir matices pastorales que no están en el texto. Mantiene la relación con el grupo que sale, como en el inglés POB.
- source_word: manu potenti
  english_pob_choice: with a mighty hand
  chosen_spanish: con mano poderosa
  alternatives_spanish:
  - con mano fuerte
  - con una mano poderosa
  lexicon: manus
  rationale: «Mano poderosa» conserva la imagen idiomática y el valor de fuerza activa del original latino y del inglés POB. «Poderosa» refleja mejor la amplitud de fuerza que una mera fuerza física.
- source_word: brachio excelso
  english_pob_choice: and an uplifted arm
  chosen_spanish: y brazo levantado
  alternatives_spanish:
  - y brazo exaltado
  - y brazo alzado
  lexicon: brachium
  rationale: «Brazo levantado» transmite el gesto de elevación del latín excelso y evita arcaísmos innecesarios. Mantiene la paralelismo con la imagen de poder divino del miembro anterior.
- source_word: percutiam Aegyptum plaga sicut prius
  english_pob_choice: I will strike Egypt with plagues as before
  chosen_spanish: heriré a Egipto con plagas como antes
  alternatives_spanish:
  - golpearé a Egipto con plagas como antes
  - castigaré a Egipto con plagas como antes
  lexicon: percutiam ... plaga
  rationale: «Heriré» conserva la fuerza concreta de percutiam, mientras que «plagas» mantiene el plural aprobado por la revisión inglesa y corresponde al sentido de golpes castigadores repetidos en contexto. «Como antes» sigue la referencia temporal de sicut prius sin ampliarla.
- source_word: corrumpam terram omnem eius
  english_pob_choice: I will destroy all its land
  chosen_spanish: destruiré toda su tierra
  alternatives_spanish:
  - arruinaré toda su tierra
  - devastaré toda su tierra
  lexicon: corrumpam
  rationale: La revisión inglesa resolvió corrumpam como «destroy» por ser más formal y directo; en español, «destruiré» conserva esa decisión y evita la debilidad de «arruinaré». «Toda su tierra» mantiene el alcance total de omnem eius.
theological_decisions:
- issue: La imagen de acción divina poderosa sobre Egipto
  english_pob_reading: with a mighty hand and an uplifted arm
  chosen_spanish_reading: con mano poderosa y brazo levantado
  alternative_spanish_readings:
  - con mano fuerte y brazo alzado
  - con mano poderosa y brazo exaltado
  rationale: Se preserva la metáfora corporal aplicada a Dios sin sustituirla por abstracciones. Esto mantiene la continuidad bíblica de la frase como símbolo de intervención soberana y liberadora.
  doctrine_reference: Éxodo 6:1; 6:6; 13:3
- issue: El plural de 'plagues' en contexto de juicio
  english_pob_reading: with plagues as before
  chosen_spanish_reading: con plagas como antes
  alternative_spanish_readings:
  - con una plaga como antes
  - con castigos como antes
  rationale: Se conserva el plural, conforme a la corrección del audit trail inglés, porque el contexto alude a una serie de golpes/juicios, no a un único evento. «Plagas» permite mantener la resonancia bíblica sin forzar una abstracción.
  doctrine_reference: Éxodo 7–12; 9:14
- issue: El verbo final de destrucción total
  english_pob_reading: I will destroy all its land
  chosen_spanish_reading: destruiré toda su tierra
  alternative_spanish_readings:
  - arruinaré toda su tierra
  - devastaré toda su tierra
  rationale: «Destruiré» expresa la intención de aniquilación o ruina total sin suavizar el juicio. Se evita una lectura meramente económica o parcial de corrumpam, manteniendo el juicio completo sobre la tierra.
  doctrine_reference: Jeremías 4:20; Sofonías 1:2-3
translation_notes:
  revision_awareness: El texto inglés revisado cambió 'a plague' por 'plagues' y 'ruin' por 'destroy'; la versión española sigue esas decisiones para reflejar con mayor precisión el plural de plaga y la formalidad de corrumpam. No se añadieron notas textuales porque el suministro latino es estable y el inglés no registró variantes relevantes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; aquí el versículo latino no contiene el nombre divino explícito, por lo que no aparece.
  - Se preserva el paralelismo retórico de mano/brazo y el ritmo de tres miembros en español.
  - Se evita modernizar «plagas» a un término genérico, porque el léxico bíblico favorece la correspondencia intertextual.
