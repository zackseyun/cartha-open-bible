base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/011/035.yaml
  text: The head on the right side devoured the one on the left. And I heard a voice saying to me, “Look before you, and—”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:50:09Z'
    unchanged: false
    changes_summary: 'Removed the unsupported opening words ''And I looked, and behold,'' and added the omitted second sentence from the Latin: ''And I heard a voice saying to me, “Look before you, and—”'' to reflect the incomplete source text.'
translation:
  language: es
  text: 'La cabeza del lado derecho devoró a la que estaba a la izquierda. Y oí una voz que me decía: «Mira delante de ti, y—»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: deuorauit
  english_pob_choice: devoured
  chosen_spanish: devoró
  alternatives_spanish:
  - comió
  - engulló
  lexicon: deuorare
  rationale: El latín expresa una acción intensa de consumir o devorar; «devoró» conserva esa fuerza sin sonar forzado en español.
- source_word: caput
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - la testa
  - el jefe
  lexicon: caput
  rationale: Aquí el sentido es literal dentro de la visión; «cabeza» es la forma natural y fiel en español.
- source_word: a dextera parte
  english_pob_choice: on the right side
  chosen_spanish: del lado derecho
  alternatives_spanish:
  - a la derecha
  - en la parte derecha
  lexicon: dextera
  rationale: «Del lado derecho» reproduce la relación espacial del latín con claridad y naturalidad.
- source_word: illud quod est a laeua
  english_pob_choice: the one on the left
  chosen_spanish: la que estaba a la izquierda
  alternatives_spanish:
  - la de la izquierda
  - la que es de la izquierda
  lexicon: laeva
  rationale: El relativo en español necesita concordancia explícita; «la que estaba a la izquierda» mantiene el referente sin añadir más de lo necesario.
- source_word: audiui uocem dicentem mihi
  english_pob_choice: I heard a voice saying to me
  chosen_spanish: oí una voz que me decía
  alternatives_spanish:
  - escuché una voz diciéndome
  - oí la voz que me hablaba
  lexicon: audio, vox, dicere
  rationale: «Oí una voz que me decía» conserva el carácter auditivo y la construcción del latín con una sintaxis natural en español.
- source_word: conspice contra te
  english_pob_choice: Look before you
  chosen_spanish: Mira delante de ti
  alternatives_spanish:
  - Mira frente a ti
  - Fija la mirada delante de ti
  lexicon: conspicere
  rationale: La expresión latina apunta a orientar la vista hacia el frente; «delante de ti» comunica bien la dirección sin sobreinterpretar.
theological_decisions:
- issue: Texto incompleto / corte final abrupto
  english_pob_reading: “Look before you, and—”
  chosen_spanish_reading: «Mira delante de ti, y—»
  alternative_spanish_readings:
  - «Mira delante de ti, y…»
  - «Mira delante de ti, y»
  rationale: La fuente latina termina truncada en «con-», por lo que la traducción debe conservar la interrupción y no completar el pensamiento.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'La versión inglesa revisada corrigió la omisión de la segunda oración y eliminó el inicio no sustentado “And I looked, and behold,”. Esta traducción sigue esa revisión: conserva solo lo atestiguado por el latín y reproduce el final truncado.'
  spanish_consistency_notes:
  - He mantenido el registro sobrio y visionario propio del pasaje.
  - No se introdujo puntuación conclusiva al final porque el texto fuente queda cortado.
  - Se eligió «oí» en lugar de «escuché» para reflejar de forma directa el simple perfecto latino.
