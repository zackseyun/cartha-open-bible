source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: ungues tui pessimi et omne corpus tuum uanum, Vti refrigeret omnis terra et releuetur liberata de tua ui et speret iudicium et misericordiam eius qui fecit eam.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/011/046.yaml
  text: and your wicked claws and your whole worthless body[a], so that the whole earth may be refreshed and relieved, freed from your violence, and may hope for the judgment and mercy of him who made it.”
  footnotes:
  - marker: a
    text: Or 'so that the whole earth may have rest'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:50:21Z'
    unchanged: false
    changes_summary: 'Adjusted phrasing for smoother English and closer lexical fit: removed repeated ''be'' before ''relieved'' to match the coordinated Latin verbs more naturally, and changed ''delivered from your violence'' to ''freed from your violence'' for a more direct rendering of liberata.'
translation:
  language: es
  text: y tus garras malignas y todo tu cuerpo sin valor, para que toda la tierra sea refrescada[a] y aliviada, liberada de tu violencia y espere el juicio y la misericordia de aquel que la hizo.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “para que toda la tierra tenga descanso”.'
    reason: alternative_reading para 'sea refrescada'
lexical_decisions:
- source_word: ungues tui pessimi
  english_pob_choice: your wicked claws
  chosen_spanish: tus garras malignas
  alternatives_spanish:
  - tus uñas perversas
  - tus garras malvadas
  lexicon: ungues = uñas/garras; pessimi = muy malas, perversas, malignas
  rationale: En este contexto de invectiva, 'garras' comunica mejor la imagen agresiva que 'uñas' en español, sin suavizar la fuerza del latín; 'malignas' conserva el valor moral de pessimi.
- source_word: omne corpus tuum uanum
  english_pob_choice: your whole worthless body
  chosen_spanish: todo tu cuerpo vano
  alternatives_spanish:
  - todo tu cuerpo inútil
  - todo tu cuerpo vacío
  lexicon: omne corpus = todo el cuerpo; uanum = vano, vacío, sin valor
  rationale: '''Vano'' es el equivalente más cercano y breve para uanum, y mantiene la idea de vaciedad/vanidad sin introducir una valoración diferente como ''inútil''.'
- source_word: refrigeret
  english_pob_choice: may be refreshed
  chosen_spanish: sea refrescada
  alternatives_spanish:
  - reciba alivio
  - tenga descanso
  lexicon: refrigerare = refrescar, aliviar, dar refrigerio
  rationale: Se conserva 'refrescada' para reflejar el matiz concreto del latín, en línea con la revisión auditada que descartó una traducción general por 'have rest'.
- source_word: releuetur liberata
  english_pob_choice: and relieved, freed
  chosen_spanish: y aliviada, liberada
  alternatives_spanish:
  - y descansada, liberada
  - y restaurada, liberada
  lexicon: relevare/liberare = aliviar/liberar
  rationale: '''Aliviada'' corresponde a releuetur y mantiene la coordinación con ''refrescada''; ''liberada'' reproduce liberata sin domesticar el verbo.'
- source_word: de tua ui
  english_pob_choice: from your violence
  chosen_spanish: de tu violencia
  alternatives_spanish:
  - de tu fuerza
  - de tu poder violento
  lexicon: ui = fuerza, violencia, poder
  rationale: '''Violencia'' es la opción más natural en español para la fuerza dañina que domina el contexto, y coincide con la lectura auditada del inglés.'
- source_word: speret iudicium et misericordiam
  english_pob_choice: may hope for the judgment and mercy
  chosen_spanish: espere el juicio y la misericordia
  alternatives_spanish:
  - aguarde el juicio y la misericordia
  - espere juicio y misericordia
  lexicon: sperare = esperar/aguardar; iudicium = juicio; misericordia = misericordia
  rationale: Se mantiene el paralelismo 'juicio y misericordia' sin añadir artículos innecesarios; 'espere' conserva el subjuntivo final de esperanza.
- source_word: eius qui fecit eam
  english_pob_choice: of him who made it
  chosen_spanish: de aquel que la hizo
  alternatives_spanish:
  - de quien la hizo
  - del que la hizo
  lexicon: facere = hacer/crear; eam = la
  rationale: '''Aquel que la hizo'' conserva una referencia personal y elevada al Creador, y ''la'' mantiene el antecedente femenino implícito para ''tierra''.'
theological_decisions:
- issue: Referencia al Creador y objeto femenino implícito
  english_pob_reading: him who made it
  chosen_spanish_reading: aquel que la hizo
  alternative_spanish_readings:
  - quien la hizo
  - el que la hizo
  rationale: El latín usa un pronombre femenino para la tierra implícita; en español conviene explicitar 'la' para evitar ambigüedad. Se mantiene la reverencia del sujeto creador sin introducir 'Dios' donde el texto no lo nombra.
  doctrine_reference: Creación y providencia; lenguaje reverente sin sobreespecificar el nombre divino
- issue: Tensión entre 'juicio' y 'misericordia'
  english_pob_reading: the judgment and mercy
  chosen_spanish_reading: el juicio y la misericordia
  alternative_spanish_readings:
  - juicio y misericordia
  - el juicio y la compasión
  rationale: Se preserva la tensión original entre justicia retributiva y compasión divina. 'Misericordia' es el término más estable en español bíblico y refleja el par del inglés auditado.
  doctrine_reference: Justicia y misericordia divinas en equilibrio
- issue: Valor destructivo de la violencia
  english_pob_reading: from your violence
  chosen_spanish_reading: de tu violencia
  alternative_spanish_readings:
  - de tu fuerza
  - de tu opresión
  rationale: '''Violencia'' transmite mejor el abuso de poder implícito en ui que una neutral ''fuerza''. La elección conserva el tono acusatorio del pasaje sin intensificarlo más allá del latín.'
  doctrine_reference: Juicio contra la opresión y el abuso
translation_notes:
  revision_awareness: La versión española sigue la revisión auditada que corrige el lugar del sintagma inicial 'ungues tui pessimi et omne corpus tuum uanum' dentro de 11:46 y que prefiere 'refrescada/refreshed' para refrigeret, en vez de una paráfrasis de 'tener descanso'. También refleja la coordinación verbal del latín (refrigeret / releuetur / liberata / speret) con una estructura española fluida pero cercana al texto.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del texto porque este versículo latino no nombra el tetragrámaton ni el griego κύριος; el sujeto creador queda genérico como en el latín.
  - Se evitó 'Cristo' y 'Señor' por no estar presentes en la unidad textual.
  - Se preservó 'misericordia' como término bíblico estándar, en paralelo con el inglés auditado.
  - La nota al pie marca la alternativa heredada de la traducción inglesa previa y no contradice la opción principal 'refrescada'.
