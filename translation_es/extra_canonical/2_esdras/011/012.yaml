translation:
  language: es
  text: Y miré, y he aquí que, del lado derecho, se levantó una sola ala y reinó sobre toda la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et uidi
  english_pob_choice: And I looked
  chosen_spanish: Y miré
  alternatives_spanish:
  - Y vi
  - Y contemplé
  lexicon: Latin uideo
  rationale: «Miré» reproduce la acción de observar con atención que el inglés POB expresa con «I looked»; «vi» sería posible, pero «miré» conserva mejor el matiz de visión atenta y narrativa apocalíptica.
- source_word: ecce
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - y he aquí
  lexicon: Latin ecce
  rationale: «He aquí» es la manera natural y digna de conservar el valor de sorpresa/solemnidad de «behold» en español bíblico contemporáneo.
- source_word: a dextera parte
  english_pob_choice: on the right side
  chosen_spanish: del lado derecho
  alternatives_spanish:
  - a la derecha
  - en la parte derecha
  lexicon: Latin dextera pars
  rationale: «Del lado derecho» mantiene el valor locativo del latín sin sonar artificial; evita una construcción demasiado rígida y sigue siendo fiel al referente espacial.
- source_word: una penna
  english_pob_choice: one wing
  chosen_spanish: una sola ala
  alternatives_spanish:
  - una ala
  - un ala
  lexicon: Latin penna
  rationale: «Ala» es el equivalente contextual de «penna» en esta visión; «una sola» explicita el énfasis numeral del latín y del inglés POB, preservando que no se trata de varias alas.
- source_word: regnauit
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - gobernó
  - dominó
  lexicon: Latin regnare
  rationale: «Reinó» conserva el sentido de ejercer dominio/regencia del verbo latino y coincide directamente con el inglés POB. «Gobernó» sería más interpretativo y menos cercano al tono regnal del texto.
- source_word: super omnem terram
  english_pob_choice: over all the earth
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - sobre toda la tierra habitada
  - sobre toda la tierra
  lexicon: Latin omnis terra
  rationale: «Sobre toda la tierra» sigue de cerca la amplitud total del latín y del inglés POB sin introducir una expansión explicativa como «habitada».
theological_decisions:
- issue: Alcance simbólico de la visión del ala que reina
  english_pob_reading: one wing rose up and reigned over all the earth
  chosen_spanish_reading: una sola ala se levantó y reinó sobre toda la tierra
  alternative_spanish_readings:
  - un ala se levantó y gobernó sobre toda la tierra
  - una sola ala se alzó y dominó sobre toda la tierra
  rationale: El texto latino presenta una imagen visionaria, no una explicación doctrinal desarrollada. Por eso se conserva la literalidad simbólica sin suavizar el verbo «reinó» ni convertir la imagen en paráfrasis interpretativa.
  doctrine_reference: 2 Esdras 11:12; visión apocalíptica simbólica
- issue: Conservación del matiz de singularidad en la imagen
  english_pob_reading: one wing
  chosen_spanish_reading: una sola ala
  alternative_spanish_readings:
  - una ala
  - un ala
  rationale: La singularidad forma parte del valor visionario del signo. «Una sola ala» preserva ese énfasis sin añadir interpretación, y sigue siendo natural en español.
  doctrine_reference: 2 Esdras 11:12; simbolismo numérico
translation_notes:
  revision_awareness: La versión inglesa POB permanece sin cambios según el último pase; el latín limpio muestra un enunciado breve y estable. La propuesta española sigue de cerca tanto el original latino como la solución inglesa aprobada, sin necesidad de notas textuales o alternativas adicionales.
  spanish_consistency_notes:
  - Se mantiene «ala» para penna según el contexto visionario, no el sentido literal de «pluma».
  - Se evita mayúsculas teológicas innecesarias porque el pasaje no contiene un nombre divino explícito.
  - La puntuación reproduce el ritmo breve y enfático del latín y del inglés POB.
