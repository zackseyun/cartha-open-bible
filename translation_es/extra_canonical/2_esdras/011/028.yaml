translation:
  language: es
  text: los que quedaban estaban planeando entre sí reinar también; y mientras pensaban esto, he aquí, una de las cabezas que descansaban,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: superauerunt
  english_pob_choice: those that remained
  chosen_spanish: los que quedaban
  alternatives_spanish:
  - los que permanecían
  - los restantes
  lexicon: superare
  rationale: El latín indica a los que ‘quedaban’ o ‘sobrevivían’ en contraste con los demás; ‘los que quedaban’ conserva esa relación sin añadir matices ajenos.
- source_word: apud semetipsas cogitabant
  english_pob_choice: were planning among themselves
  chosen_spanish: estaban pensando entre sí
  alternatives_spanish:
  - consideraban entre sí
  - maquinaban entre sí
  lexicon: cogitare
  rationale: ‘Cogitabant’ expresa un proceso de pensamiento deliberado; ‘estaban pensando entre sí’ reproduce el movimiento interno y recíproco sin forzar una connotación más negativa de la que el latín exige.
- source_word: et ipsae regnare
  english_pob_choice: to reign as well
  chosen_spanish: también en reinar
  alternatives_spanish:
  - también a reinar
  - que también reinarían
  lexicon: regnare
  rationale: La construcción latina es breve y coordinada; en español conviene mantener ‘reinar’ como infinitivo dependiente de ‘pensando’, con ‘también’ para conservar la idea de adición ('ipsae').
- source_word: Et in eo cum cogitarent
  english_pob_choice: and while they were planning this
  chosen_spanish: y mientras pensaban esto
  alternatives_spanish:
  - y mientras meditaban esto
  - y al pensar esto
  lexicon: cogitare
  rationale: ‘Cum cogitarent’ pide simultaneidad; ‘mientras pensaban esto’ es la forma más natural en español y mantiene el valor progresivo del imperfecto.
- source_word: unum de quiescentium capitum
  english_pob_choice: one of the resting heads
  chosen_spanish: una de las cabezas que descansaban
  alternatives_spanish:
  - una de las cabezas reposadas
  - una de las cabezas dormidas
  lexicon: caput
  rationale: El sustantivo ‘cabezas’ debe mantenerse por la imagen simbólica del texto; ‘que descansaban’ conserva el sentido de ‘quiescentium’ sin introducir el desarrollo interpretativo que pertenece al versículo siguiente.
theological_decisions:
- issue: Imagen simbólica de las cabezas que reposan y el alcance temporal del versículo
  english_pob_reading: one of the resting heads,
  chosen_spanish_reading: una de las cabezas que descansaban,
  alternative_spanish_readings:
  - una de las cabezas reposando,
  - una de las cabezas dormidas,
  rationale: El texto latino de este versículo sólo introduce una cabeza entre las que estaban en reposo; no incluye todavía el despertar ni la identificación de la cabeza del medio. La traducción española debe detenerse ahí para no importar contenido del versículo siguiente.
  doctrine_reference: No aplica como doctrina; corresponde a delimitación textual y narrativa.
translation_notes:
  revision_awareness: 'Se revisó el realineamiento del pasaje según la corrección del auditor: el versículo 28 termina en ‘unum de quiescentium capitum’ y no debe incluir el despertar de la cabeza del medio, que pertenece al versículo 29. Por eso no se conserva la nota anterior de ‘awoke’ y se evita cualquier expansión interpretativa.'
  spanish_consistency_notes:
  - Se mantiene ‘cabezas’ para caput por coherencia con la imaginería del capítulo.
  - Se usa ‘los que quedaban’ para reflejar el sujeto plural implícito confirmado por la revisión inglesa.
  - No se introduce ‘Yahvé’, ‘Mesías’ ni otras equivalencias teológicas no presentes en este versículo.
  - La puntuación separa con punto y coma las dos acciones principales, siguiendo la división sintáctica del latín.
