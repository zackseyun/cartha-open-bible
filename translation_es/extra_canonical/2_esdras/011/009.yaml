translation:
  language: es
  text: Pero las cabezas queden reservadas para el final.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Capita
  english_pob_choice: the heads
  chosen_spanish: las cabezas
  alternatives_spanish:
  - los jefes
  - los principales
  lexicon: Latin caput -> Spanish cabeza; plural literal
  rationale: El latín capĭta es el plural de caput, cuyo sentido básico es «cabezas». Dado que el inglés POB conserva «heads», la versión española mantiene el equivalente literal sin sustituirlo por un título interpretativo como «jefes», que añadiría un matiz no garantizado por el texto.
- source_word: seruentur
  english_pob_choice: be reserved
  chosen_spanish: queden reservadas
  alternatives_spanish:
  - sean reservadas
  - se reserven
  lexicon: Latin servo (pasivo subjuntivo) -> reservar/guardar
  rationale: El pasivo subjuntivo seruentur expresa que algo sea mantenido aparte o preservado. «Queden reservadas» comunica esa idea con naturalidad en español y preserva la pasividad y la finalidad implícita.
- source_word: in nouissimo
  english_pob_choice: for the end
  chosen_spanish: para el final
  alternatives_spanish:
  - para el fin
  - al final
  lexicon: Latin novissimum -> último, final, extremo
  rationale: El audit trail inglés corrigió «for the last» a «for the end», señalando que nouissimo remite a la idea de finalidad o último momento, no a una simple secuencia. «Para el final» conserva esa fuerza temporal y evita una lectura demasiado adverbial o idiomática.
theological_decisions:
- issue: Sentido de la frase final sin desarrollar una interpretación adicional
  english_pob_reading: But let the heads be reserved for the end.
  chosen_spanish_reading: Pero las cabezas queden reservadas para el final.
  alternative_spanish_readings:
  - Pero que las cabezas se guarden para el fin.
  - Pero las cabezas se reserven para el fin.
  rationale: No se explicita en la fuente quién reserva ni con qué propósito exacto más allá de la preservación hasta el final. La redacción española conserva esa ambigüedad sin añadir una explicación teológica o narrativa que el latín no exige.
  doctrine_reference: Principio de fidelidad al alcance semántico del texto fuente; evitar sobreinterpretación
- issue: Mantener la literalidad de «heads» sin convertirlo en una categoría de liderazgo
  english_pob_reading: the heads
  chosen_spanish_reading: las cabezas
  alternative_spanish_readings:
  - los jefes
  - los principales
  rationale: Aunque «cabezas» puede resultar menos idiomático en español, el texto latino y la traducción inglesa auditada no ofrecen base suficiente para convertirlo en «jefes» o «principales». Se preserva así la imagen o término literal, dejando la posible interpretación contextual al lector y a notas críticas si fueran necesarias.
  doctrine_reference: Principio de no borrar tensiones léxicas documentadas
translation_notes:
  revision_awareness: El texto inglés de referencia fue revisado desde «for the last» a «for the end» para reflejar mejor el latín nouissimo; la versión española sigue esa revisión con «para el final» y no adopta una formulación temporal más estrecha como «al final» para evitar perder la idea de término/consumación.
  spanish_consistency_notes:
  - Se mantiene «cabezas» como equivalente literal de capita, en coherencia con la decisión inglesa auditada.
  - Se evita «SEÑOR» u otras convenciones de sustitución no presentes en la fuente; no aplica aquí por ausencia del nombre divino.
  - La puntuación reproduce una sola cláusula breve y directa, adecuada al carácter oracular del fragmento.
