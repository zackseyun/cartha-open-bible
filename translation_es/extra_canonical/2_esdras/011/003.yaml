- from: Y miré[a], y de sus alas brotaban alas opuestas, y estas se volvían en pinitos pequeños y leves.
  to: Y miré[a], y de sus alas brotaban alas opuestas, y estas se convertían en alitas, pequeñas y leves.
  rationale: Se conserva la interpretación auditada de penna como «ala» en el texto principal y «plumas» como alternativa. Se reemplaza «pinitos pequeños y leves» por «alitas, pequeñas y leves» para dar un español natural y claro que aún refleje el diminutivo de pennaculis y los adjetivos minutis et modicis. También se ajusta «se volvían en» a «se convertían en» para mejor fluidez.
