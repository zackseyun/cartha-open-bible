translation:
  language: es
  text: Y miré[a], y de sus alas brotaban alas opuestas, y estas se convertían en alitas, pequeñas y leves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de sus plumas brotaban alas opuestas».
    reason: alternative_reading
lexical_decisions:
- source_word: Et uidi
  english_pob_choice: And I looked
  chosen_spanish: Y miré
  alternatives_spanish:
  - Y vi
  - Y observé
  lexicon: udir / videre
  rationale: El latín visionario uidi aquí funciona como fórmula de visión; «miré» conserva el acto de contemplar en una escena revelatoria y encaja con el registro narrativo del pasaje.
- source_word: de pennis eius
  english_pob_choice: from its wings
  chosen_spanish: de sus alas
  alternatives_spanish:
  - de sus plumas
  - de sus plumas/alas
  lexicon: penna
  rationale: Sigo la decisión auditada de entender pennae/pennis como «alas» en este contexto de visión del águila, por consistencia con los versículos cercanos y con el cuerpo aviar imaginado.
- source_word: contrariae pennae
  english_pob_choice: opposite wings
  chosen_spanish: alas opuestas
  alternatives_spanish:
  - alas contrarias
  - alas contrapuestas
  lexicon: penna; contrarius
  rationale: «Opuestas» reproduce con naturalidad contrariae y mantiene la relación de contraste físico/posicional, sin cargar innecesariamente una lectura polémica que el latín no obliga por sí solo.
- source_word: et ipsae fiebant
  english_pob_choice: and these became
  chosen_spanish: y estas se volvían
  alternatives_spanish:
  - y ellas se hacían
  - y estas llegaban a ser
  lexicon: fieri
  rationale: «Se volvían» expresa bien el proceso de cambio gradual de fiebant y conserva el matiz de devenir sin forzar una transformación instantánea.
- source_word: in pennaculis minutis et modicis
  english_pob_choice: little pinions, small and slight
  chosen_spanish: en pinitos pequeños y leves
  alternatives_spanish:
  - en alitas pequeñas y ligeras
  - en pequeñas plumas, menudas y leves
  lexicon: pennaculum; minutus; modicus
  rationale: «Pinitos» intenta reflejar la idea diminutiva de pennaculis y el valor de menor tamaño; «pequeños y leves» reproduce minutis et modicis como disminución de tamaño y de peso/tenue apariencia.
theological_decisions:
- issue: Imagen visionaria de alas que surgen de alas
  english_pob_reading: from its wings there grew opposite wings
  chosen_spanish_reading: de sus alas brotaban alas opuestas
  alternative_spanish_readings:
  - de sus alas nacían alas opuestas
  - de sus alas crecían alas opuestas
  rationale: No hay aquí un término doctrinal directo, pero sí una imaginería apocalíptica que conviene preservar con el verbo «brotaban», más visual y orgánico, sin añadir interpretación alegórica.
  doctrine_reference: Apocalíptica / imaginería profética
translation_notes:
  revision_awareness: La revisión inglesa pasó de «opposing wings» a «opposite wings» para acercarse más a contrariae; la versión española mantiene «alas opuestas», que corresponde directamente a esa lectura y conserva la consistencia interna con el campo léxico de alas en esta perícopa.
  spanish_consistency_notes:
  - Se mantiene «alas» para pennae/pennis por coherencia contextual con los versículos vecinos y con la revisión auditada del inglés.
  - «Pinitos» intenta conservar el diminutivo de pennaculis; aunque menos literal que «alitas», evita perder el matiz de pequeñez extrema.
  - La nota ofrece la alternativa «plumas» porque el latín penna puede admitir esa ambigüedad, y el inglés auditado la preservó como variante previa.
