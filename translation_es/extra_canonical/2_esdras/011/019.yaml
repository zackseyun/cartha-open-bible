translation:
  language: es
  text: 'Y así sucedía a todas las alas, una por una: gobernaban.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et sic contingebat
  english_pob_choice: And so it happened
  chosen_spanish: Y así sucedía
  alternatives_spanish:
  - Y así acontecía
  - Y así ocurría
  lexicon: Latin contingebat
  rationale: Contingebat expresa un hecho que iba sucediendo de manera narrativa; "sucedía" mantiene el registro natural y el valor aspectual sin endurecer el estilo.
- source_word: omnibus alis singulatim
  english_pob_choice: to all the wings one by one
  chosen_spanish: con todas las alas, una por una
  alternatives_spanish:
  - a todas las alas, una por una
  - para todas las alas, una por una
  lexicon: Latin omnibus alis singulatim
  rationale: '"Omnibus... singulatim" pide una distribución individual; "una por una" conserva esa progresión. "Alas" se mantiene literalmente porque el texto latino habla de alas, y el POB inglés también lo conserva.'
- source_word: principatum
  english_pob_choice: they held rule
  chosen_spanish: ejercían el poder
  alternatives_spanish:
  - tenían el dominio
  - gobernaban
  lexicon: Latin principatum
  rationale: Principatum puede referirse a preeminencia, primacía o gobierno. "Ejercían el poder" comunica la idea de ejercer autoridad sin imponer una especificidad política mayor de la que el contexto inmediato garantiza.
theological_decisions:
- issue: Sentido de principatum como ejercicio de autoridad o dominio
  english_pob_reading: they held rule
  chosen_spanish_reading: ejercían el poder
  alternative_spanish_readings:
  - tenían el dominio
  - gobernaban
  rationale: La imagen no desarrolla una doctrina específica, pero sí un cambio de gobierno o supremacía. "Ejercían el poder" preserva la noción de dominio sin forzar una estructura política concreta.
  doctrine_reference: No aplica; texto apocalíptico/simbólico sin formulación doctrinal explícita.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que eliminó la frase añadida 'and then were nowhere to be seen again' porque no pertenece al latín transmitido aquí. La traducción española no incorpora material ajeno al texto base y sigue el sentido breve de la forma latina limpiada.
  spanish_consistency_notes:
  - Se mantuvo un español sobrio y publicable, evitando arcaísmos innecesarios.
  - No se usó puntuación explicativa adicional más allá de la pausa natural marcada por dos puntos, en paralelo con el inglés POB.
  - '"Alas" se conservó literalmente porque no hay base suficiente en este versículo para reinterpretarlo como otra figura.'
