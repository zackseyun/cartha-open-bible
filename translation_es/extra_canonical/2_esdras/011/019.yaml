    issue: La preposición 'con' en 'con todas las alas' no refleja tan bien la relación distributiva del original.
    rationale: Omnibus alis singulatim y el inglés auditado 'to all the wings one by one' apuntan mejor a 'a todas las alas, una por una' que a una construcción con 'con'.
  - severity: medium
    issue: '''Ejercían el poder'' suaviza la noción de principatum/held rule.'
    rationale: Aunque comunica autoridad, principatum aquí se acerca más a reinar, gobernar o tener el dominio. 'Gobernaban' es más idiomático y más cercano al sentido del inglés POB.
  revised_spanish_text: 'Y así sucedía a todas las alas, una por una: gobernaban.'
  revision_rationale: Se ajusta la preposición para reflejar mejor la distribución individual del latín ('a todas las alas, una por una') y se sustituye 'ejercían el poder' por 'gobernaban' para representar con mayor precisión principatum y el inglés auditado 'they held rule', manteniendo un español natural y digno.
