translation:
  language: es
  text: Desaparecieron las doce alas y las dos alitas. Y no quedó nada en el cuerpo del águila, excepto las tres cabezas en reposo y seis alitas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: conparuerunt
  english_pob_choice: disappeared
  chosen_spanish: desaparecieron
  alternatives_spanish:
  - se desvanecieron
  - ya no aparecieron
  lexicon: conparere
  rationale: El latín expresa desaparición/aparición cesada; «desaparecieron» reproduce de manera natural y directa el cambio de estado adoptado por la POB en inglés, sin suavizarlo a una mera falta de visibilidad.
- source_word: pennae
  english_pob_choice: wings
  chosen_spanish: alas
  alternatives_spanish:
  - plumas
  - alas
  lexicon: penna
  rationale: Aquí el contexto del águila exige «alas», no «plumas», porque el texto alude a las partes mayores del símbolo y la POB en inglés ya lo fija así.
- source_word: pennacula
  english_pob_choice: little pinions
  chosen_spanish: penoncillos
  alternatives_spanish:
  - alitas
  - pinitos
  lexicon: pennaculum
  rationale: Se conserva el matiz diminutivo con un término español comprensible y relativamente transparente. «Penoncillos» mantiene la relación formal con «penna» y el valor de pequeñez que la POB refleja con «little pinions».
- source_word: corpore aquilae
  english_pob_choice: eagle’s body
  chosen_spanish: cuerpo del águila
  alternatives_spanish:
  - cuerpo de la águila
  - cuerpo del águila
  lexicon: corpus
  rationale: «Cuerpo» es la equivalencia más directa; «del águila» respeta el genitivo y suena natural en español.
- source_word: quiescentia
  english_pob_choice: resting
  chosen_spanish: que reposaban
  alternatives_spanish:
  - en reposo
  - descansando
  lexicon: quiescere
  rationale: El participio indica estar en reposo. «Que reposaban» conserva la imagen estática y evita introducir una explicación no presente en el texto.
- source_word: capita
  english_pob_choice: heads
  chosen_spanish: cabezas
  alternatives_spanish:
  - cabezas
  - cálices
  lexicon: caput
  rationale: «Cabezas» reproduce el sentido literal requerido por el símbolo del águila y coincide con la elección de la POB en inglés.
theological_decisions:
- issue: Tratamiento del símbolo del águila
  english_pob_reading: the eagle’s body / three resting heads / six little pinions
  chosen_spanish_reading: el cuerpo del águila / las tres cabezas que reposaban / seis penoncillos
  alternative_spanish_readings:
  - el cuerpo del águila / las tres cabezas en reposo / seis alitas
  rationale: El texto sigue presentando una visión simbólica sin explicarla. La traducción debe conservar la imaginería sin interpretarla alegóricamente ni sustituir el símbolo por un equivalente doctrinal.
  doctrine_reference: Simbolismo apocalíptico / visión profética, sin glosa doctrinal añadida
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que sustituyó «were no longer visible» por «disappeared» para reflejar con mayor inmediatez conparuerunt; por eso se eligió «desaparecieron» en español. También se mantuvo el resto de la cláusula con una sintaxis equivalente y sin añadir explicaciones.
  spanish_consistency_notes:
  - Se mantiene «águila» como símbolo, no como ave literal explicada.
  - «Penoncillos» preserva el diminutivo y la correspondencia con el inglés POB «little pinions».
  - 'La puntuación reproduce la bipartición del latín y del inglés: desaparición de alas/penoncillos, luego saldo residual del cuerpo.'
