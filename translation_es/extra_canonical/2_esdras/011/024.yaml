translation:
  language: es
  text: Y miré, y he aquí, dos de las seis pequeñas alas se separaron y quedaron debajo de la cabeza que estaba a la derecha; pues
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et uidi et ecce
  english_pob_choice: And I looked, and behold
  chosen_spanish: Y miré, y he aquí
  alternatives_spanish:
  - Y vi, y he aquí
  - Y miré, y he aquí
  lexicon: vidi -> mirar/ver; ecce -> he aquí
  rationale: La secuencia visionaria latina se rinde de forma natural con «miré» y la fórmula reverente «he aquí», que conserva el carácter de observación repentina sin sobrecargar el español con calco rígido.
- source_word: de sex pennaculis diuisa sunt duo
  english_pob_choice: two of the six little pinions were separated
  chosen_spanish: dos de las seis pequeñas alas se separaron
  alternatives_spanish:
  - dos de las seis pequeñas alitas se separaron
  - dos de las seis pequeñas alas fueron separadas
  lexicon: pennacula -> pequeñas alas / alitas; diuisa sunt -> se separaron
  rationale: «Pennacula» puede sugerir pequeñas alas o alas menores; «pequeñas alas» comunica bien la imagen sin infantilizarla en exceso. «Se separaron» sigue la voz pasiva de sentido resultativo del latín y evita forzar un agente no expresado.
- source_word: et manserunt sub capite
  english_pob_choice: and remained under the head
  chosen_spanish: y quedaron debajo de la cabeza
  alternatives_spanish:
  - y permanecieron debajo de la cabeza
  - y quedaron bajo la cabeza
  lexicon: manserunt -> quedaron/permanecieron; sub -> debajo de
  rationale: «Quedaron» expresa con naturalidad el estado resultante y mantiene la idea de permanencia subyacente del latín. «Debajo de» es más idiomático que «bajo» en este contexto visual.
- source_word: quod est ad dexteram partem
  english_pob_choice: that was on the right side
  chosen_spanish: que estaba a la derecha
  alternatives_spanish:
  - que estaba en el lado derecho
  - que estaba a la derecha
  lexicon: ad dexteram partem -> a la derecha / en el lado derecho
  rationale: La frase latina describe posición espacial; «a la derecha» es la forma más fluida y fiel en español. Se evita añadir «lado» salvo que se necesite explicitar la imagen.
- source_word: nam
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - pues
  - ya que
  lexicon: nam -> pues/porque/ya que
  rationale: El pasaje queda en cola causal en el fragmento recibido. «Pues» reproduce con dignidad la relación explicativa de «nam» sin sonar excesivamente arcaico como «porque» en esta posición final.
theological_decisions:
- issue: Imagen de las alas/piniones como elemento visionario no explicado
  english_pob_reading: two of the six little pinions were separated and remained under the head that was on the right side
  chosen_spanish_reading: dos de las seis pequeñas alas se separaron y quedaron debajo de la cabeza que estaba a la derecha
  alternative_spanish_readings:
  - dos de las seis pequeñas alas se separaron y quedaron debajo de la cabeza del lado derecho
  - dos de las seis pequeñas alas se separaron y quedaron debajo de la cabeza que estaba a la derecha
  rationale: No se interpreta simbólicamente la imagen ni se aclara el referente más allá de lo que el texto permite. La traducción conserva la extrañeza visionaria del original, que es parte de su fuerza narrativa.
  doctrine_reference: Respeto al sentido literal y al carácter apocalíptico-visionario del pasaje.
- issue: Conector causal final truncado
  english_pob_reading: for
  chosen_spanish_reading: pues
  alternative_spanish_readings:
  - porque
  - ya que
  - pues
  rationale: El fragmento latino termina con «nam», de modo que el conector debe quedar abierto o continuar en el verso siguiente. «Pues» mantiene esa apertura sin cerrar artificialmente el argumento.
  doctrine_reference: Coherencia textual y manejo prudente de fragmentos sintácticamente incompletos.
translation_notes:
  revision_awareness: Tomé como base la revisión más reciente del audit trail, que corrige la relación partitiva a «two of the six little pinions» y entiende «nam» como causal («for»), no adversativa. La versión española refleja esa lectura y evita invertir la relación de pertenencia o introducir una oposición inexistente en el latín.
  spanish_consistency_notes:
  - Se mantiene «Y miré, y he aquí» como fórmula visionaria consistente con el registro bíblico del proyecto.
  - Se usa «pequeñas alas» para pennacula, en línea con la imagen diminutiva y sin imponer terminología eclesiástica ajena.
  - Se conserva el conector final abierto con «pues», porque el versículo continúa en la unidad mayor del texto.
