base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/011/024.yaml
  text: And I looked, and behold, two of the six little pinions were separated and remained under the head that was on the right side; for
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:51:30Z'
    unchanged: false
