  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la imaginería principal del latín y conserva la cláusula final añadida por la revisión inglesa. Sin embargo, contiene un error textual grave en el segundo verbo (''իշó''), y además no sigue de forma consistente sus propias decisiones léxicas documentadas: el borrador dice ''tuvieron dominio''/''con mucho opresión'' donde la evidencia y la justificación piden una formulación española más natural y fiel. También conviene ajustar ''más que todas las alas'' a ''más que todas las alas que habían sido antes de ella'' o equivalente, para reflejar mejor quae fuerunt.'
  spanish_quality_summary: La frase es generalmente comprensible y mantiene un registro digno, pero presenta un carácter corrupto/ininteligible ('իշó'), una construcción antinatural ('con mucho opresión') y una leve rigidez en 'habían existido antes de ella'. Una revisión menor deja el verso claro, natural y fiel.
  glossary_alignment: No hay términos del glosario teológico central en juego. La conservación de 'cabeza' y 'alas' como símbolos sí está bien alineada con la justificación del proyecto. La lectura contextual de labore como 'opresión' puede mantenerse, pero en español debe expresarse como 'con mucha opresión' o mejor 'con gran opresión'.
  issues:
  - severity: high
    issue: Error textual/carácter corrupto en 'e իշó'
    rationale: El borrador contiene una secuencia ilegible que hace fallar el sentido en una cláusula principal. Debe repararse para reflejar 'dominauit'.
  - severity: medium
    issue: Discordancia entre decisiones léxicas y texto final
    rationale: Las decisiones documentan 'e impuso su dominio a los que la habitaban' y 'con mucha opresión', pero el texto muestra otra redacción, incluida una forma incorrecta ('mucho opresión'). La revisión debe armonizar texto y razonamiento.
  - severity: low
    issue: '''habían existido antes de ella'' suena pesado'
    rationale: Aunque es entendible, una formulación como 'habían sido antes de ella' o 'la habían precedido' suena más natural; dado que el inglés auditado conserva la referencia temporal literal, se puede mantener una forma cercana sin rigidez excesiva.
  revised_spanish_text: Y esta cabeza dominó sobre toda la tierra y oprimió con mucha[a] opresión a los que la habitaban, y tuvo dominio sobre el mundo habitado más que todas las alas que habían sido antes de ella. Y vi después de estas cosas, y he aquí,
  revised_footnotes:
  - marker: a
    text: O "con gran opresión". El latín dice literalmente "con mucho labor/trabajo", pero aquí se entiende en el sentido de carga opresiva o aflicción impuesta por su dominio.
    reason: La frase latina cum labore multo es semánticamente amplia; la nota preserva la base literal y justifica la lectura contextual de opresión en español.
  revision_rationale: Se corrigió un error textual grave, se restauró el sentido del segundo verbo conforme al latín y al inglés auditado, y se reparó la gramática española en 'mucha opresión'. Se añadió una nota porque la interpretación de labore como opresión no es la opción más literal, aunque sí la más contextual aquí. Se mantuvo la imaginería simbólica de 'cabeza' y 'alas' y la cláusula final en suspensión.
