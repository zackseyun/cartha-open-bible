id: 2ES.11.32
reference: 2 Esdras 11:32
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: caput percontinuit omnem terram et dominauit qui inhabitant in ea cum labore multo et potentatum tenuit orbis terrarum super omnes alas quae fuerunt. Et uidi post haec et ecce
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/011/032.yaml
  text: And this head held sway over the whole earth and ruled those who inhabited it with much oppression, and it held dominion over the inhabited world more than all the wings that had been before it. And I saw after these things, and behold,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:50:07Z'
    unchanged: false
    changes_summary: Added the final clause present in the source ('And I saw after these things, and behold,') and changed 'it had dominion' to 'it held dominion' for consistency with the surrounding verbal style.
translation:
  language: es
  text: Y esta cabeza dominó sobre toda la tierra y oprimió con mucha[a] opresión a los que la habitaban, y tuvo dominio sobre el mundo habitado más que todas las alas que habían sido antes de ella. Y vi después de estas cosas, y he aquí,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "con gran opresión". El latín dice literalmente "con mucho labor/trabajo", pero aquí se entiende en el sentido de carga opresiva o aflicción impuesta por su dominio.
    reason: La frase latina cum labore multo es semánticamente amplia; la nota preserva la base literal y justifica la lectura contextual de opresión en español.
lexical_decisions:
- source_word: caput
  english_pob_choice: this head
  chosen_spanish: esta cabeza
  alternatives_spanish:
  - este jefe
  - esta figura
  lexicon: caput
  rationale: El latín nombra literalmente una 'cabeza'; la imagen se conserva en español como 'cabeza' porque el POB inglés también mantiene la metáfora y no ofrece una interpretación explicativa. Se evita 'jefe' porque suaviza la imaginería apocalíptica del símbolo.
- source_word: percontinuit omnem terram
  english_pob_choice: held sway over the whole earth
  chosen_spanish: dominó sobre toda la tierra
  alternatives_spanish:
  - gobernó sobre toda la tierra
  - se extendió sobre toda la tierra
  lexicon: per-continuo / dominare
  rationale: '''Dominó'' expresa el control efectivo y la continuidad del poder sin forzar un calco de ''held sway''. ''Toda la tierra'' corresponde directamente a ''omnem terram'' y mantiene el alcance universal.'
- source_word: dominauit qui inhabitant in ea
  english_pob_choice: ruled those who inhabited it
  chosen_spanish: e impuso su dominio a los que la habitaban
  alternatives_spanish:
  - y gobernó a los que la habitaban
  - y dominó a los que la habitaban
  lexicon: dominare
  rationale: El verbo latino repite la idea de dominio; en español, 'impuso su dominio' comunica mejor la relación de sujeción sobre los habitantes que un simple 'gobernó'. 'A los que la habitaban' sigue de cerca el participio latino sin perder naturalidad.
- source_word: cum labore multo
  english_pob_choice: with much oppression
  chosen_spanish: con mucha opresión
  alternatives_spanish:
  - con gran fatiga
  - con mucho trabajo
  lexicon: labor
  rationale: El inglés POB interpreta 'labore' como opresión, probablemente por el contexto de dominio abusivo. En español se conserva esa lectura con 'opresión', que expresa la dureza del sometimiento y no reduce el sentido a 'trabajo' o 'fatiga'.
- source_word: potentatum tenuit
  english_pob_choice: it held dominion
  chosen_spanish: tuvo dominio
  alternatives_spanish:
  - mantuvo el dominio
  - sostuvo el dominio
  lexicon: potentatum / tenere
  rationale: '''Tuvo dominio'' reproduce de manera sobria la idea de posesión y ejercicio de poder, siguiendo la revisión inglesa que prefirió ''held dominion'' para mantener el estilo verbal del contexto. ''Mantuvo el dominio'' sería posible, pero añade una matiz de persistencia no explícito en el latín.'
- source_word: orbis terrarum
  english_pob_choice: the inhabited world
  chosen_spanish: el mundo habitado
  alternatives_spanish:
  - el orbe de la tierra
  - la tierra habitada
  lexicon: orbis terrarum
  rationale: '''Mundo habitado'' es una equivalencia natural y ampliamente comprensible en español; preserva el valor geográfico-universal de ''orbis terrarum'' sin introducir un registro demasiado técnico.'
- source_word: super omnes alas quae fuerunt
  english_pob_choice: more than all the wings that had been before it
  chosen_spanish: más que todas las alas que habían existido antes de ella
  alternatives_spanish:
  - más que todas las alas que la precedieron
  - por encima de todas las alas anteriores
  lexicon: ala
  rationale: Se mantiene 'alas' porque el POB inglés conserva la imagen sin explicarla. En español, 'habían existido antes de ella' ayuda a que la frase sea inteligible sin desfigurar el símbolo. 'Antes de ella' concuerda con 'cabeza' como antecedente implícito.
- source_word: Et uidi post haec et ecce
  english_pob_choice: And I saw after these things, and behold,
  chosen_spanish: Y vi después de estas cosas, y he aquí,
  alternatives_spanish:
  - Y después de esto vi, y he aquí,
  - Vi luego de estas cosas, y he aquí,
  lexicon: vidi / ecce
  rationale: Se conserva la fórmula visionaria directa del latín. 'He aquí' mantiene la apertura solemne y expectante del original y del POB inglés, que deja la frase en suspensión para enlazar con el versículo siguiente.
theological_decisions:
- issue: Interpretación del símbolo de la 'cabeza' y de las 'alas'
  english_pob_reading: The head and wings are kept as symbolic imagery without explanatory harmonization.
  chosen_spanish_reading: La cabeza y las alas se conservan como imágenes simbólicas sin armonización explicativa.
  alternative_spanish_readings:
  - El rey y los reinos
  - la cabeza y las naciones
  rationale: El texto latino presenta una visión simbólica, y el POB inglés no la redefine alegóricamente. En español se preserva la misma tensión imagética para no exceder la evidencia textual.
  doctrine_reference: Principio de literalidad simbólica en literatura apocalíptica
- issue: '''labore multo'' como opresión'
  english_pob_reading: much oppression
  chosen_spanish_reading: con mucha opresión
  alternative_spanish_readings:
  - con mucho trabajo
  - con gran fatiga
  rationale: Aunque 'labore' puede significar trabajo o fatiga, el contexto de dominio sobre los habitantes favorece una idea de opresión. La traducción española mantiene esa lectura contextual sin ocultar la dureza del poder descrito.
  doctrine_reference: Contexto semántico de términos de carga/aflicción en narrativa visionaria
- issue: Continuidad verbal del cierre visionario
  english_pob_reading: And I saw after these things, and behold,
  chosen_spanish_reading: Y vi después de estas cosas, y he aquí,
  alternative_spanish_readings:
  - Y luego vi, y he aquí,
  - Después de esto vi, y he aquí,
  rationale: Se preserva la cláusula final añadida en la revisión inglesa porque pertenece al texto fuente y deja la visión en suspensión, preparatoria del versículo siguiente.
  doctrine_reference: Respeto por límites de versículo y clausulas de transición
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió dos puntos: añadió la cláusula final ''And I saw after these things, and behold,'' ausente en la primera redacción, y ajustó ''it had dominion'' a ''it held dominion'' por consistencia estilística. La versión española incorpora ambos cambios: conserva la cláusula final de visión y usa una formulación verbal estable (''tuvo dominio'') que mantiene el estilo del contexto.'
  spanish_consistency_notes:
  - Se ha usado 'tierra' para 'omnem terram' y 'mundo habitado' para 'orbis terrarum' para distinguir el ámbito total del ámbito civilizado/universo poblado.
  - Se mantiene el antecedente femenino implícito ('ella') por concordancia con 'cabeza'.
  - No se introducen notas de pie porque no hay variantes textuales ni alternativas lexicales que requieran anclaje explícito en el texto principal.
