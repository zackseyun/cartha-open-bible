translation:
  language: es
  text: Ella tuvo poder[a] durante mucho tiempo. Y sucedió que, cuando reinaba,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ella mantuvo poder durante mucho tiempo»
