lexical_decisions:
- source_word: ipsa multum tenuit tempus
  english_pob_choice: It held power for a long time
  chosen_spanish: Ella tuvo gran poder durante mucho tiempo
  alternatives_spanish:
  - Ella mantuvo poder durante mucho tiempo
  - Ella conservó gran poder por largo tiempo
  lexicon: ipsa / tenuit / tempus
  rationale: La cláusula latina describe duración de dominio o poder sostenido; en español, «tuvo gran poder durante mucho tiempo» conserva la fuerza temporal sin volverlo demasiado literal ni introducir un sujeto innatural. Se usa «ella» para el antecedente implícito del texto previo.
- source_word: cum regnaret
  english_pob_choice: when it reigned
  chosen_spanish: cuando reinaba
  alternatives_spanish:
  - cuando gobernaba
  - mientras reinaba
  lexicon: cum + subjunctive of regnare
  rationale: «Reinaba» reproduce el valor de estado en progreso del imperfecto subjuntivo latino con un español natural y solemne. «Gobernaba» sería posible, pero «reinaba» corresponde mejor al registro monárquico del pasaje.
theological_decisions:
- issue: Referencia implícita al sujeto femenino del contexto inmediato
  english_pob_reading: It held power for a long time. And it happened that when it reigned,
  chosen_spanish_reading: Ella tuvo gran poder durante mucho tiempo. Y sucedió que, cuando reinaba,
  alternative_spanish_readings:
  - Esto tuvo gran poder durante mucho tiempo. Y sucedió que, cuando reinaba,
  - Tuvo gran poder durante mucho tiempo. Y sucedió que, cuando reinaba,
  rationale: El latín usa un pronombre enfático femenino singular («ipsa»), que en el contexto de 2 Esdras 11 remite a una figura femenina simbólica ya introducida. Mantener «ella» preserva esa referencia y evita desdibujar el sujeto.
  doctrine_reference: No aplica; decisión de referencia textual y pronominal dentro de una alegoría/símbolo narrativo.
translation_notes:
  revision_awareness: La revisión reciente indicó que la cláusula sobre haber tenido gran poder durante mucho tiempo pertenece a la unidad textual de este versículo; por eso se incluye en el español. También se respeta que el segmento latino conservado para este versículo comienza con «Et factum est cum regnaret et», por lo que la oración queda abierta, tal como en el testimonio fuente.
  spanish_consistency_notes:
  - Se mantiene «reinaba» para conservar el valor aspectual del latín y la continuidad con el contexto narrativo.
  - Se evita traducir κύριος/señor u otros términos no presentes en el fragmento; no se introducen equivalentes ajenos al testimonio.
  - El sujeto femenino se expresa explícitamente («Ella») para sostener la cohesión con el antecedente implícito del pasaje anterior.
