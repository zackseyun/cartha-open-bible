translation:
  language: es
  text: Y vi, y he aquí, una voz no salía de sus cabezas, sino de la parte media de su cuerpo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et uidi et ecce
  english_pob_choice: And I looked, and behold
  chosen_spanish: Y miré, y he aquí
  alternatives_spanish:
  - Y vi, y he aquí
  - Miré, y he aquí
  lexicon: Latín uidi
  rationale: El perfecto latino uidi puede traducirse naturalmente como «miré» o «vi». Aquí se conserva el matiz narrativo de observación inmediata con una fórmula solemne bíblica, sin forzar una repetición demasiado literal.
- source_word: uox
  english_pob_choice: a voice
  chosen_spanish: una voz
  alternatives_spanish:
  - la voz
  lexicon: Latín uox
  rationale: 'Se mantiene el valor indefinido que fijó la revisión inglesa: el latín no exige artículo definido, y «una voz» suena natural en español y evita convertir la referencia en una voz ya conocida o específica.'
- source_word: non exiebat
  english_pob_choice: did not come out
  chosen_spanish: no salía
  alternatives_spanish:
  - no salía hacia fuera
  - no salía de
  lexicon: Latín exiebat
  rationale: El imperfecto latino expresa acción en curso o habitual; en español, «no salía» comunica mejor ese valor aspectual que un perfecto puntual. Se conserva la idea de salida desde el interior.
- source_word: de capitibus eius
  english_pob_choice: from its heads
  chosen_spanish: de sus cabezas
  alternatives_spanish:
  - de las cabezas de él
  - desde sus cabezas
  lexicon: Latín capita
  rationale: «Sus cabezas» reproduce el plural posesivo del texto y mantiene la imagen corporal del original sin aclararla más de lo que la fuente permite.
- source_word: sed de medietate corporis eius
  english_pob_choice: but from the middle of its body
  chosen_spanish: sino de la mitad de su cuerpo
  alternatives_spanish:
  - sino del medio de su cuerpo
  - sino de la parte media de su cuerpo
  lexicon: Latín medietate corporis
  rationale: «Mitad» es la equivalencia más directa de medietate y conserva la imagen física. «Del medio» sería posible, pero «la mitad de su cuerpo» resulta más transparente en español y sigue de cerca la construcción latina.
theological_decisions:
- issue: Referencia corporal extraña e imagen no explicada
  english_pob_reading: a voice did not come out from its heads, but from the middle of its body
  chosen_spanish_reading: una voz no salía de sus cabezas, sino de la mitad de su cuerpo
  alternative_spanish_readings:
  - una voz no salía de sus cabezas, sino del medio de su cuerpo
  rationale: No se suaviza ni se interpreta la imagen. La traducción conserva la tensión del texto, que presenta una voz procedente del interior del cuerpo y no de las cabezas, sin añadir explicación alegórica o simbólica.
  doctrine_reference: Principio de fidelidad semántica al dato textual; no se introduce exégesis no atestiguada.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al usar «una voz» en lugar de «la voz» y al preferir una formulación natural para la localización de origen («de la mitad de su cuerpo»). No hay notas inglesas que deban arrastrarse, y el latino es breve y estable en el testimonio proporcionado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se usa vocabulario español natural pero sobrio, evitando paráfrasis.
  - Se conserva el plural de «cabezas» y la posesión «su/sus» conforme al original latino.
