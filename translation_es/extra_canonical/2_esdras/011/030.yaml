translation:
  language: es
  text: Y he aquí, la cabeza se volvió junto con los que estaban con ella,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: conuersum est
  english_pob_choice: turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - giró
  - se tornó
  lexicon: volver(se)
  rationale: El latín passivo/perfectivo con valor de cambio de dirección se expresa de forma natural en español con «se volvió». Conserva la idea de giro físico sin añadir matices interpretativos.
- source_word: caput
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - el jefe
  - la parte superior
  lexicon: cabeza
  rationale: En el contexto literal de la imagen, «caput» se vierte como «la cabeza». No hay base suficiente aquí para desplazarlo a un sentido figurado como «jefe».
- source_word: cum his qui cum eo erant
  english_pob_choice: with those who were with it
  chosen_spanish: junto con los que estaban con ella
  alternatives_spanish:
  - con los que estaban con ella
  - con aquellos que estaban con ella
  lexicon: estar con
  rationale: «Cum...cum eo erant» se refleja mejor con una construcción relacional simple y fiel. «Junto con» ayuda a reproducir la idea de acompañamiento/grupo sin forzar un vínculo más técnico.
theological_decisions:
- issue: Uso de pronombre para "caput" en una personificación breve
  english_pob_reading: the head ... it
  chosen_spanish_reading: la cabeza ... ella
  alternative_spanish_readings:
  - la cabeza ... él
  - la cabeza ... ello
  rationale: El texto latino usa un sustantivo neutro/gramaticalmente femenino en español; el pronombre concordante más natural es «ella». No se introduce interpretación teológica adicional.
  doctrine_reference: No aplica; decisión de concordancia gramatical y estilo.
translation_notes:
  revision_awareness: La revisión inglesa solo capitalizó el inicio y cambió una formulación relacional por otra más natural («who were with it»). El español sigue esa misma naturalidad sin añadir contenido nuevo y mantiene la imagen breve del latín limpio.
  spanish_consistency_notes:
  - Se mantiene el estilo sobrio y literal adecuado para una unidad muy breve.
  - No se añadió puntuación interpretativa más allá de la necesaria para la fluidez española.
  - 'Se conserva el orden semántico básico: presentación («Y he aquí»), sujeto («la cabeza»), acción («se volvió»), compañía («junto con los que estaban con ella»).'
