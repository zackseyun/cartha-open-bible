translation:
  language: es
  text: Y sucedió en la segunda noche que vi un sueño, y he aquí, subía del mar un águila, la cual tenía doce alas emplumadas y tres cabezas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: secunda nocte
  english_pob_choice: on the second night
  chosen_spanish: en la segunda noche
  alternatives_spanish:
  - la segunda noche
  - durante la segunda noche
  lexicon: noche
  rationale: Conserva la referencia temporal directa del latín sin añadir matices ajenos. 'En la segunda noche' es natural en español y mantiene la secuencia narrativa.
- source_word: vidi somnium
  english_pob_choice: I saw a dream
  chosen_spanish: vi un sueño
  alternatives_spanish:
  - tuve un sueño
  - soñé
  lexicon: ver / sueño
  rationale: El latín usa 'vi' más 'sueño', y la POB inglesa conserva esa percepción literal. 'Vi un sueño' mantiene la imagen textual sin normalizarla a 'soñé'.
- source_word: ascendebat de mari
  english_pob_choice: was coming up from the sea
  chosen_spanish: subía del mar
  alternatives_spanish:
  - venía subiendo del mar
  - estaba subiendo del mar
  lexicon: ascender
  rationale: '''Ascendebat'' expresa movimiento ascendente en curso. ''Subía del mar'' reproduce bien la imagen y evita una perífrasis pesada.'
- source_word: aquila
  english_pob_choice: an eagle
  chosen_spanish: un águila
  alternatives_spanish:
  - un águila imperial
  - un ave de rapiña
  lexicon: águila
  rationale: El término latino designa directamente al águila; no hay razón para introducir especificación interpretativa.
- source_word: duodecim alae pennarum
  english_pob_choice: twelve feathered wings
  chosen_spanish: doce alas emplumadas
  alternatives_spanish:
  - doce alas de plumas
  - doce alas con plumas
  lexicon: ala / plumado
  rationale: '''Pennarum'' describe las alas como ''de plumas'' o ''emplumadas''. ''Alas emplumadas'' es conciso y fiel, y refleja la cualidad descriptiva del original.'
- source_word: capita tria
  english_pob_choice: three heads
  chosen_spanish: tres cabezas
  alternatives_spanish:
  - tres jefes
  - tres troncos
  lexicon: cabeza
  rationale: El latín es literal; 'cabezas' preserva la imagen sin reinterpretarla alegóricamente.
theological_decisions:
- issue: Visión simbólica del águila
  english_pob_reading: an eagle was coming up from the sea
  chosen_spanish_reading: subía del mar un águila
  alternative_spanish_readings:
  - un águila surgía del mar
  - un águila salía del mar
  rationale: La frase mantiene el símbolo tal como aparece en el texto, sin identificarlo ni explicarlo. 'Subía' conserva la progresión visual del original.
  doctrine_reference: Lectura figurativa/apocalíptica del pasaje; no se añade glosa doctrinal.
translation_notes:
  revision_awareness: Se revisó la coherencia con el texto latino limpio y con la traducción inglesa auditada; no se detectaron cambios necesarios respecto del sentido base.
  spanish_consistency_notes:
  - Se usó 'mar' en lugar de un equivalente más literario o arcaizante porque el original latino es directo y la lectura española resulta clara.
  - Se mantuvo el orden narrativo general del inglés POB, pero ajustado a la sintaxis natural del español.
  - No se añadieron notas porque el versículo no presenta variantes o tensiones textuales documentadas en el paquete proporcionado.
