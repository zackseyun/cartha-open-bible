translation:
  language: es
  text: pero no mantenían el dominio. Y después de esto miré, y he aquí, no
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: sed non tenebant principatum
  english_pob_choice: but did not hold the rule
  chosen_spanish: pero no mantenían el dominio
  alternatives_spanish:
  - pero no sostenían el mando
  - pero no conservaban el gobierno
  lexicon: tenebant -> mantener / sostener; principatum -> dominio / mando / gobierno
  rationale: El latín expresa la idea de no retener el ejercicio del poder o primacía. "Dominio" comunica con claridad la noción de autoridad efectiva sin cargar de manera excesiva un matiz eclesiástico que "principado" podría sugerir en español moderno.
- source_word: Et uidi post haec
  english_pob_choice: And after this I looked
  chosen_spanish: Y después de esto miré
  alternatives_spanish:
  - Y después de esto vi
  - Y luego de esto observé
  lexicon: vidi -> mirar / ver; post haec -> después de esto
  rationale: Se conserva el valor narrativo de observación visionaria presente en el POB inglés. "Miré" funciona de modo natural en español bíblico y mantiene el acto de visión del narrador.
- source_word: ecce non
  english_pob_choice: and behold, not
  chosen_spanish: y he aquí, no
  alternatives_spanish:
  - y he aquí, no había
  - y he aquí, no fue así
  lexicon: ecce -> he aquí; non -> no
  rationale: El latín queda incompleto en la fuente, por lo que el español debe reflejar también la interrupción. "He aquí" reproduce la fórmula de atención y "no" preserva la palabra final sin suplementar contenido no atestiguado.
theological_decisions:
- issue: Reproducción de una cláusula textual incompleta
  english_pob_reading: And after this I looked, and behold, not
  chosen_spanish_reading: Y después de esto miré, y he aquí, no
  alternative_spanish_readings:
  - Y después de esto vi, y he aquí, no
  - Y después de esto miré, y he aquí, no había
  rationale: La evidencia textual termina en "non"; por fidelidad auditada no se completa la idea en español. Se conserva la sensación de suspensión del pasaje sin insertar una conclusión editorial.
  doctrine_reference: Principio de fidelidad textual y transparencia textual en la traducción
translation_notes:
  revision_awareness: La revisión inglesa añadió el artículo en "the rule" y completó el final latino "non" como "not". El español refleja esa misma actualización semántica en "el dominio" y conserva el final incompleto con "no" sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y sobrio.
  - '"Dominio" se usa aquí para evitar una equivalencia demasiado rígida con términos de gobierno moderno o con terminología técnica no presente en el latín.'
  - La frase final queda intencionalmente truncada, conforme al testimonio fuente.
