source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: qui te non nocuerunt. Et ascendit contumelia tua ad altissimum et superbia tua ad fortem. Et respexit altissimus super sua tempora, et ecce finita sunt, et saecula eius conpleta sunt.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/011/043.yaml
  text: who did not harm you. And your insolence has gone up to the Most High, and your pride to the Mighty One. And the Most High has looked upon his times, and behold, they are ended, and his ages are completed.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:50:17Z'
    unchanged: false
    changes_summary: 'Restored omitted clauses from the Latin: ''who did not harm you,'' and the final sentence about the Most High looking upon his times. Kept ''insolence,'' ''Most High,'' and ''Mighty One'' as accurate formal renderings, and adjusted tense for completeness and natural English.'
translation:
  language: es
  text: quienes no te hicieron daño. Y tu insolencia ha subido hasta el Altísimo, y tu soberbia hasta el Poderoso. Y el Altísimo ha mirado los tiempos que le fueron señalados, y he aquí, han llegado a su fin, y sus edades se han cumplido.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: qui te non nocuerunt
  english_pob_choice: who did not harm you
  chosen_spanish: quienes no te hicieron daño
  alternatives_spanish:
  - quienes no te dañaron
  - los que no te hicieron mal
  lexicon: Latin nocere -> Spanish dañar/hacer daño
  rationale: El latín expresa una negación directa de daño causado; «hacer daño» conserva el sentido concreto y natural en español sin añadir matices ajenos. «Harm» no exige una carga moral extra, por lo que se evita un giro más interpretativo.
- source_word: contumelia
  english_pob_choice: insolence
  chosen_spanish: insolencia
  alternatives_spanish:
  - afrenta
  - insulto
  - injuria
  lexicon: Latin contumelia -> Spanish insolencia/afrenta
  rationale: La POB inglesa eligió «insolence», que refleja arrogancia ofensiva más que un simple insulto. «Insolencia» mantiene la fuerza de actitud soberbia y desafiante que sube «hasta el Altísimo».
- source_word: Altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Muy Alto
  - el Altísimo Dios
  lexicon: Latín Altissimus / bíblico 'Most High' -> Spanish título divino
  rationale: «Altísimo» es el título bíblico natural y transparente en español para el Dios supremo, y conserva la mayúscula de reverencia. No se sustituye por «SEÑOR» porque el texto latino no lo hace.
- source_word: superbia
  english_pob_choice: pride
  chosen_spanish: soberbia
  alternatives_spanish:
  - orgullo
  - arrogancia
  lexicon: Latin superbia -> Spanish soberbia/orgullo
  rationale: «Soberbia» es más cercana al registro moral del latín que «orgullo», y mantiene el paralelismo con «insolencia». Evita suavizar el reproche.
- source_word: fortem
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Todopoderoso
  lexicon: Latin fortis -> Spanish poderoso/fuerte
  rationale: La POB inglesa opta por «Mighty One», un título divino de fuerza. «Poderoso» comunica bien ese título en español sin introducir una equivalencia doctrinal más específica como «Todopoderoso».
- source_word: respexit altissimus super sua tempora
  english_pob_choice: And the Most High has looked upon his times
  chosen_spanish: Y el Altísimo ha mirado sus tiempos
  alternatives_spanish:
  - Y el Altísimo ha considerado sus tiempos
  - Y el Altísimo ha puesto su mirada sobre sus tiempos
  lexicon: Latin respicere + tempora -> Spanish mirar/considerar + tiempos
  rationale: «Ha mirado» conserva el verbo sencillo del latín y la lectura auditada inglesa. «Sus tiempos» traduce literalmente tempora como períodos fijados, manteniendo la idea de que Dios observa el curso determinado de la historia.
- source_word: saecula eius conpleta sunt
  english_pob_choice: and his ages are completed
  chosen_spanish: y sus siglos se han cumplido
  alternatives_spanish:
  - y sus edades se han completado
  - y sus épocas han llegado a su fin
  lexicon: Latin saecula -> Spanish siglos/edades/épocas
  rationale: «Siglos» sigue de cerca la forma latina saecula y preserva la amplitud temporal del término, aunque en español puede sonar más elevado que cronológico. Se mantiene la completitud final con «se han cumplido», conforme a la clausura escatológica del pasaje.
theological_decisions:
- issue: Título divino para Altissimus en un texto latino extra-canónico
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - Dios Altísimo
  - el Altísimo Dios
  rationale: Se conserva el título teísta sin sustituirlo por una forma litúrgica distinta. El español mantiene la personificación reverencial de Dios como el «Altísimo», coherente con la POB y con el latín.
  doctrine_reference: Uso bíblico del título divino 'Altísimo' (cf. Sal 47:2; Lc 1:32) sin decisión doctrinal adicional.
- issue: Traducción de fortem como título divino
  english_pob_reading: the Mighty One
  chosen_spanish_reading: el Poderoso
  alternative_spanish_readings:
  - el Fuerte
  - el Todopoderoso
  rationale: «Poderoso» conserva el valor de nombre/título sin expandirlo a una formulación más doctrinalmente cargada. Evita confundirlo con un atributo general de poder humano, porque aquí se refiere al destinatario divino del reproche.
  doctrine_reference: Lenguaje bíblico de Dios como el Fuerte/Poderoso; no se introduce una definición dogmática nueva.
- issue: Imperfectividad/tiempo completado en 'saecula eius conpleta sunt'
  english_pob_reading: his ages are completed
  chosen_spanish_reading: sus siglos se han cumplido
  alternative_spanish_readings:
  - sus siglos están completos
  - sus edades se han cumplido
  rationale: «Se han cumplido» expresa con claridad que el plazo o período asignado ha llegado a su término. Mantiene la tensión entre duración amplia ('siglos') y finalización efectiva, sin convertirlo en mera metáfora.
  doctrine_reference: Tema apocalíptico del tiempo determinado por Dios; no requiere formulación doctrinal adicional.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección de la revisión reciente que restauró los segmentos omitidos del latín: la cláusula inicial ''qui te non nocuerunt'' y la frase final sobre el Altísimo observando sus tiempos. La versión española refleja ambos segmentos restaurados y mantiene el paralelismo del texto latino completo.'
  spanish_consistency_notes:
  - Se usó «Altísimo» de forma consistente para Altissimus, y «Poderoso» para fortem, sin mezclar con «SEÑOR» o «Todopoderoso».
  - Se mantuvo un registro elevado pero claro, evitando calcos excesivamente duros.
  - No se añadieron notas al pie porque el latín base y la lectura inglesa no preservan variantes textuales relevantes en este versículo.
