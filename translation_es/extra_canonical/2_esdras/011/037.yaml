    changes_summary: Changed 'spoke' to 'said' for closer lexical alignment with Latin dixit, while retaining the formal structure.
translation:
  language: es
  text: 'rugiendo; y oí cómo dirigió una voz humana[a] al águila, y dijo, diciendo: «Escucha, y te hablaré; el Altísimo te dice:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y miré, y he aquí, algo semejante a un león, despertado del bosque, rugiendo; y oí cómo dirigió una voz humana al águila y dijo,»'
    reason: alternative_reading
lexical_decisions:
- source_word: mugiens
  english_pob_choice: roaring
  chosen_spanish: rugiendo
  alternatives_spanish:
  - bramando
  - rugiente
  lexicon: mugio / rugir
  rationale: El participio latino describe el rugido de una voz feroz; «rugiendo» conserva el sentido auditivo fuerte y suena natural en español. «Bramando» también sería posible, pero «rugiendo» encaja mejor con el paralelo inglés y con el registro solemne.
- source_word: uocem hominis
  english_pob_choice: human voice
  chosen_spanish: una voz humana
  alternatives_spanish:
  - voz de hombre
  - voz humana
  lexicon: vox / vox hominis
  rationale: La frase latina marca que la voz pertenece a un ser humano; «una voz humana» mantiene la cualidad sin introducir masculinidad no exigida. «Voz de hombre» sería más literal, pero más estrecha de lo que permite el latín.
- source_word: ad aquilam
  english_pob_choice: to the eagle
  chosen_spanish: al águila
  alternatives_spanish:
  - a la águila
  lexicon: aquila
  rationale: «Águila» es el equivalente directo y natural. El artículo contracto «al» es la forma correcta en español.
- source_word: dixit dicens
  english_pob_choice: said, saying
  chosen_spanish: y dijo, diciendo
  alternatives_spanish:
  - y dijo, diciendo así
  - y habló, diciendo
  lexicon: dico / dicens
  rationale: 'Se preserva la calca semítica documentada en el audit trail: no se simplifica a «dijo» sin más, porque la repetición tiene valor estilístico y textual en 4 Esdras. «Y dijo, diciendo» suena inusual, pero refleja fielmente la construcción del original y la decisión inglesa revisada.'
- source_word: altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  lexicon: altissimus
  rationale: «El Altísimo» es la forma reverencial estable en español para este título divino y comunica adecuadamente el superlativo honorífico del latín.
theological_decisions:
- issue: Título divino Altissimus
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Más Alto
  rationale: No hay motivo para ocultar el título divino con una paráfrasis. «El Altísimo» conserva la referencia a Dios en un registro bíblico reconocible y fiel al latín.
  doctrine_reference: Título divino reverencial en la tradición bíblica; cf. uso de Altísimo para Dios en textos bíblicos.
- issue: Borde textual de la sección
  english_pob_reading: The English audit trail restricts the line to the end of 2 Esdras 11:37 and includes the opening speech formula.
  chosen_spanish_reading: 'La versión española se limita al mismo tramo: desde ''rugiendo'' hasta ''el Altísimo te dice:''.'
  alternative_spanish_readings:
  - Incluir material de 11:36
  - Cerrar la cita antes de 'te dice:'
  rationale: 'Se respeta la corrección de revisión: no se reincorpora el material de 11:36 que fue descartado por desajuste de límites, y tampoco se omite la fórmula de introducción del discurso, que pertenece al versículo.'
  doctrine_reference: Crítica textual y delimitación versicular en 4 Esdras 11:37.
translation_notes:
  revision_awareness: La revisión automática corrigió un desajuste de límites en la traducción inglesa previa, que había incorporado material de 2 Esdras 11:36 y omitido la clausula final de 11:37. La redacción española sigue la forma revisada y conserva la calca semítica 'dijo, diciendo' en lugar de normalizarla.
  spanish_consistency_notes:
  - Se mantiene 'Altísimo' como título divino reverencial.
  - Se evita 'Señor' porque el texto fuente latino dice altissimus y el POB en inglés ya decidió 'Most High'.
  - La puntuación con dos puntos introduce la cita divina final, acorde con el cierre del versículo.
  - El marcador [a] se coloca en 'voz humana' porque la nota alternativa cubre una posible traducción previa más amplia del contexto inmediato.
