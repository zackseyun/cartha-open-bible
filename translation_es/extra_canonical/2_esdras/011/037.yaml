base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/011/037.yaml
  text: 'roaring; and I heard how it sent out a human voice to the eagle and said[a], saying: “Hear, and I will speak to you; the Most High says to you:'
  footnotes:
  - marker: a
    text: Or 'And I looked, and behold, something like a lion roused from the forest, roaring; and I heard how it sent out a human voice to the eagle and said,'.
