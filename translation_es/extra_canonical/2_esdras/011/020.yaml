translation:
  language: es
  text: Y miré, y he aquí, a su debido tiempo, las alas siguientes también se levantaron[a] en el lado derecho, para tener el dominio; y entre ellas había algunas que lo mantenían, pero
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las alas siguientes se levantaban en el lado derecho'.
    reason: Preserva la alternativa aspectual documentada en el POB inglés anterior.
lexical_decisions:
- source_word: Et uidi
  english_pob_choice: And I looked
  chosen_spanish: Y miré
  alternatives_spanish:
  - Y vi
  - Y observé
  lexicon: videre
  rationale: El latín uidi admite ‘vi’ o ‘miré’; como el contexto es visionario, ‘miré’ conserva mejor el acto de contemplar la visión y sigue la línea del POB inglés ‘I looked’.
- source_word: et ipsae
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - también ellas
  - ellas también
  lexicon: ipsae
  rationale: 'Se preserva el matiz enfático de inclusión que el audit trail inglés señaló: no solo ‘las alas siguientes’, sino ‘también’ estas alas, que siguen el mismo patrón.'
- source_word: in tempore
  english_pob_choice: in due time
  chosen_spanish: a su debido tiempo
  alternatives_spanish:
  - en el tiempo debido
  - cuando llegó el momento
  lexicon: tempus
  rationale: ‘A su debido tiempo’ transmite de forma natural el valor temporal de la frase y conserva la idea de cumplimiento oportuno del texto latino.
- source_word: sequentes pennae
  english_pob_choice: the following wings
  chosen_spanish: las alas siguientes
  alternatives_spanish:
  - las alas que seguían
  - las alas subsiguientes
  lexicon: sequens + penna
  rationale: ‘Siguientes’ reproduce el orden sucesivo sin añadir interpretación; ‘alas’ mantiene la imagen literal del original.
- source_word: erigebantur
  english_pob_choice: were rising up
  chosen_spanish: se levantaban
  alternatives_spanish:
  - iban levantándose
  - se alzaban
  lexicon: erigere
  rationale: El imperfecto latino expresa acción en curso; ‘se levantaban’ conserva esa continuidad y el movimiento ascendente. Es una opción válida y natural en español para la visión.
- source_word: a dextera parte
  english_pob_choice: on the right side
  chosen_spanish: del lado derecho
  alternatives_spanish:
  - a la derecha
  - en el lado derecho
  lexicon: dextera pars
  rationale: ‘Del lado derecho’ suena fluido en español y mantiene el referente espacial exacto sin perder el sentido direccional.
- source_word: ut tenerent principatum
  english_pob_choice: to hold rule
  chosen_spanish: para tener el dominio
  alternatives_spanish:
  - para gobernar
  - para ejercer el mando
  lexicon: principatus
  rationale: ‘Principatum’ implica dominio/autoridad, no solo gobernar; ‘tener el dominio’ conserva el rango de autoridad que el inglés POB expresó con ‘hold rule’.
- source_word: ex his erant quae tenebant
  english_pob_choice: and among them were some that held it
  chosen_spanish: y entre ellas había algunas que lo mantenían
  alternatives_spanish:
  - y entre ellas había algunas que lo sostenían
  - y de entre ellas había unas que lo tenían
  lexicon: tenere
  rationale: El latín distingue que entre esas alas había algunas que ya ‘tenían/mantenían’ el dominio. ‘Lo mantenían’ conserva la relación pronominal con ‘el dominio’ y el carácter continuo.
theological_decisions:
- issue: Renderización de una imagen apocalíptica sin suavizar la fuerza política de principatum
  english_pob_reading: to hold rule
  chosen_spanish_reading: para tener el dominio
  alternative_spanish_readings:
  - para gobernar
  - para ejercer el mando
  rationale: El texto presenta una imagen de autoridad soberana; ‘dominio’ conserva mejor la amplitud semántica de principatus que una traducción más estrecha como ‘gobernar’.
  doctrine_reference: None; apocalyptic imagery
- issue: Imperfecto latino con matiz progresivo en erigebantur
  english_pob_reading: rose up
  chosen_spanish_reading: se levantaban
  alternative_spanish_readings:
  - iban levantándose
  - se alzaban
  rationale: La revisión inglesa destacó el matiz progresivo. En español, el imperfecto ‘se levantaban’ mantiene la acción en desarrollo sin forzar una puntualidad que el latín no exige.
  doctrine_reference: None; verbal aspect
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión aplicada al inglés POB: la inclusión de ‘also’ para et ipsae y el valor progresivo de erigebantur. Por eso el español dice ‘también’ y usa el imperfecto ‘se levantaban’, manteniendo la continuidad visual de la escena.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto cuando corresponda; aquí no aparece.
  - Se usa ‘dominio’ para principatum en vez de ‘reino’, porque el contexto es de autoridad/posesión de poder, no necesariamente de reino territorial.
  - Se conserva la cadencia de una visión narrativa con verbos en pasado imperfectivo para reflejar la acción en curso.
