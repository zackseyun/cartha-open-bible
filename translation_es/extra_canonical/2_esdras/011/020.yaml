    issue: El verbo principal 'se levantaban' no sigue la revisión auditada del POB inglés
    rationale: Aunque el imperfecto latino puede permitir una forma progresiva, el audit trail documenta una revisión deliberada a 'also rose up' para reflejar mejor la progresión narrativa y armonizar con el contexto inmediato. Conviene reflejar eso en español con 'también se levantaron'.
  - severity: medium
    issue: La nota al pie española no preserva la alternativa documentada en el POB inglés
    rationale: 'La nota inglesa dice: ''Or "the following wings were rising up on the right side"''. La nota española actual ''O “miré”'' no añade información real y no corresponde a la variante relevante.'
  - severity: low
    issue: Orden de palabras algo menos natural con 'también las alas siguientes se levantaban'
    rationale: Reordenar a 'las alas siguientes también se levantaron' mejora la fluidez sin perder el énfasis de et ipsae.
