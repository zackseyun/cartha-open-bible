    text: El latín dice pennacula, un término poco común; se conserva 'piñones' para reflejar esa rareza y no suavizarlo hacia 'plumas'.
    reason: lexical_decision
  revision_rationale: 'Se ajusta la cláusula inicial a la formulación auditada del POB (''may you never appear again''), se corrige la ortografía de ''piñones'', y se conserva una nota léxica para pennacula. También se armoniza el adjetivo con el sustantivo masculino plural (''perversos''). No se requiere adjudicación adicional: son correcciones claras de alineación y español.'
