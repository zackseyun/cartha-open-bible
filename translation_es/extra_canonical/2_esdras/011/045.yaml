revisions:
- from: Por tanto, no aparezcas más[a] —tú, águila, y tus terribles alas, y tus piniones[b] más perversas, y tus cabezas malvadas, y tus garras perversas, y todo tu cuerpo inútil—
  to: Por tanto, que nunca vuelvas a aparecer tú, águila, y tus terribles alas, y tus piñones[a] muy perversos, y tus cabezas malvadas, y tus garras perversas, y todo tu cuerpo inútil—
  rationale: 'Se ajusta la cláusula inicial a la formulación auditada del POB (''may you never appear again''), se corrige la ortografía de ''piñones'', y se conserva una nota léxica para pennacula. También se armoniza el adjetivo con el sustantivo masculino plural (''perversos''). No se requiere adjudicación adicional: son correcciones claras de alineación y español.'
