base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/011/045.yaml
  text: Therefore may you never appear again—you[a], eagle, and your dreadful wings and your most wicked pinions and your evil heads and your wicked claws and all your worthless body—
  footnotes:
  - marker: a
    text: Or 'disappear, so that you may not appear again'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:50:20Z'
    unchanged: false
    changes_summary: Revised the opening to reflect the Latin idiom more naturally and accurately as a prohibition/wish ('may you never appear again') rather than 'utterly disappear.' Also adjusted 'wicked little pinions' to 'most wicked pinions' to better reflect pessima without adding diminutive force beyond the Latin term.
translation:
  language: es
  text: Por tanto, que nunca vuelvas a aparecer tú, águila, y tus terribles alas, y tus piñones[a] muy perversos, y tus cabezas malvadas, y tus garras perversas, y todo tu cuerpo inútil—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El latín dice pennacula, un término poco común; se conserva 'piñones' para reflejar esa rareza y no suavizarlo hacia 'plumas'.
    reason: lexical_decision
lexical_decisions:
- source_word: non apparens non appareas
  english_pob_choice: may you never appear again
  chosen_spanish: no aparezcas más
  alternatives_spanish:
  - que nunca vuelvas a aparecer
  - que desaparezcas por completo
  lexicon: Latin non apparens non appareas
  rationale: 'La construcción latina refleja una intensificación semítica: no se debe leer como finalidad, sino como prohibición/deseo enfático. En español, ''no aparezcas más'' conserva el valor de negación enfática sin añadir ''desaparecer'' como interpretación explícita.'
- source_word: aquila
  english_pob_choice: eagle
  chosen_spanish: águila
  alternatives_spanish:
  - águila imperial
  - águila
  lexicon: Latin aquila
  rationale: Se mantiene el animal literal del texto, sin especificación adicional.
- source_word: alae tuae horribiles
  english_pob_choice: your dreadful wings
  chosen_spanish: tus terribles alas
  alternatives_spanish:
  - tus horribles alas
  - tus alas terribles
  lexicon: Latin alae... horribiles
  rationale: '''Terribles'' comunica bien el valor de horror/amenaza de horribiles en español bíblico actual y suena natural.'
- source_word: pennacula tua pessima
  english_pob_choice: your most wicked pinions
  chosen_spanish: tus piniones más perversas
  alternatives_spanish:
  - tus plumas más perversas
  - tus piniones pésimas
  lexicon: Latin pennacula... pessima
  rationale: '''Piniones'' conserva la rareza léxica del original y evita suavizar el término hacia ''plumas''. ''Más perversas'' refleja el superlativo absoluto de pessima mejor que un calco rígido.'
- source_word: capita tua maligna
  english_pob_choice: your evil heads
  chosen_spanish: tus cabezas malvadas
  alternatives_spanish:
  - tus cabezas malignas
  - tus cabezas perversas
  lexicon: Latin capita... maligna
  rationale: '''Malvadas'' es natural en español y conserva la valoración moral negativa del adjetivo.'
- source_word: pessima / maligna / horribiles
  english_pob_choice: wicked / evil / dreadful
  chosen_spanish: perversas / malvadas / terribles
  alternatives_spanish:
  - malísimas / malas / horribles
  lexicon: Latin evaluative adjectives
  rationale: Se preserva la progresión intensiva de desprecio y condena, diferenciando los adjetivos para no aplanar el énfasis acumulativo del latín.
- source_word: all your worthless body
  english_pob_choice: all your worthless body
  chosen_spanish: todo tu cuerpo inútil
  alternatives_spanish:
  - todo tu cuerpo sin valor
  - todo tu cuerpo despreciable
  lexicon: Latin et ... corpus / body
  rationale: '''Inútil'' transmite el desprecio valorativo de worthless sin requerir una paráfrasis excesiva.'
theological_decisions:
- issue: 'El sentido de la cláusula inicial: deseo/prohibición enfática vs. resultado'
  english_pob_reading: may you never appear again
  chosen_spanish_reading: no aparezcas más
  alternative_spanish_readings:
  - que nunca vuelvas a aparecer
  - desaparece para siempre
  rationale: La revisión del POB inglés entiende la fórmula como un giro enfático, no como propósito ('so that'). El español adopta una prohibición/imprecación breve que preserva esa fuerza sin introducir una interpretación de resultado.
  doctrine_reference: Retórica semítica en traducción; no implica una doctrina específica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió el inicio desde una lectura de propósito/resultado a una imprecación enfática ('may you never appear again') y el ajuste de pessima para evitar añadir diminutivo o debilitamiento. La versión española refleja esa lectura revisada con una negación enfática breve y un superlativo relacional en 'más perversas'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se preserva el tono acumulativo de enumeración con comas y guiones largos, acorde con el castellano bíblico moderno.
  - 'No se reduce la serie de adjetivos negativos: cada elemento del latín recibe una correspondencia propia para conservar el efecto retórico.'
