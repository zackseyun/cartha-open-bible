  text: hoc annuntio antequam incipias non parere. Nemo post te
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/011/017.yaml
  text: 'I announce this to you before you begin to disappear: after you, no one will hold it for as long, not even half as long.”'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:49:54Z'
    unchanged: false
    changes_summary: 'Revised awkward and inaccurate phrasing: changed ''vanish'' to ''disappear'' for non parere, and replaced ''will hold your length of time'' with the more natural ''will hold it for as long,'' preserving the sense of duration. Also adjusted word order and punctuation for readable formal English.'
translation:
  language: es
  text: 'Te anuncio esto antes de que empieces a desaparecer: después de ti, nadie lo mantendrá por tanto tiempo, ni siquiera la mitad de ese tiempo.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: hoc annuntio
  english_pob_choice: I announce this to you
  chosen_spanish: Te anuncio esto
  alternatives_spanish:
  - Te declaro esto
  - Te aviso esto
  lexicon: annuntio
  rationale: Mantiene el valor declarativo de annuntio sin volverlo excesivamente solemne; 'te anuncio esto' conserva la referencia directa al destinatario y el carácter prospectivo del aviso.
- source_word: antequam incipias non parere
  english_pob_choice: before you begin to disappear
  chosen_spanish: antes de que empieces a desaparecer
  alternatives_spanish:
  - antes de que comiences a desaparecer
  - antes de que empieces a no obedecer
  lexicon: antequam + incipias + non parere
  rationale: El latín Bensly leído por el POB inglés entiende non parere en este contexto como 'desaparecer' y no como 'desobedecer'; en español se conserva esa lectura porque es la que sigue la auditoría inglesa y produce una frase inteligible en castellano.
- source_word: Nemo post te
  english_pob_choice: after you, no one
  chosen_spanish: después de ti, nadie
  alternatives_spanish:
  - tras ti, nadie
  - después de ti, ninguno
  lexicon: nemo + post te
  rationale: Reproduce el orden lógico del original y la cadencia del POB inglés; 'nadie' es la equivalencia natural de nemo en este contexto.
- source_word: non parere
  english_pob_choice: to disappear
  chosen_spanish: desaparecer
  alternatives_spanish:
  - perecer
  - dejar de aparecer
  lexicon: parere / non parere
  rationale: Aunque parere puede relacionarse con 'aparecer', el audit trail inglés ya fija la comprensión como 'disappear'. En español 'desaparecer' es la opción más clara y fiel a esa decisión auditada.
- source_word: non ... tamdiu, nec dimidium
  english_pob_choice: for as long, not even half as long
  chosen_spanish: por tanto tiempo, ni siquiera la mitad de ese tiempo
  alternatives_spanish:
  - durante tanto tiempo, ni siquiera la mitad
  - por igual tiempo, ni siquiera la mitad
  lexicon: duration comparison
  rationale: La construcción española conserva la comparación de duración sin calcar torpemente el inglés. 'La mitad de ese tiempo' expresa con naturalidad el 'not even half as long' del texto auditado.
theological_decisions:
- issue: Sentido de non parere en el contexto del pasaje
  english_pob_reading: before you begin to disappear
  chosen_spanish_reading: antes de que empieces a desaparecer
  alternative_spanish_readings:
  - antes de que empieces a no obedecer
  - antes de que empieces a perecer
  rationale: El texto latino admite una ambigüedad léxica, pero el POB inglés ya resolvió la lectura hacia el campo de 'desaparecer'. Se mantiene esa decisión para no reabrir una alternativa que el expediente textual ya descartó en esta línea.
  doctrine_reference: No aplica; decisión de sentido textual, no doctrinal.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés, que corrigió una redacción anterior más torpe para hacer explícita la idea de 'desaparecer' y la comparación de duración ('for as long, not even half as long'). No se añadió aparato de notas porque la línea latina aquí llega sin variantes textuales relevantes en el expediente provisto.
  spanish_consistency_notes:
  - Se evitó 'Cristo', 'SEÑOR' o terminología eclesiástica no presente en el texto.
  - Se mantuvo un registro sobrio y contemporáneo, apto para lectura pública.
  - '''desaparecer'' se eligió para seguir la lectura auditada del POB inglés, aunque el latín subyacente no resuelve por sí solo la ambigüedad del verbo.'
