base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/011/002.yaml
  text: And I looked[11:2], and behold, it spread its wings over all the earth, and all the winds of heaven were blowing upon it[a], and the clouds were gathering to it.
