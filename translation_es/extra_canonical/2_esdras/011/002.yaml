translation:
  language: es
  text: Y miré[11:2], y he aquí que desplegaba sus alas sobre toda la tierra, y todos los vientos del cielo soplaban hacia ella[a], y las nubes se reunían hacia ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '11:2'
    text: La cláusula 'y las nubes se reunían hacia ella' está presente en el latín limpiado de Bensly, pero aparece entre corchetes como textualmente incierta.
    reason: textual_variant
  - marker: a
    text: O 'sobre ella'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Et uidi
  english_pob_choice: And I looked
  chosen_spanish: Y miré
  alternatives_spanish:
  - Y vi
  lexicon: lat. videre
  rationale: El latín puede traducirse literalmente como 'vi', pero la forma española 'miré' conserva mejor el matiz narrativo de observación atenta que refleja el inglés POB 'I looked'.
- source_word: expandebat alas suas
  english_pob_choice: it spread its wings
  chosen_spanish: desplegaba sus alas
  alternatives_spanish:
  - extendía sus alas
  lexicon: lat. expandere
  rationale: '''Desplegar'' comunica bien la acción de abrir o extender alas en español moderno, sin perder la imagen corporal del original.'
- source_word: in omnem terram
  english_pob_choice: over all the earth
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - por toda la tierra
  - sobre toda la tierra entera
  lexicon: lat. omnis + terra
  rationale: '''Sobre toda la tierra'' reproduce de modo natural la cobertura total de la imagen, manteniendo la extensión universal del latín.'
- source_word: omnes uenti caeli
  english_pob_choice: all the winds of heaven
  chosen_spanish: todos los vientos del cielo
  alternatives_spanish:
  - todos los vientos del cielo
  - todos los vientos celestiales
  lexicon: lat. ventus + caeli
  rationale: Se mantiene la expresión concreta 'del cielo' para conservar la imaginería cósmica del texto y evitar una paráfrasis interpretativa.
- source_word: insufflabant ad eam
  english_pob_choice: were blowing upon it
  chosen_spanish: soplaban sobre ella
  alternatives_spanish:
  - soplaban hacia ella
  - soplaban contra ella
  lexicon: lat. insufflare + ad
  rationale: '''Soplaban sobre ella'' preserva el sentido de acción ejercida sobre el ave/figura, mientras ''hacia ella'' o ''contra ella'' introducen matices menos seguros para este contexto.'
- source_word: nubes ad eam colligebantur
  english_pob_choice: the clouds were gathering to it
  chosen_spanish: las nubes se iban reuniendo hacia ella
  alternatives_spanish:
  - las nubes se reunían hacia ella
  - las nubes se agrupaban hacia ella
  lexicon: lat. colligere + ad
  rationale: La revisión auditada indica que 'ad eam' significa 'to it/toward it', no 'around it'. 'Se iban reuniendo hacia ella' conserva el movimiento direccional y el proceso progresivo del imperfecto.
theological_decisions:
- issue: Imagen del águila y fuerzas cósmicas dirigidas hacia ella
  english_pob_reading: the clouds were gathering to it
  chosen_spanish_reading: las nubes se iban reuniendo hacia ella
  alternative_spanish_readings:
  - las nubes se reunían a ella
  - las nubes se reunían hacia ella
  rationale: No se suaviza la imagen apocalíptica. La dirección 'hacia ella' sigue la lectura corregida de 'ad eam' y mantiene la tensión visual del pasaje sin convertirla en mera ornamentación poética.
  doctrine_reference: 2 Esdras/4 Ezra apocalíptico; fidelidad imagética al testimonio latino
translation_notes:
  revision_awareness: 'Se incorporó la revisión auditada que corrige la relación espacial de las nubes: el latín ''ad eam'' pide ''hacia ella'' o ''a ella'', no ''alrededor de ella''. Por eso la nota alternativa se mantiene como ''hacia ella'' y la redacción principal preserva la dirección del movimiento.'
  spanish_consistency_notes:
  - Se usa 'Y miré' para el arranque narrativo, coherente con un registro bíblico sobrio en español.
  - Se mantiene 'ella' para el referente del águila, siguiendo la concordancia implícita del español con 'alas' y la figura representada.
  - No se introduce 'SEÑOR' ni terminología teológica no presente en el versículo.
  - La puntuación sigue el orden retórico del latín y del inglés POB, con comas que separan las cláusulas coordinadas.
