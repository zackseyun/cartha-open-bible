lexical_decisions:
- source_word: quod erat medium
  english_pob_choice: the one that was in the middle
  chosen_spanish: la que estaba en medio
  alternatives_spanish:
  - la que estaba en el centro
  - la del medio
  lexicon: medium
  rationale: 'El latín identifica un referente femenino con valor posicional: "la que estaba en medio" conserva el sentido relacional sin añadir precisión no presente en el texto.'
- source_word: euigilabat
  english_pob_choice: awoke
  chosen_spanish: despertó
  alternatives_spanish:
  - se despertó
  - despertaba
  lexicon: evigilo
  rationale: '"Despertó" reproduce el valor verbal puntual del latín y funciona con naturalidad en español narrativo.'
- source_word: hoc enim erat duorum capitum maius
  english_pob_choice: for it was larger than the two heads
  chosen_spanish: pues era más grande que las dos cabezas
  alternatives_spanish:
  - porque era mayor que las dos cabezas
  - pues era mayor que las dos cabezas
  lexicon: maior
  rationale: '"Más grande" expresa la comparación de tamaño de modo claro y fiel; "mayor" también sería posible, pero en este contexto "más grande" evita ambigüedad abstracta.'
- source_word: conplexa est ... secum
  english_pob_choice: it drew the two heads to itself
  chosen_spanish: atrajo hacia sí las dos cabezas
  alternatives_spanish:
  - abrazó consigo las dos cabezas
  - las reunió consigo
  lexicon: complector
  rationale: El verbo latino puede sugerir abrazar, recoger o atraer. En español, "atrajo hacia sí" conserva la idea de movimiento hacia sí sin forzar una imagen corporal específica que el contexto no exige.
theological_decisions:
- issue: Representación del agente simbólico y del movimiento de reunión
  english_pob_reading: And I saw how it drew the two heads to itself
  chosen_spanish_reading: Y vi cómo atrajo hacia sí las dos cabezas
  alternative_spanish_readings:
  - Y vi cómo se llevó hacia sí las dos cabezas
  - Y vi cómo reunió consigo las dos cabezas
  rationale: El pasaje es apocalíptico y simbólico; la traducción mantiene la acción visible sin interpretar alegóricamente qué significa la unión de las cabezas. Se conserva la tensión descriptiva del original.
  doctrine_reference: Principio de prudencia interpretativa en literatura apocalíptica; no sobreinterpretar símbolos sin apoyo explícito del texto.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió una omisión importante en la primera cláusula y confirmó la lectura completa: "the one that was in the middle awoke, for it was larger than the two heads. And I saw how it drew the two heads to itself". La versión española refleja esa cláusula restaurada y mantiene el valor semántico de "conplexa est ... secum" sin adoptar una interpretación más fuerte que el latín no obliga a sostener.'
  spanish_consistency_notes:
  - Se mantiene "cabezas" para corresponder al latín capitum y a la imaginería del pasaje.
  - Se usa "Y" para conservar la continuidad narrativa de la visión.
  - No se introduce terminología eclesiástica ni cristológica ajena al fragmento.
  - La nota al pie marca la alternativa de traducción en la segunda cláusula, siguiendo el antecedente de la POB inglesa.
