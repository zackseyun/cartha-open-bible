translation:
  language: es
  text: Y vi, y he aquí, uno se levantó, pero desapareció de inmediato; luego el segundo, y este también
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et uidi et ecce
  english_pob_choice: And I looked, and behold
  chosen_spanish: Y observé, y he aquí
  alternatives_spanish:
  - Y vi, y he aquí
  - Y miré, y he aquí
  lexicon: Latin video / ecce
  rationale: «Observé» conserva el acto de mirar con atención de la POB inglesa y suena natural en español; «he aquí» reproduce el valor de presentación de ecce sin volverlo meramente narrativo.
- source_word: una erecta est
  english_pob_choice: one rose up
  chosen_spanish: uno se levantó
  alternatives_spanish:
  - uno surgió
  - uno se alzó
  lexicon: Latin erigere / surgere
  rationale: La imagen es de levantarse/elevarse; «se levantó» es la opción más directa y clara en español para mantener la fuerza visual sin añadir interpretación.
- source_word: sed statim non conparuit
  english_pob_choice: but immediately disappeared
  chosen_spanish: pero desapareció de inmediato
  alternatives_spanish:
  - pero se desvaneció enseguida
  - pero no apareció más al instante
  lexicon: Latin comparere
  rationale: «Desapareció» refleja con naturalidad el no volver a aparecer de conparuit en este contexto visionario; «de inmediato» conserva statim.
- source_word: Et secunda, et haec
  english_pob_choice: then the second, and this one also
  chosen_spanish: luego el segundo, y éste también
  alternatives_spanish:
  - después el segundo, y éste también
  - entonces el segundo, y éste también
  lexicon: Latin secunda / haec
  rationale: Se mantiene el final truncado del testimonio latino, tal como la revisión inglesa lo dejó abierto; «y éste también» reproduce la frase incompleta sin suplir un desenlace no atestiguado.
theological_decisions:
- issue: Texto extenso y final truncado de la unidad
  english_pob_reading: And I looked, and behold, one rose up, but immediately disappeared; then the second, and this one also
  chosen_spanish_reading: Y observé, y he aquí, uno se levantó, pero desapareció de inmediato; luego el segundo, y éste también
  alternative_spanish_readings:
  - Y observé, y he aquí, uno se levantó, pero desapareció de inmediato; luego el segundo, y éste también desapareció
  - Y observé, y he aquí, uno se levantó, pero desapareció de inmediato; luego el segundo
  rationale: La POB inglesa revisada eliminó un cierre no sustentado y dejó la cláusula final abierta para reflejar el latín extante. El español conserva esa misma apertura, sin completar el sentido con una desaparición no preservada en el texto fuente.
  doctrine_reference: Principio de suficiencia textual y restricción a lo atestiguado
- issue: Lenguaje visionario de aparición y desaparición
  english_pob_reading: one rose up, but immediately disappeared
  chosen_spanish_reading: uno se levantó, pero desapareció de inmediato
  alternative_spanish_readings:
  - uno surgió, pero desapareció de inmediato
  - uno se alzó, pero desapareció de inmediato
  rationale: No hay carga doctrinal añadida; se mantiene el registro apocalíptico/visionario del relato, evitando una paráfrasis explicativa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente del POB en inglés, que retiró la expansión no atestiguada «more quickly than the former» y dejó el final de la línea incompleto para reflejar que el latín conservado termina en «Et secunda, et haec». El español imita esa misma cautela textual, sin añadir el verbo final perdido.
  spanish_consistency_notes:
  - Se evita «apareció» porque el latín conparuit aquí se entiende mejor como dejar de verse tras levantarse, no como simple manifestación inicial.
  - Se mantiene «he aquí» por consistencia con el valor de ecce en registros narrativos solemnes.
  - No se añade puntuación interpretativa al final; la clausura abierta es deliberada y textual.
