  rationale: La fuente latina y la revisión inglesa terminan antes de completar la escena; por fidelidad textual se evita suplir un verbo o predicado ausente. La traducción española conserva la apertura del fragmento sin resolver su referencia.
  doctrine_reference: Fidelidad al testimonio textual recibido; no procede una decisión doctrinal sino textual.
translation_notes:
