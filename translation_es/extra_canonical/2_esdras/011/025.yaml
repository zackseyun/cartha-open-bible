  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - mirad
  lexicon: N/A
  rationale: ‘He aquí’ conserva la función deíctica y enfática tradicional sin volver el español artificial.
- source_word: hae subalares
  english_pob_choice: these under-wings
  chosen_spanish: estos bajo las alas
  alternatives_spanish:
  - estas subalas
  - estos bajo-las-alas
  lexicon: N/A
  rationale: El latín es claramente fragmentario y el inglés POB también detiene la frase en ‘under-wings’ sin ampliar el sentido. En español se preserva la misma incompletitud sintáctica; ‘bajo las alas’ conserva el contenido léxico sin inventar una interpretación más específica de la imagen.
theological_decisions:
- issue: Fragmento incompleto / cláusula suspendida
  english_pob_reading: four remained in their place. And I looked, and behold, these under-wings
