  spanish_consistency_notes:
  - Se mantiene el tratamiento fragmentario del final, igual que en la revisión inglesa.
  - No se introduce ‘Cristo’, ‘Señor’ ni otro equivalente teológico no presente en el latín.
  - El registro es sobrio y publicable en español bíblico moderno, sin completar la frase con material inferido.
