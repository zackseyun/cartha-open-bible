revisions:
- from: Porque afligiste a los mansos e injuriaste a los pacíficos; aborreciste a los que hablaban verdad y amaste a los mentirosos; destruiste las moradas de los que daban fruto, y humillaste sus muros.
  to: Porque afligiste a los mansos y dañaste a los pacíficos; aborreciste a los que hablaban verdad y amaste a los mentirosos; destruiste las moradas de los que daban fruto, y humillaste sus muros.
  rationale: Se reemplaza «injuriaste» por «dañaste» para reflejar con mayor precisión el valor de laesisti y evitar en español la ambigüedad de daño verbal o insulto. El resto del versículo puede mantenerse, pues preserva bien el sentido fuente y la decisión auditada de conservar la metáfora «humillaste sus muros».
  reviewer_model: gpt-5.4
