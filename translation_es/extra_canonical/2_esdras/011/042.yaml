review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del latín y del inglés auditado: afligir a los mansos, dañar a los pacíficos/sosegados, odiar a quienes dicen la verdad, amar a los mentirosos, destruir las moradas de los fructíferos y humillar sus muros. La única desviación significativa está en «injuriaste», que en español actual suele significar insultar/ofender verbalmente más que causar daño, y por eso no refleja bien la fuerza de laesisti = ‘injured/harmed’.'
  spanish_quality_summary: El texto es claro y de registro digno. «Afligiste», «aborreciste», «moradas» y «humillaste sus muros» funcionan bien. Sin embargo, «injuriaste a los pacíficos» suena poco natural y semánticamente equívoco en español eclesial general; «dañaste» o «lastimaste» sería más fiel y más legible. También «los pacíficos» es aceptable, aunque «los que vivían en paz» habría sido más cercano al valor de quiescentes; no hace falta cambiarlo para una reparación menor.
  glossary_alignment: No hay términos del glosario maestro particularmente implicados. La revisión propuesta mantiene fidelidad léxica al latín y a la decisión inglesa auditada, especialmente evitando expandir «humiliasti muros eorum» a derribo explícito.
  issues:
  - severity: medium
    issue: «injuriaste» no refleja con precisión laesisti
    rationale: En español contemporáneo «injuriar» suele significar insultar, ultrajar o difamar. El latín laesisti aquí expresa daño/perjuicio, como reconoce el inglés auditado «injured». «Dañaste» preserva mejor el sentido sin sobreinterpretar.
  revised_spanish_text: Porque afligiste a los mansos y dañaste a los pacíficos; aborreciste a los que hablaban verdad y amaste a los mentirosos; destruiste las moradas de los que daban fruto, y humillaste sus muros.
  revision_rationale: Se reemplaza «injuriaste» por «dañaste» para reflejar con mayor precisión el valor de laesisti y evitar en español la ambigüedad de daño verbal o insulto. El resto del versículo puede mantenerse, pues preserva bien el sentido fuente y la decisión auditada de conservar la metáfora «humillaste sus muros».
