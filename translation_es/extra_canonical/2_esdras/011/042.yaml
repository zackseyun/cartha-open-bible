  text: cum ueritate ; Tribulasti enim mansuetos et laesisti quiescentes, odisti uerum dicentes et dilexisti mendaces, et destruxisti habitationes eorum qui fructificabant, et humiliasti muros eorum
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/011/042.yaml
  text: For you afflicted the meek and injured the peaceable; you hated those who spoke truth and loved liars; you destroyed the dwellings of those who bore fruit, and humbled their walls.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:50:16Z'
    unchanged: false
    changes_summary: Adjusted tense for consistency ('spoke' for 'speak'), removed the interpretive expansion 'of those who had done you no harm,' and rendered 'humiliasti muros eorum' more literally as 'humbled their walls.'
translation:
  language: es
  text: Porque afligiste a los mansos y dañaste a los pacíficos; aborreciste a los que hablaban verdad y amaste a los mentirosos; destruiste las moradas de los que daban fruto, y humillaste sus muros.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Tribulasti
  english_pob_choice: you afflicted
  chosen_spanish: afligiste
  alternatives_spanish:
  - atribulaste
  - oprimiste
  lexicon: Latin tribulare / tribulasti
  rationale: ‘Afligiste’ conserva el sentido de causar sufrimiento o angustia sin intensificarlo más allá de lo que el latín exige; mantiene una relación directa con el inglés auditado ‘afflicted’.
- source_word: mansuetos
  english_pob_choice: the meek
  chosen_spanish: los mansos
  alternatives_spanish:
  - los mansos y humildes
  - los humildes
  lexicon: Latin mansuetus
  rationale: ‘Mansos’ es la correspondencia más natural y fiel para mansuetus, y preserva el matiz de docilidad o apacibilidad.
- source_word: laesisti
  english_pob_choice: you injured
  chosen_spanish: injuriaste
  alternatives_spanish:
  - lastimaste
  - heriste
  lexicon: Latin laedere / laesisti
  rationale: ‘Injuriaste’ refleja el daño causado y conserva mejor la fuerza verbal del latín; ‘lastimaste’ o ‘heriste’ serían posibles, pero menos específicas.
- source_word: quiescentes
  english_pob_choice: the peaceable
  chosen_spanish: los pacíficos
  alternatives_spanish:
  - los que vivían en paz
  - los tranquilos
  lexicon: Latin quiescens
  rationale: El participio puede abarcar a quienes están en reposo o en paz; ‘los pacíficos’ comunica bien el sentido relacional que el inglés POB fijó como ‘peaceable’.
- source_word: odisti
  english_pob_choice: you hated
  chosen_spanish: aborreciste
  alternatives_spanish:
  - odiaste
  lexicon: Latin odire / odisti
  rationale: ‘Aborreciste’ es un equivalente español fuerte y idiomático para el odio explícito del latín, manteniendo el tono moral del pasaje.
- source_word: uerum dicentes
  english_pob_choice: those who spoke truth
  chosen_spanish: a los que hablaban verdad
  alternatives_spanish:
  - a los que decían verdad
  - a los que decían lo verdadero
  lexicon: Latin verum dicere
  rationale: Se conserva la construcción participial con un giro natural en español. ‘Hablaban verdad’ evita una literalidad áspera y mantiene el contenido proposicional.
- source_word: dilexisti mendaces
  english_pob_choice: you loved liars
  chosen_spanish: amaste a los mentirosos
  alternatives_spanish:
  - amaste a los falsos
  - amaste a los engañadores
  lexicon: Latin mendax
  rationale: ‘Mentirosos’ es la equivalencia directa y transparente para mendaces; ‘amaste’ conserva la dureza del juicio moral del original.
- source_word: destruxisti habitationes eorum qui fructificabant
  english_pob_choice: you destroyed the dwellings of those who bore fruit
  chosen_spanish: destruiste las moradas de los que daban fruto
  alternatives_spanish:
  - destruiste las viviendas de los que fructificaban
  - arrasaste las casas de los que daban fruto
  lexicon: Latin habitatio + fructificare
  rationale: ‘Moradas’ mantiene un registro bíblico sin perder inteligibilidad; ‘daban fruto’ reproduce la imagen de fructificaban sin forzar un tecnicismo botánico.
- source_word: humiliasti muros eorum
  english_pob_choice: you humbled their walls
  chosen_spanish: humillaste sus muros
  alternatives_spanish:
  - abatiste sus muros
  - derribaste sus muros
  lexicon: Latin humiliare + muri
  rationale: Se sigue de cerca la decisión auditable del inglés POB de no expandir el sentido a demolición. ‘Humillaste’ conserva la metáfora de rebajamiento aplicada a los muros.
theological_decisions:
- issue: Tratamiento de la metáfora final sobre los muros
  english_pob_reading: you humbled their walls
  chosen_spanish_reading: humillaste sus muros
  alternative_spanish_readings:
  - derribaste sus muros
  - abatiste sus muros
  rationale: Se mantiene la metáfora literal del latín y del inglés revisado, evitando convertirla en una afirmación explícita de derribo que el texto no exige.
  doctrine_reference: Principio de sobriedad textual y conservación de imágenes figuradas sin ampliación interpretativa
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del texto inglés: se eliminó la expansión interpretativa sobre quienes ‘no te habían hecho daño’ y se ajustó la referencia final a ‘humbled their walls’. La versión española sigue esa línea, evitando añadidos explicativos y conservando el cierre metafórico.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico y sobrio con vocablos como ‘mansos’, ‘moradas’ y ‘muros’.
  - Se evita el calco excesivamente duro donde el español admite una forma natural sin perder el contenido.
  - No se introduce ‘SEÑOR’ ni otra sustitución teológica porque el versículo no contiene el nombre divino ni un título equivalente en el texto fuente.
