lexical_decisions:
- source_word: numeraui
  english_pob_choice: I counted
  chosen_spanish: conté
  alternatives_spanish:
  - calculé
  - hice el conteo de
  lexicon: Lat. numerare
  rationale: El latino numeraui indica un acto de contar en forma directa; «conté» conserva la acción simple y natural en español sin añadir matices técnicos no presentes en el texto.
- source_word: contrarias pennas
  english_pob_choice: opposing wings
  chosen_spanish: alas opuestas
  alternatives_spanish:
  - alas contrarias
  - alas enfrentadas
  lexicon: Lat. contrarius + penna
  rationale: «Contrarias» describe oposición o contraposición; «alas opuestas» comunica bien la relación espacial/funcional en español y mantiene el sentido literal de las alas sin forzar una interpretación alegórica.
- source_word: ecce
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: Lat. ecce
  rationale: «He aquí» reproduce el deíctico exclamativo y conserva el tono solemne del original y de la traducción inglesa auditada.
- source_word: ipsae erant octo
  english_pob_choice: they were eight
  chosen_spanish: eran ocho
  alternatives_spanish:
  - sumaban ocho
  - había ocho
  lexicon: Lat. ipsae erant octo
  rationale: La estructura latina afirma el número total; «eran ocho» es la forma más fiel y natural en español. Se evita «sumaban» porque introduce un matiz aritmético no necesario.
theological_decisions:
- issue: Conteo descriptivo de alas en una visión apocalíptica
  english_pob_reading: And I counted its opposing wings, and behold, they were eight.
  chosen_spanish_reading: Y conté sus alas opuestas, y he aquí que eran ocho.
  alternative_spanish_readings:
  - Y conté sus alas contrarias, y he aquí que eran ocho.
  - Y conté sus alas enfrentadas, y he aquí que eran ocho.
  rationale: No hay decisión doctrinal explícita en este versículo; la tarea principal es preservar el dato visionario sin interpretarlo alegóricamente más allá del texto. La formulación española mantiene el carácter descriptivo del pasaje.
