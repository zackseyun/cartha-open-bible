translation:
  language: es
  text: ¿No eres tú el que queda[a] de las cuatro bestias que yo había hecho reinar en mi era, para que por ellas llegara el fin de mis tiempos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que quedó de».'
    reason: alternative_rendering
lexical_decisions:
- source_word: regnare
  english_pob_choice: made to reign
  chosen_spanish: había hecho reinar
  alternatives_spanish:
  - hice reinar
  - había puesto a reinar
  lexicon: reinar
  rationale: El latín expresa la acción causal de hacer reinar; en español, 'había hecho reinar' conserva la causatividad y el pluperfecto reflejado en el audit trail inglés ('had made'), sin suavizar la fuerza del verbo.
- source_word: saeculo meo
  english_pob_choice: in my age
  chosen_spanish: en mi siglo
  alternatives_spanish:
  - en mi época
  - en mi edad
  lexicon: siglo
  rationale: '''Saeculum'' puede abarcar ''edad'' o ''época''; ''siglo'' mantiene una correspondencia más cercana con el latinismo y con el registro elevado del pasaje, sin perder la idea de una era o período histórico.'
- source_word: superasti de
  english_pob_choice: the one that remains of
  chosen_spanish: el que quedó de
  alternatives_spanish:
  - el que permanece de
  - el que sobrevivió de
  lexicon: quedar / permanecer / sobrevivir
  rationale: La revisión inglesa corrigió 'survived from' a 'remains of' por el sentido partitivo. En español, 'quedó de' expresa bien 'el resto' o 'lo que queda de', evitando sugerir una supervivencia frente a un peligro específico.
- source_word: finis temporum
  english_pob_choice: the end of my times
  chosen_spanish: el fin de mis tiempos
  alternatives_spanish:
  - el final de mis tiempos
  - el fin de mi tiempo
  lexicon: fin / tiempos
  rationale: '''Temporum'' está en plural; ''mis tiempos'' conserva ese plural y el matiz de un período determinado, más que un tiempo abstracto.'
theological_decisions:
- issue: Sentido de la pregunta retórica dirigida al sobreviviente/resto
  english_pob_reading: Are you not the one that remains of the four beasts...?
  chosen_spanish_reading: ¿No eres tú el que quedó de las cuatro bestias...?
  alternative_spanish_readings:
  - ¿No eres tú el que permanece de las cuatro bestias...?
  - ¿No eres tú el sobreviviente de las cuatro bestias...?
  rationale: La pregunta presenta al interlocutor como el resto final de un grupo anterior. 'Quedó' preserva la idea partitiva y evita introducir una interpretación más dramática ('sobreviviente') que no es exigida por el latín.
  doctrine_reference: None
- issue: Valor de 'saeculum' como período histórico en lugar de 'mundo'
  english_pob_reading: in my age
  chosen_spanish_reading: en mi siglo
  alternative_spanish_readings:
  - en mi época
  - en mi mundo
  rationale: No hay base suficiente para universalizar 'saeculum' como 'mundo'; el contexto favorece un período o era bajo la soberanía del hablante. 'Siglo' mantiene esa referencia temporal.
  doctrine_reference: None
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrigió 'survived from' a 'remains of' y el pluperfecto 'had made'; la redacción española refleja ambos ajustes mediante 'quedó' y 'había hecho reinar'.
  spanish_consistency_notes:
  - Se mantuvo 'bestias' para concordar con el texto fuente y con la imaginería apocalíptica del pasaje.
  - Se evitó 'SEÑOR' u otra sustitución teológica no presente en el latín; aquí no aparece el nombre divino.
  - Se conservó el plural de 'tiempos' para reflejar 'temporum'.
  - El tono procura ser reverente pero no arcaizante en exceso.
