translation:
  language: es
  text: 'Y miré[a], y he aquí el águila se levantó sobre sus garras y profirió una voz[b] a sus alas, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vi'.
    reason: alternative_reading
  - marker: b
    text: O 'emitió una voz'.
    reason: previous_rendering
lexical_decisions:
- source_word: Et uidi
  english_pob_choice: And I looked
  chosen_spanish: Y miré
  alternatives_spanish:
  - Y vi
  - Y contemplé
  lexicon: uidi → mirar/ver
  rationale: El latín uidi puede traducirse por 'vi' o 'miré'. Dado el registro narrativo y la secuencia visionaria de la obra, 'miré' conserva el acto de visión como atención profética, y sigue de cerca la elección inglesa 'And I looked'.
- source_word: ecce
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - y he aquí
  lexicon: ecce → he aquí
  rationale: '''He aquí'' reproduce bien la interjección de sorpresa/énfasis del original y mantiene el tono bíblico sin sonar arcaizante en exceso.'
- source_word: surrexit
  english_pob_choice: rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se erigió
  lexicon: surgo → levantarse/alzarse
  rationale: '''Se levantó'' expresa el movimiento ascendente de forma natural en español y conserva la imagen del texto.'
- source_word: aquila
  english_pob_choice: the eagle
  chosen_spanish: el águila
  alternatives_spanish:
  - la águila
  lexicon: aquila → águila
  rationale: Se conserva el referente literal del símbolo imperial de la visión. En español normativo, el sustantivo 'águila' suele llevar artículo masculino singular en esta construcción.
- source_word: super ungues suos
  english_pob_choice: on its claws
  chosen_spanish: sobre sus garras
  alternatives_spanish:
  - sobre sus uñas
  - encima de sus garras
  lexicon: ungues → garras/uñas
  rationale: '''Garras'' es la equivalencia más natural para el rasgo animal de la imagen. ''Uñas'' sería más literal pero menos idiomático para un ave de presa y perdería fuerza visual.'
- source_word: misit uocem pennis suis
  english_pob_choice: uttered a voice to its wings
  chosen_spanish: lanzó una voz a sus alas
  alternatives_spanish:
  - emitió una voz a sus alas
  - dio una voz a sus alas
  lexicon: misit vocem → uttered/sent forth a voice
  rationale: La frase latina conserva un semitismo idiomático; la revisión inglesa prefirió 'uttered a voice' por naturalidad. En español, 'lanzó una voz' mantiene esa tensión idiomática sin convertirlo en una paráfrasis interpretativa como 'gritó'.
theological_decisions:
- issue: Imagen de la águila como figura simbólica
  english_pob_reading: the eagle rose up
  chosen_spanish_reading: el águila se levantó
  alternative_spanish_readings:
  - el águila se alzó
  - el águila ascendió
  rationale: No se explicita la identidad simbólica en el verso; por fidelidad al texto visionario, se conserva la imagen sin añadir interpretación histórica o alegórica.
  doctrine_reference: Principio de sobriedad exegética en literatura apocalíptica
translation_notes:
  revision_awareness: La revisión inglesa reciente aclaró que 'misit vocem' es un modismo semítico y que 'uttered a voice' es preferible a 'sent out a voice'. El español sigue esa decisión con 'lanzó una voz', evitando un calco más duro y manteniendo el valor idiomático del original.
  spanish_consistency_notes:
  - Se mantiene el tiempo narrativo pasado simple en toda la cláusula.
  - Se conserva el tono visionario con 'he aquí'.
  - No se introduce puntuación interpretativa adicional ni se divide la unidad sintáctica del versículo.
