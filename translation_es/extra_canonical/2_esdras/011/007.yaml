revisions:
- from: 'Y miré[a], y he aquí, el águila se levantó sobre sus garras y lanzó una voz a sus alas, diciendo:'
  to: 'Y miré[a], y he aquí el águila se levantó sobre sus garras y profirió una voz[b] a sus alas, diciendo:'
  rationale: Se ajusta únicamente la locución verbal para representar mejor el modismo latino misit uocem en español natural y fiel. 'Profirió una voz' conserva el tono elevado y la extrañeza moderada del original sin caer en un calco torpe. También se suaviza la puntuación para mejor lectura. Se conserva 'a sus alas', que refleja el dativo/objeto indirecto implícito del latín pennis suis.
