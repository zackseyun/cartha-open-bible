lexical_decisions:
- source_word: statim non conparescebant
  english_pob_choice: they immediately disappeared
  chosen_spanish: se desaparecían enseguida
  alternatives_spanish:
  - desaparecían de inmediato
  - se volvían a perder enseguida
  lexicon: statim / conparescebant
  rationale: El adverbio 'statim' pide una marca temporal inmediata; 'non conparescebant' expresa desaparición o dejar de verse. 'Se desaparecían enseguida' conserva la inmediatez y el matiz de hacerse invisibles o dejar de estar presentes sin forzar una paráfrasis demasiado interpretativa.
- source_word: Nam et
  english_pob_choice: For some of them also
  chosen_spanish: Porque también
  alternatives_spanish:
  - Pues también
  - Porque asimismo
  lexicon: nam / et
  rationale: 'La revisión inglesa mostró que ''Nam et'' introduce una relación explicativa y aditiva, no solo un simple ''and''. ''Porque también'' reproduce mejor ese valor de conexión: explica y añade al mismo tiempo.'
- source_word: aliquae ex eis
  english_pob_choice: some of them
  chosen_spanish: algunas de ellas
  alternatives_spanish:
  - algunas entre ellas
  - ciertas de ellas
  lexicon: aliquae ex eis
  rationale: '''Aliquae'' es femenino plural y aquí se entiende como un grupo femenino ya mencionado en el contexto; ''algunas de ellas'' refleja con naturalidad la referencia pronominal en español.'
- source_word: erigebantur
  english_pob_choice: rose up
  chosen_spanish: se levantaban
  alternatives_spanish:
  - se alzaban
  - se elevaban
  lexicon: erigere
  rationale: '''Se levantaban'' es la forma española más natural para el ascenso corporal o visual de un ser que vuelve a aparecer. Mantiene el sentido básico de elevación sin sobreespecificar el modo.'
theological_decisions:
- issue: Relación causal/explicativa de la segunda cláusula
  english_pob_reading: For some of them also rose up,
  chosen_spanish_reading: Porque también algunas de ellas se levantaban,
  alternative_spanish_readings:
  - Y también algunas de ellas se levantaban,
  - Pues también algunas de ellas se levantaban,
  rationale: 'La lectura revisada del inglés y el latín ''Nam et'' favorece una transición explicativa: la segunda acción no es solo una suma, sino una ampliación del cuadro anterior. ''Porque'' conserva esa conexión sin imponer doctrina adicional.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión auditada corrigió una versión inglesa anterior que suavizaba la transición de 'Nam et' como simple 'And'. La traducción española refleja esa mejora con 'Porque también', manteniendo el flujo explicativo-aditivo del latín y la continuidad del sujeto implícito.
  spanish_consistency_notes:
  - Se mantuvo 'se' en 'se desaparecían' para reflejar la pasividad/intransitividad del latín sin convertir la frase en un activo artificial.
  - Se conservó 'de ellas' por la referencia interna femenina plural del contexto latino.
  - No se usó 'Cristo', 'SEÑOR' ni terminología teológica no presente en el verso.
