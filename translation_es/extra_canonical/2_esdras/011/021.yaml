translation:
  language: es
  text: desaparecían enseguida[a]. Porque algunas de ellas también se levantaban,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desaparecían enseguida. Y algunas de ellas también se levantaban,»'
