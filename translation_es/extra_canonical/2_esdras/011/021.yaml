    issue: «se desaparecían» es una construcción antinatural en español
    rationale: Aunque intenta reflejar un proceso medio, en español bíblico legible lo natural es «desaparecían» o «dejaban de verse». La forma pronominal no es idiomática y distrae del sentido.
  - severity: low
    issue: La nota alternativa repite una formulación poco natural
    rationale: La nota usa «desaparecían enseguida. Y algunas…», pero conviene que incluso la alternativa mantenga español fluido y refleje mejor la puntuación/documentación inglesa.
