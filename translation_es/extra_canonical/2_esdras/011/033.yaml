translation:
  language: es
  text: Y después de esto miré[a], y he aquí, la cabeza central desapareció de repente, tal como habían desaparecido las alas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y esto ocurrió como con las alas».'
    reason: alternative_reading
lexical_decisions:
- source_word: medium caput
  english_pob_choice: the middle head
  chosen_spanish: la cabeza del medio
  alternatives_spanish:
  - la cabeza central
  - la cabeza del medio
  lexicon: caput
  rationale: La construcción latina nombra de forma literal la cabeza que está en medio; «cabeza del medio» conserva esa relación sin introducir una interpretación más libre que «cabeza central». En español, «cabeza del medio» suena algo más marcado, pero sigue siendo transparente y fiel al orden relacional del original.
- source_word: subito non conparuit
  english_pob_choice: suddenly disappeared
  chosen_spanish: desapareció de repente
  alternatives_spanish:
  - desapareció súbitamente
  - no apareció de repente
  lexicon: conparere
  rationale: El latín usa una negación de aparición para expresar desaparición/vanecimiento. «Desapareció de repente» refleja bien ese valor idiomático en español sin forzar una calca negativa menos natural.
- source_word: et hoc sicut alae
  english_pob_choice: just as the wings had done
  chosen_spanish: tal como habían desaparecido las alas
  alternatives_spanish:
  - como habían hecho las alas
  - tal como las alas
  lexicon: sicut
  rationale: 'La frase latina es elíptica: el verbo de la cláusula anterior se sobreentiende para «alas». En español conviene resolver esa elipsis para mantener claridad y fluidez, conservando la comparación: la desaparición de la cabeza del medio ocurrió de modo semejante a la de las alas.'
theological_decisions:
- issue: Imagen apocalíptica de desaparición comparativa
  english_pob_reading: the middle head suddenly disappeared, just as the wings had done
  chosen_spanish_reading: la cabeza del medio desapareció de repente, tal como habían desaparecido las alas
  alternative_spanish_readings:
  - la cabeza del medio desapareció de repente, como las alas
  - la cabeza central desapareció de repente, igual que las alas
  rationale: No hay una carga doctrinal explícita en la cláusula; la decisión principal es preservar la analogía de desaparición entre la cabeza y las alas. Se mantiene una redacción sobria, sin suavizar ni reinterpretar la visión.
  doctrine_reference: No aplica; pasaje visionario apocalíptico sin afirmación doctrinal directa en este versículo.
translation_notes:
  revision_awareness: La revisión reciente confirmó que la cláusula latina es elíptica y que la versión inglesa más natural es «just as the wings had done». La traducción española sigue esa resolución, pero conserva en nota la alternativa más literal y cercana a la estructura del latín.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y contemporáneo.
  - «Y después de esto miré» sigue el patrón narrativo de la POB en pasajes visionarios.
  - Se usa «desapareció» para conparuit, evitando una calca como «no apareció» que en español podría sonar menos idiomática en este contexto.
