source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: Et factum est cum regnaret et uenit ei finis et non apparuit, ita ut non appareret locus eius; et sequens exsurrexit et regnauit et ipsa multum tenuit tempus.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/011/013.yaml
  text: And it happened that when it reigned, its end came and it did not appear, so that its place did not appear; then the next rose up and reigned, and it held power for a long time.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:49:50Z'
    unchanged: false
    changes_summary: Revised the disappearance clause for closer lexical alignment with the Latin ('did not appear ... its place did not appear') and removed an interpretive rendering ('could not be seen').
translation:
  language: es
  text: Y aconteció que, cuando reinó, le llegó su fin y no apareció, de modo que tampoco apareció su lugar; entonces se levantó el siguiente y reinó, y este tuvo poder por mucho tiempo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: regnaret
  english_pob_choice: when it reigned
  chosen_spanish: cuando reinó
  alternatives_spanish:
  - cuando gobernó
  - cuando estuvo reinando
  lexicon: regnō
  rationale: El latín indica ejercicio de realeza o dominio. «Reinó» es directo, natural y conserva el valor monárquico del verbo sin añadir matices ajenos.
- source_word: uenit ei finis
  english_pob_choice: its end came
  chosen_spanish: le llegó su fin
  alternatives_spanish:
  - vino su fin
  - llegó su fin
  lexicon: finis
  rationale: La construcción latina expresa llegada del fin a esa entidad. «Le llegó su fin» comunica bien la inevitabilidad del cierre y mantiene una cadencia bíblica natural en español.
- source_word: non apparuit
  english_pob_choice: it did not appear
  chosen_spanish: no apareció
  alternatives_spanish:
  - no se manifestó
  - no se presentó
  lexicon: appareo
  rationale: Se conserva la repetición verbal del latín con «aparecer», evitando interpretar el sentido como simple desaparición visible; la cláusula posterior repite el mismo verbo para reproducir el paralelismo.
- source_word: locus eius
  english_pob_choice: its place
  chosen_spanish: su lugar
  alternatives_spanish:
  - su sitio
  - el lugar de ella
  lexicon: locus
  rationale: «Lugar» traduce de forma exacta locus y mantiene la personificación/imagen espacial del texto. «Su lugar» respeta el paralelismo con la primera cláusula.
- source_word: sequens
  english_pob_choice: the next
  chosen_spanish: el siguiente
  alternatives_spanish:
  - el que seguía
  - el sucesor
  lexicon: sequens
  rationale: El participio indica el que viene después. «El siguiente» es fiel y evita introducir una interpretación más técnica como «sucesor».
- source_word: exsurrexit
  english_pob_choice: rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: exsurgō
  rationale: «Se levantó» es la equivalencia más sobria y bíblica para el movimiento de surgir o asumir lugar, sin añadir una imagen excesiva.
- source_word: regnauit
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - gobernó
  - ejerció reinado
  lexicon: regnō
  rationale: Se mantiene la misma raíz semántica que en la primera cláusula para conservar la correspondencia del texto.
- source_word: multum tenuit tempus
  english_pob_choice: it held power for a long time
  chosen_spanish: tuvo poder por mucho tiempo
  alternatives_spanish:
  - duró mucho tiempo con poder
  - mantuvo el poder por mucho tiempo
  lexicon: teneo
  rationale: El latín combina duración con posesión de dominio. «Tuvo poder por mucho tiempo» reproduce el sentido sin exagerar ni convertirlo en una fórmula idiomática más específica de lo que permite el original.
theological_decisions:
- issue: Impersonal/figurative subject for the succession of kingdoms or rulers
  english_pob_reading: its end came ... then the next rose up and reigned
  chosen_spanish_reading: le llegó su fin ... entonces se levantó el siguiente y reinó
  alternative_spanish_readings:
  - llegó su fin ... entonces el siguiente se levantó y reinó
  - le llegó el fin ... luego surgió el siguiente y reinó
  rationale: El texto no identifica explícitamente el referente con un nombre propio; por eso se conserva la referencia impersonal/figural mediante pronombres y formas neutras, sin aclarar más allá de lo que el latín permite.
  doctrine_reference: No aplica; se trata de imaginería histórica/apocalíptica sin afirmación doctrinal explícita.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB, especialmente la cláusula de desaparición: se preserva la repetición de «no apareció» y «su lugar» en vez de interpretar «could not be seen».'
  spanish_consistency_notes:
  - Se mantiene «aparecer» de manera consistente en ambas cláusulas para reflejar el paralelismo del latín.
  - Se usa «reinó» en ambas apariciones de regnare/regnauit para conservar coherencia léxica.
  - «Tuvo poder» evita sobrerinterpretar tenuit como dominación absoluta; mantiene el matiz de posesión de autoridad/duración.
