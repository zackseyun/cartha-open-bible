translation:
  language: es
  text: Y el cuarto que vino venció a todas las bestias que habían pasado antes, y sostuvo la era[a] con su poder, con gran temor, y sostuvo al mundo entero con la más grave opresión[b], y por tanto tiempo habitó el mundo con engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí «era» traduce saeculum, que también puede significar «mundo» o «tiempo presente» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: 'O: «y sostuvo la era con gran temor, y al mundo entero con la más grave opresión». El latín de este versículo es áspero en varios puntos; esta traducción sigue su sentido más probable e incluye potentatu, «con su poder».'
    reason: textual_variant
lexical_decisions:
- source_word: potentatu tenens
  english_pob_choice: held ... by its power
  chosen_spanish: sostuvo ... con su poder
  alternatives_spanish:
  - retuvo ... por su poder
  - mantuvo ... con su poder
  lexicon: potentatus
  rationale: El añadido revisado del latín exige expresar no solo "sostuvo", sino también el medio de dominio. "Con su poder" conserva la idea de dominio coercitivo sin forzar un calco poco natural en español.
- source_word: saeculum
  english_pob_choice: the age
  chosen_spanish: el siglo
  alternatives_spanish:
  - la era
  - el mundo
  lexicon: saeculum
  rationale: En este contexto apocalíptico, "saeculum" puede aludir al orden presente o al mundo/edad en que ejerce poder. "Siglo" mantiene la ambigüedad de época/orden temporal que el texto latino permite.
- source_word: tremore multo
  english_pob_choice: with great trembling
  chosen_spanish: con gran temor
  alternatives_spanish:
  - con gran temblor
  - en gran temblor
  lexicon: tremor
  rationale: '"Tremor" puede ser temblor físico o miedo reverencial. Dado que el contexto describe dominio opresivo, "temor" comunica de forma natural el efecto producido, sin excluir el matiz de estremecimiento.'
- source_word: omne(m) orbem
  english_pob_choice: the whole world
  chosen_spanish: al mundo entero
  alternatives_spanish:
  - todo el mundo
  - la tierra entera
  lexicon: orbis
  rationale: '"Mundo entero" expresa bien la totalidad del alcance. El objeto directo con "al" hace la frase más natural en español y mantiene la referencia global del latín.'
- source_word: labore pessimo
  english_pob_choice: most grievous oppression
  chosen_spanish: la más grave opresión
  alternatives_spanish:
  - la opresión más terrible
  - el más gravoso afán
  lexicon: labor
  rationale: El latín "labor" aquí sugiere carga/aflicción/opresión, no simple trabajo. "Opresión" sigue la lectura auditada de la POB inglesa y aclara el sentido coercitivo del pasaje.
- source_word: inhabitabant ... cum fraude
  english_pob_choice: inhabited the world with deceit
  chosen_spanish: habitó el mundo con engaño
  alternatives_spanish:
  - moró en el mundo con engaño
  - ocupó el mundo con engaño
  lexicon: inhabitare / fraus
  rationale: Aunque el latín está corrupto al final, la POB inglesa retiene la idea de habitar/ocupar el mundo con engaño. "Engaño" es la equivalencia más directa de "fraude" en este contexto.
theological_decisions:
- issue: Representación del dominio de la cuarta bestia sobre el orden temporal y el mundo
  english_pob_reading: held the age by its power ... and the whole world with most grievous oppression
  chosen_spanish_reading: sostuvo el siglo con su poder, con gran temor, y al mundo entero con la más grave opresión
  alternative_spanish_readings:
  - dominó la era por su poder, con gran temor, y al mundo entero con la más grave opresión
  - retuvo el siglo con su poder, con gran temor, y al mundo entero con la más grave opresión
  rationale: La frase conserva la tensión entre dominio político y duración histórica. No se suaviza "opresión", porque el latín revisado y la auditoría inglesa la tratan como un rasgo central del reinado de la bestia.
  doctrine_reference: Apocalíptica de 4 Esdras; imaginería de poderes bestiales y opresión histórica
- issue: Ambigüedad de saeculum en un contexto apocalíptico
  english_pob_reading: the age
  chosen_spanish_reading: el siglo
  alternative_spanish_readings:
  - la era
  - el mundo
  rationale: Se mantiene una equivalencia que no resuelve artificialmente la ambigüedad del original. "Siglo" es una opción bíblica válida en español para el orden del tiempo presente.
  doctrine_reference: Uso apocalíptico de saeculum en la literatura latina tardía y bíblica
translation_notes:
  revision_awareness: 'La revisión más reciente no modificó el texto, pero sí confirmó la lectura revisada del latín: potentatu debe expresarse en español como un medio de dominio («con su poder»), y la paralela estructura cum ... cum ... debe reflejarse con preposiciones consistentes. También se tomó en cuenta que el cierre latino está textualmente corroído, por lo que se sigue la forma ya establecida por la POB inglesa para la última cláusula.'
  spanish_consistency_notes:
  - Se preservó el tono apocalíptico y la secuencia sintáctica general del latín, evitando una paráfrasis más libre.
  - Se eligió «siglo» para saeculum por ser una opción bíblica estable en español y por mantener la ambigüedad de época/orden presente.
  - Se usó «engaño» para la cláusula final siguiendo la lectura auditada de la POB inglesa, ya que el latino final es corrupto y no permite más precisión sin especulación.
