  text: 'fue enviada a él, diciendo: «Escucha, tú que has tenido dominio sobre la tierra todo este tiempo[a],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tú que has tenido dominio sobre la tierra por tanto tiempo» o «desde hace tanto tiempo»
