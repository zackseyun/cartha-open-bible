review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva correctamente la cláusula inicial del latín, que debe estar en este versículo: «emissa est illi dicens» = «fue enviada a él, diciendo». También refleja bien «Audi» como imperativo singular y «toto tempore» como «todo este tiempo», en línea con la revisión inglesa que corrigió «for so long a time». Sin embargo, «tenuisti terram» se acerca más a ‘has tenido/ocupado/dominado la tierra’ que a «has sostenido la tierra», que introduce una idea de sustentación no exigida por el latín.'
  spanish_quality_summary: El español es claro y digno, pero «has sostenido la tierra» suena algo interpretativo y puede sugerir soporte físico del mundo. Además, la nota al pie no preserva bien la alternativa documentada en el inglés («for so long a time»), sino que ofrece solo paráfrasis casi equivalentes de «todo este tiempo». Conviene una reparación menor para mayor fidelidad y mejor justificación de alternativas.
  glossary_alignment: No hay términos del glosario principal en juego. El tratamiento de «Audi» como «Escucha» es natural. La principal cuestión léxica es «tenuisti», para la cual «has tenido dominio sobre la tierra» o similar preserva mejor la fuerza contextual sin sobreinterpretar como sostén físico.
  issues:
  - severity: medium
    issue: «tenuisti terram» fue traducido como «has sostenido la tierra»
    rationale: El latín «tenere» normalmente significa tener, mantener, retener, ocupar o ejercer dominio; «sostener» puede ser posible en contextos concretos, pero aquí introduce un matiz de soporte físico/cósmico no explícito en la fuente.
  - severity: low
    issue: La nota [a] no refleja la alternativa auditada en inglés
    rationale: La auditoría inglesa preserva como alternativa «for so long a time». La nota española ofrece formulaciones casi equivalentes a «todo este tiempo», pero no la alternativa semántica distinta «por tanto tiempo / desde hace tanto tiempo».
  revised_spanish_text: 'fue enviada a él, diciendo: «Escucha, tú que has tenido dominio sobre la tierra todo este tiempo[a],'
  revised_footnotes:
  - marker: a
    text: O «tú que has tenido dominio sobre la tierra por tanto tiempo» o «desde hace tanto tiempo»
    reason: Preserva la alternativa previa documentada en la auditoría inglesa para «toto tempore».
  revision_rationale: Se ajusta «tenuisti terram» a una expresión española que comunica posesión/control más que sustento físico, y se corrige la nota para reflejar la alternativa auditada en inglés en lugar de meras reformulaciones de «todo este tiempo». La reparación es pequeña y no requiere nueva adjudicación.
