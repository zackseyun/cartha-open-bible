lexical_decisions:
- source_word: emissa est illi dicens
  english_pob_choice: was sent to it, saying
  chosen_spanish: fue enviada a él, diciendo
  alternatives_spanish:
  - le fue enviada, diciendo
  - fue enviada a ella, diciendo
  lexicon: emittere
  rationale: El latino pasivo finito debe conservarse explícitamente en español. «A él» sigue el referente inmediato del latín; «a ella» sería posible solo si el contexto ulterior del pasaje lo exigiera, pero aquí no lo hace el segmento dado.
- source_word: Audi
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escuchen
  lexicon: audire
  rationale: «Escucha» reproduce el imperativo singular con un registro natural y solemne en español bíblico contemporáneo.
- source_word: tu quae toto tempore tenuisti terram
  english_pob_choice: you, who have held the earth all this time
  chosen_spanish: tú que has sostenido la tierra todo este tiempo
  alternatives_spanish:
  - tú que has mantenido la tierra todo este tiempo
  - tú que has tenido la tierra todo este tiempo
  lexicon: tenere
  rationale: «Sostenido» capta mejor la idea de mantener la tierra en su estado o continuidad que el más literal «tenido», que en español sonaría demasiado débil o posesivo. «Todo este tiempo» refleja con precisión toto tempore.
theological_decisions:
- issue: Modo de referirse al destinatario de la voz
  english_pob_reading: you, who have held the earth all this time
  chosen_spanish_reading: tú que has sostenido la tierra todo este tiempo
  alternative_spanish_readings:
  - tú que has mantenido la tierra todo este tiempo
  - tú que has tenido la tierra todo este tiempo
  rationale: No se introduce identificación doctrinal del destinatario más allá de lo que el tramo latino permite. Se conserva la apelación directa y el sentido de dominio/sostén sobre la tierra sin armonizar prematuramente con tradiciones interpretativas externas.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión aplicada corrige la omisión de «emissa est illi dicens» y ajusta «toto tempore» a «todo este tiempo», evitando la lectura anterior «por tanto tiempo» como si fuera un mero alargamiento retórico. La presente redacción incorpora explícitamente el pasivo inicial y mantiene el valor temporal exacto del latino.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento singular directo («tú»), coherente con el imperativo latino Audi.
  - Se evitó introducir mayúsculas teológicas innecesarias, porque el segmento no menciona explícitamente el nombre divino ni un título cristológico.
  - La puntuación con dos puntos y comillas angulares conserva el arranque de discurso directo del latino.
