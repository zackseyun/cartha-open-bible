translation:
  language: es
  text: y devoró a las dos alas inferiores que planeaban reinar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: comedit
  english_pob_choice: and it devoured
  chosen_spanish: y devoró
  alternatives_spanish:
  - y comió
  - y se las comió
  lexicon: comedere
  rationale: El latín comedit expresa aquí una acción de consumir/aniquilar con fuerza; «devoró» reproduce mejor esa intensidad en español que un simple «comió», y sigue de cerca la elección inglesa «devoured».
- source_word: duas subalares
  english_pob_choice: the two under-wings
  chosen_spanish: a las dos alas inferiores
  alternatives_spanish:
  - a las dos alas de abajo
  - a las dos alas subalternas
  lexicon: subalaris
  rationale: La expresión latina es inusual y literalmente significa algo como «sub-alas» o «alas inferiores». «Alas inferiores» conserva la imagen y la rareza del término sin imponer una interpretación más fuerte que la del texto.
- source_word: quae cogitabant regnare
  english_pob_choice: that were planning to reign
  chosen_spanish: que planeaban reinar
  alternatives_spanish:
  - que pensaban reinar
  - que estaban pensando en reinar
  lexicon: cogitare + regnare
  rationale: cogitabant indica una intención o propósito mental; «planeaban» comunica bien esa orientación volitiva y preserva la tensión de una aspiración al poder sin volverla demasiado interpretativa.
theological_decisions:
- issue: Imagen apocalíptica de alas y reinar
  english_pob_reading: the two under-wings that were planning to reign
  chosen_spanish_reading: las dos alas inferiores que planeaban reinar
  alternative_spanish_readings:
  - las dos alas subalternas que pensaban reinar
  - las dos alas de abajo que querían reinar
  rationale: No se suaviza la imagen simbólica ni se identifica alegóricamente a las alas. La traducción mantiene el carácter visionario y la ambición política implícita en regnare, sin añadir una explicación doctrinal no presente en el texto.
  doctrine_reference: Apocalíptica / imaginería simbólica no explicitada
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con la revisión más reciente: no se reportaron cambios y el cotejo externo marcó acuerdo alto (1.0). Por eso la redacción española sigue de cerca el texto latino limpio y la solución inglesa auditada.'
  spanish_consistency_notes:
  - Se mantuvo un registro formal y bíblico, pero con español natural.
  - Se preservó la metáfora de «alas» sin convertirla en una interpretación histórica específica.
  - «Devoró» mantiene la fuerza verbal del latín y el eco del inglés auditado.
