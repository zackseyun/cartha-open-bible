    rationale: En español, un ave no normalmente «vuela sobre sus alas»; la expresión sugiere ubicación física extraña. El latín indica el medio o soporte del vuelo. «Voló con sus alas» conserva el sentido y mejora la naturalidad sin ampliar el significado.
