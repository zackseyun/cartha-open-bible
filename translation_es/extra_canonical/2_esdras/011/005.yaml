translation:
  language: es
  text: Y miré, y he aquí que el águila voló con sus alas para reinar sobre la tierra y sobre los que habitan en ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et uidi et ecce
  english_pob_choice: And I looked, and behold
  chosen_spanish: Y miré, y he aquí
  alternatives_spanish:
  - Y vi, y he aquí
  - Y observé, y he aquí
  lexicon: Latin uidi
  rationale: El latín expresa una percepción visual en primera persona; «miré» conserva el acto de observar y mantiene un tono bíblico natural en español. «He aquí» reproduce bien ecce como fórmula de introducción enfática.
- source_word: aquila
  english_pob_choice: the eagle
  chosen_spanish: el águila
  alternatives_spanish:
  - la águila
  lexicon: Latin aquila
  rationale: 'El sustantivo es femenino en español; se usa el artículo masculino por la regla ortográfica con a tónica inicial: «el águila».'
- source_word: uolauit in pennis suis
  english_pob_choice: flew on its wings
  chosen_spanish: voló sobre sus alas
  alternatives_spanish:
  - voló en sus alas
  - voló con sus alas
  lexicon: Latin uolauit
  rationale: La construcción latina literalmente dice que voló «en/sobre sus plumas/alasi». «Sobre sus alas» comunica el movimiento y evita una calca extraña, manteniendo la imagen del vuelo del águila.
- source_word: ut regnaret
  english_pob_choice: to reign
  chosen_spanish: para reinar
  alternatives_spanish:
  - a fin de reinar
  - con el fin de reinar
  lexicon: Latin regnaret
  rationale: 'El infinitivo final en español expresa con claridad la finalidad del vuelo: gobernar/reinar. «Reinar» es la equivalencia directa y adecuada al contexto imperial del pasaje.'
- source_word: super terram et super eos qui habitant in ea
  english_pob_choice: over the earth and over those who dwell in it
  chosen_spanish: sobre la tierra y sobre los que habitan en ella
  alternatives_spanish:
  - sobre la tierra y sobre quienes habitan en ella
  - sobre la tierra y sobre los habitantes de ella
  lexicon: Latin super + acc.
  rationale: Se conserva la repetición de super con «sobre» para mantener la fuerza de dominio/soberanía. «Los que habitan en ella» es fiel al relativo latino y mantiene el tono solemne.
theological_decisions:
- issue: Imagen del águila como poder soberano sobre el mundo habitado
  english_pob_reading: the eagle flew on its wings to reign over the earth and over those who dwell in it
  chosen_spanish_reading: el águila voló sobre sus alas para reinar sobre la tierra y sobre los que habitan en ella
  alternative_spanish_readings:
  - el águila voló con sus alas para gobernar la tierra y a los que habitan en ella
  - el águila voló sobre sus alas para dominar la tierra y a los que la habitan
  rationale: El texto latino presenta a la águila como figura de dominio universal. «Reinar» conserva mejor la imagen política y regia que «gobernar» o «dominar», sin añadir interpretación que no esté ya implicada por regnaret y super.
  doctrine_reference: Simbolismo imperial en 2 Esdras; lectura histórica-literaria del poder representado por el águila.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto presenta alto acuerdo entre fuente latina y auditoría inglesa, por lo que la traducción española sigue de cerca el sentido literal sin necesidad de notas de variante.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «reinar» para regnaret por su correspondencia directa con el contexto de soberanía imperial.
  - Se conserva la repetición de «sobre» para reflejar la estructura de dominio del latín.
  - No se añaden notas porque la fuente y la auditoría inglesa muestran acuerdo alto y ninguna ambigüedad relevante para este versículo.
