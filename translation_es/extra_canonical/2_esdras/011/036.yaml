translation:
  language: es
  text: Entonces vi, y he aquí, algo semejante a un león despertado del bosque.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et vidi
  english_pob_choice: Then I saw
  chosen_spanish: Entonces vi
  alternatives_spanish:
  - Y vi
  - Luego vi
  lexicon: Latin videre
  rationale: El perfecto narrativo latino se vierte naturalmente con un pasado simple en español; 'Entonces vi' conserva la secuencia narrativa y la sobriedad del texto.
- source_word: ecce
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: Latin ecce
  rationale: '''He aquí'' reproduce el valor de atención y sorpresa de ''behold'' con registro bíblico claro y natural en español.'
- source_word: sicut leo
  english_pob_choice: something like a lion
  chosen_spanish: algo semejante a un león
  alternatives_spanish:
  - como un león
  - algo como un león
  lexicon: Latin sicut + leo
  rationale: El latín expresa comparación, no identificación literal; 'algo semejante a un león' preserva esa cautela semántica mejor que una equivalencia directa.
- source_word: suscitatus
  english_pob_choice: roused
  chosen_spanish: levantado
  alternatives_spanish:
  - despertado
  - alzando-se
  lexicon: Latin suscitare
  rationale: '''Levantado'' comunica el acto de ser alzado o puesto en movimiento con un tono sobrio; evita forzar ''despertado'' si la imagen es de surgimiento o alzamiento desde el bosque.'
- source_word: de silva
  english_pob_choice: from the forest
  chosen_spanish: de la selva
  alternatives_spanish:
  - del bosque
  - del monte
  lexicon: Latin silva
  rationale: '''Silva'' puede ser ''bosque'' o ''selva''; aquí ''selva'' mantiene el imaginario bíblico de espesura y terreno silvestre sin perder inteligibilidad en español.'
theological_decisions:
- issue: Naturaleza de la imagen del león
  english_pob_reading: something like a lion roused from the forest
  chosen_spanish_reading: algo semejante a un león levantado de la selva
  alternative_spanish_readings:
  - como un león levantado de la selva
  - algo como un león despertado del bosque
  rationale: El texto no afirma explícitamente identidad simbólica o cristológica; por eso la versión española conserva la comparación abierta y no añade interpretación.
  doctrine_reference: Principio de sobriedad exegética; no ampliar la imagen más allá del texto base.
translation_notes:
  revision_awareness: La revisión reciente corrigió un borrador que no seguía el latín. Esta versión se ajusta a 'Et vidi et ecce sicut leo suscitatus de silva' y mantiene la comparación, la sorpresa de 'ecce' y la imagen de surgimiento desde la silva.
  spanish_consistency_notes:
  - Se prefirió 'he aquí' para corresponder a 'ecce' con un registro bíblico natural.
  - '''Selva'' se conserva como opción viable para ''silva'' dentro del rango semántico español; ''bosque'' quedó como alternativa principal si se prioriza un matiz menos denso.'
  - No se añadió nota de pie porque no hay ambigüedad textual que requiera anclaje explícito en este verso.
