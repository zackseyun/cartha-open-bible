- from: Entonces vi, y he aquí, algo semejante a un león levantado de la selva.
  to: Entonces vi, y he aquí, algo semejante a un león despertado del bosque.
  rationale: Se revisa «levantado de la selva» a «despertado del bosque» para reflejar con mayor fidelidad el latín suscitatus de silva y el English POB «roused from the forest», manteniendo la comparación abierta y un español natural y sobrio.
