translation:
  language: es
  text: No vigiléis todos al mismo tiempo; dormid, cada uno en su lugar, y vigilad por un tiempo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Nolite omnes simul uigilare
  english_pob_choice: Do not all keep watch at once
  chosen_spanish: No vigiléis todos al mismo tiempo
  alternatives_spanish:
  - No estén todos vigilando a la vez
  - No veléis todos juntos
  lexicon: nolite > no + subjuntivo; vigilare > velar / vigilar
  rationale: El latín prohíbe una acción conjunta inmediata. «Vigilar» conserva el sentido de estar despiertos con propósito; «al mismo tiempo» expresa bien simul sin introducir una idea extra.
- source_word: dormite
  english_pob_choice: sleep
  chosen_spanish: duerma
  alternatives_spanish:
  - dormid
  - duerman
  lexicon: dormire > dormir
  rationale: Se usa el imperativo en tercera persona del plural por concordancia con «cada uno». En español, «dormir» es la equivalencia natural y clara para dormite.
- source_word: unusquisque in loco suo
  english_pob_choice: each one in his own place
  chosen_spanish: cada uno en su lugar
  alternatives_spanish:
  - cada cual en su sitio
  - cada uno en el suyo
  lexicon: unusquisque > cada uno; locus > lugar
  rationale: La frase mantiene la distribución individual del latín sin añadir posesividad innecesaria. «En su lugar» refleja de manera idiomática la idea de permanecer en el sitio asignado.
- source_word: et per tempus uigilate
  english_pob_choice: and keep watch for a time
  chosen_spanish: y vigilad por un tiempo
  alternatives_spanish:
  - y velad durante un tiempo
  - y estad vigilando por un tiempo
  lexicon: per tempus > por un tiempo / durante un tiempo
  rationale: La revisión inglesa corrigió «in turn» a «for a time» para reflejar per tempus. En español, «por un tiempo» reproduce esa duración limitada sin forzar una idea de turno que el latín no exige.
theological_decisions:
- issue: Distribución alternada de la vigilancia vs. duración limitada
  english_pob_reading: keep watch for a time
  chosen_spanish_reading: vigilad por un tiempo
  alternative_spanish_readings:
  - vigilad en turnos
  - vigilad por turnos
  rationale: El latín per tempus indica una vigilancia limitada en el tiempo, no necesariamente una rotación formal. Por eso se evita una traducción que introduzca explícitamente «turnos».
  doctrine_reference: Literal sense / discourse timing, no doctrinal implication
translation_notes:
  revision_awareness: La versión inglesa POB fue revisada desde «in turn» a «for a time» para ajustarse mejor al latín per tempus. La redacción española sigue esa revisión y evita cualquier formulación que sugiera necesariamente rotación por turnos.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, sin arcaísmos innecesarios.
  - «Vigilar» se usa de forma coherente con el sentido de permanecer alerta; no se introduce «velar» para evitar ambigüedad ritual.
  - La concordancia verbal con «cada uno» se ha resuelto en singular («duerma») para naturalidad en español, sin alterar el sentido distributivo del original.
