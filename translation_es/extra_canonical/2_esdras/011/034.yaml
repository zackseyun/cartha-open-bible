translation:
  language: es
  text: Pero quedaron dos cabezas, y también ellas reinaron sobre la tierra y sobre los que habitan en ella. Y vi, y he aquí,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: auerunt autem duo capita
  english_pob_choice: But two heads remained
  chosen_spanish: Pero quedaron dos cabezas
  alternatives_spanish:
  - Pero permanecieron dos cabezas
  - Pero subsistieron dos cabezas
  lexicon: Latin auerunt / English remained
  rationale: «Quedaron» expresa con naturalidad en español la idea de que todavía seguían presentes después del proceso narrado, sin añadir matices no garantizados por el latino.
- source_word: regnauerunt
  english_pob_choice: they too reigned
  chosen_spanish: también ellas reinaron
  alternatives_spanish:
  - también reinaron
  - y ellas también gobernaron
  lexicon: Latin regnare
  rationale: «Reinaron» mantiene el verbo regio del original; «gobernaron» sería posible, pero suaviza el lenguaje monárquico presente en el texto.
- source_word: super terram et super eos qui inhabitant in ea
  english_pob_choice: over the earth and over those who dwell in it
  chosen_spanish: sobre la tierra y sobre los que habitan en ella
  alternatives_spanish:
  - sobre la tierra y sobre quienes habitan en ella
  - sobre la tierra y sobre los que viven en ella
  lexicon: Latin super + inhabitant
  rationale: La preposición repetida «sobre» conserva la estructura de dominio del latín. «Habitan» sigue de cerca inhabitant sin sobreinterpretar.
- source_word: Et uidi et ecce
  english_pob_choice: And I saw, and behold,
  chosen_spanish: Y vi, y he aquí,
  alternatives_spanish:
  - Y vi, y he aquí
  - Y vi, y miré, y he aquí
  lexicon: Latin et vidi et ecce
  rationale: «Y he aquí» es la forma española tradicional y clara para marcar la fórmula visionaria de sorpresa/atención; se conserva la cláusula final añadida en la revisión inglesa.
theological_decisions:
- issue: Conveying royal rule without weakening the imagery
  english_pob_reading: they too reigned over the earth
  chosen_spanish_reading: también ellas reinaron sobre la tierra
  alternative_spanish_readings:
  - también gobernaron sobre la tierra
  - también ejercieron dominio sobre la tierra
  rationale: El texto latino usa un verbo de reinar; mantenerlo preserva la imaginería política-apocalíptica del pasaje sin explicar más de lo que el texto dice.
  doctrine_reference: Apocalíptica simbólica / imaginería de dominio
translation_notes:
  revision_awareness: La redacción española incorpora la cláusula final añadida en la revisión inglesa para reflejar el latino «Et uidi et ecce». No hay notas textuales adicionales porque el segmento es breve y el latín recibido es estable en el sentido base.
  spanish_consistency_notes:
  - Se mantiene un español sobrio y literal en la parte narrativa para respetar el paralelismo del latín.
  - «Y he aquí» conserva la fórmula visionaria sin modernizarla en exceso.
  - No se introduce «Cristo», «SEÑOR» ni otros términos no presentes en el segmento.
