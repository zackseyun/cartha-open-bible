    issue: Calco sintáctico en «no con verdad»
    rationale: Aunque formalmente cercano al inglés/latín, en español suena poco natural. «Sin verdad» conserva el reproche de falta de verdad en el juicio de manera más idiomática y fiel al registro meta.
  revised_spanish_text: Y juzgaste la tierra sin verdad.
  revision_rationale: Se reemplaza «no con verdad» por «sin verdad» para lograr un español más natural y digno, manteniendo exactamente el mismo sentido de ausencia de verdad en el juicio.
