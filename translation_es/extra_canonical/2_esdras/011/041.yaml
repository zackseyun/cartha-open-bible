translation:
  language: es
  text: Y juzgaste la tierra sin verdad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: iudicasti
  english_pob_choice: you judged
  chosen_spanish: juzgaste
  alternatives_spanish:
  - sentenciaste
  - juzgaste y resolviste
  lexicon: iudico
  rationale: El latín perfecto iudicasti expresa un acto de juicio ya realizado; «juzgaste» reproduce de forma directa y natural la acción judicial sin añadir matices no presentes en el texto.
- source_word: terram
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - la tierra habitada
  lexicon: terra
  rationale: La correspondencia más inmediata y fiel para terram es «la tierra». «El mundo» sería posible por contexto, pero aquí el latín no lo exige.
- source_word: non ... cum dolo / non veritate
  english_pob_choice: not with truth
  chosen_spanish: no con verdad
  alternatives_spanish:
  - no en verdad
  - no con rectitud
  lexicon: veritas
  rationale: El contraste del contexto latino entre dolo («engaño», «fraude») y veritas justifica una negación expresada como «no con verdad». En español conserva la tensión entre verdad y engaño sin sobreinterpretar.
theological_decisions:
- issue: Relación entre verdad y juicio justo
  english_pob_reading: And you judged the earth not with truth.
  chosen_spanish_reading: Y juzgaste la tierra no con verdad.
  alternative_spanish_readings:
  - Y juzgaste la tierra sin verdad.
  - Y juzgaste la tierra no justamente.
  rationale: Se mantiene la formulación breve y literal del POB inglés, preservando la acusación de falta de verdad en el juicio sin convertirla en una explicación más amplia de injusticia.
  doctrine_reference: Justicia/veracidad judicial en el lenguaje bíblico; no se introduce una doctrina adicional más allá del reproche textual.
translation_notes:
  revision_awareness: El texto fuente latino es breve y coincide plenamente con la línea inglesa auditada; no hubo revisiones aplicadas ni notas en el POB inglés. La versión española sigue la misma economía sintáctica y conserva el contraste semántico entre dolo y verdad implícito en el latín.
  spanish_consistency_notes:
  - Se usa «tierra» para terram, manteniendo la referencia global sin expandirla a «mundo».
  - Se conserva el orden sencillo sujeto-verbo-complemento para reflejar la concisión del latín.
  - «Verdad» se mantiene sin glosa adicional porque el audit trail inglés también opta por una formulación directa.
