base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/011/044.yaml
  text: And the Most High has looked upon his times, and behold, they have ended, and his ages are complete.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:50:18Z'
    unchanged: false
    changes_summary: Adjusted 'they are ended' to the more natural 'they have ended' while preserving the source sense and structure.
translation:
  language: es
  text: Y el Altísimo ha puesto su mirada en sus tiempos, y he aquí, han llegado a su fin, y sus edades están completas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Supremo
  lexicon: altissimus -> Altísimo
  rationale: En latín se trata de un título divino; «el Altísimo» es la forma natural y reverente en español, fiel al valor titular del original y del inglés POB.
- source_word: respexit
  english_pob_choice: has looked upon
  chosen_spanish: ha mirado
  alternatives_spanish:
  - ha contemplado
  - ha considerado
  lexicon: respicere -> mirar / volver la mirada hacia
  rationale: El verbo latino expresa una mirada dirigida hacia algo, no necesariamente una acción salvadora explícita. «Ha mirado» conserva la sencillez aspectual del inglés POB sin añadir matices no garantizados.
- source_word: sua tempora
  english_pob_choice: his times
  chosen_spanish: sus tiempos
  alternatives_spanish:
  - sus tiempos señalados
  - sus épocas
  lexicon: tempora -> tiempos
  rationale: «Tiempos» reproduce el plural latino y mantiene la amplitud temporal del texto. «Sus tiempos señalados» explicita demasiado el sentido y «épocas» estrecha el campo semántico.
- source_word: finita sunt
  english_pob_choice: they have ended
  chosen_spanish: se han acabado
  alternatives_spanish:
  - han terminado
  - han llegado a su fin
  lexicon: finire -> acabar(se) / terminar
  rationale: La revisión inglesa favorece una perfectividad natural («have ended»). «Se han acabado» suena idiomático en español y preserva el resultado consumado sin desplazar el sujeto implícito.
- source_word: saecula eius
  english_pob_choice: his ages
  chosen_spanish: sus edades
  alternatives_spanish:
  - sus siglos
  - sus eras
  lexicon: saecula -> edades / siglos / eras
  rationale: «Edades» sigue de cerca el plural latino y evita imponer una lectura cronológica más estrecha que «siglos». Conserva la amplitud histórica/temporal del POB inglés.
- source_word: conpleta sunt
  english_pob_choice: are complete
  chosen_spanish: se han cumplido
  alternatives_spanish:
  - están completas
  - se han completado
  lexicon: complere -> cumplir(se) / completar
  rationale: «Cumplirse» expresa bien la idea de algo que ha alcanzado su plenitud o término. Aunque el inglés POB usa «are complete», en español «se han cumplido» comunica con más naturalidad el cierre consumado del período.
theological_decisions:
- issue: Título divino en lugar de nombre propio o fórmula eufemística
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Dios Altísimo
  - el Supremo
  rationale: El latín usa un título divino universal, no el nombre YHWH. Por eso no se introduce «Yahvé» ni una sustitución interpretativa; «el Altísimo» mantiene el registro bíblico y el paralelismo con el inglés POB.
  doctrine_reference: Título divino bíblico / teología del Dios supremo
- issue: Valor de los tiempos y edades como marco providencial
  english_pob_reading: his times ... his ages are complete
  chosen_spanish_reading: sus tiempos ... sus edades se han cumplido
  alternative_spanish_readings:
  - sus tiempos ... han terminado, y sus eras están completas
  - sus tiempos señalados ... se han cumplido
  rationale: La cláusula expresa el cumplimiento del marco temporal asignado. «Se han cumplido» y «se han acabado» conservan la idea de consumación sin introducir una interpretación más específica de juicio o calendario escatológico que la fuente no explicita.
  doctrine_reference: Providencia divina / consumación de los tiempos
translation_notes:
  revision_awareness: La revisión inglesa corrigió «they are ended» a «they have ended» para reflejar con más naturalidad el perfecto consumado. La redacción española adopta desde el inicio una forma perfectiva equivalente («se han acabado» / «se han cumplido») que preserva esa mejora revisada sin perder la estructura coordinada del original latino.
  spanish_consistency_notes:
  - Se mantiene el artículo en «el Altísimo» por tratarse de un título divino sustantivado.
  - 'Se conserva la coordinación con dos miembros paralelos: fin del período («se han acabado») y plenitud de las edades («se han cumplido»).'
  - No se introduce puntuación interpretativa adicional; la coma antes de «y he aquí» sigue la cadencia del original y del inglés POB.
