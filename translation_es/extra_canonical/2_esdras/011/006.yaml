    timestamp: '2026-04-23T19:49:43Z'
    unchanged: false
    changes_summary: Changed 'opposed' to 'contradicted' to more closely reflect the Latin contradicebat. Kept the rest unchanged.
translation:
  language: es
  text: Y vi cómo todo lo que hay bajo el cielo estaba sometido a él, y nadie le contradijo[a], ni una sola criatura que está sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «se le opuso».'
    reason: Matiz contextual de resistencia frente al dominio, preservando la alternativa semántica sin desplazar la traducción principal «contradijo».
lexical_decisions:
- source_word: subiecti erant ei omnia sub caelo
  english_pob_choice: everything under heaven was subjected to it
  chosen_spanish: todo lo que está bajo el cielo le estaba sometido
  alternatives_spanish:
  - todo bajo el cielo le estaba sometido
  - todas las cosas bajo el cielo le estaban sometidas
  lexicon: subicere > someter; omnia > todo lo que / todas las cosas
  rationale: El latín expresa una sumisión total y general. «Estaba sometido» conserva el valor de dominación/subordinación sin volverla más interpretativa. «Todo lo que está bajo el cielo» sigue de cerca la estructura del original y su alcance universal.
- source_word: nemo illi contradicebat
  english_pob_choice: no one contradicted it
  chosen_spanish: nadie le contradijo
  alternatives_spanish:
  - nadie se le opuso
  - nadie le contradijo ni resistió
  lexicon: contradicere > contradecir; illi > le
  rationale: El audit trail confirma que el sentido es de resistencia/contestación frente al dominio, pero la redacción inglesa final mantuvo «contradicted». En español, «contradecir» reproduce de forma directa el verbo latino y la relación de oposición verbal o práctica sin perder la ambigüedad ya presente en el texto fuente.
- source_word: neque unus de creatura, quae est super terram
  english_pob_choice: not even one creature that is upon the earth
  chosen_spanish: ni una sola criatura que esté sobre la tierra
  alternatives_spanish:
  - ni una criatura sobre la tierra
  - ni siquiera una criatura que esté sobre la tierra
  lexicon: creatura > criatura
  rationale: «Criatura» sigue fielmente el latín creatura. «Ni una sola» intensifica el universal negativo de neque unus y mantiene el matiz enfático del original. «Que esté» conserva la relativa del texto latino sin sobrerrepresentar el aspecto.
theological_decisions:
- issue: Dominio universal del poder representado
  english_pob_reading: everything under heaven was subjected to it
  chosen_spanish_reading: todo lo que está bajo el cielo le estaba sometido
  alternative_spanish_readings:
  - todo bajo el cielo le estaba sometido
  - todas las cosas bajo el cielo le estaban sometidas
  rationale: 'No se moraliza ni se espiritualiza el enunciado: la frase describe una sujeción universal dentro de la imagen apocalíptica del águila/poder imperial. «Le estaba sometido» mantiene la relación de sometimiento sin introducir explicaciones ajenas al verso.'
  doctrine_reference: 4 Esdras 11:6; imagen del poder imperial total bajo el cielo
translation_notes:
  revision_awareness: La última revisión en inglés volvió de «opposed it» a «contradicted it» para ajustarse más al latín contradicebat. La versión española sigue esa decisión y traduce de forma transparente con «le contradijo», evitando desplazar el sentido hacia una resistencia más libre que la forma final auditada no adoptó.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no aplica.
  - Se mantiene el registro sobrio y bíblico, pero sin forzar arcaísmos innecesarios.
  - «Contradijo» se conserva para reflejar el latín contradicebat, aun cuando el contexto permita inferir oposición/resistencia.
  - «Criatura» reproduce creatura; no se reemplaza por «ser» o «creación» para no diluir el término latino.
