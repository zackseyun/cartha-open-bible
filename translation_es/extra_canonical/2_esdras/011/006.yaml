revisions:
- from: Y vi cómo todo lo que está bajo el cielo le estaba sometido[a], y nadie le contradijo, ni una sola criatura que esté sobre la tierra.
  to: Y vi cómo todo lo que hay bajo el cielo estaba sometido a él, y nadie le contradijo[a], ni una sola criatura que está sobre la tierra.
  rationale: Se corrige la colocación de la nota para que corresponda al verbo adecuado, se mejora la naturalidad del español con «todo lo que hay bajo el cielo estaba sometido a él», y se mantiene «contradijo» como texto principal por fidelidad al latín contradicebat y a la decisión final auditada del POB. La nota recoge el matiz contextual de oposición/resistencia sin alterar el cuerpo del versículo.
