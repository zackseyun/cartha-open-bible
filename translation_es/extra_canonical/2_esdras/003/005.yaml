base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/003/005.yaml
  text: And you gave Adam a dead body? Yet he too was the work of your hands, and you breathed into him the spirit of life, and he became alive before you.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:24Z'
    unchanged: false
    changes_summary: Corrected the subject from 'it' to 'you' to match the Latin verb, removed the awkward comma after 'Adam,' and revised 'became living' to the more natural 'became alive' while preserving the sense.
translation:
  language: es
  text: ¿Y diste a Adán un cuerpo muerto? Sin embargo, él también era obra de tus manos, e insuflaste en él el espíritu de vida, y cobró vida delante de ti.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et dedit tibi Adam
  english_pob_choice: And you gave Adam
  chosen_spanish: Y diste a Adán
  alternatives_spanish:
  - Y le diste a Adán
  - Y diste Adán
  lexicon: dare -> dar; Adam -> Adán
  rationale: El latín usa dedit con tibi como destinatario; por eso el sujeto implícito es «tú». En español, «diste a Adán» conserva el orden directo y la relación de dativo sin añadir elementos ajenos al texto.
- source_word: corpus mortuum
  english_pob_choice: a dead body
  chosen_spanish: un cuerpo muerto
  alternatives_spanish:
  - un cadáver
  - un cuerpo sin vida
  lexicon: corpus -> cuerpo; mortuum -> muerto
  rationale: «Cuerpo muerto» sigue de cerca la fuerza del latín y preserva la tensión retórica del pasaje. «Cadáver» sería más fuerte y menos neutral; «cuerpo sin vida» suaviza demasiado la expresión.
- source_word: sed et ipsum figmentum manuum tuarum erat
  english_pob_choice: Yet he too was the work of your hands
  chosen_spanish: Sin embargo, él también era obra de tus manos
  alternatives_spanish:
  - Pero también él era la obra de tus manos
  - Y sin embargo, él mismo era obra de tus manos
  lexicon: figmentum -> obra/formación; manuum tuarum -> tus manos
  rationale: «Obra de tus manos» es la equivalencia natural y transparente para figmentum manuum tuarum. Se mantiene «él también» para reflejar ipsum y conservar el contraste enfático con Adán como objeto del acto divino.
- source_word: insufflasti in eum spiritum uitae
  english_pob_choice: and you breathed into him the spirit of life
  chosen_spanish: e insuflaste en él el espíritu de vida
  alternatives_spanish:
  - y soplaste en él el espíritu de vida
  - e infundiste en él el aliento de vida
  lexicon: insufflare -> insuflar; spiritus vitae -> espíritu de vida
  rationale: «Insuflaste» reproduce con precisión el verbo latino y su imaginería de aliento dado por Dios. «Espíritu de vida» conserva la construcción tradicional del texto fuente sin forzarla hacia «aliento», que debilitaría la correspondencia con spiritum uitae.
- source_word: factus est uiuens coram te
  english_pob_choice: and he became alive before you
  chosen_spanish: y quedó vivo delante de ti
  alternatives_spanish:
  - y se volvió vivo delante de ti
  - y llegó a estar vivo delante de ti
  lexicon: fieri -> hacerse/ quedar; vivens -> vivo; coram te -> delante de ti
  rationale: La revisión inglesa prefirió «became alive» frente a «became living» por naturalidad. En español, «quedó vivo» transmite el estado resultante con fluidez y mantiene el matiz de cambio de condición ante Dios.
theological_decisions:
- issue: Relación entre la creación humana y la vivificación divina
  english_pob_reading: And you gave Adam a dead body? Yet he too was the work of your hands, and you breathed into him the spirit of life, and he became alive before you.
  chosen_spanish_reading: Y diste a Adán un cuerpo muerto? Sin embargo, él también era obra de tus manos, e insuflaste en él el espíritu de vida, y quedó vivo delante de ti.
  alternative_spanish_readings:
  - Y diste a Adán un cuerpo muerto? ... y quedó viviente delante de ti
  - Y diste a Adán un cadáver? ... y se hizo vivo delante de ti
  rationale: El versículo contrasta la condición corporal de Adán con la acción vivificadora directa de Dios. La traducción conserva ese contraste sin suavizar la afirmación de que la vida procede del soplo divino. «Delante de ti» mantiene la relación personal y judicial del hebraísmo/latín coram te.
  doctrine_reference: Génesis 2:7; Sabiduría 15:11; 1 Corintios 15:45
translation_notes:
  revision_awareness: 'La versión inglesa fue revisada para corregir el sujeto de «it» a «you», eliminar una coma impropia tras «Adam» y preferir «became alive» por naturalidad. La redacción española sigue esa lectura revisada y la refleja con un verbo personal en segunda persona y con una expresión idiomática de resultado: «quedó vivo».'
  spanish_consistency_notes:
  - Se mantiene «Adán» como nombre propio, no «Adam».
  - Se usa «espíritu» para spiritum, no «aliento», para conservar la correspondencia lexical del latín y el énfasis en la vivificación divina.
  - Se evita «SEÑOR» porque el texto latino no contiene el Tetragrámaton ni una sustitución explícita de κύριος.
