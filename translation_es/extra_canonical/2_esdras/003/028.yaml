revisions:
- from: 'Entonces dije en mi corazón[a]: «¿Acaso hacen mejor los que habitan en Babilonia, y por eso Sión está bajo dominio?»'
  to: 'Entonces dije en mi corazón[a]: «¿Acaso obran mejor los que habitan en Babilonia, y por eso Sión es dominada?»'
  rationale: Se ajusta «hacen mejor» a «obran mejor» para un español más natural y fiel al sentido moral comparativo de meliora faciunt. Se cambia «está bajo dominio» por «es dominada» para dar una formulación más idiomática, conservando la ambigüedad del agente y la cautela de la revisión inglesa respecto del latín difícil.
