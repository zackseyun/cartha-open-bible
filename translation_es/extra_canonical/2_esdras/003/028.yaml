source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'Et dixi ego tunc in corde meo: numquid meliora faciunt qui habitant in Babylone, et propter hoc dominabit Sion?'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/003/028.yaml
  text: Then I said in my heart[28], ‘Do those who live in Babylon act better, and is that why Zion is ruled?’
  footnotes:
  - marker: '28'
    text: The Latin here is awkward and may reflect a disturbed line in transmission. Ezra's complaint contrasts Babylon's apparent flourishing with Zion's downfall; the translation preserves the rhetorical question without forcing a smoother reconstruction.
    reason: alternative_reading
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:28Z'
    unchanged: false
    changes_summary: 'Revised the second clause to reflect the Latin more directly: dominabit Sion is about Zion being under dominion, not Babylon explicitly gaining dominion over Zion. Also adjusted punctuation slightly for natural formal English.'
translation:
  language: es
  text: 'Entonces dije en mi corazón[a]: «¿Acaso obran mejor los que habitan en Babilonia, y por eso Sión es dominada?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El latín de esta línea es áspero y puede reflejar una transmisión alterada. La traducción conserva la pregunta retórica sin reconstruirla de manera más lisa.
    reason: alternative_reading
lexical_decisions:
- source_word: Et dixi ego tunc in corde meo
  english_pob_choice: Then I said in my heart
  chosen_spanish: Entonces dije en mi corazón
  alternatives_spanish:
  - Y dije entonces en mi corazón
  - Entonces me dije en mi corazón
  lexicon: dixi = dije; in corde meo = en mi corazón
  rationale: Conserva la formulación idiomática bíblica y el matiz interior del discurso. «Dije en mi corazón» es natural en español y mantiene la referencia a una reflexión interna sin suavizarla en exceso.
- source_word: numquid
  english_pob_choice: Do ... ?
  chosen_spanish: ¿Acaso ... ?
  alternatives_spanish:
  - ¿Hacen ... ?
  - ¿Será que ... ?
  lexicon: numquid = interrogación retórica con expectativa negativa o de extrañeza
  rationale: «Acaso» reproduce bien la fuerza retórica de la pregunta latina, que no pide información neutral sino que cuestiona con sorpresa o protesta.
- source_word: meliora faciunt
  english_pob_choice: act better
  chosen_spanish: hacen mejor
  alternatives_spanish:
  - se portan mejor
  - obran mejor
  lexicon: meliora facere = hacer mejor / obrar mejor
  rationale: «Hacen mejor» sigue de cerca el valor comparativo del latino. No se especifica una norma moral explícita más allá de la comparación implícita del contexto.
- source_word: qui habitant in Babylone
  english_pob_choice: those who live in Babylon
  chosen_spanish: los que habitan en Babilonia
  alternatives_spanish:
  - los que viven en Babilonia
  - los habitantes de Babilonia
  lexicon: habitare in = habitar / vivir en
  rationale: «Habitan en Babilonia» conserva el registro elevado y el paralelismo bíblico, sin perder inteligibilidad en español.
- source_word: dominabit Sion
  english_pob_choice: Zion is ruled
  chosen_spanish: Sión está bajo dominio
  alternatives_spanish:
  - Sión es dominada
  - Sión está sometida
  lexicon: 'dominare / dominari = dominar; en pasiva/resultado: estar bajo dominio'
  rationale: La revisión inglesa indicó que el latino apunta al estado de Sión bajo dominio, no a que Babilonia haya ganado dominio explícitamente en la frase. «Está bajo dominio» preserva esa relación sin forzar el agente.
theological_decisions:
- issue: Relación entre Babilonia y Sión en la pregunta retórica
  english_pob_reading: Do those who live in Babylon act better, and is that why Zion is ruled?
  chosen_spanish_reading: ¿Acaso hacen mejor los que habitan en Babilonia, y por eso Sión está bajo dominio?
  alternative_spanish_readings:
  - ¿Acaso obran mejor los que habitan en Babilonia, y por eso Sión es dominada?
  - ¿Acaso se comportan mejor los que viven en Babilonia, y por eso Sión está sometida?
  rationale: 'Sigo la lectura revisada del POB: la segunda cláusula describe el estado de Sión bajo dominio, no añade explícitamente a Babilonia como sujeto del verbo. La formulación española preserva la tensión y la ambigüedad del latín transmitido.'
  doctrine_reference: No doctrinal issue; textual/rhetorical nuance only.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB, que corrigió la segunda cláusula para reflejar más de cerca el latín dominabit Sion como un estado de Sión bajo dominio, en vez de atribuir explícitamente a Babilonia la acción de haber ganado dominio sobre Sión. Mantengo además el carácter abrupto de la línea.
  spanish_consistency_notes:
  - He usado «Yahvé»/«Mesías» defaults only where relevant; aquí no aplica.
  - He conservado el tono sobrio y la sintaxis breve, acorde con el latín transmitido y con el registro de POB.
  - La nota al pie marca la rareza textual sin resolverla artificialmente.
