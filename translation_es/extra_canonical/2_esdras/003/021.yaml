  text: lex tua in eis fructum. Cor enim malignum baiolans primus Adam transgressus et uictus est, sed et omnes qui ex eo nati
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/003/021.yaml
  text: For the first Adam, bearing an evil heart, transgressed and was overcome; and so also did all who were born from him.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:27Z'
    unchanged: false
    changes_summary: Changed 'burdened with' to 'bearing' for a more direct and natural rendering of baiolans while preserving the formal sense. Kept the rest substantially unchanged.
translation:
  language: es
  text: Porque el primer Adán, llevando un corazón maligno, transgredió y fue vencido; y así también lo hicieron todos los que nacieron de él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: primus Adam / first Adam
  english_pob_choice: the first Adam
  chosen_spanish: el primer Adán
  alternatives_spanish:
  - el Adán primero
  - el Adán inicial
  lexicon: Adán
  rationale: El texto latino distingue al primer Adán como cabeza originaria de la humanidad; «el primer Adán» es la forma natural y fiel en español.
- source_word: baiolans
  english_pob_choice: bearing
  chosen_spanish: llevando
  alternatives_spanish:
  - portando
  - cargando
  lexicon: baiolans
  rationale: La revisión inglesa corrigió de «burdened with» a «bearing» para reflejar con más inmediatez baiolans. «Llevando» conserva la idea de portar/traer consigo un corazón maligno sin añadir una carga interpretativa excesiva.
- source_word: cor malignum
  english_pob_choice: an evil heart
  chosen_spanish: un corazón maligno
  alternatives_spanish:
  - un corazón malo
  - un corazón perverso
  lexicon: cor / malignum
  rationale: «Maligno» conserva el matiz moral fuerte del latín y encaja con el registro bíblico; «corazón malo» sería más suave y menos preciso.
- source_word: transgressus est
  english_pob_choice: transgressed
  chosen_spanish: transgredió
  alternatives_spanish:
  - puso en falta la ley
  - quebrantó
  lexicon: transgredior
  rationale: «Transgredió» reproduce de forma directa la infracción del mandato/ley sin expandir el sentido.
- source_word: uictus est
  english_pob_choice: was overcome
  chosen_spanish: fue vencido
  alternatives_spanish:
  - quedó vencido
  - fue derrotado
  lexicon: vinco
  rationale: «Fue vencido» mantiene la pasiva y el sentido de derrota/ser dominado que transmite uictus est.
- source_word: omnes qui ex eo nati
  english_pob_choice: all who were born from him
  chosen_spanish: todos los que nacieron de él
  alternatives_spanish:
  - todos los nacidos de él
  - todos los que procedieron de él
  lexicon: nascor
  rationale: «Nacieron de él» sigue de cerca el participio de nacimiento y preserva la relación genealógica sin ampliar a una noción más abstracta de procedencia.
theological_decisions:
- issue: Relación causal entre el pecado de Adán y la humanidad posterior
  english_pob_reading: and so also did all who were born from him
  chosen_spanish_reading: y así también todos los que nacieron de él
  alternative_spanish_readings:
  - y de igual modo todos los que nacieron de él
  - y así lo hicieron también todos los que nacieron de él
  rationale: Se conserva la coordinación causal/ejemplar sin convertirla en una formulación doctrinal más explícita de la que el texto ofrece. La frase mantiene que la caída de Adán se refleja en su descendencia, como en la lectura inglesa.
  doctrine_reference: Romanos 5:12-19; 1 Corintios 15:22
translation_notes:
  revision_awareness: La versión inglesa fue ajustada de «burdened with» a «bearing» para reflejar mejor baiolans; el español sigue esa revisión con «llevando» y evita introducir una carga no presente en el audit trail. No se añadieron notas textuales porque el fragmento disponible y la lectura inglesa convergen de forma alta.
  spanish_consistency_notes:
  - Se mantiene «Adán» como nombre propio tradicional y transparente.
  - No se usa «Cristo» ni terminología eclesiástica ajena al pasaje.
  - El tono es bíblico, pero en español moderno y legible.
  - Se conserva la pasiva «fue vencido» para reflejar el latín y el inglés auditado.
