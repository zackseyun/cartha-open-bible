lexical_decisions:
- source_word: malignum
  english_pob_choice: evil
  chosen_spanish: maligno
  alternatives_spanish:
  - malvado
  - malo
  - mal
  lexicon: Latin malignus / malus
  rationale: El fragmento latino presenta un adjetivo sustantivado o calificativo de valor negativo. «Maligno» conserva el tono fuerte y la forma breve del texto, sin añadir especificación moral que el fragmento no desarrolla. «Malvado» sería más interpretativo; «mal» sería posible, pero menos natural aquí como equivalente nominal.
- source_word: Et transierunt tempora
  english_pob_choice: And the times passed
  chosen_spanish: Y pasaron los tiempos
  alternatives_spanish:
  - Y transcurrieron los tiempos
  - Y pasaron los tiempos y las estaciones
  lexicon: Latin tempus / transire
  rationale: Se mantiene la imagen temporal directa del latín. «Pasaron los tiempos» es claro, bíblico en registro, y evita forzar una metáfora distinta. «Transcurrieron» es posible, pero algo más abstracto.
- source_word: et finiti sunt anni
  english_pob_choice: and the years came to an end
  chosen_spanish: y los años llegaron a su fin
  alternatives_spanish:
  - y los años se acabaron
  - y los años fueron consumados
  lexicon: Latin finis / finire
  rationale: «Llegaron a su fin» refleja bien la idea de conclusión temporal sin introducir una valoración adicional. «Se acabaron» sería más coloquial; «fueron consumados» resultaría demasiado literal y poco natural en español.
