  rationale: El testimonio latino suministrado aquí solo contiene «malignum. Et transierunt tempora et finiti sunt anni, et». Cualquier continuación sería una adición no respaldada por el fragmento. La decisión preserva la integridad textual y la revisión aplicada.
  doctrine_reference: Fidelidad textual y delimitación de base manuscrita
