translation:
  language: es
  text: cuyo nombre era Abraham; y lo amaste, y le revelaste
  philosophy: formal
lexical_decisions:
- source_word: nomen erat Abraham
  english_pob_choice: whose name was Abraham
  chosen_spanish: cuyo nombre era Abraham
  alternatives_spanish:
  - cuyo nombre fue Abraham
  - de nombre Abraham
  lexicon: nomen
  rationale: El latín identifica al sujeto por su nombre. «Cuyo nombre era Abraham» conserva la relación posesiva y el tiempo descriptivo sin añadir matices no presentes.
- source_word: Et dilexisti eum
  english_pob_choice: And you loved him
  chosen_spanish: y lo amaste
  alternatives_spanish:
  - y le amaste
  - y lo habías amado
  lexicon: dilexisti
  rationale: «Dilexisti» expresa amor en pasado perfecto/simple; en español «lo amaste» es la forma más directa y natural. Se evita suavizar a «queriste» porque el verbo amor es claro en el latín y en la tradición auditada.
- source_word: et demonstrasti ei
  english_pob_choice: and revealed to him
  chosen_spanish: y le revelaste
  alternatives_spanish:
  - y se lo mostraste
  - y le diste a conocer
  lexicon: demonstrasti
  rationale: El contexto auditado corrigió una redacción inglesa demasiado amplia hacia el sentido directo de ‘hacer ver / mostrar con claridad’. «Revelaste» conserva esa fuerza de manifestación personal y evita introducir el contenido añadido por la versión previa inglesa.
theological_decisions:
- issue: Alcance de "demonstrasti ei" sin material añadido
  english_pob_reading: and revealed to him
  chosen_spanish_reading: y le revelaste
  alternative_spanish_readings:
  - y le mostraste
  - y le diste a conocer
  rationale: El pasaje fuente solo afirma una revelación personal a Abraham; no autoriza especificar el contenido de la revelación. La traducción mantiene la afirmación abierta y no inserta elementos ausentes en el latín limpio.
  doctrine_reference: Principio de suficiencia textual y restricción a los datos del testigo fuente
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para eliminar añadidos no presentes en el latín ('alone,' 'the end of the times,' 'secretly,' 'by night') y para cambiar 'demonstrasted' por 'revealed'. La versión española sigue esa revisión y se limita estrictamente a la secuencia latina conservada.
  spanish_consistency_notes:
  - Se mantiene «Abraham» como nombre propio sin adaptación adicional.
  - Se evita «Señor» o lenguaje litúrgico no respaldado por el versículo.
  - No se usan notas al pie porque el fragmento latino es breve y la elección española no introduce ambigüedad significativa.
