base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/003/025.yaml
  text: And this happened for many years. And those who lived in the city forsook it,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:28Z'
    unchanged: false
    changes_summary: Replaced 'went on' with 'happened' for closer alignment with factum est; removed the unsupported 'sinned'; rendered dereliquerunt as 'forsook it' to reflect the Latin verb and account for the implied object, the city.
translation:
  language: es
  text: Y esto sucedió durante muchos años. Y los que habitaban en la ciudad la abandonaron,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: factum est hoc annis multis
  english_pob_choice: And this happened for many years.
  chosen_spanish: Y esto sucedió durante muchos años.
  alternatives_spanish:
  - Y esto ocurrió durante muchos años.
  - Y esto pasó durante muchos años.
  lexicon: factum est
  rationale: sucedió comunica el hecho consumado y continuo del latino factum est sin añadir una idea de desarrollo o permanencia que no está explícita; durante muchos años conserva annis multis de manera natural en español.
- source_word: dereliquerunt
  english_pob_choice: forsook it
  chosen_spanish: la abandonaron
  alternatives_spanish:
  - la dejaron
  - la desampararon
  lexicon: derelinquo
  rationale: dereliquerunt expresa abandonar, dejar atrás; en español, la abandonaron transmite de forma natural que el objeto implícito es la ciudad. Se prefiere el pronombre directo femenino por el antecedente ciudad, siguiendo la inferencia del audit trail inglés.
theological_decisions:
- issue: Implied object of dereliquerunt
  english_pob_reading: forsook it
  chosen_spanish_reading: la abandonaron
  alternative_spanish_readings:
  - la dejaron
  - la desampararon
  rationale: El latín omite el objeto explícito, pero el contexto inmediato lo identifica con la ciudad. Mantener el pronombre ayuda a preservar la referencia sin explicitar más de lo que el texto da.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que corrigió el inglés de una lectura moralizante no sustentada ('sinned') a una traducción más literal de factum est y dereliquerunt. La versión española evita introducir culpa o juicio no presentes en el latín.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, pero con español moderno y claro.
  - Se conserva la referencia implícita a la ciudad mediante el pronombre la, sin añadir palabra explicativa entre corchetes.
  - No se usó SEÑOR ni terminología teológica no pertinente, porque este versículo no contiene nombres divinos ni títulos cristológicos.
