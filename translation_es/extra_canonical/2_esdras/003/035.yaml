translation:
  language: es
  text: ¿O cuándo no pecaron delante de ti los que habitan la tierra? ¿O qué nación ha guardado así tus mandamientos?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: aut quando
  english_pob_choice: Or when
  chosen_spanish: ¿O cuándo
  alternatives_spanish:
  - ¿O cuando
  - ¿O en qué momento
  lexicon: aut / quando
  rationale: Conserva la estructura disyuntiva e interrogativa del latín, con un español natural en pregunta retórica.
- source_word: peccaverunt
  english_pob_choice: have ... sinned
  chosen_spanish: pecaron
  alternatives_spanish:
  - han pecado
  - faltaron
  lexicon: peccare
  rationale: El verbo básico es 'pecar'; en español, el pretérito simple mantiene bien la pregunta retórica general sin necesidad de forzar un perfecto compuesto.
- source_word: in conspectu tuo
  english_pob_choice: in your sight
  chosen_spanish: delante de ti
  alternatives_spanish:
  - a tus ojos
  - en tu presencia
  lexicon: in conspectu
  rationale: '''Delante de ti'' comunica de forma clara y reverente la idea de estar bajo la mirada de Dios, sin añadir un matiz más técnico que el latín no exige.'
- source_word: qui habitant terram
  english_pob_choice: those who dwell on the earth
  chosen_spanish: los que habitan la tierra
  alternatives_spanish:
  - los moradores de la tierra
  - quienes habitan la tierra
  lexicon: habitare / terra
  rationale: Mantiene de cerca el sintagma del original y su alcance universal.
- source_word: quae gens
  english_pob_choice: what nation
  chosen_spanish: qué nación
  alternatives_spanish:
  - qué pueblo
  - qué gente
  lexicon: gens
  rationale: '''Nación'' es la equivalencia más directa y solemne para ''gens'' en este contexto.'
- source_word: sic observavit mandata tua
  english_pob_choice: has so kept your commandments
  chosen_spanish: ha guardado así tus mandamientos
  alternatives_spanish:
  - ha observado así tus mandamientos
  - ha cumplido así tus mandamientos
  lexicon: observare / mandata
  rationale: '''Guardar mandamientos'' es una fórmula bíblica precisa y natural en español; ''así'' conserva la idea de cumplimiento ejemplar implícita en ''sic''.'
theological_decisions:
- issue: Universalidad del pecado humano
  english_pob_reading: those who dwell on the earth have sinned
  chosen_spanish_reading: los que habitan la tierra pecaron
  alternative_spanish_readings:
  - los que habitan la tierra han pecado
  - los moradores de la tierra pecaron
  rationale: 'La frase formula una negación universal retórica: no hay humanos en la tierra que no hayan pecado delante de Dios. El español debe conservar esa amplitud sin intensificarla más allá del latín.'
  doctrine_reference: Romanos 3:23; Eclesiastés 7:20
- issue: Fidelidad a los mandamientos como contraste retórico
  english_pob_reading: what nation has so kept your commandments
  chosen_spanish_reading: qué nación ha guardado así tus mandamientos
  alternative_spanish_readings:
  - qué nación ha observado así tus mandamientos
  - qué pueblo ha guardado así tus mandamientos
  rationale: '''Mandamientos'' mantiene el carácter pactual/legal del contraste. ''Guardado'' expresa observancia fiel más claramente que una mera ejecución externa.'
  doctrine_reference: Deuteronomio 6:1-2; Salmo 119
translation_notes:
  revision_awareness: 'La revisión más reciente indicó ''unchanged: true'' y no introdujo cambios; el borrador español sigue de cerca el latín limpiado y coincide sustancialmente con la POB inglesa, sin añadir notas textuales porque no hay variantes ni tensiones adicionales registradas.'
  spanish_consistency_notes:
  - Se conserva el tratamiento reverente de la segunda persona singular en todo el versículo.
  - Se traduce 'gens' como 'nación' para mantener el contraste general del original.
  - No se introduce 'SEÑOR' ni otras formas de ocultamiento del nombre divino, porque el versículo usa segunda persona directa a Dios sin el Tetragrámaton explícito.
