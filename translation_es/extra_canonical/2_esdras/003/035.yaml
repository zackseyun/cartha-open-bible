    issue: Aspecto verbal de «peccaverunt»
    rationale: El inglés auditado usa «have ... sinned» y el latín perfecto puede sentirse gnómico o resultativo. Sin embargo, «pecaron» en esta pregunta retórica general sigue siendo natural en español y preserva suficientemente el sentido. «Han pecado» también sería posible, pero no es necesario exigir cambio.
