base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/003/004.yaml
  text: And I said, “O Lord who rules, did you not speak from the beginning, when you formed the earth—and this you did alone—and commanded the dust
  revision_pass:
    model: gpt-5.4
