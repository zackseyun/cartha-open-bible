    changes_summary: Capitalized the opening conjunction for sentence style, changed 'at the beginning' to 'from the beginning' to better reflect ab initio, and changed 'command' to 'commanded' for correct parallel past tense with the surrounding verbs.
translation:
  language: es
  text: 'Y dije: «Oh Señor soberano, ¿no hablaste desde el principio, cuando formaste la tierra—y esto lo hiciste tú solo—y mandaste al polvo'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: dominator domine
  english_pob_choice: O Lord who rules
  chosen_spanish: Oh Señor que gobiernas
  alternatives_spanish:
  - Oh Dueño soberano
  - Oh Señor soberano
  lexicon: dominator -> ruler/lord; domine -> lord
  rationale: El latín une una idea de dominio con apelación respetuosa. En español, «Señor que gobiernas» conserva el matiz de gobierno/soberanía sin introducir un término más eclesiástico que el fuente no exige.
- source_word: ab initio
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el inicio
  lexicon: ab initio -> from the beginning
  rationale: La frase expresa un punto de partida temporal. «Desde el principio» es la equivalencia más natural y fiel en español, y mantiene el valor temporal que la revisión inglesa subrayó.
- source_word: plasmasti terram
  english_pob_choice: you formed the earth
  chosen_spanish: formaste la tierra
  alternatives_spanish:
  - moldeaste la tierra
  - plasmaste la tierra
  lexicon: plasmare -> form
  rationale: «Formaste» comunica con claridad la acción creadora del latín. «Plasmaste» sería más literal, pero en español puede sonar más marcado o técnico; aquí no aporta una ventaja mayor.
- source_word: et hoc solus
  english_pob_choice: and this you did alone
  chosen_spanish: —y esto lo hiciste tú solo—
  alternatives_spanish:
  - —y esto lo hiciste solo tú—
  - —y lo hiciste tú solo—
  lexicon: solus -> alone
  rationale: Se conserva el énfasis de exclusividad. La colocación «tú solo» mantiene naturalidad y destaca que la acción fue realizada sin ayuda.
- source_word: imperasti pulu̇eri
  english_pob_choice: and commanded the dust
  chosen_spanish: y mandaste al polvo
  alternatives_spanish:
  - y ordenaste al polvo
  - y diste mandato al polvo
  lexicon: imperare -> command
  rationale: «Mandaste» mantiene el peso directivo de imperasti con español claro y bíblico sin depender de un calco rígido. «Al polvo» conserva el objeto directo indirecto tal como sugiere el latín, con un tono poético sobrio.
theological_decisions:
- issue: Dios creador actúa solo en la creación
  english_pob_reading: you formed the earth—and this you did alone
  chosen_spanish_reading: formaste la tierra —y esto lo hiciste tú solo—
  alternative_spanish_readings:
  - moldeaste la tierra —y esto lo hiciste tú solo—
  - plasmaste la tierra —y esto lo hiciste tú solo—
  rationale: 'La frase preserva la afirmación de unicidad creadora: Dios no comparte la obra fundacional de la creación con otro agente. En español conviene mantener el énfasis explícito en «tú solo» para no diluir la fuerza del latín.'
  doctrine_reference: Monoteísmo creador; creación ex nihilo/acto soberano de Dios
- issue: Tono de apelación reverente a la divinidad
  english_pob_reading: O Lord who rules
  chosen_spanish_reading: Oh Señor que gobiernas
  alternative_spanish_readings:
  - Oh Señor soberano
  - Oh Dueño soberano
  rationale: Se evita sustituir el apelativo por una fórmula litúrgica más cargada que la del fuente. «Señor que gobiernas» mantiene reverencia y la idea de autoridad personal en una forma comprensible para el lector contemporáneo.
  doctrine_reference: Soberanía divina
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'at the beginning' por 'from the beginning' y 'command' por 'commanded'; la redacción española refleja esos ajustes con «desde el principio» y el verbo en pasado coordinado «mandaste».
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - No se introdujo «SEÑOR» en mayúsculas como convención de sustitución; se tradujo el vocativo con sentido directo.
  - 'La estructura conserva el paralelo del original: invocación, pregunta retórica, creación de la tierra, exclusividad divina y mandato al polvo.'
