source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: Et huic mandasti diligentiam tuam ; et praeteriit eam, et statim instituisti in eum mortem et in nationibus eius, et natae sunt ex eo gentes et tribus, populi et cognationes, quorum non est numerus.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/003/007.yaml
  text: And to him you gave your command; but he transgressed it, and at once you appointed death for him and for his descendants, and from him were born nations and tribes, peoples and clans, without number.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:24Z'
    unchanged: false
    changes_summary: Changed 'your one command' to 'your command' for closer lexical accuracy to the Latin diligentiam tuam and to avoid adding emphasis not explicit in the source. The rest is accurate and natural.
translation:
  language: es
  text: Y a él le diste tu mandamiento; pero él lo quebrantó, y de inmediato le impusiste la muerte a él y a sus descendientes; y de él nacieron naciones y tribus, pueblos y clanes, sin número.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: mandasti diligentiam tuam
  english_pob_choice: you gave your command
  chosen_spanish: le diste tu mandamiento
  alternatives_spanish:
  - le diste tu orden
  - le encomendaste tu mandato
  lexicon: mandatum / mandare
  rationale: El latín apunta a un mandato u orden dada por Dios; "mandamiento" conserva la fuerza normativa y suena más natural en español bíblico que una traducción más técnica de "diligencia". "Tu mandamiento" sigue de cerca el valor del texto y la revisión inglesa, sin añadir énfasis como "uno".
- source_word: praeteriit eam
  english_pob_choice: he transgressed it
  chosen_spanish: él lo quebrantó
  alternatives_spanish:
  - él lo traspasó
  - él lo desobedeció
  lexicon: praeterire
  rationale: El latín expresa pasar por encima/violar lo mandado; "quebrantó" comunica bien la ruptura del mandato en español bíblico. "Lo" remite al mandamiento, concordando con el antecedente implícito.
- source_word: instituisti in eum mortem
  english_pob_choice: you appointed death for him
  chosen_spanish: de inmediato decretaste muerte para él
  alternatives_spanish:
  - e inmediatamente le asignaste la muerte
  - y al instante estableciste la muerte sobre él
  lexicon: instituere + mors
  rationale: '"Instituiste" en latín aquí tiene el sentido de establecer o decretar; "decretaste muerte" transmite la decisión judicial/divina sin sonar artificial. Se conserva "de inmediato" para reflejar "statim" y la secuencia del juicio.'
- source_word: et in nationibus eius
  english_pob_choice: and for his descendants
  chosen_spanish: y para sus descendientes
  alternatives_spanish:
  - y sobre su descendencia
  - y en sus naciones
  lexicon: natio
  rationale: El latín dice literalmente "en sus naciones", pero en contexto se refiere a la descendencia surgida de él, como en la versión inglesa. "Descendientes" aclara el sentido genealógico que el contexto exige.
- source_word: quorum non est numerus
  english_pob_choice: without number
  chosen_spanish: sin número
  alternatives_spanish:
  - innumerables
  - de los cuales no hay número
  lexicon: numerus
  rationale: '"Sin número" reproduce de forma sobria la fórmula latina y conserva el matiz bíblico de multitud incontable.'
theological_decisions:
- issue: Consecuencia judicial divina tras la desobediencia
  english_pob_reading: but he transgressed it, and at once you appointed death for him and for his descendants
  chosen_spanish_reading: pero él lo quebrantó, y de inmediato decretaste muerte para él y para sus descendientes
  alternative_spanish_readings:
  - pero él lo desobedeció, y enseguida le asignaste la muerte a él y a su descendencia
  - pero él lo violó, y al instante estableciste la muerte sobre él y sus descendientes
  rationale: La formulación mantiene la relación causal entre transgresión y sentencia, sin suavizar el juicio ni introducir categorías ajenas al texto. "Decreto" hace explícita la dimensión judicial implícita en el latín.
  doctrine_reference: Génesis 2:17; Romanos 5:12
- issue: Uso de lenguaje genealógico para la multitud de pueblos
  english_pob_reading: and from him were born nations and tribes, peoples and clans, without number
  chosen_spanish_reading: y de él nacieron naciones y tribus, pueblos y linajes, sin número
  alternative_spanish_readings:
  - y de él nacieron naciones y tribus, pueblos y familias, sin número
  - y de él surgieron naciones y tribus, pueblos y clanes, sin número
  rationale: Se conserva la cadena genealógica del original, que presenta a la humanidad posterior como derivada de él. "Linajes" es una opción amplia y comprensible para clanes/cognaciones, sin perder el sentido colectivo.
  doctrine_reference: Hechos 17:26
translation_notes:
  revision_awareness: 'The English audit trail shows one revision: ''your one command'' was corrected to ''your command'' to better match the Latin ''diligentiam tuam'' and avoid adding emphasis not explicit in the source. The Spanish draft follows the corrected, non-emphatic reading and avoids inserting ''uno'' or any equivalent.'
  spanish_consistency_notes:
  - Se usó "mandamiento" para mantener la fuerza normativa del latín y del contexto bíblico.
  - Se prefirió "de inmediato" para el valor de statim, manteniendo la rapidez del juicio.
  - Se tradujo el plural genealógico de naciones/tribus/pueblos/linajes sin armonizarlo artificialmente a una sola categoría.
