translation:
  language: es
  text: Y entregaste tu ciudad en manos de tus enemigos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et tradidisti
  english_pob_choice: And you gave
  chosen_spanish: Y entregaste
  alternatives_spanish:
  - Y diste
  - Y pusiste
  lexicon: Latin tradere
  rationale: Tradidisti expresa la acción de entregar o poner en manos de otro; «entregaste» conserva bien esa fuerza de entrega/exposición y suena natural en español bíblico sin volverse arcaico.
- source_word: civitatem tuam
  english_pob_choice: your city
  chosen_spanish: tu ciudad
  alternatives_spanish:
  - la ciudad tuya
  - tu urbe
  lexicon: Latin civitas
  rationale: Civitatem se refiere aquí a la ciudad concreta perteneciente al destinatario; «tu ciudad» reproduce con claridad la posesión y evita una formalidad innecesaria.
- source_word: in manus inimicorum tuorum
  english_pob_choice: into the hands of your enemies
  chosen_spanish: en manos de tus enemigos
  alternatives_spanish:
  - a manos de tus enemigos
  - en poder de tus enemigos
  lexicon: Latin manus + inimici
  rationale: La imagen idiomática de «en las manos de» indica quedar bajo control o dominio enemigo. «En manos de» mantiene la metáfora de modo idiomático y fiel; «a manos de» es posible, pero menos directo en español general.
theological_decisions:
- issue: Entrega de la ciudad al enemigo como acto de juicio/divino abandono
  english_pob_reading: And you gave your city into the hands of your enemies.
  chosen_spanish_reading: Y entregaste tu ciudad en manos de tus enemigos.
  alternative_spanish_readings:
  - Y abandonaste tu ciudad en manos de tus enemigos.
  - Y pusiste tu ciudad en manos de tus enemigos.
  rationale: El texto latino presenta la acción como una entrega real de la ciudad al poder enemigo. «Entregaste» conserva ese valor sin añadir explícitamente una interpretación causal que el versículo, por sí solo, no formula.
  doctrine_reference: Providencia y juicio en el trasfondo de 2 Esdras; sin explicitación adicional en este versículo.
translation_notes:
  revision_awareness: La fuente latina limpia coincide plenamente con la auditoría inglesa; la revisión más reciente marcó el texto como sin cambios necesarios y el control cruzado reporta alta concordancia. No se documentan variantes textuales ni tensiones léxicas que requieran nota.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y claro.
  - No se introducen marcadores divinos ni títulos teológicos ausentes del latín.
  - Se conserva la metáfora espacial «en manos de» por ser transparente y fiel al original.
