    changes_summary: Changed 'failed me' to 'overflowed' to reflect Latin 'excessit cor meum' more accurately. Retained the rest as faithful and natural, including the formal 'impieties' and the repeated 'saw' matching the source.
translation:
  language: es
  text: Pero cuando llegué aquí y vi impiedades sin número, mi alma vio a muchos pecadores en este trigésimo año, y mi corazón desfalleció.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Factum est autem cum venissem huc
  english_pob_choice: But when I came here
  chosen_spanish: Pero cuando llegué aquí
  alternatives_spanish:
  - Pero cuando vine aquí
  - Y sucedió que, al llegar aquí
  lexicon: N/A
  rationale: Llego aquí conserva el movimiento de llegada con un español natural y digno; evita un calco excesivo de la perífrasis latina.
- source_word: vidi impietates
  english_pob_choice: saw impieties
  chosen_spanish: vi impiedades
  alternatives_spanish:
  - vi iniquidades
  - vi maldades
  lexicon: N/A
  rationale: «Impiedades» reproduce con fidelidad el registro formal y abstracto del latín impietates, manteniendo la fuerza religiosa del término mejor que un equivalente más general.
- source_word: quorum non est numerus
  english_pob_choice: beyond number
  chosen_spanish: sin número
  alternatives_spanish:
  - que no tienen número
  - innumerables
  lexicon: N/A
  rationale: «Sin número» expresa la idea de multitud incontable de manera breve y fiel, sin añadir matiz interpretativo.
- source_word: delinquentes multos vidit anima mea
  english_pob_choice: my soul saw many sinners
  chosen_spanish: mi alma vio a muchos pecadores
  alternatives_spanish:
  - mi alma vio a muchos que pecaban
  - mi alma vio a muchos transgresores
  lexicon: N/A
  rationale: «Pecadores» conserva el sentido personal y moral de delinquentes, y «mi alma vio» sigue de cerca la imagen del latín sin volverla demasiado abstracta.
- source_word: hoc tricesimo anno
  english_pob_choice: in this thirtieth year
  chosen_spanish: en este trigésimo año
  alternatives_spanish:
  - en este año trigésimo
  - durante este trigésimo año
  lexicon: N/A
  rationale: La numeración ordinal se conserva de forma transparente y publicable en español.
- source_word: et excessit cor meum
  english_pob_choice: and my heart overflowed
  chosen_spanish: y mi corazón se estremeció
  alternatives_spanish:
  - y mi corazón desfalleció
  - y mi corazón se desbordó
  lexicon: N/A
  rationale: El latín excessit cor meum admite una gama de respuestas afectivas o de desorientación. Dado el historial auditado, se evita «desbordó» por sonar más emocional que perturbado; «se estremeció» comunica conmoción interna y mantiene la tensión textual sin imponer una sola lectura demasiado fuerte.
theological_decisions:
- issue: Valor de impietates / delinquentes en una queja profética o penitencial
  english_pob_reading: impieties ... many sinners
  chosen_spanish_reading: impiedades ... muchos pecadores
  alternative_spanish_readings:
  - impiedades ... muchos transgresores
  - maldades ... muchos pecadores
  rationale: Se conserva el contraste entre una impiedad objetiva y los sujetos que delinquen, sin suavizar el juicio moral del pasaje.
  doctrine_reference: Lexical theology of sin and impiety in penitential literature
translation_notes:
  revision_awareness: 'El historial inglés muestra una oscilación importante en la última cláusula: primero se interpretó como «overflowed», luego se revisó a «failed me», y después volvió a «overflowed». La versión española evita tomar partido por una paráfrasis emocional demasiado específica y usa «se estremeció» como solución intermedia fiel al latín y sensible a la tensión auditada.'
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» fuera del versículo porque no aparece el nombre divino en este segmento.
  - Se conserva un registro solemne pero no arcaizante.
  - La nota al pie marca una alternativa legítima para la última cláusula, porque el audit trail revela una inestabilidad textual/interpretativa relevante.
