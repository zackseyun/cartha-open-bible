base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/003/029.yaml
  text: But when I came here and saw impieties beyond number[a], my soul saw many sinners in this thirtieth year, and my heart overflowed.
  footnotes:
  - marker: a
    text: Or 'and my heart overflowed'.
    reason: previous_rendering
  revision_pass:
