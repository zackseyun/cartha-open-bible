translation:
  language: es
  text: haciendo en todas las cosas como hicieron Adán y todas sus generaciones; porque también ellos tenían un corazón malo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacían uso de un corazón malo».
    reason: previous_rendering
lexical_decisions:
- source_word: in omnibus
  english_pob_choice: in all things
  chosen_spanish: en todas las cosas
  alternatives_spanish:
  - en todo
  - en cada cosa
  lexicon: Latin omnia/omnibus
  rationale: La secuencia latina pide una expresión amplia y total. «En todas las cosas» reproduce bien el alcance distributivo sin endurecer el español ni reducirlo a un mero “todo” abstracto.
- source_word: facientes
  english_pob_choice: doing
  chosen_spanish: haciendo
  alternatives_spanish:
  - hacían
  - obrando
  lexicon: Latin facio
  rationale: El participio presente latino funciona de modo descriptivo y continuo; «haciendo» conserva ese valor verbal sin añadir una temporalidad más fuerte que la del contexto.
- source_word: sicut fecit Adam et omnes generationes eius
  english_pob_choice: as Adam and all his generations did
  chosen_spanish: como hicieron Adán y todas sus generaciones
  alternatives_spanish:
  - como hizo Adán y todas sus generaciones
  - como Adán y todas sus generaciones hicieron
  lexicon: Latin sicut + fecit + generationes eius
  rationale: La fuente compara el comportamiento colectivo con el de Adán y su descendencia. En español, «como hicieron Adán y todas sus generaciones» mantiene la comparación directa y el sentido de acción compartida transmitido por la frase latina y la revisión inglesa.
- source_word: cor malignum
  english_pob_choice: an evil heart
  chosen_spanish: un corazón malo
  alternatives_spanish:
  - un corazón maligno
  - el corazón malo
  lexicon: Latin cor malignum
  rationale: «Cor» se vierte naturalmente por «corazón» en español, y «malignum» puede expresarse como «malo» o «maligno». Opto por «malo» porque suena más idiomático y conserva la cualidad moral sin sobrecargar el término con matices técnicos no exigidos por esta línea.
- source_word: utebantur
  english_pob_choice: they had
  chosen_spanish: tenían
  alternatives_spanish:
  - poseían
  - usaban
  lexicon: Latin uti + accusative in Late Latin
  rationale: Sigo la decisión auditada de entender *utebantur* aquí como posesión/estado, no como «usar». Por eso «tenían» comunica la condición moral heredada y evita el sentido incorrecto de instrumento o utilización.
theological_decisions:
- issue: Naturaleza del 'corazón malo' heredado
  english_pob_reading: for they too had an evil heart
  chosen_spanish_reading: porque también ellos tenían un corazón malo
  alternative_spanish_readings:
  - porque también ellos poseían un corazón malo
  - porque también ellos usaban un corazón malo
  rationale: 'La revisión inglesa descartó «made use of» y fijó la idea de poseer/ser portadores de esa condición. En español, «tenían un corazón malo» conserva esa tensión: no habla de una acción puntual sino de un estado moral transmitido.'
  doctrine_reference: Sabiduría antropológica de 2 Esdras 3:21–26; condición heredada del corazón humano
translation_notes:
  revision_awareness: 'La versión inglesa fue revisada dos veces: primero para corregir el valor de *utor* de «made use of» a «had», y después para suavizar el inglés a «an evil heart». La presente versión española sigue esa línea y evita tanto el instrumentalismo como una formulación demasiado abstracta.'
  spanish_consistency_notes:
  - Se mantiene «Adán» como nombre propio bíblico estándar en español.
  - Se evita «SEÑOR» u otra convención de ocultamiento porque el texto no contiene el tetragrámaton.
  - «Corazón malo» preserva el juicio moral simple y directo del latín sin introducir tecnicismos innecesarios.
