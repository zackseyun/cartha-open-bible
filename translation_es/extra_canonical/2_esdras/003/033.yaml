translation:
  language: es
  text: Sin embargo, no ha aparecido su recompensa[a], ni su labor ha dado fruto. Porque he pasado entre las naciones y las he visto prosperar, aunque no recuerdan tus mandamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las he visto abundar».'
    reason: alternative_reading
lexical_decisions:
- source_word: quarum merces non conparuit
  english_pob_choice: Yet their reward has not appeared
  chosen_spanish: no ha aparecido su recompensa
  alternatives_spanish:
  - su recompensa no se ha manifestado
  - no se ha visto su recompensa
  lexicon: merces -> recompensa
  rationale: «merces» nombra la paga o retribución esperada; «recompensa» conserva esa relación de salario/retribución sin introducir un matiz demasiado devocional ni perder la idea de que aún no es visible.
- source_word: neque labor fructificavit
  english_pob_choice: nor has their labor borne fruit
  chosen_spanish: ni su labor ha dado fruto
  alternatives_spanish:
  - ni su trabajo ha fructificado
  - ni su esfuerzo ha producido fruto
  lexicon: labor -> labor / trabajo; fructificare -> dar fruto
  rationale: La imagen latina es agrícola y productiva; «dar fruto» reproduce bien la metáfora y es natural en español, manteniendo el contraste con la prosperidad de las naciones.
- source_word: pertransiens enim pertransivi in gentibus
  english_pob_choice: For I have passed through the nations
  chosen_spanish: Porque he pasado entre las naciones
  alternatives_spanish:
  - Porque he recorrido las naciones
  - Pues he atravesado las naciones
  lexicon: pertransire -> pasar a través de / recorrer
  rationale: «He pasado entre las naciones» comunica el movimiento a través de ellas sin sonar excesivamente literal; conserva la amplitud del recorrido implícito en el latín.
- source_word: vidi abundantes eas
  english_pob_choice: and seen them prospering
  chosen_spanish: y las he visto prosperar
  alternatives_spanish:
  - y las he visto abundar
  - y las he visto vivir en abundancia
  lexicon: abundantes -> prosperar / abundar
  rationale: El participio «abundantes» puede referirse a abundancia material y éxito; «prosperar» sigue la revisión inglesa y expresa naturalmente esa condición en español. Se preserva el posible matiz alterno en nota.
- source_word: non memorantes mandatorum tuorum
  english_pob_choice: though they do not remember your commandments
  chosen_spanish: aunque no recuerdan tus mandamientos
  alternatives_spanish:
  - sin recordar tus mandamientos
  - y no recuerdan tus mandamientos
  lexicon: memorari -> recordar; mandata -> mandamientos
  rationale: «Recordar» mantiene el sentido de no tener presente ni obedecer lo mandado; «mandamientos» es el equivalente directo y claro para el plural latino.
theological_decisions:
- issue: Contraste entre prosperidad de las naciones y aparente esterilidad del pueblo fiel
  english_pob_reading: I have passed through the nations and seen them prospering, though they do not remember your commandments.
  chosen_spanish_reading: he pasado entre las naciones y las he visto prosperar, aunque no recuerdan tus mandamientos
  alternative_spanish_readings:
  - las he visto abundar
  - las he visto vivir en abundancia
  rationale: 'La frase mantiene la tensión del texto: las naciones prosperan exteriormente pese a su olvido de los mandamientos, mientras antes se lamenta la falta de fruto y recompensa. No se suaviza esa comparación.'
  doctrine_reference: Sabiduría providencial / teodicea en la literatura apocalíptica
- issue: Valor de 'merces' como retribución visible
  english_pob_reading: their reward has not appeared
  chosen_spanish_reading: no ha aparecido su recompensa
  alternative_spanish_readings:
  - su recompensa no se ha manifestado
  - no se ha visto su recompensa
  rationale: Se conserva la idea de retribución todavía no visible, sin convertirla en promesa doctrinal explícita más allá del latín.
  doctrine_reference: Retribución escatológica en contexto apocalíptico
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que sustituyó «seen them abounding» por «seen them prospering» por ser una formulación más natural en inglés para el participio latino abundantes. En español se adopta «prosperar» como primera opción, manteniendo en nota la alternativa más literal «abundar» para reflejar el rango semántico del original.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca explícitamente en este versículo, sino como norma del proyecto para el nombre divino cuando corresponda; aquí el texto latino solo dice «tus mandamientos».
  - Se mantuvo el tono de lamento argumentativo del pasaje, con una sola oración coordinada y subordinada para respetar la progresión retórica del latín.
  - No se introdujo lenguaje eclesiástico añadido; «mandamientos» y «recompensa» siguen de cerca el léxico del original.
