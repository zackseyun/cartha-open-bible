  source_alignment_summary: 'El borrador español refleja fielmente el latín y el inglés auditado: «no ha aparecido su recompensa» corresponde bien a quarum merces non conparuit; «ni su labor ha dado fruto» reproduce neque labor fructificavit con metáfora natural; «he pasado entre las naciones» transmite pertransivi in gentibus de forma aceptable; «las he visto prosperar» capta el sentido contextual de abundantes, y la nota preserva la alternativa más literal; «aunque no recuerdan tus mandamientos» representa adecuadamente non memorantes mandatorum tuorum.'
