translation:
  language: es
  text: Pero no les quitaste el corazón malo, para que tu ley diera fruto en ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: cor malignum
  english_pob_choice: evil heart
  chosen_spanish: corazón malo
  alternatives_spanish:
  - corazón perverso
  - corazón maligno
  lexicon: corazón; malo
  rationale: El latín presenta literalmente 'cor malignum'. En español, 'corazón malo' comunica con claridad la cualidad moral negativa sin cargar de forma excesiva la expresión. 'Corazón perverso' sería más interpretativo; 'corazón maligno' suena más técnico o médico y menos natural en este contexto.
- source_word: abstulisti
  english_pob_choice: did not take away
  chosen_spanish: no les quitaste
  alternatives_spanish:
  - no los apartaste de
  - no eliminaste de ellos
  lexicon: quitar; tomar/retirar
  rationale: '''Abstulisti'' indica quitar, retirar o remover. ''No les quitaste'' conserva la fuerza directa y el paralelismo con la lectura inglesa sin añadir matices ajenos. El dativo ''ab eis'' se refleja naturalmente con ''les''.'
- source_word: ut faceret
  english_pob_choice: so that your law might bear fruit in them
  chosen_spanish: para que tu ley diera fruto en ellos
  alternatives_spanish:
  - para que tu ley produjera fruto en ellos
  - a fin de que tu ley fructificara en ellos
  lexicon: ut + subjuntivo; lexeme fruit-bearing
  rationale: La construcción final expresa propósito. 'Diera fruto' mantiene la imagen verbal de fecundidad/resultado que está detrás de la traducción inglesa 'bear fruit'. 'Fructificara' es posible, pero menos directo en español actual.
theological_decisions:
- issue: Relación entre el 'corazón malo' y la Ley de Dios
  english_pob_reading: your law might bear fruit in them
  chosen_spanish_reading: para que tu ley diera fruto en ellos
  alternative_spanish_readings:
  - para que tu ley produjera fruto en ellos
  - para que tu ley fructificara en ellos
  rationale: 'Se conserva la tensión del texto: el obstáculo interno del ser humano impide que la Ley alcance su efecto de producir fruto. No se suaviza a una formulación más doctrinal o explícita de conversión; se mantiene la imagen de fecundidad moral y obediencia que la frase expresa.'
  doctrine_reference: Rom 7:4; Gal 5:22-23
- issue: No explicitación de una referencia al Espíritu o a la gracia
  english_pob_reading: Yet you did not take away from them the evil heart
  chosen_spanish_reading: Pero no les quitaste el corazón malo
  alternative_spanish_readings:
  - Sin embargo, no les quitaste el corazón malo
  rationale: El latín no menciona explícitamente Espíritu ni gracia, así que la traducción no debe introducirlos. Se conserva el reproche directo de la oración y su forma condensada.
  doctrine_reference: Sal 51:10; Ez 36:26
translation_notes:
  revision_awareness: El control cruzado reporta alta concordancia y no registra cambios; por tanto, la redacción española se mantiene estrechamente alineada con el texto fuente latino y con la lectura inglesa auditada.
  spanish_consistency_notes:
  - Se usa 'ley' como traducción estable de 'lex' en este contexto.
  - Se conserva 'fruto' como imagen de resultado efectivo, no como mera metáfora ornamental.
  - El tono es reverente pero contemporáneo, sin arcaísmos innecesarios.
