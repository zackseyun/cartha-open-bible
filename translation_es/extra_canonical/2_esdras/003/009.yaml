  yaml_path: translation/extra_canonical/2_esdras/003/009.yaml
  text: Again, in time, you brought the flood upon the inhabitants of the world, and destroyed them.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:24Z'
    unchanged: false
    changes_summary: Removed 'Yet' for a more natural formal rendering of Iterum autem as 'Again'; retained the rest as accurate and complete.
translation:
  language: es
  text: Otra vez, a su tiempo, trajiste el diluvio sobre los habitantes del mundo y los destruiste.
  philosophy: formal
lexical_decisions:
- source_word: Iterum autem
  english_pob_choice: Again, in time
  chosen_spanish: Otra vez, en su tiempo
  alternatives_spanish:
  - De nuevo, en su tiempo
  - Otra vez, a su tiempo
  lexicon: iterum; autem
  rationale: Iterum expresa repetición; autem aquí funciona como transición suave, no como contraste fuerte. «Otra vez» conserva la repetición y «en su tiempo» refleja el matiz temporal del POB inglés sin añadir interpretación.
- source_word: induxisti diluuium
  english_pob_choice: you brought the flood
  chosen_spanish: trajiste el diluvio
  alternatives_spanish:
  - hiciste venir el diluvio
  - trajiniste el diluvio
  lexicon: inducere; diluvium
  rationale: El latino induxisti permite la idea de traer o hacer venir. «Trajiste el diluvio» es natural en español y conserva la acción divina de enviar el juicio acuático sin atenuarla.
- source_word: super habitantes saeculum
  english_pob_choice: upon the inhabitants of the world
  chosen_spanish: sobre los habitantes del mundo
  alternatives_spanish:
  - contra los habitantes del mundo
  - sobre los que habitaban el mundo
  lexicon: super; habitantes; saeculum
  rationale: «Sobre» reproduce el alcance de juicio de super. «Habitantes del mundo» sigue el inglés POB y comunica saeculum como el ámbito humano habitado; «siglo» sería posible etimológicamente pero aquí sería engañoso.
- source_word: perdidisti eos
  english_pob_choice: destroyed them
  chosen_spanish: los destruiste
  alternatives_spanish:
  - los perdiste
  - los arruinaste
  lexicon: perdere
  rationale: Perdidisti puede significar destruir, perder o arruinar. En este contexto de diluvio, «los destruiste» expresa con precisión el resultado devastador y mantiene la fuerza del original y del POB inglés.
theological_decisions:
- issue: El diluvio como acto de juicio divino
  english_pob_reading: you brought the flood upon the inhabitants of the world, and destroyed them
  chosen_spanish_reading: trajiste el diluvio sobre los habitantes del mundo, y los destruiste
  alternative_spanish_readings:
  - hiciste venir el diluvio sobre los habitantes del mundo, y los destruiste
  - enviaste el diluvio sobre los habitantes del mundo, y los destruiste
  rationale: El texto presenta a Dios como agente soberano del diluvio. La formulación escogida mantiene esa agencia sin suavizarla ni introducir vocabulario interpretativo ajeno al latín.
  doctrine_reference: Génesis 6–9; 2 Pedro 2:5
- issue: Valor de saeculum en este contexto
  english_pob_reading: the world
  chosen_spanish_reading: el mundo
  alternative_spanish_readings:
  - la era
  - el siglo
  rationale: Aunque saeculum puede significar era o mundo, el contexto del diluvio exige la esfera habitada por la humanidad. «El mundo» evita una lectura temporal que oscurezca el sentido narrativo.
  doctrine_reference: Uso contextual de saeculum en latín bíblico
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó «Yet» para dejar simplemente «Again, in time». La traducción española sigue esa revisión con «Otra vez, en su tiempo», sin añadir contraste adversativo.
  spanish_consistency_notes:
  - Se mantiene «diluvio» para diluvium, coherente con el uso bíblico habitual en español.
  - Se conserva el sujeto implícito divino mediante el verbo en segunda persona singular.
  - No se introduce «SEÑOR» ni otro sustituto, porque el latín aquí no contiene un nombre divino explícito.
