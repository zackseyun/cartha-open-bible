translation:
  language: es
  text: Y cada nación anduvo según su propia voluntad[a], y obró impíamente delante de ti, te despreció, y tú no se lo impediste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «anduvo en su propia voluntad».'
    reason: alternative_reading
lexical_decisions:
- source_word: unaquaeque gens
  english_pob_choice: each nation
  chosen_spanish: cada nación
  alternatives_spanish:
  - cada pueblo
  - cada nación y pueblo
  lexicon: gens
  rationale: El latín gens se refiere aquí a los pueblos/naciones colectivas. «Nación» comunica bien el sentido corporativo sin imponer un matiz político moderno excesivo.
- source_word: ambulauit ... in uoluntate sua
  english_pob_choice: walked according to its own will
  chosen_spanish: anduvo según su propia voluntad
  alternatives_spanish:
  - anduvo en su propia voluntad
  - siguió su propia voluntad
  lexicon: ambulare + voluntas
  rationale: «Anduvo» conserva el valor idiomático bíblico de conducta habitual. «Según su propia voluntad» refleja con naturalidad el dativo/idioma de dependencia, manteniendo la tensión registrada por el inglés entre literalidad e idiomaticidad.
- source_word: impie agebant
  english_pob_choice: acted impiously
  chosen_spanish: hicieron impíamente
  alternatives_spanish:
  - obraron impíamente
  - actuaron impíamente
  lexicon: impie agere
  rationale: Se mantiene el adverbio «impíamente» para reproducir el adverbial latino. «Hicieron» es amplio y fiel al uso verbal del texto; «obraron» o «actuaron» serían posibles, pero algo más interpretativos.
- source_word: coram te
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: coram
  rationale: «Delante de ti» reproduce la posición relacional del original con español claro y reverente. «Ante ti» también sería válido, pero «delante de ti» suena más natural en este contexto.
- source_word: spernebant
  english_pob_choice: despised you
  chosen_spanish: te despreciaron
  alternatives_spanish:
  - te menospreciaron
  - te rechazaron con desprecio
  lexicon: spernere
  rationale: «Despreciaron» conserva la fuerza hostil del verbo latino y coincide con el inglés auditado. «Menospreciaron» es cercana, pero «despreciaron» es más directa.
- source_word: tu non prohibuisti eos
  english_pob_choice: you did not hinder them
  chosen_spanish: tú no se lo impediste
  alternatives_spanish:
  - tú no los impediste
  - tú no los detuviste
  lexicon: prohibere
  rationale: «Impediste» expresa bien el valor de prohibir/estorbar del latín. El dativo/objeto implícito se hace explícito en español con «se lo» para conservar el matiz relacional del acto de impedir.
theological_decisions:
- issue: La pasividad divina ante la impiedad de las naciones
  english_pob_reading: and you did not hinder them
  chosen_spanish_reading: y tú no se lo impediste
  alternative_spanish_readings:
  - y no los detuviste
  - y no los impediste
  rationale: Se conserva la afirmación de que Dios no intervino para frenarles, sin suavizar la tensión teológica del pasaje. El español mantiene el mismo peso que el inglés auditado.
  doctrine_reference: Providencia divina y paciencia de Dios frente al pecado humano
translation_notes:
  revision_awareness: El inglés fue revisado de «walked in its own will» a «walked according to its own will» por naturalidad, sin cambio de sentido. La versión española refleja esa misma decisión interpretativa con una formulación idiomática equivalente.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en el pronombre de segunda persona, sin introducir títulos no presentes en el versículo.
  - Se conserva el tono judicial y confrontativo del texto, evitando suavizaciones devocionales.
  - La frase «según su propia voluntad» deja abierta la alternativa literal señalada en la nota, como en el audit trail inglés.
