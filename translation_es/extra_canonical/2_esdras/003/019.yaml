translation:
  language: es
  text: 'y hiciste temblar los abismos, y conmoviste la era. Y tu gloria pasó por las cuatro puertas[a]: fuego, terremoto, viento y escarcha, para que dieras la ley a la descendencia de Jacob y tu mandamiento a la generación de Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La imagen de «las cuatro puertas: fuego, terremoto, viento y escarcha» es textual e imagísticamente difícil. Se conserva la rareza teofánica del latín en vez de armonizarla con Éxodo.'
    reason: textual_variant
lexical_decisions:
- source_word: 'abyssos / abyssos (Latin: abyssos)'
  english_pob_choice: the depths
  chosen_spanish: los abismos
  alternatives_spanish:
  - las profundidades
  - los abismos profundos
  lexicon: abyssos
  rationale: El latín tremere fecisti abyssos pide una imagen de hondura estremecida; «abismos» conserva el tono cósmico y la fuerza imagística mejor que una simplificación a «profundidades».
- source_word: saeculum
  english_pob_choice: the age
  chosen_spanish: la era
  alternatives_spanish:
  - el siglo
  - el mundo
  - la edad
  lexicon: saeculum
  rationale: «Saeculum» aquí expresa un orden de tiempo o era, no solo un período de cien años. «Era» mantiene el alcance amplio y suena natural en español bíblico contemporáneo.
- source_word: gloria tua
  english_pob_choice: your glory
  chosen_spanish: tu gloria
  alternatives_spanish:
  - la gloria de ti
  - la gloria tuya
  lexicon: gloria
  rationale: Se conserva la referencia directa a la gloria divina sin volverla abstracta; «tu gloria» es la forma más clara y fiel en español.
- source_word: portas quattuor
  english_pob_choice: the four gates
  chosen_spanish: las cuatro puertas
  alternatives_spanish:
  - los cuatro portales
  - las cuatro entradas
  lexicon: porta
  rationale: «Puertas» mantiene la literalidad del latín y la rareza de la imagen teofánica; no se sustituye por una explicación más armonizada.
- source_word: gelus
  english_pob_choice: frost
  chosen_spanish: escarcha
  alternatives_spanish:
  - helada
  - hielo
  lexicon: gelu
  rationale: «Escarcha» comunica mejor la textura visual y climática de gelus en español bíblico que «hielo», que sería demasiado general, o «helada», que es más abstracta.
- source_word: semini Iacob
  english_pob_choice: the seed of Jacob
  chosen_spanish: la descendencia de Jacob
  alternatives_spanish:
  - la simiente de Jacob
  - la semilla de Jacob
  lexicon: semen
  rationale: En español, «descendencia» evita la dureza o ambigüedad de «semilla» en lectura pública, pero conserva el valor genealógico del original.
- source_word: generationi Israel
  english_pob_choice: the generation of Israel
  chosen_spanish: la generación de Israel
  alternatives_spanish:
  - a la descendencia de Israel
  - al linaje de Israel
  lexicon: generatio
  rationale: «Generación» sigue de cerca la estructura latina y la elección inglesa, manteniendo el paralelismo con «descendencia de Jacob».
theological_decisions:
- issue: Imagen teofánica de los cuatro elementos / puertas
  english_pob_reading: The translation keeps the Latin's strange theophanic imagery rather than harmonizing it to Exodus.
  chosen_spanish_reading: Se conserva la imagen extraña de las cuatro puertas con fuego, terremoto, viento y escarcha, sin armonizarla con Éxodo.
  alternative_spanish_readings:
  - armonizar la imagen con el relato de Éxodo
  - explicar las puertas como fenómenos del Sinaí
  rationale: El texto latino presenta una imaginería difícil y singular. La traducción española mantiene esa extrañeza porque forma parte del testimonio textual y no debe ser nivelada por armonización interpretativa.
  doctrine_reference: Tefanía / imaginería de la manifestación divina; fidelidad textual frente a armonización
- issue: Ley y mandamiento a Israel
  english_pob_reading: that you might give the law ... and your commandment ...
  chosen_spanish_reading: para que dieras la ley ... y tu mandamiento ...
  alternative_spanish_readings:
  - para que entregaras la ley ... y tu precepto ...
  - para dar la ley ... y tu ordenanza ...
  rationale: Se conserva la distinción entre «ley» y «mandamiento» que el texto latino y la traducción inglesa distinguen. «Mandamiento» es más inmediato para el español contemporáneo que «precepto» u «ordenanza», sin perder el matiz normativo.
  doctrine_reference: Torá / mandamiento divino; distinción conceptual sin sobreexplicación
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el testimonio inglés POB y su nota textual: no se observan revisiones aplicadas posteriores que obliguen a alterar la estructura básica. La nota inglesa sobre la dificultad imagística de las «four gates» se conserva en español mediante una nota textual equivalente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; en este versículo no figura, por lo que no se introduce.
  - «Ley» y «mandamiento» se distinguen como en el inglés auditado, sin sustituir ambos por un solo término jurídico.
  - La puntuación con raya se usa para reproducir el inciso explicativo de la imagen de las cuatro puertas.
  - «Escarcha» se eligió como término más concreto y evocador para gelus, manteniendo el registro bíblico sin arcaizar en exceso.
