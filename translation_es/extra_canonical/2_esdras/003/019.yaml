    rationale: Aunque «era» puede reflejar saeculum, el verbo «perturbar» con ese objeto suena forzado. «Conmoviste la era» o «trastornaste la era» transmite mejor el sentido de conturbasti y mantiene el alcance cósmico.
  - severity: low
