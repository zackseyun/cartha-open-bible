translation:
  language: es
  text: nada a nadie acerca de cómo este camino debe ser abandonado. ¿Lo hace Babilonia mejor que Sión?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Obra Babilonia mejor que Sión?»'
    reason: Preserva la alternativa documentada en el inglés POB para `meliora facit` / `act better`.
lexical_decisions:
- source_word: nihil
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - nada en absoluto
  lexicon: nihil
  rationale: ‘nihil’ expresa negación absoluta; en español, ‘nada’ reproduce con naturalidad esa negación sin añadir matices.
- source_word: nemini
  english_pob_choice: anyone
  chosen_spanish: a nadie
  alternatives_spanish:
  - a ninguno
  - para nadie
  lexicon: nemini
  rationale: El dativo ‘nemini’ se rinde con ‘a nadie’ para conservar la relación de destinatario/afectado del latín.
- source_word: quomodo debeat derelinqui
  english_pob_choice: how this way should be abandoned
  chosen_spanish: acerca de cómo este camino debe ser abandonado
  alternatives_spanish:
  - sobre cómo este camino debe dejarse
  - de cómo este camino debe abandonarse
  lexicon: quomodo + debeat + derelinqui
  rationale: La secuencia latina da una idea de modo y obligación/pasividad; ‘debe ser abandonado’ conserva el deber y la pasiva, y ‘acerca de cómo’ mantiene el valor interrogativo indirecto implícito en el pasaje.
- source_word: via haec
  english_pob_choice: this way
  chosen_spanish: este camino
  alternatives_spanish:
  - esta vía
  - este sendero
  lexicon: via
  rationale: ‘via’ puede ser ‘camino’ o ‘vía’; ‘camino’ es más natural en español y mantiene la imagen figurada sin perder el sentido.
- source_word: numquid
  english_pob_choice: Does
  chosen_spanish: ¿
  alternatives_spanish:
  - ¿Acaso
  - ¿Es que
  lexicon: numquid
  rationale: ‘numquid’ introduce una pregunta retórica; el español la expresa bien solo con la entonación interrogativa, sin añadir partículas innecesarias.
- source_word: meliora facit
  english_pob_choice: do better
  chosen_spanish: mejor
  alternatives_spanish:
  - obra mejor
  - lo hace mejor
  lexicon: meliora facit
  rationale: ‘meliora facit’ compara desempeño/resultado. En español, ‘hacer mejor’ o simplemente ‘mejor’ comunica la comparación de forma directa; aquí se opta por una formulación breve y idiomática.
- source_word: Babylon
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babilón
  lexicon: Babylon
  rationale: Se conserva el topónimo bíblico usual en español, ‘Babilonia’, por claridad y reconocimiento inmediato.
- source_word: Sion
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Sión
  lexicon: Sion
  rationale: ‘Sion’/‘Sión’ varía según tradición ortográfica; se conserva ‘Sion’ para uniformidad con transliteración simple, sin alterar el referente bíblico.
theological_decisions:
- issue: Comparative rhetorical question contrasting Babylon and Zion
  english_pob_reading: Does Babylon do better than Zion?
  chosen_spanish_reading: ¿Hace Babilonia mejor que Sion?
  alternative_spanish_readings:
  - ¿Babilonia lo hace mejor que Sion?
  - ¿Le va mejor a Babilonia que a Sion?
  rationale: El latín formula una comparación retórica entre Babilonia y Sion. La traducción mantiene la tensión comparativa sin explicitar un objeto ausente que el latín no añade.
  doctrine_reference: No aplica; comparación retórica entre ciudades/símbolos.
translation_notes:
  revision_awareness: 'Se incorporó la cláusula inicial omitida en un borrador previo, respetando la versificación del latín: ‘nihil nemini quomodo debeat derelinqui via haec’. También se evitó añadir una nota no anclada, ya que la validación previa falló por ausencia del marcador en el texto.'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y publicable, con sintaxis natural en español.
  - Se evitó ‘SEÑOR’ y otras sustituciones no justificadas, ya que este versículo no contiene el Tetragrámaton ni κύριος.
  - ‘Sion’ se conserva como forma bíblica reconocible y consistente con transliteración simple.
  - No se incluyeron notas al pie porque el texto base no requiere una alternativa textual anclada y la validación exige que todo marcador aparezca en el cuerpo del texto.
