  text: quoniam vidi quomodo sustines eos peccantes et pepercisti impie agentibus, et perdidisti populum tuum et conservasti inimicos tuos, et non significasti
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/003/030.yaml
  text: For I saw how you endure those who sin and have spared those who act impiously[a], but have destroyed your people and preserved your enemies, and have not made it clear
  footnotes:
  - marker: a
    text: Or 'spare those who act impiously, but destroy your people and preserve your enemies'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:28Z'
    unchanged: false
    changes_summary: Removed the unsupported expansion 'to anyone at all how this way should be abandoned.' The Latin ends simply with 'and have not made clear,' so the revision preserves the source without adding interpretive material.
translation:
  language: es
  text: Porque vi cómo soportas a los que pecan y has tenido misericordia de los que actúan impíamente[a], pero has destruido a tu pueblo y has preservado a tus enemigos, y no has dejado claro
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «has tenido misericordia de los que actúan impíamente, pero has destruido a tu pueblo y has preservado a tus enemigos»; el latín admite esta alternancia de alcance, aunque la revisión inglesa favorece la primera.'
    reason: alternative_reading
lexical_decisions:
- source_word: quoniam vidi
  english_pob_choice: For I saw
  chosen_spanish: Porque vi
  alternatives_spanish:
  - Pues vi
  - Porque he visto
  lexicon: quoniam
  rationale: «Porque» conserva la relación causal/explicativa del latín; «vi» refleja el perfecto histórico del original, sin convertirlo en presente ni ampliar el enunciado.
- source_word: sustines eos peccantes
  english_pob_choice: you endure those who sin
  chosen_spanish: soportas a los que pecan
  alternatives_spanish:
  - tienes paciencia con los que pecan
  - toleras a los que pecan
  lexicon: sustinere
  rationale: «Soportas» mantiene la fuerza de aguante/resistencia del verbo latino. «Los que pecan» traduce el participio presente con un giro natural en español.
- source_word: pepercisti impie agentibus
  english_pob_choice: have spared those who act impiously
  chosen_spanish: has perdonado a los que obran impíamente
  alternatives_spanish:
  - has tenido misericordia de los que obran impíamente
  - has dejado sin castigo a los que actúan impíamente
  lexicon: parcere
  rationale: El audit trail inglés fija el perfecto («have spared»), que corresponde al perfecto latino. «Perdonado» recoge el gesto de no destruir o no castigar; «obran impíamente» mantiene el matiz moral de impiedad.
- source_word: perdidisti populum tuum
  english_pob_choice: have destroyed your people
  chosen_spanish: has destruido a tu pueblo
  alternatives_spanish:
  - has perdido a tu pueblo
  - has arruinado a tu pueblo
  lexicon: perdere
  rationale: «Has destruido» sigue la revisión inglesa que subraya la acción histórica consumada. «Perder» en español sería más ambigua y menos directa para el evento histórico aludido.
- source_word: conservasti inimicos tuos
  english_pob_choice: preserved your enemies
  chosen_spanish: has preservado a tus enemigos
  alternatives_spanish:
  - has guardado a tus enemigos
  - has conservado a tus enemigos
  lexicon: conservare
  rationale: «Preservado» reproduce el valor de mantener/exentar de destrucción y sigue de cerca la elección inglesa. «Conservado» es posible, pero puede sonar menos natural en este contraste.
- source_word: et non significasti
  english_pob_choice: and have not made it clear
  chosen_spanish: y no has dejado claro
  alternatives_spanish:
  - y no has manifestado
  - y no has dado a conocer
  lexicon: significare
  rationale: La revisión inglesa eliminó la expansión no sustentada y dejó solo la clausura incompleta. «No has dejado claro» conserva esa apertura final sin añadir objeto explícito ni interpretaciones.
theological_decisions:
- issue: Tensión histórica entre la destrucción del pueblo y la preservación de los enemigos
  english_pob_reading: have destroyed your people and preserved your enemies
  chosen_spanish_reading: has destruido a tu pueblo y has preservado a tus enemigos
  alternative_spanish_readings:
  - has arrasado a tu pueblo y has guardado a tus enemigos
  - has perdido a tu pueblo y has mantenido a tus enemigos
  rationale: 'Se conserva la antítesis fuerte del original y de la revisión inglesa: la destrucción del pueblo es un hecho consumado, mientras los enemigos quedan preservados. No se suaviza la acusación con vocabulario más general.'
  doctrine_reference: Lamentación profética; teodicea en literatura apocalíptica
- issue: Clausura incompleta del verso
  english_pob_reading: and have not made it clear
  chosen_spanish_reading: y no has dejado claro
  alternative_spanish_readings:
  - y no has aclarado
  - y no has hecho saber
  rationale: La frase final se deja deliberadamente incompleta como en el texto latino revisado y la traducción inglesa final. No se añade el complemento implícito, para respetar la tensión del pasaje.
  doctrine_reference: Principio de primacía textual y no-expansión interpretativa
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del texto inglés POB, que mantuvo el perfecto histórico y eliminó la expansión final no sustentada. También toma en cuenta la lectura del latín limpio: sustines en presente, seguido de pepercisti/perdidisti/conservasti en perfecto, y termina abruptamente con et non significasti.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera del versículo porque aquí el texto usa segunda persona singular sin el nombre divino explícito.
  - Se usa «impíamente» para conservar el campo semántico de impiedad del latín, evitando una paráfrasis moralizante más amplia.
  - La estructura verbal en perfecto compuesto («has…») reproduce el valor histórico consumado del latín y de la revisión inglesa.
