source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: anno tricesimo ruinae civitatis eram in Babylone, ego Salathihel qui et Ezras, et conturbatus sum super cubili meo recumbens, et cogitationes meae ascendebant super cor meum,
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/003/001.yaml
  text: In the thirtieth year after the ruin of the city[a], I was in Babylon—I, Salathiel, who am also Ezra—and as I lay on my bed, I was troubled, and my thoughts came up upon my heart,
  footnotes:
  - marker: a
    text: Or 'came up over my heart'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:22Z'
    unchanged: false
    changes_summary: Changed 'lay back on my bed' to 'lay on my bed' for closer adherence to recumbens while keeping natural formal English. No other changes needed.
translation:
  language: es
  text: En el año trigésimo después de la ruina de la ciudad, yo estaba en Babilonia, yo, Salatiel, que también soy Esdras; y, mientras yacía en mi lecho, estaba turbado, y mis pensamientos venían a mi corazón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «subían sobre mi corazón».
    reason: 'Preserva la alternativa más literal del giro latino/semítico reflejado en la POB inglesa: «came up upon my heart».'
lexical_decisions:
- source_word: anno tricesimo
  english_pob_choice: In the thirtieth year
  chosen_spanish: En el año trigésimo
  alternatives_spanish:
  - En el trigésimo año
  - Al cumplirse treinta años
  lexicon: Lat. anno tricesimo
  rationale: Conserva el valor temporal exacto del ablativo latino y mantiene un tono bíblico sobrio en español.
- source_word: ruinae civitatis
  english_pob_choice: after the ruin of the city
  chosen_spanish: después de la ruina de la ciudad
  alternatives_spanish:
  - tras la ruina de la ciudad
  - después de la caída de la ciudad
  lexicon: Lat. ruinae civitatis
  rationale: «Ruina» reproduce bien el colapso/derrumbe implícito en el latín; «caída» sería posible, pero es menos literal.
- source_word: eram in Babylone
  english_pob_choice: I was in Babylon
  chosen_spanish: yo estaba en Babilonia
  alternatives_spanish:
  - yo estaba en Babilonia
  lexicon: Lat. eram in Babylone
  rationale: «Estaba» es la forma natural y fiel para el imperfecto latino; se mantiene el nombre geográfico tradicional «Babilonia».
- source_word: ego Salathihel qui et Ezras
  english_pob_choice: I, Salathiel, who am also Ezra
  chosen_spanish: yo, Salatiel, que también soy Esdras
  alternatives_spanish:
  - yo, Salatiel, que también soy Ezra
  lexicon: Lat. ego ... qui et ...
  rationale: Se conserva la autodefinición doble y el valor de identidad del participio relativo; «Esdras» es la forma española usual del nombre bíblico.
- source_word: conturbatus sum
  english_pob_choice: I was troubled
  chosen_spanish: estaba turbado
  alternatives_spanish:
  - me encontraba turbado
  - quedé turbado
  lexicon: Lat. conturbatus sum
  rationale: «Turbado» reproduce el estado de aflicción/confusión sin añadir un matiz más fuerte que el del latín.
- source_word: recumbens
  english_pob_choice: as I lay on my bed
  chosen_spanish: mientras yacía en mi cama
  alternatives_spanish:
  - al yacer en mi cama
  - mientras estaba acostado en mi cama
  lexicon: Lat. recumbens
  rationale: «Yacía» comunica la posición reclinada sin sonar coloquial; evita el calco duro de «recostado» y conserva la imagen de reposo.
- source_word: cogitationes meae ascenderant super cor meum
  english_pob_choice: my thoughts came up upon my heart
  chosen_spanish: mis pensamientos subían a mi corazón
  alternatives_spanish:
  - mis pensamientos subían sobre mi corazón
  - mis pensamientos venían a mi corazón
  lexicon: Lat. cogitationes meae ascenderant super cor meum
  rationale: La POB inglesa preserva el giro semítico «upon my heart»; en español, «subían a mi corazón» comunica mejor la imagen de pensamientos que surgen en el interior, mientras «sobre» sería demasiado áspero o literal.
theological_decisions:
- issue: Idiom of thoughts and the heart as inner self
  english_pob_reading: my thoughts came up upon my heart
  chosen_spanish_reading: mis pensamientos subían a mi corazón
  alternative_spanish_readings:
  - mis pensamientos subían sobre mi corazón
  - mis pensamientos venían a mi corazón
  rationale: El latín refleja el semitismo sobre el corazón; en español, el sentido se preserva mejor con una formulación natural que sigue señalando el corazón como sede interior del pensamiento. No se neutraliza la imagen antropológica.
  doctrine_reference: Antropología bíblica; uso semítico de «corazón» como centro interior de pensamiento y voluntad.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que corrigió «came up over my heart» a «came up upon my heart» para reflejar con más precisión el giro semítico del latín super cor meum. La versión española mantiene esa tensión idiomática sin forzar un calco antinatural.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece el tetragrámaton.
  - Se emplea «Esdras» como forma española estable del nombre propio, sin ocultar la doble identificación del original.
  - Se mantiene un registro bíblico formal pero natural, con preferencia por claridad sintáctica sobre calcos rígidos.
