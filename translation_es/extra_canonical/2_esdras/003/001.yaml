revisions:
- from: En el año trigésimo después de la ruina de la ciudad[a], yo estaba en Babilonia —yo, Salatiel, que también soy Esdras—; y, mientras yacía en mi cama, estaba turbado, y mis pensamientos subían a mi corazón.
  to: En el año trigésimo después de la ruina de la ciudad, yo estaba en Babilonia, yo, Salatiel, que también soy Esdras; y, mientras yacía en mi lecho, estaba turbado, y mis pensamientos venían a mi corazón[a].
  rationale: Se suavizó la puntuación del inciso para que el español fluya con naturalidad sin perder la estructura enfática del original. Se cambió 'cama' por 'lecho' para un registro más sobrio. Se adoptó 'venían a mi corazón' como formulación principal porque comunica mejor en español el surgimiento de pensamientos en la interioridad, y se dejó en nota una opción más literal que conserva el matiz de 'upon/super'.
