review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del latín: tiempo relativo a la ruina de la ciudad, ubicación en Babilonia, autoidentificación como Salatiel/Esdras, estado de turbación mientras yace en la cama y surgimiento de pensamientos en el corazón. Sin embargo, hay dos detalles mejorables para mayor fidelidad y naturalidad: el nexo/puntuación alrededor del inciso ''yo, Salatiel...'' suena trabado en español, y ''subían a mi corazón'' no reproduce tan bien el modismo de pensamientos que surgen en la interioridad como ''venían a mi corazón''.'
  spanish_quality_summary: El español es en general claro y digno, pero la secuencia '—yo, Salatiel...—; y,' resulta poco natural por la combinación de raya, punto y coma y coma. Además, 'subían a mi corazón' suena algo forzado en español bíblico actual; 'venían a mi corazón' o 'subían a mi mente/corazón' sería más idiomático. También conviene preferir 'lecho' frente a 'cama' si se busca un registro más bíblico y sobrio, aunque 'cama' no es incorrecto.
  glossary_alignment: No hay términos del glosario principal comprometidos en este versículo. 'Esdras' está bien como forma española establecida. No hay conflictos con Yahvé/Mesías/Espíritu ni otros términos sensibles del proyecto.
  issues:
  - severity: medium
    issue: Puntuación y enlace del inciso central poco naturales
    rationale: La forma 'Babilonia —yo, Salatiel, que también soy Esdras—; y, mientras...' mezcla raya con punto y coma de manera torpe en español. Puede resolverse con comas o con rayas sin el punto y coma posterior.
  - severity: medium
    issue: '''Subían a mi corazón'' suena rígido y menos idiomático'
    rationale: Aunque intenta preservar 'ascendebant super cor meum', en español la imagen resulta menos natural que 'venían a mi corazón', que además ya está documentada en la nota como alternativa. Esto mantiene el corazón como sede interior sin calco áspero.
  - severity: low
    issue: '''Cama'' es correcto pero menos elevado que ''lecho'''
    rationale: Para un registro bíblico moderno pero digno, 'lecho' puede encajar mejor con el tono sin perder naturalidad.
  revised_spanish_text: En el año trigésimo después de la ruina de la ciudad, yo estaba en Babilonia, yo, Salatiel, que también soy Esdras; y, mientras yacía en mi lecho, estaba turbado, y mis pensamientos venían a mi corazón[a].
  revised_footnotes:
  - marker: a
    text: O «subían sobre mi corazón».
    reason: 'Preserva la alternativa más literal del giro latino/semítico reflejado en la POB inglesa: «came up upon my heart».'
