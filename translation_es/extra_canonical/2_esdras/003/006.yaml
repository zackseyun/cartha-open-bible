  text: Et induxisti eum in paradisum, quem plantauit dextera tua antequam terra adueṅtaret.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/003/006.yaml
  text: And you brought him into paradise, which your right hand had planted before the earth came into being.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:24Z'
    unchanged: false
    changes_summary: Revised the final clause from 'before the earth appeared' to 'before the earth came into being' to better reflect the Latin adveniret/adveṅtaret sense in context and maintain a more formal register.
translation:
  language: es
  text: Y lo introdujiste en el paraíso, que tu mano derecha había plantado antes de que la tierra llegara a existir.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et induxisti eum in paradisum
  english_pob_choice: And you brought him into paradise
  chosen_spanish: Y lo introdujiste en el paraíso
  alternatives_spanish:
  - Y lo llevaste al paraíso
  - Y lo condujiste al paraíso
  lexicon: inducere
  rationale: «Introdujiste» conserva el movimiento intencional de llevar a alguien dentro de un lugar, con un tono algo más formal que «llevaste» y sin perder naturalidad en español. «Paraíso» es el equivalente directo de paradisum.
- source_word: quem plantauit dextera tua
  english_pob_choice: which your right hand had planted
  chosen_spanish: que tu mano derecha había plantado
  alternatives_spanish:
  - que tu diestra había plantado
  - que había plantado tu mano derecha
  lexicon: plantare; dextera
  rationale: Se mantiene la imagen concreta de «tu mano derecha» en lugar de sustituirla por una paráfrasis. «Mano derecha» es transparente en español y evita imponer una fórmula litúrgica cuando el latín no la exige.
- source_word: antequam terra adueṅtaret
  english_pob_choice: before the earth came into being
  chosen_spanish: antes de que la tierra llegara a existir
  alternatives_spanish:
  - antes de que la tierra existiera
  - antes de que la tierra viniera a ser
  lexicon: antequam; advenire/adventare
  rationale: La revisión inglesa privilegia la idea de origen/existencia, no solo de aparición visible. «Llegara a existir» conserva ese matiz ontológico en español y mantiene el registro formal del cierre de la frase.
theological_decisions:
- issue: El sentido temporal/ontológico de la cláusula final
  english_pob_reading: before the earth came into being
  chosen_spanish_reading: antes de que la tierra llegara a existir
  alternative_spanish_readings:
  - antes de que la tierra existiera
  - antes de que la tierra viniera a ser
  rationale: La expresión apunta a la preexistencia de la acción divina respecto de la tierra misma. Se evita una lectura meramente visual («apareció») porque la revisión auditada corrigió ese matiz hacia el ser/origen de la tierra.
  doctrine_reference: Creación ex nihilo / preexistencia del acto creador
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés, que cambió «before the earth appeared» por «before the earth came into being» para reflejar mejor el latín adveniret/adveṅtaret y mantener un registro más formal.
  spanish_consistency_notes:
  - Se emplea «paraíso» como término estable para paradisum.
  - Se conservó «mano derecha» por fidelidad literal y claridad, sin convertirla en un equivalente eclesiástico fijo.
  - El cierre «llegara a existir» busca sostener la tensión ontológica del original sin sonar calcado del inglés.
