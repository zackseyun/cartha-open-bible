    unchanged: false
    changes_summary: Removed material from subsequent verses that was incorrectly included. Retained the verse's covenant language and promise not to forsake his seed.
translation:
  language: es
  text: Y estableciste con él un pacto eterno, y dijiste que nunca abandonarías a su descendencia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: testamentum aeternum
  english_pob_choice: everlasting covenant
  chosen_spanish: pacto eterno
  alternatives_spanish:
  - alianza eterna
  - pacto perpetuo
  lexicon: testamentum
  rationale: El latín testamento aquí corresponde al lenguaje de pacto; en español bíblico y actual, "pacto" comunica mejor la relación juramentada que "testamento". "Eterno" conserva la duración sin añadir matices ajenos.
- source_word: derelinqueres
  english_pob_choice: forsake
  chosen_spanish: abandonarías
  alternatives_spanish:
  - desampararías
  - abandonaras
  lexicon: derelinquere
  rationale: '"Forsake" en inglés POB expresa dejar a alguien sin apoyo o lealtad. "Abandonar" es natural en español y mantiene la fuerza relacional. "Desamparar" sería posible, pero suena más cargado y menos directo.'
- source_word: semen
  english_pob_choice: seed
  chosen_spanish: descendencia
  alternatives_spanish:
  - linaje
  - simiente
  lexicon: semen
  rationale: En este contexto genealógico y de promesa, "descendencia" evita la dureza o ambigüedad de "simiente" en español contemporáneo y conserva el sentido colectivo de la posteridad prometida.
theological_decisions:
- issue: 'Naturaleza del vínculo con Abraham: pacto y promesa de preservación de la descendencia'
  english_pob_reading: And you established with him an everlasting covenant, and said that you would never forsake his seed.
  chosen_spanish_reading: Y estableciste con él un pacto eterno, y dijiste que nunca abandonarías a su descendencia.
  alternative_spanish_readings:
  - Y estableciste con él una alianza eterna, y dijiste que nunca desampararías a su descendencia.
  - Y fijaste con él un pacto perpetuo, y dijiste que jamás dejarías su linaje.
  rationale: La formulación conserva el acto divino de establecer un pacto duradero y la promesa de no rechazar a la descendencia. No se suaviza la continuidad histórica de la promesa, que es el punto teológico del verso.
  doctrine_reference: Génesis 17:7; Salmo 105:8-10
translation_notes:
  revision_awareness: El texto inglés POB fue revisado para eliminar material de versículos posteriores que se había colado por error; esta línea mantiene solo la cláusula del pacto eterno y la promesa sobre la descendencia, sin añadir contenido ajeno.
  spanish_consistency_notes:
  - He traducido "covenant" como "pacto" para mantener coherencia con el lenguaje bíblico pactal en español.
  - He usado "descendencia" para "seed" por claridad y por consistencia con promesa genealógica, evitando un tecnicismo menos idiomático.
  - 'La estructura verbal conserva el paralelismo del original: establecimiento del pacto + promesa negativa futura.'
