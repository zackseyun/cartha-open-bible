source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'suscitasti tibi seruum nomine Dauid. Et dixisti ei aedificare ciuitatem nominis tui, et offerre tibi in ea de tuis oblationes. Et factum est hoc annis multis, et deliquerunt qui habitabant ciuitatem, In omnibus facientes sicut fecit Adam et omnes generationes eius, utebantur enim et ipsi cor malignum. Et tradidisti ciuitatem tuam in manibus inimicorum tuorum. Et dixi ego tunc in corde meo : numquid meliora faciunt qui habitant Babilonem? et propter hoc dominauit Sion? Factum est autem cum uenissem huc, et uidi impietates, quorum non est numerus, et delinquentes multos uidit anima mea hoc tricesimo anno; et excessit cor meum, Quoniam uidi quomodo sustines eos peccantes, et pepercisti impie agentibus, et perdidisti populum tuum, et conseruasti inimicos tuos, Et non significasti nihil nemini quomodo debeat derelinqui uia haec. numquid meliora facit Babilon quam Sion? Aut alia gens cognouit te praeter Israel ? aut quae tribus crediderunt testamentis tuis sicut haec Iacob? Quarum merces
    non comparuit, neque labor fructificauit. pertransiens enim pertransiui in gentibus, et uidi habundantes eas, et non memorantes mandatorum tuorum. Nunc ergo pondera in statera nostras iniquitates, et eorum qui habitant in saeculo ; et inuenietur momentum puncti ubi declinet. Aut quando non peccauerunt in conspectu tuo qui habitant terram ? aut quae gens sic obseruauit mandata tua? Homines quidem per nomina inuenies seruasse mandata tua, gentes autem non inuenies.'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/003/024.yaml
  text: And you told him to build a city for your name[a], and in it to offer to you offerings from what is yours.
  footnotes:
  - marker: a
    text: Or 'offer to you offerings'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:28Z'
    unchanged: false
    changes_summary: Replaced the less natural and potentially archaic 'oblations' with 'offerings,' and adjusted word order to more clearly reflect the Latin 'offerre tibi in ea de tuis oblationes.'
translation:
  language: es
  text: Y le dijiste que edificara una ciudad para tu nombre[a], y en ella te ofreciera ofrendas de lo tuyo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ofrecerte ofrendas'.
    reason: alternative_reading
lexical_decisions:
- source_word: seruum / slave-servant
  english_pob_choice: build a city for your name
  chosen_spanish: una ciudad para tu nombre
  alternatives_spanish:
  - una ciudad en honor de tu nombre
  - una ciudad para tu Nombre
  lexicon: nombre
  rationale: El texto latino dice 'aedificare ciuitatem nominis tui', una construcción final donde la ciudad queda asociada al nombre divino. En español, 'para tu nombre' conserva bien la finalidad y la dedicación sin añadir interpretaciones ajenas.
- source_word: offerre tibi ... oblationes / offerings
  english_pob_choice: offer to you offerings
  chosen_spanish: te ofreciera ofrendas
  alternatives_spanish:
  - te ofreciera sacrificios
  - te presentara ofrendas
  lexicon: ofrenda
  rationale: '''Oblationes'' se rinde de forma natural como ''ofrendas'' en español. Mantener el verbo ''ofrecer'' preserva la relación verbal del latín (''offerre'') y evita endurecer el texto con un tecnicismo innecesario.'
- source_word: de tuis / from what is yours
  english_pob_choice: from what is yours
  chosen_spanish: de lo tuyo
  alternatives_spanish:
  - de tus bienes
  - de lo que es tuyo
  lexicon: posesivo sustantivado
  rationale: La expresión latina indica procedencia desde lo que pertenece a Dios. 'De lo tuyo' conserva la idea de posesión sin sobreexplicar; es breve, natural y fiel al sintagma.
theological_decisions:
- issue: Dedicación de la ciudad al nombre divino
  english_pob_reading: build a city for your name
  chosen_spanish_reading: edificara una ciudad para tu nombre
  alternative_spanish_readings:
  - edificara una ciudad en honor de tu nombre
  - edificara una ciudad para tu Nombre
  rationale: La formulación conserva la dedicación del lugar al nombre de Dios sin convertirla en una paráfrasis cultual más amplia. No se introduce 'gloria' o 'templo' porque el latín sólo habla de 'nombre'.
  doctrine_reference: Nombre de Dios como señal de pertenencia y consagración
- issue: Naturaleza de las 'ofrendas'
  english_pob_reading: offer to you offerings
  chosen_spanish_reading: te ofreciera ofrendas
  alternative_spanish_readings:
  - te ofreciera sacrificios
  - te presentara ofrendas
  rationale: '''Ofrendas'' mantiene la amplitud del latín ''oblationes'' sin estrecharlo indebidamente a un tipo particular de sacrificio. La frase permite que el lector perciba el acto cultual sin imponer una precisión no dada por la fuente.'
  doctrine_reference: Culto/ofrenda como acto de dedicación a Dios
translation_notes:
  revision_awareness: El inglés POB pasó de una forma más pesada ('offer you offerings') a una más natural ('offer to you offerings'); la versión española sigue esa mejora estilística sin perder la correspondencia con el latín 'offerre tibi ... oblationes'. No se trasladó 'oblations' como préstamo porque el español bíblico estándar entiende mejor 'ofrendas'.
  spanish_consistency_notes:
  - 'Se mantuvo el orden semántico básico del latín: mandato de edificar + finalidad + acto de ofrecer + procedencia de las ofrendas.'
  - Se evitó 'SEÑOR' porque el segmento fuente no contiene el tetragrámaton; aquí sólo aparece la referencia posesiva 'tu nombre'.
  - La puntuación busca reflejar la coordinación del latín sin introducir una división versicular artificial.
