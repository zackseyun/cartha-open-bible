translation:
  language: es
  text: a él, y le diste a Isaac, y a Isaac le diste a Jacob y a Esaú. Y separaste a Jacob para ti, pero a Esaú lo apartaste, y Jacob se hizo
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: eius
  english_pob_choice: him
  chosen_spanish: de él
  alternatives_spanish:
  - de él mismo
  - de éste
  lexicon: N/A
  rationale: El latino inicia con un pronombre en genitivo dependiente del contexto previo; el inglés lo refleja con ‘him’. En español, ‘de él’ conserva esa dependencia sin añadir contenido no presente.
- source_word: dedisti
  english_pob_choice: you gave
  chosen_spanish: le diste
  alternatives_spanish:
  - diste
  - le concediste
  lexicon: N/A
  rationale: ‘le diste’ expresa el dativo implícito del latino y mantiene el paralelismo repetido de la cláusula.
- source_word: segregasti tibi
  english_pob_choice: you set apart ... for yourself
  chosen_spanish: separaste ... para ti
  alternatives_spanish:
  - apartaste ... para ti
  - lo reservaste para ti
  lexicon: N/A
  rationale: ‘segregasti tibi’ combina separación y destinación para Dios; ‘separaste para ti’ comunica ambos rasgos de modo natural en español, siguiendo el sentido del inglés auditado.
- source_word: separasti
  english_pob_choice: you separated
  chosen_spanish: apartaste
  alternatives_spanish:
  - separaste
  - distinguistes
  lexicon: N/A
  rationale: Para Esaú, el latino usa el verbo simple de separación. ‘Apartaste’ evita repetir mecánicamente ‘separaste’ y conserva la idea de apartamiento/distinción.
- source_word: factus est
  english_pob_choice: became
  chosen_spanish: se hizo
  alternatives_spanish:
  - llegó a ser
  - fue
  lexicon: N/A
  rationale: ‘se hizo’ reproduce el cambio de estado indicado por ‘factus est’ sin sobreinterpretar el sintagma incompleto del texto latino.
theological_decisions:
- issue: Elección entre ‘separar’ y ‘apartar’ para el contraste Jacob/Esaú
  english_pob_reading: you set apart Jacob for yourself, but Esau you separated
  chosen_spanish_reading: Y separaste a Jacob para ti, pero a Esaú lo apartaste
  alternative_spanish_readings:
  - Y apartaste a Jacob para ti, pero a Esaú lo separaste
  - Y reservaste a Jacob para ti, pero a Esaú lo apartaste
  rationale: El texto latino conserva dos verbos distintos, uno con destinación a Dios y otro con simple separación. La versión española mantiene el contraste sin borrar la tensión léxica.
  doctrine_reference: Elección y separación providencial en la historia patriarcal; no se añade desarrollo doctrinal ajeno al versículo.
translation_notes:
  revision_awareness: La revisión previa corrigió un cierre ajeno al latino y pidió una traducción cláusula por cláusula que preserve el final incompleto de la fuente; esta versión sigue esa pauta y evita añadir una nota no anclada en el texto.
  spanish_consistency_notes:
  - Se conserva el paralelismo de ‘diste’ en ambas cláusulas.
  - No se fuerza una solución teológica más desarrollada que la del latino.
  - Se respeta el final abrupto con ‘se hizo’, sin completar la frase.
