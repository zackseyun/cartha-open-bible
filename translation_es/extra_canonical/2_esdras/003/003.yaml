translation:
  language: es
  text: Y mi espíritu fue grandemente conmovido[a], y comencé a hablar palabras temerosas al Altísimo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «palabras temerosas».
    reason: alternative_reading
lexical_decisions:
- source_word: spiritus meus
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi aliento
  - mi ánimo
  lexicon: spiritus
  rationale: El latín spiritus en este contexto expresa la interioridad personal de Esdras, no el Espíritu Santo ni el viento; por eso se vierte naturalmente como «mi espíritu».
- source_word: uentilatus est
  english_pob_choice: was greatly stirred
  chosen_spanish: fue grandemente conmovido
  alternatives_spanish:
  - fue fuertemente agitado
  - fue profundamente turbado
  lexicon: ventilare
  rationale: La imagen latina sugiere agitación intensa. «Conmovido» comunica el movimiento interior en español de forma digna y fluida, y «grandemente» conserva el énfasis del adverbio.
- source_word: uerba timorata
  english_pob_choice: fearful words
  chosen_spanish: palabras temerosas
  alternatives_spanish:
  - palabras llenas de temor
  - palabras de temor
  lexicon: timoratus
  rationale: El adjetivo latino timorata tiene fuerza de temor/aprensión, no de «palabras aterradoras». «Temerosas» mantiene la cercanía formal al latín y evita la ambigüedad de un castellano más libre.
- source_word: ad altissimum
  english_pob_choice: to the Most High
  chosen_spanish: al Altísimo
  alternatives_spanish:
  - al Dios Altísimo
  - al Altísimo Dios
  lexicon: Altissimus
  rationale: «Altísimo» reproduce el título reverencial del latín y es idiomático en español bíblico; no hay base aquí para introducir «Dios» explícitamente en el texto principal, aunque el referente es divino.
theological_decisions:
- issue: El referente de «Altissimum»
  english_pob_reading: to the Most High
  chosen_spanish_reading: al Altísimo
  alternative_spanish_readings:
  - al Dios Altísimo
  - al Altísimo Dios
  rationale: El latín usa un título superlativo reverencial sin añadir el sustantivo «Dios». Mantener solo «Altísimo» preserva esa sobriedad y la tensión del original, dejando claro por el contexto que Esdras se dirige a Dios.
  doctrine_reference: Teología bíblica del título divino reverencial
- issue: Naturaleza de las «palabras temerosas»
  english_pob_reading: fearful words
  chosen_spanish_reading: palabras temerosas
  alternative_spanish_readings:
  - palabras llenas de temor
  - palabras de temor
  rationale: Se conserva la idea de temor reverente y audacia ante Dios. No se convierte en «palabras aterradoras», porque el sujeto es el hablante, no el efecto de sus palabras sobre otros.
  doctrine_reference: Tono de oración y reverencia ante Dios
translation_notes:
  revision_awareness: La versión inglesa más reciente volvió de «anxious words» a «fearful words» para reflejar mejor el latín uerba timorata. La redacción española sigue directamente esa lectura, usando una forma que conserva el matiz de temor sin sugerir que las palabras sean aterradoras para oyentes.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» con artículo contracto («al») para un registro bíblico natural en español.
  - «Espíritu» se escribe en minúscula porque se refiere al espíritu de Esdras, no al Espíritu Santo.
  - La puntuación final queda abierta por tratarse de un miembro de cláusula que continúa en el versículo siguiente en muchas ediciones del libro.
