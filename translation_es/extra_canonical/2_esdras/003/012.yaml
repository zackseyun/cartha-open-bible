source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: Et factum est cum coepissent multiplicari qui habitabant super terram, et multiplicauerunt filios et populos et gentes multas, et coeperunt iterato impietatem facere plus quam priores.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/003/012.yaml
  text: And it happened that when those who lived on the earth began to multiply, they multiplied children and peoples and many nations, and they began again to act impiously, more than those before them.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:26Z'
    unchanged: false
    changes_summary: Replaced 'begot' with 'multiplied' to reflect the repeated Latin verb multiplicaverunt more directly and avoid adding a more specific sense than the source states.
translation:
  language: es
  text: Y aconteció que, cuando los que habitaban en la tierra comenzaron a multiplicarse, multiplicaron hijos, pueblos y muchas naciones, y comenzaron de nuevo a obrar impíamente, más que los anteriores.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et factum est
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: N/A
  rationale: La fórmula narrativa latina introduce un evento de manera solemne; «aconteció» mantiene ese tono y equivale bien al inglés auditado sin volverlo rígido.
- source_word: cum coepissent multiplicari qui habitabant super terram
  english_pob_choice: when those who lived on the earth began to multiply
  chosen_spanish: cuando los que habitaban sobre la tierra comenzaron a multiplicarse
  alternatives_spanish:
  - cuando los que vivían en la tierra empezaron a multiplicarse
  - cuando los habitantes de la tierra comenzaron a multiplicarse
  lexicon: N/A
  rationale: 'Se conserva la relación temporal y el valor pasivo/intransitivo de «multiplicari» en el contexto: no solo aumentan en número, sino que el grupo humano sobre la tierra se multiplica.'
- source_word: multiplicauerunt filios et populos et gentes multas
  english_pob_choice: they multiplied children and peoples and many nations
  chosen_spanish: multiplicaron hijos, pueblos y muchas naciones
  alternatives_spanish:
  - engendraron hijos, pueblos y muchas naciones
  - aumentaron en hijos, pueblos y muchas naciones
  lexicon: N/A
  rationale: El latín repite el verbo «multiplicauerunt», y la revisión inglesa corrigió una lectura más específica («begot») para no añadir sentido. En español, «multiplicaron» reproduce esa repetición y evita introducir un detalle no explicitado por la fuente. «hijos» se mantiene por fidelidad a la serie nominal del texto.
- source_word: coeperunt iterato
  english_pob_choice: they began again
  chosen_spanish: comenzaron de nuevo
  alternatives_spanish:
  - volvieron a comenzar
  - empezaron otra vez
  lexicon: N/A
  rationale: «Iterato» indica repetición; «de nuevo» comunica esa reanudación de modo natural en español sin perder el eco del original.
- source_word: impietatem facere
  english_pob_choice: to act impiously
  chosen_spanish: a obrar impíamente
  alternatives_spanish:
  - a hacer impiedad
  - a actuar con impiedad
  lexicon: N/A
  rationale: «Impíamente» preserva el adverbio moral del latín y corresponde al registro bíblico. «Obrar» mantiene el valor verbal amplio de facere sin concretarlo más de lo que el texto permite.
- source_word: plus quam priores
  english_pob_choice: more than those before them
  chosen_spanish: más que los de antes
  alternatives_spanish:
  - más que los anteriores
  - más que los que les precedieron
  lexicon: N/A
  rationale: La comparación final es general; «los de antes» suena natural en español y no fuerza una referencia más específica que la del latín.
theological_decisions:
- issue: La expansión humana precede una nueva intensificación de la impiedad
  english_pob_reading: they multiplied children and peoples and many nations, and they began again to act impiously, more than those before them
  chosen_spanish_reading: multiplicaron hijos, pueblos y muchas naciones, y comenzaron de nuevo a obrar impíamente, más que los de antes
  alternative_spanish_readings:
  - engendraron hijos, pueblos y muchas naciones, y comenzaron de nuevo a obrar impíamente, más que los anteriores
  rationale: La secuencia no presenta una bendición neutral, sino un aumento humano seguido por una recaída moral más grave. La redacción española conserva esa progresión sin suavizar «impíamente» ni convertir la multiplicación en una simple idea demográfica ajena a la forma verbal del latín.
  doctrine_reference: Ninguna doctrina técnica; fidelidad narrativa y moral al texto apocalíptico.
translation_notes:
  revision_awareness: La revisión inglesa reemplazó 'begot' por 'multiplied' para reflejar con mayor precisión el latín 'multiplicaverunt'. La versión española sigue ese ajuste y evita formas como 'engendraron' o 'engendraban', que añadirían una especificación no respaldada por la última revisión auditada.
  spanish_consistency_notes:
  - Se usa «impíamente» para mantener el valor adverbial moral del latín.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se mantiene el paralelismo de series nominales («hijos, pueblos y muchas naciones») sin ampliar el contenido.
  - El tono narrativo se conserva solemne pero en español moderno y claro.
