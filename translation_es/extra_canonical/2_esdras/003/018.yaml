translation:
  language: es
  text: tú inclinaste los cielos, estableciste la tierra, y moviste el mundo.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: inclinasti caelos
  english_pob_choice: you bent down the heavens
  chosen_spanish: inclinaste los cielos
  alternatives_spanish:
  - doblegaste los cielos
  - inclinaste los cielos
  lexicon: inclinar
  rationale: El latín expresa una acción de abatir o doblar los cielos hacia abajo; «inclinaste» conserva la imagen física sin añadir una interpretación más fuerte que el texto.
- source_word: statuisti terram
  english_pob_choice: established the earth
  chosen_spanish: estableciste la tierra
  alternatives_spanish:
  - pusiste la tierra en su lugar
  - asentaste la tierra
  lexicon: establecer
  rationale: Sigo la decisión revisada del audit trail, que toma statuisti como ‘estableciste’ y no como ‘sacudiste’. En español, «estableciste la tierra» mantiene la idea de fijación/puesta firme sin sobrecargarla.
- source_word: commouisti orbem
  english_pob_choice: moved the world
  chosen_spanish: moviste el mundo
  alternatives_spanish:
  - conmoviste el mundo
  - agitaste el mundo
  lexicon: mover
  rationale: «Moviste» reproduce el verbo simple del latín y evita repetir la intensidad ya cubierta por el encabalgamiento cósmico. «Mundo» es la equivalencia natural de orbem en este contexto.
theological_decisions:
- issue: Descripción de la teofanía de Sinaí mediante lenguaje cósmico
  english_pob_reading: you bent down the heavens, established the earth, and moved the world
  chosen_spanish_reading: tú inclinaste los cielos, estableciste la tierra y moviste el mundo
  alternative_spanish_readings:
  - tú inclinaste los cielos, sacudiste la tierra y moviste el mundo
  - tú inclinaste los cielos, fijaste la tierra y conmoviste el mundo
  rationale: Conservo la secuencia cósmica tal como queda en la revisión fuente-grounded, sin introducir el verbo ‘sacudir’ que el último pase descartó. La formulación sigue describiendo la manifestación poderosa de Dios en Sinaí con un nivel de literalidad adecuado.
  doctrine_reference: Éxodo 19:18; Salmo 114:4-7
translation_notes:
  revision_awareness: El audit trail muestra una oscilación entre «sacudiste la tierra» y «estableciste la tierra» por una cuestión de transmisión textual; la versión española sigue la revisión más reciente, que restituye «estableciste la tierra». La nota conserva la variante alternativa documentada en el material inglés, pero anclada correctamente en el texto.
  spanish_consistency_notes:
  - Mantengo «tierra» y «mundo» como equivalentes distintos de terram / orbem, respetando la distinción del latín.
  - Uso tratamiento de segunda persona singular («tú») para seguir el verso en voz directa.
  - Conservo un registro bíblico sobrio y moderno, sin arcaísmos innecesarios.
