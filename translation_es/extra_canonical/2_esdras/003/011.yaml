translation:
  language: es
  text: Pero dejaste a uno de ellos, a Noé con su casa; de él vinieron todos los justos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Dereliquisti
  english_pob_choice: But you left
  chosen_spanish: Pero dejaste
  alternatives_spanish:
  - Pero abandonaste
  - Pero reservaste
  lexicon: Latin derelinquere
  rationale: El verbo latino expresa la acción de dejar atrás o no destruir a uno dentro del grupo; «dejaste» reproduce la idea simple y directa de la POB en inglés sin añadir matices no presentes en el texto.
- source_word: unum ex his
  english_pob_choice: one of them
  chosen_spanish: a uno de ellos
  alternatives_spanish:
  - uno de ellos
  - a uno de los tres
  lexicon: Latin unus ex + pronombre anafórico
  rationale: Mantiene la referencia interna al conjunto ya mencionado. La preposición «a» se usa por naturalidad española con objeto personal explícito.
- source_word: id Noe cum domo sua
  english_pob_choice: Noah with his household
  chosen_spanish: a Noé con su casa
  alternatives_spanish:
  - a Noé con su familia
  - a Noé y su casa
  lexicon: Latin cum domo sua
  rationale: «Casa» conserva el valor bíblico de la unidad doméstica o casa-entorno, que es más amplio que «familia». Se mantiene la construcción breve del latino.
- source_word: ex eo
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de él
  - a partir de él
  lexicon: Latin ex + pronombre
  rationale: «De él» es la forma más natural y fiel para expresar origen o procedencia en español; evita una paráfrasis excesiva.
- source_word: iustos omnes
  english_pob_choice: all the righteous
  chosen_spanish: todos los justos
  alternatives_spanish:
  - todos los rectos
  - todos los justos de Dios
  lexicon: Latin iustus
  rationale: «Justos» mantiene el sentido moral/judicial básico del latín y coincide con la elección inglesa. «Rectos» sería posible, pero menos directo en este contexto.
theological_decisions:
- issue: Alcance de «cum domo sua»
  english_pob_reading: Noah with his household
  chosen_spanish_reading: Noé con su casa
  alternative_spanish_readings:
  - Noé con su familia
  - Noé y su casa
  rationale: El texto latino no especifica parentesco biológico; «casa» preserva la amplitud del conjunto preservado con Noé, coherente con el lenguaje bíblico de la casa como unidad doméstica.
  doctrine_reference: Génesis 7:1; Hebreos 11:7
- issue: Procedencia de «todos los justos»
  english_pob_reading: from him came all the righteous
  chosen_spanish_reading: de él vinieron todos los justos
  alternative_spanish_readings:
  - de él procedieron todos los justos
  - de él salieron todos los justos
  rationale: «Vinieron» mantiene la idea de origen sin forzar un matiz genealógico exclusivo. El texto afirma procedencia general de los justos desde Noé, y la traducción conserva esa tensión sin explicarla de más.
  doctrine_reference: Génesis 9:18-19; 1 Pedro 3:20
- issue: Universalidad de «iustos omnes»
  english_pob_reading: all the righteous
  chosen_spanish_reading: todos los justos
  alternative_spanish_readings:
  - todos los rectos
  - todos los justos
  rationale: Se conserva la totalidad explícita («todos») y el término moral («justos») sin suavizarlo ni convertirlo en una categoría más abstracta.
  doctrine_reference: Sabiduría 10:4; Mateo 13:43
translation_notes:
  revision_awareness: Se siguió la lectura latina limpia de Bensly 1895 + Fragmento faltante de Bensly 1875, en armonía con la POB inglesa existente; no se requirieron revisiones posteriores porque el contenido es breve y estable.
  spanish_consistency_notes:
  - Se mantuvo «Dios»/«Yahvé» fuera del verso porque no aparecen en el texto fuente.
  - Se prefirió «justos» sobre alternativas más interpretativas para conservar el paralelismo con el latín iustos.
  - La puntuación usa punto y coma para reflejar la estructura breve de dos miembros del original sin sobrecargar la sintaxis.
