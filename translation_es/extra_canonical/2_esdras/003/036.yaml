    rationale: Es gramatical, pero «naciones no hallarás» reproduce mejor la concisión del original y del inglés auditado.
  - severity: low
    issue: «Por nombre» necesita colocación más natural
    rationale: La expresión misma puede mantenerse, pero insertada tras el verbo o el objeto se entiende mejor como identificación individualizada.
