translation:
  language: es
  text: Ciertamente, hallarás hombres por nombre que han guardado tus mandamientos; pero naciones no hallarás.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: homines
  english_pob_choice: Men
  chosen_spanish: a hombres
  alternatives_spanish:
  - a varones
  - a personas
  lexicon: homines
  rationale: El latín homines designa aquí seres humanos; el POB inglés opta por Men. En español, «hombres» conserva el valor genérico humano y la estructura contrastiva con «naciones», sin forzar un término más interpretativo.
- source_word: quidem
  english_pob_choice: indeed
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - en efecto
  - sin duda
  lexicon: quidem
  rationale: quidem refuerza la afirmación. «Ciertamente» expresa ese matiz enfático de manera natural en español y mantiene la relación discursiva del original.
- source_word: per nomina
  english_pob_choice: by name
  chosen_spanish: por nombre
  alternatives_spanish:
  - por su nombre
  - nominalmente
  lexicon: per + nominativus/ablativus idiom
  rationale: La construcción latina indica identificación individualizada. «Por nombre» sigue de cerca la forma del original y reproduce el énfasis en individuos nombrables; la coma en español ayuda a reflejar la pausa del inglés revisado.
- source_word: mandata tua
  english_pob_choice: your commandments
  chosen_spanish: tus mandamientos
  alternatives_spanish:
  - tus mandatos
  - tus preceptos
  lexicon: mandatum
  rationale: «Mandamientos» es la equivalencia más directa y bíblicamente transparente para mandata en este contexto de obediencia a Dios.
- source_word: gentes
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: gens
  rationale: gentes en plural aquí designa colectividades/naciones, no individuos. «Las naciones» preserva el contraste con «hombres» y coincide con la lectura inglesa auditable.
theological_decisions:
- issue: Contraste entre individuos y colectividades
  english_pob_reading: Men indeed, by name, you may find... but nations you will not find.
  chosen_spanish_reading: Ciertamente, a hombres por nombre hallarás...; pero a las naciones no las hallarás.
  alternative_spanish_readings:
  - Ciertamente, a hombres por su nombre hallarás...
  - En efecto, a hombres por nombre podrás hallar...
  rationale: El versículo contrapone la posibilidad de encontrar personas concretas con la imposibilidad de encontrar a las naciones como tales entre quienes guardan los mandamientos. La redacción española conserva ese contraste sin suavizarlo.
  doctrine_reference: Justicia pactual / universalidad del pecado y la fidelidad individual
translation_notes:
  revision_awareness: El texto fuente latino es breve y estable; la revisión inglesa añadió «indeed» para reflejar quidem y comas para naturalidad. La versión española toma ese mismo énfasis con «Ciertamente» y mantiene la sintaxis de contraste sin añadir interpretación adicional.
  spanish_consistency_notes:
  - Se mantiene «mandamientos» para mandar la conexión bíblica convencional y la literalidad de mandata.
  - Se conserva «naciones» para gentes, porque en español «gentes» podría sonar más genérico o arcaizante y debilitar el contraste retórico.
  - No se introduce «Cristo», «Yahvé» ni otros términos no presentes en el versículo.
