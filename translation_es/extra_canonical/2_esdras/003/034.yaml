    unchanged: false
    changes_summary: Revised the final clause from 'which way the pointer inclines' to 'at what point it inclines' to reflect momentum puncti more closely and avoid adding 'pointer,' which is not in the Latin.
translation:
  language: es
  text: Ahora, pues, pesa nuestras iniquidades en la balanza[a], y las de los habitantes del mundo; y se verá hacia qué punto se inclina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y se verá cuál es el punto hacia el que se inclina».'
    reason: alternative_rendering_of_final_clause
lexical_decisions:
- source_word: nunc ergo
  english_pob_choice: Now therefore
  chosen_spanish: Ahora, pues
  alternatives_spanish:
  - Ahora, entonces
  - Pues ahora
  lexicon: nunc ergo -> ahora, pues
  rationale: La combinación latina introduce una conclusión exhortativa; «Ahora, pues» conserva el valor discursivo sin endurecerlo innecesariamente.
- source_word: pondera
  english_pob_choice: weigh
  chosen_spanish: pesa
  alternatives_spanish:
  - pondera
  - mide
  lexicon: pondero -> pesar, poner en la balanza
  rationale: «Pesa» es natural en español y mantiene la imagen concreta de someter a peso/valoración, acorde con la balanza del contexto.
- source_word: in statera
  english_pob_choice: in the balance
  chosen_spanish: en la balanza
  alternatives_spanish:
  - en la báscula
  - en el balancín
  lexicon: statera -> balanza
  rationale: «Balanza» reproduce el instrumento de medida y juicio con claridad y registro digno.
- source_word: nostras iniquitates
  english_pob_choice: our iniquities
  chosen_spanish: nuestras iniquidades
  alternatives_spanish:
  - nuestras injusticias
  - nuestros pecados
  lexicon: iniquitas -> iniquidad
  rationale: «Iniquidades» conserva el sustantivo fuerte del latín y evita diluir el término en una generalización más suave.
- source_word: eorum qui habitant in saeculo
  english_pob_choice: those of the inhabitants of the world
  chosen_spanish: las de los habitantes del mundo
  alternatives_spanish:
  - las de quienes habitan en el siglo
  - las de los moradores del mundo
  lexicon: saeculum -> mundo / este mundo
  rationale: Aquí el sentido de saeculum es el orden del mundo presente; «mundo» es más natural en español que «siglo» y mantiene la amplitud del contraste.
- source_word: invenietur
  english_pob_choice: it will be found
  chosen_spanish: se verá
  alternatives_spanish:
  - se hallará
  - se encontrará
  lexicon: invenio -> encontrar, resultar, ponerse de manifiesto
  rationale: El latín expresa el resultado de la prueba; «se verá» comunica bien la idea de que el desenlace quedará manifiesto, sin añadir un sujeto técnico.
- source_word: momentum puncti
  english_pob_choice: at what point it inclines / the point where it inclines
  chosen_spanish: en qué punto se inclina
  alternatives_spanish:
  - hacia qué punto se inclina
  - dónde se inclina
  lexicon: momentum/punctum -> punto, punto de apoyo, momento; declino -> inclinarse
  rationale: La revisión del audit trail advierte contra forzar «puncti» como ‘puntero’; en español, «en qué punto se inclina» preserva la idea de localización del punto de inclinación sin añadir un lexema inexistente en el latín.
theological_decisions:
- issue: Imagen de juicio ponderado mediante balanza
  english_pob_reading: weigh our iniquities in the balance
  chosen_spanish_reading: pesa nuestras iniquidades en la balanza
  alternative_spanish_readings:
  - pon nuestras iniquidades en la balanza
  - sopesa nuestras iniquidades en la balanza
  rationale: La frase conserva la metáfora judicial de ponderación moral. «Pesa» mantiene la fuerza del acto evaluador sin reescribir la imagen.
  doctrine_reference: Sabiduría/juicio divino mediante balanza; lenguaje de evaluación moral
- issue: Sentido de saeculum
  english_pob_reading: inhabitants of the world
  chosen_spanish_reading: habitantes del mundo
  alternative_spanish_readings:
  - habitantes de este mundo
  - moradores del mundo
  rationale: Se eligió «mundo» porque el latín aquí apunta al ámbito humano presente; «siglo» podría sonar arcaizante y menos claro para lectores actuales, aunque sigue siendo una posible equivalencia contextual.
  doctrine_reference: Distinción entre el orden presente del mundo y realidades eternas
translation_notes:
  revision_awareness: 'El audit trail inglés muestra dos ajustes sobre la cláusula final: primero se corrigió una lectura que entendía momentum puncti como ‘at the point where it inclines’, y luego se volvió a una formulación cercana a esa idea, pero evitando introducir ‘pointer’. La versión española sigue esa cautela: no introduce ‘puntero’ y conserva una construcción abierta con «en qué punto se inclina».'
  spanish_consistency_notes:
  - Mantengo «balanza» para statera por coherencia con el campo semántico de juicio/peso.
  - Uso «iniquidades» para preservar el registro moral fuerte del latín.
  - Evito «SEÑOR» u otros equivalentes no presentes en el texto fuente; aquí no aparece el nombre divino.
  - La nota ofrece una alternativa interpretativa sin forzar una precisión técnica ausente del latín.
