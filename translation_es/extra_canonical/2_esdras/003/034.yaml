revisions:
- from: Ahora, pues, pesa nuestras iniquidades en la balanza[a], y las de los habitantes del mundo; y se verá en qué punto se inclina.
  to: Ahora, pues, pesa nuestras iniquidades en la balanza[a], y las de los habitantes del mundo; y se verá hacia qué punto se inclina.
  rationale: Se ajusta únicamente la cláusula final para expresar con mejor español el resultado de la pesada implícito en «momentum puncti ubi declinet». «Hacia qué punto se inclina» conserva la imagen del punto de inclinación sin introducir un «puntero» inexistente en el latín y evita la torpeza de «en qué punto se inclina».
