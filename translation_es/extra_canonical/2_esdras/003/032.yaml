translation:
  language: es
  text: ¿O alguna otra nación te ha conocido fuera de Israel? ¿O qué tribus han creído las alianzas como este Jacob?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿O qué tribus han creído las alianzas como estas tribus de Jacob?»'
    reason: alternative_rendering_preserved_from_audit_trail
lexical_decisions:
- source_word: aut alia gens cognovit te praeter Israhel
  english_pob_choice: Or has any other nation known you besides Israel?
  chosen_spanish: ¿O acaso alguna otra nación te ha conocido fuera de Israel?
  alternatives_spanish:
  - ¿O alguna otra nación te ha conocido además de Israel?
  - ¿O ha habido alguna otra nación que te haya conocido, fuera de Israel?
  lexicon: gens -> nación; cognovit -> ha conocido; praeter -> fuera de / además de
  rationale: El latín no trae una interrogativa explícita para 'alia gens'; por eso 'alguna otra nación' o 'alguna otra nación' mantiene mejor el valor de 'any other'. 'Fuera de Israel' expresa con naturalidad el valor de 'praeter Israhel' sin convertirlo en paráfrasis.
- source_word: aut quae tribus crediderunt testamentis
  english_pob_choice: Or what tribes have believed the covenants
  chosen_spanish: ¿O qué tribus han creído las alianzas
  alternatives_spanish:
  - ¿O qué tribus han creído los pactos
  - ¿O qué tribus han dado fe a las alianzas
  lexicon: tribus -> tribus; crediderunt -> han creído; testamentis -> alianzas / pactos
  rationale: Se conserva 'tribus' literalmente. 'crediderunt' se traduce con 'han creído' para mantener la fuerza de fe/creencia del texto, como en la auditoría inglesa. 'testamentis' se vierte como 'alianzas' porque el latín puede designar pactos o covenants; en español 'alianzas' conserva el sentido pactal sin cargar de antemano con el tecnicismo eclesial de 'pactos'.
- source_word: sicut haec Iacob
  english_pob_choice: like this Jacob
  chosen_spanish: como estos de Jacob
  alternatives_spanish:
  - como este Jacob
  - como estas [tribus] de Jacob
  - como éste de Jacob
  lexicon: sicut -> como; haec -> estos / estas; Iacob -> Jacob
  rationale: 'La revisión textual indica que ''haec'' no modifica a ''Iacob'' como masculino, sino que funciona con valor plural/femenino de late Latin, retomando ''tribus''. Por eso el español debe reflejar una referencia plural: ''estos de Jacob''. Se evita ''este Jacob'', que no corresponde bien al latín revisado.'
theological_decisions:
- issue: Reproducir el lenguaje de pacto sin neutralizar su peso bíblico
  english_pob_reading: the covenants
  chosen_spanish_reading: las alianzas
  alternative_spanish_readings:
  - los pactos
  - las alianzas pactales
  rationale: El texto contrapone naciones y tribus respecto de la fidelidad al pacto. 'Alianzas' comunica ese marco sin borrar el carácter covenantal; 'pactos' también sería posible, pero 'alianzas' mantiene mejor la resonancia bíblica en español sin forzar terminología eclesiástica.
  doctrine_reference: Teología bíblica del pacto
- issue: Mantener la referencia colectiva final conforme a la revisión latina
  english_pob_reading: like these tribes of Jacob
  chosen_spanish_reading: como estos de Jacob
  alternative_spanish_readings:
  - como estas tribus de Jacob
  - como los de Jacob
  rationale: La auditoría latina corrigió la lectura anterior para evitar que 'haec' se entendiera como modificando a Jacob. En español, la referencia queda mejor como elíptica colectiva ('estos de Jacob'), preservando la tensión entre la forma breve del latín y su referente real.
  doctrine_reference: Crítica textual y gramática histórica del latín
translation_notes:
  revision_awareness: La versión española sigue la revisión tardía que corrige la antigua lectura inglesa 'like this Jacob' y el valor de 'praeter' como exclusión/comparación ('fuera de / además de'). También evita hacer de 'haec' un modificador masculino de Jacob; se refleja como referencia colectiva elíptica a los elementos de Jacob.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exija explícitamente; aquí no aparece el tetragrámaton.
  - Se mantiene 'alianzas' para 'testamentis' siguiendo el marco de pacto del pasaje.
  - Se conserva 'Jacob' como forma bíblica estándar en español, no 'Jacobo'.
