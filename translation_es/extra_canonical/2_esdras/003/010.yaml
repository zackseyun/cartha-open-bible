base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/003/010.yaml
  text: 'And one fate came upon them all: as death came to Adam, so the flood came to these also.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:26Z'
    unchanged: false
    changes_summary: 'Revised for closer lexical correspondence to the Latin: changed ''the same fate'' to ''one fate,'' retained ''came upon them all'' for natural English, and rendered ''his'' more explicitly as ''these also'' to reflect the contrast in the source.'
translation:
  language: es
  text: 'Y aconteció que un mismo destino les sobrevino a todos: como la muerte vino a Adán, así también el diluvio les sobrevino a estos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et factum est
  english_pob_choice: And
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y fue
  lexicon: Latin factum est
  rationale: ‘Aconteció’ conserva el valor narrativo solemne de la fórmula sin volverla rígidamente literal; mantiene el arranque enlazado del texto y es idiomático en español bíblico actual.
- source_word: in uno casus
  english_pob_choice: one fate
  chosen_spanish: una sola suerte
  alternatives_spanish:
  - un solo destino
  - una sola desgracia
  - una suerte
  lexicon: Latin casus
  rationale: ‘Casus’ aquí expresa un evento o suerte común. ‘Suerte’ conserva la idea de destino/caso compartido, y ‘una sola’ refleja la unidad marcada por el latín y por el ajuste del inglés POB a ‘one fate’.
- source_word: corum
  english_pob_choice: them all / these also
  chosen_spanish: ellos / estos
  alternatives_spanish:
  - a todos ellos
  - a estos también
  lexicon: Latin pronoun
  rationale: El latín contrasta el grupo humano con ‘estos’ al final de la cláusula. En español, ‘sobre todos ellos’ mantiene el alcance universal, y ‘estos’ preserva el deíctico final del texto fuente.
- source_word: sicut Adac mors
  english_pob_choice: as death came to Adam
  chosen_spanish: como la muerte vino a Adán
  alternatives_spanish:
  - así como la muerte vino a Adán
  - como le vino la muerte a Adán
  lexicon: Latin sicut + mors
  rationale: Se conserva la comparación explícita con Adán y se evita suavizar ‘mors’ a una formulación menos directa. ‘Vino a Adán’ sigue el movimiento del latín y del inglés POB.
- source_word: sic et his diluuium
  english_pob_choice: so the flood came to these also
  chosen_spanish: así también el diluvio vino sobre estos
  alternatives_spanish:
  - así también el diluvio vino a estos
  - de igual modo el diluvio vino sobre estos también
  lexicon: Latin diluuium
  rationale: ‘Diluvio’ reproduce el término común y bíblico. ‘Vino sobre’ mantiene la fuerza de irrupción sobre las personas, y ‘estos’ conserva la referencia contrastiva del latín/inglés.
theological_decisions:
- issue: Paralelismo entre la muerte de Adán y el diluvio sobre ‘estos’
  english_pob_reading: as death came to Adam, so the flood came to these also
  chosen_spanish_reading: como la muerte vino a Adán, así también el diluvio vino sobre estos
  alternative_spanish_readings:
  - como la muerte vino a Adán, así el diluvio vino a estos también
  - como le vino la muerte a Adán, así vino el diluvio a estos
  rationale: Se conserva el paralelismo histórico-teológico entre el juicio sobre la humanidad en Adán y el juicio del diluvio sobre el grupo referido. La redacción evita interpretar más allá del contraste presente en el texto.
  doctrine_reference: tipología bíblica / juicio divino en la historia
translation_notes:
  revision_awareness: El inglés POB fue revisado desde ‘the same fate came upon them all’ a ‘one fate came upon them all’ para acercarse mejor al latín ‘in uno casus’. La versión española sigue esa corrección con ‘una sola suerte’. También refleja el ajuste final de ‘his’ a ‘these also’ mediante ‘estos’ y no una referencia más genérica.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y moderno, sin recurrir a ‘SEÑOR’ u otras sustituciones no presentes en el texto.
  - ‘Suerte’ se eligió por su capacidad de abarcar ‘casus’ sin imponer de antemano una lectura de destino filosófico; el contexto narrativo decide su alcance.
  - No se añadieron notas al pie porque el texto latino es breve y no introduce variantes textuales o semánticas que requieran observación adicional en español.
