base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/003/013.yaml
  text: And it happened, when they were committing iniquity before you, you chose for yourself one from among them,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:26Z'
    unchanged: false
    changes_summary: Removed 'man' because the Latin has only 'unum' ('one'), not 'one man'. Kept the rest essentially unchanged for accuracy and formal register.
translation:
  language: es
  text: Y sucedió que, cuando cometían iniquidad delante de ti, escogiste para ti uno de entre ellos,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: factum est
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció que
  - Y ocurrió que
  lexicon: Latin factum est
  rationale: La fórmula narrativa latina pide un giro natural en español. «Y sucedió que» conserva el valor de transición narrativa sin sonar arcaico ni mecánico.
- source_word: cum
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al cuando
  - mientras
  lexicon: Latin cum
  rationale: Aquí introduce una acción simultánea o temporal; «cuando» reproduce el sentido de forma directa y natural.
- source_word: iniquitatem facere
  english_pob_choice: were committing iniquity
  chosen_spanish: cometían iniquidad
  alternatives_spanish:
  - hacían iniquidad
  - obraban maldad
  lexicon: Latin iniquitatem facere
  rationale: La expresión latina tiene un valor moral fuerte y repetitivo; «cometían iniquidad» mantiene la fuerza jurídica/moral que la POB refleja con «committing iniquity».
- source_word: coram te
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: Latin coram te
  rationale: «Delante de ti» es una forma clara y reverente en español para la presencia inmediata de Dios, sin perder el matiz relacional y de testigo implícito.
- source_word: elegisti tibi
  english_pob_choice: you chose for yourself
  chosen_spanish: escogiste para ti
  alternatives_spanish:
  - eligiste para ti
  - te escogiste
  lexicon: Latin eligere + reflexive dative
  rationale: «Escogiste para ti» conserva el dativo reflexivo latino y el matiz de elección intencional, sin añadir interpretación.
- source_word: unum
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - uno solo
  - una persona
  lexicon: Latin unus/unum
  rationale: El texto latino solo dice «unum»; por eso se mantiene «uno» sin introducir «hombre» o «persona». La decisión sigue la revisión inglesa que eliminó «man» por falta de apoyo textual.
- source_word: ex his
  english_pob_choice: from among them
  chosen_spanish: de entre ellos
  alternatives_spanish:
  - entre ellos
  - de entre los suyos
  lexicon: Latin ex + pronoun
  rationale: «De entre ellos» expresa bien la selección hecha desde un grupo, de forma fiel y idiomática en español.
theological_decisions:
- issue: Selección divina en medio de la iniquidad humana
  english_pob_reading: you chose for yourself one from among them
  chosen_spanish_reading: escogiste para ti uno de entre ellos
  alternative_spanish_readings:
  - te escogiste uno de entre ellos
  - escogiste uno de entre ellos para ti
  rationale: 'Conservé la elección divina como acto deliberado de Dios sin añadir el sustantivo «hombre». La frase mantiene la tensión: la elección ocurre dentro de un contexto de iniquidad generalizada.'
  doctrine_reference: Elección divina / soberanía de Dios
translation_notes:
  revision_awareness: La revisión inglesa reciente retiró «man» porque el latín solo contiene «unum». La versión española sigue esa decisión y evita introducir un sustantivo que no está en el original. No se añadieron notas textuales porque no hay variantes relevantes en el material provisto.
  spanish_consistency_notes:
  - Se mantuvo el registro reverente y narrativo adecuado para un texto extra-canónico de corte bíblico.
  - No se usó «SEÑOR» como sustituto, porque el pasaje no contiene el Tetragrámaton ni una cita explícita del nombre divino.
  - Se evitó «Cristo», «siervo» y otros términos no pertinentes al versículo.
  - La puntuación reproduce una sola cláusula continua, coherente con el fragmento latino provisto.
