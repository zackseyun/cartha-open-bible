translation:
  language: es
  text: porque vi la desolación de Sión y la abundancia de los que habitaban en Babilonia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: desertionem
  english_pob_choice: desolation
  chosen_spanish: desolación
  alternatives_spanish:
  - desierto
  - abandono
  - despoblación
  lexicon: desertio
  rationale: El latín desertionem en este contexto expresa ruina, abandono y devastación de Sión; «desolación» reproduce bien ese campo semántico en español bíblico sin forzar una lectura técnica distinta.
- source_word: Sion
  english_pob_choice: Zion
  chosen_spanish: Sión
  alternatives_spanish:
  - Zion
  lexicon: Sion
  rationale: La forma española estable y reconocible para el topónimo bíblico es «Sión».
- source_word: habundantiam
  english_pob_choice: abundance
  chosen_spanish: abundancia
  alternatives_spanish:
  - multitud
  - gran número
  - plenitud
  lexicon: abundantia
  rationale: El sustantivo latino apunta a abundancia en sentido cuantitativo; «abundancia» conserva la correspondencia directa con el texto fuente y con la lectura auditada en inglés.
- source_word: corum qui habitabant
  english_pob_choice: those who lived
  chosen_spanish: los que habitaban
  alternatives_spanish:
  - los que vivían
  - los habitantes
  lexicon: habitare
  rationale: «Habitaban» mantiene el valor participial e iterativo del latín, además de conservar el registro bíblico sin convertirlo en una paráfrasis más libre.
- source_word: Babilone
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babilón
  lexicon: Babylonia
  rationale: «Babilonia» es la forma española normal y transparente del topónimo; se evita una transliteración menos habitual.
theological_decisions:
- issue: Tensión entre «desolación» de Sión y la «abundancia» en Babilonia
  english_pob_reading: because I saw the desolation of Zion and the abundance of those who lived in Babylon.
  chosen_spanish_reading: porque vi la desolación de Sión y la abundancia de los que habitaban en Babilonia.
  alternative_spanish_readings:
  - porque vi la ruina de Sión y la prosperidad de los que habitaban en Babilonia
  - porque vi la devastación de Sión y la multitud de los que vivían en Babilonia
  rationale: Se conserva la oposición retórica entre la ruina de Sión y la prosperidad/abundancia de Babilonia sin resolverla interpretativamente. «Abundancia» mantiene la ambigüedad del original, que puede sugerir tanto prosperidad material como gran número de habitantes.
  doctrine_reference: Lamentación histórica y contraste entre Sión y Babilonia en la literatura bíblica
- issue: Valor de la preposición causal implícita en el latín Quoniam
  english_pob_reading: because
  chosen_spanish_reading: porque
  alternative_spanish_readings:
  - pues
  - ya que
  rationale: «Porque» expresa de forma natural la relación causal que introduce la cláusula y coincide con la auditable elección inglesa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el texto se mantiene con alta concordancia con el testimonio latino limpio y la traducción inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y directo.
  - Se conserva la correspondencia semántica con el latín sin introducir explicaciones interpretativas ajenas al versículo.
  - No se añaden notas porque el verso no presenta variantes textuales ni ambigüedades doctrinales que exijan aclaración en esta unidad.
