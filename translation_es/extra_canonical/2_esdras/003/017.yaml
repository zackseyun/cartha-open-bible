lexical_decisions:
- source_word: in multitudine magna
  english_pob_choice: in a great multitude
  chosen_spanish: en una gran multitud
  alternatives_spanish:
  - en muchedumbre grande
  - en gran multitud
  lexicon: multitudo
  rationale: El latín expresa cantidad y amplitud con 'multitudine magna'; 'en una gran multitud' conserva ese sentido de número abundante con español natural y digno.
- source_word: Et factum est
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: factum est
  rationale: La fórmula narrativa se vierte de manera tradicional y clara; 'aconteció' mantiene el valor semicircunstancial de apertura de relato sin perder solemnidad.
- source_word: cum educeres
  english_pob_choice: when you led
  chosen_spanish: cuando sacaste
  alternatives_spanish:
  - cuando conducías
  - cuando llevaste
  lexicon: educere
  rationale: '''Educeres'' en este contexto remite a sacar o hacer salir a un pueblo/descendencia; ''sacaste'' conserva el movimiento de salida y evita un calco rígido.'
- source_word: semen
  english_pob_choice: the seed
  chosen_spanish: la descendencia
  alternatives_spanish:
  - la semilla
  - la prole
  lexicon: semen
  rationale: Aunque 'semen' literalmente puede ser 'semilla', en contexto histórico-covenantal español 'descendencia' comunica mejor el referente colectivo humano y evita una lectura botánica impropia.
theological_decisions:
- issue: Referencia del 'seed' en contexto de tradición de Éxodo
  english_pob_reading: when you led the seed out
  chosen_spanish_reading: cuando sacaste la descendencia
  alternative_spanish_readings:
  - cuando sacaste la semilla
  - cuando sacaste a la descendencia
  rationale: El fragmento latino, según el corte provisto, no añade 'de Egipto' ni 'al monte Sinaí'; por eso se mantiene solo la cláusula recibida. 'Descendencia' preserva el matiz corporativo y genealógico sin introducir detalles ausentes en este segmento.
  doctrine_reference: Memoria del éxodo y de la elección/custodia del pueblo
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente que restringe el texto al fragmento latino provisto: se restauró el inicio ''en una gran multitud'', se mantuvo la cláusula temporal con verbo principal en perfecto, y se omitieron adiciones no presentes en este segmento (''de Egipto'', ''al monte Sinaí'').'
  spanish_consistency_notes:
  - Se evitó 'Señor' y 'Cristo' porque no aparecen en este fragmento.
  - Se conservó la estructura narrativa breve y apodótica del latín con una solución española legible.
  - La nota a recoge la lectura alternativa documentada por la tradición inglesa, pero delimitada al alcance del fragmento proporcionado.
