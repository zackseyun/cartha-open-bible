- from: Así, la debilidad se volvió permanente, y la ley estaba en el corazón del pueblo con la raíz mala; y lo que era bueno se apartó, y lo que era malo permaneció.
  to: Así, la debilidad se volvió permanente, y la ley estaba en el corazón del pueblo con la raíz maligna; y lo que era bueno se fue, y lo que era malo permaneció.
  rationale: Se ajusta 'raíz mala' a 'raíz maligna' para representar mejor malignitate y el inglés auditado 'evil root'. También se cambia 'se apartó' por 'se fue' para una expresión más natural del sentido de discessit en este contexto, sin alterar el contenido. No se requieren notas.
