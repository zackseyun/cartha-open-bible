reference: 2 Esdras 3:22
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: sunt. Et facta est permanens infirmitas, et lex in corde populi cum malignitate radicis, et discessit quod bonum est, et mansit
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/003/022.yaml
  text: Thus weakness became permanent, and the law was in the heart of the people with the evil root; and what was good departed, and what was evil remained.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:27Z'
    unchanged: false
    changes_summary: Removed the article before 'weakness' for closer alignment with the Latin, changed 'along with' to the more formal 'with,' and supplied 'what was' before 'evil' for balance and completeness with the preceding clause.
translation:
  language: es
  text: Así, la debilidad se volvió permanente, y la ley estaba en el corazón del pueblo con la raíz maligna; y lo que era bueno se fue, y lo que era malo permaneció.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: sunt. / facta est permanens infirmitas
  english_pob_choice: Thus weakness became permanent
  chosen_spanish: Así, la debilidad se volvió permanente
  alternatives_spanish:
  - Así, la debilidad quedó permanente
  - Así, la debilidad se hizo permanente
  lexicon: infirmitas → debilidad; permanens → permanente
  rationale: La cláusula latina expresa el establecimiento duradero de la debilidad; 'se volvió permanente' conserva la idea de cambio de estado y la permanencia resultante sin añadir matices ajenos.
- source_word: lex
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la ley divina
  - la norma
  lexicon: lex → ley
  rationale: '''Ley'' es la correspondencia directa y mantiene el valor jurídico-covenantal del término en español sin amplificarlo.'
- source_word: in corde populi
  english_pob_choice: in the heart of the people
  chosen_spanish: en el corazón del pueblo
  alternatives_spanish:
  - en el corazón del pueblo
  - en el interior del pueblo
  lexicon: cor → corazón; populus → pueblo
  rationale: '''Corazón'' es la traducción natural y tradicional para el centro interior de la voluntad/pensamiento, y ''pueblo'' conserva el sujeto colectivo.'
- source_word: cum malignitate radicis
  english_pob_choice: with the evil root
  chosen_spanish: con la raíz mala
  alternatives_spanish:
  - con la raíz maligna
  - junto con la raíz mala
  lexicon: malignitas / malignus → mala, maligna; radix → raíz
  rationale: La construcción latina es compacta y ambigua en su fuerza adjetival; 'raíz mala' sigue de cerca el sentido general de maldad inherente sin cargar el texto con una personificación más fuerte de la que exige el latín.
- source_word: discessit quod bonum est
  english_pob_choice: what was good departed
  chosen_spanish: lo que era bueno se apartó
  alternatives_spanish:
  - lo bueno se apartó
  - lo que es bueno se apartó
  lexicon: discedere → apartarse; bonum → bueno
  rationale: '''Se apartó'' reproduce el movimiento de alejamiento de ''discessit''. Mantener ''lo que era bueno'' refleja la referencia de estado pasada que el inglés POB explicitó con ''was'' para balance y precisión.'
- source_word: mansit
  english_pob_choice: what was evil remained
  chosen_spanish: lo que era malo permaneció
  alternatives_spanish:
  - lo malo permaneció
  - lo que era evil permaneció
  lexicon: manere → permanecer; malum → malo
  rationale: '''Permaneció'' traduce exactamente ''mansit''. ''Lo que era malo'' conserva la simetría con la cláusula anterior y sigue la revisión inglesa que añadió ''what was'' por equilibrio y completitud.'
theological_decisions:
- issue: Relación entre 'la ley' y 'la raíz mala' en el corazón del pueblo
  english_pob_reading: the law was in the heart of the people with the evil root
  chosen_spanish_reading: la ley estaba en el corazón del pueblo con la raíz mala
  alternative_spanish_readings:
  - la ley estaba en el corazón del pueblo junto con la raíz mala
  - la ley estaba en el corazón del pueblo, junto con la raíz mala
  rationale: La frase latina permite la coexistencia de la ley con la raíz mala; el español conserva esa tensión sin resolverla. No se interpreta como aprobación moral, sino como una coexistencia corrupta dentro del pueblo.
  doctrine_reference: Condición moral del pueblo / corrupción interior
- issue: Paralelismo final entre el bien que se aparta y el mal que permanece
  english_pob_reading: what was good departed, and what was evil remained
  chosen_spanish_reading: lo que era bueno se apartó, y lo que era malo permaneció
  alternative_spanish_readings:
  - lo bueno se apartó, y lo malo permaneció
  rationale: Se mantiene el contraste moral y la simetría sintáctica del texto fuente. 'Era bueno' y 'era malo' hacen explícito el estado previo/identidad del sujeto implícito, siguiendo la estabilización semántica del POB inglés.
  doctrine_reference: Contraste moral / persistencia del mal
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente: elimina cualquier artículo innecesario antes de ''debilidad'', usa ''con'' para la coexistencia con la raíz mala, y explicita el paralelismo ''lo que era ...'' / ''lo que era ...'' para reflejar la completitud establecida en el pasaje auditado.'
  spanish_consistency_notes:
  - Se mantiene 'ley' y no 'torá' porque el latín 'lex' no exige transliteración.
  - '''Debilidad'' se prefirió sobre ''infirmidad'' por claridad actual en español, sin perder el sentido físico/moral del latín.'
  - Se evitó 'maligno' para no introducir connotaciones demonológicas no garantizadas por el contexto; 'mala' conserva la ambigüedad de maldad/condición mala.
