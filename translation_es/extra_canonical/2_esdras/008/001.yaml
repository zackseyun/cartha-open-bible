translation:
  language: es
  text: 'Y él me respondió y dijo[a]: «El Altísimo hizo esta era para muchos, pero la venidera para pocos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta era presente».
    reason: alternative_reading
lexical_decisions:
- source_word: hoc saeculum
  english_pob_choice: this age
  chosen_spanish: esta era
  alternatives_spanish:
  - este siglo
  - este tiempo presente
  lexicon: saeculum
  rationale: El latín dice literalmente "este siglo/era"; "esta era" conserva el contraste con "la venidera" y evita introducir "presente" sin base en este versículo. "Siglo" podría sonar más técnico o eclesiástico en español moderno.
- source_word: futurum
  english_pob_choice: the age to come
  chosen_spanish: la venidera
  alternatives_spanish:
  - la era venidera
  - la edad futura
  - la venidera era
  lexicon: future age
  rationale: El latín contrapone una realidad futura a "hoc saeculum" sin repetir "saeculum". "La venidera" mantiene la economía del original y la oposición temporal; se entiende naturalmente como sustantivo elíptico en español bíblico.
- source_word: Altissimus
  english_pob_choice: The Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Altísimo Dios
  lexicon: Altissimus
  rationale: '"Altísimo" es el equivalente idiomático directo de "Most High" y preserva el título divino tradicional sin añadir elementos ausentes del latín.'
theological_decisions:
- issue: Distinción entre "esta era" y "la venidera"
  english_pob_reading: The Most High made this age for many, but the age to come for few.
  chosen_spanish_reading: El Altísimo hizo esta era para muchos, pero la venidera para pocos.
  alternative_spanish_readings:
  - El Altísimo hizo este siglo para muchos, pero el siglo venidero para pocos.
  - El Altísimo hizo esta era para muchos, pero la era por venir para pocos.
  rationale: Se conserva la antítesis escatológica del texto latino sin armonizarla con otros versículos donde aparece otro vocabulario. La traducción mantiene que el contraste es entre dos órdenes/eras, no entre simple actualidad y futuro abstracto.
  doctrine_reference: 4 Esdras 8:1; distinción lexical mantenida según el latín de esta perícopa.
translation_notes:
  revision_awareness: 'El inglés auditado fue revisado para reflejar con exactitud la distinción del latín: aquí aparece solo hoc saeculum, sin equivalente de "present"; por eso la versión española evita introducir "presente" y sigue esa distinción lexical.'
  spanish_consistency_notes:
  - Se evitó "SEÑOR" para el título divino, siguiendo el texto fuente que dice "Altissimus".
  - Se prefirió "era" a "siglo" porque en español comunica mejor el contraste escatológico sin perder fidelidad.
  - La nota alternativa se limita a una posible explicitación de "esta era presente" para reflejar la opción interpretativa, no para afirmar un término del original.
