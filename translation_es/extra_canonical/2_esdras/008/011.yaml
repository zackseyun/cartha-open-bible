base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/008/011.yaml
  text: from the breasts[a], milk is provided, the fruit of the breasts, so that what has been formed may be nourished for a certain time, and afterward you direct him by your mercy. You nourished him in your righteousness and instructed him in your law and corrected him by your understanding,
  footnotes:
