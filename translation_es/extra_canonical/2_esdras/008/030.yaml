translation:
  language: es
  text: No te indignes con los que son peores que las bestias.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Neque indigneris
  english_pob_choice: Do not be angry
  chosen_spanish: No te enfurezcas
  alternatives_spanish:
  - No te enojes
  - No te irrites
  lexicon: indignor
  rationale: El latín exhorta a no dejarse llevar por la indignación o el enojo. «Enfurecerse» comunica bien la fuerza afectiva del mandato sin añadir una paráfrasis mayor que la del original.
- source_word: eis
  english_pob_choice: with those
  chosen_spanish: contra los que
  alternatives_spanish:
  - con los que
  - por los que
  lexicon: is
  rationale: Aunque el latín no repite una preposición explícita en esta forma breve, el sentido de la amonestación es el de no airarse hacia esas personas. En español, «contra» da una relación natural y clara de hostilidad/enojo.
- source_word: qui bestiis peius sunt
  english_pob_choice: those who are worse than beasts
  chosen_spanish: los que son peores que las bestias
  alternatives_spanish:
  - los que son más malos que las bestias
  - los que están peor que las bestias
  lexicon: qui + peius + bestiae
  rationale: Se conserva la comparación brutal del latín sin suavizarla. «Peores que las bestias» es directo, idiomático y mantiene el tono degradante del texto.
theological_decisions:
- issue: Posible matiz judicial de iudicati / «have been judged» en la tradición inglesa previa
  english_pob_reading: Or 'have been judged'.
  chosen_spanish_reading: No se expresa en el texto principal; se deja fuera por la revisión más reciente del latín.
  alternative_spanish_readings:
  - 'O: ''han sido juzgados'''
  - 'O: ''son considerados'''
  rationale: La revisión de 2026-04-22 aclara que la frase latina describe un estado estimativo, pero la versión latina suministrada para este versículo en el paquete actual no contiene explícitamente iudicati. Por fidelidad al texto fuente efectivo, no se incorpora esa glosa al cuerpo principal.
  doctrine_reference: Principio de transparencia textual y prioridad del testimonio fuente inmediato
translation_notes:
  revision_awareness: La revisión más reciente eliminó el material no presente en el latín proporcionado y redujo el contenido al mandato breve. La traducción española sigue ese recorte y evita añadir la cláusula secundaria sobre amar a los que confiaron en la gloria, ya descartada por el pass más reciente.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y admonitorio del texto.
  - No se usa «SEÑOR» ni vocabulario eclesiástico añadido porque no aparecen en el latín de esta línea.
  - La comparación con «bestias» se conserva literal por su fuerza retórica.
