review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien el sentido principal del latín conservado: una prohibición de airarse contra personas descritas como peores que las bestias. Sin embargo, «enfurecerse» intensifica innecesariamente el matiz de indigneris, y «contra» introduce una hostilidad más marcada que no es necesaria en español para reflejar el dativo eis.'
  spanish_quality_summary: 'El texto es claro y natural, pero puede mejorarse con una formulación más fiel y más idiomática en registro bíblico digno: «No te indignes con...» o «No te enojes con...». «Bestias» funciona bien aquí.'
  glossary_alignment: No hay términos del glosario mayor implicados. La decisión clave es indigneris → «te indignes», que preserva mejor el valor léxico latino que «te enfurezcas». No se requieren notas; la nota inglesa sobre «have been judged» no corresponde al texto fuente inmediato suministrado y fue correctamente excluida del cuerpo del texto.
  issues:
  - severity: medium
    issue: «No te enfurezcas» sobrerrepresenta indigneris
    rationale: Indignor expresa indignación/enojo, no necesariamente furia. «Enfurecerse» añade intensidad emocional no exigida por el latín ni por el English POB actual («Do not be angry»).
  - severity: low
    issue: «contra los que» es menos fiel que «con los que»
    rationale: 'El latín eis se refleja mejor con una construcción española de enojo dirigida a personas: «con los que». «Contra» sugiere oposición activa, un matiz adicional no requerido.'
  revised_spanish_text: No te indignes con los que son peores que las bestias.
  revision_rationale: Se ajusta «indigneris» a «te indignes» para conservar el valor léxico del latín sin intensificación excesiva, y se cambia «contra» por «con» para una relación más natural y fiel con eis. El resto del versículo está bien representado y no requiere nota.
