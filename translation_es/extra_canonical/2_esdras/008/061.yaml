translation:
  language: es
  text: He mostrado estas cosas a todos, pero a ti y a unos pocos como tú. Y—
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: omnibus demonstraui
  english_pob_choice: I have shown these things to all
  chosen_spanish: He mostrado estas cosas a todos
  alternatives_spanish:
  - Les he mostrado estas cosas a todos
  - He dado a conocer estas cosas a todos
  lexicon: Latin demonstrare
  rationale: «Demostraui» aquí significa comunicar o poner de manifiesto; en español, «he mostrado» conserva el valor de haber dado a conocer algo previamente revelado. «Estas cosas» mantiene el plural implícito en el contexto auditable del inglés POB.
- source_word: nisi tibi et tibi similibus paucis
  english_pob_choice: but to you and to a few like you
  chosen_spanish: pero a ti y a unos pocos como tú
  alternatives_spanish:
  - sino a ti y a unos pocos como tú
  - pero a ti y a unos pocos semejantes a ti
  lexicon: Latin nisi...et
  rationale: «Nisi» introduce exclusión restrictiva; el español puede expresarlo con «pero» en contraste discursivo o con «sino». Se eligió «pero» para conservar el flujo de la frase y la referencia directa a los destinatarios, mientras «unos pocos como tú» reproduce «paucis» sin añadir un matiz doctrinal.
theological_decisions:
- issue: Destino restringido de la revelación
  english_pob_reading: I have shown these things to all, but to you and to a few like you.
  chosen_spanish_reading: He mostrado estas cosas a todos, pero a ti y a unos pocos como tú.
  alternative_spanish_readings:
  - He mostrado estas cosas a todos, sino a ti y a unos pocos como tú.
  - He mostrado estas cosas a todos, pero solo a ti y a unos pocos como tú.
  rationale: El texto latino conserva una tensión entre universalidad («omnibus») y restricción («nisi tibi et tibi similibus paucis»). La redacción española mantiene esa tensión sin resolverla en una generalización ni añadir «solo» donde el latín no lo exige explícitamente.
  doctrine_reference: Revelación particular en el contexto apocalíptico de 4 Esdras; no se formula una doctrina sistemática más allá del alcance del versículo.
translation_notes:
  revision_awareness: 'El historial inglés muestra una corrección importante: la lectura anterior había mezclado material de versículos adyacentes. Para 2 Esdras 8:61, el fragmento latino conservado apoya solo la afirmación de haber mostrado estas cosas a todos, pero a unos pocos como el destinatario; por eso el español no incorpora la oración sobre el juicio que pertenece al contexto vecino.'
  spanish_consistency_notes:
  - Se mantiene «He mostrado» para reflejar el perfecto latino y el tono de testimonio cumplido.
  - Se conserva el guion final «Y—» porque el testimonio latino termina en fragmento, y la versificación/auditoría indican continuación en el verso siguiente.
  - No se usa terminología eclesiástica ajena al texto; la frase permanece sobria y directa.
