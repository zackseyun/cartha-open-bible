reference: 2 Esdras 8:8
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: Et quoniam uiuificans uiuificas nunc in matrice plasmatum corpus et praestas membra, conseruatur in igni et aqua tua creatio et nouem mensibus patitur tua plasmatio tuae creaturae quae in eo creata est.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/008/008.yaml
  text: And because[a], giving life, you now give life in the womb to the body that has been formed, and you provide its members, your creation is preserved in fire and water, and for nine months your formation bears your creature that has been created in it.
  footnotes:
  - marker: a
    text: Or 'your creation is preserved in your fire and water'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:31Z'
    unchanged: false
    changes_summary: 'Revised the final clause: changed ''endures your creature'' to ''bears your creature'' to better reflect Latin patitur in context of pregnancy/gestation. Kept the rest substantially intact as a formal rendering.'
translation:
  language: es
  text: Y porque, dador de vida, ahora das vida en el vientre al cuerpo que ha sido formado, y le provees sus miembros; tu creación es preservada en fuego y agua, y durante nueve meses tu formación lleva[a] a tu criatura que ha sido creada en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu creación es preservada en tu fuego y agua».'
    reason: textual_variant
lexical_decisions:
- source_word: uiuificans uiuificas
  english_pob_choice: giving life, you now give life
  chosen_spanish: dador de vida, ahora das vida
  alternatives_spanish:
  - dando vida, ahora das vida
  - que das vida, ahora das vida
  lexicon: vivificans / vivificas
  rationale: El latín repite la idea de vivificar con un participio y un verbo finito. En español, ‘dador de vida’ conserva el valor descriptivo del participio sin sonar forzado, y ‘das vida’ mantiene la repetición enfática del original.
- source_word: in matrice
  english_pob_choice: in the womb
  chosen_spanish: en el vientre
  alternatives_spanish:
  - en el vientre materno
  - en el útero
  lexicon: matrix
  rationale: ‘Vientre’ es natural, digno y comprensible en español bíblico contemporáneo; ‘útero’ sería más técnico. La imagen gestacional del latín se mantiene sin endurecer el registro.
- source_word: plasmatum corpus
  english_pob_choice: the body that has been formed
  chosen_spanish: el cuerpo que ha sido formado
  alternatives_spanish:
  - el cuerpo formado
  - el cuerpo que fue formado
  lexicon: plasmatus / corpus
  rationale: Se conserva la pasiva y la idea de formación previa. ‘Ha sido formado’ refleja bien el resultado ya establecido en el útero.
- source_word: praestas membra
  english_pob_choice: you provide its members
  chosen_spanish: le provees sus miembros
  alternatives_spanish:
  - le das sus miembros
  - le otorgas sus miembros
  lexicon: praestare / membra
  rationale: ‘Proveer’ sigue la decisión inglesa y expresa la idea de suministrar o dotar. ‘Miembros’ conserva el sentido corporal del latín.
- source_word: conseruatur in igni et aqua tua creatio
  english_pob_choice: your creation is preserved in fire and water
  chosen_spanish: tu creación es preservada en fuego y agua
  alternatives_spanish:
  - tu creación se preserva en fuego y agua
  - tu creación es preservada en tu fuego y agua
  lexicon: conservatur / creatio
  rationale: 'Sigo la revisión auditada que corrige el alcance de ‘tua’: modifica ‘creatio’, no ‘igni et aqua’. Por eso ‘tu creación’ va unido a ‘es preservada’, sin añadir posesivo a ‘fuego y agua’.'
- source_word: nouem mensibus
  english_pob_choice: for nine months
  chosen_spanish: durante nueve meses
  alternatives_spanish:
  - por nueve meses
  - nueve meses
  lexicon: novem mensibus
  rationale: ‘Durante nueve meses’ es la manera más natural de expresar duración continua en español y conserva el valor gestacional del pasaje.
- source_word: patitur
  english_pob_choice: bears
  chosen_spanish: lleva
  alternatives_spanish:
  - soporta
  - padece
  - porta
  lexicon: patior
  rationale: El pasaje trata de la gestación, no del sufrimiento; ‘lleva’ transmite mejor la carga de sostener/portar a la criatura durante el embarazo, siguiendo la revisión inglesa ‘bears’.
- source_word: tua plasmatio tuae creaturae quae in eo creata est
  english_pob_choice: your formation bears your creature that has been created in it
  chosen_spanish: tu formación lleva a tu criatura que ha sido creada en ella
  alternatives_spanish:
  - tu formación lleva tu criatura, que ha sido creada en ella
  - tu formación porta a tu criatura que ha sido creada en ella
  lexicon: plasmatio / creatura
  rationale: Mantengo la estructura posesiva y la referencia interna al lugar de creación (‘en ella’). ‘Formación’ corresponde a plasmatio y ‘criatura’ a creatura, preservando la tensión entre acto formador y ser formado.
theological_decisions:
- issue: La descripción de Dios como dador de vida en la gestación
  english_pob_reading: giving life, you now give life in the womb
  chosen_spanish_reading: dador de vida, ahora das vida en el vientre
  alternative_spanish_readings:
  - dando vida, ahora das vida en el vientre
  - que das vida, ahora das vida en el vientre
  rationale: El texto presenta a Dios como agente de la vida prenatal. ‘Dador de vida’ conserva una formulación reverente sin convertirla en título litúrgico, y mantiene la acción creadora concreta del pasaje.
  doctrine_reference: Providencia creadora y formación de la vida humana
- issue: La criatura humana como obra creada dentro del vientre
  english_pob_reading: your creature that has been created in it
  chosen_spanish_reading: tu criatura que ha sido creada en ella
  alternative_spanish_readings:
  - tu criatura creada en ella
  - la criatura tuya que ha sido creada en ella
  rationale: Se mantiene la idea de criatura creada por Dios y situada ‘en ella’, es decir, en la formación uterina. No se suaviza a una mera metáfora porque el latín insiste en la creación concreta.
  doctrine_reference: Antropología de la creación y dignidad de la vida humana
translation_notes:
  revision_awareness: 'Seguí la revisión auditada que corrige el alcance de ‘tua’ en ‘in igni et aqua tua creatio’: el posesivo modifica ‘creación’, no ‘fuego y agua’. También incorporé la revisión de ‘patitur’ como ‘lleva’ en contexto gestacional, en lugar de traducirlo como sufrimiento. No se siguió la forma inglesa previa donde decía ‘your fire and water’.'
  spanish_consistency_notes:
  - Conservé ‘tu creación’ para reflejar el posesivo del latín y evitar trasladarlo indebidamente a ‘fuego y agua’.
  - Usé ‘vientre’ en lugar de ‘útero’ para un registro bíblico claro y ampliamente inteligible.
  - Mantuve ‘criatura’ y ‘formación’ como pares léxicos distintos para respetar la tensión entre lo formado y el acto de formar.
  - La nota al pie está anclada explícitamente en ‘lleva[a]’ para cumplir la relación entre marcador y texto.
