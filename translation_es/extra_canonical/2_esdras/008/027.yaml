lexical_decisions:
- source_word: testamenta
  english_pob_choice: your covenants
  chosen_spanish: tus pactos
  alternatives_spanish:
  - tus alianzas
  - tus convenios
  lexicon: testamentum
  rationale: En este contexto latino, testamenta traduce un plural de 'covenants' y el POB inglés lo vierte así. 'Pactos' conserva el sentido de compromiso formal y evita el matiz exclusivamente eclesiástico de otras opciones.
- source_word: cum doloribus
  english_pob_choice: with sorrows
  chosen_spanish: con dolores
  alternatives_spanish:
  - con sufrimientos
  - entre dolores
  lexicon: cum + dolor
  rationale: Se mantiene la preposición 'con' siguiendo la revisión inglesa y el valor directo de cum. 'Dolores' refleja el sustantivo latino doloribus con mayor literalidad que una paráfrasis como 'sufrimientos'.
- source_word: Neque cogites
  english_pob_choice: Do not think on
  chosen_spanish: No pienses en
  alternatives_spanish:
  - No consideres
  - No recuerdes
  lexicon: cogito
  rationale: El latín expresa una prohibición de dirigir el pensamiento; 'No pienses en' comunica bien esa admonición en español sin endurecer indebidamente el imperativo.
- source_word: qui in
  english_pob_choice: those who have conducted themselves falsely before you
  chosen_spanish: los que se han conducido falsamente delante de ti
  alternatives_spanish:
  - los que han obrado falsamente ante ti
  - los que han actuado con falsedad delante de ti
  lexicon: qui + in + context
  rationale: El fragmento latino está truncado; la traducción conserva la sintaxis y el sentido de conducta falsa ante Dios, siguiendo de cerca la formulación inglesa auditada.
theological_decisions:
- issue: Covenant language in a fragmentary penitential context
  english_pob_reading: your covenants
  chosen_spanish_reading: tus pactos
  alternative_spanish_readings:
  - tus alianzas
  - tus convenios
  rationale: No se suaviza el plural ni se lo convierte en singular; el texto latino y la POB inglesa preservan el plural, por lo que la traducción española también lo mantiene.
  doctrine_reference: 2 Esdras 8:27; covenant theology / lenguaje de pacto
- issue: Addressees who have acted falsely before God
  english_pob_reading: those who have conducted themselves falsely before you
  chosen_spanish_reading: los que se han conducido falsamente delante de ti
  alternative_spanish_readings:
  - los que han obrado falsamente ante ti
  - los que han sido falsos delante de ti
  rationale: Se conserva la idea relacional y forense de actuar falsamente ante la presencia de Dios, sin convertirla en una interpretación más fuerte de engaño doctrinal o hipocresía.
  doctrine_reference: 2 Esdras 8:27; responsabilidad moral ante Dios
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que cambió 'through sorrows' a 'with sorrows' para acercarse mejor a cum doloribus. La versión española refleja esa decisión con 'con dolores' y conserva el resto del fragmento de forma natural y auditable.
  spanish_consistency_notes:
  - Se mantiene el tono de fragmento por la truncación del texto fuente.
  - '''Pactos'' se usa de manera consistente con el plural latino testamenta y la elección inglesa auditada.'
  - No se introducen notas al pie porque el texto español no necesita alternativas ancladas para esta porción breve y el intento previo falló por marcador no anclado.
