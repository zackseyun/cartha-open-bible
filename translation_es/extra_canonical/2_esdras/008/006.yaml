translation:
  language: es
  text: Oh Señor sobre nosotros[a], si permites a tu siervo que oremos delante de ti, y que nos des semilla para el corazón y cultivo para el entendimiento, de donde pueda venir fruto, por el cual todo ser corruptible[b] pueda vivir,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Señor que estás sobre nosotros’.
    reason: alternative_rendering
  - marker: b
    text: O ‘todo el que es corruptible’.
    reason: alternative_rendering
lexical_decisions:
- source_word: O domine super nos
  english_pob_choice: O Lord over us
  chosen_spanish: ¡Oh Señor sobre nosotros!
  alternatives_spanish:
  - ¡Oh Yahvé sobre nosotros!
  - ¡Oh Señor que estás sobre nosotros!
  lexicon: domine -> Señor
  rationale: El latín dirige una invocación reverente con valor de soberanía; en español, ‘Señor sobre nosotros’ comunica esa relación sin forzar el nombre divino. Se conserva ‘Señor’ porque el texto fuente es una súplica directa y el audit trail inglés ya traduce con ‘Lord’.
- source_word: seruo tuo
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: servo -> siervo
  rationale: Aquí el latín usa el término de servicio devocional y la fórmula española ‘tu siervo’ es natural y fiel. ‘Esclavo’ sería demasiado fuerte en español y no está exigido por este contexto devocional del ruego.
- source_word: oremus coram te
  english_pob_choice: to pray before you
  chosen_spanish: que tu siervo ore delante de ti
  alternatives_spanish:
  - que tu siervo oremos delante de ti
  - para que oremos delante de ti
  lexicon: oremus -> oremos
  rationale: El latín tiene subjuntivo de primera persona plural (‘oremus’), pero está coordinado con ‘tu siervo’ en singular, creando una oscilación deliberada entre el intercesor singular y la comunidad plural. El español conserva esa tensión con ‘tu siervo ore’ como formulación sintácticamente fluida, sin ocultar el carácter comunitario del ruego que aparece en el resto de la cláusula con ‘nos des’.
- source_word: des nobis
  english_pob_choice: and give us
  chosen_spanish: y nos des
  alternatives_spanish:
  - y nos concedas
  - y nos entregues
  lexicon: des -> des
  rationale: El verbo latino es simple y directo; ‘des’ preserva el tono de petición subordinada. ‘Concedas’ sería una paráfrasis más explicativa y menos cercana al registro del original.
- source_word: semen cordis
  english_pob_choice: seed for the heart
  chosen_spanish: semilla para el corazón
  alternatives_spanish:
  - simiente para el corazón
  - semilla del corazón
  lexicon: semen -> semilla
  rationale: ‘Semilla’ reproduce bien la imagen agrícola y la mantiene inteligible en español. ‘Simiente’ es más tradicional, pero ‘semilla’ es más clara en español contemporáneo; el genitivo se vierte con ‘para’ para evitar una expresión forzada.
- source_word: sensui culturam
  english_pob_choice: cultivation for the understanding
  chosen_spanish: cultivo para el entendimiento
  alternatives_spanish:
  - cultivo de la mente
  - cultivo del sentido
  lexicon: cultura/cultivatio -> cultivo
  rationale: El latín habla de ‘cultura’ aplicada al ‘sensus’, es decir, formación/cultivo de la facultad de comprender. ‘Cultivo para el entendimiento’ preserva la metáfora y evita reducir ‘sensus’ a mera ‘mente’ o ‘razón’.
- source_word: unde fructum fiat
  english_pob_choice: from which fruit may come
  chosen_spanish: de donde pueda venir fruto
  alternatives_spanish:
  - de donde resulte fruto
  - para que venga fruto
  lexicon: unde -> de donde
  rationale: ‘De donde’ mantiene la relación causal/originaria del latín. ‘Pueda venir fruto’ conserva el subjuntivo potencial de ‘fiat’ y la imagen bíblica del fruto sin endurecerla en una construcción más abstracta.
- source_word: omnis corruptus
  english_pob_choice: every corruptible one
  chosen_spanish: todo corruptible
  alternatives_spanish:
  - toda criatura corruptible
  - todo el que es corruptible
  lexicon: corruptus -> corruptible
  rationale: 'Se sigue la revisión aprobada del inglés: en este contexto apocalíptico ‘corruptus’ expresa mortalidad/corruptibilidad, no corrupción moral. ‘Corruptible’ en español transmite mejor esa fragilidad que ‘corrompido’.'
theological_decisions:
- issue: Cambio de singular a plural en la súplica
  english_pob_reading: permit your servant to pray before you, and give us...
  chosen_spanish_reading: si permites que tu siervo ore delante de ti, y nos des...
  alternative_spanish_readings:
  - si permites que tu siervo oremos delante de ti, y nos des...
  - si permites que oremos delante de ti, y nos des...
  rationale: 'La cláusula latina combina ‘servo tuo’ singular con ‘oremus/des nobis’ plural. El español mantiene la extrañeza controlada: el siervo singular introduce la petición, pero el contenido de la petición pasa enseguida al ‘nosotros’. Así se conserva la dimensión comunitaria sin borrar al intercesor singular.'
  doctrine_reference: 4 Esdras / 2 Esdras 8:6, observación gramatical del subjuntivo plural
- issue: ‘Corruptible’ como condición mortal, no moral
  english_pob_reading: every corruptible one
  chosen_spanish_reading: todo corruptible
  alternative_spanish_readings:
  - todo corrupto
  - todo el que es corruptible
  rationale: La revisión del audit trail aclara que el término apunta al ámbito de la fragilidad humana y la mortalidad apocalíptica. Por eso se evita ‘corrupto’, que en español sugiere primero depravación ética.
  doctrine_reference: Motivo apocalíptico de la vida otorgada a lo perecedero
translation_notes:
  revision_awareness: 'Se incorporó la revisión gramatical del audit trail inglés: el latín ‘oremus’ es plural y se refleja en la cláusula peticionaria comunitaria; también se siguió la revisión lexical que prefiere ‘corruptible’ frente a ‘corrupto’. No se tradujo mecánicamente desde el inglés base, sino desde el latín limpio y el razonamiento revisado del equipo POB.'
  spanish_consistency_notes:
  - Se mantuvo ‘Señor’ como vocativo reverente sin sustituirlo por una forma en mayúsculas o por ‘Yahvé’, porque el latín dice ‘domine’ y la cláusula es una invocación general.
  - Se usó ‘siervo’ por coherencia devocional del contexto.
  - Se conservó la metáfora agrícola (‘semilla’, ‘cultivo’, ‘fruto’) sin convertirla en explicación abstracta.
  - Se evitó ‘corrupción’ o ‘corrompido’ para no desplazar el sentido hacia moralidad en lugar de fragilidad/corruptibilidad.
