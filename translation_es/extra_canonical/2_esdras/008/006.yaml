base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/008/006.yaml
  text: O Lord over us[a], if you permit your servant to pray before you, and give us seed for the heart and cultivation for the understanding, from which fruit may come, by which every corruptible one may live[b],
