lexical_decisions:
- source_word: prehensibilis
  english_pob_choice: incomprehensible
  chosen_spanish: incomprensible
  alternatives_spanish:
  - inabarcable
  - incomprensible para el entendimiento
  lexicon: Latin prehensibilis
  rationale: El latinismo aquí apunta a lo que no puede ser captado o comprendido; 'incomprensible' reproduce bien el valor epistemológico y es natural en español bíblico contemporáneo.
- source_word: cui adstat exercitus angelorum cum tremore
  english_pob_choice: before whom the host of angels stands with trembling
  chosen_spanish: ante quien el ejército de los ángeles está con temor
  alternatives_spanish:
  - ante quien la hueste de los ángeles está temblando
  - delante de quien la multitud de ángeles permanece con temblor
  lexicon: Latin adstat / exercitus angelorum / cum tremore
  rationale: '''Ante quien'' conserva la relación de reverencia; ''ejército de los ángeles'' mantiene el sentido colectivo de exercitus, y ''con temor'' expresa el temblor reverencial sin forzar un calco excesivo.'
- source_word: Quorum seruatio in uento et igni conuertitur
  english_pob_choice: whose preservation is turned into wind and fire
  chosen_spanish: cuya preservación se vuelve en viento y fuego
  alternatives_spanish:
  - cuya preservación se convierte en viento y fuego
  - cuya conservación se transforma en viento y fuego
  lexicon: Latin servatio / convertitur / vento et igni
  rationale: '''Preservación'' sigue el valor de servatio y evita introducir una idea no atestiguada. ''Se vuelve en'' refleja con economía el pasivo/conversivo de conuertitur y mantiene la imagen extraña del original.'
- source_word: cuius uerbum
  english_pob_choice: whose word
  chosen_spanish: cuya palabra
  alternatives_spanish:
  - cuyo dicho
  - cuyo verbo
  lexicon: Latin verbum
  rationale: '''Palabra'' es la equivalencia más clara y fiel para verbum en este contexto. Se deja abierto para la continuación textual del versículo en la fuente mayor.'
theological_decisions:
- issue: Tratamiento de la incomprensibilidad divina
  english_pob_reading: incomprehensible
  chosen_spanish_reading: incomprensible
  alternative_spanish_readings:
  - inabarcable
  - inaccesible al entendimiento
  rationale: El texto subraya la trascendencia divina sin expandirla a una glosa doctrinal. 'Incomprensible' comunica la tensión de manera directa y fiel.
  doctrine_reference: 'Atributos de Dios: trascendencia e inescrutabilidad'
- issue: Imagen del séquito angélico con temor
  english_pob_reading: the host of angels stands with trembling
  chosen_spanish_reading: el ejército de los ángeles está con temor
  alternative_spanish_readings:
  - la hueste de los ángeles tiembla
  - el ejército de los ángeles permanece temblando
  rationale: Se conserva la escena de reverencia y sobrecogimiento ante la majestad divina, sin convertir el temblor en una formulación doctrinal distinta.
  doctrine_reference: Angelesología; reverencia ante la santidad divina
- issue: Sentido de 'preservation'
  english_pob_reading: preservation
  chosen_spanish_reading: preservación
  alternative_spanish_readings:
  - conservación
  - salvaguarda
  rationale: '''Preservación'' sigue de cerca el latín servatio y evita leer ''salvación'' o ''seguridad'', que introducirían un matiz no garantizado por el texto.'
  doctrine_reference: Semántica de servatio en latin bíblico/apócrifo
translation_notes:
  revision_awareness: La revisión reciente eliminó material que no estaba en el latín proporcionado ('whose throne is beyond measure and whose glory is') y retuvo 'incomprehensible', además de recuperar la frase restante 'whose preservation is turned into wind and fire, whose word'. Esta versión española sigue ese alcance restringido y no añade contenido ausente.
  spanish_consistency_notes:
  - Se mantiene 'ángeles' en minúscula por ser sustantivo común en español, sin capitalización litúrgica innecesaria.
  - Se evita 'SEÑOR' o 'Yahvé' porque el fragmento latino no contiene el nombre divino; no hay base para introducirlo.
  - '''cuya palabra[a]'' queda con anclaje de nota porque la fuente proporcionada corta la frase en ese punto.'
