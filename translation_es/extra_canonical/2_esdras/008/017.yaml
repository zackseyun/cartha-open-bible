base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/008/017.yaml
  text: Because of this I am troubled. Therefore I will begin to pray before you for myself and for them[a], because I see the falls of us who inhabit the earth.
  footnotes:
  - marker: a
    text: Or 'the failings of us'.
    reason: previous_rendering
  revision_pass:
