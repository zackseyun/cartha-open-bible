- from: Por esto estoy turbado. Por tanto, empezaré a orar delante de ti por mí y por ellos[a], porque veo las caídas de nosotros los que habitamos en la tierra.
  to: Por esto estoy turbado. Por tanto, empezaré a orar ante ti por mí y por ellos[a], porque veo cómo hemos caído nosotros, los que habitamos la tierra.
  rationale: Se revisa la cláusula final para expresar lapsos nostros en español idiomático sin debilitar su fuerza antropológica; «cómo hemos caído» conserva la idea de caída real de la humanidad mejor que el calco «las caídas de nosotros». Se pule además «delante de ti» a «ante ti» por fluidez y se naturaliza la nota alternativa.
