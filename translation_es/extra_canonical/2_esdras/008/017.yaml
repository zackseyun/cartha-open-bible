review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura latina: propter quod conturbor, ideo incipiam orare coram te, pro me et pro eis, quoniam video lapsos nostros qui inhabitamus. Sin embargo, «las caídas de nosotros» resulta demasiado calcado y poco natural en español, aunque intenta conservar la dureza de lapsos nostros. El sentido fuente puede preservarse mejor con una formulación idiomática que mantenga la idea de caída humana.'
  spanish_quality_summary: El español es claro en general, pero «las caídas de nosotros» suena forzado y poco propio del registro bíblico natural en español. «Delante de ti» y «estoy turbado» son aceptables, aunque «ante ti» fluye mejor. La oración mejora notablemente con «veo cómo hemos caído nosotros, los que habitamos la tierra», que conserva la fuerza semántica sin sonar mecánica.
  glossary_alignment: No hay términos del glosario principal en juego salvo decisiones generales de registro. El tratamiento de lapsos nostros debe evitar rebajarse a «faltas» en el texto principal; esa alternativa puede permanecer en nota como opción menor/tradicional del expediente inglés.
  issues:
  - severity: medium
    issue: «las caídas de nosotros» es una construcción antinatural en español
    rationale: Aunque refleja de cerca la forma fuente y la auditoría inglesa, en español suena torpe y distrae. Una traducción POB debe preservar significado y fuerza sin caer en calco innecesario.
  - severity: low
    issue: «delante de ti» podría pulirse a «ante ti»
    rationale: Ambas son fieles a coram te, pero «ante ti» es más conciso y digno en español bíblico moderno.
  - severity: low
    issue: La nota «las faltas de nosotros» repite la misma rigidez sintáctica
    rationale: 'Si se conserva una alternativa, conviene expresarla en español natural: «nuestras faltas».'
  revised_spanish_text: Por esto estoy turbado. Por tanto, empezaré a orar ante ti por mí y por ellos[a], porque veo cómo hemos caído nosotros, los que habitamos la tierra.
