    unchanged: false
    changes_summary: Restored the omitted opening clause ('Because of this I am troubled'), removed the duplicated phrase, and revised the final clause to account for Latin lapsos/lapsus more completely without paraphrastic expansion.
translation:
  language: es
  text: Por esto estoy turbado. Por tanto, empezaré a orar ante ti por mí y por ellos[a], porque veo cómo hemos caído nosotros, los que habitamos la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestras faltas».
    reason: alternative_reading
lexical_decisions:
- source_word: propter quod conturbor
  english_pob_choice: Because of this I am troubled.
  chosen_spanish: Por esto estoy turbado.
  alternatives_spanish:
  - Por esta causa me perturbo.
  - Por eso estoy angustiado.
  lexicon: propter quod; conturbor
  rationale: «Por esto» mantiene la relación causal breve de propter quod, y «estoy turbado» conserva el valor de conturbor como perturbación interior sin exagerar a «angustiado». La forma refleja el tono lamentativo del pasaje.
- source_word: Ideo incipiam orare coram te
  english_pob_choice: Therefore I will begin to pray before you
  chosen_spanish: Por tanto, empezaré a orar delante de ti
  alternatives_spanish:
  - Así que comenzaré a orar en tu presencia
  - Por eso comenzaré a orar ante ti
  lexicon: ideo; incipiam orare coram te
  rationale: «Por tanto» reproduce la consecuencia lógica de ideo. «Empezaré a orar» sigue el valor inceptivo de incipiam. «Delante de ti» conserva coram te con un registro sobrio y comprensible.
- source_word: pro me et pro eis
  english_pob_choice: for myself and for them
  chosen_spanish: por mí y por ellos
  alternatives_spanish:
  - a favor de mí y de ellos
  - por mí mismo y por ellos
  lexicon: pro me et pro eis
  rationale: «Por mí y por ellos» es la equivalencia natural de pro con sentido intercesor. Se evita añadir «mismo» porque no está exigido por el latín, aunque sigue siendo posible en español.
- source_word: lapsos nostros
  english_pob_choice: because I see the falls of us / how we who inhabit the earth have fallen
  chosen_spanish: las caídas de nosotros
  alternatives_spanish:
  - nuestro caer
  - nuestro estado caído
  - cómo hemos caído
  lexicon: lapsos nostros
  rationale: Se conserva la tensión del latín entre un participio sustantivado y una lectura de estado caído. «Las caídas de nosotros» mantiene la imagen no idiomática pero transparente a la forma fuente, evitando suavizarla a una mera paráfrasis. La nota puede explicar la alternativa más natural en español.
- source_word: inhabitamus
  english_pob_choice: we who inhabit the earth
  chosen_spanish: los que habitamos en la tierra
  alternatives_spanish:
  - los que vivimos en la tierra
  - nosotros, los que habitamos la tierra
  lexicon: inhabitamus
  rationale: «Los que habitamos en la tierra» conserva la relativa del inglés auditado y el matiz de permanencia terrenal. Se mantiene «en la tierra» porque el contexto apocalíptico contrasta la vida humana con la esfera celestial.
theological_decisions:
- issue: Humanity's fallen state expressed by lapsos nostros
  english_pob_reading: because I see how we who inhabit the earth have fallen / the falls of us who inhabit the earth
  chosen_spanish_reading: porque veo las caídas de nosotros los que habitamos en la tierra
  alternative_spanish_readings:
  - porque veo cómo hemos caído los que habitamos en la tierra
  - porque veo nuestro estado caído, los que habitamos en la tierra
  rationale: El texto no habla solo de faltas individuales leves, sino de la condición caída de la humanidad. La redacción elegida conserva la dureza y ambigüedad del testimonio latino sin convertirlo en una explicación doctrinal más amplia de lo que el verso afirma.
  doctrine_reference: Antropología bíblica; condición caída de la humanidad
translation_notes:
  revision_awareness: La redacción española toma en cuenta la revisión más reciente del inglés POB, que restauró la cláusula inicial («Because of this I am troubled») y reforzó el final para reflejar lapsos/lapsus como una condición de caída más que como simples «fallings» o «failings». Por eso se evita una traducción suavizada y se conserva una estructura cercana al latín.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma proyectual solo cuando aparezca el nombre divino; aquí no hay caso.
  - Se conserva el tono de lamento e intercesión sin introducir lenguaje eclesiástico ajeno al latín.
  - «Turbado» y «caídas» preservan el peso semántico sin sobreinterpretación moralizante.
