    issue: «tu temor» es ambiguo en español
    rationale: Aunque reproduce externamente el latín, en español puede entenderse como el temor que pertenece a Dios, no como el temor reverente hacia Dios. «te han temido reverentemente» o similar comunica mejor el sentido objetivo documentado por la auditoría inglesa.
  - severity: low
    issue: «animales» debilita «pecorum»
    rationale: «Pecorum» se refiere más específicamente a ganado/rebaño/cattle, no a animales en general. «costumbres del ganado» preserva mejor la metáfora concreta.
  - severity: low
    issue: La nota al pie no refleja la principal alternativa auditada
    rationale: El POB inglés preserva la alternativa «known your fear by their own will». En español conviene conservar esa alternativa semántica en nota, además de la observación sobre el final truncado si se desea.
