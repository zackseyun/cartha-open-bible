lexical_decisions:
- source_word: memorare
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - acuérdate de
  - ten presente
  lexicon: memorar / recordar
  rationale: En este contexto de súplica, «recuerda» expresa una petición directa y natural en español, fiel al valor exhortativo del latín.
- source_word: qui ex uoluntate tuum timorem cognouerunt
  english_pob_choice: those who have willingly acknowledged your fear
  chosen_spanish: los que, voluntariamente, han reconocido tu temor
  alternatives_spanish:
  - los que han reconocido voluntariamente tu temor
  - los que de buena voluntad han reconocido tu temor
  lexicon: cognoscere / reconocer
  rationale: «Cognouerunt» aquí no es solo 'conocer', sino reconocer/admitir. «Tuum timorem» se vierte como «tu temor», manteniendo la construcción del latín y la relación con Dios en segunda persona.
- source_word: ex uoluntate
  english_pob_choice: willingly
  chosen_spanish: voluntariamente
  alternatives_spanish:
  - de buena voluntad
  - por su propia voluntad
  lexicon: voluntas
  rationale: La frase latina indica disposición voluntaria; «voluntariamente» es la forma más directa y clara en español.
- source_word: Neque uolueris perdere
  english_pob_choice: Do not be willing to destroy
  chosen_spanish: No quieras destruir
  alternatives_spanish:
  - No quieras perder
  - No desees destruir
  lexicon: velle + perdere
  rationale: La perífrasis negativa del latín se reproduce con naturalidad como «No quieras destruir», que conserva el matiz volitivo de «uolueris».
- source_word: qui pecorum mores habuerunt
  english_pob_choice: those who have had the ways of cattle
  chosen_spanish: a los que han tenido las costumbres de los animales
  alternatives_spanish:
  - a los que han tenido modales de bestias
  - a los que han vivido como ganado
  lexicon: mores / pecora
  rationale: «Pecorum mores» se entiende literalmente como conducta propia de ganado/animales. «Costumbres de los animales» conserva la imagen sin introducir una equivalencia interpretativa más fuerte de la necesaria.
- source_word: sed respicias eos qui legem tuam
  english_pob_choice: but look upon those who
  chosen_spanish: sino mira a los que
  alternatives_spanish:
  - sino mira favorablemente a los que
  - sino vuelve tus ojos a los que
  lexicon: respicere
  rationale: «Respicias» se traduce con el sentido de mirar/volver la mirada hacia alguien; en español, «mira a los que» mantiene la apertura del sintagma y deja intacto el complemento que sigue en el texto fuente.
theological_decisions:
- issue: Temor de Dios como objeto reverencial
  english_pob_reading: your fear
  chosen_spanish_reading: tu temor
  alternative_spanish_readings:
  - el temor de ti
  - tu reverencia
  rationale: El latín «tuum timorem» se lee mejor como temor reverente dirigido a Dios, no como miedo poseído por Dios. «Tu temor» conserva la ambigüedad reverencial sin explicitarla de más.
  doctrine_reference: Temor de Dios / reverencia
- issue: Conservar la tensión del contraste moral
  english_pob_reading: those who have had the ways of cattle
  chosen_spanish_reading: los que han tenido las costumbres de los animales
  alternative_spanish_readings:
  - los que han vivido como ganado
  - los que han tenido maneras de bestias
  rationale: Se mantiene el contraste entre quienes reconocen reverentemente a Dios y quienes han vivido con conducta degradada, sin suavizar la imagen zoológica del latín.
  doctrine_reference: Juicio y misericordia
translation_notes:
  revision_awareness: La revisión reciente corrigió el sentido de «tuum timorem» como «your fear» y completó las cláusulas omitidas al final del versículo. Esta versión española sigue ese ajuste, conserva el valor volitivo de «Neque uolueris perdere» y no introduce una paráfrasis doctrinal donde el latín mantiene una imagen concreta.
  spanish_consistency_notes:
  - Se mantiene «tu» para la segunda persona divina, coherente con el texto fuente y con el registro reverente del pasaje.
  - «animales» traduce de forma más accesible la imagen de «pecorum» sin borrar la metáfora despectiva.
  - La cláusula final queda truncada porque el latín transmitido también termina incompleto; por eso la nota indica la incompletitud textual.
