translation:
  language: es
  text: pero recuerda a los que voluntariamente te han temido[a]. No quieras destruir a los que han tenido las costumbres del ganado, sino mira a los que[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «han reconocido tu temor por su propia voluntad».'
    reason: Preserva la alternativa semántica documentada en la auditoría inglesa para «qui ex uoluntate tuum timorem cognouerunt».
  - marker: b
    text: 'O: «mira a los que [han tenido] tu ley»; el final del latín queda incompleto en el testimonio conservado.'
