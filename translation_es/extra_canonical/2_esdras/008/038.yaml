  to: Porque en verdad no tendré en cuenta la formación de los que han pecado[a], ni su muerte, ni su juicio, ni su destrucción; pero me alegraré de la creación de los justos.
  rationale: Se reemplazó «no pensaré en» por «no tendré en cuenta» para expresar de manera más natural y precisa la idea contextual del latín y del inglés auditado. También se ajustó «me alegraré por» a «me alegraré de» para mejorar la idiomaticidad del español. Se conservó la nota alternativa y el alcance posesivo de «su muerte… su juicio… su destrucción», que es teológicamente importante en esta línea.
