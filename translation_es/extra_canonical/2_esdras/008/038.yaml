translation:
  language: es
  text: Porque en verdad no tendré en cuenta la formación de los que han pecado[a], ni su muerte, ni su juicio, ni su destrucción; pero me alegraré de la creación de los justos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ni su muerte, ni su juicio, ni su destrucción».
    reason: alternative_reading
lexical_decisions:
- source_word: super plasma eorum qui peccauerunt
  english_pob_choice: I will not think upon the formation of those who have sinned
  chosen_spanish: no pensaré en la formación de los que han pecado
  alternatives_spanish:
  - no tendré en cuenta la formación de los que han pecado
  - no me ocuparé de la formación de los que han pecado
  lexicon: plasma
  rationale: plasma indica formación, modelado o creación; elegí «formación» para mantener la referencia al acto creador sin añadir una connotación demasiado técnica. «Los que han pecado» conserva el participio de la fuente y evita suavizar el rasgo moral del grupo.
- source_word: mortem ... iudicium ... perditionem
  english_pob_choice: their death, nor their judgment, nor their destruction
  chosen_spanish: su muerte, ni su juicio, ni su destrucción
  alternatives_spanish:
  - la muerte de ellos, ni el juicio de ellos, ni la destrucción de ellos
  - su muerte, ni el juicio sobre ellos, ni su ruina
  lexicon: mors / iudicium / perditio
  rationale: La revisión inglesa aclaró que los sustantivos están regidos por el genitivo implícito de los pecadores. En español, los posesivos «su/su/su» transmiten naturalmente ese alcance y evitan universalizar indebidamente muerte y juicio.
- source_word: Sed iocundabor super iustorum figmentum
  english_pob_choice: but I will rejoice over the creation of the righteous
  chosen_spanish: pero me alegraré por la creación de los justos
  alternatives_spanish:
  - pero me gozaré por la creación de los justos
  - sino que me alegraré por la formación de los justos
  lexicon: iocundabor / figmentum / iusti
  rationale: «Me alegraré» conserva el valor jubiloso de iocundabor sin forzar un registro excesivamente poético. «Creación» refleja figmentum en paralelo con «formación» del primer miembro; «los justos» traduce iustorum con sustantivación bíblica natural en español.
theological_decisions:
- issue: Alcance restringido de muerte, juicio y destrucción
  english_pob_reading: their death, nor their judgment, nor their destruction
  chosen_spanish_reading: su muerte, ni su juicio, ni su destrucción
  alternative_spanish_readings:
  - la muerte, ni el juicio, ni la destrucción
  - su muerte, ni el juicio, ni la destrucción
  rationale: La nota de revisión inglesa corrige una lectura demasiado amplia. Mantener los posesivos en español preserva que el texto habla de la muerte, juicio y destrucción de «los que han pecado», no de esos conceptos en general.
  doctrine_reference: 4 Esdras 8:38; juicio divino sobre los impíos
translation_notes:
  revision_awareness: 'La base inglesa fue revisada para añadir el segundo miembro de la cláusula final («but I will rejoice over the creation of the righteous») y para corregir el alcance de los posesivos en «their death, their judgment, their destruction». La versión española refleja ambas correcciones: incluye el contraste final completo y mantiene el alcance restringido mediante posesivos.'
  spanish_consistency_notes:
  - Conservé un paralelismo léxico entre «formación» y «creación» para respetar el contraste del latín plasma / figmentum.
  - Usé «justos» como sustantivo bíblico natural y no «rectos», porque la fuente contrasta el grupo de pecadores con el de los justos.
  - Mantuve el conector adversativo «pero» para reflejar el latín Sed y el giro teológico del versículo.
