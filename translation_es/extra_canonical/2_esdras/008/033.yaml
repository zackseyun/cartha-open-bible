translation:
  language: es
  text: Porque los justos[a], que tienen muchas obras guardadas contigo, recibirán su recompensa de sus propias obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero los justos, que tienen muchas obras guardadas contigo, recibirán su recompensa de sus propias obras».'
    reason: alternative_reading
lexical_decisions:
- source_word: iusti
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos de corazón
  lexicon: δικαιος / iustus
  rationale: El latín iusti designa a los justos en sentido moral y forense. «Los justos» es la opción más natural y fiel en español, y conserva el paralelismo con el argumento del pasaje sobre obras y recompensa.
- source_word: operae multae
  english_pob_choice: many works
  chosen_spanish: muchas obras
  alternatives_spanish:
  - muchas acciones
  - muchas obras realizadas
  lexicon: opera / ἔργα
  rationale: «Obras» mantiene el valor lexical directo de opera y su vínculo con la discusión de méritos/recompensa. «Muchas obras» reproduce la cuantificación sin sobreexplicar.
- source_word: repositae apud te
  english_pob_choice: laid up with you
  chosen_spanish: guardadas contigo
  alternatives_spanish:
  - reservadas contigo
  - depositadas junto a ti
  lexicon: repono / θησαυρίζω
  rationale: La imagen es de algo almacenado o reservado ante Dios. «Guardadas contigo» suena natural en español y conserva la idea de depósito personal ante Dios sin introducir una metáfora más fuerte que la del original.
- source_word: mercedem
  english_pob_choice: reward
  chosen_spanish: recompensa
  alternatives_spanish:
  - paga
  - galardón
  lexicon: merces
  rationale: «Recompensa» expresa bien merces en un registro bíblico contemporáneo y evita arcaísmos. Conserva la relación de mérito y remuneración que el contexto subraya.
- source_word: ex propriis operibus
  english_pob_choice: from their own works
  chosen_spanish: de sus propias obras
  alternatives_spanish:
  - por sus propias obras
  - a partir de sus propias obras
  lexicon: proprius + opera
  rationale: La preposición «de» refleja de manera bastante directa el origen o procedencia indicado por ex. «Sus propias obras» mantiene el énfasis en que la recompensa corresponde a lo que ellos mismos hicieron.
theological_decisions:
- issue: Relación entre justicia y recompensa basada en obras
  english_pob_reading: the righteous... will receive their reward from their own works
  chosen_spanish_reading: los justos... recibirán su recompensa de sus propias obras
  alternative_spanish_readings:
  - los justos... recibirán su recompensa por sus propias obras
  - los justos... recibirán la recompensa de sus obras
  rationale: El latín afirma explícitamente una recompensa ligada a las obras propias. La traducción española conserva esa tensión sin suavizarla ni reescribirla en términos más generales de gracia o favor. Esto sigue el razonamiento del texto transmitido en la nota de revisión, que insiste en la lógica causal de la serie con enim.
  doctrine_reference: Justicia/recompensa por obras en el argumento de 2 Esdras 8:32-36; no es una formulación paulina sino una afirmación del pasaje apocalíptico.
- issue: Valor causal de enim
  english_pob_reading: For the righteous...
  chosen_spanish_reading: Porque los justos...
  alternative_spanish_readings:
  - Pues los justos...
  - Ya que los justos...
  rationale: La revisión auditada destaca que enim es causal/explanatorio y no adversativo. «Porque» conserva esa continuidad argumentativa en español de forma clara y natural.
  doctrine_reference: Conexión lógica del discurso; continuidad causal del argumento.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión aplicada que corrigió el arranque de adversativo a causal: el latín dice iusti enim, por lo que el español debe comenzar con «Porque», no con «Pero». También se respetó el estado de alta concordancia y la ausencia de cambios en la última pasada.'
  spanish_consistency_notes:
  - Se mantuvo «obras» para opera y no «hechos», para conservar la carga lexical del pasaje.
  - Se usó «recompensa» para mercedem como término bíblico claro y no técnico.
  - La nota alternativa queda anclada en [a] dentro del texto, evitando pies de página huérfanos.
