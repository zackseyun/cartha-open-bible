translation:
  language: es
  text: 'así también es el curso del presente siglo: muchos ciertamente han sido creados, pero pocos serán salvados.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: actus praesentis saeculi
  english_pob_choice: the course of the present age
  chosen_spanish: el curso del presente siglo
  alternatives_spanish:
  - el curso de la era presente
  - el proceder del presente siglo
  lexicon: actus
  rationale: La revisión del POB inglés corrigió 'deeds' por 'course' porque actus aquí describe el curso, patrón u operación de la época, no actos morales. 'Curso' comunica bien esa idea en español sin moralizar el término. 'Siglo' es una opción natural para saeculum en este contexto apocalíptico.
- source_word: Multi quidem creati sunt
  english_pob_choice: many indeed have been created
  chosen_spanish: muchos ciertamente han sido creados
  alternatives_spanish:
  - muchos en verdad han sido creados
  - muchos, ciertamente, fueron creados
  lexicon: creati sunt
  rationale: El pasivo 'han sido creados' preserva la acción divina implícita y el tiempo perfecto del latín. 'Creados' mantiene la fuerza de creatio sin introducir otra interpretación. 'Ciertamente' refleja el quidem enfático del original y del inglés.
- source_word: saluabuntur
  english_pob_choice: will be saved
  chosen_spanish: serán salvados
  alternatives_spanish:
  - serán salvos
  - serán librados
  lexicon: saluabuntur
  rationale: '''Serán salvados'' reproduce con fidelidad el pasivo futuro latino y el paralelismo con ''han sido creados''. ''Salvos'' sería idiomático, pero ''salvados'' conserva mejor la forma verbal y la resonancia soteriológica del texto.'
theological_decisions:
- issue: Relación entre creación y salvación en el paralelismo del versículo
  english_pob_reading: many indeed have been created, but few will be saved
  chosen_spanish_reading: muchos ciertamente han sido creados, pero pocos serán salvados
  alternative_spanish_readings:
  - muchos ciertamente han sido creados, pero pocos serán salvos
  - muchos ciertamente han sido creados, pero pocos llegarán a ser salvados
  rationale: El texto contrapone el hecho de ser creados con el resultado final de ser salvados. Mantener ambos pasivos evita añadir condiciones o matices no presentes en la fuente. 'Salvados' conserva la referencia escatológica sin alterar la estructura del argumento.
  doctrine_reference: 2 Esdras 8:1-3; paralelismo sapiencial/apocalíptico sobre creación y salvación
translation_notes:
  revision_awareness: Esta redacción sigue la revisión más reciente del POB inglés, que corrigió 'deeds' por 'course' y eliminó la comilla final no sustentada por la fuente. No se añade nota al pie porque la única variante relevante ya quedó absorbida en la traducción principal.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, pero sin forzar un calco anticuado.
  - '''Siglo'' se usa para saeculum en sentido de época/era, coherente con el contexto literario.'
  - No se introduce 'Cristo', 'SEÑOR' ni terminología eclesial ajena al texto.
  - El paralelismo sintáctico del latín se conserva en español con dos miembros breves y equilibrados.
