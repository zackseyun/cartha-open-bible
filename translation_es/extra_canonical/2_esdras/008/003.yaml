    issue: Posible preferencia estilística por 'serán salvos' en vez de 'serán salvados'
    rationale: La forma actual es fiel y gramatical; la alternativa sería más litúrgica/tradicional, pero no mejora claramente la fidelidad al latín ni la claridad general.
