revisions:
- from: 'terrible, cuya apariencia seca los abismos, y cuya indignación hace que las montañas se derritan, y cuya verdad da testimonio: Escucha, oh Señor, la oración'
  to: 'temible, cuyo aspecto reseca los abismos, y cuya indignación hace que las montañas se derritan, y cuya verdad da testimonio: Escucha, oh Señor, la oración'
  rationale: 'Se ajustan tres puntos de estilo-fidelidad: ''temible'' por ''terrible'' para reflejar mejor ''terribilis'' en español actual; ''aspecto'' por ''apariencia'' para una teofanía más natural y fiel a ''aspectus''; y ''reseca los abismos'' para mejorar la idiomaticidad sin perder la imagen de ''arefacit abyssos''. No se requieren notas.'
