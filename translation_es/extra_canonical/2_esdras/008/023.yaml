translation:
  language: es
  text: 'temible, cuyo aspecto reseca los abismos, y cuya indignación hace que las montañas se derritan, y cuya verdad da testimonio: Escucha, oh Señor, la oración'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: terribilis
  english_pob_choice: terrible
  chosen_spanish: terrible
  alternatives_spanish:
  - temible
  - espantoso
  lexicon: Latin terribilis
  rationale: La forma española 'terrible' conserva bien el valor intensivo y sobrecogedor del latín, y coincide con la decisión inglesa de mantener la fuerza del adjetivo inicial sin suavizarlo.
- source_word: aspectus
  english_pob_choice: appearance
  chosen_spanish: apariencia
  alternatives_spanish:
  - rostro
  - mirada
  - aspecto
  lexicon: Latin aspectus
  rationale: '''Apariencia'' reproduce de manera natural y digna la idea visual del término, evitando ''mirada'', que sonaría más subjetiva, y ''rostro'', que estrecharía demasiado el sentido.'
- source_word: abyssos
  english_pob_choice: depths
  chosen_spanish: abismos
  alternatives_spanish:
  - profundidades
  - simas
  lexicon: Latin abyssos
  rationale: '''Abismos'' mantiene el imaginario de profundidad extrema y conserva el registro solemne del texto; ''profundidades'' sería posible, pero menos enfático.'
- source_word: indignatio
  english_pob_choice: indignation
  chosen_spanish: indignación
  alternatives_spanish:
  - ira
  - furor
  lexicon: Latin indignatio
  rationale: '''Indignación'' sigue de cerca la elección inglesa y preserva el matiz de juicio airado; ''ira'' es válida, pero menos específica en este contexto.'
- source_word: tabescere facit
  english_pob_choice: makes ... melt
  chosen_spanish: hace que ... se derritan
  alternatives_spanish:
  - hace derretirse
  - consume
  lexicon: Latin tabescere facit
  rationale: La construcción española 'hace que ... se derritan' expresa con claridad el efecto causativo del latín y conserva la imagen de disolución/derretimiento que la versión inglesa retiene.
- source_word: ueritas testificatur
  english_pob_choice: truth bears witness
  chosen_spanish: la verdad da testimonio
  alternatives_spanish:
  - la verdad testimonia
  - la verdad es testigo
  lexicon: Latin veritas + testificatur
  rationale: '''Da testimonio'' es una equivalencia idiomática y fiel para ''bears witness'', manteniendo el sujeto abstracto ''la verdad'' sin recargar el español.'
- source_word: domine
  english_pob_choice: O Lord
  chosen_spanish: oh Señor
  alternatives_spanish:
  - Señor
  - oh Yahvé
  lexicon: Latin domine
  rationale: Aunque el proyecto usa 'Yahvé' para el tetragrámaton, aquí el texto latino dice 'domine' y la traducción inglesa conserva la invocación vocativa tradicional; 'oh Señor' refleja esa forma de oración sin afirmar una lectura más específica de nombre divino que el latín no explicita en este verso.
- source_word: orationem
  english_pob_choice: the prayer
  chosen_spanish: la oración
  alternatives_spanish:
  - mi oración
  - la plegaria
  lexicon: Latin orationem
  rationale: El sustantivo 'oración' corresponde de manera directa al latín y al inglés, y mantiene el registro litúrgico y sobrio del cierre.
theological_decisions:
- issue: Tono de epifanía/jucio divino en la cadena descriptiva
  english_pob_reading: terrible ... whose appearance dries up the depths, and whose indignation makes the mountains melt, and whose truth bears witness
  chosen_spanish_reading: terrible ... cuya apariencia seca los abismos, y cuya indignación hace que las montañas se derritan, y cuya verdad da testimonio
  alternative_spanish_readings:
  - temible ...
  - espantoso ...
  rationale: Se conserva el tono de majestad temible y poder cósmico sin atenuarlo. 'Terrible' en español contemporáneo todavía puede funcionar con ese peso, especialmente en un registro bíblico elevado.
  doctrine_reference: Teofanía y soberanía divina en lenguaje poético
- issue: Vocativo final de súplica
  english_pob_reading: Hear, O Lord, the prayer
  chosen_spanish_reading: Escucha, oh Señor, la oración
  alternative_spanish_readings:
  - Oye, oh Señor, la oración
  - Escucha, Señor, la oración
  rationale: '''Escucha'' mantiene el sentido de súplica directa y digna. Se conserva el vocativo ''oh Señor'' para reflejar la forma orante del latín y del inglés, sin añadir un nombre divino no explicitado aquí.'
  doctrine_reference: Oración litúrgica e invocación a Dios
translation_notes:
  revision_awareness: La revisión inglesa añadió el adjetivo inicial 'terrible' y la cláusula final 'Hear, O Lord, the prayer', además de ajustar 'look' a 'appearance'. La versión española incorpora esas adiciones y refleja 'appearance' como 'apariencia' para alinearse con la lectura revisada y con el latín fuente.
  spanish_consistency_notes:
  - Se mantiene 'Señor' en el vocativo porque el latín usa 'domine' y el contexto inmediato no exige explicitar 'Yahvé'.
  - No se introduce 'Cristo' ni terminología cristológica, ya que el verso es una doxología/súplica al Dios soberano sin tal referencia.
  - Se conserva la cadena descriptiva con paralelismo y puntuación análoga a la del texto fuente y la versión inglesa revisada.
