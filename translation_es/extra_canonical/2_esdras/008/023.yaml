review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el latín y el rastro inglés: conserva el adjetivo inicial, la cadena relativa, el efecto causativo sobre los montes y la súplica final. Sin embargo, ''aspectus'' queda mejor como ''aspecto'' que como ''apariencia'' en este contexto solemne, y ''seca los abismos'' suena menos natural que una formulación que preserve el objeto cósmico sin sugerir una acción demasiado física o coloquial.'
  spanish_quality_summary: El español es claro y mayormente digno, pero 'apariencia' aplicado a Dios suena algo moderno y superficial, y 'seca los abismos' resulta algo áspero. 'Terrible' es defendible, pero en español bíblico 'temible' comunica mejor la majestad aterradora sin la ambigüedad moderna de 'terrible'. El resto del verso fluye bien.
  glossary_alignment: No hay conflicto serio con la terminología del proyecto. 'Señor' para domine está justificado porque la fuente inmediata es latín 'domine', no el tetragrámaton explícito. No se requieren notas léxicas nuevas.
  issues:
  - severity: medium
    issue: '''terrible'' es posible, pero menos preciso y más ambiguo en español actual que ''temible''.'
    rationale: El latín 'terribilis' expresa cualidad inspiradora de temor reverente. 'Temible' preserva mejor ese matiz en español eclesial moderno, mientras que 'terrible' puede oírse como simple intensificador o valoración negativa.
  - severity: medium
    issue: '''apariencia'' para ''aspectus'' suena débil o superficial en español.'
    rationale: En una descripción teofánica, 'aspecto' es más natural y más cercano al valor visual de 'aspectus' sin reducirlo a 'rostro' o 'mirada'.
  - severity: low
    issue: '''seca los abismos'' suena algo duro en español.'
    rationale: Aunque es literalmente defendible, 'reseca los abismos' o 'seca las profundidades' suena más idiomático. Mantener 'abismos' es bueno por imaginería; ajustar el verbo mejora la lectura.
  revised_spanish_text: 'temible, cuyo aspecto reseca los abismos, y cuya indignación hace que las montañas se derritan, y cuya verdad da testimonio: Escucha, oh Señor, la oración'
  revision_rationale: 'Se ajustan tres puntos de estilo-fidelidad: ''temible'' por ''terrible'' para reflejar mejor ''terribilis'' en español actual; ''aspecto'' por ''apariencia'' para una teofanía más natural y fiel a ''aspectus''; y ''reseca los abismos'' para mejorar la idiomaticidad sin perder la imagen de ''arefacit abyssos''. No se requieren notas.'
