  yaml_path: translation/extra_canonical/2_esdras/008/023.yaml
  text: 'terrible, whose appearance dries up the depths, and whose indignation makes the mountains melt, and whose truth bears witness: Hear, O Lord, the prayer'
  revision_pass:
    model: gpt-5.4
