  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: Propter quod miseriae multae miserabiles efficientur qui habitant saeculum in nouissimis, quia in multa superbia ambulaūerunt. Tu autem pro te intellege et de similibus tuis inquire
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/008/050.yaml
  text: Therefore many grievous miseries will come upon those who inhabit the world in the last times[a], because they have walked in great pride. But understand for yourself, and inquire concerning those like yourself.
  footnotes:
  - marker: a
    text: Or 'and have not judged yourself among the righteous, so that you should be greatly glorified.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:37Z'
    unchanged: false
    changes_summary: Replaced 'miserable miseries will befall' with 'grievous miseries will come upon' for more natural and accurate formal English; adjusted 'those like you' to 'those like yourself' for slightly more formal register and closer parallelism.
translation:
  language: es
  text: Por tanto, muchas graves desgracias vendrán sobre los que habitan el mundo en los últimos tiempos[a], porque han andado en gran soberbia. Pero entiéndelo por ti mismo, y pregunta acerca de los que son como tú.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, según una lectura anterior: «y no te has juzgado entre los justos, para que fueras grandemente glorificado».'
    reason: Conservar en español la nota de auditoría inglesa sobre la lectura previamente usada, ya que forma parte del rastro documental del pasaje aunque no corresponde al texto fuente de este versículo.
lexical_decisions:
- source_word: Propter quod
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: propter quod
  rationale: Expresa consecuencia directa y mantiene el enlace lógico del latín sin añadir matiz interpretativo.
- source_word: miseriae multae miserabiles efficientur
  english_pob_choice: many grievous miseries will come upon
  chosen_spanish: muchas miserias graves vendrán sobre
  alternatives_spanish:
  - muchos males terribles caerán sobre
  - muchas desgracias dolorosas vendrán sobre
  lexicon: miseria
  rationale: El latín acumula intensidad con miseriae multae miserabiles efficientur; 'miserias graves' conserva la repetición y el tono fuerte sin suavizar el peso léxico.
- source_word: qui habitant saeculum in nouissimis
  english_pob_choice: those who inhabit the world in the last times
  chosen_spanish: los que habitan el mundo en los últimos tiempos
  alternatives_spanish:
  - los que habitan la era en los últimos días
  - los que viven en el siglo en los últimos tiempos
  lexicon: saeculum
  rationale: '''Mundo'' comunica bien el ámbito humano/histórico del latín en español contemporáneo; ''los últimos tiempos'' preserva el valor escatológico de in nouissimis.'
- source_word: quia in multa superbia ambulauerunt
  english_pob_choice: because they have walked in great pride
  chosen_spanish: porque han andado en gran soberbia
  alternatives_spanish:
  - porque han caminado en mucha soberbia
  - porque vivieron en gran orgullo
  lexicon: superbia
  rationale: '''Andado en'' reproduce la metáfora moral de ambulare; ''soberbia'' es la equivalencia más precisa y bíblica para superbia, mejor que ''orgullo'' en este contexto.'
- source_word: Tu autem pro te intellege
  english_pob_choice: But understand for yourself
  chosen_spanish: Pero comprende por ti mismo
  alternatives_spanish:
  - Pero entiende por ti mismo
  - Pero comprende para ti
  lexicon: intellege
  rationale: '''Comprende'' conserva el tono exhortativo e intelectual; ''por ti mismo'' refleja pro te con naturalidad en español.'
- source_word: et de similibus tuis inquire
  english_pob_choice: and inquire concerning those like yourself
  chosen_spanish: e indaga acerca de los que son como tú
  alternatives_spanish:
  - e investiga acerca de los semejantes a ti
  - e inquiere sobre los de tu clase
  lexicon: similibus
  rationale: '''Los que son como tú'' mantiene la comparación personal y evita una formulación socialmente cargada; ''indaga'' conserva el mandato de examinar con atención.'
translation_notes:
  revision_awareness: The English audit trail corrected a prior mismatch with the preceding verse and established the actual source sense for 2 Esdras 8:50. The Spanish draft follows the cleaned Latin source rather than the discarded earlier English wording. No footnote is required because the source and the audited English revision align on the verse sense now rendered.
  spanish_consistency_notes:
  - Se mantuvo un registro solemne y bíblico sin copiar fórmulas tradicionales que oculten el latín.
  - '''Soberbia'' se prefirió a ''orgullo'' para conservar la carga moral del original.'
  - '''Mundo'' se usa para saeculum en este contexto apocalíptico; no se eligió ''siglo'' porque en español podría sonar ambiguo o arcaico.'
