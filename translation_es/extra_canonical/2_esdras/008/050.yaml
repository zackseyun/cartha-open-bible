    reason: Conservar en español la nota de auditoría inglesa sobre la lectura previamente usada, ya que forma parte del rastro documental del pasaje aunque no corresponde al texto fuente de este versículo.
  revision_rationale: Se pulió la redacción para un español más natural y eclesialmente legible sin apartarse del latín ni del POB inglés revisado. 'graves desgracias' expresa mejor la idea de calamidades severas; 'entiéndelo por ti mismo' y 'pregunta acerca de' suavizan calcos y mejoran la fluidez. Se añadió la nota documental [a] para preservar el audit trail inglés sobre la lectura previa errónea.
