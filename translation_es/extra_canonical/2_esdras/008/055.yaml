translation:
  language: es
  text: al final, el tesoro de la inmortalidad[a]. Por tanto, no sigas añadiendo
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el tesoro de la inmortalidad». El latín aquí es conciso y no añade más explicación en este fragmento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: in finem
  english_pob_choice: in the end
  chosen_spanish: al final
  alternatives_spanish:
  - en el fin
  - al término
  lexicon: adverbial phrase
  rationale: La frase latina es breve y adverbial; en español, 'al final' comunica con naturalidad el cierre o desenlace sin introducir una interpretación más técnica de 'fin' como meta escatológica.
- source_word: thesaurus
  english_pob_choice: the treasure
  chosen_spanish: el tesoro
  alternatives_spanish:
  - el depósito
  - el cofre
  lexicon: noun
  rationale: '''Thesaurus'' se rinde de forma directa como ''tesoro'', que es la equivalencia más clara y fiel en español.'
- source_word: inmortalitatis
  english_pob_choice: of immortality
  chosen_spanish: de la inmortalidad
  alternatives_spanish:
  - de inmortalidad
  - de vida inmortal
  lexicon: noun genitive
  rationale: El genitivo latino pide relación posesiva o caracterizadora. 'De la inmortalidad' conserva el sustantivo abstracto sin añadir explicación interpretativa.
- source_word: Noli ergo adhuc adicere
  english_pob_choice: Therefore do not continue to add
  chosen_spanish: Por tanto, no sigas añadiendo
  alternatives_spanish:
  - Así que no añadas más
  - Por eso no continúes añadiendo
  lexicon: imperative phrase
  rationale: '''Noli ... adicere'' exige un negativo exhortativo. ''No sigas añadiendo'' preserva el valor de continuidad de ''adhuc'' mejor que un simple ''no añadas''.'
theological_decisions:
- issue: Sentido escatológico de 'in finem'
  english_pob_reading: in the end
  chosen_spanish_reading: al final
  alternative_spanish_readings:
  - en el fin
  - al término
  rationale: El fragmento latino dado no desarrolla más contexto; por eso conviene una lectura sobria y no doctrinalmente expandida. 'Al final' mantiene apertura entre desenlace temporal y escatológico sin forzarlo.
  doctrine_reference: escatología / consumación
- issue: Naturaleza de 'thesaurus inmortalitatis'
  english_pob_reading: the treasure of immortality
  chosen_spanish_reading: el tesoro de la inmortalidad
  alternative_spanish_readings:
  - el tesoro inmortalidad
  - el tesoro de vida inmortal
  rationale: Se conserva la imagen de un 'tesoro' como bien precioso relacionado con la inmortalidad, sin convertirla en una paráfrasis doctrinal. La formulación es suficientemente literal y natural en español.
  doctrine_reference: vida eterna / inmortalidad
translation_notes:
  revision_awareness: 'La base inglesa fue corregida por una reasignación de versículo: el texto latino de este registro no corresponde al antiguo ''root of evil'' sino a ''in finem thesaurus inmortalitatis. Noli ergo adhuc adicere''. La versión española sigue esa línea realineada y no conserva la lectura previa errónea.'
  spanish_consistency_notes:
  - Se mantuvo 'tesoro' como equivalencia estable de 'thesaurus'.
  - Se evitó 'SEÑOR' u otras fórmulas no presentes en el latín.
  - No se añadió puntuación interpretativa más allá de una coma natural en español.
  - '''Inmortalidad'' se conservó como sustantivo abstracto, sin expandirlo a ''vida eterna''.'
