  - el que preserva y el que es preservado serán preservados por tu preservación
  rationale: El texto presenta una afirmación amplia de preservación divina que abraza ambos lados de la relación. Mantengo la redundancia intencional del original para no diluir su fuerza retórica ni su amplitud conceptual.
  doctrine_reference: Providencia y preservación divina; fidelidad textual al paralelismo del original
