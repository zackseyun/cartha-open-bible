lexical_decisions:
- source_word: seruat / seruatur / seruabuntur / seruatione
  english_pob_choice: preserves / is preserved / will be preserved / preservation
  chosen_spanish: preserva / es preservado / serán preservados / preservación
  alternatives_spanish:
  - guarda / es guardado / serán guardados / guarda
  - conserva / es conservado / serán conservados / conservación
  lexicon: Latin seruare
  rationale: El latín repite la misma raíz para la acción activa, la pasiva y el sustantivo; por eso conviene mantener la misma familia léxica en español. 'Preservar' conserva mejor el paralelismo con 'preservación' y evita que el lector pierda la relación intratextual.
- source_word: quod seruat et quod seruatur utraque
  english_pob_choice: both what preserves and what is preserved
  chosen_spanish: tanto lo que preserva como lo que es preservado
  alternatives_spanish:
  - 'ambas cosas: la que preserva y la que es preservada'
  - lo que preserva y lo que es preservado, ambos
  lexicon: Latin quod ... utraque
  rationale: La construcción enfática del latín pide una formulación inclusiva que mantenga el doble polo activo/pasivo. 'Tanto... como...' reproduce bien la correlación y suena natural en español bíblico contemporáneo.
- source_word: matrix
  english_pob_choice: womb
  chosen_spanish: vientre
  alternatives_spanish:
  - útero
  - seno materno
  lexicon: Latin matrix
  rationale: '''Matrix'' aquí designa el seno materno. ''Vientre'' es transparente y reverente en español, y mantiene un registro bíblico natural sin introducir tecnicismos médicos que el texto no exige.'
- source_word: iterum reddit
  english_pob_choice: again gives back
  chosen_spanish: nuevamente devuelva
  alternatives_spanish:
  - vuelva a dar
  - entregue de nuevo
  - devuelva otra vez
  lexicon: Latin reddere
  rationale: El giro latino apunta a restitución o retorno. 'Devuelva' conserva la idea de dar de vuelta; 'nuevamente' refleja el iterum. La forma queda abierta porque el fragmento se interrumpe en esta sección.
theological_decisions:
- issue: Conservación divina de lo que actúa y de lo que padece la acción
  english_pob_reading: both what preserves and what is preserved will be preserved by your preservation
  chosen_spanish_reading: tanto lo que preserva como lo que es preservado serán preservados por tu preservación
  alternative_spanish_readings:
