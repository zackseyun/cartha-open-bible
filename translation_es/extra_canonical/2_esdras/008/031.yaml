translation:
  language: es
  text: juzgados, pero ama a los que siempre han confiado en tu gloria. Porque nosotros y nuestros padres hemos vivido según costumbres mortales, pero tú, sin embargo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: iudicati
  english_pob_choice: judged
  chosen_spanish: juzgados
  alternatives_spanish:
  - juzgados como culpables
  - condenados
  lexicon: iudico
  rationale: El participio latino admite la idea de ser juzgados en sentido forense. «Juzgados» conserva la brevedad y la tensión del original sin decidir más de lo que el texto dice.
- source_word: diligas
  english_pob_choice: love
  chosen_spanish: ama
  alternatives_spanish:
  - ama
  - amen
  lexicon: diligo
  rationale: En este contexto el verbo expresa una actitud de amor benevolente hacia un grupo. «Ama» es natural en español y mantiene el valor exhortativo sin añadir matices no presentes.
- source_word: qui semper in tua gloria confiderunt
  english_pob_choice: those who have always trusted in your glory
  chosen_spanish: a los que siempre han confiado en tu gloria
  alternatives_spanish:
  - a los que siempre han puesto su confianza en tu gloria
  - a quienes siempre han confiado en tu gloria
  lexicon: confido
  rationale: «Confiado en tu gloria» sigue de cerca el latín y preserva la posible tensión semántica de gloria como esfera o objeto de confianza. Se evita normalizarlo a una formulación más interpretativa.
- source_word: mortalibus moribus
  english_pob_choice: mortal ways
  chosen_spanish: según costumbres mortales
  alternatives_spanish:
  - en caminos mortales
  - con conductas mortales
  lexicon: mores / mortalis
  rationale: El latín dice literalmente «con costumbres mortales». «Según costumbres mortales» mantiene la relación con moribus y suena más idiomático en español que un calco rígido, sin perder el contraste con la gloria divina.
- source_word: tu autem
  english_pob_choice: but you, however,
  chosen_spanish: pero tú, sin embargo,
  alternatives_spanish:
  - pero tú, por tu parte,
  - pero tú
  lexicon: autem
  rationale: El texto latino se interrumpe en esta expresión. «Pero tú, sin embargo,» reproduce el giro contrastivo y deja visible la suspensión del verso, como en el fuente.
theological_decisions:
- issue: Mantener el final truncado del testimonio latino
  english_pob_reading: but you, however,
  chosen_spanish_reading: pero tú, sin embargo,
  alternative_spanish_readings:
  - pero tú
  - mas tú
  rationale: La fuente latina termina abruptamente en tu autem. No se debe completar ni suavizar el cierre; la traducción española conserva la incompletitud para ser auditable y fiel al estado del texto.
  doctrine_reference: Crítica textual / fidelidad al testimonio base
translation_notes:
  revision_awareness: El renglón inglés auditado fue revisado para restaurar el segmento inicial «judged, but love those who have always trusted in your glory» y para eliminar la expansión no sustentada «because of us sinners, are called merciful». La versión española sigue esa revisión y conserva además la interrupción final del latín.
  spanish_consistency_notes:
  - He mantenido un registro sobrio y bíblico, evitando añadir términos no presentes en el latín.
  - No se ha introducido «Mesías», «SEÑOR» ni otros equivalentes doctrinales ajenos al pasaje.
  - La cláusula final queda abierta deliberadamente para reflejar el corte del texto fuente.
