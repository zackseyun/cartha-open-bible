translation:
  language: es
  text: Pero te expondré una comparación ante ti[a], Esdras. Así como, si preguntas a la tierra, ella te dirá que produce mucha arcilla, de la cual se hacen vasijas de barro, pero poco polvo, del cual procede el oro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te diré una comparación»'
    reason: previous_rendering
  - marker: b
    text: 'O: «del cual se forma el oro»'
    reason: alternative_reading
lexical_decisions:
- source_word: Dicam autem coram te similitudinem
  english_pob_choice: But I will set forth a comparison before you, Ezra.
  chosen_spanish: Pero pondré ante ti una comparación, Ezra[a].
  alternatives_spanish:
  - Pero te presentaré una comparación, Ezra.
  - Pero diré una comparación delante de ti, Ezra.
  lexicon: dicam = diré / pondré; coram te = ante ti / delante de ti; similitudinem = comparación / semejanza
  rationale: El latín no solo dice 'decir', sino también 'coram te', es decir, 'ante ti' o 'en tu presencia'. 'Pondré ante ti' mantiene la fuerza expositiva de la imagen y suena natural en español. 'Comparación' conserva el valor de similitud/analogía del original y del auditorial inglés.
- source_word: quomodo autem interrogas terram et dicet tibi
  english_pob_choice: Just as, if you ask the earth, it will tell you
  chosen_spanish: Así como, si preguntas a la tierra, ella te dirá
  alternatives_spanish:
  - Del mismo modo, si preguntas a la tierra, te dirá
  - Como cuando preguntas a la tierra, ella te dirá
  lexicon: interrogas = preguntas; dicet tibi = te dirá
  rationale: Se sigue de cerca la estructura condicional/comparativa del latín. 'La tierra' se conserva como sujeto personificado, como en el inglés auditado.
- source_word: dabit terram multam magis unde fiat fictile
  english_pob_choice: it yields much clay, from which earthen vessels are made
  chosen_spanish: produce mucha arcilla, de la cual se hacen vasijas de barro
  alternatives_spanish:
  - da mucha arcilla, de la cual se hacen vasijas de barro
  - provee mucha arcilla, de la cual se hacen vasijas de barro
  lexicon: dabit = da / produce / provee / yields; terra(m) = tierra; fictile = vasija de barro / loza / objeto de barro
  rationale: '''Produce'' transmite bien el sentido de rendimiento de la tierra en español. Se evita ''tierra'' como objeto directo en la frase porque en español suena menos claro; el sujeto implícito es ''la tierra''. ''Vasijas de barro'' expresa el valor material de fictile con naturalidad.'
- source_word: paruum autem puluerem unde aurum fit
  english_pob_choice: but little dust from which gold comes
  chosen_spanish: pero poco polvo, de donde sale el oro[b]
  alternatives_spanish:
  - pero poco polvo, de donde se hace el oro
  - pero poco polvo, del cual sale el oro
  lexicon: paruum = poco; puluerem = polvo; aurum fit = el oro sale / se forma / llega a ser
  rationale: '''Sale el oro'' conserva la imagen de procedencia sin imponer una explicación metalúrgica. La comparación depende del contraste entre mucha arcilla y poco polvo; por eso se mantiene ''poco polvo'' con fuerza comparativa.'
theological_decisions:
- issue: Personificación de la tierra como interlocutor
  english_pob_reading: if you ask the earth, it will tell you
  chosen_spanish_reading: si preguntas a la tierra, ella te dirá
  alternative_spanish_readings:
  - si preguntas a la tierra, te dirá
  - si interrogas a la tierra, ella te responderá
  rationale: El texto presenta a la tierra como un testigo figurado que responde, un recurso retórico que debe mantenerse. No se suaviza a una formulación impersonal porque esa personificación es parte del argumento comparativo.
  doctrine_reference: Retórica sapiencial / personificación figurada
- issue: Contraste cuantitativo entre arcilla y polvo de oro
  english_pob_reading: much clay ... but little dust
  chosen_spanish_reading: mucha arcilla ... pero poco polvo
  alternative_spanish_readings:
  - muchísima arcilla ... pero muy poco polvo
  - mucha arcilla ... y poco polvo
  rationale: La comparación subraya una desproporción real. Se conserva con 'mucha' y 'poco', evitando intensificar más de lo que el latín exige y manteniendo la oposición estructural.
  doctrine_reference: Imagen comparativa; no doctrinal
translation_notes:
  revision_awareness: Se incorporó la corrección del audit trail sobre coram te ('ante ti') y la fuerza comparativa del contraste material. También se evitó la simplificación de la cláusula final, preservando la imagen de procedencia del oro desde el polvo.
  spanish_consistency_notes:
  - Se usó 'arcilla' para multam ... unde fiat fictile, porque comunica mejor el material que 'tierra' en español y mantiene la imagen de alfarería.
  - Se conservó 'Ezra' como vocativo propio del texto fuente y del inglés auditado.
  - Se evitó 'SEÑOR' y cualquier terminología no presente en el pasaje; el texto no contiene nombres divinos explícitos.
  - Las notas [a] y [b] están ancladas exactamente en el texto español para cumplir la validación.
