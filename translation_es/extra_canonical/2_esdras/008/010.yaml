lexical_decisions:
- source_word: in ea creata fuerint
  english_pob_choice: the things that have been created in it
  chosen_spanish: las cosas que han sido creadas en él
  alternatives_spanish:
  - lo que ha sido creado en él
  - las cosas creadas en él
  lexicon: creare -> crear; in ea -> en él
  rationale: El latín habla de cosas creadas dentro de “ella/él” (en el contexto, el referente puede entenderse como el cuerpo o el mundo mencionado antes). En español, “las cosas que han sido creadas en él” conserva el hecho de la creación y el valor referencial de in ea sin añadir interpretación innecesaria.
- source_word: membris
  english_pob_choice: members
  chosen_spanish: miembros
  alternatives_spanish:
  - partes
  - miembros corporales
  - miembros del cuerpo
  lexicon: membrum -> miembro
  rationale: ‘Membris’ se traduce con el sentido corporal de ‘miembros’, que es preciso y natural en español. Otras opciones, como ‘partes’, diluyen la imagen concreta del latín.
- source_word: ipsis
  english_pob_choice: those very
  chosen_spanish: esos mismos
  alternatives_spanish:
  - los mismos
  - esos mismos miembros
  lexicon: ipse -> mismo / ese mismo
  rationale: 'El intensivo ipsis añade énfasis: no solo ‘de miembros’, sino ‘de esos mismos miembros’. ‘Esos mismos’ reproduce ese peso sin sonar artificial en español.'
theological_decisions:
- issue: Referencia del pronombre in ea
  english_pob_reading: the things that have been created in it
  chosen_spanish_reading: las cosas que han sido creadas en él
  alternative_spanish_readings:
  - las cosas que han sido creadas en ella
  - las cosas que han sido creadas en eso
  rationale: El texto latino usa in ea, que puede depender del sustantivo al que remite en el contexto mayor. Sin inventar una identificación no provista en este fragmento, se mantiene un pronombre neutro/masculino por fluidez española y por fidelidad mínima al fragmento disponible.
  doctrine_reference: Principio de traducción referencial con ambigüedad pronominal conservada
- issue: Énfasis de ipsis membris
  english_pob_reading: from those very members
  chosen_spanish_reading: de esos mismos miembros
  alternative_spanish_readings:
  - de los mismos miembros
  - de esos propios miembros
  rationale: La revisión inglesa destaca que ipsis no es un mero demostrativo, sino un intensivo. ‘Esos mismos’ comunica la intensificación sin perder la fuente corporal señalada por ex.
  doctrine_reference: Intensificación léxica del latín ipsis
translation_notes:
  revision_awareness: 'La revisión más reciente corrige una pérdida de énfasis: donde antes la traducción inglesa decía simplemente ‘those members’, el último pase consolidó ‘those very members’ por ex ipsis membris. La versión española refleja ese intensivo con ‘esos mismos miembros’ y conserva la sintaxis abierta del fragmento, que termina en ‘es decir,’.'
  spanish_consistency_notes:
  - Se mantiene un español sobrio y textual, sin convertir el pasaje en una paráfrasis explicativa.
  - Se evita ‘señalaste’ o ‘ordenaste’ para no desplazar el valor fuerte de ‘mandaste’ en el latín.
  - La forma ‘en él’ sigue la cautela del fragmento disponible y no fuerza una identificación contextual no presente en este expediente.
