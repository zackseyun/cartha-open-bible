    issue: «en él» traduce in ea con género incorrecto
    rationale: El texto fuente dice in ea, no in eo. Aunque el referente contextual no esté plenamente visible en el fragmento, la forma femenina es parte de la evidencia fuente y no debe cambiarse a masculino sin base textual.
  - severity: medium
    issue: La nota al pie repite la misma lectura en vez de preservar una alternativa significativa
    rationale: La nota inglesa registra una alternativa histórica sin «those very». En español, la nota actual repite exactamente el texto principal y no aporta información útil. Debe reflejar la alternativa correspondiente, por ejemplo sin «esos mismos».
