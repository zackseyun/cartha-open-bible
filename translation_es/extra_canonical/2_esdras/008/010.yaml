translation:
  language: es
  text: las cosas que han sido creadas en ella[a], mandaste que de esos mismos miembros, es decir,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las cosas que han sido creadas en ella, mandaste que de los miembros, es decir,»'
