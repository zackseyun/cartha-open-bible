    changes_summary: Replaced the awkward plural phrasing with a more natural singular construction while preserving the Latin sense and parallelism.
translation:
  language: es
  text: 'Y él me respondió y dijo[a]: «Lo presente es para los presentes, y lo futuro es para los futuros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lo que pertenece al presente es para los presentes, y lo que pertenece al futuro es para los futuros».'
    reason: alternative_rendering
lexical_decisions:
- source_word: quae sunt praesentia
  english_pob_choice: What is present
  chosen_spanish: Lo que es presente
  alternatives_spanish:
  - Lo presente
  - Las cosas presentes
  lexicon: Latin praesens / praesentia
  rationale: Conservo la construcción de paralelismo con lo que sigue y evito convertirlo en una paráfrasis temporal más abstracta. 'Lo que es presente' mantiene el valor de estado/presencia y sigue siendo natural en español bíblico moderno.
- source_word: praesentibus
  english_pob_choice: for the present
  chosen_spanish: para los presentes
  alternatives_spanish:
  - para el presente
  - para quienes están presentes
  lexicon: Latin dative plural
  rationale: El latín está en dativo plural y se refiere a personas, no a una época abstracta. Por eso traduzco 'los presentes' para conservar el contraste entre dos grupos.
- source_word: quae futura
  english_pob_choice: what is future
  chosen_spanish: lo que es futuro
  alternatives_spanish:
  - lo futuro
  - las cosas futuras
  lexicon: Latin futurus / futura
  rationale: Mantengo el paralelismo con 'lo que es presente' y con la revisión que preserva la oposición entre presente y futuro sin sobrecargar la frase.
- source_word: futuris
  english_pob_choice: for the future
  chosen_spanish: para los futuros
  alternatives_spanish:
  - para el futuro
  - para quienes vendrán
  lexicon: Latin dative plural
  rationale: Como en 'praesentibus', el dativo plural apunta a personas futuras. 'Los futuros' es poco común pero comprensible en español bíblico; preserva la tensión apocalíptica entre dos grupos humanos.
theological_decisions:
- issue: Contraste apocalíptico entre dos grupos humanos
  english_pob_reading: What is present is for the present, and what is future is for the future.
  chosen_spanish_reading: Lo que es presente es para los presentes, y lo que es futuro es para los futuros.
  alternative_spanish_readings:
  - Lo presente es para los presentes, y lo futuro para los futuros.
  - Lo que pertenece al presente es para los que están presentes, y lo que pertenece al futuro para los que estarán.
  rationale: La revisión indica que los dativos plurales no designan simples periodos, sino personas de las dos eras. La redacción elegida conserva esa lectura y evita borrar el matiz escatológico del latín.
  doctrine_reference: 4 Esdras 8:46; contraste entre el tiempo presente y el futuro en el discurso apocalíptico
translation_notes:
  revision_awareness: Seguí la revisión más reciente que corrigió la lectura abstracta de 'for the present / for the future' y restituyó el sentido de los dativos plurales 'praesentibus' y 'futuris' como personas pertenecientes a cada era. También dejé la frase final con suspensión porque el latín proporcionado queda truncado ('Multum enim tibi restat ut').
  spanish_consistency_notes:
  - Usé 'presentes' y 'futuros' como sustantivos para reflejar los dativos plurales del latín.
  - Mantuve 'Y él me respondió y dijo' como fórmula narrativa directa y sobria.
  - No traduje 'Multum enim tibi restat ut' por completo porque el fragmento fuente está incompleto en el paquete de texto.
