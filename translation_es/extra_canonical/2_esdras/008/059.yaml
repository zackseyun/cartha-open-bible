id: 2ES.8.59
reference: 2 Esdras 8:59
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: enim uos susipient quae praedicta sunt, sic eos sitis et cruciatus quae parata sunt. non enim altissimus uoluit hominem disperdi ; Sed ipsi qui creati sunt coinquinauerunt nomen eius
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/008/059.yaml
  text: For what has been foretold will receive you[a], but thirst and torments, which have been prepared, will receive them. For the Most High did not will that man should be destroyed; but they themselves, who were created, defiled his name.
  footnotes:
  - marker: a
    text: Or 'Still more, they trampled his righteous ones'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:48:13Z'
    unchanged: false
    changes_summary: Capitalized the opening for formal register, changed 'torment' to plural 'torments' to match the source, and added 'have been' for a more natural rendering of the prepared state.
translation:
  language: es
  text: Porque lo que ha sido predicho los alcanzará[a], pero la sed y los tormentos, que han sido preparados, los recibirán a ellos. Porque el Altísimo no quiso que el hombre fuera destruido; pero ellos mismos, que fueron creados, profanaron su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que ha sido anunciado les sobrevendrá»; el latín expresa que lo predicho llegará sobre ellos o los alcanzará.'
    reason: alternative_rendering_for_natural_spanish
lexical_decisions:
- source_word: uos susipient
  english_pob_choice: will receive you
  chosen_spanish: os recibirá
  alternatives_spanish:
  - os acogerá
  - os recibirá a vosotros
  lexicon: suscipio
  rationale: El latín aquí tiene el sentido de ‘recibir’ o ‘alcanzar’ a alguien; en contexto escatológico no es ‘acoger’ en sentido hospitalario, sino que lo anunciado ‘os recibirá’. Mantengo el complemento directo en español con ‘os’ para reflejar el choque verbal del original.
- source_word: quae praedicta sunt
  english_pob_choice: what has been foretold
  chosen_spanish: lo que ha sido anunciado
  alternatives_spanish:
  - lo que ha sido predicho
  - lo que se ha anunciado de antemano
  lexicon: praedico
  rationale: ‘Praedicta’ apunta a lo dicho con anterioridad. ‘Anunciado’ suena natural en español y conserva la referencia a algo previamente declarado, sin cargarlo excesivamente con tecnicismo profético.
- source_word: sitis
  english_pob_choice: thirst
  chosen_spanish: la sed
  alternatives_spanish:
  - sed
  - sed intensa
  lexicon: sitis
  rationale: El latín nombra el estado de sed; el artículo ayuda al ritmo español sin añadir contenido.
- source_word: cruciatus
  english_pob_choice: torments
  chosen_spanish: los tormentos
  alternatives_spanish:
  - los tormentos
  - los suplicios
  lexicon: cruciatus
  rationale: ‘Tormentos’ conserva la fuerza penal y aflictiva del plural latino. ‘Suplicios’ sería posible, pero ‘tormentos’ sigue más de cerca la tradición semántica del texto y la decisión inglesa revisada.
- source_word: altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Altísimo
  - el Muy Alto
  lexicon: altissimus
  rationale: ‘El Altísimo’ es la equivalencia natural y reverente para el título divino latino.
- source_word: hominem disperdi
  english_pob_choice: man should be destroyed
  chosen_spanish: el hombre fuera destruido
  alternatives_spanish:
  - el hombre pereciera
  - el hombre fuese destruido
  lexicon: homo / disperdo
  rationale: La construcción impersonal mantiene el valor genérico de ‘hominem’. ‘Destruido’ sigue la fuerza de ‘disperdi’ mejor que una paráfrasis más amplia.
- source_word: coinquinauerunt nomen eius
  english_pob_choice: defiled his name
  chosen_spanish: profanaron su nombre
  alternatives_spanish:
  - contaminaron su nombre
  - ensuciaron su nombre
  lexicon: coinquino
  rationale: ‘Coinquinare’ es manchar/contaminar/profanar. ‘Profanaron’ transmite bien la gravedad religiosa y la ofensa contra el nombre divino en español bíblico contemporáneo.
theological_decisions:
- issue: Referencia al Altísimo y voluntad divina respecto a la destrucción del hombre
  english_pob_reading: For the Most High did not will that man should be destroyed
  chosen_spanish_reading: Porque el Altísimo no quiso que el hombre fuera destruido
  alternative_spanish_readings:
  - Porque el Altísimo no quiso destruir al hombre
  - Porque el Altísimo no quiso que el hombre pereciera
  rationale: La frase preserva el foco en la voluntad divina negativa respecto a la destrucción humana. No se suaviza hacia una formulación más interpretativa que podría diluir la afirmación antropológica y teológica del texto.
  doctrine_reference: Providencia divina; dignidad de la criatura humana
- issue: 'Sujeto y objeto en el cierre: los creados que profanan el nombre'
  english_pob_reading: but they themselves, who were created, defiled his name
  chosen_spanish_reading: pero ellos mismos, que fueron creados, profanaron su nombre
  alternative_spanish_readings:
  - pero ellos, que fueron creados, contaminaron su nombre
  - pero ellos mismos, criaturas suyas, profanaron su nombre
  rationale: 'Se conserva la tensión: los mismos que fueron creados son los que profanan. ‘Su nombre’ mantiene la referencia divina sin aclaración añadida que el texto no da.'
  doctrine_reference: Responsabilidad humana; santidad del nombre divino
translation_notes:
  revision_awareness: 'La revisión inglesa reciente corrigió un error grave de correspondencia con el latín: la lectura anterior sobre ‘trampled his righteous ones’ pertenecía al verso precedente, no a 8:59. Este draft sigue el texto latino limpio de Bensly 1895 + fragmento perdido, y refleja la estructura completa del verso: anuncio que alcanza a ‘vos’, sed y tormentos preparados para ‘ellos’, declaración sobre la voluntad del Altísimo y la profanación de su nombre por los creados.'
  spanish_consistency_notes:
  - Se usa ‘Altísimo’ para altissimus, conforme al registro bíblico y la decisión inglesa.
  - Se mantiene ‘nombre’ con posesivo ‘su’ para preservar la referencia reverente al nombre de Dios sin introducir una glosa.
  - ‘Tormentos’ va en plural para concordar con el latín cruciatus y la revisión inglesa.
  - La nota a marca una alternativa semántica real del verbo suscipere en contexto futuro/escatológico.
