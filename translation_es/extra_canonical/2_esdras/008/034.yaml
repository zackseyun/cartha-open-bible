translation:
  language: es
  text: Porque ¿qué es el hombre, para que te enojes con él, o una raza corruptible, para que te amargues tanto contra ella?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que estés tan amargado contra ella». El latín amariceris expresa llegar a estar amargo o agraviado contra alguien; aquí se prefiere la forma verbal «te amargues» por ser más natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: quid est enim homo
  english_pob_choice: For what is man
  chosen_spanish: Porque ¿qué es el hombre
  alternatives_spanish:
  - Pues, ¿qué es el hombre
  - ¿Qué es el hombre, pues
  lexicon: quid / homo
  rationale: El latín plantea una pregunta retórica con valor de fundamento. «Porque» conserva el enlace argumentativo del contexto, y «¿qué es el hombre?» reproduce la construcción breve y solemne del original y del POB inglés sin añadir interpretación.
- source_word: indigneris
  english_pob_choice: that you should be angry with him
  chosen_spanish: para que te enojes con él
  alternatives_spanish:
  - para que te irrites con él
  - para que muestres indignación contra él
  lexicon: indignor
  rationale: En este contexto, el verbo latino expresa indignación o enojo dirigido contra una persona. «Enojes con él» es natural en español y mantiene la intensidad relacional sin suavizarla indebidamente.
- source_word: genus corruptibile
  english_pob_choice: a corruptible race
  chosen_spanish: una raza corruptible
  alternatives_spanish:
  - un linaje corruptible
  - una descendencia corruptible
  lexicon: genus / corruptibilis
  rationale: «Genus» aquí puede significar raza, linaje o estirpe. «Raza» sigue de cerca el POB inglés y preserva el alcance colectivo; «corruptible» traduce el adjetivo con transparencia lexical.
- source_word: amariceris
  english_pob_choice: you should be so embittered against it
  chosen_spanish: estés tan embitterado contra ella
  alternatives_spanish:
  - estés tan amargado contra ella
  - te amargues tanto contra ella
  lexicon: amarico
  rationale: El latín sugiere ser hecho amargo o embittered. La forma escogida mantiene la fuerza aspectual del POB inglés, aunque en español la formulación requiere un calco expresivo para no perder la imagen de amargura causada por la reacción divina.
theological_decisions:
- issue: La dirección de la pregunta retórica sobre la reacción divina ante el ser humano
  english_pob_reading: For what is man, that you should be angry with him, or a corruptible race, that you should be so embittered against it?
  chosen_spanish_reading: Porque ¿qué es el hombre, para que te enojes con él, o una raza corruptible, para que estés tan embitterado contra ella?
  alternative_spanish_readings:
  - Porque ¿qué es el hombre, para que te irrites con él, o una raza corruptible, para que estés tan amargado contra ella?
  rationale: El texto presenta una súplica que reconoce la pequeñez humana frente a la respuesta divina. La traducción conserva la tensión reverente sin atenuar el juicio implícito del pasaje.
  doctrine_reference: Antropología bíblica; teodicea orante en literatura de oración intercesora
translation_notes:
  revision_awareness: El inglés auditado fue revisado de «be so bitter against it» a «be so embittered against it» para reflejar mejor amariceris. La versión española sigue esa revisión y evita una formulación que sugiera solo amargura subjetiva, procurando conservar la idea de un volverse amargo o embittered contra el objeto referido.
  spanish_consistency_notes:
  - Se mantuvo «Dios» implícito sin introducir un sujeto explícito, en línea con el latín y el inglés.
  - Se eligió «raza» para genus por coherencia con el inglés POB y por su valor colectivo; «linaje» queda como alternativa más genealógica.
  - La puntuación reproduce la estructura retórica de dos miembros paralelos con pregunta principal y cláusula subordinada final.
