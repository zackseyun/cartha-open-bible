translation:
  language: es
  text: Porque así se declararán tu justicia y tu bondad, Señor, cuando tengas misericordia de los que no tienen reserva de buenas obras.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: iusticia tua
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu rectitud
  - tu justicia recta
  lexicon: δικαιοσύνη / iusticia
  rationale: El latín iusticia corresponde de manera directa a «justicia». Mantengo el término principal de la POB inglesa y el valor forense/covenantal que el contexto sugiere, sin suavizarlo a una idea meramente moral.
- source_word: bonitas tua
  english_pob_choice: your goodness
  chosen_spanish: tu bondad
  alternatives_spanish:
  - tu benignidad
  - tu benevolencia
  lexicon: ἀγαθότης / bonitas
  rationale: bonitas expresa bondad en sentido de cualidad buena y benevolente; «bondad» es la opción natural en español y conserva el paralelo con «justicia».
- source_word: domine
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor Yahvé
  - Yahvé
  lexicon: κύριε / domine
  rationale: Aunque el texto latino dice domine, la forma vocativa establecida en español litúrgico y bíblico para address divino es «Señor». No se introduce «Yahvé» porque aquí el vocativo corresponde al tratamiento reverencial del hablante en la oración, no a una necesidad de transliteración del nombre.
- source_word: misertus fueris
  english_pob_choice: you have mercy
  chosen_spanish: tengas misericordia
  alternatives_spanish:
  - te hayas compadecido
  - tengas compasión
  lexicon: misereri
  rationale: El perfecto futuro/forma completiva latina expresa el acto de mostrar misericordia; en español, «tener misericordia» reproduce con naturalidad esa idea y mantiene el registro bíblico sin volverse arcaico.
- source_word: non habent substantiam operum bonorum
  english_pob_choice: have no store of good works
  chosen_spanish: no tienen provisión de buenas obras
  alternatives_spanish:
  - no tienen reserva de buenas obras
  - no poseen acumulación de buenas obras
  lexicon: substantia
  rationale: substantiam no significa literalmente «sustancia» aquí, sino patrimonio, provisión o reserva. «Provisión» preserva la imagen de algo acumulado o disponible; «buenas obras» sigue de cerca el inglés auditado y el valor del latín.
theological_decisions:
- issue: Relación entre justicia/bondad divinas y misericordia a quienes carecen de obras
  english_pob_reading: your righteousness and your goodness will be declared ... when you have mercy on those who have no store of good works
  chosen_spanish_reading: tu justicia y tu bondad se declararán ... cuando tengas misericordia de los que no tienen provisión de buenas obras
  alternative_spanish_readings:
  - tu justicia y tu bondad serán manifestadas ...
  - tu rectitud y tu bondad se declararán ...
  rationale: 'Conservo la tensión del texto: la justicia y la bondad de Dios se manifiestan precisamente al mostrar misericordia a quienes no pueden presentar un acopio de obras. No se reinterpreta la frase en términos de mérito humano ni se atenúa el contraste.'
  doctrine_reference: Soteriología y gratuidad de la misericordia divina
translation_notes:
  revision_awareness: El borrador sigue el sentido confirmado por la revisión más reciente, con acuerdo alto y sin cambios necesarios. No se introducen notas textuales porque el pasaje latino y la POB inglesa convergen estrechamente.
  spanish_consistency_notes:
  - Se mantiene «Señor» como vocativo reverencial consistente con el audit trail inglés, sin forzar la convención de máscara del nombre divino.
  - «Justicia» y «bondad» conservan el paralelismo del original y evitan una paráfrasis que diluya la relación con la misericordia.
  - «Provisión de buenas obras» evita una lectura materialista de substantia y conserva la imagen de reserva/abastecimiento que el inglés POB ya había fijado.
