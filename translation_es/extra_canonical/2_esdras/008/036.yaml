- from: Porque en esto se declarará tu justicia y tu bondad, Señor, cuando tengas misericordia de los que no tienen provisión de buenas obras.
  to: Porque así se declararán tu justicia y tu bondad, Señor, cuando tengas misericordia de los que no tienen reserva de buenas obras.
  rationale: Se ajusta una expresión discursiva para mayor naturalidad («Porque así») y se reemplaza «provisión» por «reserva» para reflejar mejor el sentido de substantiam como acopio o caudal de buenas obras, manteniendo intacto el contenido teológico y el registro digno del pasaje.
