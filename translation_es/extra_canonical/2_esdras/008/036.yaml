review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del latín y del rastro inglés: iusticia tua / bonitas tua = «tu justicia y tu bondad»; misertus fueris = «tengas misericordia»; y la cláusula final preserva que la misericordia se muestra hacia quienes carecen de una reserva de buenas obras. Sin embargo, «en esto» suena algo ambiguo frente a In hoc enim, y «provisión de buenas obras» no refleja con suficiente naturalidad la idea de substantiam como reserva o caudal acumulado.'
  spanish_quality_summary: El español es claro y digno, pero «provisión de buenas obras» resulta poco idiomático en este contexto teológico-devocional. «Reserva de buenas obras» o «caudal de buenas obras» comunica mejor la imagen de acopio. También conviene ajustar «Porque en esto» a «Porque así» para una lectura más natural sin perder el valor discursivo.
  glossary_alignment: 'La terminología principal está bien alineada: «justicia», «bondad», «Señor», «misericordia». No hay conflicto con los términos por defecto del proyecto. La única mejora léxica necesaria es substantiam operum bonorum, donde «reserva» refleja mejor el valor de patrimonio/acopio que «provisión».'
  issues:
  - severity: medium
    issue: «provisión de buenas obras» es poco natural y algo impreciso
    rationale: Substantiam aquí no se refiere a provisión en sentido de abastecimiento, sino a reserva, patrimonio o caudal. «Reserva de buenas obras» preserva mejor la metáfora del texto y suena más natural en español bíblico moderno.
  - severity: low
    issue: «Porque en esto» puede sonar ligeramente rígido o ambiguo
    rationale: In hoc enim introduce la explicación de cómo se manifestarán la justicia y la bondad divinas. «Porque así» o «Porque en esto mismo» suena más natural; «Porque así» mantiene bien el flujo en español.
  revised_spanish_text: Porque así se declararán tu justicia y tu bondad, Señor, cuando tengas misericordia de los que no tienen reserva de buenas obras.
  revision_rationale: Se ajusta una expresión discursiva para mayor naturalidad («Porque así») y se reemplaza «provisión» por «reserva» para reflejar mejor el sentido de substantiam como acopio o caudal de buenas obras, manteniendo intacto el contenido teológico y el registro digno del pasaje.
