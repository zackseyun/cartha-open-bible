  yaml_path: translation/extra_canonical/2_esdras/008/051.yaml
  text: But understand for yourself[a], and seek glory among those like you.
  footnotes:
  - marker: a
    text: Or 'Therefore many miserable miseries will befall those who inhabit the world in the last times, because they have walked in great pride.'.
    reason: previous_rendering
  revision_pass:
