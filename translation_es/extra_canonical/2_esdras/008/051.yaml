    unchanged: false
    changes_summary: Revised 'seek out glory for those like you' to 'seek glory among those like you' for better alignment with the Latin and more natural English.
translation:
  language: es
  text: Pero entiende por ti mismo y busca gloria entre los que son como tú.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: tu autem
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: Latin tu autem
  rationale: El contraste adversativo del latín se expresa de forma natural en español con 'Pero'. Mantiene el giro de transición sin sobrecargar el tono.
- source_word: pro te intellege
  english_pob_choice: understand for yourself
  chosen_spanish: entiende por ti mismo
  alternatives_spanish:
  - comprende por ti mismo
  - entiende para ti
  lexicon: Latin intellege
  rationale: '''Intellege'' pide un acto de comprensión personal. ''Por ti mismo'' comunica la reflexión individual de manera idiomática en español y evita un calco duro.'
- source_word: de similibus tuis inquire
  english_pob_choice: seek glory among those like you
  chosen_spanish: busca gloria entre los semejantes a ti
  alternatives_spanish:
  - busca gloria entre los que son como tú
  - procura gloria entre los tuyos
  lexicon: Latin inquire
  rationale: El latín 'de similibus tuis' significa literalmente 'de/entre los semejantes tuyos'. Como el sustantivo explícito es 'gloria', se mantiene 'busca gloria' y se vierte la relación con 'entre los semejantes a ti' para conservar la estructura del original sin añadir contenido no presente.
theological_decisions:
- issue: Alcance de 'gloria' como objeto de búsqueda
  english_pob_reading: seek glory among those like you
  chosen_spanish_reading: busca gloria entre los semejantes a ti
  alternative_spanish_readings:
  - busca honor entre los semejantes a ti
  - busca gloria entre los tuyos
  rationale: El latín usa 'gloriam', por lo que 'gloria' es la forma más directa y fiel. 'Honor' sería una interpretación semántica más amplia, pero el texto no obliga a ese desplazamiento. Se conserva la tensión entre la exhortación a comprender y la búsqueda de gloria en el propio círculo.
  doctrine_reference: No doctrinal issue; wisdom/exhortation register in 2 Esdras.
translation_notes:
  revision_awareness: 'La revisión auditada corrigió un desajuste de versificación en el inglés previo: la frase sobre ''many miserable miseries'' pertenecía al versículo anterior, no a este. Para 8:51, el texto latino es breve y exhortativo; la traducción española sigue ese contenido exacto sin incorporar la lectura anterior errónea.'
  spanish_consistency_notes:
  - Se evitó 'Cristo/Mesías' porque no aparece en el texto fuente.
  - Se mantuvo 'gloria' en lugar de 'honor' para respetar el sustantivo latino 'gloriam'.
  - Se eligió un español sobrio y directo, compatible con el registro sapiencial/exhortativo del libro.
