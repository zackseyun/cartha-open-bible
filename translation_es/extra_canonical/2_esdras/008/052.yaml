translation:
  language: es
  text: Porque el paraíso ha sido abierto a vosotros, el árbol de la vida ha sido plantado, la era venidera ha sido preparada, la abundancia ha sido dispuesta, la ciudad ha sido edificada, el reposo ha sido aprobado, la bondad ha sido perfeccionada,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: apertus est paradisus
  english_pob_choice: paradise has been opened to you
  chosen_spanish: el paraíso ha sido abierto para vosotros
  alternatives_spanish:
  - se os ha abierto el paraíso
  - el paraíso se ha abierto para vosotros
  lexicon: paradisus -> paraíso; apertus est -> ha sido abierto
  rationale: Conservo el pasivo perfecto latino y el orden natural del español. 'Para vosotros' refleja el destinatario plural de Vobis; evito una paráfrasis más interpretativa.
- source_word: plantata est arbor uitae
  english_pob_choice: the tree of life has been planted
  chosen_spanish: el árbol de la vida ha sido plantado
  alternatives_spanish:
  - se ha plantado el árbol de la vida
  - el árbol de la vida ha sido sembrado
  lexicon: arbor uitae -> árbol de la vida; plantata est -> ha sido plantado
  rationale: Mantengo la imagen literal y reconocible. 'Plantado' sigue de cerca plantata est; 'sembrado' sería menos preciso para arbor.
- source_word: paratum est futurum tempus
  english_pob_choice: the age to come has been prepared
  chosen_spanish: el tiempo venidero ha sido preparado
  alternatives_spanish:
  - la era venidera ha sido preparada
  - el siglo venidero ha sido preparado
  lexicon: futurum tempus -> tiempo venidero / tiempo futuro
  rationale: '''Futurum tempus'' es literalmente ''tiempo futuro/venidero''; opto por ''tiempo venidero'' para preservar la idea temporal sin introducir un término más técnico que el latino no exige.'
- source_word: praeparata est habundantia
  english_pob_choice: abundance has been made ready
  chosen_spanish: la abundancia ha sido dispuesta
  alternatives_spanish:
  - la abundancia ha sido preparada
  - la abundancia está lista
  lexicon: habundantia -> abundancia; praeparata est -> ha sido dispuesta/preparada
  rationale: '''Dispuesta'' mantiene el matiz de preparación ya realizada y suena más natural en español que ''hecha lista''; conservo el sustantivo ''abundancia'' del latino.'
- source_word: aedificata est ciuitas
  english_pob_choice: the city has been built
  chosen_spanish: la ciudad ha sido edificada
  alternatives_spanish:
  - la ciudad ha sido construida
  - la ciudad ha sido levantada
  lexicon: ciuitas -> ciudad; aedificata est -> ha sido edificada
  rationale: '''Edificada'' refleja el verbo de construcción con un registro bíblico sobrio y fiel al latino.'
- source_word: probata est requies
  english_pob_choice: rest has been approved
  chosen_spanish: el descanso ha sido aprobado
  alternatives_spanish:
  - el reposo ha sido aprobado
  - el descanso ha sido validado
  lexicon: requies -> descanso/reposo; probata est -> ha sido aprobada/ aprobada
  rationale: Sigo la revisión inglesa que traduce probata como 'approved' y mantengo la ambigüedad de 'requies' con 'descanso', más transparente para lectores modernos que 'reposo'.
- source_word: perfecta est bonitas
  english_pob_choice: goodness has been perfected
  chosen_spanish: la bondad ha sido perfeccionada
  alternatives_spanish:
  - la bondad ha sido consumada
  - la bondad ha sido completada
  lexicon: bonitas -> bondad; perfecta est -> ha sido perfeccionada
  rationale: '''Bondad'' recoge el valor moral de bonitas; ''perfeccionada'' conserva el perfecto latino sin añadir una connotación doctrinal ajena al texto.'
theological_decisions:
- issue: Restoring the verse alignment and rejecting the prior misaligned English note as translation base
  english_pob_reading: For paradise has been opened to you, ...
  chosen_spanish_reading: Porque el paraíso ha sido abierto para vosotros, ...
  alternative_spanish_readings:
  - Para vosotros el paraíso ha sido abierto, ...
  rationale: La fuente latina de 2 Esdras 8:52 inicia con 'Vobis enim apertus est paradisus'. Por eso la traducción debe reflejar la afirmación de promesa escatológica dirigida a los destinatarios, no la nota alternativa del versículo anterior.
  doctrine_reference: 2 Esdras 8:52; alineación textual según el testimonio latino proporcionado
translation_notes:
  revision_awareness: 'La versión inglesa anterior contenía un desajuste grave de numeración: la nota alternativa y la redacción previa pertenecían al versículo anterior. La presente versión se alinea con el texto latino correcto de 2 Esdras 8:52 y no conserva la nota a, porque no corresponde a este versículo.'
  spanish_consistency_notes:
  - Uso 'para vosotros' para mantener el plural del dativo latino Vobis.
  - Mantengo una serie de pasivos perfectos en español para reflejar la estructura acumulativa del original.
  - 'Conservo términos bíblicos transparentes: paraíso, árbol de la vida, ciudad, bondad, descanso, abundancia.'
