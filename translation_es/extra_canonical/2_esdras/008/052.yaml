revisions:
- from: Porque el paraíso ha sido abierto para vosotros, el árbol de la vida ha sido plantado, el tiempo venidero ha sido preparado, la abundancia ha sido dispuesta, la ciudad ha sido edificada, el descanso ha sido aprobado, la bondad ha sido perfeccionada,
  to: Porque el paraíso ha sido abierto a vosotros, el árbol de la vida ha sido plantado, la era venidera ha sido preparada, la abundancia ha sido dispuesta, la ciudad ha sido edificada, el reposo ha sido aprobado, la bondad ha sido perfeccionada,
  rationale: Se ajusta 'para vosotros' a 'a vosotros' para reflejar mejor el dativo latino 'vobis'; se cambia 'tiempo venidero' por 'era venidera' para preservar el sentido escatológico ya documentado en el POB inglés ('the age to come'); y se sustituye 'descanso' por 'reposo' para una correspondencia más bíblica y natural con 'requies', manteniendo 'aprobado' con concordancia española correcta. No se requieren notas nuevas porque no hay ambigüedad adicional creada por el español y la nota inglesa existente pertenece a la desalineación previa del versículo anterior, no a este texto.
