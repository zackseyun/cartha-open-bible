translation:
  language: es
  text: Pero también en esto serás motivo de asombro delante del Altísimo.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero también en esto serás admirable delante del Altísimo».'
