lexical_decisions:
- source_word: mirabilis
  english_pob_choice: marvelous
  chosen_spanish: maravilloso
  alternatives_spanish:
  - admirable
  - extraordinario
  - maravilloso
  lexicon: mirabilis
  rationale: El latín mirabilis expresa algo digno de asombro, maravilloso o extraordinario. En español, «maravilloso» conserva mejor esa fuerza que «admirable», que hoy suele sonar más débil o meramente elogiosa.
- source_word: coram Altissimo
  english_pob_choice: before the Most High
  chosen_spanish: delante del Altísimo
  alternatives_spanish:
  - ante el Altísimo
  - en presencia del Altísimo
  - delante del Altísimo
  lexicon: coram
  rationale: coram indica presencia o comparecencia frente a alguien. «Delante del Altísimo» mantiene el sentido de estar en su presencia y conserva un tono bíblico claro en español.
theological_decisions:
- issue: Título divino Altissimo
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Más Alto
  - el Altísimo
  rationale: El latín usa Altissimo como título divino. «El Altísimo» es la forma natural y reverente en español, y preserva el carácter teológico del título sin sustituirlo por una paráfrasis.
  doctrine_reference: Título divino aplicado a Dios
translation_notes:
  revision_awareness: Se tuvo en cuenta que el audit trail inglés corrigió «admirable» a «marvelous» por la fuerza de mirabilis; por eso se escogió «maravilloso» en el texto principal y se dejó la alternativa más literal en nota.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo con el inglés POB («But in this also...» → «Pero también en esto...»).
  - Se usó «Altísimo» como traducción estable del título divino, coherente con el registro bíblico español.
  - La nota conserva la alternativa «admirable» para reflejar la tensión léxica documentada sin debilitar el sentido principal.
