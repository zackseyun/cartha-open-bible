- from: Pero también en esto serás maravilloso delante del Altísimo.[a]
  to: Pero también en esto serás motivo de asombro delante del Altísimo.[a]
  rationale: Se revisa «serás maravilloso» a «serás motivo de asombro» para expresar de forma más natural en español el valor de «mirabilis eris» como algo maravilloso o portentoso ante Dios, evitando a la vez el debilitamiento de «admirable». Se conserva la nota con la alternativa histórica ya documentada.
