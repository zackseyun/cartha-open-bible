translation:
  language: es
  text: quien los hizo, y le fueron ingratos a él, quien les preparó la vida. Por tanto, ahora se acerca mi juicio, que yo no he
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: qui fecit eos
  english_pob_choice: who made them
  chosen_spanish: quien los hizo
  alternatives_spanish:
  - quien los creó
  - el que los hizo
  lexicon: hacer
  rationale: El latín usa fecit, que aquí puede ser simplemente «hizo»; en español «los hizo» conserva la forma directa y evita introducir una precisión teológica no explicitada en el verso.
- source_word: ingrati fuerunt ei
  english_pob_choice: they were ungrateful to him
  chosen_spanish: fueron ingratos con él
  alternatives_spanish:
  - le fueron ingratos
  - no le mostraron gratitud
  lexicon: ingratus
  rationale: «Ingratos» reproduce con claridad la acusación moral del latín y mantiene la fuerza relacional de ei sin suavizarla.
- source_word: qui praeparauit eis uitam
  english_pob_choice: him who prepared life for them
  chosen_spanish: quien preparó vida para ellos
  alternatives_spanish:
  - quien les preparó la vida
  - quien les preparó la vida para ellos
  lexicon: praeparo
  rationale: «Preparó vida para ellos» sigue de cerca la construcción latina y preserva la tensión de que la vida fue preparada en su favor.
- source_word: iudicium meum
  english_pob_choice: my judgment
  chosen_spanish: mi juicio
  alternatives_spanish:
  - mi sentencia
  - mi decisión judicial
  lexicon: iudicium
  rationale: «Juicio» es el equivalente más natural y fiel en español para iudicium en este contexto de condena o decisión divina.
- source_word: modo adpropinquat
  english_pob_choice: now draws near
  chosen_spanish: ahora se acerca
  alternatives_spanish:
  - ya se aproxima
  - está por acercarse
  lexicon: adpropinquare
  rationale: «Se acerca» expresa bien la inminencia del verbo latino sin añadir aspecto innecesario.
theological_decisions:
- issue: Relación entre el creador y la ingratitud humana
  english_pob_reading: who made them, and they were ungrateful to him who prepared life for them
  chosen_spanish_reading: quien los hizo, y fueron ingratos con él, quien preparó vida para ellos
  alternative_spanish_readings:
  - quien los creó, y fueron ingratos con él, quien les preparó la vida
  rationale: 'El verso presenta dos acciones divinas: hacer y preparar vida. Mantener ambas sin fusionarlas preserva la acusación del texto y evita armonizarla con formulaciones más tradicionales.'
  doctrine_reference: 2 Esdras 8:60; juicio divino e ingratitud humana
translation_notes:
  revision_awareness: La revisión más reciente confirmó que el texto latino de 2 Esdras 8:60 corresponde a «qui fecit eos et ingrati fuerunt ei qui praeparauit eis uitam. Quapropter iudicium meum modo adpropinquat», no al material previo de 8:58–59. Esta versión sigue ese latín y evita arrastrar contenido ajeno al versículo.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo de dos cláusulas divinas: «los hizo» / «preparó vida para ellos».'
  - Se usa «juicio» para iudicium como término bíblico amplio y natural en español.
  - No se introduce «SEÑOR» ni «Cristo» porque el latín del verso no los contiene.
  - La nota [a] está anclada en «quien los hizo» y solo ofrece una alternativa léxica real del mismo verbo.
