translation:
  language: es
  text: pero me alegraré por la formación de los justos, y también por su peregrinación[a], y su salvación, y la recepción de su recompensa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por su peregrinación también, y su salvación, y la recepción de su recompensa».
    reason: alternative_reading
lexical_decisions:
- source_word: plasma iustorum
  english_pob_choice: the formation of the righteous
  chosen_spanish: la formación de los justos
  alternatives_spanish:
  - la formación de los rectos
  - la hechura de los justos
  lexicon: Latin plasma / iustus
  rationale: ‘Formación’ comunica con naturalidad en español la idea de la obra formativa o constitutiva de Dios, sin introducir una paráfrasis más amplia. ‘Justos’ conserva el valor moral-forense de iustorum mejor que ‘rectos’ en este contexto.
- source_word: peregrinationis
  english_pob_choice: their pilgrimage also
  chosen_spanish: su peregrinación, y también
  alternatives_spanish:
  - su viaje también
  - su andar también
  lexicon: Latin peregrinatio
  rationale: ‘Peregrinación’ mantiene el sentido de vida de paso/extranjería y el tono bíblico del término sin convertirlo en una peregrinación litúrgica específica. El posesivo ‘su’ sigue la revisión inglesa que recupera la referencia concreta a los justos.
- source_word: saluationis
  english_pob_choice: their salvation
  chosen_spanish: su salvación
  alternatives_spanish:
  - su liberación
  - su rescate
  lexicon: Latin salus
  rationale: ‘Salvación’ es el equivalente español más estable y exacto para salus aquí, y conserva la amplitud soteriológica del término.
- source_word: mercedis receptionis
  english_pob_choice: the reception of their reward
  chosen_spanish: la recepción de su recompensa
  alternatives_spanish:
  - el recibimiento de su recompensa
  - la obtención de su recompensa
  lexicon: Latin merces + receptio
  rationale: ‘Recepción’ refleja de manera formal y natural receptionis, y ‘recompensa’ expresa merces sin desplazarla hacia ‘galardón’ o una formulación más confesional que la evidencia textual no exige.
theological_decisions:
- issue: Referencia concreta a los justos en los genitivos dependientes
  english_pob_reading: their pilgrimage also, and their salvation, and the reception of their reward
  chosen_spanish_reading: su peregrinación, y su salvación, y la recepción de su recompensa
  alternative_spanish_readings:
  - peregrinación también, y salvación, y la recepción de recompensa
  - la peregrinación también, y la salvación, y la recepción de la recompensa
  rationale: La revisión inglesa indica que los sustantivos dependen implícitamente de ‘the righteous’. En español, los posesivos ‘su’ evitan que se lean como abstracciones desconectadas y preservan la referencia concreta a los justos.
  doctrine_reference: 4 Esdras 8:39; relación sintáctica de genitivos con iustorum en el contexto inmediato
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés, que cambió 'the receiving of their reward' a 'the reception of their reward' y aclaró que los genitivos remiten a 'the righteous'. La traducción española incorpora ambos ajustes con ‘recepción’ y con los posesivos ‘su’.
  spanish_consistency_notes:
  - Se mantuvo ‘justos’ para iustorum, en coherencia con el registro bíblico y legal-moral del pasaje.
  - ‘Peregrinación’ conserva el matiz de vida de tránsito/extranjería y no se reduce a ‘viaje’.
  - ‘Recompensa’ se usa como equivalente directo de merces, sin cargarlo de tecnicismos doctrinales adicionales.
