    issue: La nota [a] está anclada en «justos», pero su contenido no glosa ese término sino una lectura alternativa para la serie «su peregrinación... su salvación... la recepción de su recompensa».
    rationale: Las instrucciones exigen que el marcador exacto aparezca en la palabra o frase relevante. Tal como está, el lector entenderá que la nota comenta «justos», lo cual es incorrecto.
  - severity: low
    issue: La formulación «y también por su peregrinación» es más natural que separar «también» dentro de la nota/decisión léxica como «su peregrinación, y también».
    rationale: El latín quoque modifica naturalmente esa parte de la serie; en español conviene colocarlo antes del sintagma preposicional para fluidez sin alterar el sentido.
