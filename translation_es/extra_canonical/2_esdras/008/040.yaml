  rationale: El verbo latino expresa la acción de sembrar; en español, «siembra» conserva la imagen agrícola con naturalidad y fidelidad.
- source_word: super terram
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
