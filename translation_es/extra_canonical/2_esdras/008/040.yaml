- source_word: semina multa
  english_pob_choice: many seeds
  chosen_spanish: muchas semillas
  alternatives_spanish:
  - muchas semillas
  - muchos granos
  lexicon: Lat. semen
  rationale: El latín pluraliza «semina»; «semillas» es el equivalente más natural y directo en español.
- source_word: plantationis multitudinem
  english_pob_choice: a multitude of plantings
  chosen_spanish: una multitud de plantaciones
  alternatives_spanish:
  - una multitud de plantaciones
  - una gran cantidad de plantíos
  lexicon: Lat. plantatio
  rationale: Se conserva la acumulación del latín con «multitud de plantaciones»; aunque suena poco usual, refleja la fuerza concreta de la imagen sin suavizarla.
theological_decisions:
- issue: Imagen agrícola acumulativa sin interpretación explícita
  english_pob_reading: sows many seeds upon the earth and a multitude of plantings
  chosen_spanish_reading: siembra sobre la tierra muchas semillas y una multitud de plantaciones
  alternative_spanish_readings:
