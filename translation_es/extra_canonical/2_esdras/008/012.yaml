    changes_summary: 'Adjusted prepositions for closer alignment with the Latin: ''in your righteousness'' to ''with your righteousness'' and ''with your understanding'' to ''by your understanding.'''
translation:
  language: es
  text: Lo sustentaste con tu justicia, lo instruiste en tu ley y lo corrigiste con tu entendimiento.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: tuae iustitiae
  english_pob_choice: with your righteousness
  chosen_spanish: con tu justicia
  alternatives_spanish:
  - con tu rectitud
  - por tu justicia
  lexicon: iustitia → justicia
  rationale: La fuente latina usa el genitivo ligado a 'enutristi' con valor instrumental/acompañante; la revisión inglesa ajustó a 'with your righteousness'. En español, 'con tu justicia' conserva el valor relacional sin forzar una paráfrasis, y mantiene el término bíblico habitual 'justicia' para iustitia.
- source_word: erudisti eum in lege tua
  english_pob_choice: instructed him in your law
  chosen_spanish: lo instruiste en tu ley
  alternatives_spanish:
  - lo educaste en tu ley
  - lo enseñaste en tu ley
  lexicon: erudire → instruir
  rationale: '''erudisti'' indica formar/enseñar con contenido normativo; ''instruiste'' reproduce bien esa fuerza en español y mantiene el objeto ''tu ley'' sin perder el matiz pedagógico-jurídico del latín.'
- source_word: corripuisti eum tuo intellectu
  english_pob_choice: corrected him by your understanding
  chosen_spanish: lo corrigiste por tu entendimiento
  alternatives_spanish:
  - lo reprendiste con tu entendimiento
  - lo corregiste con tu entendimiento
  lexicon: corripere → corregir/reprender; intellectus → entendimiento
  rationale: La revisión inglesa fijó 'by your understanding', evitando 'with'. En español, 'por tu entendimiento' preserva el matiz causal/instrumental del 'by' y refleja 'intellectus' como 'entendimiento', sin desplazar el sentido disciplinario de 'corripere'.
theological_decisions:
- issue: Relación entre 'tu justicia' y el acto de nutrir
  english_pob_reading: You nourished him with your righteousness
  chosen_spanish_reading: Lo sustentaste con tu justicia
  alternative_spanish_readings:
  - Lo alimentaste con tu justicia
  - Lo criaste con tu justicia
  rationale: El verbo latino 'enutristi' admite una gama de sentidos que incluye nutrir, criar y sustentar. 'Sustentaste' comunica bien el acto continuo de proveer y formar, y evita reducir el pasaje a mera alimentación física.
  doctrine_reference: Providencia y formación divina
- issue: '''Tu entendimiento'' como medio de corrección'
  english_pob_reading: corrected him by your understanding
  chosen_spanish_reading: lo corrigiste por tu entendimiento
  alternative_spanish_readings:
  - lo corregiste con tu entendimiento
  - lo disciplinaste por tu entendimiento
  rationale: La revisión del texto inglés marcó 'by your understanding' como el equivalente más cercano al latín. 'Por tu entendimiento' conserva la relación causal/instrumental y la agencia divina, sin convertir 'intellectus' en simple 'sabiduría'.
  doctrine_reference: Sabiduría y disciplina de Dios
translation_notes:
  revision_awareness: 'El inglés POB fue revisado desde ''in your righteousness'' y ''with your understanding'' a ''with your righteousness'' y ''by your understanding'' para alinearse más de cerca con el latín. La versión española sigue esa lectura revisada: ''con tu justicia'' y ''por tu entendimiento''.'
  spanish_consistency_notes:
  - Se mantuvo 'justicia' para iustitia, en consonancia con el uso bíblico estándar y con el marco POB.
  - Se prefirió 'entendimiento' para intellectus, distinguiéndolo de 'sabiduría' y respetando la concreción del latín.
  - La cadencia verbal conserva paralelismo con tres acciones divinas coordinadas por 'y'.
