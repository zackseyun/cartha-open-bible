translation:
  language: es
  text: a ti, y no te has juzgado entre los justos, para que seas glorificado[a] más abundantemente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a ti mismo».'
    reason: alternative_reading
lexical_decisions:
- source_word: te
  english_pob_choice: you
  chosen_spanish: a ti
  alternatives_spanish:
  - te
  - a ti mismo
  lexicon: '-'
  rationale: El latín conserva el objeto directo de segunda persona en forma breve; en español se expande a «a ti» para mayor claridad y naturalidad. No se añadió «mismo» porque el texto fuente no lo exige en este versículo.
- source_word: non iudicasti te inter iustos
  english_pob_choice: have not judged yourself among the righteous
  chosen_spanish: no te has juzgado entre los justos
  alternatives_spanish:
  - no te has contado entre los justos
  - no te has considerado entre los justos
  - no te has juzgado a ti mismo entre los justos
  lexicon: iudicare
  rationale: '«iudicasti te inter iustos» permite una lectura reflexiva: no situarse uno mismo en la categoría de los justos. «No te has juzgado entre los justos» mantiene la fuerza literal y la tensión semántica sin suavizarla demasiado. Se evitó imponer explícitamente «a ti mismo» porque el latín ya puede funcionar de modo reflexivo implícito.'
- source_word: ut plurimum glorificeris
  english_pob_choice: so that you might be more greatly glorified
  chosen_spanish: para que seas glorificado más abundantemente
  alternatives_spanish:
  - para que seas más grandemente glorificado
  - para que seas glorificado en mayor medida
  - para que seas glorificado mucho más
  lexicon: ut + plurimum + glorificeris
  rationale: «ut plurimum» expresa un aumento de grado; en español, «más abundantemente» comunica mejor esa intensificación que un calco duro. Se conserva el pasivo subjuntivo «seas glorificado» porque refleja bien la forma latina.
theological_decisions:
- issue: Relación entre humildad y glorificación divina
  english_pob_reading: you, and have not judged yourself among the righteous, so that you might be more greatly glorified.
  chosen_spanish_reading: a ti, y no te has juzgado entre los justos, para que seas glorificado más abundantemente.
  alternative_spanish_readings:
  - porque te has humillado, como conviene
  - para que seas más glorificado
  rationale: El testimonio latino de este versículo no habla aquí directamente de humildad, sino de no colocarse uno mismo entre los justos, con el resultado de que Dios sea glorificado en mayor medida. La redacción española conserva ese enlace causal/final sin importar al versículo una formulación ajena procedente de otro lugar del texto.
  doctrine_reference: Humildad del hombre y gloria de Dios en el juicio divino; sin introducir una lectura doctrinal no sustentada por el verso.
translation_notes:
  revision_awareness: 'La base inglesa inicial contenía un error de alineación con otro versículo; la revisión posterior corrigió el contenido al latín de 2 Esdras 8:49: «te, et non iudicasti te inter iustos ut plurimum glorificeris». La versión española sigue esa lectura revisada y refleja «ut plurimum» con un intensificador natural en español.'
  spanish_consistency_notes:
  - Se evitó «Señor» o «Cristo» porque el versículo no contiene esos términos.
  - Se mantuvo un registro bíblico moderno y digno, sin arcaísmo innecesario.
  - «Justos» se conserva por correspondencia directa con inter iustos y por ser el término más claro en español para el contraste moral del pasaje.
