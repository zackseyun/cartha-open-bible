review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en lo esencial la fuente latina: conserva el objeto inicial «te», la negación reflexiva de «non iudicasti te inter iustos» y el resultado/finalidad de «ut plurimum glorificeris». Sin embargo, «más abundantemente» no es la mejor equivalencia para «plurimum» en este contexto de grado de glorificación; suena adverbialmente forzado y menos fiel que una formulación comparativa más directa.'
  spanish_quality_summary: 'El texto es comprensible, pero comienza de forma abrupta con «a ti, y», lo cual probablemente depende del contexto inmediato y puede mantenerse. La principal mejora necesaria es estilística y semántica en la cola final: «para que seas mucho más glorificado» o «para que seas más grandemente glorificado». Además, la nota al pie actual sobre «a ti mismo» no está justificada por la evidencia inglesa ni por una ambigüedad real que requiera nota en español.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «justos» para «iustos» y «glorificado» para «glorificeris» están bien. La decisión reflexiva con «te has juzgado» es aceptable, aunque «te has considerado» sería más idiomático; no es necesario cambiarlo. La nota alternativa «a ti mismo» no responde a una decisión léxica documentada y debe eliminarse.
  issues:
  - severity: medium
    issue: «más abundantemente» traduce de forma poco natural y menos precisa «ut plurimum».
    rationale: 'El latín expresa aumento máximo de grado respecto de la glorificación; en español, «abundantemente» sugiere modo o abundancia, no comparación de grado. «mucho más glorificado» preserva mejor el sentido auditado en inglés: «more greatly glorified».'
  - severity: low
    issue: 'La nota al pie «O: “a ti mismo”» no aporta una alternativa necesaria.'
    rationale: La fuente y la auditoría inglesa no preservan esa variante como parte del texto principal del versículo, y en español introduce una pseudoambigüedad innecesaria. Debe retirarse para evitar ruido editorial.
  revised_spanish_text: a ti, y no te has juzgado entre los justos, para que seas mucho más glorificado.
  revision_rationale: Se conserva la estructura y el sentido del latín, pero se sustituye «más abundantemente» por «mucho más glorificado» para reflejar mejor «ut plurimum glorificeris» con un español natural y fiel al comparativo intensificado documentado en la auditoría inglesa. También se elimina una nota al pie innecesaria no sustentada por la evidencia fuente.
