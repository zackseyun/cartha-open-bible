translation:
  language: es
  text: corrupción en el olvido. Los dolores han pasado[a], y se ha mostrado
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y la sabiduría fue completada de antemano». Esta alternativa refleja una lectura anterior que en realidad pertenece al verso previo, no al latín citado aquí.'
