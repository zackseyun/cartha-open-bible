lexical_decisions:
- source_word: corruptio
  english_pob_choice: corruption
  chosen_spanish: corrupción
  alternatives_spanish:
  - depravación
  - ruina
  lexicon: corruptio
  rationale: El sustantivo latino apunta a deterioro o descomposición; «corrupción» conserva esa fuerza léxica en español sin añadir una idea moral que el contexto inmediato no exige por sí sola.
- source_word: in obliuionem
  english_pob_choice: into oblivion
  chosen_spanish: en el olvido
  alternatives_spanish:
  - en el olvido total
  - hacia el olvido
  lexicon: obliuio
  rationale: La preposición y el acusativo permiten una meta o resultado; «en el olvido» expresa de manera natural el destino o estado resultante sin sobre-interpretar.
- source_word: Transierunt dolores
  english_pob_choice: Sorrows have passed away
  chosen_spanish: Los dolores han pasado
  alternatives_spanish:
  - Los sufrimientos han pasado
  - Los dolores se han ido
  lexicon: dolores
  rationale: «Dolores» es la correspondencia más directa para el plural latino y conserva el tono concreto del original. «Han pasado» mantiene el perfecto y el sentido de cesación.
- source_word: ostensus est
  english_pob_choice: it has been shown
  chosen_spanish: ha sido mostrado
  alternatives_spanish:
  - ha sido revelado
  - fue mostrado
  lexicon: ostendo
  rationale: El pasivo impersonal latino exige una forma pasiva en español. «Ha sido mostrado» conserva la impersonalidad y evita añadir el sujeto o el objeto de lo mostrado, que el texto no especifica.
theological_decisions:
- issue: Alcance de la cláusula final 'ostensus est'
  english_pob_reading: it has been shown
  chosen_spanish_reading: ha sido mostrado
  alternative_spanish_readings:
  - ha sido revelado
  - se ha mostrado
  rationale: El latín no identifica el contenido de lo mostrado ni permite precisar si se trata de revelación doctrinal o de una manifestación general. Por eso la traducción mantiene la vaguedad del original y no la intensifica.
  doctrine_reference: 'Principio de sobriedad textual: no ampliar el alcance semántico más allá de la evidencia disponible.'
translation_notes:
  revision_awareness: La revisión auditada corrige un desajuste previo en inglés causado por un error de división de versículo. Para 2 Esdras 8:54, el testimonio latino dado es «corruptio in obliuionem. Transierunt dolores et ostensus est», por lo que la versión española sigue ese contenido y evita arrastrar la lectura errónea vinculada al versículo anterior.
  spanish_consistency_notes:
  - Se conserva el registro sobrio y literal del POB para una sección extra-canónica de latín, sin añadir interpretaciones devocionales.
  - Se mantiene la impersonalidad de 'ostensus est' con una pasiva perifrástica española.
  - La nota al pie refleja la ambigüedad textual documentada por el audit trail inglés, sin sustituir la lectura principal.
