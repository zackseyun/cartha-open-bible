translation:
  language: es
  text: indagando acerca de la multitud de los que perecen. Porque ellos también, habiendo recibido libertad, despreciaron al Altísimo y su ley
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: inquirendo
  english_pob_choice: to inquire about
  chosen_spanish: preguntando acerca de
  alternatives_spanish:
  - inquiriendo acerca de
  - indagando acerca de
  lexicon: inquirir / preguntar / indagar
  rationale: El latín presenta un gerundio de acción intelectual o interrogativa; en español, «preguntando acerca de» transmite con naturalidad la idea de investigar o preguntar sobre algo sin endurecer el estilo.
- source_word: de multitudine eorum qui pereunt
  english_pob_choice: about the multitude of those who perish
  chosen_spanish: acerca de la multitud de los que perecen
  alternatives_spanish:
  - sobre la multitud de los que perecen
  - acerca de la multitud de los que se pierden
  lexicon: multitudo / pereo
  rationale: «Multitud» conserva el sustantivo colectivo del original. «Perecen» refleja el presente participial latino y evita suavizar el sentido de ruina o destrucción.
- source_word: accipientes libertatem
  english_pob_choice: having received freedom
  chosen_spanish: habiendo recibido libertad
  alternatives_spanish:
  - habiendo recibido la libertad
  - después de haber recibido libertad
  lexicon: accipere / libertas
  rationale: La construcción de participio perfecto se vierte de forma directa con «habiendo recibido». «Libertad» reproduce el valor nominal sin introducir una interpretación más amplia que el texto no exige.
- source_word: spreuerunt
  english_pob_choice: despised
  chosen_spanish: despreciaron
  alternatives_spanish:
  - desestimaron
  - rechazaron con desprecio
  lexicon: spernere / despreciar
  rationale: «Despreciaron» es el equivalente español más directo y mantiene la fuerza valorativa negativa del verbo latino.
- source_word: altissimum
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Altísimo Dios
  - el Dios Altísimo
  lexicon: altissimus
  rationale: «El Altísimo» es la forma reverente y estable en español para el título divino, y preserva el carácter titular del latín sin necesidad de expandirlo.
- source_word: legem eius
  english_pob_choice: his law
  chosen_spanish: su ley
  alternatives_spanish:
  - la ley de él
  - su norma
  lexicon: lex / lex eius
  rationale: «Su ley» mantiene la relación posesiva natural en español y corresponde al sentido jurídico-religioso de lex.
theological_decisions:
- issue: Referente de «el Altísimo»
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - Dios Altísimo
  - el Altísimo Dios
  rationale: Se conserva el título divino sin sustituirlo por un término más explicativo, porque el latín usa un epíteto reverencial que funciona como designación directa de Dios.
  doctrine_reference: Uso bíblico del título divino en la tradición de traducción; continuidad semántica de θεός/Altissimus en contextos reverenciales.
- issue: Valor de «libertad»
  english_pob_reading: freedom
  chosen_spanish_reading: libertad
  alternative_spanish_readings:
  - liberación
  - exención
  rationale: No se fuerza una lectura política o filosófica específica. El texto latino solo afirma que recibieron libertad y la despreciaron; «libertad» conserva esa amplitud.
  doctrine_reference: Responsabilidad humana frente al don recibido; el texto no desarrolla una doctrina más técnica sobre libertación.
translation_notes:
  revision_awareness: 'Se corrigió la desalineación anterior con el pasaje fuente. La presente redacción sigue el latín de 2 Esdras 8:56: «inquirendo de multitudine eorum qui pereunt. Nam et ipsi accipientes libertatem spreuerunt altissimum et legem eius», y no el contenido de 8:54b-55a que había sido arrastrado erróneamente al versículo.'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, evitando añadir complementos no presentes en el latín.
  - Se prefirió «el Altísimo» como título divino constante y «su ley» como posesivo natural y fiel.
  - No se incluyeron notas al pie porque el texto español no requiere una alternativa textual anclada en este versículo.
