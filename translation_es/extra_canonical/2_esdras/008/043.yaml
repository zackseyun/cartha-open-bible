translation:
  language: es
  text: tu lluvia en su tiempo; y si se arruina por la abundancia de lluvia, perece. Pero el hombre, que ha sido formado por tus manos y es llamado imagen tuya
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: pluuiam tuam in tempore
  english_pob_choice: your rain in its time
  chosen_spanish: tu lluvia en su tiempo
  alternatives_spanish:
  - tu lluvia a su tiempo
  - tu lluvia en el tiempo debido
  lexicon: pluuiam -> lluvia; in tempore -> en su tiempo
  rationale: Mantiene la relación posesiva y la idea de tiempo apropiado con una frase natural en español. 'En su tiempo' conserva la referencia al momento debido sin añadir explicaciones.
- source_word: si corruptum fuerit multitudine pluuiae
  english_pob_choice: if it is ruined by the abundance of rain
  chosen_spanish: si se arruina por la abundancia de lluvia
  alternatives_spanish:
  - si se corrompe por la abundancia de lluvia
  - si queda arruinado por la abundancia de lluvia
  lexicon: corruptum fuerit -> se arruina; multitudine pluuiae -> abundancia de lluvia
  rationale: '''Corruptum'' aquí se entiende mejor como deterioro/ruina del objeto afectado por exceso de lluvia, no como corrupción moral. ''Se arruina'' transmite bien el daño físico en español.'
- source_word: Hoc perit
  english_pob_choice: it perishes
  chosen_spanish: perece
  alternatives_spanish:
  - se pierde
  - muere
  lexicon: Hoc -> esto; perit -> perece
  rationale: Se conserva la fuerza breve del latín con un verbo directo y solemne. El sujeto implícito retoma la cosa dañada por la lluvia.
- source_word: homo qui manibus tuis plasmatus est
  english_pob_choice: man, who has been formed by your hands
  chosen_spanish: el hombre, que ha sido formado por tus manos
  alternatives_spanish:
  - el hombre, que fue formado por tus manos
  - el hombre, que has moldeado con tus manos
  lexicon: homo -> hombre; plasmatus est -> ha sido formado
  rationale: '''Formado por tus manos'' sigue de cerca el latín y preserva la imagen de creación manual. ''Ha sido formado'' mantiene el perfecto pasivo con naturalidad en español.'
- source_word: et ... imaginem tuam
  english_pob_choice: and is called your image
  chosen_spanish: y es llamado tu imagen
  alternatives_spanish:
  - y es llamado tu imagen
  - y es llamado tu imagen
  lexicon: imago -> imagen; vocative/passive idea preserved in 'es llamado'
  rationale: '''Tu imagen'' traduce literalmente la expresión y conserva la tensión de nombrar al ser humano con lenguaje de representación. No se suaviza a ''semejanza'' porque el latín aquí dice ''imagen''.'
theological_decisions:
- issue: Relación entre la fragilidad de la creación y la dignidad humana
  english_pob_reading: your rain ... it perishes. But man, who has been formed by your hands and is called your image
  chosen_spanish_reading: tu lluvia ... perece. Pero el hombre, que ha sido formado por tus manos y es llamado tu imagen
  alternative_spanish_readings:
  - '... pero el hombre ...'
  - '... pero el ser humano ...'
  rationale: 'Se conserva el contraste retórico del latín: lo creado puede arruinarse por exceso de lluvia, mientras el ser humano recibe un tratamiento especial como obra hecha por las manos divinas. ''Hombre'' mantiene la correspondencia con el latín ''homo'' y el registro del pasaje.'
  doctrine_reference: Doctrina de la creación del ser humano como imagen de Dios (cf. Gn 1:26-27)
translation_notes:
  revision_awareness: La revisión más reciente restauró material omitido del latín ('tu lluvia en su tiempo' y 'si se arruina por la abundancia de lluvia'). La versión española incorpora explícitamente ese material restaurado y conserva la cláusula final sobre el ser humano.
  spanish_consistency_notes:
  - Se mantiene 'tus manos' para el latín 'manibus tuis', evitando una paráfrasis como 'por tu poder' que borraría la imagen corporal.
  - Se usa 'imagen' y no 'semejanza' porque el testimonio latino auditado emplea 'imaginem'.
  - Se conserva un orden que permite leer la antítesis de manera fluida en español sin perder la estructura del original.
