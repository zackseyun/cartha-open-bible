source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: Conuenisti enim obaudire et profecta es nolens, non enim tibi est datum spatium nisi solum modicum uiuere.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/008/005.yaml
  text: For you have consented to obey and have advanced unwillingly[a], for no span has been given to you except only a little while to live.
  footnotes:
  - marker: a
    text: Or 'you have advanced'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:29Z'
    unchanged: false
    changes_summary: Revised 'agreed to listen' to 'consented to obey' for better lexical accuracy of obaudire, and 'set out' to 'advanced' to reflect profecta es more formally. Kept the rest substantially the same.
translation:
  language: es
  text: Porque has consentido en obedecer y has partido[a] de mala gana, pues no te ha sido dado sino solamente un poco de tiempo para vivir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «has avanzado»; la revisión auditada favoreció «has partido» por el valor primario de profecta es como «ponerse en camino» o «partir».
    reason: alternative_reading
lexical_decisions:
- source_word: Conuenisti / obaudire
  english_pob_choice: you have consented to obey
  chosen_spanish: has consentido obedecer
  alternatives_spanish:
  - has accedido a obedecer
  - has consentido en obedecer
  lexicon: consentir; obedecer
  rationale: oboaudire expresa la idea de obedecer tras prestar oído; en español, «consentido obedecer» conserva la relación entre asentimiento y obediencia sin volverlo demasiado interpretativo. «Accedido» es posible, pero «consentido» sigue mejor la intención de aceptación voluntaria.
- source_word: profecta es
  english_pob_choice: have advanced unwillingly
  chosen_spanish: has partido de mala gana
  alternatives_spanish:
  - has avanzado de mala gana
  - has salido de mala gana
  - has emprendido el camino de mala gana
  lexicon: partir; salir; emprender
  rationale: El latín profecta es deriva de proficiscor, cuyo sentido básico es «partir / ponerse en camino». La revisión auditada corrigió «have advanced» por considerar insuficiente la idea de avance; en español, «has partido» refleja mejor el movimiento de salida o partida, y «de mala gana» conserva la resistencia voluntaria indicada por nolens.
- source_word: nolens
  english_pob_choice: unwillingly
  chosen_spanish: de mala gana
  alternatives_spanish:
  - contra tu voluntad
  - sin quererlo
  lexicon: de mala gana; contra voluntad
  rationale: «De mala gana» comunica con naturalidad la falta de disposición volitiva y mantiene el matiz afectivo de resistencia; es más idiomático que un calco como «sin querer» en este contexto.
- source_word: nisi solum modicum
  english_pob_choice: except only a little while
  chosen_spanish: sino solamente un poco
  alternatives_spanish:
  - excepto solamente un poco
  - sino solo por un poco
  - sino únicamente un breve tiempo
  lexicon: sino; solamente; poco
  rationale: La expresión latina enfatiza exclusión y pequeñez de duración. «Sino solamente un poco» preserva esa doble fuerza sin añadir más precisión temporal de la que da el texto fuente.
- source_word: uiuere
  english_pob_choice: to live
  chosen_spanish: para vivir
  alternatives_spanish:
  - de vivir
  - para que vivas
  lexicon: vivir
  rationale: El infinitivo final en latín se traduce de forma directa por «para vivir», que funciona con claridad en español y conserva la referencia al breve lapso de vida.
theological_decisions:
- issue: Duración de la vida como don limitado
  english_pob_reading: no span has been given to you except only a little while to live
  chosen_spanish_reading: no te ha sido dado tiempo sino solamente un poco para vivir
  alternative_spanish_readings:
  - no se te ha concedido un lapso sino solamente un poco para vivir
  - no te fue dado más que un poco de tiempo para vivir
  rationale: La frase expresa una vida delimitada por Dios; «te ha sido dado tiempo» preserva la pasividad del don y la restricción del plazo, sin introducir un matiz doctrinal ajeno al latín.
  doctrine_reference: Providencia divina y límite de la vida humana
- issue: Matiz de obediencia voluntaria
  english_pob_reading: you have consented to obey
  chosen_spanish_reading: has consentido obedecer
  alternative_spanish_readings:
  - has aceptado obedecer
  - has accedido a obedecer
  rationale: La línea une voluntad y obediencia. En español, «consentido obedecer» mantiene la obediencia como respuesta voluntaria, sin rebajarla a mera escucha.
  doctrine_reference: Obediencia humana ante la llamada divina
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó por una corrección importante: la frase latina profecta es fue reevaluada y la lectura ''set out / departed'' se consideró preferible a ''advanced''. La versión española sigue esa revisión, evitando un falso cognado con ''avanzar'' y privilegiando el valor de partida o salida implícito en proficiscor. También se toma como contexto la decisión inglesa más reciente de mantener ''consented to obey'' para obaudire.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa voz pasiva perifrástica («te ha sido dado») para reflejar el dativo de ventaja/perjuicio y la pasividad del don.
  - «Has partido» se eligió por fidelidad semántica al latín, aunque el audit trail inglés conservó 'advanced' por formalidad; el español evita esa ambigüedad.
