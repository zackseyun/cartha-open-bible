  rationale: Se ajusta «has consentido obedecer» a la construcción idiomática «has consentido en obedecer», manteniendo el matiz de asentimiento voluntario. También se mejora la naturalidad de la última cláusula con «un poco de tiempo para vivir», sin perder la fuerza restrictiva del latín nisi solum modicum. Se conserva «has partido» con nota por fidelidad a profecta es.
