translation:
  language: es
  text: Ellos pisotearon a sus justos. Y dijeron en su corazón que no hay Dios[a], aunque en realidad saben que morirán. Como
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque también ellos, aunque recibieron libertad, despreciaron al Altísimo, despreciaron su ley y abandonaron sus caminos».'
    reason: previous_rendering
lexical_decisions:
- source_word: iustos eius
  english_pob_choice: his righteous ones
  chosen_spanish: a sus justos
  alternatives_spanish:
  - a sus justos y rectos
  - a sus justos personas
  lexicon: iustus
  rationale: El latín apunta a los que son justos o rectos ante Dios; en español, «justos» conserva la fuerza nominal sin añadir explicaciones que el texto no da. El posesivo «sus» mantiene la referencia al grupo de Yahvé.
- source_word: conculcauerunt
  english_pob_choice: they trampled
  chosen_spanish: Pisotearon
  alternatives_spanish:
  - Aplastaron
  - Hollaron
  lexicon: conculcare
  rationale: «Pisotear» comunica bien la violencia física y la imagen de desprecio contenida en el latín, sin endurecer el verbo más allá de lo que la escena exige.
- source_word: Et dixerunt in corde suo
  english_pob_choice: And they said in their hearts
  chosen_spanish: Y dijeron en su corazón
  alternatives_spanish:
  - Y dijeron dentro de sí
  - Y se dijeron en su corazón
  lexicon: cor / in corde suo
  rationale: Se conserva la formulación semítica de interioridad. «En su corazón» es natural en español bíblico y mantiene el valor de pensamiento interno, no mera emoción.
- source_word: non esse deum
  english_pob_choice: that there is no God
  chosen_spanish: que no hay Dios
  alternatives_spanish:
  - que Dios no existe
  - que no existe Dios
  lexicon: Deus / negatio
  rationale: «No hay Dios» reproduce la negación absoluta con la concisión del original y del inglés POB, sin convertirlo en un enunciado filosófico moderno más fuerte de lo que el texto expresa.
- source_word: quidem scientes sciunt
  english_pob_choice: though they indeed know
  chosen_spanish: aunque en realidad saben
  alternatives_spanish:
  - aunque ciertamente saben
  - aunque de hecho saben
  lexicon: scientes sciunt
  rationale: 'La construcción intensiva latina se vierte con una duplicación idiomática en español: «en realidad saben». Mantiene el énfasis sin sonar torpe ni mecánico.'
- source_word: moriuntur
  english_pob_choice: they will die
  chosen_spanish: morirán
  alternatives_spanish:
  - van a morir
  - han de morir
  lexicon: mori
  rationale: El futuro simple en español reproduce la certeza del hecho. Dado el contexto, no hace falta explicitar el matiz de necesidad; basta con la afirmación de su destino.
theological_decisions:
- issue: Negación de Dios como acto interior de los impíos
  english_pob_reading: they said in their hearts that there is no God
  chosen_spanish_reading: dijeron en su corazón que no hay Dios
  alternative_spanish_readings:
  - dijeron dentro de sí que Dios no existe
  - se dijeron en su interior que no hay Dios
  rationale: La formulación conserva tanto la dimensión moral como la interior del rechazo a Dios. Evita convertir el texto en una afirmación abstracta sobre la existencia de Dios; el foco sigue siendo la impiedad de quienes la dicen para sí.
  doctrine_reference: Salmo 14:1; Salmo 53:1
- issue: Énfasis de conocimiento culpable frente a la mortalidad
  english_pob_reading: though they indeed know that they will die
  chosen_spanish_reading: aunque en realidad saben que morirán
  alternative_spanish_readings:
  - aunque ciertamente saben que morirán
  - pues saben que morirán
  rationale: 'Se preserva la ironía moral: niegan a Dios mientras saben su propia mortalidad. «En realidad» transmite el énfasis de la construcción latina sin volverla áspera.'
  doctrine_reference: Romanos 1:21-23; Hebreos 9:27
translation_notes:
  revision_awareness: El contexto inglés fue corregido significativamente porque la versión previa correspondía a 2 Esdras 8:56b–57 y no al latín de 8:58. Esta traducción sigue el texto latino recibido ('iustos eius conculcauerunt...') y conserva el cierre abierto de 'Sicut' con 'Como', ya que el verso continúa en la siguiente unidad.
  spanish_consistency_notes:
  - Se usa «Dios» en vez de «dios» porque la negación trata del Dios verdadero, no de una deidad genérica.
  - Se conserva el posesivo de tercera persona en «sus justos» para no perder la referencia al grupo de Yahvé.
  - «En su corazón» mantiene el registro bíblico natural en español y la interioridad semítica del latín.
  - El final abierto «Como» se deja sin completar porque el latín del versículo continúa en la unidad siguiente.
