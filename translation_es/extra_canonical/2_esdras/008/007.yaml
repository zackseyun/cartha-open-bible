translation:
  language: es
  text: llevará el lugar de un hombre. Porque solo tú eres uno[a], y nosotros somos una sola cosa formada por tus manos, como has dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «único».'
    reason: alternative_reading
lexical_decisions:
- source_word: portabit locum hominis
  english_pob_choice: will bear the place of a man
  chosen_spanish: llevará el lugar de un hombre
  alternatives_spanish:
  - llevará la forma de un hombre
  - ocupará el lugar de un hombre
  lexicon: lat. portare; locum; homo
  rationale: El latino transmitido dice literalmente 'llevará el lugar de un hombre', pero el historial crítico indica una probable corrupción textual de locum por un valor original cercano a 'forma' o 'imagen'. En español, 'llevará el lugar de un hombre' conserva la lectura del testimonio latino visible y el debate textual, sin ocultar la tensión documental.
- source_word: Solus enim es, et una plasmatio nos sumus
  english_pob_choice: For you alone are one, and we are one thing formed
  chosen_spanish: Porque solo tú eres uno, y nosotros somos una sola obra formada
  alternatives_spanish:
  - Porque solo tú eres uno, y nosotros somos una sola cosa formada
  - Porque solo tú eres uno, y nosotros somos una sola criatura formada
  lexicon: lat. solus; una plasmatio; nos sumus
  rationale: '''Una plasmatio'' presenta la idea de algo modelado o formado. ''Una sola obra formada'' mantiene la noción de una realidad creada/formada por Dios y evita suavizar demasiado el sustantivo latino. ''Obra'' funciona mejor en español que una transliteración rígida de ''plastificación'' o un ''moldeado'' artificial.'
- source_word: manuum tuarum
  english_pob_choice: your hands
  chosen_spanish: tus manos
  alternatives_spanish:
  - las manos de tus manos
  - de tus manos
  lexicon: lat. manus
  rationale: Se traduce con el posesivo natural 'tus manos', que reproduce fielmente la imagen bíblica de creación manual y conserva la cercanía antropomórfica del original.
theological_decisions:
- issue: 'Singularity applied to God: ''one'' / ''one thing formed'''
  english_pob_reading: you alone are one
  chosen_spanish_reading: solo tú eres uno
  alternative_spanish_readings:
  - solo tú eres único
  - solo tú eres uno solo
  rationale: '''Uno'' sigue de cerca la formulación del texto y mantiene la afirmación de unicidad/divina singularidad sin convertirla en una paráfrasis explicativa. En este contexto, evita introducir un matiz doctrinal más amplio que el que el verso expresa.'
  doctrine_reference: Unicidad y singularidad de Dios en el discurso de oración del texto apocalíptico
- issue: Textual tension between Latin locum and likely original sense
  english_pob_reading: will bear the place of a man
  chosen_spanish_reading: llevará el lugar de un hombre
  alternative_spanish_readings:
  - llevará la forma de un hombre
  - portará el lugar de un hombre
  rationale: Aunque el aparato inglés revisó hacia 'form of a man' por la probable corrupción del latín, el mandato de trabajar desde el texto fuente inmediato exige que el español refleje el latino transmitido y, a la vez, deje visible la tensión textual mediante una redacción literal. No se borra la evidencia del testimonio latino, pero tampoco se fuerza una armonización doctrinal.
  doctrine_reference: Crítica textual y prioridad del testimonio latino frente a la reconstrucción inferida
translation_notes:
  revision_awareness: El inglés de trabajo pasó por una corrección importante entre 'who bears the form of a man' y 'will bear the place of a man' para volver al latino transmitido, reconociendo a la vez que locum probablemente refleja una corrupción textual. El español sigue el testimonio latino visible, pero conserva la tensión crítica sin eliminarla.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino solo cuando aparezca explícitamente; aquí no aparece.
  - '''uno'' se usa para reflejar la afirmación de singularidad de Dios sin sustituirla por una explicación doctrinal.'
  - '''obra formada'' intenta equilibrar fidelidad y naturalidad en español para plasmatio.'
  - No se introduce 'Cristo', 'Señor' ni otras formulaciones no presentes en el segmento.
