base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/008/032.yaml
  text: For if you desire to have mercy on us, then you will be called merciful, for we are sinners.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:35Z'
    unchanged: false
    changes_summary: 'Revised to reflect the Latin more completely and accurately: added the explicit idea from ''propter nos peccatores'' by rendering ''for we are sinners,'' and removed ''since we do not have works of righteousness,'' which is not present in this Latin verse fragment.'
translation:
  language: es
  text: Porque, si deseas tener misericordia de nosotros, entonces serás llamado misericordioso, pues somos pecadores.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: misericors uocatus es / misericors uocaberis
  english_pob_choice: will be called merciful
  chosen_spanish: serás llamado misericordioso
  alternatives_spanish:
  - serás llamado compasivo
  - serás reconocido como misericordioso
  lexicon: misericors -> misericordioso
  rationale: El latín usa el adjetivo misericors tanto en la forma presente como en la pasiva futura de 'ser llamado'. 'Misericordioso' conserva el valor léxico y la forma nominativa aplicable a la atribución de un nombre o cualidad; 'compasivo' es posible, pero diluye la correspondencia más directa con el latín y con el uso bíblico de la cualidad divina.
- source_word: Si enim desideraueris ut nostri miserearis
  english_pob_choice: For if you desire to have mercy on us
  chosen_spanish: Porque, si deseas tener misericordia de nosotros
  alternatives_spanish:
  - Pues, si quieres apiadarte de nosotros
  - Porque, si deseas compadecerte de nosotros
  lexicon: misereri -> tener misericordia de
  rationale: La construcción latina pide un verbo que exprese el acto de mostrar misericordia. 'Tener misericordia de' reproduce con naturalidad la relación verbal del original; 'apiadarte' o 'compadecerte' serían más interpretativos y menos estables para el registro bíblico.
- source_word: propter nos peccatores
  english_pob_choice: for we are sinners
  chosen_spanish: pues somos pecadores
  alternatives_spanish:
  - porque somos pecadores
  - ya que somos pecadores
  lexicon: peccatores -> pecadores
  rationale: El añadido explícito de 'pecadores' proviene del latín y fue restituido en la revisión inglesa. 'Pues' mantiene la función explicativa/causal breve del fragmento sin sobrecargar el ritmo; 'porque' también sería válido, pero 'pues' encaja mejor tras la coma precedente.
theological_decisions:
- issue: Relación entre la misericordia divina solicitada y la designación resultante
  english_pob_reading: then you will be called merciful
  chosen_spanish_reading: entonces serás llamado misericordioso
  alternative_spanish_readings:
  - entonces te llamarán misericordioso
  - entonces serás reconocido como misericordioso
  rationale: El latín emplea una pasiva ('uocaberis'), por lo que la forma 'serás llamado' preserva la voz y la relación de atribución. No se convierte en una formulación activa, para no suavizar la estructura retórica del texto.
  doctrine_reference: Designación divina por su acto de misericordia; preservación de la voz pasiva del original.
- issue: Inclusión de la cláusula causal final
  english_pob_reading: for we are sinners
  chosen_spanish_reading: pues somos pecadores
  alternative_spanish_readings:
  - porque somos pecadores
  - ya que somos pecadores
  rationale: La revisión inglesa corrigió el contenido para reflejar el latín 'propter nos peccatores'. La traducción debe mantener esta confesión de pecado de forma explícita, sin sustituirla por una idea de carencia de obras de justicia que no está en este verso.
  doctrine_reference: Confesión de pecado humana como fundamento de la petición de misericordia.
translation_notes:
  revision_awareness: This draft follows the latest revised English POB reading ('for we are sinners') rather than the earlier, now-retracted wording about lacking works of righteousness, because the Latin source explicitly includes 'propter nos peccatores' and does not contain the retracted phrase.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y moderno, sin arcaísmos innecesarios.
  - '''Misericordioso'' conserva el enlace léxico con el latín misericors y evita sustituirlo por una paráfrasis más libre.'
  - La cláusula final se traduce de manera explícita como confesión de pecado, coherente con la revisión textual más reciente.
  - La puntuación reproduce la lógica causal y condicional del latín con naturalidad en español.
