translation:
  language: es
  text: Tú me has mostrado una multitud de señales que comenzarás a hacer en los tiempos finales[a], pero no me has mostrado en qué tiempo.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la multitud de las señales que comenzarás a hacer»; también puede entenderse más simplemente: «una multitud de señales que harás».'
    reason: Preserva la alternativa formal del rastro inglés y la posibilidad discutida en la auditoría sobre la fuerza de incipies facere.
lexical_decisions:
- source_word: multitudinem signorum
  english_pob_choice: a multitude of signs
  chosen_spanish: una multitud de señales
  alternatives_spanish:
  - muchas señales
  - una multitud de signos
  lexicon: multitudo -> multitud; signum -> señal
  rationale: En latín no hay artículo definido; por eso se refleja mejor con 'una multitud' y no 'la multitud'. 'Señales' comunica el valor de signa como hechos visibles o indicadores, y evita el tecnicismo ambiguo de 'signos' en español general.
- source_word: incipies facere
  english_pob_choice: that you will begin to do
  chosen_spanish: comenzarás a hacer
  alternatives_spanish:
  - empezarás a hacer
  - vas a hacer
  lexicon: incipio + infinitivo -> comenzar a + infinitivo
  rationale: La revisión inglesa discutió si 'incipies facere' expresa inicio o futuro; en español, 'comenzarás a hacer' conserva explícitamente el matiz inceptivo sin perder la referencia futura.
- source_word: in nouissimis
  english_pob_choice: in the last times
  chosen_spanish: en los tiempos finales
  alternatives_spanish:
  - en los últimos tiempos
  - en el fin de los tiempos
  lexicon: novissimus -> final / último
  rationale: '''Tiempos finales'' suena natural en español bíblico contemporáneo y mantiene la referencia escatológica sin forzar una fórmula más rígida que el latín.'
- source_word: quo tempore
  english_pob_choice: at what time
  chosen_spanish: en qué tiempo
  alternatives_spanish:
  - en qué momento
  - cuándo
  lexicon: tempus -> tiempo / momento
  rationale: Se conserva la pregunta sobre el tiempo exacto. 'En qué tiempo' reproduce con sobriedad la apertura de la consulta y deja intacta la imprecisión pedida por el texto.
theological_decisions:
- issue: Referencia escatológica a 'los tiempos finales'
  english_pob_reading: in the last times
  chosen_spanish_reading: en los tiempos finales
  alternative_spanish_readings:
  - en los últimos tiempos
  - en el fin de los tiempos
  rationale: No se suaviza la carga escatológica del texto; 'tiempos finales' mantiene la expectativa de eventos futuros decisivos sin introducir una interpretación doctrinal adicional.
  doctrine_reference: escatología
- issue: Alcance de 'señales' como obras futuras de Dios
  english_pob_reading: a multitude of signs that you will begin to do
  chosen_spanish_reading: una multitud de señales que comenzarás a hacer
  alternative_spanish_readings:
  - muchas señales que harás
  - una multitud de signos que harás
  rationale: La formulación conserva que las señales son acciones futuras atribuidas al interlocutor divino, sin convertirlas en meros símbolos ni reducir el plural a un singular colectivo.
  doctrine_reference: providencia divina y revelación
- issue: Petición por el momento exacto
  english_pob_reading: you have not shown me at what time
  chosen_spanish_reading: no me has mostrado en qué tiempo
  alternative_spanish_readings:
  - no me has mostrado cuándo
  - no me has mostrado a qué tiempo
  rationale: 'Se mantiene la tensión del original: hay revelación sobre los hechos, pero no sobre su cronología precisa. No se resuelve la ambigüedad con una paráfrasis más interpretativa.'
  doctrine_reference: revelación y límites del conocimiento profético
translation_notes:
  revision_awareness: 'He tenido en cuenta la revisión del inglés: la frase latina ''multitudinem signorum'' no lleva artículo definido, y ''incipies facere'' puede conservarse como un inicio futuro (''comenzarás a hacer'') sin perder la lectura de futuro. La versión española sigue esa decisión revisada y evita depender mecánicamente del inglés previo.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona singular dirigido al interlocutor.
  - '''Señales'' se usa de forma consistente para signa en este contexto escatológico.'
  - La nota [a] preserva la alternativa inceptiva señalada por el auditorio inglés.
