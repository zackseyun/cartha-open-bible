translation:
  language: es
  text: la sabiduría ha sido perfeccionada de antemano. La raíz ha sido sellada por ustedes, la flaqueza ha sido extinguida por ustedes, y la muerte ha sido ocultada; el Hades ha huido, y
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ante perfecta sapientia
  english_pob_choice: wisdom has been perfected beforehand
  chosen_spanish: la sabiduría ha sido perfeccionada de antemano
  alternatives_spanish:
  - la sabiduría ha sido perfeccionada previamente
  - la sabiduría ha sido completada de antemano
  lexicon: sapientia → sabiduría
  rationale: Renderizo sapientia como 'sabiduría', el equivalente natural y más fiel en español. 'De antemano' conserva el valor temporal de ante perfecta sin añadir una idea de causalidad. 'Perfeccionada' mantiene la pasiva y el estado consumado de la acción.
- source_word: Radix signata est a uobis
  english_pob_choice: The root has been sealed by you
  chosen_spanish: La raíz ha sido sellada por ustedes
  alternatives_spanish:
  - La raíz ha sido sellada por vosotros
  - La raíz ha sido marcada por ustedes
  lexicon: radix → raíz; signata est → ha sido sellada
  rationale: '''Raíz'' es la correspondencia directa de radix. Sigo la revisión auditada que corrigió la relación agentiva de a vobis a ''por ustedes'', porque el latín expresa agente en pasiva. ''Sellada'' mantiene la imagen de signata con su fuerza de cierre/protección.'
- source_word: infirmitas extincta est a uobis
  english_pob_choice: weakness has been extinguished by you
  chosen_spanish: la debilidad ha sido extinguida por ustedes
  alternatives_spanish:
  - la debilidad ha sido apagada por ustedes
  - la enfermedad ha sido extinguida por ustedes
  lexicon: infirmitas → debilidad; extincta est → ha sido extinguida
  rationale: '''Debilidad'' refleja infirmitas sin desplazar el sentido hacia ''enfermedad'', que sería demasiado específico. ''Extinguida'' conserva la imagen de extinción o cese total presente en extincta est.'
- source_word: mors absconsa est
  english_pob_choice: death has been hidden
  chosen_spanish: la muerte ha sido escondida
  alternatives_spanish:
  - la muerte ha sido ocultada
  - la muerte ha sido escondida
  lexicon: mors → muerte; absconsa est → ha sido escondida
  rationale: '''Muerte'' es la equivalencia obvia de mors. ''Escondida'' reproduce el sentido de absconsa est de manera clara y natural en español; ''ocultada'' también sería posible, pero ''escondida'' resulta más idiomática.'
- source_word: infernus fugit
  english_pob_choice: Hades has fled
  chosen_spanish: el Hades ha huido
  alternatives_spanish:
  - el Hades ha escapado
  - el Hades ha huido
  lexicon: infernus → Hades
  rationale: Conservo 'Hades' porque el POB inglés lo usa para infernus, preservando el referente del inframundo sin sustituirlo por una explicación interpretativa. 'Ha huido' sigue el verbo fugit de forma directa.
theological_decisions:
- issue: Lectura del agente en las pasivas con a vobis
  english_pob_reading: The root has been sealed by you; weakness has been extinguished by you
  chosen_spanish_reading: La raíz ha sido sellada por ustedes; la debilidad ha sido extinguida por ustedes
  alternative_spanish_readings:
  - La raíz ha sido sellada desde ustedes
  - La raíz les ha sido sellada
  rationale: La revisión textual auditada corrigió el inglés para reflejar el latín pasivo con agente a vobis. En español, 'por ustedes' expresa con precisión ese agente y evita borrar la relación causal/agentiva del texto.
  doctrine_reference: Pasiva con agente en traducción bíblica; fidelidad sintáctica al latín
translation_notes:
  revision_awareness: El texto latino correcto de 2 Esdras 8:53 es 'ante perfecta sapientia. Radix signata est a uobis, infirmitas extincta est a uobis et mors absconsa est; infernus fugit et'. La auditoría inglesa documenta una corrección de desalineación de versículo; por eso la versión española sigue la lectura latina correcta y la revisión más reciente que fija 'by you' para a vobis.
  spanish_consistency_notes:
  - Mantengo 'Hades' en vez de 'infierno' para seguir el uso auditado de la POB inglesa con infernus y evitar una equivalencia demasiado interpretativa.
  - Uso 'por ustedes' de modo consistente en ambas cláusulas pasivas para reflejar a vobis.
  - Conservo un tono solemne y directo, sin introducir explicaciones no presentes en el latín.
