translation:
  language: es
  text: Conforme a tus palabras, así será. Porque, en verdad, no pensaré
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: iuxta sermones tuos
  english_pob_choice: According to your words
  chosen_spanish: Conforme a tus palabras
  alternatives_spanish:
  - Según tus palabras
  - De acuerdo con tus palabras
  lexicon: iuxta + sermones
  rationale: iuxta expresa conformidad o ajuste a lo dicho; "Conforme a" suena natural en español y conserva la idea de correspondencia con las palabras dichas, sin volverlo más interpretativo que el latín.
- source_word: sic et fiet
  english_pob_choice: so it will be
  chosen_spanish: así será
  alternatives_spanish:
  - así se hará
  - de ese modo ocurrirá
  lexicon: sic + fiet
  rationale: fiet señala un futuro pasivo/impersonal de realización; "así será" comunica de forma idiomática la certeza del cumplimiento, manteniendo la fuerza del original sin añadir sujeto.
- source_word: Quoniam
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: quoniam
  rationale: quoniam introduce una explicación causal; "Porque" es la equivalencia más directa y natural para el flujo del español bíblico contemporáneo.
- source_word: uere
  english_pob_choice: truly
  chosen_spanish: en verdad
  alternatives_spanish:
  - verdaderamente
  - ciertamente
  lexicon: uere
  rationale: uere refuerza la afirmación; "en verdad" conserva el énfasis solemne sin sonar excesivamente arcaico.
- source_word: non cogitabo
  english_pob_choice: I will not think
  chosen_spanish: no pensaré
  alternatives_spanish:
  - no consideraré
  - no meditaré
  lexicon: cogitare
  rationale: cogitare puede abarcar pensar, considerar o meditar; aquí el POB inglés eligió la forma simple "think", y "no pensaré" reproduce ese valor de manera directa y abierta.
theological_decisions:
- issue: El fragmento termina abruptamente con una negación futura sin objeto explícito.
  english_pob_reading: For truly I will not think
  chosen_spanish_reading: Porque, en verdad, no pensaré
  alternative_spanish_readings:
  - Porque, en verdad, no consideraré
  - Porque, en verdad, no meditaré
  rationale: El latín conservado se corta después de non cogitabo; no debe completarse ni suavizarse con un objeto implícito. La traducción española mantiene la interrupción y la inacabación del testimonio textual.
  doctrine_reference: Fidelidad textual; preservación de laguna o fragmento sin expansión interpretativa
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió una inserción ajena de diálogo y restauró la segunda cláusula latina omitida. Esta versión española sigue esa decisión: traduce solo el contenido atestiguado en el fragmento limpio y conserva la frase final incompleta, sin añadir complemento.'
  spanish_consistency_notes:
  - Se mantiene "Conforme a" para el valor de ajuste/comparencia de iuxta.
  - No se usa "SEÑOR" ni otras equivalencias no presentes; el texto no contiene nombres divinos.
  - Se conserva el registro sobrio y bíblico, pero con español natural.
  - La frase final queda deliberadamente abierta para reflejar el fragmento latino transmitido.
