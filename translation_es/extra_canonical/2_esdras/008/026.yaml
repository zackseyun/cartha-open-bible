translation:
  language: es
  text: pero sobre los que te han servido en verdad. No prestes atención[a] a los afanes de los que actúan impíamente,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "No atiendas a".'
    reason: lexical_alternative for adtendas
lexical_decisions:
- source_word: adtendas
  english_pob_choice: Do not pay attention to
  chosen_spanish: No prestes atención a
  alternatives_spanish:
  - No atiendas a
  - No consideres
  - No mires a
  lexicon: attendo
  rationale: El latino adtendas significa dirigir la mente hacia algo, no 'atender' en el sentido moderno de asistir o cuidar. 'No prestes atención a' conserva la idea de enfocar la mente, y evita la ambigüedad moderna de 'atender'.
- source_word: impie agentium studia
  english_pob_choice: the pursuits of those who act impiously
  chosen_spanish: las prácticas de los que actúan impíamente
  alternatives_spanish:
  - los afanes de los que obran impíamente
  - los empeños de los impíos
  - las empresas de los que obran mal
  lexicon: studium / impie agere
  rationale: studia aquí se entiende como empeños, prácticas o actividades; 'prácticas' mantiene el valor de conducta persistente. 'Impíamente' conserva el adverbio latino y su fuerza moral-religiosa sin suavizarla a 'mal'.
- source_word: qui tua
  english_pob_choice: those who have served you in truth
  chosen_spanish: los que te han servido en verdad
  alternatives_spanish:
  - los que te sirvieron fielmente
  - los que te han servido con verdad
  lexicon: qui tua
  rationale: La frase latina está fragmentaria en el testimonio dado, pero el contexto del POB inglés apunta a los que han servido con verdad/fidelidad. 'En verdad' preserva la formulación directa y permite la relación con la fidelidad sin introducir una paráfrasis más amplia.
theological_decisions:
- issue: Contraste entre los fieles y los impíos
  english_pob_reading: but upon those who have served you in truth. Do not pay attention to the pursuits of those who act impiously
  chosen_spanish_reading: pero sobre los que te han servido en verdad. No prestes atención a las prácticas de los que actúan impíamente
  alternative_spanish_readings:
  - sino sobre los que te han servido en verdad
  - pero fíjate en los que te han servido fielmente
  rationale: 'La estructura conserva el contraste implícito del texto: por un lado, los servidores fieles; por otro, la advertencia de no fijarse en la conducta de los impíos. No se suaviza la tensión moral del pasaje.'
  doctrine_reference: fidelidad vs. impiedad en el juicio y discernimiento moral
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente de 'Do not attend to' a 'Do not pay attention to' por claridad moderna; la versión española refleja esa intención con 'No prestes atención a'. No hay otros cambios sustantivos en el último pass.
  spanish_consistency_notes:
  - Se mantiene 'en verdad' para reproducir la fuerza del inglés POB sin añadir 'fielmente' en el texto principal.
  - '''impíamente'' conserva el registro bíblico y el contraste ético del latín.'
  - La puntuación con coma final preserva que la cláusula continúa en el versículo siguiente o en la unidad mayor, según el flujo del texto fuente.
