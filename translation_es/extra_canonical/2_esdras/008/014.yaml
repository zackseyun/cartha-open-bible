review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el latín disponible: ''tu obra'' refleja tuum opus; ''destruyes'' preserva la fuerza de perdideris; ''fue formado'' representa adecuadamente plasmatus; y la pregunta retórica final concuerda con el sentido del inglés auditado. Sin embargo, ''tantis laboribus'' queda más natural y preciso en español como ''con tan gran esfuerzo'' que como ''con tan grandes trabajos'', ya que aquí laboribus apunta al esfuerzo invertido en la formación más que a ''trabajos'' como objeto contable.'
  spanish_quality_summary: El texto es claro y de registro digno, pero 'con tan grandes trabajos' suena algo calcado y menos idiomático en español bíblico moderno. Una leve mejora de naturalidad y fluidez produce una línea más legible sin perder literalidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones principales ('obra', 'destruyes', 'fue formado') son compatibles con el POB. La única mejora recomendada es léxica-estilística para laboribus.
  issues:
  - severity: medium
    issue: La expresión 'con tan grandes trabajos' suena poco natural en español.
    rationale: Aunque es entendible y cercana al latín, en este contexto de creación divina 'trabajos' resulta más torpe que 'esfuerzo', 'fatigas' o similar. 'Tantis laboribus' enfatiza la magnitud del esfuerzo invertido al formar, y el español gana claridad con una formulación menos calcada.
  revised_spanish_text: tu obra. Si, pues, destruyes al que fue formado con tan gran esfuerzo, ¿por qué fue hecho?
  revision_rationale: Se conserva plenamente el sentido del latín y del POB inglés, pero se sustituye 'con tan grandes trabajos' por 'con tan gran esfuerzo' para lograr un español más natural y claro, manteniendo el énfasis en la magnitud del esfuerzo creador.
