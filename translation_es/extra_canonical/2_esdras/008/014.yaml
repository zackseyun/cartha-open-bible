translation:
  language: es
  text: tu obra. Si, pues, destruyes al que fue formado con tan gran esfuerzo, ¿por qué fue hecho?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: tuum opus
  english_pob_choice: your work
  chosen_spanish: tu obra
  alternatives_spanish:
  - tu trabajo
  - lo que has hecho
  lexicon: opus
  rationale: En este contexto, opus se refiere a la obra creada o realizada por Dios; "obra" mantiene el alcance teológico y el paralelo natural con la pregunta sobre quien fue formado. "Trabajo" es posible, pero en español suena menos directo como designación de una creación divina.
- source_word: perdideris
  english_pob_choice: destroy
  chosen_spanish: destruyes
  alternatives_spanish:
  - pierdes
  - arruinas
  lexicon: perdere
  rationale: El POB inglés eligió "destroy" para conservar la fuerza del verbo. "Destruyes" refleja bien esa intensidad en español y encaja con el contraste entre la facilidad de la destrucción y el gran esfuerzo de la formación.
- source_word: tantis laboribus
  english_pob_choice: such great labors
  chosen_spanish: tan grandes trabajos
  alternatives_spanish:
  - tan grandes fatigas
  - con tan gran esfuerzo
  lexicon: labor
  rationale: '"Trabajos" conserva el campo semántico de labor, esfuerzo y fatiga. Se evita una paráfrasis más libre para mantener la magnitud enfatizada por tantis.'
- source_word: plasmatus
  english_pob_choice: was formed
  chosen_spanish: fue formado
  alternatives_spanish:
  - fue modelado
  - fue plasmado
  lexicon: plasmare
  rationale: '"Formado" es claro, fiel y de registro bíblico. "Plasmado" sería más literal frente al latín, pero en español puede sonar más literario y menos transparente; aquí "formado" comunica bien el acto creador.'
theological_decisions:
- issue: Contraste entre la facilidad de destruir y el esfuerzo de formar
  english_pob_reading: The English POB keeps the rhetorical question focused on the contrast between destruction and the great labors of creation, without adding unsupported modifiers.
  chosen_spanish_reading: 'La versión española conserva el mismo contraste: destruir frente a ser formado con tan grandes trabajos.'
  alternative_spanish_readings:
  - Si, pues, destruyes por un fácil decreto...
  - Si, pues, destruyes al que fue formado por tu mandato...
  rationale: No se introducen ideas ausentes del latín proporcionado, como "por tu mandato" o "por un fácil decreto". El español mantiene la tensión retórica sin expandir el texto más allá de la base fuente.
  doctrine_reference: Antropología teológica y lenguaje de la creación; preserva la retórica de la fragilidad humana ante el Creador sin añadir doctrinas ajenas al verso.
translation_notes:
  revision_awareness: La revisión más reciente eliminó del inglés frases no presentes en el latín proporcionado ('by an easy decree', 'by your command') y restauró el arranque fragmentario como 'your work'. La traducción española sigue esa base revisada, sin reintroducir los elementos eliminados, y conserva el quiebre retórico del texto.
  spanish_consistency_notes:
  - Se usa "obra" para opus, de acuerdo con el sentido creador del pasaje.
  - Se mantiene el tratamiento de segunda persona singular implícito en el latín.
  - No se añade nota de pie porque el texto latino proporcionado no conserva la variante expandida descartada en la revisión inglesa.
