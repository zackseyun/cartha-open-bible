  to: tu obra. Si, pues, destruyes al que fue formado con tan gran esfuerzo, ¿por qué fue hecho?
  rationale: Se conserva plenamente el sentido del latín y del POB inglés, pero se sustituye 'con tan grandes trabajos' por 'con tan gran esfuerzo' para lograr un español más natural y claro, manteniendo el énfasis en la magnitud del esfuerzo creador.
