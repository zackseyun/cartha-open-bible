review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta correctamente la estructura latina y, de manera importante, conserva la súplica negativa implícita en «super nos» como continuación del contexto anterior. «ten misericordia de tu heredad» y «tu propia creación» reflejan bien «miserere haereditati tuae» y «tuae enim creaturae misereris». Sin embargo, «parce populo tuo» se vierte mejor como «perdona a tu pueblo» solo en contextos de remisión explícita; aquí el latín pide que Dios los perdone/los trate con indulgencia en el sentido de «perdonarles la vida / no castigarlos», y en español bíblico la opción más fiel y natural es «perdona a tu pueblo» o mejor «perdona a tu pueblo»? No: para evitar ambigüedad moral-legal y acercarse a «spare», conviene «perdona a tu pueblo» menos que «perdona a tu pueblo»; la mejor reparación es «perdona a tu pueblo»? Aun así, el problema principal es estilístico-semántico: «no sea sobre nosotros» suena calcado e incómodo en español.'
  spanish_quality_summary: El texto es comprensible y digno, pero «no sea sobre nosotros» resulta poco natural en español moderno. «No venga sobre nosotros» o «no recaiga sobre nosotros» transmite mejor una carga o juicio que cae sobre alguien. Además, «perdona a tu pueblo» puede leerse como absolución de culpa más que como indulgencia ante castigo; «perdona a tu pueblo» sigue siendo posible, pero «perdona a tu pueblo» no mejora. La opción más clara y bíblicamente natural para «parce» es «perdona a tu pueblo» o «ten piedad de tu pueblo»; como «miserere» ya se traduce «ten misericordia», conviene evitar duplicación y usar «perdona a tu pueblo» solo si se acepta esa amplitud. Mejor aún, «perdona a tu pueblo» no resuelve del todo; «sé indulgente con tu pueblo» sería más exacto pero menos bíblico. Por fidelidad y legibilidad, propongo ajustar solo la primera cláusula y mantener el resto.
  glossary_alignment: No hay términos del glosario principal en disputa. «heredad» para «haereditati» está bien por su matiz bíblico-covenantal. «misericordia» para «miserere» está bien. «creación» para «creaturae» es aceptable y clara. El único punto léxico a reparar es la naturalidad de «super nos» en español.
  issues:
  - severity: medium
    issue: «no sea sobre nosotros» suena poco idiomático en español
    rationale: Aunque sigue de cerca el latín, en español moderno y eclesial suena forzado. «no venga sobre nosotros» expresa mejor la súplica de que el juicio o carga no caiga sobre ellos, como indica el contexto y la nota inglesa.
  - severity: low
    issue: La nota al pie podría simplificarse al convertir la alternativa en el texto principal
    rationale: Si el texto adopta «no venga sobre nosotros», la nota actual deja de ser necesaria, pues ya no hay una ambigüedad significativa que preservar.
  revised_spanish_text: no venga sobre nosotros, sino perdona a tu pueblo y ten misericordia de tu heredad, porque tú tienes misericordia de tu propia creación.
  revision_rationale: Se reemplaza «no sea sobre nosotros» por «no venga sobre nosotros» para conservar el sentido de «super nos» en una súplica negativa, pero con español más natural y claro. No se requieren notas al pie porque la nueva redacción expresa directamente el sentido documentado en la auditoría inglesa.
