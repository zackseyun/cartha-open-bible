translation:
  language: es
  text: no sea sobre nosotros[a], sino perdona a tu pueblo y ten misericordia de tu heredad, porque tú tienes misericordia de tu propia creación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no venga sobre nosotros»; la frase refleja una súplica de que el juicio o la carga no recaiga sobre ellos.'
    reason: alternative_reading
lexical_decisions:
- source_word: super nos
  english_pob_choice: let it not be upon us
  chosen_spanish: no sea sobre nosotros
  alternatives_spanish:
  - no venga sobre nosotros
  - no recaiga sobre nosotros
  lexicon: Latin super + pronominal object with negative plea
  rationale: El latín expresa que algo no recaiga 'sobre nosotros'; en español, 'no sea sobre nosotros' conserva la idea de carga o juicio que cae encima, sin introducir un verbo más fuerte de lo que el texto pide.
- source_word: parce
  english_pob_choice: spare
  chosen_spanish: perdona
  alternatives_spanish:
  - perdona a
  - ten piedad de
  - ahorra
  lexicon: Latin parcere
  rationale: '''Parcere'' aquí funciona como una súplica de indulgencia o perdón para el pueblo. ''Perdona'' es natural en español y mantiene la petición directa sin diluir la fuerza de la súplica.'
- source_word: miserere
  english_pob_choice: have mercy
  chosen_spanish: ten misericordia
  alternatives_spanish:
  - apiádate de
  - ten piedad de
  lexicon: Latin misereri
  rationale: '''Ten misericordia'' reproduce fielmente la fórmula bíblica y conserva el registro reverente del ruego.'
- source_word: haereditati tuae
  english_pob_choice: your inheritance
  chosen_spanish: tu heredad
  alternatives_spanish:
  - tu herencia
  - tu posesión
  lexicon: Latin haereditas
  rationale: '''Heredad'' mantiene el matiz bíblico-covenantal habitual en español para el pueblo como posesión propia de Dios, sin perder inteligibilidad.'
- source_word: creaturae tuae
  english_pob_choice: your own creation
  chosen_spanish: tu propia creación
  alternatives_spanish:
  - tu criatura
  - lo que has creado
  lexicon: Latin creatura
  rationale: '''Creación'' comunica mejor en español moderno la relación de dependencia y origen que el latín sugiere; se conserva ''propia'' para reflejar el énfasis posesivo de ''tuae''.'
theological_decisions:
- issue: Alcance de 'super nos' y su relación con la súplica negativa
  english_pob_reading: let it not be upon us
  chosen_spanish_reading: no sea sobre nosotros
  alternative_spanish_readings:
  - no recaiga sobre nosotros
  - no venga sobre nosotros
  rationale: El contexto inmediato muestra que 'super nos' completa la súplica negativa anterior y no introduce una idea distinta. El español debe expresar el deseo de que el juicio o la carga no recaigan sobre ellos.
  doctrine_reference: Oración de intercesión y petición de misericordia en contexto de juicio
translation_notes:
  revision_awareness: 'La revisión auditada corrigió un error importante del borrador inglés: ''super nos'' no pertenece a una idea de dominio ni a un título, sino a la súplica negativa de no dejar que recaiga sobre nosotros. La versión española sigue esa lectura y conserva la relación con la petición posterior de perdón y misericordia.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico reverente con 'ten misericordia' y 'heredad'.
  - '''Perdona a tu pueblo'' conserva la petición breve y directa del latín ''parce populo tuo''.'
  - La nota a pie de página ofrece una alternativa española válida sin alterar el sentido base.
  - No se introduce 'Señor' ni una fórmula de título, porque el latín aquí no lo exige en este miembro del versículo.
