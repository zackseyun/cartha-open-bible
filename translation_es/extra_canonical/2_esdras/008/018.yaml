translation:
  language: es
  text: Pero he oído la rapidez del juicio que ha de venir.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: terrā(m)
  english_pob_choice: But I have heard the swiftness of the judgment that is to come.
  chosen_spanish: Pero he oído la rapidez del juicio que ha de venir.
  alternatives_spanish:
  - Pero he oído la celeridad del juicio que ha de venir.
  - Pero he oído la prontitud del juicio que ha de venir.
  lexicon: Latin rapiditas/celeritas -> rapidez; iudicium -> juicio
  rationale: El texto latino conservado habla de la celeridad/rapidez del juicio; en español, «rapidez» comunica con naturalidad esa idea sin intensificar ni suavizar el sentido. «Celeridad» y «prontitud» son posibles, pero la primera suena más técnica y la segunda puede desplazar el énfasis hacia disponibilidad más que velocidad.
- source_word: audivi
  english_pob_choice: I have heard
  chosen_spanish: he oído
  alternatives_spanish:
  - he escuchado
  - he sabido
  lexicon: Latin audire -> oír/escuchar
  rationale: Se mantiene el valor directo de audivi como percepción auditiva o conocimiento recibido. «He oído» sigue de cerca el matiz del inglés audit trail y evita introducir una interpretación más reflexiva como «he sabido».
- source_word: iudicii
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - juicio condenatorio
  lexicon: Latin iudicium -> juicio/sentencia
  rationale: «Juicio» es la forma más neutral y fiel al término latino. «Sentencia» enfatiza más el veredicto final, pero el contexto permite mantener el término amplio sin perder la referencia escatológica.
theological_decisions:
- issue: Escatología del juicio venidero
  english_pob_reading: the judgment that is to come
  chosen_spanish_reading: el juicio que ha de venir
  alternative_spanish_readings:
  - el juicio venidero
  - el juicio que vendrá
  rationale: La construcción «ha de venir» conserva el carácter futuro y cierto del original, a la vez que suena natural en español bíblico contemporáneo. No se añade contenido doctrinal que el latín no exprese explícitamente.
  doctrine_reference: juicio final / escatología bíblica
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde «heard of the swiftness» a «heard the swiftness» para reflejar mejor el latino audivi con objeto directo. La versión española sigue esa lectura directa con «he oído la rapidez».
  spanish_consistency_notes:
  - Se evita «de la rapidez» porque la revisión inglesa y el latino favorecen objeto directo, no complemento preposicional.
  - Se mantiene un registro bíblico sobrio y actual, sin arcaísmos innecesarios.
