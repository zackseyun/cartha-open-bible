base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/008/024.yaml
  text: Hear[a], Lord, the prayer of your servant, and give ear to the petition of your creature; pay attention to my words. For while I live I will speak, and while I have understanding I will answer.
  footnotes:
  - marker: a
    text: Or 'hear, Lord, the prayer of your servant, and receive with your ears the petition of your thing formed;'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:34Z'
    unchanged: false
    changes_summary: 'Added the final clause present in the Latin: ''For while I live I will speak, and while I have understanding I will answer.'' Kept the rest essentially unchanged, with ''have understanding'' rendering sapio naturally and formally.'
translation:
  language: es
  text: Escucha, Señor, la oración de tu siervo, y presta oído[a] a la petición de tu criatura; atiende mis palabras. Porque mientras viva hablaré, y mientras tenga entendimiento responderé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «da oído a la petición de tu criatura»; el latino dice literalmente «percibe con los oídos», una locución idiomática de atención cuidadosa.'
    reason: Preserva la alternativa más literal documentada sin sobrecargar el texto principal.
lexical_decisions:
- source_word: serui tui
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: δοῦλος / servus
  rationale: El contexto de súplica humilde y el registro del texto latino favorecen una expresión de dependencia fuerte. «Esclavo» conserva mejor la fuerza semántica que «siervo», que en español puede suavizar demasiado la relación.
- source_word: auribus percipe
  english_pob_choice: give ear
  chosen_spanish: presta oído
  alternatives_spanish:
  - escucha atentamente
  - atiende
  lexicon: audire / ἐνωτίζεσθαι
  rationale: La locución es idiomática y no debe volverse un calco extraño. «Presta oído» reproduce bien el matiz de escuchar con atención, manteniendo dignidad y naturalidad en español.
- source_word: figmenti tui
  english_pob_choice: your creature
  chosen_spanish: tu criatura
  alternatives_spanish:
  - tu obra formada
  - tu hechura
  lexicon: πλάσμα / figmentum
  rationale: «Criatura» comunica de manera natural la idea de algo formado por Dios y conserva la humildad teológica del término. «Obra formada» o «hechura» serían más explicativos, pero menos fluidos.
- source_word: intende uerba mea
  english_pob_choice: pay attention to my words
  chosen_spanish: atiende mis palabras
  alternatives_spanish:
  - fíjate en mis palabras
  - pon atención a mis palabras
  lexicon: intendere
  rationale: «Atiende» refleja adecuadamente la idea de dirigir la atención sin añadir intensidad excesiva. Es claro y fiel al sentido del latino.
- source_word: Dum enim uiuo loquar
  english_pob_choice: For while I live I will speak
  chosen_spanish: Porque mientras viva hablaré
  alternatives_spanish:
  - Pues mientras viva hablaré
  - Mientras viva, hablaré
  lexicon: dum + futuro/tiempo
  rationale: Se conserva la estructura temporal del original y la fuerza prospectiva de «loquar» con una forma española natural.
- source_word: dum sapio respondeam
  english_pob_choice: and while I have understanding I will answer
  chosen_spanish: y mientras tenga entendimiento responderé
  alternatives_spanish:
  - y mientras tenga juicio responderé
  - y mientras comprenda responderé
  lexicon: sapere
  rationale: «Tenga entendimiento» transmite el sentido cognitivo de sapio sin reducirlo a una sola facultad. Mantiene un tono formal y sobrio.
theological_decisions:
- issue: Cómo traducir figmentum/πλάσμα, con su carga de criatura formada por Dios
  english_pob_reading: your creature
  chosen_spanish_reading: tu criatura
  alternative_spanish_readings:
  - tu hechura
  - tu obra formada
  rationale: La opción española debe preservar la humillación del hablante ante Dios y la idea de procedencia creadora sin volver la frase pesada. «Criatura» mantiene ese equilibrio y deja visible la dependencia ontológica.
  doctrine_reference: Creación humana y dependencia de Dios (cf. Gn 2:7; Is 64:8)
- issue: El matiz de sapio en la última cláusula
  english_pob_reading: while I have understanding
  chosen_spanish_reading: mientras tenga entendimiento
  alternative_spanish_readings:
  - mientras tenga juicio
  - mientras comprenda
  rationale: La expresión debe conservar la dimensión intelectual sin forzar una interpretación moral o sapiencial más amplia de la que el texto garantiza. «Entendimiento» es suficientemente amplio y preciso.
  doctrine_reference: Sabiduría/entendimiento como capacidad concedida por Dios
translation_notes:
  revision_awareness: 'Se corrigió la falla anterior haciendo que el marcador [a] aparezca en el texto principal. También se incorporó la cláusula final del latino: «Porque mientras viva hablaré, y mientras tenga entendimiento responderé».'
  spanish_consistency_notes:
  - Se mantuvo «Señor» como vocativo natural en español para el latino dominus implícito en la petición, sin sustituir el nombre divino del texto fuente.
  - Se evitó «SEÑOR» en versalitas porque el versículo latino no contiene el Tetragrámaton y el registro de la oración pide un vocativo directo y legible.
  - «Tu criatura» conserva el tono teológico del texto y es preferible a un calco como «tu cosa formada».
