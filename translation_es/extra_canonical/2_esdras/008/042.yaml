translation:
  language: es
  text: Porque si la semilla del agricultor no brota, porque no recibió[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La frase latina queda elíptica: «porque no recibió»; no se añade aquí el complemento implícito para no sobretraducir el testimonio conservado.'
    reason: source_note
lexical_decisions:
- source_word: Quoniam
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: conector causal / lógico
  rationale: El latín abre con una partícula causal que enlaza la ilustración con el argumento previo; en español, «porque» mantiene ese enlace con naturalidad y sin debilitar el tono argumentativo.
- source_word: semen agricolae
  english_pob_choice: the farmer’s seed
  chosen_spanish: la semilla del agricultor
  alternatives_spanish:
  - la semilla del labrador
  - la simiente del agricultor
  lexicon: semen / agricola
  rationale: «Semilla» expresa bien semen en español actual; «agricultor» conserva el referente simple del agricultor sin introducir un registro excesivamente rural o arcaico.
- source_word: si non ascenderit
  english_pob_choice: if ... does not come up
  chosen_spanish: no brota
  alternatives_spanish:
  - no sale
  - no asciende
  - no crece
  lexicon: ascendere
  rationale: En este contexto agrícola, «brotar» comunica de modo natural que la semilla no emerge de la tierra, manteniendo el sentido sin forzar un calco literal de «subir».
- source_word: non enim accepit
  english_pob_choice: for it did not receive
  chosen_spanish: pues no recibió
  alternatives_spanish:
  - porque no recibió
  - ya que no recibió
  lexicon: accipere
  rationale: El latín es elíptico; en español conviene mantener la misma brevedad y dejar el complemento tácito, como en el texto fuente, sin añadir «lluvia» u otro objeto no atestiguado.
theological_decisions:
- issue: Mantenimiento de la elipsis en la cláusula final
  english_pob_reading: for it did not receive
  chosen_spanish_reading: pues no recibió
  alternative_spanish_readings:
  - porque no recibió la lluvia
  - pues no recibió el agua
  rationale: La revisión eliminó ampliaciones interpretativas ajenas al latín. En español se conserva la tensión de una frase incompleta que remite al contexto inmediato sin explicitar un objeto no presente en el testimonio latino.
  doctrine_reference: Fidelidad al testimonio textual y a la economía retórica del pasaje; sin implicaciones doctrinales directas
- issue: Valor causal de la partícula inicial
  english_pob_reading: For if ...
  chosen_spanish_reading: Porque si ...
  alternative_spanish_readings:
  - Pues si ...
  - Ya que si ...
  rationale: 'La partícula inicial no es ornamental: introduce una justificación. «Porque» preserva mejor el registro causal del latín y la conexión lógica con el argumento anterior.'
  doctrine_reference: Coherencia discursiva del texto bíblico; no afecta una doctrina específica
translation_notes:
  revision_awareness: 'La versión sigue la revisión más reciente que eliminó expansiones no presentes en el latín («tu lluvia en su tiempo» y «o si se echa a perder por demasiada lluvia») y conserva solo lo atestiguado: la conexión causal inicial y la cláusula breve y elíptica final.'
  spanish_consistency_notes:
  - Se usa «semilla» para semen y «agricultor» para agricola en un registro natural y bíblico.
  - Se mantiene la elipsis final del latín; no se introduce un objeto implícito en el cuerpo del verso.
  - La puntuación separa la prótasis causal y la razón explicativa con una pausa natural en español.
