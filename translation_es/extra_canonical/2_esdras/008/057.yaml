lexical_decisions:
- source_word: contempserunt
  english_pob_choice: they despised
  chosen_spanish: despreciaron
  alternatives_spanish:
  - desestimaron
  - menospreciaron
  lexicon: contempno
  rationale: El latín expresa un rechazo fuerte y activo; «despreciaron» conserva bien esa fuerza en español sin suavizarla demasiado.
- source_word: uias eius
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus sendas
  - sus vías
  lexicon: via
  rationale: «Caminos» es la equivalencia natural y bíblica en español para conductas o formas de vivir; «vías» sonaría más técnico o menos idiomático.
- source_word: dereliquerunt
  english_pob_choice: abandoned
  chosen_spanish: abandonaron
  alternatives_spanish:
  - dejaron
  - desampararon
  lexicon: derelinquo
  rationale: «Abandonaron» reproduce la idea de dejar completamente algo atrás; mantiene la paridad semántica con el inglés auditado.
- source_word: Adhuc autem et
  english_pob_choice: Moreover, they also
  chosen_spanish: Además, también
  alternatives_spanish:
  - Pero además, también
  - Y además
  lexicon: adhuc / autem / et
  rationale: La secuencia latina está fragmentaria, pero claramente introduce una continuación enfática. «Además, también» refleja la acumulación del conector sin inventar el resto de la cláusula ausente.
theological_decisions:
- issue: Alcance del fragmento y clausura incompleta
  english_pob_reading: they despised and abandoned his ways. Moreover, they also
  chosen_spanish_reading: despreciaron y abandonaron sus caminos. Además, también
  alternative_spanish_readings:
  - despreciaron y abandonaron sus caminos. Y además
  - despreciaron y abandonaron sus caminos. Además
  rationale: El testimonio latino disponible termina de manera abierta («Adhuc autem et»). No conviene completar la idea con contenido no atestiguado; por eso la traducción española conserva la incompletitud.
  doctrine_reference: Principio de equivalencia textual y respeto al estado fragmentario del testimonio
translation_notes:
  revision_awareness: El inglés previo fue corregido por desalinearse gravemente con el latín suministrado; esta versión española sigue el span exacto del texto latino limpio de Bensly y conserva su terminación fragmentaria.
  spanish_consistency_notes:
  - Se preservó el tono sobrio y directo del inglés auditado, pero se ajustó al fragmento latino exacto.
  - Se evitó cerrar la oración porque el testimonio fuente no lo permite.
  - Se usó «caminos» para mantener el valor bíblico de conducta o manera de vivir, no solo de trayecto físico.
