    issue: La rúbrica final no está suficientemente separada como unidad compositiva independiente.
    rationale: «Initium uerborum orationis Ezrae priusquam adsumeretur» es un rótulo nominal/scribal. Aunque el borrador evita añadir verbo, al dejarlo tras la cita con simple espacio puede leerse como continuación lineal. Un guion largo o separación más clara refleja mejor la función textual indicada por la nota inglesa.
  - severity: low
    issue: La nota [a] es innecesaria y algo sobrecargada.
    rationale: El inglés conserva una nota [a] por historial de redacción previa, no por una ambigüedad léxica actual que exija nota. En español, «entiende mis palabras» ya transmite bien el sentido. La nota introduce opciones («mis dichos», «mi discurso») menos adecuadas al contexto y no mejora la comprensión.
