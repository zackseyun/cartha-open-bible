translation:
  language: es
  text: Por tanto, escucha mi voz y entiende mis palabras[8:19], y hablaré delante de ti.” —Principio de las palabras de la oración de Esdras antes de ser llevado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '8:19'
    text: El cierre «Principio de las palabras de la oración de Esdras antes de ser llevado» funciona como rótulo compositivo o transición escribal; se conserva porque está presente en el testimonio latino usado aquí.
    reason: source_note
lexical_decisions:
- source_word: audi meam uocem
  english_pob_choice: hear my voice
  chosen_spanish: escucha mi voz
  alternatives_spanish:
  - oye mi voz
  - escucha mi clamor
  lexicon: audio -> escuchar/oír; vox -> voz
  rationale: «Escucha mi voz» conserva el imperativo directo y el matiz relacional de pedir atención a la voz, no solo audición física. «Oye» sería posible, pero «escucha» resulta más natural y exhortativo en español bíblico contemporáneo.
- source_word: intellege sermonum meorum
  english_pob_choice: understand my words
  chosen_spanish: entiende mis palabras
  alternatives_spanish:
  - comprende mis palabras
  - discierne mis palabras
  lexicon: intellego -> entender/comprender; sermo -> palabra/discurso
  rationale: «Entiende mis palabras» sigue de cerca el paralelo latino con un verbo de comprensión intelectual. «Palabras» reproduce bien sermonum en este contexto; «discurso» sería demasiado amplio y menos idiomático.
- source_word: loquar coram te
  english_pob_choice: I will speak before you
  chosen_spanish: hablaré delante de ti
  alternatives_spanish:
  - hablaré en tu presencia
  - te hablaré frente a ti
  lexicon: loquor -> hablar; coram -> delante de / en presencia de
  rationale: «Delante de ti» mantiene la sencillez y la orientación espacial/personal de coram te. «En tu presencia» es también viable, pero «delante de ti» conserva mejor la inmediatez del original.
- source_word: Initium uerborum orationis Ezrae
  english_pob_choice: The beginning of the words of Ezra’s prayer
  chosen_spanish: Principio de las palabras de la oración de Esdras
  alternatives_spanish:
  - Comienzo de las palabras de la oración de Esdras
  - Principio de las palabras de la súplica de Esdras
  lexicon: initium -> principio/comienzo; verba -> palabras; oratio -> oración
  rationale: Se preserva el carácter rubricado y nominal del latín sin añadir un verbo copulativo. «Oración» refleja orationis con un término natural y bíblicamente reconocible en español; «súplica» es posible, pero menos directo para el texto base.
- source_word: priusquam adsumeretur
  english_pob_choice: before he was taken up
  chosen_spanish: antes de ser llevado
  alternatives_spanish:
  - antes de ser asumido
  - antes de que fuera llevado
  lexicon: priusquam -> antes de; adsumo -> tomar consigo, llevar, asumir
  rationale: El latín admite la idea de ser «tomado/levantado». «Antes de ser llevado» es una traducción sobria y fluida que conserva la pasividad del evento sin forzar una interpretación más específica que la del testimonio latino. En nota puede advertirse la alternativa más literal «antes de ser tomado en/levantado» si se requiere.
theological_decisions:
- issue: El cierre funciona como rótulo compositivo o transición escribal, no como una oración plenamente integrada con la primera cláusula.
  english_pob_reading: The closing clause ... appears to function as a compositional or scribal transition. It is retained in the text because it is present in the Latin witness used here.
  chosen_spanish_reading: 'Se mantiene como un principio/título textual: «Principio de las palabras de la oración de Esdras antes de ser llevado».'
  alternative_spanish_readings:
  - Esta es la शुरुआत de las palabras de la oración de Esdras antes de ser llevado
  - El comienzo de las palabras de la oración de Esdras antes de ser llevado
  rationale: El latín es nominal y carece de verbo copulativo, por lo que en español conviene reflejar la forma rubricada, no convertirla en una oración completa con «Esta es». Esto preserva la capa compositiva señalada en el audit trail inglés.
  doctrine_reference: Crítica textual y estructura literaria de 2 Esdras / 4 Ezra; no implica una afirmación doctrinal independiente.
translation_notes:
  revision_awareness: He seguido el ajuste reciente del audit trail inglés que eliminó la fórmula explícita «This is» y dejó el cierre como un rubro nominal. Por eso la versión española evita una copula añadida y conserva el tono fragmentario del latín.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda; aquí no aparecen.
  - «Esdras» se mantiene como nombre propio bíblico estándar en español.
  - Se conserva la numeración/etiqueta de nota [8:19] para reflejar la capa textual adicional del cierre latin.
  - «Antes de ser llevado» mantiene la pasiva del latín sin explicitar un sujeto agente inexistente en el texto.
