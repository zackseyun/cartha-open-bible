  source_alignment_summary: 'El borrador refleja bien el latín: mortificabis eum = «harás morir», uiuificabis eum = «darás vida», y mantiene la repetición de tuam creaturam en ambos miembros. Sin embargo, «como a tu criatura» suena menos natural en español en este contexto y puede sugerir comparación con una persona tratada como criatura, cuando aquí expresa condición o calidad: «como tu criatura».'
