translation:
  language: es
  text: Y lo harás morir como tu criatura, y le darás vida como tu criatura.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: mortificabis eum
  english_pob_choice: you will put him to death
  chosen_spanish: lo harás morir
  alternatives_spanish:
  - lo matarás
  - lo darás muerte
  lexicon: mortificare
  rationale: En español, «lo harás morir» conserva la fuerza causativa del latín sin forzar una formulación más pesada. «Matarás» es posible, pero el compuesto con «harás» refleja mejor el matiz de causar la muerte.
- source_word: eum
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - le
  lexicon: eum
  rationale: Se mantiene el objeto directo esperado por el verbo transitivo en español. «Lo» es la opción natural y coherente con la referencia personal del texto.
- source_word: ut tuam creaturam
  english_pob_choice: as your creature
  chosen_spanish: como a tu criatura
  alternatives_spanish:
  - como tu criatura
  - como tu creación
  lexicon: creatura
  rationale: «Criatura» reproduce el vínculo con la creación viva y dependiente de Dios, y coincide con la decisión revisada del inglés POB. Se conserva la comparación explícita con «como».
- source_word: uiuificabis eum
  english_pob_choice: you will give him life
  chosen_spanish: le darás vida
  alternatives_spanish:
  - lo vivificarás
  - le devolverás la vida
  lexicon: vivificare
  rationale: «Dar vida» expresa bien el acto causativo y es idiomático en español. «Vivificar» sería más literal, pero suena más técnico y menos natural para lectura pública.
- source_word: ut tuam creaturam
  english_pob_choice: as your creature
  chosen_spanish: como a tu criatura
  alternatives_spanish:
  - como tu criatura
  - como a tu creación
  lexicon: creatura
  rationale: Se repite la misma solución para mantener la paralelidad del original latino y la consistencia terminológica de la perícopa.
theological_decisions:
- issue: Relación entre la acción de Dios y la condición de la persona como criatura
  english_pob_reading: as your creature / as your creature
  chosen_spanish_reading: como a tu criatura / como a tu criatura
  alternative_spanish_readings:
  - como tu criatura / como tu criatura
  - como a tu creación / como a tu creación
  rationale: El latín insiste en que tanto la muerte como la vida ocurren respecto de la criatura de Dios. La traducción conserva esa dependencia creatural sin suavizarla con una formulación más abstracta como «tu creación», que podría desplazar el énfasis del ser vivo creado.
  doctrine_reference: Providencia y soberanía creatural de Dios
translation_notes:
  revision_awareness: La base inglesa fue revisada de «your work» a «your creature» para concordar con tuam creaturam; la versión española sigue esa decisión y evita introducir «obra», que no está respaldado por el latín limpio ni por la revisión más reciente.
  spanish_consistency_notes:
  - Se mantiene «criatura» de manera uniforme para ambos miembros paralelos.
  - Se evita «SEÑOR» porque el texto fuente aquí es latino y no contiene el tetragrámaton.
  - 'La sintaxis busca reflejar la paralelidad del original: misma estructura para la muerte y para la vida.'
