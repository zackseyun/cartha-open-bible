translation:
  language: es
  text: No mires las ofensas de tu pueblo[a], sino a los que te han servido en verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien, según una traducción anterior: «Porque mientras viva hablaré, y mientras tenga entendimiento responderé. No mires las ofensas de tu pueblo,»'
    reason: previous_rendering
lexical_decisions:
- source_word: Ne aspicias
  english_pob_choice: Do not look upon
  chosen_spanish: No mires
  alternatives_spanish:
  - No fijes tu mirada en
  - No consideres
  lexicon: Latin aspicere
  rationale: El negativo con aspicere pide una prohibición directa y natural en español. «No mires» conserva el valor visual/atencional sin volverlo más interpretativo de lo que permite el latín.
- source_word: populi tui delicta
  english_pob_choice: the offenses of your people
  chosen_spanish: los pecados de tu pueblo
  alternatives_spanish:
  - las ofensas de tu pueblo
  - las faltas de tu pueblo
  lexicon: Latin delicta
  rationale: «Delicta» puede abarcar ofensas, faltas o pecados. Aquí «pecados» funciona bien en español bíblico y mantiene la carga moral. Se conserva «tu pueblo» para el posesivo del latín.
- source_word: sed
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  lexicon: Latin sed
  rationale: En español, después de una negación previa, «sino» expresa con más precisión la corrección contrastiva del latín.
- source_word: qui tibi in veritate servierunt
  english_pob_choice: those who have served you in truth
  chosen_spanish: a los que te han servido en verdad
  alternatives_spanish:
  - a los que te sirvieron en verdad
  - a quienes te han servido con verdad
  lexicon: Latin servire + in veritate
  rationale: Se mantiene el sujeto personal implícito con «a los que». «Te han servido» da un perfecto natural y compatible con el plural latino. «En verdad» conserva la frase preposicional del original sin expandirla a una interpretación doctrinal.
theological_decisions:
- issue: Sentido de 'in veritate'
  english_pob_reading: those who have served you in truth
  chosen_spanish_reading: los que te han servido en verdad
  alternative_spanish_readings:
  - los que te han servido con sinceridad
  - los que te han servido fielmente
  rationale: El latín dice «in veritate», literalmente «en verdad». Se evita reemplazarlo por una paráfrasis más teológica o devocional; «en verdad» preserva la ambigüedad entre sinceridad, fidelidad y conformidad con la verdad.
  doctrine_reference: Truthfulness/fidelity language in biblical prayer; no doctrinal expansion beyond the Latin.
translation_notes:
  revision_awareness: 'El inglés auditado fue corregido por desalineación versicular: la cláusula «For while I live...» pertenece al verso 24, no a este verso. La redacción española sigue estrictamente el latín de 2 Esdras 8:25 («Ne aspicias populi tui delicta, sed qui tibi in veritate servierunt»), completando el sentido de la forma partida «serui-» como plural perfecto en español natural.'
  spanish_consistency_notes:
  - Se preserva el tratamiento directo a Dios con «te/tu» sin introducir fórmulas litúrgicas ajenas.
  - Se usa «pecados» como equivalente bíblico directo de «delicta», pero se deja nota de lectura alternativa con «ofensas».
  - «En verdad» mantiene el paralelo con el latín y evita suavizar la tensión semántica hacia «fielmente» o «sinceramente».
