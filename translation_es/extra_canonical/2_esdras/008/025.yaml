  spanish_quality_summary: El español es claro y natural. «No mires ... sino a los que...» suena bien y es eclesialmente legible. Aun así, «ofensas» preserva mejor el matiz del original y la correspondencia con la auditoría inglesa. La nota actual («No fijes tu mirada...») no aporta una alternativa textual significativa; conviene reemplazarla por la nota de historial de traducción heredada del POB inglés.
