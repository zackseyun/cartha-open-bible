source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: possis diligere meam creaturam super me, tu autem frequenter temetipsum proximasti iniustis, numquam Sed et in hoc mirabilis eris coram altissimo, Quoniam humiliasti te, sicut decet
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/008/047.yaml
  text: Can you love my creation more than I do? But you have often drawn yourself near to the unrighteous. Never do so. Yet even in this you will be marvelous before the Most High[a], because you have humbled yourself, as is fitting.
  footnotes:
  - marker: a
    text: Or 'compared yourself with'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:47:37Z'
    unchanged: false
    changes_summary: 'Revised to account for omitted Latin clauses and improve lexical accuracy: rendered possis as a direct question, proximasti as ''drawn yourself near,'' restored ''Yet even in this you will be marvelous before the Most High,'' and included ''because you have humbled yourself, as is fitting.'''
translation:
  language: es
  text: ¿Puedes amar mi creación más que yo la amo? Pero muchas veces te has acercado a los injustos. Nunca hagas eso. Sin embargo, aun en esto serás admirable delante del Altísimo, porque te has humillado, como conviene.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: possis diligere
  english_pob_choice: Can you love
  chosen_spanish: ¿Puedes amar
  alternatives_spanish:
  - ¿Podrías amar
  - ¿Eres capaz de amar
  lexicon: possum + diligere
  rationale: El latino usa possis en forma interrogativa directa; en español natural y fiel se expresa con «¿Puedes amar…?», conservando el tono de pregunta retórica y la fuerza de capacidad/posibilidad.
- source_word: meam creaturam
  english_pob_choice: my creation
  chosen_spanish: mi creación
  alternatives_spanish:
  - mi criatura
  - lo que he creado
  lexicon: creatio / creatura
  rationale: «Creaturam» se rinde mejor como «creación» en español bíblico claro; mantiene el referente colectivo/obra creada que la traducción inglesa ya asumió.
- source_word: super me
  english_pob_choice: more than I do
  chosen_spanish: más que yo
  alternatives_spanish:
  - por encima de mí
  - más que yo lo hago
  lexicon: super + me
  rationale: La comparación implícita se expresa de forma idiomática con «más que yo», sin añadir un objeto verbal que el latín no exige explícitamente.
- source_word: temetipsum proximasti iniustis
  english_pob_choice: you have often drawn yourself near to the unrighteous
  chosen_spanish: te has acercado a los injustos
  alternatives_spanish:
  - te has puesto cerca de los injustos
  - te has asociado con los injustos
  - te has contado entre los injustos
  lexicon: proximare + reflexive
  rationale: Se sigue la revisión auditada que descarta «comparado contigo» y entiende *proximasti* como acercarse/ponerse cerca. «Te has acercado» conserva la imagen espacial y evita interpretar de más.
- source_word: numquam sed et in hoc
  english_pob_choice: Never do so. Yet even in this
  chosen_spanish: Nunca hagas eso. Sin embargo, aun en esto
  alternatives_spanish:
  - No lo hagas nunca. Pero aun en esto
  - Jamás procedas así. Y aun en esto
  lexicon: imperative prohibition + contrast
  rationale: El latín combina prohibición y contraste. «Nunca hagas eso» expresa la orden negativa de forma natural; «Sin embargo, aun en esto» conserva el giro concesivo del texto.
- source_word: mirabilis eris coram altissimo
  english_pob_choice: you will be marvelous before the Most High
  chosen_spanish: serás admirable delante del Altísimo
  alternatives_spanish:
  - serás maravilloso ante el Altísimo
  - serás admirable ante el Altísimo
  lexicon: mirabilis + coram altissimo
  rationale: «Admirable» comunica el valor pasivo/de reconocimiento de *mirabilis* mejor que «maravilloso» en español actual. «Delante del Altísimo» conserva el matiz de presencia/comparecencia de *coram*.
- source_word: Quoniam humiliasti te
  english_pob_choice: because you have humbled yourself
  chosen_spanish: porque te has humillado
  alternatives_spanish:
  - porque te has abatido
  - ya que te has humillado
  lexicon: humiliare + reflexive
  rationale: La forma reflexiva se mantiene. «Te has humillado» es la equivalencia directa y clara para un registro bíblico contemporáneo.
- source_word: sicut decet
  english_pob_choice: as is fitting
  chosen_spanish: como conviene
  alternatives_spanish:
  - como es debido
  - como corresponde
  lexicon: decet
  rationale: «Como conviene» reproduce el juicio de adecuación normativa de *decet* con una fórmula idiomática y sobria en español bíblico.
theological_decisions:
- issue: Relación de Ezra con los injustos frente a la humildad aprobada por Dios
  english_pob_reading: you have often drawn yourself near to the unrighteous... Yet even in this you will be marvelous before the Most High, because you have humbled yourself, as is fitting.
  chosen_spanish_reading: te has acercado a los injustos... aun en esto serás admirable delante del Altísimo, porque te has humillado, como conviene.
  alternative_spanish_readings:
  - te has contado entre los injustos
  - te has comparado con los injustos
  rationale: 'La revisión auditada aclara que *proximasti* no significa primordialmente «comparar», sino acercarse/ubicarse cerca de los injustos. Se conserva esa tensión: la cercanía indebida es reprensible, pero la humildad de Ezra sigue siendo motivo de aprobación ante Dios.'
  doctrine_reference: Humildad delante de Dios; distinción entre conducta reprobable y disposición humilde aceptada por el Altísimo.
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que corrige la lectura de *proximasti* desde «compararse con» hacia un sentido de acercarse/ponerse cerca de los injustos; por eso no se usa la antigua nota de comparación. También se restauró la cláusula concesiva completa con el elogio ante el Altísimo y la causa final de la humildad.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para *altissimo* como título divino reverente y coherente con el texto fuente.
  - Se evita «SEÑOR» porque aquí el latín no usa *dominus* ni una cita explícita del nombre divino.
  - «Justos/injustos» se traduce con vocabulario moral directo, sin introducir matices forenses no presentes.
  - La puntuación reproduce la estructura retórica de pregunta, corrección, concesión y justificación final.
