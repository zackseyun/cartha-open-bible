translation:
  language: es
  text: llamado tu imagen, porque ha sido hecho semejante a ti, por cuya causa hiciste todas las cosas, y lo has comparado con la semilla del labrador. No, Señor
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: tua imago nominatus
  english_pob_choice: called your image
  chosen_spanish: llamado tu imagen
  alternatives_spanish:
  - llamado a tu imagen
  - llamado imagen tuya
  lexicon: nominatus
  rationale: nominatus se rinde de forma directa como ‘llamado’, conservando el predicado nominal sin añadir explicación. ‘Tu imagen’ preserva la relación posesiva con Dios sin convertirla en perífrasis interpretativa.
- source_word: similatus est
  english_pob_choice: he has been made like you
  chosen_spanish: ha sido hecho semejante a ti
  alternatives_spanish:
  - ha sido hecho como tú
  - ha sido asemejado a ti
  lexicon: similare
  rationale: La construcción pasiva expresa un estado resultante de semejanza; ‘hecho semejante a ti’ es claro en español y mantiene la pasiva sin volverla más fuerte de lo que permite el latín.
- source_word: per quem omnia plasmasti
  english_pob_choice: through whom you formed all things
  chosen_spanish: por quien hiciste todas las cosas
  alternatives_spanish:
  - por cuyo medio hiciste todas las cosas
  - a causa de quien hiciste todas las cosas
  lexicon: per + pronombre relativo
  rationale: El latín per quem, según la revisión auditada, refleja valor causal/final más que instrumental humano. En español, ‘por quien’ conserva la ambigüedad relacional sin imponer una lectura demiúrgica impropia. ‘Hiciste’ es un equivalente natural de plasmasti en este contexto.
- source_word: semini agricolae
  english_pob_choice: the farmer’s seed
  chosen_spanish: la semilla del labrador
  alternatives_spanish:
  - la semilla del agricultor
  - la semilla del campesino
  lexicon: semen / agricola
  rationale: ‘Labrador’ reproduce el matiz agrícola y tradicional de agricola sin sonar técnico. ‘Semilla’ conserva el objeto comparativo directo del texto.
- source_word: Non, domine
  english_pob_choice: No, Lord
  chosen_spanish: No, Señor
  alternatives_spanish:
  - No, Señor mío
  - No, Señor nuestro
  lexicon: domine
  rationale: Se mantiene la interrupción abrupta del final fragmentario. ‘Señor’ es la forma natural y reverente en español para domine, sin añadir elementos ausentes.
theological_decisions:
- issue: Relación de la humanidad con la creación en per quem omnia plasmasti
  english_pob_reading: through whom you formed all things
  chosen_spanish_reading: por quien hiciste todas las cosas
  alternative_spanish_readings:
  - por cuya causa hiciste todas las cosas
  - por cuyo motivo hiciste todas las cosas
  rationale: La revisión auditada señala que el sentido teológico no presenta al ser humano como agente instrumental de la creación. La formulación española evita esa lectura y deja abierto el valor relacional/causal compatible con el contexto de 4 Esdras sobre la creación orientada al ser humano.
  doctrine_reference: 4 Esdras 6:55, 59; coherencia interna del discurso sobre la creación orientada al hombre
- issue: Término de honor final en un fragmento abrupto
  english_pob_reading: No, Lord
  chosen_spanish_reading: No, Señor
  alternative_spanish_readings:
  - No, Señor mío
  rationale: El latín conserva un corte abrupto; la traducción debe respetar esa inacabación sin completar la frase. ‘Señor’ transmite reverencia y mantiene el fragmento abierto.
  doctrine_reference: Respeto al estado textual fragmentario del testimonio latino
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente que corrigió la omisión de nominatus y reabrió la cuestión de per quem. Aunque el paquete inglés sufrió oscilación entre ‘through whom’ y ‘for whose sake’, la decisión española sigue la evidencia del latín limpio y la nota de revisión que reconoce el valor relacional/causal del relativo, evitando una lectura instrumental humana indebida. También se conserva el final abrupto sin ampliar ‘Señor’.
  spanish_consistency_notes:
  - Yahvé no aparece en este versículo; se conserva ‘Señor’ para domine en el final vocativo.
  - ‘Llamado tu imagen’ mantiene la estructura del predicado nominal sin añadir ‘a’ o ‘como’ de manera interpretativa.
  - Se usa ‘labrador’ por su registro bíblico y porque evita un tecnicismo innecesario.
