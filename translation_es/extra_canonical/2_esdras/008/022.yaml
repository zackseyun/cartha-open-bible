    issue: ‘se vuelve en viento y fuego’ es poco idiomático en español
    rationale: Aunque intenta calcar el latín/inglés, en español bíblico natural resulta más claro ‘se vuelve viento y fuego’ o ‘se convierte en viento y fuego’. La forma actual suena forzada.
  - severity: medium
    issue: La nota al pie omite la crux textual principal sobre seruatio
    rationale: La auditoría inglesa documenta explícitamente que el latín lee seruatio (‘preservación’), pero que el contexto sugiere ‘servicio/ministerio’. La nota española actual solo da una alternativa de redacción y no transmite esa información clave.
  - severity: low
    issue: ‘ministración’ es comprensible pero menos natural que ‘servicio’
    rationale: ‘Ministración’ puede leerse como eclesiástico-técnico y algo rígido. ‘Servicio’ es más claro para lectores generales y coincide con la elección contextual de la POB.
