translation:
  language: es
  text: cuyo servicio[a] se vuelve viento y fuego[b], cuya palabra es segura y cuyas sentencias permanecen, cuyo ordenamiento es fuerte y cuyo mandato es temible
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El latín dice seruatio («preservación»), pero en este contexto angelical el sentido suele entenderse como «servicio» o «ministerio». La traducción sigue ese sentido contextual y deja constancia de la dificultad textual.
    reason: textual_variant
  - marker: b
    text: 'O: «cuyo servicio es en viento y fuego».'
    reason: previous_rendering
lexical_decisions:
- source_word: firmum
  english_pob_choice: whose word is sure
  chosen_spanish: cuya palabra es segura
  alternatives_spanish:
  - cuya palabra es firme
  - cuya palabra es segura y firme
  lexicon: firmus
  rationale: El latín firmum expresa solidez, estabilidad y fiabilidad; en español, «segura» comunica bien la idea de palabra confiable sin sonar rígido o técnico. «Firme» también sería posible, pero aquí «segura» fluye mejor junto con «sentencias permanecen».
- source_word: dicta perseuerantia
  english_pob_choice: whose sayings endure
  chosen_spanish: cuyas sentencias permanecen
  alternatives_spanish:
  - cuyos dichos perseveran
  - cuyas palabras permanecen
  lexicon: dicta / perseverantia
  rationale: La combinación latina sugiere dichos o decretos que continúan firmes; «sentencias permanecen» conserva el matiz de enunciados con peso, y «permanecen» refleja la perseverancia del latín sin forzar un giro ajeno al texto.
- source_word: dispositio
  english_pob_choice: whose ordering
  chosen_spanish: cuyo ordenamiento
  alternatives_spanish:
  - cuyo arreglo
  - cuya disposición
  lexicon: dispositio
  rationale: «Ordenamiento» transmite la idea de disposición establecida u orden instituido, más cerca de un acto de organizar con autoridad que de una simple «disposición» psicológica.
- source_word: fortis
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - firme
  - robusto
  lexicon: fortis
  rationale: «Fuerte» es la equivalencia directa y natural en español para la fuerza/solidez del latín.
- source_word: iussio
  english_pob_choice: command
  chosen_spanish: mandato
  alternatives_spanish:
  - orden
  - mandamiento
  lexicon: iussio
  rationale: El latín iussio es una orden dada con autoridad. «Mandato» conserva ese carácter formal y autoritativo mejor que «orden» en este contexto litúrgico/angelical.
- source_word: servatio / conuertitur
  english_pob_choice: whose service turns to wind and fire
  chosen_spanish: cuya ministración se vuelve en viento y fuego
  alternatives_spanish:
  - cuya ministración se torna viento y fuego
  - cuyo servicio se vuelve en viento y fuego
  lexicon: seruatio + conuertitur
  rationale: 'El texto latino transmitido es crux: la lectura tradicional de la tradición inglesa interpreta una función/ministerio angelical que se transforma o se manifiesta en viento y fuego. «Ministración» intenta conservar el matiz de servicio litúrgico o ministerial que la POB señaló frente a «preservación»; «se vuelve en» deja visible el cambio de forma indicado por conuertitur.'
theological_decisions:
- issue: 'Identidad del sujeto en la primera cláusula: ángeles versus Dios'
  english_pob_reading: whose service turns to wind and fire, whose word is sure and whose sayings endure, whose ordering is strong and whose command is fearful
  chosen_spanish_reading: cuya ministración se vuelve en viento y fuego, cuya palabra es segura y cuyas sentencias permanecen, cuyo ordenamiento es fuerte y cuyo mandato es temible
  alternative_spanish_readings:
  - cuyo servicio se vuelve en viento y fuego, cuya palabra es segura...
  - cuyo servicio está en viento y fuego, ...
  rationale: La revisión inglesa restauró el verbo «turns» para distinguir la primera cláusula, referida al plural implícito de los ministros angélicos, de las cláusulas siguientes, referidas al singular de Dios. El español mantiene esa distinción sintáctica y semántica, evitando borrar el cambio de sujeto que el auditor señaló.
  doctrine_reference: Imagen bíblica de los ministros divinos como viento y fuego; cf. Sal 104:4.
- issue: Tensión lexical entre «seruatio» y el sentido contextual de servicio/ministerio
  english_pob_reading: Latin reads seruatio (‘preservation’) here, but in this angelic context the sense is commonly taken as ‘service’ or ‘ministry.’
  chosen_spanish_reading: ministración
  alternative_spanish_readings:
  - servicio
  - preservación
  rationale: 'Se conserva la tensión documental: el latín transmitido puede sugerir «preservación», pero el contexto angelical favorece «servicio/ministerio». «Ministración» permite reflejar esa ambigüedad sin ocultarla ni resolverla artificialmente.'
  doctrine_reference: Historia textual y contexto angelológico en literatura apocalíptica.
translation_notes:
  revision_awareness: He tenido en cuenta la revisión que corrigió la omisión de conuertitur («se vuelve / es cambiado») y la evaluación posterior de sin cambios. El español refleja explícitamente ese verbo para no repetir la omisión corregida y conserva la distinción entre la cláusula plural angélica y las cláusulas singulares referidas a Dios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero aquí el texto latino no contiene el tetragrámaton ni κύριος; por tanto, no aparece ningún término divino introducido por norma.
  - Se usa «ministración» como opción marcada para conservar el crux textual de seruatio/conuertitur sin imponer «preservación» como si el latín fuera inequívoco.
  - «Temible» traduce el carácter de iussio sin convertirlo en «terrible», que en español moderno podría sugerir solo horror y no reverencia/majestad.
