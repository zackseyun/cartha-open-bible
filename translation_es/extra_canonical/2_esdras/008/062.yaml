lexical_decisions:
- source_word: spondi et dixi
  english_pob_choice: And I answered and said
  chosen_spanish: Y respondí y dije
  alternatives_spanish:
  - Y contesté y dije
  - Y respondí
  lexicon: respondí / dije
  rationale: El latín usa una fórmula narrativa doble (respondí y dije); en español conviene conservar ambos verbos para reflejar la secuencia discursiva sin añadir contenido.
- source_word: Ecce nunc
  english_pob_choice: See now
  chosen_spanish: Mira ahora
  alternatives_spanish:
  - He aquí ahora
  - Mira
  lexicon: mira / he aquí
  rationale: «Ecce» introduce una exhortación/deixis perceptiva. «Mira ahora» es natural en español y mantiene el tono directo e inmediato del original.
- source_word: domine
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Soberano
  lexicon: Señor
  rationale: El vocativo latino corresponde a una forma reverente de dirección a Dios; «Señor» es el equivalente más claro y litúrgicamente inteligible en español.
- source_word: demonstrasti mihi multi-
  english_pob_choice: you have shown me many
  chosen_spanish: tú me has mostrado muchas…
  alternatives_spanish:
  - me has mostrado muchas cosas…
  - me has mostrado una multitud…
  lexicon: mostrar / muchas
  rationale: El fragmento latino termina en multi-, que señala claramente una pluralidad aún no completada. En español se conserva la apertura con «muchas…» para no cerrar artificialmente la frase ni borrar la continuidad con el verso siguiente.
theological_decisions:
- issue: Vocativo a Dios en la escena de oración
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor mío
  - Soberano
  rationale: La dirección a Dios en 4 Esdras se conserva como vocativo reverente estándar. No hay indicio aquí de sustituirlo por otro título más interpretativo.
  doctrine_reference: Respeto al discurso directo a Dios; no introduce una lectura cristológica ajena al pasaje.
translation_notes:
  revision_awareness: La revisión inglesa reciente movió el contenido de multi- de una unidad incompleta a este versículo para reflejar con mayor precisión el latín. En español, eso se resuelve manteniendo la apertura «muchas…» y dejando la frase en suspensión, de modo que el límite versicular no fuerce una conclusión inexistente en la fuente.
  spanish_consistency_notes:
  - Se mantiene «Señor» para el vocativo divino, coherente con el texto fuente y con el criterio español del proyecto.
  - Se conserva el paralelismo narrativo «respondí y dije» para reflejar la fórmula latina.
  - Se evita completar la frase con un sustantivo no atestiguado; la elipsis con puntos suspensivos preserva la fragmentación del manuscrito/edición base.
