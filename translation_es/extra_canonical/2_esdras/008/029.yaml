base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/008/029.yaml
  text: Do not desire to destroy those who have had the ways of cattle[a], but look upon those who have taught your law splendidly.
  footnotes:
  - marker: a
    text: Or 'Do not be willing to destroy those who have had the manners of cattle, but look upon those who have taught your law splendidly.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:35Z'
    unchanged: false
    changes_summary: 'Adjusted wording for closer lexical accuracy: ''desire'' for volueris, ''have had the ways of cattle'' for pecorum mores habuerunt, and ''splendidly'' for splendide. Retained the contrast and formal register.'
translation:
  language: es
  text: No desees destruir a los que han tenido las costumbres del ganado[a], sino mira a los que han enseñado tu ley espléndidamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los que han vivido como ganado»; el latín dice literalmente «han tenido las costumbres del ganado», con sentido de conducta bestial o ruda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: neque volueris perdere
  english_pob_choice: Do not desire to destroy
  chosen_spanish: No desees destruir
  alternatives_spanish:
  - No quieras destruir
  - No anheles destruir
  lexicon: volueris (volo) + perdere
  rationale: 'El latín expresa una voluntad/deseo: en español, «no desees» reproduce bien la fuerza volitiva del pasaje sin volverlo demasiado técnico; «no quieras» también sería posible, pero «desees» sigue mejor el ajuste final del audit trail inglés.'
- source_word: qui pecorum mores habuerunt
  english_pob_choice: those who have had the ways of cattle
  chosen_spanish: a los que han tenido las maneras de los animales de campo
  alternatives_spanish:
  - a los que han vivido como ganado
  - a los que han tenido costumbres de bestias
  - a los que han vivido como animales de campo
  lexicon: pecorum mores habuerunt
  rationale: Se conserva la imagen dura de un comportamiento propio de animales de pasto/ganado. «Maneras» mantiene el paralelo con el latín mores, aunque en español puede sonar algo literal; se añade «animales de campo» para evitar una lectura de simple etiqueta de cortesía y preservar la metáfora.
- source_word: sed respicias eos
  english_pob_choice: but look upon those
  chosen_spanish: sino mira a los
  alternatives_spanish:
  - sino considera a los
  - sino vuelve tu mirada a los
  lexicon: respicias
  rationale: «Mira a los» conserva la orientación de atención favorable que sugiere respicias. «Considera» sería más interpretativo; «mira» es más directo y sobrio.
- source_word: qui legem tuam splendide docuerunt
  english_pob_choice: those who have taught your law splendidly
  chosen_spanish: a los que han enseñado tu ley noblemente
  alternatives_spanish:
  - a los que han enseñado tu ley espléndidamente
  - a los que han enseñado tu ley de manera brillante
  lexicon: splendide docuerunt
  rationale: Se evita «espléndidamente» porque en español moderno suena más a apariencia o lujo que a calidad moral/pública. «Noblemente» recoge el matiz de dignidad y excelencia que el pasaje contrasta con la conducta bestial anterior, en línea con la revisión auditada.
theological_decisions:
- issue: Contraste moral entre conducta animalizada y enseñanza fiel de la ley
  english_pob_reading: The text contrasts those who lived like cattle with those who taught your law splendidly.
  chosen_spanish_reading: El texto contrasta a quienes vivieron con conducta bestial con quienes enseñaron la ley de Dios con nobleza.
  alternative_spanish_readings:
  - El texto contrasta a quienes vivieron como ganado con quienes enseñaron tu ley espléndidamente.
  - El texto contrasta a quienes tuvieron costumbres de animales con quienes enseñaron tu ley de manera excelente.
  rationale: 'La imagen no es zoológica sino moral: la primera mitad denigra una vida bruta o sin gobierno, y la segunda exalta la instrucción fiel. «Noblemente» permite conservar el tono elogioso sin forzar una palabra que en español contemporáneo podría desviar el sentido hacia lo estético.'
  doctrine_reference: Ética bíblica; sabiduría moral; enseñanza de la ley
- issue: Pronombre de segunda persona para la ley divina
  english_pob_reading: your law
  chosen_spanish_reading: tu ley
  alternative_spanish_readings:
  - la ley tuya
  - la ley de ti
  rationale: Se mantiene la relación directa de posesión y alianza expresada por el posesivo «tu», acorde con el estilo bíblico en español.
  doctrine_reference: Lenguaje de pacto y posesión divina
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del audit trail: se evitó «ser willing»/«estar dispuesto» por ser demasiado pesado en español, y se preservó el contraste entre una conducta degradada y una enseñanza noble. También se tuvo en cuenta que la revisión final prefirió una fidelidad más cercana a ''desire'' y ''splendidly'', pero el español adopta una equivalencia natural para no sonar artificial.'
  spanish_consistency_notes:
  - Se conserva «ley» para lexemática jurídica/alianza, sin sustituirla por términos eclesiásticos.
  - «Yahvé» no aparece en este versículo; por tanto no se introduce innecesariamente.
  - No se emplea «Cristo» ni terminología cristológica ajena al texto.
  - La metáfora de los animales de campo se mantiene como imagen de conducta, no como insulto zoológico literal.
