    text: 'O: «a los que han vivido como ganado»; el latín dice literalmente «han tenido las costumbres del ganado», con sentido de conducta bestial o ruda.'
    reason: lexical_alternative
  revision_rationale: 'Se corrigen dos falsos amigos/giros poco naturales: mores pasa de «maneras» a «costumbres», y pecorum de «animales de campo» a «ganado». Además, se restituye «espléndidamente» para seguir más de cerca splendide y la revisión inglesa final. La nota preserva la alternativa más idiomática «han vivido como ganado» sin perder la literalidad del texto base.'
