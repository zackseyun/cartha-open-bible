revisions:
- from: No desees destruir a los que han tenido las maneras de los animales de campo[a], sino mira a los que han enseñado tu ley noblemente.
  to: No desees destruir a los que han tenido las costumbres del ganado[a], sino mira a los que han enseñado tu ley espléndidamente.
  rationale: 'Se corrigen dos falsos amigos/giros poco naturales: mores pasa de «maneras» a «costumbres», y pecorum de «animales de campo» a «ganado». Además, se restituye «espléndidamente» para seguir más de cerca splendide y la revisión inglesa final. La nota preserva la alternativa más idiomática «han vivido como ganado» sin perder la literalidad del texto base.'
