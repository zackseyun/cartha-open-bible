base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/004/019.yaml
  text: I said, “Both have devised a vain plan, for the earth has been given to the forest, and the place of the sea to bear its waves.” And he answered
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:31Z'
    unchanged: false
    changes_summary: Revised 'formed a vain plan' to 'have devised a vain plan' for closer lexical alignment with cogitauerunt and smoother formal English; removed 'is' before 'to bear' to better reflect the Latin structure.
translation:
  language: es
  text: 'Dije: «Ambos han ideado un plan vano, porque la tierra ha sido dada al bosque, y el lugar del mar para soportar sus olas». Y respondió.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: dixi
  english_pob_choice: I said
  chosen_spanish: Dije
  alternatives_spanish:
  - Yo dije
  - Dije yo
  lexicon: dico
  rationale: Mantiene la primera persona narrativa en pasado simple, natural en español y fiel al latín breve dixi.
- source_word: utrique
  english_pob_choice: Both
  chosen_spanish: Ambos
  alternatives_spanish:
  - Los dos
  - Ambas partes
  lexicon: uterque
  rationale: El latín señala a dos referentes; 'ambos' conserva esa dualidad sin añadir precisión innecesaria.
- source_word: uanam cogitationem cogitauerunt
  english_pob_choice: have devised a vain plan
  chosen_spanish: han ideado un plan vano
  alternatives_spanish:
  - han concebido un pensamiento vano
  - han tramado un plan inútil
  lexicon: cogito
  rationale: '''Cogitauerunt'' comunica una acción mental deliberada; ''ideado un plan vano'' conserva la fuerza de un proyecto pensado y su vaciedad, sin reducirlo a mera ''opinión''.'
- source_word: terra enim data est siluae
  english_pob_choice: for the earth has been given to the forest
  chosen_spanish: porque la tierra ha sido dada al bosque
  alternatives_spanish:
  - pues la tierra ha sido entregada al bosque
  - porque la tierra fue dada al bosque
  lexicon: do
  rationale: Se respeta la pasiva latina y la relación causal de enim. 'Dada al bosque' sigue de cerca la estructura original y mantiene la extrañeza intencional de la imagen.
- source_word: maris locus portare fluctus suos
  english_pob_choice: the place of the sea to bear its waves
  chosen_spanish: el lugar del mar para llevar sus olas
  alternatives_spanish:
  - el lugar del mar para soportar sus olas
  - el sitio del mar para cargar con sus olas
  lexicon: locus / porto / fluctus
  rationale: '''Portare'' puede expresar llevar o soportar; aquí ''llevar sus olas'' reproduce la estructura del latín y deja la imagen abierta, como en el inglés POB.'
theological_decisions:
- issue: 'Imagen cosmológica inusual: tierra dada al bosque y mar destinado a sus olas'
  english_pob_reading: the earth has been given to the forest, and the place of the sea to bear its waves
  chosen_spanish_reading: la tierra ha sido dada al bosque, y el lugar del mar para llevar sus olas
  alternative_spanish_readings:
  - la tierra ha sido entregada al bosque, y el lugar del mar para soportar sus olas
  - la tierra fue dada al bosque, y el sitio del mar para cargar con sus olas
  rationale: No se suaviza la rareza de la imagen; el latín presenta una afirmación deliberadamente paradójica o poética que debe permanecer visible en español. La traducción conserva la tensión sin explicarla de más.
  doctrine_reference: Sabiduría poética / retórica del texto, sin afirmación doctrinal directa
- issue: Cambio a discurso directo e interlocución final
  english_pob_reading: And he answered
  chosen_spanish_reading: Y respondió
  alternative_spanish_readings:
  - Y él respondió
  - Y contestó
  rationale: El latín solo da 'Et respondit' sin sujeto explícito; en español, omitir 'él' es natural y conserva la elipsis original.
  doctrine_reference: Narrativa del diálogo en el texto
translation_notes:
  revision_awareness: Se siguió el ajuste de la revisión inglesa más reciente al preferir una expresión verbal más cercana a cogitauerunt ('han ideado') y mantener la estructura latina sin introducir un 'es' adicional antes de 'para llevar'. No se detectaron notas textuales adicionales en el expediente inglés.
  spanish_consistency_notes:
  - Se mantiene 'tierra' y 'mar' en singular, como en el latín.
  - Se preserva la asimetría poética del paralelismo en vez de normalizarla.
  - El tono es formal y bíblico, pero en español moderno y legible.
