base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/004/026.yaml
  text: And he answered me and said, “If you are, you will see; and if you live, you will often marvel,”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:31Z'
    unchanged: false
    changes_summary: 'Revised to reflect the Latin more closely: rendered si fueris as “If you are” rather than “If you live,” preserved the second clause’s distinct si vixeris as “if you live,” and translated frequenter as “often” without adding “long enough.”'
translation:
  language: es
  text: 'Y me respondió y dijo: «Si eres, verás; y si vives, te maravillarás a menudo»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: si fueris
  english_pob_choice: If you are
  chosen_spanish: Si existes
  alternatives_spanish:
  - Si eres
  - Si estás
  - Si llegas a ser
  lexicon: si + fueris (futuro perfecto/subjuntivo de esse en valor condicional)
  rationale: El latín no dice literalmente “si vives” en la primera cláusula; la revisión inglesa corrigió bien a “If you are.” En español, “si existes” conserva la fuerza de estar vivo/estar presente sin sonar tan filosófico como “si eres”, y evita repetir el verbo de la segunda cláusula.
- source_word: si vixeris
  english_pob_choice: if you live
  chosen_spanish: si vives
  alternatives_spanish:
  - si llegaras a vivir
  - si sigues viviendo
  - si permaneces con vida
  lexicon: si + vixeris (futuro perfecto/subjuntivo de vivere en valor condicional)
  rationale: Se mantiene la distinción establecida por la revisión inglesa entre la primera y la segunda cláusulas. “Si vives” es natural en español y conserva el sentido temporal de continuar con vida.
- source_word: frequenter
  english_pob_choice: often
  chosen_spanish: a menudo
  alternatives_spanish:
  - frecuentemente
  - muchas veces
  lexicon: frequenter
  rationale: “A menudo” comunica con claridad la repetición habitual sin sonar excesivamente técnico. Mantiene el adverbio simple y fiel al valor de frequenter.
- source_word: respondit ad me et dixit
  english_pob_choice: And he answered me and said
  chosen_spanish: Y respondió y me dijo
  alternatives_spanish:
  - Y me respondió y dijo
  - Y me respondió y me dijo
  lexicon: respondere / dicere
  rationale: La formulación española sigue de cerca la secuencia verbal del latín y reproduce el tono narrativo directo del texto.
theological_decisions:
- issue: 'Sentido de la primera condición: existencia/presencia frente a vida'
  english_pob_reading: If you are
  chosen_spanish_reading: Si existes
  alternative_spanish_readings:
  - Si eres
  - Si estás
  rationale: La revisión inglesa decidió no leer si fueris como “if you live.” En español, “si existes” evita perder esa corrección y conserva la extrañeza potencial del latín sin volverla oscura.
  doctrine_reference: No aplica; se trata de una decisión filológica, no doctrinal.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que corrigió la primera cláusula de “if you live” a “if you are” para reflejar mejor el latín si fueris, y conservó la segunda cláusula como una condición distinta con si vixeris.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre la primera y la segunda cláusulas para no fusionar dos verbos latinos diferentes.
  - Se evitó introducir vocabulario doctrinal no presente en el latín.
  - El tono es bíblico y sobrio, pero con español moderno y legible.
