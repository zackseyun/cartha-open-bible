translation:
  language: es
  text: '…que, habiendo venido, vivan en impiedad, y padezcan, y no entiendan por qué. Y él me respondió y dijo: «Partiendo…»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: uiuere in impietatibus
  english_pob_choice: to live in ungodliness
  chosen_spanish: vivan en impiedad
  alternatives_spanish:
  - vivan en maldad
  - vivan sin Dios
  lexicon: vivere / impietatibus
  rationale: «Impiedad» conserva el registro religioso y la fuerza moral del latín mejor que una paráfrasis más general; «en impiedad» reproduce la construcción preposicional sin perder naturalidad en español.
- source_word: pati
  english_pob_choice: to suffer
  chosen_spanish: padezcan
  alternatives_spanish:
  - sufran
  lexicon: pati
  rationale: «Padezcan» mantiene el matiz de sufrir soportando aflicción y encaja bien con el paralelismo del período.
- source_word: non intelligere de qua re
  english_pob_choice: not to understand why
  chosen_spanish: no entiendan de qué se trata
  alternatives_spanish:
  - no entiendan por qué
  - no comprendan de qué asunto se trata
  lexicon: intelligere / de qua re
  rationale: El latín dice literalmente «no entender de qué cosa/asunto»; «de qué se trata» conserva esa idea de no captar el motivo o la razón sin forzar una causalidad más explícita de la que el texto ofrece.
- source_word: proficiscens
  english_pob_choice: Setting out
  chosen_spanish: Partiendo…
  alternatives_spanish:
  - Saliendo…
  - Poniéndose en camino…
  lexicon: proficiscens
  rationale: Se conserva el participio fragmentario del latín con una forma natural en español. Los puntos suspensivos reflejan que la frase queda abierta y enlaza con la continuación del siguiente versículo.
theological_decisions:
- issue: Fragmentary ending and continuation into the next verse
  english_pob_reading: “Setting out” preserves the extant participle and the incomplete transition
  chosen_spanish_reading: «Partiendo…» conserva el participio y la abertura sintáctica
  alternative_spanish_readings:
  - «Saliendo…»
  - omitir el fragmento por incompleto
  rationale: El testimonio latino termina en participio; no debe eliminarse. La forma breve con elipsis comunica que el enunciado continúa en el versículo siguiente, sin cerrar artificialmente la frase.
  doctrine_reference: Textual fidelity / preservation of source syntax
translation_notes:
  revision_awareness: La revisión más reciente corrigió una adición no presente en el latín («and I said to him, “It would have been better for us not to exist»). Esta versión evita esa inserción y retiene el cierre fragmentario de proficiscens mediante «Partiendo…».
  spanish_consistency_notes:
  - Se usa «impiedad» como equivalente estable de impietas/impietatibus en lugar de «maldad» para preservar el registro religioso.
  - Se conserva la estructura fragmentaria final con elipsis para reflejar la inconclusión del original.
  - No se introduce «Cristo», «SEÑOR» ni otras convenciones no apoyadas por el latín de este pasaje.
