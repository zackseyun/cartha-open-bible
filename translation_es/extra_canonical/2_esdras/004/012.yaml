- from: '…que, habiendo venido, vivan en impiedad, y padezcan, y no entiendan de qué se trata. Y él me respondió y dijo: «Partiendo…»'
  to: '…que, habiendo venido, vivan en impiedad, y padezcan, y no entiendan por qué. Y él me respondió y dijo: «Partiendo…»'
  rationale: 'Se requiere una reparación pequeña para ajustar la sintaxis al latín y al rastro auditado en inglés: los verbos coordinados deben ir en infinitivo, no en subjuntivo finito. Además, ''por qué'' expresa mejor el sentido de la queja en español. Texto recomendado: ''…que, habiendo venido, vivir en impiedad, y padecer, y no entender por qué. Y él me respondió y dijo: «Partiendo…»'''
