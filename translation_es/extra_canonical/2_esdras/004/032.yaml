revisions:
- from: 'Cuando se siembren espigas de grano sin número, ¡cuán grande era la era de trillar que comenzarán a hacer! Y él respondió y me dijo: «Hasta—»'
  to: 'Cuando se siembren espigas sin número[a], ¡cuán grande será la era que comenzarán a hacer! Y él respondió y me dijo: «Hasta—»'
  rationale: Se corrige el error principal de tiempo verbal («era» → «será») para alinear el español con el latín y la auditoría inglesa. También se mejora la naturalidad con «espigas» y «era» sin perder la imagen agrícola ni el matiz inceptivo de «comenzarán a hacer». Se añade una nota para conservar la alternativa de redacción que el historial inglés documentó.
