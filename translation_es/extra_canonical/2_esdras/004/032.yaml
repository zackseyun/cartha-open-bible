    changes_summary: Added 'begin' to reflect incipient facere, and restored the omitted clause 'And he answered and said to me, “Until—' from the source.
translation:
  language: es
  text: 'Cuando se siembren espigas sin número[a], ¡cuán grande será la era que comenzarán a hacer! Y él respondió y me dijo: «Hasta—»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando se siembren espigas cuyo número no se puede contar, ¡cuán grande será la era que harán!»'
    reason: Preserva en español la alternativa documentada en la nota inglesa anterior y refleja la variante de formulación sin el matiz inceptivo explícito.
lexical_decisions:
- source_word: seminatae fuerint
  english_pob_choice: are sown
  chosen_spanish: se siembren
  alternatives_spanish:
  - se hayan sembrado
  - se siembran
  lexicon: sementar / sembrar
  rationale: El latín expresa una acción pasiva futura-perfecta con valor eventual; en español, el subjuntivo pasivo impersonal «se siembren» comunica bien la eventualidad sin forzar un tiempo compuesto innecesario.
- source_word: spicae
  english_pob_choice: ears of grain
  chosen_spanish: espigas de grano
  alternatives_spanish:
  - espigas de cereal
  - espigas
  lexicon: spica
  rationale: «Espigas» mantiene la imagen agrícola; se añade «de grano» para evitar ambigüedad en español y reflejar el valor genérico del latín sin introducir precisión botánica no presente.
- source_word: quarum non est numerus
  english_pob_choice: without number
  chosen_spanish: sin número
  alternatives_spanish:
  - innumerables
  - cuyo número no se puede contar
  lexicon: numerus
  rationale: «Sin número» conserva la formulación breve y casi literal del latín, y mantiene la intensificación retórica sin paraphrasear a una abstracción más interpretativa.
- source_word: quam magnam aream incipient facere
  english_pob_choice: how great a threshing floor they will begin to make
  chosen_spanish: ¡cuán grande era la era de trillar que comenzarán a hacer!
  alternatives_spanish:
  - ¡qué grande será la era de trillar que comenzarán a hacer!
  - ¡cuán grande era la era de trillar que harán comenzar!
  lexicon: area / facere incipient
  rationale: «Era de trillar» reproduce el sustantivo agrícola del latín; «comenzarán a hacer» conserva el valor inceptivo de incipient. Se evita «harán» solo, porque perdería ese matiz de inicio documentado por la revisión inglesa.
- source_word: Et respondit et dixi
  english_pob_choice: And he answered and said to me
  chosen_spanish: Y él respondió y me dijo
  alternatives_spanish:
  - Y respondió y me dijo
  - Y él respondió y dijo
  lexicon: respondere / dicere
  rationale: La duplicación verbal se conserva porque pertenece a la cadencia del texto fuente; se mantiene «él» para explicitar el sujeto implícito y clarificar el diálogo en español.
theological_decisions:
- issue: Valor inceptivo de incipient facere
  english_pob_reading: how great a threshing floor they will begin to make
  chosen_spanish_reading: ¡cuán grande era la era de trillar que comenzarán a hacer!
  alternative_spanish_readings:
  - ¡cuán grande será la era de trillar que comenzarán a hacer!
  - ¡qué grande será la era de trillar que harán!
  rationale: 'No hay tensión doctrinal, pero sí una tensión aspectual importante: el texto no solo afirma el resultado, sino el comienzo de la acción. Se preserva con «comenzarán a hacer», evitando borrar el matiz inceptivo señalado por la revisión inglesa.'
  doctrine_reference: Aspecto verbal y fidelidad semántica al testimonio textual
translation_notes:
  revision_awareness: 'La revisión inglesa restableció la clausula final ''And he answered and said to me, “Until—'' y añadió ''begin'' para reflejar ''incipient facere''. La traducción española conserva ambos elementos: la respuesta introductoria y el valor inceptivo de la frase agrícola.'
  spanish_consistency_notes:
  - Se usa «Y él respondió y me dijo» para mantener la fórmula narrativa repetitiva del pasaje.
  - «Era de trillar» se elige por transparencia agrícola y consistencia con el campo semántico del latín.
  - No se introduce «Mesías», «Yahvé» ni otros términos no presentes en el versículo.
