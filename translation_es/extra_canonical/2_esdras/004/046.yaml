translation:
  language: es
  text: Porque lo que ha pasado lo sé, pero lo que ha de venir no lo sé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: quod pertransiuit
  english_pob_choice: what has passed
  chosen_spanish: lo que ha pasado
  alternatives_spanish:
  - lo que ha transcurrido
  - lo que ya pasó
  lexicon: Latin pertransire / pertransiuit
  rationale: El latín expresa algo que “ha pasado” o “ha transcurrido”; en español, “lo que ha pasado” comunica de forma natural el hecho ya concluido sin añadir matices no presentes en el texto.
- source_word: scio
  english_pob_choice: I know
  chosen_spanish: lo sé
  alternatives_spanish:
  - yo sé
  - lo conozco
  lexicon: Latin scire
  rationale: scio indica conocimiento factual; “lo sé” conserva la brevedad y el contraste con la cláusula siguiente.
- source_word: quid autem futurum sit
  english_pob_choice: what is to come I do not know
  chosen_spanish: lo que ha de venir no lo sé
  alternatives_spanish:
  - lo que vendrá no lo sé
  - lo que será no lo sé
  lexicon: Latin futurum esse / futurum sit
  rationale: La construcción latina apunta al futuro indeterminado. “Ha de venir” suena natural en español y mantiene la idea de aquello que aún está por llegar, sin forzar una especificación temporal mayor.
theological_decisions:
- issue: Contraste entre conocimiento del pasado e ignorancia del futuro
  english_pob_reading: For what has passed I know, but what is to come I do not know.
  chosen_spanish_reading: Porque lo que ha pasado lo sé, pero lo que ha de venir no lo sé.
  alternative_spanish_readings:
  - Pues de lo pasado sé, pero de lo futuro no sé
  - Lo pasado lo conozco, mas lo que viene no lo sé
  rationale: El texto expresa una limitación de conocimiento, no una doctrina técnica. La traducción conserva el contraste entre pasado conocido y futuro desconocido sin intensificarlo ni suavizarlo.
  doctrine_reference: Humildad epistemológica del hablante; no aplica una formulación doctrinal especializada.
translation_notes:
  revision_awareness: La versión inglesa POB y la revisión más reciente coinciden plenamente; no hubo cambios aplicados y no se detectan tensiones textuales que requieran nota.
