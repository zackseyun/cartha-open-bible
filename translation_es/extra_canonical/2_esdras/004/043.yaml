base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/004/043.yaml
  text: They hasten to return the things that were entrusted from the beginning. Then what you desire to see will be shown to you.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:34Z'
    unchanged: false
    changes_summary: Restored the omitted first clause ('They hasten to return the things that were entrusted from the beginning') and kept the second sentence with slightly more formal wording matching the source.
translation:
  language: es
  text: Se apresuran a devolver lo que fue confiado desde el principio. Entonces se te mostrará lo que deseas ver.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: festinant
  english_pob_choice: They hasten
  chosen_spanish: Se apresuran
  alternatives_spanish:
  - Se dan prisa
  - Se apresuran a
  lexicon: Latin festinare
  rationale: Reproduce la idea de prisa inmediata con un verbo natural en español; «se apresuran» conserva el matiz de movimiento diligente mejor que una glosa más rígida.
- source_word: reddere
  english_pob_choice: to return
  chosen_spanish: devolver
  alternatives_spanish:
  - retornar
  - restituir
  lexicon: Latin reddere
  rationale: En este contexto, reddere expresa dar de vuelta lo recibido/encargado; «devolver» es claro y fiel en español sin cargar con un matiz jurídico excesivo.
- source_word: ea quae commendata sunt
  english_pob_choice: the things that were entrusted
  chosen_spanish: lo que fue confiado
  alternatives_spanish:
  - las cosas que fueron confiadas
  - lo encomendado
  lexicon: Latin commendare
  rationale: Commendata sunt señala algo puesto bajo encargo o confianza. «Lo que fue confiado» preserva el pasivo y el sentido de depósito/encargo sin introducir una palabra demasiado técnica.
- source_word: ab initio
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el inicio
  lexicon: Latin initium
  rationale: «Desde el principio» es la forma más idiomática y fiel para el alcance temporal de ab initio.
- source_word: demonstrabitur
  english_pob_choice: will be shown
  chosen_spanish: se te mostrará
  alternatives_spanish:
  - será mostrado a ti
  - te será mostrado
  lexicon: Latin demonstrare
  rationale: La pasiva latina se vierte con una pasiva refleja natural en español. Se mantiene el destinatario explícito («te») como en la promesa del texto.
- source_word: concupiscis uidere
  english_pob_choice: what you desire to see
  chosen_spanish: lo que deseas ver
  alternatives_spanish:
  - lo que anhelas ver
  - lo que quieres ver
  lexicon: Latin concupiscere + videre
  rationale: «Deseas ver» conserva el impulso volitivo del verbo latino sin elevarlo innecesariamente a un matiz intensamente emotivo como «anhelas».
theological_decisions:
- issue: Passive promise of revelation
  english_pob_reading: Then what you desire to see will be shown to you.
  chosen_spanish_reading: Entonces se te mostrará lo que deseas ver.
  alternative_spanish_readings:
  - Entonces te será mostrado lo que deseas ver.
  - Entonces se mostrará a ti lo que deseas ver.
  rationale: La construcción mantiene la promesa pasiva sin convertirla en una acción humana. El destinatario recibe la revelación; el español refleja esa pasividad con naturalidad.
  doctrine_reference: Revelación concedida por iniciativa divina; no se especifica agente explícito en el verso.
translation_notes:
  revision_awareness: La versión española integra la cláusula restaurada por la revisión reciente («Se apresuran a devolver lo que fue confiado desde el principio») y conserva la segunda cláusula con un giro más formal y fiel al pasivo latino.
  spanish_consistency_notes:
  - Se evita importar terminología eclesiástica no presente en el latín.
  - «Confiado» se usa en sentido de algo encomendado o depositado, no como confianza emocional.
  - La pasiva refleja («se te mostrará») conserva la voz pasiva del original sin sonar artificiosa en español.
