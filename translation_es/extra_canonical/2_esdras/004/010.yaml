translation:
  language: es
  text: Si no puedes entender lo que ha crecido contigo, entonces ¿cómo podrás?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: tecum coaſdulescentia
  english_pob_choice: what has grown up with you
  chosen_spanish: lo que ha crecido contigo
  alternatives_spanish:
  - lo que ha crecido a tu lado
  - lo que se ha criado contigo
  lexicon: Latín coadulescentia / coaesdulescentia
  rationale: La imagen es de aquello que ha crecido junto con la persona. «Ha crecido contigo» conserva la relación estrecha del original y sigue de cerca la decisión inglesa sin sonar mecánico en español.
- source_word: non potes cognoscere
  english_pob_choice: you cannot understand
  chosen_spanish: no puedes entender
  alternatives_spanish:
  - no puedes conocer
  - no puedes comprender
  lexicon: Latín cognoscere
  rationale: En este contexto, «entender» comunica mejor la capacidad de captar el sentido de la comparación o argumento. «Comprender» también sería válido, pero «entender» es más directo y natural en español bíblico moderno.
- source_word: Et quomodo poterit
  english_pob_choice: then how will you be able
  chosen_spanish: entonces ¿cómo podrás?
  alternatives_spanish:
  - ¿y cómo podrás?
  - ¿cómo podrías entonces?
  lexicon: Latín et quomodo poterit
  rationale: El latín conserva una cláusula final incompleta; la revisión inglesa también la deja abierta con una elipsis. En español, «entonces ¿cómo podrás?» preserva esa incompletitud y el valor retórico de la pregunta sin añadir contenido no atestiguado.
theological_decisions:
- issue: Cláusula final incompleta / elíptica
  english_pob_reading: If you cannot understand what has grown up with you, then how will you be able
  chosen_spanish_reading: Si no puedes entender lo que ha crecido contigo, entonces ¿cómo podrás?
  alternative_spanish_readings:
  - Si no puedes entender lo que ha crecido contigo, entonces ¿cómo podrás entender más?
  rationale: La fuente latina termina abruptamente, y la auditoría inglesa reconoce esa clausura incompleta. Mantener la elipsis en español respeta la tensión textual y evita suplir una conclusión que el testimonio no ofrece.
  doctrine_reference: None; textual fidelity to an incomplete source clause
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente, que completó en inglés la cláusula final a partir del latín 'Et quomodo poterit', manteniendo el sentido de la comparación y el carácter incompleto del cierre. La versión española conserva esa apertura y no introduce material interpretativo adicional.
  spanish_consistency_notes:
  - Se prefirió «entender» por naturalidad y claridad, sin perder la fuerza cognitiva de cognoscere.
  - Se conservó el tono interrogativo-retórico del inglés revisado.
  - No se usaron notas al pie porque no había una variante textual o léxica que requiriera anclaje explícito en el texto español.
