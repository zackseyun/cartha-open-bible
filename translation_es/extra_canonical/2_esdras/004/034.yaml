source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'respondit ad me et dixit: non festinas tu super altissimum, tu enim festinas propter temetipsum, nam excelsus pro multis. Nonne de his interrogauerunt animae iustorum in promptuariis'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/004/034.yaml
  text: And he answered me and said[a], “You do not hasten more than the Most High, for you hasten for your own sake, but the Most High for many. Have not the souls of the righteous in their chambers asked about these things?”
  footnotes:
  - marker: a
    text: Or '“Are you in greater haste than the Most High? For your haste is for your own sake'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:32Z'
    unchanged: false
    changes_summary: Removed the awkward possessive in 'the Most High’s is for many' to match the Latin more naturally, and restored the omitted final clause about the souls of the righteous asking in their chambers.
translation:
  language: es
  text: 'Y él me respondió y dijo[a]: «No te apresuras más que el Altísimo, pues te apresuras por ti mismo; pero el Altísimo, por muchos. ¿No han preguntado por estas cosas las almas de los justos en sus aposentos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Estás más apresurado que el Altísimo? Pues te apresuras por tu propio bien».'
    reason: Reflejar más de cerca la alternativa de traducción documentada en la auditoría inglesa, sin introducir una reformulación demasiado libre.
lexical_decisions:
- source_word: non festinas tu
  english_pob_choice: You do not hasten more than the Most High
  chosen_spanish: Tú no te apresuras más que el Altísimo
  alternatives_spanish:
  - No te apresuras más que el Altísimo
  - Tú no vas más aprisa que el Altísimo
  lexicon: festinare
  rationale: La frase latina es declarativa, no interrogativa. ‘Te apresuras’ conserva el verbo de movimiento/urgencia y evita convertir la afirmación en pregunta. ‘Más que el Altísimo’ reproduce la comparación del original sin suavizarla.
- source_word: super altissimum
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Altísimo Dios
  lexicon: altissimus
  rationale: ‘Altissimus’ funciona aquí como título divino. ‘El Altísimo’ es la forma más natural y reverente en español, manteniendo el valor titulativo sin añadir una glosa no presente en el latín.
- source_word: propter temetipsum
  english_pob_choice: for your own sake
  chosen_spanish: por ti mismo
  alternatives_spanish:
  - por tu propia cuenta
  - para ti mismo
  lexicon: propter + te ipsum
  rationale: La construcción expresa finalidad o interés personal. ‘Por ti mismo’ comunica el matiz de interés propio de manera breve y fiel; ‘para ti mismo’ también sería posible, pero ‘por ti mismo’ sigue mejor la acusación de motivación personal.
- source_word: excelsus pro multis
  english_pob_choice: the Most High for many
  chosen_spanish: el Altísimo, por muchos
  alternatives_spanish:
  - el Altísimo para muchos
  - el Altísimo a favor de muchos
  lexicon: excelsus
  rationale: El latín omite un verbo explícito en la segunda cola. Conservar la elipsis con ‘el Altísimo, por muchos’ respeta la forma abrupta del original y la revisión inglesa que evitó completar indebidamente la frase. La coma marca la elipsis sin interpretar demasiado.
- source_word: animae iustorum
  english_pob_choice: the souls of the righteous
  chosen_spanish: las almas de los justos
  alternatives_spanish:
  - las almas de los rectos
  - las almas de los justos y rectos
  lexicon: anima / iustus
  rationale: ‘Almas’ traduce directamente animae. ‘Justos’ es la equivalencia más estable para iustorum en este contexto escatológico; ‘rectos’ es posible, pero menos preciso aquí y menos tradicional para el sustantivo colectivo.
- source_word: in promptuariis
  english_pob_choice: in their chambers
  chosen_spanish: en sus aposentos
  alternatives_spanish:
  - en sus cámaras
  - en sus recámaras
  lexicon: promptuarium
  rationale: El latín usa un término de almacén/apartamento reservado; la traducción inglesa optó por ‘chambers’. ‘Aposentos’ comunica mejor en español un lugar reservado o privado sin caer en ‘cámaras’, que puede sonar demasiado arquitectónico o técnico.
theological_decisions:
- issue: Si la primera cláusula es afirmación o pregunta
  english_pob_reading: You do not hasten more than the Most High
  chosen_spanish_reading: Tú no te apresuras más que el Altísimo
  alternative_spanish_readings:
  - ¿Te apresuras más que el Altísimo?
  - ¿No te apresuras más que el Altísimo?
  rationale: 'El latín revisado corrige el error de leer non festinas tu como interrogación. La forma española debe mantener la afirmación para conservar el argumento: la prisa humana no supera el modo de obrar de Dios.'
  doctrine_reference: Providencia divina y paciencia escatológica; cf. Sabiduría de Dios frente a la impaciencia humana.
- issue: Elipsis en ‘excelsus pro multis’
  english_pob_reading: but the Most High for many
  chosen_spanish_reading: pero el Altísimo, por muchos
  alternative_spanish_readings:
  - pero el Altísimo es para muchos
  - pero el Altísimo obra por muchos
  rationale: 'La revisión inglesa mantuvo la elipsis del latín en lugar de suplir un verbo. En español conviene preservar esa tensión textual: Dios actúa en favor de muchos, pero el original aquí no desarrolla el verbo explícito.'
  doctrine_reference: Lenguaje económico del texto apocalíptico; no añadir precisión teológica no dicha por el testimonio base.
- issue: ‘Souls of the righteous’ as interlocutors
  english_pob_reading: Have not the souls of the righteous in their chambers asked about these things?
  chosen_spanish_reading: ¿No han preguntado acerca de estas cosas las almas de los justos en sus aposentos?
  alternative_spanish_readings:
  - ¿No han preguntado sobre estas cosas las almas de los justos en sus aposentos?
  - ¿Acaso no preguntaron las almas de los justos en sus aposentos acerca de estas cosas?
  rationale: Se conserva la escena de las almas de los justos como sujetos que interrogan desde sus aposentos. No se debe diluir ni alegorizar la imagen, porque pertenece al imaginario escatológico del pasaje y al paralelo del texto latino restaurado.
  doctrine_reference: Estado intermedio / espera de las almas de los justos según la imaginería del libro; mantener la formulación sin armonizarla con esquemas posteriores.
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió dos fallos del inglés previo: (1) convirtió indebidamente en pregunta la primera cláusula, aunque el latín dice non festinas tu; y (2) restauró la cláusula final sobre las almas de los justos en sus aposentos. La versión española sigue esa revisión y mantiene la elipsis de excelsius pro multis sin completar el verbo.'
  spanish_consistency_notes:
  - Se usa ‘Altísimo’ de forma consistente como título divino para super altissimum / excelsus.
  - Se mantiene ‘apresuras’ para festinas a fin de preservar la fuerza verbal, no una nominalización.
  - ‘Aposentos’ se eligió por claridad natural en español, sin borrar la imagen de lugar reservado implícita en promptuariis.
  - 'La puntuación conserva la estructura de dos movimientos: afirmación sobre la prisa humana y pregunta final sobre las almas de los justos.'
