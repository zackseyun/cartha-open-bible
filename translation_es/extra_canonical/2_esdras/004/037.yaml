translation:
  language: es
  text: y midió los tiempos, y contó los tiempos, y no los moverá ni los agitará hasta que se cumpla lo que fue anunciado[a].”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo predicho».
    reason: alternative_reading
lexical_decisions:
- source_word: mensurauit tempora
  english_pob_choice: and measured the times
  chosen_spanish: y midió los tiempos
  alternatives_spanish:
  - y midió el tiempo
  - y midió los tiempos señalados
  lexicon: Latin mensurare / tempus
  rationale: El latín usa el plural tempora, por lo que «los tiempos» conserva la pluralidad del texto. «Midió» es la correspondencia natural de mensurauit y mantiene la imagen de fijar o delimitar tiempos determinados.
- source_word: numero numerauit tempora
  english_pob_choice: and numbered the times
  chosen_spanish: y contó los tiempos
  alternatives_spanish:
  - y los numeró
  - y los contó
  lexicon: Latin numerare / numerus
  rationale: «Contó» comunica en español la acción de numerar sin sonar redundante o artificial. «Los tiempos» sigue el plural del original y evita introducir «medida» o «número» como añadidos no presentes en la frase latina.
- source_word: non commouebit nec excitabit
  english_pob_choice: he will not move or stir them
  chosen_spanish: no los moverá ni los despertará
  alternatives_spanish:
  - no los moverá ni los agitará
  - no los moverá ni los pondrá en movimiento
  lexicon: Latin commovere / excitare
  rationale: El par verbal latino expresa no mover ni levantar/avivar. «Moverá ni los despertará» conserva la duplicidad de acciones y el valor intensivo de excitabit, aunque en español «despertar» queda mejor como imagen de activar o poner en marcha que como simple sueño físico.
- source_word: usque dum impleatur praedicta
  english_pob_choice: until what was foretold is fulfilled
  chosen_spanish: hasta que se cumpla lo que fue anunciado[a]
  alternatives_spanish:
  - hasta que se cumpla lo que fue profetizado
  - hasta que se cumpla lo predicho
  lexicon: Latin usque dum / impleri / praedicta
  rationale: «Hasta que se cumpla» sigue la construcción temporal y verbal del latín. Para praedicta, «lo que fue anunciado» reproduce el sentido de algo ya dicho de antemano, manteniendo la decisión revisada en el audit trail de no introducir «medida» como sustantivo no exigido por el texto.
theological_decisions:
- issue: 'praedicta: si debe entenderse como ''lo predicho/foretold'' o como ''la medida dicha'''
  english_pob_reading: what was foretold is fulfilled
  chosen_spanish_reading: lo que fue anunciado
  alternative_spanish_readings:
  - lo que fue predicho
  - lo predicho
  rationale: 'El latín praedicta aquí funciona naturalmente como participio neutro plural sustantivado: aquello que fue dicho antes, es decir, lo predicho. La revisión del inglés rechazó ''the said measure'' por ser burocrático y por añadir ''measure'' sin base suficiente; por eso el español evita cualquier terminología de ''medida'' y conserva la idea profética de algo anunciado de antemano.'
  doctrine_reference: Determinación divina del tiempo escatológico; el cumplimiento de lo anunciado por Dios.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés, que eliminó los añadidos 'by measure' y 'by number' y prefirió una traducción natural de commouebit/excitabit como 'move or stir'. También evita recuperar 'measure' para praedicta, dado que el ajuste revisado y la evidencia latina favorecen el sentido de lo previamente anunciado.
  spanish_consistency_notes:
  - 'Conservo el paralelismo verbal del original: ''midió / contó / no los moverá ni los despertará''.'
  - Uso 'los tiempos' en plural para reflejar tempora sin convertirlo en un singular abstracto.
  - Mantengo un registro bíblico sobrio y directo, evitando formulaciones litúrgicas que el latín no exige.
