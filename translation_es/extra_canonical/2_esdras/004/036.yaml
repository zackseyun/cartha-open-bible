base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/004/036.yaml
  text: And the archangel answered and said, ‘When the number of those like you is completed, for he has weighed the age in a balance,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:33Z'
    unchanged: false
    changes_summary: Removed 'Jeremiel' because it is not present in the provided Latin source. Replaced 'answered them' with 'answered' to match the singular implied by the source. Changed the semicolon to a comma for smoother English while preserving the unfinished verse.
translation:
  language: es
  text: 'Y el arcángel respondió y dijo: «Cuando se haya completado el número de los que son como ustedes, porque ha pesado la era en una balanza,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: archangelus
  english_pob_choice: the archangel
  chosen_spanish: el arcángel
  alternatives_spanish:
  - el arcángel principal
  - el arcángel celestial
  lexicon: arcángel
  rationale: La fuente latina dice solo archangelus; no añade nombre propio. Mantengo el título común «arcángel» sin insertar identificación ausente en el texto fuente ni en la revisión inglesa.
- source_word: dixit
  english_pob_choice: answered and said
  chosen_spanish: respondió y dijo
  alternatives_spanish:
  - contestó y dijo
  - respondió
  lexicon: decir
  rationale: El latín conserva la secuencia narrativa de respuesta más declaración. «Respondió y dijo» reproduce bien ese valor sin añadir contenido extra, siguiendo la pauta inglesa revisada de un solo sujeto que habla.
- source_word: quando impletus fuerit numerus similium uobis
  english_pob_choice: When the number of those like you is completed
  chosen_spanish: Cuando se haya completado el número de los semejantes a ustedes
  alternatives_spanish:
  - Cuando se complete el número de los semejantes a ustedes
  - Cuando se haya llenado el número de los que son como ustedes
  lexicon: similis
  rationale: El latín similium uobis expresa «los semejantes a ustedes»; en español «los semejantes a ustedes» conserva la comparación sin aplanarla a una mera equivalencia. «Se haya completado» refleja el futuro perfecto pasivo/estado resultante de impletus fuerit.
- source_word: statera ponderauit
  english_pob_choice: he has weighed ... in a balance
  chosen_spanish: ha pesado ... en una balanza
  alternatives_spanish:
  - ha pesado ... con una balanza
  - ha puesto ... en la balanza
  lexicon: statera
  rationale: El latín usa statera, instrumento de pesar; «balanza» es el equivalente natural en español y conserva la imagen forense/judicial. «Ha pesado» sigue la metáfora verbal del original y de la versión inglesa.
- source_word: saeculum
  english_pob_choice: the age
  chosen_spanish: la era
  alternatives_spanish:
  - el siglo
  - el mundo
  lexicon: saeculum
  rationale: Saeculum puede ser «edad/era/siglo» y a veces «mundo». La traducción inglesa eligió «age»; en español, «era» mantiene esa amplitud temporal sin forzar la lectura a «siglo», que sería más estrecha y menos fiel al campo semántico.
theological_decisions:
- issue: Identidad del arcángel
  english_pob_reading: The revised English omits Jeremiel because it is not present in the Latin source.
  chosen_spanish_reading: el arcángel
  alternative_spanish_readings:
  - el arcángel Jeremiel
  - Jeremiel, el arcángel
  rationale: No debo introducir un nombre propio ausente del latín proporcionado. La decisión preserva la cautela editorial de la revisión inglesa y evita afirmar más de lo que la fuente documenta.
  doctrine_reference: Principio de suficiencia textual / no ampliación de datos no atestiguados
- issue: Imagen de pesar el tiempo o la era
  english_pob_reading: for he has weighed the age in a balance
  chosen_spanish_reading: porque ha pesado la era en una balanza
  alternative_spanish_readings:
  - porque ha pesado el siglo en una balanza
  - porque ha pesado el mundo en una balanza
  rationale: Conservo la imagen literal de juicio y medida. «Era» sigue la decisión inglesa «age» y evita imponer una interpretación doctrinal cerrada sobre si saeculum significa tiempo, época o mundo.
  doctrine_reference: Cautela semántica ante saeculum; juicio divino soberano
translation_notes:
  revision_awareness: La revisión inglesa eliminó «Jeremiel» por ausencia en el latín y cambió a un solo receptor implícito; la presente versión española sigue esa depuración y no añade nombres propios. También conserva la cláusula final abierta, terminando en coma para reflejar que el verso continúa.
  spanish_consistency_notes:
  - He mantenido un registro bíblico digno y contemporáneo, evitando arcaísmos innecesarios.
  - No se usa «SEÑOR» porque la fuente no contiene el nombre divino.
  - Se conserva la imagen de balanza como metáfora de juicio, sin explicarla más allá del texto.
  - No se introducen notas al pie, para evitar marcas no ancladas en el texto.
