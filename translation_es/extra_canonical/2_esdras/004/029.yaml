    rationale: El latín subyacente detrás de la decisión inglesa apunta a la acción agrícola de segar/cosechar, no simplemente recoger. «Recoger» puede entenderse como cualquier acto de juntar algo, y reduce la precisión metafórica del pasaje.
  revised_spanish_text: Porque si lo que ha sido sembrado no es cosechado, y el lugar donde ha sido sembrado el mal no desaparece, el campo donde ha sido sembrado el bien no vendrá.
