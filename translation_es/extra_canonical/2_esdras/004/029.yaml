- from: Porque si lo que ha sido sembrado no se recoge, y el lugar donde ha sido sembrado el mal no desaparece, el campo donde ha sido sembrado el bien no vendrá.
  to: Porque si lo que ha sido sembrado no es cosechado, y el lugar donde ha sido sembrado el mal no desaparece, el campo donde ha sido sembrado el bien no vendrá.
  rationale: Se reemplaza «no se recoge» por «no es cosechado» para preservar con mayor fidelidad la imagen agrícola específica de «is not reaped» y mantener el registro formal del pasaje. Se conserva el perfecto pasivo repetido («ha sido sembrado») porque refleja correctamente el triple seminatum est del latín y el paralelismo enfatizado en el audit trail inglés.
