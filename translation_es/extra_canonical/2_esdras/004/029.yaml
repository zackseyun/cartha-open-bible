review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del latín y del English POB: mantiene el triple paralelismo de seminatum est con una forma perfecta pasiva y refleja discesserit locus como la permanencia o desaparición del lugar. Sin embargo, «no se recoge» no preserva con suficiente precisión la imagen agrícola de «is not reaped»; en este contexto corresponde mejor «no es segado» o «no es cosechado».'
  spanish_quality_summary: 'El español es claro y digno, pero «recoger» resulta algo genérico y debilita la metáfora agrícola estricta. El resto fluye bien: «Porque si...», «no desaparece», «el campo... no vendrá». La repetición de «ha sido sembrado» es algo pesada, pero está justificada por el paralelismo fuente.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son adecuadas: seminatum est → «ha sido sembrado», ager → «campo». La única corrección recomendada es acercar «not reaped» a «no es cosechado» para respetar mejor la evidencia y la decisión inglesa documentada.'
  issues:
