base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/004/029.yaml
  text: For if what has been sown is not reaped[a], and the place where the evil has been sown does not pass away, the field where the good has been sown will not come.
  footnotes:
  - marker: a
    text: Or 'So if what has been sown is not reaped, and the place where the evil was sown does not pass away, the field where the good is sown will not come.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:32Z'
    unchanged: false
    changes_summary: Changed 'So' to 'For' to better reflect Latin 'quod/quoniam' connective and maintain formal register. Kept the rest unchanged, as it accurately represents the source.
translation:
  language: es
  text: Porque si lo que ha sido sembrado no es cosechado, y el lugar donde ha sido sembrado el mal no desaparece, el campo donde ha sido sembrado el bien no vendrá.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: seminatum est
  english_pob_choice: has been sown
  chosen_spanish: ha sido sembrado
  alternatives_spanish:
  - ha sido sembrado
  - ha sido sembrada
  lexicon: Latin seminare -> sembrar
  rationale: El latín repite la misma forma perfecta pasiva tres veces; en español, «ha sido sembrado» conserva el aspecto de acción ya realizada y el paralelismo estricto del texto. Se evita alternar tiempos verbales para no borrar la repetición retórica.
- source_word: discesserit locus
  english_pob_choice: the place ... does not pass away
  chosen_spanish: el lugar ... no desaparece
  alternatives_spanish:
  - el lugar ... no se va
  - el lugar ... no pasa
  lexicon: Latin discedere / locus
  rationale: «Desaparecer» comunica con naturalidad la idea de que el lugar deja de estar ahí o deja de subsistir, sin introducir una imagen distinta. «No pasa» sería demasiado literal y menos idiomático en español.
- source_word: ager
  english_pob_choice: field
  chosen_spanish: campo
  alternatives_spanish:
  - campo
  - campo cultivado
  lexicon: Latin ager
  rationale: «Campo» es el equivalente directo y natural para ager en este contexto agrícola-metafórico. Mantiene la imaginería del contraste entre el lugar del mal y el campo del bien.
theological_decisions:
- issue: Paralelismo escatológico entre mal ya sembrado y bien ya sembrado
  english_pob_reading: both the place where the evil has been sown and the field where the good has been sown are described with the same perfect aspect
  chosen_spanish_reading: el lugar donde ha sido sembrado el mal ... el campo donde ha sido sembrado el bien
  alternative_spanish_readings:
  - el lugar donde fue sembrado el mal ... el campo donde fue sembrado el bien
  - el lugar donde se sembró el mal ... el campo donde se sembró el bien
  rationale: Se conserva el perfecto compuesto para reflejar que ambas realidades ya han sido sembradas, conforme al ajuste del audit trail inglés. Esto preserva la simetría determinista del pasaje y evita que el español debilite la correspondencia entre mal y bien.
  doctrine_reference: 4 Esdras 4:29; observación revisada sobre el aspecto verbal perfecto
translation_notes:
  revision_awareness: La revisión inglesa corrigió la conectiva inicial a «For» y unificó el aspecto perfecto en las tres ocurrencias de seminatum est. La versión española sigue esa revisión con «Porque» y «ha sido sembrado» de forma consistente en todo el versículo.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico formal pero natural en español.
  - No se introduce puntuación o marcadores de nota no anclados en el texto.
  - Se conserva la estructura condicional-causal del latín sin sobreparafrasear.
