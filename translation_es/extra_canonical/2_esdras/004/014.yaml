- from: 'y dijeron[a]: «Vengan, vamos a hacer guerra contra el mar, para que se retire de delante de nosotros, y nos hagamos otras selvas». Del mismo modo, también las olas del mar idearon un plan,'
  to: 'y dijo[a]: «Vengan, vayamos a hacer guerra contra el mar, para que se retire ante nosotros, y nos hagamos otros bosques». Del mismo modo, también las olas del mar idearon un plan,'
  rationale: Se corrige el verbo introductorio a singular para ajustarlo a la fuente auditada. Se mejora la naturalidad con «vayamos» y «ante nosotros». Se cambia «selvas» por «bosques» por claridad y uso más amplio en español, sin perder el contraste de «otras». La nota al pie se rehace para reflejar una alternativa real y completa, conforme al historial de revisión inglés.
