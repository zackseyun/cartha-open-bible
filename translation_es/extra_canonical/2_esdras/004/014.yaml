translation:
  language: es
  text: 'y dijo[a]: «Vengan, vayamos a hacer guerra contra el mar, para que se retire ante nosotros, y nos hagamos otros bosques». Del mismo modo, también las olas del mar idearon un plan,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y dijo: “Vengan, vayamos a hacer guerra contra el mar, para que se retire ante nosotros, y nos hagamos más bosques”. Del mismo modo, también las olas del mar formaron un plan,»'
    reason: 'Preserva la alternativa documentada en la auditoría inglesa previa: «more forests» y «formed a plan».'
lexical_decisions:
- source_word: mare bellum
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar tempestuoso
  - el mar en guerra
  lexicon: mare = mar; bellum = guerra
  rationale: La sintaxis latina presenta una expresión de conflicto dirigida contra el mar. En español, “hacer guerra contra el mar” conserva el valor bélico sin introducir una imagen ajena al texto. “El mar” mantiene la referencia directa y natural.
- source_word: alias siluas
  english_pob_choice: other forests
  chosen_spanish: otras selvas
  alternatives_spanish:
  - otros bosques
  - más bosques
  lexicon: alias = otras; silvae = selvas/bosques
  rationale: Se mantiene “otras” porque el latín alias significa ‘otras’, no ‘más’. “Selvas” conserva el plural y la fuerza de un espacio boscoso amplio; “bosques” también es posible, pero “selvas” suena más cercano al contraste poético del pasaje.
- source_word: cogitauerunt
  english_pob_choice: devised a plan
  chosen_spanish: idearon un plan
  alternatives_spanish:
  - pensaron un plan
  - trazaron un plan
  - formaron un plan
  lexicon: cogitare = pensar, idear, planear
  rationale: “Idearon un plan” expresa bien el acto deliberado de cogitaverunt y sigue la revisión del inglés POB que prefirió un verbo más natural que “formed a plan”. En español evita una traducción mecánica y conserva la acción mental intencional.
theological_decisions:
- issue: Personificación de las olas del mar
  english_pob_reading: In the same way the waves of the sea also devised a plan,
  chosen_spanish_reading: Del mismo modo, también las olas del mar idearon un plan,
  alternative_spanish_readings:
  - Las olas del mar también idearon un plan
  - Asimismo, las olas del mar también planearon
  rationale: El texto atribuye intención a las olas como recurso retórico/personificación. Se conserva esa tensión sin explicarla ni suavizarla, porque forma parte del sentido narrativo del pasaje.
  doctrine_reference: Retórica bíblica; personificación literaria
translation_notes:
  revision_awareness: Se siguió la revisión auditada que corrigió ‘more forests’ por ‘other forests’ a partir de alias = ‘other’, y se adoptó ‘idearon un plan’ en lugar de una fórmula más literal pero menos natural. La redacción española intenta reflejar esa precisión lexical sin perder fluidez.
  spanish_consistency_notes:
  - Se conserva ‘mar’ y no se añade un equivalente explicativo para bellum; la guerra es parte de la imagen del texto.
  - ‘Otras selvas’ mantiene el paralelo con el latín alias siluas y evita la cuantificación errónea ‘más’.
  - Se mantiene la mayúscula de inicio y el cierre de comillas según uso español.
  - La puntuación reproduce el arranque narrativo y la frase final queda abierta, como en el fragmento latino transmitido.
