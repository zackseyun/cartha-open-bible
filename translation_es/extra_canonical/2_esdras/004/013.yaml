  rationale: Se corrige `cogitauerunt` de imperfecto a perfecto en español y se sustituye «maquinaban» por «idearon» para una equivalencia más natural y menos cargada. También se ajusta «vamos» a «vayamos» para reflejar mejor el cohortativo latino `eamus` y mantener coherencia con «Venid». Se conservan la literalidad de «bosque de los árboles de la llanura», la nota sobre «una vez» como alternativa histórica, y la cláusula final abierta conforme al texto fuente y la auditoría inglesa.
