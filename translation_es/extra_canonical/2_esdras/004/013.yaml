translation:
  language: es
  text: 'Salí[a] a un bosque de los árboles de la llanura, y ellos idearon un plan[b], y dijeron: «Venid, vayamos y hagamos'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Salí una vez a un bosque».'
    reason: alternative_reading
  - marker: b
    text: 'O: «y formaron un plan».'
    reason: alternative_reading
lexical_decisions:
- source_word: profectus sum
  english_pob_choice: I went out
  chosen_spanish: Salí
  alternatives_spanish:
  - Me fui
  - Partí
  lexicon: Latin proficiscor / perfect tense
  rationale: El perfecto latino expresa una acción pasada simple sin añadir 'una vez'; 'salí' comunica de forma natural que el narrador partió o salió, sin sobreinterpretar el valor temporal.
- source_word: siluam lignorum campi
  english_pob_choice: a forest of the trees of the plain
  chosen_spanish: un bosque de los árboles de la llanura
  alternatives_spanish:
  - un bosque de árboles de la llanura
  - un bosque en la llanura
  lexicon: Latin silva + lignorum campi
  rationale: Mantengo la relación literal entre 'bosque' y 'árboles de la llanura', porque el giro es extraño pero transparente en el latín y no conviene suavizarlo sin base textual.
- source_word: cogitauerunt cogitationem
  english_pob_choice: they devised a plan
  chosen_spanish: maquinaban un plan
  alternatives_spanish:
  - devisaron un plan
  - concebían un plan
  lexicon: Latin cogitare + cognate object
  rationale: La construcción latina es un cognado enfático. 'Maquinaban un plan' conserva el sentido de idear/conspirar con algo de tensión, acorde con el contexto narrativo, sin perder la fuerza del objeto interno.
- source_word: 'Et dixerunt: uenite et eamus et faciamus'
  english_pob_choice: and said, 'Come, let us go and make
  chosen_spanish: 'y dijeron: «Venid, vamos y hagamos'
  alternatives_spanish:
  - 'y dijeron: «Venid, vayamos y hagamos'
  - 'y dijeron: «Venid, idnos y hagamos'
  lexicon: Latin venite / eamus / faciamus
  rationale: Conservo el imperativo plural 'Venid' y los cohortativos con 'vamos' y 'hagamos' para reflejar la secuencia exhortativa del latín. Dejo la cláusula abierta porque el testimonio fuente termina en 'faciamus ad'.
theological_decisions:
- issue: Tratamiento del nombre divino y títulos cristológicos
  english_pob_reading: Not applicable in this verse
  chosen_spanish_reading: No aplica en este versículo
  alternative_spanish_readings:
  - Yahvé
  - Cristo
  rationale: No aparecen términos divinos ni cristológicos en el texto fuente de este versículo; por tanto, no se introduce terminología confesional ajena al pasaje.
  doctrine_reference: None
translation_notes:
  revision_awareness: La versión inglesa auditada retiró 'Once' por no estar sustentado por el latín y prefirió 'devised a plan' para cogitauerunt cogitationem. También retuvo la cláusula final incompleta para ajustarse al texto fuente; la versión española sigue esas decisiones y conserva la apertura sintáctica.
  spanish_consistency_notes:
  - He mantenido el registro bíblico sobrio y legible en español.
  - He conservado la incompletud final de la frase para respetar el testimonio latino dado.
  - Los marcadores de nota aparecen exactamente en el texto español en los dos puntos anotados.
