source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: quoniam festinans festinat saeculum pertransire; Non enim capiet portare quae in temporibus iustis repromissa sunt, quoniam plenum mesticia est saeculum hoc et infirmitatibus.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/004/027.yaml
  text: because the age is hastening quickly to pass away. For it cannot bear the things that have been promised for the righteous in their proper times, because this age is full of sorrows and weaknesses.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:33Z'
    unchanged: false
    changes_summary: Replaced 'hurrying swiftly' with the more formal 'hastening quickly'; simplified 'cannot bear to carry' to 'cannot bear' for more natural English; revised 'promised to the righteous in their times' to 'promised for the righteous in their proper times' to better reflect the Latin; changed 'griefs' to 'sorrows' for more natural formal register.
translation:
  language: es
  text: porque el siglo se apresura rápidamente a pasar; pues no puede soportar las cosas que han sido prometidas para los justos en sus tiempos debidos, porque este siglo está lleno de tristezas y debilidades.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: saeculum
  english_pob_choice: the age
  chosen_spanish: el siglo
  alternatives_spanish:
  - la era
  - este mundo
  lexicon: saeculum
  rationale: «Siglo» conserva la idea de la presente época/orden temporal con un registro bíblico y suficientemente natural en español. «Era» sería posible, pero menos marcada; «mundo» desplaza el matiz temporal hacia el ámbito creado.
- source_word: festinans festinat
  english_pob_choice: is hastening quickly
  chosen_spanish: se apresura
  alternatives_spanish:
  - se apresura rápidamente
  - va de prisa
  lexicon: festino
  rationale: La duplicación latina intensifica la rapidez; en español, «se apresura» comunica bien el movimiento acelerado sin sonar mecánico. La idea de urgencia ya queda reforzada por el contexto de pasar.
- source_word: pertransire
  english_pob_choice: to pass away
  chosen_spanish: pasar
  alternatives_spanish:
  - desaparecer
  - pasar de largo
  lexicon: pertranseo
  rationale: «Pasar» es la forma más sobria y fiel para la caducidad del siglo. «Desaparecer» añade más interpretación; «pasar de largo» cambia el foco.
- source_word: Non enim capiet portare
  english_pob_choice: For it cannot bear
  chosen_spanish: pues no puede llevar
  alternatives_spanish:
  - pues no puede soportar
  - pues no puede contener
  lexicon: capio + porto
  rationale: El latín combina la capacidad de recibir/soportar con la de cargar. «No puede llevar» conserva la imagen de cargar con algo. «Soportar» es posible, pero pierde el matiz de carga; «contener» es demasiado abstracto.
- source_word: quae in temporibus iustis repromissa sunt
  english_pob_choice: the things that have been promised for the righteous in their proper times
  chosen_spanish: las cosas que han sido prometidas para los justos en sus tiempos debidos
  alternatives_spanish:
  - las cosas prometidas a los justos en sus tiempos señalados
  - lo que ha sido prometido a los justos en su tiempo debido
  lexicon: repromitto + iustus + tempora
  rationale: Se mantiene la relación entre las promesas y los justos, como refleja el inglés revisado «for the righteous». «En sus tiempos debidos» conserva el plural del latín «temporibus» y el matiz de ocasiones apropiadas.
- source_word: plenum mesticia est saeculum hoc
  english_pob_choice: this age is full of sorrows
  chosen_spanish: este siglo está lleno de tristezas
  alternatives_spanish:
  - este siglo está lleno de dolores
  - este siglo está lleno de aflicciones
  lexicon: plenus + mesticia
  rationale: «Mesticia» apunta a tristeza, aflicción o dolor. «Tristezas» sigue la opción del inglés POB «sorrows» con un registro claro y no excesivamente fuerte.
- source_word: infirmitatibus
  english_pob_choice: weaknesses
  chosen_spanish: debilidades
  alternatives_spanish:
  - enfermedades
  - fragilidades
  lexicon: infirmitas
  rationale: «Debilidades» es la correspondencia más directa y amplia para el latín, sin restringir injustificadamente el sentido a enfermedad física.
theological_decisions:
- issue: Caducidad del presente orden temporal
  english_pob_reading: the age is hastening quickly to pass away
  chosen_spanish_reading: el siglo se apresura a pasar
  alternative_spanish_readings:
  - este mundo se acerca rápidamente a su fin
  - la era está por pasar
  rationale: El texto describe la condición transitoria del orden presente; «siglo» mantiene ese valor escatológico sin introducir una paráfrasis más explicativa que el latín no exige.
  doctrine_reference: Escatología del presente siglo frente al orden venidero
- issue: Destino de las promesas para los justos
  english_pob_reading: the things that have been promised for the righteous in their proper times
  chosen_spanish_reading: las cosas que han sido prometidas para los justos en sus tiempos debidos
  alternative_spanish_readings:
  - las cosas prometidas a los justos en su tiempo señalado
  - lo prometido a los justos para sus tiempos
  rationale: 'Se conserva la tensión entre promesa y tiempo apropiado: no se especifica más de lo que el latín afirma. «Para los justos» reproduce el giro del inglés revisado y evita cargar el versículo con una formulación doctrinal extra.'
  doctrine_reference: Promesas divinas y su cumplimiento en el tiempo señalado
- issue: Enumeración de aflicciones del siglo
  english_pob_reading: full of sorrows and weaknesses
  chosen_spanish_reading: lleno de tristezas y debilidades
  alternative_spanish_readings:
  - lleno de dolores y debilidades
  - lleno de aflicciones y debilidades
  rationale: La doble acumulación del latín se conserva con dos sustantivos claros en español. «Tristezas» refleja el tono afectivo de mesticia; «debilidades» mantiene la amplitud de infirmitatibus sin forzar un sentido médico.
  doctrine_reference: Condición caída y limitada del presente siglo
translation_notes:
  revision_awareness: This draft follows the latest English revision pass, especially the shift to 'hastening quickly,' the simplification to 'cannot bear,' the rendering of repromissa as promises 'for the righteous in their proper times,' and the change from 'griefs' to 'sorrows.' The Spanish preserves these choices while remaining anchored in the Latin source.
  spanish_consistency_notes:
  - Se usa «siglo» para saeculum, coherente con una lectura temporal-escatológica.
  - Se conserva el plural «tiempos debidos» para reflejar temporibus iustis sin borrar la pluralidad del latín.
  - No se introduce «SEÑOR» ni terminología eclesiástica ajena al texto; el versículo no contiene nombres divinos explícitos.
  - «Debilidades» se mantiene amplio para no reducir infirmitatibus a enfermedad física.
