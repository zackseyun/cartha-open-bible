review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el latín y el rastro inglés POB en la estructura general: la caducidad del presente orden, la incapacidad de este siglo para sostener lo prometido, y la razón de ello en sus tristezas y debilidades. Sin embargo, dos elecciones debilitan la fidelidad fina: «se apresura a pasar» omite la intensificación de festinans festinat, y «no puede llevar» suena menos natural y menos preciso para Non enim capiet portare que «no puede soportar».'
  spanish_quality_summary: El texto es legible y digno, pero «el siglo» y «no puede llevar las cosas» juntos producen una frase algo rígida. Mantener «siglo» es defendible por el proyecto y por el valor temporal de saeculum, pero conviene pulir el verbo principal para un español más natural. Añadir el adverbio en la primera cláusula también mejora el ritmo y refleja mejor la duplicación latina.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. «Siglo» para saeculum es aceptable en este contexto. «Justos», «debilidades» y el resto del léxico están alineados. La principal corrección es estilístico-semántica: preferir «se apresura rápidamente» y «no puede soportar» para reflejar mejor el latín y el inglés auditado.'
  issues:
  - severity: medium
    issue: La intensificación de festinans festinat queda atenuada en «se apresura a pasar».
    rationale: El latín usa una duplicación enfática, y el inglés POB auditado la conserva con «is hastening quickly». En español conviene explicitar esa intensidad con «rápidamente» u otra forma equivalente.
  - severity: medium
    issue: «No puede llevar las cosas» es poco natural y transmite peor el sentido de soportar/cargar.
    rationale: Para Non enim capiet portare, el inglés revisado simplificó a «cannot bear». En español «soportar» comunica mejor la idea y evita una construcción torpe con «llevar las cosas».
  revised_spanish_text: porque el siglo se apresura rápidamente a pasar; pues no puede soportar las cosas que han sido prometidas para los justos en sus tiempos debidos, porque este siglo está lleno de tristezas y debilidades.
