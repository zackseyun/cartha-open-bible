  rationale: El latín usa dos verbos coordinados de respuesta y habla; en español la duplicación es natural y conserva el énfasis narrativo sin añadir contenido.
- source_word: si inueni gratiam ante oculos tuos
  english_pob_choice: If I have found favor before your eyes
  chosen_spanish: Si he hallado gracia delante de tus ojos
  alternatives_spanish:
  - Si he encontrado favor ante tus ojos
  - Si he hallado favor delante de tus ojos
  lexicon: gratia / favor
  rationale: Se mantiene 'gracia' por coherencia con el valor bíblico de gratiam y con el sentido relacional de aceptación; 'delante de tus ojos' preserva la imagen idiomática del latín.
- source_word: et si
  english_pob_choice: and if
  chosen_spanish: y si[a]
  alternatives_spanish:
  - e si
  - y si
  lexicon: et / si
  rationale: El fragmento latino termina con una conjunción incompleta; en español se conserva la apertura y la suspensión sintáctica sin completar el pensamiento.
