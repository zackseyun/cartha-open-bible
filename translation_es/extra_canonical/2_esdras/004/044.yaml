  - gracia ante tus ojos
  rationale: '''Gracia'' preserva la cercanía entre favor divino y gracia, pero no fuerza una lectura doctrinal cerrada; la imagen de los ojos de Dios se mantiene literal.'
  doctrine_reference: divine favor / grace terminology
