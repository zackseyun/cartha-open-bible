    changes_summary: Revised 'has utterly failed' to 'has gone far beyond' to reflect excedens excessit more accurately as exceeding/going beyond rather than failing. Kept the rest substantially the same for formal, natural English.
translation:
  language: es
  text: 'y me dijo[a]: «Tu corazón ha ido mucho más allá en esta era, ¿y piensas comprender el camino del Altísimo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tu corazón ha ido demasiado lejos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: excedens excessit
  english_pob_choice: Your heart has gone far beyond
  chosen_spanish: Tu corazón ha ido mucho más allá
  alternatives_spanish:
  - Tu corazón se ha extraviado demasiado
  - Tu corazón ha ido demasiado lejos
  lexicon: corazón
  rationale: La construcción latina intensifica la idea de exceder; en español, "ha ido mucho más allá" conserva el valor de rebasar/ir más allá sin convertirlo en simple reproche moral. Mantiene la intensidad del doblete verbal de forma natural.
- source_word: cor tuum
  english_pob_choice: Your heart
  chosen_spanish: Tu corazón
  alternatives_spanish:
  - Tu mente
  - Tu pensamiento
  lexicon: corazón
  rationale: En el trasfondo semítico, "corazón" puede incluir mente, juicio y entendimiento. Se conserva "corazón" para reflejar esa amplitud y el paralelo con la pregunta sobre comprender.
- source_word: in saeculo hoc
  english_pob_choice: in this age
  chosen_spanish: en este siglo
  alternatives_spanish:
  - en esta edad
  - en este tiempo
  lexicon: saeculum
  rationale: '"Saeculum" admite "siglo", "edad" o "tiempo"; "siglo" es la opción más transparente y tradicional en español bíblico para designar la época presente, sin perder el contraste con la realidad divina.'
- source_word: comprehendere cogitas
  english_pob_choice: do you think to comprehend
  chosen_spanish: ¿piensas comprender?
  alternatives_spanish:
  - ¿te propones comprender?
  - ¿crees poder comprender?
  lexicon: comprehendere
  rationale: '"Cogitas" expresa intención o pretensión de la mente. "Piensas comprender" reproduce la pregunta retórica sin añadir fuerza no sustentada por el latín.'
- source_word: uiam altissimi
  english_pob_choice: the way of the Most High
  chosen_spanish: el camino del Altísimo
  alternatives_spanish:
  - la senda del Altísimo
  - el camino del Dios Altísimo
  lexicon: Altissimus
  rationale: '"Altísimo" es la forma española estable para el título divino. "Camino" mantiene la metáfora sin reinterpretarla; "senda" sería posible, pero "camino" es más directo y común.'
theological_decisions:
- issue: Capacidad humana para comprender la vía de Dios
  english_pob_reading: Your heart has gone far beyond in this age, and do you think to comprehend the way of the Most High?
  chosen_spanish_reading: Tu corazón ha ido mucho más allá en este siglo, ¿y piensas comprender el camino del Altísimo?
  alternative_spanish_readings:
  - Tu corazón está totalmente desconcertado en este siglo, ¿y piensas comprender el camino del Altísimo?
  - Tu corazón ha ido demasiado lejos en este siglo, ¿y piensas comprender el camino del Altísimo?
  rationale: 'El sentido auditado para la primera cláusula no es que Ezra haya pecado por excederse, sino que su corazón/mente ha rebasado el límite de comprensión en la presente era. El español conserva esa tensión: puede leerse como exceso de alcance mental y como incapacidad para abarcar lo divino, sin resolverla en una sola paráfrasis.'
  doctrine_reference: Limitación de la sabiduría humana ante la trascendencia divina; cf. Job 11:7-9, Isaías 55:8-9.
translation_notes:
  revision_awareness: La revisión más reciente corrigió una lectura previa de 'has utterly failed' a 'has gone far beyond' para reflejar mejor el intensivo de excedens excessit. La versión española sigue esa decisión y evita traducirlo como fracaso total; mantiene el matiz de exceder/rebasar, con resonancia de desconcierto mental.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para uiam altissimi, conforme al uso bíblico español.
  - Se conserva «corazón» para el centro de la comprensión, en línea con el trasfondo semítico del texto.
  - «Siglo» traduce saeculo hoc y resalta la oposición entre la época presente y la realidad divina.
