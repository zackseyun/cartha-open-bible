revisions:
- from: 'Si es posible[a], y si soy apto, muéstrame también esto: si aún ha de venir más de lo que ha pasado, o si más ha pasado.'
  to: 'Si es posible[a], y si soy apto, muéstrame también esto: si ha de venir más de lo que ha pasado, o si más ha pasado.'
  rationale: Se elimina «aún» por ser una adición no exigida por la fuente. Se conserva un texto principal español natural y cercano al inglés POB final, pero la nota se corrige para reflejar la alternativa previa documentada en el rastro de auditoría, no una pseudo-variante literal distinta. Aunque «pertransierunt super» tiene un matiz de ‘pasar sobre’, en este caso puede quedar implícito en el texto principal español sin añadir una construcción torpe; el resumen y los issues lo dejan señalado para trazabilidad.
