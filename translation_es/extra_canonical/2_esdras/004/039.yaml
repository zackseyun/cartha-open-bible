base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/004/039.yaml
  text: We are all full of impiety. And perhaps because of us the threshing floor of the righteous is kept back[a], because of the sins of those who dwell there.
  footnotes:
  - marker: a
    text: Or 'is delayed'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:03Z'
    unchanged: false
    changes_summary: Restored the omitted first clause ('We are all full of impiety') and rendered 'inhabitantium' more literally as 'those who dwell there' rather than adding 'on the earth,' which is not in the Latin.
translation:
  language: es
  text: Todos nosotros estamos llenos de impiedad. Y quizá por causa de nosotros la era de los justos es retenida[a], por los pecados de los que habitan allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se retrasa».
    reason: preservar la alternativa del audit trail inglés para prohibeatur
lexical_decisions:
- source_word: nos omnes
  english_pob_choice: We are all
  chosen_spanish: Todos nosotros estamos
  alternatives_spanish:
  - Estamos todos
  - Nosotros todos estamos
  lexicon: Latin nos omnes
  rationale: Conserva el valor inclusivo y totalizador de nos omnes con un orden natural en español. 'Todos nosotros' mantiene la enfática totalidad sin sonar artificial.
- source_word: pleni sumus impietatem
  english_pob_choice: We are all full of impiety
  chosen_spanish: estamos llenos de impiedad
  alternatives_spanish:
  - estamos colmados de impiedad
  - estamos llenos de maldad
  lexicon: Latin pleni sumus + impietatem
  rationale: '''Impiedad'' reproduce mejor el matiz religioso/moral de impietatem que ''maldad''. ''Llenos de'' sigue la metáfora de plenitud del latín y la lectura inglesa auditada.'
- source_word: prohibeatur
  english_pob_choice: is kept back
  chosen_spanish: es retenida
  alternatives_spanish:
  - es impedida
  - es detenida
  - es retenida/impedida
  lexicon: Latin prohibeatur
  rationale: '''Retenida'' conserva la idea de impedimento o sujeción y puede aplicarse a la imagen agrícola del área de trilla sin reducirla solo a un retraso temporal. Evita ''retrasada'', que estrecharía el sentido frente al valor de ''withheld/prevented'' documentado en el audit trail.'
- source_word: iustorum area
  english_pob_choice: the threshing floor of the righteous
  chosen_spanish: el área de los justos
  alternatives_spanish:
  - la era de los justos
  - la era de trilla de los justos
  - el lugar de trilla de los justos
  lexicon: Latin area
  rationale: '''Área'' puede sonar extraño, pero refleja el término latino heredado en la fuente y evita introducir sin necesidad una especificación interpretativa. Se preserva así la tensión entre el valor literal de area y la imagen agrícola sin forzar una glosa más desarrollada que el texto fuente no explicita.'
- source_word: inhabitantium
  english_pob_choice: those who dwell there
  chosen_spanish: de los que habitan allí
  alternatives_spanish:
  - de los moradores de allí
  - de los habitantes de ese lugar
  lexicon: Latin inhabitantium
  rationale: '''Habitan allí'' sigue de cerca el genitivo participial latino y mantiene la referencia espacial genérica del inglés auditado, sin añadir ''sobre la tierra'' u otro complemento no presente en el latín.'
theological_decisions:
- issue: Alcance moral de impietatem
  english_pob_reading: impiety
  chosen_spanish_reading: impiedad
  alternative_spanish_readings:
  - maldad
  - irreverencia
  rationale: La línea expresa una condición de irreligiosidad o falta de piedad ante Dios, no solo malicia ética general. 'Impiedad' preserva esa carga teológica y el juicio del hablante sobre la culpa compartida.
  doctrine_reference: Piedad / impiedad en lenguaje bíblico de culpa ante Dios
- issue: Imagen agrícola de area
  english_pob_reading: the threshing floor
  chosen_spanish_reading: el área
  alternative_spanish_readings:
  - la era
  - la era de trilla
  rationale: El texto latino usa area, y el audit trail inglés mantiene la imagen de la era de trilla sin corregirla a un término interpretativo. En español, 'área' conserva la literalidad documental, aunque suene menos idiomática, para no borrar la tensión lexical del testimonio latino.
  doctrine_reference: Principios de transparencia textual y conservación de metáforas heredadas
translation_notes:
  revision_awareness: El testimonio inglés revisado restauró la cláusula inicial omitida ('We are all full of impiety') y precisó que inhabitantium debe leerse literalmente como 'those who dwell there', sin añadir 'on the earth'. También corrigió la traducción de prohibeatur desde 'is delayed' a 'is kept back', matiz que aquí se refleja con 'es retenida'.
  spanish_consistency_notes:
  - Se mantuvo 'impiedad' para impietatem, en coherencia con el valor religioso del latín.
  - Se evitó sustituir area por 'era' en el texto principal para no borrar la literalidad del testimonio fuente, pero se documenta la alternativa más idiomática en la decisión lexical.
  - No se añadió 'en la tierra' ni otro complemento espacial, siguiendo la revisión auditada del inglés.
  - El marcador [a] está anclado únicamente al matiz verbal de prohibeatur, no a toda la cláusula.
