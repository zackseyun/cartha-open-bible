  text: Entonces el ángel que me había sido enviado, cuyo nombre era Uriel, me respondió,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: angelus
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: ángel
  rationale: El latín angelus coincide con el campo semántico de ‘ángel’; en español bíblico, ‘ángel’ es la forma natural y fiel. ‘Mensajero’ sería posible en sentido etimológico, pero atenúa la referencia angelológica explícita del contexto.
- source_word: qui missus est ad me
  english_pob_choice: who had been sent to me
  chosen_spanish: que había sido enviado a mí
  alternatives_spanish:
  - que me había sido enviado
  - que fue enviado a mí
  lexicon: enviar
  rationale: El pluscuamperfecto en español refleja bien el estado anterior al acto de responder. ‘A mí’ conserva la dirección personal del envío; ‘me había sido enviado’ también es válido, pero ‘había sido enviado a mí’ mantiene mejor la voz pasiva del latín.
- source_word: cui nomen Vriel
  english_pob_choice: whose name was Uriel
  chosen_spanish: cuyo nombre era Uriel
  alternatives_spanish:
  - el cual se llamaba Uriel
  - llamado Uriel
  lexicon: nombre
  rationale: ‘Cuyo nombre era’ reproduce de cerca el genitivo latino y su tono narrativo. Mantiene la identificación sin añadir matices no presentes en la fuente.
theological_decisions:
- issue: Identificación del ser como ángel enviado
  english_pob_reading: Then the angel who had been sent to me, whose name was Uriel, answered me,
  chosen_spanish_reading: Entonces el ángel que había sido enviado a mí, cuyo nombre era Uriel, me respondió,
  alternative_spanish_readings:
  - Entonces el mensajero que había sido enviado a mí, cuyo nombre era Uriel, me respondió,
  rationale: La fuente latina usa angelus, por lo que no hay base para suavizarlo como ‘mensajero’ en el texto principal. La identificación como ángel debe preservarse sin introducir una ambigüedad que el latín no exige.
  doctrine_reference: angélica / narración apocalíptica
translation_notes:
  revision_awareness: Se siguió de cerca el latín limpio de Bensly 1895 y el fragmento faltante de 1875, coincidiendo con la traducción inglesa auditada. No se observan revisiones aplicadas; la redacción española mantiene esa lectura sin añadir variantes textuales.
  spanish_consistency_notes:
  - Se usa ‘ángel’ de forma consistente con el latín angelus y con la traducción inglesa auditada.
  - Se conservó el nombre propio ‘Uriel’ sin adaptación.
  - El orden sintáctico español se ajustó para fluidez natural, pero sin alterar la relación de participio previo y verbo principal.
