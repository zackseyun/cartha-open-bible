  lexicon: dominator = gobernar/mandar; domine = vocativo de dominio/divinidad
  rationale: El latín conservado combina una idea de señorío con la función de gobernar. «Que gobiernas» comunica ese matiz relacional y verbal sin forzar un título más litúrgico que el texto fragmentario no exige. Se mantiene «Señor» como vocativo reverente, con un registro natural en español.
- source_word: Et respondi et dixi
  english_pob_choice: And I answered and said
  chosen_spanish: Y respondí y dije
  alternatives_spanish:
  - Y respondí, diciendo
  - Respondí y dije
  lexicon: respondere + dicere = fórmula narrativa de respuesta oral
  rationale: Se conserva la repetición narrativa del original, que marca de forma solemne la intervención del hablante. El español admite esta duplicación sin sonar artificial en un contexto bíblico.
theological_decisions:
- issue: Fragmento incompleto y final suspensivo
  english_pob_reading: Kept the sentence incomplete because the source fragment is incomplete.
  chosen_spanish_reading: 'Se deja la frase abierta: «pero también…»'
  alternative_spanish_readings:
