  rationale: El fragmento latino termina en «sed et», por lo que no hay base para completar el pensamiento. La puntuación suspensiva comunica fielmente la incompletitud textual y evita añadir contenido no atestiguado.
  doctrine_reference: Principio de suficiencia textual y fidelidad al testimonio manuscrito; no se completa lo que el testigo no preserva.
translation_notes:
