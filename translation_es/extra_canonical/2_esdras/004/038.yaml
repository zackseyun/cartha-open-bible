  spanish_consistency_notes:
  - Se usa «Señor» para el vocativo dominical del latín, no como sustituto del Tetragrámaton, ya que aquí no aparece יהוה/YHWH en la fuente.
  - Se conserva el tono fragmentario con puntos suspensivos para reflejar la ruptura del testimonio latino.
  - No se añaden notas al pie porque el único punto relevante es la incompletitud, ya explicitada en la puntuación y en la decisión teológica.
