source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'transisset flamma et uidi et ecce superauit fumus. Et post hoc transiit coram me nubs plena aquae et inmisit pluuiam impetu multam, et cum transisset impetus pluuiae superauerunt in ea guttae. Et dixit ad me ; cogita tibi ; sicut enim crescit pluuia amplius quam guttae et ignis amplius quam fumus, sic superhabundauit quae transiuit mensura, superauerunt autem guttae et fumus. Et oraui et dixi : putas uiuo usque in diebus illis ? uel quis erit in diebus illis ? Respondit ad me et dixit : de signis de quibus me interrogas, ex parte possum tibi dicere, de uita autem tua non sum missus dicere tibi, sed nescio.'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/004/049.yaml
  text: and behold[a], smoke remained behind. After this a cloud full of water passed before me and sent forth a great driving rain, and when the force of the rain had passed, drops remained behind in it.
  footnotes:
  - marker: a
    text: Or 'drops remained behind.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:34Z'
    unchanged: false
    changes_summary: Revised 'poured out a violent rainstorm' to 'sent forth a great driving rain' for closer lexical alignment with inmisit pluuiam impetu multam while keeping formal, natural English.
translation:
  language: es
  text: y he aquí, el humo quedó atrás. Después de esto pasó delante de mí una nube llena de agua y soltó una gran lluvia impetuosa, y cuando pasó la fuerza de la lluvia, en ella[a] quedaron gotas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quedaron gotas en ella».'
    reason: alternative_word_order
lexical_decisions:
- source_word: transisset flamma et uidi et ecce superauit fumus
  english_pob_choice: and behold, smoke remained behind
  chosen_spanish: y he aquí, el humo quedó
  alternatives_spanish:
  - y he aquí, el humo permaneció
  - y he aquí, quedó atrás el humo
  lexicon: fumus → humo; superare in this context → quedar/ permanecer
  rationale: La imagen es de algo que queda después de pasar el fuego; en español 'quedó' comunica el resultado sin añadir matiz ajeno. 'Permaneció' también es posible, pero 'quedó' es más directo y natural aquí.
- source_word: nubs plena aquae
  english_pob_choice: a cloud full of water
  chosen_spanish: una nube llena de agua
  alternatives_spanish:
  - una nube colmada de agua
  - una nube cargada de agua
  lexicon: nubs/nubes → nube; plena aquae → llena de agua
  rationale: Se mantiene la imagen concreta de una nube físicamente llena de agua. 'Llena de agua' es claro y fiel; las alternativas son válidas pero algo más interpretativas.
- source_word: inmisit pluuiam impetu multam
  english_pob_choice: sent forth a great driving rain
  chosen_spanish: soltó una gran lluvia impetuosa
  alternatives_spanish:
  - envió una gran lluvia impetuosa
  - desató una gran lluvia con fuerza
  lexicon: inmittere → soltar/mandar; pluvia impetu multa → gran lluvia impetuosa
  rationale: '''Soltó'' reproduce bien la idea de dejar caer o lanzar lluvia desde la nube. ''Impetu'' conserva la fuerza y violencia del término latino con ''impetuosa''.'
- source_word: superauerunt in ea guttae
  english_pob_choice: drops remained behind in it
  chosen_spanish: en ella quedaron gotas
  alternatives_spanish:
  - quedaron gotas en ella
  - en ella permanecieron gotas
  lexicon: superare → quedar, permanecer; in ea → en ella; guttae → gotas
  rationale: Se preserva el detalle revisado de que las gotas quedaron 'en ella', es decir, en la nube. El español mantiene la relación pronominal sin perder claridad.
theological_decisions:
- issue: La relación entre la nube y las gotas que quedan en ella
  english_pob_reading: drops remained behind in it
  chosen_spanish_reading: en ella quedaron gotas
  alternative_spanish_readings:
  - quedaron gotas
  - quedaron gotas en la nube
  rationale: Se conserva el referente explícito de 'in ea', importante para no diluir la imagen. No se espiritualiza ni se generaliza la escena, pues el texto presenta una comparación visionaria concreta.
  doctrine_reference: Imagen visionaria / literalidad descriptiva del pasaje apocalíptico
- issue: Mantenimiento del lenguaje de intensidad en la lluvia
  english_pob_reading: a great driving rain
  chosen_spanish_reading: una gran lluvia impetuosa
  alternative_spanish_readings:
  - una fuerte lluvia
  - una lluvia torrencial
  rationale: '''Impetu'' se traduce con un término que preserve la fuerza y el ímpetu de la lluvia sin convertirlo en un tecnicismo moderno que borre la imagen literaria.'
  doctrine_reference: Estilo profético-apocalíptico; preservación de la imaginería original
translation_notes:
  revision_awareness: 'Se incorporó la corrección auditada del inglés POB: ''drops remained behind in it'', preservando el complemento ''en ella'' que corresponde a ''in ea'' del latín. También se alineó ''inmisit pluuiam impetu multam'' con una formulación que conserve la fuerza de ''great driving rain''.'
  spanish_consistency_notes:
  - Se usa 'humo' y 'nube' de manera consistente como imágenes físicas, sin introducir lectura alegórica no sustentada.
  - Se prefirió 'Yahvé' no aplica aquí; no hay nombres divinos en el segmento.
  - Se evitó 'SEÑOR' u otra terminología eclesiástica ajena al texto.
  - La puntuación reproduce una cadencia narrativa clara y publicable en español moderno.
