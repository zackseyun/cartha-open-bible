translation:
  language: es
  text: 'Y oré y dije: «¿Piensas que viviré hasta aquellos días, o quién estará en aquellos días?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et oravi et dixi
  english_pob_choice: And I prayed and said
  chosen_spanish: Y oré y dije
  alternatives_spanish:
  - Y oré y le dije
  - Y oré, y dije
  lexicon: orare -> orar; dicere -> decir
  rationale: La construcción latina expresa dos acciones encadenadas; en español, «oré y dije» reproduce con naturalidad la secuencia sin añadir contenido no presente. Se evita explicitar destinatario porque el texto fuente no lo hace.
- source_word: putas vivo usque in diebus illis
  english_pob_choice: Do you think I shall live until those days?
  chosen_spanish: ¿Piensas que viviré hasta aquellos días?
  alternatives_spanish:
  - ¿Piensas que viviré hasta esos días?
  - ¿Crees que viviré hasta aquellos días?
  lexicon: putas -> piensas/crees; vivo -> viviré; usque in diebus illis -> hasta aquellos días
  rationale: El latín usa una pregunta directa con valor de conjetura. «Piensas» mantiene bien la fuerza interrogativa y el matiz de suposición del inglés POB. «Aquellos días» conserva la deíxis lejana del original y el tono escatológico.
- source_word: vel quis erit in diebus illis
  english_pob_choice: Or who will be in those days?
  chosen_spanish: o quién estará en aquellos días
  alternatives_spanish:
  - o quién vivirá en aquellos días
  - o quién habrá en aquellos días
  lexicon: quis erit -> quién estará / quién será; in diebus illis -> en aquellos días
  rationale: «Estará» funciona de modo idiomático en español para presencia/existencia en un tiempo futuro, y evita una traducción demasiado literal de «será» que sonaría menos natural. Se conserva la alternativa inclusiva del inglés («or who will be») sin añadir interpretaciones.
theological_decisions:
- issue: Referencia temporal a los días futuros anunciados
  english_pob_reading: those days
  chosen_spanish_reading: aquellos días
  alternative_spanish_readings:
  - esos días
  - tales días
  rationale: No hay doctrina específica en el versículo, pero la frase remite a un tiempo futuro determinado y relativamente distante. «Aquellos días» preserva esa distancia temporal sin cargarla con un tono confesional posterior.
  doctrine_reference: Eschatological reference in 2 Esdras 4:51
translation_notes:
  revision_awareness: La revisión más reciente indica alta concordancia y ningún cambio necesario; por eso la redacción española sigue de cerca la lectura estable del inglés POB, ajustada solo por naturalidad sintáctica en español y por la evidencia latina directa.
  spanish_consistency_notes:
  - Se mantiene «oré y dije» como secuencia narrativa simple, sin introducir «le dije» o un destinatario implícito.
  - Se usa «aquellos días» de manera consistente para reflejar la distancia temporal del latín y del inglés POB.
  - No se emplea terminología eclesiástica añadida ni vocabulario doctrinal externo al versículo.
