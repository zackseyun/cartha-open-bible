    issue: 'Expresión poco natural: ''caí sobre mi rostro'''
    rationale: Aunque calca el inglés/latín, en español bíblico moderno suena más natural 'caí rostro en tierra' o 'caí sobre mi rostro en tierra'. Esto mejora legibilidad sin alterar el significado.
  - severity: low
    issue: La nota [a] está formulada como si preservara una lectura textual alternativa
    rationale: La evidencia inglesa indica que se trata de un rendering previo por omisión de la cláusula final, no de una variante del testimonio latino. Debe describirse como traducción previa/alternativa de segmentación, no como variante textual.
