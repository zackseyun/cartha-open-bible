translation:
  language: es
  text: '«¿Cómo puede tu vaso captar el camino del Altísimo[a], y, ya consumido por la era corrupta, entender la incorruptibilidad?». Y cuando oí estas cosas, caí rostro en tierra, y le dije: «Mejor hubiera sido que no existiéramos»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O la traducción previa: «¿Cómo puede tu vaso captar el camino del Altísimo, y, ya consumido por la era corrupta, entender la incorruptibilidad?».'
    reason: previous_rendering
lexical_decisions:
- source_word: uas tuum
  english_pob_choice: your vessel
  chosen_spanish: tu vaso
  alternatives_spanish:
  - tu vasija
  - tu recipiente
  lexicon: vaso
  rationale: El latín uas/vasa apunta a un recipiente o vasija; en este contexto figurado, 'vaso' conserva la imagen de un contenedor frágil y es idiomático en español bíblico sin perder la fuerza metafórica. 'Vasija' y 'recipiente' son posibles, pero 'vaso' mantiene mejor la brevedad y la metáfora del texto.
- source_word: capere
  english_pob_choice: grasp
  chosen_spanish: capta
  alternatives_spanish:
  - comprenda
  - abarque
  - asir
  lexicon: capere
  rationale: El verbo latino sugiere capacidad de contener o abarcar intelectualmente. 'Captar' en español refleja esa aprehensión mental de forma natural y no fuerza una imagen física demasiado rígida.
- source_word: altissimi uiam
  english_pob_choice: the way of the Most High
  chosen_spanish: el camino del Altísimo
  alternatives_spanish:
  - la senda del Altísimo
  - la vía del Altísimo
  lexicon: Altissimus / via
  rationale: '''Camino'' conserva la metáfora establecida por el latín via y es plenamente comprensible. ''Altísimo'' reproduce el título divino sin necesidad de sustituirlo por una perífrasis.'
- source_word: corrupto saeculo
  english_pob_choice: the corrupt age
  chosen_spanish: la era corrupta
  alternatives_spanish:
  - el siglo corrupto
  - la edad corrupta
  lexicon: saeculum
  rationale: '''Saeculum'' puede ser ''siglo'', ''edad'' o ''era'' según contexto. ''Era corrupta'' comunica el valor temporal y cualitativo sin sonar arcaico ni introducir una cronología estrecha.'
- source_word: intelligere incorruptionem
  english_pob_choice: understand incorruption
  chosen_spanish: entender la incorruptibilidad
  alternatives_spanish:
  - comprender la incorruptibilidad
  - entender lo incorruptible
  lexicon: incorruptio
  rationale: El sustantivo latino abstracto se rinde mejor por 'incorruptibilidad', que preserva el contraste semántico con la corrupción del siglo/era. 'Lo incorruptible' sería posible, pero perdería la forma abstracta del original.
- source_word: Et dixi illi
  english_pob_choice: And I said to him
  chosen_spanish: y le dije
  alternatives_spanish:
  - y le respondí
  - y le hablé
  lexicon: dico + dativo
  rationale: La construcción latina con dativo se refleja de manera directa y natural con 'le dije'.
- source_word: melius erat nos non adesse
  english_pob_choice: It would have been better for us not to exist
  chosen_spanish: Mejor hubiera sido que no existiéramos
  alternatives_spanish:
  - Hubiera sido mejor que no existiéramos
  - Mejor era no haber existido
  lexicon: melius + adesse
  rationale: La frase expresa una valoración hipotética/existencial; 'Mejor hubiera sido que no existiéramos' conserva el sentido condicional y la referencia colectiva del plural 'nos' con buena fluidez en español.
theological_decisions:
- issue: El título divino 'Altissimus' en una pregunta sobre el acceso humano al camino de Dios
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Dios Altísimo
  - el Supremo
  rationale: Se mantiene el título reverente y tradicionalmente bíblico 'Altísimo' porque reproduce el latín y conserva la referencia personal a Dios sin sustituirla por una abstracción.
  doctrine_reference: Teología bíblica del conocimiento humano limitado ante Dios trascendente
- issue: '''incorruptionem'' como contraste con un mundo corrupto'
  english_pob_reading: incorruption
  chosen_spanish_reading: la incorruptibilidad
  alternative_spanish_readings:
  - lo incorruptible
  - incorrupción
  rationale: '''Incorruptibilidad'' preserva el contraste moral/ontológico con ''era corrupta'' y deja claro que se trata de una cualidad o estado, no solo de un objeto incorruptible.'
  doctrine_reference: Contraste corrupción/incorrupción en literatura apocalíptica
- issue: La clausula final 'melius erat nos non adesse' pertenece a este versículo
  english_pob_reading: It would have been better for us not to exist
  chosen_spanish_reading: Mejor hubiera sido que no existiéramos
  alternative_spanish_readings:
  - Hubiera sido mejor que no existiéramos
  - Mejor era no haber existido
  rationale: La revisión textual muestra que esta cláusula está en el verso 11 y no debe omitirse. El español elegido refleja el juicio existencial sin suavizar la fuerza de la lamentación.
  doctrine_reference: Revisión de secuencia textual y fidelidad al testimonio latino
translation_notes:
  revision_awareness: 'El texto inglés auditado había omitido la cláusula final de la oración latina (''Et dixi illi: melius erat nos non adesse''), probablemente por desplazamiento al versículo siguiente. La redacción española la incluye aquí, conforme al texto fuente asignado. También se respetó la nota de variante del inglés, aunque en español se la formula como alternativa de puntuación/segmentación para no perder la ambigüedad heredada del aparato.'
  spanish_consistency_notes:
  - Se mantuvo 'Altísimo' para YHWH/divinidad sin reemplazarlo por 'Señor'.
  - Se eligió 'incorruptibilidad' para conservar el paralelo con 'corrupta'.
  - '''Vaso'' se emplea como metáfora antropológica y no como objeto litúrgico.'
  - La puntuación refleja la pregunta retórica seguida del lamento final, con cierre de cita según uso español.
