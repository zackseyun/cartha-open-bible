translation:
  language: es
  text: 'Y me dijo: «Párate del lado derecho, y»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: sta
  english_pob_choice: Stand
  chosen_spanish: Ponte
  alternatives_spanish:
  - Párate
  - Quédate de pie
  - Permanece
  lexicon: Latin sta
  rationale: El imperativo latino pide una acción de colocarse o permanecer erguido; en español, «ponte» comunica de forma natural la instrucción de situarse en un lugar específico sin añadir contenido ajeno. «Párate» y «quédate de pie» son posibles, pero suenan más marcados o menos fluidos en este contexto.
- source_word: dexteram partem
  english_pob_choice: the right side
  chosen_spanish: a la derecha
  alternatives_spanish:
  - del lado derecho
  - en la parte derecha
  - a mano derecha
  lexicon: Latin dexteram partem
  rationale: La frase latina indica ubicación espacial. «A la derecha» es breve, idiomático y fiel, sin intensificar hacia un sentido direccional más interpretativo que el texto no exige.
theological_decisions:
- issue: Fragmento incompleto con suspensión final
  english_pob_reading: And he said to me, “Stand on the right side, and”
  chosen_spanish_reading: 'Y me dijo: «Ponte a la derecha, y»'
  alternative_spanish_readings:
  - 'Y me dijo: «Párate a la derecha, y»'
  - 'Y me dijo: «Permanece a la derecha, y»'
  rationale: El texto fuente termina abruptamente en una conjunción coordinante, y la traducción debe conservar esa incompletitud sin cerrar el sentido ni añadir una continuación inexistente. La puntuación con comillas abiertas y cierre después de la conjunción mantiene la suspensión del fragmento.
  doctrine_reference: Ninguna; se trata de una decisión textual y estilística, no doctrinal.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente: se eliminó todo material que no está presente en el latín provisto, conservando solo la orden y la suspensión final del fragmento.'
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para reflejar la continuidad narrativa del latín Et.
  - No se introduce «interpretación» ni «comparación», porque fueron removidas en la revisión y no aparecen en el fragmento latino suministrado.
  - El registro es sobrio y bíblico, pero evita fórmulas arcaizantes innecesarias.
