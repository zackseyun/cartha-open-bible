  text: Considera ahora por ti mismo cuánto fruto de impiedad ha producido una semilla. Cuando
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: semenis
  english_pob_choice: seed
  chosen_spanish: semilla
  alternatives_spanish:
  - simiente
  - semilla de grano
  lexicon: Latin seminis
  rationale: El latín solo dice 'semenis' = 'seed/semilla'; no hay adjetivo explícito como 'evil'. 'Semilla' es la opción natural y fiel en español.
- source_word: fructum
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruto
  - resultado
  lexicon: Latin fructum
  rationale: '''Fructum'' se vierte con ''fruto'' para conservar la metáfora agrícola del original y del inglés POB.'
- source_word: impietatis
  english_pob_choice: ungodliness
  chosen_spanish: impiedad
  alternatives_spanish:
  - impiedad
  - maldad
  - irreligión
  lexicon: Latin impietas
  rationale: '''Impietas'' corresponde a ''impiedad''; mantiene el valor moral y religioso sin suavizarlo a un término más genérico.'
- source_word: generauerit
  english_pob_choice: has produced
  chosen_spanish: ha producido
  alternatives_spanish:
  - ha generado
  - ha dado
  lexicon: Latin genero
  rationale: El perfecto latino se refleja bien con 'ha producido', que conserva el sentido de resultado alcanzado.
- source_word: Quando
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Cuando
  lexicon: Latin quando
  rationale: Se conserva como comienzo de la cláusula siguiente, tal como indica el audit trail inglés.
theological_decisions:
- issue: Título moral de la semilla y del fruto
  english_pob_reading: a seed has produced fruit of ungodliness
  chosen_spanish_reading: una semilla ha producido fruto de impiedad
  alternative_spanish_readings:
  - una semilla mala ha producido fruto de impiedad
  - una semilla de maldad ha producido fruto de impiedad
  rationale: El texto latino no añade 'mala' ni 'de maldad'; por fidelidad al testimonio fuente, se mantiene la relación semilla-fruto sin ampliar el calificativo.
  doctrine_reference: Fidelidad textual y no-expansión semántica
translation_notes:
  revision_awareness: Se corrigió el problema anterior evitando notas al pie sin anclaje. La frase final 'Quando' se dejó como 'Cuando' al final de esta unidad, siguiendo el límite del fragmento en la fuente y el audit trail inglés.
  spanish_consistency_notes:
  - Se usa 'impiedad' para impietas, en línea con el inglés POB 'ungodliness'.
  - Se mantiene el orden y la imagen agrícola del latín sin introducir adjetivos no atestiguados.
  - '''Cuando'' queda al final porque el fragmento fuente termina con esa palabra, señalando continuidad hacia la cláusula siguiente.'
