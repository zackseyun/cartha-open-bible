translation:
  language: es
  text: Se asemejan al vientre de las almas. Porque así como la que da a luz se apresura a escapar de la angustia[a] del parto, así también estas
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la necesidad del parto».
    reason: alternative_reading
lexical_decisions:
- source_word: animarum matrici
  english_pob_choice: the womb of souls
  chosen_spanish: el vientre de las almas
  alternatives_spanish:
  - el seno de las almas
  - el útero de las almas
  lexicon: matrix -> vientre/útero; animarum -> de las almas
  rationale: La imagen latina compara algo con el lugar materno que recibe vida; en español, «vientre» comunica mejor la metáfora y su registro bíblico sin sonar técnico. «Útero» es más anatómico; «seno» es posible pero menos preciso aquí.
- source_word: assimilata sunt
  english_pob_choice: They are likened
  chosen_spanish: Se asemejan
  alternatives_spanish:
  - Son comparados
  - Se parecen
  lexicon: assimilari -> asemejar(se), comparar
  rationale: «Se asemejan» expresa una comparación pasiva y natural en español, conservando el valor relacional de la forma latina sin volverla demasiado literal.
- source_word: quae parit
  english_pob_choice: she who gives birth
  chosen_spanish: la que da a luz
  alternatives_spanish:
  - la parturienta
  - la que pare
  lexicon: parere -> dar a luz, parir
  rationale: «La que da a luz» es claro, digno y no arcaizante. «Parir» sería más directo pero más abrupto; «parturienta» es correcto, aunque más técnico.
- source_word: effugere necessitatem partus
  english_pob_choice: escape the necessity of childbirth
  chosen_spanish: escapar de la angustia del parto
  alternatives_spanish:
  - escapar de la necesidad del parto
  - liberarse del dolor del parto
  lexicon: necessitas -> angustia/distress; partus -> parto
  rationale: La revisión auditada del inglés destaca que necessitas aquí no es «necesidad» lógica sino aflicción/distress. En español, «angustia del parto» transmite mejor esa carga experiencial y evita una formulación extraña.
theological_decisions:
- issue: La imagen de «vientre de las almas» y su alcance antropológico/metafórico
  english_pob_reading: They are likened to the womb of souls.
  chosen_spanish_reading: Se asemejan al vientre de las almas.
  alternative_spanish_readings:
  - Son comparados con el vientre de las almas
  - Se parecen al útero de las almas
  rationale: No se suaviza la metáfora. Se mantiene la imagen fuerte de un ámbito materno asociado con las almas, porque el texto latino la presenta de forma directa y no desarrolla una explicación doctrinal adicional.
  doctrine_reference: Metáfora antropológica en 4 Esdras; sin definición dogmática explícita en el versículo.
- issue: Sentido de necessitas partus como aflicción del parto y no como obligación abstracta
  english_pob_reading: the necessity of childbirth
  chosen_spanish_reading: la angustia del parto
  alternative_spanish_readings:
  - la necesidad del parto
  - la obligación del parto
  rationale: La revisión del inglés y el latín favorecen un sentido de presión, dureza o aflicción. «Angustia» conserva el peso afectivo y evita que el lector entienda una necesidad lógica o normativa.
  doctrine_reference: Lectura semántica del latín necessitas/greek ἀνάγκη en contexto de sufrimiento.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde «the anguish of childbirth» a una forma más literal cercana al latín («the necessity of childbirth»), pero el propio análisis de revisión reconoce que necessitas aquí puede cargar el sentido de angustia/distress. La versión española opta por reflejar esa tensión semántica con una lectura natural y contextual, sin borrar la conexión con el latín.
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y bíblico propio de POB, sin depender de la formulación tradicional de Reina-Valera.
  - Se preserva la metáfora corporal («vientre») porque el latín no la expande ni la interpreta.
  - La frase final queda abierta porque el fragmento latino se corta en «sic et haec»; no se añade material inexistente.
