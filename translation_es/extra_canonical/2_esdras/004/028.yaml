translation:
  language: es
  text: Pues el mal de que me preguntas ha sido sembrado, y su cosecha[a] aún no ha llegado. Si, pues, no se siega,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su destrucción».
    reason: alternative_reading_documented_in_audit_trail
lexical_decisions:
- source_word: malum
  english_pob_choice: the evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - el malvado
  lexicon: mal / malum
  rationale: El latín malum nombra el mal como realidad moral; en español, «el mal» conserva esa amplitud y corresponde al tono abstracto del texto.
- source_word: Seminatum est
  english_pob_choice: has been sown
  chosen_spanish: ha sido sembrado
  alternatives_spanish:
  - fue sembrado
  - ha sido sembrado
  lexicon: sembrar / seminare
  rationale: Conserva la metáfora agrícola del original y del contexto inmediato de siembra y siega.
- source_word: destrictio / destructio
  english_pob_choice: its destruction
  chosen_spanish: su destrucción
  alternatives_spanish:
  - su siega
  - su cosecha
  lexicon: destrucción / destrictio
  rationale: Sigo la decisión editorial más reciente del audit trail, que lee el término latino como «destruction» en esta instancia, aunque el historial muestra una tensión textual con la lectura metafórica de cosecha.
- source_word: Si ergo non messum fuerit
  english_pob_choice: If therefore it is not reaped
  chosen_spanish: Si, pues, no se siega
  alternatives_spanish:
  - Si, pues, no se cosecha
  - Si, pues, no se recoge
  lexicon: messum / metere
  rationale: «Se siega» reproduce la imagen agrícola y la pasiva impersonal del latín; además encaja con el condicional incompleto del fragmento.
theological_decisions:
- issue: Metáfora agrícola aplicada al mal
  english_pob_reading: the evil ... has been sown ... If therefore it is not reaped
  chosen_spanish_reading: el mal ... ha sido sembrado ... Si, pues, no se siega
  alternative_spanish_readings:
  - el mal ... ha sido sembrado ... si no se cosecha
  - la maldad ... ha sido sembrada ... si no se siega
  rationale: La frase mantiene la imagen de sembrar y segar sin suavizarla, porque el pasaje usa esa cadena metafórica de forma deliberada.
  doctrine_reference: No aplica una doctrina específica; decisión de imagen literaria y semántica.
translation_notes:
  revision_awareness: El borrador anterior contenía una nota al pie sin ancla en el texto y además osciló entre «cosecha» y «destrucción». Este borrador corrige la validación anclando la nota [a] en «destrucción» y refleja la última revisión del audit trail, mientras mantiene visible la tensión textual con la lectura agrícola.
  spanish_consistency_notes:
  - He usado «ha sido sembrado» y «se siega» para preservar la metáfora agrícola del latín.
  - He mantenido «destrucción» porque es la lectura adoptada en la revisión más reciente del expediente, aunque la nota preserva la alternativa «cosecha».
  - He conservado el estilo bíblico sobrio y modernizado, sin recurrir a fórmulas eclesiásticas ajenas al texto.
