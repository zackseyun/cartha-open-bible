    issue: «su destrucción» rompe la metáfora agrícola del versículo
    rationale: El latín del contexto usa lenguaje de siembra y siega, y la auditoría misma documenta que «destrictio» aquí corresponde a «harvest/reaping», no a destrucción en sentido no agrícola. Mantener «destrucción» en español descoordina el verso internamente.
  - severity: medium
    issue: La nota textual está invertida respecto de la mejor lectura contextual
    rationale: Si el texto principal conserva «destrucción» y la nota ofrece «cosecha», la nota termina conteniendo la opción más fiel al contexto. Conviene poner «cosecha» en el texto y dejar «destrucción» como alternativa documentada.
