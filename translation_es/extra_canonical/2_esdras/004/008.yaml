translation:
  language: es
  text: 'Quizá me habrías dicho: «No he descendido al abismo, ni al inframundo[a], ni he ascendido jamás al cielo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al Hades».
    reason: alternative_rendering_preserving_english_audit_trail
lexical_decisions:
- source_word: in abyssum
  english_pob_choice: the abyss
  chosen_spanish: al abismo
  alternatives_spanish:
  - a lo profundo
  - al fondo
  lexicon: abyssum → abismo
  rationale: El latín distingue abyssum de infernum; en español, «abismo» conserva la imagen de profundidad extrema y mantiene la correspondencia directa con la forma latina sin suavizarla.
- source_word: in infernum
  english_pob_choice: Hades
  chosen_spanish: al Hades
  alternatives_spanish:
  - al inframundo
  - al lugar de los muertos
  lexicon: infernum → Hades / inframundo
  rationale: Se conserva «Hades» porque el audit trail inglés mantiene la opción terminológica frente a «the underworld». En español, el préstamo transliterado evita imponer una glosa interpretativa y respeta la tensión lexical entre la tradición del texto y su trasfondo semítico.
- source_word: in caelis
  english_pob_choice: heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - a los cielos
  lexicon: caelum → cielo
  rationale: El plural latino caelis se naturaliza como singular en español, tal como justificó la revisión inglesa, porque «al cielo» es la forma idiomática más clara y fiel para este contexto.
- source_word: Dicebas fortassis mihi
  english_pob_choice: Perhaps you would have said to me
  chosen_spanish: Quizá me habrías dicho
  alternatives_spanish:
  - Tal vez me habrías dicho
  - Quizás me dirías
  lexicon: fortassis → quizá / tal vez
  rationale: «Quizá» reproduce el valor modal de fortassis con un registro digno y fluido. El pluscuamperfecto condicional refleja adecuadamente la hipótesis retrospectiva implícita en la frase.
theological_decisions:
- issue: Representación del lugar de los muertos
  english_pob_reading: Hades rather than the underworld
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - inframundo
  - lugar de los muertos
  - Seol
  rationale: Dado que el texto latino dice infernum y la revisión inglesa conservó «Hades», la traducción española mantiene ese término como designación tradicional pero no explícitamente doctrinalizada. Así se preserva la referencia al ámbito de los muertos sin borrar la decisión auditada del POB inglés.
  doctrine_reference: Cosmología del más allá / trasfondo de Sheol-Hades
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que volvió a una correspondencia más literal con abyss / Hades / heaven. La versión española conserva esa precisión y adapta la sintaxis para sonar natural en español, sin perder el contraste tripartito del latín.
  spanish_consistency_notes:
  - Se mantuvo «abismo» para abyssum, en coherencia con el valor físico-metafórico del término.
  - Se preservó «Hades» como préstamo terminológico, siguiendo el audit trail inglés y evitando una glosa doctrinalizante en el cuerpo del texto.
  - «Cielo» aparece en singular, en consonancia con la revisión inglesa y el uso natural del español.
  - El tono general es formal y sobrio, adecuado para un texto apócrifo/extra canónico de registro bíblico.
