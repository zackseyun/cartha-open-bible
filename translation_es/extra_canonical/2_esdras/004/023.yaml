review_pass:
  verdict: revise
  source_alignment_summary: >-
    El borrador refleja bien el sentido general del latin y sigue la revision
    inglesa clave de pertranseunt per nos como algo que sucede en la experiencia
    diaria, no un simple pasar sobre. Tambien preserva la serie de quejas:
    Israel, el pueblo amado, y la ley de los padres. Sin embargo, la nota
    alternativa actual (pasar sobre nosotros) quedo desalineada con la revision
    auditada, que precisamente corrigio esa lectura por inducir una imagen
    fisica enganosa.
  spanish_quality_summary: >-
    El espanol es claro, digno y mayormente natural. Porque no quise preguntar
    funciona bien, y oprobio, tribus impias y la ley de nuestros padres son
    fieles y legibles. La unica reparacion necesaria es en la nota al pie: debe
    reflejar la ambiguedad de superioribus uiis, no reintroducir la alternativa
    descartada para pertranseunt per nos.
  glossary_alignment: >-
    No hay conflictos con la terminologia base del proyecto. No aparecen Yahve,
    Mesias/Cristo, espiritu, etc. Las decisiones lexicas principales son
    compatibles con el registro biblico esperado.
  issues:
  - severity: medium
    issue: >-
      La nota [a] estaba anclada a caminos de arriba, pero su contenido
      correspondia a otra frase del versiculo y ademas contradecia la revision
      auditada. Se ha corregido para reflejar la ambiguedad de superioribus uiis.
    rationale: >-
      El ingles POB pone la nota [a] en ways above con el contenido Or pass over
      us, reflejando un rastro de traduccion previo aunque no ideal. En espanol,
      anclar pasar sobre nosotros a caminos de arriba creaba una nota incoherente
      y confusa. Se sustituye por una alternativa que corresponde a superioribus
      uiis: las cosas de arriba.
  revised_spanish_text: >-
    Porque no quise preguntar por los caminos de arriba[a], sino por las cosas
    que suceden entre nosotros cada dia: por que Israel ha sido entregado como
    oprobio a las naciones, por que el pueblo que tu amaste ha sido entregado a
    tribus impias, y por que la ley de nuestros padres ha sido reducida a nada.
  revised_footnotes:
  - marker: a
    text: "O 'las cosas de arriba'."
    reason: alternative_rendering_for_superioribus_uiis
  revision_rationale: >-
    Se conserva el texto principal porque es fiel al latin y al expediente
    ingles auditado. Se corrige unicamente la nota al pie para que corresponda
    al segmento donde esta anclada y para evitar reintroducir una alternativa
    ya descartada por la revision lexical de pertranseunt per nos.
