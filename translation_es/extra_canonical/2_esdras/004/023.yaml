source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'Non enim uolui interrogare de superioribus uiis, sed de his quae pertranseunt per nos cotidie: propter quod, Israel datus est in obprobrium gentibus, quem dilexisti populum datus est tribubus impiis, et lex patrum nostrorum in inritum deducta'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/004/023.yaml
  text: 'For I did not want to ask about the ways above[a], but about the things that happen among us daily: why Israel has been given over as a reproach to the nations, why the people whom you loved has been given over to ungodly tribes, and why the law of our fathers has been brought to nothing.'
  footnotes:
  - marker: a
    text: Or 'pass over us'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:02Z'
    unchanged: false
    changes_summary: Adjusted 'come upon us daily' to 'happen among us daily' to better reflect 'pertranseunt per nos cotidie'; added 'why' before the final clause for completeness and parallelism with 'propter quod'; retained the rest with only minor punctuation smoothing.
translation:
  language: es
  text: "Porque no quise preguntar por los caminos de arriba[a], sino por las cosas que suceden entre nosotros cada día: por qué Israel ha sido entregado como oprobio a las naciones, por qué el pueblo que tú amaste ha sido entregado a tribus impías, y por qué la ley de nuestros padres ha sido reducida a nada."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: "O ‘las cosas de arriba’."
    reason: alternative_rendering_for_superioribus_uiis
lexical_decisions:
- source_word: Non enim uolui interrogare
  english_pob_choice: For I did not want to ask
  chosen_spanish: Porque no quise preguntar
  alternatives_spanish:
  - Porque no quise interrogar
  - Pues no quise preguntar
  lexicon: non enim uolui interrogare
  rationale: ‘Quise preguntar’ comunica con naturalidad la intención negada del sujeto; ‘interrogar’ sería posible, pero en español suena más forense y menos idiomático aquí.
- source_word: de superioribus uiis
  english_pob_choice: about the ways above[a]
  chosen_spanish: por los caminos de arriba[a]
  alternatives_spanish:
  - acerca de las cosas de arriba[a]
  - sobre las vías superiores[a]
  lexicon: superiores uiis
  rationale: Conserva la imagen espacial/idiomática del latín, que refleja una construcción semítica difícil. ‘Caminos de arriba’ mantiene la tensión entre sentido literal y posible valor idiomático; se evita suavizarla demasiado.
- source_word: sed de his quae pertranseunt per nos cotidie
  english_pob_choice: but about the things that happen among us daily
  chosen_spanish: sino por las cosas que suceden entre nosotros cada día
  alternatives_spanish:
  - sino por las cosas que nos acontecen cada día
  - sino por las cosas que pasan entre nosotros cada día
  lexicon: quae pertranseunt per nos cotidie
  rationale: ‘Suceden entre nosotros cada día’ refleja el valor experiencial de ‘pertranseunt per nos’ según la revisión auditada, evitando la idea de ‘pasar sobre’ en sentido físico y conservando el énfasis en la vida cotidiana del pueblo.
- source_word: Israel datus est in obprobrium gentibus
  english_pob_choice: Israel has been given over as a reproach to the nations
  chosen_spanish: Israel ha sido entregado como oprobio a las naciones
  alternatives_spanish:
  - Israel ha sido puesto en oprobio ante las naciones
  - Israel ha sido dado en oprobio a las naciones
  lexicon: datus est in obprobrium gentibus
  rationale: ‘Entregado como oprobio’ sigue de cerca la pasiva latina y conserva el matiz de exposición vergonzosa ante los pueblos; ‘oprobio’ es más fuerte y más fiel al registro del original que ‘vergüenza’.
- source_word: quem dilexisti populum
  english_pob_choice: the people whom you loved
  chosen_spanish: el pueblo que tú amaste
  alternatives_spanish:
  - el pueblo al que amaste
  - la nación que amaste
  lexicon: quem dilexisti populum
  rationale: Se preserva la relación afectiva directa con Dios/Tú, sin cambiar ‘amaste’ por una formulación más abstracta.
- source_word: datus est tribubus impiis
  english_pob_choice: has been given over to ungodly tribes
  chosen_spanish: ha sido entregado a tribus impías
  alternatives_spanish:
  - ha sido entregado a tribus malvadas
  - ha sido dado a tribus impías
  lexicon: datus est tribubus impiis
  rationale: ‘Impías’ corresponde bien al juicio religioso y moral del latín; ‘tribus’ se conserva como ‘tribus’ por fidelidad al término del texto.
- source_word: lex patrum nostrorum
  english_pob_choice: the law of our fathers
  chosen_spanish: la ley de nuestros padres
  alternatives_spanish:
  - la ley de nuestros antepasados
  - la ley de nuestros padres y mayores
  lexicon: lex patrum nostrorum
  rationale: La fórmula heredada ‘ley de nuestros padres’ es directa y comprensible en español bíblico, sin cargarla con un tono ajeno al texto.
- source_word: in inritum deducta
  english_pob_choice: has been brought to nothing
  chosen_spanish: ha sido reducida a nada
  alternatives_spanish:
  - ha sido anulada
  - ha quedado en nada
  lexicon: in inritum deducta
  rationale: ‘Reducida a nada’ reproduce la idea de invalidación total sin introducir un tecnicismo jurídico que el contexto no exige.
theological_decisions:
- issue: El valor idiomático de “superioribus uiis” y su posible lectura semítica
  english_pob_reading: about the ways above[a]
  chosen_spanish_reading: por los caminos de arriba[a]
  alternative_spanish_readings:
  - acerca de las cosas de arriba[a]
  - sobre las vías superiores[a]
  rationale: Se conserva la tensión del pasaje sin resolverla demasiado. La formulación española mantiene abierta la posibilidad de un modismo sobre realidades ‘de arriba’ o ‘superiores’, de acuerdo con el carácter transliterado/semítico del latín.
  doctrine_reference: No doctrinal assertion; textual/idiomatic ambiguity preserved.
- issue: La secuencia de quejas sobre Israel, el pueblo amado y la ley
  english_pob_reading: Israel has been given over..., the people whom you loved..., and the law of our fathers...
  chosen_spanish_reading: Israel ha sido entregado..., el pueblo que tú amaste..., y la ley de nuestros padres...
  alternative_spanish_readings:
  - Israel ha sido abandonado..., el pueblo que tú amaste..., y la ley de nuestros padres...
  rationale: ‘Entregado’ preserva la pasiva del latín y mantiene el sentido de abandono judicial/histórico. No se sustituye por ‘abandonado’ porque el texto enfatiza la entrega a la humillación y al dominio ajeno.
  doctrine_reference: Providencia divina e historia de Israel; no se formula una tesis doctrinal más allá del lamento del texto.
translation_notes:
  revision_awareness: La revisión más reciente corrige la antigua idea de ‘pass over us’ hacia el valor de experiencia sufrida (‘come upon us’ / ‘happen among us’). Por eso la traducción española evita ‘pasar sobre’ en el cuerpo principal y opta por una formulación que expresa lo que acontece en medio del pueblo, sin borrar la ambigüedad espacial del miembro inicial sobre los ‘caminos de arriba’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto solo cuando el texto lo requiera explícitamente; en este versículo no aparece el nombre divino en el latín, así que se conserva la segunda persona reverente sin introducir un nombre propio.
  - Se usa ‘oprobio’ para reproducir el tono fuerte del latín ‘obprobrium’.
  - Se conserva ‘tribus’ por fidelidad al sustantivo del texto y al registro bíblico, sin normalizarlo a ‘pueblos’.
