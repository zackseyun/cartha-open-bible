lexical_decisions:
- source_word: Si enim
  english_pob_choice: If, then
  chosen_spanish: Si, pues
  alternatives_spanish:
  - Si entonces
  - Pues si
  lexicon: si
  rationale: El latín condicional con valor inferencial se refleja mejor en español con «Si, pues», que mantiene tanto la condición como la transición argumentativa del contexto.
- source_word: eras
  english_pob_choice: you were
  chosen_spanish: fueras
  alternatives_spanish:
  - eras
  - serías
  lexicon: ser
  rationale: El subjuntivo imperfecto en una condición irreal o hipotética expresa mejor la situación planteada que el indicativo simple.
- source_word: iudex
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - juez/árbitro
  - magistrado
  lexicon: iudex
  rationale: «Juez» es la correspondencia natural y fiel en español para el cargo o función jurídica indicado por el latín.
- source_word: horum
  english_pob_choice: these
  chosen_spanish: de estos
  alternatives_spanish:
  - de éstos
  - de estas personas
  lexicon: hic
  rationale: El genitivo latino se vierte de forma idiomática como complemento «de estos»; no conviene forzar un demostrativo más pesado en español.
theological_decisions:
- issue: Condicional hipotética sin carga doctrinal añadida
  english_pob_reading: If, then, you were judge over these,
  chosen_spanish_reading: Si, pues, fueras juez de estos,
  alternative_spanish_readings:
  - Si entonces fueras juez de estos,
  - Si fueras juez de estos, pues,
  rationale: El verso solo presenta una hipótesis retórica; la traducción conserva esa apertura sin introducir interpretación teológica adicional.
  doctrine_reference: Retórica sapiencial / juicio humano; sin decisión doctrinal específica
translation_notes:
  revision_awareness: La versión inglesa auditada («If, then, you were judge over these,» ) concuerda en sentido general con el latín conservado («Si enim eras iudex horum, quem»); la diferencia menor de tiempo verbal y de puntuación no altera el valor condicional del enunciado. No se requieren notas textuales adicionales para este segmento parcial.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y contemporáneo.
  - Se evita completar el hemistiquio latino truncado más allá de lo que el testimonio dado permite.
  - No se introduce «Cristo», «Señor» ni otros términos no presentes en el fragmento.
