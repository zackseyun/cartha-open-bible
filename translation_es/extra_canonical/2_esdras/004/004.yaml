source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: De quibus si mihi renunciaueris unam ex his, et ego tibi demonstrabo uiam quam desideras uidere, et doceam te quare cor malignum.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/004/004.yaml
  text: If you report to me one of these[a], then I also will show you the way that you desire to see, and I will teach you why the heart is evil.”
  footnotes:
  - marker: a
    text: Or 'If you can explain'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:29Z'
    unchanged: false
    changes_summary: Changed 'explain' to 'report' to better reflect renunciaveris, and revised 'why there is an evil heart' to 'why the heart is evil' for more natural and accurate rendering of quare cor malignum.
translation:
  language: es
  text: Si me informas de una de estas[a], yo también te mostraré el camino que deseas ver, y te enseñaré por qué el corazón es malo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si me explicas».'
    reason: alternative_reading
lexical_decisions:
- source_word: si mihi renunciaueris
  english_pob_choice: If you report to me
  chosen_spanish: Si me das noticia de
  alternatives_spanish:
  - Si me informas de
  - Si me comunicas
  lexicon: renuntio
  rationale: El latino renunciare/renuntiare aquí funciona como “dar noticia, declarar, informar”, no como “renunciar” en el sentido moderno. “Me das noticia de” comunica bien la noción de reporte sin introducir la idea de capacidad ('can') que el ajuste revisado eliminó.
- source_word: unam ex his
  english_pob_choice: one of these
  chosen_spanish: una de estas cosas
  alternatives_spanish:
  - una de estas
  - una de ellas
  lexicon: unus/ex/hic
  rationale: La expresión remite a varios elementos presentes en el contexto. En español, “una de estas cosas” evita ambigüedad y mantiene el referente neutro del latín.
- source_word: demonstrabo uiam
  english_pob_choice: I will show you the way
  chosen_spanish: te mostraré el camino
  alternatives_spanish:
  - te mostraré la vía
  - te señalaré el camino
  lexicon: demonstro/via
  rationale: “Mostraré el camino” conserva la imagen y es idiomático en español. “Vía” sería más literal, pero menos natural aquí.
- source_word: quam desideras uidere
  english_pob_choice: that you desire to see
  chosen_spanish: que deseas ver
  alternatives_spanish:
  - que anhelas ver
  - que quieres ver
  lexicon: desidero/video
  rationale: “Deseas ver” sigue de cerca el latín sin endurecer la frase. “Anhelas” intensifica demasiado; “quieres” reduce el matiz de deseo.
- source_word: doceam te
  english_pob_choice: I will teach you
  chosen_spanish: te enseñaré
  alternatives_spanish:
  - te instruiré
  - te mostraré
  lexicon: doceo
  rationale: 'El verbo latino es directo: enseñar/instruir. “Te enseñaré” es la opción más clara y fiel en español bíblico contemporáneo.'
- source_word: quare cor malignum
  english_pob_choice: why the heart is evil
  chosen_spanish: por qué el corazón es malo
  alternatives_spanish:
  - por qué el corazón es maligno
  - por qué hay maldad en el corazón
  lexicon: quare/cor/malignus
  rationale: La revisión inglesa confirmó que la construcción apunta a “why the heart is evil” y no a “why there is an evil heart”. En español, “el corazón es malo” conserva el predicado del latín y su fuerza moral sin añadir una formulación existencial ajena al texto.
theological_decisions:
- issue: Naturaleza moral del corazón
  english_pob_reading: the heart is evil
  chosen_spanish_reading: el corazón es malo
  alternative_spanish_readings:
  - el corazón es maligno
  - el corazón es perverso
  rationale: El latín dice cor malignum, una cualidad del corazón. “Malo” expresa la valoración moral básica de forma directa y comprensible; “maligno” o “perverso” pueden sonar más interpretativos o más intensos de lo que exige el texto.
  doctrine_reference: antropología bíblica / pecado del corazón
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión del inglés POB: evita la idea de capacidad añadida a la condición, y refleja la corrección de ''why there is an evil heart'' a ''why the heart is evil''. También conserva el matiz condicional directo del futuro perfecto latino sin sobretraducirlo.'
  spanish_consistency_notes:
  - Se mantuvo el tono sobrio y bíblico sin recurrir a fórmulas eclesiásticas tradicionales no requeridas por el latín.
  - Se evitó 'SEÑOR' y otros sustitutos porque el versículo no contiene el nombre divino.
  - Se preservó una sintaxis fluida en español, pero sin debilitar la relación condicional entre la cláusula y sus consecuencias.
