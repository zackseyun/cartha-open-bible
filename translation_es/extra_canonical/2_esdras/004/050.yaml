source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'et dixit ad me: cogita tibi. sicut enim crescit pluvia amplius quam guttae, et ignis amplius quam fumus, sic superabundavit quae transivit mensura, superaverunt autem guttae et fumus.'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/004/050.yaml
  text: 'And he said to me[a], “Consider for yourself: just as the rain is greater than the drops, and the fire greater than the smoke, so what has passed has greatly exceeded the measure, but the drops and the smoke remain.”'
  footnotes:
  - marker: a
    text: Or 'the measure of what has passed exceeded'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:36Z'
    unchanged: false
    changes_summary: 'Revised the second half for closer alignment with the Latin: rendered quae transivit mensura more naturally as “what has passed has greatly exceeded the measure,” and simplified the final clause to “the drops and the smoke remain” instead of the interpretive “remained behind.”'
translation:
  language: es
  text: 'Y me dijo: «Considéralo tú mismo: así como la lluvia es mayor que las gotas, y el fuego mayor que el humo, así lo que ha pasado ha sobrepasado mucho la medida[a]; pero las gotas y el humo permanecen».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «la medida de lo que ha pasado ha excedido».'
    reason: alternative_reading
lexical_decisions:
- source_word: cogita tibi
  english_pob_choice: Consider for yourself
  chosen_spanish: Considéralo tú mismo
  alternatives_spanish:
  - Piensa para ti
  - Reflexiónalo tú mismo
  lexicon: cogito
  rationale: El latín pide una exhortación reflexiva dirigida al oyente; en español, «considéralo tú mismo» conserva el valor de autoexamen y suena natural en registro bíblico sin volverse arcaico.
- source_word: pluvia
  english_pob_choice: the rain
  chosen_spanish: la lluvia
  alternatives_spanish:
  - la precipitación
  - el aguacero
  lexicon: pluvia
  rationale: «Lluvia» es la correspondencia directa y normal en español; mantiene la imagen comparativa del texto sin intensificarla indebidamente.
- source_word: guttae
  english_pob_choice: the drops
  chosen_spanish: las gotas
  alternatives_spanish:
  - las gotas de lluvia
  lexicon: guttae
  rationale: «Gotas» reproduce el contraste de la lluvia como totalidad frente a sus unidades mínimas. No se explicita «de lluvia» porque el contexto ya lo hace claro.
- source_word: ignis
  english_pob_choice: the fire
  chosen_spanish: el fuego
  alternatives_spanish:
  - la llama
  lexicon: ignis
  rationale: «Fuego» preserva el sustantivo general del latín y el paralelismo con «humo».
- source_word: fumus
  english_pob_choice: the smoke
  chosen_spanish: el humo
  alternatives_spanish:
  - el vapor
  lexicon: fumus
  rationale: «Humo» es la equivalencia directa y comunica bien el contraste con el fuego.
- source_word: superabundavit
  english_pob_choice: has greatly exceeded
  chosen_spanish: ha sobrepasado mucho
  alternatives_spanish:
  - ha excedido en gran manera
  - ha superado con mucho
  lexicon: superabundo
  rationale: El latín expresa abundancia/exceso con fuerza comparativa. «Ha sobrepasado mucho» mantiene la idea de exceder ampliamente sin forzar una construcción más interpretativa.
- source_word: quae transivit mensura
  english_pob_choice: what has passed / the measure that has passed
  chosen_spanish: lo que ha pasado... la medida
  alternatives_spanish:
  - la medida que ha pasado
  - la medida de lo que ha pasado
  lexicon: transire / mensura
  rationale: La secuencia latina es sintácticamente difícil y el audit trail inglés dejó abierta la lectura entre «what has passed» y «the measure that has passed». En español se preserva la tensión al traducir literalmente el miembro principal como «lo que ha pasado» y mantener «la medida» como término de comparación, sin resolver demasiado la ambigüedad.
- source_word: superaverunt autem guttae et fumus
  english_pob_choice: but the drops and the smoke remain
  chosen_spanish: pero las gotas y el humo permanecen
  alternatives_spanish:
  - pero las gotas y el humo quedan
  - pero las gotas y el humo siguen
  lexicon: supero / maneo
  rationale: El latín recibido parece apoyar la idea de que «las gotas y el humo» quedan como resto, y el inglés revisado optó por «remain». «Permanecen» conserva el valor estativo sin añadir un matiz interpretativo de desplazamiento.
theological_decisions:
- issue: 'Comparación temporal implícita: lo que pasó frente a lo que permanece'
  english_pob_reading: what has passed has greatly exceeded the measure, but the drops and the smoke remain
  chosen_spanish_reading: lo que ha pasado ha sobrepasado mucho la medida; pero las gotas y el humo permanecen
  alternative_spanish_readings:
  - lo que ha pasado ha excedido la medida
  - la medida de lo que ha pasado ha sido mucho mayor
  rationale: No se introduce una explicación doctrinal ajena al texto; se mantiene la comparación de magnitudes/tiempos tal como la sostiene el latín y el audit trail inglés. La formulación española deja visible la tensión sintáctica original en lugar de resolverla con demasiada soltura.
  doctrine_reference: No aplica; pasaje de comparación sapiencial/apocalíptica sin formulación doctrinal explícita.
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el último estado revisado del texto inglés, especialmente en la segunda mitad: conserva la idea de que «lo que ha pasado» ha excedido la medida, y evita una paráfrasis más libre como «ha quedado atrás». Al mismo tiempo, traduce el cierre con un presente estativo («permanecen») para reflejar el latín final.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando aparezca el nombre divino; aquí no aplica.
  - 'Se mantiene el paralelismo imagístico del latín: lluvia/gotas, fuego/humo.'
  - Se evita expandir «cogita tibi» a una exhortación moral más amplia que la que permite el texto.
  - El pie de nota marca la ambigüedad sintáctica del segmento latino central sin duplicar el contenido del cuerpo del texto.
