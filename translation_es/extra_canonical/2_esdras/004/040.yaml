base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/004/040.yaml
  text: And he answered me and said, “Go and ask a pregnant woman whether, when she has completed her nine months, she can still keep the child within her.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:03Z'
    unchanged: false
    changes_summary: Replaced 'a woman with child' with the more natural 'a pregnant woman' for praegnantem, and simplified 'her womb can still keep the child within herself' to 'she can still keep the child within her' for clearer, more natural English without adding meaning.
translation:
  language: es
  text: 'Y él me respondió y dijo: «Ve y pregunta a una mujer embarazada si, cuando haya cumplido sus nueve meses, todavía puede retener al hijo dentro de sí[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Retener al hijo dentro de sí» refleja el latín intra se y mantiene una formulación amplia; otras opciones como «en su vientre» o «en su seno» son posibles, pero aquí se prefirió evitar una especificación anatómica no explícita en el texto fuente.
    reason: lexical_alternative
lexical_decisions:
- source_word: uade
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: ir
  rationale: El imperativo latino uade pide un mandato simple de desplazamiento. «Ve» es natural, claro y fiel en español; mantiene la brevedad del original y del inglés POB sin añadir matiz de urgencia innecesario.
- source_word: interroga
  english_pob_choice: ask
  chosen_spanish: pregunta
  alternatives_spanish:
  - interroga
  - consulta
  lexicon: preguntar
  rationale: El verbo latino interroga puede sonar más forense en español, pero aquí el contexto es una instrucción ilustrativa. «Pregunta» conserva la sencillez del texto y la equivalencia funcional con el inglés POB «ask».
- source_word: praegnantem
  english_pob_choice: pregnant woman
  chosen_spanish: una mujer embarazada
  alternatives_spanish:
  - una mujer encinta
  - una mujer preñada
  lexicon: embarazada
  rationale: «Embarazada» es la forma moderna, digna y totalmente natural en español para praegnantem. Evita la ambigüedad o rusticidad de otras opciones, y sigue la revisión inglesa que optó por «pregnant woman».
- source_word: impleuerit nouem menses suos
  english_pob_choice: when she has completed her nine months
  chosen_spanish: cuando haya cumplido sus nueve meses
  alternatives_spanish:
  - cuando haya completado sus nueve meses
  - cuando termine sus nueve meses
  lexicon: cumplir/completar
  rationale: La construcción latina expresa la llegada al término del embarazo. «Haya cumplido sus nueve meses» conserva el registro natural del español y el valor temporal-perfectivo del original, en línea con la redacción inglesa revisada.
- source_word: adhuc
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía entonces
  lexicon: todavía
  rationale: El adverbio latino adhuc señala persistencia. «Todavía» reproduce bien esa continuidad en español y se ajusta al inglés POB «still».
- source_word: intra se / within her
  english_pob_choice: within her
  chosen_spanish: dentro de sí
  alternatives_spanish:
  - dentro de ella
  - en su seno
  lexicon: dentro de
  rationale: El latín sugiere interioridad corporal sin precisar el órgano. «Dentro de sí» mantiene la idea de contención interna sin sobre-especificar «útero», y preserva la formulación amplia del inglés POB «within her».
theological_decisions:
- issue: Imagen retórica de imposibilidad para ilustrar la respuesta divina
  english_pob_reading: Ask a pregnant woman whether, after nine months, she can still keep the child within her.
  chosen_spanish_reading: Preguntar a una mujer embarazada si, tras completar nueve meses, todavía puede retener al hijo dentro de sí.
  alternative_spanish_readings:
  - preguntar si aún puede mantener al niño en su vientre
  - preguntar si todavía puede retener al hijo en su seno
  rationale: El pasaje usa una analogía evidente de imposibilidad natural para reforzar la lógica del argumento. La formulación española conserva esa fuerza retórica sin suavizarla ni intensificarla más allá del latín y del inglés auditado.
  doctrine_reference: Retórica sapiencial / argumento por analogía natural
translation_notes:
  revision_awareness: 'El inglés POB fue revisado desde una versión más literal («woman with child» / «her womb can still keep the child within herself») a una formulación más natural («pregnant woman» / «she can still keep the child within her»). La versión española sigue esa revisión: adopta «mujer embarazada» y simplifica la cláusula final sin introducir el término «vientre» ni perder la idea de contención.'
  spanish_consistency_notes:
  - Se mantuvo «Y él me respondió y dijo» para reflejar el encadenamiento narrativo del latín.
  - Se usó «hijo» para traducir child siguiendo la convención española común en este contexto, sin alterar el sentido general.
  - La puntuación con comillas angulares y la colocación de la nota al final siguen el estilo editorial español y conservan la claridad de lectura.
