translation:
  language: es
  text: 'Y me dijo: «Si te hubiera preguntado, diciendo: “¿Cuántas moradas hay en el corazón del mar? ¿O cuántos manantiales hay en la fuente del abismo? ¿O cuántos caminos hay sobre el firmamento? ¿O cuáles son las salidas del paraíso?”»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: habitationes
  english_pob_choice: dwellings
  chosen_spanish: moradas
  alternatives_spanish:
  - habitaciones
  - viviendas
  lexicon: habitat/domestic dwelling
  rationale: «Moradas» comunica de manera natural y digna la idea de lugares de habitación sin reducir el término a una casa moderna; además preserva el tono elevado del pasaje apocalíptico.
- source_word: corde maris
  english_pob_choice: heart of the sea
  chosen_spanish: corazón del mar
  alternatives_spanish:
  - interior del mar
  - entrañas del mar
  lexicon: center/interior metaphor
  rationale: Se mantiene la metáfora espacial del original y de la POB inglesa con «corazón», que en español conserva bien la imagen de profundidad central.
- source_word: uenae
  english_pob_choice: springs
  chosen_spanish: manantiales
  alternatives_spanish:
  - fuentes
  - vertientes
  lexicon: spring/source of water
  rationale: «Manantiales» expresa con claridad la imagen de surgimientos de agua y funciona mejor en español que un calco literal.
- source_word: in principio abyssi
  english_pob_choice: at the source of the deep
  chosen_spanish: en la fuente del abismo
  alternatives_spanish:
  - en el principio del abismo
  - en el manantial del abismo
  lexicon: source/beginning + abyss
  rationale: La POB inglesa toma principium como «source»; en español, «fuente» transmite esa idea de origen y evita la ambigüedad de «principio» como mera abstracción temporal.
- source_word: uiae
  english_pob_choice: ways
  chosen_spanish: caminos
  alternatives_spanish:
  - sendas
  - vías
  lexicon: path/route
  rationale: «Caminos» es la opción más transparente y natural en español para el plural de vias, conservando el sentido de rutas o trayectos.
- source_word: super firmamentum
  english_pob_choice: above the firmament
  chosen_spanish: sobre el firmamento
  alternatives_spanish:
  - encima del firmamento
  - por encima del firmamento
  lexicon: cosmic vault/firmament
  rationale: Se conserva el término tradicional «firmamento», ya que refleja fielmente el imaginario cosmológico del texto fuente y la elección inglesa.
- source_word: exitus paradisi
  english_pob_choice: the exits of paradise
  chosen_spanish: las salidas del paraíso
  alternatives_spanish:
  - las entradas del paraíso
  - los accesos del paraíso
  lexicon: exits/outsides/egress points
  rationale: «Salidas» reproduce literalmente exitus y mantiene la rareza interrogativa del original sin suavizarla.
theological_decisions:
- issue: Retener la serie de preguntas imposibles como recurso retórico de sabiduría limitada
  english_pob_reading: The verse presents a set of unanswerable questions without added interpretation.
  chosen_spanish_reading: El versículo presenta una serie de preguntas imposibles sin añadir interpretación.
  alternative_spanish_readings:
  - El versículo podría leerse como una simple enumeración cosmológica.
  - Podría suavizarse como preguntas retóricas generales.
  rationale: La traducción conserva el carácter interrogativo y enumerativo del texto, evitando explicar o domesticar la función retórica.
  doctrine_reference: Sabiduría divina y limitación humana en la literatura apocalíptica
- issue: Preservar el valor cosmológico de «firmamentum»
  english_pob_reading: firmamentum is rendered as 'firmament' rather than a modern paraphrase.
  chosen_spanish_reading: firmamento
  alternative_spanish_readings:
  - cielo
  - bóveda celeste
  rationale: «Firmamento» mantiene el referente cosmológico histórico del texto y evita una modernización que diluya la imaginería bíblica.
  doctrine_reference: Cosmología bíblica tradicional
