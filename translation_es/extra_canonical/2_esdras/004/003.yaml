translation:
  language: es
  text: 'Y yo dije: «Sí, mi señor». Y él me respondió y dijo: «He sido enviado para mostrarte tres caminos y para poner ante ti tres comparaciones».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et dixi ; ita, dominus meus.
  english_pob_choice: And I said, “Yes, my lord.”
  chosen_spanish: 'Y yo dije: «Sí, mi señor».'
  alternatives_spanish:
  - 'Y dije: «Sí, mi señor».'
  - 'Y yo respondí: «Sí, mi señor».'
  lexicon: Latin ita; dominus meus
  rationale: El latín ita expresa asentimiento afirmativo directo; «Sí» reproduce con naturalidad ese valor. «Domino meus» se vierte como «mi señor» para mantener la relación de respeto sin sobreactuarla con fórmulas eclesiásticas más marcadas.
- source_word: tres uias
  english_pob_choice: three ways
  chosen_spanish: tres caminos
  alternatives_spanish:
  - tres vías
  - tres sendas
  lexicon: via
  rationale: Vias puede significar literalmente «vías/caminos». En español, «caminos» comunica bien la imagen y suena más natural que «vías» en este contexto narrativo; «sendas» queda como alternativa más literaria.
- source_word: similitudines
  english_pob_choice: comparisons
  chosen_spanish: comparaciones
  alternatives_spanish:
  - semejanzas
  - similitudes
  - paralelos
  lexicon: similitudo
  rationale: El inglés POB eligió «comparisons» para conservar la idea de poner cosas en relación. «Comparaciones» sigue de cerca ese valor y evita restringirlo a una mera figura retórica técnica. «Semejanzas» es posible, pero menos activo como verbo implícito de presentar.
theological_decisions:
- issue: 'Presentación de la revelación: «he sido enviado»'
  english_pob_reading: I have been sent to show you three ways, and to set three comparisons before you.
  chosen_spanish_reading: He sido enviado para mostrarte tres caminos y para poner ante ti tres comparaciones.
  alternative_spanish_readings:
  - Fui enviado para mostrarte tres caminos y para poner ante ti tres comparaciones.
  - He sido mandado para mostrarte tres caminos y para poner ante ti tres comparaciones.
  rationale: El perfecto pasivo «he sido enviado» conserva la fuerza de misión recibida del hablante, igual que en el inglés POB. «Fui enviado» también sería posible, pero el presente perfecto mantiene mejor la vivacidad del envío en el discurso directo. No hay aquí una afirmación doctrinal específica, solo una declaración de misión.
  doctrine_reference: Narrative mission language; no doctrinal claim beyond commissioning
- issue: «Comparisons» como categoría didáctica
  english_pob_reading: to set three comparisons before you
  chosen_spanish_reading: para poner ante ti tres comparaciones
  alternative_spanish_readings:
  - para proponerte tres comparaciones
  - para presentarte tres comparaciones
  rationale: «Poner ante ti» sigue de cerca la construcción del POB y transmite la idea de exhibición deliberada. «Proponerte» sería más idiomático en algunos contextos, pero puede sonar demasiado abstracto; aquí se preserva la imagen de colocar algo delante del interlocutor.
  doctrine_reference: Didactic presentation; no doctrinal claim
translation_notes:
  revision_awareness: The English POB text is stable and was marked unchanged in the latest revision pass; the Latin source and English audit agree closely, with no textual or interpretive disputes requiring a footnote in Spanish.
  spanish_consistency_notes:
  - Se mantiene «mi señor» para dominus meus como fórmula de respeto, sin convertirla en título litúrgico.
  - Se usa un registro sobrio y moderno, con puntuación española y comillas angulares.
  - «Tres caminos» y «tres comparaciones» reflejan el paralelismo del original sin añadir interpretaciones ajenas.
