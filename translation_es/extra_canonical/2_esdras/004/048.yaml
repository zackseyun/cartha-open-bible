translation:
  language: es
  text: Te mostraré la interpretación de la semejanza. Y me detuve y vi, y he aquí que un horno ardiente pasó delante de mí, y aconteció cuando
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: demonstrabo tibi
  english_pob_choice: I will show you
  chosen_spanish: Te mostraré
  alternatives_spanish:
  - Te enseñaré
  - Te daré a conocer
  lexicon: Latin demonstrabo
  rationale: demonstrabo expresa una acción futura de hacer ver o mostrar; «te mostraré» conserva la promesa directa y la transparencia del verbo sin añadir explicación interpretativa.
- source_word: interpretationem similitudinis
  english_pob_choice: the interpretation of the likeness
  chosen_spanish: la interpretación de la semejanza
  alternatives_spanish:
  - la explicación de la semejanza
  - la interpretación de la imagen
  lexicon: Latin interpretationem similitudinis
  rationale: «Interpretación» reproduce interpretationem; «semejanza» mantiene similitudinis con una palabra española natural y suficientemente cercana a la imagen figurativa del latín.
- source_word: Et steti et uidi
  english_pob_choice: And I stood and saw
  chosen_spanish: Y me paré y vi
  alternatives_spanish:
  - Y estuve de pie y vi
  - Y permanecí de pie y vi
  lexicon: Latin steti / uidi
  rationale: El latín presenta dos verbos coordinados; «me paré» conserva el valor de estar de pie o ponerse en pie, y «vi» mantiene la percepción simple de uidi sin intensificarla a «miré».
- source_word: fornax ardens
  english_pob_choice: a blazing furnace
  chosen_spanish: un horno ardiente
  alternatives_spanish:
  - un horno encendido
  - un horno llameante
  lexicon: Latin fornax ardens
  rationale: «Horno ardiente» es la correspondencia más directa y bíblicamente reconocible del sintagma latino; evita suavizar la imagen de fuego intenso.
- source_word: factum est cum
  english_pob_choice: it happened when
  chosen_spanish: aconteció cuando
  alternatives_spanish:
  - sucedió cuando
  - y sucedió cuando
  lexicon: Latin factum est cum
  rationale: La cláusula queda abierta en el fragmento recibido; «aconteció cuando» reproduce la fórmula narrativa y deja explícita la incompletitud del segmento tal como está en el texto fuente.
theological_decisions:
- issue: Mantener el carácter incompleto del final del versículo
  english_pob_reading: and it happened when
  chosen_spanish_reading: y aconteció cuando
  alternative_spanish_readings:
  - y sucedió cuando
  - y ocurrió cuando
  rationale: El latino transmitido termina en una subordinada iniciada por cum; la traducción debe conservar esa suspensión sin completarla artificialmente, para no ocultar la forma fragmentaria del testimonio textual.
  doctrine_reference: Crítica textual y fidelidad al testimonio manuscrito
translation_notes:
  revision_awareness: Esta versión sigue la revisión más reciente que restauró el inicio omitido («Te mostraré la interpretación de la semejanza») y el cierre incompleto del latín («y aconteció cuando»), además de ajustar los verbos clave para mayor correspondencia léxica con demonstrabo, similitudinem, uidi y factum est cum.
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras sustituciones, porque el pasaje latino no contiene el nombre divino.
  - Se conserva un español sobrio y de registro bíblico sin introducir interpretaciones adicionales.
  - Se mantiene la clausura abierta del fragmento para reflejar que el testimonio textual recibido es incompleto.
