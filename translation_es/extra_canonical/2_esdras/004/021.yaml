  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: metipso? Quemadmodum enim terra siluae data est et mare fluctibus suis, sic et qui super terram inhabitant quae sunt super terram intellegere solummodo possunt, et qui super caelos
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/004/021.yaml
  text: For just as the earth has been given to the forest[a], and the sea to its waves, so also those who dwell upon the earth can understand only what is on the earth, and he who is above the heavens, what is above the heavens.”
  footnotes:
  - marker: a
    text: Or 'those who are above the heavens'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:31Z'
    unchanged: false
    changes_summary: Removed 'the height of' to match the Latin more closely; otherwise retained the draft's wording and structure.
translation:
  language: es
  text: Porque así como la tierra ha sido dada al bosque, y el mar a sus olas, así también los que habitan sobre la tierra pueden entender solo lo que está sobre la tierra; y el que está sobre los cielos[a], lo que está sobre los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los que están sobre los cielos'.
    reason: previous_rendering
lexical_decisions:
- source_word: terra
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra habitable
  - el mundo
  lexicon: tierra
  rationale: Conserva el paralelismo simple del latín y del inglés POB. En este contexto no se requiere especificar 'tierra habitable' porque la oposición es entre el ámbito terrestre y el celestial.
- source_word: siluae
  english_pob_choice: to the forest
  chosen_spanish: al bosque
  alternatives_spanish:
  - a la selva
  - a los bosques
  lexicon: bosque
  rationale: El latín 'siluae' puede referirse al bosque o al ámbito silvestre. 'Bosque' sigue de cerca la elección del inglés POB ('forest') y suena natural en español.
- source_word: mare fluctibus suis
  english_pob_choice: the sea to its waves
  chosen_spanish: el mar a sus olas
  alternatives_spanish:
  - el mar a sus olas propias
  - el mar a sus olas
  lexicon: mar / ola
  rationale: 'Mantiene la personificación distributiva del latín: cada ámbito recibe lo que le corresponde. ''Olas'' reproduce el plural del original y del inglés POB.'
- source_word: qui super terram inhabitant
  english_pob_choice: those who dwell upon the earth
  chosen_spanish: los que habitan sobre la tierra
  alternatives_spanish:
  - los que moran sobre la tierra
  - quienes habitan la tierra
  lexicon: habitar
  rationale: '''Habitan'' refleja el verbo de residencia y conserva la construcción inclusiva del latín. ''Sobre la tierra'' mantiene la imagen espacial del original.'
- source_word: intellegere solummodo possunt
  english_pob_choice: can understand only
  chosen_spanish: pueden entender solo
  alternatives_spanish:
  - solo pueden entender
  - pueden comprender solo
  lexicon: entender
  rationale: '''Entender solo'' preserva el alcance restrictivo del adverbio ''solummodo'' sin añadir matices interpretativos.'
- source_word: qui super caelos
  english_pob_choice: he who is above the heavens
  chosen_spanish: el que está sobre los cielos
  alternatives_spanish:
  - el que está por encima de los cielos
  - quien está sobre los cielos
  lexicon: estar sobre
  rationale: La revisión del POB inglés aclaró que el referente es singular, no plural. En español, 'el que está' refleja esa singularidad y evita una lectura colectiva. Se conserva 'sobre los cielos' para seguir el latín sin expandirlo a 'altura' o 'cielos de los cielos'.
- source_word: caelos
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: cielo(s)
  rationale: '''Los cielos'' reproduce mejor el plural latino ''caelos'' y la formulación apocalíptica del contraste entre lo terrestre y lo celestial.'
theological_decisions:
- issue: Contraste entre humanidad terrenal y el Ser que está sobre los cielos
  english_pob_reading: and he who is above the heavens
  chosen_spanish_reading: y el que está sobre los cielos
  alternative_spanish_readings:
  - y los que están sobre los cielos
  - y aquel que está sobre los cielos
  rationale: Sigo la revisión del POB que corrige la ambigüedad plural y preserva la referencia singular a Dios/El Altísimo implícita en el pasaje. El español mantiene el contraste apocalíptico entre la comprensión limitada de los habitantes de la tierra y la perspectiva divina.
  doctrine_reference: Teología bíblica de la trascendencia divina; Dios como el Altísimo sobre los cielos.
translation_notes:
  revision_awareness: La versión inglesa POB pasó de 'those who are above the heavens' a 'he who is above the heavens' por una corrección textual sustentada en el testimonio latino/griego/siríaco/etiópico; la traducción española adopta esa lectura singular y conserva la estructura sintáctica del pasaje con la menor expansión posible.
  spanish_consistency_notes:
  - Se mantiene 'Dios' implícito sin sustituirlo por un título interpretativo más explícito, porque el texto fuente solo dice 'el que está sobre los cielos'.
  - Se usa 'cielos' en plural para respetar el latín 'caelos' y el paralelismo retórico del versículo.
  - No se introduce terminología eclesiástica ajena al contexto; el registro es sobrio y apocalíptico.
