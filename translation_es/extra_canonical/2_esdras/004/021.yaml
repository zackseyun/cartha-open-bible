    rationale: La nota inglesa dice 'Or those who are above the heavens', es decir, una alternativa plural para el sujeto final. El borrador español pone 'O al que está sobre los cielos', que introduce una preposición ('al') impropia y no refleja la alternativa plural/singular documentada.
  revised_spanish_text: Porque así como la tierra ha sido dada al bosque, y el mar a sus olas, así también los que habitan sobre la tierra pueden entender solo lo que está sobre la tierra; y el que está sobre los cielos[a], lo que está sobre los cielos.
