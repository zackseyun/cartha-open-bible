  to: 'y me dijo: «Bien has juzgado, así que ¿por qué no has juzgado por ti mismo?»'
  rationale: Se ajusta la segunda cláusula para que el español sea natural y fiel al valor personal/reflexivo de tibi sin reducirlo a «tu propio caso». También se hace explícita la relación inferencial de quare con «así que», en línea con la auditoría inglesa.
