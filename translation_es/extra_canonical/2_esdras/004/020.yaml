translation:
  language: es
  text: 'y me dijo: «Bien has juzgado, así que ¿por qué no has juzgado por ti mismo?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ad me
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: ad + pronombre personal
  rationale: 'El latín ad me expresa dirección hacia la persona: «a mí». En este contexto de diálogo, «a mí» es la forma más natural y exacta en español para reproducir el movimiento del discurso.'
- source_word: dixit
  english_pob_choice: said
  chosen_spanish: me dijo
  alternatives_spanish:
  - dijo
  - me respondió
  lexicon: dico, dicere
  rationale: El verbo introduce palabra dirigida al hablante; por eso «me dijo» conserva tanto el valor de habla como la relación directa del pronombre dativo implícita en ad me.
- source_word: bene tu iudicasti
  english_pob_choice: You have judged rightly
  chosen_spanish: Bien has juzgado
  alternatives_spanish:
  - Has juzgado bien
  - Juzgaste bien
  lexicon: iudico, iudicare
  rationale: «Bien has juzgado» mantiene el adverbio bene y el valor perfecto de iudicasti sin forzar un giro demasiado literal. Es claro, digno y cercano al orden semántico del latín.
- source_word: quare
  english_pob_choice: so why
  chosen_spanish: ¿y por qué
  alternatives_spanish:
  - ¿por qué entonces
  - ¿así que por qué
  lexicon: quare
  rationale: 'Quare introduce una pregunta inferencial: «¿y por qué?» expresa la consecuencia lógica del juicio previo sin añadir matices que el latín no exige.'
- source_word: non iudicasti tibi
  english_pob_choice: have you not judged for yourself?
  chosen_spanish: no has juzgado para ti mismo
  alternatives_spanish:
  - no te has juzgado a ti mismo
  - no has juzgado en tu propio caso
  lexicon: tibi
  rationale: 'El dativo tibi se entiende mejor como beneficio/relación personal: «para ti mismo». Esta opción sigue la revisión inglesa que prefirió ''for yourself'' y evita la lectura más interpretativa de ''en tu propio caso''.'
theological_decisions:
- issue: Valor del dativo tibi en una pregunta moral/reflexiva
  english_pob_reading: for yourself
  chosen_spanish_reading: para ti mismo
  alternative_spanish_readings:
  - en tu propio caso
  - a ti mismo
  rationale: 'No hay contenido doctrinal complejo aquí, pero sí una tensión de matiz: el latín permite un sentido personal y reflexivo. «Para ti mismo» preserva esa relación sin convertirla en una formulación judicial más estrecha de lo que el texto ofrece.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa revisó la segunda cláusula desde 'in your own case' a 'for yourself' para reflejar mejor tibi. La propuesta española sigue explícitamente esa revisión y no la neutraliza con una paráfrasis más interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Bien has juzgado» como correspondencia breve y directa de bene tu iudicasti.
  - Se conserva el tono de pregunta retórica en una sola cláusula, sin expansión explicativa.
  - No se introduce terminología eclesiástica ni doctrinal ajena al latín del pasaje.
