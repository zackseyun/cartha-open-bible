translation:
  language: es
  text: 'Y yo dije[a]: «No puede, Señor». Y él me dijo: «En el Hades, los depósitos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Y yo dije» traduce el arranque narrativo latino sin añadir contenido; el marcador se coloca solo para reflejar la nota de referencia del original en la edición inglesa.
    reason: source_note
lexical_decisions:
- source_word: poterit ... retinere foetum in semetipsa
  english_pob_choice: It cannot
  chosen_spanish: No puede
  alternatives_spanish:
  - No puede retenerlo
  - No es posible
  lexicon: Latin poterit / retinere / foetum
  rationale: El latín plantea una imposibilidad breve y absoluta; en español, «No puede» comunica esa imposibilidad sin añadir elementos no sustentados por el fragmento recibido. Evita extender el sentido hacia explicaciones no presentes en el texto.
- source_word: domine
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Dueño
  lexicon: Latin domine
  rationale: «Señor» es la forma española más natural y reverente para dirigirse a una figura superior en un contexto de discurso directo. Mantiene la equivalencia funcional del vocativo latino sin introducir una paráfrasis.
- source_word: inferno
  english_pob_choice: Hades
  chosen_spanish: Hades
  alternatives_spanish:
  - el Hades
  - el mundo de los muertos
  lexicon: Latin infernum
  rationale: La tradición de la POB en inglés ya decidió que aquí se trata del ámbito de los muertos, no del castigo final. En español, «Hades» conserva esa distinción y evita confundir el término con el infierno doctrinal posterior.
- source_word: prumptuaria
  english_pob_choice: the storehouses
  chosen_spanish: los depósitos
  alternatives_spanish:
  - los almacenes
  - las despensas
  lexicon: Latin prumptuaria
  rationale: El sustantivo latino designa lugares de provisión o reserva. «Depósitos» es suficientemente literal y neutro en español; «almacenes» o «despensas» podrían cargar la imagen en direcciones más específicas de las que permite el fragmento.
theological_decisions:
- issue: Alcance de 'Hades'
  english_pob_reading: '''Hades'' here renders the realm of the dead, not specifically the place of final punishment.'
  chosen_spanish_reading: «Hades» aquí nombra el ámbito de los muertos, no específicamente el lugar del castigo final.
  alternative_spanish_readings:
  - infierno
  - sepulcro
  rationale: 'Se preserva la distinción auditada por la POB inglesa: el término no debe confundirse con el destino final de condenación. «Hades» es la opción más transparente y menos interpretativamente cargada en español.'
  doctrine_reference: distinción entre estado intermedio y castigo final
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente, que eliminó la ampliación no sustentada «of souls are like the womb». Por eso el español no añade comparaciones ni objeto explícito a «los depósitos», y se limita al final conservado del latín: «in inferno prumptuaria».'
  spanish_consistency_notes:
  - Se usa «Señor» para el vocativo, pero «Hades» se conserva como término técnico conforme a la nota inglesa.
  - No se añadió equivalente de 'souls' ni la comparación con el vientre, porque el pasaje latino limpio no lo sostiene.
  - La puntuación en español mantiene el corte dialogal del original y de la POB inglesa.
