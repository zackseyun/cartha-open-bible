    changes_summary: Revised 'storehouses' to 'chambers' for Latin suis; changed 'we hope' to singular 'I hope' to match spero; added the final clause 'And Jeremiel answered them' to include the omitted source text; adjusted 'in this way' to 'thus' for a more formal register.
translation:
  language: es
  text: '¿No preguntaron las almas de los justos acerca de estas cosas en sus cámaras[a], diciendo: «¿Hasta cuándo he de esperar así, y cuándo vendrá el fruto de la era de nuestra recompensa?» Y Jeremiel les respondió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La imagen de las almas en «cámaras» anticipa la analogía del parto en los vv. 40-42: son guardadas en lugares reservados hasta que se complete el número señalado.'
    reason: cross_reference
lexical_decisions:
- source_word: suis
  english_pob_choice: their chambers
  chosen_spanish: sus cámaras
  alternatives_spanish:
  - sus depósitos
  - sus almacenes
  - sus almacenes reservados
  lexicon: Latin suis
  rationale: El latín suis se entendió en la tradición auditada como posesivo referido a los justos; en español, «cámaras» conserva mejor la idea de recinto o estancia que «almacenes», que sería más interpretativo. Se evita mecanizar la imagen como depósito físico sin apoyo textual suficiente.
- source_word: animae iustorum
  english_pob_choice: the souls of the righteous
  chosen_spanish: las almas de los justos
  alternatives_spanish:
  - los espíritus de los justos
  - las vidas de los justos
  lexicon: Latin animae iustorum
  rationale: «Almas» reproduce bien animae en este contexto apocalíptico y mantiene la continuidad con el inglés auditado. «Justos» es la forma natural para iustorum y preserva el valor moral/covenantal del término.
- source_word: spero
  english_pob_choice: I hope
  chosen_spanish: he de esperar
  alternatives_spanish:
  - espero
  - seguiré esperando
  - aguardo
  lexicon: Latin spero
  rationale: Aunque el latín presenta un singular, el audit trail reconoce la tensión con el sujeto plural y el posesivo «nuestra recompensa». En español, «¿Hasta cuándo he de esperar así?» conserva la lectura del texto recibido sin imponer una corrección explícita en la voz gramatical del hablante, mientras evita la extrañeza de un singular literal en boca de un plural colectivo.
- source_word: fructus areae mercedis nostrae
  english_pob_choice: the fruit of the threshing floor of our reward
  chosen_spanish: el fruto de la era de nuestra recompensa
  alternatives_spanish:
  - el fruto de la era de nuestro salario
  - la cosecha de la era de nuestra recompensa
  - el fruto de la trilla de nuestra recompensa
  lexicon: Latin fructus areae mercedis nostrae
  rationale: Se conserva la metáfora agrícola con «era», que corresponde al área de trilla, y «fruto» para fructus. «Recompensa» mantiene el término del audit trail; «salario» sería demasiado restrictivo y menos fiel a la carga escatológica.
- source_word: Hieremiel
  english_pob_choice: Jeremiel
  chosen_spanish: Jeremiel
  alternatives_spanish:
  - Jeremiel
  - Jeremías
  lexicon: Latin Hieremiel
  rationale: Se mantiene la transliteración del nombre angelical tal como la tradición auditada lo fija en inglés, sin sustituirlo por un nombre bíblico más conocido que no corresponde al texto.
theological_decisions:
- issue: Pluralidad de los hablantes frente al singular latino de spero
  english_pob_reading: How long shall I hope thus? / Or 'also ask ... saying, How long shall I hope'
  chosen_spanish_reading: ¿Hasta cuándo he de esperar así?
  alternative_spanish_readings:
  - ¿Hasta cuándo esperamos así?
  - ¿Hasta cuándo he de esperar de este modo?
  rationale: El registro latino conserva una tensión gramatical entre el singular spero y el sujeto plural anterior, tensión ya discutida en el audit trail. El español adopta una formulación neutral con auxiliar («he de esperar») que permite mantener la lectura transmitida sin borrar la discrepancia documentada ni forzar una normalización no sustentada en el texto base.
  doctrine_reference: Crítica textual y consistencia gramatical del testimonio latino
- issue: Imagen de las almas en cámaras/almacenes
  english_pob_reading: souls ... in their chambers
  chosen_spanish_reading: las almas de los justos ... en sus cámaras
  alternative_spanish_readings:
  - las almas ... en sus almacenes
  - las almas ... en sus depósitos
  rationale: La revisión inglesa cambió 'storehouses' a 'chambers' por suis. En español, 'cámaras' mantiene la ambigüedad espacial y evita concretar una imagen económica o de almacenamiento que el latín final no exige. Esto también deja abierta la conexión con la analogía del parto señalada en la nota inglesa.
  doctrine_reference: Escatología intermedia e imaginería apocalíptica
translation_notes:
  revision_awareness: 'Se siguió la última revisión inglesa en dos puntos: se añadió explícitamente la cláusula final «Y Jeremiel les respondió», que estaba omitida en una versión anterior; y se prefirió «cámaras» para el posesivo latino suis en lugar de «almacenes». También se tuvo en cuenta la tensión revisada entre el plural de los hablantes y el singular de spero, sin intentar resolverla de manera no atestiguada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto solo cuando corresponda; aquí no aparece el tetragrámaton.
  - Se mantiene «Mesías/Cristo» fuera del versículo porque no aparece ningún título mesiánico.
  - «Jeremiel» se conserva como nombre propio transliterado, consistente con el inglés auditado.
  - La puntuación y la cita directa siguen un estilo publicable en español, con comillas angulares para la réplica hablada.
