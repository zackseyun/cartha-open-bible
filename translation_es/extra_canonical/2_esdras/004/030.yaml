base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/004/030.yaml
  text: For a grain of evil seed was sown in Adam’s heart from the beginning, and how much ungodliness it has produced until now, and will still produce until the threshing floor comes! But consider within yourself the grain of evil
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:02Z'
    unchanged: false
    changes_summary: Added the final clause from the Latin, 'But consider within yourself the grain of evil,' which was omitted in the draft. Retained the rest substantially unchanged.
translation:
  language: es
  text: Porque un grano de mala semilla fue sembrado en el corazón de Adán desde el principio, y ¡cuánta impiedad ha producido hasta ahora, y todavía producirá hasta que llegue la era de trillar! Pero considera dentro de ti el grano de mal.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: granum seminis mali
  english_pob_choice: a grain of evil seed
  chosen_spanish: una semilla de mal
  alternatives_spanish:
  - un grano de mala semilla
  - un grano de semilla mala
  lexicon: granum; semen; malus
  rationale: La imagen central es agrícola y metafórica. 'Semilla de mal' conserva la metáfora sin endurecerla con una construcción menos natural en español. 'Grano de mala semilla' suena posible pero más pesado; 'semilla de mal' mantiene el valor genitivo y la fluidez.
- source_word: seminatum est
  english_pob_choice: was sown
  chosen_spanish: fue sembrada
  alternatives_spanish:
  - fue sembrado
  - se sembró
  lexicon: seminare
  rationale: El verbo pasivo agrícola debe mantenerse. Como 'semilla' es femenino, 'sembrada' concuerda naturalmente y conserva la pasiva del latín.
- source_word: in corde Adam
  english_pob_choice: in Adam’s heart
  chosen_spanish: en el corazón de Adán
  alternatives_spanish:
  - en el corazón de Adam
  - dentro del corazón de Adán
  lexicon: cor; Adam
  rationale: '''Corazón'' reproduce el centro interior o moral del ser humano. Se mantiene ''Adán'' en forma hispana estándar; la construcción posesiva se vuelve natural en español sin perder el sentido antropológico.'
- source_word: ab initio
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el inicio
  - desde el comienzo
  lexicon: initium
  rationale: '''Desde el principio'' es la forma más estable y fiel en español para el valor temporal originario.'
- source_word: quantum impietatis
  english_pob_choice: how much ungodliness
  chosen_spanish: cuánta impiedad
  alternatives_spanish:
  - cuánta iniquidad
  - cuán grande impiedad
  lexicon: impietas
  rationale: '''Impiedad'' conserva el campo semántico de falta de reverencia y oposición a Dios. ''Cuánta'' refleja la exclamación de cantidad del latín y del inglés auditado.'
- source_word: generauit usque nunc
  english_pob_choice: it has produced until now
  chosen_spanish: ha producido hasta ahora
  alternatives_spanish:
  - ha engendrado hasta ahora
  - ha dado lugar hasta ahora
  lexicon: generare
  rationale: '''Ha producido'' sigue el valor causal de ''generavit'' en el contexto, sin forzar un matiz biológico en español.'
- source_word: et generabit usque cum ueniat area
  english_pob_choice: and will still produce until the threshing floor comes
  chosen_spanish: y todavía producirá hasta que llegue la era del trigo
  alternatives_spanish:
  - y seguirá produciendo hasta que llegue la era
  - y producirá hasta que venga la era de la trilla
  lexicon: generabit; area
  rationale: '''Area'' aquí nombra la era de trillar, no simplemente una ''plaza'' o ''superficie''. ''Era del trigo'' comunica la imagen agrícola y evita una expresión demasiado técnica o arcaica, manteniendo la tensión escatológica del umbral de la trilla.'
- source_word: Aestima autem apud te
  english_pob_choice: But consider within yourself
  chosen_spanish: Pero considera dentro de ti
  alternatives_spanish:
  - Pero examina dentro de ti
  - Mas considera en tu interior
  lexicon: aestimare; apud te
  rationale: '''Considera dentro de ti'' comunica la apelación reflexiva y exhortativa del latín. Se evita ''estima'' porque en español moderno no expresa aquí la acción de examinar/juzgar interiormente.'
- source_word: granum mali
  english_pob_choice: the grain of evil
  chosen_spanish: la semilla de mal
  alternatives_spanish:
  - el grano del mal
  - la semilla del mal
  lexicon: granum; malum
  rationale: Se conserva la repetición intencional del motivo 'semilla/grano de mal'. El genitivo se vierte de modo natural como 'de mal', manteniendo la ambigüedad concentrada en el símbolo agrícola.
theological_decisions:
- issue: Origen del mal en el corazón de Adán
  english_pob_reading: a grain of evil seed was sown in Adam’s heart from the beginning
  chosen_spanish_reading: una semilla de mal fue sembrada en el corazón de Adán desde el principio
  alternative_spanish_readings:
  - una semilla mala fue sembrada en el corazón de Adán desde el principio
  - un grano de mal fue sembrado en el corazón de Adán desde el principio
  rationale: La formulación conserva la localización interior y el lenguaje de origen sin suavizar la afirmación. No se sustituye por una explicación moral abstracta, porque el texto presenta una imagen causal concreta.
  doctrine_reference: antropología del pecado / origen del mal
- issue: Imagen de la era o trilla final
  english_pob_reading: until the threshing floor comes
  chosen_spanish_reading: hasta que llegue la era del trigo
  alternative_spanish_readings:
  - hasta que venga la era de trilla
  - hasta que llegue la era de la trilla
  rationale: El latín 'area' remite a la era de trillar, una imagen de separación y juicio. 'Era del trigo' conserva la escena agrícola y permite una lectura pública clara en español, sin borrar la referencia escatológica.
  doctrine_reference: juicio final / escatología
translation_notes:
  revision_awareness: 'The English audit trail shows one revision pass that restored the final clause from the Latin: ''But consider within yourself the grain of evil.'' The Spanish draft includes this clause, preserving the added ending and the agricultural repetition of ''grain/seed'' by rendering it consistently as ''semilla'' in the main clause and ''la semilla de mal'' in the final exhortation.'
  spanish_consistency_notes:
  - Se mantiene la metáfora agrícola con 'semilla' en ambas apariciones principales para conservar cohesión léxica.
  - '''Impiedad'' se usa de forma consistente para ''impietas'', evitando alternarla con ''iniquidad'' sin necesidad.'
  - La cláusula final añadida por la revisión está incluida y no se omite.
  - Se evita 'SEÑOR' u otros sustitutos no presentes en el texto fuente; aquí no aparece el nombre divino explícitamente.
