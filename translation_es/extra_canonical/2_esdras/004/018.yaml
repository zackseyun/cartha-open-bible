translation:
  language: es
  text: ¿A quién empezarías a justificar[a], o a quién condenar? Y yo respondí y
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cuál empezarías a justificar, o cuál condenar? Y yo respondí y»'
    reason: Conserva la alternativa de traducción registrada en la auditoría inglesa, donde el referente puede entenderse de forma más impersonal («which») en vez de personal («whom»).
lexical_decisions:
- source_word: incipiebas iustificare
  english_pob_choice: would you begin to justify
  chosen_spanish: ¿Empezarías a justificar
  alternatives_spanish:
  - ¿Justificarías
  - ¿Comenzarías a justificar
  lexicon: incipio + infinitive; iustificare
  rationale: El latín aquí funciona como auxiliar modal en una pregunta contrafactual. En español, «empezarías a justificar» conserva el matiz de inceptivo sin volverlo más fuerte de lo que exige el contexto. Se mantiene la apertura verbal sugerida por el inglés revisado, sin perder la fuerza interrogativa.
- source_word: quem condemnare
  english_pob_choice: whom condemn
  chosen_spanish: a quién condenar
  alternatives_spanish:
  - a quién condenarías
  - a cuál condenar
  lexicon: quem; condemnare
  rationale: «Quem» se refiere naturalmente a una persona en este contexto personificado, por lo que «a quién» es el equivalente más claro en español. Se evita «qué» porque el inglés auditado corrigió la lectura hacia un referente personal.
- source_word: Et respondi et
  english_pob_choice: And I answered and
  chosen_spanish: Y yo respondí y
  alternatives_spanish:
  - Y respondí y
  - Y contesté y
  lexicon: et respondi et
  rationale: 'Se conserva el corte fragmentario del testimonio latino: el verso termina en «et». El español deja la frase abierta con «y», reproduciendo el carácter incompleto del texto fuente.'
translation_notes:
  revision_awareness: 'El español sigue la última revisión del audit trail: toma incipiebas como «empezarías» para reflejar el valor inceptivo/modal señalado, y conserva el final truncado «et» con una conjunción final abierta, igual que el fragmento latino.'
  spanish_consistency_notes:
  - Se prefirió el tratamiento de segunda persona singular con condicional («empezarías») para mantener la contrafactualidad del latín.
  - No se añadió puntuación de cierre al final porque el testimonio fuente termina en fragmento.
  - Se usó un registro bíblico moderno y sobrio, sin introducir fórmulas eclesiásticas no motivadas por el texto.
