translation:
  language: es
  text: y los estatutos escritos[a] no se hallan en ninguna parte. Y pasamos por esta era como langostas, y nuestra vida es como vapor, y no somos dignos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Los estatutos escritos no se hallan en ninguna parte'' puede aludir a la pérdida efectiva o a la anulación del orden escrito autoritativo bajo la catástrofe, no necesariamente a la desaparición física de todos los manuscritos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: dispositionis scriptae
  english_pob_choice: the written ordinances
  chosen_spanish: los estatutos escritos
  alternatives_spanish:
  - las disposiciones escritas
  - los decretos escritos
  lexicon: disposición / estatuto / escrito
  rationale: El latín habla de una disposición o estatuto ya fijado por escrito. 'Estatutos escritos' conserva el valor normativo y la referencia a un orden autoritativo, sin forzar una formulación más jurídica de lo que el latín exige. 'No se hallan en ninguna parte' refleja bien la pérdida o ausencia efectiva indicada por la tradición inglesa y la nota auditada.
- source_word: pertransimus de saeculo
  english_pob_choice: we pass through the age
  chosen_spanish: atravesamos la edad
  alternatives_spanish:
  - pasamos por la era
  - cruzamos el siglo
  lexicon: pertransire / saeculum
  rationale: '''Atravesamos'' conserva la imagen de tránsito por una condición temporal. ''Edad'' aquí comunica mejor el sentido de saeculum como la era presente, la condición temporal del mundo, sin introducir el falso matiz de ''siglo'' en español moderno. La nota inglesa ya corrigió ''away from the age'' a ''through the age''; el español sigue ese matiz.'
- source_word: ut locustae
  english_pob_choice: like locusts
  chosen_spanish: como langostas
  alternatives_spanish:
  - como saltamontes
  - como una plaga de langostas
  lexicon: locustae
  rationale: '''Langostas'' es la equivalencia directa y mantiene la fuerza comparativa. No se amplía a ''plaga'' porque el texto compara el modo de pasar, no necesariamente añade explícitamente una plaga en esta cláusula.'
- source_word: vita nostra ut uapor
  english_pob_choice: our life is like vapor
  chosen_spanish: nuestra vida es como vapor
  alternatives_spanish:
  - nuestra vida es como niebla
  - nuestra vida es como aliento
  lexicon: uapor
  rationale: '''Vapor'' preserva el paralelismo de la fuente y el valor de algo fugaz e inestable. ''Niebla'' sería interpretativo; ''aliento'' desplaza el símil hacia otro campo semántico.'
- source_word: nec digni sumus
  english_pob_choice: and we are not worthy
  chosen_spanish: y no somos dignos
  alternatives_spanish:
  - y no merecemos
  - y no somos dignos de ello
  lexicon: dignus
  rationale: Se mantiene la misma valoración moral/humillante del original. 'Dignos' es natural en español y conserva la escueta clausula final, que además queda abierta como en el texto fuente.
theological_decisions:
- issue: Sentido de 'the written ordinances are nowhere to be found' como ausencia textual o pérdida funcional del orden escrito
  english_pob_reading: likely refers to the effective loss or nullification of Israel's authoritative written order under catastrophe, not necessarily the physical disappearance of every manuscript.
  chosen_spanish_reading: probablemente se refiere a la pérdida efectiva o a la anulación del orden escrito autoritativo de Israel bajo la catástrofe, no necesariamente a la desaparición física de cada manuscrito.
  alternative_spanish_readings:
  - no se hallan manuscritos en ninguna parte
  - los escritos han desaparecido por completo
  rationale: La formulación española evita afirmar más de lo que la nota inglesa permite. 'No se hallan en ninguna parte' deja abierta la tensión entre ausencia material y nulificación funcional del orden escrito.
  doctrine_reference: Texto y transmisión; autoridad de la ley escrita en contexto de desastre
- issue: Clausula final inconclusa y tono de lamento
  english_pob_reading: and we are not worthy,
  chosen_spanish_reading: y no somos dignos,
  alternative_spanish_readings:
  - y no somos dignos de nada,
  - y no somos merecedores,
  rationale: El final con coma reproduce la clausula suspendida del latín y de la revisión inglesa, manteniendo el tono de lamentación incompleta sin cerrar retóricamente el pensamiento.
  doctrine_reference: Retórica bíblica del lamento; humildad humana ante Dios
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó 'pass away from the age' a 'pass through the age' para reflejar mejor pertransimus de saeculo y añadió la coma final para respetar la clausula inconclusa; la versión española sigue ambos cambios con 'atravesamos la edad' y termina en coma.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por norma del proyecto solo cuando el texto lo exija; este versículo no lo contiene.
  - '''Edad'' se emplea para saeculum en sentido de era presente, evitando un falso amigo como ''siglo''.'
  - 'Se conserva el paralelismo sintáctico de las dos comparaciones: ''como langostas'' / ''como vapor''.'
  - La puntuación final queda abierta para reflejar el carácter incompleto del versículo fuente.
