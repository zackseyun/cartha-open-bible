base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/004/052.yaml
  text: You ask insistently; I can tell you in part[4:52], but concerning your life, I have not been sent to tell you, and I do not know.
  footnotes:
  - marker: '4:52'
    text: 'Uriel''s answer remains deliberately partial: he can disclose some signs, but not Ezra''s lifespan. The refusal is part of the book''s theology of limited human access to divine timing.'
    reason: compositional_layer
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:35Z'
    unchanged: false
    changes_summary: Removed material not present in the Latin ('He answered me and said,' and 'Concerning the signs about which you ask me'). Rendered perrogas more directly as 'You ask insistently' and kept the rest close to the source.
translation:
  language: es
  text: Tú preguntas con insistencia; puedo decirte en parte[a], pero respecto de tu vida no he sido enviado para decírtelo, y no lo sé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En parte» conserva la idea de una respuesta parcial, no exhaustiva.
    reason: lexical_alternative
  - marker: b
    text: 'La negativa final mantiene la limitación del conocimiento del mensajero: no afirma más de lo que el latín dice.'
    reason: theological_note
lexical_decisions:
- source_word: perrogas
  english_pob_choice: You ask insistently
  chosen_spanish: Tú preguntas con insistencia
  alternatives_spanish:
  - Insistes en preguntar
  - Preguntas insistentemente
  lexicon: perrogas
  rationale: El latín expresa una acción intensiva o reiterada; en español, «preguntas con insistencia» comunica mejor la fuerza pragmática sin volverlo mecánico ni excesivamente duro.
- source_word: ex parte possum tibi dicere
  english_pob_choice: I can tell you in part
  chosen_spanish: puedo decirte en parte
  alternatives_spanish:
  - puedo decírtelo en parte
  - puedo decirte algo
  lexicon: ex parte
  rationale: «Ex parte» señala parcialidad, no exhaustividad. «En parte» conserva esa limitación de forma natural en español y mantiene la tensión de una revelación incompleta.
- source_word: de vita autem tua
  english_pob_choice: concerning your life
  chosen_spanish: respecto de tu vida
  alternatives_spanish:
  - acerca de tu vida
  - sobre tu vida
  lexicon: de + vita tua
  rationale: La preposición latina introduce el ámbito del tema. «Respecto de» suena sobrio y preciso en registro bíblico contemporáneo.
- source_word: non sum missus dicere tibi
  english_pob_choice: I have not been sent to tell you
  chosen_spanish: no he sido enviado para decírtelo
  alternatives_spanish:
  - no se me ha enviado para decírtelo
  - no me han enviado para decirte
  lexicon: non sum missus
  rationale: La pasiva latina conserva la idea de comisión/mandato. En español, la pasiva perifrástica transmite bien que el mensajero no tiene autorización para comunicar ese dato.
- source_word: sed nescio
  english_pob_choice: and I do not know
  chosen_spanish: y no lo sé
  alternatives_spanish:
  - pero no lo sé
  - y no lo conozco
  lexicon: nescio
  rationale: «Nescio» es una declaración simple de desconocimiento. «No lo sé» es la equivalencia más directa y clara en español.
theological_decisions:
- issue: Revelación parcial y límites del conocimiento del mensajero
  english_pob_reading: You can tell in part, but not Ezra's lifespan; the refusal marks limited human access to divine timing.
  chosen_spanish_reading: puedo decirte en parte, pero respecto de tu vida no he sido enviado para decírtelo, y no lo sé
  alternative_spanish_readings:
  - puedo decirte parcialmente, pero no sobre tu vida
  - puedo decirte algo, pero no todo
  rationale: La redacción conserva la negativa explícita y la restricción de información. No suaviza la frontera entre lo revelado y lo oculto, que es central al sentido teológico del pasaje.
  doctrine_reference: Teología de la revelación limitada y del tiempo divino oculto
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó material no presente en el latín («He answered me and said,» y la referencia explícita a «the signs about which you ask me»). Por eso el español se mantiene directamente unido a perrogas, ex parte, de vita autem tua y sed nescio, sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se usa «vida» para vita, manteniendo la concreción del latín.
  - No se introduce «señales» ni otros complementos ausentes del texto fuente.
  - La estructura española conserva el paralelismo entre la concesión parcial y la negativa sobre la vida.
