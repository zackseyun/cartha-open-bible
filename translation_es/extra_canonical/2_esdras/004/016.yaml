    rationale: El original es fragmentario, pero en español conviene una redacción que mantenga esa brevedad sin sonar torpe. Un leve ajuste mejora la fluidez sin sobreparafrasear.
  revised_spanish_text: Del mismo modo, el curso de las olas del mar; pues la arena se mantuvo firme y las contuvo.
