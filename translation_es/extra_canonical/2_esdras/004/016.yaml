lexical_decisions:
- source_word: Similiter et
  english_pob_choice: Likewise also
  chosen_spanish: Del mismo modo
  alternatives_spanish:
  - Asimismo
  - Igualmente
  lexicon: similiter
  rationale: Expresa la relación de comparación o correspondencia sin sobrecargar el español; «del mismo modo» reproduce el valor de conexión del latín de manera natural y sobria.
- source_word: cogitatus
  english_pob_choice: plan
  chosen_spanish: plan
  alternatives_spanish:
  - propósito
  - pensamiento
  - designio
  lexicon: cogitatus
  rationale: La lectura inglesa ya tomó el término como ‘plan’; en español «plan» conserva la idea de disposición/intención y evita introducir una matización psicológica no exigida por el contexto.
- source_word: fluctuum maris
  english_pob_choice: the waves of the sea
  chosen_spanish: las olas del mar
  alternatives_spanish:
  - las olas del océano
  - las olas del mar
  lexicon: fluctus / mare
  rationale: «Olas del mar» sigue de cerca la imagen latina y resulta idiomático en español; mantiene el plural y la fuerza visual de la metáfora.
- source_word: stetit enim
  english_pob_choice: for ... stood fast
  chosen_spanish: pues ... se mantuvo firme
  alternatives_spanish:
  - porque ... permaneció firme
  - pues ... resistió
  lexicon: stare
  rationale: La idea central es de estabilidad/resistencia; «se mantuvo firme» comunica el resultado sin forzar un sentido físico literal en español.
- source_word: eam / ea
  english_pob_choice: them back
  chosen_spanish: las contuvo
  alternatives_spanish:
  - las detuvo
  - las refrenó
  lexicon: contineo
  rationale: El contexto exige que la arena impide o retiene las olas; «contuvo» expresa esa función de freno con un verbo natural y preciso en español.
theological_decisions:
- issue: Metáfora de la arena que detiene las olas
  english_pob_reading: the sand stood fast and held them back
  chosen_spanish_reading: la arena se mantuvo firme y las contuvo
  alternative_spanish_readings:
  - la arena resistió y las detuvo
  - la arena permaneció firme y las refrenó
  rationale: 'No hay un problema doctrinal directo, pero sí una imagen retórica que debe preservarse: la firmeza de la arena frente al mar. La traducción conserva la metáfora sin suavizarla.'
