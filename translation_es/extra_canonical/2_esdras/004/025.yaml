lexical_decisions:
- source_word: misericordiam consequi
  english_pob_choice: to obtain mercy
  chosen_spanish: obtener misericordia
  alternatives_spanish:
  - alcanzar misericordia
  - conseguir misericordia
  lexicon: misericordia
  rationale: El latín expresa la idea de lograr o alcanzar misericordia; en español, 'obtener misericordia' conserva bien el valor de resultado buscado sin añadir matices no presentes en el texto.
- source_word: Sed quid faciet
  english_pob_choice: But what will he do
  chosen_spanish: Pero ¿qué hará
  alternatives_spanish:
  - Pero ¿qué hará entonces?
  - Pero ¿qué podrá hacer?
  lexicon: hacer
  rationale: La pregunta retórica futura del latín se vierte de manera natural y fiel con '¿qué hará?', manteniendo la continuidad sintáctica y el tono interrogativo.
- source_word: nomini suo
  english_pob_choice: for his name
  chosen_spanish: por su nombre
  alternatives_spanish:
  - para su nombre
  - a favor de su nombre
  lexicon: nombre
  rationale: '''Nomini suo'' puede leerse como referencia al honor o causa vinculada al nombre; ''por su nombre'' es la opción más sobria en español y deja abierta la tensión semántica sin sobreinterpretar.'
- source_word: quod
  english_pob_choice: which
  chosen_spanish: el cual
  alternatives_spanish:
  - que
  lexicon: que / el cual
  rationale: Dado que el texto latino provisto termina en 'quod' y la continuación pertenece al versículo siguiente, el español debe quedar igualmente abierto; 'el cual' reproduce esa dependencia sintáctica incompleta.
theological_decisions:
- issue: Alcance de 'nomini suo'
  english_pob_reading: for his name
  chosen_spanish_reading: por su nombre
  alternative_spanish_readings:
  - para su nombre
  - en favor de su nombre
  rationale: Se conserva la ambigüedad teológica del latín, que puede apuntar al nombre como reputación, honor o causa de acción; no se especifica más allá de lo que el fragmento permite.
  doctrine_reference: Nombre divino / honor del nombre
translation_notes:
  revision_awareness: 'Se respetó la corrección de límite versicular: el texto latino provisto para este versículo termina en ''quod'', así que la traducción española también se deja abierta y no incorpora la continuación del versículo 26.'
  spanish_consistency_notes:
  - Se prefirió 'misericordia' por concordancia con el latín 'misericordiam'.
  - Se evitó cerrar la oración más allá del límite textual dado, manteniendo el suspenso sintáctico del fragmento.
  - La nota al pie está anclada en '[a]' dentro del texto para cumplir la alineación entre marcador y comentario.
