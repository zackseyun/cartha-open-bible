translation:
  language: es
  text: 'Y respondí y dije: «¿Hasta cuándo, y cuándo serán estas cosas? ¿Por qué nuestros años son pocos y malos?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: quo et quando haec?
  english_pob_choice: How long, and when will these things be?
  chosen_spanish: ¿Hasta cuándo, y cuándo serán estas cosas?
  alternatives_spanish:
  - ¿Por cuánto tiempo, y cuándo pasarán estas cosas?
  - ¿Hasta cuándo, y cuándo sucederá esto?
  lexicon: quo / quando
  rationale: 'El latín expresa una doble pregunta temporal: una de duración («hasta cuándo») y otra de momento («cuándo»). En español, «estas cosas» conserva el plural cercano del demostrativo latino y evita volverlo demasiado abstracto.'
- source_word: quare
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A qué viene que
  - ¿Cuál es la razón de que
  lexicon: quare
  rationale: «Por qué» es la forma natural y fiel para una pregunta causal directa, sin añadir interpretación.
- source_word: modici ... anni nostri
  english_pob_choice: our years few
  chosen_spanish: nuestros años son pocos
  alternatives_spanish:
  - nuestros años son breves
  - nuestros años son limitados
  lexicon: modicus
  rationale: «Modici» en este contexto se refiere a escasez o brevedad de los años; «pocos» mantiene la fuerza cuantitativa y la brevedad implícita del latín sin sobreexplicar.
- source_word: mali anni nostri
  english_pob_choice: our years ... evil
  chosen_spanish: nuestros años son ... malos
  alternatives_spanish:
  - nuestros años son ... perversos
  - nuestros años son ... aflictivos
  lexicon: malus
  rationale: «Malos» reproduce la valoración moral/general del latín de manera directa y clara. Otras opciones como «aflictivos» desplazan el sentido hacia sufrimiento más que cualidad negativa.
theological_decisions:
- issue: La doble calificación de los años como pocos y malos
  english_pob_reading: our years few and evil
  chosen_spanish_reading: nuestros años son pocos y malos
  alternative_spanish_readings:
  - nuestros años son breves y malos
  - nuestros años son pocos y perversos
  rationale: El latín conserva ambos adjetivos sin resolver su alcance. En español, mantener «pocos y malos» preserva la tensión entre duración reducida y calidad negativa, sin suavizarla ni moralizarla más allá del texto.
  doctrine_reference: Ninguna doctrina específica; observación sapiencial/lamentativa sobre la condición humana temporal.
translation_notes:
  revision_awareness: La versión revisada coincide con el testigo latino limpiado y con la traducción inglesa auditada; no se documentan revisiones textuales o decisiones de variante que requieran nota adicional.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo interrogativo del original: tiempo («hasta cuándo / cuándo») y causa («por qué»).'
  - Se mantiene el plural demostrativo «estas cosas» para reflejar el neutro plural latino.
  - El verbo copulativo se explicita en español («son») para una lectura natural sin alterar el sentido.
  - No se introducen términos litúrgicos ni eclesiásticos ajenos al texto latino.
