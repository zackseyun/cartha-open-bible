translation:
  language: es
  text: 'Y aconteció que, cuando se cumplieron los cuarenta días, el Altísimo me habló, diciendo: «Las cosas anteriores[a] que escribiste, ponlas públicamente, y»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativamente: «Las cosas primeras». El latín «priora» aquí expresa anterioridad; «primeras» es posible, pero puede sonar más ordinal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Et factum est
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: Narrative formula / discourse marker
  rationale: Aconteció mantiene el giro bíblico narrativo sin sonar tan calcado como «y fue hecho». Conserva el tono de fórmula histórica del latín y del inglés POB.
- source_word: cum conpleti essent XL dies
  english_pob_choice: when the forty days were completed
  chosen_spanish: cuando se cumplieron los cuarenta días
  alternatives_spanish:
  - cuando se completaron los cuarenta días
  - al cumplirse los cuarenta días
  lexicon: Temporal clause
  rationale: «Se cumplieron» expresa con naturalidad la clausula temporal del perfecto pasivo latino con el número cardinal explícito.
- source_word: altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Más Alto
  lexicon: Divine epithet
  rationale: El título consolidado «el Altísimo» conserva el epíteto reverencial sin introducir una paráfrasis explicativa que no está en el texto.
- source_word: locutus est ad me
  english_pob_choice: spoke to me
  chosen_spanish: me habló
  alternatives_spanish:
  - habló conmigo
  - me dijo
  lexicon: Speech formula
  rationale: «Me habló» reproduce el acto de comunicación directa del original de manera idiomática y sobria.
- source_word: priora quae scripsisti
  english_pob_choice: The former things that you wrote
  chosen_spanish: las cosas anteriores que escribiste
  alternatives_spanish:
  - las cosas previas que escribiste
  - lo anterior que escribiste
  lexicon: priora
  rationale: «Priora» tiene valor de anterioridad cronológica; «cosas anteriores» preserva el matiz sin forzar «primeras», que podría desplazar el sentido hacia orden numérico. La revisión inglesa también favorece «former things».
- source_word: in palam pone
  english_pob_choice: set them out publicly
  chosen_spanish: ponlas por escrito
  alternatives_spanish:
  - ponlas en público
  - expónlas públicamente
  lexicon: Publication directive
  rationale: El latín «in palam» pide idea de publicidad/exposición abierta; en español, dentro de este contexto de textos escritos, «ponlas por escrito» comunica la puesta a la vista para lectura pública sin añadir todavía la cláusula de leerlos, que pertenece al verso siguiente según el aparato crítico.
theological_decisions:
- issue: 'Title for God: altissimus'
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - Dios Altísimo
  - el Dios Altísimo
  rationale: Se mantiene el epíteto tradicional sin desplazar el foco hacia una glosa teológica adicional. El título es reverencial y no requiere expansión doctrinal en el verso.
  doctrine_reference: Divine transcendence / reverential title
- issue: 'Boundary of the verse: omission of the reading-for-worthy-and-unworthy clause'
  english_pob_reading: the English POB note for the previous rendering includes the clause, but the latest revision and source review place it in the next verse
  chosen_spanish_reading: The draft ends with «y», leaving the clause for the following verse
  alternative_spanish_readings:
  - integrar la cláusula de lectura pública aquí
  rationale: El paquete fuente y la revisión aplicada muestran que la frase sobre los dignos e indignos pertenece al versículo 46, no al 45. Por fidelidad textual, este verso termina con la conjunción final «y» como en el latín proporcionado.
  doctrine_reference: Textual boundary / verse division
translation_notes:
  revision_awareness: 'El texto inglés auditado fue corregido en dos pasos: primero se eliminó indebidamente la cláusula «let the worthy and the unworthy read them», que pertenece al versículo 46; luego se ajustó «The first things» a «The former things» para reflejar mejor priora. La versión española sigue esa última lectura y respeta el corte del verso dejando la conjunción final abierta.'
  spanish_consistency_notes:
  - Se usa «Altísimo» como título divino estable, coherente con el estilo POB y la norma del proyecto para אל/ὕψιστος cuando designa a Dios.
  - «Las cosas anteriores» mantiene la anterioridad de priora sin imponer un orden ordinal que no está exigido por el latín.
  - Se evita añadir la cláusula de lectura pública completa porque el límite textual del versículo termina en «et», según el paquete fuente y la revisión aplicada.
