translation:
  language: es
  text: Me revelé en la zarza[a], y hablé a Moisés cuando mi pueblo servía en Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Me manifesté».'
    reason: alternative_reading
lexical_decisions:
- source_word: Reuelans reuelatus sum
  english_pob_choice: I revealed myself
  chosen_spanish: Me revelé
  alternatives_spanish:
  - Me manifesté
  - Me di a conocer
  lexicon: revelar / manifestarse
  rationale: El latín duplicado refleja una construcción enfática semítica; en español, «me revelé» comunica bien el acto de hacerse visible o darse a conocer sin sobrecargar el verso con una paráfrasis. «Me manifesté» y «me di a conocer» son alternativas válidas, pero «me revelé» mantiene mejor la concisión y el paralelismo con la tradición textual.
- source_word: super rubum
  english_pob_choice: in the bush
  chosen_spanish: en la zarza
  alternatives_spanish:
  - en la zarza ardiente
  - sobre la zarza
  lexicon: zarza / arbusto
  rationale: «Rubum» designa una zarza o matorral espinoso; el contexto de la teofanía mosaica permite entenderla como la zarza conocida por la tradición bíblica. Se evitó añadir «ardiente» porque no está en el latín base de este pasaje.
- source_word: locutus sum Moysi
  english_pob_choice: I spoke to Moses
  chosen_spanish: hablé a Moisés
  alternatives_spanish:
  - hablé con Moisés
  - le hablé a Moisés
  lexicon: hablar a / con
  rationale: El latín toma un objeto indirecto («Moysi»), por lo que «hablé a Moisés» reproduce con claridad la relación verbal sin introducir matices conversacionales no presentes en la fuente.
- source_word: quando populus meus seruiebat in Aegypto
  english_pob_choice: when my people were serving in Egypt
  chosen_spanish: cuando mi pueblo servía en Egipto
  alternatives_spanish:
  - cuando mi pueblo estaba sirviendo en Egipto
  - cuando mi pueblo era esclavo en Egipto
  lexicon: servir / estar bajo servidumbre
  rationale: «Serviebat» puede expresar servicio o servidumbre. El español «servía» conserva la ambigüedad relativa y sigue de cerca el latín; «era esclavo» sería más interpretativo y no está explicitado en la forma dada.
theological_decisions:
- issue: Autorrevelación divina en la zarza
  english_pob_reading: I revealed myself in the bush
  chosen_spanish_reading: Me revelé en la zarza
  alternative_spanish_readings:
  - Me manifesté en la zarza
  - Me di a conocer en la zarza
  rationale: La frase conserva la teofanía de Éxodo sin forzar una equivalencia confesional posterior. El español mantiene el sujeto implícito divino y la acción de autocomunicación divina.
  doctrine_reference: Teofanía mosaica / Éxodo 3
- issue: Estado de Israel en Egipto
  english_pob_reading: when my people were serving in Egypt
  chosen_spanish_reading: cuando mi pueblo servía en Egipto
  alternative_spanish_readings:
  - cuando mi pueblo estaba sirviendo en Egipto
  - cuando mi pueblo era esclavo en Egipto
  rationale: El latín permite una lectura de servicio o servidumbre. Se preserva la ambigüedad de la fuente para no decidir más de lo que el texto dice, especialmente porque el pasaje no explicita aquí el término de esclavitud.
  doctrine_reference: Éxodo / opresión de Israel en Egipto
translation_notes:
  revision_awareness: La última revisión inglesa eliminó un intensificador innecesario («surely») para volver al sentido llano del latín. Por eso la versión española evita intensificadores añadidos y conserva la sencillez del original, aunque el latín duplicado siga sugiriendo una autodeclaración enfática.
  spanish_consistency_notes:
  - Se usa «zarza» en lugar de «arbusto» para aludir naturalmente a la escena mosaica sin añadir contenido no presente.
  - Se mantiene «Moisés» y no una transliteración alternativa.
  - «Servía» conserva la posible tensión entre servicio y servidumbre que el latín no resuelve explícitamente.
