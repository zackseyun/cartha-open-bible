translation:
  language: es
  text: Pero reserva los últimos setenta[a], para que los entregues a los sabios de tu pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los últimos setenta libros se presentan como sabiduría reservada para los sabios del pueblo de Esdras, un rasgo compositivo clave en la representación de la revelación oculta en 4 Esdras. El testimonio latino visible de este tramo también crea una tensión textual al incluir 'digni et indigni' ('dignos e indignos'), pero la POB sigue aquí la línea contextual de los libros reservados para los sabios.
    reason: compositional_layer_and_textual_tension
lexical_decisions:
- source_word: Nouissimos autem LXX
  english_pob_choice: But keep the last seventy
  chosen_spanish: Pero reserva los últimos setenta
  alternatives_spanish:
  - Pero conserva los últimos setenta
  - Pero guarda los últimos setenta
  lexicon: Nouissimos = últimos; LXX = setenta
  rationale: El latín presenta Nouissimos como “los últimos” y LXX como “setenta”. En español, “reservar” comunica mejor la idea de retener aparte para un fin específico que “conservar” o “guardar”, sin añadir contenido ajeno al texto.
- source_word: ut
  english_pob_choice: so that you may hand them over
  chosen_spanish: para que los entregues
  alternatives_spanish:
  - a fin de que los entregues
  - para que se los entregues
  lexicon: ut = para que / a fin de que
  rationale: La subordinación final se expresa de modo natural con “para que”. “Entregar” conserva la idea de ceder o poner en manos de otros, acorde con el contexto de transmisión selectiva de escritos.
- source_word: digni et indigni
  english_pob_choice: the wise among your people
  chosen_spanish: a los sabios de tu pueblo
  alternatives_spanish:
  - a los dignos e indignos
  - a los merecedores y los no merecedores
  lexicon: digni et indigni = dignos e indignos; contextually linked to the wise among your people
  rationale: El texto latino visible contiene una tensión entre ‘dignos e indignos’ y la versión auditada en inglés que interpreta el destinatario como ‘los sabios de tu pueblo’. En el español principal se sigue la lectura compositiva documentada por la POB, pues el contexto de 4 Esdras trata la revelación reservada a los sabios; no obstante, se reconoce la tensión textual en nota.
theological_decisions:
- issue: Destino de los setenta libros finales como sabiduría reservada
  english_pob_reading: The final seventy books are presented as esoteric wisdom reserved for the wise among Ezra's people, a key compositional feature in 4 Ezra's portrayal of hidden revelation.
  chosen_spanish_reading: Los últimos setenta quedan reservados para los sabios de tu pueblo, como sabiduría escondida.
  alternative_spanish_readings:
  - Los últimos setenta quedan para los dignos e indignos de tu pueblo.
  - Los últimos setenta se entregan a los sabios de tu pueblo.
  rationale: 'La POB inglesa entiende esta línea como un rasgo compositivo de revelación oculta: los setenta finales no se difunden indiscriminadamente, sino que se reservan para un grupo cualificado. El español conserva esa función teológica con ‘reserva’ y ‘sabios’, sin borrar la tensión del latín transmitido.'
  doctrine_reference: 4 Esdras 14:46; tema de revelación reservada / sabiduría oculta
translation_notes:
  revision_awareness: El inglés POB no requirió cambios en la última revisión registrada (high_agreement, unchanged=true). El español sigue esa lectura auditada sin introducir reinterpretaciones nuevas; solo explicita en español la tensión visible del latín entre ‘digni et indigni’ y la función compositiva de los ‘setenta últimos’.
  spanish_consistency_notes:
  - Se mantiene ‘sabios’ para la lectura compositiva auditada, en coherencia con el uso de revelación reservada en 4 Esdras.
  - Se evita ‘SEÑOR’ u otras sustituciones no pertinentes; el texto no contiene nombres divinos.
  - Se conserva ‘setenta’ numéricamente por tratarse de una cifra textual exacta.
  - La nota de versículo se ancla en la cifra para reproducir el aparato auditado de la POB.
