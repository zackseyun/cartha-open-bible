- source_word: dico
  english_pob_choice: I say
  chosen_spanish: digo
  alternatives_spanish:
  - afirmo
  - te digo
  lexicon: dico
  rationale: «Digo» reproduce de manera directa la primera persona presente del verbo latino. La colocación «te digo» ya queda implicada por el dativo «te» en español, y el colon introduce la continuación del discurso.
