translation:
  language: es
  text: por cuarenta días. Pero tú, prepárate muchas tablillas de escribir[a] y lleva contigo a Sarea, Dabria, Selemia, Ethan y Asiel, cinco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El latín buxos apunta literalmente a tablillas de boj o de madera de boj; aquí se da el sentido funcional de ‘tablillas de escribir’.
    reason: cultural_note
lexical_decisions:
- source_word: diebus XL
  english_pob_choice: for forty days
  chosen_spanish: por cuarenta días
  alternatives_spanish:
  - durante cuarenta días
  - por espacio de cuarenta días
  lexicon: Latin dies + numeral XL
  rationale: La preposición temporal 'por' expresa bien la duración del periodo, de forma natural y fiel al latín.
- source_word: praepara tibi
  english_pob_choice: prepare for yourself
  chosen_spanish: prepárate
  alternatives_spanish:
  - prepárate para ti
  - prepara para ti mismo
  lexicon: Latin praeparo + dativo reflexivo
  rationale: El reflexivo español 'prepárate' comunica con claridad el sentido de acción dirigida a sí mismo sin sonar forzado.
- source_word: buxos multos
  english_pob_choice: many writing tablets
  chosen_spanish: muchos tablillas de escribir
  alternatives_spanish:
  - muchas tablillas de escribir
  - muchas tablas de escribir
  lexicon: Latin buxus / buxos
  rationale: 'Se conserva el valor funcional que adopta la traducción inglesa POB: no tanto el material botánico literal, sino el objeto para escribir. Se mantiene la tensión lexical mediante nota porque el latín remite literalmente a tablillas de boj.'
- source_word: Saream, Dabriam, Selemiam, Ethanum et Asihel
  english_pob_choice: Sarea, Dabria, Selemia, Ethan, and Asiel
  chosen_spanish: Sarea, Dabria, Selemia, Ethan y Asiel
  alternatives_spanish:
  - Sarea, Dabria, Selema, Ethan y Asiel
  - Sarea, Dabria, Selemia, Etán y Asiel
  lexicon: Nombres propios latinos
  rationale: Se conservan los nombres propios con adaptación ortográfica mínima y sin españolizar indebidamente formas que el texto fuente presenta como nombres transmitidos.
- source_word: quinque
  english_pob_choice: five
  chosen_spanish: cinco
  alternatives_spanish:
  - cinco en total
  - cinco personas
  lexicon: Latin quinque
  rationale: Se traduce de manera directa el numeral final añadido en la revisión inglesa para reflejar el latín.
translation_notes:
  revision_awareness: La versión inglesa revisada añadió el último quinque (“five”), que aquí se refleja con 'cinco'. También se conserva el sentido funcional de buxos como utensilios de escritura, con nota cultural para no perder el matiz literal del latín.
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y la puntuación compatible con una sección narrativa breve.
  - La marca de nota [a] aparece exactamente en el punto donde se introduce la elección funcional 'tablillas de escribir'.
  - No se añadieron decisiones teológicas porque el versículo es principalmente instructivo y nominal.
