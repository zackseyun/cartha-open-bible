- from: Porque serás tomado[a] de entre los hombres, y permanecerás con mi hijo y con los que son como tú hasta que los tiempos se hayan cumplido.
  to: Porque serás tomado de entre los hombres, y permanecerás el resto del tiempo[a] con mi hijo y con los que son como tú hasta que los tiempos se hayan cumplido.
  rationale: Se añade «el resto del tiempo» para reflejar explícitamente residuum sin sobreinterpretar el verbo latino. Se reemplaza la nota al pie por una alternativa alineada con el historial de auditoría inglesa («habitarás con mi hijo»), en lugar de una variante sobre reciperis que no está respaldada como nota principal por el expediente. No se requiere adjudicación adicional porque el ajuste es pequeño, claro y directamente apoyado por el latín y la auditoría.
