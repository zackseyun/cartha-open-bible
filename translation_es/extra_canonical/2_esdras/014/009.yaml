base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/014/009.yaml
  text: For you will be taken up from among men[a], and you will remain with my son and with those like you until the times are finished.
  footnotes:
  - marker: a
    text: Or 'and you will dwell with my son'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:52:00Z'
    unchanged: false
    changes_summary: Replaced 'henceforth you will dwell' with 'you will remain' to better reflect Latin conuerteris residuum without adding interpretive force. Kept 'taken up from among men' and the rest of the verse substantially unchanged.
translation:
  language: es
  text: Porque serás tomado de entre los hombres, y permanecerás el resto del tiempo[a] con mi hijo y con los que son como tú hasta que los tiempos se hayan cumplido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y habitarás con mi hijo».'
    reason: Preserva la alternativa histórica documentada en la auditoría inglesa para conuerteris, mientras el texto principal explicita el matiz temporal de residuum.
lexical_decisions:
- source_word: reciperis ab hominibus
  english_pob_choice: you will be taken up from among men
  chosen_spanish: serás tomado de entre los hombres
  alternatives_spanish:
  - serás llevado de entre los hombres
  - serás arrebatado de entre los hombres
  lexicon: reciperis
  rationale: El latín pasivo futuro sugiere una acción de ser retirado o tomado fuera de entre la humanidad. «Tomado de entre los hombres» conserva la direccionalidad sin añadir más interpretación que «arrebatado», y evita forzar una imagen que el texto latino no explicita.
- source_word: conuerteris residuum
  english_pob_choice: you will remain
  chosen_spanish: permanecerás
  alternatives_spanish:
  - te quedarás
  - estarás el resto del tiempo
  lexicon: conuerteris residuum
  rationale: La revisión inglesa corrigió «henceforth you will dwell» a «you will remain» para reflejar mejor residuum. En español, «permanecerás» transmite la continuidad durante el tiempo restante sin sobrecargar con un adverbio interpretativo.
- source_word: cum filio meo
  english_pob_choice: with my son
  chosen_spanish: con mi hijo
  alternatives_spanish:
  - junto con mi hijo
  - con mi Hijo
  lexicon: cum filio meo
  rationale: Se mantiene la relación de compañía indicada por cum. «Mi hijo» reproduce el latín de forma directa; no se capitaliza porque el texto fuente no lo marca explícitamente y la identificación mesiánica se deja al contexto.
- source_word: cum similibus tuis
  english_pob_choice: with those like you
  chosen_spanish: con los que son como tú
  alternatives_spanish:
  - con tus semejantes
  - con los que te son semejantes
  lexicon: similibus tuis
  rationale: «Los que son como tú» conserva el sentido comparativo del latín sin introducir un sustantivo más interpretativo. Es más natural en español actual que una calca como «tus semejantes».
- source_word: usquequo finiantur tempora
  english_pob_choice: until the times are finished
  chosen_spanish: hasta que los tiempos se hayan cumplido
  alternatives_spanish:
  - hasta que los tiempos terminen
  - hasta que se acaben los tiempos
  lexicon: usquequo finiantur tempora
  rationale: «Se hayan cumplido» refleja bien la clausura escatológica del latín finiantur y conserva un registro bíblico claro. «Los tiempos» mantiene el plural del original, importante para el matiz de períodos determinados.
theological_decisions:
- issue: Relación entre «mi hijo» y el sentido mesiánico del pasaje
  english_pob_reading: with my son
  chosen_spanish_reading: con mi hijo
  alternative_spanish_readings:
  - con mi Hijo
  - con el Mesías
  rationale: El texto latino dice filio meo sin un título explícito. Para no añadir una identificación no presente en esta cláusula, se conserva «mi hijo». La lectura mesiánica queda sugerida por el contexto del libro, no impuesta por esta línea.
  doctrine_reference: Christological identification in 4 Ezra 14 context; source-limited rendering
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió una interpretación demasiado fuerte de conuerteris residuum. Por eso el español evita «desde ahora habitarás» o «henceforth vivirás» y opta por «permanecerás», que conserva la idea de duración restante sin añadir un matiz no exigido por el latín. También se mantuvo el plural «los tiempos» y la compañía con «mi hijo y con los que son como tú» tal como exige el texto fuente.
  spanish_consistency_notes:
  - Se usa «hijo» en minúscula para seguir de cerca el latín filio meo y no resolver aquí la identificación cristológica.
  - «Los tiempos» se conserva en plural por fidelidad al latín tempora.
  - El pasaje se formula en futuro con valor profético, coherente con el tono del original.
