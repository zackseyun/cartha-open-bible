translation:
  language: es
  text: Durante cuarenta días ellos escribían de día, pero de noche comían pan; en cuanto a mí, yo hablaba de día, y de noche no callaba.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: XL diebus
  english_pob_choice: They wrote by day
  chosen_spanish: Durante cuarenta días ellos escribían de día
  alternatives_spanish:
  - Por cuarenta días ellos escribían de día
  - Durante cuarenta días ellos trabajaban escribiendo de día
  lexicon: Latin XL = cuarenta; diebus = días; per diem = de día
  rationale: Conserva el dato temporal explícito de la fuente latina (“XL diebus”) y el valor distributivo de “per diem” como “de día”. Opté por el pluscuamperfecto imperfectivo español (“escribían”) para reflejar acción continua durante el período.
- source_word: ipsi autem per diem scribebant
  english_pob_choice: They wrote by day
  chosen_spanish: ellos escribían de día
  alternatives_spanish:
  - ellos escribían durante el día
  - ellos estaban escribiendo de día
  lexicon: ipsi = ellos mismos; autem = pero/en cambio; scribebant = escribían
  rationale: “Ellos” conserva el sujeto enfático de ipsi sin sobrecargarlo. “Pero” reproduce el contraste de autem con naturalidad en español. “Escribían” mantiene el aspecto durativo del imperfecto latino.
- source_word: Et nocte manducabant panem
  english_pob_choice: at night they ate bread
  chosen_spanish: pero de noche comían pan
  alternatives_spanish:
  - y de noche comían pan
  - pero de noche comían el pan
  lexicon: et = y/pero; nocte = de noche; manducabant = comían; panem = pan
  rationale: La coordinación “pero” comunica mejor el giro contrastivo que el simple “y” dentro de la secuencia. “Comían pan” sigue de cerca el sustantivo concreto de la fuente sin añadir matiz interpretativo.
- source_word: ego autem per diem loquebar
  english_pob_choice: As for me, I spoke by day
  chosen_spanish: en cuanto a mí, yo hablaba de día
  alternatives_spanish:
  - pero yo hablaba de día
  - yo hablaba de día
  lexicon: ego autem = en cuanto a mí / pero yo; per diem = de día; loquebar = hablaba
  rationale: “En cuanto a mí” reproduce bien el cambio enfático de ego autem sin sonar forzado. “Hablaba” conserva el imperfecto y la continuidad de la acción durante el día.
- source_word: et nocte non
  english_pob_choice: and at night I was not silent
  chosen_spanish: y de noche no callaba
  alternatives_spanish:
  - y de noche no me callaba
  - y de noche no permanecía en silencio
  lexicon: et = y; nocte = de noche; non = no; implied continuation = silent/not silent
  rationale: La cláusula latina está truncada en el testimonio, pero el sentido auditado por la versión inglesa POB es “I was not silent”. “No callaba” expresa de manera idiomática y fiel la ausencia de silencio sin introducir un pronombre reflexivo innecesario.
theological_decisions:
- issue: Reconstrucción de una cláusula latina truncada al final
  english_pob_reading: I was not silent
  chosen_spanish_reading: no callaba
  alternative_spanish_readings:
  - no me callaba
  - no permanecía en silencio
  rationale: La fuente latina conservada termina en “et nocte non”, pero el audit trail inglés fija el sentido completo como “I was not silent”. En español, “no callaba” es la manera más breve y fiel de cerrar esa elipsis sin añadir contenido no atestiguado.
  doctrine_reference: No aplica; decisión textual y de claridad, no doctrinal.
translation_notes:
  revision_awareness: El texto fuente latino está truncado al final; se siguió el consenso del audit trail inglés, que ya resolvió la frase como “I was not silent”. No hubo revisiones posteriores que alteraran el sentido.
  spanish_consistency_notes:
  - Se mantuvo “de día / de noche” para conservar el paralelismo temporal de la línea latina.
  - Se prefirió “hablaba” y “callaba” en imperfecto para reflejar la acción continuada del original.
  - No se introdujeron términos eclesiásticos o interpretativos ajenos al texto fuente.
