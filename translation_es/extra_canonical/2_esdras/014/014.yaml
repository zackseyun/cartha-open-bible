translation:
  language: es
  text: Y aparta de ti los pensamientos mortales, y arroja de ti las cargas humanas, y despójate ya de tu naturaleza débil, y deja a un lado los pensamientos que más te agobian.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: mortales cogitationes
  english_pob_choice: mortal thoughts
  chosen_spanish: pensamientos mortales
  alternatives_spanish:
  - pensamientos de muerte
  - pensamientos mortales y pasajeros
  lexicon: cogitationes
  rationale: Mantengo el valor directo de cogitationes como «pensamientos». «Mortales» conserva el matiz de lo perecedero, no solo de lo contrario a la vida espiritual, y sigue de cerca el latín sin endurecerlo innecesariamente.
- source_word: pondera humana
  english_pob_choice: human burdens
  chosen_spanish: cargas humanas
  alternatives_spanish:
  - pesos humanos
  - cargas del hombre
  lexicon: pondera
  rationale: «Pondera» puede ser literalmente «pesos», pero en español «cargas» comunica con naturalidad la imagen de algo que oprime o agobia. «Humanas» conserva el contraste con lo divino o espiritual implícito en el latín.
- source_word: exue te iam infirmam naturam
  english_pob_choice: strip off now your weak nature
  chosen_spanish: despréndete ya de tu naturaleza débil
  alternatives_spanish:
  - desnúdate ya de tu débil naturaleza
  - quítate ahora tu naturaleza débil
  lexicon: exue / infirmam naturam
  rationale: Uso un reflexivo idiomático en español para exue te («despréndete de ti mismo / quítate de encima») y conservo «naturaleza débil» para no suavizar infirmam. «Naturaleza débil» mantiene la tensión antropológica del texto.
- source_word: molestissima tibi cogitamenta
  english_pob_choice: the thoughts that are most grievous to you
  chosen_spanish: los pensamientos que más te agobian
  alternatives_spanish:
  - los pensamientos que más te afligen
  - los pensamientos más molestos para ti
  lexicon: cogitamenta
  rationale: «Cogitamenta» vuelve a traducirse por «pensamientos». «Agobian» reproduce bien la idea de carga dolorosa o gravosa implícita en molestissima sin sonar excesivamente técnico o arcaizante.
theological_decisions:
- issue: Antropología y exhortación ascética en una enumeración de imperativos
  english_pob_reading: And put away... and cast off... and strip off... and set aside...
  chosen_spanish_reading: Y aparta... y arroja... y despréndete... y deja a un lado...
  alternative_spanish_readings:
  - Y desecha... y quita... y vístete de una nueva naturaleza...
  rationale: El texto latino presenta una serie de imperativos consecutivos con fuerza exhortativa. Conservo esa cadencia y no la convierto en una paráfrasis moralizante. «Despréndete de tu naturaleza débil» mantiene la dureza del llamado sin añadir ideas ausentes.
  doctrine_reference: Antropología bíblica / exhortación ética
- issue: Traducción de naturam infirmam sin neutralizar la tensión del original
  english_pob_reading: your weak nature
  chosen_spanish_reading: tu naturaleza débil
  alternative_spanish_readings:
  - tu frágil naturaleza
  - tu naturaleza enferma
  rationale: «Débil» es la equivalencia más directa de infirmam y evita introducir connotaciones clínicas o psicológicas no garantizadas. También preserva la tensión del pasaje, que habla de una condición humana que debe ser dejada atrás.
  doctrine_reference: Antropología / fragilidad humana
translation_notes:
  revision_awareness: El pasaje coincide con la traducción auditada en inglés y con el control de revisión más reciente, que indicó alta concordancia y que no eran necesarios cambios. La versión española sigue directamente el latín limpio aportado y toma el inglés POB solo como contexto auditado para decisiones de equivalencia.
  spanish_consistency_notes:
  - Conservo una secuencia paralela de imperativos para reflejar la estructura acumulativa del latín.
  - Mantengo «pensamientos» para cogitationes/cogitamenta en todo el verso, porque el contexto no exige diferenciarlos en español.
  - Uso «naturaleza débil» en singular, como el latín infirmam naturam, sin añadir determinantes o glosas ajenas al texto.
  - Evito «SEÑOR» u այլ lenguaje litúrgico, porque el verso no contiene nombres divinos ni títulos cristológicos.
