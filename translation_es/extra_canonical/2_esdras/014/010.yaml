translation:
  language: es
  text: Porque la edad ha perdido su juventud, y los tiempos se acercan a la vejez.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Quoniam
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: conjunción causal
  rationale: Introduce la causa de la afirmación de modo natural en español, manteniendo la relación explicativa del latín y del inglés POB.
- source_word: saeculum
  english_pob_choice: the age
  chosen_spanish: la era
  alternatives_spanish:
  - el siglo
  - el mundo
  - la edad
  lexicon: saeculum
  rationale: ‘Saeculum’ aquí apunta al orden/curso de la época o era; ‘era’ conserva mejor el alcance temporal amplio que ‘siglo’ y evita la posible lectura de ‘mundo’.
- source_word: perdidit
  english_pob_choice: has lost
  chosen_spanish: ha perdido
  alternatives_spanish:
  - perdió
  - se ha quedado sin
  lexicon: perdere
  rationale: 'El perfecto latino se vierte bien con perfecto compuesto en español para preservar el estado resultante: la era queda sin juventud.'
- source_word: iuventutem suam
  english_pob_choice: its youth
  chosen_spanish: su juventud
  alternatives_spanish:
  - su vigor
  - su lozanía
  lexicon: iuventus
  rationale: ‘Juventud’ reproduce directamente la imagen temporal y antropomórfica del original; ‘vigor’ o ‘lozanía’ serían interpretativos.
- source_word: tempora
  english_pob_choice: the times
  chosen_spanish: los tiempos
  alternatives_spanish:
  - las épocas
  - los días
  lexicon: tempora
  rationale: Se mantiene la pluralidad abstracta de ‘tempora’ con ‘los tiempos’, fórmula transparente y fiel en español bíblico actual.
- source_word: adpropinquant
  english_pob_choice: are drawing near
  chosen_spanish: se acercan
  alternatives_spanish:
  - están llegando
  - se aproximan
  lexicon: appropinquare
  rationale: ‘Se acercan’ expresa con naturalidad el movimiento hacia un límite sin añadir intensidad no exigida por el latín.
- source_word: senescere
  english_pob_choice: to old age
  chosen_spanish: a la vejez
  alternatives_spanish:
  - a envejecer
  - a la senectud
  lexicon: senescere
  rationale: ‘Senescere’ describe volverse viejo; ‘a la vejez’ conserva la imagen de llegada a ese estado de manera clara y digna.
theological_decisions:
- issue: Imagen temporal de decadencia histórica
  english_pob_reading: For the age has lost its youth, and the times are drawing near to old age.
  chosen_spanish_reading: Porque la era ha perdido su juventud, y los tiempos se acercan a la vejez.
  alternative_spanish_readings:
  - Porque el siglo ha perdido su juventud, y los tiempos se acercan a la vejez.
  - Porque la edad ha perdido su juventud, y los tiempos se acercan a envejecer.
  rationale: El verso usa una metáfora de envejecimiento del orden temporal. ‘Era’ y ‘vejez’ preservan la metáfora sin desplazarla a un registro demasiado moderno o demasiado técnico. No se introduce una interpretación escatológica más allá de lo que el texto dice.
  doctrine_reference: Metáfora bíblica del envejecimiento del mundo/tiempo; sin afirmación doctrinal explícita más allá de la imagen poética.
translation_notes:
  revision_awareness: 'La revisión más reciente no hizo cambios (''unchanged: true''); el consenso de control cruzado fue de alta concordancia (''agree'', 1.0), por lo que no se incorporan variantes textuales adicionales.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u otras sustituciones porque el verso no contiene el nombre divino.
  - Se mantiene el paralelismo sintáctico simple del latín y del inglés POB para conservar el tono sentencioso.
  - ‘Era’ se usa como equivalente de amplio alcance para saeculum; en contextos cercanos podría variar, pero aquí comunica bien la idea de una época que envejece.
