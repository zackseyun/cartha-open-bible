translation:
  language: es
  text: Por tanto, ahora pon en orden tu casa[a], reprende a tu pueblo, consuela a sus humildes, y ahora renuncia a la vida corruptible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pon tu casa en orden».
    reason: alternative_reading
lexical_decisions:
- source_word: domum tuam dispone
  english_pob_choice: set your house in order
  chosen_spanish: pon en orden tu casa
  alternatives_spanish:
  - ordena tu casa
  - pon tu casa en orden
  lexicon: domus -> casa; disponere -> poner en orden
  rationale: La imagen idiomática se conserva de forma natural en español. ‘Pon en orden tu casa’ expresa el mandato con claridad y mantiene el valor práctico y preparatorio del latino.
- source_word: corripe populum tuum
  english_pob_choice: reprove your people
  chosen_spanish: reprende a tu pueblo
  alternatives_spanish:
  - corrige a tu pueblo
  - amonesta a tu pueblo
  lexicon: corripere -> reprender, corregir, amonestar
  rationale: ‘Reprende’ comunica bien la fuerza exhortativa y disciplinaria del verbo sin suavizarlo demasiado. ‘Corrige’ podría sonar más pedagógico; ‘amonesta’ es posible, pero menos directo.
- source_word: consolare humiles eorum
  english_pob_choice: comfort their humble ones
  chosen_spanish: consuela a sus humildes
  alternatives_spanish:
  - consuela a los humildes de ellos
  - conforta a sus humildes
  lexicon: humiles -> humildes, los abatidos, los de condición baja
  rationale: Se mantiene ‘humildes’ porque el sustantivo latino admite personas de condición humilde o abatida; en español, la forma breve conserva la ambigüedad útil sin añadir interpretación excesiva.
- source_word: renuntia iam corruptae uitae
  english_pob_choice: renounce the corruptible life now
  chosen_spanish: renuncia a la vida corruptible ahora
  alternatives_spanish:
  - renuncia a la vida perecedera ahora
  - renuncia ahora a la vida corruptible
  lexicon: renuntiare -> renunciar; corrupta uita -> corruptible/perishable life
  rationale: Se adopta ‘vida corruptible’ siguiendo la revisión inglesa que corrige la lectura moralizante de ‘corrupt life’. En español, ‘corruptible’ preserva la idea de mortalidad/perishabilidad, no de depravación ética.
theological_decisions:
- issue: Sentido de corruptae uitae
  english_pob_reading: corruptible life
  chosen_spanish_reading: vida corruptible
  alternative_spanish_readings:
  - vida perecedera
  - vida mortal
  rationale: El contexto inmediato y la revisión inglesa apuntan a la fragilidad mortal de la existencia, no a un juicio sobre conducta inmoral. ‘Vida corruptible’ mantiene esa tensión escatológica y antropológica.
  doctrine_reference: Antropología bíblica; mortalidad humana; espera de la asunción de Ezra en 4 Esdras
translation_notes:
  revision_awareness: La traducción sigue la revisión auditada que corrigió el final desde una lectura moralizante (‘corrupt life’) a ‘corruptible life’. En español se refleja con ‘vida corruptible’, y se conserva la nota alternativa para el inicio idiomático de la frase.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, sin arcaísmos innecesarios.
  - ‘Humildes’ conserva la ambigüedad del latino entre personas humildes y personas abatidas, sin especificación añadida.
  - ‘Corruptible’ se eligió deliberadamente para evitar la connotación de corrupción moral que tendría ‘corrupta’ en español.
