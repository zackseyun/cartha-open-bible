base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/014/029.yaml
  text: And they received the law of life, which they did not keep, which you also transgressed after them.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:29:42Z'
    unchanged: false
    changes_summary: Removed the unnecessary conjunction 'and' before the second relative clause and simplified 'have transgressed' to 'transgressed' for a more natural rendering matching the Latin.
translation:
  language: es
  text: Y recibieron la ley de la vida, que no guardaron, la cual también tú transgrediste después de ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: legem uitae
  english_pob_choice: the law of life
  chosen_spanish: la ley de la vida
  alternatives_spanish:
  - la ley vital
  - la ley que da vida
  lexicon: lexical
  rationale: Mantiene de cerca la construcción latina y la imagen jurídica/teológica de una 'ley' relacionada con la vida. 'Ley de la vida' es natural en español y conserva la tensión entre norma y vida sin explicitar más de lo que el texto da.
- source_word: custodierunt
  english_pob_choice: did not keep
  chosen_spanish: no guardaron
  alternatives_spanish:
  - no observaron
  - no cumplieron
  lexicon: lexical
  rationale: '''Guardar'' transmite bien en español la idea bíblica de observar/guardar una ley. Es más compacto y fiel al valor normativo que ''cumplir'' en este contexto.'
- source_word: transgressed
  english_pob_choice: transgressed
  chosen_spanish: transgrediste
  alternatives_spanish:
  - quebrantaste
  - violaste
  lexicon: lexical
  rationale: '''Transgrediste'' conserva el mismo nivel semántico y formal que el inglés POB, y refleja con precisión el verbo latino sin suavizarlo.'
theological_decisions:
- issue: Responsabilidad compartida en la desobediencia
  english_pob_reading: which you also transgressed after them
  chosen_spanish_reading: la cual también tú transgrediste después de ellos
  alternative_spanish_readings:
  - que también tú quebrantaste después de ellos
  - la cual también tú violaste tras ellos
  rationale: Se mantiene la acusación directa y el orden relativo de la frase, sin introducir matices interpretativos adicionales. 'Después de ellos' conserva la dependencia histórica y moral indicada por el original.
  doctrine_reference: Exhortación profética / continuidad del pecado y la culpa
- issue: '''Ley de la vida'' como expresión teológica'
  english_pob_reading: the law of life
  chosen_spanish_reading: la ley de la vida
  alternative_spanish_readings:
  - la ley que da vida
  - la ley vital
  rationale: No se paraphrasea a 'la ley que da vida' porque eso explicita una relación causal que el latín no formula aquí. Se preserva la expresión breve y potencialmente cargada para dejar intacta la ambigüedad textual.
  doctrine_reference: Torá como don de vida / obediencia pactal
translation_notes:
  revision_awareness: La revisión inglesa eliminó una conjunción innecesaria antes de la segunda relativa y simplificó el tiempo verbal para ajustarse mejor al latín. La versión española sigue esa misma línea sintáctica, evitando una coordinación añadida y usando un pretérito simple natural en español.
  spanish_consistency_notes:
  - Se mantiene 'ley' para legem en lugar de un término eclesial más interpretativo.
  - '''Transgrediste'' conserva el registro formal y jurídico del original.'
  - No se introduce mayúscula teológica en 'vida' porque el sintagma latino no lo exige.
