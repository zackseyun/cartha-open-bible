translation:
  language: es
  text: Y en cuarenta días se escribieron noventa y cuatro libros[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cifra del texto latino transmitido es textualmente difícil; aquí se sigue el sentido ampliamente reconocido de noventa y cuatro libros, en línea con la lectura auditada de la POB inglesa.
