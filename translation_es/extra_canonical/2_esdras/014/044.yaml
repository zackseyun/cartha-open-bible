lexical_decisions:
- source_word: Scripti sunt
  english_pob_choice: And ... were written
  chosen_spanish: se escribieron
  alternatives_spanish:
  - fueron escritos
  - se habían escrito
  lexicon: Latin passive impersonal
  rationale: El pasivo latino en forma impersonal se expresa con naturalidad en español mediante la pasiva refleja 'se escribieron', que conserva el hecho textual sin sobrecargar el estilo.
- source_word: in XL diebus
  english_pob_choice: in forty days
  chosen_spanish: en cuarenta días
  alternatives_spanish:
  - durante cuarenta días
  - a lo largo de cuarenta días
  lexicon: Latin temporal phrase
  rationale: '''En cuarenta días'' reproduce de manera directa el marco temporal del original y mantiene la concisión del texto fuente.'
- source_word: libri DCCCClIIII
  english_pob_choice: ninety-four books
  chosen_spanish: noventa y cuatro libros
  alternatives_spanish:
  - noventa y cuatro escritos
  - noventa y cuatro rollos
  lexicon: Latin numeral + libri
  rationale: La cifra latina transmitida es textual y difícil; se sigue la lectura de la POB inglesa 'ninety-four books' para mantener la equivalencia auditada. 'Libri' se traduce literalmente por 'libros', como término neutral para escritos.
theological_decisions:
- issue: Tratamiento de la cifra textual difícil
  english_pob_reading: The numeral in the Latin line is textually difficult as transmitted. The chapter's widely recognized sense is ninety-four books.
  chosen_spanish_reading: La cifra del texto latino es textualmente difícil en su forma transmitida; se adopta el sentido reconocido de noventa y cuatro libros.
  alternative_spanish_readings:
  - Conservar la cifra transmitida sin aclaración
  - Anotar otra reconstrucción numérica
  rationale: La POB inglesa explicita la tensión textual y opta por el sentido ampliamente reconocido. En español se conserva esa misma decisión, sin ocultar la dificultad del testimonio latino.
  doctrine_reference: Crítica textual; ninguna implicación doctrinal directa
translation_notes:
  revision_awareness: El contexto de revisión indica que no hubo cambios necesarios y que el acuerdo con el control cruzado fue alto; por eso se mantiene la solución breve y estable de la POB inglesa, sin ampliar más allá de la evidencia textual.
  spanish_consistency_notes:
  - Se mantiene 'libros' para 'libri' como término literal y sobrio.
  - Se evita 'SEÑOR' u otras convenciones no pertinentes porque el pasaje no contiene léxico divino.
  - Se conserva el número escrito con palabras para la fluidez editorial en español.
  - 'La nota textual acompaña la única tensión significativa del verso: la cifra transmitida.'
