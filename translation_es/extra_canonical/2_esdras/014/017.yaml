lexical_decisions:
- source_word: super inhabitantes in eo mala
  english_pob_choice: upon those who dwell in it
  chosen_spanish: sobre los habitantes en ella
  alternatives_spanish:
  - contra los que habitan en ella
  - sobre sus habitantes
  lexicon: super -> sobre; inhabitantes -> habitantes; in eo -> en ella
  rationale: El latín es conciso y no especifica explícitamente un verbo de juicio; 'sobre los habitantes en ella' conserva la preposición de alcance de 'super' y el referente neutro de 'in eo' sin añadir una carga más interpretativa que el texto base no exige.
- source_word: ueritas
  english_pob_choice: truth will withdraw farther away
  chosen_spanish: la verdad se alejará más
  alternatives_spanish:
  - la verdad se apartará más
  - la verdad retrocederá más
  lexicon: ueritas -> verdad
  rationale: '''Alejarse'' transmite bien el movimiento espacial/metafórico de la verdad que se retira. Se evita intensificar demasiado el matiz con un verbo más interpretativo que el latín no obliga.'
- source_word: mendacium
  english_pob_choice: falsehood
  chosen_spanish: la falsedad
  alternatives_spanish:
  - la mentira
  - el engaño
  lexicon: mendacium -> falsedad
  rationale: '''Falsedad'' conserva el sustantivo abstracto y el contraste formal con ''verdad''. ''Mentira'' sería natural, pero puede sonar más concreto; ''falsedad'' mantiene mejor el paralelismo.'
- source_word: aquila
  english_pob_choice: the eagle
  chosen_spanish: el águila
  alternatives_spanish:
  - el águila imperial
  - el águila
  lexicon: aquila -> águila
  rationale: Se conserva el animal-símbolo sin ampliar el sentido. El texto latino no introduce en este versículo una reinterpretación adicional del símbolo.
- source_word: festinat uenire
  english_pob_choice: is hastening to come
  chosen_spanish: se apresura a venir
  alternatives_spanish:
  - se apresura en venir
  - está por venir con rapidez
  lexicon: festinare -> apresurarse; venire -> venir
  rationale: '''Se apresura a venir'' reproduce de forma natural el valor de urgencia y movimiento del latín, sin sobrecargar con perífrasis que cambien el tono profético.'
theological_decisions:
- issue: Tratamiento de la 'verdad' y la 'falsedad' como fuerzas que se acercan/alejan
  english_pob_reading: truth will withdraw farther away, and falsehood will draw near
  chosen_spanish_reading: la verdad se alejará más, y la falsedad se acercará
  alternative_spanish_readings:
  - la verdad se apartará más, y la mentira se acercará
  - la verdad retrocederá más, y el engaño se acercará
  rationale: Se mantiene el paralelismo moral y escatológico del original y del audit trail inglés, sin convertirlo en una explicación doctrinal más amplia. 'Verdad' y 'falsedad' conservan la abstracción del latín y la tensión literaria del pasaje.
  doctrine_reference: No doctrinal addition; preserves apocalyptic contrast in the source.
- issue: Referencia al águila visionaria
  english_pob_reading: the eagle that you saw in the vision
  chosen_spanish_reading: el águila que viste en la visión
  alternative_spanish_readings:
  - el águila que viste en tu visión
  - el águila que contemplaste en la visión
  rationale: Se conserva la referencia directa a la visión sin interpretar el símbolo dentro del versículo. El texto no desarrolla aquí el significado del águila, por lo que la traducción debe mantenerse descriptiva.
  doctrine_reference: No doctrinal addition; symbolic reference left undeveloped as in source.
translation_notes:
  revision_awareness: Fuente latina y auditoría inglesa en alto acuerdo; sin revisiones aplicadas. La redacción española sigue de cerca el paralelismo del latín y la equivalencia óptima del texto inglés, sin añadir glosas interpretativas.
  spanish_consistency_notes:
  - Se usa 'verdad' y 'falsedad' de manera paralela para conservar el contraste abstracto.
  - Se mantiene 'águila' como símbolo visionario sin expansión exegética.
  - Se evita 'SEÑOR' y no hay terminología divina explícita en este versículo.
  - 'La puntuación reproduce el ritmo de tres frases del original: ubicación, contraste moral, anuncio visionario.'
