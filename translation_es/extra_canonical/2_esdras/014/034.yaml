translation:
  language: es
  text: seréis preservados con vida[a], y después de la muerte alcanzaréis misericordia. Porque el juicio vendrá después de la muerte, cuando de nuevo
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seréis mantenidos con vida», «estaréis preservados con vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: uiui conseruati eritis
  english_pob_choice: you will be kept alive
  chosen_spanish: estaréis conservados con vida
  alternatives_spanish:
  - seréis mantenidos con vida
  - seréis preservados con vida
  lexicon: uiuus / conseruare
  rationale: El latín expresa una conservación continuada en vida; «estaréis conservados con vida» conserva la pasiva y la idea de preservación sin introducir una interpretación más fuerte que el texto.
- source_word: misericordiam consequemini
  english_pob_choice: you will obtain mercy
  chosen_spanish: alcanzaréis misericordia
  alternatives_spanish:
  - obtendréis misericordia
  - recibiréis misericordia
  lexicon: misericordia / consequi
  rationale: «Consequi» indica llegar a conseguir u obtener; «alcanzaréis misericordia» mantiene el matiz de logro/obtención y suena natural en español bíblico contemporáneo.
- source_word: Iudicium enim post mortem ueniet
  english_pob_choice: For judgment will come after death
  chosen_spanish: Porque el juicio vendrá después de la muerte
  alternatives_spanish:
  - Pues el juicio vendrá después de la muerte
  - Porque vendrá el juicio después de la muerte
  lexicon: iudicium / uenire
  rationale: «Juicio» es el equivalente directo de iudicium; se mantiene el orden y la relación causal con «Porque», fiel al conector latino enim.
- source_word: quando iterum
  english_pob_choice: when again
  chosen_spanish: cuando otra vez
  alternatives_spanish:
  - cuando de nuevo
  - cuando nuevamente
  lexicon: iterum
  rationale: El fragmento latino termina abruptamente con una expresión adverbial incompleta; «cuando otra vez» reproduce esa apertura sin cerrar artificialmente la cláusula.
theological_decisions:
- issue: Alcance temporal de la misericordia después de la muerte
  english_pob_reading: you will obtain mercy
  chosen_spanish_reading: alcanzaréis misericordia
  alternative_spanish_readings:
  - obtendréis misericordia
  - recibiréis misericordia
  rationale: La frase conserva la promesa posmortem sin suavizarla ni convertirla en una formulación general sobre gracia. En español, «alcanzaréis» mantiene el sentido de llegar a obtener algo tras un proceso o límite temporal.
  doctrine_reference: 4 Esdras 14:34
- issue: Traducción del final truncado 'quando iterum'
  english_pob_reading: when again
  chosen_spanish_reading: cuando otra vez
  alternative_spanish_readings:
  - cuando de nuevo
  - cuando nuevamente
  rationale: El testimonio latino proporcionado está cortado; no corresponde completar la idea con el verso siguiente. La traducción debe reflejar esa tensión textual y dejar visible la incompletitud.
  doctrine_reference: criterio de integridad textual del testigo latino
- issue: ‘you will be kept alive’ como pasiva de preservación
  english_pob_reading: you will be kept alive
  chosen_spanish_reading: estaréis conservados con vida
  alternative_spanish_readings:
  - seréis mantenidos con vida
  - seréis preservados con vida
  rationale: Se preserva la fuerza pasiva y la idea de custodia vital sin convertirla en una simple promesa de supervivencia genérica.
  doctrine_reference: 4 Esdras 14:34
translation_notes:
  revision_awareness: 'El contexto inglés auditado muestra que la línea fue realineada por un error de división versicular: la unidad latina de 14:34 termina con ''quando iterum'' y no contiene ''we shall live again''. Por eso el español evita esa expansión y refleja el fragmento tal como llega en el testigo latino limpiado.'
  spanish_consistency_notes:
  - Se mantuvo un estilo bíblico moderno y digno, sin recurrir a fórmulas eclesiásticas no necesarias.
  - Se respetó la incompletud del final del segmento para no importar material del verso siguiente.
  - La puntuación refleja dos miembros principales unidos por 'y' y una causal introducida por 'Porque'.
