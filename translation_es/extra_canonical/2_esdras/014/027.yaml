translation:
  language: es
  text: 'y dije al pueblo: «Escuchen estas palabras, oh Israel: Peregrinos, peregrinos—»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: populum
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo reunido
  - al pueblo de Israel
  lexicon: populus
  rationale: El acusativo latino funciona como objeto directo de 'dije'; en español 'al pueblo' reproduce de forma natural y directa el destinatario colectivo sin añadir especificaciones que el fragmento no da.
- source_word: Audi
  english_pob_choice: Hear
  chosen_spanish: Oíd
  alternatives_spanish:
  - Escuchad
  - Oye
  lexicon: audio
  rationale: El imperativo plural encaja con 'Israel' como destinatario colectivo. 'Oíd' mantiene la fuerza exhortativa y el tono bíblico sin perder naturalidad en español.
- source_word: Israel
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: ישראל
  rationale: Se conserva el nombre propio bíblico sin expansión interpretativa.
- source_word: Peregrinantes
  english_pob_choice: Sojourners
  chosen_spanish: Forasteros
  alternatives_spanish:
  - peregrinos
  - extranjeros
  - residentes forasteros
  lexicon: peregrinans
  rationale: El latín 'Peregrinantes' expresa la idea de personas que están de paso o en condición de extranjería. 'Forasteros' comunica esa condición de manera idiomática en español sin introducir connotaciones devocionales excesivas que tendría 'peregrinos'.
theological_decisions:
- issue: Fragmento incompleto y repetición enfática
  english_pob_reading: Sojourners, sojourners—
  chosen_spanish_reading: Forasteros, forasteros—
  alternative_spanish_readings:
  - Peregrinos, peregrinos—
  - Extranjeros, extranjeros—
  rationale: El texto latino conservado termina abruptamente con la repetición de 'Peregrinantes' y un corte de palabra. La repetición se mantiene para reflejar el énfasis del fragmento y la incompletitud del testimonio, sin completar la cláusula faltante.
  doctrine_reference: 2 Esdras 14:27; criterio textual de conservación del fragmento
- issue: Tratamiento del apóstrofe a Israel
  english_pob_reading: O Israel
  chosen_spanish_reading: oh Israel
  alternative_spanish_readings:
  - Israel
  - escucha, Israel
  rationale: Se conserva la invocación directa que el inglés POB explicita con 'O Israel'. En español 'oh Israel' mantiene el registro bíblico y la vocación del destinatario sin cambiar la sintaxis del llamado.
  doctrine_reference: uso retórico bíblico del vocativo
translation_notes:
  revision_awareness: La revisión inglesa añadió el artículo faltante ('the people') y completó el fragmento latino 'Peregrinantes pere-' como 'Sojourners, sojourners—'. La versión española sigue esa decisión de apertura y conserva la interrupción del fragmento mediante una repetición equivalente ('Forasteros, forasteros—') sin intentar suplir el resto perdido.
  spanish_consistency_notes:
  - Se mantiene 'Israel' sin artículo para respetar el vocativo.
  - Se preserva el guion largo final para señalar que el versículo queda truncado en el testimonio latino.
  - Se evita 'SEÑOR' u otros términos no presentes en el fragmento.
  - '''Forasteros'' se usa aquí por valor semántico de extranjería/condición de paso, no como denominación litúrgica.'
