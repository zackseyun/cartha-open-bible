translation:
  language: es
  text: Cuando las hayas terminado, unas cosas harás públicas, y otras las entregarás en secreto a los sabios. Porque mañana a esta hora comenzarás a escribir. Y me fui, como me ordenó, y reuní a todos los
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: cum perfeceris
  english_pob_choice: When you have completed them
  chosen_spanish: Cuando las hayas terminado
  alternatives_spanish:
  - Cuando las hayas completado
  - Cuando las hayas acabado
  lexicon: cum + perfecto
  rationale: Tomo el valor temporal de cum perfeceris como 'cuando' + futuro perfecto en español. 'Terminarlas' conserva el referente implícito del contexto sin volverlo más explícito que el texto recibido.
- source_word: quaedam palam facies
  english_pob_choice: some things you shall make public
  chosen_spanish: unas cosas harás públicas
  alternatives_spanish:
  - algunas cosas harás públicas
  - harás públicas ciertas cosas
  lexicon: palam facere
  rationale: '''Harás públicas'' reproduce la fuerza de hacer algo manifiesto o abierto. ''Unas cosas'' mantiene la indefinición del latín quaedam sin añadir precisión inexistente.'
- source_word: quaedam sapientibus absconse trades
  english_pob_choice: some things you shall hand over in secret to the wise
  chosen_spanish: otras las entregarás en secreto a los sabios
  alternatives_spanish:
  - otras las darás en secreto a los sabios
  - otras se las entregarás en secreto a los sabios
  lexicon: absconse tradere
  rationale: '''Entregarás'' conserva el matiz de poner algo en manos de otro. ''En secreto'' sigue absconse, y ''a los sabios'' traduce sapientibus sin sustituirlo por un término eclesiástico.'
- source_word: in crastinum enim hac hora incipies scribere
  english_pob_choice: For tomorrow at this hour you shall begin to write
  chosen_spanish: Porque mañana a esta hora comenzarás a escribir
  alternatives_spanish:
  - Pues mañana a esta hora comenzarás a escribir
  - Porque al día siguiente, a esta hora, comenzarás a escribir
  lexicon: in crastinum ... hac hora ... incipies scribere
  rationale: '''Porque'' restituye el valor explicativo de enim que el inglés auditado corrigió. ''Comenzarás a escribir'' sigue incipies scribere con naturalidad en español.'
- source_word: Et profectus sum, sicut mihi praecepit
  english_pob_choice: And I went away, as he commanded me
  chosen_spanish: Y me fui, como me lo ordenó
  alternatives_spanish:
  - Y partí, como me lo ordenó
  - Y me alejé, como me lo ordenó
  lexicon: profectus sum / praecepit
  rationale: '''Me fui'' es una solución sobria para profectus sum en este contexto narrativo. ''Me lo ordenó'' conserva el sujeto implícito de la autoridad anterior sin forzarlo en la traducción.'
- source_word: congregaui omnem
  english_pob_choice: I gathered all the
  chosen_spanish: reuní a todos los
  alternatives_spanish:
  - junté a todos los
  - convocqué a todos los
  lexicon: congregaui
  rationale: '''Reuní'' transmite el acto de congregar sin introducir una connotación litúrgica. La frase queda abierta porque el segmento latino y el contexto recibido se cortan aquí.'
theological_decisions:
- issue: Tratamiento del destinatario singular y la secuencia temporal del mandato
  english_pob_reading: You shall... Tomorrow at this hour you shall begin to write
  chosen_spanish_reading: harás... Porque mañana a esta hora comenzarás a escribir
  alternative_spanish_readings:
  - harás... Mañana a esta hora comenzarás a escribir
  - harás... Pues mañana a esta hora comenzarás a escribir
  rationale: Mantengo el futuro dirigido a una sola persona con 'harás' / 'comenzarás'. La conjunción 'Porque' refleja mejor el 'enim' latino y la relación causal o explicativa entre completar la tarea y empezar a escribir.
  doctrine_reference: No doctrinal issue; syntactic fidelity to the Latin timing relation.
translation_notes:
  revision_awareness: La revisión reciente corrigió el arranque inglés de 'And' a una lectura temporal sin 'And' y restableció el valor explicativo de 'For' por el latino 'enim'. En español, esto se refleja con 'Cuando...' y 'Porque...'. No se agregó nota al pie porque no hay alternativa textual que anclar sin introducir un marcador ausente en el texto.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o lenguaje litúrgico no presente en el fragmento.
  - '''Sabios'' mantiene sapientibus sin ampliar a una categoría técnica.'
  - El cierre queda abierto con 'a todos los', fiel al segmento latino truncado en la fuente recibida.
