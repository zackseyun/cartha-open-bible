lexical_decisions:
- source_word: Superant
  english_pob_choice: But ... remain
  chosen_spanish: permanecen
  alternatives_spanish:
  - quedan
  - subsisten
  lexicon: superare
  rationale: El latín expresa una idea de resto que sigue existiendo; «permanecen» conserva bien ese sentido en español sin añadir matices ajenos.
- source_word: eius
  english_pob_choice: of its
  chosen_spanish: de sus
  alternatives_spanish:
  - de ello
  - de ella
  - sus
  lexicon: eius
  rationale: La revisión inglesa restauró el posesivo explícito «of its». En español, «de sus» mantiene la referencia al sustantivo implícito («la edad / el siglo» del verso anterior) y suena natural.
- source_word: duae ... partes
  english_pob_choice: two of its parts
  chosen_spanish: dos de sus partes
  alternatives_spanish:
  - dos partes
  - dos de ellas
  lexicon: duo / pars
  rationale: «Dos de sus partes» refleja la partitivo explícita del latín y preserva la posibilidad interpretativa que la nota inglesa mantuvo.
- source_word: post medium decimae partis
  english_pob_choice: after the middle of the tenth part
  chosen_spanish: después de la mitad de la décima parte
  alternatives_spanish:
  - después de la mitad de la décima porción
  - tras la mitad de la décima parte
  lexicon: post / medius / decimus / pars
  rationale: La secuencia latina se vierte de manera directa y comprensible. «Décima parte» conserva el orden y la división cuantitativa del original sin suavizarlo.
theological_decisions:
- issue: Referencia implícita de «eius» al mundo/edad mencionado antes
  english_pob_reading: two of its parts remain
  chosen_spanish_reading: dos de sus partes permanecen
  alternative_spanish_readings:
  - dos partes permanecen
  - dos de ellas permanecen
  rationale: El latín contiene el pronombre posesivo «eius», que enlaza con la división de la edad tratada en el contexto inmediato. La traducción española lo conserva para no borrar esa conexión textual.
  doctrine_reference: Coherencia contextual y continuidad referencial del pasaje, sin introducir una interpretación doctrinal adicional.
translation_notes:
  revision_awareness: La versión inglesa revisada añadió «of its» para reflejar el latín «eius». La presente redacción española sigue esa revisión y evita omitir el posesivo explícito. No se detectan otros cambios necesarios según el informe de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y bíblico, con sintaxis natural en español.
  - «Parte» se conserva como equivalente de pars para no introducir una paráfrasis cuantitativa más libre.
  - La puntuación con nota al final reproduce el estilo de edición auditable del proyecto.
