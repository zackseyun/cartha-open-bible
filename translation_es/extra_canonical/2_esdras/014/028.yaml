review_pass:
  verdict: revise
  source_alignment_summary: El borrador no preserva fielmente el sentido del latín en el verbo principal. «grinati sunt» aquí expresa residencia como extranjeros/forasteros, reflejado por el inglés POB «sojourned»; el español draft usa «sojuzgaron», que significa ‘someter’, invirtiendo el sentido. «Desde el principio» para ab initio y «fueron librados» para liberati sunt sí alinean bien con la fuente y con la auditoría inglesa. La nota alternativa debe ajustarse para reflejar la alternativa inglesa documentada.
  spanish_quality_summary: La frase actual es legible salvo por «sojuzgaron», que es un error léxico grave y no idiomático en contexto. Una solución natural y fiel en español eclesial general es «vivieron como forasteros en Egipto», aunque también cabría «peregrinaron»; la primera comunica con más claridad la idea de estancia extranjera sin arcaísmo innecesario.
  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos aquí. La principal decisión léxica es traducir el valor de sojourn/ grinati sunt como «vivieron como forasteros», no con un falso amigo o verbo inexistente. «Fueron librados» concuerda con el registro bíblico y el pasivo de la fuente.
  issues:
  - severity: high
    issue: «sojuzgaron» traduce incorrectamente grinati sunt
    rationale: «Sojuzgar» significa dominar/someter, mientras que el latín y el inglés POB significan habitar como extranjeros o forasteros. Esto altera sustancialmente el sentido histórico del verso.
  - severity: medium
    issue: La nota al pie alternativa conserva una formulación inglesa algo rígida
    rationale: La alternativa debe corresponder a la auditoría inglesa («Our fathers lived as sojourners from the beginning in Egypt») pero en español natural. Conviene mantenerla como alternativa de orden sintáctico, no como lectura distinta del verbo.
  - severity: low
    issue: El aparato de decisiones léxicas internas contradice el texto presentado
    rationale: Las decisiones reconocen que «sojuzgaron» es inadecuado, lo que confirma la necesidad de revisión del texto principal.
