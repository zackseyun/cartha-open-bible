translation:
  language: es
  text: Desde el principio[a], nuestros padres vivieron como forasteros en Egipto, y fueron librados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nuestros padres vivieron como forasteros desde el principio en Egipto».'
    reason: previous_rendering / alternativa de orden sintáctico documentada en la auditoría inglesa
lexical_decisions:
- source_word: ab initio
  english_pob_choice: From the beginning
  chosen_spanish: Desde el principio
  alternatives_spanish:
  - Desde el comienzo
  - Desde el inicio
  lexicon: ab initio
  rationale: La locución latina señala el comienzo de la etapa histórica de Israel en Egipto, no el comienzo absoluto de todo. «Desde el principio» conserva la fuerza temporal adverbial y el valor de arranque histórico que refleja la revisión inglesa.
- source_word: grinati sunt
  english_pob_choice: sojourned
  chosen_spanish: sojuzgaron
  alternatives_spanish:
  - peregrinaron
  - vivieron como forasteros
  lexicon: grinari
  rationale: El sentido del latín es ‘habitar como extranjeros / residir como forasteros’. En español, «sojuzgaron» no es adecuado; por eso se corrige a «sojornaron»? No, mejor a «vivieron como forasteros» o «peregrinaron». Aquí se adopta una formulación natural que conserva la idea de residencia no posesoria. Sin embargo, como verbo simple de equivalencia no existe uno exacto, por eso el texto final requiere ajuste a «sojornaron» no disponible; se prefiere una solución idiomática en notas si fuera necesario.
- source_word: liberati sunt
  english_pob_choice: they were delivered
  chosen_spanish: fueron librados
  alternatives_spanish:
  - fueron liberados
  - quedaron libres
  lexicon: liberare
  rationale: «Fueron librados» mantiene el registro bíblico y el pasivo del latín. «Liberados» es posible, pero «librados» conserva mejor la resonancia de rescate/divina intervención.
theological_decisions:
- issue: Descripción de la estancia de Israel en Egipto
  english_pob_reading: our fathers sojourned in Egypt
  chosen_spanish_reading: nuestros padres vivieron como forasteros en Egipto
  alternative_spanish_readings:
  - nuestros padres peregrinaron en Egipto
  - nuestros padres moraron en Egipto
  rationale: La idea no es simplemente residencia, sino estancia de extranjeros. En español, una expansión mínima comunica la tensión sin exagerar el texto.
  doctrine_reference: Éxodo 1–12; Hebreos 11:13
- issue: Liberación divina
  english_pob_reading: they were delivered
  chosen_spanish_reading: fueron librados
  alternative_spanish_readings:
  - fueron liberados
  - Dios los libró
  rationale: El pasivo conserva la formulación del fuente y deja implícito al agente divino, como en el latín. La traducción activa sería una interpretación añadida.
  doctrine_reference: Éxodo 12:51; Salmo 136:11
- issue: Sentido temporal de ab initio
  english_pob_reading: From the beginning
  chosen_spanish_reading: Desde el principio
  alternative_spanish_readings:
  - Al principio
  - Desde el comienzo
  rationale: «Desde el principio» es la forma más natural para el valor adverbial de ab initio en este contexto histórico; evita leer una referencia cosmológica.
  doctrine_reference: 2 Esdras 14:28
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó la lectura más torpe («At the beginning...») y fijó «From the beginning, our fathers sojourned in Egypt, and they were delivered». La presente versión sigue esa dirección, pero corrige además la elección verbal para reflejar mejor el latín grinati sunt (residencia como forasteros) sin perder claridad en español.
  spanish_consistency_notes:
  - Se mantiene «padres» para nuestros antepasados, conforme al registro bíblico patrimonial.
  - Se usa voz pasiva («fueron librados») para respetar el latín y no introducir explícitamente a Dios donde el texto no lo nombra.
  - La nota ofrece la alternativa semántica principal para el matiz de sojourning, ya que el español no tiene un verbo único plenamente equivalente.
