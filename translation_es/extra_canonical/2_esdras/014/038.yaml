translation:
  language: es
  text: 'y he aquí[a], una voz me llamó, diciendo: «Esdras, abre la boca y bebe lo que te estoy dando». Y abrí la boca, y he aquí, una copa llena'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O en una traducción previa del proyecto: «Y aconteció al día siguiente, y he aquí, una voz me llamó, diciendo: “Esdras, abre la boca y bebe lo que te doy a beber”. Y abrí la boca, y he aquí, una copa llena que se me extendía».'
    reason: previous_rendering
lexical_decisions:
- source_word: uox vocauit me
  english_pob_choice: a voice called me
  chosen_spanish: una voz me llamó
  alternatives_spanish:
  - una voz me convocó
  - una voz me gritó
  lexicon: vox > voz; vocare > llamar
  rationale: «Me llamó» reproduce con naturalidad el llamado directo de la voz en español y conserva el sentido inmediato del latín sin intensificarlo indebidamente con «convocó» o «gritó».
- source_word: Ezra, aperi os tuum
  english_pob_choice: Ezra, open your mouth
  chosen_spanish: Esdras, abre tu boca
  alternatives_spanish:
  - Esdras, abre la boca
  lexicon: aperire > abrir; os > boca
  rationale: «Tu boca» refleja de manera más literal el posesivo del latín y mantiene el tono directo del mandato. «La boca» sería más idiomática, pero menos precisa respecto del texto.
- source_word: et bibe quod te potiono
  english_pob_choice: and drink what I am giving you
  chosen_spanish: y bebe lo que te estoy dando
  alternatives_spanish:
  - y bebe lo que te doy
  - y bebe lo que te doy a beber
  lexicon: bibere > beber; potiono > dar a beber / suministrar bebida
  rationale: La forma latina sugiere la acción en curso de suministrar la bebida; por eso «te estoy dando» sigue la revisión inglesa y evita la repetición artificial de «dar a beber».
- source_word: Et aperui os meum
  english_pob_choice: And I opened my mouth
  chosen_spanish: Y abrí mi boca
  alternatives_spanish:
  - Y abrí la boca
  lexicon: aperire > abrir; os meum > mi boca
  rationale: «Mi boca» conserva la correspondencia exacta con el latín. Aunque «abrí la boca» es más idiomático en español, aquí se mantiene la referencia poseída explícita del texto.
- source_word: ecce calix plenus
  english_pob_choice: behold, a full cup
  chosen_spanish: he aquí, una copa llena
  alternatives_spanish:
  - he aquí, una copa colmada
  - he aquí, un cáliz lleno
  lexicon: calix > copa / cáliz; plenus > lleno
  rationale: «Copa» es la opción más neutra y transparente en español para calix. «Cáliz» puede sonar más litúrgico y específico, mientras que «copa llena» sigue fielmente la sencillez del latín.
theological_decisions:
- issue: Marcador de asombro/revelación con ecce
  english_pob_reading: behold
  chosen_spanish_reading: he aquí
  alternative_spanish_readings:
  - mira
  - y he aquí
  rationale: «He aquí» preserva la función deíctica y solemne de ecce en un registro bíblico reconocible. Se conserva también en ambos puntos del versículo para reflejar el patrón del latín y del inglés revisado.
  doctrine_reference: Retórica bíblica de revelación; sin carga doctrinal adicional.
- issue: Forma incompleta al final del versículo
  english_pob_reading: And behold, a full cup
  chosen_spanish_reading: y he aquí, una copa llena
  alternative_spanish_readings:
  - y he aquí, una copa llena se me presentaba
  - y he aquí, una copa llena era ofrecida
  rationale: El latín termina abruptamente en «calix plenus», y la revisión inglesa mantuvo la clausula nominal sin completar. En español se conserva esa incompletitud, evitando añadir un verbo ausente del testimonio base.
  doctrine_reference: Crítica textual y delimitación versicular; fidelidad al alcance del testimonio.
translation_notes:
  revision_awareness: La revisión más reciente del inglés eliminó material ajeno a los límites latinos de 14:38 y refinó la segunda cláusula a «drink what I am giving you». El español sigue esa delimitación estricta, sin incorporar el material de los versículos vecinos y conservando el final truncado del texto fuente.
  spanish_consistency_notes:
  - Se mantiene «Y he aquí» en la primera aparición como enlace narrativo y reverencial, aunque la nota recoge la variante más literal sin la conjunción inicial.
  - Se usa «Esdras» como forma española estable del nombre propio.
  - Se conserva «copa» en vez de «cáliz» para evitar una lectura litúrgica no exigida por el latín.
  - La frase final queda nominal e inconclusa a propósito, en coherencia con la fuente latina y con la revisión inglesa.
