translation:
  language: es
  text: 'Y le conté muchas maravillas, y le mostré los secretos de los tiempos y el fin de los tiempos, y le mandé, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: enarraui
  english_pob_choice: I told him
  chosen_spanish: le conté
  alternatives_spanish:
  - le dije
  - le relaté
  lexicon: enarrare
  rationale: El latín enarrare expresa relatar o contar con cierto desarrollo; 'le conté' comunica fielmente la acción narrativa sin volverla más solemne de lo que exige el texto.
- source_word: mirabilia multa
  english_pob_choice: many wonders
  chosen_spanish: muchas maravillas
  alternatives_spanish:
  - muchos prodigios
  - muchas cosas maravillosas
  lexicon: mirabilia
  rationale: '''Maravillas'' conserva el valor de hechos extraordinarios y se ajusta bien al registro bíblico en español; ''prodigios'' sería posible, pero cambia el matiz hacia señales más técnicas.'
- source_word: ostendi
  english_pob_choice: I showed
  chosen_spanish: le mostré
  alternatives_spanish:
  - le enseñé
  - le manifesté
  lexicon: ostendere
  rationale: '''Mostrar'' es la correspondencia directa y clara para ostendere; mantiene el acto de hacer ver algo sin añadir interpretación.'
- source_word: temporum secreta
  english_pob_choice: the secrets of the times
  chosen_spanish: los secretos de los tiempos
  alternatives_spanish:
  - los misterios de los tiempos
  - los secretos de las edades
  lexicon: secretum
  rationale: Se conserva 'secretos' para mantener la transparencia semántica del latín; 'misterios' introduciría una carga teológica mayor que no está explícita en el texto.
- source_word: temporum finem
  english_pob_choice: the end of the times
  chosen_spanish: el fin de los tiempos
  alternatives_spanish:
  - el término de los tiempos
  - la consumación de los tiempos
  lexicon: finis
  rationale: '''Fin'' reproduce con precisión finis y enlaza naturalmente con ''tiempos''; evita una paráfrasis más doctrinal que la fuente no exige.'
- source_word: praecepi ei dicens
  english_pob_choice: I commanded him, saying
  chosen_spanish: 'le mandé, diciendo:'
  alternatives_spanish:
  - 'le ordené, diciendo:'
  - 'le di mandamiento, diciendo:'
  lexicon: praecipere
  rationale: '''Mandé'' preserva el sentido imperativo de praecipere en un español natural y bíblico; ''ordené'' sería correcto pero algo más administrativo.'
theological_decisions:
- issue: La frase sobre 'los secretos de los tiempos' puede sugerir revelación reservada sin especificar contenido doctrinal.
  english_pob_reading: the secrets of the times
  chosen_spanish_reading: los secretos de los tiempos
  alternative_spanish_readings:
  - los misterios de los tiempos
  - los secretos de las edades
  rationale: 'Se conserva la ambigüedad del original y de la POB inglesa: el texto afirma revelación de secretos temporales, pero no define su alcance. No se reemplaza por lenguaje más interpretativo.'
  doctrine_reference: Revelación/providencia divina en la literatura apocalíptica; no se formula doctrina sistemática adicional.
translation_notes:
  revision_awareness: 'El texto latino coincide sustancialmente con la POB inglesa: ''many wonders'', ''secrets of the times'', ''end of the times'', y la fórmula final de mandato. No hubo revisiones aplicadas ni variantes textuales relevantes en el contexto provisto, por lo que la versión española sigue de cerca el contenido auditable sin necesidad de notas textuales.'
  spanish_consistency_notes:
  - Se mantiene el pronombre dativo 'le' para reflejar el objeto indirecto implícito del latín.
  - Se conserva la repetición de 'los tiempos' para reproducir la estructura paralela del original.
  - Se usa dos puntos al final para imitar la apertura de la cita directa en 'dicens:' y mantener la continuidad sintáctica.
