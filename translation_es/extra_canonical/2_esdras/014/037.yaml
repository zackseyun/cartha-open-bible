translation:
  language: es
  text: Estamos en el campo y permanecimos allí. Y aconteció al día siguiente
  philosophy: formal
lexical_decisions:
- source_word: sumus
  english_pob_choice: we are
  chosen_spanish: estamos
  alternatives_spanish:
  - somos
  lexicon: sum, esse
  rationale: El latín presenta el presente de ser/estar; en español, aquí el valor locativo y de presencia se expresa naturalmente con «estamos».
- source_word: in campo
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el llano
  - en el terreno
  lexicon: campus
  rationale: «Campo» reproduce de manera directa el espacio abierto indicado por el latín y mantiene la sencillez del pasaje.
- source_word: mansimus
  english_pob_choice: remained there
  chosen_spanish: permanecimos allí
  alternatives_spanish:
  - nos quedamos allí
  lexicon: maneo
  rationale: «Permanecimos» conserva el valor de permanecer/quedarse del latín y el matiz de continuidad que la POB inglesa expresó con «remained there».
- source_word: factum est
  english_pob_choice: it happened
  chosen_spanish: aconteció
  alternatives_spanish:
  - sucedió
  - y sucedió
  lexicon: fio
  rationale: La fórmula impersonal latina se vierte con una pasiva impersonal natural en español; «aconteció» transmite el giro narrativo sin añadir contenido.
- source_word: in crastinum
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - para el día siguiente
  - el día siguiente
  lexicon: crastinus
  rationale: «Al día siguiente» es la equivalencia idiomática más clara y fiel para el valor temporal del latín.
