    changes_summary: Revised to account for porrigebatur ('was being offered/held out') and mili ('to me'), which were omitted in the draft. Kept the comparison language and formal tone.
translation:
  language: es
  text: Se me ofrecía algo como agua[a], pero su color era como fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Esto estaba lleno como de agua, pero su color era como fuego».
    reason: previous_rendering
lexical_decisions:
- source_word: porrigebatur
  english_pob_choice: was being offered / held out
  chosen_spanish: me era ofrecido
  alternatives_spanish:
  - se me ofrecía
  - me era presentado
  - se me extendía
  lexicon: porrigo
  rationale: El latín pasivo sugiere algo que era puesto al alcance o presentado; en español, «me era ofrecido» conserva la pasividad y el movimiento hacia el hablante sin volverlo más interpretativo de lo necesario.
- source_word: mili
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: mihi
  rationale: El dativo latino se expresa naturalmente con el pronombre átono «me» en español, manteniendo la referencia personal directa del testimonio visionario.
- source_word: plenum sicut aqua
  english_pob_choice: something like water was being offered to me / was full of something like water
  chosen_spanish: Algo como agua
  alternatives_spanish:
  - Algo semejante al agua
  - Como agua
  lexicon: plenus + sicut
  rationale: La comparación no identifica el contenido como agua literal; «algo como agua» preserva la indeterminación del símil latino y evita precisar más de lo que el texto dice.
- source_word: color autem
  english_pob_choice: its color was like fire
  chosen_spanish: su color era como fuego
  alternatives_spanish:
  - su color era como el fuego
  - y su color era como fuego
  lexicon: color
  rationale: «Color» se conserva de modo transparente y «como fuego» mantiene la comparación directa sin introducir una interpretación simbólica adicional.
theological_decisions:
- issue: 'Naturaleza de la visión: semejanza, no identificación literal'
  english_pob_reading: Something like water was being offered to me, but its color was like fire.
  chosen_spanish_reading: Algo como agua me era ofrecido, pero su color era como fuego.
  alternative_spanish_readings:
  - Me era ofrecido algo como agua, pero su color era como fuego.
  - Algo semejante al agua me era ofrecido, pero su color era como fuego.
  rationale: El texto presenta una experiencia visionaria con dos comparaciones («como agua», «como fuego»). La traducción evita convertir esas comparaciones en afirmaciones literales, respetando la tensión descriptiva del pasaje.
  doctrine_reference: 2 Esdras 14:39; comparación visionaria descriptiva
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa, que recuperó tanto el valor de porrigebatur ('era ofrecido/extendido') como el dativo mili ('a mí'). También conserva la comparación de plenum sicut aqua sin resolverla como agua literal.
  spanish_consistency_notes:
  - He mantenido el tono sobrio y visionario del pasaje, evitando adornos.
  - «Algo como agua» conserva la indeterminación que la revisión inglesa quiso rescatar.
  - La construcción pasiva perifrástica «me era ofrecido» ayuda a reflejar el latín sin forzar un giro demasiado literal en español.
