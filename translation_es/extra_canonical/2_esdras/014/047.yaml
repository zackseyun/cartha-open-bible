translation:
  language: es
  text: Puedes entregarlos a los sabios de tu pueblo. Porque en ellos está la vena del entendimiento[a], la fuente de la sabiduría y el río del conocimiento.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la fuente del entendimiento». El latín tiene vena, que la revisión del texto base confirmó frente a una lectura más libre como «spring»; se conserva «vena» en el texto principal para reflejar el original.'
    reason: alternative_reading
lexical_decisions:
- source_word: tradas eos
  english_pob_choice: you may hand them over
  chosen_spanish: Puedes entregarlos
  alternatives_spanish:
  - Puedes encomendarlos
  - Puedes ponerlos en manos de
  lexicon: tradas = entregar / poner en manos de
  rationale: El latín expresa una acción de traspaso o entrega. «Entregarlos» conserva la fuerza verbal y funciona con el complemento humano implícito en el contexto, sin suavizarlo indebidamente.
- source_word: sapientibus de populo tuo
  english_pob_choice: the wise among your people
  chosen_spanish: a los sabios de tu pueblo
  alternatives_spanish:
  - a los sabios de tu pueblo
  - a los prudentes de tu pueblo
  lexicon: sapientibus = sabios
  rationale: «Sabios» es la correspondencia directa y más natural en español para sapientibus; mantiene la referencia a un grupo caracterizado por sabiduría dentro del pueblo.
- source_word: vena intellectus
  english_pob_choice: the vein of understanding
  chosen_spanish: la vena del entendimiento
  alternatives_spanish:
  - la fuente del entendimiento
  - el filón del entendimiento
  lexicon: vena = vena / filón
  rationale: Se conserva «vena» por fidelidad al latín y porque la revisión auditada corrigió la lectura anterior de «spring» a «vein». En español suena figurado pero inteligible, y preserva la imagen corporal/metálica del original.
- source_word: sapientiae fons
  english_pob_choice: the fountain of wisdom
  chosen_spanish: la fuente de la sabiduría
  alternatives_spanish:
  - el manantial de la sabiduría
  - la fuente de sabiduría
  lexicon: fons = fuente / manantial
  rationale: «Fuente» reproduce bien fons y mantiene la serie metafórica paralela del pasaje. «Sabiduría» es la equivalencia normal para sapientiae.
- source_word: scientiae flumen
  english_pob_choice: the river of knowledge
  chosen_spanish: el río del conocimiento
  alternatives_spanish:
  - el río de la ciencia
  - la corriente del conocimiento
  lexicon: flumen = río
  rationale: «Río» conserva la metáfora de flumen. «Conocimiento» responde mejor al sentido amplio de scientia en este contexto que «ciencia» en español moderno.
theological_decisions:
- issue: Imagen encadenada de entendimiento, sabiduría y conocimiento
  english_pob_reading: the vein of understanding, the fountain of wisdom, and the river of knowledge
  chosen_spanish_reading: la vena del entendimiento, la fuente de la sabiduría y el río del conocimiento
  alternative_spanish_readings:
  - la fuente del entendimiento, la fuente de la sabiduría y el río del conocimiento
  - el filón del entendimiento, la fuente de la sabiduría y el río del conocimiento
  rationale: No hay que nivelar la triple metáfora, porque el texto latino acumula tres imágenes distintas de abundancia/origen. La elección mantiene la tensión entre una imagen corporal o mineral («vena»), una de origen («fuente») y una de flujo abundante («río»).
  doctrine_reference: Imagen sapiencial poética; no doctrinal en sentido dogmático.
translation_notes:
  revision_awareness: La traducción incorpora la revisión posterior que restauró el inicio de la cláusula («tradas eos sapientibus de populo tuo») y la corrección de aquélla que ajustó spring → vein para reflejar vena. Por eso el español incluye la entrega a los sabios del pueblo y mantiene «vena del entendimiento» en vez de una imagen acuosa.
  spanish_consistency_notes:
  - Se usa «sabios» para sapientibus, en línea con el registro de sabiduría del pasaje.
  - Se evita «ciencia» para scientiae, porque en español contemporáneo puede restringir demasiado el campo semántico frente a scientia.
  - «Vena» se mantiene como metáfora inusual pero fiel; la nota ofrece una alternativa idiomática sin borrar la forma principal.
