translation:
  language: es
  text: o las cosas que están por acontecer[a]. Porque si he hallado gracia delante de ti, envía espíritu santo[b] en mí, y escribiré todo lo que ha sucedido en el mundo desde el principio, las cosas que estaban escritas en tu ley, para que los hombres puedan hallar el camino[c], y los que quieran
  philosophy: optimal-equivalence
  footnotes:
