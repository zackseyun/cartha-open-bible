    reason: theological_note
  - marker: c
    text: O «la senda».
    reason: alternative_reading
lexical_decisions:
- source_word: facta sunt uel quae incipient operari
  english_pob_choice: or the things that are about to happen
  chosen_spanish: o las cosas que están por acontecer
  alternatives_spanish:
  - o las cosas que van a suceder
  - o las cosas que están por suceder
  lexicon: facta sunt / incipient operari
  rationale: La secuencia latina contrapone lo ya hecho con lo que comenzará a obrar o acontecer. En español, «están por acontecer» conserva el matiz de inminencia sin sonar rígido.
- source_word: si enim inueni gratiam coram te
  english_pob_choice: For if I have found favor before you
  chosen_spanish: Porque si he hallado gracia delante de ti
  alternatives_spanish:
  - Pues si he hallado favor delante de ti
  - Porque si he hallado favor ante ti
  lexicon: si enim / gratiam coram te
  rationale: «Enim» es explicativo/causal, por eso «Porque». Se mantiene la fórmula bíblica «gracia delante de ti», fiel al latinismo coram te y al tono de oración.
- source_word: inmitte in me spiritum sanctum
  english_pob_choice: send the Holy Spirit into me
  chosen_spanish: envía tu Espíritu Santo en mí
  alternatives_spanish:
  - envía tu Espíritu Santo dentro de mí
  - envía el Espíritu Santo en mí
  lexicon: spiritum sanctum
  rationale: En este contexto apocalíptico judío, la expresión latina apunta al espíritu santo de inspiración profética. En español se conserva la mayúscula reverente de «Espíritu Santo» por la forma tradicional del sintagma, pero el sentido no se fuerza a una lectura trinitaria explícita en las notas de decisión. La preposición «en mí» sigue el latín in me.
- source_word: omne quod factum est in saeculo ab initio
  english_pob_choice: everything that has happened in the world from the beginning
  chosen_spanish: todo lo que ha sucedido en el mundo desde el principio
  alternatives_spanish:
  - todo lo que ha ocurrido en el mundo desde el principio
  - todo lo que ha sucedido en la historia desde el principio
  lexicon: in saeculo ab initio
  rationale: Se adopta «en el mundo» porque el pasaje describe el curso de la historia de la creación, no «la era» en sentido escatológico. «Desde el principio» traduce ab initio de manera natural y precisa.
- source_word: quae erant in lege tua scripta
  english_pob_choice: the things that were written in your law
  chosen_spanish: las cosas que estaban escritas en tu ley
  alternatives_spanish:
  - las cosas que fueron escritas en tu ley
  - las cosas escritas en tu ley
  lexicon: scripta / in lege tua
  rationale: «Estaban escritas» conserva el estado resultante indicado por el participio latino y evita una pasiva demasiado pesada. «Tu ley» mantiene la referencia directa sin introducir glosas.
- source_word: ut possint homines inuenire semitam
  english_pob_choice: so that men may be able to find the path
  chosen_spanish: para que los hombres puedan hallar el camino
  alternatives_spanish:
  - para que los hombres puedan encontrar la senda
  - a fin de que los hombres puedan hallar el camino
  lexicon: semitam
  rationale: «Semitam» puede ser «senda/camino». Se eligió «camino» por su naturalidad bíblica en español y porque el contexto habla de una vía comprensible de acceso al contenido escrito.
theological_decisions:
- issue: La identidad de spiritum sanctum en un texto judío apocalíptico (4 Esdras)
  english_pob_reading: send the Holy Spirit into me
  chosen_spanish_reading: envía tu Espíritu Santo en mí
  alternative_spanish_readings:
  - envía tu espíritu santo en mí
  - envía tu espíritu santo dentro de mí
  rationale: El latín describe una inspiración profética divina, no necesariamente una formulación cristiana nicena. En español se usa la forma reverente usual «Espíritu Santo», pero el registro del conjunto y la nota explicativa deben impedir una lectura teológica anacrónica.
  doctrine_reference: Inspiración profética; distinción entre uso judío apocalíptico y formulación trinitaria posterior
- issue: El alcance de saeculo ab initio
  english_pob_reading: in the world from the beginning
  chosen_spanish_reading: en el mundo desde el principio
  alternative_spanish_readings:
  - en la era desde el principio
  - en la edad desde el principio
  rationale: La revisión auditada ya concluyó que aquí saeculum tiene sentido histórico-global, no escatológico. Por eso «mundo» comunica mejor el ámbito total de la historia creada.
  doctrine_reference: Cosmología/historia de la creación en literatura apocalíptica judía
- issue: El conector Si enim
  english_pob_reading: For if I have found favor before you
  chosen_spanish_reading: Porque si he hallado gracia delante de ti
  alternative_spanish_readings:
  - Pues si he hallado gracia delante de ti
  rationale: Se preserva la relación explicativa marcada por enim, ya confirmada por la revisión auditada, evitando un contraste adversativo que el latín no contiene.
  doctrine_reference: Coherencia discursiva del ruego de Esdras
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada que corrigió tres puntos del inglés POB: (1) Si enim debe seguirse como causal/explanatorio («For if»), no adversativo; (2) saeculo ab initio se entiende mejor como el curso del mundo/historia desde el comienzo, no «the age»; y (3) spiritum sanctum pertenece al registro de inspiración divina judía, por lo que la mayúscula inglesa no debe importar una lectura teológica posterior como si fuera una decisión del original. La redacción española mantiene esas decisiones y las expresa con términos naturales en español.'
  spanish_consistency_notes:
  - Se mantiene «gracia delante de ti» como fórmula estable y reverente.
  - «Espíritu Santo» conserva la forma tradicional en español, pero la nota evita fijar una lectura doctrinal posterior.
  - Se evita «SEÑOR» o sustituciones de ocultamiento, porque aquí no aparece el tetragrámaton.
  - Se conserva el paralelismo de la cláusula enumerativa con una sintaxis clara y bíblica en español.
