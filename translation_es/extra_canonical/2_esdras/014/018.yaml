translation:
  language: es
  text: 'Entonces respondí y dije delante de ti[a], Señor: «He aquí, yo iré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Entonces respondí y dije delante de ti, Señor:»
    reason: Conserva en español la nota de alternativa de agrupación/puntuación preservada por el English POB.
lexical_decisions:
- source_word: Et respondi et dixi
  english_pob_choice: Then I answered and said
  chosen_spanish: Entonces respondí y dije
  alternatives_spanish:
  - Y respondí y dije
  - Entonces contesté y dije
  lexicon: respondi / dixi
  rationale: Mantiene la secuencia simple de respuesta y habla del latín sin añadir matices. «Respondí y dije» preserva la forma directa del original y su tono solemne.
- source_word: coram te
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: coram
  rationale: «Delante de ti» comunica la presencia inmediata que expresa coram te en español natural y reverente, sin volverlo excesivamente formal.
- source_word: domine
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Mi Señor
  lexicon: domine
  rationale: El vocativo latino domina aquí como tratamiento directo a Dios; «Señor» es la forma española más clara y fiel.
- source_word: Ecce
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Mira, pues
  lexicon: ecce
  rationale: «He aquí» conserva el valor de deíxis solemne de ecce, común en registro bíblico y suficientemente natural en español.
- source_word: ego abibo
  english_pob_choice: I will go
  chosen_spanish: yo iré
  alternatives_spanish:
  - iré
  - me iré
  lexicon: abibo
  rationale: «Iré» reproduce el futuro simple del latín. Se mantiene «yo» para reflejar el énfasis explícito de ego y porque el texto lo subraya.
theological_decisions:
- issue: Tratamiento del vocativo divino
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Señor mío
  rationale: Aunque el proyecto usa «Yahvé» para יהוה cuando el hebreo lo exige, aquí el texto fuente es latino y usa domine como vocativo directo. «Señor» es la equivalencia más fiel y no fuerza una decisión textual que el pasaje no explicita.
  doctrine_reference: vocativo divino en traducción bíblica
- issue: Puntuación de discurso directo
  english_pob_reading: Then I answered and said before you, Lord, "Behold, I will go,"
  chosen_spanish_reading: 'Entonces respondí y dije delante de ti, Señor: «He aquí, yo iré».'
  alternative_spanish_readings:
  - Entonces respondí y dije delante de ti, Señor, «He aquí, yo iré».
  rationale: Se cierra el discurso directo en español con comillas y dos puntos para reflejar con claridad la cláusula citada en el latín, evitando que quede ligada al verso siguiente.
  doctrine_reference: integridad del límite versicular y del discurso directo
translation_notes:
  revision_awareness: La revisión más reciente restauró explícitamente la cláusula «Behold, I will go» dentro de este versículo y cerró la cita en inglés. La presente versión española incorpora esa cláusula en el mismo versículo y la presenta como discurso directo completo.
  spanish_consistency_notes:
  - Se conserva el registro bíblico solemne sin arcaismos innecesarios.
  - No se introduce terminología doctrinal ajena al latín fuente.
  - La puntuación española delimita correctamente la cita directa y evita trasladar contenido al versículo siguiente.
