translation:
  language: es
  text: la herencia en la tierra de Sion, y ustedes y sus padres cometieron iniquidad y no guardaron los caminos que el Altísimo les mandó; el Justo[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El latín termina simplemente con Iustus. Se ha vertido como título nominal, ‘el Justo’, siguiendo la solución de la POB inglesa ‘the Righteous One’.
    reason: source_note
lexical_decisions:
- source_word: sortem
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la porción
  - la suerte
  lexicon: sortes / sors
  rationale: En este contexto la POB inglesa entendió sortem como ‘inheritance’, no como ‘lot’ en sentido de sorteo. ‘Herencia’ expresa bien el bien recibido por asignación divina y mantiene la idea patrimonial sin introducir una metáfora ajena.
- source_word: in terra Sion
  english_pob_choice: in the land of Zion
  chosen_spanish: en la tierra de Sion
  alternatives_spanish:
  - en la tierra de Sión
  - en la tierra de Sion
  lexicon: terra / Sion
  rationale: ‘Tierra de Sion’ sigue de cerca la estructura del latín y conserva el topónimo bíblico en forma ampliamente reconocible en español. Se evita ‘Sión’ con tilde solo por consistencia editorial; ambas formas son posibles en español.
- source_word: uos et patres uestri
  english_pob_choice: you and your fathers
  chosen_spanish: ustedes y sus padres
  alternatives_spanish:
  - vosotros y vuestros padres
  - ustedes y vuestros padres
  lexicon: uos / patres uestri
  rationale: Se usa el español neutro de registro bíblico ‘ustedes’ para una audiencia latinoamericana amplia. ‘Sus padres’ conserva la referencia generacional plural del original.
- source_word: iniquitatem fecistis
  english_pob_choice: committed iniquity
  chosen_spanish: cometieron iniquidad
  alternatives_spanish:
  - hicieron iniquidad
  - cometieron injusticia
  lexicon: iniquitas / iniquitatem facere
  rationale: ‘Cometieron iniquidad’ es una equivalencia directa y tradicionalmente inteligible. Mantiene el peso moral/judicial de iniquitas mejor que una paráfrasis más suave.
- source_word: non seruastis uias
  english_pob_choice: did not keep the ways
  chosen_spanish: no guardaron los caminos
  alternatives_spanish:
  - no siguieron los caminos
  - no observaron los caminos
  lexicon: seruare / uiae
  rationale: ‘Guardar los caminos’ reproduce la idiomática bíblica de obediencia a un modo de vida prescrito. ‘Caminos’ traduce uias sin diluir el carácter normativo de la expresión.
- source_word: quas uobis praecepit altissimus
  english_pob_choice: that the Most High commanded you
  chosen_spanish: que el Altísimo les mandó
  alternatives_spanish:
  - que el Altísimo les ordenó
  - que el Altísimo les había mandado
  lexicon: praecipere / Altissimus
  rationale: ‘Mandó’ es natural en español y conserva el sentido de mandato divino. ‘Altísimo’ sigue la equivalencia estable para Altissimus y mantiene la reverencia del título.
- source_word: Iustus
  english_pob_choice: the Righteous One
  chosen_spanish: el Justo
  alternatives_spanish:
  - el Justo Uno
  - el Justo
  lexicon: iustus
  rationale: El latín concluye con un título sustantivado. ‘El Justo’ preserva esa forma nominal breve y reverente. Se evita ampliar con ‘Uno’ porque el latín no lo exige y en español suena forzado.
theological_decisions:
- issue: Sentido del final abrupto ‘Iustus’
  english_pob_reading: the Righteous One
  chosen_spanish_reading: el Justo
  alternative_spanish_readings:
  - el Justo Uno
  - el Justo
  rationale: La fuente latina termina de manera nominal y sin verbo. La POB inglesa optó por sustantivar el título como ‘the Righteous One’. En español, ‘el Justo’ conserva el cierre cristológico/teológico abierto sin añadir material que el texto no da explícitamente.
  doctrine_reference: Título divino/mesiánico de justicia; respeto por la ambigüedad textual del final
- issue: Relación entre ‘inheritance’ y ‘land of Zion’
  english_pob_reading: the inheritance in the land of Zion
  chosen_spanish_reading: la herencia en la tierra de Sion
  alternative_spanish_readings:
  - la heredad en la tierra de Sion
  - la herencia en Sión
  rationale: La POB inglesa hizo explícita la idea patrimonial. ‘Herencia’ en español comunica mejor la posesión concedida que ‘heredad’ para lectores amplios, sin perder la referencia a la tierra prometida/Zion.
  doctrine_reference: Lenguaje de promesa y posesión pactal
- issue: ‘Most High’ as divine title
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Altísimo Dios
  - el Altísimo
  rationale: ‘Altísimo’ es la equivalencia bíblica estándar en español y mantiene el título sin añadir ‘Dios’, que el latín no expresa aquí. Se preserva así la sobriedad del original.
  doctrine_reference: Título divino Altissimus
translation_notes:
  revision_awareness: El borrador anterior seguía una línea ajena al latín recibido; esta versión restituye el contenido de sortem in terra Sion, la acusación contra ustedes y sus padres, la falta de guardar los caminos mandados por el Altísimo, y el cierre nominal Iustus, en consonancia con la revisión aplicada.
  spanish_consistency_notes:
  - Se mantiene ‘Sion’ sin tilde para uniformidad editorial; puede normalizarse a ‘Sión’ si el proyecto lo prefiere.
  - Se usa ‘Altísimo’ para Altissimus, sin añadir ‘Dios’ porque la fuente latina no lo explicita.
  - ‘el Justo’ queda como título final sustantivado, no como adjetivo dentro de una cláusula verbal.
