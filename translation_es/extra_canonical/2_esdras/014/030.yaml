    changes_summary: Added the omitted clause 'And you transgressed after them' from the Latin and removed 'as an inheritance,' which is not present in the provided source. Kept the remaining wording unchanged.
translation:
  language: es
  text: Y vosotros transgredisteis después de ellos. Y la tierra os fue dada en la tierra de Sión; pero tanto vosotros como vuestros padres cometisteis iniquidad[a] y no guardasteis los caminos que el Altísimo os mandó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pero vosotros y vuestros padres cometisteis iniquidad».
    reason: La nota heredada del inglés POB documenta una redacción previa sin el énfasis correlativo explícito de «tanto… como…».
lexical_decisions:
- source_word: et uos post eos transgressi estis
  english_pob_choice: And you transgressed after them.
  chosen_spanish: Y vosotros os rebelasteis después de ellos.
  alternatives_spanish:
  - Y vosotros transgredisteis después de ellos.
  - Y vosotros quebrantasteis la ley después de ellos.
  lexicon: transgredior
  rationale: El latín expresa la idea de apartarse o pasar de un límite; en español, «rebelarse» comunica bien la ruptura culpable con fidelidad al tono acusatorio y bíblico. «Transgredir» es posible, pero suena más técnico y menos natural en lectura pública.
- source_word: Et data est uobis terra in...
  english_pob_choice: And the land was given to you...
  chosen_spanish: Y la tierra os fue dada...
  alternatives_spanish:
  - Y se os dio la tierra...
  - Y la tierra fue entregada a vosotros...
  lexicon: do passive
  rationale: La pasiva latina se refleja de forma natural en español con «os fue dada», conservando el acto divino implícito sin añadir sujeto no explicitado en el texto.
- source_word: in terra Sion
  english_pob_choice: in the land of Zion
  chosen_spanish: en la tierra de Sión
  alternatives_spanish:
  - en la tierra de Sion
  - en la tierra de Sión
  lexicon: Sion/Zion
  rationale: Se mantiene el nombre bíblico tradicional «Sión», que es la forma corriente y más inteligible en español bíblico. La preposición y el sustantivo reproducen la ubicación sin amplificación.
- source_word: vos et patres uestri
  english_pob_choice: both you and your fathers
  chosen_spanish: tanto vosotros como vuestros padres
  alternatives_spanish:
  - vosotros y vuestros padres
  - así vosotros como vuestros padres
  lexicon: correlative construction
  rationale: El latín usa una correlación enfática; «tanto... como...» conserva en español la fuerza de «both... and...» sin diluir la insistencia generacional.
- source_word: iniquitatem fecistis
  english_pob_choice: committed iniquity
  chosen_spanish: cometisteis iniquidad
  alternatives_spanish:
  - hicisteis iniquidad
  - practicasteis maldad
  lexicon: iniquitas
  rationale: «Iniquidad» reproduce el campo semántico jurídico-moral del latín y armoniza con el registro bíblico del pasaje.
- source_word: et non custodistis vias
  english_pob_choice: and did not keep the ways
  chosen_spanish: y no guardasteis los caminos
  alternatives_spanish:
  - y no observasteis los caminos
  - y no mantuvisteis los caminos
  lexicon: custodire vias
  rationale: En español bíblico, «guardar los caminos» conserva la metáfora de observar y obedecer un modo de vida ordenado por Dios, sin perder el vínculo con la imagen de «caminos».
- source_word: quas mandauit uobis Altissimus
  english_pob_choice: that the Most High commanded you
  chosen_spanish: que el Altísimo os mandó
  alternatives_spanish:
  - que el Altísimo os ordenó
  - que el Altísimo os había mandado
  lexicon: Altissimus
  rationale: «El Altísimo» es la forma estable y reverente para Altissimus; «mandó» reproduce con naturalidad el mandato divino en español.
theological_decisions:
- issue: Forma de nombrar a Dios como Altissimus
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Más Alto
  - el Supremo
  rationale: Se preserva el título teológico bíblico consagrado en español, sin suavizarlo ni sustituirlo por una paráfrasis menos tradicional.
  doctrine_reference: Título divino de soberanía; cf. uso bíblico de Elyon/Altissimus.
- issue: Énfasis en culpa multigeneracional
  english_pob_reading: but both you and your fathers committed iniquity
  chosen_spanish_reading: pero tanto vosotros como vuestros padres cometisteis iniquidad
  alternative_spanish_readings:
  - pero vosotros y vuestros padres cometisteis iniquidad
  - pero tanto vosotros cuanto vuestros padres cometisteis iniquidad
  rationale: 'Se conserva el énfasis retórico del latín revisado por la auditoría inglesa: la culpa compartida no solo es histórica sino explícitamente correlativa entre generaciones.'
  doctrine_reference: Responsabilidad corporativa e infidelidad del pueblo en la historia de Israel.
translation_notes:
  revision_awareness: 'La revisión más reciente del contexto inglés añadió la cláusula omitida «Y vosotros os rebelasteis después de ellos» y restableció la correlación enfática «both you and your fathers». La redacción española incorpora ambas decisiones: añade la cláusula inicial y reproduce la fuerza de la correlación con «tanto... como...». También evita introducir «como herencia», ya que no está en el latín fuente proporcionado.'
  spanish_consistency_notes:
  - Se usa «vosotros/os» siguiendo la voz plural del original y la sintaxis del texto bíblico.
  - Se mantiene «Sión» en lugar de «Sion» por consistencia con el uso bíblico español estándar.
  - «Iniquidad» y «el Altísimo» conservan el registro bíblico-jurídico sin recurrir a sustituciones más explicativas que el latín no exige.
