  yaml_path: translation/extra_canonical/2_esdras/014/030.yaml
  text: And you transgressed after them. And the land was given to you in the land of Zion[a], but both you and your fathers committed iniquity and did not keep the ways that the Most High commanded you.
  footnotes:
