review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del latín y conserva el añadido auditado «Y vosotros… después de ellos» y el énfasis correlativo «tanto… como…». Sin embargo, «os rebelasteis» interpreta demasiado específicamente transgressi estis; el latín y el inglés POB apuntan más directamente a «transgredisteis». Además, la nota [a] está mal anclada: el inglés documenta una alternativa para la cláusula posterior («pero tanto vosotros como vuestros padres…»), no para «Sión».'
  spanish_quality_summary: El texto es legible y de tono bíblico adecuado. «Y la tierra os fue dada en la tierra de Sión» suena algo rígido por la repetición de «tierra», pero sigue siendo fiel al origen y aceptable. La mayor mejora necesaria es léxica («transgredisteis» mejor que «os rebelasteis») y de manejo de nota al pie.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Sión», «iniquidad» y «el Altísimo» están bien. La revisión propuesta mantiene registro bíblico natural sin añadir matices ajenos al source.
  issues:
  - severity: medium
    issue: «os rebelasteis» sobreinterpreta transgressi estis
    rationale: «Transgredirse/rebelarse» no son equivalentes plenos. El latín expresa transgresión, no necesariamente rebelión abierta; el inglés POB eligió «transgressed». En español bíblico, «transgredisteis» preserva mejor el sentido fuente.
  - severity: high
    issue: La nota [a] está colocada en «Sión» pero su contenido corresponde a la cláusula posterior
    rationale: La footnote inglesa marca una alternativa para «but both you and your fathers committed iniquity». En español, el marcador debe anclarse en esa frase alternativa, no en «Sión», para preservar correctamente la auditoría y evitar confusión textual.
  revised_spanish_text: Y vosotros transgredisteis después de ellos. Y la tierra os fue dada en la tierra de Sión; pero tanto vosotros como vuestros padres cometisteis iniquidad[a] y no guardasteis los caminos que el Altísimo os mandó.
  revised_footnotes:
  - marker: a
    text: O «pero vosotros y vuestros padres cometisteis iniquidad».
    reason: La nota heredada del inglés POB documenta una redacción previa sin el énfasis correlativo explícito de «tanto… como…».
  revision_rationale: Se corrige «os rebelasteis» a «transgredisteis» para ajustarse más estrechamente a transgressi estis y al inglés POB. También se reubica y reformula la nota [a] para que ancle la alternativa en la cláusula correcta, conforme al audit trail. No se fuerza otra reescritura de «la tierra… en la tierra de Sión» porque, aunque algo repetitiva, reproduce fielmente el source disponible.
