revisions:
- from: Y vosotros os rebelasteis después de ellos. Y la tierra os fue dada en la tierra de Sión[a]; pero tanto vosotros como vuestros padres cometisteis iniquidad y no guardasteis los caminos que el Altísimo os mandó.
  to: Y vosotros transgredisteis después de ellos. Y la tierra os fue dada en la tierra de Sión; pero tanto vosotros como vuestros padres cometisteis iniquidad[a] y no guardasteis los caminos que el Altísimo os mandó.
  rationale: Se corrige «os rebelasteis» a «transgredisteis» para ajustarse más estrechamente a transgressi estis y al inglés POB. También se reubica y reformula la nota [a] para que ancle la alternativa en la cláusula correcta, conforme al audit trail. No se fuerza otra reescritura de «la tierra… en la tierra de Sión» porque, aunque algo repetitiva, reproduce fielmente el source disponible.
