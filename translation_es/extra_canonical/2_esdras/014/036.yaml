translation:
  language: es
  text: Pero ahora nadie se me acerque ni me busque durante cuarenta días. Y tomé a cinco hombres, como me había mandado, y partimos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: requirent me
  english_pob_choice: seek me
  chosen_spanish: me busque
  alternatives_spanish:
  - me busque a mí
  - me busque
  lexicon: requirere
  rationale: En este contexto, el latín expresa buscar o procurar la presencia de alguien; el inglés POB lo tomó como «seek me». En español, «me busque» comunica bien esa acción sin sonar forzado.
- source_word: usque diebus XL
  english_pob_choice: for forty days
  chosen_spanish: durante cuarenta días
  alternatives_spanish:
  - por cuarenta días
  - hasta cuarenta días
  lexicon: dies
  rationale: La duración temporal se expresa de manera natural en español con «durante cuarenta días», conservando el valor de intervalo continuo del latín.
- source_word: Et accepi quinque uiros
  lexicon: accipere
  rationale: Esta cláusula no pertenece al contenido del versículo en la porción inglesa citada para 14:36; por eso no se incorpora en el texto español de este registro.
theological_decisions:
- issue: Proximidad ritual al vidente durante el período de cuarenta días
  english_pob_reading: But let no one come near me now, nor seek me for forty days.
  chosen_spanish_reading: Pero ahora nadie se me acerque, ni me busque durante cuarenta días.
  alternative_spanish_readings:
  - Pero ahora nadie venga cerca de mí, ni me busque durante cuarenta días.
  - Que nadie se acerque a mí ahora, ni me busque durante cuarenta días.
  rationale: El mandato tiene fuerza prohibitiva y temporal. «No se me acerque» mantiene la cercanía física implícita en el latín, mientras que «ni me busque» conserva el paralelo con la búsqueda personal.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente marcó el segmento como sin cambios necesarios y el cotejo posterior quedó en alto acuerdo; por ello, el español se alinea estrechamente con la lectura inglesa auditada y con el latín limpio de Bensly.
  spanish_consistency_notes:
