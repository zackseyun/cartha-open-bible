translation:
  language: es
  text: y apresúrate a partir de estos tiempos; pues lo que has visto ahora
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: festina transmigrare
  english_pob_choice: and hurry to depart
  chosen_spanish: apresúrate a salir
  alternatives_spanish:
  - date prisa en partir
  - apresúrate a marcharte
  lexicon: festina; transmigrare
  rationale: El latín combina urgencia con movimiento hacia afuera/de cambio de lugar. «Apresúrate a salir» conserva la fuerza imperativa y el sentido de apartarse de estos tiempos sin introducir una equivalencia más fuerte que el texto no exige.
- source_word: a temporibus his
  english_pob_choice: from these times
  chosen_spanish: de estos tiempos
  alternatives_spanish:
  - de este tiempo
  - de estos días
  lexicon: a + temporibus his
  rationale: «Estos tiempos» refleja el plural latino y mantiene el alcance temporal amplio. «De este tiempo» suavizaría indebidamente el plural del original.
- source_word: Quae enim uidisti nunc
  english_pob_choice: for the things you have now seen
  chosen_spanish: porque las cosas que has visto ahora
  alternatives_spanish:
  - pues lo que has visto ahora
  - porque lo que has visto ahora
  lexicon: quae; uidisti; nunc
  rationale: «Las cosas que has visto ahora» sigue el sustantivo plural del latín y evita anticipar contenido ajeno al versículo. «Porque» refleja la relación causal/explicativa de enim sin forzar una explicación doctrinal.
theological_decisions:
- issue: Alcance de la cláusula final
  english_pob_reading: for the things you have now seen
  chosen_spanish_reading: porque las cosas que has visto ahora
  alternative_spanish_readings:
  - porque las cosas que ahora has visto
  rationale: La revisión del POB inglés restringe este versículo a lo que realmente aparece en el latín de 14:15, sin importar ‘evils’ ni ‘happen’ desde el verso siguiente. La versión española mantiene esa delimitación y no completa la idea con material de 14:16.
  doctrine_reference: Coherencia textual / delimitación versicular
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que eliminó la expansión ‘For the evils that you have now seen happen’ por cruzar el límite de 14:16. Por eso el español solo refleja el contenido de 14:15: urgencia para salir de estos tiempos y la cláusula incompleta/abierta sobre ‘las cosas que has visto ahora’.'
  spanish_consistency_notes:
  - Se mantiene «tiempos» en plural para corresponder a temporibus his.
  - No se usa «Señor» ni terminología teológica añadida, porque este versículo no contiene nombres divinos ni títulos cristológicos.
  - Se conserva un estilo sobrio y bíblico, pero con español natural y sin calco innecesario.
