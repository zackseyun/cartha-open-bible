translation:
  language: es
  text: Las señales que te he mostrado, y los sueños que has visto, y las interpretaciones que has oído[a], guárdalas en tu corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Guarda en tu corazón las señales que te he mostrado, y los sueños que has visto, y las interpretaciones que has oído»'
    reason: alternative_word_order
lexical_decisions:
- source_word: Signa
  english_pob_choice: The signs that I have shown
  chosen_spanish: Las señales que he mostrado
  alternatives_spanish:
  - Las señales que te he mostrado
  - Los signos que he mostrado
  lexicon: signum -> señal / signo
  rationale: «Signa» puede traducirse como «señales» o «signos». «Señales» es natural en español bíblico y conserva el valor de indicio o manifestación dada por Dios. Mantengo el sentido de algo mostrado por el hablante con «he mostrado», siguiendo el inglés POB y el latín perfecto.
- source_word: somnia
  english_pob_choice: the dreams that you have seen
  chosen_spanish: los sueños que has visto
  alternatives_spanish:
  - los sueños que has visto
  - los sueños que viste
  lexicon: somnium -> sueño
  rationale: «Sueños» es la equivalencia directa y clara. El pretérito perfecto compuesto «has visto» conserva la relación con la experiencia del destinatario sin forzar un estilo arcaico.
- source_word: interpretationes
  english_pob_choice: the interpretations that you have heard
  chosen_spanish: las interpretaciones que has oído
  alternatives_spanish:
  - las interpretaciones que has escuchado
  - las interpretaciones que has oído
  lexicon: interpretatio -> interpretación
  rationale: «Interpretaciones» mantiene el sustantivo técnico. «Has oído» corresponde bien al latín «audisti» y evita introducir una matización innecesaria; «escuchado» sería posible, pero «oído» es más directo al dato auditivo.
- source_word: repone ea
  english_pob_choice: store them up in your heart
  chosen_spanish: ponlas en tu corazón
  alternatives_spanish:
  - guárdalas en tu corazón
  - ponlas en tu corazón
  lexicon: reponere -> poner de nuevo / guardar / depositar
  rationale: El latín manda «repone ea», literalmente «ponlas de nuevo» o «colócalas». En español, «ponlas en tu corazón» reproduce la imagen semítica de interiorizar y conservar en lo más íntimo. «Guardar» sería una alternativa más interpretativa; la forma elegida conserva la concreción del original.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la nota [a] ahora aparece anclada en el texto español y corresponde a la alternativa de orden verbal reflejada por el latín y el audit trail en inglés.'
  spanish_consistency_notes:
  - Se mantuvo la secuencia coordinada de tres objetos antes del mandato final, para respetar la estructura discursiva del latín.
  - Se evitó «SEÑOR» u otros equivalentes no pertinentes; el texto no contiene nombres divinos.
  - El imperativo plural de la nota alternativa se formula en español como una posibilidad de reordenamiento, no como una traducción distinta del contenido.
