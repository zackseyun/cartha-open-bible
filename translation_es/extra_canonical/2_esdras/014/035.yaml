  language: en
  yaml_path: translation/extra_canonical/2_esdras/014/035.yaml
  text: we will live again; and then the name of the righteous will appear, and the deeds of the ungodly will be disclosed. But let no one come near me now, nor
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:52:29Z'
    unchanged: false
    changes_summary: 'Restored omitted opening and closing words from the Latin: added ''we will live again;'' for reuiuiscemus and the unfinished continuation ''But let no one come near me now, nor'' for Ad me autem nemo accedat nunc, neque. Kept the central clause essentially unchanged.'
translation:
  language: es
  text: Viviremos otra vez; y entonces aparecerá el nombre de los justos, y las obras de los impíos serán mostradas. Pero ahora nadie se acerque a mí, ni
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: reuiuiscemus
  english_pob_choice: we will live again
  chosen_spanish: Viviremos otra vez
  alternatives_spanish:
  - Volveremos a vivir
  - Reviviremos
  lexicon: revivir / vivir otra vez
  rationale: El latín expresa una reanudación de la vida; en español, 'viviremos otra vez' conserva la fuerza futura y el sentido de restauración sin introducir una interpretación demasiado técnica. 'Reviviremos' sería posible, pero puede sonar más abstracto; 'volveremos a vivir' es claro pero algo más perifrástico.
- source_word: iustorum nomen
  english_pob_choice: the name of the righteous
  chosen_spanish: el nombre de los justos
  alternatives_spanish:
  - el nombre de los rectos
  - el nombre de los justos y rectos
  lexicon: justo / recto
  rationale: '''Iustorum'' corresponde al grupo de los justos; ''justos'' es el término más natural y bíblicamente reconocible en español, y mantiene la relación nominal con ''nombre'' sin añadir matices no presentes.'
- source_word: impiorum facta
  english_pob_choice: the deeds of the ungodly
  chosen_spanish: las obras de los impíos
  alternatives_spanish:
  - los hechos de los impíos
  - las acciones de los impíos
  lexicon: impío / obra / hecho
  rationale: '''Facta'' puede rendirse como ''obras'' o ''hechos''. ''Obras'' es idiomático en español bíblico y conserva bien la idea de acciones visibles o evaluables; ''impíos'' sigue la carga moral del latín.'
- source_word: ostendentur
  english_pob_choice: will be disclosed
  chosen_spanish: serán dadas a conocer
  alternatives_spanish:
  - serán mostradas
  - quedarán al descubierto
  lexicon: manifestar / mostrar / dar a conocer
  rationale: '''Ostendentur'' significa que serán mostradas o puestas de manifiesto. ''Serán dadas a conocer'' expresa con claridad la manifestación pública sin forzar una imagen más técnica que el latín no exige.'
- source_word: Ad me autem nemo accedat nunc, neque
  english_pob_choice: But let no one come near me now, nor
  chosen_spanish: Pero ahora nadie se acerque a mí, ni
  alternatives_spanish:
  - Pero no se acerque ahora nadie a mí, ni
  - Mas ahora nadie venga a mí, ni
  lexicon: accedere / acercarse
  rationale: Se conserva el carácter inacabado del final latino con una conjunción abierta ('ni'), siguiendo la revisión inglesa que restauró la continuación truncada. 'Acercarse a mí' reproduce bien 'ad me ... accedat' en español natural.
theological_decisions:
- issue: Restauración del comienzo y del final truncado del versículo
  english_pob_reading: we will live again ... But let no one come near me now, nor
  chosen_spanish_reading: Viviremos otra vez ... Pero ahora nadie se acerque a mí, ni
  alternative_spanish_readings:
  - Viviremos de nuevo ... Pero que ahora nadie se acerque a mí, ni
  - Recobraremos la vida ... Pero ahora no se acerque nadie a mí, ni
  rationale: La edición inglesa revisada recupera tanto 'we will live again' como la clausula final incompleta. La traducción española debe preservar esa misma incompletitud con una conjunción final abierta ('ni'), sin cerrarla artificialmente ni suavizarla con una fórmula más completa.
  doctrine_reference: Crítica textual / integridad del testimonio
- issue: Visibilidad pública de los justos y de las obras de los impíos
  english_pob_reading: the name of the righteous will appear, and the deeds of the ungodly will be disclosed
  chosen_spanish_reading: aparecerá el nombre de los justos, y las obras de los impíos serán dadas a conocer
  alternative_spanish_readings:
  - saldrá a la luz el nombre de los justos, y las obras de los impíos se manifestarán
  - se hará visible el nombre de los justos, y las obras de los impíos serán reveladas
  rationale: '''Aparecerá'' y ''serán dadas a conocer'' mantienen la idea de manifestación pública sin introducir doctrinas adicionales. No se intensifica a lenguaje de juicio escatológico más explícito que el latín mismo.'
  doctrine_reference: Manifestación final / revelación de obras
translation_notes:
  revision_awareness: 'This draft restores the full source sense reflected in the latest English revision: the opening ''we will live again'' and the truncated closing ''nor'' are both represented in Spanish, while the middle clause remains closely aligned with the Latin and the English audit trail.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico en español, con léxico transparente y no eclesiástico artificial.
  - '''Justos'' e ''impíos'' conservan la antítesis moral del latín y del inglés POB.'
  - No se introducen notas al pie porque el texto no requiere variantes obligatorias y el final truncado ya queda señalado por la conjunción abierta 'ni'.
