translation:
  language: es
  text: —cosas peores que estas sucederán de nuevo[a]. Porque cuanto más se debilita el mundo con la vejez, tanto más se multiplicarán los males.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «volverán a suceder cosas peores que estas».'
    reason: alternative_rendering
lexical_decisions:
- source_word: deteriora / deteriora facientur
  english_pob_choice: worse things than these will happen again
  chosen_spanish: cosas peores que estas sucederán de nuevo
  alternatives_spanish:
  - males peores que estos volverán a suceder
  - peores cosas que estas ocurrirán otra vez
  lexicon: Latin facientur
  rationale: 'El latín presenta un futuro pasivo: «serán hechas / sucederán». La frase debe conservar la idea de que los acontecimientos peores vendrán nuevamente, no que alguien los produce activamente.'
- source_word: saeculum
  english_pob_choice: the age
  chosen_spanish: la era
  alternatives_spanish:
  - el siglo
  - el mundo
  lexicon: Latin saeculum
  rationale: «Era» comunica el alcance histórico-apocalíptico del término sin reducirlo a un período de cien años ni cargarlo con una resonancia cosmológica más fuerte de lo que exige el contexto.
- source_word: senectute
  english_pob_choice: through old age
  chosen_spanish: por la vejez
  alternatives_spanish:
  - con la vejez
  - a causa de la vejez
  lexicon: Latin senectus
  rationale: La construcción causal en español se expresa de modo natural con «por la vejez», manteniendo la idea de debilitamiento progresivo.
- source_word: inualidum fit
  english_pob_choice: the weaker ... becomes
  chosen_spanish: se debilita
  alternatives_spanish:
  - se vuelve más débil
  - se hace más débil
  lexicon: Latin invalidus / fieri
  rationale: «Se debilita» preserva el proceso de deterioro sin sobrecargar la literalidad y encaja bien con el paralelismo de la segunda mitad del versículo.
- source_word: mala / malis
  english_pob_choice: evils
  chosen_spanish: los males
  alternatives_spanish:
  - los males y desastres
  - las desgracias
  lexicon: Latin malum
  rationale: «Males» conserva la amplitud moral y calamitoso-apocalíptica del sustantivo latino, en paralelo con el aumento de eventos adversos.
theological_decisions:
- issue: Passive future of final worsening
  english_pob_reading: worse things than these will happen again
  chosen_spanish_reading: cosas peores que estas sucederán de nuevo
  alternative_spanish_readings:
  - cosas peores que estas volverán a suceder
  - peores cosas que estas ocurrirán otra vez
  rationale: Se mantiene el sentido de inevitabilidad escatológica del pasivo futuro latino, evitando una lectura causal activa que no está en el texto.
  doctrine_reference: 4 Esdras / 2 Esdras 14:16; juicio y deterioro escatológico
- issue: Escalation of evils as age weakens
  english_pob_reading: For the weaker the age becomes through old age, the more evils will multiply.
  chosen_spanish_reading: Porque cuanto más se debilita la era por la vejez, tanto más se multiplicarán los males.
  alternative_spanish_readings:
  - Porque mientras más débil se hace la era por la vejez, más se multiplicarán los males.
  - Porque cuanto más se debilite la era por la vejez, tanto más aumentarán los males.
  rationale: La correlación comparativa se conserva con una construcción española clara y solemne, respetando el paralelismo cuantitativo del latín.
  doctrine_reference: 4 Esdras / 2 Esdras 14:16; decadencia histórica y multiplicación de males
translation_notes:
  revision_awareness: 'La revisión aplicada corrigió la interpretación del futuro pasivo latino facientur: no significa «harán surgir» sino «sucederán / serán hechas». La redacción española refleja esa lectura pasiva e inevitable, y conserva la progresión comparativa del final del versículo.'
  spanish_consistency_notes:
  - Se mantuvo «era» para saeculum en coherencia con un registro histórico-apocalíptico.
  - Se usó «males» para malis, evitando reducir el término a un solo tipo de mal.
  - La nota al pie está anclada en el texto con [a], según la validación requerida.
