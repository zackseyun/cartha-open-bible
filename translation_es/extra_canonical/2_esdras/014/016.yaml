revisions:
- from: —cosas peores que estas sucederán de nuevo[a]. Porque cuanto más se debilita la era por la vejez, tanto más se multiplicarán los males.
  to: —cosas peores que estas sucederán de nuevo[a]. Porque cuanto más se debilita el mundo con la vejez, tanto más se multiplicarán los males.
  rationale: Se ajusta `saeculum` a 'el mundo' para un español más natural en este contexto apocalíptico y se suaviza la construcción con 'con la vejez'. Se mantiene correctamente el sentido no activo de `facientur` ('sucederán'). La nota se conserva como alternativa estilística legítima sin introducir un sentido distinto.
