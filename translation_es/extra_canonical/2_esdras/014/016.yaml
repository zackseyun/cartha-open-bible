review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del latín: `deteriora facientur` se entiende correctamente como acontecimiento futuro pasivo/impersonal (''sucederán''), no como causación activa; y la correlación comparativa de `Quantum... tantum...` está preservada. Sin embargo, en la segunda cláusula `saeculum` como ''la era'' suena algo calcado e idiomáticamente débil en español bíblico general; el sentido apocalíptico-histórico queda mejor con ''el mundo'' aquí, especialmente junto con ''envejece''.'
  spanish_quality_summary: El español es claro y digno, pero 'la era por la vejez' resulta poco natural. 'El mundo envejece' o 'el mundo se debilita con la vejez' fluye mejor en español eclesial amplio. También conviene alinear la nota con la alternativa inglesa completa y mantener puntuación española natural.
  glossary_alignment: 'No hay términos del glosario principal en conflicto. La decisión sobre `saeculum` merece ajuste contextual: aunque ''era'' puede ser defendible, aquí ''mundo'' comunica mejor el deterioro de la edad presente sin sonar técnico. ''Males'' para `mala` está bien.'
  issues:
  - severity: medium
    issue: '`saeculum` traducido como ''la era'''
    rationale: Aunque posible, aquí produce una frase poco idiomática ('la era por la vejez'). En este contexto de decadencia del orden presente, 'el mundo' suena más natural en español y sigue siendo fiel al campo semántico del latín.
  - severity: low
    issue: Expresión 'por la vejez' con 'la era'
    rationale: La combinación es comprensible pero rígida. 'Con la vejez' o una reformulación con 'envejece' mejora la legibilidad sin perder el matiz causal/progresivo.
  - severity: low
    issue: Nota al pie demasiado reducida frente al rastro inglés
    rationale: La nota actual solo ofrece una variante estilística breve. Puede conservarse una alternativa española más completa que refleje mejor la opción previa documentada, aunque no es un problema grave.
  revised_spanish_text: —cosas peores que estas sucederán de nuevo[a]. Porque cuanto más se debilita el mundo con la vejez, tanto más se multiplicarán los males.
  revised_footnotes:
  - marker: a
    text: 'O: «volverán a suceder cosas peores que estas».'
    reason: alternative_rendering
  revision_rationale: Se ajusta `saeculum` a 'el mundo' para un español más natural en este contexto apocalíptico y se suaviza la construcción con 'con la vejez'. Se mantiene correctamente el sentido no activo de `facientur` ('sucederán'). La nota se conserva como alternativa estilística legítima sin introducir un sentido distinto.
