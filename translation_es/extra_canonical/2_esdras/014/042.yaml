    timestamp: '2026-04-23T19:53:03Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Mi boca fue abierta y ya no se cerró más. Y el Altísimo dio entendimiento a los cinco hombres, y escribieron sucesivamente[a] lo que se decía, en caracteres que no conocían[b]. Y estuvieron allí cuarenta días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por turnos»; la frase latina ex successione señala que escribían uno tras otro para seguir la dictación continua.
    reason: alternative_reading
  - marker: b
    text: El latín notis quas non sciebant puede referirse a signos de escritura desconocidos, abreviaturas o formas de escritura habilitadas de manera extraordinaria; el texto no precisa más.
    reason: lexical_alternative
lexical_decisions:
- source_word: Altissimus
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  - el Altísimo Dios
  lexicon: Altissimus
  rationale: El latín nombra a Dios con un título reverencial; en español, «el Altísimo» reproduce bien el valor honorífico y bíblico sin añadir el sustantivo «Dios», que no aparece en el texto.
- source_word: dedit intellectum
  english_pob_choice: gave understanding
  chosen_spanish: dio entendimiento
  alternatives_spanish:
  - les dio comprensión
  - les concedió entendimiento
  lexicon: dedit / intellectum
  rationale: «Dio entendimiento» es directo, natural en español bíblico y conserva la idea de capacidad intelectual concedida por Dios.
- source_word: quinque uiris
  english_pob_choice: the five men
  chosen_spanish: a los cinco hombres
  alternatives_spanish:
  - a los cinco varones
  - a los cinco
  lexicon: quinque viri
  rationale: «Hombres» comunica el sentido básico de varones/personas adultas y mantiene la referencia narrativa sin sobrecarga arcaizante.
- source_word: scripserunt quae dicebantur
  english_pob_choice: they wrote the things that were spoken
  chosen_spanish: escribieron lo que se decía
  alternatives_spanish:
  - escribieron las cosas que se decían
  - anotaron lo que se decía
  lexicon: scripserunt / dicebantur
  rationale: La forma impersonal «lo que se decía» refleja la dictación continua del contexto y evita una paraphrasis más pesada.
- source_word: ex successione
  english_pob_choice: in succession
  chosen_spanish: sucesivamente
  alternatives_spanish:
  - por turnos
  - en sucesión
  lexicon: ex successione
  rationale: La revisión inglesa subrayó que la expresión latina indica que escribían uno tras otro, por turnos, no sólo el orden del contenido. «Sucesivamente» mantiene esa secuencia de turnos en español.
- source_word: notis quas non sciebant
  english_pob_choice: characters that they did not know
  chosen_spanish: en caracteres que no conocían
  alternatives_spanish:
  - en signos que no conocían
  - en una escritura que no conocían
  lexicon: notis
  rationale: '«Caracteres» conserva la ambigüedad útil del inglés POB: puede aludir a signos de escritura, formas abreviadas o medios de escritura no familiares, sin precisar más de lo que permite el latín.'
- source_word: et sederunt
  english_pob_choice: And they sat there
  chosen_spanish: Y estuvieron allí
  alternatives_spanish:
  - Y se sentaron allí
  - Y permanecieron allí
  lexicon: et sederunt
  rationale: El latín aquí funciona como indicación de permanencia durante el período narrado; «estuvieron allí» es natural y no introduce un gesto corporal innecesario.
theological_decisions:
- issue: Título divino para Altissimus
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Más Alto
  - el Altísimo Dios
  rationale: Se mantiene el título tradicional bíblico sin sustituirlo por una paráfrasis. No hay razón textual para expandirlo a «Dios», aunque el referente sea divino.
  doctrine_reference: título divino reverencial
translation_notes:
  revision_awareness: La lectura inglesa anterior «in order» fue corregida en la revisión auditada a «in succession» a partir de ex successione; por eso el español evita «en orden» y opta por «sucesivamente», que preserva la imagen de escritura por turnos. La clausula final coincide con la tradición textual auditada y no requiere cambios adicionales.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para el título divino conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque el source aquí es latino y nombra explícitamente al Altísimo, no un masking convencional del tetragrama.
  - «Caracteres» conserva la ambigüedad textual útil en el inglés POB.
  - «Sucesivamente» refleja la revisión sobre ex successione como alternancia de escribas, no mero orden del contenido.
  - El verbo «estuvieron» traduce la permanencia narrativa de sederunt sin forzar una escena distinta.
