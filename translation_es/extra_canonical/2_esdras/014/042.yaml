base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/014/042.yaml
  text: And the Most High gave understanding to the five men[14:42], and they wrote in succession the things that were spoken, in characters that they did not know[a]. And they sat there forty days.
  footnotes:
  - marker: '14:42'
    text: The phrase 'in characters that they did not know' may refer to unfamiliar script-signs, shorthand, or divinely enabled writing forms; the Latin alone does not specify further.
    reason: lexical_alternative
