    changes_summary: Changed 'came out to me' to 'came to me' for more natural English while preserving the sense of the Latin. Retained the rest essentially unchanged, with final punctuation adjusted to match the introduction of the following speech.
translation:
  language: es
  text: 'Y he aquí, me llegó una voz desde una zarza y dijo: «¡Esdras, Esdras!». Y dije: «Aquí estoy, Señor». Y me puse de pie, y me dijo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: uox
  english_pob_choice: a voice came to me
  chosen_spanish: una voz vino a mí
  alternatives_spanish:
  - una voz llegó a mí
  - una voz se me acercó
  lexicon: vox
  rationale: El latín dice que la voz «exiuit contra me», pero la revisión inglesa ya ajustó a «came to me» por naturalidad sin perder el sentido. En español, «vino a mí» conserva la dirección hacia el hablante y suena más natural que un calco de salida literal.
- source_word: de rubo
  english_pob_choice: from a bush
  chosen_spanish: desde una zarza
  alternatives_spanish:
  - de una zarza
  - desde un arbusto
  lexicon: rubus
  rationale: «Rubus» puede abarcar matorral/zarza, pero «zarza» mantiene mejor la resonancia bíblica de una zarza ardiente sin añadir un rasgo no presente en el texto. «Desde» expresa origen con claridad en español.
- source_word: Ezra, Ezra
  english_pob_choice: “Ezra, Ezra!”
  chosen_spanish: «¡Esdras, Esdras!»
  alternatives_spanish:
  - «¡Ezra, Ezra!»
  lexicon: Esdras / Ezra
  rationale: En español bíblico y eclesial, «Esdras» es el nombre estándar y más reconocible. Se conserva la repetición vocativa del original.
- source_word: ecce ego, domine
  english_pob_choice: Here I am, Lord
  chosen_spanish: Aquí estoy, Señor
  alternatives_spanish:
  - Aquí me tienes, Señor
  - Heme aquí, Señor
  lexicon: ecce ego
  rationale: La respuesta formulaica se traduce de manera idiomática y reverente. «Aquí estoy» comunica la disponibilidad del hablante sin arcaísmo excesivo; «Señor» corresponde al vocativo latino «domine».
- source_word: surrexi super pedes meos
  english_pob_choice: And I stood on my feet
  chosen_spanish: Y me puse sobre mis pies
  alternatives_spanish:
  - Y me levanté sobre mis pies
  - Y me incorporé
  lexicon: surrexi
  rationale: El latín enfatiza el acto de ponerse en pie. «Me puse sobre mis pies» preserva la imagen corporal de forma clara y fiel; «me incorporé» sería más idiomático pero menos explícito.
- source_word: dixit ad me
  english_pob_choice: it said to me
  chosen_spanish: y me dijo
  alternatives_spanish:
  - y me habló
  lexicon: dixit ad me
  rationale: Se mantiene la personificación de la voz tal como la tradición textual y la versión inglesa la conservan. «Me dijo» es la equivalencia más directa y sobria.
translation_notes:
  revision_awareness: El texto base latino presenta «exiuit contra me de rubo», mientras la revisión inglesa preferida armoniza la frase como «came to me from a bush» para mayor naturalidad sin alterar la escena. La versión española sigue esa lectura revisada y mantiene la secuencia narrativa y la puntuación que introduce el discurso siguiente.
  spanish_consistency_notes:
  - Se mantiene «voz» en femenino por concordancia con el sustantivo español y por fidelidad al latín.
  - Se usa «Esdras» como forma española estable del nombre propio bíblico.
  - No se introduce «SEÑOR» en versalitas; se traduce el vocativo con «Señor» normal, conforme al texto recibido.
