review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del latín: una voz procede de una zarza, llama dos veces a Esdras, él responde «Aquí estoy, Señor», se pone en pie y la voz le habla. Sin embargo, dos giros españoles son mejorables para fidelidad idiomática: «vino a mí» suena posible pero algo literal, y «me puse sobre mis pies» es torpe en español. El resto preserva correctamente la secuencia y la fuerza del original.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «una voz vino a mí» y especialmente «me puse sobre mis pies» suenan poco naturales en español bíblico moderno. Una pequeña reparación mejora mucho la legibilidad sin apartarse del texto fuente.
  glossary_alignment: No hay conflictos importantes con la terminología del proyecto. «Señor» para domine es adecuado aquí porque el texto fuente latino dice domine, no el Tetragrámaton. «Esdras» es la forma española estándar. «Zarza» es una buena elección para rubus.
  issues:
  - severity: medium
    issue: «una voz vino a mí» es algo forzado en español
    rationale: Aunque refleja la decisión inglesa «came to me», en español narrativo suena más natural «me llegó una voz» o «una voz vino desde una zarza». Conviene conservar tanto la procedencia como la dirección hacia el hablante.
  - severity: medium
    issue: «me puse sobre mis pies» es un calco poco natural
    rationale: El latín surrexi super pedes meos significa ponerse en pie. En español bíblico moderno, «me puse de pie» transmite la misma acción con claridad y fidelidad.
  revised_spanish_text: 'Y he aquí, me llegó una voz desde una zarza y dijo: «¡Esdras, Esdras!». Y dije: «Aquí estoy, Señor». Y me puse de pie, y me dijo:'
