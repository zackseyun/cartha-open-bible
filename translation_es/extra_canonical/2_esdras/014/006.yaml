lexical_decisions:
- source_word: Haec ... uerba
  english_pob_choice: These words
  chosen_spanish: Estas palabras
  alternatives_spanish:
  - Estas palabras éstas
  - Esas palabras
  lexicon: Latin haec + uerba
  rationale: «Estas» conserva la proximidad/deixis del demostrativo latino y «palabras» traduce con naturalidad uerba en español bíblico contemporáneo.
- source_word: in palam facies
  english_pob_choice: you shall make public
  chosen_spanish: las publicarás
  alternatives_spanish:
  - las harás públicas
  - las pondrás en público
  lexicon: Latin in palam facies
  rationale: La expresión latina pide una acción de hacer manifiesto o público; «publicarás» comunica bien esa idea en español moderno sin sobrecargar la frase.
- source_word: haec abscondes
  english_pob_choice: these you shall hide
  chosen_spanish: estas las ocultarás
  alternatives_spanish:
  - estas las esconderás
  - estas las guardarás en secreto
  lexicon: Latin abscondes
  rationale: «Ocultarás» mantiene el sentido de hacer no visible o no divulgar; «esconderás» es posible, pero «ocultar» es más natural en este registro y más cercano al contraste con «publicarás».
translation_notes:
