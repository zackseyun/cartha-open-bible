  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo antitético del original: una acción de divulgar frente a otra de reservar/ocultar.'
  - No se introdujo terminología eclesiástica técnica; el versículo es de instrucción textual directa.
  - El orden español respeta el contraste y evita calcos excesivamente rígidos.
