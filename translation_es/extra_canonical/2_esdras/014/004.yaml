translation:
  language: es
  text: Y lo envié, y él sacó a mi pueblo de Egipto, y yo lo hice subir al monte Sinaí, y lo retuve conmigo por muchos días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et misi eum
  english_pob_choice: And I sent him
  chosen_spanish: Y lo envié
  alternatives_spanish:
  - Y lo mandé
  - Y lo remití
  lexicon: misi < mittere
  rationale: El latino misi expresa envío con fuerza narrativa simple; «lo envié» reproduce bien la relación sujeto-verbo sin añadir matices no presentes. «Mandé» es posible, pero puede sonar más directivo que el original.
- source_word: eduxit populum meum de Aegypto
  english_pob_choice: he led my people out of Egypt
  chosen_spanish: sacó a mi pueblo de Egipto
  alternatives_spanish:
  - condujo a mi pueblo fuera de Egipto
  - sacó de Egipto a mi pueblo
  lexicon: eduxit < educere
  rationale: eduxit indica sacar fuera, con el matiz de conducción. En español, «sacó a mi pueblo de Egipto» conserva la idea de liberación y salida de manera natural y fiel.
- source_word: adduxi eum super montem Sina
  english_pob_choice: I brought him up onto Mount Sinai
  chosen_spanish: yo lo subí al monte Sinaí
  alternatives_spanish:
  - yo lo llevé al monte Sinaí
  - yo lo conduje al monte Sinaí
  lexicon: adduxi < adducere
  rationale: El compuesto latino puede implicar llevar hacia arriba o traer a un lugar. «Lo subí al monte Sinaí» conserva el movimiento ascendente explícito de super montem Sina mientras sigue siendo idiomático en español.
- source_word: detinui eum apud me diebus multis
  english_pob_choice: I kept him with me many days
  chosen_spanish: lo retuve conmigo por muchos días
  alternatives_spanish:
  - lo mantuve conmigo por muchos días
  - lo tuve conmigo muchos días
  lexicon: detinui < detinere
  rationale: detinui sugiere retener, mantener consigo. «Lo retuve conmigo» preserva el sentido de permanencia prolongada y la relación cercana indicada por apud me.
theological_decisions:
- issue: Identificación del referente implícito de «eum»
  english_pob_reading: him
  chosen_spanish_reading: lo
  alternative_spanish_readings:
  - a él
  - a Moisés
  rationale: El texto latino usa un pronombre masculino sin nombre explícito. En español, «lo» mantiene la ambigüedad textual sin introducir una identificación que el versículo no da por sí mismo.
  doctrine_reference: Respeto a la forma del texto y a la ambigüedad referencial del pasaje.
translation_notes:
  revision_awareness: La versión inglesa POB vigente no presenta notas ni revisiones sustantivas; el expediente de revisión indica agreement alto y sin cambios necesarios, por lo que la traducción española sigue de cerca el texto latino limpio y la solución inglesa aprobada.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - Se conserva «Sinaí» con grafía estándar en español.
  - No se añaden notas porque el pasaje no presenta variantes textuales ni alternativas relevantes en el expediente proporcionado.
