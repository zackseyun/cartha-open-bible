translation:
  language: es
  text: Pues la era ha sido dividida en doce partes[a], y diez de sus partes ya han pasado, y la mitad de la décima parte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas versiones antiguas tienen «nueve de sus partes ya han pasado».
    reason: textual_variant
lexical_decisions:
- source_word: saeculum
  english_pob_choice: the age
  chosen_spanish: la era
  alternatives_spanish:
  - el siglo
  - la edad
  lexicon: saeculum
  rationale: En este contexto apocalíptico, 'era' comunica mejor una división de la historia o del orden presente que 'siglo', que suena demasiado cronológico moderno, o 'edad', que puede ser más ambiguo en español.
- source_word: diuisum est
  english_pob_choice: has been divided
  chosen_spanish: ha sido dividida
  alternatives_spanish:
  - se ha dividido
  - fue dividida
  lexicon: divido
  rationale: La pasiva mantiene el sentido de partición ya establecida en el texto latino y conserva un tono formal adecuado.
- source_word: X iam
  english_pob_choice: ten of its parts have already passed
  chosen_spanish: diez de sus partes ya han pasado
  alternatives_spanish:
  - nueve de sus partes ya han pasado
  - ya han pasado diez de sus partes
  lexicon: decem
  rationale: Se sigue la lectura latina 'X iam' según la revisión más reciente del expediente, aunque se reconoce la tensión textual documentada con la revisión anterior que corregía a 'nueve' por razones de armonización numérica.
- source_word: dimidium xmae partis
  english_pob_choice: half of the tenth part
  chosen_spanish: la mitad de la décima parte
  alternatives_spanish:
  - media parte de la décima parte
  - la mitad de la décima porción
  lexicon: dimidium
  rationale: '''Décima parte'' reproduce con naturalidad la estructura ordinal del latín y preserva el paralelismo matemático del pasaje.'
theological_decisions:
- issue: Cronología apocalíptica dividida en doce partes
  english_pob_reading: the age has been divided into twelve parts
  chosen_spanish_reading: la era ha sido dividida en doce partes
  alternative_spanish_readings:
  - el mundo ha sido dividido en doce partes
  - el tiempo ha sido dividido en doce partes
  rationale: '''Era'' conserva la idea de una sección del tiempo de la historia de salvación sin introducir ''mundo'', que sería más interpretativo, ni ''tiempo'', que resulta menos concreto en español.'
  doctrine_reference: 2 Esdras 14:11–12
translation_notes:
  revision_awareness: El expediente muestra una oscilación importante entre 'nueve' y 'diez'. La revisión más reciente restituye 'diez' siguiendo el latino 'X iam', mientras que una adjudicación previa proponía 'nueve' por coherencia interna y apoyo de otras versiones antiguas. La traducción española adopta la lectura final registrada, pero deja constancia de la variante textual en nota.
  spanish_consistency_notes:
  - Se mantiene un registro solemne y claro, apto para lectura pública.
  - Se evita 'siglo' porque en español actual puede sugerir un periodo de cien años y no una era apocalíptica.
  - '''Décima parte'' conserva la relación ordinal del original y el paralelismo con la parte media restante.'
