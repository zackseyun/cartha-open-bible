translation:
  language: es
  text: «Mira[a], iré, como me lo has mandado, y reprenderé al pueblo que vive ahora.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mira, iré, como me lo has mandado, y reprenderé al pueblo que está presente».'
    reason: alternative_reading
lexical_decisions:
- source_word: sicut praecepisti mihi
  english_pob_choice: as you have commanded me
  chosen_spanish: como me lo has mandado
  alternatives_spanish:
  - como me has mandado
  - tal como me lo mandaste
  lexicon: praecipio → mandar; mihi → me
  rationale: «Mandar» expresa con naturalidad el valor de orden/encargo del latín. Se conserva el pronombre dativo con «me», y «lo» ayuda a hacer explícita la referencia al mandato sin introducir contenido nuevo.
- source_word: corripiam
  english_pob_choice: I will reprove
  chosen_spanish: reprenderé
  alternatives_spanish:
  - reprenderé con severidad
  - corregiré
  - reprocharé
  lexicon: corripio → reprender / corregir
  rationale: «Reprender» mantiene el sentido de censurar o amonestar con fuerza, cercano al valor de corrección del latín, sin debilitarlo a un simple «regañar».
- source_word: praesentem populum
  english_pob_choice: the people now living
  chosen_spanish: al pueblo que vive ahora
  alternatives_spanish:
  - al pueblo presente
  - a la generación actual
  - al pueblo que está presente
  lexicon: praesens + populus → presente / actual, populus → pueblo
  rationale: La revisión inglesa aclaró que no se trata de presencia espacial, sino temporal. En español, «que vive ahora» comunica con claridad la generación contemporánea y evita la ambigüedad de «presente».
theological_decisions:
- issue: Sentido temporal de praesentem populum frente al contraste con la siguiente generación
  english_pob_reading: the people now living
  chosen_spanish_reading: al pueblo que vive ahora
  alternative_spanish_readings:
  - al pueblo presente
  - a la generación actual
  rationale: 'La decisión sigue la revisión del inglés: el latín contrasta con los que nacerán después, así que el énfasis es temporal y generacional, no meramente local o físico.'
  doctrine_reference: No aplica; decisión semántica-contextual
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión reciente que corrigió la frase inglesa de «the people who are present» a «the people now living», porque el latín praesentem populum en este contexto señala a la generación contemporánea en contraste con los que nacerán después (v. 20).
  spanish_consistency_notes:
  - Se conservó el tono exhortativo con «Mira» para reflejar el «Behold» del inglés POB y la fuerza de entrada solemne del pasaje.
  - «Pueblo» se mantuvo singular, siguiendo el latín populum.
  - Se evitó «SEÑOR» o equivalentes teológicos no presentes en el verso; el texto aquí no requiere un nombre divino explícito.
