translation:
  language: es
  text: 'los que han de vivir en los últimos días vivan.” Y me respondió y dijo: “Ve, reúne al pueblo y diles que no te busquen'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: uiuere in nouissimis uiuant
  english_pob_choice: those who are to live in the last days may live
  chosen_spanish: los que han de vivir en los últimos días vivan
  alternatives_spanish:
  - los que vivirán en los últimos días vivan
  - los destinados a vivir en los últimos días vivan
  lexicon: uiuere / uiuant
  rationale: El latino usa un infinitivo seguido de subjuntivo para expresar finalidad o resultado; en español, 'han de vivir' conserva el sentido de destino o futura expectativa sin sonar demasiado rígido. Mantengo 'los últimos días' para reflejar 'nouissimis' de forma natural y no añadir una explicación escatológica que el texto no desarrolla.
- source_word: uadens
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: uadens
  rationale: '''Ve'' es la forma imperativa más directa y sobria para el mandato de desplazamiento. Evita añadir matices de expulsión (''vete'') o coloquialidad (''anda'') que el latín no exige.'
- source_word: congrega populum
  english_pob_choice: gather the people
  chosen_spanish: reúne al pueblo
  alternatives_spanish:
  - convoca al pueblo
  - junta al pueblo
  lexicon: congrega populum
  rationale: '''Reúne'' conserva el valor de convocar y juntar a la comunidad sin introducir un registro demasiado administrativo. ''El pueblo'' mantiene el sustantivo colectivo del latino.'
- source_word: ut non te quaerant
  english_pob_choice: not to seek you
  chosen_spanish: que no te busquen
  alternatives_spanish:
  - para que no te busquen
  - a fin de que no te busquen
  lexicon: ut non te quaerant
  rationale: Aunque el inglés POB simplifica a un infinitivo, el latino tiene una subordinada final con subjuntivo. En español, 'que no te busquen' reproduce de manera natural ese valor de mandato indirecto. 'Buscarte' también sería posible, pero 'te busquen' mantiene el paralelismo con el discurso directo.
theological_decisions:
- issue: Temporality/eschatological phrase 'in the last days'
  english_pob_reading: those who are to live in the last days
  chosen_spanish_reading: los que han de vivir en los últimos días
  alternative_spanish_readings:
  - los que vivirán en los últimos días
  - los destinados a vivir en los últimos días
  rationale: No suavizo 'últimos días' porque el latino 'nouissimis' conserva una referencia temporal-esctatológica significativa. La forma 'han de vivir' deja abierta la noción de designación futura sin afirmar más de lo que el texto dice.
  doctrine_reference: escatología bíblica; referencia temporal futura sin ampliación doctrinal
translation_notes:
  revision_awareness: 'La versión inglesa más reciente afinó el primer miembro para suplir el sujeto implícito (''those who are to live'') y suavizó la segunda cláusula a una construcción más natural. La traducción española sigue esa lectura revisada, pero vuelve al valor sintáctico del latino: finalidad/resultados en la primera frase y una orden indirecta en la segunda.'
  spanish_consistency_notes:
  - Mantengo 'pueblo' para populum en vez de 'gente' para conservar el registro colectivo y bíblico.
  - Uso 'Y' en la cita directa como corresponde al español, sin alterar el contenido del mandato.
  - No introduzco comillas curvas ni notas textuales porque el fragmento no presenta variantes relevantes en el audit trail.
