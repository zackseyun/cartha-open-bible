translation:
  language: es
  text: estos cinco, porque están preparados para escribir con rapidez. Y vendrás aquí, y yo encenderé en tu corazón una lámpara de entendimiento, que no se apagará hasta que se terminen las cosas que comenzarás a escribir.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: hos
  english_pob_choice: these five
  chosen_spanish: estos cinco
  alternatives_spanish:
  - los cinco
  - aquellos cinco
  lexicon: deixis + numeral
  rationale: El latín hos es acusativo masculino plural de valor demostrativo; en el contexto del pasaje se refiere a los cinco hombres mencionados inmediatamente antes. «Estos cinco» conserva la deixis cercana de la forma latina y sigue de cerca la decisión inglesa sin sonar artificial en español.
- source_word: parati sunt ad scribendum uelociter
  english_pob_choice: are ready to write quickly
  chosen_spanish: están preparados para escribir con rapidez
  alternatives_spanish:
  - están listos para escribir rápidamente
  - están dispuestos a escribir con rapidez
  lexicon: paratus + ad scribendum + uelociter
  rationale: «Preparados» comunica el estado de estar listos y mantiene un registro digno. «Con rapidez» reproduce uelociter sin el matiz más coloquial de «rápidamente»; ambas son posibles, pero esta opción suena más natural y conserva la cualidad adverbial del latín.
- source_word: acccendam in corde tuo lucernam intellectus
  english_pob_choice: I will kindle in your heart a lamp of understanding
  chosen_spanish: yo encenderé en tu corazón una lámpara de entendimiento
  alternatives_spanish:
  - yo prenderé en tu corazón una lámpara de entendimiento
  - yo encenderé en tu corazón una lámpara de inteligencia
  lexicon: accendere + lucerna + intellectus
  rationale: «Encenderé» traduce bien accendam con la imagen de una luz iniciada por acción divina. «Lámpara de entendimiento» sigue la metáfora del texto latino y evita neutralizar intellectus; «inteligencia» es posible, pero «entendimiento» preserva mejor el alcance sapiencial y bíblico del término.
- source_word: quae non extinguetur
  english_pob_choice: that will not be extinguished
  chosen_spanish: que no se apagará
  alternatives_spanish:
  - que no será extinguida
  - que nunca se extinguirá
  lexicon: non extinguetur
  rationale: En español, «apagarse» funciona naturalmente para una lámpara y preserva la imagen visual. «Extinguirse» es más literal, pero menos idiomático con «lámpara»; el futuro pasivo del latín se expresa aquí con un pasivo/reflexivo natural en español.
- source_word: quoadusque finiantur quae incipies scribere
  english_pob_choice: until the things that you begin to write are finished
  chosen_spanish: hasta que terminen las cosas que comenzarás a escribir
  alternatives_spanish:
  - hasta que se terminen las cosas que empezarás a escribir
  - hasta que concluyan las cosas que tú escribirás
  lexicon: quoadusque + finiantur + incipies scribere
  rationale: La estructura conserva la relación temporal de duración. «Comenzarás» sigue el futuro del latín incipies y «las cosas que comenzarás a escribir» mantiene el objeto plural sin interpretar más allá del texto. «Terminen» refleja el pasivo impersonal de finiantur de manera fluida en español.
theological_decisions:
- issue: Origen y preservación de la iluminación intelectual para la escritura revelada
  english_pob_reading: I will kindle in your heart a lamp of understanding that will not be extinguished until the things that you begin to write are finished.
  chosen_spanish_reading: yo encenderé en tu corazón una lámpara de entendimiento, que no se apagará hasta que terminen las cosas que comenzarás a escribir
  alternative_spanish_readings:
  - yo encenderé en tu corazón una lámpara de inteligencia, que no se apagará hasta que concluyan las cosas que empezarás a escribir
  - yo pondré en tu corazón una lámpara de entendimiento, que no se apagará hasta que se terminen las cosas que escribirás
  rationale: El texto presenta la iluminación como un don divino interior ligado a la tarea de escribir. La formulación española conserva que la iniciativa es de Dios («yo encenderé») y que la lámpara está en el corazón, sin añadir interpretaciones doctrinales ajenas al pasaje. «Entendimiento» mantiene la dimensión cognitiva y espiritual del intelectus latino.
  doctrine_reference: Iluminación divina para el servicio profético/escriturario; no se introduce una doctrina sistemática externa
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y que no eran necesarios cambios; se mantiene la lectura inglesa existente sin modificaciones textuales o de sentido.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como default terminológico del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantuvo un registro sobrio y bíblico, evitando arcaísmos innecesarios.
  - No se añadieron notas al pie porque el latín y la versión inglesa convergen de forma alta y no surgió una ambigüedad adicional que requiriera marcado.
