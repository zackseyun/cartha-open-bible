  source_alignment_summary: 'El borrador sigue bien el latín: «Quoniam» = «Porque», «lex tua» = «tu ley», «incensa est» = «ha sido quemada», y «propter quod nemo scit» queda correctamente como consecuencia. El punto débil es «quae a te», donde el español «las cosas hechas por ti» es formalmente posible pero suena poco natural y no expresa tan bien en español la idea de «lo que tú has hecho».'
