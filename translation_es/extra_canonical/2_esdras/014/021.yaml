translation:
  language: es
  text: Porque tu ley ha sido quemada, y por eso nadie conoce lo que has hecho.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Quoniam
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: Latin quoniam
  rationale: Introduce la causa o explicación del enunciado siguiente en un español natural y fiel al valor causal de la partícula latina.
- source_word: lex tua
  english_pob_choice: your law
  chosen_spanish: tu ley
  alternatives_spanish:
  - tu instrucción
  - tu Torah
  - tu enseñanza
  lexicon: Latin lex
  rationale: «Ley» es la correspondencia directa y más transparente de lex; conserva el sentido normativo sin añadir una glosa interpretativa que el texto no exige.
- source_word: incensa est
  english_pob_choice: has been burned
  chosen_spanish: ha sido quemada
  alternatives_spanish:
  - ha sido consumida por el fuego
  - ha sido incinerada
  lexicon: Latin incendo
  rationale: El perfecto pasivo exige una forma resultativa en español; «ha sido quemada» reproduce de manera sobria la acción de ser consumida por fuego.
- source_word: propter quod
  english_pob_choice: and therefore
  chosen_spanish: y por eso
  alternatives_spanish:
  - por lo cual
  - por tanto
  lexicon: Latin propter quod
  rationale: Expresa la consecuencia lógica del motivo anterior con una locución natural en español, sin perder el enlace causal-consecutivo del latín.
- source_word: nemo
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  - ninguna persona
  lexicon: Latin nemo
  rationale: «Nadie» es el equivalente idiomático más claro y directo para un sujeto humano negativo universal.
- source_word: scit
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  lexicon: Latin scio
  rationale: En este contexto, «conoce» comunica la idea de tener conocimiento de hechos o contenidos, no solo de poseer datos; el inglés POB usa «knows», y el español admite ambas opciones.
- source_word: quae a te
  english_pob_choice: the things done by you
  chosen_spanish: las cosas hechas por ti
  alternatives_spanish:
  - las cosas que has hecho
  - las obras realizadas por ti
  lexicon: Latin quae ... a te
  rationale: La estructura latina apunta a «las cosas»/«los hechos» asociados a Dios mediante agente pasivo; «hechas por ti» mantiene la sencillez del original sin introducir un término más teologizado como «obras».
theological_decisions:
- issue: Referencia a la ley divina como texto revelado perdido o destruido
  english_pob_reading: For your law has been burned
  chosen_spanish_reading: Porque tu ley ha sido quemada
  alternative_spanish_readings:
  - Porque tu ley ha sido destruida
  - Porque tu ley ha sido consumida por el fuego
  rationale: El latín menciona fuego de manera explícita con incensa est, así que la traducción conserva la imagen material de la quema en vez de generalizarla a «destruida».
  doctrine_reference: 2 Esdras 14:21; cf. la temática de la preservación y pérdida del texto revelado
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios según el último pase; la redacción española sigue de cerca el latín limpio de Bensly y coincide en sentido con la traducción inglesa aprobada.
  spanish_consistency_notes:
  - Se mantiene «ley» para lex, conforme al valor normativo del término en el pasaje.
  - Se conserva una sintaxis causal-consecutiva simple («Porque… y por eso…») para reflejar el encadenamiento del latín sin sobreinterpretarlo.
  - No se introduce ninguna nota textual porque el expediente fuente no registra variantes relevantes ni tensiones léxicas adicionales para este verso.
