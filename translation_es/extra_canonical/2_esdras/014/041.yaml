lexical_decisions:
- source_word: et apertum est
  english_pob_choice: was opened
  chosen_spanish: fue abierta
  alternatives_spanish:
  - se abrió
  - quedó abierta
  lexicon: Latin apertum est
  rationale: Mantiene la pasiva del original y el hecho de que la apertura ocurre como resultado de una acción previa; en español, «fue abierta» conserva ese matiz con naturalidad.
- source_word: os meum
  english_pob_choice: my mouth
  chosen_spanish: mi boca
  alternatives_spanish:
  - mi boca misma
  - mi boca fue
  lexicon: Latin os meum
  rationale: «Os» en este contexto es la boca física; «mi boca» es la equivalencia normal y clara en español.
- source_word: et non est clausum amplius
  english_pob_choice: was no longer closed
  chosen_spanish: ya no estuvo cerrada
  alternatives_spanish:
  - ya no fue cerrada
  - no estuvo cerrada nunca más
  lexicon: Latin non est clausum amplius
  rationale: Reproduce la idea de continuidad terminada expresada por amplius; «ya no» refleja el cambio de estado, y «estuvo cerrada» preserva el resultado final sin forzar una perífrasis demasiado inglesa.
theological_decisions:
- issue: Tono narrativo simple sin carga doctrinal adicional
  english_pob_reading: And my mouth was opened and was no longer closed.
  chosen_spanish_reading: Y mi boca fue abierta y ya no estuvo cerrada.
  alternative_spanish_readings:
  - Y mi boca se abrió y ya no quedó cerrada.
  - Y mi boca fue abierta y no estuvo cerrada ya.
  rationale: El versículo solo reporta un hecho narrativo; no añade términos teológicos que requieran ampliación. La redacción conserva esa sobriedad y evita introducir matices no presentes en el latín.
  doctrine_reference: No aplica; texto narrativo breve sin afirmación doctrinal explícita.
translation_notes:
  revision_awareness: La revisión inglesa sustituyó «not closed anymore» por «no longer closed» para una forma más formal y natural. El español sigue esa mejora con «ya no estuvo cerrada», manteniendo el sentido de cese de un estado sin añadir énfasis innecesario.
  spanish_consistency_notes:
  - Se mantuvo el sujeto singular «mi boca» para reflejar fielmente el latín os meum.
  - Se preservó la pasiva del original con «fue abierta» en vez de convertirla en una construcción enteramente reflexiva.
  - Se evitó «ya no fue cerrada» porque en español suena más forzado; «ya no estuvo cerrada» comunica mejor el estado resultante.
