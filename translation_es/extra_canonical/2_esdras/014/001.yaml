translation:
  language: es
  text: Y sucedió al tercer día que yo estaba sentado debajo de una encina.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et factum est
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y ocurrió
  lexicon: Latin factum est
  rationale: Sigue el valor narrativo de inicio de episodio; «sucedió» mantiene el tono bíblico sin sonar arcaico, y corresponde bien al inglés auditado «And it happened».
- source_word: tertio die
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - el tercer día
  lexicon: Latin tertio die
  rationale: «Al tercer día» es la forma natural en español para un marco temporal narrativo y conserva la relación temporal exacta del latín.
- source_word: ego sedebam
  english_pob_choice: I was sitting
  chosen_spanish: yo estaba sentado
  alternatives_spanish:
  - yo me hallaba sentado
  - yo estaba sentado
  lexicon: Latin sedebam
  rationale: El imperfecto expresa acción en curso; se explicita «yo» por claridad narrativa, aunque el sujeto ya está implícito en el verbo.
- source_word: sub quercu
  english_pob_choice: under an oak
  chosen_spanish: debajo de una encina
  alternatives_spanish:
  - bajo una encina
  - debajo de un roble
  lexicon: Latin quercus
  rationale: «Encina» es una equivalencia botánica y literaria muy natural en español para quercus en contextos bíblicos; se evita «roble» por ser menos preciso en el uso común hispano y para conservar el matiz de árbol concreto.
theological_decisions:
- issue: Tono narrativo sin carga doctrinal explícita
  english_pob_reading: A simple historical narration with no added theological emphasis
  chosen_spanish_reading: Una narración simple, sin intensificación devocional añadida
  alternative_spanish_readings:
  - Una formulación más solemne
  - Una formulación más litúrgica
  rationale: El versículo no introduce un concepto doctrinal específico; por eso conviene una traducción directa y sobria que no agregue solemnidad interpretativa.
  doctrine_reference: No aplica; texto narrativo
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; por tanto, este borrador español sigue de cerca el acuerdo alto entre el testigo latino y la traducción inglesa auditada, sin introducir notas textuales ni variantes.
  spanish_consistency_notes:
  - Se mantiene el tratamiento narrativo en pasado simple/imperfecto como en el latín.
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - Se evita «SEÑOR» o lenguaje de sustitución porque el versículo no contiene κύριος ni un equivalente divino.
