translation:
  language: es
  text: Pero los que nacerán después—¿quién los amonestará? Porque la era[a] yace en tinieblas, y los que habitan en ella están sin luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha sido puesta».
    reason: alternativa_de_traduccion_previa
lexical_decisions:
- source_word: autem iterum nati fuerint
  english_pob_choice: those who will be born afterward
  chosen_spanish: los que nacerán después
  alternatives_spanish:
  - los que nazcan después
  - los que sean nacidos después
  lexicon: n/a
  rationale: El latín expresa un futuro pasivo con sentido temporal; en español natural queda mejor una relativa futura directa. 'Después' conserva la relación temporal sin sobrecargar la forma verbal.
- source_word: quis commonebit ?
  english_pob_choice: who will warn them?
  chosen_spanish: ¿quién los amonestará?
  alternatives_spanish:
  - ¿quién los advertirá?
  - ¿quién los advertirá entonces?
  lexicon: n/a
  rationale: '''Commonebit'' implica hacer recordar, advertir, amonestar. ''Amonestar'' conserva el matiz exhortativo/advertitivo sin estrecharlo a mera información.'
- source_word: saeculum
  english_pob_choice: the age
  chosen_spanish: el mundo
  alternatives_spanish:
  - la edad
  - la era
  - el siglo
  lexicon: n/a
  rationale: Aunque el inglés POB usa 'age', en español 'el mundo' comunica mejor la totalidad del ámbito humano en tinieblas. Aquí la unidad contextual permite esta equivalencia dinámica moderada, manteniendo el contraste con los que habitan en él. No se toma como reemplazo doctrinal, sino como ajuste de claridad semántica.
- source_word: positum est ... in tenebris
  english_pob_choice: lies in darkness
  chosen_spanish: yace en tinieblas
  alternatives_spanish:
  - está en tinieblas
  - ha sido puesto en tinieblas
  lexicon: n/a
  rationale: Se sigue la revisión auditada que entiende 'positum est' como estado resultante/presente, no como acción puntual. 'Yace en tinieblas' conserva el sentido estático y una imagen bíblica natural en español.
- source_word: qui inhabitant in eo sine lumine
  english_pob_choice: those who dwell in it are without light
  chosen_spanish: y los que habitan en él están sin luz
  alternatives_spanish:
  - y los que habitan en él no tienen luz
  - y sus habitantes carecen de luz
  lexicon: n/a
  rationale: '''Sin luz'' reproduce la negación simple y mantiene el paralelismo con ''tinieblas''. ''Habitan en él'' sigue de cerca la estructura del latín sin resultar forzado.'
theological_decisions:
- issue: Estado del mundo/edad en tinieblas
  english_pob_reading: the age lies in darkness
  chosen_spanish_reading: el mundo yace en tinieblas
  alternative_spanish_readings:
  - la era yace en tinieblas
  - la edad yace en tinieblas
  rationale: No hay cambio doctrinal; la decisión es léxica. 'Mundo' hace explícito el campo de realidad humana implicado por el contexto latino, mientras la imagen de tinieblas permanece intacta.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de 'has been set' a 'lies' por el valor estativo de 'positum est ... in tenebris'. La traducción española adopta directamente ese valor estativo con 'yace en tinieblas', evitando una lectura demasiado activa como 'ha sido puesto en tinieblas'.
  spanish_consistency_notes:
  - Se mantiene 'tinieblas' como plural bíblico tradicional y fiel al contraste del latín.
  - Se usa 'amonestar' para reflejar mejor el valor exhortativo de 'commonebit' que un simple 'advertir'.
  - La nota al pie conserva la alternativa textual relevante del audit trail sobre 'positum est'.
