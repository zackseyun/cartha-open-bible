translation:
  language: es
  text: Y lo tomé y bebí[a], y cuando hube bebido, mi corazón hacía brotar entendimiento, y la sabiduría crecía en mi pecho, porque mi espíritu retenía la memoria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mantuvo su memoria».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Et accepi et bibi
  english_pob_choice: And I took it and drank
  chosen_spanish: Y lo tomé y bebí
  alternatives_spanish:
  - Y lo recibí y bebí
  - Y lo tomé y lo bebí
  lexicon: accipio / bibere
  rationale: El latín presenta una secuencia simple de tomar y beber. En español, 'tomé' conserva la acción directa sin añadir un objeto redundante; 'lo' recupera el referente implícito del contexto inmediato. Se evita una paráfrasis más interpretativa.
- source_word: cor meum eructuabat intellectum
  english_pob_choice: my heart poured forth understanding
  chosen_spanish: mi corazón derramaba entendimiento
  alternatives_spanish:
  - mi corazón vomitaba entendimiento
  - mi corazón brotaba entendimiento
  lexicon: cor / eructare / intellectus
  rationale: '''Eructuabat'' admite una imagen fuerte de ''hacer brotar'' o ''vomitar'', pero el español ''derrama'' comunica la salida abundante de contenido interior con dignidad literaria. ''Entendimiento'' sigue de cerca ''intellectum'' y preserva el matiz cognitivo.'
- source_word: in pectus meum increscebat sapientia
  english_pob_choice: and wisdom increased in my breast
  chosen_spanish: y la sabiduría crecía en mi pecho
  alternatives_spanish:
  - y la sabiduría aumentaba en mi pecho
  - y la sabiduría se incrementaba en mi pecho
  lexicon: pectus / sapientia
  rationale: '''Crecía'' expresa el aumento orgánico de ''increscebat'' con naturalidad en español. ''Pecho'' traduce ''pectus'' de modo literal y bíblico, manteniendo el interior humano como sede simbólica.'
- source_word: nam spiritus meus conseruabat memoriam
  english_pob_choice: for my spirit retained memory
  chosen_spanish: porque mi espíritu retenía la memoria
  alternatives_spanish:
  - porque mi espíritu preservaba la memoria
  - pues mi espíritu conservaba la memoria
  lexicon: spiritus / conseruare / memoria
  rationale: La revisión inglesa favorece 'retained memory' frente a 'kept its memory', porque el objeto es 'memory' y el verbo indica preservación. 'Retenía' captura bien ese valor y suena más natural que 'conservaba' en este contexto, sin perder la idea de mantener lo recibido.
theological_decisions:
- issue: La facultad interior que habla, piensa y recuerda en el pasaje
  english_pob_reading: my heart poured forth understanding ... my spirit retained memory
  chosen_spanish_reading: mi corazón derramaba entendimiento ... mi espíritu retenía la memoria
  alternative_spanish_readings:
  - mi corazón brotaba entendimiento ... mi espíritu conservaba la memoria
  - mi corazón hacía brotar entendimiento ... mi espíritu preservaba la memoria
  rationale: El texto distingue entre corazón, pecho y espíritu como centros internos de cognición y memoria. La traducción mantiene esa antropología sin fusionar los términos ni psicologizarlos en exceso.
  doctrine_reference: Antropología bíblica; continuidad de facultades interiores en la recepción de revelación
translation_notes:
  revision_awareness: La auditoría inglesa revisó 'kept its memory' a 'retained memory' para reflejar mejor el latín 'conseruabat memoriam'. La versión española sigue esa decisión con 'retenía la memoria', evitando una calca menos precisa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva 'espíritu' para 'spiritus' y 'memoria' para 'memoria', sin introducir matices doctrinales no presentes en el latín.
  - '''Entendimiento'' y ''sabiduría'' se distinguen para reflejar los dos sustantivos latinos ''intellectum'' y ''sapientia''.'
