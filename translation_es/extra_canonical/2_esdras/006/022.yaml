base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/022.yaml
  text: And suddenly places sown will appear unsown, and full storehouses will suddenly be found empty, and the trumpet will sound, which when all hear, they will suddenly be terrified.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:50Z'
    unchanged: false
    changes_summary: Completed the verse by adding the final clause about the trumpet sounding and all hearing it being suddenly terrified; retained the existing wording for the first two clauses.
translation:
  language: es
  text: Y de repente los lugares sembrados aparecerán como no sembrados, y los graneros llenos se hallarán de repente vacíos, y la trompeta sonará; cuando todos la oigan, se aterrorizarán de repente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: seminata loca non seminata
  english_pob_choice: places sown will appear unsown
  chosen_spanish: los lugares sembrados aparecerán como no sembrados
  alternatives_spanish:
  - los lugares sembrados aparecerán sin sembrar
  - las tierras sembradas aparecerán no sembradas
  lexicon: sembrar / sembrado; no sembrado
  rationale: 'Mantiene la inversión sorprendente del latín: algo efectivamente sembrado se verá como si no lo estuviera. En español, ''como no sembrados'' conserva la comparación sin forzar una negación absoluta que podría borrar el efecto visual.'
- source_word: plena prumptuaria ... vacua
  english_pob_choice: full storehouses will suddenly be found empty
  chosen_spanish: los graneros llenos se hallarán de repente vacíos
  alternatives_spanish:
  - las despensas llenas se hallarán de repente vacías
  - los almacenes llenos se encontrarán de repente vacíos
  lexicon: granero / almacén / despensa; lleno; vacío
  rationale: '''Prumptuaria'' apunta a depósitos o provisiones; ''graneros'' es una opción clara y bíblicamente inteligible en español, y conserva el contraste lleno/vacío que el texto enfatiza.'
- source_word: Et tuba canet cum sono
  english_pob_choice: and the trumpet will sound
  chosen_spanish: y la trompeta sonará
  alternatives_spanish:
  - y la trompeta tocará con sonido
  - y sonará la trompeta
  lexicon: trompeta; sonar
  rationale: '''Sonará'' reproduce de forma natural el futuro del latín ''canet'' aplicado a un instrumento. Se evita ampliar el sentido a ''tocar'' para no añadir un agente no explicitado.'
- source_word: quam cum omnes audierint
  english_pob_choice: which when all hear
  chosen_spanish: cuando todos la oigan
  alternatives_spanish:
  - la cual, cuando todos la oigan
  - y cuando todos la oigan
  lexicon: oír
  rationale: Resume la construcción relativa latina de manera natural en español, preservando que el antecedente es la trompeta.
- source_word: subito expauescent
  english_pob_choice: they will suddenly be terrified
  chosen_spanish: se aterrorizarán de repente
  alternatives_spanish:
  - se espantarán de repente
  - quedarán súbitamente aterrados
  lexicon: aterrorizarse / espantarse
  rationale: '''Aterrorizarán'' sigue de cerca la fuerza intensa de ''expauescent'' y mantiene el matiz de pavor repentino que el inglés POB ya había fijado.'
theological_decisions:
- issue: Escenario de juicio cósmico y reacción humana ante la trompeta
  english_pob_reading: the trumpet will sound ... they will suddenly be terrified
  chosen_spanish_reading: la trompeta sonará; cuando todos la oigan, se aterrorizarán de repente
  alternative_spanish_readings:
  - la trompeta sonará; al oírla todos, quedarán súbitamente aterrados
  - la trompeta sonará; cuando todos la escuchen, se espantarán de repente
  rationale: No se introduce interpretación adicional; se conserva la secuencia de señal audible seguida de temor repentino, que en el contexto apocalíptico funciona como anuncio de intervención divina.
  doctrine_reference: Escatología apocalíptica; reacción humana ante la teofanía/jucio
translation_notes:
  revision_awareness: La revisión inglesa amplió el final del versículo para incluir la trompeta y el terror repentino de todos los que la oigan; la versión española integra esa cláusula completa sin omitirla.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - Se conserva la repetición de 'de repente/súbitamente' como rasgo retórico del original.
  - No se usa 'SEÑOR' ni terminología no presente en el texto fuente.
