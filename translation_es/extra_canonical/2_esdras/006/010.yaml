translation:
  language: es
  text: '«No pidas nada más[a], Esdras». Y respondí y dije: «Oh, Señor que gobiernas, si he hallado favor»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No pidas nada adicional, Esdras».'
    reason: alternative_rendering_matching_english_audit_trail
lexical_decisions:
- source_word: aliud noli querere
  english_pob_choice: Do not ask anything else
  chosen_spanish: No pidas nada más
  alternatives_spanish:
  - No pidas otra cosa
  - No busques nada más
  lexicon: aliud; noli querere
  rationale: aliud expresa ‘otra cosa / algo más’; en español «nada más» reproduce con naturalidad la prohibición de seguir preguntando sin volverla más fuerte o más débil de lo que exige el latín.
- source_word: Ezra
  english_pob_choice: Ezra
  chosen_spanish: Esdras
  alternatives_spanish:
  - Ezra
  lexicon: propio nombre
  rationale: En español bíblico estándar, «Esdras» es la forma plenamente inteligible y tradicional del nombre, sin alterar el referente.
- source_word: Et respondi et dixi
  english_pob_choice: And I answered and said
  chosen_spanish: Y respondí y dije
  alternatives_spanish:
  - Y respondí
  - Entonces respondí y dije
  lexicon: respondeo / dico
  rationale: La doble fórmula se conserva en español para reflejar la estructura enfática del latín y su valor narrativo-solemne.
- source_word: dominator domine
  english_pob_choice: O Lord who rules
  chosen_spanish: Oh Señor que gobiernas
  alternatives_spanish:
  - Oh Señor soberano
  - Oh Dueño y Señor
  lexicon: dominator; domine
  rationale: El latín une un sustantivo de dominio con un vocativo de Señor; «que gobiernas» mantiene la transparencia semántica sin introducir un título más interpretativo que el texto latino.
- source_word: si inueni gratiam
  english_pob_choice: if I have found favor
  chosen_spanish: si he hallado favor
  alternatives_spanish:
  - si he encontrado favor
  - si he hallado gracia
  lexicon: invenio + gratia
  rationale: «Hallar favor» reproduce el modismo bíblico-latino con naturalidad. «Gracia» sería posible, pero aquí el contexto de petición favorece la idea relacional de favor.
theological_decisions:
- issue: Tratamiento de la apelación divina en dominator domine
  english_pob_reading: O Lord who rules
  chosen_spanish_reading: Oh Señor que gobiernas
  alternative_spanish_readings:
  - Oh Señor soberano
  - Oh Dueño y Señor
  rationale: La revisión inglesa optó por una traducción más transparente de dominator domine, evitando añadir un título no explícito. En español, «Señor que gobiernas» conserva esa transparencia y evita sustituirla por una formulación más tradicional pero menos directa.
  doctrine_reference: Titulación reverente de Dios; fidelidad al vocativo latino
- issue: Renderización de gratia en un contexto de súplica
  english_pob_reading: if I have found favor
  chosen_spanish_reading: si he hallado favor
  alternative_spanish_readings:
  - si he hallado gracia
  - si he encontrado favor
  rationale: Aunque «gracia» es una opción posible, aquí el giro «hallar favor» sigue de cerca el valor idiomático del latín y mantiene la tensión entre favor recibido y petición que continúa.
  doctrine_reference: Lenguaje de favor/gracia en fórmulas bíblicas de petición
translation_notes:
  revision_awareness: 'La fuente latina incluye la segunda mitad del versículo («Et respondi et dixi : O dominator domine, si inueni gratiam»), que debe permanecer en este versículo y no desplazarse al siguiente. La redacción española la restituye íntegramente y sigue la revisión más reciente al evitar una paráfrasis excesiva de dominator domine.'
  spanish_consistency_notes:
  - Se mantiene «Dios/Señor» en registro reverente, sin introducir «SEÑOR» como convención de máscara.
  - «Esdras» se usa como forma española estable del nombre propio.
  - La puntuación y comillas siguen un estilo bíblico moderno y legible.
