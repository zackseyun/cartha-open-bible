translation:
  language: es
  text: Y aconteció en la octava noche que mi corazón volvió a turbarse dentro de mí, y empecé a hablar delante del Altísimo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: factum est
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: Latin factum est
  rationale: La fórmula narrativa latina se vierte de manera natural con «aconteció», que conserva el tono solemne e ისტორico del relato sin endurecerlo con un calco.
- source_word: in octava nocte
  english_pob_choice: on the eighth night
  chosen_spanish: en la octava noche
  alternatives_spanish:
  - la noche octava
  - en la noche octava
  lexicon: Latin octava nocte
  rationale: «En la octava noche» reproduce con claridad el valor temporal de la expresión latina y suena natural en español bíblico moderno.
- source_word: cor meum iterato turbabatur in me
  english_pob_choice: my heart was troubled again within me
  chosen_spanish: mi corazón volvió a turbarse dentro de mí
  alternatives_spanish:
  - mi corazón fue turbado otra vez dentro de mí
  - mi corazón se turbó de nuevo dentro de mí
  lexicon: Latin iterato turbabatur
  rationale: «Volvió a turbarse» comunica la repetición indicada por iterato sin perder el matiz pasivo/medio del latín. «Dentro de mí» conserva la localización interior de in me.
- source_word: coepi loqui
  english_pob_choice: I began to speak
  chosen_spanish: empecé a hablar
  alternatives_spanish:
  - comencé a hablar
  - me puse a hablar
  lexicon: Latin coepi loqui
  rationale: «Empecé a hablar» es la equivalencia más directa y transparente en español actual para la iniciación de la acción verbal.
- source_word: coram Altissimo
  english_pob_choice: before the Most High
  chosen_spanish: delante del Altísimo
  alternatives_spanish:
  - ante el Altísimo
  - en presencia del Altísimo
  lexicon: Latin coram Altissimo
  rationale: «Delante del Altísimo» conserva el valor relacional de coram y mantiene una reverencia bíblica clara. Se evita «ante» por posible tono demasiado jurídico/arcaizante.
theological_decisions:
- issue: Designación reverente de Dios
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Altísimo Dios
  - el Altísimo, Dios
  rationale: La expresión es un título divino estable y plenamente inteligible en español bíblico. Se mantiene sin glosa para no introducir una repetición no presente en el texto.
  doctrine_reference: Título divino de supremacía; no implica cambio doctrinal, solo registro reverencial.
translation_notes:
  revision_awareness: El texto inglés POB no introduce notas ni variantes; el pasaje coincide sustancialmente con el latín limpiado y la revisión más reciente lo dejó sin cambios. Por ello, la versión española sigue de cerca la lectura base sin añadir aclaraciones innecesarias.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» como traducción reverente consistente para Altissimo.
  - Se conserva una sintaxis narrativa sobria y fluida, adecuada para un registro bíblico público.
  - No se emplea «Señor» para Altíssimo, porque el fuente latina especifica un título superlativo y el contexto no exige sustitución confesional.
