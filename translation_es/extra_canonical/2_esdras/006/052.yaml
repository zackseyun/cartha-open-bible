base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/052.yaml
  text: but Leviathan you gave the moist seventh part, and you have kept it to be food for whom you wish and when you wish.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:57Z'
    unchanged: false
    changes_summary: Changed 'them' to 'it' to match the singular referent 'the moist seventh part' (ea in context), improving grammatical consistency and clarity while preserving the source sense.
translation:
  language: es
  text: pero al Leviatán le diste la séptima parte húmeda, y la has guardado para que sirva de alimento a quien quieras y cuando quieras.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Leuiathan
  english_pob_choice: Leviathan
  chosen_spanish: Leviatán
  alternatives_spanish:
  - Leviatán
  lexicon: nombre propio / criatura del caos
  rationale: Se conserva el nombre propio tradicionalmente usado en español para la criatura, con acento gráfico conforme al español.
- source_word: humidam
  english_pob_choice: the moist
  chosen_spanish: húmeda
  alternatives_spanish:
  - mojada
  - húmeda
  lexicon: adjetivo descriptivo
  rationale: ‘húmeda’ comunica el rasgo físico del latín humidam de manera natural y digna en español; ‘mojada’ resultaría más coloquial y menos adecuada en este registro.
- source_word: septimam partem
  english_pob_choice: the seventh part
  chosen_spanish: la séptima parte
  alternatives_spanish:
  - la séptima porción
  - la parte séptima
  lexicon: frase nominal cuantificadora
  rationale: ‘la séptima parte’ refleja de forma directa la construcción latina y mantiene la imagen de división proporcional.
- source_word: ut fiant in
  english_pob_choice: to be food for whom you wish and when you wish
  chosen_spanish: para que sirva de alimento a quien quieras y cuando quieras
  alternatives_spanish:
  - para que sea alimento de quien quieras y cuando quieras
  - para servir de alimento a quien quieras y cuando quieras
  lexicon: finalidad / resultado
  rationale: El final latino está truncado en el testimonio, y el inglés POB completa el sentido como finalidad alimentaria. En español, ‘sirva de alimento’ preserva ese valor final sin forzar una literalidad artificial.
theological_decisions:
- issue: Destino soberano del Leviatán
  english_pob_reading: you have kept it to be food for whom you wish and when you wish
  chosen_spanish_reading: la has guardado para que sirva de alimento a quien quieras y cuando quieras
  alternative_spanish_readings:
  - la has reservado para alimento de quien quieras y cuando quieras
  - la has guardado para el alimento de quien quieras y cuando quieras
  rationale: Se conserva la idea de custodia divina y de disponibilidad soberana, sin suavizar el control divino expresado por el texto.
  doctrine_reference: Providencia / soberanía divina en la literatura apocalíptica y de creación
translation_notes:
  revision_awareness: El texto fuente latino está truncado al final (‘ut fiant in’), y la traducción inglesa POB ya resuelve el sentido de manera interpretativa. El español sigue esa misma resolución, sin añadir contenido doctrinal extra y manteniendo el singular ‘la’ para el referente de ‘la séptima parte húmeda’, de acuerdo con la revisión inglesa más reciente.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y no arcaizante.
  - ‘Leviatán’ se usa como nombre propio estable en español.
  - Se evita ‘SEÑOR’ u otras sustituciones porque el pasaje no contiene el tetragrámaton ni κύριος.
