review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del latín fragmentario y del inglés POB: una condición sobre un lugar que sufre una sacudida violenta mientras el interlocutor está allí. Sin embargo, «estás parado» no es la mejor equivalencia para stas en registro bíblico neutro, y en español general puede sonar coloquial o ambiguo según la región. «Estás de pie» preserva mejor la postura física indicada por stas.'
  spanish_quality_summary: La frase es comprensible y natural, pero «parado» reduce la calidad panhispánica y la dignidad del registro. «De pie» suena más claro, más ampliamente legible y más acorde con el estilo del proyecto. El resto, «es sacudido violentamente», funciona bien.
  glossary_alignment: No hay términos teológicos sensibles del glosario principal en este versículo. La revisión propuesta mejora la precisión léxica de stas sin afectar terminología doctrinal.
  issues:
  - severity: medium
    issue: «estás parado» como traducción de stas
    rationale: Aunque posible en varias regiones, «parado» puede sonar coloquial o incluso sugerir solo inmovilidad, no necesariamente postura erguida. «De pie» expresa con más precisión la postura física del latín stas y mantiene mejor el registro eclesial neutro.
  - severity: low
    issue: Nota al pie innecesaria en la forma actual
    rationale: Si se adopta «de pie», ya no hace falta una nota léxica para justificar «parado» como alternativa. La lectura revisada es suficientemente clara por sí sola.
  revised_spanish_text: Y si el lugar donde estás de pie es sacudido violentamente,
