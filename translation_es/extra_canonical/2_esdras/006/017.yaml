translation:
  language: es
  text: Y sucedió que, cuando lo oí, me puse de pie y escuché; y he aquí, una voz hablaba, y su sonido era como el sonido de muchas aguas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: factum est cum audissem
  english_pob_choice: And it happened, when I heard
  chosen_spanish: Y sucedió que, cuando lo oí
  alternatives_spanish:
  - Y aconteció que, cuando lo oí
  - Y fue así que, al oírlo
  lexicon: factum est / cum + subjuntivo
  rationale: “Sucedió que” transmite el valor narrativo introductorio de la fórmula latina sin volverla arcaica. Conserva el enlace temporal de cum audissem como “cuando lo oí”, con un pronombre neutro que evita añadir un objeto no explícito.
- source_word: surrexi super pedes meos
  english_pob_choice: I stood upon my feet
  chosen_spanish: me puse de pie
  alternatives_spanish:
  - me levanté y estuve en pie
  - me puse sobre mis pies
  lexicon: surgo / super pedes
  rationale: La imagen literal “sobre mis pies” en español resulta poco natural; “me puse de pie” mantiene la acción de levantarse y quedar erguido, que es el sentido evidente del latín y del inglés POB. No se agrega una carga interpretativa adicional.
- source_word: audiui
  english_pob_choice: and listened
  chosen_spanish: y escuché
  alternatives_spanish:
  - y oí
  - y presté oído
  lexicon: audio
  rationale: El latín repite la idea de oír, pero el contexto muestra atención activa; por eso “escuché” preserva la matiz de atención que el inglés POB también destacó con “listened”.
- source_word: uox loquens
  english_pob_choice: a voice was speaking
  chosen_spanish: una voz hablaba
  alternatives_spanish:
  - una voz que hablaba
  - una voz estaba hablando
  lexicon: vox / loquor
  rationale: La construcción participial se vierte con una oración verbal natural en español. “Hablaba” conserva la continuidad de la acción sin forzar una perífrasis pesada.
- source_word: sonus eius sicut sonus aquarum multarum
  english_pob_choice: its sound was like the sound of many waters
  chosen_spanish: y su sonido era como el sonido de muchas aguas
  alternatives_spanish:
  - y su sonido era como el de muchas aguas
  - y su voz sonaba como muchas aguas
  lexicon: sonus / aquae multae
  rationale: Se mantiene la repetición de “sonido” porque el latín la repite enfáticamente. “Muchas aguas” conserva el giro literal y la imagen sonora del texto, sin suavizarla a una comparación más interpretativa.
theological_decisions:
- issue: Mantenimiento de la imagen auditiva sin alegorizarla
  english_pob_reading: a voice was speaking, and its sound was like the sound of many waters
  chosen_spanish_reading: una voz hablaba, y su sonido era como el sonido de muchas aguas
  alternative_spanish_readings:
  - una voz hablaba, y su voz sonaba como el estruendo de muchas aguas
  - una voz estaba hablando, y su sonido era como muchas aguas
  rationale: El pasaje ofrece una comparación sensorial, no una explicación simbólica. Por eso se preserva la imagen de “muchas aguas” y el paralelismo entre voz y sonido, sin convertirlo en paráfrasis devocional.
  doctrine_reference: Apocalíptica / imaginería teofánica bíblica
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requerían cambios y el cotejo cruzado muestra alta concordancia; por eso este borrador sigue de cerca el sentido ya validado en el audit trail inglés, con ajustes solo de idiomaticidad española y fidelidad al latín.
  spanish_consistency_notes:
  - Se usa el perfecto narrativo “sucedió” para el arranque histórico, en vez de calco rígido.
  - Se conserva la repetición de “sonido” por transparencia textual.
  - No se introduce “Señor”, “Cristo” ni otras equivalencias no presentes en el segmento.
  - El pronombre neutro “lo” en “cuando lo oí” evita especificar un referente no expresado en el latín.
