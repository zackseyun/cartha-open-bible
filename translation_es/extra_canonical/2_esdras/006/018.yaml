translation:
  language: es
  text: 'Y dijo esto: «Mira, vienen días en que empezaré a acercarme para visitar a los que habitan en la tierra, y cuando…»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: pinquare
  english_pob_choice: to draw near
  chosen_spanish: acercarme
  alternatives_spanish:
  - aproximarme
  - acercarme más
  lexicon: Latin pinquare
  rationale: El latín expresa la idea de acercarse físicamente o en una acción de proximidad. «Acercarme» reproduce bien esa cercanía en español natural y conserva el movimiento hacia los habitantes de la tierra.
- source_word: uisitem
  english_pob_choice: to visit
  chosen_spanish: visitar
  alternatives_spanish:
  - hacer visita a
  - acudir a
  lexicon: Latin visito
  rationale: «Visitar» es la correspondencia directa y transparente del verbo latino, sin cargarlo innecesariamente de matices devocionales o judiciales que el contexto inmediato aún no desarrolla.
- source_word: habitantes in terra
  english_pob_choice: those who dwell on the earth
  chosen_spanish: a los que habitan en la tierra
  alternatives_spanish:
  - a los que moran en la tierra
  - a los que viven en la tierra
  lexicon: Latin habitare + terra
  rationale: Se conserva la idea bíblica de habitar sobre la tierra con una formulación idiomática clara en español. «Habitan» mantiene el eco semítico/solene sin volver el texto arcaico.
theological_decisions:
- issue: El sujeto implícito del verbo y su tono profético
  english_pob_reading: And it said, “Behold, days are coming, and it will be that when I begin to draw near to visit those who dwell on the earth,
  chosen_spanish_reading: 'Y dijo: «Mira, vienen días en que empezaré a acercarme para visitar a los que habitan en la tierra, y cuando…»'
  alternative_spanish_readings:
  - 'Y dijo: «He aquí, vienen días en que comenzaré a acercarme para visitar a los que habitan en la tierra, y cuando…»'
  - 'Y dijo: «Mira, vienen días en que me acercaré para visitar a los que habitan en la tierra, y cuando…»'
  rationale: El latín conserva una voz narrativa profética con apertura solemne. «Mira» preserva el llamado de atención de «Behold» sin depender de una fórmula eclesiástica fija. «Empezaré a acercarme» refleja con fidelidad el comienzo de la acción y no adelanta más de lo que el fragmento latino ofrece, que queda truncado en «Et quando».
  doctrine_reference: Ninguna doctrina específica; decisión de tono profético y fidelidad a fragmento incompleto.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que la concordancia con el texto fuente es alta. El fragmento latino recibido termina abruptamente en «Et quando», por lo que la traducción española conserva la suspensión con puntos suspensivos sin intentar completar el verso.
  spanish_consistency_notes:
  - Se usa «Dijo» como introducción narrativa sin añadir sujeto explícito, respetando el latín impersonal/implícito del fragmento.
  - Se mantiene «la tierra» en singular para reflejar el latín terra y el inglés POB.
  - No se introduce terminología doctrinal no presente en el fragmento; el texto queda deliberadamente abierto por la truncación del fuente.
