  yaml_path: translation/extra_canonical/2_esdras/006/050.yaml
  text: the name of the second you called Leviathan. And you separated them from each other[a], for the seventh part where the water had been gathered could not hold them.
  footnotes:
  - marker: a
    text: Or 'And you separated them from each other, for the seventh part where the water had been gathered could not hold them both.'.
