    timestamp: '2026-04-23T11:41:56Z'
    unchanged: false
    changes_summary: Removed 'both,' which is not explicit in the Latin. Kept the rest essentially unchanged as accurate and natural, preserving the formal register.
translation:
  language: es
  text: Al segundo lo llamaste Leviatán. Y los separaste uno del otro[a], porque la séptima parte donde se había reunido el agua no podía contenerlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y los separaste uno del otro, porque la séptima parte donde se había reunido el agua no podía contenerlos a ambos».

      '
    reason: previous_rendering
lexical_decisions:
- source_word: nomen secundi
  english_pob_choice: the name of the second
  chosen_spanish: el nombre del segundo
  alternatives_spanish:
  - el nombre del segundo [ser]
  - el nombre del segundo objeto
  lexicon: nomen; secundi
  rationale: Mantiene la referencia nominal directa del latín sin añadir sustantivos no presentes. En español, 'el segundo' funciona de manera natural como el referente abreviado en este contexto de enumeración creadora.
- source_word: uocasti
  english_pob_choice: you called
  chosen_spanish: lo llamaste
  alternatives_spanish:
  - llamaste
  - lo nombraste
  lexicon: vocare
  rationale: '''Llamaste'' conserva el acto nominativo del original y suena natural en español bíblico moderno. Se usa el clítico para recuperar el objeto explícito implícito en el latín.'
- source_word: Leuiathan
  english_pob_choice: Leviathan
  chosen_spanish: Leviatán
  alternatives_spanish:
  - Leviatán
  lexicon: Leviathan
  rationale: Se conserva el nombre propio tradicional transliterado al español con tilde gráfica habitual.
- source_word: Et separasti ea ab alterutro
  english_pob_choice: And you separated them from each other
  chosen_spanish: Y los separaste uno de otro
  alternatives_spanish:
  - Y los separaste entre sí
  - Y los apartaste uno del otro
  lexicon: separare; alteruter
  rationale: '''Uno de otro'' refleja con precisión la reciprocidad de ''ab alterutro'' sin sobreexplicar. ''Los separaste'' es directo y adecuado para el tono narrativo.'
- source_word: non enim poterat septima pars ubi erat aqua congregata capere
  english_pob_choice: for the seventh part where the water had been gathered could not hold them
  chosen_spanish: porque la séptima parte donde se había reunido el agua no podía contenerlos
  alternatives_spanish:
  - porque la séptima parte donde el agua se había reunido no podía contenerlos
  - pues la séptima parte donde el agua había sido juntada no podía contenerlos
  lexicon: non enim; septima pars; aqua congregata; capere
  rationale: '''No podía contenerlos'' reproduce el sentido de ''capere'' en este contexto espacial. ''Se había reunido el agua'' sigue de cerca el pasivo perfecto latino y evita una paráfrasis interpretativa excesiva.'
theological_decisions:
- issue: Identificación de Leviatán como nombre del segundo elemento creado/nominado
  english_pob_reading: the name of the second you called Leviathan
  chosen_spanish_reading: El nombre del segundo lo llamaste Leviatán
  alternative_spanish_readings:
  - Al segundo lo llamaste Leviatán
  - Llamaste Leviatán al segundo
  rationale: El texto latino nombra al 'segundo' y le asigna 'Leviatán' como nombre. La traducción conserva esa relación sin introducir una identificación doctrinal adicional.
  doctrine_reference: Cosmología/creación en literatura extra-canónica; no se impone lectura dogmática adicional.
- issue: Alcance de la separación y capacidad de contener
  english_pob_reading: you separated them from each other ... could not hold them
  chosen_spanish_reading: Y los separaste uno de otro, porque la séptima parte donde se había reunido el agua no podía contenerlos
  alternative_spanish_readings:
  - Y los separaste entre sí, porque ...
  - Y los apartaste uno del otro, porque ...
  rationale: 'Se mantiene la tensión espacial del original: separación mutua y límite físico de la séptima parte. No se añade ''ambos'', ya que no está explícito en el latín revisado.'
  doctrine_reference: Precisión textual; fidelidad al límite espacial descrito en el pasaje.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que restauró la primera cláusula omitida en el borrador inglés y la posterior depuración que eliminó 'both' por no estar explícito en el latín. La versión española incluye la cláusula inicial de 'el nombre del segundo...' y evita añadir un equivalente de 'both'.
  spanish_consistency_notes:
  - Se mantiene 'Leviatán' como nombre propio transliterado, coherente con el uso bíblico habitual y con el inglés POB.
  - Se conserva 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - '''Contenerlos'' reproduce el valor de capere en sentido de capacidad espacial, sin convertirlo en mera ''captura''.'
  - La puntuación separa las dos cláusulas principales como en la sintaxis del original latino.
