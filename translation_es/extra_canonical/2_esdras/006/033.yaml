lexical_decisions:
- source_word: misit me
  english_pob_choice: he sent me
  chosen_spanish: me envió
  alternatives_spanish:
  - me mandó
  - me ha enviado
  lexicon: mittere
  rationale: El latín misit me expresa envío con finalidad; «me envió» conserva el valor narrativo simple y directo del original, y armoniza con el tono del pasaje sin añadir matiz de mandato.
- source_word: demonstrare tibi
  english_pob_choice: to show you
  chosen_spanish: para mostrarte
  alternatives_spanish:
  - para enseñarte
  - para darte a conocer
  lexicon: demonstrare
  rationale: «Mostrarte» reproduce bien la función declarativa de demonstrare y mantiene la concreción del original; «enseñarte» podría sonar más interpretativo.
- source_word: haec omnia
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - todas estas realidades
  lexicon: haec omnia
  rationale: «Todas estas cosas» sigue de cerca el alcance del latín y conserva la referencia acumulativa a los contenidos ya mencionados.
- source_word: confide
  english_pob_choice: Take courage
  chosen_spanish: Ten ánimo
  alternatives_spanish:
  - Ánimo
  - Ten confianza
  lexicon: confidere
  rationale: El imperativo confide, en este contexto exhortativo, pide fortaleza/confianza. «Ten ánimo» es una fórmula natural en español bíblico contemporáneo y transmite bien la idea sin forzar un calco.
- source_word: noli timere
  english_pob_choice: do not fear
  chosen_spanish: no temas
  alternatives_spanish:
  - no tengas miedo
  - no temas, no temas
  lexicon: timere
  rationale: «No temas» es la manera más sobria y fiel de expresar la prohibición; mantiene el tono solemne del original y de la tradición bíblica española.
theological_decisions:
- issue: Exhortación de ánimo y ausencia de temor como fórmula de consuelo divino/mensajero
  english_pob_reading: Take courage and do not fear
  chosen_spanish_reading: Ten ánimo y no temas
  alternative_spanish_readings:
  - Ten confianza y no temas
  - Ánimo y no temas
  rationale: El latín presenta una exhortación compacta que en contexto funciona como consuelo y envío; la formulación elegida conserva el paralelo exhortativo sin añadir explicaciones teológicas que el texto no explicita.
  doctrine_reference: Consuelo exhortativo en literatura apocalíptica; cf. fórmulas bíblicas de ánimo y no temor.
