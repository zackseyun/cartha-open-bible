base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/038.yaml
  text: And I said[a], “O Lord, from the beginning of creation, on the first day, you spoke, saying, ‘Let heaven and earth be made,’ and your word accomplished the work.”
  footnotes:
