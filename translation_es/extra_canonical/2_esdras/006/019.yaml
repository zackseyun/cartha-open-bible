  to: comenzaré a inquirir[a] acerca de aquellos que injustamente dañaron a otros con su injusticia, y
  rationale: Se conserva la decisión léxica principal «inquirir» por su cercanía a inquirere y al registro formal del pasaje, pero se ajusta la construcción a «inquirir acerca de aquellos» para un español más natural y ampliamente legible. También se corrige el formato de la nota al pie eliminando el marcador incrustado dentro de la nota.
