translation:
  language: es
  text: comenzaré a inquirir[a] acerca de aquellos que injustamente dañaron a otros con su injusticia, y
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «comenzaré a requerir cuentas de aquellos que injustamente dañaron a otros con su injusticia, y».
    reason: alternative_reading
lexical_decisions:
- source_word: inquirere incipiam
  english_pob_choice: and when I begin to inquire of
  chosen_spanish: comenzaré a inquirir
  alternatives_spanish:
  - comenzaré a preguntar
  - comenzaré a investigar
  lexicon: inquirir
  rationale: El latín inquirere expresa buscar información o indagar; en español, «inquirir» conserva el registro formal y el valor de indagación sin introducir la idea más fuerte de «exigir cuentas», que fue descartada en la revisión inglesa.
- source_word: ab eis
  english_pob_choice: of those
  chosen_spanish: de aquellos
  alternatives_spanish:
  - de los que
  - a aquellos
  lexicon: ab + pronombre
  rationale: La preposición latina con complemento personal se vierte naturalmente como «de aquellos» en español para mantener la relación de objeto de la indagación.
- source_word: qui iniuste nocuerunt
  english_pob_choice: who have unjustly harmed
  chosen_spanish: que injustamente dañaron
  alternatives_spanish:
  - que han hecho daño injustamente
  - que han perjudicado injustamente
  lexicon: nocere
  rationale: nocuerunt indica haber causado daño; «dañaron» comunica el acto con claridad y mantiene la fuerza moral de «iniuste» con el adverbio «injustamente».
- source_word: iniustitia sua
  english_pob_choice: by their injustice
  chosen_spanish: con su injusticia
  alternatives_spanish:
  - por su injusticia
  - a causa de su injusticia
  lexicon: iniustitia
  rationale: La repetición latina de la raíz injusticia/iniuste sugiere la vinculación entre el modo y la acción; «con su injusticia» reproduce esa conexión de manera idiomática y deja visible la repetición lexical.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que volvió de «require an account from» a «inquire of» para reflejar con mayor precisión inquirere. También se respetó la corrección de alineación que limita este versículo a la cláusula latina conservada aquí, sin incorporar la continuación que pertenece al versículo siguiente.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y bíblico, pero evitando calcar el inglés cuando el español admite una construcción natural.
  - «Inquirir» se conservó por fidelidad léxica y porque el texto latino no pide aquí una noción explícita de juicio o rendición de cuentas.
  - Se preservó la repetición semántica de iniuste/iniustitia con «injustamente» y «injusticia».
