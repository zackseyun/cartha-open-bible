translation:
  language: es
  text: Entonces mandaste que se hiciera salir luz de tus tesoros, para que entonces aparecieran tus obras.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: tunc / then
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: adverbio temporal
  rationale: «Entonces» reproduce el valor consecutivo-temporal del latín tunc y funciona con naturalidad en español bíblico contemporáneo.
- source_word: dixisti / you commanded
  english_pob_choice: you commanded
  chosen_spanish: mandaste
  alternatives_spanish:
  - ordenaste
  - dispuiste
  lexicon: verbo de mandato
  rationale: El latín dice literalmente «dijiste», pero el contexto y la versión inglesa auditada explican la fuerza de mandato; «mandaste» preserva ese valor sin exagerar el registro.
- source_word: de thesauris tuis / from your treasuries
  english_pob_choice: from your treasuries
  chosen_spanish: de tus tesoros
  alternatives_spanish:
  - desde tus tesoros
  - de tus depósitos
  lexicon: thesaurus
  rationale: «Tesoros» sigue de cerca thesauri y mantiene la imagen de un lugar de provisión. «Depósitos» sería más explicativo pero menos directo al original.
- source_word: proferri lumen / light should be brought forth
  english_pob_choice: light should be brought forth
  chosen_spanish: se sacara luz
  alternatives_spanish:
  - fuera sacada la luz
  - se trajera luz
  - saliera luz
  lexicon: passive impersonal / motion of bringing forth
  rationale: La construcción impersonal con «se sacara» expresa el pasivo de proferri en un español claro y sobrio. «Luz» conserva el sustantivo simple sin añadir matices no presentes.
- source_word: ut apparerent / so that ... might appear
  english_pob_choice: so that ... might appear
  chosen_spanish: para que ... aparecieran
  alternatives_spanish:
  - a fin de que ... se manifestaran
  - para que ... se vieran
  lexicon: purpose clause
  rationale: «Para que» traduce la finalidad de ut, y «aparecieran» mantiene la visibilidad de apparerent sin convertirlo en una paráfrasis interpretativa.
- source_word: opera tua / your works
  english_pob_choice: your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus acciones
  - tus obras hechas
  lexicon: opera
  rationale: «Obras» es la correspondencia más directa y también puede abarcar la idea de las obras creadas de Dios; en este contexto, la palabra conserva la amplitud del latín.
theological_decisions:
- issue: La escena atribuye a Dios la salida de la luz desde sus tesoros antes de que aparezcan sus obras.
  english_pob_reading: Then you commanded that light should be brought forth from your treasuries, so that your works might then appear.
  chosen_spanish_reading: Entonces mandaste que de tus tesoros se sacara luz, para que entonces aparecieran tus obras.
  alternative_spanish_readings:
  - Entonces ordenaste que saliera la luz de tus tesoros, para que aparecieran tus obras.
  - Entonces hiciste salir luz de tus tesoros, para que aparecieran tus obras.
  rationale: 'La traducción conserva la secuencia causal y teológica: la luz precede a la manifestación de las obras divinas. No se suaviza ni se espiritualiza la imagen; se mantiene como acto creador/divino explícito.'
  doctrine_reference: Creación divina y manifestación de las obras de Dios en el orden creado.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés auditado, que eliminó el indefinido «some» antes de «light» por no estar en el latino lumen. Por eso no se añade ningún equivalente indefinido en español.
  spanish_consistency_notes:
  - Se mantuvo «luz» sin artículo indefinido, de acuerdo con el latín lumen y la revisión inglesa más reciente.
  - Se usó «obras» para opera, evitando expandirlo a «hechos» o «acciones», porque la imagen del texto es cósmica y creadora.
  - 'Se preservó el orden lógico del original: mandato -> salida de la luz -> aparición de las obras.'
