  rationale: Se hace una reparación menor para mejorar la naturalidad y legibilidad del español sin apartarse del sentido del latín ni del POB inglés. «Ponte de pie» sustituye un calco corporal innecesario. «Una voz fuerte y resonante» expresa de manera más idiomática la idea de una voz sumamente llena de sonido, mientras la alternativa más literal se conserva en nota.
