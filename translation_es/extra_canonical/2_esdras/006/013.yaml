lexical_decisions:
- source_word: uocem
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  - voz sonora
  lexicon: voice
  rationale: La base latina uocem pide «voz» de forma directa. En español conserva la imagen auditiva sin desplazarla a «sonido», que debilitaría el carácter personal del enunciado.
- source_word: plenissimam
  english_pob_choice: a full, resounding
  chosen_spanish: plena, resonante
  alternatives_spanish:
  - llena de sonido
  - plenísima
  lexicon: very full / superlative fullness
  rationale: La superlativa plenissimam expresa plenitud intensificada. «Plena, resonante» comunica la carga auditiva y el efecto solemne en español sin el calco torpe de «llena de sonido».
- source_word: sonus
  english_pob_choice: resounding
  chosen_spanish: resonante
  alternatives_spanish:
  - sonora
  - de gran resonancia
  lexicon: sound / resonance
  rationale: sonus aporta la cualidad de sonido/sonoridad. «Resonante» preserva ese campo semántico y encaja con el registro apocalíptico de la escena.
- source_word: commotione commoue-
  english_pob_choice: Stand upon your feet
  chosen_spanish: Ponte sobre tus pies
  alternatives_spanish:
  - Ponte de pie
  - Levántate
  lexicon: stand / be moved
  rationale: El fragmento latino en esta línea se interrumpe y el contexto del POB inglés ya fija la orden como una instrucción para ponerse en pie. «Ponte sobre tus pies» sigue más de cerca la imagen corporal del mandato y mantiene el tono reverencial.
theological_decisions:
- issue: Modo de expresar la voz revelatoria en una escena visionaria
  english_pob_reading: a full, resounding voice
  chosen_spanish_reading: una voz plena, resonante
  alternative_spanish_readings:
  - una voz llena de sonido
  - una voz plenamente resonante
  rationale: No hay una carga doctrinal disputada, pero sí una tensión estilística entre literalidad y naturalidad. Se conserva la cualidad sobrenatural de la voz sin domesticarla a un español coloquial.
  doctrine_reference: Apocalíptica / teofanía literaria
translation_notes:
  revision_awareness: El texto inglés fue revisado desde «a voice full of sound» a «a full, resounding voice» para evitar un calco áspero. El español adopta esa mejora semántica y estilística, manteniendo la superlación y la imaginería auditiva del latín.
  spanish_consistency_notes:
  - Se mantiene «voz» en lugar de «sonido» para conservar la personificación del mensaje auditable en la escena.
  - Se usa puntuación española con comillas angulares y dos puntos tras el verbo de habla.
  - El tono es solemne y legible para lectura eclesial sin recurrir a fórmulas tradicionales no sustentadas por el latín.
