  - severity: medium
    issue: «una voz plena, resonante» suena rígido y algo opaco
    rationale: «Plena» aplicado sin complemento a «voz» no transmite con claridad la idea latina de plenitud de sonido. «Fuerte y resonante» o formulaciones similares comunican mejor el efecto auditivo del original y del POB inglés.
