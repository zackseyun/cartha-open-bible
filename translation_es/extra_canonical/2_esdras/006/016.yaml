lexical_decisions:
- source_word: Quoniam / because
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: —
  rationale: El latín introduce la causalidad de manera directa; «porque» conserva esa relación sin añadir matiz explicativo excesivo. «Pues» también sería posible, pero aquí «porque» resulta más natural y cercano al valor causal simple del original.
- source_word: sermo / speech, discourse
  english_pob_choice: the speech
  chosen_spanish: el discurso
  alternatives_spanish:
  - la palabra
  - el hablar
  - el discurso que se pronuncia
  lexicon: —
  rationale: «Discurso» comunica mejor una declaración solemne o proclamación que un simple acto de hablar. Mantiene el valor de contenido pronunciado que afecta a los oyentes.
- source_word: ad eos pertinere / concerns them
  english_pob_choice: concerns them
  chosen_spanish: les concierne
  alternatives_spanish:
  - les afecta
  - se refiere a ellos
  - va dirigido a ellos
  lexicon: —
  rationale: La forma pronominal expresa que la proclamación va dirigida a ellos o los involucra; «les concierne» es claro y fiel sin forzar una interpretación más estrecha.
- source_word: tremble and be shaken
  english_pob_choice: tremble and be shaken
  chosen_spanish: temblarán y serán sacudidos
  alternatives_spanish:
  - temblarán y se estremecerán
  - temblarán y serán conmocionados
  lexicon: —
  rationale: La secuencia verbal conserva el paralelismo del inglés y del latín. «Serán sacudidos» reproduce bien la pasividad y la intensidad del efecto sobre ellos.
- source_word: finem eorum
  english_pob_choice: their end
  chosen_spanish: su fin
  alternatives_spanish:
  - su término
  - su final
  lexicon: —
  rationale: «Su fin» es la forma más directa y bíblicamente inteligible en español. Mantiene el sentido escatológico sin añadir comentario.
- source_word: oportet commutari
  english_pob_choice: must be changed
  chosen_spanish: debe ser cambiado
  alternatives_spanish:
  - tiene que ser cambiado
  - debe ser transformado
  - debe cambiarse
  lexicon: —
  rationale: El latín expresa necesidad impersonal y pasiva. «Debe ser cambiado» conserva esa estructura y evita suavizar la obligatoriedad.
theological_decisions:
- issue: Sentido de 'su fin debe ser cambiado'
  english_pob_reading: their end must be changed
  chosen_spanish_reading: su fin debe ser cambiado
  alternative_spanish_readings:
  - su destino debe cambiar
  - su final debe ser alterado
  rationale: 'Se conserva la tensión del texto: no se expone si el cambio es positivo o negativo, solo que el término final de ellos será alterado. «Fin» mantiene la ambigüedad escatológica del latín.'
  doctrine_reference: Escatología del juicio y del destino final en literatura apocalíptica
translation_notes:
  revision_awareness: La revisión inglesa eliminó la redundancia «For because» y dejó una causalidad simple con «Because». El español sigue esa mejora con «Porque», sin añadir otro conector que duplique la causa. El texto latino disponible es breve y no requiere ampliación interpretativa.
  spanish_consistency_notes:
  - Se conserva «fin» y no se expande a «destino» en el texto principal para no perder la literalidad del latín.
  - Se mantiene el tono apocalíptico sobrio, con verbos futuros simples y pasiva perifrástica.
  - La nota a ofrece una alternativa semántica real del giro «les concierne» sin alterar el texto principal.
