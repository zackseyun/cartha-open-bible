    issue: «serán sacudidos» suena poco idiomático en este contexto
    rationale: Aunque posible, en español sugiere más una sacudida física externa. El contexto apocalíptico de reacción al mensaje se expresa con mayor naturalidad por «se estremecerán», que conserva intensidad sin perder fidelidad.
  - severity: low
    issue: La nota al pie no refleja la alternativa inglesa auditada completa
    rationale: La nota actual solo ofrece alternativas léxicas para «les concierne», pero el POB conserva como alternativa una redacción completa del inicio («Porque el discurso les concierne...» / «Pues porque...» en inglés previo). Conviene que la nota española preserve esa opción textual documentada en vez de solo glosar una frase.
