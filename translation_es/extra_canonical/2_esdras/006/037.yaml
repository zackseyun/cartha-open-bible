  text: Pues mi espíritu estaba muy inflamado, y mi alma estaba angustiada.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: inflammabatur
  english_pob_choice: was greatly inflamed
  chosen_spanish: se inflamaba mucho
  alternatives_spanish:
  - estaba muy inflamado
  - ardía intensamente
  lexicon: Latin inflammo / inflamabatur
  rationale: El pasivo/medio latino expresa un estado intenso de agitación interior; «se inflamaba» conserva la imagen de calor/fuego sin volverla demasiado literal o ajena al español bíblico, y «mucho» refleja el adverbio vehemens de la intensidad del POB inglés.
- source_word: spiritus meus
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi aliento
  - mi ánimo
  lexicon: Latin spiritus
  rationale: «Espíritu» mantiene la correspondencia directa con spiritus y preserva la amplitud semántica de una interioridad vivificada o conmovida, mejor que reducirlo a «ánimo» o «aliento» en este contexto.
- source_word: anima mea
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  lexicon: Latin anima
  rationale: «Alma» reproduce el término latino y el paralelismo con «espíritu»; en español es la opción más transparente y tradicionalmente inteligible para conservar la distinción entre los dos miembros de la frase.
- source_word: anxiabatur
  english_pob_choice: was distressed
  chosen_spanish: estaba angustiada
  alternatives_spanish:
  - estaba afligida
  - se angustiaba
  lexicon: Latin anxio / anxiabatur
  rationale: «Angustiada» comunica con precisión el sufrimiento interior y mantiene el tono afectivo del latín; es más fuerte y natural que «afligida» para el estado de presión y desasosiego que describe el texto.
theological_decisions:
- issue: Paralelismo interior entre espíritu y alma
  english_pob_reading: my spirit ... and my soul ...
  chosen_spanish_reading: mi espíritu ... y mi alma ...
  alternative_spanish_readings:
  - mi ánimo ... y mi alma ...
  - mi espíritu ... y mi ser ...
  rationale: Se conserva el paralelismo antropológico del original sin armonizarlo a una sola facultad interior. El texto presenta dos expresiones coordinadas de la experiencia interna, y la traducción mantiene esa tensión sin explicitar una antropología más definida que la del pasaje.
  doctrine_reference: Antropología bíblica; paralelismo semítico/latino de interioridad
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requieren cambios; la presente redacción sigue de cerca el latín limpio y coincide sustancialmente con la solución inglesa ya aprobada.
  spanish_consistency_notes:
