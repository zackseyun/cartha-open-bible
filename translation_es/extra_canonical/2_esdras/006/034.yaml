base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/034.yaml
  text: and do not hasten to think vain thoughts about the former times[a][6:34], so that you may not be hasty concerning the last times.’”
  footnotes:
  - marker: '6:34'
    text: The warning is textually difficult. The sense is a prohibition against impatient, empty speculation about earlier times that would distort Ezra's relation to the last times.
    reason: textual_variant
  - marker: a
    text: Or 'so that you may not hasten away from the last times.’”'.
    reason: previous_rendering
  revision_pass:
