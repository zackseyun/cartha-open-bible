- from: y no te apresures a pensar pensamientos vanos acerca de los tiempos anteriores[a], para que no seas apresurado respecto de los últimos tiempos.”
  to: y no te apresures a pensar pensamientos vanos acerca de los tiempos anteriores, para que no te precipites respecto de los últimos tiempos.[a]”
  rationale: Se mantiene la estructura y el sentido del original latino y del POB inglés, pero se reemplaza la expresión poco natural «no seas apresurado» por «no te precipites», que suena más idiomática en español. También se corrige la nota para que preserve la alternativa histórica relevante del audit trail en vez de repetir el sentido principal.
