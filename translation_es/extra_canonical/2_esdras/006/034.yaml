    timestamp: '2026-04-23T11:41:53Z'
    unchanged: false
    changes_summary: Changed 'hurry' to 'hasten' for a more formal register and closer consistency with 'be hasty'; otherwise retained the draft.
translation:
  language: es
  text: y no te apresures a pensar pensamientos vanos acerca de los tiempos anteriores, para que no te precipites respecto de los últimos tiempos.[a]”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que no te apresures lejos de los últimos tiempos». La advertencia es textualmente difícil; aquí la preposición latina expresa referencia («respecto de»), no alejamiento.'
    reason: previous_rendering
lexical_decisions:
- source_word: noli festinare
  english_pob_choice: do not hasten
  chosen_spanish: no te apresures
  alternatives_spanish:
  - no te precipites
  - no corras
  lexicon: festinare
  rationale: «Apresurarse» comunica bien el valor de prisa/impaciencia del verbo latino y mantiene el registro formal señalado por la revisión inglesa.
- source_word: cogitare vana
  english_pob_choice: to think vain thoughts
  chosen_spanish: pensar pensamientos vanos
  alternatives_spanish:
  - meditar vanidades
  - pensar cosas vanas
  lexicon: cogitare / vanus
  rationale: 'La construcción mantiene la repetición enfática del original: un pensar vacío, sin fruto ni fundamento, más que una simple actividad mental neutra.'
- source_word: in prioribus temporibus
  english_pob_choice: about the former times
  chosen_spanish: acerca de los tiempos anteriores
  alternatives_spanish:
  - sobre los tiempos pasados
  - de los tiempos anteriores
  lexicon: prior
  rationale: «Tempos anteriores» conserva la referencia al tramo inicial de la historia/creación sin añadir matices interpretativos que el texto no exige.
- source_word: a novissimis temporibus
  english_pob_choice: concerning the last times
  chosen_spanish: respecto de los últimos tiempos
  alternatives_spanish:
  - acerca de los últimos tiempos
  - en cuanto a los últimos tiempos
  lexicon: novissimus
  rationale: 'Se siguió la revisión inglesa que corrige la relación de la preposición: aquí no es separación espacial, sino referencia o respecto a los tiempos finales. «Respecto de» conserva esa relación y el paralelismo con «acerca de».'
theological_decisions:
- issue: Relación entre los tiempos anteriores y los últimos tiempos
  english_pob_reading: The warning is against impatient, empty speculation about earlier times that would distort Ezra's relation to the last times.
  chosen_spanish_reading: La advertencia prohíbe la especulación impaciente y vacía sobre los tiempos anteriores, para no desordenar la actitud de Ezra respecto de los últimos tiempos.
  alternative_spanish_readings:
  - para que no te apartes de los últimos tiempos
  - para que no te precipites fuera de los últimos tiempos
  rationale: La versión española conserva la advertencia como una cuestión de orientación temporal y esperanza escatológica, no como huida de los tiempos finales. Así se mantiene la corrección textual destacada en la revisión.
  doctrine_reference: Eschatology / orden de la esperanza final
translation_notes:
  revision_awareness: La redacción incorpora la revisión aplicada que corrigió la idea de «away from the last times» por una relación de referencia/concerning, y conserva el registro formal de «hasten» mediante «apresures».
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se evitó «Cristo»/«Mesías» porque el versículo no contiene esa referencia.
  - «Últimos tiempos» se mantiene como traducción fija de novissimis temporibus, en paralelo con «tiempos anteriores».
  - La nota a deja abierta la alternativa «acerca de» para reflejar la ambigüedad resuelta en la historia de revisión.
