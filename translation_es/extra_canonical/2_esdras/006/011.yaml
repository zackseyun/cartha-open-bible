lexical_decisions:
- source_word: ante oculos tuos
  english_pob_choice: before your eyes
  chosen_spanish: ante tus ojos
  alternatives_spanish:
  - delante de ti
  - ante tu vista
  lexicon: ante + oculos
  rationale: La frase latina expresa proximidad o presencia visual delante de Dios; 'ante tus ojos' reproduce de forma natural el valor idiomático de 'before your eyes' sin añadir una paráfrasis ajena al texto.
- source_word: ut demonstres
  english_pob_choice: that you may show
  chosen_spanish: para que muestres
  alternatives_spanish:
  - para que demuestres
  - a fin de que muestres
  lexicon: ut + demostrāre
  rationale: '''Demostres'' pide una acción de hacer visible o indicar; ''muestres'' es más natural en español y conserva el sentido de exhibir/revelar, mientras que ''demuestres'' sonaría más abstracto.'
- source_word: servo tuo
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: servus
  rationale: Aquí el contexto de súplica a Dios favorece 'siervo' como fórmula reverente y tradicional en español; 'esclavo' sería demasiado fuerte para la recepción litúrgica, aunque la raíz latina puede tener fuerza de sujeción.
- source_word: finem signorum
  english_pob_choice: the end of the signs
  chosen_spanish: el fin de las señales
  alternatives_spanish:
  - el final de las señales
  - el término de las señales
  lexicon: finis + signa
  rationale: '''Signorum'' alude a señales o signos; ''señales'' es el equivalente más claro en español. ''Fin'' mantiene la idea de término/meta sin sobreexplicar.'
theological_decisions:
- issue: Relación implícita entre la visión divina y la revelación pedida
  english_pob_reading: before your eyes, that you may show your servant the end of the signs
  chosen_spanish_reading: ante tus ojos, para que muestres a tu siervo el fin de las señales
  alternative_spanish_readings:
  - delante de ti, para que reveles a tu siervo el fin de las señales
  - ante tu presencia, para que hagas ver a tu siervo el fin de las señales
  rationale: El texto no dice explícitamente 'revelar' sino 'mostrar'; por eso se conserva la petición de dar a conocer el desenlace de las señales, sin añadir contenido apocalíptico extra. La formulación mantiene la dependencia del siervo respecto de Dios.
  doctrine_reference: Apocalíptica/oráción de petición; fidelidad al acto de revelación divina sin ampliación doctrinal
- issue: Tratamiento de 'servus' en contexto de oración a Dios
  english_pob_reading: your servant
  chosen_spanish_reading: tu siervo
  alternative_spanish_readings:
  - tu esclavo
  - tu servidor
  rationale: Aunque 'servus' puede ser literalmente 'esclavo', en este registro de súplica dirigida a Dios la tradición española entiende mejor la relación como servicio reverente. Se evita 'esclavo' para no introducir una dureza innecesaria en una fórmula de oración breve.
  doctrine_reference: Lenguaje de humildad y dependencia en la oración bíblica
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió un borrador anterior no relacionado y fijó la secuencia correcta del latino: ''ante oculos tuos'' -> ''before your eyes'', ''ut demonstres'' -> ''that you may show'', ''servo tuo'' -> ''your servant'', ''finem signorum'' -> ''the end of the signs''. Esta propuesta sigue ese trazado y mantiene la misma estructura sintáctica en español.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exija explícitamente; aquí no aparece el Tetragrámaton, por lo que no se introduce.
  - Se conserva 'siervo' por coherencia con el valor reverencial de 'servus' en contextos de oración, aunque se reconoce la alternativa lexical 'esclavo'.
  - '''Señales'' se mantiene para ''signa/signorum'' por consistencia con el campo semántico de signos apocalípticos y revelatorios.'
