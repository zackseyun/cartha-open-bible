revisions:
- from: Se volverá a otro entendimiento. Porque el mal será borrado, y el engaño será extinguido. Pero la fe florecerá, y la corrupción será vencida,
  to: Se volverá a otra comprensión. Porque el mal será borrado, y el engaño será apagado. Pero la fe florecerá, y la corrupción será vencida,
  rationale: 'Se hicieron dos ajustes menores de estilo para un español más natural y ampliamente legible, manteniendo la estructura, el contraste escatológico y las imágenes del latín: «otra comprensión» por «otro entendimiento», y «apagado» por «extinguido». No se requieren notas al pie porque no se introduce nueva ambigüedad ni se omite una alternativa preservada en el texto inglés para esta porción específica.'
