base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/026.yaml
  text: It will be turned into another understanding[6:26]. For evil will be blotted out, and deceit will be extinguished. But faith will flourish, and corruption will be overcome[a],
  footnotes:
  - marker: '6:26'
    text: Or 'the men who have been received' or 'gathered in.' The Latin does not specify the manner of their preservation from death.
    reason: alternative_reading
  - marker: a
    text: Or 'And the men who have been taken up, who have not tasted death from their birth, will be seen'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:52Z'
    unchanged: false
    changes_summary: Replaced the draft, which reflected a different verse, with a translation matching the provided Latin. Rendered sensum alium as 'another understanding,' delebitur as 'will be blotted out,' dolus as 'deceit,' and kept the final clause with a trailing comma to reflect the source punctuation.
translation:
  language: es
  text: Se volverá a otra comprensión. Porque el mal será borrado, y el engaño será apagado. Pero la fe florecerá, y la corrupción será vencida,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: conuertetur in sensum alium
  english_pob_choice: It will be turned into another understanding
  chosen_spanish: Se volverá a otro entendimiento
  alternatives_spanish:
  - Se convertirá en otro entendimiento
  - Será transformado en otro entendimiento
  lexicon: conuertetur; sensum alium
  rationale: Mantiene la pasiva/medio del latín con un español natural y conserva sensum como 'entendimiento' para no suavizar la idea de cambio de percepción o criterio.
- source_word: Delebitur enim malum
  english_pob_choice: For evil will be blotted out
  chosen_spanish: Porque el mal será borrado
  alternatives_spanish:
  - Porque el mal será borrado de la memoria
  - Porque el mal será eliminado
  lexicon: delebitur; malum
  rationale: '''Borrado'' reproduce la imagen fuerte del latín sin introducir una expansión no atestiguada; ''mal'' mantiene el valor moral general de malum.'
- source_word: extinguetur dolus
  english_pob_choice: and deceit will be extinguished
  chosen_spanish: y el engaño será extinguido
  alternatives_spanish:
  - y el engaño será apagado
  - y la falsedad será extinguida
  lexicon: extinguetur; dolus
  rationale: '''Engaño'' es la correspondencia más directa y clara para dolus en este contexto; ''extinguido'' conserva la metáfora de apagar un fuego o una presencia activa.'
- source_word: Florebit autem fides
  english_pob_choice: But faith will flourish
  chosen_spanish: Pero la fe florecerá
  alternatives_spanish:
  - Mas la fe florecerá
  - Pero la fidelidad florecerá
  lexicon: florebit; fides
  rationale: Se conserva 'fe' como la opción normal y eclesialmente inteligible; 'florecerá' sigue la imagen verbal del latín.
- source_word: uincetur corruptela
  english_pob_choice: and corruption will be overcome
  chosen_spanish: y la corrupción será vencida
  alternatives_spanish:
  - y la corrupción será derrotada
  - y la corrupción será superada
  lexicon: uincetur; corruptela
  rationale: '''Vencida'' refleja el pasivo de vincere y mantiene el tono de conflicto moral. ''Corrupción'' es la manera más natural de expresar corruptela en español bíblico.'
theological_decisions:
- issue: Contraste escatológico entre mal, engaño, fe y corrupción
  english_pob_reading: Evil will be blotted out, deceit will be extinguished, faith will flourish, and corruption will be overcome.
  chosen_spanish_reading: El mal será borrado, el engaño será extinguido, la fe florecerá y la corrupción será vencida.
  alternative_spanish_readings:
  - El mal será eliminado, el engaño desaparecerá, la fe crecerá, y la corrupción será superada.
  rationale: Se conserva la secuencia antitética del texto sin añadir interpretaciones doctrinales. El lenguaje mantiene la tensión moral y escatológica con verbos de fuerte valor imagístico.
  doctrine_reference: 2 Esdras 6:26; contraste final entre la derrota del mal y el florecimiento de la fe.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente que corrige la traducción hacia el latín provisto: sensum alium = ''otro entendimiento'', delebitur = ''será borrado'', dolus = ''engaño'', y la cláusula final se mantiene como cierre de verso con coma final en la fuente.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' y otras sustituciones no presentes porque este verso no contiene el Tetragrámaton ni κύριος.
  - '''Fe'' se mantuvo en lugar de ''fidelidad'' porque el latín fides admite ambas, pero el contexto y el español bíblico favorecen ''fe''.'
  - Se preservó el paralelismo verbal del original con cuatro miembros coordinados, sin añadir sujeto explícito innecesario.
