    changes_summary: Revised 'Now' to 'But' for autem, 'have spoken' to 'have said' for dixi, and 'this world' to 'the first world' to reflect primogenitum saeculum more accurately.
translation:
  language: es
  text: Pero he dicho todas estas cosas delante de ti, Señor[a], porque dijiste que por nosotros creaste el primer mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todas estas cosas he hablado delante de ti, Señor, porque dijiste que por nosotros creaste el mundo primogénito»'
    reason: previous_rendering / alternativa documentada por la auditoría inglesa
lexical_decisions:
- source_word: haec autem omnia dixi
  english_pob_choice: But I have said all these things
  chosen_spanish: Pero he dicho todas estas cosas
  alternatives_spanish:
  - Ahora he dicho todas estas cosas
  - Y he dicho todas estas cosas
  lexicon: Latin haec autem omnia dixi
  rationale: «autem» pide una transición adversativa suave; «he dicho» refleja el perfecto latino sin volverlo innecesariamente narrativo, y «todas estas cosas» mantiene el alcance total del sintagma.
- source_word: coram te
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: Latin coram
  rationale: «Delante de ti» es natural en español y conserva la idea de estar en presencia directa de Dios sin añadir solemnidad no exigida por el texto.
- source_word: Domine
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Soberano
  lexicon: Latin Domine
  rationale: El vocativo dirigido a Dios se rinde de forma directa como «Señor», que es la equivalencia más clara y reverente en español.
- source_word: propter nos
  english_pob_choice: for our sake
  chosen_spanish: para nuestro bien
  alternatives_spanish:
  - por nosotros
  - por causa de nosotros
  lexicon: Latin propter + nos
  rationale: «Para nuestro bien» conserva el valor benefactivo explícito del latín y suena natural en español; evita una literalidad pesada que podría sonar causal más que final/benefactiva.
- source_word: creasti
  english_pob_choice: you created
  chosen_spanish: creaste
  alternatives_spanish:
  - has creado
  - hiciste
  lexicon: Latin creo
  rationale: El pretérito simple español corresponde bien al perfecto latino en este contexto y mantiene la declaración divina como acto creador ya afirmado.
- source_word: primogenitum saeculum
  english_pob_choice: the first world
  chosen_spanish: el primer mundo
  alternatives_spanish:
  - el mundo primero
  - el mundo primogénito
  lexicon: Latin primogenitus + saeculum
  rationale: Sigo la revisión fuente-centrada que considera corrupto el valor «firstborn world» y adopta la lectura de «this world / first world» sostenida por las versiones antiguas; en español, «primer mundo» preserva esa lectura sin introducir un calco extraño como «mundo primogénito».
theological_decisions:
- issue: Referencia a la creación original del mundo
  english_pob_reading: you created the first world
  chosen_spanish_reading: creaste el primer mundo
  alternative_spanish_readings:
  - creaste este mundo
  - creaste el mundo primero
  rationale: La auditoría revisada indica que el latín conservado refleja una corrupción textual; el sentido teológico debe seguir la tradición de «este mundo / first world» y no la frase errónea «mundo primogénito». «Primer mundo» mantiene la afirmación de una creación original previa al estado presente.
  doctrine_reference: Cosmología de la creación; crítica textual de 2 Esdras 6:55
- issue: Vocativo divino
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Señor mío
  rationale: El texto latino dice simplemente Domine, un vocativo directo. En una oración dirigida a Dios, «Señor» es la opción española más inmediata y fiel, sin forzar aquí una reconstrucción del tetragrámaton que el latín no explicita.
  doctrine_reference: Tratamiento reverente del vocativo divino
translation_notes:
  revision_awareness: La versión inglesa fue revisada varias veces para corregir el valor de autem, ajustar dixi a «I have said», y tratar primogenitum saeculum según la evidencia textual. Esta propuesta sigue la lectura revisada que entiende la frase como «el primer mundo» y no como «el mundo primogénito», y conserva el giro adversativo de autem en «Pero».
  spanish_consistency_notes:
  - Se mantiene «Señor» como vocativo divino directo y no se sustituye por una forma de máscara litúrgica.
  - «Primer mundo» se usa aquí como traducción de una lectura textual debatida; no se introduce «primogénito» para evitar respaldar la corrupción señalada en la revisión.
  - El registro es solemne y sobrio, adecuado para una traducción bíblica pública en español.
