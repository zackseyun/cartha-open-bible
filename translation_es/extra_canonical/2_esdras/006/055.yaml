base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/055.yaml
  text: But I have said all these things before you[a], Lord, because you said that for our sake you created the first world.
  footnotes:
  - marker: a
    text: Or 'All these things I have spoken before you, Lord, because you said that for our sake you created the firstborn world.'.
