revisions:
- from: Pero he dicho todas estas cosas delante de ti, Señor[a], porque dijiste que para nuestro bien creaste el primer mundo.
  to: Pero he dicho todas estas cosas delante de ti, Señor[a], porque dijiste que por nosotros creaste el primer mundo.
  rationale: Se corrige «para nuestro bien» a «por nosotros» para preservar mejor el valor de propter nos sin añadir un matiz interpretativo. También se reemplaza la nota al pie por una que sí refleje la alternativa auditada en inglés, incluyendo la variante «mundo primogénito».
  reviewer_model: gpt-5.4
