translation:
  language: es
  text: y antes de que fueran examinados los años presentes, y antes de que fueran alejadas las maquinaciones de los que ahora pecan, y antes de que fueran sellados los que han guardado la fe[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y los que han guardado la fe fueron sellados—».'
    reason: Refleja la alternativa documentada en la nota inglesa previa, donde la última cláusula puede leerse sin la subordinación repetida de «antes de que».
lexical_decisions:
- source_word: praesentes anni
  english_pob_choice: the present years
  chosen_spanish: los años presentes
  alternatives_spanish:
  - los años de ahora
  - el tiempo presente
  lexicon: annus
  rationale: Conservo la referencia temporal plural de la fuente latina y del inglés POB. 'Los años presentes' reproduce de manera directa el valor de 'praesentes anni' sin interpretar la expresión como una abstracción más amplia.
- source_word: inuestigarentur
  english_pob_choice: were searched out
  chosen_spanish: fueran examinados
  alternatives_spanish:
  - fueran investigados
  - fueran sondeados
  lexicon: invesigo
  rationale: El latín sugiere una acción de exploración/indagación previa. En español, 'examinados' mantiene la idea de ser objeto de examen o escrutinio sin sonar artificial en la sintaxis de 'antes de que'.
- source_word: abalienarentur ... adinuentiones
  english_pob_choice: the devices ... were estranged
  chosen_spanish: fueran apartados los designios
  alternatives_spanish:
  - fueran alejados los pensamientos
  - fueran extrañados los inventos
  lexicon: alieno
  rationale: '''Abalienarentur'' expresa alejamiento o separación. ''Designios'' es una opción sobria para ''adinuentiones'' en este contexto, y ''apartados'' preserva la idea de separación sin forzar un calco extraño en español.'
- source_word: eorum qui nunc peccant
  english_pob_choice: those who now sin
  chosen_spanish: de los que ahora pecan
  alternatives_spanish:
  - de quienes pecan ahora
  - de los que pecan en este tiempo
  lexicon: pecco
  rationale: Conservo el presente moral y la referencia a personas concretas. 'Los que ahora pecan' sigue de cerca la construcción latina y es natural en español.
- source_word: consignarentur
  english_pob_choice: were sealed
  chosen_spanish: fueran sellados
  alternatives_spanish:
  - fueran marcados
  - fueran rubricados
  lexicon: consigno
  rationale: '''Sellados'' mantiene el valor técnico-teológico de ''consignarentur'' y coincide con el audit trail inglés. En español es la forma más transparente para el acto de sellar.'
- source_word: qui ... fidem
  english_pob_choice: those who have stored up faith
  chosen_spanish: los que han guardado la fe
  alternatives_spanish:
  - los que han atesorado la fe
  - los que han preservado la fe
  lexicon: fides
  rationale: La expresión latina admite una idea de conservar o guardar en depósito. 'Han guardado la fe' mantiene la fuerza de custodia fiel sin introducir una metáfora más específica de la que el texto garantiza.
theological_decisions:
- issue: Secuencia temporal con 'antes de que' gobernando todas las cláusulas
  english_pob_reading: and before ... and before ... and before those who have stored up faith were sealed—
  chosen_spanish_reading: y antes de que ... y antes de que ... y antes de que ...
  alternative_spanish_readings:
  - y antes de que ... y los que han guardado la fe fueron sellados—
  - y antes de que ... y antes de que ... y los que han guardado la fe fueran sellados—
  rationale: 'La revisión inglesa restablece que la última cláusula también depende de ''before''. En español, repetir ''antes de que'' conserva esa subordinación temporal y la relación teológica: el sellamiento de los fieles ocurre antes del orden presente.'
  doctrine_reference: Providencia divina; elección y preservación previas a la creación en la tradición de 2 Esdras
- issue: Tensión entre 'faith' como fe objetiva/depósito y como fidelidad
  english_pob_reading: those who have stored up faith
  chosen_spanish_reading: los que han guardado la fe
  alternative_spanish_readings:
  - los que han atesorado la fe
  - los que han guardado fidelidad
  rationale: '''La fe'' mantiene la ambigüedad heredada del latín y del inglés POB. En español, ''guardado la fe'' conserva tanto la idea de conservar un depósito como la de perseverar en fidelidad, sin resolver artificialmente la tensión.'
  doctrine_reference: Fidelidad perseverante y preservación de los justos
translation_notes:
  revision_awareness: El inglés revisado corrigió la gramática para repetir 'before' en la cláusula final; la versión española refleja esa misma subordinación temporal para no perder el sentido de anterioridad absoluta del sellamiento.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' solo cuando aparezca el nombre divino explícito; aquí no aparece.
  - '''Sellados'' se mantiene para conservar la terminología técnica de la elección/preservación.'
  - La cláusula final permanece subordinada a 'antes de que' para alinear el español con la revisión inglesa y la sintaxis latina.
