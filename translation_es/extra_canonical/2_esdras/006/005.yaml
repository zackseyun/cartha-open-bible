review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la secuencia temporal latina con la repetición de «antes de que» en las tres cláusulas y preserva el cambio inglés ya auditado en la última cláusula. «Fueran sellados» para consignarentur y «los que han guardado la fe» para theologically cargado 'stored up faith' son defendibles. Sin embargo, «fueran apartados los designios» no refleja con suficiente naturalidad ni precisión la relación de abalienarentur con adinventiones; en español suena forzado y semánticamente opaco. Además, la nota al pie actual no corresponde al punto de variación documentado en el inglés POB.
  spanish_quality_summary: El español es mayormente claro y digno, pero «los años presentes» suena algo calcado aunque aceptable; el problema principal es «fueran apartados los designios», que resulta poco idiomático. La nota al pie debe rehacerse para reflejar la alternativa de segmentación/alcance del texto inglés auditado, no repetir simplemente el mismo orden con «antes de que».
  glossary_alignment: No hay conflicto con los términos de proyecto principales. «La fe», «sellados» y la subordinación temporal están bien alineadas. Se recomienda ajustar solo la frase sobre adinventiones para una opción más legible y fiel en español.
  issues:
  - severity: medium
    issue: «fueran apartados los designios» es una formulación poco natural y semánticamente débil para «abalienarentur ... adinuentiones».
    rationale: El latín apunta a una separación/extrañamiento de las maquinaciones o artificios de los que ahora pecan. En español, «apartar designios» suena extraño; «fueran alejadas las maquinaciones» o similar comunica mejor la idea sin calco tosco.
  - severity: medium
    issue: La nota [a] no refleja la alternativa documentada en el audit trail inglés.
    rationale: 'La nota inglesa conserva una variante de alcance: «Or ''and those who have stored up faith were sealed—''». La nota española actual dice «y antes de que los que han guardado la fe fueran sellados—», que no presenta la alternativa real sino una mera reordenación equivalente.'
  revised_spanish_text: y antes de que fueran examinados los años presentes, y antes de que fueran alejadas las maquinaciones de los que ahora pecan, y antes de que fueran sellados los que han guardado la fe[a]—
  revised_footnotes:
  - marker: a
    text: 'O: «y los que han guardado la fe fueron sellados—».'
    reason: Refleja la alternativa documentada en la nota inglesa previa, donde la última cláusula puede leerse sin la subordinación repetida de «antes de que».
  revision_rationale: Se corrige una frase poco idiomática («apartados los designios») por una formulación más clara y fiel («alejadas las maquinaciones») y se reemplaza la nota para que corresponda a la variante real preservada en el audit trail inglés. Se elimina el marcador del primer sintagma porque no había una nota válida allí.
