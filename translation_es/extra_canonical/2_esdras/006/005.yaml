revisions:
- from: y antes de que fueran examinados los años presentes[a], y antes de que fueran apartados los designios de los que ahora pecan, y antes de que fueran sellados los que han guardado la fe—
  to: y antes de que fueran examinados los años presentes, y antes de que fueran alejadas las maquinaciones de los que ahora pecan, y antes de que fueran sellados los que han guardado la fe[a]—
  rationale: Se corrige una frase poco idiomática («apartados los designios») por una formulación más clara y fiel («alejadas las maquinaciones») y se reemplaza la nota para que corresponda a la variante real preservada en el audit trail inglés. Se elimina el marcador del primer sintagma porque no había una nota válida allí.
