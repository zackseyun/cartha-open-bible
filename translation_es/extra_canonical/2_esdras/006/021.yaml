base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/021.yaml
  text: And year-old infants will speak with their voices[6:21], and pregnant women will give birth to premature infants of three and four months[a], and they will live.
  footnotes:
  - marker: '6:21'
    text: The verb rendered 'leap about' comes from a difficult Latin form; the sense is that these prematurely born children nevertheless live and move actively.
    reason: lexical_alternative
  - marker: a
    text: Or 'premature children'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:50Z'
    unchanged: false
    changes_summary: Removed 'and leap about,' which is not present in the provided Latin. Retained the rest with only the source-supported content.
translation:
  language: es
  text: Y los infantes de un año hablarán con sus propias voces[a], y las embarazadas darán a luz infantes prematuros de tres y cuatro meses[b], y vivirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testimonios de la tradición latina presentan aquí una cláusula adicional que puede interpretarse como «y saltarán» o «y se moverán activamente», aludiendo al vigor de los infantes prematuros a pesar de nacer antes de tiempo. Esa lectura no está presente en el texto latino de base empleado por esta edición (Bensly 1895) y fue suprimida del texto principal en la revisión del POB inglés.
    reason: textual_variant
  - marker: b
    text: O «criaturas prematuras».
    reason: lexical_alternative
lexical_decisions:
- source_word: anniculi
  english_pob_choice: year-old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - anuales
  lexicon: 'Lewis & Short: anniculus, adj. — ''a year old''; diminutive/affective form of annicus'
  rationale: El latín anniculi es un adjetivo que significa literalmente 'de un año de edad'. La locución española 'de un año' es precisa, natural y no introduce matices ajenos al original. 'Anuales' sería posible pero evoca periodicidad más que edad.
- source_word: infantes (both occurrences)
  english_pob_choice: infants
  chosen_spanish: infantes
  alternatives_spanish:
  - bebés
  - criaturas
  - niños
  lexicon: 'Lewis & Short: infans, -antis — ''one who cannot speak; infant, babe''; used substantively'
  rationale: El latín repite infantes dos veces (anniculi infantes y immaturos… infantes). La revisión del POB inglés explícitamente mantuvo la consistencia léxica usando 'infants' para ambas. El español 'infantes' reproduce ese eco léxico con fidelidad; además es el término más propio y digno para un texto sagrado. 'Bebés' sería demasiado coloquial; 'criaturas' difumina el paralelo.
- source_word: loquentur uocibus suis
  english_pob_choice: will speak with their voices
  chosen_spanish: hablarán con sus propias voces
  alternatives_spanish:
  - hablarán con sus voces
  - pronunciarán palabras con sus voces
  lexicon: 'Lewis & Short: loquor, 3 — ''to speak, say, tell''; uox, uocis — ''voice''; suis — reflexive possessive, ''their own'''
  rationale: 'El ablativo uocibus suis expresa el medio y añade el posesivo reflexivo suis. ''Con sus propias voces'' captura ambos elementos: el instrumento (voces) y el énfasis en que la voz les pertenece a los propios infantes, lo cual subraya la naturaleza prodigiosa del signo escatológico.'
- source_word: praegnantes
  english_pob_choice: pregnant women
  chosen_spanish: las embarazadas
  alternatives_spanish:
  - las mujeres embarazadas
  - las preñadas
  lexicon: 'Lewis & Short: praegnans, -antis — ''with child, pregnant''; used as substantive feminine plural'
  rationale: El latín usa el adjetivo sustantivado praegnantes (femenino plural). En español 'las embarazadas' es la forma sustantivada equivalente, fluida y ampliamente inteligible. 'Las mujeres embarazadas' es igualmente correcto pero más redundante; 'las preñadas' es latinizante y de registro informal hoy.
- source_word: immaturos
  english_pob_choice: premature
  chosen_spanish: prematuros
  alternatives_spanish:
  - inmaduros
  - no desarrollados
  lexicon: 'Lewis & Short: immaturus, adj. — ''not ripe, unripe; premature'''
  rationale: El latín immaturus significa literalmente 'no maduro/no sazonado'. En contexto de nacimientos, el español 'prematuro' (< latín praematurus) es el término técnico estándar y de uso corriente, completamente transparente. 'Inmaduros' sería más literal al morfema latino pero puede sonar extraño referido a bebés en español moderno.
- source_word: uiuent
  english_pob_choice: they will live
  chosen_spanish: vivirán
  alternatives_spanish:
  - seguirán con vida
  - sobrevivirán
  lexicon: 'Lewis & Short: uiuo, 3 — ''to live, be alive'''
  rationale: El futuro simple uiuent se traduce directamente como 'vivirán'. 'Sobrevivirán' añadiría un matiz de supervivencia contra las circunstancias (que está implícito en el contexto) pero que el latín no verbaliza; se evita para no parafrasear más allá de lo que el texto autoriza.
theological_decisions:
- issue: 'Prodigios escatológicos: infantes prematuros que viven'
  english_pob_reading: And year-old infants will speak with their voices, and pregnant women will give birth to premature infants of three and four months, and they will live.
  chosen_spanish_reading: Y los infantes de un año hablarán con sus propias voces, y las embarazadas darán a luz infantes prematuros de tres y cuatro meses, y vivirán.
  alternative_spanish_readings:
  - y vivirán y se moverán activamente (tradición textual alternativa que incluye movimiento activo)
  rationale: Este versículo forma parte de la lista de señales escatológicas de 4 Esdras/2 Esdras. La tensión teológica principal es si el texto original incluía una cláusula sobre el movimiento activo ('y saltarán') de los infantes prematuros. La revisión del POB inglés eliminó 'and leap about' por no estar presente en el latín de base utilizado (Bensly 1895). La traducción española sigue fielmente esta decisión auditada, sin añadir el movimiento activo al texto principal. La nota [a] preserva la transparencia sobre la tradición alternativa.
  doctrine_reference: 4 Ezra / 2 Esdras 6:21 — portenta escatológica; cf. variantes textuales latinas del Missing Fragment de Bensly 1875
translation_notes:
  revision_awareness: 'La revisión del POB inglés (2026-04-23) eliminó la frase «and leap about» del texto principal por no estar respaldada por el latín de Bensly 1895 proporcionado. La revisión anterior (2026-04-22) también estableció que infantes debía usarse consistentemente para ambas apariciones del latín infantes en el versículo. Ambas decisiones se reflejan en el borrador español: se omite cualquier equivalente de «saltar» en el texto principal y se usa «infantes» en las dos apariciones.'
  spanish_consistency_notes:
  - Se usa 'infantes' para las dos apariciones del latín infantes (anniculi infantes e immaturos… infantes), siguiendo la decisión de consistencia léxica documentada en la revisión del POB inglés.
  - Se usa 'prematuros' para el latín immaturos en contexto de nacimiento, que es el término español estándar para partos antes de término.
  - No aparece ningún término teológico del glosario del proyecto (Yahvé, Mesías, Espíritu, etc.) en este versículo; no aplican las normas terminológicas generales del proyecto.
  - El tiempo futuro del latín (loquentur, parient, uiuent) se traslada coherentemente al futuro simple español (hablarán, darán a luz, vivirán), preservando el carácter profético-escatológico de las señales.
