    rationale: Aunque formalmente posible, en español «los tuyos» suele entenderse como personas cercanas o un conjunto definido, mientras que el latín aquí queda elíptico y abierto. «De lo tuyo» preserva mejor la posesión sin implicar personas ni añadir contenido no expreso.
