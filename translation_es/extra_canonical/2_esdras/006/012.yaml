revisions:
- from: 'de los tuyos[a], de los cuales me mostraste una parte en la noche anterior.” Y él respondió y me dijo: “Ponte de pie, y oirás”'
  to: 'de lo tuyo[a], de lo que me mostraste una parte en la noche anterior.” Y él respondió y me dijo: “Ponte de pie, y oirás”'
  rationale: Se ajusta la primera frase para reflejar mejor la elipsis posesiva amplia de tuorum en español natural, evitando la posible lectura personalizante de «los tuyos». Se conserva en nota la alternativa más literal/plural, ya que el latín genitivo plural permite esa superficie, pero el contexto fragmentario en español suena mejor con «lo tuyo». No se requieren cambios en la segunda mitad del versículo.
