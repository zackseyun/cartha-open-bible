lexical_decisions:
- source_word: tuorum
  english_pob_choice: of yours
  chosen_spanish: de los tuyos
  alternatives_spanish:
  - de lo tuyo
  - de tus cosas
  - tuyo
  lexicon: Latin tuorum (genitive plural of tuus)
  rationale: El latín solo expresa posesión en plural; «de los tuyos» conserva esa relación posesiva sin añadir términos como «siervo» o «señales», que no están en este segmento de 6:12.
- source_word: quorum ex parte
  english_pob_choice: of which ... a part
  chosen_spanish: de los cuales ... una parte
  alternatives_spanish:
  - de los que ... una parte
  - de los cuales ... algo
  - de ellas ... una parte
  lexicon: Latin quorum ex parte
  rationale: «Quorum» mantiene referencia plural anafórica; en español «de los cuales» reproduce esa dependencia. «Una parte» sigue fielmente ex parte, sin intensificar ni explicar el contenido implícito.
- source_word: mihi demonstrasti
  english_pob_choice: you showed me
  chosen_spanish: me mostraste
  alternatives_spanish:
  - me enseñaste
  - me hiciste ver
  lexicon: Latin demonstrare
  rationale: En este contexto el verbo es visual/revelatorio más que didáctico; «me mostraste» es natural y preciso, y evita introducir el matiz de instrucción de «enseñar».
- source_word: nocte praeterita
  english_pob_choice: in the previous night
  chosen_spanish: en la noche anterior
  alternatives_spanish:
  - la noche pasada
  - en la noche previa
  lexicon: Latin praeterita nocte
  rationale: «Praeterita» se expresa con «anterior» o «previa»; «la noche anterior» suena más idiomático en español bíblico moderno que «la noche pasada» y conserva la relación temporal.
- source_word: surge super pedes tuos
  english_pob_choice: Stand on your feet
  chosen_spanish: Ponte de pie
  alternatives_spanish:
  - Párate sobre tus pies
  - Levántate y ponte de pie
  lexicon: Latin surgere + super pedes
  rationale: La orden es ponerse en posición erguida. «Ponte de pie» comunica la acción de forma natural en español y mantiene la fuerza imperativa sin calcar innecesariamente «sobre tus pies».
- source_word: audies
  english_pob_choice: you will hear
  chosen_spanish: oirás
  alternatives_spanish:
  - escucharás
  - oirás algo
  lexicon: Latin audire
  rationale: «Oír» corresponde directamente a audire. Aquí no se especifica el objeto de la audición, así que se deja simplemente «oirás».
theological_decisions:
- issue: Referencia implícita a signos/visión previa omitida por corrección textual
  english_pob_reading: The corrected English follows the Latin of 6:12 only and does not import the earlier phrase about 'your signs'.
  chosen_spanish_reading: El español evita añadir «señales» o «signos» y se limita a «de los tuyos», siguiendo el segmento latino provisto.
  alternative_spanish_readings:
  - de tus signos
  - de tus señales
  rationale: La revisión del expediente indica que la frase sobre signos pertenece al contexto anterior y no debe reintroducirse en 6:12. Mantener la referencia genérica evita una expansión no sustentada por el texto recibido.
  doctrine_reference: Principio de fidelidad textual y delimitación de perícope
translation_notes:
  revision_awareness: 'El expediente muestra una corrección importante: la redacción inglesa anterior mezclaba material de 6:11 con 6:12. La versión española sigue únicamente el texto latino limpio de 6:12 e integra la segunda mitad omitida: «Y él respondió y me dijo: Ponte de pie, y oirás».'
  spanish_consistency_notes:
  - 'Se mantiene el trato directo singular con verbos en segunda persona singular: «mostraste», «Ponte», «oirás».'
  - Se evita «SEÑOR» o cualquier máscara divina porque este versículo no contiene el tetragrámaton ni κύριος divino en el texto fuente proporcionado.
  - Se conserva un registro bíblico formal pero idiomático, sin calcos como «sobre tus pies».
  - La nota [a] está anclada directamente en «de los tuyos» y ofrece una alternativa española posible sin introducir contenido ajeno.
