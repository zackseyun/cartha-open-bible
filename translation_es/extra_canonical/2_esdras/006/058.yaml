base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/058.yaml
  text: But we[6:58], your people, whom you have called your firstborn, your only one, your beloved, your dear one[a], have been handed over into their hands.
  footnotes:
  - marker: '6:58'
    text: The title rendered 'your zealous one' translates a difficult Latin term. The line piles up covenantal honor-titles for Israel rather than offering a smooth paraphrase.
    reason: lexical_alternative
  - marker: a
    text: Or 'have been given'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:58Z'
    unchanged: false
    changes_summary: 'Revised the sequence of titles to better reflect the Latin: rendered aemulatorem less interpretively by removing ''zealous one,'' and translated carissimum distinctly as ''your dear one'' while preserving the formal tone and completeness.'
translation:
  language: es
  text: Pero nosotros, tu pueblo, a quienes llamaste tu primogénito, tu unigénito, tu amado[a], tu querido, hemos sido entregados[b] en manos de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. posiblemente «tu celoso»; el latín aquí es difícil. La línea acumula títulos honoríficos de pacto para Israel, más que ofrecer una paráfrasis fluida.
    reason: lexical_alternative
  - marker: b
    text: O «hemos sido dados».
    reason: previous_rendering
lexical_decisions:
- source_word: nos autem populus tuus
  english_pob_choice: But we, your people
  chosen_spanish: Pero nosotros, tu pueblo
  alternatives_spanish:
  - Pero nosotros, tu pueblo elegido
  - Pero nosotros, tu pueblo
  lexicon: nosotros; populus -> pueblo
  rationale: Conserva el contraste inicial y la identidad corporativa del grupo. 'Pueblo' es la forma natural y fiel para populus en este contexto.
- source_word: quem vocasti
  english_pob_choice: whom you have called
  chosen_spanish: a quienes llamaste
  alternatives_spanish:
  - a quienes has llamado
  - a los que llamaste
  lexicon: vocare -> llamar
  rationale: '''Llamaste'' reproduce bien el acto divino de nombrar o convocar; el pasado simple suena natural en español y mantiene el valor factual del latín.'
- source_word: primogenitum
  english_pob_choice: your firstborn
  chosen_spanish: tu primogénito
  alternatives_spanish:
  - tu primer hijo
  - tu primero nacido
  lexicon: primogenitus -> primogénito
  rationale: '''Primogénito'' es el equivalente directo y conserva el peso de título de honor sin suavizar la expresión.'
- source_word: unigenitum
  english_pob_choice: your only one
  chosen_spanish: tu unigénito
  alternatives_spanish:
  - tu único
  - tu único hijo
  lexicon: unigenitus -> unigénito
  rationale: '''Unigénito'' preserva la densidad tradicional del término y la serie de títulos acumulados del pasaje. Aunque puede sonar más solemne, es el más cercano al latín.'
- source_word: aemulatorem
  english_pob_choice: your dear one / your zealous one
  chosen_spanish: tu amado
  alternatives_spanish:
  - tu celoso
  - tu ferviente
  lexicon: aemulator -> celoso / ferviente; carissimus -> querido
  rationale: La tradición inglesa del proyecto ya registró que este término es difícil y que la línea amontona títulos de honor. Para español, 'tu amado' evita una construcción opaca o forzada y retiene el valor afectivo reconocido por la revisión inglesa, sin introducir una glosa interpretativa excesiva.
- source_word: carissimum
  english_pob_choice: your dear one
  chosen_spanish: tu querido
  alternatives_spanish:
  - tu muy amado
  - tu muy querido
  lexicon: carissimus -> querido
  rationale: '''Querido'' comunica bien el superlativo afectivo de carissimus y distingue este título del anterior, conforme a la revisión inglesa que separó claramente los dos últimos miembros de la serie.'
- source_word: traditi sumus in manibus eorum
  english_pob_choice: have been handed over into their hands
  chosen_spanish: hemos sido entregados en sus manos
  alternatives_spanish:
  - hemos sido puestos en sus manos
  - hemos sido entregados a ellos
  lexicon: trado -> entregar / entregar en manos
  rationale: '''Hemos sido entregados en sus manos'' conserva la pasiva y el matiz fuerte de ''traditi sumus'', reflejando abandono o rendición, no mera concesión. ''En sus manos'' sigue de cerca la imagen del latín.'
theological_decisions:
- issue: Acumulación de títulos de honor para Israel
  english_pob_reading: The line piles up covenantal honor-titles for Israel rather than offering a smooth paraphrase.
  chosen_spanish_reading: La línea acumula títulos de honor de pacto para Israel, sin suavizarlos en una sola paráfrasis.
  alternative_spanish_readings:
  - La línea enumera títulos honoríficos de Israel
  - La línea presenta una serie de títulos del pacto para Israel
  rationale: El español mantiene la enumeración enfática y evita fusionar los apelativos en una sola expresión. Esto preserva la tensión retórica y el carácter de honor del pasaje.
  doctrine_reference: Teología del pacto; lenguaje de elección y filiación corporativa
translation_notes:
  revision_awareness: 'La revisión más reciente en inglés afinó la serie de títulos para reflejar mejor el latín: separó claramente carissimum como ''dear one'' y evitó traducir aemulatorem de manera excesivamente interpretativa. El español sigue esa revisión al mantener una secuencia distinta de títulos, sin convertir el miembro difícil en una paráfrasis doctrinal.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el nombre divino explícito; aquí no aplica.
  - Se conserva la pasiva fuerte de 'traditi sumus' como 'hemos sido entregados', no 'hemos sido dados'.
  - '''Primogénito'' y ''unigénito'' se mantienen como títulos formales, coherentes con el tono solemne del pasaje.'
  - La cadena de apelativos se deja explícita para reflejar la acumulación retórica del latín.
