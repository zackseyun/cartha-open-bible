base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/030.yaml
  text: And he said to me[a], “I have come to show you these things tonight.”
  footnotes:
  - marker: a
    text: Or 'and in the coming night.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:52Z'
    unchanged: false
    changes_summary: Revised the awkward phrase “these things, this coming night” to the natural and accurate “these things tonight,” which better reflects the Latin *haec veni tibi ostendere et venturae nocti* without unnecessary literalism.
translation:
  language: es
  text: 'Y me dijo[a]: «He venido a mostrarte estas cosas esta noche».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la noche que viene».
    reason: alternative_reading
lexical_decisions:
- source_word: dixit ad me
  english_pob_choice: And he said to me
  chosen_spanish: Y me dijo
  alternatives_spanish:
  - Y me habló
  - Y me respondió
  lexicon: dicere
  rationale: El latín presenta una fórmula narrativa simple de habla directa; «me dijo» reproduce con naturalidad la relación directa sin añadir matices no presentes en el texto.
- source_word: haec
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas cosas estas
  lexicon: hic/haec/hoc
  rationale: El plural neutro se refleja mejor con «estas cosas», manteniendo la deixis y el alcance múltiple del contenido mostrado.
- source_word: veni ... ostendere
  english_pob_choice: I have come to show
  chosen_spanish: He venido a mostrarte
  alternatives_spanish:
  - Vengo a mostrarte
  - He llegado para mostrarte
  lexicon: venire + ostendere
  rationale: «He venido» conserva el valor perfectivo de llegada/presencia del latín, y «a mostrarte» expresa con claridad el infinitivo de finalidad.
- source_word: venturae nocti
  english_pob_choice: tonight
  chosen_spanish: esta noche
  alternatives_spanish:
  - en la noche que viene
  - en esta noche venidera
  lexicon: nox
  rationale: Sigo la revisión del POB inglés que entendió la expresión corrupta como una referencia temporal equivalente a «tonight». En español, «esta noche» es la forma más natural y fiel al sentido temporal emendado.
theological_decisions:
- issue: Tratamiento de la expresión textual corrupta sobre el tiempo
  english_pob_reading: I have come to show you these things tonight.
  chosen_spanish_reading: He venido a mostrarte estas cosas esta noche.
  alternative_spanish_readings:
  - He venido a mostrarte estas cosas en la noche venidera.
  - He venido a mostrarte estas cosas en la noche que viene.
  rationale: El audit trail inglés registra que el latín transmitido parece corrompido y que la lectura emendada apunta a una referencia inmediata de tiempo. La traducción española adopta la lectura revisada y natural sin forzar el fragmento corrupto.
  doctrine_reference: criterio textual de emendación y lectura contextual
- issue: Conservar la inmediatez temporal frente a una literalidad confusa
  english_pob_reading: tonight
  chosen_spanish_reading: esta noche
  alternative_spanish_readings:
  - la noche que viene
  - en la noche de hoy
  rationale: «Esta noche» mantiene la inmediatez y evita introducir ambigüedad innecesaria. No se conserva un «y» reflejando el latín corrupto, porque el propio aparato inglés lo corrigió por motivos textuales.
  doctrine_reference: principio de claridad textual y equivalencia óptima
translation_notes:
  revision_awareness: El texto latino transmitido, «et venturae nocti», fue evaluado en el audit trail inglés como una corrupción de una forma equivalente a «hac ventura nocte»; por eso el inglés revisó de «and in the coming night» a «tonight». La versión española sigue esa decisión revisada y evita una traducción mecánica del «et» corrupto.
  spanish_consistency_notes:
  - Se usa «estas cosas» para preservar el plural neutro de haec.
  - Se mantiene «esta noche» como equivalencia natural del valor temporal revisado.
  - La puntuación de cita directa sigue el español moderno con dos puntos y comillas angulares.
  - No se introduce terminología eclesiástica ajena al latín breve del pasaje.
