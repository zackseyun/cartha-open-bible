source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: quoniam auditu audita est vox tua apud Altissimum. vidit enim Fortis directionem tuam et providit pudicitiam quam a iuventute tua habuisti.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/032.yaml
  text: For your voice has indeed been heard before the Most High; for the Mighty One has seen your conduct and has taken note of the purity that you have had from your youth.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:53Z'
    unchanged: false
    changes_summary: Changed 'surely' to 'indeed' for a more formal rendering of auditu audita est, and revised 'uprightness' to 'conduct' to better reflect directionem in this context.
translation:
  language: es
  text: Porque en verdad tu voz ha sido oída delante del Altísimo; porque el Poderoso ha visto tu conducta y ha tenido en cuenta la pureza que has tenido desde tu juventud.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: auditu audita est vox tua apud Altissimum
  english_pob_choice: your voice has indeed been heard before the Most High
  chosen_spanish: tu voz ha sido oída delante del Altísimo
  alternatives_spanish:
  - tu voz ha sido escuchada delante del Altísimo
  - tu voz ha sido oída ante el Altísimo
  lexicon: audire -> oír; apud -> delante de / ante
  rationale: Conservo el matiz pasivo de "ha sido oída" para reflejar la fuerza del latín. "Delante del Altísimo" comunica con naturalidad el valor espacial/relacional de apud sin volverlo innecesariamente idiomático.
- source_word: Fortis
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Todopoderoso
  lexicon: fortis -> fuerte, poderoso
  rationale: '"Poderoso" reproduce bien la referencia divina y suena natural en español bíblico sin borrar la fuerza del original latino.'
- source_word: directionem tuam
  english_pob_choice: your conduct
  chosen_spanish: tu conducta
  alternatives_spanish:
  - tu dirección
  - tu proceder
  - tu manera de actuar
  lexicon: directio -> dirección, rumbo, conducta
  rationale: Sigo la revisión inglesa que entendió directionem aquí como "conduct", porque en este contexto el sentido no es geométrico sino moral/conductual. "Conducta" es la forma más clara en español.
- source_word: pudicitiam
  english_pob_choice: the purity
  chosen_spanish: la pureza
  alternatives_spanish:
  - la castidad
  - la modestia
  - la limpieza
  lexicon: pudicitia -> pureza, castidad, recato
  rationale: '"Pureza" mantiene el valor amplio y digno del término, sin reducirlo solo a castidad sexual.'
- source_word: a iuventute tua habuisti
  english_pob_choice: you have had from your youth
  chosen_spanish: has tenido desde tu juventud
  alternatives_spanish:
  - has poseído desde tu juventud
  - has conservado desde tu juventud
  lexicon: habere -> tener; iuventus -> juventud
  rationale: La construcción española natural es "has tenido desde tu juventud"; conserva continuidad temporal y evita una paráfrasis excesiva.
theological_decisions:
- issue: Referente divino de "Altissimus" y "Fortis"
  english_pob_reading: before the Most High; the Mighty One
  chosen_spanish_reading: delante del Altísimo; el Poderoso
  alternative_spanish_readings:
  - ante el Altísimo; el Fuerte
  - delante del Dios Altísimo; el Todopoderoso
  rationale: Mantengo títulos reverenciales que reflejan el latín y la tradición bíblica sin introducir una glosa interpretativa adicional. "Altísimo" y "Poderoso" preservan la referencia a Dios con lenguaje sobrio.
  doctrine_reference: Lenguaje reverencial para Dios en textos bíblicos; cf. uso bíblico de Altísimo/Poderoso.
translation_notes:
  revision_awareness: La revisión inglesa cambió "surely" por "indeed" y ajustó "uprightness" a "conduct". La versión española sigue esa decisión al evitar "rectitud" o "honradez" y usar "conducta", mientras traduce auditu audita est con un énfasis formal compatible con "en verdad".
  spanish_consistency_notes:
  - Se usa "Altísimo" y "Poderoso" para mantener consistencia con títulos divinos reverenciales en español.
  - Se evita "Cristo" u otra terminología cristológica, porque el versículo no la contiene.
  - '"Pureza" se mantiene como sustantivo amplio, no como especificación moral estrecha, para no exceder el latín.'
