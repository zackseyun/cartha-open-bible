translation:
  language: es
  text: y la verdad, que ha sido infructuosa por tanto tiempo, será revelada.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ueritas
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la verdad
  - la verdad de Dios
  lexicon: veritas
  rationale: El latín veritas se traduce de manera directa y natural como «la verdad». No hay en el texto base un modificador que exija explicitar «de Dios».
- source_word: sine fructu fuit
  english_pob_choice: has been fruitless
  chosen_spanish: ha estado sin fruto
  alternatives_spanish:
  - ha sido infructuosa
  - ha sido estéril
  - ha estado sin fruto
  lexicon: sine fructu / fructus
  rationale: La idea central es la carencia de fruto. En español, «ha estado sin fruto» conserva la imagen literal y el matiz de una condición prolongada. Se evita «infructuosa» por sonar más abstracta y menos imagética.
- source_word: tantis temporibus
  english_pob_choice: for so long
  chosen_spanish: por tanto tiempo
  alternatives_spanish:
  - durante tanto tiempo
  - por tantos tiempos
  - por tanto tiempo
  lexicon: tantis temporibus
  rationale: La expresión latina señala duración extendida. «Por tanto tiempo» es una fórmula clara, natural y fiel al sentido temporal del original y del audit trail en inglés.
- source_word: ostendebitur
  english_pob_choice: will be revealed
  chosen_spanish: será revelada
  alternatives_spanish:
  - será manifestada
  - será dada a conocer
  lexicon: ostendo
  rationale: El pasivo futuro de ostenditur/ostendebitur expresa que la verdad pasará a estar visible. «Será revelada» mantiene esa pasividad y el matiz de desocultamiento que la POB inglesa también documenta.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente desplazó una frase más pesada («without fruit for so long a time») a una forma más natural pero todavía literal («fruitless for so long»). El español sigue esa misma línea: conserva la duración y la imagen de carencia de fruto sin añadir explicaciones interpretativas.'
  spanish_consistency_notes:
  - Se mantiene «verdad» sin ampliar a «verdad de Dios» porque el contexto latino no lo exige.
  - «Será revelada» conserva el pasivo futuro y evita una reescritura activa.
  - El registro es sobrio y publicable, sin calco rígido ni paráfrasis extensa.
