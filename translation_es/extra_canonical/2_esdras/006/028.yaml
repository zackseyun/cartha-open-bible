- from: y la verdad, que ha estado sin fruto por tanto tiempo, será revelada.”
  to: y la verdad, que ha sido infructuosa por tanto tiempo, será revelada.”
  rationale: Se sustituye «ha estado sin fruto» por «ha sido infructuosa» para expresar de manera más natural y fiel en español el sentido de «sine fructu fuit» / «has been fruitless», manteniendo el matiz de falta prolongada de fruto o resultado.
  reviewer_model: gpt-5.4
