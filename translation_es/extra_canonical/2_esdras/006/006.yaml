- from: Entonces consideré, y estas cosas fueron hechas por mí y no por otro, así también el fin será por mí y no por otro.”
  to: Entonces consideré, y estas cosas fueron hechas por medio de mí y no por otro, así también el fin será por medio de mí y no por otro.”
  rationale: Se ajusta «por mí» a «por medio de mí» en ambas cláusulas para representar con más fidelidad el latín «per me», en línea con el inglés auditado «through me», y para mejorar la naturalidad del español sin alterar el sentido teológico de agencia exclusiva.
