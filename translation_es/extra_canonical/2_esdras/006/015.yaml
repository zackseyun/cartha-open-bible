base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/015.yaml
  text: do not be terrified, because the word concerns the end, and the foundations of the earth will tremble and be shaken, because the discourse is about them.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:50Z'
    unchanged: false
    changes_summary: Removed 'when it speaks' as unsupported by the source; rendered both clauses introduced by 'quoniam'; replaced 'will understand it' with 'will tremble and be shaken' to reflect 'tremescet et commoue-' and completed the final clause 'because the discourse is about them.'
translation:
  language: es
  text: No te aterres, porque la palabra se refiere al fin, y los fundamentos de la tierra temblarán y serán sacudidos, porque el discurso trata de ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: expauescas
  english_pob_choice: do not be terrified
  chosen_spanish: No te turbes
  alternatives_spanish:
  - No te aterres
  - No tengas miedo
  lexicon: expauesco
  rationale: El latin expresa sobresalto o terror; en español, «turbarse» comunica bien la perturbación interior sin sonar demasiado explicativo. Mantiene el tono exhortativo directo del texto.
- source_word: de fine uerbum
  english_pob_choice: the word concerns the end
  chosen_spanish: la palabra se refiere al fin
  alternatives_spanish:
  - la palabra trata del fin
  - la palabra concierne al fin
  lexicon: verbum
  rationale: «Se refiere al» reproduce con naturalidad la relación temática indicada por de fine, sin añadir una interpretación más fuerte que el latín.
- source_word: fundamenta terrae
  english_pob_choice: the foundations of the earth
  chosen_spanish: los fundamentos de la tierra
  alternatives_spanish:
  - los cimientos de la tierra
  - las bases de la tierra
  lexicon: fundamenta
  rationale: «Fundamentos» conserva el registro bíblico y la imagen cósmica del latín. «Cimientos» sería posible, pero suena más arquitectónico que poético.
- source_word: tremescet et commoue-
  english_pob_choice: will tremble and be shaken
  chosen_spanish: temblarán y serán sacudidos
  alternatives_spanish:
  - temblarán y se conmoverán
  - estremecerán y serán removidos
  lexicon: tremesco / commoveo
  rationale: 'Se conservan dos verbos distintos para reflejar la duplicación del original: uno para el temblor y otro para el sacudimiento. «Serán sacudidos» mantiene la pasiva de sentido del latín.'
- source_word: de ipsis sermo
  english_pob_choice: because the discourse is about them
  chosen_spanish: porque el discurso trata de ellos
  alternatives_spanish:
  - porque se habla de ellos
  - porque el discurso es sobre ellos
  lexicon: sermo
  rationale: «Discurso» sigue la lectura inglesa y mantiene el matiz de contenido hablado; «trata de ellos» expresa de forma idiomática el valor de de ipsis sermo sin forzar una personificación.
theological_decisions:
- issue: Alcance de la exhortación y del tema del «verbum/sermo»
  english_pob_reading: do not be terrified, because the word concerns the end ... because the discourse is about them.
  chosen_spanish_reading: No te turbes, porque la palabra se refiere al fin ... porque el discurso trata de ellos.
  alternative_spanish_readings:
  - No te aterres, porque la palabra habla del fin ... porque se habla de ellos.
  - No te turbes, porque la palabra concierne al fin ... porque el discurso es sobre ellos.
  rationale: La fuente latina presenta dos cláusulas causales con quoniam; la traducción española las conserva explícitamente. No se introduce una interpretación doctrinal adicional sobre el contenido del fin más allá de lo que el texto afirma.
  doctrine_reference: Eschatology / causal structure of the verse
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó «when it speaks», que no está respaldado por el latín; además corrigió «will understand it» a «will tremble and be shaken» y completó la segunda causal con «because the discourse is about them». La propuesta española sigue esa lectura revisada y refleja ambas cláusulas causales.
  spanish_consistency_notes:
  - Se mantiene «fin» para fine, evitando explicitar «fin de los tiempos» sin base textual.
  - Se usa «discurso» para sermo, coherente con la revisión inglesa y suficientemente neutral en español.
  - Se conserva una estructura paralela con dos causas introducidas por «porque» para reproducir el latín.
