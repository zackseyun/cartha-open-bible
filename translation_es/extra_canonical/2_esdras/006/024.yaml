revisions:
- from: 'Y sucederá en aquel tiempo: los amigos harán guerra contra amigos como enemigos[a], y la tierra se aterrorizará junto con los que habitan en ella, y los canales de las fuentes se detendrán para no correr por tres horas.'
  to: 'Y sucederá en aquel tiempo: los amigos harán guerra contra amigos como enemigos[a], y la tierra se aterrorizará junto con los que habitan en ella, y los canales de las fuentes quedarán detenidos, sin correr durante tres horas.'
  rationale: Se conserva el sentido del original y del POB inglés, pero se mejora la naturalidad del español en la cláusula final para expresar con claridad que el flujo de las fuentes cesará por tres horas. La nota existente puede mantenerse porque refleja la alternativa previamente documentada sobre el valor de cum.
