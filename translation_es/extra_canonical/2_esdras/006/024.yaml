translation:
  language: es
  text: 'Y sucederá en aquel tiempo: los amigos harán guerra contra amigos como enemigos[a], y la tierra se aterrorizará junto con los que habitan en ella, y los canales de las fuentes quedarán detenidos, sin correr durante tres horas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se aterrorizará con los que habitan en ella».'
    reason: alternative_reading
lexical_decisions:
- source_word: debellabunt amici amicos ut inimici
  english_pob_choice: friends will make war on friends like enemies
  chosen_spanish: los amigos harán guerra contra amigos como enemigos
  alternatives_spanish:
  - los amigos guerrearán contra amigos como enemigos
  - los amigos combatirán a amigos como enemigos
  lexicon: debellare → hacer guerra, guerrear; amici → amigos; inimici → enemigos
  rationale: El latín expresa una acción bélica entre amigos, no solo hostilidad general. ‘Hacer guerra’ conserva la fuerza verbal de debellabunt y ‘como enemigos’ mantiene la comparación ut inimici sin suavizarla.
- source_word: expauescet terra
  english_pob_choice: the earth will be terrified
  chosen_spanish: la tierra se aterrorizará
  alternatives_spanish:
  - la tierra temblará de terror
  - la tierra quedará aterrada
  lexicon: expavescere → aterrorizarse, llenarse de pavor; terra → tierra
  rationale: ‘Aterrorizarse’ refleja el pasivo/incoativo latino y mantiene el sujeto ‘la tierra’ como participante afectado, no solo como escenario.
- source_word: cum his qui inhabitant eam
  english_pob_choice: along with those who dwell in it
  chosen_spanish: junto con los que habitan en ella
  alternatives_spanish:
  - con los que habitan en ella
  - al mismo tiempo que los que habitan en ella
  lexicon: cum + ablativo asociativo → junto con; inhabitare → habitar
  rationale: Se conserva el valor asociativo de cum según la revisión inglesa, evitando leerlo como instrumental. ‘Habitan en ella’ es el equivalente natural de inhabitant eam.
- source_word: uenae fontium
  english_pob_choice: the channels of the springs
  chosen_spanish: los canales de las fuentes
  alternatives_spanish:
  - los cauces de las fuentes
  - las venas de las fuentes
  lexicon: vena → canal, vena, conducto; fontium → de las fuentes
  rationale: ‘Canales’ comunica en español el sentido físico de conductos de agua sin forzar la imagen anatómica de ‘venas’, aunque se reconoce la metáfora subyacente del latín.
theological_decisions:
- issue: La tierra y sus habitantes comparten el terror
  english_pob_reading: the earth will be terrified along with those who dwell in it
  chosen_spanish_reading: la tierra se aterrorizará junto con los que habitan en ella
  alternative_spanish_readings:
  - la tierra se aterrorizará con los que habitan en ella
  - la tierra y los que habitan en ella se aterrorizarán juntos
  rationale: La redacción mantiene explícita la co-participación del terror sin diluir la sintaxis asociativa del latín. Esto preserva la escena cósmica del pasaje, donde la tierra y sus habitantes responden conjuntamente al juicio.
  doctrine_reference: 'Apocalíptica de 2 Esdras: desorden cósmico y terror compartido de la creación y sus habitantes.'
translation_notes:
  revision_awareness: La base inglesa fue revisada para aclarar que cum es asociativo (‘along with’), no instrumental. La traducción española refleja esa corrección al usar ‘junto con’.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y contemporáneo.
  - Se evita ‘SEÑOR’ o equivalentes no pertinentes porque el verso no contiene el nombre divino.
  - No se introduce ‘Cristo’ ni terminología cristológica ajena al pasaje.
  - ‘Fuentes’ conserva la imagen acuática del latín, y ‘canales’ evita una traducción demasiado literal de venae que sonaría extraña en español.
