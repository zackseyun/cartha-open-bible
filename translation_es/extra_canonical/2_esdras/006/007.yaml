translation:
  language: es
  text: 'Entonces respondí y dije[a]: «¿Cuál será la división de los tiempos? ¿O cuándo será el fin de lo anterior y el comienzo de lo que sigue?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «del siguiente».'
    reason: Preserva en español la variante documentada en el historial inglés para sequentis, en vez de repetir sin cambio la redacción del texto principal.
lexical_decisions:
- source_word: porum ? aut quando prioris finis aut sequentis initium ?
  english_pob_choice: What will be the dividing of the times? Or when will be the end of the former and the beginning of the one that follows?
  chosen_spanish: ¿Cuál será la división de los tiempos? ¿O cuándo será el fin de lo primero y el comienzo de lo que sigue?
  alternatives_spanish:
  - ¿Cuál será la separación de los tiempos?
  - ¿Cuándo será el fin del primero y el comienzo del siguiente?
  lexicon: división / fin / comienzo
  rationale: El latino plantea una partición o separación de los tiempos, por lo que «división» conserva mejor la imagen conceptual que una paráfrasis. «prioris» y «sequentis» funcionan como sustantivos balanceados; en español, «lo primero» y «lo que sigue» mantienen ese paralelismo sin forzar una lectura demasiado libre.
theological_decisions:
- issue: Dos edades o momentos sucesivos del plan divino
  english_pob_reading: the end of the former and the beginning of the one that follows
  chosen_spanish_reading: el fin de lo primero y el comienzo de lo que sigue
  alternative_spanish_readings:
  - el fin del primero y el comienzo del siguiente
  - el fin de la edad anterior y el inicio de la posterior
  rationale: El contexto apocalíptico de 4 Esdras/2 Esdras contrasta dos etapas sucesivas de la historia. La formulación española conserva esa tensión temporal sin especificar más de lo que el latino permite.
  doctrine_reference: Escatología apocalíptica; sucesión de las edades
translation_notes:
  revision_awareness: 'La versión inglesa revisada prefirió «the one that follows» frente a «what follows» para reflejar mejor el participio sustantivado latino sequentis; la traducción española sigue esa decisión con una construcción igualmente sustantivada: «lo que sigue».'
  spanish_consistency_notes:
  - 'Se conserva el tratamiento narrativo en primera persona: «Entonces respondí y dije».'
  - Se evita «SEÑOR» u otras convenciones no presentes en el latín, porque el versículo no contiene el nombre divino.
  - «Lo primero» reproduce el valor sustantivado de prioris sin introducir innecesariamente un ordinal masculino explícito.
