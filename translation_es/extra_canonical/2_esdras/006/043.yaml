translation:
  language: es
  text: Porque tu palabra salió, y la obra se hizo de inmediato.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Verbum
  english_pob_choice: your word
  chosen_spanish: tu palabra
  alternatives_spanish:
  - tu palabra dicha
  - tu palabra pronunciada
  lexicon: verbum
  rationale: El latín verbum aquí corresponde naturalmente a «palabra»; el posesivo de segunda persona singular mantiene la referencia directa del texto y la sencillez de la formulación inglesa auditada.
- source_word: enim
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: enim
  rationale: El conector explicativo/enfático del latín se vierte mejor como «Porque» en español, conservando la relación causal o justificativa de la frase sin añadir peso interpretativo.
- source_word: coram te ministrantia seminata adeo et culta
  english_pob_choice: the work was immediately done
  chosen_spanish: la obra se hizo de inmediato
  alternatives_spanish:
  - la obra fue hecha al instante
  - la obra quedó hecha enseguida
  lexicon: phrase-level rendering of the Latin clause
  rationale: 'El latín transmitido es breve y algo elíptico, pero la audit trail inglesa fija el sentido resultante: la acción/obra se realiza inmediatamente tras salir la palabra. «Se hizo de inmediato» preserva la rapidez y la pasiva impersonal sin forzar una paráfrasis más larga.'
theological_decisions:
- issue: Relación entre «palabra» y el efecto inmediato
  english_pob_reading: For your word went forth, and the work was immediately done.
  chosen_spanish_reading: Porque tu palabra salió, y la obra se hizo de inmediato.
  alternative_spanish_readings:
  - Porque tu palabra salió, y la obra se cumplió enseguida.
  - Porque tu palabra salió, y el trabajo se hizo al instante.
  rationale: El texto no desarrolla una doctrina explícita, pero sí presenta la eficacia inmediata de la palabra divina. «La obra» mantiene la generalidad del inglés auditado y evita restringir el sentido a un «trabajo» humano o a una creación específica que el latín no nombra de manera inequívoca.
  doctrine_reference: Eficacia de la palabra divina; no se añade dogmática ajena al verso.
translation_notes:
  revision_awareness: 'Se siguió el texto latino transmitido y se alineó con la lectura auditada en inglés: una afirmación breve sobre la salida de la palabra y la ejecución inmediata de la obra. No se introdujeron cambios respecto del pasaje revisado; el acuerdo de revisión fue alto y sin modificaciones.'
  spanish_consistency_notes:
  - Se mantuvo «palabra» para verbum, coherente con el uso bíblico español estándar y con la lectura auditada.
  - Se conservó una sintaxis breve y directa para reflejar la concisión del latín y la equivalencia dinámica del inglés POB.
  - No se añadieron notas al pie porque no hay variantes relevantes marcadas en el material de auditoría ni ambigüedad española que lo requiera.
