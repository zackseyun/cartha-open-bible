translation:
  language: es
  text: Y si el mundo fue creado por causa de nosotros, ¿por qué no poseemos nuestro mundo como herencia? ¿Hasta cuándo será esto?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: saeculum
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la era
  - el siglo
  - la edad
  lexicon: saeculum
  rationale: El latín saeculum puede abarcar tanto «mundo» como «edad/era» según el contexto. Aquí la pregunta sobre ser creados «por causa de nosotros» y poseer «nuestro mundo» como herencia favorece claramente el sentido cosmológico de «el mundo», coherente con la decisión inglesa POB.
- source_word: creatum est
  english_pob_choice: was created
  chosen_spanish: fue creado
  alternatives_spanish:
  - fue hecho
  - fue formado
  lexicon: creo
  rationale: «Fue creado» reproduce con precisión la pasiva perfectiva del latín sin introducir matices adicionales. Es la equivalencia más directa y clara en español.
- source_word: hereditatem possidemus
  english_pob_choice: do we not possess ... as an inheritance
  chosen_spanish: no poseemos ... como herencia
  alternatives_spanish:
  - no heredamos ...
  - no recibimos ... en herencia
  lexicon: hereditas / possideo
  rationale: «Poseer como herencia» conserva la tensión entre posesión efectiva y herencia prometida. «Herencia» mantiene el sustantivo del original y su fuerza jurídica/covenantal mejor que una simple paráfrasis.
- source_word: nostrum saeculum
  english_pob_choice: our world
  chosen_spanish: nuestro mundo
  alternatives_spanish:
  - nuestra era
  - nuestra edad
  lexicon: saeculum
  rationale: Se conserva el posesivo para reflejar la formulación enfática del latín. «Nuestro mundo» sigue la lectura inglesa y resulta natural en español; «nuestra era/edad» sería posible, pero desplaza el foco de la posesión del ámbito creado.
- source_word: usquequo haec
  english_pob_choice: How long will this be?
  chosen_spanish: ¿Hasta cuándo será esto?
  alternatives_spanish:
  - ¿Hasta cuándo ocurrirá esto?
  - ¿Hasta cuándo durará esto?
  lexicon: usquequo
  rationale: La expresión latina es idiomática y puede traducirse naturalmente como una pregunta de duración. «¿Hasta cuándo será esto?» conserva la brevedad y la fuerza lamentativa del original, sin añadir contenido interpretativo.
theological_decisions:
- issue: Sentido de saeculum en una queja escatológica
  english_pob_reading: the world
  chosen_spanish_reading: el mundo
  alternative_spanish_readings:
  - la era
  - la edad
  rationale: Aunque saeculum puede significar «edad» o «era», el contexto inmediato habla de herencia y posesión de un orden creado, no solo de un período temporal. Por eso se mantiene «mundo», como en la traducción inglesa auditada.
  doctrine_reference: Creación y herencia escatológica; expectativa de restauración del orden creado
- issue: Relación entre creación y herencia
  english_pob_reading: why do we not possess our world as an inheritance?
  chosen_spanish_reading: ¿por qué no poseemos nuestro mundo como herencia?
  alternative_spanish_readings:
  - ¿por qué no recibimos nuestro mundo en herencia?
  - ¿por qué no tenemos nuestro mundo por herencia?
  rationale: 'La formulación elegida conserva la protesta del texto: si el mundo fue creado para «nosotros», debería estar ya en nuestra posesión hereditaria. No suaviza la queja ni la convierte en una afirmación doctrinal más amplia de lo que el latín permite.'
  doctrine_reference: Tema de la herencia prometida y del retraso escatológico
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el veredicto de control cruzado fue de alta concordancia; por tanto, el español sigue de cerca la lectura estable del texto latino y del POB inglés, sin necesidad de notas textuales.
  spanish_consistency_notes:
  - Se mantiene «mundo» para saeculum por coherencia con la lectura auditada en inglés.
  - No se introduce «SEÑOR» ni terminología confesional ajena, porque el versículo no contiene el nombre divino ni un término cristológico.
  - El tono interrogativo y lamentativo se conserva con preguntas directas y compactas.
