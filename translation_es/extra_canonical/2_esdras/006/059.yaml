    issue: «por causa de nosotros» es ligeramente literal
    rationale: Aunque fiel al latín «propter nos», en español más idiomático podrían usarse «para nosotros» o «por nuestra causa». No obstante, la redacción actual no distorsiona el sentido ni dificulta la lectura.
