translation:
  language: es
  text: y les mandaste que sirvieran al hombre que había de ser formado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: deservirent
  english_pob_choice: serve
  chosen_spanish: sirvieran
  alternatives_spanish:
  - estuvieran al servicio de
  - servieran
  lexicon: servire
  rationale: El latín deservire expresa servicio rendido en obediencia. «Sirvieran» conserva el valor verbal directo y funciona bien en español sin sobrecargar el matiz de esclavitud, que el contexto inmediato no exige explícitamente.
- source_word: futuro
  english_pob_choice: who was to be formed
  chosen_spanish: que había de ser formado
  alternatives_spanish:
  - que iba a ser formado
  - que sería formado
  lexicon: futurus
  rationale: «Futuro» aquí califica al hombre por su condición venidera; en español, la construcción «había de ser» comunica bien la idea de destino o previsión futura con tono bíblico y claro.
- source_word: plasmato
  english_pob_choice: formed
  chosen_spanish: formado
  alternatives_spanish:
  - plasmado
  - hecho
  lexicon: plasmare
  rationale: Aunque el latín usa una forma de plasmare, en español «formado» es más natural y fiel al sentido de modelar/crear al hombre. «Plasmado» sería posible, pero puede sonar más marcado y menos transparente para el lector general.
- source_word: homini
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - al ser humano
  - al varón
  lexicon: homo
  rationale: El singular latino homo corresponde aquí al ser humano particular referido en la frase. «El hombre» reproduce bien la referencia tradicional del texto y mantiene la conexión con la formación del hombre en el relato.
theological_decisions:
- issue: La relación entre los seres creados y el hombre futuro
  english_pob_reading: and you commanded them to serve the man who was to be formed.
  chosen_spanish_reading: y les mandaste que sirvieran al hombre que había de ser formado.
  alternative_spanish_readings:
  - y les ordenaste servir al hombre que había de ser formado.
  - y les mandaste que estuvieran al servicio del hombre que había de ser formado.
  rationale: La frase conserva la idea fuerte de subordinación de las criaturas al hombre futuro sin añadir explicaciones doctrinales. «Mandaste» refleja el imperativo divino del latín; no se suaviza a una mera sugerencia.
  doctrine_reference: Relación creatural y mandato divino en la antropología bíblica
- issue: La pasividad del hombre en «ser formado»
  english_pob_reading: who was to be formed
  chosen_spanish_reading: que había de ser formado
  alternative_spanish_readings:
  - que sería formado
  - que iba a ser formado
  rationale: Se mantiene la voz pasiva para no diluir la idea de que el hombre recibe su ser por formación divina. No se introduce un sujeto agente explícito que el texto no expresa.
  doctrine_reference: Creación/formación del hombre por Dios
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto latino limpiado de Bensly 1895, apoyado por el Fragmento Perdido de Bensly 1875. La traducción inglesa POB («and you commanded them to serve the man who was to be formed») confirma la lectura simple y no añade variantes ni notas; el español sigue ese mismo alcance semántico sin ampliar ni reducir el original.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el source payload es latino y no presenta el tetragrámaton ni κύριος.
  - Se mantiene un registro bíblico claro y sobrio, con sintaxis natural en español.
  - No se introduce «esclavo» porque el verbo deservire aquí apunta de modo suficiente a servicio/obediencia, y el contexto no exige la carga social de δοῦλος.
