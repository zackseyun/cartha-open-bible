base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/051.yaml
  text: And you gave Behemoth one part, which was dried up on the third day, to dwell in it, where there are a thousand mountains;
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:57Z'
    unchanged: false
    changes_summary: Replaced the appositional repetition 'the part' with 'which' for more natural English, and adjusted 'had been dried' to 'was dried up' to reflect the Latin more directly.
translation:
  language: es
  text: Y diste a Behemot una parte, que se secó al tercer día, para habitar en ella, donde hay mil montañas;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ea / unam partem
  english_pob_choice: one part
  chosen_spanish: una parte
  alternatives_spanish:
  - un sector
  - una porción
  lexicon: partem
  rationale: ‘Una parte’ conserva de forma directa la idea de una porción asignada sin añadir matices que el latín no exige. ‘Porción’ es posible, pero ‘parte’ mantiene mejor la relación con el inglés auditado y con el reparto espacial del contexto.
- source_word: siccata est
  english_pob_choice: was dried up
  chosen_spanish: fue secada
  alternatives_spanish:
  - se secó
  - estaba seca
  lexicon: siccata est
  rationale: El latín pasivo apunta a ‘fue secada’, que deja visible la acción recibida. ‘Se secó’ suaviza la voz y ‘estaba seca’ desplaza el foco al estado, por lo que se prefirió una pasiva más cercana al original.
- source_word: tertio
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - el tercer día
  lexicon: tertio
  rationale: ‘Al tercer día’ es la expresión natural en español para marcar tiempo puntual. Conserva sin exceso la referencia temporal del latín y coincide con la lectura inglesa revisada.
- source_word: dwell in it
  english_pob_choice: to dwell in it
  chosen_spanish: para habitar en ella
  alternatives_spanish:
  - para morar en ella
  - para vivir en ella
  lexicon: habitare
  rationale: ‘Habitar’ es el equivalente más sobrio y formal para una residencia estable. Se mantiene el femenino ‘ella’ por concordancia con ‘parte’.
- source_word: where there are a thousand mountains
  english_pob_choice: where there are a thousand mountains
  chosen_spanish: donde hay mil montañas
  alternatives_spanish:
  - donde hay mil montes
  - en donde hay mil montañas
  lexicon: mille montes
  rationale: ‘Mil montañas’ reproduce el número y la imagen espacial sin exagerar la elección lexical. ‘Montes’ sería posible, pero ‘montañas’ resulta más transparente en español contemporáneo.
theological_decisions:
- issue: Identidad y tratamiento de Behemot
  english_pob_reading: Behemoth
  chosen_spanish_reading: Behemot
  alternative_spanish_readings:
  - Behemoth
  - Béhémot
  rationale: Se conserva el nombre propio transliterado como entidad literaria y no se interpreta alegóricamente. ‘Behemot’ es la forma más natural en español bíblico y evita una latinización innecesaria.
  doctrine_reference: Lectura literaria del ser nombrado; no se introduce identificación doctrinal adicional.
- issue: Imágenes cosmográficas y literalidad del reparto
  english_pob_reading: you gave ... one part ... to dwell in it, where there are a thousand mountains
  chosen_spanish_reading: diste ... una parte ... para habitar en ella, donde hay mil montañas
  alternative_spanish_readings:
  - le diste ... una parte ... para morar en ella, donde hay mil montañas
  - asignaste ... una parte ... para habitar en ella, donde hay mil montañas
  rationale: Se conserva la imagen de una porción asignada y un lugar de morada con ‘mil montañas’ sin suavizarla en clave simbólica. ‘Diste’ mantiene la forma directa del acto divino presente en el inglés auditado.
  doctrine_reference: Respeto al carácter visionario/apocalíptico del pasaje sin interpretación doctrinal añadida.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente cambió la frase de una repetición apposicional a una relativa más natural (''which'') y ajustó el tiempo verbal a ''was dried up''. La versión española sigue esa misma dirección: evita una repetición pesada y usa una pasiva verbal que refleja mejor el pasivo latino sin introducir ambigüedad temporal.'
  spanish_consistency_notes:
  - Se mantiene ‘Behemot’ como transliteración estable del nombre propio.
  - Se evita ‘SEÑOR’ u otras sustituciones litúrgicas porque el texto fuente no contiene el tetragrámaton ni un equivalente directo.
  - La sintaxis española conserva el encadenamiento de participios y relativas del original sin volverlo más interpretativo de lo necesario.
