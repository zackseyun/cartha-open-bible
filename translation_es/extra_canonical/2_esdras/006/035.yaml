translation:
  language: es
  text: Y aconteció después de esto que lloré otra vez, e igualmente ayuné siete días, para completar las tres semanas que me habían dicho.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et factum est post haec
  english_pob_choice: And it happened after this
  chosen_spanish: Y aconteció después de esto
  alternatives_spanish:
  - Y sucedió después de esto
  - Y fue así después de esto
  lexicon: Latin factum est; formula narrativa de transición
  rationale: «Aconteció» conserva el giro narrativo solemne y natural en español, sin forzar una construcción demasiado literal o pesada.
- source_word: flevi iterum
  english_pob_choice: I wept again
  chosen_spanish: lloré otra vez
  alternatives_spanish:
  - volví a llorar
  - lloré de nuevo
  lexicon: Latin flere
  rationale: «Lloré otra vez» reproduce de manera directa la repetición del llanto y suena natural en español contemporáneo.
- source_word: similiter ieiunavi septem diebus
  english_pob_choice: and likewise I fasted seven days
  chosen_spanish: e igualmente ayuné siete días
  alternatives_spanish:
  - y de igual manera ayuné siete días
  - e igualmente ayuné por siete días
  lexicon: Latin similiter; ieiunavi; septem dies
  rationale: «Igualmente» refleja bien similiter, y «ayuné siete días» mantiene la duración exacta sin añadir matices no presentes en el latín.
- source_word: ut suppleam
  english_pob_choice: so that I might complete
  chosen_spanish: para completar
  alternatives_spanish:
  - a fin de completar
  - para que completara
  lexicon: Latin supplere
  rationale: El infinitivo final en español transmite con naturalidad el propósito expresado por ut + subjuntivo en esta frase.
- source_word: tres ebdomadas
  english_pob_choice: the three weeks
  chosen_spanish: las tres semanas
  alternatives_spanish:
  - tres semanas
  lexicon: Latin ebdomada
  rationale: «Semanas» es la equivalencia directa y transparente; se conserva el número exacto sin explicaciones adicionales.
- source_word: quae dictae sunt mihi
  english_pob_choice: that had been spoken to me
  chosen_spanish: que me habían sido dichas
  alternatives_spanish:
  - que me habían sido habladas
  - que me habían sido declaradas
  lexicon: Latin dicere, passive perfect; audit trail revision to 'spoken to me'
  rationale: Se sigue el ajuste revisado del inglés POB hacia «spoken to me», pero en español la forma más idiomática y fiel al pasivo de dicere es «me habían sido dichas», que preserva la idea de palabras previamente pronunciadas sin convertirla en «apuntadas» o «asignadas».
theological_decisions:
- issue: 'Valor de dictae sunt mihi: comunicado verbal previo vs. designación o decreto'
  english_pob_reading: had been spoken to me
  chosen_spanish_reading: me habían sido dichas
  alternative_spanish_readings:
  - me habían sido asignadas
  - me habían sido anunciadas
  rationale: El latín dictae sunt mihi favorece la noción de palabras dichas/comunicadas a alguien. En español, «me habían sido dichas» conserva esa referencia verbal sin introducir la idea de una orden formal o asignación que el texto no exige.
  doctrine_reference: Ninguna doctrina específica; fidelidad semántica al latín narrativo.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del inglés POB, que cambió «appointed to me» por «spoken to me» para reflejar con mayor exactitud el latín dictae sunt mihi. En español se optó por una forma equivalente y natural: «me habían sido dichas».'
  spanish_consistency_notes:
  - Se mantiene «Y aconteció» como fórmula narrativa elevada y ampliamente comprensible.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el versículo.
  - No hay referencias cristológicas o nominales que requieran terminología especial.
