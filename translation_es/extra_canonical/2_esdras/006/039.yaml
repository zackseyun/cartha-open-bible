base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/039.yaml
  text: And at that time the spirit was moving[a], and darkness and silence were surrounding everything; the sound of a human voice was not yet from you.
  footnotes:
  - marker: a
    text: Or 'was not yet there from you'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:55Z'
    unchanged: false
    changes_summary: Revised 'hovering' to 'moving' for a more neutral rendering of volans, and changed 'were being carried around' to 'were surrounding everything' to better reflect circumferebantur in natural English while preserving the sense. Kept 'from you' as a literal rendering of abs te.
translation:
  language: es
  text: Y en aquel tiempo el espíritu se movía, y las tinieblas y el silencio rodeaban todo; el sonido de una voz humana todavía no procedía de ti[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todavía no estaba de parte tuya»; lit. «todavía no era desde/de ti».'
    reason: Preserva la alternativa documentada para la ambigüedad de `nondum erat abs te`, adaptada de manera inteligible al español.
lexical_decisions:
- source_word: spiritus volans
  english_pob_choice: the spirit was moving
  chosen_spanish: el espíritu se movía
  alternatives_spanish:
  - el espíritu estaba moviéndose
  - el espíritu volaba
  lexicon: spiritus = espíritu; volans = participio de volare, literalmente ‘volando’, con posible valor de movimiento libre o aliento en acción
  rationale: ‘Se movía’ comunica el movimiento continuo sin imponer la imagen más concreta de ‘volaba’, que en español podría sonar más física o interpretativa que el latín permite con claridad.
- source_word: tenebrae circumferebantur
  english_pob_choice: darkness ... were surrounding everything
  chosen_spanish: las tinieblas ... rodeaban todo
  alternatives_spanish:
  - la oscuridad ... rodeaba todo
  - las tinieblas ... estaban rodeando todo
  lexicon: tenebrae = tinieblas / oscuridad; circumferebantur = eran llevadas alrededor / rodeaban
  rationale: ‘Tinieblas’ conserva el plural latino y el tono bíblico; ‘rodeaban todo’ expresa el sentido de envolvimiento sin un calco pesado.
- source_word: silentium
  english_pob_choice: silence
  chosen_spanish: el silencio
  alternatives_spanish:
  - silencio
  - la quietud
  lexicon: silentium = silencio
  rationale: La forma nominal simple es natural y fiel.
- source_word: sonus vocis hominis
  english_pob_choice: the sound of a human voice
  chosen_spanish: el sonido de una voz humana
  alternatives_spanish:
  - la voz humana
  - el sonido de la voz de un ser humano
  lexicon: sonus = sonido; vocis hominis = de una voz humana / de un hombre
  rationale: ‘Una voz humana’ conserva la construcción genitiva sin forzar ‘de un hombre’, que en español podría sonar más marcado que el latín genérico.
- source_word: nondum erat abs te
  english_pob_choice: was not yet from you
  chosen_spanish: todavía no venía de ti
  alternatives_spanish:
  - todavía no era de ti
  - todavía no procedía de ti
  lexicon: nondum = todavía no; abs te = de ti / desde ti / por ti
  rationale: ‘Venía de ti’ mantiene la idea de procedencia/origen en español natural y evita la ambigüedad de ‘era de ti’, que puede sonar posesiva más que causal.
theological_decisions:
- issue: Origen divino del sonido de la voz humana
  english_pob_reading: the sound of a human voice was not yet from you
  chosen_spanish_reading: el sonido de una voz humana todavía no venía de ti
  alternative_spanish_readings:
  - el sonido de una voz humana todavía no procedía de ti
  - el sonido de una voz humana todavía no era de ti
  rationale: Se preserva la tensión de abs te como procedencia/origen en relación con Dios, sin resolverla demasiado en una explicación doctrinal. ‘Venía de ti’ mantiene apertura entre origen, procedencia y agencia creativa.
  doctrine_reference: Creación ex nihilo / Dios como fuente de la creación, sin añadir formulación dogmática ajena al texto.
translation_notes:
  revision_awareness: La revisión inglesa reciente suavizó ‘hovering’ a ‘moving’ y mantuvo ‘from you’ para abs te; la versión española sigue esa línea con ‘se movía’ y ‘venía de ti’, evitando introducir una glosa adicional.
  spanish_consistency_notes:
  - Se mantiene ‘espíritu’ en minúscula porque el contexto describe la realidad creada/primordial, no explícitamente el Espíritu Santo.
  - ‘Tinieblas’ conserva el plural, coherente con el latín tenebrae y con estilo bíblico en español.
  - No se usa ‘SEÑOR’ ni otros sustitutos porque el versículo no contiene el tetragrámaton; la referencia a Dios es indirecta en ‘de ti’.
