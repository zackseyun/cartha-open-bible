translation:
  language: es
  text: Porque el mal será borrado, y el engaño desaparecerá.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: delebitur
  english_pob_choice: will be blotted out
  chosen_spanish: será borrado
  alternatives_spanish:
  - será borrado del todo
  - será eliminado
  lexicon: Latin deleo
  rationale: delebitur expresa la eliminación o borrado completo de algo; «será borrado» conserva bien la imagen de desaparición total sin introducir una metáfora demasiado libre.
- source_word: malum
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - lo malo
  lexicon: Latin malum
  rationale: El sustantivo latino es amplio y puede abarcar mal, maldad o lo malo; «el mal» reproduce de forma directa la fuerza general del término en un registro natural para el español bíblico.
- source_word: extinguetur
  english_pob_choice: will be extinguished
  chosen_spanish: será extinguido
  alternatives_spanish:
  - será apagado
  - será sofocado
  lexicon: Latin extinguo
  rationale: extinguetur mantiene la imagen de apagar o hacer cesar algo; «será extinguido» sigue de cerca el verbo latino y preserva el paralelismo con la primera cláusula.
- source_word: dolus
  english_pob_choice: deceit
  chosen_spanish: el engaño
  alternatives_spanish:
  - el dolo
  - la astucia engañosa
  lexicon: Latin dolus
  rationale: dolus suele referirse a engaño, dolo o fraude; «el engaño» es la opción más clara y lecturable en español, y conserva el sentido moral del término sin tecnicismo jurídico.
theological_decisions:
- issue: La amplitud moral de 'malum' y 'dolus'
  english_pob_reading: evil ... deceit
  chosen_spanish_reading: el mal ... el engaño
  alternative_spanish_readings:
  - la maldad ... el fraude
  - lo malo ... el dolo
  rationale: 'La línea latina presenta dos realidades negativas distintas: el mal en general y el engaño como forma concreta de corrupción moral. «El mal» y «el engaño» mantienen esa distinción sin forzar una lectura doctrinal adicional.'
  doctrine_reference: No aplica; decisión de registro léxico y semántico.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió la versión heredada para ajustarse únicamente al latín de este versículo: ''For evil will be blotted out, and deceit will be extinguished.'' También descartó material no presente en el latín (''But faithfulness will flourish, and corruption will be overcome''). La redacción española sigue ese texto latino depurado y no incorpora la continuación de la cláusula siguiente.'
  spanish_consistency_notes:
  - Se mantiene 'el mal' para malum y 'el engaño' para dolus, evitando tecnicismos innecesarios.
  - '''Será extinguido'' conserva el paralelismo verbal con ''será borrado'' y refleja el pasivo latino.'
  - La nota[a] ofrece una alternativa natural en español sin alterar el texto principal.
