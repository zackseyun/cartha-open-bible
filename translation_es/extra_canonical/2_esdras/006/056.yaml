translation:
  language: es
  text: Pero las demás naciones, nacidas de Adán, dijiste que no son nada, y que son como saliva; y comparaste su abundancia como una gota de un vaso.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: residuas autem gentes ab Adam natas
  english_pob_choice: But the rest of the nations, which have come from Adam
  chosen_spanish: Pero el resto de las naciones, que han venido de Adán
  alternatives_spanish:
  - Pero las demás naciones, descendidas de Adán
  - Pero las naciones restantes, nacidas de Adán
  lexicon: gentes -> naciones; ab Adam natas -> han venido de Adán
  rationale: La frase latina presenta a las naciones restantes como procedentes de Adán; "han venido de Adán" conserva la dependencia genealógica sin volverla más interpretativa que el original. "Naciones" es el equivalente natural de gentes en este contexto.
- source_word: nihil esse
  english_pob_choice: are nothing
  chosen_spanish: no son nada
  alternatives_spanish:
  - son nada
  - no valen nada
  lexicon: nihil esse -> no son nada
  rationale: La construcción es ontológica y absoluta; "no son nada" mantiene la fuerza del juicio sin añadir una valoración explicativa que el texto no da.
- source_word: salivae adsimilatae sunt
  english_pob_choice: they are like spittle
  chosen_spanish: son como saliva
  alternatives_spanish:
  - son como saliva escupida
  - son como esputo
  lexicon: salivae -> saliva; adsimilatae sunt -> son como
  rationale: El latín compara a las naciones con saliva; en español "saliva" comunica el sentido básico con mayor claridad y dignidad que un tecnicismo o una forma demasiado áspera. Se conserva la comparación degradante del original.
- source_word: sicut stillicidium de vaso
  english_pob_choice: a drop from a vessel
  chosen_spanish: con una gota de un vaso
  alternatives_spanish:
  - como una gota de un vaso
  - como una gota caída de un vaso
  lexicon: stillicidium -> gota; de vaso -> de un vaso
  rationale: El paralelo latino compara su abundancia con una gota procedente de un recipiente; "con una gota de un vaso" reproduce la imagen con sintaxis natural en español, aunque la comparación literal también podría expresarse con "como".
theological_decisions:
- issue: Desprecio retórico hacia las naciones restantes
  english_pob_reading: you said they are nothing, and that they are like spittle; and you compared their abundance to a drop from a vessel
  chosen_spanish_reading: dijiste que no son nada, y que son como saliva; y comparaste su abundancia con una gota de un vaso
  alternative_spanish_readings:
  - dijiste que eran nada
  - dijiste que son como esputo
  rationale: El texto conserva un lenguaje deliberadamente humillante sobre las naciones. La traducción no suaviza esa tensión, porque el latino la expresa de forma directa y la POB inglesa la mantiene.
  doctrine_reference: Tono retórico del pasaje apocalíptico; no implica una tesis doctrinal universal sobre el valor humano.
translation_notes:
  revision_awareness: La versión inglesa auditada no introdujo notas ni revisiones; el control de revisión marca el texto como sin cambios necesarios, y el pasaje latino coincide sustancialmente con la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene "Adán" como nombre propio en la referencia genealógica.
  - '"Naciones" se usa como equivalente constante de gentes en este registro.'
  - No se introdujo "SEÑOR" ni "Cristo", porque el verso no contiene el tetragrámaton ni lenguaje cristológico.
