- from: Pero el resto de las naciones, que han venido de Adán, dijiste que no son nada, y que son como saliva; y comparaste su abundancia con una gota de un vaso.
  to: Pero las demás naciones, nacidas de Adán, dijiste que no son nada, y que son como saliva; y comparaste su abundancia como una gota de un vaso.
  rationale: Se ajusta la expresión genealógica para reflejar mejor ab Adam natas y se corrige la comparación final para que reproduzca con más fidelidad la estructura del original latino y de la POB inglesa, manteniendo un español natural y digno.
