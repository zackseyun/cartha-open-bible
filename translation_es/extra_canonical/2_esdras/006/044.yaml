translation:
  language: es
  text: Porque al instante brotó fruto en abundancia inmensurable[a], y múltiples delicias para el gusto, y flores de color inimitable, y aromas de fragancia inescrutable. Estas cosas fueron hechas el tercer día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «deseo de gustos variados»; el latín concupiscentia aquí puede referirse a la deleitabilidad objetiva de lo creado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: fructus multitudinis inmensus
  english_pob_choice: fruit in immeasurable abundance
  chosen_spanish: fruto en abundancia inmensurable
  alternatives_spanish:
  - fruto en abundancia inmensa
  - fruto en abundancia sin medida
  lexicon: fructus -> fruto; multitudinis inmensus -> abundancia inmensurable
  rationale: Sigo el matiz objetivo del latín, que presenta la abundancia del fruto, no solo una sensación subjetiva. 'Inmensurable' conserva la idea de exceso no medible y mantiene el tono elevado del pasaje.
- source_word: concupiscentia gustus multiformis
  english_pob_choice: manifold delights of taste
  chosen_spanish: deleites múltiples del gusto
  alternatives_spanish:
  - deseo de gustos variados
  - delicias de muchos sabores
  lexicon: concupiscentia -> deleites; gustus -> gusto; multiformis -> múltiples
  rationale: El audit trail inglés ya explica que 'concupiscentia' aquí no debe leerse como mero 'deseo' psicológico, sino como la agradabilidad objetiva de lo creado. En español, 'deleites múltiples del gusto' expresa mejor esa cualidad de deleite sin perder la tensión semántica del término latino.
- source_word: flores colore inimitabiles
  english_pob_choice: flowers of inimitable color
  chosen_spanish: flores de color inimitable
  alternatives_spanish:
  - flores de color incomparable
  - flores de color sin igual
  lexicon: flores -> flores; colore -> color; inimitabiles -> inimitable
  rationale: '''Inimitable'' reproduce con claridad el valor de excelencia incomparable del adjetivo latino y coincide estrechamente con la redacción inglesa aprobada.'
- source_word: odores odoramentis inuestigabiles
  english_pob_choice: scents of unsearchable fragrance
  chosen_spanish: aromas de fragancia inescrutable
  alternatives_spanish:
  - aromas de fragancia ininvestigable
  - olores de fragancia inescrutable
  lexicon: odores -> aromas; odoramentis -> fragancia; inuestigabiles -> inescrutable
  rationale: Prefiero 'aromas' y 'fragancia' para un español más natural y reverente. 'Inescrutable' conserva el sentido de algo que no puede rastrearse plenamente, alineado con el inglés 'unsearchable'.
- source_word: die tertio haec facta sunt
  english_pob_choice: These things were made on the third day
  chosen_spanish: Estas cosas fueron hechas en el tercer día
  alternatives_spanish:
  - Estas cosas fueron creadas en el tercer día
  - Esto fue hecho el tercer día
  lexicon: haec facta sunt -> estas cosas fueron hechas; die tertio -> en el tercer día
  rationale: Mantengo la formulación pasiva 'fueron hechas' para reflejar el latín y conservar el eco bíblico del acto creador sin introducir una paráfrasis más interpretativa como 'creadas'.
theological_decisions:
- issue: La frase latina 'concupiscentia gustus multiformis' puede sonar en español como 'deseo' subjetivo, pero el contexto describe la bondad objetiva de la creación.
  english_pob_reading: manifold delights of taste
  chosen_spanish_reading: deleites múltiples del gusto
  alternative_spanish_readings:
  - deseo de gustos variados
  - delicias de muchos sabores
  rationale: La lectura elegida preserva la tensión lexical sin atribuirle al texto una psicología extraña al contexto. El pasaje enumera cualidades agradables de la creación; por eso 'deleites' comunica mejor la intención semántica que un simple 'deseo'.
  doctrine_reference: 'Teología de la creación: la bondad y agradable diversidad de lo creado (cf. Gén 1).'
translation_notes:
  revision_awareness: He incorporado la revisión inglesa que corrige 'desire for tastes of many kinds' a 'manifold delights of taste', entendiendo concupiscentia en clave de deleite objetivo y no solo de apetito subjetivo. No se requirieron cambios adicionales respecto del texto inglés revisado.
  spanish_consistency_notes:
  - Conservo 'tercer día' y la voz pasiva 'fueron hechas' para mantener el paralelo con la formulación del original latino y el audit trail inglés.
  - Usé 'Yahvé' no porque aparezca en este versículo, sino como norma del proyecto cuando corresponda en otros pasajes.
  - No introduje 'Cristo' ni terminología confesional ajena al contenido descriptivo de esta sección.
