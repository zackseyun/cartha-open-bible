source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'haec ueni tibi ostendere †et uentura† nocte. Si ergo iterum rogaueris et iterum ieiunaueris septem diebus, iterum tibi renuntiabo horum maiora per diem. Quoniam auditu audita est uox tua apud altissimum ; uidit enim fortis directionem tuam et prouidit pudicitiam quam a iuuentute tua habuisti. Et propter hoc misit me demonstrare tibi haec omnia et dicere tibi : confide et noli timere, Et noli festinare in prioribus temporibus cogitare uana, ut non properes in nouissimis temporibus. Et factum est post haec, et fleui iterum et similiter ieiunaui septem diebus, ut supplerem tres ebdomadas quae dictae sunt mihi. Et factum est in octaua nocte et cor meum iterato turbabatur in me, et coepi loqui coram altissimo ; Inflammabatur enim spiritus meus ualde, et anima mea anxiabatur. Et dixi : O domine, loquens locutus es ab initio creaturae, in primo die dicens : fiat caelum et terra, et tuum uerbum opus perfecit. Et erat tunc spiritus uolans, et tenebrae circumferebantur et silentium, sonus
    uocis hominis nondum erat abs te. Tunc dixisti de thesauris tuis proferri lumen aliquod luminis ut apparerent tunc opera tua. Et die secundo iterum creasti spiritum firmamenti et imperasti ei ut diuidcret et diuisionem faceret inter aquas, ut pars quidem sursum recederet, pars uero deorsum maneret. Et tertio die imperasti aquis congregari in septima parte terrae, sex uero partes siccasti et conseruasti ut ex his sint'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/031.yaml
  text: Therefore, if you pray again and fast again for seven days, I will again declare to you greater things than these by day.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:52Z'
    unchanged: false
    changes_summary: Changed 'tell you' to 'declare to you' for a slightly more formal rendering of renuntiabo while preserving the sense. The rest of the draft is accurate and complete for this verse segment.
translation:
  language: es
  text: Por tanto, si vuelves a orar y a ayunar durante siete días, de nuevo te declararé cosas mayores que estas de día.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: iterum rogaueris
  english_pob_choice: if you pray again
  chosen_spanish: si oras otra vez
  alternatives_spanish:
  - si vuelves a orar
  - si oras de nuevo
  lexicon: rogare > orar/pedir
  rationale: En este contexto, la petición a Dios en el marco de ayuno y revelación se entiende mejor como 'orar' en español bíblico natural. 'Otra vez' conserva el valor repetitivo de iterum sin endurecer el ritmo.
- source_word: iterum ieiunaueris septem diebus
  english_pob_choice: fast again for seven days
  chosen_spanish: ayunas otra vez por siete días
  alternatives_spanish:
  - vuelves a ayunar por siete días
  - ayunas de nuevo durante siete días
  lexicon: ieiunare > ayunar
  rationale: '''Ayunar'' es la equivalencia directa y clara. Mantengo ''otra vez'' para reflejar iterum y ''por siete días'' para la duración exacta del latín.'
- source_word: iterum tibi renuntiabo
  english_pob_choice: I will again declare to you
  chosen_spanish: de nuevo te declararé
  alternatives_spanish:
  - te declararé otra vez
  - te anunciaré de nuevo
  lexicon: renuntiare > declarar/anunciar
  rationale: Se sigue la revisión inglesa que prefirió 'declare' por mayor formalidad frente a 'tell'. 'Declarar' conserva el tono solemne del latín y el sentido de comunicación autorizada.
- source_word: horum maiora
  english_pob_choice: greater things than these
  chosen_spanish: cosas mayores que estas
  alternatives_spanish:
  - cosas más grandes que estas
  - cosas mayores que éstas
  lexicon: maiora > mayores
  rationale: '''Mayores'' reproduce el comparativo sin añadir matiz interpretativo. ''Cosas'' es una fórmula sobria y fiel al alcance indefinido del latín.'
- source_word: per diem
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - durante el día
  - por el día
  lexicon: per diem > de día
  rationale: '''De día'' conserva la oposición implícita con lo nocturno en este contexto narrativo y suena natural en español. La frase evita explicar más de lo que el latín dice.'
theological_decisions:
- issue: Naturaleza de la comunicación divina en renuntiabo
  english_pob_reading: I will again declare to you greater things than these by day.
  chosen_spanish_reading: de nuevo te declararé cosas mayores que estas, de día
  alternative_spanish_readings:
  - te anunciaré de nuevo cosas mayores que estas, de día
  - te diré de nuevo cosas mayores que estas, de día
  rationale: '''Declararé'' mantiene el registro más formal y autorizado que la revisión inglesa explicitó para renuntiabo. No se suaviza a ''decir'' para conservar la solemnidad de la promesa revelatoria.'
  doctrine_reference: Revelación divina y mediación profética
translation_notes:
  revision_awareness: La base inglesa fue revisada de 'tell you' a 'declare to you' para reflejar mejor el valor formal de renuntiabo. La presente traducción sigue esa revisión y mantiene una equivalencia óptima con el latín limpio provisto. No se introducen notas de variante porque el segmento traducido coincide con el tramo auditado de la frase final de 2 Esdras 6:31.
  spanish_consistency_notes:
  - Se mantiene 'Dios' implícito en el pronombre de segunda persona sin añadidos no presentes en el segmento.
  - Se usa español bíblico moderno y digno, evitando arcaísmos innecesarios.
  - '''Otra vez'' reproduce la repetición enfática de iterum sin cargar el estilo.'
  - '''De día'' conserva la indicación temporal breve y literal del latín.'
