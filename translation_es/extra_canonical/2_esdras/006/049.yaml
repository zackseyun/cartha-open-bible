translation:
  language: es
  text: 'Entonces preservaste dos criaturas vivientes: a una la llamaste Behemot[a], y a la segunda la llamaste Leviatán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Behemot y Leviatán son criaturas primordiales conocidas en la tradición bíblica y posbíblica judía; aquí funcionan como seres preservados dentro del relato de Esdras sobre la creación.
    reason: cross_reference
lexical_decisions:
- source_word: conseruasti duo animalia
  english_pob_choice: Then you preserved two living creatures
  chosen_spanish: Entonces preservaste dos criaturas vivientes
  alternatives_spanish:
  - Entonces guardaste dos seres vivos
  - Luego conservaste dos criaturas vivientes
  lexicon: conservar / preservar; animalia
  rationale: El latín expresa que Dios las mantuvo en existencia o las dejó a salvo; «preservaste» conserva mejor esa fuerza que un mero «guardaste». «criaturas vivientes» refleja el valor de animalia en este contexto sin reducirlo a «animales» de manera anacrónica o demasiado zoológica.
- source_word: nomen uni uocasti Behemoth
  english_pob_choice: the name of the one you called Behemoth
  chosen_spanish: al nombre de la una la llamaste Behemot
  alternatives_spanish:
  - el nombre de la una la llamaste Behemot
  - a una le diste el nombre Behemot
  lexicon: nomen / vocare
  rationale: Se mantiene la estructura nominal del original, donde el acto de nombrar es explícito. «la llamaste» reproduce el valor de vocasti y evita introducir matices no presentes. «Behemot» conserva la forma española habitual del nombre bíblico.
- source_word: Leviathan
  english_pob_choice: Leviathan
  chosen_spanish: Leviatán
  alternatives_spanish:
  - Leviathan
  - Leviyatán
  lexicon: nomen propio
  rationale: Se usa la forma española asentada «Leviatán», que mantiene la identidad del nombre propio y es inteligible para lectores bíblicos en español.
theological_decisions:
- issue: Identidad de Behemot y Leviatán como criaturas preservadas en la narración de Esdras
  english_pob_reading: Behemoth and Leviathan are primeval creatures known from Jewish scriptural and post-scriptural tradition; here they function as preserved creatures within Ezra's retelling of creation.
  chosen_spanish_reading: Behemot y Leviatán son criaturas primordiales preservadas en el relato de Esdras sobre la creación.
  alternative_spanish_readings:
  - Behemot y Leviatán son animales míticos
  - Behemot y Leviatán son monstruos primordiales
  rationale: La frase latina las presenta como duo animalia conservados; por eso la traducción evita imponer una explicación mitológica más fuerte de la que el verso aquí exige. La nota aclara su trasfondo tradicional sin convertirlo en la lectura principal del verso.
  doctrine_reference: Génesis 1–2; tradición judía sobre Behemot y Leviatán
translation_notes:
  revision_awareness: El contexto textual es estable y coincide plenamente con la traducción inglesa auditada; no se detectaron revisiones aplicadas ni variantes que obliguen a ajustar la decisión española más allá de la normalización idiomática.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente en segunda persona singular, conforme al latín y a la traducción inglesa auditada.
  - Se conserva la forma tradicional de los nombres propios bíblicos con adaptación gráfica al español.
  - No se introdujo terminología doctrinal ajena al verso; la nota limita la aclaración al trasfondo tradicional de Behemot y Leviatán.
