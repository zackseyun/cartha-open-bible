translation:
  language: es
  text: Y al tercer día ordenaste que las aguas se recogieran en la séptima parte de la tierra, pero seis partes las secaste y las conservaste, para que de ellas hubiera delante de ti cosas sembradas y cultivadas, para servirte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: aquis congregari
  english_pob_choice: the waters be gathered into the seventh part of the earth
  chosen_spanish: que las aguas se recogieran en la séptima parte de la tierra
  alternatives_spanish:
  - que las aguas fueran reunidas en la séptima parte de la tierra
  - que las aguas se juntaran en la séptima parte de la tierra
  lexicon: aquis -> aguas; congregari -> recogerse/reunirse
  rationale: Conservo el sentido pasivo de congregari y la imagen espacial de la preposición latina en + acusativo, que el audit trail inglés ya afinó con ‘into’. 'Recogieran' da un español natural y no diluye la acción divina de ordenar el repliegue de las aguas.
- source_word: septima parte terrae
  english_pob_choice: the seventh part of the earth
  chosen_spanish: la séptima parte de la tierra
  alternatives_spanish:
  - la séptima porción de la tierra
  - la séptima parte del mundo
  lexicon: septima parte terrae -> séptima parte de la tierra
  rationale: Mantengo la expresión cuantitativa literal. 'Porción' sería posible, pero 'parte' refleja mejor la estructura del latín y del inglés auditado.
- source_word: sex vero partes siccasti
  english_pob_choice: but six parts you dried up
  chosen_spanish: pero seis partes las secaste
  alternatives_spanish:
  - pero seis partes las dejaste secas
  - pero secaste seis partes
  lexicon: sex partes -> seis partes; siccasti -> secaste
  rationale: '''Secaste'' corresponde directamente a siccasti y conserva la acción divina. El objeto pronominal ''las'' ayuda a que el español suene fluido sin perder el paralelismo con ''las aguas''.'
- source_word: conservasti
  english_pob_choice: and preserved
  chosen_spanish: y las preservaste
  alternatives_spanish:
  - y las conservaste
  - y las guardaste
  lexicon: conservasti -> preservaste/conservaste
  rationale: Elijo 'preservaste' para mantener la idea de resguardar con intención y no solo 'guardar' en sentido genérico. En español sigue siendo claro y solemne.
- source_word: ut ex his sint coram te ministrantia seminata adeo et culta
  english_pob_choice: so that from these there might be before you things sown and cultivated, serving you
  chosen_spanish: para que de ellas hubiera delante de ti cosas sembradas y cultivadas, que te sirven
  alternatives_spanish:
  - para que de ellas hubiera delante de ti lo sembrado y cultivado, sirviéndote
  - para que de ellas existieran ante ti cosas sembradas y cultivadas, sirviéndote
  lexicon: seminata -> sembradas; culta -> cultivadas; ministrantia -> que te sirven
  rationale: Mantengo la cadena de participios con valor final. 'Cosas sembradas y cultivadas' reproduce la acumulación del latín sin forzar un sustantivo técnico que el texto no da. 'Que te sirven' traduce ministrantia con un verbo llano, evitando introducir 'siervos' o terminología cultual no explicitada.
theological_decisions:
- issue: Relación entre la creación ordenada y el servicio a Dios
  english_pob_reading: so that from these there might be before you things sown and cultivated, serving you
  chosen_spanish_reading: para que de ellas hubiera delante de ti cosas sembradas y cultivadas, que te sirven
  alternative_spanish_readings:
  - para que de ellas hubiera delante de ti cosas sembradas y cultivadas, sirviéndote
  - para que de ellas hubiera ante ti cosas sembradas y cultivadas para tu servicio
  rationale: 'El latín presenta la finalidad de la separación de las aguas: producir lo sembrado y cultivado en presencia de Dios, orientado a su servicio. Conservo esa relación sin añadir una categoría doctrinal ajena. ''Que te sirven'' deja explícito el servicio sin convertirlo en un tecnicismo litúrgico.'
  doctrine_reference: Creación/provisión divina con finalidad de servicio; sin necesidad de una glosa doctrinal específica
- issue: Orden divino sobre las aguas y la tierra
  english_pob_reading: you commanded the waters to be gathered into the seventh part of the earth, but six parts you dried up and preserved
  chosen_spanish_reading: ordenaste que las aguas se recogieran en la séptima parte de la tierra, pero seis partes las secaste y las preservaste
  alternative_spanish_readings:
  - mandaste que las aguas se reunieran en la séptima parte de la tierra, pero seis partes las secaste y las guardaste
  rationale: El pasaje enfatiza la autoridad creadora de Dios sobre las aguas y la distribución de la tierra. 'Ordenaste' y 'se recogieran' mantienen esa fuerza sin suavizarla. No hay motivo para introducir una lectura simbólica adicional.
  doctrine_reference: Dios como creador soberano que dispone los elementos de la creación
translation_notes:
  revision_awareness: El inglés auditado fue revisado levemente de 'in the seventh part' a 'into the seventh part' para alinear mejor la preposición con el sentido de congregación espacial del latín. La versión española refleja esa lectura con 'en la séptima parte de la tierra', suficiente y natural en español para expresar destino espacial, sin necesidad de nota textual adicional.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no porque aparezca en este versículo, sino como norma del proyecto; aquí el texto se dirige en segunda persona sin nombre divino explícito.
  - He usado 'preservaste' en paralelo con 'secaste' para sostener el balance verbal del latín.
  - '''Te sirven'' evita la ambigüedad de ''sirviéndote'' y conserva la referencia a una finalidad continua o resultante.'
