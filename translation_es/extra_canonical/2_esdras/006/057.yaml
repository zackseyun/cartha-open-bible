translation:
  language: es
  text: 'Y ahora, Señor, mira: estas naciones, que han sido consideradas como nada, dominan sobre nosotros y nos devoran.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Domine
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor
  - Yahvé
  lexicon: Latin Domine (vocative of Dominus)
  rationale: El vocativo latino se dirige a Dios con una forma de respeto y súplica; en español, «Señor» conserva naturalidad orante y corresponde al valor del original sin forzar aquí el nombre divino explícito.
- source_word: ecce
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira
  lexicon: Latin ecce
  rationale: «Mira» comunica la interpelación inmediata del original en un español actual y digno. «He aquí» es posible, pero suena más arcaico.
- source_word: istae gentes
  english_pob_choice: these nations
  chosen_spanish: estas naciones
  alternatives_spanish:
  - estas naciones
  - estos pueblos
  lexicon: Latin istae gentes
  rationale: «Gentes» puede significar pueblos o naciones; la versión inglesa eligió «nations», y «naciones» mantiene mejor esa amplitud política e histórica.
- source_word: quae in nihilum deputatae sunt
  english_pob_choice: which have been reckoned as nothing
  chosen_spanish: que han sido consideradas como nada
  alternatives_spanish:
  - que han sido tenidas por nada
  - que han sido consideradas como nada
  lexicon: Latin deputare + in nihilum
  rationale: 'La frase expresa valoración/desprecio: ser tratadas como insignificantes. «Consideradas como nada» preserva la fuerza idiomática del latín y su tono retórico.'
- source_word: dominari nostri
  english_pob_choice: rule over us
  chosen_spanish: dominan sobre nosotros
  alternatives_spanish:
  - dominan sobre nosotros
  - se enseñorean de nosotros
  lexicon: Latin dominari + genitive/over us
  rationale: «Dominan sobre nosotros» es claro y fiel. «Se enseñorean de nosotros» es posible, pero introduce un matiz bíblico-tradicional menos directo que el latín.
- source_word: devorarenos
  english_pob_choice: devour us
  chosen_spanish: nos devoran
  alternatives_spanish:
  - nos devoran
  - nos tragan
  lexicon: Latin devorare
  rationale: «Devoran» conserva la imagen de consumo/destrucción del original. «Nos tragan» sería más idiomático en algunos registros, pero menos preciso aquí.
theological_decisions:
- issue: Modo de tratamiento a Dios en el vocativo
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor
  - Yahvé
  rationale: Aunque el proyecto prefiere «Yahvé» para el Tetragrámaton, aquí el texto latino dice «Domine» y el audit trail inglés conserva «Lord» sin indicación de que deba verse como sustituto explícito del nombre divino. Por eso se mantiene un vocativo reverente general.
  doctrine_reference: No doctrinal change; vocative address and translation convention.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de control cruzado fue alto y no hubo objeciones. Por eso esta versión sigue de cerca el latín limpio y la lectura inglesa auditada, sin añadir notas textuales innecesarias.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y contemporáneo.
  - No se introduce el reemplazo por «Yahvé» porque el testimonio base aquí es un vocativo latino general («Domine») y el inglés auditado usa «Lord».
  - Se conserva la imagen fuerte de dominación y devoración sin suavizarla.
