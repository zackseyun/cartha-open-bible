    unchanged: false
    changes_summary: Reordered the clauses to reflect the Latin more directly and supplied the repeated verb in the second clause for clearer, more natural formal English. Rendered 'sequentis' as 'the one that follows' to avoid the slightly awkward nominal use of 'the following.'
translation:
  language: es
  text: Porque Esaú es el fin de esta era[a], y Jacob es el comienzo de la que sigue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede leerse con el orden de las cláusulas destacado por el latín: «Porque el fin de esta era es Esaú, y el comienzo de la que sigue es Jacob».'
    reason: alternative_reading
lexical_decisions:
- source_word: finis
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - el término
  - el final
  lexicon: fin / final
  rationale: finis nombra el término o conclusión de algo; «el fin» conserva la simetría con «principium» y mantiene el paralelo retórico del latín. «Final» sería más idiomático en algunos contextos, pero aquí «fin» refleja mejor la estructura del pasaje.
- source_word: huius saeculi
  english_pob_choice: this age
  chosen_spanish: de esta era
  alternatives_spanish:
  - de este siglo
  - de este mundo
  lexicon: saeculum
  rationale: saeculum puede referirse a una era o período del mundo. «Era» comunica el valor temporal-histórico sin cargar con el matiz restringido de «siglo» en español moderno.
- source_word: principium sequentis
  english_pob_choice: the beginning of the one that follows
  chosen_spanish: el comienzo de la que sigue
  alternatives_spanish:
  - el principio de la siguiente
  - el inicio de la siguiente
  lexicon: principium / sequens
  rationale: «Comienzo» es natural en español y preserva el sentido de principium. «La que sigue» reproduce el valor participial de sequentis sin forzar un sustantivo abstracto como «la siguiente».
theological_decisions:
- issue: Identificación tipológica de Esaú y Jacob
  english_pob_reading: Esau is the end of this age, and Jacob is the beginning of the one that follows.
  chosen_spanish_reading: Esaú es el fin de esta era, y Jacob es el comienzo de la que sigue.
  alternative_spanish_readings:
  - El fin de esta era es Esaú, y el comienzo de la que sigue es Jacob.
  rationale: El latín presenta una ecuación simbólica entre los nombres y los conceptos de fin/comienzo. Mantener la forma predicativa con los nombres como sujeto conserva la lectura tipológica sin añadir explicación interpretativa.
  doctrine_reference: 2 Esdras 6:7-9; correspondencia tipológica dentro del pasaje
translation_notes:
  revision_awareness: El inglés auditado fue revisado para reflejar más de cerca el orden del latín (finis... principium sequentis). La versión española sigue esa estructura conceptual sin copiar mecánicamente el orden inglés previo.
  spanish_consistency_notes:
  - Se usó «era» para saeculum, en coherencia con un matiz temporal-histórico y no meramente «siglo».
  - Se mantuvo «Esaú» y «Jacob» como nombres propios tradicionales; no requieren adaptación terminológica.
  - La nota al pie preserva la alternativa estructural sugerida por el historial de revisión, sin duplicar el sentido principal.
