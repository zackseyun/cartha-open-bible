base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/009.yaml
  text: For Esau is the end of this age[a], and Jacob is the beginning of the one that follows.
  footnotes:
  - marker: a
    text: Or 'For Esau is the end of this age, and Jacob is the beginning of the one that follows.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
