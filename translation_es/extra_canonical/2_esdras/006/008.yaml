translation:
  language: es
  text: 'Y me dijo: «De Abraham a Abraham[a], porque de él nacieron Jacob y Esaú; pues la mano de Jacob sostenía desde el principio el talón de Esaú. Porque Esaú es el fin de este siglo, y el comienzo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La lectura latina «De Abraham a Abraham» es oscura; la explicación sobre Jacob y Esaú parece interpretarla más que resolver la dificultad. Los testigos derivados favorecen la lectura «De Abraham a Isaac».
    reason: textual_variant
lexical_decisions:
- source_word: dixit ad me
  english_pob_choice: And he said to me
  chosen_spanish: Y me dijo
  alternatives_spanish:
  - Y me habló
  - Y él me dijo
  lexicon: dico / λέγω
  rationale: Español directo y natural; conserva la relación narrativa sin añadir matices no presentes en el latín.
- source_word: ab Abraham usque ad Abraham
  english_pob_choice: From Abraham to Abraham
  chosen_spanish: De Abraham a Abraham
  alternatives_spanish:
  - Desde Abraham hasta Abraham
  - De Abraham a Isaac
  lexicon: ab ... usque ad ...
  rationale: Se mantiene la lectura del latín transmitido en el expediente, aunque es oscura; la nota explica la variante interpretativa corregida en la revisión y la dificultad textual.
- source_word: quoniam ab eo natus est Iacob et Esau
  english_pob_choice: because from him Jacob and Esau were born
  chosen_spanish: porque de él nacieron Jacob y Esaú
  alternatives_spanish:
  - porque de él nacieron Jacob y Esaú
  - porque de él nacieron Jacob y Esaú
  lexicon: quoniam / natus est
  rationale: Renderiza de forma transparente la causalidad y el nacimiento, sin introducir aclaraciones genealogicas ausentes en el texto base.
- source_word: manus enim Iacob tenebat ab initio calcaneum Esau
  english_pob_choice: for Jacob’s hand held Esau’s heel from the beginning
  chosen_spanish: pues la mano de Jacob tenía desde el principio el talón de Esaú
  alternatives_spanish:
  - pues Jacob tenía desde el principio el talón de Esaú agarrado con la mano
  - pues la mano de Jacob sujetaba desde el inicio el talón de Esaú
  lexicon: manus / tenebat / calcaneum
  rationale: Se conserva la imagen corporal concreta del latín. ‘Tenía’ reproduce el aspecto descriptivo del verbo sin forzar un equivalente idiomático demasiado interpretativo.
- source_word: Finis enim huius saeculi
  english_pob_choice: For Esau is the end of this age
  chosen_spanish: Porque Esaú es el fin de este siglo
  alternatives_spanish:
  - Porque Esaú es el fin de esta era
  - Pues Esaú es el fin de este mundo
  lexicon: finis / saeculum
  rationale: ‘Siglo’ conserva el valor de saeculum como período o era histórica, evitando reducirlo a ‘mundo’ y manteniendo la terminología bíblica posible en español.
- source_word: principium
  english_pob_choice: and the beginning
  chosen_spanish: y el comienzo
  alternatives_spanish:
  - y el principio
  - y el inicio
  lexicon: principium
  rationale: Se usa un sustantivo claro y moderno; ‘comienzo’ mantiene el paralelismo con ‘fin’ y no carga de matices filosóficos innecesarios.
theological_decisions:
- issue: Lectura textual de 'From Abraham to Abraham' frente a la corrección contextual a Isaac
  english_pob_reading: The phrase 'From Abraham to Abraham' is obscure in the Latin witness. The following Jacob/Esau explanation appears to interpret it rather than remove the difficulty.
  chosen_spanish_reading: De Abraham a Abraham
  alternative_spanish_readings:
  - De Abraham a Isaac
  - Desde Abraham hasta Isaac
  rationale: Para una edición basada en el testimonio latino proporcionado, el texto principal conserva la lectura transmitida. La nota admite la dificultad y deja constancia de la interpretación correctiva apoyada por los testigos hijos y por la revisión editorial.
  doctrine_reference: Crítica textual; triangulación de testigos en 4 Esdras
- issue: La expresión temporal 'saeculum' en una frase escatológica
  english_pob_reading: For Esau is the end of this age, and the beginning
  chosen_spanish_reading: Porque Esaú es el fin de este siglo, y el comienzo
  alternative_spanish_readings:
  - Porque Esaú es el fin de esta era, y el comienzo
  - Porque Esaú es el fin de este tiempo, y el comienzo
  rationale: ‘Siglo’ preserva el valor escatológico y tradicional de saeculum sin convertirlo en una paráfrasis demasiado moderna. Se evita ‘mundo’ porque podría oscurecer la idea de periodo/ciclo histórico.
  doctrine_reference: Escatología; semántica de saeculum
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por una corrección importante: de ''From Abraham to Isaac'' a ''From Abraham to Abraham'' para ajustarse al latín provisto, junto con la restauración del fragmento final ''and the beginning''. Esta versión española sigue el latín disponible en el paquete fuente y conserva la clausula fragmentaria final, dejando constancia de la variante textual y de la lectura correcta sugerida por los testigos derivados en la nota.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva 'Esaú' y 'Jacob' con la forma española estándar.
  - Se evita armonizar el pasaje con Génesis más allá de lo que permite el propio contexto latino y la nota textual.
  - Se traduce 'saeculum' como 'siglo' para mantener la terminología bíblica y la tensión escatológica.
