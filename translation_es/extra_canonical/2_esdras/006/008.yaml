  yaml_path: translation/extra_canonical/2_esdras/006/008.yaml
  text: And he said to me[6:8], “From Abraham to Abraham, because from him Jacob and Esau were born; for Jacob’s hand held Esau’s heel from the beginning. For Esau is the end of this age[a], and the beginning
