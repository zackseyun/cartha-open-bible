translation:
  language: es
  text: y antes de que se alzaran las alturas del aire, y antes de que se nombraran las medidas de los firmamentos, y antes de que se midiera el escabel[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'estimara'. El latín aestimaretur puede expresar valoración, estimación o cálculo; por eso 'midiera' sigue la revisión inglesa, pero no agota el matiz posible del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: antequam extollerentur
  english_pob_choice: were lifted up
  chosen_spanish: se alzaran
  alternatives_spanish:
  - fueran levantadas
  - fueran alzadas
  lexicon: Latin extollo
  rationale: Extollerentur expresa elevación/levantamiento. En español, 'se alzaran' comunica bien el pasivo sin sonar rígido; mantiene la imagen de elevación espacial que el texto latino presenta.
- source_word: altitudines aerum
  english_pob_choice: the heights of the air
  chosen_spanish: las alturas del aire
  alternatives_spanish:
  - las alturas del aire
  - las elevaciones del aire
  lexicon: Latin altitudo, aer
  rationale: Se conserva la expresión cosmológica del latín con una formulación natural en español. 'Aire' mantiene el sustantivo concreto, y 'alturas' refleja altitudines sin introducir interpretaciones adicionales.
- source_word: antequam nominarentur mensurae firmamentorum
  english_pob_choice: the measures of the firmaments were named
  chosen_spanish: se nombraran las medidas de los firmamentos
  alternatives_spanish:
  - se designaran las medidas de los firmamentos
  - se dieran nombre a las medidas de los firmamentos
  lexicon: Latin nomino; mensura; firmamentum
  rationale: '''Nominarentur'' se traduce con ''nombraran'' para conservar el acto de dar nombre. ''Firmamentos'' mantiene el plural del latín, y ''medidas'' preserva mensurae sin ampliar el sentido a dimensiones matemáticas más precisas de lo que permite el texto.'
- source_word: antequam aestimaretur scabellum
  english_pob_choice: before the footstool was measured
  chosen_spanish: antes de que se midiera el estrado
  alternatives_spanish:
  - antes de que se estimara el estrado
  - antes de que se tasara el estrado
  lexicon: Latin aestimo; scabellum
  rationale: La revisión inglesa dejó 'was measured' como una solución prudente, aunque el latín aestimaretur puede sugerir más bien 'estimar/reckonar/appraise'. En español, 'se midiera' sigue el cauce de la versión auditada y evita introducir una valoración económica o abstracta que el contexto no exige. 'Estrado' conserva la idea de un reposapiés/footstool con un término bíblico comprensible.
theological_decisions:
- issue: Cosmología del orden previo a la creación medida y nombrada
  english_pob_reading: the heights of the air, the measures of the firmaments, and the footstool were all referenced as things not yet named or measured
  chosen_spanish_reading: las alturas del aire, las medidas de los firmamentos y el estrado aún no habían sido nombrados ni medidos
  alternative_spanish_readings:
  - las alturas del cielo
  - las dimensiones del firmamento
  - el escabel
  rationale: El verso describe un orden previo a la fijación y medición de realidades cósmicas y simbólicas. La traducción conserva esa secuencia sin resolverla hacia una cosmología moderna ni hacia una imagen devocional posterior. 'Estrado' mantiene el valor figurado y material de scabellum sin sustituirlo por una palabra más litúrgica que no está garantizada por el latín.
  doctrine_reference: Creación y soberanía divina sobre el orden del cosmos (cf. lenguaje bíblico de creación y medida, sin importar un sistema doctrinal específico)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa reciente que eliminó 'of Zion' por no estar en el latín y que prefirió 'was measured' frente a 'was weighed'. La línea española sigue el texto latino limpio y evita añadir 'de Sion'.
  spanish_consistency_notes:
  - Se mantuvo la secuencia polisindética con 'y' para reflejar el encadenamiento del latín y de la versión inglesa auditada.
  - Se evitó 'SEÑOR' u otras sustituciones teológicas porque este versículo no contiene el tetragrámaton ni referencias directas al nombre divino.
  - '''Firmamentos'' se conservó en plural para no aplanar la forma del latín.'
  - '''Estrado'' se eligió por ser comprensible en registro bíblico y no desplazar el referente con un término más técnico como ''reposapiés'' o más eclesiástico como ''escabel'' sin necesidad textual.'
