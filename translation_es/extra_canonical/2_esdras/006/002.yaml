    issue: «bases» debilita la correspondencia con fundamenta
    rationale: El latín fundamenta y el inglés auditado «foundations» apuntan más directamente a «fundamentos» que a «bases». «Bases» es posible, pero menos preciso y algo menos elevado en este contexto cosmológico.
  - severity: low
    issue: La pasiva perifrástica «fueran establecidas» es menos natural que «se establecieran»
    rationale: Ambas son fieles, pero en español bíblico moderno «se establecieran los fundamentos» suena más fluido sin pérdida de sentido.
  revised_spanish_text: y antes de que resonaran las voces de los truenos, y antes de que brillaran los destellos de los relámpagos, y antes de que se establecieran los fundamentos del paraíso,
