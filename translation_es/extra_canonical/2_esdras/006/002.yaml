translation:
  language: es
  text: y antes de que resonaran las voces de los truenos, y antes de que brillaran los destellos de los relámpagos, y antes de que se establecieran los fundamentos del paraíso,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: antequam sonarent voces tonitruum
  english_pob_choice: before the voices of the thunders sounded
  chosen_spanish: antes de que resonaran las voces de los truenos
  alternatives_spanish:
  - antes de que sonaran las voces de los truenos
  - antes de que retumbaran las voces de los truenos
  lexicon: antequam → antes de que; sonarent → resonaran/sonaran; voces tonitruum → voces de los truenos
  rationale: «Resonaran» conserva el efecto auditivo solemne del latín sin caer en un calco demasiado rígido. Mantiene la pluralidad de «voces» y el genitivo «de los truenos» con una construcción natural en español.
- source_word: antequam splenderent nitores coruscuum
  english_pob_choice: before the flashes of the lightnings shone
  chosen_spanish: antes de que brillaran los destellos de los relámpagos
  alternatives_spanish:
  - antes de que resplandecieran los relámpagos
  - antes de que relampaguearan los fulgores de los relámpagos
  lexicon: splenderent → brillaran/resplandecieran; nitores → destellos/fulgores; coruscuum → relámpagos
  rationale: «Destellos» reproduce bien nitores y evita duplicar el verbo de forma extraña. «Brillaran» es una forma directa y clara para splenderent; «relámpagos» comunica coruscuum de modo inteligible para el lector actual.
- source_word: antequam confirmarentur fundamenta paradisi
  english_pob_choice: before the foundations of paradise were established
  chosen_spanish: antes de que fueran establecidas las bases del paraíso
  alternatives_spanish:
  - antes de que fueran afirmados los fundamentos del paraíso
  - antes de que se establecieran los fundamentos del paraíso
  lexicon: confirmarentur → fueran establecidas/afirmados; fundamenta → bases/fundamentos; paradisi → del paraíso
  rationale: «Fueran establecidas» sigue la revisión inglesa y naturaliza confirmarentur en un pasivo adecuado al español. «Bases» es más idiomático que «fundamentos» en este contexto, aunque se conserva el sentido estructural de una fundación cósmica.
theological_decisions:
- issue: Lenguaje de «paraíso» como lugar primordial
  english_pob_reading: the foundations of paradise were established
  chosen_spanish_reading: las bases del paraíso fueron establecidas
  alternative_spanish_readings:
  - los fundamentos del paraíso fueron establecidos
  - las bases del huerto fueron establecidas
  rationale: Se conserva «paraíso» porque el latín lo dice explícitamente y el texto no justifica sustituirlo por «huerto» o «jardín». La formulación mantiene el valor cósmico/primordial del pasaje sin introducir una reinterpretación.
  doctrine_reference: 2 Esdras 6:2; uso descriptivo del orden creado, no doctrina definida
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del audit trail: se adopta «fueron establecidas» para confirmar la idea de confirmarentur con un pasivo formal y natural, en lugar de una equivalencia más mecánica como «fueron hechas firmes».'
  spanish_consistency_notes:
  - Se mantiene un registro solemne y elevado acorde con la literatura apocalíptica.
  - Se evita introducir «SEÑOR» u այլ terminología no presente en el latín.
  - «Paraíso» se conserva de forma consistente con el source_payload y el inglés auditado.
