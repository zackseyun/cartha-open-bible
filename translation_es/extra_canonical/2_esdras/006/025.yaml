base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/025.yaml
  text: And it will be that everyone who is left from all these things that I have foretold to you will be saved and will see my salvation and the end of my age[a].
  footnotes:
  - marker: a
    text: Or 'everyone who is left from all these things'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:51Z'
    unchanged: false
    changes_summary: Revised 'remains out of all these things' to 'is left from all these things' for more natural and accurate rendering of derelictus fuerit ex omnibus istis; removed the unnecessary emphatic 'he' for smoother formal English.
translation:
  language: es
  text: Y acontecerá que todo el que quede de todas estas cosas que te he anunciado será salvado y verá mi salvación y el fin de mi era[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo el que sea dejado de entre todas estas cosas».'
    reason: alternative_reading
lexical_decisions:
- source_word: derelictus fuerit ex omnibus istis
  english_pob_choice: everyone who is left from all these things
  chosen_spanish: todo el que quede de todas estas cosas
  alternatives_spanish:
  - todo el que permanezca de todas estas cosas
  - todo el que sobreviva a todas estas cosas
  lexicon: derelinquo / restare
  rationale: El latín expresa a los que quedan o son dejados atrás después de las calamidades. ‘Quede’ conserva la pasiva/resultativa sin forzar un matiz más fuerte que el texto. ‘De todas estas cosas’ sigue de cerca ex omnibus istis y mantiene el alcance de los juicios anunciados.
- source_word: saluabitur
  english_pob_choice: will be saved
  chosen_spanish: será salvado
  alternatives_spanish:
  - será rescatado
  - alcanzará salvación
  lexicon: salvo
  rationale: ‘Será salvado’ reproduce con claridad la voz pasiva y el valor escatológico de saluabitur. ‘Rescatado’ es posible, pero ‘salvado’ es más directo y mejor alineado con el lenguaje bíblico sin convertirlo en paráfrasis.
- source_word: uidebit salutare meum
  english_pob_choice: will see my salvation
  chosen_spanish: verá mi salvación
  alternatives_spanish:
  - verá mi liberación
  - verá mi obra salvadora
  lexicon: salus / salutare
  rationale: La forma latina permite tanto ‘salvación’ como una idea más concreta de ‘rescate’. Se mantiene ‘mi salvación’ porque es la opción más fiel al sustantivo y conserva la tensión entre acto salvador y resultado salvador, tal como la POB inglesa.
- source_word: finem saeculi mei
  english_pob_choice: the end of my age
  chosen_spanish: el fin de mi era
  alternatives_spanish:
  - el fin de mi siglo
  - el fin de mi tiempo
  lexicon: saeculum
  rationale: ‘Saeculum’ aquí apunta a una era o período del orden presente, no al ‘siglo’ moderno en sentido cronológico estricto. ‘Era’ comunica mejor ese valor en español actual y evita una lectura demasiado moderna o científica.
theological_decisions:
- issue: Salvación final de los que quedan tras los juicios apocalípticos
  english_pob_reading: everyone who is left from all these things ... will be saved
  chosen_spanish_reading: todo el que quede de todas estas cosas ... será salvado
  alternative_spanish_readings:
  - todo el que permanezca...
  - todo el que sobreviva...
  rationale: La frase mantiene la idea de preservación divina para el remanente después de los acontecimientos anunciados, sin añadir detalles doctrinales que el latín no explicita. ‘Quede’ respeta la condición de haber quedado atrás tras el juicio.
  doctrine_reference: Escatología del remanente y salvación divina
- issue: ‘Mi salvación’ como posesivo divino
  english_pob_reading: my salvation
  chosen_spanish_reading: mi salvación
  alternative_spanish_readings:
  - mi liberación
  - mi obra salvadora
  rationale: Se conserva el posesivo porque el texto presenta la salvación como perteneciente a Dios en su manifestación histórica/escatológica. No se sustituye por una explicación doctrinal que el texto no exige.
  doctrine_reference: Lenguaje bíblico de la salvación divina
- issue: ‘Fin de mi era’ para saeculum
  english_pob_reading: the end of my age
  chosen_spanish_reading: el fin de mi era
  alternative_spanish_readings:
  - el fin de mi siglo
  - el fin de mi tiempo
  rationale: ‘Era’ evita el anacronismo de ‘siglo’ y comunica mejor el cierre de un orden histórico. El texto latino apocalíptico sugiere una etapa del mundo, no una unidad calendárica moderna.
  doctrine_reference: Escatología de los tiempos
translation_notes:
  revision_awareness: 'El texto latino recibido está incompleto al final de la cláusula siguiente (‘et mutabitur cor inhabitantium et’), pero la unidad traducida corresponde a la oración completa preservada en el audit trail inglés: salvación de los sobrevivientes, visión de la salvación divina y cierre de la era. La redacción española sigue la revisión inglesa más reciente, que prefirió ‘is left from’ por ser más natural que ‘remains out of’.'
  spanish_consistency_notes:
  - Se mantiene ‘salvado’ como pasivo de salus/salvo, en coherencia con el valor escatológico del contexto.
  - Se usa ‘era’ para saeculum, siguiendo el sentido de período histórico y evitando ‘siglo’ como falso amigo.
  - La nota a pie conserva la alternativa de ‘quede’ aunque el texto principal ya la usa, porque el inglés POB preservó una nota alternativa de alcance similar y en español puede percibirse una leve ambigüedad de ‘todo el que quede’.
