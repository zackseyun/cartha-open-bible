  text: 'Et dixit ad me: initium terreni orbis, et antequam starent exitus saeculi et antequam spirarent conuentiones uentorum, Et antequam sonarent uoces tonitruum, et antequam splenderent nitores coruscuum et antequam confirmarentur'
