base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/001.yaml
  text: And he said to me[a], “At the beginning of the earthly world, before the ends of the age were established, and before the gatherings of the winds blew,
  footnotes:
  - marker: a
    text: Or 'exits of the age'.
    reason: previous_rendering
  revision_pass:
