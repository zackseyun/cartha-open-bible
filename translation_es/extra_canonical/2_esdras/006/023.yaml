  text: et tuba canet cum sono, quam cum omnes audierint subito expavescent.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/023.yaml
  text: And the trumpet will sound, and when all hear it, they will suddenly be terrified.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:51Z'
    unchanged: false
    changes_summary: Removed 'with a blast' because the Latin 'cum sono' is sufficiently conveyed by 'will sound' here, avoiding redundancy while preserving the sense. Kept the rest unchanged.
translation:
  language: es
  text: Y la trompeta sonará, y cuando todos la oigan, se aterrorizarán de repente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: et tuba canet
  english_pob_choice: And the trumpet will sound
  chosen_spanish: Y la trompeta sonará
  alternatives_spanish:
  - Y sonará la trompeta
  - Y la trompeta resonará
  lexicon: tuba -> trompeta; canet -> sonará
  rationale: La imagen es literal y clara en español. «Sonará» reproduce bien el futuro simple del latín y evita añadir intensidad no presente en el texto. «Resonará» sería posible, pero sugiere más reverberación que el simple acto de sonar.
- source_word: cum sono
  english_pob_choice: will sound
  chosen_spanish: sonará
  alternatives_spanish:
  - sonará con sonido
  - sonará con estruendo
  lexicon: cum sono -> con sonido / sonido
  rationale: La revisión inglesa eliminó «with a blast» por considerarlo redundante frente a «will sound». En español, «sonará» ya comunica el sentido de cum sono sin necesidad de añadir un complemento artificial. Evita un calco como «con sonido».
- source_word: cum omnes audierint
  english_pob_choice: when all hear it
  chosen_spanish: cuando todos la oigan
  alternatives_spanish:
  - cuando todos la escuchen
  - cuando todos la hayan oído
  lexicon: omnes audierint -> todos la oigan
  rationale: El subjuntivo futuro o presente de valor eventual en español («oigan») refleja adecuadamente la condición temporal general. «La» retoma «la trompeta» y mantiene la referencia explícita del latín.
- source_word: subito expavescent
  english_pob_choice: they will suddenly be terrified
  chosen_spanish: se aterrorizarán de repente
  alternatives_spanish:
  - se espantarán de repente
  - quedarán sobrecogidos de repente
  lexicon: expavescent -> se aterrorizarán / se espantarán
  rationale: «Aterrorizados» o «se aterrorizarán» expresa con fuerza el latín expavescent. Se prefirió «se aterrorizarán» para conservar el impacto súbito y temible del pasaje; «se espantarán» sería algo más débil.
theological_decisions:
- issue: Naturaleza de la reacción escatológica
  english_pob_reading: they will suddenly be terrified
  chosen_spanish_reading: se aterrorizarán de repente
  alternative_spanish_readings:
  - se espantarán de repente
  - quedarán sobrecogidos de repente
  rationale: El latín describe una reacción inmediata y de miedo intenso. La traducción mantiene ese efecto sin suavizarlo ni convertirlo en una mera sorpresa. No se introduce interpretación adicional sobre la causa del terror, porque el texto solo afirma la reacción.
  doctrine_reference: Escatología descriptiva; fidelidad semántica al evento anunciado
translation_notes:
  revision_awareness: La revisión inglesa eliminó la expansión «with a blast» porque el latín cum sono ya está cubierto por «will sound». Por eso la versión española evita también una expansión equivalente y deja simplemente «sonará».
  spanish_consistency_notes:
  - Se mantiene «trompeta» como equivalente directo de tuba.
  - Se usa el pronombre átono «la» para remitir a «la trompeta» y evitar ambigüedad.
  - No se introduce vocabulario litúrgico adicional que el latín no exige.
