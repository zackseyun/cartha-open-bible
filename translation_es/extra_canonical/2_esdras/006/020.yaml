  text: 'quando suppleta fuerit humilitas Sion, Et cum supersignabitur saeculum quod incipiet pertransire, haec signa faciam: libri aperientur ante faciem firmamenti, et omnes uidebunt simul,'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/020.yaml
  text: 'when the humiliation of Zion is completed[a], and when the age that is beginning to pass away is marked out, I will perform these signs: the books will be opened before the face of the firmament, and all will see together.'
  footnotes:
  - marker: a
    text: 'Or ''and when the age that is beginning to pass away is sealed over, then I will show these signs: books will be opened before the face of the firmament, and all will see together.''.'
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:50Z'
    unchanged: false
    changes_summary: Changed 'is sealed' to 'is marked out' to better reflect supersignabitur without implying a sealing action too strongly; otherwise retained the draft.
translation:
  language: es
  text: 'cuando se complete la humillación de Sión, y cuando la era que empieza a pasar sea marcada[a], haré estas señales: se abrirán los libros delante del firmamento, y todos verán juntamente.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando la era que empieza a pasar sea sellada». La fuente y la tradición editorial oscilan entre una imagen de ser marcada/señalada y una de ser sellada; aquí se opta por «marcada» para no intensificar indebidamente el verbo.
    reason: textual_variant
lexical_decisions:
- source_word: quando suppleta fuerit humilitas Sion
  english_pob_choice: when the humiliation of Zion is completed
  chosen_spanish: cuando se complete la humillación de Sión
  alternatives_spanish:
  - cuando se concluya la humillación de Sión
  - cuando la humillación de Sión llegue a su fin
  lexicon: humilitas -> humillación; Sion -> Sión
  rationale: La fuente latina expresa el fin de un estado de humillación, no simplemente una emoción interna. «Se complete» conserva el aspecto perfecto y el cierre del proceso sin añadir matices ajenos.
- source_word: supersignabitur saeculum
  english_pob_choice: the age that is beginning to pass away is marked out
  chosen_spanish: la era que empieza a pasar sea marcada
  alternatives_spanish:
  - la era que empieza a pasar sea señalada
  - la era que empieza a pasar sea sellada
  lexicon: saeculum -> era; supersignabitur -> sea marcada
  rationale: La revisión inglesa evitó «sealed» por ser demasiado fuerte; «marcada» conserva la idea de quedar designada o señalada sin forzar un acto de sellado explícito. «Era» comunica mejor el valor temporal e histórico de saeculum en este contexto apocalíptico.
- source_word: haec signa faciam
  english_pob_choice: I will perform these signs
  chosen_spanish: haré estas señales
  alternatives_spanish:
  - realizaré estas señales
  - haré estos signos
  lexicon: faciam -> haré; signa -> señales
  rationale: «Haré» sigue el valor verbal de faciam y evita «mostrar», que no está en el latín. «Señales» funciona naturalmente en español para el plural de signa en un contexto apocalíptico.
- source_word: libri aperientur
  english_pob_choice: the books will be opened
  chosen_spanish: los libros serán abiertos
  alternatives_spanish:
  - se abrirán los libros
  lexicon: libri -> libros; aperientur -> serán abiertos
  rationale: Se conserva el pasivo y el artículo definido del inglés POB, reflejando el tono apocalíptico y la referencia a libros determinados por el contexto.
- source_word: ante faciem firmamenti
  english_pob_choice: before the face of the firmament
  chosen_spanish: delante del firmamento
  alternatives_spanish:
  - ante la faz del firmamento
  - en presencia del firmamento
  lexicon: ante faciem -> delante de; firmamentum -> firmamento
  rationale: «Delante del firmamento» reproduce la preposición y evita una calca demasiado dura. Aunque «faz» es posible, «firmamento» ya evoca la escena cósmica; la construcción mantiene claridad y reverencia.
- source_word: et omnes uidebunt simul
  english_pob_choice: and all will see together
  chosen_spanish: y todos verán juntamente
  alternatives_spanish:
  - y todos verán a una
  - y todos verán al mismo tiempo
  lexicon: omnes -> todos; simul -> juntamente
  rationale: «Juntamente» preserva la idea de simultaneidad comunitaria del latín y evita diluirla en una mera coincidencia temporal individual.
theological_decisions:
- issue: Restauración del orden correcto de la cláusula sobre la humillación de Sión
  english_pob_reading: when the humiliation of Zion is completed, and when the age that is beginning to pass away is marked out, I will perform these signs...
  chosen_spanish_reading: cuando se complete la humillación de Sión, y cuando la era que empieza a pasar sea marcada, haré estas señales...
  alternative_spanish_readings:
  - cuando la humillación de Sión se complete, y cuando la era que empieza a pasar sea marcada, haré estas señales...
  rationale: La revisión del texto fuente indicó que la cláusula sobre Sión pertenece a este versículo y debe leerse antes de la promesa de las señales. Se mantiene esa secuencia para respetar la estructura escatológica del pasaje.
  doctrine_reference: Apocalipsis judía/escatología del texto; fidelidad al orden del testimonio latino.
- issue: Valor de supersignabitur sin imponer un sellado demasiado específico
  english_pob_reading: is marked out
  chosen_spanish_reading: sea marcada
  alternative_spanish_readings:
  - sea sellada
  - sea señalada
  rationale: La tradición textual y la revisión inglesa muestran tensión entre «seal» y «mark out». «Marcada» preserva la ambigüedad sin convertir el verbo en una imagen más fuerte de sellamiento que la revisada.
  doctrine_reference: Principio de no sobreinterpretar imágenes apocalípticas; mantener la ambigüedad textual.
translation_notes:
  revision_awareness: Se tuvo en cuenta la corrección editorial que restituye «cuando la humillación de Sión se complete» en este versículo y no al final del anterior, y la revisión posterior que sustituyó «sellada» por una formulación más moderada para supersignabitur. También se evitó traducir faciam como «mostraré», ya que el latín exige «haré/performaré».
  spanish_consistency_notes:
  - Se mantiene «Sión» con tilde por uso español estándar.
  - Se usa «firmamento» para concordar con la tradición bíblica y el latín firmamentum.
  - Se conserva el pasivo «serán abiertos» para reflejar la construcción latina y el tono apocalíptico.
  - «Juntamente» se emplea como equivalente sobrio de simul, sin añadir matiz de simultaneidad técnica excesiva.
