  text: 'Et factum est cum loqueretur mihi, et ecce paulatim mouebatur locus super quem stabam super eum. Et dixit ad me:'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/029.yaml
  text: 'And it happened[a], while he was speaking to me, behold, the place on which I was standing was gradually moving. And he said to me:'
  footnotes:
  - marker: a
    text: Or 'And it happened, while he was speaking to me, behold, the place on which I was standing was gradually shaken.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:52Z'
    unchanged: false
    changes_summary: Changed 'was gradually shaken' to 'was gradually moving' to reflect Latin 'paulatim mouebatur' more directly and neutrally.
translation:
  language: es
  text: 'Y sucedió[a] que, mientras me hablaba, he aquí que el lugar sobre el que yo estaba se iba moviendo poco a poco. Y me dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y sucedió, mientras me hablaba, he aquí que el lugar sobre el que yo estaba se iba sacudiendo poco a poco».'
    reason: Preservar la alternativa documentada en la auditoría inglesa para 'paulatim mouebatur' como lectura previa significativa.
lexical_decisions:
- source_word: Et factum est
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: Latin factum est
  rationale: Formula narrativa idiomática en español; ‘sucedió’ conserva el carácter de introducción narrativa sin sonar demasiado arcaico.
- source_word: cum loqueretur mihi
  english_pob_choice: while he was speaking to me
  chosen_spanish: mientras me hablaba
  alternatives_spanish:
  - mientras hablaba conmigo
  - cuando me estaba hablando
  lexicon: Latin loqueretur mihi
  rationale: Mantiene la simultaneidad del gerundivo/imperf. latino con una construcción natural en español.
- source_word: paulatim mouebatur
  english_pob_choice: was gradually moving
  chosen_spanish: se iba moviendo poco a poco
  alternatives_spanish:
  - se movía gradualmente
  - era movido poco a poco
  lexicon: Latin paulatim mouebatur
  rationale: ‘Mouebatur’ es imperfecto pasivo/deponente en el contexto de movimiento observable; ‘se iba moviendo poco a poco’ conserva la gradualidad y evita ‘sacudido’, que el seguimiento revisado del inglés descartó.
- source_word: locus super quem stabam
  english_pob_choice: the place on which I was standing
  chosen_spanish: el lugar sobre el que estaba yo
  alternatives_spanish:
  - el lugar donde estaba yo
  - el sitio sobre el que yo estaba
  lexicon: Latin locus super quem stabam
  rationale: ‘Sobre el que estaba yo’ refleja literalmente la relación espacial de ‘super quem’ y mantiene la escena con claridad; ‘lugar’ es el equivalente básico de locus.
- source_word: Et dixit ad me
  english_pob_choice: And he said to me
  chosen_spanish: Y me dijo
  alternatives_spanish:
  - Y me habló
  - Y me respondió
  lexicon: Latin dixit ad me
  rationale: Cláusula final explícita en el segmento latino proporcionado; debe traducirse aunque en algunas versificaciones modernas inicie el siguiente versículo.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para pasar de ‘was gradually shaken’ a ‘was gradually moving’, y el latino proporcionado añade explícitamente ‘Et dixit ad me:’ al cierre del segmento; por eso el español conserva el movimiento gradual y traduce también la cláusula final.
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ porque no aparece en el texto fuente.
  - No se introduce lenguaje teológico adicional; el versículo es narrativo-descriptivo.
  - Se mantiene un registro bíblico sobrio y moderno, sin calco inglés innecesario.
