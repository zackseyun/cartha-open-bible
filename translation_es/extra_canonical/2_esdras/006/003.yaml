lexical_decisions:
- source_word: fundamenta
  english_pob_choice: foundations
  chosen_spanish: fundamentos
  alternatives_spanish:
  - cimientos
  - bases
  lexicon: fundamentum
  rationale: ‘Fundamentos’ conserva la imagen de base o soporte inicial sin volverla demasiado técnica; es natural en español y sigue de cerca el latín.
- source_word: paradisi
  english_pob_choice: paradise
  chosen_spanish: del paraíso
  alternatives_spanish:
  - del jardín
  - del huerto
  lexicon: paradisus
  rationale: ‘Paraíso’ es el equivalente directo y más transparente para el término latino; ‘jardín/huerto’ sería una interpretación contextual no garantizada por este segmento.
- source_word: decores flores
  english_pob_choice: beautiful flowers
  chosen_spanish: las bellas flores
  alternatives_spanish:
  - las hermosas flores
  - las flores hermosas
  lexicon: decor, flos
  rationale: ‘Bellas flores’ reproduce el adjetivo de belleza del original con dignidad literaria y evita una paráfrasis más libre.
- source_word: motus uirtutes
  english_pob_choice: powers of the movements
  chosen_spanish: las potencias de los movimientos
  alternatives_spanish:
  - las fuerzas de los movimientos
  - las potencias del movimiento
  lexicon: motus, virtus
  rationale: Se mantiene la tensión léxica del inglés POB entre motus y virtutes con ‘movimientos’ y ‘potencias’, sin resolverla hacia una lectura más interpretativa como ‘terremotos’ o ‘fuerzas’.
theological_decisions:
- issue: Lectura de motus como fenómeno cósmico o como ‘movimiento’ abstracto
  english_pob_reading: powers of the movements
  chosen_spanish_reading: las potencias de los movimientos
  alternative_spanish_readings:
  - las potencias de los terremotos
  - las fuerzas del movimiento
  rationale: La revisión inglesa más reciente volvió a una traducción más literal de motus. En español se conserva esa literalidad y la posible ambigüedad apocalíptica sin imponer una concreción no presente en el segmento conservado.
  doctrine_reference: Principio de cautela textual y léxica en pasajes apocalípticos; no se debe cerrar una imagen que el texto no completa.
translation_notes:
  revision_awareness: La revisión más reciente del inglés POB eliminó una interpretación anterior de ‘earthquakes’ y restauró una lectura más literal de motus como ‘movements’; el español sigue esa decisión y mantiene además el final abierto del segmento, que termina en ‘y antes de’.
  spanish_consistency_notes:
  - Se conservó el estilo de serie coordinada con repeticiones de ‘y antes de que’ para reflejar la estructura acumulativa del latín.
  - No se introdujo puntuación interpretativa ni cierre sintáctico que el fragmento fuente no ofrece.
  - Se eligió ‘paraíso’ en sentido directo, sin sustituirlo por un término explicativo.
  - La nota al pie está anclada en ‘bellas flores’ y ofrece una alternativa española breve y natural.
