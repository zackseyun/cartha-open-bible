review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el latín: Vae tibi = «¡Ay de ti!», Assur = «Asiria», abscondis iniquos = «escondes a los impíos», y mantiene «gens mala» como vocativo separado. Sin embargo, «contigo» para penes te suena algo forzado en español con este verbo y referente nacional; una leve reparación mejora la naturalidad sin alejarse del sentido base preservado en la auditoría inglesa.'
  spanish_quality_summary: El español es claro y digno, pero «escondes a los impíos contigo» no suena del todo idiomático. «entre ti» sería incorrecto; «en tu seno» es natural y conserva la idea de tenerlos dentro/bajo tu amparo. También conviene mantener el vocativo final como frase separada y abierta hacia el verso siguiente.
  glossary_alignment: No hay términos del glosario mayor en conflicto. «Asiria», «impíos» y el tono profético están bien. La revisión propuesta solo ajusta la expresión de penes te para mejor español.
  issues:
  - severity: medium
    issue: «contigo» para penes te resulta poco natural en español en esta construcción
    rationale: Aunque refleja de cerca «with you» del inglés auditado, en español «esconder a los impíos contigo» suena torpe. El latín penes te expresa cercanía, posesión o amparo; «en tu seno» transmite mejor esa relación sin sobreinterpretar.
  - severity: low
    issue: La nota alternativa incluye la misma mejora que debería pasar al texto principal
    rationale: Si «en tu seno» es la mejor solución española, no debe quedar relegada a nota como simple alternativa mientras el texto principal conserva una formulación menos natural.
  revised_spanish_text: ¡Ay de ti, Asiria, que escondes a los impíos en tu seno! ¡Nación malvada!
  revision_rationale: Se sustituye «contigo» por «en tu seno» para expresar de manera más idiomática en español el valor de penes te («en tu poder / bajo tu amparo / dentro de ti»), manteniendo la acusación profética y el vocativo separado. No hace falta nota porque la mejora no introduce nueva ambigüedad y el texto queda más fiel y legible en español.
