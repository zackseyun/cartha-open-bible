translation:
  language: es
  text: ¡Ay de ti, Asiria, que escondes a los impíos contigo[a]! ¡Nación malvada!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘que escondes a los impíos en tu seno, ¡oh nación malvada!’.
    reason: alternative_reading
lexical_decisions:
- source_word: Vae tibi
  english_pob_choice: Woe to you
  chosen_spanish: ¡Ay de ti!
  alternatives_spanish:
  - ¡Ay de ustedes!
  - ¡Ay de ti, Asiria!
  lexicon: Interjección de lamento/profético
  rationale: ‘Vae’ expresa un lamento o anuncio de juicio; ‘¡Ay de ti!’ es la forma española más natural y fiel para conservar el tono profético sin endurecerlo innecesariamente.
- source_word: Assur
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - Asur
  lexicon: Nombre propio geopolítico
  rationale: El contexto del pasaje apunta al imperio/nación, por lo que ‘Asiria’ comunica mejor el referente histórico que el nombre bíblico Asur, aunque este último podría conservarse como variante erudita.
- source_word: qui abscondis iniquos penes te
  english_pob_choice: who hide the unrighteous with you
  chosen_spanish: que escondes a los impíos contigo
  alternatives_spanish:
  - que escondes a los impíos en ti
  - que escondes a los impíos entre ti
  lexicon: abscondere / iniquos / penes te
  rationale: ‘abscondis’ pide ‘escondes’. Para ‘iniquos’, ‘impíos’ mantiene el valor moral fuerte de ‘unrighteous’. ‘penes te’ se rinde de manera natural como ‘contigo’, conservando la cercanía/posesión implícita sin un calco rígido.
- source_word: gens mala
  english_pob_choice: O evil nation
  chosen_spanish: ¡Nación malvada!
  alternatives_spanish:
  - ¡Oh, nación mala!
  - ¡Nación mala!
  lexicon: gens mala
  rationale: El latín funciona como vocativo independiente; en español, ‘¡Nación malvada!’ preserva el insulto profético y su enlace con la acusación anterior. ‘Malvada’ suena más idiomático que ‘mala’ y más fuerte que una simple calificación moral tenue.
theological_decisions:
- issue: Función vocativa y separación del juicio contra la nación
  english_pob_reading: Woe to you, Assyria... O evil nation,
  chosen_spanish_reading: ¡Ay de ti, Asiria...! ¡Nación malvada!
  alternative_spanish_readings:
  - ¡Ay de ti, Asiria, que escondes a los impíos contigo, nación malvada!
  - ¡Ay de ti, Asiria, que escondes a los impíos contigo! ¡Oh nación malvada!
  rationale: La puntuación y la sintaxis del latín sugieren que ‘gens mala’ es una invocación separada que prepara la continuación imperativa del verso siguiente. Mantenerla como exclamación independiente preserva ese movimiento retórico y evita fusionar indebidamente la acusación con la vocación de juicio.
  doctrine_reference: Retórica profética / juicio divino sobre las naciones
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de ‘with you’ a ‘in your midst’ y luego volvió a ‘with you’ para reflejar más directamente el latín penes te. El español mantiene esa tensión sin forzar un literalismo extraño, usando ‘contigo’ y dejando ‘Nación malvada’ como vocativo separado conforme al cierre sintáctico del latín.
  spanish_consistency_notes:
  - Se mantuvo ‘Asiria’ para el nombre geopolítico, en línea con el referente del texto latino.
  - Se eligió ‘impíos’ para ‘iniquos’ por su fuerza moral y su uso bíblico amplio en español.
  - ‘contigo’ evita el calco ‘con ti’ y conserva la idea relacional de penes te sin perder naturalidad.
  - La exclamación separada ‘¡Nación malvada!’ refleja la puntuación latina y mejora la transición al verso siguiente.
