translation:
  language: es
  text: Ninguno de ellos perecerá, porque yo los reclamaré de tu número. No te angusties[a], porque cuando llegue el día de la aflicción y la angustia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te angusties, porque cuando llegue el día de la aflicción y la angustia, otros llorarán y se entristecerán, pero tú estarás alegre y tendrás abundancia»'
    reason: previous_rendering
lexical_decisions:
- source_word: nemo ex eis interiet
  english_pob_choice: None of them will perish
  chosen_spanish: Ninguno de ellos perecerá
  alternatives_spanish:
  - No perecerá ninguno de ellos
  - Ninguno de ellos se perderá
  lexicon: nemo; intereo
  rationale: La forma latina expresa negación absoluta de pérdida o muerte. «Perecerá» conserva el valor fuerte de intereo sin suavizarlo a una mera desaparición.
- source_word: ego enim eos requiram de numero tuo
  english_pob_choice: for I will require them from your number
  chosen_spanish: porque yo los pediré de tu número
  alternatives_spanish:
  - porque yo los reclamaré de tu número
  - porque yo los pediré de entre los tuyos
  lexicon: requiram; numerus
  rationale: «Requeriré» sería demasiado técnico o jurídico en español moderno; «pediré» transmite la idea de reclamarlos o pedir cuenta de ellos. «De tu número» se mantiene de cerca para conservar la imagen cuantitativa del latín.
- source_word: Noli satagere
  english_pob_choice: Do not be anxious
  chosen_spanish: No te angusties
  alternatives_spanish:
  - No te preocupes
  - No te inquietes
  lexicon: noli; satago
  rationale: El imperativo negativo pide no afanarse o angustiarse. «Angusties» refleja mejor el tono serio que «preocupes» y armoniza con la aflicción mencionada después.
- source_word: cum uenerit enim dies pressurae et angustiae
  english_pob_choice: for when the day of distress and anguish comes
  chosen_spanish: porque cuando llegue el día de la aflicción y la angustia
  alternatives_spanish:
  - porque cuando venga el día de la tribulación y la angustia
  - porque cuando llegue el día de presión y angustia
  lexicon: dies pressurae et angustiae
  rationale: «Pressurae» admite «aflicción», «opresión» o «tribulación». Se eligió «aflicción» como término claro y digno en español, manteniendo «angustia» como segunda palabra para reproducir el paralelismo del latín.
theological_decisions:
- issue: La frase sobre no perecer y ser reclamados del número del destinatario
  english_pob_reading: None of them will perish, for I will require them from your number.
  chosen_spanish_reading: Ninguno de ellos perecerá, porque yo los pediré de tu número.
  alternative_spanish_readings:
  - Ninguno de ellos será perdido, porque yo los reclamaré de tu número.
  - Ninguno de ellos perecerá, porque yo los pediré de entre los tuyos.
  rationale: El texto afirma preservación y pertenencia bajo la custodia divina; no introduce una explicación doctrinal adicional. La redacción española conserva esa tensión entre seguridad y reclamación.
  doctrine_reference: Preservación divina / pertenencia al número asignado
translation_notes:
  revision_awareness: La revisión más reciente corrigió el inglés para ceñirse al latín y restauró las cláusulas iniciales omitidas. Por eso el español incluye tanto la afirmación negativa («Ninguno de ellos perecerá») como la cláusula de reclamación («porque yo los pediré de tu número»), y omite cualquier continuación posterior al corte del versículo provisto.
  spanish_consistency_notes:
  - Se conservó el paralelismo del latín sin añadir contenido ajeno al versículo.
  - «Angustia» se mantiene como sustantivo clave para reproducir el doblete latino con «aflicción».
  - No se sustituyó la imagen de número por una paráfrasis más interpretativa para respetar la precisión textual.
