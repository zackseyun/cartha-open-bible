base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/002/048.yaml
  text: They stood boldly for the name of the Lord. Then the angel said to me[a], “Go, announce to my people what and how great are the wonders of the Lord God that you have seen.”
  footnotes:
  - marker: a
    text: Or 'what sort of things and how great are the wonders'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:22Z'
    unchanged: false
    changes_summary: Restored the omitted first sentence from the Latin, removed the duplicated phrase in the draft, and smoothed the wording to reflect fortiter ('boldly') and qualia et quanta mirabilia ('what and how great are the wonders') in natural formal English.
translation:
  language: es
  text: 'Se mantuvieron valientemente por el nombre del Señor. Entonces el ángel me dijo: «Ve, anuncia a mi pueblo cuáles[a] y cuán grandes son las maravillas del Señor Dios que has visto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «qué clase de cosas y cuán grandes son las maravillas»; el latín qualia et quanta modifica directamente a mirabilia.'
    reason: alternative_reading
lexical_decisions:
- source_word: fortiter
  english_pob_choice: boldly
  chosen_spanish: con valentía
  alternatives_spanish:
  - audazmente
  - firmemente
  lexicon: Latin fortiter
  rationale: «Con valentía» conserva el sentido adverbial de firmeza y audacia sin sonar tan áspero como «audazmente» en español. Mantiene la fuerza del verbo latino en un registro bíblico natural.
- source_word: steterunt
  english_pob_choice: They stood
  chosen_spanish: Se mantuvieron
  alternatives_spanish:
  - estuvieron
  - permanecieron
  lexicon: Latin stare
  rationale: El contexto pide la idea de mantenerse firmes, no solo la de estar de pie físicamente. «Se mantuvieron» expresa mejor la perseverancia implícita en el latín.
- source_word: domini
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Yahvé
  lexicon: Latin dominus / divine-name convention
  rationale: Aquí el latín dice dominus, y la tradición de la frase en español fluye mejor como «el Señor». No se introduce «Yahvé» en esta clausula porque el texto latino no explicita el nombre divino y la frase fija «nombre del Señor» conserva la relación con el POB inglés.
- source_word: uade, adnuntia
  english_pob_choice: Go, announce
  chosen_spanish: Ve, anuncia
  alternatives_spanish:
  - Anda, proclama
  - Ve, proclama
  lexicon: Latin uadere + adnuntiare
  rationale: «Ve, anuncia» reproduce el mandato breve y directo del ángel. «Anuncia» es claro y suficientemente literal para adnuntia, sin sobrecargar el tono.
- source_word: qualia et quanta mirabilia
  english_pob_choice: what and how great are the wonders
  chosen_spanish: qué y cuán grandes son las maravillas
  alternatives_spanish:
  - qué clase de y cuán grandes son las maravillas
  - qué y cuán maravillosas son las maravillas
  lexicon: Latin qualia et quanta mirabilia
  rationale: 'Se conserva la paralelismo de dos preguntas/admiraciones: «qué» para qualia y «cuán grandes» para quanta. «Maravillas» traduce mirabilia de forma directa y bíblica.'
- source_word: domini dei
  english_pob_choice: of the Lord God
  chosen_spanish: del Señor Dios
  alternatives_spanish:
  - de Yahvé Dios
  - del Señor, Dios
  lexicon: Latin domini dei
  rationale: El genitivo doble se vierte de manera natural como «del Señor Dios». En español bíblico esta colocación es comprensible y conserva la acumulación reverente del original.
theological_decisions:
- issue: Nombre divino en la frase «nombre del Señor» y «Señor Dios»
  english_pob_reading: Lord / Lord God
  chosen_spanish_reading: Señor / Señor Dios
  alternative_spanish_readings:
  - Yahvé / Yahvé Dios
  - el Señor Yahvé
  rationale: Aunque la política general del proyecto favorece «Yahvé» para el tetragrámaton, en este verso el testimonio latino usa dominus y la formulación estable «nombre del Señor» resulta más natural y fiel al registro del pasaje. No se fuerza una reinterpretación del término que el latín no exige.
  doctrine_reference: Reverencia al nombre divino; coherencia con el testimonio textual latino
translation_notes:
  revision_awareness: 'La versión inglesa revisada restauró la primera oración latina («They stood boldly for the name of the Lord») y corrigió la construcción de qualia et quanta para mantener el paralelismo. La traducción española sigue esa revisión: incluye la cláusula inicial y refleja el doble valor interrogativo/exclamativo sin convertirlo en una paráfrasis.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y claro, evitando arcaísmos innecesarios.
  - «Con valentía» equilibra fidelidad semántica y naturalidad en español.
  - La nota [a] queda anclada en «anuncia[a]» para cumplir la correspondencia exacta entre texto y aparato.
  - No se introduce «Yahvé» en este verso porque la formulación heredada del latín y del inglés POB es «Señor / Señor Dios».
