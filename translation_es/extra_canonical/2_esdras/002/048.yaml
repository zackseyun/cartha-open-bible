    issue: Expresión española poco idiomática en «qué y cuán grandes son las maravillas»
    rationale: Aunque intenta reflejar qualia et quanta, en español suena incompleta y poco natural. «Cuáles y cuán grandes» preserva mejor la doble cualidad/interrogación sin romper el paralelismo.
  - severity: low
    issue: Redundancia parcial en «Se mantuvieron firmes con valentía»
    rationale: fortiter ya aporta la idea de valentía/firmeza, y steterunt la de mantenerse/estar firmes. Una formulación más compacta mejora el estilo sin perder sentido.
  - severity: medium
    issue: Marcador de nota mal ubicado
    rationale: La nota [a] comenta qualia et quanta mirabilia, pero el ancla está puesta en «anuncia». Debe colocarse junto a la frase correspondiente.
