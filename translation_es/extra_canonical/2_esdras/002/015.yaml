base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/002/015.yaml
  text: Mother, embrace your children; bring them up with gladness like a dove; strengthen their feet, for I have chosen you, says the Lord.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:09Z'
