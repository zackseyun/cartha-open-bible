    changes_summary: Replaced 'because' with 'for' for a more formal register and slightly smoother connection; removed the comma before 'like a dove' for more natural flow. Kept the rest unchanged as accurate to the Latin.
translation:
  language: es
  text: Madre, abraza a tus hijos; críalos con alegría como una paloma; fortalece sus pies, pues te he escogido, dice el Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Mater
  english_pob_choice: Mother
  chosen_spanish: Madre
  alternatives_spanish:
  - Madre mía
  - Oh madre
  lexicon: mater
  rationale: El vocativo latino simple se reproduce de forma natural con «Madre», sin añadir posesivos o exclamaciones que el texto no exige.
- source_word: complectere
  english_pob_choice: embrace
  chosen_spanish: abraza
  alternatives_spanish:
  - abrázate con
  - recibe en tus brazos
  lexicon: complectere
  rationale: El imperativo expresa una acción afectuosa y directa; «abraza» comunica el sentido físico y tierno con claridad en español.
- source_word: educa
  english_pob_choice: bring them up
  chosen_spanish: críalos
  alternatives_spanish:
  - alímentalos y críalos
  - cría a tus hijos
  lexicon: educare
  rationale: En contexto de crianza, «críalos» conserva la idea de formar y educar a los hijos sin alargar innecesariamente la frase.
- source_word: cum laetitia
  english_pob_choice: with gladness
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - alegremente
  lexicon: laetitia
  rationale: «Alegría» es la equivalencia más directa y natural para el sustantivo latino, manteniendo el tono de júbilo del pasaje.
- source_word: sicut columba
  english_pob_choice: like a dove
  chosen_spanish: como una paloma
  alternatives_spanish:
  - cual paloma
  - a la manera de una paloma
  lexicon: columba
  rationale: Se conserva la comparación explícita del latino con una construcción idiomática normal en español.
- source_word: confirma pedes eorum
  english_pob_choice: strengthen their feet
  chosen_spanish: fortalece sus pies
  alternatives_spanish:
  - afirma sus pasos
  - haz firmes sus pies
  lexicon: confirmare / pes
  rationale: El latino habla literalmente de los «pies»; se mantiene esa imagen corporal, siguiendo la fuerza concreta del original y del inglés POB.
- source_word: quoniam te elegi
  english_pob_choice: for I have chosen you
  chosen_spanish: porque te he escogido
  alternatives_spanish:
  - pues te he escogido
  - ya que te he escogido
  lexicon: quoniam / eligere
  rationale: «Porque» reproduce de manera transparente la relación causal del latino, y «te he escogido» mantiene el perfecto con valor de acción ya realizada.
- source_word: dicit dominus
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - dice el Señor Yahvé
  - afirma el Señor
  lexicon: dicit / dominus
  rationale: El latino dice simplemente «dominus»; el contexto de fórmula profética permite conservar «el Señor» como equivalente natural del título sin introducir un nombre divino que el texto latino aquí no explicita.
theological_decisions:
- issue: Vocativo mater aplicado a Sión/Jerusalén o figura materna colectiva
  english_pob_reading: Mother
  chosen_spanish_reading: Madre
  alternative_spanish_readings:
  - Madre Sión
  - Madre Jerusalén
  rationale: El texto latino presenta un vocativo sin explicitar el referente; en español se conserva la misma apertura referencial para no cerrar una identificación que el versículo no formula.
  doctrine_reference: Lectura figurativa/profética del lenguaje de Sión en la tradición apocalíptica
- issue: Comparación «sicut columba» y su vínculo con la crianza
  english_pob_reading: like a dove
  chosen_spanish_reading: como una paloma
  alternative_spanish_readings:
  - cual paloma
  - como paloma
  rationale: Se mantiene la imagen comparativa sin explicarla alegóricamente, ya que ni el latino ni el inglés auditado añaden una glosa interpretativa.
  doctrine_reference: Principio de conservar imágenes poéticas sin sobreinterpretación
- issue: Título divino final «dominus»
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - Yahvé
  rationale: Aunque el proyecto suele usar «Yahvé» para el nombre divino, aquí el source packet es latino y la fórmula final corresponde al título bíblico «dominus»; mantener «el Señor» respeta el nivel de explicitud del texto fuente y el audit trail inglés.
  doctrine_reference: Correspondencia de títulos divinos en textos latinos apocalípticos
translation_notes:
  revision_awareness: La revisión inglesa sustituyó «because» por «for» y quitó la coma antes de «like a dove» para un enlace más formal y fluido. El español sigue esa relación causal con «porque» y une naturalmente la comparación sin coma, manteniendo el mismo valor semántico y el ritmo del texto revisado.
  spanish_consistency_notes:
  - Se mantiene el registro profético y directo, con imperativos en segunda persona singular.
  - Se preserva la imaginería corporal de «pies» para no diluir la concreción del latín.
  - Se conserva «el Señor» en la fórmula final por fidelidad al título latino dominus en este contexto.
  - No se añaden notas al pie porque el verso no presenta variantes textuales o alternativas léxicas que requieran anclaje en el texto español.
