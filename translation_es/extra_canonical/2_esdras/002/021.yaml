revisions:
- from: No te burles del cojo ni del ciego[a]; admítelos a la visión de mi gloria. Guarda dentro de tus muros al anciano y al joven.
  to: No te burles; ampara al cojo y al ciego,[a] admítelos a la visión de mi gloria. Guarda dentro de tus muros al anciano y al joven.
  rationale: Se añade 'ampara' para representar fielmente tutare, que el borrador había omitido. Se reestructura la primera oración para conservar la serie de imperativos del latín y del inglés auditado. Se sustituye la nota actual por una alternativa sustancial alineada con la nota del POB en inglés, en vez de una mera variante estilística. No se requiere adjudicación adicional porque la corrección es directa y claramente sustentada por el latín dado.
