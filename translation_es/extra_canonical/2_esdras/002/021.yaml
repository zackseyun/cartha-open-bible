base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/002/021.yaml
  text: Do not mock; shelter the lame and the blind[a], admit them to the sight of my glory. Keep the old and the young within your walls.
  footnotes:
  - marker: a
    text: Or 'Care for the broken and the weak; do not mock the lame; shelter the maimed, and admit the blind to the sight of my glory.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:12Z'
    unchanged: false
    changes_summary: 'Revised to reflect the Latin more closely: removed the duplicated distinction between ''lame'' and ''maimed'' since mancum and caecum are ''lame'' and ''blind''; kept all elements while improving flow and formal register.'
translation:
  language: es
  text: No te burles; ampara al cojo y al ciego,[a] admítelos a la visión de mi gloria. Guarda dentro de tus muros al anciano y al joven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuida a los quebrantados y a los débiles; no te burles del cojo; ampara al lisiado, y admite al ciego a la visión de mi gloria».

      '
    reason: Preserva la alternativa previa documentada en el expediente inglés, adaptada al español como nota de historial de traducción.
lexical_decisions:
- source_word: inridere noli
  english_pob_choice: Do not mock
  chosen_spanish: No te burles
  alternatives_spanish:
  - No te mofes
  - No hagas burla
  lexicon: inridere
  rationale: El latín prohíbe el acto de ridiculizar; en español, «no te burles» comunica con naturalidad esa reprensión directa sin perder el tono exhortativo.
- source_word: mancum
  english_pob_choice: the lame
  chosen_spanish: el cojo
  alternatives_spanish:
  - el lisiado
  - el inválido
  lexicon: mancus
  rationale: La revisión inglesa ubicó correctamente el referente como «lame». En español, «cojo» es la equivalencia más directa y transparente para esta discapacidad motriz en registro bíblico actual.
- source_word: caecum
  english_pob_choice: the blind
  chosen_spanish: el ciego
  alternatives_spanish:
  - el invidente
  lexicon: caecus
  rationale: «Ciego» reproduce el sentido básico de caecus con claridad y sin tecnicismos innecesarios.
- source_word: ad uisionem claritatis meae admitte
  english_pob_choice: admit them to the sight of my glory
  chosen_spanish: admítelos a la visión de mi gloria
  alternatives_spanish:
  - admítelos a ver mi gloria
  - admítelos a la contemplación de mi gloria
  lexicon: visio / claritas
  rationale: «Visión de mi gloria» conserva la estructura del latín y la tensión entre ver y ser admitidos a la presencia gloriosa. Se evita suavizarlo demasiado con «contemplación» para no perder el matiz de acceso concedido.
- source_word: Senem et iuuenem intra muros tuos serua
  english_pob_choice: Keep the old and the young within your walls
  chosen_spanish: Guarda dentro de tus muros al anciano y al joven
  alternatives_spanish:
  - Conserva dentro de tus muros al anciano y al joven
  - Retén dentro de tus muros al anciano y al joven
  lexicon: senex / iuuenis / serua
  rationale: «Guarda» refleja el valor protector de serua mejor que un simple «mantén», y la inclusión de «dentro de tus muros» sigue de cerca el latín sin forzar una frase idiomática ajena al texto.
theological_decisions:
- issue: Inclusión de los vulnerables y acceso a la gloria
  english_pob_reading: Shelter the lame and the blind, admit them to the sight of my glory. Keep the old and the young within your walls.
  chosen_spanish_reading: No burlarse de los discapacitados; proteger a los vulnerables y permitirles acceso a la gloria de Dios; resguardar a toda la comunidad dentro de los muros.
  alternative_spanish_readings:
  - Leerlo solo como una instrucción social de hospitalidad
  - Entender «la visión de mi gloria» como mera metáfora de honor
  rationale: El imperativo une protección social y acceso cultual/teofánico. La frase española mantiene esa doble dimensión sin convertirla en una abstracción moralizada.
  doctrine_reference: Hospitalidad y cuidado del vulnerable; presencia/gloria divina
- issue: Alcance de «mi gloria»
  english_pob_reading: my glory
  chosen_spanish_reading: mi gloria
  alternative_spanish_readings:
  - su gloria
  - la gloria del Señor
  rationale: El posesivo de primera persona debe conservarse porque pertenece al hablante del texto; sustituirlo por una formulación impersonal o por «del Señor» ocultaría la voz original.
  doctrine_reference: Fidelidad al hablante divino del pasaje
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió el desajuste de límites en la versión inglesa: 2:21 debe incluir la prohibición de burlarse del cojo, la admisión a la visión de la gloria y la instrucción de guardar al anciano y al joven dentro de los muros. La redacción española sigue esa delimitación y no incorpora el material de 2:20 ni desplaza elementos a 2:22.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el latín conserva la primera persona («mi gloria»), no un sustituto reverencial.
  - «cojo» y «ciego» reflejan los sustantivos latinos concretos sin expandirlos a categorías más generales.
  - «guarda» mantiene el sentido protector de serua y encaja con el paralelo de resguardar dentro de los muros.
