translation:
  language: es
  text: lo que había preparado para ellos. El árbol de la vida será para ellos la fragancia de perfume[a], y no trabajarán ni se cansarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «El árbol de la vida será para ellos como la fragancia de ungüento». El latín también puede entenderse con un matiz comparativo, pero aquí se sigue como principal el valor predicativo de «in odorem unguenti».
    reason: alternative_rendering_preserving_audit_trail
lexical_decisions:
- source_word: quae praeparaueram illis
  english_pob_choice: which I had prepared for them.
  chosen_spanish: lo que había preparado para ellos.
  alternatives_spanish:
  - lo que les había preparado
  - lo que yo había preparado para ellos
  lexicon: praeparare → preparar
  rationale: El latín expresa una acción previa ya completada, por eso uso el pluscuamperfecto «había preparado». «Para ellos» conserva el dativo destinatario de illis sin añadir matiz no sustentado.
- source_word: Lignum uitae
  english_pob_choice: The tree of life
  chosen_spanish: El árbol de la vida
  alternatives_spanish:
  - El árbol de vida
  lexicon: lignum → árbol; vitae → de la vida
  rationale: La expresión estable en español bíblico y fiel al sintagma latino es «árbol de la vida». No se introduce una formulación más interpretativa.
- source_word: in odorem unguenti
  english_pob_choice: as the fragrance of perfume
  chosen_spanish: como la fragancia de perfume
  alternatives_spanish:
  - como fragancia de ungüento
  - como el olor de perfume
  lexicon: odor → fragancia; unguentum → perfume/ungüento
  rationale: El texto latino no obliga a «ungüento» en español, y el contexto de consuelo permite «perfume» como equivalente natural para el lector moderno. Mantengo «fragancia» para reproducir el campo sensorial de odor y evitar un simple «olor».
- source_word: non laborabunt neque fatigabuntur
  english_pob_choice: they shall neither labor nor grow weary
  chosen_spanish: no trabajarán ni se cansarán
  alternatives_spanish:
  - no se fatigarán ni se cansarán
  - no laborarán ni se fatigarán
  lexicon: laborare → trabajar; fatigare → cansar(se)
  rationale: «Trabajar» y «cansarse» comunican bien el paralelismo latino sin arcaísmo. «Fatigarse» es posible, pero «cansarse» es más natural en español y conserva la negación paralela.
theological_decisions:
- issue: Imagen del árbol de la vida como don escatológico consolador
  english_pob_reading: The tree of life shall be for them as the fragrance of perfume, and they shall neither labor nor grow weary.
  chosen_spanish_reading: El árbol de la vida será para ellos como la fragancia de perfume, y no trabajarán ni se cansarán.
  alternative_spanish_readings:
  - El árbol de la vida será para ellos como fragancia de perfume
  - El árbol de la vida les será como perfume
  rationale: Conservo la imagen sin domesticarla. La formulación refleja el valor predicativo de in odorem y mantiene el tono de promesa futura, sin añadir una glosa doctrinal que el latín no explicita.
  doctrine_reference: Esperanza escatológica y restauración final en la literatura apocalíptica; no se introduce una doctrina adicional.
translation_notes:
  revision_awareness: El texto latino completo de la unidad incluye «quae praeparaueram illis», que la versión inglesa previa había omitido y que la revisión posterior restituyó. También se corrigió el valor de «in odorem» para que no dependa del inglés «like the fragrance», sino del latín, que permite una lectura predicativa («como fragancia») más cercana al original.
  spanish_consistency_notes:
  - Se mantiene «árbol de la vida» como término fijo y transparente.
  - Se evita «SEÑOR» u otras sustituciones porque no hay aquí un tetragrámaton ni una cita directa del nombre divino.
  - «Perfume» se usa por claridad receptor, pero la nota preserva la alternativa «ungüento» para reflejar el latín.
  - 'El paralelismo final se conserva con dos miembros negativos coordinados: «no trabajarán ni se cansarán».'
