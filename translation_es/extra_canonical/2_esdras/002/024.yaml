    rationale: El imperativo latino «nutri» se centra en nutrir/alimentar. «Cría» en español puede incluir educar o criar en general, lo que amplía el sentido. «Nutre» conserva mejor el campo semántico y la imagen de la nodriza.
  revised_spanish_text: Pueblo mío, porque vendrá tu descanso. Buena nodriza, nutre a tus hijos y fortalece sus pies.
  revision_rationale: Se reemplaza «cría» por «nutre» para reflejar con mayor precisión el imperativo latino «nutri» y mantener la coherencia imagística con «nodriza», sin cambiar el sentido general ni el registro del pasaje.
