translation:
  language: es
  text: Pueblo mío, porque vendrá tu descanso. Buena nodriza, nutre a tus hijos y fortalece sus pies.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: populus meus
  english_pob_choice: My people
  chosen_spanish: Pueblo mío
  alternatives_spanish:
  - Mi pueblo
  lexicon: pueblo
  rationale: El vocativo latino y el inglés POB expresan una apelación directa. En español, «Pueblo mío» suena natural y solemne; conserva la relación posesiva y el tono de llamada profética.
- source_word: quia ueniet requies tua
  english_pob_choice: for your rest will come
  chosen_spanish: porque vendrá tu descanso
  alternatives_spanish:
  - porque tu descanso vendrá
  - pues vendrá tu reposo
  lexicon: descanso
  rationale: «Requies» se vierte mejor como «descanso» en un registro claro y bíblico. «Reposo» sería posible, pero «descanso» comunica con más transparencia el sentido esperado y mantiene la simpleza del latín.
- source_word: Nutrix bona
  english_pob_choice: Good nurse
  chosen_spanish: Buena nodriza
  alternatives_spanish:
  - Buena ama
  - Buena cuidadora
  lexicon: nodriza
  rationale: El latín «nutrix» alude a quien alimenta y cría. «Nodriza» preserva con precisión la imagen materna/cuidadora del original y evita suavizarla con un término demasiado general.
- source_word: nutri
  english_pob_choice: nourish
  chosen_spanish: cría
  alternatives_spanish:
  - alimenta
  - nutre
  lexicon: criar
  rationale: En este contexto, el imperativo no solo indica dar alimento, sino criar y sostener a los niños. «Cría» capta ese alcance con naturalidad en español.
- source_word: filios tuos
  english_pob_choice: your children
  chosen_spanish: a tus hijos
  alternatives_spanish:
  - a tus hijos e hijas
  - a tus niños
  lexicon: hijos
  rationale: El latín usa un término genérico en plural para los descendientes o hijos. «Hijos» es la opción más directa y adecuada; el texto no obliga a explicitar hijas.
- source_word: et confirma pedes eorum
  english_pob_choice: and strengthen their feet
  chosen_spanish: y fortalece sus pies
  alternatives_spanish:
  - y afirma sus pies
  - y da firmeza a sus pies
  lexicon: fortalecer
  rationale: «Confirma» puede implicar hacer firmes o fortalecer. «Fortalece sus pies» mantiene la imagen corporal y la fuerza del mandato sin calco rígido.
theological_decisions:
- issue: Invocación profética al pueblo y promesa de descanso
  english_pob_reading: My people, for your rest will come.
  chosen_spanish_reading: Pueblo mío, porque vendrá tu descanso.
  alternative_spanish_readings:
  - Mi pueblo, porque vendrá tu descanso.
  - Pueblo mío, pues vendrá tu descanso.
  rationale: No se atenúa el carácter de apelación directa ni la promesa futura. «Pueblo mío» conserva el vocativo; «porque» reproduce la conexión causal/consolatoria del latín y del inglés POB.
  doctrine_reference: Consuelo escatológico y lenguaje de restauración del pueblo de Dios.
- issue: Imagen de crianza como cuidado nutritivo
  english_pob_reading: Good nurse, nourish your children, and strengthen their feet.
  chosen_spanish_reading: Buena nodriza, cría a tus hijos y fortalece sus pies.
  alternative_spanish_readings:
  - Buena nodriza, nutre a tus hijos y fortalece sus pies.
  - Buena cuidadora, cría a tus hijos y afianza sus pies.
  rationale: No se neutraliza la imagen concreta de cuidado materno/nutricio. «Nodriza» y «cría» conservan el valor afectivo y físico del mandato, manteniendo la tensión entre alimento y formación.
  doctrine_reference: Lenguaje figurado de restauración y cuidado del pueblo, sin alegorizar más allá del texto.
translation_notes:
  revision_awareness: La revisión inglesa solo capitalizó el vocativo inicial; no introdujo cambios de sentido. La versión española mantiene el mismo contenido y tono formal, con una sola adaptación idiomática clara para naturalidad.
  spanish_consistency_notes:
  - Se conserva un registro bíblico formal sin arcaísmos innecesarios.
  - No se introduce «SEÑOR» ni terminología eclesiástica ajena al latín de este versículo.
  - «Descanso» se usa para requies por claridad; «reposo» queda como alternativa documentada.
  - La metáfora de «pies» se mantiene literal, ya que el latín no sugiere otra imagen.
