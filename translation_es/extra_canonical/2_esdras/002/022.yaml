translation:
  language: es
  text: Dondequiera que encuentres a los muertos, márcalos y encomiéndalos al sepulcro, y daré.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Mortuos
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los fallecidos
  - los difuntos
  lexicon: mortuus
  rationale: «Mortuos» designa a los muertos de forma directa y concreta; «los muertos» conserva la fuerza lexical sin suavizar el referente.
- source_word: ubi inueneris
  english_pob_choice: Wherever you find
  chosen_spanish: dondequiera que encuentres
  alternatives_spanish:
  - adondequiera que halles
  - donde los encuentres
  lexicon: ubi + invenio
  rationale: La construcción expresa alcance indefinido de lugar; «dondequiera que encuentres» reproduce bien el valor distributivo del latín en español natural.
- source_word: signans
  english_pob_choice: mark them
  chosen_spanish: márcalos
  alternatives_spanish:
  - señálalos
  - pon una marca sobre ellos
  lexicon: signo/signare
  rationale: El verbo latino pide una acción visible de señalamiento; «márcalos» es la opción más breve y fiel, sin introducir explicaciones ajenas al texto.
- source_word: commenda sepulchro
  english_pob_choice: commit them to the grave
  chosen_spanish: encomendalos al sepulcro
  alternatives_spanish:
  - entrégalos al sepulcro
  - confíalos al sepulcro
  lexicon: commendo + sepulchrum
  rationale: El latín sugiere ponerlos bajo custodia o entrega al lugar de entierro; «encomendalos al sepulcro» conserva la idea de entrega y preserva el matiz verbal de commendo, aun con un español algo más elevado.
- source_word: et dabo
  english_pob_choice: and I will give
  chosen_spanish: y yo daré
  alternatives_spanish:
  - y daré
  - y yo les daré
  lexicon: do/dare
  rationale: El texto latino queda abrupto e incompleto en el fragmento proporcionado; por eso se traduce solo lo que está explícito, sin completar el objeto omitido.
theological_decisions:
- issue: Fragmento incompleto al final del versículo
  english_pob_reading: and I will give
  chosen_spanish_reading: y yo daré
  alternative_spanish_readings:
  - y daré
  - y yo les daré
  rationale: Se conserva la incompletitud del testigo latino y del audit trail inglés revisado. No se suministra un complemento implícito, porque el versículo termina de forma truncada en el fragmento fuente.
  doctrine_reference: Fidelidad textual y respeto al estado del testimonio base; no se añade contenido no atestiguado.
translation_notes:
  revision_awareness: La revisión inglesa eliminó material ajeno al latino ('Keep safe within your walls the old and the young') y dejó únicamente 'Wherever you find the dead, mark them and commit them to the grave, and I will give'. La versión española sigue ese estado revisado y no reintroduce contenido ausente.
  spanish_consistency_notes:
  - Se usa «los muertos» para mantener el valor directo de mortuos.
  - Se conserva el tono formal pero comprensible de «encomendalos al sepulcro» para reflejar commenda sepulchro.
  - No se añade objeto a «y yo daré», porque el texto fuente termina abruptamente.
