    rationale: 'No impide el sentido, pero en español esta construcción final suena más natural sin la pausa: ''Pide la autoridad del Señor para que...''.'
  revised_spanish_text: El número de tus hijos[a], que deseabas, está completo. Pide la autoridad del Señor para que tu pueblo, que fue llamado desde el principio, sea santificado.
