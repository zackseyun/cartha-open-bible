base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/002/041.yaml
  text: The number of your children[a], whom you desired, is complete. Ask for the Lord’s authority, that your people, who were called from the beginning, may be sanctified.
  footnotes:
  - marker: a
    text: Or 'that your people may be sanctified, who were called from the beginning.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:19Z'
    unchanged: false
    changes_summary: Changed 'longed for' to 'desired' for closer lexical correspondence to optabas, and 'dominion' to 'authority' for a more natural rendering of imperium in this context.
translation:
  language: es
  text: El número de tus hijos[a], que deseabas, está completo. Pide la autoridad del Señor para que tu pueblo, que fue llamado desde el principio, sea santificado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que tu pueblo sea santificado, que fue llamado desde el principio»'
    reason: previous_rendering
lexical_decisions:
- source_word: Filiorum tuorum
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus descendientes
  - tus hijos e hijas
  lexicon: filius -> hijo
  rationale: El latín habla de 'hijos', y la opción española más directa y natural es 'tus hijos'. Mantiene la correspondencia con la lectura inglesa y no introduce una ampliación genealógica no sustentada por el texto.
- source_word: quos optabas
  english_pob_choice: whom you desired
  chosen_spanish: que deseabas
  alternatives_spanish:
  - a quienes anhelabas
  - que tanto querías
  lexicon: optare -> desear
  rationale: '''Deseabas'' refleja con precisión el valor de optabas, siguiendo la revisión inglesa que prefirió ''desired'' sobre ''longed for''. Evita intensificar el matiz hacia ''anhelabas'', que sería más interpretativo.'
- source_word: plenus est numerus
  english_pob_choice: The number ... is complete
  chosen_spanish: el número ... está completo
  alternatives_spanish:
  - se ha completado el número
  - el número ... se ha cumplido
  lexicon: plenus / numerus -> completo / número
  rationale: '''Está completo'' conserva la afirmación de plenitud del número sin añadir una idea de cumplimiento temporal o profético que el latín no explicita por sí mismo.'
- source_word: roga imperium domini
  english_pob_choice: Ask for the Lord’s authority
  chosen_spanish: Pide la autoridad del Señor
  alternatives_spanish:
  - Pide el imperio del Señor
  - Pide el dominio del Señor
  lexicon: imperium -> autoridad
  rationale: La revisión inglesa ya favorece 'authority' como lectura más natural en este contexto. En español, 'autoridad' mantiene el sentido de poder/delegación sin cargar 'imperio' con un matiz político demasiado fuerte.
- source_word: ut sanctificetur populus tuus
  english_pob_choice: that your people ... may be sanctified
  chosen_spanish: para que tu pueblo ... sea santificado
  alternatives_spanish:
  - a fin de que tu pueblo ... sea santificado
  - para santificar a tu pueblo
  lexicon: sanctificetur -> sea santificado
  rationale: '''Sea santificado'' conserva la pasiva y el tono litúrgico del latín. ''Para que'' reproduce la finalidad de ut y mantiene la relación verbal de la cláusula sin forzar una reformulación activa.'
- source_word: qui uocatus est ab initio
  english_pob_choice: who were called from the beginning
  chosen_spanish: que fue llamado desde el principio
  alternatives_spanish:
  - que fueron llamados desde el principio
  - llamado desde el principio
  lexicon: vocare -> llamar
  rationale: El latín presenta 'populus' singular colectivo con relativo singular ('qui vocatus est'). En español, 'tu pueblo, que fue llamado...' respeta esa concordancia colectiva y conserva el eco de elección desde el origen.
theological_decisions:
- issue: Naturaleza de 'imperium domini'
  english_pob_reading: Ask for the Lord’s authority
  chosen_spanish_reading: Pide la autoridad del Señor
  alternative_spanish_readings:
  - Pide el dominio del Señor
  - Pide el poder del Señor
  rationale: '''Autoridad'' evita reducir imperium a soberanía política o a simple fuerza. Conserva la idea de mandato eficaz o potestad reconocida, coherente con la lectura inglesa auditada.'
  doctrine_reference: Divine sovereignty / delegated authority
- issue: Relativo de 'populus tuus' y el alcance de 'quae/qui vocatus est'
  english_pob_reading: that your people, who were called from the beginning, may be sanctified
  chosen_spanish_reading: que tu pueblo, que fue llamado desde el principio, sea santificado
  alternative_spanish_readings:
  - que tu pueblo sea santificado, el cual fue llamado desde el principio
  - que tu pueblo, llamado desde el principio, sea santificado
  rationale: La colocación del relativo junto a su antecedente evita ambigüedad en español y sigue la corrección inglesa reciente. Mantiene intacta la afirmación de elección originaria ligada a la santificación.
  doctrine_reference: Election and sanctification
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente, que cambió ''longed for'' por ''desired'' y ''dominion'' por ''authority'', y también la reordenación del relativo para evitar una sintaxis incómoda. Además, se ha mantenido la estructura de dos oraciones del latín: primero la plenitud del número de los hijos, luego la petición relativa al pueblo santificado.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto para el nombre divino, pero aquí el latín dice 'domini' y la tradición auditada inglesa eligió 'the Lord'; por eso se conserva 'el Señor' en esta frase.
  - Se conserva el registro bíblico sobrio con 'sea santificado' y 'desde el principio', sin modernizar el contenido teológico.
  - No se introduce 'Cristo' ni 'Mesías' porque el pasaje no lo contiene.
  - La concordancia singular de 'tu pueblo, que fue llamado...' refleja el colectivo latino 'populus' y evita una pluralización innecesaria en español.
