translation:
  language: es
  text: y te daré el primer asiento en mi resurrección[a]. Descansa y reposa,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «el primer asiento en mi resurrección». La frase probablemente expresa prioridad u honor en la resurrección, no solo el acto de sentarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: tibi
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: Latin tibi
  rationale: Dativo de destinatario; en español se expresa naturalmente con pronombre átono de objeto indirecto.
- source_word: primam sessionem
  english_pob_choice: the first seat
  chosen_spanish: la primera silla
  alternatives_spanish:
  - el primer asiento
  - el primer puesto
  lexicon: Latin sessionem
  rationale: Se mantiene la correspondencia cercana con sessionem mediante un sustantivo de asiento; 'silla' conserva la imagen concreta y permite reflejar la nota de prioridad/honor del contexto.
- source_word: in resurrectione mea
  english_pob_choice: in my resurrection
  chosen_spanish: en mi resurrección
  alternatives_spanish:
  - durante mi resurrección
  - en la resurrección mía
  lexicon: Latin resurrectio
  rationale: '''Resurrección'' es el equivalente directo y claro; se conserva la posesión explícita con ''mi''.'
- source_word: Pausa
  english_pob_choice: Pause
  chosen_spanish: Pausa
  alternatives_spanish:
  - Descansa
  - Reposa
  lexicon: Late Latin pausare
  rationale: Se conserva el verbo-imperativo con un cognado transparente y natural en español, evitando calco torpe; además admite el valor de 'descansar' en latín tardío.
- source_word: quiesce
  english_pob_choice: rest
  chosen_spanish: descansa
  alternatives_spanish:
  - está en calma
  - quédate quieto
  lexicon: Latin quiescere
  rationale: '''Quiesce'' pide descanso y quietud; en español ''descansa'' transmite bien la invitación al reposo, complementando ''Pausa'' sin añadir nociones ajenas.'
theological_decisions:
- issue: La relación entre 'primera silla' y honor/prioridad en la resurrección
  english_pob_reading: The first place in my resurrection renders a Latin phrase literally involving a first seat. The sense is probably priority or honor in the resurrection, not merely sitting down.
  chosen_spanish_reading: la primera silla en mi resurrección
  alternative_spanish_readings:
  - el primer puesto en mi resurrección
  - el primer asiento en mi resurrección
  rationale: Se conserva la imagen literal de 'silla/asiento' para no perder la tensión semántica documentada entre literalidad y sentido honorífico. La formulación española sigue siendo inteligible sin resolver prematuramente el matiz.
  doctrine_reference: escatología y recompensa/resurrección
- issue: El doble imperativo final como invitación a reposo real
  english_pob_reading: Pause and rest
  chosen_spanish_reading: Pausa y descansa
  alternative_spanish_readings:
  - Pausa y reposa
  - Descansa y quédate quieto
  rationale: La pareja de imperativos reproduce el tono exhortativo y el reposo esjatológico indicado por el contexto; 'descansa' preserva la idea de paz y quietud sin intensificar indebidamente el texto.
  doctrine_reference: consuelo escatológico
translation_notes:
  revision_awareness: La versión inglesa más reciente volvió de 'Rest and be still' a 'Pause and rest' por la lectura directa de Pausa et quiesce. La presente versión española sigue esa revisión, manteniendo la cercanía léxica a ambos imperativos latinos y evitando añadir una glosa no sustentada en el texto base.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' y otras convenciones no pertinentes porque el pasaje no contiene el nombre divino.
  - '''Resurrección'' se mantiene con minúscula por tratarse de un sustantivo común en contexto, no de un título propio.'
  - No se emplea 'Cristo/Mesías' porque no aparece en el versículo.
  - No se añaden notas al pie porque el texto español no requiere marcadores para esta línea y el sistema de validación exige que todo marcador aparezca anclado en el texto.
