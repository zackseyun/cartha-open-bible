review_pass:
  verdict: revise
  source_alignment_summary: El latín dice literalmente «te daré el primer asiento/sesión en mi resurrección. Pausa y descansa/quédate en reposo». El borrador español acierta en «te daré» y «en mi resurrección», pero «primera silla» suena demasiado doméstico y material para sessionem, y «Pausa» no funciona como imperativo verbal natural en español. Además, el rastro POB documenta que el sentido probable de «primer asiento» es prioridad/honor, lo que conviene preservar con una nota.
  spanish_quality_summary: La redacción actual es comprensible, pero «la primera silla» resulta poco idiomática en registro bíblico y puede distraer. «Pausa y descansa» suena antinatural porque «pausa» en español moderno se usa sobre todo como sustantivo o tecnicismo. «Haz una pausa» sería natural, pero añade una perífrasis no presente; mejor usar «Descansa y reposa» o similar. Se necesita una solución más natural y digna sin perder el doble imperativo.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La cuestión principal es léxica: sessionem debe reflejar un «asiento/puesto» más que «silla», y pausa/quiesce deben expresarse con imperativos españoles naturales que conserven el campo semántico del reposo.'
  issues:
  - severity: medium
    issue: «la primera silla» para primam sessionem
    rationale: Aunque intenta conservar la imagen literal, «silla» en español suena demasiado concreta y cotidiana. «Asiento» mantiene mejor la correspondencia léxica con sessionem y evita una imagen doméstica innecesaria. Además permite sostener en nota el matiz de honor/prioridad.
  - severity: high
    issue: «Pausa» como imperativo verbal
    rationale: En español general «pausa» no funciona naturalmente como mandato verbal en este contexto; se percibe como sustantivo. El latín pausare puede significar reposar en latín tardío, por lo que conviene un imperativo español natural de descanso, no un cognado forzado.
  - severity: medium
    issue: Falta nota sobre el sentido de honor/prioridad de «primer asiento»
    rationale: 'El inglés POB conserva una nota importante: el latín habla literalmente de «primer asiento», pero probablemente implica primer lugar de honor en la resurrección. El español debería preservar esa información para no fijar una lectura demasiado literalista.'
  revised_spanish_text: y te daré el primer asiento en mi resurrección[a]. Descansa y reposa,
