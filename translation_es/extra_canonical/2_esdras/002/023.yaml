- from: y te daré la primera silla en mi resurrección. Pausa y descansa.
  to: y te daré el primer asiento en mi resurrección[a]. Descansa y reposa,
  rationale: Se reemplaza «silla» por «asiento» para una correspondencia más fiel y natural con sessionem, y se añade una nota que preserva el matiz documentado de honor/prioridad. Se sustituye «Pausa» por «Descansa» porque el cognado verbal no suena natural en español; «Descansa y reposa» conserva el doble imperativo de reposo sin introducir ideas ajenas. Se mantiene la coma final conforme al fragmento fuente.
