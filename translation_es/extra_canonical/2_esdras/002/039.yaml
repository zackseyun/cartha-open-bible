translation:
  language: es
  text: Los que han pasado de la sombra de la era han recibido del Señor túnicas espléndidas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que han pasado de la sombra de esta era y han recibido del Señor túnicas espléndidas».
    reason: alternative_rendering_preserving_prior_english_audit_trail
lexical_decisions:
- source_word: Qui se de umbra saeculi transtulerunt
  english_pob_choice: Those who have passed over from the shadow of the age
  chosen_spanish: Los que se han trasladado desde la sombra del siglo
  alternatives_spanish:
  - Los que han pasado de la sombra del siglo
  - Los que se han pasado desde la sombra de este siglo
  lexicon: qui; se transtulerunt; umbra; saeculi
  rationale: El latín presenta un sujeto en relativo independiente, por lo que «Los que...» conserva la función sintáctica sin forzar coordinación con el versículo anterior. «Se han trasladado» refleja con precisión el valor de transtulerunt en un movimiento de paso/traslado. «Sombra del siglo» mantiene la imagen de umbra saeculi y deja visible la tensión entre 'siglo' como era presente y como mundo presente.
- source_word: saeculi
  english_pob_choice: the age
  chosen_spanish: siglo
  alternatives_spanish:
  - edad
  - era
  - mundo
  lexicon: saeculum
  rationale: «Siglo» es un equivalente tradicional y comprensible para saeculum en este contexto apocalíptico, y permite conservar la ambigüedad entre 'edad' y 'mundo' sin explicar de más. Se evita fijar 'mundo' porque el latín no lo dice explícitamente.
- source_word: splendidas tunicas
  english_pob_choice: splendid garments
  chosen_spanish: túnicas espléndidas
  alternatives_spanish:
  - vestiduras espléndidas
  - ropas espléndidas
  - túnicas gloriosas
  lexicon: splendidas; tunicas
  rationale: «Túnicas» corresponde de manera bastante directa a tunicas, y «espléndidas» preserva el adjetivo de brillo/dignidad sin añadir interpretaciones litúrgicas. «Vestiduras» sería natural en español bíblico, pero «túnicas» es más cercano al texto latino.
- source_word: a domino
  english_pob_choice: from the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - de parte del Señor
  lexicon: dominus
  rationale: Aquí dominus traduce una referencia divina en el latín recibido, pero no hay una cita explícita del tetragrámaton ni una señal interna que obligue a 'Yahvé'. «Del Señor» es la forma más natural en español para el dativo de procedencia/regalo y mantiene el registro reverente.
theological_decisions:
- issue: Imagen de recompensa para los fieles que han atravesado la condición presente
  english_pob_reading: Those who have passed over from the shadow of the age have received splendid garments from the Lord.
  chosen_spanish_reading: Los que se han trasladado desde la sombra del siglo recibieron del Señor túnicas espléndidas.
  alternative_spanish_readings:
  - Los que han pasado de la sombra del siglo recibieron del Señor túnicas espléndidas.
  - Los que se han trasladado desde la sombra de esta era recibieron del Señor túnicas espléndidas.
  rationale: La frase mantiene la imagen apocalíptica de paso desde una 'sombra' hacia una recompensa dada por Dios, sin convertirla en comentario doctrinal adicional. El español conserva el sentido de acción completada y recompensa recibida, coherente con la lectura del inglés revisado y con la gramática del latín.
  doctrine_reference: No doctrinal expansion; imagery of eschatological reward in 2 Esdras 2:39.
translation_notes:
  revision_awareness: 'El latín limpio y la revisión posterior corrigen la sintaxis: se trata de una oración independiente con Qui como sujeto de acceperunt, no de una relativa dependiente del versículo anterior. También se conserva la lectura más sobria de saeculi como ''siglo/edad'', sin ampliar a ''mundo'' salvo en nota alternativa.'
  spanish_consistency_notes:
  - Se mantiene «túnicas» para una correspondencia más directa con tunicas y para evitar una domesticación innecesaria a «vestiduras».
  - Se usa «Señor» como equivalente reverente de dominus en el texto principal; no se introduce «Yahvé» porque el latín no marca el nombre propio divino.
  - La nota al pie preserva la alternativa inglesa documentada y ofrece una solución española equivalente sin desplazar el texto principal.
