revisions:
- from: Los que se han trasladado desde la sombra del siglo recibieron del Señor túnicas espléndidas[a].
  to: Los que han pasado de la sombra de la era han recibido del Señor túnicas espléndidas[a].
  rationale: Se revisa para mejorar la naturalidad y precisión del español sin apartarse del latín ni del audit trail inglés. «Han pasado» refleja mejor transtulerunt que «se han trasladado», y «la era» comunica saeculi con mayor claridad contemporánea que «siglo». Se mantiene la estructura de oración independiente, «del Señor» para a domino, y «túnicas espléndidas» por cercanía léxica al latín.
