review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva correctamente la estructura independiente del latín: «Qui ... acceperunt» se refleja bien como «Los que ... recibieron». También preserva la imagen central de pasar desde «la sombra» y recibir vestiduras del Señor. Sin embargo, «se han trasladado» suena menos natural y menos fiel al matiz de cruce/paso que el audit trail inglés («have passed over»), y «siglo» aquí resulta comprensible pero algo opaco en español actual para un contexto apocalíptico donde «era» comunica mejor saeculi sin imponer «mundo».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «trasladado desde la sombra del siglo» suena algo rígido y poco idiomático. «Han pasado de la sombra de la era» fluye mejor en español bíblico moderno y mantiene la metáfora. La nota al pie debe ajustarse al texto revisado y preservar la alternativa inglesa documentada sin crear redundancia.
  glossary_alignment: «del Señor» para a domino es aceptable aquí, ya que la fuente inmediata es latín dominus y no hay base suficiente para imponer «Yahvé». «túnicas espléndidas» es fiel a splendidas tunicas, aunque «vestiduras» también sería posible; no es necesario cambiarlo. La principal mejora léxica es saeculi -> «era» en vez de «siglo» por claridad contemporánea, y transtulerunt -> «han pasado» en vez de «se han trasladado».
  issues:
  - severity: medium
    issue: «se han trasladado» para transtulerunt
    rationale: Aunque posible, suena administrativo o físico en español moderno y no transmite tan naturalmente el paso/traslado escatológico de la imagen latina e inglesa. «Han pasado» o «han pasado más allá» refleja mejor el movimiento figurado.
  - severity: medium
    issue: «siglo» para saeculi
    rationale: Es tradicional, pero en español actual puede leerse demasiado literalmente como cien años. En un contexto apocalíptico, «era» comunica mejor «the age» del audit trail sin forzar «mundo».
  - severity: low
    issue: Ubicación de la nota alternativa
    rationale: La nota actual está anclada al final y conserva una alternativa basada en «este siglo». Conviene actualizarla para reflejar con precisión la alternativa documentada en inglés respecto de la segmentación de la oración.
  revised_spanish_text: Los que han pasado de la sombra de la era han recibido del Señor túnicas espléndidas[a].
  revised_footnotes:
  - marker: a
    text: O «los que han pasado de la sombra de esta era y han recibido del Señor túnicas espléndidas».
    reason: alternative_rendering_preserving_prior_english_audit_trail
  revision_rationale: Se revisa para mejorar la naturalidad y precisión del español sin apartarse del latín ni del audit trail inglés. «Han pasado» refleja mejor transtulerunt que «se han trasladado», y «la era» comunica saeculi con mayor claridad contemporánea que «siglo». Se mantiene la estructura de oración independiente, «del Señor» para a domino, y «túnicas espléndidas» por cercanía léxica al latín.
