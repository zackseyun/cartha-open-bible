revisions:
- from: 'Así dice el Señor: Yo saqué a este pueblo de la esclavitud, y les di mandamientos por medio de mis esclavos, los profetas, a quienes no quisieron escuchar, sino que invalidaron mis designios.'
  to: 'Así dice el Señor: yo saqué a este pueblo de la esclavitud, y les di mandamientos por medio de mis esclavos, los profetas, a quienes no quisieron oír, pero invalidaron mis consejos.'
  rationale: Se hace una reparación menor para ajustar mejor la adversativa latina («sed» → «pero»), acercar «consilia» al inglés POB auditado («counsels» → «consejos»), y pulir el español («yo» en minúscula; «oír» más directo para audire). No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
