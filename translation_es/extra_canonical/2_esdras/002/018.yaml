translation:
  language: es
  text: 'Te enviaré ayuda: mis siervos Isaías y Jeremías. Por su consejo he santificado y preparado para ti doce árboles cargados de diversos frutos,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Mittam tibi adiutorium
  english_pob_choice: I will send you help
  chosen_spanish: Te enviaré ayuda
  alternatives_spanish:
  - Te enviaré auxilio
  - Te mandaré ayuda
  lexicon: mitto -> enviar; adiutorium -> ayuda/auxilio
  rationale: El latín expresa una acción futura de envío y el sustantivo adiutorium con sentido de ayuda prestada. ‘Te enviaré ayuda’ conserva la sencillez y el valor directo del original sin volverlo más solemne de lo que exige el texto.
- source_word: pueros meos
  english_pob_choice: my servants
  chosen_spanish: mis siervos
  alternatives_spanish:
  - mis esclavos
  - mis servidores
  lexicon: pueri -> muchachos/siervos/siervos del rey; aquí, por contexto profético, siervos
  rationale: La POB inglesa interpreta la expresión como ‘my servants’, no como ‘boys’. En español, ‘siervos’ comunica el vínculo de servicio profético y evita la ambigüedad de ‘muchachos’. No se elige ‘esclavos’ porque el contexto no exige la fuerza léxica de δοῦλος, sino una designación funcional de mensajeros/profetas.
- source_word: Isaiam et Hieremiam
  english_pob_choice: Isaiah and Jeremiah
  chosen_spanish: Isaías y Jeremías
  alternatives_spanish:
  - Isaías y Jeremías
  lexicon: nombres propios bíblicos
  rationale: Se conservan los nombres tradicionales en español, plenamente transparentes y concordes con el uso bíblico normal.
- source_word: ad quorum consilium
  english_pob_choice: By their counsel
  chosen_spanish: Por su consejo
  alternatives_spanish:
  - Según su consejo
  - Por el consejo de ellos
  lexicon: consilium -> consejo; ad + ablativo de relación/instrumento
  rationale: 'La preposición latina introduce relación causal o instrumental: la acción de Dios se realiza en relación con el consejo de estos profetas. ‘Por su consejo’ mantiene esa relación sin sobrerrepresentarla.'
- source_word: sanctificaui
  english_pob_choice: I have sanctified
  chosen_spanish: he santificado
  alternatives_spanish:
  - he consagrado
  - he apartado para mí
  lexicon: sanctifico -> santificar/consagrar
  rationale: ‘Santificar’ refleja el verbo latino y preserva el matiz de dedicar algo a un propósito sagrado. ‘Consagrar’ es una alternativa válida, pero ‘santificado’ mantiene mejor la correspondencia directa con el original y con la POB inglesa.
- source_word: paraui tibi
  english_pob_choice: have prepared for you
  chosen_spanish: he preparado para ti
  alternatives_spanish:
  - he dispuesto para ti
  - te he preparado
  lexicon: paro -> preparar, disponer
  rationale: Se conserva el perfecto latino con un perfecto español natural. ‘Para ti’ retiene el destinatario explícito del dativo latino.
- source_word: arbores xii grauatās uariis
  english_pob_choice: twelve trees laden with various fruits
  chosen_spanish: doce árboles cargados de diversos frutos
  alternatives_spanish:
  - doce árboles cargados con varios frutos
  - doce árboles llenos de frutos diversos
  lexicon: arbores -> árboles; gravatas -> cargadas/pesadas; variis -> diversos
  rationale: El latín describe árboles ‘cargados’ con algo variado; la POB inglesa explicita ‘fruits’. En español, ‘cargados de diversos frutos’ traduce de modo natural la imagen y conserva la abundancia sin añadir más contenido del que el contexto ya supone.
theological_decisions:
- issue: Identidad y función de Isaías y Jeremías como ayuda divina
  english_pob_reading: I will send you help—my servants Isaiah and Jeremiah.
  chosen_spanish_reading: 'Te enviaré ayuda: mis siervos Isaías y Jeremías.'
  alternative_spanish_readings:
  - Te enviaré ayuda—mis siervos Isaías y Jeremías.
  - 'Te enviaré auxilio: mis siervos Isaías y Jeremías.'
  rationale: 'La cláusula identifica a los profetas como la ayuda enviada por Dios. La puntuación con dos puntos en español hace explícita la equivalencia explicativa del inglés sin alterar el contenido: la ayuda consiste en la mediación profética de Isaías y Jeremías.'
  doctrine_reference: Función profética y asistencia divina mediante sus mensajeros
- issue: Santificación de los árboles
  english_pob_reading: By their counsel I have sanctified and prepared for you twelve trees laden with various fruits,
  chosen_spanish_reading: Por su consejo he santificado y preparado para ti doce árboles cargados de diversos frutos,
  alternative_spanish_readings:
  - Por su consejo he consagrado y preparado para ti doce árboles cargados de diversos frutos,
  - Según su consejo he santificado y preparado para ti doce árboles cargados de diversos frutos,
  rationale: El texto mantiene la afirmación de que los árboles fueron apartados o dedicados por Dios para el destinatario. ‘Santificado’ conserva la tensión teológica del verbo y no la reduce a mera ‘preparación’.
  doctrine_reference: Consagración/santificación de dones preparados por Dios
translation_notes:
  revision_awareness: El contexto auditado indica alta concordancia (1.0) entre la fuente latina limpiada y la traducción inglesa POB, sin revisiones aplicadas. Por ello el español sigue de cerca la estructura de la POB inglesa, verificando cada elección contra el latín Bensly 1895/1875 y manteniendo la lectura estable.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico digno y claro, adecuado para publicación.
  - Se usa ‘Yahvé’ solo cuando el texto fuente lo exija; aquí no aparece el nombre divino.
  - ‘Siervos’ se emplea como equivalente funcional de pueri en este contexto profético, sin introducir la fuerza de ‘esclavos’.
  - La frase final conserva la imagen botánica con ‘frutos’ explícitos, siguiendo la decisión interpretativa ya presente en la POB inglesa.
