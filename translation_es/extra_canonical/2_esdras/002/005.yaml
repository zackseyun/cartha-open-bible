revisions:
- from: Pero yo te invoco, Padre, como testigo[a] contra la madre de los hijos, porque no quisieron guardar mi pacto.
  to: Pero yo te invoco, Padre, como testigo contra la madre de los hijos,[a] porque no quisieron guardar mi pacto.
  rationale: 'Se conserva el texto principal, que ya es fiel y natural, y se corrige la nota para alinearla con la decisión auditada sobre ''super'': no como alternativa española equiparable, sino como renderizado más literal del latín que en este contexto debe entenderse adversativamente.'
  reviewer_model: gpt-5.4
