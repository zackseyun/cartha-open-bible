    unchanged: false
    changes_summary: Changed 'call upon' to 'call on' for more natural formal English, and added 'a' before 'witness' to reflect the idiomatic sense of the Latin.
translation:
  language: es
  text: Pero yo te invoco, Padre, como testigo contra la madre de los hijos,[a] porque no quisieron guardar mi pacto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Lit. ''sobre la madre de los hijos''; aquí se entiende en sentido judicial: ''contra la madre de los hijos''.'
    reason: previous_rendering_clarification
lexical_decisions:
- source_word: testem invoco
  english_pob_choice: I call on you ... as a witness
  chosen_spanish: te invoco ... como testigo
  alternatives_spanish:
  - te llamo ... como testigo
  - te invoco ... en testimonio
  lexicon: invocar; testigo
  rationale: El latín usa una fórmula jurídica solemne ('testem invoco'). 'Invoco' conserva el valor formal de llamada solemne; 'como testigo' refleja el sentido idiomático de 'testem' sin volverlo más teológico de lo que el texto exige.
- source_word: super
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - en contra de
  lexicon: super; contra
  rationale: En el contexto judicial del latín tardío, 'super' con acusativo expresa adversidad/hostilidad. 'Contra' comunica mejor esa fuerza que 'sobre', que sería equívoco en español.
- source_word: matrem filiorum
  english_pob_choice: the mother of the children
  chosen_spanish: la madre de los hijos
  alternatives_spanish:
  - la madre de los niños
  - la madre de los hijos de ellos
  lexicon: mater; filii
  rationale: Se conserva la relación literal del genitivo ('de los hijos') sin añadir demostrativos ni suavizar el registro. 'Hijos' sigue más de cerca el latín que 'niños'.
- source_word: noluerunt ... seruare
  english_pob_choice: they were unwilling to keep
  chosen_spanish: no quisieron guardar
  alternatives_spanish:
  - no quisieron observar
  - no estuvieron dispuestos a guardar
  lexicon: nolle; servare
  rationale: '''No quisieron'' reproduce la negativa volitiva de ''noluerunt''. ''Guardar'' es una forma bíblica clara y fiel para ''servar'' en el sentido de observar/guardar un pacto.'
- source_word: testamentum meum
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi testamento
  - mi alianza
  lexicon: testamentum; pacto
  rationale: En este contexto, 'testamentum' se entiende como pacto/covenio. 'Pacto' es transparente en español y evita la ambigüedad hereditaria de 'testamento'.
theological_decisions:
- issue: Lenguaje judicial y hostil en 'testem invoco super ...'
  english_pob_reading: against the mother of the children
  chosen_spanish_reading: como testigo contra la madre de los hijos
  alternative_spanish_readings:
  - como testigo sobre la madre de los hijos
  - como testigo en favor de la madre de los hijos
  rationale: La revisión latina señala que la frase es adversativa en un marco judicial. 'Contra' preserva esa tensión y prepara el v. 6, donde continúa la imprecación contra la madre.
  doctrine_reference: None
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que corrige el valor de 'super' de 'sobre' a 'contra' en el contexto judicial, y se evitó el demostrativo 'these' porque no está en el latín. También se mantuvo 'a witness' como 'como testigo' en forma idiomática natural para el español.
  spanish_consistency_notes:
  - Se usa 'pacto' para testamentum en este pasaje por el sentido de alianza del texto.
  - Se conserva 'Padre' en vocativo directo, con puntuación natural en español.
  - La nota [a] preserva la alternativa histórica/ambigua señalada en el aparato inglés, aunque el texto principal sigue la lectura revisada.
