base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/002/005.yaml
  text: But I call on you[a], Father, as a witness against the mother of the children, because they were unwilling to keep my covenant,
  footnotes:
  - marker: a
    text: Or 'over the mother of these children'.
    reason: previous_rendering
  revision_pass:
