review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el latín: ''te invoco, Padre, como testigo'' refleja con fidelidad la fórmula jurídica ''testem invoco''; ''contra'' preserva correctamente el valor adversativo de ''super'' en este contexto; ''no quisieron guardar mi pacto'' comunica bien ''noluerunt testamentum meum servare''. La única desviación relevante está en la nota al pie: presenta ''sobre'' como alternativa, cuando el expediente inglés ya documentó que esa lectura fue corregida por ser menos fiel al sentido judicial hostil del latín.'
  spanish_quality_summary: 'El español es claro, natural y digno. ''Pero yo te invoco, Padre, como testigo contra la madre de los hijos'' suena bien en registro bíblico moderno. Puede mejorarse mínimamente la naturalidad con ''de ellos'' en la nota alternativa, pero no es necesario en el texto principal. El principal problema de calidad es editorial: la nota actual reintroduce una alternativa que el historial de auditoría considera inferior.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. ''Padre'', ''pacto'' y el lenguaje jurídico están bien resueltos. La revisión necesaria no afecta el glosario principal, sino la gestión de la nota: debe reflejar la alternativa histórica inglesa (''over the mother of the children'') de manera informativa, sin presentarla como opción española recomendable equivalente al texto principal.'
  issues:
  - severity: medium
    issue: 'La nota al pie reintroduce una alternativa semánticamente inferior: ''sobre la madre de los hijos''.'
    rationale: El expediente inglés documenta explícitamente que 'super' aquí debe entenderse en sentido judicial adversativo ('against'), no espacial o neutro ('over/sobre'). Mantener 'sobre' como simple alternativa de lectura en español debilita la rationale auditada y puede confundir al lector sobre el sentido correcto.
  - severity: low
    issue: La nota actual no deja claro que 'sobre' corresponde a un renderizado previo, no a una alternativa igualmente válida.
    rationale: La nota inglesa está marcada como 'previous_rendering', no como variante preferible del sentido fuente. En español conviene preservar ese carácter histórico en la razón y el texto de nota.
  revised_spanish_text: Pero yo te invoco, Padre, como testigo contra la madre de los hijos,[a] porque no quisieron guardar mi pacto.
  revised_footnotes:
  - marker: a
    text: 'Lit. ''sobre la madre de los hijos''; aquí se entiende en sentido judicial: ''contra la madre de los hijos''.'
    reason: previous_rendering_clarification
  revision_rationale: 'Se conserva el texto principal, que ya es fiel y natural, y se corrige la nota para alinearla con la decisión auditada sobre ''super'': no como alternativa española equiparable, sino como renderizado más literal del latín que en este contexto debe entenderse adversativamente.'
