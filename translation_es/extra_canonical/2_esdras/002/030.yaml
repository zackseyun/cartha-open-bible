    unchanged: false
    changes_summary: Changed 'children who sleep' to 'sleeping children' for more natural English while preserving the participial sense; changed 'because' to 'for' for a more formal register.
translation:
  language: es
  text: Recuerda a tus hijos dormidos, porque yo los sacaré de los lugares ocultos de la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Filios tuos
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos
  - tus niños
  lexicon: filios → hijos
  rationale: «Filios» en latín corresponde de manera natural a «hijos». Mantengo «tus» para reflejar el posesivo de segunda persona y el vínculo directo del mandato.
- source_word: dormientes
  english_pob_choice: sleeping
  chosen_spanish: dormidos
  alternatives_spanish:
  - dormidos
  - que duermen
  lexicon: dormientes → dormidos
  rationale: El participio latino funciona de forma adjetival; «dormidos» preserva esa cualidad en español con naturalidad y evita la perífrasis más explicativa «que duermen».
- source_word: memorare
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Recuerda
  - Haz memoria de
  lexicon: memorare → recordar
  rationale: El imperativo de «recordar» es la equivalencia más directa y readable. «Haz memoria de» es posible, pero suena más marcado y menos fluido en este contexto profético.
- source_word: educam de ... loci terrae
  english_pob_choice: I will bring them out from the hidden places of the earth
  chosen_spanish: los sacaré de los lugares ocultos de la tierra
  alternatives_spanish:
  - los sacaré de los lugares ocultos de la tierra
  - los sacaré de los escondrijos de la tierra
  lexicon: educam de + locus/terra → sacar de los lugares ocultos de la tierra
  rationale: «Sacaré» refleja bien el futuro de acción divina de «educam». «Lugares ocultos de la tierra» conserva el matiz literal de «de la tierra» sin introducir una interpretación más específica de sepultura o inframundo que el texto latino no explicita.
theological_decisions:
- issue: Destino de los 'hijos dormidos'
  english_pob_reading: sleeping children
  chosen_spanish_reading: hijos dormidos
  alternative_spanish_readings:
  - hijos dormidos
  - hijos que duermen
  rationale: Conservo la ambigüedad del participio latino y la lectura auditable del POB inglés. «Dormidos» puede sugerir sueño literal o una alusión más amplia a la muerte, pero el verso no desarrolla esa tensión aquí y no conviene resolverla de antemano.
  doctrine_reference: Lectura literal y figurativa del sueño como posible eufemismo bíblico; no se especifica aquí una doctrina de la resurrección.
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «children who sleep» a «sleeping children» y desde «because» a «for». En español, «porque» es la coordinación causal natural y suficientemente formal; no requiere nota porque el cambio de registro no altera el sentido. No hay variantes textuales reportadas en el paquete fuente; el latino limpio de Bensly ofrece una lectura estable para esta línea.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» como política general, pero este verso no contiene el nombre divino explícito.
  - Se evita introducir vocabulario eclesiástico tradicional no sustentado por el latín; el texto permanece cercano a la sintaxis y léxico del original.
  - «Lugares ocultos de la tierra» conserva la neutralidad semántica del latín sin precisar sepulcro, tumba o abismos.
