  source_alignment_summary: 'El borrador español refleja fielmente la fuente latina completa: conserva la oposición entre ''otros'' y ''tú'', el doble predicado de tristeza frente a alegría/abundancia, y la afirmación de que las naciones no podrán actuar contra la destinataria. También respeta la corrección del audit trail inglés que restituye la primera mitad del versículo.'
