  text: alii plorabunt et tristes erunt, tu autem hilaris et copiosa eris. Zelabunt gentes et nihil aduersus te poterunt, dicit dominus.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/002/027.yaml
  text: Others will weep and be sorrowful[a], but you will be cheerful and abundant. The nations will be jealous, and they will be able to do nothing against you, says the Lord.
  footnotes:
  - marker: a
    text: Or 'The nations will be jealous, but they will be able to do nothing against you, says the Lord.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:14Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Otros llorarán y estarán tristes, pero tú serás alegre y abundante. Las naciones sentirán celos, y no podrán hacer nada contra ti, dice el Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: alii plorabunt et tristes erunt
  english_pob_choice: Others will weep and be sorrowful
  chosen_spanish: Otros llorarán y estarán tristes
  alternatives_spanish:
  - Otros llorarán y serán afligidos
  - Otros llorarán y estarán apenados
  lexicon: alii; plorare; tristis
  rationale: Conserva el paralelismo latino con dos verbos coordinados. "Estarán tristes" comunica bien tristis sin añadir matiz doctrinal no presente en el texto.
- source_word: tu autem hilaris et copiosa eris
  english_pob_choice: but you will be cheerful and abundant
  chosen_spanish: pero tú serás alegre y abundante
  alternatives_spanish:
  - pero tú estarás alegre y abundante
  - pero tú serás gozoso y abundante
  lexicon: tu; hilaris; copiosus
  rationale: '"Alegre" es la opción más natural y fiel para hilaris. "Abundante" preserva copiosa en sentido de plenitud/provisión, sin reducirlo a una sola lectura más estrecha.'
- source_word: Zelabunt gentes
  english_pob_choice: The nations will be jealous
  chosen_spanish: Las naciones sentirán celos
  alternatives_spanish:
  - Las naciones tendrán celos
  - Las naciones estarán celosas
  lexicon: zelare; gentes
  rationale: El latín expresa envidia/celos más que celo religioso aquí; "sentirán celos" mantiene el valor relacional y evita una lectura piadosa ajena al contexto.
- source_word: nihil aduersus te poterunt
  english_pob_choice: they will be able to do nothing against you
  chosen_spanish: no podrán hacer nada contra ti
  alternatives_spanish:
  - nada podrán hacer contra ti
  - no tendrán poder contra ti
  lexicon: nihil; adversus; posse
  rationale: Versión directa y idiomática que conserva la negación absoluta y el sentido de impotencia frente al destinatario.
- source_word: dicit dominus
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - dice Yahvé
  - declara el Señor
  lexicon: dicit; dominus
  rationale: Aunque el proyecto normalmente distingue Yahvé para el nombre divino, aquí la fuente latina tiene dominus sin una señal inequívoca de un tetragrámaton subyacente en el fragmento dado; por eso se mantiene "el Señor" para no sobreinterpretar la forma textual.
theological_decisions:
- issue: Identidad del hablante final
  english_pob_reading: says the Lord
  chosen_spanish_reading: dice el Señor
  alternative_spanish_readings:
  - dice Yahvé
  - declara el Señor
  rationale: El cierre formula una declaración profética estándar. Dado que el testimonio latino suministrado usa dominus, la traducción no fuerza el nombre divino específico sin apoyo textual directo adicional.
  doctrine_reference: Nombre divino / prudencia textual
translation_notes:
  revision_awareness: La revisión inglesa restauró al inicio del versículo la cláusula previamente omitida ('Others will weep and be sorrowful, but you will be cheerful and abundant'), así que la versión española la incluye íntegramente en su lugar correspondiente y no traslada nada a otro versículo.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, sin arcaísmos innecesarios.
  - '"Señor" se usa aquí como reflejo del dominus latino recibido en el testimonio fuente.'
  - La pareja "alegre y abundante" conserva el contraste del latín sin expansión interpretativa.
