  rationale: 'La revisión hace el español más natural y fiel al sentido del latín y de la POB inglesa: «en esta era» comunica mejor «in saeculo / in the age» que «en la era», se elimina un «ellos» innecesario, se suaviza la doble explicitación de «Él», y se mejora la fluidez de la cláusula final sin perder la idea de valentía perseverante. La nota teológica se conserva sustancialmente igual.'
