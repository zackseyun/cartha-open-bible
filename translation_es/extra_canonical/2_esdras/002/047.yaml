translation:
  language: es
  text: 'Él me respondió y me dijo: «Es el Hijo de Dios, a quien confesaron en esta era[a]». Entonces comencé a exaltar a los que se habían mantenido valientes por el nombre del Señor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación explícita de la figura coronada como «el Hijo de Dios» es característica de una capa cristiana posterior del capítulo y no debe leerse sin más como parte del apocalipsis judío de los capítulos 3–14.
    reason: theological_note
lexical_decisions:
- source_word: ipse est filius dei
  english_pob_choice: He is the Son of God
  chosen_spanish: Él es el Hijo de Dios
  alternatives_spanish:
  - Es el Hijo de Dios
  - Él es el Hijo de Dios
  lexicon: filius -> Hijo; dei -> Dios
  rationale: Conservo la identificación cristológica explícita del latín y de la POB inglesa sin suavizarla. «Hijo de Dios» es la forma natural y fiel en español. Mantengo el sujeto explícito para reflejar el énfasis del original.
- source_word: in saeculo
  english_pob_choice: in the age
  chosen_spanish: en la era
  alternatives_spanish:
  - en el siglo
  - en el mundo
  - en la edad
  lexicon: saeculum -> era / siglo / mundo
  rationale: El latín saeculum admite varios valores; la POB inglesa optó por «the age». En español, «la era» conserva mejor ese sentido amplio, temporal y escatológico, sin reducirlo a «siglo» ni cargarlo con una lectura doctrinal más estrecha.
- source_word: ego autem magnificare eos coepi
  english_pob_choice: Then I began to magnify those who had stood bravely for the name of the Lord
  chosen_spanish: Entonces comencé a exaltar a los que habían permanecido valientes por el nombre del Señor
  alternatives_spanish:
  - Entonces comencé a engrandecer a los que habían resistido valientemente por el nombre del Señor
  - Entonces comencé a honrar a los que habían sido valientes por el nombre del Señor
  lexicon: magnificare -> exaltar / engrandecer / honrar; pro nomine Domini -> por el nombre del Señor
  rationale: «Magnificar» en español suena menos idiomático y puede perder fuerza; «exaltar» reproduce mejor el valor de elevar o ensalzar. «Permanecido valientes» intenta reflejar la idea de constancia heroica que la POB inglesa captó con «stood bravely», sin añadir un verbo más interpretativo como «resistido».
- source_word: Domini
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - Yahvé
  lexicon: Dominus -> Señor
  rationale: Aunque el proyecto español normalmente usa «Yahvé» para el nombre divino, aquí el latín dice «Domini» dentro de una fórmula cristiana fijada por el texto recibido y la POB inglesa la traduce como «the Lord». Mantengo «el Señor» para respetar el registro y la tradición textual del pasaje, sin forzar una retroversión al tetragrámaton que el latín no muestra explícitamente.
theological_decisions:
- issue: Identificación del personaje coronado como Hijo de Dios en una capa compositiva cristiana
  english_pob_reading: This explicit identification of the crowned figure as 'the Son of God' is a hallmark of the chapter's later Christian compositional layer and should not be read back uncritically into the Jewish apocalypse of chapters 3–14.
  chosen_spanish_reading: La identificación explícita de la figura coronada como «el Hijo de Dios» queda mantenida en el texto, pero sin reinterpretarla como si perteneciera sin más a toda la unidad apocalíptica anterior.
  alternative_spanish_readings:
  - «el Hijo de Dios» sin nota
  - «el Mesías»
  rationale: La POB inglesa preserva la afirmación del texto, pero advierte su posible procedencia de una capa cristiana posterior. En español conservo la lectura literal y añado una nota para no borrar esa tensión histórica y compositiva.
  doctrine_reference: Crítica textual e historia de la composición de 2 Esdras 2:47
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la última pasada de revisión: no se requieren cambios sustantivos. La única decisión sensible es conservar la nota crítica sobre la identificación del personaje como Hijo de Dios, en línea con la advertencia editorial inglesa.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para Domini en este contexto narrativo-litúrgico latino, aunque el proyecto normalmente prefiere «Yahvé» para el nombre divino cuando el original lo permite.
  - Se eligió «era» para saeculum por su amplitud semántica y porque evita estrechar el sentido temporal-teológico del original.
  - 'La puntuación y el orden respetan el flujo narrativo del latín: dicho directo, cierre de la identificación y transición a la reacción del narrador.'
