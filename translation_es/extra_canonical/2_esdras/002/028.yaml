source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: Manus meae tegent te, ne filii tui gehennam uideant. Iocundare,
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/002/028.yaml
  text: My hands will cover you, so that your children may not see Gehenna. Rejoice,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:14Z'
    unchanged: false
    changes_summary: Added the final imperative 'Rejoice,' to reflect the Latin Iocundare, which was omitted. Retained the rest of the wording as accurate and natural.
translation:
  language: es
  text: Mis manos te cubrirán, para que tus hijos no vean la Gehena. Alégrate,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Manus meae
  english_pob_choice: My hands
  chosen_spanish: Mis manos
  alternatives_spanish:
  - Mis manos
  - Las manos mías
  lexicon: manus -> manos
  rationale: El latín posee sentido posesivo claro; en español natural se expresa con posesivo antepuesto. Se conserva el plural y la imagen corporal sin añadir explicación.
- source_word: tegent te
  english_pob_choice: will cover you
  chosen_spanish: te cubrirán
  alternatives_spanish:
  - te cubrirán
  - te protegerán
  lexicon: tegere -> cubrir, proteger
  rationale: «Cubrirán» sigue de cerca el verbo latino y mantiene la imagen concreta. «Protegerán» explicita el efecto, pero suaviza la metáfora textual.
- source_word: filii tui
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos
  - tus descendientes
  lexicon: filii -> hijos
  rationale: El latín dice literalmente «hijos». «Descendientes» sería una ampliación interpretativa que no añade el texto fuente.
- source_word: gehennam
  english_pob_choice: Gehenna
  chosen_spanish: la Gehena
  alternatives_spanish:
  - la Gehena
  - el infierno
  lexicon: gehenna -> Gehena
  rationale: Se conserva el término propio «Gehena», como en la POB inglesa, porque tiene carga terminológica específica y no equivale sin más a «infierno».
- source_word: Iocundare
  english_pob_choice: Rejoice,
  chosen_spanish: Alégrate,
  alternatives_spanish:
  - Alégrate,
  - Goza,
  - Regocíjate,
  lexicon: iocundare -> alegrarse / regocijarse
  rationale: El imperativo latino expresa exhortación a la alegría. «Alégrate» es idiomático y digno en español; «regocíjate» sería más formal, pero menos natural.
theological_decisions:
- issue: Conservación del término Gehenna como lugar de juicio
  english_pob_reading: Gehenna
  chosen_spanish_reading: la Gehena
  alternative_spanish_readings:
  - el infierno
  - el lugar de castigo
  rationale: La fuente menciona Gehenna y la POB inglesa la preserva en forma transliterada. En español se mantiene el mismo término para no borrar la referencia histórica y escatológica específica.
  doctrine_reference: Mateo 5:22; Marcos 9:43-48 (uso bíblico de Gehenna)
- issue: Imperativo final omitido en versiones que cierran antes del mandato
  english_pob_reading: Rejoice,
  chosen_spanish_reading: Alégrate,
  alternative_spanish_readings:
  - Regocíjate,
  - Goza,
  rationale: La revisión auditada añadió el imperativo final por fidelidad al latín Iocundare. Debe quedar en el texto español para reflejar la exhortación completa.
  doctrine_reference: Fidelidad al texto fuente latino; revisión aplicada 2026-04-23
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió una omisión importante: el imperativo final Iocundare fue agregado en la POB inglesa como ''Rejoice,''. La presente versión española incorpora ese mandato explícitamente con ''Alégrate,''. Se mantiene también la metáfora concreta ''Mis manos te cubrirán'' y el término técnico ''la Gehena'' conforme al texto latino y al criterio auditado en inglés.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, sin arcaísmos innecesarios.
  - No se sustituye 'Gehena' por 'infierno' para conservar la terminología específica del texto.
  - El posesivo y el orden verbal se adaptan al español natural sin alterar el sentido literal.
