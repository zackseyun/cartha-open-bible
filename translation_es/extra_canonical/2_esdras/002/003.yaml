translation:
  language: es
  text: Yo los crié con alegría, y los perdí con duelo y tristeza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Educaui
  english_pob_choice: I raised you
  chosen_spanish: Yo los crié
  alternatives_spanish:
  - Yo los levanté
  - Yo los eduqué
  lexicon: Latin educare
  rationale: El latín educaui significa literalmente 'crié' o 'alimenté/crié hasta la madurez'; en español 'crié' conserva el acto de sacar a la crianza/custodia con naturalidad y sin cargar un matiz pedagógico excesivo que 'eduqué' podría sugerir.
- source_word: cum laetitia
  english_pob_choice: with gladness
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - con contento
  lexicon: Latin laetitia
  rationale: '''Alegría'' comunica bien el estado de regocijo del original y mantiene un registro bíblico claro en español contemporáneo.'
- source_word: amisi
  english_pob_choice: I lost you
  chosen_spanish: los perdí
  alternatives_spanish:
  - los eché de menos
  - los dejé ir
  lexicon: Latin amittere
  rationale: El verbo latino expresa perder, dejar ir o privar de presencia; 'los perdí' sigue de cerca la fuerza básica del texto y conserva la ambivalencia del sujeto que sufre la pérdida.
- source_word: cum luctu et tristitia
  english_pob_choice: with mourning and sorrow
  chosen_spanish: con duelo y tristeza
  alternatives_spanish:
  - con luto y tristeza
  - con lamento y tristeza
  lexicon: Latin luctus / tristitia
  rationale: '''Duelo'' refleja bien luctus como aflicción por pérdida, y ''tristeza'' corresponde de manera directa a tristitia. ''Luto'' sería posible, pero ''duelo'' es más natural y menos restringido al signo externo del luto.'
theological_decisions:
- issue: La frase expresa pérdida divina o del hablante, sin necesidad de suavizar la tensión emocional.
  english_pob_reading: I lost you with mourning and sorrow
  chosen_spanish_reading: los perdí con duelo y tristeza
  alternative_spanish_readings:
  - los dejé con duelo y tristeza
  - los perdí en duelo y tristeza
  rationale: 'Se conserva la tensión del original: el hablante no solo lamenta, sino que afirma haberlos ''perdido''. No se atenúa a una formulación más explicativa o menos directa.'
  doctrine_reference: Tensión literaria profética/poética sin ajuste doctrinal adicional
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y ningún cambio necesario; este borrador mantiene la lectura simple y directa del latín limpiado y coincide sustancialmente con la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantiene el trato de segunda persona plural implícito en 'los' conforme al inglés 'you' plural en este contexto.
  - No se introducen términos eclesiásticos técnicos ni se reemplaza la pérdida por una paráfrasis interpretativa.
