    timestamp: '2026-04-23T11:41:08Z'
    unchanged: false
    changes_summary: Replaced 'those others' with 'their' to reflect illorum more naturally and accurately; removed the unnecessary article in 'the everlasting tabernacles' for more natural English while preserving the plural; retained the formal structure and final comma to match the source punctuation.
translation:
  language: es
  text: Y tomaré para mí la gloria de ellos, y les daré tabernáculos eternos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: sumam mihi
  english_pob_choice: I will take for myself
  chosen_spanish: tomaré para mí
  alternatives_spanish:
  - tomaré para mí mismo
  - tomaré para mí la gloria de ellos
  lexicon: sumere + mihi
  rationale: El latín expresa apropiación personal con valor reflexivo/dativo; 'tomaré para mí' reproduce bien la dirección y evita sobreinterpretar con un giro más idiomático que el texto no exige.
- source_word: gloriam illorum
  english_pob_choice: their glory
  chosen_spanish: la gloria de ellos
  alternatives_spanish:
  - su gloria
  - la gloria de aquellos
  lexicon: gloria + illorum
  rationale: '''illorum'' distingue a un grupo previamente mencionado; en español, ''de ellos'' mantiene esa referencia sin resolverla demasiado pronto con un posesivo ambiguo.'
- source_word: dabo eis
  english_pob_choice: I will give them
  chosen_spanish: les daré
  alternatives_spanish:
  - daré a ellos
  - les concederé
  lexicon: dare + eis
  rationale: '''Les daré'' es la forma natural y fiel del dativo de destinatario en español, sin añadir matiz de concesión que el latín no requiere.'
- source_word: tabernacula aeterna
  english_pob_choice: everlasting tabernacles
  chosen_spanish: tabernáculos eternos
  alternatives_spanish:
  - moradas eternas
  - tiendas eternas
  lexicon: tabernaculum + aeternus
  rationale: Se conserva el sustantivo plural 'tabernáculos' porque el texto habla de moradas/tabernáculos en sentido literal o visionario; 'eternos' mantiene el adjetivo de duración continua de 'aeterna'.
theological_decisions:
- issue: Contraste pronominal entre illorum y eis
  english_pob_reading: their glory ... them
  chosen_spanish_reading: la gloria de ellos ... les daré
  alternative_spanish_readings:
  - la gloria de aquellos ... les daré
  - su gloria ... les daré
  rationale: El latín distingue entre el grupo poseído por 'illorum' y los destinatarios de 'eis'. En español, 'de ellos' conserva esa distinción sin introducir una identificación indebida entre ambos referentes.
  doctrine_reference: Claridad referencial del texto apocalíptico; cohesión anafórica
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó la cláusula relativa 'that I had prepared for them' de 2 Esdras 2:11 por corresponder al versículo 12 en la segmentación latina; por eso no se incluye aquí ninguna expansión adicional ni nota que la incorpore en este versículo.
  spanish_consistency_notes:
  - Se mantiene 'tabernáculos' en plural para reflejar el plural latino 'tabernacula'.
  - No se usa 'SEÑOR' ni vocabulario de ocultamiento divino, porque este versículo no contiene el nombre divino.
  - La redacción sigue de cerca la sintaxis del latín sin calcos torpes, priorizando claridad bíblica en español.
