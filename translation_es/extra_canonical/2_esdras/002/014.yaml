  glossary_alignment: No hay conflicto mayor con la terminología del proyecto salvo 'el Señor', que aquí es defendible porque la fuente inmediata es latín 'dominus' y no aparece explícitamente el Tetragrámaton. La decisión debe quedar explicada, pero el texto principal puede mantenerse con 'el Señor'.
