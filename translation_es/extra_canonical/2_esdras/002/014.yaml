translation:
  language: es
  text: Da testimonio[a], da testimonio, oh cielo y tierra, porque he quitado el mal y he creado el bien, porque yo vivo, dice el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Llama, llama al cielo y a la tierra a dar testimonio».'
    reason: Alternativa de traducción que preserva la nota auditada en inglés sobre la posible construcción verbal del latín.
lexical_decisions:
- source_word: Testare, testare
  english_pob_choice: Bear witness, bear witness
  chosen_spanish: Da testimonio, da testimonio
  alternatives_spanish:
  - Sé testigo, sé testigo
  - Atestigua, atestigua
  lexicon: testari / testare
  rationale: El latín usa el imperativo repetido testare, testare, que el POB inglés refleja con una repetición enfática. En español, 'da testimonio' conserva el valor formal de testimonio/witness y la urgencia repetida sin sonar tan forzado como una traducción demasiado literal.
- source_word: caelum et terram
  english_pob_choice: O heaven and earth
  chosen_spanish: cielo y tierra
  alternatives_spanish:
  - oh cielo y tierra
  - cielos y tierra
  lexicon: caelum
  rationale: El vocativo en español se expresa de modo natural como 'cielo y tierra'; se omite 'oh' porque la función exclamativa ya queda implícita en el paralelismo y la repetición imperativa.
- source_word: omisi enim malum
  english_pob_choice: for I have put away evil
  chosen_spanish: porque he quitado el mal
  alternatives_spanish:
  - porque he eliminado el mal
  - porque he apartado el mal
  lexicon: omittere
  rationale: '''Omisi'' literalmente es ''he omitido/ dejado de lado''; el POB inglés opta por ''put away'' para captar la acción divina sobre el mal. ''He quitado el mal'' preserva esa fuerza causal y evita suavizarla en una abstracción.'
- source_word: creaui bonum
  english_pob_choice: and created good
  chosen_spanish: y he creado el bien
  alternatives_spanish:
  - y he creado lo bueno
  - y he creado el bien
  lexicon: creare
  rationale: '''Bonum'' puede ser sustantivo o adjetivo; la tradición auditada en inglés usa ''good'' sustantivado. ''El bien'' conserva esa sustantivación y el contraste ético con ''el mal''.'
- source_word: quia uiuo ego
  english_pob_choice: because I live
  chosen_spanish: porque yo vivo
  alternatives_spanish:
  - porque vivo yo
  - pues yo vivo
  lexicon: vivere
  rationale: Se mantiene el orden enfático 'yo vivo' para reflejar el latín con pronombre explícito y preservar la solemnidad de la autoafirmación divina.
- source_word: dicit dominus
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - dice Yahvé
  - afirma el Señor
  lexicon: dicere / dominus
  rationale: En este registro latino, 'dominus' funciona como título divino correspondiente al inglés 'the Lord'. Dado que el texto fuente es latino y la edición inglesa ya fija este título, 'el Señor' reproduce el uso litúrgico sin introducir una decisión de nombre divino no explicitada por el latín.
theological_decisions:
- issue: Repetición enfática del imperativo
  english_pob_reading: Bear witness, bear witness
  chosen_spanish_reading: Da testimonio, da testimonio
  alternative_spanish_readings:
  - Da testimonio
  - Sé testigo, sé testigo
  rationale: La duplicación no es meramente estilística; intensifica la solemnidad y urgencia del llamamiento a la creación. La repetición se conserva explícitamente en español.
  doctrine_reference: Retórica profética / testimonio judicial cósmico
- issue: Contraste moral total entre mal y bien
  english_pob_reading: I have put away evil and created good
  chosen_spanish_reading: he quitado el mal y he creado el bien
  alternative_spanish_readings:
  - he eliminado el mal y he creado lo bueno
  - he apartado el mal y he creado el bien
  rationale: El verso presenta una oposición absoluta y paralela entre mal y bien, atribuida a la acción soberana de Dios. 'He quitado' conserva la idea de remover/poner fuera, y 'el bien' mantiene el sustantivo abstracto.
  doctrine_reference: Soberanía creadora de Dios; dualidad ética
translation_notes:
  revision_awareness: He tenido en cuenta la revisión más reciente que corrigió la pérdida de la repetición imperativa en el latín 'Testare, testare'. La presente redacción conserva esa duplicación de forma explícita y mantiene el registro formal-publicable, evitando una paráfrasis que diluya el carácter forense y enfático del mandato.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico digno y moderno, con sintaxis natural en español.
  - No se introdujo 'Yahvé' porque el testigo inmediato del latín usa 'dominus' y el contexto del audit trail en inglés fija 'the Lord'.
  - El paralelismo mal/bien se conserva con sustantivos abstractos para reflejar el latín 'malum/bonum'.
