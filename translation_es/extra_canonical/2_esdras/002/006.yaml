base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/002/006.yaml
  text: that you may give them over to shame and their mother to plundering, so that
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:05Z'
    unchanged: false
    changes_summary: Added 'over' after 'give them' to better reflect the Latin idiom 'des eis confusionem' as handing them over to shame; retained the rest unchanged.
translation:
  language: es
  text: para que los entregues al oprobio[a] y a su madre al saqueo[b], de modo que
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'a la vergüenza'; se elige 'oprobio' para conservar mejor el tono de deshonra pública del latín confusionem.
    reason: lexical_alternative
  - marker: b
    text: '''Saqueo'' traduce el sustantivo latino de despojo; ''pillaje'' sería una alternativa natural en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: des eis confusionem
  english_pob_choice: that you may give them over to shame
  chosen_spanish: los entregues al oprobio
  alternatives_spanish:
  - los entregues a la vergüenza
  - los pongas en vergüenza
  - los entregues al deshonor
  lexicon: confusionem -> oprobio / vergüenza
  rationale: El latín expresa una entrega o abandono a la humillación pública. 'Oprobio' conserva mejor el matiz de deshonra y vergüenza social que 'vergüenza' sola, y sigue de cerca la decisión revisada del inglés de 'give them over'.
- source_word: matrem eorum
  english_pob_choice: their mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre de ellos
  - su progenitora
  lexicon: matrem -> madre
  rationale: Se mantiene la referencia posesiva simple y directa del latín. 'Su madre' es natural en español y no añade más precisión de la que ofrece el texto.
- source_word: in direptionem
  english_pob_choice: to plundering
  chosen_spanish: al saqueo
  alternatives_spanish:
  - al pillaje
  - a ser saqueada
  - a la rapiña
  lexicon: direptio/direptionem -> saqueo
  rationale: '''Saqueo'' reproduce bien el sustantivo de acción y el campo semántico de despojo violento. Es más transparente para español bíblico actual que una construcción verbal más libre.'
theological_decisions:
- issue: Valor de la frase de entrega judicial y de humillación
  english_pob_reading: that you may give them over to shame
  chosen_spanish_reading: para que los entregues al oprobio
  alternative_spanish_readings:
  - para que los entregues a la vergüenza
  - para que los abandones al oprobio
  rationale: No se suaviza la idea de una acción divina o judicial de entrega; 'entregues al oprobio' conserva el tono de juicio y humillación pública que el latín y la revisión inglesa sugieren.
  doctrine_reference: juicio divino / humillación de los impíos
- issue: Continuidad sintáctica del nexo final
  english_pob_reading: so that
  chosen_spanish_reading: de modo que
  alternative_spanish_readings:
  - para que
  - así que
  rationale: '''De modo que'' preserva el enlace subordinante abierto por el fragmento y funciona bien como final incompleto en español sin forzar una clausura inexistente en el testimonio latino.'
  doctrine_reference: coherencia textual
- issue: Imagen de despojo respecto de la madre
  english_pob_reading: and their mother to plundering
  chosen_spanish_reading: y a su madre al saqueo
  alternative_spanish_readings:
  - y a su madre al pillaje
  - y a su madre a ser saqueada
  rationale: Se conserva la posible tensión de si 'madre' es literal o figurada en el contexto mayor, sin resolverla por adelantado. La redacción española mantiene esa apertura.
  doctrine_reference: prudencia exegética
translation_notes:
  revision_awareness: La revisión inglesa añadió 'over' para reflejar mejor el idiomático desdes/apartamiento de 'des eis confusionem'. Por eso el español usa 'los entregues al oprobio' en vez de una mera equivalencia adjetival como 'les des vergüenza'.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque no aparece en este fragmento.
  - Se mantuvo un registro bíblico moderno y claro, sin arcaísmo innecesario.
  - El fragmento termina abierto con 'de modo que', respetando que el testimonio latino continúa más allá de la cita dada.
