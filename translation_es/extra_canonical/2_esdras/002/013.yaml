translation:
  language: es
  text: Pidan, y recibirán; oren para que sus pocos días sean acortados. El reino ya está preparado para ustedes[a]; manténganse alerta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «oren para que sus días sean pocos y acortados». La sintaxis latina favorece más bien: «oren para que sus pocos días sean acortados».'
    reason: alternative_reading
lexical_decisions:
- source_word: Petite
  english_pob_choice: Ask
  chosen_spanish: Pedid
  alternatives_spanish:
  - Pidan
  - Pedid, y recibiréis
  lexicon: Latin petere
  rationale: El imperativo plural pide una forma natural en español. «Pedid» conserva el valor directo de ruego/solicitud que el POB inglés vierte con «Ask», sin volverlo demasiado explicativo.
- source_word: accipietis
  english_pob_choice: you will receive
  chosen_spanish: recibiréis
  alternatives_spanish:
  - os será dado
  - recibirán
  lexicon: Latin accipere
  rationale: La promesa de recepción se expresa de manera simple y directa. «Recibiréis» mantiene la correspondencia verbal y el tono exhortativo-promisorio del texto.
- source_word: rogate uobis dies paucos ut minorentur
  english_pob_choice: pray that your few days may be shortened
  chosen_spanish: orad para que vuestros pocos días sean acortados
  alternatives_spanish:
  - orad para que se acorten vuestros pocos días
  - orad por vuestros pocos días, para que sean acortados
  lexicon: Latin rogare / dies paucos / minui
  rationale: 'Sigo la revisión aplicada que identifica una prolepsis: el sentido es pedir acerca de «vuestros pocos días» para que sean acortados, no que «pocos» modifique solo el estilo de vida. «Sean acortados» conserva el pasivo de la fuente y la idea apocalíptica de acortamiento temporal.'
- source_word: iam paratum est uobis regnum
  english_pob_choice: The kingdom is already prepared for you
  chosen_spanish: El reino ya está preparado para vosotros
  alternatives_spanish:
  - Ya se ha preparado el reino para vosotros
  - El reino ya os ha sido preparado
  lexicon: Latin regnum / paratus
  rationale: «Está preparado» reproduce el estado resultante del pasivo latino. Se mantiene «reino» por la equivalencia directa de regnum y «ya» por iam, con un registro claro y sobrio.
- source_word: uigilate
  english_pob_choice: keep watch
  chosen_spanish: velad
  alternatives_spanish:
  - estad alerta
  - permaneced vigilantes
  lexicon: Latin vigilare
  rationale: «Velad» es la equivalencia española más compacta y bíblica para el imperativo plural de vigilancia. Conserva la exhortación breve del cierre sin sobreexplicarla.
theological_decisions:
- issue: Sentido de «vuestros pocos días sean acortados»
  english_pob_reading: The line about praying that the days be 'few and shortened' is difficult in Latin. It likely refers to the shortening of the present age or present distress rather than to a wish for a short lifespan.
  chosen_spanish_reading: La frase se entiende como oración para que sean acortados los pocos días presentes, no como deseo de una vida individual breve.
  alternative_spanish_readings:
  - orad para que vuestros días sean pocos y acortados
  - orad para que vuestra vida sea breve
  rationale: La revisión textual favorece la lectura apocalíptica del período de aflicción, no una petición de muerte temprana. En español conviene preservar esa tensión interpretativa mediante una redacción que no convierta el dicho en mera reflexión sobre longevidad.
  doctrine_reference: Apocalíptica judía / marco de tribulación; cf. Mateo 24:22
- issue: Preparación del reino para los destinatarios
  english_pob_reading: The kingdom is already prepared for you
  chosen_spanish_reading: El reino ya está preparado para vosotros
  alternative_spanish_readings:
  - El reino ya os ha sido preparado
  - El reino ya está listo para vosotros
  rationale: Se conserva la afirmación de preparación previa del reino, sin especificar más de lo que la fuente latina permite. La formulación evita introducir un sujeto agente no explicitado.
  doctrine_reference: Escatología de herencia/predisposición del reino
translation_notes:
  revision_awareness: 'La lectura anterior en inglés decía «pray that your days may be few and shortened», pero la revisión aprobada corrigió la sintaxis latina: «rogate uobis dies paucos ut minorentur» debe entenderse como una construcción proleptica, de modo que la frase española refleja «vuestros pocos días sean acortados».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece el nombre divino en la fuente latina.
  - Se eligió «velad» como cierre breve y bíblico, coherente con el imperativo latino uigilate.
  - No se usó «Cristo/Mesías» ni terminología doctrinal adicional porque la unidad no lo requiere.
  - Se conservó el trato plural reverente implícito en el original con «vosotros», acorde al registro bíblico general.
