    text: 'O: «que tienen rosa y lirio».'
    reason: lexical_alternative
  revision_rationale: Se ajusta «que fluyen con leche y miel» a «que manan leche y miel» para reflejar mejor el latín y producir un español más natural, sin cambiar el sentido general. Se conserva la nota sobre el singular colectivo de «rosa y lirio», ya que sigue siendo pertinente y está bien anclada.
