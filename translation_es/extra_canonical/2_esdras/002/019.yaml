translation:
  language: es
  text: y tantas fuentes que manan leche y miel[a], y siete montes poderosos que tienen rosas y lirios, en los cuales llenaré de alegría a tus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que tienen rosa y lirio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: fructibus
  english_pob_choice: and as many springs flowing with milk and honey
  chosen_spanish: y tantas fuentes que fluyen con leche y miel
  alternatives_spanish:
  - y tantas fuentes que manan leche y miel
  - y tantas fuentes fluyendo leche y miel
  lexicon: fuentes
  rationale: El latín del pasaje enumera abundancia en paralelo con otras imágenes naturales; en español, «fuentes que fluyen» transmite con naturalidad el valor de fluidez del participio sin forzar una construcción extraña. Conservé «leche y miel» por ser la imagen literal heredada del texto fuente y de la tradición bíblica, sin sustituirla por una glosa.
- source_word: montes inmensos septem habentes rosam et lilium
  english_pob_choice: and seven mighty mountains having roses and lilies
  chosen_spanish: y siete montes poderosos que tienen rosas y lirios
  alternatives_spanish:
  - y siete montes poderosos con rosas y lirios
  - y siete grandes montes que tienen rosas y lirios
  lexicon: montes
  rationale: «Montes inmensos» se vierte mejor por «montes poderosos» o «grandes» en español; elegí «poderosos» para mantener el énfasis de imponencia del latín y del inglés POB («mighty»). «Tienen» conserva de forma directa el participio latino «habentes».
- source_word: rosam et lilium
  english_pob_choice: having roses and lilies
  chosen_spanish: que tienen rosas y lirios
  alternatives_spanish:
  - que tienen rosa y lirio
  - con rosas y lirios
  lexicon: rosas / lirios
  rationale: La revisión inglesa ya aclaró que la singular latina funciona colectivamente; en español, el plural es la forma natural para expresar esa abundancia botánica. Evité el singular porque sonaría artificial y podría ocultar el matiz distributivo del original.
- source_word: in quibus
  english_pob_choice: in which I will fill your children with joy
  chosen_spanish: en los cuales llenaré de alegría a tus hijos
  alternatives_spanish:
  - dentro de los cuales llenaré de alegría a tus hijos
  - en los que colmaré de alegría a tus hijos
  lexicon: en los cuales
  rationale: La corrección inglesa de «by which» a «in which» se refleja con «en los cuales», que reproduce de manera fiel el valor locativo del latín «in quibus». «Llenaré de alegría» conserva el sentido de plenitud del verbo latino sin añadir un objeto distinto.
theological_decisions:
- issue: Imagen de abundancia paradisíaca con leche y miel, montes y flores
  english_pob_reading: and as many springs flowing with milk and honey, and seven mighty mountains having roses and lilies
  chosen_spanish_reading: y tantas fuentes que fluyen con leche y miel, y siete montes poderosos que tienen rosas y lirios
  alternative_spanish_readings:
  - y tantas fuentes manando leche y miel, y siete grandes montes con rosas y lirios
  rationale: El texto no exige una alegoría cerrada; mantiene imágenes de abundancia y restauración. La traducción conserva la concreción sensorial del original sin espiritualizarla ni explicarla de más.
  doctrine_reference: Apocalíptica / imaginería de restauración
- issue: Destino de la acción divina sobre 'tus hijos'
  english_pob_reading: in which I will fill your children with joy
  chosen_spanish_reading: en los cuales llenaré de alegría a tus hijos
  alternative_spanish_readings:
  - en las cuales colmaré de alegría a tus hijos
  - donde llenaré a tus hijos de alegría
  rationale: El latín presenta una promesa divina directa; el español mantiene el sujeto implícito de primera persona y el objeto «tus hijos» para conservar la relación pactual del discurso. «Llenaré de alegría» reproduce la fuerza de plenitud sin introducir matices doctrinales ajenos.
  doctrine_reference: Promesa divina / consolación
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB que corrigió la relación preposicional de 'by which' a 'in which', reflejada en español con 'en los cuales'. También se tuvo en cuenta la revisión que volvió plural 'roses and lilies' para respetar el plural natural en español y el uso colectivo del latín.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando no aparece el tetragrámaton en este fragmento; aquí no corresponde introducirlo.
  - 'Conservé el paralelismo acumulativo del original: fuentes / montes / flores / gozo.'
  - Mantuve un español bíblico claro, evitando tanto el arcaísmo rígido como la paráfrasis interpretativa.
