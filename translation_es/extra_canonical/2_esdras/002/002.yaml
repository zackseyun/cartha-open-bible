translation:
  language: es
  text: 'La madre que los dio a luz les dice: «Vayan, hijos, porque soy viuda y desamparada.»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Mater, quae eos generauit
  english_pob_choice: The mother who bore them
  chosen_spanish: La madre que los dio a luz
  alternatives_spanish:
  - La madre que los engendró
  - La madre que los parió
  lexicon: mater > madre; generauit > dio a luz / engendró
  rationale: «Dio a luz» conserva el sentido de nacimiento/parto del latín generauit en un español natural y digno. «Los» mantiene el referente plural de eos. Evité una calca demasiado rígida y también «engendró», que en español puede sonar más abstracto o menos inmediato en este contexto.
- source_word: dicit illis
  english_pob_choice: says to them
  chosen_spanish: les dice
  alternatives_spanish:
  - dice a ellos
  - les habla
  lexicon: dicit > dice; illis > les
  rationale: «Les dice» expresa de modo idiomático el dativo latino illis y conserva la sencillez del original. «Les habla» añade un matiz no presente en el texto.
- source_word: ite, filii
  english_pob_choice: Go, children
  chosen_spanish: Vayan, hijos
  alternatives_spanish:
  - Id, hijos
  - Vayan, niños
  lexicon: ite > vayan / id; filii > hijos
  rationale: Opté por «Vayan» para un español neutral y ampliamente entendible. «Hijos» reproduce con fidelidad filii sin añadir posesivo, como ya refleja la revisión inglesa al eliminar «my». "Niños" sería menos preciso, pues filii aquí funciona como apelativo filial.
- source_word: ego uidua sum
  english_pob_choice: I am a widow
  chosen_spanish: soy viuda
  alternatives_spanish:
  - estoy viuda
  - soy una viuda
  lexicon: ego sum > soy; uidua > viuda
  rationale: «Soy viuda» sigue de cerca la construcción latina y suena natural en español. Se omitió el artículo por economía estilística y porque el latino no lo expresa.
- source_word: derelicta
  english_pob_choice: forsaken
  chosen_spanish: desamparada
  alternatives_spanish:
  - abandonada
  - dejada
  lexicon: derelicta > desamparada / abandonada
  rationale: «Desamparada» comunica el estado de haber sido dejada sin apoyo con un matiz más fuerte y literario que «abandonada», sin perder el sentido. Mantiene la tensión entre abandono social y desolación personal presente en forsaken/derelicta.
theological_decisions:
- issue: Autorretrato de la madre como viuda y desamparada
  english_pob_reading: I am a widow and forsaken
  chosen_spanish_reading: soy viuda y desamparada
  alternative_spanish_readings:
  - soy viuda y abandonada
  - soy viuda y dejada
  rationale: No hay una decisión doctrinal compleja, pero sí una carga retórica de lamento. «Desamparada» preserva el tono de desolación y vulnerabilidad sin intensificar el sentido más allá del latín. No se introduce ninguna inferencia teológica adicional.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó 'my' antes de 'children' por no estar en el latín. El español sigue esa decisión al usar simplemente «hijos», sin posesivo, y mantiene la misma estructura breve y directa del texto base.
  spanish_consistency_notes:
  - Se mantuvo el registro sobrio y literario propio de un texto apócrifo/extra canónico en la serie POB.
  - No se empleó «Señor» ni otra terminología doctrinal ajena al versículo; el texto es descriptivo y narrativo.
  - La puntuación mantiene la cita directa con comillas angulares para una lectura publica clara.
