translation:
  language: es
  text: 'Entonces pregunté al ángel y dije: «¿Quiénes son estos, señor?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Tunc interrogaui angelum et dixi
  english_pob_choice: Then I asked the angel and said
  chosen_spanish: Entonces pregunté al ángel y dije
  alternatives_spanish:
  - Luego pregunté al ángel y dije
  - Entonces le pregunté al ángel y dije
  lexicon: interrogare / dicere
  rationale: «Pregunté» reproduce de manera natural el valor de interrogaui en español, y «al ángel» conserva el objeto directo personal sin añadir contenido. Se mantiene la coordinación simple con «y dije» como en el latín y el inglés POB.
- source_word: qui sunt hi
  english_pob_choice: Who are these
  chosen_spanish: ¿Quiénes son estos?
  alternatives_spanish:
  - ¿Quiénes son éstos?
  - ¿Quiénes son estas personas?
  lexicon: qui / hi
  rationale: «Estos» conserva la deixis del latín hi sin interpretar el referente. «Quiénes son» sigue el plural del original y del inglés POB.
- source_word: domine
  english_pob_choice: lord
  chosen_spanish: señor
  alternatives_spanish:
  - Señor
  - amo
  lexicon: domine
  rationale: El latino domine aquí pide una forma de respeto dirigida al ángel. «Señor» en español transmite ese tratamiento sin añadir el posesivo «mi», que la revisión inglesa eliminó por no estar en el fuente. «Amo» sería demasiado fuerte y menos natural en este contexto.
theological_decisions:
- issue: Tratamiento respetuoso al ángel sin añadir posesión
  english_pob_reading: Who are these, lord?
  chosen_spanish_reading: ¿Quiénes son estos, señor?
  alternative_spanish_readings:
  - ¿Quiénes son estos, mi señor?
  - ¿Quiénes son estos, Señor?
  rationale: La revisión inglesa retiró «my» para reflejar con más precisión domine. En español, «señor» expresa deferencia sin convertir el vocativo en posesivo. Se evita «mi señor» porque añadiría una relación no explícita en el latín.
  doctrine_reference: Respeto vocativo; fidelidad al texto base sin expansión interpretativa
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés eliminó «my» de «my lord» para acercarse mejor al latino domine. El español sigue esa decisión con «señor» sin posesivo, manteniendo el tono reverente y el valor vocativo del original.
  spanish_consistency_notes:
  - Se usó «ángel» de forma constante para angelum.
  - No se introdujo una mayúscula devocional en «señor», porque aquí funciona como vocativo común hacia el ángel y no como traducción del nombre divino.
  - El español conserva la estructura narrativa breve del latín y del POB inglés.
