source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: quia lux perpetua lucebit uobis per aeternitatem temporis. Fugite umbram saeculi huius, accipite iocunditatem gloriae
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/002/035.yaml
  text: For everlasting light will shine for you through all eternity. Flee the shadow of this age; receive the joy of glory.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:17Z'
    unchanged: false
    changes_summary: Removed material not present in the source ('Be ready for the rewards of the kingdom') and restored the omitted second sentence. Adjusted 'because' to 'For' to match the Latin more directly, and rendered 'Fugite umbram saeculi huius, accipite iocunditatem gloriae' as 'Flee the shadow of this age; receive the joy of glory.'
translation:
  language: es
  text: Pues la luz perpetua brillará para ustedes por toda la eternidad. Huyan de la sombra de esta era; reciban el gozo de la gloria.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: lux perpetua
  english_pob_choice: everlasting light
  chosen_spanish: luz perpetua
  alternatives_spanish:
  - luz eterna
  - luz para siempre
  lexicon: lux → luz; perpetua → perpetua/eterna
  rationale: ‘Luz perpetua’ conserva la cercanía formal al latín y mantiene el matiz de continuidad sin introducir una paráfrasis más libre.
- source_word: lucebit
  english_pob_choice: will shine
  chosen_spanish: brillará
  alternatives_spanish:
  - resplandecerá
  - alumbrará
  lexicon: luceo → brillar/resplandecer
  rationale: ‘Brillará’ comunica bien el futuro de acción luminosa en español actual sin perder el sentido básico del verbo latino.
- source_word: uobis
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para vosotros
  - para vosotros y vosotras
  lexicon: vos → ustedes
  rationale: Se adopta ‘ustedes’ por ser la forma neutral y amplia para español latinoamericano y lectura eclesial amplia.
- source_word: per aeternitatem temporis
  english_pob_choice: through all eternity
  chosen_spanish: por toda la eternidad
  alternatives_spanish:
  - a través de toda la eternidad
  - por la eternidad
  lexicon: aeternitas → eternidad
  rationale: ‘Por toda la eternidad’ expresa bien la duración total y suena natural en español sin suavizar la amplitud del original.
- source_word: Fugite umbram saeculi huius
  english_pob_choice: Flee the shadow of this age
  chosen_spanish: Huyan de la sombra de este siglo
  alternatives_spanish:
  - Huyan de la sombra de esta era
  - Escapen de la sombra de este mundo
  lexicon: fugite → huyan; umbra → sombra; saeculum → siglo/edad
  rationale: ‘Siglo’ preserva el valor de saeculum como ‘edad presente’ y mantiene la imagen de contraste entre la era actual y la venidera.
- source_word: accipite iocunditatem gloriae
  english_pob_choice: receive the joy of glory
  chosen_spanish: reciban el gozo de la gloria
  alternatives_spanish:
  - reciban la alegría de la gloria
  - acepten el gozo de la gloria
  lexicon: accipite → reciban; iocunditas → gozo/alegría; gloria → gloria
  rationale: ‘Gozo’ es más fuerte y más apto para un registro bíblico que ‘alegría’, y conserva bien el genitivo objetivo o cualitativo sin explicitarlo en exceso.
theological_decisions:
- issue: Temporal contrast between the present age and the coming age
  english_pob_reading: Flee the shadow of this age
  chosen_spanish_reading: Huyan de la sombra de este siglo
  alternative_spanish_readings:
  - Huyan de la sombra de esta era
  - Escapen de la sombra de este mundo
  rationale: ‘Siglo’ comunica la idea teológica de la edad presente como realidad pasajera y sombría, manteniendo el contraste escatológico del texto.
  doctrine_reference: Escatología bíblica; contraste entre este siglo y la consumación futura
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés, que restauró la segunda cláusula ('Flee the shadow of this age; receive the joy of glory') y eliminó el material no atestiguado por la fuente. Por eso la traducción incluye ambas oraciones y no añade referencias al reino ni a recompensas que no aparecen en el latín.
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ porque el pasaje no contiene el nombre divino.
  - Se mantiene un registro digno y bíblico sin introducir vocabulario eclesiástico ajeno al latín.
  - No se agrega puntuación interpretativa más allá de la división en dos oraciones paralelas del original.
