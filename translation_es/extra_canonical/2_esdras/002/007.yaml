source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: generatio eorum fiat. Dispergantur in gentes, nomina eorum deleantur a terra, quoniam spreuerunt testamentum meum.
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/002/007.yaml
  text: May their offspring cease. Let them be scattered among the nations; let their names be blotted out from the earth, because they despised my covenant.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:06Z'
    unchanged: false
    changes_summary: Revised the opening clause from 'their offspring may not come to be' to 'May their offspring cease' to more naturally and directly reflect the Latin 'generatio eorum fiat' in context as an imprecatory wish. The rest is accurate and retained.
translation:
  language: es
  text: Que cese su descendencia. Que sean esparcidos entre las naciones; que sus nombres sean borrados de la tierra, porque despreciaron mi pacto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: generatio eorum fiat
  english_pob_choice: May their offspring cease
  chosen_spanish: Que cese su descendencia
  alternatives_spanish:
  - Que su descendencia no llegue a existir
  - Que su linaje desaparezca
  lexicon: generatio
  rationale: El latín aquí funciona como una imprecación desiderativa; la revisión inglesa mostró que 'cease' expresa mejor ese valor que una negación más literal de existencia. En español, 'Que cese su descendencia' conserva el tono volitivo y no introduce más contenido del que el latín y el POB inglés sustentan.
- source_word: Dispergantur in gentes
  english_pob_choice: Let them be scattered among the nations
  chosen_spanish: Que sean esparcidos entre las naciones
  alternatives_spanish:
  - Que sean dispersados entre las naciones
  - Que se esparzan entre las naciones
  lexicon: dispergantur
  rationale: '''Esparcidos'' reproduce bien la idea de dispersión judicial o punitiva sin sonar excesivamente técnica. ''Entre las naciones'' sigue de cerca gentes y mantiene el sentido colectivo del texto.'
- source_word: nomina eorum deleantur a terra
  english_pob_choice: let their names be blotted out from the earth
  chosen_spanish: que sus nombres sean borrados de la tierra
  alternatives_spanish:
  - que sus nombres sean borrados de la faz de la tierra
  - que sus nombres sean eliminados de la tierra
  lexicon: deleantur
  rationale: '''Borrados'' comunica la imagen de eliminación del registro o memoria con naturalidad en español y preserva la fuerza de deleantur sin exagerar el matiz. ''De la tierra'' sigue la construcción del latín y del POB inglés.'
- source_word: quoniam spreuerunt testamentum meum
  english_pob_choice: because they despised my covenant
  chosen_spanish: porque despreciaron mi pacto
  alternatives_spanish:
  - porque menospreciaron mi pacto
  - porque rechazaron mi pacto
  lexicon: testamentum
  rationale: En este contexto, el latín testamentum corresponde al sentido bíblico de pacto, no a 'testamento' en sentido moderno. 'Despreciaron' refleja spreuerunt y conserva la carga moral del POB inglés.
theological_decisions:
- issue: testamentum como 'pacto' y no 'testamento'
  english_pob_reading: because they despised my covenant
  chosen_spanish_reading: porque despreciaron mi pacto
  alternative_spanish_readings:
  - porque despreciaron mi testamento
  - porque rechazaron mi alianza
  rationale: La evidencia del POB inglés y del contexto de premio/castigo apoya un lenguaje de relación de pacto. 'Pacto' evita un falso amigo jurídico-moderno y mantiene la lectura bíblica de la obligación violada.
  doctrine_reference: Teología del pacto / alianza en la Escritura
- issue: Modo imprecativo del primer miembro
  english_pob_reading: May their offspring cease
  chosen_spanish_reading: Que cese su descendencia
  alternative_spanish_readings:
  - Ojalá cese su descendencia
  - Que no exista su descendencia
  rationale: El latín genera eorum fiat, en este contexto, es mejor entendido como deseo o imprecación. El español con 'Que cese...' conserva el tono sin convertirlo en una predicción o simple posibilidad.
  doctrine_reference: Lenguaje imprecativo en salmos y oraciones de juicio
translation_notes:
  revision_awareness: 'La versión inglesa más reciente revisó la apertura de una negación de existencia a una imprecación más directa: ''May their offspring cease''. La traducción española sigue esa revisión y evita una paráfrasis más débil. No hay variantes textuales relevantes en el breve pasaje latino provisto.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y actual, sin arcaísmos innecesarios.
  - '''Pacto'' se usa consistentemente para testamentum en sentido bíblico, conforme al contexto de juicio por infidelidad.'
  - '''Naciones'' traduce gentes en sentido colectivo étnico-político, no meramente geográfico.'
  - No se añadieron notas al pie porque el texto no presenta una ambigüedad española nueva que requiera marcarse en el verso.
