base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/002/043.yaml
  text: And in the midst of them was a young man of lofty stature, taller than all the rest, and he was placing crowns on the heads of each one of them, and he was more exalted still; and I was held in wonder.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:20Z'
    unchanged: false
    changes_summary: Changed 'on the head of each one of them' to 'on the heads of each one of them' to reflect the plural Latin 'capitibus.'
translation:
  language: es
  text: Y en medio de ellos había un joven de gran estatura, más alto que todos los demás, y estaba poniendo coronas[a] sobre las cabezas de cada uno de ellos, y aún era más exaltado; y yo estaba sobrecogido por el asombro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Coronas» traduce literalmente el latín coronas; el plural de «cabezas» sigue el latín capitibus.
    reason: source_note
lexical_decisions:
- source_word: iuuenis
  english_pob_choice: a young man
  chosen_spanish: un joven
  alternatives_spanish:
  - un hombre joven
  - un muchacho
  lexicon: iuuenis
  rationale: «Joven» reproduce bien la edad/condición del sujeto sin añadir matices de inmadurez. «Muchacho» sería demasiado coloquial y «hombre joven» más pesado de lo necesario.
- source_word: statura celsus
  english_pob_choice: of lofty stature
  chosen_spanish: de estatura elevada
  alternatives_spanish:
  - de estatura alta
  - de elevada estatura
  - de gran estatura
  lexicon: statura; celsus
  rationale: La frase latina expresa altura física y dignidad visual. «De estatura elevada» conserva el tono formal y evita una repetición demasiado moderna de «alto» en el mismo miembro comparativo.
- source_word: eminentior omnibus illis
  english_pob_choice: taller than all the rest
  chosen_spanish: más alto que todos los demás
  alternatives_spanish:
  - más elevado que todos los demás
  - superior a todos los demás en estatura
  lexicon: eminentior
  rationale: El comparativo señala altura física en contexto. «Más alto» es la equivalencia más natural en español y mantiene la comparación explícita.
- source_word: capitibus inponebat coronas
  english_pob_choice: he was placing crowns on the heads of each one of them
  chosen_spanish: estaba poniendo coronas sobre las cabezas de cada uno de ellos
  alternatives_spanish:
  - estaba colocando coronas sobre la cabeza de cada uno de ellos
  - ponía coronas sobre las cabezas de cada uno de ellos
  lexicon: caput; corona; imponere
  rationale: 'El plural latino «capitibus» exige plural en español: «las cabezas». El imperfecto progresivo refleja la acción en curso de la escena. «Poniendo» es claro y fiel, sin perder solemnidad.'
- source_word: magis exaltabatur
  english_pob_choice: he was more exalted still
  chosen_spanish: aún era más exaltado
  alternatives_spanish:
  - era aún más exaltado
  - seguía siendo más exaltado
  lexicon: exaltare
  rationale: «Exaltado» preserva la elevación que puede ser física y también honorífica. La secuencia narrativa ya lo ha descrito como más alto; por eso se mantiene la ambigüedad de exaltación/realce sin explicitarla demasiado.
- source_word: miracul[o] tenebar
  english_pob_choice: I was held in wonder
  chosen_spanish: yo estaba sobrecogido por el asombro
  alternatives_spanish:
  - yo estaba retenido por el asombro
  - yo era mantenido en maravilla
  - yo estaba maravillado
  lexicon: miraculum; tenere
  rationale: La frase latina sugiere ser «retenido» o dominado por el asombro. «Sobrecogido por el asombro» transmite la pasividad del sujeto y el impacto emocional con español natural y reverente.
theological_decisions:
- issue: La duplicidad entre altura física y exaltación del joven
  english_pob_reading: taller than all the rest, and he was more exalted still
  chosen_spanish_reading: más alto que todos los demás... aún era más exaltado
  alternative_spanish_readings:
  - más alto que todos los demás... seguía siendo más alto
  - más alto que todos los demás... era aún más enaltecido
  rationale: El latín distingue entre la altura corporal y el aumento de exaltación. La traducción conserva ambas capas sin resolverlas artificialmente en una sola idea, porque el texto permite una lectura visual y otra de honor/majestad.
  doctrine_reference: Principio de precisión semántica y de conservación de ambigüedad legítima del texto fuente
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió «on the head of each one of them» a «on the heads of each one of them» para reflejar el plural latino «capitibus». La redacción española adopta ya ese plural («sobre las cabezas de cada uno de ellos»).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; aquí no hay mención al Tetragrámaton.
  - Se conserva «asombro» en lugar de «maravilla» para reflejar mejor el pasivo latino tenebar sin modernizar excesivamente el tono.
  - No se introduce «Cristo/Mesías» ni vocabulario doctrinal ajeno al pasaje.
