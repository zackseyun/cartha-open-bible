  variant: neutral Latin American
source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'memorare quid fecerim Sodomae et Gomorrae, Quorum terra iacet in picis glebis et aggeribus cinerum: sic dabo eos qui me non audierunt, dicit dominus omnipotens.'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/002/009.yaml
  text: Remember what I did to Sodom and Gomorrah[a], whose land lies in clods of pitch and heaps of ashes. So I will give those who did not listen to me, says the Lord Almighty.
  footnotes:
  - marker: a
    text: Or 'So I will give over those'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:07Z'
    unchanged: false
    changes_summary: Changed 'do to' to 'give' to more closely reflect Latin 'dabo,' while preserving the formal tone and structure.
translation:
  language: es
  text: 'Recuerda lo que hice a Sodoma y Gomorra[a], cuya tierra yace en terrones de brea y montones de ceniza: así daré a quienes no me escucharon, dice el Señor Todopoderoso.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así daré sobre aquellos». El latín dabo puede conservar una fuerza más abierta que una equivalencia interpretativa explícita.'
    reason: alternative_reading
lexical_decisions:
- source_word: memorare
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate
  - Recuerda esto
  lexicon: memorare
  rationale: Imperativo directo y natural en español para reproducir el llamado exhortativo del texto, sin debilitar la fuerza retórica.
- source_word: quid fecerim
  english_pob_choice: what I did
  chosen_spanish: lo que hice
  alternatives_spanish:
  - lo que hice a
  - cómo traté a
  lexicon: facere
  rationale: El latino usa fecerim con referencia a una acción concreta de juicio; 'lo que hice' conserva el paralelismo con el sujeto divino y evita una paráfrasis excesiva.
- source_word: Sodomae et Gomorrae
  english_pob_choice: Sodom and Gomorrah
  chosen_spanish: Sodoma y Gomorra
  alternatives_spanish:
  - Sodoma y Gomorra
  lexicon: toponymy
  rationale: Nombres propios bíblicos establecidos en español; se mantiene la forma tradicional inteligible y fiel.
- source_word: Quorum terra iacet in picis glebis et aggeribus cinerum
  english_pob_choice: whose land lies in clods of pitch and heaps of ashes
  chosen_spanish: cuya tierra yace en terrones de brea y montones de ceniza
  alternatives_spanish:
  - cuya tierra yace entre terrones de brea y montones de ceniza
  - cuyo país yace en terrones de brea y montones de ceniza
  lexicon: picis glebis / aggeribus cinerum
  rationale: '''Terrones de brea'' y ''montones de ceniza'' siguen de cerca la imaginería latina; ''yace'' conserva el estado resultante del juicio. ''Terrones'' suena más natural que un calco rígido de ''clods'' y mantiene la concreción material.'
- source_word: sic dabo eos
  english_pob_choice: So I will give those
  chosen_spanish: así daré a quienes
  alternatives_spanish:
  - así daré aquellos
  - así los entregaré
  lexicon: dabo
  rationale: Se conserva 'daré' por fidelidad al latino dabo y en línea con la revisión del POB; en español, el complemento se expresa con 'a quienes' para hacer fluida la construcción y evitar ambigüedad. La frase mantiene la tensión interpretativa entre 'dar' y un sentido de destino/entrega sin imponer una glosa.
- source_word: qui me non audierunt
  english_pob_choice: those who did not listen to me
  chosen_spanish: quienes no me escucharon
  alternatives_spanish:
  - los que no me escucharon
  - quienes no oyeron mi voz
  lexicon: audire
  rationale: '''Escuchar'' reproduce bien el valor relacional de audire en este contexto mejor que un mero ''oír''; se evita la formulación eclesiástica fija para conservar el sentido de recepción obediente.'
- source_word: dominus omnipotens
  english_pob_choice: the Lord Almighty
  chosen_spanish: el Señor Todopoderoso
  alternatives_spanish:
  - el Señor Omnipotente
  - el Dueño Todopoderoso
  lexicon: dominus omnipotens
  rationale: Se sigue el equivalente español más establecido y claro para la fórmula final de autoridad divina.
theological_decisions:
- issue: Forma del juicio divino sobre los que no escuchan
  english_pob_reading: So I will give those who did not listen to me
  chosen_spanish_reading: así daré a quienes no me escucharon
  alternative_spanish_readings:
  - así los entregaré
  - así haré con los que no me escucharon
  rationale: La tradición textual y la revisión auditada indican que dabo debe conservarse. En español, 'daré a' puede sonar incompleto, pero permite mantener abierta la fuerza deliberadamente sobria del latín sin forzar una explicación interpretativa adicional.
  doctrine_reference: juicio divino; retribución por desobediencia
- issue: Referencia al nombre divino final
  english_pob_reading: says the Lord Almighty
  chosen_spanish_reading: dice el Señor Todopoderoso
  alternative_spanish_readings:
  - dice Yahvé Todopoderoso
  - dice el Señor Omnipotente
  rationale: Aunque el proyecto prefiere 'Yahvé' para יהוה, aquí el testimonio base latino ofrece 'dominus'. En ausencia de una señal textual directa del Tetragrámaton, se conserva la fórmula funcional 'Señor Todopoderoso' para no introducir una identificación no explicitada por el origen.
  doctrine_reference: titulatura divina; prudencia textual
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del POB, que prefirió mantener 'give' frente a 'do to' para reflejar dabo; por eso conservo 'daré'. Sin embargo, el español necesita una construcción que no suene truncada, así que empleo 'daré a quienes...' sin añadir un objeto explícito distinto del que permite el latín. También mantengo la tensión semántica de la frase final sin resolverla por paráfrasis.
  spanish_consistency_notes:
  - Mantengo el registro sobrio y formal propio de una sección apocalíptica/parenética.
  - Conservo el nombre divino como 'Señor' porque el base source es latino y no explicita el Tetragrámaton.
  - Uso 'escucharon' para audire por su componente de respuesta obediente, no sólo auditiva.
  - No suavizo la imagen material de 'brea' y 'ceniza', ya que forma parte del juicio narrado.
