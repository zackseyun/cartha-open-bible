translation:
  language: es
  text: No temas, madre de hijos, porque te he elegido, dice el Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Noli timere
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas, no
  lexicon: imperative negative of timēre
  rationale: «No temas» es la forma española más natural y solemne para reproducir la prohibición exhortativa breve del latín, sin debilitarla a una mera ausencia de miedo.
- source_word: mater filiorum
  english_pob_choice: mother of children
  chosen_spanish: madre de hijos
  alternatives_spanish:
  - madre de los hijos
  - madre de tus hijos
  lexicon: mater / filii
  rationale: Mantiene la expresión nominal directa del latín. «Madre de hijos» conserva la resonancia bíblica y la estructura concisa del original sin añadir posesivos que no están en la fuente.
- source_word: te elegi
  english_pob_choice: I have chosen you
  chosen_spanish: te he elegido
  alternatives_spanish:
  - te escogí
  - te he escogido
  lexicon: eligere
  rationale: El pretérito perfecto compuesto transmite adecuadamente el estado resultante de la elección divina y corresponde bien al valor perfecto del latín en este contexto.
- source_word: dicit dominus
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - dice Yahvé
  - afirma el Señor
  lexicon: dicit / dominus
  rationale: Se conserva «el Señor» porque el texto latino dice dominus y el contexto de 2 Esdras en la tradición latina usa esta fórmula titular. No se introduce «Yahvé» aquí, ya que la fuente inmediata no contiene el Tetragrámaton ni una cita explícita del nombre divino.
theological_decisions:
- issue: La fórmula divina final en dominus
  english_pob_reading: says the Lord
  chosen_spanish_reading: dice el Señor
  alternative_spanish_readings:
  - dice Yahvé
  - declara el Señor
  rationale: Aunque el proyecto suele renderizar יהוה como «Yahvé», aquí la evidencia disponible es el latín dominus. Traducirlo como «el Señor» respeta la fuente inmediata y evita atribuir al texto un nombre explícito que no aparece en el testimonio provisto.
  doctrine_reference: Fidelidad textual y distinción entre nombre divino explícito y título reverencial
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «because» por «for» para reflejar mejor la conjunción causal formal. En español se opta directamente por «porque», que expresa con naturalidad la relación causal del latín quoniam sin perder registro formal.
  spanish_consistency_notes:
  - Se mantiene el tono breve, solemne y directo del original.
  - No se añaden elementos interpretativos ausentes en el latín.
  - «Señor» se usa como equivalente del latín dominus en esta perícopa, sin introducir una decisión sobre el Tetragrámaton que la fuente no exige.
