  text: 'quoniam peccastis coram domino deo et quod malum est coram me fecistis. Modo autem quid faciam uobis? ego enim uidua sum et derelicta: ite, filii, et petite a domino'
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/002/004.yaml
  text: because you sinned before the Lord God and did what is evil before me. But now what shall I do for you? For I am a widow and forsaken. Go, my children, and ask the Lord.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:05Z'
    unchanged: false
    changes_summary: Removed 'mercy' because it is not present in the Latin; rendered petite a domino more literally as 'ask the Lord.'
translation:
  language: es
  text: porque ustedes pecaron delante de Yahvé Dios e hicieron lo malo delante de mí. Pero ahora, ¿qué haré por ustedes? Porque yo soy viuda y estoy abandonada; vayan, hijos míos, y pidan a Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: domino deo
  english_pob_choice: the Lord God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - Señor Dios
  - el Señor Dios
  lexicon: YHWH + θεός / dominus + deus
  rationale: El latín distingue a Yahvé como el Dios al que se peca “delante de” él; en español POB se preserva el nombre divino “Yahvé” en lugar de una máscara como “SEÑOR”, y “Dios” conserva el complemento explícito del original.
- source_word: peccastis
  english_pob_choice: you sinned
  chosen_spanish: pecasteis
  alternatives_spanish:
  - habéis pecado
  - pecaron
  lexicon: pecco
  rationale: La forma verbal directa mantiene el valor aorístico/pasado del latín y la apelación plural de la madre a sus hijos sin introducir matices no presentes.
- source_word: quod malum est coram me fecistis
  english_pob_choice: did what is evil before me
  chosen_spanish: hicisteis lo malo delante de mí
  alternatives_spanish:
  - hicisteis el mal delante de mí
  - hicisteis lo que es malo delante de mí
  lexicon: malum / coram me
  rationale: “Lo malo” reproduce con naturalidad el predicado objetivo del latín y evita sobrecargar con una paráfrasis; “delante de mí” conserva la relación de presencia y juicio de coram me.
- source_word: Modo autem quid faciam uobis?
  english_pob_choice: But now what shall I do for you?
  chosen_spanish: Pero ahora, ¿qué haré por vosotros?
  alternatives_spanish:
  - Mas ahora, ¿qué haré por vosotros?
  - ¿qué puedo hacer ahora por vosotros?
  lexicon: quid faciam uobis
  rationale: La pregunta retórica se mantiene sin añadir interpretación; “haré por vosotros” sigue de cerca el giro del latín y su objeto indirecto.
- source_word: ego enim uidua sum et derelicta
  english_pob_choice: For I am a widow and forsaken
  chosen_spanish: Porque yo soy una viuda y estoy abandonada
  alternatives_spanish:
  - Pues yo soy viuda y abandonada
  - Porque soy viuda y abandonada
  lexicon: uidua / derelicta
  rationale: “Estoy abandonada” expresa el estado resultante de derelicta con español natural; se evita “desamparada” por estilo, aunque sería posible.
- source_word: ite, filii
  english_pob_choice: Go, my children
  chosen_spanish: id, hijos míos
  alternatives_spanish:
  - id, mis hijos
  - váyanse, hijos míos
  lexicon: ite / filii
  rationale: El imperativo plural se conserva con “id”; “hijos míos” reproduce la relación afectiva sin añadir un posesivo ajeno al latín, pero compatible con el vocativo implícito.
- source_word: petite a domino
  english_pob_choice: ask the Lord
  chosen_spanish: pedid a Yahvé
  alternatives_spanish:
  - pedid al Señor
  - rogad a Yahvé
  lexicon: peto + a domino
  rationale: Tras la revisión auditada, el inglés fue corregido de “ask mercy from the Lord” a “ask the Lord”; el latín simple pide “pedid a/ al Señor”. En español, “pedid a Yahvé” conserva el movimiento de petición sin añadir el objeto “misericordia” no atestiguado.
theological_decisions:
- issue: Nombre divino en el latín dominus
  english_pob_reading: the Lord God / ask the Lord
  chosen_spanish_reading: Yahvé Dios / pedid a Yahvé
  alternative_spanish_readings:
  - Señor Dios / pedid al Señor
  rationale: Aunque el latín usa dominus, el contexto del pasaje y la política POB para el nombre divino favorecen recuperar el Tetragrámaton como “Yahvé” en la traducción principal. Se evita la convención de máscara litúrgica para conservar transparencia textual.
  doctrine_reference: Nombre divino / restitución del Tetragrámaton
- issue: Estado de abandono de la hablante
  english_pob_reading: I am a widow and forsaken
  chosen_spanish_reading: yo soy una viuda y estoy abandonada
  alternative_spanish_readings:
  - soy viuda y abandonada
  - yo soy viuda y desamparada
  rationale: Se mantiene la doble afirmación del latín, una de identidad y otra de estado, sin convertirla en metáfora teológica ni suavizarla. “Estoy abandonada” deja visible la tensión afectiva y social del término.
  doctrine_reference: Lectura literal del estado social y afectivo
translation_notes:
  revision_awareness: 'El texto español sigue la versión final auditada del inglés POB, especialmente la corrección de la cláusula final: no debe añadirse “misericordia” porque el latín fuente solo dice petite a domino. También se respetó la estructura paralela de pecado ‘delante de’ Yahvé Dios y de obrar ‘delante de’ mí.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ de forma consistente para el nombre divino.
  - Se mantuvo el tratamiento plural de segunda persona (‘pecasteis’, ‘id’, ‘pedid’) acorde con el latín.
  - No se añadieron palabras devocionales no presentes en la fuente, como ‘misericordia’.
