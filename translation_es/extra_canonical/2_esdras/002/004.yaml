  revision_rationale: Se conserva íntegramente el sentido del latín y las decisiones teológicas del POB, pero se ajusta el registro a un español neutral latinoamericano con 'ustedes' y verbos correspondientes. También se simplifica 'soy una viuda' a 'soy viuda' para mayor naturalidad.
