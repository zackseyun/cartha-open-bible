base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/002/037.yaml
  text: Receive the joy of your glory from the Lord, and rejoice, giving thanks to him who has called you to the heavenly kingdoms.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:17Z'
    unchanged: false
    changes_summary: Replaced 'what has been entrusted to you' with 'the joy of your glory' to reflect the underlying sense of the Latin phrase more accurately; retained the rest with minor smoothing for formal natural English.
translation:
  language: es
  text: Reciban el gozo de su gloria del Señor, y alégrense, dando gracias al que los ha llamado a los reinos celestiales.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: domini
  english_pob_choice: from the Lord
  chosen_spanish: de parte del Señor
  alternatives_spanish:
  - del Señor
  - de Yahvé
  lexicon: dominus
  rationale: El latín domina aquí una relación de procedencia/origen. En español, «de parte del Señor» expresa esa procedencia con naturalidad y conserva el matiz relacional; «del Señor» también sería posible, pero es menos explícito sobre el origen del don. Se mantiene «Señor» porque el texto fuente es dominus y el contexto no exige explícitamente el nombre divino Yahvé en esta línea.
- source_word: accipite
  english_pob_choice: Receive
  chosen_spanish: Recibid
  alternatives_spanish:
  - Reciban
  - Recibe
  lexicon: accipio
  rationale: El imperativo plural exhortativo se rinde mejor con «Recibid» en un registro solemne y bíblico. «Reciban» sería más neutral en gran parte del español americano, pero «Recibid» preserva mejor el tono de exhortación directa del latín.
- source_word: iocundamini
  english_pob_choice: rejoice
  chosen_spanish: alegraos
  alternatives_spanish:
  - regocijaos
  - gozaos
  lexicon: iucundor
  rationale: El verbo latino indica alegría expresada activamente. «Alegraos» es claro, natural y suficientemente solemne; «regocijaos» sería más elevado, pero también más marcado y menos transparente.
- source_word: gratias agentes
  english_pob_choice: giving thanks
  chosen_spanish: dando gracias
  alternatives_spanish:
  - agradeciendo
  - rindiendo gracias
  lexicon: gratias agere
  rationale: La locución fija latina se corresponde de manera directa con «dando gracias», que mantiene el valor verbal de la acción de agradecer sin introducir una formulación demasiado litúrgica.
- source_word: ei
  english_pob_choice: him
  chosen_spanish: a quien
  alternatives_spanish:
  - a él
  - al que
  lexicon: is, ea, id
  rationale: El referente es una persona mencionada inmediatamente antes; «a quien» fluye mejor en español y evita una repetición rígida de «a él».
- source_word: uos ad ...
  english_pob_choice: who has called you to the heavenly kingdoms
  chosen_spanish: quien os ha llamado a los reinos celestiales
  alternatives_spanish:
  - que os ha llamado a los reinos celestiales
  - quien os llamó a los reinos celestiales
  lexicon: vocare
  rationale: El latino conservado apunta a una llamada divina con destino escatológico. «Os ha llamado» mantiene el valor perfectivo y la cercanía del resultado presente; «reinos celestiales» traduce el plural del objetivo sin suavizarlo a un singular abstracto.
theological_decisions:
- issue: Pluralidad de «reinos celestiales»
  english_pob_reading: to the heavenly kingdoms
  chosen_spanish_reading: a los reinos celestiales
  alternative_spanish_readings:
  - al reino celestial
  - a los cielos
  rationale: Se conserva el plural porque aparece en el texto fuente y en la POB inglesa. No se lo unifica a un singular por comodidad estilística, ya que eso borraría una particularidad del original.
  doctrine_reference: Escatología del llamado divino y destino celestial plural
- issue: «Señor» frente a «Yahvé»
  english_pob_reading: from the Lord
  chosen_spanish_reading: del Señor
  alternative_spanish_readings:
  - de Yahvé
  rationale: Aunque el proyecto usa «Yahvé» para el nombre divino cuando el source-language lo requiere, aquí la fuente inmediata es latín «domini» y el inglés POB también eligió «Lord». Sin un indicio textual adicional de un tetragrámaton subyacente en esta línea, «Señor» es la opción más auditable y fiel al testimonio directo disponible.
  doctrine_reference: Divine name policy / source-language fidelity
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés POB que corrigió la primera cláusula de una lectura de «what has been entrusted to you» a «the joy of your glory». La versión española evita por tanto cualquier giro de encomienda/depósito y refleja el sentido revisado: una invitación a recibir el gozo de la gloria procedente del Señor. El resto de la línea se mantuvo alineado con la redacción inglesa estabilizada y con el latín conservado.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico y solemne, pero con sintaxis natural para español contemporáneo.
  - No se introdujo «Cristo» ni «Mesías» porque la línea no los contiene.
  - «Alegraos» y «dando gracias» conservan la estructura exhortativa coordinada del original.
  - Se preserva el plural «reinos celestiales» por consistencia con el audit trail inglés y el latín transmitido.
