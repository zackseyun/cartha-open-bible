translation:
  language: es
  text: y les mostraré misericordia, porque soy misericordioso, dice el Señor Todopoderoso.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: misericordiam
  english_pob_choice: I will show mercy
  chosen_spanish: tendré misericordia de ellos
  alternatives_spanish:
  - mostraré misericordia a ellos
  - me compadeceré de ellos
  lexicon: misericordia
  rationale: El latín expresa misericordiam facere cum illis, es decir, actuar con misericordia hacia ellos. En español, 'tener misericordia de' conserva bien el sentido relacional y evita una formulación demasiado mecánica.
- source_word: misericors
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - misericordioso
  - compasivo
  lexicon: misericordioso
  rationale: '''Misericors'' describe un atributo divino estable; ''misericordioso'' reproduce fielmente el valor adjetival y mantiene el vínculo léxico con ''misericordia''.'
- source_word: dominus omnipotens
  english_pob_choice: the Lord Almighty
  chosen_spanish: el Señor Todopoderoso
  alternatives_spanish:
  - el Señor Omnipotente
  - el Señor Todopoderoso
  lexicon: Señor Todopoderoso
  rationale: '''Dominus omnipotens'' se vierte de manera natural como ''Señor Todopoderoso''. Se preserva el título divino tradicional del texto fuente sin sustituirlo por una paráfrasis.'
theological_decisions:
- issue: Habla divina en primera persona seguida de fórmula de mensajero
  english_pob_reading: I will show mercy ... says the Lord Almighty.
  chosen_spanish_reading: y tendré misericordia de ellos ... dice el Señor Todopoderoso.
  alternative_spanish_readings:
  - y mostraré misericordia de ellos ... dice el Señor Todopoderoso
  - y me compadeceré de ellos ... dice el Señor Todopoderoso
  rationale: El latín presenta la acción en primera persona de Yahvé/Señor y la clausula de proclamación 'dice el Señor Todopoderoso'. La versión española conserva esa estructura sin añadir énfasis doctrinal no presente en el texto.
  doctrine_reference: No aplica; formulación profética/declarativa del texto apocalíptico.
translation_notes:
  revision_awareness: Se siguió la lectura estable del pasaje en el audio-trail inglés ('I will show mercy to them, because I am merciful, says the Lord Almighty') y se ajustó al latín conservado ('misericordiam ... faciam', 'misericors sum', 'dicit dominus omnipotens'). No hubo revisiones aplicadas ni divergencias textuales relevantes en el pasaje consultado.
  spanish_consistency_notes:
  - Se conservó 'Señor Todopoderoso' para mantener la correspondencia con 'dominus omnipotens'.
  - Se prefirió 'misericordioso' por cohesión léxica con 'misericordia' y naturalidad en español.
  - No se introdujeron notas al pie porque el testimonio fuente y la lectura inglesa convergen claramente en este versículo.
