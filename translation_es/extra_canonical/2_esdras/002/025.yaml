translation:
  language: es
  text: tus hijos; fortalece, pues, sus pies. Los esclavos que te di,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: filios tuos
  english_pob_choice: your children
  chosen_spanish: a tus hijos
  alternatives_spanish:
  - tus hijos
  - a tus niños
  lexicon: filius → hijo
  rationale: El acusativo latino con valor de objeto directo se expresa naturalmente en español con objeto directo sin preposición; se mantiene el sentido de relación filial sin añadir matiz afectivo no explicitado.
- source_word: confirma enim pedes eorum
  english_pob_choice: strengthen their feet
  chosen_spanish: afirma, pues, sus pies
  alternatives_spanish:
  - fortalece, pues, sus pies
  - haz firmes, pues, sus pasos
  lexicon: confirmo / pes
  rationale: Se conserva la imagen corporal de 'pies' y el valor exhortativo de 'confirmar' como 'hacer firmes'. 'Afirma' suena natural en español bíblico y conserva la metáfora de estabilidad sin sustituirla por una paráfrasis interpretativa.
- source_word: Seruos
  english_pob_choice: The servants
  chosen_spanish: Los esclavos
  alternatives_spanish:
  - Los siervos
  - Los servidores
  lexicon: servus → esclavo
  rationale: Se prefiere 'esclavos' por la fuerza léxica del latín servus y por coherencia con la terminología POB, que evita suavizar el término. 'Siervos' atenúa el rango social implícito.
- source_word: quos tibi dedi
  english_pob_choice: whom I have given you
  chosen_spanish: que te di
  alternatives_spanish:
  - que te he dado
  - a quienes te di
  lexicon: do → dar
  rationale: El perfecto latino puede verterse en pasado simple en español cuando el aspecto no exige perfecto compuesto. Se mantiene la relación de donación sin introducir una marcada temporalidad presente continua.
theological_decisions:
- issue: Tensión entre dependencia divina y responsabilidad humana en 'confirma ... pedes eorum'
  english_pob_reading: strengthen their feet
  chosen_spanish_reading: afirma, pues, sus pies
  alternative_spanish_readings:
  - fortalece, pues, sus pies
  - haz firmes, pues, sus pasos
  rationale: La frase conserva la exhortación directa y la metáfora de estabilidad. No se añade una explicación doctrinal; el mandato deja abierta la tensión entre la acción divina implícita y la exhortación dirigida al destinatario.
  doctrine_reference: Providencia y responsabilidad humana en exhortación bíblica
- issue: Posible suavización social de 'servus'
  english_pob_reading: The servants
  chosen_spanish_reading: Los esclavos
  alternative_spanish_readings:
  - Los siervos
  - Los servidores
  rationale: El latín servus designa esclavo/siervo, pero aquí la traducción conserva el peso social del término para no borrar la fuerza del original. Esto mantiene la transparencia histórica y semántica.
  doctrine_reference: Lexical fidelity and social-historical specificity
translation_notes:
  revision_awareness: La revisión previa corrigió un desajuste de segmentación en la tradición inglesa; para esta entrada se traduce estrictamente el tramo latino proporcionado de 2 Esdras 2:25 sin arrastrar contenido de la línea siguiente. No se incluye nota textual porque el español resultante no requiere un marcador alternativo anclado.
  spanish_consistency_notes:
  - Se usa 'pies' en sentido figurado, no literal anatómico, siguiendo la metáfora del latín.
  - Se evita 'SEÑOR' u otros reemplazos litúrgicos porque el pasaje latino no contiene el nombre divino ni su equivalente griego.
  - La puntuación intenta reflejar la coordinación breve del latín sin añadir discurso explicativo.
