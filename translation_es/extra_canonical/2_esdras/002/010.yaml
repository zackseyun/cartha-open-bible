translation:
  language: es
  text: 'Así dice el Señor a Esdras: Anuncia a mi pueblo que les daré el reino de Jerusalén, que iba a dar a Israel.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: dominus
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Soberano
  lexicon: dominus
  rationale: En este pasaje el latín usa dominus en una fórmula profética de habla divina. El POB inglés traduce con 'the Lord'; en español, 'el Señor' reproduce con naturalidad esa fórmula reverente sin forzar 'Yahvé' donde el texto base no lo explicita.
- source_word: adnuntia
  english_pob_choice: Announce
  chosen_spanish: Anuncia
  alternatives_spanish:
  - Proclama
  - Da a conocer
  lexicon: adnuntiare
  rationale: Adnuntia es un mandato directo de proclamación pública. 'Anuncia' conserva el valor imperativo y el tono de envío profético, en línea con el inglés 'Announce'.
- source_word: populo meo
  english_pob_choice: my people
  chosen_spanish: a mi pueblo
  alternatives_spanish:
  - a mi nación
  - a mi gente
  lexicon: populus
  rationale: '''Pueblo'' mantiene el sentido colectivo y pactal del latín y del inglés. ''A mi pueblo'' es la forma más natural en español para el destinatario colectivo.'
- source_word: regnum Hierusalem
  english_pob_choice: the kingdom of Jerusalem
  chosen_spanish: el reino de Jerusalén
  alternatives_spanish:
  - el reino de la Jerusalén
  - el reino en Jerusalén
  lexicon: regnum + Hierusalem
  rationale: Se conserva la construcción nominal del texto fuente. 'Reino de Jerusalén' sigue el inglés POB y evita aclaraciones interpretativas no presentes en el latín.
- source_word: quod daturus eram Israel
  english_pob_choice: which I was going to give to Israel
  chosen_spanish: que iba a dar a Israel
  alternatives_spanish:
  - que pensaba dar a Israel
  - que estaba por dar a Israel
  lexicon: quod + daturus eram
  rationale: La perífrasis de intención futura en latín ('daturus eram') se rinde con 'iba a dar', que expresa adecuadamente un futuro inminente o planeado en el pasado, como el inglés POB.
theological_decisions:
- issue: Nombre divino en dominus
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Aunque el proyecto normalmente usa 'Yahvé' para el Tetragrámaton, aquí la fuente inmediata es el latín dominus en una fórmula narrativa/profética. Sin un marcador explícito del nombre divino en la fuente, 'el Señor' respeta el nivel de mediación textual del original y coincide con el audit trail inglés.
  doctrine_reference: Nombre divino / equivalencia reverente en traducción bíblica
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el inglés POB auditado y con la revisión más reciente, que no requirió cambios.
  spanish_consistency_notes:
  - Se mantiene el trato reverente y directo a Esdras con el imperativo singular 'Anuncia'.
  - Se conserva la referencia geográfica y regia sin expandir 'Jerusalén' con glosas interpretativas.
  - No se introduce 'Cristo', 'SEÑOR' en mayúsculas ni otras convenciones no atestiguadas por la fuente.
  - El orden de la oración sigue de cerca el latín y el inglés auditado para preservar transparencia textual.
