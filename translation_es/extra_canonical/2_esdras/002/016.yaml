translation:
  language: es
  text: Y resucitaré a los muertos de sus lugares, y los sacaré de los sepulcros, porque he conocido[a] mi nombre en ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El latín tiene una redacción extraña: «porque he conocido mi nombre en ellos». También podría entenderse más idiomáticamente como «porque mi nombre es conocido en ellos» o, por conjetura, «porque ellos han conocido mi nombre». El texto principal conserva la rareza del latín extante.'
    reason: textual_variant
lexical_decisions:
- source_word: Et resuscitabo mortuos de locis suis
  english_pob_choice: And I will raise the dead from their places
  chosen_spanish: Y resucitaré a los muertos de sus lugares
  alternatives_spanish:
  - Y levantaré a los muertos de sus lugares
  - Y haré resucitar a los muertos de sus lugares
  lexicon: resuscito -> resucitar; mortuos -> los muertos; de locis suis -> de sus lugares
  rationale: «Resucitaré» sigue de cerca el futuro de acción divina del latino y conserva el tono bíblico sin volverlo demasiado literal. «Los muertos» mantiene el sustantivo directo de mortuos; «de sus lugares» refleja locis suis con naturalidad en español.
- source_word: de monumentis educam illos
  english_pob_choice: I will bring them out from the tombs
  chosen_spanish: los sacaré de los sepulcros
  alternatives_spanish:
  - los sacaré de las tumbas
  - los haré salir de los sepulcros
  lexicon: educam illos -> sacaré/haré salir; monumentis -> sepulcros/tumbas
  rationale: «Sacaré» comunica bien el movimiento de salida de educam illos. «Sepulcros» conserva la elevación formal de monumentis y evita una reducción demasiado moderna; «tumbas» queda como alternativa válida si se prefiere un registro algo más común.
- source_word: quoniam cognoui nomen meum in illis
  english_pob_choice: because I have known my name in them
  chosen_spanish: porque he conocido mi nombre en ellos
  alternatives_spanish:
  - porque reconozco mi nombre en ellos
  - porque mi nombre está conocido en ellos
  lexicon: cognoui -> he conocido; nomen meum -> mi nombre; in illis -> en ellos
  rationale: Se conserva la rareza textual del latino, que resulta teológicamente y sintácticamente extraña en español igual que en inglés. «He conocido» sigue el perfectum latino sin forzarlo a una paráfrasis interpretativa.
theological_decisions:
- issue: Final clause of cognoui nomen meum in illis
  english_pob_reading: because I have known my name in them
  chosen_spanish_reading: porque he conocido mi nombre en ellos
  alternative_spanish_readings:
  - porque reconozco mi nombre en ellos
  - porque mi nombre es conocido en ellos
  - porque ellos han conocido mi nombre
  rationale: El testimonio latino es único y la clausula es extraña. La versión española preserva esa tensión sin decidir en exceso entre lectura posesiva, pasiva o activa. Así se mantiene la auditable rareza del texto base.
  doctrine_reference: Texto latino de 2 Esdras 2:16; nota textual sobre la cláusula final
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el latino limpiado de Bensly 1895, sin depender mecánicamente de la versión inglesa. Se tuvo en cuenta la revisión de la cláusula final en el audit trail: aunque el inglés osciló entre «I recognize» y «I have known», el español conserva el valor del perfecto latino con una formulación no interpretativa.'
  spanish_consistency_notes:
  - Se mantiene el futuro de primera persona singular en paralelo con el latino (resuscitabo / educam).
  - «Sepulcros» se usa como término bíblico elevado coherente con monumentis, sin borrar la alternativa «tumbas».
  - La cláusula final conserva la rareza del original para no resolver una tensión textual que el audit trail documenta como problemática.
