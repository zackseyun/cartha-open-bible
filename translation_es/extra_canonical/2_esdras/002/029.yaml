translation:
  language: es
  text: Madre, con tus hijos, porque te libraré, dice Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: mater
  english_pob_choice: Mother
  chosen_spanish: Madre
  alternatives_spanish:
  - Madre, oh madre
  - Mujer
  lexicon: mater
  rationale: 'El latín dirige una vocación directa y simple: "mater". En español, "Madre" conserva la apelación literal y la dignidad del tono profético sin añadir matices no presentes en el texto.'
- source_word: cum filiis tuis
  english_pob_choice: with your children
  chosen_spanish: con tus hijos
  alternatives_spanish:
  - junto con tus hijos
  - con tus pequeños
  lexicon: cum + filiis tuis
  rationale: '"cum" expresa compañía y asociación; "con" es la correspondencia natural en español. "Tus hijos" reproduce el posesivo de segunda persona y el sustantivo concreto del original sin intensificarlo.'
- source_word: eripiam
  english_pob_choice: I will deliver you
  chosen_spanish: te libraré
  alternatives_spanish:
  - te rescataré
  - te salvaré
  lexicon: eripio
  rationale: El verbo latino "eripiam" tiene el valor de quitar de un peligro o sacar/liberar de una situación amenazante. "Libraré" conserva ese sentido de liberación efectiva y evita cargar el texto con una connotación meramente espiritual o con un matiz más interpretativo como "salvaré".
- source_word: dicit dominus
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - dice Yahvé
  - declara el Señor
  lexicon: dico + dominus
  rationale: El latín de esta línea tiene la fórmula profética estándar "dicit dominus". En español, "dice el Señor" mantiene la cadencia directa del oráculo y el registro de cita profética; no se introduce "Yahvé" porque el texto fuente aquí es latino y no ofrece una forma explícita del nombre divino en esta frase.
theological_decisions:
- issue: Forma del discurso profético y ausencia de "Rejoice"
  english_pob_reading: The English POB revision removed 'Rejoice,' because it is not present in the provided Latin text.
  chosen_spanish_reading: Se omite cualquier exhortación de regocijo y se conserva solo la vocación materna y la promesa de liberación.
  alternative_spanish_readings:
  - Alégrate, madre, con tus hijos, porque yo te libraré, dice el Señor.
  - Regocíjate, madre, con tus hijos, porque yo te libraré, dice el Señor.
  rationale: La versión base y la revisión auditada muestran que no hay verbo de alegría en el latino limpio. Añadirlo en español crearía una expansión sin respaldo textual.
  doctrine_reference: Principio de suficiencia textual y de no añadir contenido no atestiguado por la fuente
translation_notes:
  revision_awareness: La revisión auditada eliminó 'Rejoice,' por no estar presente en el latín proporcionado. La redacción española sigue esa decisión y conserva el resto del enunciado de forma literal y publicable.
  spanish_consistency_notes:
  - Se mantiene "Señor" para la fórmula final profética, alineado con la tradición española cuando el original latino usa dominus sin otros marcadores contextuales.
  - No se introduce 'Yahvé' porque el pasaje no contiene el tetragrámaton ni una señal directa de esa forma en la fuente latina.
  - '"te libraré" se eligió por su valor de liberación concreta y por su buena naturalidad en español bíblico contemporáneo.'
