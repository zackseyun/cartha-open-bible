translation:
  language: es
  text: Yo, Esdras, vi en el monte Sion una gran multitud que no pude contar, y todos alababan al Señor con cánticos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ego Ezra
  english_pob_choice: I, Ezra
  chosen_spanish: Yo, Esdras
  alternatives_spanish:
  - Yo, Ezra
  - Esdras
  lexicon: Latin ego + Ezra
  rationale: Conservo la primera persona explícita y el nombre propio en su forma española usual, Esdras, sin añadir ni omitir el sujeto del original.
- source_word: vidi
  english_pob_choice: saw
  chosen_spanish: vi
  alternatives_spanish:
  - veía
  - he visto
  lexicon: Latin uidi
  rationale: El perfecto latino se vierte naturalmente con pretérito simple en español, manteniendo el carácter de visión puntual del texto.
- source_word: in monte Sion
  english_pob_choice: on Mount Zion
  chosen_spanish: en el monte Sion
  alternatives_spanish:
  - sobre el monte Sion
  - en el monte de Sion
  lexicon: Latin in monte Sion
  rationale: '"En" reproduce la localización del original; "Sion" conserva la forma bíblica habitual en español, compatible con el nombre tradicional del monte.'
- source_word: turbam magnam
  english_pob_choice: a great multitude
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una multitud grande
  - una muchedumbre grande
  lexicon: Latin turba magna
  rationale: '"Multitud" transmite el valor colectivo amplio del sustantivo latino y corresponde bien al registro bíblico; "gran" mantiene el orden natural en español.'
- source_word: quam numerare non potui
  english_pob_choice: that I could not number
  chosen_spanish: que no pude contar
  alternatives_spanish:
  - que no pude numerar
  - que no era posible contar
  lexicon: Latin numerare non potui
  rationale: '"Contar" es la equivalencia más natural en español para el acto de numerar personas; conserva la imposibilidad expresada por el original sin sobreexplicarla.'
- source_word: canticis conlaudabant
  english_pob_choice: were praising ... with songs
  chosen_spanish: alababan ... con cánticos
  alternatives_spanish:
  - alababan ... con himnos
  - cantaban alabanzas ...
  lexicon: Latin conlaudabant ... canticis
  rationale: '"Alababan" refleja el intensivo de conlaudabant y "con cánticos" conserva que la alabanza iba acompañada de canciones, sin convertirlo en una paráfrasis más amplia.'
- source_word: dominum
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: Latin dominum
  rationale: Aunque el proyecto prefiere "Yahvé" para el nombre divino cuando corresponde, aquí el texto latino usa dominum dentro de una formulación cristiana/litúrgica de la tradición latina; por fidelidad al audit trail inglés y al registro de la fuente, se mantiene "el Señor".
theological_decisions:
- issue: Rendering of dominum in a Latin biblical-Christian context
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Dios
  rationale: El latín transmite un título reverencial ya fijado por la tradición de esta obra; traducirlo como "el Señor" reproduce el valor recibido por el texto auditado sin imponer una reidentificación más explícita del Tetragrámaton que no está presente en esta línea latina.
  doctrine_reference: Name of God / reverential title usage
translation_notes:
  revision_awareness: No revision changes were applied in the latest pass; the English POB text is stable and the Spanish draft follows the same sense with only normal Spanish syntactic adaptation.
  spanish_consistency_notes:
  - Se usa "Esdras" de forma uniforme para el nombre del narrador.
  - Se conserva "Sion" sin tilde, conforme al uso bíblico español habitual.
  - Se evita una calca excesiva de la estructura latina, pero sin añadir información interpretativa ajena al texto.
