translation:
  language: es
  text: Abraz[a] a tus hijos hasta que yo venga, y proclama misericordia a ellos, porque mis fuentes rebosan y mi gracia no fallará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta que venga yo».'
    reason: alternative_reading
lexical_decisions:
- source_word: tuos
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus pequeños
  - tus descendientes
  lexicon: tuus
  rationale: El latín tuos en este contexto se refiere a los hijos del interlocutor; 'hijos' comunica la relación directa y preserva la concreción del llamado. 'Pequeños' suaviza demasiado; 'descendientes' amplía indebidamente el alcance.
- source_word: usque dum uenio
  english_pob_choice: until I come
  chosen_spanish: hasta que yo venga
  alternatives_spanish:
  - hasta que venga yo
  - hasta mi venida
  lexicon: usque dum + venio
  rationale: '''Hasta que yo venga'' sigue de cerca el valor temporal del latín y suena natural en español. Mantiene la primera persona explícita del original.'
- source_word: praedica
  english_pob_choice: proclaim
  chosen_spanish: proclama
  alternatives_spanish:
  - anuncia
  - predica
  lexicon: praedico
  rationale: '''Proclama'' conserva el carácter público y formal del mandato. ''Predica'' puede sonar más eclesial que el latín, y ''anuncia'' debilita el matiz de declaración solemne.'
- source_word: misericordiam
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - clemencia
  lexicon: misericordia
  rationale: La voz española 'misericordia' corresponde de modo directo al latín y mantiene el registro bíblico sin sustituirlo por un término más interpretativo.
- source_word: exuberant fontes mei
  english_pob_choice: my springs overflow
  chosen_spanish: mis fuentes rebosan
  alternatives_spanish:
  - mis fuentes abundan
  - mis manantiales rebosan
  lexicon: exubero + fons
  rationale: '''Rebosan'' reproduce bien la imagen de abundancia desbordante del latín exuberant. ''Fuentes'' conserva la metáfora tradicional y ''manantiales'' sería posible, pero menos estrechamente vinculado al término latino en singular/plural.'
- source_word: gratia mea
  english_pob_choice: my grace
  chosen_spanish: mi gracia
  alternatives_spanish:
  - mi favor
  - mi benevolencia
  lexicon: gratia
  rationale: '''Gracia'' es el equivalente directo y mantiene el tono teológico del texto. ''Favor'' explicita una posible acepción, pero pierde la formulación ya estabilizada en español bíblico.'
- source_word: non deficiet
  english_pob_choice: will not fail
  chosen_spanish: no fallará
  alternatives_spanish:
  - no faltará
  - no desfallecerá
  lexicon: deficio
  rationale: La revisión del inglés fijó el futuro ('will not fail'); 'no fallará' expresa adecuadamente el futuro negativo del latín deficiet. 'No faltará' podría sonar a carencia material; 'no desfallecerá' introduce un matiz no exigido por el contexto.
theological_decisions:
- issue: La promesa divina sobre la continuidad de la gracia
  english_pob_reading: my grace will not fail
  chosen_spanish_reading: mi gracia no fallará
  alternative_spanish_readings:
  - mi gracia no cesará
  - mi gracia no faltará
  rationale: El latín deficiet es futuro, por lo que la promesa no se presenta como una constatación presente sino como una garantía venidera. 'No fallará' conserva esa fuerza promesiva sin convertirla en mera descripción.
  doctrine_reference: Providencia y fidelidad divina
- issue: Relación entre la imagen de las fuentes y la gracia
  english_pob_reading: my springs overflow and my grace will not fail
  chosen_spanish_reading: mis fuentes rebosan y mi gracia no fallará
  alternative_spanish_readings:
  - mis fuentes abundan y mi gracia no faltará
  - mis manantiales rebosan y mi gracia no cesará
  rationale: Se conserva la yuxtaposición entre abundancia presente ('rebosan') y fidelidad futura ('no fallará'), reflejando el cambio de tiempo verbal del latín sin armonizarlo artificialmente.
  doctrine_reference: Abundancia de la provisión divina
translation_notes:
  revision_awareness: La versión inglesa POB había ofrecido una nota alternativa para 'my grace does not fail', pero la revisión posterior corrigió el valor verbal del latín a futuro ('will not fail'). La redacción española sigue esa corrección y conserva el contraste temporal del original latino entre 'rebosan' y 'no fallará'.
  spanish_consistency_notes:
  - Se mantiene 'misericordia' como traducción directa del latín misericordiam, evitando sustituirlo por 'compasión' sin necesidad textual.
  - Se usa 'gracia' como término teológico estable y no como 'favor', porque el latín gratia y el contexto de promesa divina sostienen el valor tradicional.
  - El imperativo 'Abraz[a]' se normaliza en español como 'Abraza' en la salida publicada; si se opta por la forma con tilde visual en composición, debe corregirse a 'Abraza' antes de publicación.
