review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del latín: imperativo inicial, límite temporal ''hasta que yo venga'', mandato de proclamar misericordia, presente ''rebosan'' y futuro ''no fallará''. Sin embargo, ''Abraz[a] a tus hijos'' introduce una nota en una palabra inexistente en el inglés auditado y además el imperativo singular natural en español es ''Abraza'', no ''Abraz''. También ''proclama misericordia a ellos'' es gramaticalmente poco natural; el dativo español debe ser ''a'' + pronombre tónico o, mejor aquí, ''proclámales misericordia'' o ''proclama misericordia a tus hijos''.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero contiene dos problemas de legibilidad: un anclaje de nota mal colocado que rompe la palabra, y una construcción no idiomática (''a ellos'') tras ''proclama''. Una reparación menor deja el versículo natural y fiel.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'misericordia', 'gracia' y el futuro 'no fallará' concuerdan con el audit trail. 'tus hijos' es aceptable para 'tuos'.
  issues:
  - severity: high
    issue: El texto español tiene 'Abraz[a] a tus hijos', que rompe la palabra y produce una forma verbal incorrecta.
    rationale: El imperativo singular correcto es 'Abraza'. Además, la nota inglesa estaba anclada a 'I come', no al verbo inicial; en español no hace falta nota aquí si se elimina la inversión artificial.
  - severity: medium
    issue: La frase 'proclama misericordia a ellos' es poco natural en español.
    rationale: Aunque comprensible, suena calcada. 'Proclámales misericordia' preserva el sentido con mejor gramática española y el mismo tono solemne.
  - severity: low
    issue: 'La nota ''O: «hasta que venga yo»'' no es necesaria y refleja una variación de orden de palabras, no una alternativa significativa de sentido.'
    rationale: El audit trail inglés registra una alternativa para 'my grace does not fail', no para 'until I come'. La inversión 'venga yo' no aporta una diferencia semántica relevante en español.
  revised_spanish_text: Abraza a tus hijos hasta que yo venga, y proclámales misericordia, porque mis fuentes rebosan y mi gracia no fallará.
  revision_rationale: Se corrige una forma verbal defectuosa y se elimina una nota mal anclada e innecesaria. También se sustituye una construcción calcada ('a ellos') por la forma idiomática 'proclámales', sin cambiar el sentido ni el registro del original latino ni del English POB.
