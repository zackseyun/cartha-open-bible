translation:
  language: es
  text: 'Yo,[a] Esdras, recibí un mandamiento del Señor en el monte Horeb, para que fuera a Israel; pero cuando llegué a ellos, me rechazaron y despreciaron el mandamiento del Señor. Por eso les digo: naciones,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede leerse: «Yo, Esdras, recibí un mandamiento del Señor en el monte Horeb, para que fuera a Israel; pero cuando llegué a ellos, me rechazaron y despreciaron el mandamiento del Señor».'
    reason: textual_variant
lexical_decisions:
- source_word: ut irem ad Israel
  english_pob_choice: that I should go to Israel
  chosen_spanish: para que fuera a Israel
  alternatives_spanish:
  - para ir a Israel
  - a fin de que fuera a Israel
  lexicon: Latin ut + imperfect subjunctive
  rationale: El latín expresa finalidad. «Para que fuera» conserva la relación de propósito sin sonar forzado en español; «a fin de que» sería más formal y «para ir» más literal pero menos natural en este contexto narrativo.
- source_word: reprobauerunt me
  english_pob_choice: they rejected me
  chosen_spanish: me rechazaron
  alternatives_spanish:
  - me repudiaron
  - me rehusaron
  lexicon: reprobo / reprobāre
  rationale: «Rechazaron» comunica la negativa activa del sujeto sin añadir una carga moral ajena al verbo. Mantiene la fuerza relacional del original y del audit trail inglés.
- source_word: respuerunt
  english_pob_choice: spurned
  chosen_spanish: despreciaron
  alternatives_spanish:
  - me escupieron
  - me rechazaron con desprecio
  - me desdeñaron
  lexicon: respuo / respuere
  rationale: Aunque el verbo latino puede significar literalmente «escupir fuera» y figuradamente «rechazar con desdén», aquí el contexto pide una traducción idiomática que preserve la hostilidad. «Despreciaron» recoge la dimensión de rechazo despreciativo sin introducir un gesto físico no explicitado.
- source_word: mandatum domini
  english_pob_choice: the commandment of the Lord
  chosen_spanish: el mandamiento del Señor
  alternatives_spanish:
  - el mandato del Señor
  - el precepto del Señor
  lexicon: mandatum + dominus
  rationale: «Mandamiento» refleja bien el sustantivo latino en registro bíblico. «Señor» traduce dominus según el uso reverencial del texto, en consonancia con la tradición de POB para referencias divinas no relacionadas directamente con el Tetragrámaton.
- source_word: Ideoque uobis dico, gentes
  english_pob_choice: Therefore I say to you, O nations
  chosen_spanish: 'Por eso les digo: naciones,'
  alternatives_spanish:
  - 'Por tanto les digo: naciones,'
  - 'Así que les digo: naciones,'
  lexicon: ideo + vos + dico + gentes
  rationale: 'La cláusula conclusiva se conserva de forma breve y directa. «Les digo: naciones,» mantiene el vocativo plural sin suavizarlo, y el orden ayuda a que la proclamación quede en español natural.'
theological_decisions:
- issue: Uso de «Señor» para dominus en una referencia divina
  english_pob_reading: received a command from the Lord ... the commandment of the Lord
  chosen_spanish_reading: recibí un mandamiento del Señor ... el mandamiento del Señor
  alternative_spanish_readings:
  - recibí un mandato del Señor ... el mandato del Señor
  - recibí un mandamiento de Dios ... el mandamiento de Dios
  rationale: El latín tiene dominus, no el Tetragrámaton. En este segmento, el auditorio bíblico y la propia tradición de la fuente justifican «Señor» como traducción reverencial estable, sin necesidad de introducir «Yahvé» donde el texto base no lo exige explícitamente.
  doctrine_reference: Uso reverencial de dominus en textos bíblicos; distinción entre el nombre divino y el título señorío.
- issue: Fuerza semántica de respuo / respuerunt
  english_pob_reading: spurned the commandment of the Lord
  chosen_spanish_reading: despreciaron el mandamiento del Señor
  alternative_spanish_readings:
  - rechazaron con desdén el mandamiento del Señor
  - escupieron fuera el mandamiento del Señor
  rationale: El revisado inglés ya señaló que el verbo implica rechazo enérgico, no mera indiferencia. En español, «despreciaron» transmite con claridad ese gesto de rechazo despectivo sin volver la frase artificial o excesivamente gráfica.
  doctrine_reference: Lexicografía latina de respuo; principio de equivalencia semántica antes que literalismo crudo.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para añadir la cláusula final «Therefore I say to you, O nations,» que estaba ausente del primer borrador. La presente versión española incorpora esa adición y mantiene la distinción lexical revisada para respuerunt, entendida como rechazo enérgico («despreciaron») más que como mera desestimación.
  spanish_consistency_notes:
  - Se mantiene «Señor» para dominus en todo el versículo, de manera consistente con la referencia reverencial al señorío divino.
  - «Mandamiento» se usa de forma uniforme para mandatum, evitando alternarlo con «mandato» sin necesidad contextual.
  - El vocativo final «naciones,» queda en estilo directo para conservar la apostrofación del latín.
  - 'Se conserva el orden narrativo del texto fuente: envío, rechazo en Israel, y conclusión profética a las naciones.'
