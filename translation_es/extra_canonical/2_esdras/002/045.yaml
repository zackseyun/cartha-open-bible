  glossary_alignment: 'El texto respeta la terminología del proyecto donde aplica: ''Dios'' para ''dei'' es correcto; no hay ocurrencias de Yahvé, Mesías/Cristo, espíritu, etc. La decisión de mantener ''confesado el nombre de Dios'' concuerda con la evidencia fuente y evita sustituciones reverenciales no justificadas.'
