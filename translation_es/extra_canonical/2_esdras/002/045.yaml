translation:
  language: es
  text: 'Él respondió y me dijo: «Estos son los que se han quitado la túnica mortal y se han puesto la inmortal, y han confesado el nombre de Dios. Ahora están siendo coronados y recibiendo palmas».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: mortalem tunicam deposuerunt
  english_pob_choice: have put off the mortal garment
  chosen_spanish: se han quitado la túnica mortal
  alternatives_spanish:
  - han dejado la vestidura mortal
  - se han despojado de la ropa mortal
  lexicon: túnica / mortal
  rationale: Conservo la imagen concreta de vestidura y el contraste vida mortal/inmortal. «Quitarse» comunica bien el valor de deposuerunt sin volverlo abstracto; «túnica» mantiene un registro bíblico claro y natural en español.
- source_word: inmortalem sumpserunt
  english_pob_choice: have put on the immortal
  chosen_spanish: se han puesto la inmortal
  alternatives_spanish:
  - han revestido la inmortalidad
  - se han vestido de lo inmortal
  lexicon: inmortal / ponerse
  rationale: El latín elide el sustantivo 'vestidura' también aquí; por eso mantengo la misma construcción elíptica que el inglés POB, con referencia implícita a la túnica. «La inmortal» preserva el paralelismo con «la mortal» y deja intacta la tensión textual.
- source_word: confessi sunt nomen dei
  english_pob_choice: they have confessed the name of God
  chosen_spanish: han confesado el nombre de Dios
  alternatives_spanish:
  - han proclamado el nombre de Dios
  - han reconocido el nombre de Dios
  lexicon: confesar / nombre de Dios
  rationale: «Confesar» reproduce bien confessi sunt sin reducirlo a mera declaración intelectual. Mantengo «nombre de Dios» de forma directa, sin sustituirlo por un título reverencial más interpretativo.
- source_word: modo coronantur
  english_pob_choice: Now they are being crowned
  chosen_spanish: Ahora están siendo coronados
  alternatives_spanish:
  - Ahora los están coronando
  - Ahora reciben coronas
  lexicon: coronar
  rationale: El presente pasivo latino pide una perífrasis progresiva en español. «Están siendo coronados» conserva el matiz de acción en curso que el inglés POB también preserva.
- source_word: accipiunt palmas
  english_pob_choice: receiving palms
  chosen_spanish: recibiendo palmas
  alternatives_spanish:
  - recibiendo ramas de palma
  - recibiendo palmas de victoria
  lexicon: palmas
  rationale: «Palmas» traduce directamente palmas y mantiene la brevedad simbólica del original. Evito ampliar a «ramas de palma» porque el texto latino no lo explicita.
theological_decisions:
- issue: Nombre divino sin sustitución por título reverencial
  english_pob_reading: confessed the name of God
  chosen_spanish_reading: han confesado el nombre de Dios
  alternative_spanish_readings:
  - han confesado el nombre del Señor
  - han proclamado el nombre divino
  rationale: El texto fuente dice literalmente 'nombre de Dios'; no hay base aquí para reemplazarlo por una convención litúrgica diferente. La traducción conserva la referencia teológica sin enmascararla.
  doctrine_reference: Divine name / reverence in scriptural translation
- issue: Paralelismo mortal/inmortal como contraste escatológico
  english_pob_reading: the mortal garment / the immortal
  chosen_spanish_reading: la túnica mortal / la inmortal
  alternative_spanish_readings:
  - la vestidura mortal / la vestidura inmortal
  - la mortalidad / la inmortalidad
  rationale: La forma del original usa una imagen de vestidura y un contraste escatológico. Mantener ambas piezas evita diluir el símbolo corporal y la transformación final.
  doctrine_reference: Resurrection / glorification imagery
translation_notes:
  revision_awareness: El audio-trail inglés no introduce notas ni variantes textuales; el testimonio latino limpio y la revisión más reciente coinciden y marcan alta concordancia. Por eso el español sigue de cerca la sintaxis y las imágenes del original sin añadir explicaciones interpretativas.
  spanish_consistency_notes:
  - He mantenido «Dios» en vez de «Señor» porque el latín dice dei y el POB inglés sigue esa lectura.
  - He conservado el par antitético «mortal/inmortal» con el mismo sujeto implícito de vestidura para respetar el simbolismo.
  - «Palmas» se deja sin expansión para no introducir elementos no presentes en el texto base.
