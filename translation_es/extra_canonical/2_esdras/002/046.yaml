translation:
  language: es
  text: 'Y dije al ángel: «¿Quién es ese joven que les coloca coronas y palmas en las manos?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Et dixi
  english_pob_choice: And I said
  chosen_spanish: Y dije
  alternatives_spanish:
  - Entonces dije
  - Y le dije
  lexicon: coordinating conjunction et; first-person perfect dixi
  rationale: El latín usa et, una coordinación simple, no tunc; por eso se conserva «Y» en vez de «Entonces». «Dije» reproduce el pasado narrativo sin añadir matiz temporal no presente en el original.
- source_word: ad angelum
  english_pob_choice: to the angel
  chosen_spanish: al ángel
  alternatives_spanish:
  - al mensajero
  - al enviado
  lexicon: angelus
  rationale: «Ángel» es el equivalente directo y transparente en español para angelus en este contexto narrativo. «Mensajero» o «enviado» sonarían posibles etimológicamente, pero no son la opción más natural ni fiel al registro del pasaje.
- source_word: ille iuuenis quis est
  english_pob_choice: Who is that young man
  chosen_spanish: ¿Quién es ese joven?
  alternatives_spanish:
  - ¿Quién es aquel joven?
  - ¿Quién es ese muchacho?
  lexicon: iuuenis
  rationale: iuuenis indica un hombre joven; «joven» mantiene el valor semántico sin rebajar el tono a «muchacho». «Ese» conserva la deixis de ille en un español natural.
- source_word: qui eis coronas inponit
  english_pob_choice: who places crowns on them
  chosen_spanish: que les coloca coronas
  alternatives_spanish:
  - que pone coronas sobre ellos
  - que les pone coronas
  lexicon: inponit; corona
  rationale: «Coloca» expresa la acción de poner con intención y orden, acorde con la escena. Se evita «sobre ellos» porque el complemento siguiente «en las manos» ya desarrolla la localización. «Les» refleja correctamente el dativo eis.
- source_word: et palmas in manus
  english_pob_choice: and palms in their hands
  chosen_spanish: y palmas en las manos
  alternatives_spanish:
  - y palmas en sus manos
  - y palmas entre las manos
  lexicon: palma; manus
  rationale: 'Se conserva la construcción literal del latín: el objeto directo «palmas» unido a la localización «en las manos». «En las manos» mantiene el paralelismo y la sobriedad del original, sin explicitar posesivo innecesario.'
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión auditada del inglés: mantiene la coordinación simple equivalente a et («Y dije») y refleja la economía sintáctica del latín al omitir un verbo adicional para la segunda acción, preservando la imagen de las coronas y las palmas en las manos.'
  spanish_consistency_notes:
  - Se mantiene «ángel» para angelus por coherencia con el pasaje y por ser el equivalente directo en español.
  - Se evita «Entonces» porque el expediente textual distingue et de tunc en la narrativa latina.
  - La puntuación reproduce un discurso directo claro y publicable, con comillas angulares propias del español.
