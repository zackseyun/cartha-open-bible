translation:
  language: es
  text: Huye de la sombra de este siglo; recibe el gozo de tu gloria[a]. Yo invoco públicamente a mi Salvador como testigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la alegría de tu gloria».'
    reason: lexical_alternative
lexical_decisions:
- source_word: uestrae / uestrae; ego testor palam saluatorem meum
  english_pob_choice: Flee the shadow of this age; receive the gladness of your glory. I openly call my Savior to witness.
  chosen_spanish: Huye de la sombra de este siglo; recibe el gozo de tu gloria. Yo invoco públicamente a mi Salvador como testigo.
  alternatives_spanish:
  - Escapa de la sombra de esta edad; recibe la alegría de tu gloria.
  - Huye de la sombra de este mundo presente; recibe el gozo de tu gloria.
  lexicon: huir / sombra / siglo / gozo / gloria / invocar / testigo
  rationale: El latín contrasta una realidad pasajera ('ombra'/'shadow') con la edad presente; 'siglo' conserva el valor de época/mundo presente sin forzar un calco de 'age'. 'Huye' comunica la urgencia de 'flee'. 'Gozo' es un equivalente natural y digno para 'gladness'. 'Invoco... como testigo' sigue el valor idiomático de testor con acusativo personal, corregido en la revisión inglesa; no se traduce como un simple 'dar testimonio de'.
theological_decisions:
- issue: Sentido de testor con objeto personal
  english_pob_reading: I openly call my Savior to witness.
  chosen_spanish_reading: Yo invoco públicamente a mi Salvador como testigo.
  alternative_spanish_readings:
  - Yo llamo públicamente a mi Salvador como testigo.
  - Pongo por testigo públicamente a mi Salvador.
  rationale: La lectura revisada entiende testor + acusativo como invocación solemne de un testigo, no como testimonio acerca del Salvador. 'Invoco... como testigo' preserva la fuerza jurídica y profética del giro latino y el matiz de publicidad ('palam').
  doctrine_reference: Uso idiomático latino/jurídico de testor; no implica una doctrina adicional, sino la forma del juramento o invocación solemne.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió 'I bear witness openly to my Savior' a 'I openly call my Savior to witness.' Esta versión española sigue esa adjudicación y conserva la dimensión solemne de testor con objeto personal, evitando una paráfrasis más débil.
  spanish_consistency_notes:
  - Se mantiene 'Salvador' para saluatorem, coherente con el término cristológico documentado en la fuente latina.
  - '''Este siglo'' se usa en sentido de época presente, no en sentido astronómico.'
  - El registro es sobrio y publicable, sin añadir explicaciones que no estén respaldadas por el texto.
