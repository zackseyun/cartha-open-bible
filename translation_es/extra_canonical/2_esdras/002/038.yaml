- from: Ha llamado al reino celestial. Levantaos y poneos de pie, y ved el número
  to: Ha llamado el reino celestial. Levántense y pónganse de pie, y vean el número
  rationale: Se corrige la sintaxis para reflejar el objeto directo del latín y de la auditoría inglesa («Ha llamado el reino celestial»), y se ajustan los imperativos al registro panhispánico eclesial solicitado, evitando formas de «vosotros» que suenan regionalmente marcadas.
