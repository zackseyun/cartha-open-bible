review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el latín y la revisión inglesa al conservar la cláusula inicial y evitar los añadidos previamente eliminados. Sin embargo, en el texto español hay una inconsistencia importante: el borrador dice «Ha llamado al reino celestial», mientras que sus propias decisiones léxicas y teológicas justifican «Ha llamado el reino celestial». Dado el latín «caelestia regna uocauit» y la traducción inglesa auditada «He has called the heavenly kingdom», la preposición «al» introduce un complemento que cambia la relación sintáctica y sugiere ''ha llamado hacia/convocado al reino'', no que ''ha llamado el reino''.'
  spanish_quality_summary: 'El español es claro y digno, pero «Levantaos» y «poneos» usan voseo peninsular («vosotros»), lo cual no encaja con el estilo meta solicitado: español neutro latinoamericano / ampliamente legible en iglesia. Conviene usar imperativos plurales con «ustedes»: «Levántense y pónganse de pie, y vean». También se corrige la tilde de «Levántense».'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Reino celestial» es aceptable como reflejo de «the heavenly kingdom», aunque el latín tenga plural colectivo. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La principal cuestión es sintáctica y de registro panhispánico.
  issues:
  - severity: high
    issue: Uso de «al» en «Ha llamado al reino celestial»
    rationale: El latín «caelestia regna uocauit» y la traducción inglesa auditada apoyan un objeto directo, no un complemento preposicional. «Ha llamado al reino celestial» altera el sentido.
  - severity: medium
    issue: Registro pronominal peninsular («Levantaos», «poneos», «ved»)
    rationale: Aunque comprensible, no corresponde bien al objetivo de español neutro latinoamericano / eclesial amplio. «Levántense… vean» suena más natural y ampliamente accesible.
  revised_spanish_text: Ha llamado el reino celestial. Levántense y pónganse de pie, y vean el número
  revision_rationale: Se corrige la sintaxis para reflejar el objeto directo del latín y de la auditoría inglesa («Ha llamado el reino celestial»), y se ajustan los imperativos al registro panhispánico eclesial solicitado, evitando formas de «vosotros» que suenan regionalmente marcadas.
