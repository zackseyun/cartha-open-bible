base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/002/038.yaml
  text: He has called the heavenly kingdom. Rise and stand, and see the number
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:19Z'
    unchanged: false
    changes_summary: 'Revised to reflect the Latin more closely: restored the opening clause ''He has called the heavenly kingdom'' from caelestia regna uocauit, removed unsupported additions (''of those who have been sealed'' and ''at the Lord’s banquet''), and kept the imperative sequence concise and formal.'
translation:
  language: es
  text: Ha llamado el reino celestial. Levántense y pónganse de pie, y vean el número
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: caelestia regna
  english_pob_choice: the heavenly kingdom
  chosen_spanish: el reino celestial
  alternatives_spanish:
  - el reino de los cielos
  - el reino celestial de Dios
  lexicon: reino; celestial
  rationale: El latín habla de «regna» en plural, pero la formulación inglesa auditada lo vierte en singular como una expresión colectiva. En español, «el reino celestial» conserva esa referencia al ámbito celestial sin introducir de más «de Dios», que no está en el texto fuente inmediato.
- source_word: uocauit
  english_pob_choice: He has called
  chosen_spanish: Ha llamado
  alternatives_spanish:
  - llamó
  - ha convocado
  lexicon: llamar
  rationale: «Ha llamado» reproduce bien el perfecto latino y mantiene el tono declarativo. «Convocado» sería posible, pero añade un matiz más institucional que el texto no exige.
- source_word: Surgite
  english_pob_choice: Rise
  chosen_spanish: Levantaos
  alternatives_spanish:
  - Levantados
  - Alzaos
  lexicon: levantarse
  rationale: Se preserva el imperativo plural en un español natural y bíblicamente digno. «Levantaos» corresponde con el llamado a incorporarse físicamente.
- source_word: et state
  english_pob_choice: and stand
  chosen_spanish: y poneos de pie
  alternatives_spanish:
  - y estad en pie
  - y permaneced de pie
  lexicon: estar de pie; ponerse de pie
  rationale: La secuencia latina distingue el levantarse del ponerse en posición erguida. «Poneos de pie» conserva esa doble acción sin sonar forzado; «estad en pie» es más estático y menos directo.
- source_word: et uidete numerum
  english_pob_choice: and see the number
  chosen_spanish: y ved el número
  alternatives_spanish:
  - y mirad el número
  - y contemplad el número
  lexicon: ver
  rationale: «Ved» mantiene el imperativo plural y el valor perceptivo simple del latín «uidete». «Contemplad» sería más solemne, pero introduce un matiz no necesario.
theological_decisions:
- issue: Alcance de «caelestia regna»
  english_pob_reading: the heavenly kingdom
  chosen_spanish_reading: el reino celestial
  alternative_spanish_readings:
  - el reino de los cielos
  - el reino celestial de Dios
  rationale: No se explicita «de Dios» porque el latín no lo dice aquí, y la redacción breve de la cláusula pide conservar su forma directa. «El reino de los cielos» es comprensible, pero puede sonar más evangélico-tradicional que el latín de este pasaje.
  doctrine_reference: Reino de Dios / reino celestial en lenguaje apocalíptico
- issue: Omisión de añadidos interpretativos no presentes en el latín
  english_pob_reading: He has called the heavenly kingdom. Rise and stand, and see the number
  chosen_spanish_reading: Ha llamado el reino celestial. Levantaos y poneos de pie, y ved el número
  alternative_spanish_readings:
  - Ha llamado el reino de los cielos. Levantaos y estad en pie, y mirad el número
  rationale: Se evita incorporar elementos no atestiguados en el texto fuente, como menciones a los sellados o al banquete del Señor, que fueron retiradas en la revisión inglesa por carecer de apoyo en el latín limpiado.
  doctrine_reference: Principio de suficiencia textual y control de interpolaciones
translation_notes:
  revision_awareness: La base inglesa fue revisada para ajustarse más estrechamente al latín, restaurando la cláusula inicial «He has called the heavenly kingdom» y suprimiendo añadidos no sustentados («of those who have been sealed», «at the Lord’s banquet»). La versión española sigue esa revisión y conserva la brevedad imperativa del original.
  spanish_consistency_notes:
  - Se mantiene el tono bíblico formal sin recurrir a mayúsculas devocionales innecesarias.
  - Se evita «SEÑOR» porque en este versículo no aparece un correspondiente directo en el latín dado.
  - La frase final queda abierta, como en la base fuente, sin completar el objeto más allá de «el número».
