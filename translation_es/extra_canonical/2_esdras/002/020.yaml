translation:
  language: es
  text: Haz justicia a la viuda, juzga en favor del huérfano, da al necesitado, protege al que no tiene padre, viste al desnudo, cuida al quebrantado y al débil, al cojo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Viduam iustifica
  english_pob_choice: Vindicate the widow
  chosen_spanish: Haz justicia a la viuda
  alternatives_spanish:
  - Vindica a la viuda
  - Defiende a la viuda
  lexicon: iustifica
  rationale: El latín pide una acción forense/justiciera, no solo empatía. «Haz justicia» conserva la fuerza legal de iustificare mejor que una paráfrasis sentimental, y encaja con el patrón de imperativos breves del pasaje.
- source_word: pupillo iudica
  english_pob_choice: judge for the orphan
  chosen_spanish: juzga al huérfano
  alternatives_spanish:
  - haz justicia al huérfano
  - juzga en favor del huérfano
  lexicon: iudica
  rationale: «juzga» mantiene el verbo judicial del original. Aunque el inglés explicita «for», el latín puede leerse como tratar el caso del huérfano con justicia; en español, el dativo indirecto «al huérfano» conserva esa relación sin añadir una glosa excesiva.
- source_word: egenti da
  english_pob_choice: give to the needy
  chosen_spanish: da al necesitado
  alternatives_spanish:
  - da al pobre
  - da al menesteroso
  lexicon: egenti
  rationale: «necesitado» comunica bien la idea de carencia material y dependencia, con registro claro y bíblico en español contemporáneo.
- source_word: orfanum tuere
  english_pob_choice: protect the fatherless
  chosen_spanish: protege al huérfano de padre
  alternatives_spanish:
  - protege al huérfano
  - ampara al huérfano de padre
  lexicon: orfanum
  rationale: El inglés POB distinguió «orphan» y «fatherless». En español, «huérfano de padre» preserva esa especificación sin borrar el matiz distinto del segundo término, que no es mero duplicado retórico.
- source_word: nudum uesti
  english_pob_choice: clothe the naked
  chosen_spanish: viste al desnudo
  alternatives_spanish:
  - cubre al desnudo
  - pon vestido al desnudo
  lexicon: nudum / uesti
  rationale: «viste» es el equivalente natural y exacto para uesti en este contexto; «al desnudo» conserva el objeto directo humano del original.
- source_word: Confractum et debilem cura
  english_pob_choice: care for the broken and the weak
  chosen_spanish: cuida al quebrantado y al débil
  alternatives_spanish:
  - atiende al quebrantado y al débil
  - cuida al quebrantado y al enfermo
  lexicon: confractum / debilem
  rationale: «quebrantado» refleja la imagen de algo hecho pedazos o abatido; «débil» conserva debilem sin reducirlo a enfermedad física. «Cuida» sigue el mandato curare con un verbo natural en español.
- source_word: claudum
  english_pob_choice: the lame
  chosen_spanish: al cojo
  alternatives_spanish:
  - al lisiado
  - al inválido
  lexicon: claudum
  rationale: «cojo» es la correspondencia directa y tradicional para claudum. Mantenerlo evita suavizar el término y conserva la lista final breve del latín.
theological_decisions:
- issue: Justicia hacia vulnerables como deber activo y judicial
  english_pob_reading: Vindicate / judge / give / protect / clothe / care for
  chosen_spanish_reading: Haz justicia / juzga / da / protege / viste / cuida
  alternative_spanish_readings:
  - Defiende / ampara / provee / reviste / atiende
  rationale: El pasaje no solo exhorta a compasión privada, sino a acciones concretas con peso jurídico y comunitario. El español mantiene esa secuencia de imperativos fuertes sin diluirla en lenguaje meramente devocional.
  doctrine_reference: Ética bíblica de la justicia para viudas, huérfanos y pobres (cf. tradición profética; sin cita de versículo obligatoria)
translation_notes:
  revision_awareness: 'La revisión inglesa añadió las cláusulas finales omitidas del latín: ''Confractum et debilem cura, claudum''. La versión española las incorpora íntegramente con ''cuida al quebrantado y al débil, al cojo'', manteniendo la lista completa y la progresión de mandatos.'
  spanish_consistency_notes:
  - Se mantiene un estilo imperativo breve y enumerativo, coherente con la estructura del latín y con la revisión inglesa final.
  - Se evita 'SEÑOR' o terminología no presente; el pasaje no contiene nombres divinos ni títulos cristológicos.
  - Se distingue 'huérfano' y 'huérfano de padre' para respetar la diferencia entre pupillo y orfanum en el contexto del auditable inglés.
  - Se conserva un registro bíblico claro pero moderno, apto para lectura pública.
