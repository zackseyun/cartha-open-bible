review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayor parte del latín: la espera del pastor, el descanso eterno, la cercanía del que vendrá al fin de la era, y la exhortación final. Sin embargo, no preserva el giro ya adjudicado en el POB inglés para gentes/quae auditis et intellegitis. En este contexto contrastivo con Israel, el sentido técnico es ''gentiles'', no el más difuso ''pueblos''. También conviene explicitar ''Por lo tanto/por eso les digo a ustedes'' para cubrir mejor el arranque inglés auditado.'
  spanish_quality_summary: 'El español es claro y digno, con buena fluidez general. ''Aguarden a su pastor'' y ''descanso eterno'' son naturales. ''Está cerca: aquel que vendrá...'' funciona, aunque la raya parentética refleja mejor el inglés y la pausa del latín que los dos puntos. La principal mejora es usar ''gentiles'' en el texto principal, ya que en español eclesial es perfectamente legible y aquí comunica mejor el contraste contextual.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto salvo la decisión sobre gentes. Dado el rastro de auditoría inglés y la revisión ya adjudicada, el español debe alinearse con 'gentiles', no relegarlo a nota como mera alternativa. El resto de las elecciones léxicas ('pastor', 'descanso eterno', 'era', 'recompensas del reino') son compatibles con el proyecto.
  issues:
  - severity: high
    issue: Se tradujo gentes como 'pueblos' en el texto principal.
    rationale: El expediente inglés ya adjudicó que, en este contexto de contraste con Israel, gentes debe entenderse como 'Gentiles'. 'Pueblos' diluye esa oposición y no preserva la decisión documentada.
  - severity: medium
    issue: La nota convierte 'gentiles' en alternativa cuando debe ser la lectura principal.
    rationale: La nota actual invierte la prioridad del rastro de auditoría. Si se conserva nota, debería señalar una alternativa como 'naciones', no desplazar la lectura principal.
  - severity: low
    issue: La puntuación con dos puntos antes de 'aquel que vendrá' es menos natural que una raya o coma explicativa.
    rationale: 'No altera el sentido, pero una raya parentética reproduce mejor la aposición explicativa: ''porque está cerca—el que vendrá...''.'
  revised_spanish_text: 'Por eso les digo[a], gentiles que oyen y entienden: aguarden a su pastor; él les dará descanso eterno, porque está cerca—aquel que vendrá al fin de la era. Estén preparados para las recompensas del reino,'
  revised_footnotes:
  - marker: a
    text: O «naciones que oyen y entienden».
    reason: previous_rendering
  revision_rationale: Se cambia 'pueblos' por 'gentiles' para ajustarse al sentido contextual de gentes ya establecido en la auditoría inglesa y preservar el contraste con Israel. Se mantiene una nota con la alternativa más amplia 'naciones', no con 'gentiles', porque ahora 'gentiles' pasa al texto principal. También se conserva el resto de la redacción con ajustes mínimos.
