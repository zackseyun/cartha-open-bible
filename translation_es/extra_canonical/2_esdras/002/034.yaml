  rationale: Se cambia 'pueblos' por 'gentiles' para ajustarse al sentido contextual de gentes ya establecido en la auditoría inglesa y preservar el contraste con Israel. Se mantiene una nota con la alternativa más amplia 'naciones', no con 'gentiles', porque ahora 'gentiles' pasa al texto principal. También se conserva el resto de la redacción con ajustes mínimos.
