base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/002/034.yaml
  text: 'Therefore I say to you[a], Gentiles who hear and understand: await your shepherd; he will give you eternal rest, because he is near—the one who will come at the end of the age. Be ready for the rewards of the kingdom,'
  footnotes:
  - marker: a
    text: Or 'nations that hear and understand'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:16Z'
    unchanged: false
    changes_summary: Added the final clause, 'Be ready for the rewards of the kingdom,' to account for the omitted Latin phrase 'Parati estote ad praemia regni.'
translation:
  language: es
  text: 'Por eso les digo[a], gentiles que oyen y entienden: aguarden a su pastor; él les dará descanso eterno, porque está cerca—aquel que vendrá al fin de la era. Estén preparados para las recompensas del reino,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «naciones que oyen y entienden».
    reason: previous_rendering
lexical_decisions:
- source_word: quae auditis et intellegitis
  english_pob_choice: Gentiles who hear and understand
  chosen_spanish: pueblos que oyen y entienden
  alternatives_spanish:
  - gentiles que oyen y entienden
  - naciones que oyen y entienden
  lexicon: gentes
  rationale: El latín gentes, en este contexto literario cristiano y en contraste con Israel en el verso anterior, puede expresar un colectivo no israelita. En español, "pueblos" conserva la idea colectiva sin cargar de antemano el tecnicismo eclesiástico de "gentiles"; por eso se deja la alternativa en nota.
- source_word: expectate pastorem uestrum
  english_pob_choice: await your shepherd
  chosen_spanish: aguarden a su pastor
  alternatives_spanish:
  - esperen a su pastor
  - aguarden a vuestro pastor
  lexicon: expectare
  rationale: '"Aguarden" reproduce mejor la espera confiada y deliberada de expectate que un simple "esperen". "Pastor" mantiene el título imagético del latín y del POB inglés.'
- source_word: requiem aeternitatis dabit uobis
  english_pob_choice: he will give you eternal rest
  chosen_spanish: él les dará descanso eterno
  alternatives_spanish:
  - él les dará reposo eterno
  - él les dará descanso de eternidad
  lexicon: requies + aeternitas
  rationale: '"Descanso eterno" es natural en español y preserva el valor de requiem aeternitatis sin convertirlo en una paráfrasis doctrinal más amplia.'
- source_word: in finem saeculi adueniet
  english_pob_choice: the one who will come at the end of the age
  chosen_spanish: aquel que vendrá al fin de la era
  alternatives_spanish:
  - el que vendrá al fin del siglo
  - el que vendrá al fin de los tiempos
  lexicon: saeculum
  rationale: '"Era" evita el falso amigo "siglo" y mantiene el sentido escatológico de saeculum como orden presente o edad del mundo.'
- source_word: Parati estote ad praemia regni
  english_pob_choice: Be ready for the rewards of the kingdom
  chosen_spanish: Estén preparados para las recompensas del reino
  alternatives_spanish:
  - Estén listos para las recompensas del reino
  - Prepárense para las recompensas del reino
  lexicon: parati estote + praemia regni
  rationale: '"Estén preparados" conserva la idea imperativa pasiva/medio reflexiva de parati estote. "Recompensas del reino" sigue de cerca praemia regni y evita añadir contenido no atestiguado.'
theological_decisions:
- issue: Identidad de 'gentes' frente a Israel
  english_pob_reading: Gentiles who hear and understand
  chosen_spanish_reading: pueblos que oyen y entienden, con nota sobre 'gentiles'
  alternative_spanish_readings:
  - gentiles que oyen y entienden
  - naciones que oyen y entienden
  rationale: El contexto inmediato contrasta Israel con gentes. En español, "gentiles" puede expresar mejor esa oposición técnica, pero "pueblos" mantiene fluidez y evita sonar excesivamente interpretativo en el texto base; por eso se documenta la alternativa en nota.
  doctrine_reference: Lectura histórico-literaria del contraste Israel/gentes en 5 Esdras; no se propone una afirmación doctrinal normativa.
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente que añadió la cláusula final omitida en el latín: ''Parati estote ad praemia regni''. También se tuvo en cuenta la corrección auditada de ''nations'' a ''Gentiles'' en el inglés POB, aunque el español principal opta por una formulación más neutra con nota.'
  spanish_consistency_notes:
  - Se conservó el registro exhortativo y escatológico del latín sin intensificarlo con vocabulario devocional ajeno al texto.
  - '"Yahvé" no aparece porque el pasaje no contiene el nombre divino.'
  - Se evitó "Cristo" porque el texto fuente habla del pastor y del que vendrá al fin de la era, no usa explícitamente χριστός/Christus.
  - La puntuación intenta reflejar la cadencia del latín y la adición final de la cláusula de recompensa del reino.
