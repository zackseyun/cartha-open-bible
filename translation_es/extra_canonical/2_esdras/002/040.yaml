  yaml_path: translation/extra_canonical/2_esdras/002/040.yaml
  text: Receive your number[40], Zion, and gather in your white-robed ones[a], who have fulfilled the law of the Lord.
  footnotes:
  - marker: '40'
    text: The Latin word behind 'your robed ones' is literally related to white clothing and can also mean 'candidates.' Here the clothing image fits the visionary scene better than a political sense.
    reason: lexical_alternative
  - marker: a
    text: Or 'gather in your robed ones'.
    reason: previous_rendering
  revision_pass:
