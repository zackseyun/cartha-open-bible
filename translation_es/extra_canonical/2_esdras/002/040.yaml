review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del latín y la decisión clave de candidatos como imagen de blancura/vestidura, en línea con la revisión inglesa. Sin embargo, «tus vestidos de blanco» suena incompleto en español porque nominaliza a las personas de forma poco natural; el sentido fuente apunta a personas vestidas de blanco, no a prendas ni a un participio desnudo. También hay desajuste en las notas: la nota anclada en «tu número» no explica ese sintagma, sino una alternativa para la frase de reunión.'
  spanish_quality_summary: Español generalmente claro y digno, pero «reúne a tus vestidos de blanco» resulta forzado y poco idiomático. Una formulación como «reúne a los tuyos vestidos de blanco» o «reúne a tus revestidos de blanco» sería más natural; la primera es más transparente para lectura eclesial amplia. Conviene además reubicar las notas para que el anclaje corresponda al término explicado.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Señor» corresponde al latín domino aquí, no a un caso documentado de Yahvé en hebreo. «Sion» está bien. La decisión semántica sobre candidatos debe seguir resaltando la blancura específica, no solo vestidura general.
  issues:
  - severity: medium
    issue: «tus vestidos de blanco» es poco natural y ambiguo en español
    rationale: Puede leerse como sustantivo elíptico extraño o incluso rozar la idea de prendas. El latín candidatos tuos se refiere a personas caracterizadas por vestir de blanco; en español conviene explicitar el referente humano.
  - severity: medium
    issue: Las notas al pie están mal ancladas
    rationale: La nota [a] aparece en «tu número» pero su contenido ofrece una alternativa para «reúne a tus vestidos de blanco». Esto rompe la correspondencia exigida entre marcador y palabra/frase anotada.
  - severity: low
    issue: La alternativa de nota puede afinarse
    rationale: Si el texto principal ya expresa «vestidos de blanco», la alternativa útil heredada del inglés es una opción más general como «los tuyos vestidos» o «tus vestidos», pero debe presentarse de forma comprensible en español.
  revised_spanish_text: Recibe tu número, Sion, y reúne a los tuyos vestidos de blanco[a], los que han cumplido la ley del Señor.
  revised_footnotes:
  - marker: a
    text: O «reúne a los tuyos vestidos».[b]
    reason: previous_rendering
  - marker: b
    text: El latín candidatos procede de candidus, «blanco brillante», y puede también significar «candidatos». Aquí se prefirió la imagen de personas vestidas de blanco, que encaja mejor con la escena visionaria que un sentido político.
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase central para que suene natural en español y mantenga el referente humano implícito en el latín. Se reordenan y corrigen las notas para que el marcador aparezca en la frase pertinente y para conservar la explicación léxica sobre candidatos/candidus en conformidad con el rastro de auditoría inglés.
