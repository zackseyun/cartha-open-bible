translation:
  language: es
  text: Recibe tu número[a], Sion, y reúne a tus vestidos de blanco[b], los que han cumplido la ley del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reúne a tus vestidos de blanco».
    reason: lexical_alternative
  - marker: b
    text: El latín candidatos procede de candidus, «blanco brillante»; por eso se prefirió una imagen de vestidura blanca antes que «candidatos» en sentido político.
    reason: source_note
lexical_decisions:
- source_word: Recipe
  english_pob_choice: Receive
  chosen_spanish: Recibe
  alternatives_spanish:
  - Recibe ahora
  - Acepta
  lexicon: Lat. recipere
  rationale: El imperativo pide una recepción directa; «recibe» conserva el valor exhortativo sin añadir matices no presentes en el latín.
- source_word: numerum tuum
  english_pob_choice: your number
  chosen_spanish: tu número
  alternatives_spanish:
  - tu cuenta
  - tu cantidad
  lexicon: Lat. numerus
  rationale: El latín permite la idea de un número asignado o contado; «tu número» sigue de cerca el original y mantiene la referencia a un conteo delimitado.
- source_word: candidatos tuos
  english_pob_choice: your white-robed ones
  chosen_spanish: tus vestidos de blanco
  alternatives_spanish:
  - tus ropajes blancos
  - tus robedos de blanco
  lexicon: Lat. candidatus / candidus
  rationale: La revisión del POB subraya que candidatos deriva de candidus y remite primariamente al color blanco, no solo a estar «vestidos» en general. En español, «vestidos de blanco» expresa esa imagen de manera natural y preserva el rasgo visual central.
- source_word: qui legem
  english_pob_choice: who have fulfilled the law of the Lord
  chosen_spanish: los que han cumplido la ley del Señor
  alternatives_spanish:
  - los que han observado la ley del Señor
  - los que han guardado la ley del Señor
  lexicon: Lat. qui legem + contexto de la frase latina completa
  rationale: Aunque el fragmento latino citado en el paquete termina antes de completar la cláusula, la tradición inglesa del POB ya la entiende como un relativo describiendo a quienes han obedecido la ley del Señor. «Han cumplido» conserva la idea de obediencia efectiva sin forzar una paráfrasis más amplia.
theological_decisions:
- issue: Tratamiento del destinatario Sion
  english_pob_reading: Zion
  chosen_spanish_reading: Sion
  alternative_spanish_readings:
  - Zion
  rationale: Se mantiene la forma bíblica tradicional «Sion», plenamente inteligible en español y coherente con la designación profética de la ciudad/persona de Dios.
  doctrine_reference: Isaías 62; Apocalipsis 21 en el trasfondo de Sion como pueblo y ciudad de Dios
- issue: Imagen de los ‘white-robed ones’
  english_pob_reading: white-robed ones
  chosen_spanish_reading: vestidos de blanco
  alternative_spanish_readings:
  - los de túnicas blancas
  - los ropajes blancos
  rationale: La decisión prioriza la imagen cromática visible del latín candidatus/candidus. En un contexto visionario, «vestidos de blanco» comunica mejor la fuerza teológica del símbolo que un término más abstracto como «candidatos» o un genérico como «vestidos».
  doctrine_reference: Apocalipsis 7:9, 13-14; 19:8
translation_notes:
  revision_awareness: La revisión reciente del POB corrigió explícitamente la pérdida del matiz cromático en candidatos/candidatos. La redacción española sigue esa revisión al traducir la imagen como «vestidos de blanco» y evita diluirla en un mero «robed ones».
  spanish_consistency_notes:
  - Se conserva «Señor» en esta frase porque el texto latino refleja domini domini/legem domini en la cláusula final, y el audit trail inglés ya lo estabiliza así; no se introduce «Yahvé» en ausencia de un testigo textual explícito en este versículo.
  - «Recibe tu número» se mantiene sin expansión interpretativa para respetar la concisión imperativa del latín.
  - La puntuación separa con coma el vocativo «Sion» para reflejar el tono exhortativo del original.
