source:
  edition: Funk 1901 (normalized OCR)
  text: οὕτω γὰρ λέγει ἡ πανάρετος σοφία· Ἰδοὺ, προΐομαι ὑμῖν ἐμῆς πνοῆς ῥῆσιν, διδάξω δὲ ὑμᾶς τὸν ἐμὸν λόγον.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/057/003.yaml
  text: 'For thus says all-virtuous Wisdom: “Behold[a], I will pour out to you a saying from my breath, and I will teach you my word.”'
  footnotes:
  - marker: a
    text: Or 'a word from my breath, and I will teach you my message'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:16Z'
    unchanged: false
    changes_summary: Revised 'bring forth to you' to 'pour out to you' for better lexical accuracy of προΐομαι in this context; changed 'an utterance of my breath' to 'a saying from my breath' for more natural English while preserving the imagery and sense of ῥῆσιν and πνοῆς.
translation:
  language: es
  text: 'Porque así dice la Sabiduría toda virtuosa: «He aquí[a], derramaré sobre ustedes un dicho de mi aliento, y les enseñaré mi palabra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Mira»; también puede entenderse como fórmula de llamada: «He aquí».'
    reason: alternative_rendering
lexical_decisions:
- source_word: ἡ πανάρετος σοφία
  english_pob_choice: all-virtuous Wisdom
  chosen_spanish: la Sapiencia toda virtuosa
  alternatives_spanish:
  - la Sabiduría toda virtuosa
  - la Sabiduría perfectísima
  lexicon: σοφία
  rationale: Conservo el título personificado de Sabiduría y traduzco πανάρετος con una construcción transparente que mantiene la alabanza moral sin forzar un superlativo técnico no presente en el griego.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: ἰδού
  rationale: ‘Mira’ reproduce el valor de llamada atencional con un español natural y digno; ‘He aquí’ sería más tradicional pero algo más marcado en registro.
- source_word: προΐομαι
  english_pob_choice: I will pour out
  chosen_spanish: derramaré
  alternatives_spanish:
  - haré salir
  - haré brotar
  lexicon: προΐημι / προΐομαι
  rationale: Sigo la decisión inglesa revisada hacia una imagen de efusión; ‘derramaré’ conserva la dinámica de abundancia y se ajusta bien al campo metafórico del dicho sapiencial.
- source_word: ἐμῆς πνοῆς
  english_pob_choice: from my breath
  chosen_spanish: de mi aliento
  alternatives_spanish:
  - de mi soplo
  - de mi respiración
  lexicon: πνοή
  rationale: ‘Aliento’ preserva el doble valor de breath/spirit de forma natural en español y evita reducir el término a una simple acción fisiológica.
- source_word: ῥῆσιν
  english_pob_choice: a saying
  chosen_spanish: una sentencia
  alternatives_spanish:
  - una declaración
  - un dicho
  lexicon: ῥῆσις
  rationale: El griego apunta a una expresión dicha, una sentencia o pronunciamiento; ‘sentencia’ es solemne y encaja con el paralelismo poético, aunque ‘dicho’ o ‘declaración’ serían posibles.
- source_word: τὸν ἐμὸν λόγον
  english_pob_choice: my word
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mi mensaje
  - mi dicho
  lexicon: λόγος
  rationale: Conservo la correspondencia directa con λόγος como ‘palabra’, manteniendo el paralelismo con la línea anterior y la relación entre lo pronunciado y lo enseñado.
theological_decisions:
- issue: Personificación de la Sabiduría
  english_pob_reading: all-virtuous Wisdom speaks in the first person
  chosen_spanish_reading: La Sapiencia toda virtuosa habla en primera persona
  alternative_spanish_readings:
  - La Sabiduría toda virtuosa habla en primera persona
  - la Sabiduría personificada habla en primera persona
  rationale: Mantengo la personificación explícita porque el griego presenta a la Sabiduría como sujeto parlante; no la convierto en una mera abstracción.
  doctrine_reference: Sabiduría personificada en literatura sapiencial; continuidad con Prov 1:23 en la cita subyacente.
- issue: Relación entre πνοή y λόγος
  english_pob_reading: a saying from my breath ... my word
  chosen_spanish_reading: una sentencia de mi aliento ... mi palabra
  alternative_spanish_readings:
  - una palabra de mi aliento ... mi palabra
  - un dicho de mi aliento ... mi palabra
  rationale: Conservo la tensión entre ‘aliento’ y ‘palabra’ sin fusionarlas; el texto distingue el origen vital del discurso y luego el contenido/enseñanza de ese discurso.
  doctrine_reference: Poética sapiencial y lenguaje de inspiración/emanación verbal; no implica una formulación doctrinal técnica sobre el Espíritu Santo en este verso.
translation_notes:
  revision_awareness: 'La versión inglesa fue revisada para alinear mejor ῥῆσιν con ‘saying/utterance’ y λόγος con ‘word’, además de reforzar la imagen de προΐομαι como ‘pour out’. La presente propuesta española sigue esa revisión: usa un verbo de efusión (‘derramaré’) y distingue la expresión pronunciada (‘sentencia’) de ‘mi palabra’.'
  spanish_consistency_notes:
  - Se conserva el tono sapiencial personificado con ‘Sabiduría/Sapiencia’ sin cristianizar el título ni sustituirlo por una abstracción impersonal.
  - Se evita ‘Señor’ porque el pasaje no contiene κύριος ni el nombre divino; el campo semántico es sapiencial, no de vocativo divino.
  - ‘Aliento’ mantiene la imagen antropomórfica/poética del griego y deja abierta la resonancia semántica sin sobreinterpretarla como ‘Espíritu’ mayúsculo.
