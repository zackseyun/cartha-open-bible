revisions:
- from: 'Porque así dice la Sapiencia toda virtuosa: «Mira[a], derramaré sobre ustedes una sentencia de mi aliento, y les enseñaré mi palabra».'
  to: 'Porque así dice la Sabiduría toda virtuosa: «He aquí[a], derramaré sobre ustedes un dicho de mi aliento, y les enseñaré mi palabra».'
  rationale: 'Se ajusta el texto para reflejar mejor el griego y la auditoría POB: «Sabiduría» mejora la naturalidad y reconocibilidad; «He aquí» mantiene el tono solemne de ἰδού; «un dicho» representa mejor ῥῆσιν y preserva la distinción con «mi palabra» para λόγον. Se conserva «derramaré» por la revisión inglesa de προΐομαι y «de mi aliento» por πνοή.'
