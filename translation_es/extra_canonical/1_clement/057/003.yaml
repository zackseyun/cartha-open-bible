review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura griega general y mantiene la personificación de la Sabiduría. Sin embargo, hay dos desajustes léxicos importantes frente al griego y al rastro de auditoría POB: ἰδού se entiende mejor como «He aquí» en este registro, y sobre todo ῥῆσιν no conviene como «sentencia», que en español sugiere fallo judicial o máxima demasiado cerrada; el sentido fuente es más bien «dicho/declaración/palabra pronunciada».'
  spanish_quality_summary: El español es legible y digno, pero «Sapiencia» suena más marcado y menos natural que «Sabiduría» para lectura eclesial amplia, y «una sentencia de mi aliento» resulta algo rígido y potencialmente equívoco. «He aquí» encaja mejor con el tono citacional sapiencial que «Mira».
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. La mejor alineación contextual aquí es «Sabiduría» para σοφία, «aliento» para πνοή, y «palabra» para λόγος. Para ῥῆσις, se debe evitar invertir el contraste con λόγος; «un dicho» preserva mejor la distinción que «sentencia».
  issues:
  - severity: medium
    issue: «Sapiencia» es menos natural que «Sabiduría»
    rationale: Aunque no es incorrecto, «Sabiduría» es la forma más clara y ampliamente reconocible en español bíblico y eclesial; mantiene la personificación sin sonar afectada.
  - severity: medium
    issue: «Mira» debilita el registro de ἰδού
    rationale: En una cita sapiencial solemne, «He aquí» reproduce mejor la partícula de llamada y evita un tono demasiado coloquial.
  - severity: high
    issue: «sentencia» no representa bien ῥῆσιν
    rationale: El griego apunta a un dicho, declaración o expresión hablada. «Sentencia» en español puede sugerir un veredicto judicial o una máxima lapidaria, y distorsiona la relación con λόγον = «palabra».
  revised_spanish_text: 'Porque así dice la Sabiduría toda virtuosa: «He aquí[a], derramaré sobre ustedes un dicho de mi aliento, y les enseñaré mi palabra».'
  revised_footnotes:
  - marker: a
    text: 'O «Mira»; también puede entenderse como fórmula de llamada: «He aquí».'
    reason: alternative_rendering
  revision_rationale: 'Se ajusta el texto para reflejar mejor el griego y la auditoría POB: «Sabiduría» mejora la naturalidad y reconocibilidad; «He aquí» mantiene el tono solemne de ἰδού; «un dicho» representa mejor ῥῆσιν y preserva la distinción con «mi palabra» para λόγον. Se conserva «derramaré» por la revisión inglesa de προΐομαι y «de mi aliento» por πνοή.'
