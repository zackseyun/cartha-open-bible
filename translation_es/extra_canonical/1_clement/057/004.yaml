base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/057/004.yaml
  text: Because I called and you did not listen, and I stretched out words and you paid no attention, but made my counsels void, and disobeyed my reproofs, therefore I also will laugh at your ruin; I will rejoice when destruction comes upon you, and when sudden turmoil reaches you, and your overthrow comes like a storm, or when affliction and siege come upon you.
