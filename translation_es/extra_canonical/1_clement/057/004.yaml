    model: gpt-5.4
    timestamp: '2026-04-23T11:35:15Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Porque llamé y ustedes no escucharon; extendí mis palabras y no prestaron atención, sino que invalidaron mis consejos y desobedecieron mis reprensiones; por tanto, yo también me reiré de su ruina; me alegraré cuando les sobrevenga destrucción, y cuando les llegue de repente un tumulto, y su derrumbe llegue como una tormenta, o cuando vengan sobre ustedes aflicción y asedio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκάλουν
  english_pob_choice: I called
  chosen_spanish: llamé
  alternatives_spanish:
  - los llamé
  - estuve llamando
  lexicon: καλέω
  rationale: 'El aoristo en contexto de discurso sapiencial/profético se vierte de forma natural como una acción completa: «llamé». Mantiene la fuerza de la convocatoria divina sin añadir matices no presentes en el griego.'
- source_word: οὐχ ὑπηκούσατε
  english_pob_choice: you did not listen
  chosen_spanish: no escucharon
  alternatives_spanish:
  - no obedecieron
  - no me obedecieron
  lexicon: ὑπακούω
  rationale: El contexto contrasta la llamada con la respuesta negativa. En español, «no escucharon» conserva la idea de atender la voz; «obedecer» sería posible, pero el texto ya incluye después la desobediencia a las reprensiones, por lo que aquí se preserva la primera capa de sentido.
- source_word: ἐξέτεινον λόγους
  english_pob_choice: I stretched out words
  chosen_spanish: extendí palabras
  alternatives_spanish:
  - proferí palabras
  - alargué palabras
  lexicon: ἐκτείνω + λόγος
  rationale: La imagen griega es extraña en español; se conserva de manera sobria con «extendí palabras», que refleja la expresión original sin forzar una paráfrasis interpretativa. Se evita suavizarla en exceso para no borrar la tensión retórica.
- source_word: οὐ προσεἴχετε
  english_pob_choice: you paid no attention
  chosen_spanish: no prestaron atención
  alternatives_spanish:
  - no atendieron
  - no hicieron caso
  lexicon: προσέχω
  rationale: «Prestar atención» reproduce bien la idea de fijar la mente o el oído en lo dicho, con registro claro y natural en español moderno.
- source_word: ἀλλὰ ἀκύρους ἐποιεῖτε τὰς ἐμὰς βουλάς
  english_pob_choice: but made my counsels void
  chosen_spanish: sino que invalidaron mis consejos
  alternatives_spanish:
  - anularon mis consejos
  - dejaron sin efecto mis planes
  lexicon: ἀκύρους ἐποιεῖτε + βουλή
  rationale: «Invalidaron» preserva el valor de hacer sin efecto, y «consejos» sigue la elección inglesa para βουλάς, aunque también puede implicar planes o designios. Se evita reducirlo a una lectura puramente moralizante.
- source_word: τοῖς δὲ ἐμοῖς ἐλέγχοις ἠπειθήσατε
  english_pob_choice: and disobeyed my reproofs
  chosen_spanish: y desobedecieron mis reprensiones
  alternatives_spanish:
  - y no obedecieron mis correcciones
  - y rechazaron mis reprensiones
  lexicon: ἐλέγχος
  rationale: «Reprensiones» conserva el tono correctivo y judicial de ἐλέγχος; «desobedecieron» mantiene la conexión con la negativa de la primera cola, sin introducir una suavización psicológica.
- source_word: ὄλεθρος
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: ὄλεθρος
  rationale: Se mantiene «destrucción» como equivalente directo y transparente, acorde con la lectura inglesa de la POB.
- source_word: θόρυβος
  english_pob_choice: sudden turmoil
  chosen_spanish: tumulto súbito
  alternatives_spanish:
  - alarma súbita
  - agitación repentina
  lexicon: θόρυβος
  rationale: «Tumulto» recoge el sentido de conmoción, ruido o agitación pública; «súbito» traduce ἄφνω. Esta combinación conserva la vivacidad del original sin sobreinterpretarlo.
- source_word: καταστροφή
  english_pob_choice: overthrow
  chosen_spanish: derrumbe
  alternatives_spanish:
  - destrucción
  - catástrofe
  lexicon: καταστροφή
  rationale: «Derrumbe» comunica la caída súbita y total que sugiere el término, sin repetir exactamente «destrucción» y preservando el paralelismo con la imagen de la tormenta.
- source_word: θλῖψις
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - tribulación
  - angustia
  lexicon: θλῖψις
  rationale: «Aflicción» es un equivalente directo, ampliamente inteligible y compatible con el tono de advertencia del pasaje.
- source_word: πολιορκία
  english_pob_choice: siege
  chosen_spanish: sitio
  alternatives_spanish:
  - asedio
  lexicon: πολιορκία
  rationale: «Sitio» es la forma más clásica en español para el cerco militar; se conserva la referencia concreta al asedio de una ciudad o plaza.
theological_decisions:
- issue: Habla divina de juicio retributivo
  english_pob_reading: therefore I also will laugh at your ruin; I will rejoice when destruction comes upon you
  chosen_spanish_reading: por tanto, yo también me reiré de su ruina; me alegraré cuando les sobrevenga destrucción
  alternative_spanish_readings:
  - por tanto, yo también me burlaré de su ruina
  - por tanto, yo también reiré ante su perdición
  rationale: Se mantiene la dureza del juicio retributivo tal como aparece en el griego y en la POB inglesa. «Me reiré» conserva el verbo sin suavizarlo; «ruina/destrucción» reproducen el campo semántico de caída y pérdida total.
  doctrine_reference: Teología bíblica del juicio y la retribución
- issue: Dirección del discurso en 2.ª persona plural
  english_pob_reading: you did not listen... you paid no attention... you disobeyed
  chosen_spanish_reading: ustedes / les / su
  alternative_spanish_readings:
  - vosotros / os / vuestra
  - tú / te / tu
  rationale: Se adopta el plural de tratamiento neutral «ustedes», consistente con un español latinoamericano amplio y con la pluralidad del texto griego.
  doctrine_reference: No aplica; decisión de registro y persona gramatical
- issue: Imagen de la tormenta como paralelo de la catástrofe
  english_pob_reading: your overthrow comes like a storm
  chosen_spanish_reading: su derrumbe llegue como una tormenta
  alternative_spanish_readings:
  - su caída venga como tormenta
  - su ruina llegue como un vendaval
  rationale: Se conserva el paralelismo imagético con la tormenta, sin domesticar la metáfora. «Como una tormenta» mantiene la comparación explícita del original.
  doctrine_reference: No aplica; decisión literaria
- issue: Ausencia de suavización del lenguaje de corrección y rechazo
  english_pob_reading: made my counsels void, and disobeyed my reproofs
  chosen_spanish_reading: invalidaron mis consejos y desobedecieron mis reprensiones
  alternative_spanish_readings:
  - anularon mis consejos y no obedecieron mis reprensiones
  rationale: 'El texto conserva la secuencia de rechazo: desatención, invalidación, desobediencia. No se atenúa la confrontación moral del pasaje.'
  doctrine_reference: Ética bíblica de la respuesta a la reprensión
translation_notes:
  revision_awareness: The latest English POB revision pass reports no changes needed and cross-check status is high_agreement; the Spanish draft therefore follows the stable English audit reading without introducing new textual or theological departures.
  spanish_consistency_notes:
  - Se usa «ustedes» en todo el pasaje para sostener uniformidad de segunda persona plural.
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera; en este versículo no aparece el nombre divino explícito, por lo que no se introduce.
  - Se preserva la dureza retórica del original sin suavizar «me reiré» ni «destrucción».
  - No se añaden notas al pie porque no hay una variante textual o ambigüedad específica que requiera anclaje en este verso.
