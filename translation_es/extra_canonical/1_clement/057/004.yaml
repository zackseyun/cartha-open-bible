review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y la auditoría inglesa en la secuencia argumental y en casi todas las elecciones semánticas principales: llamado no atendido, palabras extendidas, consejos invalidados, reprensiones desobedecidas, y anuncio de ruina/destrucción/tormenta/aflicción/sitio. Sin embargo, hay dos puntos mejorables para mayor fidelidad y naturalidad: 1) ἐξέτεινον λόγους se entiende mejor en español como «extendí mi palabra» o «extendí mis palabras»; el singular puede sonar más idiomático aludir al hablar prolongado, pero como la auditoría inglesa preserva el plural, conviene mantener «mis palabras» para reflejar la posesión implícita y evitar un giro demasiado extraño. 2) Hay inconsistencia de tratamiento entre «su/les» y «ustedes»; para el estilo meta conviene unificar en registro de ustedes. También «sitio» es correcto pero «asedio» es más claro en español general contemporáneo.'
  spanish_quality_summary: El texto es legible y de tono digno, pero mezcla «su» con «ustedes», lo que afecta la fluidez. «Extendí palabras» suena algo calcado y puede mejorarse sin perder la imagen. «Derrumbe» funciona, aunque «desastre» o «ruina» serían posibles; no es necesario cambiarlo. «Asedio» mejora la claridad moderna frente a «sitio».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones clave están bien encaminadas. La revisión propuesta no afecta nombres divinos ni títulos cristológicos. Se preserva el lenguaje fuerte de juicio. Se recomienda ajustar «reprensiones» a «correcciones» solo si se buscara más naturalidad, pero «reprensiones» sigue siendo aceptable y fiel.
  issues:
  - severity: medium
    issue: Calco algo rígido en «extendí palabras»
    rationale: Aunque reproduce de cerca la rareza del griego, en español suena poco natural. «Extendí mis palabras» conserva la imagen y mejora la comprensión al explicitar el posesivo implícito en paralelo con «mis consejos» y «mis reprensiones».
  - severity: medium
    issue: Inconsistencia de tratamiento pronominal
    rationale: El borrador alterna «su/les» con «ustedes». En español meta neutral conviene mantener de forma consistente el trato de segunda persona plural con «ustedes» y posesivos correspondientes.
  - severity: low
    issue: «Sitio» puede resultar menos claro que «asedio» para lectores contemporáneos
    rationale: «Sitio» es válido y clásico, pero «asedio» comunica de manera más inmediata πολιορκία en español general actual.
  revised_spanish_text: Porque llamé y ustedes no escucharon; extendí mis palabras y no prestaron atención, sino que invalidaron mis consejos y desobedecieron mis reprensiones; por tanto, yo también me reiré de su ruina; me alegraré cuando les sobrevenga destrucción, y cuando les llegue de repente un tumulto, y su derrumbe llegue como una tormenta, o cuando vengan sobre ustedes aflicción y asedio.
  revision_rationale: La revisión unifica el tratamiento en «ustedes», mejora la naturalidad de ἐξέτεινον λόγους con «extendí mis palabras» sin borrar la imagen retórica, y sustituye «sitio» por «asedio» para mayor claridad contemporánea. Se conserva la dureza del lenguaje judicial y la estructura paralela del original.
