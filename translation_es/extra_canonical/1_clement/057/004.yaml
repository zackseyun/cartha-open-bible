  to: Porque llamé y ustedes no escucharon; extendí mis palabras y no prestaron atención, sino que invalidaron mis consejos y desobedecieron mis reprensiones; por tanto, yo también me reiré de su ruina; me alegraré cuando les sobrevenga destrucción, y cuando les llegue de repente un tumulto, y su derrumbe llegue como una tormenta, o cuando vengan sobre ustedes aflicción y asedio.
