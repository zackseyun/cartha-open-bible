reference: 1 Clement 57:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ἀνθ' ὧν γὰρ ἠδίκουν νηπίους φονευθήσονται, καὶ ἐξέτασμος ἀσεβεῖς ὀλεῖ· ὁ δὲ ἐμοῦ ἀκούων κατασκηνώσει ἐπ' ἐλπίδι πεποιθὼς καὶ ἡσυχάσει ἀφόβως ἀπὸ παντὸς κακοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/057/007.yaml
  text: For because they were wronging the innocent[a], they will be slain, and inquiry will destroy the ungodly; but the one who hears me will dwell, trusting in hope, and will be at rest without fear from every evil.
  footnotes:
  - marker: a
    text: Or 'the innocent'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:17Z'
    unchanged: false
    changes_summary: Changed 'the simple' to 'the innocent' for νηπίους, which here refers to vulnerable/innocent ones rather than merely simple-minded people. Changed 'examination' to 'inquiry' for more natural formal English with ἐξέτασμος. Removed the closing quotation mark not warranted by the source presentation.
translation:
  language: es
  text: Porque, por haber agraviado a los inocentes[a], serán muertos, y la indagación destruirá a los impíos; pero el que me escucha habitará confiando en la esperanza, y descansará sin temor ante todo mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los simples».
    reason: Alternative lexical possibility for νηπίους in a wisdom-literature sense, while keeping the main text aligned with the current English POB audit state.
lexical_decisions:
- source_word: νηπίους
  english_pob_choice: the innocent
  chosen_spanish: los simples
  alternatives_spanish:
  - los inocentes
  - los ingenuos
  - los inexpertos
  lexicon: νηπίοις/νηπίους
  rationale: El contexto de la cita sapiencial favorece el sentido técnico de los 'simples' o inexpertos de la sabiduría, no principalmente la inocencia moral. En español, 'los simples' conserva mejor esa categoría que 'los inocentes', que sugiere impecabilidad moral.
- source_word: ἐξέτασμος
  english_pob_choice: inquiry
  chosen_spanish: la pesquisa
  alternatives_spanish:
  - la investigación
  - la indagación
  - el examen
  lexicon: ἐξέτασμος
  rationale: Se eligió una palabra española formal y clara que preserve el matiz de averiguación/judicialidad sin sonar excesivamente técnica. 'Pesquisa' comunica bien la idea de una investigación que saca a luz y destruye a los impíos.
- source_word: ἀσεβεῖς
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los irreverentes
  - los impíos e irreligiosos
  - los que no temen a Dios
  lexicon: ἀσεβεῖς
  rationale: '''Impíos'' es el equivalente español más asentado para el grupo sin piedad ni reverencia a Dios, y mantiene el contraste sapiencial y bíblico del término.'
- source_word: ἐπ' ἐλπίδι πεποιθὼς
  english_pob_choice: trusting in hope
  chosen_spanish: con confianza en la esperanza
  alternatives_spanish:
  - confiando en la esperanza
  - apoyado en la esperanza
  - confiado en esperanza
  lexicon: ἐλπίς / πεποιθώς
  rationale: La frase griega combina confianza estable con esperanza como base. 'Con confianza en la esperanza' conserva ambos elementos sin forzar una paráfrasis devocional más amplia.
- source_word: ἡσυχάσει ἀφόβως ἀπὸ παντὸς κακοῦ
  english_pob_choice: will be at rest without fear from every evil
  chosen_spanish: descansará sin temor, lejos de todo mal
  alternatives_spanish:
  - reposará sin temor ante todo mal
  - estará en paz, sin miedo, de todo mal
  lexicon: ἡσυχάζω / ἀφόβως / κακόν
  rationale: '''Descansará sin temor'' reproduce el reposo tranquilo y la ausencia de miedo; ''lejos de todo mal'' expresa de modo natural el resguardo frente a todo lo malo, manteniendo el sentido sin sobrecargar la sintaxis.'
theological_decisions:
- issue: Sentido de νηπίους en la cita sapiencial
  english_pob_reading: the innocent
  chosen_spanish_reading: los simples
  alternative_spanish_readings:
  - los inocentes
  - los ingenuos
  rationale: La revisión inglesa ya señaló que la forma remite al campo sapiencial de los simples/inexpertos más que a inocencia moral absoluta. En español, mantener 'simples' preserva esa tensión y evita una lectura moralmente más fuerte de la que el griego sustenta aquí.
  doctrine_reference: Sabiduría bíblica / categoría sapiencial de los simples
- issue: Carácter de ἐξέτασμος como acción divina o forense
  english_pob_reading: inquiry will destroy the ungodly
  chosen_spanish_reading: la pesquisa destruirá a los impíos
  alternative_spanish_readings:
  - la investigación destruirá a los impíos
  - el examen destruirá a los impíos
  rationale: La frase se entiende como una búsqueda/investigación que culmina en juicio sobre los impíos. 'Pesquisa' conserva mejor el tono formal y forense sin convertirlo en un mero análisis intelectual.
  doctrine_reference: Juicio divino / retribución sapiencial
translation_notes:
  revision_awareness: La revisión inglesa pasó de 'the simple' a 'the innocent' y luego volvió a una lectura que reconoce la tensión sapiencial; el español sigue la evidencia final del contexto griego y la nota crítica para no imponer 'inocentes' como única solución. También se evitó calcar 'examination' y se optó por un término español más cercano a 'inquiry'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' únicamente cuando el texto lo exigiera; en este versículo no aparece el nombre divino explícito.
  - '''Impíos'' se usa de forma consistente para ἀσεβεῖς.'
  - '''Simples'' se dejó con nota para reflejar la alternativa semántica documentada por el proceso de revisión.'
