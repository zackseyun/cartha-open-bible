id: 1CLEM.57.2
reference: 1 Clement 57:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: μάθετε ὑποτάσσεσθαι, ἀποθέμενοι τὴν ἀλαζόνα καὶ ὑπερήφανον τῆς γλώσσης ὑμῶν αὐθάδειαν· ἄμεινον γάρ ἐστιν ὑμῖν, ἐν τῷ ποιμνίῳ τοῦ Χριστοῦ μικροὺς καὶ ἐλλογίμους εὑρεθῆναι, ἢ καθ' ὑπεροχὴν δοκοῦντας ἐκβληθῆναι ἐκ τῆς ἐλπίδος αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/057/002.yaml
  text: Learn to submit[a], putting away the arrogant and proud self-will of your tongue. For it is better for you to be found small and esteemed within the flock of Christ than, while seeming preeminent[b], to be cast out from his hope.
  footnotes:
  - marker: a
    text: Or 'esteemed'.
    reason: previous_rendering
  - marker: b
    text: Or 'the Messiah'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:15Z'
    unchanged: false
    changes_summary: Changed 'included' to 'esteemed' to better reflect ἐλλογίμους ('accounted/esteemed') rather than mere inclusion. Kept the rest substantially unchanged as accurate and natural.
translation:
  language: es
  text: Aprendan a someterse[a], dejando de lado la insolencia arrogante y soberbia de su lengua. Porque es mejor para ustedes ser hallados pequeños y reconocidos[b] dentro del rebaño de Cristo que, aparentando preeminencia, ser arrojados fuera de su esperanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sujetarse».
    reason: lexical_alternative
  - marker: b
    text: O «contados entre los suyos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποτάσσεσθαι
  english_pob_choice: submit
  chosen_spanish: someternos
  alternatives_spanish:
  - someternos a
  - sujetarnos
  lexicon: ὑποτάσσω
  rationale: El verbo expresa someterse/ponerse bajo orden; en este contexto exhortativo, «someternos» comunica la idea con naturalidad en español y mantiene la fuerza del imperativo exhortativo sin volverlo eclesiásticamente técnico.
- source_word: ἀλαζόνα καὶ ὑπερήφανον τῆς γλώσσης ὑμῶν αὐθάδειαν
  english_pob_choice: the arrogant and proud self-will of your tongue
  chosen_spanish: la arrogante y soberbia autosuficiencia de vuestra lengua
  alternatives_spanish:
  - la arrogancia y soberbia autosuficiencia de vuestra lengua
  - la insolencia arrogante y soberbia de vuestra lengua
  lexicon: ἀλαζονεία / ὑπερηφανία / αὐθάδεια
  rationale: 'Se preserva el cúmulo de rasgos negativos: arrogancia, orgullo e insistencia obstinada de la lengua. «Autosuficiencia» intenta capturar la idea de αὐθάδεια como autosatisfacción obstinada o presunción, evitando suavizarla a una mera «opinión».'
- source_word: τῆς γλώσσης ὑμῶν
  english_pob_choice: of your tongue
  chosen_spanish: de vuestra lengua
  alternatives_spanish:
  - de vuestra boca
  - de vuestra habla
  lexicon: γλῶσσα
  rationale: Mantengo la metáfora concreta de «lengua», porque el griego personaliza el habla como órgano responsable de la soberbia; «boca» o «habla» diluirían esa imagen.
- source_word: μικροὺς καὶ ἐλλογίμους
  english_pob_choice: small and esteemed
  chosen_spanish: pequeños y reconocidos
  alternatives_spanish:
  - pequeños y tenidos en cuenta
  - pequeños y contados entre los suyos
  - pequeños y estimados
  lexicon: μικρός / ἐλλόγιμος
  rationale: La revisión auditada favorece el sentido de ἐλλόγιμος como «contado dentro / reconocido como miembro» más que «estimado» en sentido honorífico. «Reconocidos» conserva la idea de ser contados o admitidos entre los del rebaño, en paralelo con el contraste de ser arrojados fuera.
- source_word: ἐν τῷ ποιμνίῳ τοῦ Χριστοῦ
  english_pob_choice: within the flock of Christ
  chosen_spanish: dentro del rebaño de Cristo
  alternatives_spanish:
  - dentro del rebaño de Cristo
  - en el rebaño de Cristo
  lexicon: ποιμνίον / Χριστός
  rationale: «Rebaño» reproduce la imagen pastoral del original. Se conserva «Cristo» conforme a la decisión auditada para Χριστός en este contexto eclesial temprano, en lugar de «Mesías».
- source_word: καθ' ὑπεροχὴν δοκοῦντας
  english_pob_choice: while seeming preeminent
  chosen_spanish: aparentando preeminencia
  alternatives_spanish:
  - pareciendo sobresalir
  - dando apariencia de superioridad
  lexicon: ὑπεροχή / δοκέω
  rationale: La frase expresa apariencia de elevación o superioridad, no necesariamente realidad. «Aparentando preeminencia» mantiene la tensión entre apariencia y estatus, y enlaza bien con el contraste del versículo.
- source_word: ἐκβληθῆναι ἐκ τῆς ἐλπίδος αὐτοῦ
  english_pob_choice: to be cast out from his hope
  chosen_spanish: ser arrojados fuera de su esperanza
  alternatives_spanish:
  - ser echados fuera de su esperanza
  - ser expulsados de su esperanza
  lexicon: ἐκβάλλω / ἐλπίς
  rationale: «Arrojados fuera» conserva la fuerza expulsiva del verbo y la construcción de separación; «su esperanza» sigue el genitivo del texto y deja abierta la relación exacta sin explicar en exceso.
theological_decisions:
- issue: Χριστός en un contexto eclesial temprano
  english_pob_reading: Christ
  chosen_spanish_reading: Cristo
  alternative_spanish_readings:
  - Mesías
  rationale: La revisión auditada indica que aquí Χριστός funciona como designación cristiana establecida en el registro de 1 Clemente, no como traducción del título judío «Mesías». Por eso se mantiene «Cristo» en el texto principal.
  doctrine_reference: Uso cristológico nominal en la literatura subapostólica; decisión de registro y no de doctrina distintiva.
- issue: ἐλλογίμους y el contraste con ser expulsados
  english_pob_reading: esteemed
  chosen_spanish_reading: reconocidos
  alternative_spanish_readings:
  - estimados
  - contados entre
  rationale: 'Se preserva la tensión del pasaje: la alternativa no es honra social sino pertenencia segura dentro del rebaño. «Reconocidos» refleja la idea de ser contados/admitidos como miembros, en coherencia con la revisión lexicográfica del audit trail.'
  doctrine_reference: Eclesiología del rebaño y pertenencia comunitaria; contraste entre pertenencia y exclusión.
translation_notes:
  revision_awareness: La decisión española sigue la revisión auditada que corrigió ἐλλογίμους de «estimado» en sentido honorífico a un valor de pertenencia/reconocimiento dentro del rebaño. También mantiene «Cristo» conforme al pase de revisión para Χριστός en este contexto.
  spanish_consistency_notes:
  - Se conserva la imagen pastoral de «rebaño» para ποιμνίον y la metáfora concreta de «lengua» para γλῶσσα.
  - Se evita traducir ἐλλογίμους como mero elogio social para no debilitar el contraste con «ser arrojados fuera».
  - El tono usa un español bíblico moderno y respetuoso, sin arcaísmos innecesarios.
