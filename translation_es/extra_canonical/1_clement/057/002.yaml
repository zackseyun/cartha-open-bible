revisions:
- from: Aprended a someternos[a], dejando de lado la arrogante y soberbia autosuficiencia de vuestra lengua. Porque mejor es que se os encuentre pequeños y reconocidos[b] dentro del rebaño de Cristo que, aparentando preeminencia, ser arrojados fuera de su esperanza.
  to: Aprendan a someterse[a], dejando de lado la insolencia arrogante y soberbia de su lengua. Porque es mejor para ustedes ser hallados pequeños y reconocidos[b] dentro del rebaño de Cristo que, aparentando preeminencia, ser arrojados fuera de su esperanza.
  rationale: Se corrige la incongruencia de persona y número en la apertura, se unifica el registro al español neutral de «ustedes», y se reemplaza «autosuficiencia» por «insolencia» para reflejar mejor αὐθάδεια en contexto. Se conserva «reconocidos» con nota porque mantiene una redacción natural en español mientras la nota preserva el matiz de pertenencia/ser contados que el expediente auditado considera importante.
  reviewer_model: gpt-5.4
