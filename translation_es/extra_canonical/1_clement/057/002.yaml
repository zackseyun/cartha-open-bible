review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura exhortativa del griego y conserva los contrastes principales: someterse, desechar la altivez verbal, ser hallados pequeños dentro del rebaño de Cristo, versus parecer eminentes y ser expulsados. Sin embargo, presenta dos problemas de fidelidad: (1) «Aprended a someternos» mezcla persona y número y no corresponde al imperativo plural μάθετε con infinitivo medio ὑποτάσσεσθαι; debe dirigirse coherentemente a los oyentes, p. ej. «Aprendan a someterse». (2) «autosuficiencia» no representa bien αὐθάδεια, que aquí es más bien obstinación, arrogancia o atrevimiento insolente, no autosuficiencia en sentido moderno. El resto está sustancialmente alineado, y «reconocidos» con nota alternativa mantiene razonablemente la tensión lexical de ἐλλογίμους, aunque el matiz de pertenencia podría expresarse mejor con «contados».'
  spanish_quality_summary: 'La redacción es en general clara y digna, pero hay una incorrección gramatical seria en la apertura («Aprended a someternos») y una mezcla de registros de segunda persona («Aprended», «vuestra», «se os») que conviene regularizar. Para español neutral y legible, es preferible mantener ustedes: «Aprendan… su lengua… les…». También suena más natural «la insolencia arrogante y soberbia de su lengua» que «la arrogante y soberbia autosuficiencia de vuestra lengua».'
  glossary_alignment: «Cristo» está bien aplicado conforme a la decisión auditada para Χριστός en 1 Clemente. No hay términos del glosario mayor vulnerados aparte de la necesidad de ajustar αὐθάδεια. La elección «rebaño» para ποιμνίον es adecuada. «Reconocidos» es aceptable con nota, aunque el expediente auditado destaca la lectura de pertenencia/ser contados; conviene explicarla en la nota.
  issues:
  - severity: high
    issue: Incongruencia gramatical en «Aprended a someternos»
    rationale: El griego exhorta a los destinatarios a someterse ellos mismos. «Aprended» (2.ª plural) con «someternos» (1.ª plural) altera la referencia y produce un español incorrecto.
  - severity: medium
    issue: Registro pronominal mezclado
    rationale: El borrador alterna «Aprended», «vuestra» y «se os», combinando voseo/plural peninsular con construcciones más generales. El encargo pide español neutral latinoamericano; conviene unificar en «ustedes/su/les».
  - severity: medium
    issue: «autosuficiencia» no refleja bien αὐθάδεια
    rationale: αὐθάδεια en este contexto describe terquedad arrogante, insolencia o voluntad obstinada, especialmente de la lengua. «Autosuficiencia» desplaza el sentido hacia independencia o self-sufficiency moderna.
  - severity: low
    issue: La nota sobre ἐλλογίμους puede enfocar mejor el matiz de pertenencia
    rationale: «Reconocidos» funciona, pero el contraste con «ser arrojados fuera» sugiere más claramente ser tenidos o contados dentro del rebaño. La nota ya va en esa dirección y debe conservarse.
  revised_spanish_text: Aprendan a someterse[a], dejando de lado la insolencia arrogante y soberbia de su lengua. Porque es mejor para ustedes ser hallados pequeños y reconocidos[b] dentro del rebaño de Cristo que, aparentando preeminencia, ser arrojados fuera de su esperanza.
  revised_footnotes:
  - marker: a
    text: O «sujetarse».
    reason: lexical_alternative
  - marker: b
    text: O «contados entre los suyos».
    reason: lexical_alternative
  revision_rationale: Se corrige la incongruencia de persona y número en la apertura, se unifica el registro al español neutral de «ustedes», y se reemplaza «autosuficiencia» por «insolencia» para reflejar mejor αὐθάδεια en contexto. Se conserva «reconocidos» con nota porque mantiene una redacción natural en español mientras la nota preserva el matiz de pertenencia/ser contados que el expediente auditado considera importante.
