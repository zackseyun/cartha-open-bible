translation:
  language: es
  text: 'Porque así será: cuando me invoquen, no los escucharé; los hombres malvados me buscarán y no me hallarán. Porque aborrecieron la sabiduría y no eligieron el temor de Yahvé, ni quisieron prestar atención a mis consejos, sino que se burlaron de mis reprensiones.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπικαλέσησθέ με
  english_pob_choice: when you call upon me
  chosen_spanish: cuando me invoquen
  alternatives_spanish:
  - cuando me llamen
  - cuando me clamen
  lexicon: ἐπικαλέομαι
  rationale: «Invocar» conserva el matiz de dirigirse a una autoridad superior con ruego o llamado solemne, más cercano al griego y al contexto sapiencial-profético que un simple «llamar».
- source_word: εἰσακούσομαι
  english_pob_choice: I will not listen to you
  chosen_spanish: no los escucharé
  alternatives_spanish:
  - no les prestaré oído
  - no los oiré
  lexicon: εἰσακούω
  rationale: «Escuchar» comunica de manera natural la negativa divina a atender la súplica; mantiene el sentido relacional y judicial del verbo sin endurecerlo artificialmente.
- source_word: ζητήσουσί με κακοὶ
  english_pob_choice: evil men will seek me
  chosen_spanish: los hombres malvados me buscarán
  alternatives_spanish:
  - los malvados me buscarán
  - los malos me buscarán
  lexicon: ζητέω / κακοί
  rationale: Se conserva la fuerza moral de κακοί con «malvados» y el sujeto explícito «hombres» para mayor naturalidad en español, sin debilitar el calificativo ético.
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: σοφία
  rationale: La traducción directa «sabiduría» es clara y fiel; no requiere ajuste contextual adicional.
- source_word: τὸν δὲ φόβον τοῦ κυρίου
  english_pob_choice: the fear of the Lord
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - el temor del Señor
  - el temor de Dios
  lexicon: φόβος / κύριος
  rationale: Se usa «Yahvé» según el estándar del proyecto para el nombre divino. «Temor» retiene el respeto reverente, la obediencia y la adoración implícitas en φόβος en este contexto.
- source_word: οὐ προείλαντο
  english_pob_choice: did not choose
  chosen_spanish: no eligieron
  alternatives_spanish:
  - no prefirieron
  - no optaron por
  lexicon: προαιρέομαι
  rationale: «Eligieron» reproduce con sobriedad la decisión deliberada; «prefirieron» sería posible, pero introduce una comparación no explicitada por el griego.
- source_word: βουλαῖς
  english_pob_choice: my counsels
  chosen_spanish: mis consejos
  alternatives_spanish:
  - mis designios
  - mis planes
  lexicon: βουλή
  rationale: «Consejos» expresa bien la dimensión exhortativa y orientadora del término en este contexto; «designios» podría sonar más decretivo de lo que exige el pasaje.
- source_word: ἐμυκτήριζον
  english_pob_choice: they mocked
  chosen_spanish: se burlaron
  alternatives_spanish:
  - se mofaron
  - hicieron burla
  lexicon: μυκτηρίζω
  rationale: «Se burlaron» comunica el desprecio insolente del verbo sin caer en una expresión demasiado técnica o arcaica.
- source_word: ἐλέγχους
  english_pob_choice: my reproofs
  chosen_spanish: mis reprensiones
  alternatives_spanish:
  - mis amonestaciones
  - mis correcciones
  lexicon: ἔλεγχος
  rationale: «Reprensiones» mantiene el sentido de censura correctiva y encaja con el tono moral del texto; «correcciones» sería más suave y menos exacto.
theological_decisions:
- issue: Respuesta divina negativa al clamor de los malvados
  english_pob_reading: when you call upon me, I will not listen to you
  chosen_spanish_reading: cuando me invoquen, no los escucharé
  alternative_spanish_readings:
  - cuando me llamen, no los escucharé
  - cuando me clamen, no los escucharé
  rationale: 'Se conserva la advertencia judicial del texto: el llamado a Dios no garantiza respuesta cuando está unido a maldad persistente. «Invocar» mantiene el tono cultual y forense del pasaje.'
  doctrine_reference: Sabiduría moral / juicio divino; cf. Prov 1:28
- issue: Nombre divino en contexto de cita sapiencial
  english_pob_reading: the fear of the Lord
  chosen_spanish_reading: el temor de Yahvé
  alternative_spanish_readings:
  - el temor del Señor
  - el temor de Dios
  rationale: Aunque el griego usa κύριος, el estándar del proyecto exige recuperar el nombre divino como «Yahvé» cuando el contexto corresponde al Tetragrámaton en la tradición subyacente o en cita bíblica. Esto evita la máscara litúrgica «SEÑOR» y preserva la transparencia.
  doctrine_reference: Tetragrámaton / transparencia textual
- issue: Desprecio de la sabiduría como causa de rechazo
  english_pob_reading: they hated wisdom, and did not choose the fear of the Lord
  chosen_spanish_reading: aborrecieron la sabiduría y no eligieron el temor de Yahvé
  alternative_spanish_readings:
  - odiaron la sabiduría
  - no prefirieron el temor de Yahvé
  rationale: «Aborrecer» conserva la intensidad moral de μισέω y enlaza bien con el rechazo consciente que sigue. La secuencia mantiene el paralelismo ético entre sabiduría y temor reverente.
  doctrine_reference: Sabiduría como respuesta moral a Dios
- issue: Mockery of correction
  english_pob_reading: but they mocked my reproofs
  chosen_spanish_reading: sino que se burlaron de mis reprensiones
  alternative_spanish_readings:
  - sino que se mofaron de mis reprensiones
  - sino que hicieron burla de mis correcciones
  rationale: La burla ante la reprensión expresa no solo rechazo intelectual sino insolencia moral, coherente con el final del periodo griego.
  doctrine_reference: Corrección profética / endurecimiento moral
translation_notes:
  revision_awareness: Coincide con la última revisión disponible, que indica que no hubo cambios necesarios; se ha mantenido la sustancia del texto fuente y la equivalencia óptima del inglés auditado, adaptada directamente desde el griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología estándar del proyecto para κύριος en contextos bíblicos.
  - Se evita «Señor» como máscara del nombre divino para preservar la transparencia textual.
  - «Sabiduría», «temor», «consejos» y «reprensiones» conservan el registro sapiencial y correctivo del pasaje.
  - La sintaxis española sigue de cerca la estructura del griego sin calco excesivo, para conservar el paralelismo retórico de la sentencia.
