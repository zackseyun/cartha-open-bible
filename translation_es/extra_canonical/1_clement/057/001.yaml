translation:
  language: es
  text: 'Por tanto, ustedes, los que pusieron los cimientos de la rebelión, sométanse a los ancianos y sean disciplinados para arrepentimiento, doblando las rodillas de su corazón. Aprendan a someterse, dejando a un lado la arrogante y orgullosa obstinación de su lengua. Porque es mejor para ustedes ser hallados pequeños y estimados dentro del rebaño del Mesías que, aparentando preeminencia, ser expulsados de su esperanza.


    Porque así dice la Sabiduría toda virtuosa: “He aquí, sacaré para ustedes palabras de mi aliento, y les enseñaré mi mensaje. Porque llamé, y no escucharon; extendí palabras, y no prestaron atención; sino que invalidaron mis consejos y desobedecieron mis reprensiones. Por tanto, yo también me reiré de su ruina; me alegraré cuando sobre ustedes venga la destrucción, y cuando el tumulto repentino los alcance, y su derrumbe llegue como tormenta, o cuando vengan sobre ustedes la aflicción y el sitio. Porque sucederá que, cuando me invoquen, no los escucharé; hombres malos me buscarán y no me hallarán. Porque odiaron la sabiduría y no eligieron el temor del Señor, ni quisieron atender a mis consejos, sino que se burlaron de mis reprensiones. Por tanto, comerán el fruto de su propio camino y se saciarán de su propia impiedad. Porque, por haber estado haciendo injusticia a los inocentes, serán muertos, y el escrutinio destruirá a los impíos; pero el que me oye habitará, confiando en la esperanza,
    y reposará sin temor de ningún mal.”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὑμεῖς οὖν οἱ τὴν καταβολὴν τῆς στάσεως ποιήσαντες
  english_pob_choice: you who laid the foundation of the rebellion
  chosen_spanish: ustedes, los que pusieron los cimientos de la rebelión
  alternatives_spanish:
  - ustedes, los que causaron la rebelión
  - ustedes, los que iniciaron la discordia
  - ustedes, los que sembraron la sedición
  lexicon: LSJ
  rationale: καταβολή conserva la idea de echar cimientos; στάσις en este contexto apunta a una facción o rebelión interna. ‘Pusieron los cimientos’ mantiene la imagen fuerte sin sobreinterpretar políticamente.
- source_word: ὑποτάγητε
  english_pob_choice: submit yourselves
  chosen_spanish: sométanse
  alternatives_spanish:
  - sujétense
  - pónganse bajo
  lexicon: BDAG
  rationale: El imperativo exhortativo se expresa de manera natural en español con ‘sométanse’, manteniendo la fuerza voluntaria y disciplinada del llamado.
- source_word: πρεσβυτέροις
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - los mayores
  lexicon: BDAG
  rationale: En 1 Clemente el término tiene peso de liderazgo eclesial; ‘ancianos’ es claro y conserva el tono comunitario sin recurrir a una transliteración innecesaria.
- source_word: παιδεύθητε εἰς μετάνοιαν
  english_pob_choice: be disciplined unto repentance
  chosen_spanish: sean disciplinados para arrepentimiento
  alternatives_spanish:
  - sean instruidos para arrepentimiento
  - acepten corrección para arrepentimiento
  lexicon: BDAG
  rationale: παιδεύω implica disciplina formativa y correctiva, no solo enseñanza. ‘Para arrepentimiento’ conserva el valor final de εἰς.
- source_word: κάμψαντες τὰ γόνατα τῆς καρδίας
  english_pob_choice: bending the knees of your heart
  chosen_spanish: doblando las rodillas de su corazón
  alternatives_spanish:
  - inclinando las rodillas de su corazón
  - doblando las rodillas de su interior
  lexicon: LSJ
  rationale: Se preserva la metáfora sorprendente del original, que expresa humildad interior y no solo gesto externo.
- source_word: ἀλαζόνα καὶ ὑπερήφανον ... αὐθάδειαν
  english_pob_choice: the arrogant and proud self-will
  chosen_spanish: la arrogante y orgullosa autosuficiencia
  alternatives_spanish:
  - la arrogante y orgullosa obstinación
  - la jactanciosa y soberbia autosuficiencia
  - la insolencia arrogante y orgullosa
  lexicon: BDAG
  rationale: Se traduce αὐθάδεια con una expresión española que preserve el matiz de autosuficiencia obstinada y altiva; en este contexto de lengua y habla, ‘autosuficiencia’ comunica la dureza del término sin perder naturalidad.
- source_word: ἐλλογίμους
  english_pob_choice: esteemed
  chosen_spanish: estimados
  alternatives_spanish:
  - reconocidos
  - tenidos en honor
  - considerados
  lexicon: LSJ
  rationale: ‘Estimados’ conserva el contraste con la aparente preeminencia y resulta natural en español actual.
- source_word: ἐκβληθῆναι ἐκ τῆς ἐλπίδος αὐτοῦ
  english_pob_choice: to be cast out from his hope
  chosen_spanish: ser expulsados de su esperanza
  alternatives_spanish:
  - ser arrojados fuera de su esperanza
  - ser excluidos de su esperanza
  - ser apartados de la esperanza en él
  lexicon: BDAG
  rationale: Se mantiene la dureza del verbo de expulsión y la ambigüedad del genitivo, sin resolverla interpretativamente.
- source_word: πανάρετος σοφία
  english_pob_choice: all-virtuous Wisdom
  chosen_spanish: la Sabiduría toda virtuosa
  alternatives_spanish:
  - la Sabiduría enteramente virtuosa
  - la Sabiduría perfectísima
  lexicon: LSJ
  rationale: Se conserva el tono personificado y elevado del epíteto, con una construcción natural en español.
- source_word: πνοῆς ῥῆσιν
  english_pob_choice: words of my breath
  chosen_spanish: palabras de mi aliento
  alternatives_spanish:
  - palabras de mi espíritu
  - un dicho de mi aliento
  - una palabra de mi aliento
  lexicon: LSJ
  rationale: El plural ‘palabras’ sigue la revisión inglesa más cercana al griego, y ‘aliento’ mantiene la imagen de πνοή sin importar una lectura pneumatológica adicional.
- source_word: ἐξέτεινον λόγους
  english_pob_choice: I stretched out words
  chosen_spanish: extendí palabras
  alternatives_spanish:
  - prolongué mis palabras
  - alargué mis palabras
  lexicon: LSJ
  rationale: Se conserva la rareza imagética del griego con un giro español simple y fiel.
- source_word: ἀκύρους ἐποιεῖτε τὰς ἐμὰς βουλάς
  english_pob_choice: made my counsels void
  chosen_spanish: invalidaron mis consejos
  alternatives_spanish:
  - anularon mis consejos
  - dejaron sin efecto mis consejos
  lexicon: BDAG
  rationale: ‘Invalidaron’ recoge bien el sentido de hacer nulas las decisiones o consejos; ‘consejos’ funciona mejor en español que una traducción más abstracta.
- source_word: ἐλέγχοις
  english_pob_choice: reproofs
  chosen_spanish: reprensiones
  alternatives_spanish:
  - repruebas
  - correcciones
  - reprensiones disciplinarias
  lexicon: BDAG
  rationale: ‘Reprensiones’ conserva el matiz admonitorio de sabiduría bíblica y evita suavizar el reproche.
- source_word: ἐπιγελάσομαι / καταχαροῦμαι
  english_pob_choice: I will laugh ... I will rejoice
  chosen_spanish: me reiré ... me alegraré
  alternatives_spanish:
  - me burlaré ... me regocijaré
  - me reiré ... me gozaré
  lexicon: LSJ
  rationale: Se preserva la ironía judicial del pasaje con verbos españoles directos y sobrios.
- source_word: θόρυβος
  english_pob_choice: turmoil
  chosen_spanish: tumulto
  alternatives_spanish:
  - confusión
  - alboroto
  - pánico
  lexicon: BDAG
  rationale: ‘Tumulto’ transmite la irrupción súbita e inquietante del desastre mejor que ‘ruido’ o ‘confusión’ solos.
- source_word: πολιορκία
  english_pob_choice: siege
  chosen_spanish: sitio
  alternatives_spanish:
  - asedio
  lexicon: LSJ
  rationale: ‘Sitio’ es el equivalente español más directo y literario; mantiene la concreción militar de la imagen.
- source_word: κακοὶ
  english_pob_choice: evil men
  chosen_spanish: hombres malos
  alternatives_spanish:
  - los malos
  - personas malvadas
  - hombres malvados
  lexicon: BDAG
  rationale: Se conserva el valor moral del plural masculino del proverbio sin caer en un abstracto impersonal.
- source_word: προείλαντο
  english_pob_choice: did not choose
  chosen_spanish: no eligieron
  alternatives_spanish:
  - no prefirieron
  - no escogieron
  lexicon: LSJ
  rationale: ‘Elegir’ expresa con claridad la decisión deliberada implícita en el verbo.
- source_word: ἐμυκτήριζον
  english_pob_choice: mocked
  chosen_spanish: se burlaron
  alternatives_spanish:
  - se mofaron
  - despreciaron
  - se burlaban
  lexicon: BDAG
  rationale: ‘Se burlaron’ reproduce bien el desprecio activo del verbo y suena natural en español.
- source_word: ἀσεβείας
  english_pob_choice: ungodliness
  chosen_spanish: impiedad
  alternatives_spanish:
  - injusticia contra Dios
  - maldad
  - irreverencia
  lexicon: BDAG
  rationale: ‘Impiedad’ conserva la dimensión vertical del término, más precisa que ‘maldad’.
- source_word: νηπίους
  english_pob_choice: the innocent
  chosen_spanish: los inocentes
  alternatives_spanish:
  - los indefensos
  - los pequeños
  - los niños
  lexicon: BDAG
  rationale: 'Sigue la lectura ética del contexto sapiencial: personas vulnerables e inocentes injustamente dañadas.'
- source_word: ἐξέτασμος
  english_pob_choice: scrutiny
  chosen_spanish: la escrutinio
  alternatives_spanish:
  - el escrutinio
  - la investigación
  - la pesquisa
  lexicon: LSJ
  rationale: El término griego es raro; el español necesita el artículo masculino ‘el’ por concordancia y naturalidad. Se mantiene la idea de examen severo que destruye a los impíos.
- source_word: κατασκηνώσει ἐπ' ἐλπίδι πεποιθώς
  english_pob_choice: will dwell, trusting in hope
  chosen_spanish: habitará, confiando en la esperanza
  alternatives_spanish:
  - morará, confiando en la esperanza
  - acampará, confiando en la esperanza
  - vivirá, confiando en la esperanza
  lexicon: BDAG
  rationale: ‘Habitará’ preserva la permanencia del verbo y ‘confiando en la esperanza’ mantiene la construcción participial sin sobrerresolverla.
theological_decisions:
- issue: Rendering Χριστοῦ
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se sigue la pauta del proyecto de traducir el título mesiánico cuando funciona como designación, no como nombre propio litúrgico.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Meaning of ἐκ τῆς ἐλπίδος αὐτοῦ
  english_pob_reading: from his hope
  chosen_spanish_reading: de su esperanza
  alternative_spanish_readings:
  - de la esperanza en él
  - de su esperanza prometida
  rationale: 'La frase conserva la ambigüedad del genitivo: la advertencia puede referirse a la esperanza de él o a la esperanza vinculada a él. No se resuelve interpretativamente.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Pneumatic imagery in πνοῆς
  english_pob_reading: my breath
  chosen_spanish_reading: mi aliento
  alternative_spanish_readings:
  - mi espíritu
  - mi soplo
  rationale: ‘Aliento’ conserva la imagen concreta y evita imponer una equivalencia doctrinal demasiado fuerte donde el texto usa una metáfora de procedencia verbal.
  doctrine_reference: 'DOCTRINE.md: Preserve source imagery unless context requires clarification.'
translation_notes:
  revision_awareness: I incorporated the latest audit revision by using the plural ‘palabras de mi aliento’ rather than a singular ‘palabra’, and by rendering ἐξέτασμος with a natural severe term (‘escrutinio’) instead of a generic examination. I also kept the translation aligned with the reviewed English POB text rather than the earlier draft.
  spanish_consistency_notes:
  - Se usó ‘Mesías’ para Χριστός de acuerdo con la política del proyecto y el contexto cristológico del pasaje.
  - Se mantuvo un registro digno y eclesial, con imperativos claros y sin arcaísmos innecesarios.
  - Se preservó la metáfora de ‘las rodillas de su corazón’ para no aplanar la imagen interna de humildad.
  - Se evitó ‘SEÑOR’ como máscara para יהוה porque el pasaje citado en griego usa κύριος dentro de la cita sapiencial y la tradición del proyecto pide no ocultar el nombre divino cuando corresponde.
