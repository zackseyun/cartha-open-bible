base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/057/001.yaml
  text: 'Therefore, you who laid the foundation of the rebellion, submit yourselves to the elders and be disciplined unto repentance, bending the knees of your heart. Learn to submit, putting away the arrogant and proud self-will of your tongue. For it is better for you to be found small and esteemed within the flock of the Messiah than, while seeming preeminent, to be cast out from his hope.


    For thus says all-virtuous Wisdom: “Behold, I will bring forth to you words of my breath, and I will teach you my message. Because I called and you did not listen, and I stretched out words and you paid no attention, but made my counsels void, and disobeyed my reproofs, therefore I also will laugh at your ruin; I will rejoice when destruction comes upon you, and when sudden turmoil reaches you, and your overthrow comes like a storm, or when affliction and siege come upon you. For it shall be that when you call upon me, I will not listen to you; evil men will seek me and will not find me. For they hated wisdom, and did not choose the fear of the Lord, nor were they willing to attend to my counsels, but they mocked my reproofs. Therefore they will eat the fruits of their own way and be filled with their own ungodliness. For because they were wronging the innocent, they will be slain, and scrutiny will destroy the ungodly; but the one who hears me will dwell, trusting in hope, and will
    be at rest without fear from every evil.”'
