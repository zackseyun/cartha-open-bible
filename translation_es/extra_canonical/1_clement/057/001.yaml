review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro de auditoría inglés en la mayoría de las decisiones importantes: conserva la imagen de ‘poner los cimientos’ de la rebelión, el llamado a someterse a los ancianos, la metáfora de ‘las rodillas del corazón’, el título ‘Mesías’, la rareza de ‘palabras de mi aliento’, y la ambigüedad de ‘de su esperanza’. También mantiene bien el registro sapiencial de la larga cita. Sin embargo, hay un desajuste léxico relevante en αὐθάδεια, donde ‘autosuficiencia’ no expresa bien la idea de terquedad/voluntad propia, y un error gramatical claro en ‘la escrutinio’.'
  spanish_quality_summary: El texto es en general legible, digno y apropiado para un español eclesial amplio. La sintaxis fluye bien y evita calcos innecesarios en la mayor parte del pasaje. No obstante, ‘sean disciplinados para arrepentimiento’ suena algo menos natural que ‘acépten la disciplina para arrepentimiento’ o similar, aunque sigue siendo comprensible. El problema principal de calidad es ‘la escrutinio’, que es incorrecto en español; además, ‘autosuficiencia de su lengua’ resulta semánticamente extraño en este contexto de habla altiva.
  glossary_alignment: 'Buena alineación con las pautas del proyecto: Χριστοῦ -> ‘Mesías’; κύριος en la cita sapiencial -> ‘el Señor’, lo cual es aceptable dado que la fuente inmediata es una cita griega tradicional y no aparece יהוה directamente; μετάνοια -> ‘arrepentimiento’; ἀσεβείας -> ‘impiedad’. La principal excepción a corregir es αὐθάδεια, para la cual ‘obstinación’ o ‘voluntad propia’ se alinea mejor con la decisión inglesa documentada (‘self-will’).'
  issues:
  - severity: medium
    issue: ‘autosuficiencia’ para αὐθάδεια
    rationale: El término griego apunta más a voluntad propia obstinada, terquedad o arrogancia autosuficiente en el sentido de obstinación, no simplemente a ‘autosuficiencia’. En el contexto ‘de su lengua’, ‘obstinación’ o ‘voluntad propia’ refleja mejor la reprensión moral.
  - severity: high
    issue: ‘la escrutinio’
    rationale: Es un error gramatical en español; debe ser ‘el escrutinio’. Al estar en el texto principal, requiere corrección.
  - severity: low
    issue: ‘sitio’ para πολιορκία puede sonar menos claro que ‘asedio’ en español general
    rationale: ‘Sitio’ es defendible y está documentado, pero ‘asedio’ sería más transparente para lectores modernos. No es necesario cambiarlo si se prefiere mantener el tono más literal/literario.
  revised_spanish_text: 'Por tanto, ustedes, los que pusieron los cimientos de la rebelión, sométanse a los ancianos y sean disciplinados para arrepentimiento, doblando las rodillas de su corazón. Aprendan a someterse, dejando a un lado la arrogante y orgullosa obstinación de su lengua. Porque es mejor para ustedes ser hallados pequeños y estimados dentro del rebaño del Mesías que, aparentando preeminencia, ser expulsados de su esperanza.


    Porque así dice la Sabiduría toda virtuosa: “He aquí, sacaré para ustedes palabras de mi aliento, y les enseñaré mi mensaje. Porque llamé, y no escucharon; extendí palabras, y no prestaron atención; sino que invalidaron mis consejos y desobedecieron mis reprensiones. Por tanto, yo también me reiré de su ruina; me alegraré cuando sobre ustedes venga la destrucción, y cuando el tumulto repentino los alcance, y su derrumbe llegue como tormenta, o cuando vengan sobre ustedes la aflicción y el sitio. Porque sucederá que, cuando me invoquen, no los escucharé; hombres malos me buscarán y no me hallarán. Porque odiaron la sabiduría y no eligieron el temor del Señor, ni quisieron atender a mis consejos, sino que se burlaron de mis reprensiones. Por tanto, comerán el fruto de su propio camino y se saciarán de su propia impiedad. Porque, por haber estado haciendo injusticia a los inocentes, serán muertos, y el escrutinio destruirá a los impíos; pero el que me oye habitará, confiando en la esperanza,
    y reposará sin temor de ningún mal.”'
  revision_rationale: 'Se corrigen dos puntos necesarios: (1) αὐθάδεια se vierte mejor como ‘obstinación’ que como ‘autosuficiencia’, para conservar el sentido de voluntad propia arrogante en el habla; (2) ‘la escrutinio’ se corrige a ‘el escrutinio’ por gramática española. No se requieren notas nuevas porque no cambia ninguna ambigüedad teológica ni se introduce una alternativa que deba preservarse en nota.'
