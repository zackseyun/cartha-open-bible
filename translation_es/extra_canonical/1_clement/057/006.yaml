translation:
  language: es
  text: Por tanto, comerán los frutos de su propio camino y se saciarán de su propia impiedad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔδονται
  english_pob_choice: will eat
  chosen_spanish: comerán
  alternatives_spanish:
  - se alimentarán de
  - cosecharán
  lexicon: ἐσθίω
  rationale: 'La imagen es literal: ‘comer’ conserva la metáfora de apropiarse de los resultados de su conducta, como en el inglés POB. ‘Cosecharán’ interpreta más la figura que el griego aquí, y ‘se alimentarán de’ suena menos directo.'
- source_word: τῆς ἑαυτῶν ὁδοῦ τοὺς καρποὺς
  english_pob_choice: the fruits of their own way
  chosen_spanish: los frutos de su propio camino
  alternatives_spanish:
  - los frutos de su propia senda
  - el fruto de su propio proceder
  lexicon: ὁδός; καρπός
  rationale: ‘Camino’ refleja bien ὁδός y mantiene la metáfora de conducta y resultado. ‘Frutos’ conserva καρπούς de modo natural en español. ‘Proceder’ aclara el sentido, pero debilita la imagen del texto.
- source_word: ἀσεβείας
  english_pob_choice: ungodliness
  chosen_spanish: impiedad
  alternatives_spanish:
  - irreligión
  - falta de reverencia
  lexicon: ἀσέβεια
  rationale: ‘Impiedad’ es el equivalente español más estable para ἀσέβεια en registro bíblico y conserva la carga de irreverencia ante Dios. ‘Irreligión’ suena más moderna pero menos precisa; ‘falta de reverencia’ explica demasiado.
theological_decisions:
- issue: Retribution by moral self-causation
  english_pob_reading: they will eat the fruits of their own way and be filled with their own ungodliness
  chosen_spanish_reading: comerán los frutos de su propio camino y se saciarán de su propia impiedad
  alternative_spanish_readings:
  - recibirán el fruto de su propio camino y quedarán llenos de su impiedad
  - cosecharán las consecuencias de su propio camino
  rationale: 'El verso presenta una retribución intrínseca: los actos propios producen su propio resultado. Mantener ‘comerán’ y ‘frutos’ preserva esa relación causal sin suavizarla. ‘Se saciarán’ traduce bien πλησθήσονται como plenitud negativa, no solo como castigo externo.'
  doctrine_reference: Principio bíblico de retribución moral; cf. Gálatas 6:7-8; Proverbios 1:31-33
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el acuerdo con la fuente fue alto; por tanto, se mantiene una traducción directa y conservadora, sin notas textuales añadidas.
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre ‘comerán’ y ‘se saciarán’ para reflejar ambas imágenes verbales del griego.
  - ‘Impiedad’ se usa como término técnico bíblico para ἀσέβεια, en coherencia con un registro eclesial moderno y digno.
