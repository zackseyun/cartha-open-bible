- from: Mandó que se realizaran tanto las ofrendas como los servicios,[a] y no que ocurrieran al azar o sin orden, sino en tiempos y horas señalados.
  to: Mandó que se realizaran tanto las ofrendas como los servicios, y que no tuvieran lugar[a] al azar o sin orden, sino en tiempos y horas señalados.
  rationale: Se reubica la nota al pie al segmento verbal pertinente y se alisa la sintaxis española sin cambiar el sentido del griego. La revisión conserva la fuerza cultual y el contraste entre actos ordenados y actos hechos sin orden, en tiempos determinados.
