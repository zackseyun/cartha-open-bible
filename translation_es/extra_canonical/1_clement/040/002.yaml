review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: προσφοραί = «ofrendas», λειτουργίαι = «servicios», εἰκῇ/ἀτάκτως = «al azar o sin orden», ὡρισμένοις καιροῖς καὶ ὥραις = «en tiempos y horas señalados». Sin embargo, la nota al pie está mal anclada y no corresponde al lugar de variación documentado en el inglés: la alternativa se refiere a la cláusula verbal «tener lugar/ocurrir», no a «servicios».'
  spanish_quality_summary: 'El español es claro y digno, pero la frase «y no que ocurrieran» suena algo forzada tras «Mandó que se realizaran». Conviene mantener el paralelismo verbal y una sintaxis más natural: «y que no tuvieran lugar...». También debe corregirse la ubicación de la nota al pie para evitar confusión.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ofrendas» y «servicios» son elecciones adecuadas aquí. «Señalados» es aceptable para ὡρισμένοις, aunque «fijados» también sería posible; no requiere adjudicación adicional.
  issues:
  - severity: medium
    issue: Nota al pie anclada en «servicios» en vez de la cláusula verbal relevante
    rationale: La nota inglesa documenta una alternativa para la construcción verbal («be performed / not happen / take place»), no una alternativa léxica para λειτουργίας. En español, colocar [a] tras «servicios» induce a pensar que la variante afecta ese sustantivo.
  - severity: low
    issue: Sintaxis algo rígida en «y no que ocurrieran»
    rationale: Aunque comprensible, después de «Mandó que se realizaran...» suena más natural y equilibrado «y que no tuvieran lugar al azar o sin orden». Esto preserva el contraste entre ejecución ordenada y realización desordenada.
  revised_spanish_text: Mandó que se realizaran tanto las ofrendas como los servicios, y que no tuvieran lugar[a] al azar o sin orden, sino en tiempos y horas señalados.
  revised_footnotes:
  - marker: a
    text: 'O también: «no que ocurrieran al azar o sin orden».'
    reason: alternative_rendering_of_verbal_clause
  revision_rationale: Se reubica la nota al pie al segmento verbal pertinente y se alisa la sintaxis española sin cambiar el sentido del griego. La revisión conserva la fuerza cultual y el contraste entre actos ordenados y actos hechos sin orden, en tiempos determinados.
