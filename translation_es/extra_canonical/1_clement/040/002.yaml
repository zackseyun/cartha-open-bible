source:
  edition: Funk 1901 (normalized OCR)
  text: τὰς τε προσφορὰς καὶ λειτουργίας ἐπιτελεῖσθαι, καὶ οὐκ εἰκῇ ἢ ἀτάκτως ἐκέλευσεν γίνεσθαι, ἀλλʼ ὡρισμένοις καιροῖς καὶ ὥραις.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/040/002.yaml
  text: He commanded that both the offerings and the services be performed[a], and not take place casually or disorderly, but at appointed times and hours.
  footnotes:
  - marker: a
    text: Or 'not happen casually or disorderly'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:43Z'
    unchanged: false
    changes_summary: Removed duplicated clause and corrected the sentence structure. Rendered λειτουργίας as 'services' for naturalness alongside 'offerings,' and translated εἰκῇ/ἀτάκτως as 'casually or disorderly' while preserving the formal tone. Kept 'appointed times and hours' for ὡρισμένοις καιροῖς καὶ ὥραις.
translation:
  language: es
  text: Mandó que se realizaran tanto las ofrendas como los servicios, y que no tuvieran lugar[a] al azar o sin orden, sino en tiempos y horas señalados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «no que ocurrieran al azar o sin orden».'
    reason: alternative_rendering_of_verbal_clause
lexical_decisions:
- source_word: τὰς τε προσφορὰς
  english_pob_choice: the offerings
  chosen_spanish: las ofrendas
  alternatives_spanish:
  - los sacrificios
  - las oblaciones
  lexicon: προσφορά
  rationale: «Ofrendas» conserva el sentido cultual general sin restringirlo innecesariamente a sacrificios animales; también encaja con el paralelo de «servicios» en español.
- source_word: λειτουργίας
  english_pob_choice: the services
  chosen_spanish: los servicios
  alternatives_spanish:
  - las ministraciones
  - las liturgias
  lexicon: λειτουργία
  rationale: «Servicios» refleja la función ritual o ministerial de manera natural en español y sigue la decisión inglesa de evitar un tecnicismo eclesiástico rígido.
- source_word: ἐπιτελεῖσθαι
  english_pob_choice: be performed
  chosen_spanish: se realizaran
  alternatives_spanish:
  - se ejecutaran
  - se llevaran a cabo
  lexicon: ἐπιτελέω
  rationale: El pasivo infinitivo pide una formulación impersonal natural en español; «realizarse» comunica bien la idea de ejecución completa de actos cultuales.
- source_word: οὐκ εἰκῇ ἢ ἀτάκτως
  english_pob_choice: not take place casually or disorderly
  chosen_spanish: no que ocurrieran al azar o sin orden
  alternatives_spanish:
  - no que sucedieran casualmente o desordenadamente
  - no que se hicieran sin criterio ni orden
  lexicon: εἰκῇ / ἀτάκτως
  rationale: «Al azar» expresa la falta de plan implícita en εἰκῇ; «sin orden» preserva ἀτάκτως sin usar un adverbio antinatural en español. Se evita un calco duro como «desordenadamente» después de «ocurrir».
- source_word: ὡρισμένοις καιροῖς καὶ ὥραις
  english_pob_choice: at appointed times and hours
  chosen_spanish: en tiempos y horas señalados
  alternatives_spanish:
  - en tiempos y horas designados
  - en tiempos y horas fijados
  lexicon: ὁρίζω / καιρός / ὥρα
  rationale: «Señalados» mantiene la idea de fijación determinada y resulta idiomático. «Tiempos y horas» conserva la doble expresión del griego sin reducirla a una sola noción.
theological_decisions:
- issue: Orden divino en las prácticas cultuales
  english_pob_reading: He commanded that both the offerings and the services be performed ... but at appointed times and hours.
  chosen_spanish_reading: Mandó que se realizaran tanto las ofrendas como los servicios ... sino en tiempos y horas señalados.
  alternative_spanish_readings:
  - Mandó que se hicieran ...
  - Ordenó que se realizaran ...
  rationale: El texto presenta una regulación de las prácticas cultuales según tiempos determinados; «mandó» conserva el tono de autoridad normativa sin añadir matices doctrinales ajenos.
  doctrine_reference: Orden litúrgico y disciplina cultual en la comunidad
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que corrigió la secuencia a «not take place casually or disorderly» y preservó «appointed times and hours». La versión española refleja esa combinación con una oposición clara entre «al azar o sin orden» y «tiempos y horas señalados».
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y culto, apto para publicación eclesial.
  - Se evitó traducir λειτουργία con «liturgia» para no introducir un tecnicismo no exigido por el contexto.
  - La coordinación «tanto ... como ...» reproduce el doble objeto del griego y del inglés auditado.
