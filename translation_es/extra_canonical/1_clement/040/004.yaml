  timestamp: '2026-05-07T22:46:28Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: presentar ofrendas en tiempos fijados, resultar aceptables y bienaventurados, y no desviarse al seguir normas autorizadas. También preserva adecuadamente la alternativa de τοῖς προστεταγμένοις καιροῖς con nota. Sin embargo, δεσπότου corresponde mejor a un término de autoridad como «Dueño» o «Amo» que a «Señor», ya que aquí no hay base textual para sustituirlo por el término español normalmente reservado para κύριος o para el nombre divino. Además, «ordenanzas legítimas» es comprensible, pero «preceptos establecidos» o «ordenanzas establecidas» refleja mejor τοῖς νομίμοις como lo normativo/establecido que meramente lo legítimo.'
  spanish_quality_summary: El español es claro, natural y de registro eclesial digno. «Tiempos señalados», «sus ofrendas», «aceptables» y «bienaventurados» están bien logrados. La principal mejora de legibilidad/fidelidad es evitar «del Señor» para δεσπότου, porque introduce una asociación terminológica no apoyada por el griego inmediato y diluye el matiz de autoridad posesiva de δεσπότης.
  glossary_alignment: 'No hay conflicto con los términos por defecto principales del proyecto. La cuestión terminológica relevante es δεσπότης: el inglés auditado usa «the Master», y el español «el Señor» se aparta innecesariamente de ese matiz. Conviene mantener un equivalente más cercano a «Master», aquí «el Dueño», que además evita confundirlo con κύριος/Yahvé.'
  issues:
  - severity: medium
    issue: «del Señor» para τοῦ δεσπότου
    rationale: δεσπότης no es κύριος. Traducirlo como «Señor» borra una distinción léxica importante y puede introducir asociaciones teológicas/titulares no exigidas por el texto. «Dueño» reproduce mejor la autoridad del original y del inglés «Master».
  - severity: low
    issue: «ordenanzas legítimas» puede suavizar τοῖς νομίμοις
    rationale: νόμιμος aquí apunta a lo reglamentado, conforme a norma establecida. «Legítimas» es posible, pero en español puede sonar más abstracto o jurídico. «Establecidas» o «prescritas» refleja mejor el matiz normativo en este contexto ritual.
  - severity: low
    issue: Error tipográfico en alternativas léxicas documentadas
    rationale: La alternativa «en los tiempos назначados» mezcla español con ruso y debe corregirse en el registro editorial, aunque no afecta el texto principal.
  revised_spanish_text: Por tanto, quienes presentan sus ofrendas en los tiempos señalados[a] son aceptables y bienaventurados; porque, al seguir las ordenanzas establecidas del Dueño, no se extravían.
  revised_footnotes:
  - marker: a
    text: 'O: «en los tiempos prescritos».'
    reason: Alternative rendering of τοῖς προστεταγμένοις καιροῖς preserved from the English audit trail.
  revision_rationale: Se conserva la estructura y casi todo el léxico del borrador, pero se ajusta δεσπότου a «Dueño» para reflejar mejor el griego y el inglés «Master» sin confundirlo con κύριος/«Señor». También se cambia «ordenanzas legítimas» por «ordenanzas establecidas» para expresar con mayor precisión el matiz normativo de τοῖς νομίμοις. No se requiere adjudicación adicional porque la corrección es clara y de bajo riesgo doctrinal.
