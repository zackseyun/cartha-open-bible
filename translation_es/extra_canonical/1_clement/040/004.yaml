revisions:
- from: Por tanto, quienes presentan sus ofrendas en los tiempos señalados[a] son aceptables y bienaventurados; porque, al seguir las ordenanzas legítimas del Señor, no se extravían.
  to: Por tanto, quienes presentan sus ofrendas en los tiempos señalados[a] son aceptables y bienaventurados; porque, al seguir las ordenanzas establecidas del Dueño, no se extravían.
  rationale: Se conserva la estructura y casi todo el léxico del borrador, pero se ajusta δεσπότου a «Dueño» para reflejar mejor el griego y el inglés «Master» sin confundirlo con κύριος/«Señor». También se cambia «ordenanzas legítimas» por «ordenanzas establecidas» para expresar con mayor precisión el matiz normativo de τοῖς νομίμοις. No se requiere adjudicación adicional porque la corrección es clara y de bajo riesgo doctrinal.
