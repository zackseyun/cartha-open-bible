id: 1CLEM.40.4
reference: 1 Clement 40:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: οἱ οὖν τοῖς προστεταγμένοις καιροῖς ποιοῦντες τὰς προσφορὰς αὐτῶν εὐπρόσδεκτοί τε καὶ μακάριοί· τοῖς γὰρ νομίμοις τοῦ δεσπότου ἀκολουθοῦντες οὐ διαμαρτάνουσιν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/040/004.yaml
  text: Therefore those who make their offerings at the appointed times are both acceptable and blessed[a]; for by following the lawful ordinances of the Master they do not go astray.
  footnotes:
  - marker: a
    text: Or 'at the appointed times that have been prescribed'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:43Z'
    unchanged: false
    changes_summary: Changed 'prescribed times' to 'appointed times' for a more natural rendering of προστεταγμένοις καιροῖς while preserving the sense of designated times. No other changes needed.
translation:
  language: es
  text: Por tanto, quienes presentan sus ofrendas en los tiempos señalados[a] son aceptables y bienaventurados; porque, al seguir las ordenanzas establecidas del Dueño, no se extravían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en los tiempos prescritos».'
    reason: Alternative rendering of τοῖς προστεταγμένοις καιροῖς preserved from the English audit trail.
lexical_decisions:
- source_word: τοῖς προστεταγμένοις καιροῖς
  english_pob_choice: at the appointed times
  chosen_spanish: en los tiempos señalados
  alternatives_spanish:
  - en los tiempos назначados
  - en los tiempos prescritos
  - en los tiempos establecidos
  lexicon: καιρός; προτάσσω / προστετάγμαι
  rationale: La expresión griega combina un sustantivo temporal con un participio pasivo que indica tiempos fijados o designados. En español, "tiempos señalados" comunica naturalmente la idea de momentos determinados sin sonar redundante. Evita el matiz demasiado legalista de "prescritos" y preserva la noción de cita establecida del original y del audit trail inglés.
- source_word: προσφορὰς
  english_pob_choice: their offerings
  chosen_spanish: sus ofrendas
  alternatives_spanish:
  - sus sacrificios
  - sus donativos
  - sus oblaciones
  lexicon: προσφορά
  rationale: '"Ofrendas" es la equivalencia más directa y comprensible en español eclesial moderno. "Sacrificios" sería más fuerte de lo que exige el término en este contexto; "oblaciones" es más técnico y menos transparente.'
- source_word: εὐπρόσδεκτοί
  english_pob_choice: acceptable
  chosen_spanish: aceptables
  alternatives_spanish:
  - bien recibidos
  - agradables
  - bienvenidos
  lexicon: εὐπρόσδεκτος
  rationale: '"Aceptables" conserva con fidelidad el sentido de ser recibidos favorablemente. "Bien recibidos" suaviza demasiado el término y "agradables" desplaza el énfasis hacia cualidad subjetiva.'
- source_word: μακάριοί
  english_pob_choice: blessed
  chosen_spanish: bienaventurados
  alternatives_spanish:
  - benditos
  - felices
  lexicon: μακάριος
  rationale: '"Bienaventurados" mantiene el registro bíblico y expresa la condición favorecida que el griego sugiere. "Benditos" puede sonar más general; "felices" sería insuficiente.'
- source_word: τοῖς γὰρ νομίμοις τοῦ δεσπότου ἀκολουθοῦντες
  english_pob_choice: for by following the lawful ordinances of the Master
  chosen_spanish: porque, al seguir las ordenanzas legítimas del Señor
  alternatives_spanish:
  - porque, al seguir las ordenanzas legales del Dueño
  - pues, siguiendo las leyes del Señor
  - porque, al seguir los preceptos legítimos del Amo
  lexicon: νόμιμος; δεσπότης; ἀκολουθέω
  rationale: '"Ordenanzas legítimas" transmite el matiz de normas autorizadas o debidas, sin restringirlo a legislación civil. Para δεσπότης, opté por "Señor" en vez de "Dueño" o "Amo" porque en este contexto litúrgico/ecclesial el español "Señor" comunica autoridad reverente de forma más fiel al uso del POB inglés "Master", que aquí funciona como título de autoridad, no como simple posesión. Se conserva la tensión de autoridad normativa sin imponer un vocabulario tradicional que borre el matiz.'
- source_word: οὐ διαμαρτάνουσιν
  english_pob_choice: they do not go astray
  chosen_spanish: no se extravían
  alternatives_spanish:
  - no pecan
  - no yerran
  - no se desvían
  lexicon: διαμαρτάνω
  rationale: El verbo puede significar errar, faltar o desviarse; el inglés POB eligió "go astray" en vez de "sin". En español, "no se extravían" reproduce bien la imagen de desviación de camino y evita adelantar una lectura exclusivamente moral de "pecan".
theological_decisions:
- issue: Cómo rendir δεσπότης en un contexto eclesial/autoritativo
  english_pob_reading: the Master
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Dueño
  - el Amo
  rationale: Aunque δεσπότης puede traducirse literalmente como "dueño" o "amo", el contexto exhortativo y reverente del pasaje favorece un título de autoridad. "Señor" conserva dignidad, es inteligible para lectores de iglesia y no suaviza la relación de obediencia. La elección busca mantener la fuerza teológica del texto sin introducir una tonalidad servil innecesaria.
  doctrine_reference: Cristología y lenguaje de autoridad divina en textos cristianos primitivos
- issue: El valor moral de οὐ διαμαρτάνουσιν
  english_pob_reading: they do not go astray
  chosen_spanish_reading: no se extravían
  alternative_spanish_readings:
  - no pecan
  - no erran
  rationale: El griego admite un matiz de desviación/errar. El inglés POB evita cerrar el sentido en "sin" o "do not sin". En español, "no se extravían" conserva esa amplitud y evita convertir la frase en una afirmación doctrinal más fuerte de lo que la forma verbal exige por sí sola.
  doctrine_reference: Ética de obediencia y perseverancia
translation_notes:
  revision_awareness: 'Se respetó la revisión del inglés que eliminó la expansión redundante de ''that have been prescribed'' y dejó simplemente ''appointed times''. La versión española evita igualmente una perífrasis pesada y refleja la idea de tiempos designados con una expresión natural: ''tiempos señalados''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando aparezca; aquí no hay ocurrencia directa.
  - '''Señor'' se usa aquí para δεσπότης por el tono reverente del pasaje y la función de autoridad normativa.'
  - No se introduce 'Cristo' ni 'Mesías' porque el texto no los contiene.
  - La puntuación sigue el español moderno, conservando una sola cláusula causal clara y el paralelismo final del griego.
