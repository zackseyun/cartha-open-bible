- from: Por tanto, ya que estas cosas nos son claras, y ya que hemos mirado en las profundidades del conocimiento divino, debemos hacer todo en orden, como el Maestro mandó que se hiciera en los tiempos señalados. Mandó que tanto las ofrendas como los ministerios se realizaran, y no que sucedieran de manera casual o desordenada, sino en tiempos y horas fijados. Y dónde y por medio de quiénes quiere que se realicen, él mismo lo تعیینó por su voluntad suprema, para que, siendo hechas todas las cosas en santidad, fueran aceptables conforme a su voluntad. Por tanto, los que presentan sus ofrendas en los tiempos señalados son aceptables y bienaventurados; porque, al seguir las ordenanzas legítimas del Maestro, no se extravían. Pues al sumo sacerdote se le han dado sus propios ministerios, y a los sacerdotes se les ha asignado su propio lugar, y sobre los levitas recaen servicios propios; el laico está atado a las ordenanzas laicas.
  to: Por tanto, puesto que estas cosas nos son claras, y puesto que hemos penetrado en las profundidades del conocimiento divino, debemos hacer todo en orden, todo lo que el Soberano mandó que se hiciera en los tiempos señalados. Él mandó que tanto las ofrendas como los ministerios se realizaran, y no de manera casual ni desordenada, sino en tiempos y horas fijados. Y dónde y por medio de quiénes quiere que se realicen, él mismo lo determinó por su voluntad suprema, para que, haciéndose todas las cosas en santidad, sean aceptables conforme a su voluntad. Por tanto, los que presentan sus ofrendas en los tiempos señalados son aceptables y bienaventurados; porque, al seguir las ordenanzas legítimas del Soberano, no se extravían. Pues al sumo sacerdote le han sido dados sus propios ministerios, y a los sacerdotes se les ha asignado su propio lugar, y sobre los levitas recaen sus propios servicios; el laico está sujeto a las ordenanzas laicas.
  rationale: Se corrige un error tipográfico grave; se mejora la fidelidad y naturalidad de ἐγκεχυφότες con 'hemos penetrado en'; se reestructura la primera oración para que 'todo lo que...' dependa claramente del mandato; se cambia δεσπότης de 'Maestro' a 'Soberano' porque en español comunica mejor autoridad de mando sin confundirse con un docente; y se pulen algunas construcciones para un español más natural y eclesialmente legible, manteniendo la terminología cultual del original.
