translation:
  language: es
  text: Por tanto, puesto que estas cosas nos son claras, y puesto que hemos penetrado en las profundidades del conocimiento divino, debemos hacer todo en orden, todo lo que el Soberano mandó que se hiciera en los tiempos señalados. Él mandó que tanto las ofrendas como los ministerios se realizaran, y no de manera casual ni desordenada, sino en tiempos y horas fijados. Y dónde y por medio de quiénes quiere que se realicen, él mismo lo determinó por su voluntad suprema, para que, haciéndose todas las cosas en santidad, sean aceptables conforme a su voluntad. Por tanto, los que presentan sus ofrendas en los tiempos señalados son aceptables y bienaventurados; porque, al seguir las ordenanzas legítimas del Soberano, no se extravían. Pues al sumo sacerdote le han sido dados sus propios ministerios, y a los sacerdotes se les ha asignado su propio lugar, y sobre los levitas recaen sus propios servicios; el laico está sujeto a las ordenanzas laicas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Προδήλων
  english_pob_choice: clear
  chosen_spanish: claras
  alternatives_spanish:
  - manifiestas
  - evidentes
  - claras
  lexicon: LSJ
  rationale: En español, ‘claras’ comunica de forma natural la idea de que los hechos son patentes, sin inflar el matiz.
- source_word: ἐγκεχυφότες
  english_pob_choice: have looked into
  chosen_spanish: hemos mirado en
  alternatives_spanish:
  - hemos escrutado
  - nos hemos inclinado sobre
  - hemos contemplado de cerca
  lexicon: LSJ
  rationale: Conserva la imagen de inclinación/inspección intensa sin volver la frase extraña en español.
- source_word: τὰ βάθη τῆς θείας γνώσεως
  english_pob_choice: the depths of the divine knowledge
  chosen_spanish: las profundidades del conocimiento divino
  alternatives_spanish:
  - las profundidades del saber divino
  - las honduras del conocimiento divino
  lexicon: LSJ
  rationale: Mantiene la estructura genitiva y el tono elevado del original.
- source_word: πάντα τάξει ποιεῖν
  english_pob_choice: do everything in order
  chosen_spanish: hacer todo en orden
  alternatives_spanish:
  - hacer todas las cosas en orden
  - realizar todo ordenadamente
  lexicon: LSJ
  rationale: Refleja la obligación de orden sin forzar una construcción calcada.
- source_word: ὁ δεσπότης
  english_pob_choice: the Master
  chosen_spanish: el Maestro
  alternatives_spanish:
  - el Dueño
  - el Soberano
  lexicon: LSJ
  rationale: ‘Maestro’ conserva la relación de autoridad y mandato que el audit trail distingue de κύριος, y es publicable en español sin perder fuerza.
- source_word: κατὰ καιροὺς τεταγμένους
  english_pob_choice: at the appointed times
  chosen_spanish: en los tiempos señalados
  alternatives_spanish:
  - en los tiempos appointed
  - en los tiempos designados
  lexicon: LSJ
  rationale: ‘Tiempos señalados’ expresa tiempos fijados o determinados con fluidez natural; evita una frase demasiado técnica.
- source_word: προσφορὰς
  english_pob_choice: offerings
  chosen_spanish: ofrendas
  alternatives_spanish:
  - ofrendas sacrificiales
  - oblaciones
  lexicon: LSJ
  rationale: ‘Ofrendas’ es el equivalente culto y claro más directo en español.
- source_word: λειτουργίας
  english_pob_choice: ministries
  chosen_spanish: ministerios
  alternatives_spanish:
  - servicios
  - funciones litúrgicas
  lexicon: LSJ
  rationale: ‘Ministerios’ preserva el campo semántico de servicio sagrado/función pública que el griego puede abarcar.
- source_word: οὐκ εἰκῇ ἢ ἀτάκτως
  english_pob_choice: not happen casually or disorderly
  chosen_spanish: no que sucedieran de manera casual o desordenada
  alternatives_spanish:
  - no que ocurriesen al azar o desordenadamente
  - no que sucedieran sin orden ni concierto
  lexicon: LSJ
  rationale: ‘Casual o desordenada’ reproduce la oposición entre azar/falta de propósito y desorden.
- source_word: ὡρισμένοις καιροῖς καὶ ὥραις
  english_pob_choice: at fixed times and hours
  chosen_spanish: en tiempos y horas fijados
  alternatives_spanish:
  - en tiempos y horas determinadas
  - en tiempos y horas establecidas
  lexicon: LSJ
  rationale: Conserva la duplicación temporal y su carácter preciso.
- source_word: διὰ τίνων
  english_pob_choice: through whom
  chosen_spanish: por medio de quiénes
  alternatives_spanish:
  - por quiénes
  - a través de quiénes
  lexicon: LSJ
  rationale: La preposición compuesta ‘por medio de’ expresa bien la mediación personal del rito.
- source_word: τῇ ὑπερτάτῃ αὐτοῦ βουλήσει
  english_pob_choice: by his supreme will
  chosen_spanish: por su voluntad suprema
  alternatives_spanish:
  - por su suprema voluntad
  - por su voluntad soberana
  lexicon: LSJ
  rationale: ‘Voluntad suprema’ conserva el superlativo y la idea deliberativa del término griego.
- source_word: ὁσίως
  english_pob_choice: in holiness
  chosen_spanish: en santidad
  alternatives_spanish:
  - santamente
  - de manera santa
  lexicon: LSJ
  rationale: ‘En santidad’ es natural en registro bíblico y mantiene el sustantivo de cualidad moral/ritual.
- source_word: εὐπρόσδεκτα
  english_pob_choice: acceptable
  chosen_spanish: aceptables
  alternatives_spanish:
  - bien recibidas
  - gratas
  lexicon: LSJ
  rationale: ‘Aceptables’ reproduce el valor de ser recibidas favorablemente sin añadir matiz extraño.
- source_word: τοῖς προστεταγμένοις καιροῖς
  english_pob_choice: at the appointed times
  chosen_spanish: en los tiempos señalados
  alternatives_spanish:
  - en los tiempos prescritos
  - en los tiempos establecidos
  lexicon: LSJ
  rationale: Mantiene la misma idea de tiempos ya determinados por autoridad.
- source_word: νομίμοις
  english_pob_choice: lawful ordinances
  chosen_spanish: ordenanzas legítimas
  alternatives_spanish:
  - ordenanzas legales
  - estatutos legítimos
  lexicon: LSJ
  rationale: ‘Legítimas’ conserva la fuerza normativa sin sonar jurídicamente excesivo en español moderno.
- source_word: οὐ διαμαρτάνουσιν
  english_pob_choice: they do not go astray
  chosen_spanish: no se extravían
  alternatives_spanish:
  - no yerran
  - no faltan al orden
  - no pecan
  lexicon: LSJ
  rationale: ‘No se extravían’ preserva la idea de desviarse o errar sin imponer de entrada un sentido moral más fuerte.
- source_word: ἀρχιερεῖ
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - pontífice
  - sumo pontífice
  lexicon: LSJ
  rationale: Es el equivalente más claro y estándar para el cargo cultual.
- source_word: ἴδιαι λειτουργίαι
  english_pob_choice: his own ministries
  chosen_spanish: sus propios ministerios
  alternatives_spanish:
  - sus propios servicios
  - sus funciones propias
  lexicon: LSJ
  rationale: Mantiene la asignación diferenciada de funciones sagradas.
- source_word: ἴδιος ὁ τόπος προστέτακται
  english_pob_choice: their own place has been assigned
  chosen_spanish: se les ha asignado su propio lugar
  alternatives_spanish:
  - se les ha señalado su propio lugar
  - se les ha ordenado su propio lugar
  lexicon: LSJ
  rationale: ‘Se les ha asignado’ comunica claramente la disposición establecida para los sacerdotes.
- source_word: λευΐταις ἴδιαι διακονίαι ἐπίκεινται
  english_pob_choice: upon the Levites their own services are laid
  chosen_spanish: sobre los levitas recaen servicios propios
  alternatives_spanish:
  - sobre los levitas pesan servicios propios
  - a los levitas se les imponen servicios propios
  lexicon: LSJ
  rationale: ‘Recaen’ traduce bien la idea de carga/obligación impuesta sobre ellos.
- source_word: ὁ λαϊκὸς ἄνθρωπος
  english_pob_choice: the layman
  chosen_spanish: el laico
  alternatives_spanish:
  - el hombre laico
  - el miembro del pueblo
  lexicon: LSJ
  rationale: ‘Laico’ es preciso, comprensible y conserva el contraste con las funciones cultuales.
- source_word: τοῖς λαϊκοῖς προστάγμασιν δέδεται
  english_pob_choice: is bound by the lay ordinances
  chosen_spanish: está atado a las ordenanzas laicas
  alternatives_spanish:
  - está ligado a las ordenanzas laicas
  - está sujeto a las ordenanzas laicas
  lexicon: LSJ
  rationale: ‘Atado’ preserva la fuerza de δέδεται; ‘laicas’ mantiene el contraste con lo sacerdotal.
theological_decisions:
- issue: Distinción entre δεσπότης y κύριος
  english_pob_reading: the Master
  chosen_spanish_reading: el Maestro
  alternative_spanish_readings:
  - el Señor
  - el Soberano
  rationale: Se conserva la distinción lexical del griego, evitando confundir δεσπότης con el uso más convencional de ‘Señor’.
  doctrine_reference: 'DOCTRINE.md: original-language primacy and documented lexical distinction.'
- issue: Lenguaje cultual y jerárquico del pasaje
  english_pob_reading: Retain explicit sacrificial and priestly terminology
  chosen_spanish_reading: Conservar ofrendas, sumo sacerdote, sacerdotes, levitas y laico
  alternative_spanish_readings:
  - generalizar a prácticas de culto y líderes
  - reformular en términos eclesiales posteriores
  rationale: La argumentación de Clemente depende de la analogía cultual; suavizarla borraría el orden teológico del pasaje.
  doctrine_reference: 'PHILOSOPHY.md: preserve auditable reasoning and avoid paraphrase beyond the source.'
- issue: “οὐ διαμαρτάνουσιν” en contexto de obediencia al orden divino
  english_pob_reading: they do not go astray
  chosen_spanish_reading: no se extravían
  alternative_spanish_readings:
  - no yerran
  - no pecan
  rationale: ‘No se extravían’ conserva el matiz de desviación/errancia y no adelanta un juicio moral más fuerte de lo que el texto exige.
  doctrine_reference: LSJ semantic range for διαμαρτάνω in ordered-obedience contexts.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés, especialmente la preferencia por ‘appointed’ para los tiempos fijados, la forma natural ‘acceptable according to his will’, y la clausula final ‘the lay ordinances’. La versión española sigue esas decisiones semánticas, pero las reexpresa con sintaxis natural en español.
  spanish_consistency_notes:
  - Se mantuvo ‘el Maestro’ para δεσπότης, en continuidad con el audit trail inglés y la distinción frente a κύριος.
  - Se preservó el vocabulario cultual explícito sin cristianizarlo ni generalizarlo.
  - Se optó por ‘laico’ / ‘ordenanzas laicas’ para reflejar el contraste final con el ministerio sacerdotal.
  - No se añadieron notas al pie porque el texto español no requiere una variante textual o ambigüedad adicional anclada en el versículo.
