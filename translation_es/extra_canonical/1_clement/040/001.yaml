base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/040/001.yaml
  text: Therefore, since these things are clear to us, and since we have looked into the depths of divine knowledge, we ought to do everything in order that the Master commanded to be done at the appointed times. He commanded that both the offerings and the ministries be performed, and not take place casually or disorderly, but at fixed times and hours. And where and through whom he wants them to be performed, he himself determined by his supreme will, so that, with all things being done in holiness, they might be acceptable according to his will. Therefore those who make their offerings at the appointed times are both acceptable and blessed; for by following the lawful ordinances of the Master they do not go astray. For to the high priest his own ministries have been given, and to the priests their own place has been assigned, and upon the Levites their own services are laid; the layman is bound by the lay ordinances.
