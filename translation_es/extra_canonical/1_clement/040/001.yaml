  text: Προδήλων οὖν ἡμῖν ὄντων τούτων, καὶ ἐγκεχυφότες εἰς τὰ βάθη τῆς θείας γνώσεως, πάντα τάξει ποιεῖν ὀφείλομεν, ὅσα ὁ δεσπότης ἐπιτελεῖν ἐκέλευσεν κατὰ καιροὺς τεταγμένους. 2. τὰς τε προσφορὰς καὶ λειτουργίας ἐπιτελεῖσθαι, καὶ οὐκ εἰκῇ ἢ ἀτάκτως ἐκέλευσεν γίνεσθαι, ἀλλʼ ὡρισμένοις καιροῖς καὶ ὥραις. 3. ποῦ τε καὶ διὰ τίνων ἐπιτελεῖσθαι θέλει, αὐτὸς ὥρισεν τῇ ὑπερτάτῃ αὐτοῦ βουλήσει, ἵνʼ ὁσίως πάντα γινόμενα ἐν εὐδοκήσει εὐπρόσδεκτα εἴη τῷ θελήματι αὐτοῦ. 4. οἱ οὖν τοῖς προστεταγμένοις καιροῖς ποιοῦντες τὰς προσφορὰς αὐτῶν εὐπρόσδεκτοί τε καὶ μακάριοί· τοῖς γὰρ νομίμοις τοῦ δεσπότου ἀκολουθοῦντες οὐ διαμαρτάνουσιν. 5. τῷ γὰρ ἀρχιερεῖ ἴδιαι λειτουργίαι δεδομέναι εἰσίν, καὶ τοῖς ἱερεῦσιν ἴδιος ὁ τόπος προστέτακται, καὶ λευΐταις ἴδιαι διακονίαι ἐπίκεινται· ὁ λαϊκὸς ἄνθρωπος τοῖς λαϊκοῖς προστάγμασιν δέδεται.
