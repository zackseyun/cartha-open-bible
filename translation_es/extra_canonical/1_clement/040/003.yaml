    text: 'O: «para que todo, al hacerse en santidad, sea aceptable para su voluntad según su beneplácito».'
    reason: Alternativa de estructura para reflejar la otra posibilidad sintáctica conservada en la auditoría inglesa, en español natural.
  revision_rationale: 'La revisión corrige el principal problema exegético-sintáctico del borrador: reubica «según su buen agrado» para que modifique la aceptabilidad, en línea con la revisión inglesa final y con una lectura plausible de ἐν εὐδοκήσει. También mejora la naturalidad del español con «se lleven a cabo» para ἐπιτελεῖσθαι y «para su voluntad» en vez de «a su voluntad». No se requiere adjudicación adicional porque el ajuste es claro, menor y bien sustentado por el expediente auditado.'
