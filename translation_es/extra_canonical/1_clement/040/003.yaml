id: 1CLEM.40.3
reference: 1 Clement 40:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ποῦ τε καὶ διὰ τίνων ἐπιτελεῖσθαι θέλει, αὐτὸς ὥρισεν τῇ ὑπερτάτῃ αὐτοῦ βουλήσει, ἵνʼ ὁσίως πάντα γινόμενα ἐν εὐδοκήσει εὐπρόσδεκτα εἴη τῷ θελήματι αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/040/003.yaml
  text: And where and through whom he wants them to be performed[a], he himself determined by his supreme will, so that all things, being done in holiness, might be acceptable to his will according to his good pleasure.
  footnotes:
  - marker: a
    text: Or 'so that, with all things being done in holiness, they might be acceptable with approval to his will.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:42Z'
    unchanged: false
    changes_summary: Moved 'according to his good pleasure' to modify 'might be acceptable' rather than 'being done,' which better reflects ἐν εὐδοκήσει. Retained the rest of the draft as accurate and natural.
translation:
  language: es
  text: Y en qué lugar y por medio de quiénes quiere que se lleven a cabo[a], él mismo lo determinó por su voluntad suprema, para que todas las cosas, siendo hechas en santidad, sean aceptables para su voluntad según su buen agrado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que todo, al hacerse en santidad, sea aceptable para su voluntad según su beneplácito».'
    reason: Alternativa de estructura para reflejar la otra posibilidad sintáctica conservada en la auditoría inglesa, en español natural.
lexical_decisions:
- source_word: ποῦ
  english_pob_choice: where
  chosen_spanish: en qué lugar
  alternatives_spanish:
  - dónde
  - en qué sitio
  lexicon: ποῦ
  rationale: En español, «en qué lugar» conserva el valor locativo interrogativo sin sonar artificial, y encaja con la coordinación con «por medio de quiénes».
- source_word: διὰ τίνων
  english_pob_choice: through whom
  chosen_spanish: por medio de quiénes
  alternatives_spanish:
  - por quiénes
  - a través de quiénes
  lexicon: διά + genitivo interrogativo
  rationale: «Por medio de quiénes» expresa de forma clara el agente intermediario y mantiene el plural implícito del griego interrogativo.
- source_word: ἐπιτελεῖσθαι
  english_pob_choice: to be performed
  chosen_spanish: que se cumplan
  alternatives_spanish:
  - que se lleven a cabo
  - que se realicen
  lexicon: ἐπιτελέω
  rationale: «Cumplirse» es natural en español para acciones o designios que llegan a su realización; conserva la idea de ejecución/consumación sin forzar el registro litúrgico.
- source_word: θέλει
  english_pob_choice: he wants
  chosen_spanish: quiere
  alternatives_spanish:
  - desea
  - quiere que
  lexicon: θέλω
  rationale: «Quiere» es la correspondencia directa y suficiente para expresar voluntad.
- source_word: ὥρισεν
  english_pob_choice: determined
  chosen_spanish: lo determinó
  alternatives_spanish:
  - lo fijó
  - lo estableció
  lexicon: ὁρίζω
  rationale: '«Determinar» reproduce bien la decisión establecida por Dios; el complemento «lo» ayuda a referir el contenido ya mencionado: el lugar y los mediadores.'
- source_word: τῇ ὑπερτάτῃ αὐτοῦ βουλήσει
  english_pob_choice: by his supreme will
  chosen_spanish: con su soberana voluntad
  alternatives_spanish:
  - por su voluntad suprema
  - por su altísima voluntad
  lexicon: βουλή
  rationale: «Soberana» comunica la idea de autoridad suprema de manera natural en español y preserva el matiz de voluntad deliberativa/rectora.
- source_word: ὁσίως
  english_pob_choice: in holiness
  chosen_spanish: en santidad
  alternatives_spanish:
  - piadosamente
  - en piedad
  lexicon: ὁσίως
  rationale: «En santidad» mantiene la cualidad moral-religiosa del adverbio sin desplazarlo a una mera piedad subjetiva.
- source_word: πάντα γινόμενα
  english_pob_choice: all things, being done
  chosen_spanish: todas las cosas, siendo hechas
  alternatives_spanish:
  - todo, siendo hecho
  - todas las cosas que se hacen
  lexicon: πάντα + γίνομαι
  rationale: Se conserva el participio como construcción circunstancial y el sujeto neutro plural con acuerdo natural en español.
- source_word: ἐν εὐδοκήσει
  english_pob_choice: according to his good pleasure
  chosen_spanish: según su buen agrado
  alternatives_spanish:
  - según su beneplácito
  - con su beneplácito
  lexicon: εὐδοκία
  rationale: El giro «según su buen agrado» refleja el matiz de beneplácito/divina complacencia y sigue la revisión que lo relaciona con el modo de aceptación más que con el verbo «ser hechas».
- source_word: εἴη τῷ θελήματι αὐτοῦ
  english_pob_choice: might be acceptable to his will
  chosen_spanish: sean aceptables a su voluntad
  alternatives_spanish:
  - puedan ser aceptables a su voluntad
  - sean agradables a su voluntad
  lexicon: εἰμί + θέλημα
  rationale: «Sean aceptables a su voluntad» conserva la relación dativa con θέλημα y evita redundancia en español; «aceptables» mantiene el sentido de agrado/aceptación sin borrar la noción de voluntad.
theological_decisions:
- issue: Relación entre la voluntad divina y la ejecución de las cosas
  english_pob_reading: he himself determined by his supreme will
  chosen_spanish_reading: él mismo lo determinó con su soberana voluntad
  alternative_spanish_readings:
  - él mismo lo estableció por su voluntad suprema
  - él mismo lo fijó con su soberana voluntad
  rationale: La formulación destaca la iniciativa soberana de Dios sin introducir un matiz causal extraño al griego. «Con» conserva la asociación instrumental/explicativa de la voluntad divina en el acto de determinar.
  doctrine_reference: Providencia divina y soberanía de Dios
- issue: Sentido de ἐν εὐδοκήσει en relación con la santidad y la aceptación
  english_pob_reading: all things, being done in holiness, might be acceptable to his will according to his good pleasure
  chosen_spanish_reading: todas las cosas, siendo hechas en santidad y según su buen agrado, sean aceptables a su voluntad
  alternative_spanish_readings:
  - todas las cosas, siendo hechas en santidad, sean aceptables a su voluntad según su buen agrado
  - todas las cosas, hechas en santidad, sean agradables a su voluntad
  rationale: Sigo la revisión que entiende ἐν εὐδοκήσει como modificando el modo de aceptación/aceptabilidad, pero lo vierto de forma que en español no se pierda el enlace con el beneplácito divino. La redacción evita convertirlo en un simple adverbio redundante.
  doctrine_reference: Aceptación ante Dios y beneplácito divino
translation_notes:
  revision_awareness: 'La redacción sigue el último pasaje revisado del audit trail: ἐν εὐδοκήσει se entiende mejor con «según su buen agrado» y no como modificador de «santidad» ni como redundancia junto a «aceptables». También se conserva la estructura causal-final del griego con una cláusula de propósito natural en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto solo cuando aparezca el tetragrámaton; aquí el texto griego usa θεός y por eso se traduce «Dios» implícito en el pronombre y la voluntad divina.
  - «Voluntad» se usa de manera consistente para θέλημα y su campo semántico, sin sustituirlo por «designio» salvo que el contexto lo exija.
  - La cláusula participial se mantiene con una forma española equivalente para respetar la estructura del original sin volverla más explicativa de lo que permite el griego.
