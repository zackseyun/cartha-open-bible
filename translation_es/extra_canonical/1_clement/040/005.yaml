revisions:
- from: Porque al sumo sacerdote le han sido dadas sus propias funciones; a los sacerdotes les ha sido asignado su propio lugar; a los levitas les incumben sus propios servicios; y el hombre laico está sujeto a las ordenanzas laicas.
  to: Porque al sumo sacerdote le han sido dadas sus propias funciones; a los sacerdotes les ha sido asignado su propio lugar; a los levitas les incumben sus propios servicios; y el laico está sujeto a las ordenanzas laicas[a].
  rationale: Se reemplaza «el hombre laico» por «el laico» para lograr un español natural y fiel al contraste técnico del original. Se mantiene «ordenanzas laicas» por su cercanía formal al griego y al inglés auditado, pero se añade una nota indispensable para deshacer una posible lectura moderna equivocada de «laicas» como ‘seculares’.
