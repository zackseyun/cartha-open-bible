id: 1CLEM.40.5
reference: 1 Clement 40:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: τῷ γὰρ ἀρχιερεῖ ἴδιαι λειτουργίαι δεδομέναι εἰσίν, καὶ τοῖς ἱερεῦσιν ἴδιος ὁ τόπος προστέτακται, καὶ λευΐταις ἴδιαι διακονίαι ἐπίκεινται· ὁ λαϊκὸς ἄνθρωπος τοῖς λαϊκοῖς προστάγμασιν δέδεται.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/040/005.yaml
  text: For to the high priest his own ministries have been given[a], and to the priests their own place has been assigned, and upon the Levites their own services are laid; the layman is bound by the lay ordinances.
  footnotes:
  - marker: a
    text: Or 'upon Levites'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:44Z'
    unchanged: false
    changes_summary: Revised the final clause from 'the layman's ordinances' to 'the lay ordinances' to reflect the adjectival force of λαϊκοῖς more accurately and avoid an awkward possessive not present in the Greek. Retained the rest as accurate and suitably formal.
translation:
  language: es
  text: Porque al sumo sacerdote le han sido dadas sus propias funciones; a los sacerdotes les ha sido asignado su propio lugar; a los levitas les incumben sus propios servicios; y el laico está sujeto a las ordenanzas laicas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las ordenanzas del laico», es decir, prescripciones propias de quien no pertenece al orden sacerdotal; aquí «laicas» no significa «seculares».
    reason: Evitar en español moderno la ambigüedad de «laico/laicas» como ‘secular’, preservando el sentido técnico de λαϊκός en contraste con los oficios sacerdotales.
lexical_decisions:
- source_word: ἀρχιερεῖ
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  - el pontífice
  lexicon: ἀρχιερεύς
  rationale: «Sumo sacerdote» es la designación española más clara y fiel para el cargo supremo del culto; conserva el paralelismo jerárquico sin introducir un matiz excesivamente romano como «pontífice».
- source_word: λειτουργίαι
  english_pob_choice: ministries
  chosen_spanish: funciones
  alternatives_spanish:
  - ministerios
  - servicios litúrgicos
  lexicon: λειτουργία
  rationale: En este contexto de distribución de cargos y tareas sacerdotales, «funciones» comunica con naturalidad la idea de encargos/atribuciones oficiales sin reducirlo solo a liturgia ni forzar un término eclesiástico moderno.
- source_word: ἴδιαι
  english_pob_choice: his own / their own
  chosen_spanish: sus propias
  alternatives_spanish:
  - propias
  - sus particulares
  lexicon: ἴδιος
  rationale: «Sus propias» conserva la repetición enfática del griego y mantiene la distribución diferenciada entre grupos.
- source_word: ἱερεῦσιν
  english_pob_choice: the priests
  chosen_spanish: a los sacerdotes
  alternatives_spanish:
  - a los presbíteros
  lexicon: ἱερεύς
  rationale: «Sacerdotes» es la correspondencia directa y adecuada en este marco levítico; «presbíteros» introduciría una asociación distinta en español.
- source_word: τόπος
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - puesto
  lexicon: τόπος
  rationale: «Lugar» conserva el sentido de asignación de ámbito o posición correspondiente, con un español más natural que «sitio» y menos administrativo que «puesto».
- source_word: προστέτακται
  english_pob_choice: has been assigned
  chosen_spanish: ha sido asignado
  alternatives_spanish:
  - ha sido ordenado
  - se ha determinado
  lexicon: προστάσσω
  rationale: La pasiva expresa una asignación establecida por autoridad. «Ha sido asignado» reproduce bien el valor de reparto institucional sin añadir intensidad normativa extra.
- source_word: λευΐταις
  english_pob_choice: the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - sobre los levitas
  - para los levitas
  lexicon: Λευΐτης
  rationale: El dativo puede entenderse como destinatario/ámbito de incumbencia; en español, «a los levitas» funciona con naturalidad en paralelo con las otras cláusulas.
- source_word: διακονίαι
  english_pob_choice: services
  chosen_spanish: servicios
  alternatives_spanish:
  - ministerios
  - labores
  lexicon: διακονία
  rationale: «Servicios» preserva la idea de tareas asignadas y mantiene la correspondencia con la cláusula anterior sin introducir tecnicismos eclesiales ajenos.
- source_word: ἐπίκεινται
  english_pob_choice: are laid
  chosen_spanish: les incumben
  alternatives_spanish:
  - están puestos sobre ellos
  - les han sido impuestas
  lexicon: ἐπίκειμαι
  rationale: En español, «les incumben» expresa que esas tareas recaen sobre ellos como obligación asignada, evitando una pasiva pesada y manteniendo el sentido de incumbencia.
- source_word: ὁ λαϊκὸς ἄνθρωπος
  english_pob_choice: the layman
  chosen_spanish: el hombre laico
  alternatives_spanish:
  - el laico
  - el hombre del pueblo
  lexicon: λαϊκός
  rationale: «El hombre laico» conserva el contraste técnico entre clero y laicado sin masculinizar de forma innecesaria el concepto más allá del griego, que aquí usa ἄνθρωπος de manera genérica.
- source_word: λαϊκοῖς προστάγμασιν
  english_pob_choice: the lay ordinances
  chosen_spanish: las ordenanzas laicas
  alternatives_spanish:
  - los mandatos laicos
  - las prescripciones del laicado
  lexicon: λαϊκός / προστάγμα
  rationale: «Ordenanzas» refleja el valor de prescripción/mandato de προστάγματα; «laicas» conserva el adjetivo del griego y evita el posesivo ajeno al texto que la revisión inglesa descartó.
theological_decisions:
- issue: Distribución jerárquica de funciones cultuales
  english_pob_reading: Each order in Israel has distinct, divinely ordered responsibilities.
  chosen_spanish_reading: Cada orden tiene funciones, lugar y servicios propios, y el laico queda sujeto a ordenanzas laicas.
  alternative_spanish_readings:
  - Cada grupo tiene ministerios propios...
  - Cada orden tiene cargos distintos...
  rationale: El pasaje no desarrolla una eclesiología posterior, sino un orden de responsabilidades cultuales. La traducción debe conservar esa estructura diferenciada sin ampliarla artificialmente.
  doctrine_reference: Orden ministerial / estructura cultual en la comunidad de Israel
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió la frase final de una forma posesiva a una forma adjetival ('lay ordinances'), por lo que la traducción española evita igualmente cualquier posesivo añadido y mantiene «ordenanzas laicas». No se requiere nota textual adicional, y no se introduce la antigua nota [a] porque la ambigüedad inglesa no se replica en español de manera útil aquí.
  spanish_consistency_notes:
  - 'Se mantiene la terminología de cargos y funciones en todo el verso: sumo sacerdote, sacerdotes, levitas, hombre laico.'
  - Se evita 'Cristo', 'Señor' o vocabulario eclesial no sustentado por el griego.
  - La sintaxis busca ser formal y legible, con paralelismo entre miembros de la serie.
  - '''Laicas'' se usa en sentido social/ritual contrastivo, no como ''secular'' moderno.'
