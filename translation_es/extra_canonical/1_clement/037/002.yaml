base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/037/002.yaml
  text: 'Let us consider those who serve as soldiers under our commanders: how orderly[a], how obedient, how submissively they carry out what is commanded.'
  footnotes:
  - marker: a
    text: Or 'how orderly, how readily, how submissively'.
    reason: previous_rendering
  revision_pass:
