    changes_summary: Replaced 'disciplined' with 'orderly' for closer lexical alignment with εὐτάκτως, and changed 'submissive' to 'submissively' to match the adverbial series in the Greek and improve English grammar.
translation:
  language: es
  text: 'Consideremos a los que sirven como soldados bajo nuestros jefes: cuán ordenadamente[a], cuán obedientemente, cuán sumisamente cumplen lo que se les manda.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuán ordenadamente, cuán obedientemente, cuán sumisamente».
    reason: alternative_reading
lexical_decisions:
- source_word: κατανοήσωμεν
  english_pob_choice: Let us consider
  chosen_spanish: Consideremos
  alternatives_spanish:
  - Miremos
  - Pensemos en
  - Consideremos atentamente
  lexicon: κατανοέω
  rationale: El verbo exhortativo pide una invitación a reflexionar; «Consideremos» reproduce bien el valor inclusivo y deliberativo sin añadir intensidad no sustentada.
- source_word: τοὺς στρατευομένους
  english_pob_choice: those who serve as soldiers
  chosen_spanish: a los que sirven como soldados
  alternatives_spanish:
  - a los que están en campaña
  - a los que militan
  - a los que combaten como soldados
  lexicon: στρατεύομαι
  rationale: La idea es la de personas que están en servicio militar; «sirven como soldados» conserva la imagen y evita un calco demasiado rígido.
- source_word: τοῖς ἡγουμένοις ἡμῶν
  english_pob_choice: under our commanders
  chosen_spanish: bajo nuestros jefes
  alternatives_spanish:
  - bajo nuestros comandantes
  - bajo nuestros gobernantes
  - sujetos a nuestros jefes
  lexicon: ἡγέομαι / ἡγούμενοι
  rationale: El contexto militar favorece «jefes» como equivalente amplio y natural; «comandantes» también sería posible, pero «jefes» mantiene la referencia a autoridad sin estrecharla innecesariamente.
- source_word: εὐτάκτως
  english_pob_choice: how orderly
  chosen_spanish: cuán ordenadamente
  alternatives_spanish:
  - cuán disciplinadamente
  - cuán con orden
  - cuán bien ordenados
  lexicon: εὐτάκτως
  rationale: El adverbio griego apunta al orden y la buena disposición; el adverbio español conserva el valor adverbial de la serie y sigue de cerca la decisión inglesa revisada.
- source_word: εἰκτικῶς
  english_pob_choice: how obedient
  chosen_spanish: cuán obedientemente
  alternatives_spanish:
  - cuán dócilmente
  - cuán sumisamente
  - cuán de buena gana
  lexicon: εἰκτικῶς
  rationale: La pauta semántica es de ceder/obedecer; «obedientemente» es el equivalente más claro y no diluye el matiz de conformidad al mando.
- source_word: ὑποτεταγμένως
  english_pob_choice: how submissively
  chosen_spanish: cuán sumisamente
  alternatives_spanish:
  - cuán subordinadamente
  - cuán sometidamente
  - cuán humildemente
  lexicon: ὑποτεταγμένως
  rationale: El término expresa estar sujeto/puesta bajo autoridad; «sumisamente» conserva la fuerza de subordinación en una forma adverbial natural en español.
- source_word: ἐπιτελοῦσιν τὰ διατασσόμενα
  english_pob_choice: they carry out what is commanded
  chosen_spanish: cumplen lo que se les manda
  alternatives_spanish:
  - llevan a cabo lo que se les ordena
  - ejecutan lo que se les manda
  - realizan lo que se les ordena
  lexicon: ἐπιτελέω / διατάσσω
  rationale: «Cumplen» es idiomático y fiel al sentido de ejecutar órdenes; «se les manda» refleja la pasiva de contenido ordenativo sin introducir un agente explícito.
translation_notes:
  revision_awareness: La auditoría inglesa muestra una revisión reciente que ajustó la serie adverbial para respetar mejor la sintaxis y el valor de los tres adverbios griegos (εὐτάκτως, εἰκτικῶς, ὑποτεταγμένως). La versión española conserva esa estructura tripartita, evita convertirla en frases preposicionales y mantiene el paralelismo adverbial.
  spanish_consistency_notes:
  - Conservo la imagen militar de «soldados» y «jefes» para mantener la metáfora del texto fuente.
  - La nota a pie de página recoge una alternativa natural en español para el primer adverbio, siguiendo la práctica de la POB inglesa de preservar una opción alternativa.
  - No se usa terminología eclesiástica como «pastores» o «autoridades» porque el pasaje habla de una obediencia militar concreta.
