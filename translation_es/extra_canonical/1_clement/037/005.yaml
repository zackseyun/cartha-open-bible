id: 1CLEM.37.5
reference: 1 Clement 37:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: λάβωμεν τὸ σῶμα ἡμῶν· ἡ κεφαλὴ δίχα τῶν ποδῶν οὐδέν ἐστιν, οὕτως οὐδὲ οἱ πόδες δίχα τῆς κεφαλῆς· τὰ δὲ ἐλάχιστα μέλη τοῦ σώματος ἡμῶν ἀναγκαῖα καὶ εὔχρηστά εἰσιν ὅλῳ τῷ σώματι· ἀλλὰ πάντα συνεπνεῖ καὶ ὑποταγῇ μιᾷ χρῆται εἰς τὸ σώζεσϑαι ὅλον τὸ σῶμα.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/037/005.yaml
  text: 'Let us take our body as an example: the head is nothing without the feet; likewise the feet are nothing without the head. Even the smallest members of our body are necessary and useful to the whole body. But all breathe together and make use of one submission[a], so that the whole body may be preserved.'
  footnotes:
  - marker: a
    text: Or 'make use of one submission'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:36Z'
    unchanged: false
    changes_summary: 'Revised the final sentence for closer lexical accuracy: changed ''work together in harmony'' to ''breathe together'' for συνεπνεῖ, and ''practice a single submission'' to ''make use of one submission'' for ὑποταγῇ μιᾷ χρῆται. The rest was retained as accurate and natural.'
translation:
  language: es
  text: 'Tomemos nuestro cuerpo como ejemplo: la cabeza no es nada sin los pies; de igual modo, los pies no son nada sin la cabeza. Aun los miembros más pequeños de nuestro cuerpo son necesarios y útiles para todo el cuerpo. Pero todos respiran juntos y practican una sola sumisión[a], para que todo el cuerpo sea preservado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se valen de una sola sumisión'.
    reason: alternative_literal_rendering
lexical_decisions:
- source_word: λάβωμεν τὸ σῶμα ἡμῶν
  english_pob_choice: Let us take our body as an example
  chosen_spanish: Tomemos nuestro cuerpo como ejemplo
  alternatives_spanish:
  - Tomemos nuestro cuerpo como ilustración
  - Tomemos nuestro cuerpo como caso
  lexicon: λαμβάνω; σῶμα
  rationale: El griego exhorta a tomar el cuerpo como ejemplo o modelo. 'Como ejemplo' conserva la función ilustrativa sin volverlo más interpretativo de lo necesario.
- source_word: οὐδέν ἐστιν
  english_pob_choice: is nothing
  chosen_spanish: no es nada
  alternatives_spanish:
  - no vale nada
  - no tiene importancia
  lexicon: εἰμί; οὐδείς
  rationale: '''No es nada'' refleja con claridad la negación absoluta del valor funcional en esta comparación, sin introducir matices ajenos.'
- source_word: τὰ δὲ ἐλάχιστα μέλη
  english_pob_choice: Even the smallest members
  chosen_spanish: Aun los miembros más pequeños
  alternatives_spanish:
  - Aun las partes más pequeñas
  - Incluso los miembros más pequeños
  lexicon: ἐλάχιστος; μέλος
  rationale: '''Miembros'' mantiene la imagen corporal del original y del inglés POB; ''más pequeños'' expresa el superlativo de ἐλάχιστα de manera natural.'
- source_word: ἀναγκαῖα καὶ εὔχρηστά εἰσιν
  english_pob_choice: are necessary and useful
  chosen_spanish: son necesarios y útiles
  alternatives_spanish:
  - son necesarios y de provecho
  - son indispensables y útiles
  lexicon: ἀναγκαῖος; εὔχρηστος
  rationale: '''Necesarios y útiles'' corresponde de forma directa a los adjetivos griegos y preserva la simetría semántica del texto.'
- source_word: συνεπνεῖ
  english_pob_choice: all breathe together
  chosen_spanish: todos respiran juntos
  alternatives_spanish:
  - todos alientan juntos
  - todos respiran en conjunto
  lexicon: συμπνέω
  rationale: '''Respiran juntos'' conserva la imagen verbal de respirar en común; ''alientan'' sería más literario pero menos transparente para lectura pública.'
- source_word: ὑποταγῇ μιᾷ χρῆται
  english_pob_choice: make use of one submission
  chosen_spanish: se valen de una sola sumisión
  alternatives_spanish:
  - practican una sola sumisión
  - ejercen una sola sumisión
  lexicon: ὑποταγή; χράομαι
  rationale: Se mantiene la tensión del original entre 'usar' y una abstracción ('sumisión'). 'Se valen de' comunica el verbo χράομαι sin forzar una paráfrasis, mientras 'una sola sumisión' conserva la unidad marcada por μιᾷ.
- source_word: εἰς τὸ σώζεσϑαι ὅλον τὸ σῶμα
  english_pob_choice: so that the whole body may be preserved
  chosen_spanish: para que todo el cuerpo sea preservado
  alternatives_spanish:
  - para que el cuerpo entero sea conservado
  - a fin de que todo el cuerpo se salve
  lexicon: σώζω
  rationale: '''Sea preservado'' recoge el sentido de conservación/guardar intacto que el inglés POB captó con ''be preserved'', evitando introducir un matiz soteriológico más fuerte de lo exigido por el contexto.'
theological_decisions:
- issue: Unidad orgánica y subordinación común en la metáfora del cuerpo
  english_pob_reading: all breathe together and make use of one submission
  chosen_spanish_reading: todos respiran juntos y se valen de una sola sumisión
  alternative_spanish_readings:
  - todos respiran juntos y practican una sola sumisión
  - todos respiran juntos y ejercen una sola sumisión
  rationale: La cláusula final debe conservar tanto la cooperación orgánica ('respiran juntos') como la nota de subordinación compartida ('una sola sumisión'). El español 'se valen de' preserva el valor del verbo griego de modo menos mecánico que una simple traducción literal.
  doctrine_reference: 'Eclesiología patrística: armonía del cuerpo comunitario y orden compartido, sin desdibujar la imagen corporal.'
translation_notes:
  revision_awareness: 'La redacción final sigue la revisión más reciente del testigo inglés: se mantuvo ''breathe together'' como ''respiran juntos'' para συνεπνεῖ, y se evitó una paráfrasis de ''make use of one submission'' que borrara el valor de χρῆται + ὑποταγῇ μιᾷ. La versión española conserva ambas decisiones con naturalidad.'
  spanish_consistency_notes:
  - Se mantuvo 'cuerpo' y 'miembros' para preservar la metáfora orgánica del original.
  - Se usó 'sumisión' para reflejar ὑποταγή, en coherencia con la decisión inglesa de no suavizar el término.
  - '''Preservado'' refleja el cierre de σώζεσθαι sin cargarlo de un matiz doctrinal ajeno al pasaje.'
