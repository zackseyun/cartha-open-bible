  to: 'Tomemos nuestro cuerpo como ejemplo: la cabeza no es nada sin los pies; de igual modo, los pies no son nada sin la cabeza. Aun los miembros más pequeños de nuestro cuerpo son necesarios y útiles para todo el cuerpo. Pero todos respiran juntos y practican una sola sumisión[a], para que todo el cuerpo sea preservado.'
