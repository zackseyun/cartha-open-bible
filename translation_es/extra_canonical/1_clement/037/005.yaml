review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del griego: tomar el cuerpo como ejemplo, la interdependencia de cabeza y pies, la necesidad de los miembros más pequeños, y la finalidad de preservar el cuerpo entero. Sin embargo, en la cláusula final, ''se valen de una sola sumisión'' suena semánticamente forzado en español y no comunica con suficiente claridad el uso idiomático de χρῆται con ὑποταγῇ. El sentido es más bien que todos actúan bajo una misma sumisión o practican una sumisión común.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero 'se valen de una sola sumisión' resulta poco natural y algo opaco para lectura eclesial amplia. 'Sea preservado' es comprensible, aunque 'sea conservado' también sería posible; no requiere cambio. El resto del verso lee bien en español neutral.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La elección 'sumisión' para ὑποταγή es defendible y preserva la fuerza léxica; el ajuste recomendado es verbal/idiomático, no terminológico. 'Miembros', 'cuerpo' y 'respiran juntos' se alinean adecuadamente con la evidencia fuente y el rastro de auditoría inglés.
  issues:
  - severity: medium
    issue: 'Expresión poco natural: ''se valen de una sola sumisión'''
    rationale: Aunque intenta reflejar χράομαι de manera cercana, en español la construcción es extraña con un sustantivo abstracto como 'sumisión' y puede confundir al lector. 'Practican una sola sumisión' o 'actúan con una sola sumisión' comunica mejor el valor idiomático sin perder la idea de unidad.
  - severity: low
    issue: La nota al pie actual compensa parcialmente una frase principal débil
    rationale: La alternativa en nota ('practican una sola sumisión') suena mejor que el texto principal. Conviene promover esa solución al texto principal y dejar una nota que preserve la opción más literal documentada por el inglés POB.
