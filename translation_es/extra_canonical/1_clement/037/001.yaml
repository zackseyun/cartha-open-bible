translation:
  language: es
  text: 'Por tanto, sirvamos como soldados, hermanos, con todo empeño en sus mandamientos irreprochables. Consideremos a los que sirven como soldados bajo nuestros jefes: cuán ordenadamente, cuán obedientemente, cuán sumisamente ejecutan lo que se les manda. No todos son prefectos, ni tribunos, ni centuriones, ni jefes de cincuenta, ni los demás sucesivamente; sino que cada uno, en su propio rango, cumple las órdenes dadas por el rey y por los jefes.


    Los grandes no pueden existir sin los pequeños, ni los pequeños sin los grandes. Hay una cierta combinación en todas las cosas, y en estas hay utilidad. Tomemos nuestro cuerpo: la cabeza no es nada sin los pies; igualmente los pies no son nada sin la cabeza. Aun los miembros más pequeños de nuestro cuerpo son necesarios y útiles para todo el cuerpo. Pero todos respiran juntos y se rigen por una sola sujeción, para que todo el cuerpo se conserve.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Στρατευώμεθα
  english_pob_choice: let us serve as soldiers
  chosen_spanish: sirvamos como soldados
  alternatives_spanish:
  - alístemonos
  - sirvamos en la milicia
  - hagamos servicio como soldados
  lexicon: LSJ
  rationale: La forma exhortativa conserva la metáfora militar sin volverla más bélica de lo que exige el contexto. «Sirvamos como soldados» mantiene el llamado paraenético y suena natural en español.
- source_word: ἐκτενείας
  english_pob_choice: earnestness
  chosen_spanish: empeño
  alternatives_spanish:
  - ardor
  - diligencia
  - seriedad
  lexicon: LSJ
  rationale: El término expresa esfuerzo sostenido y aplicación seria. «Empeño» comunica esa energía perseverante sin forzar un matiz emocional más intenso que el del griego.
- source_word: ἀμώμοις προστάγμασιν
  english_pob_choice: blameless commands
  chosen_spanish: mandamientos irreprochables
  alternatives_spanish:
  - mandamientos sin mancha
  - preceptos irreprochables
  - ordenanzas irreprochables
  lexicon: LSJ
  rationale: «Irreprochables» preserva el juicio moral de ἀμώμοις y funciona bien con «mandamientos» en español bíblico, sin sustituir el tono normativo del texto.
- source_word: εὐτάκτως
  english_pob_choice: orderly
  chosen_spanish: ordenadamente
  alternatives_spanish:
  - con orden
  - con disciplina
  - de manera ordenada
  lexicon: LSJ
  rationale: La idea es de conducta bien dispuesta y ordenada. «Ordenadamente» conserva ese valor de organización y se integra con naturalidad en la serie adverbial.
- source_word: εἰκτικῶς
  english_pob_choice: obediently
  chosen_spanish: obedientemente
  alternatives_spanish:
  - de buena gana
  - con prontitud
  - complacientemente
  lexicon: LSJ
  rationale: Tras la revisión auditada del inglés, εἰκτικῶς se entiende aquí con el matiz de obediencia o pronta respuesta. «Obedientemente» refleja esa disposición de cumplir lo mandado.
- source_word: ὑποτεταγμένως
  english_pob_choice: submissively
  chosen_spanish: sumisamente
  alternatives_spanish:
  - en sujeción
  - subordinadamente
  - sometidamente
  lexicon: LSJ
  rationale: Preserva la relación explícita de sujeción jerárquica del símil militar. «Sumisamente» mantiene el peso de la subordinación sin suavizarla indebidamente.
- source_word: ἡγουμένοις
  english_pob_choice: leaders
  chosen_spanish: líderes
  alternatives_spanish:
  - jefes
  - guías
  - dirigentes
  lexicon: LSJ
  rationale: La revisión inglesa corrigió «commanders» a «leaders» para ajustarse al griego. «Líderes» sigue de cerca esa decisión y evita militarizar de más el término.
- source_word: τάγματι
  english_pob_choice: rank
  chosen_spanish: rango
  alternatives_spanish:
  - orden
  - puesto
  - grado
  lexicon: LSJ
  rationale: En la analogía militar, «rango» es el equivalente más transparente y preciso para el lugar asignado de cada uno.
- source_word: βασιλέως
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  - soberano
  - emperador
  lexicon: LSJ
  rationale: El griego dice simplemente «rey». «Rey» evita introducir una especificación histórica ajena al texto.
- source_word: σύγκρασίς
  english_pob_choice: blending
  chosen_spanish: mezcla
  alternatives_spanish:
  - combinación
  - fusión
  - mezcolanza
  lexicon: LSJ
  rationale: El sustantivo expresa una composición o mezcla de partes. «Mezcla» conserva esa imagen de interrelación entre los elementos del cuerpo y de la comunidad.
- source_word: χρῆσις
  english_pob_choice: usefulness
  chosen_spanish: utilidad
  alternatives_spanish:
  - provecho
  - servicio
  - beneficio
  lexicon: LSJ
  rationale: El punto es la utilidad práctica que surge de la relación entre las partes. «Utilidad» es directo y fiel al argumento.
- source_word: συνεπνεῖ
  english_pob_choice: work together in harmony
  chosen_spanish: respiran juntos
  alternatives_spanish:
  - actúan en armonía
  - trabajan en armonía
  - respiran al unísono
  lexicon: LSJ
  rationale: La revisión auditada volvió al valor más literal de «respirar juntos». En español, «respiran juntos» preserva la imagen corporal y la coordinación mutua sin perder claridad.
- source_word: ὑποταγῇ μιᾷ χρῆται
  english_pob_choice: make use of one submission
  chosen_spanish: hacen uso de una sola sumisión
  alternatives_spanish:
  - se sirven de una sola sujeción
  - viven bajo una sola subordinación
  - usan una sola obediencia
  lexicon: LSJ
  rationale: La frase es comprimida en griego y conserva una tensión semántica entre sujeción y funcionamiento conjunto. «Una sola sumisión» mantiene esa fuerza, aunque suene algo más literal que una paráfrasis suavizada.
- source_word: σώζεσθαι
  english_pob_choice: be preserved
  chosen_spanish: sea preservado
  alternatives_spanish:
  - sea salvado
  - se conserve
  - sea mantenido
  lexicon: LSJ
  rationale: En la analogía del cuerpo, el sentido inmediato es de preservación o conservación del todo. «Sea preservado» sigue esa lectura sin borrar la resonancia más amplia de salvación.
theological_decisions:
- issue: Alocución ἄνδρες ἀδελφοί
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos, hombres
  rationale: El vocativo griego combina trato fraternal con forma masculina plural. «Hermanos» mantiene la forma del texto y la práctica del proyecto de no expandir el destinatario más allá de la evidencia griega.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Intensidad de la metáfora militar en la exhortación eclesial
  english_pob_reading: Retain explicit soldiering language throughout the opening verses
  chosen_spanish_reading: Conservar el lenguaje militar explícito al inicio
  alternative_spanish_readings:
  - suavizar a lenguaje general de servicio
  - reducir la metáfora a obediencia
  rationale: La exhortación de Clemente depende del paralelismo entre ejército y comunidad para subrayar orden, obediencia y rango. Suavizarlo diluiría la lógica retórica del pasaje.
  doctrine_reference: 'PHILOSOPHY.md: preserve source texture and auditable reasoning'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión auditada más reciente del inglés: adopta «líderes» para ἡγουμένοις, mantiene «obedientemente» para εἰκτικῶς, conserva la literalidad de «respiran juntos» para συνεπνεῖ y elimina cualquier añadido no explícito como «como ejemplo».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se conserva el registro eclesial sobrio y el paralelismo militar sin introducir vocabulario confesional no requerido por el griego.
  - «Rey» y «líderes» se usan de forma consistente con la revisión auditada y sin sobreespecificar el contexto histórico.
