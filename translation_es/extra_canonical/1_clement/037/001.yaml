base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/037/001.yaml
  text: 'Therefore let us serve as soldiers, brothers, with all earnestness in his blameless commands. Let us consider those who serve as soldiers under our leaders: how orderly, how obediently, how submissively they carry out what is commanded. Not all are prefects, nor tribunes, nor centurions, nor commanders of fifty, nor so on in order; but each, in his own rank, carries out the orders given by the king and by the leaders.


    The great cannot exist without the small, nor the small without the great. There is a certain blending in all things, and in these things there is usefulness. Let us take our body: the head is nothing without the feet; likewise the feet are nothing without the head. Even the smallest members of our body are necessary and useful to the whole body. But all breathe together and make use of one submission, so that the whole body may be preserved.'
