review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el argumento y conserva la imaginería militar, la jerarquía de rangos y la analogía del cuerpo. Sin embargo, hay varios puntos donde el español suena demasiado calcado o menos fiel al matiz del griego/auditoría inglesa: «líderes» resulta poco natural en un contexto militar-analógico; «ni el resto en orden» no expresa bien τὸ καθεξῆς; «mezcla» puede funcionar pero «combinación» o «integración» evita una connotación demasiado material; y, sobre todo, «hacen uso de una sola sumisión» es gramaticalmente posible pero torpe en español e insuficientemente inteligible como representación de ὑποταγῇ μιᾷ χρῆται. También «sea preservado» es correcto pero menos natural que «sea conservado».'
  spanish_quality_summary: 'La legibilidad general es buena, pero hay literalismos que endurecen innecesariamente el español: «sirven como soldados» repetido, «ni el resto en orden», «hacen uso de una sola sumisión», y «sea preservado». El registro puede mantenerse digno y fiel con ajustes menores hacia un español eclesial más natural: «los que están bajo las órdenes de nuestros jefes», «ni los demás sucesivamente», «todos respiran juntos y se rigen por una sola sujeción», «para que todo el cuerpo se conserve».'
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. Se preserva «hermanos», la metáfora militar y «rey» para βασιλέως. La decisión sobre ὑποταγή debe mantenerse explícita como «sujeción/subordinación», no diluirse en una simple «coordinación».
  issues:
  - severity: medium
    issue: «bajo nuestros líderes»
    rationale: Aunque sigue la auditoría inglesa, «líderes» en español suena moderno y genérico. En un símil militar, «jefes» o «superiores» expresa mejor ἡγουμένοις sin sobredeterminarlo como rango técnico.
  - severity: medium
    issue: «ni el resto en orden»
    rationale: No comunica con claridad οὐδὲ τὸ καθεξῆς, que significa algo como «ni así sucesivamente / ni los demás por orden». La frase actual suena poco idiomática.
  - severity: high
    issue: «hacen uso de una sola sumisión»
    rationale: Es un calco duro y poco inteligible en español. El texto debe conservar la idea de una única sujeción/subordinación, pero con formulación comprensible, por ejemplo «se rigen por una sola sujeción».
  - severity: low
    issue: «sea preservado»
    rationale: Es fiel, pero «se conserve» o «sea conservado» suena más natural en español en la analogía corporal.
  revised_spanish_text: 'Por tanto, sirvamos como soldados, hermanos, con todo empeño en sus mandamientos irreprochables. Consideremos a los que sirven como soldados bajo nuestros jefes: cuán ordenadamente, cuán obedientemente, cuán sumisamente ejecutan lo que se les manda. No todos son prefectos, ni tribunos, ni centuriones, ni jefes de cincuenta, ni los demás sucesivamente; sino que cada uno, en su propio rango, cumple las órdenes dadas por el rey y por los jefes.


    Los grandes no pueden existir sin los pequeños, ni los pequeños sin los grandes. Hay una cierta combinación en todas las cosas, y en estas hay utilidad. Tomemos nuestro cuerpo: la cabeza no es nada sin los pies; igualmente los pies no son nada sin la cabeza. Aun los miembros más pequeños de nuestro cuerpo son necesarios y útiles para todo el cuerpo. Pero todos respiran juntos y se rigen por una sola sujeción, para que todo el cuerpo se conserve.'
  revision_rationale: 'Se corrigen varios literalismos para mejorar fidelidad funcional y legibilidad en español sin perder la textura del original: «jefes» por «líderes» en un contexto de mando; «ni los demás sucesivamente» por la expresión ininteligible «ni el resto en orden»; «combinación» por «mezcla» para una imagen más natural en este argumento; «se rigen por una sola sujeción» para expresar con claridad ὑποταγῇ μιᾷ χρῆται sin borrar la idea de subordinación; y «se conserve» como español más idiomático para σώζεσθαι en esta analogía. No se requieren notas al pie nuevas.'
