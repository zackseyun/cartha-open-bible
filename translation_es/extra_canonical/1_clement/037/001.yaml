  text: Στρατευώμεϑα οὖν, ἄνδρες ἀδελφοί, μετὰ πάσης ἐκτενείας ἐν τοῖς ἀμώμοις προστάγμασιν αὐτοῦ. 2. κατανοήσωμεν τοὺς στρατευομένους τοῖς ἡγουμένοις ἡμῶν, πῶς εὐτάκτως, πῶς εἰκτικῶς, πῶς ὑποτεταγμένως ἐπιτελοῦσιν τὰ διατασσόμενα. 3. οὐ πάντες εἰσὶν ἔπαρχοι οὐδὲ χιλίαρχοι οὐδὲ ἑκατόνταρχοι οὐδὲ πεντηκόνταρχοι οὐδὲ τὸ καϑεξῆς, ἀλλ’ ἕκαστος ἐν τῷ ἰδίῳ τάγματι τὰ ἐπιτασσόμενα ὑπὸ τοῦ βασιλέως καὶ τῶν ἡγουμένων ἐπιτελεῖ. . οἱ μεγάλοι δίχα τῶν μικρῶν οὐ δύνανται εἶναι οὔτε οἱ μικροὶ δὶχα τῶν μεγάλων· σύγκρασίς τις ἐστιν ἐν πᾶσιν, καὶ ἐν τούτοις χρῆσις. 5. λάβωμεν τὸ σῶμα ἡμῶν· ἡ κεφαλὴ δίχα τῶν ποδῶν οὐδέν ἐστιν, οὕτως οὐδὲ οἱ πόδες δίχα τῆς κεφαλῆς· τὰ δὲ ἐλάχιστα μέλη τοῦ σώματος ἡμῶν ἀναγκαῖα καὶ εὔχρηστά εἰσιν ὅλῳ τῷ σώματι· ἀλλὰ πάντα συνεπνεῖ καὶ ὑποταγῇ μιᾷ χρῆται εἰς τὸ σώζεσϑαι ὅλον τὸ σῶμα.
