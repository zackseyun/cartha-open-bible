base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/037/004.yaml
  text: The great cannot exist without the small[a], nor the small without the great. There is a certain blending in all things, and in these there is usefulness.
  footnotes:
  - marker: a
    text: Or 'and in this there is usefulness.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:34Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Los grandes no pueden existir sin los pequeños, ni los pequeños sin los grandes. Hay una cierta mezcla en todas las cosas, y en ellas[a] hay utilidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «en estas/en ellas» (ἐν τούτοις), en plural, no «en esto».
    reason: Aclaración gramatical sobre la referencia plural preservada por la auditoría inglesa.
lexical_decisions:
- source_word: οἱ μεγάλοι
  english_pob_choice: the great
  chosen_spanish: los grandes
  alternatives_spanish:
  - los poderosos
  - los mayores
  lexicon: μέγας
  rationale: «Los grandes» conserva la correspondencia semántica directa con el griego y mantiene la relación paralela con «los pequeños» sin introducir una lectura de poder que el texto no explicita.
- source_word: τῶν μικρῶν
  english_pob_choice: the small
  chosen_spanish: los pequeños
  alternatives_spanish:
  - los menores
  - los chicos
  lexicon: μικρός
  rationale: «Los pequeños» es la forma más natural en español para el contraste antitético del pasaje y preserva el valor relacional del adjetivo griego.
- source_word: δίχα / δὶχα
  english_pob_choice: without
  chosen_spanish: sin
  alternatives_spanish:
  - separados de
  - aparte de
  lexicon: δίχα
  rationale: «Sin» refleja de manera directa la construcción negativa de dependencia mutua en español, sin cargar el texto con una explicación ajena al original.
- source_word: σύγκρασίς τις
  english_pob_choice: a certain blending
  chosen_spanish: una cierta mezcla
  alternatives_spanish:
  - una cierta combinación
  - una cierta mezcla/combinación
  lexicon: σύγκρασις
  rationale: «Mezcla» comunica bien la idea de composición o mezcla de elementos en un registro claro y sobrio; «una cierta» conserva el matiz indefinido de τις.
- source_word: ἐν πᾶσιν
  english_pob_choice: in all things
  chosen_spanish: en todas las cosas
  alternatives_spanish:
  - en todo
  - en todas
  lexicon: πᾶς
  rationale: La frase española mantiene la universalidad del griego y evita estrechar el sentido a un solo ámbito.
- source_word: ἐν τούτοις χρῆσις
  english_pob_choice: and in these there is usefulness
  chosen_spanish: y en estas hay utilidad
  alternatives_spanish:
  - y en ellas hay utilidad
  - y en esto hay utilidad
  lexicon: χρῆσις
  rationale: «Utilidad» traduce con sobriedad χρῆσις como valor práctico o provecho. Se eligió el plural «estas» para respetar el antecedente plural de ἐν τούτοις y la revisión griega que corrigió la lectura singular.
theological_decisions:
- issue: Relación entre «los grandes» y «los pequeños» como principio de dependencia mutua
  english_pob_reading: The great cannot exist without the small, nor the small without the great.
  chosen_spanish_reading: Los grandes no pueden existir sin los pequeños, ni los pequeños sin los grandes.
  alternative_spanish_readings:
  - Los grandes no pueden estar sin los pequeños, ni los pequeños sin los grandes.
  rationale: Se mantiene la formulación de dependencia recíproca que el griego expresa, sin convertirla en una afirmación moral o jerárquica adicional.
  doctrine_reference: Eclesiología/orden de la comunidad en 1 Clemente; lectura descriptiva, no dogmática.
- issue: Alcance de «ἐν πᾶσιν» y «ἐν τούτοις»
  english_pob_reading: There is a certain blending in all things, and in these there is usefulness.
  chosen_spanish_reading: Hay una cierta mezcla en todas las cosas, y en estas hay utilidad.
  alternative_spanish_readings:
  - Hay una cierta mezcla en todo, y en ello hay utilidad.
  - Hay una cierta mezcla en todas las cosas, y en ellas hay utilidad.
  rationale: 'La decisión conserva ambos plurales griegos: el universal de πᾶσιν y el de τούτοις. Así se evita oscurecer la referencia plural que la revisión textual corrigió en el inglés POB.'
  doctrine_reference: Gramática del texto; no implica una doctrina específica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente que corrigió el inglés de «and in this there is usefulness» a «and in these there is usefulness», porque el griego ἐν τούτοις es plural. La versión española refleja ese plural con «en estas» y añade una nota alternativa posible, «en ellas», para conservar la ambigüedad referencial del antecedente.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y vocabulario litúrgico ajeno, porque el versículo no contiene lenguaje divino nominal.
  - Se mantuvo una equivalencia cercana al griego en los paralelismos, con español natural y publicable.
  - No se introdujeron notas doctrinales innecesarias; el pasaje es sapiencial-descriptivo.
