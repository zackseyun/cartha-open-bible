  text: οἱ μεγάλοι δίχα τῶν μικρῶν οὐ δύνανται εἶναι οὔτε οἱ μικροὶ δὶχα τῶν μεγάλων· σύγκρασίς τις ἐστιν ἐν πᾶσιν, καὶ ἐν τούτοις χρῆσις.
