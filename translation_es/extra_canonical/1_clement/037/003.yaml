revisions:
- from: No todos son prefectos[a], ni tribunos, ni centuriones, ni comandantes de cincuenta, ni lo demás en orden; pero cada uno, en su propio rango, cumple las órdenes dadas por el rey y por los líderes.
  to: No todos son prefectos, ni tribunos, ni centuriones, ni comandantes de cincuenta, ni el resto en orden[a]; pero cada uno, en su propio rango, cumple las órdenes dadas por el rey y por los líderes.
  rationale: Se sustituye «lo demás» por «el resto» para lograr un español más natural y claro, manteniendo la idea de continuación jerárquica implícita en τὸ καθεξῆς. Se conserva en nota la formulación previa como alternativa posible. No se requiere adjudicación adicional porque el ajuste es menor, claro en griego y no afecta doctrina.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:59:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: negación de rangos militares en serie, contraste con ἀλλ’ ἕκαστος, y cumplimiento de mandatos en el propio τάγματι. Los rangos principales están bien representados. Sin embargo, «ni lo demás en orden» suena poco natural en español y no comunica con claridad el valor idiomático de τὸ καθεξῆς (‘lo que sigue en secuencia’, ‘y así sucesivamente’).'
  spanish_quality_summary: El español es generalmente claro y digno, pero «ni lo demás en orden» resulta rígido y algo opaco. También conviene evitar una nota al pie redundante que repite exactamente la misma frase del texto como alternativa. El resto del versículo es fluido y fiel.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Prefectos», «tribunos», «centuriones», «comandantes de cincuenta», «líderes» y «cumple» son decisiones admisibles. La principal mejora es estilística-semántica en τὸ καθεξῆς.
  issues:
  - severity: medium
    issue: «ni lo demás en orden» es poco idiomático para τὸ καθεξῆς
    rationale: Aunque intenta conservar la idea de secuencia, en español suena forzado y puede no entenderse bien. «ni el resto en orden» o «ni los demás en orden» transmite mejor ‘the rest in order / what follows in sequence’.
  - severity: low
    issue: La nota [a] repite esencialmente el mismo contenido del texto
    rationale: La nota actual («O «ni lo demás en orden»») no aporta una alternativa real si el texto ya dice eso. Si se revisa el texto, la nota puede preservar la otra posibilidad de traducción.
  revised_spanish_text: No todos son prefectos, ni tribunos, ni centuriones, ni comandantes de cincuenta, ni el resto en orden[a]; pero cada uno, en su propio rango, cumple las órdenes dadas por el rey y por los líderes.
  revised_footnotes:
  - marker: a
    text: O «ni lo demás en orden».
    reason: alternative_rendering
  revision_rationale: Se sustituye «lo demás» por «el resto» para lograr un español más natural y claro, manteniendo la idea de continuación jerárquica implícita en τὸ καθεξῆς. Se conserva en nota la formulación previa como alternativa posible. No se requiere adjudicación adicional porque el ajuste es menor, claro en griego y no afecta doctrina.
