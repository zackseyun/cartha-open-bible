id: 1CLEM.37.3
reference: 1 Clement 37:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: οὐ πάντες εἰσὶν ἔπαρχοι οὐδὲ χιλίαρχοι οὐδὲ ἑκατόνταρχοι οὐδὲ πεντηκόνταρχοι οὐδὲ τὸ καϑεξῆς, ἀλλ’ ἕκαστος ἐν τῷ ἰδίῳ τάγματι τὰ ἐπιτασσόμενα ὑπὸ τοῦ βασιλέως καὶ τῶν ἡγουμένων ἐπιτελεῖ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/037/003.yaml
  text: Not all are prefects[a], nor tribunes, nor centurions, nor commanders of fifty, nor so on in order; but each, in his own rank, carries out the orders given by the king and by the leaders.
  footnotes:
  - marker: a
    text: Or 'nor so on'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:35Z'
    unchanged: false
    changes_summary: Revised the final term from 'commanders' to 'leaders' for ἡγουμένων, which is broader and avoids repeating military terminology not explicit in the Greek. Adjusted 'the rest in order' to 'so on in order' to more directly reflect τὸ καθεξῆς, though still idiomatic.
translation:
  language: es
  text: No todos son prefectos, ni tribunos, ni centuriones, ni comandantes de cincuenta, ni el resto en orden[a]; pero cada uno, en su propio rango, cumple las órdenes dadas por el rey y por los líderes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ni lo demás en orden».
    reason: alternative_rendering
lexical_decisions:
- source_word: ἔπαρχοι
  english_pob_choice: prefects
  chosen_spanish: prefectos
  alternatives_spanish:
  - gobernadores
  - prefectos militares
  lexicon: ἔπαρχος
  rationale: El inglés POB eligió «prefects», y en español «prefectos» conserva el rango administrativo/militar sin imponer una equivalencia más específica que el griego no exige.
- source_word: χιλίαρχοι
  english_pob_choice: tribunes
  chosen_spanish: tribunos
  alternatives_spanish:
  - tribunos militares
  - jefes de mil
  lexicon: χιλίαρχος
  rationale: «Tribunos» reproduce el término de rango usado por la POB en inglés y es reconocible en español culto; mantenerlo evita diluir la lista jerárquica.
- source_word: ἑκατόνταρχοι
  english_pob_choice: centurions
  chosen_spanish: centuriones
  alternatives_spanish:
  - capitanes de cien
  lexicon: ἑκατόνταρχος
  rationale: «Centuriones» es el correlato directo y tradicional para el rango de cien, con buena inteligibilidad en español bíblico.
- source_word: πεντηκόνταρχοι
  english_pob_choice: commanders of fifty
  chosen_spanish: comandantes de cincuenta
  alternatives_spanish:
  - jefes de cincuenta
  - capitanes de cincuenta
  lexicon: πεντηκόνταρχος
  rationale: Se mantiene la estructura numérica explícita del griego y del inglés POB para preservar la progresión jerárquica.
- source_word: τὸ καθεξῆς
  english_pob_choice: so on in order
  chosen_spanish: lo demás en orden
  alternatives_spanish:
  - y así sucesivamente en orden
  - y el resto en orden
  lexicon: καθεξῆς
  rationale: La frase griega indica lo que sigue en secuencia; «lo demás en orden» evita el coloquialismo de «etcétera» y conserva la idea de continuación ordenada.
- source_word: ἡγουμένων
  english_pob_choice: leaders
  chosen_spanish: líderes
  alternatives_spanish:
  - jefes
  - dirigentes
  lexicon: ἡγούμενος
  rationale: El inglés POB amplió desde un término militar demasiado estrecho a «leaders»; en español, «líderes» refleja esa amplitud y evita introducir un rango no explicitado.
- source_word: ἐπιτελεῖ
  english_pob_choice: carries out
  chosen_spanish: cumple
  alternatives_spanish:
  - ejecuta
  - lleva a cabo
  lexicon: ἐπιτελέω
  rationale: «Cumple» expresa de manera natural la ejecución fiel de órdenes y conserva el sentido de realización efectiva sin sobrecargar el estilo.
- source_word: τὰ ἐπιτασσόμενα
  english_pob_choice: the orders given
  chosen_spanish: las órdenes dadas
  alternatives_spanish:
  - las instrucciones dadas
  - lo mandado
  lexicon: ἐπιτάσσω
  rationale: La pasiva participial señala mandatos recibidos; «las órdenes dadas» refleja bien la forma pasiva y el contenido de mandato.
theological_decisions:
- issue: Orden jerárquico y obediencia a la autoridad
  english_pob_reading: each, in his own rank, carries out the orders given by the king and by the leaders
  chosen_spanish_reading: cada uno, en su propio rango, cumple las órdenes dadas por el rey y por los líderes
  alternative_spanish_readings:
  - cada uno, en su propio rango, lleva a cabo las órdenes dadas por el rey y por los líderes
  - cada uno, en su propio orden, ejecuta las órdenes dadas por el rey y por los líderes
  rationale: El punto doctrinal-práctico del pasaje es la obediencia ordenada dentro de una jerarquía. «En su propio rango» conserva la metáfora de distribución por rangos sin convertirla en una interpretación eclesial.
  doctrine_reference: Orden, subordinación y obediencia dentro de la comunidad
translation_notes:
  revision_awareness: La base inglesa más reciente usó «so on in order» para τὸ καθεξῆς, mientras que una revisión previa prefería «the rest in order». En español se evita el giro coloquial «etc.» y se opta por una forma que conserve la secuencia jerárquica del griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se conserva el tono administrativo-militar de la lista de rangos, sin suavizarlo a vocabulario eclesiástico.
  - «Líderes» se usa en sentido amplio, no como título técnico.
