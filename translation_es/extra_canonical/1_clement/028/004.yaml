translation:
  language: es
  text: ¿A dónde, pues, puede uno ir, o a dónde puede escapar del que abarca todo?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ποῦ οὖν... ποῦ
  english_pob_choice: Where, then... or where
  chosen_spanish: ¿A dónde, pues... o de dónde...
  alternatives_spanish:
  - ¿Adónde, pues... o adónde...
  - ¿Dónde, pues... o dónde...
  lexicon: interrogative direction
  rationale: El griego repite la pregunta de dirección con énfasis retórico. En español, «¿A dónde?» y «¿de dónde?» conservan el movimiento de ida y salida con naturalidad y sin perder la fuerza retórica.
- source_word: τις
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - alguien
  - una persona
  lexicon: indefinite pronoun
  rationale: «Uno» reproduce el indefinido impersonal del inglés POB y suena natural en español general, manteniendo el alcance universal de la pregunta.
- source_word: ἀπελθεῖν / ἐκφυγεῖν
  english_pob_choice: go / escape
  chosen_spanish: ir / escapar
  alternatives_spanish:
  - irse / huir
  - salir / librarse
  lexicon: motion and escape verbs
  rationale: «Ir» y «escapar» reflejan el par verbal del texto y la equivalencia adoptada por el POB en inglés, sin añadir matices no sustentados por el griego.
- source_word: τὸν πάντα περιέχοντα
  english_pob_choice: the one who encompasses all things
  chosen_spanish: el que lo abarca todo
  alternatives_spanish:
  - el que abarca todas las cosas
  - el que comprende todas las cosas
  lexicon: participle phrase
  rationale: «Abarca todo» conserva la idea de envolver/comprender de περιέχειν con un español idiomático. Se prefirió la forma breve y fluida «lo abarca todo» por claridad y fidelidad.
theological_decisions:
- issue: Referencia al sujeto divino descrito como «el que lo abarca todo»
  english_pob_reading: the one who encompasses all things
  chosen_spanish_reading: el que lo abarca todo
  alternative_spanish_readings:
  - el que abarca todas las cosas
  - el que comprende todas las cosas
  rationale: El texto presenta a una figura absoluta sin nombrarla explícitamente. Se preservó la formulación impersonal y no se introdujo un título teológico adicional que el verso no usa.
  doctrine_reference: atributos divinos implícitos / lenguaje doxológico en 1 Clemente
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que simplificó la primera cláusula a «Where, then, can one go, or where can one escape...». La versión española refleja esa misma simplificación con un registro natural y mantiene la duplicación retórica de la pregunta.
  spanish_consistency_notes:
  - Se mantuvo un registro digno y claro, apto para lectura eclesial.
  - No se introdujo «SEÑOR» ni «Cristo», porque el versículo no los contiene explícitamente.
  - Se evitó calcar la sintaxis inglesa cuando el español permite una pregunta de dirección más natural.
