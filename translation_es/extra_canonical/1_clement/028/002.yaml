translation:
  language: es
  text: 'Porque ¿adónde podría huir alguno de nosotros para escapar de su mano poderosa? ¿O qué mundo recibirá a alguno que huye de él? Porque la Escritura dice en algún lugar:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μὴν ἐκφύγωμεν / flee
  english_pob_choice: flee
  chosen_spanish: huir
  alternatives_spanish:
  - escapar
  - huir de
  lexicon: N/A
  rationale: «Huir» reproduce bien la imagen de intentar ponerse fuera del alcance de una mano poderosa y suena natural en español. «Escapar» también sería posible, pero «huir» conserva mejor el matiz de evasión urgente del griego y del inglés POB.
- source_word: κραταιᾶς χειρός / mighty hand
  english_pob_choice: mighty hand
  chosen_spanish: mano poderosa
  alternatives_spanish:
  - mano fuerte
  - mano poderosa y fuerte
  lexicon: N/A
  rationale: «Poderosa» comunica la fuerza y autoridad de la imagen bíblica sin necesidad de forzar una locución más arcaica. Se mantiene la metáfora de la mano como signo de poder eficaz.
- source_word: κόσμος / world
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - orden creado
  - mundo/edad
  lexicon: N/A
  rationale: 'El inglés POB retiene «world», y «mundo» es la correspondencia normal en español. Aquí conserva la amplitud retórica de la pregunta: qué orden o ámbito podría acoger al que abandona a Dios.'
- source_word: ἀποδρασκόντα / deserts from him
  english_pob_choice: deserts from him
  chosen_spanish: se aparte de él
  alternatives_spanish:
  - abandone a él
  - deserte de él
  lexicon: N/A
  rationale: En español, «desertar de él» es comprensible pero algo militarizado; «se aparte de él» comunica la idea de abandonar/volverse atrás sin perder la tensión del alejamiento intencional. Se conserva así la fuerza del inglés POB sin un calco pesado.
- source_word: ἡ γραφὴ λέγει που / the Scripture says somewhere
  english_pob_choice: 'For the Scripture says somewhere:'
  chosen_spanish: 'Porque la Escritura dice en algún lugar:'
  alternatives_spanish:
  - 'Pues la Escritura dice en algún lugar:'
  - 'Porque dice la Escritura en algún lugar:'
  lexicon: N/A
  rationale: Se mantiene la fórmula introductoria tradicional y transparente. «En algún lugar» conserva el carácter aproximado de la cita sin atribución precisa, como en el inglés POB.
theological_decisions:
- issue: Retoric question about divine judgment and inescapability
  english_pob_reading: For where can anyone of us flee from his mighty hand? Or what world will receive anyone who deserts from him?
  chosen_spanish_reading: ¿Pues adónde podría huir alguno de nosotros de su mano poderosa? ¿O qué mundo recibirá a alguno que se aparte de él?
  alternative_spanish_readings:
  - ¿Pues adónde puede huir alguno de nosotros de su mano poderosa?
  - ¿O qué mundo recibirá a cualquiera que lo abandone?
  rationale: 'La formulación mantiene el paralelismo y la disyuntiva del texto: no hay escape del poder divino ni acogida segura para el que se aparta de Dios. Se conserva el tono exhortativo y de juicio implícito sin añadir explicación doctrinal ajena al pasaje.'
  doctrine_reference: Providencia y juicio divino; inescapabilidad del poder de Dios.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que cambió la conjunción final a una interrogativa disyuntiva («Or») y ajustó la puntuación para introducir la cita. La versión española refleja ese mismo giro con «¿O...?» y los dos puntos finales.
  spanish_consistency_notes:
  - Se mantiene «mundo» para κόσμο, siguiendo la elección del inglés POB y sin reducirlo a «edad» o «siglo».
  - Se conserva «Escritura» como fórmula estable para ἡ γραφή.
  - La frase final usa dos puntos para anunciar la cita, en línea con la revisión del inglés POB.
  - No se introduce «SEÑOR» por ninguna forma de κύριος, porque aquí el texto citado solo habla de «la Escritura dice».
