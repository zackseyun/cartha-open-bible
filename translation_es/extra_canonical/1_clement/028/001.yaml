translation:
  language: es
  text: 'Por tanto, puesto que todas las cosas son vistas y oídas, temámosle y abandonemos los deseos impuros de obras malas, para que, por su misericordia, seamos resguardados[a] de los juicios venideros.


    2 Porque ¿dónde podrá alguno de nosotros huir de su mano poderosa? ¿Y qué mundo recibirá a alguno de los que desertan de él? Porque la Escritura dice en alguna parte:


    3 «¿A dónde iré y a dónde me esconderé de tu rostro? Si subo al cielo, allí estás tú; si me alejo hasta lo más lejano de la tierra, allí está tu diestra; si me recuesto en los abismos, allí está tu Espíritu.


    4 ¿A dónde, entonces, podrá ir alguno, o a dónde escapará, del que todo lo abarca?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Resguardados» expresa con claridad el sentido de σκεπασθῶμεν en español; el verbo también conserva la idea de ser cubiertos o amparados por la misericordia de Dios.
    reason: lexical_clarity_and_source_alignment
lexical_decisions:
- source_word: βλεπομένων καὶ ἀκουομένων
  english_pob_choice: are seen and heard
  chosen_spanish: son vistas y oídas
  alternatives_spanish:
  - están bajo mirada y oído
  - son observadas y escuchadas
  lexicon: LSJ
  rationale: Conservo el pasivo y la idea de que todo queda expuesto ante Dios, sin añadir sujeto explícito que el griego no da.
- source_word: φοβηθῶμεν
  english_pob_choice: let us fear
  chosen_spanish: temámosle
  alternatives_spanish:
  - tengámosle temor
  - temamos
  lexicon: BDAG
  rationale: «Temer» mantiene la fuerza exhortativa y reverente del contexto de juicio; el clítico retoma a Dios con naturalidad en español.
- source_word: ἀπολίπωμεν
  english_pob_choice: abandon
  chosen_spanish: abandonemos
  alternatives_spanish:
  - dejemos atrás
  - renunciemos a
  lexicon: LSJ
  rationale: «Abandonar» expresa una renuncia decidida sin debilitar el tono exhortativo.
- source_word: φαύλων ἔργων μιαρὰς ἐπιθυμίας
  english_pob_choice: the impure desires of evil deeds
  chosen_spanish: los deseos impuros de obras malas
  alternatives_spanish:
  - las impuras pasiones de obras malas
  - los deseos defiling de obras malvadas
  lexicon: LSJ
  rationale: Mantengo la relación entre deseos y obras malas, y traduzco μιαρὰς por «impuros» para conservar la idea de contaminación sin reducir el término a deseo sexual.
- source_word: σκεπασθῶμεν
  english_pob_choice: we may be sheltered
  chosen_spanish: seamos cubiertos
  alternatives_spanish:
  - seamos protegidos
  - seamos resguardados
  lexicon: LSJ
  rationale: El verbo admite la imagen de ser cubiertos; en español «cubiertos» conserva mejor la metáfora que «protegidos», aunque ambas ideas están implicadas.
- source_word: τῶν μελλόντων κριμάτων
  english_pob_choice: the coming judgments
  chosen_spanish: los juicios venideros
  alternatives_spanish:
  - los juicios que están por venir
  - los juicios inminentes
  lexicon: BDAG
  rationale: «Venideros» mantiene la inminencia escatológica de μέλλω con un español claro y digno.
- source_word: κραταιᾶς χειρός
  english_pob_choice: mighty hand
  chosen_spanish: mano poderosa
  alternatives_spanish:
  - mano fuerte
  - mano robusta
  lexicon: LSJ
  rationale: «Poderosa» preserva la fuerza del modismo sin forzar la literalidad de «fuerte» en un registro más solemne.
- source_word: αὐτομολούντων
  english_pob_choice: those who desert from him
  chosen_spanish: los que desertan de él
  alternatives_spanish:
  - los que se pasan de él
  - los que le abandonan
  lexicon: LSJ
  rationale: «Desertar» conserva el matiz de defección/abandono deliberado que el griego sugiere, más fuerte que un simple «irse».
- source_word: τὸ γραφεῖον
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - el escrito
  - la escritura
  lexicon: LSJ
  rationale: En la fórmula citacional, «la Escritura» transmite el uso eclesial del pasaje y es comprensible en español bíblico actual.
- source_word: ἀφίξω
  english_pob_choice: shall I go / shall I arrive
  chosen_spanish: iré
  alternatives_spanish:
  - llegaré
  - partiré
  lexicon: LSJ
  rationale: Opto por «iré» porque fluye mejor en la cita poética en español; el verbo griego apunta a movimiento/arribo, pero aquí la pregunta retórica exige naturalidad.
- source_word: ἀπὸ τοῦ προσώπου σου
  english_pob_choice: from your face
  chosen_spanish: de tu rostro
  alternatives_spanish:
  - de tu presencia
  - de tu faz
  lexicon: BDAG
  rationale: «Rostro» conserva la metáfora antropomórfica de πρόσωπον y funciona bien en español sin desfigurar el tono bíblico.
- source_word: τὰ ἔσχατα τῆς γῆς
  english_pob_choice: the farthest parts of the earth
  chosen_spanish: lo más lejano de la tierra
  alternatives_spanish:
  - los confines de la tierra
  - las partes más remotas de la tierra
  lexicon: LSJ
  rationale: La frase mantiene el superlativo y suena natural en español; evita un calco excesivo y sigue la amplificación del original.
- source_word: καταστρωθῶ
  english_pob_choice: I make my bed
  chosen_spanish: me recuesto
  alternatives_spanish:
  - me echo
  - haga mi lecho
  lexicon: LSJ
  rationale: El verbo griego alude al acto de acostarse o tenderse; «me recuesto» comunica bien la acción sin introducir una imagen demasiado arcaica.
- source_word: ἀβύσσους
  english_pob_choice: the depths
  chosen_spanish: los abismos
  alternatives_spanish:
  - las profundidades
  - el abismo
  lexicon: BDAG
  rationale: En plural, «abismos» conserva la fuerza del original y la resonancia bíblica del término, aunque también es posible «profundidades».
- source_word: τὸ πνεῦμά σου
  english_pob_choice: your Spirit
  chosen_spanish: tu Espíritu
  alternatives_spanish:
  - tu espíritu
  - tu aliento
  lexicon: LSJ
  rationale: Aquí la mayúscula señala adecuadamente la referencia divina; la cita conservada en la carta exige mantener esa posible lectura del Espíritu de Dios.
- source_word: τὸ τὰ πάντα ἐμπεριέχοντος
  english_pob_choice: the One who encompasses all things
  chosen_spanish: del que todo lo abarca
  alternatives_spanish:
  - del que abarca todas las cosas
  - del que lo contiene todo
  lexicon: LSJ
  rationale: «Todo lo abarca» reproduce el sentido de envolver/contener sin volver pesada la clausula final.
theological_decisions:
- issue: Temor reverente y juicio futuro
  english_pob_reading: Retain both the warning of coming judgments and the impossibility of escape from God's presence without softening either theme.
  chosen_spanish_reading: Mantener tanto la advertencia de los juicios venideros como la imposibilidad de escapar de la presencia de Dios, sin suavizar ninguno de los dos acentos.
  alternative_spanish_readings:
  - Enfocar solo la reverencia y omitir el filo del juicio
  - Convertir el pasaje principalmente en consuelo sobre la omnipresencia
  rationale: La sección es exhortativa y admonitoria; el español debe conservar ese tono de advertencia y no convertirlo en mero consuelo.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Referencia divina de πνεῦμα en la cita
  english_pob_reading: In the scriptural citation, 'your Spirit' remains the likely reading within the rhetorical argument.
  chosen_spanish_reading: Conservar «tu Espíritu» con mayúscula, como posible referencia al Espíritu de Dios en la cita invocada por Clemente.
  alternative_spanish_readings:
  - tu espíritu
  - tu aliento
  rationale: La intertextualidad de la cita y la mayúscula ayudan a no aplanar la posible referencia pneumatológica, aunque el griego y la cita permiten discusión.
  doctrine_reference: Lexical/theological tension in the source citation.
translation_notes:
  revision_awareness: Tomé como guía la revisión más reciente del audit trail, especialmente las mejoras de naturalidad en las formulaciones de exhortación, juicio venidero y la cita bíblica, pero reexpresadas en español con mayor fidelidad al griego y al tono admonitorio del pasaje.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí la cita y el contexto usan referencia divina general, por lo que mantuve «Dios» implícito en los pronombres y la fórmula.
  - Conservé «Espíritu» con mayúscula en la cita para no neutralizar una posible lectura pneumatológica.
  - Mantuve «desertan» para αὐτομολούντων, porque el matiz de defección es importante en el argumento.
  - 'Preferí un registro bíblico sobrio y moderno: «venideros», «rostro», «abismos», «mano poderosa».'
