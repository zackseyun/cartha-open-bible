  to: 'Por tanto, puesto que todas las cosas son vistas y oídas, temámosle y abandonemos los deseos impuros de obras malas, para que, por su misericordia, seamos resguardados[a] de los juicios venideros.


    2 Porque ¿dónde podrá alguno de nosotros huir de su mano poderosa? ¿Y qué mundo recibirá a alguno de los que desertan de él? Porque la Escritura dice en alguna parte:


    3 «¿A dónde iré y a dónde me esconderé de tu rostro? Si subo al cielo, allí estás tú; si me alejo hasta lo más lejano de la tierra, allí está tu diestra; si me recuesto en los abismos, allí está tu Espíritu.


    4 ¿A dónde, entonces, podrá ir alguno, o a dónde escapará, del que todo lo abarca?»'
  rationale: Se corrige principalmente σκεπασθῶμεν + ἀπό para evitar una construcción española equívoca («cubiertos de los juicios») y se ajusta la pregunta final para conservar el paralelismo locativo del griego. Los demás cambios son de fluidez menor y no alteran el contenido.
