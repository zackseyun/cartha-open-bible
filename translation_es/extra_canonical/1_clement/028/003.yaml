revisions:
- from: ¿A dónde iré, y dónde me esconderé de tu rostro? Si subo al cielo, allí estás tú; si me aparto a las partes más lejanas de la tierra, allí está tu mano derecha; si me acuesto en las profundidades, allí está tu Espíritu.
  to: ¿A dónde iré, y dónde me esconderé de tu rostro? Si subo al cielo, allí estás tú; si voy hasta los confines de la tierra, allí está tu mano derecha; si me acuesto en las profundidades, allí está tu Espíritu.
  rationale: Se reemplaza una frase poco idiomática («me aparto a las partes más lejanas de la tierra») por «voy hasta los confines de la tierra», que suena natural en español y preserva mejor la idea de desplazarse al extremo remoto de la tierra. No se requieren notas adicionales.
