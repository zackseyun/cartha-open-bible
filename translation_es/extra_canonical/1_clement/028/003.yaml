    unchanged: false
    changes_summary: Replaced “make my bed” with “lie down” to better reflect the likely Greek (koīmēthō, “sleep/lie down”) and avoid adding an object not present in the source, while preserving the rest of the wording.
translation:
  language: es
  text: ¿A dónde iré, y dónde me esconderé de tu rostro? Si subo al cielo, allí estás tú; si voy hasta los confines de la tierra, allí está tu mano derecha; si me acuesto en las profundidades, allí está tu Espíritu.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ποῦ πορεύσομαι καὶ ποῦ κρυβήσομαι
  english_pob_choice: Where shall I go, and where shall I hide
  chosen_spanish: ¿A dónde iré, y dónde me esconderé
  alternatives_spanish:
  - ¿A dónde iré, y dónde me ocultaré
  - ¿A dónde me dirigiré, y dónde me esconderé
  lexicon: πορεύομαι; κρύπτω/κρύβω
  rationale: Conserva la doble pregunta del griego con un español natural. "Esconderé" refleja bien la idea de ocultarse sin volver la frase rígida o demasiado literaria.
- source_word: ἀπὸ τοῦ προσώπου σου
  english_pob_choice: from your face
  chosen_spanish: de tu rostro
  alternatives_spanish:
  - de tu presencia
  - de tu faz
  lexicon: πρόσωπον
  rationale: '"Rostro" conserva la imagen concreta del original y sigue de cerca la opción inglesa, mientras que en español sigue siendo comprensible. "Presencia" sería interpretativa y atenuaría la metáfora.'
- source_word: ἐὰν ἀναβῶ εἰς τὸν οὐρανόν
  english_pob_choice: If I go up into heaven
  chosen_spanish: Si subo al cielo
  alternatives_spanish:
  - Si voy al cielo
  - Si asciendo al cielo
  lexicon: ἀναβαίνω; οὐρανός
  rationale: '"Subo al cielo" es directo, idiomático y suficientemente fiel al movimiento ascendente del griego. "Cielo" es la forma más natural en español para οὐρανός en este contexto.'
- source_word: ἐὰν καταβῶ εἰς τὰ ἔσχατα τῆς γῆς
  english_pob_choice: if I depart to the farthest parts of the earth
  chosen_spanish: si me aparto a las partes más lejanas de la tierra
  alternatives_spanish:
  - si desciendo a las partes más lejanas de la tierra
  - si voy hasta los confines de la tierra
  lexicon: καταβαίνω; ἔσχατος; γῆ
  rationale: La imagen apunta a ir al extremo remoto de la tierra. "Me aparto" evita introducir explícitamente un descenso que no está formulado de modo tan claro como en la línea anterior, y conserva la lejanía espacial. "Partes más lejanas" sigue la amplitud del griego sin convertirlo en una fórmula más interpretativa de "confines".
- source_word: ἐκεῖ ἡ δεξιά σου
  english_pob_choice: there is your right hand
  chosen_spanish: allí está tu mano derecha
  alternatives_spanish:
  - allí está tu diestra
  - allí está tu mano diestra
  lexicon: δεξιός
  rationale: '"Mano derecha" es claro y fiel en español moderno. "Diestra" sería más tradicional, pero puede sonar más marcado litúrgicamente que el texto griego exige.'
- source_word: ἐὰν κοιμηθῶ ἐν τοῖς κατωτάτοις
  english_pob_choice: if I lie down in the depths
  chosen_spanish: si me acuesto en las profundidades
  alternatives_spanish:
  - si me recuesto en las profundidades
  - si me tiendo en lo más profundo
  lexicon: κοιμάω
  rationale: '"Me acuesto" expresa bien la acción de echarse/recostarse sin añadir el objeto implícito de una cama, conforme a la revisión inglesa. "Profundidades" comunica el lugar extremo y mantiene el tono poético.'
- source_word: ἐκεῖ τὸ πνεῦμά σου
  english_pob_choice: there is your Spirit
  chosen_spanish: allí está tu Espíritu
  alternatives_spanish:
  - allí está tu espíritu
  - allí está tu aliento
  lexicon: πνεῦμα
  rationale: Se mantiene "Espíritu" con mayúscula por la referencia personal y teológica al Espíritu de Dios, coherente con el contexto y con el uso bíblico habitual en español.
theological_decisions:
- issue: Omnipresencia divina expresada por tres ámbitos extremos
  english_pob_reading: If I go up into heaven, you are there; ... if I lie down in the depths, there is your Spirit.
  chosen_spanish_reading: Si subo al cielo, allí estás tú; ... si me acuesto en las profundidades, allí está tu Espíritu.
  alternative_spanish_readings:
  - '... allí estás tú; ... allí está tu mano; ... allí está tu espíritu'
  rationale: 'La formulación preserva la lógica teológica del texto: ninguna distancia espacial separa al hablante de Dios. No se suaviza la fuerza de la presencia divina ni se reemplaza el Espíritu por una expresión más genérica.'
  doctrine_reference: Omnipresencia de Dios; presencia activa de Dios por su Espíritu
- issue: Relación entre la "mano derecha" de Dios y su presencia protectora
  english_pob_reading: there is your right hand
  chosen_spanish_reading: allí está tu mano derecha
  alternative_spanish_readings:
  - allí está tu diestra
  - allí está tu poder
  rationale: Se conserva la imagen antropomórfica del texto en lugar de convertirla en una explicación abstracta. En español, "mano derecha" sigue siendo comprensible y mantiene la tensión poética entre ubicación extrema y presencia activa.
  doctrine_reference: Antropomorfismo bíblico; poder y cercanía de Dios
- issue: Uso de "Espíritu" con referencia personal a Dios
  english_pob_reading: there is your Spirit
  chosen_spanish_reading: allí está tu Espíritu
  alternative_spanish_readings:
  - allí está tu espíritu
  - allí está tu aliento
  rationale: La mayúscula señala que no se trata de un simple viento o aliento, sino del Espíritu de Dios. Esto preserva la lectura teológica del pasaje sin añadir contenido ajeno al griego.
  doctrine_reference: Pneumatología bíblica; Espíritu de Dios
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se evitó una expresión equivalente a "hacer la cama" y se optó por un verbo de acostarse/recostarse que no añade un objeto inexistente en el griego probable (κοιμηθῶ).'
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma del proyecto solo cuando el hebreo subyacente o la tradición textual lo exijan; en este fragmento, la fuente griega usa formas pronominales dirigidas a Dios y no requiere introducir el nombre divino.
  - Se prefirió "cielo" y "Espíritu" con mayúscula por claridad y coherencia bíblica en español.
  - No se usó "SEÑOR" como sustituto, ya que el texto presenta la relación directa con Dios mediante pronombres y no mediante una cita que obligue a masking convention.
