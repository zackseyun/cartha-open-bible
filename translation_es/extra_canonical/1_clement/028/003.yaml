review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura triple y el sentido global de omnipresencia del griego/inglés. Conserva correctamente «de tu rostro», «tu mano derecha» y «tu Espíritu». La principal desalineación está en «si me aparto a las partes más lejanas de la tierra», porque ἀπο-/καταβαίνω en este tipo de formulación expresa ir/desplazarse hasta un extremo remoto, no «apartarse» en español, que sugiere separarse o alejarse de algo más que viajar a un lugar. «Los confines de la tierra» comunica mejor τὰ ἔσχατα τῆς γῆς en español natural y fiel.
  spanish_quality_summary: 'El texto es generalmente claro y digno. Sin embargo, «me aparto a las partes más lejanas de la tierra» suena poco idiomático y algo forzado. El resto fluye bien: «¿A dónde iré...?», «Si subo al cielo...», «si me acuesto en las profundidades...». La revisión propuesta mejora naturalidad sin perder precisión.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Espíritu» con mayúscula es defendible por contexto teológico. «Mano derecha» es aceptable aunque «diestra» sería posible; no requiere cambio. No aparece el nombre divino ni otros términos sensibles del glosario.
  issues:
  - severity: medium
    issue: «me aparto a las partes más lejanas de la tierra» es una formulación poco natural y semánticamente imprecisa
    rationale: «Apartarse» en español suele significar retirarse o separarse, no desplazarse hacia una región remota. Además, «partes más lejanas» es literalista y pesado. «Voy hasta los confines de la tierra» o equivalente refleja mejor el sentido del original y del English POB («depart to the farthest parts of the earth»).
  revised_spanish_text: ¿A dónde iré, y dónde me esconderé de tu rostro? Si subo al cielo, allí estás tú; si voy hasta los confines de la tierra, allí está tu mano derecha; si me acuesto en las profundidades, allí está tu Espíritu.
  revision_rationale: Se reemplaza una frase poco idiomática («me aparto a las partes más lejanas de la tierra») por «voy hasta los confines de la tierra», que suena natural en español y preserva mejor la idea de desplazarse al extremo remoto de la tierra. No se requieren notas adicionales.
