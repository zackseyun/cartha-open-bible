source:
  edition: Funk 1901 (normalized OCR)
  text: διὰ ζῆλον καὶ φθόνον οἱ μέγιστοι καὶ δικαιότατοι στῦλοι ἐδιώχθησαν καὶ ἕως θανάτου ἤθλησαν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/005/002.yaml
  text: Because of jealousy and envy, the greatest and most righteous pillars were persecuted and struggled even unto death.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:34Z'
    unchanged: false
    changes_summary: Replaced 'contended' with 'struggled' for a more natural rendering of ἤθλησαν in formal English, while preserving the athletic/metaphorical sense; adjusted 'to death' to 'unto death' for slightly more formal register.
translation:
  language: es
  text: A causa de los celos y la envidia, los pilares más grandes y más justos fueron perseguidos y lucharon hasta la muerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διὰ ζῆλον καὶ φθόνον
  english_pob_choice: Because of jealousy and envy
  chosen_spanish: A causa de la celosía y de la envidia
  alternatives_spanish:
  - Por celos y envidia
  - A causa de los celos y la envidia
  lexicon: ζῆλος; φθόνος
  rationale: Conservo dos términos distintos en español para reflejar la duplicación del griego y la decisión inglesa de distinguir 'jealousy' y 'envy'. 'Celosía' evita repetir 'celos' y mantiene una diferencia léxica, aunque 'celos' sería la alternativa más natural.
- source_word: οἱ μέγιστοι καὶ δικαιότατοι στῦλοι
  english_pob_choice: the greatest and most righteous pillars
  chosen_spanish: los más grandes y más justos pilares
  alternatives_spanish:
  - los pilares grandísimos y justísimos
  - los mayores y más rectos pilares
  lexicon: μέγιστος; δικαιότατος; στῦλος
  rationale: Mantengo la imagen metafórica de 'pilares' y traduzco los superlativos con una estructura natural en español. 'Justos' conserva la idea moral/legal de δικαιότατος sin cargarla innecesariamente con una lectura doctrinal específica.
- source_word: ἐδιώχθησαν
  english_pob_choice: were persecuted
  chosen_spanish: fueron perseguidos
  alternatives_spanish:
  - fueron acosados
  - sufrieron persecución
  lexicon: διώκω
  rationale: '''Fueron perseguidos'' reproduce directamente la pasiva y es el equivalente más transparente en español para la violencia social/religiosa implicada por el griego y por la versión inglesa.'
- source_word: ἕως θανάτου ἤθλησαν
  english_pob_choice: struggled even unto death
  chosen_spanish: lucharon aun hasta la muerte
  alternatives_spanish:
  - se esforzaron incluso hasta la muerte
  - combatieron hasta la muerte
  lexicon: ἀθλέω
  rationale: '''Lucharon'' conserva bien el campo semántico agonístico/atlético que la revisión inglesa quiso resguardar con ''struggled''. ''Aun hasta la muerte'' sigue el matiz enfático de ἕως θανάτου sin volverlo innecesariamente oscuro.'
theological_decisions:
- issue: Descripción de los 'pilares' como figuras de liderazgo/estabilidad
  english_pob_reading: the greatest and most righteous pillars
  chosen_spanish_reading: los más grandes y más justos pilares
  alternative_spanish_readings:
  - los principales y más justos pilares
  - los más grandes y más rectos pilares
  rationale: No suavizo 'pilares' hacia una glosa interpretativa como 'líderes', porque el texto griego usa una metáfora imagística que la traducción inglesa también conserva. La expresión deja abierta la referencia a figuras eclesiales sin explicitarla indebidamente.
  doctrine_reference: metáfora eclesial de estabilidad y honor; cf. uso figurado de στῦλος en tradición cristiana temprana
- issue: Relación entre 'perseguidos' y 'lucharon hasta la muerte'
  english_pob_reading: were persecuted and struggled even unto death
  chosen_spanish_reading: fueron perseguidos y lucharon aun hasta la muerte
  alternative_spanish_readings:
  - fueron perseguidos y contendieron hasta la muerte
  - fueron perseguidos y sufrieron hasta la muerte
  rationale: Conservo ambos miembros para no diluir la coordinación del griego ni la tensión entre victimización externa y perseverancia activa. 'Lucharon' respeta la forma agonística sin borrar el sentido de resistencia bajo persecución.
  doctrine_reference: perseverancia bajo persecución; lenguaje de combate/agonía en la literatura cristiana primitiva
translation_notes:
  revision_awareness: La revisión inglesa sustituyó 'contended' por 'struggled' para hacer más natural ἤθλησαν y cambió 'to death' por 'unto death' para un registro más formal. La versión española sigue esa decisión con 'lucharon aun hasta la muerte', conservando el tono elevado sin depender de un calco rígido.
  spanish_consistency_notes:
  - Se preserva la metáfora de 'pilares' en lugar de interpretarla como 'líderes' o 'columnas' para mantener la imagen del original.
  - Se distingue léxicamente 'celosía' de 'envidia' para reflejar el paralelismo del griego, aunque 'celos' sería más común en español.
  - No se introducen referencias doctrinales adicionales; el verso se mantiene descriptivo y metafórico.
