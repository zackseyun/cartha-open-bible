  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: causa doble (ζῆλον καὶ φθόνον), sujeto metafórico (''pilares''), persecución pasiva (ἐδιώχθησαν) y resistencia activa hasta la muerte (ἕως θανάτου ἤθλησαν). Sin embargo, ''celosía'' no corresponde al sentido de ζῆλος en español moderno y distorsiona la causa. También conviene ajustar el orden y la dicción final para mayor naturalidad sin perder el matiz agonístico.'
  spanish_quality_summary: La frase es generalmente clara, pero 'celosía' es inaceptable en este contexto porque en español significa principalmente entramado/rejilla y no 'jealousy'. 'Aun hasta la muerte' suena algo forzado; 'hasta la muerte' basta para expresar ἕως θανάτου con buena dignidad y legibilidad. 'Los más grandes y más justos pilares' es entendible, aunque una colocación más natural es 'los pilares más grandes y más justos'.
  glossary_alignment: 'No hay términos del glosario principal especialmente controvertidos en este versículo. ''Pilares'' preserva correctamente στῦλοι. ''Justos'' para δικαιότατοι y ''perseguidos'' para ἐδιώχθησαν están bien. Para ζῆλος/φθόνος, el proyecto pide claridad y fidelidad contextual: en español debe ser ''celos y envidia'', no ''celosía''.'
