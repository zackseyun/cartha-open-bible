  - severity: low
    issue: Orden poco natural de los modificadores en 'los más grandes y más justos pilares'
    rationale: Aunque comprensible, en español suena más idiomático 'los pilares más grandes y más justos', conservando intacto el sentido.
  - severity: low
    issue: Expresión algo forzada 'aun hasta la muerte'
    rationale: '''Hasta la muerte'' comunica bien ἕως θανάτου en español natural. El ''even'' inglés refleja énfasis, pero no obliga a una formulación menos idiomática aquí.'
  revised_spanish_text: A causa de los celos y la envidia, los pilares más grandes y más justos fueron perseguidos y lucharon hasta la muerte.
  revision_rationale: Se corrige un error léxico grave ('celosía' → 'celos') y se pule la sintaxis para un español más natural y digno, sin alterar el sentido del griego ni la línea del English POB. Se mantiene 'pilares' como metáfora y 'lucharon' para conservar el matiz agonístico de ἤθλησαν.
