id: 1CLEM.5.7
reference: 1 Clement 5:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: δικαιοσύνην διδάξας ὅλον τὸν κόσμον, καὶ ἐπὶ τὸ τέρμα τῆς δύσεως ἐλθὼν καὶ μαρτυρήσας ἐπὶ τῶν ἡγουμένων, οὕτως ἀπηλλάγη τοῦ κόσμου καὶ εἰς τὸν ἅγιον τόπον ἐπορεύθη, ὑπομονῆς γενόμενος μέγιστος ὑπογραμμός.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/005/007.yaml
  text: having taught righteousness to the whole world[a], and having come to the farthest limit of the west, and having borne witness before the rulers, thus he departed from the world and went to the holy place, having become the greatest example of endurance.
  footnotes:
  - marker: a
    text: Or 'west; and having borne witness before the rulers, so he was released from the world'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:37Z'
    unchanged: false
    changes_summary: Added a comma after 'world' for clearer structure, shifted 'thus' to more naturally reflect οὕτως, and changed 'pattern' to 'example' for a more natural formal rendering of ὑπογραμμός.
translation:
  language: es
  text: habiendo enseñado justicia[a] a todo el mundo, y habiendo llegado hasta el extremo de occidente, y habiendo dado testimonio ante los gobernantes, así partió de este mundo y fue al lugar santo, y llegó a ser el más grande ejemplo de perseverancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «rectitud».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia de Dios
  lexicon: δικαιοσύνη
  rationale: En este contexto, el inglés POB eligió 'righteousness' con alcance moral/general, no un tecnicismo forense. En español, 'justicia' conserva el peso ético y comunitario del término sin imponer una lectura exclusivamente judicial. 'Rectitud' es posible, pero menos directa aquí.
- source_word: ὅλον τὸν κόσμον
  english_pob_choice: the whole world
  chosen_spanish: todo el mundo
  alternatives_spanish:
  - el mundo entero
  - toda la tierra
  lexicon: κόσμος
  rationale: '''Todo el mundo'' comunica de forma natural la totalidad universal del alcance. Mantiene bien la amplitud retórica del griego y del inglés POB, sin estrecharlo a una región concreta.'
- source_word: ἐπὶ τὸ τέρμα τῆς δύσεως
  english_pob_choice: to the farthest limit of the west
  chosen_spanish: hasta el extremo de occidente
  alternatives_spanish:
  - hasta el último límite del oeste
  - hasta el confín del occidente
  lexicon: δύσις / τέρμα
  rationale: '''Occidente'' conserva el valor direccional y geográfico elevado del giro, y ''extremo'' refleja τέρμα. ''Oeste'' sería más literal, pero ''occidente'' suena más digno en español y mantiene el matiz amplio del inglés POB.'
- source_word: μαρτυρήσας ἐπὶ τῶν ἡγουμένων
  english_pob_choice: having borne witness before the rulers
  chosen_spanish: habiendo dado testimonio ante los gobernantes
  alternatives_spanish:
  - habiendo testificado ante los gobernantes
  - habiendo dado testimonio frente a los gobernantes
  lexicon: μαρτυρέω; ἡγούμενοι
  rationale: '''Dar testimonio'' preserva el valor testimonial sin reducirlo a un tecnicismo legal. ''Gobernantes'' sigue el sentido de ἡγουμένων como autoridades dirigentes, y mantiene la sobriedad del texto.'
- source_word: ἀπηλλάγη τοῦ κόσμου
  english_pob_choice: he departed from the world
  chosen_spanish: se apartó del mundo
  alternatives_spanish:
  - partió de este mundo
  - fue separado del mundo
  lexicon: ἀπαλλάσσω
  rationale: El pasivo aoristo con genitivo en griego funciona como un giro idiomático de partir/morir. 'Se apartó del mundo' evita añadir una causa o matiz pasivo teológico que el griego no exige, y conserva el enlace con el lenguaje del inglés POB revisado a 'departed'.
- source_word: εἰς τὸν ἅγιον τόπον
  english_pob_choice: went to the holy place
  chosen_spanish: fue al lugar santo
  alternatives_spanish:
  - fue al lugar sagrado
  - entró en el lugar santo
  lexicon: ἅγιος; τόπος
  rationale: '''Lugar santo'' reproduce con claridad la combinación nominal y conserva la resonancia bíblica de ἅγιος. ''Sagrado'' sería más interpretativo; ''santo'' es más cercano al patrón terminológico heredado en español bíblico.'
- source_word: ὑπομονῆς γενόμενος μέγιστος ὑπογραμμός
  english_pob_choice: having become the greatest example of endurance
  chosen_spanish: habiendo llegado a ser el mayor ejemplo de perseverancia
  alternatives_spanish:
  - habiendo llegado a ser el máximo modelo de paciencia
  - habiendo llegado a ser el mayor patrón de perseverancia
  lexicon: ὑπομονή; ὑπογραμμός
  rationale: El inglés POB revisado cambió 'pattern' a 'example'; en español, 'ejemplo' es la correspondencia natural y fiel. 'Perseverancia' expresa bien ὑπομονή como resistencia paciente y constante; 'paciencia' podría sonar más pasivo, mientras que 'perseverancia' capta mejor la fuerza del término.
theological_decisions:
- issue: Sentido de ἀπηλλάγη τοῦ κόσμου como partida/muerte sin introducir una liberación doctrinal ajena
  english_pob_reading: he departed from the world
  chosen_spanish_reading: se apartó del mundo
  alternative_spanish_readings:
  - partió de este mundo
  - fue liberado del mundo
  rationale: La revisión inglesa descartó 'was released from the world' por introducir una pasividad innecesaria. En español, 'se apartó del mundo' mantiene la idea idiomática de salida/muerte sin sugerir una liberación teológica adicional.
  doctrine_reference: BDAG s.v. ἀπαλλάσσω 2; revisión griega aplicada 2026-04-22
- issue: Alcance de 'justicia' frente a una lectura exclusivamente forense
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justificación
  rationale: El contexto de enseñanza universal apunta a una cualidad/orden moral, no a la 'justificación' como acto salvífico técnico. 'Justicia' conserva la amplitud del término y evita estrecharlo indebidamente.
  doctrine_reference: Uso contextual de δικαιοσύνη en literatura cristiana temprana
- issue: Referencia a 'lugar santo' sin fijar más precisamente una localización escatológica
  english_pob_reading: the holy place
  chosen_spanish_reading: el lugar santo
  alternative_spanish_readings:
  - el lugar sagrado
  - el santuario
  rationale: El texto no identifica el lugar con mayor precisión; por eso se mantiene la expresión abierta. 'Santuario' sería más específico de lo que el griego ofrece aquí.
  doctrine_reference: Respeto por la ambigüedad del original
translation_notes:
  revision_awareness: 'La redacción sigue la revisión griega más reciente: mantiene la secuencia de participios, refleja οὕτως con «así», y usa «lugar santo» y «ejemplo» en línea con la revisión inglesa posterior. También evita reproducir la antigua nota inglesa sobre ''released from the world'', porque la lectura revisada ya la descartó.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - Se preserva 'justicia' como término principal, con nota alternativa por la posible lectura de 'rectitud'.
  - '''Gobernantes'' se emplea de manera inclusiva para ἡγουμένων sin cargarlo con una oficina específica no indicada por el texto.'
  - 'La puntuación sigue la acumulación participial del griego y la revisión inglesa: coma tras ''mundo'' y antes de ''así''.'
