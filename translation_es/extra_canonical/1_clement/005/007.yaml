  to: habiendo enseñado justicia[a] a todo el mundo, y habiendo llegado hasta el extremo de occidente, y habiendo dado testimonio ante los gobernantes, así partió de este mundo y fue al lugar santo, y llegó a ser el más grande ejemplo de perseverancia.
  rationale: Se ajusta ἀπηλλάγη τοῦ κόσμου a una expresión española más idiomática y clara ('partió de este mundo'), en línea con la revisión inglesa 'departed from the world', y se aligera el cierre para una lectura más natural sin alterar la estructura ni el sentido del original.
