review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia griega de participios y la línea general del sentido: enseñar δικαιοσύνη a todo el mundo, llegar al extremo de occidente, dar testimonio ante los gobernantes, partir de este mundo, ir al lugar santo y quedar como gran ejemplo de ὑπομονή. Sin embargo, ''se apartó del mundo'' no refleja tan bien el valor idiomático de ἀπηλλάγη τοῦ κόσμου como ''partió de este mundo'' o ''partió del mundo''; la primera opción es más natural y clara en español eclesial. También ''habiendo llegado a ser'' al final suena más pesado que una formulación española más natural con ''llegó a ser''.'
  spanish_quality_summary: El texto es legible y digno, pero algo cargado por la repetición de 'y habiendo'. Además, 'se apartó del mundo' suena menos idiomático que 'partió de este mundo', y 'el mayor ejemplo' puede mejorarse a 'el más grande ejemplo' para reflejar μέγιστος sin sonar comparativo extraño. Se recomienda una reparación menor para mayor naturalidad y fidelidad estilística.
  glossary_alignment: '''Justicia'' para δικαιοσύνην está bien y la nota con ''rectitud'' es apropiada. ''Occidente'', ''gobernantes'', ''lugar santo'' y ''perseverancia'' concuerdan con el expediente inglés y con la terminología del proyecto. No hay conflicto con los términos por defecto del proyecto.'
  issues:
  - severity: medium
    issue: '''se apartó del mundo'' para ἀπηλλάγη τοῦ κόσμου'
    rationale: Aunque evita el matiz de 'fue liberado', en español no expresa con tanta claridad el idiomatismo de partir/morir que el inglés auditado fijó como 'departed from the world'. 'Partió de este mundo' suena más natural y fiel.
  - severity: low
    issue: Pesadez sintáctica en 'habiendo llegado a ser'
    rationale: El griego tiene participio, pero el español formal admite mejor cerrar con 'y llegó a ser...' sin perder sentido. Esto mejora la fluidez sin paraprasear.
  - severity: low
    issue: '''el mayor ejemplo'' suena algo rígido'
    rationale: Para μέγιστος ὑπογραμμός, 'el más grande ejemplo' o 'el máximo ejemplo' suenan más naturales en español contemporáneo eclesial que 'el mayor ejemplo'.
  revised_spanish_text: habiendo enseñado justicia[a] a todo el mundo, y habiendo llegado hasta el extremo de occidente, y habiendo dado testimonio ante los gobernantes, así partió de este mundo y fue al lugar santo, y llegó a ser el más grande ejemplo de perseverancia.
  revised_footnotes:
  - marker: a
    text: 'O: «rectitud».'
    reason: lexical_alternative
  revision_rationale: Se ajusta ἀπηλλάγη τοῦ κόσμου a una expresión española más idiomática y clara ('partió de este mundo'), en línea con la revisión inglesa 'departed from the world', y se aligera el cierre para una lectura más natural sin alterar la estructura ni el sentido del original.
