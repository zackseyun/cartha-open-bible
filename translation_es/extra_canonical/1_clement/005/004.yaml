translation:
  language: es
  text: Pedro, que, a causa de un celo injusto, soportó no uno ni dos, sino muchos padecimientos, y así, habiendo dado testimonio, fue al lugar de gloria que le correspondía.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πέτρον
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - Petro
  lexicon: Πέτρος
  rationale: El nombre propio se vierte de forma natural y reconocible en español como «Pedro». Mantiene el valor referencial del texto sin introducir una forma extraña al lector hispano.
- source_word: διὰ ζῆλον ἄδικον
  english_pob_choice: because of unrighteous jealousy
  chosen_spanish: a causa de un celo injusto
  alternatives_spanish:
  - por un celo injusto
  - por una envidia injusta
  lexicon: διὰ + ζῆλος + ἄδικος
  rationale: «Celo» conserva el matiz de ζῆλος, que no se limita a envidia sino que puede abarcar ardor o celo competitivo; «injusto» traduce ἄδικον sin suavizar la valoración moral. Se evita reducir el término a «envidia» porque el griego y el inglés auditado no obligan a esa restricción.
- source_word: οὐχ ἕνα οὐδὲ δύο, ἀλλὰ πλείονας ὑπήνεγκεν πόνους
  english_pob_choice: not one or two but many sufferings
  chosen_spanish: no uno ni dos, sino muchos sufrimientos
  alternatives_spanish:
  - no uno o dos, sino muchos padecimientos
  - no uno ni dos, sino numerosos sufrimientos
  lexicon: οὐχ ἕνα οὐδὲ δύο ... πλείονας ... πόνους
  rationale: Se conserva la antítesis enfática del original («no uno ni dos, sino muchos») y «sufrimientos» traduce πόνους de manera amplia y transparente. «Padecimientos» sería posible, pero «sufrimientos» resulta más directo y fiel al registro del pasaje.
- source_word: καὶ οὕτω μαρτυρήσας
  english_pob_choice: and so, having borne witness
  chosen_spanish: y así, habiendo dado testimonio
  alternatives_spanish:
  - y así, tras testificar
  - y de ese modo, habiendo testificado
  lexicon: μαρτυρέω
  rationale: «Dar testimonio» conserva el sentido de μαρτυρέω sin forzar una lectura técnica exclusiva de «martirio», aunque en contexto cristiano la muerte de Pedro queda sugerida por el conjunto.
- source_word: ἐπορεύθη εἰς τὸν ὀφειλόμενον τόπον τῆς δόξης
  english_pob_choice: went to the glorious place that was due him
  chosen_spanish: fue al lugar de gloria que le correspondía
  alternatives_spanish:
  - fue al lugar glorioso que le correspondía
  - marchó al lugar de gloria que le era debido
  lexicon: ὀφειλόμενον τόπον τῆς δόξης
  rationale: El griego dice literalmente «el lugar debido de gloria»; la versión española conserva la idea de un lugar de gloria que le corresponde, sin sobrecargar la frase. Se evita «glorioso» como adjetivo de lugar para no perder la noción de destino/deuda implícita en ὀφειλόμενον.
theological_decisions:
- issue: Sentido de μαρτυρήσας en un contexto de sufrimiento apostólico
  english_pob_reading: having borne witness
  chosen_spanish_reading: habiendo dado testimonio
  alternative_spanish_readings:
  - habiendo sufrido como mártir
  - habiendo testificado
  rationale: La lectura inglesa mantiene la ambigüedad entre testimonio y martirio; el español conserva esa reserva con «dar testimonio». No se explicita «mártir» en el texto principal porque el griego no usa aquí el sustantivo ni obliga a convertir el participio en una afirmación interpretativa más fuerte.
  doctrine_reference: testimonio apostólico; martirio cristiano
- issue: Relación entre los sufrimientos y el destino final de gloria
  english_pob_reading: went to the glorious place that was due him
  chosen_spanish_reading: fue al lugar de gloria que le correspondía
  alternative_spanish_readings:
  - fue al lugar glorioso que le correspondía
  - fue al lugar de gloria que le era debido
  rationale: La formulación conserva la idea de recompensa o destino apropiado sin convertirla en una declaración doctrinal excesivamente técnica. «Le correspondía» mantiene el valor de ὀφειλόμενον (debido, correspondiente) y la asociación con gloria en el texto.
  doctrine_reference: recompensa escatológica; honor debido a los fieles
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó el cierre desde «the place of glory that was due him» a «the glorious place that was due him» para mejorar la fluidez. La versión española opta por una solución intermedia que conserva explícitamente la noción de «gloria» y también la de correspondencia/deuda del griego (ὀφειλόμενον), evitando perder cualquiera de los dos matices.
  spanish_consistency_notes:
  - Se mantiene «Pedro» como nombre propio estándar en español.
  - Se conserva la estructura enfática «no uno ni dos, sino muchos» para reflejar el paralelismo del griego.
  - «Celo injusto» preserva el matiz moral de ζῆλος ἄδικος sin reducirlo a una sola emoción.
  - No se usa «SEÑOR» ni terminología litúrgica ajena al pasaje; el texto no contiene vocabulario divino directo.
  - «Dar testimonio» se eligió para mantener abierta la relación entre testimonio y martirio sin sobreinterpretar.
