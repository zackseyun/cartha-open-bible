base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/005/004.yaml
  text: Peter, who because of unrighteous jealousy endured not one or two but many sufferings, and so, having borne witness, went to the glorious place that was due him.
  revision_pass:
