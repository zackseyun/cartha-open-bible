review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: Pedro soportó múltiples sufrimientos por causa de un celo/jealousy injusto, luego dio testimonio, y fue al lugar de gloria que le correspondía. Sin embargo, «quien» suena menos natural tras el nombre propio en este contexto, y «muchos sufrimientos» no reproduce tan bien el comparativo πλείονας («más», «muchos/más numerosos») dentro de la antítesis. También conviene ajustar el orden para mayor fluidez española sin pérdida de sentido.'
  spanish_quality_summary: El español es claro y digno, pero puede sonar más natural y preciso con «que» en vez de «quien» y con «muchos padecimientos» o «numerosos sufrimientos». La frase final funciona, aunque «marchó» sería posible; «fue» es aceptable y más llano. No se requieren notas.
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. Los nombres propios, el lenguaje de testimonio y la referencia a gloria están bien manejados. La decisión de no convertir μαρτυρήσας en «martirizado» o «como mártir» es correcta. «Celo injusto» es defendible para ζῆλον ἄδικον, aunque en contexto «envidia injusta» también sería posible; no exige cambio.
  issues:
  - severity: medium
    issue: Uso de «quien» tras el nombre propio
    rationale: «Pedro, que...» suena más natural y estándar en español bíblico y general que «Pedro, quien...» en una oración relativa explicativa de este tipo.
  - severity: medium
    issue: «muchos sufrimientos» puede mejorarse
    rationale: Aunque es comprensible, «muchos padecimientos» encaja mejor en registro literario-religioso y representa con más naturalidad πόνους en esta construcción enfática.
  revised_spanish_text: Pedro, que, a causa de un celo injusto, soportó no uno ni dos, sino muchos padecimientos, y así, habiendo dado testimonio, fue al lugar de gloria que le correspondía.
  revision_rationale: 'Se hace una reparación menor de estilo y naturalidad: «que» en lugar de «quien» tras el nombre propio, y «padecimientos» en lugar de «sufrimientos» para un registro más idiomático y ligeramente más adecuado al contexto. El resto del sentido y de las decisiones léxicas se conserva.'
