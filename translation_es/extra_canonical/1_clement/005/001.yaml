  text: Ἀλλʼ ἵνα τῶν ἀρχαίων ὑποδειγμάτων παυσώμεθα, ἔλθωμεν ἐπὶ τοὺς ἔγγιστα γενομένους ἀθλητάς· λάβωμεν τῆς γενεᾶς ἡμῶν τὰ γενναῖα ὑποδείγματα. 2. διὰ ζῆλον καὶ φθόνον οἱ μέγιστοι καὶ δικαιότατοι στῦλοι ἐδιώχθησαν καὶ ἕως θανάτου ἤθλησαν. 3. λάβωμεν πρὸ ὀφθαλμῶν ἡμῶν τοὺς ἀγαθοὺς ἀποστόλους· 4. Πέτρον, ὃς διὰ ζῆλον ἄδικον οὐχ ἕνα οὐδὲ δύο, ἀλλὰ πλείονας ὑπήνεγκεν πόνους, καὶ οὕτω μαρτυρήσας ἐπορεύθη εἰς τὸν ὀφειλόμενον τόπον τῆς δόξης. 5. διὰ ζῆλον καὶ ἔριν Παῦλος ὑπομονῆς βραβεῖον ἔδειξεν, 6. ἑπτάκις δεσμὰ φορέσας, φυγαδευθείς, λιθασθείς, κῆρυξ γενόμενος ἔν τε τῇ ἀνατολῇ καὶ ἐν τῇ δύσει, τὸ γενναῖον τῆς πίστεως αὐτοῦ κλέος ἔλαβεν, 7. δικαιοσύνην διδάξας ὅλον τὸν κόσμον, καὶ ἐπὶ τὸ τέρμα τῆς δύσεως ἐλθὼν καὶ μαρτυρήσας ἐπὶ τῶν ἡγουμένων, οὕτως ἀπηλλάγη τοῦ κόσμου καὶ εἰς τὸν ἅγιον τόπον ἐπορεύθη, ὑπομονῆς γενόμενος μέγιστος ὑπογραμμός.
