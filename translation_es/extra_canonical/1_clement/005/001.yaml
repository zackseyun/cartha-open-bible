translation:
  language: es
  text: 'Pero, para dejar los ejemplos de los antiguos, vayamos a los atletas que vivieron más cerca de nuestro tiempo. Tomemos los nobles ejemplos de nuestra propia generación. Por causa de los celos y la envidia, los pilares más grandes y más justos fueron perseguidos y combatieron hasta la muerte. Pongamos ante nuestros ojos a los buenos apóstoles: Pedro, que por celos injustos soportó no uno ni dos, sino muchos sufrimientos, y así, habiendo dado testimonio, fue al lugar de gloria que le era debido. Por causa de los celos y la discordia, Pablo mostró el premio de la perseverancia: habiendo llevado cadenas siete veces, habiendo sido desterrado, habiendo sido apedreado, habiendo llegado a ser un heraldo tanto en el oriente como en el occidente, recibió la noble fama de su fe, habiendo enseñado la rectitud a todo el mundo y habiendo llegado al extremo más lejano del occidente; y, habiendo dado testimonio ante los gobernantes, así fue liberado del mundo y partió al lugar santo, habiendo llegado
    a ser el mayor modelo de perseverancia.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀθλητάς
  english_pob_choice: athletes
  chosen_spanish: atletas
  alternatives_spanish:
  - campeones
  - contendientes
  lexicon: LSJ
  rationale: ‘Atletas’ conserva la metáfora agonística y suena natural en español, sin diluir la imagen de competencia que estructura el pasaje.
- source_word: ὑποδείγματα
  english_pob_choice: examples
  chosen_spanish: ejemplos
  alternatives_spanish:
  - modelos
  - patrones
  lexicon: BDAG
  rationale: ‘Ejemplos’ reproduce la función exhortativa del término y mantiene la cohesión con la repetición retórica del pasaje.
- source_word: ζῆλον
  english_pob_choice: jealousy
  chosen_spanish: celos
  alternatives_spanish:
  - celo
  lexicon: BDAG
  rationale: Aquí, unido a φθόνος y ἔρις, el sentido negativo es claro; ‘celos’ comunica mejor la rivalidad dañina que ‘celo’.
- source_word: φθόνον
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  lexicon: BDAG
  rationale: ‘Envidia’ diferencia este término de ζῆλος y preserva la pareja viciosa del griego.
- source_word: στῦλοι
  english_pob_choice: pillars
  chosen_spanish: pilares
  alternatives_spanish:
  - columnas
  - soportes
  lexicon: LSJ
  rationale: ‘Pilares’ mantiene la metáfora de fundamento y dignidad eclesial sin forzar un tecnicismo ajeno al español.
- source_word: ἤθλησαν
  english_pob_choice: contended
  chosen_spanish: lucharon
  alternatives_spanish:
  - compitieron
  - contendieron
  lexicon: LSJ
  rationale: ‘Lucharon’ transmite el esfuerzo y el combate figurado del verbo; en español evita una formulación pesada sin perder la imagen atlética.
- source_word: ἀγαθοὺς ἀποστόλους
  english_pob_choice: the good apostles
  chosen_spanish: los buenos apóstoles
  alternatives_spanish:
  - los nobles apóstoles
  - los dignos apóstoles
  lexicon: BDAG
  rationale: Es una traducción directa que conserva el tono de encomio sin añadir matices que el griego no explicita.
- source_word: ἄδικον
  english_pob_choice: unrighteous
  chosen_spanish: injusto
  alternatives_spanish:
  - malvado
  - inicuo
  lexicon: BDAG
  rationale: En el giro ‘celos injusto(s)’, ‘injusto’ conserva el color moral sin introducir un registro excesivamente teológico.
- source_word: πόνους
  english_pob_choice: sufferings
  chosen_spanish: sufrimientos
  alternatives_spanish:
  - penas
  - trabajos
  - aflicciones
  lexicon: BDAG
  rationale: ‘Sufrimientos’ encaja de manera natural con el contexto de persecución y conserva la amplitud del término.
- source_word: μαρτυρήσας
  english_pob_choice: having borne witness
  chosen_spanish: habiendo dado testimonio
  alternatives_spanish:
  - habiendo testificado
  - habiendo sufrido martirio
  lexicon: BDAG
  rationale: Se mantiene el sentido básico de testimonio sin convertir prematuramente el verbo en el tecnicismo posterior de martirio.
- source_word: ὀφειλόμενον τόπον τῆς δόξης
  english_pob_choice: the place of glory that was due him
  chosen_spanish: el lugar de gloria que le era debido
  alternatives_spanish:
  - su lugar de gloria designado
  - el lugar merecido de gloria
  lexicon: LSJ
  rationale: ‘Le era debido’ conserva la fuerza de ‘owed/due’ y evita imponer una lectura demasiado fuerte de mérito.
- source_word: ἔριν
  english_pob_choice: strife
  chosen_spanish: discordia
  alternatives_spanish:
  - contienda
  - rivalidad
  lexicon: BDAG
  rationale: ‘Discordia’ comunica el conflicto social y moral que el texto destaca junto a los celos.
- source_word: ὑπομονῆς βραβεῖον
  english_pob_choice: the prize of endurance
  chosen_spanish: el premio de la perseverancia
  alternatives_spanish:
  - la recompensa de la constancia
  lexicon: BDAG
  rationale: ‘Premio’ mantiene la imagen competitiva, mientras ‘perseverancia’ expresa de forma clara la constancia resistente del término.
- source_word: δεσμὰ φορέσας
  english_pob_choice: having worn chains
  chosen_spanish: habiendo llevado cadenas
  alternatives_spanish:
  - habiendo soportado cadenas
  - habiendo cargado cadenas
  lexicon: LSJ
  rationale: ‘Habiendo llevado cadenas’ conserva la vividez de la expresión sin suavizarla a una mera idea de encarcelamiento.
- source_word: φυγαδευθείς
  english_pob_choice: having been driven into exile
  chosen_spanish: habiendo sido expulsado al exilio
  alternatives_spanish:
  - habiendo sido desterrado
  - habiendo sido arrojado al destierro
  lexicon: LSJ
  rationale: La expresión refleja el pasivo de desplazamiento forzado y evita perder la idea de expulsión.
- source_word: κῆρυξ
  english_pob_choice: a herald
  chosen_spanish: un heraldo
  alternatives_spanish:
  - un pregonero
  - un proclamador
  lexicon: BDAG
  rationale: ‘Heraldo’ conserva el matiz formal de proclamación pública y evita restringir indebidamente el término a ‘predicador’.
- source_word: κλέος
  english_pob_choice: renown
  chosen_spanish: fama
  alternatives_spanish:
  - renombre
  - gloria
  lexicon: LSJ
  rationale: ‘Fama’ comunica bien la reputación honorable sin confundir este término con δόξα, que ya aparece antes en el pasaje.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  lexicon: BDAG
  rationale: ‘Fe’ sigue el uso bíblico habitual y preserva el alcance teológico del término; ‘fidelidad’ queda como matiz posible, pero no principal.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia de Dios
  lexicon: BDAG
  rationale: En español, ‘justicia’ comunica el contenido moral y social del término con naturalidad; en este contexto de enseñanza universal resulta más claro que ‘rectitud’.
- source_word: τὸ τέρμα τῆς δύσεως
  english_pob_choice: the farthest limit of the west
  chosen_spanish: el extremo más lejano del occidente
  alternatives_spanish:
  - el confín del occidente
  - el límite más remoto del oeste
  lexicon: LSJ
  rationale: La fórmula preserva el valor geográfico-retórico sin identificar una región concreta que el texto no nombra explícitamente.
- source_word: ἐπὶ τῶν ἡγουμένων
  english_pob_choice: before the rulers
  chosen_spanish: delante de los gobernantes
  alternatives_spanish:
  - ante los gobernantes
  - ante las autoridades
  lexicon: BDAG
  rationale: ‘Delante de’ es natural en español y conserva la noción de comparecencia pública ante autoridades sin precisar su cargo.
- source_word: ἀπηλλάγη τοῦ κόσμου
  english_pob_choice: he was released from the world
  chosen_spanish: fue librado del mundo
  alternatives_spanish:
  - fue liberado del mundo
  - partió del mundo
  lexicon: BDAG
  rationale: ‘Fue librado del mundo’ mantiene la pasiva y la idea de salida/separación, sin borrar la fuerza de la expresión original.
- source_word: τὸν ἅγιον τόπον
  english_pob_choice: the holy place
  chosen_spanish: el lugar santo
  alternatives_spanish:
  - el lugar sagrado
  lexicon: BDAG
  rationale: ‘Lugar santo’ sigue de cerca el griego y conserva la solemnidad sin especificar indebidamente el referente.
- source_word: ὑπογραμμός
  english_pob_choice: pattern
  chosen_spanish: modelo
  alternatives_spanish:
  - patrón
  - ejemplo
  lexicon: BDAG
  rationale: ‘Modelo’ transmite la idea de algo que debe ser imitado; en español suena más natural que ‘patrón’ en un cierre exhortativo.
theological_decisions:
- issue: Sentido de μαρτυρήσας en Pedro y Pablo
  english_pob_reading: having borne witness
  chosen_spanish_reading: habiendo dado testimonio
  alternative_spanish_readings:
  - habiendo testificado
  - habiendo sufrido martirio
  rationale: Se conserva el valor básico de testimonio y se deja visible la posible resonancia martirial sin imponerla en la línea principal.
  doctrine_reference: Preservar la tensión léxica histórica sin resolverla prematuramente.
- issue: Referencia de τὸ τέρμα τῆς δύσεως
  english_pob_reading: the farthest limit of the west
  chosen_spanish_reading: el extremo más lejano del occidente
  alternative_spanish_readings:
  - España
  - el oeste
  - las regiones occidentales
  rationale: La frase se mantiene deliberadamente general, porque el texto no identifica explícitamente un lugar concreto.
  doctrine_reference: Primacía del texto fuente sobre conjeturas históricas.
- issue: Matiz de δικαιοσύνην en la enseñanza de Pablo
  english_pob_reading: righteousness
  chosen_spanish_reading: la justicia
  alternative_spanish_readings:
  - la rectitud
  - la justicia/rectitud
  rationale: ‘Justicia’ preserva el peso moral y social del término en español; no se fuerza una lectura técnica distinta sin necesidad.
  doctrine_reference: Consistencia terminológica con flexibilidad contextual.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sólo estandarizó los nombres propios a Peter y Paul; el contenido sustantivo del audit trail se mantuvo estable. La versión española sigue ese mismo contenido y no introduce conjeturas textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo la metáfora atlética (‘atletas’, ‘premio’, ‘modelo’) para conservar la cohesión exhortativa del pasaje.
  - ‘Celos’ y ‘envidia’ se distinguieron para reflejar ζῆλος y φθόνος como vicios emparentados pero no idénticos.
  - Se prefirió ‘fe’ para πίστεως y ‘justicia’ para δικαιοσύνην conforme al registro bíblico en español.
  - No se identificó de manera explícita el ‘occidente’ con España en el texto principal para no sobreinterpretar la frase.
  - ‘Lugar santo’ y ‘lugar de gloria’ se conservaron como expresiones elevadas, sin precisar más el referente que el griego permite.
