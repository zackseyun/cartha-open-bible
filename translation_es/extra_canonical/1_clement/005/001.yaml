revisions:
- from: 'Pero, para dejar los ejemplos de los antiguos, vayamos a los atletas que vivieron más cerca de nuestro tiempo. Tomemos los nobles ejemplos de nuestra propia generación. Por causa de los celos y la envidia, los pilares más grandes y más justos fueron perseguidos y lucharon hasta la muerte. Pongamos ante nuestros ojos a los buenos apóstoles: Pedro, que por un celo injusto soportó no uno ni dos, sino muchos sufrimientos, y así, habiendo dado testimonio, fue al lugar de gloria que le era debido. Por causa de los celos y la discordia, Pablo mostró el premio de la perseverancia: habiendo llevado cadenas siete veces, habiendo sido expulsado al exilio, habiendo sido apedreado, habiendo llegado a ser un heraldo tanto en el oriente como en el occidente, recibió la noble fama de su fe, habiendo enseñado la justicia a todo el mundo y habiendo llegado al extremo más lejano del occidente; y, habiendo dado testimonio delante de los gobernantes, así fue librado del mundo y fue al lugar santo, habiendo
    llegado a ser el mayor modelo de perseverancia.'
  to: 'Pero, para dejar los ejemplos de los antiguos, vayamos a los atletas que vivieron más cerca de nuestro tiempo. Tomemos los nobles ejemplos de nuestra propia generación. Por causa de los celos y la envidia, los pilares más grandes y más justos fueron perseguidos y combatieron hasta la muerte. Pongamos ante nuestros ojos a los buenos apóstoles: Pedro, que por celos injustos soportó no uno ni dos, sino muchos sufrimientos, y así, habiendo dado testimonio, fue al lugar de gloria que le era debido. Por causa de los celos y la discordia, Pablo mostró el premio de la perseverancia: habiendo llevado cadenas siete veces, habiendo sido desterrado, habiendo sido apedreado, habiendo llegado a ser un heraldo tanto en el oriente como en el occidente, recibió la noble fama de su fe, habiendo enseñado la rectitud a todo el mundo y habiendo llegado al extremo más lejano del occidente; y, habiendo dado testimonio ante los gobernantes, así fue liberado del mundo y partió al lugar santo, habiendo llegado
    a ser el mayor modelo de perseverancia.'
  rationale: 'La revisión es menor pero necesaria para mejorar la fidelidad léxica y la naturalidad del español: se ajusta ζῆλον ἄδικον a ‘celos injustos’, se refuerza la imagen agonística con ‘combatieron’, se reemplaza ‘justicia’ por ‘rectitud’ conforme a la decisión auditada sobre δικαιοσύνη, se mejora φυγαδευθείς con ‘desterrado’, y se suaviza ‘fue librado del mundo’ a ‘fue liberado del mundo’. No hacen falta notas nuevas.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:18:34Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido general del griego y del POB inglés, preservando bien la estructura exhortativa, la metáfora agonística principal, y las decisiones clave sobre μαρτυρήσας, τὸ τέρμα τῆς δύσεως y τὸν ἅγιον τόπον. Sin embargo, hay varios puntos donde la alineación puede mejorarse: ἄδικον modifica ζῆλον y conviene evitar singular extraño en español; ἤθλησαν pide mantener algo más del matiz de contienda/combate; δικαιοσύνην queda mejor como ‘rectitud’ aquí para reflejar la decisión inglesa documentada de ‘righteousness’ y evitar un matiz predominantemente social de ‘justicia’; y ‘fue librado del mundo’ suena algo demasiado salvífico frente al más neutral pasivo de salida/liberación del mundo.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero varias secuencias participiales suenan pesadas por repetición de ‘habiendo’. También hay algunas elecciones algo menos naturales o menos precisas: ‘por un celo injusto’ choca con la preferencia documentada por sentido negativo de ζῆλος y además suena singular; ‘expulsado al exilio’ es comprensible pero más torpe que ‘desterrado’; ‘delante de los gobernantes’ puede simplificarse a ‘ante los gobernantes’; y ‘fue al lugar santo’ resulta menos idiomático que ‘partió al lugar santo’. Con pequeños ajustes, el español queda más natural sin perder literalidad.'
  glossary_alignment: 'No hay conflictos con la terminología teonímica o cristológica del proyecto en este versículo. Las principales cuestiones léxicas son internas al pasaje: mantener ‘atletas’, ‘pilares’, ‘heraldo’, ‘dar testimonio’, ‘lugar santo’ y ‘modelo’/‘patrón’ en línea con la auditoría. Recomiendo cambiar ‘celo injusto’ por ‘celos injustos’, ‘justicia’ por ‘rectitud’ en δικαιοσύνην, y ‘fue librado del mundo’ por ‘fue liberado del mundo’ o equivalente más neutral. También conviene reforzar ligeramente la imagen agonística en ἤθλησαν con ‘combatieron’ o ‘contendieron’.'
  issues:
  - severity: medium
    issue: ‘por un celo injusto’ no refleja bien διὰ ζῆλον ἄδικον
    rationale: El inglés auditado tomó ζῆλον como ‘jealousy’, no ‘zeal’. En español ‘un celo injusto’ suena singular y ambiguo, mientras ‘por celos injustos’ preserva mejor el sentido negativo y la construcción causal.
  - severity: medium
    issue: ‘lucharon hasta la muerte’ debilita ligeramente la cohesión de la metáfora atlética de ἤθλησαν
    rationale: Aunque es entendible, el contexto ya introdujo ἀθλητάς. ‘Combatieron’ o ‘contendieron’ mantiene mejor la imagen de certamen/esfuerzo sin volver el español demasiado rígido.
  - severity: medium
    issue: ‘la justicia’ para δικαιοσύνην se aparta de la decisión documentada de ‘righteousness’
    rationale: La auditoría inglesa justificó ‘righteousness’ por su amplitud moral-teológica. En este contexto, ‘rectitud’ reproduce mejor esa fuerza que ‘justicia’, que en español suele oírse más jurídico-social.
  - severity: low
    issue: ‘habiendo sido expulsado al exilio’ es poco idiomático
    rationale: El sentido pasivo de φυγαδευθείς se conserva mejor y con más naturalidad mediante ‘habiendo sido desterrado’.
  - severity: medium
    issue: ‘fue librado del mundo’ puede introducir un matiz teológico más fuerte que ἀπηλλάγη τοῦ κόσμου
    rationale: La decisión inglesa buscó ‘was released from the world’. ‘Fue liberado del mundo’ preserva mejor la pasiva de separación/departida sin sonar a rescate soteriológico específico.
  revised_spanish_text: 'Pero, para dejar los ejemplos de los antiguos, vayamos a los atletas que vivieron más cerca de nuestro tiempo. Tomemos los nobles ejemplos de nuestra propia generación. Por causa de los celos y la envidia, los pilares más grandes y más justos fueron perseguidos y combatieron hasta la muerte. Pongamos ante nuestros ojos a los buenos apóstoles: Pedro, que por celos injustos soportó no uno ni dos, sino muchos sufrimientos, y así, habiendo dado testimonio, fue al lugar de gloria que le era debido. Por causa de los celos y la discordia, Pablo mostró el premio de la perseverancia: habiendo llevado cadenas siete veces, habiendo sido desterrado, habiendo sido apedreado, habiendo llegado a ser un heraldo tanto en el oriente como en el occidente, recibió la noble fama de su fe, habiendo enseñado la rectitud a todo el mundo y habiendo llegado al extremo más lejano del occidente; y, habiendo dado testimonio ante los gobernantes, así fue liberado del mundo y partió al lugar santo,
    habiendo llegado a ser el mayor modelo de perseverancia.'
