translation:
  language: es
  text: Pongamos delante de nuestros ojos a los buenos apóstoles.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λάβωμεν πρὸ ὀφθαλμῶν ἡμῶν
  english_pob_choice: Let us set before our eyes
  chosen_spanish: Pongamos delante de nuestros ojos
  alternatives_spanish:
  - Pongamos ante nuestros ojos
  - Tengamos delante de nuestros ojos
  lexicon: λαμβάνω + πρὸ ὀφθαλμῶν
  rationale: La expresión griega pide una formulación exhortativa natural en español. «Pongamos delante de nuestros ojos» conserva la imagen mental de tener algo presente para contemplarlo y seguirlo, sin volverlo demasiado literal ni abstracto.
- source_word: τοὺς ἀγαθοὺς
  english_pob_choice: the good
  chosen_spanish: los buenos
  alternatives_spanish:
  - los nobles
  - los excelentes
  lexicon: ἀγαθός
  rationale: Se mantiene el adjetivo moral directo «buenos», que reproduce la valoración positiva del original y del inglés POB sin cargarlo con matices ajenos como «nobles» o «excelentes».
- source_word: ἀποστόλους
  english_pob_choice: apostles
  chosen_spanish: apóstoles
  alternatives_spanish:
  - enviados
  lexicon: ἀπόστολος
  rationale: «Apóstoles» es el equivalente natural y reconocido en español para el término griego. «Enviados» explicaría la etimología, pero perdería la referencia eclesial y textual evidente del contexto.
theological_decisions:
- issue: Valor exhortativo y ejemplar de la frase
  english_pob_reading: Let us set before our eyes the good apostles.
  chosen_spanish_reading: Pongamos delante de nuestros ojos a los buenos apóstoles.
  alternative_spanish_readings:
  - Tomemos como ejemplo a los buenos apóstoles
  - Tengamos presentes a los buenos apóstoles
  rationale: La frase funciona como una exhortación a la contemplación y memoria ejemplar. Mantener la imagen de ponerlos delante de los ojos respeta la fuerza retórica del griego y no reduce demasiado pronto la metáfora a una simple idea de imitación.
  doctrine_reference: Exhortación moral y memoria ejemplar en la tradición apostólica
translation_notes:
  revision_awareness: El texto inglés auditado no presenta notas ni variantes relevantes; la única revisión fue puntuación, de modo que la versión española sigue de cerca el contenido confirmado por el paso de revisión y conserva el mismo sentido completo.
  spanish_consistency_notes:
  - Se usa «apóstoles» en plural, como en el griego y el inglés POB.
  - Se evita «señor» o terminología doctrinal añadida porque el versículo no la requiere.
  - La puntuación final con punto mantiene la revisión inglesa y hace la cláusula publicable en español.
