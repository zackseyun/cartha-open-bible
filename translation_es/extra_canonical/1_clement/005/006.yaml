translation:
  language: es
  text: habiendo llevado cadenas siete veces, habiendo sido desterrado, habiendo sido apedreado, habiendo llegado a ser heraldo tanto en el oriente como en el occidente, recibió el noble renombre de su fe,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δεσμά
  english_pob_choice: chains
  chosen_spanish: cadenas
  alternatives_spanish:
  - grilletes
  - prisiones
  lexicon: δεσμά
  rationale: El POB inglés eligió 'chains' para conservar la imagen concreta de sujeción física; en español 'cadenas' comunica la misma fuerza léxica de forma natural y pública. 'Grilletes' sería más específico, pero estrecha innecesariamente el término.
- source_word: φυγαδευθείς
  english_pob_choice: having been driven into exile
  chosen_spanish: habiendo sido expulsado al exilio
  alternatives_spanish:
  - habiendo sido desterrado
  - habiendo sido echado al exilio
  lexicon: φυγαδεύω
  rationale: La forma pasiva indica ser arrojado fuera o enviado al destierro; 'expulsado al exilio' preserva el movimiento forzado y la condición resultante. 'Desterrado' es posible, pero 'expulsado al exilio' mantiene mejor la imagen verbal del participio.
- source_word: λιθασθείς
  english_pob_choice: having been stoned
  chosen_spanish: habiendo sido apedreado
  alternatives_spanish:
  - habiendo sido lapidado
  lexicon: λιθάζω
  rationale: '''Apedreado'' es el equivalente claro y común en español bíblico moderno; conserva la acción corporal sin tecnicismo. ''Lapidado'' es más tradicional, pero menos transparente para lectores amplios.'
- source_word: κῆρυξ
  english_pob_choice: herald
  chosen_spanish: heraldo
  alternatives_spanish:
  - pregonero
  - mensajero
  lexicon: κῆρυξ
  rationale: '''Heraldo'' reproduce el oficio proclamador del término griego y coincide con la opción del POB inglés. ''Pregonero'' suena más cotidiano, pero puede rebajar el matiz de proclamación pública y digna.'
- source_word: ἔν τε τῇ ἀνατολῇ καὶ ἐν τῇ δύσει
  english_pob_choice: both in the east and in the west
  chosen_spanish: tanto en el oriente como en el occidente
  alternatives_spanish:
  - en el este y en el oeste
  - en el oriente y en el poniente
  lexicon: ἀνατολή / δύσις
  rationale: '''Oriente/occidente'' es la pareja más estable y digna en español para una oposición geográfica amplia. ''Este/oeste'' es correcto, pero menos solemne; ''poniente'' sería más literario y menos neutral.'
- source_word: τὸ γενναῖον τῆς πίστεως αὐτοῦ κλέος
  english_pob_choice: the noble renown of his faith
  chosen_spanish: la noble gloria de su fe
  alternatives_spanish:
  - la noble fama de su fe
  - el noble renombre de su fe
  lexicon: κλέος
  rationale: '''Gloria'' conserva el sentido de renombre honorífico y encaja con el tono elevado del pasaje; ''renombre'' o ''fama'' son posibles, pero suenan más sociales y menos épicos. ''Noble gloria'' sigue de cerca la combinación del original y del POB.'
theological_decisions:
- issue: Acumulación de sufrimientos y honor público como testimonio de fidelidad
  english_pob_reading: The English POB presents the sequence as a list of hardships culminating in honorable renown, without adding explicit doctrinal interpretation.
  chosen_spanish_reading: La cláusula española mantiene la cadena de padecimientos seguida del reconocimiento honorable, sin convertirla en explicación teológica adicional.
  alternative_spanish_readings:
  - '...y recibió la noble fama de su fe'
  - '...y obtuvo la noble gloria de su fe'
  rationale: El griego presenta un movimiento narrativo de sufrimiento a honor; la traducción debe conservar ese arco sin suavizarlo ni convertirlo en comentario doctrinal. 'Gloria' preserva mejor el registro elevado que 'fama'.
  doctrine_reference: Martirio y testimonio fiel como honor en la tradición cristiana primitiva; sin formulación dogmática añadida
translation_notes:
  revision_awareness: The English POB record shows no footnotes and no applied revisions; latest revision pass marked unchanged with high agreement. The Spanish draft therefore follows the established English reading closely, with only idiomatic adjustments required by Spanish syntax and register.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de participios con 'habiendo...', acorde con el tono enumerativo del griego y del inglés POB.
  - Se conserva el registro elevado de la cláusula final mediante 'noble gloria', sin introducir términos confesionales no presentes en el texto.
  - No se añaden notas al pie porque el expediente inglés no documenta variantes ni alternativas obligatorias.
