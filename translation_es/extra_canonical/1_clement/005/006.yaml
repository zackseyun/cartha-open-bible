    issue: κλέος fue traducido como 'gloria'
    rationale: El griego κλέος denota reputación, fama o renombre honorable. 'Gloria' en español puede sugerir esplendor o gloria teológica, alejándose del valor de 'renown' documentado por el POB inglés.
  - severity: low
    issue: '''habiendo sido expulsado al exilio'' suena redundante'
    rationale: Aunque refleja la fuerza verbal de φυγαδευθείς, en español resulta menos natural. 'Habiendo sido desterrado' conserva el sentido de exilio impuesto y mejora la legibilidad.
