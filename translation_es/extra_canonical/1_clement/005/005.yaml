base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/005/005.yaml
  text: Because of jealousy and strife[a], Paul showed the prize of endurance,
  footnotes:
  - marker: a
    text: Or 'showed what is the prize of endurance:'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
