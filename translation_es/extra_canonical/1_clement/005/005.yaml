review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: διὰ introduce causa, Παῦλος = Pablo, ἔδειξεν = mostró, y βραβεῖον ὑπομονῆς se transmite como ‘premio de la perseverancia’. Sin embargo, la nota al pie española no preserva con precisión la alternativa documentada en el rastro inglés, que mantiene el matiz de ‘mostrar cuál es el premio’, no simplemente ‘indicar el premio’.'
  spanish_quality_summary: El español es natural, claro y eclesialmente legible. ‘A causa de los celos y la contienda’ suena bien en registro bíblico moderno. La única reparación necesaria es ajustar la nota al pie para que corresponda mejor a la alternativa auditada y evitar un cambio innecesario de matiz verbal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. ‘Pablo’, ‘premio’ y ‘perseverancia’ son opciones adecuadas. No aparecen términos sensibles del glosario principal. La decisión ‘celos’ para ζῆλος y ‘contienda’ para ἔρις es defendible en este contexto.
  issues:
  - severity: medium
    issue: La nota al pie alternativa no coincide bien con la alternativa preservada en el rastro inglés.
    rationale: La nota inglesa conserva ‘showed what is the prize of endurance’, mientras que la española propone ‘indicó el premio de la perseverancia’, que solo sustituye el verbo principal y pierde el matiz explicativo de ‘cuál es’. Si se mantiene nota, debe reflejar esa alternativa semántica con mayor fidelidad.
  revised_spanish_text: A causa de los celos y la contienda, Pablo mostró el premio de la perseverancia[a].
  revised_footnotes:
  - marker: a
    text: O ‘mostró cuál es el premio de la perseverancia’.
    reason: preservar la alternativa documentada en el rastro inglés con mejor fidelidad semántica en español
  revision_rationale: El texto principal puede mantenerse. Se revisa solo la nota al pie para reflejar con mayor precisión la alternativa auditada en inglés, preservando el matiz de ‘mostrar cuál es el premio’ en lugar de introducir una mera variante verbal (‘indicó’).
