    unchanged: false
    changes_summary: Replaced 'Paulos' with the natural English form 'Paul' and 'pointed out' with 'showed' to more directly reflect ἔδειξεν in formal, natural English.
translation:
  language: es
  text: A causa de los celos y la contienda, Pablo mostró el premio de la perseverancia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘indicó el premio de la perseverancia’.
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ ζῆλον καὶ ἔριν
  english_pob_choice: Because of jealousy and strife
  chosen_spanish: A causa de los celos y la contienda
  alternatives_spanish:
  - Por causa de los celos y la discordia
  - A causa de la envidia y la contienda
  lexicon: ζῆλος; ἔρις
  rationale: διὰ expresa causa; ζῆλος puede ser ‘celos’ o ‘envidia’, pero en un contexto de conflicto interpersonal ‘celos’ conserva bien la fuerza relacional; ἔρις corresponde naturalmente a ‘contienda’ en español bíblico claro.
- source_word: Παῦλος
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Paulo
  lexicon: Παῦλος
  rationale: En español eclesial y bíblico, la forma natural y ampliamente inteligible es ‘Pablo’. No hay indicio en el texto de una razón para conservar la forma latina/inglesa.
- source_word: ὑπομονῆς
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - resistencia
  - paciencia perseverante
  lexicon: ὑπομονή
  rationale: ὑπομονή abarca constancia firme bajo prueba; ‘perseverancia’ comunica bien esa resistencia activa en español sin reducirla a paciencia pasiva.
- source_word: βραβεῖον
  english_pob_choice: prize
  chosen_spanish: premio
  alternatives_spanish:
  - galardón
  - recompensa
  lexicon: βραβεῖον
  rationale: ‘Premio’ es el equivalente más directo y claro en español moderno para βραβεῖον. ‘Galardón’ sería más solemne, pero menos transparente para lectura pública.
- source_word: ἔδειξεν
  english_pob_choice: showed
  chosen_spanish: mostró
  alternatives_spanish:
  - indicó
  - puso de manifiesto
  lexicon: δείκνυμι
  rationale: ἔδειξεν significa ‘mostró’ o ‘indicó’. ‘Mostró’ sigue de cerca el valor del verbo sin añadir explicación interpretativa.
theological_decisions:
- issue: Sentido de la relación causal introducida por διὰ
  english_pob_reading: Because of jealousy and strife
  chosen_spanish_reading: A causa de los celos y la contienda
  alternative_spanish_readings:
  - Por causa de los celos y la discordia
  rationale: Se mantiene la causalidad explícita del griego. No se suaviza ni se amplía el alcance; el texto atribuye el acto a esos motivos de conflicto.
  doctrine_reference: No aplica una doctrina específica; decisión de sintaxis causal y fidelidad semántica.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente corrigió una expansión innecesaria (‘what is’) y dejó el verbo en sentido simple (‘showed’). El español sigue esa lectura austera: ‘mostró’ sin colon ni glosa explicativa, y conserva el sustantivo del objeto (‘premio’) sin desarrollar más de lo que permite ἔδειξεν.'
  spanish_consistency_notes:
  - Se mantiene ‘Pablo’ como forma estándar española del nombre Παῦλος.
  - Se opta por ‘perseverancia’ para ὑπομονή en consonancia con el valor de constancia bajo prueba.
  - No se emplea ‘SEÑOR’ ni otras sustituciones que no corresponden al griego de este pasaje.
