base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/055/004.yaml
  text: The blessed Judith[a], when the city was under siege, asked the elders to permit her to go out into the camp of the foreigners.
  footnotes:
  - marker: a
    text: Or 'asked from the elders'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:08Z'
    unchanged: false
    changes_summary: Standardized the name spelling to 'Judith' and improved the English construction from 'asked the elders that she be permitted' to the more natural 'asked the elders to permit her,' while preserving the source meaning.
translation:
  language: es
  text: La bienaventurada Judit, cuando la ciudad estaba sitiada, pidió[a] a los ancianos que le permitieran salir al campamento de los extranjeros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pidió de los ancianos»; el griego usa una construcción con παρά que puede expresar procedencia o relación de la petición, pero en español se prefiere la formulación normal «pidió a los ancianos».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰουδὶθ ἡ μακαρία
  english_pob_choice: The blessed Judith
  chosen_spanish: La bienaventurada Judit
  alternatives_spanish:
  - La bendita Judit
  - La dichosa Judit
  lexicon: μακάριος
  rationale: «Bienaventurada» conserva el valor reverente y positivo de μακαρία, siguiendo el tono del inglés POB «blessed» sin reducirlo a una simple descripción emocional. Se usa «Judit» como forma española estándar del nombre, coherente con el ajuste auditado del inglés.
- source_word: ἐν συγκλεισμῷ οὔσης τῆς πόλεως
  english_pob_choice: when the city was under siege
  chosen_spanish: cuando la ciudad estaba sitiada
  alternatives_spanish:
  - cuando la ciudad estaba bajo sitio
  - mientras la ciudad se hallaba cercada
  lexicon: συγκλεισμός
  rationale: El griego expresa una ciudad encerrada/asediada; «estaba sitiada» comunica de forma natural y fiel la situación de cerco. «Bajo sitio» es posible, pero menos fluido en español moderno.
- source_word: ᾐτήσατο παρὰ τῶν πρεσβυτέρων
  english_pob_choice: asked the elders
  chosen_spanish: pidió a los ancianos
  alternatives_spanish:
  - solicitó a los ancianos
  - pidió de los ancianos
  lexicon: αἰτέω + παρά
  rationale: La revisión inglesa dejó claro que la construcción debe leerse como petición dirigida a los ancianos, no como una literalidad extraña de «from». En español, «pidió a los ancianos» transmite la relación correcta sin forzar la sintaxis.
- source_word: ἐαθῆναι αὐτὴν ἐξελθεῖν
  english_pob_choice: to permit her to go out
  chosen_spanish: que le permitieran salir
  alternatives_spanish:
  - que la dejaran salir
  - que la autorizaran a salir
  lexicon: ἐάω + ἐξελθεῖν
  rationale: El griego pide permiso para salir; «permitieran salir» reproduce la fuerza causativa con naturalidad. «Dejaran salir» también sería posible, pero «permitieran» mantiene mejor el matiz de autorización explícita.
- source_word: εἰς τὴν παρεμβολὴν τῶν ἀλλοφύλων
  english_pob_choice: into the camp of the foreigners
  chosen_spanish: al campamento de los extranjeros
  alternatives_spanish:
  - al campamento de los extranjeros
  - al campamento de los de otras naciones
  lexicon: παρεμβολή, ἀλλόφυλος
  rationale: «Campamento» es el equivalente natural de παρεμβολή en este contexto militar. «Extranjeros» traduce ἀλλοφύλων de manera directa y transparente; en español bíblico podría decirse «los de otras naciones», pero eso suaviza el valor de alteridad que el texto conserva.
theological_decisions:
- issue: Título honorífico de Judit
  english_pob_reading: The blessed Judith
  chosen_spanish_reading: La bienaventurada Judit
  alternative_spanish_readings:
  - La bendita Judit
  - La dicha Judit
  rationale: 'No hay una tensión doctrinal especial, pero sí una elección de registro: mantener un título honorífico solemne sin convertirlo en un simple adjetivo devocional. «Bienaventurada» preserva la dignidad literaria del personaje y el tono de alabanza implícito.'
  doctrine_reference: None
- issue: Referencia a la ciudad sitiada y la salida hacia el campamento extranjero
  english_pob_reading: when the city was under siege ... into the camp of the foreigners
  chosen_spanish_reading: cuando la ciudad estaba sitiada ... al campamento de los extranjeros
  alternative_spanish_readings:
  - cuando la ciudad estaba bajo sitio ... al campamento de los extranjeros
  - cuando la ciudad estaba cercada ... al campamento de los extranjeros
  rationale: La formulación mantiene el marco narrativo de peligro y alteridad sin añadir comentarios interpretativos. No se domestica la tensión del texto, que presenta a Judit solicitando permiso para entrar en territorio extranjero hostil.
  doctrine_reference: None
translation_notes:
  revision_awareness: La versión inglesa más reciente regularizó el nombre como Judith y suavizó la construcción de «asked from the elders» a «asked the elders to permit her». La traducción española sigue esa lectura revisada y evita una literalidad extraña de la preposición griega, preservando la misma relación semántica.
  spanish_consistency_notes:
  - Se mantiene «Judit» como forma española del nombre propio, no «Judith», para coherencia con el uso bíblico español más natural y legible.
  - Se conserva «ancianos» para πρεσβυτέρων, evitando imponer un valor eclesiástico posterior que el contexto no exige.
  - Se usa «campamento» para παρεμβολή porque en este contexto el referente es militar, no un asentamiento genérico.
