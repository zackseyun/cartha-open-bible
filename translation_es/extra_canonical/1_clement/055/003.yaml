  source_alignment_summary: 'El borrador español refleja fielmente el griego: «Muchas mujeres» corresponde a πολλαὶ γυναῖκες; «fortalecidas» transmite bien ἐνδυναμωθεῖσαι en pasiva; «por la gracia de Dios» comunica adecuadamente διὰ τῆς χάριτος τοῦ θεοῦ como medio; y «realizaron muchas acciones valerosas» preserva el sentido principal de ἐπετέλεσαν πολλὰ ἀνδρεῖα como actos de valentía. La nota con alternativa «acciones varoniles» conserva la resonancia etimológica secundaria registrada en el rastro inglés sin imponerla al texto principal.'
  spanish_quality_summary: El español es natural, claro y digno. La sintaxis fluye bien y evita calcos rígidos. «Acciones valerosas» suena algo más abstracto que «hechos valerosos» o «hazañas valerosas», pero sigue siendo plenamente idiomático y fiel. No hay problemas de gramática, puntuación ni registro.
  glossary_alignment: 'Se alinea con la terminología del proyecto: «gracia» para χάρις y «Dios» para θεοῦ. No hay conflicto con otros términos guía. La decisión de no usar «varoniles/viriles» en el texto principal concuerda con la justificación léxica documentada en el POB inglés para ἀνδρεῖα.'
