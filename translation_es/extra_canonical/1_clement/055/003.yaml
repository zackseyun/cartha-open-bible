translation:
  language: es
  text: Muchas mujeres[a], fortalecidas por la gracia de Dios, realizaron muchas acciones valerosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acciones varoniles».
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλαὶ γυναῖκες
  english_pob_choice: Many women
  chosen_spanish: Muchas mujeres
  alternatives_spanish:
  - Numerosas mujeres
  - Muchas mujeres valientes
  lexicon: γυνή
  rationale: El griego habla de γυναῖκες sin especificar más; «mujeres» conserva el sentido directo. «Muchas» reproduce πολλαὶ de manera natural en español.
- source_word: ἐνδυναμωθεῖσαι
  english_pob_choice: strengthened
  chosen_spanish: fortalecidas
  alternatives_spanish:
  - hechas fuertes
  - dotadas de fuerza
  lexicon: ἐνδυναμόω
  rationale: «Fortalecidas» expresa bien la pasiva de ἐνδυναμωθεῖσαι y sugiere dependencia de una fuerza recibida, sin añadir matices ajenos.
- source_word: διὰ τῆς χάριτος τοῦ θεοῦ
  english_pob_choice: through the grace of God
  chosen_spanish: por la gracia de Dios
  alternatives_spanish:
  - mediante la gracia de Dios
  - a través de la gracia de Dios
  lexicon: χάρις
  rationale: «Gracia» es la equivalencia normal y fiel de χάρις; «por» refleja el medio o instrumento de manera idiomática en español.
- source_word: ἀνδρεῖα
  english_pob_choice: courageous deeds
  chosen_spanish: acciones valerosas
  alternatives_spanish:
  - hazañas valerosas
  - hechos de valor
  - acciones heroicas
  lexicon: ἀνδρεῖος
  rationale: La revisión inglesa dejó de lado «manly deeds» para no cargar el texto con una connotación de género moderna. En español, «valerosas» conserva la fuerza de ἀνδρεῖα como valentía/coraje y evita una traducción mecánica basada en etimología.
theological_decisions:
- issue: Relación entre la gracia de Dios y las obras realizadas
  english_pob_reading: strengthened through the grace of God, accomplished many courageous deeds
  chosen_spanish_reading: fortalecidas por la gracia de Dios, realizaron muchas acciones valerosas
  alternative_spanish_readings:
  - fortalecidas por la gracia de Dios, hicieron muchas obras valerosas
  - fortalecidas por la gracia de Dios, llevaron a cabo muchas hazañas valientes
  rationale: 'Se mantiene la secuencia causal/mediadora del griego: la gracia de Dios fortalece, y el resultado son acciones valerosas. No se atenúa la agencia humana ni se convierte la frase en mera descripción moral.'
  doctrine_reference: Gracia divina y respuesta humana; cooperación fruto de la gracia, no mérito autónomo.
- issue: Posible tensión etimológica de ἀνδρεῖα en mujeres
  english_pob_reading: courageous deeds
  chosen_spanish_reading: acciones valerosas
  alternative_spanish_readings:
  - hazañas varoniles
  - acciones viriles
  rationale: El texto griego permite la resonancia etimológica con ἀνήρ, pero en este contexto el valor semántico principal es la valentía. En español, las opciones con «varonil/viril» introducirían una asociación de género más fuerte que la del original y oscurecerían el ejemplo moral del pasaje.
  doctrine_reference: Semántica léxica contextual; evitar sobreactivar etimologías cuando el uso establecido apunta a valentía.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «manly deeds» por «courageous deeds» tras evaluar que ἀνδρεῖα aquí funciona principalmente como «valerosas/courageous» y no como una etiqueta de masculinidad. La versión española sigue esa decisión y evita traducir etimológicamente de forma rígida.
  spanish_consistency_notes:
  - Se usa «gracia de Dios» para χάρις, consistente con el léxico POB.
  - Se usa «fortalecidas» para el pasivo participial, manteniendo la dependencia de una acción recibida.
  - 'Se evita «siervas» o formulaciones interpretativas: el griego dice simplemente «muchas mujeres».'
  - La nota al pie conserva la alternativa semántica documentada sin preferir una lectura de género como principal.
