review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego y del POB inglés en casi todo el pasaje: conserva los ejemplos de las naciones, la autoentrega a la muerte, las cadenas, la esclavitud, la gracia de Dios, Judit y Ester. También mantiene bien varias decisiones léxicas importantes, como «oráculos», «esclavitud», «humillación» y la distinción entre κύριος y δεσπότης mediante «Señor» y «Maestro». Sin embargo, hay dos desajustes significativos: 1) στασιάζωσιν ἐπὶ πλεῖον no se refiere a que ellos mismos fueran “desgarrados por la facción”, sino a evitar que sus ciudades siguieran en mayor sedición o conflicto faccioso; 2) «Maestro omnividente» suena poco natural en español eclesial y conviene reformularlo sin perder el matiz de παντεπόπτην δεσπότην.'
  spanish_quality_summary: El texto es generalmente claro, digno y legible en español. «Hazañas varoniles» funciona bien con nota. «Tiempo de plaga» es aceptable, aunque «crisis pestilente» o «tiempo de pestilencia» reflejarían mejor el registro. El principal problema de fluidez está en «para no verse ya más desgarrados por la facción», que resulta algo forzado y además desvía el sentido. «Maestro omnividente» es comprensible pero suena duro; «Maestro que todo lo ve» mantiene la distinción y mejora la naturalidad.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: θεός -> «Dios», χάρις -> «gracia», δουλείαν -> «esclavitud», ἀνδρεῖα -> «hazañas varoniles» con nota, κύριος distinto de δεσπότης. No aparece el nombre divino Yahvé en este pasaje. Se preserva correctamente «Señor» para κύριος aquí, ya que no se trata de un caso de יהוה explícito en la base dada.'
  issues:
  - severity: high
    issue: Sentido de στασιάζωσιν ἐπὶ πλεῖον mal enfocado en «para no verse ya más desgarrados por la facción»
    rationale: El griego indica que muchos salieron de sus ciudades para que estas no siguieran en conflicto faccioso o sedición en mayor medida. La formulación actual enfoca el padecimiento personal de ‘muchos’, cuando el texto apunta más bien al cese o evitación del conflicto cívico.
  - severity: medium
    issue: «Maestro omnividente» es demasiado rígido en español
    rationale: Aunque intenta reflejar παντεπόπτην δεσπότην, la combinación suena poco idiomática. «Maestro que todo lo ve» preserva mejor la dignidad, la claridad y la distinción léxica respecto de κύριος.
  - severity: low
    issue: «Algún tiempo de plaga» no capta tan bien la idea de coyuntura crítica
