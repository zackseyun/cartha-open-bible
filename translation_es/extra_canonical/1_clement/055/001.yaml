base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/055/001.yaml
  text: 'And so, to bring forward examples even from the nations: many kings and rulers, when some pestilential crisis had arisen, being instructed by oracles, handed themselves over to death so that through their own blood they might rescue their citizens. Many departed from their own cities so that they might no longer be torn by faction.


    We know of many among us who have handed themselves over to chains so that they might ransom others. Many handed themselves over into slavery, and after receiving the price paid for them, they fed others.


    Many women, strengthened through the grace of God, accomplished many manly deeds.


    The blessed Ioudith, when the city was under siege, asked from the elders that she be permitted to go out into the camp of the foreigners. So then, handing herself over to danger, she went out because of love for her homeland and for the people who were under siege, and the Lord handed Holofernes over into the hand of a woman.


    And no less did Esther also, perfect in faith, put herself in danger so that she might rescue the twelve-tribed people of Israel, who were about to perish. For through fasting and humiliation she entreated the all-seeing Master, God of the ages; and he, seeing the humility of her soul, rescued the people for whose sake she had faced danger.'
