translation:
  language: es
  text: 'Y para presentar también ejemplos de las naciones: muchos reyes y gobernantes, cuando surgió alguna crisis pestilente, instruidos por oráculos, se entregaron a la muerte para que, por medio de su propia sangre, rescataran a sus ciudadanos. Muchos salieron de sus propias ciudades para que no siguieran desgarrándose por facciones.


    Conocemos a muchos entre nosotros que se entregaron a cadenas para rescatar a otros. Muchos se entregaron a la esclavitud, y, después de recibir el precio pagado por ellos, alimentaron a otros.


    Muchas mujeres, fortalecidas por la gracia de Dios, realizaron muchas hazañas varoniles[a].


    La bienaventurada Judit, cuando la ciudad estaba sitiada, pidió a los ancianos que se le permitiera salir al campamento de los extranjeros. Así pues, entregándose ella misma al peligro, salió por amor a su patria y al pueblo que estaba sitiado, y el Señor entregó a Holofernes en manos de una mujer.


    Y no menos Ester también, perfecta según la fe[b], se expuso al peligro para rescatar al pueblo de las doce tribus de Israel, que estaba por perecer. Porque mediante el ayuno y la humillación suplicó al Maestro que todo lo ve, Dios de los siglos; y él, al ver la humildad de su alma, rescató al pueblo por cuya causa ella había corrido peligro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega usa un término de valor «varonil»; se mantiene esa marca de género en vez de neutralizarla.
    reason: theological_note
  - marker: b
    text: También puede entenderse como «perfecta en la fe»; se preserva aquí la estructura más cercana al griego.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑποδείγματα
  english_pob_choice: examples
  chosen_spanish: ejemplos
  alternatives_spanish:
  - modelos
  - ilustraciones
  lexicon: LSJ
  rationale: «Ejemplos» comunica bien el valor exhortativo de casos puestos delante del lector, sin sobrecargar con un tecnicismo innecesario.
- source_word: ἐθνῶν
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: LSJ
  rationale: «Las naciones» conserva el sentido amplio de pueblos no-israelitas sin introducir una oposición técnica posterior de «judíos/gentiles».
- source_word: λοιμικοῦ τινος ... καιροῦ
  english_pob_choice: some pestilential crisis
  chosen_spanish: algún tiempo de plaga
  alternatives_spanish:
  - una crisis pestilente
  - un tiempo de pestilencia
  lexicon: LSJ
  rationale: La expresión griega alude a una coyuntura devastadora o de plaga; en español, «tiempo de plaga» es claro y mantiene el matiz de calamidad.
- source_word: χρησμοδοτηθέντες
  english_pob_choice: being instructed by oracles
  chosen_spanish: siendo instruidos por oráculos
  alternatives_spanish:
  - habiendo recibido un oráculo
  - siendo advertidos por oráculos
  lexicon: LSJ
  rationale: La forma pasiva indica instrucción recibida mediante oráculos; se conserva el trasfondo pagano-religioso señalado por el texto.
- source_word: παρέδωκαν ἑαυτοὺς εἰς θάνατον
  english_pob_choice: handed themselves over to death
  chosen_spanish: se entregaron a la muerte
  alternatives_spanish:
  - se entregaron a morir
  - se rindieron a la muerte
  lexicon: BDAG
  rationale: «Se entregaron a la muerte» preserva el valor de autoentrega solemne del verbo sin suavizarlo.
- source_word: ῥύσωνται
  english_pob_choice: might rescue
  chosen_spanish: rescataran
  alternatives_spanish:
  - liberaran
  - salvaran
  lexicon: BDAG
  rationale: «Rescatar» expresa la liberación concreta de un peligro inmediato y evita cargar el término con connotaciones doctrinales ajenas al contexto.
- source_word: στασιάζωσιν
  english_pob_choice: be torn by faction
  chosen_spanish: verse ya más desgarrados por la facción
  alternatives_spanish:
  - verse envueltos en sedición
  - verse divididos por la facción
  lexicon: LSJ
  rationale: Se conserva la idea de conflicto interno y división cívica con una formulación natural en español.
- source_word: δεσμά
  english_pob_choice: chains
  chosen_spanish: cadenas
  alternatives_spanish:
  - grilletes
  - ligaduras
  lexicon: BDAG
  rationale: «Cadenas» es una equivalencia concreta y transparente para la autoentrega al cautiverio.
- source_word: λυτρώσωνται
  english_pob_choice: might ransom
  chosen_spanish: rescataran
  alternatives_spanish:
  - redimieran
  - liberaran
  lexicon: BDAG
  rationale: Aunque «rescatar» no reproduce el matiz monetario de manera explícita, aquí funciona bien junto a «cadenas» y al contexto de autoentrega para beneficio ajeno.
- source_word: δουλείαν
  english_pob_choice: slavery
  chosen_spanish: la esclavitud
  alternatives_spanish:
  - la servidumbre
  - la esclavitud servil
  lexicon: BDAG
  rationale: Se mantiene la dureza del término, conforme a la decisión POB de no suavizar la condición servil donde el contexto la hace explícita.
- source_word: τὰς τιμὰς αὐτῶν
  english_pob_choice: the price paid for them
  chosen_spanish: el precio pagado por ellos
  alternatives_spanish:
  - su precio
  - el precio de ellos
  lexicon: LSJ
  rationale: La frase aclara el sentido comercial de τιμή en este contexto de auto-venta a esclavitud.
- source_word: ἐψώμισαν
  english_pob_choice: they fed
  chosen_spanish: alimentaron
  alternatives_spanish:
  - dieron de comer
  - proveyeron alimento a
  lexicon: LSJ
  rationale: «Alimentaron» reproduce de forma concisa la acción de proveer comida a otros.
- source_word: ἐνδυναμωθεῖσαι
  english_pob_choice: strengthened
  chosen_spanish: fortalecidas
  alternatives_spanish:
  - empoderadas
  - hechas fuertes
  lexicon: BDAG
  rationale: Se conserva la pasiva de habilitación divina con una forma natural y digna en español.
- source_word: ἀνδρεῖα
  english_pob_choice: manly deeds
  chosen_spanish: hazañas varoniles
  alternatives_spanish:
  - hazañas valerosas
  - actos de valor
  lexicon: LSJ
  rationale: La expresión griega usa lenguaje marcado por género; se conserva con una traducción igualmente marcada, como pide la filosofía del proyecto.
- source_word: ἐν συγκλεισμῷ οὔσης τῆς πόλεως
  english_pob_choice: when the city was under siege
  chosen_spanish: cuando la ciudad estaba sitiada
  alternatives_spanish:
  - cuando la ciudad estaba cercada
  - mientras la ciudad estaba bajo sitio
  lexicon: LSJ
  rationale: «Estaba sitiada» es la forma natural y precisa en español para el estado de una ciudad rodeada por enemigos.
- source_word: παρεμβολὴν τῶν ἀλλοφύλων
  english_pob_choice: the camp of the foreigners
  chosen_spanish: el campamento de los extranjeros
  alternatives_spanish:
  - el campamento de los forasteros
  - el campamento del enemigo
  lexicon: LSJ
  rationale: «Extranjeros» sigue de cerca ἀλλόφυλοι sin especificar indebidamente la identidad étnica o militar.
- source_word: δι’ ἀγάπην
  english_pob_choice: because of love for
  chosen_spanish: por amor a
  alternatives_spanish:
  - por el amor a
  - a causa del amor por
  lexicon: BDAG
  rationale: Se conserva «amor» como motivación central, no reducido a patriotismo abstracto.
- source_word: ἐν χειρὶ θηλείας
  english_pob_choice: into the hand of a woman
  chosen_spanish: en manos de una mujer
  alternatives_spanish:
  - en la mano de una mujer
  - a manos de una mujer
  lexicon: LXX lexicon
  rationale: 'La locución española transmite la reversión retórica del texto bíblico: el enemigo cae en poder de una mujer.'
- source_word: τελεία κατὰ πίστιν
  english_pob_choice: perfect according to faith
  chosen_spanish: perfecta según la fe
  alternatives_spanish:
  - perfecta en la fe
  - completa según la fe
  lexicon: BDAG
  rationale: Se mantiene la estructura inusual del griego con una formulación cercana y comprensible.
- source_word: τὸ δωδεκάφυλον
  english_pob_choice: the twelve-tribed people
  chosen_spanish: el pueblo de las doce tribus
  alternatives_spanish:
  - las doce tribus
  - el pueblo de las doce tribus de Israel
  lexicon: LSJ
  rationale: La expresión colectiva se vierte de modo que preserve la unidad del pueblo sin perder la referencia tribal.
- source_word: ταπεινώσεως
  english_pob_choice: humiliation
  chosen_spanish: humillación
  alternatives_spanish:
  - humildad
  - abajamiento
  lexicon: BDAG
  rationale: «Humillación» conserva el matiz ascético y penitencial del ayuno y la aflicción voluntaria.
- source_word: παντεπόπτην δεσπότην
  english_pob_choice: the all-seeing Master
  chosen_spanish: el Maestro omnividente
  alternatives_spanish:
  - el Maestro que todo lo ve
  - el Señor omnividente
  lexicon: LSJ
  rationale: Se preserva la fuerza de δεσπότης con «Maestro», distinguiéndolo de κύριος, y se traduce el compuesto con un adjetivo claro.
- source_word: θεὸν τῶν αἰώνων
  english_pob_choice: God of the ages
  chosen_spanish: Dios de los siglos
  alternatives_spanish:
  - Dios de las edades
  - Dios eterno
  lexicon: BDAG
  rationale: «Dios de los siglos» mantiene el tono elevado y relativamente literal del giro griego.
- source_word: τὸ ταπεινὸν τῆς ψυχῆς αὐτῆς
  english_pob_choice: the humility of her soul
  chosen_spanish: la humildad de su alma
  alternatives_spanish:
  - la bajeza de su alma
  - la humildad de su espíritu
  lexicon: BDAG
  rationale: Se conserva la abstracción retórica del original sin simplificarla demasiado.
theological_decisions:
- issue: Renderizado de ἀνδρεῖα aplicado a mujeres
  english_pob_reading: manly deeds
  chosen_spanish_reading: hazañas varoniles
  alternative_spanish_readings:
  - hazañas valerosas
  - actos de valor
  rationale: El griego usa deliberadamente lenguaje de valentía codificado como masculino; se conserva esa aspereza semántica en lugar de neutralizarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Renderizado de δουλείαν
  english_pob_reading: slavery
  chosen_spanish_reading: la esclavitud
  alternative_spanish_readings:
  - la servidumbre
  - el cautiverio
  rationale: En este contexto de autoentrega y precio pagado, no conviene suavizar el término; «esclavitud» es transparente y fiel.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1; Contested terms δοῦλος
- issue: Distinción entre κύριος y δεσπότης
  english_pob_reading: Master
  chosen_spanish_reading: Maestro
  alternative_spanish_readings:
  - Señor
  - Soberano
  rationale: «Maestro» conserva mejor la diferencia de autoridad de δεσπότης frente a κύριος y evita ocultar la variación léxica del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: Se siguió el pasaje con alta concordancia del audit trail inglés, sin revisiones posteriores aplicadas; la redacción española busca conservar tanto el paralelismo retórico como las tensiones léxicas documentadas, especialmente en ἀνδρεῖα, δουλεία y δεσπότης.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no porque aparezca en este pasaje, sino conforme al estándar del proyecto para el nombre divino cuando corresponda; aquí el texto dice «Dios» y «el Señor/Maestro» según el contexto.
  - Se usa «esclavitud» para δουλείαν conforme a la pauta del proyecto de no suavizar la condición servil cuando es central.
  - Se distingue «Maestro» para δεσπότης, evitando homogeneizarlo con otras formas de señorío.
  - Se conserva la mayúscula en «Dios» y la capitalización normal de nombres propios bíblicos como «Judit», «Ester» y «Holofernes».
