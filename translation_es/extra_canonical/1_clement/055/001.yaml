  to: 'Y para presentar también ejemplos de las naciones: muchos reyes y gobernantes, cuando surgió alguna crisis pestilente, instruidos por oráculos, se entregaron a la muerte para que, por medio de su propia sangre, rescataran a sus ciudadanos. Muchos salieron de sus propias ciudades para que no siguieran desgarrándose por facciones.


    Conocemos a muchos entre nosotros que se entregaron a cadenas para rescatar a otros. Muchos se entregaron a la esclavitud, y, después de recibir el precio pagado por ellos, alimentaron a otros.


    Muchas mujeres, fortalecidas por la gracia de Dios, realizaron muchas hazañas varoniles[a].


    La bienaventurada Judit, cuando la ciudad estaba sitiada, pidió a los ancianos que se le permitiera salir al campamento de los extranjeros. Así pues, entregándose ella misma al peligro, salió por amor a su patria y al pueblo que estaba sitiado, y el Señor entregó a Holofernes en manos de una mujer.


