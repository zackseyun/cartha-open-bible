  text: παραδοῦσα οὖν ἑαυτὴν τῷ κινδύνῳ ἐξῆλθεν δι’ ἀγάπην τῆς πατρίδος καὶ τοῦ λαοῦ τοῦ ὄντος ἐν συγκλεισμῷ, καὶ παρέδωκεν κύριος Ὀλοφέρνην ἐν χειρὶ θηλείας.
