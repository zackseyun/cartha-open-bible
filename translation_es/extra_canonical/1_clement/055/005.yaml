base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/055/005.yaml
  text: So then[a], handing herself over to danger, she went out because of love for her homeland and for the people who were under siege, and the Lord handed Holofernes over into the hand of a woman.
  footnotes:
  - marker: a
    text: Or 'giving herself over to danger, she went out because of love for her homeland and for the people who were under siege, and the Lord delivered Holofernes into the hand of a woman.'.
    reason: previous_rendering
  revision_pass:
