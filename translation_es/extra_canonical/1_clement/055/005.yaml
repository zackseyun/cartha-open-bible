    unchanged: false
    changes_summary: Removed the duplicated opening phrase "So then,". Kept the rest essentially unchanged, as it accurately reflects the Greek and reads naturally.
translation:
  language: es
  text: Así pues[a], entregándose al peligro, salió por amor a su patria y al pueblo que estaba sitiado, y el Señor entregó a Holofernes en manos de una mujer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así pues, entregándose a sí misma al peligro, salió por amor a su patria y al pueblo que estaba sitiado, y el Señor entregó a Holofernes en manos de una mujer».'
    reason: Preservar la formulación más literal/reflexiva previamente usada, mientras el texto principal adopta el español más natural.
lexical_decisions:
- source_word: παραδοῦσα / παρέδωκεν
  english_pob_choice: handing herself over / handed ... over
  chosen_spanish: entregándose a sí misma / entregó
  alternatives_spanish:
  - dándose a sí misma
  - poniéndose en manos de
  lexicon: παραδίδωμι
  rationale: 'Conservo en español la repetición del verbo de entrega para reflejar la simetría retórica del griego: primero ella se entrega al peligro y luego el Señor entrega a Holofernes.'
- source_word: τῷ κινδύνῳ
  english_pob_choice: to danger
  chosen_spanish: al peligro
  alternatives_spanish:
  - al riesgo
  - al peligro inminente
  lexicon: κίνδυνος
  rationale: ‘Peligro’ es el equivalente más directo y natural en español, manteniendo el valor de exposición real al daño.
- source_word: δι’ ἀγάπην τῆς πατρίδος
  english_pob_choice: because of love for her homeland
  chosen_spanish: por amor a su patria
  alternatives_spanish:
  - por amor a su tierra natal
  - por amor a su país
  lexicon: πατρίς
  rationale: ‘Patria’ conserva el sentido de pertenencia colectiva y afectiva de πατρίς sin volverlo excesivamente moderno o político.
- source_word: τοῦ λαοῦ τοῦ ὄντος ἐν συγκλεισμῷ
  english_pob_choice: for the people who were under siege
  chosen_spanish: al pueblo que estaba sitiado
  alternatives_spanish:
  - al pueblo que estaba cercado
  - al pueblo que se hallaba bajo sitio
  lexicon: συγκλεισμός
  rationale: ‘Sitiado’ expresa bien la idea de estar encerrado o cercado por fuerzas enemigas, y resulta idiomático en español bíblico.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: κύριος
  rationale: En este contexto de 1 Clemente, el inglés POB usa ‘the Lord’ para κύριος; en español ‘el Señor’ reproduce esa convención sin forzar una identificación explícita distinta del griego citado.
- source_word: ἐν χειρὶ θηλείας
  english_pob_choice: into the hand of a woman
  chosen_spanish: en manos de una mujer
  alternatives_spanish:
  - en la mano de una mujer
  - en poder de una mujer
  lexicon: χείρ / θηλείας
  rationale: ‘En manos de’ es una expresión natural que conserva la imagen de dominio o entrega, y evita la dureza de un calco literal sin perder el sentido.
theological_decisions:
- issue: Repetición de ‘entregar/hand over’ para la acción humana y la divina
  english_pob_reading: The Lord handed Holofernes over into the hand of a woman.
  chosen_spanish_reading: '...y el Señor entregó a Holofernes en manos de una mujer.'
  alternative_spanish_readings:
  - '...y el Señor lo entregó en manos de una mujer.'
  - '...y el Señor lo puso en manos de una mujer.'
  rationale: Mantener ‘entregó’ preserva la correspondencia retórica con ‘entregándose’ y evita suavizar la agencia divina del texto.
  doctrine_reference: Providencia divina y soberanía de Dios en el relato
- issue: ‘El Señor’ como forma de κύριος en un texto griego cristiano antiguo
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Dios
  rationale: El contexto de 1 Clemente y la tradición de la cita favorecen mantener ‘el Señor’ como designación reverente y reconocible, sin introducir una especificación que el griego aquí no explicita.
  doctrine_reference: Uso reverente del título divino en literatura cristiana primitiva
translation_notes:
  revision_awareness: 'La revisión inglesa reciente corrigió la apertura duplicada ‘So then,’ y reforzó la repetición de παραδίδωμι con ‘handed ... over’. La versión española sigue esa decisión: abre con ‘Así pues’ una sola vez y conserva la repetición verbal con ‘entregándose / entregó’.'
  spanish_consistency_notes:
  - Se mantiene un español sobrio y eclesial, sin arcaísmos innecesarios.
  - ‘Patria’ y ‘sitiado’ buscan fidelidad semántica con buena naturalidad en español.
  - No se introduce ‘Cristo’ ni ‘Yahvé’ porque el versículo no los contiene explícitamente en el griego base.
