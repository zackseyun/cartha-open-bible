  text: ἐπιστάμεθα πολλοὺς ἐν ἡμῖν παραδεδωκότας ἑαυτοὺς εἰς δεσμά, ὅπως ἑτέρους λυτρώσωνται· πολλοὶ ἑαυτοὺς παρέδωκαν εἰς δουλείαν, καὶ λαβόντες τὰς τιμὰς αὐτῶν ἑτέρους ἐψώμισαν.
