review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego: ἐπιστάμεθα = «Sabemos»; πολλοὺς ἐν ἡμῖν = «muchos entre nosotros»; παραδεδωκότας ἑαυτοὺς εἰς δεσμά = entrega voluntaria «a cadenas»; ὅπως ἑτέρους λυτρώσωνται = finalidad de rescatar/liberar a otros; παρέδωκαν εἰς δουλείαν = «se entregaron a la esclavitud»; λαβόντες τὰς τιμὰς αὐτῶν = recepción del precio relacionado con ellos mismos; ἐψώμισαν = dar alimento a otros. La única mejora necesaria es idiomática y de precisión en español para «τὰς τιμὰς αὐτῶν», donde «el precio por sí mismos» suena poco natural y ambiguo.'
  spanish_quality_summary: El texto es claro y digno, pero «después de recibir el precio por sí mismos» resulta forzado en español y puede sugerir una lectura reflexiva extraña. «Después de recibir el precio por ellos mismos» conserva mejor la relación con αὐτῶν y sigue siendo suficientemente literal. El resto del versículo es natural y fiel.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Esclavitud» refleja correctamente δουλεία, en línea con la preferencia de mantener la fuerza lexical. «Rescatar» para λυτρώσωνται es adecuado y legible. No se requieren notas terminológicas adicionales.
  issues:
  - severity: medium
    issue: La frase «después de recibir el precio por sí mismos» es poco idiomática en español.
    rationale: Aunque intenta conservar la rareza de τὰς τιμὰς αὐτῶν, en español «por sí mismos» suena reflexivo de manera torpe y puede oscurecer el sentido. «Por ellos mismos» preserva mejor la referencia pronominal sin introducir información ajena como «pagado» o «de venta».
  revised_spanish_text: Sabemos de muchos entre nosotros que se entregaron a cadenas, para rescatar a otros; muchos se entregaron a la esclavitud y, después de recibir el precio por ellos mismos, alimentaron a otros.
  revision_rationale: Se hizo un ajuste menor para mejorar la naturalidad y precisión del segmento que traduce τὰς τιμὰς αὐτῶν, sin suavizar indebidamente la rareza del original ni apartarse de la revisión inglesa. También se alisó levemente la puntuación antes de «y» para una lectura más natural en español.
