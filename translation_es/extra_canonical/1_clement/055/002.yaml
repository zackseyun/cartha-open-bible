base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/055/002.yaml
  text: We know of many among us who have handed themselves over to chains so that they might ransom others. Many handed themselves over into slavery, and after receiving the price for themselves, they fed others.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:09Z'
    unchanged: false
    changes_summary: Revised 'the price paid for them' to 'the price for themselves' to more directly reflect τὰς τιμὰς αὐτῶν without adding 'paid.' The rest of the draft is accurate, complete, and natural.
translation:
  language: es
  text: Sabemos de muchos entre nosotros que se entregaron a cadenas, para rescatar a otros; muchos se entregaron a la esclavitud y, después de recibir el precio por ellos mismos, alimentaron a otros.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπιστάμεθα
  english_pob_choice: We know
  chosen_spanish: Sabemos
  alternatives_spanish:
  - Conocemos
  - Sabemos de
  lexicon: epistamai
  rationale: Expresa conocimiento asentado y auditivo sin volverlo demasiado técnico; «sabemos» reproduce bien el valor factual del inicio.
- source_word: πολλοὺς ἐν ἡμῖν
  english_pob_choice: many among us
  chosen_spanish: muchos entre nosotros
  alternatives_spanish:
  - muchos de los nuestros
  - muchos en medio de nosotros
  lexicon: polys; en hēmin
  rationale: «Entre nosotros» conserva el sentido comunitario y la referencia interna del grupo sin añadir matices ajenos.
- source_word: παραδεδωκότας ἑαυτοὺς εἰς δεσμά
  english_pob_choice: who have handed themselves over to chains
  chosen_spanish: que se entregaron a cadenas
  alternatives_spanish:
  - que se entregaron a prisiones
  - que se entregaron a lazos
  lexicon: paradidōmi; desma
  rationale: «Se entregaron» refleja la acción voluntaria; «cadenas» mantiene la imagen concreta de δεσμά y su fuerza de cautiverio.
- source_word: ὅπως ἑτέρους λυτρώσωνται
  english_pob_choice: so that they might ransom others
  chosen_spanish: para rescatar a otros
  alternatives_spanish:
  - a fin de redimir a otros
  - para liberar a otros
  lexicon: hopōs; lytrōsomai
  rationale: «Rescatar» comunica la idea de liberar mediante costo/redención en español natural; «redimir» es posible, pero aquí «rescatar» suena más transparente sin perder el sentido.
- source_word: παρέδωκαν εἰς δουλείαν
  english_pob_choice: handed themselves over into slavery
  chosen_spanish: se entregaron a la esclavitud
  alternatives_spanish:
  - se sometieron a esclavitud
  - se vendieron como esclavos
  lexicon: paradidōmi; douleia
  rationale: Se conserva la fuerza de δουλεία con «esclavitud», acorde con la decisión inglesa de «slavery» y con el contraste entre cautiverio y servidumbre.
- source_word: λαβόντες τὰς τιμὰς αὐτῶν
  english_pob_choice: after receiving the price for themselves
  chosen_spanish: después de recibir el precio por sí mismos
  alternatives_spanish:
  - después de recibir su precio
  - habiendo recibido el valor de sí mismos
  lexicon: timē
  rationale: La frase es deliberadamente extraña en griego y la revisión inglesa evitó añadir «paid». «Precio por sí mismos» mantiene el genitivo pronominal sin suavizar la tensión semántica.
- source_word: ἐψώμισαν
  english_pob_choice: they fed others
  chosen_spanish: alimentaron a otros
  alternatives_spanish:
  - dieron de comer a otros
  - sustentaron a otros
  lexicon: psōmizō
  rationale: «Alimentaron» conserva el acto concreto de proveer comida con un verbo directo y sobrio; corresponde al valor básico del verbo en este contexto.
theological_decisions:
- issue: El sentido de «λυτρώσωνται» entre liberación y redención
  english_pob_reading: so that they might ransom others
  chosen_spanish_reading: para rescatar a otros
  alternative_spanish_readings:
  - para redimir a otros
  - para liberar a otros
  rationale: El contexto presenta autosacrificio en favor de otros, no una formulación doctrinal técnica. «Rescatar» conserva la dimensión de costo y liberación sin cargar el texto con lenguaje más teológico de lo que exige la fuente.
  doctrine_reference: Redención/liberación vicaria en un contexto de ejemplo moral comunitario.
- issue: La expresión «τιμὰς αὐτῶν» y su tensión semántica
  english_pob_reading: the price for themselves
  chosen_spanish_reading: el precio por sí mismos
  alternative_spanish_readings:
  - su precio
  - el precio de ellos
  rationale: Se mantiene la rareza del giro griego sin resolverla en exceso. La lectura inglesa revisada evita agregar «pagado»; el español conserva esa misma austeridad para no borrar la tensión textual.
  doctrine_reference: Transparencia lexical y preservación de una formulación no explicada por el texto.
translation_notes:
  revision_awareness: 'The English audit trail shows one targeted revision: ‘the price paid for them’ was changed to ‘the price for themselves’ to reflect τὰς τιμὰς αὐτῶν more directly without adding ‘paid.’ The Spanish draft follows the revised English sense while preserving the original Greek tension.'
  spanish_consistency_notes:
  - Usé «Yahvé» only when applicable by default policy; this verse does not contain the divine name.
  - Mantuve «esclavitud» rather than «servidumbre» because the Greek δουλεία and the English audit trail both favor stronger lexical force.
  - Elegí «rescatar» y no «redimir» para evitar un registro demasiado técnico en una frase de ejemplo comunitario.
  - No añadí notas al pie porque el texto no presenta variantes textuales o ambigüedades que requieran anclaje tipográfico en esta línea.
