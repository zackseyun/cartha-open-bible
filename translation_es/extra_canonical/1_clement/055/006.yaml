  to: Y no menos Ester[a], perfecta en[b] la fe, se puso en peligro para rescatar a las doce tribus de Israel, que estaban a punto de perecer. Pues por medio del ayuno y de humillarse[c] suplicó al Soberano que todo lo ve, Dios de los siglos; y él, al ver la humildad de su alma, libró al pueblo por cuya causa ella se había expuesto al peligro.
  rationale: Se corrige la sintaxis inicial para un español natural («Y no menos Ester»), se preserva la voluntariedad ascética con «de humillarse», y se sustituye «Señor» por «Soberano» para reflejar mejor δεσπότης sin introducir connotaciones impropias del nombre divino. Se mantienen las notas existentes porque documentan alternativas reales ya presentes en la auditoría.
