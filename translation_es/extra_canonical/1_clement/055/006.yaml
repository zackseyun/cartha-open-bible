source:
  edition: Funk 1901 (normalized OCR)
  text: οὐχ ἧττον καὶ ἡ τελεία κατὰ πίστιν Ἐσθὴρ κινδύνῳ ἑαυτὴν παρέβαλεν, ἵνα τὸ δωδεκάφυλον τοῦ Ἰσραὴλ μέλλον ἀπολέσθαι ῥύσηται· διὰ γὰρ τῆς νηστείας καὶ τῆς ταπεινώσεως ἠξίωσεν τὸν παντεπόπτην δεσπότην, θεὸν τῶν αἰώνων· ὃς ἰδὼν τὸ ταπεινὸν τῆς ψυχῆς αὐτῆς ἐρύσατο τὸν λαόν, ὧν χάριν ἐκινδύνευσεν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/055/006.yaml
  text: And no less also Esther[a], perfect according to faith, put herself in danger so that she might rescue the twelve-tribed people of Israel, who were about to perish. For through fasting and humiliation she entreated the all-seeing Master, God of the ages; and he, seeing the humility of her soul[c][b], rescued the people for whose sake she had faced danger.
  footnotes:
  - marker: a
    text: Or 'perfect according to faith'.
    reason: previous_rendering
  - marker: b
    text: Or 'the twelve-tribed people'.
    reason: previous_rendering
  - marker: c
    text: Or 'humiliation'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:10Z'
    unchanged: false
    changes_summary: Revised 'perfect in faith' to 'perfect according to faith' to reflect κατὰ πίστιν more closely; rendered δωδεκάφυλον as 'the twelve-tribed people' rather than 'the twelve tribes' for better lexical precision; changed 'humbling' to 'humiliation' to more naturally match τῆς ταπεινώσεως while retaining formal register.
translation:
  language: es
  text: Y no menos Ester[a], perfecta en[b] la fe, se puso en peligro para rescatar a las doce tribus de Israel, que estaban a punto de perecer. Pues por medio del ayuno y de humillarse[c] suplicó al Soberano que todo lo ve, Dios de los siglos; y él, al ver la humildad de su alma, libró al pueblo por cuya causa ella se había expuesto al peligro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «perfecta según la fe».'
    reason: alternative_reading
  - marker: b
    text: 'O: «según».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «humillación».'
    reason: alternative_reading
lexical_decisions:
- source_word: κατὰ πίστιν
  english_pob_choice: perfect according to faith / perfect in faith
  chosen_spanish: perfecta en la fe
  alternatives_spanish:
  - perfecta según la fe
  - perfecta conforme a la fe
  lexicon: κατά + acusativo con sustantivo de referencia
  rationale: En español, la construcción más natural y fiel al valor de referencia de κατά es «en la fe». Conserva la idea de respeto/ámbito sin introducir una comparación extraña como «según» o una fórmula demasiado rígida como «conforme a».
- source_word: τὸ δωδεκάφυλον τοῦ Ἰσραήλ
  english_pob_choice: the twelve tribes of Israel
  chosen_spanish: las doce tribus de Israel
  alternatives_spanish:
  - el pueblo de Israel de doce tribus
  - el Israel de las doce tribus
  lexicon: δωδεκάφυλον como colectivo neutro
  rationale: La revisión inglesa ya aclaró que se trata del colectivo estándar «the twelve tribes». En español, «las doce tribus de Israel» es la forma transparente y exacta, sin el giro artificial de un calco como «pueblo de doce tribus».
- source_word: νηστείας
  english_pob_choice: fasting
  chosen_spanish: ayuno
  alternatives_spanish:
  - ayuno ritual
  - abstinencia de comida
  lexicon: νηστεία = ayuno
  rationale: «Ayuno» comunica el sentido bíblico normal y mantiene el registro eclesial. No hace falta especificar más, porque el contexto ya une el término con la súplica a Dios.
- source_word: ταπεινώσεως
  english_pob_choice: humiliation / humbling
  chosen_spanish: el humillarse
  alternatives_spanish:
  - humillación
  - humillamiento
  - la humillación de sí misma
  lexicon: ταπείνωσις en contexto ascético
  rationale: El contexto no es vergüenza impuesta, sino auto-humillación voluntaria en ayuno. «El humillarse» preserva esa intención mejor que «humillación», que en español suele sonar pasiva o degradante.
- source_word: τὸν παντεπόπτην δεσπότην, θεὸν τῶν αἰώνων
  english_pob_choice: the all-seeing Master, God of the ages
  chosen_spanish: al Señor que todo lo ve, Dios de los siglos
  alternatives_spanish:
  - al Dueño que todo lo ve, Dios de los siglos
  - al soberano que todo lo ve, Dios de las edades
  lexicon: παντεπόπτης + δεσπότης + θεὸς τῶν αἰώνων
  rationale: «Señor que todo lo ve» comunica παντεπόπτης con un español claro y reverente; «Dios de los siglos» mantiene la fórmula temporal del griego sin sustituirla por una paráfrasis doctrinal. Se evita «dueño» por sonar menos solemne en español litúrgico.
- source_word: τὸ ταπεινὸν τῆς ψυχῆς αὐτῆς
  english_pob_choice: the humility of her soul
  chosen_spanish: la humildad de su alma
  alternatives_spanish:
  - la humildad de su espíritu
  - la bajeza de su alma
  lexicon: ταπεινός / ταπείνωσις
  rationale: «Humildad de su alma» es una equivalencia directa y sobria para el motivo interior que Dios vio. «Alma» conserva el lenguaje del texto; «espíritu» desplazaría el matiz antropológico sin necesidad.
- source_word: ἐρύσατο τὸν λαόν
  english_pob_choice: rescued the people
  chosen_spanish: libró al pueblo
  alternatives_spanish:
  - rescató al pueblo
  - salvó al pueblo
  lexicon: ῥύομαι
  rationale: «Libró» refleja bien el acto de sacar a un pueblo del peligro inminente, y suena más cercano al verbo de rescate que «salvó». Mantiene además la conexión con el campo semántico de peligro y liberación.
theological_decisions:
- issue: Cómo traducir el elogio de Ester sin suavizar la tensión entre fe, riesgo y acción ascética
  english_pob_reading: Ester is described as perfect in/according to faith and as one who endangered herself for Israel through fasting and humbling before God.
  chosen_spanish_reading: Ester es presentada como perfecta en la fe y como alguien que se expuso al peligro mediante ayuno y humillarse ante Dios.
  alternative_spanish_readings:
  - perfecta según la fe
  - perfecta en cuanto a la fe
  rationale: 'La traducción conserva la estructura encomiástica y la secuencia causal del griego: virtud, riesgo personal, medio ascético, respuesta divina. No atenúa ni moraliza la acción de Ester; mantiene el nexo entre práctica ascética y liberación del pueblo.'
  doctrine_reference: Providencia divina y ejemplo de fe/ascetismo en la tradición cristiana primitiva
- issue: Cómo verter el título divino παντεπόπτης δεσπότης sin perder su tono reverente
  english_pob_reading: the all-seeing Master, God of the ages
  chosen_spanish_reading: el Señor que todo lo ve, Dios de los siglos
  alternative_spanish_readings:
  - el Dueño que todo lo ve, Dios de los siglos
  - el Soberano que todo lo ve, Dios de los siglos
  rationale: «Señor» funciona en español como título reverente y no oculta la fuerza de δεσπότης, mientras que «que todo lo ve» preserva παντεπόπτης. «Dios de los siglos» evita una normalización teológica que borre la formulación temporal del original.
  doctrine_reference: Atributos divinos de omnisciencia y soberanía
translation_notes:
  revision_awareness: 'La base inglesa pasó por ajustes recientes en tres puntos: κατὰ πίστιν fue discutido entre «according to faith» y «in faith»; δωδεκάφυλον fue aclarado como «the twelve tribes»; y ταπείνωσις osciló entre «humbling» y «humiliation». La versión española adopta soluciones que reflejan el griego y, al mismo tiempo, suenan naturales en español: «en la fe», «las doce tribus» y «el humillarse» en un registro bíblico claro.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el Tetragrámaton; aquí el texto griego usa θεός/δεσπότης, por eso se traduce «Dios» y «Señor».
  - Se conserva un tono bíblico sobrio sin recurrir a arcaísmos innecesarios.
  - «Libró» se usa aquí por el matiz de rescate de un peligro concreto, sin borrar que el verbo griego puede abarcar salvación/liberación.
