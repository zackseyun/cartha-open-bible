    text: 'O: «perfecta según la fe».'
    reason: alternative_reading
  - marker: b
    text: 'O: «según».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «humillación».'
    reason: alternative_reading
  revision_rationale: Se corrige la sintaxis inicial para un español natural («Y no menos Ester»), se preserva la voluntariedad ascética con «de humillarse», y se sustituye «Señor» por «Soberano» para reflejar mejor δεσπότης sin introducir connotaciones impropias del nombre divino. Se mantienen las notas existentes porque documentan alternativas reales ya presentes en la auditoría.
