review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: καὶ πάλιν λέγει = «Y otra vez dice»; Ἐγὼ δέ εἰμι = «Pero yo soy»; ἀπὸ χύτρας = «de una olla». Sin embargo, el punto principal del audit trail inglés es que ἀτμίς aquí se ajusta mejor a «steam/steam from a pot» que a «vapor». En español, «vapor» no es imposible, pero «vaho» o «vapor» pueden sonar menos concretos que la imagen de algo que sale de una olla. «Vapor» además necesitó nota explicativa, mientras que una solución más directa puede preservar mejor la imagen fuente.'
  spanish_quality_summary: El español es claro y digno, pero «vapor de una olla» suena un poco técnico o menos idiomático que «vaho de una olla» o «vapor que sale de una olla». Dado el carácter breve y metafórico del original, conviene una expresión igualmente breve. «Vaho» mantiene la idea de exhalación caliente y resulta natural en español eclesial/general. La nota actual introduce «humareda», que desplaza el sentido hacia humo y no ayuda.
  glossary_alignment: No hay términos doctrinales del glosario principal en juego. La única decisión léxica importante es ἀτμίς. Para alinearse con la revisión inglesa documentada («steam»), el español debe preferir una imagen de vapor caliente/exhalación de olla. «Vaho» cumple mejor que «vapor» en este contexto breve.
  issues:
  - severity: medium
    issue: «vapor» no refleja tan bien la revisión auditada a «steam»
    rationale: El registro inglés cambió expresamente de «vapor» a «steam» por adecuación contextual con ἀπὸ χύτρας. El español debería responder a esa misma evidencia con una opción más concreta y doméstica.
  - severity: low
    issue: La nota al pie es innecesaria si se usa una mejor solución léxica en el texto
    rationale: La nota actual compensa una elección menos precisa. Con «vaho» la imagen queda suficientemente clara sin nota.
  - severity: low
    issue: «humareda» como alternativa en la nota puede confundir el campo semántico
    rationale: Sugiere humo denso más que exhalación caliente; no es la mejor ayuda léxica para ἀτμίς.
  revised_spanish_text: 'Y otra vez dice: «Pero yo soy vaho de una olla».'
  revision_rationale: Se reemplaza «vapor» por «vaho» para reflejar mejor la imagen concreta de ἀτμίς ἀπὸ χύτρας como exhalación caliente de una olla, en línea con la revisión inglesa a «steam». La frase queda más natural y precisa en español, por lo que la nota léxica ya no es necesaria.
