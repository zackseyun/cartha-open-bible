translation:
  language: es
  text: 'Y otra vez dice: «Pero yo soy vapor[a] de una olla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Vapor» conserva la imagen del griego ἀτμίς; también puede entenderse como «vaho» o «humareda», pero aquí se prefiere un término breve y natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ πάλιν λέγει
  english_pob_choice: And again he says
  chosen_spanish: Y otra vez dice
  alternatives_spanish:
  - Y de nuevo dice
  - Y otra vez afirma
  lexicon: καί / πάλιν / λέγει
  rationale: Conserva la repetición introductoria y el verbo de decir sin añadir sujeto explícito innecesario; «otra vez» reproduce bien πάλιν en un registro natural.
- source_word: Ἐγὼ δέ εἰμι
  english_pob_choice: But I am
  chosen_spanish: Pero yo soy
  alternatives_spanish:
  - Y yo soy
  - Mas yo soy
  lexicon: ἐγώ / δέ / εἰμί
  rationale: «Pero» refleja el valor adversativo de δέ de manera clara en español; se mantiene el sujeto enfático «yo» y el presente copulativo.
- source_word: ἀτμὶς
  english_pob_choice: steam
  chosen_spanish: vapor
  alternatives_spanish:
  - humo
  - vaho
  - vapor
  lexicon: ἀτμίς
  rationale: En español, «vapor» comunica la imagen de una exhalación caliente sin forzar la referencia concreta a steam mecánico; se conserva la imagen breve y figurada del griego. La nota explica la alternativa cercana «steam» del audit trail inglés.
- source_word: ἀπὸ χύτρας
  english_pob_choice: from a pot
  chosen_spanish: de una olla
  alternatives_spanish:
  - de una olla de barro
  - de una caldera
  - procedente de una olla
  lexicon: ἀπό + χύτρα
  rationale: «Olla» es el equivalente más natural y general para χύτρα en español; evita tecnicismos innecesarios y mantiene la imagen doméstica del original.
theological_decisions:
- issue: Imagen metafórica de auto-humillación o insignificancia
  english_pob_reading: But I am steam from a pot
  chosen_spanish_reading: Pero yo soy vapor de una olla
  alternative_spanish_readings:
  - Pero yo soy vapor
  - Pero yo soy como vapor de una olla
  rationale: 'No se suaviza la metáfora: el texto conserva la comparación breve e irónica/auto-descriptiva del original sin explicitar más de lo que el griego expresa.'
  doctrine_reference: none
translation_notes:
  revision_awareness: El texto inglés revisado cambió «vapor» por «steam» para ajustar ἀτμίς con ἀπὸ χύτρας. La versión española mantiene la imagen con «vapor», que en español conserva el valor semántico de exhalación caliente y permite una lectura natural sin perder la correspondencia con el griego.
  spanish_consistency_notes:
  - Se mantuvo el tono breve y proverbial del original.
  - Se evitó expandir la imagen con glosas dentro del texto principal.
  - La nota marcada [a] está anclada en la palabra «vapor» y ofrece la alternativa semántica relevante.
