source:
  edition: Funk 1901 (normalized OCR)
  text: ἐμαρτυρήθη μεγάλως Ἀβραὰμ καὶ φίλος προσηγορεύθη τοῦ θεοῦ, καὶ λέγει ἀτενίζων εἰς τὴν δόξαν τοῦ θεοῦ ταπεινοφρονῶν· Ἐγὼ δέ εἰμι γῆ καὶ σποδός.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/017/002.yaml
  text: Abraham received great testimony and was called the friend of God, and gazing intently on the glory of God, he said with humility, “But I am dust and ashes.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:55Z'
    unchanged: false
    changes_summary: 'Refined wording for naturalness and closer lexical fit: changed ''as he fixed his gaze on'' to ''gazing intently on'' for ἀτενίζων, and ''in humility of mind'' to ''with humility'' for smoother formal English while preserving ταπεινοφρονῶν. Kept ''But I am dust and ashes'' as a natural rendering of Ἐγὼ δέ εἰμι γῆ καὶ σποδός.'
translation:
  language: es
  text: 'Abraham recibió gran testimonio y fue llamado amigo de Dios; y, mirando fijamente la gloria de Dios, dijo con humildad: «Pero yo soy polvo y ceniza».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐμαρτυρήθη μεγάλως
  english_pob_choice: received great testimony
  chosen_spanish: recibió gran testimonio
  alternatives_spanish:
  - obtuvo gran testimonio
  - se dio gran testimonio de él
  lexicon: μαρτυρέω
  rationale: El pasivo comunica que Abraham fue acreditado o reconocido públicamente; «recibió gran testimonio» conserva esa valoración formal sin volverlo más interpretativo de lo que exige el griego.
- source_word: φίλος προσηγορεύθη τοῦ θεοῦ
  english_pob_choice: was called the friend of God
  chosen_spanish: fue llamado amigo de Dios
  alternatives_spanish:
  - fue denominado amigo de Dios
  - recibió el nombre de amigo de Dios
  lexicon: φίλος / προσαγορεύω
  rationale: Se mantiene la forma pasiva de designación. «Amigo de Dios» es la equivalencia directa y natural en español para el título relacional del texto.
- source_word: ἀτενίζων
  english_pob_choice: gazing intently on
  chosen_spanish: mirando fijamente
  alternatives_spanish:
  - contemplando atentamente
  - fijando la mirada en
  lexicon: ἀτενίζω
  rationale: El verbo describe una mirada intensa y sostenida; «mirando fijamente» preserva ese énfasis con español claro y sobrio. «Fijando la mirada en» sería también posible, pero algo más perifrástico.
- source_word: εἰς τὴν δόξαν τοῦ θεοῦ
  english_pob_choice: on the glory of God
  chosen_spanish: la gloria de Dios
  alternatives_spanish:
  - la gloria de Dios hacia la cual miraba
  - la gloria de Dios
  lexicon: δόξα
  rationale: 'La preposición con participio se expresa naturalmente en español con complemento directo de percepción. No se añade nada al sentido básico: la mirada se dirige a la gloria de Dios.'
- source_word: ταπεινοφρονῶν
  english_pob_choice: with humility
  chosen_spanish: con humildad
  alternatives_spanish:
  - con modestia
  - con humildad de ánimo
  lexicon: ταπεινοφρονέω
  rationale: El término apunta a una disposición humilde del interior. «Con humildad» conserva la idea sin sobrecargar el español; evita una traducción demasiado literal como «humilde en pensamiento», que sonaría forzada.
- source_word: γῆ καὶ σποδός
  english_pob_choice: dust and ashes
  chosen_spanish: polvo y ceniza
  alternatives_spanish:
  - tierra y ceniza
  - polvo y ceniza
  lexicon: γῆ / σποδός
  rationale: La fórmula bíblica tradicional en español es «polvo y ceniza», y expresa bien la autodeclaración de pequeñez y mortalidad. «Tierra y ceniza» sería más literal para γῆ, pero menos idiomático y menos reconocible.
theological_decisions:
- issue: La autoidentificación de Abraham como criatura humilde frente a la gloria de Dios
  english_pob_reading: he said with humility, “But I am dust and ashes.”
  chosen_spanish_reading: 'dijo con humildad: «Pero yo soy polvo y ceniza».'
  alternative_spanish_readings:
  - 'dijo humildemente: «Pero yo soy polvo y ceniza»'
  - 'dijo con humildad de ánimo: «Pero yo soy polvo y ceniza»'
  rationale: La frase conserva la tensión entre la gloria divina y la condición humana de Abraham sin suavizarla. «Con humildad» comunica la actitud resultante sin convertirla en una explicación doctrinal ajena al texto.
  doctrine_reference: Humildad ante la majestad de Dios; antropología bíblica de la criatura finita ante el Creador.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego y coincide con la revisión inglesa más reciente en los puntos clave: ἀτενίζων se entiende como una mirada intensa/sostenida, ταπεινοφρονῶν como humildad, y γῆ καὶ σποδός se vierte en la fórmula bíblica estable «polvo y ceniza».'
  spanish_consistency_notes:
  - Se usa «Dios» de manera consistente para θεοῦ, sin sustituirlo por una forma litúrgica.
  - Se mantiene el registro bíblico y sobrio, evitando paráfrasis explicativas.
  - No hay necesidad de nota textual, pues el texto griego y el audit trail inglés están en alta concordancia.
