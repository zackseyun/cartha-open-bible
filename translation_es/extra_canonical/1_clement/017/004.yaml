  rationale: Se simplifica el reflexivo para un español más natural, preservando el énfasis con «él mismo». Se corrige la nota al pie para que ofrezca una alternativa real alineada con el historial inglés auditado. También se mejora la fluidez de la cláusula final con «ni siquiera si».
