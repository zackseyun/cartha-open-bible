translation:
  language: es
  text: 'Pero él mismo se acusa[a], diciendo: «Nadie está limpio de impureza, ni siquiera si su vida dura un solo día».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «presenta acusación contra sí mismo».
    reason: alternative_rendering
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: ἀλλά
  rationale: Conserva el contraste adversativo de apertura con una partícula natural y clara en español moderno.
- source_word: αὐτὸς ἑαυτοῦ κατηγορεῖ
  english_pob_choice: he himself accuses himself
  chosen_spanish: él mismo se acusa a sí mismo
  alternatives_spanish:
  - él mismo se incrimina
  - él mismo se hace acusación contra sí
  lexicon: κατηγορέω
  rationale: κατηγορεῖ es un verbo directo de 'acusar'; el reflexivo explícito preserva la fuerza del griego y el paralelismo del audit trail inglés sin volverlo perifrástico.
- source_word: Οὐδεὶς καθαρὸς
  english_pob_choice: No one is clean
  chosen_spanish: Nadie está limpio
  alternatives_spanish:
  - Nadie es puro
  - Nadie está puro
  lexicon: καθαρός
  rationale: '''Limpio'' comunica bien la idea moral/ritual de pureza sin sonar artificial; ''puro'' es posible, pero menos natural aquí.'
- source_word: ἀπὸ ῥύπου
  english_pob_choice: from defilement
  chosen_spanish: de impureza
  alternatives_spanish:
  - de suciedad
  - de contaminación
  lexicon: ῥύπος
  rationale: ῥύπος apunta a mancha/impureza/contaminación; 'impureza' conserva mejor el matiz moral-ritual que 'suciedad' en español bíblico contemporáneo.
- source_word: οὐδ’ ἂν μιᾶς ἡμέρας ἡ ζωὴ αὐτοῦ
  english_pob_choice: not even if his life is one day
  chosen_spanish: ni aun si su vida dura un solo día
  alternatives_spanish:
  - ni aunque su vida sea de un día
  - ni siquiera si su vida es un día
  lexicon: μή + ἄν conditional / temporal idiom
  rationale: La estructura griega expresa una concesión extrema de duración; 'dura un solo día' hace explícita la idea temporal sin introducir la ambigüedad de 'es un día'.
theological_decisions:
- issue: Universal moral/ritual uncleanness of human beings
  english_pob_reading: No one is clean from defilement
  chosen_spanish_reading: Nadie está limpio de impureza
  alternative_spanish_readings:
  - Nadie es puro
  - Nadie está puro
  rationale: La frase mantiene el alcance universal ('nadie') y el juicio de falta de pureza/impureza sin suavizarlo; no se inserta una doctrina ajena, solo se refleja el lenguaje del texto.
  doctrine_reference: Anthropology / human sinfulness
translation_notes:
  revision_awareness: El inglés revisado eliminó la formulación perifrástica 'brings accusation against himself' y dejó 'accuses himself'; la versión española sigue ese ajuste con una forma más directa y natural, manteniendo la posibilidad reflexiva en nota.
  spanish_consistency_notes:
  - Se preservó el registro bíblico sobrio y la puntuación de cita directa.
  - '''Impureza'' se usó para ῥύπος por coherencia con el campo semántico ritual/moral y por claridad en español.'
  - La nota [a] está anclada explícitamente en 'se acusa a sí mismo[a]' para cumplir la trazabilidad del apunte alternativo.
