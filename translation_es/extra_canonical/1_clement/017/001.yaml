base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/017/001.yaml
  text: 'Let us become imitators also of those who went about in goatskins and sheepskins, proclaiming the coming of the Messiah. We mean Elijah and Elisha, and also Ezekiel, the prophets; and besides these, those who have been testified to. 2. Abraham was greatly testified to and was called the friend of God, and as he fixed his gaze on the glory of God he said in humility of mind, “But I am dust and ashes.” 3. And moreover, concerning Job it is thus written: “Now Job was righteous and blameless, true, God-fearing, and turning away from every evil thing.” 4. But he himself accuses himself, saying, “No one is clean from defilement, not even if his life is but one day.” 5. Moses was called faithful in all his house, and through his service God judged Egypt by their plagues and their torments; yet even he, though greatly glorified, did not become high-minded, but said, when an oracle was given to him at the bush, “Who am I, that you send me? But I am weak-voiced and slow of tongue.” 6. And
    again he says, “But I am vapor from a pot.”'
