translation:
  language: es
  text: 'Seamos también imitadores de aquellos que anduvieron en pieles de cabra y pieles de oveja, proclamando la venida del Mesías. Nos referimos a Elías y Eliseo, y también a Ezequiel, los profetas; y además de estos, a los que han recibido testimonio[a]. 2. Abrahán recibió gran testimonio y fue llamado amigo de Dios, y, al fijar su mirada en la gloria de Dios, dijo con humildad: «Pero yo soy polvo y ceniza». 3. Y además, acerca de Job está escrito así: «Job era justo e irreprochable, verdadero, temeroso de Dios y apartado de toda cosa mala». 4. Pero él mismo se acusa[b], diciendo: «Nadie está limpio de impureza, ni siquiera si su vida dura un solo día». 5. Moisés fue llamado fiel en toda su casa, y por medio de su servicio Dios juzgó a Egipto con sus plagas y sus tormentos; sin embargo, aun él, aunque fue grandemente glorificado, no se ensoberbeció, sino que dijo, cuando le fue dado un oráculo en la zarza: «¿Quién soy yo, para que me envíes? Pues yo soy de voz débil y lento de lengua».
    6. Y de nuevo dice: «Pero yo soy vapor de una olla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «a los que han sido atestiguados / a quienes se les ha dado testimonio». Se traduce «han recibido testimonio» para conservar el sentido pasivo del griego y, a la vez, sonar natural en español, manteniendo la conexión con «Abrahán recibió gran testimonio».
    reason: lexical_alternative
  - marker: b
    text: O «se acusa a sí mismo». El reflexivo breve comunica con naturalidad el sentido de autoacusación del griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μιμηταὶ
  english_pob_choice: imitators
  chosen_spanish: imitadores
  alternatives_spanish:
  - seguidores
  lexicon: BDAG
  rationale: Conserva la fuerza exhortativa de la imitación deliberada, no solo de adhesión general.
- source_word: δέρμασιν αἰγείοις καὶ μηλωταῖς
  english_pob_choice: in goatskins and sheepskins
  chosen_spanish: en pieles de cabra y pieles de oveja
  alternatives_spanish:
  - en pieles de cabra y de oveja
  - en cueros de cabra y oveja
  lexicon: LSJ
  rationale: Mantiene la imagen concreta y el paralelismo doble del griego sin suavizarla.
- source_word: κηρύσσοντες
  english_pob_choice: proclaiming
  chosen_spanish: proclamando
  alternatives_spanish:
  - predicando
  - anunciando
  lexicon: BDAG
  rationale: Preserva el matiz de proclamación pública y heraldicidad.
- source_word: τὴν ἔλευσιν τοῦ Χριστοῦ
  english_pob_choice: the coming of the Messiah
  chosen_spanish: la venida del Mesías
  alternatives_spanish:
  - la venida de Cristo
  lexicon: BDAG
  rationale: Sigue la política del proyecto para Χριστός como título mesiánico, evitando la forma tradicional cuando el sentido titular es activo.
- source_word: τοὺς μεμαρτυρημένους
  english_pob_choice: those who have been testified to
  chosen_spanish: a los que han sido testificados
  alternatives_spanish:
  - a los que han recibido testimonio
  - a los que han sido atestiguados
  lexicon: BDAG
  rationale: Respeta la pasiva perfecta y la red de lenguaje de testimonio del capítulo, aunque resulte menos corriente en español.
- source_word: ἐμαρτυρήθη μεγάλως
  english_pob_choice: received great testimony
  chosen_spanish: recibió gran testimonio
  alternatives_spanish:
  - fue grandemente testificado
  - fue altamente atestiguado
  lexicon: BDAG
  rationale: Conserva el campo semántico de μαρτυρ- y su valoración positiva sin introducir una paráfrasis más interpretativa.
- source_word: ἀτενίζων
  english_pob_choice: as he fixed his gaze on
  chosen_spanish: al fijar su mirada en
  alternatives_spanish:
  - mirando fijamente
  - al mirar atentamente
  lexicon: BDAG
  rationale: Transmite la mirada intensa y sostenida con español natural.
- source_word: ταπεινοφρονῶν
  english_pob_choice: in humility of mind
  chosen_spanish: con humildad de mente
  alternatives_spanish:
  - con humildad de pensamiento
  - con mentalidad humilde
  lexicon: BDAG
  rationale: Refleja el énfasis interior e intelectual del participio, importante en 1 Clemente.
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  lexicon: BDAG
  rationale: En español bíblico y moral, 'justo' comunica la justicia/rectitud del carácter.
- source_word: ἄμεμπτος
  english_pob_choice: blameless
  chosen_spanish: sin culpa
  alternatives_spanish:
  - irreprensible
  - sin reproche
  lexicon: BDAG
  rationale: Expresa claramente la ausencia de culpa en un registro entendible y fiel.
- source_word: ἀληθινός
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - genuino
  - auténtico
  lexicon: BDAG
  rationale: Conserva el predicado simple del texto sin cargarlo de explicación.
- source_word: θεοσεβής
  english_pob_choice: God-fearing
  chosen_spanish: temeroso de Dios
  alternatives_spanish:
  - piadoso
  lexicon: BDAG
  rationale: Mantiene la referencia explícita a Dios y el tono reverente del original.
- source_word: ἀπεχόμενος ἀπὸ παντὸς κακοῦ
  english_pob_choice: turning away from every evil thing
  chosen_spanish: apartándose de toda cosa mala
  alternatives_spanish:
  - absteniéndose de todo mal
  - alejándose de todo mal
  lexicon: BDAG
  rationale: Sostiene el movimiento moral activo del participio en un español fluido.
- source_word: κατηγορεῖ
  english_pob_choice: accuses himself
  chosen_spanish: se acusa
  alternatives_spanish:
  - se acusa a sí mismo
  - lanza acusación contra sí
  lexicon: BDAG
  rationale: El español reflexivo comunica con naturalidad el sentido de autoacusación.
- source_word: ῥύπου
  english_pob_choice: defilement
  chosen_spanish: contaminación
  alternatives_spanish:
  - impureza
  - suciedad
  lexicon: LSJ
  rationale: En español, 'contaminación' comunica impurity moral sin quedar excesivamente físico.
- source_word: πιστὸς ἐν ὅλῳ τῷ οἴκῳ αὐτοῦ
  english_pob_choice: faithful in all his house
  chosen_spanish: fue llamado fiel en toda su casa
  alternatives_spanish:
  - fue llamado fiel en toda su casa
  - fue fiel en toda su casa
  lexicon: BDAG
  rationale: Mantiene la formulación bíblica reconocible y el valor relacional de οἶκος.
- source_word: ὑπηρεσίας
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - ministerio
  - asistencia
  lexicon: BDAG
  rationale: Evita el lenguaje técnico eclesiástico posterior que no está exigido por el contexto.
- source_word: ἐκρίνεν
  english_pob_choice: judged
  chosen_spanish: juzgó
  alternatives_spanish:
  - condenó
  - castigó
  lexicon: BDAG
  rationale: Preserva el marco teológico de juicio divino sobre Egipto.
- source_word: μαστίγων καὶ τῶν αἰκισμάτων
  english_pob_choice: plagues and torments
  chosen_spanish: plagas y sus tormentos
  alternatives_spanish:
  - azotes y tormentos
  - plagas y torturas
  lexicon: LSJ
  rationale: Conserva el par de términos punitivos y la referencia al sufrimiento infligido.
- source_word: οὐκ ἐμεγαλοφρόνησεν
  english_pob_choice: did not become high-minded
  chosen_spanish: no se engrandeció
  alternatives_spanish:
  - no se ensoberbeció
  - no se volvió altivo
  lexicon: BDAG
  rationale: Mantiene el contraste con la humildad y suena natural en español moderno.
- source_word: ἐπὶ τῆς βάτου χρηματισμοῦ αὐτῷ δεδομένου
  english_pob_choice: when an oracle was given to him at the bush
  chosen_spanish: cuando le fue dado un oráculo en la zarza
  alternatives_spanish:
  - cuando recibió un oráculo en la zarza
  - cuando se le dio un mensaje divino en la zarza
  lexicon: BDAG
  rationale: '''Oráculo'' conserva la solemnidad de χρηματισμός sin borrar el carácter de comunicación divina.'
- source_word: ἰσχνόφωνος
  english_pob_choice: weak-voiced
  chosen_spanish: de voz débil
  alternatives_spanish:
  - de voz apagada
  - de voz tenue
  lexicon: LSJ
  rationale: Expresa la autoevaluación humilde de Moisés de manera idiomática.
- source_word: βραδύγλωσσος
  english_pob_choice: slow of tongue
  chosen_spanish: lento de lengua
  alternatives_spanish:
  - tardío de palabra
  - de lengua torpe
  lexicon: LSJ
  rationale: Reproduce la expresión clásica y su ritmo scriptural.
- source_word: ἀτμὶς ἀπὸ χύτρας
  english_pob_choice: vapor from a pot
  chosen_spanish: vapor de una olla
  alternatives_spanish:
  - vapor de una vasija
  - vaho de una olla
  lexicon: LSJ
  rationale: Mantiene la imagen de fragilidad e insustancialidad con un equivalente directo.
theological_decisions:
- issue: Cómo rendir Χριστοῦ en contexto profético
  english_pob_reading: the coming of the Messiah
  chosen_spanish_reading: la venida del Mesías
  alternative_spanish_readings:
  - la venida de Cristo
  rationale: El sustantivo funciona como título mesiánico en boca del autor; 'Mesías' conserva el sentido y sigue la terminología del proyecto.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Red de lenguaje de testimonio en el capítulo
  english_pob_reading: those who have been testified to / received great testimony
  chosen_spanish_reading: han sido testificados / recibió gran testimonio
  alternative_spanish_readings:
  - han recibido testimonio
  - han sido atestiguados
  - fueron aprobados
  rationale: La repetición de μαρτυρ- es estructural. En español se conserva la pasiva y el sustantivo 'testimonio' para no perder la conexión lexical.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión: se mantuvo la preferencia por la pasiva/atestiguación en el grupo de μαρτυρ-, y se reflejó la actualización hacia una formulación más directa para la autoacusación de Job. También se ajustó el sujeto de la frase final de Moisés y se preservó la terminología titulada ''Mesías''.'
  spanish_consistency_notes:
  - Se mantuvo 'Mesías' para Χριστός, conforme a la política del proyecto y al uso profético del pasaje.
  - Se empleó 'Yahvé' no porque aparezca aquí, sino conforme al criterio general del proyecto cuando corresponda; en este versículo no hay tetragrámaton ni κύριος con valor de nombre divino.
  - Se evitó 'Cristo' como nombre fijo para no borrar el matiz titular del texto griego.
  - Se conservó 'testimonio/testificados' como campo léxico dominante para μαρτυρ- en todo el segmento.
  - Se usó un español eclesialmente legible sin recurrir a lenguaje arcaizante salvo donde la cita bíblica lo favorece.
