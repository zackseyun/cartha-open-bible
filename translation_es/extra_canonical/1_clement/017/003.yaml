base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/017/003.yaml
  text: 'And concerning Job it is thus written: “Now Job was righteous and blameless[a], true, God-fearing, abstaining from every evil.”'
  footnotes:
  - marker: a
    text: Or 'and turning away from every evil thing'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:53Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Y acerca de Job también está escrito así: «Job era justo e irreprochable, verdadero, temeroso de Dios, absteniéndose[a] de todo mal».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alejándose de todo mal»; el griego ἀπεχόμενος expresa más propiamente «mantenerse apartado de» o «abstenerse de».
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo delante de Dios
  lexicon: δίκαιος
  rationale: «Justo» mantiene la fuerza ética y judicial de δίκαιος sin introducir un giro más explicativo que el griego no exige.
- source_word: ἄμεμπτος
  english_pob_choice: blameless
  chosen_spanish: irreprochable
  alternatives_spanish:
  - sin culpa
  - impecable
  lexicon: ἄμεμπτος
  rationale: «Irreprochable» comunica bien la idea de alguien que no puede ser acusado de falta, con un registro natural en español eclesial.
- source_word: ἀληθινός
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - auténtico
  - fiel
  lexicon: ἀληθινός
  rationale: «Verdadero» sigue de cerca el valor adjetival del término; «auténtico» o «fiel» serían más interpretativos.
- source_word: θεοσεβής
  english_pob_choice: God-fearing
  chosen_spanish: temeroso de Dios
  alternatives_spanish:
  - piadoso
  - devoto de Dios
  lexicon: θεοσεβής
  rationale: «Temeroso de Dios» preserva la referencia reverente al temor piadoso y evita aplanarlo en «piadoso», que pierde el matiz lexical.
- source_word: ἀπεχόμενος ἀπὸ παντὸς κακοῦ
  english_pob_choice: abstaining from every evil
  chosen_spanish: absteniéndose de todo mal
  alternatives_spanish:
  - alejándose de todo mal
  - apartándose de todo mal
  lexicon: ἀπέχομαι
  rationale: La revisión auditada corrigió «turning away» porque ἀπεχόμενος significa «mantenerse alejado de / abstenerse de». «Absteniéndose de todo mal» refleja con precisión la construcción y el sentido verbal.
theological_decisions:
- issue: Retrato de la integridad de Job como acumulación de cualidades
  english_pob_reading: Job is described as righteous and blameless, true, God-fearing, abstaining from every evil.
  chosen_spanish_reading: Job es presentado con una serie de cualidades morales y religiosas sin suavizar ninguna de ellas.
  alternative_spanish_readings:
  - Job era solo un hombre piadoso
  - Job era moralmente intachable
  rationale: El griego enumera varios rasgos de Job; la traducción debe conservar esa acumulación y no fusionar o simplificar los calificativos.
  doctrine_reference: Integridad moral y reverencia en la vida de los justos
translation_notes:
  revision_awareness: La revisión reciente confirmó que la forma correcta para ἀπεχόμενος es «absteniéndose de» y descartó la antigua opción «turning away from every evil thing» por no corresponder al verbo griego. No se requieren cambios adicionales respecto del inglés auditado.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός según la terminología POB.
  - Se conserva la comilla de cita directa para reflejar la introducción narrativa del pasaje.
  - «Job» se translitera como en español bíblico estándar y coherente con el nombre propio del texto fuente.
