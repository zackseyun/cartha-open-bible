source:
  edition: Funk 1901 (normalized OCR)
  text: Μωσῆς πιστὸς ἐν ὅλῳ τῷ οἴκῳ αὐτοῦ ἐκλήθη, καὶ διὰ τῆς ὑπηρεσίας αὐτοῦ ἐκρίνεν ὁ θεὸς Αἴγυπτον διὰ τῶν μαστίγων καὶ τῶν αἰκισμάτων αὐτῶν· ἀλλὰ κἀκεῖνος δοξασθεὶς μεγάλως οὐκ ἐμεγαλοφρόνησεν, ἀλλ’ εἶπεν ἐπὶ τῆς βάτου χρηματισμοῦ αὐτῷ δεδομένου· Τίς εἰμι ἐγώ, ὅτι με πέμπεις; Ἐγὼ δέ εἰμι ἰσχνόφωνος καὶ βραδύγλωσσος.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/017/005.yaml
  text: Moses was called faithful in all his house[a], and through his service God judged Egypt through their plagues and torments; yet even he, though greatly glorified, did not become arrogant, but said, when a divine message was given to him at the bush, “Who am I, that you send me? For I am weak-voiced and slow of tongue.”
  footnotes:
  - marker: a
    text: Or 'did not become high-minded'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:56Z'
    unchanged: false
    changes_summary: Changed 'by their plagues' to 'through their plagues' for closer correspondence to repeated διὰ; changed 'an oracle' to 'a divine message' for more natural rendering of χρηματισμός; changed 'But I am' to 'For I am' to better reflect δέ in context.
translation:
  language: es
  text: 'Moisés fue llamado fiel en toda su casa, y por medio de su servicio Dios juzgó a Egipto por medio de sus plagas y tormentos; pero aun él, aunque fue grandemente glorificado, no se volvió arrogante[a], sino que dijo, cuando se le dio un mensaje divino en la zarza: «¿Quién soy yo, para que me envíes? Porque soy de voz débil y tardo de lengua».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no se volvió altivo».'
    reason: alternative_rendering_of_megalophroneo
lexical_decisions:
- source_word: Μωσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: nombre propio
  rationale: Nombre propio bíblico estándar en español, sin variación relevante.
- source_word: πιστὸς
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - fiel
  - leal
  lexicon: πίστις
  rationale: ‘Fiel’ comunica con precisión la cualidad de confiabilidad/constancia que el texto atribuye a Moisés.
- source_word: ἐν ὅλῳ τῷ οἴκῳ αὐτοῦ
  english_pob_choice: in all his house
  chosen_spanish: en toda su casa
  alternatives_spanish:
  - en toda su casa
  - en toda su casa y familia
  lexicon: οἶκος
  rationale: ‘Casa’ conserva la imagen bíblica y eclesial del ámbito de autoridad/hogar sin añadir explicaciones no presentes en el texto.
- source_word: ἐκλήθη
  english_pob_choice: was called
  chosen_spanish: fue llamado
  alternatives_spanish:
  - fue llamado
  - se le llamó
  lexicon: καλέω
  rationale: Pasivo directo y natural en español; mantiene la idea de una designación reconocida.
- source_word: διὰ τῆς ὑπηρεσίας αὐτοῦ
  english_pob_choice: through his service
  chosen_spanish: por medio de su servicio
  alternatives_spanish:
  - por medio de su servicio
  - a través de su servicio
  lexicon: διά + ὑπηρεσία
  rationale: ‘Por medio de’ refleja la mediación instrumental de διὰ sin sonar mecánico.
- source_word: ἐκρίνεν ὁ θεὸς Αἴγυπτον
  english_pob_choice: God judged Egypt
  chosen_spanish: Dios juzgó a Egipto
  alternatives_spanish:
  - Dios juzgó a Egipto
  - Dios sentenció a Egipto
  lexicon: κρίνω
  rationale: ‘Juzgó’ conserva el valor judicial general del verbo, tal como en el inglés auditado.
- source_word: διὰ τῶν μαστίγων καὶ τῶν αἰκισμάτων αὐτῶν
  english_pob_choice: through their plagues and torments
  chosen_spanish: por medio de sus plagas y tormentos
  alternatives_spanish:
  - por medio de sus plagas y tormentos
  - a través de sus plagas y tormentos
  lexicon: μάστιξ / αἴκισμα
  rationale: Se conserva la doble serie de castigo y aflicción. ‘Por medio de’ mantiene el paralelo con the repeated διὰ in the source and with the English revision.
- source_word: δοξασθεὶς μεγάλως
  english_pob_choice: though greatly glorified
  chosen_spanish: aunque fue grandemente glorificado
  alternatives_spanish:
  - aunque fue grandemente glorificado
  - aunque recibió gran gloria
  lexicon: δοξάζω
  rationale: ‘Fue grandemente glorificado’ conserva la pasiva y el énfasis intensivo sin paraphrasear el grado de honor recibido.
- source_word: οὐκ ἐμεγαλοφρόνησεν
  english_pob_choice: did not become arrogant
  chosen_spanish: no se llenó de arrogancia
  alternatives_spanish:
  - no se llenó de arrogancia
  - no se volvió arrogante
  - no se envaneció
  lexicon: μεγαλοφρονέω
  rationale: La revisión inglesa corrigió ‘high-minded’ por ‘arrogant’; en español, ‘no se llenó de arrogancia’ evita un calco engañoso y expresa bien el sentido negativo de soberbia/altivez.
- source_word: χρηματισμοῦ
  english_pob_choice: a divine message
  chosen_spanish: un mensaje divino
  alternatives_spanish:
  - un mensaje divino
  - una revelación divina
  - una respuesta divina
  lexicon: χρηματισμός
  rationale: ‘Mensaje divino’ es natural y conserva el sentido de comunicación dada por Dios, alineado con la revisión inglesa desde ‘oracle’ a ‘divine message’.
- source_word: ἐπὶ τῆς βάτου
  english_pob_choice: at the bush
  chosen_spanish: en la zarza
  alternatives_spanish:
  - en la zarza
  - ante la zarza
  lexicon: βάτος
  rationale: La escena remite al episodio de la zarza ardiente; ‘en la zarza’ es breve y fiel al griego, aunque ‘ante la zarza’ podría sonar más idiomático.
- source_word: Τίς εἰμι ἐγώ, ὅτι με πέμπεις;
  english_pob_choice: Who am I, that you send me?
  chosen_spanish: ¿Quién soy yo, para que me envíes?
  alternatives_spanish:
  - ¿Quién soy yo, para que me envíes?
  - ¿Quién soy yo, que me envías?
  lexicon: τίς εἰμι ἐγώ
  rationale: La construcción con ‘para que’ reproduce la finalidad/indignidad implícita en la pregunta retórica y suena natural en español.
- source_word: ἰσχνόφωνος
  english_pob_choice: weak-voiced
  chosen_spanish: de voz débil
  alternatives_spanish:
  - de voz débil
  - de voz queda
  - de voz apagada
  lexicon: ἰσχνόφωνος
  rationale: ‘De voz débil’ conserva la fuerza literal del compuesto y es comprensible para lectores actuales.
- source_word: βραδύγλωσσος
  english_pob_choice: slow of tongue
  chosen_spanish: tardo de lengua
  alternatives_spanish:
  - tardo de lengua
  - lento de habla
  - torpe de palabra
  lexicon: βραδύγλωσσος
  rationale: ‘Tardo de lengua’ mantiene una fórmula bíblica reconocible y respeta la imagen de dificultad verbal sin modernizar en exceso.
theological_decisions:
- issue: Cómo rendir el lenguaje de ‘casa’ para Moisés
  english_pob_reading: in all his house
  chosen_spanish_reading: en toda su casa
  alternative_spanish_readings:
  - en toda su casa
  - en toda su casa y familia
  rationale: Se conserva el término bíblico ‘casa’ para mantener la resonancia con el uso escritural de casa como esfera de pertenencia y administración. Añadir ‘familia’ aclararía, pero iría más allá del texto.
  doctrine_reference: Heb 3:2, 5-6 background; biblical household language
- issue: Sentido de μεγαλοφρονέω en relación con la humildad de Moisés
  english_pob_reading: did not become arrogant
  chosen_spanish_reading: no se llenó de arrogancia
  alternative_spanish_readings:
  - no se llenó de arrogancia
  - no se volvió arrogante
  - no se envaneció
  rationale: La revisión inglesa descartó ‘high-minded’ por ser engañoso en inglés moderno. En español, ‘no se llenó de arrogancia’ conserva la oposición con la humildad sin invertir el valor moral.
  doctrine_reference: Humility of Moses; anti-pride motif
- issue: χρηματισμός como revelación o mensaje divino
  english_pob_reading: a divine message
  chosen_spanish_reading: un mensaje divino
  alternative_spanish_readings:
  - un mensaje divino
  - una revelación divina
  - una respuesta divina
  rationale: ‘Mensaje divino’ comunica la procedencia y evita una palabra demasiado técnica o oracular que podría sonar arcaica o interpretativa. No se añade contenido profético que el griego no exige aquí.
  doctrine_reference: Divine communication / revelation
- issue: Mantenimiento del paralelismo instrumental con διὰ
  english_pob_reading: through his service ... through their plagues and torments
  chosen_spanish_reading: por medio de su servicio ... por medio de sus plagas y tormentos
  alternative_spanish_readings:
  - a través de su servicio ... a través de sus plagas y tormentos
  - mediante su servicio ... mediante sus plagas y tormentos
  rationale: ‘Por medio de’ preserva el paralelismo causal-instrumental del griego y la lógica del juicio realizado mediante esos medios.
  doctrine_reference: Divine judgment through appointed means
translation_notes:
  revision_awareness: 'Seguí la revisión más reciente del audit trail en tres puntos: (1) mantuve ‘por medio de’ para reflejar el doble διὰ; (2) usé ‘mensaje divino’ para χρηματισμοῦ, en lugar de ‘oráculo’; y (3) traduje la cláusula final como ‘For I am’ con ‘Porque soy’, no ‘Pero soy’, para respetar el contraste lógico del griego. También reflejé la corrección lexical de μεγαλοφρονέω como una idea negativa de arrogancia, no de ‘high-minded’ en sentido moderno.'
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para ὁ θεός y ‘Moisés’/‘Egipto’ como nombres propios estándar.
  - Se preserva la imagen de la ‘zarza’ sin expandirla a ‘zarza ardiente’, porque el griego sólo menciona βάτος.
  - El registro es reverente y publicable, con sintaxis española natural y sin depender del inglés como base superficial.
  - Se conserva la repetición de ‘por medio de’ para que el lector perciba la estructura causal del original.
