lexical_decisions:
- source_word: πάντα
  english_pob_choice: All things
  chosen_spanish: Todas las cosas
  alternatives_spanish:
  - Todo
  - Todas
  lexicon: πάντα
  rationale: Mantiene el alcance total del griego y la formulación inclusiva del inglés POB sin volverla más abstracta de lo que el texto permite.
- source_word: ἐνώπιον αὐτοῦ εἰσίν
  english_pob_choice: are before him
  chosen_spanish: están delante de él
  alternatives_spanish:
  - están ante él
  - están en su presencia
  lexicon: ἐνώπιον
  rationale: '''Delante de él'' conserva la imagen espacial de presencia inmediata y resulta natural en español contemporáneo.'
- source_word: λέληθεν
  english_pob_choice: has escaped
  chosen_spanish: ha escapado
  alternatives_spanish:
  - está oculto
  - ha pasado inadvertido
  lexicon: λανθάνω
  rationale: El perfecto de λανθάνω expresa que algo no ha escapado al conocimiento/divina observación; 'ha escapado' sigue de cerca la decisión inglesa revisada y conserva la fuerza aspectual sin introducir una idea de ocultamiento estático más fuerte que el griego.
- source_word: τὴν βουλὴν αὐτοῦ
  english_pob_choice: his counsel
  chosen_spanish: su consejo
  alternatives_spanish:
  - su propósito
  - su designio
  lexicon: βουλή
  rationale: '''Consejo'' refleja la dimensión deliberativa de βουλή y coincide con la revisión auditada del inglés POB; ''propósito'' es posible, pero reduce el matiz de deliberación y consejo.'
theological_decisions:
- issue: Relación entre conocimiento divino y βουλή
  english_pob_reading: nothing has escaped his counsel
  chosen_spanish_reading: nada ha escapado a su consejo
  alternative_spanish_readings:
  - nada ha quedado oculto a su consejo
  - nada ha pasado inadvertido a su consejo
  rationale: La expresión evita sugerir frustración del plan divino; en cambio, comunica que nada queda fuera del conocimiento y deliberación de Dios, conforme al griego y a la revisión del inglés POB.
  doctrine_reference: Providencia y omnisciencia divina
translation_notes:
  revision_awareness: 'El griego dice literalmente: «todas las cosas están delante de él, y nada ha escapado a su consejo». La historia de revisión en inglés corrigió una lectura más débil (''purpose'' / ''is hidden from'') hacia la noción perceptiva de λανθάνω (''escapar al notice/advertencia''). Por eso el español evita ''propósito'' como texto principal y usa ''consejo'', manteniendo la idea de deliberación divina.'
  spanish_consistency_notes:
  - Se conserva 'Dios' implícito como referente de αὐτοῦ, sin agregar el nombre propio, porque el contexto inmediato ya lo presupone.
  - Se usa mayúscula normal de oración; no hay nombres divinos explícitos en el texto griego que requieran marcador especial.
  - La nota al pie ofrece una alternativa española natural para el matiz de 'pass unnoticed' sin alterar el texto principal.
