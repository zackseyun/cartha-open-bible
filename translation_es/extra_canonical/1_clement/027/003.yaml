translation:
  language: es
  text: Por tanto, que la fe en él sea reavivada en nosotros, y entendamos que todas las cosas están cerca de él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναζωπυρησάτω
  english_pob_choice: let ... be rekindled
  chosen_spanish: sea avivada de nuevo
  alternatives_spanish:
  - sea reavivada
  - vuelva a encenderse
  lexicon: ἀναζωπυρέω
  rationale: El verbo griego expresa la idea de reavivar o avivar algo que se había enfriado o apagado; en español, «sea avivada de nuevo» conserva la imagen de renovación sin sonar forzado.
- source_word: ἡ πίστις αὐτοῦ
  english_pob_choice: faith in him
  chosen_spanish: la fe en él
  alternatives_spanish:
  - su fe
  - la fe de él
  lexicon: πίστις
  rationale: 'La preposición implícita en la versión inglesa refleja el sentido contextual: la fe dirigida a él. En español, «la fe en él» comunica de forma natural esa relación de confianza/creencia.'
- source_word: νοήσωμεν
  english_pob_choice: let us understand
  chosen_spanish: entendamos
  alternatives_spanish:
  - comprendamos
  - percibamos
  lexicon: νοέω
  rationale: El verbo pide una comprensión intelectual y práctica. «Entendamos» es claro, sobrio y adecuado al registro exhortativo.
- source_word: πάντα ἐγγὺς αὐτῷ ἐστιν
  english_pob_choice: all things are near to him
  chosen_spanish: todas las cosas le son cercanas
  alternatives_spanish:
  - todo está cerca de él
  - todas las cosas están cerca de él
  lexicon: ἐγγύς
  rationale: La construcción griega puede expresarse como proximidad relacional o espacial. «Le son cercanas» preserva la cercanía sin fijarla excesivamente en una sola imagen.
theological_decisions:
- issue: El alcance de «la fe en él» frente a un genitivo más literal
  english_pob_reading: faith in him
  chosen_spanish_reading: la fe en él
  alternative_spanish_readings:
  - su fe
  - la fe de él
  rationale: Aunque el griego no marca explícitamente la preposición, el sentido de la frase en la POB inglesa es de fe dirigida a Cristo/él. La redacción española mantiene esa lectura sin introducir una formulación más técnica que altere el flujo del texto.
  doctrine_reference: Confianza y perseverancia en Cristo como objeto de la fe
translation_notes:
  revision_awareness: La versión inglesa POB y la revisión posterior coinciden sin cambios; el griego y la traducción inglesa muestran alta concordancia, así que no se requieren notas textuales ni variantes.
  spanish_consistency_notes:
  - Se conserva el tono exhortativo con subjuntivo exhortativo en español.
  - «Él» remite al referente del contexto inmediato; no se añade un nombre propio porque el segmento fuente no lo explicita.
  - Se evita el calco rígido de «todas las cosas están cerca de él» para mantener una frase más idiomática en español sin perder el sentido de proximidad.
