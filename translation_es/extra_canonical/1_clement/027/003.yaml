review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: una exhortación jussiva doble, primero a que la fe en él sea reavivada en nosotros, y luego a que entendamos que todo está cerca de él. Sin embargo, la cláusula final «todas las cosas le son cercanas» suena menos natural en español y refleja de manera algo rígida ἐγγὺς αὐτῷ ἐστιν, que se expresa mejor como «todas las cosas están cerca de él».'
  spanish_quality_summary: El español es claro y digno, pero «sea avivada de nuevo» resulta más pesado que «sea reavivada», y «le son cercanas» suena poco idiomático en este contexto. Una revisión menor mejora naturalidad y legibilidad sin apartarse del sentido fuente.
  glossary_alignment: No hay términos de glosario sensibles aquí aparte de πίστις, bien resuelto como «fe», y la referencia pronominal «él», que sigue la auditoría inglesa. No hay conflicto con terminología de Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: «todas las cosas le son cercanas» es poco natural
    rationale: Aunque intenta preservar la relación dativa de αὐτῷ, en español suena forzado. «Todas las cosas están cerca de él» comunica con más claridad e idiomaticidad el sentido de ἐγγὺς αὐτῷ ἐστιν.
  - severity: low
    issue: «sea avivada de nuevo» es algo redundante
    rationale: ἀναζωπυρησάτω contiene la idea de reavivar/reencender. «Sea reavivada» expresa mejor esa noción en español sin añadir peso innecesario.
  revised_spanish_text: Por tanto, que la fe en él sea reavivada en nosotros, y entendamos que todas las cosas están cerca de él.
  revision_rationale: 'Se hicieron dos ajustes menores de estilo y fidelidad idiomática: «sea reavivada» reproduce con más naturalidad el matiz de ἀναζωπυρησάτω, y «todas las cosas están cerca de él» vierte de manera más clara y española la cláusula πάντα ἐγγὺς αὐτῷ ἐστιν.'
