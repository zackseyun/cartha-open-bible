  text: Ταύτῃ οὖν τῇ ἐλπίδι προσδεδέσθωσαν αἱ ψυχαὶ ἡμῶν τῷ πιστῷ ἐν ταῖς ἐπαγγελίαις καὶ τῷ δικαίῳ ἐν τοῖς κρίμασιν. . ὁ παραγγείλας μὴ ψεύδεσθαι, πολλῷ μᾶλλον αὐτὸς οὐ ψεύσεται· οὐδὲν γὰρ ἀδύνατον παρὰ τῷ θεῷ, εἰ μὴ τὸ ψεύσασθαι. . ἀναζωπυρησάτω οὖν ἡ πίστις αὐτοῦ ἐν ἡμῖν, καὶ νοήσωμεν, ὅτι πάντα ἐγγὺς αὐτῷ ἐστιν. 4. ἐν λόγῳ τῆς μεγαλωσύνης αὐτοῦ συνεστήσατο τὰ πάντα καὶ ἐν λόγῳ δύναται αὐτὰ καταστρέψαι. . Τίς ἐρεῖ αὐτῷ· Τί ἐποίησας; ἢ τίς ἀντιστήσεται τῷ κράτει τῆς ἰσχύος αὐτοῦ; ὅτε θέλει καὶ ὡς θέλει, ποιήσει πάντα καὶ οὐδὲν μὴ παρελθῇ τῶν δεδογματισμένων ὑπ᾿ αὐτοῦ. 6. πάντα ἐνώπιον αὐτοῦ εἰσίν, καὶ οὐδὲν λέληθεν τὴν βουλὴν αὐτοῦ. 7. εἰ οἱ οὐρανοὶ διηγοῦνται δόξαν θεοῦ, ποίησιν δὲ χειρῶν αὐτοῦ ἀναγγέλλει τὸ στερέωμα· ἡ ἡμέρα τῇ ἡμέρᾳ ἐρεύγεται ῥῆμα, καὶ νὺξ νυκτὶ ἀναγγέλλει γνῶσιν· καὶ οὐκ εἰσὶν λόγοι οὐδὲ λαλιαί, ὧν οὐχὶ ἀκούονται αἱ φωναὶ αὐτῶν.
