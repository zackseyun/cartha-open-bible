review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido global del griego y del POB inglés: la adhesión firme a la esperanza, la fidelidad de Dios en sus promesas, la imposibilidad moral de mentir, el reavivamiento de la fe, la soberanía divina sobre la creación y la cita salmódica están mayormente conservados. Sin embargo, hay varios puntos donde el español puede ajustarse mejor a la fuerza del original y a decisiones ya documentadas: προσδεδέσθωσαν queda algo debilitado con «queden unidas»; καταστρέψαι puede mantenerse mejor como «trastornarlas» o similar que «derribarlas» en referencia a «todas las cosas»; κράτει τῆς ἰσχύος pierde algo de la duplicación retórica; y en la cita del Salmo, «discursos» y «donde no se oigan sus voces» suenan menos naturales/fieles que una formulación más bíblica.'
  spanish_quality_summary: El texto es claro y digno, pero necesita un pulido menor para mejorar naturalidad bíblica y precisión léxica. «Queden unidas» suaviza demasiado la imagen de quedar atadas/ligadas. «Derribarlas» aplicado a «todas las cosas» suena algo físico y menos apto para un deshacer soberano del orden creado. «Discursos» en el paralelismo poético resulta pesado. También conviene afinar la puntuación y el cierre del salmo para una cadencia más natural en español eclesial.
  glossary_alignment: 'No hay conflictos con los términos de proyecto principales: θεός está bien como «Dios» y no aparece YHWH ni Mesías/Cristo. Las decisiones para «fe», «juicios», «firmamento» y «propósito» son congruentes con el expediente inglés. La principal mejora es reforzar la imagen léxica de προσδεδέσθωσαν y mantener mejor la textura retórica de κράτει τῆς ἰσχύος y λαλιαί.'
  issues:
  - severity: medium
    issue: «queden unidas» debilita la imagen de προσδεδέσθωσαν
    rationale: El perfecto imperativo/pasivo expresa una sujeción firme y asentada a la esperanza. «Unidas» es aceptable, pero menos vívido que «queden ligadas» o «permanezcan atadas».
  - severity: low
    issue: «derribarlas» para καταστρέψαι suena demasiado físico
    rationale: En relación con «todas las cosas», el verbo apunta a trastornar/derrocar lo establecido, no necesariamente a tumbar físicamente. «Trastornarlas» preserva mejor el alcance general sin sobredeterminar la imagen.
  - severity: low
    issue: «el poder de su fuerza» puede intensificarse mejor
    rationale: Aunque es fiel, «la fuerza de su poder» o mantener una duplicación más marcada suena algo más natural en español y conserva la emphásis del griego.
  - severity: medium
    issue: 'La línea salmódica final es mejorable: «discursos» y «donde no se oigan sus voces»'
    rationale: «Discursos» es menos poético que «expresiones» o «palabras habladas». Además, el cierre puede verterse de forma más natural y bíblica como «ni expresiones cuyas voces no sean oídas» o, mejor para español actual, «no hay palabras ni expresiones; no dejan de oírse sus voces».
