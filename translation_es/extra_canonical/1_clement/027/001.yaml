base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/027/001.yaml
  text: So then, let our souls be bound to this hope, to the One who is faithful in his promises and righteous in his judgments. He who commanded us not to lie will much more not himself lie; for nothing is impossible with God, except to lie. Therefore let faith in him be rekindled in us, and let us understand that all things are near to him. By a word of his majesty he established all things, and by a word he is able to overthrow them. Who will say to him, “What have you done?” Or who will withstand the might of his strength? When he wills, and as he wills, he will do all things, and not one of the things decreed by him shall ever pass away. All things are before him, and nothing has escaped his purpose. The heavens declare the glory of God, and the firmament proclaims the work of his hands; day pours forth speech to day, and night announces knowledge to night, and there are no words or utterances where their voices are not heard.
