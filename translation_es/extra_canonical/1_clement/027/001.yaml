translation:
  language: es
  text: 'Así pues, que nuestras almas queden ligadas[a] a esta esperanza, al que es fiel en sus promesas y justo en sus juicios. El que nos mandó no mentir, con mucha más razón no mentirá él mismo; porque nada es imposible para Dios, excepto mentir. Por tanto, que la fe en él sea reavivada en nosotros, y entendamos que todas las cosas están cerca de él. Por una palabra de su majestad estableció todas las cosas, y por una palabra puede trastornarlas. ¿Quién le dirá: «¿Qué has hecho?»? ¿O quién resistirá la fuerza de su poder? Cuando quiere, y como quiere, hará todas las cosas, y ni una sola de las cosas decretadas por él pasará jamás. Todas las cosas están delante de él, y nada ha escapado a su propósito. Los cielos declaran la gloria de Dios, y el firmamento anuncia la obra de sus manos; el día derrama palabra al día, y la noche anuncia conocimiento a la noche, y no hay palabras ni expresiones cuyas voces no sean oídas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «permanezcan atadas» o «queden firmemente aferradas» a esta esperanza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσδεδέσθωσαν
  english_pob_choice: let ... be bound
  chosen_spanish: queden unidas
  alternatives_spanish:
  - queden ligadas
  - permanezcan atadas
  lexicon: LSJ
  rationale: El griego expresa una unión firme y estable a la esperanza; en español, 'queden unidas' conserva la idea de adhesión permanente sin sonar forzado. 'Ligadas' y 'atadas' preservan más literalmente la imagen, pero pueden resultar ásperas en este contexto exhortativo.
- source_word: ἐλπίδι
  english_pob_choice: this hope
  chosen_spanish: esta esperanza
  alternatives_spanish:
  - esta expectación
  - esta esperanza viva
  lexicon: BDAG
  rationale: '''Esperanza'' es el equivalente natural y fiel. No se necesita expandir a ''esperanza viva'' porque el texto no lo dice explícitamente.'
- source_word: πιστῷ
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - fiable
  - verdadero
  lexicon: BDAG
  rationale: Para Dios, 'fiel' conserva el tono bíblico y relacional de lealtad a sus promesas. 'Fiable' es posible, pero reduce el registro teológico.
- source_word: δικαίῳ
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - recto y justo
  lexicon: BDAG
  rationale: En español, 'justo' comunica bien la dimensión judicial y moral de Dios en sus juicios. 'Recto' es posible, pero menos directo en este binomio con κρίμασιν.
- source_word: κρίμασιν
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - juicios judiciales
  - decisiones
  lexicon: BDAG
  rationale: '''Juicios'' mantiene la dicción bíblica y el sentido forense sin sobreexplicar. ''Decisiones'' pierde la carga judicial.'
- source_word: ἀναζωπυρησάτω
  english_pob_choice: let ... be rekindled
  chosen_spanish: sea reavivada
  alternatives_spanish:
  - sea reencendida
  - sea avivada
  lexicon: LSJ
  rationale: La imagen es de avivar una brasa o fuego; 'reavivada' transmite bien esa metáfora en español. 'Reencendida' sería más literal, pero menos natural en un sustantivo abstracto como 'la fe'.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la confianza
  - la fidelidad
  lexicon: BDAG
  rationale: Aquí el contexto exhorta a la comunidad a renovar su acto de creer; 'fe' es la forma más precisa. 'Confianza' podría funcionar, pero atenúa la dimensión confesional.
- source_word: ἐγγύς
  english_pob_choice: near
  chosen_spanish: cerca
  alternatives_spanish:
  - próximo
  - al alcance
  lexicon: BDAG
  rationale: '''Cerca'' suena natural en español y conserva la idea de proximidad inmediata a Dios. ''Al alcance'' añade matiz interpretativo no requerido por el griego.'
- source_word: ἐν λόγῳ τῆς μεγαλωσύνης
  english_pob_choice: by a word of his majesty
  chosen_spanish: por una palabra de su majestad
  alternatives_spanish:
  - mediante una palabra de su majestad
  - con una palabra de su majestad
  lexicon: LSJ
  rationale: '''Por una palabra'' mantiene el valor instrumental del griego y la cadencia escritural. ''De su majestad'' traduce μεγαλωσύνη con un registro elevado sin forzar ''majestad'' como mero adorno.'
- source_word: συνεστήσατο
  english_pob_choice: he established
  chosen_spanish: estableció
  alternatives_spanish:
  - constituyó
  - ordenó
  lexicon: BDAG
  rationale: '''Estableció'' es idiomático y recoge la acción de dar consistencia/orden al todo. ''Constituyó'' sería más formal, pero menos natural aquí.'
- source_word: καταστρέψαι
  english_pob_choice: to overthrow
  chosen_spanish: derribarlas
  alternatives_spanish:
  - destruirlas
  - trastornarlas
  lexicon: BDAG
  rationale: El sentido es de deshacer o tumbar lo establecido, no necesariamente de aniquilar. 'Derribarlas' conserva el golpe de la imagen y evita un matiz más absoluto que el griego no exige.
- source_word: κράτει τῆς ἰσχύος
  english_pob_choice: the might of his strength
  chosen_spanish: el poder de su fuerza
  alternatives_spanish:
  - la fuerza de su poder
  - la might de su fuerza
  lexicon: LSJ
  rationale: En español, 'el poder de su fuerza' reproduce la intensificación retórica sin sonar redundante de forma extraña. 'Poder' y 'fuerza' mantienen la doble potencia del original.
- source_word: δεδογματισμένων
  english_pob_choice: the things decreed
  chosen_spanish: las cosas decretadas
  alternatives_spanish:
  - las cosas determinadas
  - las cosas ordenadas
  lexicon: LSJ
  rationale: '''Decretadas'' expresa el peso autoritativo del participio y su trasfondo soberano. ''Determinadas'' es posible, pero menos fuerte.'
- source_word: παρελθῇ
  english_pob_choice: shall ever pass away
  chosen_spanish: pasará jamás
  alternatives_spanish:
  - pasará
  - quedará sin cumplirse
  lexicon: BDAG
  rationale: En este contexto, la idea es que lo decretado no se desvanecerá ni fallará; 'pasará jamás' conserva esa negatividad enfática. No se añadió una paráfrasis de cumplimiento, porque el griego conserva la imagen de paso/desaparición.
- source_word: βουλήν
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - consejo
  - plan
  lexicon: BDAG
  rationale: '''Propósito'' comunica intención deliberada en español contemporáneo y respeta el sentido de la voluntad ordenadora de Dios. ''Consejo'' suena más técnico o arcaizante.'
- source_word: στερέωμα
  english_pob_choice: firmament
  chosen_spanish: firmamento
  alternatives_spanish:
  - expansión
  - bóveda celeste
  lexicon: LSJ
  rationale: Como Clemente cita lenguaje escritural, 'firmamento' conserva la resonancia bíblica reconocible. 'Expansión' sería más moderna, pero pierde esa cadencia.
- source_word: ἐρεύγεται
  english_pob_choice: pours forth
  chosen_spanish: derrama
  alternatives_spanish:
  - hace brotar
  - vomita
  lexicon: LSJ
  rationale: El verbo es imaginería poética de emisión abundante; 'derrama' expresa bien el fluir continuo en español sin crudeza. 'Hace brotar' también es posible, pero menos directamente paralelo al día que habla al día.
- source_word: λαλιαί
  english_pob_choice: utterances
  chosen_spanish: discursos
  alternatives_spanish:
  - hablados
  - expresiones
  lexicon: LSJ
  rationale: Junto con 'palabras', 'discursos' refleja expresiones articuladas y suena natural en español. 'Expresiones' sería más neutro, pero pierde algo del paralelismo elevado.
theological_decisions:
- issue: La imposibilidad de mentir en Dios
  english_pob_reading: The text is rendered to stress God's moral impossibility of lying, not a limitation of divine power in general.
  chosen_spanish_reading: Se mantiene que nada es imposible para Dios, excepto mentir, entendiendo la mentira como contraria a su carácter y no como una limitación de poder.
  alternative_spanish_readings:
  - Nada es imposible para Dios, salvo mentir.
  - Para Dios todo es posible, excepto mentir.
  rationale: 'La formulación española conserva la tensión teológica: omnipotencia real y exclusión de la mentira por incompatibilidad moral. No se suaviza la fuerza de la afirmación con una paráfrasis explicativa.'
  doctrine_reference: Preservar la tensión teológica sin resolverla filosóficamente.
- issue: Cadencia escritural de la cita del salmo
  english_pob_reading: The citation is rendered in elevated scriptural cadence rather than flattened into contemporary paraphrase.
  chosen_spanish_reading: La cita se mantiene en un registro elevado y reconocible, sin modernizarla hasta volverla prosa explicativa.
  alternative_spanish_readings:
  - Los cielos muestran la gloria de Dios, y el firmamento anuncia la obra de sus manos.
  - Los cielos declaran la gloria de Dios, y el firmamento proclama la obra de sus manos.
  rationale: Clemente incorpora lenguaje salmódico; por eso conviene preservar la cadencia bíblica. 'Declaran' y 'firmamento' mantienen la textura intertextual mejor que una adaptación más corriente.
  doctrine_reference: Primacía de la fuente y preservación del tejido intertextual bíblico.
translation_notes:
  revision_awareness: Tomé como base la lectura griega normalizada y el rastro auditado en inglés, especialmente las decisiones revisadas sobre προσδεδέσθωσαν, καταστρέψαι y el cierre salmódico. En español opté por un registro bíblico-natural que conserve la fuerza exhortativa y la cadencia de cita escritural, sin depender mecánicamente del inglés. Donde el español podía sonar duro o poco idiomático, elegí equivalentes que mantuvieran la imagen y el peso teológico del original.
  spanish_consistency_notes:
  - Usé 'Y Dios' no aparece aquí, por lo que no fue necesario aplicar la convención de Yahvé.
  - Mantuve 'Dios' para θεός y no introduje 'Señor' porque el texto griego no lo exige en este versículo.
  - Conservé 'firmamento' para στερέωμα por su valor intertextual bíblico.
  - Elegí 'justo' para δικαίῳ y 'juicios' para κρίμασιν para mantener el paralelismo moral-forense.
  - El sintagma 'el poder de su fuerza' reproduce la duplicación enfática del griego sin normalizarla excesivamente.
