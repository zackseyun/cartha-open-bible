  text: ἐν λόγῳ τῆς μεγαλωσύνης αὐτοῦ συνεστήσατο τὰ πάντα καὶ ἐν λόγῳ δύναται αὐτὰ καταστρέψαι.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/027/004.yaml
  text: By the word of his majesty he established all things, and by a word he is able to overthrow them.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:48Z'
    unchanged: false
    changes_summary: Changed 'a word of his majesty' to 'the word of his majesty' for more natural rendering of ἐν λόγῳ τῆς μεγαλωσύνης αὐτοῦ, and changed 'overturn' to 'overthrow' as a more fitting formal equivalent for καταστρέψαι.
translation:
  language: es
  text: Por la palabra de su majestad estableció todas las cosas, y por una palabra puede derribarlas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν λόγῳ
  english_pob_choice: by the word
  chosen_spanish: por la palabra
  alternatives_spanish:
  - por la palabra de
  - mediante la palabra
  lexicon: λόγος
  rationale: El griego usa ἐν λόγῳ con valor instrumental; en español, «por la palabra» comunica con naturalidad el medio o instrumento. Se evita una construcción demasiado literal que sonaría pesada, sin perder la fuerza formal del original.
- source_word: τῆς μεγαλωσύνης αὐτοῦ
  english_pob_choice: of his majesty
  chosen_spanish: de su majestad
  alternatives_spanish:
  - de su grandeza
  - de su majestad real
  lexicon: μεγαλωσύνη
  rationale: «μεγαλωσύνη» expresa majestad/exaltación. «Su majestad» es la opción más directa y digna en español, preservando el tono elevado del texto.
- source_word: συνεστήσατο τὰ πάντα
  english_pob_choice: he established all things
  chosen_spanish: estableció todas las cosas
  alternatives_spanish:
  - constituyó todas las cosas
  - sostuvo todas las cosas
  lexicon: συνίστημι
  rationale: En este contexto, el verbo indica establecer/constituir de forma firme. «Estableció todas las cosas» refleja bien la idea de ordenación y fundación universal.
- source_word: ἐν λόγῳ δύναται αὐτὰ καταστρέψαι
  english_pob_choice: by a word he is able to overthrow them
  chosen_spanish: por una palabra puede derribarlas
  alternatives_spanish:
  - por una palabra puede destruirlas
  - por una palabra puede abatirlas
  lexicon: καταστρέφω
  rationale: «καταστρέψαι» expresa derribar, subvertir o deshacer. «Derribarlas» mantiene la idea de reversión poderosa y resulta idiomática en español; «destruirlas» sería más fuerte pero menos precisa respecto al matiz de abatir/derrocar.
theological_decisions:
- issue: El alcance de «todas las cosas» frente a una lectura más restringida
  english_pob_reading: he established all things
  chosen_spanish_reading: estableció todas las cosas
  alternative_spanish_readings:
  - estableció todo
  - estableció el universo
  rationale: El griego τὰ πάντα es inclusivo. «Todas las cosas» conserva el alcance total sin especificarlo artificialmente.
  doctrine_reference: Providencia y soberanía divina
- issue: Fuerza de «derribarlas» para καταστρέψαι
  english_pob_reading: he is able to overthrow them
  chosen_spanish_reading: puede derribarlas
  alternative_spanish_readings:
  - puede destruirlas
  - puede abatirlas
  rationale: El texto contrapone la acción fundadora de Dios con su poder para deshacer lo establecido. «Derribarlas» preserva esa tensión entre establecer y subvertir sin cargar innecesariamente el sentido hacia aniquilación absoluta.
  doctrine_reference: Poder soberano de Dios sobre la creación
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió 'the word of his majesty' y 'overthrow' como equivalentes formales más naturales. En español, esto favorece «por la palabra de su majestad» y «derribarlas» como soluciones naturales y fieles al contraste del original.
  spanish_consistency_notes:
  - Se mantuvo «palabra» para λόγος conforme al sentido instrumental del pasaje.
  - Se conservó un registro elevado y claro, sin recurrir a formulaciones eclesiásticas que no están en el griego.
  - No se introdujeron notas textuales porque el paquete fuente y el audit trail no registran variantes relevantes.
