translation:
  language: es
  text: '¿Quién le dirá: «¿Qué has hecho?» ¿O quién se resistirá al poder de su fuerza? Cuando quiere, y como quiere, hará todas las cosas, y nada de lo que ha decretado por él[a] pasará jamás.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «por él» refleja el agente del pasivo griego (ὑπ᾿ αὐτοῦ). La formulación es algo densa en español, pero conserva la construcción del original; una alternativa más fluida sería «decretado por él».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίς ἐρεῖ αὐτῷ· Τί ἐποίησας;
  english_pob_choice: Who will say to him, “What have you done?”
  chosen_spanish: '¿Quién le dirá: «¿Qué has hecho?»'
  alternatives_spanish:
  - '¿Quién le dirá: «¿Qué has hecho tú?»'
  - '¿Quién osará decirle: «¿Qué has hecho?»»'
  lexicon: τίς / λέγω / ποιέω
  rationale: Conservo la pregunta retórica directa del griego y del POB inglés. En español, «¿Qué has hecho?» reproduce con naturalidad el reproche implícito sin añadir explicaciones ni intensificar indebidamente el verbo «decir» con un matiz de osadía que no está explícito en el texto.
- source_word: τίς ἀντιστήσεται τῷ κράτει τῆς ἰσχύος αὐτοῦ
  english_pob_choice: who will withstand the might of his strength?
  chosen_spanish: ¿quién se resistirá al poder de su fuerza?
  alternatives_spanish:
  - ¿quién podrá resistir la fuerza de su poder?
  - ¿quién podrá oponerse al poder de su fuerza?
  lexicon: ἀνθίστημι / κράτος / ἰσχύς
  rationale: «Resistirá» mantiene el verbo de oposición fuerte de ἀνθίστημι. «Poder de su fuerza» sigue de cerca la duplicación intensificadora del griego y el inglés POB («might of his strength»), evitando suavizarla a un solo sustantivo. 'Poder' y 'fuerza' juntos conservan la acumulación retórica.
- source_word: ὅτε θέλει καὶ ὡς θέλει, ποιήσει πάντα
  english_pob_choice: When he wills, and as he wills, he will do all things
  chosen_spanish: Cuando quiere, y como quiere, hará todas las cosas
  alternatives_spanish:
  - Cuando quiere y como quiere, hará todo
  - Cuando él quiere y como él quiere, hará todas las cosas
  lexicon: θέλω / ποιέω / πάντα
  rationale: «Cuando quiere, y como quiere» refleja la doble cláusula temporal y modal sin cargarla con un tono teológico posterior. «Harà todas las cosas» reproduce el sentido totalizante de πάντα, manteniendo la amplitud del griego y del POB inglés.
- source_word: οὐδὲν μὴ παρελθῇ
  english_pob_choice: not one of the things decreed by him shall ever pass away
  chosen_spanish: nada de lo que ha decretado por él pasará jamás
  alternatives_spanish:
  - ninguna de las cosas decretadas por él pasará jamás
  - no pasará jamás ninguna de las cosas que él ha decretado
  lexicon: οὐδείς / παρέρχομαι / δεδογματισμένων
  rationale: «Pasará jamás» expresa el doble negativo enfático con una formulación natural en español. He preferido «decretado» para δεδογματισμένων por su valor de decisión estable y normativa, coherente con el inglés POB «decreed». «Nada de lo que ha decretado por él» sigue la frase griega de manera inteligible; «por él» mantiene la preposición del pasivo griego, aunque en español suene densa, porque la pasiva resultante es parte de la fuerza del original.
- source_word: δεδογματισμένων ὑπ᾿ αὐτοῦ
  english_pob_choice: things decreed by him
  chosen_spanish: lo que ha decretado por él
  alternatives_spanish:
  - las cosas decretadas por él
  - lo decretado por él
  lexicon: δογματίζω / ὑπό + genitivo
  rationale: «Decretado» conserva el carácter de decisión formal. La construcción «por él» refleja el agente del pasivo griego. Aunque «lo decretado por él» sería más fluido, opté por «nada de lo que ha decretado por él» para sostener el nexo con el pronombre indefinido y la negación enfática del versículo.
theological_decisions:
- issue: La afirmación de la soberanía divina frente a toda oposición
  english_pob_reading: When he wills, and as he wills, he will do all things, and not one of the things decreed by him shall ever pass away.
  chosen_spanish_reading: Cuando quiere, y como quiere, hará todas las cosas, y nada de lo que ha decretado por él pasará jamás.
  alternative_spanish_readings:
  - Cuando quiere y como quiere, hará todo, y no pasará jamás ninguna de las cosas que ha decretado.
  - Cuando él quiere y como él quiere, hará todas las cosas, y nada de lo decretado por él pasará jamás.
  rationale: La frase sostiene una soberanía absoluta expresada retóricamente, sin introducir formulaciones doctrinales ajenas. Mantengo el alcance total de πάντα y la negación enfática de οὐδὲν μὴ, de modo que la lectura española conserve la misma fuerza teológica que el inglés POB y el griego.
  doctrine_reference: Providencia divina / soberanía de Dios
translation_notes:
  revision_awareness: El control cruzado reporta alta concordancia entre el texto griego y el POB inglés, y la revisión más reciente indicó que no se necesitaban cambios. Por eso la propuesta española sigue de cerca tanto el texto fuente como la redacción inglesa auditada, sin introducir ajustes de contenido.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el pronombre divino del contexto, sin añadir el nombre propio, porque aquí el texto no presenta el Tetragrámaton ni una cita explícita del nombre.
  - Se preserva la duplicación retórica «poder de su fuerza» para no perder la intensificación semítica/retórica del griego.
  - Se usa puntuación interrogativa y subordinación natural en español, pero se conserva el paralelismo de las tres unidades del original.
