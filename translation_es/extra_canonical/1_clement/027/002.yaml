translation:
  language: es
  text: El que mandó no mentir, mucho más no mentirá él mismo; porque nada es imposible para Dios[a], excepto mentir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque nada es imposible con Dios»; la preposición griega puede expresar relación o esfera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ παραγγείλας μὴ ψεύδεσθαι
  english_pob_choice: He who commanded not to lie
  chosen_spanish: El que mandó no mentir
  alternatives_spanish:
  - El que ordenó no mentir
  - El que mandó que no se mintiera
  lexicon: παραγγέλλω
  rationale: 'La forma griega presenta un participio sustantivado con valor general: «el que mandó». En español, «mandó no mentir» conserva la brevedad y evita añadir un objeto explícito que el griego no tiene. «Ordenó» es posible, pero «mandó» sigue más de cerca el registro breve y exhortativo del original.'
- source_word: μὴ ψεύδεσθαι / ψεύσεται / ψεύσασθαι
  english_pob_choice: not to lie / not lie himself / to lie
  chosen_spanish: no mentir / no mentirá él mismo / mentir
  alternatives_spanish:
  - no decir mentira / no dirá mentira él mismo / decir mentira
  - no mentir / no mentirá él mismo / mentir
  lexicon: ψεύδομαι
  rationale: 'El verbo griego corresponde con naturalidad a «mentir». Se conserva la fuerza total del contraste: quien prohíbe mentir no mentirá. «Él mismo» reproduce el énfasis de αὐτός sin volverlo redundante en exceso.'
- source_word: οὐδὲν γὰρ ἀδύνατον παρὰ τῷ θεῷ
  english_pob_choice: for nothing is impossible with God
  chosen_spanish: porque nada es imposible para Dios
  alternatives_spanish:
  - porque nada es imposible junto a Dios
  - porque nada es imposible con Dios
  lexicon: ἀδύνατον / παρὰ τῷ θεῷ
  rationale: La preposición παρὰ con dativo puede expresar relación personal o esfera; en español, «para Dios» comunica bien la idea de capacidad absoluta sin introducir una expresión extraña. «Con Dios» también es posible, pero aquí «para Dios» suena más natural y mantiene la afirmación general.
- source_word: εἰ μὴ τὸ ψεύσασθαι
  english_pob_choice: except to lie
  chosen_spanish: excepto mentir
  alternatives_spanish:
  - salvo mentir
  - excepto el mentir
  lexicon: εἰ μή
  rationale: 'La cláusula final formula una excepción absoluta: todo es posible para Dios, salvo mentir. En español, «excepto mentir» reproduce la concisión del griego y conserva la tensión lexical de que mentir queda excluido no por incapacidad física, sino por incompatibilidad moral con Dios.'
theological_decisions:
- issue: Si la frase «nada es imposible para Dios» podría sonar absoluta sin la excepción ética final.
  english_pob_reading: for nothing is impossible with God, except to lie
  chosen_spanish_reading: porque nada es imposible para Dios, excepto mentir
  alternative_spanish_readings:
  - porque nada es imposible para Dios
  - porque para Dios nada es imposible, salvo mentir
  rationale: 'El griego mantiene una afirmación máxima de poder divino, pero inmediatamente delimita una imposibilidad moral: Dios no puede mentir. La traducción debe preservar ambas partes sin suavizar la tensión. Por eso se incluye la excepción de manera explícita.'
  doctrine_reference: Tito 1:2; Hebreos 6:18; Números 23:19
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión aplicada que eliminó un objeto implícito añadido («us») en la primera cláusula y ajustó el orden para reflejar mejor el énfasis del griego. La versión española sigue esa corrección al no introducir «nos» ni otro objeto explícito.
  spanish_consistency_notes:
  - Se mantiene «Dios» como traducción de θεός, sin recurso a mayúsculas reverenciales adicionales.
  - 'Se conserva el paralelismo de la fuente: mandato de no mentir, consecuencia reforzada, y excepción final.'
  - «Él mismo» refleja el énfasis de αὐτός sin convertirlo en una paráfrasis explicativa.
