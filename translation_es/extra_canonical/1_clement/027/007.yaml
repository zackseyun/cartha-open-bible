id: 1CLEM.27.7
reference: 1 Clement 27:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: εἰ οἱ οὐρανοὶ διηγοῦνται δόξαν θεοῦ, ποίησιν δὲ χειρῶν αὐτοῦ ἀναγγέλλει τὸ στερέωμα· ἡ ἡμέρα τῇ ἡμέρᾳ ἐρεύγεται ῥῆμα, καὶ νὺξ νυκτὶ ἀναγγέλλει γνῶσιν· καὶ οὐκ εἰσὶν λόγοι οὐδὲ λαλιαί, ὧν οὐχὶ ἀκούονται αἱ φωναὶ αὐτῶν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/027/007.yaml
  text: The heavens declare the glory of God[a], and the firmament proclaims the work of his hands; day to day pours forth speech, and night to night announces knowledge. There are no words or utterances whose voices are not heard.
  footnotes:
  - marker: a
    text: Or 'Since the heavens declare the glory of God, and the firmament proclaims the work of his hands, day pours forth speech to day'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:48Z'
    unchanged: false
    changes_summary: Adjusted word order to reflect the Greek dative expressions more naturally as 'day to day' and 'night to night,' and split the final clause into a new sentence for clearer formal English. Retained 'firmament,' 'proclaims,' and 'utters/voices' sense without paraphrase.
translation:
  language: es
  text: Los cielos declaran la gloria de Dios[a], y el firmamento proclama la obra de sus manos; de día a día derrama palabra, y de noche a noche anuncia conocimiento. No hay palabras ni discursos cuyos sonidos no se oigan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los cielos declaran la gloria de Dios, y el firmamento proclama la obra de sus manos; de día a día derrama palabra...». El griego de base presenta una secuencia citacional emparentada con el Salmo 19, y la puntuación puede leerse como una sola afirmación continua.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐρανοί
  english_pob_choice: heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: οὐρανός
  rationale: Conservo el plural, como en el griego y en el inglés POB, porque aquí el salmo personifica los cielos como testigos múltiples de la creación.
- source_word: διηγοῦνται
  english_pob_choice: declare
  chosen_spanish: declaran
  alternatives_spanish:
  - anuncian
  - proclaman
  lexicon: διηγέομαι
  rationale: '"Declaran" reproduce bien la idea de hacer manifiesta la gloria; evita sobrecargar el verbo con matices narrativos que el contexto no exige.'
- source_word: δόξαν θεοῦ
  english_pob_choice: the glory of God
  chosen_spanish: la gloria de Dios
  alternatives_spanish:
  - la gloria de Dios
  lexicon: δόξα
  rationale: Mantengo la fórmula bíblica directa y transparente, sin suavizarla a "honor" o "majestad".
- source_word: στερέωμα
  english_pob_choice: firmament
  chosen_spanish: el firmamento
  alternatives_spanish:
  - la bóveda celeste
  - el firmamento
  lexicon: στερέωμα
  rationale: Conservo "firmamento" porque el POB inglés también preserva el término tradicional y porque corresponde con la resonancia de la cita salmódica.
- source_word: ἀναγγέλλει
  english_pob_choice: proclaims / announces
  chosen_spanish: proclama / anuncia
  alternatives_spanish:
  - proclama
  - anuncia
  lexicon: ἀναγγέλλω
  rationale: Uso dos verbos distintos, como en el inglés auditado, para reflejar la repetición retórica sin hacerla idéntica de manera mecánica.
- source_word: ἡμέρα τῇ ἡμέρᾳ
  english_pob_choice: day to day
  chosen_spanish: de día a día
  alternatives_spanish:
  - día a día
  - de un día a otro
  lexicon: dative temporal
  rationale: '"De día a día" refleja la relación dativa/relacional del griego con un español claro y formal; evita una paráfrasis excesiva.'
- source_word: ἐρεύγεται ῥῆμα
  english_pob_choice: pours forth speech
  chosen_spanish: derrama palabra
  alternatives_spanish:
  - derrama discurso
  - hace fluir palabra
  lexicon: ἐρεύγομαι / ῥῆμα
  rationale: '"Derrama" conserva la imagen de abundancia y salida continua. "Palabra" es más concisa y bíblicamente natural en español que "discurso" aquí.'
- source_word: νὺξ νυκτὶ
  english_pob_choice: night to night
  chosen_spanish: de noche a noche
  alternatives_spanish:
  - noche a noche
  - de una noche a otra
  lexicon: dative temporal
  rationale: Paralelo a "de día a día", mantiene la simetría del texto griego y la fluidez en español.
- source_word: γνῶσιν
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - conocimiento
  - saber
  lexicon: γνῶσις
  rationale: '"Conocimiento" preserva el sustantivo abstracto y el registro bíblico; "saber" sería más coloquial.'
- source_word: λόγοι / λαλιαί / φωναί
  english_pob_choice: words or utterances / voices
  chosen_spanish: palabras ni discursos / sonidos
  alternatives_spanish:
  - palabras ni discursos / voces
  - palabras ni expresiones / voces
  lexicon: λόγος / λαλιά / φωνή
  rationale: '"Palabras ni discursos" refleja la doble serie del griego. "Sonidos" traduce de forma funcional el sentido de φωναί como aquello audible, evitando una repetición torpe de "voces" en la cláusula final.'
theological_decisions:
- issue: Cita del Salmo como testimonio de la creación
  english_pob_reading: The heavens declare the glory of God...
  chosen_spanish_reading: Los cielos declaran la gloria de Dios...
  alternative_spanish_readings:
  - Los cielos proclaman la gloria de Dios...
  rationale: Conservo el tono de cita sálmica y la afirmación de que la creación comunica la gloria divina sin introducir explicaciones teológicas adicionales.
  doctrine_reference: Salmo 19:1-3; Romanos 1:20
- issue: Mantenimiento del paralelismo retórico de día/noche
  english_pob_reading: day to day pours forth speech, and night to night announces knowledge
  chosen_spanish_reading: de día a día derrama palabra, y de noche a noche anuncia conocimiento
  alternative_spanish_readings:
  - día a día derrama palabra, y noche a noche anuncia conocimiento
  rationale: Respeto el paralelismo del pasaje y el movimiento continuo del testimonio creado, sin convertirlo en un comentario interpretativo.
  doctrine_reference: Salmo 19:2-3
- issue: Cláusula final sobre lo inaudible
  english_pob_reading: There are no words or utterances whose voices are not heard
  chosen_spanish_reading: No hay palabras ni discursos cuyos sonidos no se oigan
  alternative_spanish_readings:
  - No hay palabras ni discursos cuya voz no se oiga
  - No hay palabras ni expresiones que no se oigan
  rationale: La estructura negativa se mantiene, y "sonidos" permite que la frase resulte natural en español sin perder la idea de audibilidad universal.
  doctrine_reference: Salmo 19:3
translation_notes:
  revision_awareness: La revisión reciente corrigió el arranque para no depender de un 'si' espurio de OCR y afinó los valores relacionales de 'day to day' y 'night to night'. La versión española sigue esa lectura continua de cita salmódica y evita convertir el inicio en una cláusula subordinada. También conserva el paralelismo y separa la afirmación final como oración independiente.
  spanish_consistency_notes:
  - Mantengo 'Dios' y no 'Señor' porque el texto griego dice θεοῦ y la cita corresponde al Salmo 19 en forma directa.
  - '''Firmamento'' se conserva por consistencia con el POB inglés y por la intertextualidad salmódica.'
  - Uso 'de día a día' / 'de noche a noche' para reflejar la dative relation without over-paraphrase.
  - La nota al pie está anclada en 'Dios[a]' para ofrecer la variante de puntuación/lectura sin dejar marcadores huérfanos.
