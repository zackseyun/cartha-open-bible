review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego y el audit trail inglés: vocativo afectuoso, ὑπερασπισμός como «defensa», παιδεύω como disciplina/corrección formativa, δεσπότης como título de autoridad, y la finalidad de recibir misericordia mediante la disciplina santa. La principal desviación es estilística-sintáctica en «Ve, amados», ya que βλέπετε es plural y en español natural debe ser «Vean» o «Miren».'
  spanish_quality_summary: El texto es claro y digno, pero «Ve, amados» resulta gramaticalmente incorrecto para el plural y poco natural en español eclesial general. También mejora la naturalidad «siendo un buen Padre» frente a «siendo un Padre bueno», sin alterar el sentido. El resto del texto es sólido y legible.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Maestro» para δεσπότου sigue el audit trail documentado. «Misericordia», «disciplina» y «Padre» están bien alineados con las decisiones léxicas y teológicas dadas.
  issues:
  - severity: medium
    issue: 'Imperativo inicial en singular: «Ve, amados»'
    rationale: El griego βλέπετε es segunda persona plural. En español debe reflejarse con «Vean» o «Miren». «Ve» es singular y rompe tanto la fidelidad gramatical como la naturalidad.
  - severity: low
    issue: Orden adjetival en «un Padre bueno»
    rationale: No es incorrecto, pero «un buen Padre» suena más natural y fluido en español general manteniendo exactamente el mismo sentido.
  revised_spanish_text: Vean, amados, cuán grande defensa hay para los que son disciplinados por el Maestro. Porque, siendo un buen Padre, él nos disciplina para que recibamos misericordia mediante su santa disciplina.
  revision_rationale: Se corrige el imperativo inicial al plural para reflejar βλέπετε y mejorar la gramática española. Además, se ajusta «un Padre bueno» a «un buen Padre» por mayor naturalidad sin cambio semántico. No se requieren notas.
