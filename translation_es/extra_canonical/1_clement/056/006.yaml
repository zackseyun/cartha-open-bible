id: 1CLEM.56.6
reference: 1 Clement 56:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: Καὶ πάλιν λέγει· Μακάριος ἄνθρωπος, ὃν ἤλεγξεν ὁ κύριος· νουθέτημα δὲ παντοκράτορος μὴ ἀπαναίνου· αὐτὸς γὰρ ἀλγεῖν ποιεῖ, καὶ πάλιν ἀποκαθίστησιν·
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/056/006.yaml
  text: 'And again it says:


    “Blessed is the man whom the Lord reproves;

    and do not reject the admonition of the Almighty.

    For he causes pain[a], and then restores;'
  footnotes:
  - marker: a
    text: Or 'whom the Lord has reproved'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:12Z'
    unchanged: false
    changes_summary: Removed the redundant 'again' at the end of the final clause to reflect καὶ πάλιν ἀποκαθίστησιν more naturally as 'and then restores'/'restores' without duplication, while preserving the sense. No other changes needed.
translation:
  language: es
  text: 'Y otra vez dice:


    «Bienaventurado el hombre a quien Yahvé reprende[a];

    no rechaces la amonestación del Todopoderoso.

    Porque él causa dolor, y luego restaura;»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a quien Yahvé ha reprendido».
    reason: alternative_reading
lexical_decisions:
- source_word: Μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Dichoso
  - Feliz
  lexicon: μακάριος
  rationale: «Bienaventurado» preserva el tono bíblico y declarativo de la bienaventuranza sin sonar excesivamente coloquial. «Dichoso» sería posible, pero aquí el registro litúrgico de Job/1 Clement favorece «bienaventurado».
- source_word: ἄνθρωπος
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: ἄνθρωπος
  rationale: El griego usa un sustantivo masculino genérico; «el hombre» conserva la forma proverbial del texto fuente y la correspondencia con la cita de Job. «La persona» o «el ser humano» suavizarían el eco escritural.
- source_word: ἤλεγξεν
  english_pob_choice: reproves
  chosen_spanish: reprende
  alternatives_spanish:
  - corrige
  - reprocha
  lexicon: ἐλέγχω
  rationale: La revisión del inglés optó por presente gnómico («reproves»). En español, «reprende» expresa mejor la acción correctiva continua y mantiene la fuerza exhortativa del contexto. «Corrige» sería más interpretativo; «reprocha» desplaza el matiz hacia censura verbal.
- source_word: νουθέτημα
  english_pob_choice: admonition
  chosen_spanish: amonestación
  alternatives_spanish:
  - advertencia
  - instrucción
  lexicon: νουθέτημα
  rationale: «Amonestación» conserva el matiz de advertencia correctiva y disciplinaria. «Advertencia» pierde parte del peso exhortativo; «instrucción» sería demasiado neutral.
- source_word: παντοκράτορος
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  lexicon: παντοκράτωρ
  rationale: «Todopoderoso» sigue la opción del POB inglés y es idiomático en español bíblico. «Omnipotente» es correcto, pero menos natural aquí.
- source_word: ἀπαναίνου
  english_pob_choice: do not reject
  chosen_spanish: no rechaces
  alternatives_spanish:
  - no desprecies
  - no rechaces de plano
  lexicon: ἀπανάομαι
  rationale: «No rechaces» reproduce con claridad la prohibición sin añadir matices no presentes. «No desprecies» intensificaría indebidamente el gesto; «no rechaces de plano» es demasiado explicativo.
- source_word: ἀλγεῖν ποιεῖ
  english_pob_choice: he causes pain
  chosen_spanish: causa dolor
  alternatives_spanish:
  - hace sufrir
  - produce dolor
  lexicon: ἀλγέω + ποιέω
  rationale: La construcción causal se vierte de forma directa con «causa dolor», manteniendo el valor fuerte del verbo griego. «Hace sufrir» es posible, pero añade una interpretación más interpersonal; «produce dolor» suena menos bíblico.
- source_word: ἀποκαθίστησιν
  english_pob_choice: restores
  chosen_spanish: restaura
  alternatives_spanish:
  - restablece
  - vuelve a poner en su lugar
  lexicon: ἀποκαθίστημι
  rationale: «Restaura» es fiel, conciso y idiomático; conserva la idea de devolver a un estado anterior. «Restablece» también funciona, pero «restaura» equilibra mejor el paralelismo con el inicio de la cláusula.
theological_decisions:
- issue: El sujeto divino aparece como κύριος en la cita bíblica y ως παντοκράτωρ en la segunda cláusula.
  english_pob_reading: Lord ... the Almighty
  chosen_spanish_reading: Yahvé ... el Todopoderoso
  alternative_spanish_readings:
  - el Señor ... el Todopoderoso
  - Yahvé ... el Omnipotente
  rationale: Según la terminología del proyecto, κύριος que cita o alude al nombre divino debe verterse como «Yahvé» en el texto principal. Se conserva «el Todopoderoso» para παντοκράτωρ, manteniendo la distinción semántica entre nombre divino y título.
  doctrine_reference: Terminología del proyecto para יהוה / κύριος en alusiones al nombre divino
- issue: La secuencia «causa dolor, y luego restaura» mantiene una tensión teológica sobre la disciplina divina.
  english_pob_reading: For he causes pain, and then restores;
  chosen_spanish_reading: Porque él causa dolor, y luego restaura;
  alternative_spanish_readings:
  - Porque él hiere, y luego restaura;
  - Porque él aflige, y luego restaura;
  rationale: Se preserva la tensión del original sin suavizarla. «Causa dolor» evita sustituir el verbo por una glosa más tradicional pero menos precisa; además conserva el paralelismo con la restitución posterior.
  doctrine_reference: Disciplina divina y restauración en la sabiduría bíblica
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés, que ajustó el final de «and then restores again» a «and then restores» para evitar redundancia. La versión española refleja ese cambio con «y luego restaura», sin añadir un equivalente repetitivo de «again». También se consideró la decisión revisada de usar presente gnómico en la primera cláusula; por eso se eligió «reprende» en lugar de una forma pasada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como equivalente principal de κύριος cuando el contexto cita el nombre divino.
  - Se usa «Todopoderoso» para παντοκράτωρ, en coherencia con la terminología estándar del proyecto.
  - No se introdujo una glosa explícita para el aoristo gnómico; el presente español cubre naturalmente la fuerza proverbial del original.
  - Se conservó el paralelismo sintáctico de las tres cláusulas del texto griego, evitando paráfrasis amplificadas.
