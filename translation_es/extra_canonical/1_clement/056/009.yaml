review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura paralela del griego y el sentido general de rescate en hambre y guerra. Sin embargo, dos elecciones debilitan la fidelidad y la legibilidad: «En hambre» suena poco natural en español, y «de la mano de hierro» preserva demasiado literalmente una expresión que en español resulta opaca y además pierde la metonimia bélica que el contexto y el audit trail inglés mantienen como «sword/espada».'
  spanish_quality_summary: El texto es breve y digno, pero necesita una reparación menor para sonar natural y claro en español eclesial general. «En tiempo de hambre» o «En la hambruna» sonaría mejor que «En hambre». La segunda línea debe conservar el hebraísmo de «mano» si se desea, pero con «espada» en vez de «hierro» para evitar una imagen confusa en español.
  glossary_alignment: No hay términos del glosario principal en disputa. La revisión propuesta mantiene un registro formal y conserva el paralelismo. En la frase final, «espada» respeta mejor la decisión inglesa documentada y el sentido metonímico contextual de σιδήρου que «hierro» en español.
  issues:
  - severity: medium
    issue: «En hambre» es poco idiomático en español
    rationale: Aunque calca la concisión griega, en español general y bíblico contemporáneo suena forzado. «En tiempo de hambre» conserva el sentido sin paráfrasis excesiva.
  - severity: medium
    issue: «de la mano de hierro» resulta opaco y pierde claridad contextual
    rationale: El griego cita un hebraísmo de Job 5:20. En español, «hierro» sin «espada» no comunica bien el peligro bélico. Dado que el English POB terminó con «hand of the sword», la mejor correspondencia española es «de la mano de la espada», con nota explicativa.
  revised_spanish_text: 'En tiempo de hambre te librará de la muerte,


    y en guerra te librará de la mano de la espada[a].'
