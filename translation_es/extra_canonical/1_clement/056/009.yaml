- from: 'En hambre te librará de la muerte,

    y en guerra te librará de la mano de hierro[a].'
  to: 'En tiempo de hambre te librará de la muerte,


    y en guerra te librará de la mano de la espada[a].'
  rationale: Se ajusta «En hambre» a «En tiempo de hambre» por naturalidad española sin alterar el sentido. Se reemplaza «de la mano de hierro» por «de la mano de la espada» para reflejar mejor la revisión final del English POB, mantener el hebraísmo de «mano» y evitar una imagen confusa en español; la nota explica el modismo.
