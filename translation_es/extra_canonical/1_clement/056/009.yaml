  text: ἐν λιμῷ ῥύσεταί σε ἐκ θανάτου, ἐν πολέμῳ δὲ ἐκ χειρὸς σιδήρου λύσει σε·
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/056/009.yaml
  text: 'In famine he will rescue you from death,

    and in war he will deliver you from the hand of the sword[a].'
  footnotes:
  - marker: a
    text: Or 'from the hand of the sword'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:13Z'
    unchanged: false
    changes_summary: 'Revised the second line for closer lexical accuracy: changed ''free you from the power of the sword'' to ''deliver you from the hand of the sword,'' reflecting ἐκ χειρὸς σιδήρου more directly and preserving the formal register.'
translation:
  language: es
  text: 'En tiempo de hambre te librará de la muerte,


    y en guerra te librará de la mano de la espada[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «de la mano de la espada». La expresión conserva un hebraísmo del trasfondo de Job 5:20; «mano» comunica poder o alcance de la espada.
    reason: clarify_hebraism
lexical_decisions:
- source_word: ἐν λιμῷ
  english_pob_choice: In famine
  chosen_spanish: En hambre
  alternatives_spanish:
  - En tiempo de hambre
  - En una hambruna
  lexicon: λιμός
  rationale: 'El griego usa un sustantivo simple de condición: ‘hambre/famine’. ‘En hambre’ conserva la concisión proverbial del original y encaja con el paralelismo breve del verso.'
- source_word: ῥύσεταί σε
  english_pob_choice: he will rescue you
  chosen_spanish: te librará
  alternatives_spanish:
  - te rescatará
  - te salvará
  lexicon: ῥύομαι
  rationale: ῥύομαι expresa librar, rescatar o sacar de un peligro. ‘Librará’ mantiene el matiz de liberación de una amenaza concreta sin cargarlo con un registro excesivamente teológico.
- source_word: ἐκ θανάτου
  english_pob_choice: from death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - de morir
  - de la muerte
  lexicon: θάνατος
  rationale: 'Se conserva el complemento directo de procedencia/salida en español de forma natural: ‘de la muerte’.'
- source_word: ἐν πολέμῳ
  english_pob_choice: in war
  chosen_spanish: en guerra
  alternatives_spanish:
  - en tiempo de guerra
  - en batalla
  lexicon: πόλεμος
  rationale: ‘En guerra’ mantiene la forma breve y paralela del griego. Es idiomático en español y conserva el sentido general de conflicto bélico.
- source_word: λύσει σε
  english_pob_choice: he will deliver you
  chosen_spanish: te librará
  alternatives_spanish:
  - te liberará
  - te salvará
  lexicon: λύω
  rationale: En este contexto λύω significa desatar/liberar de un peligro. ‘Te librará’ reproduce bien el valor de liberación y evita duplicar innecesariamente un registro distinto al primer cola.
- source_word: ἐκ χειρὸς σιδήρου
  english_pob_choice: from the hand of the sword
  chosen_spanish: de la mano de hierro
  alternatives_spanish:
  - del poder de la espada
  - de la mano de la espada
  lexicon: χείρ, σίδηρος
  rationale: 'Se opta por una traducción más cercana al griego y al hebraísmo subyacente: χειρὸς = ‘mano’ y σιδήρου = ‘de hierro’. Así se preserva la metáfora textual aun cuando suene extraña en español. El audit trail inglés mostró una oscilación entre ‘hand of the sword’ y ‘power of the sword’; el griego apoya mejor una forma literal con ‘hierro’, probablemente metonimia del arma.'
theological_decisions:
- issue: Preservar el carácter proverbial y no doctrinal del versículo
  english_pob_reading: A practical promise of rescue in famine and war
  chosen_spanish_reading: Una promesa práctica de libramiento en hambre y guerra
  alternative_spanish_readings:
  - Una promesa de salvación espiritual
  - Una afirmación general de protección
  rationale: El pasaje funciona como proverbio de protección concreta, no como formulación doctrinal específica. La traducción evita espiritualizarlo indebidamente y mantiene el alcance circunstancial del texto.
  doctrine_reference: Sabiduría/Proverbial instruction; no specific dogmatic locus
translation_notes:
  revision_awareness: El texto inglés pasó por una revisión que cambió una solución más interpretativa (‘from the power of the sword’) a una más literal (‘from the hand of the sword’). La versión española sigue la lectura más cercana al griego final y, al mismo tiempo, preserva la metáfora mediante ‘mano de hierro’, que refleja directamente χειρὸς σιδήρου sin normalizarla prematuramente.
  spanish_consistency_notes:
  - Se mantuvo ‘librará’ en ambas líneas para reproducir el paralelismo y evitar introducir matices distintos sin apoyo textual.
  - ‘Hierro’ se conservó literalmente en el cuerpo del texto, mientras que la nota aclara su función metonímica probable en el hebraísmo.
  - Se evitó ‘SEÑOR’ u otra sustitución porque el texto griego no contiene el Tetragrámaton en este versículo.
  - El registro es formal pero natural, apto para lectura pública.
