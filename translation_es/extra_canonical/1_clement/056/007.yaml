lexical_decisions:
- source_word: ἔπαισεν
  english_pob_choice: he struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - pegó
  lexicon: πάσσω / παίω
  rationale: El aoristo ἔπαισεν expresa una acción puntual de golpear o herir. «Golpeó» conserva la fuerza verbal sin añadir un matiz más fuerte de violencia que el griego no exige necesariamente en este contexto.
- source_word: αἱ χεῖρες αὐτοῦ
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos de él
  lexicon: χείρ
  rationale: La posesión se expresa de forma natural en español con «sus manos». Mantiene la referencia al agente sin sobrecargar la frase.
- source_word: ἰάσαντο
  english_pob_choice: healed
  chosen_spanish: sanaron
  alternatives_spanish:
  - curaron
  - fueron sanadas
  lexicon: ἰάομαι
  rationale: El verbo es transitivo y aquí el sujeto son «sus manos», pero el español permite una formulación natural en voz activa intransitiva como «sanaron», que comunica el resultado curativo sin introducir un objeto no presente en el texto griego. Se evita «fueron sanadas» por sonar más forzado en este giro.
theological_decisions:
- issue: Relación entre el golpe y la sanidad en una frase gnómica breve
  english_pob_reading: he struck, and his hands healed.
  chosen_spanish_reading: golpeó, y sus manos sanaron.
  alternative_spanish_readings:
  - golpeó, y sus manos curaron
  - golpeó, y sus manos sanaron a él
  rationale: El griego presenta dos acciones unidas de forma compacta. En español se preserva la tensión entre el acto de herir/golpear y el efecto sanador, sin resolver de manera interpretativa si debe añadirse un objeto explícito. La lectura mantiene la ambigüedad controlada del original y evita sobreinterpretar la transitividad.
  doctrine_reference: No aplica una doctrina específica; se trata de una decisión sintáctico-semántica sobre un verbo de sanidad.
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación entre añadir un objeto implícito («him») para aclarar la transitividad de ἰάομαι y retirarlo para mantenerse más cerca del griego. La versión española sigue la revisión más reciente y conserva la ambigüedad sin añadir un objeto ausente en el texto.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» fuera de este versículo porque no aparecen en el texto fuente.
  - Se evita «sanó» con sujeto implícito porque el sujeto explícito es «sus manos».
  - La nota al pie preserva la lectura alternativa sin introducir terminología doctrinal adicional.
