translation:
  language: es
  text: «Porque Yahvé disciplina a quien ama, y azota a todo hijo que recibe.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dueño
  lexicon: κύριος
  rationale: En este dicho sapiencial/citacional, el griego usa κύριος en forma de cita bíblica; en español, la forma tradicional «el Señor» comunica con naturalidad la referencia divina y mantiene el tono proverbial del texto. No se usa «Yahvé» aquí porque el enunciado funciona como cita reconocible en su forma griega y la equivalencia auditada del inglés POB también emplea «the Lord».
- source_word: παιδεύει
  english_pob_choice: disciplines
  chosen_spanish: disciplina
  alternatives_spanish:
  - corrige
  - educa
  - castiga
  lexicon: παιδεύω
  rationale: «Disciplina» conserva la idea de formación correctiva y no se reduce a castigo puro. «Corrige» y «educa» captan solo parte del campo semántico; «castiga» sería demasiado fuerte y estrecho para el contexto.
- source_word: μαστιγοῖ
  english_pob_choice: scourges
  chosen_spanish: azota
  alternatives_spanish:
  - flagela
  - castiga con azotes
  lexicon: μαστιγόω
  rationale: «Azota» reproduce con fuerza y claridad el verbo concreto de golpear con látigo/azotes. «Flagela» es correcto pero más técnico; «castiga con azotes» es más explicativo y menos directo.
- source_word: υἱόν
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - hijo varón
  lexicon: υἱός
  rationale: Se mantiene «hijo» para conservar la forma breve y proverbial del texto. En español bíblico puede representar filiación y pertenencia, no solo sexo biológico.
- source_word: παραδέχεται
  english_pob_choice: receives
  chosen_spanish: recibe
  alternatives_spanish:
  - acoge
  - acepta
  lexicon: παραδέχομαι
  rationale: «Recibe» sigue de cerca el valor del verbo y preserva la correspondencia con el inglés POB. «Acoge» añade matiz relacional; «acepta» desplaza el sentido hacia aprobación.
theological_decisions:
- issue: Relación entre disciplina y amor divino
  english_pob_reading: The Lord disciplines the one whom he loves
  chosen_spanish_reading: El Señor disciplina al que ama
  alternative_spanish_readings:
  - El Señor corrige al que ama
  - El Señor disciplina a quien ama
  rationale: La formulación mantiene la tensión bíblica entre amor y disciplina sin suavizarla. «Disciplina» preserva el sentido formativo y correctivo que el inglés POB ya fijó.
  doctrine_reference: Hebreos 12:6; Proverbios 3:12
- issue: Intensidad de la segunda cláusula
  english_pob_reading: and he scourges every son whom he receives
  chosen_spanish_reading: y azota a todo hijo que recibe
  alternative_spanish_readings:
  - y flagela a todo hijo que recibe
  - y castiga con azotes a todo hijo que recibe
  rationale: Se conserva la dureza del verbo sin atenuarlo. El texto no pide una suavización pastoral; el paralelo de la cita exige mantener la aspereza retórica.
  doctrine_reference: Hebreos 12:6
- issue: Forma del sujeto divino en cita escritural
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Dios
  rationale: Aunque el proyecto suele preferir «Yahvé» para יהוה, aquí el texto llega como cita griega ya integrada en una formulación bíblica tradicional. «El Señor» evita una decisión innecesaria en un pasaje breve y mantiene la intertextualidad con la cita recibida.
  doctrine_reference: Uso de κύριος en cita de Proverbios 3:12 / Hebreos 12:6
translation_notes:
  revision_awareness: El inglés POB fue dejado sin cambios en la revisión más reciente y el cotejo cruzado reporta alta concordancia; por ello, la propuesta española sigue de cerca la sintaxis y las elecciones léxicas auditadas del inglés, procurando fidelidad directa al griego sin añadir glosas.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y breve, acorde con la forma proverbial del versículo.
  - No se introduce «Yahvé» porque el sujeto aparece en una cita griega ya convencionalizada como «el Señor» en español bíblico y en el audit trail inglés.
  - «Azota» conserva la aspereza del verbo griego y la fuerza del paralelo, sin convertirlo en una paráfrasis interpretativa.
