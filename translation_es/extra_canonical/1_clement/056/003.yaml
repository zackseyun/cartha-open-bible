translation:
  language: es
  text: 'Porque así dice la palabra santa: «El Señor me disciplinó severamente[a], y no me entregó a la muerte.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ciertamente me disciplinó»; el griego intensifica la acción más que expresar simple certeza.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ἅγιος λόγος
  english_pob_choice: the holy word
  chosen_spanish: la palabra santa
  alternatives_spanish:
  - la santa palabra
  - la palabra sagrada
  lexicon: λόγος
  rationale: Se conserva el sustantivo verbal ‘palabra’ y el calificativo ‘santa’ para reflejar el griego sin convertirlo en una perífrasis más libre. ‘Sagrada’ sería posible, pero ‘santa’ reproduce mejor el eco bíblico y la formulación del texto fuente.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: κύριος
  rationale: Aunque el proyecto español prefiere ‘Yahvé’ para el nombre divino, aquí el texto fuente cita la forma septuagintal con κύριος dentro de una fórmula escritural ya fijada en la tradición citacional. ‘El Señor’ mantiene la relación inmediata con la cita poética y la lectura auditable del audit trail en inglés.
- source_word: Παιδεύων ἐπαίδευσέν με
  english_pob_choice: disciplined me severely
  chosen_spanish: me disciplinó severamente
  alternatives_spanish:
  - me disciplinó con severidad
  - me corrigió severamente
  lexicon: παιδεύω
  rationale: ‘Disciplined me severely’ sigue la revisión aprobada del inglés, que entiende la duplicación verbal como intensificación. En español, ‘severamente’ conserva esa fuerza intensiva sin introducir una certeza modal ajena al griego.
- source_word: τῷ θανάτῳ οὐ παρέδωκέν με
  english_pob_choice: he did not hand me over to death
  chosen_spanish: no me entregó a la muerte
  alternatives_spanish:
  - no me entregó a la muerte
  - no me abandonó a la muerte
  lexicon: παραδίδωμι
  rationale: ‘Entregar a la muerte’ es la equivalencia más directa y transparente en español para παραδίδωμι en este contexto. ‘Abandonar’ suavizaría la imagen y perdería el matiz de acto de entrega/paso de poder.
theological_decisions:
- issue: Fórmula divina en una cita bíblica dentro de 1 Clement
  english_pob_reading: the holy word / the Lord
  chosen_spanish_reading: la palabra santa / el Señor
  alternative_spanish_readings:
  - la santa palabra / Yahvé
  rationale: No se traslada mecánicamente a ‘Yahvé’ porque el griego cita un texto escritural con κύριος y el inglés POB preservó ‘the Lord’. La decisión mantiene la forma citacional y evita desdibujar el vínculo intertextual con la versión griega citada en 1 Clement.
  doctrine_reference: Intertextualidad bíblica y uso del título divino en citas septuagintales
translation_notes:
  revision_awareness: La revisión más reciente del inglés descartó ‘surely disciplined me’ y confirmó ‘disciplined me severely’ para reflejar la fuerza intensiva de παιδεύων ἐπαίδευσέν. La versión española adopta esa misma lectura y evita una traducción modal de ‘surely’ que sería engañosa.
  spanish_consistency_notes:
  - Se mantiene la voz de cita escritural con comillas españolas y puntuación final dentro de la cita por tratarse de una declaración completa.
  - ‘Severamente’ se usa como adverbio de intensidad, no como juicio moral adicional.
  - No se introduce ‘Cristo’, ‘Mesías’ ni otra terminología no presente en el versículo.
