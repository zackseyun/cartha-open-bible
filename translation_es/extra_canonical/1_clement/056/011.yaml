translation:
  language: es
  text: 'Te reirás de los injustos y de los sin ley,


    y ciertamente no temerás a las fieras salvajes.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀδίκων
  english_pob_choice: the unrighteous
  chosen_spanish: los injustos
  alternatives_spanish:
  - los injustos y perversos
  - los que hacen injusticia
  lexicon: ἀδικός
  rationale: En español, «injustos» comunica bien el valor moral/jurídico del término y mantiene la contraposición con la conducta recta sin añadir matices no presentes en el griego.
- source_word: ἀνόμων
  english_pob_choice: the lawless
  chosen_spanish: los inicuos
  alternatives_spanish:
  - los sin ley
  - los anárquicos
  - los impíos
  lexicon: ἄνομος
  rationale: «Inicuos» preserva la fuerza moral negativa del griego y evita una traducción demasiado mecánica como «sin ley», que en español puede sonar menos natural y perder el matiz de maldad activa.
- source_word: καταγελάσῃ
  english_pob_choice: you will laugh at
  chosen_spanish: te reirás de
  alternatives_spanish:
  - te burlarás de
  - te reirás contra
  lexicon: καταγελάω
  rationale: «Te reirás de» refleja el gesto de desprecio o triunfo expresado por el verbo, con una construcción natural en español. «Burlarse» intensifica el matiz, pero puede sonar más interpretativo.
- source_word: θηρίων ἀγρίων
  english_pob_choice: wild beasts
  chosen_spanish: las fieras salvajes
  alternatives_spanish:
  - las bestias salvajes
  - los animales feroces
  lexicon: θηρίον / ἄγριος
  rationale: «Fieras salvajes» conserva el tono vívido del griego y mantiene la imagen peligrosa del original. «Bestias salvajes» también es posible, pero «fieras» suena más idiomático en un registro bíblico sobrio.
- source_word: οὐ μὴ φοβηθῇς
  english_pob_choice: you will certainly not fear
  chosen_spanish: no temerás en absoluto
  alternatives_spanish:
  - de ningún modo temerás
  - ciertamente no temerás
  lexicon: οὐ μή + subjuntivo de φοβέομαι
  rationale: La combinación enfática οὐ μή expresa negación fuerte; «no temerás en absoluto» reproduce esa certeza sin forzar una calco demasiado áspero en español.
theological_decisions:
- issue: Tipo de destinatario implícito y fuerza exhortativa/predictiva
  english_pob_reading: You will laugh... and you will certainly not fear...
  chosen_spanish_reading: Te reirás... y no temerás en absoluto...
  alternative_spanish_readings:
  - Reirás... y no temerás...
  - Te alegrarás... y no temerás...
  rationale: El griego usa formas futuras con valor de promesa o seguridad. Se conserva el futuro para mantener el tono oracular y la certeza del resultado, sin convertirlo en imperativo.
  doctrine_reference: Confianza en la vindicación divina y ausencia de temor ante amenazas externas
translation_notes:
  revision_awareness: La revisión más reciente mantuvo el texto inglés sin cambios y el cotejo cruzado mostró alta concordancia; por tanto, no se introducen ajustes textuales ni notas por variantes.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y directo, sin añadir sujeto explícito donde el griego lo omite.
  - Se evita «SEÑOR» o terminología de Tetragrámaton porque este versículo no contiene el nombre divino.
  - Se conserva la duplicación semántica de lo moralmente negativo («injustos» / «inicuos») porque el griego distingue ἀδίκων y ἀνόμων.
