translation:
  language: es
  text: 'Seis veces te librará de aflicciones,


    y en la séptima no te tocará mal alguno.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἑξάκις
  english_pob_choice: Six times
  chosen_spanish: Seis veces
  alternatives_spanish:
  - Sexta vez
  - Seis ocasiones
  lexicon: ἑξάκις
  rationale: La forma adverbial expresa repetición cuantitativa; «seis veces» reproduce de manera natural y fiel el valor del original y del inglés POB.
- source_word: ἐξ ἀναγκῶν
  english_pob_choice: from distresses
  chosen_spanish: de las angustias
  alternatives_spanish:
  - de las aflicciones
  - de las tribulaciones
  - de las necesidades
  lexicon: ἀνάγκη
  rationale: En este contexto, ἀνάγκη comunica opresión, estrechez o aflicción, no solo «necesidad» en sentido neutro. «Angustias» preserva el peso de la prueba sin volverlo más técnico de lo que exige el texto.
- source_word: ἐξελεῖταί σε
  english_pob_choice: he will deliver you
  chosen_spanish: te librará
  alternatives_spanish:
  - te rescatará
  - te sacará
  - te salvará
  lexicon: ἐξαιρέω
  rationale: El verbo señala liberación efectiva de una situación; «librará» es idiomático en español y mantiene el sentido de rescate/liberación del inglés POB.
- source_word: ἐν δὲ τῷ ἑβδόμῳ
  english_pob_choice: and in the seventh
  chosen_spanish: y en la séptima
  alternatives_spanish:
  - y en el séptimo
  - y en la séptima ocasión
  lexicon: ἕβδομος
  rationale: Se conserva la referencia ordinal del griego. «Séptima» concuerda con el sentido elíptico de «ocasión/vez» ya presente en el contexto de conteo repetido.
- source_word: οὐχ ἅψεταί σου κακόν
  english_pob_choice: no evil will touch you
  chosen_spanish: no te tocará mal alguno
  alternatives_spanish:
  - ningún mal te tocará
  - no te alcanzará ningún mal
  - no tocará a ti mal
  lexicon: ἅπτομαι
  rationale: El verbo de contacto se expresa naturalmente con «tocar»; la inversión con «mal alguno» conserva el énfasis del griego y del inglés POB, sin añadir una abstracción innecesaria.
theological_decisions:
- issue: Naturaleza de la promesa de liberación y preservación
  english_pob_reading: A straightforward promise of repeated deliverance and protection from evil.
  chosen_spanish_reading: Una promesa directa de liberación repetida y de preservación frente al mal.
  alternative_spanish_readings:
  - Una promesa proverbial de protección
  - Una afirmación poética de auxilio
  rationale: El texto no introduce una elaboración doctrinal adicional; presenta una declaración de confianza en la intervención protectora de Dios. La traducción evita suavizarla en exceso o convertirla en mera generalidad.
  doctrine_reference: Providencia y protección divina
translation_notes:
  revision_awareness: 'La versión inglesa POB más reciente permanece sin cambios (''unchanged: true''); por ello la redacción española sigue de cerca el texto griego y su equivalente inglés, sin necesidad de ajustar una variante textual o revisar una decisión previa.'
  spanish_consistency_notes:
  - Se mantiene «te» como objeto directo de segunda persona singular, coherente con el inglés POB «you».
  - «Angustias» preserva un registro bíblico comprensible en español moderno y evita diluir ἀνάγκη en un simple «necesidades».
  - No se introduce «SEÑOR» ni otras sustituciones convencionales, porque este versículo no contiene el nombre divino ni una cita explícita de κύριος.
