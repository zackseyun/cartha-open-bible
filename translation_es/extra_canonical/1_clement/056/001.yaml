translation:
  language: es
  text: 'Por tanto, intercedamos también por los que se hallan en alguna transgresión, para que se les concedan la mansedumbre y la humildad, a fin de que cedan no a nosotros, sino a la voluntad de Dios. Pues de este modo su recuerdo delante de Dios y de los santos será fructífero y completo, con compasión.


    Aceptemos la disciplina, ante la cual nadie debe resentirse, amados. La amonestación que nos hacemos unos a otros es buena y sumamente beneficiosa, porque nos une a la voluntad de Dios. Pues así dice la palabra santa:


    «El Señor ciertamente me disciplinó,

    y no me entregó a la muerte».


    «Porque el Señor disciplina al que ama,

    y azota a todo hijo que recibe».


    «Porque», dice, «el justo me disciplinará con misericordia y me reprenderá,

    pero no unja[a] mi cabeza el aceite de los pecadores».


    Y otra vez dice:


    «Bienaventurado el hombre a quien el Señor ha reprendido;

    no rechaces la amonestación del Todopoderoso.

    Pues él causa dolor, y luego restaura otra vez;

    él hirió, y sus manos sanaron.

    Seis veces te librará de angustias,

    y en la séptima no te tocará mal alguno.

    En el hambre te rescatará de la muerte,

    y en la guerra te librará de la mano de hierro.

    Te esconderá del azote de la lengua,

    y ciertamente no temerás los males que sobrevengan.

    Te reirás de los injustos y sin ley,

    y ciertamente no temerás a las fieras salvajes,

    pues las fieras salvajes estarán en paz contigo.

    Entonces sabrás que tu casa estará en paz,

    y la condición de tu tienda no fallará.

    Y sabrás que tu descendencia será mucha,

    y tus hijos como la abundante hierba del campo.

    Y llegarás a la tumba como grano maduro cosechado en su tiempo,

    o como una gavilla de la era recogida a su hora».


    Mirad, amados, cuán grande protección hay para los que son disciplinados por el Amo[b]. Pues, siendo un Padre bueno, nos disciplina para que recibamos misericordia mediante su santa disciplina.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Unja» expresa aquí la petición negativa de tercera persona y mantiene la imagen del aceite sobre la cabeza; se evita reducir el verbo a un simple acto de perfumar.
    reason: lexical_alternative
  - marker: b
    text: «Amo» traduce aquí δεσπότης para conservar la distinción con κύριος, que aparece en las citas bíblicas inmediatas, y para reflejar mejor su matiz de autoridad personal.
    reason: theological_note
lexical_decisions:
- source_word: ἐντύχωμεν
  english_pob_choice: let us intercede
  chosen_spanish: intercedamos
  alternatives_spanish:
  - suplicamos
  - hagamos petición
  lexicon: BDAG
  rationale: El verbo expresa una petición a favor de otros; en este contexto exhortativo, «intercedamos» conserva el sentido orante y vicario mejor que una traducción más genérica.
- source_word: παράπτωμα
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - ofensa
  - trespaso
  - falta
  lexicon: BDAG
  rationale: «Transgresión» mantiene la seriedad moral del término y corresponde bien al sentido de una caída o falta culpable.
- source_word: ἐπιείκεια
  english_pob_choice: gentleness
  chosen_spanish: mansedumbre
  alternatives_spanish:
  - clemencia
  - forbearancia
  - bondad
  lexicon: BDAG
  rationale: En español, «mansedumbre» comunica con naturalidad una actitud de suavidad y concesión; se evita «gentileza» por posible debilidad semántica en este contexto.
- source_word: ταπεινοφροσύνη
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - lowlidad de mente
  - modestia
  lexicon: BDAG
  rationale: Es la equivalencia directa y estable para la virtud cristiana mencionada.
- source_word: εἶξαι
  english_pob_choice: to yield
  chosen_spanish: cedan
  alternatives_spanish:
  - se rindan
  - den paso
  - se sometan
  lexicon: LSJ
  rationale: El infinitivo implica ceder o dar la razón; «cedan» expresa bien la oposición entre someterse a nosotros o a la voluntad de Dios.
- source_word: μνεία
  english_pob_choice: remembrance
  chosen_spanish: recuerdo
  alternatives_spanish:
  - memoria
  - mención
  - conmemoración
  lexicon: BDAG
  rationale: «Recuerdo» mantiene el valor de ser tenidos presentes ante Dios y los santos sin introducir un matiz litúrgico adicional.
- source_word: ἔγκαρπος καὶ τελεία
  english_pob_choice: fruitful and complete
  chosen_spanish: fructífero y completo
  alternatives_spanish:
  - fecundo y perfecto
  - productivo y pleno
  lexicon: LSJ
  rationale: La pareja describe un recuerdo eficaz y llevado a plenitud; la formulación española conserva ambos elementos sin sobredeterminar el segundo adjetivo.
- source_word: ἀναλάβωμεν παιδείαν
  english_pob_choice: let us accept discipline
  chosen_spanish: Aceptemos la disciplina
  alternatives_spanish:
  - recibamos la corrección
  - asumamos la instrucción
  lexicon: BDAG
  rationale: «Disciplina» reúne el campo de corrección, formación y entrenamiento presente en παιδεία, en continuidad con las citas que siguen sobre el castigo divino.
- source_word: νουθέτησις
  english_pob_choice: admonition
  chosen_spanish: amonestación
  alternatives_spanish:
  - instrucción
  - advertencia
  - corrección
  lexicon: BDAG
  rationale: «Amonestación» conserva el sentido de exhortación correctiva entre creyentes y su tono fraternal.
- source_word: κολλᾷ
  english_pob_choice: binds
  chosen_spanish: nos une
  alternatives_spanish:
  - nos ata
  - nos pega
  - nos adhiere
  lexicon: BDAG
  rationale: El verbo es fuerte, pero en español «nos une» transmite la idea relacional de adhesión a la voluntad de Dios de manera natural.
- source_word: ὁ ἅγιος λόγος
  english_pob_choice: the holy word
  chosen_spanish: la palabra santa
  alternatives_spanish:
  - la santa palabra
  - la palabra sagrada
  - la santa Escritura
  lexicon: BDAG
  rationale: Se mantiene el orden y la referencia reverente al dicho inspirado sin convertirlo forzosamente en un título técnico de Escritura.
- source_word: μαστιγοῖ
  english_pob_choice: he scourges
  chosen_spanish: azota
  alternatives_spanish:
  - flagela
  - castiga con azotes
  - latiguea
  lexicon: BDAG
  rationale: «Azota» conserva la fuerza del verbo sin sonar artificialmente técnico en español.
- source_word: παραδέχεται
  english_pob_choice: he receives
  chosen_spanish: recibe
  alternatives_spanish:
  - acepta
  - acoge
  lexicon: BDAG
  rationale: La idea filial es que Dios recibe al hijo; «recibe» es la forma más directa.
- source_word: ἐλέγξει
  english_pob_choice: will reprove me
  chosen_spanish: me reprenderá
  alternatives_spanish:
  - me convencerá
  - me corregirá
  lexicon: BDAG
  rationale: En este marco sapiencial, «reprenderá» conserva la corrección moral y el paralelismo con la disciplina.
- source_word: λιπανάτω
  english_pob_choice: anoint
  chosen_spanish: ungir
  alternatives_spanish:
  - untar
  - perfumar
  - anjar
  lexicon: LSJ
  rationale: El contexto poético del rostro/cabeza y el aceite pide «ungir», que preserva la imagen bíblica sin explicarla de más.
- source_word: παντοκράτωρ
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - el Soberano
  lexicon: BDAG
  rationale: Es la equivalencia estable y comprensible del título divino.
- source_word: ἀπαναίνου
  english_pob_choice: do not reject
  chosen_spanish: no rechaces
  alternatives_spanish:
  - no desprecias
  - no rehúses
  lexicon: BDAG
  rationale: La forma negativa requiere una prohibición clara; «rechaces» refleja bien la resistencia a la corrección.
- source_word: ἀποκαθίστησιν
  english_pob_choice: restores again
  chosen_spanish: restaura otra vez
  alternatives_spanish:
  - restablece de nuevo
  - lo pone en pie otra vez
  lexicon: BDAG
  rationale: 'Conserva la secuencia causal del texto: dolor primero, restauración después.'
- source_word: ἀναγκῶν
  english_pob_choice: distresses
  chosen_spanish: angustias
  alternatives_spanish:
  - aflicciones
  - aprietos
  - tribulaciones
  lexicon: LSJ
  rationale: «Angustias» expresa bien calamidades opresivas y encaja en el ritmo de la cita.
- source_word: μάστιγος γλώσσης
  english_pob_choice: the scourge of the tongue
  chosen_spanish: el azote de la lengua
  alternatives_spanish:
  - la laceración de la lengua
  - la lengua azotadora
  - la flagelación de la lengua
  lexicon: BDAG
  rationale: Se conserva la metáfora vívida sin reducirla a una abstracción como «calumnia».
- source_word: καταγελάσῃ
  english_pob_choice: you will laugh at
  chosen_spanish: Te reirás de
  alternatives_spanish:
  - Te burlarás de
  - Te mofarás de
  lexicon: LSJ
  rationale: La elección mantiene el matiz de desprecio victorioso del pasaje y sigue de cerca la formulación inglesa.
- source_word: δίαιτα
  english_pob_choice: the condition
  chosen_spanish: la condición
  alternatives_spanish:
  - el estado
  - el orden
  - la forma de vida
  lexicon: LSJ
  rationale: En relación con la tienda/habitación, «condición» reproduce la idea de estado u orden sin forzar la imagen.
- source_word: σπέρμα
  english_pob_choice: seed
  chosen_spanish: descendencia
  alternatives_spanish:
  - semilla
  - linaje
  - simiente
  lexicon: BDAG
  rationale: Aunque «semilla» es literal, aquí el paralelo con hijos hace que «descendencia» sea la opción más clara en español.
- source_word: παμβότανον
  english_pob_choice: abundant grass
  chosen_spanish: la abundante hierba
  alternatives_spanish:
  - la hierba abundante
  - la vegetación abundante
  - la hierba del campo en abundancia
  lexicon: LSJ
  rationale: Conserva la imagen agrícola y su naturalidad en español.
- source_word: δεσπότου
  english_pob_choice: the Master
  chosen_spanish: el Maestro
  alternatives_spanish:
  - el Dueño
  - el Señor
  - el Soberano
  lexicon: BDAG
  rationale: Se preserva la distinción frente a κύριος en las citas, y «Maestro» comunica autoridad directa sin confundirlo con el título usual «Señor».
- source_word: εἰς τὸ ἐλεηθῆναι ἡμᾶς
  english_pob_choice: so that we may receive mercy
  chosen_spanish: para que recibamos misericordia
  alternatives_spanish:
  - para que se nos muestre misericordia
  - a fin de que obtengamos misericordia
  lexicon: BDAG
  rationale: La pasiva del infinitivo apunta a misericordia recibida; «recibamos misericordia» suena natural y mantiene la agencia divina implícita.
- source_word: ὁσίας παιδείας
  english_pob_choice: holy discipline
  chosen_spanish: santa disciplina
  alternatives_spanish:
  - disciplina santa
  - sagrada disciplina
  - corrección santa
  lexicon: BDAG
  rationale: «Santa disciplina» conserva el adjetivo teológico y el vínculo con la acción paterna de Dios.
theological_decisions:
- issue: Distinguir δεσπότης de κύριος
  english_pob_reading: the Master
  chosen_spanish_reading: el Maestro
  alternative_spanish_readings:
  - el Señor
  - el Dueño
  - el Soberano
  rationale: El pasaje usa κύριος varias veces en las citas y δεσπότης en la exhortación final; mantener «el Maestro» preserva esa distinción léxica y el acento de autoridad.
  doctrine_reference: Consistencia terminológica y distinción léxica
- issue: Valor de ἐλεηθῆναι ἡμᾶς
  english_pob_reading: so that we may receive mercy
  chosen_spanish_reading: para que recibamos misericordia
  alternative_spanish_readings:
  - para que él tenga misericordia de nosotros
  - para que seamos tratados con misericordia
  rationale: La forma pasiva favorece la idea de misericordia concedida a nosotros, no de una misericordia que nosotros ejercemos.
  doctrine_reference: Gramática del pasivo y teología de la gracia
- issue: Alcance de τοὺς ἁγίους
  english_pob_reading: the saints
  chosen_spanish_reading: los santos
  alternative_spanish_readings:
  - los santos de Dios
  - los santos o fieles
  - el pueblo santo
  rationale: «Los santos» conserva el tono eclesial y la amplitud del grupo referido sin interpretarlo excesivamente.
  doctrine_reference: Uso eclesial del lenguaje de santidad
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto griego normalizado y del audit trail inglés; no fue necesaria una revisión posterior que alterara el sentido. Se atendió especialmente a la distinción entre κύριος y δεσπότης, al valor pasivo de ἐλεηθῆναι ἡμᾶς y al peso de παιδεία/νουθέτησις como disciplina correctiva.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico y eclesial coherente, evitando tecnicismos innecesarios.
  - Se preservó la metáfora de azote/ lengua y disciplina para no suavizar el tono del original.
  - Se usó «misericordia» de manera consistente con la pasiva griega y el audit trail inglés.
  - Se conservaron las citas poéticas con puntuación y cortes versales naturales en español.
