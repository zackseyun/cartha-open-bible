translation:
  language: es
  text: Aceptemos la disciplina, ante la cual nadie debe resentirse, amados. La amonestación que nos damos unos a otros es buena y sumamente provechosa, porque nos une firmemente a la voluntad de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παιδείαν
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - corrección
  - instrucción
  lexicon: παιδεία
  rationale: La POB en inglés eligió el campo de ‘discipline’, que en español se expresa con naturalidad y fuerza por ‘disciplina’. ‘Corrección’ estrecha el matiz a reprensión; ‘instrucción’ pierde el aspecto formativo y correctivo implícito.
- source_word: ἀναλάβωμεν
  english_pob_choice: Let us accept
  chosen_spanish: Aceptemos
  alternatives_spanish:
  - Recibamos
  - Acojamos
  lexicon: ἀναλαμβάνω
  rationale: El verbo griego invita a tomar sobre uno mismo o asumir; ‘Aceptemos’ transmite bien la exhortación colectiva sin volverla mecánica. ‘Recibamos’ es posible, pero puede sonar más pasivo; ‘Acojamos’ resalta la bienvenida, no tanto la asunción de la disciplina.
- source_word: νουθέτησις
  english_pob_choice: admonition
  chosen_spanish: amonestación
  alternatives_spanish:
  - exhortación
  - corrección
  lexicon: νουθέτησις
  rationale: ‘Amonestación’ conserva el valor de advertencia y corrección fraterna que la POB expresa con ‘admonition’. ‘Exhortación’ suaviza demasiado; ‘corrección’ puede sonar más dura de lo que el contexto exige.
- source_word: ὑπεράγαν ὠφέλιμος
  english_pob_choice: exceedingly beneficial
  chosen_spanish: sumamente provechosa
  alternatives_spanish:
  - extraordinariamente útil
  - muy beneficiosa
  lexicon: ὑπεράγαν + ὠφέλιμος
  rationale: ‘Sumamente provechosa’ mantiene el énfasis intensivo de ὑπεράγαν y el beneficio práctico de ὠφέλιμος. ‘Muy beneficiosa’ es correcta, pero menos enfática; ‘extraordinariamente útil’ suena menos idiomático en este registro.
- source_word: κολλᾷ
  english_pob_choice: it binds us
  chosen_spanish: nos ata
  alternatives_spanish:
  - nos une
  - nos liga
  lexicon: κολλάω
  rationale: La imagen verbal es de adhesión fuerte. ‘Nos ata’ reproduce con claridad la fuerza vinculante del texto y corresponde al ‘binds us’ inglés. ‘Nos une’ es más general y ‘nos liga’ puede sonar regional o menos natural.
- source_word: τῷ θελήματι τοῦ θεοῦ
  english_pob_choice: the will of God
  chosen_spanish: la voluntad de Dios
  alternatives_spanish:
  - el querer de Dios
  - la voluntad divina
  lexicon: θέλημα
  rationale: La POB usa la expresión estándar ‘will of God’; en español, ‘la voluntad de Dios’ es la forma más transparente y fiel. ‘El querer de Dios’ es posible, pero menos natural aquí; ‘voluntad divina’ pierde la referencia personal explícita a Dios.
theological_decisions:
- issue: Cómo expresar la relación entre disciplina, amonestación y obediencia comunitaria sin suavizar la exhortación moral.
  english_pob_reading: The verse urges believers to accept discipline and mutual admonition as beneficial because they bind the community to God’s will.
  chosen_spanish_reading: El versículo exhorta a aceptar la disciplina y la amonestación mutua como algo bueno y provechoso, porque nos vincula a la voluntad de Dios.
  alternative_spanish_readings:
  - La disciplina debe ser recibida con docilidad porque nos une al querer de Dios.
  - Debemos recibir la corrección mutua como algo útil que nos ata a la voluntad de Dios.
  rationale: La formulación elegida conserva el tono exhortativo y comunitario del griego y de la POB, sin convertir la sentencia en un mandato disciplinario más duro de lo que el texto dice. ‘Ata’ mantiene la imagen de vínculo fuerte, importante para la lógica del versículo.
  doctrine_reference: Exhortación fraterna y disciplina eclesial en la vida comunitaria
- issue: Cómo representar ‘παιδεία’ y ‘νουθέτησις’ sin borrar su tensión semántica entre formación y corrección.
  english_pob_reading: discipline / admonition
  chosen_spanish_reading: disciplina / amonestación
  alternative_spanish_readings:
  - corrección / exhortación
  - instrucción / reprensión
  rationale: 'La combinación ‘disciplina’ + ‘amonestación’ conserva dos aspectos distintos: el proceso formativo-correctivo y la advertencia fraterna. Unificar ambos en ‘corrección’ o ‘instrucción’ borraría la tensión lexical presente en el griego y mantenida por la POB.'
  doctrine_reference: Formación moral, corrección fraterna y santificación comunitaria
translation_notes:
  revision_awareness: The latest revision pass reported no changes needed (high agreement, verdict agree, unchanged=true). The Spanish draft therefore follows the stable English POB reading closely while rendering the Greek source directly and preserving the same lexical tensions without introducing new interpretive expansions.
  spanish_consistency_notes:
  - 'Se mantuvo el imperativo exhortativo en primera persona plural: ‘Aceptemos’.'
  - ‘Amados’ traduce el vocativo ἀγαπητοί con un tono natural y pastoral.
  - No se introdujo ‘Señor’ ni otra terminología no presente en el texto fuente.
  - Se preservó la distinción entre ‘disciplina’ y ‘amonestación’ para reflejar dos términos griegos diferentes.
