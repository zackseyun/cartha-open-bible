translation:
  language: es
  text: “Porque —dice[a]— una persona justa me disciplinará con misericordia y me reprenderá, pero que el aceite de los pecadores no unja mi cabeza.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un justo».'
    reason: Alternativa estilística genérica para δίκαιος sin introducir una referencia definida.
lexical_decisions:
- source_word: δίκαιος
  english_pob_choice: a righteous person
  chosen_spanish: una persona justa
  alternatives_spanish:
  - un justo
  - el justo
  lexicon: δίκαιος
  rationale: El griego es anartro y el registro auditado corrigió 'the righteous one' a un valor genérico. 'Una persona justa' preserva esa indefinición y evita convertir la cita en una referencia definida a una figura particular.
- source_word: Παιδεύσει
  english_pob_choice: will discipline
  chosen_spanish: me disciplinará
  alternatives_spanish:
  - me instruirá
  - me corregirá
  lexicon: παιδεύω
  rationale: '''Disciplinará'' conserva el sentido formativo/correctivo que la POB ya adoptó, sin reducirlo solo a castigo ni expandirlo a mera enseñanza.'
- source_word: ἐν ἐλέει
  english_pob_choice: in mercy
  chosen_spanish: con misericordia
  alternatives_spanish:
  - en misericordia
  - por misericordia
  lexicon: ἔλεος
  rationale: '''Con misericordia'' suena natural en español y mantiene el matiz de modo o acompañamiento del acto correctivo.'
- source_word: ἐλέγξει
  english_pob_choice: will reprove
  chosen_spanish: me reprenderá
  alternatives_spanish:
  - me corregirá
  - me censurará
  lexicon: ἐλέγχω
  rationale: '''Reprenderá'' refleja el valor de amonestación fuerte que la POB expresa con ''reprove''.'
- source_word: ἔλαιον ... μὴ λιπανάτω τὴν κεφαλήν μου
  english_pob_choice: let not the oil of sinners anoint my head
  chosen_spanish: pero no unja mi cabeza el aceite de los pecadores
  alternatives_spanish:
  - pero que el aceite de los pecadores no unja mi cabeza
  - pero que no me unja la cabeza el aceite de los pecadores
  lexicon: λιπαίνω
  rationale: '''Unja'' mantiene la imagen cultual y la metáfora del aceite. El orden verbal conserva la fuerza imperativa negativa del griego y la forma de la cita bíblica subyacente.'
theological_decisions:
- issue: Generic identity of δίκαιος in the quotation
  english_pob_reading: a righteous person
  chosen_spanish_reading: una persona justa
  alternative_spanish_readings:
  - el justo
  - un justo
  rationale: La redacción genérica encaja con el uso argumentativo de Clemente sobre la corrección mutua, y evita imponer una lectura mesiánica o demasiado definida que el griego no exige aquí.
  doctrine_reference: Uso de la cita para exhortación ética comunitaria; cf. el contexto inmediato de corrección fraterna en 1 Clemente 56:2-5.
translation_notes:
  revision_awareness: El texto sigue la lectura revisada de la POB en que δίκαιος se entiende de modo genérico ('a righteous person') y no como 'the righteous one'; la versión española refleja esa misma decisión con una expresión no definida.
  spanish_consistency_notes:
  - Se preserva el tono de cita introducida por «Porque», en paralelo con la POB inglesa.
  - Se evita la tradición eclesiástica de 'el justo' cuando el audit trail favorece una lectura genérica.
  - '''Misericordia'' y ''reprenderá'' mantienen el campo semántico de corrección benévola del original.'
