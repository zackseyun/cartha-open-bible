review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y la auditoría inglesa en los puntos principales: δίκαιος se mantiene genérico, παιδεύσει/ἐλέγξει conservan corrección y reprensión, y la cláusula final refleja correctamente la prohibición respecto al aceite de los pecadores. Sin embargo, hay dos ajustes menores necesarios: la nota al pie contradice la decisión auditada al ofrecer «la persona justa» como alternativa definida, y el orden/forma de la cláusula final puede hacerse más natural en español sin perder el sentido fuente.'
  spanish_quality_summary: El texto es claro y digno, pero presenta una puntuación tipográfica algo forzada al separar «Porque» con comillas y coma, y «pero no unja mi cabeza el aceite de los pecadores» suena rígido en español actual. Una leve reestructuración mejora la naturalidad y la legibilidad eclesial sin apartarse del original.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Una persona justa», «misericordia» y «reprenderá» están bien alineados con el razonamiento léxico documentado. La nota alternativa debe alinearse con la auditoría inglesa: puede conservar «un justo» como alternativa estilística, pero no «la persona justa», que reintroduce una definitud descartada.'
  issues:
  - severity: medium
    issue: La nota al pie ofrece «la persona justa» como alternativa.
    rationale: La revisión auditada cambió explícitamente «the righteous one» a «a righteous person» porque δίκαιος es anartro y genérico en este contexto. «La persona justa» reintroduce una lectura definida que la auditoría rechazó.
  - severity: low
    issue: 'La cláusula final es algo poco natural: «pero no unja mi cabeza el aceite de los pecadores».'
    rationale: Aunque es semánticamente correcta, en español resulta más natural y claro «pero que el aceite de los pecadores no unja mi cabeza», manteniendo la fuerza exhortativa negativa y la imagen del original.
  - severity: low
    issue: Puntuación inicial mejorable en la cita.
    rationale: «“Porque”, dice[a], ...» es comprensible, pero «“Porque —dice[a]— ...”» o una integración equivalente fluye mejor en español al insertar la fórmula parentética dentro de la cita.
  revised_spanish_text: “Porque —dice[a]— una persona justa me disciplinará con misericordia y me reprenderá, pero que el aceite de los pecadores no unja mi cabeza.”
