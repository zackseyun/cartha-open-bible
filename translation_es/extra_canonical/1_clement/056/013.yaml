source:
  edition: Funk 1901 (normalized OCR)
  text: εἶτα γνώσῃ, ὅτι εἰρηνεύσει σου ὁ οἶκος, ἡ δὲ δίαιτα τῆς σκηνῆς σου οὐ μὴ ἁμάρτῃ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/056/013.yaml
  text: 'Then you will know that your house will be at peace,

    and you will inspect your dwelling and not miss anything[a].'
  footnotes:
  - marker: a
    text: Or 'and the condition of your tent will certainly not go wrong.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:14Z'
    unchanged: false
    changes_summary: 'Revised the second line for lexical accuracy: δίαιτα is better rendered as ''dwelling'' or ''habitation'' in context, and οὐ μὴ ἁμάρτῃ here means ''not miss/fail to find'' rather than ''not fail.'' Also made the implied verbal sense natural in English with ''you will inspect.'''
translation:
  language: es
  text: 'Entonces sabrás que tu casa estará en paz,


    y examinarás tu morada y no echarás nada de menos[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no hallarás falta alguna en tu morada»; literalmente, «y no errarás / no fallarás».'
    reason: alternative_rendering_preserving_ἁμαρτῃ_nuance
lexical_decisions:
- source_word: εἰρηνεύσει
  english_pob_choice: will be at peace
  chosen_spanish: estará en paz
  alternatives_spanish:
  - vivirá en paz
  - permanecerá en paz
  lexicon: εἰρηνεύω
  rationale: En español, 'estar en paz' reproduce con naturalidad el estado de paz indicado por el verbo griego, sin agregar matices ajenos como una paz meramente interior o emocional.
- source_word: δίαιτα
  english_pob_choice: dwelling
  chosen_spanish: morada
  alternatives_spanish:
  - morada
  - vivienda
  - habitación
  lexicon: δίαιτα
  rationale: La revisión inglesa aclara que el término se refiere al espacio de habitación, no a la 'condición' de la tienda. 'Morada' conserva el sentido locativo y mantiene el paralelismo con 'casa'.
- source_word: ἁμάρτῃ
  english_pob_choice: not miss anything
  chosen_spanish: no te faltará nada
  alternatives_spanish:
  - no errará
  - no faltará en nada
  - no perderás nada
  lexicon: ἁμαρτάνω
  rationale: Aquí el verbo expresa la idea de fallar o quedarse corto respecto a lo que se busca/espera. En español, 'no te faltará nada' comunica bien la idea de ausencia de carencia o fracaso sin sonar forzado.
theological_decisions:
- issue: Paralelismo entre 'casa' y 'morada'
  english_pob_reading: your house will be at peace / you will inspect your dwelling
  chosen_spanish_reading: tu casa estará en paz / examinarás tu morada
  alternative_spanish_readings:
  - tu casa estará en paz / y la morada de tu tienda no fallará
  - tu casa estará en paz / y no errarás en tu morada
  rationale: 'El griego presenta dos miembros paralelos: οἶκος (''casa'') y δίαιτα (''morada/dwelling''). La traducción española conserva ese paralelismo espacial para no diluir la fuerza poética del dicho.'
  doctrine_reference: Job 5:24 LXX / 1 Clement 56:13 quotation
translation_notes:
  revision_awareness: La lectura inglesa pasó por una revisión que corrigió una renderización demasiado abstracta de δίαιτα ('condition') hacia un término locativo ('dwelling/habitation') y afinó ἁμάρτῃ como 'miss/fail to find' en vez de 'go wrong'. La versión española sigue esa revisión, preservando el paralelismo espacial y evitando una abstracción no sustentada por el griego.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el nombre divino.
  - '''Morada'' se prefirió a ''habitación'' para evitar ambigüedad con una pieza de la casa en español.'
  - La nota mantiene una alternativa semántica breve sin sobrecargar el texto principal.
