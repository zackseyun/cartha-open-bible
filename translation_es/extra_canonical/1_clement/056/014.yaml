review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: una promesa de descendencia abundante y una comparación con la hierba del campo. «Sabrás», «descendencia» y «abundante hierba del campo» son opciones fieles y naturales. Sin embargo, la nota al pie no preserva correctamente la alternativa documentada en el rastro inglés: el griego σπέρμα corresponde a «seed/semilla», no a la forma no idiomática «tu descendencia será muchas».'
  spanish_quality_summary: El texto principal es claro, digno y bien leído en español general. «Tu descendencia será muy numerosa» mejora legítimamente la fricción de número presente en una traducción más literal. La única reparación necesaria es la nota, que actualmente contiene un español incorrecto y no representa adecuadamente la alternativa léxica.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La decisión «σπέρμα -> descendencia» está bien motivada en español. Conviene, no obstante, conservar en nota la alternativa más literal «semilla» o «tu semilla será mucha/numerosa», porque el rastro inglés sí preservó esa opción histórica.
  issues:
  - severity: medium
    issue: La nota al pie dice «O «tu descendencia será muchas»».
    rationale: Esa formulación es gramaticalmente incorrecta en español («descendencia» es singular) y no corresponde a la alternativa del inglés auditado, que preserva «your seed will be many». La nota debe reflejar la alternativa léxica de σπέρμα, no repetir «descendencia» con un predicado defectuoso.
  revised_spanish_text: Y sabrás que tu descendencia será muy numerosa, y tus hijos como la abundante hierba del campo[a].
  revised_footnotes:
  - marker: a
    text: O «tu semilla será mucha».
    reason: preserve_literal_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Solo se corrige la nota para que preserve de forma idiomática en español la alternativa más literal de σπέρμα documentada en el rastro inglés, eliminando la frase incorrecta «tu descendencia será muchas».
