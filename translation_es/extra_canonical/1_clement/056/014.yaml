translation:
  language: es
  text: Y sabrás que tu descendencia será muy numerosa, y tus hijos como la abundante hierba del campo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu descendencia será muchas».
    reason: lexical_alternative
lexical_decisions:
- source_word: γνώσῃ
  english_pob_choice: you will know
  chosen_spanish: sabrás
  alternatives_spanish:
  - conocerás
  - llegarás a saber
  lexicon: γινώσκω
  rationale: El futuro con valor de certeza transmite bien la promesa; «sabrás» suena natural en español y conserva el matiz de conocimiento adquirido por experiencia o constatación.
- source_word: σπέρμα
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - linaje
  - semilla
  - prole
  lexicon: σπέρμα
  rationale: La revisión inglesa evitó «seed» por su fricción gramatical y eligió «offspring»; en español, «descendencia» comunica de forma clara y digna la idea de descendientes, sin forzar el sustantivo botánico «semilla».
- source_word: πολὺ
  english_pob_choice: many
  chosen_spanish: muy numerosa
  alternatives_spanish:
  - mucha
  - numerosa
  - abundante
  lexicon: πολύς
  rationale: «Muy numerosa» expresa el valor cuantitativo de manera idiomática en español aplicado a «descendencia», y evita la combinación menos natural «será mucha».
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - hijos e hijas
  - descendientes
  lexicon: τέκνον
  rationale: El contexto genealógico favorece «hijos» como término natural y tradicional; mantiene la relación familiar directa sin introducir un giro innecesariamente inclusivo o genérico.
- source_word: παμβότανον τοῦ ἀγροῦ
  english_pob_choice: the abundant grass of the field
  chosen_spanish: la abundante hierba del campo
  alternatives_spanish:
  - la hierba abundante del campo
  - el pasto abundante del campo
  - la hierba muy abundante del campo
  lexicon: παμβότανον
  rationale: «Hierba del campo» sigue de cerca la imagen griega y bíblica; «abundante» refleja el intensificador de παμβότανον sin volver la frase pesada.
theological_decisions:
- issue: Imagen de abundancia para la descendencia
  english_pob_reading: your offspring will be many, and your children like the abundant grass of the field
  chosen_spanish_reading: tu descendencia será muy numerosa, y tus hijos como la abundante hierba del campo
  alternative_spanish_readings:
  - tu descendencia será mucha
  - tu semilla será muy numerosa
  rationale: El texto conserva la metáfora de abundancia aplicada a la descendencia, sin explicitar una interpretación alegórica que el griego no exige. La comparación con la hierba del campo se mantiene como imagen de multiplicación visible y extendida.
  doctrine_reference: Génesis 13:16; 22:17; 1 Clemente 56:14
translation_notes:
  revision_awareness: La traducción inglesa pasó de «your seed will be many» a «your offspring will be many» para resolver la fricción entre un sustantivo de masa y el cuantificador «many». El español adopta directamente una solución natural con «descendencia», manteniendo la misma intención interpretativa sin necesitar la antigua formulación botánica.
  spanish_consistency_notes:
  - Se preserva el paralelismo entre la promesa de numerosa descendencia y la comparación con la hierba del campo.
  - «Descendencia» se usa como equivalente principal de σπέρμα para evitar ambigüedad en español.
  - No se introduce «Cristo», «SEÑOR» ni otros términos no presentes en el griego de este versículo.
