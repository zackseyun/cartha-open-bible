translation:
  language: es
  text: porque las fieras salvajes estarán en paz contigo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θῆρες γὰρ ἄγριοι
  english_pob_choice: wild beasts
  chosen_spanish: las fieras salvajes
  alternatives_spanish:
  - los animales salvajes
  - las bestias feroces
  lexicon: θῆρες
  rationale: θῆρες designa bestias/ferias, y ἄγριοι intensifica la idea de salvajidad. 'Fieras salvajes' conserva la fuerza imagética del griego y mantiene la duplicación semántica del original sin volverla artificiosa en español.
- source_word: εἰρηνεύσουσίν
  english_pob_choice: will be at peace
  chosen_spanish: estarán en paz
  alternatives_spanish:
  - vivirán en paz
  - serán pacíficas
  lexicon: εἰρηνεύω
  rationale: El verbo expresa entrar o estar en una condición de paz. 'Estarán en paz' reproduce la relación resultativa y suena natural en español bíblico contemporáneo.
- source_word: σοι
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con ustedes
  - junto a ti
  lexicon: σύ
  rationale: El singular de segunda persona queda bien expresado con 'contigo', que preserva el trato directo del texto.
theological_decisions:
- issue: Imagen de reconciliación entre el creyente y las fieras
  english_pob_reading: for wild beasts will be at peace with you.
  chosen_spanish_reading: porque las fieras salvajes estarán en paz contigo.
  alternative_spanish_readings:
  - porque los animales salvajes vivirán en paz contigo
  - porque las bestias feroces estarán en paz contigo
  rationale: La frase debe conservar la imagen concreta de paz con fieras, sin suavizarla a una generalidad moral. No hay indicación en el griego de una metáfora distinta; por eso se mantiene el lenguaje literal-imagético.
  doctrine_reference: 1 Clemente 56:12; concordancia con el uso de imágenes de paz/restauración en el contexto admonitorio
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el griego fuente y la traducción inglesa POB, sin revisiones aplicadas. La versión española sigue de cerca el valor léxico de θῆρες ἄγριοι y εἰρηνεύσουσίν, manteniendo la sencillez sintáctica del original.
  spanish_consistency_notes:
  - Se usa 'paz' para εἰρήνη/εἰρηνεύω de forma consistente con el valor básico del verbo.
  - Se preserva el tono directo de segunda persona singular mediante 'contigo'.
  - No se introducen títulos teológicos ni equivalentes interpretativos ajenos al breve enunciado del griego.
