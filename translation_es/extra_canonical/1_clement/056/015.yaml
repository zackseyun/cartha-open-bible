translation:
  language: es
  text: 'Y vendrás a la tumba como grano maduro cosechado en su tiempo,


    o como una parva de la era recogida a su debido tiempo.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐλεύσῃ
  english_pob_choice: you will come
  chosen_spanish: vendrás
  alternatives_spanish:
  - irás
  - llegarás
  lexicon: ἔρχομαι
  rationale: El futuro directo conserva el movimiento hacia el destino final sin añadir matices no presentes en el griego.
- source_word: τάφῳ
  english_pob_choice: the grave
  chosen_spanish: la tumba
  alternatives_spanish:
  - el sepulcro
  - la sepultura
  lexicon: τάφος
  rationale: ‘Tumba’ es natural y fiel en español contemporáneo; mantiene el sentido funerario concreto sin volverlo más eclesiástico de lo necesario.
- source_word: σῖτος
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - trigo
  - cereal
  lexicon: σῖτος
  rationale: ‘Grano’ reproduce el valor genérico del término, más amplio que ‘trigo’.
- source_word: ὥριμος
  english_pob_choice: ripe
  chosen_spanish: maduro
  alternatives_spanish:
  - sazonado
  - hecho
  lexicon: ὥριμος
  rationale: ‘Maduro’ expresa la idea de plenitud o madurez del cereal de forma clara y natural.
- source_word: θεριζόμενος
  english_pob_choice: harvested
  chosen_spanish: cosechado
  alternatives_spanish:
  - segado
  - segado al cosechar
  lexicon: θερίζω
  rationale: ‘Cosechado’ comunica el acto de recoger el grano de manera comprensible y estilísticamente digna.
- source_word: κατὰ καιρὸν
  english_pob_choice: in its season
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su tiempo
  - en la temporada adecuada
  lexicon: καιρός
  rationale: ‘En su tiempo’ mantiene la correspondencia idiomática con el griego y con la traducción inglesa auditada.
- source_word: θημωνιὰ ἅλωνος
  english_pob_choice: a heap from the threshing floor
  chosen_spanish: un montón de la era
  alternatives_spanish:
  - una gavilla de la era
  - una parva de la era
  lexicon: θημωνιά; ἅλων
  rationale: ‘Un montón de la era’ conserva la imagen agrícola sin imponer un tecnicismo rural poco transparente.
- source_word: συγκομισθεῖσα
  english_pob_choice: gathered in
  chosen_spanish: recogido
  alternatives_spanish:
  - reunido
  - acopiado
  lexicon: συγκομίζω
  rationale: ‘Recogido’ es la opción más natural para el español bíblico contemporáneo y conserva la idea de reunir lo ya maduro.
- source_word: καθ’ ὥραν
  english_pob_choice: at the proper time
  chosen_spanish: a la hora oportuna
  alternatives_spanish:
  - en el momento oportuno
  - a su debido tiempo
  lexicon: ὥρα
  rationale: ‘Hora oportuna’ preserva el valor temporal del griego y refleja el matiz de oportunidad sin exagerar la precisión cronológica.
theological_decisions:
- issue: Imagen de la muerte como cosecha y no como simple extinción
  english_pob_reading: And you will come to the grave like ripe grain harvested in its season, or like a heap from the threshing floor gathered in at the proper time.
  chosen_spanish_reading: Y vendrás a la tumba como grano maduro cosechado en su tiempo, o como un montón de la era recogido a la hora oportuna.
  alternative_spanish_readings:
  - Y llegarás a la tumba...
  - Y vendrás al sepulcro...
  rationale: 'La formulación mantiene la metáfora agrícola completa del original: la muerte aparece como recolección en el tiempo adecuado, no como mera desaparición. ‘Tumba’ conserva el destino funerario sin introducir una lectura doctrinal añadida.'
  doctrine_reference: Metáfora sapiencial/poética de la muerte; no añade doctrina sistemática
- issue: Conservación de la duplicación paralela
  english_pob_reading: like ripe grain... or like a heap from the threshing floor...
  chosen_spanish_reading: como grano maduro... o como un montón de la era...
  alternative_spanish_readings:
  - como grano maduro... y como un montón de la era...
  rationale: Se conserva el paralelismo disyuntivo del griego y de la traducción inglesa, evitando suavizar la alternancia que estructura la frase.
  doctrine_reference: Paralelismo poético hebraizante/grecolatino
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió solo una marca de puntuación residual al final de la cita; no afecta el sentido ni requiere ajuste doctrinal o léxico en español. La presente redacción omite cualquier nota de variante porque no hay discrepancia semántica relevante en el texto fuente.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - No se empleó ‘Cristo’ ni terminología eclesiástica no presente en el griego.
  - La imagen agrícola se mantuvo con vocabulario transparente para lectores hispanohablantes de distintas regiones.
