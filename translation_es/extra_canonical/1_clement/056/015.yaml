review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la estructura y el sentido general del griego: futuro de llegada a la tumba, comparación con grano maduro cosechado a su tiempo, y paralelo con una acumulación de la era recogida en el momento apropiado. Sin embargo, hay un desajuste gramatical importante en el segundo símil: el griego θημωνιὰ es femenino singular y el participio συγκομισθεῖσα también es femenino singular, por lo que el español debe concordar; ''un montón... recogido'' rompe esa concordancia implícita de la imagen.'
  spanish_quality_summary: El español es claro y digno, pero 'un montón de la era recogido' suena algo tosco y presenta discordancia de género con el participio si se entiende la imagen como 'montón/parva' femenina en español más natural. 'Una parva de la era recogida a su debido tiempo' fluye mejor, conserva la imaginería agrícola y mejora la legibilidad e idiomaticidad. También 'a su debido tiempo' suena más natural y bíblicamente claro que 'a la hora oportuna' para καθ’ ὥραν.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas principales son aceptables: ἐλεύσῃ -> ''vendrás'', τάφῳ -> ''la tumba'', σῖτος -> ''grano'', ὥριμος -> ''maduro''. Recomiendo ajustar θημωνιὰ ἅλωνος desde ''un montón de la era'' a ''una parva de la era'' para reflejar mejor la unidad agrícola acumulada y permitir concordancia natural con ''recogida''.'
  issues:
  - severity: medium
    issue: Discordancia y torpeza en 'un montón de la era recogido'
    rationale: El segundo símil pierde naturalidad en español y no refleja bien la forma femenina singular del griego θημωνιὰ ... συγκομισθεῖσα. Una formulación femenina como 'una parva de la era recogida' conserva mejor la imagen y la concordancia.
  - severity: low
    issue: '''a la hora oportuna'' es menos idiomático que otras opciones'
    rationale: Aunque no es incorrecto, para καθ’ ὥραν una expresión como 'a su debido tiempo' o 'en el momento oportuno' suena más natural en español bíblico contemporáneo y preserva mejor el valor temporal general, no una 'hora' literal.
  revised_spanish_text: 'Y vendrás a la tumba como grano maduro cosechado en su tiempo,


    o como una parva de la era recogida a su debido tiempo.'
  revision_rationale: Se ajusta el segundo símil para reflejar mejor la imagen agrícola y la concordancia del griego, y se mejora la naturalidad de la expresión temporal en español sin alterar el sentido.
