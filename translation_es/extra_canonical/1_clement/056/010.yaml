  text: καὶ ἀπὸ μάστιγος γλώσσης σε κρύψει, καὶ οὐ μὴ φοβηθήσῃ κακῶν ἐπερχομένων.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/056/010.yaml
  text: And he will hide you from the scourge of the tongue[a], and you will certainly not fear evils when they come.
  footnotes:
  - marker: a
    text: Or 'He will hide you from the scourge of the tongue,\nand you will certainly not fear evils when they come.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:13Z'
    unchanged: false
    changes_summary: Replaced 'approaching evils' with 'evils when they come' to reflect ἐπερχομένων more naturally in English while preserving the sense of coming calamities.
translation:
  language: es
  text: Y te esconderá del azote de la lengua[a], y ciertamente no temerás los males cuando se acerquen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Te esconderá del azote de la lengua, y ciertamente no temerás los males cuando se acerquen".'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Además
  - Y también
  lexicon: καί
  rationale: Conserva la coordinación inicial del griego y el flujo polisindético del período; en español, 'Y' reproduce mejor la simple continuación que una paráfrasis.
- source_word: ἀπὸ μάστιγος γλώσσης
  english_pob_choice: from the scourge of the tongue
  chosen_spanish: del azote de la lengua
  alternatives_spanish:
  - de la flagelación de la lengua
  - del látigo de la lengua
  lexicon: μάστιξ; γλῶσσα
  rationale: '''Azote'' mantiene el valor figurado de castigo o golpe severo y suena natural en español bíblico contemporáneo; ''lengua'' conserva el sentido de habla dañina o calumniosa sin explicitar más de lo que el griego permite.'
- source_word: σε κρύψει
  english_pob_choice: he will hide you
  chosen_spanish: te ocultará
  alternatives_spanish:
  - te esconderá
  - te cubrirá
  lexicon: κρύπτω
  rationale: '''Ocultar'' es una opción directa y digna para κρύπτω; ''te ocultará'' preserva la idea de poner fuera de alcance sin añadir matices no presentes en el texto.'
- source_word: οὐ μὴ φοβηθήσῃ
  english_pob_choice: you will certainly not fear
  chosen_spanish: ciertamente no temerás
  alternatives_spanish:
  - de ninguna manera temerás
  - seguro que no temerás
  lexicon: οὐ μή + φοβέομαι
  rationale: La construcción enfática οὐ μή pide una negación fuerte; 'ciertamente no' conserva esa fuerza con buen español y sin sonar artificial.
- source_word: κακῶν ἐπερχομένων
  english_pob_choice: evils when they come
  chosen_spanish: los males cuando se acerquen
  alternatives_spanish:
  - los males que vendrán
  - los males que se aproximen
  lexicon: κακός; ἐπέρχομαι
  rationale: '''Cuando se acerquen'' traduce el participio presente con valor de aproximación o inminencia sin convertirlo en un simple futuro, y mantiene la imagen de males que se van acercando.'
theological_decisions:
- issue: Protección divina frente a la maledicencia
  english_pob_reading: And he will hide you from the scourge of the tongue
  chosen_spanish_reading: Y te ocultará del azote de la lengua
  alternative_spanish_readings:
  - Y te esconderá del azote de la lengua
  - Y te protegerá del azote de la lengua
  rationale: El texto presenta una acción divina de resguardo frente al daño verbal. 'Ocultará' mantiene la metáfora de cobertura/refugio sin sustituirla por una explicación más interpretativa como 'protegerá'.
  doctrine_reference: Divine preservation / protection in trial
- issue: Negación enfática ante males inminentes
  english_pob_reading: you will certainly not fear evils when they come
  chosen_spanish_reading: y ciertamente no temerás los males cuando se acerquen
  alternative_spanish_readings:
  - y ciertamente no temerás los males cuando vengan
  - y no temerás en absoluto los males que se acerquen
  rationale: La negación enfática se conserva con 'ciertamente no'; 'males cuando se acerquen' preserva la tensión de eventos aún no consumados, sin desdibujar la advertencia implícita del original.
  doctrine_reference: Courage / trust amid impending evil
translation_notes:
  revision_awareness: Tomé en cuenta la revisión que resaltó la necesidad de conservar la conjunción inicial καὶ y la inminencia de ἐπερχομένων. Por eso mantengo 'Y' al comienzo y traduzco la última cláusula con una forma de acercamiento/inminencia ('cuando se acerquen') en vez de un simple 'cuando vengan'.
  spanish_consistency_notes:
  - Se mantiene 'Y' inicial para reflejar la continuidad del período griego.
  - '''Azote de la lengua'' conserva la imagen figurada y evita un giro más explicativo.'
  - '''Males'' traduce κακά en plural con un sustantivo natural y solemne en español.'
  - La nota al pie se limita a una alternativa de segmentación/lectura sin introducir una nueva interpretación.
