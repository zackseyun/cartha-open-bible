revisions:
- from: Los justos fueron perseguidos[a], pero por los impíos; fueron encarcelados, pero por los profanos; fueron apedreados por transgresores; fueron muertos por los viles e injustos, por una envidia insoportable.
  to: Los justos fueron perseguidos, pero por los sin ley; fueron encarcelados, pero por los profanos; fueron apedreados por transgresores[a]; fueron asesinados por los viles e injustos, a causa de una envidia insoportable.
  rationale: Se revisa para alinear correctamente la nota léxica con «transgresores[a]», distinguir mejor ἀνόμων de ἀνοσίων mediante «los sin ley» frente a «los profanos», y mejorar la naturalidad de «fueron muertos» a «fueron asesinados». También se suaviza la última preposición a «a causa de» para un español más idiomático sin cambiar el sentido.
