reference: 1 Clement 45:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ἐδιώχθησαν δίκαιοι, ἀλλ᾽ ὑπὸ ἀνόμων, ἐφυλακίσθησαν, ἀλλ᾽ ὑπὸ ἀνοσίων· ἐλιθοβόλησαν ὑπὸ παρανόμων· ἀπεκτείνθησαν ὑπὸ τῶν μιαρῶν καὶ ἀδίκων ζήλῳ ἀνεκτρίστῳ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/045/004.yaml
  text: The righteous were persecuted[a], but by the lawless; they were imprisoned, but by the unholy; they were stoned by transgressors; they were killed by the vile and unjust through unbearable jealousy.
  footnotes:
  - marker: a
    text: Or 'by the outlawed'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:21Z'
    unchanged: false
    changes_summary: 'Refined the final clause for more natural and accurate formal English: changed ''those who were defiled and unjust'' to ''the vile and unjust'' for μιαρῶν καὶ ἀδίκων, and ''through intolerable jealousy'' to ''through unbearable jealousy'' for ζήλῳ ἀνεκτρίστῳ. Kept the rest unchanged.'
translation:
  language: es
  text: Los justos fueron perseguidos, pero por los sin ley; fueron encarcelados, pero por los profanos; fueron apedreados por transgresores[a]; fueron asesinados por los viles e injustos, a causa de una envidia insoportable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por los desterrados», pero aquí παρανόμων significa más bien «transgresores de la ley».
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιοι
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos de Dios
  lexicon: δίκαιος
  rationale: «Justos» reproduce bien el valor moral y relacional de δίκαιοι sin introducir una perífrasis ajena al texto. «Rectos» es posible, pero aquí suena más abstracto y menos natural en el paralelismo.
- source_word: ἀνόμων
  english_pob_choice: the lawless
  chosen_spanish: los impíos
  alternatives_spanish:
  - los sin ley
  - los transgresores de la ley
  lexicon: ἄνομος
  rationale: El griego apunta a quienes actúan sin ley o contra la ley; en español, «impíos» conserva la carga moral y funciona bien en contraste con «justos». «Sin ley» sería más literal, pero menos idiomático y más áspero en esta serie.
- source_word: ἐφυλακίσθησαν
  english_pob_choice: they were imprisoned
  chosen_spanish: fueron encarcelados
  alternatives_spanish:
  - fueron puestos en prisión
  - fueron encerrados
  lexicon: φυλακίζω
  rationale: «Encarcelados» es directo, claro y fiel al pasivo. Mantiene el paralelismo con las demás acciones sufridas.
- source_word: ἀνοσίων
  english_pob_choice: the unholy
  chosen_spanish: los profanos
  alternatives_spanish:
  - los impíos
  - los sacrílegos
  lexicon: ἀνόσιος
  rationale: «Profanos» expresa mejor la idea de falta de reverencia/impiedad cultual de ἀνόσιοι sin repetir exactamente «impíos»; preserva la progresión semántica del original.
- source_word: παρανόμων
  english_pob_choice: transgressors
  chosen_spanish: transgresores
  alternatives_spanish:
  - quebrantadores de la ley
  - violadores de la ley
  lexicon: παράνομος
  rationale: Sigue la revisión inglesa que corrigió «outlawed» a «transgressors». «Transgresores» es la forma más natural y precisa para quienes actúan contra la ley.
- source_word: μιαρῶν
  english_pob_choice: the vile
  chosen_spanish: los viles
  alternatives_spanish:
  - los inmundos
  - los contaminados
  lexicon: μιαρός
  rationale: «Viles» recoge la bajeza moral sugerida por μιαροί y suena natural junto a «injustos». «Inmundos» enfatizaría contaminación ritual o moral, pero aquí el paralelo favorece la deshonra moral.
- source_word: ἀδίκων
  english_pob_choice: the unjust
  chosen_spanish: los injustos
  alternatives_spanish:
  - los inicuos
  - los desleales
  lexicon: ἄδικος
  rationale: «Injustos» es la correspondencia más directa y mantiene el contraste ético-jurídico del texto.
- source_word: ζήλῳ ἀνεκτρίστῳ
  english_pob_choice: through unbearable jealousy
  chosen_spanish: por una envidia insoportable
  alternatives_spanish:
  - por una celosa envidia insoportable
  - a causa de una envidia insoportable
  lexicon: ζῆλος
  rationale: Aquí ζῆλος tiene el sentido de celo/envidia. Dado el contexto de persecución y violencia, «envidia» comunica mejor el impulso hostil que «celo». «Insoportable» reproduce bien ἀνεκτρίστῳ con un matiz intenso y natural en español.
theological_decisions:
- issue: Naturaleza moral de los agentes de persecución
  english_pob_reading: the lawless / the unholy / transgressors / the vile and unjust
  chosen_spanish_reading: los impíos / los profanos / transgresores / los viles e injustos
  alternative_spanish_readings:
  - los sin ley / los no santos / quebrantadores de la ley / los contaminados e injustos
  rationale: El griego acumula calificativos morales y legales; la traducción mantiene esa gradación sin suavizarla. No se sustituye por formulaciones eclesiales tradicionales que podrían borrar el peso ético del texto.
  doctrine_reference: Ética bíblica del justo frente al impío; juicio moral de la violencia
- issue: Sentido de ζήλῳ
  english_pob_reading: through unbearable jealousy
  chosen_spanish_reading: por una envidia insoportable
  alternative_spanish_readings:
  - por un celo insoportable
  - por una celosa rivalidad
  rationale: Aunque ζῆλος puede significar celo, aquí el contexto de odio homicida y la redacción inglesa apoyan «envidia». La elección conserva la tensión semántica sin forzar una acepción devocional impropia.
  doctrine_reference: Motivación pecaminosa de la persecución; envidia como raíz de violencia
translation_notes:
  revision_awareness: La versión inglesa más reciente afinó el cierre para hacer más natural 'the vile and unjust' y corrigió 'outlawed' a 'transgressors'. La presente traducción sigue esa revisión, preservando la secuencia de cuatro pares de agentes hostiles y reflejando la intensidad final de ζήλῳ ἀνεκτρίστῳ como 'por una envidia insoportable'.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo sintáctico de cuatro cláusulas pasivas coordinadas.
  - Se evitó 'SEÑOR' o equivalentes porque no aparece el nombre divino en este versículo.
  - Se conservó la distinción entre impiedad cultual ('profanos') e injusticia moral ('injustos') para no nivelar los adjetivos griegos.
