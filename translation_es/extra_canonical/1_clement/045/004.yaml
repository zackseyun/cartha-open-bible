review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido básico del griego: los justos padecen persecución, prisión, apedreamiento y muerte a manos de distintos tipos de malvados. Sin embargo, la nota [a] está anclada en «perseguidos» aunque la alternativa documentada corresponde a παρανόμων / «transgresores», no a ἐδιώχθησαν / «fueron perseguidos». Además, en la primera pareja ἀνόμων se expresa mejor como «los sin ley» o equivalente jurídico-moral que como «los impíos», ya que el griego distingue luego ἀνοσίων, para lo cual «profanos» sí funciona bien.'
  spanish_quality_summary: El español es claro y legible, con buen paralelismo. «Fueron muertos» suena menos natural y más débil que «fueron asesinados» o «les dieron muerte»; «fueron asesinados» conserva bien la violencia del original. «Por una envidia insoportable» es comprensible, aunque «a causa de una envidia insoportable» suena un poco más natural; no es un problema grave. La corrección principal necesaria es reubicar y ajustar la nota, y mejorar «impíos» en la primera cláusula para no borrar el matiz legal de ἀνόμων.
  glossary_alignment: No hay términos del glosario mayor en juego. A nivel léxico, «transgresores» para παρανόμων está alineado con la auditoría inglesa. Conviene distinguir ἀνόμων («los sin ley») de ἀνοσίων («los profanos») en español, tal como el griego los distingue.
  issues:
  - severity: high
    issue: La nota [a] está colocada en el lugar equivocado.
    rationale: La nota explica una alternativa para παρανόμων ('transgresores' / antes 'desterrados' en el borrador español), pero el anclaje actual está en «perseguidos», que traduce ἐδιώχθησαν. Esto desaline a texto, fuente y auditoría inglesa.
  - severity: medium
    issue: «Los impíos» para ἀνόμων reduce un matiz legal que el original mantiene distinto de ἀνοσίων.
    rationale: El texto griego usa primero ἀνόμων ('sin ley', 'lawless') y luego ἀνοσίων ('unholy'). Traducir el primero como «impíos» acerca demasiado ambos términos y debilita la gradación semántica.
  - severity: medium
    issue: «Fueron muertos» es español menos natural y menos idiomático.
    rationale: Aunque comprensible, suena rígido. «Fueron asesinados» comunica mejor ἀπεκτείνθησαν en un contexto de violencia injusta y mantiene la dignidad del registro.
  revised_spanish_text: Los justos fueron perseguidos, pero por los sin ley; fueron encarcelados, pero por los profanos; fueron apedreados por transgresores[a]; fueron asesinados por los viles e injustos, a causa de una envidia insoportable.
  revised_footnotes:
  - marker: a
    text: O «por los desterrados», pero aquí παρανόμων significa más bien «transgresores de la ley».
    reason: lexical_alternative
  revision_rationale: Se revisa para alinear correctamente la nota léxica con «transgresores[a]», distinguir mejor ἀνόμων de ἀνοσίων mediante «los sin ley» frente a «los profanos», y mejorar la naturalidad de «fueron muertos» a «fueron asesinados». También se suaviza la última preposición a «a causa de» para un español más idiomático sin cambiar el sentido.
