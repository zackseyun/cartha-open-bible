revisions:
- from: Han examinado cuidadosamente las Sagradas Escrituras[a], las verdaderas, las dadas por medio del Espíritu Santo.
  to: Han mirado atentamente en las Sagradas Escrituras[a], las verdaderas, las dadas por medio del Espíritu Santo.
  rationale: Se ajusta ἐνεκύψατε a una formulación menos sobreinterpretada que «han examinado cuidadosamente» y más cercana al inglés auditado. También se reemplaza la nota alternativa por una opción literal más natural en español, sin perder la imagen subyacente de inclinarse para mirar. Se conserva «Sagradas Escrituras», «las verdaderas» y «por medio del Espíritu Santo» por su buena correspondencia con el griego y con el historial POB.
