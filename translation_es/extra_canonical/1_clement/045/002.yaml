translation:
  language: es
  text: Han mirado atentamente en las Sagradas Escrituras[a], las verdaderas, las dadas por medio del Espíritu Santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Se han inclinado para mirar en las Sagradas Escrituras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνεκύψατε
  english_pob_choice: You have looked closely into
  chosen_spanish: Han examinado cuidadosamente
  alternatives_spanish:
  - Han mirado atentamente
  - Se han asomado con cuidado
  lexicon: ἐγκύπτω
  rationale: En este contexto, el verbo no debe reducirse a la imagen física de «inclinarse», sino expresar la acción de estudiar o examinar con atención. «Han examinado cuidadosamente» comunica el valor idiomático sin perder la metáfora de atención intensa.
- source_word: τὰς ἱερὰς γραφάς
  english_pob_choice: the holy Scriptures
  chosen_spanish: las Sagradas Escrituras
  alternatives_spanish:
  - las santas Escrituras
  - las Escrituras sagradas
  lexicon: γραφή
  rationale: «Sagradas Escrituras» es la forma natural y reverente en español para τὰς ἱερὰς γραφάς, conservando el sentido de textos santos/autorizados. «Santas» también sería posible, pero «Sagradas» es más idiomático en registro bíblico actual.
- source_word: τὰς ἀληθεῖς
  english_pob_choice: the true ones
  chosen_spanish: las verdaderas
  alternatives_spanish:
  - las auténticas
  - las que son verdaderas
  lexicon: ἀληθής
  rationale: El griego usa un adjetivo sustantivado que retoma las Escrituras. En español, «las verdaderas» mantiene esa referencia implícita y reproduce la brevedad del original sin repetir innecesariamente «Escrituras».
- source_word: διὰ τοῦ πνεύματος τοῦ ἁγίου
  english_pob_choice: given through the Holy Spirit
  chosen_spanish: dadas por medio del Espíritu Santo
  alternatives_spanish:
  - dadas por el Espíritu Santo
  - transmitidas por medio del Espíritu Santo
  lexicon: διά
  rationale: «Por medio de» expresa bien la mediación indicada por διά con genitivo. «Dadas por» conserva la pasiva implícita del participio/relación de procedencia, y «Espíritu Santo» preserva la mayúscula teológica por contexto.
theological_decisions:
- issue: Calidad y autoridad de las Escrituras
  english_pob_reading: holy Scriptures, the true ones
  chosen_spanish_reading: Sagradas Escrituras, las verdaderas
  alternative_spanish_readings:
  - Escrituras santas, las verdaderas
  - Sagradas Escrituras, las auténticas
  rationale: La frase griega combina santidad y veracidad para caracterizar las Escrituras como normativas y fidedignas. En español conviene mantener ambos rasgos sin suavizarlos ni fusionarlos en una sola idea.
  doctrine_reference: Inspiración y autoridad de la Escritura
- issue: Procedencia divina de la Escritura por mediación del Espíritu
  english_pob_reading: those given through the Holy Spirit
  chosen_spanish_reading: las dadas por medio del Espíritu Santo
  alternative_spanish_readings:
  - las inspiradas por el Espíritu Santo
  - las transmitidas por el Espíritu Santo
  rationale: El texto atribuye la procedencia de las Escrituras al Espíritu Santo. «Por medio de» conserva la mediación explícita sin introducir una paráfrasis doctrinalmente más amplia que el griego inmediato.
  doctrine_reference: Inspiración bíblica / obra del Espíritu Santo
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de una traducción más literal de la imagen física de ἐγκύπτω a una formulación idiomática («looked closely into»), y luego ajustó la apposición a «the true ones». El español sigue esa revisión: conserva el sentido idiomático de examen atento, reproduce la apposición breve con «las verdaderas» y mantiene la mediación del Espíritu Santo sin añadir explicaciones ajenas al texto.'
  spanish_consistency_notes:
  - Se usa «Espíritu Santo» con mayúsculas por referencia personal y teológica.
  - Se mantiene «Sagradas Escrituras» para el registro reverente y eclesial estándar en español.
  - La apposición «las verdaderas» evita redundancia y sigue la concisión del griego y del inglés revisado.
  - No se traduce κύριος ni Χριστός en este versículo, por lo que no aplica la terminología de Yahvé/Mesías.
