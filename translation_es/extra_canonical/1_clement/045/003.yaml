review_pass:
  verdict: approve
  source_alignment_summary: 'El borrador español refleja fielmente el griego: ἐπίστασθε = «Ustedes saben»; οὐδὲν ἄδικον οὐδὲ παρεπεποιημένον = «nada injusto ni falsificado»; γέγραπται ἐν αὐταῖς = «se ha escrito ... en ellas»; οὐχ εὑρήσετε δικαίους ἀποβεβλημένους ἀπὸ ὁσίων ἀνδρῶν = «no encontrarán a justos rechazados por hombres santos». No hay pérdida material de sentido ni inversión de relaciones.'
  spanish_quality_summary: El español es claro, natural y digno. «Ustedes saben» funciona bien en registro neutral latinoamericano. «Rechazados» es una elección fluida para ἀποβεβλημένους, aunque algo menos imagística que «desechados» o «arrojados»; aun así, permanece dentro del sentido. La sintaxis es limpia y legible.
  glossary_alignment: No hay términos del glosario maestro en disputa aquí. «Justos» para δικαίους y «santos» para ὁσίων son coherentes con el estilo bíblico del proyecto. No se requieren notas léxicas adicionales.
  issues:
  - severity: low
    issue: «Ustedes saben» podría abreviarse a «Saben»
    rationale: El griego no exige el pronombre explícito, pero su presencia no distorsiona el sentido y sigue siendo natural en español eclesial amplio.
  - severity: low
    issue: «Rechazados» suaviza ligeramente la imagen de ἀποβεβλημένους
    rationale: El participio puede sugerir ser echados fuera o desechados; sin embargo, «rechazados» conserva adecuadamente la idea de exclusión y coincide con la traducción inglesa auditada («cast off»).
