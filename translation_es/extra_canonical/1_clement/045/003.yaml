translation:
  language: es
  text: Ustedes saben que no se ha escrito nada injusto ni falsificado en ellas; no encontrarán a justos rechazados por hombres santos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπίστασθε
  english_pob_choice: You know
  chosen_spanish: Ustedes saben
  alternatives_spanish:
  - Saben
  - Ustedes conocen
  lexicon: ἐπίστασθε
  rationale: Expresa conocimiento establecido y directo, con un español natural y solemne sin añadir matiz exhortativo que el griego no exige.
- source_word: ἄδικον
  english_pob_choice: unjust
  chosen_spanish: injusto
  alternatives_spanish:
  - inicuo
  - sin justicia
  lexicon: ἄδικος
  rationale: «Injusto» corresponde de forma transparente al sentido moral/legal del término y conserva el contraste con lo correcto o justo.
- source_word: παρεπεποιημένον
  english_pob_choice: falsified
  chosen_spanish: falsificado
  alternatives_spanish:
  - torcido
  - falseado
  - adulterado
  lexicon: παραποιέω / παρεποιημένον
  rationale: La forma comunica algo alterado o manipulado frente al texto original; «falsificado» mantiene esa fuerza con buena inteligibilidad en español.
- source_word: γέγραπται ἐν αὐταῖς
  english_pob_choice: has been written in them
  chosen_spanish: se ha escrito ... en ellas
  alternatives_spanish:
  - está escrito ... en ellas
  - ha sido escrito ... en ellas
  lexicon: γράφω
  rationale: El pasivo perfecto se vuelve naturalmente con «se ha escrito»; «en ellas» conserva la referencia a las Escrituras mencionadas en el contexto inmediato.
- source_word: δικαίους
  english_pob_choice: righteous people
  chosen_spanish: a justos
  alternatives_spanish:
  - a personas justas
  - a rectos
  lexicon: δίκαιος
  rationale: «Justos» es breve, bíblico y fiel; mantiene el valor moral-personal sin expandir innecesariamente el sujeto.
- source_word: ἀποβεβλημένους
  english_pob_choice: cast off
  chosen_spanish: rechazados
  alternatives_spanish:
  - arrojados
  - descartados
  - expulsados
  lexicon: ἀποβάλλω
  rationale: «Rechazados» comunica la idea de ser apartados o desechados por otros con un español fluido, sin exagerar la imagen física.
- source_word: ὁσίων ἀνδρῶν
  english_pob_choice: holy men
  chosen_spanish: hombres santos
  alternatives_spanish:
  - varones santos
  - hombres piadosos
  lexicon: ὅσιος
  rationale: «Santos» refleja la cualidad de piedad/fidelidad reverente del término y es la forma más natural en español bíblico para este contexto.
theological_decisions:
- issue: Conservación del contraste moral del texto
  english_pob_reading: nothing unjust or falsified ... righteous people cast off by holy men
  chosen_spanish_reading: nada injusto ni falsificado ... a justos rechazados por hombres santos
  alternative_spanish_readings:
  - nada inicuo ni adulterado ... a justos desechados por hombres santos
  - nada injusto ni falseado ... a personas justas apartadas por hombres santos
  rationale: 'La frase mantiene la afirmación doble del texto: la integridad de lo escrito y la improbabilidad moral de que los santos rechacen a los justos. No se suaviza la tensión, porque el argumento depende de ese contraste.'
  doctrine_reference: Ética bíblica / autoridad de las Escrituras
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; el borrador conserva el sentido del texto griego y la solución inglesa de forma estable, sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se mantiene «justos» para δικαίους y «santos» para ὁσίων, evitando nivelar ambos términos.
  - «En ellas» se conserva para referir las Escrituras subyacentes del contexto, en paralelo con el inglés.
  - No se usa «SEÑOR» ni terminología cristológica ajena al texto, porque aquí no aparece material divino directo.
